<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 05 · MATRICE ATTAQUES × FAMILLES</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">L'oubli résiste rarement à un <tspan font-style="italic">coup de poignet</tspan>.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Quatre attaques publiées 2024-2025 contre quatre familles de méthodes — taux de récupération du savoir.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Column headers (families) -->
  <g>
    <text x="430" y="220" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#5A5A5A">SISA</text>
    <text x="430" y="238" class="body" font-size="10.5" font-style="italic" text-anchor="middle" fill="#B8B5AE">exact retraining</text>

    <text x="620" y="220" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#5A5A5A">NPO</text>
    <text x="620" y="238" class="body" font-size="10.5" font-style="italic" text-anchor="middle" fill="#B8B5AE">gradient-based</text>

    <text x="810" y="220" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#5A5A5A">RMU</text>
    <text x="810" y="238" class="body" font-size="10.5" font-style="italic" text-anchor="middle" fill="#B8B5AE">representation</text>

    <text x="1000" y="220" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#5A5A5A">INFLUENCE</text>
    <text x="1000" y="238" class="body" font-size="10.5" font-style="italic" text-anchor="middle" fill="#B8B5AE">+ LoRA / WIN-U</text>
  </g>

  <line x1="350" y1="252" x2="1140" y2="252" stroke="#1A1A1A" stroke-width="1"/>

  <!-- Row 1 — REBEL adversarial -->
  <g class="interactive" data-card="attack-rebel" tabindex="0" role="button" aria-label="REBEL adversarial prompts">
    <rect x="60" y="270" width="280" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="80" y="298" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">REBEL · Łucki 2025</text>
    <text x="80" y="324" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Prompts adversaires</text>
    <text x="80" y="346" class="body" font-size="10.5" fill="#5A5A5A">Évolutionnaires, ICLR 2025 :</text>
    <text x="80" y="362" class="body" font-size="10.5" fill="#5A5A5A">jusqu'à 93% WMDP récupéré.</text>

    <rect x="395" y="295" width="70" height="50" rx="3" fill="#B58A2C" fill-opacity="0.5"/>
    <text x="430" y="324" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#1A1A1A">~40%</text>

    <rect x="585" y="295" width="70" height="50" rx="3" fill="#B7332C" fill-opacity="0.65"/>
    <text x="620" y="324" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#FAF8F3">60%</text>

    <rect x="775" y="295" width="70" height="50" rx="3" fill="#B7332C" fill-opacity="0.85"/>
    <text x="810" y="324" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#FAF8F3">93%</text>

    <rect x="965" y="295" width="70" height="50" rx="3" fill="#B58A2C" fill-opacity="0.4"/>
    <text x="1000" y="324" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#1A1A1A">~30%</text>
  </g>

  <!-- Row 2 — Benign relearning -->
  <g class="interactive" data-card="attack-relearn" tabindex="0" role="button" aria-label="Benign relearning attack">
    <rect x="60" y="380" width="280" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="80" y="408" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">RELEARN · Hu CMU 2025</text>
    <text x="80" y="434" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Fine-tune bénin</text>
    <text x="80" y="456" class="body" font-size="10.5" fill="#5A5A5A">Articles médicaux publics</text>
    <text x="80" y="472" class="body" font-size="10.5" fill="#5A5A5A">ravivent le savoir bio-armes.</text>

    <rect x="395" y="405" width="70" height="50" rx="3" fill="#B58A2C" fill-opacity="0.5"/>
    <text x="430" y="434" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#1A1A1A">35%</text>

    <rect x="585" y="405" width="70" height="50" rx="3" fill="#B7332C" fill-opacity="0.85"/>
    <text x="620" y="434" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#FAF8F3">85%</text>

    <rect x="775" y="405" width="70" height="50" rx="3" fill="#B7332C" fill-opacity="0.75"/>
    <text x="810" y="434" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#FAF8F3">70%</text>

    <rect x="965" y="405" width="70" height="50" rx="3" fill="#B58A2C" fill-opacity="0.5"/>
    <text x="1000" y="434" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#1A1A1A">40%</text>
  </g>

  <!-- Row 3 — SMIA audit -->
  <g class="interactive" data-card="attack-smia" tabindex="0" role="button" aria-label="Statistical MIA audit">
    <rect x="60" y="490" width="280" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="80" y="518" class="mono" font-size="11" letter-spacing="2" fill="#1F5560">SMIA · 2025 audit</text>
    <text x="80" y="544" class="display" font-size="16" font-weight="600" fill="#1A1A1A">MIA statistique</text>
    <text x="80" y="566" class="body" font-size="10.5" fill="#5A5A5A">Training-free, CI quantifiable.</text>
    <text x="80" y="582" class="body" font-size="10.5" fill="#5A5A5A">Détecte présence en training set.</text>

    <rect x="395" y="515" width="70" height="50" rx="3" fill="#B58A2C" fill-opacity="0.4"/>
    <text x="430" y="544" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#1A1A1A">détecte</text>

    <rect x="585" y="515" width="70" height="50" rx="3" fill="#B7332C" fill-opacity="0.65"/>
    <text x="620" y="544" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#FAF8F3">détecte</text>

    <rect x="775" y="515" width="70" height="50" rx="3" fill="#B7332C" fill-opacity="0.65"/>
    <text x="810" y="544" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#FAF8F3">détecte</text>

    <rect x="965" y="515" width="70" height="50" rx="3" fill="#B58A2C" fill-opacity="0.4"/>
    <text x="1000" y="544" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#1A1A1A">partiel</text>
  </g>

  <!-- Row 4 — Apollo label-only -->
  <g class="interactive" data-card="attack-apollo" tabindex="0" role="button" aria-label="Apollo label-only MIA">
    <rect x="60" y="600" width="280" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="80" y="628" class="mono" font-size="11" letter-spacing="2" fill="#1F5560">APOLLO · arXiv 2506.09923</text>
    <text x="80" y="654" class="display" font-size="16" font-weight="600" fill="#1A1A1A">MIA label-only</text>
    <text x="80" y="676" class="body" font-size="10.5" fill="#5A5A5A">A posteriori, sans logits.</text>
    <text x="80" y="692" class="body" font-size="10.5" fill="#5A5A5A">Cible spécifique unlearning.</text>

    <rect x="395" y="625" width="70" height="50" rx="3" fill="#B58A2C" fill-opacity="0.4"/>
    <text x="430" y="654" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#1A1A1A">détecte</text>

    <rect x="585" y="625" width="70" height="50" rx="3" fill="#B7332C" fill-opacity="0.65"/>
    <text x="620" y="654" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#FAF8F3">détecte</text>

    <rect x="775" y="625" width="70" height="50" rx="3" fill="#B58A2C" fill-opacity="0.5"/>
    <text x="810" y="654" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#1A1A1A">partiel</text>

    <rect x="965" y="625" width="70" height="50" rx="3" fill="#B58A2C" fill-opacity="0.4"/>
    <text x="1000" y="654" class="mono" font-size="12" font-weight="600" text-anchor="middle" fill="#1A1A1A">partiel</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 730)">
    <rect x="0" y="-8" width="22" height="16" rx="2" fill="#B7332C" fill-opacity="0.85"/>
    <text x="28" y="4" class="body" font-size="11" fill="#5A5A5A">faille majeure / récupération &gt; 60%</text>
    <rect x="330" y="-8" width="22" height="16" rx="2" fill="#B58A2C" fill-opacity="0.5"/>
    <text x="358" y="4" class="body" font-size="11" fill="#5A5A5A">faille partielle / 30-60%</text>
  </g>

  <!-- Footer -->
  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="1" fill="#5A5A5A">Sources : Łucki ICLR 2025 ; Hu CMU 2025 ; SMIA arXiv 2602.01150 ; Apollo arXiv 2506.09923. Estimés synthétiques par famille.</text>
</svg>
