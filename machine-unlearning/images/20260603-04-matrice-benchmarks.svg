<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 836" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="836" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 04 · MATRICE BENCHMARKS × GARANTIES</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A"><tspan x="60">Les benchmarks publient des scores ;</tspan><tspan x="60" y="138">les régulateurs veulent une <tspan font-style="italic">garantie</tspan>.</tspan></text>
  <text x="60" y="170" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Ce que quatre benchmarks mesurent — et l'écart à l'article 17 RGPD.</text>
  <line x1="60" y1="196" x2="1140" y2="196" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Column headers -->
  <g>
    <text x="450" y="256" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#5A5A5A">VERBATIM</text>
    <text x="450" y="274" class="body" font-size="10.5" font-style="italic" text-anchor="middle" fill="#B8B5AE">restitution mot-à-mot</text>

    <text x="650" y="256" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#5A5A5A">PARAPHRASE</text>
    <text x="650" y="274" class="body" font-size="10.5" font-style="italic" text-anchor="middle" fill="#B8B5AE">savoir reformulé</text>

    <text x="850" y="256" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#5A5A5A">INFÉRENCE</text>
    <text x="850" y="274" class="body" font-size="10.5" font-style="italic" text-anchor="middle" fill="#B8B5AE">capacité dérivée</text>

    <text x="1050" y="256" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#5A5A5A">MEMBERSHIP</text>
    <text x="1050" y="274" class="body" font-size="10.5" font-style="italic" text-anchor="middle" fill="#B8B5AE">a vu la donnée ?</text>
  </g>

  <!-- Header separator -->
  <line x1="350" y1="286" x2="1140" y2="286" stroke="#1A1A1A" stroke-width="1"/>

  <!-- Row TOFU -->
  <g class="interactive" data-card="bench-tofu" tabindex="0" role="button" aria-label="Benchmark TOFU">
    <rect x="60" y="306" width="280" height="100" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="334" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">TOFU</text>
    <text x="80" y="360" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Fictitious unlearning</text>
    <text x="80" y="382" class="body" font-size="10.5" fill="#5A5A5A">Maini et al. 2024 · 200 auteurs</text>
    <text x="80" y="398" class="body" font-size="10.5" fill="#5A5A5A">fictifs · ROUGE + utility</text>

    <!-- Cells -->
    <circle cx="450" cy="356" r="14" fill="#2F5D3F" fill-opacity="0.85"/>
    <text x="450" y="360" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★★</text>

    <circle cx="650" cy="356" r="14" fill="#B58A2C" fill-opacity="0.75"/>
    <text x="650" y="360" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★</text>

    <circle cx="850" cy="356" r="14" fill="#B7332C" fill-opacity="0.25"/>
    <text x="850" y="360" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#5A5A5A">·</text>

    <circle cx="1050" cy="356" r="14" fill="#B7332C" fill-opacity="0.25"/>
    <text x="1050" y="360" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#5A5A5A">·</text>
  </g>

  <!-- Row WMDP -->
  <g class="interactive" data-card="bench-wmdp" tabindex="0" role="button" aria-label="Benchmark WMDP">
    <rect x="60" y="416" width="280" height="100" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="444" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">WMDP</text>
    <text x="80" y="470" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Malicious-use proxy</text>
    <text x="80" y="492" class="body" font-size="10.5" fill="#5A5A5A">Li et al. 2024 · 4 157 QCM</text>
    <text x="80" y="508" class="body" font-size="10.5" fill="#5A5A5A">bio/chimie/cyber · vs MMLU</text>

    <circle cx="450" cy="466" r="14" fill="#B58A2C" fill-opacity="0.75"/>
    <text x="450" y="470" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★</text>

    <circle cx="650" cy="466" r="14" fill="#2F5D3F" fill-opacity="0.85"/>
    <text x="650" y="470" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★★</text>

    <circle cx="850" cy="466" r="14" fill="#2F5D3F" fill-opacity="0.85"/>
    <text x="850" y="470" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★★</text>

    <circle cx="1050" cy="466" r="14" fill="#B7332C" fill-opacity="0.25"/>
    <text x="1050" y="470" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#5A5A5A">·</text>
  </g>

  <!-- Row MUSE -->
  <g class="interactive" data-card="bench-muse" tabindex="0" role="button" aria-label="Benchmark MUSE">
    <rect x="60" y="526" width="280" height="100" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="554" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">MUSE</text>
    <text x="80" y="580" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Six métriques</text>
    <text x="80" y="602" class="body" font-size="10.5" fill="#5A5A5A">Shi et al. 2024 · verbatim,</text>
    <text x="80" y="618" class="body" font-size="10.5" fill="#5A5A5A">privacy leakage, robustesse…</text>

    <circle cx="450" cy="576" r="14" fill="#2F5D3F" fill-opacity="0.85"/>
    <text x="450" y="580" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★★</text>

    <circle cx="650" cy="576" r="14" fill="#2F5D3F" fill-opacity="0.85"/>
    <text x="650" y="580" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★★</text>

    <circle cx="850" cy="576" r="14" fill="#B58A2C" fill-opacity="0.75"/>
    <text x="850" y="580" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★</text>

    <circle cx="1050" cy="576" r="14" fill="#B58A2C" fill-opacity="0.75"/>
    <text x="1050" y="580" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★</text>
  </g>

  <!-- Row OpenUnlearning -->
  <g class="interactive" data-card="bench-openunlearn" tabindex="0" role="button" aria-label="OpenUnlearning meta-benchmark">
    <rect x="60" y="636" width="280" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <text x="80" y="664" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">OPENUNLEARNING</text>
    <text x="80" y="690" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Méta-framework 2025</text>
    <text x="80" y="712" class="body" font-size="10.5" fill="#5A5A5A">13 algos × 16 evals · méta-éval</text>
    <text x="80" y="728" class="body" font-size="10.5" fill="#5A5A5A">de la fiabilité des métriques</text>

    <circle cx="450" cy="686" r="14" fill="#2F5D3F" fill-opacity="0.85"/>
    <text x="450" y="690" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★★</text>

    <circle cx="650" cy="686" r="14" fill="#2F5D3F" fill-opacity="0.85"/>
    <text x="650" y="690" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★★</text>

    <circle cx="850" cy="686" r="14" fill="#2F5D3F" fill-opacity="0.85"/>
    <text x="850" y="690" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★★</text>

    <circle cx="1050" cy="686" r="14" fill="#B58A2C" fill-opacity="0.75"/>
    <text x="1050" y="690" class="mono" font-size="11" font-weight="500" text-anchor="middle" fill="#FAF8F3">★</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 756)">
    <circle cx="0" cy="0" r="8" fill="#2F5D3F" fill-opacity="0.85"/>
    <text x="14" y="4" class="body" font-size="11" fill="#5A5A5A">couvert</text>
    <circle cx="92" cy="0" r="8" fill="#B58A2C" fill-opacity="0.75"/>
    <text x="106" y="4" class="body" font-size="11" fill="#5A5A5A">partiel</text>
    <circle cx="184" cy="0" r="8" fill="#B7332C" fill-opacity="0.25"/>
    <text x="198" y="4" class="body" font-size="11" fill="#5A5A5A">non couvert</text>
  </g>

  <!-- RGPD art 17 reminder -->
  <g transform="translate(710, 756)">
    <rect x="-10" y="-16" width="430" height="32" rx="3" fill="none" stroke="#B7332C" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="0" y="4" class="body" font-size="11" font-style="italic" fill="#B7332C">Article 17 RGPD exige : couverture des 4 colonnes simultanément.</text>
  </g>

  <!-- Footer -->
  <text x="60" y="806" class="body" font-size="10" font-style="italic" letter-spacing="1" fill="#5A5A5A">Sources : TOFU (Maini et al. 2024) ; WMDP (Li et al. 2024) ; MUSE (Shi et al. 2024) ; OpenUnlearning arXiv 2506.12618.</text>
</svg>
