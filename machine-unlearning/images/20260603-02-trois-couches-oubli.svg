<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr02" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 02 · TROIS COUCHES D'OUBLI</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">Seule la couche <tspan font-style="italic">poids</tspan> couvre l'article 17 sur la mémorisation.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Trois couches d'oubli, trois coûts, trois garanties — et une seule qui couvre vraiment l'article 17.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Axis labels -->
  <text x="100" y="200" class="mono" font-size="11" letter-spacing="2" fill="#5A5A5A">SURFACE</text>
  <text x="100" y="700" class="mono" font-size="11" letter-spacing="2" fill="#5A5A5A">PROFONDEUR</text>
  <line x1="98" y1="220" x2="98" y2="680" stroke="#B8B5AE" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- Layer 1 — RAG -->
  <g class="interactive" data-card="layer-rag" tabindex="0" role="button" aria-label="Couche RAG retrieval">
    <rect x="150" y="220" width="900" height="140" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="170" y="248" class="mono" font-size="11" letter-spacing="2" fill="#B58A2C">COUCHE 1 · SURFACE</text>
    <text x="170" y="276" class="display" font-size="20" font-weight="600" fill="#1A1A1A">RAG · index vectoriel</text>
    <text x="170" y="298" class="body" font-size="12" fill="#5A5A5A">FAISS, Pinecone, pgvector. La donnée vit dans un embedding + son texte source.</text>

    <text x="170" y="332" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Effacement : <tspan fill="#5A5A5A" font-weight="400">supprimer la ligne d'index. Immédiat, peu coûteux, exact.</tspan></text>
    <text x="170" y="350" class="body" font-size="11" font-style="italic" fill="#B7332C">Couvre : données apportées à chaque requête. Ne couvre PAS la mémorisation des poids.</text>

    <!-- Right side: cost/guarantee badges -->
    <text x="900" y="248" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A" text-anchor="end">COÛT</text>
    <text x="900" y="266" class="mono" font-size="11" fill="#2F5D3F" text-anchor="end">★☆☆☆☆</text>

    <text x="1020" y="248" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A" text-anchor="end">GARANTIE</text>
    <text x="1020" y="266" class="mono" font-size="11" fill="#2F5D3F" text-anchor="end">★★★★★</text>
  </g>

  <!-- Layer 2 — Fine-tune -->
  <g class="interactive" data-card="layer-finetune" tabindex="0" role="button" aria-label="Couche fine-tune adapter">
    <rect x="150" y="380" width="900" height="140" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="170" y="408" class="mono" font-size="11" letter-spacing="2" fill="#1F5560">COUCHE 2 · INTERMÉDIAIRE</text>
    <text x="170" y="436" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Fine-tune · LoRA / adapter</text>
    <text x="170" y="458" class="body" font-size="12" fill="#5A5A5A">Adapter QLoRA monté sur un modèle base. La donnée vit dans des matrices basse-rang.</text>

    <text x="170" y="492" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Effacement : <tspan fill="#5A5A5A" font-weight="400">ré-entraîner un adapter sans la donnée, ou influence functions.</tspan></text>
    <text x="170" y="510" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Couvre : données ciblées du fine-tuning, traçabilité si chaîne versionnée.</text>

    <text x="900" y="408" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A" text-anchor="end">COÛT</text>
    <text x="900" y="426" class="mono" font-size="11" fill="#B58A2C" text-anchor="end">★★★☆☆</text>

    <text x="1020" y="408" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A" text-anchor="end">GARANTIE</text>
    <text x="1020" y="426" class="mono" font-size="11" fill="#B58A2C" text-anchor="end">★★★★☆</text>
  </g>

  <!-- Layer 3 — Weights -->
  <g class="interactive" data-card="layer-weights" tabindex="0" role="button" aria-label="Couche poids modèle base">
    <rect x="150" y="540" width="900" height="140" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <text x="170" y="568" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">COUCHE 3 · POIDS · LE PROBLÈME RÉGULATOIRE</text>
    <text x="170" y="596" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Modèle de base · poids pré-entraînés</text>
    <text x="170" y="618" class="body" font-size="12" fill="#5A5A5A">Milliards de paramètres calés sur des téraoctets de corpus. La donnée s'y dilue, mais se mémorise.</text>

    <text x="170" y="652" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Effacement : <tspan fill="#5A5A5A" font-weight="400">retraining (coût prohibitif) ou unlearning approximatif in-place.</tspan></text>
    <text x="170" y="670" class="body" font-size="11" font-style="italic" fill="#B7332C">Seule couche qui couvre la mémorisation des poids — donc l'article 17 quand celle-ci est démontrée.</text>

    <text x="900" y="568" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A" text-anchor="end">COÛT</text>
    <text x="900" y="586" class="mono" font-size="11" fill="#B7332C" text-anchor="end">★★★★★</text>

    <text x="1020" y="568" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A" text-anchor="end">GARANTIE</text>
    <text x="1020" y="586" class="mono" font-size="11" fill="#B7332C" text-anchor="end">★★☆☆☆</text>
  </g>

  <!-- Vertical arrow Surface → Profondeur -->
  <line x1="115" y1="220" x2="115" y2="680" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arr02)"/>

  <!-- Footer -->
  <text x="60" y="754" class="body" font-size="10" font-style="italic" letter-spacing="1" fill="#5A5A5A">Source : analyse auteur ; CNIL juin 2025 § mesures attendues ; EDPB Opinion 28/2024.</text>
  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="1" fill="#B8B5AE">Cliquez sur une couche pour son détail technique.</text>
</svg>
