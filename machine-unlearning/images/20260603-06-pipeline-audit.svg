<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr06" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 06 · PIPELINE D'AUDIT</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">De l'algo d'oubli à la <tspan font-style="italic">procédure de validation</tspan>.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Cinq étapes, quatre gates — vers un livrable conformité opposable.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Flow axis -->
  <line x1="100" y1="430" x2="1140" y2="430" stroke="#B8B5AE" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- Step 1 — Forget set -->
  <g class="interactive" data-card="gate-forget" tabindex="0" role="button" aria-label="Étape 1 forget set">
    <rect x="80" y="280" width="180" height="300" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="170" y="310" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#B7332C">ÉTAPE 1</text>
    <circle cx="170" cy="350" r="18" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="170" y="356" class="mono" font-size="14" font-weight="600" text-anchor="middle" fill="#1A1A1A">1</text>

    <text x="170" y="400" class="display" font-size="15" font-weight="600" text-anchor="middle" fill="#1A1A1A">Forget set</text>

    <text x="100" y="430" class="body" font-size="10.5" fill="#5A5A5A">Critères de sélection,</text>
    <text x="100" y="446" class="body" font-size="10.5" fill="#5A5A5A">scope, traçabilité versionnée.</text>

    <text x="100" y="478" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Livrable :</text>
    <text x="100" y="494" class="body" font-size="10.5" fill="#5A5A5A">manifest data v1,</text>
    <text x="100" y="510" class="body" font-size="10.5" fill="#5A5A5A">hashes SHA-256.</text>

    <text x="100" y="540" class="mono" font-size="10" font-style="italic" fill="#B58A2C">art. 17 · §1 base</text>
  </g>
  <line x1="260" y1="430" x2="298" y2="430" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arr06)"/>

  <!-- Step 2 — Unlearning -->
  <g class="interactive" data-card="gate-unlearn" tabindex="0" role="button" aria-label="Étape 2 unlearning">
    <rect x="305" y="280" width="180" height="300" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="395" y="310" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#B7332C">ÉTAPE 2</text>
    <circle cx="395" cy="350" r="18" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="395" y="356" class="mono" font-size="14" font-weight="600" text-anchor="middle" fill="#1A1A1A">2</text>

    <text x="395" y="400" class="display" font-size="15" font-weight="600" text-anchor="middle" fill="#1A1A1A">Unlearning</text>

    <text x="325" y="430" class="body" font-size="10.5" fill="#5A5A5A">Choix méthode (NPO,</text>
    <text x="325" y="446" class="body" font-size="10.5" fill="#5A5A5A">RMU, SISA-LoRA),</text>
    <text x="325" y="462" class="body" font-size="10.5" fill="#5A5A5A">calibration sur scope.</text>

    <text x="325" y="494" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Livrable :</text>
    <text x="325" y="510" class="body" font-size="10.5" fill="#5A5A5A">modèle unlearned θ',</text>
    <text x="325" y="526" class="body" font-size="10.5" fill="#5A5A5A">delta hash vs θ.</text>

    <text x="325" y="556" class="mono" font-size="10" font-style="italic" fill="#B58A2C">scope défini · θ' produit</text>
  </g>
  <line x1="485" y1="430" x2="523" y2="430" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arr06)"/>

  <!-- Step 3 — SMIA audit -->
  <g class="interactive" data-card="gate-audit" tabindex="0" role="button" aria-label="Étape 3 audit SMIA">
    <rect x="530" y="280" width="180" height="300" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="2"/>
    <text x="620" y="310" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#1F5560">ÉTAPE 3 · GATE</text>
    <circle cx="620" cy="350" r="18" fill="#1F5560"/>
    <text x="620" y="356" class="mono" font-size="14" font-weight="600" text-anchor="middle" fill="#FAF8F3">3</text>

    <text x="620" y="400" class="display" font-size="15" font-weight="600" text-anchor="middle" fill="#1A1A1A">Audit SMIA</text>

    <text x="550" y="430" class="body" font-size="10.5" fill="#5A5A5A">Test statistique</text>
    <text x="550" y="446" class="body" font-size="10.5" fill="#5A5A5A">training-free, intervalles</text>
    <text x="550" y="462" class="body" font-size="10.5" fill="#5A5A5A">de confiance.</text>

    <text x="550" y="494" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Livrable :</text>
    <text x="550" y="510" class="body" font-size="10.5" fill="#5A5A5A">forgetting rate ± CI,</text>
    <text x="550" y="526" class="body" font-size="10.5" fill="#5A5A5A">rapport SMIA daté.</text>

    <text x="550" y="556" class="mono" font-size="10" font-style="italic" fill="#1F5560">↳ pass : rate &gt; seuil</text>
  </g>
  <line x1="710" y1="430" x2="748" y2="430" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arr06)"/>

  <!-- Step 4 — Relearn probe -->
  <g class="interactive" data-card="gate-cert" tabindex="0" role="button" aria-label="Étape 4 relearn probe">
    <rect x="755" y="280" width="180" height="300" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="2"/>
    <text x="845" y="310" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#1F5560">ÉTAPE 4 · GATE</text>
    <circle cx="845" cy="350" r="18" fill="#1F5560"/>
    <text x="845" y="356" class="mono" font-size="14" font-weight="600" text-anchor="middle" fill="#FAF8F3">4</text>

    <text x="845" y="400" class="display" font-size="15" font-weight="600" text-anchor="middle" fill="#1A1A1A">Relearn probe</text>

    <text x="775" y="430" class="body" font-size="10.5" fill="#5A5A5A">Fine-tune adversaire</text>
    <text x="775" y="446" class="body" font-size="10.5" fill="#5A5A5A">sur données loosely</text>
    <text x="775" y="462" class="body" font-size="10.5" fill="#5A5A5A">related (Hu CMU 2025).</text>

    <text x="775" y="494" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Livrable :</text>
    <text x="775" y="510" class="body" font-size="10.5" fill="#5A5A5A">% récupération sous probe,</text>
    <text x="775" y="526" class="body" font-size="10.5" fill="#5A5A5A">seuil de résilience.</text>

    <text x="775" y="556" class="mono" font-size="10" font-style="italic" fill="#1F5560">↳ pass : récup &lt; seuil</text>
  </g>
  <line x1="935" y1="430" x2="973" y2="430" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arr06)"/>

  <!-- Step 5 — Distillation + cert -->
  <g>
    <rect x="980" y="280" width="180" height="300" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <text x="1070" y="310" class="mono" font-size="11" letter-spacing="2" text-anchor="middle" fill="#B7332C">ÉTAPE 5 · LIVRABLE</text>
    <circle cx="1070" cy="350" r="18" fill="#B7332C"/>
    <text x="1070" y="356" class="mono" font-size="14" font-weight="600" text-anchor="middle" fill="#FAF8F3">5</text>

    <text x="1070" y="400" class="display" font-size="15" font-weight="600" text-anchor="middle" fill="#1A1A1A">Distill + cert.</text>

    <text x="1000" y="430" class="body" font-size="10.5" fill="#5A5A5A">Distillation student</text>
    <text x="1000" y="446" class="body" font-size="10.5" fill="#5A5A5A">depuis teacher θ',</text>
    <text x="1000" y="462" class="body" font-size="10.5" fill="#5A5A5A">re-audit, certification.</text>

    <text x="1000" y="494" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Livrable :</text>
    <text x="1000" y="510" class="body" font-size="10.5" fill="#5A5A5A">rapport conformité,</text>
    <text x="1000" y="526" class="body" font-size="10.5" fill="#5A5A5A">hash modèle final.</text>

    <text x="1000" y="556" class="mono" font-size="10" font-style="italic" fill="#B7332C">opposable CNIL · ON</text>
  </g>

  <!-- Flow caption -->
  <text x="620" y="240" class="display" font-size="16" font-style="italic" text-anchor="middle" fill="#5A5A5A">— de la demande d'effacement au livrable conformité —</text>

  <!-- Footer -->
  <text x="60" y="754" class="body" font-size="10" font-style="italic" letter-spacing="1" fill="#5A5A5A">Sources : Distillation Robustifies Unlearning arXiv 2506.06278 ; SMIA arXiv 2602.01150 ; Hu CMU 2025 ; AI Act art. 43 organismes notifiés.</text>
  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="1" fill="#B8B5AE">Cliquez sur une étape pour son détail.</text>
</svg>
