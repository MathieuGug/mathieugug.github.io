<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">La mémoire empilée</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">La HBM répond au mur mémoire de l'inférence — et n'est produite que par trois acteurs est-asiatiques</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LEFT — stack anatomy (interactive) -->
  <text x="90" y="178" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Anatomie d'une pile HBM</text>
  <g class="interactive" data-card="anatomie-pile" tabindex="0" role="button" aria-label="Anatomie d'une pile HBM">
    <rect x="82" y="190" width="400" height="300" rx="3" fill="#B58A2C" fill-opacity="0.05" stroke="#B58A2C" stroke-width="1.25"/>
    <!-- DRAM dies -->
    <rect x="150" y="242" width="170" height="22" rx="1" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-width="1"/>
    <rect x="150" y="268" width="170" height="22" rx="1" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-width="1"/>
    <rect x="150" y="294" width="170" height="22" rx="1" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-width="1"/>
    <rect x="150" y="320" width="170" height="22" rx="1" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-width="1"/>
    <rect x="150" y="346" width="170" height="22" rx="1" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-width="1"/>
    <rect x="150" y="372" width="170" height="22" rx="1" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-width="1"/>
    <rect x="150" y="398" width="170" height="22" rx="1" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-width="1"/>
    <rect x="150" y="424" width="170" height="22" rx="1" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-width="1"/>
    <!-- base die -->
    <rect x="150" y="452" width="170" height="26" rx="1" fill="#1F5560" fill-opacity="0.3" stroke="#1F5560" stroke-width="1.25"/>
    <!-- TSV lines -->
    <line x1="182" y1="242" x2="182" y2="478" stroke="#1A1A1A" stroke-width="0.75" stroke-opacity="0.5"/>
    <line x1="235" y1="242" x2="235" y2="478" stroke="#1A1A1A" stroke-width="0.75" stroke-opacity="0.5"/>
    <line x1="288" y1="242" x2="288" y2="478" stroke="#1A1A1A" stroke-width="0.75" stroke-opacity="0.5"/>
    <!-- annotations -->
    <line x1="320" y1="300" x2="392" y2="300" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="398" y="298" class="body" font-size="11" fill="#1A1A1A">8 à 16 dies</text>
    <text x="398" y="313" class="body" font-size="11" fill="#5A5A5A">DRAM amincis</text>
    <line x1="290" y1="465" x2="392" y2="465" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="398" y="462" class="body" font-size="11" fill="#1A1A1A">base die</text>
    <text x="398" y="477" class="body" font-size="11" fill="#5A5A5A">(logique)</text>
    <text x="150" y="232" class="mono" font-size="10" fill="#5A5A5A">TSV ↕ traversants</text>
  </g>

  <!-- LEFT — bandwidth note (interactive) -->
  <g class="interactive" data-card="bande-passante" tabindex="0" role="button" aria-label="Pourquoi la bande passante">
    <rect x="82" y="502" width="400" height="118" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
    <text x="102" y="528" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Pourquoi la HBM : le mur mémoire</text>
    <text x="102" y="550" class="body" font-size="11.5" fill="#5A5A5A">Le décodage d'un LLM est plafonné par la bande</text>
    <text x="102" y="570" class="body" font-size="11.5" fill="#5A5A5A">passante, pas par les FLOPs. La HBM offre ~1 ordre</text>
    <text x="102" y="590" class="body" font-size="11.5" fill="#5A5A5A">de grandeur de plus que la DDR classique.</text>
    <text x="102" y="611" class="body" font-size="11" font-style="italic" fill="#B7332C">Renvoi : dossiers kv-cache &amp; ia-embarquee.</text>
  </g>

  <!-- RIGHT — market share (interactive) -->
  <g class="interactive" data-card="parts-marche" tabindex="0" role="button" aria-label="Parts de marché HBM 2025">
    <rect x="540" y="190" width="600" height="228" rx="3" fill="#1F5560" fill-opacity="0.03" stroke="#1F5560" stroke-width="1.25"/>
    <text x="562" y="218" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Parts de marché HBM — 2025</text>
    <!-- SK hynix -->
    <text x="562" y="258" class="body" font-size="12" fill="#1A1A1A">SK hynix</text>
    <rect x="680" y="246" width="378" height="20" fill="#1F5560" fill-opacity="0.8"/>
    <text x="1066" y="261" class="mono" font-size="12" font-weight="600" fill="#1F5560">~63 %</text>
    <!-- Samsung -->
    <text x="562" y="304" class="body" font-size="12" fill="#1A1A1A">Samsung</text>
    <rect x="680" y="292" width="144" height="20" fill="#1F5560" fill-opacity="0.5"/>
    <text x="832" y="307" class="mono" font-size="12" font-weight="600" fill="#1F5560">~24 %</text>
    <!-- Micron -->
    <text x="562" y="350" class="body" font-size="12" fill="#1A1A1A">Micron</text>
    <rect x="680" y="338" width="78" height="20" fill="#1F5560" fill-opacity="0.35"/>
    <text x="766" y="353" class="mono" font-size="12" font-weight="600" fill="#1F5560">~13 %</text>
    <text x="562" y="394" class="body" font-size="11.5" fill="#5A5A5A">Trois acteurs = 100 % du marché mondial. Aucun autre</text>
    <text x="562" y="410" class="body" font-size="11.5" fill="#5A5A5A">fabricant n'a de HBM en production de volume.</text>
  </g>

  <!-- RIGHT — HBM4 (interactive) -->
  <g class="interactive" data-card="hbm4" tabindex="0" role="button" aria-label="Allocation HBM4">
    <rect x="540" y="432" width="600" height="188" rx="3" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="562" y="460" class="body" font-size="13" font-weight="600" fill="#1A1A1A">HBM4 — la génération qui rebat les cartes</text>
    <text x="562" y="482" class="body" font-size="11.5" fill="#5A5A5A">Bus élargi ; base die logique parfois gravé par TSMC → couplage fonderie.</text>
    <text x="562" y="506" class="body" font-size="11.5" fill="#5A5A5A">Allocation provisoire Nvidia (fin 2025) :</text>
    <!-- stacked bar -->
    <rect x="562" y="520" width="305" height="26" fill="#B58A2C" fill-opacity="0.8"/>
    <rect x="867" y="520" width="140" height="26" fill="#B58A2C" fill-opacity="0.5"/>
    <rect x="1007" y="520" width="111" height="26" fill="#B58A2C" fill-opacity="0.3"/>
    <text x="714" y="537" class="mono" font-size="10.5" font-weight="600" fill="#1A1A1A" text-anchor="middle">SK hynix ~55 %</text>
    <text x="937" y="537" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">Sams. ~25 %</text>
    <text x="1062" y="537" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">Micr. ~20 %</text>
    <text x="562" y="576" class="body" font-size="11.5" fill="#1A1A1A">AMD conçoit le MI400 autour de <tspan font-weight="600">432 Go</tspan> de HBM4 :</text>
    <text x="562" y="596" class="body" font-size="11.5" fill="#5A5A5A">un retard de volume HBM4 pèserait sur toute la génération 2026.</text>
    <text x="562" y="614" class="body" font-size="11" font-style="italic" fill="#B58A2C">Deux pays, trois entreprises — dont l'une sous menace balistique permanente.</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="726" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : TrendForce / IDC 2025-2026 ; documentation AMD. Parts = ordres de grandeur publics, appelés à bouger trimestre par trimestre.</text>
</svg>
