<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Anatomie d'un module accélérateur</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Coupe d'un superchip type (GB200 / MI400) : quatre briques, quatre fournisseurs, aucun aux États-Unis</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- CROSS SECTION -->
  <!-- board -->
  <rect x="230" y="560" width="640" height="34" rx="2" fill="#5A5A5A" fill-opacity="0.18" stroke="#B8B5AE" stroke-width="1"/>
  <text x="550" y="581" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">Carte système (PCB)</text>

  <!-- ABF substrate (interactive) -->
  <g class="interactive" data-card="substrat-abf" tabindex="0" role="button" aria-label="Substrat ABF">
    <rect x="270" y="505" width="560" height="50" rx="2" fill="#2F5D3F" fill-opacity="0.12" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="550" y="535" class="body" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">Substrat — film ABF</text>
  </g>

  <!-- CoWoS interposer (interactive, carmine) -->
  <g class="interactive" data-card="interposeur-cowos" tabindex="0" role="button" aria-label="Interposeur CoWoS">
    <rect x="320" y="456" width="460" height="44" rx="2" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="2"/>
    <text x="550" y="483" class="body" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">Interposeur silicium — CoWoS (TSV)</text>
  </g>

  <!-- HBM stacks (interactive) -->
  <g class="interactive" data-card="stack-hbm" tabindex="0" role="button" aria-label="Stacks de mémoire HBM">
    <!-- left towers -->
    <g>
      <rect x="336" y="376" width="40" height="80" rx="2" fill="#B58A2C" fill-opacity="0.16" stroke="#B58A2C" stroke-width="1.5"/>
      <line x1="336" y1="392" x2="376" y2="392" stroke="#B58A2C" stroke-width="0.5"/>
      <line x1="336" y1="408" x2="376" y2="408" stroke="#B58A2C" stroke-width="0.5"/>
      <line x1="336" y1="424" x2="376" y2="424" stroke="#B58A2C" stroke-width="0.5"/>
      <line x1="336" y1="440" x2="376" y2="440" stroke="#B58A2C" stroke-width="0.5"/>
    </g>
    <g>
      <rect x="384" y="376" width="40" height="80" rx="2" fill="#B58A2C" fill-opacity="0.16" stroke="#B58A2C" stroke-width="1.5"/>
      <line x1="384" y1="392" x2="424" y2="392" stroke="#B58A2C" stroke-width="0.5"/>
      <line x1="384" y1="408" x2="424" y2="408" stroke="#B58A2C" stroke-width="0.5"/>
      <line x1="384" y1="424" x2="424" y2="424" stroke="#B58A2C" stroke-width="0.5"/>
      <line x1="384" y1="440" x2="424" y2="440" stroke="#B58A2C" stroke-width="0.5"/>
    </g>
    <!-- right towers -->
    <g>
      <rect x="676" y="376" width="40" height="80" rx="2" fill="#B58A2C" fill-opacity="0.16" stroke="#B58A2C" stroke-width="1.5"/>
      <line x1="676" y1="392" x2="716" y2="392" stroke="#B58A2C" stroke-width="0.5"/>
      <line x1="676" y1="408" x2="716" y2="408" stroke="#B58A2C" stroke-width="0.5"/>
      <line x1="676" y1="424" x2="716" y2="424" stroke="#B58A2C" stroke-width="0.5"/>
      <line x1="676" y1="440" x2="716" y2="440" stroke="#B58A2C" stroke-width="0.5"/>
    </g>
    <g>
      <rect x="724" y="376" width="40" height="80" rx="2" fill="#B58A2C" fill-opacity="0.16" stroke="#B58A2C" stroke-width="1.5"/>
      <line x1="724" y1="392" x2="764" y2="392" stroke="#B58A2C" stroke-width="0.5"/>
      <line x1="724" y1="408" x2="764" y2="408" stroke="#B58A2C" stroke-width="0.5"/>
      <line x1="724" y1="424" x2="764" y2="424" stroke="#B58A2C" stroke-width="0.5"/>
      <line x1="724" y1="440" x2="764" y2="440" stroke="#B58A2C" stroke-width="0.5"/>
    </g>
    <text x="404" y="368" class="mono" font-size="10" fill="#B58A2C" text-anchor="middle">HBM</text>
    <text x="744" y="368" class="mono" font-size="10" fill="#B58A2C" text-anchor="middle">HBM</text>
  </g>

  <!-- logic dies (interactive) -->
  <g class="interactive" data-card="die-logique" tabindex="0" role="button" aria-label="Dies logiques de calcul">
    <rect x="448" y="398" width="98" height="58" rx="2" fill="#1F5560" fill-opacity="0.14" stroke="#1F5560" stroke-width="1.5"/>
    <rect x="558" y="398" width="98" height="58" rx="2" fill="#1F5560" fill-opacity="0.14" stroke="#1F5560" stroke-width="1.5"/>
    <text x="497" y="432" class="body" font-size="11" font-weight="500" fill="#1F5560" text-anchor="middle">Die GPU</text>
    <text x="607" y="432" class="body" font-size="11" font-weight="500" fill="#1F5560" text-anchor="middle">Die GPU</text>
  </g>

  <!-- SUPPLIER LEGEND -->
  <text x="930" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">FOURNISSEUR PAR BRIQUE</text>
  <line x1="930" y1="212" x2="1140" y2="212" stroke="#E5E1D8" stroke-width="0.5"/>

  <circle cx="936" cy="248" r="5" fill="#1F5560"/>
  <text x="950" y="245" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Dies GPU</text>
  <text x="950" y="262" class="body" font-size="11" fill="#5A5A5A">TSMC · N4 / N3 / N2</text>

  <circle cx="936" cy="300" r="5" fill="#B58A2C"/>
  <text x="950" y="297" class="body" font-size="12" font-weight="600" fill="#1A1A1A">HBM</text>
  <text x="950" y="314" class="body" font-size="11" fill="#5A5A5A">SK hynix · Samsung · Micron</text>

  <circle cx="936" cy="352" r="5" fill="#B7332C"/>
  <text x="950" y="349" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Interposeur CoWoS</text>
  <text x="950" y="366" class="body" font-size="11" fill="#5A5A5A">TSMC (packaging avancé)</text>

  <circle cx="936" cy="404" r="5" fill="#2F5D3F"/>
  <text x="950" y="401" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Substrat ABF</text>
  <text x="950" y="418" class="body" font-size="11" fill="#5A5A5A">Ajinomoto (film) · Ibiden</text>

  <rect x="930" y="452" width="210" height="66" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#B8B5AE" stroke-width="1"/>
  <text x="944" y="476" class="body" font-size="11.5" fill="#1A1A1A">Le concepteur (Nvidia, AMD)</text>
  <text x="944" y="494" class="body" font-size="11.5" fill="#1A1A1A">est américain. La <tspan font-weight="600">fabrication</tspan></text>
  <text x="944" y="512" class="body" font-size="11.5" fill="#1A1A1A">est entièrement est-asiatique.</text>

  <!-- FOOTER -->
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="726" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : documentation Nvidia / AMD ; SIA/BCG 2021. Coupe schématique — un GB200 embarque 2 dies logiques et 8 stacks HBM.</text>
</svg>
