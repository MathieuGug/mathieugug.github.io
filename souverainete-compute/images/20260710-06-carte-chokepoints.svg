<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">La carte des points de passage</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Qui tient quoi : à chaque maillon, une nation dominante — et l'Asie de l'Est concentre presque tout</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Pays-Bas (interactive) -->
  <g class="interactive" data-card="pays-bas-euv" tabindex="0" role="button" aria-label="Pays-Bas — lithographie EUV">
    <rect x="80" y="182" width="250" height="322" rx="4" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.5"/>
    <text x="102" y="214" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Pays-Bas</text>
    <text x="102" y="234" class="body" font-size="11" font-style="italic" fill="#5A5A5A">ASML · Veldhoven</text>
    <line x1="102" y1="248" x2="308" y2="248" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="102" y="278" class="body" font-size="12.5" fill="#1A1A1A">Lithographie EUV</text>
    <text x="102" y="300" class="mono" font-size="20" font-weight="600" fill="#1F5560">100 %</text>
    <text x="102" y="330" class="body" font-size="11.5" fill="#5A5A5A">Une machine, zéro alternative</text>
    <text x="102" y="348" class="body" font-size="11.5" fill="#5A5A5A">de production sur Terre.</text>
    <text x="102" y="384" class="body" font-size="11.5" fill="#5A5A5A">Le point le plus tranchant</text>
    <text x="102" y="402" class="body" font-size="11.5" fill="#5A5A5A">pour le contrôle à l'export.</text>
  </g>

  <!-- Taïwan (interactive, carmine) -->
  <g class="interactive" data-card="taiwan-fonderie" tabindex="0" role="button" aria-label="Taïwan — fonderie et packaging">
    <rect x="345" y="182" width="250" height="322" rx="4" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="367" y="214" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Taïwan</text>
    <text x="367" y="234" class="body" font-size="11" font-style="italic" fill="#5A5A5A">TSMC · Hsinchu / Tainan</text>
    <line x1="367" y1="248" x2="573" y2="248" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="367" y="276" class="body" font-size="12" fill="#1A1A1A">Fonderie &lt; 7 nm</text>
    <text x="367" y="296" class="mono" font-size="17" font-weight="600" fill="#B7332C">~90 %</text>
    <text x="367" y="330" class="body" font-size="12" fill="#1A1A1A">Packaging avancé</text>
    <text x="367" y="350" class="mono" font-size="17" font-weight="600" fill="#B7332C">85 %</text>
    <text x="367" y="384" class="body" font-size="12" fill="#1A1A1A">Fonderie (tous nœuds)</text>
    <text x="367" y="404" class="mono" font-size="17" font-weight="600" fill="#B7332C">67 %</text>
    <text x="367" y="440" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">Un détroit = le point de</text>
    <text x="367" y="458" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">défaillance le plus coûteux.</text>
  </g>

  <!-- Corée (interactive, mustard) -->
  <g class="interactive" data-card="coree-hbm" tabindex="0" role="button" aria-label="Corée du Sud — HBM">
    <rect x="610" y="182" width="250" height="322" rx="4" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="632" y="214" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Corée du Sud</text>
    <text x="632" y="234" class="body" font-size="11" font-style="italic" fill="#5A5A5A">SK hynix · Samsung</text>
    <line x1="632" y1="248" x2="838" y2="248" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="632" y="278" class="body" font-size="12.5" fill="#1A1A1A">HBM (SK hynix)</text>
    <text x="632" y="300" class="mono" font-size="20" font-weight="600" fill="#B58A2C">~63 %</text>
    <text x="632" y="332" class="body" font-size="11.5" fill="#5A5A5A">+ Samsung, n°2 mondial.</text>
    <text x="632" y="368" class="body" font-size="11.5" fill="#5A5A5A">Deux des trois seuls</text>
    <text x="632" y="386" class="body" font-size="11.5" fill="#5A5A5A">fabricants de HBM au monde.</text>
    <text x="632" y="440" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">Sous menace balistique</text>
    <text x="632" y="458" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">permanente du voisin.</text>
  </g>

  <!-- Japon (interactive, forest) -->
  <g class="interactive" data-card="japon-materiaux" tabindex="0" role="button" aria-label="Japon — matériaux et consommables">
    <rect x="875" y="182" width="250" height="322" rx="4" fill="#2F5D3F" fill-opacity="0.07" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="897" y="214" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Japon</text>
    <text x="897" y="234" class="body" font-size="11" font-style="italic" fill="#5A5A5A">JSR · Shin-Etsu · Ajinomoto…</text>
    <line x1="897" y1="248" x2="1103" y2="248" stroke="#2F5D3F" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="897" y="272" class="body" font-size="11.5" fill="#1A1A1A">Photoresist EUV <tspan class="mono" font-weight="600" fill="#2F5D3F">&gt;90 %</tspan></text>
    <text x="897" y="298" class="body" font-size="11.5" fill="#1A1A1A">Film ABF <tspan class="mono" font-weight="600" fill="#2F5D3F">&gt;95 %</tspan></text>
    <text x="897" y="324" class="body" font-size="11.5" fill="#1A1A1A">Tracks (revêtement) <tspan class="mono" font-weight="600" fill="#2F5D3F">96 %</tspan></text>
    <text x="897" y="350" class="body" font-size="11.5" fill="#1A1A1A">Mask blanks EUV <tspan class="mono" font-weight="600" fill="#2F5D3F">93 %</tspan></text>
    <text x="897" y="376" class="body" font-size="11.5" fill="#1A1A1A">Plaquettes silicium <tspan class="mono" font-weight="600" fill="#2F5D3F">~51 %</tspan></text>
    <text x="897" y="418" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">Presque plus de puces,</text>
    <text x="897" y="436" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">mais la couche matériaux</text>
    <text x="897" y="454" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">tenue si serré que rien</text>
    <text x="897" y="472" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">ne tourne sans elle.</text>
  </g>

  <!-- CONTEXT STRIP -->
  <text x="80" y="540" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">EN CONTEXTE — LES DEUX BOUTS DE LA CHAÎNE</text>
  <line x1="80" y1="552" x2="1125" y2="552" stroke="#E5E1D8" stroke-width="0.5"/>

  <rect x="80" y="566" width="335" height="96" rx="3" fill="#5A5A5A" fill-opacity="0.04" stroke="#B8B5AE" stroke-width="1"/>
  <text x="100" y="590" class="body" font-size="12.5" font-weight="600" fill="#1A1A1A">Allemagne</text>
  <text x="100" y="612" class="body" font-size="11.5" fill="#5A5A5A">Optiques Zeiss 100 % · Lasers TRUMPF 100 %.</text>
  <text x="100" y="632" class="body" font-size="11.5" fill="#5A5A5A">Fournisseurs uniques dans la machine ASML.</text>

  <rect x="425" y="566" width="335" height="96" rx="3" fill="#5A5A5A" fill-opacity="0.04" stroke="#B8B5AE" stroke-width="1"/>
  <text x="445" y="590" class="body" font-size="12.5" font-weight="600" fill="#1A1A1A">États-Unis</text>
  <text x="445" y="612" class="body" font-size="11.5" fill="#5A5A5A">Conception (Nvidia, AMD) · EDA (Synopsys,</text>
  <text x="445" y="632" class="body" font-size="11.5" fill="#5A5A5A">Cadence). Leur force est en amont, pas la fab.</text>

  <rect x="770" y="566" width="355" height="96" rx="3" fill="#5A5A5A" fill-opacity="0.04" stroke="#B8B5AE" stroke-width="1"/>
  <text x="790" y="590" class="body" font-size="12.5" font-weight="600" fill="#1A1A1A">Chine</text>
  <text x="790" y="612" class="body" font-size="11.5" fill="#5A5A5A">Chaîne parallèle « suffisamment bonne » —</text>
  <text x="790" y="632" class="body" font-size="11.5" fill="#5A5A5A">SMIC 7 nm par DUV, hors nœud de pointe.</text>

  <!-- FOOTER -->
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="726" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : CSET Georgetown 2021 ; SIA/BCG 2021 ; TrendForce 2025-2026. Parts de marché mondiales, ordres de grandeur.</text>
</svg>
