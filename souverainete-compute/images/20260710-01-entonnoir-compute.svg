<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">L'entonnoir du compute</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">De la matière première au datacenter : à chaque étage, un acteur ou deux détiennent le marché</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- concentration axis -->
  <line x1="132" y1="185" x2="132" y2="620" stroke="#B8B5AE" stroke-width="1" stroke-dasharray="2 3"/>
  <path d="M132 626 l-5 -10 h10 z" fill="#B8B5AE"/>
  <text x="120" y="400" class="body" font-size="11" fill="#5A5A5A" letter-spacing="0.02em" transform="rotate(-90 120 400)" text-anchor="middle">concentration croissante · substituabilité décroissante</text>

  <!-- BAND 1 — Matériaux (non interactive) -->
  <rect x="210" y="175" width="780" height="62" rx="3" fill="#5A5A5A" fill-opacity="0.07" stroke="#B8B5AE" stroke-width="1"/>
  <text x="600" y="203" class="body" font-size="14" font-weight="500" fill="#1A1A1A" text-anchor="middle">Matériaux &amp; consommables</text>
  <text x="600" y="223" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">Japon · &gt; 90 % (résists, plaquettes, ABF)</text>

  <!-- BAND 2 — EUV (interactive) -->
  <g class="interactive" data-card="etage-euv" tabindex="0" role="button" aria-label="Étage lithographie EUV — ASML">
    <rect x="270" y="251" width="660" height="62" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.5"/>
    <text x="600" y="279" class="body" font-size="14" font-weight="500" fill="#1A1A1A" text-anchor="middle">Lithographie EUV</text>
    <text x="600" y="299" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">ASML · 100 %</text>
  </g>

  <!-- BAND 3 — Fonderie (interactive) -->
  <g class="interactive" data-card="etage-fonderie" tabindex="0" role="button" aria-label="Étage fonderie de pointe — TSMC">
    <rect x="330" y="327" width="540" height="62" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.5"/>
    <text x="600" y="355" class="body" font-size="14" font-weight="500" fill="#1A1A1A" text-anchor="middle">Fonderie de pointe (&lt; 7 nm)</text>
    <text x="600" y="375" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">TSMC · ~90 %</text>
  </g>

  <!-- BAND 4 — Packaging (interactive, carmine = tightest) -->
  <g class="interactive" data-card="etage-packaging" tabindex="0" role="button" aria-label="Étage packaging avancé — CoWoS">
    <rect x="390" y="403" width="420" height="62" rx="3" fill="#B7332C" fill-opacity="0.09" stroke="#B7332C" stroke-width="2"/>
    <text x="600" y="431" class="body" font-size="14" font-weight="500" fill="#1A1A1A" text-anchor="middle">Packaging avancé (CoWoS)</text>
    <text x="600" y="451" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">TSMC · 85 % — le maillon le plus tendu</text>
  </g>

  <!-- BAND 5 — HBM (interactive) -->
  <g class="interactive" data-card="etage-hbm" tabindex="0" role="button" aria-label="Étage mémoire HBM">
    <rect x="440" y="479" width="320" height="62" rx="3" fill="#B58A2C" fill-opacity="0.12" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="600" y="507" class="body" font-size="14" font-weight="500" fill="#1A1A1A" text-anchor="middle">Mémoire HBM</text>
    <text x="600" y="527" class="mono" font-size="11" font-weight="600" fill="#B58A2C" text-anchor="middle">3 acteurs · SK hynix ~63 %</text>
  </g>

  <!-- BAND 6 — Accélérateur (non interactive) -->
  <rect x="485" y="555" width="230" height="62" rx="3" fill="#1A1A1A"/>
  <text x="600" y="583" class="body" font-size="14" font-weight="600" fill="#FAF8F3" text-anchor="middle">Accélérateur IA</text>
  <text x="600" y="603" class="mono" font-size="10.5" fill="#FAF8F3" fill-opacity="0.8" text-anchor="middle">Nvidia · AMD → datacenter</text>

  <!-- right annotation -->
  <text x="1005" y="285" class="body" font-size="11.5" fill="#5A5A5A">Un seul</text>
  <text x="1005" y="302" class="body" font-size="11.5" fill="#5A5A5A">fournisseur</text>
  <text x="1005" y="437" class="body" font-size="11.5" font-weight="600" fill="#B7332C">Rare</text>
  <text x="1005" y="454" class="body" font-size="11.5" fill="#5A5A5A">et accaparé</text>

  <!-- FOOTER -->
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="726" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : SIA/BCG 2021 ; CSET Georgetown 2021 ; TrendForce 2025-2026. Parts de marché = ordres de grandeur publics.</text>
  <text x="60" y="745" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Chaque étage rétréci = moins d'acteurs, moins de substituts. La largeur figure la substituabilité, pas le volume.</text>
</svg>
