<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">La sous-chaîne EUV en poupées russes</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Le monopole d'ASML repose lui-même sur des fournisseurs uniques : une chaîne emboîtée, sans substitut</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- OUTER — ASML system (interactive) -->
  <g class="interactive" data-card="assemblage-asml" tabindex="0" role="button" aria-label="Assemblage ASML">
    <rect x="80" y="180" width="620" height="435" rx="4" fill="#1F5560" fill-opacity="0.04" stroke="#1F5560" stroke-width="2"/>
    <text x="104" y="210" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1F5560">ASSEMBLAGE FINAL · VELDHOVEN (NL)</text>
    <text x="104" y="234" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Système de lithographie EUV — ASML</text>
    <text x="560" y="234" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="end">100 % du marché EUV</text>
  </g>

  <!-- source (interactive, nested) -->
  <g class="interactive" data-card="source-lumiere" tabindex="0" role="button" aria-label="Source de lumière EUV">
    <rect x="108" y="252" width="564" height="104" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="128" y="278" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Source de lumière (13,5 nm)</text>
    <text x="652" y="278" class="mono" font-size="10.5" font-weight="600" fill="#B7332C" text-anchor="end">fournisseur unique</text>
    <text x="128" y="300" class="body" font-size="11.5" fill="#5A5A5A">Laser CO₂ de forte puissance — <tspan font-weight="600" fill="#1A1A1A">TRUMPF</tspan> (100 %)</text>
    <text x="128" y="320" class="body" font-size="11.5" fill="#5A5A5A">Technologie de source — <tspan font-weight="600" fill="#1A1A1A">Cymer</tspan> (racheté par ASML)</text>
    <text x="128" y="340" class="body" font-size="11.5" fill="#5A5A5A">~50 000 gouttelettes d'étain vaporisées par seconde</text>
  </g>

  <!-- optics (interactive, nested) -->
  <g class="interactive" data-card="optiques-zeiss" tabindex="0" role="button" aria-label="Optiques Zeiss">
    <rect x="108" y="368" width="564" height="92" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="128" y="394" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Optiques — miroirs, pas de lentilles</text>
    <text x="652" y="394" class="mono" font-size="10.5" font-weight="600" fill="#B7332C" text-anchor="end">fournisseur unique</text>
    <text x="128" y="416" class="body" font-size="11.5" fill="#5A5A5A"><tspan font-weight="600" fill="#1A1A1A">Carl Zeiss SMT</tspan> (100 %) — partenaire exclusif</text>
    <text x="128" y="436" class="body" font-size="11.5" fill="#5A5A5A">Polissage à la précision atomique ; l'EUV est absorbé par le verre</text>
  </g>

  <!-- integration note (non interactive) -->
  <rect x="108" y="472" width="564" height="122" rx="3" fill="#5A5A5A" fill-opacity="0.05" stroke="#B8B5AE" stroke-width="1"/>
  <text x="128" y="498" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Intégration &amp; étalonnage</text>
  <text x="128" y="522" class="body" font-size="11.5" fill="#5A5A5A">~<tspan class="mono" font-weight="600" fill="#1A1A1A">100 000</tspan> pièces par machine · transport par plusieurs avions-cargo</text>
  <text x="128" y="544" class="body" font-size="11.5" fill="#5A5A5A">Le savoir-faire d'intégration est aussi rare que les composants eux-mêmes :</text>
  <text x="128" y="564" class="body" font-size="11.5" fill="#5A5A5A">aligner source, optiques et plateau au picomètre est un actif tacite non copiable.</text>
  <text x="128" y="584" class="body" font-size="11.5" font-style="italic" fill="#B7332C">Reconstruire ASML = reconstruire toute la chaîne emboîtée.</text>

  <!-- RIGHT — High-NA (interactive) -->
  <g class="interactive" data-card="high-na" tabindex="0" role="button" aria-label="High-NA EUV">
    <rect x="740" y="252" width="400" height="176" rx="4" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="762" y="280" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B58A2C">LA RELÈVE</text>
    <text x="762" y="306" class="body" font-size="15" font-weight="600" fill="#1A1A1A">High-NA EUV — EXE:5200</text>
    <text x="762" y="332" class="body" font-size="11.5" fill="#5A5A5A">Ouverture numérique 0,55 → gravure sous 2 nm</text>
    <text x="762" y="356" class="body" font-size="11.5" fill="#5A5A5A">Prix estimé : <tspan class="mono" font-weight="600" fill="#1A1A1A">350–400 M$</tspan> l'unité</text>
    <text x="762" y="380" class="body" font-size="11.5" fill="#5A5A5A">1ʳᵉ livraison production : Intel, Q4 2025</text>
    <text x="762" y="404" class="body" font-size="11.5" font-style="italic" fill="#1A1A1A">Un seul outil = le prix d'une petite usine.</text>
  </g>

  <!-- RIGHT — moat -->
  <rect x="740" y="444" width="400" height="150" rx="4" fill="#1A1A1A" fill-opacity="0.04" stroke="#B8B5AE" stroke-width="1"/>
  <text x="762" y="472" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Pourquoi personne ne rattrape</text>
  <text x="762" y="498" class="body" font-size="11.5" fill="#5A5A5A">· Monopole bâti en <tspan font-weight="600" fill="#1A1A1A">~30 ans</tspan> et <tspan font-weight="600" fill="#1A1A1A">&gt;10 Md$</tspan></text>
  <text x="762" y="520" class="body" font-size="11.5" fill="#5A5A5A">· Aucune machine EUV livrée par Nikon,</text>
  <text x="778" y="540" class="body" font-size="11.5" fill="#5A5A5A">Canon ni le chinois SMEE</text>
  <text x="762" y="562" class="body" font-size="11.5" fill="#5A5A5A">· Point de contrôle à l'export le plus</text>
  <text x="778" y="582" class="body" font-size="11.5" fill="#5A5A5A">tranchant de toute la chaîne (§8)</text>

  <!-- FOOTER -->
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="726" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : ASML Annual Report / Form 20-F 2024-2025 ; SIA/BCG 2021. Emboîtement = dépendance : chaque cadre contient son fournisseur unique.</text>
</svg>
