<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">La falaise du packaging</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Le vrai goulot 2024-2026 n'est pas la gravure du silicium, mais l'assemblage CoWoS qui réunit calcul et mémoire</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LEFT — capacity ramp chart (interactive) -->
  <text x="90" y="178" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Capacité CoWoS de TSMC — plaquettes / mois</text>
  <g class="interactive" data-card="rampe-capacite" tabindex="0" role="button" aria-label="Rampe de capacité CoWoS">
    <rect x="82" y="190" width="486" height="392" rx="3" fill="#1F5560" fill-opacity="0.03" stroke="#1F5560" stroke-width="1.25"/>
    <!-- axis -->
    <line x1="100" y1="560" x2="556" y2="560" stroke="#5A5A5A" stroke-width="1"/>
    <!-- bars -->
    <rect x="110" y="476" width="76" height="84" fill="#1F5560" fill-opacity="0.5"/>
    <text x="148" y="466" class="mono" font-size="12" font-weight="600" fill="#1F5560" text-anchor="middle">35k</text>
    <rect x="222" y="404" width="76" height="156" fill="#1F5560" fill-opacity="0.6"/>
    <text x="260" y="394" class="mono" font-size="12" font-weight="600" fill="#1F5560" text-anchor="middle">~65k</text>
    <rect x="334" y="344" width="76" height="216" fill="#1F5560" fill-opacity="0.7"/>
    <text x="372" y="334" class="mono" font-size="12" font-weight="600" fill="#1F5560" text-anchor="middle">~90k</text>
    <rect x="446" y="248" width="76" height="312" fill="#1F5560" fill-opacity="0.85"/>
    <text x="484" y="238" class="mono" font-size="12" font-weight="600" fill="#1F5560" text-anchor="middle">~130k</text>
    <!-- x labels -->
    <text x="148" y="578" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">fin 2024</text>
    <text x="260" y="578" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">mi 2025</text>
    <text x="372" y="578" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">fin 2025</text>
    <text x="484" y="578" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">fin 2026</text>
    <!-- demand curve above -->
    <path d="M120 236 C 240 214, 380 206, 520 200" fill="none" stroke="#B7332C" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="300" y="222" class="body" font-size="11" font-style="italic" fill="#B7332C" text-anchor="middle">demande — reste au-dessus de l'offre</text>
  </g>
  <text x="90" y="606" class="body" font-size="11" fill="#5A5A5A">Quadruplement en 2 ans — et pourtant <tspan font-weight="600" fill="#B7332C">guichet fermé, délais 52–78 semaines</tspan>.</text>

  <!-- RIGHT TOP — CoWoS-S (interactive) -->
  <g class="interactive" data-card="cowos-s" tabindex="0" role="button" aria-label="CoWoS-S">
    <rect x="600" y="178" width="258" height="150" rx="3" fill="#5A5A5A" fill-opacity="0.05" stroke="#B8B5AE" stroke-width="1.25"/>
    <text x="620" y="204" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A">CoWoS-S</text>
    <text x="620" y="228" class="body" font-size="12.5" font-weight="600" fill="#1A1A1A">Interposeur silicium</text>
    <text x="620" y="250" class="body" font-size="11" fill="#5A5A5A">Galette de silicium pleine</text>
    <text x="620" y="270" class="body" font-size="11" fill="#5A5A5A">gravée de pistes fines + TSV.</text>
    <text x="620" y="292" class="body" font-size="11" fill="#5A5A5A">Bridé par la limite du réticule</text>
    <text x="620" y="312" class="body" font-size="11" fill="#5A5A5A">(~858 mm²).</text>
  </g>

  <!-- RIGHT TOP — CoWoS-L (interactive, carmine) -->
  <g class="interactive" data-card="cowos-l" tabindex="0" role="button" aria-label="CoWoS-L">
    <rect x="882" y="178" width="258" height="150" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="902" y="204" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B7332C">CoWoS-L</text>
    <text x="902" y="228" class="body" font-size="12.5" font-weight="600" fill="#1A1A1A">Ponts LSI</text>
    <text x="902" y="250" class="body" font-size="11" fill="#5A5A5A">Petits ponts de silicium qui</text>
    <text x="902" y="270" class="body" font-size="11" fill="#5A5A5A">« cousent » les chiplets sur</text>
    <text x="902" y="290" class="body" font-size="11" fill="#5A5A5A">substrat organique → boîtiers</text>
    <text x="902" y="310" class="body" font-size="11" fill="#5A5A5A">plusieurs × le réticule (Blackwell).</text>
  </g>

  <!-- RIGHT BOTTOM — Nvidia allocation (interactive) -->
  <g class="interactive" data-card="allocation-nvidia" tabindex="0" role="button" aria-label="Allocation Nvidia de la capacité CoWoS-L">
    <rect x="600" y="352" width="540" height="230" rx="3" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="620" y="380" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Un goulot rare… et accaparé</text>
    <text x="620" y="402" class="body" font-size="11.5" fill="#5A5A5A">Répartition estimée de la capacité CoWoS-L 2026 :</text>
    <!-- stacked bar -->
    <rect x="620" y="418" width="357" height="34" fill="#B7332C" fill-opacity="0.85"/>
    <rect x="977" y="418" width="77" height="34" fill="#B58A2C" fill-opacity="0.7"/>
    <rect x="1054" y="418" width="66" height="34" fill="#5A5A5A" fill-opacity="0.35"/>
    <text x="798" y="440" class="mono" font-size="12" font-weight="600" fill="#FAF8F3" text-anchor="middle">Nvidia ~70 %</text>
    <text x="1015" y="440" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">+15 %</text>
    <text x="1087" y="440" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">reste</text>
    <text x="620" y="482" class="body" font-size="11.5" fill="#5A5A5A">Les 3 premiers clients absorbent <tspan font-weight="600" fill="#1A1A1A">&gt; 85 %</tspan> de la capacité verrouillée.</text>
    <line x1="620" y1="500" x2="1120" y2="500" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="620" y="524" class="body" font-size="11.5" fill="#1A1A1A">Couplage critique : le nombre de stacks HBM qu'on parvient à</text>
    <text x="620" y="544" class="body" font-size="11.5" fill="#1A1A1A">poser sur l'interposeur définit la mémoire du module (Schéma 5).</text>
    <text x="620" y="566" class="body" font-size="11" font-style="italic" fill="#B58A2C">Packaging et HBM se serrent la main — deux goulots noués.</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="726" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : TSMC (communications investisseurs 2025) ; TrendForce 2025-2026. Chiffres de capacité = ordres de grandeur ; la demande est illustrative.</text>
</svg>
