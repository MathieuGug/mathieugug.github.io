<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le compute sous contrôle</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Trois mouvements en miroir : verrouiller les points de passage, les relocaliser, ou en bâtir des parallèles</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- year gridlines + labels -->
  <g>
    <line x1="200" y1="178" x2="200" y2="512" stroke="#E5E1D8" stroke-width="0.5"/>
    <line x1="370" y1="178" x2="370" y2="512" stroke="#E5E1D8" stroke-width="0.5"/>
    <line x1="540" y1="178" x2="540" y2="512" stroke="#E5E1D8" stroke-width="0.5"/>
    <line x1="710" y1="178" x2="710" y2="512" stroke="#E5E1D8" stroke-width="0.5"/>
    <line x1="880" y1="178" x2="880" y2="512" stroke="#E5E1D8" stroke-width="0.5"/>
    <line x1="1050" y1="178" x2="1050" y2="512" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="200" y="172" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" text-anchor="middle">2022</text>
    <text x="370" y="172" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" text-anchor="middle">2023</text>
    <text x="540" y="172" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" text-anchor="middle">2024</text>
    <text x="710" y="172" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" text-anchor="middle">2025</text>
    <text x="880" y="172" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" text-anchor="middle">2026</text>
    <text x="1050" y="172" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" text-anchor="middle">2027-28</text>
  </g>

  <!-- TRACK 1 — BIS controls (interactive) -->
  <g class="interactive" data-card="controles-bis" tabindex="0" role="button" aria-label="Contrôles à l'export BIS">
    <rect x="96" y="186" width="1048" height="96" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.5"/>
    <text x="112" y="208" class="body" font-size="12.5" font-weight="600" fill="#1A1A1A">Verrouiller — contrôles à l'export (BIS · États-Unis)</text>
    <line x1="150" y1="240" x2="760" y2="240" stroke="#B7332C" stroke-width="1.5"/>
    <circle cx="200" cy="240" r="5" fill="#B7332C"/>
    <text x="200" y="262" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">Oct 2022</text>
    <text x="200" y="276" class="body" font-size="9.5" fill="#5A5A5A" text-anchor="middle">GPU+SME · FDPR</text>
    <circle cx="370" cy="240" r="5" fill="#B7332C"/>
    <text x="370" y="262" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">Oct 2023</text>
    <text x="370" y="276" class="body" font-size="9.5" fill="#5A5A5A" text-anchor="middle">seuils révisés</text>
    <circle cx="540" cy="240" r="6" fill="#B7332C" stroke="#FAF8F3" stroke-width="1.5"/>
    <text x="540" y="262" class="body" font-size="10" font-weight="600" fill="#B7332C" text-anchor="middle">Déc 2024 ✦</text>
    <text x="540" y="276" class="body" font-size="9.5" fill="#5A5A5A" text-anchor="middle">HBM sous licence</text>
    <circle cx="710" cy="240" r="5" fill="#B7332C"/>
    <text x="710" y="262" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">Jan 2025</text>
    <text x="710" y="276" class="body" font-size="9.5" fill="#5A5A5A" text-anchor="middle">AI Diffusion</text>
  </g>

  <!-- TRACK 2 — reshoring (interactive) -->
  <g class="interactive" data-card="chips-acts" tabindex="0" role="button" aria-label="Relocalisation occidentale">
    <rect x="96" y="293" width="1048" height="96" rx="3" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.5"/>
    <text x="112" y="315" class="body" font-size="12.5" font-weight="600" fill="#1A1A1A">Relocaliser — CHIPS Act &amp; EU Chips Act</text>
    <line x1="200" y1="347" x2="1050" y2="347" stroke="#1F5560" stroke-width="1.5"/>
    <circle cx="200" cy="347" r="5" fill="#1F5560"/>
    <text x="200" y="369" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">CHIPS Act</text>
    <text x="200" y="383" class="body" font-size="9.5" fill="#5A5A5A" text-anchor="middle">52 Md$ (2022)</text>
    <circle cx="370" cy="347" r="5" fill="#1F5560"/>
    <text x="370" y="369" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">EU Chips Act</text>
    <text x="370" y="383" class="body" font-size="9.5" fill="#5A5A5A" text-anchor="middle">43 Md€</text>
    <circle cx="710" cy="347" r="5" fill="#1F5560"/>
    <text x="710" y="369" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">Arizona · Dresde</text>
    <text x="710" y="383" class="body" font-size="9.5" fill="#5A5A5A" text-anchor="middle">Kumamoto montent</text>
    <circle cx="1050" cy="347" r="5" fill="#1F5560"/>
    <text x="1050" y="369" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">Rapidus 2 nm</text>
    <text x="1050" y="383" class="body" font-size="9.5" fill="#5A5A5A" text-anchor="middle">Japon ~2027</text>
  </g>

  <!-- TRACK 3 — China (interactive) -->
  <g class="interactive" data-card="reponse-chine" tabindex="0" role="button" aria-label="Substitution chinoise">
    <rect x="96" y="400" width="1048" height="96" rx="3" fill="#B58A2C" fill-opacity="0.07" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="112" y="422" class="body" font-size="12.5" font-weight="600" fill="#1A1A1A">Contourner — substitution chinoise (chaîne parallèle)</text>
    <line x1="540" y1="454" x2="1050" y2="454" stroke="#B58A2C" stroke-width="1.5"/>
    <circle cx="540" cy="454" r="5" fill="#B58A2C"/>
    <text x="540" y="476" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">SMIC 7 nm</text>
    <text x="540" y="490" class="body" font-size="9.5" fill="#5A5A5A" text-anchor="middle">par DUV multi-patterning</text>
    <circle cx="710" cy="454" r="5" fill="#B58A2C"/>
    <text x="710" y="476" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">Huawei Ascend</text>
    <text x="710" y="490" class="body" font-size="9.5" fill="#5A5A5A" text-anchor="middle">accélérateurs maison</text>
    <circle cx="880" cy="454" r="5" fill="#B58A2C"/>
    <text x="880" y="476" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">SMEE</text>
    <text x="880" y="490" class="body" font-size="9.5" fill="#5A5A5A" text-anchor="middle">litho indigène</text>
    <circle cx="1050" cy="454" r="5" fill="#B58A2C"/>
    <text x="1050" y="476" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">« assez bon »</text>
    <text x="1050" y="490" class="body" font-size="9.5" fill="#5A5A5A" text-anchor="middle">hors nœud de pointe</text>
  </g>

  <!-- HBM spotlight (interactive) -->
  <g class="interactive" data-card="controle-hbm" tabindex="0" role="button" aria-label="Zoom sur le contrôle HBM de décembre 2024">
    <rect x="96" y="524" width="1048" height="86" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="2"/>
    <text x="118" y="550" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B7332C">✦ ZOOM — 2 DÉCEMBRE 2024</text>
    <text x="118" y="574" class="body" font-size="13.5" font-weight="600" fill="#1A1A1A">La HBM entre dans le champ : toute mémoire &gt; 2 Go/s/mm² passe sous licence (ECCN 3A090.c)</text>
    <text x="118" y="596" class="body" font-size="11.5" fill="#5A5A5A">Le contrôle vise désormais un <tspan font-style="italic">composant</tspan>, pas un produit fini — et le BIS note que toute HBM en production dépasse ce seuil.</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="726" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : BIS / Federal Register 2024-2025 ; CRS R48642 ; CSIS ; BCG/SIA 2024. Jalons datés à titre indicatif ; le cadre AI Diffusion a été révisé en 2025.</text>
</svg>
