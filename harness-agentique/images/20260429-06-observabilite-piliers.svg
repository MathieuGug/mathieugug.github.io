<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-06">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Six piliers de l'observabilité agentique</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Ce que l'APM classique ne capture pas et que l'agent en production exige</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Central agent box -->
  <g>
    <rect x="500" y="365" width="200" height="80" rx="3" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="600" y="395" class="mono" font-size="9" letter-spacing="0.1em" fill="#FAF8F3" text-anchor="middle">SYSTÈME OBSERVÉ</text>
    <text x="600" y="420" class="display" font-size="16" font-weight="600" fill="#FAF8F3" text-anchor="middle">Agent en production</text>
    <text x="600" y="437" class="body" font-size="10" font-style="italic" fill="#B8B5AE" text-anchor="middle">multi-tour · multi-outils · multi-utilisateur</text>
  </g>

  <!-- Pillar 1: Traces (top-left) -->
  <g class="interactive" data-card="traces" tabindex="0" role="button" aria-label="Traces OpenTelemetry">
    <rect x="80" y="200" width="240" height="105" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="100" y="225" class="mono" font-size="9" letter-spacing="0.08em" fill="#5A5A5A">PILIER 1</text>
    <text x="100" y="248" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Traces</text>
    <text x="100" y="266" class="body" font-size="10" font-style="italic" fill="#5A5A5A">OpenTelemetry GenAI Semantic Conv.</text>
    <text x="100" y="283" class="body" font-size="10" fill="#5A5A5A">spans LLM · tool calls · embeddings</text>
    <text x="100" y="298" class="mono" font-size="9" fill="#B8B5AE">gen_ai.usage.prompt_tokens</text>
  </g>
  <line x1="320" y1="305" x2="500" y2="385" stroke="#1A1A1A" stroke-width="0.75"/>

  <!-- Pillar 2: Quality (top-mid) -->
  <g class="interactive" data-card="quality" tabindex="0" role="button" aria-label="Qualité LLM-as-Judge">
    <rect x="480" y="200" width="240" height="105" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="500" y="225" class="mono" font-size="9" letter-spacing="0.08em" fill="#B7332C">PILIER 2</text>
    <text x="500" y="248" class="display" font-size="16" font-weight="600" fill="#B7332C">Qualité</text>
    <text x="500" y="266" class="body" font-size="10" font-style="italic" fill="#5A5A5A">LLM-as-Judge online · scoring continu</text>
    <text x="500" y="283" class="body" font-size="10" fill="#5A5A5A">spot-checks · confidence scoring</text>
    <text x="500" y="298" class="mono" font-size="9" fill="#B8B5AE">Braintrust · Langfuse · Arize</text>
  </g>
  <line x1="600" y1="305" x2="600" y2="365" stroke="#B7332C" stroke-width="1.25"/>

  <!-- Pillar 3: Cost (top-right) -->
  <g class="interactive" data-card="cost" tabindex="0" role="button" aria-label="Token economics">
    <rect x="880" y="200" width="240" height="105" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="900" y="225" class="mono" font-size="9" letter-spacing="0.08em" fill="#5A5A5A">PILIER 3</text>
    <text x="900" y="248" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Coût</text>
    <text x="900" y="266" class="body" font-size="10" font-style="italic" fill="#5A5A5A">token economics · hard cap · kill-switch</text>
    <text x="900" y="283" class="body" font-size="10" fill="#5A5A5A">$ par session · par utilisateur · par cas</text>
    <text x="900" y="298" class="mono" font-size="9" fill="#B8B5AE">cost-per-successful-task</text>
  </g>
  <line x1="880" y1="305" x2="700" y2="385" stroke="#1A1A1A" stroke-width="0.75"/>

  <!-- Pillar 4: Drift (bottom-left) -->
  <g class="interactive" data-card="drift" tabindex="0" role="button" aria-label="Drift comportemental">
    <rect x="80" y="500" width="240" height="105" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="100" y="525" class="mono" font-size="9" letter-spacing="0.08em" fill="#5A5A5A">PILIER 4</text>
    <text x="100" y="548" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Drift</text>
    <text x="100" y="566" class="body" font-size="10" font-style="italic" fill="#5A5A5A">distribution shift · seuils adaptatifs</text>
    <text x="100" y="583" class="body" font-size="10" fill="#5A5A5A">comportemental · saisonnier · modèle</text>
    <text x="100" y="598" class="mono" font-size="9" fill="#B8B5AE">baseline dynamique vs J-7</text>
  </g>
  <line x1="320" y1="500" x2="500" y2="425" stroke="#1A1A1A" stroke-width="0.75"/>

  <!-- Pillar 5: Guardrails (bottom-mid) -->
  <g class="interactive" data-card="guardrails" tabindex="0" role="button" aria-label="Guardrails et politiques">
    <rect x="480" y="500" width="240" height="105" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="500" y="525" class="mono" font-size="9" letter-spacing="0.08em" fill="#B7332C">PILIER 5</text>
    <text x="500" y="548" class="display" font-size="16" font-weight="600" fill="#B7332C">Guardrails</text>
    <text x="500" y="566" class="body" font-size="10" font-style="italic" fill="#5A5A5A">PII · sécurité · scope · politiques</text>
    <text x="500" y="583" class="body" font-size="10" fill="#5A5A5A">violations → alerte critique (PagerDuty)</text>
    <text x="500" y="598" class="mono" font-size="9" fill="#B8B5AE">stop hooks · PostToolUse hooks</text>
  </g>
  <line x1="600" y1="500" x2="600" y2="445" stroke="#B7332C" stroke-width="1.25"/>

  <!-- Pillar 6: Audit (bottom-right) -->
  <g class="interactive" data-card="audit" tabindex="0" role="button" aria-label="Audit trail régulé">
    <rect x="880" y="500" width="240" height="105" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="900" y="525" class="mono" font-size="9" letter-spacing="0.08em" fill="#1F5560">PILIER 6</text>
    <text x="900" y="548" class="display" font-size="16" font-weight="600" fill="#1F5560">Audit trail</text>
    <text x="900" y="566" class="body" font-size="10" font-style="italic" fill="#5A5A5A">enregistrement immuable · réglementé</text>
    <text x="900" y="583" class="body" font-size="10" fill="#5A5A5A">données · raisonnement · approbation</text>
    <text x="900" y="598" class="mono" font-size="9" fill="#B8B5AE">SOC 2 · MiFID II · HDS · GDPR</text>
  </g>
  <line x1="880" y1="500" x2="700" y2="425" stroke="#1F5560" stroke-width="0.75"/>

  <!-- Surrounding context: alerts -->
  <text x="600" y="660" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A" text-anchor="middle">HIÉRARCHIE D'ALERTING — TROIS NIVEAUX</text>

  <g>
    <rect x="100" y="675" width="320" height="48" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <circle cx="120" cy="699" r="6" fill="#B7332C"/>
    <text x="135" y="694" class="body" font-size="11" font-weight="600" fill="#B7332C">Critique — action immédiate</text>
    <text x="135" y="710" class="body" font-size="9" font-style="italic" fill="#5A5A5A">guardrail violation · boucle infinie · halluc.</text>
    <text x="410" y="699" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">PagerDuty</text>
  </g>

  <g>
    <rect x="440" y="675" width="320" height="48" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <circle cx="460" cy="699" r="6" fill="#B58A2C"/>
    <text x="475" y="694" class="body" font-size="11" font-weight="600" fill="#B58A2C">Urgente — investigation &lt; 1 h</text>
    <text x="475" y="710" class="body" font-size="9" font-style="italic" fill="#5A5A5A">qualité &lt; seuil · latence P99 · tool failures</text>
    <text x="750" y="699" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">Slack · Teams</text>
  </g>

  <g>
    <rect x="780" y="675" width="320" height="48" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <circle cx="800" cy="699" r="6" fill="#1F5560"/>
    <text x="815" y="694" class="body" font-size="11" font-weight="600" fill="#1F5560">Surveillance — review hebdo</text>
    <text x="815" y="710" class="body" font-size="9" font-style="italic" fill="#5A5A5A">drift 7 j · coût +20% · nouveau pattern</text>
    <text x="1090" y="699" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">Email · dashboard</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="770" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : OpenTelemetry GenAI Semantic Conventions (CNCF, 2025) ; Coinbase Engineering (déc. 2025) ; Azure SRE Agent (Microsoft, 2026)</text>
  <text x="60" y="787" class="body" font-size="10" font-style="italic" fill="#B8B5AE">Méthodologie : référentiel des 6 piliers, agrégation des best practices observées sur 25+ déploiements production agentiques 2025-2026</text>
</svg>
