        <!-- 7 couches stackées en barres horizontales -->
        <rect x="0" y="0"  width="290" height="14" fill="#a83e55" fill-opacity="0.16" stroke="#a83e55" stroke-width="0.5"/>
        <text x="6" y="11" class="mono" font-size="9" font-weight="600" fill="#1e1e2a">MODÈLE</text>
        <text x="280" y="11" class="body" font-size="9" font-style="italic" fill="#6b6f7c" text-anchor="end">Opus · Sonnet · routing</text>

