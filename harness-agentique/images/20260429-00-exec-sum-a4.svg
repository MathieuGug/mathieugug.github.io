        <line x1="0" y1="62" x2="290" y2="62" stroke="#1e1e2a" stroke-width="0.5"/>
        <line x1="0" y1="6" x2="290" y2="6" stroke="rgba(30,30,42,0.10)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="0" y1="34" x2="290" y2="34" stroke="rgba(30,30,42,0.10)" stroke-width="0.5" stroke-dasharray="2,3"/>

