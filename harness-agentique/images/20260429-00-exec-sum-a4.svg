<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 1188" data-schema-id="schema-00" role="img" aria-labelledby="schema-00-title schema-00-desc">
  <title id="schema-00-title">Exec sum visuelle — Harness agentiques, 5 modèles mentaux</title>
  <desc id="schema-00-desc">Infographie A4 portrait. Cinq modèles mentaux à retenir : l'inversion modèle ↔ harness illustrée par la convergence SWE-bench et l'anatomie du harness ; le pattern GAN à trois agents (planner / generator / evaluator) ; les trois couches du marché avec exemples concrets (API, SDK, runtime managé) ; trois paliers d'investissement (POC, mid-complexity, multi-agents prod) ; la formule du ROI (volume + workflows répétables, illustrée par Azure SRE).</desc>

  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
    <marker id="arr-gan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F5D3F"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="840" height="1188" fill="#faf6ec"/>

