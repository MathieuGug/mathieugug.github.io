  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1e1e2a">Cinq modèles mentaux à retenir</text>
  <text x="60" y="128" class="display" font-size="15" font-style="italic" fill="#6b6f7c">Modèle banalisé, harness différenciant. L'inversion stratégique de 2026.</text>

  <line x1="60" y1="148" x2="780" y2="148" stroke="rgba(30,30,42,0.16)" stroke-width="1"/>

