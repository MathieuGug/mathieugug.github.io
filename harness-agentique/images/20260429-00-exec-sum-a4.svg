        <text x="6" y="43" class="mono" font-size="9" font-weight="600" fill="#1e1e2a">CONTEXTE</text>
        <text x="280" y="43" class="body" font-size="9" font-style="italic" fill="#6b6f7c" text-anchor="end">CLAUDE.md · compaction · wide tools</text>

        <rect x="0" y="48" width="290" height="14" fill="#a83e55" fill-opacity="0.10" stroke="#a83e55" stroke-width="0.5"/>
        <text x="6" y="59" class="mono" font-size="9" font-weight="600" fill="#1e1e2a">TOOLS · SANDBOX</text>
        <text x="280" y="59" class="body" font-size="9" font-style="italic" fill="#6b6f7c" text-anchor="end">MCP · code execution · file-based</text>

        <rect x="0" y="64" width="290" height="14" fill="#a83e55" fill-opacity="0.08" stroke="#a83e55" stroke-width="0.5"/>
        <text x="6" y="75" class="mono" font-size="9" font-weight="600" fill="#1e1e2a">MÉMOIRE</text>
        <text x="280" y="75" class="body" font-size="9" font-style="italic" fill="#6b6f7c" text-anchor="end">épisodique · sémantique · procédurale</text>

        <rect x="0" y="80" width="290" height="14" fill="#a83e55" fill-opacity="0.06" stroke="#a83e55" stroke-width="0.5"/>
        <text x="6" y="91" class="mono" font-size="9" font-weight="600" fill="#1e1e2a">HOOKS · GOUVERNANCE</text>
        <text x="280" y="91" class="body" font-size="9" font-style="italic" fill="#6b6f7c" text-anchor="end">approval · RBAC · audit</text>

        <rect x="0" y="96" width="290" height="14" fill="#a83e55" fill-opacity="0.04" stroke="#a83e55" stroke-width="0.5"/>
        <text x="6" y="107" class="mono" font-size="9" font-weight="600" fill="#1e1e2a">OBSERVABILITÉ</text>
        <text x="280" y="107" class="body" font-size="9" font-style="italic" fill="#6b6f7c" text-anchor="end">OTel GenAI · traces · cost</text>
      </g>

      <text x="0" y="160" class="body" font-size="9.5" font-style="italic" fill="#6b6f7c">Voir aussi : <tspan font-weight="600" fill="#a83e55">/coding-agents</tspan> · <tspan font-weight="600" fill="#a83e55">/agent-sdk</tspan> pour le détail Claude Code.</text>
