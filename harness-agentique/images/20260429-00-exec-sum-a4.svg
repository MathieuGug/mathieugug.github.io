      <text x="100" y="18" class="mono" font-size="10" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em" text-anchor="middle">PLANNER</text>
      <text x="100" y="36" class="display" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Étend le brief</text>
      <text x="100" y="52" class="body" font-size="10" font-style="italic" fill="#6b6f7c" text-anchor="middle">en spec produit</text>

      <rect x="230" y="0" width="200" height="62" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-width="1" rx="2"/>
      <text x="330" y="18" class="mono" font-size="10" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em" text-anchor="middle">GENERATOR</text>
      <text x="330" y="36" class="display" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Implémente</text>
      <text x="330" y="52" class="body" font-size="10" font-style="italic" fill="#6b6f7c" text-anchor="middle">par sprints</text>

