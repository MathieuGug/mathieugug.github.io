      <text x="14" y="32" class="body" font-size="11" fill="#1e1e2a"><tspan font-weight="600">20 min · 9 $</tspan> · livrables non fonctionnels</text>

      <rect x="340" y="0" width="320" height="40" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-width="0.5" rx="2"/>
      <text x="354" y="16" class="mono" font-size="9.5" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em">3 AGENTS GAN</text>
      <text x="354" y="32" class="body" font-size="11" fill="#1e1e2a"><tspan font-weight="600">6 h · 200 $</tspan> · app livrée + testée</text>
    </g>
