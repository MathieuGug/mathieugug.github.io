<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 1188" data-schema-id="schema-00" role="img" aria-labelledby="schema-00-title schema-00-desc">
  <title id="schema-00-title">Exec sum visuelle — Harness agentiques, 5 messages-clés</title>
  <desc id="schema-00-desc">Infographie A4 portrait. Cinq messages condensés : inversion modèle ↔ harness, architecture GAN à trois agents, marché restructuré en trois couches indépendantes, fourchettes coûts et durées mesurables, secteurs à plus fort ROI avec le cas Azure SRE Agent.</desc>

  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="840" height="1188" fill="#faf6ec"/>

  <!-- ============ HEADER ============ -->
  <text x="60" y="56" class="mono" font-size="12" font-weight="600" fill="#a83e55" letter-spacing="0.20em">HARNESS AGENTIQUES · 29 AVRIL 2026</text>
  <text x="60" y="100" class="display" font-size="34" font-weight="600" fill="#1e1e2a">Cinq messages-clés à retenir</text>
  <text x="60" y="128" class="display" font-size="16" font-style="italic" fill="#6b6f7c">Modèle banalisé, harness différenciant. L'inversion stratégique de 2026.</text>

  <line x1="60" y1="152" x2="780" y2="152" stroke="rgba(30,30,42,0.16)" stroke-width="1"/>

  <!-- ============ MSG 01 — L'inversion stratégique ============ -->
  <g>
    <circle cx="84" cy="200" r="20" fill="none" stroke="#a83e55" stroke-width="1.5"/>
    <text x="84" y="207" class="mono" font-size="15" font-weight="600" fill="#a83e55" text-anchor="middle">01</text>

    <text x="120" y="195" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">L'INVERSION</text>
    <text x="120" y="216" class="display" font-size="20" font-weight="600" fill="#1e1e2a">Modèles convergés, harness différenciant.</text>

    <!-- Bar chart : 6 modèles dans 1.3 pt sur SWE-bench Verified -->
    <g transform="translate(160, 248)">
      <!-- Y-axis -->
      <text x="-8" y="22" class="mono" font-size="9" fill="#9a9ca5" text-anchor="end">90</text>
      <text x="-8" y="62" class="mono" font-size="9" fill="#9a9ca5" text-anchor="end">80</text>
      <text x="-8" y="102" class="mono" font-size="9" fill="#9a9ca5" text-anchor="end">70</text>
      <text x="-32" y="62" class="mono" font-size="9" font-weight="600" fill="#6b6f7c" letter-spacing="0.14em" text-anchor="middle" transform="rotate(-90, -32, 62)">SWE-BENCH %</text>

      <line x1="0" y1="22" x2="0" y2="102" stroke="#1e1e2a" stroke-width="0.75"/>
      <line x1="-3" y1="22"  x2="0" y2="22"  stroke="#1e1e2a" stroke-width="0.75"/>
      <line x1="-3" y1="62"  x2="0" y2="62"  stroke="#1e1e2a" stroke-width="0.75"/>
      <line x1="-3" y1="102" x2="0" y2="102" stroke="#1e1e2a" stroke-width="0.75"/>

      <line x1="0" y1="22"  x2="565" y2="22"  stroke="rgba(30,30,42,0.12)" stroke-width="0.5" stroke-dasharray="2,3"/>
      <line x1="0" y1="62"  x2="565" y2="62"  stroke="rgba(30,30,42,0.10)" stroke-width="0.5" stroke-dasharray="2,3"/>
      <line x1="0" y1="102" x2="565" y2="102" stroke="#1e1e2a" stroke-width="0.75"/>

      <!-- Bars : Claude Opus 4.7 (87.6), GPT-5.3 (85), Opus 4.6 (80.8), Gemini 3.1 (80.6), MiniMax M2.5 (80.2), Sonnet 4.6 (79.6) -->
      <!-- Scale : 100% = y=22 (top), 70% = y=102 (bottom), 30 units span 80px → ratio 80/30 = 2.667 px per %  -->
      <!-- top y = 22 + (90 - pct) * 80/20  =>  let pct, 70 maps to 102, 90 maps to 22; span 20, range 80 -->
      <!-- formula : top_y = 22 + (90 - pct) * 4 -->
      <!-- 87.6 → 22 + 2.4*4 = 31.6 ; bar height = 102 - 31.6 = 70.4 -->
      <rect x="20"  y="31.6" width="78" height="70.4" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="1"/>
      <text x="59" y="22" class="mono" font-size="12" font-weight="600" fill="#1F5560" text-anchor="middle">87,6</text>
      <text x="59" y="116" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle">Opus 4.7</text>

      <!-- 85.0 → 22 + 5*4 = 42 ; bar h = 60 -->
      <rect x="115" y="42" width="78" height="60" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="1"/>
      <text x="154" y="32" class="mono" font-size="12" font-weight="600" fill="#1F5560" text-anchor="middle">85,0</text>
      <text x="154" y="116" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle">GPT-5.3</text>

      <!-- 80.8 → 22 + 9.2*4 = 58.8 ; bar h = 43.2 -->
      <rect x="210" y="58.8" width="78" height="43.2" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="1"/>
      <text x="249" y="48.8" class="mono" font-size="12" font-weight="600" fill="#1F5560" text-anchor="middle">80,8</text>
      <text x="249" y="116" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle">Opus 4.6</text>

      <!-- 80.6 → 59.6 ; h = 42.4 -->
      <rect x="305" y="59.6" width="78" height="42.4" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="1"/>
      <text x="344" y="49.6" class="mono" font-size="12" font-weight="600" fill="#1F5560" text-anchor="middle">80,6</text>
      <text x="344" y="116" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle">Gemini 3.1</text>

      <!-- 80.2 → 61.2 ; h = 40.8 -->
      <rect x="400" y="61.2" width="78" height="40.8" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="1"/>
      <text x="439" y="51.2" class="mono" font-size="12" font-weight="600" fill="#1F5560" text-anchor="middle">80,2</text>
      <text x="439" y="116" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle">MiniMax M2.5</text>

      <!-- 79.6 → 63.6 ; h = 38.4 -->
      <rect x="495" y="63.6" width="78" height="38.4" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="1"/>
      <text x="534" y="53.6" class="mono" font-size="12" font-weight="600" fill="#1F5560" text-anchor="middle">79,6</text>
      <text x="534" y="116" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle">Sonnet 4.6</text>

      <!-- Bracket / call-out "1.3 pt entre 6 modèles" -->
      <line x1="0" y1="138" x2="573" y2="138" stroke="#a83e55" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="286" y="153" class="mono" font-size="11" font-weight="600" fill="#a83e55" text-anchor="middle" letter-spacing="0.06em">1,3 PT D'ÉCART · 22 PT DE SCAFFOLD</text>
    </g>

    <!-- Encart scaffold -->
    <g transform="translate(120, 420)">
      <rect x="0" y="0" width="660" height="38" fill="#faf6ec" stroke="#a83e55" stroke-width="0.75"/>
      <text x="14" y="18" class="mono" font-size="10" font-weight="600" fill="#a83e55" letter-spacing="0.14em">SWE-BENCH PRO</text>
      <text x="14" y="32" class="body" font-size="11.5" fill="#1e1e2a">Sur le même modèle, jusqu'à 22 points d'écart entre scaffold basique et scaffold optimisé.</text>
    </g>
  </g>

  <!-- ============ MSG 02 — Architecture GAN ============ -->
  <g>
    <line x1="60" y1="486" x2="780" y2="486" stroke="rgba(30,30,42,0.10)" stroke-width="0.75" stroke-dasharray="3,4"/>

    <circle cx="84" cy="522" r="20" fill="none" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="84" y="529" class="mono" font-size="15" font-weight="600" fill="#2F5D3F" text-anchor="middle">02</text>

    <text x="120" y="517" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em">ARCHITECTURE GAN</text>
    <text x="120" y="538" class="display" font-size="20" font-weight="600" fill="#1e1e2a">Planner / Generator / Evaluator.</text>

    <!-- Trois cartes -->
    <g transform="translate(120, 558)">
      <rect x="0" y="0" width="210" height="76" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-width="1.25" rx="2"/>
      <text x="105" y="22" class="mono" font-size="10" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em" text-anchor="middle">PLANNER</text>
      <text x="105" y="44" class="display" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">Étend le brief</text>
      <text x="105" y="62" class="body" font-size="10" font-style="italic" fill="#6b6f7c" text-anchor="middle">en spec produit</text>

      <rect x="225" y="0" width="210" height="76" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-width="1.25" rx="2"/>
      <text x="330" y="22" class="mono" font-size="10" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em" text-anchor="middle">GENERATOR</text>
      <text x="330" y="44" class="display" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">Implémente</text>
      <text x="330" y="62" class="body" font-size="10" font-style="italic" fill="#6b6f7c" text-anchor="middle">par sprints</text>

      <rect x="450" y="0" width="210" height="76" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-width="1.25" rx="2"/>
      <text x="555" y="22" class="mono" font-size="10" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em" text-anchor="middle">EVALUATOR</text>
      <text x="555" y="44" class="display" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">Teste, critique</text>
      <text x="555" y="62" class="body" font-size="10" font-style="italic" fill="#6b6f7c" text-anchor="middle">via Playwright MCP</text>

      <!-- Flèches -->
      <path d="M210,38 L225,38" stroke="#2F5D3F" stroke-width="1.25" marker-end="url(#arr-02)"/>
      <path d="M435,38 L450,38" stroke="#2F5D3F" stroke-width="1.25" marker-end="url(#arr-02)"/>
    </g>

    <defs>
      <marker id="arr-02" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F5D3F"/>
      </marker>
    </defs>

    <!-- Comparison numbers -->
    <g transform="translate(120, 648)">
      <rect x="0" y="0" width="320" height="48" fill="#a83e55" fill-opacity="0.08" stroke="#a83e55" stroke-width="0.75" rx="2"/>
      <text x="14" y="18" class="mono" font-size="10" font-weight="600" fill="#a83e55" letter-spacing="0.10em">MONO-AGENT</text>
      <text x="14" y="38" class="body" font-size="13" fill="#1e1e2a"><tspan font-weight="600">20 min · 9 $</tspan> · livrables non fonctionnels</text>

      <rect x="340" y="0" width="320" height="48" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-width="0.75" rx="2"/>
      <text x="354" y="18" class="mono" font-size="10" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em">3 AGENTS</text>
      <text x="354" y="38" class="body" font-size="13" fill="#1e1e2a"><tspan font-weight="600">6 h · 200 $</tspan> · application livrée + testée</text>
    </g>
  </g>

  <!-- ============ MSG 03 — Marché en 3 couches ============ -->
  <g>
    <line x1="60" y1="724" x2="780" y2="724" stroke="rgba(30,30,42,0.10)" stroke-width="0.75" stroke-dasharray="3,4"/>

    <circle cx="84" cy="760" r="20" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="84" y="767" class="mono" font-size="15" font-weight="600" fill="#1F5560" text-anchor="middle">03</text>

    <text x="120" y="755" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.14em">TROIS COUCHES</text>
    <text x="120" y="776" class="display" font-size="20" font-weight="600" fill="#1e1e2a">Le marché s'est restructuré.</text>

    <!-- Stack 3 couches -->
    <g transform="translate(120, 796)">
      <rect x="0" y="0"  width="540" height="28" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1" rx="2"/>
      <text x="270" y="19" class="display" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">RUNTIME MANAGÉ</text>
      <text x="555" y="19" class="body" font-size="10" font-style="italic" fill="#6b6f7c">scale, ops</text>

      <rect x="0" y="32" width="540" height="28" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1" rx="2"/>
      <text x="270" y="51" class="display" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">SDK · HARNESS</text>
      <text x="555" y="51" class="body" font-size="10" font-style="italic" fill="#6b6f7c">opinion, perf</text>

      <rect x="0" y="64" width="540" height="28" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-width="1" rx="2"/>
      <text x="270" y="83" class="display" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">API · PRIMITIVES</text>
      <text x="555" y="83" class="body" font-size="10" font-style="italic" fill="#6b6f7c">capacité brute</text>

      <!-- Noyau protocolaire transverse -->
      <rect x="0" y="100" width="540" height="22" fill="#a83e55" fill-opacity="0.10" stroke="#a83e55" stroke-width="0.75" stroke-dasharray="3,2" rx="2"/>
      <text x="270" y="115" class="mono" font-size="10" font-weight="600" fill="#a83e55" text-anchor="middle" letter-spacing="0.10em">MCP · A2A · LINUX FOUNDATION (DÉC. 2025)</text>
    </g>
  </g>

  <!-- ============ MSG 04 — Coûts mesurables ============ -->
  <g>
    <line x1="60" y1="938" x2="780" y2="938" stroke="rgba(30,30,42,0.10)" stroke-width="0.75" stroke-dasharray="3,4"/>

    <circle cx="84" cy="974" r="20" fill="none" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="84" y="981" class="mono" font-size="15" font-weight="600" fill="#B58A2C" text-anchor="middle">04</text>

    <text x="120" y="969" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.14em">COÛTS · DURÉES</text>
    <text x="120" y="990" class="display" font-size="20" font-weight="600" fill="#1e1e2a">Trois paliers mesurables.</text>

    <!-- 3 paliers -->
    <g transform="translate(120, 1010)">
      <rect x="0" y="0" width="210" height="62" fill="#B58A2C" fill-opacity="0.12" stroke="#B58A2C" stroke-width="1" rx="2"/>
      <text x="105" y="18" class="mono" font-size="10" font-weight="600" fill="#B58A2C" letter-spacing="0.10em" text-anchor="middle">POC SIMPLE</text>
      <text x="105" y="38" class="display" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">50 k$</text>
      <text x="105" y="56" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">4–8 semaines</text>

      <rect x="225" y="0" width="210" height="62" fill="#B58A2C" fill-opacity="0.18" stroke="#B58A2C" stroke-width="1" rx="2"/>
      <text x="330" y="18" class="mono" font-size="10" font-weight="600" fill="#B58A2C" letter-spacing="0.10em" text-anchor="middle">MID-COMPLEXITY</text>
      <text x="330" y="38" class="display" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">150–300 k$</text>
      <text x="330" y="56" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">3–5 mois</text>

      <rect x="450" y="0" width="210" height="62" fill="#B58A2C" fill-opacity="0.24" stroke="#B58A2C" stroke-width="1" rx="2"/>
      <text x="555" y="18" class="mono" font-size="10" font-weight="600" fill="#B58A2C" letter-spacing="0.10em" text-anchor="middle">MULTI-AGENTS PROD</text>
      <text x="555" y="38" class="display" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">500 k–2 M+ $</text>
      <text x="555" y="56" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">6–12 mois</text>
    </g>

    <text x="450" y="1092" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">Data + intégration capture 60-75 % de l'effort total.</text>
  </g>

  <!-- ============ MSG 05 — Secteurs ROI + Azure SRE ============ -->
  <g>
    <line x1="60" y1="1104" x2="780" y2="1104" stroke="rgba(30,30,42,0.10)" stroke-width="0.75" stroke-dasharray="3,4"/>

    <circle cx="84" cy="1140" r="20" fill="none" stroke="#a83e55" stroke-width="1.5"/>
    <text x="84" y="1147" class="mono" font-size="15" font-weight="600" fill="#a83e55" text-anchor="middle">05</text>

    <text x="120" y="1135" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">SECTEURS · CAS</text>
    <text x="120" y="1156" class="display" font-size="18" font-weight="600" fill="#1e1e2a">Volume + workflows répétables · <tspan class="body" font-size="13" font-weight="400" font-style="italic" fill="#6b6f7c">Azure SRE Agent : MTTR 40,5 h → 3 min.</tspan></text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="1180" x2="780" y2="1180" stroke="rgba(30,30,42,0.16)" stroke-width="1"/>
</svg>
