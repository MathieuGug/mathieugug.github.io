        <text x="6" y="27" class="mono" font-size="9" font-weight="600" fill="#1e1e2a">BOUCLE TAOR</text>
        <text x="280" y="27" class="body" font-size="9" font-style="italic" fill="#6b6f7c" text-anchor="end">Think · Act · Observe · Repeat</text>

