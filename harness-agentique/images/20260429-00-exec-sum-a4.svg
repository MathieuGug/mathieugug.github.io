      <text x="560" y="36" class="display" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Teste, critique</text>
      <text x="560" y="52" class="body" font-size="10" font-style="italic" fill="#6b6f7c" text-anchor="middle">via Playwright MCP</text>

