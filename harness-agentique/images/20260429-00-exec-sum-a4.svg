        <text x="73.5" y="16" class="mono" font-size="9" font-weight="600" fill="#1F5560" text-anchor="middle">85,0</text>
        <text x="73.5" y="74" class="body" font-size="7.5" fill="#6b6f7c" text-anchor="middle">GPT-5.3</text>
        <!-- 80.8 → 31.8, h=30.2 -->
        <rect x="102" y="31.8" width="35" height="30.2" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="0.75"/>
        <text x="119.5" y="28" class="mono" font-size="9" font-weight="600" fill="#1F5560" text-anchor="middle">80,8</text>
        <text x="119.5" y="74" class="body" font-size="7.5" fill="#6b6f7c" text-anchor="middle">Opus 4.6</text>
        <!-- 80.6 → 32.3, h=29.7 -->
        <rect x="148" y="32.3" width="35" height="29.7" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="0.75"/>
        <text x="165.5" y="28" class="mono" font-size="9" font-weight="600" fill="#1F5560" text-anchor="middle">80,6</text>
        <text x="165.5" y="74" class="body" font-size="7.5" fill="#6b6f7c" text-anchor="middle">Gemini 3.1</text>
        <!-- 80.2 → 33.4, h=28.6 -->
        <rect x="194" y="33.4" width="35" height="28.6" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="0.75"/>
        <text x="211.5" y="28" class="mono" font-size="9" font-weight="600" fill="#1F5560" text-anchor="middle">80,2</text>
        <text x="211.5" y="74" class="body" font-size="7.5" fill="#6b6f7c" text-anchor="middle">MiniMax</text>
        <!-- 79.6 → 35.1, h=26.9 -->
        <rect x="240" y="35.1" width="35" height="26.9" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="0.75"/>
        <text x="257.5" y="31" class="mono" font-size="9" font-weight="600" fill="#1F5560" text-anchor="middle">79,6</text>
        <text x="257.5" y="74" class="body" font-size="7.5" fill="#6b6f7c" text-anchor="middle">Sonnet 4.6</text>

        <!-- Bracket -->
        <line x1="0" y1="86" x2="290" y2="86" stroke="#a83e55" stroke-width="0.75" stroke-dasharray="2,2"/>
        <text x="145" y="98" class="mono" font-size="9" font-weight="600" fill="#a83e55" text-anchor="middle" letter-spacing="0.04em">22 PT D'ÉCART DE SCAFFOLD · MÊME MODÈLE</text>
