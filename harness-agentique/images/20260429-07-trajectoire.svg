<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-07">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Trajectoire 2026–2027 : trois pistes parallèles</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Technologie · régulation · adoption — jalons sur 18 mois, lecture de gauche à droite</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Time axis (horizontal) at top -->
  <text x="60" y="180" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A">TIMELINE</text>
  <line x1="180" y1="195" x2="1130" y2="195" stroke="#1A1A1A" stroke-width="0.75"/>

  <!-- Quarter ticks: Q2-26, Q3-26, Q4-26, Q1-27, Q2-27, Q3-27, Q4-27 -->
  <line x1="180" y1="190" x2="180" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="180" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">Q2 2026</text>

  <line x1="338" y1="190" x2="338" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="338" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">Q3 2026</text>

  <line x1="496" y1="190" x2="496" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="496" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">Q4 2026</text>

  <line x1="654" y1="190" x2="654" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="654" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">Q1 2027</text>

  <line x1="812" y1="190" x2="812" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="812" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">Q2 2027</text>

  <line x1="970" y1="190" x2="970" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="970" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">Q3 2027</text>

  <line x1="1128" y1="190" x2="1128" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="1128" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">Q4 2027</text>

  <!-- "Now" marker -->
  <line x1="180" y1="235" x2="180" y2="700" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="3 3" opacity="0.5"/>
  <text x="180" y="248" class="mono" font-size="9" font-weight="600" letter-spacing="0.08em" fill="#B7332C" text-anchor="middle">AUJOURD'HUI</text>

  <!-- ============================================================ -->
  <!-- TRACK 1: TECHNOLOGIE — carmine -->
  <!-- ============================================================ -->
  <text x="60" y="285" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B7332C">PISTE 01 · TECHNOLOGIE</text>
  <text x="60" y="305" class="display" font-size="14" fill="#1A1A1A">Maturation des protocoles, agents longue durée, baisse coût/token</text>

  <!-- Track 1 base line -->
  <line x1="180" y1="360" x2="1128" y2="360" stroke="#B7332C" stroke-width="1.5" opacity="0.3"/>

  <!-- Milestone T1: Standardisation MCP (Q2 2026) -->
  <g data-region-id="tech-mcp">
    <circle cx="180" cy="360" r="8" fill="#B7332C" stroke="#FAF8F3" stroke-width="2"/>
    <line x1="180" y1="368" x2="180" y2="395" stroke="#B7332C" stroke-width="0.75"/>
    <text x="180" y="412" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">MCP</text>
    <text x="180" y="426" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">standardisé</text>
    <text x="180" y="438" class="mono" font-size="8" fill="#B7332C" text-anchor="middle">v1.0</text>
  </g>

  <!-- Milestone T2: A2A maturation (Q4 2026) -->
  <g data-region-id="tech-a2a">
    <circle cx="496" cy="360" r="8" fill="#B7332C" stroke="#FAF8F3" stroke-width="2"/>
    <line x1="496" y1="368" x2="496" y2="395" stroke="#B7332C" stroke-width="0.75"/>
    <text x="496" y="412" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">A2A + x402</text>
    <text x="496" y="426" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">interop. inter-agents</text>
    <text x="496" y="438" class="mono" font-size="8" fill="#B7332C" text-anchor="middle">paiements machine</text>
  </g>

  <!-- Milestone T3: Foundation models gen+1 (Q1 2027) -->
  <g data-region-id="tech-models">
    <circle cx="654" cy="360" r="8" fill="#B7332C" stroke="#FAF8F3" stroke-width="2"/>
    <line x1="654" y1="368" x2="654" y2="395" stroke="#B7332C" stroke-width="0.75"/>
    <text x="654" y="412" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Modèles gen+1</text>
    <text x="654" y="426" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">contexte 10M+ tokens</text>
    <text x="654" y="438" class="mono" font-size="8" fill="#B7332C" text-anchor="middle">−40 % coût/token</text>
  </g>

  <!-- Milestone T4: Long-running agents (Q3 2027) -->
  <g data-region-id="tech-longrun">
    <circle cx="970" cy="360" r="8" fill="#B7332C" stroke="#FAF8F3" stroke-width="2"/>
    <line x1="970" y1="368" x2="970" y2="395" stroke="#B7332C" stroke-width="0.75"/>
    <text x="970" y="412" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Agents 24h+</text>
    <text x="970" y="426" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">missions multi-jours</text>
    <text x="970" y="438" class="mono" font-size="8" fill="#B7332C" text-anchor="middle">supervision asynch.</text>
  </g>

  <!-- ============================================================ -->
  <!-- TRACK 2: RÉGULATION — teal -->
  <!-- ============================================================ -->
  <text x="60" y="475" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1F5560">PISTE 02 · RÉGULATION</text>
  <text x="60" y="495" class="display" font-size="14" fill="#1A1A1A">AI Act, ISO 42001, responsabilité civile algorithmique</text>

  <!-- Track 2 base line -->
  <line x1="180" y1="540" x2="1128" y2="540" stroke="#1F5560" stroke-width="1.5" opacity="0.3"/>

  <!-- Milestone R1: AI Act GPAI (Q3 2026) -->
  <g data-region-id="reg-gpai">
    <circle cx="338" cy="540" r="8" fill="#1F5560" stroke="#FAF8F3" stroke-width="2"/>
    <line x1="338" y1="548" x2="338" y2="575" stroke="#1F5560" stroke-width="0.75"/>
    <text x="338" y="592" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">AI Act</text>
    <text x="338" y="606" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">obligations GPAI</text>
    <text x="338" y="618" class="mono" font-size="8" fill="#1F5560" text-anchor="middle">+ codes de pratique</text>
  </g>

  <!-- Milestone R2: ISO 42001 généralisée (Q4 2026) -->
  <g data-region-id="reg-iso42001">
    <circle cx="496" cy="540" r="8" fill="#1F5560" stroke="#FAF8F3" stroke-width="2"/>
    <line x1="496" y1="548" x2="496" y2="575" stroke="#1F5560" stroke-width="0.75"/>
    <text x="496" y="592" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">ISO 42001</text>
    <text x="496" y="606" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">attendu en RFP</text>
    <text x="496" y="618" class="mono" font-size="8" fill="#1F5560" text-anchor="middle">RGPD-compatible</text>
  </g>

  <!-- Milestone R3: AI Liability Directive (Q2 2027) -->
  <g data-region-id="reg-liability">
    <circle cx="812" cy="540" r="8" fill="#1F5560" stroke="#FAF8F3" stroke-width="2"/>
    <line x1="812" y1="548" x2="812" y2="575" stroke="#1F5560" stroke-width="0.75"/>
    <text x="812" y="592" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Responsabilité IA</text>
    <text x="812" y="606" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">cadres clarifiés</text>
    <text x="812" y="618" class="mono" font-size="8" fill="#1F5560" text-anchor="middle">audit trail = preuve</text>
  </g>

  <!-- Milestone R4: AI Act high-risk full enforcement (Q3 2027) -->
  <g data-region-id="reg-highrisk">
    <circle cx="970" cy="540" r="8" fill="#1F5560" stroke="#FAF8F3" stroke-width="2"/>
    <line x1="970" y1="548" x2="970" y2="575" stroke="#1F5560" stroke-width="0.75"/>
    <text x="970" y="592" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Haut risque</text>
    <text x="970" y="606" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">application pleine</text>
    <text x="970" y="618" class="mono" font-size="8" fill="#1F5560" text-anchor="middle">conformité ex ante</text>
  </g>

  <!-- ============================================================ -->
  <!-- TRACK 3: ADOPTION — mustard -->
  <!-- ============================================================ -->
  <text x="60" y="660" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B58A2C">PISTE 03 · ADOPTION</text>
  <text x="60" y="680" class="display" font-size="14" fill="#1A1A1A">Du POC à la production de masse, ROI mesurable, plateau de réalité</text>

  <!-- Track 3 base line -->
  <line x1="180" y1="725" x2="1128" y2="725" stroke="#B58A2C" stroke-width="1.5" opacity="0.3"/>

  <!-- Milestone A1: 10% CAC40 en prod (Q4 2026) -->
  <g data-region-id="adopt-cac40">
    <circle cx="496" cy="725" r="8" fill="#B58A2C" stroke="#FAF8F3" stroke-width="2"/>
    <text x="496" y="710" class="mono" font-size="8" fill="#B58A2C" text-anchor="middle">≥ 10 % CAC40</text>
    <text x="496" y="700" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Prod à l'échelle</text>
  </g>

  <!-- Milestone A2: Audit social premier (Q1 2027) -->
  <g data-region-id="adopt-social">
    <circle cx="654" cy="725" r="8" fill="#B58A2C" stroke="#FAF8F3" stroke-width="2"/>
    <text x="654" y="710" class="mono" font-size="8" fill="#B58A2C" text-anchor="middle">CSE + IRP</text>
    <text x="654" y="700" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Audit social</text>
  </g>

  <!-- Milestone A3: ROI démontré (Q2 2027) -->
  <g data-region-id="adopt-roi">
    <circle cx="812" cy="725" r="8" fill="#B58A2C" stroke="#FAF8F3" stroke-width="2"/>
    <text x="812" y="710" class="mono" font-size="8" fill="#B58A2C" text-anchor="middle">EBITDA +12-14 pts</text>
    <text x="812" y="700" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">ROI consolidé</text>
  </g>

  <!-- Milestone A4: Plateau de productivité (Q4 2027) -->
  <g data-region-id="adopt-plateau">
    <circle cx="1128" cy="725" r="8" fill="#B58A2C" stroke="#FAF8F3" stroke-width="2"/>
    <text x="1128" y="710" class="mono" font-size="8" fill="#B58A2C" text-anchor="middle">Gartner — pente</text>
    <text x="1128" y="700" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Plateau réalité</text>
  </g>

  <!-- ============================================================ -->
  <!-- LEGEND / CALLOUT BOX (right) -->
  <!-- ============================================================ -->
  <rect x="60" y="755" width="1080" height="38" fill="none" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="778" class="display" font-size="12" font-style="italic" fill="#1A1A1A">
    Lecture combinée : la fenêtre <tspan font-weight="600" fill="#B7332C">Q4 2026 – Q2 2027</tspan> concentre le passage à l'échelle technique, la pression réglementaire et la preuve commerciale.
  </text>

</svg>
