<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-05">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Effort de développement : trois trajectoires types</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Durée · profil d'équipe · enveloppe coût · run cost — repères médians 2026</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Timeline axis at top -->
  <text x="60" y="180" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A">DURÉE (semaines)</text>
  <line x1="240" y1="195" x2="1100" y2="195" stroke="#1A1A1A" stroke-width="0.75"/>
  <!-- Tick marks at 4, 8, 12, 16, 20, 24, 36, 48 -->
  <line x1="240" y1="190" x2="240" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="240" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">0</text>
  <line x1="350" y1="190" x2="350" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="350" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">8</text>
  <line x1="500" y1="190" x2="500" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="500" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">20</text>
  <line x1="650" y1="190" x2="650" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="650" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">32</text>
  <line x1="800" y1="190" x2="800" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="800" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">44</text>
  <line x1="1100" y1="190" x2="1100" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="1100" y="215" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">52+</text>

  <!-- Grid lines vertical -->
  <line x1="350" y1="240" x2="350" y2="610" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="500" y1="240" x2="500" y2="610" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="650" y1="240" x2="650" y2="610" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="800" y1="240" x2="800" y2="610" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="1 4"/>

  <!-- Trajectory A: POC -->
  <g class="interactive" data-card="trajectory-a" tabindex="0" role="button" aria-label="Trajectoire POC">
    <rect x="60" y="245" width="170" height="100" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="75" y="268" class="mono" font-size="9" letter-spacing="0.1em" fill="#B7332C">TRAJECTOIRE A</text>
    <text x="75" y="288" class="display" font-size="16" font-weight="600" fill="#1A1A1A">POC</text>
    <text x="75" y="307" class="body" font-size="10" font-style="italic" fill="#5A5A5A">FAQ · single-task</text>
    <text x="75" y="325" class="body" font-size="11" fill="#1A1A1A">2-3 personnes</text>
    <text x="75" y="340" class="mono" font-size="11" font-weight="600" fill="#B7332C">50–100 k€</text>
  </g>
  <!-- Trajectory A bar (4-8 weeks) -->
  <rect x="240" y="265" width="105" height="50" rx="3" fill="#1A1A1A" fill-opacity="0.08" stroke="#1A1A1A" stroke-width="1"/>
  <text x="293" y="295" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">build POC</text>
  <text x="293" y="332" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">4 → 8 sem</text>

  <!-- Trajectory B: Mid-complexity -->
  <g class="interactive" data-card="trajectory-b" tabindex="0" role="button" aria-label="Trajectoire mid complexity">
    <rect x="60" y="365" width="170" height="100" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="75" y="388" class="mono" font-size="9" letter-spacing="0.1em" fill="#B7332C">TRAJECTOIRE B</text>
    <text x="75" y="408" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Mid-complexity</text>
    <text x="75" y="427" class="body" font-size="10" font-style="italic" fill="#5A5A5A">RAG + intégrations</text>
    <text x="75" y="445" class="body" font-size="11" fill="#1A1A1A">4-6 personnes</text>
    <text x="75" y="460" class="mono" font-size="11" font-weight="600" fill="#B7332C">150–300 k€</text>
  </g>
  <!-- Trajectory B bar (12-20 weeks) -->
  <rect x="240" y="385" width="270" height="50" rx="3" fill="#B7332C" fill-opacity="0.15" stroke="#B7332C" stroke-width="1.25"/>
  <text x="375" y="415" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">discovery → build → mise en prod</text>
  <text x="375" y="452" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">12 → 20 sem</text>

  <!-- Trajectory C: Multi-agent prod -->
  <g class="interactive" data-card="trajectory-c" tabindex="0" role="button" aria-label="Trajectoire multi-agent production">
    <rect x="60" y="485" width="170" height="115" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="2.5"/>
    <text x="75" y="508" class="mono" font-size="9" letter-spacing="0.1em" fill="#B7332C">TRAJECTOIRE C</text>
    <text x="75" y="528" class="display" font-size="16" font-weight="600" fill="#B7332C">Multi-agent prod</text>
    <text x="75" y="547" class="body" font-size="10" font-style="italic" fill="#5A5A5A">SRE-class · trading</text>
    <text x="75" y="565" class="body" font-size="11" fill="#1A1A1A">8-15 personnes</text>
    <text x="75" y="580" class="mono" font-size="11" font-weight="600" fill="#B7332C">500 k€ – 2 M€+</text>
    <text x="75" y="595" class="body" font-size="9" font-style="italic" fill="#B7332C">+ compliance officer</text>
  </g>
  <!-- Trajectory C bar (24-52+ weeks) -->
  <rect x="240" y="515" width="860" height="50" rx="3" fill="#B7332C" fill-opacity="0.25" stroke="#B7332C" stroke-width="2"/>
  <text x="475" y="540" class="body" font-size="11" font-weight="500" fill="#1A1A1A">discovery</text>
  <text x="650" y="540" class="body" font-size="11" font-weight="500" fill="#1A1A1A">build itératif</text>
  <text x="850" y="540" class="body" font-size="11" font-weight="500" fill="#1A1A1A">durcissement &amp; passage à l'échelle</text>
  <text x="1015" y="540" class="body" font-size="11" font-weight="500" fill="#1A1A1A">run + tuning</text>
  <text x="475" y="585" class="mono" font-size="9" fill="#5A5A5A">24+ sem</text>

  <!-- Effort breakdown bottom -->
  <text x="60" y="650" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A">DISTRIBUTION DE L'EFFORT (build, médian, % du total)</text>

  <g class="interactive" data-card="effort-data" tabindex="0" role="button" aria-label="Effort données">
    <rect x="60" y="665" width="245" height="65" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="75" y="688" class="display" font-size="14" font-weight="600" fill="#B58A2C">Préparation des données</text>
    <text x="75" y="708" class="mono" font-size="20" font-weight="600" fill="#B58A2C">60–75 %</text>
    <text x="180" y="708" class="body" font-size="10" font-style="italic" fill="#5A5A5A">indexation · clean · validation</text>
  </g>

  <g class="interactive" data-card="effort-integ" tabindex="0" role="button" aria-label="Intégration et QA">
    <rect x="320" y="665" width="245" height="65" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="335" y="688" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Intégration + QA</text>
    <text x="335" y="708" class="mono" font-size="20" font-weight="600" fill="#1A1A1A">40–60 %</text>
    <text x="440" y="708" class="body" font-size="10" font-style="italic" fill="#5A5A5A">CRM · ERP · API métier · tests</text>
  </g>

  <g class="interactive" data-card="effort-safety" tabindex="0" role="button" aria-label="Safety et guardrails">
    <rect x="580" y="665" width="245" height="65" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="595" y="688" class="display" font-size="14" font-weight="600" fill="#B7332C">Safety / guardrails</text>
    <text x="595" y="708" class="mono" font-size="20" font-weight="600" fill="#B7332C">+20–30 %</text>
    <text x="700" y="708" class="body" font-size="10" font-style="italic" fill="#5A5A5A">validation · HITL · audit log</text>
  </g>

  <g class="interactive" data-card="run-cost" tabindex="0" role="button" aria-label="Coûts récurrents">
    <rect x="840" y="665" width="260" height="65" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="855" y="688" class="display" font-size="14" font-weight="600" fill="#1F5560">Coût mensuel run</text>
    <text x="855" y="708" class="mono" font-size="16" font-weight="600" fill="#1F5560">3,2 – 13 k$</text>
    <text x="855" y="722" class="body" font-size="9" font-style="italic" fill="#5A5A5A">tokens · infra · monitoring · tuning</text>
  </g>

  <!-- Annotations -->
  <text x="475" y="245" class="body" font-size="9" font-style="italic" fill="#B8B5AE" text-anchor="middle">les chiffres sont des médians ; la variance ±50% est normale selon contexte client</text>

  <!-- Footer -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="770" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Azilen « AI Agent Development Cost 2026 », TechCloudPro Enterprise Cost Guide, McKinsey AI workforce</text>
  <text x="60" y="787" class="body" font-size="10" font-style="italic" fill="#B8B5AE">Méthodologie : médianes calibrées sur 50+ projets agentiques 2025-2026 ; valeurs centrales hors cas extrêmes (high-end finance, big tech)</text>
</svg>
