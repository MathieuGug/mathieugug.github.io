<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" data-schema-id="schema-01" role="img" aria-label="Schéma 01 — Trois régimes de coding assistance">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive:focus { outline: none; }
      .interactive:hover .col-card { filter: brightness(0.98); }
    </style>
    <marker id="arrow-carmine" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="850" fill="#FAF8F3"/>

  <!-- ========= HEADER STRIP ========= -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="1.76" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.25" fill="#1A1A1A">Trois régimes : autocomplete · assistant IDE · coding agent</text>
  <text x="60" y="116" class="display" font-style="italic" font-size="16" fill="#5A5A5A">Quatre dimensions séparent l’aide-à-la-frappe d’un agent qui livre une PR.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ========= ROW LABELS (left gutter) ========= -->
  <!-- Row Y centers : 220 (Contexte), 340 (Interaction), 460 (Boucle), 580 (Livrable) -->
  <text x="60" y="222" class="mono" font-size="12" font-weight="600" letter-spacing="1.6" fill="#B7332C">CONTEXTE</text>
  <text x="60" y="342" class="mono" font-size="12" font-weight="600" letter-spacing="1.6" fill="#B7332C">INTERACTION</text>
  <text x="60" y="462" class="mono" font-size="12" font-weight="600" letter-spacing="1.6" fill="#B7332C">BOUCLE</text>
  <text x="60" y="582" class="mono" font-size="12" font-weight="600" letter-spacing="1.6" fill="#B7332C">LIVRABLE</text>

  <!-- Hairline rules between rows -->
  <line x1="240" y1="265" x2="1140" y2="265" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="240" y1="385" x2="1140" y2="385" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="240" y1="505" x2="1140" y2="505" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="240" y1="625" x2="1140" y2="625" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ========= COLUMN 1 — AUTOCOMPLETE (teal, soft) ========= -->
  <g class="interactive" data-card="regime-autocomplete" tabindex="0" role="button" aria-label="Régime autocomplete : aide à la frappe en buffer courant, livrable en tokens.">
    <rect class="col-card" x="260" y="160" width="280" height="70" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25" opacity="0.85"/>
    <text x="278" y="190" class="mono" font-size="12" font-weight="600" letter-spacing="1.6" fill="#1F5560">RÉGIME 01</text>
    <text x="278" y="215" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Autocomplete</text>

    <!-- Cells -->
    <text x="278" y="298" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Buffer courant</text>
    <text x="278" y="316" class="body" font-size="13" fill="#5A5A5A">curseur, lignes voisines</text>

    <text x="278" y="418" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Caret + Tab</text>
    <text x="278" y="436" class="body" font-size="13" fill="#5A5A5A">acceptation muette</text>

    <text x="278" y="538" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Secondes</text>
    <text x="278" y="556" class="body" font-size="13" fill="#5A5A5A">latence sub-300 ms</text>

    <text x="278" y="658" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Tokens</text>
    <text x="278" y="676" class="body" font-size="13" fill="#5A5A5A">complétion d’expression</text>
  </g>

  <!-- ========= COLUMN 2 — ASSISTANT IDE (teal, full) ========= -->
  <g class="interactive" data-card="regime-ide" tabindex="0" role="button" aria-label="Régime assistant IDE : conversation en fichier ouvert, livrable en fonction.">
    <rect class="col-card" x="560" y="160" width="280" height="70" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="578" y="190" class="mono" font-size="12" font-weight="600" letter-spacing="1.6" fill="#1F5560">RÉGIME 02</text>
    <text x="578" y="215" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Assistant IDE</text>

    <text x="578" y="298" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Fichier ouvert</text>
    <text x="578" y="316" class="body" font-size="13" fill="#5A5A5A">+ pile d’onglets, sélection</text>

    <text x="578" y="418" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Question / réponse</text>
    <text x="578" y="436" class="body" font-size="13" fill="#5A5A5A">prompt + diff proposé</text>

    <text x="578" y="538" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Minutes</text>
    <text x="578" y="556" class="body" font-size="13" fill="#5A5A5A">aller-retour côte-à-côte</text>

    <text x="578" y="658" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Fonction / snippet</text>
    <text x="578" y="676" class="body" font-size="13" fill="#5A5A5A">refacto local, bloc testable</text>
  </g>

  <!-- ========= COLUMN 3 — CODING AGENT (carmine, emphasized) ========= -->
  <g class="interactive" data-card="regime-agent" tabindex="0" role="button" aria-label="Régime coding agent : projet entier en délégation, livrable en pull request.">
    <rect class="col-card" x="860" y="160" width="280" height="70" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <text x="878" y="190" class="mono" font-size="12" font-weight="600" letter-spacing="1.6" fill="#B7332C">RÉGIME 03</text>
    <text x="878" y="215" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Coding agent</text>

    <text x="878" y="298" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Projet entier</text>
    <text x="878" y="316" class="body" font-size="13" fill="#5A5A5A">repo, tickets, CI, secrets</text>

    <text x="878" y="418" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Délégation</text>
    <text x="878" y="436" class="body" font-size="13" fill="#5A5A5A">brief en langage naturel</text>

    <text x="878" y="538" class="body" font-size="14" font-weight="500" fill="#1A1A1A">10 – 60 minutes</text>
    <text x="878" y="556" class="body" font-size="13" fill="#5A5A5A">exécution asynchrone</text>

    <text x="878" y="658" class="body" font-size="14" font-weight="500" fill="#1A1A1A">PR / dossier</text>
    <text x="878" y="676" class="body" font-size="13" fill="#5A5A5A">commits, tests, description</text>
  </g>

  <!-- ========= LATERAL ANNOTATION — la bascule ========= -->
  <!-- Small cartouche under col 3 with arrow pointing up-right to the carmine card -->
  <g>
    <rect x="860" y="710" width="280" height="46" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <!-- Highlighter rectangle behind keyword -->
    <rect x="876" y="736" width="138" height="9" fill="#B7332C" fill-opacity="0.14"/>
    <text x="876" y="729" class="mono" font-size="12" font-weight="600" letter-spacing="1.6" fill="#B7332C">↑ LA BASCULE DE RÉGIME</text>
    <text x="876" y="745" class="body" font-size="13" fill="#1A1A1A">de l’aide-à-la-frappe à la délégation autonome</text>
  </g>
  <!-- Leader line from cartouche up to col 3 card bottom -->
  <line x1="1000" y1="710" x2="1000" y2="245" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="2 3" marker-end="url(#arrow-carmine)"/>

  <!-- ========= FOOTER STRIP ========= -->
  <line x1="60" y1="772" x2="840" y2="772" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="790" class="body" font-style="italic" font-size="12" fill="#5A5A5A">Synthèse Anthropic, OpenAI, GitHub (2026-05) ; cadre éditorial de l’auteur.</text>
</svg>
