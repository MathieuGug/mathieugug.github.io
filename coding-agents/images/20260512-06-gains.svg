<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" data-schema-id="schema-06" role="img" aria-labelledby="schema-06-title">
  <title id="schema-06-title">Ce que les gains valent vraiment — ordres de grandeur observés par tâche-type</title>

  <defs>
    <style>
      .display { font-family: 'Spectral', 'Times New Roman', serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'Consolas', monospace; }
    </style>
  </defs>

  <!-- Paper background -->
  <rect x="0" y="0" width="1200" height="900" fill="#FAF8F3"/>

  <!-- ====================== HEADER ====================== -->
  <text x="60" y="55" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">SCHÉMA 06</text>

  <text x="60" y="92" class="display" font-size="24" font-weight="600" fill="#1A1A1A">Ce que les gains valent vraiment</text>

  <text x="60" y="120" class="display" font-style="italic" font-size="14" fill="#5A5A5A">
    Ordres de grandeur observés par tâche-type. Sources hétérogènes — comparer avec prudence. Le code mature ralentit ; le greenfield accélère.
  </text>

  <!-- Hairline rule -->
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ====================== AXIS ====================== -->
  <!-- Axis baseline at y=170, ticks visible above bars -->
  <!-- Origin 1× at x=320, 10× at x=1100. Logarithmic-ish placement -->
  <!-- 1× → 320, 2× → 405, 5× → 715, 10× → 1100 (log scale base 10) -->
  <!-- log10 mapping: x = 320 + (log10(v) / log10(10)) * (1100-320) = 320 + log10(v) * 780 -->
  <!-- At v=1, log10=0 → 320. At v=10, log10=1 → 1100. -->
  <!-- v=2 → 320 + 0.301*780 = 320 + 234.8 = 554.8 (not 405) -->
  <!-- We'll use linear scale so subdivisions match approximate spacing. -->
  <!-- Linear: 1× at 320, 10× at 1100. Width = 780. So 1× per 86.67 units. -->
  <!-- 1× → 320, 2× → 406.67, 5× → 666.67, 10× → 1100. -->
  <!-- Negative zone (for −0.84× = ralentissement): mirrored to LEFT of x=320. -->
  <!-- We use a small negative zone from x=240 to x=320 representing 0× to 1× -->

  <!-- Axis ticks (vertical hairlines spanning the bar zone) -->
  <line x1="320"  y1="160" x2="320"  y2="780" stroke="#1A1A1A"   stroke-width="1"/>
  <line x1="406.67" y1="160" x2="406.67" y2="780" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="666.67" y1="160" x2="666.67" y2="780" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="1100" y1="160" x2="1100" y2="780" stroke="#E5E1D8"  stroke-width="0.5"/>

  <!-- Tick labels (top) -->
  <text x="320"    y="172" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">1×</text>
  <text x="406.67" y="172" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">2×</text>
  <text x="666.67" y="172" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">5×</text>
  <text x="1100"   y="172" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">10×</text>

  <!-- Negative zone marker -->
  <line x1="240" y1="160" x2="240" y2="780" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2,3"/>
  <text x="240" y="172" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">0×</text>

  <!-- Subtle "ralentissement" zone label -->
  <text x="280" y="785" class="mono" font-size="8" fill="#1F5560" text-anchor="middle" letter-spacing="1">RALENTISSEMENT</text>
  <text x="710" y="785" class="mono" font-size="8" fill="#5A5A5A" text-anchor="middle" letter-spacing="1">ACCÉLÉRATION</text>

  <!-- ====================== BARS ====================== -->
  <!-- 8 rows from y=200 (row 1) to y=760 (row 8). Step ≈ 80 -->
  <!-- Each row: label x=60-300, micro-source under, bar from x=320 (or to left for negative), value label, source pastille -->

  <!-- ROW 1 — Migration Scala → Java (Stripe) — 12.5× → bar would extend to 320 + 12.5*86.67 = 1403, capped at 1100 with break -->
  <!-- Since 12.5 > 10, we cap visually at 1100 with a "break" indicator. We'll let the bar end at 1100 and mark "12.5×" beyond. -->
  <g>
    <text x="60" y="205" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Migration Scala → Java</text>
    <text x="60" y="222" class="mono" font-size="9" fill="#5A5A5A">STRIPE · CASE STUDY ANTHROPIC</text>
    <!-- Bar: 320 → 1100 (capped), with a small jagged "cut" at the end to indicate exceeds -->
    <rect x="320" y="200" width="780" height="14" rx="2" fill="#B7332C"/>
    <!-- Cut indicator: small white triangle slash at end -->
    <path d="M 1090 200 L 1100 207 L 1090 214 L 1095 207 Z" fill="#FAF8F3"/>
    <text x="1118" y="211" class="mono" font-size="11" font-weight="600" fill="#1A1A1A">+12.5×</text>
    <!-- Caption -->
    <text x="60" y="238" class="body" font-style="italic" font-size="10" fill="#5A5A5A">« 4 jours vs 10 sem.-ingénieur »</text>
    <!-- Source pastille (mustard outline, top-right of row) -->
    <g transform="translate(1078,224)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#B58A2C" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="8" fill="#B58A2C" text-anchor="middle" letter-spacing="0.5">VENDOR</text>
    </g>
  </g>

  <!-- ROW 2 — Greenfield JS HTTP server (GitHub research 2023) — 1.56× -->
  <!-- 1.56× → 320 + 0.56*86.67 = 368.5 -->
  <g>
    <text x="60" y="285" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Greenfield JS HTTP server</text>
    <text x="60" y="302" class="mono" font-size="9" fill="#5A5A5A">GITHUB RESEARCH · n=95 · 2023</text>
    <rect x="320" y="280" width="48.5" height="14" rx="2" fill="#B7332C"/>
    <text x="378" y="291" class="mono" font-size="11" font-weight="600" fill="#1A1A1A">+55 %</text>
    <text x="378" y="303" class="mono" font-size="9" fill="#5A5A5A">IC [21 % ; 89 %]</text>
    <text x="60" y="318" class="body" font-style="italic" font-size="10" fill="#5A5A5A">« +55 % de rapidité, intervalle de confiance large »</text>
    <g transform="translate(1078,304)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#1F5560" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="8" fill="#1F5560" text-anchor="middle" letter-spacing="0.5">RESEARCH</text>
    </g>
  </g>

  <!-- ROW 3 — Slide deck d'offres commerciales (retex auteur) — ~4× -->
  <!-- 4× → 320 + 3*86.67 = 580 -->
  <g>
    <text x="60" y="365" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Slide deck d'offres commerciales</text>
    <text x="60" y="382" class="mono" font-size="9" fill="#5A5A5A">RETEX AUTEUR</text>
    <rect x="320" y="360" width="260" height="14" rx="2" fill="#B7332C"/>
    <text x="590" y="371" class="mono" font-size="11" font-weight="600" fill="#1A1A1A">~4×</text>
    <text x="60" y="398" class="body" font-style="italic" font-size="10" fill="#5A5A5A">« 2 h vs ~1 journée »</text>
    <g transform="translate(1078,384)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#5A5A5A" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="8" fill="#5A5A5A" text-anchor="middle" letter-spacing="0.5">RETEX</text>
    </g>
  </g>

  <!-- ROW 4 — Dossier deep research illustré (retex auteur) — ~5× -->
  <!-- 5× → 320 + 4*86.67 = 666.67 -->
  <g>
    <text x="60" y="445" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Dossier deep research illustré</text>
    <text x="60" y="462" class="mono" font-size="9" fill="#5A5A5A">RETEX AUTEUR · CE DOSSIER</text>
    <rect x="320" y="440" width="346.67" height="14" rx="2" fill="#B7332C"/>
    <text x="676" y="451" class="mono" font-size="11" font-weight="600" fill="#1A1A1A">~5×</text>
    <text x="60" y="478" class="body" font-style="italic" font-size="10" fill="#5A5A5A">« 5 h vs ~25 h, ce dossier inclus »</text>
    <g transform="translate(1078,464)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#5A5A5A" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="8" fill="#5A5A5A" text-anchor="middle" letter-spacing="0.5">RETEX</text>
    </g>
  </g>

  <!-- ROW 5 — Refacto bibliothèque JS partagée (retex auteur dossier-app.js) — ~6× -->
  <!-- 6× → 320 + 5*86.67 = 753.33 -->
  <g>
    <text x="60" y="525" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Refacto bibliothèque JS partagée</text>
    <text x="60" y="542" class="mono" font-size="9" fill="#5A5A5A">RETEX AUTEUR · DOSSIER-APP.JS</text>
    <rect x="320" y="520" width="433.33" height="14" rx="2" fill="#B7332C"/>
    <text x="763" y="531" class="mono" font-size="11" font-weight="600" fill="#1A1A1A">~6×</text>
    <text x="60" y="558" class="body" font-style="italic" font-size="10" fill="#5A5A5A">« 1 h vs ~6 h »</text>
    <g transform="translate(1078,544)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#5A5A5A" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="8" fill="#5A5A5A" text-anchor="middle" letter-spacing="0.5">RETEX</text>
    </g>
  </g>

  <!-- ROW 6 — PR/semaine en prod (Microsoft / Accenture) — +10–15 % → 1.125× -->
  <!-- 1.125× → 320 + 0.125*86.67 = 330.83. Use mustard for "no clear net gain" zone. -->
  <g>
    <text x="60" y="605" class="body" font-size="12" font-weight="600" fill="#1A1A1A">PR/semaine en production</text>
    <text x="60" y="622" class="mono" font-size="9" fill="#5A5A5A">MICROSOFT / ACCENTURE · LONGITUDINAL 2025</text>
    <rect x="320" y="600" width="11" height="14" rx="2" fill="#B58A2C"/>
    <text x="340" y="611" class="mono" font-size="11" font-weight="600" fill="#1A1A1A">+10–15 %</text>
    <text x="60" y="638" class="body" font-style="italic" font-size="10" fill="#5A5A5A">« +12,9 % à +21,8 % Microsoft, +7,5 % à +8,7 % Accenture »</text>
    <g transform="translate(1078,624)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#1F5560" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="8" fill="#1F5560" text-anchor="middle" letter-spacing="0.5">RESEARCH</text>
    </g>
  </g>

  <!-- ROW 7 — Self-report Block / Anthropic — ~1.5–2× -->
  <!-- ~1.75× → 320 + 0.75*86.67 = 385 -->
  <g>
    <text x="60" y="685" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Self-report Block / Anthropic</text>
    <text x="60" y="702" class="mono" font-size="9" fill="#5A5A5A">CASE STUDIES VENDOR</text>
    <!-- Carmine clair = lighter carmine. We'll use #D17066 (lighter). -->
    <rect x="320" y="680" width="65" height="14" rx="2" fill="#D17066"/>
    <text x="395" y="691" class="mono" font-size="11" font-weight="600" fill="#1A1A1A">~1,5–2×</text>
    <text x="60" y="718" class="body" font-style="italic" font-size="10" fill="#5A5A5A">« +50 % à 75 % des devs déclarent économiser 8–10 h/sem »</text>
    <g transform="translate(1078,704)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#B58A2C" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="8" fill="#B58A2C" text-anchor="middle" letter-spacing="0.5">VENDOR</text>
    </g>
  </g>

  <!-- ROW 8 — Issues OSS expert (METR RCT 2025) — −0.84× = ralentissement (−19%) -->
  <!-- Negative bar: extends LEFT from origin x=320. -->
  <!-- −19 % → bar of width ~64 to the left. We use the negative zone (240→320). -->
  <!-- Width: 19% of full unit-bar width 86.67 = 16.5, but we want it visible: scale negative zone differently. -->
  <!-- Negative zone 240→320 represents 0→100% of "missing" performance. Use 80*0.19 ≈ 15. -->
  <!-- Actually let's make it more visible: use 80 units to represent up to −20%. So −19% → 76 units. -->
  <g>
    <text x="60" y="765" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Issues OSS expert · code mature</text>
    <text x="60" y="782" class="mono" font-size="9" fill="#5A5A5A">METR · RCT 16 OSS DEVS · 2025</text>
    <rect x="244" y="760" width="76" height="14" rx="2" fill="#1F5560"/>
    <text x="234" y="771" class="mono" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="end">−19 %</text>
    <!-- Caption to the right since the bar is on the left -->
    <text x="330" y="771" class="body" font-style="italic" font-size="10" fill="#5A5A5A">« −19 % vs perception subjective +20 % »</text>
    <g transform="translate(330,778)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#B7332C" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="8" fill="#B7332C" text-anchor="middle" letter-spacing="0.5">RCT ACAD.</text>
    </g>
  </g>

  <!-- ====================== LEGEND (top-right under axis) ====================== -->
  <g transform="translate(820, 96)">
    <text x="0" y="0" class="mono" font-size="9" fill="#5A5A5A" letter-spacing="1">SOURCES</text>
    <!-- Carmine outline → RCT académique -->
    <g transform="translate(0, 12)">
      <rect x="0" y="0" width="14" height="10" rx="5" fill="none" stroke="#B7332C" stroke-width="0.8"/>
      <text x="22" y="8" class="body" font-size="9" fill="#1A1A1A">RCT académique</text>
    </g>
    <!-- Teal outline → GitHub research / longitudinal -->
    <g transform="translate(160, 12)">
      <rect x="0" y="0" width="14" height="10" rx="5" fill="none" stroke="#1F5560" stroke-width="0.8"/>
      <text x="22" y="8" class="body" font-size="9" fill="#1A1A1A">Research / longitudinal</text>
    </g>
    <!-- Mustard outline → Case study vendor -->
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="14" height="10" rx="5" fill="none" stroke="#B58A2C" stroke-width="0.8"/>
      <text x="22" y="8" class="body" font-size="9" fill="#1A1A1A">Case study vendor</text>
    </g>
    <!-- Graphite outline → Retex auteur -->
    <g transform="translate(160, 30)">
      <rect x="0" y="0" width="14" height="10" rx="5" fill="none" stroke="#5A5A5A" stroke-width="0.8"/>
      <text x="22" y="8" class="body" font-size="9" fill="#1A1A1A">Retex auteur</text>
    </g>
  </g>

  <!-- ====================== ANNOTATION CARTOUCHE ====================== -->
  <line x1="60" y1="810" x2="1140" y2="810" stroke="#E5E1D8" stroke-width="0.5"/>
  <foreignObject x="60" y="818" width="1080" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Inter', sans-serif; font-style: italic; font-size: 11px; color: #5A5A5A; line-height: 1.5;">
      « Trois lectures possibles : 12,5× quand l'agent fait la première fois ce qu'aucun humain n'a le temps d'essayer ; +12 à 15 % en régime de croisière mesuré objectivement ; −19 % chez les seniors sur leur propre code. La même technologie, trois réalités. »
    </div>
  </foreignObject>

  <!-- ====================== FOOTER ====================== -->
  <line x1="60" y1="868" x2="1140" y2="868" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="884" class="mono" font-size="9" fill="#5A5A5A">
    Sources : METR 2025 (RCT 16 devs OSS) · GitHub research 2023 (n=95) · Anthropic case studies (Stripe, Block) · Stack Overflow Survey 2025 · retex auteur. Lecture : « 1× » = pas de gain.
  </text>
</svg>
