<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" data-schema-id="schema-06" role="img" aria-labelledby="schema-06-title">
  <title id="schema-06-title">Ce que les gains valent vraiment — ordres de grandeur observés par tâche-type</title>

  <defs>
    <style>
      .display { font-family: 'Spectral', 'Times New Roman', serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'Consolas', monospace; }
    </style>
  </defs>

  <!-- Paper background -->
  <rect x="0" y="0" width="1200" height="1000" fill="#FAF8F3"/>

  <!-- ====================== HEADER ====================== -->
  <text x="60" y="55" class="mono" font-size="13" letter-spacing="2" fill="#B7332C">SCHÉMA 06</text>

  <text x="60" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A">Ce que les gains valent vraiment</text>

  <text x="60" y="120" class="display" font-style="italic" font-size="16" fill="#5A5A5A">
    Ordres de grandeur observés par tâche-type. Sources hétérogènes — comparer avec prudence. Le code mature ralentit ; le greenfield accélère.
  </text>

  <!-- Hairline rule -->
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ====================== AXIS ====================== -->
  <!-- Origin 1× at x=320, 10× at x=1080. Linear scale. Width = 760. So 1× per ~84.44 units. -->
  <!-- 1× → 320, 2× → 404.44, 5× → 657.78, 10× → 1080. -->
  <!-- Tags column reserved x=1095 → 1160 (out of bar zone). -->
  <!-- Bar zone vertical: y=190 (row 1) → y=730 (row 8). 70 units per row. -->

  <!-- Axis ticks (vertical hairlines spanning the bar zone) -->
  <line x1="320"    y1="160" x2="320"    y2="750" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="404.44" y1="160" x2="404.44" y2="750" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="657.78" y1="160" x2="657.78" y2="750" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="1080"   y1="160" x2="1080"   y2="750" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Tick labels (top) -->
  <text x="320"    y="172" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle">1×</text>
  <text x="404.44" y="172" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle">2×</text>
  <text x="657.78" y="172" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle">5×</text>
  <text x="1080"   y="172" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle">10×</text>

  <!-- Negative zone marker (0×) -->
  <line x1="240" y1="160" x2="240" y2="750" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2,3"/>
  <text x="240" y="172" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle">0×</text>

  <!-- ====================== BARS ====================== -->
  <!-- 8 rows. Step = 70. Row 1 bar y=190, Row 2 y=260, … Row 8 y=720. -->
  <!-- Tags moved to right column at x=1095, vertically centered on each bar (y+5 since bar height 14). -->

  <!-- ROW 1 — Migration Scala → Java (Stripe) — 12.5× → capped at 10× visually -->
  <g>
    <text x="60" y="195" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Migration Scala → Java</text>
    <text x="60" y="212" class="mono" font-size="12" fill="#5A5A5A">STRIPE · CASE STUDY ANTHROPIC</text>
    <!-- Bar 320 → 1080 (capped at 10×) -->
    <rect x="320" y="190" width="760" height="14" rx="2" fill="#B7332C"/>
    <!-- Cut indicator near end -->
    <path d="M 1070 190 L 1080 197 L 1070 204 L 1075 197 Z" fill="#FAF8F3"/>
    <!-- Value label inside bar (white) since bar reaches the edge of plot -->
    <text x="1070" y="201" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="end">+12,5×</text>
    <text x="60" y="228" class="body" font-style="italic" font-size="12" fill="#5A5A5A">« 4 jours vs 10 sem.-ingénieur »</text>
    <!-- Source pastille (mustard outline) — right column -->
    <g transform="translate(1095,193)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#B58A2C" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="11" fill="#B58A2C" text-anchor="middle" letter-spacing="0.5">VENDOR</text>
    </g>
  </g>

  <!-- ROW 2 — Greenfield JS HTTP server — 1.55× -->
  <!-- 1.55× → 320 + 0.55*84.44 = 366.44 -->
  <g>
    <text x="60" y="265" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Greenfield JS HTTP server</text>
    <text x="60" y="282" class="mono" font-size="12" fill="#5A5A5A">GITHUB RESEARCH · n=95 · 2023</text>
    <rect x="320" y="260" width="46.44" height="14" rx="2" fill="#B7332C"/>
    <text x="376" y="271" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">+55 %</text>
    <text x="376" y="283" class="mono" font-size="12" fill="#5A5A5A">IC [21 % ; 89 %]</text>
    <text x="60" y="298" class="body" font-style="italic" font-size="12" fill="#5A5A5A">« +55 % de rapidité, intervalle de confiance large »</text>
    <g transform="translate(1095,263)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#1F5560" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="11" fill="#1F5560" text-anchor="middle" letter-spacing="0.5">RESEARCH</text>
    </g>
  </g>

  <!-- ROW 3 — Slide deck d'offres commerciales (retex auteur) — ~4× -->
  <!-- 4× → 320 + 3*84.44 = 573.33 -->
  <g>
    <text x="60" y="335" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Slide deck d'offres commerciales</text>
    <text x="60" y="352" class="mono" font-size="12" fill="#5A5A5A">RETEX AUTEUR</text>
    <rect x="320" y="330" width="253.33" height="14" rx="2" fill="#B7332C"/>
    <text x="583" y="341" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">~4×</text>
    <text x="60" y="368" class="body" font-style="italic" font-size="12" fill="#5A5A5A">« 2 h vs ~1 journée »</text>
    <g transform="translate(1095,333)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#5A5A5A" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle" letter-spacing="0.5">RETEX</text>
    </g>
  </g>

  <!-- ROW 4 — Dossier deep research illustré (retex auteur) — ~5× -->
  <!-- 5× → 320 + 4*84.44 = 657.78 -->
  <g>
    <text x="60" y="405" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Dossier deep research illustré</text>
    <text x="60" y="422" class="mono" font-size="12" fill="#5A5A5A">RETEX AUTEUR · CE DOSSIER</text>
    <rect x="320" y="400" width="337.78" height="14" rx="2" fill="#B7332C"/>
    <text x="668" y="411" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">~5×</text>
    <text x="60" y="438" class="body" font-style="italic" font-size="12" fill="#5A5A5A">« 5 h vs ~25 h, ce dossier inclus »</text>
    <g transform="translate(1095,403)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#5A5A5A" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle" letter-spacing="0.5">RETEX</text>
    </g>
  </g>

  <!-- ROW 5 — Refacto bibliothèque JS partagée (retex auteur) — ~6× -->
  <!-- 6× → 320 + 5*84.44 = 742.22 -->
  <g>
    <text x="60" y="475" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Refacto bibliothèque JS partagée</text>
    <text x="60" y="492" class="mono" font-size="12" fill="#5A5A5A">RETEX AUTEUR · DOSSIER-APP.JS</text>
    <rect x="320" y="470" width="422.22" height="14" rx="2" fill="#B7332C"/>
    <text x="752" y="481" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">~6×</text>
    <text x="60" y="508" class="body" font-style="italic" font-size="12" fill="#5A5A5A">« 1 h vs ~6 h »</text>
    <g transform="translate(1095,473)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#5A5A5A" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle" letter-spacing="0.5">RETEX</text>
    </g>
  </g>

  <!-- ROW 6 — PR/semaine en prod (Microsoft / Accenture) — +10–15 % → ~1.125× -->
  <!-- 1.125× → 320 + 0.125*84.44 = 330.56 -->
  <g>
    <text x="60" y="545" class="body" font-size="14" font-weight="600" fill="#1A1A1A">PR/semaine en production</text>
    <text x="60" y="562" class="mono" font-size="12" fill="#5A5A5A">MICROSOFT / ACCENTURE · LONGITUDINAL 2025</text>
    <rect x="320" y="540" width="10.56" height="14" rx="2" fill="#B58A2C"/>
    <text x="338" y="551" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">+10–15 %</text>
    <text x="60" y="578" class="body" font-style="italic" font-size="12" fill="#5A5A5A">« +12,9 % à +21,8 % Microsoft, +7,5 % à +8,7 % Accenture »</text>
    <g transform="translate(1095,543)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#1F5560" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="11" fill="#1F5560" text-anchor="middle" letter-spacing="0.5">RESEARCH</text>
    </g>
  </g>

  <!-- ROW 7 — Self-report Block / Anthropic — ~1.5–2× -->
  <!-- ~1.75× → 320 + 0.75*84.44 = 383.33 -->
  <g>
    <text x="60" y="615" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Self-report Block / Anthropic</text>
    <text x="60" y="632" class="mono" font-size="12" fill="#5A5A5A">CASE STUDIES VENDOR</text>
    <rect x="320" y="610" width="63.33" height="14" rx="2" fill="#D17066"/>
    <text x="392" y="621" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">~1,5–2×</text>
    <text x="60" y="648" class="body" font-style="italic" font-size="12" fill="#5A5A5A">« +50 % à 75 % des devs déclarent économiser 8–10 h/sem »</text>
    <g transform="translate(1095,613)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#B58A2C" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="11" fill="#B58A2C" text-anchor="middle" letter-spacing="0.5">VENDOR</text>
    </g>
  </g>

  <!-- ROW 8 — Issues OSS expert (METR RCT 2025) — −19 % -->
  <!-- Negative bar: extends LEFT from origin x=320. Width 76 units → x=244 to x=320. -->
  <g>
    <text x="60" y="685" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Issues OSS expert · code mature</text>
    <text x="60" y="702" class="mono" font-size="12" fill="#5A5A5A">METR · RCT 16 OSS DEVS · 2025</text>
    <rect x="244" y="680" width="76" height="14" rx="2" fill="#1F5560"/>
    <text x="234" y="691" class="mono" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="end">−19 %</text>
    <!-- Caption to the right since the bar is on the left -->
    <text x="330" y="691" class="body" font-style="italic" font-size="12" fill="#5A5A5A">« −19 % vs perception subjective +20 % »</text>
    <!-- Tag in right column, aligned with bar -->
    <g transform="translate(1095,683)">
      <rect x="0" y="0" width="62" height="14" rx="7" fill="none" stroke="#B7332C" stroke-width="0.8"/>
      <text x="31" y="10" class="mono" font-size="11" fill="#B7332C" text-anchor="middle" letter-spacing="0.5">RCT ACAD.</text>
    </g>
  </g>

  <!-- ====================== AXIS BASELINE & DIRECTION LABELS ====================== -->
  <!-- Horizontal axis baseline under bar zone -->
  <line x1="240" y1="750" x2="1080" y2="750" stroke="#1A1A1A" stroke-width="0.6"/>
  <!-- Direction labels well below the last bar (last bar ends y=694) -->
  <text x="280" y="775" class="mono" font-size="12" fill="#1F5560" text-anchor="middle" letter-spacing="2">RALENTISSEMENT</text>
  <text x="700" y="775" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle" letter-spacing="2">ACCÉLÉRATION</text>

  <!-- ====================== ANNOTATION CARTOUCHE ====================== -->
  <line x1="60" y1="795" x2="1140" y2="795" stroke="#E5E1D8" stroke-width="0.5"/>
  <foreignObject x="60" y="803" width="1080" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Inter', sans-serif; font-style: italic; font-size: 11px; color: #5A5A5A; line-height: 1.5;">
      « Trois lectures possibles : 12,5× quand l'agent fait la première fois ce qu'aucun humain n'a le temps d'essayer ; +12 à 15 % en régime de croisière mesuré objectivement ; −19 % chez les seniors sur leur propre code. La même technologie, trois réalités. »
    </div>
  </foreignObject>

  <!-- ====================== LEGEND SOURCES (bottom-left, horizontal) ====================== -->
  <line x1="60" y1="855" x2="1140" y2="855" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="875" class="mono" font-size="12" fill="#5A5A5A" letter-spacing="2">SOURCES</text>
  <!-- 4 horizontal pastilles. Pillules outline = ce qui est utilisé sur les bars. -->
  <g>
    <!-- Carmine outline → RCT académique -->
    <circle cx="148" cy="881" r="5" fill="none" stroke="#B7332C" stroke-width="1.2"/>
    <text x="160" y="884" class="body" font-size="12" fill="#1A1A1A">RCT académique</text>
    <!-- Teal outline → Research / longitudinal -->
    <circle cx="298" cy="881" r="5" fill="none" stroke="#1F5560" stroke-width="1.2"/>
    <text x="310" y="884" class="body" font-size="12" fill="#1A1A1A">Research / longitudinal</text>
    <!-- Mustard outline → Case study vendor -->
    <circle cx="498" cy="881" r="5" fill="none" stroke="#B58A2C" stroke-width="1.2"/>
    <text x="510" y="884" class="body" font-size="12" fill="#1A1A1A">Case study vendor</text>
    <!-- Graphite outline → Retex auteur -->
    <circle cx="678" cy="881" r="5" fill="none" stroke="#5A5A5A" stroke-width="1.2"/>
    <text x="690" y="884" class="body" font-size="12" fill="#1A1A1A">Retex auteur</text>
  </g>

  <!-- ====================== FOOTER ====================== -->
  <line x1="60" y1="905" x2="1140" y2="905" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="925" class="mono" font-size="12" fill="#5A5A5A">
    Sources : METR 2025 (RCT 16 devs OSS) · GitHub research 2023 (n=95) · Anthropic case studies (Stripe, Block) · Stack Overflow Survey 2025 · retex auteur. Lecture : « 1× » = pas de gain.
  </text>
</svg>
