<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" data-schema-id="schema-03" role="img" aria-labelledby="schema-03-title">
  <title id="schema-03-title">Le cycle de vie d'une skill</title>
  <defs>
    <style><![CDATA[
      .display { font-family: 'Spectral', Georgia, serif; }
      .body { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .ink { fill: #1A1A1A; }
      .graphite { fill: #5A5A5A; }
      .carmine { fill: #B7332C; }
      .teal { fill: #1F5560; }
      .mustard { fill: #B58A2C; }
    ]]></style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="900" fill="#FAF8F3"/>

  <!-- ===== HEADER ===== -->
  <g class="svg-header"><text class="mono carmine" x="60" y="55" font-size="11" letter-spacing="0.18em" font-weight="600">SCHÉMA 03</text>
  <text class="display ink" x="60" y="92" font-size="24" font-weight="600">Le cycle de vie d'une skill</text>
  <text class="display graphite" x="60" y="118" font-size="14" font-style="italic">Cinq moments depuis la création d'un fichier .md jusqu'à son partage en équipe.</text>

  <!-- Hairline rule --></g>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="1"/>

  <!-- ===== EXEMPLES DE SKILLS UTILES (colonne gauche) ===== -->
  <text class="mono mustard" x="30" y="180" font-size="11" font-weight="600" letter-spacing="0.16em">EXEMPLES DE SKILLS UTILES</text>
  <text class="display graphite" x="30" y="200" font-size="11" font-style="italic">Quatre fichiers .md qui rendent service au quotidien.</text>

  <!-- ===== CARD 1 — EXEMPLE A — DATA ===== -->
  <g>
    <rect x="30" y="215" width="420" height="125" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text class="mono mustard" x="44" y="237" font-size="11" font-weight="600" letter-spacing="0.16em">EXEMPLE A — DATA</text>
    <text class="display ink" x="44" y="260" font-size="13" font-weight="600">audit-dbt-schema</text>
    <text class="mono graphite" x="44" y="280" font-size="9">---</text>
    <text class="mono graphite" x="44" y="293" font-size="9">description: Audite la cohérence d'un schéma dbt.</text>
    <text class="mono graphite" x="44" y="306" font-size="9">allowed-tools: [Read, Grep, Glob]</text>
    <text class="mono graphite" x="44" y="319" font-size="9">---</text>
    <text class="mono mustard" x="44" y="333" font-size="9">→ /audit-dbt-schema sur ./models/</text>
  </g>

  <!-- ===== CARD 2 — EXEMPLE B — TRANSVERSE ===== -->
  <g>
    <rect x="30" y="355" width="420" height="125" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text class="mono mustard" x="44" y="377" font-size="11" font-weight="600" letter-spacing="0.16em">EXEMPLE B — TRANSVERSE</text>
    <text class="display ink" x="44" y="400" font-size="13" font-weight="600">synthese-pdf-5-bullets</text>
    <text class="mono graphite" x="44" y="420" font-size="9">---</text>
    <text class="mono graphite" x="44" y="433" font-size="9">description: Lit un PDF, en sort 5 bullets actionnables.</text>
    <text class="mono graphite" x="44" y="446" font-size="9">allowed-tools: [Read]</text>
    <text class="mono graphite" x="44" y="459" font-size="9">---</text>
    <text class="mono mustard" x="44" y="473" font-size="9">→ /synthese-pdf-5-bullets brief.pdf</text>
  </g>

  <!-- ===== CARD 3 — EXEMPLE C — DATA AVANCÉ ===== -->
  <g>
    <rect x="30" y="495" width="420" height="140" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text class="mono mustard" x="44" y="517" font-size="11" font-weight="600" letter-spacing="0.16em">EXEMPLE C — DATA AVANCÉ</text>
    <text class="display ink" x="44" y="540" font-size="13" font-weight="600">profil-dataframe</text>
    <text class="mono graphite" x="44" y="560" font-size="9">---</text>
    <text class="mono graphite" x="44" y="573" font-size="9">description: Analyse un CSV/Parquet : types,</text>
    <text class="mono graphite" x="44" y="586" font-size="9">  cardinalités, valeurs manquantes, anomalies.</text>
    <text class="mono graphite" x="44" y="599" font-size="9">allowed-tools: [Read, Bash]</text>
    <text class="mono graphite" x="44" y="612" font-size="9">---</text>
    <text class="mono mustard" x="44" y="626" font-size="9">→ /profil-dataframe orders.parquet</text>
  </g>

  <!-- ===== CARD 4 — EXEMPLE D — STORYTELLING ===== -->
  <g>
    <rect x="30" y="650" width="420" height="140" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text class="mono mustard" x="44" y="672" font-size="11" font-weight="600" letter-spacing="0.16em">EXEMPLE D — STORYTELLING</text>
    <text class="display ink" x="44" y="695" font-size="13" font-weight="600">slide-deck-fr-bp</text>
    <text class="mono graphite" x="44" y="715" font-size="9">---</text>
    <text class="mono graphite" x="44" y="728" font-size="9">description: Convertit un brief en slide deck</text>
    <text class="mono graphite" x="44" y="741" font-size="9">  FR (charte interne respectée).</text>
    <text class="mono graphite" x="44" y="754" font-size="9">allowed-tools: [Read, Write]</text>
    <text class="mono graphite" x="44" y="767" font-size="9">---</text>
    <text class="mono mustard" x="44" y="781" font-size="9">→ /slide-deck-fr-bp brief-q3.md</text>
  </g>

  <!-- ===== CENTRE DU CYCLE ===== -->
  <!-- Ellipse centre (820, 470). Rx_pos=220, Ry_pos=320 (étirée verticalement). -->
  <!-- 5 étapes à 72° d'écart depuis 12h, horaire (θ = 0, 72, 144, 216, 288). -->
  <!-- Position card N : (cx + Rx·sin θ, cy − Ry·cos θ), rect 220×110 → x = c_x − 110, y = c_y − 55. -->

  <!-- Texte central -->
  <text class="display graphite" x="820" y="462" font-size="20" font-style="italic" text-anchor="middle">5 moments dans la vie</text>
  <text class="display graphite" x="820" y="490" font-size="20" font-style="italic" text-anchor="middle">d'une skill</text>

  <!-- ===== FLÈCHES — arcs elliptiques (Rx_arc=305, Ry_arc=380 autour du centre 820,470) ===== -->
  <!-- 5 arcs, chacun parcourant 44° (72° − 2×14° de marge angulaire). -->
  <!-- large-arc-flag=0 (arc <180°), sweep-flag=1 (sens horaire). -->

  <!-- 1 → 2 : θ_start=14° → θ_end=58° -->
  <path d="M 893.78,101.29 A 305,380 0 0 1 1078.65,268.64" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 2 → 3 : θ_start=86° → θ_end=130° -->
  <path d="M 1124.26,443.47 A 305,380 0 0 1 1053.66,714.27" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 3 → 4 : θ_start=158° → θ_end=202° -->
  <path d="M 934.27,822.39 A 305,380 0 0 1 705.73,822.39" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 4 → 5 : θ_start=230° → θ_end=274° -->
  <path d="M 586.34,714.27 A 305,380 0 0 1 515.74,443.47" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 5 → 1 : θ_start=302° → θ_end=346° -->
  <path d="M 561.35,268.64 A 305,380 0 0 1 746.22,101.29" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== ÉTAPE 1 — CRÉATION (top, θ=0°) ===== -->
  <!-- Centre (820, 150), rect 220×110 à x=710 y=95 -->
  <g>
    <rect x="710" y="95" width="220" height="110" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="726" y="122" font-size="11" font-weight="600" letter-spacing="0.16em">01 CRÉATION</text>
    <text class="display ink" x="726" y="150" font-size="15" font-weight="600">Création</text>
    <text class="body graphite" x="726" y="174" font-size="11">fichier <tspan class="mono" font-size="11">SKILL.md</tspan> + frontmatter YAML</text>
  </g>

  <!-- ===== ÉTAPE 2 — ENREGISTREMENT (θ=72°) ===== -->
  <!-- Centre (1029, 371), rect 220×110 à x=919 y=316 -->
  <g>
    <rect x="919" y="316" width="220" height="110" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="935" y="343" font-size="11" font-weight="600" letter-spacing="0.16em">02 ENREGISTREMENT</text>
    <text class="display ink" x="935" y="371" font-size="15" font-weight="600">Enregistrement</text>
    <text class="body graphite" x="935" y="395" font-size="11"><tspan class="mono" font-size="11">.claude/skills/</tspan> ou plugin</text>
  </g>

  <!-- ===== ÉTAPE 3 — INVOCATION (carmine, θ=144°) ===== -->
  <!-- Centre (949, 729), rect 220×110 à x=839 y=674 -->
  <g>
    <rect x="839" y="674" width="220" height="110" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <text class="mono carmine" x="855" y="701" font-size="11" font-weight="600" letter-spacing="0.16em">03 INVOCATION</text>
    <text class="display ink" x="855" y="729" font-size="15" font-weight="600">Invocation</text>
    <text class="body graphite" x="855" y="753" font-size="11">match auto sur <tspan class="mono" font-size="11">description</tspan></text>
    <text class="body graphite" x="855" y="771" font-size="11">ou /commande</text>
  </g>

  <!-- ===== ÉTAPE 4 — EXÉCUTION (θ=216°) ===== -->
  <!-- Centre (691, 729), rect 220×110 à x=581 y=674 -->
  <g>
    <rect x="581" y="674" width="220" height="110" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="597" y="701" font-size="11" font-weight="600" letter-spacing="0.16em">04 EXÉCUTION</text>
    <text class="display ink" x="597" y="729" font-size="15" font-weight="600">Exécution</text>
    <text class="body graphite" x="597" y="753" font-size="11">instructions chargées dans le contexte</text>
  </g>

  <!-- ===== ÉTAPE 5 — VERSIONNEMENT (θ=288°) ===== -->
  <!-- Centre (611, 371), rect 220×110 à x=501 y=316 -->
  <g>
    <rect x="501" y="316" width="220" height="110" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="517" y="343" font-size="11" font-weight="600" letter-spacing="0.16em">05 VERSIONNEMENT</text>
    <text class="display ink" x="517" y="371" font-size="15" font-weight="600">Versionnement</text>
    <text class="body graphite" x="517" y="395" font-size="11">git, plugins, partage cross-projets</text>
  </g>

  <!-- ===== FOOTER CAPTION (hidden in slideshow via .svg-footer CSS) ===== -->
  <g class="svg-footer">
    <line x1="60" y1="855" x2="1140" y2="855" stroke="#E5E1D8" stroke-width="1"/>
    <text class="display graphite" x="60" y="878" font-size="11" font-style="italic">« D'après documentation Anthropic et standard ouvert agentskills.io. »</text>
  </g>
</svg>
