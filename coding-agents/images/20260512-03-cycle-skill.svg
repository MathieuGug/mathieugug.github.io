<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" data-schema-id="schema-03" role="img" aria-labelledby="schema-03-title">
  <title id="schema-03-title">Le cycle de vie d'une skill</title>
  <defs>
    <style><![CDATA[
      .display { font-family: 'Spectral', Georgia, serif; }
      .body { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .ink { fill: #1A1A1A; }
      .graphite { fill: #5A5A5A; }
      .carmine { fill: #B7332C; }
      .teal { fill: #1F5560; }
      .mustard { fill: #B58A2C; }
    ]]></style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="900" fill="#FAF8F3"/>

  <!-- ===== HEADER ===== -->
  <text class="mono carmine" x="60" y="55" font-size="11" letter-spacing="0.18em" font-weight="600">SCHÉMA 03</text>
  <text class="display ink" x="60" y="92" font-size="24" font-weight="600">Le cycle de vie d'une skill</text>
  <text class="display graphite" x="60" y="118" font-size="14" font-style="italic">Cinq moments depuis la création d'un fichier .md jusqu'à son partage en équipe.</text>

  <!-- Hairline rule -->
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="1"/>

  <!-- ===== CENTRE ===== -->
  <!-- Cercle centre (600, 460), rayon 280. 5 étapes à 72° d'écart, sens horaire depuis 12h. -->
  <text class="display graphite" x="600" y="452" font-size="16" font-style="italic" text-anchor="middle">5 moments dans la vie</text>
  <text class="display graphite" x="600" y="474" font-size="16" font-style="italic" text-anchor="middle">d'une skill</text>

  <!-- ===== FLÈCHES COURBES (1→2→3→4→5→1) — derrière les rects ===== -->
  <!-- Centres rect : 1=(600,180) 2=(866,374) 3=(765,686) 4=(435,686) 5=(334,374) -->
  <!-- Bordures rect 200x100 : x ∈ [c-100, c+100], y ∈ [c-50, c+50] -->

  <!-- 1 → 2 : depuis bord droit-bas étape 1 (~700, 230) vers bord gauche-haut étape 2 (~766, 374) — courbe vers l'extérieur -->
  <path d="M 700 230 Q 800 250, 766 374" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 2 → 3 : depuis bord bas étape 2 (~866, 424) vers bord haut étape 3 (~765, 636) — courbe vers la droite -->
  <path d="M 866 424 Q 900 530, 765 636" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 3 → 4 : depuis bord gauche étape 3 (~665, 686) vers bord droit étape 4 (~535, 686) — courbe basse -->
  <path d="M 665 686 Q 600 720, 535 686" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 4 → 5 : depuis bord haut étape 4 (~335, 686) vers bord bas étape 5 (~334, 424) — courbe vers la gauche -->
  <path d="M 335 686 Q 300 530, 334 424" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 5 → 1 : depuis bord haut étape 5 (~334, 324) vers bord gauche étape 1 (~500, 230) — courbe haute -->
  <path d="M 334 324 Q 350 200, 500 230" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== ÉTAPE 1 — CRÉATION (top, 12h, angle 90°) ===== -->
  <!-- Centre (600, 180), rect à x=500 y=130 -->
  <g>
    <rect x="500" y="130" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="516" y="156" font-size="10" font-weight="600" letter-spacing="0.16em">01 CRÉATION</text>
    <text class="display ink" x="516" y="182" font-size="13" font-weight="600">Création</text>
    <text class="body graphite" x="516" y="204" font-size="9">fichier <tspan class="mono" font-size="9">SKILL.md</tspan> + frontmatter YAML</text>
  </g>

  <!-- ===== ÉTAPE 2 — ENREGISTREMENT (~2h, angle 18°) ===== -->
  <!-- Centre (866, 374), rect à x=766 y=324 -->
  <g>
    <rect x="766" y="324" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="782" y="350" font-size="10" font-weight="600" letter-spacing="0.16em">02 ENREGISTREMENT</text>
    <text class="display ink" x="782" y="376" font-size="13" font-weight="600">Enregistrement</text>
    <text class="body graphite" x="782" y="398" font-size="9"><tspan class="mono" font-size="9">.claude/skills/</tspan> ou plugin</text>
  </g>

  <!-- ===== ÉTAPE 3 — INVOCATION (carmine, ~5h, angle -54°) ===== -->
  <!-- Centre (765, 686), rect à x=665 y=636 -->
  <g>
    <rect x="665" y="636" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <text class="mono carmine" x="681" y="662" font-size="10" font-weight="600" letter-spacing="0.16em">03 INVOCATION</text>
    <text class="display ink" x="681" y="688" font-size="13" font-weight="600">Invocation</text>
    <text class="body graphite" x="681" y="710" font-size="9">match auto sur <tspan class="mono" font-size="9">description</tspan></text>
    <text class="body graphite" x="681" y="724" font-size="9">ou /commande</text>
  </g>

  <!-- ===== ÉTAPE 4 — EXÉCUTION (~7h, angle -126°) ===== -->
  <!-- Centre (435, 686), rect à x=335 y=636 -->
  <g>
    <rect x="335" y="636" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="351" y="662" font-size="10" font-weight="600" letter-spacing="0.16em">04 EXÉCUTION</text>
    <text class="display ink" x="351" y="688" font-size="13" font-weight="600">Exécution</text>
    <text class="body graphite" x="351" y="710" font-size="9">instructions chargées dans le contexte</text>
  </g>

  <!-- ===== ÉTAPE 5 — VERSIONNEMENT (~10h, angle 162°) ===== -->
  <!-- Centre (334, 374), rect à x=234 y=324 -->
  <g>
    <rect x="234" y="324" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="250" y="350" font-size="10" font-weight="600" letter-spacing="0.16em">05 VERSIONNEMENT</text>
    <text class="display ink" x="250" y="376" font-size="13" font-weight="600">Versionnement</text>
    <text class="body graphite" x="250" y="398" font-size="9">git, plugins, partage cross-projets</text>
  </g>

  <!-- ===== ANNOTATION A — EXEMPLE DATA (haut-gauche, hors cercle) ===== -->
  <g>
    <rect x="30" y="160" width="190" height="150" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text class="mono mustard" x="44" y="180" font-size="9" font-weight="600" letter-spacing="0.16em">EXEMPLE A — DATA</text>
    <text class="display ink" x="44" y="202" font-size="11" font-weight="600">audit-dbt-schema</text>
    <text class="mono graphite" x="44" y="222" font-size="8">---</text>
    <text class="mono graphite" x="44" y="234" font-size="8">description: Audite</text>
    <text class="mono graphite" x="44" y="246" font-size="8">  un schéma dbt.</text>
    <text class="mono graphite" x="44" y="258" font-size="8">allowed-tools:</text>
    <text class="mono graphite" x="44" y="270" font-size="8">  [Read, Grep, Glob]</text>
    <text class="mono graphite" x="44" y="282" font-size="8">---</text>
    <text class="mono mustard" x="44" y="300" font-size="8">→ /audit-dbt-schema</text>
  </g>

  <!-- ===== ANNOTATION B — EXEMPLE TRANSVERSE (bas-droite, hors cercle) ===== -->
  <g>
    <rect x="970" y="500" width="200" height="180" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text class="mono mustard" x="984" y="520" font-size="9" font-weight="600" letter-spacing="0.16em">EXEMPLE B — TRANSVERSE</text>
    <text class="display ink" x="984" y="542" font-size="11" font-weight="600">synthese-pdf-5-bullets</text>
    <text class="mono graphite" x="984" y="562" font-size="8">---</text>
    <text class="mono graphite" x="984" y="574" font-size="8">description: Lit un PDF,</text>
    <text class="mono graphite" x="984" y="586" font-size="8">  en sort 5 bullets</text>
    <text class="mono graphite" x="984" y="598" font-size="8">  actionnables.</text>
    <text class="mono graphite" x="984" y="610" font-size="8">allowed-tools: [Read]</text>
    <text class="mono graphite" x="984" y="622" font-size="8">---</text>
    <text class="mono mustard" x="984" y="640" font-size="8">→ /synthese-pdf-5-bullets</text>
    <text class="mono mustard" x="984" y="652" font-size="8">  brief.pdf</text>
  </g>

  <!-- ===== FOOTER CAPTION ===== -->
  <line x1="60" y1="855" x2="1140" y2="855" stroke="#E5E1D8" stroke-width="1"/>
  <text class="display graphite" x="60" y="878" font-size="11" font-style="italic">« D'après documentation Anthropic et standard ouvert agentskills.io. »</text>
</svg>
