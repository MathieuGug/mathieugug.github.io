<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" data-schema-id="schema-03" role="img" aria-labelledby="schema-03-title">
  <title id="schema-03-title">Le cycle de vie d'une skill</title>
  <defs>
    <style><![CDATA[
      .display { font-family: 'Spectral', Georgia, serif; }
      .body { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .ink { fill: #1A1A1A; }
      .graphite { fill: #5A5A5A; }
      .carmine { fill: #B7332C; }
      .teal { fill: #1F5560; }
      .mustard { fill: #B58A2C; }
    ]]></style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="900" fill="#FAF8F3"/>

  <!-- ===== HEADER ===== -->
  <text class="mono carmine" x="60" y="55" font-size="11" letter-spacing="0.18em" font-weight="600">SCHÉMA 03</text>
  <text class="display ink" x="60" y="92" font-size="24" font-weight="600">Le cycle de vie d'une skill</text>
  <text class="display graphite" x="60" y="118" font-size="14" font-style="italic">Cinq moments depuis la création d'un fichier .md jusqu'à son partage en équipe.</text>

  <!-- Hairline rule -->
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="1"/>

  <!-- ===== CENTRE ===== -->
  <!-- Cercle centre (600, 460), rayon positionnement étapes = 280, rayon arcs = 340. -->
  <!-- 5 étapes à 72° d'écart, sens horaire depuis 12h (θ = 0, 72, 144, 216, 288). -->
  <text class="display graphite" x="600" y="452" font-size="16" font-style="italic" text-anchor="middle">5 moments dans la vie</text>
  <text class="display graphite" x="600" y="474" font-size="16" font-style="italic" text-anchor="middle">d'une skill</text>

  <!-- ===== FLÈCHES EN ARCS DE CERCLE (r=340) ===== -->
  <!-- Chaque arc parcourt 72° - 16° (8° de respiration de chaque côté) = 56° dans le sens horaire. -->
  <!-- Point sur cercle r=340 à l'angle θ (depuis 12h, horaire) : (600 + 340·sin θ, 460 - 340·cos θ). -->

  <!-- 1 → 2 : θ 8° → 64° -->
  <path d="M 647.3,123.3 A 340,340 0 0 1 905.6,311.0" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 2 → 3 : θ 80° → 136° -->
  <path d="M 934.8,401.0 A 340,340 0 0 1 836.2,704.6" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 3 → 4 : θ 152° → 208° -->
  <path d="M 759.6,760.2 A 340,340 0 0 1 440.4,760.2" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 4 → 5 : θ 224° → 280° -->
  <path d="M 363.8,704.6 A 340,340 0 0 1 265.2,401.0" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 5 → 1 : θ 296° → 352° -->
  <path d="M 294.4,311.0 A 340,340 0 0 1 552.7,123.3" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== ÉTAPE 1 — CRÉATION (top, θ=0°) ===== -->
  <!-- Centre (600, 180), rect à x=500 y=130 -->
  <g>
    <rect x="500" y="130" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="516" y="156" font-size="10" font-weight="600" letter-spacing="0.16em">01 CRÉATION</text>
    <text class="display ink" x="516" y="182" font-size="13" font-weight="600">Création</text>
    <text class="body graphite" x="516" y="204" font-size="9">fichier <tspan class="mono" font-size="9">SKILL.md</tspan> + frontmatter YAML</text>
  </g>

  <!-- ===== ÉTAPE 2 — ENREGISTREMENT (θ=72°) ===== -->
  <!-- Centre (866, 373.5), rect à x=766 y=323 -->
  <g>
    <rect x="766" y="323" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="782" y="349" font-size="10" font-weight="600" letter-spacing="0.16em">02 ENREGISTREMENT</text>
    <text class="display ink" x="782" y="375" font-size="13" font-weight="600">Enregistrement</text>
    <text class="body graphite" x="782" y="397" font-size="9"><tspan class="mono" font-size="9">.claude/skills/</tspan> ou plugin</text>
  </g>

  <!-- ===== ÉTAPE 3 — INVOCATION (carmine, θ=144°) ===== -->
  <!-- Centre (764.6, 686.5), rect à x=665 y=637 -->
  <g>
    <rect x="665" y="637" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <text class="mono carmine" x="681" y="663" font-size="10" font-weight="600" letter-spacing="0.16em">03 INVOCATION</text>
    <text class="display ink" x="681" y="689" font-size="13" font-weight="600">Invocation</text>
    <text class="body graphite" x="681" y="711" font-size="9">match auto sur <tspan class="mono" font-size="9">description</tspan></text>
    <text class="body graphite" x="681" y="725" font-size="9">ou /commande</text>
  </g>

  <!-- ===== ÉTAPE 4 — EXÉCUTION (θ=216°) ===== -->
  <!-- Centre (435.4, 686.5), rect à x=335 y=637 -->
  <g>
    <rect x="335" y="637" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="351" y="663" font-size="10" font-weight="600" letter-spacing="0.16em">04 EXÉCUTION</text>
    <text class="display ink" x="351" y="689" font-size="13" font-weight="600">Exécution</text>
    <text class="body graphite" x="351" y="711" font-size="9">instructions chargées dans le contexte</text>
  </g>

  <!-- ===== ÉTAPE 5 — VERSIONNEMENT (θ=288°) ===== -->
  <!-- Centre (333.7, 373.5), rect à x=234 y=323 -->
  <g>
    <rect x="234" y="323" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="250" y="349" font-size="10" font-weight="600" letter-spacing="0.16em">05 VERSIONNEMENT</text>
    <text class="display ink" x="250" y="375" font-size="13" font-weight="600">Versionnement</text>
    <text class="body graphite" x="250" y="397" font-size="9">git, plugins, partage cross-projets</text>
  </g>

  <!-- ===== ANNOTATION A — EXEMPLE DATA (haut-gauche, hors cercle) ===== -->
  <g>
    <rect x="30" y="160" width="190" height="150" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text class="mono mustard" x="44" y="180" font-size="9" font-weight="600" letter-spacing="0.16em">EXEMPLE A — DATA</text>
    <text class="display ink" x="44" y="202" font-size="11" font-weight="600">audit-dbt-schema</text>
    <text class="mono graphite" x="44" y="222" font-size="8">---</text>
    <text class="mono graphite" x="44" y="234" font-size="8">description: Audite</text>
    <text class="mono graphite" x="44" y="246" font-size="8">  un schéma dbt.</text>
    <text class="mono graphite" x="44" y="258" font-size="8">allowed-tools:</text>
    <text class="mono graphite" x="44" y="270" font-size="8">  [Read, Grep, Glob]</text>
    <text class="mono graphite" x="44" y="282" font-size="8">---</text>
    <text class="mono mustard" x="44" y="300" font-size="8">→ /audit-dbt-schema</text>
  </g>

  <!-- ===== ANNOTATION B — EXEMPLE TRANSVERSE (bas-droite, hors cercle) ===== -->
  <g>
    <rect x="970" y="500" width="200" height="180" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text class="mono mustard" x="984" y="520" font-size="9" font-weight="600" letter-spacing="0.16em">EXEMPLE B — TRANSVERSE</text>
    <text class="display ink" x="984" y="542" font-size="11" font-weight="600">synthese-pdf-5-bullets</text>
    <text class="mono graphite" x="984" y="562" font-size="8">---</text>
    <text class="mono graphite" x="984" y="574" font-size="8">description: Lit un PDF,</text>
    <text class="mono graphite" x="984" y="586" font-size="8">  en sort 5 bullets</text>
    <text class="mono graphite" x="984" y="598" font-size="8">  actionnables.</text>
    <text class="mono graphite" x="984" y="610" font-size="8">allowed-tools: [Read]</text>
    <text class="mono graphite" x="984" y="622" font-size="8">---</text>
    <text class="mono mustard" x="984" y="640" font-size="8">→ /synthese-pdf-5-bullets</text>
    <text class="mono mustard" x="984" y="652" font-size="8">  brief.pdf</text>
  </g>

  <!-- ===== FOOTER CAPTION ===== -->
  <line x1="60" y1="855" x2="1140" y2="855" stroke="#E5E1D8" stroke-width="1"/>
  <text class="display graphite" x="60" y="878" font-size="11" font-style="italic">« D'après documentation Anthropic et standard ouvert agentskills.io. »</text>
</svg>
