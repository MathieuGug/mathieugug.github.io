<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-03" role="img" aria-labelledby="schema-03-title">
  <title id="schema-03-title">Le cycle de vie d'une skill</title>
  <defs>
    <style><![CDATA[
      .display { font-family: 'Spectral', Georgia, serif; }
      .body { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .ink { fill: #1A1A1A; }
      .graphite { fill: #5A5A5A; }
      .carmine { fill: #B7332C; }
      .teal { fill: #1F5560; }
      .mustard { fill: #B58A2C; }
    ]]></style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- ===== HEADER ===== -->
  <text class="mono carmine" x="60" y="55" font-size="11" letter-spacing="0.18em" font-weight="600">SCHÉMA 03</text>
  <text class="display ink" x="60" y="92" font-size="24" font-weight="600">Le cycle de vie d'une skill</text>
  <text class="display graphite" x="60" y="118" font-size="14" font-style="italic">Cinq moments depuis la création d'un fichier .md jusqu'à son partage en équipe.</text>

  <!-- Hairline rule -->
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="1"/>

  <!-- ===== CENTRE ===== -->
  <text class="display graphite" x="600" y="438" font-size="16" font-style="italic" text-anchor="middle">5 moments dans la vie</text>
  <text class="display graphite" x="600" y="460" font-size="16" font-style="italic" text-anchor="middle">d'une skill</text>

  <!-- ===== FLÈCHES COURBES (1→2→3→4→5→1) — derrière les rects ===== -->
  <!-- Étape centres : 1=(300,270) 2=(900,270) 3=(1020,540) 4=(720,680) 5=(380,680) -->
  <!-- Bordures rect 200x100 : x ∈ [c-100, c+100], y ∈ [c-50, c+50] -->

  <!-- 1 → 2 : départ bord droit étape 1 (400,270), arrivée bord gauche étape 2 (800,270) ; courbe haute -->
  <path d="M 400 270 C 500 200, 700 200, 800 270" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 2 → 3 : départ bord droit/bas étape 2 (980,300), arrivée bord haut étape 3 (1020,490) -->
  <path d="M 980 300 C 1050 360, 1060 420, 1020 490" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 3 → 4 : départ bord bas/gauche étape 3 (980,580), arrivée bord droit étape 4 (820,680) -->
  <path d="M 980 580 C 940 640, 880 670, 820 680" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 4 → 5 : départ bord gauche étape 4 (620,680), arrivée bord droit étape 5 (480,680) ; courbe basse -->
  <path d="M 620 680 C 560 720, 540 720, 480 680" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 5 → 1 : départ bord haut étape 5 (380,630), arrivée bord bas étape 1 (300,320) ; courbe gauche -->
  <path d="M 380 630 C 280 560, 240 420, 300 320" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== ÉTAPE 1 — CRÉATION ===== -->
  <g>
    <rect x="200" y="220" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="216" y="246" font-size="10" font-weight="600" letter-spacing="0.16em">01 CRÉATION</text>
    <text class="display ink" x="216" y="272" font-size="13" font-weight="600">Création</text>
    <text class="body graphite" x="216" y="294" font-size="9">fichier <tspan class="mono" font-size="9">SKILL.md</tspan> + frontmatter YAML</text>
  </g>

  <!-- ===== ÉTAPE 2 — ENREGISTREMENT ===== -->
  <g>
    <rect x="800" y="220" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="816" y="246" font-size="10" font-weight="600" letter-spacing="0.16em">02 ENREGISTREMENT</text>
    <text class="display ink" x="816" y="272" font-size="13" font-weight="600">Enregistrement</text>
    <text class="body graphite" x="816" y="294" font-size="9"><tspan class="mono" font-size="9">.claude/skills/</tspan> ou plugin</text>
  </g>

  <!-- ===== ÉTAPE 3 — INVOCATION (carmine) ===== -->
  <g>
    <rect x="920" y="490" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <text class="mono carmine" x="936" y="516" font-size="10" font-weight="600" letter-spacing="0.16em">03 INVOCATION</text>
    <text class="display ink" x="936" y="542" font-size="13" font-weight="600">Invocation</text>
    <text class="body graphite" x="936" y="564" font-size="9">match auto sur <tspan class="mono" font-size="9">description</tspan></text>
    <text class="body graphite" x="936" y="578" font-size="9">ou /commande</text>
  </g>

  <!-- ===== ÉTAPE 4 — EXÉCUTION ===== -->
  <g>
    <rect x="620" y="630" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="636" y="656" font-size="10" font-weight="600" letter-spacing="0.16em">04 EXÉCUTION</text>
    <text class="display ink" x="636" y="682" font-size="13" font-weight="600">Exécution</text>
    <text class="body graphite" x="636" y="704" font-size="9">instructions chargées dans le contexte</text>
  </g>

  <!-- ===== ÉTAPE 5 — VERSIONNEMENT ===== -->
  <g>
    <rect x="280" y="630" width="200" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text class="mono teal" x="296" y="656" font-size="10" font-weight="600" letter-spacing="0.16em">05 VERSIONNEMENT</text>
    <text class="display ink" x="296" y="682" font-size="13" font-weight="600">Versionnement</text>
    <text class="body graphite" x="296" y="704" font-size="9">git, plugins, partage cross-projets</text>
  </g>

  <!-- ===== ANNOTATION A — EXEMPLE DATA (haut-gauche, près étape 1) ===== -->
  <g>
    <rect x="70" y="180" width="240" height="140" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text class="mono mustard" x="84" y="200" font-size="9" font-weight="600" letter-spacing="0.16em">EXEMPLE A — DATA</text>
    <text class="display ink" x="84" y="222" font-size="11" font-weight="600">audit-dbt-schema</text>
    <text class="mono graphite" x="84" y="242" font-size="8">---</text>
    <text class="mono graphite" x="84" y="254" font-size="8">description: Audite la cohérence</text>
    <text class="mono graphite" x="84" y="266" font-size="8">  d'un schéma dbt.</text>
    <text class="mono graphite" x="84" y="278" font-size="8">allowed-tools: [Read, Grep, Glob]</text>
    <text class="mono graphite" x="84" y="290" font-size="8">---</text>
    <text class="mono mustard" x="84" y="308" font-size="8">→ /audit-dbt-schema sur ./models/</text>
  </g>

  <!-- ===== ANNOTATION B — EXEMPLE TRANSVERSE (bas-droite, près étape 4) ===== -->
  <g>
    <rect x="840" y="350" width="240" height="140" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text class="mono mustard" x="854" y="370" font-size="9" font-weight="600" letter-spacing="0.16em">EXEMPLE B — TRANSVERSE</text>
    <text class="display ink" x="854" y="392" font-size="11" font-weight="600">synthese-pdf-5-bullets</text>
    <text class="mono graphite" x="854" y="412" font-size="8">---</text>
    <text class="mono graphite" x="854" y="424" font-size="8">description: Lit un PDF, en sort</text>
    <text class="mono graphite" x="854" y="436" font-size="8">  5 bullets actionnables.</text>
    <text class="mono graphite" x="854" y="448" font-size="8">allowed-tools: [Read]</text>
    <text class="mono graphite" x="854" y="460" font-size="8">---</text>
    <text class="mono mustard" x="854" y="478" font-size="8">→ /synthese-pdf-5-bullets brief.pdf</text>
  </g>

  <!-- ===== FOOTER CAPTION ===== -->
  <line x1="60" y1="755" x2="1140" y2="755" stroke="#E5E1D8" stroke-width="1"/>
  <text class="display graphite" x="60" y="778" font-size="11" font-style="italic">« D'après documentation Anthropic et standard ouvert agentskills.io. »</text>
</svg>
