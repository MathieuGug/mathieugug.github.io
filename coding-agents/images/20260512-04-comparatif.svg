<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" data-schema-id="schema-04" role="img" aria-label="Matrice comparative Claude Code, Codex CLI et GitHub Copilot sur six axes">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Times New Roman', serif; }
      .body { font-family: 'Inter', 'Helvetica', sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .interactive { cursor: pointer; }
      .interactive:hover .cell-bg { fill: #F2EEE4; }
      .interactive:focus { outline: none; }
      .interactive:focus .cell-bg { stroke: #1A1A1A; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="950" fill="#FAF8F3"/>

  <!-- Header -->
  <text class="mono" x="60" y="55" font-size="13" font-weight="600" fill="#B7332C" letter-spacing="2.5">SCHÉMA 04</text>
  <text class="display" x="60" y="92" font-size="28" font-weight="600" fill="#1A1A1A">Trois agents, trois philosophies</text>
  <text class="display" x="60" y="116" font-size="16" font-style="italic" fill="#5A5A5A">Claude Code, Codex CLI et GitHub Copilot comparés sur six axes structurants. Cellules cliquables pour le détail.</text>

  <!-- Hairline rule under header -->
  <line x1="60" y1="128" x2="1140" y2="128" stroke="#1A1A1A" stroke-width="0.6"/>

  <!-- Column headers -->
  <!-- Col 1 : Claude Code -->
  <text class="display" x="430" y="152" font-size="18" font-weight="600" fill="#B7332C" text-anchor="middle">Claude Code</text>
  <text class="mono" x="430" y="167" font-size="12" font-weight="600" fill="#5A5A5A" letter-spacing="1.6" text-anchor="middle">ANTHROPIC</text>

  <!-- Col 2 : Codex CLI -->
  <text class="display" x="700" y="152" font-size="18" font-weight="600" fill="#1F5560" text-anchor="middle">Codex CLI</text>
  <text class="mono" x="700" y="167" font-size="12" font-weight="600" fill="#5A5A5A" letter-spacing="1.6" text-anchor="middle">OPENAI</text>

  <!-- Col 3 : GitHub Copilot -->
  <text class="display" x="970" y="152" font-size="18" font-weight="600" fill="#B58A2C" text-anchor="middle">GitHub Copilot</text>
  <text class="mono" x="970" y="167" font-size="12" font-weight="600" fill="#5A5A5A" letter-spacing="1.6" text-anchor="middle">GITHUB / MICROSOFT</text>

  <!-- Hairline below column headers -->
  <line x1="60" y1="178" x2="1140" y2="178" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============================================ -->
  <!-- LIGNE 1 : PHILOSOPHIE -->
  <!-- ============================================ -->
  <text class="mono" x="60" y="206" font-size="12" font-weight="600" fill="#B7332C" letter-spacing="1.6">AXE 01 / PHILOSOPHIE</text>
  <text class="body" x="60" y="225" font-size="12" font-style="italic" fill="#5A5A5A">Ce qu'on lui demande</text>
  <text class="body" x="60" y="239" font-size="12" font-style="italic" fill="#5A5A5A">de faire en premier lieu.</text>

  <!-- Cell Claude philo -->
  <g class="interactive" data-card="cell-claude-philo" tabindex="0" role="button" aria-label="Claude Code, philosophie">
    <rect class="cell-bg" x="320" y="190" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="332" y="216" font-size="13" fill="#1A1A1A">Agent CLI multimodal,</text>
    <text class="body" x="332" y="232" font-size="13" fill="#1A1A1A">terminal comme contexte</text>
    <text class="body" x="332" y="248" font-size="13" fill="#1A1A1A">universel</text>
  </g>

  <!-- Cell Codex philo -->
  <g class="interactive" data-card="cell-codex-philo" tabindex="0" role="button" aria-label="Codex CLI, philosophie">
    <rect class="cell-bg" x="590" y="190" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="602" y="216" font-size="13" fill="#1A1A1A">Agent CLI sandbox-first,</text>
    <text class="body" x="602" y="232" font-size="13" fill="#1A1A1A">isolation OS-niveau</text>
  </g>

  <!-- Cell Copilot philo -->
  <g class="interactive" data-card="cell-copilot-philo" tabindex="0" role="button" aria-label="GitHub Copilot, philosophie">
    <rect class="cell-bg" x="860" y="190" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="872" y="216" font-size="13" fill="#1A1A1A">IDE-natif évolué +</text>
    <text class="body" x="872" y="232" font-size="13" fill="#1A1A1A">plateforme</text>
    <text class="body" x="872" y="248" font-size="13" fill="#1A1A1A">d'orchestration</text>
  </g>

  <line x1="60" y1="278" x2="1140" y2="278" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============================================ -->
  <!-- LIGNE 2 : CONTEXTE -->
  <!-- ============================================ -->
  <text class="mono" x="60" y="306" font-size="12" font-weight="600" fill="#B7332C" letter-spacing="1.6">AXE 02 / CONTEXTE</text>
  <text class="body" x="60" y="325" font-size="12" font-style="italic" fill="#5A5A5A">Ce qu'il voit, lit, mémorise</text>
  <text class="body" x="60" y="339" font-size="12" font-style="italic" fill="#5A5A5A">de votre projet.</text>

  <!-- Cell Claude contexte -->
  <g class="interactive" data-card="cell-claude-contexte" tabindex="0" role="button" aria-label="Claude Code, contexte">
    <rect class="cell-bg" x="320" y="290" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="332" y="316" font-size="13" fill="#1A1A1A">Projet entier, CLAUDE.md</text>
    <text class="body" x="332" y="332" font-size="13" fill="#1A1A1A">hiérarchisé, mémoire</text>
    <text class="body" x="332" y="348" font-size="13" fill="#1A1A1A">persistante</text>
  </g>

  <!-- Cell Codex contexte -->
  <g class="interactive" data-card="cell-codex-contexte" tabindex="0" role="button" aria-label="Codex CLI, contexte">
    <rect class="cell-bg" x="590" y="290" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="602" y="316" font-size="13" fill="#1A1A1A">Sandbox isolée par</text>
    <text class="body" x="602" y="332" font-size="13" fill="#1A1A1A">session,</text>
    <text class="mono" x="602" y="350" font-size="12" fill="#1A1A1A">~/.codex/config.toml</text>
  </g>

  <!-- Cell Copilot contexte -->
  <g class="interactive" data-card="cell-copilot-contexte" tabindex="0" role="button" aria-label="GitHub Copilot, contexte">
    <rect class="cell-bg" x="860" y="290" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="872" y="316" font-size="13" fill="#1A1A1A">Fichier ouvert +</text>
    <text class="body" x="872" y="332" font-size="13" fill="#1A1A1A">workspace + GitHub</text>
    <text class="body" x="872" y="348" font-size="13" fill="#1A1A1A">repo</text>
  </g>

  <line x1="60" y1="378" x2="1140" y2="378" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============================================ -->
  <!-- LIGNE 3 : SKILLS -->
  <!-- ============================================ -->
  <text class="mono" x="60" y="406" font-size="12" font-weight="600" fill="#B7332C" letter-spacing="1.6">AXE 03 / SKILLS</text>
  <text class="body" x="60" y="425" font-size="12" font-style="italic" fill="#5A5A5A">Modules réutilisables que</text>
  <text class="body" x="60" y="439" font-size="12" font-style="italic" fill="#5A5A5A">l'agent invoque tout seul.</text>

  <!-- Cell Claude skills (avec badge ★ NATIF) -->
  <g class="interactive" data-card="cell-claude-skills" tabindex="0" role="button" aria-label="Claude Code, skills">
    <rect class="cell-bg" x="320" y="390" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="332" y="416" font-size="13" font-weight="600" fill="#1A1A1A">OUI</text>
    <text class="body" x="332" y="432" font-size="13" fill="#1A1A1A">Système 1ère classe</text>
    <text class="body" x="332" y="448" font-size="13" fill="#1A1A1A">(frontmatter .md,</text>
    <text class="body" x="332" y="464" font-size="13" fill="#1A1A1A">hot-reload)</text>
    <!-- Badge ★ NATIF -->
    <rect x="462" y="396" width="70" height="18" rx="2" fill="#B7332C"/>
    <text class="mono" x="497" y="409" font-size="11" font-weight="600" fill="#FAF8F3" letter-spacing="0.6" text-anchor="middle">★ NATIF</text>
  </g>

  <!-- Cell Codex skills -->
  <g class="interactive" data-card="cell-codex-skills" tabindex="0" role="button" aria-label="Codex CLI, skills">
    <rect class="cell-bg" x="590" y="390" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="602" y="416" font-size="13" fill="#1A1A1A">Limité (prompts</text>
    <text class="body" x="602" y="432" font-size="13" fill="#1A1A1A">persistants, profils</text>
    <text class="body" x="602" y="448" font-size="13" fill="#1A1A1A">nommés)</text>
  </g>

  <!-- Cell Copilot skills -->
  <g class="interactive" data-card="cell-copilot-skills" tabindex="0" role="button" aria-label="GitHub Copilot, skills">
    <rect class="cell-bg" x="860" y="390" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="872" y="416" font-size="13" fill="#1A1A1A">Pas de skills, mais</text>
    <text class="body" x="872" y="432" font-size="13" fill="#1A1A1A">extensions VS Code</text>
  </g>

  <line x1="60" y1="478" x2="1140" y2="478" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============================================ -->
  <!-- LIGNE 4 : MCP -->
  <!-- ============================================ -->
  <text class="mono" x="60" y="506" font-size="12" font-weight="600" fill="#B7332C" letter-spacing="1.6">AXE 04 / MCP</text>
  <text class="body" x="60" y="525" font-size="12" font-style="italic" fill="#5A5A5A">Model Context Protocol :</text>
  <text class="body" x="60" y="539" font-size="12" font-style="italic" fill="#5A5A5A">brancher des outils tiers.</text>

  <!-- Cell Claude MCP (avec badge ★ NATIF) -->
  <g class="interactive" data-card="cell-claude-mcp" tabindex="0" role="button" aria-label="Claude Code, MCP">
    <rect class="cell-bg" x="320" y="490" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="332" y="516" font-size="13" font-weight="600" fill="#1A1A1A">OUI</text>
    <text class="body" x="332" y="532" font-size="13" fill="#1A1A1A">Natif depuis 2024,</text>
    <text class="body" x="332" y="548" font-size="13" fill="#1A1A1A">ecosystem le plus large</text>
    <!-- Badge ★ NATIF -->
    <rect x="462" y="496" width="70" height="18" rx="2" fill="#B7332C"/>
    <text class="mono" x="497" y="509" font-size="11" font-weight="600" fill="#FAF8F3" letter-spacing="0.6" text-anchor="middle">★ NATIF</text>
  </g>

  <!-- Cell Codex MCP -->
  <g class="interactive" data-card="cell-codex-mcp" tabindex="0" role="button" aria-label="Codex CLI, MCP">
    <rect class="cell-bg" x="590" y="490" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="602" y="516" font-size="13" fill="#1A1A1A">OUI — natif premier</text>
    <text class="body" x="602" y="532" font-size="13" fill="#1A1A1A">rang depuis mai 2026</text>
    <text class="body" x="602" y="548" font-size="13" fill="#1A1A1A">(v0.130)</text>
  </g>

  <!-- Cell Copilot MCP -->
  <g class="interactive" data-card="cell-copilot-mcp" tabindex="0" role="button" aria-label="GitHub Copilot, MCP">
    <rect class="cell-bg" x="860" y="490" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="872" y="516" font-size="13" fill="#1A1A1A">OUI — GA dans</text>
    <text class="body" x="872" y="532" font-size="13" fill="#1A1A1A">VS Code juillet 2025</text>
  </g>

  <line x1="60" y1="578" x2="1140" y2="578" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============================================ -->
  <!-- LIGNE 5 : PRIX -->
  <!-- ============================================ -->
  <text class="mono" x="60" y="606" font-size="12" font-weight="600" fill="#B7332C" letter-spacing="1.6">AXE 05 / PRIX</text>
  <text class="body" x="60" y="625" font-size="12" font-style="italic" fill="#5A5A5A">Tarif mensuel grand public,</text>
  <text class="body" x="60" y="639" font-size="12" font-style="italic" fill="#5A5A5A">hors entreprise.</text>

  <!-- Cell Claude prix -->
  <g class="interactive" data-card="cell-claude-prix" tabindex="0" role="button" aria-label="Claude Code, prix">
    <rect class="cell-bg" x="320" y="590" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="332" y="616" font-size="13" fill="#1A1A1A">Pro 20$,</text>
    <text class="body" x="332" y="632" font-size="13" fill="#1A1A1A">Max 100-200$/mois</text>
  </g>

  <!-- Cell Codex prix -->
  <g class="interactive" data-card="cell-codex-prix" tabindex="0" role="button" aria-label="Codex CLI, prix">
    <rect class="cell-bg" x="590" y="590" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="602" y="616" font-size="13" fill="#1A1A1A">Inclus dans ChatGPT</text>
    <text class="body" x="602" y="632" font-size="13" fill="#1A1A1A">Plus 20$,</text>
    <text class="body" x="602" y="648" font-size="13" fill="#1A1A1A">Pro 100-200$</text>
  </g>

  <!-- Cell Copilot prix -->
  <g class="interactive" data-card="cell-copilot-prix" tabindex="0" role="button" aria-label="GitHub Copilot, prix">
    <rect class="cell-bg" x="860" y="590" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="872" y="616" font-size="13" fill="#1A1A1A">Pro 10$,</text>
    <text class="body" x="872" y="632" font-size="13" fill="#1A1A1A">Pro+ 39$/mois</text>
  </g>

  <line x1="60" y1="678" x2="1140" y2="678" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============================================ -->
  <!-- LIGNE 6 : SÉCURITÉ -->
  <!-- ============================================ -->
  <text class="mono" x="60" y="706" font-size="12" font-weight="600" fill="#B7332C" letter-spacing="1.6">AXE 06 / SÉCURITÉ</text>
  <text class="body" x="60" y="725" font-size="12" font-style="italic" fill="#5A5A5A">Comment l'agent est borné</text>
  <text class="body" x="60" y="739" font-size="12" font-style="italic" fill="#5A5A5A">sur votre machine.</text>

  <!-- Cell Claude securite -->
  <g class="interactive" data-card="cell-claude-securite" tabindex="0" role="button" aria-label="Claude Code, sécurité">
    <rect class="cell-bg" x="320" y="690" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="332" y="716" font-size="13" fill="#1A1A1A">Permissions explicites</text>
    <text class="body" x="332" y="732" font-size="13" fill="#1A1A1A">+ 6 modes (default,</text>
    <text class="body" x="332" y="748" font-size="13" fill="#1A1A1A">auto, plan, ...)</text>
  </g>

  <!-- Cell Codex securite (avec badge ★ SANDBOX OS teal) -->
  <g class="interactive" data-card="cell-codex-securite" tabindex="0" role="button" aria-label="Codex CLI, sécurité">
    <rect class="cell-bg" x="590" y="690" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="602" y="716" font-size="13" font-weight="600" fill="#1A1A1A">Sandbox OS</text>
    <text class="body" x="602" y="732" font-size="13" fill="#1A1A1A">(Seatbelt macOS,</text>
    <text class="body" x="602" y="748" font-size="13" fill="#1A1A1A">bwrap Linux) + 3 modes</text>
    <!-- Badge ★ SANDBOX OS -->
    <rect x="694" y="696" width="112" height="18" rx="2" fill="#1F5560"/>
    <text class="mono" x="750" y="709" font-size="11" font-weight="600" fill="#FAF8F3" letter-spacing="0.6" text-anchor="middle">★ SANDBOX OS</text>
  </g>

  <!-- Cell Copilot securite (avec badge ⚠ LARGE mustard) -->
  <g class="interactive" data-card="cell-copilot-securite" tabindex="0" role="button" aria-label="GitHub Copilot, sécurité">
    <rect class="cell-bg" x="860" y="690" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text class="body" x="872" y="716" font-size="13" fill="#1A1A1A">Token GitHub (large</text>
    <text class="body" x="872" y="732" font-size="13" fill="#1A1A1A">scope), MCP off par</text>
    <text class="body" x="872" y="748" font-size="13" fill="#1A1A1A">défaut Bus./Enterprise</text>
    <!-- Badge ⚠ LARGE -->
    <rect x="1004" y="696" width="76" height="18" rx="2" fill="#B58A2C"/>
    <text class="mono" x="1042" y="709" font-size="11" font-weight="600" fill="#FAF8F3" letter-spacing="0.6" text-anchor="middle">⚠ LARGE</text>
  </g>

  <line x1="60" y1="778" x2="1140" y2="778" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Légende bas-gauche -->
  <text class="body" x="60" y="810" font-size="12" font-style="italic" fill="#5A5A5A">Cliquez sur une cellule pour les détails.</text>
  <text class="body" x="60" y="826" font-size="12" font-style="italic" fill="#5A5A5A">Les ★ marquent une force structurelle.</text>
  <text class="body" x="60" y="842" font-size="12" font-style="italic" fill="#5A5A5A">Le ⚠ signale un point de vigilance.</text>

  <!-- Footer caption -->
  <line x1="60" y1="858" x2="1140" y2="858" stroke="#1A1A1A" stroke-width="0.6"/>
  <text class="body" x="60" y="880" font-size="12" font-style="italic" fill="#5A5A5A">Sources : documentation officielle Anthropic, OpenAI, GitHub (2026-05). Pricing daté du 2026-05-10.</text>
</svg>
