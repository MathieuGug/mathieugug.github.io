<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1050" data-schema-id="schema-05" role="img" aria-labelledby="schema-05-title schema-05-desc">
  <title id="schema-05-title">La pyramide des cas d'usage des coding agents</title>
  <desc id="schema-05-desc">Trois étages — transverse pour tous, data quotidien, data expert — qui ordonnent la technicité des cas d'usage, pas leur valeur.</desc>

  <defs>
    <style>
      .display { font-family: 'Spectral', 'Source Serif Pro', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .interactive { cursor: pointer; outline: none; }
      .interactive:focus-visible > .stage-frame,
      .interactive:hover > .stage-frame { filter: brightness(0.97); }
    </style>
  </defs>

  <!-- Paper background -->
  <rect x="0" y="0" width="1200" height="1050" fill="#FAF8F3"/>

  <!-- ============ HEADER ============ -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A">La pyramide des cas d'usage</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Trois étages, trois publics. Le sommet n'est pas mieux : il est plus technique. Les chevauchements sont la règle, pas l'exception.</text>

  <!-- Hairline rule -->
  <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- ============ ÉTAGE 3 — DATA EXPERT (HAUT) ============ -->
  <g class="interactive" data-card="etage-expert" tabindex="0" role="button" aria-label="Étage 3 — Data expert">
    <polygon class="stage-frame"
             points="380,460 820,460 700,280 500,280"
             fill="#B7332C" fill-opacity="0.10"
             stroke="#B7332C" stroke-width="1.5"/>

    <text x="600" y="304" class="mono" font-size="12" font-weight="600" fill="#B7332C"
          letter-spacing="0.16em" text-anchor="middle">ÉTAGE 3 · DATA EXPERT</text>
    <text x="600" y="322" class="body" font-size="13" font-style="italic" fill="#5A5A5A"
          text-anchor="middle">data engineers, MLOps, scientists seniors, refacto critique</text>

    <!-- Rangée haute (y=350) : 2 cas -->
    <g>
      <rect x="445" y="332" width="95" height="36" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
      <text x="492.5" y="354" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Pipelines ETL/dbt</text>

      <rect x="660" y="332" width="95" height="36" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
      <text x="707.5" y="354" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Refacto repo</text>
    </g>

    <!-- Rangée basse (y=400) : 2 cas -->
    <g>
      <rect x="445" y="382" width="95" height="36" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
      <text x="492.5" y="404" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Audits sécu</text>

      <rect x="660" y="382" width="95" height="36" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
      <text x="707.5" y="404" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">MLOps + tests</text>
    </g>
  </g>

  <!-- ============ ÉTAGE 2 — DATA QUOTIDIEN (MILIEU) ============ -->
  <g class="interactive" data-card="etage-quotidien" tabindex="0" role="button" aria-label="Étage 2 — Data quotidien">
    <polygon class="stage-frame"
             points="300,640 900,640 820,460 380,460"
             fill="#1F5560" fill-opacity="0.10"
             stroke="#1F5560" stroke-width="1.25"/>

    <text x="600" y="487" class="mono" font-size="12" font-weight="600" fill="#1F5560"
          letter-spacing="0.16em" text-anchor="middle">ÉTAGE 2 · DATA QUOTIDIEN</text>
    <text x="600" y="505" class="body" font-size="13" font-style="italic" fill="#5A5A5A"
          text-anchor="middle">data analysts, BI, scientists junior, scripts ad hoc</text>

    <!-- 5 cas en une rangée (y=560), rect 100x38 -->
    <g>
      <rect x="335" y="541" width="100" height="38" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
      <text x="385" y="564" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">SQL ad hoc</text>

      <rect x="445" y="541" width="100" height="38" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
      <text x="495" y="564" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Notebooks Jupyter</text>

      <rect x="555" y="541" width="100" height="38" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
      <text x="605" y="564" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Transfo CSV</text>

      <rect x="665" y="541" width="100" height="38" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
      <text x="715" y="564" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Dashboards</text>

      <rect x="775" y="541" width="100" height="38" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
      <text x="825" y="564" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Scripts ponctuels</text>
    </g>
  </g>

  <!-- ============ ÉTAGE 1 — TRANSVERSE / TOUS (BAS) ============ -->
  <g class="interactive" data-card="etage-transverse" tabindex="0" role="button" aria-label="Étage 1 — Transverse pour tous">
    <polygon class="stage-frame"
             points="200,820 1000,820 900,640 300,640"
             fill="#2F5D3F" fill-opacity="0.08"
             stroke="#2F5D3F" stroke-width="1.25"/>

    <text x="600" y="668" class="mono" font-size="12" font-weight="600" fill="#2F5D3F"
          letter-spacing="0.16em" text-anchor="middle">ÉTAGE 1 · TRANSVERSE / TOUS</text>
    <text x="600" y="686" class="body" font-size="13" font-style="italic" fill="#5A5A5A"
          text-anchor="middle">fonctions support, tâches communes à tous les profils</text>

    <!-- Rangée haute (y=712), 3 cas, rect 110x40 -->
    <g>
      <rect x="365" y="712" width="110" height="40" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="420" y="736" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Rédaction longue</text>

      <rect x="545" y="712" width="110" height="40" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="600" y="736" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Slides</text>

      <rect x="725" y="712" width="110" height="40" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="780" y="736" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Veille</text>
    </g>

    <!-- Rangée basse (y=762), 3 cas, rect 110x40 -->
    <g>
      <rect x="365" y="762" width="110" height="40" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="420" y="786" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Brief client</text>

      <rect x="545" y="762" width="110" height="40" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="600" y="786" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Mails complexes</text>

      <rect x="725" y="762" width="110" height="40" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="780" y="786" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Recherche doc</text>
    </g>
  </g>

  <!-- ============ STICKERS "outil le plus adapté" — marge gauche ============ -->
  <!-- Layout 2 lignes (mono caps + body 600), rect 180x42, rx=2.
       x=20 → x=200 (largeur 180). Bord droit du sticker = x=200.
       Étage 3 : bord gauche du trapèze à y=370 ≈ x=432 → leader line de x=200 à x=432.
       Étage 2 : bord gauche du trapèze à y=550 ≈ x=339 → leader line de x=200 à x=339.
       Étage 1 : bord gauche du trapèze à y=730 ≈ x=243 → leader line de x=200 à x=243. -->

  <!-- Sticker Étage 3 — carmine (y centre = 370) -->
  <g>
    <rect x="20" y="349" width="180" height="42" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <text x="110" y="365" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.12em" text-anchor="middle">OUTIL LE PLUS ADAPTÉ</text>
    <text x="110" y="381" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Claude Code · Codex CLI</text>
    <line x1="200" y1="370" x2="432" y2="370" stroke="#5A5A5A" stroke-width="0.75"/>
  </g>

  <!-- Sticker Étage 2 — teal (y centre = 550) -->
  <g>
    <rect x="20" y="529" width="180" height="42" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="110" y="545" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.12em" text-anchor="middle">OUTIL LE PLUS ADAPTÉ</text>
    <text x="110" y="561" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Claude Code · Copilot</text>
    <line x1="200" y1="550" x2="339" y2="550" stroke="#5A5A5A" stroke-width="0.75"/>
  </g>

  <!-- Sticker Étage 1 — forest (y centre = 730) -->
  <g>
    <rect x="20" y="709" width="180" height="42" rx="2" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
    <text x="110" y="725" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.12em" text-anchor="middle">OUTIL LE PLUS ADAPTÉ</text>
    <text x="110" y="741" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Tous outils</text>
    <line x1="200" y1="730" x2="243" y2="730" stroke="#5A5A5A" stroke-width="0.75"/>
  </g>

  <!-- ============ NOTE EXPLICITE — chevauchements ============ -->
  <text x="600" y="860" class="body" font-size="13" font-style="italic" fill="#5A5A5A" text-anchor="middle">« Les chevauchements sont assumés : un data engineer utilise aussi le bas, un consultant aussi le haut.</text>
  <text x="600" y="876" class="body" font-size="13" font-style="italic" fill="#5A5A5A" text-anchor="middle">La pyramide ordonne la technicité, pas la valeur. »</text>

  <!-- ============ FOOTER ============ -->
  <line x1="60" y1="940" x2="1140" y2="940" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="968" class="body" font-size="13" font-style="italic" fill="#5A5A5A">« Cadre éditorial de l'auteur, illustré sur des cas observés (Stack Overflow Survey 2025, retex Block, Stripe, Anthropic). »</text>
</svg>
