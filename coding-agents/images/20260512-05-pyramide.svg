<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100" data-schema-id="schema-05" role="img" aria-labelledby="schema-05-title schema-05-desc">
  <title id="schema-05-title">La pyramide des cas d'usage des coding agents</title>
  <desc id="schema-05-desc">Quatre étages — transverse pour tous, data quotidien, data expert, produit / décideurs au sommet — qui ordonnent la posture face à l'agent, pas la valeur des cas d'usage.</desc>

  <defs>
    <style>
      .display { font-family: 'Spectral', 'Source Serif Pro', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .interactive { cursor: pointer; outline: none; }
      .interactive:focus-visible > .stage-frame,
      .interactive:hover > .stage-frame { filter: brightness(0.97); }
    </style>
  </defs>

  <!-- Paper background -->
  <rect x="0" y="0" width="1200" height="1100" fill="#FAF8F3"/>

  <!-- ============ HEADER ============ -->
  <g class="svg-header"><text x="60" y="55" class="mono" font-size="13" font-weight="600" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A">La pyramide des cas d'usage</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Quatre étages, quatre postures. Du transverse au stratégique. Les chevauchements sont la règle, pas l'exception.</text>

  <!-- Hairline rule --></g>
  <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- ============ SILHOUETTE UNIFIÉE (trapèze pyramide) + 3 DIVIDERS ============ -->
  <!-- Pente régulière ±0.6 (= (200−560)/(860−260)). Apex « plat » 560→640 à y=260.
       Pas de rupture sur les lignes : un seul tracé en silhouette + 3 lignes internes. -->
  <path d="M 560,260 L 640,260 L 1000,860 L 200,860 Z" fill="none" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="476" y1="400" x2="724" y2="400" stroke="#5A5A5A" stroke-width="0.75"/>
  <line x1="380" y1="560" x2="820" y2="560" stroke="#5A5A5A" stroke-width="0.75"/>
  <line x1="284" y1="720" x2="916" y2="720" stroke="#5A5A5A" stroke-width="0.75"/>

  <!-- ============ ÉTAGE 4 — PRODUIT / DÉCIDEURS (SOMMET) ============ -->
  <g class="interactive" data-card="etage-produit-decideurs" tabindex="0" role="button" aria-label="Étage 4 — Produit / décideurs">
    <polygon class="stage-frame"
             points="476,400 724,400 640,260 560,260"
             fill="#B58A2C" fill-opacity="0.15"
             stroke="none"/>

    <text x="600" y="290" class="mono" font-size="12" font-weight="600" fill="#B58A2C"
          letter-spacing="0.16em" text-anchor="middle">ÉTAGE 4 · PRODUIT / DÉCIDEURS</text>
    <text x="600" y="308" class="body" font-size="13" font-style="italic" fill="#5A5A5A"
          text-anchor="middle">managers, PO, chefs de projet — cadrent l'usage</text>

    <!-- 2 cas en rangées -->
    <g>
      <rect x="530" y="325" width="140" height="30" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
      <text x="600" y="344" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Cadrage permissions</text>

      <rect x="530" y="360" width="140" height="30" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
      <text x="600" y="379" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Audit / Brief specs</text>
    </g>
  </g>

  <!-- ============ ÉTAGE 3 — DATA EXPERT ============ -->
  <g class="interactive" data-card="etage-expert" tabindex="0" role="button" aria-label="Étage 3 — Data expert">
    <polygon class="stage-frame"
             points="380,560 820,560 724,400 476,400"
             fill="#B7332C" fill-opacity="0.15"
             stroke="none"/>

    <text x="600" y="425" class="mono" font-size="12" font-weight="600" fill="#B7332C"
          letter-spacing="0.16em" text-anchor="middle">ÉTAGE 3 · DATA EXPERT</text>
    <text x="600" y="443" class="body" font-size="13" font-style="italic" fill="#5A5A5A"
          text-anchor="middle">data engineers, MLOps, scientists seniors, refacto critique</text>

    <!-- Rangée haute (y=460) : 2 cas, rect 95x28 -->
    <g>
      <rect x="450" y="460" width="95" height="28" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
      <text x="497.5" y="478" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Pipelines ETL/dbt</text>

      <rect x="655" y="460" width="95" height="28" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
      <text x="702.5" y="478" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Refacto repo</text>
    </g>

    <!-- Rangée basse (y=505) : 2 cas, rect 95x28 -->
    <g>
      <rect x="450" y="505" width="95" height="28" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
      <text x="497.5" y="523" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Audits sécu</text>

      <rect x="655" y="505" width="95" height="28" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
      <text x="702.5" y="523" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">MLOps + tests</text>
    </g>
  </g>

  <!-- ============ ÉTAGE 2 — DATA QUOTIDIEN ============ -->
  <g class="interactive" data-card="etage-quotidien" tabindex="0" role="button" aria-label="Étage 2 — Data quotidien">
    <polygon class="stage-frame"
             points="284,720 916,720 820,560 380,560"
             fill="#1F5560" fill-opacity="0.15"
             stroke="none"/>

    <text x="600" y="587" class="mono" font-size="12" font-weight="600" fill="#1F5560"
          letter-spacing="0.16em" text-anchor="middle">ÉTAGE 2 · DATA QUOTIDIEN</text>
    <text x="600" y="605" class="body" font-size="13" font-style="italic" fill="#5A5A5A"
          text-anchor="middle">data analysts, BI, scientists junior, scripts ad hoc</text>

    <!-- 5 cas en une rangée (y=640), rect 100x30 -->
    <g>
      <rect x="335" y="640" width="100" height="30" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
      <text x="385" y="659" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">SQL ad hoc</text>

      <rect x="445" y="640" width="100" height="30" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
      <text x="495" y="659" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Notebooks</text>

      <rect x="555" y="640" width="100" height="30" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
      <text x="605" y="659" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Transfo CSV</text>

      <rect x="665" y="640" width="100" height="30" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
      <text x="715" y="659" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Dashboards</text>

      <rect x="775" y="640" width="100" height="30" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
      <text x="825" y="659" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Scripts ponct.</text>
    </g>
  </g>

  <!-- ============ ÉTAGE 1 — TRANSVERSE / TOUS (BAS) ============ -->
  <g class="interactive" data-card="etage-transverse" tabindex="0" role="button" aria-label="Étage 1 — Transverse pour tous">
    <polygon class="stage-frame"
             points="200,860 1000,860 916,720 284,720"
             fill="#2F5D3F" fill-opacity="0.13"
             stroke="none"/>

    <text x="600" y="745" class="mono" font-size="12" font-weight="600" fill="#2F5D3F"
          letter-spacing="0.16em" text-anchor="middle">ÉTAGE 1 · TRANSVERSE / TOUS</text>
    <text x="600" y="763" class="body" font-size="13" font-style="italic" fill="#5A5A5A"
          text-anchor="middle">fonctions support, tâches communes à tous les profils</text>

    <!-- Rangée haute (y=778), 3 cas, rect 110x30 -->
    <g>
      <rect x="370" y="778" width="110" height="30" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="425" y="797" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Rédaction longue</text>

      <rect x="545" y="778" width="110" height="30" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="600" y="797" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Slides</text>

      <rect x="720" y="778" width="110" height="30" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="775" y="797" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Veille</text>
    </g>

    <!-- Rangée basse (y=815), 3 cas, rect 110x30 -->
    <g>
      <rect x="370" y="815" width="110" height="30" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="425" y="834" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Brief client</text>

      <rect x="545" y="815" width="110" height="30" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="600" y="834" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Mails complexes</text>

      <rect x="720" y="815" width="110" height="30" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="775" y="834" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Recherche doc</text>
    </g>
  </g>

  <!-- ============ STICKERS "outil le plus adapté" — marge gauche ============ -->
  <!-- Layout 2 lignes (mono caps + body 600), rect 180x42, rx=2.
       x=20 → x=200 (largeur 180). Bord droit du sticker = x=200.
       Centres verticaux par étage : 4 → y≈330 ; 3 → y≈480 ; 2 → y≈640 ; 1 → y≈790.
       Bord gauche du trapèze à ces y : étage 4 y=330 → x≈530 ; étage 3 y=480 → x≈432 ; étage 2 y=640 → x≈335 ; étage 1 y=790 → x≈240. -->

  <!-- Sticker Étage 4 — mustard (y centre = 330) -->
  <g>
    <rect x="20" y="309" width="180" height="42" rx="2" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text x="110" y="325" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.12em" text-anchor="middle">OUTIL LE PLUS ADAPTÉ</text>
    <text x="110" y="341" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Claude Code · Copilot Pro+</text>
    <line x1="200" y1="330" x2="530" y2="330" stroke="#5A5A5A" stroke-width="0.75"/>
  </g>

  <!-- Sticker Étage 3 — carmine (y centre = 480) -->
  <g>
    <rect x="20" y="459" width="180" height="42" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <text x="110" y="475" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.12em" text-anchor="middle">OUTIL LE PLUS ADAPTÉ</text>
    <text x="110" y="491" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Claude Code · Codex CLI</text>
    <line x1="200" y1="480" x2="432" y2="480" stroke="#5A5A5A" stroke-width="0.75"/>
  </g>

  <!-- Sticker Étage 2 — teal (y centre = 640) -->
  <g>
    <rect x="20" y="619" width="180" height="42" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="110" y="635" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.12em" text-anchor="middle">OUTIL LE PLUS ADAPTÉ</text>
    <text x="110" y="651" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Claude Code · Copilot</text>
    <line x1="200" y1="640" x2="335" y2="640" stroke="#5A5A5A" stroke-width="0.75"/>
  </g>

  <!-- Sticker Étage 1 — forest (y centre = 790) -->
  <g>
    <rect x="20" y="769" width="180" height="42" rx="2" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
    <text x="110" y="785" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.12em" text-anchor="middle">OUTIL LE PLUS ADAPTÉ</text>
    <text x="110" y="801" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Tous outils</text>
    <line x1="200" y1="790" x2="240" y2="790" stroke="#5A5A5A" stroke-width="0.75"/>
  </g>

  <!-- ============ NOTE EXPLICITE — chevauchements ============ -->
  <text x="600" y="910" class="body" font-size="13" font-style="italic" fill="#5A5A5A" text-anchor="middle">« Les chevauchements sont la règle : un manager utilise aussi le bas, un consultant fait parfois du haut, un data engineer cadre aussi des permissions.</text>
  <text x="600" y="928" class="body" font-size="13" font-style="italic" fill="#5A5A5A" text-anchor="middle">La pyramide ordonne la posture face à l'agent — utilisateur quotidien, expert technique, leader stratégique —, pas la valeur. »</text>

  <!-- ============ FOOTER (hidden in slideshow via .svg-footer CSS) ============ -->
  <g class="svg-footer">
    <line x1="60" y1="990" x2="1140" y2="990" stroke="#E5E1D8" stroke-width="1"/>
    <text x="60" y="1018" class="body" font-size="13" font-style="italic" fill="#5A5A5A">« Cadre éditorial de l'auteur, illustré sur des cas observés (Stack Overflow Survey 2025, retex Block, Stripe, Anthropic). »</text>
  </g>
</svg>
