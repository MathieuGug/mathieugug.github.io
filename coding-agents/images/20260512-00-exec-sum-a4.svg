<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 1188" data-schema-id="schema-00" role="img" aria-labelledby="schema-00-title schema-00-desc">
  <title id="schema-00-title">Exec sum visuelle — Coding agents 2026, 5 modèles mentaux</title>
  <desc id="schema-00-desc">Infographie A4 portrait. Cinq modèles mentaux à retenir : la timeline du copilote au collègue (2018 autocomplete → 2022 assistant IDE → 2026 coding agent) ; le paysage à trois outils dominants ; l'anatomie en six rouages plus deux substrats transversaux ; la pyramide d'usage à quatre étages avec exemples concrets par étage ; les gains contradictoires distingués selon le contexte (greenfield, codebase mature, amplificateur).</desc>

  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
    <marker id="arr-tl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a83e55"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="840" height="1188" fill="#faf6ec"/>

  <!-- ============ HEADER ============ -->
  <text x="60" y="56" class="mono" font-size="12" font-weight="600" fill="#a83e55" letter-spacing="0.20em">CODING AGENTS · 12 MAI 2026</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1e1e2a">Cinq modèles mentaux à retenir</text>
  <text x="60" y="128" class="display" font-size="15" font-style="italic" fill="#6b6f7c">Trois outils qui ressemblent à des copilotes mais opèrent comme des collègues.</text>

  <line x1="60" y1="148" x2="780" y2="148" stroke="rgba(30,30,42,0.16)" stroke-width="1"/>

  <!-- ============ MSG 01 — Timeline du copilote au collègue (visual metaphor) ============ -->
  <g>
    <circle cx="84" cy="184" r="20" fill="none" stroke="#a83e55" stroke-width="1.5"/>
    <text x="84" y="191" class="mono" font-size="15" font-weight="600" fill="#a83e55" text-anchor="middle">01</text>

    <text x="120" y="179" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">LA RUPTURE</text>
    <text x="120" y="200" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Du copilote au collègue. Trois sauts d'échelle.</text>

    <!-- TIMELINE 3 phases avec colonnes : contexte / boucle / livrable -->
    <g transform="translate(60, 224)">
      <!-- Axe temporel -->
      <line x1="0" y1="14" x2="720" y2="14" stroke="#a83e55" stroke-width="1.25" stroke-dasharray="3,2"/>
      <text x="0"    y="8"  class="mono" font-size="9" font-weight="600" fill="#a83e55">2018</text>
      <text x="350"  y="8"  class="mono" font-size="9" font-weight="600" fill="#a83e55" text-anchor="middle">2022</text>
      <text x="720"  y="8"  class="mono" font-size="9" font-weight="600" fill="#a83e55" text-anchor="end">2026</text>

      <!-- 3 cards : autocomplete, assistant IDE, coding agent — saturation croissante -->
      <g>
        <!-- AUTOCOMPLETE (clair, saturation 0.08) -->
        <rect x="0" y="22" width="220" height="106" fill="#a83e55" fill-opacity="0.04" stroke="#a83e55" stroke-width="0.6" rx="2"/>
        <text x="14" y="42" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" letter-spacing="0.12em">AUTOCOMPLETE</text>
        <text x="14" y="60" class="display" font-size="14" font-weight="600" fill="#1e1e2a">Copilot v1, Tabnine</text>
        <line x1="14" y1="68" x2="206" y2="68" stroke="#a83e55" stroke-width="0.4" stroke-dasharray="2,2"/>
        <text x="14" y="83"  class="body" font-size="10" fill="#6b6f7c"><tspan font-weight="600" fill="#1e1e2a">Contexte</tspan> · quelques centaines de tokens</text>
        <text x="14" y="98"  class="body" font-size="10" fill="#6b6f7c"><tspan font-weight="600" fill="#1e1e2a">Boucle</tspan> · milliseconde</text>
        <text x="14" y="113" class="body" font-size="10" fill="#6b6f7c"><tspan font-weight="600" fill="#1e1e2a">Livrable</tspan> · fragment</text>
        <text x="14" y="126" class="body" font-size="9.5" font-style="italic" fill="#9a9ca5">L'agent prédit.</text>

        <!-- ASSISTANT IDE (medium, saturation 0.10) -->
        <rect x="250" y="22" width="220" height="106" fill="#a83e55" fill-opacity="0.10" stroke="#a83e55" stroke-width="0.8" rx="2"/>
        <text x="264" y="42" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" letter-spacing="0.12em">ASSISTANT IDE · CHAT</text>
        <text x="264" y="60" class="display" font-size="14" font-weight="600" fill="#1e1e2a">Copilot Chat, JetBrains AI</text>
        <line x1="264" y1="68" x2="456" y2="68" stroke="#a83e55" stroke-width="0.4" stroke-dasharray="2,2"/>
        <text x="264" y="83"  class="body" font-size="10" fill="#6b6f7c"><tspan font-weight="600" fill="#1e1e2a">Contexte</tspan> · fichier ouvert</text>
        <text x="264" y="98"  class="body" font-size="10" fill="#6b6f7c"><tspan font-weight="600" fill="#1e1e2a">Boucle</tspan> · seconde</text>
        <text x="264" y="113" class="body" font-size="10" fill="#6b6f7c"><tspan font-weight="600" fill="#1e1e2a">Livrable</tspan> · réponse + patch</text>
        <text x="264" y="126" class="body" font-size="9.5" font-style="italic" fill="#9a9ca5">L'agent répond.</text>

        <!-- CODING AGENT (foncé, saturation 0.20) -->
        <rect x="500" y="22" width="220" height="106" fill="#a83e55" fill-opacity="0.20" stroke="#a83e55" stroke-width="1.25" rx="2"/>
        <text x="514" y="42" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" letter-spacing="0.12em">CODING AGENT</text>
        <text x="514" y="60" class="display" font-size="14" font-weight="600" fill="#1e1e2a">Claude Code · Codex · Copilot</text>
        <line x1="514" y1="68" x2="706" y2="68" stroke="#a83e55" stroke-width="0.4" stroke-dasharray="2,2"/>
        <text x="514" y="83"  class="body" font-size="10" fill="#6b6f7c"><tspan font-weight="600" fill="#1e1e2a">Contexte</tspan> · projet entier</text>
        <text x="514" y="98"  class="body" font-size="10" fill="#6b6f7c"><tspan font-weight="600" fill="#1e1e2a">Boucle</tspan> · 10 à 60 min</text>
        <text x="514" y="113" class="body" font-size="10" fill="#6b6f7c"><tspan font-weight="600" fill="#1e1e2a">Livrable</tspan> · PR ouverte</text>
        <text x="514" y="126" class="body" font-size="9.5" font-style="italic" fill="#9a9ca5">L'agent livre.</text>

        <!-- Flèches de saut entre cards -->
        <path d="M222,75 L248,75" stroke="#a83e55" stroke-width="1.5" marker-end="url(#arr-tl)"/>
        <path d="M472,75 L498,75" stroke="#a83e55" stroke-width="1.5" marker-end="url(#arr-tl)"/>
      </g>
    </g>
  </g>

  <!-- ============ MSG 02 — Trois outils dominants ============ -->
  <g>
    <line x1="60" y1="402" x2="780" y2="402" stroke="rgba(30,30,42,0.10)" stroke-width="0.75" stroke-dasharray="3,4"/>

    <circle cx="84" cy="438" r="20" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="84" y="445" class="mono" font-size="15" font-weight="600" fill="#1F5560" text-anchor="middle">02</text>

    <text x="120" y="433" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.14em">LE PAYSAGE</text>
    <text x="120" y="454" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Trois outils dominants, dosages différents.</text>

    <g transform="translate(120, 472)">
      <rect x="0" y="0" width="210" height="50" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1" rx="2"/>
      <text x="14" y="18" class="mono" font-size="9.5" font-weight="600" fill="#1F5560" letter-spacing="0.10em">ANTHROPIC</text>
      <text x="14" y="35" class="display" font-size="14" font-weight="600" fill="#1e1e2a">Claude Code</text>
      <text x="200" y="35" class="body" font-size="10" font-style="italic" fill="#6b6f7c" text-anchor="end">CLI · skills · MCP</text>

      <rect x="225" y="0" width="210" height="50" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1" rx="2"/>
      <text x="239" y="18" class="mono" font-size="9.5" font-weight="600" fill="#1F5560" letter-spacing="0.10em">OPENAI</text>
      <text x="239" y="35" class="display" font-size="14" font-weight="600" fill="#1e1e2a">Codex CLI</text>
      <text x="425" y="35" class="body" font-size="10" font-style="italic" fill="#6b6f7c" text-anchor="end">sandbox strict</text>

      <rect x="450" y="0" width="210" height="50" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1" rx="2"/>
      <text x="464" y="18" class="mono" font-size="9.5" font-weight="600" fill="#1F5560" letter-spacing="0.10em">MICROSOFT</text>
      <text x="464" y="35" class="display" font-size="14" font-weight="600" fill="#1e1e2a">GitHub Copilot</text>
      <text x="650" y="35" class="body" font-size="10" font-style="italic" fill="#6b6f7c" text-anchor="end">IDE-natif · agent</text>
    </g>
  </g>

  <!-- ============ MSG 03 — Anatomie en 6 rouages + 2 substrats ============ -->
  <g>
    <line x1="60" y1="544" x2="780" y2="544" stroke="rgba(30,30,42,0.10)" stroke-width="0.75" stroke-dasharray="3,4"/>

    <circle cx="84" cy="580" r="20" fill="none" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="84" y="587" class="mono" font-size="15" font-weight="600" fill="#2F5D3F" text-anchor="middle">03</text>

    <text x="120" y="575" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em">L'ANATOMIE</text>
    <text x="120" y="596" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Six rouages + deux substrats.</text>

    <g transform="translate(120, 614)">
      <g>
        <rect x="0" y="0" width="210" height="34" fill="#2F5D3F" fill-opacity="0.06" stroke="#2F5D3F" stroke-width="0.6" rx="2"/>
        <text x="14" y="14" class="mono" font-size="9" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em">01 · CONTEXTE</text>
        <text x="14" y="28" class="body" font-size="10" fill="#1e1e2a">CLAUDE.md · projet · compaction</text>
      </g>
      <g transform="translate(225, 0)">
        <rect x="0" y="0" width="210" height="34" fill="#2F5D3F" fill-opacity="0.06" stroke="#2F5D3F" stroke-width="0.6" rx="2"/>
        <text x="14" y="14" class="mono" font-size="9" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em">02 · TOOLS</text>
        <text x="14" y="28" class="body" font-size="10" fill="#1e1e2a">Read · Write · Bash · Grep · MCP</text>
      </g>
      <g transform="translate(450, 0)">
        <rect x="0" y="0" width="210" height="34" fill="#2F5D3F" fill-opacity="0.06" stroke="#2F5D3F" stroke-width="0.6" rx="2"/>
        <text x="14" y="14" class="mono" font-size="9" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em">03 · SKILLS</text>
        <text x="14" y="28" class="body" font-size="10" fill="#1e1e2a">modules .md invocables</text>
      </g>
      <g transform="translate(0, 40)">
        <rect x="0" y="0" width="210" height="34" fill="#2F5D3F" fill-opacity="0.06" stroke="#2F5D3F" stroke-width="0.6" rx="2"/>
        <text x="14" y="14" class="mono" font-size="9" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em">04 · SUB-AGENTS</text>
        <text x="14" y="28" class="body" font-size="10" fill="#1e1e2a">contextes parallèles</text>
      </g>
      <g transform="translate(225, 40)">
        <rect x="0" y="0" width="210" height="34" fill="#2F5D3F" fill-opacity="0.06" stroke="#2F5D3F" stroke-width="0.6" rx="2"/>
        <text x="14" y="14" class="mono" font-size="9" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em">05 · HOOKS</text>
        <text x="14" y="28" class="body" font-size="10" fill="#1e1e2a">déclencheurs déterministes</text>
      </g>
      <g transform="translate(450, 40)">
        <rect x="0" y="0" width="210" height="34" fill="#2F5D3F" fill-opacity="0.06" stroke="#2F5D3F" stroke-width="0.6" rx="2"/>
        <text x="14" y="14" class="mono" font-size="9" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em">06 · PERMISSIONS</text>
        <text x="14" y="28" class="body" font-size="10" fill="#1e1e2a">allowlist · modes</text>
      </g>

      <!-- Substrats transversaux : MÉMOIRE + FILESYSTEM, dashed style -->
      <g transform="translate(0, 84)">
        <rect x="0" y="0" width="322" height="32" fill="#2F5D3F" fill-opacity="0.14" stroke="#2F5D3F" stroke-width="0.75" stroke-dasharray="4,2" rx="2"/>
        <text x="14" y="14" class="mono" font-size="9" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em">SUBSTRAT · MÉMOIRE</text>
        <text x="14" y="28" class="body" font-size="10" fill="#1e1e2a">persistance inter-sessions · CLAUDE.md</text>
      </g>
      <g transform="translate(338, 84)">
        <rect x="0" y="0" width="322" height="32" fill="#2F5D3F" fill-opacity="0.14" stroke="#2F5D3F" stroke-width="0.75" stroke-dasharray="4,2" rx="2"/>
        <text x="14" y="14" class="mono" font-size="9" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em">SUBSTRAT · FILESYSTEM</text>
        <text x="14" y="28" class="body" font-size="10" fill="#1e1e2a">substrat de raisonnement · fichiers = état</text>
      </g>
    </g>
  </g>

  <!-- ============ MSG 04 — Pyramide avec exemples par étage ============ -->
  <g>
    <line x1="60" y1="744" x2="780" y2="744" stroke="rgba(30,30,42,0.10)" stroke-width="0.75" stroke-dasharray="3,4"/>

    <circle cx="84" cy="780" r="20" fill="none" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="84" y="787" class="mono" font-size="15" font-weight="600" fill="#B58A2C" text-anchor="middle">04</text>

    <text x="120" y="775" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.14em">LA PYRAMIDE D'USAGE</text>
    <text x="120" y="796" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Quatre étages · des exemples par étage.</text>

    <!-- Étage 4 — Produit/Décideurs : 2 exemples, fill 0.20 -->
    <g transform="translate(120, 812)">
      <rect x="0" y="0" width="660" height="38" fill="#B58A2C" fill-opacity="0.20" stroke="#B58A2C" stroke-width="0.75" rx="2"/>
      <text x="14" y="16" class="mono" font-size="9.5" font-weight="600" fill="#B58A2C" letter-spacing="0.10em">ÉTAGE 4 · PRODUIT / DÉCIDEURS</text>
      <text x="14" y="31" class="body" font-size="11" fill="#1e1e2a"><tspan font-weight="600">Cadrage permissions</tspan> · <tspan font-weight="600">Audit / brief specs</tspan> · cadrer l'usage</text>
    </g>
    <!-- Étage 3 — Data expert : 4 exemples, fill 0.15 -->
    <g transform="translate(120, 854)">
      <rect x="0" y="0" width="660" height="38" fill="#B58A2C" fill-opacity="0.15" stroke="#B58A2C" stroke-width="0.75" rx="2"/>
      <text x="14" y="16" class="mono" font-size="9.5" font-weight="600" fill="#B58A2C" letter-spacing="0.10em">ÉTAGE 3 · DATA EXPERT</text>
      <text x="14" y="31" class="body" font-size="11" fill="#1e1e2a"><tspan font-weight="600">Pipelines ETL / dbt</tspan> · <tspan font-weight="600">Refacto repo</tspan> · <tspan font-weight="600">Audits sécu</tspan> · <tspan font-weight="600">MLOps + tests</tspan></text>
    </g>
    <!-- Étage 2 — Data quotidien : 5 exemples, fill 0.10 -->
    <g transform="translate(120, 896)">
      <rect x="0" y="0" width="660" height="38" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="0.75" rx="2"/>
      <text x="14" y="16" class="mono" font-size="9.5" font-weight="600" fill="#B58A2C" letter-spacing="0.10em">ÉTAGE 2 · DATA QUOTIDIEN</text>
      <text x="14" y="31" class="body" font-size="11" fill="#1e1e2a"><tspan font-weight="600">SQL ad hoc</tspan> · <tspan font-weight="600">Notebooks</tspan> · <tspan font-weight="600">Transfo CSV</tspan> · <tspan font-weight="600">Dashboards</tspan> · <tspan font-weight="600">Scripts ponct.</tspan></text>
    </g>
    <!-- Étage 1 — Transverse : 6 exemples, fill 0.06 (le plus clair, largest base) -->
    <g transform="translate(120, 938)">
      <rect x="0" y="0" width="660" height="38" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="0.75" rx="2"/>
      <text x="14" y="16" class="mono" font-size="9.5" font-weight="600" fill="#B58A2C" letter-spacing="0.10em">ÉTAGE 1 · TRANSVERSE · TOUS</text>
      <text x="14" y="31" class="body" font-size="11" fill="#1e1e2a"><tspan font-weight="600">Rédaction longue</tspan> · <tspan font-weight="600">Slides</tspan> · <tspan font-weight="600">Veille</tspan> · <tspan font-weight="600">Briefs client</tspan> · <tspan font-weight="600">Mails complexes</tspan> · <tspan font-weight="600">Recherche doc</tspan></text>
    </g>
  </g>

  <!-- ============ MSG 05 — Gains : trois zones explicites ============ -->
  <g>
    <line x1="60" y1="988" x2="780" y2="988" stroke="rgba(30,30,42,0.10)" stroke-width="0.75" stroke-dasharray="3,4"/>

    <circle cx="84" cy="1024" r="20" fill="none" stroke="#a83e55" stroke-width="1.5"/>
    <text x="84" y="1031" class="mono" font-size="15" font-weight="600" fill="#a83e55" text-anchor="middle">05</text>

    <text x="120" y="1019" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">LES GAINS · TROIS RÉGIMES</text>
    <text x="120" y="1040" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Selon le terrain, +55 % ou −19 %.</text>

    <!-- 3 tuiles : greenfield (vert) / mature (rouge) / amplificateur (neutre dashed) -->
    <g transform="translate(120, 1056)">
      <rect x="0" y="0" width="210" height="76" fill="#2F5D3F" fill-opacity="0.14" stroke="#2F5D3F" stroke-width="1" rx="2"/>
      <text x="14" y="18" class="mono" font-size="9.5" font-weight="600" fill="#2F5D3F" letter-spacing="0.10em">GREENFIELD · TÂCHE JOUET</text>
      <text x="105" y="42" class="display" font-size="22" font-weight="600" fill="#2F5D3F" text-anchor="middle">+ 55 %</text>
      <text x="105" y="58" class="body" font-size="10" fill="#6b6f7c" text-anchor="middle">GitHub 2023 · 1h30 greenfield</text>
      <text x="105" y="70" class="body" font-size="9" font-style="italic" fill="#9a9ca5" text-anchor="middle">l'agent crée à partir de zéro</text>

      <rect x="225" y="0" width="210" height="76" fill="#a83e55" fill-opacity="0.14" stroke="#a83e55" stroke-width="1" rx="2"/>
      <text x="239" y="18" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" letter-spacing="0.10em">CODEBASE MATURE · OSS</text>
      <text x="330" y="42" class="display" font-size="22" font-weight="600" fill="#a83e55" text-anchor="middle">− 19 %</text>
      <text x="330" y="58" class="body" font-size="10" fill="#6b6f7c" text-anchor="middle">METR 2025 · 16 mainteneurs experts</text>
      <text x="330" y="70" class="body" font-size="9" font-style="italic" fill="#9a9ca5" text-anchor="middle">l'humain a déjà amorti le coût</text>

      <rect x="450" y="0" width="210" height="76" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1" stroke-dasharray="4,2" rx="2"/>
      <text x="464" y="18" class="mono" font-size="9.5" font-weight="600" fill="#B58A2C" letter-spacing="0.10em">L'AMPLIFICATEUR · DORA</text>
      <text x="555" y="38" class="display" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">+ débit individuel</text>
      <text x="555" y="54" class="display" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">− stabilité prod</text>
      <text x="555" y="70" class="body" font-size="9" font-style="italic" fill="#9a9ca5" text-anchor="middle">l'IA amplifie l'existant</text>
    </g>

    <text x="450" y="1158" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">Trust en baisse : 40 % → 29 % (Stack Overflow 2025). Self-report sur-estime de ~40 pts.</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="1175" x2="780" y2="1175" stroke="rgba(30,30,42,0.16)" stroke-width="1"/>
</svg>
