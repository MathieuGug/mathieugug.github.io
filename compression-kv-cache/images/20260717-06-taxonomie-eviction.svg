<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
    .evict { fill: #B8B5AE; fill-opacity: 0.30; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Quatre façons de jeter des tokens</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Chaque politique parie sur ce qui, dans le passé, mérite de rester en cache.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- token ruler -->
  <text x="360" y="200" class="mono" font-size="11" fill="#5A5A5A">token 0</text>
  <text x="1120" y="200" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">token N (récent)</text>
  <line x1="360" y1="210" x2="1120" y2="210" stroke="#B8B5AE" stroke-width="0.75"/>

  <!-- Lane 1: sink -->
  <g class="interactive" data-card="sink" tabindex="0" role="button" aria-label="Attention sinks — garder les tout premiers tokens plus une fenêtre récente">
    <text x="80" y="252" class="body" font-size="14" font-weight="600" fill="#B58A2C">Puits (sinks)</text>
    <text x="80" y="272" class="body" font-size="11" fill="#5A5A5A">StreamingLLM</text>
    <rect x="360" y="235" width="760" height="40" rx="2" class="evict"/>
    <rect x="360" y="235" width="55" height="40" rx="2" fill="#B58A2C" fill-opacity="0.55"/>
    <rect x="1040" y="235" width="80" height="40" rx="2" fill="#B58A2C" fill-opacity="0.35"/>
    <text x="388" y="300" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">premiers</text>
    <text x="1080" y="300" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">récents</text>
  </g>

  <!-- Lane 2: heavy hitter -->
  <g class="interactive" data-card="heavy-hitter" tabindex="0" role="button" aria-label="Heavy hitters — garder les tokens qui reçoivent le plus d'attention cumulée">
    <text x="80" y="352" class="body" font-size="14" font-weight="600" fill="#B7332C">Gros contributeurs</text>
    <text x="80" y="372" class="body" font-size="11" fill="#5A5A5A">H2O</text>
    <rect x="360" y="335" width="760" height="40" rx="2" class="evict"/>
    <rect x="430" y="335" width="24" height="40" rx="2" fill="#B7332C" fill-opacity="0.5"/>
    <rect x="540" y="335" width="24" height="40" rx="2" fill="#B7332C" fill-opacity="0.5"/>
    <rect x="690" y="335" width="24" height="40" rx="2" fill="#B7332C" fill-opacity="0.5"/>
    <rect x="820" y="335" width="24" height="40" rx="2" fill="#B7332C" fill-opacity="0.5"/>
    <rect x="1040" y="335" width="80" height="40" rx="2" fill="#B7332C" fill-opacity="0.3"/>
    <text x="640" y="400" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">forte attention cumulée, dispersés</text>
  </g>

  <!-- Lane 3: recent -->
  <g class="interactive" data-card="recent" tabindex="0" role="button" aria-label="Fenêtre récente — ne garder que les derniers tokens">
    <text x="80" y="452" class="body" font-size="14" font-weight="600" fill="#1F5560">Fenêtre récente</text>
    <text x="80" y="472" class="body" font-size="11" fill="#5A5A5A">sliding window</text>
    <rect x="360" y="435" width="760" height="40" rx="2" class="evict"/>
    <rect x="980" y="435" width="140" height="40" rx="2" fill="#1F5560" fill-opacity="0.4"/>
    <text x="1050" y="500" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">derniers seulement</text>
  </g>

  <!-- Lane 4: query selection -->
  <g class="interactive" data-card="selection-requete" tabindex="0" role="button" aria-label="Sélection par requête — garder les tokens saillants pour la question posée">
    <text x="80" y="552" class="body" font-size="14" font-weight="600" fill="#2F5D3F">Saillance / requête</text>
    <text x="80" y="572" class="body" font-size="11" fill="#5A5A5A">SnapKV · FastGen</text>
    <rect x="360" y="535" width="760" height="40" rx="2" class="evict"/>
    <rect x="560" y="535" width="185" height="40" rx="2" fill="#2F5D3F" fill-opacity="0.4"/>
    <rect x="1040" y="535" width="80" height="40" rx="2" fill="#2F5D3F" fill-opacity="0.3"/>
    <text x="652" y="600" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">pertinent à la requête</text>
    <!-- query marker -->
    <path d="M1080 590 L1080 578" stroke="#2F5D3F" stroke-width="1.25"/>
    <text x="1080" y="600" class="mono" font-size="10" fill="#2F5D3F" text-anchor="middle">↑ requête</text>
  </g>

  <!-- risk note -->
  <rect x="360" y="628" width="760" height="56" rx="4" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1"/>
  <text x="380" y="652" class="body" font-size="12.5" fill="#1A1A1A" font-weight="600">Le risque commun :</text>
  <text x="380" y="672" class="body" font-size="12.5" fill="#5A5A5A">un token évincé ne peut plus être attendu, même si une requête ultérieure en aurait besoin (échec hors-distribution).</text>

  <!-- legend -->
  <rect x="80" y="632" width="18" height="18" rx="2" class="evict"/><text x="104" y="646" class="body" font-size="11" fill="#5A5A5A">évincé</text>
  <rect x="80" y="658" width="18" height="18" rx="2" fill="#1F5560" fill-opacity="0.4"/><text x="104" y="672" class="body" font-size="11" fill="#5A5A5A">gardé</text>

  <!-- Footer -->
  <line x1="60" y1="756" x2="1140" y2="756" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="778" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : StreamingLLM (Xiao 2024) ; H2O (Zhang 2023) ; SnapKV (Li 2024) ; FastGen (Ge 2024). Positions illustratives.</text>
</svg>
