<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arrow01" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Trois étages, trois moments</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">La compression du cache se décide à l'entraînement, se raffine à la quantification, se borne au service.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Baseline cache (left) -->
  <text x="150" y="205" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle">CACHE MHA</text>
  <g>
    <rect x="95" y="220" width="110" height="470" rx="3" fill="#1A1A1A" fill-opacity="0.10" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="150" y="470" class="display" font-size="15" font-style="italic" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90 150 470)">2·L·H·d octets / token</text>
  </g>
  <text x="150" y="715" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">référence : pleine</text>
  <text x="150" y="731" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">taille, toutes les têtes</text>

  <!-- Three stage lanes -->
  <!-- Lane 1: architectural -->
  <g class="interactive" data-card="etage-architecture" tabindex="0" role="button" aria-label="Étage architectural — partager ou projeter les têtes à l'entraînement">
    <rect x="300" y="200" width="560" height="150" rx="4" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.25"/>
    <text x="322" y="232" class="mono" font-size="12" letter-spacing="1.5" fill="#1F5560">ÉTAGE 1 · ARCHITECTURAL</text>
    <text x="322" y="266" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Changer la forme de l'attention</text>
    <text x="322" y="296" class="body" font-size="13" fill="#5A5A5A">Partager les têtes clé/valeur (MQA, GQA) ou les projeter</text>
    <text x="322" y="315" class="body" font-size="13" fill="#5A5A5A">dans un latent (MLA). Moins de clés/valeurs produites.</text>
    <text x="838" y="338" class="mono" font-size="11" font-style="italic" fill="#1F5560" text-anchor="end">moment : entraînement</text>
  </g>
  <!-- shrunk cache 1 -->
  <rect x="880" y="210" width="60" height="130" rx="3" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="1.25"/>

  <!-- Lane 2: numeric -->
  <g class="interactive" data-card="etage-numerique" tabindex="0" role="button" aria-label="Étage numérique — quantifier les octets déjà écrits">
    <rect x="300" y="370" width="560" height="150" rx="4" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="322" y="402" class="mono" font-size="12" letter-spacing="1.5" fill="#B58A2C">ÉTAGE 2 · NUMÉRIQUE</text>
    <text x="322" y="436" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Réduire les bits par nombre</text>
    <text x="322" y="466" class="body" font-size="13" fill="#5A5A5A">Stocker clés et valeurs en 4, 3 ou 2 bits (KIVI, KVQuant)</text>
    <text x="322" y="485" class="body" font-size="13" fill="#5A5A5A">au lieu de 16. Protéger les canaux et tokens aberrants.</text>
    <text x="838" y="508" class="mono" font-size="11" font-style="italic" fill="#B58A2C" text-anchor="end">moment : après coup</text>
  </g>
  <rect x="880" y="392" width="60" height="106" rx="3" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-width="1.25"/>

  <!-- Lane 3: token -->
  <g class="interactive" data-card="etage-token" tabindex="0" role="button" aria-label="Étage token — n'garder que les tokens qui comptent">
    <rect x="300" y="540" width="560" height="150" rx="4" fill="#B7332C" fill-opacity="0.07" stroke="#B7332C" stroke-width="1.25"/>
    <text x="322" y="572" class="mono" font-size="12" letter-spacing="1.5" fill="#B7332C">ÉTAGE 3 · TOKEN</text>
    <text x="322" y="606" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Ne garder que les tokens utiles</text>
    <text x="322" y="636" class="body" font-size="13" fill="#5A5A5A">Évincer ou sélectionner : puits (StreamingLLM), gros</text>
    <text x="322" y="655" class="body" font-size="13" fill="#5A5A5A">contributeurs (H2O), saillance par requête (SnapKV).</text>
    <text x="838" y="678" class="mono" font-size="11" font-style="italic" fill="#B7332C" text-anchor="end">moment : après coup</text>
  </g>
  <rect x="880" y="562" width="60" height="106" rx="3" fill="#B7332C" fill-opacity="0.18" stroke="#B7332C" stroke-width="1.25"/>
  <line x1="890" y1="588" x2="930" y2="588" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="2 3"/>
  <line x1="890" y1="620" x2="930" y2="620" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- arrows from baseline to lanes -->
  <path d="M210 300 C 250 300, 255 275, 296 275" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow01)"/>
  <path d="M210 455 L 296 445" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow01)"/>
  <path d="M210 610 C 250 610, 255 615, 296 615" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow01)"/>

  <!-- Composition (right) -->
  <g class="interactive" data-card="composition" tabindex="0" role="button" aria-label="Composition — les trois étages se superposent et leurs facteurs se multiplient">
    <rect x="980" y="200" width="160" height="490" rx="4" fill="#2F5D3F" fill-opacity="0.06" stroke="#2F5D3F" stroke-width="1.25" stroke-dasharray="4 3"/>
    <text x="1060" y="232" class="mono" font-size="11" letter-spacing="1" fill="#2F5D3F" text-anchor="middle">COMPOSITION</text>
    <text x="1060" y="420" class="display" font-size="17" font-style="italic" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90 1060 420)">les facteurs se multiplient</text>
    <text x="1060" y="640" class="mono" font-size="22" font-weight="600" fill="#2F5D3F" text-anchor="middle">×</text>
    <text x="1060" y="668" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">orthogonaux</text>
  </g>
  <path d="M946 275 L 976 320" fill="none" stroke="#5A5A5A" stroke-width="0.9" marker-end="url(#arrow01)"/>
  <path d="M946 445 L 976 435" fill="none" stroke="#5A5A5A" stroke-width="0.9" marker-end="url(#arrow01)"/>
  <path d="M946 615 L 976 560" fill="none" stroke="#5A5A5A" stroke-width="0.9" marker-end="url(#arrow01)"/>

  <!-- Footer -->
  <line x1="60" y1="756" x2="1140" y2="756" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="778" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : synthèse de l'auteur — Shazeer 2019 ; Ainslie 2023 ; DeepSeek-V2 2024 ; KIVI 2024 ; StreamingLLM 2024.</text>
</svg>
