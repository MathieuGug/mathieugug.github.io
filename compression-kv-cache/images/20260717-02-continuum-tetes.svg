<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
    .qhead { fill: #1A1A1A; fill-opacity: 0.08; stroke: #5A5A5A; stroke-width: 1; }
    .link  { stroke: #B8B5AE; stroke-width: 0.9; fill: none; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Le continuum des têtes clé/valeur</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">De « chaque tête a ses clés » à « toutes partagent une clé » — GQA est le point d'équilibre.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- axis labels -->
  <text x="60" y="215" class="mono" font-size="11" fill="#5A5A5A">têtes de requête (Q)</text>
  <text x="60" y="470" class="mono" font-size="11" fill="#5A5A5A">têtes clé/valeur (K,V) — en cache</text>

  <!-- ===== MHA (left) ===== -->
  <g class="interactive" data-card="mha" tabindex="0" role="button" aria-label="MHA — multi-head attention, une tête clé/valeur par tête de requête">
    <rect x="80" y="185" width="320" height="360" rx="4" fill="#1A1A1A" fill-opacity="0.03" stroke="#E5E1D8" stroke-width="1"/>
    <text x="240" y="580" class="display" font-size="20" font-weight="600" fill="#1A1A1A" text-anchor="middle">MHA</text>
    <text x="240" y="605" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">8 têtes Q · 8 têtes K/V</text>
    <!-- 8 Q heads -->
    <circle class="qhead" cx="120" cy="240" r="11"/><circle class="qhead" cx="154" cy="240" r="11"/><circle class="qhead" cx="188" cy="240" r="11"/><circle class="qhead" cx="222" cy="240" r="11"/><circle class="qhead" cx="256" cy="240" r="11"/><circle class="qhead" cx="290" cy="240" r="11"/><circle class="qhead" cx="324" cy="240" r="11"/><circle class="qhead" cx="358" cy="240" r="11"/>
    <!-- links 1:1 -->
    <path class="link" d="M120 251 L120 429"/><path class="link" d="M154 251 L154 429"/><path class="link" d="M188 251 L188 429"/><path class="link" d="M222 251 L222 429"/><path class="link" d="M256 251 L256 429"/><path class="link" d="M290 251 L290 429"/><path class="link" d="M324 251 L324 429"/><path class="link" d="M358 251 L358 429"/>
    <!-- 8 K/V heads -->
    <rect x="111" y="430" width="18" height="26" rx="2" fill="#1F5560" fill-opacity="0.2" stroke="#1F5560" stroke-width="1"/><rect x="145" y="430" width="18" height="26" rx="2" fill="#1F5560" fill-opacity="0.2" stroke="#1F5560" stroke-width="1"/><rect x="179" y="430" width="18" height="26" rx="2" fill="#1F5560" fill-opacity="0.2" stroke="#1F5560" stroke-width="1"/><rect x="213" y="430" width="18" height="26" rx="2" fill="#1F5560" fill-opacity="0.2" stroke="#1F5560" stroke-width="1"/><rect x="247" y="430" width="18" height="26" rx="2" fill="#1F5560" fill-opacity="0.2" stroke="#1F5560" stroke-width="1"/><rect x="281" y="430" width="18" height="26" rx="2" fill="#1F5560" fill-opacity="0.2" stroke="#1F5560" stroke-width="1"/><rect x="315" y="430" width="18" height="26" rx="2" fill="#1F5560" fill-opacity="0.2" stroke="#1F5560" stroke-width="1"/><rect x="349" y="430" width="18" height="26" rx="2" fill="#1F5560" fill-opacity="0.2" stroke="#1F5560" stroke-width="1"/>
    <text x="240" y="640" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle" font-weight="500">cache ×1 · qualité max</text>
  </g>

  <!-- ===== GQA (middle) ===== -->
  <g class="interactive" data-card="gqa" tabindex="0" role="button" aria-label="GQA — grouped-query attention, g groupes partagent une tête clé/valeur">
    <rect x="440" y="185" width="320" height="360" rx="4" fill="#B7332C" fill-opacity="0.04" stroke="#B7332C" stroke-width="1.5"/>
    <text x="600" y="580" class="display" font-size="20" font-weight="600" fill="#B7332C" text-anchor="middle">GQA</text>
    <text x="600" y="605" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">8 têtes Q · 2 groupes K/V</text>
    <!-- 8 Q heads -->
    <circle class="qhead" cx="480" cy="240" r="11"/><circle class="qhead" cx="514" cy="240" r="11"/><circle class="qhead" cx="548" cy="240" r="11"/><circle class="qhead" cx="582" cy="240" r="11"/><circle class="qhead" cx="616" cy="240" r="11"/><circle class="qhead" cx="650" cy="240" r="11"/><circle class="qhead" cx="684" cy="240" r="11"/><circle class="qhead" cx="718" cy="240" r="11"/>
    <!-- links 4:1 to two groups -->
    <path class="link" d="M480 251 L531 429"/><path class="link" d="M514 251 L531 429"/><path class="link" d="M548 251 L531 429"/><path class="link" d="M582 251 L531 429"/>
    <path class="link" d="M616 251 L669 429"/><path class="link" d="M650 251 L669 429"/><path class="link" d="M684 251 L669 429"/><path class="link" d="M718 251 L669 429"/>
    <!-- 2 K/V group heads -->
    <rect x="513" y="430" width="36" height="30" rx="2" fill="#1F5560" fill-opacity="0.28" stroke="#1F5560" stroke-width="1.25"/>
    <rect x="651" y="430" width="36" height="30" rx="2" fill="#1F5560" fill-opacity="0.28" stroke="#1F5560" stroke-width="1.25"/>
    <text x="600" y="640" class="mono" font-size="13" fill="#B7332C" text-anchor="middle" font-weight="500">cache ×¼ · ~qualité MHA</text>
  </g>

  <!-- ===== MQA (right) ===== -->
  <g class="interactive" data-card="mqa" tabindex="0" role="button" aria-label="MQA — multi-query attention, une seule tête clé/valeur partagée">
    <rect x="800" y="185" width="320" height="360" rx="4" fill="#1A1A1A" fill-opacity="0.03" stroke="#E5E1D8" stroke-width="1"/>
    <text x="960" y="580" class="display" font-size="20" font-weight="600" fill="#1A1A1A" text-anchor="middle">MQA</text>
    <text x="960" y="605" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">8 têtes Q · 1 tête K/V</text>
    <!-- 8 Q heads -->
    <circle class="qhead" cx="840" cy="240" r="11"/><circle class="qhead" cx="874" cy="240" r="11"/><circle class="qhead" cx="908" cy="240" r="11"/><circle class="qhead" cx="942" cy="240" r="11"/><circle class="qhead" cx="976" cy="240" r="11"/><circle class="qhead" cx="1010" cy="240" r="11"/><circle class="qhead" cx="1044" cy="240" r="11"/><circle class="qhead" cx="1078" cy="240" r="11"/>
    <!-- links 8:1 -->
    <path class="link" d="M840 251 L960 429"/><path class="link" d="M874 251 L960 429"/><path class="link" d="M908 251 L960 429"/><path class="link" d="M942 251 L960 429"/><path class="link" d="M976 251 L960 429"/><path class="link" d="M1010 251 L960 429"/><path class="link" d="M1044 251 L960 429"/><path class="link" d="M1078 251 L960 429"/>
    <!-- 1 K/V head -->
    <rect x="938" y="430" width="44" height="32" rx="2" fill="#B58A2C" fill-opacity="0.3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="960" y="640" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle" font-weight="500">cache ×⅛ · qualité ↘, instable</text>
  </g>

  <!-- formula strip -->
  <g class="interactive" data-card="formule-cache" tabindex="0" role="button" aria-label="Formule du cache — la taille est proportionnelle au nombre de têtes clé/valeur">
    <rect x="80" y="675" width="1040" height="52" rx="4" fill="#5A5A5A" fill-opacity="0.06" stroke="#B8B5AE" stroke-width="1"/>
    <text x="100" y="707" class="mono" font-size="15" fill="#1A1A1A">taille_cache ∝ 2 · L · <tspan fill="#B7332C" font-weight="600">H_kv</tspan> · d   —   MHA : H_kv = H   ·   GQA : H_kv = g   ·   MQA : H_kv = 1</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="756" x2="1140" y2="756" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="778" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : Shazeer 2019 (MQA) ; Ainslie et al. 2023 (GQA). Le facteur ¼ suppose g = 2 sur 8 têtes ; l'écosystème 2024-2025 (Llama, Mistral, Qwen) est majoritairement en GQA.</text>
</svg>
