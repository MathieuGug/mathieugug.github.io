<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arrow03" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Anatomie de MLA</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Le cache n'est plus des clés/valeurs pleines, mais un latent appris — plus une petite clé de position.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- hidden state -->
  <rect x="70" y="330" width="120" height="90" rx="4" fill="#1A1A1A" fill-opacity="0.06" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="130" y="370" class="display" font-size="18" fill="#1A1A1A" text-anchor="middle">h</text>
  <text x="130" y="392" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">état caché</text>
  <text x="130" y="440" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">token t</text>

  <!-- down-projection -->
  <g class="interactive" data-card="down-proj" tabindex="0" role="button" aria-label="Down-projection — compresse l'état caché en un latent basse-dimension">
    <rect x="255" y="250" width="150" height="120" rx="4" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.25"/>
    <text x="330" y="290" class="mono" font-size="15" fill="#1F5560" text-anchor="middle" font-weight="500">W_DKV</text>
    <text x="330" y="316" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle" font-weight="600">projection</text>
    <text x="330" y="335" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle" font-weight="600">descendante</text>
    <text x="330" y="356" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">d → d_c ≪ d</text>
  </g>
  <path d="M190 360 L 251 320" fill="none" stroke="#5A5A5A" stroke-width="1.1" marker-end="url(#arrow03)"/>

  <!-- decoupled RoPE key path -->
  <g class="interactive" data-card="rope-decouple" tabindex="0" role="button" aria-label="RoPE découplé — une petite clé de position portée à part, partagée entre têtes">
    <rect x="255" y="470" width="150" height="110" rx="4" fill="#B58A2C" fill-opacity="0.12" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="330" y="508" class="mono" font-size="14" fill="#B58A2C" text-anchor="middle" font-weight="500">W_KR · RoPE</text>
    <text x="330" y="533" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle" font-weight="600">clé de position</text>
    <text x="330" y="553" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">découplée,</text>
    <text x="330" y="569" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">partagée entre têtes</text>
  </g>
  <path d="M190 400 C 220 440, 225 490, 251 505" fill="none" stroke="#5A5A5A" stroke-width="1.1" marker-end="url(#arrow03)"/>

  <!-- CACHE zone -->
  <rect x="450" y="230" width="230" height="370" rx="6" fill="#B7332C" fill-opacity="0.03" stroke="#B7332C" stroke-width="1.25" stroke-dasharray="5 3"/>
  <text x="565" y="255" class="mono" font-size="12" letter-spacing="2" fill="#B7332C" text-anchor="middle">CE QUI EST EN CACHE</text>

  <!-- latent c_KV cached -->
  <g class="interactive" data-card="latent-ckv" tabindex="0" role="button" aria-label="Latent c_KV — l'unique vecteur mis en cache par token, ~93 % plus petit que MHA">
    <rect x="480" y="285" width="170" height="90" rx="4" fill="#1F5560" fill-opacity="0.22" stroke="#1F5560" stroke-width="1.5"/>
    <text x="565" y="322" class="display" font-size="20" fill="#1F5560" text-anchor="middle" font-weight="600">c_KV</text>
    <text x="565" y="345" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">latent conjoint K+V</text>
    <text x="565" y="363" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">un seul vecteur / token</text>
  </g>
  <!-- rope key cached -->
  <rect x="480" y="470" width="170" height="70" rx="4" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-width="1.25"/>
  <text x="565" y="500" class="mono" font-size="14" fill="#B58A2C" text-anchor="middle" font-weight="500">k_R</text>
  <text x="565" y="522" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">clé RoPE partagée</text>
  <path d="M405 310 L 476 320" fill="none" stroke="#5A5A5A" stroke-width="1.1" marker-end="url(#arrow03)"/>
  <path d="M405 515 L 476 505" fill="none" stroke="#5A5A5A" stroke-width="1.1" marker-end="url(#arrow03)"/>

  <!-- up-projections -->
  <rect x="730" y="270" width="150" height="55" rx="4" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1"/>
  <text x="805" y="295" class="mono" font-size="13" fill="#1F5560" text-anchor="middle">W_UK →  Kᶜ</text>
  <text x="805" y="314" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">clés reconstruites</text>
  <rect x="730" y="345" width="150" height="55" rx="4" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1"/>
  <text x="805" y="370" class="mono" font-size="13" fill="#1F5560" text-anchor="middle">W_UV →  V</text>
  <text x="805" y="389" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">valeurs reconstruites</text>
  <path d="M650 320 C 690 320, 695 297, 726 297" fill="none" stroke="#5A5A5A" stroke-width="1.1" marker-end="url(#arrow03)"/>
  <path d="M650 340 C 690 350, 695 372, 726 372" fill="none" stroke="#5A5A5A" stroke-width="1.1" marker-end="url(#arrow03)"/>

  <!-- attention -->
  <rect x="940" y="300" width="180" height="130" rx="4" fill="#1A1A1A" fill-opacity="0.05" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="1030" y="345" class="display" font-size="19" fill="#1A1A1A" text-anchor="middle" font-weight="600">attention</text>
  <text x="1030" y="372" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">softmax(QKᵀ) V</text>
  <text x="1030" y="405" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">contenu (latent) +</text>
  <text x="1030" y="421" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">position (RoPE)</text>
  <path d="M880 297 L 936 340" fill="none" stroke="#5A5A5A" stroke-width="1.1" marker-end="url(#arrow03)"/>
  <path d="M880 372 L 936 372" fill="none" stroke="#5A5A5A" stroke-width="1.1" marker-end="url(#arrow03)"/>
  <path d="M652 505 C 800 505, 880 440, 936 405" fill="none" stroke="#B58A2C" stroke-width="1.1" marker-end="url(#arrow03)"/>

  <!-- absorption note -->
  <g class="interactive" data-card="absorption" tabindex="0" role="button" aria-label="Absorption des matrices — à l'inférence, on calcule directement dans l'espace latent">
    <rect x="730" y="470" width="390" height="110" rx="4" fill="#2F5D3F" fill-opacity="0.07" stroke="#2F5D3F" stroke-width="1.25" stroke-dasharray="4 3"/>
    <text x="750" y="500" class="mono" font-size="11" letter-spacing="1.5" fill="#2F5D3F">INFÉRENCE · ABSORPTION</text>
    <text x="750" y="528" class="body" font-size="13" fill="#1A1A1A">W_UK se fond dans W_Q ; W_UV dans W_O.</text>
    <text x="750" y="550" class="body" font-size="13" fill="#1A1A1A">On n'a jamais à matérialiser K, V pleines —</text>
    <text x="750" y="570" class="body" font-size="13" fill="#2F5D3F" font-weight="600">l'attention se calcule dans le latent.</text>
  </g>

  <!-- callout reduction -->
  <text x="565" y="628" class="mono" font-size="14" fill="#B7332C" text-anchor="middle" font-weight="600">cache ≈ 93 % plus petit que MHA · qualité ≥ MHA</text>

  <!-- Footer -->
  <line x1="60" y1="756" x2="1140" y2="756" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="778" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : DeepSeek-V2 2024 (arxiv 2405.04434), industrialisé par DeepSeek-V3 2024. Le RoPE découplé résout la non-commutativité de la position avec la projection latente.</text>
</svg>
