<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arrow05" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Pourquoi K et V ne se quantifient pas pareil</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Les clés ont des canaux aberrants ; les valeurs, non. D'où deux axes de quantification.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- ===== KEYS (left) ===== -->
  <text x="330" y="205" class="display" font-size="19" font-weight="600" fill="#1A1A1A" text-anchor="middle">CLÉS (K)</text>
  <text x="330" y="228" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">canaux (dimensions) →</text>

  <g class="interactive" data-card="cle-per-channel" tabindex="0" role="button" aria-label="Clés — quantifiées par canal pour isoler les canaux aberrants">
    <rect x="150" y="250" width="380" height="280" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25"/>
    <!-- outlier channel bands -->
    <rect x="245" y="250" width="42" height="280" fill="#B7332C" fill-opacity="0.38"/>
    <rect x="435" y="250" width="42" height="280" fill="#B7332C" fill-opacity="0.38"/>
    <!-- vertical grid -->
    <line x1="245" y1="250" x2="245" y2="530" stroke="#FAF8F3" stroke-width="1"/><line x1="287" y1="250" x2="287" y2="530" stroke="#FAF8F3" stroke-width="1"/><line x1="340" y1="250" x2="340" y2="530" stroke="#FAF8F3" stroke-width="0.6"/><line x1="393" y1="250" x2="393" y2="530" stroke="#FAF8F3" stroke-width="0.6"/><line x1="435" y1="250" x2="435" y2="530" stroke="#FAF8F3" stroke-width="1"/><line x1="477" y1="250" x2="477" y2="530" stroke="#FAF8F3" stroke-width="1"/>
    <line x1="150" y1="320" x2="530" y2="320" stroke="#FAF8F3" stroke-width="0.6"/><line x1="150" y1="390" x2="530" y2="390" stroke="#FAF8F3" stroke-width="0.6"/><line x1="150" y1="460" x2="530" y2="460" stroke="#FAF8F3" stroke-width="0.6"/>
  </g>
  <text x="145" y="400" class="body" font-size="12" fill="#5A5A5A" text-anchor="end" transform="rotate(-90 145 400)">↓ tokens</text>
  <!-- per-channel scale arrows on top -->
  <line x1="266" y1="242" x2="266" y2="252" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arrow05)"/>
  <line x1="456" y1="242" x2="456" y2="252" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arrow05)"/>
  <text x="330" y="562" class="mono" font-size="13" fill="#B7332C" text-anchor="middle" font-weight="500">quantifier PAR CANAL</text>
  <text x="330" y="582" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">un facteur d'échelle par colonne</text>

  <!-- ===== VALUES (right) ===== -->
  <text x="850" y="205" class="display" font-size="19" font-weight="600" fill="#1A1A1A" text-anchor="middle">VALEURS (V)</text>
  <text x="850" y="228" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">canaux (dimensions) →</text>

  <g class="interactive" data-card="valeur-per-token" tabindex="0" role="button" aria-label="Valeurs — quantifiées par token, aberrations réparties">
    <rect x="670" y="250" width="380" height="280" rx="3" fill="#1F5560" fill-opacity="0.16" stroke="#1F5560" stroke-width="1.25"/>
    <line x1="765" y1="250" x2="765" y2="530" stroke="#FAF8F3" stroke-width="0.6"/><line x1="850" y1="250" x2="850" y2="530" stroke="#FAF8F3" stroke-width="0.6"/><line x1="955" y1="250" x2="955" y2="530" stroke="#FAF8F3" stroke-width="0.6"/>
    <line x1="670" y1="320" x2="1050" y2="320" stroke="#FAF8F3" stroke-width="1"/><line x1="670" y1="390" x2="1050" y2="390" stroke="#FAF8F3" stroke-width="1"/><line x1="670" y1="460" x2="1050" y2="460" stroke="#FAF8F3" stroke-width="1"/>
  </g>
  <text x="663" y="400" class="body" font-size="12" fill="#5A5A5A" text-anchor="end" transform="rotate(-90 663 400)">↓ tokens</text>
  <!-- per-token scale arrows on left -->
  <line x1="662" y1="285" x2="672" y2="285" stroke="#1F5560" stroke-width="1.5" marker-end="url(#arrow05)"/>
  <line x1="662" y1="355" x2="672" y2="355" stroke="#1F5560" stroke-width="1.5" marker-end="url(#arrow05)"/>
  <line x1="662" y1="425" x2="672" y2="425" stroke="#1F5560" stroke-width="1.5" marker-end="url(#arrow05)"/>
  <line x1="662" y1="495" x2="672" y2="495" stroke="#1F5560" stroke-width="1.5" marker-end="url(#arrow05)"/>
  <text x="850" y="562" class="mono" font-size="13" fill="#1F5560" text-anchor="middle" font-weight="500">quantifier PAR TOKEN</text>
  <text x="850" y="582" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">un facteur d'échelle par ligne</text>

  <!-- outlier annotation -->
  <g class="interactive" data-card="outlier-canal" tabindex="0" role="button" aria-label="Canaux aberrants — quelques dimensions portent des magnitudes énormes">
    <circle cx="90" cy="628" r="9" fill="#B7332C"/><text x="90" y="632" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>
    <text x="108" y="632" class="body" font-size="12.5" fill="#1A1A1A">Bandes carmin = canaux aberrants des clés : quelques dimensions portent</text>
    <text x="108" y="651" class="body" font-size="12.5" fill="#1A1A1A">des magnitudes énormes quel que soit le token. Les écraser uniformément détruit l'attention.</text>
  </g>

  <!-- 2-bit threshold -->
  <g class="interactive" data-card="seuil-2bit" tabindex="0" role="button" aria-label="Seuil 2 bits — l'asymétrie permet KIVI 2 bits sans calibration">
    <rect x="700" y="612" width="350" height="66" rx="4" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="718" y="638" class="mono" font-size="12" fill="#B58A2C">KIVI · 2 bits · SANS CALIBRATION</text>
    <text x="718" y="662" class="body" font-size="12" fill="#5A5A5A">l'asymétrie K/V est ce qui rend le 2 bits tenable</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="756" x2="1140" y2="756" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="778" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : KIVI (Liu et al., ICML 2024) ; KVQuant (Hooper et al., NeurIPS 2024). Schéma stylisé — la structure d'outliers réelle dépend du modèle et de RoPE.</text>
</svg>
