<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">La frontière qualité × mémoire</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">On ne compare pas les méthodes sur un axe, mais sur un front de Pareto — qui plonge en falaise.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- axes -->
  <line x1="200" y1="210" x2="200" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="200" y1="620" x2="1090" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="150" y="410" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90 150 410)">qualité →</text>
  <text x="645" y="662" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle">compression du cache (mémoire ↘) →</text>
  <text x="215" y="228" class="body" font-size="11" fill="#5A5A5A">haute</text>
  <text x="1085" y="612" class="body" font-size="11" fill="#5A5A5A" text-anchor="end">×16 · 2 bits</text>
  <text x="215" y="612" class="body" font-size="11" fill="#5A5A5A">×1</text>

  <!-- safe zone -->
  <g class="interactive" data-card="zone-sure" tabindex="0" role="button" aria-label="Zone sûre — compression sans perte notable de qualité">
    <rect x="200" y="235" width="620" height="120" fill="#1F5560" fill-opacity="0.06"/>
    <text x="360" y="300" class="mono" font-size="12" fill="#1F5560" letter-spacing="1">ZONE SÛRE</text>
    <text x="360" y="322" class="body" font-size="11" fill="#5A5A5A">qualité ≈ constante</text>
  </g>

  <!-- cliff zone -->
  <g class="interactive" data-card="falaise" tabindex="0" role="button" aria-label="La falaise — au-delà d'un seuil, chaque bit gagné se paie cher en qualité">
    <rect x="880" y="235" width="210" height="385" fill="#B7332C" fill-opacity="0.05"/>
    <text x="985" y="470" class="mono" font-size="12" fill="#B7332C" letter-spacing="1" text-anchor="middle">LA FALAISE</text>
    <text x="985" y="492" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">chaque bit</text>
    <text x="985" y="508" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">coûte cher</text>
  </g>

  <!-- pareto curve -->
  <path d="M250 280 C 450 285, 650 295, 820 330 C 870 348, 900 420, 980 520 C 1010 558, 1040 580, 1070 592"
        fill="none" stroke="#1A1A1A" stroke-width="2" stroke-dasharray="1 0"/>
  <text x="470" y="272" class="body" font-size="11" font-style="italic" fill="#5A5A5A">front de Pareto</text>

  <!-- points -->
  <!-- MHA -->
  <circle cx="250" cy="280" r="8" fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
  <text x="250" y="264" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="600">MHA</text>
  <!-- GQA -->
  <circle cx="470" cy="286" r="8" fill="#1A1A1A" fill-opacity="0.15" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="470" y="310" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="600">GQA</text>
  <!-- MLA -->
  <g class="interactive" data-card="mla-point" tabindex="0" role="button" aria-label="MLA — repousse la frontière : plus de compression à qualité égale">
    <circle cx="660" cy="296" r="10" fill="#1F5560"/>
    <text x="660" y="278" class="body" font-size="13" fill="#1F5560" text-anchor="middle" font-weight="700">MLA</text>
    <text x="660" y="322" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">repousse le front</text>
  </g>
  <!-- KV 4-bit -->
  <circle cx="770" cy="318" r="7" fill="#B58A2C" fill-opacity="0.5" stroke="#B58A2C" stroke-width="1.25"/>
  <text x="770" y="302" class="body" font-size="11" fill="#B58A2C" text-anchor="middle">KV 4-bit</text>
  <!-- KIVI 2-bit -->
  <circle cx="835" cy="342" r="7" fill="#B58A2C" fill-opacity="0.7" stroke="#B58A2C" stroke-width="1.25"/>
  <text x="835" y="326" class="body" font-size="11" fill="#B58A2C" text-anchor="middle">KIVI 2-bit</text>
  <!-- Composition -->
  <g class="interactive" data-card="composition-point" tabindex="0" role="button" aria-label="Composition — MLA quantifié et évincé : compression maximale, encore acceptable">
    <circle cx="895" cy="378" r="10" fill="#2F5D3F"/>
    <text x="905" y="368" class="body" font-size="12" fill="#2F5D3F" font-weight="700">MLA + quant + éviction</text>
  </g>
  <!-- aggressive eviction fallen off -->
  <circle cx="1000" cy="530" r="7" fill="#B7332C" fill-opacity="0.55"/>
  <text x="1000" y="556" class="body" font-size="11" fill="#B7332C" text-anchor="middle">éviction agressive</text>

  <!-- perplexity warning -->
  <rect x="250" y="670" width="840" height="52" rx="4" fill="#5A5A5A" fill-opacity="0.05" stroke="#B8B5AE" stroke-width="1"/>
  <text x="270" y="692" class="body" font-size="12.5" fill="#1A1A1A" font-weight="600">Piège de mesure :</text>
  <text x="270" y="712" class="body" font-size="12.5" fill="#5A5A5A">la perplexité moyenne peut rester bonne alors que la récupération longue-distance s'effondre. Évaluer sur des suites contexte-long ciblées.</text>

  <!-- Footer -->
  <line x1="60" y1="756" x2="1140" y2="756" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="778" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : benchmark de Yuan et al. 2024 (arxiv 2407.01527). Positions relatives illustratives — la falaise exacte dépend du modèle et de la tâche.</text>
</svg>
