<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
    .cellnum { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Quatre variantes, cinq dimensions</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">GQA gagne sur la simplicité, MLA sur la frontière qualité × mémoire.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- column headers -->
  <text x="330" y="215" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="600">Taille</text>
  <text x="330" y="231" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="600">du cache</text>
  <text x="490" y="223" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="600">Qualité</text>
  <text x="650" y="215" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="600">Simplicité /</text>
  <text x="650" y="231" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="600">support</text>
  <text x="810" y="215" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="600">Conversion</text>
  <text x="810" y="231" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="600">post-hoc</text>
  <text x="985" y="215" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="600">Moment de</text>
  <text x="985" y="231" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="600">décision</text>
  <line x1="70" y1="250" x2="1130" y2="250" stroke="#1A1A1A" stroke-width="1"/>

  <!-- vertical separators -->
  <line x1="250" y1="196" x2="250" y2="620" stroke="#E5E1D8" stroke-width="1"/>
  <line x1="410" y1="196" x2="410" y2="620" stroke="#E5E1D8" stroke-width="1"/>
  <line x1="570" y1="196" x2="570" y2="620" stroke="#E5E1D8" stroke-width="1"/>
  <line x1="730" y1="196" x2="730" y2="620" stroke="#E5E1D8" stroke-width="1"/>
  <line x1="900" y1="196" x2="900" y2="620" stroke="#E5E1D8" stroke-width="1"/>

  <!-- ROW MHA -->
  <g class="interactive" data-card="ligne-mha" tabindex="0" role="button" aria-label="MHA — multi-head attention, la référence pleine">
    <rect x="70" y="255" width="1060" height="82" rx="3" fill="#1A1A1A" fill-opacity="0.02"/>
    <text x="90" y="290" class="display" font-size="18" fill="#1A1A1A" font-weight="600">MHA</text>
    <text x="90" y="312" class="body" font-size="11" fill="#5A5A5A">référence</text>
    <circle cx="330" cy="296" r="9" fill="none" stroke="#B7332C" stroke-width="1.5"/><text x="330" y="322" class="cellnum" fill="#5A5A5A" text-anchor="middle">×1</text>
    <circle cx="490" cy="296" r="9" fill="#1F5560"/><text x="490" y="322" class="cellnum" fill="#5A5A5A" text-anchor="middle">max</text>
    <circle cx="650" cy="296" r="9" fill="#1F5560"/><text x="650" y="322" class="cellnum" fill="#5A5A5A" text-anchor="middle">natif</text>
    <text x="810" y="300" class="cellnum" fill="#B8B5AE" text-anchor="middle">—</text>
    <text x="985" y="300" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">entraînement</text>
  </g>

  <!-- ROW MQA -->
  <g class="interactive" data-card="ligne-mqa" tabindex="0" role="button" aria-label="MQA — une seule tête clé/valeur, la plus compacte mais fragile">
    <rect x="70" y="339" width="1060" height="82" rx="3" fill="#1A1A1A" fill-opacity="0.0"/>
    <text x="90" y="374" class="display" font-size="18" fill="#1A1A1A" font-weight="600">MQA</text>
    <text x="90" y="396" class="body" font-size="11" fill="#5A5A5A">Shazeer 2019</text>
    <circle cx="330" cy="380" r="9" fill="#1F5560"/><text x="330" y="406" class="cellnum" fill="#5A5A5A" text-anchor="middle">×1/H</text>
    <circle cx="490" cy="380" r="9" fill="none" stroke="#B7332C" stroke-width="1.5"/><text x="490" y="406" class="cellnum" fill="#5A5A5A" text-anchor="middle">↘ instable</text>
    <circle cx="650" cy="380" r="9" fill="#1F5560"/><text x="650" y="406" class="cellnum" fill="#5A5A5A" text-anchor="middle">natif</text>
    <path d="M810 373 a7 7 0 0 1 0 14 z" fill="#B58A2C"/><circle cx="810" cy="380" r="7" fill="none" stroke="#B58A2C" stroke-width="1.25"/><text x="810" y="406" class="cellnum" fill="#5A5A5A" text-anchor="middle">difficile</text>
    <text x="985" y="384" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">entraînement</text>
  </g>

  <!-- ROW GQA (highlight) -->
  <g class="interactive" data-card="ligne-gqa" tabindex="0" role="button" aria-label="GQA — le défaut de l'écosystème, meilleur compromis simplicité">
    <rect x="70" y="423" width="1060" height="82" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
    <text x="90" y="458" class="display" font-size="18" fill="#B7332C" font-weight="600">GQA</text>
    <text x="90" y="480" class="body" font-size="11" fill="#5A5A5A">Ainslie 2023</text>
    <path d="M330 455 a9 9 0 0 1 0 18 z" fill="#1F5560"/><circle cx="330" cy="464" r="9" fill="none" stroke="#1F5560" stroke-width="1.25"/><text x="330" y="490" class="cellnum" fill="#5A5A5A" text-anchor="middle">×1/g</text>
    <path d="M490 455 a9 9 0 0 1 0 18 z" fill="#1F5560"/><circle cx="490" cy="464" r="9" fill="none" stroke="#1F5560" stroke-width="1.25"/><text x="490" y="490" class="cellnum" fill="#5A5A5A" text-anchor="middle">~MHA</text>
    <circle cx="650" cy="464" r="9" fill="#1F5560"/><text x="650" y="490" class="cellnum" fill="#5A5A5A" text-anchor="middle">natif partout</text>
    <circle cx="810" cy="464" r="9" fill="#1F5560"/><text x="810" y="490" class="cellnum" fill="#5A5A5A" text-anchor="middle">uptrain 5 %</text>
    <text x="985" y="468" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">entraînement</text>
  </g>

  <!-- ROW MLA (highlight) -->
  <g class="interactive" data-card="ligne-mla" tabindex="0" role="button" aria-label="MLA — meilleure frontière qualité mémoire, plus complexe">
    <rect x="70" y="507" width="1060" height="82" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="90" y="542" class="display" font-size="18" fill="#1F5560" font-weight="600">MLA</text>
    <text x="90" y="564" class="body" font-size="11" fill="#5A5A5A">DeepSeek-V2 2024</text>
    <circle cx="330" cy="548" r="9" fill="#1F5560"/><text x="330" y="574" class="cellnum" fill="#5A5A5A" text-anchor="middle">−93 %</text>
    <circle cx="490" cy="548" r="9" fill="#1F5560"/><text x="490" y="574" class="cellnum" fill="#5A5A5A" text-anchor="middle">≥ MHA</text>
    <path d="M650 539 a9 9 0 0 1 0 18 z" fill="#B58A2C"/><circle cx="650" cy="548" r="9" fill="none" stroke="#B58A2C" stroke-width="1.25"/><text x="650" y="574" class="cellnum" fill="#5A5A5A" text-anchor="middle">en rattrapage</text>
    <path d="M810 539 a9 9 0 0 1 0 18 z" fill="#B58A2C"/><circle cx="810" cy="548" r="9" fill="none" stroke="#B58A2C" stroke-width="1.25"/><text x="810" y="574" class="cellnum" fill="#5A5A5A" text-anchor="middle">TransMLA</text>
    <text x="985" y="552" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">entraînement</text>
  </g>

  <!-- legend -->
  <circle cx="90" cy="648" r="8" fill="#1F5560"/><text x="106" y="652" class="body" font-size="12" fill="#5A5A5A">favorable</text>
  <path d="M255 640 a8 8 0 0 1 0 16 z" fill="#B58A2C"/><circle cx="255" cy="648" r="8" fill="none" stroke="#B58A2C" stroke-width="1.25"/><text x="271" y="652" class="body" font-size="12" fill="#5A5A5A">partiel / émergent</text>
  <circle cx="470" cy="648" r="8" fill="none" stroke="#B7332C" stroke-width="1.5"/><text x="486" y="652" class="body" font-size="12" fill="#5A5A5A">défavorable</text>
  <text x="640" y="652" class="body" font-size="12" font-style="italic" fill="#5A5A5A">H = têtes · g = groupes (1 &lt; g &lt; H)</text>

  <!-- Footer -->
  <line x1="60" y1="756" x2="1140" y2="756" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="778" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : synthèse de l'auteur — Shazeer 2019 ; Ainslie 2023 ; DeepSeek-V2/V3 2024 ; TransMLA (Meng et al. 2025). Réduction MLA annoncée sur config DeepSeek-V2.</text>
</svg>
