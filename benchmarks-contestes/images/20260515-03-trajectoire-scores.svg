<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; letter-spacing: 0.06em; }
    .interactive { cursor: pointer; }
    .grid { stroke: #E5E1D8; stroke-width: 0.5; }
    .ax { stroke: #1A1A1A; stroke-width: 1; }
  </style>
  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- header -->
  <g class="svg-header">
    <text x="60" y="60" class="mono" font-size="12" font-weight="600" fill="#B7332C" letter-spacing="0.16em">SCHÉMA 03</text>
    <text x="60" y="98" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Trajectoires des scores publics 2024-2026</text>
    <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">SWE-bench Verified, GAIA L1, OSWorld, τ-bench — quatre benchmarks, une signature en sablier.</text>
    <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="0.5"/>
  </g>

  <!-- Plot area: x from 110 to 1080 (970 wide, 10 ticks for 9 quarters), y from 200 to 600 (400 tall, 0-100%) -->
  <!-- gridlines -->
  <line x1="110" y1="200" x2="1080" y2="200" class="grid"/>
  <line x1="110" y1="280" x2="1080" y2="280" class="grid"/>
  <line x1="110" y1="360" x2="1080" y2="360" class="grid"/>
  <line x1="110" y1="440" x2="1080" y2="440" class="grid"/>
  <line x1="110" y1="520" x2="1080" y2="520" class="grid"/>
  <line x1="110" y1="600" x2="1080" y2="600" class="ax"/>
  <line x1="110" y1="200" x2="110" y2="600" class="ax"/>

  <!-- Y-axis labels -->
  <text x="98" y="204" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">100%</text>
  <text x="98" y="284" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">80%</text>
  <text x="98" y="364" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">60%</text>
  <text x="98" y="444" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">40%</text>
  <text x="98" y="524" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">20%</text>
  <text x="98" y="604" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">0%</text>

  <!-- X-axis ticks (Q1 2024 to Q2 2026 = 10 ticks) -->
  <!-- 9 quarters: Q1'24, Q2'24, Q3'24, Q4'24, Q1'25, Q2'25, Q3'25, Q4'25, Q1'26, Q2'26 -->
  <!-- Plot x positions: 110, 218, 326, 434, 542, 650, 758, 866, 974, 1080 (10 positions, spacing ~108) -->
  <g class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">
    <text x="110" y="618">Q1'24</text>
    <text x="218" y="618">Q2'24</text>
    <text x="326" y="618">Q3'24</text>
    <text x="434" y="618">Q4'24</text>
    <text x="542" y="618">Q1'25</text>
    <text x="650" y="618">Q2'25</text>
    <text x="758" y="618">Q3'25</text>
    <text x="866" y="618">Q4'25</text>
    <text x="974" y="618">Q1'26</text>
    <text x="1080" y="618">Q2'26</text>
  </g>

  <!-- SWE-bench Verified line (carmine) -->
  <!-- points: Q1'24 12%, Q3'24 30% (Verified release), Q1'25 48%, Q3'25 64%, Q1'26 75%, Q2'26 78% -->
  <!-- y for percent p: 200 + (100-p)*4 = 600 - 4p -->
  <!-- 12% -> 552; 30% -> 480; 48% -> 408; 64% -> 344; 75% -> 300; 78% -> 288 -->
  <polyline points="110,552 218,538 326,480 434,440 542,408 650,372 758,344 866,316 974,300 1080,288"
            fill="none" stroke="#B7332C" stroke-width="2.5"/>

  <!-- GAIA Level 1 line (teal) -->
  <!-- 30%, 36%, 42%, 50%, 58%, 66%, 72%, 80%, 86%, 88% -->
  <polyline points="110,480 218,456 326,432 434,400 542,368 650,336 758,312 866,280 974,256 1080,248"
            fill="none" stroke="#1F5560" stroke-width="2.5"/>

  <!-- OSWorld line (mustard) -->
  <!-- 4%, 7%, 10%, 14%, 18%, 22%, 25%, 28%, 30%, 32% -->
  <polyline points="110,584 218,572 326,560 434,544 542,528 650,512 758,500 866,488 974,480 1080,472"
            fill="none" stroke="#B58A2C" stroke-width="2.5"/>

  <!-- τ-bench line (forest/dark) -->
  <!-- 32%, 40%, 48%, 56%, 50% (v2 baisse), 56%, 62%, 68%, 73%, 76% -->
  <polyline points="110,472 218,440 326,408 434,376 542,400 650,376 758,352 866,328 974,308 1080,296"
            fill="none" stroke="#2F5D3F" stroke-width="2.5"/>

  <!-- Inflection points: SWE-bench Verified release (Q3 2024), τ-bench v2 (Q1 2025) -->
  <line x1="326" y1="200" x2="326" y2="600" stroke="#5A5A5A" stroke-width="0.5" stroke-dasharray="2 4"/>
  <text x="328" y="195" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" letter-spacing="0.08em">VERIFIED</text>
  <line x1="542" y1="200" x2="542" y2="600" stroke="#5A5A5A" stroke-width="0.5" stroke-dasharray="2 4"/>
  <text x="544" y="195" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" letter-spacing="0.08em">τ-BENCH v2</text>

  <!-- Interactive regions: end markers for each line -->
  <g class="interactive" data-card="swe-bench" tabindex="0" role="button" aria-label="SWE-bench Verified trajectory">
    <circle cx="1080" cy="288" r="6" fill="#B7332C" stroke="#FAF8F3" stroke-width="1.5"/>
    <rect x="1095" y="278" width="80" height="20" rx="2" fill="transparent"/>
    <text x="1095" y="293" class="mono" font-size="11" font-weight="500" fill="#B7332C">SWE-bench V.</text>
  </g>
  <g class="interactive" data-card="gaia" tabindex="0" role="button" aria-label="GAIA Level 1 trajectory">
    <circle cx="1080" cy="248" r="6" fill="#1F5560" stroke="#FAF8F3" stroke-width="1.5"/>
    <text x="1095" y="252" class="mono" font-size="11" font-weight="500" fill="#1F5560">GAIA L1</text>
  </g>
  <g class="interactive" data-card="osworld" tabindex="0" role="button" aria-label="OSWorld trajectory">
    <circle cx="1080" cy="472" r="6" fill="#B58A2C" stroke="#FAF8F3" stroke-width="1.5"/>
    <text x="1095" y="476" class="mono" font-size="11" font-weight="500" fill="#B58A2C">OSWorld</text>
  </g>
  <g class="interactive" data-card="tau-bench" tabindex="0" role="button" aria-label="tau-bench trajectory">
    <circle cx="1080" cy="296" r="6" fill="#2F5D3F" stroke="#FAF8F3" stroke-width="1.5"/>
    <text x="1095" y="320" class="mono" font-size="11" font-weight="500" fill="#2F5D3F">τ-bench v2</text>
  </g>

  <!-- Y-axis title -->
  <text x="30" y="400" class="body" font-size="12" fill="#5A5A5A" font-style="italic" transform="rotate(-90, 30, 400)" text-anchor="middle">Score public (%)</text>

  <!-- Annotation block -->
  <rect x="110" y="650" width="1030" height="56" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="0.5" stroke-dasharray="2 3"/>
  <text x="130" y="672" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.12em">SIGNATURE COMMUNE</text>
  <text x="130" y="690" class="body" font-size="13" fill="#1A1A1A">Pente raide → plateau → publication d'une variante « Verified » / « v2 » qui rebaisse de 8-15 pts → remontée. Période : 12-18 mois.</text>

  <!-- footer -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="765" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : compilation des scores publiés par Anthropic, OpenAI, Google DeepMind, Magic, Cognition, Sierra sur leurs blogs et papiers, 2024-2026.</text>
  <text x="60" y="784" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Lecture : ordres de grandeur lissés sur les meilleurs résultats par trimestre — les harnais et retries diffèrent entre points.</text>
</svg>
