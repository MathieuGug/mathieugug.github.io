<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; letter-spacing: 0.06em; }
    .interactive { cursor: pointer; }
  </style>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- header -->
  <g class="svg-header">
    <text x="60" y="60" class="mono" font-size="12" font-weight="600" fill="#B7332C" letter-spacing="0.16em">SCHÉMA 02</text>
    <text x="60" y="98" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Les quatre vecteurs de fuite</text>
    <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Aucun n'est trompeur seul. Cumulés, ils déplacent la distribution d'évaluation hors de l'usage.</text>
    <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="0.5"/>
  </g>

  <!-- 2x2 grid axes -->
  <!-- Plot area: x from 240 to 1080 (840 wide), y from 230 to 670 (440 tall) -->
  <!-- Vertical axis label (left): explicite (top) vs implicite (bottom) -->
  <text x="150" y="280" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.16em" text-anchor="middle">EXPLICITE</text>
  <text x="150" y="298" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle" font-style="italic">mesurable,</text>
  <text x="150" y="313" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle" font-style="italic">documenté</text>

  <text x="150" y="620" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.16em" text-anchor="middle">IMPLICITE</text>
  <text x="150" y="638" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle" font-style="italic">latent,</text>
  <text x="150" y="653" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle" font-style="italic">dénié</text>

  <!-- Horizontal axis label -->
  <text x="450" y="700" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.16em" text-anchor="middle">DONNÉES (pré-entraînement)</text>
  <text x="870" y="700" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.16em" text-anchor="middle">PROTOCOLE (évaluation)</text>

  <!-- Axes lines (cross at center) -->
  <line x1="240" y1="450" x2="1080" y2="450" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="660" y1="230" x2="660" y2="670" stroke="#1A1A1A" stroke-width="1"/>

  <!-- arrows at ends -->
  <path d="M 1080 450 L 1095 445 L 1095 455 z" fill="#1A1A1A"/>
  <path d="M 240 450 L 225 445 L 225 455 z" fill="#1A1A1A"/>
  <path d="M 660 230 L 655 215 L 665 215 z" fill="#1A1A1A"/>
  <path d="M 660 670 L 655 685 L 665 685 z" fill="#1A1A1A"/>

  <!-- Quadrant TL: train-test temporal overlap (explicite × données) -->
  <g class="interactive" data-card="temporal-overlap" tabindex="0" role="button" aria-label="Chevauchement train/test temporel">
    <rect x="260" y="240" width="380" height="200" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.25"/>
    <circle cx="290" cy="270" r="10" fill="#B7332C"/>
    <text x="290" y="274" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">i</text>
    <text x="312" y="274" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Chevauchement temporel</text>
    <text x="280" y="300" class="body" font-size="13" fill="#1A1A1A">Le patch correctif est lui-même un commit</text>
    <text x="280" y="318" class="body" font-size="13" fill="#1A1A1A">public dans le repo, scrapé par le pré-entraînement.</text>
    <text x="280" y="346" class="body" font-size="13" fill="#1A1A1A" font-style="italic">Si cutoff &gt; date du patch, le modèle a vu le patch.</text>
    <text x="280" y="374" class="mono" font-size="13" font-weight="500" fill="#B7332C">Effet : −8 à −15 pts si éliminé.</text>
    <text x="280" y="394" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Roberts et al. 2024 — mesuré empiriquement.</text>
    <text x="280" y="418" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Mitigeable uniquement par un test set rolling.</text>
  </g>

  <!-- Quadrant TR: harness gaming (explicite × protocole) -->
  <g class="interactive" data-card="harness-gaming" tabindex="0" role="button" aria-label="Gaming du harnais">
    <rect x="680" y="240" width="380" height="200" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.25"/>
    <circle cx="710" cy="270" r="10" fill="#B7332C"/>
    <text x="710" y="274" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">iii</text>
    <text x="732" y="274" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Gaming du harnais</text>
    <text x="700" y="300" class="body" font-size="13" fill="#1A1A1A">SWE-bench ne fixe que le format du patch.</text>
    <text x="700" y="318" class="body" font-size="13" fill="#1A1A1A">Le reste — exploration, retries, agents</text>
    <text x="700" y="336" class="body" font-size="13" fill="#1A1A1A">multi-étapes — est libre.</text>
    <text x="700" y="364" class="body" font-size="13" fill="#1A1A1A" font-style="italic">Magic, Cognition, Anthropic : harness propriétaires.</text>
    <text x="700" y="388" class="mono" font-size="13" font-weight="500" fill="#B7332C">Effet : +5 à +12 pts cumulés.</text>
    <text x="700" y="412" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Pas de la triche au sens strict — mais</text>
    <text x="700" y="428" class="body" font-size="11" fill="#5A5A5A" font-style="italic">rend les scores non-comparables entre labos.</text>
  </g>

  <!-- Quadrant BL: version-tag leakage (implicite × données) -->
  <g class="interactive" data-card="version-tag" tabindex="0" role="button" aria-label="Fuite par version-tag">
    <rect x="260" y="460" width="380" height="200" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="2 3"/>
    <circle cx="290" cy="490" r="10" fill="#1F5560"/>
    <text x="290" y="494" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">ii</text>
    <text x="312" y="494" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Fuite par version-tag</text>
    <text x="280" y="520" class="body" font-size="13" fill="#1A1A1A">L'énoncé porte le n° de version où le bug</text>
    <text x="280" y="538" class="body" font-size="13" fill="#1A1A1A">apparaît. Le changelog du release suivant</text>
    <text x="280" y="556" class="body" font-size="13" fill="#1A1A1A">décrit le fix. Le modèle apprend l'association.</text>
    <text x="280" y="586" class="body" font-size="13" fill="#1A1A1A" font-style="italic">"This breaks in pandas 1.3.5" → patch attendu.</text>
    <text x="280" y="614" class="mono" font-size="13" font-weight="500" fill="#1F5560">≈ 18 % des instances exposées.</text>
    <text x="280" y="638" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Aleithan et al. 2024, audit SWE-bench+.</text>
  </g>

  <!-- Quadrant BR: prompt leakage (implicite × protocole) -->
  <g class="interactive" data-card="prompt-leakage" tabindex="0" role="button" aria-label="Leakage de prompt">
    <rect x="680" y="460" width="380" height="200" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="2 3"/>
    <circle cx="710" cy="490" r="10" fill="#1F5560"/>
    <text x="710" y="494" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">iv</text>
    <text x="732" y="494" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Leakage de prompt</text>
    <text x="700" y="520" class="body" font-size="13" fill="#1A1A1A">Prompt search exhaustif sur la validation,</text>
    <text x="700" y="538" class="body" font-size="13" fill="#1A1A1A">prompts non-publiés, hints méthodologiques</text>
    <text x="700" y="556" class="body" font-size="13" fill="#1A1A1A">("regarde d'abord tests/", "patch minimal").</text>
    <text x="700" y="586" class="body" font-size="13" fill="#1A1A1A" font-style="italic">Le score dépend du prompt autant que du modèle.</text>
    <text x="700" y="614" class="mono" font-size="13" font-weight="500" fill="#1F5560">Effet : +3 à +6 pts, rarement avoué.</text>
    <text x="700" y="638" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Aucun audit indépendant n'est possible.</text>
  </g>

  <!-- footer -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="765" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : synthèse Roberts et al. 2024 ; Aleithan et al. 2024 (SWE-bench+) ; Sainz et al. 2023 (EMNLP) ; observations terrain 2025-2026.</text>
  <text x="60" y="784" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Lecture : vecteurs (i) et (ii) subis ou mitigeables ; (iii) et (iv) sont des choix de protocole.</text>
</svg>
