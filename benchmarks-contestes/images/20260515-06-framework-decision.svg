<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="'Inter', sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; letter-spacing: 0.06em; }
    .interactive { cursor: pointer; }
  </style>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <g class="svg-header">
    <text x="60" y="60" class="mono" font-size="12" font-weight="600" fill="#B7332C" letter-spacing="0.16em">SCHÉMA 06</text>
    <text x="60" y="98" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Ce que la mesure dit, ce qu'elle ne dira jamais</text>
    <text x="60" y="124" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Framework 2×2 : situer une mesure dans l'espace contrôlé/écologique × ponctuel/longitudinal.</text>
    <line x1="60" y1="142" x2="840" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>
  </g>

  <!-- 2x2 grid: x from 180 to 820 (640 wide), y from 200 to 760 (560 tall) -->
  <!-- Center cross at x=500, y=480 -->

  <!-- Axis labels -->
  <!-- Top: CONTRÔLÉ -->
  <text x="500" y="172" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" letter-spacing="0.16em" text-anchor="middle">CONTRÔLÉ</text>
  <text x="500" y="188" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle" font-style="italic">distribution fixe, reproductible</text>

  <!-- Bottom: ÉCOLOGIQUE -->
  <text x="500" y="800" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" letter-spacing="0.16em" text-anchor="middle">ÉCOLOGIQUE</text>
  <text x="500" y="816" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle" font-style="italic">conditions d'usage réel</text>

  <!-- Left: PONCTUEL -->
  <text x="80" y="475" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" letter-spacing="0.16em">PONCTUEL</text>
  <text x="80" y="492" class="body" font-size="11" fill="#5A5A5A" font-style="italic">une éval, un score</text>

  <!-- Right: LONGITUDINAL -->
  <text x="820" y="475" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" letter-spacing="0.16em" text-anchor="end">LONGITUDINAL</text>
  <text x="820" y="492" class="body" font-size="11" fill="#5A5A5A" font-style="italic" text-anchor="end">suivi continu, dérive</text>

  <!-- Axes lines with arrows -->
  <line x1="180" y1="480" x2="820" y2="480" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="500" y1="200" x2="500" y2="760" stroke="#1A1A1A" stroke-width="1"/>
  <path d="M 820 480 L 835 475 L 835 485 z" fill="#1A1A1A"/>
  <path d="M 180 480 L 165 475 L 165 485 z" fill="#1A1A1A"/>
  <path d="M 500 200 L 495 185 L 505 185 z" fill="#1A1A1A"/>
  <path d="M 500 760 L 495 775 L 505 775 z" fill="#1A1A1A"/>

  <!-- Quadrant TL: Contrôlé + Ponctuel = Benchmark public -->
  <g class="interactive" data-card="benchmark-public" tabindex="0" role="button" aria-label="Benchmark public — quadrant contrôlé / ponctuel">
    <rect x="200" y="210" width="290" height="250" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="220" y="240" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.14em">QUADRANT A</text>
    <text x="220" y="266" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Benchmark public</text>
    <text x="220" y="286" class="body" font-size="12" fill="#5A5A5A" font-style="italic">SWE-bench Verified, GAIA…</text>
    <text x="220" y="316" class="body" font-size="12" fill="#1A1A1A">Sert à : comparer architectures,</text>
    <text x="220" y="332" class="body" font-size="12" fill="#1A1A1A">publier, communiquer.</text>
    <text x="220" y="362" class="body" font-size="12" fill="#1A1A1A" font-style="italic">Ne sert pas à : décider</text>
    <text x="220" y="378" class="body" font-size="12" fill="#1A1A1A" font-style="italic">d'adopter en production.</text>
    <line x1="220" y1="396" x2="470" y2="396" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="220" y="416" class="mono" font-size="11" font-weight="500" fill="#1F5560">+ comparabilité maximale</text>
    <text x="220" y="434" class="mono" font-size="11" font-weight="500" fill="#B7332C">− contamination structurelle</text>
    <text x="220" y="452" class="mono" font-size="11" font-weight="500" fill="#B7332C">− distribution non représentative</text>
  </g>

  <!-- Quadrant TR: Contrôlé + Longitudinal = Eval interne récurrente -->
  <g class="interactive" data-card="eval-interne" tabindex="0" role="button" aria-label="Eval interne récurrente — quadrant contrôlé / longitudinal">
    <rect x="510" y="210" width="290" height="250" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="2.5"/>
    <text x="530" y="240" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.14em">QUADRANT B · RECOMMANDÉ</text>
    <text x="530" y="266" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Éval interne récurrente</text>
    <text x="530" y="286" class="body" font-size="12" fill="#5A5A5A" font-style="italic">30-50 tâches métier datées</text>
    <text x="530" y="316" class="body" font-size="12" fill="#1A1A1A">Construite à partir d'incidents</text>
    <text x="530" y="332" class="body" font-size="12" fill="#1A1A1A">internes, jamais publiée.</text>
    <text x="530" y="362" class="body" font-size="12" fill="#1A1A1A" font-style="italic">Rejouée à chaque MàJ modèle.</text>
    <text x="530" y="378" class="body" font-size="12" fill="#1A1A1A" font-style="italic">Détecte la dérive, pas la frontière.</text>
    <line x1="530" y1="396" x2="780" y2="396" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="530" y="416" class="mono" font-size="11" font-weight="500" fill="#1F5560">+ représentativité maximale</text>
    <text x="530" y="434" class="mono" font-size="11" font-weight="500" fill="#1F5560">+ anti-contamination par construction</text>
    <text x="530" y="452" class="mono" font-size="11" font-weight="500" fill="#B7332C">− pas de comparabilité externe</text>
  </g>

  <!-- Quadrant BL: Écologique + Ponctuel = Pilote utilisateur -->
  <g class="interactive" data-card="pilote" tabindex="0" role="button" aria-label="Pilote utilisateur — quadrant écologique / ponctuel">
    <rect x="200" y="500" width="290" height="250" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="220" y="530" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.14em">QUADRANT C</text>
    <text x="220" y="556" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Pilote utilisateur</text>
    <text x="220" y="576" class="body" font-size="12" fill="#5A5A5A" font-style="italic">canary, A/B avec ingénieurs</text>
    <text x="220" y="606" class="body" font-size="12" fill="#1A1A1A">Évaluation par les utilisateurs</text>
    <text x="220" y="622" class="body" font-size="12" fill="#1A1A1A">cibles sur un sous-périmètre.</text>
    <text x="220" y="652" class="body" font-size="12" fill="#1A1A1A" font-style="italic">Capture les frottements UX,</text>
    <text x="220" y="668" class="body" font-size="12" fill="#1A1A1A" font-style="italic">la cognitive load, les rejets.</text>
    <line x1="220" y1="686" x2="470" y2="686" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="220" y="706" class="mono" font-size="11" font-weight="500" fill="#1F5560">+ validité écologique</text>
    <text x="220" y="724" class="mono" font-size="11" font-weight="500" fill="#B7332C">− biais d'auto-sélection</text>
    <text x="220" y="742" class="mono" font-size="11" font-weight="500" fill="#B7332C">− pas de signal sur la dérive</text>
  </g>

  <!-- Quadrant BR: Écologique + Longitudinal = Monitoring production -->
  <g class="interactive" data-card="monitoring" tabindex="0" role="button" aria-label="Monitoring production — quadrant écologique / longitudinal">
    <rect x="510" y="500" width="290" height="250" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="530" y="530" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.14em">QUADRANT D</text>
    <text x="530" y="556" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Monitoring production</text>
    <text x="530" y="576" class="body" font-size="12" fill="#5A5A5A" font-style="italic">OTel GenAI, traces, replays</text>
    <text x="530" y="606" class="body" font-size="12" fill="#1A1A1A">Suivi continu en production :</text>
    <text x="530" y="622" class="body" font-size="12" fill="#1A1A1A">taux d'échec, coût latent,</text>
    <text x="530" y="638" class="body" font-size="12" fill="#1A1A1A">distribution des trajectoires.</text>
    <text x="530" y="668" class="body" font-size="12" fill="#1A1A1A" font-style="italic">Voir le dossier observabilite-agents-ia.</text>
    <line x1="530" y1="686" x2="780" y2="686" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="530" y="706" class="mono" font-size="11" font-weight="500" fill="#1F5560">+ détecte les régressions tôt</text>
    <text x="530" y="724" class="mono" font-size="11" font-weight="500" fill="#B7332C">− coûteux à instrumenter</text>
    <text x="530" y="742" class="mono" font-size="11" font-weight="500" fill="#B7332C">− pas de baseline contrôlée</text>
  </g>

  <!-- footer -->
  <line x1="60" y1="850" x2="840" y2="850" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="872" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : cadre analytique de l'auteur, dérivé de la triangulation observée sur 12 mois d'adoption d'agents en entreprise (2025-2026).</text>
  <text x="60" y="888" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Lecture : la rigueur empirique exige les quatre quadrants. Aucun ne se substitue aux trois autres.</text>
</svg>
