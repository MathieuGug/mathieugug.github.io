<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; letter-spacing: 0.06em; }
    .interactive { cursor: pointer; }
  </style>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <g class="svg-header">
    <text x="60" y="60" class="mono" font-size="12" font-weight="600" fill="#B7332C" letter-spacing="0.16em">SCHÉMA 05</text>
    <text x="60" y="98" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le contre-mouvement : cinq approches</text>
    <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Aucune ne domine. Chacune accepte un compromis différent entre rigueur, coût et comparabilité.</text>
    <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="0.5"/>
  </g>

  <!-- Matrix: 5 rows (benchmarks), 5 columns (criteria) -->
  <!-- Plot area: x = 240..1080, y = 220..620 -->
  <!-- Row height: 80 px. Column widths: name col 180 (240..420), then 4 criteria cols of 165 (420..585, 585..750, 750..915, 915..1080) -->

  <!-- Column headers -->
  <g class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.12em" text-anchor="middle">
    <text x="502" y="206">MISE À JOUR</text>
    <text x="667" y="206">COÛT ÉVAL</text>
    <text x="832" y="206">ANTI-CONTAMINATION</text>
    <text x="997" y="206">COMPARABILITÉ</text>
  </g>
  <text x="330" y="206" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.12em" text-anchor="middle">BENCHMARK</text>

  <!-- Header rule -->
  <line x1="240" y1="218" x2="1080" y2="218" stroke="#1A1A1A" stroke-width="1"/>

  <!-- Row 1: SWE-bench Live -->
  <g class="interactive" data-card="swe-live" tabindex="0" role="button" aria-label="SWE-bench Live">
    <rect x="240" y="222" width="840" height="80" rx="0" fill="#F2EFE7" opacity="0.5"/>
    <text x="260" y="252" class="display" font-size="15" font-weight="600" fill="#1A1A1A">SWE-bench Live</text>
    <text x="260" y="270" class="body" font-size="12" fill="#5A5A5A" font-style="italic">Princeton + MSR, 2025 — rolling</text>
    <text x="260" y="288" class="body" font-size="11" fill="#5A5A5A">issues scrapées chaque semaine</text>
    <!-- update freq: full -->
    <circle cx="502" cy="262" r="14" fill="#B7332C"/>
    <text x="502" y="266" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">●</text>
    <text x="502" y="290" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">hebdo</text>
    <!-- cost: low -->
    <circle cx="667" cy="262" r="14" fill="none" stroke="#B7332C" stroke-width="1.5"/>
    <text x="667" y="266" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">○</text>
    <text x="667" y="290" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">~500$ / run</text>
    <!-- anti-contam: full -->
    <circle cx="832" cy="262" r="14" fill="#B7332C"/>
    <text x="832" y="290" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">fort</text>
    <!-- comparability: nil -->
    <circle cx="997" cy="262" r="14" fill="none" stroke="#B7332C" stroke-width="1.5"/>
    <text x="997" y="266" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">○</text>
    <text x="997" y="290" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">temporelle ↓</text>
  </g>

  <line x1="240" y1="302" x2="1080" y2="302" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Row 2: SWE-Lancer -->
  <g class="interactive" data-card="swe-lancer" tabindex="0" role="button" aria-label="SWE-Lancer">
    <text x="260" y="336" class="display" font-size="15" font-weight="600" fill="#1A1A1A">SWE-Lancer</text>
    <text x="260" y="354" class="body" font-size="12" fill="#5A5A5A" font-style="italic">OpenAI, 2025 — tâches payées</text>
    <text x="260" y="372" class="body" font-size="11" fill="#5A5A5A">PR sur Upwork validées par client</text>
    <circle cx="502" cy="346" r="14" fill="#1F5560"/>
    <text x="502" y="374" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">par cohorte</text>
    <circle cx="667" cy="346" r="14" fill="#B7332C"/>
    <text x="667" y="374" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">10-40 k$ / run</text>
    <circle cx="832" cy="346" r="14" fill="#B7332C"/>
    <text x="832" y="374" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">par construction</text>
    <circle cx="997" cy="346" r="14" fill="#1F5560" opacity="0.5"/>
    <text x="997" y="374" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">moyenne</text>
  </g>

  <line x1="240" y1="386" x2="1080" y2="386" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Row 3: CORE-Bench -->
  <g class="interactive" data-card="core-bench" tabindex="0" role="button" aria-label="CORE-Bench">
    <text x="260" y="420" class="display" font-size="15" font-weight="600" fill="#1A1A1A">CORE-Bench</text>
    <text x="260" y="438" class="body" font-size="12" fill="#5A5A5A" font-style="italic">NYU, 2024 — reproductibilité</text>
    <text x="260" y="456" class="body" font-size="11" fill="#5A5A5A">cloner repo, reproduire figures</text>
    <circle cx="502" cy="430" r="14" fill="#1F5560" opacity="0.5"/>
    <text x="502" y="458" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">papiers continus</text>
    <circle cx="667" cy="430" r="14" fill="#1F5560"/>
    <text x="667" y="458" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">~2-5 k$ / run</text>
    <circle cx="832" cy="430" r="14" fill="#1F5560"/>
    <text x="832" y="458" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">bonne</text>
    <circle cx="997" cy="430" r="14" fill="#1F5560"/>
    <text x="997" y="458" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">bonne (figures fixes)</text>
  </g>

  <line x1="240" y1="470" x2="1080" y2="470" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Row 4: MLE-bench -->
  <g class="interactive" data-card="mle-bench" tabindex="0" role="button" aria-label="MLE-bench">
    <text x="260" y="504" class="display" font-size="15" font-weight="600" fill="#1A1A1A">MLE-bench</text>
    <text x="260" y="522" class="body" font-size="12" fill="#5A5A5A" font-style="italic">OpenAI, 2024 — 75 Kaggle</text>
    <text x="260" y="540" class="body" font-size="11" fill="#5A5A5A">médaille bronze / argent / or</text>
    <circle cx="502" cy="514" r="14" fill="#1F5560" opacity="0.5"/>
    <text x="502" y="542" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">par batch annuel</text>
    <circle cx="667" cy="514" r="14" fill="#1F5560"/>
    <text x="667" y="542" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">~1-3 k$ / run</text>
    <circle cx="832" cy="514" r="14" fill="#1F5560"/>
    <text x="832" y="542" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">monitoré</text>
    <circle cx="997" cy="514" r="14" fill="#1F5560"/>
    <text x="997" y="542" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">bonne (médaille)</text>
  </g>

  <line x1="240" y1="554" x2="1080" y2="554" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Row 5: ARC-AGI 2 -->
  <g class="interactive" data-card="arc-agi" tabindex="0" role="button" aria-label="ARC-AGI 2">
    <text x="260" y="588" class="display" font-size="15" font-weight="600" fill="#1A1A1A">ARC-AGI 2</text>
    <text x="260" y="606" class="body" font-size="12" fill="#5A5A5A" font-style="italic">ARC Prize, 2024 — private set</text>
    <text x="260" y="624" class="body" font-size="11" fill="#5A5A5A">budget compute capé</text>
    <circle cx="502" cy="598" r="14" fill="#1F5560" opacity="0.3"/>
    <text x="502" y="626" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">annuel</text>
    <circle cx="667" cy="598" r="14" fill="#B7332C" opacity="0.5"/>
    <text x="667" y="626" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">~5-20 k$ / run</text>
    <circle cx="832" cy="598" r="14" fill="#B7332C"/>
    <text x="832" y="626" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">maximal</text>
    <circle cx="997" cy="598" r="14" fill="#1F5560"/>
    <text x="997" y="626" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">excellente</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 660)">
    <text x="0" y="0" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.12em">LECTURE</text>
    <circle cx="100" cy="-4" r="9" fill="#B7332C"/>
    <text x="115" y="0" class="body" font-size="12" fill="#1A1A1A">excellent / radical</text>
    <circle cx="280" cy="-4" r="9" fill="#1F5560"/>
    <text x="295" y="0" class="body" font-size="12" fill="#1A1A1A">bon / partiel</text>
    <circle cx="430" cy="-4" r="9" fill="#1F5560" opacity="0.5"/>
    <text x="445" y="0" class="body" font-size="12" fill="#1A1A1A">moyen</text>
    <circle cx="540" cy="-4" r="9" fill="none" stroke="#B7332C" stroke-width="1.5"/>
    <text x="555" y="0" class="body" font-size="12" fill="#1A1A1A">faible / absent</text>
  </g>

  <!-- footer -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="765" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : papiers de référence cités ; coûts d'évaluation estimés sur la base des prix API observés mai 2026 (Anthropic / OpenAI) et marges Upwork pour SWE-Lancer.</text>
  <text x="60" y="784" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Lecture : aucun benchmark ne domine. Le bon choix dépend du rôle — chercher, acheter, auditer.</text>
</svg>
