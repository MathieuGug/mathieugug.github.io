<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; letter-spacing: 0.06em; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <g class="svg-header">
    <text x="60" y="60" class="mono" font-size="12" font-weight="600" fill="#B7332C" letter-spacing="0.16em">SCHÉMA 04</text>
    <text x="60" y="98" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Chaîne d'optimisation industrielle d'un score</text>
    <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Cinq leviers, jamais publiés au même endroit, qui se composent multiplicativement — +15 à +25 pts cumulés.</text>
    <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="0.5"/>
  </g>

  <!-- Base score on the left, final score on the right; 5 levers along the way -->
  <!-- Base score node -->
  <g>
    <rect x="60" y="280" width="140" height="100" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <text x="130" y="312" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" text-anchor="middle">BASE</text>
    <text x="130" y="340" class="display" font-size="22" font-weight="600" fill="#1A1A1A" text-anchor="middle">~50 %</text>
    <text x="130" y="360" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle" font-style="italic">N=1, vanilla</text>
  </g>

  <!-- Five lever cards, each contributing -->
  <!-- positions: x = 230, 400, 570, 740, 910, width 150 each (+arrow gap), final at 1080 -->

  <g class="interactive" data-card="checkpoint" tabindex="0" role="button" aria-label="Sélection de checkpoint">
    <rect x="230" y="200" width="150" height="260" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.25"/>
    <circle cx="260" cy="230" r="11" fill="#B7332C"/>
    <text x="260" y="234" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>
    <text x="280" y="234" class="mono" font-size="10" font-weight="600" fill="#1F5560" letter-spacing="0.08em">SÉLECTION</text>
    <text x="245" y="266" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Checkpoint</text>
    <text x="245" y="284" class="display" font-size="15" font-weight="600" fill="#1A1A1A">benchmark-fit</text>
    <text x="245" y="312" class="body" font-size="12" fill="#1A1A1A">Choisir l'epoch qui</text>
    <text x="245" y="328" class="body" font-size="12" fill="#1A1A1A">maximise SWE-bench,</text>
    <text x="245" y="344" class="body" font-size="12" fill="#1A1A1A">pas la loss moyenne.</text>
    <text x="245" y="380" class="mono" font-size="13" font-weight="500" fill="#B7332C">+2 à +4 pts</text>
    <text x="245" y="412" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Effort : faible.</text>
    <text x="245" y="428" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Tous les labos.</text>
  </g>

  <g class="interactive" data-card="harness-custom" tabindex="0" role="button" aria-label="Harness custom">
    <rect x="400" y="200" width="150" height="260" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.25"/>
    <circle cx="430" cy="230" r="11" fill="#B7332C"/>
    <text x="430" y="234" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">2</text>
    <text x="450" y="234" class="mono" font-size="10" font-weight="600" fill="#1F5560" letter-spacing="0.08em">ORCHESTR.</text>
    <text x="415" y="266" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Harness</text>
    <text x="415" y="284" class="display" font-size="15" font-weight="600" fill="#1A1A1A">custom</text>
    <text x="415" y="312" class="body" font-size="12" fill="#1A1A1A">Planner + executor</text>
    <text x="415" y="328" class="body" font-size="12" fill="#1A1A1A">+ critic, ou Re-Act</text>
    <text x="415" y="344" class="body" font-size="12" fill="#1A1A1A">multi-tour.</text>
    <text x="415" y="380" class="mono" font-size="13" font-weight="500" fill="#B7332C">+5 à +10 pts</text>
    <text x="415" y="412" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Effort : moyen.</text>
    <text x="415" y="428" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Magic, Cognition.</text>
  </g>

  <g class="interactive" data-card="prompt-eng" tabindex="0" role="button" aria-label="Prompt engineering ciblé">
    <rect x="570" y="200" width="150" height="260" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.25"/>
    <circle cx="600" cy="230" r="11" fill="#B7332C"/>
    <text x="600" y="234" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">3</text>
    <text x="620" y="234" class="mono" font-size="10" font-weight="600" fill="#1F5560" letter-spacing="0.08em">PROMPTS</text>
    <text x="585" y="266" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Prompts</text>
    <text x="585" y="284" class="display" font-size="15" font-weight="600" fill="#1A1A1A">calibrés</text>
    <text x="585" y="312" class="body" font-size="12" fill="#1A1A1A">Prompt-search sur</text>
    <text x="585" y="328" class="body" font-size="12" fill="#1A1A1A">la validation,</text>
    <text x="585" y="344" class="body" font-size="12" fill="#1A1A1A">hints méthodo.</text>
    <text x="585" y="380" class="mono" font-size="13" font-weight="500" fill="#B7332C">+3 à +6 pts</text>
    <text x="585" y="412" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Effort : moyen.</text>
    <text x="585" y="428" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Rarement publié.</text>
  </g>

  <g class="interactive" data-card="rl-fine-tune" tabindex="0" role="button" aria-label="RL fine-tuning ciblé">
    <rect x="740" y="200" width="150" height="260" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="2.5"/>
    <circle cx="770" cy="230" r="11" fill="#B7332C"/>
    <text x="770" y="234" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">4</text>
    <text x="790" y="234" class="mono" font-size="10" font-weight="600" fill="#B7332C" letter-spacing="0.08em">RL CIBLÉ</text>
    <text x="755" y="266" class="display" font-size="15" font-weight="600" fill="#1A1A1A">RL sur</text>
    <text x="755" y="284" class="display" font-size="15" font-weight="600" fill="#1A1A1A">trajectoires</text>
    <text x="755" y="302" class="display" font-size="15" font-weight="600" fill="#1A1A1A">similaires</text>
    <text x="755" y="330" class="body" font-size="12" fill="#1A1A1A">Issues GitHub d'autres</text>
    <text x="755" y="346" class="body" font-size="12" fill="#1A1A1A">repos, mêmes patterns,</text>
    <text x="755" y="362" class="body" font-size="12" fill="#1A1A1A">récompense binaire.</text>
    <text x="755" y="392" class="mono" font-size="13" font-weight="500" fill="#B7332C">+5 à +15 pts</text>
    <text x="755" y="420" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Effort : élevé.</text>
    <text x="755" y="436" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Frontière éthique.</text>
  </g>

  <g class="interactive" data-card="retries" tabindex="0" role="button" aria-label="Retries et sélection">
    <rect x="910" y="200" width="150" height="260" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.25"/>
    <circle cx="940" cy="230" r="11" fill="#B7332C"/>
    <text x="940" y="234" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">5</text>
    <text x="960" y="234" class="mono" font-size="10" font-weight="600" fill="#1F5560" letter-spacing="0.08em">RETRIES</text>
    <text x="925" y="266" class="display" font-size="15" font-weight="600" fill="#1A1A1A">N=1 → N=8</text>
    <text x="925" y="294" class="body" font-size="12" fill="#1A1A1A">Vote majoritaire ou</text>
    <text x="925" y="310" class="body" font-size="12" fill="#1A1A1A">best-of-N par tests</text>
    <text x="925" y="326" class="body" font-size="12" fill="#1A1A1A">passants observés.</text>
    <text x="925" y="354" class="body" font-size="12" fill="#1A1A1A">Compute ×8, score ↑.</text>
    <text x="925" y="384" class="mono" font-size="13" font-weight="500" fill="#B7332C">+6 à +12 pts</text>
    <text x="925" y="416" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Effort : faible.</text>
    <text x="925" y="432" class="body" font-size="11" fill="#5A5A5A" font-style="italic">Coût : élevé.</text>
  </g>

  <!-- Final score node -->
  <g>
    <rect x="1085" y="280" width="100" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <text x="1135" y="312" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">PUBLIÉ</text>
    <text x="1135" y="346" class="display" font-size="22" font-weight="600" fill="#B7332C" text-anchor="middle">75 %</text>
    <text x="1135" y="365" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle" font-style="italic">leaderboard</text>
  </g>

  <!-- Flow arrows between leverage stages -->
  <line x1="205" y1="330" x2="225" y2="330" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr1)"/>
  <line x1="385" y1="330" x2="395" y2="330" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr1)"/>
  <line x1="555" y1="330" x2="565" y2="330" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr1)"/>
  <line x1="725" y1="330" x2="735" y2="330" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr1)"/>
  <line x1="895" y1="330" x2="905" y2="330" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr1)"/>
  <line x1="1065" y1="330" x2="1080" y2="330" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr1)"/>

  <!-- Annotation block: team / equipe -->
  <rect x="60" y="540" width="1080" height="130" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 3"/>
  <text x="84" y="568" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.12em">LA « BENCHMARK TEAM » — STRUCTURE INDUSTRIALISÉE EN 18 MOIS</text>
  <text x="84" y="594" class="body" font-size="13" fill="#1A1A1A">Chaque grand labo dispose désormais d'une équipe dédiée de 3 à 5 ingénieurs sur le seul SWE-bench :  un ML engineer pour le RL ciblé, deux research engineers pour le harness</text>
  <text x="84" y="612" class="body" font-size="13" fill="#1A1A1A">et le prompt-search, un infra engineer pour le compute des retries, parfois un product manager qui coordonne avec le calendrier de release. L'opération a un budget annuel propre,</text>
  <text x="84" y="630" class="body" font-size="13" fill="#1A1A1A">distinct du budget d'entraînement du modèle généraliste. Le score publié devient ainsi une fonction de l'effort d'optimisation, pas seulement de la capacité du modèle de base.</text>
  <text x="84" y="654" class="body" font-size="12" fill="#5A5A5A" font-style="italic">→ La règle de Goodhart en accéléré : la mesure, devenue cible, cesse d'être mesure.</text>

  <!-- footer -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="765" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : synthèse des blogs Anthropic, OpenAI, Magic, Cognition (2024-2026) et observations communautaires (Princeton NLP Discord, swe-bench.com).</text>
  <text x="60" y="784" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Lecture : chaque levier paraît raisonnable individuellement. L'effet cumulé reste rarement publié.</text>
</svg>
