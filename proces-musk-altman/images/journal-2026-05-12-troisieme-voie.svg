<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-label="La troisième voie de Nadella — Voice 1, Voice 2, Voice 3 et le safe harbor de Casey v. U.S. Bank">
  <defs>
    <marker id="jArrow0512" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArrow0512Dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9ca5"/>
    </marker>
    <marker id="jCross0512" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 1 1 L 9 9 M 9 1 L 1 9" stroke="#9a9ca5" stroke-width="1.6" fill="none"/>
    </marker>
  </defs>
  <rect width="1200" height="780" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-12 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">La <tspan font-style="italic" fill="#b8582e">troisième voie</tspan> de Nadella</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Voice 1 fracture la défense. Voice 2 ratifie la connaissance. <tspan font-weight="500" fill="#1e1e2a">Voice 3 — « one-way door » — referme le safe harbor de Casey.</tspan></text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <g>
    <rect x="60" y="182" width="1080" height="118" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="182" width="6" height="118" fill="#b8582e"/>
    <text x="92" y="208" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">LUNDI 11 MAI · S. NADELLA À LA BARRE · CADRAGE OUVERT D'ENTRÉE</text>
    <text x="92" y="240" font-family="'Fraunces', serif" font-size="21" font-style="italic" font-weight="500" fill="#faf6ec">« We couldn't build <tspan font-weight="600" fill="#b8582e">two supercomputers</tspan> — one for itself and one for OpenAI. »</text>
    <text x="92" y="270" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#9a9ca5">« We were <tspan font-weight="500" fill="#faf6ec">outsourcing</tspan> essentially a lot of the core IP development » · « the return could just as easily have been <tspan font-weight="500" fill="#faf6ec">zero</tspan> »</text>
    <text x="92" y="290" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#6b6f7c" letter-spacing="1.2">DESCRIPTION DE LA NÉCESSITÉ OPÉRATIONNELLE — PAS DÉFENSE DE LA FAIRNESS</text>
  </g>

  <text x="60" y="338" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">TROIS VOIES POSSIBLES POUR LA DÉFENSE MICROSOFT · UNE SEULE ÉCHAPPE À CASEY</text>

  <g>
    <rect x="60" y="354" width="340" height="236" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="60" y="354" width="340" height="34" rx="6" fill="#f3eedf"/>
    <rect x="60" y="382" width="340" height="6" fill="#f3eedf"/>
    <text x="80" y="377" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#6b6f7c" letter-spacing="1.6">VOICE 1 · RÉPUDIATION</text>
    <text x="80" y="414" font-family="'Fraunces', serif" font-size="14" font-style="italic" font-weight="500" fill="#1e1e2a">« We relied on representations<tspan x="80" dy="18"> from OpenAI. »</tspan></text>
    <line x1="80" y1="456" x2="380" y2="456" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>
    <text x="80" y="478" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">EFFET ATTENDU</text>
    <text x="80" y="498" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Pointe Altman / Brockman</text>
    <text x="80" y="516" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">→ <tspan font-weight="500" fill="#1e1e2a">fracture la défense conjointe</tspan></text>
    <text x="80" y="550" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#9a9ca5" letter-spacing="1.4">VERDICT TACTIQUE</text>
    <text x="80" y="570" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#9a9ca5">✕ écartée — Wachtell perd son co-défendeur</text>
  </g>

  <g>
    <rect x="430" y="354" width="340" height="236" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="430" y="354" width="340" height="34" rx="6" fill="#f3eedf"/>
    <rect x="430" y="382" width="340" height="6" fill="#f3eedf"/>
    <text x="450" y="377" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#6b6f7c" letter-spacing="1.6">VOICE 2 · DÉFENSE DE LA FAIRNESS</text>
    <text x="450" y="414" font-family="'Fraunces', serif" font-size="14" font-style="italic" font-weight="500" fill="#1e1e2a">« We believed the transactions<tspan x="450" dy="18"> were fair. »</tspan></text>
    <line x1="450" y1="456" x2="750" y2="456" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>
    <text x="450" y="478" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">EFFET ATTENDU</text>
    <text x="450" y="498" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Évite la fracture, mais</text>
    <text x="450" y="516" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">→ <tspan font-weight="500" fill="#1e1e2a">ratifie l'actual knowledge</tspan></text>
    <text x="450" y="550" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#9a9ca5" letter-spacing="1.4">VERDICT TACTIQUE</text>
    <text x="450" y="570" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#9a9ca5">✕ écartée — Casey se referme</text>
  </g>

  <g>
    <rect x="800" y="354" width="340" height="236" rx="6" fill="#1e1e2a" stroke="#b8582e" stroke-width="2.2"/>
    <rect x="800" y="354" width="340" height="34" rx="6" fill="#b8582e"/>
    <rect x="800" y="382" width="340" height="6" fill="#b8582e"/>
    <text x="820" y="377" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">VOICE 3 · NÉCESSITÉ OPÉRATIONNELLE</text>
    <text x="820" y="414" font-family="'Fraunces', serif" font-size="14" font-style="italic" font-weight="500" fill="#faf6ec">« One-way door. Outsourcing.<tspan x="820" dy="18"> Calculated risk. »</tspan></text>
    <line x1="820" y1="456" x2="1120" y2="456" stroke="rgba(250,246,236,0.18)" stroke-width="1"/>
    <text x="820" y="478" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">EFFET CONSTATÉ</text>
    <text x="820" y="498" font-family="'Inter', sans-serif" font-size="12.5" fill="#9a9ca5">Change l'objet de l'audience —</text>
    <text x="820" y="516" font-family="'Inter', sans-serif" font-size="12.5" fill="#9a9ca5">→ <tspan font-weight="500" fill="#faf6ec">ordinary business transaction</tspan></text>
    <text x="820" y="550" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">VERDICT TACTIQUE</text>
    <text x="820" y="570" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#b8582e">✓ choisie — Casey ouvre son safe harbor</text>
  </g>

  <line x1="60" y1="616" x2="1140" y2="616" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>

  <text x="60" y="642" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">LE SEUL POINT FAIBLE DE VOICE 3 — ET CE QUE MOLO POSE EN RÉSERVE POUR JEUDI</text>

  <g>
    <rect x="60" y="658" width="1080" height="86" rx="6" fill="#faf6ec" stroke="rgba(184,88,46,0.55)" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="84" y="684" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">PIÈCE M-471 · MÉMO BRAD SMITH (PRÉSIDENT MICROSOFT) AU BOARD · JANVIER 2023</text>
    <text x="84" y="710" font-family="'Fraunces', serif" font-size="17" font-style="italic" font-weight="500" fill="#1e1e2a">Projection <tspan font-weight="600" fill="#b8582e">92 Md$</tspan> de retour sur <tspan font-weight="600" fill="#b8582e">13 Md$</tspan> investis · note de bas de page : « 20% annual increase starting in 2025 »</text>
    <text x="84" y="734" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Modélisation contemporaine de l'upside — <tspan font-style="italic">ex ante</tspan>, pas <tspan font-style="italic">ex post</tspan>. Si la juge retient le mémo comme trace de modélisation, la <tspan font-weight="500" fill="#1e1e2a">ordinary-ness</tspan> fissure. Hedge Nadella : « <tspan font-style="italic">could have been zero</tspan> » — non démontée en séance.</text>
  </g>

  <text x="60" y="772" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">Sources : CNBC · GeekWire · AlphaPilot (11 mai 2026) · Yahoo Finance / AP · KQED · Business Standard / Reuters · Casey v. U.S. Bank N.A., 127 Cal. App. 4th 1138 (2005)</text>
</svg>
