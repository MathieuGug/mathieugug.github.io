<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="La deuxième poche du quantum — Casey v. U.S. Bank et Microsoft comme aider-and-abettor potentiel">
  <defs>
    <marker id="jArrow0511" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArrow0511Dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9ca5"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-11 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">La <tspan font-style="italic" fill="#b8582e">deuxième poche</tspan> du quantum</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Casey v. U.S. Bank (2005) — l'email Scott de mars 2018 satisfait l'<tspan font-weight="500" fill="#1e1e2a">actual knowledge</tspan>. La trajectoire $50 M → $228 Md satisfait la <tspan font-weight="500" fill="#1e1e2a">substantial assistance</tspan>.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <!-- Top band : the Kevin Scott email -->
  <g>
    <rect x="60" y="182" width="1080" height="138" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="182" width="6" height="138" fill="#b8582e"/>
    <text x="92" y="208" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">MARS 2018 · K. SCOTT (CTO) → S. NADELLA (CEO), A. HOOD (CFO), E. HORVITZ (CHIEF SCIENTIST)</text>
    <text x="92" y="240" font-family="'Fraunces', serif" font-size="21" font-style="italic" font-weight="500" fill="#faf6ec">« I wonder if the <tspan font-weight="600" fill="#b8582e">big OpenAI donors</tspan> are <tspan font-weight="600" fill="#b8582e">aware of these plans</tspan>? »</text>
    <text x="92" y="270" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#9a9ca5">« I can't imagine that they funded an open effort to concentrate ML talent so that they could then go build a closed, for profit thing on its back. »</text>
    <text x="92" y="300" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6b6f7c" letter-spacing="1.2">PIÈCE DÉPOSÉE AU DOSSIER — 15 JANVIER 2026 · ATTENDUE LUNDI 11 MAI EN AUDIENCE</text>
  </g>

  <!-- Middle band : Casey two-prong test -->
  <text x="60" y="356" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">CASEY v. U.S. BANK N.A. · 127 CAL. APP. 4TH 1138 (2005) — DEUX PRONGS POUR L'AIDING AND ABETTING</text>

  <!-- Left card : actual knowledge -->
  <g>
    <rect x="60" y="372" width="520" height="222" rx="6" fill="#ffffff" stroke="rgba(184,88,46,0.40)" stroke-width="1.4"/>
    <rect x="60" y="372" width="6" height="222" fill="#b8582e"/>
    <text x="92" y="398" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">PRONG (i) · ACTUAL KNOWLEDGE</text>
    <text x="92" y="424" font-family="'Fraunces', serif" font-size="18" font-weight="500" fill="#1e1e2a">Connaissance <tspan font-style="italic">réelle</tspan> du manquement</text>
    <text x="92" y="446" font-family="'Fraunces', serif" font-size="12" font-style="italic" fill="#6b6f7c">Standard de preuve directe — pas d'inférence.</text>
    <line x1="92" y1="460" x2="560" y2="460" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>

    <text x="92" y="486" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">→ Manquement nommé</text>
    <text x="106" y="504" font-family="'Inter', sans-serif" font-size="12" fill="#3b3f4d"><tspan font-style="italic">plans</tspan> commerciaux d'OpenAI</text>

    <text x="92" y="528" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">→ Victime nommée</text>
    <text x="106" y="546" font-family="'Inter', sans-serif" font-size="12" fill="#3b3f4d"><tspan font-style="italic">the big OpenAI donors</tspan></text>

    <text x="92" y="570" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">→ Incompatibilité reconnue</text>
    <text x="106" y="588" font-family="'Inter', sans-serif" font-size="12" fill="#3b3f4d"><tspan font-style="italic">open effort → closed, for profit thing</tspan></text>
  </g>

  <!-- Right card : substantial assistance -->
  <g>
    <rect x="620" y="372" width="520" height="222" rx="6" fill="#ffffff" stroke="rgba(184,88,46,0.40)" stroke-width="1.4"/>
    <rect x="620" y="372" width="6" height="222" fill="#b8582e"/>
    <text x="652" y="398" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">PRONG (ii) · SUBSTANTIAL ASSISTANCE</text>
    <text x="652" y="424" font-family="'Fraunces', serif" font-size="18" font-weight="500" fill="#1e1e2a">Pas une <tspan font-style="italic">ordinary business transaction</tspan></text>
    <text x="652" y="446" font-family="'Fraunces', serif" font-size="12" font-style="italic" fill="#6b6f7c">Trajectoire 2016 → 2025 · intégration structurelle.</text>
    <line x1="652" y1="460" x2="1120" y2="460" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>

    <!-- Timeline graph -->
    <line x1="676" y1="556" x2="1116" y2="556" stroke="#1e1e2a" stroke-width="1.2"/>

    <!-- 2016 : 50M -->
    <line x1="676" y1="552" x2="676" y2="560" stroke="#1e1e2a" stroke-width="1.2"/>
    <circle cx="676" cy="540" r="3" fill="#9a9ca5"/>
    <text x="676" y="528" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" text-anchor="middle">50 M$</text>
    <text x="676" y="574" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6f7c" text-anchor="middle">2016</text>

    <!-- 2018 : 300M ask -->
    <line x1="752" y1="552" x2="752" y2="560" stroke="#1e1e2a" stroke-width="1.2"/>
    <circle cx="752" cy="528" r="4" fill="#9a9ca5"/>
    <text x="752" y="516" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" text-anchor="middle">300 M$</text>
    <text x="752" y="574" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6f7c" text-anchor="middle">2018</text>

    <!-- 2019 : 1B -->
    <line x1="828" y1="552" x2="828" y2="560" stroke="#1e1e2a" stroke-width="1.2"/>
    <circle cx="828" cy="514" r="5" fill="#9a9ca5"/>
    <text x="828" y="502" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" text-anchor="middle">1 Md$</text>
    <text x="828" y="574" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6f7c" text-anchor="middle">2019</text>

    <!-- 2023 : 13B -->
    <line x1="924" y1="552" x2="924" y2="560" stroke="#1e1e2a" stroke-width="1.2"/>
    <circle cx="924" cy="498" r="7" fill="#b8582e"/>
    <text x="924" y="486" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#b8582e" text-anchor="middle">13 Md$</text>
    <text x="924" y="574" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6f7c" text-anchor="middle">2023</text>

    <!-- 2025 : 228B + 27% -->
    <line x1="1056" y1="552" x2="1056" y2="560" stroke="#b8582e" stroke-width="2"/>
    <circle cx="1056" cy="488" r="10" fill="#b8582e"/>
    <text x="1056" y="476" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#b8582e" text-anchor="middle">228 Md$ · 27 %</text>
    <text x="1056" y="574" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6f7c" text-anchor="middle">2025</text>

    <line x1="676" y1="540" x2="752" y2="528" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <line x1="752" y1="528" x2="828" y2="514" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <line x1="828" y1="514" x2="924" y2="498" stroke="rgba(184,88,46,0.50)" stroke-width="1.4"/>
    <line x1="924" y1="498" x2="1056" y2="488" stroke="#b8582e" stroke-width="1.8"/>
  </g>

  <!-- Bottom band : the doctrinal pivot -->
  <line x1="60" y1="620" x2="1140" y2="620" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>

  <text x="60" y="646" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">CONSÉQUENCE EN ÉQUITÉ · LUNDI 11 MAI · NADELLA À LA BARRE</text>

  <g>
    <rect x="60" y="662" width="500" height="58" rx="6" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="80" y="684" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">AVANT</text>
    <text x="80" y="704" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#1e1e2a">Microsoft = bailleur <tspan font-style="italic">arm's-length</tspan></text>
    <text x="80" y="718" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#6b6f7c">Disgorgement plafonnée à la part PBC fondation</text>

    <line x1="572" y1="691" x2="628" y2="691" stroke="#b8582e" stroke-width="1.8" marker-end="url(#jArrow0511)"/>
    <text x="600" y="681" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6f7c" text-anchor="middle" letter-spacing="1.2">PIVOT</text>

    <rect x="640" y="662" width="500" height="58" rx="6" fill="#1e1e2a" stroke="#1e1e2a" stroke-width="1"/>
    <text x="660" y="684" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">APRÈS</text>
    <text x="660" y="704" font-family="'Fraunces', serif" font-size="14" font-style="italic" font-weight="500" fill="#faf6ec">Microsoft = <tspan fill="#b8582e">aider-and-abettor</tspan> potentiel</text>
    <text x="660" y="718" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#9a9ca5">Disgorgement <tspan font-weight="600" fill="#b8582e">jointly and severally</tspan> · deuxième poche</text>
  </g>

  <text x="60" y="752" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">Sources : OfficeChai / court filing 15 jan. 2026 · Sherwood News (9 mai 2026) · GeekWire — Microsoft-OpenAI Files (2026) · Casey v. U.S. Bank N.A., 127 Cal. App. 4th 1138 (2005) · CACI No. 3610</text>
