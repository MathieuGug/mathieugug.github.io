<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1020" role="img" aria-label="Le test du secondaire — la mécanique du secondary Q3 2026 d'OpenAI, les trois verrous régulatoires (Foundation Board, AG Bonta, SEC) à franchir, et l'arbitrage stratégique entre mission lock-in et liquidité.">
  <defs>
    <marker id="jArr0521" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArr0521Dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6f7c"/>
    </marker>
    <pattern id="testHatch0521" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#b8582e" stroke-width="0.6" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="1020" fill="#faf6ec"/>

  <!-- Header -->
  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-21 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">Le test du <tspan font-style="italic" fill="#b8582e">secondaire</tspan>.</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Première décision matérielle post-verdict. <tspan font-weight="500" fill="#1e1e2a">La Foundation Board, l'AG Bonta et la SEC héritent d'un test régulatoire</tspan> que personne n'a plaidé en prétoire.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <!-- ÉTAGE 1 — Mécanique du secondaire -->
  <text x="60" y="200" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">ÉTAGE 1 · LA MÉCANIQUE DU SECONDARY Q3 2026 (THE INFORMATION, 19 MAI · BLOOMBERG, 20 MAI · CONFIRMÉ 21 MAI)</text>

  <!-- Timeline horizontale -->
  <rect x="60" y="226" width="1080" height="110" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <!-- Timeline ticks -->
  <line x1="120" y1="290" x2="1080" y2="290" stroke="#3b3f4d" stroke-width="1.4"/>

  <!-- Tick 1 — Oct 2025 -->
  <circle cx="170" cy="290" r="6" fill="#6b6f7c" stroke="#faf6ec" stroke-width="2"/>
  <text x="170" y="266" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4" text-anchor="middle">OCT 2025</text>
  <text x="170" y="316" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d" text-anchor="middle">Accord Bonta-Jennings</text>

  <!-- Tick 2 — 18 mai 2026 (verdict) -->
  <circle cx="540" cy="290" r="7" fill="#b8582e" stroke="#faf6ec" stroke-width="2"/>
  <text x="540" y="266" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4" text-anchor="middle">18 MAI 2026</text>
  <text x="540" y="316" font-family="'Inter', sans-serif" font-size="11.5" font-weight="500" fill="#1e1e2a" text-anchor="middle">Directed verdict · overhang levé</text>

  <!-- Tick 3 — 21 mai (aujourd'hui) -->
  <circle cx="640" cy="290" r="5" fill="#1e1e2a" stroke="#faf6ec" stroke-width="2"/>
  <text x="640" y="266" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.4" text-anchor="middle">21 MAI · D+3</text>
  <text x="640" y="316" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#3b3f4d" text-anchor="middle">Term sheet circulée</text>

  <!-- Tick 4 — Q3 2026 (clôture) -->
  <rect x="970" y="284" width="14" height="14" fill="#b8582e" stroke="#faf6ec" stroke-width="2"/>
  <text x="977" y="266" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4" text-anchor="middle">Q3 2026</text>
  <text x="977" y="316" font-family="'Inter', sans-serif" font-size="11.5" font-weight="500" fill="#1e1e2a" text-anchor="middle">Clôture · 8-12 Md$</text>

  <!-- ÉTAGE 2 — Trois verrous régulatoires -->
  <text x="60" y="376" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">ÉTAGE 2 · TROIS VERROUS RÉGULATOIRES À FRANCHIR · CHACUN HÉRITÉ D'UNE QUESTION QUE LE PROCÈS N'A PAS TRANCHÉE</text>

  <!-- Verrou 1 — Foundation Board -->
  <g class="branch" data-modal-id="verrou-foundation-0521" tabindex="0" role="button" aria-label="Verrou 1 — Foundation Board d'OpenAI, droit de regard sur le secondary">
    <rect x="60" y="396" width="350" height="206" rx="6" fill="#ffffff" stroke="rgba(184,88,46,0.40)" stroke-width="1.6"/>
    <rect x="60" y="396" width="350" height="32" rx="6" fill="#b8582e"/>
    <rect x="60" y="422" width="350" height="6" fill="#b8582e"/>
    <text x="80" y="419" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#faf6ec" letter-spacing="1.6">VERROU 1 · FOUNDATION BOARD</text>
    <text x="80" y="452" font-family="'Fraunces', serif" font-size="16" font-weight="500" fill="#1e1e2a">Droit de regard sur le <tspan font-style="italic">secondary</tspan></text>
    <text x="80" y="472" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Accord d'oct. 2025 — <tspan font-style="italic">mission lock-in</tspan></text>
    <text x="80" y="490" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d"><tspan font-style="italic">+ annual reporting</tspan> sur l'allocation</text>
    <text x="80" y="520" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Question 1 : un <tspan font-style="italic">secondary</tspan> 8-12 Md$</text>
    <text x="80" y="538" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">portant sur 1,6-2,4 % du capital PBC</text>
    <text x="80" y="556" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">est-il une <tspan font-style="italic">material transaction</tspan> au sens</text>
    <text x="80" y="574" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">de l'accord d'octobre 2025 ?</text>
    <text x="80" y="592" font-family="'Inter', sans-serif" font-size="11.5" font-weight="500" fill="#b8582e">Premier veto-test du Foundation Board.</text>
  </g>

  <!-- Verrou 2 — AG Bonta -->
  <g class="branch" data-modal-id="verrou-bonta-0521" tabindex="0" role="button" aria-label="Verrou 2 — AG Bonta, périmètre du silence régulatoire">
    <rect x="425" y="396" width="350" height="206" rx="6" fill="#ffffff" stroke="rgba(184,88,46,0.40)" stroke-width="1.6"/>
    <rect x="425" y="396" width="350" height="32" rx="6" fill="#b8582e"/>
    <rect x="425" y="422" width="350" height="6" fill="#b8582e"/>
    <text x="445" y="419" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#faf6ec" letter-spacing="1.6">VERROU 2 · AG BONTA</text>
    <text x="445" y="452" font-family="'Fraunces', serif" font-size="16" font-weight="500" fill="#1e1e2a">Périmètre du silence régulatoire</text>
    <text x="445" y="472" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d"><tspan font-style="italic">Cal. Gov. Code §12598</tspan> · supervision</text>
    <text x="445" y="490" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">continue des PBC californiennes</text>
    <text x="445" y="520" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Question 2 : Altman vend-il ses propres</text>
    <text x="445" y="538" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">parts ? Si oui : <tspan font-style="italic">interested transaction</tspan></text>
    <text x="445" y="556" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">au sens de <tspan font-style="italic">§5233</tspan> — la doctrine que</text>
    <text x="445" y="574" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">le procès n'a pas eu à examiner.</text>
    <text x="445" y="592" font-family="'Inter', sans-serif" font-size="11.5" font-weight="500" fill="#b8582e">Le silence Bonta tient-il à l'épreuve ?</text>
  </g>

  <!-- Verrou 3 — SEC -->
  <g class="branch" data-modal-id="verrou-sec-0521" tabindex="0" role="button" aria-label="Verrou 3 — SEC Rule 506 et matérialité de l'information post-procès">
    <rect x="790" y="396" width="350" height="206" rx="6" fill="#ffffff" stroke="rgba(184,88,46,0.40)" stroke-width="1.6"/>
    <rect x="790" y="396" width="350" height="32" rx="6" fill="#b8582e"/>
    <rect x="790" y="422" width="350" height="6" fill="#b8582e"/>
    <text x="810" y="419" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#faf6ec" letter-spacing="1.6">VERROU 3 · SEC</text>
    <text x="810" y="452" font-family="'Fraunces', serif" font-size="16" font-weight="500" fill="#1e1e2a"><tspan font-style="italic">Rule 506(c) + Rule 144</tspan></text>
    <text x="810" y="472" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Matérialité de l'information</text>
    <text x="810" y="490" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">liée au procès clos lundi</text>
    <text x="810" y="520" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Question 3 : disclosure obligatoire</text>
    <text x="810" y="538" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">de l'<tspan font-style="italic">overhang</tspan> appellate (5 % proba)</text>
    <text x="810" y="556" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">aux acheteurs accrédités ?</text>
    <text x="810" y="574" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Standard <tspan font-style="italic">TSC v. Northway</tspan>.</text>
    <text x="810" y="592" font-family="'Inter', sans-serif" font-size="11.5" font-weight="500" fill="#b8582e">Premier test sous administration 2025.</text>
  </g>

  <!-- Flèches vers étage 3 -->
  <line x1="235" y1="612" x2="430" y2="660" stroke="#6b6f7c" stroke-width="1.4" marker-end="url(#jArr0521Dim)"/>
  <line x1="600" y1="612" x2="600" y2="660" stroke="#b8582e" stroke-width="2" marker-end="url(#jArr0521)"/>
  <line x1="965" y1="612" x2="770" y2="660" stroke="#6b6f7c" stroke-width="1.4" marker-end="url(#jArr0521Dim)"/>

  <!-- ÉTAGE 3 — L'arbitrage stratégique -->
  <text x="60" y="700" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">ÉTAGE 3 · L'ARBITRAGE STRATÉGIQUE · CE QUE LE SECONDARY RÉVÈLE DE LA NOUVELLE FRONTIÈRE GOUVERNANCE</text>

  <!-- Boîte mission lock-in -->
  <g class="branch" data-modal-id="mission-lockin-0521" tabindex="0" role="button" aria-label="Mission lock-in — la promesse de l'accord d'octobre 2025">
    <rect x="60" y="724" width="510" height="210" rx="6" fill="url(#testHatch0521)" stroke="rgba(30,30,44,0.30)" stroke-width="1.2" stroke-dasharray="4 4"/>
    <text x="80" y="752" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">CÔTÉ MISSION LOCK-IN · LA PROMESSE D'OCTOBRE 2025</text>
    <text x="80" y="780" font-family="'Fraunces', serif" font-size="15" font-weight="500" fill="#1e1e2a">Garanties accordées au public</text>
    <text x="80" y="806" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">→ Charter inscrit la mission charitable comme</text>
    <text x="80" y="822" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">  <tspan font-style="italic">non-révisible</tspan> sans approbation des deux AG</text>
    <text x="80" y="844" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">→ Foundation Board avec droit de veto sur les</text>
    <text x="80" y="860" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">  <tspan font-style="italic">decisions matérielles</tspan></text>
    <text x="80" y="882" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">→ <tspan font-style="italic">Annual reporting</tspan> public sur l'allocation</text>
    <text x="80" y="898" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">  entre for-profit et <tspan font-style="italic">charitable purpose</tspan></text>
    <line x1="80" y1="912" x2="550" y2="912" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>
    <text x="80" y="930" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#3b3f4d">Premier test : la mission survit-elle au cash ?</text>
  </g>

  <!-- Boîte liquidité -->
  <g class="branch" data-modal-id="liquidite-0521" tabindex="0" role="button" aria-label="Liquidité — la commande tacite des fiduciaires post-procès">
    <rect x="590" y="724" width="550" height="210" rx="6" fill="#ffffff" stroke="#b8582e" stroke-width="1.6"/>
    <rect x="590" y="724" width="550" height="32" rx="6" fill="#b8582e"/>
    <rect x="590" y="750" width="550" height="6" fill="#b8582e"/>
    <text x="610" y="747" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#faf6ec" letter-spacing="1.6">↑ CÔTÉ LIQUIDITÉ · LA COMMANDE TACITE DES FIDUCIAIRES</text>
    <text x="610" y="780" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">Employés OpenAI</tspan> · 18 mois de RSU vested non-vendables</text>
    <text x="610" y="802" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">Early investors</tspan> (Thrive, Founders, Khosla) · sortie 5-8×</text>
    <text x="610" y="824" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">Altman</tspan> · stake personnel acquis dans la recap d'oct. 2025</text>
    <text x="610" y="846" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">Brockman</tspan> · stake co-fondateur restant</text>
    <text x="610" y="868" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">Tender</tspan> · acheteurs souverains (PIF, Mubadala, ADQ)</text>
    <line x1="610" y1="884" x2="1130" y2="884" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <text x="610" y="906" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#b8582e">Valorisation 500 Md$ · 8-12 Md$ flottants · ≈ 2 % du capital.</text>
    <text x="610" y="924" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#b8582e">Wachtell a déjà calé le SPA · clôture août-septembre 2026.</text>
  </g>

  <!-- Footer sources -->
  <text x="60" y="990" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">SOURCES · ACCORD BONTA-JENNINGS OCT. 2025 · CAL. CORP. CODE §§5142, 5233, 5250 · CAL. GOV. CODE §12598 · SEC RULE 506(c) · TSC v. NORTHWAY 426 U.S. 438 (1976)</text>
</svg>
