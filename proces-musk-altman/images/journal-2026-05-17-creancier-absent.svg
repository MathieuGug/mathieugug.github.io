<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 960" role="img" aria-label="Le créancier d'équité absent — l'Attorney General Rob Bonta, créancier statutaire des trusts charitables californiens, et son silence comme verrou de standing sur la phase remedies">
  <defs>
    <marker id="jArrow0517" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArrow0517Dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9ca5"/>
    </marker>
    <pattern id="hatchSilent0517" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#9a9ca5" stroke-width="0.8"/>
    </pattern>
  </defs>

  <rect width="1200" height="960" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-17 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">Le <tspan font-style="italic" fill="#b8582e">créancier d'équité absent</tspan>.</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Sous le droit californien, l'Attorney General est le créancier statutaire des trusts charitables. <tspan font-weight="500" fill="#1e1e2a">Rob Bonta a signé en octobre 2025. Il n'est jamais revenu.</tspan></text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <text x="60" y="198" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">LE TRIANGLE STATUTAIRE · §5142 + §5250 CORP. CODE · §12598 GOV. CODE</text>

  <g class="branch" data-modal-id="ag-creancier-0517" tabindex="0" role="button" aria-label="L'Attorney General — créancier d'équité statutaire, silencieux">
    <rect x="60" y="216" width="520" height="248" rx="6" fill="url(#hatchSilent0517)" stroke="#3b3f4d" stroke-width="1.4" stroke-dasharray="6 4"/>
    <rect x="60" y="216" width="520" height="34" rx="6" fill="#3b3f4d"/>
    <rect x="60" y="244" width="520" height="6" fill="#3b3f4d"/>
    <text x="80" y="239" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">CRÉANCIER STATUTAIRE · SILENCIEUX</text>
    <text x="560" y="239" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4" text-anchor="end">PARENS PATRIAE</text>

    <text x="80" y="280" font-family="'Fraunces', serif" font-size="22" font-weight="500" fill="#1e1e2a">Hon. Rob <tspan font-style="italic" fill="#b8582e">Bonta</tspan></text>
    <text x="80" y="302" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Attorney General · État de Californie</text>
    <text x="80" y="320" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">Co-créancier avec AG Delaware (siège incorporation OpenAI)</text>

    <line x1="80" y1="338" x2="560" y2="338" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="80" y="360" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">POUVOIRS STATUTAIRES</text>
    <text x="80" y="382" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ Notification obligatoire de toute action en breach (§5142)</text>
    <text x="80" y="402" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ Intervention <tspan font-style="italic">as of right</tspan> à tout stade du procès (§5250)</text>
    <text x="80" y="422" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ Supervision continue des PBC californiennes (Gov. §12598)</text>
    <text x="80" y="442" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ Définit la palette des remedies pour la juge</text>
  </g>

  <g class="branch" data-modal-id="musk-special-0517" tabindex="0" role="button" aria-label="Musk — plaignant par défaut, special interest standing">
    <rect x="600" y="216" width="540" height="248" rx="6" fill="#ffffff" stroke="#b8582e" stroke-width="1.6"/>
    <rect x="600" y="216" width="540" height="34" rx="6" fill="#b8582e"/>
    <rect x="600" y="244" width="540" height="6" fill="#b8582e"/>
    <text x="620" y="239" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">PLAIGNANT PAR DÉFAUT · PRÉSENT À PARTS UNKNOWN</text>

    <text x="620" y="280" font-family="'Fraunces', serif" font-size="22" font-weight="500" fill="#1e1e2a">Elon <tspan font-style="italic" fill="#b8582e">Musk</tspan></text>
    <text x="620" y="302" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Settlor des 38 M$ de dons 2015-2017 · ancien <tspan font-style="italic">director</tspan></text>
    <text x="620" y="320" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">Standing reconnu janvier 2026 sur <tspan font-style="italic">special interest doctrine</tspan></text>

    <line x1="620" y1="338" x2="1120" y2="338" stroke="rgba(184,88,46,0.55)" stroke-width="1"/>

    <text x="620" y="360" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">PÉRIMÈTRE DU STANDING — LIMITÉ</text>
    <text x="620" y="382" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ <tspan font-style="italic">Special interest</tspan> ≠ <tspan font-style="italic">parens patriae</tspan></text>
    <text x="620" y="402" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ Couvre la <tspan font-weight="500">liability</tspan>, pas toute la palette des remedies</text>
    <text x="620" y="422" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ Le quantum de disgorgement reste discrétion juge</text>
    <text x="620" y="442" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ La juge calibre par rapport au créancier <tspan font-style="italic">légitime</tspan></text>
  </g>

  <line x1="370" y1="464" x2="370" y2="496" stroke="#1e1e2a" stroke-width="1.6"/>
  <line x1="370" y1="496" x2="870" y2="496" stroke="#1e1e2a" stroke-width="1.6"/>
  <line x1="870" y1="464" x2="870" y2="496" stroke="#1e1e2a" stroke-width="1.6"/>

  <text x="620" y="488" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4" text-anchor="middle">DEUX AUTORITÉS · UN SEUL PRÉTOIRE</text>

  <text x="60" y="540" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">CHRONOLOGIE BONTA — OCTOBRE 2025 → MAI 2026 · TROIS POSITIONS, ZÉRO INTERVENTION ACTIVE</text>

  <g class="branch" data-modal-id="bonta-oct-2025" tabindex="0" role="button" aria-label="Octobre 2025 — accord conditionnel Bonta + AG Delaware avec OpenAI">
    <rect x="60" y="558" width="345" height="180" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="60" y="558" width="345" height="30" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="582" width="345" height="6" fill="#1e1e2a"/>
    <text x="80" y="579" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">OCTOBRE 2025 · POSITION 1</text>
    <text x="80" y="612" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">Accord <tspan font-style="italic" fill="#b8582e">conditionnel</tspan></text>
    <text x="80" y="632" font-family="'Inter', sans-serif" font-size="12" fill="#3b3f4d">Bonta + AG Delaware co-signent avec OpenAI</text>
    <text x="80" y="652" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">→ Mission lock-in dans charter PBC</text>
    <text x="80" y="670" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">→ Foundation Board de surveillance</text>
    <text x="80" y="688" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">→ Reporting annuel public</text>
    <text x="80" y="720" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.2">= LICENCE TACITE DE CONVERSION</text>
  </g>

  <g class="branch" data-modal-id="bonta-jan-2026" tabindex="0" role="button" aria-label="Janvier 2026 — amicus brief discret">
    <rect x="425" y="558" width="345" height="180" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="425" y="558" width="345" height="30" rx="6" fill="#1e1e2a"/>
    <rect x="425" y="582" width="345" height="6" fill="#1e1e2a"/>
    <text x="445" y="579" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">JANVIER 2026 · POSITION 2</text>
    <text x="445" y="612" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">Amicus <tspan font-style="italic" fill="#b8582e">discret</tspan></text>
    <text x="445" y="632" font-family="'Inter', sans-serif" font-size="12" fill="#3b3f4d">Bonta dépose un mémoire au stade summary judgment</text>
    <text x="445" y="652" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">→ Reconnaît le <tspan font-style="italic">special interest</tspan> de Musk</text>
    <text x="445" y="670" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">→ Sans abandonner la prééminence de l'AG</text>
    <text x="445" y="688" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">→ Pas de joinder ni d'intervention</text>
    <text x="445" y="720" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.2">= DÉLÉGATION SOUS RÉSERVE</text>
  </g>

  <g class="branch" data-modal-id="bonta-mai-2026" tabindex="0" role="button" aria-label="Mai 2026 — silence absolu pendant le procès">
    <rect x="790" y="558" width="345" height="180" rx="6" fill="url(#hatchSilent0517)" stroke="#9a9ca5" stroke-width="1.4" stroke-dasharray="6 4"/>
    <rect x="790" y="558" width="345" height="30" rx="6" fill="#3b3f4d"/>
    <rect x="790" y="582" width="345" height="6" fill="#3b3f4d"/>
    <text x="810" y="579" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#faf6ec" letter-spacing="1.4">MAI 2026 · POSITION 3</text>
    <text x="810" y="612" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">Silence <tspan font-style="italic" fill="#b8582e">absolu</tspan></text>
    <text x="810" y="632" font-family="'Inter', sans-serif" font-size="12" fill="#3b3f4d">Trois semaines de procès, zéro intervention</text>
    <text x="810" y="652" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">→ Pas de témoin AG appelé par les parties</text>
    <text x="810" y="670" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">→ Pas d'amicus sur le périmètre des remedies</text>
    <text x="810" y="688" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">→ Pas de demande de joinder en remedies</text>
    <text x="810" y="720" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.2">= RATIFICATION TACITE DE L'ACCORD</text>
  </g>

  <line x1="405" y1="648" x2="425" y2="648" stroke="#9a9ca5" stroke-width="1.6" marker-end="url(#jArrow0517Dim)"/>
  <line x1="770" y1="648" x2="790" y2="648" stroke="#9a9ca5" stroke-width="1.6" marker-end="url(#jArrow0517Dim)"/>

  <g>
    <rect x="60" y="772" width="1080" height="142" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="772" width="6" height="142" fill="#b8582e"/>
    <text x="92" y="800" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">LE VERROU QUE WACHTELL N'A PAS EU À PLAIDER · PROPORTIONNALITÉ DES REMEDIES</text>
    <text x="92" y="828" font-family="'Fraunces', serif" font-size="16" font-style="italic" font-weight="500" fill="#faf6ec">Si le créancier <tspan fill="#b8582e">légitime</tspan> a signé un accord <tspan fill="#b8582e">conditionnel</tspan> en octobre 2025 et n'est pas revenu pour le réviser,</text>
    <text x="92" y="848" font-family="'Fraunces', serif" font-size="16" font-style="italic" font-weight="500" fill="#faf6ec">la juge en équité ne peut pas accorder un remède plus <tspan fill="#b8582e">extensif</tspan> que ce que l'AG a explicitement préservé.</text>
    <text x="92" y="876" font-family="'Inter', sans-serif" font-size="12.5" fill="#9a9ca5">Plafond implicite sur les remedies de lundi : <tspan font-weight="500" fill="#faf6ec">renforcement de gouvernance, pas dissolution corporate</tspan>. Pas de disgorgement complète, pas de révocation des fiduciaires,</text>
    <text x="92" y="894" font-family="'Inter', sans-serif" font-size="12.5" fill="#9a9ca5">pas d'<tspan font-style="italic">unwinding</tspan> PBC. <tspan font-weight="500" fill="#faf6ec">La phase remedies du 18 mai s'ouvre déjà bornée par un cadrage d'octobre 2025 qui n'a pas eu à être plaidé.</tspan></text>
  </g>

  <text x="60" y="944" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">SOURCES · CAL. CORP. CODE §§5142, 5250 · CAL. GOV. CODE §12598 · OAG.CA.GOV (BONTA OCT. 2025) · LAWFARE MEDIA (15 MAI 2026) · COURTHOUSE NEWS (JAN. 2026 AMICUS)</text>
</svg>
