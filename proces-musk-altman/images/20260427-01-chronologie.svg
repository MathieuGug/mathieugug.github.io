<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Chronologie Musk-OpenAI 2015-2026">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="1.2">SCHÉMA 01 · CHRONOLOGIE</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.3">De l'alliance fondatrice à l'épreuve du prétoire</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Onze années de bascule : 2015 — 27 avril 2026</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Three tracks -->
  <text x="60" y="180" class="body" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.5">FONDATION &amp; GOUVERNANCE</text>
  <text x="60" y="370" class="body" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.5">RUPTURE &amp; CONTENTIEUX</text>
  <text x="60" y="560" class="body" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.5">ÉCOSYSTÈME COMMERCIAL</text>

  <!-- Time axis baseline -->
  <line x1="80" y1="690" x2="1140" y2="690" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- Year markers -->
  <g class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">
    <text x="120" y="715">2015</text>
    <text x="240" y="715">2018</text>
    <text x="360" y="715">2019</text>
    <text x="480" y="715">2022</text>
    <text x="600" y="715">2023</text>
    <text x="760" y="715">2024</text>
    <text x="900" y="715">2025</text>
    <text x="1080" y="715">2026</text>
  </g>
  <g stroke="#B8B5AE" stroke-width="0.5">
    <line x1="120" y1="685" x2="120" y2="695"/>
    <line x1="240" y1="685" x2="240" y2="695"/>
    <line x1="360" y1="685" x2="360" y2="695"/>
    <line x1="480" y1="685" x2="480" y2="695"/>
    <line x1="600" y1="685" x2="600" y2="695"/>
    <line x1="760" y1="685" x2="760" y2="695"/>
    <line x1="900" y1="685" x2="900" y2="695"/>
    <line x1="1080" y1="685" x2="1080" y2="695"/>
  </g>

  <!-- TRACK 1 : Fondation & Gouvernance -->
  <!-- 2015 : Fondation -->
  <g class="interactive" data-card="founding-2015" tabindex="0" role="button" aria-label="2015 — Fondation d'OpenAI">
    <rect x="90" y="200" width="120" height="48" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25"/>
    <text x="100" y="220" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Fondation OpenAI</text>
    <text x="100" y="237" class="body" font-size="11" fill="#5A5A5A">Lab non lucratif</text>
  </g>
  <line x1="120" y1="248" x2="120" y2="685" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- 2018 : départ Musk -->
  <g class="interactive" data-card="musk-departs-2018" tabindex="0" role="button" aria-label="2018 — Départ d'Elon Musk du conseil">
    <rect x="220" y="200" width="120" height="48" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="230" y="220" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Départ Musk</text>
    <text x="230" y="237" class="body" font-size="11" fill="#5A5A5A">Échec fusion Tesla</text>
  </g>
  <line x1="240" y1="248" x2="240" y2="685" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- 2019 : Capped-profit + Microsoft -->
  <g class="interactive" data-card="capped-profit-2019" tabindex="0" role="button" aria-label="2019 — Création de la filiale capped-profit">
    <rect x="335" y="200" width="120" height="48" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="345" y="220" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Capped-profit</text>
    <text x="345" y="237" class="body" font-size="11" fill="#5A5A5A">Filiale commerciale</text>
  </g>
  <line x1="360" y1="248" x2="360" y2="685" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- 2023 nov : licenciement éclair Altman -->
  <g class="interactive" data-card="altman-blip-2023" tabindex="0" role="button" aria-label="Novembre 2023 — Le Blip, licenciement-rappel d'Altman">
    <rect x="575" y="200" width="120" height="48" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <text x="585" y="220" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Le « Blip »</text>
    <text x="585" y="237" class="body" font-size="11" fill="#5A5A5A">Altman révoqué/réintégré</text>
  </g>
  <line x1="600" y1="248" x2="600" y2="685" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- 2025 oct : recapitalisation PBC -->
  <g class="interactive" data-card="pbc-2025" tabindex="0" role="button" aria-label="Octobre 2025 — Recapitalisation et passage en PBC">
    <rect x="875" y="200" width="120" height="48" rx="3" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.25"/>
    <text x="885" y="220" class="body" font-size="12" font-weight="600" fill="#1A1A1A">PBC + Foundation</text>
    <text x="885" y="237" class="body" font-size="11" fill="#5A5A5A">28 oct. 2025</text>
  </g>
  <line x1="900" y1="248" x2="900" y2="685" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- TRACK 2 : Contentieux -->
  <!-- 2024 fév : 1ère plainte état CA -->
  <g class="interactive" data-card="first-suit-2024" tabindex="0" role="button" aria-label="Février 2024 — Première plainte d'Elon Musk">
    <rect x="700" y="390" width="125" height="48" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.25"/>
    <text x="710" y="410" class="body" font-size="12" font-weight="600" fill="#1A1A1A">1ʳᵉ plainte (CA)</text>
    <text x="710" y="427" class="body" font-size="11" fill="#5A5A5A">29 fév. 2024 · retirée</text>
  </g>
  <line x1="760" y1="390" x2="760" y2="685" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- 2024 août : refile fédéral -->
  <g class="interactive" data-card="federal-suit-2024" tabindex="0" role="button" aria-label="Août 2024 — Action fédérale refilée">
    <rect x="700" y="450" width="125" height="48" rx="3" fill="#B7332C" fill-opacity="0.18" stroke="#B7332C" stroke-width="1.25"/>
    <text x="710" y="470" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Action fédérale</text>
    <text x="710" y="487" class="body" font-size="11" fill="#5A5A5A">5 août 2024 · 26 griefs</text>
  </g>

  <!-- 2025 avril : OpenAI counterclaim -->
  <g class="interactive" data-card="openai-counter-2025" tabindex="0" role="button" aria-label="Avril 2025 — Contre-plainte d'OpenAI">
    <rect x="850" y="390" width="125" height="48" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1.25"/>
    <text x="860" y="410" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Contre-plainte</text>
    <text x="860" y="427" class="body" font-size="11" fill="#5A5A5A">OpenAI · 9 avril 2025</text>
  </g>

  <!-- 2026 jan : ruling -->
  <g class="interactive" data-card="ruling-jan-2026" tabindex="0" role="button" aria-label="Janvier 2026 — Décision Gonzalez Rogers : le procès aura lieu">
    <rect x="1000" y="390" width="125" height="48" rx="3" fill="#B7332C" fill-opacity="0.18" stroke="#B7332C" stroke-width="2"/>
    <text x="1010" y="410" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Procès confirmé</text>
    <text x="1010" y="427" class="body" font-size="11" fill="#5A5A5A">15 jan. 2026 · « ample evidence »</text>
  </g>

  <!-- 2026 avril : ouverture procès -->
  <g class="interactive" data-card="trial-opens-2026" tabindex="0" role="button" aria-label="27 avril 2026 — Ouverture du procès">
    <rect x="1000" y="450" width="125" height="48" rx="3" fill="#B7332C" stroke="#1A1A1A" stroke-width="2"/>
    <text x="1010" y="470" class="body" font-size="12" font-weight="700" fill="#FAF8F3">PROCÈS OUVERT</text>
    <text x="1010" y="487" class="body" font-size="11" fill="#FAF8F3">27 avril 2026</text>
  </g>
  <line x1="1080" y1="450" x2="1080" y2="685" stroke="#B7332C" stroke-width="1.25"/>

  <!-- TRACK 3 : Écosystème commercial -->
  <!-- 2022 : ChatGPT -->
  <g class="interactive" data-card="chatgpt-2022" tabindex="0" role="button" aria-label="Novembre 2022 — Lancement de ChatGPT">
    <rect x="455" y="580" width="120" height="48" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25"/>
    <text x="465" y="600" class="body" font-size="12" font-weight="600" fill="#1A1A1A">ChatGPT</text>
    <text x="465" y="617" class="body" font-size="11" fill="#5A5A5A">Nov. 2022</text>
  </g>
  <line x1="480" y1="628" x2="480" y2="685" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- 2023 : xAI -->
  <g class="interactive" data-card="xai-2023" tabindex="0" role="button" aria-label="Mars 2023 — Création de xAI par Musk">
    <rect x="575" y="580" width="120" height="48" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="585" y="600" class="body" font-size="12" font-weight="600" fill="#1A1A1A">xAI fondée</text>
    <text x="585" y="617" class="body" font-size="11" fill="#5A5A5A">Mars 2023</text>
  </g>

  <!-- 2026 fév : merger SpaceX/xAI -->
  <g class="interactive" data-card="spacex-xai-2026" tabindex="0" role="button" aria-label="Février 2026 — Fusion xAI / SpaceX">
    <rect x="980" y="580" width="125" height="48" rx="3" fill="#B58A2C" fill-opacity="0.18" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="990" y="600" class="body" font-size="12" font-weight="600" fill="#1A1A1A">SpaceX × xAI</text>
    <text x="990" y="617" class="body" font-size="11" fill="#5A5A5A">1,25 T$ · fév. 2026</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="762" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : compilation à partir des dépôts judiciaires Musk v. Altman 4:24-cv-04722, OpenAI corporate communications, Bloomberg, CNBC, Fortune, Reuters.</text>
  <text x="60" y="778" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : trois pistes parallèles — gouvernance (haut), contentieux (centre), écosystème commercial (bas). Cliquez sur un événement pour le détail.</text>
</svg>
