<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" role="img" aria-label="Le parallélisme procédural — Rule 39(c) + Rule 52, jury et juge en parallèle le 18 mai 2026">
  <defs>
    <marker id="jArr0518" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArr0518Dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9ca5"/>
    </marker>
    <pattern id="hatch0518" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#9a9ca5" stroke-width="0.8"/>
    </pattern>
  </defs>

  <rect width="1200" height="980" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-18 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">Le <tspan font-style="italic" fill="#b8582e">parallélisme procédural</tspan>.</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Le jury délibère sur la liability pendant que la juge ouvre les remedies. <tspan font-weight="500" fill="#1e1e2a">Rule 39(c) + Rule 52 : la juge garde 100 % du contrôle final, peu importe le verdict du jury.</tspan></text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <!-- Header: Rule 52 panel as the wedge -->
  <g>
    <rect x="60" y="194" width="1080" height="86" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="194" width="6" height="86" fill="#b8582e"/>
    <text x="92" y="222" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">RULE 52 · FINDINGS OF FACT AND CONCLUSIONS OF LAW BY THE COURT</text>
    <text x="92" y="248" font-family="'Fraunces', serif" font-size="16" font-style="italic" font-weight="500" fill="#faf6ec">«&#8239;In an action tried <tspan fill="#b8582e">with an advisory jury</tspan>, the court must find the facts specially and state its conclusions of law separately.&#8239;»</text>
    <text x="92" y="268" font-family="'Inter', sans-serif" font-size="12.5" fill="#9a9ca5">Fed. R. Civ. P. 52(a)(1) — la juge écrit seule, en équité. Le verdict du jury <tspan font-style="italic" fill="#faf6ec">advisory</tspan> est consultatif, jamais dispositif.</text>
  </g>

  <!-- Section label -->
  <text x="60" y="312" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">LUNDI 18 MAI · 9H00 PT · DEUX FORUMS, UN SEUL ARBITRE</text>

  <!-- LEFT COLUMN — Jury room -->
  <g class="branch" data-modal-id="jury-0518" tabindex="0" role="button" aria-label="Jury advisory — la salle de délibération">
    <rect x="60" y="328" width="520" height="358" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.4"/>
    <rect x="60" y="328" width="520" height="34" rx="6" fill="#3b3f4d"/>
    <rect x="60" y="356" width="520" height="6" fill="#3b3f4d"/>
    <text x="80" y="351" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">JURY ROOM · LIABILITY · ADVISORY</text>
    <text x="560" y="351" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4" text-anchor="end">F.R.C.P. 39(c)</text>

    <text x="80" y="392" font-family="'Fraunces', serif" font-size="20" font-weight="500" fill="#1e1e2a">9 jurés · 6 femmes, 3 hommes</text>
    <text x="80" y="414" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Ronald V. Dellums Federal Bldg · Oakland</text>

    <line x1="80" y1="432" x2="560" y2="432" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="80" y="454" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">CE QU'ILS DÉCIDENT — VERDICT FORM EN 2 ÉTAGES</text>

    <text x="80" y="478" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ <tspan font-weight="500">Étage 1 · Prescription</tspan> (CCP §§338, 340, 343)</text>
    <text x="100" y="496" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">cutoffs 5 août 2021 / 5 août 2022 / 14 nov. 2021</text>

    <text x="80" y="522" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ <tspan font-weight="500">Étage 2 · Le fond</tspan> (si étage 1 franchi)</text>
    <text x="100" y="540" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">breach of charitable trust · unjust enrichment</text>
    <text x="100" y="558" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">aiding-and-abetting Microsoft (Casey v. U.S. Bank)</text>

    <line x1="80" y1="582" x2="560" y2="582" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="80" y="604" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">CE QU'ILS REÇOIVENT</text>
    <text x="80" y="624" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ 17 pages d'instructions (jury charge, 14 mai)</text>
    <text x="80" y="642" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ Verdict form binaire par grief, vote unanime</text>
    <text x="80" y="660" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ Standard : <tspan font-style="italic">preponderance of the evidence</tspan></text>
  </g>

  <!-- RIGHT COLUMN — Courtroom -->
  <g class="branch" data-modal-id="bench-0518" tabindex="0" role="button" aria-label="Phase remedies — devant la juge seule">
    <rect x="620" y="328" width="520" height="358" rx="6" fill="#ffffff" stroke="#b8582e" stroke-width="1.6"/>
    <rect x="620" y="328" width="520" height="34" rx="6" fill="#b8582e"/>
    <rect x="620" y="356" width="520" height="6" fill="#b8582e"/>
    <text x="640" y="351" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">COURTROOM · REMEDIES · ÉQUITÉ PURE</text>
    <text x="1120" y="351" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#faf6ec" letter-spacing="1.4" text-anchor="end">JUGE SEULE</text>

    <text x="640" y="392" font-family="'Fraunces', serif" font-size="20" font-weight="500" fill="#1e1e2a">Hon. Yvonne <tspan font-style="italic" fill="#b8582e">Gonzalez Rogers</tspan></text>
    <text x="640" y="414" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">U.S. District Court · N.D. Cal. · Oakland</text>

    <line x1="640" y1="432" x2="1120" y2="432" stroke="rgba(184,88,46,0.55)" stroke-width="1"/>

    <text x="640" y="454" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">CE QU'ELLE TRANCHE — PALETTE OUVERTE</text>

    <text x="640" y="478" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ <tspan font-weight="500">Disgorgement</tspan> · de 0 à 134 Md$ (Molo)</text>
    <text x="660" y="496" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">borne haute Schizer (7 mai) : <tspan font-style="italic">« more than 200 B$ »</tspan></text>

    <text x="640" y="522" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ <tspan font-weight="500">Révocation</tspan> Altman + Brockman (§5233)</text>
    <text x="660" y="540" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">rescission des transactions self-dealing</text>

    <text x="640" y="566" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ <tspan font-weight="500">Unwinding</tspan> recap PBC d'octobre 2025</text>
    <text x="660" y="584" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">retour à la structure non-profit ante</text>

    <line x1="640" y1="608" x2="1120" y2="608" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>

    <text x="640" y="630" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">CE QU'ELLE REÇOIT — APERÇU MOLO/WACHTELL</text>
    <text x="640" y="650" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ Aucun jury · <tspan font-style="italic">findings of fact</tspan> par la juge</text>
    <text x="640" y="668" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ Plafond implicite : accord AG Bonta oct. 2025</text>
  </g>

  <!-- Arrows linking both back up to Rule 52 wedge -->
  <line x1="320" y1="328" x2="320" y2="288" stroke="#3b3f4d" stroke-width="1.4" marker-end="url(#jArr0518Dim)"/>
  <line x1="880" y1="328" x2="880" y2="288" stroke="#b8582e" stroke-width="1.6" marker-end="url(#jArr0518)"/>

  <text x="320" y="312" font-family="'JetBrains Mono', monospace" font-size="9" fill="#3b3f4d" letter-spacing="1.2" text-anchor="middle">CONSULTATIF</text>
  <text x="880" y="312" font-family="'JetBrains Mono', monospace" font-size="9" fill="#b8582e" font-weight="600" letter-spacing="1.2" text-anchor="middle">DISPOSITIF</text>

  <!-- Pre-engagement ladder -->
  <text x="60" y="722" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">LES 3 PRÉ-ENGAGEMENTS DE LA JUGE · ASYMÉTRIE PROCÉDURALE</text>

  <g>
    <rect x="60" y="740" width="345" height="160" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="60" y="740" width="345" height="28" rx="6" fill="#3b3f4d"/>
    <rect x="60" y="763" width="345" height="5" fill="#3b3f4d"/>
    <text x="80" y="759" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">PRESCRIPTION · JURY → DEFENDANTS</text>
    <text x="80" y="789" font-family="'Fraunces', serif" font-size="15" font-style="italic" font-weight="500" fill="#1e1e2a">« highly susceptible to accept »</text>
    <text x="80" y="810" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">Si le jury dit <tspan font-style="italic">filed too late</tspan> sur le grief 1,</text>
    <text x="80" y="828" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">la juge entre en <tspan font-style="italic">directed verdict</tspan> sous Rule 50(a)</text>
    <text x="80" y="846" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">— le procès se clôt <tspan font-style="italic">as a matter of law</tspan>.</text>
    <text x="80" y="876" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.2">PRÉ-ENGAGEMENT : FORT</text>
  </g>

  <g>
    <rect x="425" y="740" width="345" height="160" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="425" y="740" width="345" height="28" rx="6" fill="#3b3f4d"/>
    <rect x="425" y="763" width="345" height="5" fill="#3b3f4d"/>
    <text x="445" y="759" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">LIABILITY · JURY → MUSK</text>
    <text x="445" y="789" font-family="'Fraunces', serif" font-size="15" font-style="italic" font-weight="500" fill="#1e1e2a">« very likely to follow »</text>
    <text x="445" y="810" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">Si l'étage 2 s'ouvre et le jury tranche</text>
    <text x="445" y="828" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">pour Musk, la juge écrira des <tspan font-style="italic">findings</tspan></text>
    <text x="445" y="846" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">de fait cohérents avec le verdict consultatif.</text>
    <text x="445" y="876" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.2">PRÉ-ENGAGEMENT : MODÉRÉ</text>
  </g>

  <g>
    <rect x="790" y="740" width="350" height="160" rx="6" fill="url(#hatch0518)" stroke="#b8582e" stroke-width="1.6" stroke-dasharray="6 4"/>
    <rect x="790" y="740" width="350" height="28" rx="6" fill="#b8582e"/>
    <rect x="790" y="763" width="350" height="5" fill="#b8582e"/>
    <text x="810" y="759" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#faf6ec" letter-spacing="1.4">REMEDIES · LA JUGE SEULE</text>
    <text x="810" y="789" font-family="'Fraunces', serif" font-size="15" font-style="italic" font-weight="500" fill="#1e1e2a">discrétion entière en équité</text>
    <text x="810" y="810" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">Aucune pré-engagement publique sur</text>
    <text x="810" y="828" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">le quantum, la révocation, l'<tspan font-style="italic">unwinding</tspan>.</text>
    <text x="810" y="846" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">Plafond Bonta opère en <tspan font-style="italic">background</tspan>.</text>
    <text x="810" y="876" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.2">PRÉ-ENGAGEMENT : ZÉRO</text>
  </g>

  <text x="60" y="950" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">SOURCES · F.R.C.P. 39(c) + 50(a) + 52 · TECHTIMES (16 MAI) · CNBC (14 MAI) · BLOOMBERG LAW (15 MAI) · MIT TECH REVIEW (15 MAI) · KALSHI (KXMUSKOAI-26)</text>
</svg>
