<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Écosystème financier en jeu dans le procès">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="1.2">SCHÉMA 06 · ÉCOSYSTÈME FINANCIER</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.3">Trois galaxies sous tension judiciaire</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Valorisations en jeu : 852 G$ vs 1 750 G$ vs 4 200 G$</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Three planets -->
  <!-- OpenAI -->
  <g class="interactive" data-card="ecosystem-openai" tabindex="0" role="button" aria-label="OpenAI Group PBC — 852 G$">
    <circle cx="280" cy="380" r="170" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="2"/>
    <text x="280" y="305" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">DÉFENDEUR PRINCIPAL</text>
    <text x="280" y="335" class="display" font-size="22" font-weight="600" fill="#1A1A1A" text-anchor="middle">OpenAI Group PBC</text>
    <text x="280" y="365" class="display" font-size="32" font-weight="600" fill="#B7332C" text-anchor="middle">852 G$</text>
    <text x="280" y="385" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">valorisation post-recapitalisation</text>
    <text x="280" y="412" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">~1 G d'utilisateurs hebdo</text>
    <text x="280" y="430" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">122 G$ de dernier tour de table</text>
    <text x="280" y="448" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">14 G$ de pertes projetées 2026</text>
    <text x="280" y="478" class="body" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">IPO cible Q4 2026 · ~1 T$</text>
  </g>

  <!-- Microsoft -->
  <g class="interactive" data-card="ecosystem-microsoft" tabindex="0" role="button" aria-label="Microsoft — co-défendeur, 27 % d'OpenAI">
    <circle cx="900" cy="380" r="170" fill="#B58A2C" fill-opacity="0.12" stroke="#B58A2C" stroke-width="2"/>
    <text x="900" y="305" class="mono" font-size="11" font-weight="600" fill="#B58A2C" text-anchor="middle">CO-DÉFENDEUR · AIDING &amp; ABETTING</text>
    <text x="900" y="335" class="display" font-size="22" font-weight="600" fill="#1A1A1A" text-anchor="middle">Microsoft</text>
    <text x="900" y="365" class="display" font-size="32" font-weight="600" fill="#B7332C" text-anchor="middle">~4,2 T$</text>
    <text x="900" y="385" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">capitalisation boursière (oct. 2025)</text>
    <text x="900" y="412" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">27 % du PBC (~135 G$)</text>
    <text x="900" y="430" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">Exclusivité Azure pré-AGI</text>
    <text x="900" y="448" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">IP rights jusqu'en 2032</text>
    <text x="900" y="478" class="body" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">Disgorgement réclamé : 13-25 G$</text>
  </g>

  <!-- Musk constellation -->
  <g class="interactive" data-card="ecosystem-musk" tabindex="0" role="button" aria-label="SpaceX × xAI — 1,75 T$">
    <circle cx="600" cy="380" r="120" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="2"/>
    <text x="600" y="320" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">PLAIGNANT</text>
    <text x="600" y="345" class="display" font-size="18" font-weight="600" fill="#1A1A1A" text-anchor="middle">SpaceX × xAI</text>
    <text x="600" y="372" class="display" font-size="26" font-weight="600" fill="#B7332C" text-anchor="middle">1,75 T$</text>
    <text x="600" y="390" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">post-fusion fév. 2026</text>
    <text x="600" y="412" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">xAI : 250 G$</text>
    <text x="600" y="428" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">SpaceX : 1 000 G$</text>
    <text x="600" y="450" class="body" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">IPO juin 2026</text>
    <text x="600" y="465" class="body" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">jusqu'à 75 G$ levés</text>
  </g>

  <!-- Connection lines -->
  <line x1="450" y1="380" x2="540" y2="380" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="495" y="368" class="body" font-size="10" font-style="italic" fill="#1A1A1A" text-anchor="middle">v.</text>
  <line x1="660" y1="380" x2="730" y2="380" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3"/>
  <text x="695" y="368" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">concurrence directe</text>
  <line x1="450" y1="380" x2="730" y2="380" stroke="none"/>

  <!-- Microsoft-OpenAI relationship arc -->
  <path d="M 350,380 Q 590,560 830,380" fill="none" stroke="#1F5560" stroke-width="1.25" stroke-dasharray="3 4"/>
  <text x="600" y="540" class="body" font-size="11" font-style="italic" fill="#1F5560" text-anchor="middle">partenariat 2019-2032 (post-AGI inclus)</text>

  <!-- Bottom: damages requested -->
  <g class="interactive" data-card="ecosystem-damages" tabindex="0" role="button" aria-label="Disgorgement réclamé">
    <rect x="80" y="600" width="1040" height="130" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="100" y="628" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.5">DISGORGEMENT RÉCLAMÉ — DESTINATION : OPENAI FOUNDATION</text>
    <line x1="100" y1="640" x2="1100" y2="640" stroke="#E5E1D8" stroke-width="0.5"/>

    <text x="200" y="668" class="display" font-size="22" font-weight="600" fill="#1A1A1A" text-anchor="middle">65,5 – 109 G$</text>
    <text x="200" y="688" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">d'OpenAI</text>
    <text x="200" y="704" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">expert Wazzan, gamme</text>

    <text x="500" y="668" class="display" font-size="22" font-weight="600" fill="#1A1A1A" text-anchor="middle">13,3 – 25 G$</text>
    <text x="500" y="688" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">de Microsoft</text>
    <text x="500" y="704" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">aiding &amp; abetting</text>

    <text x="800" y="668" class="display" font-size="22" font-weight="600" fill="#B7332C" text-anchor="middle">≤ 134 G$ TOTAL</text>
    <text x="800" y="688" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">+ équité personnelle</text>
    <text x="800" y="704" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Altman + Brockman</text>

    <text x="1050" y="668" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">36-38 %</text>
    <text x="1050" y="688" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">prob. Polymarket</text>
    <text x="1050" y="704" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">de victoire Musk</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="755" x2="1140" y2="755" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="775" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : Bloomberg, CNBC, Microsoft Form 8-K oct. 2025, OpenAI Foundation press release, rapports d'expertise au dossier (Doc. 431).</text>
  <text x="60" y="790" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : trois sphères mues par leurs propres dynamiques (IPO OpenAI, IPO SpaceX, relation Microsoft-IA). Le procès rebat les cartes des trois simultanément.</text>
</svg>
