<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-label="Kevin Scott désamorce, sous serment, le verrou Microsoft du procès — l'email du 7 mars 2018 réinterprété par son auteur le 13 mai 2026">
  <defs>
    <marker id="jArrow0514" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArrow0514Dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9ca5"/>
    </marker>
    <pattern id="hatchOut0514" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#9a9ca5" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="860" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-14 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">« I was thinking about <tspan font-style="italic" fill="#b8582e">Reid Hoffman</tspan>. »</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Kevin Scott, sous serment, retire à Molo la pièce qu'il avait construite. <tspan font-weight="500" fill="#1e1e2a">Casey v. U.S. Bank perd son ancrage probatoire — la deuxième poche se referme.</tspan></text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <!-- ============================== PIÈCE — L'EMAIL ============================== -->
  <g>
    <rect x="60" y="182" width="1080" height="124" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="182" width="6" height="124" fill="#b8582e"/>
    <text x="92" y="208" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">PIÈCE · 7 MARS 2018 · K. SCOTT (CTO MICROSOFT) → S. NADELLA, A. HOOD, E. HORVITZ</text>
    <text x="92" y="240" font-family="'Fraunces', serif" font-size="21" font-style="italic" font-weight="500" fill="#faf6ec">« I wonder if the <tspan font-weight="600" fill="#b8582e">big OpenAI donors</tspan> are aware of these plans? »</text>
    <text x="92" y="270" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#9a9ca5">« Ideologically, I can't imagine that they funded an open effort to concentrate ML talent so that they could then go build a closed, for profit thing on its back. »</text>
    <text x="92" y="295" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#6b6f7c" letter-spacing="1.2">LA MÊME PIÈCE. DEUX LECTURES. UNE PORTE QUE LE TÉMOIGNAGE VIENT DE FERMER.</text>
  </g>

  <!-- ============================== DEUX LECTURES — TITRE ============================== -->
  <text x="60" y="346" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">LECTURE M (MOLO · 11 MAI) — VS — LECTURE S (SCOTT · 13 MAI · SOUS SERMENT)</text>

  <!-- ============================== COLONNE GAUCHE — LECTURE MOLO ============================== -->
  <g>
    <rect x="60" y="362" width="520" height="318" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="60" y="362" width="520" height="34" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="390" width="520" height="6" fill="#1e1e2a"/>
    <text x="80" y="385" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">LECTURE M · CASEY v. U.S. BANK</text>
    <text x="500" y="385" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#faf6ec" letter-spacing="1.4" text-anchor="end">DÉSAMORCÉE ✕</text>

    <rect x="80" y="414" width="480" height="248" fill="url(#hatchOut0514)" opacity="0.20"/>

    <text x="80" y="430" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">ANCRAGE DOCTRINAL</text>
    <text x="80" y="450" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a"><tspan font-style="italic">Casey v. U.S. Bank N.A.</tspan>, 127 Cal. App. 4th 1138</text>
    <text x="80" y="468" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">CACI 3610 — aiding &amp; abetting breach of fiduciary duty</text>

    <line x1="80" y1="488" x2="560" y2="488" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="80" y="510" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">PRONG (i) — ACTUAL KNOWLEDGE</text>
    <text x="80" y="530" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">Microsoft savait que <tspan font-style="italic">les donateurs</tspan> ignoraient</text>
    <text x="80" y="548" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d"> &#160;&#160;&#160;la conversion non-profit → for-profit</text>

    <line x1="80" y1="566" x2="560" y2="566" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="80" y="588" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">PRONG (ii) — SUBSTANTIAL ASSISTANCE</text>
    <text x="80" y="608" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">300 M$ → 1 Md$ → 13 Md$ → 100 Md$ cumulés</text>
    <text x="80" y="626" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d"> &#160;&#160;&#160;dépasse l'<tspan font-style="italic">ordinary business transaction</tspan></text>

    <line x1="80" y1="644" x2="560" y2="644" stroke="rgba(184,88,46,0.55)" stroke-width="1"/>

    <text x="80" y="666" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">CONSÉQUENCE ATTENDUE EN ÉQUITÉ</text>
    <text x="80" y="685" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">→ Microsoft <tspan font-style="italic">jointly and severally</tspan></text>
    <text x="80" y="703" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d"> &#160;&#160;&#160;sur le quantum de disgorgement — « la deuxième poche »</text>
  </g>

  <!-- ============================== COLONNE DROITE — LECTURE SCOTT ============================== -->
  <g>
    <rect x="620" y="362" width="520" height="318" rx="6" fill="#ffffff" stroke="rgba(184,88,46,0.55)" stroke-width="1.4"/>
    <rect x="620" y="362" width="520" height="34" rx="6" fill="#b8582e"/>
    <rect x="620" y="390" width="520" height="6" fill="#b8582e"/>
    <text x="640" y="385" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">LECTURE S · TÉMOIGNAGE SOUS SERMENT</text>
    <text x="1120" y="385" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.4" text-anchor="end">VERROUILLÉE ✓</text>

    <text x="640" y="430" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">L'IDENTITÉ DU DONATEUR — RECADRÉE</text>
    <text x="640" y="450" font-family="'Fraunces', serif" font-size="14" font-style="italic" font-weight="500" fill="#1e1e2a">« Primarily, I was thinking about <tspan font-weight="600" fill="#b8582e">Reid Hoffman</tspan>. He was the OpenAI donor I knew. »</text>
    <text x="640" y="470" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d"> &#160;&#160;&#160;non pas Musk · non pas une catégorie abstraite</text>

    <line x1="640" y1="490" x2="1120" y2="490" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="640" y="512" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">CE QUE SCOTT APPREND AU DÎNER · FLEA STREET, MENLO PARK</text>
    <text x="640" y="532" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">→ Hoffman <tspan font-style="italic">investit</tspan> dans le nouveau for-profit</text>
    <text x="640" y="550" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">→ Hoffman <tspan font-style="italic">rejoint</tspan> le board du non-profit</text>
    <text x="640" y="568" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d">→ round 500 M$ · structure <tspan font-style="italic">capped profit</tspan> · Altman quitte YC</text>

    <line x1="640" y1="586" x2="1120" y2="586" stroke="rgba(184,88,46,0.55)" stroke-width="1"/>

    <text x="640" y="608" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">CONSÉQUENCE PROBATOIRE</text>
    <text x="640" y="627" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">→ Pas de <tspan font-style="italic">specific breach</tspan> à connaître</text>
    <text x="640" y="645" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d"> &#160;&#160;&#160;Le donateur visé <tspan font-style="italic">consent</tspan> à la conversion</text>
    <text x="640" y="663" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">→ Prong (i) <tspan font-style="italic">actual knowledge</tspan> s'effondre</text>
    <text x="640" y="681" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d"> &#160;&#160;&#160;sans (i), Casey n'engage plus Microsoft</text>
  </g>

  <!-- ============================== BANDE BAS — LE PIVOT NARRATIF ============================== -->
  <text x="60" y="722" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">L'INVERSION DU 13 MAI · DU « MICROSOFT SAVAIT » AU « LE DONATEUR ÉTAIT À LA TABLE »</text>

  <g>
    <rect x="60" y="738" width="1080" height="96" rx="6" fill="#faf6ec" stroke="rgba(184,88,46,0.55)" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="84" y="764" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">TROIS PIÈCES MIROIR — MÊME JOURNÉE</text>
    <text x="84" y="788" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d">→ <tspan font-weight="500" fill="#1e1e2a">Scott (Microsoft)</tspan> : le donateur était Hoffman · <tspan font-weight="500" fill="#1e1e2a">Wetter (Microsoft)</tspan> : 100 Md$ cumulés, donc <tspan font-style="italic">ordinary at scale</tspan> · <tspan font-weight="500" fill="#1e1e2a">Achiam (OpenAI)</tspan> : le « jackass for safety » — rejeté par la juge</text>
    <text x="84" y="810" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d">La défense conjointe n'a pas plaidé l'innocence. Elle a, en 72 heures, déplacé <tspan font-weight="500" fill="#1e1e2a">trois pièces probatoires</tspan> — Nadella (Casey safe harbor) · Altman (formation du trust) · Scott (donateur consentant) — vers <tspan font-style="italic">Strate 1</tspan>.</text>
  </g>

  <text x="60" y="850" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">Sources : GeekWire · CNBC · NPR · Local News Matters · Yahoo Finance · The Tech Portal · Axios (13 mai 2026) · Casey v. U.S. Bank N.A., 127 Cal. App. 4th 1138 (2005) · CACI 3610</text>
</svg>
