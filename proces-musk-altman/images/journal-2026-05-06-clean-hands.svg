<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Le verrou de l'unclean hands se construit — schéma du jour">
  <defs>
    <marker id="jArrow0506" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArrow0506Blocked" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9ca5"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-06 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">Le verrou de l'<tspan font-style="italic" fill="#b8582e">unclean hands</tspan> se construit</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Cinq actes alignés sur la même fenêtre 2017–2018. Une seule règle d'équité californienne.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <!-- LEFT COLUMN — 5 acts -->
  <g>
    <rect x="60" y="170" width="540" height="438" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <rect x="60" y="170" width="6" height="438" fill="#1e1e2a"/>
    <text x="92" y="198" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.6">LE MATÉRIAU · 5 ACTES DOCUMENTÉS</text>
    <text x="92" y="222" font-family="'Fraunces', serif" font-size="19" font-weight="500" fill="#1e1e2a">Ce que Musk demandait à la charité</text>
    <text x="92" y="242" font-family="'Fraunces', serif" font-size="12.5" font-style="italic" fill="#6b6f7c">Pendant la fenêtre exacte où il se dit aujourd'hui trahi.</text>

    <line x1="92" y1="258" x2="568" y2="258" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>

    <!-- Act 1: Mars -->
    <text x="92" y="280" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">ACTE 1 · MARS · 2017–2018</text>
    <text x="92" y="300" font-family="'Inter', sans-serif" font-size="13.5" font-weight="500" fill="#1e1e2a">Contrôle majoritaire d'OpenAI demandé</text>
    <text x="92" y="316" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">pour financer une cité martienne · « <tspan font-style="italic" fill="#b8582e">$80B</tspan> »</text>

    <line x1="92" y1="332" x2="568" y2="332" stroke="rgba(30,30,44,0.06)" stroke-width="1"/>

    <!-- Act 2: Tesla autopilot -->
    <text x="92" y="354" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">ACTE 2 · TESLA · 2017</text>
    <text x="92" y="374" font-family="'Inter', sans-serif" font-size="13.5" font-weight="500" fill="#1e1e2a">Employés OpenAI affectés en secret</text>
    <text x="92" y="390" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">à l'Autopilot Tesla · hors <tspan font-style="italic">board minutes</tspan></text>

    <line x1="92" y1="406" x2="568" y2="406" stroke="rgba(30,30,44,0.06)" stroke-width="1"/>

    <!-- Act 3: Zilis -->
    <text x="92" y="428" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">ACTE 3 · ZILIS · 2018, 2020–2023</text>
    <text x="92" y="448" font-family="'Inter', sans-serif" font-size="13.5" font-weight="500" fill="#1e1e2a">Liaison embarquée au <tspan font-style="italic">non-profit</tspan> board</text>
    <text x="92" y="464" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">« <tspan font-style="italic" fill="#b8582e">stay close and friendly to keep info flowing</tspan> »</text>

    <line x1="92" y1="480" x2="568" y2="480" stroke="rgba(30,30,44,0.06)" stroke-width="1"/>

    <!-- Act 4: Term sheet -->
    <text x="92" y="502" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">ACTE 4 · TERM SHEET · 2018</text>
    <text x="92" y="522" font-family="'Inter', sans-serif" font-size="13.5" font-weight="500" fill="#1e1e2a">Capped-profit signé sans lecture</text>
    <text x="92" y="538" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">« <tspan font-style="italic">I only read the headlines</tspan> » · témoignage 29 avr.</text>

    <line x1="92" y1="554" x2="568" y2="554" stroke="rgba(30,30,44,0.06)" stroke-width="1"/>

    <!-- Act 5: Partly -->
    <text x="92" y="576" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">ACTE 5 · « PARTLY » · 2024–2026</text>
    <text x="92" y="596" font-family="'Inter', sans-serif" font-size="13.5" font-weight="500" fill="#1e1e2a">xAI distille les modèles d'OpenAI</text>
  </g>

  <!-- RIGHT COLUMN — Doctrinal lock -->
  <g>
    <rect x="640" y="170" width="500" height="438" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <rect x="640" y="170" width="6" height="438" fill="#1e1e2a"/>
    <text x="672" y="198" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.6">LE VERROU DOCTRINAL</text>
    <text x="672" y="222" font-family="'Fraunces', serif" font-size="19" font-weight="500" fill="#1e1e2a">Clean hands · équité californienne</text>
    <text x="672" y="242" font-family="'Fraunces', serif" font-size="12.5" font-style="italic" fill="#6b6f7c">La règle du seuil — applicable avant le fond.</text>

    <line x1="672" y1="258" x2="1108" y2="258" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>

    <!-- Pomeroy maxim -->
    <rect x="672" y="276" width="436" height="76" rx="4" fill="rgba(184,88,46,0.06)" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <text x="688" y="298" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">MAXIME · POMEROY §397</text>
    <text x="688" y="322" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#1e1e2a">« He who comes into equity</text>
    <text x="688" y="340" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#1e1e2a">must come with <tspan font-weight="500" fill="#b8582e">clean hands</tspan>. »</text>

    <!-- California Civil Code §3517 -->
    <rect x="672" y="366" width="436" height="56" rx="4" fill="rgba(184,88,46,0.06)" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <text x="688" y="388" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">CODE · CAL. CIV. CODE §3517</text>
    <text x="688" y="410" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#1e1e2a">« No one can take advantage of his own wrong. »</text>

    <!-- Kendall-Jackson test -->
    <rect x="672" y="436" width="436" height="156" rx="4" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="688" y="458" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.4">TEST · KENDALL-JACKSON V. SUP. CT. (1999)</text>
    <text x="688" y="482" font-family="'Inter', sans-serif" font-size="12.5" font-weight="500" fill="#1e1e2a">Deux conditions cumulatives :</text>

    <text x="700" y="506" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">(i) la conduite reprochée se rattache</text>
    <text x="700" y="522" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">directement à la transaction litigieuse ;</text>
    <text x="700" y="546" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">(ii) elle a causé un préjudice à la partie</text>
    <text x="700" y="562" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">adverse ou à l'intérêt public.</text>

    <text x="688" y="586" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">EFFET → REFUS DU REMÈDE EN ENTIER.</text>
  </g>

  <!-- Bottom flow: from material → lock → blocked claim -->
  <text x="60" y="650" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">CONSÉQUENCE — LA DEMANDE D'ÉQUITÉ DE MUSK BUTE SUR LE SEUIL</text>

  <g>
    <rect x="60" y="668" width="340" height="64" rx="6" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="80" y="692" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">DEMANDE MUSK · ÉQUITÉ</text>
    <text x="80" y="714" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">Disgorgement <tspan fill="#b8582e">$150B</tspan> · removal Altman/Brockman</text>
  </g>

  <line x1="408" y1="700" x2="582" y2="700" stroke="#9a9ca5" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#jArrow0506Blocked)"/>

  <g>
    <rect x="600" y="668" width="200" height="64" rx="6" fill="#1e1e2a" stroke="#1e1e2a" stroke-width="1"/>
    <text x="620" y="692" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">VERROU EN ÉQUITÉ</text>
    <text x="620" y="714" font-family="'Fraunces', serif" font-size="15" font-style="italic" font-weight="500" fill="#faf6ec">Clean hands → bar.</text>
  </g>

  <line x1="808" y1="700" x2="982" y2="700" stroke="#9a9ca5" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#jArrow0506Blocked)"/>

  <g>
    <rect x="1000" y="668" width="140" height="64" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="1020" y="692" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#9a9ca5" letter-spacing="1.4">RÉSULTAT</text>
    <text x="1020" y="714" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#9a9ca5">Procès s'éteint.</text>
  </g>

  <text x="60" y="752" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">Sources : Brockman cross + redirect, trial day 6 (5 mai 2026) · CNBC · Bloomberg · NBC News · Reuters · Pomeroy's Equity Jurisprudence §397 · Cal. Civ. Code §3517 · Kendall-Jackson Winery v. Sup. Ct., 76 Cal. App. 4th 970 (1999)</text>
</svg>
