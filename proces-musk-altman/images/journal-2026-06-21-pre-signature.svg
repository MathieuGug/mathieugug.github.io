    <text x="80" y="355" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#faf6ec" letter-spacing="1.6">STATEMENT ON THE PROPOSED SUPERVISORY PROTOCOL FRAMEWORK · OFFICE OF AG ROB BONTA · 17 JUIN 2026</text>

    <rect x="80" y="384" width="1040" height="60" rx="4" fill="url(#seal0621)" stroke="#b8582e" stroke-width="1.4"/>
    <rect x="80" y="384" width="1040" height="60" rx="4" fill="rgba(255,255,255,0.82)" stroke="#b8582e" stroke-width="1.4"/>
    <text x="600" y="408" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#1e1e2a" text-anchor="middle">« The Office of the Attorney General acknowledges receipt of the Foundation Board's Resolution 2026-06 of June 12, 2026,</text>
    <text x="600" y="425" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#1e1e2a" text-anchor="middle">and finds the proposed Supervisory Protocol framework <tspan font-weight="700" fill="#b8582e">acceptable in principle</tspan>,</text>
    <text x="600" y="439" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#1e1e2a" text-anchor="middle">subject to three substantive amendments. »</text>

    <text x="80" y="478" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">TROIS AMENDEMENTS · INTÉGRÉS PAR WACHTELL DANS LA RÉPONSE FORMELLE DU 19 JUIN</text>

    <g>
      <rect x="80" y="492" width="336" height="124" rx="4" fill="#f3eedf" stroke="#b8582e" stroke-width="1.6"/>
      <text x="100" y="514" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">AMENDEMENT (i) · STRUCTURANT</text>
      <text x="100" y="535" font-family="'Fraunces', serif" font-size="14" font-weight="500" fill="#1e1e2a">Tiers inspecteur indépendant</text>
      <text x="100" y="555" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">Nommé conjointement avec la coalition</text>
      <text x="100" y="571" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">civile sous Cal. Code Regs. tit. 11,</text>
      <text x="100" y="587" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">§306(c). <tspan font-weight="500" fill="#1e1e2a">Premier siège civique formel</tspan></text>
      <text x="100" y="603" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">dans la supervision §12598.</text>
    </g>

    <g>
      <rect x="432" y="492" width="336" height="124" rx="4" fill="#f3eedf" stroke="rgba(184,88,46,0.55)" stroke-width="1.2"/>
      <text x="452" y="514" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">AMENDEMENT (ii) · TRANSPARENCE</text>
      <text x="452" y="535" font-family="'Fraunces', serif" font-size="14" font-weight="500" fill="#1e1e2a">Asset allocation publié</text>
      <text x="452" y="555" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">Publication trimestrielle de l'asset</text>
      <text x="452" y="571" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">allocation schedule sous format</text>
      <text x="452" y="587" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">machine-lisible. Visibilité externe</text>
      <text x="452" y="603" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">automatisable du périmètre charitable.</text>
    </g>

    <g>
      <rect x="784" y="492" width="336" height="124" rx="4" fill="#f3eedf" stroke="rgba(184,88,46,0.55)" stroke-width="1.2"/>
      <text x="804" y="514" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">AMENDEMENT (iii) · PRICE DISCOVERY</text>
      <text x="804" y="535" font-family="'Fraunces', serif" font-size="14" font-weight="500" fill="#1e1e2a">Valuateur tiers AG-agréé</text>
      <text x="804" y="555" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">Validation indépendante de la price</text>
      <text x="804" y="571" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">discovery sur toute transaction</text>
      <text x="804" y="587" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">au-delà de 5 Md$, par un valuateur</text>
      <text x="804" y="603" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">tiers agréé par l'AG. <tspan font-style="italic">Garde-fou.</tspan></text>
    </g>
  </g>

