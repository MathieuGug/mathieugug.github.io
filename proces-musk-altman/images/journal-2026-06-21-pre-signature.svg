    <text x="462" y="824" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">opérationnel négocié dans l'instant.</text>
    <text x="462" y="850" font-family="'Inter', sans-serif" font-size="10" font-style="italic" fill="#6b6f7c">Lit. confirmation de la pré-signature</text>

