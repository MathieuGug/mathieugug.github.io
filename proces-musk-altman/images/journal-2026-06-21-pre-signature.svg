    <text x="824" y="776" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d"><tspan font-weight="500" fill="#1e1e2a">Whistleblower protection</tspan> sous</text>
    <text x="824" y="792" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">Cal. Lab. Code §1102.5 ; <tspan font-weight="500" fill="#1e1e2a">delay max</tspan></text>
    <text x="824" y="808" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d"><tspan font-weight="500" fill="#1e1e2a">90 jours</tspan> sur quarterly reporting.</text>
    <text x="824" y="829" font-family="'Inter', sans-serif" font-size="11" fill="#3b3f4d">Non demandées par l'AG.</text>
