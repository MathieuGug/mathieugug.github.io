<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Architecture du procès en deux phases">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="1.2">SCHÉMA 05 · ARCHITECTURE PROCÉDURALE</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.3">Un procès en deux phases, un jury consultatif</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Du voir-dire au remède : 27 avril → mi-juin 2026 (mid-May 2026)</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Timeline backbone -->
  <line x1="80" y1="280" x2="1120" y2="280" stroke="#1A1A1A" stroke-width="2.5"/>

  <!-- Phase markers -->
  <g class="interactive" data-card="phase-jury-selection" tabindex="0" role="button" aria-label="27 avril 2026 — Jury selection">
    <circle cx="140" cy="280" r="10" fill="#B7332C"/>
    <text x="140" y="285" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>
    <line x1="140" y1="270" x2="140" y2="200" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="140" y="190" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">Jury selection</text>
    <text x="140" y="208" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">27 AVRIL 2026</text>
    <text x="140" y="225" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">9 jurés, sans suppléants</text>
    <text x="140" y="240" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Pool 3× plus large</text>
  </g>

  <g class="interactive" data-card="phase-opening" tabindex="0" role="button" aria-label="28 avril 2026 — Opening statements">
    <circle cx="280" cy="280" r="10" fill="#B7332C" fill-opacity="0.5"/>
    <line x1="280" y1="290" x2="280" y2="350" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="280" y="365" class="display" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Opening</text>
    <text x="280" y="380" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">28 AVRIL</text>
    <text x="280" y="395" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Plaidoiries</text>
    <text x="280" y="408" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">d'ouverture</text>
  </g>

  <!-- Phase 1 box: Liability -->
  <g class="interactive" data-card="phase-1-liability" tabindex="0" role="button" aria-label="Phase 1 — Liability (27 avril – mi-mai 2026)">
    <rect x="220" y="430" width="540" height="170" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25"/>
    <text x="240" y="458" class="mono" font-size="11" font-weight="600" fill="#1F5560">PHASE 1 · LIABILITY · 27 AVRIL → ~15 MAI 2026</text>
    <text x="240" y="490" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Le jury entend les témoins et délibère</text>
    <text x="240" y="514" class="body" font-size="12" fill="#1A1A1A">• Chaque partie : ~22 h de présentation (Microsoft : 5 h)</text>
    <text x="240" y="532" class="body" font-size="12" fill="#1A1A1A">• Audience lundi-jeudi · 8 h 30 → 13 h 40 PT · 4 semaines</text>
    <text x="240" y="550" class="body" font-size="12" fill="#1A1A1A">• Témoins : Musk, Altman, Brockman, Nadella, Sutskever, Murati, Zilis…</text>
    <text x="240" y="572" class="body" font-size="12" font-weight="600" fill="#B7332C">Verdict consultatif (advisory) — ne lie pas la juge</text>
  </g>

  <!-- Phase 2 box: Remedies -->
  <g class="interactive" data-card="phase-2-remedies" tabindex="0" role="button" aria-label="Phase 2 — Remedies (à partir du 18 mai 2026)">
    <rect x="780" y="430" width="340" height="170" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.25"/>
    <text x="800" y="458" class="mono" font-size="11" font-weight="600" fill="#B7332C">PHASE 2 · REMEDIES · 18 MAI 2026 →</text>
    <text x="800" y="490" class="display" font-size="18" font-weight="600" fill="#1A1A1A">La juge tranche seule</text>
    <text x="800" y="514" class="body" font-size="12" fill="#1A1A1A">Si liability établie, Gonzalez Rogers</text>
    <text x="800" y="530" class="body" font-size="12" fill="#1A1A1A">décide, sans jury :</text>
    <text x="800" y="552" class="body" font-size="12" fill="#1A1A1A">• Disgorgement (jusqu'à 134 G$)</text>
    <text x="800" y="568" class="body" font-size="12" fill="#1A1A1A">• Éviction Altman / Brockman</text>
    <text x="800" y="584" class="body" font-size="12" fill="#1A1A1A">• Unwind PBC + lien Microsoft</text>
  </g>

  <!-- Connection arrow Phase 1 → Phase 2 -->
  <line x1="765" y1="515" x2="775" y2="515" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow4)"/>

  <!-- Bottom phase markers on the timeline -->
  <g class="interactive" data-card="phase-mid-may" tabindex="0" role="button" aria-label="Mid-May 2026 — Fin de la phase 1">
    <circle cx="760" cy="280" r="10" fill="#1F5560"/>
    <text x="760" y="285" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">2</text>
    <line x1="760" y1="270" x2="760" y2="200" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="760" y="190" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">Verdict consultatif</text>
    <text x="760" y="208" class="mono" font-size="10" fill="#1F5560" text-anchor="middle">~15 MAI 2026</text>
    <text x="760" y="225" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Fin de la phase 1</text>
  </g>

  <g class="interactive" data-card="phase-judge-rules" tabindex="0" role="button" aria-label="Mai-juin 2026 — Décision de la juge">
    <circle cx="1080" cy="280" r="10" fill="#B7332C"/>
    <text x="1080" y="285" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">3</text>
    <line x1="1080" y1="270" x2="1080" y2="200" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="1080" y="190" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">Décision finale</text>
    <text x="1080" y="208" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">FIN MAI - JUIN 2026</text>
    <text x="1080" y="225" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Liability + remèdes</text>
  </g>

  <!-- Bottom risk box -->
  <g class="interactive" data-card="phase-statute-trap" tabindex="0" role="button" aria-label="Risque transverse — Prescription">
    <rect x="80" y="640" width="500" height="100" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25" stroke-dasharray="2 3"/>
    <text x="100" y="668" class="mono" font-size="11" font-weight="600" fill="#B58A2C">RISQUE TRANSVERSE · PRESCRIPTION</text>
    <text x="100" y="694" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Statute of limitations</text>
    <text x="100" y="714" class="body" font-size="11" fill="#1A1A1A">Si le jury juge l'action prescrite (≥ 5 août 2020), la juge a indiqué qu'elle</text>
    <text x="100" y="730" class="body" font-size="11" fill="#1A1A1A">« acceptera vraisemblablement cette conclusion » — verdict directement contre Musk.</text>
  </g>

  <g class="interactive" data-card="phase-appeal" tabindex="0" role="button" aria-label="Appel possible">
    <rect x="600" y="640" width="520" height="100" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="620" y="668" class="mono" font-size="11" font-weight="600" fill="#5A5A5A">APRÈS LA DÉCISION FINALE</text>
    <text x="620" y="694" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Appel devant le 9th Circuit</text>
    <text x="620" y="714" class="body" font-size="11" fill="#1A1A1A">Toute décision de la District Court peut faire l'objet d'un appel devant la Cour</text>
    <text x="620" y="730" class="body" font-size="11" fill="#1A1A1A">d'appel du 9ᵉ circuit · délais usuels 12-24 mois.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="755" x2="1140" y2="755" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="775" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : ordres du tribunal (Doc. 4:24-cv-04722) ; Bay City News ; Reuters ; Implicator ; synthèse personnelle.</text>
  <text x="60" y="790" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : le format en jury consultatif (advisory jury) est rare en civil ; il préserve la solennité tout en concentrant le pouvoir décisionnel sur la juge.</text>
</svg>
