<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="L'architecture qui décide à la place du jury — schéma du jour">
  <defs>
    <marker id="jArrow0503" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-03 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">L'architecture qui décide à la place du jury</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">La performance des neuf jurés. La juge Gonzalez Rogers, qui tranchera seule sous le régime de l'équité.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <g>
    <rect x="180" y="180" width="840" height="100" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="210" y="208" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#9a9ca5" letter-spacing="1.6">FRONT STAGE · JURY · 9 PERSONNES</text>
    <text x="210" y="240" font-family="'Fraunces', serif" font-size="22" font-weight="400" font-style="italic" fill="#6b6f7c">Verdict consultatif. Donne un avis. Ne tranche pas.</text>
    <text x="210" y="264" font-family="'Inter', sans-serif" font-size="13" fill="#6b6f7c">C'est sur eux que parle Musk depuis quatre jours. Et que parle Wachtell.</text>
  </g>

  <line x1="600" y1="290" x2="600" y2="362" stroke="#b8582e" stroke-width="2" marker-end="url(#jArrow0503)"/>
  <text x="612" y="332" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">ADVISORY ONLY</text>

  <g>
    <rect x="120" y="378" width="960" height="120" rx="6" fill="#ffffff" stroke="#b8582e" stroke-width="1.6"/>
    <rect x="120" y="378" width="6" height="120" fill="#b8582e"/>
    <text x="156" y="408" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.6">BACK STAGE · JUGE YVONNE GONZALEZ ROGERS</text>
    <text x="156" y="442" font-family="'Fraunces', serif" font-size="26" font-weight="500" fill="#1e1e2a">Findings of fact &amp; conclusions of law.</text>
    <text x="156" y="470" font-family="'Inter', sans-serif" font-size="13.5" fill="#3b3f4d">Décide seule la responsabilité, fixe le quantum de la disgorgement, conduit la phase remedies.</text>
  </g>

  <text x="60" y="540" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">VERROUS DOCTRINAUX — POURQUOI LA JUGE, PAS LE JURY</text>

  <g>
    <rect x="60" y="560" width="340" height="118" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="80" y="586" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">VERROU 1 · ÉQUITÉ</text>
    <text x="80" y="610" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">Charitable trust = équité.</text>
    <text x="80" y="634" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Les deux griefs survivants (charitable</text>
    <text x="80" y="651" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">trust, unjust enrichment) relèvent</text>
    <text x="80" y="668" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">de la juridiction d'équité — du juge.</text>
  </g>

  <g>
    <rect x="430" y="560" width="340" height="118" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="450" y="586" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">VERROU 2 · PAS DE PUNITIFS</text>
    <text x="450" y="610" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">Punitive damages exclus.</text>
    <text x="450" y="634" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">L'équité ignore la peine privée.</text>
    <text x="450" y="651" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Reste la disgorgement, dont le</text>
    <text x="450" y="668" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">montant est fixé par la juge seule.</text>
  </g>

  <g>
    <rect x="800" y="560" width="340" height="118" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="820" y="586" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">VERROU 3 · STANDING</text>
    <text x="820" y="610" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">L'AG est l'enforcer naturel.</text>
    <text x="820" y="634" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">CA et DE ont approuvé la nouvelle</text>
    <text x="820" y="651" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">structure d'OpenAI en oct. 2025.</text>
    <text x="820" y="668" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Un ex-donateur arrive après l'autorité.</text>
  </g>

  <text x="60" y="704" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">Source : pre-trial orders N.D. Cal. 2026 · cnunezlaw guide · CNN takeaways · Bloomberg week 1 · Sunday papers (3 mai 2026)</text>
</svg>
