<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 940" role="img" aria-label="L'escalier procédural — Question 1 (prescription) avant question 2 (fond), avec Louis Dudney comme témoin pivot · jury charge du 14 mai 2026">
  <defs>
    <marker id="jArrow0516" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArrow0516Dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9ca5"/>
    </marker>
    <pattern id="hatchDead0516" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#9a9ca5" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="940" fill="#faf6ec"/>

  <!-- =================== HEADER =================== -->
  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-16 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">L'escalier procédural — <tspan font-style="italic" fill="#b8582e">question n°1 avant question n°2</tspan>.</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Le jury charge du 14 mai a deux étages. <tspan font-weight="500" fill="#1e1e2a">L'étage 1 est la prescription. Si le jury y répond « filed too late », l'étage 2 ne s'ouvre jamais.</tspan></text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <!-- =================== STAGE 1 BOX (LEFT) + DUDNEY (RIGHT) =================== -->
  <text x="60" y="200" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">QUESTION N°1 · PRESCRIPTION · TRIER OF FACT : JURY ADVISORY</text>

  <!-- Stage 1 box (gauche) -->
  <g class="branch" data-modal-id="stage1-0516" tabindex="0" role="button" aria-label="Question 1 — la prescription, trois cutoffs">
    <rect x="60" y="216" width="700" height="240" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="60" y="216" width="700" height="34" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="244" width="700" height="6" fill="#1e1e2a"/>
    <text x="80" y="239" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">ÉTAGE 1 · 3 CUTOFFS · 3 GRIEFS</text>
    <text x="740" y="239" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#faf6ec" letter-spacing="1.4" text-anchor="end">CCP §§338 · 340 · 343</text>

    <!-- Cutoff 1 -->
    <text x="80" y="278" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">GRIEF 1 · BREACH OF CHARITABLE TRUST · 4 ANS</text>
    <rect x="80" y="288" width="660" height="34" rx="3" fill="#f3eedf"/>
    <text x="92" y="311" font-family="'Fraunces', serif" font-size="15" font-weight="500" fill="#1e1e2a">cutoff : <tspan font-weight="600" fill="#b8582e">5 août 2021</tspan> <tspan fill="#6b6f7c" font-size="12" font-style="italic"> · plainte originale 5 août 2024 — CCP §343</tspan></text>

    <!-- Cutoff 2 -->
    <text x="80" y="349" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">GRIEF 2 · UNJUST ENRICHMENT · 3 ANS</text>
    <rect x="80" y="359" width="660" height="34" rx="3" fill="#f3eedf"/>
    <text x="92" y="382" font-family="'Fraunces', serif" font-size="15" font-weight="500" fill="#1e1e2a">cutoff : <tspan font-weight="600" fill="#b8582e">5 août 2022</tspan> <tspan fill="#6b6f7c" font-size="12" font-style="italic"> · CCP §338(d) — fraud / mistake</tspan></text>

    <!-- Cutoff 3 -->
    <text x="80" y="420" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">GRIEF 3 · AIDING &amp; ABETTING MICROSOFT · 2 ANS</text>
    <rect x="80" y="430" width="660" height="22" rx="3" fill="#f3eedf"/>
    <text x="92" y="446" font-family="'Fraunces', serif" font-size="13" font-weight="500" fill="#1e1e2a">cutoff : <tspan font-weight="600" fill="#b8582e">14 novembre 2021</tspan> <tspan fill="#6b6f7c" font-size="11.5" font-style="italic"> · co-défendeur ajouté nov. 2023 — CCP §340</tspan></text>
  </g>

  <!-- Dudney pivot box (droite) -->
  <g class="branch" data-modal-id="dudney-0516" tabindex="0" role="button" aria-label="Louis Dudney — témoin pivot, forensic accountant AlixPartners">
    <rect x="780" y="216" width="360" height="240" rx="6" fill="#ffffff" stroke="#b8582e" stroke-width="1.6"/>
    <rect x="780" y="216" width="360" height="34" rx="6" fill="#b8582e"/>
    <rect x="780" y="244" width="360" height="6" fill="#b8582e"/>
    <text x="800" y="239" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">TÉMOIN PIVOT · DÉFENSE</text>

    <text x="800" y="280" font-family="'Fraunces', serif" font-size="18" font-weight="500" fill="#1e1e2a">Louis <tspan font-style="italic" fill="#b8582e">Dudney</tspan></text>
    <text x="800" y="300" font-family="'Inter', sans-serif" font-size="12" fill="#3b3f4d">Forensic accountant · AlixPartners</text>
    <text x="800" y="316" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">Global Leader · Investigations &amp; Disputes</text>
    <text x="800" y="332" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">30+ ans en expertise financière litige</text>

    <line x1="800" y1="350" x2="1120" y2="350" stroke="rgba(184,88,46,0.55)" stroke-width="1"/>

    <text x="800" y="372" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">LA CONCLUSION SOUS SERMENT</text>
    <text x="800" y="394" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#1e1e2a">« All Musk donations exhausted in</text>
    <text x="800" y="412" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#1e1e2a">pursuit of the nonprofit's mission —</text>
    <text x="800" y="430" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#1e1e2a">well before <tspan font-weight="600" fill="#b8582e">August 5, 2021</tspan>. »</text>
    <text x="800" y="448" font-family="'Inter', sans-serif" font-size="11" fill="#6b6f7c">Trace dollar par dollar des 38 M$ 2015-2017</text>
  </g>

  <!-- Flèche Dudney → Stage 1 (le témoignage alimente la défense de prescription) -->
  <line x1="780" y1="336" x2="768" y2="336" stroke="#b8582e" stroke-width="1.8" marker-end="url(#jArrow0516)"/>
  <text x="772" y="324" font-family="'JetBrains Mono', monospace" font-size="9" fill="#b8582e" letter-spacing="1.2" text-anchor="end">ALIMENTE</text>

  <!-- =================== FORK — entre Stage 1 et les deux branches =================== -->
  <line x1="410" y1="456" x2="410" y2="488" stroke="#1e1e2a" stroke-width="1.6"/>
  <line x1="200" y1="488" x2="620" y2="488" stroke="#1e1e2a" stroke-width="1.6"/>
  <line x1="200" y1="488" x2="200" y2="512" stroke="#9a9ca5" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#jArrow0516Dim)"/>
  <line x1="620" y1="488" x2="620" y2="512" stroke="#b8582e" stroke-width="1.8" marker-end="url(#jArrow0516)"/>

  <text x="210" y="482" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#9a9ca5" letter-spacing="1.4">FILED TOO LATE</text>
  <text x="630" y="482" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">FILED IN TIME</text>

  <!-- =================== BRANCHE GAUCHE — TERMINUS =================== -->
  <g class="branch" data-modal-id="terminus-0516" tabindex="0" role="button" aria-label="Si filed too late — directed verdict, procès clos">
    <rect x="60" y="528" width="500" height="220" rx="6" fill="url(#hatchDead0516)" stroke="#9a9ca5" stroke-width="1.4" stroke-dasharray="6 4"/>
    <rect x="60" y="528" width="500" height="34" rx="6" fill="#3b3f4d"/>
    <rect x="60" y="556" width="500" height="6" fill="#3b3f4d"/>
    <text x="80" y="551" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">SCÉNARIO TERMINUS · DIRECTED VERDICT</text>
    <text x="540" y="551" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#9a9ca5" letter-spacing="1.4" text-anchor="end">FED. R. CIV. P. 50(a)</text>

    <text x="80" y="592" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">LA PRÉ-ENGAGEMENT DE LA JUGE</text>
    <text x="80" y="614" font-family="'Fraunces', serif" font-size="15" font-style="italic" font-weight="500" fill="#1e1e2a">« Highly likely to accept that finding</text>
    <text x="80" y="632" font-family="'Fraunces', serif" font-size="15" font-style="italic" font-weight="500" fill="#1e1e2a">and <tspan font-weight="600" fill="#b8582e">direct verdict to the defendants</tspan>. »</text>
    <text x="80" y="652" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">— Hon. Y. Gonzalez Rogers · jury charge order, 14 mai 2026</text>

    <line x1="80" y1="672" x2="540" y2="672" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="80" y="694" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">CONSÉQUENCE PROCÉDURALE</text>
    <text x="80" y="714" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ Procès clos sans <tspan font-style="italic">findings of fact</tspan> en équité</text>
    <text x="80" y="732" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ Pas de disgorgement · pas de révocation · pas d'<tspan font-style="italic">unwinding</tspan></text>
  </g>

  <!-- =================== BRANCHE DROITE — ÉTAGE 2 =================== -->
  <g class="branch" data-modal-id="stage2-0516" tabindex="0" role="button" aria-label="Si filed in time — étage 2, le fond">
    <rect x="580" y="528" width="560" height="220" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="580" y="528" width="560" height="34" rx="6" fill="#1e1e2a"/>
    <rect x="580" y="556" width="560" height="6" fill="#1e1e2a"/>
    <text x="600" y="551" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">ÉTAGE 2 · LE FOND</text>
    <text x="1120" y="551" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#faf6ec" letter-spacing="1.4" text-anchor="end">→ FINDINGS OF FACT</text>

    <text x="600" y="592" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">QUESTION 2A — BREACH OF CHARITABLE TRUST</text>
    <text x="600" y="614" font-family="'Fraunces', serif" font-size="14" font-weight="500" fill="#1e1e2a">Probate Code §15201 · Restatement Trusts §78</text>
    <text x="600" y="632" font-family="'Inter', sans-serif" font-size="12" fill="#6b6f7c">Strate 1 (formation) cassée par Altman le 12 mai · §78 effondré</text>

    <line x1="600" y1="652" x2="1120" y2="652" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="600" y="672" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">QUESTION 2B — UNJUST ENRICHMENT</text>
    <text x="600" y="694" font-family="'Fraunces', serif" font-size="14" font-weight="500" fill="#1e1e2a">Quantum borné par Schizer 7 mai · « a lot more than 200 B$ »</text>
    <text x="600" y="712" font-family="'Inter', sans-serif" font-size="12" fill="#6b6f7c">Microsoft via <tspan font-style="italic">Casey</tspan> — désamorcé par Scott le 13 mai (Hoffman)</text>

    <line x1="600" y1="724" x2="1120" y2="724" stroke="rgba(184,88,46,0.55)" stroke-width="1"/>

    <text x="600" y="744" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">→ PHASE REMEDIES · 18 MAI · JUGE SEULE · SANS JURY</text>
  </g>

  <!-- =================== CALLOUT BAS — LE PARI DU CONTINUING VIOLATION =================== -->
  <g>
    <rect x="60" y="776" width="1080" height="118" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="776" width="6" height="118" fill="#b8582e"/>
    <text x="92" y="802" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">CE QUE MOLO DOIT PLAIDER LUNDI · LA DOCTRINE DU « CONTINUING VIOLATION »</text>
    <text x="92" y="828" font-family="'Fraunces', serif" font-size="16" font-style="italic" font-weight="500" fill="#faf6ec">La structure héritée des fonds Musk <tspan fill="#b8582e">continue</tspan> à dériver de la fiducie originelle — donc le manquement est <tspan fill="#b8582e">continu</tspan>,</text>
    <text x="92" y="848" font-family="'Fraunces', serif" font-size="16" font-style="italic" font-weight="500" fill="#faf6ec">la prescription <tspan fill="#9a9ca5">n'a pas commencé à courir</tspan>. C'est une distinction d'avocat de fiscalité, pas de juré moyen.</text>
    <text x="92" y="874" font-family="'Inter', sans-serif" font-size="12.5" fill="#9a9ca5">Le <tspan font-style="italic">jury charge</tspan> verrouillé jeudi pose une question binaire : <tspan font-weight="500" fill="#faf6ec">« les dons Musk ont-ils été dépensés avant le 5 août 2021 ? »</tspan> — Dudney a dit oui. La cross Molo n'a pas démonté le chiffrage.</text>
  </g>

  <text x="60" y="924" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">SOURCES · TECHCRUNCH (14 MAI 2026) · SEMAFOR (15 MAI 2026) · MIT TECH REVIEW WEEK 3 (15 MAI 2026) · CCP §§338, 340, 343 · FED. R. CIV. P. 50(A) · ALIXPARTNERS</text>
</svg>
