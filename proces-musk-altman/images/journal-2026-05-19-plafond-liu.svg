<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1020" role="img" aria-label="Le plafond Liu — la cascade doctrinale qui compresse la disgorgement de 200 Md$ à 20-40 Md$, et la règle de restitution aux victimes qui en sort Musk">
  <defs>
    <marker id="jArr0519" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArr0519Dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9ca5"/>
    </marker>
    <pattern id="hatch0519" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#9a9ca5" stroke-width="0.8"/>
    </pattern>
    <pattern id="strike0519" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#b8582e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="1020" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-19 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">Le <tspan font-style="italic" fill="#b8582e">plafond Liu</tspan>.</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">La cascade doctrinale qui compresse la demande Molo de 200 Md$+ à 20-40 Md$. <tspan font-weight="500" fill="#1e1e2a">Et la règle de restitution aux victimes qui sort Musk de l'équation, même en cas de victoire.</tspan></text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <g class="branch" data-modal-id="demande-molo-0519" tabindex="0" role="button" aria-label="La demande Molo en ouverture remedies du 18 mai">
    <rect x="60" y="194" width="1080" height="156" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.4"/>
    <rect x="60" y="194" width="1080" height="34" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="222" width="1080" height="6" fill="#1e1e2a"/>
    <text x="80" y="217" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">DEMANDE MOLO · LUNDI 18 MAI 14H30 PT · OUVERTURE REMEDIES</text>
    <text x="1120" y="217" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4" text-anchor="end">LECTURE MAXIMALISTE</text>

    <text x="80" y="260" font-family="'Fraunces', serif" font-size="22" font-weight="500" fill="#1e1e2a">→ Disgorgement complète · <tspan fill="#b8582e">« more than 200 B$ »</tspan> <tspan font-size="14" fill="#6b6f7c" font-style="italic">(borne haute Schizer, 7 mai)</tspan></text>
    <text x="80" y="290" font-family="'Fraunces', serif" font-size="22" font-weight="500" fill="#1e1e2a">→ Révocation <tspan font-style="italic">d'</tspan>Altman et Brockman <tspan font-size="14" fill="#6b6f7c" font-style="italic">(Cal. Corp. Code §5233)</tspan></text>
    <text x="80" y="320" font-family="'Fraunces', serif" font-size="22" font-weight="500" fill="#1e1e2a">→ <tspan font-style="italic">Unwinding</tspan> de la recap PBC d'octobre 2025 <tspan font-size="14" fill="#6b6f7c" font-style="italic">(retour à la structure non-profit)</tspan></text>
  </g>

  <line x1="280" y1="350" x2="280" y2="408" stroke="#b8582e" stroke-width="1.6" marker-end="url(#jArr0519)"/>
  <text x="300" y="382" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">CAP 1 · LIU v. SEC, 591 U.S. 71 (2020)</text>
  <text x="300" y="400" font-family="'Inter', sans-serif" font-size="12.5" font-style="italic" fill="#3b3f4d">Cour suprême, 8-1, Sotomayor J. · disgorgement ≤ net profits.</text>

  <g class="branch" data-modal-id="cap-liu-0519" tabindex="0" role="button" aria-label="Le plafond Liu — net profits seulement">
    <rect x="60" y="418" width="1080" height="220" rx="6" fill="#ffffff" stroke="#b8582e" stroke-width="1.6"/>
    <rect x="60" y="418" width="1080" height="34" rx="6" fill="#b8582e"/>
    <rect x="60" y="446" width="1080" height="6" fill="#b8582e"/>
    <text x="80" y="441" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">APRÈS LE CAP LIU · NET PROFITS ONLY</text>
    <text x="1120" y="441" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#faf6ec" letter-spacing="1.4" text-anchor="end">DOCTRINE FÉDÉRALE</text>

    <text x="80" y="478" font-family="'Fraunces', serif" font-size="16" font-style="italic" fill="#1e1e2a">« The equitable remedy of disgorgement is limited to a defendant's <tspan font-weight="500">net profits</tspan> »</text>
    <text x="80" y="498" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">— Sotomayor J., <tspan font-style="italic">Liu v. SEC</tspan>, 591 U.S. 71, 78 (2020). Gross revenue − legitimate expenses.</text>

    <line x1="80" y1="514" x2="1120" y2="514" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>

    <text x="80" y="538" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">L'ARITHMÉTIQUE — PARTENARIAT OPENAI × MICROSOFT</text>

    <text x="80" y="562" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ Gross revenue Microsoft (Wetter, 13 mai) · <tspan font-weight="500">100 Md$+ cumulés d'ici juin 2026</tspan></text>
    <text x="80" y="582" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ <tspan font-style="italic" fill="#b8582e">moins</tspan> cost of capital · WACC ~12-15 % sur 13 Md$ initial puis 100 Md$ cumulés</text>
    <text x="80" y="602" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ <tspan font-style="italic" fill="#b8582e">moins</tspan> infrastructure compute · datacenters, GPUs, énergie, refroidissement</text>
    <text x="80" y="622" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">→ <tspan font-style="italic" fill="#b8582e">moins</tspan> intégration produit + R&amp;D parallèle Microsoft IA propriétaire</text>

    <rect x="780" y="540" width="340" height="90" rx="4" fill="#faf6ec" stroke="#b8582e" stroke-width="1.4"/>
    <text x="800" y="562" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">NET PROFITS Liu-CONFORMES</text>
    <text x="800" y="592" font-family="'Fraunces', serif" font-size="26" font-weight="500" fill="#1e1e2a">≈ <tspan fill="#b8582e">20 – 40 Md$</tspan></text>
    <text x="800" y="616" font-family="'Inter', sans-serif" font-size="11" font-style="italic" fill="#6b6f7c">estimation MG · fourchette éditoriale</text>
  </g>

  <line x1="280" y1="638" x2="280" y2="696" stroke="#b8582e" stroke-width="1.6" marker-end="url(#jArr0519)"/>
  <text x="300" y="670" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">CAP 2 · PLAFOND BONTA (ACCORD OCT. 2025)</text>
  <text x="300" y="688" font-family="'Inter', sans-serif" font-size="12.5" font-style="italic" fill="#3b3f4d">cf. journal du 17 mai · pas d'<tspan font-style="italic">unwinding</tspan> sans révision AG.</text>

  <g class="branch" data-modal-id="palette-finale-0519" tabindex="0" role="button" aria-label="La palette finale — la juge en équité après les deux caps">
    <rect x="60" y="706" width="660" height="220" rx="6" fill="url(#hatch0519)" stroke="#b8582e" stroke-width="1.6" stroke-dasharray="6 4"/>
    <rect x="60" y="706" width="660" height="34" rx="6" fill="#b8582e"/>
    <rect x="60" y="734" width="660" height="6" fill="#b8582e"/>
    <text x="80" y="729" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">PALETTE FINALE · LA JUGE EN ÉQUITÉ</text>

    <text x="80" y="768" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">✓ <tspan font-weight="500">Disgorgement</tspan> · plafond Liu · <tspan fill="#b8582e" font-weight="500">20 – 40 Md$ max</tspan></text>
    <text x="80" y="790" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">✓ <tspan font-weight="500">Révocation</tspan> Altman + Brockman · si §5233 self-dealing retenu</text>
    <text x="80" y="812" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">✓ <tspan font-weight="500">Gouvernance renforcée</tspan> · Foundation Board étendu, reporting trim.</text>
    <text x="80" y="834" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">✓ Mission lock-in durci dans le charter PBC</text>

    <line x1="80" y1="852" x2="700" y2="852" stroke="rgba(184,88,46,0.45)" stroke-width="1"/>

    <text x="80" y="876" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">✗ <tspan font-style="italic">Unwinding</tspan> PBC · <tspan fill="#b8582e">refusé par plafond Bonta</tspan></text>
    <text x="80" y="898" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">✗ Disgorgement &gt; 40 Md$ · <tspan fill="#b8582e">refusée par plafond Liu</tspan></text>
  </g>

  <g class="branch" data-modal-id="victims-rule-0519" tabindex="0" role="button" aria-label="La règle de restitution aux victimes — Liu prong 2">
    <rect x="740" y="706" width="400" height="220" rx="6" fill="#1e1e2a" stroke="#b8582e" stroke-width="1.6"/>
    <rect x="740" y="706" width="400" height="34" rx="6" fill="#b8582e"/>
    <rect x="740" y="734" width="400" height="6" fill="#b8582e"/>
    <text x="760" y="729" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">LE TWIST · LIU PRONG 2</text>

    <text x="760" y="768" font-family="'Fraunces', serif" font-size="16" font-style="italic" font-weight="500" fill="#faf6ec">« must be awarded for victims »</text>
    <text x="760" y="788" font-family="'Inter', sans-serif" font-size="11.5" fill="#9a9ca5">— <tspan font-style="italic">Liu v. SEC</tspan>, 591 U.S. à 84.</text>

    <text x="760" y="818" font-family="'Inter', sans-serif" font-size="12.5" fill="#faf6ec">Dans un <tspan font-style="italic">charitable trust</tspan>, les <tspan font-weight="500" fill="#b8582e">victims</tspan>,</text>
    <text x="760" y="836" font-family="'Inter', sans-serif" font-size="12.5" fill="#faf6ec">ce sont les <tspan font-weight="500">beneficiaries</tspan> du <tspan font-style="italic">charitable</tspan></text>
    <text x="760" y="854" font-family="'Inter', sans-serif" font-size="12.5" fill="#faf6ec"><tspan font-style="italic">purpose</tspan> — pas les donateurs historiques.</text>

    <text x="760" y="884" font-family="'Inter', sans-serif" font-size="12.5" font-weight="500" fill="#b8582e">⟶ La disgorgement, si accordée,</text>
    <text x="760" y="902" font-family="'Inter', sans-serif" font-size="12.5" font-weight="500" fill="#b8582e">revient à la <tspan font-style="italic">charitable purpose</tspan>.</text>
    <text x="760" y="918" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#9a9ca5">Musk personnellement : zéro. xAI : zéro.</text>
  </g>

  <text x="60" y="980" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">SOURCES · LIU v. SEC, 591 U.S. 71 (2020) · BLOOMBERG LAW (18 MAI) · WETTER SOUS SERMENT (13 MAI) · SCHIZER SOUS SERMENT (7 MAI) · ACCORD AG BONTA/JENNINGS (OCT. 2025)</text>
</svg>
