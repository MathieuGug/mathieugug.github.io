<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-label="Carte des acteurs du procès Musk v. Altman">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="50" y="50" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="1.2">SCHÉMA 03 · CASTING SOUS SERMENT</text>
  <text x="50" y="84" class="display" font-size="24" font-weight="600" fill="#1A1A1A" letter-spacing="-0.3">Acteurs et témoins du procès</text>
  <text x="50" y="108" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Plaignants · défendeurs · témoins · arbitres</text>
  <line x1="50" y1="128" x2="850" y2="128" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Court arbiter (center top) -->
  <g class="interactive" data-card="judge-rogers" tabindex="0" role="button" aria-label="Juge Yvonne Gonzalez Rogers">
    <rect x="320" y="160" width="260" height="80" rx="3" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="335" y="186" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" letter-spacing="0.5">JUGE FÉDÉRAL · N.D. CAL.</text>
    <text x="335" y="210" class="display" font-size="17" font-weight="600" fill="#FAF8F3">Yvonne Gonzalez Rogers</text>
    <text x="335" y="230" class="body" font-size="12" fill="#FAF8F3" font-style="italic">Tranche seule sur les remèdes</text>
  </g>

  <!-- PLAINTIFFS (left column) -->
  <text x="50" y="290" class="body" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.8">PLAIGNANTS</text>
  <line x1="50" y1="298" x2="200" y2="298" stroke="#B7332C" stroke-width="1"/>

  <g class="interactive" data-card="elon-musk" tabindex="0" role="button" aria-label="Elon Musk, plaignant principal">
    <rect x="50" y="310" width="260" height="68" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1.25"/>
    <text x="65" y="335" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Elon Musk</text>
    <text x="65" y="355" class="body" font-size="11" fill="#5A5A5A">Cofondateur (2015-2018) · 38 M$ donnés</text>
    <text x="65" y="370" class="body" font-size="11" fill="#5A5A5A">CEO Tesla, SpaceX, xAI</text>
  </g>

  <g class="interactive" data-card="xai-corp" tabindex="0" role="button" aria-label="xAI Corporation, co-plaignant">
    <rect x="50" y="390" width="260" height="58" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="65" y="412" class="display" font-size="14" font-weight="600" fill="#1A1A1A">xAI Corp.</text>
    <text x="65" y="430" class="body" font-size="11" fill="#5A5A5A">Co-plaignant · concurrent direct d'OpenAI</text>
  </g>

  <!-- DEFENDANTS (right column) -->
  <text x="590" y="290" class="body" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.8">DÉFENDEURS</text>
  <line x1="590" y1="298" x2="850" y2="298" stroke="#1F5560" stroke-width="1"/>

  <g class="interactive" data-card="sam-altman" tabindex="0" role="button" aria-label="Sam Altman, CEO d'OpenAI">
    <rect x="590" y="310" width="260" height="68" rx="3" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.25"/>
    <text x="605" y="335" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Sam Altman</text>
    <text x="605" y="355" class="body" font-size="11" fill="#5A5A5A">CEO OpenAI · ex-président YC</text>
    <text x="605" y="370" class="body" font-size="11" fill="#5A5A5A">Patrimoine déclaré ~3 G$</text>
  </g>

  <g class="interactive" data-card="greg-brockman" tabindex="0" role="button" aria-label="Greg Brockman, président d'OpenAI">
    <rect x="590" y="390" width="260" height="58" rx="3" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.25"/>
    <text x="605" y="412" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Greg Brockman</text>
    <text x="605" y="430" class="body" font-size="11" fill="#5A5A5A">Président OpenAI · journal intime décisif</text>
  </g>

  <g class="interactive" data-card="openai-foundation" tabindex="0" role="button" aria-label="OpenAI Foundation et OpenAI Group PBC">
    <rect x="590" y="460" width="260" height="58" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="605" y="482" class="display" font-size="14" font-weight="600" fill="#1A1A1A">OpenAI Group PBC</text>
    <text x="605" y="500" class="body" font-size="11" fill="#5A5A5A">+ OpenAI Foundation (26 % du PBC)</text>
  </g>

  <g class="interactive" data-card="microsoft" tabindex="0" role="button" aria-label="Microsoft, défendeur pour aiding-and-abetting">
    <rect x="590" y="530" width="260" height="58" rx="3" fill="#B58A2C" fill-opacity="0.12" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="605" y="552" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Microsoft</text>
    <text x="605" y="570" class="body" font-size="11" fill="#5A5A5A">Aiding &amp; abetting · 27 % du PBC (~135 G$)</text>
  </g>

  <!-- WITNESSES (center bottom) -->
  <text x="50" y="630" class="body" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.8">TÉMOINS-CLÉS · LIVE OU PAR DÉPOSITION</text>
  <line x1="50" y1="638" x2="850" y2="638" stroke="#5A5A5A" stroke-width="1"/>

  <g class="interactive" data-card="satya-nadella" tabindex="0" role="button" aria-label="Satya Nadella, CEO de Microsoft">
    <rect x="50" y="650" width="190" height="60" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="65" y="672" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Satya Nadella</text>
    <text x="65" y="690" class="body" font-size="10" fill="#5A5A5A">CEO Microsoft</text>
    <text x="65" y="703" class="body" font-size="10" fill="#5A5A5A" font-style="italic">Témoin du Blip Nov-2023</text>
  </g>

  <g class="interactive" data-card="ilya-sutskever" tabindex="0" role="button" aria-label="Ilya Sutskever, ex-chef scientifique">
    <rect x="255" y="650" width="190" height="60" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="270" y="672" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Ilya Sutskever</text>
    <text x="270" y="690" class="body" font-size="10" fill="#5A5A5A">Cofondateur, ex-chief scientist</text>
    <text x="270" y="703" class="body" font-size="10" fill="#5A5A5A" font-style="italic">« Ilya Memos »</text>
  </g>

  <g class="interactive" data-card="mira-murati" tabindex="0" role="button" aria-label="Mira Murati, ex-CTO d'OpenAI">
    <rect x="460" y="650" width="190" height="60" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="475" y="672" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Mira Murati</text>
    <text x="475" y="690" class="body" font-size="10" fill="#5A5A5A">Ex-CTO · CEO Thinking Machines</text>
    <text x="475" y="703" class="body" font-size="10" fill="#5A5A5A" font-style="italic">Période Blip + post-Blip</text>
  </g>

  <g class="interactive" data-card="shivon-zilis" tabindex="0" role="button" aria-label="Shivon Zilis, ex-board OpenAI">
    <rect x="665" y="650" width="190" height="60" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="680" y="672" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Shivon Zilis</text>
    <text x="680" y="690" class="body" font-size="10" fill="#5A5A5A">Ex-board OpenAI · Neuralink</text>
    <text x="680" y="703" class="body" font-size="10" fill="#5A5A5A" font-style="italic">Décisions du board 2017-2018</text>
  </g>

  <g class="interactive" data-card="helen-toner" tabindex="0" role="button" aria-label="Helen Toner, ex-board OpenAI">
    <rect x="50" y="730" width="190" height="60" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="65" y="752" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Helen Toner</text>
    <text x="65" y="770" class="body" font-size="10" fill="#5A5A5A">Ex-board · Georgetown CSET</text>
    <text x="65" y="783" class="body" font-size="10" fill="#5A5A5A" font-style="italic">Témoin du licenciement</text>
  </g>

  <g class="interactive" data-card="bret-taylor" tabindex="0" role="button" aria-label="Bret Taylor, président board OpenAI">
    <rect x="255" y="730" width="190" height="60" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="270" y="752" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Bret Taylor</text>
    <text x="270" y="770" class="body" font-size="10" fill="#5A5A5A">Chair OpenAI Group PBC</text>
    <text x="270" y="783" class="body" font-size="10" fill="#5A5A5A" font-style="italic">Architecte recapitalisation</text>
  </g>

  <g class="interactive" data-card="stuart-russell" tabindex="0" role="button" aria-label="Stuart Russell, expert AI safety">
    <rect x="460" y="730" width="190" height="60" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1"/>
    <text x="475" y="752" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Stuart Russell</text>
    <text x="475" y="770" class="body" font-size="10" fill="#5A5A5A">Expert · UC Berkeley</text>
    <text x="475" y="783" class="body" font-size="10" fill="#5A5A5A" font-style="italic">Témoin expert AGI safety</text>
  </g>

  <g class="interactive" data-card="paul-wazzan" tabindex="0" role="button" aria-label="Paul Wazzan, expert dommages">
    <rect x="665" y="730" width="190" height="60" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1"/>
    <text x="680" y="752" class="body" font-size="13" font-weight="600" fill="#1A1A1A">C. Paul Wazzan</text>
    <text x="680" y="770" class="body" font-size="10" fill="#5A5A5A">Expert dommages Musk</text>
    <text x="680" y="783" class="body" font-size="10" fill="#5A5A5A" font-style="italic">Disgorgement 65,5–109 G$</text>
  </g>

  <!-- Connecting lines (visual hierarchy) -->
  <line x1="310" y1="344" x2="430" y2="344" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="345" y="338" class="body" font-size="11" font-style="italic" fill="#1A1A1A">v.</text>
  <line x1="430" y1="344" x2="590" y2="344" stroke="#1A1A1A" stroke-width="1.25"/>

  <line x1="450" y1="240" x2="450" y2="270" stroke="#5A5A5A" stroke-width="0.5"/>
  <line x1="50" y1="270" x2="850" y2="270" stroke="#5A5A5A" stroke-width="0.5"/>

  <!-- Footer -->
  <line x1="50" y1="820" x2="850" y2="820" stroke="#E5E1D8" stroke-width="1"/>
  <text x="50" y="842" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Liste de témoins (Doc. 431, Cas 4:24-cv-04722, fév. 2026) ; SF Standard ; The Ringer ; Bay City News.</text>
  <text x="50" y="858" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : pointillés = entité morale ou témoin au statut conditionnel ; orange/jaune = experts ; rouge = plaignants ; sarcelle = défendeurs ; gris = autres témoins.</text>
</svg>
