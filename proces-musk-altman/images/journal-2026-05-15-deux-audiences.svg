<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" role="img" aria-label="Deux audiences, deux closings — Molo plaide le jury, Savitt plaide la juge, et Musk était en Chine — closings du 14 mai 2026">
  <defs>
    <marker id="jArrow0515" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArrow0515Dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9ca5"/>
    </marker>
    <pattern id="hatchEmpty0515" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#9a9ca5" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="880" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-15 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">Deux audiences, <tspan font-style="italic" fill="#b8582e">deux closings</tspan>.</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Closings du 14 mai 2026. <tspan font-weight="500" fill="#1e1e2a">Molo a plaidé le jury — Savitt et Eddy ont plaidé la juge. Et le siège du plaignant était vide.</tspan></text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <!-- =============================== SALLE D'AUDIENCE — SCHÉMA EN T =============================== -->
  <text x="60" y="200" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">SALLE D'AUDIENCE · OAKLAND · COURTROOM 1 · 14 MAI 2026 · 9H00 PT</text>

  <!-- ============== JUDGE BENCH (en haut, centré) ============== -->
  <g class="branch" data-modal-id="judge-0515" tabindex="0" role="button" aria-label="La juge Gonzalez Rogers — destinataire de la doctrine">
    <rect x="430" y="222" width="340" height="78" rx="6" fill="#1e1e2a" stroke="#b8582e" stroke-width="2"/>
    <rect x="430" y="222" width="6" height="78" fill="#b8582e"/>
    <text x="460" y="247" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">JUGE · DÉCISION CONTRAIGNANTE</text>
    <text x="460" y="270" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#faf6ec">Hon. Yvonne <tspan font-style="italic" fill="#b8582e">Gonzalez Rogers</tspan></text>
    <text x="460" y="289" font-family="'Inter', sans-serif" font-size="11.5" fill="#9a9ca5">Findings of fact · Conclusions of law · Remedies — sans jury</text>
  </g>

  <!-- ============== JURY BOX (en haut à gauche) ============== -->
  <g class="branch" data-modal-id="jury-0515" tabindex="0" role="button" aria-label="Le jury advisory — 6 femmes, 3 hommes">
    <rect x="60" y="222" width="340" height="78" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="60" y="222" width="6" height="78" fill="#3b3f4d"/>
    <text x="86" y="247" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">JURY · ADVISORY (NON CONTRAIGNANT)</text>
    <text x="86" y="270" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">9 jurés <tspan fill="#6b6f7c">·</tspan> <tspan font-style="italic">6 femmes, 3 hommes</tspan></text>
    <text x="86" y="289" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">Verdict <em>« very likely »</em> suivi par la juge sur la liability</text>
  </g>

  <!-- ============== PLAINTIFF SEAT (en haut à droite, vide) ============== -->
  <g class="branch" data-modal-id="empty-seat-0515" tabindex="0" role="button" aria-label="Le siège du plaignant — vide, Musk en Chine">
    <rect x="800" y="222" width="340" height="78" rx="6" fill="url(#hatchEmpty0515)" stroke="#9a9ca5" stroke-width="1.4" stroke-dasharray="6 4"/>
    <text x="826" y="247" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#9a9ca5" letter-spacing="1.6">PLAINTIFF · SIÈGE VIDE</text>
    <text x="826" y="270" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#3b3f4d">Elon <tspan font-style="italic">Musk</tspan> — <tspan font-family="'JetBrains Mono', monospace" font-size="13" fill="#9a9ca5">EN CHINE AVEC TRUMP</tspan></text>
    <text x="826" y="289" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">Recall status depuis le 30 avril · « You are not excused »</text>
  </g>

  <!-- =============================== DEUX COLONNES — CLOSINGS =============================== -->
  <text x="60" y="346" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">DEUX CLOSINGS · UNE STRATÉGIE PAR CAMP</text>

  <!-- =========== COLONNE GAUCHE — MOLO PLAIDE LE JURY =========== -->
  <g>
    <rect x="60" y="362" width="520" height="362" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="60" y="362" width="520" height="34" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="390" width="520" height="6" fill="#1e1e2a"/>
    <text x="80" y="385" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">CLOSING MOLO · CHARACTER PLAY</text>
    <text x="560" y="385" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#faf6ec" letter-spacing="1.4" text-anchor="end">→ JURY</text>

    <text x="80" y="424" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">LE THÈSE-ANCRE</text>
    <text x="80" y="446" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#1e1e2a">« Liar's a very powerful word in a courtroom. »</text>
    <text x="80" y="468" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Cinq témoins, sous serment, qualifient Altman de menteur.</text>

    <line x1="80" y1="488" x2="560" y2="488" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="80" y="510" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">LES CINQ TÉMOINS</text>
    <text x="80" y="530" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">1 · Elon <tspan font-weight="500">Musk</tspan> · 2 · Ilya <tspan font-weight="500">Sutskever</tspan> · 3 · Mira <tspan font-weight="500">Murati</tspan></text>
    <text x="80" y="548" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">4 · Helen <tspan font-weight="500">Toner</tspan> · 5 · Tasha <tspan font-weight="500">McCauley</tspan></text>

    <line x1="80" y1="568" x2="560" y2="568" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="80" y="590" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">LE SYLLOGISME PROPOSÉ AU JURY</text>
    <text x="80" y="610" font-family="'Inter', sans-serif" font-size="12.5" font-weight="500" fill="#1e1e2a">« Sam Altman's credibility is directly at issue. </text>
    <text x="80" y="628" font-family="'Inter', sans-serif" font-size="12.5" font-weight="500" fill="#1e1e2a">If you don't believe him, they cannot win. »</text>

    <line x1="80" y1="648" x2="560" y2="648" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="80" y="670" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">CE QUI N'A PAS ÉTÉ PLAIDÉ</text>
    <text x="80" y="690" font-family="'Inter', sans-serif" font-size="12" fill="#3b3f4d">— Ni la formation du trust (Strate 1)</text>
    <text x="80" y="708" font-family="'Inter', sans-serif" font-size="12" fill="#3b3f4d">— Ni le §5233 PBC (Strate 2) en frontal</text>
  </g>

  <!-- =========== COLONNE DROITE — SAVITT/EDDY PLAIDENT LA JUGE =========== -->
  <g>
    <rect x="620" y="362" width="520" height="362" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="620" y="362" width="520" height="34" rx="6" fill="#1e1e2a"/>
    <rect x="620" y="390" width="520" height="6" fill="#1e1e2a"/>
    <text x="640" y="385" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">CLOSING SAVITT + EDDY · DOCTRINE PLAY</text>
    <text x="1120" y="385" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#faf6ec" letter-spacing="1.4" text-anchor="end">→ JUGE</text>

    <text x="640" y="424" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">L'OUVERTURE SAVITT</text>
    <text x="640" y="446" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#1e1e2a">« Mr. Musk isn't here today — my clients are here. »</text>
    <text x="640" y="468" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Le siège vide devient pièce probatoire.</text>

    <line x1="640" y1="488" x2="1120" y2="488" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="640" y="510" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">LE CADRAGE DOCTRINAL</text>
    <text x="640" y="530" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a"><tspan font-weight="500">« Selective amnesia »</tspan> — Musk a déclaré sous serment</text>
    <text x="640" y="548" font-family="'Inter', sans-serif" font-size="12.5" fill="#1e1e2a">le 30 avril : <tspan font-style="italic">« I didn't read the fine print »</tspan></text>
    <text x="640" y="566" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">du term sheet OpenAI for-profit du 31 août 2017.</text>

    <line x1="640" y1="586" x2="1120" y2="586" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="640" y="608" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">LE ZINGER EDDY</text>
    <text x="640" y="628" font-family="'Fraunces', serif" font-size="14" font-style="italic" font-weight="500" fill="#1e1e2a">« Even the mother of his children</text>
    <text x="640" y="646" font-family="'Fraunces', serif" font-size="14" font-style="italic" font-weight="500" fill="#1e1e2a">can't back his story. »</text>
    <text x="640" y="664" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">— Sur le témoignage Zilis du 7 mai contre la narration Musk</text>

    <line x1="640" y1="680" x2="1120" y2="680" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="640" y="702" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">CE QUI A ÉTÉ INSTALLÉ</text>
    <text x="640" y="720" font-family="'Inter', sans-serif" font-size="12" fill="#3b3f4d">Chronologie · documents · pas de témoin-héros</text>
  </g>

  <!-- =============== FLÈCHES ARGUMENTAIRES — depuis closings vers audiences =============== -->
  <!-- Molo (gauche) → Jury (haut gauche) -->
  <line x1="230" y1="362" x2="230" y2="304" stroke="#b8582e" stroke-width="1.8" marker-end="url(#jArrow0515)"/>
  <text x="240" y="334" font-family="'JetBrains Mono', monospace" font-size="9" fill="#b8582e" letter-spacing="1.2">CHARACTER</text>

  <!-- Savitt/Eddy (droite) → Judge (haut milieu) -->
  <line x1="880" y1="362" x2="600" y2="304" stroke="#b8582e" stroke-width="1.8" marker-end="url(#jArrow0515)"/>
  <text x="700" y="338" font-family="'JetBrains Mono', monospace" font-size="9" fill="#b8582e" letter-spacing="1.2">DOCTRINE</text>

  <!-- Savitt → Empty seat (haut droite), reproche -->
  <line x1="970" y1="362" x2="970" y2="304" stroke="#9a9ca5" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#jArrow0515Dim)"/>
  <text x="980" y="338" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">REPROCHE</text>

  <!-- =============================== LE MISMATCH (bas, encadré) =============================== -->
  <g>
    <rect x="60" y="754" width="1080" height="100" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="754" width="6" height="100" fill="#b8582e"/>
    <text x="92" y="780" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">LE MISMATCH STRATÉGIQUE</text>
    <text x="92" y="806" font-family="'Fraunces', serif" font-size="17" font-style="italic" font-weight="500" fill="#faf6ec">Molo plaide la <tspan fill="#b8582e">crédibilité</tspan> à un jury <tspan fill="#9a9ca5">advisory</tspan>.  Savitt et Eddy plaident la <tspan fill="#b8582e">doctrine</tspan> à la juge <tspan fill="#9a9ca5">qui tranche en équité</tspan>.</text>
    <text x="92" y="832" font-family="'Inter', sans-serif" font-size="13" fill="#9a9ca5">Pour engager Microsoft sous Casey, pour faire tomber la PBC sous §5233, pour ouvrir la disgorgement de 200 Md$+ — il faut la juge. Le jury ne décide rien d'équitable.</text>
  </g>

  <text x="60" y="876" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">SOURCES · CNBC · NBC NEWS · REUTERS / US NEWS · DARING FIREBALL · CBS NEWS · TECHCRUNCH · KQED · 14 MAI 2026</text>
</svg>
