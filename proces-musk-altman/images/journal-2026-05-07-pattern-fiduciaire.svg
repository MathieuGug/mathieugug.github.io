  <text x="60" y="752" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">Sources : Murati video deposition (6 mai 2026, U.S. News / Reuters · Gizmodo · Prism News) · Sutskever deposition (1ᵉʳ oct. 2025, Implicator.ai) · Restatement (Third) of Trusts §78 · Cal. Corp. Code §5233 · OpenAI board statement, 17 nov. 2023</text>
