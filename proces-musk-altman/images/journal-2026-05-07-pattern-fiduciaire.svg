    <text x="92" y="516" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">3 · KWON → MURATI · SLACK · LA TRACE</text>
    <rect x="92" y="528" width="476" height="62" rx="4" fill="rgba(184,88,46,0.10)" stroke="#b8582e" stroke-width="1.5"/>
    <text x="108" y="554" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="500" fill="#1e1e2a">« <tspan fill="#b8582e" font-weight="600">ugh…</tspan> confused where sam got</text>
    <text x="108" y="572" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="500" fill="#1e1e2a">that impression »</text>
    <text x="108" y="585" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6f7c" letter-spacing="0.5">— Jason Kwon, Chief Strategy Officer, ex-General Counsel</text>
