    <rect x="672" y="292" width="436" height="64" rx="4" fill="rgba(184,88,46,0.06)" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <text x="688" y="314" font-family="'Fraunces', serif" font-size="13.5" font-style="italic" fill="#1e1e2a">« Saying one thing to one person and</text>
    <text x="688" y="332" font-family="'Fraunces', serif" font-size="13.5" font-style="italic" fill="#1e1e2a">completely the <tspan font-weight="500" fill="#b8582e">opposite</tspan> to another. »</text>
    <text x="688" y="349" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6f7c" letter-spacing="0.5">— Mira Murati, déposition vidéo, 6 mai 2026</text>

    <!-- Step B: Restatement Third of Trusts §78 -->
    <text x="672" y="382" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">B · TEST · RESTATEMENT (3D) OF TRUSTS §78</text>
    <rect x="672" y="394" width="436" height="78" rx="4" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="688" y="416" font-family="'Inter', sans-serif" font-size="12.5" font-weight="500" fill="#1e1e2a">Devoir de loyauté du <tspan font-style="italic">fiduciary</tspan> :</text>
    <text x="688" y="436" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">(i) ne pas se placer dans une position</text>
    <text x="688" y="452" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">où l'intérêt entre en conflit ;</text>
    <text x="688" y="468" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">(ii) communiquer pleinement et honnêtement.</text>

    <!-- Step C: Cal Corp §5233 -->
    <text x="672" y="498" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">C · CODE · CAL. CORP. CODE §5233</text>
    <rect x="672" y="510" width="436" height="40" rx="4" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="688" y="535" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d"><tspan font-style="italic">Self-dealing</tspan> par directeur de <tspan font-style="italic">public benefit corp</tspan>.</text>

    <!-- Effect arrow -->
    <text x="672" y="578" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">EFFET → FINDING DE FIDUCIARY BREACH</text>
    <text x="672" y="596" font-family="'Inter', sans-serif" font-size="12" font-style="italic" fill="#3b3f4d">qualitatif, applicable au fond — pas un bar binaire.</text>
