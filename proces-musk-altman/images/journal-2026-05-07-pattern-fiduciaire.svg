  <rect width="1200" height="760" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-07 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">Le Slack qui rejuge <tspan font-style="italic" fill="#b8582e">novembre 2023</tspan></text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Une déposition vidéo, un échange Slack contemporain — le pattern qu'aucun board n'avait pu nommer.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <!-- LEFT PANEL : LA SÉQUENCE GPT-4 TURBO -->
  <g>
    <rect x="60" y="170" width="540" height="438" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <rect x="60" y="170" width="6" height="438" fill="#1e1e2a"/>
    <text x="92" y="198" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.6">L'INCIDENT GPT-4 TURBO · FIN 2023</text>
    <text x="92" y="222" font-family="'Fraunces', serif" font-size="19" font-weight="500" fill="#1e1e2a">La chaîne documentaire en trois temps</text>
    <text x="92" y="242" font-family="'Fraunces', serif" font-size="12.5" font-style="italic" fill="#6b6f7c">Murati sous serment, Kwon par Slack — pièces contemporaines.</text>
    <line x1="92" y1="258" x2="568" y2="258" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>

    <!-- Act 1: Altman → Murati -->
    <text x="92" y="282" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">1 · ALTMAN → MURATI · ORAL</text>
    <rect x="92" y="294" width="476" height="58" rx="4" fill="rgba(184,88,46,0.06)" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <text x="108" y="316" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#1e1e2a">« Le service juridique a dit que le </text>
    <text x="108" y="334" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#1e1e2a">Deployment Safety Board <tspan font-weight="500" fill="#b8582e">n'a pas besoin</tspan> de revoir le modèle. »</text>

    <!-- Down arrow -->
    <line x1="330" y1="358" x2="330" y2="382" stroke="#b8582e" stroke-width="1.6" marker-end="url(#jArrow0507)"/>
    <text x="340" y="376" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6f7c" letter-spacing="1.2">VÉRIFICATION MURATI</text>

    <!-- Act 2: Murati → Kwon (Slack) -->
    <text x="92" y="406" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">2 · MURATI → KWON · SLACK DM</text>
    <rect x="92" y="418" width="476" height="44" rx="4" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="108" y="440" font-family="'JetBrains Mono', monospace" font-size="11" fill="#3b3f4d">@jasonkwon — <tspan fill="#1e1e2a">peux-tu confirmer ce que Sam m'a dit ?</tspan></text>
    <text x="108" y="454" font-family="'JetBrains Mono', monospace" font-size="10" fill="#9a9ca5">DSB review nécessaire ou non ?</text>

    <!-- Down arrow -->
    <line x1="330" y1="468" x2="330" y2="492" stroke="#b8582e" stroke-width="1.6" marker-end="url(#jArrow0507)"/>

