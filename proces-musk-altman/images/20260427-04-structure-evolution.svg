<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Évolution de la structure OpenAI 2015-2025">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="1.2">SCHÉMA 04 · TROIS GÉNÉRATIONS DE GOUVERNANCE</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.3">Du nonprofit pur à la PBC sous foundation</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">L'objet du litige : la mutation structurelle d'OpenAI en trois étapes</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Three columns header -->
  <text x="200" y="178" class="display" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">2015 — 2018</text>
  <text x="600" y="178" class="display" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">2019 — sept. 2025</text>
  <text x="1000" y="178" class="display" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">28 octobre 2025 →</text>
  <text x="200" y="198" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">« Pure » 501(c)(3)</text>
  <text x="600" y="198" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">Capped-profit</text>
  <text x="1000" y="198" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">PBC + Foundation</text>

  <!-- Column 1 : 2015-2018 -->
  <g class="interactive" data-card="structure-v1" tabindex="0" role="button" aria-label="Structure 2015-2018 : OpenAI 501(c)(3) pur">
    <rect x="80" y="220" width="240" height="380" rx="3" fill="#1F5560" fill-opacity="0.04" stroke="#1F5560" stroke-width="1.25"/>
    <rect x="120" y="280" width="160" height="80" rx="3" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-width="1.25"/>
    <text x="200" y="312" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">OpenAI Inc.</text>
    <text x="200" y="332" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">Delaware nonprofit</text>
    <text x="200" y="348" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">501(c)(3)</text>
    <text x="200" y="400" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">Mission unique :</text>
    <text x="200" y="418" class="body" font-size="12" font-style="italic" fill="#1A1A1A" text-anchor="middle">« advance digital intelligence</text>
    <text x="200" y="434" class="body" font-size="12" font-style="italic" fill="#1A1A1A" text-anchor="middle">… unconstrained by a need</text>
    <text x="200" y="450" class="body" font-size="12" font-style="italic" fill="#1A1A1A" text-anchor="middle">to generate financial return »</text>
    <text x="200" y="490" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">FINANCEMENT</text>
    <text x="200" y="510" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">137 M$ de dons cumulés</text>
    <text x="200" y="528" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">dont 38 M$ d'Elon Musk</text>
    <text x="200" y="546" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">+ crédits cloud Azure / GCP</text>
    <text x="200" y="580" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Inscrit au Registry of Charitable Trusts CA (2017)</text>
  </g>

  <!-- Arrow column 1 to 2 -->
  <line x1="335" y1="400" x2="465" y2="400" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow3)"/>
  <text x="400" y="390" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Besoin de capital</text>
  <text x="400" y="412" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">~10 G$ pour AGI</text>

  <!-- Column 2 : 2019-2025 sept -->
  <g class="interactive" data-card="structure-v2" tabindex="0" role="button" aria-label="Structure 2019-2025 : capped-profit subsidiary">
    <rect x="480" y="220" width="240" height="380" rx="3" fill="#B58A2C" fill-opacity="0.04" stroke="#B58A2C" stroke-width="1.25"/>
    <rect x="520" y="240" width="160" height="60" rx="3" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-width="1.25"/>
    <text x="600" y="265" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">OpenAI Inc.</text>
    <text x="600" y="283" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">Nonprofit (contrôle 100 %)</text>
    <line x1="600" y1="300" x2="600" y2="335" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow3)"/>
    <rect x="510" y="340" width="180" height="80" rx="3" fill="#B58A2C" fill-opacity="0.20" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="600" y="368" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">OpenAI LP</text>
    <text x="600" y="386" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">Capped-profit LLC</text>
    <text x="600" y="402" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Plafond 100×</text>
    <text x="600" y="450" class="mono" font-size="11" font-weight="600" fill="#B58A2C" text-anchor="middle">FINANCEMENT</text>
    <text x="600" y="470" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Microsoft : 13 G$ (2019-2024)</text>
    <text x="600" y="488" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">+ exclusivité Azure pré-AGI</text>
    <text x="600" y="506" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">+ revenue share post-AGI</text>
    <text x="600" y="540" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Lancement de ChatGPT (nov. 2022)</text>
    <text x="600" y="555" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Tournant commercial à grande échelle</text>
    <text x="600" y="582" class="body" font-size="10" font-style="italic" fill="#B7332C" text-anchor="middle">→ Diary Brockman 2017 : « if a lie »</text>
  </g>

  <!-- Arrow column 2 to 3 -->
  <line x1="735" y1="400" x2="865" y2="400" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow3)"/>
  <text x="800" y="390" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">SoftBank 40 G$</text>
  <text x="800" y="412" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">conditionnel</text>

  <!-- Column 3 : PBC -->
  <g class="interactive" data-card="structure-v3" tabindex="0" role="button" aria-label="Structure post-octobre 2025 : OpenAI Group PBC">
    <rect x="880" y="220" width="240" height="380" rx="3" fill="#B7332C" fill-opacity="0.04" stroke="#B7332C" stroke-width="1.25"/>
    <rect x="920" y="240" width="160" height="60" rx="3" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-width="1.25"/>
    <text x="1000" y="265" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">OpenAI Foundation</text>
    <text x="1000" y="283" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">Nonprofit · contrôle PBC</text>
    <line x1="1000" y1="300" x2="1000" y2="335" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow3)"/>
    <text x="1015" y="320" class="body" font-size="9" font-style="italic" fill="#5A5A5A">26 % equity (~130 G$)</text>
    <rect x="910" y="340" width="180" height="80" rx="3" fill="#B7332C" fill-opacity="0.20" stroke="#B7332C" stroke-width="1.25"/>
    <text x="1000" y="368" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">OpenAI Group PBC</text>
    <text x="1000" y="386" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">Public Benefit Corp.</text>
    <text x="1000" y="402" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Equity « ordinaire »</text>
    <text x="1000" y="450" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">FINANCEMENT &amp; PARTS</text>
    <text x="1000" y="470" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Microsoft : 27 % (~135 G$)</text>
    <text x="1000" y="488" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Foundation : 26 % (~130 G$)</text>
    <text x="1000" y="506" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Autres (employés, inv.) : 47 %</text>
    <text x="1000" y="540" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Approuvé par les AG de CA et DE</text>
    <text x="1000" y="555" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">avec memoranda of understanding</text>
    <text x="1000" y="582" class="body" font-size="10" font-style="italic" fill="#B7332C" text-anchor="middle">→ Cible IPO Q4 2026 (~1 T$)</text>
  </g>

  <!-- Bottom annotation: Musk's claim -->
  <rect x="80" y="635" width="1040" height="80" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="100" y="660" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.5">THÈSE DE MUSK</text>
  <text x="100" y="684" class="body" font-size="13" fill="#1A1A1A">Le passage de la colonne 1 à la colonne 3 — dédicace caritative initiale → equity privée valorisée 265 G$ pour deux blocs (Foundation + Microsoft) — constitue</text>
  <text x="100" y="704" class="body" font-size="13" fill="#1A1A1A">une rupture de la fiducie caritative (charitable trust doctrine) et un enrichissement sans cause au profit d'Altman, Brockman et Microsoft.</text>

  <!-- Footer -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="767" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : OpenAI corporate communications (« Our structure », 28 oct. 2025) ; Microsoft Form 8-K, oct. 2025 ; Empower analysis ; Time, Bloomberg, WSJ.</text>
  <text x="60" y="783" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : la doctrine californienne de la charitable trust impose qu'une fois reçus, les actifs caritatifs soient « irrévocablement dédiés » à la mission charitable initiale.</text>
</svg>
