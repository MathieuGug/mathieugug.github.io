<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="L'enchevêtrement Brockman-Altman et le template fiduciaire">
  <defs>
    <marker id="jArrow0505" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-05 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">Le grand livre de Brockman et le test fiduciaire</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Quatre positions financières personnelles. Deux entrées de journal. Un test en équité.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <g>
    <rect x="60" y="170" width="540" height="298" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <rect x="60" y="170" width="6" height="298" fill="#1e1e2a"/>
    <text x="92" y="198" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.6">FAISCEAU 1 · L'ENCHEVÊTREMENT</text>
    <text x="92" y="226" font-family="'Fraunces', serif" font-size="20" font-weight="500" fill="#1e1e2a">Le grand livre de Brockman</text>
    <text x="92" y="248" font-family="'Fraunces', serif" font-size="13" font-style="italic" fill="#6b6f7c">Quatre positions personnelles. Une coïncidence à chaque fois.</text>

    <line x1="92" y1="266" x2="568" y2="266" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>

    <text x="92" y="290" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">OpenAI · stake direct</text>
    <text x="568" y="290" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#b8582e">≈ 30 Md$</text>
    <text x="92" y="308" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">Révélé sous serment lundi · jamais publié auparavant</text>

    <line x1="92" y1="322" x2="568" y2="322" stroke="rgba(30,30,44,0.06)" stroke-width="1"/>

    <text x="92" y="346" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">Altman · family office personnel</text>
    <text x="568" y="346" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#b8582e">10 M$ (2017)</text>
    <text x="92" y="364" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">« Compensation à côté » · email Birchall : « greater allegiance to Sam »</text>

    <line x1="92" y1="378" x2="568" y2="378" stroke="rgba(30,30,44,0.06)" stroke-width="1"/>

    <text x="92" y="402" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">Cerebras · actions personnelles</text>
    <text x="568" y="402" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#b8582e">IPO · 4 mai 2026</text>
    <text x="92" y="420" font-family="'Inter', sans-serif" font-size="11.5" fill="#6b6f7c">OpenAI annoncé client significatif 2026 sur ses puces</text>

    <line x1="92" y1="434" x2="568" y2="434" stroke="rgba(30,30,44,0.06)" stroke-width="1"/>

    <text x="92" y="458" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">Helion Energy · parts personnelles</text>
    <text x="568" y="458" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#b8582e">$100Ms (Altman)</text>
  </g>

  <g>
    <rect x="640" y="170" width="500" height="298" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <rect x="640" y="170" width="6" height="298" fill="#1e1e2a"/>
    <text x="672" y="198" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.6">FAISCEAU 2 · LE SCIENTER</text>
    <text x="672" y="226" font-family="'Fraunces', serif" font-size="20" font-weight="500" fill="#1e1e2a">Le journal de Brockman</text>
    <text x="672" y="248" font-family="'Fraunces', serif" font-size="13" font-style="italic" fill="#6b6f7c">Discovery · cité par la juge en janv. 2026 pour rejeter le summary judgment.</text>

    <line x1="672" y1="266" x2="1108" y2="266" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>

    <rect x="672" y="282" width="436" height="76" rx="4" fill="rgba(184,88,46,0.06)" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <text x="688" y="304" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL ENTRY · 2017</text>
    <text x="688" y="328" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#1e1e2a">« Engager Musk sur le non-profit alors</text>
    <text x="688" y="346" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#1e1e2a">qu'on planifie la bascule for-profit serait <tspan font-weight="500" fill="#b8582e">a lie</tspan>. »</text>

    <rect x="672" y="372" width="436" height="76" rx="4" fill="rgba(184,88,46,0.06)" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <text x="688" y="394" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL ENTRY · 2017</text>
    <text x="688" y="418" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#1e1e2a">« <tspan font-weight="500" fill="#b8582e">Financially, what will take me to $1B?</tspan> »</text>
    <text x="688" y="438" font-family="'Inter', sans-serif" font-size="11" fill="#6b6f7c">Cité textuellement dans l'order N.D. Cal. de janvier 2026.</text>
  </g>

  <text x="60" y="500" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">LA JONCTION — TEMPLATE FIDUCIAIRE EN ÉQUITÉ CALIFORNIENNE</text>

  <g class="branch" data-modal-id="test-1" tabindex="0" role="button" aria-label="Test 1 — Self-dealing du fiduciary">
    <rect x="60" y="520" width="340" height="138" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="80" y="548" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">TEST 1 · SELF-DEALING</text>
    <text x="80" y="572" class="branch-title" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">Conflit d'intérêts</text>
    <text x="80" y="592" class="branch-title" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">documenté.</text>
    <text x="80" y="616" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Compensation hors-paie par le CEO,</text>
    <text x="80" y="633" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">positions Helion + Cerebras alignées</text>
    <text x="80" y="650" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">avec les transactions OpenAI à venir.</text>
  </g>

  <g class="branch" data-modal-id="test-2" tabindex="0" role="button" aria-label="Test 2 — Scienter (intention déloyale)">
    <rect x="430" y="520" width="340" height="138" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="450" y="548" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">TEST 2 · SCIENTER</text>
    <text x="450" y="572" class="branch-title" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">Intention déloyale</text>
    <text x="450" y="592" class="branch-title" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">documentée.</text>
    <text x="450" y="616" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">« A lie ». Mots du fiduciary lui-même,</text>
    <text x="450" y="633" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">en 2017, sur la promesse non-profit</text>
    <text x="450" y="650" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">faite à Musk au moment du don.</text>
  </g>

  <g class="branch" data-modal-id="test-3" tabindex="0" role="button" aria-label="Test 3 — Risque de redirection charitable">
    <rect x="800" y="520" width="340" height="138" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="820" y="548" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">TEST 3 · REDIRECTION</text>
    <text x="820" y="572" class="branch-title" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">Le risque suffit —</text>
    <text x="820" y="592" class="branch-title" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">pas le quantum.</text>
    <text x="820" y="616" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Conversion 2024-2025 → PBC.</text>
    <text x="820" y="633" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Brockman 30 Md$, Altman comparable.</text>
    <text x="820" y="650" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Le risque de redirection établit la liability.</text>
  </g>

  <text x="60" y="700" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">Source : direct &amp; cross Brockman, trial day 5 (4 mai 2026) · Reuters · CNBC · NBC News · Benzinga · order summary judgment N.D. Cal. 16 janv. 2026</text>
</svg>
