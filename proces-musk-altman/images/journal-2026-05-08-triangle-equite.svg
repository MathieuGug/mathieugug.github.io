  <text x="60" y="752" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">Sources : Toner / McCauley / Schizer (Oakland, 7 mai 2026, NBC Bay Area · Daily Journal · Local News Matters · TechCrunch) · rappel Murati 6 mai · Restatement (3d) of Trusts §78 · Cal. Corp. Code §5233</text>
