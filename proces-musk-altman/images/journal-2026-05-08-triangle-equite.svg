    <text x="478" y="374" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">EMAIL BIRCHALL · 2017</text>
    <rect x="478" y="386" width="252" height="48" rx="4" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="490" y="404" font-family="'JetBrains Mono', monospace" font-size="10" fill="#1e1e2a">« greater allegiance to Sam »</text>
    <text x="490" y="422" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="0.5">family office, 10 M$</text>

    <text x="478" y="458" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">SLACK KWON → MURATI · 2023</text>
    <rect x="478" y="470" width="252" height="62" rx="4" fill="rgba(184,88,46,0.10)" stroke="#b8582e" stroke-width="1.5"/>
    <text x="490" y="490" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#1e1e2a">« <tspan fill="#b8582e" font-weight="600">ugh…</tspan> confused</text>
    <text x="490" y="506" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#1e1e2a">where sam got</text>
    <text x="490" y="522" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#1e1e2a">that impression »</text>

    <text x="478" y="556" font-family="'Fraunces', serif" font-size="12" font-style="italic" fill="#3b3f4d">Trois traces — une</text>
    <text x="478" y="572" font-family="'Fraunces', serif" font-size="12" font-style="italic" fill="#3b3f4d">par strate du dossier.</text>
  </g>

  <!-- Colonne 3 — DOCTRINE -->
  <g>
    <rect x="780" y="178" width="360" height="412" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
