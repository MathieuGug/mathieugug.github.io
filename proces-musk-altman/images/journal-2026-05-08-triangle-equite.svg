    <text x="812" y="290" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">A · CONSTAT EXPERT</text>
    <rect x="812" y="302" width="308" height="58" rx="4" fill="rgba(184,88,46,0.06)" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <text x="826" y="322" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">OpenAI <tspan font-weight="500" fill="#1e1e2a">n'a pas suivi</tspan> les pratiques</text>
    <text x="826" y="338" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">customary du <em>nonprofit</em> :</text>
    <text x="826" y="354" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">contracting, affiliés, indépendance.</text>

