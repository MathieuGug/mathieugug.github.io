    <text x="478" y="290" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL BROCKMAN · 2017</text>
    <rect x="478" y="302" width="252" height="48" rx="4" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="490" y="320" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#1e1e2a">« would be a lie »</text>
