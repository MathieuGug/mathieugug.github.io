  <rect width="1200" height="760" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-08 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">Le <tspan font-style="italic" fill="#b8582e">triangle</tspan> de l'équité se referme</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Témoins, traces, doctrine — la juge dispose au jour 8 des trois strates qu'un finding §78 demande.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <!-- Colonne 1 — TÉMOINS -->
  <g>
    <rect x="60" y="178" width="360" height="412" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <rect x="60" y="178" width="6" height="412" fill="#1e1e2a"/>
    <text x="92" y="206" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.6">STRATE 1 · TÉMOINS</text>
    <text x="92" y="232" font-family="'Fraunces', serif" font-size="19" font-weight="500" fill="#1e1e2a">Trois dépositions vidéo</text>
    <text x="92" y="252" font-family="'Fraunces', serif" font-size="12.5" font-style="italic" fill="#6b6f7c">Le board de novembre 2023 reconstitué.</text>
    <line x1="92" y1="266" x2="400" y2="266" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>

    <text x="92" y="290" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">HELEN TONER · BOARD CHAIR</text>
    <rect x="92" y="302" width="308" height="62" rx="4" fill="rgba(184,88,46,0.06)" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <text x="106" y="322" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">• ChatGPT lancé : board appris</text>
    <text x="106" y="338" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">  par les <tspan font-weight="500" fill="#1e1e2a">réseaux sociaux</tspan></text>
    <text x="106" y="354" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">• DSB : 3 variants annoncés / <tspan font-weight="500" fill="#1e1e2a">1 testé</tspan></text>

    <text x="92" y="388" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">TASHA McCAULEY · BOARD</text>
    <rect x="92" y="400" width="308" height="62" rx="4" fill="rgba(184,88,46,0.06)" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <text x="106" y="421" font-family="'Fraunces', serif" font-size="12.5" font-style="italic" fill="#1e1e2a">« Buckets of concerns. »</text>
    <text x="106" y="438" font-family="'Fraunces', serif" font-size="12.5" font-style="italic" fill="#1e1e2a">« Culture of lying and</text>
    <text x="106" y="454" font-family="'Fraunces', serif" font-size="12.5" font-style="italic" fill="#1e1e2a">culture of deceit. »</text>

    <text x="92" y="488" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">MIRA MURATI · INTERIM CEO</text>
    <rect x="92" y="500" width="308" height="62" rx="4" fill="rgba(184,88,46,0.06)" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <text x="106" y="521" font-family="'Fraunces', serif" font-size="12.5" font-style="italic" fill="#1e1e2a">« Saying one thing to one</text>
    <text x="106" y="538" font-family="'Fraunces', serif" font-size="12.5" font-style="italic" fill="#1e1e2a">person and the <tspan font-weight="500" fill="#b8582e">opposite</tspan> to</text>
    <text x="106" y="554" font-family="'Fraunces', serif" font-size="12.5" font-style="italic" fill="#1e1e2a">another. » <tspan font-style="normal" font-size="10" fill="#6b6f7c">(rappel : 6 mai)</tspan></text>
  </g>

  <!-- Colonne 2 — TRACES -->
  <g>
    <rect x="450" y="178" width="300" height="412" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
