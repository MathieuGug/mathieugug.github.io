    <text x="80" y="708" font-family="'Fraunces', serif" font-size="14" font-style="italic" font-weight="500" fill="#faf6ec">Finding <tspan font-weight="600">§78 · §5233</tspan> désormais <tspan font-style="italic" fill="#faf6ec">disponible</tspan> à la juge.</text>
