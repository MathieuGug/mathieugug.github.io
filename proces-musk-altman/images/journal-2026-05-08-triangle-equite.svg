    <text x="826" y="432" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">valeur cédée <tspan font-weight="500" fill="#1e1e2a">sans évaluation</tspan></text>
    <text x="826" y="448" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">adéquate de la contrepartie.</text>

    <text x="812" y="478" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">C · MAPPING DOCTRINAL</text>
    <rect x="812" y="490" width="308" height="74" rx="4" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="826" y="510" font-family="'Inter', sans-serif" font-size="11.5" font-weight="500" fill="#1e1e2a">Restatement (3d) Trusts <tspan fill="#b8582e">§78</tspan></text>
    <text x="826" y="526" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">→ <em>fiduciary loyalty breach</em></text>
    <text x="826" y="546" font-family="'Inter', sans-serif" font-size="11.5" font-weight="500" fill="#1e1e2a">Cal. Corp. Code <tspan fill="#b8582e">§5233</tspan></text>
    <text x="826" y="562" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d">→ <em>self-dealing</em>, PBC director</text>
