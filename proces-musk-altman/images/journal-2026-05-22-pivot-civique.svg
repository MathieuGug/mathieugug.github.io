<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1020" role="img" aria-label="Le pivot civique — la coalition EyesOnOpenAI dépose vendredi 22 mai 2026 une pétition administrative §12598 au Registrar of Charitable Trusts californien, qui transforme le silence prolongé de l'AG Bonta en délai contraint de 60-90 jours et menace le calendrier secondary Q3 2026 de Wachtell.">
