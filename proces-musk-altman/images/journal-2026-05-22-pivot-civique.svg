  <rect width="1200" height="1020" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-22 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">Le <tspan font-style="italic" fill="#b8582e">pivot civique</tspan>.</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Une pétition administrative §12598 transforme le silence Bonta. <tspan font-weight="500" fill="#1e1e2a">La jurisprudence négative produit son antidote</tspan> — pas en doctrine, pas en presse, mais en arène administrative.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <text x="60" y="200" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">ÉTAGE 1 · LE TIMING · DU VERDICT À LA PÉTITION · 4 JOURS DE COORDINATION CIVILE</text>

  <rect x="60" y="226" width="1080" height="118" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <line x1="120" y1="290" x2="1080" y2="290" stroke="#3b3f4d" stroke-width="1.4"/>

  <circle cx="170" cy="290" r="6" fill="#6b6f7c" stroke="#faf6ec" stroke-width="2"/>
  <text x="170" y="266" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4" text-anchor="middle">06 MAI 2026</text>
  <text x="170" y="316" font-family="'Inter', sans-serif" font-size="11.5" fill="#3b3f4d" text-anchor="middle">Courrier EyesOnOpenAI</text>
  <text x="170" y="332" font-family="'Inter', sans-serif" font-size="10.5" font-style="italic" fill="#6b6f7c" text-anchor="middle">(préparatoire)</text>

  <circle cx="430" cy="290" r="7" fill="#1e1e2a" stroke="#faf6ec" stroke-width="2"/>
  <text x="430" y="266" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.4" text-anchor="middle">18 MAI · 14H27 PT</text>
  <text x="430" y="316" font-family="'Inter', sans-serif" font-size="11.5" font-weight="500" fill="#1e1e2a" text-anchor="middle">Directed verdict · prescription</text>
  <text x="430" y="332" font-family="'Inter', sans-serif" font-size="10.5" font-style="italic" fill="#6b6f7c" text-anchor="middle">(arène judiciaire fermée)</text>

  <circle cx="700" cy="290" r="9" fill="#b8582e" stroke="#faf6ec" stroke-width="2"/>
  <text x="700" y="266" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4" text-anchor="middle">22 MAI · 10H PT</text>
  <text x="700" y="316" font-family="'Inter', sans-serif" font-size="11.5" font-weight="500" fill="#b8582e" text-anchor="middle">Pétition §12598 déposée</text>
  <text x="700" y="332" font-family="'Inter', sans-serif" font-size="10.5" font-style="italic" fill="#b8582e" text-anchor="middle">(arène administrative ouverte)</text>

  <rect x="950" y="282" width="14" height="14" fill="#b8582e" stroke="#faf6ec" stroke-width="2"/>
  <text x="957" y="266" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4" text-anchor="middle">21 JUL - 20 AOÛT</text>
  <text x="957" y="316" font-family="'Inter', sans-serif" font-size="11.5" font-weight="500" fill="#1e1e2a" text-anchor="middle">Délai contraint Bonta</text>
  <text x="957" y="332" font-family="'Inter', sans-serif" font-size="10.5" font-style="italic" fill="#6b6f7c" text-anchor="middle">(60-90 jours · §12598)</text>

  <text x="60" y="384" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">ÉTAGE 2 · LA COALITION · 50+ ONG · ARMÉ EN 16 JOURS · UN INSTRUMENT JAMAIS PLAIDÉ EN PRÉTOIRE</text>

  <g class="branch" data-modal-id="coalition-0522" tabindex="0" role="button" aria-label="La coalition EyesOnOpenAI — 50+ organisations, signataires clés et instrument administratif §12598">
    <rect x="60" y="404" width="510" height="226" rx="6" fill="#ffffff" stroke="#b8582e" stroke-width="1.6"/>
    <rect x="60" y="404" width="510" height="32" rx="6" fill="#b8582e"/>
    <rect x="60" y="430" width="510" height="6" fill="#b8582e"/>
    <text x="80" y="427" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#faf6ec" letter-spacing="1.6">COALITION EYESONOPENAI · SIGNATAIRES CLÉS</text>
    <text x="80" y="460" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">Economic Security Project</tspan> · lead coordinateur</text>
    <text x="80" y="482" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">Public Citizen</tspan> · expertise §12598 (Robert Weissman)</text>
    <text x="80" y="504" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">The Midas Project</tspan> · 501(c)(3) dédiée AI labs</text>
    <text x="80" y="526" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">AI Now Institute</tspan> · doctrine régulatoire</text>
    <text x="80" y="548" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">EPIC</tspan> · Electronic Privacy Information Center</text>
    <text x="80" y="570" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">Lieff Cabraser</tspan> · cabinet pro bono (Lexi Hazam)</text>
    <line x1="80" y1="586" x2="550" y2="586" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
    <text x="80" y="606" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#b8582e">Pétition de 47 pages · brèche capped-profit chiffrée :</text>
    <text x="80" y="623" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#b8582e">≈ 280-340 Md$ à reverser à la non-profit.</text>
  </g>

  <g class="branch" data-modal-id="instrument-0522" tabindex="0" role="button" aria-label="L'instrument §12598 — mécanique du délai contraint, bascule de pouvoir et issues possibles">
    <rect x="590" y="404" width="550" height="226" rx="6" fill="#ffffff" stroke="rgba(184,88,46,0.40)" stroke-width="1.6"/>
    <rect x="590" y="404" width="550" height="32" rx="6" fill="#3b3f4d"/>
    <rect x="590" y="430" width="550" height="6" fill="#3b3f4d"/>
    <text x="610" y="427" class="branch-title" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#faf6ec" letter-spacing="1.6">L'INSTRUMENT · CAL. GOV. CODE §12598</text>
    <text x="610" y="460" font-family="'Fraunces', serif" font-size="15" font-weight="500" fill="#1e1e2a">Du silence discrétionnaire au délai contraint</text>
    <text x="610" y="486" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">→ <tspan font-style="italic">Petition</tspan> par <tspan font-style="italic">interested person</tspan> au Registrar</text>
    <text x="610" y="504" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">  of Charitable Trusts → délai formel <tspan font-weight="500">60-90 jours</tspan></text>
    <text x="610" y="526" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">→ <tspan font-style="italic">Substantive response</tspan> : Bonta prend position</text>
    <text x="610" y="544" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">  publiquement (sortie du silence ratificateur)</text>
    <text x="610" y="566" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">→ <tspan font-style="italic">Constructive denial</tspan> : pas de réponse → ouvre</text>
    <text x="610" y="584" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">  un <tspan font-style="italic">writ of mandate</tspan> en cogestion judiciaire</text>
    <line x1="610" y1="600" x2="1130" y2="600" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>
    <text x="610" y="620" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#3b3f4d">Le silence n'est plus une option. Bonta doit publier sa lecture.</text>
  </g>

  <line x1="315" y1="640" x2="510" y2="700" stroke="#b8582e" stroke-width="2" marker-end="url(#jArr0522)"/>
  <line x1="865" y1="640" x2="690" y2="700" stroke="#6b6f7c" stroke-width="1.4" marker-end="url(#jArr0522Dim)"/>

  <text x="60" y="700" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">ÉTAGE 3 · LA COLLISION · DÉLAI ADMINISTRATIF VS CALENDRIER SECONDARY · LA FENÊTRE QUE WACHTELL N'AVAIT PAS PRÉ-ARMÉE</text>

  <rect x="60" y="724" width="1080" height="226" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <line x1="120" y1="836" x2="1080" y2="836" stroke="#3b3f4d" stroke-width="1.4"/>

  <text x="120" y="758" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">JUIN 2026</text>
  <text x="420" y="758" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">JUILLET 2026</text>
  <text x="720" y="758" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">AOÛT 2026</text>
  <text x="1010" y="758" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">SEPTEMBRE</text>

  <rect x="120" y="776" width="600" height="36" rx="3" fill="url(#silence0522)" stroke="rgba(30,30,44,0.25)" stroke-width="1"/>
  <text x="420" y="800" font-family="'Inter', sans-serif" font-size="12" font-style="italic" fill="#3b3f4d" text-anchor="middle">Période d'instruction Bonta · arsenal §12598 actif</text>

  <rect x="720" y="776" width="200" height="36" rx="3" fill="#b8582e" opacity="0.85"/>
  <text x="820" y="800" font-family="'Inter', sans-serif" font-size="12" font-weight="500" fill="#faf6ec" text-anchor="middle">Réponse Bonta exigée</text>

  <rect x="780" y="852" width="240" height="36" rx="3" fill="url(#collision0522)" stroke="#b8582e" stroke-width="1.4"/>
  <text x="900" y="876" font-family="'Inter', sans-serif" font-size="12" font-weight="500" fill="#1e1e2a" text-anchor="middle">Tender closing Wachtell (cible)</text>

  <line x1="820" y1="816" x2="820" y2="848" stroke="#b8582e" stroke-width="1.4" stroke-dasharray="3 3"/>

  <text x="120" y="912" font-family="'Inter', sans-serif" font-size="12.5" font-style="italic" fill="#3b3f4d">Zone hachurée orange = collision calendaire · le secondary ne peut plus clôturer sans réponse Bonta publiée.</text>
  <text x="120" y="932" font-family="'Inter', sans-serif" font-size="12.5" font-weight="500" fill="#1e1e2a">→ Wachtell doit choisir : repousser à octobre-novembre, ou parier sur un <tspan font-style="italic">constructive denial</tspan> sans suite contentieuse.</text>

  <text x="60" y="990" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">SOURCES · CAL. GOV. CODE §12598 · CAL. CODE REGS. TIT. 11 §§300-310 · ECONOMIC SECURITY PROJECT (EYESONOPENAI) · PUBLIC CITIZEN · MIDAS PROJECT · LIEFF CABRASER</text>
</svg>
