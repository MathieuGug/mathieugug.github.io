<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-label="L'attaque sur la formation du trust — Strate 1 vs Strate 2 après le témoignage Altman du 12 mai 2026">
  <defs>
    <marker id="jArrow0513" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArrow0513Dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9ca5"/>
    </marker>
    <pattern id="hatchOut0513" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#9a9ca5" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="820" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-13 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">L'attaque sur la <tspan font-style="italic" fill="#b8582e">formation</tspan> du trust</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Altman ne défend pas le manquement. Il conteste qu'une fiducie se soit jamais formée. <tspan font-weight="500" fill="#1e1e2a">La moitié des griefs s'effondre ; l'autre, statutaire, survit.</tspan></text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <g>
    <rect x="60" y="182" width="1080" height="118" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="182" width="6" height="118" fill="#b8582e"/>
    <text x="92" y="208" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">MARDI 12 MAI · S. ALTMAN À LA BARRE · DIRECT WILLIAM SAVITT (WACHTELL)</text>
    <text x="92" y="240" font-family="'Fraunces', serif" font-size="21" font-style="italic" font-weight="500" fill="#faf6ec">« There were never any promises made that could <tspan font-weight="600" fill="#b8582e">form the charitable trust</tspan> that Mr. Musk says existed. »</text>
    <text x="92" y="270" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#9a9ca5">« Neither he nor the other founders made any promises to Musk that they would not pursue a for-profit subsidiary in the future. »</text>
    <text x="92" y="290" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#6b6f7c" letter-spacing="1.2">LE VERBE EST « FORM ». PAS « BREACH ». LA STRATE 1 EST CONTESTÉE — PAS LA STRATE 2.</text>
  </g>

  <text x="60" y="338" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">DEUX STRATES DU CHARITABLE TRUST — UNE SEULE EST ATTAQUÉE</text>

  <g>
    <rect x="60" y="354" width="520" height="290" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <rect x="60" y="354" width="520" height="34" rx="6" fill="#1e1e2a"/>
    <rect x="60" y="382" width="520" height="6" fill="#1e1e2a"/>
    <text x="80" y="377" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">STRATE 1 · FORMATION DU TRUST</text>
    <text x="500" y="377" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#faf6ec" letter-spacing="1.4" text-anchor="end">ATTAQUÉE ✕</text>

    <rect x="80" y="406" width="480" height="220" fill="url(#hatchOut0513)" opacity="0.25"/>

    <text x="80" y="424" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">ANCRAGE STATUTAIRE</text>
    <text x="80" y="444" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a"><tspan font-style="italic">Cal. Probate Code</tspan> §15201 — manifestation d'intention</text>
    <text x="80" y="462" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a"><tspan font-style="italic">Restatement (Third) of Trusts</tspan> §2(c) — acceptation du trustee</text>

    <line x1="80" y1="482" x2="560" y2="482" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="80" y="504" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">CONDITION QUE LE TÉMOIGNAGE ATTAQUE</text>
    <text x="80" y="524" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">→ Acceptation par le fiduciaire du caractère charitable</text>
    <text x="80" y="542" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d"> &#160;&#160;&#160;comme contrainte liante envers le settlor</text>

    <line x1="80" y1="562" x2="560" y2="562" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="80" y="584" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">SI LA JUGE RETIENT LE FINDING « NO PROMISE »</text>
    <text x="80" y="604" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">→ Pas de trust formé · pas de fiduciaire au sens §78</text>
    <text x="80" y="622" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d">→ <tspan font-weight="500" fill="#1e1e2a">special interest standing</tspan> de Musk sérieusement érodé</text>
  </g>

  <g>
    <rect x="620" y="354" width="520" height="290" rx="6" fill="#ffffff" stroke="rgba(184,88,46,0.55)" stroke-width="1.4"/>
    <rect x="620" y="354" width="520" height="34" rx="6" fill="#b8582e"/>
    <rect x="620" y="382" width="520" height="6" fill="#b8582e"/>
    <text x="640" y="377" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">STRATE 2 · MANQUEMENT &amp; SELF-DEALING</text>
    <text x="1120" y="377" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.4" text-anchor="end">SURVIT INTACTE ✓</text>

    <text x="640" y="424" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">ANCRAGE STATUTAIRE</text>
    <text x="640" y="444" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a"><tspan font-style="italic">Cal. Corp. Code</tspan> §5233 — self-dealing PBC director</text>
    <text x="640" y="462" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a"><tspan font-style="italic">Restatement (Third) of Trusts</tspan> §78 — loyauté du fiduciaire</text>

    <line x1="640" y1="482" x2="1120" y2="482" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="640" y="504" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">CE QUE LE TÉMOIGNAGE NE TOUCHE PAS</text>
    <text x="640" y="524" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">→ Devoirs des directors d'une <tspan font-style="italic">Public Benefit Corp.</tspan></text>
    <text x="640" y="542" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d"> &#160;&#160;&#160;attachés à la PBC en tant que telle, sans détour</text>
    <text x="640" y="560" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d"> &#160;&#160;&#160;par une promesse antérieure à un settlor privé</text>

    <line x1="640" y1="582" x2="1120" y2="582" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <text x="640" y="604" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">STANDING REQUIS POUR PORTER §5233</text>
    <text x="640" y="624" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#1e1e2a">→ AG de Californie (parens patriae) — pas Musk</text>
  </g>

  <text x="60" y="678" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">LE VERROU MIROIR · UNCLEAN HANDS REFERMÉ PAR LE 90 %</text>

  <g>
    <rect x="60" y="694" width="1080" height="90" rx="6" fill="#faf6ec" stroke="rgba(184,88,46,0.55)" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="84" y="720" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">SOUS SERMENT — CHIFFRE NOUVEAU AU DOSSIER</text>
    <text x="84" y="746" font-family="'Fraunces', serif" font-size="17" font-style="italic" font-weight="500" fill="#1e1e2a">« An early number that Mr Musk threw out was that he should have <tspan font-weight="600" fill="#b8582e">90 percent of the equity</tspan> to start. It then softened, but it always was a <tspan font-weight="600" fill="#b8582e">majority</tspan>. »</text>
    <text x="84" y="770" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Mars cité $80B · Tesla Autopilot off-the-books · Zilis « stay close » · « partly » · term sheet 2018 non lu · <tspan font-weight="500" fill="#1e1e2a">90 % d'équité demandés</tspan> — six actes, même fenêtre 2017-2018. <tspan font-style="italic">Pomeroy</tspan> §397 documentairement irréfutable.</text>
  </g>

  <text x="60" y="810" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">Sources : CNBC · Piedmont Exedra · Al Jazeera · CNN Business · NPR · Fortune (12 mai 2026) · Cal. Prob. Code §15201 · Restatement (Third) of Trusts §§2,78 · Cal. Corp. Code §5233 · Pomeroy's Equity §397</text>
</svg>
