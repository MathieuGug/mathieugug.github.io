  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Cinq heures de délibération, un verdict en deux mots, un <tspan font-style="italic" font-weight="500" fill="#1e1e2a">directed verdict</tspan> en douze minutes. <tspan font-weight="500" fill="#1e1e2a">Le procès meurt sur la prescription — les doctrines de fond rendues moot avant d'être tranchées.</tspan></text>
