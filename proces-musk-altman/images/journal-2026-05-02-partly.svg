<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Schéma du jour : le mot 'partly' et ses trois ondes de choc sur le procès Musk v. Altman">
  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .branch rect { transition: fill 0.2s, stroke-width 0.2s; }
      .branch:hover rect, .branch:focus rect { fill: #b8582e; fill-opacity: 0.10; stroke-width: 1.6; outline: none; }
      .branch:hover .branch-title, .branch:focus .branch-title { fill: #b8582e; }
    </style>
    <marker id="jArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#faf6ec"/>

  <!-- Header -->
  <text x="60" y="56" class="mono" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-02 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">Le mot « partly » et ses trois ondes de choc</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#3b3f4d">Une réponse de cinq secondes en contre-interrogatoire — trois lignes de défaite ouvertes pour la partie demanderesse.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <!-- Center node -->
  <g>
    <circle cx="600" cy="330" r="118" fill="#b8582e" fill-opacity="0.10" stroke="#b8582e" stroke-width="1.4"/>
    <circle cx="600" cy="330" r="92" fill="#faf6ec" stroke="#b8582e" stroke-width="1"/>
    <text x="600" y="308" text-anchor="middle" class="mono" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">JEUDI 30 AVRIL · CROSS</text>
    <text x="600" y="348" text-anchor="middle" class="display" font-size="32" font-style="italic" font-weight="500" fill="#1e1e2a">« Partly. »</text>
    <text x="600" y="376" text-anchor="middle" class="body" font-size="11" fill="#6b6f7c">Musk → Savitt, sur la distillation de modèles OpenAI par xAI</text>
  </g>

  <!-- Arrows -->
  <line x1="600" y1="212" x2="240" y2="522" stroke="#b8582e" stroke-width="1.2" marker-end="url(#jArrow)" stroke-dasharray="0"/>
  <line x1="600" y1="212" x2="600" y2="522" stroke="#b8582e" stroke-width="1.2" marker-end="url(#jArrow)" stroke-dasharray="0"/>
  <line x1="600" y1="212" x2="960" y2="522" stroke="#b8582e" stroke-width="1.2" marker-end="url(#jArrow)" stroke-dasharray="0"/>

  <!-- Branch 1 : récit moral -->
  <g class="branch" tabindex="0" role="button" aria-label="Conséquence 1 : récit moral fragilisé">
    <rect x="80" y="540" width="320" height="138" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="100" y="568" class="mono" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">ONDE 1 · RÉCIT</text>
    <text x="100" y="594" class="branch-title display" font-size="19" font-weight="500" fill="#1e1e2a">Le cadrage moral cède.</text>
    <text x="100" y="618" class="body" font-size="12.5" fill="#3b3f4d">Plus difficile de tenir « OpenAI a trahi</text>
    <text x="100" y="635" class="body" font-size="12.5" fill="#3b3f4d">une fiducie » quand la société du</text>
    <text x="100" y="652" class="body" font-size="12.5" fill="#3b3f4d">demandeur exploite — fût-ce <tspan font-style="italic">partly</tspan> —</text>
    <text x="100" y="669" class="body" font-size="12.5" fill="#3b3f4d">les outputs de la défenderesse.</text>
  </g>

  <!-- Branch 2 : nouveau front juridique -->
  <g class="branch" tabindex="0" role="button" aria-label="Conséquence 2 : nouveau front juridique ouvert">
    <rect x="440" y="540" width="320" height="138" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="460" y="568" class="mono" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">ONDE 2 · CONTRAT</text>
    <text x="460" y="594" class="branch-title display" font-size="19" font-weight="500" fill="#1e1e2a">Une pièce préconstituée.</text>
    <text x="460" y="618" class="body" font-size="12.5" fill="#3b3f4d">Distillation interdite par les CGU</text>
    <text x="460" y="635" class="body" font-size="12.5" fill="#3b3f4d">d'OpenAI. Aveu sous serment au</text>
    <text x="460" y="652" class="body" font-size="12.5" fill="#3b3f4d">dossier — exploitable demain dans</text>
    <text x="460" y="669" class="body" font-size="12.5" fill="#3b3f4d">un autre forum, contre xAI.</text>
  </g>

  <!-- Branch 3 : doctrine AGI -->
  <g class="branch" tabindex="0" role="button" aria-label="Conséquence 3 : doctrine du risque AGI affaiblie">
    <rect x="800" y="540" width="320" height="138" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="820" y="568" class="mono" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">ONDE 3 · AGI</text>
    <text x="820" y="594" class="branch-title display" font-size="19" font-weight="500" fill="#1e1e2a">L'urgence existentielle s'éteint.</text>
    <text x="820" y="618" class="body" font-size="12.5" fill="#3b3f4d">Russell sous périmètre restreint</text>
    <text x="820" y="635" class="body" font-size="12.5" fill="#3b3f4d">lundi. Difficile de plaider l'urgence</text>
    <text x="820" y="652" class="body" font-size="12.5" fill="#3b3f4d">AGI quand sa propre société</text>
    <text x="820" y="669" class="body" font-size="12.5" fill="#3b3f4d">raccourcit ses cycles via distillation.</text>
  </g>

  <!-- Footer caption -->
  <text x="60" y="700" class="mono" font-size="9" fill="#9a9ca5" letter-spacing="1.2">Source : transcripts trial day 4 · TechCrunch · The Information · MIT Technology Review · Semafor · Benzinga (1ᵉʳ mai 2026)</text>
</svg>
