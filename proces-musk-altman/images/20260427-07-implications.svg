<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Matrice des implications selon le verdict">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="1.2">SCHÉMA 07 · MATRICE DES IMPLICATIONS</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.3">Quatre dimensions, deux issues possibles</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Conséquences selon que Musk gagne ou OpenAI gagne — synthèse personnelle</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Matrix grid -->
  <!-- Column headers -->
  <text x="280" y="180" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">DIMENSION</text>
  <rect x="500" y="160" width="300" height="40" rx="3" fill="#B7332C" fill-opacity="0.15" stroke="#B7332C" stroke-width="1.25"/>
  <text x="650" y="186" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">VICTOIRE MUSK (~36 %)</text>
  <rect x="820" y="160" width="300" height="40" rx="3" fill="#1F5560" fill-opacity="0.15" stroke="#1F5560" stroke-width="1.25"/>
  <text x="970" y="186" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">VICTOIRE OPENAI (~64 %)</text>

  <!-- Row 1 : Gouvernance OpenAI -->
  <g class="interactive" data-card="impact-governance" tabindex="0" role="button" aria-label="Impact sur la gouvernance d'OpenAI">
    <rect x="60" y="220" width="1080" height="120" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="80" y="248" class="mono" font-size="11" font-weight="600" fill="#5A5A5A">A · GOUVERNANCE OPENAI</text>
    <text x="80" y="276" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Structure &amp; direction</text>
    <text x="80" y="295" class="body" font-size="11" fill="#5A5A5A">Statut juridique du groupe</text>
    <text x="80" y="312" class="body" font-size="11" fill="#5A5A5A">Équipe dirigeante</text>

    <text x="510" y="276" class="body" font-size="12" fill="#1A1A1A">• Unwind de la PBC (retour au nonprofit)</text>
    <text x="510" y="294" class="body" font-size="12" fill="#1A1A1A">• Éviction d'Altman et Brockman</text>
    <text x="510" y="312" class="body" font-size="12" fill="#1A1A1A">• Disgorgement de leurs equities</text>
    <text x="510" y="328" class="body" font-size="11" font-style="italic" fill="#B7332C">Note : la juge a signalé sa réticence à « unscramble the eggs »</text>

    <text x="830" y="276" class="body" font-size="12" fill="#1A1A1A">• PBC + Foundation maintenue</text>
    <text x="830" y="294" class="body" font-size="12" fill="#1A1A1A">• Altman / Brockman confirmés</text>
    <text x="830" y="312" class="body" font-size="12" fill="#1A1A1A">• Statu quo de la recapitalisation</text>
    <text x="830" y="328" class="body" font-size="11" font-style="italic" fill="#1F5560">Légitimation post-tribunal du modèle PBC</text>
  </g>

  <!-- Row 2 : IPO et capitaux -->
  <g class="interactive" data-card="impact-ipo" tabindex="0" role="button" aria-label="Impact sur l'IPO et la levée de fonds">
    <rect x="60" y="350" width="1080" height="120" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="80" y="378" class="mono" font-size="11" font-weight="600" fill="#5A5A5A">B · CAPITAUX &amp; IPO</text>
    <text x="80" y="406" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Marché privé &amp; cotation</text>
    <text x="80" y="425" class="body" font-size="11" fill="#5A5A5A">IPO Q4 2026 ciblée à ~1 T$</text>
    <text x="80" y="442" class="body" font-size="11" fill="#5A5A5A">Tranches investisseurs</text>

    <text x="510" y="406" class="body" font-size="12" fill="#1A1A1A">• IPO bloquée ou indéfiniment retardée</text>
    <text x="510" y="424" class="body" font-size="12" fill="#1A1A1A">• Tour SoftBank 40 G$ partiellement remis en cause</text>
    <text x="510" y="442" class="body" font-size="12" fill="#1A1A1A">• Microsoft : 135 G$ en valeur potentiellement détruits</text>
    <text x="510" y="458" class="body" font-size="11" font-style="italic" fill="#B7332C">Risque systémique sur les valorisations IA privées</text>

    <text x="830" y="406" class="body" font-size="12" fill="#1A1A1A">• Voie ouverte pour IPO 2026/2027</text>
    <text x="830" y="424" class="body" font-size="12" fill="#1A1A1A">• Disclosure « risque litigation » levé</text>
    <text x="830" y="442" class="body" font-size="12" fill="#1A1A1A">• Précédent rassurant pour Anthropic, xAI…</text>
    <text x="830" y="458" class="body" font-size="11" font-style="italic" fill="#1F5560">Pricing tendant vers la valeur fondamentale</text>
  </g>

  <!-- Row 3 : Jurisprudence -->
  <g class="interactive" data-card="impact-jurisprudence" tabindex="0" role="button" aria-label="Impact sur la jurisprudence des nonprofits">
    <rect x="60" y="480" width="1080" height="120" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="80" y="508" class="mono" font-size="11" font-weight="600" fill="#5A5A5A">C · JURISPRUDENCE CHARITIES</text>
    <text x="80" y="536" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Conversion nonprofit→PBC</text>
    <text x="80" y="555" class="body" font-size="11" fill="#5A5A5A">Standing du donateur</text>
    <text x="80" y="572" class="body" font-size="11" fill="#5A5A5A">Doctrine California / Delaware</text>

    <text x="510" y="536" class="body" font-size="12" fill="#1A1A1A">• Donateurs reconnus avec « special interest »</text>
    <text x="510" y="554" class="body" font-size="12" fill="#1A1A1A">• Conversion PBC freinée pour ttes les charities</text>
    <text x="510" y="572" class="body" font-size="12" fill="#1A1A1A">• Pression sur les AG : surveillance accrue</text>
    <text x="510" y="588" class="body" font-size="11" font-style="italic" fill="#B7332C">Précédent tournant pour la philanthropie tech</text>

    <text x="830" y="536" class="body" font-size="12" fill="#1A1A1A">• Confirmation de l'autorité des AG seuls</text>
    <text x="830" y="554" class="body" font-size="12" fill="#1A1A1A">• Voie balisée pour d'autres conversions</text>
    <text x="830" y="572" class="body" font-size="12" fill="#1A1A1A">• Memoranda of understanding suffisants</text>
    <text x="830" y="588" class="body" font-size="11" font-style="italic" fill="#1F5560">Statu quo réglementaire confirmé</text>
  </g>

  <!-- Row 4 : Compétition AI -->
  <g class="interactive" data-card="impact-competition" tabindex="0" role="button" aria-label="Impact sur la concurrence et la sécurité IA">
    <rect x="60" y="610" width="1080" height="120" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="80" y="638" class="mono" font-size="11" font-weight="600" fill="#5A5A5A">D · ÉCOSYSTÈME IA</text>
    <text x="80" y="666" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Compétition &amp; safety</text>
    <text x="80" y="685" class="body" font-size="11" fill="#5A5A5A">xAI, Anthropic, autres</text>
    <text x="80" y="702" class="body" font-size="11" fill="#5A5A5A">AGI clause Microsoft</text>

    <text x="510" y="666" class="body" font-size="12" fill="#1A1A1A">• Avantage compétitif pour xAI/Grok</text>
    <text x="510" y="684" class="body" font-size="12" fill="#1A1A1A">• Discussion ouverte sur le seuil AGI</text>
    <text x="510" y="702" class="body" font-size="12" fill="#1A1A1A">• Renforcement du discours « AI safety »</text>
    <text x="510" y="718" class="body" font-size="11" font-style="italic" fill="#B7332C">Polarisation du marché autour de la doctrine PBC</text>

    <text x="830" y="666" class="body" font-size="12" fill="#1A1A1A">• Continuité du leadership OpenAI</text>
    <text x="830" y="684" class="body" font-size="12" fill="#1A1A1A">• AGI clause renégociée hors-tribunal</text>
    <text x="830" y="702" class="body" font-size="12" fill="#1A1A1A">• Discours « commercial scale » conforté</text>
    <text x="830" y="718" class="body" font-size="11" font-style="italic" fill="#1F5560">Course aux modèles en mode « business as usual »</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="755" x2="1140" y2="755" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="775" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : analyses Wired, FT, Bloomberg, BeInCrypto, opentools.ai, Brownstone Research ; probabilités Polymarket. Synthèse personnelle.</text>
  <text x="60" y="790" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : « victoire » s'entend ici sur la liability et au moins partiellement sur les remèdes. Une victoire purement symbolique (38 M$) aurait un impact réel limité.</text>
</svg>
