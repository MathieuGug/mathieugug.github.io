<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Entonnoir des griefs : de 26 à 2 claims">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="1.2">SCHÉMA 02 · ENTONNOIR JUDICIAIRE</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.3">Du « kitchen sink » aux deux griefs survivants</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">L'érosion des 26 griefs initiaux entre novembre 2024 et avril 2026</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Étape 1 : 26 griefs -->
  <g class="interactive" data-card="step-26-claims" tabindex="0" role="button" aria-label="Étape 1 — 26 griefs déposés en novembre 2024">
    <rect x="80" y="180" width="1040" height="80" rx="3" fill="#B7332C" fill-opacity="0.12" stroke="#B7332C" stroke-width="1.25"/>
    <text x="100" y="208" class="mono" font-size="11" font-weight="600" fill="#B7332C">NOVEMBRE 2024 · COMPLAINTE AMENDÉE</text>
    <text x="100" y="234" class="display" font-size="20" font-weight="600" fill="#1A1A1A">26 griefs</text>
    <text x="280" y="234" class="body" font-size="13" fill="#1A1A1A">Antitrust · RICO · fraude · rupture de contrat · breach of charitable trust · enrichissement sans cause · publicité mensongère…</text>
    <text x="100" y="252" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Stratégie « kitchen sink » : maximiser les angles d'attaque pour résister à un dismissal.</text>
  </g>

  <!-- Arrow down -->
  <line x1="600" y1="260" x2="600" y2="295" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow2)"/>
  <text x="615" y="282" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Rulings de Gonzalez Rogers (2025)</text>

  <!-- Étape 2 : 4 griefs -->
  <g class="interactive" data-card="step-4-claims" tabindex="0" role="button" aria-label="Étape 2 — 4 griefs après summary judgment de janvier 2026">
    <rect x="180" y="305" width="840" height="80" rx="3" fill="#B58A2C" fill-opacity="0.15" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="200" y="333" class="mono" font-size="11" font-weight="600" fill="#B58A2C">15 JANVIER 2026 · SUMMARY JUDGMENT</text>
    <text x="200" y="359" class="display" font-size="20" font-weight="600" fill="#1A1A1A">4 griefs</text>
    <text x="380" y="359" class="body" font-size="13" fill="#1A1A1A">Fraude · fraude par dissimulation · enrichissement sans cause · rupture de la fiducie caritative</text>
    <text x="200" y="377" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Antitrust, RICO, rupture de contrat, publicité mensongère écartés ; punitive damages exclus le 31 mars 2026.</text>
  </g>

  <!-- Arrow down -->
  <line x1="600" y1="385" x2="600" y2="420" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow2)"/>
  <text x="615" y="407" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Retrait volontaire (vendredi 24 avril 2026)</text>

  <!-- Étape 3 : 2 griefs -->
  <g class="interactive" data-card="step-2-claims" tabindex="0" role="button" aria-label="Étape 3 — 2 griefs en jugement">
    <rect x="320" y="430" width="560" height="100" rx="3" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-width="2"/>
    <text x="340" y="460" class="mono" font-size="11" font-weight="600" fill="#1F5560">25 AVRIL 2026 · STREAMLINING DE LA VEILLE DE PROCÈS</text>
    <text x="340" y="490" class="display" font-size="22" font-weight="600" fill="#1A1A1A">2 griefs jugés</text>
    <text x="500" y="490" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Breach of charitable trust · Unjust enrichment</text>
    <text x="340" y="510" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Musk renonce aux fraudes pour resserrer la narration sur la mission caritative trahie.</text>
  </g>

  <!-- Two pillars -->
  <g class="interactive" data-card="claim-charitable-trust" tabindex="0" role="button" aria-label="Grief 1 — Breach of charitable trust">
    <rect x="160" y="570" width="360" height="170" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="180" y="600" class="mono" font-size="11" font-weight="600" fill="#1F5560">GRIEF 1 · CHARITABLE TRUST</text>
    <text x="180" y="624" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Rupture de la fiducie caritative</text>
    <text x="180" y="654" class="body" font-size="12" fill="#1A1A1A" width="320">Doctrine californienne : les actifs d'une</text>
    <text x="180" y="672" class="body" font-size="12" fill="#1A1A1A">corporation à but exclusivement caritatif</text>
    <text x="180" y="690" class="body" font-size="12" fill="#1A1A1A">sont « irrévocablement dédiés » à la</text>
    <text x="180" y="708" class="body" font-size="12" fill="#1A1A1A">mission. Le glissement vers une PBC</text>
    <text x="180" y="726" class="body" font-size="12" fill="#1A1A1A" font-style="italic">romprait cette dédicace. (4 ans de prescription)</text>
  </g>

  <g class="interactive" data-card="claim-unjust-enrichment" tabindex="0" role="button" aria-label="Grief 2 — Unjust enrichment">
    <rect x="680" y="570" width="360" height="170" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="700" y="600" class="mono" font-size="11" font-weight="600" fill="#1F5560">GRIEF 2 · UNJUST ENRICHMENT</text>
    <text x="700" y="624" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Enrichissement sans cause</text>
    <text x="700" y="654" class="body" font-size="12" fill="#1A1A1A">Altman, Brockman et Microsoft auraient</text>
    <text x="700" y="672" class="body" font-size="12" fill="#1A1A1A">retiré un avantage patrimonial indu de la</text>
    <text x="700" y="690" class="body" font-size="12" fill="#1A1A1A">conversion d'actifs caritatifs en equity</text>
    <text x="700" y="708" class="body" font-size="12" fill="#1A1A1A">commerciale (130 G$ + 135 G$).</text>
    <text x="700" y="726" class="body" font-size="12" fill="#1A1A1A" font-style="italic">Remède recherché : disgorgement.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="755" x2="1140" y2="755" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="775" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : ordres successifs de la juge Yvonne Gonzalez Rogers (4:24-cv-04722, N.D. Cal.) ; analyse Bay City News, Fortune, Reuters, Bloomberg.</text>
  <text x="60" y="790" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : à chaque étape, la juge a écarté des griefs jugés indéfendables ou superflus, jusqu'à la concentration finale sur deux théories de droit californien des charities.</text>
</svg>
