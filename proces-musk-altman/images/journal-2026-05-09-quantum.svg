<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Le quantum prend un chiffre — Schizer pose la borne basse de la disgorgement à $200 Md$ + ‘a lot more’">
  <defs>
    <marker id="jArrow0509" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArrow0509Dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9ca5"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-09 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">Le <tspan font-style="italic" fill="#b8582e">quantum</tspan> prend un chiffre</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Vendredi sans audience. Schizer pose la borne basse de la disgorgement à 200 Md$ + <tspan font-weight="500" fill="#1e1e2a">« a lot more »</tspan>.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <!-- BARÈME — l'échelle dollar -->
  <g>
    <text x="60" y="194" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.6">BARÈME · PART DE LA FONDATION VS VALEURS DE RÉFÉRENCE</text>

    <!-- Axe principal -->
    <line x1="120" y1="270" x2="1080" y2="270" stroke="#1e1e2a" stroke-width="1.6"/>

    <!-- Tick $0 -->
    <line x1="120" y1="266" x2="120" y2="278" stroke="#1e1e2a" stroke-width="1.4"/>
    <text x="120" y="298" font-family="'JetBrains Mono', monospace" font-size="10" fill="#3b3f4d" text-anchor="middle">0</text>

    <!-- Tick $134B / $135B (mergé) — presse Jan + Microsoft stake -->
    <line x1="334" y1="262" x2="334" y2="278" stroke="#3b3f4d" stroke-width="1.4"/>
    <text x="334" y="298" font-family="'JetBrains Mono', monospace" font-size="10" fill="#3b3f4d" text-anchor="middle">134–135 Md$</text>
    <text x="334" y="313" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" text-anchor="middle" letter-spacing="0.5">borne presse · stake MSFT</text>

    <!-- Tick $200B — foundation -->
    <line x1="440" y1="254" x2="440" y2="282" stroke="#b8582e" stroke-width="2.2"/>
    <text x="440" y="298" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" text-anchor="middle">200 Md$</text>
    <text x="440" y="313" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6f7c" text-anchor="middle" letter-spacing="0.5">fondation · part 26 %</text>

    <!-- Tick $500B — OpenAI Group total (recap) -->
    <line x1="920" y1="266" x2="920" y2="278" stroke="#9a9ca5" stroke-width="1.4" stroke-dasharray="3 3"/>
    <text x="920" y="298" font-family="'JetBrains Mono', monospace" font-size="10" fill="#9a9ca5" text-anchor="middle">500 Md$</text>
    <text x="920" y="313" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" text-anchor="middle" letter-spacing="0.5">OpenAI Group · recap oct. 2025</text>

    <!-- Bar $0 → $200B (foundation actuelle) — orange clair -->
    <rect x="120" y="234" width="320" height="20" fill="rgba(184,88,46,0.18)" stroke="rgba(184,88,46,0.40)" stroke-width="1"/>
    <text x="280" y="248" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#1e1e2a" text-anchor="middle">FONDATION AUJOURD'HUI</text>

    <!-- Flèche Schizer "+ a lot more" — sortant du $200B vers la droite -->
    <line x1="455" y1="218" x2="900" y2="218" stroke="#b8582e" stroke-width="2.2" marker-end="url(#jArrow0509)"/>
    <rect x="555" y="200" width="280" height="32" rx="4" fill="#1e1e2a"/>
    <text x="695" y="220" font-family="'Fraunces', serif" font-size="14" font-style="italic" font-weight="500" fill="#faf6ec" text-anchor="middle">« a lot <tspan font-weight="600" fill="#b8582e">more</tspan> than $200 billion »</text>
    <text x="695" y="244" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6f7c" text-anchor="middle" letter-spacing="1.2">D. SCHIZER · 7 MAI 2026 · SOUS SERMENT</text>
  </g>

  <!-- Séparateur -->
  <line x1="60" y1="346" x2="1140" y2="346" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>

  <!-- Deux colonnes : Jackson question / Schizer réponse -->
  <g>
    <!-- Colonne gauche : QUESTION JACKSON -->
    <rect x="60" y="368" width="520" height="208" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <rect x="60" y="368" width="6" height="208" fill="#9a9ca5"/>
    <text x="92" y="394" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">QUESTION JACKSON · MICROSOFT</text>
    <text x="92" y="418" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">Substitut test : <tspan font-style="italic">adéquation au but</tspan></text>

    <rect x="92" y="436" width="468" height="56" rx="4" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="106" y="458" font-family="'Fraunces', serif" font-size="13" font-style="italic" fill="#3b3f4d">« Any aspect of its mission that OpenAI</text>
    <text x="106" y="476" font-family="'Fraunces', serif" font-size="13" font-style="italic" fill="#3b3f4d">cannot pursue because it doesn't have</text>
    <text x="106" y="488" font-family="'Fraunces', serif" font-size="13" font-style="italic" fill="#3b3f4d">enough money? »</text>

    <text x="92" y="520" font-family="'Inter', sans-serif" font-size="12" fill="#3b3f4d">→ déplace le test : la mission peut-elle être poursuivie ?</text>
    <text x="92" y="540" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#9a9ca5"><tspan text-decoration="line-through">≠ Cal. Corp. Code §5233</tspan>  ·  <tspan text-decoration="line-through">≠ Restatement (3d) §78</tspan></text>
    <text x="92" y="560" font-family="'Fraunces', serif" font-size="11" font-style="italic" fill="#9a9ca5">Test non reconnu en équité.</text>

    <!-- Colonne droite : RÉPONSE SCHIZER -->
    <rect x="620" y="368" width="520" height="208" rx="6" fill="#ffffff" stroke="rgba(184,88,46,0.40)" stroke-width="1.4"/>
    <rect x="620" y="368" width="6" height="208" fill="#b8582e"/>
    <text x="652" y="394" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">RÉPONSE SCHIZER · DROIT DES TRUSTS</text>
    <text x="652" y="418" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">Test doctrinal : <tspan font-style="italic">évaluation à la transaction</tspan></text>

    <rect x="652" y="436" width="468" height="56" rx="4" fill="rgba(184,88,46,0.10)" stroke="#b8582e" stroke-width="1.2"/>
    <text x="666" y="458" font-family="'Fraunces', serif" font-size="13" font-style="italic" fill="#1e1e2a">« If the board had fulfilled its</text>
    <text x="666" y="476" font-family="'Fraunces', serif" font-size="13" font-style="italic" fill="#1e1e2a">responsibility, OpenAI could have had</text>
    <text x="666" y="488" font-family="'Fraunces', serif" font-size="13" font-weight="500" fill="#b8582e">more money. »</text>

    <text x="652" y="520" font-family="'Inter', sans-serif" font-size="12" fill="#3b3f4d">→ ramène au droit : la transaction a-t-elle été <tspan font-style="italic">évaluée</tspan> ?</text>
    <text x="652" y="540" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="500" fill="#1e1e2a">✓ Cal. Corp. Code §5233  ·  ✓ Restatement (3d) §78</text>
    <text x="652" y="560" font-family="'Fraunces', serif" font-size="11" font-style="italic" fill="#3b3f4d">Gap → borne basse de la <tspan font-weight="500" fill="#b8582e">disgorgement</tspan>.</text>
  </g>

  <!-- Séparateur -->
  <line x1="60" y1="606" x2="1140" y2="606" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>

  <!-- Bandeau pivot : avant/après 16h30 PT -->
  <g>
    <text x="60" y="630" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">JEUDI 7 MAI · ≈ 16H30 PT · OAKLAND — LE PIVOT</text>

    <rect x="60" y="648" width="500" height="68" rx="6" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="80" y="672" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.4">AVANT</text>
    <text x="80" y="694" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#1e1e2a">Liability — y a-t-il manquement ?</text>
    <text x="80" y="710" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6b6f7c">Triangle équité fermé · 8 jours d'audience</text>

    <line x1="572" y1="682" x2="628" y2="682" stroke="#b8582e" stroke-width="1.8" marker-end="url(#jArrow0509)"/>
    <text x="600" y="672" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6f7c" text-anchor="middle" letter-spacing="1.2">PIVOT</text>

    <rect x="640" y="648" width="500" height="68" rx="6" fill="#1e1e2a" stroke="#1e1e2a" stroke-width="1"/>
    <text x="660" y="672" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">APRÈS</text>
    <text x="660" y="694" font-family="'Fraunces', serif" font-size="15" font-style="italic" font-weight="500" fill="#faf6ec">Quantum — combien la fondation a-t-elle perdu ?</text>
    <text x="660" y="710" font-family="'JetBrains Mono', monospace" font-size="10" fill="#9a9ca5">Borne basse sourcée · sous serment</text>
  </g>

  <text x="60" y="752" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">Sources : The Information (8 mai 2026) · NBC Bay Area (7 mai 2026) · NBC News / Al Jazeera (28 oct. 2025) · Cal. Corp. Code §5233 · Restatement (Third) of Trusts §78</text>
