<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="La doctrine d'OpenAI à deux états — déclaration CAIS 2023 vs motion in limine 2026">
  <defs>
    <marker id="jArrow0504" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-04 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">La doctrine d'OpenAI à deux états</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Une déclaration publique signée en 2023. Une motion judiciaire déposée en 2026. La juge n'arbitre que l'une des deux.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>

  <!-- Panel gauche : déclaration CAIS 2023 -->
  <g>
    <rect x="60" y="180" width="500" height="260" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <rect x="60" y="180" width="6" height="260" fill="#1e1e2a"/>
    <text x="92" y="208" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#1e1e2a" letter-spacing="1.6">ÉTAT 1 · DOCTRINE PUBLIQUE · 30 MAI 2023</text>
    <text x="92" y="234" font-family="'Fraunces', serif" font-size="20" font-weight="500" fill="#1e1e2a">Déclaration du Center for AI Safety</text>
    <text x="92" y="262" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#3b3f4d">« Mitigating the risk of extinction</text>
    <text x="92" y="280" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#3b3f4d">from AI should be a global priority</text>
    <text x="92" y="298" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#3b3f4d">alongside other societal-scale risks</text>
    <text x="92" y="316" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#3b3f4d">such as pandemics and nuclear war. »</text>
    <line x1="92" y1="338" x2="528" y2="338" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>
    <text x="92" y="360" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#6b6f7c" letter-spacing="1.4">CO-SIGNATAIRES · EXTRAITS</text>
    <text x="92" y="384" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a" font-weight="500">Sam Altman <tspan font-weight="300" fill="#3b3f4d">· CEO, OpenAI · défendeur</tspan></text>
    <text x="92" y="402" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a" font-weight="500">Greg Brockman <tspan font-weight="300" fill="#3b3f4d">· Président, OpenAI · témoin attendu</tspan></text>
    <text x="92" y="420" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a" font-weight="500">Stuart Russell <tspan font-weight="300" fill="#3b3f4d">· UC Berkeley · témoin de Musk lundi</tspan></text>
  </g>

  <!-- Panel droit : motion in limine 2026 -->
  <g>
    <rect x="640" y="180" width="500" height="260" rx="6" fill="#ffffff" stroke="#b8582e" stroke-width="1.6"/>
    <rect x="640" y="180" width="6" height="260" fill="#b8582e"/>
    <text x="672" y="208" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#b8582e" letter-spacing="1.6">ÉTAT 2 · DOCTRINE JUDICIAIRE · AVR. 2026</text>
    <text x="672" y="234" font-family="'Fraunces', serif" font-size="20" font-weight="500" fill="#1e1e2a">Motion in limine d'OpenAI</text>
    <text x="672" y="262" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#3b3f4d">Demande l'exclusion de Russell.</text>
    <text x="672" y="280" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#3b3f4d">Le qualifie de « prominent AI doomer ».</text>
    <text x="672" y="298" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#3b3f4d">Ses opinions : « dystopian, speculative,</text>
    <text x="672" y="316" font-family="'Fraunces', serif" font-size="14" font-style="italic" fill="#3b3f4d">alarmist ».</text>
    <line x1="672" y1="338" x2="1108" y2="338" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>
    <text x="672" y="360" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#6b6f7c" letter-spacing="1.4">DÉCISION JUGE · 30 AVRIL 2026</text>
    <text x="672" y="384" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">Russell témoigne — mais ne pourra parler</text>
    <text x="672" y="402" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">ni de probabilité d'extinction, ni de</text>
    <text x="672" y="420" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">« catastrophic event » devant le jury.</text>
  </g>

  <!-- Flèche temporelle 2023 -> 2026 (respiration ~15px de chaque côté) -->
  <line x1="575" y1="310" x2="625" y2="310" stroke="#b8582e" stroke-width="2" marker-end="url(#jArrow0504)"/>
  <text x="600" y="296" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#b8582e" letter-spacing="1.4">3 ANS</text>

  <!-- Section lectures -->
  <text x="60" y="490" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">TROIS LECTURES — POURQUOI LA CONTRADICTION TIENT</text>

  <g class="branch" data-modal-id="lecture-1" tabindex="0" role="button" aria-label="Lecture 1 — la défense plaide en équité, pas en cohérence">
    <rect x="60" y="510" width="340" height="138" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="80" y="538" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">LECTURE 1 · DAUBERT</text>
    <text x="80" y="562" class="branch-title" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">La défense plaide en équité,</text>
    <text x="80" y="582" class="branch-title" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">pas en cohérence.</text>
    <text x="80" y="606" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">« Doomer » est un qualificatif Daubert</text>
    <text x="80" y="623" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">— pas une réfutation. Vise FRE 702,</text>
    <text x="80" y="640" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">pas la véracité. La juge a suivi.</text>
  </g>

  <g class="branch" data-modal-id="lecture-2" tabindex="0" role="button" aria-label="Lecture 2 — la signature d'Altman est désormais une pièce">
    <rect x="430" y="510" width="340" height="138" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="450" y="538" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">LECTURE 2 · ESTOPPEL</text>
    <text x="450" y="562" class="branch-title" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">La signature d'Altman est</text>
    <text x="450" y="582" class="branch-title" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">désormais une pièce.</text>
    <text x="450" y="606" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Si Molo l'introduit, c'est un estoppel</text>
    <text x="450" y="623" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">rhétorique. La juge n'aime pas l'AGI</text>
    <text x="450" y="640" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">au prétoire — voie étroite.</text>
  </g>

  <g class="branch" data-modal-id="lecture-3" tabindex="0" role="button" aria-label="Lecture 3 — la doctrine a deux états, la juge n'en arbitre qu'un">
    <rect x="800" y="510" width="340" height="138" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <text x="820" y="538" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#b8582e" letter-spacing="1.4">LECTURE 3 · STRUCTURE</text>
    <text x="820" y="562" class="branch-title" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">Doctrine publique vivante,</text>
    <text x="820" y="582" class="branch-title" font-family="'Fraunces', serif" font-size="17" font-weight="500" fill="#1e1e2a">doctrine judiciaire désavouée.</text>
    <text x="820" y="606" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">La juge filtre une scène. L'autre</text>
    <text x="820" y="623" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">poursuit son cycle commercial.</text>
    <text x="820" y="640" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">Coût : risque réputation, pas procès.</text>
  </g>

  <text x="60" y="700" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">Source : motion in limine OpenAI (avril 2026) · CAIS Statement on AI Risk (30 mai 2023) · pre-trial orders N.D. Cal. · the-decoder · MIT Technology Review</text>
</svg>
