  <rect width="1200" height="1040" fill="#faf6ec"/>

  <text x="60" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#b8582e" letter-spacing="1.4">JOURNAL · 2026-05-20 · SCHÉMA DU JOUR</text>
  <text x="60" y="92" font-family="'Fraunces', serif" font-size="28" font-weight="500" fill="#1e1e2a" letter-spacing="-0.4">La <tspan font-style="italic" fill="#b8582e">jurisprudence négative</tspan>.</text>
  <text x="60" y="118" font-family="'Fraunces', serif" font-size="15" font-style="italic" fill="#3b3f4d">Six doctrines en suspens. <tspan font-weight="500" fill="#1e1e2a">Le procès est mort sans rien décider sur le fond — et c'est ce qui le rend structurellement décisif</tspan> pour Anthropic, xAI et le prochain frontier lab.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
  <text x="60" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">MG</text>

  <!-- ROW 1 — Source du verdict -->
  <rect x="60" y="196" width="1080" height="78" rx="6" fill="#1e1e2a" stroke="#b8582e" stroke-width="1.6"/>
  <rect x="60" y="196" width="1080" height="32" rx="6" fill="#b8582e"/>
  <rect x="60" y="222" width="1080" height="6" fill="#b8582e"/>
  <text x="80" y="219" font-family="'JetBrains Mono', monospace" font-size="10.5" font-weight="600" fill="#faf6ec" letter-spacing="1.6">LUNDI 18 MAI 2026 · 14H27 PT · DIRECTED VERDICT SOUS RULE 50(a)</text>
  <text x="80" y="252" font-family="'Fraunces', serif" font-size="18" font-style="italic" font-weight="500" fill="#faf6ec">«&#8239;Filed too late&#8239;»</text>
  <text x="288" y="252" font-family="'Inter', sans-serif" font-size="14" fill="#faf6ec">— les 3 griefs prescrits. Aucune <tspan font-style="italic">findings of fact and conclusions of law</tspan> en équité ne sera rédigée.</text>

  <!-- Vertical arrow down to "Doctrines en suspens" header -->
  <line x1="600" y1="282" x2="600" y2="318" stroke="#b8582e" stroke-width="2" marker-end="url(#jArr0520)"/>

  <text x="60" y="346" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">SIX DOCTRINES LAISSÉES EN SUSPENS · LE TROU NOIR JURISPRUDENTIEL POST-VERDICT</text>

  <!-- ROW 2 — Three doctrines (left, middle, right) -->
  <!-- Doctrine 1 — Probate §15201 -->
  <rect x="60" y="366" width="350" height="156" rx="6" fill="url(#void0520)" stroke="rgba(30,30,44,0.30)" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="80" y="392" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">DOCTRINE 1 · STRATE 1</text>
  <text x="80" y="416" font-family="'Fraunces', serif" font-size="16" font-weight="500" fill="#1e1e2a">Formation du <tspan font-style="italic">trust</tspan></text>
  <text x="80" y="436" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d"><tspan font-style="italic">Probate Code §15201</tspan></text>
  <text x="80" y="454" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d"><tspan font-style="italic">Restatement (3d) Trusts §2</tspan></text>
  <text x="80" y="482" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Altman 12 mai : « no promise ».</text>
  <text x="80" y="500" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Standard de manifestation pour</text>
  <text x="80" y="514" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">donateur historique : non tranché.</text>

  <!-- Doctrine 2 — §5233 -->
  <rect x="425" y="366" width="350" height="156" rx="6" fill="url(#void0520)" stroke="rgba(30,30,44,0.30)" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="445" y="392" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">DOCTRINE 2 · STRATE 2</text>
  <text x="445" y="416" font-family="'Fraunces', serif" font-size="16" font-weight="500" fill="#1e1e2a"><tspan font-style="italic">Self-dealing</tspan> PBC</text>
  <text x="445" y="436" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d"><tspan font-style="italic">Cal. Corp. Code §5233</tspan></text>
  <text x="445" y="454" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">conversion + <tspan font-style="italic">equity stake</tspan> directeurs</text>
  <text x="445" y="482" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Recap d'oct. 2025 comme</text>
  <text x="445" y="500" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c"><tspan font-style="italic">interested transaction</tspan> :</text>
  <text x="445" y="514" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">jamais examinée.</text>

  <!-- Doctrine 3 — Casey -->
  <rect x="790" y="366" width="350" height="156" rx="6" fill="url(#void0520)" stroke="rgba(30,30,44,0.30)" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="810" y="392" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">DOCTRINE 3 · SAFE HARBOR</text>
  <text x="810" y="416" font-family="'Fraunces', serif" font-size="16" font-weight="500" fill="#1e1e2a"><tspan font-style="italic">Casey v. U.S. Bank</tspan></text>
  <text x="810" y="436" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">étendu aux <tspan font-style="italic">frontier labs</tspan></text>
  <text x="810" y="454" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">partenariats 100 Md$+</text>
  <text x="810" y="482" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Nadella + Scott témoins.</text>
  <text x="810" y="500" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Substantial assistance vs</text>
  <text x="810" y="514" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">infrastructure : zone grise.</text>

  <!-- ROW 3 — Three more doctrines -->
  <!-- Doctrine 4 — Liu -->
  <rect x="60" y="542" width="350" height="156" rx="6" fill="url(#void0520)" stroke="rgba(30,30,44,0.30)" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="80" y="568" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">DOCTRINE 4 · QUANTUM</text>
  <text x="80" y="592" font-family="'Fraunces', serif" font-size="16" font-weight="500" fill="#1e1e2a"><tspan font-style="italic">Liu v. SEC</tspan></text>
  <text x="80" y="612" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">transposé au <tspan font-style="italic">charitable</tspan></text>
  <text x="80" y="630" font-family="'Inter', sans-serif" font-size="12.5" font-style="italic" fill="#3b3f4d">trust civil</text>
  <text x="80" y="658" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Schizer 7 mai : 200 Md$+.</text>
  <text x="80" y="676" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Plafond <tspan font-style="italic">net profits to victims</tspan> :</text>
  <text x="80" y="690" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">jamais arbitré.</text>

  <!-- Doctrine 5 — Parens patriae -->
  <rect x="425" y="542" width="350" height="156" rx="6" fill="url(#void0520)" stroke="rgba(30,30,44,0.30)" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="445" y="568" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">DOCTRINE 5 · STANDING</text>
  <text x="445" y="592" font-family="'Fraunces', serif" font-size="16" font-weight="500" fill="#1e1e2a"><tspan font-style="italic">Parens patriae</tspan> AG</text>
  <text x="445" y="612" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">vs <tspan font-style="italic">special interest</tspan></text>
  <text x="445" y="630" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d"><tspan font-style="italic">Cal. Corp. §5142, §5250</tspan></text>
  <text x="445" y="658" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Bonta silence depuis oct. 2025.</text>
  <text x="445" y="676" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Périmètre de la délégation</text>
  <text x="445" y="690" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">sous réserve : non clarifié.</text>

  <!-- Doctrine 6 — Constructive knowledge -->
  <rect x="790" y="542" width="350" height="156" rx="6" fill="url(#void0520)" stroke="rgba(30,30,44,0.30)" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="810" y="568" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">DOCTRINE 6 · PRESCRIPTION</text>
  <text x="810" y="592" font-family="'Fraunces', serif" font-size="16" font-weight="500" fill="#1e1e2a"><tspan font-style="italic">Constructive knowledge</tspan></text>
  <text x="810" y="612" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d">donateur historique</text>
  <text x="810" y="630" font-family="'Inter', sans-serif" font-size="12.5" fill="#3b3f4d"><tspan font-style="italic">Bedolla v. Logan</tspan> en <tspan font-style="italic">trust</tspan></text>
  <text x="810" y="658" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">Jury <tspan font-style="italic">advisory</tspan> a rejeté</text>
  <text x="810" y="676" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c"><tspan font-style="italic">delayed discovery</tspan> — mais</text>
  <text x="810" y="690" font-family="'Inter', sans-serif" font-size="11.5" font-style="italic" fill="#6b6f7c">pas de <tspan font-style="italic">findings</tspan> écrits.</text>

  <!-- Header for value transfer -->
  <text x="60" y="752" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#3b3f4d" letter-spacing="1.6">EFFET DE PRÉCÉDENT NÉGATIF · LE TRANSFERT DE VALEUR STRUCTUREL POST-VERDICT</text>

  <!-- Two arrows: down-left to "Plaignants futurs", down-right to "Défendeurs futurs" -->
  <!-- Left box: plaignants -->
  <rect x="60" y="780" width="510" height="190" rx="6" fill="#ffffff" stroke="rgba(30,30,44,0.30)" stroke-width="1.2"/>
  <rect x="60" y="780" width="510" height="32" rx="6" fill="#6b6f7c"/>
  <rect x="60" y="806" width="510" height="6" fill="#6b6f7c"/>
  <text x="80" y="803" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#faf6ec" letter-spacing="1.6">↓ FUTURS PLAIGNANTS · VALEUR PERDUE</text>
  <text x="80" y="836" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d">→ Donateurs historiques d'AI labs (FTX trustee, ex-board members)</text>
  <text x="80" y="858" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d">→ Communautés <tspan font-style="italic">charitable beneficiary</tspan> non représentées</text>
  <text x="80" y="880" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d">→ AG d'États où le <tspan font-style="italic">parens patriae</tspan> est sous-financé</text>
  <text x="80" y="902" font-family="'Inter', sans-serif" font-size="13" fill="#3b3f4d">→ <tspan font-style="italic">Plaintiffs' bar</tspan> en équité civile fédérale</text>
  <line x1="80" y1="918" x2="550" y2="918" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>
  <text x="80" y="940" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#3b3f4d">Asymétrie de ressources 1:50 contre Wachtell/S&amp;C/Cravath.</text>
  <text x="80" y="958" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#3b3f4d">Chaque doctrine devra être re-plaidée depuis zéro.</text>

  <!-- Right box: défendeurs -->
  <rect x="590" y="780" width="550" height="190" rx="6" fill="#ffffff" stroke="#b8582e" stroke-width="1.6"/>
  <rect x="590" y="780" width="550" height="32" rx="6" fill="#b8582e"/>
  <rect x="590" y="806" width="550" height="6" fill="#b8582e"/>
  <text x="610" y="803" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#faf6ec" letter-spacing="1.6">↑ FUTURS DÉFENDEURS · VALEUR GAGNÉE</text>
  <text x="610" y="836" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">Anthropic</tspan> · LTBT + Class T stock + PBC structure</text>
  <text x="610" y="858" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">xAI</tspan> · conversion structurelle en PBC sans risque doctrinal</text>
  <text x="610" y="880" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ <tspan font-weight="500">Mistral</tspan> &amp; frontier labs européens à structure mixte</text>
  <text x="610" y="902" font-family="'Inter', sans-serif" font-size="13" fill="#1e1e2a">→ OpenAI · <tspan font-style="italic">secondary</tspan> Q3 2026 + Foundation Board pérennisé</text>
  <line x1="610" y1="918" x2="1130" y2="918" stroke="rgba(184,88,46,0.30)" stroke-width="1"/>
  <text x="610" y="940" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#b8582e">Le doute doctrinal protège l'incumbent — pas le challenger.</text>
  <text x="610" y="958" font-family="'Fraunces', serif" font-size="13" font-style="italic" font-weight="500" fill="#b8582e">Fenêtre de conversion prolongée de 5 à 10 ans.</text>

  <text x="60" y="1010" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9a9ca5" letter-spacing="1.2">SOURCES · F.R.C.P. 50(a) · PROBATE CODE §15201 · CAL. CORP. CODE §§5142, 5233, 5250 · CASEY v. U.S. BANK · LIU v. SEC · BEDOLLA v. LOGAN · ANTHROPIC LTBT GOVERNANCE</text>
