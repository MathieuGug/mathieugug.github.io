<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1040" role="img" aria-label="La jurisprudence négative — six doctrines laissées en suspens à 14h27 PT le 18 mai, et le transfert de valeur structurel qui en résulte pour Anthropic, xAI et les futurs frontier labs.">
  <defs>
    <marker id="jArr0520" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="jArr0520Dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6f7c"/>
    </marker>
    <pattern id="void0520" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#9a9ca5" stroke-width="0.7"/>
    </pattern>
