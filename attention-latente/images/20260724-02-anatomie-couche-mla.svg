<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arrow02" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="70" y="66" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 02</text>
  <text x="70" y="104" class="display" font-size="28" font-weight="600" fill="#1A1A1A">Anatomie d'une couche MLA</text>
  <text x="70" y="134" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Un seul vecteur latent par token est mis en cache ; K et V sont reconstruits à la volée</text>
  <line x1="70" y1="156" x2="1130" y2="156" stroke="#E5E1D8" stroke-width="1"/>

  <!-- input token -->
  <g class="interactive" data-card="down-proj" tabindex="0" role="button" aria-label="Down-projection">
    <rect x="70" y="330" width="150" height="90" rx="4" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="145" y="370" class="body" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">token h_t</text>
    <text x="145" y="392" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">état caché</text>
    <text x="145" y="408" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">dim ≈ 5120</text>
  </g>

  <!-- down projection -->
  <line x1="220" y1="375" x2="290" y2="375" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow02)"/>
  <text x="255" y="365" class="mono" font-size="12" fill="#B7332C" text-anchor="middle">W^DKV</text>
  <g class="interactive" data-card="down-proj" tabindex="0" role="button" aria-label="Down-projection">
    <rect x="308" y="345" width="70" height="60" rx="30" fill="#1F5560" opacity="0.12" stroke="#1F5560" stroke-width="1.25"/>
    <text x="343" y="380" class="body" font-size="13" fill="#1F5560" text-anchor="middle">↓</text>
  </g>

  <!-- latent c_KV cached -->
  <line x1="378" y1="375" x2="448" y2="375" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow02)"/>
  <g class="interactive" data-card="latent-cache" tabindex="0" role="button" aria-label="Latent mis en cache">
    <rect x="466" y="322" width="180" height="106" rx="4" fill="#B7332C" opacity="0.08"/>
    <rect x="466" y="322" width="180" height="106" rx="4" fill="none" stroke="#B7332C" stroke-width="2.5"/>
    <text x="556" y="356" class="body" font-size="16" font-weight="600" fill="#B7332C" text-anchor="middle">c_KV</text>
    <text x="556" y="378" class="mono" font-size="12" fill="#B7332C" text-anchor="middle">d_c = 512</text>
    <text x="556" y="404" class="body" font-size="11.5" fill="#B7332C" text-anchor="middle">seul objet</text>
    <text x="556" y="419" class="body" font-size="11.5" fill="#B7332C" text-anchor="middle">mis en cache</text>
  </g>
  <text x="556" y="300" class="mono" font-size="12" fill="#B7332C" text-anchor="middle" font-weight="600">EN CACHE</text>

  <!-- up projection -->
  <line x1="646" y1="358" x2="716" y2="330" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow02)"/>
  <line x1="646" y1="392" x2="716" y2="420" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow02)"/>
  <text x="690" y="330" class="mono" font-size="12" fill="#5A5A5A">W^UK</text>
  <text x="690" y="440" class="mono" font-size="12" fill="#5A5A5A">W^UV</text>
  <g class="interactive" data-card="up-proj" tabindex="0" role="button" aria-label="Up-projections">
    <rect x="734" y="300" width="150" height="56" rx="4" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="809" y="333" class="body" font-size="15" font-weight="600" fill="#1F5560" text-anchor="middle">clés K</text>
    <rect x="734" y="394" width="150" height="56" rx="4" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="809" y="427" class="body" font-size="15" font-weight="600" fill="#1F5560" text-anchor="middle">valeurs V</text>
  </g>
  <text x="809" y="472" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A" text-anchor="middle">reconstruites à la volée</text>

  <!-- attention -->
  <line x1="884" y1="328" x2="954" y2="360" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow02)"/>
  <line x1="884" y1="422" x2="954" y2="392" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow02)"/>
  <rect x="972" y="336" width="158" height="80" rx="4" fill="#1A1A1A"/>
  <text x="1051" y="372" class="body" font-size="15" font-weight="600" fill="#FAF8F3" text-anchor="middle">attention</text>
  <text x="1051" y="394" class="mono" font-size="11" fill="#B8B5AE" text-anchor="middle">softmax(q·kᵀ)·v</text>

  <!-- query path (top band) -->
  <g class="interactive" data-card="query" tabindex="0" role="button" aria-label="Voie requête">
    <rect x="308" y="210" width="576" height="60" rx="4" fill="#B58A2C" opacity="0.09" stroke="#B58A2C" stroke-width="1.25" stroke-dasharray="2 3"/>
    <text x="596" y="236" class="body" font-size="14" font-weight="600" fill="#B58A2C" text-anchor="middle">voie requête : h_t → W^DQ → c_Q (d = 1536) → W^UQ → q</text>
    <text x="596" y="256" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A" text-anchor="middle">les requêtes sont elles aussi compressées en un latent</text>
  </g>
  <line x1="884" y1="252" x2="1000" y2="330" stroke="#B58A2C" stroke-width="1.4" marker-end="url(#arrow02)" opacity="0.8"/>

  <!-- caption strip bottom -->
  <text x="70" y="560" class="body" font-size="14" fill="#1A1A1A"><tspan font-weight="600">La compression est conjointe :</tspan> un même latent c_KV porte à la fois K et V, là où toute autre méthode les traite séparément.</text>
  <text x="70" y="588" class="body" font-size="14" fill="#5A5A5A">Décompresser K et V à chaque pas semblerait coûteux — mais l'absorption des matrices (schéma 04) rend ce coût nul à l'inférence.</text>

  <!-- Footer -->
  <line x1="70" y1="748" x2="1130" y2="748" stroke="#E5E1D8" stroke-width="1"/>
  <text x="70" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : DeepSeek-V2 (arXiv:2405.04434), §2.1 · dimensions de production DeepSeek-V3.</text>
</svg>
