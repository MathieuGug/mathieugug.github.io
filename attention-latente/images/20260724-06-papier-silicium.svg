<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arrow06" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="70" y="66" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 06</text>
  <text x="70" y="104" class="display" font-size="28" font-weight="600" fill="#1A1A1A">Du papier au silicium</text>
  <text x="70" y="134" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Une architecture d'attention ne vaut que par les kernels qui la servent</text>
  <line x1="70" y1="156" x2="1130" y2="156" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Card 1: DeepSeek-V3 -->
  <g class="interactive" data-card="deepseek-v3" tabindex="0" role="button" aria-label="DeepSeek-V3">
    <rect x="70" y="220" width="230" height="230" rx="4" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="90" y="252" class="mono" font-size="12" fill="#1F5560">MODÈLE</text>
    <text x="90" y="282" class="display" font-size="19" font-weight="600" fill="#1A1A1A">DeepSeek-V3</text>
    <text x="90" y="316" class="body" font-size="13.5" fill="#1A1A1A">671 Md params</text>
    <text x="90" y="338" class="body" font-size="13.5" fill="#1A1A1A">37 Md activés / token</text>
    <line x1="90" y1="352" x2="280" y2="352" stroke="#E5E1D8" stroke-width="1"/>
    <text x="90" y="378" class="mono" font-size="12" fill="#5A5A5A">d_c = 512 · 128 têtes</text>
    <text x="90" y="398" class="mono" font-size="12" fill="#5A5A5A">RoPE découplé d_R = 64</text>
    <text x="90" y="428" class="mono" font-size="13" font-weight="600" fill="#B7332C">576 elts / token / couche</text>
  </g>
  <line x1="300" y1="335" x2="360" y2="335" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow06)"/>

  <!-- Card 2: FlashMLA -->
  <g class="interactive" data-card="flashmla" tabindex="0" role="button" aria-label="FlashMLA">
    <rect x="378" y="220" width="230" height="230" rx="4" fill="#B7332C" opacity="0.05"/>
    <rect x="378" y="220" width="230" height="230" rx="4" fill="none" stroke="#B7332C" stroke-width="1.5"/>
    <text x="398" y="252" class="mono" font-size="12" fill="#B7332C">KERNEL · fév. 2025</text>
    <text x="398" y="282" class="display" font-size="19" font-weight="600" fill="#1A1A1A">FlashMLA</text>
    <text x="398" y="314" class="body" font-size="13.5" fill="#1A1A1A">décodage MLA sur Hopper</text>
    <line x1="398" y1="330" x2="588" y2="330" stroke="#E5E1D8" stroke-width="1"/>
    <text x="398" y="356" class="mono" font-size="13" fill="#B7332C">~3 000 Go/s</text>
    <text x="398" y="374" class="body" font-size="11.5" fill="#5A5A5A">cas memory-bound</text>
    <text x="398" y="402" class="mono" font-size="13" fill="#B7332C">~580 TFLOPS</text>
    <text x="398" y="420" class="body" font-size="11.5" fill="#5A5A5A">cas compute-bound · H800</text>
  </g>
  <line x1="608" y1="335" x2="668" y2="335" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow06)"/>

  <!-- Card 3: paged cache -->
  <g class="interactive" data-card="paged-cache" tabindex="0" role="button" aria-label="Cache paginé">
    <rect x="686" y="220" width="230" height="230" rx="4" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="706" y="252" class="mono" font-size="12" fill="#B58A2C">MÉMOIRE</text>
    <text x="706" y="282" class="display" font-size="19" font-weight="600" fill="#1A1A1A">Cache paginé</text>
    <text x="706" y="314" class="body" font-size="13.5" fill="#1A1A1A">blocs de 64 tokens</text>
    <text x="706" y="336" class="body" font-size="12.5" fill="#5A5A5A">(lignée PagedAttention)</text>
    <!-- mini page grid -->
    <g>
      <rect x="706" y="356" width="26" height="26" rx="2" fill="#B58A2C" opacity="0.5"/>
      <rect x="738" y="356" width="26" height="26" rx="2" fill="#B58A2C" opacity="0.5"/>
      <rect x="770" y="356" width="26" height="26" rx="2" fill="#B58A2C" opacity="0.3"/>
      <rect x="802" y="356" width="26" height="26" rx="2" fill="#B58A2C" opacity="0.3"/>
      <rect x="834" y="356" width="26" height="26" rx="2" fill="#E5E1D8"/>
      <rect x="866" y="356" width="26" height="26" rx="2" fill="#E5E1D8"/>
    </g>
    <text x="706" y="416" class="body" font-size="12.5" fill="#5A5A5A">alloué par pages :</text>
    <text x="706" y="434" class="body" font-size="12.5" fill="#5A5A5A">zéro fragmentation</text>
  </g>

  <!-- arrow down to service band -->
  <line x1="500" y1="450" x2="500" y2="500" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow06)"/>

  <!-- service band -->
  <g class="interactive" data-card="service" tabindex="0" role="button" aria-label="Effet sur le service">
    <rect x="70" y="518" width="1060" height="150" rx="4" fill="#1F5560" opacity="0.06"/>
    <rect x="70" y="518" width="1060" height="150" rx="4" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <text x="90" y="550" class="body" font-size="15" font-weight="600" fill="#1F5560">Effet systémique : un cache 10–20× plus petit desserre trois contraintes à la fois</text>
    <text x="90" y="584" class="body" font-size="13.5" fill="#1A1A1A">• <tspan font-weight="600">Mémoire</tspan> — plus de requêtes concurrentes tiennent en HBM.</text>
    <text x="90" y="610" class="body" font-size="13.5" fill="#1A1A1A">• <tspan font-weight="600">Débit</tspan> — moins d'octets à relire par token généré (decode memory-bound).</text>
    <text x="90" y="636" class="body" font-size="13.5" fill="#1A1A1A">• <tspan font-weight="600">Réseau</tspan> — la désagrégation prefill/decode transfère un latent de 576 éléments, pas un cache plein.</text>
  </g>

  <!-- Footer -->
  <line x1="70" y1="728" x2="1130" y2="728" stroke="#E5E1D8" stroke-width="1"/>
  <text x="70" y="752" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : DeepSeek-V3 Technical Report (arXiv:2412.19437) ; dépôt FlashMLA (github.com/deepseek-ai/FlashMLA), chiffres de lancement fév. 2025.</text>
  <text x="70" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Note : le README FlashMLA affiche depuis des chiffres révisés (≈660 TFLOPS dense, variante Sparse MLA, support B200).</text>
</svg>
