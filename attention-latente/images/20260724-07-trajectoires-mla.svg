<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arrow07" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="70" y="66" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 07</text>
  <text x="70" y="104" class="display" font-size="28" font-weight="600" fill="#1A1A1A">MLA, point de convergence de l'attention 2026</text>
  <text x="70" y="134" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Un attracteur pour l'architecture ouverte — et les tensions qui subsistent</text>
  <line x1="70" y1="156" x2="1130" y2="156" stroke="#E5E1D8" stroke-width="1"/>

  <!-- spokes from center (600,430) -->
  <!-- to sparse (300,290) -->
  <line x1="527" y1="396" x2="392" y2="315" stroke="#1F5560" stroke-width="1.4" marker-end="url(#arrow07)"/>
  <!-- to quant (900,290) -->
  <line x1="673" y1="396" x2="808" y2="315" stroke="#1F5560" stroke-width="1.4" marker-end="url(#arrow07)"/>
  <!-- to conversion (300,570) -->
  <line x1="527" y1="464" x2="392" y2="545" stroke="#1F5560" stroke-width="1.4" marker-end="url(#arrow07)"/>
  <!-- to tensions (900,570) -->
  <line x1="673" y1="464" x2="808" y2="545" stroke="#B7332C" stroke-width="1.4" marker-end="url(#arrow07)"/>

  <!-- center hub MLA -->
  <circle cx="600" cy="430" r="74" fill="#B7332C"/>
  <text x="600" y="424" class="display" font-size="26" font-weight="600" fill="#FAF8F3" text-anchor="middle">MLA</text>
  <text x="600" y="450" class="body" font-size="12" fill="#FAF8F3" text-anchor="middle" opacity="0.9">attention latente</text>

  <!-- node: sparse -->
  <g class="interactive" data-card="sparse" tabindex="0" role="button" aria-label="Co-conception avec la parcimonie">
    <rect x="120" y="248" width="272" height="118" rx="4" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="140" y="278" class="body" font-size="15" font-weight="600" fill="#1F5560">Co-conception × parcimonie</text>
    <text x="140" y="304" class="body" font-size="12.5" fill="#1A1A1A">MLA compresse les canaux (latent),</text>
    <text x="140" y="322" class="body" font-size="12.5" fill="#1A1A1A">la sparse attention compresse les tokens.</text>
    <text x="140" y="348" class="mono" font-size="12" fill="#1F5560">DeepSeek-V3.2 : double parcimonie</text>
  </g>

  <!-- node: quant -->
  <g class="interactive" data-card="quant" tabindex="0" role="button" aria-label="Quantification du latent">
    <rect x="808" y="248" width="272" height="118" rx="4" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="828" y="278" class="body" font-size="15" font-weight="600" fill="#B58A2C">Quantification du latent</text>
    <text x="828" y="304" class="body" font-size="12.5" fill="#1A1A1A">réduire encore un cache déjà petit,</text>
    <text x="828" y="322" class="body" font-size="12.5" fill="#1A1A1A">mais le latent conjoint est fragile —</text>
    <text x="828" y="348" class="mono" font-size="12" fill="#B58A2C">gain non additif, calibration dédiée</text>
  </g>

  <!-- node: conversion -->
  <g class="interactive" data-card="conversion" tabindex="0" role="button" aria-label="Conversion universelle">
    <rect x="120" y="494" width="272" height="118" rx="4" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="140" y="524" class="body" font-size="15" font-weight="600" fill="#1F5560">Conversion universelle</text>
    <text x="140" y="550" class="body" font-size="12.5" fill="#1A1A1A">TransMLA : tout modèle GQA</text>
    <text x="140" y="568" class="body" font-size="12.5" fill="#1A1A1A">convertible en MLA post-hoc.</text>
    <text x="140" y="594" class="mono" font-size="12" fill="#1F5560">Llama / Qwen / Mistral : un vivier</text>
  </g>

  <!-- node: tensions -->
  <g class="interactive" data-card="tensions" tabindex="0" role="button" aria-label="Tensions restantes">
    <rect x="808" y="494" width="272" height="118" rx="4" fill="#B7332C" opacity="0.05"/>
    <rect x="808" y="494" width="272" height="118" rx="4" fill="none" stroke="#B7332C" stroke-width="1.25"/>
    <text x="828" y="524" class="body" font-size="15" font-weight="600" fill="#B7332C">Tensions restantes</text>
    <text x="828" y="550" class="body" font-size="12.5" fill="#1A1A1A">latent unique non partitionnable</text>
    <text x="828" y="568" class="body" font-size="12.5" fill="#1A1A1A">→ friction avec le tensor parallelism ;</text>
    <text x="828" y="594" class="mono" font-size="12" fill="#B7332C">+ complexité d'entraînement, inertie GQA</text>
  </g>

  <!-- caption -->
  <text x="600" y="690" class="body" font-size="14" fill="#1A1A1A" text-anchor="middle"><tspan font-weight="600">Pas une victoire acquise mais un basculement en cours :</tspan> l'adoption dépend moins de la qualité — établie —</text>
  <text x="600" y="712" class="body" font-size="14" fill="#5A5A5A" text-anchor="middle">que de l'inertie de l'écosystème GQA que MLA prétend absorber.</text>

  <!-- Footer -->
  <line x1="70" y1="748" x2="1130" y2="748" stroke="#E5E1D8" stroke-width="1"/>
  <text x="70" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : DeepSeek-V3.2-Exp ; TransMLA (arXiv:2502.07864) ; analyses matérielles de MLA (arXiv:2506.02523). Synthèse de l'auteur.</text>
</svg>
