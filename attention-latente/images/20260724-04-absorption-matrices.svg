<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arrow04" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="70" y="66" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 04</text>
  <text x="70" y="104" class="display" font-size="28" font-weight="600" fill="#1A1A1A">L'absorption des matrices : le surcoût disparaît</text>
  <text x="70" y="134" class="display" font-size="18" font-style="italic" fill="#5A5A5A">À l'inférence, K et V pleins ne sont jamais matérialisés : l'attention opère dans le latent</text>
  <line x1="70" y1="156" x2="1130" y2="156" stroke="#E5E1D8" stroke-width="1"/>

  <!-- TOP band: naive -->
  <text x="70" y="204" class="mono" font-size="12" font-weight="600" fill="#5A5A5A">NAÏF · reconstruire puis calculer  (utile à l'entraînement)</text>
  <rect x="70" y="216" width="1060" height="120" rx="4" fill="#F2EFE7"/>
  <g class="interactive" data-card="latent-compute" tabindex="0" role="button" aria-label="Chemin naïf">
    <rect x="90" y="248" width="120" height="56" rx="4" fill="#B7332C" opacity="0.10" stroke="#B7332C" stroke-width="1.25"/>
    <text x="150" y="281" class="body" font-size="14" font-weight="600" fill="#B7332C" text-anchor="middle">c_KV</text>
  </g>
  <line x1="210" y1="276" x2="278" y2="276" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow04)"/>
  <text x="244" y="266" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">W^UK</text>
  <rect x="296" y="248" width="130" height="56" rx="4" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
  <text x="361" y="281" class="body" font-size="14" fill="#1F5560" text-anchor="middle">K plein</text>
  <line x1="426" y1="276" x2="494" y2="276" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow04)"/>
  <rect x="512" y="248" width="150" height="56" rx="4" fill="#1A1A1A"/>
  <text x="587" y="281" class="body" font-size="14" fill="#FAF8F3" text-anchor="middle">q · kᵀ</text>
  <text x="760" y="272" class="body" font-size="13" fill="#5A5A5A">coûteux : décompresse tout le contexte</text>
  <text x="760" y="292" class="body" font-size="13" fill="#5A5A5A">à chaque pas de décodage.</text>

  <!-- transform arrow -->
  <line x1="600" y1="352" x2="600" y2="392" stroke="#B7332C" stroke-width="2.5" marker-end="url(#arrow04)"/>
  <text x="620" y="380" class="body" font-size="14" font-style="italic" fill="#B7332C">on fusionne les matrices, une fois pour toutes</text>

  <!-- BOTTOM band: absorbed -->
  <text x="70" y="428" class="mono" font-size="12" font-weight="600" fill="#B7332C">ABSORBÉ · calculer dans le latent  (à l'inférence)</text>

  <!-- keys absorption -->
  <g class="interactive" data-card="absorb-keys" tabindex="0" role="button" aria-label="Absorption côté clés">
    <rect x="70" y="444" width="510" height="130" rx="4" fill="#1F5560" opacity="0.06"/>
    <rect x="70" y="444" width="510" height="130" rx="4" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <text x="90" y="474" class="body" font-size="14" font-weight="600" fill="#1F5560">Côté clés</text>
    <text x="90" y="502" class="mono" font-size="13" fill="#1A1A1A">(W^UQ c_Q) · (W^UK c_KV)</text>
    <text x="90" y="524" class="mono" font-size="13" fill="#1A1A1A">= c_Q · [ (W^UQ)ᵀ W^UK ] · c_KV</text>
    <text x="90" y="552" class="body" font-size="12.5" fill="#1F5560">matrice constante → W^UK absorbé dans la requête</text>
  </g>

  <!-- values absorption -->
  <g class="interactive" data-card="absorb-values" tabindex="0" role="button" aria-label="Absorption côté valeurs">
    <rect x="600" y="444" width="530" height="130" rx="4" fill="#B58A2C" opacity="0.07"/>
    <rect x="600" y="444" width="530" height="130" rx="4" fill="none" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="620" y="474" class="body" font-size="14" font-weight="600" fill="#B58A2C">Côté valeurs</text>
    <text x="620" y="502" class="mono" font-size="13" fill="#1A1A1A">v = W^UV c_KV,  sortie = W^O v</text>
    <text x="620" y="524" class="mono" font-size="13" fill="#1A1A1A">→ W^UV absorbé dans W^O</text>
    <text x="620" y="552" class="body" font-size="12.5" fill="#B58A2C">l'attention pondère les latents, la sortie reconstruit</text>
  </g>

  <!-- punchline -->
  <g class="interactive" data-card="cache-is-state" tabindex="0" role="button" aria-label="Le cache est l'état">
    <rect x="70" y="606" width="1060" height="92" rx="4" fill="#B7332C"/>
    <text x="600" y="646" class="display" font-size="22" font-weight="600" fill="#FAF8F3" text-anchor="middle">Le cache latent n'est pas une version comprimée de l'état à décompresser —</text>
    <text x="600" y="678" class="display" font-size="22" font-weight="600" fill="#FAF8F3" text-anchor="middle">il <tspan font-style="italic">est</tspan> l'état sur lequel l'attention opère.</text>
  </g>

  <!-- Footer -->
  <line x1="70" y1="728" x2="1130" y2="728" stroke="#E5E1D8" stroke-width="1"/>
  <text x="70" y="752" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : DeepSeek-V2 (arXiv:2405.04434), §2.1 : « W^UK can be absorbed into W^UQ, and W^UV into W^O ».</text>
  <text x="70" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Note : vLLM et FlashMLA implémentent deux variantes — « naive » (recalcul) et « absorb » (pré-fusion) — selon l'arbitrage calcul ↔ mémoire.</text>
</svg>
