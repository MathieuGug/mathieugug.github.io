<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="70" y="66" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 01</text>
  <text x="70" y="104" class="display" font-size="28" font-weight="600" fill="#1A1A1A">Compresser sans jeter : le cache par token</text>
  <text x="70" y="134" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Éléments de KV-cache par token et par couche — échelle logarithmique (128 têtes, d_h = 128)</text>
  <line x1="70" y1="156" x2="1130" y2="156" stroke="#E5E1D8" stroke-width="1"/>

  <!-- log axis gridlines: 256, 512, 2048, 32768 -->
  <!-- x = 340 + (log10(v) - 2.2) * 266.7 -->
  <g class="mono" font-size="12" fill="#B8B5AE" text-anchor="middle">
    <line x1="395.5" y1="205" x2="395.5" y2="600" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="395.5" y="625">256</text>
    <line x1="475.8" y1="205" x2="475.8" y2="600" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="475.8" y="625">512</text>
    <line x1="636" y1="205" x2="636" y2="600" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="636" y="625">2 048</text>
    <line x1="956" y1="205" x2="956" y2="600" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="956" y="625">32 768</text>
  </g>
  <text x="700" y="655" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle" font-style="italic">← plus petit = moins de mémoire à relire à chaque token</text>

  <!-- Rows: MHA, GQA-8, MLA, GQA-2, MQA. x0 = 340 -->
  <!-- MHA -->
  <g class="interactive" data-card="mha" tabindex="0" role="button" aria-label="MHA — détails">
    <rect x="70" y="212" width="1060" height="58" rx="3" fill="#00000000"/>
    <text x="80" y="248" class="body" font-size="15" font-weight="600" fill="#1A1A1A">MHA</text>
    <text x="80" y="266" class="mono" font-size="11" fill="#5A5A5A">2·n_h·d_h</text>
    <rect x="340" y="222" width="616" height="34" rx="2" fill="#1F5560" opacity="0.85"/>
    <text x="946" y="244" class="mono" font-size="13" fill="#FAF8F3" text-anchor="end">32 768</text>
    <text x="1000" y="244" class="body" font-size="13" fill="#5A5A5A">qualité : réf.</text>
  </g>
  <!-- GQA-8 -->
  <g class="interactive" data-card="gqa" tabindex="0" role="button" aria-label="GQA — détails">
    <rect x="70" y="282" width="1060" height="58" rx="3" fill="#00000000"/>
    <text x="80" y="318" class="body" font-size="15" font-weight="600" fill="#1A1A1A">GQA · 8 groupes</text>
    <text x="80" y="336" class="mono" font-size="11" fill="#5A5A5A">2·n_g·d_h</text>
    <rect x="340" y="292" width="296" height="34" rx="2" fill="#1F5560" opacity="0.6"/>
    <text x="626" y="314" class="mono" font-size="13" fill="#FAF8F3" text-anchor="end">2 048</text>
    <text x="1000" y="314" class="body" font-size="13" fill="#5A5A5A">≤ MHA</text>
  </g>
  <!-- MLA (highlight) -->
  <g class="interactive" data-card="mla" tabindex="0" role="button" aria-label="MLA — détails">
    <rect x="70" y="352" width="1060" height="58" rx="3" fill="#B7332C" opacity="0.06"/>
    <text x="80" y="388" class="body" font-size="15" font-weight="600" fill="#B7332C">MLA</text>
    <text x="80" y="406" class="mono" font-size="11" fill="#B7332C">d_c + d_R = 576</text>
    <rect x="340" y="362" width="149" height="34" rx="2" fill="#B7332C"/>
    <text x="499" y="384" class="mono" font-size="13" fill="#1A1A1A" text-anchor="start"> 576</text>
    <text x="1000" y="384" class="body" font-size="13" font-weight="600" fill="#B7332C">&gt; MHA</text>
  </g>
  <!-- GQA-2 -->
  <g class="interactive" data-card="gqa" tabindex="0" role="button" aria-label="GQA-2 — détails">
    <rect x="70" y="422" width="1060" height="52" rx="3" fill="#00000000"/>
    <text x="80" y="454" class="body" font-size="15" font-weight="600" fill="#1A1A1A">GQA · 2 groupes</text>
    <rect x="340" y="430" width="136" height="30" rx="2" fill="#1F5560" opacity="0.45"/>
    <text x="486" y="451" class="mono" font-size="13" fill="#5A5A5A" text-anchor="start"> 512</text>
    <text x="1000" y="451" class="body" font-size="13" fill="#5A5A5A">−−</text>
  </g>
  <!-- MQA -->
  <g class="interactive" data-card="mqa" tabindex="0" role="button" aria-label="MQA — détails">
    <rect x="70" y="480" width="1060" height="52" rx="3" fill="#00000000"/>
    <text x="80" y="512" class="body" font-size="15" font-weight="600" fill="#1A1A1A">MQA</text>
    <rect x="340" y="488" width="55.5" height="30" rx="2" fill="#B8B5AE"/>
    <text x="405" y="509" class="mono" font-size="13" fill="#5A5A5A" text-anchor="start"> 256</text>
    <text x="1000" y="509" class="body" font-size="13" fill="#5A5A5A">instable</text>
  </g>

  <!-- Annotation -->
  <line x1="489" y1="379" x2="489" y2="690" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="2 3"/>
  <text x="500" y="700" class="body" font-size="13" fill="#1A1A1A">MLA (576) ≈ GQA-2 (512) en <tspan font-weight="600">taille</tspan> — mais en <tspan font-weight="600" fill="#B7332C">qualité</tspan>, MLA dépasse MHA.</text>
  <text x="500" y="722" class="body" font-size="13" fill="#5A5A5A">GQA glisse le long d'un compromis fixe ; MLA déplace la frontière.</text>

  <!-- Footer -->
  <line x1="70" y1="748" x2="1130" y2="748" stroke="#E5E1D8" stroke-width="1"/>
  <text x="70" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : DeepSeek-V2 (arXiv:2405.04434), Table 1 · valeurs pour n_h = 128, d_h = 128, d_c = 512, d_R = 64.</text>
</svg>
