<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arrow05" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#B7332C" stroke-width="1.6"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="70" y="66" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 05</text>
  <text x="70" y="104" class="display" font-size="28" font-weight="600" fill="#1A1A1A">MLA déplace le front de Pareto que GQA ne fait que suivre</text>
  <text x="70" y="134" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Qualité de modélisation en fonction de la mémoire de cache — à budget égal, MLA domine</text>
  <line x1="70" y1="156" x2="1130" y2="156" stroke="#E5E1D8" stroke-width="1"/>

  <!-- axes -->
  <line x1="240" y1="240" x2="240" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="240" y1="620" x2="1060" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="230" y="250" class="body" font-size="13" fill="#5A5A5A" text-anchor="end">qualité ↑</text>
  <text x="1060" y="648" class="body" font-size="13" fill="#5A5A5A" text-anchor="end">mémoire de cache / token →</text>
  <text x="205" y="440" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle" transform="rotate(-90 205 440)">meilleure ← qualité</text>

  <!-- GQA/MHA tradeoff frontier (dashed) -->
  <path d="M 340 540 Q 470 470 593 375 T 954 335" fill="none" stroke="#1F5560" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="820" y="410" class="body" font-size="13" font-style="italic" fill="#1F5560">frontière GQA / MHA</text>
  <text x="820" y="430" class="body" font-size="12" font-style="italic" fill="#5A5A5A">un compromis fixe</text>

  <!-- MLA displaced frontier (carmine) -->
  <g class="interactive" data-card="frontier" tabindex="0" role="button" aria-label="La frontière déplacée">
    <path d="M 330 400 Q 430 320 600 300 T 960 300" fill="none" stroke="#B7332C" stroke-width="2.5"/>
    <rect x="300" y="270" width="360" height="150" fill="#00000000"/>
  </g>
  <text x="330" y="290" class="body" font-size="13" font-style="italic" fill="#B7332C">frontière déplacée par MLA</text>

  <!-- points -->
  <!-- MQA -->
  <g class="interactive" data-card="mqa" tabindex="0" role="button" aria-label="MQA">
    <circle cx="340" cy="540" r="9" fill="#B8B5AE"/>
    <text x="356" y="545" class="body" font-size="13" fill="#5A5A5A">MQA — petit cache, qualité faible, instable</text>
  </g>
  <!-- GQA-2 -->
  <g class="interactive" data-card="gqa-point" tabindex="0" role="button" aria-label="GQA-2">
    <circle cx="430" cy="470" r="9" fill="#1F5560"/>
    <text x="446" y="475" class="body" font-size="13" fill="#1A1A1A">GQA-2</text>
  </g>
  <!-- GQA-8 -->
  <g class="interactive" data-card="gqa-point" tabindex="0" role="button" aria-label="GQA-8">
    <circle cx="593" cy="375" r="9" fill="#1F5560"/>
    <text x="609" y="380" class="body" font-size="13" fill="#1A1A1A">GQA-8 — 2 048 / token</text>
  </g>
  <!-- MHA -->
  <g class="interactive" data-card="mha" tabindex="0" role="button" aria-label="MHA">
    <circle cx="954" cy="335" r="9" fill="#1A1A1A"/>
    <text x="954" y="322" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle">MHA (réf.)</text>
    <text x="954" y="358" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">32 768 / token</text>
  </g>
  <!-- MLA (winner) -->
  <g class="interactive" data-card="mla-point" tabindex="0" role="button" aria-label="MLA">
    <circle cx="429" cy="300" r="12" fill="#B7332C"/>
    <text x="447" y="296" class="body" font-size="15" font-weight="600" fill="#B7332C">MLA — 576 / token</text>
    <text x="447" y="316" class="body" font-size="12.5" fill="#B7332C">petit cache ET qualité &gt; MHA</text>
  </g>

  <!-- TransMLA arrow -->
  <g class="interactive" data-card="transmla" tabindex="0" role="button" aria-label="TransMLA : conversion GQA vers MLA">
    <path d="M 588 372 C 520 350 470 330 441 308" fill="none" stroke="#B7332C" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow05)"/>
    <rect x="470" y="336" width="170" height="24" fill="#FAF8F3" opacity="0.85"/>
    <text x="472" y="353" class="mono" font-size="12" font-weight="600" fill="#B7332C">TransMLA : GQA → MLA</text>
  </g>

  <!-- legend note -->
  <rect x="70" y="656" width="1060" height="60" rx="4" fill="#F2EFE7"/>
  <text x="90" y="684" class="body" font-size="14" fill="#1A1A1A"><tspan font-weight="600">Un latent appris capture plus d'information par octet qu'un partage de têtes structurel.</tspan> GQA impose a priori quelles têtes partagent K/V ;</text>
  <text x="90" y="706" class="body" font-size="14" fill="#5A5A5A">MLA laisse l'entraînement choisir les directions à conserver — la compression est optimisée, pas imposée.</text>

  <!-- Footer -->
  <line x1="70" y1="748" x2="1130" y2="748" stroke="#E5E1D8" stroke-width="1"/>
  <text x="70" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : ablations DeepSeek-V2 (GQA ≤ MHA &lt; MLA) ; TransMLA (arXiv:2502.07864), inclusion GQA ⊂ MLA. Positions schématiques.</text>
</svg>
