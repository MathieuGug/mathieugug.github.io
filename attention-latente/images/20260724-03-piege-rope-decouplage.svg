<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arrow03" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="70" y="66" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 03</text>
  <text x="70" y="104" class="display" font-size="28" font-weight="600" fill="#1A1A1A">Le piège RoPE et la parade du découplage</text>
  <text x="70" y="134" class="display" font-size="18" font-style="italic" fill="#5A5A5A">La position casse l'absorption ; DeepSeek scinde l'attention en une voie contenu et une voie position</text>
  <line x1="70" y1="156" x2="1130" y2="156" stroke="#E5E1D8" stroke-width="1"/>

  <!-- token source -->
  <rect x="70" y="360" width="120" height="80" rx="4" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="130" y="396" class="body" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">token</text>
  <text x="130" y="416" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">h_t</text>
  <line x1="190" y1="392" x2="250" y2="300" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow03)"/>
  <line x1="190" y1="408" x2="250" y2="512" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow03)"/>

  <!-- CONTENT path (top) -->
  <g class="interactive" data-card="content-path" tabindex="0" role="button" aria-label="Voie contenu">
    <rect x="268" y="250" width="520" height="108" rx="4" fill="#1F5560" opacity="0.08"/>
    <rect x="268" y="250" width="520" height="108" rx="4" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <text x="288" y="282" class="body" font-size="15" font-weight="600" fill="#1F5560">Voie contenu — sans position</text>
    <text x="288" y="308" class="body" font-size="13" fill="#1A1A1A">compressée dans le latent c_KV (d_c = 512), de rang faible</text>
    <text x="288" y="332" class="mono" font-size="12" fill="#1F5560">✓ ABSORBABLE — W^UK fusionnable dans W^UQ</text>
  </g>

  <!-- POSITION path (bottom) -->
  <g class="interactive" data-card="position-path" tabindex="0" role="button" aria-label="Voie position">
    <rect x="268" y="460" width="520" height="108" rx="4" fill="#B7332C" opacity="0.07"/>
    <rect x="268" y="460" width="520" height="108" rx="4" fill="none" stroke="#B7332C" stroke-width="1.25"/>
    <text x="288" y="492" class="body" font-size="15" font-weight="600" fill="#B7332C">Voie position — dimensions découplées</text>
    <text x="288" y="518" class="body" font-size="13" fill="#1A1A1A">petits vecteurs k^R, q^R (d_R = 64 / tête) portant seulement RoPE</text>
    <text x="288" y="542" class="mono" font-size="12" fill="#B7332C">✗ NON ABSORBABLE — rotation R_t dépend de la position</text>
  </g>

  <!-- concat -->
  <line x1="788" y1="304" x2="858" y2="376" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow03)"/>
  <line x1="788" y1="514" x2="858" y2="432" stroke="#5A5A5A" stroke-width="1.4" marker-end="url(#arrow03)"/>
  <g class="interactive" data-card="rope-break" tabindex="0" role="button" aria-label="Concaténation et produit">
    <rect x="876" y="366" width="120" height="80" rx="40" fill="#1A1A1A"/>
    <text x="936" y="400" class="body" font-size="14" font-weight="600" fill="#FAF8F3" text-anchor="middle">concat</text>
    <text x="936" y="422" class="mono" font-size="11" fill="#B8B5AE" text-anchor="middle">q · kᵀ</text>
  </g>

  <!-- cache store -->
  <g class="interactive" data-card="cache-store" tabindex="0" role="button" aria-label="Ce que le cache stocke">
    <rect x="1006" y="352" width="124" height="108" rx="4" fill="#B7332C" opacity="0.06"/>
    <rect x="1006" y="352" width="124" height="108" rx="4" fill="none" stroke="#B7332C" stroke-width="1.5"/>
    <text x="1068" y="380" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">CACHE / TOKEN</text>
    <text x="1068" y="406" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle">c_KV : 512</text>
    <text x="1068" y="426" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle">+ k^R : 64</text>
    <line x1="1026" y1="436" x2="1110" y2="436" stroke="#B7332C" stroke-width="0.75"/>
    <text x="1068" y="452" class="mono" font-size="13" font-weight="600" fill="#B7332C" text-anchor="middle">= 576</text>
  </g>

  <!-- explanation callout why RoPE breaks -->
  <rect x="70" y="620" width="1060" height="76" rx="4" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <text x="90" y="650" class="body" font-size="14" fill="#1A1A1A"><tspan font-weight="600">Pourquoi la rotation casse tout :</tspan>  q_t · k_s  devient  (R_t q_t) · (R_s k_s). La matrice R_t change à chaque position —</text>
  <text x="90" y="674" class="body" font-size="14" fill="#5A5A5A">elle s'intercale entre requête et clé et ne peut donc pas être pré-fusionnée dans un produit de poids constant. D'où le découplage.</text>

  <!-- Footer -->
  <line x1="70" y1="748" x2="1130" y2="748" stroke="#E5E1D8" stroke-width="1"/>
  <text x="70" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : DeepSeek-V2 (arXiv:2405.04434), decoupled RoPE ; RoFormer (arXiv:2104.09864).</text>
</svg>
