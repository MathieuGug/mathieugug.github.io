<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-05">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Hard vs Soft Savings sur les 5 axes</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Pour chaque axe, la part Hard (chiffrable au P&amp;L) et la part Soft (gain diffus, futur) sont rarement de même poids.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LEGEND -->
  <g>
    <rect x="60" y="170" width="14" height="14" fill="#B7332C"/>
    <text x="84" y="182" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Hard Savings</text>
    <text x="84" y="198" class="body" font-size="10" fill="#5A5A5A">comptabilisable, ligne P&amp;L identifiable</text>

    <rect x="290" y="170" width="14" height="14" fill="#B58A2C" opacity="0.5"/>
    <text x="314" y="182" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Soft Savings</text>
    <text x="314" y="198" class="body" font-size="10" fill="#5A5A5A">gain diffus, indicateur avancé futur</text>

    <text x="60" y="232" class="body" font-size="11" fill="#5A5A5A">Pourcentages indicatifs : poids relatif de chaque mode de comptabilisation par axe sur un portefeuille typique IA générative / agentique.</text>
  </g>

  <!-- BARS — 5 horizontal bars, axis label left, hard|soft|future mass right -->
  <!-- Bar geometry: y starts at 280, height 50, gap 30 -->
  <!-- Bar x area: 240 → 1080 (width 840) -->
  <!-- Per axis: hard% + soft% = 100, fill carmine then mustard -->

  <!-- Coût (80% hard, 20% soft) -->
  <g class="interactive" data-card="bar-cout" tabindex="0" role="button" aria-label="Hard/Soft sur Coût">
    <text x="220" y="312" class="display" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="end">Coût</text>
    <rect x="240" y="290" width="672" height="50" fill="#B7332C"/>
    <rect x="912" y="290" width="168" height="50" fill="#B58A2C" opacity="0.5"/>
    <text x="576" y="320" class="mono" font-size="14" font-weight="500" fill="#FAF8F3" text-anchor="middle">80 % hard</text>
    <text x="996" y="320" class="mono" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">20 % soft</text>
    <text x="1100" y="318" class="body" font-size="11" fill="#5A5A5A">FTE non remplacés, contrats renégociés</text>
  </g>

  <!-- Volume (50% hard, 50% soft) -->
  <g class="interactive" data-card="bar-volume" tabindex="0" role="button" aria-label="Hard/Soft sur Volume">
    <text x="220" y="392" class="display" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="end">Volume</text>
    <rect x="240" y="370" width="420" height="50" fill="#B7332C"/>
    <rect x="660" y="370" width="420" height="50" fill="#B58A2C" opacity="0.5"/>
    <text x="450" y="400" class="mono" font-size="14" font-weight="500" fill="#FAF8F3" text-anchor="middle">50 % hard</text>
    <text x="870" y="400" class="mono" font-size="14" font-weight="500" fill="#1A1A1A" text-anchor="middle">50 % soft</text>
    <text x="1100" y="398" class="body" font-size="11" fill="#5A5A5A">CA mesurable, mais attribution diffuse</text>
  </g>

  <!-- Vitesse (35% hard, 65% soft) -->
  <g class="interactive" data-card="bar-vitesse" tabindex="0" role="button" aria-label="Hard/Soft sur Vitesse">
    <text x="220" y="472" class="display" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="end">Vitesse</text>
    <rect x="240" y="450" width="294" height="50" fill="#B7332C"/>
    <rect x="534" y="450" width="546" height="50" fill="#B58A2C" opacity="0.5"/>
    <text x="387" y="480" class="mono" font-size="13" font-weight="500" fill="#FAF8F3" text-anchor="middle">35 % hard</text>
    <text x="807" y="480" class="mono" font-size="14" font-weight="500" fill="#1A1A1A" text-anchor="middle">65 % soft</text>
    <text x="1100" y="478" class="body" font-size="11" fill="#5A5A5A">Time-to-market avéré, mais réallocation</text>
  </g>

  <!-- Qualité (40% hard, 60% soft) -->
  <g class="interactive" data-card="bar-qualite" tabindex="0" role="button" aria-label="Hard/Soft sur Qualité">
    <text x="220" y="552" class="display" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="end">Qualité</text>
    <rect x="240" y="530" width="336" height="50" fill="#B7332C"/>
    <rect x="576" y="530" width="504" height="50" fill="#B58A2C" opacity="0.5"/>
    <text x="408" y="560" class="mono" font-size="13" font-weight="500" fill="#FAF8F3" text-anchor="middle">40 % hard</text>
    <text x="828" y="560" class="mono" font-size="14" font-weight="500" fill="#1A1A1A" text-anchor="middle">60 % soft</text>
    <text x="1100" y="558" class="body" font-size="11" fill="#5A5A5A">Amendes évitées · risques diffus</text>
  </g>

  <!-- Bien-être (15% hard, 85% soft) -->
  <g class="interactive" data-card="bar-bien-etre" tabindex="0" role="button" aria-label="Hard/Soft sur Bien-être">
    <text x="220" y="632" class="display" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="end">Bien-être</text>
    <rect x="240" y="610" width="126" height="50" fill="#B7332C"/>
    <rect x="366" y="610" width="714" height="50" fill="#B58A2C" opacity="0.5"/>
    <text x="303" y="640" class="mono" font-size="11" font-weight="500" fill="#FAF8F3" text-anchor="middle">15 %</text>
    <text x="723" y="640" class="mono" font-size="14" font-weight="500" fill="#1A1A1A" text-anchor="middle">85 % soft</text>
    <text x="1100" y="638" class="body" font-size="11" fill="#5A5A5A">Recrutement évité, NPS · majoritairement futur</text>
  </g>

  <!-- ANNOTATION — règle de discipline -->
  <g>
    <rect x="60" y="690" width="1080" height="70" rx="3" fill="#1F5560" opacity="0.06"/>
    <text x="80" y="717" class="body" font-size="13" font-weight="600" fill="#1F5560">Règle de discipline du business case</text>
    <text x="80" y="737" class="body" font-size="11" fill="#1A1A1A">Hard chiffrés et fermés (preuve de réallocation pour les FTE) · Soft suivis comme indicateurs avancés,</text>
    <text x="80" y="753" class="body" font-size="11" fill="#1A1A1A">crédibles uniquement si trois indicateurs alignés convergent (ex. NPS↑ + churn↓ + conversion↑).</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="788" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : Cigref 2026 (Hard/Soft Savings) · synthèse d'auteur sur portefeuilles GenAI typiques observés. Pourcentages indicatifs.</text>
</svg>
