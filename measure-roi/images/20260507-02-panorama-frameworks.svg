<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-02">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le panorama des frameworks 2024-2026</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Cinq cadres dominent le débat ROI ; ils ne se substituent pas, ils se composent.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- FIVE CARDS -->
