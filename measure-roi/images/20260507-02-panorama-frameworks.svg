  <text x="60" y="735" class="body" font-size="11" font-style="italic" fill="#5A5A5A">À retenir : Cigref donne la taxonomie · McKinsey impose un indicateur · BCG positionne dans une cohorte ·</text>
  <text x="60" y="752" class="body" font-size="11" font-style="italic" fill="#5A5A5A">MIT NANDA explique l'échec · Forrester chiffre. Un dossier ROI sérieux mobilise les cinq.</text>
  <text x="60" y="780" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : Cigref 2026 ; McKinsey State of AI 2025 ; BCG Build for the Future 2025 ; MIT NANDA 2025 ; Forrester TEI methodology.</text>
