<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-09">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 09</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Cinq études, un paysage <tspan font-style="italic">jagged</tspan></text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">L'effet productivité dépend du niveau d'expertise du collaborateur et du type de tâche. Aucune règle universelle.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Plot area: x=expertise (left=novice → right=expert), y=type de tâche (top=in-frontier, bottom=out-of-frontier) -->
  <!-- Plot bounds: x 200→1080, y 200→640 -->

  <!-- Quadrant backgrounds -->
  <rect x="200" y="200" width="440" height="220" fill="#2F5D3F" opacity="0.06"/>
  <rect x="640" y="200" width="440" height="220" fill="#1F5560" opacity="0.06"/>
  <rect x="200" y="420" width="440" height="220" fill="#B58A2C" opacity="0.06"/>
  <rect x="640" y="420" width="440" height="220" fill="#B7332C" opacity="0.06"/>

  <!-- Axes -->
  <line x1="200" y1="640" x2="1080" y2="640" stroke="#1A1A1A" stroke-width="0.75"/>
  <line x1="200" y1="200" x2="200" y2="640" stroke="#1A1A1A" stroke-width="0.75"/>
  <!-- Mid-axis dividers -->
  <line x1="640" y1="200" x2="640" y2="640" stroke="#5A5A5A" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="200" y1="420" x2="1080" y2="420" stroke="#5A5A5A" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- Axis labels -->
  <text x="200" y="670" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A">NOVICE / JUNIOR</text>
  <text x="1080" y="670" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A" text-anchor="end">EXPERT / SENIOR</text>
  <text x="640" y="690" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">Niveau d'expérience du travailleur</text>

  <text x="180" y="208" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A" text-anchor="end" transform="rotate(-90, 180, 208)">DANS LA FRONTIÈRE</text>
  <text x="180" y="640" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A" text-anchor="end" transform="rotate(-90, 180, 640)">HORS FRONTIÈRE</text>
  <text x="100" y="420" class="body" font-size="11" font-style="italic" fill="#5A5A5A" transform="rotate(-90, 100, 420)" text-anchor="middle">Type de tâche IA</text>

  <!-- Quadrant labels -->
  <text x="220" y="220" class="body" font-size="10" font-style="italic" fill="#2F5D3F">↗ Plus grand boost</text>
  <text x="660" y="220" class="body" font-size="10" font-style="italic" fill="#1F5560">→ Boost modéré ou nul</text>
  <text x="220" y="440" class="body" font-size="10" font-style="italic" fill="#B58A2C">⚠ Risque qualité</text>
  <text x="660" y="440" class="body" font-size="10" font-style="italic" fill="#B7332C">↘ Effet négatif documenté</text>

  <!-- Data points -->

  <!-- Brynjolfsson (call center novices) — top-left -->
  <g class="interactive" data-card="study-brynjolfsson" tabindex="0" role="button" aria-label="Brynjolfsson Li Raymond">
    <circle cx="320" cy="260" r="28" fill="#2F5D3F"/>
    <text x="320" y="256" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">+34 %</text>
    <text x="320" y="272" class="body" font-size="9" fill="#FAF8F3" text-anchor="middle">novices</text>
    <text x="320" y="313" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Brynjolfsson 2023</text>
    <text x="320" y="328" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">support client · 5 179 agents</text>
  </g>

  <!-- Copilot — straddles top middle -->
  <g class="interactive" data-card="study-copilot" tabindex="0" role="button" aria-label="GitHub Copilot">
    <circle cx="500" cy="290" r="28" fill="#2F5D3F" opacity="0.85"/>
    <text x="500" y="294" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">+26 %</text>
    <text x="500" y="343" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Copilot RCT</text>
    <text x="500" y="358" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">4 000+ devs · MS/Accenture</text>
  </g>

  <!-- Jagged Frontier (BCG/HBS) — split: positive top, negative bottom -->
  <g class="interactive" data-card="study-jagged-positive" tabindex="0" role="button" aria-label="Jagged Frontier — in-frontier">
    <circle cx="780" cy="280" r="28" fill="#1F5560"/>
    <text x="780" y="284" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">+25 %</text>
    <text x="780" y="333" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Jagged · IN</text>
    <text x="780" y="348" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">consultants BCG · 758</text>
  </g>

  <g class="interactive" data-card="study-jagged-negative" tabindex="0" role="button" aria-label="Jagged Frontier — out-of-frontier">
    <circle cx="780" cy="540" r="28" fill="#B7332C"/>
    <text x="780" y="544" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">−19 pp</text>
    <text x="780" y="592" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Jagged · OUT</text>
    <text x="780" y="607" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">tâches hors frontière</text>
  </g>

  <!-- METR — bottom-right (experts on complex codebases) -->
  <g class="interactive" data-card="study-metr" tabindex="0" role="button" aria-label="METR experienced devs">
    <circle cx="980" cy="500" r="32" fill="#B7332C" opacity="0.85"/>
    <text x="980" y="496" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">−19 %</text>
    <text x="980" y="514" class="body" font-size="9" fill="#FAF8F3" text-anchor="middle">temps</text>
    <text x="980" y="556" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">METR 2025</text>
    <text x="980" y="571" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">devs OSS expérimentés</text>
  </g>

  <!-- Klarna — across all quadrants → place mid-bottom -->
  <g class="interactive" data-card="study-klarna" tabindex="0" role="button" aria-label="Klarna case">
    <circle cx="500" cy="540" r="28" fill="#B58A2C"/>
    <text x="500" y="535" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">700 ETP</text>
    <text x="500" y="551" class="body" font-size="9" fill="#FAF8F3" text-anchor="middle">→ revers</text>
    <text x="500" y="592" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Klarna 2024-2025</text>
    <text x="500" y="607" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">outcome qualité non suivi</text>
  </g>

  <!-- Synthesis box -->
  <g>
    <rect x="60" y="700" width="1080" height="60" rx="3" fill="#1A1A1A"/>
    <text x="80" y="724" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B58A2C">À RETENIR</text>
    <text x="80" y="747" class="body" font-size="12" fill="#FAF8F3">Boost massif sur les novices et tâches mid-skill standardisées · effet incertain ou négatif sur les experts traitant des tâches hors frontière ou des codebases matures.</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="785" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : Brynjolfsson Li Raymond NBER 31161 · Peng et al. arXiv 2302.06590 + Cui et al. MIT Econ 2024 · Dell'Acqua et al. HBS 24-013 · METR 2025 · Klarna case (LangChain ; The Financial Brand).</text>
</svg>
