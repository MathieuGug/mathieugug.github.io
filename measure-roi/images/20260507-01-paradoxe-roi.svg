<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" data-schema-id="schema-01">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="780" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le paradoxe ROI 2026</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Quatre chiffres résument la tension entre le potentiel annoncé et la réalité industrielle.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- THREE COLUMNS -->
  <!-- Column 1 — Potentiel (teal) -->
  <g class="interactive" data-card="potentiel" tabindex="0" role="button" aria-label="Le potentiel — détails">
    <rect x="80" y="170" width="340" height="500" rx="3" fill="#1F5560" opacity="0.05"/>
    <line x1="80" y1="170" x2="80" y2="670" stroke="#1F5560" stroke-width="2.5"/>
    <text x="100" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560">LE POTENTIEL</text>

    <text x="100" y="270" class="display" font-size="64" font-weight="600" fill="#1F5560">2,6 — 4,4</text>
    <text x="100" y="298" class="body" font-size="13" font-weight="500" fill="#1A1A1A">trillions $ / an de valeur potentielle</text>
    <text x="100" y="316" class="body" font-size="11" fill="#5A5A5A">McKinsey, 63 cas d'usage GenAI</text>

    <line x1="100" y1="350" x2="400" y2="350" stroke="#E5E1D8" stroke-width="0.5"/>

    <text x="100" y="400" class="display" font-size="48" font-weight="600" fill="#1F5560">17 % → 29 %</text>
    <text x="100" y="424" class="body" font-size="13" font-weight="500" fill="#1A1A1A">part de valeur captée par les agents</text>
    <text x="100" y="442" class="body" font-size="11" fill="#5A5A5A">BCG · 2025 → 2028 attendu</text>

    <line x1="100" y1="476" x2="400" y2="476" stroke="#E5E1D8" stroke-width="0.5"/>

    <text x="100" y="525" class="display" font-size="48" font-weight="600" fill="#1F5560">61 %</text>
    <text x="100" y="549" class="body" font-size="13" font-weight="500" fill="#1A1A1A">de CEO qui adoptent activement</text>
    <text x="100" y="567" class="body" font-size="13" font-weight="500" fill="#1A1A1A">les agents IA</text>
    <text x="100" y="585" class="body" font-size="11" fill="#5A5A5A">IBM IBV · 2 000 dirigeants 2025</text>

    <text x="100" y="640" class="body" font-size="11" font-style="italic" fill="#1F5560">Le marché y croit, l'investissement suit.</text>
  </g>

  <!-- Column 2 — Réalité (mustard) -->
  <g class="interactive" data-card="realite" tabindex="0" role="button" aria-label="La réalité — détails">
    <rect x="430" y="170" width="340" height="500" rx="3" fill="#B58A2C" opacity="0.05"/>
    <line x1="430" y1="170" x2="430" y2="670" stroke="#B58A2C" stroke-width="2.5"/>
    <text x="450" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B58A2C">LA RÉALITÉ EBIT</text>

    <text x="450" y="270" class="display" font-size="64" font-weight="600" fill="#B58A2C">39 %</text>
    <text x="450" y="298" class="body" font-size="13" font-weight="500" fill="#1A1A1A">d'organisations qui rattachent</text>
    <text x="450" y="316" class="body" font-size="13" font-weight="500" fill="#1A1A1A">un quelconque impact EBIT à l'IA</text>
    <text x="450" y="334" class="body" font-size="11" fill="#5A5A5A">McKinsey, mars 2025</text>

    <line x1="450" y1="360" x2="750" y2="360" stroke="#E5E1D8" stroke-width="0.5"/>

    <text x="450" y="410" class="display" font-size="48" font-weight="600" fill="#B58A2C">5,5 %</text>
    <text x="450" y="434" class="body" font-size="13" font-weight="500" fill="#1A1A1A">de "high performers" :</text>
    <text x="450" y="452" class="body" font-size="13" font-weight="500" fill="#1A1A1A">&gt; 5 % d'EBIT lié à l'IA</text>
    <text x="450" y="470" class="body" font-size="11" fill="#5A5A5A">McKinsey · 109 / 1 991 répondants</text>

    <line x1="450" y1="496" x2="750" y2="496" stroke="#E5E1D8" stroke-width="0.5"/>

    <text x="450" y="545" class="display" font-size="48" font-weight="600" fill="#B58A2C">25 %</text>
    <text x="450" y="569" class="body" font-size="13" font-weight="500" fill="#1A1A1A">d'initiatives ayant délivré</text>
    <text x="450" y="587" class="body" font-size="13" font-weight="500" fill="#1A1A1A">le ROI attendu</text>
    <text x="450" y="605" class="body" font-size="11" fill="#5A5A5A">IBM IBV · 2 000 CEO 2025</text>

    <text x="450" y="655" class="body" font-size="11" font-style="italic" fill="#B58A2C">Trois enquêtes différentes, même verdict.</text>
  </g>

  <!-- Column 3 — Échec (carmine) -->
  <g class="interactive" data-card="echec" tabindex="0" role="button" aria-label="L'échec — détails">
    <rect x="780" y="170" width="340" height="500" rx="3" fill="#B7332C" opacity="0.05"/>
    <line x1="780" y1="170" x2="780" y2="670" stroke="#B7332C" stroke-width="2.5"/>
    <text x="800" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">L'ÉCHEC INDUSTRIEL</text>

    <text x="800" y="270" class="display" font-size="80" font-weight="600" fill="#B7332C">95 %</text>
    <text x="800" y="298" class="body" font-size="13" font-weight="500" fill="#1A1A1A">de pilotes GenAI sans impact</text>
    <text x="800" y="316" class="body" font-size="13" font-weight="500" fill="#1A1A1A">P&amp;L mesurable</text>
    <text x="800" y="334" class="body" font-size="11" fill="#5A5A5A">MIT NANDA · août 2025, 300 déploiements</text>

    <line x1="800" y1="380" x2="1100" y2="380" stroke="#E5E1D8" stroke-width="0.5"/>

    <text x="800" y="440" class="display" font-size="48" font-weight="600" fill="#B7332C">30 %</text>
    <text x="800" y="464" class="body" font-size="13" font-weight="500" fill="#1A1A1A">des projets abandonnés</text>
    <text x="800" y="482" class="body" font-size="13" font-weight="500" fill="#1A1A1A">après PoC fin 2025</text>
    <text x="800" y="500" class="body" font-size="11" fill="#5A5A5A">Gartner · prévision juillet 2024</text>

    <line x1="800" y1="540" x2="1100" y2="540" stroke="#E5E1D8" stroke-width="0.5"/>

    <text x="800" y="600" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Causes documentées :</text>
    <text x="800" y="622" class="body" font-size="12" fill="#5A5A5A">— qualité des données</text>
    <text x="800" y="640" class="body" font-size="12" fill="#5A5A5A">— gouvernance / risque</text>
    <text x="800" y="658" class="body" font-size="12" fill="#5A5A5A">— business case absent</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="710" x2="1140" y2="710" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="735" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : McKinsey, State of AI 2025 ; BCG, Build for the Future 2025 ; MIT NANDA, GenAI Divide 2025 ; Gartner 2024 ; IBM IBV 2025.</text>
  <text x="60" y="755" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : 5,5 % d'entreprises capturent un EBIT &gt; 5 % attribuable à l'IA — c'est la frontière entre potentiel et réalisation.</text>
</svg>
