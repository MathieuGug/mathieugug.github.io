<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" data-schema-id="schema-03">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">La grille à cinq axes</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Cinq questions, cinq familles de métriques. Tout cas d'usage IA se cartographie sur ce pentagone.</text>
  <line x1="60" y1="138" x2="840" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Pentagon center: cx=450, cy=510, R=210 -->
  <!-- 5 vertices at angles -90, -18, 54, 126, 198 (top, top-right, bottom-right, bottom-left, top-left) -->
  <!-- Vertex top: (450, 300) -->
  <!-- Vertex top-right: (450 + 210·cos(-18°), 510 + 210·sin(-18°)) = (450 + 199.7, 510 - 64.9) = (649.7, 445.1) -->
  <!-- Vertex bottom-right: (450 + 210·cos(54°), 510 + 210·sin(54°)) = (450 + 123.4, 510 + 169.9) = (573.4, 679.9) -->
  <!-- Vertex bottom-left: (450 + 210·cos(126°), 510 + 210·sin(126°)) = (450 - 123.4, 510 + 169.9) = (326.6, 679.9) -->
  <!-- Vertex top-left: (450 + 210·cos(198°), 510 + 210·sin(198°)) = (450 - 199.7, 510 - 64.9) = (250.3, 445.1) -->

  <!-- Inner pentagon (subtle) -->
  <polygon points="450,360 605,485 545,650 355,650 295,485" fill="#E5E1D8" opacity="0.4"/>
  <!-- Outer pentagon outline -->
  <polygon points="450,300 649.7,445.1 573.4,679.9 326.6,679.9 250.3,445.1" fill="none" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="2 3"/>
  <!-- Connecting axis lines from center -->
  <g stroke="#B8B5AE" stroke-width="0.75">
    <line x1="450" y1="510" x2="450" y2="300"/>
    <line x1="450" y1="510" x2="649.7" y2="445.1"/>
    <line x1="450" y1="510" x2="573.4" y2="679.9"/>
    <line x1="450" y1="510" x2="326.6" y2="679.9"/>
    <line x1="450" y1="510" x2="250.3" y2="445.1"/>
  </g>

  <!-- Center label -->
  <circle cx="450" cy="510" r="42" fill="#1A1A1A"/>
  <text x="450" y="500" class="display" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">VALEUR</text>
  <text x="450" y="518" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle">d'un cas</text>
  <text x="450" y="532" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle">d'usage</text>

  <!-- Vertex 1 — COÛT (top) -->
  <g class="interactive" data-card="cout" tabindex="0" role="button" aria-label="Axe Coût">
    <circle cx="450" cy="290" r="34" fill="#B7332C"/>
    <text x="450" y="295" class="display" font-size="20" font-weight="600" fill="#FAF8F3" text-anchor="middle">€</text>
    <text x="450" y="155" class="display" font-size="18" font-weight="600" fill="#1A1A1A" text-anchor="middle">Coût</text>
    <text x="450" y="174" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">« on dépense moins ? »</text>
    <text x="450" y="208" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">TCO · CapEx évité</text>
    <text x="450" y="224" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">coût/transaction</text>
    <text x="450" y="240" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">heures économisées</text>
  </g>

  <!-- Vertex 2 — VOLUME (top-right) -->
  <g class="interactive" data-card="volume" tabindex="0" role="button" aria-label="Axe Volume">
    <circle cx="649.7" cy="445.1" r="34" fill="#1F5560"/>
    <text x="649.7" y="450" class="display" font-size="20" font-weight="600" fill="#FAF8F3" text-anchor="middle">↑</text>
    <text x="685" y="424" class="display" font-size="18" font-weight="600" fill="#1A1A1A" text-anchor="start">Volume</text>
    <text x="685" y="443" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="start">« plus de clients ? »</text>
    <text x="700" y="463" class="body" font-size="10" fill="#5A5A5A" text-anchor="start">revenus · ARPU</text>
    <text x="700" y="479" class="body" font-size="10" fill="#5A5A5A" text-anchor="start">parts de marché</text>
    <text x="700" y="495" class="body" font-size="10" fill="#5A5A5A" text-anchor="start">conversion · churn</text>
  </g>

  <!-- Vertex 3 — QUALITÉ (bottom-right) -->
  <g class="interactive" data-card="qualite" tabindex="0" role="button" aria-label="Axe Qualité">
    <circle cx="573.4" cy="679.9" r="34" fill="#2F5D3F"/>
    <text x="573.4" y="685" class="display" font-size="20" font-weight="600" fill="#FAF8F3" text-anchor="middle">✓</text>
    <text x="618" y="658" class="display" font-size="18" font-weight="600" fill="#1A1A1A" text-anchor="start">Qualité</text>
    <text x="618" y="677" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="start">« moins d'erreurs ? »</text>
    <text x="618" y="697" class="body" font-size="10" fill="#5A5A5A" text-anchor="start">taux d'erreur · PPM</text>
    <text x="618" y="713" class="body" font-size="10" fill="#5A5A5A" text-anchor="start">conformité · SLA</text>
    <text x="618" y="729" class="body" font-size="10" fill="#5A5A5A" text-anchor="start">faux positifs</text>
  </g>

  <!-- Vertex 4 — VITESSE (bottom-left) -->
  <g class="interactive" data-card="vitesse" tabindex="0" role="button" aria-label="Axe Vitesse">
    <circle cx="326.6" cy="679.9" r="34" fill="#B58A2C"/>
    <text x="326.6" y="685" class="display" font-size="22" font-weight="600" fill="#FAF8F3" text-anchor="middle">⏱</text>
    <text x="282" y="658" class="display" font-size="18" font-weight="600" fill="#1A1A1A" text-anchor="end">Vitesse</text>
    <text x="282" y="677" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="end">« on va plus vite ? »</text>
    <text x="282" y="697" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">time-to-market</text>
    <text x="282" y="713" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">cycle time · throughput</text>
    <text x="282" y="729" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">délai de traitement</text>
  </g>

  <!-- Vertex 5 — BIEN-ÊTRE (top-left) -->
  <g class="interactive" data-card="bien-etre" tabindex="0" role="button" aria-label="Axe Bien-être">
    <circle cx="250.3" cy="445.1" r="34" fill="#1E3A5F"/>
    <text x="250.3" y="450" class="display" font-size="20" font-weight="600" fill="#FAF8F3" text-anchor="middle">♥</text>
    <text x="215" y="424" class="display" font-size="18" font-weight="600" fill="#1A1A1A" text-anchor="end">Bien-être</text>
    <text x="215" y="443" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="end">« les gens vont mieux ? »</text>
    <text x="200" y="463" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">NPS · eNPS</text>
    <text x="200" y="479" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">turnover · QVT</text>
    <text x="200" y="495" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">ESG · engagement</text>
  </g>

  <!-- BOTTOM PANEL — règle de cadrage -->
  <line x1="60" y1="780" x2="840" y2="780" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="810" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Règle de cadrage :</text>
  <text x="60" y="833" class="body" font-size="12" fill="#1A1A1A">avant de chercher la formule, identifier <tspan font-style="italic">l'axe dominant</tspan> du cas d'usage. Un même outil ne crée pas la même valeur</text>
  <text x="60" y="851" class="body" font-size="12" fill="#1A1A1A">selon qu'on cible une économie de masse salariale (Coût), un meilleur CSAT (Bien-être) ou un délai raccourci (Vitesse).</text>
  <text x="60" y="884" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Cadre analytique propriétaire · cohérent avec les 4 catégories Cigref (cf. schéma 04).</text>
</svg>
