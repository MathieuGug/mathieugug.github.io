<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-07">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow-tree" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Quelle méthode ROI pour quel cas d'usage ?</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Trois questions suffisent à choisir parmi les huit méthodes utiles à 95 % des dossiers IA.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Q1 (top center, x=450-750 center 600) -->
  <g class="interactive" data-card="q1" tabindex="0" role="button" aria-label="Question 1">
    <rect x="450" y="170" width="300" height="60" rx="3" fill="#1A1A1A"/>
    <text x="600" y="195" class="mono" font-size="10" font-weight="600" letter-spacing="0.14em" fill="#B58A2C" text-anchor="middle">QUESTION 1</text>
    <text x="600" y="218" class="body" font-size="13" font-weight="500" fill="#FAF8F3" text-anchor="middle">Le bénéfice est-il de la baisse de coût ?</text>
  </g>

  <!-- Branches from Q1 → Q1a (220, 290) and Q2 (960, 290) -->
  <line x1="500" y1="230" x2="220" y2="290" stroke="#5A5A5A" stroke-width="0.75"/>
  <text x="360" y="252" class="mono" font-size="11" font-weight="600" fill="#B7332C">OUI →</text>
  <line x1="700" y1="230" x2="960" y2="290" stroke="#5A5A5A" stroke-width="0.75"/>
  <text x="830" y="252" class="mono" font-size="11" font-weight="600" fill="#5A5A5A">NON →</text>

  <!-- Q1a (left, x=60-380 center 220) — Réduit ou évité ? -->
  <g class="interactive" data-card="q1a" tabindex="0" role="button" aria-label="Question 1a">
    <rect x="60" y="290" width="320" height="60" rx="3" fill="#FFFFFF" stroke="#B7332C" stroke-width="1.25"/>
    <text x="220" y="312" class="mono" font-size="9" font-weight="600" letter-spacing="0.14em" fill="#B7332C" text-anchor="middle">Q1a · TYPE DE COÛT</text>
    <text x="220" y="335" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">Réduit (process) ou évité (risque) ?</text>
  </g>

  <!-- Branches Q1a → 3 methods (M1=110, M3=220, M2=330 at y=410) -->
  <line x1="220" y1="350" x2="110" y2="410" stroke="#5A5A5A" stroke-width="0.75"/>
  <line x1="220" y1="350" x2="220" y2="410" stroke="#5A5A5A" stroke-width="0.75"/>
  <line x1="220" y1="350" x2="330" y2="410" stroke="#5A5A5A" stroke-width="0.75"/>
  <text x="165" y="384" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">réduit</text>
  <text x="330" y="384" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">évité</text>

  <!-- Methods 1, 3, 2 (centered under Q1a, all 100 wide) -->
  <g class="interactive" data-card="m1-cost-reduction" tabindex="0" role="button" aria-label="Cost Reduction">
    <rect x="60" y="410" width="100" height="80" rx="3" fill="#B7332C"/>
    <text x="110" y="432" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">MÉTHODE 1</text>
    <text x="110" y="455" class="display" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">Cost</text>
    <text x="110" y="471" class="display" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">Reduction</text>
    <text x="110" y="485" class="body" font-size="9" fill="#FAF8F3" text-anchor="middle">si Hard</text>
  </g>

  <g class="interactive" data-card="m3-productivity" tabindex="0" role="button" aria-label="Productivity Gains">
    <rect x="170" y="410" width="100" height="80" rx="3" fill="#B7332C" opacity="0.65"/>
    <text x="220" y="432" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">MÉTHODE 3</text>
    <text x="220" y="453" class="display" font-size="12" font-weight="600" fill="#FAF8F3" text-anchor="middle">Productivity</text>
    <text x="220" y="469" class="display" font-size="12" font-weight="600" fill="#FAF8F3" text-anchor="middle">Gains</text>
    <text x="220" y="485" class="body" font-size="8.5" fill="#FAF8F3" text-anchor="middle">si Soft / réallocation</text>
  </g>

  <g class="interactive" data-card="m2-cost-avoidance" tabindex="0" role="button" aria-label="Cost Avoidance">
    <rect x="280" y="410" width="100" height="80" rx="3" fill="#B7332C" opacity="0.85"/>
    <text x="330" y="432" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">MÉTHODE 2</text>
    <text x="330" y="455" class="display" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">Cost</text>
    <text x="330" y="471" class="display" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">Avoidance</text>
    <text x="330" y="485" class="body" font-size="9" fill="#FAF8F3" text-anchor="middle">fraude, risque</text>
  </g>

  <!-- Q2 (right, x=800-1120 center 960) -->
  <g class="interactive" data-card="q2" tabindex="0" role="button" aria-label="Question 2">
    <rect x="800" y="290" width="320" height="60" rx="3" fill="#FFFFFF" stroke="#1F5560" stroke-width="1.25"/>
    <text x="960" y="312" class="mono" font-size="9" font-weight="600" letter-spacing="0.14em" fill="#1F5560" text-anchor="middle">Q2 · CROISSANCE DU REVENU ?</text>
    <text x="960" y="335" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">Effet revenue direct ou accéléré ?</text>
  </g>

  <!-- Branches Q2 → 2 methods (M4=870, M5=1050 at y=410) -->
  <line x1="960" y1="350" x2="870" y2="410" stroke="#5A5A5A" stroke-width="0.75"/>
  <line x1="960" y1="350" x2="1050" y2="410" stroke="#5A5A5A" stroke-width="0.75"/>
  <text x="870" y="384" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">attribution</text>
  <text x="1050" y="384" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">accélération</text>

  <!-- Q2 → Q3 dashed fall-through (in the gap between M4 and M5, x=960) -->
  <line x1="960" y1="350" x2="960" y2="540" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3"/>
  <text x="960" y="525" class="mono" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">aucun, mais structurant ↓</text>

  <!-- Methods 4, 5 (centered under Q2, 100 wide each) -->
  <g class="interactive" data-card="m4-revenue-increase" tabindex="0" role="button" aria-label="Revenue Increase">
    <rect x="820" y="410" width="100" height="80" rx="3" fill="#1F5560"/>
    <text x="870" y="432" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">MÉTHODE 4</text>
    <text x="870" y="455" class="display" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">Revenue</text>
    <text x="870" y="471" class="display" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">Increase</text>
    <text x="870" y="485" class="body" font-size="8.5" fill="#FAF8F3" text-anchor="middle">avec test causal</text>
  </g>

  <g class="interactive" data-card="m5-time-to-market" tabindex="0" role="button" aria-label="Time-to-Market">
    <rect x="1000" y="410" width="100" height="80" rx="3" fill="#1F5560" opacity="0.85"/>
    <text x="1050" y="432" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">MÉTHODE 5</text>
    <text x="1050" y="453" class="display" font-size="12" font-weight="600" fill="#FAF8F3" text-anchor="middle">Time-to-</text>
    <text x="1050" y="469" class="display" font-size="12" font-weight="600" fill="#FAF8F3" text-anchor="middle">Market</text>
    <text x="1050" y="485" class="body" font-size="9" fill="#FAF8F3" text-anchor="middle">R&amp;D · produit</text>
  </g>

  <!-- Q3 (bottom-center, x=800-1120 center 960) -->
  <g class="interactive" data-card="q3" tabindex="0" role="button" aria-label="Question 3">
    <rect x="800" y="540" width="320" height="60" rx="3" fill="#FFFFFF" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="960" y="562" class="mono" font-size="9" font-weight="600" letter-spacing="0.14em" fill="#B58A2C" text-anchor="middle">Q3 · HORIZON STRUCTURANT</text>
    <text x="960" y="585" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">&gt; 24 mois et plateforme ?</text>
  </g>

  <!-- Branches Q3 → 3 methods (M6=850, M7=960, M8=1070 at y=660) -->
  <line x1="960" y1="600" x2="850" y2="660" stroke="#5A5A5A" stroke-width="0.75"/>
  <line x1="960" y1="600" x2="960" y2="660" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3"/>
  <line x1="960" y1="600" x2="1070" y2="660" stroke="#5A5A5A" stroke-width="0.75"/>
  <text x="892" y="615" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">projet</text>
  <text x="960" y="650" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">non · quick win</text>
  <text x="1028" y="615" class="mono" font-size="10" fill="#5A5A5A" text-anchor="start">plateforme</text>

  <!-- Methods 6, 7, 8 (centered under Q3, 100 wide each) -->
  <g class="interactive" data-card="m6-npv" tabindex="0" role="button" aria-label="NPV">
    <rect x="800" y="660" width="100" height="80" rx="3" fill="#B58A2C"/>
    <text x="850" y="682" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">MÉTHODE 6</text>
    <text x="850" y="705" class="display" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">NPV</text>
    <text x="850" y="725" class="body" font-size="9.5" fill="#FAF8F3" text-anchor="middle">long terme · projet</text>
  </g>

  <g class="interactive" data-card="m7-payback" tabindex="0" role="button" aria-label="Payback Period">
    <rect x="910" y="660" width="100" height="80" rx="3" fill="#B58A2C" opacity="0.65"/>
    <text x="960" y="682" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">MÉTHODE 7</text>
    <text x="960" y="705" class="display" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">Payback</text>
    <text x="960" y="725" class="body" font-size="9.5" fill="#FAF8F3" text-anchor="middle">quick win · &lt; 12 mois</text>
  </g>

  <g class="interactive" data-card="m8-tei" tabindex="0" role="button" aria-label="TEI Forrester">
    <rect x="1020" y="660" width="100" height="80" rx="3" fill="#B58A2C" opacity="0.85"/>
    <text x="1070" y="682" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">MÉTHODE 8</text>
    <text x="1070" y="705" class="display" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">TEI</text>
    <text x="1070" y="725" class="body" font-size="9.5" fill="#FAF8F3" text-anchor="middle">portefeuille · plateforme</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="775" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : commencer par Q1 (coût ?), descendre. Trois pièges classiques — Payback sous-estime, NPV est sensible au taux, Productivity Gains exige preuve de réallocation.</text>
</svg>
