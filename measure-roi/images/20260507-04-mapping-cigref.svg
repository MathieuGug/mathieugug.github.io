<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-04">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow-graphite-04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Grille 5 axes vs Cigref : la double cartographie</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Une grille pour cadrer un cas d'usage, une catégorisation pour présenter le résultat au COMEX.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LEFT — 5 axes (boxes stacked) -->
  <text x="80" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#1A1A1A">GRILLE D'AUTEUR · 5 AXES</text>
  <text x="80" y="200" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Cadrage en amont</text>

  <!-- Axis cards -->
  <g class="interactive" data-card="axe-cout" data-paired="cigref-fin" tabindex="0" role="button" aria-label="Axe Coût mapping">
    <rect x="80" y="225" width="280" height="70" rx="3" fill="#FFFFFF" stroke="#B7332C" stroke-width="1.25"/>
    <rect x="80" y="225" width="6" height="70" fill="#B7332C"/>
    <text x="100" y="252" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Coût</text>
    <text x="100" y="271" class="body" font-size="11" fill="#5A5A5A">TCO, CapEx évité, coût/transaction</text>
    <text x="100" y="287" class="body" font-size="10" font-style="italic" fill="#B7332C">→ Bénéfices financiers (coûts)</text>
  </g>

  <g class="interactive" data-card="axe-bien-etre" data-paired="cigref-op cigref-org cigref-strat" tabindex="0" role="button" aria-label="Axe Bien-être mapping">
    <rect x="80" y="305" width="280" height="70" rx="3" fill="#FFFFFF" stroke="#1E3A5F" stroke-width="1.25"/>
    <rect x="80" y="305" width="6" height="70" fill="#1E3A5F"/>
    <text x="100" y="332" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Bien-être</text>
    <text x="100" y="351" class="body" font-size="11" fill="#5A5A5A">NPS, eNPS, turnover, QVT, ESG</text>
    <text x="100" y="367" class="body" font-size="10" font-style="italic" fill="#1E3A5F">→ Op. + Org. + Stratégique</text>
  </g>

  <g class="interactive" data-card="axe-vitesse" data-paired="cigref-op cigref-strat" tabindex="0" role="button" aria-label="Axe Vitesse mapping">
    <rect x="80" y="385" width="280" height="70" rx="3" fill="#FFFFFF" stroke="#B58A2C" stroke-width="1.25"/>
    <rect x="80" y="385" width="6" height="70" fill="#B58A2C"/>
    <text x="100" y="412" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Vitesse</text>
    <text x="100" y="431" class="body" font-size="11" fill="#5A5A5A">time-to-market, cycle time</text>
    <text x="100" y="447" class="body" font-size="10" font-style="italic" fill="#B58A2C">→ Opérationnels + Stratégiques</text>
  </g>

  <g class="interactive" data-card="axe-volume" data-paired="cigref-strat cigref-fin" tabindex="0" role="button" aria-label="Axe Volume mapping">
    <rect x="80" y="465" width="280" height="70" rx="3" fill="#FFFFFF" stroke="#1F5560" stroke-width="1.25"/>
    <rect x="80" y="465" width="6" height="70" fill="#1F5560"/>
    <text x="100" y="492" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Volume</text>
    <text x="100" y="511" class="body" font-size="11" fill="#5A5A5A">revenus, ARPU, conversion</text>
    <text x="100" y="527" class="body" font-size="10" font-style="italic" fill="#1F5560">→ Bénéfices financiers (revenus)</text>
  </g>

  <g class="interactive" data-card="axe-qualite" data-paired="cigref-op cigref-fin" tabindex="0" role="button" aria-label="Axe Qualité mapping">
    <rect x="80" y="545" width="280" height="70" rx="3" fill="#FFFFFF" stroke="#2F5D3F" stroke-width="1.25"/>
    <rect x="80" y="545" width="6" height="70" fill="#2F5D3F"/>
    <text x="100" y="572" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Qualité</text>
    <text x="100" y="591" class="body" font-size="11" fill="#5A5A5A">taux d'erreur, conformité, SLA</text>
    <text x="100" y="607" class="body" font-size="10" font-style="italic" fill="#2F5D3F">→ Op. + Risques &amp; conformité</text>
  </g>

  <!-- RIGHT — Cigref categories -->
  <text x="800" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#1A1A1A">CIGREF · 4 CATÉGORIES</text>
  <text x="800" y="200" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Présentation au COMEX</text>

  <g class="interactive" data-card="cigref-op" data-paired="axe-bien-etre axe-vitesse axe-qualite" tabindex="0" role="button" aria-label="Bénéfices opérationnels">
    <rect x="800" y="225" width="320" height="90" rx="3" fill="#FFFFFF" stroke="#5A5A5A" stroke-width="1"/>
    <text x="820" y="252" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Bénéfices opérationnels</text>
    <text x="820" y="272" class="body" font-size="11" fill="#5A5A5A">Productivité, automatisation, réduction</text>
    <text x="820" y="288" class="body" font-size="11" fill="#5A5A5A">du temps de décision, baisse des erreurs</text>
    <text x="820" y="307" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Couvert par : Vitesse, Qualité, Bien-être</text>
  </g>

  <g class="interactive" data-card="cigref-org" data-paired="axe-bien-etre" tabindex="0" role="button" aria-label="Bénéfices organisationnels">
    <rect x="800" y="325" width="320" height="90" rx="3" fill="#FFFFFF" stroke="#5A5A5A" stroke-width="1"/>
    <text x="820" y="352" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Bénéfices organisationnels</text>
    <text x="820" y="372" class="body" font-size="11" fill="#5A5A5A">Marque employeur, agilité, valorisation</text>
    <text x="820" y="388" class="body" font-size="11" fill="#5A5A5A">des données, allocation des ressources</text>
    <text x="820" y="407" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Couvert par : Bien-être, Qualité</text>
  </g>

  <g class="interactive" data-card="cigref-strat" data-paired="axe-bien-etre axe-vitesse axe-volume" tabindex="0" role="button" aria-label="Bénéfices stratégiques">
    <rect x="800" y="425" width="320" height="90" rx="3" fill="#FFFFFF" stroke="#5A5A5A" stroke-width="1"/>
    <text x="820" y="452" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Bénéfices stratégiques</text>
    <text x="820" y="472" class="body" font-size="11" fill="#5A5A5A">Avantage compétitif, nouveaux</text>
    <text x="820" y="488" class="body" font-size="11" fill="#5A5A5A">business models, différenciation</text>
    <text x="820" y="507" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Couvert par : Vitesse, Volume, Bien-être</text>
  </g>

  <g class="interactive" data-card="cigref-fin" data-paired="axe-cout axe-volume axe-qualite" tabindex="0" role="button" aria-label="Bénéfices financiers">
    <rect x="800" y="525" width="320" height="90" rx="3" fill="#FFFFFF" stroke="#5A5A5A" stroke-width="1"/>
    <text x="820" y="552" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Bénéfices financiers</text>
    <text x="820" y="572" class="body" font-size="11" fill="#5A5A5A">Coûts opérationnels, revenus,</text>
    <text x="820" y="588" class="body" font-size="11" fill="#5A5A5A">conformité, gestion du risque</text>
    <text x="820" y="607" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Couvert par : Coût, Volume, Qualité</text>
  </g>

  <!-- CONNECTING ARROWS (subtle) -->
  <g stroke="#5A5A5A" stroke-width="0.75" fill="none" marker-end="url(#arrow-graphite-04)">
    <!-- Coût → Financiers -->
    <path d="M 365 260 C 580 260, 580 555, 795 555"/>
    <!-- Bien-être → Op + Org + Strat (multi) -->
    <path d="M 365 340 C 530 340, 530 270, 795 270"/>
    <path d="M 365 340 C 580 340, 580 370, 795 370"/>
    <path d="M 365 340 C 580 340, 580 470, 795 470"/>
    <!-- Vitesse → Op + Strat -->
    <path d="M 365 420 C 530 420, 530 270, 795 270"/>
    <path d="M 365 420 C 580 420, 580 470, 795 470"/>
    <!-- Volume → Strat + Fin -->
    <path d="M 365 500 C 530 500, 530 470, 795 470"/>
    <path d="M 365 500 C 580 500, 580 555, 795 555"/>
    <!-- Qualité → Op + Fin -->
    <path d="M 365 580 C 530 580, 530 270, 795 270"/>
    <path d="M 365 580 C 580 580, 580 555, 795 555"/>
  </g>

  <!-- Three angles morts -->
  <g class="interactive" data-card="angles-morts" tabindex="0" role="button" aria-label="Angles morts">
    <rect x="395" y="640" width="410" height="100" rx="3" fill="#B58A2C" opacity="0.08" stroke="#B58A2C" stroke-width="0.75" stroke-dasharray="2 3"/>
    <text x="415" y="668" class="mono" font-size="10" font-weight="600" letter-spacing="0.14em" fill="#B58A2C">ANGLES MORTS · NON COUVERTS PAR LA GRILLE</text>
    <text x="415" y="690" class="body" font-size="11" fill="#1A1A1A">— Valorisation des données propriétaires</text>
    <text x="415" y="708" class="body" font-size="11" fill="#1A1A1A">— Émergence de nouveaux business models</text>
    <text x="415" y="726" class="body" font-size="11" fill="#1A1A1A">— Coût de la décision (concept Cigref subtil)</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="760" x2="1140" y2="760" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="785" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Cigref, janvier 2026 ; mapping et grille 5 axes — cadre analytique propriétaire.</text>
</svg>
