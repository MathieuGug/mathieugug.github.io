<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-05">
  <title id="title-05">Flow OAuth MCP — quatre pitfalls annotés</title>
  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="arr05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6f7c"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#faf6ec"/>

  <!-- Header -->
  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#b8582e">SCHÉMA 05</text>
  <text x="60" y="96" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1e1e2a">Flow OAuth MCP — où l'identité fuit</text>
  <text x="60" y="124" class="display" font-size="18" font-style="italic" fill="#6b6f7c">DCR + auth code + PKCE — quatre pitfalls documentés en 2025-2026</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#9a9ca5" stroke-width="0.5"/>

  <!-- Three actors columns at y=200 (header) and y=240 (top of swimlane) -->
  <text x="180" y="190" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#a83e55" text-anchor="middle">CLIENT MCP</text>
  <text x="180" y="210" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">Claude Desktop · Cursor</text>

  <text x="600" y="190" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#a83e55" text-anchor="middle">AUTH SERVER</text>
  <text x="600" y="210" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">remote MCP provider</text>

  <text x="1020" y="190" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#a83e55" text-anchor="middle">DOWNSTREAM TOOL</text>
  <text x="1020" y="210" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">API tierce, DB, etc.</text>

  <!-- Swim lane vertical lines -->
  <line x1="180" y1="225" x2="180" y2="660" stroke="#9a9ca5" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="600" y1="225" x2="600" y2="660" stroke="#9a9ca5" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="1020" y1="225" x2="1020" y2="660" stroke="#9a9ca5" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- Step 1 — DCR -->
  <text x="220" y="265" class="mono" font-size="11" font-weight="600" fill="#1e1e2a">1.</text>
  <line x1="240" y1="260" x2="594" y2="260" stroke="#6b6f7c" stroke-width="1.25" marker-end="url(#arr05)"/>
  <text x="410" y="252" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">Dynamic Client Registration (RFC 7591)</text>
  <text x="410" y="278" class="mono" font-size="11" fill="#1e1e2a" text-anchor="middle">POST /register { name, redirect_uris }</text>

  <!-- Pitfall #1 marker on step 1 -->
  <g class="interactive" data-card="p1" tabindex="0" role="button" aria-label="Pitfall 1 — DCR open registration">
    <circle cx="610" cy="260" r="14" fill="#b8582e"/>
    <text x="610" y="265" class="mono" font-size="12" font-weight="600" fill="#faf6ec" text-anchor="middle">!1</text>
  </g>

  <!-- Step 2 — auth code -->
  <text x="220" y="335" class="mono" font-size="11" font-weight="600" fill="#1e1e2a">2.</text>
  <line x1="240" y1="330" x2="594" y2="330" stroke="#6b6f7c" stroke-width="1.25" marker-end="url(#arr05)"/>
  <text x="410" y="322" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">authorization code request (+ PKCE challenge)</text>
  <text x="410" y="348" class="mono" font-size="11" fill="#1e1e2a" text-anchor="middle">GET /authorize ?code_challenge=…</text>

  <!-- Step 3 — auth code returned -->
  <text x="220" y="405" class="mono" font-size="11" font-weight="600" fill="#1e1e2a">3.</text>
  <line x1="594" y1="400" x2="240" y2="400" stroke="#6b6f7c" stroke-width="1.25" marker-end="url(#arr05)"/>
  <text x="410" y="392" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">redirect avec authorization code</text>
  <text x="410" y="418" class="mono" font-size="11" fill="#1e1e2a" text-anchor="middle">redirect_uri ?code=…</text>

  <!-- Step 4 — exchange code for tokens -->
  <text x="220" y="475" class="mono" font-size="11" font-weight="600" fill="#1e1e2a">4.</text>
  <line x1="240" y1="470" x2="594" y2="470" stroke="#6b6f7c" stroke-width="1.25" marker-end="url(#arr05)"/>
  <text x="410" y="462" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">exchange code → tokens (PKCE verifier)</text>
  <text x="410" y="488" class="mono" font-size="11" fill="#1e1e2a" text-anchor="middle">POST /token { code, code_verifier }</text>

  <!-- Pitfall #2 marker -->
  <g class="interactive" data-card="p2" tabindex="0" role="button" aria-label="Pitfall 2 — Token passthrough downstream">
    <circle cx="194" cy="470" r="14" fill="#b8582e"/>
    <text x="194" y="475" class="mono" font-size="12" font-weight="600" fill="#faf6ec" text-anchor="middle">!2</text>
  </g>

  <!-- Step 5 — bearer access -->
  <text x="640" y="545" class="mono" font-size="11" font-weight="600" fill="#1e1e2a">5.</text>
  <line x1="660" y1="540" x2="1014" y2="540" stroke="#6b6f7c" stroke-width="1.25" marker-end="url(#arr05)"/>
  <text x="830" y="532" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">tool invocation avec bearer token</text>
  <text x="830" y="558" class="mono" font-size="11" fill="#1e1e2a" text-anchor="middle">Authorization: Bearer …</text>

  <!-- Pitfall #3 marker on step 5 -->
  <g class="interactive" data-card="p3" tabindex="0" role="button" aria-label="Pitfall 3 — Refresh sans rotation">
    <circle cx="1030" cy="540" r="14" fill="#b8582e"/>
    <text x="1030" y="545" class="mono" font-size="12" font-weight="600" fill="#faf6ec" text-anchor="middle">!3</text>
  </g>

  <!-- Step 6 — session id over time -->
  <text x="220" y="615" class="mono" font-size="11" font-weight="600" fill="#1e1e2a">6.</text>
  <line x1="240" y1="610" x2="594" y2="610" stroke="#6b6f7c" stroke-width="1.25" stroke-dasharray="4 3" marker-end="url(#arr05)"/>
  <text x="410" y="602" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">session active (HTTP+SSE / Streamable HTTP)</text>
  <text x="410" y="628" class="mono" font-size="11" fill="#1e1e2a" text-anchor="middle">Mcp-Session-Id: …</text>

  <!-- Pitfall #4 marker -->
  <g class="interactive" data-card="p4" tabindex="0" role="button" aria-label="Pitfall 4 — Session hijack SSE">
    <circle cx="410" cy="610" r="14" fill="#b8582e"/>
    <text x="410" y="615" class="mono" font-size="12" font-weight="600" fill="#faf6ec" text-anchor="middle">!4</text>
  </g>

  <!-- Pitfalls legend -->
  <text x="60" y="690" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#a83e55">PITFALLS DOCUMENTÉS — MAI 2026</text>
  <line x1="60" y1="702" x2="430" y2="702" stroke="#9a9ca5" stroke-width="0.5"/>
  <text x="60" y="724" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600" fill="#a83e55">!1</tspan> DCR sans rate limiting — 38 % des serveurs publics audités le laissaient ouvert (PortSwigger, fév. 2026).</text>
  <text x="60" y="742" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600" fill="#a83e55">!2</tspan> Token passthrough vers outils downstream — casse l'isolation de scope, expose le token utilisateur.</text>
  <text x="60" y="760" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600" fill="#a83e55">!3</tspan> Refresh sans rotation — un refresh volé reste valide indéfiniment.</text>
  <text x="60" y="778" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600" fill="#a83e55">!4</tspan> Session hijack — <tspan class="mono" font-size="11">Mcp-Session-Id</tspan> exposé via proxy mal configuré ou logs verbose.</text>
</svg>
