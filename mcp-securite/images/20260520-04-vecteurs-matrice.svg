<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-04">
  <title id="title-04">Dix vecteurs d'attaque MCP — quatre familles</title>
  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#faf6ec"/>

  <!-- Header -->
  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#b8582e">SCHÉMA 04</text>
  <text x="60" y="96" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1e1e2a">Les dix vecteurs d'attaque MCP</text>
  <text x="60" y="124" class="display" font-size="18" font-style="italic" fill="#6b6f7c">Quatre familles, dix entrées — documentation publique à mai 2026</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#9a9ca5" stroke-width="0.5"/>

  <!-- 4 column headers -->
  <text x="155" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#a83e55" text-anchor="middle">FAMILLE A</text>
  <text x="155" y="226" class="display" font-size="16" font-weight="600" fill="#1e1e2a" text-anchor="middle">Tool layer</text>
  <text x="155" y="248" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">descriptions empoisonnées</text>

  <text x="425" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#a83e55" text-anchor="middle">FAMILLE B</text>
  <text x="425" y="226" class="display" font-size="16" font-weight="600" fill="#1e1e2a" text-anchor="middle">Prompt layer</text>
  <text x="425" y="248" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">injection cross-document</text>

  <text x="695" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#a83e55" text-anchor="middle">FAMILLE C</text>
  <text x="695" y="226" class="display" font-size="16" font-weight="600" fill="#1e1e2a" text-anchor="middle">Cross-server</text>
  <text x="695" y="248" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">collision &amp; shadowing</text>

  <text x="965" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#a83e55" text-anchor="middle">FAMILLE D</text>
  <text x="965" y="226" class="display" font-size="16" font-weight="600" fill="#1e1e2a" text-anchor="middle">Transport &amp; identité</text>
  <text x="965" y="248" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">OAuth &amp; supply chain</text>

  <!-- Column rules -->
  <line x1="60" y1="270" x2="250" y2="270" stroke="#9a9ca5" stroke-width="0.5"/>
  <line x1="330" y1="270" x2="520" y2="270" stroke="#9a9ca5" stroke-width="0.5"/>
  <line x1="600" y1="270" x2="790" y2="270" stroke="#9a9ca5" stroke-width="0.5"/>
  <line x1="870" y1="270" x2="1060" y2="270" stroke="#9a9ca5" stroke-width="0.5"/>

  <!-- Vector cards : box 250 wide × 130 tall ; col gap 270 ; row 1 y=300, row 2 y=460, row 3 y=620 -->

  <!-- A1 -->
  <g class="interactive" data-card="v01" tabindex="0" role="button" aria-label="Vecteur 1 — Description statique empoisonnée">
    <rect x="60" y="290" width="250" height="130" rx="3" fill="#fdfaf0" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="76" y="316" class="mono" font-size="11" font-weight="600" fill="#a83e55">01</text>
    <text x="76" y="342" class="display" font-size="15" font-weight="600" fill="#1e1e2a">Description statique</text>
    <text x="76" y="362" class="display" font-size="15" font-weight="600" fill="#1e1e2a">empoisonnée (TPA)</text>
    <text x="76" y="385" class="body" font-size="11" font-style="italic" fill="#6b6f7c">Instruction cachée dans la</text>
    <text x="76" y="400" class="body" font-size="11" font-style="italic" fill="#6b6f7c">description JSON.</text>
  </g>

  <!-- A2 -->
  <g class="interactive" data-card="v02" tabindex="0" role="button" aria-label="Vecteur 2 — Rug pull">
    <rect x="60" y="430" width="250" height="130" rx="3" fill="#fdfaf0" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="76" y="456" class="mono" font-size="11" font-weight="600" fill="#a83e55">02</text>
    <text x="76" y="482" class="display" font-size="15" font-weight="600" fill="#1e1e2a">Rug pull</text>
    <text x="76" y="502" class="display" font-size="15" font-weight="600" fill="#1e1e2a">(description rotative)</text>
    <text x="76" y="525" class="body" font-size="11" font-style="italic" fill="#6b6f7c">Propre à l'install, malveillante</text>
    <text x="76" y="540" class="body" font-size="11" font-style="italic" fill="#6b6f7c">après push silencieux.</text>
  </g>

  <!-- A3 -->
  <g class="interactive" data-card="v03" tabindex="0" role="button" aria-label="Vecteur 3 — Unicode tags + line-jumping">
    <rect x="60" y="570" width="250" height="130" rx="3" fill="#fdfaf0" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="76" y="596" class="mono" font-size="11" font-weight="600" fill="#a83e55">03</text>
    <text x="76" y="622" class="display" font-size="15" font-weight="600" fill="#1e1e2a">Unicode tags +</text>
    <text x="76" y="642" class="display" font-size="15" font-weight="600" fill="#1e1e2a">line-jumping</text>
    <text x="76" y="665" class="body" font-size="11" font-style="italic" fill="#6b6f7c">Caractères invisibles ou faux</text>
    <text x="76" y="680" class="body" font-size="11" font-style="italic" fill="#6b6f7c">séparateurs « system ».</text>
  </g>

  <!-- B1 -->
  <g class="interactive" data-card="v04" tabindex="0" role="button" aria-label="Vecteur 4 — Injection cross-document">
    <rect x="330" y="290" width="250" height="130" rx="3" fill="#fdfaf0" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="346" y="316" class="mono" font-size="11" font-weight="600" fill="#a83e55">04</text>
    <text x="346" y="342" class="display" font-size="15" font-weight="600" fill="#1e1e2a">Injection cross-</text>
    <text x="346" y="362" class="display" font-size="15" font-weight="600" fill="#1e1e2a">document</text>
    <text x="346" y="385" class="body" font-size="11" font-style="italic" fill="#6b6f7c">Issue, mail, doc → tool call</text>
    <text x="346" y="400" class="body" font-size="11" font-style="italic" fill="#6b6f7c">non sollicité.</text>
  </g>

  <!-- B2 -->
  <g class="interactive" data-card="v05" tabindex="0" role="button" aria-label="Vecteur 5 — Confused deputy">
    <rect x="330" y="430" width="250" height="130" rx="3" fill="#fdfaf0" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="346" y="456" class="mono" font-size="11" font-weight="600" fill="#a83e55">05</text>
    <text x="346" y="482" class="display" font-size="15" font-weight="600" fill="#1e1e2a">Confused deputy</text>
    <text x="346" y="502" class="display" font-size="15" font-weight="600" fill="#1e1e2a">(privilege abuse)</text>
    <text x="346" y="525" class="body" font-size="11" font-style="italic" fill="#6b6f7c">L'agent agit avec ses droits</text>
    <text x="346" y="540" class="body" font-size="11" font-style="italic" fill="#6b6f7c">sur instruction non-fiable.</text>
  </g>

  <!-- B3 -->
  <g class="interactive" data-card="v06" tabindex="0" role="button" aria-label="Vecteur 6 — Exfil via metadata publique">
    <rect x="330" y="570" width="250" height="130" rx="3" fill="#fdfaf0" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="346" y="596" class="mono" font-size="11" font-weight="600" fill="#a83e55">06</text>
    <text x="346" y="622" class="display" font-size="15" font-weight="600" fill="#1e1e2a">Exfil via metadata</text>
    <text x="346" y="642" class="display" font-size="15" font-weight="600" fill="#1e1e2a">publique</text>
    <text x="346" y="665" class="body" font-size="11" font-style="italic" fill="#6b6f7c">Écriture dans commit message,</text>
    <text x="346" y="680" class="body" font-size="11" font-style="italic" fill="#6b6f7c">PR titre, log accessible.</text>
  </g>

  <!-- C1 -->
  <g class="interactive" data-card="v07" tabindex="0" role="button" aria-label="Vecteur 7 — Namespace collision">
    <rect x="600" y="290" width="250" height="130" rx="3" fill="#fdfaf0" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="616" y="316" class="mono" font-size="11" font-weight="600" fill="#a83e55">07</text>
    <text x="616" y="342" class="display" font-size="15" font-weight="600" fill="#1e1e2a">Namespace</text>
    <text x="616" y="362" class="display" font-size="15" font-weight="600" fill="#1e1e2a">collision</text>
    <text x="616" y="385" class="body" font-size="11" font-style="italic" fill="#6b6f7c">Deux serveurs exposent un</text>
    <text x="616" y="400" class="body" font-size="11" font-style="italic" fill="#6b6f7c">outil de même nom.</text>
  </g>

  <!-- C2 -->
  <g class="interactive" data-card="v08" tabindex="0" role="button" aria-label="Vecteur 8 — Tool shadowing + capability leak">
    <rect x="600" y="430" width="250" height="130" rx="3" fill="#fdfaf0" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="616" y="456" class="mono" font-size="11" font-weight="600" fill="#a83e55">08</text>
    <text x="616" y="482" class="display" font-size="15" font-weight="600" fill="#1e1e2a">Shadowing +</text>
    <text x="616" y="502" class="display" font-size="15" font-weight="600" fill="#1e1e2a">capability leak</text>
    <text x="616" y="525" class="body" font-size="11" font-style="italic" fill="#6b6f7c">Outil A mentionne outil B</text>
    <text x="616" y="540" class="body" font-size="11" font-style="italic" fill="#6b6f7c">pour s'y substituer.</text>
  </g>

  <!-- D1 -->
  <g class="interactive" data-card="v09" tabindex="0" role="button" aria-label="Vecteur 9 — OAuth / DCR pitfalls">
    <rect x="870" y="290" width="250" height="130" rx="3" fill="#fdfaf0" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="886" y="316" class="mono" font-size="11" font-weight="600" fill="#a83e55">09</text>
    <text x="886" y="342" class="display" font-size="15" font-weight="600" fill="#1e1e2a">OAuth / DCR</text>
    <text x="886" y="362" class="display" font-size="15" font-weight="600" fill="#1e1e2a">pitfalls</text>
    <text x="886" y="385" class="body" font-size="11" font-style="italic" fill="#6b6f7c">DCR open registration, token</text>
    <text x="886" y="400" class="body" font-size="11" font-style="italic" fill="#6b6f7c">passthrough, session hijack.</text>
  </g>

  <!-- D2 -->
  <g class="interactive" data-card="v10" tabindex="0" role="button" aria-label="Vecteur 10 — Supply chain">
    <rect x="870" y="430" width="250" height="130" rx="3" fill="#fdfaf0" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="886" y="456" class="mono" font-size="11" font-weight="600" fill="#a83e55">10</text>
    <text x="886" y="482" class="display" font-size="15" font-weight="600" fill="#1e1e2a">Supply chain</text>
    <text x="886" y="502" class="display" font-size="15" font-weight="600" fill="#1e1e2a">(NPM, PyPI)</text>
    <text x="886" y="525" class="body" font-size="11" font-style="italic" fill="#6b6f7c">Typosquatting, compromission</text>
    <text x="886" y="540" class="body" font-size="11" font-style="italic" fill="#6b6f7c">upstream, dépendance transitive.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#9a9ca5" stroke-width="0.5"/>
  <text x="60" y="765" class="body" font-size="12" font-style="italic" fill="#9a9ca5">Source : compilation Anthropic + Invariant Labs + Pillar + Snyk + PortSwigger + OWASP LLM v2025 ; analyse de l'auteur.</text>
</svg>
