<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-06">
  <title id="title-06">Matrice défensive — 10 vecteurs × 10 patterns</title>
  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#faf6ec"/>

  <!-- Header -->
  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#b8582e">SCHÉMA 06</text>
  <text x="60" y="96" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1e1e2a">Matrice défensive — 10 vecteurs × 10 patterns</text>
  <text x="60" y="124" class="display" font-size="18" font-style="italic" fill="#6b6f7c">Quatre patterns load-bearing couvrent les neuf dixièmes du risque</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#9a9ca5" stroke-width="0.5"/>

  <!-- Grid setup -->
  <!-- Row labels (10 vectors) start at x=60, width=190 -->
  <!-- Columns start at x=260, each col width=80, gap 0 ; 10 cols → ends at 1060 -->
  <!-- Header row at y=180-260 (rotated col labels) -->
  <!-- Data rows: row1 y=270, height 38, total height 380 -->

  <!-- Row labels -->
  <text x="60" y="295" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600">V01</tspan> · Description statique</text>
  <text x="60" y="333" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600">V02</tspan> · Rug pull</text>
  <text x="60" y="371" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600">V03</tspan> · Unicode / line-jump</text>
  <text x="60" y="409" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600">V04</tspan> · Cross-document</text>
  <text x="60" y="447" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600">V05</tspan> · Confused deputy</text>
  <text x="60" y="485" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600">V06</tspan> · Exfil metadata</text>
  <text x="60" y="523" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600">V07</tspan> · Namespace</text>
  <text x="60" y="561" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600">V08</tspan> · Shadowing</text>
  <text x="60" y="599" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600">V09</tspan> · OAuth / DCR</text>
  <text x="60" y="637" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600">V10</tspan> · Supply chain</text>

  <!-- Column headers (rotated -40°), 10 patterns -->
  <!-- Each col center: 300, 380, 460, 540, 620, 700, 780, 860, 940, 1020 -->

  <!-- Load-bearing background for cols 1, 2, 3, 4 -->
  <rect x="260" y="270" width="80" height="380" fill="#fdf3ec"/>
  <rect x="340" y="270" width="80" height="380" fill="#fdf3ec"/>
  <rect x="420" y="270" width="80" height="380" fill="#fdf3ec"/>
  <rect x="500" y="270" width="80" height="380" fill="#fdf3ec"/>

  <!-- Grid lines -->
  <g stroke="#9a9ca5" stroke-width="0.5">
    <line x1="260" y1="270" x2="1060" y2="270"/>
    <line x1="260" y1="308" x2="1060" y2="308"/>
    <line x1="260" y1="346" x2="1060" y2="346"/>
    <line x1="260" y1="384" x2="1060" y2="384"/>
    <line x1="260" y1="422" x2="1060" y2="422"/>
    <line x1="260" y1="460" x2="1060" y2="460"/>
    <line x1="260" y1="498" x2="1060" y2="498"/>
    <line x1="260" y1="536" x2="1060" y2="536"/>
    <line x1="260" y1="574" x2="1060" y2="574"/>
    <line x1="260" y1="612" x2="1060" y2="612"/>
    <line x1="260" y1="650" x2="1060" y2="650"/>
    <line x1="260" y1="270" x2="260" y2="650"/>
    <line x1="340" y1="270" x2="340" y2="650"/>
    <line x1="420" y1="270" x2="420" y2="650"/>
    <line x1="500" y1="270" x2="500" y2="650"/>
    <line x1="580" y1="270" x2="580" y2="650"/>
    <line x1="660" y1="270" x2="660" y2="650"/>
    <line x1="740" y1="270" x2="740" y2="650"/>
    <line x1="820" y1="270" x2="820" y2="650"/>
    <line x1="900" y1="270" x2="900" y2="650"/>
    <line x1="980" y1="270" x2="980" y2="650"/>
    <line x1="1060" y1="270" x2="1060" y2="650"/>
  </g>

  <!-- Column headers (interactive, rotated text) -->
  <g class="interactive" data-card="pat1" tabindex="0" role="button" aria-label="Pattern 1 — Sigstore + hash pinning (load-bearing)">
    <rect x="260" y="170" width="80" height="100" fill="#fdf3ec" stroke="none"/>
    <text transform="translate(300 265) rotate(-50)" class="display" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="start">P1 · Sigstore</text>
    <text x="300" y="195" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" text-anchor="middle">★</text>
  </g>
  <g class="interactive" data-card="pat2" tabindex="0" role="button" aria-label="Pattern 2 — Tool tagging (load-bearing)">
    <rect x="340" y="170" width="80" height="100" fill="#fdf3ec" stroke="none"/>
    <text transform="translate(380 265) rotate(-50)" class="display" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="start">P2 · Tagging</text>
    <text x="380" y="195" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" text-anchor="middle">★</text>
  </g>
  <g class="interactive" data-card="pat3" tabindex="0" role="button" aria-label="Pattern 3 — Allowlist namespace (load-bearing)">
    <rect x="420" y="170" width="80" height="100" fill="#fdf3ec" stroke="none"/>
    <text transform="translate(460 265) rotate(-50)" class="display" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="start">P3 · Allowlist</text>
    <text x="460" y="195" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" text-anchor="middle">★</text>
  </g>
  <g class="interactive" data-card="pat4" tabindex="0" role="button" aria-label="Pattern 4 — Human-in-the-loop writes (load-bearing)">
    <rect x="500" y="170" width="80" height="100" fill="#fdf3ec" stroke="none"/>
    <text transform="translate(540 265) rotate(-50)" class="display" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="start">P4 · HITL writes</text>
    <text x="540" y="195" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" text-anchor="middle">★</text>
  </g>
  <g class="interactive" data-card="pat5" tabindex="0" role="button" aria-label="Pattern 5 — Sandbox processus">
    <text transform="translate(620 265) rotate(-50)" class="display" font-size="13" font-weight="500" fill="#1e1e2a" text-anchor="start">P5 · Sandbox</text>
  </g>
  <g class="interactive" data-card="pat6" tabindex="0" role="button" aria-label="Pattern 6 — OAuth scope-narrow">
    <text transform="translate(700 265) rotate(-50)" class="display" font-size="13" font-weight="500" fill="#1e1e2a" text-anchor="start">P6 · OAuth scope</text>
  </g>
  <g class="interactive" data-card="pat7" tabindex="0" role="button" aria-label="Pattern 7 — Refresh rotation">
    <text transform="translate(780 265) rotate(-50)" class="display" font-size="13" font-weight="500" fill="#1e1e2a" text-anchor="start">P7 · Refresh rot.</text>
  </g>
  <g class="interactive" data-card="pat8" tabindex="0" role="button" aria-label="Pattern 8 — OTel audit log">
    <text transform="translate(860 265) rotate(-50)" class="display" font-size="13" font-weight="500" fill="#1e1e2a" text-anchor="start">P8 · OTel audit</text>
  </g>
  <g class="interactive" data-card="pat9" tabindex="0" role="button" aria-label="Pattern 9 — Rate limiting">
    <text transform="translate(940 265) rotate(-50)" class="display" font-size="13" font-weight="500" fill="#1e1e2a" text-anchor="start">P9 · Rate limit</text>
  </g>
  <g class="interactive" data-card="pat10" tabindex="0" role="button" aria-label="Pattern 10 — Content provenance">
    <text transform="translate(1020 265) rotate(-50)" class="display" font-size="13" font-weight="500" fill="#1e1e2a" text-anchor="start">P10 · Provenance</text>
  </g>

  <!-- Cells : "●"=full cover, "◐"=partial, blank=none. Coords: col_center, row_center -->
  <!-- Row 1 (V01) — covered by P1 (full), P2 (partial), P5 (partial), P10 (partial) -->
  <text x="300" y="294" class="body" font-size="18" font-weight="600" fill="#b8582e" text-anchor="middle">●</text>
  <text x="380" y="294" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>
  <text x="620" y="294" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>
  <text x="1020" y="294" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>

  <!-- Row 2 (V02 rug pull) — P1 full -->
  <text x="300" y="332" class="body" font-size="18" font-weight="600" fill="#b8582e" text-anchor="middle">●</text>
  <text x="380" y="332" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>

  <!-- Row 3 (V03 unicode) — P1 partial, P2 full -->
  <text x="300" y="370" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>
  <text x="380" y="370" class="body" font-size="18" font-weight="600" fill="#b8582e" text-anchor="middle">●</text>

  <!-- Row 4 (V04 cross-document) — P4 full, P2 partial, P10 partial -->
  <text x="380" y="408" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>
  <text x="540" y="408" class="body" font-size="18" font-weight="600" fill="#b8582e" text-anchor="middle">●</text>
  <text x="860" y="408" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>
  <text x="1020" y="408" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>

  <!-- Row 5 (V05 confused deputy) — P2 full, P4 full, P5 partial -->
  <text x="380" y="446" class="body" font-size="18" font-weight="600" fill="#b8582e" text-anchor="middle">●</text>
  <text x="540" y="446" class="body" font-size="18" font-weight="600" fill="#b8582e" text-anchor="middle">●</text>
  <text x="620" y="446" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>

  <!-- Row 6 (V06 exfil metadata) — P4 full, P9 partial, P10 partial, P8 partial -->
  <text x="540" y="484" class="body" font-size="18" font-weight="600" fill="#b8582e" text-anchor="middle">●</text>
  <text x="860" y="484" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>
  <text x="940" y="484" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>
  <text x="1020" y="484" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>

  <!-- Row 7 (V07 namespace) — P3 full -->
  <text x="460" y="522" class="body" font-size="18" font-weight="600" fill="#b8582e" text-anchor="middle">●</text>

  <!-- Row 8 (V08 shadowing) — P3 full, P2 partial -->
  <text x="380" y="560" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>
  <text x="460" y="560" class="body" font-size="18" font-weight="600" fill="#b8582e" text-anchor="middle">●</text>

  <!-- Row 9 (V09 OAuth) — P6 full, P7 full, P9 partial -->
  <text x="700" y="598" class="body" font-size="18" font-weight="600" fill="#b8582e" text-anchor="middle">●</text>
  <text x="780" y="598" class="body" font-size="18" font-weight="600" fill="#b8582e" text-anchor="middle">●</text>
  <text x="940" y="598" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>

  <!-- Row 10 (V10 supply chain) — P1 full, P5 partial -->
  <text x="300" y="636" class="body" font-size="18" font-weight="600" fill="#b8582e" text-anchor="middle">●</text>
  <text x="620" y="636" class="body" font-size="18" fill="#6b6f7c" text-anchor="middle">◐</text>

  <!-- Load-bearing label -->
  <text x="60" y="690" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#a83e55">★ PATTERNS LOAD-BEARING (4 SUR 10)</text>
  <line x1="60" y1="702" x2="430" y2="702" stroke="#9a9ca5" stroke-width="0.5"/>

  <!-- Legend -->
  <text x="60" y="725" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600" fill="#b8582e">●</tspan> couverture pleine — élimine ou rend non-exploitable</text>
  <text x="60" y="745" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600" fill="#6b6f7c">◐</tspan> couverture partielle — réduit la blast radius sans prévenir l'attaque</text>
  <text x="600" y="725" class="body" font-size="12" fill="#1e1e2a">Aucun pattern ne couvre seul plus de 4 vecteurs.</text>
  <text x="600" y="745" class="body" font-size="12" fill="#1e1e2a">Defense in depth : 4 load-bearing + 2–3 secondaires.</text>

  <!-- Footer -->
  <line x1="60" y1="770" x2="1140" y2="770" stroke="#9a9ca5" stroke-width="0.5"/>
  <text x="60" y="790" class="body" font-size="12" font-style="italic" fill="#9a9ca5">Source : compilation de l'auteur à partir des sources citées ; niveaux de couverture estimés (mai 2026).</text>
</svg>
