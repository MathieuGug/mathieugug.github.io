<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-07">
  <title id="title-07">Roadmap sécurité MCP — 12 mois</title>
  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#faf6ec"/>

  <!-- Header -->
  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#b8582e">SCHÉMA 07</text>
  <text x="60" y="96" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1e1e2a">Roadmap sécurité MCP — mai 2026 → mai 2027</text>
  <text x="60" y="124" class="display" font-size="18" font-style="italic" fill="#6b6f7c">Quatre milestones — la confiance migre du runtime vers l'install</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#9a9ca5" stroke-width="0.5"/>

  <!-- Time axis : horizontal at y=520 from x=100 to x=1140 -->
  <line x1="100" y1="520" x2="1140" y2="520" stroke="#1e1e2a" stroke-width="1.25"/>

  <!-- Tick marks every 90 days, labels -->
  <!-- 6 ticks : mai 26, juil 26, sep 26, nov 26, jan 27, mar 27, mai 27 -->
  <g stroke="#9a9ca5" stroke-width="0.5" fill="none">
    <line x1="100" y1="515" x2="100" y2="525"/>
    <line x1="273" y1="515" x2="273" y2="525"/>
    <line x1="446" y1="515" x2="446" y2="525"/>
    <line x1="620" y1="515" x2="620" y2="525"/>
    <line x1="793" y1="515" x2="793" y2="525"/>
    <line x1="966" y1="515" x2="966" y2="525"/>
    <line x1="1140" y1="515" x2="1140" y2="525"/>
  </g>
  <g class="mono" font-size="10" fill="#9a9ca5" text-anchor="middle">
    <text x="100" y="545">MAI 2026</text>
    <text x="273" y="545">JUIL 2026</text>
    <text x="446" y="545">SEP 2026</text>
    <text x="620" y="545">NOV 2026</text>
    <text x="793" y="545">JAN 2027</text>
    <text x="966" y="545">MAR 2027</text>
    <text x="1140" y="545">MAI 2027</text>
  </g>

  <!-- Three parallel tracks ABOVE the axis (regulation, spec, ecosystem) and below (industry pivot) -->
  <text x="60" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#6b6f7c">RÉGULATION</text>
  <text x="60" y="300" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#6b6f7c">PROTOCOLE</text>
  <text x="60" y="400" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#6b6f7c">ÉCOSYSTÈME</text>
  <text x="60" y="630" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#6b6f7c">PIVOT INDUSTRIE</text>

  <!-- Milestone 1: AI Act art. 15 — 2 août 2026 → x ≈ 295 -->
  <g class="interactive" data-card="m1" tabindex="0" role="button" aria-label="Milestone 1 — AI Act article 15">
    <line x1="295" y1="215" x2="295" y2="520" stroke="#b8582e" stroke-width="1" stroke-dasharray="3 3"/>
    <rect x="170" y="170" width="260" height="65" rx="3" fill="#fdf3ec" stroke="#b8582e" stroke-width="1.4"/>
    <text x="184" y="190" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#a83e55">2 AOÛT 2026</text>
    <text x="184" y="210" class="display" font-size="15" font-weight="600" fill="#1e1e2a">AI Act art. 15 — cybersec</text>
    <text x="184" y="226" class="body" font-size="11" fill="#6b6f7c">Exigences UE pour systèmes haut risque.</text>
    <circle cx="295" cy="520" r="9" fill="#b8582e"/>
    <text x="295" y="524" class="mono" font-size="10" font-weight="600" fill="#faf6ec" text-anchor="middle">1</text>
  </g>

  <!-- Milestone 2: MCP v2 spec — automne 2026 → x ≈ 560 -->
  <g class="interactive" data-card="m2" tabindex="0" role="button" aria-label="Milestone 2 — Spec MCP v2 (Sigstore)">
    <line x1="560" y1="315" x2="560" y2="520" stroke="#b8582e" stroke-width="1" stroke-dasharray="3 3"/>
    <rect x="440" y="270" width="280" height="65" rx="3" fill="#fdf3ec" stroke="#b8582e" stroke-width="1.4"/>
    <text x="454" y="290" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#a83e55">AUTOMNE 2026</text>
    <text x="454" y="310" class="display" font-size="15" font-weight="600" fill="#1e1e2a">Spec MCP v2 — Sigstore</text>
    <text x="454" y="326" class="body" font-size="11" fill="#6b6f7c">Signature obligatoire, tagging, allowlist.</text>
    <circle cx="560" cy="520" r="9" fill="#b8582e"/>
    <text x="560" y="524" class="mono" font-size="10" font-weight="600" fill="#faf6ec" text-anchor="middle">2</text>
  </g>

  <!-- Milestone 3: Registries signés — hiver 2026-27 → x ≈ 820 -->
  <g class="interactive" data-card="m3" tabindex="0" role="button" aria-label="Milestone 3 — Registries signés (Anthropic Hub, AAIF)">
    <line x1="820" y1="415" x2="820" y2="520" stroke="#b8582e" stroke-width="1" stroke-dasharray="3 3"/>
    <rect x="700" y="370" width="270" height="65" rx="3" fill="#fdf3ec" stroke="#b8582e" stroke-width="1.4"/>
    <text x="714" y="390" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#a83e55">JANVIER 2027</text>
    <text x="714" y="410" class="display" font-size="15" font-weight="600" fill="#1e1e2a">Registries signés</text>
    <text x="714" y="426" class="body" font-size="11" fill="#6b6f7c">Anthropic Hub + AAIF refusent les non-signés.</text>
    <circle cx="820" cy="520" r="9" fill="#b8582e"/>
    <text x="820" y="524" class="mono" font-size="10" font-weight="600" fill="#faf6ec" text-anchor="middle">3</text>
  </g>

  <!-- Milestone 4: MCP / A2A convergence — printemps 2027 → x ≈ 1020 -->
  <g class="interactive" data-card="m4" tabindex="0" role="button" aria-label="Milestone 4 — Convergence MCP / A2A">
    <line x1="1020" y1="515" x2="1020" y2="640" stroke="#b8582e" stroke-width="1" stroke-dasharray="3 3"/>
    <rect x="880" y="645" width="260" height="65" rx="3" fill="#fdf3ec" stroke="#b8582e" stroke-width="1.4"/>
    <text x="894" y="665" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#a83e55">PRINTEMPS 2027</text>
    <text x="894" y="685" class="display" font-size="15" font-weight="600" fill="#1e1e2a">MCP × A2A convergent</text>
    <text x="894" y="701" class="body" font-size="11" fill="#6b6f7c">Sampling unifie les surfaces ; spec commune.</text>
    <circle cx="1020" cy="520" r="9" fill="#b8582e"/>
    <text x="1020" y="524" class="mono" font-size="10" font-weight="600" fill="#faf6ec" text-anchor="middle">4</text>
  </g>

  <!-- Pivot annotation: arrow showing migration from runtime to install -->
  <line x1="150" y1="630" x2="980" y2="630" stroke="#1a5c6b" stroke-width="2"/>
  <polygon points="980,630 970,625 970,635" fill="#1a5c6b"/>
  <text x="150" y="620" class="body" font-size="13" font-style="italic" fill="#1a5c6b" font-weight="600">Le contrat de confiance migre du runtime (audit) vers l'install (signature) — pivot structurel 2026-27</text>

  <!-- Footer -->
  <line x1="60" y1="750" x2="1140" y2="750" stroke="#9a9ca5" stroke-width="0.5"/>
  <text x="60" y="775" class="body" font-size="12" font-style="italic" fill="#9a9ca5">Source : AAIF discussion (fév.-mai 2026) ; AI Act Journal Officiel UE ; Sigstore project ; analyse de l'auteur.</text>
</svg>
