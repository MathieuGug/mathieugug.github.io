<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-01">
  <title id="title-01">Anatomie d'un appel MCP — les six trust boundaries</title>
  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="arr01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6f7c"/>
    </marker>
    <marker id="arr01e" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#faf6ec"/>

  <!-- Header -->
  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#b8582e">SCHÉMA 01</text>
  <text x="60" y="96" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1e1e2a">Anatomie d'un appel MCP</text>
  <text x="60" y="124" class="display" font-size="18" font-style="italic" fill="#6b6f7c">Six trust boundaries entre l'utilisateur et la donnée</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#9a9ca5" stroke-width="0.5"/>

  <!-- Row of seven boxes : USER → HOST → CLIENT → SERVER → TOOL → DATA, with MODEL above -->
  <!-- y center row at 410, boxes 130 wide x 110 tall, gaps 50 -->
  <!-- positions: USER (60), HOST (240), CLIENT (420), SERVER (600), TOOL (780), DATA (960)  → 6 boxes -->

  <g class="interactive" data-card="user" tabindex="0" role="button" aria-label="Utilisateur — point d'entrée">
    <rect x="60" y="355" width="130" height="110" rx="3" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="125" y="395" class="display" font-size="15" font-weight="600" fill="#1e1e2a" text-anchor="middle">USER</text>
    <text x="125" y="420" class="body" font-size="12" fill="#6b6f7c" text-anchor="middle">prompt</text>
    <text x="125" y="438" class="body" font-size="12" fill="#6b6f7c" text-anchor="middle">consent</text>
  </g>

  <g class="interactive" data-card="host" tabindex="0" role="button" aria-label="Host — Claude Desktop, Cursor, etc.">
    <rect x="240" y="355" width="130" height="110" rx="3" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="305" y="395" class="display" font-size="15" font-weight="600" fill="#1e1e2a" text-anchor="middle">HOST</text>
    <text x="305" y="420" class="body" font-size="12" fill="#6b6f7c" text-anchor="middle">Claude Desktop</text>
    <text x="305" y="438" class="body" font-size="12" fill="#6b6f7c" text-anchor="middle">Cursor · Cline</text>
  </g>

  <g class="interactive" data-card="client" tabindex="0" role="button" aria-label="Client MCP">
    <rect x="420" y="355" width="130" height="110" rx="3" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="485" y="395" class="display" font-size="15" font-weight="600" fill="#1e1e2a" text-anchor="middle">CLIENT</text>
    <text x="485" y="420" class="body" font-size="12" fill="#6b6f7c" text-anchor="middle">MCP runtime</text>
    <text x="485" y="438" class="body" font-size="12" fill="#6b6f7c" text-anchor="middle">stdio · HTTP</text>
  </g>

  <g class="interactive" data-card="server" tabindex="0" role="button" aria-label="Serveur MCP">
    <rect x="600" y="355" width="130" height="110" rx="3" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="665" y="395" class="display" font-size="15" font-weight="600" fill="#1e1e2a" text-anchor="middle">SERVER</text>
    <text x="665" y="420" class="body" font-size="12" fill="#6b6f7c" text-anchor="middle">expose tools</text>
    <text x="665" y="438" class="body" font-size="12" fill="#6b6f7c" text-anchor="middle">expose resources</text>
  </g>

  <g class="interactive" data-card="tool" tabindex="0" role="button" aria-label="Outil exposé par le serveur">
    <rect x="780" y="355" width="130" height="110" rx="3" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="845" y="395" class="display" font-size="15" font-weight="600" fill="#1e1e2a" text-anchor="middle">TOOL</text>
    <text x="845" y="420" class="body" font-size="12" fill="#6b6f7c" text-anchor="middle">read · write</text>
    <text x="845" y="438" class="body" font-size="12" fill="#6b6f7c" text-anchor="middle">side effects</text>
  </g>

  <g class="interactive" data-card="data" tabindex="0" role="button" aria-label="Donnée externe">
    <rect x="960" y="355" width="130" height="110" rx="3" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="1025" y="395" class="display" font-size="15" font-weight="600" fill="#1e1e2a" text-anchor="middle">DATA</text>
    <text x="1025" y="420" class="body" font-size="12" fill="#6b6f7c" text-anchor="middle">filesystem · API</text>
    <text x="1025" y="438" class="body" font-size="12" fill="#6b6f7c" text-anchor="middle">issues · emails</text>
  </g>

  <!-- Arrows between boxes (left-to-right and back) -->
  <line x1="195" y1="410" x2="234" y2="410" stroke="#6b6f7c" stroke-width="1.25" marker-end="url(#arr01)"/>
  <line x1="375" y1="410" x2="414" y2="410" stroke="#6b6f7c" stroke-width="1.25" marker-end="url(#arr01)"/>
  <line x1="555" y1="410" x2="594" y2="410" stroke="#6b6f7c" stroke-width="1.25" marker-end="url(#arr01)"/>
  <line x1="735" y1="410" x2="774" y2="410" stroke="#6b6f7c" stroke-width="1.25" marker-end="url(#arr01)"/>
  <line x1="915" y1="410" x2="954" y2="410" stroke="#6b6f7c" stroke-width="1.25" marker-end="url(#arr01)"/>

  <!-- MODEL box above, linking back to user -->
  <rect x="420" y="200" width="310" height="100" rx="3" fill="#fdf3ec" stroke="#b8582e" stroke-width="1.4"/>
  <text x="575" y="232" class="display" font-size="16" font-weight="600" fill="#1e1e2a" text-anchor="middle">MODEL — le LLM</text>
  <text x="575" y="256" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">lit le contexte, décide les tool calls, génère la réponse</text>
  <text x="575" y="276" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">ne distingue pas instruction vs donnée</text>

  <!-- Curved arrow from DATA upward back to MODEL -->
  <path d="M 1025 355 C 1025 250 950 220 730 250" fill="none" stroke="#b8582e" stroke-width="1.5" marker-end="url(#arr01e)" stroke-dasharray="4 3"/>
  <text x="900" y="240" class="body" font-size="11" font-style="italic" fill="#b8582e">sortie outil = nouveau prompt</text>

  <!-- Arrow MODEL → USER (top) -->
  <path d="M 420 250 C 300 250 200 270 125 350" fill="none" stroke="#6b6f7c" stroke-width="1.25" marker-end="url(#arr01)"/>
  <text x="200" y="270" class="body" font-size="11" font-style="italic" fill="#6b6f7c">réponse</text>

  <!-- 6 Trust boundaries as dashed vertical lines between pairs -->
  <!-- TB1: USER-HOST at x=215 -->
  <g class="interactive" data-card="tb1" tabindex="0" role="button" aria-label="Frontière 1 — User → Host">
    <line x1="215" y1="330" x2="215" y2="500" stroke="#a83e55" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="215" cy="510" r="10" fill="#a83e55"/>
    <text x="215" y="514" class="mono" font-size="11" font-weight="600" fill="#faf6ec" text-anchor="middle">1</text>
  </g>

  <g class="interactive" data-card="tb2" tabindex="0" role="button" aria-label="Frontière 2 — Host → Client">
    <line x1="395" y1="330" x2="395" y2="500" stroke="#a83e55" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="395" cy="510" r="10" fill="#a83e55"/>
    <text x="395" y="514" class="mono" font-size="11" font-weight="600" fill="#faf6ec" text-anchor="middle">2</text>
  </g>

  <g class="interactive" data-card="tb3" tabindex="0" role="button" aria-label="Frontière 3 — Client → Server">
    <line x1="575" y1="330" x2="575" y2="500" stroke="#a83e55" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="575" cy="510" r="10" fill="#a83e55"/>
    <text x="575" y="514" class="mono" font-size="11" font-weight="600" fill="#faf6ec" text-anchor="middle">3</text>
  </g>

  <g class="interactive" data-card="tb4" tabindex="0" role="button" aria-label="Frontière 4 — Server → Tool">
    <line x1="755" y1="330" x2="755" y2="500" stroke="#a83e55" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="755" cy="510" r="10" fill="#a83e55"/>
    <text x="755" y="514" class="mono" font-size="11" font-weight="600" fill="#faf6ec" text-anchor="middle">4</text>
  </g>

  <g class="interactive" data-card="tb5" tabindex="0" role="button" aria-label="Frontière 5 — Tool → Data">
    <line x1="935" y1="330" x2="935" y2="500" stroke="#a83e55" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="935" cy="510" r="10" fill="#a83e55"/>
    <text x="935" y="514" class="mono" font-size="11" font-weight="600" fill="#faf6ec" text-anchor="middle">5</text>
  </g>

  <g class="interactive" data-card="tb6" tabindex="0" role="button" aria-label="Frontière 6 — Data → Model (rebouclage)">
    <line x1="1100" y1="330" x2="1100" y2="240" stroke="#a83e55" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="1100" cy="230" r="10" fill="#a83e55"/>
    <text x="1100" y="234" class="mono" font-size="11" font-weight="600" fill="#faf6ec" text-anchor="middle">6</text>
  </g>

  <!-- Legend (below) -->
  <text x="60" y="580" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#6b6f7c">SIX FRONTIÈRES</text>
  <line x1="60" y1="592" x2="240" y2="592" stroke="#9a9ca5" stroke-width="0.5"/>

  <text x="60" y="618" class="body" font-size="13" fill="#1e1e2a"><tspan font-weight="600" fill="#a83e55">1.</tspan> User → Host — consent à l'install, lisibilité des descriptions.</text>
  <text x="60" y="640" class="body" font-size="13" fill="#1e1e2a"><tspan font-weight="600" fill="#a83e55">2.</tspan> Host → Client — sandbox processus, capabilities Linux.</text>
  <text x="60" y="662" class="body" font-size="13" fill="#1e1e2a"><tspan font-weight="600" fill="#a83e55">3.</tspan> Client → Server — OAuth scope, transport TLS, session ID.</text>
  <text x="610" y="618" class="body" font-size="13" fill="#1e1e2a"><tspan font-weight="600" fill="#a83e55">4.</tspan> Server → Tool — signature, hash pinning, tagging read/write.</text>
  <text x="610" y="640" class="body" font-size="13" fill="#1e1e2a"><tspan font-weight="600" fill="#a83e55">5.</tspan> Tool → Data — credentials scope, allowlist namespace.</text>
  <text x="610" y="662" class="body" font-size="13" fill="#1e1e2a"><tspan font-weight="600" fill="#a83e55">6.</tspan> Data → Model — content provenance, encapsulation <tspan class="mono" font-size="12">&lt;external_data&gt;</tspan>.</text>

  <!-- Footer -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#9a9ca5" stroke-width="0.5"/>
  <text x="60" y="755" class="body" font-size="12" font-style="italic" fill="#9a9ca5">Source : Anthropic MCP spec 2025-11 ; Invariant Labs (mars 2025) ; analyse de l'auteur.</text>
</svg>
