  <rect width="1600" height="1130" fill="#faf6ec"/>
  <text x="1360" y="200" class="acte-num">II</text>
  <text x="50" y="42" class="acte-tag">ACTE II</text>
  <text x="50" y="98" class="acte-title">La boucle</text>
  <text x="50" y="130" class="acte-subtitle">Anneaux 01-04. C'est ici que se gagne ou se perd le ROI, et que se constitue la dette technique.</text>
  <text x="50" y="170" class="acte-audience">LECTEUR CIBLE</text>
  <text x="50" y="190" class="acte-thesis">Agent engineer · tech lead · architecte · platform engineer</text>
  <text x="650" y="170" class="acte-audience">THÈSE</text>
  <text x="650" y="190" class="acte-thesis">Le harness — pas le modèle — fait l'agent. Reason · Act · Observe +</text>
  <text x="650" y="212" class="acte-thesis">budget de tours + mémoire instrumentée + patterns adaptés au cas</text>
  <text x="650" y="234" class="acte-thesis">d'usage.</text>
  <line x1="50" y1="240" x2="1550" y2="240" stroke="#2d8a8a" stroke-width="2"/>
  <rect x="50.0" y="260" width="285.6" height="520" class="card-bg" rx="6"/>
  <rect x="50.0" y="260" width="285.6" height="80" class="card-stripe" rx="6"/>
  <rect x="50.0" y="320" width="285.6" height="20" class="card-stripe"/>
  <text x="64.0" y="310" class="card-num">7</text>
  <text x="321.6" y="290" text-anchor="end" class="card-tag">CHAPITRE</text>
  <text x="66.0" y="370" class="card-title">Reason · Act · Observe</text>
  <text x="66.0" y="415" class="card-label">CONTENU</text>
  <text x="66.0" y="431" class="card-fact">harness · stop_reason ·</text>
  <text x="66.0" y="447" class="card-fact">hooks</text>
  <text x="66.0" y="485" class="card-label">À RETENIR</text>
  <text x="66.0" y="501" class="card-claim">POC sans harness défensif =</text>
  <text x="66.0" y="518" class="card-claim">4 $/min en silence</text>
  <text x="66.0" y="557" class="card-label">SCHÉMA</text>
  <text x="66.0" y="573" class="card-schema">R1 boucle canonique + 3</text>
  <text x="66.0" y="587" class="card-schema">variantes</text>
