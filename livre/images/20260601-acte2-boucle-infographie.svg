  <text x="1232.4" y="290" text-anchor="end" class="card-tag">CHAPITRE</text>
  <text x="976.8" y="370" class="card-title">Compaction &amp; oubli</text>
  <text x="976.8" y="391" class="card-title">stratégique</text>
  <text x="976.8" y="436" class="card-label">CONTENU</text>
  <text x="976.8" y="452" class="card-fact">5 familles · triangle</text>
  <text x="976.8" y="468" class="card-fact">fidélité×coût×oubli</text>
  <text x="976.8" y="506" class="card-label">À RETENIR</text>
  <text x="976.8" y="522" class="card-claim">Lost in the Middle tient en</text>
  <text x="976.8" y="539" class="card-claim">2026</text>
  <text x="976.8" y="578" class="card-label">SCHÉMA</text>
  <text x="976.8" y="594" class="card-schema">R3 triangle + SpAIware</text>
  <rect x="1264.4" y="260" width="285.6" height="520" class="card-bg" rx="6"/>
  <rect x="1264.4" y="260" width="285.6" height="80" class="card-stripe" rx="6"/>
  <rect x="1264.4" y="320" width="285.6" height="20" class="card-stripe"/>
  <text x="1278.4" y="310" class="card-num">11</text>
  <text x="1536.0" y="290" text-anchor="end" class="card-tag">CHAPITRE</text>
  <text x="1280.4" y="370" class="card-title">Patterns canoniques &amp;</text>
  <text x="1280.4" y="391" class="card-title">orchestration</text>
  <text x="1280.4" y="436" class="card-label">CONTENU</text>
  <text x="1280.4" y="452" class="card-fact">8 patterns · 4 régimes</text>
  <text x="1280.4" y="468" class="card-fact">contrôle</text>
