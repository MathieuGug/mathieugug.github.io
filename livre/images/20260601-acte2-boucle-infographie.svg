  <text x="625.2" y="290" text-anchor="end" class="card-tag">CHAPITRE</text>
  <text x="369.6" y="370" class="card-title">Les outils (les mains</text>
  <text x="369.6" y="391" class="card-title">de l'agent)</text>
  <text x="369.6" y="436" class="card-label">CONTENU</text>
  <text x="369.6" y="452" class="card-fact">function calling · code</text>
  <text x="369.6" y="468" class="card-fact">exec · sandbox</text>
  <text x="369.6" y="506" class="card-label">À RETENIR</text>
  <text x="369.6" y="522" class="card-claim">execute_sql sans scoping =</text>
  <text x="369.6" y="539" class="card-claim">exfiltration en 3 tours</text>
