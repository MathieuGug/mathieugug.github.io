  <text x="673.2" y="415" class="card-label">CONTENU</text>
  <text x="673.2" y="431" class="card-fact">4 piliers × 6 opérations ×</text>
  <text x="673.2" y="447" class="card-fact">5 archis</text>
  <text x="673.2" y="485" class="card-label">À RETENIR</text>
  <text x="673.2" y="501" class="card-claim">Letta · A-MEM · Zep · Mem0 ·</text>
  <text x="673.2" y="518" class="card-claim">file-based</text>
  <text x="673.2" y="557" class="card-label">SCHÉMA</text>
  <text x="673.2" y="573" class="card-schema">R2 grille 4×5</text>
