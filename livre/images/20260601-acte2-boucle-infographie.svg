<svg id="svg-acte-II" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1130" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title-acte-II">
  <title id="title-acte-II">Acte II — La boucle</title>
  <desc>Infographie de l'Acte II du livre « Anatomie d'une IA agentique ». Synthèse des 6 chapitres : thèse, public cible, contenu de chaque chapitre, schéma signature.</desc>
  <style>
    #svg-acte-II .acte-tag { font: 700 14px 'JetBrains Mono', monospace; fill: #2d8a8a; letter-spacing: 0.18em; }
    #svg-acte-II .acte-num { font: 900 200px/1 'Fraunces', 'Georgia', serif; fill: #2d8a8a; opacity: 0.08; }
    #svg-acte-II .acte-title { font: 700 52px/1.1 'Fraunces', 'Georgia', serif; fill: #1a1a1a; }
    #svg-acte-II .acte-subtitle { font: italic 18px/1.4 'Inter', sans-serif; fill: #444; }
    #svg-acte-II .acte-audience { font: 600 13px 'Inter', sans-serif; fill: #2d8a8a; letter-spacing: 0.05em; }
    #svg-acte-II .acte-thesis { font: 16px/1.4 'Inter', sans-serif; fill: #1a1a1a; }
    #svg-acte-II .card-bg { fill: #ffffff; stroke: #d4cdb6; stroke-width: 0.8; }
    #svg-acte-II .card-stripe { fill: #2d8a8a; }
    #svg-acte-II .card-num { font: 700 32px 'Fraunces', 'Georgia', serif; fill: #fff; }
    #svg-acte-II .card-tag { font: 600 9px 'JetBrains Mono', monospace; fill: #fff; letter-spacing: 0.12em; }
    #svg-acte-II .card-title { font: 600 16px/1.25 'Inter', sans-serif; fill: #1a1a1a; }
    #svg-acte-II .card-fact { font: 600 12px 'JetBrains Mono', monospace; fill: #1a4a4a; }
    #svg-acte-II .card-claim { font: italic 13px/1.4 'Inter', sans-serif; fill: #333; }
    #svg-acte-II .card-schema { font: 11px 'JetBrains Mono', monospace; fill: #2d8a8a; }
    #svg-acte-II .card-label { font: 600 9px 'Inter', sans-serif; fill: #888; letter-spacing: 0.1em; }
    #svg-acte-II .callout-box { fill: #d8ecec; stroke: #2d8a8a; stroke-width: 1.2; }
    #svg-acte-II .callout-title { font: 700 14px 'Inter', sans-serif; fill: #1a4a4a; letter-spacing: 0.04em; }
    #svg-acte-II .callout-body { font: 13px/1.4 'Inter', sans-serif; fill: #1a1a1a; }
    #svg-acte-II .caption { font: italic 11px 'Inter', sans-serif; fill: #777; }
    #svg-acte-II .chapter-card { cursor: pointer; transition: transform .2s ease, filter .2s ease; transform-origin: center; transform-box: fill-box; }
    #svg-acte-II .chapter-card:hover .card-bg, #svg-acte-II .chapter-card:focus-visible .card-bg { fill: #fffdf6; }
    #svg-acte-II .chapter-card:focus { outline: none; }
    #svg-acte-II .chapter-card:focus-visible .card-bg { stroke: #2d8a8a; stroke-width: 2; }
  </style>
  <rect width="1600" height="1130" fill="#faf6ec"/>
  <text x="1360" y="200" class="acte-num">II</text>
  <text x="50" y="42" class="acte-tag">ACTE II</text>
  <text x="50" y="98" class="acte-title">La boucle</text>
  <text x="50" y="130" class="acte-subtitle">Le harness qui transforme un LLM bavard en agent : outils, mémoire, compaction, patterns d'orchestration.</text>
  <text x="50" y="170" class="acte-audience">LECTEUR CIBLE</text>
  <text x="50" y="190" class="acte-thesis">Agent engineer · tech lead · architecte · platform engineer</text>
  <text x="650" y="170" class="acte-audience">THÈSE</text>
  <text x="650" y="190" class="acte-thesis">Le harness — pas le modèle — fait l'agent. Reason · Act · Observe +</text>
  <text x="650" y="212" class="acte-thesis">budget de tours + mémoire instrumentée + patterns adaptés au cas</text>
  <text x="650" y="234" class="acte-thesis">d'usage.</text>
  <line x1="50" y1="240" x2="1550" y2="240" stroke="#2d8a8a" stroke-width="2"/>
  <g class="chapter-card" data-ch="7" data-slug="ch07-boucle-agentique" role="link" tabindex="0" aria-label="Chapitre 7 — Reason · Act · Observe">
  <rect x="50.0" y="260" width="235.0" height="520" class="card-bg" rx="6"/>
  <rect x="50.0" y="260" width="235.0" height="80" class="card-stripe" rx="6"/>
  <rect x="50.0" y="320" width="235.0" height="20" class="card-stripe"/>
  <text x="64.0" y="310" class="card-num">7</text>
  <text x="271.0" y="290" text-anchor="end" class="card-tag">CHAPITRE</text>
  <text x="66.0" y="370" class="card-title">Reason · Act ·</text>
  <text x="66.0" y="391" class="card-title">Observe</text>
  <text x="66.0" y="436" class="card-label">CONTENU</text>
  <text x="66.0" y="452" class="card-fact">harness · stop_reason ·</text>
  <text x="66.0" y="468" class="card-fact">hooks</text>
  <text x="66.0" y="506" class="card-label">À RETENIR</text>
  <text x="66.0" y="522" class="card-claim">POC sans harness défensif =</text>
  <text x="66.0" y="539" class="card-claim">4 $/min en silence</text>
  <text x="66.0" y="578" class="card-label">SCHÉMA</text>
  <text x="66.0" y="594" class="card-schema">R1 boucle canonique + 3</text>
  <text x="66.0" y="608" class="card-schema">variantes</text>
  </g>
  <g class="chapter-card" data-ch="8" data-slug="ch08-outils-de-lagent" role="link" tabindex="0" aria-label="Chapitre 8 — Les outils (les mains de l'agent)">
  <rect x="303.0" y="260" width="235.0" height="520" class="card-bg" rx="6"/>
  <rect x="303.0" y="260" width="235.0" height="80" class="card-stripe" rx="6"/>
  <rect x="303.0" y="320" width="235.0" height="20" class="card-stripe"/>
  <text x="317.0" y="310" class="card-num">8</text>
  <text x="524.0" y="290" text-anchor="end" class="card-tag">CHAPITRE</text>
  <text x="319.0" y="370" class="card-title">Les outils (les mains</text>
  <text x="319.0" y="391" class="card-title">de l'agent)</text>
  <text x="319.0" y="436" class="card-label">CONTENU</text>
  <text x="319.0" y="452" class="card-fact">function calling · code</text>
  <text x="319.0" y="468" class="card-fact">exec · sandbox</text>
  <text x="319.0" y="506" class="card-label">À RETENIR</text>
  <text x="319.0" y="522" class="card-claim">execute_sql sans scoping =</text>
  <text x="319.0" y="539" class="card-claim">exfiltration en 3 tours</text>
  <text x="319.0" y="578" class="card-label">SCHÉMA</text>
  <text x="319.0" y="594" class="card-schema">renvois Ch.15 (MCP) + Ch.21</text>
  <text x="319.0" y="608" class="card-schema">(sécu)</text>
  </g>
  <g class="chapter-card" data-ch="9" data-slug="ch09-memoire-agentique" role="link" tabindex="0" aria-label="Chapitre 9 — Mémoire agentique">
  <rect x="556.0" y="260" width="235.0" height="520" class="card-bg" rx="6"/>
  <rect x="556.0" y="260" width="235.0" height="80" class="card-stripe" rx="6"/>
  <rect x="556.0" y="320" width="235.0" height="20" class="card-stripe"/>
  <text x="570.0" y="310" class="card-num">9</text>
  <text x="777.0" y="290" text-anchor="end" class="card-tag">CHAPITRE</text>
  <text x="572.0" y="370" class="card-title">Mémoire agentique</text>
  <text x="572.0" y="415" class="card-label">CONTENU</text>
  <text x="572.0" y="431" class="card-fact">4 piliers × 6 opérations ×</text>
  <text x="572.0" y="447" class="card-fact">5 archis</text>
  <text x="572.0" y="485" class="card-label">À RETENIR</text>
  <text x="572.0" y="501" class="card-claim">Letta · A-MEM · Zep · Mem0</text>
  <text x="572.0" y="518" class="card-claim">· file-based</text>
  <text x="572.0" y="557" class="card-label">SCHÉMA</text>
  <text x="572.0" y="573" class="card-schema">R2 grille 4×5</text>
  </g>
  <g class="chapter-card" data-ch="10" data-slug="ch10-compaction" role="link" tabindex="0" aria-label="Chapitre 10 — Compaction &amp; oubli stratégique">
  <rect x="809.0" y="260" width="235.0" height="520" class="card-bg" rx="6"/>
  <rect x="809.0" y="260" width="235.0" height="80" class="card-stripe" rx="6"/>
  <rect x="809.0" y="320" width="235.0" height="20" class="card-stripe"/>
  <text x="823.0" y="310" class="card-num">10</text>
  <text x="1030.0" y="290" text-anchor="end" class="card-tag">CHAPITRE</text>
  <text x="825.0" y="370" class="card-title">Compaction &amp; oubli</text>
  <text x="825.0" y="391" class="card-title">stratégique</text>
  <text x="825.0" y="436" class="card-label">CONTENU</text>
  <text x="825.0" y="452" class="card-fact">5 familles · triangle</text>
  <text x="825.0" y="468" class="card-fact">fidélité×coût×oubli</text>
  <text x="825.0" y="506" class="card-label">À RETENIR</text>
  <text x="825.0" y="522" class="card-claim">Lost in the Middle tient en</text>
  <text x="825.0" y="539" class="card-claim">2026</text>
  <text x="825.0" y="578" class="card-label">SCHÉMA</text>
  <text x="825.0" y="594" class="card-schema">R3 triangle + SpAIware</text>
  </g>
  <g class="chapter-card" data-ch="11" data-slug="ch11-patterns-orchestration" role="link" tabindex="0" aria-label="Chapitre 11 — Patterns canoniques &amp; orchestration">
  <rect x="1062.0" y="260" width="235.0" height="520" class="card-bg" rx="6"/>
  <rect x="1062.0" y="260" width="235.0" height="80" class="card-stripe" rx="6"/>
  <rect x="1062.0" y="320" width="235.0" height="20" class="card-stripe"/>
  <text x="1076.0" y="310" class="card-num">11</text>
  <text x="1283.0" y="290" text-anchor="end" class="card-tag">CHAPITRE</text>
  <text x="1078.0" y="370" class="card-title">Patterns canoniques &amp;</text>
  <text x="1078.0" y="391" class="card-title">orchestration</text>
  <text x="1078.0" y="436" class="card-label">CONTENU</text>
  <text x="1078.0" y="452" class="card-fact">8 patterns · 4 régimes</text>
  <text x="1078.0" y="468" class="card-fact">contrôle</text>
  <text x="1078.0" y="506" class="card-label">À RETENIR</text>
  <text x="1078.0" y="522" class="card-claim">Klarna 67 % puis recul</text>
  <text x="1078.0" y="539" class="card-claim">partiel (5 % cas charges)</text>
  <text x="1078.0" y="578" class="card-label">SCHÉMA</text>
  <text x="1078.0" y="594" class="card-schema">R4 patterns + arbre buy/build</text>
  </g>
  <g class="chapter-card" data-ch="12" data-slug="ch12-adk-frameworks" role="link" tabindex="0" aria-label="Chapitre 12 — Construire la boucle : SDK, ADK, frameworks">
  <rect x="1315.0" y="260" width="235.0" height="520" class="card-bg" rx="6"/>
  <rect x="1315.0" y="260" width="235.0" height="80" class="card-stripe" rx="6"/>
  <rect x="1315.0" y="320" width="235.0" height="20" class="card-stripe"/>
  <text x="1329.0" y="310" class="card-num">12</text>
  <text x="1536.0" y="290" text-anchor="end" class="card-tag">CHAPITRE</text>
  <text x="1331.0" y="370" class="card-title">Construire la boucle</text>
  <text x="1331.0" y="391" class="card-title">: SDK, ADK,</text>
  <text x="1331.0" y="412" class="card-title">frameworks</text>
  <text x="1331.0" y="457" class="card-label">CONTENU</text>
  <text x="1331.0" y="473" class="card-fact">Agent SDK · ADK ·</text>
  <text x="1331.0" y="489" class="card-fact">LangGraph · Mastra</text>
  <text x="1331.0" y="527" class="card-label">À RETENIR</text>
  <text x="1331.0" y="543" class="card-claim">le fichier agent tient en</text>
  <text x="1331.0" y="560" class="card-claim">~50 lignes : le harness est</text>
  <text x="1331.0" y="577" class="card-claim">hérité</text>
  <text x="1331.0" y="616" class="card-label">SCHÉMA</text>
  <text x="1331.0" y="632" class="card-schema">matrice 4 voies</text>
  <text x="1331.0" y="646" class="card-schema">effort×contrôle</text>
  </g>
  <rect x="50.0" y="820" width="741.0" height="130" class="callout-box" rx="4"/>
  <text x="70.0" y="848" class="callout-title">LA RÈGLE SCHLUNTZ/ZHANG</text>
  <text x="70.0" y="874" class="callout-body">Start simple · measure · add complexity only when it delivers measurable value.</text>
  <rect x="809.0" y="820" width="741.0" height="130" class="callout-box" rx="4"/>
  <text x="829.0" y="848" class="callout-title">ADK ≠ RUNTIME ≠ SERVICES</text>
  <text x="829.0" y="874" class="callout-body">L'ADK définit la forme dans le code ; le runtime, où ça tourne ; les services,</text>
  <text x="829.0" y="894" class="callout-body">les briques (mémoire, identité, gateway). Confondre les trois est la source de</text>
  <text x="829.0" y="914" class="callout-body">confusion #1.</text>
  <text x="50" y="1114" class="caption">Livre « Anatomie d'une IA agentique » · Mathieu Guglielmino · état au 4 juin 2026 · mathieugug.github.io</text>
  <text x="1550" y="1114" text-anchor="end" class="caption">II / 4</text>
</svg>
