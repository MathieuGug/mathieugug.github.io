  <text x="1280.4" y="522" class="card-claim">Klarna 67 % puis recul</text>
  <text x="1280.4" y="539" class="card-claim">partiel (5 % cas charges)</text>
  <text x="1280.4" y="578" class="card-label">SCHÉMA</text>
  <text x="1280.4" y="594" class="card-schema">R4 patterns + arbre buy/build</text>
  <rect x="50.0" y="820" width="741.0" height="130" class="callout-box" rx="4"/>
  <text x="70.0" y="848" class="callout-title">LA RÈGLE SCHLUNTZ/ZHANG</text>
  <text x="70.0" y="874" class="callout-body">Start simple · measure · add complexity only when it delivers measurable value.</text>
  <rect x="809.0" y="820" width="741.0" height="130" class="callout-box" rx="4"/>
  <text x="829.0" y="848" class="callout-title">RISQUE #1 SUR-ORCHESTRATION</text>
  <text x="829.0" y="874" class="callout-body">Multi-agent prématuré = ×10-15 tokens, debug exponentiellement plus dur.</text>
  <text x="50" y="1114" class="caption">Livre « Anatomie d'une IA agentique » · Mathieu Guglielmino · état au 29 mai 2026 · mathieugug.github.io</text>
