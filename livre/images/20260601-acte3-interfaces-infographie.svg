    #svg-acte-III .card-label { font: 600 9px 'Inter', sans-serif; fill: #888; letter-spacing: 0.1em; }
    #svg-acte-III .callout-box { fill: #f0d8d8; stroke: #7a1e1e; stroke-width: 1.2; }
