<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1130" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title-acte-III">
  <title id="title-acte-III">Acte III — Les interfaces</title>
  <desc>Infographie de l'Acte III du livre « Anatomie d'une IA agentique ». Synthèse des 5 chapitres : thèse, public cible, contenu de chaque chapitre, schéma signature.</desc>
