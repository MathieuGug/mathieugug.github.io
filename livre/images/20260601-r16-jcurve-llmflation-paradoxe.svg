<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1130" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title-r16">
  <title id="title-r16">R16 — Productivity J-curve × LLMflation × paradoxe agentique</title>
  <defs><marker id="arr-up" viewBox="0 0 10 10" refX="5" refY="2" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,10 L5,0 L10,10 z" fill="#1a1a1a"/></marker></defs>
  <desc>Double-page éco : trois lectures de la même facture agentique 2026. Panel A LLMflation prix/token ×1000 en 4 ans. Panel B stack 4 niveaux paradoxe agentique (token → tâche → processus → outcome). Panel C J-curve Brynjolfsson productivité vraie vs mesurée. Bandeau bas : 3 régimes temporels court/moyen/long.</desc>
  <style>
    .acte-tag { font: 700 12px 'JetBrains Mono', monospace; fill: #b8582e; letter-spacing: 0.18em; }
    .title { font: 700 36px/1.1 'Fraunces', 'Georgia', serif; fill: #1a1a1a; }
    .subtitle { font: italic 15px/1.4 'Inter', sans-serif; fill: #444; }
    .panel-title { font: 600 18px 'Fraunces', 'Georgia', serif; fill: #1a1a1a; }
    .panel-sub { font: italic 12px 'Inter', sans-serif; fill: #666; }
    .label { font: 11px 'JetBrains Mono', monospace; fill: #444; }
    .label-em { font: 600 11px 'JetBrains Mono', monospace; fill: #1a1a1a; }
    .label-small { font: 10px 'Inter', sans-serif; fill: #666; }
    .annotation { font: italic 12px 'Inter', sans-serif; fill: #444; }
    .annotation-em { font: italic 13px 'Inter', sans-serif; fill: #b8582e; }
    .axis-bold { stroke: #1a1a1a; stroke-width: 0.9; }
    .grid { stroke: #d4cdb6; stroke-width: 0.5; stroke-dasharray: 2,3; }
    .llmflation-curve { stroke: #b8582e; stroke-width: 2.5; fill: none; }
    .true-curve { stroke: #2d8a8a; stroke-width: 2.5; fill: none; }
    .measured-curve { stroke: #7a1e1e; stroke-width: 2.5; fill: none; stroke-dasharray: 6,3; }
    .stack-layer { stroke: #b8582e; stroke-width: 1; }
    .stack-text { font: 600 14px 'Inter', sans-serif; fill: #1a1a1a; }
    .stack-detail { font: 11px 'Inter', sans-serif; fill: #444; }
    .regime-box { fill: #f0e9d4; stroke: #b8582e; stroke-width: 0.8; }
    .regime-title { font: 700 11px 'Inter', sans-serif; fill: #5e2f17; letter-spacing: 0.06em; }
    .regime-body { font: 11px/1.35 'Inter', sans-serif; fill: #333; }
    .caption { font: italic 11px 'Inter', sans-serif; fill: #777; }
  </style>
  <rect width="1600" height="1130" fill="#faf6ec"/>
  <text x="50" y="40" class="acte-tag">SCHÉMA R16 · ACTE IV CHARNIÈRE Ch.21 · DOUBLE-PAGE ÉCO</text>
  <text x="50" y="84" class="title">Prix qui baisse, valeur qui monte lentement, courbe d'outcome dans le creux</text>
  <text x="50" y="110" class="subtitle">Trois lectures de la même facture agentique 2026 — coût/token (Acte I) × paradoxe agentique (Ch.21) × J-curve Brynjolfsson</text>
  <text x="60" y="190" class="panel-title">A · LLMflation : la chute ×1 000</text>
  <text x="60" y="210" class="panel-sub">Prix par million de tokens, log scale, 2021-2026 (a16z + InferenceMAX 2025)</text>
  <rect x="130" y="240" width="390" height="540" fill="none" stroke="#d4cdb6" stroke-width="0.6"/>
  <line x1="130" y1="780.0" x2="520" y2="780.0" class="grid"/>
  <text x="122" y="784.0" text-anchor="end" class="label">$0.01</text>
  <line x1="130" y1="645.0" x2="520" y2="645.0" class="grid"/>
  <text x="122" y="649.0" text-anchor="end" class="label">$0.10</text>
  <line x1="130" y1="510.0" x2="520" y2="510.0" class="grid"/>
  <text x="122" y="514.0" text-anchor="end" class="label">$1</text>
  <line x1="130" y1="375.0" x2="520" y2="375.0" class="grid"/>
  <text x="122" y="379.0" text-anchor="end" class="label">$10</text>
  <line x1="130" y1="240.0" x2="520" y2="240.0" class="grid"/>
  <text x="122" y="244.0" text-anchor="end" class="label">$100</text>
  <path d="M130.0,269.9 L192.4,310.6 L247.0,375.0 L301.6,445.6 L364.0,539.9 L442.0,674.9 L520.0,739.4" class="llmflation-curve"/>
  <line x1="130" y1="780" x2="520" y2="780" class="axis-bold"/>
  <text x="130.0" y="798" text-anchor="middle" class="label">2021</text>
  <text x="208.0" y="798" text-anchor="middle" class="label">2022</text>
  <text x="286.0" y="798" text-anchor="middle" class="label">2023</text>
  <text x="364.0" y="798" text-anchor="middle" class="label">2024</text>
  <text x="442.0" y="798" text-anchor="middle" class="label">2025</text>
  <text x="520.0" y="798" text-anchor="middle" class="label">2026</text>
  <text x="325.0" y="334.4" class="annotation-em">×1 000</text>
  <text x="325.0" y="351.2" class="annotation">en 4 ans</text>
  <rect x="286.0" y="240" width="117" height="540" fill="#b8582e" opacity="0.06"/>
  <text x="344.5" y="232" text-anchor="middle" class="label-small" fill="#7a1e1e">PagedAttention + FA-3</text>
  <text x="80" y="510.0" text-anchor="middle" class="label-em" transform="rotate(-90 80 510.0)">$/Mtok (log)</text>
  <text x="560.0" y="190" class="panel-title">B · Paradoxe agentique : où va la facture</text>
  <text x="560.0" y="210" class="panel-sub">Stack 4 niveaux — l'unité de mesure se déplace token → tâche → processus → outcome</text>
  <rect x="620.0" y="612.0" width="400" height="120.0" fill="#2d8a8a" opacity="0.85" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="636.0" y="640.0" class="stack-text" fill="#fff">TOKEN — coût technique direct</text>
  <text x="636.0" y="662.0" class="stack-detail" fill="#fff" opacity="0.95">Wh/req baisse, $/Mtok ×1/1000</text>
  <rect x="620.0" y="488.0" width="400" height="120.0" fill="#b8582e" opacity="0.75" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="636.0" y="516.0" class="stack-text" fill="#fff">TÂCHE — coût par cas d'usage</text>
  <text x="636.0" y="538.0" class="stack-detail" fill="#fff" opacity="0.95">AIME ×10-74 reasoning vs non-reasoning</text>
  <rect x="620.0" y="364.0" width="400" height="120.0" fill="#7a1e1e" opacity="0.7" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="636.0" y="392.0" class="stack-text" fill="#fff">PROCESSUS — coût de réallocation</text>
  <text x="636.0" y="414.0" class="stack-detail" fill="#fff" opacity="0.95">RH · formation · gouvernance · refonte UX</text>
  <rect x="620.0" y="240.0" width="400" height="120.0" fill="#5e2f17" opacity="0.85" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="636.0" y="268.0" class="stack-text" fill="#fff">OUTCOME — coût/bénéfice métier réel</text>
  <text x="636.0" y="290.0" class="stack-detail" fill="#fff" opacity="0.95">J-curve : creux 12-36 mois (cf. Panel C)</text>
  <line x1="590.0" y1="726.0" x2="590.0" y2="250.0" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#arr-up)"/>
  <text x="570.0" y="488.0" text-anchor="middle" class="label-em" transform="rotate(-90 570.0 488.0)">la valeur se construit en remontant</text>
  <text x="620.0" y="232" class="annotation-em">Klarna : 67% automatisé puis recul partiel</text>
  <text x="620.0" y="250" class="annotation">(excellent niveau tâche, outcome qualité ne suit pas)</text>
  <text x="1060.0" y="190" class="panel-title">C · J-curve Brynjolfsson</text>
  <text x="1060.0" y="210" class="panel-sub">Productivité métier : courbe vraie (teal) vs mesurée (carmin) sur 0-7 ans</text>
  <rect x="1120.0" y="240" width="400" height="540" fill="none" stroke="#d4cdb6" stroke-width="0.6"/>
  <line x1="1120.0" y1="240.0" x2="1520" y2="240.0" class="grid"/>
  <line x1="1120.0" y1="375.0" x2="1520" y2="375.0" class="grid"/>
  <line x1="1120.0" y1="510.0" x2="1520" y2="510.0" class="grid"/>
  <line x1="1120.0" y1="645.0" x2="1520" y2="645.0" class="grid"/>
  <line x1="1120.0" y1="780.0" x2="1520" y2="780.0" class="grid"/>
  <line x1="1120.0" y1="564.0" x2="1520" y2="564.0" stroke="#999" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="1112.0" y="568.0" text-anchor="end" class="label">0%</text>
  <path d="M1120.0,564.0 L1148.6,592.8 L1177.1,600.0 L1205.7,582.0 L1234.3,546.0 L1291.4,492.0 L1348.6,427.2 L1405.7,384.0 L1462.9,358.8 L1520.0,348.0" class="true-curve"/>
  <path d="M1120.0,564.0 L1148.6,607.2 L1177.1,628.8 L1205.7,632.4 L1234.3,618.0 L1291.4,592.8 L1348.6,546.0 L1405.7,492.0 L1462.9,438.0 L1520.0,391.2" class="measured-curve"/>
  <text x="1360.0" y="412.8" class="annotation" fill="#2d8a8a">productivité vraie</text>
  <text x="1360.0" y="510.0" class="annotation" fill="#7a1e1e">productivité mesurée (KPI)</text>
  <text x="1205.7" y="643.2" text-anchor="middle" class="annotation-em">creux</text>
  <text x="1205.7" y="661.2" text-anchor="middle" class="annotation">12-36 mois</text>
  <line x1="1120.0" y1="780" x2="1520" y2="780" class="axis-bold"/>
  <text x="1120.0" y="798" text-anchor="middle" class="label">0</text>
  <text x="1177.1" y="798" text-anchor="middle" class="label">1</text>
  <text x="1234.3" y="798" text-anchor="middle" class="label">2</text>
  <text x="1291.4" y="798" text-anchor="middle" class="label">3</text>
  <text x="1348.6" y="798" text-anchor="middle" class="label">4</text>
  <text x="1405.7" y="798" text-anchor="middle" class="label">5</text>
  <text x="1462.9" y="798" text-anchor="middle" class="label">6</text>
  <text x="1520.0" y="798" text-anchor="middle" class="label">7</text>
  <text x="1320.0" y="818" text-anchor="middle" class="label-em">années depuis l'adoption</text>
  <text x="1070.0" y="510.0" text-anchor="middle" class="label-em" transform="rotate(-90 1070.0 510.0)">productivité (±%)</text>
  <text x="60" y="882" class="panel-title">Trois régimes temporels alignés sur les trois panels</text>
  <rect x="60.0" y="890" width="480" height="130" class="regime-box" rx="4"/>
  <text x="76.0" y="914" class="regime-title">COURT TERME (0-12 MOIS)</text>
  <text x="76.0" y="936" class="regime-body">Le prix par token baisse mécaniquement (LLMflation + Blackwell).</text>
  <text x="76.0" y="952" class="regime-body">Le décideur croit en bénéficier. Le FinOps signe un contrat /Mtok</text>
  <text x="76.0" y="968" class="regime-body">et anticipe l'économie.</text>
  <rect x="560.0" y="890" width="480" height="130" class="regime-box" rx="4"/>
  <text x="576.0" y="914" class="regime-title">MOYEN TERME (12-36 MOIS)</text>
  <text x="576.0" y="936" class="regime-body">Le reasoning explose la facture par tâche (×10-74 AIME). La</text>
  <text x="576.0" y="952" class="regime-body">structure (RH, formation, gouvernance) se met en place. Les KPI</text>
  <text x="576.0" y="968" class="regime-body">métier ne suivent pas — on est dans le creux du J.</text>
  <rect x="1060.0" y="890" width="480" height="130" class="regime-box" rx="4"/>
  <text x="1076.0" y="914" class="regime-title">LONG TERME (3-7 ANS)</text>
  <text x="1076.0" y="936" class="regime-body">La productivité vraie remonte (Brynjolfsson). Mais l'outcome</text>
  <text x="1076.0" y="952" class="regime-body">qualité (Klarna 5% cas charge émotionnelle) impose un retour à</text>
  <text x="1076.0" y="968" class="regime-body">l'hybride. La courbe mesurée rattrape la courbe vraie avec 12-18</text>
  <text x="1076.0" y="984" class="regime-body">mois de lag.</text>
  <text x="60" y="1098" class="caption">Sources : a16z LLMflation · Brynjolfsson 2024 J-curve · McKinsey 2024 EBIT · MIT NANDA pilots failure rate · cas Klarna (2024-2025) · livre §21.2.3 + §21.7 + §5.10</text>
  <text x="60" y="1116" class="annotation-em">« Trois lectures d'une même facture. »</text>
  <text x="1540" y="1116" text-anchor="end" class="caption">R16 · livre « Anatomie d'une IA agentique »</text>
</svg>
