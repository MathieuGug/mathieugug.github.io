<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1280" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title-e3">
  <title id="title-e3">E3 — Capability × Cost : la seconde courbe de scaling</title>
  <desc>Double-vue de la seconde courbe de scaling. Panel A : capability (AIME) vs temps 2020-2026 — pretraining sature, test-time decolle au pivot o1 (sept 2024). Panel B : coût par résolution vs performance — deux nuages distincts non-reasoning (bas-gauche) et reasoning (haut-droit) avec écart ×10-74. Bandeau bas : 3 régimes tarifaires vendor.</desc>
  <style>
    .title { font: 600 24px/1.2 'Fraunces', 'Georgia', serif; fill: #1a1a1a; }
    .subtitle { font: italic 13px/1.4 'Inter', sans-serif; fill: #555; }
    .panel-title { font: 600 15px 'Inter', sans-serif; fill: #1a1a1a; }
    .panel-sub { font: italic 12px 'Inter', sans-serif; fill: #666; }
    .label { font: 11px 'JetBrains Mono', monospace; fill: #444; }
    .label-bold { font: 600 11px 'JetBrains Mono', monospace; fill: #1a1a1a; }
    .label-small { font: 10px 'Inter', sans-serif; fill: #666; }
    .annotation { font: italic 12px 'Inter', sans-serif; fill: #444; }
    .annotation-em { font: italic 13px 'Inter', sans-serif; fill: #b8582e; }
    .axis { stroke: #999; stroke-width: 0.6; }
    .axis-bold { stroke: #1a1a1a; stroke-width: 0.9; }
    .grid { stroke: #d4cdb6; stroke-width: 0.5; stroke-dasharray: 2,3; }
    .pretrain-curve { stroke: #2d8a8a; stroke-width: 2.2; fill: none; }
    .testtime-curve { stroke: #b8582e; stroke-width: 2.4; fill: none; }
    .pivot-band { fill: #b8582e; opacity: 0.08; }
    .pivot-line { stroke: #7a1e1e; stroke-width: 0.9; stroke-dasharray: 4,3; }
    .nonreason-cloud { fill: #2d8a8a; opacity: 0.65; }
    .reason-cloud { fill: #b8582e; opacity: 0.85; }
    .gap-arrow { stroke: #1a1a1a; stroke-width: 1.4; fill: none; }
    .regime-box { fill: #f0e9d4; stroke: #d4cdb6; stroke-width: 0.7; }
    .regime-title { font: 600 12px 'Inter', sans-serif; fill: #1a1a1a; }
    .regime-body { font: 11px 'Inter', sans-serif; fill: #444; }
  </style>
  <defs>
    <marker id="arr-e3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect width="900" height="1280" fill="#faf6ec"/>
  <text x="40" y="42" class="title">Capability × Cost : la seconde courbe de scaling</text>
  <text x="40" y="64" class="subtitle">Deux lectures de la bascule o1 (sept. 2024). Le décideur ne choisit pas un modèle — il choisit un régime tarifaire.</text>
  <g>
  <!-- Panel A : Capability vs Time -->
  <text x="80" y="86" class="panel-title">A · Capability vs temps — pretraining sature, test-time décolle</text>
  <text x="80" y="102" class="panel-sub">Score AIME (proxy frontière). Snell et al. 2024 : un petit modèle compute-optimal à l'inférence surclasse un 14× plus gros à FLOPs équivalents.</text>
  <rect x="140" y="130" width="640" height="300" fill="none" stroke="#d4cdb6" stroke-width="0.6"/>
  <line x1="140" y1="130.0" x2="780" y2="130.0" class="grid"/>
  <line x1="140" y1="190.0" x2="780" y2="190.0" class="grid"/>
  <line x1="140" y1="250.0" x2="780" y2="250.0" class="grid"/>
  <line x1="140" y1="310.0" x2="780" y2="310.0" class="grid"/>
  <line x1="140" y1="370.0" x2="780" y2="370.0" class="grid"/>
  <line x1="140" y1="430.0" x2="780" y2="430.0" class="grid"/>
  <rect x="641.3" y="130" width="138.7" height="300" class="pivot-band"/>
  <line x1="641.3" y1="122" x2="641.3" y2="434" class="pivot-line"/>
  <text x="641.3" y="116" text-anchor="middle" class="label-bold" fill="#7a1e1e">pivot o1</text>
  <text x="641.3" y="128" text-anchor="middle" class="label-small" fill="#7a1e1e">12 sept. 2024</text>
  <path d="M140.0,424.0 L246.7,415.0 L353.3,400.0 L460.0,391.0 L566.7,385.0 L673.3,379.0 L780.0,376.0" class="pretrain-curve"/>
  <path d="M566.7,385.0 L620.0,310.0 L673.3,244.0 L726.7,196.0 L780.0,154.0" class="testtime-curve"/>
  <text x="468.0" y="388.0" class="annotation" fill="#2d8a8a">pretraining seul</text>
  <text x="643.3" y="265.0" class="annotation" fill="#b8582e">pretraining + test-time compute</text>
  <circle cx="353.3" cy="400.0" r="3" fill="#1a1a1a"/>
  <text x="359.3" y="396.0" class="label-small">GPT-3</text>
  <circle cx="460.0" cy="391.0" r="3" fill="#1a1a1a"/>
  <text x="466.0" y="387.0" class="label-small">GPT-4</text>
  <circle cx="566.7" cy="385.0" r="3" fill="#1a1a1a"/>
  <text x="572.7" y="381.0" class="label-small">GPT-4o · Claude 3.5</text>
  <circle cx="673.3" cy="244.0" r="3" fill="#1a1a1a"/>
  <text x="679.3" y="240.0" class="label-small">o1 · DeepSeek-R1</text>
  <circle cx="726.7" cy="196.0" r="3" fill="#1a1a1a"/>
  <text x="732.7" y="192.0" class="label-small">o3</text>
  <circle cx="780.0" cy="154.0" r="3" fill="#1a1a1a"/>
  <text x="786.0" y="150.0" class="label-small">o3+ · Claude 4.x</text>
  <text x="678.3" y="304.0" class="annotation-em">14×</text>
  <text x="643.3" y="322.0" class="annotation">facteur capability/paramètres</text>
  <text x="643.3" y="334.0" class="annotation">à FLOPs équivalents (Snell 2024)</text>
  <line x1="140" y1="430" x2="780" y2="430" class="axis-bold"/>
  <text x="140.0" y="448" text-anchor="middle" class="label">2020</text>
  <text x="246.7" y="448" text-anchor="middle" class="label">2021</text>
  <text x="353.3" y="448" text-anchor="middle" class="label">2022</text>
  <text x="460.0" y="448" text-anchor="middle" class="label">2023</text>
  <text x="566.7" y="448" text-anchor="middle" class="label">2024</text>
  <text x="673.3" y="448" text-anchor="middle" class="label">2025</text>
  <text x="780.0" y="448" text-anchor="middle" class="label">2026</text>
  <line x1="140" y1="130" x2="140" y2="430" class="axis-bold"/>
  <text x="132" y="434.0" text-anchor="end" class="label">0%</text>
  <text x="132" y="359.0" text-anchor="end" class="label">25%</text>
  <text x="132" y="284.0" text-anchor="end" class="label">50%</text>
  <text x="132" y="209.0" text-anchor="end" class="label">75%</text>
  <text x="132" y="134.0" text-anchor="end" class="label">100%</text>
  <text x="100" y="280.0" text-anchor="middle" class="label-bold" transform="rotate(-90 100 280.0)">AIME (capability)</text>
  </g>
  <g>
  <!-- Panel B : Cost vs Performance -->
  <text x="80" y="566" class="panel-title">B · Coût par résolution AIME — ×10 à ×74 entre les deux nuages</text>
  <text x="80" y="582" class="panel-sub">Deux régimes économiques disjoints. Le décideur paie un prix par token qui baisse pendant que sa facture par tâche monte.</text>
  <rect x="140" y="610" width="640" height="300" fill="none" stroke="#d4cdb6" stroke-width="0.6"/>
  <line x1="140" y1="610.0" x2="780" y2="610.0" class="grid"/>
  <line x1="140" y1="670.0" x2="780" y2="670.0" class="grid"/>
  <line x1="140" y1="730.0" x2="780" y2="730.0" class="grid"/>
  <line x1="140" y1="790.0" x2="780" y2="790.0" class="grid"/>
  <line x1="140" y1="850.0" x2="780" y2="850.0" class="grid"/>
  <line x1="140" y1="910.0" x2="780" y2="910.0" class="grid"/>
  <circle cx="188.2" cy="886.0" r="11" class="nonreason-cloud"/>
  <text x="188.2" y="889.0" text-anchor="middle" class="label-small" fill="#fff">GPT</text>
  <circle cx="203.7" cy="877.0" r="11" class="nonreason-cloud"/>
  <text x="203.7" y="880.0" text-anchor="middle" class="label-small" fill="#fff">GPT</text>
  <circle cx="236.3" cy="874.0" r="11" class="nonreason-cloud"/>
  <text x="236.3" y="877.0" text-anchor="middle" class="label-small" fill="#fff">Cla</text>
  <circle cx="264.5" cy="868.0" r="11" class="nonreason-cloud"/>
  <text x="264.5" y="871.0" text-anchor="middle" class="label-small" fill="#fff">GPT</text>
  <circle cx="284.5" cy="871.0" r="11" class="nonreason-cloud"/>
  <text x="284.5" y="874.0" text-anchor="middle" class="label-small" fill="#fff">Cla</text>
  <circle cx="300.0" cy="865.0" r="11" class="nonreason-cloud"/>
  <text x="300.0" y="868.0" text-anchor="middle" class="label-small" fill="#fff">Gem</text>
  <circle cx="444.5" cy="685.0" r="13" class="reason-cloud"/>
  <text x="444.5" y="688.0" text-anchor="middle" class="label-small" fill="#fff">o1-</text>
  <circle cx="488.2" cy="676.0" r="13" class="reason-cloud"/>
  <text x="488.2" y="679.0" text-anchor="middle" class="label-small" fill="#fff">o1</text>
  <circle cx="536.3" cy="664.0" r="13" class="reason-cloud"/>
  <text x="536.3" y="667.0" text-anchor="middle" class="label-small" fill="#fff">Cla</text>
  <circle cx="571.8" cy="655.0" r="13" class="reason-cloud"/>
  <text x="571.8" y="658.0" text-anchor="middle" class="label-small" fill="#fff">Dee</text>
  <circle cx="604.5" cy="649.0" r="13" class="reason-cloud"/>
  <text x="604.5" y="652.0" text-anchor="middle" class="label-small" fill="#fff">Gem</text>
  <circle cx="648.2" cy="640.0" r="13" class="reason-cloud"/>
  <text x="648.2" y="643.0" text-anchor="middle" class="label-small" fill="#fff">o3</text>
  <circle cx="668.2" cy="634.0" r="13" class="reason-cloud"/>
  <text x="668.2" y="637.0" text-anchor="middle" class="label-small" fill="#fff">Cla</text>
  <text x="236.3" y="844.0" class="annotation" fill="#2d8a8a">non-reasoning</text>
  <text x="236.3" y="856.0" class="annotation" fill="#2d8a8a">(plafond ~15% AIME)</text>
  <text x="536.3" y="616.0" class="annotation" fill="#b8582e">reasoning</text>
  <text x="536.3" y="628.0" class="annotation" fill="#b8582e">(75-92% AIME, ×10 à ×74 coût)</text>
  <path d="M 251.8,868.0 Q 411.8,760.0 460.0,694.0" class="gap-arrow" marker-end="url(#arr-e3)"/>
  <text x="376.3" y="775.0" text-anchor="middle" class="annotation-em">écart ×10-74</text>
  <text x="376.3" y="787.0" text-anchor="middle" class="annotation">en coût par résolution</text>
  <line x1="140" y1="910" x2="780" y2="910" class="axis-bold"/>
  <text x="140.0" y="928" text-anchor="middle" class="label">$0.01</text>
  <text x="300.0" y="928" text-anchor="middle" class="label">$0.10</text>
  <text x="460.0" y="928" text-anchor="middle" class="label">$1</text>
  <text x="620.0" y="928" text-anchor="middle" class="label">$10</text>
  <text x="780.0" y="928" text-anchor="middle" class="label">$100</text>
  <text x="460.0" y="960" text-anchor="middle" class="label-bold">Coût par résolution AIME (USD, échelle log)</text>
  <line x1="140" y1="610" x2="140" y2="910" class="axis-bold"/>
  <text x="132" y="914.0" text-anchor="end" class="label">0%</text>
  <text x="132" y="839.0" text-anchor="end" class="label">25%</text>
  <text x="132" y="764.0" text-anchor="end" class="label">50%</text>
  <text x="132" y="689.0" text-anchor="end" class="label">75%</text>
  <text x="132" y="614.0" text-anchor="end" class="label">100%</text>
  <text x="100" y="760.0" text-anchor="middle" class="label-bold" transform="rotate(-90 100 760.0)">AIME (performance)</text>
  </g>
  <text x="80" y="1040" class="panel-title">Trois régimes tarifaires vendor 2026</text>
  <text x="80" y="1056" class="panel-sub">La capability monte avec le test-time compute. La facture monte avec elle. Choisir un raisonneur = choisir un design d'allocation compute par requête.</text>
  <rect x="55.0" y="1076" width="250" height="140" class="regime-box" rx="6"/>
  <text x="69.0" y="1098" class="regime-title">A — Pricing/token uniforme</text>
  <text x="69.0" y="1120" class="regime-body">Commodity tier non-reasoning</text>
  <text x="69.0" y="1135" class="regime-body">post-2026. Un seul prix /Mtok.</text>
  <text x="69.0" y="1150" class="regime-body">Modèle FinOps prévisible.</text>
  <text x="69.0" y="1204" class="label-small" fill="#777" font-style="italic">ex. GPT-4o, Claude 3.5, Gemini 1.5</text>
  <rect x="325.0" y="1076" width="250" height="140" class="regime-box" rx="6"/>
  <text x="339.0" y="1098" class="regime-title">B — Thinking tokens facturés</text>
  <text x="339.0" y="1120" class="regime-body">Tokens « pensée » facturés au prix</text>
  <text x="339.0" y="1135" class="regime-body">output (ratio 100:1 possible).</text>
  <text x="339.0" y="1150" class="regime-body">Imprévisibilité forte par requête.</text>
  <text x="339.0" y="1204" class="label-small" fill="#777" font-style="italic">ex. o1, o3, DeepSeek-R1</text>
  <rect x="595.0" y="1076" width="250" height="140" class="regime-box" rx="6"/>
  <text x="609.0" y="1098" class="regime-title">C — Effort levels exposés</text>
  <text x="609.0" y="1120" class="regime-body">low / medium / high choisis par le</text>
  <text x="609.0" y="1135" class="regime-body">caller. Externalisation au</text>
  <text x="609.0" y="1150" class="regime-body">développeur de la décision</text>
  <text x="609.0" y="1165" class="regime-body">compute-optimale.</text>
  <text x="609.0" y="1204" class="label-small" fill="#777" font-style="italic">ex. Claude 4.6 adaptive, OpenAI reasoning effort</text>
  <text x="450.0" y="1264" text-anchor="middle" class="annotation">
    Sources : Snell et al. arXiv:2408.03314 · OpenAI o1 sept. 2024 · DeepSeek-R1 Nature sept. 2025 · pricing publics Anthropic / OpenAI / Google 2026
  </text>
</svg>
