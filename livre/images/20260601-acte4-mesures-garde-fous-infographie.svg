  <text x="50" y="98" class="acte-title">Mesures et garde-fous</text>
  <text x="50" y="130" class="acte-subtitle">Anneaux 06-09. C'est ici que se gagne ou se perd la confiance du décideur — et qu'on sait tuer un cas d'usage au bon moment.</text>
