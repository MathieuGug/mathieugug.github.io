<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1280" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title-e5">
  <title id="title-e5">E5 — PRM vs LLM-as-judge vs human eval : trois mécaniques pour noter le raisonnement</title>
  <desc>Matrice 3 lignes (PRM, LLM-as-judge, Human eval) x 5 colonnes (coût, scalabilité, biais, fidélité, cas d usage) suivie d un bandeau bas montrant les 4 trajectoires d evolution alignees sur les 3 lignes.</desc>
  <style>
    .title { font: 600 24px/1.2 'Fraunces', 'Georgia', serif; fill: #1a1a1a; }
    .subtitle { font: italic 13px/1.4 'Inter', sans-serif; fill: #555; }
    .row-title { font: 600 14px 'Inter', sans-serif; fill: #fff; }
    .row-sub { font: italic 11px 'Inter', sans-serif; fill: #fff; opacity: 0.85; }
    .col-header { font: 600 12px 'Inter', sans-serif; fill: #1a1a1a; }
    .cell-fact { font: 600 14px 'Inter', sans-serif; fill: #1a1a1a; }
    .cell-detail { font: 11px 'Inter', sans-serif; fill: #555; }
    .label { font: 11px 'JetBrains Mono', monospace; fill: #444; }
    .label-small { font: 10px 'Inter', sans-serif; fill: #666; }
    .annotation { font: italic 12px 'Inter', sans-serif; fill: #444; }
    .annotation-em { font: italic 13px 'Inter', sans-serif; fill: #b8582e; }
    .row-bg-prm { fill: #b8582e; }
    .row-bg-judge { fill: #2d8a8a; }
    .row-bg-human { fill: #5e5345; }
    .cell-bg { fill: #ffffff; stroke: #d4cdb6; stroke-width: 0.6; }
    .cell-bg-alt { fill: #f7f1de; stroke: #d4cdb6; stroke-width: 0.6; }
    .legend-box { fill: #f0e9d4; stroke: #d4cdb6; stroke-width: 0.7; }
    .arrow-traj { stroke: #1a1a1a; stroke-width: 1.4; fill: none; }
  </style>
  <defs>
    <marker id="arr-e5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect width="900" height="1280" fill="#faf6ec"/>
  <text x="40" y="42" class="title">PRM vs LLM-as-judge vs human eval</text>
  <text x="40" y="64" class="subtitle">Trois mécaniques pour noter la qualité d'un raisonnement. Aucune ne suffit seule : en 2026, le pattern dominant en production combine les trois.</text>
  <rect x="230" y="110" width="124" height="50" class="cell-bg-alt"/>
  <text x="292.0" y="140" text-anchor="middle" class="col-header">Coût</text>
  <rect x="354" y="110" width="124" height="50" class="cell-bg-alt"/>
  <text x="416.0" y="140" text-anchor="middle" class="col-header">Scalabilité</text>
  <rect x="478" y="110" width="124" height="50" class="cell-bg-alt"/>
  <text x="540.0" y="140" text-anchor="middle" class="col-header">Biais</text>
  <rect x="602" y="110" width="124" height="50" class="cell-bg-alt"/>
  <text x="664.0" y="140" text-anchor="middle" class="col-header">Fidélité</text>
  <rect x="726" y="110" width="124" height="50" class="cell-bg-alt"/>
  <text x="788.0" y="140" text-anchor="middle" class="col-header">Cas d'usage</text>
  <rect x="50" y="160" width="180" height="200" class="row-bg-prm"/>
  <text x="140" y="260" text-anchor="middle" class="row-title">PRM</text>
  <text x="140" y="280" text-anchor="middle" class="row-sub">process reward model entraîné</text>
  <rect x="230" y="160" width="124" height="200" class="cell-bg"/>
  <text x="292.0" y="196" text-anchor="middle" class="cell-fact">0,001 $</text>
  <text x="292.0" y="230" text-anchor="middle" class="cell-detail">/évaluation</text>
  <text x="292.0" y="246" text-anchor="middle" class="cell-detail">(post-training)</text>
  <rect x="354" y="160" width="124" height="200" class="cell-bg-alt"/>
  <text x="416.0" y="196" text-anchor="middle" class="cell-fact">Millions/jour</text>
  <text x="416.0" y="230" text-anchor="middle" class="cell-detail">GPU-bound</text>
  <text x="416.0" y="246" text-anchor="middle" class="cell-detail">faible latence</text>
  <rect x="478" y="160" width="124" height="200" class="cell-bg"/>
  <text x="540.0" y="196" text-anchor="middle" class="cell-fact">Reward hacking</text>
  <text x="540.0" y="230" text-anchor="middle" class="cell-detail">99 % exploitation /</text>
  <text x="540.0" y="246" text-anchor="middle" class="cell-detail">&lt; 2 % verbalisation</text>
  <text x="540.0" y="262" text-anchor="middle" class="cell-detail">(Anthropic 2025)</text>
  <rect x="602" y="160" width="124" height="200" class="cell-bg-alt"/>
  <text x="664.0" y="196" text-anchor="middle" class="cell-fact">Haute si in-dist.</text>
  <text x="664.0" y="230" text-anchor="middle" class="cell-detail">S'effondre OOD ;</text>
  <text x="664.0" y="246" text-anchor="middle" class="cell-detail">faithfulness CoT</text>
  <text x="664.0" y="262" text-anchor="middle" class="cell-detail">= pré-requis</text>
  <rect x="726" y="160" width="124" height="200" class="cell-bg"/>
  <text x="788.0" y="196" text-anchor="middle" class="cell-fact">Math, code,
sciences</text>
  <text x="788.0" y="230" text-anchor="middle" class="cell-detail">Training-time</text>
  <text x="788.0" y="246" text-anchor="middle" class="cell-detail">sur domaines</text>
  <text x="788.0" y="262" text-anchor="middle" class="cell-detail">vérifiables</text>
  <rect x="50" y="360" width="180" height="200" class="row-bg-judge"/>
  <text x="140" y="460" text-anchor="middle" class="row-title">LLM-as-judge</text>
  <text x="140" y="480" text-anchor="middle" class="row-sub">verifier génératif (prompté)</text>
  <rect x="230" y="360" width="124" height="200" class="cell-bg-alt"/>
  <text x="292.0" y="396" text-anchor="middle" class="cell-fact">0,01-0,05 $</text>
  <text x="292.0" y="430" text-anchor="middle" class="cell-detail">/évaluation</text>
  <text x="292.0" y="446" text-anchor="middle" class="cell-detail">(API call)</text>
  <rect x="354" y="360" width="124" height="200" class="cell-bg"/>
  <text x="416.0" y="396" text-anchor="middle" class="cell-fact">Millions/jour</text>
  <text x="416.0" y="430" text-anchor="middle" class="cell-detail">API-bound</text>
  <text x="416.0" y="446" text-anchor="middle" class="cell-detail">latence variable</text>
  <rect x="478" y="360" width="124" height="200" class="cell-bg-alt"/>
  <text x="540.0" y="396" text-anchor="middle" class="cell-fact">Sycophantie</text>
  <text x="540.0" y="430" text-anchor="middle" class="cell-detail">position bias,</text>
  <text x="540.0" y="446" text-anchor="middle" class="cell-detail">self-preference,</text>
  <text x="540.0" y="462" text-anchor="middle" class="cell-detail">verbosity bias</text>
  <rect x="602" y="360" width="124" height="200" class="cell-bg"/>
  <text x="664.0" y="396" text-anchor="middle" class="cell-fact">Calibrable</text>
  <text x="664.0" y="430" text-anchor="middle" class="cell-detail">0,75-0,85 IAA</text>
  <text x="664.0" y="446" text-anchor="middle" class="cell-detail">avec humain</text>
  <text x="664.0" y="462" text-anchor="middle" class="cell-detail">(MT-Bench)</text>
  <rect x="726" y="360" width="124" height="200" class="cell-bg-alt"/>
  <text x="788.0" y="396" text-anchor="middle" class="cell-fact">Production</text>
  <text x="788.0" y="430" text-anchor="middle" class="cell-detail">audit + ranking</text>
  <text x="788.0" y="446" text-anchor="middle" class="cell-detail">hors chemin</text>
  <text x="788.0" y="462" text-anchor="middle" class="cell-detail">critique</text>
  <rect x="50" y="560" width="180" height="200" class="row-bg-human"/>
  <text x="140" y="660" text-anchor="middle" class="row-title">Human eval</text>
  <text x="140" y="680" text-anchor="middle" class="row-sub">SME / crowdsourcing</text>
  <rect x="230" y="560" width="124" height="200" class="cell-bg"/>
  <text x="292.0" y="596" text-anchor="middle" class="cell-fact">5-150 $</text>
  <text x="292.0" y="630" text-anchor="middle" class="cell-detail">/évaluation</text>
  <text x="292.0" y="646" text-anchor="middle" class="cell-detail">selon domaine</text>
  <rect x="354" y="560" width="124" height="200" class="cell-bg-alt"/>
  <text x="416.0" y="596" text-anchor="middle" class="cell-fact">100s-1k/jour</text>
  <text x="416.0" y="630" text-anchor="middle" class="cell-detail">Coordination</text>
  <text x="416.0" y="646" text-anchor="middle" class="cell-detail">équipe annotateurs</text>
  <rect x="478" y="560" width="124" height="200" class="cell-bg"/>
  <text x="540.0" y="596" text-anchor="middle" class="cell-fact">IAA variable</text>
  <text x="540.0" y="630" text-anchor="middle" class="cell-detail">0,4-0,9 selon</text>
  <text x="540.0" y="646" text-anchor="middle" class="cell-detail">tâche ; fatigue,</text>
  <text x="540.0" y="662" text-anchor="middle" class="cell-detail">biais culturel</text>
  <rect x="602" y="560" width="124" height="200" class="cell-bg-alt"/>
  <text x="664.0" y="596" text-anchor="middle" class="cell-fact">Gold standard</text>
  <text x="664.0" y="630" text-anchor="middle" class="cell-detail">référence pour</text>
  <text x="664.0" y="646" text-anchor="middle" class="cell-detail">calibrer les</text>
  <text x="664.0" y="662" text-anchor="middle" class="cell-detail">deux autres</text>
  <rect x="726" y="560" width="124" height="200" class="cell-bg"/>
  <text x="788.0" y="596" text-anchor="middle" class="cell-fact">Calibration +
régulé</text>
  <text x="788.0" y="630" text-anchor="middle" class="cell-detail">domaines à</text>
  <text x="788.0" y="646" text-anchor="middle" class="cell-detail">traçabilité</text>
  <text x="788.0" y="662" text-anchor="middle" class="cell-detail">légale</text>
  <text x="50" y="800" class="row-title" fill="#1a1a1a">Quatre trajectoires d'évolution 2027-2028 (alignées sur les 3 mécaniques)</text>
  <rect x="50" y="816" width="192" height="120" class="legend-box" rx="4"/>
  <rect x="50" y="816" width="192" height="6" class="row-bg-prm"/>
  <text x="146.0" y="844" text-anchor="middle" class="col-header">RLVR généralisé</text>
  <text x="146.0" y="866" text-anchor="middle" class="cell-detail">Math/code/sciences</text>
  <text x="146.0" y="880" text-anchor="middle" class="cell-detail">le PRM devient superflu (DeepSeek-R1 → +)</text>
  <text x="146.0" y="924" text-anchor="middle" class="annotation-em">PRM →</text>
  <rect x="252" y="816" width="192" height="120" class="legend-box" rx="4"/>
  <rect x="252" y="816" width="192" height="6" class="row-bg-judge"/>
  <text x="348.0" y="844" text-anchor="middle" class="col-header">Generative verifier intégré</text>
  <text x="348.0" y="866" text-anchor="middle" class="cell-detail">Raisonneur ↔ notateur convergent</text>
  <text x="348.0" y="880" text-anchor="middle" class="cell-detail">(GenRM, ThinkPRM)</text>
  <text x="348.0" y="924" text-anchor="middle" class="annotation-em">PRM + judge fusionnés</text>
  <rect x="454" y="816" width="192" height="120" class="legend-box" rx="4"/>
  <rect x="454" y="816" width="192" height="6" class="row-bg-prm"/>
  <text x="550.0" y="844" text-anchor="middle" class="col-header">PRM spécialisé domaine</text>
  <text x="550.0" y="866" text-anchor="middle" class="cell-detail">Oncologie (Stanford), droit (Harvey),</text>
  <text x="550.0" y="880" text-anchor="middle" class="cell-detail">code (Cursor, Cognition)</text>
  <text x="550.0" y="924" text-anchor="middle" class="annotation-em">PRM verticalisé</text>
  <rect x="656" y="816" width="192" height="120" class="legend-box" rx="4"/>
  <rect x="656" y="816" width="192" height="6" class="row-bg-judge"/>
  <text x="752.0" y="844" text-anchor="middle" class="col-header">PRM-as-a-service</text>
  <text x="752.0" y="866" text-anchor="middle" class="cell-detail">Surge Verifier, Patronus,</text>
  <text x="752.0" y="880" text-anchor="middle" class="cell-detail">Claude Eval</text>
  <text x="752.0" y="924" text-anchor="middle" class="annotation-em">judge + human-in-loop</text>
  <rect x="50" y="966" width="800" height="60" fill="#f0e9d4" stroke="#d4cdb6" stroke-width="0.7" rx="6"/>
  <text x="450.0" y="988" text-anchor="middle" class="annotation-em">Pattern dominant 2026 en production :</text>
  <text x="450.0" y="1010" text-anchor="middle" class="annotation">règle déterministe (précision) + judge LLM async (couverture) + sampling humain 0,5-2 % (calibration)</text>
  <text x="450.0" y="1264" text-anchor="middle" class="annotation">
    Sources : Lightman 2023 PRM800K · Anthropic + OpenAI 2025 reward hacking · Zhang 2024 GenRM ICLR 2025 · Khalifa 2025 ThinkPRM · Wolfe Substack 2025 (marché)
  </text>
</svg>
