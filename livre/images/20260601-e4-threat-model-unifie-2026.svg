    .vector-label { font: 700 9px 'Inter', sans-serif; fill: #888; letter-spacing: 0.08em; }
    .vector-name { font: 600 12px 'Inter', sans-serif; fill: #1a1a1a; }
    .vector-detail { font: 11px/1.35 'Inter', sans-serif; fill: #444; }
