  <rect width="1600" height="1130" fill="#faf6ec"/>
  <text x="50" y="40" class="tag">SCHÉMA E4 · ACTE IV CHARNIÈRE Ch.19 · SCHÉMA TRANSVERSE RSSI</text>
  <text x="50" y="84" class="title">Threat model unifié 2026 — six surfaces d'attaque agentiques</text>
  <text x="50" y="110" class="subtitle">Cartographie défensive : à chaque surface, deux à trois vecteurs typiques, une parade load-bearing, un renvoi chapitre détaillé.</text>
  <rect x="50.0" y="160.0" width="486.7" height="375.0" class="surface-card" rx="6"/>
  <rect x="50.0" y="160.0" width="486.7" height="56" class="surface-stripe" rx="6"/>
  <rect x="50.0" y="196.0" width="486.7" height="20" class="surface-stripe"/>
  <text x="68.0" y="178.0" class="surface-tag">SURFACE</text>
  <text x="68.0" y="202.0" class="surface-title">MODÈLE</text>
  <text x="518.7" y="202.0" text-anchor="end" class="surface-tag" opacity="0.85">COUCHE RÉSEAU DE NEURONES</text>
  <text x="68.0" y="232.0" class="vector-label">VECTEUR 1</text>
  <text x="68.0" y="246.0" class="vector-name">Jailbreaking (LLM)</text>
  <text x="68.0" y="262.0" class="vector-detail">asymétrie attaque/défense, taxonomie documentée</text>
  <text x="68.0" y="276.0" class="vector-detail">depuis 2023 (Carlini, Anthropic, OWASP LLM Top 10)</text>
  <text x="68.0" y="292.0" class="vector-label">VECTEUR 2</text>
  <text x="68.0" y="306.0" class="vector-name">Backdoors entraînement</text>
  <text x="68.0" y="322.0" class="vector-detail">data poisoning à l'échelle pretrain, BadNet sur</text>
  <text x="68.0" y="336.0" class="vector-detail">fine-tuning (Wang 2024)</text>
  <text x="68.0" y="352.0" class="vector-label">VECTEUR 3</text>
  <text x="68.0" y="366.0" class="vector-name">Reward hacking</text>
  <text x="68.0" y="382.0" class="vector-detail">Anthropic + OpenAI 2025 : 99 % exploitation / &lt; 2</text>
  <text x="68.0" y="396.0" class="vector-detail">% verbalisation (CoT illisible)</text>
  <line x1="68.0" y1="420.0" x2="518.7" y2="420.0" stroke="#2d8a8a" stroke-width="0.6"/>
  <text x="68.0" y="436.0" class="parade-label">PARADE DOMINANTE</text>
  <text x="68.0" y="452.0" class="parade-text">Red-teaming continu + monitoring distributions +</text>
  <text x="68.0" y="468.0" class="parade-text">governance des fine-tunes (Ch.2 + Ch.3 + Ch.19)</text>
  <text x="68.0" y="521.0" class="renvoi">→ Ch.2 §2.6 (faithfulness) · Ch.3 §3.6 (reward hacking) · Ch.19 §19.4</text>
  <rect x="556.7" y="160.0" width="486.7" height="375.0" class="surface-card" rx="6"/>
  <rect x="556.7" y="160.0" width="486.7" height="56" class="surface-stripe" rx="6"/>
  <rect x="556.7" y="196.0" width="486.7" height="20" class="surface-stripe"/>
  <text x="574.7" y="178.0" class="surface-tag">SURFACE</text>
  <text x="574.7" y="202.0" class="surface-title">PROMPT</text>
  <text x="1025.3" y="202.0" text-anchor="end" class="surface-tag" opacity="0.85">COUCHE ENTRÉE UTILISATEUR</text>
  <text x="574.7" y="232.0" class="vector-label">VECTEUR 1</text>
  <text x="574.7" y="246.0" class="vector-name">Injection directe</text>
  <text x="574.7" y="262.0" class="vector-detail">l'utilisateur insère « ignore previous</text>
  <text x="574.7" y="276.0" class="vector-detail">instructions », classique mais toujours actif</text>
  <text x="574.7" y="292.0" class="vector-label">VECTEUR 2</text>
  <text x="574.7" y="306.0" class="vector-name">Injection indirecte</text>
  <text x="574.7" y="322.0" class="vector-detail">contenu hostile dans un document RAG / une page</text>
  <text x="574.7" y="336.0" class="vector-detail">web / un email scrapé (Greshake 2023)</text>
  <text x="574.7" y="352.0" class="vector-label">VECTEUR 3</text>
  <text x="574.7" y="366.0" class="vector-name">Prompt leakage</text>
  <text x="574.7" y="382.0" class="vector-detail">extraction du system prompt par paraphrase /</text>
  <text x="574.7" y="396.0" class="vector-detail">role-play / encodage Unicode</text>
  <line x1="574.7" y1="420.0" x2="1025.3" y2="420.0" stroke="#2d8a8a" stroke-width="0.6"/>
  <text x="574.7" y="436.0" class="parade-label">PARADE DOMINANTE</text>
  <text x="574.7" y="452.0" class="parade-text">Séparation rôles + filtres I/O + spotlighting +</text>
  <text x="574.7" y="468.0" class="parade-text">sanitization markdown/HTML (Ch.19 §19.5)</text>
  <text x="574.7" y="521.0" class="renvoi">→ Ch.19 §19.5 · OWASP LLM01 · NIST AI RMF GV-1.5</text>
  <rect x="1063.3" y="160.0" width="486.7" height="375.0" class="surface-card" rx="6"/>
  <rect x="1063.3" y="160.0" width="486.7" height="56" class="surface-stripe" rx="6"/>
  <rect x="1063.3" y="196.0" width="486.7" height="20" class="surface-stripe"/>
  <text x="1081.3" y="178.0" class="surface-tag">SURFACE</text>
  <text x="1081.3" y="202.0" class="surface-title">MÉMOIRE</text>
  <text x="1532.0" y="202.0" text-anchor="end" class="surface-tag" opacity="0.85">COUCHE CONTEXTE &amp; HISTORIQUE</text>
  <text x="1081.3" y="232.0" class="vector-label">VECTEUR 1</text>
  <text x="1081.3" y="246.0" class="vector-name">Memory poisoning (SpAIware)</text>
  <text x="1081.3" y="262.0" class="vector-detail">Beurer-Kellner &amp; Tramèr 2024 — injection</text>
  <text x="1081.3" y="276.0" class="vector-detail">paraphrasée promue « volonté utilisateur » via</text>
  <text x="1081.3" y="292.0" class="vector-label">VECTEUR 2</text>
  <text x="1081.3" y="306.0" class="vector-name">Cross-session leakage</text>
  <text x="1081.3" y="322.0" class="vector-detail">fuite d'informations sensibles entre sessions ou</text>
  <text x="1081.3" y="336.0" class="vector-detail">comptes via mémoire partagée</text>
  <text x="1081.3" y="352.0" class="vector-label">VECTEUR 3</text>
  <text x="1081.3" y="366.0" class="vector-name">MITRE ATLAS AML.T0080</text>
  <text x="1081.3" y="382.0" class="vector-detail">model evasion via memory manipulation, vecteur</text>
  <text x="1081.3" y="396.0" class="vector-detail">documenté en taxonomie officielle</text>
  <line x1="1081.3" y1="420.0" x2="1532.0" y2="420.0" stroke="#2d8a8a" stroke-width="0.6"/>
  <text x="1081.3" y="436.0" class="parade-label">PARADE DOMINANTE</text>
  <text x="1081.3" y="452.0" class="parade-text">Signature compactions + isolation par</text>
  <text x="1081.3" y="468.0" class="parade-text">session/tenant + audit ledger OTel</text>
  <text x="1081.3" y="484.0" class="parade-text">`gen_ai.compaction.*` (Ch.10 §10.6)</text>
  <text x="1081.3" y="521.0" class="renvoi">→ Ch.10 §10.6 (SpAIware) · Ch.9 §9.7 (architecture) · Ch.18 §18.4 (ledger)</text>
  <rect x="50.0" y="555.0" width="486.7" height="375.0" class="surface-card" rx="6"/>
  <rect x="50.0" y="555.0" width="486.7" height="56" class="surface-stripe" rx="6"/>
  <rect x="50.0" y="591.0" width="486.7" height="20" class="surface-stripe"/>
  <text x="68.0" y="573.0" class="surface-tag">SURFACE</text>
  <text x="68.0" y="597.0" class="surface-title">OUTIL</text>
  <text x="518.7" y="597.0" text-anchor="end" class="surface-tag" opacity="0.85">COUCHE FONCTIONS EXPOSÉES</text>
  <text x="68.0" y="627.0" class="vector-label">VECTEUR 1</text>
  <text x="68.0" y="641.0" class="vector-name">Tool poisoning</text>
  <text x="68.0" y="657.0" class="vector-detail">description hostile dans le manifest MCP, schema</text>
  <text x="68.0" y="671.0" class="vector-detail">JSON malicieux exploitant le parsing LLM</text>
  <text x="68.0" y="687.0" class="vector-label">VECTEUR 2</text>
  <text x="68.0" y="701.0" class="vector-name">Supply chain (OAuth/registry)</text>
  <text x="68.0" y="717.0" class="vector-detail">compromise d'un serveur MCP en amont, distribution</text>
  <text x="68.0" y="731.0" class="vector-detail">via registry non signé</text>
  <text x="68.0" y="747.0" class="vector-label">VECTEUR 3</text>
  <text x="68.0" y="761.0" class="vector-name">Execute_sql / shell sans scoping</text>
  <text x="68.0" y="777.0" class="vector-detail">exfiltration en 3 tours via injection indirecte +</text>
  <text x="68.0" y="791.0" class="vector-detail">tool surpuissant</text>
  <line x1="68.0" y1="815.0" x2="518.7" y2="815.0" stroke="#2d8a8a" stroke-width="0.6"/>
  <text x="68.0" y="831.0" class="parade-label">PARADE DOMINANTE</text>
  <text x="68.0" y="847.0" class="parade-text">Sigstore + hash pinning sur les serveurs MCP,</text>
  <text x="68.0" y="863.0" class="parade-text">scoping minimal des tools, HITL sur writes</text>
  <text x="68.0" y="879.0" class="parade-text">irréversibles (Ch.13 §13.4)</text>
  <text x="68.0" y="916.0" class="renvoi">→ Ch.8 §8.3 (outils) · Ch.13 §13.2-§13.4 (MCP sécu) · MITRE ATLAS</text>
  <rect x="556.7" y="555.0" width="486.7" height="375.0" class="surface-card" rx="6"/>
  <rect x="556.7" y="555.0" width="486.7" height="56" class="surface-stripe" rx="6"/>
  <rect x="556.7" y="591.0" width="486.7" height="20" class="surface-stripe"/>
  <text x="574.7" y="573.0" class="surface-tag">SURFACE</text>
  <text x="574.7" y="597.0" class="surface-title">PROTOCOLE</text>
  <text x="1025.3" y="597.0" text-anchor="end" class="surface-tag" opacity="0.85">COUCHE TRANSPORT AGENT ↔ TOOLS/AGENTS</text>
  <text x="574.7" y="627.0" class="vector-label">VECTEUR 1</text>
  <text x="574.7" y="641.0" class="vector-name">MCP 10 vecteurs</text>
  <text x="574.7" y="657.0" class="vector-detail">matrice Ch.13 : tool poisoning, prompt injection</text>
  <text x="574.7" y="671.0" class="vector-detail">cross-doc, cross-server confusion, OAuth+supply</text>
  <text x="574.7" y="687.0" class="vector-label">VECTEUR 2</text>
  <text x="574.7" y="701.0" class="vector-name">Cross-server confusion</text>
  <text x="574.7" y="717.0" class="vector-detail">agent appelle outil A en pensant utiliser outil B</text>
  <text x="574.7" y="731.0" class="vector-detail">(namespace collision)</text>
  <text x="574.7" y="747.0" class="vector-label">VECTEUR 3</text>
  <text x="574.7" y="761.0" class="vector-name">A2A handshake spoofing</text>
  <text x="574.7" y="777.0" class="vector-detail">agent malveillant se fait passer pour un</text>
  <text x="574.7" y="791.0" class="vector-detail">sous-agent légitime via Agent Card forgée</text>
  <line x1="574.7" y1="815.0" x2="1025.3" y2="815.0" stroke="#2d8a8a" stroke-width="0.6"/>
  <text x="574.7" y="831.0" class="parade-label">PARADE DOMINANTE</text>
  <text x="574.7" y="847.0" class="parade-text">Allowlist namespace + tool tagging par origine +</text>
  <text x="574.7" y="863.0" class="parade-text">spec MCP v2 Sigstore (automne 2026, Ch.13 §13.7)</text>
  <text x="574.7" y="916.0" class="renvoi">→ Ch.13 (intégral) · spec MCP v2 · AAIF roadmap printemps 2027</text>
  <rect x="1063.3" y="555.0" width="486.7" height="375.0" class="surface-card" rx="6"/>
  <rect x="1063.3" y="555.0" width="486.7" height="56" class="surface-stripe" rx="6"/>
  <rect x="1063.3" y="591.0" width="486.7" height="20" class="surface-stripe"/>
  <text x="1081.3" y="573.0" class="surface-tag">SURFACE</text>
  <text x="1081.3" y="597.0" class="surface-title">SURFACE</text>
  <text x="1532.0" y="597.0" text-anchor="end" class="surface-tag" opacity="0.85">COUCHE UTILISATEUR / ÉCRAN</text>
  <text x="1081.3" y="627.0" class="vector-label">VECTEUR 1</text>
  <text x="1081.3" y="641.0" class="vector-name">VPI — Visual Prompt Injection</text>
  <text x="1081.3" y="657.0" class="vector-detail">Anthropic 2024-2025 : injection via captures</text>
  <text x="1081.3" y="671.0" class="vector-detail">écran, OCR contaminé</text>
  <text x="1081.3" y="687.0" class="vector-label">VECTEUR 2</text>
  <text x="1081.3" y="701.0" class="vector-name">CVE-2025-55322</text>
  <text x="1081.3" y="717.0" class="vector-detail">computer use Operator/Devin — escape de la sandbox</text>
  <text x="1081.3" y="731.0" class="vector-detail">via UI hostile (oct 2025)</text>
  <text x="1081.3" y="747.0" class="vector-label">VECTEUR 3</text>
  <text x="1081.3" y="761.0" class="vector-name">Clickjacking agentique</text>
  <text x="1081.3" y="777.0" class="vector-detail">agent on-behalf-of confronté à des dark patterns</text>
  <text x="1081.3" y="791.0" class="vector-detail">conçus pour les humains</text>
  <line x1="1081.3" y1="815.0" x2="1532.0" y2="815.0" stroke="#2d8a8a" stroke-width="0.6"/>
  <text x="1081.3" y="831.0" class="parade-label">PARADE DOMINANTE</text>
  <text x="1081.3" y="847.0" class="parade-text">Sandbox stricte + visual content filtering + HITL</text>
  <text x="1081.3" y="863.0" class="parade-text">approval sur transactions financières/légales</text>
  <text x="1081.3" y="879.0" class="parade-text">(Ch.15 §15.5)</text>
  <text x="1081.3" y="916.0" class="renvoi">→ Ch.14 §14.4 (on-behalf-of) · Ch.15 §15.5 (VPI) · CVE database</text>
  <text x="50" y="952" class="loadbearing-title">QUATRE PARADES LOAD-BEARING (transverses aux six surfaces)</text>
  <rect x="50.0" y="960" width="363.0" height="90" class="loadbearing-box" rx="4"/>
  <text x="64.0" y="982" class="loadbearing-title">Sigstore + hash pinning</text>
  <text x="64.0" y="1002" class="loadbearing-body">Signature cryptographique des serveurs</text>
  <text x="64.0" y="1017" class="loadbearing-body">MCP. Spec v2 obligatoire automne 2026</text>
  <text x="64.0" y="1032" class="loadbearing-body">(AAIF). Cible : compromise registry.</text>
  <rect x="429.0" y="960" width="363.0" height="90" class="loadbearing-box" rx="4"/>
  <text x="443.0" y="982" class="loadbearing-title">Tool tagging par origine</text>
  <text x="443.0" y="1002" class="loadbearing-body">Métadonnée d'origine sur chaque tool</text>
  <text x="443.0" y="1017" class="loadbearing-body">exposé. Permet allowlist par catégorie de</text>
  <text x="443.0" y="1032" class="loadbearing-body">risque. Cible : tool poisoning.</text>
  <rect x="808.0" y="960" width="363.0" height="90" class="loadbearing-box" rx="4"/>
  <text x="822.0" y="982" class="loadbearing-title">Allowlist namespace</text>
  <text x="822.0" y="1002" class="loadbearing-body">Cloisonnement strict des serveurs MCP par</text>
  <text x="822.0" y="1017" class="loadbearing-body">session/tenant. Aucun call cross-namespace</text>
  <text x="822.0" y="1032" class="loadbearing-body">sans validation. Cible : confusion.</text>
  <rect x="1187.0" y="960" width="363.0" height="90" class="loadbearing-box" rx="4"/>
  <text x="1201.0" y="982" class="loadbearing-title">HITL writes irréversibles</text>
  <text x="1201.0" y="1002" class="loadbearing-body">Approbation humaine obligatoire sur tout</text>
  <text x="1201.0" y="1017" class="loadbearing-body">write financier / légal / shell / DB.</text>
  <text x="1201.0" y="1032" class="loadbearing-body">Cible : execute_sql + on-behalf-of.</text>
  <text x="50" y="1108" class="caption">Sources : OWASP LLM Top 10 + ASI Top 10 (déc 2025) · MITRE ATLAS · NIST AI RMF · livre Ch.10 + Ch.13 + Ch.15 + Ch.19 §19.10</text>
  <text x="1550" y="1108" text-anchor="end" class="caption">E4 · livre « Anatomie d'une IA agentique »</text>
