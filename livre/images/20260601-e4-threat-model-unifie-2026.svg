<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1130" font-family="Inter, system-ui, sans-serif" role="img" aria-labelledby="title-e4">
  <title id="title-e4">E4 — Threat model unifié 2026 : six surfaces, six familles, quatre parades load-bearing</title>
  <desc>Threat model unifié 2026 pour agents IA. Six surfaces d'attaque : modèle, prompt, mémoire, outil, protocole, surface utilisateur. Pour chaque surface : 2-3 vecteurs typiques avec exemples CVE/incidents, parade load-bearing, renvoi chapitre. Quatre parades transverses : Sigstore + hash pinning, tool tagging, allowlist namespace, HITL writes.</desc>
