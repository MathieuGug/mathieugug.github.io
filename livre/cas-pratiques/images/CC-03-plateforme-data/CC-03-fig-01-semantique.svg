<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect width="1280" height="760" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="54" font-size="28" font-weight="600" letter-spacing="-0.4">
    La même question, deux réponses
  </text>
  <text x="60" y="88" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Pourquoi la couche sémantique gouvernée décide tout — le modèle, lui, est interchangeable.
  </text>

  <!-- Question banner -->
  <rect x="390" y="110" width="500" height="56" fill="#1e1e2a" rx="10"/>
  <text x="640" y="146" font-size="20" font-weight="600" fill="#ffffff" text-anchor="middle">« Combien de clients actifs ? »</text>

  <!-- LEFT PANEL — sans -->
  <rect x="60" y="200" width="560" height="440" fill="#fbf2f2" stroke="#a83232" stroke-width="1.8" rx="12"/>
  <text x="84" y="232" class="mono" font-size="12" font-weight="700" letter-spacing="0.12" fill="#a83232">SANS COUCHE SÉMANTIQUE — INDUSTRIALISER L'ERREUR</text>

  <rect x="90" y="250" width="500" height="64" fill="#ffffff" stroke="#a83232" stroke-width="1.6" rx="8"/>
  <text x="106" y="276" font-size="14" font-weight="600">Text-to-SQL sans définition gouvernée</text>
  <text x="106" y="298" font-size="13" fill="#a83232">→ invente une définition plausible et fausse</text>

  <!-- 7 chips -->
  <g class="mono">
    <rect x="90" y="334" width="240" height="56" fill="#ffffff" stroke="#c98" stroke-width="1.2" rx="6"/>
    <text x="102" y="356" font-size="11" fill="#5a5a5a">connecté &lt; 30 j</text>
    <text x="102" y="378" font-size="16" font-weight="700" fill="#a83232">487 000</text>

    <rect x="350" y="334" width="240" height="56" fill="#ffffff" stroke="#c98" stroke-width="1.2" rx="6"/>
    <text x="362" y="356" font-size="11" fill="#5a5a5a">a transigé ce trim.</text>
    <text x="362" y="378" font-size="16" font-weight="700" fill="#a83232">412 000</text>

    <rect x="90" y="400" width="240" height="56" fill="#ffffff" stroke="#c98" stroke-width="1.2" rx="6"/>
    <text x="102" y="422" font-size="11" fill="#5a5a5a">non résilié</text>
    <text x="102" y="444" font-size="16" font-weight="700" fill="#a83232">521 000</text>

    <rect x="350" y="400" width="240" height="56" fill="#ffffff" stroke="#c98" stroke-width="1.2" rx="6"/>
    <text x="362" y="422" font-size="11" fill="#5a5a5a">≥ 1 login</text>
    <text x="362" y="444" font-size="16" font-weight="700" fill="#a83232">503 000</text>

    <rect x="90" y="466" width="240" height="56" fill="#ffffff" stroke="#c98" stroke-width="1.2" rx="6"/>
    <text x="102" y="488" font-size="11" fill="#5a5a5a">facturé ce mois</text>
    <text x="102" y="510" font-size="16" font-weight="700" fill="#a83232">391 000</text>

    <rect x="350" y="466" width="240" height="56" fill="#ffffff" stroke="#c98" stroke-width="1.2" rx="6"/>
    <text x="362" y="488" font-size="11" fill="#5a5a5a">compte ouvert</text>
    <text x="362" y="510" font-size="16" font-weight="700" fill="#a83232">467 000</text>

    <rect x="220" y="532" width="240" height="56" fill="#ffffff" stroke="#c98" stroke-width="1.2" rx="6"/>
    <text x="232" y="554" font-size="11" fill="#5a5a5a">actif CRM</text>
    <text x="232" y="576" font-size="16" font-weight="700" fill="#a83232">458 000</text>
  </g>

  <text x="340" y="618" font-size="14" font-weight="600" fill="#a83232" text-anchor="middle">7 définitions implicites → 7 chiffres. Le COMEX se dispute.</text>

  <!-- RIGHT PANEL — avec -->
  <rect x="660" y="200" width="560" height="440" fill="#f0f4ec" stroke="#4d6635" stroke-width="1.8" rx="12"/>
  <text x="684" y="232" class="mono" font-size="12" font-weight="700" letter-spacing="0.12" fill="#4d6635">AVEC COUCHE SÉMANTIQUE GOUVERNÉE</text>

  <rect x="690" y="250" width="500" height="100" fill="#ffffff" stroke="#4d6635" stroke-width="1.6" rx="8"/>
  <text x="706" y="276" class="mono" font-size="11" font-weight="600" fill="#4d6635">DÉFINITION UNIQUE · TESTÉE · OWNER : DATA</text>
  <text x="706" y="302" font-size="15" font-weight="600">client actif =</text>
  <text x="706" y="324" font-size="14" fill="#1a1a1a">a transigé ce trimestre OU connecté &lt; 30 jours</text>
  <text x="706" y="342" font-size="12" font-style="italic" fill="#5a5a5a">une fois pour toutes, gouvernée</text>

  <!-- arrow down -->
  <path d="M 940 350 L 940 400" fill="none" stroke="#4d6635" stroke-width="2"/>
  <polygon points="940,406 936,398 944,398" fill="#4d6635"/>

  <!-- single result -->
  <rect x="790" y="412" width="300" height="96" fill="#ffffff" stroke="#4d6635" stroke-width="2.2" rx="8"/>
  <text x="940" y="448" font-size="13" fill="#5a5a5a" text-anchor="middle">1 définition → 1 chiffre</text>
  <text x="940" y="486" class="display" font-size="34" font-weight="600" fill="#1a1a1a" text-anchor="middle">412 000</text>

  <!-- lineage -->
  <rect x="690" y="528" width="500" height="60" fill="#e8f0ef" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
  <text x="706" y="552" class="mono" font-size="11" font-weight="600" fill="#2e7a7a">LINEAGE + CONFIANCE</text>
  <text x="706" y="574" font-size="13" fill="#1a1a1a">source → dbt → métrique gouvernée · confiance 99 % · traçable</text>

  <text x="940" y="618" font-size="14" font-weight="600" fill="#4d6635" text-anchor="middle">1 vérité, tracée. La traçabilité est la confiance.</text>

  <!-- Bottom caption -->
  <line x1="60" y1="660" x2="1220" y2="660" stroke="#c5b9a3" stroke-width="1"/>
  <text x="60" y="692" class="display" font-size="16" font-style="italic" fill="#1a1a1a">
    Démocratiser sans socle sémantique, c'est industrialiser sept réponses contradictoires. Le test de véracité du cas.
  </text>
  <text x="60" y="730" font-size="12" font-style="italic" fill="#8a8a8a">
    Source : illustration du rôle de la couche sémantique · juin 2026 · chiffres fictifs pour la démonstration.
  </text>
</svg>
