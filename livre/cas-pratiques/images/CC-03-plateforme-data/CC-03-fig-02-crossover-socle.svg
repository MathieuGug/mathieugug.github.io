<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect width="1280" height="760" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="54" font-size="28" font-weight="600" letter-spacing="-0.4">
    Le crossover du socle — un ROI diffus qui s'amortit en aval
  </text>
  <text x="60" y="88" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Le socle ne rend rien seul. Il multiplie la valeur de tout ce qui le consomme — coût par requête à valeur, en €.
  </text>

  <!-- Zones -->
  <rect x="140" y="150" width="520" height="420" fill="#fbf2f2" opacity="0.55"/>
  <rect x="660" y="150" width="520" height="420" fill="#f0f4ec" opacity="0.55"/>
  <text x="400" y="180" class="mono" font-size="12" font-weight="700" fill="#a83232" text-anchor="middle">AVANT CROSSOVER — SOCLE INJUSTIFIÉ</text>
  <text x="920" y="180" class="mono" font-size="12" font-weight="700" fill="#4d6635" text-anchor="middle">APRÈS CROSSOVER — SOCLE RENTABLE</text>

  <!-- Axes -->
  <line x1="140" y1="150" x2="140" y2="570" stroke="#1a1a1a" stroke-width="1.6"/>
  <line x1="140" y1="570" x2="1180" y2="570" stroke="#1a1a1a" stroke-width="1.6"/>

  <!-- Y gridlines + labels -->
  <g class="mono" font-size="11" fill="#8a8a8a">
    <line x1="140" y1="210" x2="1180" y2="210" stroke="#c5b9a3" stroke-width="0.8" stroke-dasharray="3 4"/>
    <text x="128" y="214" text-anchor="end">14 €</text>
    <line x1="140" y1="310" x2="1180" y2="310" stroke="#c5b9a3" stroke-width="0.8" stroke-dasharray="3 4"/>
    <text x="128" y="314" text-anchor="end">10 €</text>
    <line x1="140" y1="448" x2="1180" y2="448" stroke="#c5b9a3" stroke-width="0.8" stroke-dasharray="3 4"/>
    <text x="128" y="452" text-anchor="end">4,5 €</text>
    <text x="128" y="552" text-anchor="end">0 €</text>
  </g>

  <!-- X labels -->
  <g class="mono" font-size="12" fill="#5a5a5a">
    <text x="240" y="594" text-anchor="middle">1 domaine</text>
    <text x="240" y="610" text-anchor="middle" font-size="10">(socle)</text>
    <text x="520" y="594" text-anchor="middle">3 domaines</text>
    <text x="520" y="610" text-anchor="middle" font-size="10">(gouvernance)</text>
    <text x="800" y="594" text-anchor="middle">domaines majeurs</text>
    <text x="800" y="610" text-anchor="middle" font-size="10">(démocratisation)</text>
    <text x="1080" y="594" text-anchor="middle">socle fédéré</text>
    <text x="1080" y="610" text-anchor="middle" font-size="10">(N copilots)</text>
  </g>
  <text x="660" y="640" class="mono" font-size="11" fill="#8a8a8a" text-anchor="middle">→ nombre de domaines gouvernés &amp; consommateurs en aval</text>

  <!-- Crossover vertical line -->
  <line x1="660" y1="150" x2="660" y2="570" stroke="#b8582e" stroke-width="2" stroke-dasharray="7 4"/>
  <rect x="566" y="120" width="188" height="26" fill="#b8582e" rx="4"/>
  <text x="660" y="138" class="mono" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">CROSSOVER DU SOCLE</text>

  <!-- Cost curve -->
  <polyline points="240,210 520,448 800,533 1080,549" fill="none" stroke="#2e7a7a" stroke-width="3"/>
  <g fill="#2e7a7a">
    <circle cx="240" cy="210" r="6"/>
    <circle cx="520" cy="448" r="6"/>
    <circle cx="800" cy="533" r="6"/>
    <circle cx="1080" cy="549" r="6"/>
  </g>
  <g class="mono" font-size="13" font-weight="700" fill="#1a6a6a">
    <text x="240" y="196" text-anchor="middle">14,00 €</text>
    <text x="520" y="434" text-anchor="middle">4,50 €</text>
    <text x="800" y="520" text-anchor="middle">1,10 €</text>
    <text x="1080" y="536" text-anchor="middle">0,45 €</text>
  </g>
  <text x="300" y="250" class="display" font-size="14" font-style="italic" fill="#2e7a7a">coût par requête à valeur</text>

  <!-- Downstream consumers -->
  <text x="860" y="240" font-size="13" font-weight="600" fill="#4d6635">Consommé sans être repayé :</text>
  <g class="mono" font-size="12">
    <rect x="860" y="252" width="90" height="28" fill="#ffffff" stroke="#4d6635" rx="4"/>
    <text x="905" y="271" fill="#4d6635" text-anchor="middle">CC-00</text>
    <rect x="958" y="252" width="90" height="28" fill="#ffffff" stroke="#4d6635" rx="4"/>
    <text x="1003" y="271" fill="#4d6635" text-anchor="middle">CC-01</text>
    <rect x="1056" y="252" width="90" height="28" fill="#ffffff" stroke="#4d6635" rx="4"/>
    <text x="1101" y="271" fill="#4d6635" text-anchor="middle">CC-02</text>
  </g>
  <text x="860" y="304" font-size="12" fill="#5a5a5a">chaque copilot métier réutilise le socle</text>

  <!-- Bottom caption -->
  <line x1="60" y1="672" x2="1220" y2="672" stroke="#c5b9a3" stroke-width="1"/>
  <text x="60" y="704" class="display" font-size="16" font-style="italic" fill="#1a1a1a">
    Sous quelques domaines, le socle est un coût fixe lourd. Au-delà, il s'amortit sur tous les cas en aval — l'analogue data du crossover de flotte (CC-11).
  </text>
  <text x="60" y="742" font-size="12" font-style="italic" fill="#8a8a8a">
    Source : trajectoire de coûts CC-03 · juin 2026 · le coût par requête à valeur divise par ~30 par amortissement du socle, pas par optimisation du modèle.
  </text>
</svg>
