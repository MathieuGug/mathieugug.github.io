  <line x1="90" y1="700" x2="910" y2="700" stroke="#1a1a1a" stroke-width="1.6"/>
  <text x="107" y="722" font-size="13" font-weight="600" text-anchor="middle">Socle</text>
  <text x="185" y="722" font-size="13" font-weight="600" text-anchor="middle">Gouvernance</text>
  <text x="370" y="722" font-size="14" font-weight="600" text-anchor="middle">Démocratisation</text>
  <text x="708" y="722" font-size="14" font-weight="600" text-anchor="middle">Socle fédéré</text>

  <text x="60" y="746" class="mono" font-size="11" font-weight="700" letter-spacing="0.08" fill="#2e7a7a">DOMAINES GOUVERNÉS / CONSOMMATEURS</text>
  <rect x="75" y="752" width="64" height="24" fill="#e8f0ef" stroke="#2e7a7a" stroke-width="1.2" rx="12"/>
  <text x="107" y="769" class="mono" font-size="11" font-weight="700" fill="#2e7a7a" text-anchor="middle">1 / 20</text>
  <rect x="153" y="752" width="64" height="24" fill="#e8f0ef" stroke="#2e7a7a" stroke-width="1.2" rx="12"/>
