  <rect x="660" y="752" width="96" height="24" fill="#2e7a7a" stroke="#2e7a7a" stroke-width="1.2" rx="12"/>
  <text x="708" y="769" class="mono" font-size="11" font-weight="700" style="fill:#ffffff" text-anchor="middle">fédéré / N</text>
  <text x="90" y="794" font-size="11" font-weight="700" fill="#b8582e">crossover du socle ≈ 3-4 domaines : au-delà, il s'amortit sur tous les cas en aval (CC-00, CC-01, CC-02…)</text>

  <text x="1030" y="160" class="mono" font-size="12" font-weight="700" letter-spacing="0.14" fill="#5a5a5a">POSTE — TRAJECTOIRE POC → SCALE (k€)</text>
  <rect x="1030" y="184" width="18" height="18" fill="#b8582e"/>
  <text x="1058" y="198" font-size="13" font-weight="600">Équipe</text>
  <text x="1300" y="198" class="mono" font-size="12" fill="#1a1a1a">120 → 1 200</text>
  <text x="1460" y="198" font-size="11" font-weight="700" fill="#b8582e" text-anchor="end">×10</text>
  <rect x="1030" y="216" width="18" height="18" fill="#8fb0d6"/>
  <text x="1058" y="230" font-size="13" font-weight="600">Infra</text>
  <text x="1058" y="247" font-size="11" fill="#7a7a7a">compute warehouse</text>
  <text x="1300" y="230" class="mono" font-size="12" fill="#1a1a1a">40 → 620</text>
  <text x="1460" y="230" font-size="11" font-weight="700" fill="#3d5a82" text-anchor="end">dominant</text>
  <rect x="1030" y="260" width="18" height="18" fill="#2e7a7a"/>
  <text x="1058" y="274" font-size="13" font-weight="600">Data</text>
  <text x="1058" y="291" font-size="11" fill="#7a7a7a">sémantique + qualité</text>
  <text x="1300" y="274" class="mono" font-size="12" fill="#1a1a1a">60 → 420</text>
  <text x="1460" y="274" font-size="11" font-weight="700" fill="#2e7a7a" text-anchor="end">le chantier</text>
  <rect x="1030" y="304" width="18" height="18" fill="#a83232"/>
  <text x="1058" y="318" font-size="13" font-weight="600">Change</text>
  <text x="1300" y="318" class="mono" font-size="12" fill="#1a1a1a">10 → 380</text>
  <text x="1460" y="318" font-size="11" font-weight="700" fill="#a83232" text-anchor="end">apparaît</text>
  <rect x="1030" y="336" width="18" height="18" fill="#9a9a9a"/>
  <text x="1058" y="350" font-size="13" font-weight="600">Gouvernance</text>
  <text x="1300" y="350" class="mono" font-size="12" fill="#1a1a1a">30 → 320</text>
  <rect x="1030" y="368" width="18" height="18" fill="#5a8a6a"/>
  <text x="1058" y="382" font-size="13" font-weight="600">Sécurité</text>
  <text x="1300" y="382" class="mono" font-size="12" fill="#1a1a1a">20 → 260</text>
  <rect x="1030" y="400" width="18" height="18" fill="#3d5a82"/>
  <text x="1058" y="414" font-size="13" font-weight="600">Inférence</text>
  <text x="1300" y="414" class="mono" font-size="12" fill="#1a1a1a">8 → 280</text>
  <rect x="1030" y="432" width="18" height="18" fill="#d4a000"/>
  <text x="1058" y="446" font-size="13" font-weight="600">Évaluation</text>
  <text x="1300" y="446" class="mono" font-size="12" fill="#1a1a1a">10 → 200</text>
  <line x1="1030" y1="464" x2="1460" y2="464" stroke="#c5b9a3" stroke-width="0.8"/>
  <text x="1058" y="486" font-size="13" font-weight="700">Total</text>
  <text x="1300" y="486" class="mono" font-size="12" font-weight="700">298 → 3 680</text>

  <rect x="1030" y="516" width="430" height="124" fill="#e8f0ef" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
  <text x="1050" y="542" class="mono" font-size="12" font-weight="700" letter-spacing="0.12" fill="#2e7a7a">LE COMPUTE + LA DATA, DÈS LE DÉPART</text>
  <text x="1050" y="568" font-size="13" fill="#1a1a1a">Infra (compute warehouse) 40 → 620 : le self-serve</text>
  <text x="1050" y="588" font-size="13" fill="#1a1a1a">consomme à l'usage → FinOps. Data 60 → 420 :</text>
  <text x="1050" y="608" font-size="13" font-weight="600" fill="#2e7a7a">la couche sémantique EST le chantier (lourd dès le socle).</text>
  <text x="1050" y="628" font-size="12" font-style="italic" fill="#5a5a5a">l'inférence (text-to-SQL) reste un petit poste.</text>
  <rect x="1030" y="656" width="430" height="96" fill="#f5e6dc" stroke="#b8582e" stroke-width="1.4" rx="8"/>
  <text x="1050" y="682" class="mono" font-size="12" font-weight="700" letter-spacing="0.12" fill="#b8582e">UN ROI DIFFUS</text>
  <text x="1050" y="708" font-size="13" fill="#1a1a1a">Le coût/requête à valeur ÷30 (14 € → 0,45 €) non</text>
  <text x="1050" y="728" font-size="13" fill="#1a1a1a">par optimisation du modèle, mais par amortissement</text>
  <text x="1050" y="746" font-size="11" font-style="italic" fill="#7a3a1e">du socle sur les cas en aval (ch. 21.7).</text>

  <text x="60" y="860" font-size="13" font-style="italic" fill="#5a5a5a">
    Lecture : chaque colonne = 100 % du coût de sa phase ; sa largeur ∝ coût total. Le socle ne rend rien seul — il multiplie la valeur de tout ce qui le consomme.
  </text>
  <text x="60" y="888" font-size="12" font-style="italic" fill="#8a8a8a">
    Grille CC-03, en k€ · compute facturé à l'usage (FinOps) · la couche sémantique gouvernée est le poste data lourd dès le départ.
  </text>

</svg>
