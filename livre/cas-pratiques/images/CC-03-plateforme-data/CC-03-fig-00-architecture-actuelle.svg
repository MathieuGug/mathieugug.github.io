<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1130"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect width="1600" height="1130" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="58" font-size="32" font-weight="600" letter-spacing="-0.5">
    Architecture du socle data moderne — et le gardien sécurité/accès
  </text>
  <text x="60" y="96" class="display" font-size="20" font-style="italic" fill="#5a5a5a">
    Sources → ingestion → warehouse → dbt → couche sémantique → BI. Le trou au milieu décide si le « démocratiser » est un actif.
  </text>

  <!-- COUCHE AGENTIQUE (top band) -->
  <rect x="60" y="160" width="1480" height="150" fill="#f5e6dc" stroke="#b8582e" stroke-width="1.6" stroke-dasharray="8 4" rx="14"/>
  <text x="78" y="188" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#b8582e">COUCHE AGENTIQUE — GREFFÉE SUR LE SOCLE</text>

  <g>
    <rect x="540" y="206" width="280" height="86" fill="#ffffff" stroke="#b8582e" stroke-width="1.8" rx="8"/>
    <text x="556" y="230" class="mono" font-size="10" font-weight="600" fill="#b8582e">AUTOMATISER</text>
    <text x="556" y="254" font-size="15" font-weight="600">Agents data quality</text>
    <text x="556" y="276" font-size="12" fill="#5a5a5a">anomalies · tests dbt · catalogue</text>

    <rect x="840" y="206" width="280" height="86" fill="#ffffff" stroke="#b8582e" stroke-width="2.2" rx="8"/>
    <text x="856" y="230" class="mono" font-size="10" font-weight="700" fill="#b8582e">ANALYSER</text>
    <text x="856" y="254" font-size="15" font-weight="600">Text-to-SQL gouverné</text>
    <text x="856" y="276" font-size="12" fill="#5a5a5a">+ exploration · data storytelling</text>

    <rect x="1140" y="206" width="280" height="86" fill="#ffffff" stroke="#b8582e" stroke-width="1.8" rx="8"/>
    <text x="1156" y="230" class="mono" font-size="10" font-weight="600" fill="#b8582e">DÉMOCRATISER</text>
    <text x="1156" y="254" font-size="15" font-weight="600">Self-service métier</text>
    <text x="1156" y="276" font-size="12" fill="#5a5a5a">conditionné à la gouvernance</text>
  </g>

  <!-- PIPELINE DATA -->
  <!-- Sources -->
  <g>
    <rect x="60" y="380" width="200" height="240" fill="#ffffff" stroke="#3d5a82" stroke-width="1.8" rx="8"/>
    <text x="76" y="406" class="mono" font-size="11" font-weight="600" fill="#3d5a82">SOURCES</text>
    <text x="76" y="434" font-size="16" font-weight="600">ERP (SAP)</text>
    <text x="76" y="458" font-size="16" font-weight="600">CRM (Salesforce)</text>
    <text x="76" y="482" font-size="14" fill="#5a5a5a">Apps transactionnelles</text>
    <text x="76" y="502" font-size="14" fill="#5a5a5a">SaaS métier</text>
    <text x="76" y="534" font-size="13" font-style="italic" fill="#a83232">un « client » SAP ≠</text>
    <text x="76" y="554" font-size="13" font-style="italic" fill="#a83232">un « client » CRM</text>
    <text x="76" y="584" font-size="12" fill="#5a5a5a">→ source des 7 définitions</text>
    <rect x="76" y="596" width="70" height="20" fill="#e8f0ef" stroke="#2e7a7a" rx="3"/>
    <text x="84" y="611" class="mono" font-size="10" font-weight="700" fill="#2e7a7a">READ</text>
  </g>

  <!-- Ingestion -->
  <g>
    <rect x="300" y="380" width="170" height="240" fill="#ffffff" stroke="#6f8db4" stroke-width="1.6" rx="8"/>
    <text x="316" y="406" class="mono" font-size="11" font-weight="600" fill="#3d5a82">INGESTION</text>
    <text x="316" y="434" font-size="15" font-weight="600">Fivetran /</text>
    <text x="316" y="454" font-size="15" font-weight="600">Airbyte (managé)</text>
    <text x="316" y="486" font-size="14" fill="#5a5a5a">+ ETL batch legacy</text>
    <text x="316" y="506" font-size="14" fill="#5a5a5a">(scripts, Talend)</text>
    <text x="316" y="540" font-size="13" font-style="italic" fill="#7a5a3a">les scripts = angles</text>
    <text x="316" y="560" font-size="13" font-style="italic" fill="#7a5a3a">morts de qualité</text>
  </g>

  <!-- Warehouse -->
  <g>
    <rect x="510" y="380" width="230" height="240" fill="#ffffff" stroke="#3d5a82" stroke-width="2.0" rx="8"/>
    <text x="526" y="406" class="mono" font-size="11" font-weight="600" fill="#3d5a82">WAREHOUSE / LAKEHOUSE</text>
    <text x="526" y="434" font-size="17" font-weight="600">Snowflake /</text>
    <text x="526" y="456" font-size="17" font-weight="600">BigQuery /</text>
    <text x="526" y="478" font-size="17" font-weight="600">Databricks</text>
    <text x="526" y="510" font-size="14" fill="#5a5a5a">Le cœur du socle</text>
    <rect x="526" y="528" width="198" height="58" fill="#fff8e8" stroke="#d4a000" stroke-width="1.6" rx="4"/>
    <text x="538" y="550" font-size="13" font-weight="600" fill="#8a6500">€ Compute facturé</text>
    <text x="538" y="570" font-size="13" fill="#8a6500">à l'usage → FinOps</text>
    <rect x="650" y="392" width="74" height="20" fill="#f5e6dc" stroke="#b8582e" rx="3"/>
    <text x="658" y="407" class="mono" font-size="10" font-weight="700" fill="#b8582e">R+W</text>
  </g>

  <!-- dbt -->
  <g>
    <rect x="770" y="380" width="170" height="240" fill="#ffffff" stroke="#6f8db4" stroke-width="1.6" rx="8"/>
    <text x="786" y="406" class="mono" font-size="11" font-weight="600" fill="#3d5a82">TRANSFORMATION</text>
    <text x="786" y="434" font-size="17" font-weight="600">dbt</text>
    <text x="786" y="462" font-size="14" fill="#5a5a5a">Modèles + tests</text>
    <text x="786" y="482" font-size="14" fill="#5a5a5a">(parfois SQL</text>
    <text x="786" y="502" font-size="14" fill="#5a5a5a">artisanal)</text>
    <text x="786" y="540" font-size="13" font-style="italic" fill="#5a5a5a">existe parfois,</text>
    <text x="786" y="560" font-size="13" font-style="italic" fill="#5a5a5a">pas toujours</text>
  </g>

  <!-- COUCHE SEMANTIQUE — le trou -->
  <g>
    <rect x="970" y="380" width="240" height="240" fill="#fbf2f2" stroke="#a83232" stroke-width="2.4" stroke-dasharray="9 5" rx="8"/>
    <text x="986" y="406" class="mono" font-size="11" font-weight="700" fill="#a83232">COUCHE SÉMANTIQUE</text>
    <text x="986" y="436" font-size="18" font-weight="600">Le trou ⚠</text>
    <text x="986" y="462" font-size="14" fill="#1a1a1a" font-weight="600">À CONSTRUIRE</text>
    <text x="986" y="488" font-size="13" fill="#5a5a5a">1 métrique = 1 owner</text>
    <text x="986" y="508" font-size="13" fill="#5a5a5a">= 1 définition testée</text>
    <text x="986" y="538" font-size="13" fill="#a83232" font-weight="600">Sans elle, le text-to-SQL</text>
    <text x="986" y="558" font-size="13" fill="#a83232" font-weight="600">hallucine une définition</text>
    <text x="986" y="584" font-size="12" font-style="italic" fill="#a83232">le sclérosant — 60 % de l'effort</text>
  </g>

  <!-- BI -->
  <g>
    <rect x="1240" y="380" width="300" height="240" fill="#ffffff" stroke="#7a9a5e" stroke-width="1.8" rx="8"/>
    <text x="1256" y="406" class="mono" font-size="11" font-weight="600" fill="#4d6635">RESTITUTION — BI</text>
    <text x="1256" y="434" font-size="17" font-weight="600">Power BI / Tableau / Looker</text>
    <text x="1256" y="462" font-size="14" fill="#5a5a5a">Forêt de ~1 800 dashboards</text>
    <text x="1256" y="482" font-size="14" fill="#5a5a5a">(dont ~60 % obsolètes)</text>
    <rect x="1256" y="500" width="268" height="56" fill="#f9f3eb" stroke="#b89370" stroke-width="1.4" rx="4"/>
    <text x="1268" y="522" font-size="13" font-weight="600" fill="#7a5a3a">+ spreadmarts Excel</text>
    <text x="1268" y="542" font-size="12" fill="#7a5a3a">= shadow data, chiffres recalculés à la main</text>
    <text x="1256" y="588" font-size="12" font-style="italic" fill="#5a5a5a">contredisent le warehouse</text>
  </g>

  <!-- GARDIEN (bottom band) -->
  <rect x="60" y="690" width="1480" height="150" fill="#fbf2f2" stroke="#a83232" stroke-width="2.0" rx="14"/>
  <text x="78" y="718" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#a83232">★ LE GARDIEN — SÉCURITÉ / ACCÈS (la condition d'ouverture)</text>
  <g>
    <rect x="100" y="736" width="320" height="86" fill="#ffffff" stroke="#a83232" stroke-width="1.6" rx="8"/>
    <text x="116" y="760" font-size="15" font-weight="600">RBAC durci</text>
    <text x="116" y="782" font-size="13" fill="#5a5a5a">le text-to-SQL hérite des droits</text>
    <text x="116" y="802" font-size="13" fill="#a83232">→ pas plus que l'utilisateur</text>

    <rect x="640" y="736" width="320" height="86" fill="#ffffff" stroke="#a83232" stroke-width="1.6" rx="8"/>
    <text x="656" y="760" font-size="15" font-weight="600">Lineage de bout en bout</text>
    <text x="656" y="782" font-size="13" fill="#5a5a5a">chaque chiffre traçable</text>
    <text x="656" y="802" font-size="13" fill="#a83232">→ la traçabilité = la confiance</text>

    <rect x="1180" y="736" width="320" height="86" fill="#ffffff" stroke="#a83232" stroke-width="1.6" rx="8"/>
    <text x="1196" y="760" font-size="15" font-weight="600">DLP + gouvernance métriques</text>
    <text x="1196" y="782" font-size="13" fill="#5a5a5a">domaines sensibles (RH, finance)</text>
    <text x="1196" y="802" font-size="13" fill="#a83232">→ sécuriser AVANT de démocratiser</text>
  </g>

  <!-- ARROWS pipeline -->
  <path d="M 260 500 L 294 500" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="300,500 290,496 290,504" fill="#1a1a1a"/>
  <path d="M 470 500 L 504 500" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="510,500 500,496 500,504" fill="#1a1a1a"/>
  <path d="M 740 500 L 764 500" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="770,500 760,496 760,504" fill="#1a1a1a"/>
  <path d="M 940 500 L 964 500" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="970,500 960,496 960,504" fill="#1a1a1a"/>
  <path d="M 1210 500 L 1234 500" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="1240,500 1230,496 1230,504" fill="#1a1a1a"/>

  <!-- Agentic reads from semantic (down arrow from text-to-SQL to semantic) -->
  <path d="M 980 296 L 1040 374" fill="none" stroke="#b8582e" stroke-width="1.8" stroke-dasharray="6 3"/>
  <polygon points="1044,379 1033,376 1040,370" fill="#b8582e"/>
  <rect x="980" y="326" width="150" height="20" fill="#faf6ec" opacity="0.94" rx="3"/>
  <text x="1055" y="341" class="mono" font-size="10" font-weight="600" fill="#b8582e" text-anchor="middle">sur la sémantique</text>

  <!-- Gardien gates the whole pipeline (up arrow) -->
  <path d="M 800 686 L 800 626" fill="none" stroke="#a83232" stroke-width="1.8" stroke-dasharray="4 3"/>
  <polygon points="800,620 796,628 804,628" fill="#a83232"/>
  <rect x="710" y="646" width="180" height="20" fill="#faf6ec" opacity="0.94" rx="3"/>
  <text x="800" y="661" class="mono" font-size="10" font-weight="600" fill="#a83232" text-anchor="middle">gate tout accès</text>

  <!-- LÉGENDE -->
  <text x="60" y="888" font-size="13" font-style="italic" fill="#8a8a8a">
    Source : analyse du socle data moderne · juin 2026 · la couche sémantique gouvernée et le RBAC sont la condition de la démocratisation — pas le modèle.
  </text>

  <g>
    <line x1="60" y1="900" x2="1540" y2="900" stroke="#c5b9a3" stroke-width="1"/>
    <text x="60" y="928" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#5a5a5a">LÉGENDE</text>

    <text x="60" y="954" font-size="13" font-weight="600">Couches</text>
    <rect x="60" y="966" width="14" height="14" fill="#f5e6dc" stroke="#b8582e" stroke-dasharray="3 2"/>
    <text x="82" y="978" font-size="12">Couche agentique (greffée)</text>
    <rect x="60" y="986" width="14" height="14" fill="#ffffff" stroke="#3d5a82"/>
    <text x="82" y="998" font-size="12">Pipeline data (commodités managées)</text>
    <rect x="60" y="1006" width="14" height="14" fill="#fbf2f2" stroke="#a83232" stroke-dasharray="3 2"/>
    <text x="82" y="1018" font-size="12">Couche sémantique (le trou à combler)</text>

    <text x="560" y="954" font-size="13" font-weight="600">Signaux</text>
    <rect x="560" y="966" width="14" height="14" fill="#fff8e8" stroke="#d4a000" stroke-width="1.4"/>
    <text x="582" y="978" font-size="12">€ Compute facturé à l'usage (FinOps)</text>
    <text x="560" y="998" font-size="12" font-style="italic" fill="#a83232">⚠ Couche sémantique = le sclérosant</text>
    <text x="560" y="1018" font-size="12" font-style="italic" fill="#a83232">★ Gardien = sécuriser avant démocratiser</text>

    <text x="1060" y="954" font-size="13" font-weight="600">Flux</text>
    <line x1="1060" y1="972" x2="1094" y2="972" stroke="#1a1a1a" stroke-width="2"/>
    <text x="1104" y="977" font-size="12">Flux de données (ELT)</text>
    <line x1="1060" y1="992" x2="1094" y2="992" stroke="#b8582e" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="1104" y="997" font-size="12">Agent lit la couche sémantique</text>
    <line x1="1060" y1="1012" x2="1094" y2="1012" stroke="#a83232" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="1104" y="1017" font-size="12">Le gardien gate tout accès</text>
  </g>
</svg>
