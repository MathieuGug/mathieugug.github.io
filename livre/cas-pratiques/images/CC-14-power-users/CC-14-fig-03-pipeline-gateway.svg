<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <defs>
    <marker id="arrowGw03" markerWidth="12" markerHeight="12" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#b38600"/>
    </marker>
    <marker id="arrowDs" markerWidth="12" markerHeight="12" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2e7a7a"/>
    </marker>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1600" height="1000" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="58" font-size="28" font-weight="600" letter-spacing="-0.5">
    Pipeline gateway — reconstruire un organigramme depuis une capture Teams
  </text>
  <text x="60" y="92" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    L'exemple canonique : la gateway LLM transforme une compétence manuelle en enabler de portefeuille.
  </text>

  <!-- BANDEAU GATEWAY (englobant le pipeline) -->
  <rect x="60" y="130" width="1480" height="380" fill="#fdf6e8" stroke="#d4a000" stroke-width="2" stroke-dasharray="8 4" rx="14"/>
  <text x="78" y="158" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#8a6500">GATEWAY LLM (enabler #7) — orchestration séquentielle du sous-agent custom « org-from-screenshot »</text>

  <!-- ÉTAPE 1 : Capture Teams -->
  <g>
    <rect x="100" y="200" width="260" height="220" fill="#ffffff" stroke="#a83232" stroke-width="1.6" rx="10"/>
    <text x="230" y="230" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#a83232">ENTRÉE</text>
    <text x="230" y="258" text-anchor="middle" font-size="16" font-weight="600">Capture Teams</text>
    <text x="230" y="278" text-anchor="middle" font-size="12" font-style="italic" fill="#5a5a5a">vue org chart dense, peu lisible</text>
    <!-- Mini représentation -->
    <rect x="130" y="296" width="200" height="98" fill="#f0eee6" stroke="#a83232" stroke-width="0.8" stroke-dasharray="3 2" rx="4"/>
    <rect x="200" y="304" width="60" height="14" fill="#c8c2b3" rx="2"/>
    <rect x="160" y="330" width="36" height="12" fill="#c8c2b3" rx="2"/>
    <rect x="220" y="330" width="36" height="12" fill="#c8c2b3" rx="2"/>
    <rect x="280" y="330" width="36" height="12" fill="#c8c2b3" rx="2"/>
    <rect x="138" y="354" width="28" height="10" fill="#d5d0c2" rx="2"/>
    <rect x="172" y="354" width="28" height="10" fill="#d5d0c2" rx="2"/>
    <rect x="206" y="354" width="28" height="10" fill="#d5d0c2" rx="2"/>
    <rect x="240" y="354" width="28" height="10" fill="#d5d0c2" rx="2"/>
    <rect x="274" y="354" width="28" height="10" fill="#d5d0c2" rx="2"/>
    <line x1="230" y1="318" x2="178" y2="330" stroke="#a83232" stroke-width="0.6"/>
    <line x1="230" y1="318" x2="238" y2="330" stroke="#a83232" stroke-width="0.6"/>
    <line x1="230" y1="318" x2="298" y2="330" stroke="#a83232" stroke-width="0.6"/>
    <text x="230" y="412" text-anchor="middle" class="mono" font-size="11" fill="#a83232">PNG · upload via gateway</text>
  </g>

  <line x1="360" y1="310" x2="408" y2="310" stroke="#b38600" stroke-width="2.4" marker-end="url(#arrowGw03)"/>

  <!-- ÉTAPE 2 : OCR (modèle partagé) -->
  <g>
    <rect x="412" y="200" width="260" height="220" fill="#ffffff" stroke="#d4a000" stroke-width="1.6" rx="10"/>
    <text x="542" y="230" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#8a6500">ÉTAPE 1 · OCR</text>
    <text x="542" y="258" text-anchor="middle" font-size="16" font-weight="600">Extraction texte</text>
    <text x="542" y="278" text-anchor="middle" font-size="12" font-style="italic" fill="#5a5a5a">modèle partagé du socle</text>
    <rect x="436" y="296" width="212" height="98" fill="#fdf6e8" stroke="#d4a000" stroke-width="0.8" rx="4"/>
    <text x="448" y="316" class="mono" font-size="11" fill="#5a5a5a">• [FONCTION_DIR]</text>
    <text x="448" y="333" class="mono" font-size="11" fill="#5a5a5a">  └─ [MANAGER_A]</text>
    <text x="448" y="350" class="mono" font-size="11" fill="#5a5a5a">      ├─ [COLLAB_A1]</text>
    <text x="448" y="367" class="mono" font-size="11" fill="#5a5a5a">      ├─ [COLLAB_A2]</text>
    <text x="448" y="384" class="mono" font-size="11" fill="#5a5a5a">  └─ [MANAGER_B] ...</text>
    <text x="542" y="412" text-anchor="middle" class="mono" font-size="11" fill="#8a6500">~0,008 € · ~600 ms</text>
  </g>

  <line x1="672" y1="310" x2="720" y2="310" stroke="#b38600" stroke-width="2.4" marker-end="url(#arrowGw03)"/>

  <!-- ÉTAPE 3 : Vision LLM -->
  <g>
    <rect x="724" y="200" width="260" height="220" fill="#ffffff" stroke="#d4a000" stroke-width="1.6" rx="10"/>
    <text x="854" y="230" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#8a6500">ÉTAPE 2 · VISION LLM</text>
    <text x="854" y="258" text-anchor="middle" font-size="16" font-weight="600">Extraction hiérarchie</text>
    <text x="854" y="278" text-anchor="middle" font-size="12" font-style="italic" fill="#5a5a5a">token scopé power user</text>
    <rect x="748" y="296" width="212" height="98" fill="#fdf6e8" stroke="#d4a000" stroke-width="0.8" rx="4"/>
    <text x="758" y="316" class="mono" font-size="10" fill="#5a5a5a">{ "root": "[FONCTION_DIR]",</text>
    <text x="758" y="333" class="mono" font-size="10" fill="#5a5a5a">  "children": [</text>
    <text x="758" y="350" class="mono" font-size="10" fill="#5a5a5a">    { "name": "[MANAGER_A]",</text>
    <text x="758" y="367" class="mono" font-size="10" fill="#5a5a5a">      "team": [...] },</text>
    <text x="758" y="384" class="mono" font-size="10" fill="#5a5a5a">    { "name": "[MANAGER_B]" } ] }</text>
    <text x="854" y="412" text-anchor="middle" class="mono" font-size="11" fill="#8a6500">~0,018 € · ~1,4 s</text>
  </g>

  <line x1="984" y1="310" x2="1032" y2="310" stroke="#b38600" stroke-width="2.4" marker-end="url(#arrowGw03)"/>

  <!-- ÉTAPE 4 : Briques SVG du socle -->
  <g>
    <rect x="1036" y="200" width="260" height="220" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.6" rx="10"/>
    <text x="1166" y="230" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#226a6a">ÉTAPE 3 · RENDU</text>
    <text x="1166" y="258" text-anchor="middle" font-size="16" font-weight="600">Briques SVG du socle</text>
    <text x="1166" y="278" text-anchor="middle" font-size="12" font-style="italic" fill="#5a5a5a">enabler #1 — design system</text>
    <rect x="1060" y="296" width="212" height="98" fill="#eaf3f1" stroke="#2e7a7a" stroke-width="0.8" rx="4"/>
    <!-- Mini org chart propre -->
    <rect x="1136" y="304" width="72" height="16" fill="#2e7a7a" rx="3"/>
    <rect x="1080" y="332" width="44" height="14" fill="#7a9a5e" rx="3"/>
    <rect x="1148" y="332" width="44" height="14" fill="#7a9a5e" rx="3"/>
    <rect x="1216" y="332" width="44" height="14" fill="#7a9a5e" rx="3"/>
    <line x1="1172" y1="320" x2="1102" y2="332" stroke="#2e7a7a" stroke-width="1"/>
    <line x1="1172" y1="320" x2="1170" y2="332" stroke="#2e7a7a" stroke-width="1"/>
    <line x1="1172" y1="320" x2="1238" y2="332" stroke="#2e7a7a" stroke-width="1"/>
    <rect x="1068" y="358" width="28" height="12" fill="#b8c9a5" rx="2"/>
    <rect x="1102" y="358" width="28" height="12" fill="#b8c9a5" rx="2"/>
    <rect x="1136" y="358" width="28" height="12" fill="#b8c9a5" rx="2"/>
    <rect x="1170" y="358" width="28" height="12" fill="#b8c9a5" rx="2"/>
    <rect x="1204" y="358" width="28" height="12" fill="#b8c9a5" rx="2"/>
    <rect x="1238" y="358" width="28" height="12" fill="#b8c9a5" rx="2"/>
    <text x="1166" y="384" text-anchor="middle" class="mono" font-size="10" fill="#226a6a">SVG propre · responsive</text>
    <text x="1166" y="412" text-anchor="middle" class="mono" font-size="11" fill="#226a6a">~0,004 € · ~300 ms</text>
  </g>

  <!-- Flèche vers sortie -->
  <line x1="1296" y1="310" x2="1344" y2="310" stroke="#2e7a7a" stroke-width="2.4" marker-end="url(#arrowDs)"/>

  <!-- SORTIE : HTML hébergé -->
  <g>
    <rect x="1348" y="200" width="172" height="220" fill="#f0f4ec" stroke="#7a9a5e" stroke-width="1.6" rx="10"/>
    <text x="1434" y="230" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#4d6635">SORTIE</text>
    <text x="1434" y="258" text-anchor="middle" font-size="16" font-weight="600">Org chart propre</text>
    <text x="1434" y="282" text-anchor="middle" font-size="12" fill="#5a5a5a">HTML interactif</text>
    <text x="1434" y="300" text-anchor="middle" font-size="12" fill="#5a5a5a">hébergé bucket SSO</text>
    <text x="1434" y="318" text-anchor="middle" font-size="12" fill="#5a5a5a">lien révocable</text>
    <text x="1434" y="346" text-anchor="middle" class="mono" font-size="10" fill="#4d6635">enablers</text>
    <text x="1434" y="362" text-anchor="middle" class="mono" font-size="10" fill="#4d6635">#1 · #2 · #3</text>
    <text x="1434" y="412" text-anchor="middle" class="mono" font-size="11" fill="#4d6635">→ partage manager</text>
  </g>

  <!-- Légende enablers mobilisés (sous le bandeau gateway) -->
  <text x="80" y="476" class="mono" font-size="11" font-weight="700" letter-spacing="0.10" fill="#8a6500">ENABLERS MOBILISÉS :</text>
  <text x="240" y="476" font-size="12" fill="#5a5a5a">#7 gateway LLM (tokens + modèles partagés + sous-agent) · #1 briques UX (rendu SVG) · #2 hébergement (bucket) · #4 logs (audit coût + accès)</text>

  <!-- BANDEAU AVANT / APRÈS -->
  <rect x="60" y="546" width="730" height="324" fill="#ffffff" stroke="#a83232" stroke-width="1.4" rx="12"/>
  <text x="78" y="576" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#a83232">AVANT — sans socle, sans gateway</text>
  <text x="78" y="610" font-size="16" font-weight="600">~2 heures manuel</text>
  <text x="78" y="640" font-size="13" fill="#5a5a5a">Le [RH_BUSINESS_PARTNER] ouvre un outil de</text>
  <text x="78" y="660" font-size="13" fill="#5a5a5a">présentation, redessine manuellement les cadres,</text>
  <text x="78" y="680" font-size="13" fill="#5a5a5a">retape chaque nom, refait toutes les flèches.</text>
  <text x="78" y="710" font-size="13" font-style="italic" fill="#5a5a5a">À refaire à chaque évolution d'équipe.</text>
  <text x="78" y="744" class="mono" font-size="12" fill="#a83232">→ compétence ARTISANALE, non réutilisable</text>
  <text x="78" y="764" class="mono" font-size="12" fill="#a83232">→ pas de mutualisation entre power users</text>
  <text x="78" y="784" class="mono" font-size="12" fill="#a83232">→ coût caché : ~120 min × N managers</text>

  <line x1="412" y1="566" x2="412" y2="850" stroke="#a83232" stroke-width="0.6" stroke-dasharray="3 3"/>

  <text x="432" y="576" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#4d6635">APRÈS — avec socle + gateway LLM</text>
  <text x="432" y="610" font-size="16" font-weight="600">~3 minutes via sous-agent</text>
  <text x="432" y="640" font-size="13" fill="#5a5a5a">Le [RH_BUSINESS_PARTNER] uploade la capture,</text>
  <text x="432" y="660" font-size="13" fill="#5a5a5a">le pipeline OCR → vision LLM → rendu SVG</text>
  <text x="432" y="680" font-size="13" fill="#5a5a5a">tourne et sort un HTML interactif partageable.</text>
  <text x="432" y="710" font-size="13" font-style="italic" fill="#5a5a5a">Réutilisable par tous les managers du périmètre.</text>
  <text x="432" y="744" class="mono" font-size="12" fill="#4d6635">→ ENABLER DE PORTEFEUILLE mutualisé</text>
  <text x="432" y="764" class="mono" font-size="12" fill="#4d6635">→ refactor en brique stable si N ≥ 3 usages</text>
  <text x="432" y="784" class="mono" font-size="12" fill="#4d6635">→ coût mutualisé : ~0,03 € × N usages</text>

  <!-- Gros chiffre -->
  <text x="78" y="836" class="display" font-size="22" font-weight="700" fill="#a83232">120 min</text>
  <text x="186" y="836" font-size="14" fill="#5a5a5a">par usage</text>
  <text x="432" y="836" class="display" font-size="22" font-weight="700" fill="#4d6635">3 min</text>
  <text x="500" y="836" font-size="14" fill="#5a5a5a">par usage · ÷ 40</text>

  <!-- PANNEAU COÛT MESURÉ -->
  <rect x="810" y="546" width="730" height="324" fill="#fdf6e8" stroke="#d4a000" stroke-width="1.6" rx="12"/>
  <text x="828" y="576" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#8a6500">COÛT MESURÉ — gateway LLM + logs centralisés</text>

  <text x="828" y="616" font-size="14" font-weight="600">Par exécution du sous-agent « org-from-screenshot »</text>

  <g>
    <rect x="828" y="632" width="332" height="32" fill="#ffffff" stroke="#d4a000" stroke-width="0.8" rx="4"/>
    <text x="844" y="652" class="mono" font-size="12" fill="#5a5a5a">OCR modèle partagé</text>
    <text x="1144" y="652" text-anchor="end" class="mono" font-size="12" font-weight="700" fill="#8a6500">~0,008 €</text>
  </g>
  <g>
    <rect x="828" y="668" width="332" height="32" fill="#ffffff" stroke="#d4a000" stroke-width="0.8" rx="4"/>
    <text x="844" y="688" class="mono" font-size="12" fill="#5a5a5a">Vision LLM (token scopé)</text>
    <text x="1144" y="688" text-anchor="end" class="mono" font-size="12" font-weight="700" fill="#8a6500">~0,018 €</text>
  </g>
  <g>
    <rect x="828" y="704" width="332" height="32" fill="#ffffff" stroke="#d4a000" stroke-width="0.8" rx="4"/>
    <text x="844" y="724" class="mono" font-size="12" fill="#5a5a5a">Rendu briques SVG socle</text>
    <text x="1144" y="724" text-anchor="end" class="mono" font-size="12" font-weight="700" fill="#8a6500">~0,004 €</text>
  </g>
  <g>
    <rect x="828" y="740" width="332" height="32" fill="#fdf0d0" stroke="#d4a000" stroke-width="1.2" rx="4"/>
    <text x="844" y="760" class="mono" font-size="13" font-weight="700" fill="#8a6500">TOTAL par usage</text>
    <text x="1144" y="760" text-anchor="end" class="mono" font-size="13" font-weight="700" fill="#8a6500">~0,030 €</text>
  </g>

  <!-- Encart audit -->
  <rect x="1180" y="616" width="340" height="232" fill="#ffffff" stroke="#d4a000" stroke-width="1.0" stroke-dasharray="4 3" rx="8"/>
  <text x="1196" y="640" class="mono" font-size="11" font-weight="700" fill="#8a6500">JOURNALISATION (logs centralisés #4)</text>
  <text x="1196" y="668" font-size="12" fill="#5a5a5a">{ "user": "[RH_BP]",</text>
  <text x="1196" y="686" font-size="12" fill="#5a5a5a">  "sub_agent":</text>
  <text x="1196" y="704" font-size="12" fill="#5a5a5a">    "org-from-screenshot",</text>
  <text x="1196" y="722" font-size="12" fill="#5a5a5a">  "tokens_used": 4128,</text>
  <text x="1196" y="740" font-size="12" fill="#5a5a5a">  "cost_eur": 0.030,</text>
  <text x="1196" y="758" font-size="12" fill="#5a5a5a">  "duration_ms": 2340,</text>
  <text x="1196" y="776" font-size="12" fill="#5a5a5a">  "department": "DRH",</text>
  <text x="1196" y="794" font-size="12" fill="#5a5a5a">  "quota_remaining": "OK",</text>
  <text x="1196" y="812" font-size="12" fill="#5a5a5a">  "audit_trail": "..." }</text>
  <text x="1196" y="838" class="mono" font-size="11" font-style="italic" fill="#8a6500">→ attribué au token power user · DPO audit RGPD</text>

  <!-- LEÇON — bandeau bas -->
  <rect x="60" y="892" width="1480" height="64" fill="#eaf3f1" stroke="#2e7a7a" stroke-width="1.2" rx="10"/>
  <text x="80" y="922" class="display" font-size="18" font-style="italic" font-weight="600" fill="#226a6a">La leçon : la gateway LLM transforme les compétences artisanales en enablers de portefeuille.</text>
  <text x="80" y="944" font-size="13" fill="#5a5a5a">Quand un sous-agent custom devient utile à plusieurs power users (≥ 3 usages), il est extrait, packagé et bascule en brique stable du socle — refactor maintenu par le CoE.</text>

  <!-- SOURCE -->
  <text x="60" y="984" font-size="12" font-style="italic" fill="#8a8a8a">
    Source : exemple canonique CC-14 · juin 2026 · pipeline composé de 4 enablers du socle (#1, #2, #4, #7). Coûts indicatifs OCR/vision/rendu 2026 · scoping audit RGPD.
  </text>
</svg>
