<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <defs>
    <marker id="arrowCycle" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#b8582e"/>
    </marker>
    <marker id="arrowDec" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7a7a7a"/>
    </marker>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1600" height="1000" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="58" font-size="28" font-weight="600" letter-spacing="-0.5">
    Cycle de vie d'une app power user + six design patterns packagés
  </text>
  <text x="60" y="92" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Les trois portes que la sprawl n'avait pas : admission, bascule projet officiel, dé-commissionnement.
  </text>

  <!-- ═════ ZONE GAUCHE : CYCLE DE VIE ═════ -->
  <rect x="60" y="130" width="780" height="820" fill="#f0f4ec" stroke="#7a9a5e" stroke-width="1.4" stroke-dasharray="8 4" rx="14"/>
  <text x="78" y="158" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#4d6635">CYCLE DE VIE D'UNE APP POWER USER</text>

  <!-- Étape 1 : Idée -->
  <g>
    <rect x="100" y="190" width="700" height="68" fill="#ffffff" stroke="#7a9a5e" stroke-width="1.4" rx="8"/>
    <circle cx="130" cy="224" r="14" fill="#7a9a5e"/>
    <text x="130" y="229" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="156" y="218" font-size="15" font-weight="600">Idée — un power user a un besoin</text>
    <text x="156" y="238" font-size="12" fill="#5a5a5a">Suivi, dashboard, livrable interactif, mini-outil. Il ouvre Claude Code.</text>
    <text x="156" y="252" class="mono" font-size="11" fill="#4d6635">aucun cadre encore — usage personnel libre</text>
  </g>

  <line x1="450" y1="262" x2="450" y2="290" stroke="#b8582e" stroke-width="2" marker-end="url(#arrowCycle)"/>

  <!-- Étape 2 : Création avec paved road -->
  <g>
    <rect x="100" y="300" width="700" height="68" fill="#ffffff" stroke="#7a9a5e" stroke-width="1.4" rx="8"/>
    <circle cx="130" cy="334" r="14" fill="#7a9a5e"/>
    <text x="130" y="339" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="156" y="328" font-size="15" font-weight="600">Création — paved road via socle d'enablers</text>
    <text x="156" y="348" font-size="12" fill="#5a5a5a">Template design system + briques mutualisées + MCP servers internes.</text>
    <text x="156" y="362" class="mono" font-size="11" fill="#4d6635">Claude Code libre, mais voie conforme plus simple que partage personnel</text>
  </g>

  <line x1="450" y1="372" x2="450" y2="400" stroke="#b8582e" stroke-width="2" marker-end="url(#arrowCycle)"/>

  <!-- Étape 3 : Admission au registre (porte 1) -->
  <g>
    <rect x="100" y="410" width="700" height="76" fill="#fdf6e8" stroke="#d4a000" stroke-width="1.8" rx="8"/>
    <circle cx="130" cy="448" r="14" fill="#d4a000"/>
    <text x="130" y="453" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="156" y="436" font-size="15" font-weight="600" fill="#8a6500">PORTE 1 — admission au registre</text>
    <text x="156" y="456" font-size="12" fill="#5a5a5a">Déclenchée quand ≥ 5 utilisateurs OU destinataire externe au département.</text>
    <text x="156" y="472" font-size="12" fill="#5a5a5a">Owner nommé, finalité, données, statut RGPD, niveau de risque.</text>
    <text x="156" y="486" class="mono" font-size="11" fill="#8a6500">tier 1 (DPO+sécu) / tier 2 (revue pairs) / tier 3 (self-service)</text>
  </g>

  <line x1="450" y1="490" x2="450" y2="518" stroke="#b8582e" stroke-width="2" marker-end="url(#arrowCycle)"/>

  <!-- Étape 4 : Hébergement SSO + checks au push -->
  <g>
    <rect x="100" y="528" width="700" height="68" fill="#ffffff" stroke="#7a9a5e" stroke-width="1.4" rx="8"/>
    <circle cx="130" cy="562" r="14" fill="#7a9a5e"/>
    <text x="130" y="567" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="156" y="554" font-size="15" font-weight="600">Hébergement SSO + checks automatisés au push</text>
    <text x="156" y="574" font-size="12" fill="#5a5a5a">URL interne sous domaine officiel, accès scopés, lien révocable.</text>
    <text x="156" y="588" class="mono" font-size="11" fill="#4d6635">a11y · responsive · pas de secrets · pas de PII statique · deps whitelistées</text>
  </g>

  <line x1="450" y1="598" x2="450" y2="626" stroke="#b8582e" stroke-width="2" marker-end="url(#arrowCycle)"/>

  <!-- Étape 5 : Run + observabilité légère -->
  <g>
    <rect x="100" y="636" width="700" height="68" fill="#ffffff" stroke="#7a9a5e" stroke-width="1.4" rx="8"/>
    <circle cx="130" cy="670" r="14" fill="#7a9a5e"/>
    <text x="130" y="675" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">5</text>
    <text x="156" y="662" font-size="15" font-weight="600">Run — observabilité légère</text>
    <text x="156" y="682" font-size="12" fill="#5a5a5a">Compteur d'usage par app, dernière utilisation, accès anormaux.</text>
    <text x="156" y="696" class="mono" font-size="11" fill="#4d6635">détection précoce des zombies + des dérives</text>
  </g>

  <line x1="450" y1="706" x2="450" y2="734" stroke="#b8582e" stroke-width="2" marker-end="url(#arrowCycle)"/>

  <!-- Étape 6 : Revue 6 mois -->
  <g>
    <rect x="100" y="744" width="700" height="76" fill="#fdf6e8" stroke="#d4a000" stroke-width="1.8" rx="8"/>
    <circle cx="130" cy="782" r="14" fill="#d4a000"/>
    <text x="130" y="787" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">6</text>
    <text x="156" y="770" font-size="15" font-weight="600" fill="#8a6500">Revue 6 mois — comité semestriel</text>
    <text x="156" y="790" font-size="12" fill="#5a5a5a">Arbitre doublons inter-départements, met à jour tiering, décide la suite.</text>
    <text x="156" y="806" font-size="12" fill="#5a5a5a">Trois sorties possibles :</text>
    <text x="156" y="820" class="mono" font-size="11" fill="#8a6500">renouvellement / bascule projet officiel / dé-commissionnement</text>
  </g>

  <!-- Étape 7a, 7b, 7c : trois sorties -->
  <line x1="280" y1="828" x2="200" y2="864" stroke="#b8582e" stroke-width="2" marker-end="url(#arrowCycle)"/>
  <line x1="450" y1="828" x2="450" y2="864" stroke="#b8582e" stroke-width="2" marker-end="url(#arrowCycle)"/>
  <line x1="620" y1="828" x2="700" y2="864" stroke="#7a7a7a" stroke-width="2" marker-end="url(#arrowDec)"/>

  <g>
    <rect x="100" y="874" width="180" height="60" fill="#ffffff" stroke="#7a9a5e" rx="6"/>
    <text x="110" y="894" font-size="12" font-weight="600">7a · Renouvellement</text>
    <text x="110" y="912" font-size="11" fill="#5a5a5a">Usage actif, tier stable,</text>
    <text x="110" y="926" font-size="11" fill="#5a5a5a">prolongée 6 mois.</text>
  </g>

  <g>
    <rect x="360" y="874" width="180" height="60" fill="#fdf6e8" stroke="#d4a000" stroke-width="1.6" rx="6"/>
    <text x="368" y="892" font-size="12" font-weight="600" fill="#8a6500">7b · PORTE 2 — bascule</text>
    <text x="368" y="908" font-size="11" fill="#5a5a5a">L'app devient source de</text>
    <text x="368" y="922" font-size="11" fill="#5a5a5a">vérité → projet officiel.</text>
  </g>

  <g>
    <rect x="620" y="874" width="180" height="60" fill="#f4efe2" stroke="#7a7a7a" stroke-width="1.6" rx="6"/>
    <text x="628" y="892" font-size="12" font-weight="600" fill="#5a5a5a">7c · PORTE 3 — éteinte</text>
    <text x="628" y="908" font-size="11" fill="#5a5a5a">Zombie ou doublon →</text>
    <text x="628" y="922" font-size="11" fill="#5a5a5a">dé-commissionnement.</text>
  </g>

  <!-- ═════ ZONE DROITE : 6 DESIGN PATTERNS ═════ -->
  <rect x="860" y="130" width="680" height="820" fill="#eaf3f1" stroke="#2e7a7a" stroke-width="1.4" stroke-dasharray="8 4" rx="14"/>
  <text x="878" y="158" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#226a6a">SIX DESIGN PATTERNS PACKAGÉS (service #6 du socle)</text>
  <text x="878" y="178" font-size="12" font-style="italic" fill="#5a5a5a">Stables · transverses · reconnaissables — ce qui transforme une collection en système.</text>

  <!-- Pattern 1 : Progressive disclosure -->
  <g>
    <rect x="880" y="200" width="640" height="110" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.2" rx="8"/>
    <circle cx="908" cy="226" r="13" fill="#2e7a7a"/>
    <text x="908" y="231" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#ffffff">a</text>
    <text x="932" y="231" font-size="15" font-weight="600">Progressive disclosure</text>
    <text x="900" y="256" font-size="12" fill="#5a5a5a">Synthèse exécutive + détails repliés à la demande.</text>
    <text x="900" y="276" class="mono" font-size="11" fill="#226a6a">brique : composant accordéon + heuristique niveau de détail</text>
    <text x="900" y="298" font-size="12" font-style="italic" fill="#5a5a5a">Cas d'usage : un livrable RH avec scorecards repliées, ouvertes au clic.</text>
  </g>

  <!-- Pattern 2 : Annotations interactives -->
  <g>
    <rect x="880" y="322" width="640" height="110" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.2" rx="8"/>
    <circle cx="908" cy="348" r="13" fill="#2e7a7a"/>
    <text x="908" y="353" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#ffffff">b</text>
    <text x="932" y="353" font-size="15" font-weight="600">Annotations interactives</text>
    <text x="900" y="378" font-size="12" fill="#5a5a5a">Décision documentée pas-à-pas — markers + tooltips + sidebar.</text>
    <text x="900" y="398" class="mono" font-size="11" fill="#226a6a">brique : composant marker + tooltip + sidebar commentaires</text>
    <text x="900" y="420" font-size="12" font-style="italic" fill="#5a5a5a">Cas d'usage : un audit ou un livrable RH avec décisions sourcées.</text>
  </g>

  <!-- Pattern 3 : Deep-link figcaption ¶ -->
  <g>
    <rect x="880" y="444" width="640" height="110" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.2" rx="8"/>
    <circle cx="908" cy="470" r="13" fill="#2e7a7a"/>
    <text x="908" y="475" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#ffffff">c</text>
    <text x="932" y="475" font-size="15" font-weight="600">Deep-link figcaption ¶</text>
    <text x="900" y="500" font-size="12" fill="#5a5a5a">Pointer un schéma précis dans un échange asynchrone (lien direct).</text>
    <text x="900" y="520" class="mono" font-size="11" fill="#226a6a">brique : convention &lt;a class="anchor" href="#fig-NN"&gt;¶&lt;/a&gt;</text>
    <text x="900" y="542" font-size="12" font-style="italic" fill="#5a5a5a">Cas d'usage : commenter une figure d'un rapport sans la dupliquer.</text>
  </g>

  <!-- Pattern 4 : Tableau filtrable + tri -->
  <g>
    <rect x="880" y="566" width="640" height="110" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.2" rx="8"/>
    <circle cx="908" cy="592" r="13" fill="#2e7a7a"/>
    <text x="908" y="597" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#ffffff">d</text>
    <text x="932" y="597" font-size="15" font-weight="600">Tableau filtrable + tri</text>
    <text x="900" y="622" font-size="12" fill="#5a5a5a">Suivi opérationnel (licences, projets, candidats, budget).</text>
    <text x="900" y="642" class="mono" font-size="11" fill="#226a6a">brique : composant data-table avec sort/filter, zéro dépendance</text>
    <text x="900" y="664" font-size="12" font-style="italic" fill="#5a5a5a">Cas d'usage : le suivi budgétaire mensuel — pattern le plus récurrent.</text>
  </g>

  <!-- Pattern 5 : Scrolly narrative -->
  <g>
    <rect x="880" y="688" width="640" height="110" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.2" rx="8"/>
    <circle cx="908" cy="714" r="13" fill="#2e7a7a"/>
    <text x="908" y="719" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#ffffff">e</text>
    <text x="932" y="719" font-size="15" font-weight="600">Scrolly narrative</text>
    <text x="900" y="744" font-size="12" fill="#5a5a5a">Présentation chronologique : roadmap, parcours utilisateur, retex projet.</text>
    <text x="900" y="764" class="mono" font-size="11" fill="#226a6a">brique : mini-framework HTML/CSS sticky + steps</text>
    <text x="900" y="786" font-size="12" font-style="italic" fill="#5a5a5a">Cas d'usage : la roadmap marketing — pattern qui a remplacé le SaaS.</text>
  </g>

  <!-- Pattern 6 : Export PDF/PPT -->
  <g>
    <rect x="880" y="810" width="640" height="120" fill="#fdf6e8" stroke="#d4a000" stroke-width="1.6" rx="8"/>
    <circle cx="908" cy="836" r="13" fill="#d4a000"/>
    <text x="908" y="841" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#ffffff">f</text>
    <text x="932" y="841" font-size="15" font-weight="600" fill="#8a6500">Export PDF/PPT — médiation générationnelle</text>
    <text x="900" y="866" font-size="12" fill="#5a5a5a">Double sortie : HTML interactif pour produire + PDF/PPT pour consommer.</text>
    <text x="900" y="886" class="mono" font-size="11" fill="#8a6500">brique : bouton "exporter en PDF/PPT" + route serveur de conversion</text>
    <text x="900" y="908" font-size="12" font-style="italic" fill="#8a6500">Cas d'usage : présenter au CODIR senior sans confrontation PPT/HTML.</text>
    <text x="900" y="924" font-size="11" font-weight="600" fill="#a83232">→ condition non négociable du verdict GO</text>
  </g>

  <!-- SOURCE -->
  <text x="60" y="976" font-size="12" font-style="italic" fill="#8a8a8a">
    Source : cycle de vie + design patterns du socle d'enablers power users · juin 2026 · ce qui transforme une sprawl en portefeuille piloté.
  </text>
</svg>
