  <g font-size="13" fill="#1a1a1a">
    <text x="1098" y="220" font-weight="600" fill="#a83232">✕ Pas de design system commun</text>
    <text x="1098" y="240" font-size="12">chaque power user code son CSS</text>
    <text x="1098" y="258" font-size="12">→ cacophonie visuelle inter-apps</text>

    <text x="1098" y="296" font-weight="600" fill="#a83232">✕ Pas d'hébergement SSO</text>
    <text x="1098" y="316" font-size="12">apps sur partages personnels</text>
    <text x="1098" y="334" font-size="12">→ indexation publique accidentelle</text>

    <text x="1098" y="372" font-weight="600" fill="#a83232">✕ Pas de registre</text>
    <text x="1098" y="392" font-size="12">qui ? finalité ? données ? RGPD ?</text>
    <text x="1098" y="410" font-size="12">→ on découvre l'app quand elle casse</text>

    <text x="1098" y="448" font-weight="600" fill="#a83232">✕ Pas d'observabilité légère</text>
    <text x="1098" y="468" font-size="12">usage réel ? dernière utilisation ?</text>
    <text x="1098" y="486" font-size="12">→ ≈ 45 % zombies à 6 mois</text>

    <text x="1098" y="524" font-weight="600" fill="#a83232">✕ Pas de briques mutualisées</text>
    <text x="1098" y="544" font-size="12">80 apps qui rebuildent chacune</text>
    <text x="1098" y="562" font-size="12">leur tableau filtrable + export PDF</text>

    <text x="1098" y="600" font-weight="600" fill="#a83232">✕ Pas de MCP servers internes</text>
    <text x="1098" y="620" font-size="12">datamart, fiches RH copiés en CSV</text>
    <text x="1098" y="638" font-size="12">→ fuites diffuses, pas d'audit</text>

    <text x="1098" y="676" font-weight="600" fill="#a83232">✕ Pas de médiation PPT/HTML</text>
    <text x="1098" y="696" font-size="12">conflit générationnel non encadré</text>
    <text x="1098" y="714" font-size="12">→ sentiment de classe RH</text>
