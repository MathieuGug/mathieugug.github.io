<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <defs>
    <marker id="arrowFed14" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2e7a7a"/>
    </marker>
    <marker id="arrowGw" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#b38600"/>
    </marker>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1600" height="1200" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="58" font-size="28" font-weight="600" letter-spacing="-0.5">
    Le socle d'enablers — sept services + RACI fédéré
  </text>
  <text x="60" y="92" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Le CoE enablement possède le socle, les power users possèdent leurs apps. Le socle enveloppe Claude Code, la gateway LLM le complète.
  </text>

  <!-- ZONE SOCLE — partie 1 : 6 enablers en grille 2x3 -->
  <rect x="60" y="130" width="1480" height="300" fill="#eaf3f1" stroke="#2e7a7a" stroke-width="1.6" stroke-dasharray="8 4" rx="14"/>
  <text x="78" y="158" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#226a6a">LE SOCLE D'ENABLERS · PLATEFORME POWER USER — possédé par le CoE enablement</text>

  <!-- Service 1 : Design system + briques UX -->
  <g>
    <rect x="80" y="178" width="486" height="110" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
    <circle cx="104" cy="202" r="11" fill="#2e7a7a"/>
    <text x="104" y="207" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="126" y="207" font-size="15" font-weight="600">Design system + briques UX partagées</text>
    <text x="96" y="234" font-size="12" fill="#5a5a5a">Composants visuels + template HTML + biblio</text>
    <text x="96" y="252" font-size="12" fill="#5a5a5a">réutilisable (charts, tableaux, scrolly, anno-</text>
    <text x="96" y="270" font-size="12" fill="#5a5a5a">tations, deep-link ¶, export PDF/PPT). Via MCP.</text>
    <text x="96" y="284" class="mono" font-size="11" fill="#226a6a">fin de la cacophonie + duplication d'effort</text>
  </g>

  <!-- Service 2 : Hébergement (buckets + DB) -->
  <g>
    <rect x="578" y="178" width="486" height="110" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
    <circle cx="602" cy="202" r="11" fill="#2e7a7a"/>
    <text x="602" y="207" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="624" y="207" font-size="15" font-weight="600">Hébergement standardisé</text>
    <text x="594" y="234" font-size="12" fill="#5a5a5a">URL sous domaine officiel + buckets statiques</text>
    <text x="594" y="252" font-size="12" fill="#5a5a5a">pour HTML + BASE DE DONNÉES managée</text>
    <text x="594" y="270" font-size="12" fill="#5a5a5a">scopée par power user pour apps avec état.</text>
    <text x="594" y="284" class="mono" font-size="11" fill="#226a6a">le composant pivot accès · 3-4 sem. SSO</text>
  </g>

  <!-- Service 3 : Identité & accès -->
  <g>
    <rect x="1076" y="178" width="444" height="110" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
    <circle cx="1100" cy="202" r="11" fill="#2e7a7a"/>
    <text x="1100" y="207" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="1122" y="207" font-size="15" font-weight="600">Identité &amp; accès</text>
    <text x="1092" y="234" font-size="12" fill="#5a5a5a">SSO entreprise + groupes AD pour scoper</text>
    <text x="1092" y="252" font-size="12" fill="#5a5a5a">les apps, partage par lien révocable,</text>
    <text x="1092" y="270" font-size="12" fill="#5a5a5a">audit des accès.</text>
    <text x="1092" y="284" class="mono" font-size="11" fill="#226a6a">fini les liens publics par défaut</text>
  </g>

  <!-- Service 4 : Logs centralisés -->
  <g>
    <rect x="80" y="304" width="486" height="110" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
    <circle cx="104" cy="328" r="11" fill="#2e7a7a"/>
    <text x="104" y="333" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="126" y="333" font-size="15" font-weight="600">Logs centralisés</text>
    <text x="96" y="360" font-size="12" fill="#5a5a5a">Collecte uniforme des erreurs, exceptions,</text>
    <text x="96" y="378" font-size="12" fill="#5a5a5a">audit trail — qui a accédé à quoi, quand,</text>
    <text x="96" y="396" font-size="12" fill="#5a5a5a">depuis où. Pas un APM lourd.</text>
    <text x="96" y="410" class="mono" font-size="11" fill="#226a6a">la traçabilité d'incident + audit RGPD</text>
  </g>

  <!-- Service 5 : Observabilité légère -->
  <g>
    <rect x="578" y="304" width="486" height="110" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
    <circle cx="602" cy="328" r="11" fill="#2e7a7a"/>
    <text x="602" y="333" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">5</text>
    <text x="624" y="333" font-size="15" font-weight="600">Observabilité légère</text>
    <text x="594" y="360" font-size="12" fill="#5a5a5a">Pings de santé, compteur d'usage unique,</text>
    <text x="594" y="378" font-size="12" fill="#5a5a5a">alerte si app non visitée depuis N jours,</text>
    <text x="594" y="396" font-size="12" fill="#5a5a5a">accès anormaux.</text>
    <text x="594" y="410" class="mono" font-size="11" fill="#226a6a">détecte les zombies (45 % à 6 mois)</text>
  </g>

  <!-- Service 6 : Registre -->
  <g>
    <rect x="1076" y="304" width="444" height="110" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
    <circle cx="1100" cy="328" r="11" fill="#2e7a7a"/>
    <text x="1100" y="333" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">6</text>
    <text x="1122" y="333" font-size="15" font-weight="600">Registre d'apps power users</text>
    <text x="1092" y="360" font-size="12" fill="#5a5a5a">Owner, finalité, données, statut RGPD,</text>
    <text x="1092" y="378" font-size="12" fill="#5a5a5a">niveau de risque (tier 1/2/3), dernière</text>
    <text x="1092" y="396" font-size="12" fill="#5a5a5a">utilisation, cycle de vie.</text>
    <text x="1092" y="410" class="mono" font-size="11" fill="#226a6a">l'analogue civil du registre AI Act CC-11</text>
  </g>

  <!-- ZONE GATEWAY LLM — service 7 en exergue, pleine largeur -->
  <rect x="60" y="448" width="1480" height="218" fill="#fdf6e8" stroke="#d4a000" stroke-width="2.2" rx="14"/>
  <text x="78" y="476" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#8a6500">ENABLER PIVOT — la gateway qui transforme les compétences artisanales en enablers de portefeuille</text>

  <circle cx="106" cy="514" r="16" fill="#d4a000"/>
  <text x="106" y="520" text-anchor="middle" class="mono" font-size="15" font-weight="700" fill="#ffffff">7</text>
  <text x="138" y="520" font-size="20" font-weight="700">Gateway LLM + modèles partagés + sous-agents</text>
  <text x="138" y="544" class="display" font-size="14" font-style="italic" fill="#5a5a5a">L'enabler le plus dense — le seul que la plupart des organisations vont BUILD plutôt que BUY.</text>

  <!-- 3 sous-fonctions a/b/c en colonnes -->
  <g>
    <rect x="80" y="562" width="476" height="88" fill="#ffffff" stroke="#d4a000" stroke-width="1.3" rx="8"/>
    <text x="98" y="586" class="mono" font-size="12" font-weight="700" fill="#8a6500">(a) TOKENS SCOPÉS</text>
    <text x="98" y="608" font-size="12" fill="#5a5a5a">API gateway interne qui expose des tokens</text>
    <text x="98" y="624" font-size="12" fill="#5a5a5a">par power user vers les LLM (Claude, modèles</text>
    <text x="98" y="640" font-size="12" fill="#5a5a5a">internes). Quota mensuel + audit des appels.</text>
  </g>

  <g>
    <rect x="572" y="562" width="476" height="88" fill="#ffffff" stroke="#d4a000" stroke-width="1.3" rx="8"/>
    <text x="590" y="586" class="mono" font-size="12" font-weight="700" fill="#8a6500">(b) MODÈLES PARTAGÉS</text>
    <text x="590" y="608" font-size="12" fill="#5a5a5a">OCR, vision, embeddings — mutualisés en</text>
    <text x="590" y="624" font-size="12" fill="#5a5a5a">service partagé du socle. Chaque power user</text>
    <text x="590" y="640" font-size="12" fill="#5a5a5a">les appelle au lieu de redéployer le sien.</text>
  </g>

  <g>
    <rect x="1064" y="562" width="456" height="88" fill="#ffffff" stroke="#d4a000" stroke-width="1.3" rx="8"/>
    <text x="1082" y="586" class="mono" font-size="12" font-weight="700" fill="#8a6500">(c) SOUS-AGENTS CUSTOM</text>
    <text x="1082" y="608" font-size="12" fill="#5a5a5a">Le power user déclare un mini-pipeline</text>
    <text x="1082" y="624" font-size="12" fill="#5a5a5a">(capture → OCR → vision → reconstruction).</text>
    <text x="1082" y="640" font-size="12" fill="#5a5a5a">Le gateway l'exécute avec quota + audit.</text>
  </g>

  <!-- FLÈCHES SOCLE → APPS POWER USERS (enveloppe) -->
  <line x1="314" y1="684" x2="314" y2="722" stroke="#2e7a7a" stroke-width="2" marker-end="url(#arrowFed14)"/>
  <line x1="802" y1="684" x2="802" y2="722" stroke="#2e7a7a" stroke-width="2" marker-end="url(#arrowFed14)"/>
  <line x1="1288" y1="684" x2="1288" y2="722" stroke="#b38600" stroke-width="2" marker-end="url(#arrowGw)"/>

  <!-- ZONE PORTEFEUILLE D'APPS -->
  <text x="60" y="708" class="mono" font-size="13" font-weight="700" letter-spacing="0.12" fill="#5a5a5a">PORTEFEUILLE D'APPS POWER USERS — possédé par les métiers (owner + ROI par app)</text>

  <rect x="60" y="720" width="488" height="124" fill="#f0f4ec" stroke="#7a9a5e" stroke-width="1.4" rx="10"/>
  <text x="78" y="744" class="mono" font-size="12" font-weight="700" letter-spacing="0.10" fill="#4d6635">APPS SUR LA PAVED ROAD (paved = enveloppe socle)</text>
  <text x="78" y="768" font-size="13">~80 apps maison sur 12 mois · ~30 power users</text>
  <text x="78" y="788" font-size="13">Claude Code libre · design system + briques + hébergement SSO</text>
  <text x="78" y="808" font-size="13">Registre tenu · checks au push · logs + observabilité</text>
  <text x="78" y="830" class="mono" font-size="11" fill="#4d6635">tier 3 self-service · tier 2 revue pairs · tier 1 DPO+RSSI</text>

  <rect x="558" y="720" width="488" height="124" fill="#eef2f8" stroke="#6f8db4" stroke-width="1.4" rx="10"/>
  <text x="576" y="744" class="mono" font-size="12" font-weight="700" letter-spacing="0.10" fill="#3d5a82">SAAS RÉSIDUEL — en recul</text>
  <text x="576" y="768" font-size="13">5 abonnements actifs (en baisse trimestre après trimestre)</text>
  <text x="576" y="788" font-size="13">~140 k€/an supprimés en 12 mois (saaspocalypse cumulée)</text>
  <text x="576" y="808" font-size="13">Le DAF voit le chiffre — moteur politique du socle</text>
  <text x="576" y="830" class="mono" font-size="11" fill="#3d5a82">en concurrence avec les apps maison équivalentes</text>

  <rect x="1056" y="720" width="464" height="124" fill="#fbf2f2" stroke="#a83232" stroke-width="1.5" stroke-dasharray="6 4" rx="10"/>
  <text x="1074" y="744" class="mono" font-size="12" font-weight="700" letter-spacing="0.10" fill="#a83232">SHADOW — amnistie + onboarding</text>
  <text x="1074" y="768" font-size="13">2 shadow critiques détectées → bascule projet officiel</text>
  <text x="1074" y="788" font-size="13">Apps non déclarées détectées par scan → onboarding socle</text>
  <text x="1074" y="808" font-size="13">« ramène ton app au registre, on t'aide »</text>
  <text x="1074" y="830" class="mono" font-size="11" fill="#a83232">convertir, pas combattre</text>

  <!-- ZONE RACI FÉDÉRÉ (bas) -->
  <text x="60" y="892" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#5a5a5a">RACI FÉDÉRÉ — qui décide quoi</text>

  <rect x="60" y="906" width="1480" height="240" fill="#fdf6e8" stroke="#d4a000" stroke-width="1.2" rx="10"/>

  <!-- Colonne 1 : CoE enablement -->
  <g>
    <text x="80" y="938" class="mono" font-size="12" font-weight="700" letter-spacing="0.10" fill="#8a6500">COE ENABLEMENT</text>
    <text x="80" y="956" font-size="11" font-style="italic" fill="#5a5a5a">(DSI + UX + sécu)</text>
    <text x="80" y="986" font-size="12" font-weight="600">Possède</text>
    <text x="80" y="1004" font-size="12">• Le socle d'enablers</text>
    <text x="80" y="1022" font-size="12">• Design system + briques UX</text>
    <text x="80" y="1040" font-size="12">• L'hébergement (buckets + DB)</text>
    <text x="80" y="1058" font-size="12">• La gateway LLM + modèles</text>
    <text x="80" y="1076" font-size="12">• Le registre + logs + observ.</text>
    <text x="80" y="1094" font-size="12">• La formation Claude Code</text>
    <text x="80" y="1116" class="mono" font-size="11" fill="#8a6500">Head of Power User Enablement</text>
  </g>

  <line x1="356" y1="926" x2="356" y2="1132" stroke="#d4a000" stroke-width="1"/>

  <!-- Colonne 2 : Power user -->
  <g>
    <text x="376" y="938" class="mono" font-size="12" font-weight="700" letter-spacing="0.10" fill="#8a6500">POWER USER</text>
    <text x="376" y="956" font-size="11" font-style="italic" fill="#5a5a5a">(app product owner)</text>
    <text x="376" y="986" font-size="12" font-weight="600">Possède sa propre app</text>
    <text x="376" y="1004" font-size="12">• La finalité</text>
    <text x="376" y="1022" font-size="12">• Le contenu</text>
    <text x="376" y="1040" font-size="12">• La donnée</text>
    <text x="376" y="1058" font-size="12">• Le ROI de SON app</text>
    <text x="376" y="1076" font-size="12">• Ses sous-agents custom</text>
    <text x="376" y="1094" font-size="12">• Revue 6 mois ou retrait</text>
    <text x="376" y="1116" class="mono" font-size="11" fill="#8a6500">~30 power users distribués</text>
  </g>

  <line x1="652" y1="926" x2="652" y2="1132" stroke="#d4a000" stroke-width="1"/>

  <!-- Colonne 3 : Sécu / DPO -->
  <g>
    <text x="672" y="938" class="mono" font-size="12" font-weight="700" letter-spacing="0.10" fill="#8a6500">SÉCU / DPO</text>
    <text x="672" y="956" font-size="11" font-style="italic" fill="#5a5a5a">(garde-fous proportionnés)</text>
    <text x="672" y="986" font-size="12" font-weight="600">Arbitre par tier</text>
    <text x="672" y="1004" font-size="12">• Revue obligatoire tier 1</text>
    <text x="672" y="1022" font-size="12">• Revue standard tier 2</text>
    <text x="672" y="1040" font-size="12">• Self-service cadré tier 3</text>
    <text x="672" y="1058" font-size="12">• DPIA apps tier 1</text>
    <text x="672" y="1076" font-size="12">• Audit appels gateway</text>
    <text x="672" y="1094" font-size="12">• Audit accès SSO + logs</text>
    <text x="672" y="1116" class="mono" font-size="11" fill="#8a6500">référent socle 0,2 ETP chacun</text>
  </g>

  <line x1="940" y1="926" x2="940" y2="1132" stroke="#d4a000" stroke-width="1"/>

  <!-- Colonne 4 : Manager direct -->
  <g>
    <text x="960" y="938" class="mono" font-size="12" font-weight="700" letter-spacing="0.10" fill="#8a6500">MANAGER DIRECT</text>
    <text x="960" y="956" font-size="11" font-style="italic" fill="#5a5a5a">(du power user)</text>
    <text x="960" y="986" font-size="12" font-weight="600">Reconnaît + priorise</text>
    <text x="960" y="1004" font-size="12">• L'app n'est pas du temps</text>
    <text x="960" y="1020" font-size="12">  « volé »</text>
    <text x="960" y="1040" font-size="12">• Priorisation du time-box</text>
    <text x="960" y="1058" font-size="12">• Quota tokens gateway alloué</text>
    <text x="960" y="1076" font-size="12">• Succession (qui reprend</text>
    <text x="960" y="1092" font-size="12">  l'app si le power user part)</text>
    <text x="960" y="1116" class="mono" font-size="11" fill="#8a6500">levier RH critique</text>
  </g>

  <line x1="1228" y1="926" x2="1228" y2="1132" stroke="#d4a000" stroke-width="1"/>

  <!-- Colonne 5 : Comité semestriel -->
  <g>
    <text x="1248" y="938" class="mono" font-size="12" font-weight="700" letter-spacing="0.10" fill="#8a6500">COMITÉ SEMESTRIEL</text>
    <text x="1248" y="956" font-size="11" font-style="italic" fill="#5a5a5a">(de portefeuille)</text>
    <text x="1248" y="986" font-size="12" font-weight="600">Décisions de portefeuille</text>
    <text x="1248" y="1004" font-size="12">• Admission au registre</text>
    <text x="1248" y="1022" font-size="12">• Dé-commissionnement</text>
    <text x="1248" y="1040" font-size="12">  des zombies</text>
    <text x="1248" y="1058" font-size="12">• Arbitrage doublons</text>
    <text x="1248" y="1076" font-size="12">• Bascule projet officiel</text>
    <text x="1248" y="1094" font-size="12">• Refactor sous-agents stables</text>
    <text x="1248" y="1116" class="mono" font-size="11" fill="#8a6500">DSI + DPO + métiers</text>
  </g>

  <!-- SOURCE -->
  <text x="60" y="1180" font-size="12" font-style="italic" fill="#8a8a8a">
    Source : modèle opératoire CoE power user enablement · juin 2026 · CC-14 pendant civil de CC-11 (flotte d'agents). Sept enablers transverses (avec gateway LLM en exergue), RACI fédéré, paved road plus simple que le shadow.
  </text>
</svg>
