<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 800"
     font-family="Inter, system-ui, sans-serif" fill="#1e1e2a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1e1e2a; }
  </style>

  <!-- BACKGROUND -->
  <rect width="1480" height="800" fill="#faf6ec"/>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- TITRE PRINCIPAL                                                    -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <text x="60" y="52" font-size="28" font-weight="700" letter-spacing="-0.5" class="body">
    D&#233;rive des co&#251;ts d&#8217;inf&#233;rence par pattern, 2024 &#8212; 2026
  </text>
  <text x="60" y="83" class="display" font-size="18" font-style="italic" fill="#6b6f7c">
    Le pricing si&#232;ge est mort. La cascade par profil paye le reste.
  </text>

  <!-- SÉPARATEUR HEADER -->
  <line x1="60" y1="97" x2="1420" y2="97" stroke="#d4c9b0" stroke-width="1.2"/>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- GRAPHIQUE — zone de plot                                          -->
  <!-- X: 2024=x220, 2025=x760, 2026=x1300 (spacing=540)               -->
  <!-- Y: $0=y560, $150=y120; y(v)=560-(v/150)*440                      -->
  <!-- ══════════════════════════════════════════════════════════════════ -->

  <!-- FOND PLOT -->
  <rect x="160" y="115" width="1180" height="450" fill="#fff" fill-opacity="0.45" rx="4"/>

  <!-- GRILLES HORIZONTALES -->
  <!-- $150 → y=120 -->
  <line x1="160" y1="120" x2="1340" y2="120" stroke="#d4c9b0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <!-- $120 → y=208 -->
  <line x1="160" y1="208" x2="1340" y2="208" stroke="#d4c9b0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <!-- $90 → y=296 -->
  <line x1="160" y1="296" x2="1340" y2="296" stroke="#d4c9b0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <!-- $60 → y=384 -->
  <line x1="160" y1="384" x2="1340" y2="384" stroke="#d4c9b0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <!-- $30 → y=472 -->
  <line x1="160" y1="472" x2="1340" y2="472" stroke="#d4c9b0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <!-- $0 → y=560 -->
  <line x1="160" y1="560" x2="1340" y2="560" stroke="#6b6f7c" stroke-width="1.2"/>

  <!-- AXE Y — labels -->
  <text x="148" y="124" text-anchor="end" font-size="12" fill="#6b6f7c">150 $</text>
  <text x="148" y="212" text-anchor="end" font-size="12" fill="#6b6f7c">120 $</text>
  <text x="148" y="300" text-anchor="end" font-size="12" fill="#6b6f7c">90 $</text>
  <text x="148" y="388" text-anchor="end" font-size="12" fill="#6b6f7c">60 $</text>
  <text x="148" y="476" text-anchor="end" font-size="12" fill="#6b6f7c">30 $</text>
  <text x="148" y="564" text-anchor="end" font-size="12" fill="#6b6f7c">0 $</text>

  <!-- AXE Y — titre -->
  <text x="30" y="340" text-anchor="middle" font-size="12" fill="#6b6f7c" font-style="italic"
        transform="rotate(-90 30 340)">Co&#251;t / dev / mois (USD)</text>

  <!-- AXE X — ligne -->
  <line x1="160" y1="560" x2="1340" y2="560" stroke="#6b6f7c" stroke-width="1.2"/>

  <!-- AXE X — ticks et labels d'années -->
  <line x1="220" y1="557" x2="220" y2="566" stroke="#6b6f7c" stroke-width="1.5"/>
  <text x="220" y="580" text-anchor="middle" font-size="13" font-weight="600">2024</text>

  <line x1="760" y1="557" x2="760" y2="566" stroke="#6b6f7c" stroke-width="1.5"/>
  <text x="760" y="580" text-anchor="middle" font-size="13" font-weight="600">2025</text>

  <line x1="1300" y1="557" x2="1300" y2="566" stroke="#6b6f7c" stroke-width="1.5"/>
  <text x="1300" y="580" text-anchor="middle" font-size="13" font-weight="600">2026</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- EVENT LINES — lignes verticales pointillées avec labels           -->
  <!-- Repère mensuel : 1 mois = 540/12 = 45 px                         -->
  <!-- 2024 = x=220 ; +12 mois = x=760 (=2025) ; +24 mois = x=1300     -->
  <!-- Jun 2025 = 2025 + 6 mois = x=760+270=1030... non.               -->
  <!-- Axe : x=220 = Jan 2024 ; x=1300 = Déc 2026 = 36 mois             -->
  <!-- 1 mois = (1300-220)/36 = 30 px                                    -->
  <!-- Jun 2025 = 18 mois = x=220+540=760 → mais c'est x=760 déjà 2025 -->
  <!-- Recalibrage avec 2025 mid-year au juste milieu :                  -->
  <!-- Jan2024=x220, Jan2025=x580, Jan2026=x940, Dec2026=x1300          -->
  <!-- 1 mois = (1300-220)/36 = 30 px                                    -->

  <!-- Jun 2025 : mois 18 → x=220+18*30=760. Overlap avec tick 2025.    -->
  <!-- On décale les labels des ticks vers 3 points équidistants :       -->
  <!-- Jan2024=x220, Jul2025=x760, Dec2026=x1300                        -->
  <!-- Avec cette base : Jun2025 = Jan2024 + 18 mois = 220+18*30=760    -->
  <!-- Jul-Aug2025 = mois 18-19 = x760-790                              -->
  <!-- Dec2025 = mois 24 = 220+24*30=940                                -->
  <!-- Mar2026 = mois 27 = 220+27*30=1030                               -->
  <!-- Apr-Jun2026 = mois 27-30 = x1030-1040                            -->

  <!-- Note : pour la lisibilité, les labels d'années sont -->
  <!-- Jan2024, mi-2025, fin2026 selon les event markers   -->

  <!-- EVENT LINE 1 — Jun 2025 : GitHub Copilot premium requests -->
  <!-- x = 220 + 18*30 = 760 → trop proche du mid. Décalé à x=740 -->
  <line x1="730" y1="120" x2="730" y2="560" stroke="#b8582e" stroke-width="1" stroke-dasharray="5,4" opacity="0.7"/>
  <!-- Label rotatif -->
  <text transform="rotate(-90 730 580)" x="730" y="580" text-anchor="start" font-size="11" font-style="italic" fill="#b8582e">
    Juin 2025 &#8212; GitHub Copilot premium reqs
  </text>

  <!-- EVENT LINE 2 — Juil-Août 2025 : Anthropic weekly rate limits -->
  <!-- Août 2025 = mois 20 = 220+20*30=820 -->
  <line x1="820" y1="120" x2="820" y2="560" stroke="#8a6a2c" stroke-width="1" stroke-dasharray="5,4" opacity="0.7"/>
  <text transform="rotate(-90 820 580)" x="820" y="580" text-anchor="start" font-size="11" font-style="italic" fill="#8a6a2c">
    Ao&#251;t 2025 &#8212; Anthropic weekly rate limits
  </text>

  <!-- EVENT LINE 3 — Fin 2025 : Cursor pricing usage-based -->
  <!-- Déc 2025 = mois 24 = 220+24*30=940 -->
  <line x1="940" y1="120" x2="940" y2="560" stroke="#6b6f7c" stroke-width="1" stroke-dasharray="5,4" opacity="0.6"/>
  <text transform="rotate(-90 940 580)" x="940" y="580" text-anchor="start" font-size="11" font-style="italic" fill="#6b6f7c">
    Fin 2025 &#8212; Cursor pricing usage-based
  </text>

  <!-- EVENT LINE 4 — Mars 2026 : Retex Uber -->
  <!-- Mar 2026 = mois 27 = 220+27*30=1030 -->
  <line x1="1030" y1="120" x2="1030" y2="560" stroke="#a83e55" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.8"/>
  <text transform="rotate(-90 1030 580)" x="1030" y="580" text-anchor="start" font-size="11" font-style="italic" fill="#a83e55">
    Mars 2026 &#8212; Retex Uber 500&#8211;2 000 $/dev/mois
  </text>

  <!-- EVENT LINE 5 — Juin 2026 : GitHub AI Credits -->
  <!-- Jun 2026 = mois 30 = 220+30*30=1120 -->
  <line x1="1120" y1="120" x2="1120" y2="560" stroke="#b8582e" stroke-width="1" stroke-dasharray="5,4" opacity="0.7"/>
  <text transform="rotate(-90 1120 580)" x="1120" y="580" text-anchor="start" font-size="11" font-style="italic" fill="#b8582e">
    Juin 2026 &#8212; GitHub Copilot &#8594; AI Credits
  </text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- COURBES DES 4 PATTERNS                                            -->
  <!-- Recalibrage X avec axe mensuel :                                 -->
  <!-- Jan2024=x220, Jan2025=x580, Jan2026=x940, Dec2026=x1300         -->
  <!-- Courbes : valeurs en Jan de chaque année (2024, 2025, 2026)       -->
  <!-- x2024=220, x2025=580, x2026=940                                  -->
  <!-- (fin 2026 projeté x=1300 pour montrer la trajectoire)            -->

  <!-- ── COURBE 1 : Ghost autocomplete (gris, fin) ── -->
  <!-- 2024:$10, 2025:$12, 2026:$15 -->
  <!-- y(10)=560-29=531, y(12)=560-35=525, y(15)=560-44=516            -->
  <polyline points="220,531 580,525 940,516"
            fill="none" stroke="#9ca3af" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Indicateurs points -->
  <circle cx="220" cy="531" r="5" fill="#9ca3af"/>
  <circle cx="580" cy="525" r="5" fill="#9ca3af"/>
  <circle cx="940" cy="516" r="5" fill="#9ca3af"/>
  <!-- Label inline -->
  <text x="954" y="512" font-size="12" fill="#9ca3af" font-weight="600">Ghost autocomplete</text>
  <text x="954" y="527" font-size="11" fill="#9ca3af" font-style="italic">~10 &#8594; 15 $/mois</text>
  <text x="954" y="540" font-size="11" fill="#9ca3af" font-style="italic">si&#232;ge plat</text>

  <!-- ── COURBE 2 : Chat IDE / CLI (gold, medium) ── -->
  <!-- 2024:$20, 2025:$40, 2026:$60 -->
  <!-- y(20)=560-59=501, y(40)=560-117=443, y(60)=560-176=384          -->
  <polyline points="220,501 580,443 940,384"
            fill="none" stroke="#8a6a2c" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="220" cy="501" r="5.5" fill="#8a6a2c"/>
  <circle cx="580" cy="443" r="5.5" fill="#8a6a2c"/>
  <circle cx="940" cy="384" r="5.5" fill="#8a6a2c"/>
  <text x="954" y="380" font-size="12" fill="#8a6a2c" font-weight="600">Chat IDE / CLI</text>
  <text x="954" y="395" font-size="11" fill="#8a6a2c" font-style="italic">20 &#8594; 60 $/mois</text>
  <text x="954" y="408" font-size="11" fill="#8a6a2c" font-style="italic">si&#232;ge + tokens</text>

  <!-- ── COURBE 3 : Agent async cloud (orange accent, épaisse) ── -->
  <!-- 2024:$0, 2025:$60, 2026:$140 -->
  <!-- y(0)=560, y(60)=384, y(140)=560-410=150                          -->
  <polyline points="220,560 580,384 940,150"
            fill="none" stroke="#b8582e" stroke-width="4" stroke-linejoin="round"/>
  <circle cx="220" cy="560" r="6" fill="#b8582e"/>
  <circle cx="580" cy="384" r="6" fill="#b8582e"/>
  <circle cx="940" cy="150" r="6" fill="#b8582e"/>
  <text x="954" y="146" font-size="12" fill="#b8582e" font-weight="600">Agent async cloud</text>
  <text x="954" y="161" font-size="11" fill="#b8582e" font-style="italic">0 &#8594; 140 $/mois</text>
  <text x="954" y="174" font-size="11" fill="#b8582e" font-style="italic">sans gateway interne</text>

  <!-- ── COURBE 4 : Code review auto (carmine, medium) ── -->
  <!-- 2024:$5, 2025:$15, 2026:$25 -->
  <!-- y(5)=560-15=545, y(15)=560-44=516, y(25)=560-73=487             -->
  <polyline points="220,545 580,516 940,487"
            fill="none" stroke="#a83e55" stroke-width="3" stroke-linejoin="round" stroke-dasharray="8,4"/>
  <circle cx="220" cy="545" r="5.5" fill="#a83e55"/>
  <circle cx="580" cy="516" r="5.5" fill="#a83e55"/>
  <circle cx="940" cy="487" r="5.5" fill="#a83e55"/>
  <text x="954" y="483" font-size="12" fill="#a83e55" font-weight="600">Code review auto</text>
  <text x="954" y="498" font-size="11" fill="#a83e55" font-style="italic">5 &#8594; 25 $/mois</text>
  <text x="954" y="511" font-size="11" fill="#a83e55" font-style="italic">webhook PR</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- ANNOTATION CROSSOVER GATEWAY                                      -->
  <!-- ══════════════════════════════════════════════════════════════════ -->

  <!-- Boîte callout crossover — en bas à droite du plot -->
  <rect x="700" y="470" width="380" height="80" fill="#faf6ec" stroke="#b8582e" stroke-width="1.5" rx="5"/>
  <!-- Flèche pointant vers la zone 2026 agent async -->
  <line x1="1080" y1="510" x2="1030" y2="440" stroke="#b8582e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="1030,440 1020,455 1040,450" fill="#b8582e"/>

  <text x="714" y="491" font-size="12" font-weight="700" fill="#b8582e">Crossover gateway LLM interne vs si&#232;ges Copilot</text>
  <text x="714" y="509" font-size="12" fill="#1e1e2a">uniformes : &#8776; 1 500 PR/an avec usage agentique</text>
  <text x="714" y="526" font-size="11" fill="#6b6f7c" font-style="italic">En dessous = infra non amortie ; au-del&#224; = quotas profil&gt; tarif uniforme</text>
  <text x="714" y="540" font-size="11" fill="#6b6f7c" font-style="italic">Sur 150 devs (280 PR/sem.), franchi d&#232;s le pilote &#224; 40 devs</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- LÉGENDE (coin haut droit)                                          -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="1340" y="115" width="120" height="165" fill="#fff" fill-opacity="0.85" stroke="#d4c9b0" stroke-width="1" rx="4"/>
  <text x="1352" y="136" font-size="11" font-weight="700" fill="#1e1e2a">L&#201;GENDE</text>

  <!-- Ghost -->
  <line x1="1352" y1="153" x2="1386" y2="153" stroke="#9ca3af" stroke-width="2.5"/>
  <circle cx="1369" cy="153" r="4" fill="#9ca3af"/>
  <text x="1392" y="157" font-size="11" fill="#1e1e2a">Ghost</text>
  <text x="1392" y="169" font-size="10" fill="#6b6f7c">autocomplete</text>

  <!-- Chat IDE -->
  <line x1="1352" y1="186" x2="1386" y2="186" stroke="#8a6a2c" stroke-width="3"/>
  <circle cx="1369" cy="186" r="4.5" fill="#8a6a2c"/>
  <text x="1392" y="190" font-size="11" fill="#1e1e2a">Chat IDE/CLI</text>

  <!-- Agent async -->
  <line x1="1352" y1="210" x2="1386" y2="210" stroke="#b8582e" stroke-width="4"/>
  <circle cx="1369" cy="210" r="5" fill="#b8582e"/>
  <text x="1392" y="214" font-size="11" fill="#1e1e2a">Agent async</text>

  <!-- Code review -->
  <line x1="1352" y1="238" x2="1386" y2="238" stroke="#a83e55" stroke-width="3" stroke-dasharray="7,3"/>
  <circle cx="1369" cy="238" r="4.5" fill="#a83e55"/>
  <text x="1392" y="242" font-size="11" fill="#1e1e2a">Code review</text>
  <text x="1392" y="254" font-size="10" fill="#6b6f7c">auto</text>
  <text x="1392" y="268" font-size="10" fill="#6b6f7c">(tirets)</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- BANDE PÉDAGOGIQUE EN BAS                                          -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="0" y="620" width="1480" height="130" fill="#1e1e2a"/>
  <text x="740" y="668" text-anchor="middle" class="display" font-size="18" font-style="italic" fill="#faf6ec">
    &#171; Le poste inf&#233;rence &#215; 35 entre POC et Scale, l&#8217;&#233;quipe &#215; 12.
  </text>
  <text x="740" y="698" text-anchor="middle" class="display" font-size="18" font-style="italic" fill="#faf6ec">
    La d&#233;rive n&#8217;est pas dans le si&#232;ge, elle est dans les tokens. &#187;
  </text>
  <text x="740" y="724" text-anchor="middle" font-size="13" fill="#faf6ec" fill-opacity="0.65">
    620 k&#8364; inférence &#224; scale pour 150 devs &#8212; maîtrisable uniquement avec gateway LLM + quotas par profil + audit trail Datadog
  </text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- SOURCE (coin bas gauche, dans la bande pédagogique)               -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <text x="68" y="762" font-size="12" font-style="italic" fill="#6b6f7c">
    Source : analyse Mathieu Guglielmino &#183; 2026-06-04 &#183; skill svg-schemas
  </text>

  <!-- SÉPARATEUR bas du plot -->
  <line x1="60" y1="612" x2="1420" y2="612" stroke="#d4c9b0" stroke-width="1"/>

</svg>
