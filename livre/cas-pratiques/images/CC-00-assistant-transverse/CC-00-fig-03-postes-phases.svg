  <rect width="1500" height="1000" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="52" font-size="28" font-weight="600" letter-spacing="-0.5">
    Huit postes sur quatre phases — l'inférence est une licence par tête
  </text>
  <text x="60" y="86" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Largeur de chaque colonne ∝ coût total de la phase (k€), hauteur de chaque bloc = part du poste. La licence par siège domine ; le change crée la valeur.
  </text>

  <!-- TOTAUX DE PHASE -->
  <text x="97.85" y="184" class="mono" font-size="13" font-weight="700" text-anchor="middle">164</text>
