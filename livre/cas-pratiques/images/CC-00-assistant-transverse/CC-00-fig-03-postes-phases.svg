  <text x="151.25" y="722" font-size="13" font-weight="600" text-anchor="middle">Cadrage</text>
  <text x="396.8" y="722" font-size="14" font-weight="600" text-anchor="middle">Généralisation</text>
  <text x="759.4" y="722" font-size="14" font-weight="600" text-anchor="middle">Régime</text>

  <text x="60" y="746" class="mono" font-size="11" font-weight="700" letter-spacing="0.08" fill="#3d5a82">SIÈGES DÉPLOYÉS</text>
  <rect x="71.85" y="752" width="52" height="24" fill="#eef2f8" stroke="#3d5a82" stroke-width="1.2" rx="12"/>
  <text x="97.85" y="769" class="mono" font-size="12" font-weight="700" fill="#3d5a82" text-anchor="middle">200</text>
  <rect x="125.25" y="752" width="52" height="24" fill="#eef2f8" stroke="#3d5a82" stroke-width="1.2" rx="12"/>
  <text x="151.25" y="769" class="mono" font-size="12" font-weight="700" fill="#3d5a82" text-anchor="middle">1 500</text>
  <rect x="370.8" y="752" width="52" height="24" fill="#eef2f8" stroke="#3d5a82" stroke-width="1.2" rx="12"/>
  <text x="396.8" y="769" class="mono" font-size="12" font-weight="700" fill="#3d5a82" text-anchor="middle">9 200</text>
  <rect x="733.4" y="752" width="52" height="24" fill="#3d5a82" stroke="#3d5a82" stroke-width="1.2" rx="12"/>
  <text x="759.4" y="769" class="mono" font-size="12" font-weight="700" style="fill:#ffffff" text-anchor="middle">9 200</text>
  <text x="90" y="794" font-size="11" font-weight="700" fill="#b8582e">seuil d'usage cadré ≈ 40 % : au-delà, l'enablement s'amortit — le siège seul ne crée rien</text>

  <!-- ═════ LÉGENDE LATÉRALE ═════ -->
  <text x="1030" y="160" class="mono" font-size="12" font-weight="700" letter-spacing="0.14" fill="#5a5a5a">POSTE — TRAJECTOIRE POC → SCALE (k€)</text>
  <rect x="1030" y="184" width="18" height="18" fill="#b8582e"/>
  <text x="1058" y="198" font-size="13" font-weight="600">Équipe</text>
  <text x="1300" y="198" class="mono" font-size="12" fill="#1a1a1a">80 → 380</text>
  <text x="1460" y="198" font-size="11" font-weight="700" fill="#b8582e" text-anchor="end">cœur stable</text>
  <rect x="1030" y="216" width="18" height="18" fill="#3d5a82"/>
  <text x="1058" y="230" font-size="13" font-weight="600">Inférence</text>
  <text x="1058" y="247" font-size="11" fill="#7a7a7a">licence/siège · pic 2 760</text>
  <text x="1300" y="230" class="mono" font-size="12" fill="#1a1a1a">18 → 1 710</text>
  <text x="1460" y="230" font-size="11" font-weight="700" fill="#3d5a82" text-anchor="end">coût fixe</text>
  <rect x="1030" y="260" width="18" height="18" fill="#a83232"/>
  <text x="1058" y="274" font-size="13" font-weight="600">Change</text>
  <text x="1058" y="291" font-size="11" fill="#7a7a7a">enablement, champions</text>
  <text x="1300" y="274" class="mono" font-size="12" fill="#1a1a1a">30 → 520</text>
  <text x="1460" y="274" font-size="11" font-weight="700" fill="#a83232" text-anchor="end">crée la valeur</text>
  <rect x="1030" y="304" width="18" height="18" fill="#9a9a9a"/>
  <text x="1058" y="318" font-size="13" font-weight="600">Gouvernance</text>
  <text x="1300" y="318" class="mono" font-size="12" fill="#1a1a1a">10 → 200</text>
  <text x="1460" y="318" font-size="11" font-weight="700" fill="#8a6500" text-anchor="end">shadow AI</text>
  <rect x="1030" y="336" width="18" height="18" fill="#5a8a6a"/>
  <text x="1058" y="350" font-size="13" font-weight="600">Sécurité</text>
  <text x="1300" y="350" class="mono" font-size="12" fill="#1a1a1a">8 → 150</text>
  <rect x="1030" y="368" width="18" height="18" fill="#2e7a7a"/>
  <text x="1058" y="382" font-size="13" font-weight="600">Data</text>
  <text x="1300" y="382" class="mono" font-size="12" fill="#1a1a1a">10 → 80</text>
  <rect x="1030" y="400" width="18" height="18" fill="#d4a000"/>
  <text x="1058" y="414" font-size="13" font-weight="600">Évaluation</text>
  <text x="1300" y="414" class="mono" font-size="12" fill="#1a1a1a">4 → 90</text>
  <rect x="1030" y="432" width="18" height="18" fill="#8fb0d6"/>
  <text x="1058" y="446" font-size="13" font-weight="600">Infra</text>
  <text x="1300" y="446" class="mono" font-size="12" fill="#1a1a1a">4 → 50</text>
  <line x1="1030" y1="464" x2="1460" y2="464" stroke="#c5b9a3" stroke-width="0.8"/>
  <text x="1058" y="486" font-size="13" font-weight="700">Total</text>
  <text x="1300" y="486" class="mono" font-size="12" font-weight="700">164 → 3 140</text>

  <rect x="1030" y="516" width="430" height="124" fill="#eef2f8" stroke="#3d5a82" stroke-width="1.4" rx="8"/>
  <text x="1050" y="542" class="mono" font-size="12" font-weight="700" letter-spacing="0.12" fill="#3d5a82">PAS D'ÉCONOMIE D'ÉCHELLE</text>
  <text x="1050" y="568" font-size="13" fill="#1a1a1a">L'inférence = des licences par tête. Ajouter un</text>
  <text x="1050" y="588" font-size="13" fill="#1a1a1a">siège ajoute son coût plein. Elle ne baisse en</text>
  <text x="1050" y="608" font-size="13" fill="#1a1a1a">Régime que par DÉSABONNEMENT des dormants</text>
  <text x="1050" y="628" font-size="13" font-weight="600" fill="#3d5a82">(2 760 → 1 710) et segmentation premium.</text>
  <rect x="1030" y="656" width="430" height="96" fill="#f5e6dc" stroke="#b8582e" stroke-width="1.4" rx="8"/>
  <text x="1050" y="682" class="mono" font-size="12" font-weight="700" letter-spacing="0.12" fill="#b8582e">LE PARADOXE AGENTIQUE — HORIZONTAL</text>
  <text x="1050" y="708" font-size="13" fill="#1a1a1a">Change 30 → 520 : le poste qui CRÉE la valeur</text>
  <text x="1050" y="728" font-size="13" fill="#1a1a1a">(cadrer l'usage humain) est le plus dur à attribuer</text>
  <text x="1050" y="746" font-size="11" font-style="italic" fill="#7a3a1e">(ch. 21.7).</text>

  <text x="60" y="860" font-size="13" font-style="italic" fill="#5a5a5a">
    Lecture : chaque colonne = 100 % du coût de sa phase ; sa largeur ∝ coût total. Le « coût par usage à valeur » (prose) divise par ~11 par montée du taux d'usage cadré.
  </text>
  <text x="60" y="888" font-size="12" font-style="italic" fill="#8a8a8a">
    Grille CC-00, en k€ · le siège est un coût fixe par tête : le seul levier de ROI est l'usage cadré, pas le nombre de sièges.
  </text>

</svg>
