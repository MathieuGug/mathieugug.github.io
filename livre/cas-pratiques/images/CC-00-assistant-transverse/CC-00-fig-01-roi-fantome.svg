<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect width="1280" height="760" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="56" font-size="28" font-weight="600" letter-spacing="-0.4">
    Le ROI fantôme — du siège déployé à la valeur
  </text>
  <text x="60" y="90" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Le siège est un coût fixe par tête. La valeur n'apparaît qu'en bout d'entonnoir — et la falaise est immense.
  </text>

  <!-- Funnel silhouette -->
  <polygon points="120,160 1160,160 800,580 480,580" fill="#f3eedf" stroke="none" opacity="0.6"/>

  <!-- Bar 1 — Sièges déployés -->
  <rect x="120" y="160" width="1040" height="78" fill="#6f8db4" rx="6"/>
  <text x="640" y="198" font-size="20" font-weight="600" fill="#ffffff" text-anchor="middle">Sièges déployés</text>
  <text x="640" y="222" font-size="14" fill="#eef2f8" text-anchor="middle">9 200 · 100 % · 1,1 M€/an</text>
  <text x="1180" y="205" class="mono" font-size="14" font-weight="700" fill="#3d5a82">100 %</text>

  <!-- Bar 2 — Sièges activés -->
  <rect x="250" y="270" width="780" height="78" fill="#8aa0bd" rx="6"/>
  <text x="640" y="308" font-size="19" font-weight="600" fill="#ffffff" text-anchor="middle">Sièges activés (ouverts dans le mois)</text>
  <text x="640" y="332" font-size="14" fill="#eef2f8" text-anchor="middle">≈ 62 % — 38 % jamais ouverts</text>
  <text x="1180" y="315" class="mono" font-size="14" font-weight="700" fill="#3d5a82">62 %</text>

  <!-- Bar 3 — Usage régulier -->
  <rect x="360" y="380" width="560" height="78" fill="#c08a5a" rx="6"/>
  <text x="640" y="418" font-size="19" font-weight="600" fill="#ffffff" text-anchor="middle">Usage régulier</text>
  <text x="640" y="442" font-size="14" fill="#f9f3eb" text-anchor="middle">≈ 35 % — surtout « résumer un mail »</text>
  <text x="1180" y="425" class="mono" font-size="14" font-weight="700" fill="#7a5a3a">35 %</text>

  <!-- Bar 4 — Usage cadré à valeur -->
  <rect x="470" y="490" width="340" height="78" fill="#b8582e" rx="6"/>
  <text x="640" y="528" font-size="19" font-weight="600" fill="#ffffff" text-anchor="middle">Usage cadré à valeur</text>
  <text x="640" y="552" font-size="14" fill="#f5e6dc" text-anchor="middle">≈ 18 % — le ROI réel</text>
  <text x="1180" y="535" class="mono" font-size="14" font-weight="700" fill="#b8582e">18 %</text>

  <!-- La falaise (bracket) -->
  <path d="M 130 165 L 100 165 L 100 565 L 130 565" fill="none" stroke="#a83232" stroke-width="2"/>
  <rect x="20" y="330" width="76" height="70" fill="#faf6ec"/>
  <text x="58" y="356" class="mono" font-size="12" font-weight="700" fill="#a83232" text-anchor="middle">ROI</text>
  <text x="58" y="376" class="mono" font-size="12" font-weight="700" fill="#a83232" text-anchor="middle">FANTÔME</text>
  <text x="58" y="396" font-size="11" fill="#a83232" text-anchor="middle">100→18 %</text>

  <!-- Annotation bas -->
  <line x1="60" y1="620" x2="1220" y2="620" stroke="#c5b9a3" stroke-width="1"/>
  <text x="60" y="654" class="display" font-size="17" font-style="italic" fill="#1a1a1a">
    Déployer un siège n'est pas déployer de la valeur.
  </text>
  <text x="60" y="684" font-size="14" fill="#5a5a5a">
    Le seul levier n'est pas d'ajouter des sièges (coût fixe par tête, sans économie d'échelle), mais de monter le taux d'usage cadré :
  </text>
  <text x="60" y="708" font-size="14" fill="#5a5a5a">
    cas d'usage cadrés + enablement + mesure d'usage. Et désabonner les sièges dormants. Le KPI honnête est en bas de l'entonnoir, pas en haut.
  </text>

  <text x="60" y="742" font-size="12" font-style="italic" fill="#8a8a8a">
    Source : calibrage indicatif assistant transverse · juin 2026 · les pourcentages illustrent l'ordre de grandeur, pas une mesure d'un déploiement précis.
  </text>
</svg>
