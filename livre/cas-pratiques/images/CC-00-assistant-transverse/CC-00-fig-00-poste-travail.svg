<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1130"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect width="1600" height="1130" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="58" font-size="32" font-weight="600" letter-spacing="-0.5">
    Le poste de travail numérique — où vit l'assistant, où entre le shadow AI
  </text>
  <text x="60" y="96" class="display" font-size="20" font-style="italic" fill="#5a5a5a">
    Presque rien à intégrer : la suite fait le branchement. Le chantier est ailleurs — cadrage, droits hérités, shadow AI.
  </text>

  <!-- ZONES -->
  <rect x="60" y="170" width="380" height="250" fill="#eef2f8" stroke="#6f8db4" stroke-width="1.4" stroke-dasharray="8 4" rx="14"/>
  <text x="78" y="198" class="mono" font-size="13" font-weight="600" letter-spacing="0.16" fill="#3d5a82">CANAL — POSTE DE TRAVAIL</text>

  <rect x="470" y="170" width="700" height="250" fill="#f0f4ec" stroke="#7a9a5e" stroke-width="1.4" stroke-dasharray="8 4" rx="14"/>
  <text x="488" y="198" class="mono" font-size="13" font-weight="600" letter-spacing="0.16" fill="#4d6635">SUITE COLLABORATIVE — 80 % DES USAGES</text>

  <rect x="1200" y="170" width="340" height="250" fill="#fff3e8" stroke="#b8582e" stroke-width="2.0" stroke-dasharray="8 4" rx="14"/>
  <text x="1218" y="198" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#b8582e">SHADOW AI — HORS GOUVERNANCE</text>

  <rect x="60" y="600" width="560" height="320" fill="#f9f3eb" stroke="#b89370" stroke-width="1.4" stroke-dasharray="8 4" rx="14"/>
  <text x="78" y="628" class="mono" font-size="13" font-weight="600" letter-spacing="0.16" fill="#7a5a3a">INTRANET / KB — CORPUS DE VEILLE</text>

  <rect x="680" y="600" width="860" height="320" fill="#e8f0ef" stroke="#2e7a7a" stroke-width="1.4" stroke-dasharray="8 4" rx="14"/>
  <text x="698" y="628" class="mono" font-size="13" font-weight="600" letter-spacing="0.16" fill="#2e7a7a">PILOTAGE — LE SEUL KPI HONNÊTE</text>

  <!-- POSTE DE TRAVAIL -->
  <g>
    <rect x="90" y="230" width="320" height="160" fill="#ffffff" stroke="#3d5a82" stroke-width="1.8" rx="8"/>
    <text x="106" y="256" class="mono" font-size="11" font-weight="600" letter-spacing="0.16" fill="#3d5a82">COLLABORATEUR</text>
    <text x="106" y="284" font-size="17" font-weight="600">Poste + navigateur + mobile</text>
    <text x="106" y="308" font-size="13" fill="#5a5a5a">9 200 cols blancs</text>
    <text x="106" y="328" font-size="13" fill="#5a5a5a">Barre latérale assistant</text>
    <text x="106" y="348" font-size="13" fill="#5a5a5a">Extension navigateur</text>
    <text x="106" y="372" font-size="12" font-style="italic" fill="#5a5a5a">la surface où l'assistant vit</text>
  </g>

  <!-- SUITE COLLABORATIVE : 4 modules + barre assistant -->
  <g>
    <rect x="500" y="230" width="155" height="80" fill="#ffffff" stroke="#4d6635" stroke-width="1.5" rx="8"/>
    <text x="514" y="256" class="mono" font-size="10" font-weight="600" fill="#4d6635">MAIL</text>
    <text x="514" y="282" font-size="14" font-weight="600">Boîte + triage</text>
    <text x="514" y="300" font-size="12" fill="#5a5a5a">résumé · brouillon</text>

    <rect x="670" y="230" width="155" height="80" fill="#ffffff" stroke="#4d6635" stroke-width="1.5" rx="8"/>
    <text x="684" y="256" class="mono" font-size="10" font-weight="600" fill="#4d6635">DOCS</text>
    <text x="684" y="282" font-size="14" font-weight="600">Rédaction</text>
    <text x="684" y="300" font-size="12" fill="#5a5a5a">reformuler · mettre en forme</text>

    <rect x="840" y="230" width="150" height="80" fill="#ffffff" stroke="#4d6635" stroke-width="1.5" rx="8"/>
    <text x="854" y="256" class="mono" font-size="10" font-weight="600" fill="#4d6635">DRIVE</text>
    <text x="854" y="282" font-size="14" font-weight="600">Fichiers</text>
    <text x="854" y="300" font-size="12" fill="#5a5a5a">retrouver · résumer</text>

    <rect x="1005" y="230" width="150" height="80" fill="#ffffff" stroke="#4d6635" stroke-width="1.5" rx="8"/>
    <text x="1019" y="256" class="mono" font-size="10" font-weight="600" fill="#4d6635">VISIO</text>
    <text x="1019" y="282" font-size="14" font-weight="600">Réunions</text>
    <text x="1019" y="300" font-size="12" fill="#5a5a5a">CR · actions</text>

    <!-- Barre assistant native -->
    <rect x="500" y="330" width="655" height="70" fill="#f5e6dc" stroke="#b8582e" stroke-width="2.0" rx="8"/>
    <text x="516" y="356" class="mono" font-size="11" font-weight="700" letter-spacing="0.14" fill="#b8582e">ASSISTANT NATIF (M365 Copilot / Gemini) — BUY</text>
    <text x="516" y="382" font-size="14" fill="#1a1a1a">Se greffe avec les droits déjà en place · time-to-value imbattable · lock-in suite</text>
  </g>

  <!-- SHADOW AI -->
  <g>
    <rect x="1230" y="230" width="280" height="160" fill="#ffffff" stroke="#b8582e" stroke-width="2.2" rx="8"/>
    <text x="1246" y="256" class="mono" font-size="11" font-weight="700" letter-spacing="0.14" fill="#b8582e">★ LE VRAI POINT DE DÉPART</text>
    <text x="1246" y="284" font-size="17" font-weight="600">ChatGPT perso, etc.</text>
    <text x="1246" y="308" font-size="13" fill="#5a5a5a">≈ 600 collaborateurs</text>
    <text x="1246" y="328" font-size="13" fill="#5a5a5a">déjà, en douce</text>
    <text x="1246" y="352" font-size="13" font-weight="600" fill="#b8582e">Signal de besoin</text>
    <text x="1246" y="372" font-size="12" font-style="italic" fill="#b8582e">à cadrer, pas à combattre</text>
  </g>

  <!-- IdP / SSO band -->
  <g>
    <rect x="60" y="470" width="900" height="100" fill="#ffffff" stroke="#a83232" stroke-width="2.0" rx="8"/>
    <text x="78" y="498" class="mono" font-size="11" font-weight="700" letter-spacing="0.14" fill="#a83232">IDENTITÉ / IdP — SSO + DROITS HÉRITÉS</text>
    <text x="78" y="526" font-size="16" font-weight="600">Entra ID / Google · conditional access</text>
    <text x="78" y="548" font-size="13" fill="#5a5a5a">L'assistant hérite des droits de l'utilisateur</text>
    <text x="500" y="514" font-size="14" font-weight="600" fill="#a83232">⚠ Un drive sur-partagé</text>
    <text x="500" y="534" font-size="14" font-weight="600" fill="#a83232">= une fuite à la demande</text>
    <text x="500" y="556" font-size="12" fill="#1a1a1a">→ ménage des partages : prérequis</text>
  </g>

  <!-- INTRANET / KB -->
  <g>
    <rect x="90" y="660" width="500" height="220" fill="#ffffff" stroke="#b89370" stroke-width="1.6" rx="8"/>
    <text x="106" y="686" class="mono" font-size="11" font-weight="600" letter-spacing="0.16" fill="#7a5a3a">SHAREPOINT · DRIVE · CONFLUENCE · BASES MÉTIER</text>
    <text x="106" y="714" font-size="17" font-weight="600">Le corpus du deep research interne</text>
    <text x="106" y="740" font-size="13" fill="#5a5a5a">Mal rangé · sur-partagé · versionné à la main</text>
    <text x="106" y="764" font-size="13" fill="#1a1a1a" font-weight="600">Décide si la veille est un actif…</text>
    <text x="106" y="784" font-size="13" fill="#1a1a1a">…ou un générateur de réponses</text>
    <text x="106" y="804" font-size="13" fill="#1a1a1a">fausses-mais-confiantes</text>
    <rect x="106" y="824" width="180" height="22" fill="#e8f0ef" stroke="#2e7a7a" rx="3"/>
    <text x="116" y="839" class="mono" font-size="10" font-weight="700" fill="#2e7a7a">READ (RAG veille)</text>
  </g>

  <!-- PILOTAGE -->
  <g>
    <rect x="710" y="660" width="380" height="220" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.8" rx="8"/>
    <text x="726" y="686" class="mono" font-size="11" font-weight="600" letter-spacing="0.16" fill="#2e7a7a">DLP / CASB · CONSOLE D'USAGE · AUDIT</text>
    <text x="726" y="714" font-size="17" font-weight="600">Mesurer l'usage réel</text>
    <text x="726" y="740" font-size="13" fill="#5a5a5a">Taux d'activation · usages cadrés</text>
    <text x="726" y="760" font-size="13" fill="#5a5a5a">Encadrer le shadow AI (DLP)</text>
    <text x="726" y="780" font-size="13" fill="#5a5a5a">Tracer les prompts sensibles</text>
    <text x="726" y="808" font-size="13" font-weight="600" fill="#2e7a7a">★ Le seul KPI honnête</text>
    <text x="726" y="828" font-size="12" font-style="italic" fill="#5a5a5a">souvent allumé après coup — l'angle mort</text>
  </g>

  <g>
    <rect x="1130" y="660" width="380" height="220" fill="#fff8e8" stroke="#d4a000" stroke-width="2.0" rx="8"/>
    <text x="1146" y="686" class="mono" font-size="11" font-weight="700" letter-spacing="0.14" fill="#8a6500">€ LE PIÈGE DU SIÈGE</text>
    <text x="1146" y="714" font-size="17" font-weight="600">Coût fixe par tête</text>
    <text x="1146" y="740" font-size="13" fill="#5a5a5a">Aucune économie d'échelle</text>
    <text x="1146" y="760" font-size="13" fill="#5a5a5a">38 % des sièges jamais ouverts</text>
    <text x="1146" y="784" font-size="13" font-weight="600" fill="#8a6500">Seul levier de ROI :</text>
    <text x="1146" y="804" font-size="13" font-weight="600" fill="#8a6500">le taux d'usage cadré</text>
    <text x="1146" y="828" font-size="12" font-style="italic" fill="#8a6500">pas le nombre de sièges</text>
  </g>

  <!-- CONNECTEURS -->
  <!-- Poste -> Suite -->
  <path d="M 410 310 L 464 310" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="470,310 460,306 460,314" fill="#1a1a1a"/>

  <!-- Assistant -> IdP (droits hérités) -->
  <path d="M 700 400 L 700 464" fill="none" stroke="#a83232" stroke-width="2"/>
  <polygon points="700,470 696,462 704,462" fill="#a83232"/>
  <rect x="590" y="424" width="220" height="20" fill="#faf6ec" opacity="0.94" rx="3"/>
  <text x="700" y="439" class="mono" font-size="11" font-weight="600" fill="#a83232" text-anchor="middle">droits hérités de l'utilisateur</text>

  <!-- IdP -> Intranet (read scope) -->
  <path d="M 340 570 L 340 654" fill="none" stroke="#7a5a3a" stroke-width="1.8" stroke-dasharray="6 3"/>
  <polygon points="340,660 336,652 344,652" fill="#7a5a3a"/>
  <text x="340" y="612" class="mono" font-size="10" font-weight="600" fill="#7a5a3a" text-anchor="middle">scope RAG</text>

  <!-- Suite -> Pilotage (mesure) — décalée à droite, hors de la bande IdP -->
  <path d="M 1040 400 L 1040 654" fill="none" stroke="#2e7a7a" stroke-width="1.8" stroke-dasharray="6 3"/>
  <polygon points="1040,660 1036,652 1044,652" fill="#2e7a7a"/>
  <rect x="952" y="430" width="176" height="20" fill="#faf6ec" opacity="0.94" rx="3"/>
  <text x="1040" y="445" class="mono" font-size="10" font-weight="600" fill="#2e7a7a" text-anchor="middle">télémétrie d'usage</text>

  <!-- Shadow AI bypass (autour) -->
  <path d="M 1340 390 C 1340 520, 1340 560, 1340 654" fill="none" stroke="#b8582e" stroke-width="1.8" stroke-dasharray="3 4"/>
  <polygon points="1340,660 1336,652 1344,652" fill="#b8582e"/>
  <rect x="1250" y="500" width="180" height="20" fill="#faf6ec" opacity="0.94" rx="3"/>
  <text x="1340" y="515" class="mono" font-size="10" font-weight="600" fill="#b8582e" text-anchor="middle">contourne tout → à récupérer</text>

  <!-- LÉGENDE -->
  <text x="60" y="958" font-size="13" font-style="italic" fill="#8a8a8a">
    Source : analyse des dépendances de l'assistant transverse · juin 2026 · le shadow AI est le vrai point de départ ; le coût est dans le change, pas l'inférence.
  </text>

  <g>
    <line x1="60" y1="970" x2="1540" y2="970" stroke="#c5b9a3" stroke-width="1"/>
    <text x="60" y="998" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#5a5a5a">LÉGENDE</text>

    <text x="60" y="1024" font-size="13" font-weight="600">Criticité</text>
    <rect x="60" y="1036" width="14" height="14" fill="#e8f0ef" stroke="#2e7a7a"/>
    <text x="82" y="1048" font-size="12">READ : intranet, KB, veille</text>
    <rect x="60" y="1056" width="14" height="14" fill="#f5e6dc" stroke="#b8582e"/>
    <text x="82" y="1068" font-size="12">R+W : assistant dans la suite</text>
    <rect x="60" y="1076" width="14" height="14" fill="#ffffff" stroke="#a83232" stroke-width="1.4"/>
    <text x="82" y="1088" font-size="12">Droits hérités : IdP (critique)</text>

    <text x="470" y="1024" font-size="13" font-weight="600">Zones</text>
    <rect x="470" y="1036" width="14" height="14" fill="#eef2f8" stroke="#6f8db4" stroke-dasharray="3 2"/>
    <text x="492" y="1048" font-size="12">Poste de travail</text>
    <rect x="470" y="1056" width="14" height="14" fill="#f0f4ec" stroke="#7a9a5e" stroke-dasharray="3 2"/>
    <text x="492" y="1068" font-size="12">Suite collaborative</text>
    <rect x="470" y="1076" width="14" height="14" fill="#fff3e8" stroke="#b8582e" stroke-dasharray="3 2"/>
    <text x="492" y="1088" font-size="12">Shadow AI (hors gouvernance)</text>

    <text x="900" y="1024" font-size="13" font-weight="600">Flux</text>
    <line x1="900" y1="1042" x2="934" y2="1042" stroke="#a83232" stroke-width="2"/>
    <text x="944" y="1047" font-size="12">Droits hérités</text>
    <line x1="900" y1="1062" x2="934" y2="1062" stroke="#2e7a7a" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="944" y="1067" font-size="12">Télémétrie d'usage</text>
    <line x1="900" y1="1082" x2="934" y2="1082" stroke="#b8582e" stroke-width="2" stroke-dasharray="3 4"/>
    <text x="944" y="1087" font-size="12">Shadow AI (contourne)</text>

    <text x="1250" y="1024" font-size="13" font-weight="600">Signaux</text>
    <rect x="1250" y="1036" width="14" height="14" fill="#fff8e8" stroke="#d4a000" stroke-width="1.4"/>
    <text x="1272" y="1048" font-size="12">€ Siège = coût fixe par tête</text>
    <text x="1250" y="1068" font-size="12" font-style="italic" fill="#b8582e">★ Shadow AI = point de départ</text>
    <text x="1250" y="1088" font-size="12" font-style="italic" fill="#2e7a7a">★ Usage réel = seul KPI honnête</text>
  </g>
</svg>
