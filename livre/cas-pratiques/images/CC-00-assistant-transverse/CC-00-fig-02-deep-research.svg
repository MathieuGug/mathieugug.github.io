<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect width="1280" height="720" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="56" font-size="28" font-weight="600" letter-spacing="-0.4">
    La boucle de deep research agentique
  </text>
  <text x="60" y="90" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Planifier · chercher en éventail · vérifier · synthétiser · livrer — le sous-usage le plus transformant de l'assistant.
  </text>

  <!-- Plan -->
  <g>
    <rect x="50" y="280" width="150" height="120" fill="#f5e6dc" stroke="#b8582e" stroke-width="2" rx="8"/>
    <text x="66" y="306" class="mono" font-size="11" font-weight="700" fill="#b8582e">1 · PLAN</text>
    <text x="66" y="334" font-size="15" font-weight="600">Décompose</text>
    <text x="66" y="356" font-size="13" fill="#5a5a5a">la question en</text>
    <text x="66" y="374" font-size="13" fill="#5a5a5a">sous-questions</text>
    <text x="66" y="392" font-size="12" font-style="italic" fill="#b8582e">+ plan de recherche</text>
  </g>

  <!-- Fan-out -->
  <g>
    <rect x="240" y="280" width="150" height="120" fill="#f5e6dc" stroke="#b8582e" stroke-width="2" rx="8"/>
    <text x="256" y="306" class="mono" font-size="11" font-weight="700" fill="#b8582e">2 · FAN-OUT</text>
    <text x="256" y="334" font-size="15" font-weight="600">Recherches</text>
    <text x="256" y="356" font-size="15" font-weight="600">en parallèle</text>
    <text x="256" y="378" font-size="13" fill="#5a5a5a">web + interne</text>
    <text x="256" y="396" font-size="12" font-style="italic" fill="#b8582e">via MCP</text>
  </g>

  <!-- Sources -->
  <g>
    <rect x="450" y="150" width="190" height="64" fill="#ffffff" stroke="#3d5a82" stroke-width="1.6" rx="8"/>
    <text x="466" y="174" class="mono" font-size="10" font-weight="600" fill="#3d5a82">WEB</text>
    <text x="466" y="198" font-size="14">web-search.fanout()</text>

    <rect x="450" y="298" width="190" height="64" fill="#ffffff" stroke="#7a5a3a" stroke-width="1.6" rx="8"/>
    <text x="466" y="322" class="mono" font-size="10" font-weight="600" fill="#7a5a3a">INTRANET</text>
    <text x="466" y="346" font-size="13">sharepoint-mcp.veille()</text>

    <rect x="450" y="446" width="190" height="64" fill="#ffffff" stroke="#7a5a3a" stroke-width="1.6" rx="8"/>
    <text x="466" y="470" class="mono" font-size="10" font-weight="600" fill="#7a5a3a">NOTES / CRM</text>
    <text x="466" y="494" font-size="13">confluence-mcp.notes()</text>
  </g>

  <!-- Verify -->
  <g>
    <rect x="690" y="280" width="160" height="120" fill="#fbf2f2" stroke="#a83232" stroke-width="2" rx="8"/>
    <text x="706" y="306" class="mono" font-size="11" font-weight="700" fill="#a83232">3 · VERIFY</text>
    <text x="706" y="334" font-size="15" font-weight="600">Recoupe,</text>
    <text x="706" y="356" font-size="15" font-weight="600">écarte le</text>
    <text x="706" y="378" font-size="15" font-weight="600">non-corroboré</text>
    <text x="706" y="396" font-size="12" font-style="italic" fill="#a83232">vérification adverse</text>
  </g>

  <!-- Synthesize -->
  <g>
    <rect x="900" y="280" width="160" height="120" fill="#f0f4ec" stroke="#4d6635" stroke-width="2" rx="8"/>
    <text x="916" y="306" class="mono" font-size="11" font-weight="700" fill="#4d6635">4 · SYNTHESIZE</text>
    <text x="916" y="334" font-size="15" font-weight="600">Note citée,</text>
    <text x="916" y="356" font-size="15" font-weight="600">datée, sourcée</text>
    <text x="916" y="378" font-size="13" fill="#5a5a5a">confiance par</text>
    <text x="916" y="396" font-size="13" fill="#5a5a5a">affirmation</text>
  </g>

  <!-- Deliver -->
  <g>
    <rect x="1110" y="280" width="120" height="120" fill="#e8f0ef" stroke="#2e7a7a" stroke-width="2" rx="8"/>
    <text x="1126" y="306" class="mono" font-size="11" font-weight="700" fill="#2e7a7a">5 · DELIVER</text>
    <text x="1126" y="334" font-size="15" font-weight="600">Doc</text>
    <text x="1126" y="356" font-size="15" font-weight="600">partagé</text>
    <text x="1126" y="378" font-size="13" fill="#5a5a5a">+ audit</text>
    <text x="1126" y="396" font-size="12" font-style="italic" fill="#2e7a7a">prompts tracés</text>
  </g>

  <!-- Arrows -->
  <!-- Plan -> Fan-out -->
  <path d="M 200 340 L 234 340" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="240,340 230,336 230,344" fill="#1a1a1a"/>

  <!-- Fan-out -> sources (3 diverging) -->
  <path d="M 390 320 C 420 300, 425 200, 444 188" fill="none" stroke="#3d5a82" stroke-width="1.8"/>
  <polygon points="450,184 439,186 443,194" fill="#3d5a82"/>
  <path d="M 390 340 L 444 332" fill="none" stroke="#7a5a3a" stroke-width="1.8"/>
  <polygon points="450,330 440,328 441,337" fill="#7a5a3a"/>
  <path d="M 390 360 C 420 380, 425 466, 444 476" fill="none" stroke="#7a5a3a" stroke-width="1.8"/>
  <polygon points="450,478 439,474 443,482" fill="#7a5a3a"/>

  <!-- sources -> Verify (3 converging) -->
  <path d="M 640 182 C 665 200, 670 300, 684 320" fill="none" stroke="#a83232" stroke-width="1.8"/>
  <polygon points="687,325 677,321 684,315" fill="#a83232"/>
  <path d="M 640 330 L 684 336" fill="none" stroke="#a83232" stroke-width="1.8"/>
  <polygon points="690,337 680,333 680,341" fill="#a83232"/>
  <path d="M 640 478 C 665 460, 670 380, 684 360" fill="none" stroke="#a83232" stroke-width="1.8"/>
  <polygon points="687,355 677,361 684,365" fill="#a83232"/>

  <!-- Verify -> Synthesize -->
  <path d="M 850 340 L 894 340" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="900,340 890,336 890,344" fill="#1a1a1a"/>

  <!-- Synthesize -> Deliver -->
  <path d="M 1060 340 L 1104 340" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="1110,340 1100,336 1100,344" fill="#1a1a1a"/>

  <!-- Méta caption -->
  <line x1="60" y1="580" x2="1220" y2="580" stroke="#c5b9a3" stroke-width="1"/>
  <text x="60" y="614" class="display" font-size="17" font-style="italic" fill="#1a1a1a">
    Clin d'œil méta : c'est exactement la méthode qui produit les dossiers illustrés de ce site.
  </text>
  <text x="60" y="642" font-size="14" fill="#5a5a5a">
    Le sous-usage le plus banal de l'assistant — la veille — décrit en creux son propre mode de fabrication. Fan-out → vérification → synthèse citée (ch. 7).
  </text>
  <text x="60" y="690" font-size="12" font-style="italic" fill="#8a8a8a">
    Source : anatomie d'une veille deep research agentique · juin 2026.
  </text>
</svg>
