<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 950"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <rect width="1760" height="950" fill="#faf6ec"/>

  <!-- ═════ HEADER ═════ -->
  <text x="60" y="52" font-size="28" font-weight="600" letter-spacing="-0.5">
    Anatomie d'un appel — Listen · Identify · Diagnose · Reason · Act · Verify
  </text>
  <text x="60" y="86" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Pas un SVI à touches : une vraie boucle agentic sous garde-fou, dans un budget de latence &lt; 800 ms par tour de dialogue.
  </text>

  <!-- ═════ SCENARIO BAR ═════ -->
  <rect x="60" y="112" width="1640" height="48" fill="#fbf4ee" stroke="#d4a673" stroke-width="1.2" rx="6"/>
  <text x="80" y="142" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#b8582e">SCÉNARIO</text>
  <text x="190" y="142" font-size="15" font-style="italic" fill="#5a5a5a">
    « Ma box ne marche plus, c'est la troisième fois. » — perte de sync DSL, appel à 22 h 40.
  </text>

  <!-- ═════ STEP 1 — LISTEN ═════ -->
  <g>
    <rect x="60" y="200" width="180" height="500" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.6" rx="8"/>
    <rect x="60" y="200" width="180" height="50" fill="#eef2f8" rx="8"/>
    <rect x="60" y="240" width="180" height="10" fill="#eef2f8"/>
    <text x="78" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#3d5a82">1 · LISTEN</text>

    <text x="78" y="276" font-size="13" font-weight="600" fill="#3d5a82">Latence ≈ 150 ms</text>
    <line x1="78" y1="298" x2="222" y2="298" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="78" y="324" font-size="14" font-weight="600">STT streaming</text>
    <text x="78" y="344" font-size="13" fill="#5a5a5a">français</text>

    <text x="78" y="378" font-size="13" fill="#5a5a5a">Barge-in géré :</text>
    <text x="78" y="396" font-size="13" fill="#5a5a5a">interruptions</text>
    <text x="78" y="414" font-size="13" fill="#5a5a5a">et bruit de fond.</text>

    <text x="78" y="448" font-size="13" fill="#5a5a5a">Pas d'audio</text>
    <text x="78" y="466" font-size="13" fill="#5a5a5a">persistant (RGPD).</text>

    <line x1="78" y1="500" x2="222" y2="500" stroke="#c5b9a3" stroke-width="0.6"/>
    <text x="78" y="528" class="mono" font-size="11" font-weight="700" letter-spacing="0.15" fill="#5a5a5a">SORTIE</text>
    <text x="78" y="552" font-size="12" font-style="italic" fill="#5a5a5a">Transcription</text>
    <text x="78" y="570" font-size="12" font-style="italic" fill="#5a5a5a">temps réel.</text>
  </g>

  <!-- arrow 1 → 2 -->
  <path d="M 248 450 L 280 450" stroke="#3a3a3a" stroke-width="2.2" fill="none"/>
  <polygon points="288,450 278,445 278,455" fill="#3a3a3a"/>

  <!-- ═════ STEP 2 — IDENTIFY ═════ -->
  <g>
    <rect x="288" y="200" width="190" height="500" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.6" rx="8"/>
    <rect x="288" y="200" width="190" height="50" fill="#eef2f8" rx="8"/>
    <rect x="288" y="240" width="190" height="10" fill="#eef2f8"/>
    <text x="306" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#3d5a82">2 · IDENTIFY</text>

    <text x="306" y="276" font-size="13" font-weight="600" fill="#3d5a82">Latence ≈ 100 ms</text>
    <line x1="306" y1="298" x2="460" y2="298" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="306" y="324" font-size="14" font-weight="600">Authentification</text>
    <text x="306" y="348" font-size="13" fill="#5a5a5a">Numéro appelant</text>
    <text x="306" y="366" font-size="13" fill="#5a5a5a">+ question sécurité</text>
    <text x="306" y="384" font-size="12" fill="#7a7a7a">(date de naissance,</text>
    <text x="306" y="402" font-size="12" fill="#7a7a7a">dernier paiement)</text>

    <rect x="306" y="418" width="154" height="70" fill="#fff8e8" stroke="#d4a000" stroke-width="1" stroke-dasharray="4 2" rx="4"/>
    <text x="318" y="438" font-size="11" font-weight="700" fill="#8a6500">⚠ Pas de biométrie</text>
    <text x="318" y="456" font-size="11" fill="#8a6500">vocale sans opt-in</text>
    <text x="318" y="474" font-size="11" fill="#8a6500">explicite.</text>

    <line x1="306" y1="508" x2="460" y2="508" stroke="#c5b9a3" stroke-width="0.6"/>
    <text x="306" y="536" class="mono" font-size="11" font-weight="700" letter-spacing="0.15" fill="#5a5a5a">SORTIE</text>
    <text x="306" y="560" font-size="12" font-style="italic" fill="#5a5a5a">Appelant</text>
    <text x="306" y="578" font-size="12" font-style="italic" fill="#5a5a5a">authentifié.</text>
  </g>

  <!-- arrow 2 → 3 -->
  <path d="M 486 450 L 518 450" stroke="#3a3a3a" stroke-width="2.2" fill="none"/>
  <polygon points="526,450 516,445 516,455" fill="#3a3a3a"/>

  <!-- ═════ STEP 3 — DIAGNOSE ═════ -->
  <g>
    <rect x="526" y="200" width="310" height="500" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.6" rx="8"/>
    <rect x="526" y="200" width="310" height="50" fill="#eef2f8" rx="8"/>
    <rect x="526" y="240" width="310" height="10" fill="#eef2f8"/>
    <text x="544" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#3d5a82">3 · DIAGNOSE</text>

    <text x="544" y="276" font-size="13" font-weight="600" fill="#3d5a82">≈ 250 ms · 3 appels MCP en parallèle</text>
    <line x1="544" y1="298" x2="818" y2="298" stroke="#c5b9a3" stroke-width="0.6"/>

    <rect x="544" y="314" width="274" height="54" fill="#fbfbfb" stroke="#c5b9a3" stroke-width="0.8" rx="4"/>
    <text x="558" y="332" class="mono" font-size="11" font-weight="600" fill="#3d5a82">acs-mcp</text>
    <text x="558" y="348" font-size="11" fill="#7a7a7a">get_line_status(line_id)</text>
    <text x="558" y="364" font-size="11" fill="#5a5a5a">état ligne · sync DSL · uptime box</text>

    <rect x="544" y="376" width="274" height="54" fill="#fbfbfb" stroke="#c5b9a3" stroke-width="0.8" rx="4"/>
    <text x="558" y="394" class="mono" font-size="11" font-weight="600" fill="#3d5a82">conso-mcp</text>
    <text x="558" y="410" font-size="11" fill="#7a7a7a">check_suspension(account_id)</text>
    <text x="558" y="426" font-size="11" fill="#5a5a5a">pas de coupure pour impayé</text>

    <rect x="544" y="438" width="274" height="54" fill="#fbfbfb" stroke="#c5b9a3" stroke-width="0.8" rx="4"/>
    <text x="558" y="456" class="mono" font-size="11" font-weight="600" fill="#3d5a82">zendesk-mcp</text>
    <text x="558" y="472" font-size="11" fill="#7a7a7a">search_known_incidents(zone)</text>
    <text x="558" y="488" font-size="11" fill="#5a5a5a">pas d'incident réseau sur la zone</text>

    <line x1="544" y1="516" x2="818" y2="516" stroke="#c5b9a3" stroke-width="0.6"/>
    <text x="544" y="540" class="mono" font-size="11" font-weight="700" letter-spacing="0.15" fill="#5a5a5a">SORTIE</text>
    <text x="544" y="564" font-size="12" font-style="italic" fill="#5a5a5a">État ligne + statut compte +</text>
    <text x="544" y="582" font-size="12" font-style="italic" fill="#5a5a5a">incidents zone → contexte complet.</text>
  </g>

  <!-- arrow 3 → 4 -->
  <path d="M 844 450 L 876 450" stroke="#3a3a3a" stroke-width="2.2" fill="none"/>
  <polygon points="884,450 874,445 874,455" fill="#3a3a3a"/>

  <!-- ═════ STEP 4 — REASON ═════ -->
  <g>
    <rect x="884" y="200" width="300" height="500" fill="#ffffff" stroke="#b8582e" stroke-width="2" rx="8"/>
    <rect x="884" y="200" width="300" height="50" fill="#f5e6dc" rx="8"/>
    <rect x="884" y="240" width="300" height="10" fill="#f5e6dc"/>
    <text x="902" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#b8582e">4 · REASON</text>

    <text x="902" y="276" font-size="13" font-weight="600" fill="#b8582e">Cascade Haiku · Sonnet si ambigu</text>
    <line x1="902" y1="298" x2="1166" y2="298" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="902" y="324" font-size="14" font-weight="600">Raisonnement :</text>
    <text x="902" y="356" font-size="13" fill="#5a5a5a">▸ sync DSL perdue</text>
    <text x="902" y="384" font-size="13" fill="#5a5a5a">▸ pas d'incident zone</text>
    <text x="902" y="412" font-size="13" fill="#5a5a5a">▸ pas de suspension</text>
    <text x="902" y="444" font-size="13" fill="#5a5a5a">▸ <tspan font-weight="700" fill="#1a1a1a">60 %</tspan> des cas résolus</text>
    <text x="922" y="462" font-size="12" fill="#7a7a7a">par reboot distant</text>

    <line x1="902" y1="492" x2="1166" y2="492" stroke="#c5b9a3" stroke-width="0.6"/>
    <text x="902" y="518" class="mono" font-size="11" font-weight="700" letter-spacing="0.15" fill="#b8582e">CONCLUSION</text>
    <text x="902" y="542" font-size="13" font-weight="600">Proposer le reboot</text>
    <text x="902" y="560" font-size="13" fill="#5a5a5a">avant d'envoyer un</text>
    <text x="902" y="578" font-size="13" fill="#5a5a5a">technicien.</text>

    <text x="902" y="616" font-size="11" font-style="italic" fill="#8a8a8a">Vraie boucle agent (ch.7),</text>
    <text x="902" y="634" font-size="11" font-style="italic" fill="#8a8a8a">pas un script SVI.</text>
  </g>

  <!-- arrow 4 → 5 -->
  <path d="M 1192 450 L 1224 450" stroke="#3a3a3a" stroke-width="2.2" fill="none"/>
  <polygon points="1232,450 1222,445 1222,455" fill="#3a3a3a"/>

  <!-- ═════ STEP 5 — ACT ═════ -->
  <g>
    <rect x="1232" y="200" width="210" height="500" fill="#ffffff" stroke="#d4a000" stroke-width="2" rx="8"/>
    <rect x="1232" y="200" width="210" height="50" fill="#fff8e8" rx="8"/>
    <rect x="1232" y="240" width="210" height="10" fill="#fff8e8"/>
    <text x="1250" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#8a6500">5 · ACT</text>

    <text x="1250" y="276" font-size="13" font-weight="600" fill="#8a6500">Action sous garde-fou</text>
    <line x1="1250" y1="298" x2="1424" y2="298" stroke="#c5b9a3" stroke-width="0.6"/>

    <rect x="1250" y="314" width="174" height="72" fill="#fff8e8" stroke="#d4a000" stroke-width="1" rx="4"/>
    <text x="1262" y="336" font-size="12" font-style="italic" fill="#8a6500">« Je redémarre</text>
    <text x="1262" y="354" font-size="12" font-style="italic" fill="#8a6500">votre box,</text>
    <text x="1262" y="372" font-size="12" font-style="italic" fill="#8a6500">patientez 90 s. »</text>

    <text x="1250" y="412" class="mono" font-size="11" font-weight="600" fill="#3d5a82">acs-mcp.reboot_cpe</text>
    <text x="1250" y="428" class="mono" font-size="11" fill="#7a7a7a">(box_id)</text>
    <text x="1250" y="452" font-size="12" fill="#5a5a5a">puis ré-interroge</text>
    <text x="1250" y="470" font-size="12" fill="#5a5a5a">le statut ligne.</text>

    <line x1="1250" y1="500" x2="1424" y2="500" stroke="#c5b9a3" stroke-width="0.6"/>
    <rect x="1250" y="514" width="174" height="26" fill="#fff8e8" stroke="#d4a000" stroke-width="1" rx="4"/>
    <text x="1258" y="531" class="mono" font-size="11" font-weight="700" letter-spacing="0.02" fill="#8a6500">ANNONCÉE AVANT EXÉC.</text>

    <text x="1250" y="568" font-size="11" font-style="italic" fill="#8a8a8a">Chaque action est</text>
    <text x="1250" y="586" font-size="11" font-style="italic" fill="#8a8a8a">dite avant d'être faite.</text>
  </g>

  <!-- arrow 5 → 6 -->
  <path d="M 1450 450 L 1482 450" stroke="#3a3a3a" stroke-width="2.2" fill="none"/>
  <polygon points="1490,450 1480,445 1480,455" fill="#3a3a3a"/>

  <!-- ═════ STEP 6 — VERIFY / ESCALATE ═════ -->
  <g>
    <rect x="1490" y="200" width="210" height="500" fill="#ffffff" stroke="#2e7a7a" stroke-width="2" rx="8"/>
    <rect x="1490" y="200" width="210" height="50" fill="#e8f0ef" rx="8"/>
    <rect x="1490" y="240" width="210" height="10" fill="#e8f0ef"/>
    <text x="1508" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#2e7a7a">6 · VERIFY</text>

    <text x="1508" y="276" font-size="13" font-weight="600" fill="#2e7a7a">Sync remontée ?</text>
    <line x1="1508" y1="298" x2="1682" y2="298" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="1508" y="326" font-size="13" font-weight="700" fill="#2e7a7a">✓ OUI</text>
    <text x="1508" y="344" font-size="12" fill="#5a5a5a">confirmation et</text>
    <text x="1508" y="362" font-size="12" fill="#5a5a5a">clôture de l'appel.</text>

    <text x="1508" y="394" font-size="13" font-weight="700" fill="#a83232">✗ NON</text>
    <text x="1508" y="412" font-size="12" fill="#5a5a5a">ticket ServiceNow P2</text>
    <text x="1508" y="430" font-size="12" fill="#5a5a5a">+ créneau technicien.</text>

    <text x="1508" y="462" font-size="12" fill="#5a5a5a">Jamais d'engagement</text>
    <text x="1508" y="480" font-size="12" fill="#5a5a5a">ferme sans accord</text>
    <text x="1508" y="498" font-size="12" fill="#5a5a5a">explicite.</text>

    <line x1="1508" y1="516" x2="1682" y2="516" stroke="#c5b9a3" stroke-width="0.6"/>
    <text x="1508" y="540" font-size="11" font-style="italic" fill="#8a8a8a">Journalisé dans</text>
    <text x="1508" y="558" font-size="11" font-style="italic" fill="#8a8a8a">l'audit trail (ch.18).</text>
  </g>

  <!-- ═════ PER-STEP LATENCY ═════ -->
  <text x="150" y="724" class="mono" font-size="11" fill="#5a5a5a" text-anchor="middle">150 ms</text>
  <text x="383" y="724" class="mono" font-size="11" fill="#5a5a5a" text-anchor="middle">100 ms</text>
  <text x="681" y="724" class="mono" font-size="11" fill="#5a5a5a" text-anchor="middle">250 ms ∥</text>
  <text x="1034" y="724" class="mono" font-size="11" fill="#5a5a5a" text-anchor="middle">200 ms</text>
  <text x="1337" y="724" class="mono" font-size="11" fill="#5a5a5a" text-anchor="middle">reboot 90 s</text>
  <text x="1595" y="724" class="mono" font-size="11" fill="#5a5a5a" text-anchor="middle">async</text>

  <line x1="60" y1="750" x2="1700" y2="750" stroke="#1a1a1a" stroke-width="1.8"/>

  <!-- ═════ HEADLINE STRIP ═════ -->
  <rect x="60" y="790" width="1640" height="40" fill="#f5e6dc" stroke="#b8582e" stroke-width="1.2" rx="6"/>
  <text x="880" y="816" font-size="16" font-weight="600" fill="#b8582e" text-anchor="middle">
    Budget latence &lt; 800 ms par tour de dialogue — appel résolu en 3 min 10, sans humain ni file d'attente.
  </text>

  <text x="60" y="888" font-size="13" font-style="italic" fill="#5a5a5a">
    Listen → Identify → Diagnose (3 MCP en parallèle) → Reason (cascade) → Act sous garde-fou → Verify : une chaîne agentic, pas un SVI à touches.
  </text>
  <text x="60" y="908" font-size="13" font-style="italic" fill="#5a5a5a">
    Le containment réel naît de la résolution (sync remontée), pas de la clôture — c'est ce que le repeat-call-rate mesure (cf. boucle d'évaluation).
  </text>
</svg>
