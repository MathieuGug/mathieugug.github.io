<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <rect width="1500" height="1000" fill="#faf6ec"/>

  <!-- ═════ HEADER ═════ -->
  <text x="60" y="52" font-size="28" font-weight="600" letter-spacing="-0.5">
    Huit postes sur quatre phases — le coût voix qui change de poste
  </text>
  <text x="60" y="86" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Largeur de chaque colonne ∝ coût total de la phase (k€), hauteur de chaque bloc = part du poste : les proportions restent comparables d'une phase à l'autre.
  </text>

  <!-- ═════ TOTAL LABELS (above bars) ═════ -->
  <text x="101" y="184" class="mono" font-size="13" font-weight="700" text-anchor="middle">115</text>
  <text x="164" y="184" class="mono" font-size="13" font-weight="700" text-anchor="middle">413</text>
  <text x="333" y="184" class="mono" font-size="14" font-weight="700" text-anchor="middle">1 205 k€</text>
  <text x="687" y="184" class="mono" font-size="15" font-weight="700" text-anchor="middle">2 290 k€</text>

  <!-- ═════ BARRES PROPORTIONNELLES ═════ -->
  <!-- baseline y=700, top y=200, H=500. Largeur ∝ total. Order bottom→top:
       Équipe, Inférence, Infra, Change, Évaluation, Data, Sécurité, Gouvernance -->

  <!-- POC (x=90 w=22 · 115 k€) -->
  <rect x="90" y="352" width="22" height="348" fill="#b8582e"/>
  <rect x="90" y="330" width="22" height="22"  fill="#3d5a82"/>
  <rect x="90" y="304" width="22" height="26"  fill="#8fb0d6"/>
  <rect x="90" y="278" width="22" height="26"  fill="#d4a000"/>
  <rect x="90" y="244" width="22" height="34"  fill="#2e7a7a"/>
  <rect x="90" y="222" width="22" height="22"  fill="#5a8a6a"/>
  <rect x="90" y="200" width="22" height="22"  fill="#9a9a9a"/>
  <rect x="90" y="200" width="22" height="500" fill="none" stroke="#c5b9a3" stroke-width="1"/>

  <!-- Pilote (x=124 w=80 · 413 k€) -->
  <rect x="124" y="409" width="80" height="291" fill="#b8582e"/>
  <rect x="124" y="367" width="80" height="42"  fill="#3d5a82"/>
  <rect x="124" y="348" width="80" height="19"  fill="#8fb0d6"/>
  <rect x="124" y="311" width="80" height="37"  fill="#a83232"/>
  <rect x="124" y="277" width="80" height="34"  fill="#d4a000"/>
  <rect x="124" y="241" width="80" height="36"  fill="#2e7a7a"/>
  <rect x="124" y="222" width="80" height="19"  fill="#5a8a6a"/>
  <rect x="124" y="200" width="80" height="22"  fill="#9a9a9a"/>
  <rect x="124" y="200" width="80" height="500" fill="none" stroke="#c5b9a3" stroke-width="1"/>
  <text x="164" y="558" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Équipe</text>
  <text x="164" y="576" font-size="11" fill="#ffffff" text-anchor="middle">58 %</text>

  <!-- Prod (x=216 w=235 · 1 205 k€) -->
  <rect x="216" y="468" width="235" height="232" fill="#b8582e"/>
  <rect x="216" y="422" width="235" height="46"  fill="#3d5a82"/>
  <rect x="216" y="364" width="235" height="58"  fill="#8fb0d6"/>
  <rect x="216" y="314" width="235" height="50"  fill="#a83232"/>
  <rect x="216" y="277" width="235" height="37"  fill="#d4a000"/>
  <rect x="216" y="248" width="235" height="29"  fill="#2e7a7a"/>
  <rect x="216" y="223" width="235" height="25"  fill="#5a8a6a"/>
  <rect x="216" y="200" width="235" height="23"  fill="#9a9a9a"/>
  <rect x="216" y="200" width="235" height="500" fill="none" stroke="#c5b9a3" stroke-width="1"/>
  <text x="333" y="586" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Équipe 47 %</text>
  <text x="333" y="397" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Infra 12 %</text>
  <text x="333" y="343" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Change 10 %</text>
  <text x="333" y="448" font-size="11" fill="#ffffff" text-anchor="middle">Inférence 9 %</text>

  <!-- Scale (x=463 w=447 · 2 290 k€) -->
  <rect x="463" y="460" width="447" height="240" fill="#b8582e"/>
  <rect x="463" y="431" width="447" height="29"  fill="#3d5a82"/>
  <rect x="463" y="368" width="447" height="63"  fill="#8fb0d6"/>
  <rect x="463" y="316" width="447" height="52"  fill="#a83232"/>
  <rect x="463" y="272" width="447" height="44"  fill="#d4a000"/>
  <rect x="463" y="252" width="447" height="20"  fill="#2e7a7a"/>
  <rect x="463" y="224" width="447" height="28"  fill="#5a8a6a"/>
  <rect x="463" y="200" width="447" height="24"  fill="#9a9a9a"/>
  <rect x="463" y="200" width="447" height="500" fill="none" stroke="#c5b9a3" stroke-width="1"/>
  <text x="687" y="586" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Équipe 48 %</text>
  <text x="687" y="404" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Infra 13 %</text>
  <text x="687" y="346" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Change 10 %</text>
  <text x="687" y="298" font-size="11" fill="#ffffff" text-anchor="middle">Évaluation 9 %</text>
  <text x="687" y="450" font-size="11" fill="#ffffff" text-anchor="middle">Inférence 6 %</text>

  <!-- handoff annotation : la voix bascule de l'inférence (louée) vers l'infra (internalisée) -->
  <rect x="920" y="368" width="6" height="92" fill="#3d5a82"/>
  <text x="934" y="396" font-size="12" font-weight="700" fill="#3d5a82">voix : louée</text>
  <text x="934" y="414" font-size="12" font-weight="700" fill="#3d5a82">(inférence) →</text>
  <text x="934" y="432" font-size="12" font-weight="700" fill="#3d5a82">internalisée</text>
  <text x="934" y="450" font-size="12" font-weight="700" fill="#3d5a82">(infra)</text>

  <!-- ═════ PHASE LABELS (below baseline) ═════ -->
  <line x1="90" y1="700" x2="910" y2="700" stroke="#1a1a1a" stroke-width="1.6"/>
  <text x="101" y="722" font-size="13" font-weight="600" text-anchor="middle">POC</text>
  <text x="164" y="722" font-size="13" font-weight="600" text-anchor="middle">Pilote</text>
  <text x="333" y="722" font-size="14" font-weight="600" text-anchor="middle">Prod</text>
  <text x="687" y="722" font-size="14" font-weight="600" text-anchor="middle">Scale</text>

  <!-- ═════ VOLUME (montée en charge) ═════ -->
  <text x="60" y="746" class="mono" font-size="11" font-weight="700" letter-spacing="0.08" fill="#3d5a82">VOLUME / MOIS</text>
  <rect x="77"  y="752" width="48" height="24" fill="#eef2f8" stroke="#3d5a82" stroke-width="1.2" rx="12"/>
  <text x="101" y="769" class="mono" font-size="12" font-weight="700" fill="#3d5a82" text-anchor="middle">5 k</text>
  <rect x="140" y="752" width="48" height="24" fill="#eef2f8" stroke="#3d5a82" stroke-width="1.2" rx="12"/>
  <text x="164" y="769" class="mono" font-size="12" font-weight="700" fill="#3d5a82" text-anchor="middle">30 k</text>
  <rect x="309" y="752" width="48" height="24" fill="#eef2f8" stroke="#3d5a82" stroke-width="1.2" rx="12"/>
  <text x="333" y="769" class="mono" font-size="12" font-weight="700" fill="#3d5a82" text-anchor="middle">150 k</text>
  <rect x="663" y="752" width="48" height="24" fill="#3d5a82" stroke="#3d5a82" stroke-width="1.2" rx="12"/>
  <text x="687" y="769" class="mono" font-size="12" font-weight="700" style="fill:#ffffff" text-anchor="middle">250 k</text>
  <!-- ramp arrows + crossover flag -->
  <path d="M 190 764 L 305 764" fill="none" stroke="#3d5a82" stroke-width="1.1"/>
  <polygon points="309,764 301,760 301,768" fill="#3d5a82"/>
  <path d="M 359 764 L 659 764" fill="none" stroke="#3d5a82" stroke-width="1.1"/>
  <polygon points="663,764 655,760 655,768" fill="#3d5a82"/>
  <text x="248" y="745" font-size="11" font-weight="700" fill="#b8582e" text-anchor="middle">crossover</text>
  <text x="248" y="760" class="mono" font-size="11" font-weight="700" fill="#b8582e" text-anchor="middle">≈ 100 k</text>
  <text x="430" y="790" font-size="11" font-weight="700" fill="#b8582e" text-anchor="middle">×50</text>

  <!-- (le coût/appel vit dans la prose : coût opérationnel, distinct du total de phase ÷ volume) -->

  <!-- ═════ RIGHT PANEL — TRAJECTOIRES PAR POSTE ═════ -->
  <text x="1030" y="160" class="mono" font-size="12" font-weight="700" letter-spacing="0.14" fill="#5a5a5a">POSTE — TRAJECTOIRE POC → SCALE (k€)</text>

  <rect x="1030" y="184" width="18" height="18" fill="#b8582e"/>
  <text x="1058" y="198" font-size="13" font-weight="600">Équipe</text>
  <text x="1300" y="198" class="mono" font-size="12" fill="#1a1a1a">80 → 1 100</text>
  <text x="1440" y="198" font-size="11" font-weight="700" fill="#b8582e" text-anchor="end">×14</text>

  <rect x="1030" y="216" width="18" height="18" fill="#3d5a82"/>
  <text x="1058" y="230" font-size="13" font-weight="600">Inférence</text>
  <text x="1058" y="247" font-size="11" fill="#7a7a7a">LLM + voix managée</text>
  <text x="1300" y="230" class="mono" font-size="12" fill="#1a1a1a">5 → 130</text>
  <text x="1440" y="230" font-size="11" font-weight="700" fill="#3d5a82" text-anchor="end">plafonne</text>

  <rect x="1030" y="260" width="18" height="18" fill="#8fb0d6"/>
  <text x="1058" y="274" font-size="13" font-weight="600">Infra</text>
  <text x="1058" y="291" font-size="11" fill="#7a7a7a">GPU voix internalisée</text>
  <text x="1300" y="274" class="mono" font-size="12" fill="#1a1a1a">6 → 290</text>
  <text x="1440" y="274" font-size="11" font-weight="700" fill="#3d5a82" text-anchor="end">prend le relais</text>

  <rect x="1030" y="304" width="18" height="18" fill="#a83232"/>
  <text x="1058" y="318" font-size="13" font-weight="600">Change</text>
  <text x="1300" y="318" class="mono" font-size="12" fill="#1a1a1a">0 → 240</text>
  <text x="1440" y="318" font-size="11" font-weight="700" fill="#a83232" text-anchor="end">apparaît</text>

  <rect x="1030" y="336" width="18" height="18" fill="#d4a000"/>
  <text x="1058" y="350" font-size="13" font-weight="600">Évaluation</text>
  <text x="1300" y="350" class="mono" font-size="12" fill="#1a1a1a">6 → 200</text>
  <text x="1440" y="350" font-size="11" font-weight="700" fill="#8a6500" text-anchor="end">grimpe fort</text>

  <rect x="1030" y="368" width="18" height="18" fill="#2e7a7a"/>
  <text x="1058" y="382" font-size="13" font-weight="600">Data</text>
  <text x="1300" y="382" class="mono" font-size="12" fill="#1a1a1a">8 → 90</text>

  <rect x="1030" y="400" width="18" height="18" fill="#5a8a6a"/>
  <text x="1058" y="414" font-size="13" font-weight="600">Sécurité</text>
  <text x="1300" y="414" class="mono" font-size="12" fill="#1a1a1a">5 → 130</text>

  <rect x="1030" y="432" width="18" height="18" fill="#9a9a9a"/>
  <text x="1058" y="446" font-size="13" font-weight="600">Gouvernance</text>
  <text x="1300" y="446" class="mono" font-size="12" fill="#1a1a1a">5 → 110</text>

  <line x1="1030" y1="468" x2="1460" y2="468" stroke="#c5b9a3" stroke-width="0.8"/>
  <text x="1058" y="490" font-size="13" font-weight="700">Total</text>
  <text x="1300" y="490" class="mono" font-size="12" font-weight="700">115 → 2 290</text>

  <!-- ═════ CALLOUTS ═════ -->
  <rect x="1030" y="520" width="430" height="120" fill="#eef2f8" stroke="#3d5a82" stroke-width="1.4" rx="8"/>
  <text x="1050" y="546" class="mono" font-size="12" font-weight="700" letter-spacing="0.12" fill="#3d5a82">LA BASCULE INFÉRENCE → INFRA</text>
  <text x="1050" y="572" font-size="13" fill="#1a1a1a">La voix managée (dans l'inférence) plafonne à</text>
  <text x="1050" y="592" font-size="13" fill="#1a1a1a">110 → 130 k€ ; le CapEx GPU internalisé (infra)</text>
  <text x="1050" y="612" font-size="13" fill="#1a1a1a">bondit 16 → 290. Le coût ne disparaît pas :</text>
  <text x="1050" y="632" font-size="13" font-weight="600" fill="#3d5a82">il change de poste, au crossover ≈ 100 k appels/mois.</text>

  <rect x="1030" y="656" width="430" height="92" fill="#f5e6dc" stroke="#b8582e" stroke-width="1.4" rx="8"/>
  <text x="1050" y="682" class="mono" font-size="12" font-weight="700" letter-spacing="0.12" fill="#b8582e">LE PARADOXE AGENTIQUE</text>
  <text x="1050" y="708" font-size="13" fill="#1a1a1a">Équipe ×14 et Change 0 → 240 : l'unité de coût</text>
  <text x="1050" y="728" font-size="13" fill="#1a1a1a">se déplace de la voix vers l'humain et le change</text>
  <text x="1050" y="744" font-size="11" font-style="italic" fill="#7a3a1e">(ch. 21.7).</text>

  <!-- ═════ SOURCE LINE ═════ -->
  <text x="60" y="850" font-size="13" font-style="italic" fill="#5a5a5a">
    Lecture : chaque colonne = 100 % du coût de sa phase ; sa largeur est proportionnelle au coût total (POC 115 k€ étroit → Scale 2 290 k€ large).
  </text>
  <text x="60" y="870" font-size="13" font-style="italic" fill="#5a5a5a">
    L'investissement et la taille de l'équipe suivent le volume : 5 k → 250 k appels/mois (×50), avec franchissement du crossover ≈ 100 k en phase Prod (internalisation voix).
  </text>
  <text x="60" y="902" font-size="12" font-style="italic" fill="#8a8a8a">
    Grille CC-02, en k€ · volume 5 k → 250 k appels-bot/mois · l'aire d'un segment ≈ son coût absolu.
  </text>
</svg>
