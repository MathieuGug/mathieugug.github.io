<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <rect width="1400" height="1000" fill="#faf6ec"/>

  <!-- ═════ HEADER ═════ -->
  <text x="60" y="52" font-size="28" font-weight="600" letter-spacing="-0.5">
    La boucle d'évaluation vocale — la voix est plus dure à juger que le texte
  </text>
  <text x="60" y="86" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Quatre temps, comme partout, mais avec un juge particulier : le repeat-call-rate, et une vérité terrain qui arrive en différé.
  </text>

  <!-- ═════ CARD 1 — RÉGRESSION SUITE (top-left, blue) ═════ -->
  <g>
    <rect x="70" y="170" width="480" height="280" fill="#ffffff" stroke="#3d5a82" stroke-width="1.8" rx="10"/>
    <rect x="70" y="170" width="480" height="46" fill="#eef2f8" rx="10"/>
    <rect x="70" y="206" width="480" height="10" fill="#eef2f8"/>
    <text x="90" y="200" class="mono" font-size="13" font-weight="700" letter-spacing="0.16" fill="#3d5a82">1 · RÉGRESSION SUITE</text>
    <text x="430" y="200" font-size="12" font-style="italic" fill="#3d5a82" text-anchor="end">avant chaque release</text>

    <text x="90" y="248" font-size="16" font-weight="600">200 scénarios vocaux dorés</text>
    <text x="90" y="274" font-size="15" font-weight="600" fill="#3d5a82">+ 60 cas adversariaux</text>
    <text x="90" y="300" font-size="13" fill="#5a5a5a">accents · bruit · interruptions · colère</text>

    <rect x="90" y="320" width="440" height="62" fill="#fbf2f2" stroke="#a83232" stroke-width="1.2" rx="6"/>
    <text x="104" y="344" font-size="13" font-weight="700" fill="#a83232">⚠ Ingénierie sociale → usurpation de compte</text>
    <text x="104" y="366" font-size="12" fill="#7a3a1e">un fraudeur qui pousse le bot à ce qu'un humain refuserait.</text>

    <text x="90" y="412" font-size="12" font-style="italic" fill="#8a8a8a">Le corpus doré se durcit à chaque incident rejoué.</text>
  </g>

  <!-- ═════ CARD 2 — MÉTRIQUES EN LIGNE (top-right, teal) ═════ -->
  <g>
    <rect x="850" y="170" width="480" height="280" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.8" rx="10"/>
    <rect x="850" y="170" width="480" height="46" fill="#e8f0ef" rx="10"/>
    <rect x="850" y="206" width="480" height="10" fill="#e8f0ef"/>
    <text x="870" y="200" class="mono" font-size="13" font-weight="700" letter-spacing="0.16" fill="#2e7a7a">2 · MÉTRIQUES EN LIGNE</text>
    <text x="1310" y="200" font-size="12" font-style="italic" fill="#2e7a7a" text-anchor="end">alertes continues</text>

    <text x="870" y="248" font-size="14" fill="#5a5a5a">▸ <tspan font-weight="600" fill="#1a1a1a">CSAT &gt; 4,1 / 5</tspan></text>
    <text x="870" y="276" font-size="14" fill="#5a5a5a">▸ <tspan font-weight="600" fill="#1a1a1a">cost-per-contact</tspan> sur containment NET</text>
    <text x="870" y="304" font-size="14" fill="#5a5a5a">▸ <tspan font-weight="600" fill="#1a1a1a">latence tour &lt; 800 ms</tspan></text>

    <rect x="870" y="320" width="440" height="62" fill="#fbf2f2" stroke="#a83232" stroke-width="1.4" rx="6"/>
    <text x="884" y="344" font-size="13" font-weight="700" fill="#a83232">★ MÉTRIQUE BLOQUANTE — zéro hallucination facturation</text>
    <text x="884" y="366" font-size="12" fill="#7a3a1e">un bot qui invente un montant, c'est un litige.</text>

    <text x="870" y="412" font-size="12" font-style="italic" fill="#8a8a8a">Le Hard ne vaut rien si le CSAT décroche.</text>
  </g>

  <!-- ═════ CARD 3 — DÉTECTION DE DÉRIVE (bottom-right, gold) ═════ -->
  <g>
    <rect x="850" y="510" width="480" height="280" fill="#ffffff" stroke="#d4a000" stroke-width="1.8" rx="10"/>
    <rect x="850" y="510" width="480" height="46" fill="#fff8e8" rx="10"/>
    <rect x="850" y="546" width="480" height="10" fill="#fff8e8"/>
    <text x="870" y="540" class="mono" font-size="13" font-weight="700" letter-spacing="0.16" fill="#8a6500">3 · DÉTECTION DE DÉRIVE</text>

    <text x="870" y="588" font-size="14" fill="#5a5a5a">▸ Monitoring média : latence STT/TTS, barge-in</text>
    <text x="870" y="616" font-size="14" fill="#5a5a5a">▸ LLM-as-judge sur <tspan font-weight="600" fill="#1a1a1a">5 % des transcripts</tspan></text>
    <text x="890" y="638" font-size="13" fill="#7a7a7a">containment <tspan font-weight="600" fill="#1a1a1a">RÉEL</tspan> vs <tspan font-weight="600" fill="#1a1a1a">DÉCLARÉ</tspan></text>

    <rect x="870" y="654" width="440" height="48" fill="#f5e6dc" stroke="#b8582e" stroke-width="1.4" rx="6"/>
    <text x="884" y="684" font-size="14" font-weight="700" fill="#b8582e">repeat-call-rate &lt; 48 h — le vrai juge</text>

    <text x="870" y="732" font-size="12" font-style="italic" fill="#8a8a8a">Un appel « résolu » qui rappelle la nuit est un faux containment.</text>
  </g>

  <!-- ═════ CARD 4 — BOUCLE DE CORRECTION (bottom-left, accent) ═════ -->
  <g>
    <rect x="70" y="510" width="480" height="280" fill="#ffffff" stroke="#b8582e" stroke-width="1.8" rx="10"/>
    <rect x="70" y="510" width="480" height="46" fill="#f5e6dc" rx="10"/>
    <rect x="70" y="546" width="480" height="10" fill="#f5e6dc"/>
    <text x="90" y="540" class="mono" font-size="13" font-weight="700" letter-spacing="0.16" fill="#b8582e">4 · BOUCLE DE CORRECTION</text>

    <text x="90" y="588" font-size="14" fill="#5a5a5a">▸ Re-prompt sous <tspan font-weight="600" fill="#1a1a1a">48 h</tspan></text>
    <text x="90" y="616" font-size="14" fill="#5a5a5a">▸ Ré-entraînement trimestriel ASR</text>
    <text x="110" y="638" font-size="13" fill="#7a7a7a">corpus accents / bruit enrichi (une fois internalisé)</text>

    <rect x="90" y="654" width="440" height="48" fill="#f5e6dc" stroke="#b8582e" stroke-width="1.4" rx="6"/>
    <text x="104" y="684" font-size="14" font-weight="700" fill="#b8582e">Rollback par motif &lt; 1 h → file humaine sans coupure</text>

    <text x="90" y="732" font-size="12" font-style="italic" fill="#8a8a8a">On désactive un motif sans interrompre le service.</text>
  </g>

  <!-- ═════ CYCLE ARROWS (clockwise) ═════ -->
  <!-- 1 → 2 (top) -->
  <path d="M 558 230 L 842 230" fill="none" stroke="#3a3a3a" stroke-width="2.4"/>
  <polygon points="850,230 840,225 840,235" fill="#3a3a3a"/>
  <!-- 2 → 3 (right) -->
  <path d="M 1090 458 L 1090 502" fill="none" stroke="#3a3a3a" stroke-width="2.4"/>
  <polygon points="1090,510 1085,500 1095,500" fill="#3a3a3a"/>
  <!-- 3 → 4 (bottom) -->
  <path d="M 842 730 L 558 730" fill="none" stroke="#3a3a3a" stroke-width="2.4"/>
  <polygon points="550,730 560,725 560,735" fill="#3a3a3a"/>
  <!-- 4 → 1 (left, closes loop) -->
  <path d="M 310 502 L 310 458" fill="none" stroke="#3a3a3a" stroke-width="2.4"/>
  <polygon points="310,450 305,460 315,460" fill="#3a3a3a"/>

  <!-- ═════ CENTER HUB — LE JUGE ═════ -->
  <rect x="565" y="300" width="270" height="300" fill="#1a1a1a" rx="14"/>
  <rect x="565" y="300" width="270" height="300" fill="none" stroke="#b8582e" stroke-width="2.4" rx="14"/>
  <text x="700" y="346" class="mono" font-size="13" font-weight="700" letter-spacing="0.18" style="fill:#d4a673" text-anchor="middle">LE JUGE</text>
  <line x1="595" y1="362" x2="805" y2="362" stroke="#5a5a5a" stroke-width="0.8"/>

  <text x="700" y="404" font-size="16" font-weight="700" style="fill:#ffffff" text-anchor="middle">repeat-call-rate</text>
  <text x="700" y="426" font-size="14" style="fill:#e8e0d0" text-anchor="middle">&lt; 48 h</text>
  <text x="700" y="458" font-size="15" font-weight="600" style="fill:#ffffff" text-anchor="middle">+ CSAT (gardien)</text>

  <line x1="595" y1="482" x2="805" y2="482" stroke="#5a5a5a" stroke-width="0.8"/>
  <text x="700" y="512" font-size="14" font-weight="600" style="fill:#d4a673" text-anchor="middle">containment NET,</text>
  <text x="700" y="532" font-size="14" font-weight="600" style="fill:#d4a673" text-anchor="middle">pas containment brut</text>

  <text x="700" y="566" font-size="11" font-style="italic" style="fill:#b0a890" text-anchor="middle">un « résolu » qui rappelle</text>
  <text x="700" y="582" font-size="11" font-style="italic" style="fill:#b0a890" text-anchor="middle">= faux containment.</text>

  <!-- ═════ BOTTOM CALLOUT — difficulté propre à la voix ═════ -->
  <rect x="70" y="826" width="1260" height="86" fill="#e8f0ef" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
  <text x="90" y="854" class="mono" font-size="12" font-weight="700" letter-spacing="0.14" fill="#2e7a7a">LA DIFFICULTÉ PROPRE À LA VOIX</text>
  <text x="90" y="880" font-size="14" fill="#1a1a1a">La vérité terrain arrive en différé (le CSAT, le rappel) et le signal est bruité (l'ASR se trompe parfois sur ce qui a été dit).</text>
  <text x="90" y="902" font-size="14" font-weight="600" fill="#1f5555">D'où l'échantillon humain de ré-écoute — irremplaçable pour calibrer le juge.</text>

  <!-- ═════ SOURCE LINE ═════ -->
  <text x="70" y="952" font-size="12" font-style="italic" fill="#8a8a8a">
    Lecture : la boucle tourne en continu ; le repeat-call-rate arbitre le containment réel et déclenche le rollback d'un motif (cf. ch. 17 · évaluation agent).
  </text>
</svg>
