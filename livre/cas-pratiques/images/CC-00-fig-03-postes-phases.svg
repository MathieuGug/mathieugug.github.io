  <text x="1058" y="291" font-size="11" fill="#7a7a7a">enablement, champions</text>
  <text x="1300" y="274" class="mono" font-size="12" fill="#1a1a1a">30 → 520</text>
  <text x="1460" y="274" font-size="11" font-weight="700" fill="#a83232" text-anchor="end">poste dominant</text>
