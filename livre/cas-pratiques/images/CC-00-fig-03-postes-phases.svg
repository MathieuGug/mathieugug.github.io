  <text x="1300" y="486" class="mono" font-size="12" font-weight="700">164 → 2 410</text>

  <rect x="1030" y="516" width="430" height="124" fill="#eef2f8" stroke="#3d5a82" stroke-width="1.4" rx="8"/>
  <text x="1050" y="542" class="mono" font-size="12" font-weight="700" letter-spacing="0.12" fill="#3d5a82">PAS D'ÉCONOMIE D'ÉCHELLE</text>
  <text x="1050" y="568" font-size="13" fill="#1a1a1a">L'inférence = des licences par tête. Ajouter un</text>
  <text x="1050" y="588" font-size="13" fill="#1a1a1a">siège ajoute son coût plein. Elle ne baisse en</text>
  <text x="1050" y="608" font-size="13" fill="#1a1a1a">Régime que par DÉSABONNEMENT des dormants</text>
  <text x="1050" y="628" font-size="13" font-weight="600" fill="#3d5a82">(1 100 → 980) et segmentation premium.</text>
  <rect x="1030" y="656" width="430" height="96" fill="#f5e6dc" stroke="#b8582e" stroke-width="1.4" rx="8"/>
  <text x="1050" y="682" class="mono" font-size="12" font-weight="700" letter-spacing="0.12" fill="#b8582e">LE PARADOXE AGENTIQUE — HORIZONTAL</text>
  <text x="1050" y="708" font-size="13" fill="#1a1a1a">Change 30 → 520 : le poste qui CRÉE la valeur</text>
  <text x="1050" y="728" font-size="13" fill="#1a1a1a">(cadrer l'usage humain) est le plus dur à attribuer</text>
  <text x="1050" y="746" font-size="11" font-style="italic" fill="#7a3a1e">(ch. 21.7).</text>

  <text x="60" y="860" font-size="13" font-style="italic" fill="#5a5a5a">
    Lecture : chaque colonne = 100 % du coût de sa phase ; sa largeur ∝ coût total. Le « coût par usage à valeur » (prose) divise par ~13 par montée du taux d'usage cadré.
  </text>
  <text x="60" y="888" font-size="12" font-style="italic" fill="#8a8a8a">
    Grille CC-00, en k€ · le siège est un coût fixe par tête : le seul levier de ROI est l'usage cadré, pas le nombre de sièges.
  </text>

