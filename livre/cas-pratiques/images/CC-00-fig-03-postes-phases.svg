  <text x="1058" y="247" font-size="11" fill="#7a7a7a">licence/siège · pic 1100</text>
  <text x="1300" y="230" class="mono" font-size="12" fill="#1a1a1a">18 → 980</text>
  <text x="1460" y="230" font-size="11" font-weight="700" fill="#3d5a82" text-anchor="end">coût fixe</text>
