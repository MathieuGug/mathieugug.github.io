<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 880"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display    { font-family: 'Fraunces', Georgia, serif; }
    .body       { font-family: 'Inter', system-ui, sans-serif; }
    .mono       { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <!-- background -->
  <rect width="1100" height="880" fill="#faf6ec"/>

  <!-- ═════ HEADER ═════ -->
  <text x="60" y="46" font-size="28" font-weight="600" letter-spacing="-0.5">
    Architecture SI actuelle — banque retail mid-tier 2026
  </text>
  <text x="60" y="82" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Six couches existantes, criticité pour le copilot. La carte décide des MCP servers à monter.
  </text>

  <!-- ═════ STRATE 1 — Canal utilisateur ═════ -->
  <rect x="60" y="120" width="700" height="64" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.2" rx="6"/>
  <text x="80" y="146" font-size="15" font-weight="600">Canal utilisateur</text>
  <text x="80" y="168" font-size="13" fill="#5a5a5a">Poste conseiller Windows + Edge + Office 365 · IAM Azure AD (Conditional Access + MFA HW)</text>

  <rect x="790" y="120" width="260" height="64" fill="#e8f0ef" stroke="#2e7a7a" stroke-width="1.2" rx="6"/>
  <text x="810" y="146" class="mono" font-size="12" font-weight="600" letter-spacing="0.1" fill="#2e7a7a">READ ONLY</text>
  <text x="810" y="168" font-size="13" fill="#2e7a7a">SSO via Azure AD scope par grade.</text>

  <line x1="410" y1="184" x2="410" y2="200" stroke="#7a7a7a" stroke-width="1.5"/>
  <polygon points="410,206 405,198 415,198" fill="#7a7a7a"/>

  <!-- ═════ STRATE 2 — Front métier Salesforce ═════ -->
  <rect x="60" y="210" width="700" height="95" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.2" rx="6"/>
  <text x="80" y="236" font-size="15" font-weight="600">Front métier — Salesforce Financial Services Cloud</text>
  <text x="80" y="260" font-size="13" fill="#5a5a5a">Cloud Azure · Fiche client 360 · RDV · KYC · opportunités cross-sell</text>
  <text x="80" y="278" font-size="13" fill="#5a5a5a">Custom Lightning components pour produits crédit · scopes par grade conseiller</text>
  <text x="80" y="296" font-size="13" fill="#5a5a5a">MCP officiel disponible · effort customization scopes ~1 sem.</text>

  <rect x="790" y="210" width="260" height="95" fill="#f5e6dc" stroke="#b8582e" stroke-width="1.5" rx="6"/>
  <text x="810" y="236" class="mono" font-size="12" font-weight="600" letter-spacing="0.1" fill="#b8582e">READ + WRITE</text>
  <text x="810" y="254" class="mono" font-size="12" font-weight="500" letter-spacing="0.1" fill="#b8582e">via proxy validation</text>
  <text x="810" y="278" font-size="13" fill="#b8582e">Toute écriture validée</text>
  <text x="810" y="296" font-size="13" fill="#b8582e">1-clic par conseiller.</text>

  <line x1="410" y1="305" x2="410" y2="321" stroke="#7a7a7a" stroke-width="1.5"/>
  <polygon points="410,327 405,319 415,319" fill="#7a7a7a"/>

  <!-- ═════ STRATE 3 — Data &amp; scoring ═════ -->
  <rect x="60" y="331" width="700" height="109" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.2" rx="6"/>
  <text x="80" y="357" font-size="15" font-weight="600">Data &amp; scoring</text>
  <text x="80" y="381" font-size="13" fill="#5a5a5a">▸ Snowflake datamart (cloud Azure) — mirror nuit du core, transactions, soldes, scores comportementaux</text>
  <text x="80" y="401" font-size="13" fill="#5a5a5a">▸ Pega Decisioning (SaaS) — scoring crédit temps réel, API REST propre</text>
  <text x="80" y="425" font-size="13" fill="#5a5a5a">MCP : Snowflake open source (2 j) + Pega custom REST (1 sem.)</text>

  <rect x="790" y="331" width="260" height="109" fill="#e8f0ef" stroke="#2e7a7a" stroke-width="1.2" rx="6"/>
  <text x="810" y="357" class="mono" font-size="12" font-weight="600" letter-spacing="0.1" fill="#2e7a7a">READ ONLY</text>
  <text x="810" y="381" font-size="13" fill="#2e7a7a">Snowflake mirror</text>
  <text x="810" y="401" font-size="13" fill="#2e7a7a">+ Pega scoring temps</text>
  <text x="810" y="421" font-size="13" fill="#2e7a7a">réel — APIs propres.</text>

  <line x1="410" y1="440" x2="410" y2="456" stroke="#7a7a7a" stroke-width="1.5"/>
  <polygon points="410,462 405,454 415,454" fill="#7a7a7a"/>
  <text x="425" y="452" font-size="11" font-style="italic" fill="#8a8a8a">mirror nuit (read only)</text>

  <!-- ═════ STRATE 4 — Core banking PAS TOUCHE ═════ -->
  <rect x="60" y="466" width="700" height="129" fill="#fbf2f2" stroke="#a83232" stroke-width="1.6" rx="6"/>
  <text x="80" y="492" font-size="15" font-weight="600" fill="#a83232">Core banking — Mainframe IBM z/OS COBOL</text>
  <text x="80" y="516" font-size="13" fill="#5a5a5a">▸ Décision crédit OFFICIELLE — humaine, jamais déléguée à l'IA</text>
  <text x="80" y="536" font-size="13" fill="#5a5a5a">▸ Comptes, ordres, journal opérations (cœur métier régulé)</text>
  <text x="80" y="556" font-size="13" fill="#5a5a5a">▸ Middleware Tibco / MQ — APIs WS-SOAP legacy exposées</text>
  <text x="80" y="582" font-size="13" font-style="italic" fill="#a83232">→ Le copilot prépare le dossier, l'humain signe. Aucun tool MCP exposé.</text>

  <rect x="790" y="466" width="260" height="129" fill="#f4dcdc" stroke="#a83232" stroke-width="1.8" rx="6"/>
  <text x="810" y="492" class="mono" font-size="12" font-weight="700" letter-spacing="0.16" fill="#a83232">PAS TOUCHE</text>
  <text x="810" y="510" class="mono" font-size="12" font-weight="700" letter-spacing="0.16" fill="#a83232">RÉGULÉ</text>
  <text x="810" y="536" font-size="13" fill="#a83232">DDA + AI Act §5 :</text>
  <text x="810" y="556" font-size="13" fill="#a83232">supervision humaine</text>
  <text x="810" y="576" font-size="13" fill="#a83232">effective obligatoire.</text>

  <line x1="410" y1="595" x2="410" y2="611" stroke="#7a7a7a" stroke-width="1.5"/>
  <polygon points="410,617 405,609 415,609" fill="#7a7a7a"/>

  <!-- ═════ STRATE 5 — Knowledge Base ═════ -->
  <rect x="60" y="621" width="700" height="109" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.2" rx="6"/>
  <text x="80" y="647" font-size="15" font-weight="600">Knowledge base &amp; documentation</text>
  <text x="80" y="671" font-size="13" fill="#5a5a5a">▸ SharePoint Online — guides commerciaux, FAQ produits (MCP officiel Microsoft, 3 j)</text>
  <text x="80" y="691" font-size="13" fill="#a83232">▸ Documentum DMS — doctrine DDA, circulaires conformité <tspan font-weight="600">(MCP custom legacy SOAP : 3 sem., sclérosant)</tspan></text>
  <text x="80" y="711" font-size="13" fill="#5a5a5a">▸ Confluence — procédures opérationnelles internes</text>

  <rect x="790" y="621" width="260" height="109" fill="#e8f0ef" stroke="#2e7a7a" stroke-width="1.2" rx="6"/>
  <text x="810" y="647" class="mono" font-size="12" font-weight="600" letter-spacing="0.1" fill="#2e7a7a">READ ONLY</text>
  <text x="810" y="671" font-size="13" fill="#2e7a7a">RAG corpus complet.</text>
  <text x="810" y="695" font-size="13" font-weight="600" fill="#a83232">⚠ Documentum =</text>
  <text x="810" y="713" font-size="13" fill="#a83232">sclérosant projet.</text>

  <line x1="410" y1="730" x2="410" y2="746" stroke="#7a7a7a" stroke-width="1.5"/>
  <polygon points="410,752 405,744 415,744" fill="#7a7a7a"/>

  <!-- ═════ STRATE 6 — Back-office ═════ -->
  <rect x="60" y="756" width="700" height="84" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.2" rx="6"/>
  <text x="80" y="782" font-size="15" font-weight="600">Back-office &amp; reporting</text>
  <text x="80" y="806" font-size="13" fill="#5a5a5a">▸ ServiceNow — tickets back-office post-RDV (création automatique pour pièces manquantes)</text>
  <text x="80" y="826" font-size="13" fill="#5a5a5a">▸ Power BI — reporting hiérarchique (NPS, cost-per-RDV, conversion) · non touché par le copilot</text>

  <rect x="790" y="756" width="260" height="84" fill="#f5e6dc" stroke="#b8582e" stroke-width="1.2" rx="6"/>
  <text x="810" y="782" class="mono" font-size="12" font-weight="600" letter-spacing="0.1" fill="#b8582e">WRITE (tickets)</text>
  <text x="810" y="806" font-size="13" fill="#b8582e">ServiceNow MCP officiel,</text>
  <text x="810" y="826" font-size="13" fill="#b8582e">1 sem. d'effort intégration.</text>

  <!-- ═════ Source line ═════ -->
  <text x="60" y="867" font-size="12" font-style="italic" fill="#8a8a8a">
    Source : analyse des dépendances copilot · juin 2026 · 6 MCP servers à monter (effort cumulé ~6-8 sem.) · Documentum = 50 % du risque planning.
  </text>
</svg>
