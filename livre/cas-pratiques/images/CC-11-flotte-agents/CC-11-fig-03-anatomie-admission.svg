<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 950"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <defs>
    <marker id="arrowAd" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="1600" height="950" fill="#faf6ec"/>

  <!-- ═════ HEADER ═════ -->
  <text x="60" y="52" font-size="28" font-weight="600" letter-spacing="-0.5">
    Anatomie d'une admission — Declare · Detect · Tier &amp; gate · Arbitrate · Govern
  </text>
  <text x="60" y="86" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    La paved road, étape par étape : ce que le socle fait quand un métier déclare un nouvel agent. Le pipeline qui convertit une demande en agent gouverné.
  </text>

  <!-- ═════ SCENARIO BAR ═════ -->
  <rect x="60" y="112" width="1516" height="48" fill="#fbf4ee" stroke="#d4a673" stroke-width="1.2" rx="6"/>
  <text x="80" y="138" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#b8582e">SCÉNARIO</text>
  <text x="184" y="142" font-size="15" font-style="italic" fill="#5a5a5a">
    « Un métier déclare au registre un nouvel agent de réponse aux notes de frais — alors qu'un agent finance couvre déjà ce périmètre. »
  </text>

  <!-- ═══════════════ STEP 1 — DECLARE (métier) ═══════════════ -->
  <g>
    <rect x="60" y="200" width="248" height="500" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.6" rx="8"/>
    <rect x="60" y="200" width="248" height="50" fill="#fff8e8" rx="8"/>
    <rect x="60" y="240" width="248" height="10" fill="#fff8e8"/>
    <text x="78" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.16" fill="#8a6500">1 · DECLARE</text>

    <text x="78" y="274" class="mono" font-size="11" font-weight="700" letter-spacing="0.1" fill="#8a6500">ACTEUR · LE MÉTIER</text>
    <line x1="78" y1="290" x2="290" y2="290" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="78" y="316" font-size="13" font-weight="600">Le porteur remplit la</text>
    <text x="78" y="334" font-size="13" font-weight="600">fiche au registre :</text>

    <text x="78" y="366" font-size="13" fill="#5a5a5a">▸ owner métier nommé</text>
    <text x="78" y="390" font-size="13" fill="#5a5a5a">▸ finalité</text>
    <text x="78" y="414" font-size="13" fill="#5a5a5a">▸ données accédées</text>
    <text x="78" y="438" font-size="13" fill="#5a5a5a">▸ modèle</text>
    <text x="78" y="462" font-size="13" fill="#5a5a5a">▸ plateforme (Copilot)</text>

    <line x1="78" y1="500" x2="290" y2="500" stroke="#c5b9a3" stroke-width="0.6"/>
    <text x="78" y="528" class="mono" font-size="11" font-weight="700" letter-spacing="0.12" fill="#8a6500">PRODUIT</text>
    <text x="78" y="552" font-size="12" font-style="italic" fill="#5a5a5a">Une fiche d'agent</text>
    <text x="78" y="570" font-size="12" font-style="italic" fill="#5a5a5a">candidate au registre.</text>

    <text x="78" y="668" font-size="11" font-style="italic" fill="#8a8a8a">Mobilise ch.25 — le registre</text>
    <text x="78" y="686" font-size="11" font-style="italic" fill="#8a8a8a">porte le statut AI Act.</text>
  </g>

  <!-- arrow 1 → 2 -->
  <path d="M 316 440 L 328 440" stroke="#3a3a3a" stroke-width="2.2" fill="none" marker-end="url(#arrowAd)"/>

  <!-- ═══════════════ STEP 2 — DETECT (socle) ═══════════════ -->
  <g>
    <rect x="336" y="200" width="336" height="500" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.8" rx="8"/>
    <rect x="336" y="200" width="336" height="50" fill="#eaf3f1" rx="8"/>
    <rect x="336" y="240" width="336" height="10" fill="#eaf3f1"/>
    <text x="354" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.16" fill="#226a6a">2 · DETECT</text>

    <text x="354" y="274" class="mono" font-size="11" font-weight="700" letter-spacing="0.1" fill="#226a6a">ACTEUR · LE SOCLE (registre)</text>
    <line x1="354" y1="290" x2="654" y2="290" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="354" y="316" font-size="13" font-weight="600">Le socle interroge le registre</text>
    <text x="354" y="334" font-size="13" font-weight="600">et cherche une collision :</text>

    <rect x="354" y="350" width="300" height="36" fill="#fbfbfb" stroke="#c5b9a3" stroke-width="0.8" rx="4"/>
    <text x="366" y="366" class="mono" font-size="11" font-weight="600" fill="#226a6a">registre-mcp</text>
    <text x="366" y="380" font-size="11" fill="#7a7a7a">.search_by_purpose(domaine)</text>

    <rect x="354" y="394" width="300" height="36" fill="#fbfbfb" stroke="#c5b9a3" stroke-width="0.8" rx="4"/>
    <text x="366" y="410" class="mono" font-size="11" font-weight="600" fill="#226a6a">registre-mcp</text>
    <text x="366" y="424" font-size="11" fill="#7a7a7a">.detect_collision(finalite)</text>

    <rect x="354" y="438" width="300" height="36" fill="#fbfbfb" stroke="#c5b9a3" stroke-width="0.8" rx="4"/>
    <text x="366" y="454" class="mono" font-size="11" font-weight="600" fill="#226a6a">observabilite-mcp</text>
    <text x="366" y="468" font-size="11" fill="#7a7a7a">.usage_rate(agent_existant)</text>

    <line x1="354" y1="500" x2="654" y2="500" stroke="#c5b9a3" stroke-width="0.6"/>
    <rect x="354" y="514" width="300" height="78" fill="#fbf2f2" stroke="#a83232" stroke-width="1.2" rx="5"/>
    <text x="368" y="536" class="mono" font-size="11" font-weight="700" fill="#a83232">⚠ COLLISION DÉTECTÉE</text>
    <text x="368" y="558" font-size="12" fill="#5a5a5a">Un agent finance répond déjà</text>
    <text x="368" y="576" font-size="12" fill="#5a5a5a">sur les notes de frais — risque</text>
    <text x="368" y="594" font-size="12" fill="#5a5a5a">de réponses contradictoires.</text>

    <text x="354" y="668" font-size="11" font-style="italic" fill="#8a8a8a">Le doublon attrapé avant de</text>
    <text x="354" y="686" font-size="11" font-style="italic" fill="#8a8a8a">devenir une contradiction.</text>
  </g>

  <!-- arrow 2 → 3 -->
  <path d="M 680 440 L 692 440" stroke="#3a3a3a" stroke-width="2.2" fill="none" marker-end="url(#arrowAd)"/>

  <!-- ═══════════════ STEP 3 — TIER & GATE (gate) ═══════════════ -->
  <g>
    <rect x="700" y="200" width="276" height="500" fill="#ffffff" stroke="#b8582e" stroke-width="2" rx="8"/>
    <rect x="700" y="200" width="276" height="50" fill="#fbf3ec" rx="8"/>
    <rect x="700" y="240" width="276" height="10" fill="#fbf3ec"/>
    <text x="718" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.16" fill="#b8582e">3 · TIER &amp; GATE</text>

    <text x="718" y="274" class="mono" font-size="11" font-weight="700" letter-spacing="0.1" fill="#b8582e">ACTEUR · ÉVAL-AS-A-SERVICE</text>
    <line x1="718" y1="290" x2="952" y2="290" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="718" y="316" font-size="13" font-weight="600">Classement du risque :</text>
    <rect x="718" y="328" width="120" height="26" fill="#fbf3ec" stroke="#b8582e" stroke-width="1.4" rx="4"/>
    <text x="734" y="346" class="mono" font-size="12" font-weight="700" fill="#b8582e">TIER 2</text>
    <text x="850" y="346" font-size="12" fill="#5a5a5a">écrit pas dans</text>
    <text x="850" y="362" font-size="12" fill="#5a5a5a">un régulé</text>

    <text x="718" y="398" font-size="13" font-weight="600">Gate d'éval déclenché :</text>
    <text x="718" y="426" font-size="13" fill="#5a5a5a">▸ régression suite de</text>
    <text x="736" y="444" font-size="12" fill="#7a7a7a">l'archétype conversationnel</text>
    <text x="718" y="470" font-size="13" fill="#5a5a5a">▸ test de non-contradiction</text>
    <text x="736" y="488" font-size="12" fill="#7a7a7a">contre l'agent existant</text>

    <line x1="718" y1="520" x2="952" y2="520" stroke="#c5b9a3" stroke-width="0.6"/>
    <text x="718" y="548" class="mono" font-size="11" font-weight="700" letter-spacing="0.12" fill="#b8582e">RÈGLE</text>
    <text x="718" y="572" font-size="12" font-style="italic" fill="#5a5a5a">Aucun agent en prod</text>
    <text x="718" y="590" font-size="12" font-style="italic" fill="#5a5a5a">sans passer le gate.</text>

    <text x="718" y="668" font-size="11" font-style="italic" fill="#8a8a8a">Mobilise ch.19 — gate de</text>
    <text x="718" y="686" font-size="11" font-style="italic" fill="#8a8a8a">promotion mutualisé.</text>
  </g>

  <!-- arrow 3 → 4 -->
  <path d="M 980 440 L 992 440" stroke="#3a3a3a" stroke-width="2.2" fill="none" marker-end="url(#arrowAd)"/>

  <!-- ═══════════════ STEP 4 — ARBITRATE (comité) ═══════════════ -->
  <g>
    <rect x="1004" y="200" width="268" height="500" fill="#ffffff" stroke="#a83232" stroke-width="1.8" rx="8"/>
    <rect x="1004" y="200" width="268" height="50" fill="#fbf2f2" rx="8"/>
    <rect x="1004" y="240" width="268" height="10" fill="#fbf2f2"/>
    <text x="1022" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.16" fill="#a83232">4 · ARBITRATE</text>

    <text x="1022" y="274" class="mono" font-size="11" font-weight="700" letter-spacing="0.1" fill="#a83232">ACTEUR · COMITÉ DE PORTEFEUILLE</text>
    <line x1="1022" y1="290" x2="1252" y2="290" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="1022" y="318" font-size="13" font-weight="600">Le comité tranche</text>
    <text x="1022" y="336" font-size="13" font-weight="600">la collision :</text>

    <rect x="1022" y="356" width="230" height="64" fill="#eaf3f1" stroke="#2e7a7a" stroke-width="1.6" rx="6"/>
    <text x="1036" y="384" class="mono" font-size="15" font-weight="700" fill="#226a6a">→ FUSION</text>
    <text x="1036" y="406" font-size="12" fill="#5a5a5a">avec l'agent finance existant</text>

    <text x="1022" y="448" font-size="13" fill="#5a5a5a">plutôt qu'un doublon de</text>
    <text x="1022" y="466" font-size="13" fill="#5a5a5a">plus dans la flotte.</text>

    <line x1="1022" y1="500" x2="1252" y2="500" stroke="#c5b9a3" stroke-width="0.6"/>
    <text x="1022" y="528" class="mono" font-size="11" font-weight="700" letter-spacing="0.12" fill="#a83232">DÉCISION</text>
    <text x="1022" y="552" font-size="12" font-style="italic" fill="#5a5a5a">Le métier garde l'owner,</text>
    <text x="1022" y="570" font-size="12" font-style="italic" fill="#5a5a5a">le périmètre est unifié.</text>

    <text x="1022" y="668" font-size="11" font-style="italic" fill="#8a8a8a">Mobilise ch.26 — modèle</text>
    <text x="1022" y="686" font-size="11" font-style="italic" fill="#8a8a8a">fédéré, métier vs DSI.</text>
  </g>

  <!-- arrow 4 → 5 -->
  <path d="M 1280 440 L 1292 440" stroke="#3a3a3a" stroke-width="2.2" fill="none" marker-end="url(#arrowAd)"/>

  <!-- ═══════════════ STEP 5 — GOVERN (socle) ═══════════════ -->
  <g>
    <rect x="1300" y="200" width="276" height="500" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.8" rx="8"/>
    <rect x="1300" y="200" width="276" height="50" fill="#eaf3f1" rx="8"/>
    <rect x="1300" y="240" width="276" height="10" fill="#eaf3f1"/>
    <text x="1318" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.16" fill="#226a6a">5 · GOVERN</text>

    <text x="1318" y="274" class="mono" font-size="11" font-weight="700" letter-spacing="0.1" fill="#226a6a">ACTEUR · LE SOCLE (run)</text>
    <line x1="1318" y1="290" x2="1552" y2="290" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="1318" y="316" font-size="13" font-weight="600">L'agent retenu vit sous :</text>

    <text x="1318" y="348" font-size="13" fill="#5a5a5a">▸ gateway — accès tracés,</text>
    <text x="1336" y="366" font-size="12" fill="#7a7a7a">coût attribué (FinOps)</text>
    <text x="1318" y="394" font-size="13" fill="#5a5a5a">▸ observabilité — taux</text>
    <text x="1336" y="412" font-size="12" fill="#7a7a7a">d'usage suivi, dérive vue</text>
    <text x="1318" y="440" font-size="13" fill="#5a5a5a">▸ garde-fous par tier</text>
    <text x="1318" y="468" font-size="13" fill="#5a5a5a">▸ statut AI Act au registre</text>

    <line x1="1318" y1="500" x2="1552" y2="500" stroke="#c5b9a3" stroke-width="0.6"/>
    <text x="1318" y="528" class="mono" font-size="11" font-weight="700" letter-spacing="0.12" fill="#226a6a">PRODUIT</text>
    <text x="1318" y="552" font-size="12" font-style="italic" fill="#5a5a5a">Un agent gouverné,</text>
    <text x="1318" y="570" font-size="12" font-style="italic" fill="#5a5a5a">audit trail complet.</text>

    <text x="1318" y="668" font-size="11" font-style="italic" fill="#8a8a8a">Mobilise ch.20 (observabilité)</text>
    <text x="1318" y="686" font-size="11" font-style="italic" fill="#8a8a8a">+ ch.16 (gateway / identité).</text>
  </g>

  <!-- ═════ PUNCHLINE BAR ═════ -->
  <line x1="60" y1="748" x2="1576" y2="748" stroke="#1a1a1a" stroke-width="1.8"/>
  <text x="60" y="778" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#5a5a5a">LA PAVED ROAD</text>
  <text x="240" y="778" font-size="13" fill="#5a5a5a">métier → socle → gate → comité → socle : la voie conforme est la plus facile à emprunter.</text>

  <rect x="60" y="800" width="1516" height="40" fill="#eaf3f1" stroke="#2e7a7a" stroke-width="1.2" rx="6"/>
  <text x="818" y="826" font-size="16" font-weight="600" fill="#226a6a" text-anchor="middle">
    La paved road convertit une demande métier en agent gouverné — sans ajouter une contradiction de plus à la flotte.
  </text>

  <!-- ═════ SOURCE ═════ -->
  <text x="60" y="888" font-size="13" font-style="italic" fill="#5a5a5a">
    C'est l'inverse de la sprawl : là où un agent entrait sans carte, sans owner et sans éval, il passe désormais par cinq portes — sans que le métier perde la main.
  </text>
  <text x="60" y="912" font-size="13" font-style="italic" fill="#5a5a5a">
    Le mode A (admission) du socle, déroulé sur un cas réel de collision de périmètre. C'est ce que « gouverner sans centraliser » veut dire concrètement.
  </text>
</svg>
