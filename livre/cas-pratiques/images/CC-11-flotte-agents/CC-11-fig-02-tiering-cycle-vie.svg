<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <defs>
    <marker id="arrowLc" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5a5a5a"/>
    </marker>
    <marker id="arrowLoop" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2e7a7a"/>
    </marker>
    <marker id="arrowKill" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#a83232"/>
    </marker>
  </defs>

  <!-- ═════ BACKGROUND ═════ -->
  <rect width="1600" height="920" fill="#faf6ec"/>

  <!-- ═════ HEADER ═════ -->
  <text x="60" y="58" font-size="32" font-weight="600" letter-spacing="-0.5">
    Tiering par le risque + cycle de vie d'un agent
  </text>
  <text x="60" y="96" class="display" font-size="20" font-style="italic" fill="#5a5a5a">
    Gouvernance proportionnée : on ne met pas la même gouvernance sur les 50. Et deux portes que la sprawl n'avait pas.
  </text>

  <!-- ═══════════════ PANNEAU GAUCHE : TIERING ═══════════════ -->
  <text x="80" y="148" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#5a5a5a">TIERING PAR LE RISQUE — la clé de la scalabilité</text>

  <!-- Tier 1 (fort) — bande étroite (peu d'agents) -->
  <g>
    <rect x="260" y="172" width="420" height="118" fill="#fbf2f2" stroke="#a83232" stroke-width="2" rx="10"/>
    <text x="280" y="200" class="mono" font-size="13" font-weight="700" fill="#a83232">TIER 1 · FORT</text>
    <text x="280" y="224" font-size="13" font-weight="600">Client-facing · écrit système régulé · données sensibles</text>
    <text x="280" y="248" font-size="12" fill="#5a5a5a">→ revue lourde (sécu, DPO), éval renforcée,</text>
    <text x="280" y="266" font-size="12" fill="#5a5a5a">supervision humaine. AI Act haut risque (Annexe III).</text>
    <text x="280" y="284" class="mono" font-size="11" fill="#a83232">peu d'agents — gouvernance maximale</text>
  </g>

  <!-- Tier 2 (moyen) — bande moyenne -->
  <g>
    <rect x="200" y="306" width="540" height="110" fill="#fbf3ec" stroke="#b8582e" stroke-width="1.8" rx="10"/>
    <text x="220" y="334" class="mono" font-size="13" font-weight="700" fill="#b8582e">TIER 2 · MOYEN</text>
    <text x="220" y="358" font-size="13" font-weight="600">Écrit dans des systèmes internes non régulés</text>
    <text x="220" y="382" font-size="12" fill="#5a5a5a">→ revue standard, gate d'éval de l'archétype,</text>
    <text x="220" y="400" font-size="12" fill="#5a5a5a">garde-fous de niveau intermédiaire.</text>
  </g>

  <!-- Tier 3 (faible) — bande large (la majorité) -->
  <g>
    <rect x="120" y="432" width="700" height="118" fill="#eaf3f1" stroke="#2e7a7a" stroke-width="1.8" rx="10"/>
    <text x="140" y="460" class="mono" font-size="13" font-weight="700" fill="#226a6a">TIER 3 · FAIBLE</text>
    <text x="140" y="484" font-size="13" font-weight="600">RAG interne en lecture seule</text>
    <text x="140" y="508" font-size="12" fill="#5a5a5a">→ self-service cadré : la paved road dans sa forme la plus pure.</text>
    <text x="140" y="526" font-size="12" fill="#5a5a5a">L'owner déclare au registre, le gate est léger, l'agent vit sous garde-fous.</text>
    <text x="140" y="544" class="mono" font-size="11" fill="#226a6a">la majorité des agents — gouvernance minimale, automatisée</text>
  </g>

  <!-- Annotation pyramide -->
  <text x="120" y="588" font-size="13" font-style="italic" fill="#5a5a5a">Largeur ∝ nombre d'agents : la base (tier 3) est large, le sommet (tier 1) est étroit.</text>
  <text x="120" y="610" font-size="13" font-style="italic" fill="#5a5a5a">Sans tiering : soit on sous-gouverne le risque, soit on sur-gouverne l'inoffensif — et les métiers fuient.</text>

  <!-- Reclassement -->
  <rect x="120" y="636" width="700" height="74" fill="#fff8e8" stroke="#d4a000" stroke-width="1.6" rx="10"/>
  <text x="138" y="662" class="mono" font-size="12" font-weight="700" letter-spacing="0.1" fill="#8a6500">RECLASSEMENT AUTOMATIQUE</text>
  <text x="138" y="686" font-size="13">Un agent qui change de périmètre change de tier : un tier 3 lecture seule</text>
  <text x="138" y="704" font-size="13">qui se met à écrire dans un système régulé bascule en tier 1.</text>

  <!-- Séparateur vertical -->
  <line x1="880" y1="150" x2="880" y2="720" stroke="#c5b9a3" stroke-width="1.2" stroke-dasharray="6 5"/>

  <!-- ═══════════════ PANNEAU DROIT : CYCLE DE VIE ═══════════════ -->
  <text x="940" y="148" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#5a5a5a">CYCLE DE VIE D'UN AGENT — comme un cycle applicatif, mais pour agents</text>

  <!-- Étape 1 : Idée -->
  <g>
    <rect x="1080" y="166" width="340" height="58" fill="#ffffff" stroke="#c5b9a3" rx="8"/>
    <text x="1100" y="192" font-size="14" font-weight="600">1 · Idée</text>
    <text x="1100" y="212" font-size="12" fill="#5a5a5a">un besoin métier émerge</text>
  </g>
  <line x1="1250" y1="224" x2="1250" y2="244" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrowLc)"/>

  <!-- Étape 2 : Admission (PORTE) -->
  <g>
    <rect x="1080" y="248" width="340" height="62" fill="#eaf3f1" stroke="#2e7a7a" stroke-width="2" rx="8"/>
    <text x="1100" y="274" font-size="14" font-weight="600" fill="#226a6a">2 · Admission au registre ★</text>
    <text x="1100" y="294" font-size="12" fill="#5a5a5a">owner + finalité + tier + statut AI Act</text>
  </g>
  <line x1="1250" y1="310" x2="1250" y2="330" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrowLc)"/>

  <!-- Étape 3 : Build -->
  <g>
    <rect x="1080" y="334" width="340" height="56" fill="#ffffff" stroke="#c5b9a3" rx="8"/>
    <text x="1100" y="360" font-size="14" font-weight="600">3 · Build</text>
    <text x="1100" y="379" font-size="12" fill="#5a5a5a">réutilise catalogue MCP + templates</text>
  </g>
  <line x1="1250" y1="390" x2="1250" y2="410" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrowLc)"/>

  <!-- Étape 4 : Gate d'éval (PORTE) -->
  <g>
    <rect x="1080" y="414" width="340" height="62" fill="#fbf3ec" stroke="#b8582e" stroke-width="2.2" rx="8"/>
    <text x="1100" y="440" font-size="14" font-weight="600" fill="#b8582e">4 · Gate d'éval ★</text>
    <text x="1100" y="460" font-size="12" fill="#5a5a5a">rien en prod sans passer le gate</text>
  </g>
  <line x1="1250" y1="476" x2="1250" y2="496" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrowLc)"/>

  <!-- Étape 5 : Prod -->
  <g>
    <rect x="1080" y="500" width="340" height="56" fill="#ffffff" stroke="#c5b9a3" rx="8"/>
    <text x="1100" y="526" font-size="14" font-weight="600">5 · Prod</text>
    <text x="1100" y="545" font-size="12" fill="#5a5a5a">l'agent sert, sous gateway + garde-fous</text>
  </g>
  <line x1="1250" y1="556" x2="1250" y2="576" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrowLc)"/>

  <!-- Étape 6 : Monitoring -->
  <g>
    <rect x="1080" y="580" width="340" height="56" fill="#ffffff" stroke="#c5b9a3" rx="8"/>
    <text x="1100" y="606" font-size="14" font-weight="600">6 · Monitoring</text>
    <text x="1100" y="625" font-size="12" fill="#5a5a5a">observabilité : coût, usage réel, dérive</text>
  </g>
  <line x1="1250" y1="636" x2="1250" y2="656" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrowLc)"/>

  <!-- Étape 7 : Revue périodique -->
  <g>
    <rect x="1080" y="660" width="340" height="56" fill="#ffffff" stroke="#c5b9a3" rx="8"/>
    <text x="1100" y="686" font-size="14" font-weight="600">7 · Revue périodique (comité)</text>
    <text x="1100" y="705" font-size="12" fill="#5a5a5a">l'agent sert-il encore ? doublon ?</text>
  </g>

  <!-- Boucle revue → monitoring (l'agent reste actif) -->
  <path d="M 1080 688 H 1010 V 608 H 1075" fill="none" stroke="#2e7a7a" stroke-width="2" marker-end="url(#arrowLoop)"/>
  <text x="940" y="644" font-size="12" font-weight="600" fill="#226a6a">actif :</text>
  <text x="940" y="662" font-size="12" fill="#226a6a">l'agent</text>
  <text x="940" y="680" font-size="12" fill="#226a6a">reste,</text>
  <text x="940" y="698" font-size="12" fill="#226a6a">on boucle</text>

  <!-- Sortie revue → dé-commissionnement (PORTE) -->
  <line x1="1250" y1="716" x2="1250" y2="744" stroke="#a83232" stroke-width="2.2" marker-end="url(#arrowKill)"/>
  <text x="1262" y="736" font-size="12" font-weight="600" fill="#a83232">zombie / doublon</text>

  <!-- Étape 8 : Dé-commissionnement (PORTE) -->
  <g>
    <rect x="1080" y="748" width="340" height="58" fill="#fbf2f2" stroke="#a83232" stroke-width="2.2" rx="8"/>
    <text x="1100" y="774" font-size="14" font-weight="600" fill="#a83232">8 · Dé-commissionnement ★</text>
    <text x="1100" y="794" font-size="12" fill="#5a5a5a">le zombie a une fin de vie — on l'éteint</text>
  </g>

  <!-- Encadré : les deux portes -->
  <rect x="940" y="166" width="120" height="380" fill="none"/>
  <text x="940" y="196" font-size="14" font-weight="700" fill="#1a1a1a">Les deux</text>
  <text x="940" y="216" font-size="14" font-weight="700" fill="#1a1a1a">portes ★</text>
  <text x="940" y="240" font-size="12.5" fill="#5a5a5a">que la</text>
  <text x="940" y="258" font-size="12.5" fill="#5a5a5a">sprawl</text>
  <text x="940" y="276" font-size="12.5" fill="#5a5a5a">n'avait</text>
  <text x="940" y="294" font-size="12.5" fill="#5a5a5a">pas :</text>
  <text x="940" y="430" font-size="12.5" font-weight="600" fill="#b8582e">le gate</text>
  <text x="940" y="448" font-size="12.5" font-weight="600" fill="#b8582e">d'éval</text>
  <text x="940" y="466" font-size="12.5" fill="#5a5a5a">(entrée)</text>
  <text x="940" y="772" font-size="12.5" font-weight="600" fill="#a83232">la fin</text>
  <text x="940" y="790" font-size="12.5" font-weight="600" fill="#a83232">de vie</text>
  <text x="940" y="808" font-size="12.5" fill="#5a5a5a">(sortie)</text>

  <!-- ═════ SOURCE + LÉGENDE ═════ -->
  <text x="60" y="858" font-size="13" font-style="italic" fill="#8a8a8a">
    La gouvernance est proportionnée au risque (3 tiers), et le cycle de vie ajoute les deux portes manquantes : le gate d'éval à l'entrée, le dé-commissionnement à la sortie.
  </text>
  <line x1="60" y1="874" x2="1540" y2="874" stroke="#c5b9a3" stroke-width="1"/>
  <g>
    <text x="60" y="900" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#5a5a5a">LÉGENDE</text>
    <rect x="178" y="890" width="14" height="14" fill="#fbf2f2" stroke="#a83232" stroke-width="2"/>
    <text x="200" y="901" font-size="12">Tier 1 / porte de sortie (fort risque)</text>
    <rect x="520" y="890" width="14" height="14" fill="#fbf3ec" stroke="#b8582e"/>
    <text x="542" y="901" font-size="12">Tier 2 / gate d'éval</text>
    <rect x="730" y="890" width="14" height="14" fill="#eaf3f1" stroke="#2e7a7a"/>
    <text x="752" y="901" font-size="12">Tier 3 / boucle active</text>
    <text x="960" y="901" font-size="12" font-weight="600">★ = porte que la sprawl n'avait pas</text>
  </g>
</svg>
