<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 960"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <defs>
    <marker id="arrowFed" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2e7a7a"/>
    </marker>
  </defs>

  <!-- ═════ BACKGROUND ═════ -->
  <rect width="1600" height="960" fill="#faf6ec"/>

  <!-- ═════ HEADER ═════ -->
  <text x="60" y="58" font-size="32" font-weight="600" letter-spacing="-0.5">
    Le socle fédéré — six services + modèle opératoire hub-and-spoke
  </text>
  <text x="60" y="96" class="display" font-size="20" font-style="italic" fill="#5a5a5a">
    La plateforme « AgentOps » fédère sans centraliser : le CoE possède le socle, les métiers possèdent leurs agents.
  </text>

  <!-- ═════ ZONE SOCLE (6 services) ═════ -->
  <rect x="80" y="130" width="1196" height="282" fill="#eaf3f1" stroke="#2e7a7a" stroke-width="1.6" stroke-dasharray="8 4" rx="14"/>
  <text x="98" y="158" class="mono" font-size="13" font-weight="700" letter-spacing="0.14" fill="#226a6a">LE SOCLE FÉDÉRÉ · PLATEFORME « AGENTOPS » — possédé par le Center of Excellence agents</text>

  <!-- Service 1 -->
  <g>
    <rect x="100" y="174" width="378" height="104" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
    <circle cx="124" cy="198" r="11" fill="#2e7a7a"/>
    <text x="124" y="203" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="146" y="203" font-size="15" font-weight="600">Registre d'agents</text>
    <text x="116" y="230" font-size="12" fill="#5a5a5a">La carte : owner, finalité, données accédées,</text>
    <text x="116" y="250" font-size="12" fill="#5a5a5a">modèle, risque, statut AI Act, cycle de vie.</text>
    <text x="116" y="270" class="mono" font-size="11" fill="#226a6a">sans lui → personne n'a la carte</text>
  </g>
  <!-- Service 2 -->
  <g>
    <rect x="498" y="174" width="378" height="104" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
    <circle cx="522" cy="198" r="11" fill="#2e7a7a"/>
    <text x="522" y="203" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="544" y="203" font-size="15" font-weight="600">Gateway / identité agent</text>
    <text x="514" y="230" font-size="12" fill="#5a5a5a">Authn/authz par agent, scopes MCP, secrets,</text>
    <text x="514" y="250" font-size="12" fill="#5a5a5a">rate-limit, routing modèle, attribution de coût.</text>
    <text x="514" y="270" class="mono" font-size="11" fill="#226a6a">le composant load-bearing · FinOps agentique</text>
  </g>
  <!-- Service 3 -->
  <g>
    <rect x="896" y="174" width="360" height="104" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
    <circle cx="920" cy="198" r="11" fill="#2e7a7a"/>
    <text x="920" y="203" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="942" y="203" font-size="15" font-weight="600">Éval-as-a-service</text>
    <text x="912" y="230" font-size="12" fill="#5a5a5a">Suites de régression par archétype, LLM-as-</text>
    <text x="912" y="250" font-size="12" fill="#5a5a5a">judge mutualisé, gate de promotion.</text>
    <text x="912" y="270" class="mono" font-size="11" fill="#226a6a">aucun agent en prod sans passer le gate</text>
  </g>
  <!-- Service 4 -->
  <g>
    <rect x="100" y="290" width="378" height="104" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
    <circle cx="124" cy="314" r="11" fill="#2e7a7a"/>
    <text x="124" y="319" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="146" y="319" font-size="15" font-weight="600">Observabilité transverse</text>
    <text x="116" y="346" font-size="12" fill="#5a5a5a">Traces, coût/agent, latence, taux d'usage réel,</text>
    <text x="116" y="366" font-size="12" fill="#5a5a5a">escalades, incidents.</text>
    <text x="116" y="386" class="mono" font-size="11" fill="#226a6a">détecte les zombies et les dérives</text>
  </g>
  <!-- Service 5 -->
  <g>
    <rect x="498" y="290" width="378" height="104" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
    <circle cx="522" cy="314" r="11" fill="#2e7a7a"/>
    <text x="522" y="319" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">5</text>
    <text x="544" y="319" font-size="15" font-weight="600">Garde-fous &amp; politiques</text>
    <text x="514" y="346" font-size="12" fill="#5a5a5a">DLP, PII, anti prompt-injection ; politiques</text>
    <text x="514" y="366" font-size="12" fill="#5a5a5a">appliquées par niveau de risque.</text>
    <text x="514" y="386" class="mono" font-size="11" fill="#226a6a">uniforme côté plateforme, pas par agent</text>
  </g>
  <!-- Service 6 -->
  <g>
    <rect x="896" y="290" width="360" height="104" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.4" rx="8"/>
    <circle cx="920" cy="314" r="11" fill="#2e7a7a"/>
    <text x="920" y="319" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#ffffff">6</text>
    <text x="942" y="319" font-size="15" font-weight="600">Catalogue de composants</text>
    <text x="912" y="346" font-size="12" fill="#5a5a5a">MCP servers, prompts, templates partagés</text>
    <text x="912" y="366" font-size="12" fill="#5a5a5a">(ex. les MCP banque de CC-01).</text>
    <text x="912" y="386" class="mono" font-size="11" fill="#226a6a">fin de la duplication d'effort</text>
  </g>

  <!-- ═════ FLÈCHES SOCLE → PLATEFORMES (fédère) ═════ -->
  <line x1="290" y1="414" x2="290" y2="466" stroke="#2e7a7a" stroke-width="2" marker-end="url(#arrowFed)"/>
  <line x1="678" y1="414" x2="678" y2="466" stroke="#2e7a7a" stroke-width="2" marker-end="url(#arrowFed)"/>
  <line x1="1066" y1="414" x2="1066" y2="466" stroke="#2e7a7a" stroke-width="2" marker-end="url(#arrowFed)"/>

  <!-- ═════ ZONE PLATEFORMES D'EXÉCUTION ═════ -->
  <text x="80" y="446" class="mono" font-size="13" font-weight="700" letter-spacing="0.12" fill="#5a5a5a">PLATEFORMES D'EXÉCUTION — possédées par les métiers (owner + ROI de chaque agent)</text>

  <!-- Plateforme 1 : Copilot natif -->
  <g>
    <rect x="100" y="486" width="378" height="118" fill="#f0f4ec" stroke="#7a9a5e" stroke-width="1.6" rx="10"/>
    <text x="118" y="514" font-size="15" font-weight="600" fill="#3d5320">Microsoft Copilot Studio</text>
    <text x="118" y="540" font-size="12" fill="#5a5a5a">≈ 50 agents métiers, gouvernés nativement</text>
    <text x="118" y="560" font-size="12" fill="#5a5a5a">(Purview / Entra Agent ID / admin center).</text>
    <text x="118" y="586" class="mono" font-size="11" fill="#4d6635">on exploite le natif → on le fédère au registre</text>
  </g>
  <!-- Plateforme 2 : verticaux build -->
  <g>
    <rect x="498" y="486" width="378" height="118" fill="#eef2f8" stroke="#6f8db4" stroke-width="1.6" rx="10"/>
    <text x="516" y="514" font-size="15" font-weight="600" fill="#34507a">Verticaux build · CC-01 · CC-02 · CC-09</text>
    <text x="516" y="540" font-size="12" fill="#5a5a5a">Stacks propres, modèles hétérogènes via MCP.</text>
    <text x="516" y="560" font-size="12" fill="#5a5a5a">Leurs MCP &amp; harness d'éval déjà buildés.</text>
    <text x="516" y="586" class="mono" font-size="11" fill="#3d5a82">versés au catalogue + éval-as-a-service</text>
  </g>
  <!-- Plateforme 3 : shadow onboardé -->
  <g>
    <rect x="896" y="486" width="360" height="118" fill="#fbf2f2" stroke="#a83232" stroke-width="1.5" stroke-dasharray="6 4" rx="10"/>
    <text x="914" y="514" font-size="15" font-weight="600" fill="#8a2727">Shadow — onboardé</text>
    <text x="914" y="540" font-size="12" fill="#5a5a5a">≈ 12 agents grand public, ramenés au cadre.</text>
    <text x="914" y="560" font-size="12" fill="#5a5a5a">Amnistie + tiering, pas la chasse.</text>
    <text x="914" y="586" class="mono" font-size="11" fill="#a83232">convertir la sprawl en flotte</text>
  </g>

  <text x="80" y="638" font-size="14" font-style="italic" fill="#226a6a">Le socle <tspan font-weight="600" font-style="normal">fédère</tspan> les plateformes — il ne <tspan font-weight="600" font-style="normal">centralise pas</tspan> l'exécution. Chaque agent garde son owner métier et tourne là où il est né.</text>

  <!-- ═════ MODÈLE OPÉRATOIRE RACI ═════ -->
  <text x="80" y="692" class="mono" font-size="13" font-weight="700" letter-spacing="0.12" fill="#b8582e">MODÈLE OPÉRATOIRE FÉDÉRÉ (hub-and-spoke) — RACI</text>

  <!-- RACI 1 -->
  <g>
    <rect x="80" y="712" width="285" height="150" fill="#ffffff" stroke="#c5b9a3" rx="8"/>
    <rect x="80" y="712" width="285" height="30" fill="#2e7a7a" rx="8"/>
    <rect x="80" y="728" width="285" height="14" fill="#2e7a7a"/>
    <text x="96" y="733" font-size="13" font-weight="700" fill="#ffffff">Plateforme / CoE</text>
    <text x="96" y="768" font-size="12" fill="#5a5a5a">DSI + sécu + data</text>
    <text x="96" y="794" font-size="12">Le socle, les standards,</text>
    <text x="96" y="812" font-size="12">l'admission au registre,</text>
    <text x="96" y="830" font-size="12">les garde-fous transverses,</text>
    <text x="96" y="848" font-size="12">l'éval-as-a-service.</text>
  </g>
  <!-- RACI 2 -->
  <g>
    <rect x="377" y="712" width="285" height="150" fill="#ffffff" stroke="#c5b9a3" rx="8"/>
    <rect x="377" y="712" width="285" height="30" fill="#b8582e" rx="8"/>
    <rect x="377" y="728" width="285" height="14" fill="#b8582e"/>
    <text x="393" y="733" font-size="13" font-weight="700" fill="#ffffff">Métier · agent product owner</text>
    <text x="393" y="768" font-size="12" fill="#5a5a5a">une direction porteuse</text>
    <text x="393" y="794" font-size="12">La finalité, le contenu,</text>
    <text x="393" y="812" font-size="12">l'éval métier,</text>
    <text x="393" y="830" font-size="12" font-weight="600">le ROI de SON agent.</text>
  </g>
  <!-- RACI 3 -->
  <g>
    <rect x="674" y="712" width="285" height="150" fill="#ffffff" stroke="#c5b9a3" rx="8"/>
    <rect x="674" y="712" width="285" height="30" fill="#8a6500" rx="8"/>
    <rect x="674" y="728" width="285" height="14" fill="#8a6500"/>
    <text x="690" y="733" font-size="13" font-weight="700" fill="#ffffff">Sécu / DPO</text>
    <text x="690" y="768" font-size="12" fill="#5a5a5a">garde-fou de la conformité</text>
    <text x="690" y="794" font-size="12">Revue des accès écriture</text>
    <text x="690" y="812" font-size="12">&amp; données sensibles,</text>
    <text x="690" y="830" font-size="12">gate de mise en prod,</text>
    <text x="690" y="848" font-size="12">statut AI Act par agent.</text>
  </g>
  <!-- RACI 4 -->
  <g>
    <rect x="971" y="712" width="285" height="150" fill="#ffffff" stroke="#c5b9a3" rx="8"/>
    <rect x="971" y="712" width="285" height="30" fill="#a83232" rx="8"/>
    <rect x="971" y="728" width="285" height="14" fill="#a83232"/>
    <text x="987" y="733" font-size="13" font-weight="700" fill="#ffffff">Comité de portefeuille · trim.</text>
    <text x="987" y="768" font-size="12" fill="#5a5a5a">arbitre au plus haut</text>
    <text x="987" y="794" font-size="12">Admission,</text>
    <text x="987" y="812" font-size="12" font-weight="600">dé-commissionnement,</text>
    <text x="987" y="830" font-size="12">arbitrage des doublons,</text>
    <text x="987" y="848" font-size="12">priorisation.</text>
  </g>

  <!-- ═════ PANNEAU PRINCIPE (droite) ═════ -->
  <rect x="1300" y="130" width="240" height="474" fill="#fff8e8" stroke="#d4a000" stroke-width="1.8" rx="12"/>
  <text x="1318" y="160" class="mono" font-size="13" font-weight="700" letter-spacing="0.12" fill="#8a6500">LE PRINCIPE</text>

  <text x="1318" y="196" font-size="15" font-weight="600" fill="#b8582e">Paved road</text>
  <text x="1318" y="220" font-size="13" fill="#1a1a1a">Rendre la voie</text>
  <text x="1318" y="238" font-size="13" fill="#1a1a1a">conforme la plus</text>
  <text x="1318" y="256" font-size="13" fill="#1a1a1a">facile à emprunter —</text>
  <text x="1318" y="274" font-size="13" font-style="italic" fill="#5a5a5a">plus facile que le</text>
  <text x="1318" y="292" font-size="13" font-style="italic" fill="#5a5a5a">shadow.</text>

  <line x1="1318" y1="316" x2="1522" y2="316" stroke="#d4a000" stroke-width="1"/>

  <text x="1318" y="346" font-size="15" font-weight="600" fill="#226a6a">Fédère ≠ centralise</text>
  <text x="1318" y="370" font-size="13" fill="#1a1a1a">Le socle chapeaute</text>
  <text x="1318" y="388" font-size="13" fill="#1a1a1a">les plateformes ;</text>
  <text x="1318" y="406" font-size="13" fill="#1a1a1a">l'exécution reste</text>
  <text x="1318" y="424" font-size="13" fill="#1a1a1a">chez les métiers.</text>

  <line x1="1318" y1="448" x2="1522" y2="448" stroke="#d4a000" stroke-width="1"/>

  <text x="1318" y="478" font-size="15" font-weight="600" fill="#1a1a1a">Crossover du socle</text>
  <text x="1318" y="506" class="mono" font-size="15" font-weight="600" fill="#b8582e">≈ 10–15 agents</text>
  <text x="1318" y="532" font-size="13" fill="#5a5a5a">En dessous : pas de</text>
  <text x="1318" y="550" font-size="13" fill="#5a5a5a">socle lourd. Au-delà :</text>
  <text x="1318" y="568" font-size="13" fill="#5a5a5a">la mutualisation</text>
  <text x="1318" y="586" font-size="13" fill="#5a5a5a">l'amortit.</text>

  <!-- ═════ RENVOI fig-02 ═════ -->
  <text x="1300" y="700" font-size="14" font-weight="700" fill="#2e7a7a">→ fig-02 : la gouvernance</text>
  <text x="1300" y="722" font-size="14" fill="#5a5a5a">proportionnée — tiering par</text>
  <text x="1300" y="740" font-size="14" fill="#5a5a5a">le risque + cycle de vie agent.</text>

  <!-- Règle d'or -->
  <rect x="1300" y="772" width="240" height="90" fill="#f4efe2" stroke="#c5b9a3" rx="8"/>
  <text x="1318" y="798" class="mono" font-size="11" font-weight="700" letter-spacing="0.1" fill="#5a5a5a">RÈGLE D'OR</text>
  <text x="1318" y="822" font-size="12.5" fill="#1a1a1a">Tout agent a un owner</text>
  <text x="1318" y="840" font-size="12.5" fill="#1a1a1a">métier + une fiche au</text>
  <text x="1318" y="858" font-size="12.5" font-weight="600" fill="#a83232">registre — sinon éteint.</text>

  <!-- ═════ SOURCE + LÉGENDE ═════ -->
  <text x="60" y="905" font-size="13" font-style="italic" fill="#8a8a8a">
    Le socle « AgentOps » : six services partagés qui fédèrent Copilot natif + verticaux build + shadow onboardé, sans centraliser l'exécution.
  </text>
  <line x1="60" y1="920" x2="1540" y2="920" stroke="#c5b9a3" stroke-width="1"/>
  <g>
    <text x="60" y="946" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#5a5a5a">LÉGENDE</text>
    <rect x="178" y="936" width="14" height="14" fill="#eaf3f1" stroke="#2e7a7a" stroke-dasharray="3 2"/>
    <text x="200" y="947" font-size="12">Socle fédéré (CoE)</text>
    <rect x="378" y="936" width="14" height="14" fill="#f0f4ec" stroke="#7a9a5e"/>
    <text x="400" y="947" font-size="12">Copilot natif</text>
    <rect x="540" y="936" width="14" height="14" fill="#eef2f8" stroke="#6f8db4"/>
    <text x="562" y="947" font-size="12">Verticaux build</text>
    <rect x="710" y="936" width="14" height="14" fill="#fbf2f2" stroke="#a83232" stroke-dasharray="3 2"/>
    <text x="732" y="947" font-size="12">Shadow onboardé</text>
    <line x1="900" y1="943" x2="938" y2="943" stroke="#2e7a7a" stroke-width="2" marker-end="url(#arrowFed)"/>
    <text x="952" y="947" font-size="12">fédère (ne centralise pas)</text>
  </g>
</svg>
