  <text x="320" y="486" font-size="13" font-style="italic" fill="#4d6635">Gouvernance native (Purview / Entra Agent ID) — mais limitée à l'écosystème Microsoft : ne voit ni le build ni le shadow.</text>
  <text x="320" y="508" class="mono" font-size="12" font-weight="600" fill="#2e7a7a">● actif ≈ 40 %</text>
  <text x="470" y="508" class="mono" font-size="12" font-weight="600" fill="#7a7a7a">○ zombie ≈ 60 % (déployés, jamais utilisés)</text>

  <!-- ═════ ZONE BUILD MAISON VERTICAUX ═════ -->
  <rect x="300" y="560" width="560" height="420" fill="#eef2f8" stroke="#6f8db4" stroke-width="1.4" stroke-dasharray="8 4" rx="14"/>
