  <text x="918" y="894" font-size="13" font-weight="600" fill="#a83232">→ amnistie + onboarding au registre</text>

  <!-- ═════ PANNEAU ANGLES MORTS (droite) ═════ -->
  <rect x="1330" y="160" width="230" height="820" fill="#fff8e8" stroke="#d4a000" stroke-width="1.8" rx="12"/>
  <text x="1348" y="190" class="mono" font-size="13" font-weight="700" letter-spacing="0.12" fill="#8a6500">TROU DE</text>
  <text x="1348" y="210" class="mono" font-size="13" font-weight="700" letter-spacing="0.12" fill="#8a6500">GOUVERNANCE</text>
  <text x="1348" y="236" font-size="13" font-style="italic" fill="#5a5a5a">Le socle absent :</text>

  <g font-size="13" fill="#1a1a1a">
    <text x="1348" y="272" font-weight="600" fill="#a83232">✕ Pas de registre</text>
    <text x="1348" y="292">qui ? finalité ? owner ?</text>

    <text x="1348" y="328" font-weight="600" fill="#a83232">✕ Pas de gateway</text>
    <text x="1348" y="348">identité agent, scopes,</text>
    <text x="1348" y="366">accès écriture non revus</text>

    <text x="1348" y="402" font-weight="600" fill="#a83232">✕ Pas d'éval partagée</text>
    <text x="1348" y="422">prod sans gate, dérive</text>
    <text x="1348" y="440">non détectée</text>

    <text x="1348" y="476" font-weight="600" fill="#a83232">✕ Pas d'observabilité</text>
    <text x="1348" y="496">coût/agent ? usage réel ?</text>

    <text x="1348" y="532" font-weight="600" fill="#a83232">✕ Pas de garde-fous</text>
    <text x="1348" y="552">DLP / PII / injection</text>
    <text x="1348" y="570">en ordre dispersé</text>

    <text x="1348" y="606" font-weight="600" fill="#a83232">✕ Pas de catalogue</text>
    <text x="1348" y="626">MCP / prompts : chacun</text>
    <text x="1348" y="644">rebuild les mêmes briques</text>
  </g>

  <line x1="1348" y1="676" x2="1542" y2="676" stroke="#d4a000" stroke-width="1"/>
  <text x="1348" y="704" font-size="13" font-weight="600" fill="#8a6500">Conséquence :</text>
  <text x="1348" y="726" font-size="13" fill="#1a1a1a">la sprawl coûte plus</text>
  <text x="1348" y="744" font-size="13" fill="#1a1a1a">qu'elle ne rapporte.</text>
  <text x="1348" y="778" font-size="13" font-style="italic" fill="#5a5a5a">Le ROI n'est pas</text>
  <text x="1348" y="796" font-size="13" font-style="italic" fill="#5a5a5a">par agent — il est au</text>
  <text x="1348" y="814" font-size="13" font-style="italic" fill="#5a5a5a">niveau du portefeuille.</text>

  <line x1="1348" y1="846" x2="1542" y2="846" stroke="#d4a000" stroke-width="1"/>
  <text x="1348" y="874" font-size="13" font-weight="700" fill="#2e7a7a">→ fig-01 : le socle</text>
  <text x="1348" y="892" font-size="13" fill="#5a5a5a">fédéré (6 services)</text>
  <text x="1348" y="922" font-size="13" font-weight="700" fill="#2e7a7a">→ fig-02 : tiering</text>
  <text x="1348" y="940" font-size="13" fill="#5a5a5a">par le risque + cycle</text>
  <text x="1348" y="958" font-size="13" fill="#5a5a5a">de vie agent</text>

