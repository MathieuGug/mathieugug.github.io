  <text x="320" y="812" font-size="13" font-style="italic" fill="#3d5a82">Chacun rebuild ses MCP, son éval, ses garde-fous.</text>
  <text x="320" y="830" font-size="13" font-style="italic" fill="#3d5a82">Aucune mutualisation. Invisibles pour la gouvernance Copilot.</text>

  <!-- doublon : deux agents NDF (Copilot) + Trésorerie se chevauchent — flèche -->
  <text x="320" y="858" font-size="13" font-weight="600" fill="#a83232">⚠ Doublons : 7 abonnements agentiques en double ·</text>
  <text x="320" y="876" font-size="13" font-weight="600" fill="#a83232">2 agents donnent des réponses contradictoires (notes de frais).</text>
  <text x="320" y="902" font-size="13" font-weight="600" fill="#a83232">⚠ Accès écriture (SIRH, billing, finance) non revus par la sécu.</text>
  <text x="320" y="930" font-size="13" font-style="italic" fill="#5a5a5a">CC-01/02/09 ont déjà chacun leur socle partiel — personne</text>
  <text x="320" y="948" font-size="13" font-style="italic" fill="#5a5a5a">ne les a fédérés. C'est le gisement de mutualisation.</text>

