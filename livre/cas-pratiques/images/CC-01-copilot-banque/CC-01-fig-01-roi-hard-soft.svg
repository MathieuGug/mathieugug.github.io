<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <!-- background -->
  <rect width="1100" height="720" fill="#faf6ec"/>

  <!-- ═════ HEADER ═════ -->
  <text x="60" y="46" font-size="28" font-weight="600" letter-spacing="-0.5">
    Carte d'estimation Hard / Soft du copilot bancaire
  </text>
  <text x="60" y="82" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Le ROI Hard sans KPI gardien Soft cache le risque de pivot Vitesse → Hybride (ch.21.7.2).
  </text>

  <!-- ═════ COLUMN LABELS ═════ -->
  <text x="60" y="120" class="mono" font-size="12" font-weight="600" letter-spacing="0.16" fill="#5a5a5a">MÉTRIQUE · AXE</text>
  <text x="700" y="120" class="mono" font-size="12" font-weight="600" letter-spacing="0.16" fill="#5a5a5a">CATÉGORIE CIGREF (CH.21.5)</text>

  <!-- ═════ HARD CATEGORY (right) ═════ -->
  <rect x="700" y="140" width="340" height="200" fill="#f5e6dc" stroke="#b8582e" stroke-width="1.8" rx="8"/>
  <text x="720" y="172" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#b8582e">HARD</text>
  <text x="720" y="200" font-size="15" font-weight="600" fill="#b8582e">Chiffrable directement</text>
  <text x="720" y="222" font-size="13" fill="#7a3a1e">Preuve de réallocation possible :</text>
  <text x="720" y="240" font-size="13" fill="#7a3a1e">— minutes économisées × volume × coût</text>
  <text x="720" y="258" font-size="13" fill="#7a3a1e">— € de panier additionnel sur la base</text>
  <text x="720" y="286" font-size="13" fill="#7a3a1e" font-style="italic">Signable par le CFO au CODIR.</text>
  <text x="720" y="318" font-size="13" font-weight="600" fill="#b8582e">⚠ Hard isolé = piège ch.21.5.3</text>

  <!-- ═════ SOFT CATEGORY (right) ═════ -->
  <rect x="700" y="370" width="340" height="240" fill="#e8f0ef" stroke="#2e7a7a" stroke-width="1.8" rx="8"/>
  <text x="720" y="402" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#2e7a7a">SOFT</text>
  <text x="720" y="430" font-size="15" font-weight="600" fill="#2e7a7a">Convergence requise</text>
  <text x="720" y="452" font-size="13" fill="#1f5555">Au moins 3 indicateurs cohérents</text>
  <text x="720" y="470" font-size="13" fill="#1f5555">(ch.21.5.4) avant validation Soft.</text>
  <text x="720" y="498" font-size="13" font-weight="600" fill="#2e7a7a">★ GARDIEN consistency-rate</text>
  <text x="720" y="516" font-size="13" fill="#1f5555">déclenche le rollback automatique</text>
  <text x="720" y="534" font-size="13" fill="#1f5555">si dérive > 3 pts en 7 j roulants.</text>
  <text x="720" y="566" font-size="13" fill="#1f5555" font-style="italic">Sans gardien Soft, le pattern</text>
  <text x="720" y="584" font-size="13" fill="#1f5555" font-style="italic">fintech BNPL 2024 se reproduit</text>
  <text x="720" y="602" font-size="13" fill="#1f5555" font-style="italic">à 18 mois.</text>

  <!-- ═════ METRIC BOXES (left) ═════ -->

  <!-- Métrique 1 — processing-time → HARD -->
  <rect x="60" y="150" width="380" height="74" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.2" rx="6"/>
  <rect x="60" y="150" width="5" height="74" fill="#b8582e"/>
  <text x="82" y="176" font-size="15" font-weight="600">processing-time</text>
  <text x="82" y="198" font-size="13" fill="#5a5a5a">Axe Vitesse · cible −8 min/RDV</text>
  <text x="82" y="216" font-size="13" fill="#5a5a5a">Borne basse −3 min · borne haute −12 min</text>

  <!-- Métrique 2 — cost-per-contact → HARD -->
  <rect x="60" y="238" width="380" height="74" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.2" rx="6"/>
  <rect x="60" y="238" width="5" height="74" fill="#b8582e"/>
  <text x="82" y="264" font-size="15" font-weight="600">cost-per-contact</text>
  <text x="82" y="286" font-size="13" fill="#5a5a5a">Axe Coût · cible 85 € → 68 €</text>
  <text x="82" y="304" font-size="13" fill="#5a5a5a">Borne basse −8 € · borne haute −25 €</text>

  <!-- Métrique 3 — conversion-rate → HARD -->
  <rect x="60" y="326" width="380" height="74" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.2" rx="6"/>
  <rect x="60" y="326" width="5" height="74" fill="#b8582e"/>
  <text x="82" y="352" font-size="15" font-weight="600">conversion-rate</text>
  <text x="82" y="374" font-size="13" fill="#5a5a5a">Axe Volume · cible +1.5 pt</text>
  <text x="82" y="392" font-size="13" fill="#5a5a5a">Borne basse +0.5 pt · borne haute +3 pt</text>

  <!-- Métrique 4 — employee-engagement → SOFT -->
  <rect x="60" y="430" width="380" height="74" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.2" rx="6"/>
  <rect x="60" y="430" width="5" height="74" fill="#2e7a7a"/>
  <text x="82" y="456" font-size="15" font-weight="600">employee-engagement</text>
  <text x="82" y="478" font-size="13" fill="#5a5a5a">Axe Bien-être · cible +8 (eNPS)</text>
  <text x="82" y="496" font-size="13" fill="#5a5a5a">Borne basse +3 · borne haute +12</text>

  <!-- Métrique 5 — response-consistency (GARDIEN) → SOFT -->
  <rect x="60" y="518" width="380" height="86" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.8" rx="6" stroke-dasharray="6 3"/>
  <rect x="60" y="518" width="5" height="86" fill="#2e7a7a"/>
  <text x="82" y="544" font-size="15" font-weight="600">response-consistency</text>
  <text x="82" y="562" class="mono" font-size="11" font-weight="700" letter-spacing="0.18" fill="#2e7a7a">★ KPI GARDIEN — AJOUTÉ AU SETUP</text>
  <text x="82" y="582" font-size="13" fill="#5a5a5a">Axe Qualité · cible &gt; 95 % vs doctrine DDA</text>
  <text x="82" y="600" font-size="13" fill="#5a5a5a">Alerte &lt; 92 % · rollback automatique</text>

  <!-- ═════ ARROWS — Métriques → Catégories ═════ -->
  <!-- Arrow 1 : processing-time → HARD top -->
  <path d="M 442 187 C 540 187, 600 220, 692 220" fill="none" stroke="#b8582e" stroke-width="1.8"/>
  <polygon points="698,220 690,216 690,224" fill="#b8582e"/>

  <!-- Arrow 2 : cost-per-contact → HARD middle -->
  <path d="M 442 275 C 540 275, 600 240, 692 240" fill="none" stroke="#b8582e" stroke-width="1.8"/>
  <polygon points="698,240 690,236 690,244" fill="#b8582e"/>

  <!-- Arrow 3 : conversion-rate → HARD low -->
  <path d="M 442 363 C 540 363, 600 280, 692 280" fill="none" stroke="#b8582e" stroke-width="1.8"/>
  <polygon points="698,280 690,276 690,284" fill="#b8582e"/>

  <!-- Arrow 4 : employee-engagement → SOFT upper -->
  <path d="M 442 467 C 540 467, 600 440, 692 440" fill="none" stroke="#2e7a7a" stroke-width="1.8"/>
  <polygon points="698,440 690,436 690,444" fill="#2e7a7a"/>

  <!-- Arrow 5 : response-consistency → SOFT lower (dashed, gardien) -->
  <path d="M 442 561 C 540 561, 600 500, 692 500" fill="none" stroke="#2e7a7a" stroke-width="2" stroke-dasharray="6 3"/>
  <polygon points="698,500 690,496 690,504" fill="#2e7a7a"/>

  <!-- ═════ MIDDLE ANNOTATION ═════ -->
  <rect x="488" y="638" width="500" height="48" fill="#fbf2f2" stroke="#a83232" stroke-width="1" rx="5"/>
  <text x="500" y="660" font-size="13" font-weight="600" fill="#a83232">⚠ Sans le KPI gardien Soft (★), Hard isolé →</text>
  <text x="500" y="678" font-size="13" fill="#a83232">pivot Vitesse → Hybride à 18 mois (cf. ch.21.7.2).</text>

  <!-- ═════ Source line ═════ -->
  <text x="60" y="708" font-size="12" font-style="italic" fill="#8a8a8a">
    Lecture : 4 métriques retenues au pilote (3 Hard + 1 Soft) + 1 KPI gardien Soft ajouté pour activer la règle ch.21.5.4 de convergence.
  </text>
</svg>
