<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 940"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <rect width="1400" height="940" fill="#faf6ec"/>

  <!-- ═════ HEADER ═════ -->
  <text x="60" y="52" font-size="28" font-weight="600" letter-spacing="-0.5">
    Trois modes temporels — où le copilot intervient dans un RDV crédit conso
  </text>
  <text x="60" y="86" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Pré-RDV (5 min avant) · Pendant RDV (temps réel, side-panel) · Post-RDV (10 min après). Chaque mode mobilise un niveau d'autonomie différent.
  </text>

  <!-- ═════ MODE A — Préparation pré-RDV ═════ -->
  <g>
    <rect x="60" y="140" width="340" height="500" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.8" rx="10"/>
    <rect x="60" y="140" width="340" height="50" fill="#e8f0ef" rx="10"/>
    <rect x="60" y="180" width="340" height="10" fill="#e8f0ef"/>
    <text x="80" y="172" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#2e7a7a">MODE A · PRÉ-RDV</text>
    <text x="80" y="218" font-size="20" font-weight="600">5 minutes avant le RDV</text>
    <text x="80" y="242" font-size="13" fill="#5a5a5a">Déclenché par bouton « Briefer ce RDV »</text>
    <text x="80" y="260" font-size="13" fill="#5a5a5a">sur la fiche Salesforce.</text>

    <line x1="80" y1="268" x2="380" y2="268" stroke="#c5b9a3" stroke-width="0.8"/>

    <text x="80" y="298" font-size="14" font-weight="600">Quatre actions :</text>

    <text x="80" y="330" font-size="13" fill="#5a5a5a">▸ Brief client 360°</text>
    <text x="100" y="350" font-size="12" fill="#7a7a7a">situation patrimoniale · événements de vie</text>

    <text x="80" y="382" font-size="13" fill="#5a5a5a">▸ Trois opportunités cross-sell</text>
    <text x="100" y="402" font-size="12" fill="#7a7a7a">pré-filtrées DDA, rankées par pertinence</text>

    <text x="80" y="434" font-size="13" fill="#5a5a5a">▸ Trame d'entretien adaptée</text>
    <text x="100" y="454" font-size="12" fill="#7a7a7a">jeune actif ≠ sénior récurrent</text>

    <text x="80" y="486" font-size="13" fill="#5a5a5a">▸ Flags vigilance conformité</text>
    <text x="100" y="506" font-size="12" fill="#7a7a7a">DDA jeune · surendettement · plainte ouverte</text>

    <line x1="80" y1="540" x2="380" y2="540" stroke="#c5b9a3" stroke-width="0.8"/>

    <rect x="80" y="558" width="160" height="26" fill="#e8f0ef" stroke="#2e7a7a" rx="4"/>
    <text x="95" y="576" class="mono" font-size="11" font-weight="700" letter-spacing="0.1" fill="#2e7a7a">L1 SUGGEST</text>

    <text x="80" y="608" font-size="12" font-style="italic" fill="#5a5a5a">Activé en POC (8 sem.)</text>
    <text x="80" y="626" font-size="12" font-style="italic" fill="#5a5a5a">Aucune action automatique sur le SI.</text>
  </g>

  <!-- ═════ MODE B — Pendant le RDV ═════ -->
  <g>
    <rect x="440" y="140" width="520" height="500" fill="#ffffff" stroke="#b8582e" stroke-width="2.2" rx="10"/>
    <rect x="440" y="140" width="520" height="50" fill="#f5e6dc" rx="10"/>
    <rect x="440" y="180" width="520" height="10" fill="#f5e6dc"/>
    <text x="460" y="172" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#b8582e">MODE B · PENDANT LE RDV — SIDE-PANEL CRM</text>
    <text x="460" y="218" font-size="20" font-weight="600">0 → 47 min · temps réel</text>
    <text x="460" y="242" font-size="13" fill="#5a5a5a">Transcription Deepgram on-prem, sans enregistrement audio (RGPD).</text>

    <line x1="460" y1="268" x2="940" y2="268" stroke="#c5b9a3" stroke-width="0.8"/>

    <text x="460" y="298" font-size="14" font-weight="600">Trois sous-modes coexistent :</text>

    <!-- B.1 -->
    <rect x="460" y="316" width="480" height="76" fill="#fbf4ee" stroke="#d4a673" stroke-width="1" rx="6"/>
    <text x="478" y="338" class="mono" font-size="11" font-weight="700" fill="#b8582e">B.1 · Q&amp;A DOC TEMPS RÉEL</text>
    <text x="478" y="360" font-size="13" fill="#5a5a5a">« Quel taux pour crédit travaux vert chez professions libérales ? »</text>
    <text x="478" y="380" font-size="12" font-style="italic" fill="#7a7a7a">Réponse en 4-6 sec avec source citée · interroge SharePoint + Documentum</text>

    <!-- B.2 -->
    <rect x="460" y="402" width="480" height="76" fill="#fbf4ee" stroke="#d4a673" stroke-width="1" rx="6"/>
    <text x="478" y="424" class="mono" font-size="11" font-weight="700" fill="#b8582e">B.2 · SUGGESTION PRODUIT CONTEXTUELLE</text>
    <text x="478" y="446" font-size="13" fill="#5a5a5a">Détecte mention de projet → offre éligible + 3 arguments + flag DDA</text>
    <text x="478" y="466" font-size="12" font-style="italic" fill="#7a7a7a">Multi-step Listen→Retrieve→Reason→Propose→Audit · cf. fig-03</text>

    <!-- B.3 -->
    <rect x="460" y="488" width="480" height="76" fill="#fbf4ee" stroke="#d4a673" stroke-width="1" rx="6"/>
    <text x="478" y="510" class="mono" font-size="11" font-weight="700" fill="#b8582e">B.3 · PRÉ-REMPLISSAGE FORMULAIRE</text>
    <text x="478" y="532" font-size="13" fill="#5a5a5a">Remplit en silence les champs de souscription Salesforce</text>
    <text x="478" y="552" font-size="12" font-style="italic" fill="#7a7a7a">Validation 1-clic à la fin du RDV par le conseiller</text>

    <rect x="460" y="588" width="200" height="26" fill="#f5e6dc" stroke="#b8582e" rx="4"/>
    <text x="475" y="606" class="mono" font-size="11" font-weight="700" letter-spacing="0.1" fill="#b8582e">L2 PRÉ-REMPLIR</text>
    <text x="676" y="606" font-size="12" font-style="italic" fill="#5a5a5a">Activé en Pilote (mois 4-9)</text>
  </g>

  <!-- ═════ MODE C — Post-RDV ═════ -->
  <g>
    <rect x="1000" y="140" width="340" height="500" fill="#ffffff" stroke="#5a5a5a" stroke-width="1.8" rx="10"/>
    <rect x="1000" y="140" width="340" height="50" fill="#ededed" rx="10"/>
    <rect x="1000" y="180" width="340" height="10" fill="#ededed"/>
    <text x="1020" y="172" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#3a3a3a">MODE C · POST-RDV</text>
    <text x="1020" y="218" font-size="20" font-weight="600">10 min après la fin</text>
    <text x="1020" y="242" font-size="13" fill="#5a5a5a">Génère la trace + déclenche les actions automatiques.</text>

    <line x1="1020" y1="268" x2="1320" y2="268" stroke="#c5b9a3" stroke-width="0.8"/>

    <text x="1020" y="298" font-size="14" font-weight="600">Quatre actions :</text>

    <text x="1020" y="330" font-size="13" fill="#5a5a5a">▸ Compte-rendu structuré</text>
    <text x="1040" y="350" font-size="12" fill="#7a7a7a">résumé · décisions · actions relance datées</text>

    <text x="1020" y="382" font-size="13" fill="#5a5a5a">▸ Ticket ServiceNow auto</text>
    <text x="1040" y="402" font-size="12" fill="#7a7a7a">si pièces manquantes · relance préformulée</text>

    <text x="1020" y="434" font-size="13" fill="#5a5a5a">▸ Maj fiche Salesforce</text>
    <text x="1040" y="454" font-size="12" fill="#7a7a7a">tags d'intérêt · prochaine action recommandée</text>

    <text x="1020" y="486" font-size="13" fill="#5a5a5a">▸ Audit trail conformité</text>
    <text x="1040" y="506" font-size="12" fill="#7a7a7a">bucket S3, rétention 6 ans (DDA)</text>

    <line x1="1020" y1="540" x2="1320" y2="540" stroke="#c5b9a3" stroke-width="0.8"/>

    <rect x="1020" y="558" width="260" height="26" fill="#ededed" stroke="#5a5a5a" rx="4"/>
    <text x="1035" y="576" class="mono" font-size="11" font-weight="700" letter-spacing="0.1" fill="#3a3a3a">L3 EXÉCUTER SOUS VALIDATION</text>

    <text x="1020" y="608" font-size="12" font-style="italic" fill="#5a5a5a">Activé en Prod (mois 10-22)</text>
    <text x="1020" y="626" font-size="12" font-style="italic" fill="#5a5a5a">Chaque action exposée + validée 1-clic.</text>
  </g>

  <!-- ═════ TIMELINE BAR ═════ -->
  <line x1="100" y1="700" x2="1340" y2="700" stroke="#3a3a3a" stroke-width="2"/>

  <!-- markers -->
  <circle cx="230" cy="700" r="6" fill="#2e7a7a" stroke="#ffffff" stroke-width="2"/>
  <text x="230" y="734" font-size="12" font-weight="600" fill="#2e7a7a" text-anchor="middle">−5 min</text>

  <circle cx="500" cy="700" r="6" fill="#1a1a1a" stroke="#ffffff" stroke-width="2"/>
  <text x="500" y="734" font-size="12" font-weight="600" text-anchor="middle">Début RDV (0)</text>

  <circle cx="950" cy="700" r="6" fill="#1a1a1a" stroke="#ffffff" stroke-width="2"/>
  <text x="950" y="734" font-size="12" font-weight="600" text-anchor="middle">Fin RDV (+47 min)</text>

  <circle cx="1200" cy="700" r="6" fill="#3a3a3a" stroke="#ffffff" stroke-width="2"/>
  <text x="1200" y="734" font-size="12" font-weight="600" fill="#3a3a3a" text-anchor="middle">+57 min</text>

  <!-- ═════ LÉGENDE NIVEAUX AUTONOMIE ═════ -->
  <line x1="60" y1="780" x2="1340" y2="780" stroke="#c5b9a3" stroke-width="0.8"/>
  <text x="60" y="808" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#5a5a5a">NIVEAUX D'AUTONOMIE (PROGRESSIFS)</text>

  <!-- Row 1 — L1 / L2 -->
  <rect x="60" y="820" width="22" height="22" fill="#e8f0ef" stroke="#2e7a7a"/>
  <text x="92" y="836" font-size="12" fill="#1a1a1a"><tspan font-weight="600">L1 Suggest</tspan> — copier-coller manuel (POC)</text>

  <rect x="720" y="820" width="22" height="22" fill="#f5e6dc" stroke="#b8582e"/>
  <text x="752" y="836" font-size="12" fill="#1a1a1a"><tspan font-weight="600">L2 Pré-remplir</tspan> — validation globale 1-clic (Pilote)</text>

  <!-- Row 2 — L3 / L4 -->
  <rect x="60" y="858" width="22" height="22" fill="#ededed" stroke="#5a5a5a"/>
  <text x="92" y="874" font-size="12" fill="#1a1a1a"><tspan font-weight="600">L3 Exécuter sous validation</tspan> — chaque action 1-clic (Prod)</text>

  <rect x="720" y="858" width="22" height="22" fill="#f4dcdc" stroke="#a83232"/>
  <text x="752" y="874" font-size="12" fill="#a83232"><tspan font-weight="600">L4 Pleine autonomie</tspan> — INTERDIT (DDA + AI Act §5)</text>

  <text x="60" y="918" font-size="11" font-style="italic" fill="#8a8a8a">L'autonomie progresse phase par phase. L4 reste hors champ : la supervision humaine effective est obligation réglementaire.</text>
</svg>
