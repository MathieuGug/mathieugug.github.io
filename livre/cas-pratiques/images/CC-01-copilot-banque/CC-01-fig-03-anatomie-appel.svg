<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 950"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <rect width="1600" height="950" fill="#faf6ec"/>

  <!-- ═════ HEADER ═════ -->
  <text x="60" y="52" font-size="28" font-weight="600" letter-spacing="-0.5">
    Anatomie d'un appel — Listen · Retrieve · Reason · Propose · Audit
  </text>
  <text x="60" y="86" class="display" font-size="18" font-style="italic" fill="#5a5a5a">
    Mode B.2 (suggestion produit pendant le RDV). Moins de 2 secondes du dit à la carte affichée — c'est le test de vérité du copilot.
  </text>

  <!-- ═════ SCENARIO BAR ═════ -->
  <rect x="60" y="112" width="1480" height="48" fill="#fbf4ee" stroke="#d4a673" stroke-width="1.2" rx="6"/>
  <text x="80" y="138" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#b8582e">SCÉNARIO</text>
  <text x="180" y="142" font-size="15" font-style="italic" fill="#5a5a5a">
    « Le client veut faire des travaux d'isolation, il pense emprunter 18 000 € sur 7 ans. »
  </text>

  <!-- ═════ STEP 1 — LISTEN ═════ -->
  <g>
    <rect x="60" y="200" width="160" height="500" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.6" rx="8"/>
    <rect x="60" y="200" width="160" height="50" fill="#eef2f8" rx="8"/>
    <rect x="60" y="240" width="160" height="10" fill="#eef2f8"/>
    <text x="78" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#3d5a82">1 · LISTEN</text>

    <text x="78" y="276" font-size="13" font-weight="600" fill="#3d5a82">Latence ≈ 200 ms</text>

    <line x1="78" y1="298" x2="202" y2="298" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="78" y="324" font-size="14" font-weight="600">Deepgram</text>
    <text x="78" y="344" font-size="13" fill="#5a5a5a">on-prem · streaming FR</text>

    <text x="78" y="378" font-size="13" fill="#5a5a5a">Transcription temps</text>
    <text x="78" y="396" font-size="13" fill="#5a5a5a">réel avec ponctuation.</text>

    <text x="78" y="430" font-size="13" fill="#5a5a5a">Buffer rolling, pas</text>
    <text x="78" y="448" font-size="13" fill="#5a5a5a">d'enregistrement audio</text>
    <text x="78" y="466" font-size="13" fill="#5a5a5a">persistant (RGPD).</text>

    <line x1="78" y1="500" x2="202" y2="500" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="78" y="528" class="mono" font-size="11" font-weight="700" letter-spacing="0.15" fill="#5a5a5a">SORTIE</text>
    <text x="78" y="552" font-size="12" font-style="italic" fill="#5a5a5a">Texte structuré dans</text>
    <text x="78" y="570" font-size="12" font-style="italic" fill="#5a5a5a">buffer rolling.</text>
  </g>

  <!-- arrow 1 → 2 -->
  <path d="M 232 450 L 272 450" stroke="#3a3a3a" stroke-width="2.2" fill="none"/>
  <polygon points="280,450 270,445 270,455" fill="#3a3a3a"/>

  <!-- ═════ STEP 2 — RETRIEVE ═════ -->
  <g>
    <rect x="284" y="200" width="360" height="500" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.6" rx="8"/>
    <rect x="284" y="200" width="360" height="50" fill="#eef2f8" rx="8"/>
    <rect x="284" y="240" width="360" height="10" fill="#eef2f8"/>
    <text x="302" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#3d5a82">2 · RETRIEVE</text>

    <text x="302" y="276" font-size="13" font-weight="600" fill="#3d5a82">Latence ≈ 1.2 s · 5 appels MCP en parallèle</text>

    <line x1="302" y1="298" x2="626" y2="298" stroke="#c5b9a3" stroke-width="0.6"/>

    <!-- 5 MCP calls as visual fan -->
    <rect x="302" y="316" width="324" height="36" fill="#fbfbfb" stroke="#c5b9a3" stroke-width="0.8" rx="4"/>
    <text x="316" y="332" class="mono" font-size="11" font-weight="600" fill="#3d5a82">salesforce-mcp</text>
    <text x="316" y="346" font-size="11" fill="#7a7a7a">get_client_360(client_id)</text>

    <rect x="302" y="360" width="324" height="36" fill="#fbfbfb" stroke="#c5b9a3" stroke-width="0.8" rx="4"/>
    <text x="316" y="376" class="mono" font-size="11" font-weight="600" fill="#3d5a82">snowflake-mcp</text>
    <text x="316" y="390" font-size="11" fill="#7a7a7a">get_credit_history(client_id, 24m)</text>

    <rect x="302" y="404" width="324" height="36" fill="#fbfbfb" stroke="#c5b9a3" stroke-width="0.8" rx="4"/>
    <text x="316" y="420" class="mono" font-size="11" font-weight="600" fill="#3d5a82">pega-mcp</text>
    <text x="316" y="434" font-size="11" fill="#7a7a7a">score_credit_conso(18000, 84)</text>

    <rect x="302" y="448" width="324" height="36" fill="#fbfbfb" stroke="#c5b9a3" stroke-width="0.8" rx="4"/>
    <text x="316" y="464" class="mono" font-size="11" font-weight="600" fill="#3d5a82">sharepoint-mcp</text>
    <text x="316" y="478" font-size="11" fill="#7a7a7a">search_offers("travaux_vert")</text>

    <rect x="302" y="492" width="324" height="38" fill="#fff8e8" stroke="#d4a000" stroke-width="1.2" stroke-dasharray="4 2" rx="4"/>
    <text x="316" y="509" class="mono" font-size="11" font-weight="700" fill="#8a6500">documentum-mcp ★ sclérosant</text>
    <text x="316" y="523" font-size="11" fill="#8a6500">search_dda(persona, risk)</text>

    <line x1="302" y1="556" x2="626" y2="556" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="302" y="582" class="mono" font-size="11" font-weight="700" letter-spacing="0.15" fill="#5a5a5a">SORTIE</text>
    <text x="302" y="604" font-size="12" font-style="italic" fill="#5a5a5a">Contexte client complet :</text>
    <text x="302" y="622" font-size="12" font-style="italic" fill="#5a5a5a">profil, DTI, score Pega, catalogue</text>
    <text x="302" y="640" font-size="12" font-style="italic" fill="#5a5a5a">offres éligibles, doctrine DDA.</text>
  </g>

  <!-- arrow 2 → 3 -->
  <path d="M 656 450 L 696 450" stroke="#3a3a3a" stroke-width="2.2" fill="none"/>
  <polygon points="704,450 694,445 694,455" fill="#3a3a3a"/>

  <!-- ═════ STEP 3 — REASON ═════ -->
  <g>
    <rect x="708" y="200" width="300" height="500" fill="#ffffff" stroke="#b8582e" stroke-width="2" rx="8"/>
    <rect x="708" y="200" width="300" height="50" fill="#f5e6dc" rx="8"/>
    <rect x="708" y="240" width="300" height="10" fill="#f5e6dc"/>
    <text x="726" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#b8582e">3 · REASON</text>

    <text x="726" y="276" font-size="13" font-weight="600" fill="#b8582e">Claude 4.7 Sonnet · Bedrock EU</text>

    <line x1="726" y1="298" x2="990" y2="298" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="726" y="324" font-size="14" font-weight="600">Chain-of-thought structurée :</text>

    <text x="726" y="356" font-size="13" fill="#5a5a5a">▸ DTI projeté <tspan font-weight="700" fill="#1a1a1a">32 %</tspan></text>
    <text x="746" y="376" font-size="12" fill="#7a7a7a">sous seuil banque 35 % ✓</text>

    <text x="726" y="408" font-size="13" fill="#5a5a5a">▸ Éligible Crédit Travaux Vert</text>
    <text x="746" y="428" font-size="12" fill="#7a7a7a">bonification −1.2 pt TAEG</text>

    <text x="726" y="460" font-size="13" fill="#5a5a5a">▸ DDA jeune NA (client 41 ans)</text>
    <text x="726" y="492" font-size="13" fill="#5a5a5a">▸ Score Pega <tspan font-weight="700" fill="#1a1a1a">78/100</tspan> favorable</text>
    <text x="746" y="512" font-size="12" fill="#7a7a7a">pas d'incident historique</text>

    <line x1="726" y1="540" x2="990" y2="540" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="726" y="568" class="mono" font-size="11" font-weight="700" letter-spacing="0.15" fill="#b8582e">CONCLUSION</text>
    <text x="726" y="592" font-size="13" font-weight="600">Suggérer offre A</text>
    <text x="726" y="612" font-size="13" fill="#5a5a5a">+ flag opportunité B (assurance)</text>
    <text x="726" y="630" font-size="13" fill="#5a5a5a">+ check DDA explicite</text>

    <text x="726" y="666" font-size="11" font-style="italic" fill="#8a8a8a">Mobilise ch.7 (boucle agent) + ch.2 (modèles raisonnement).</text>
  </g>

  <!-- arrow 3 → 4 -->
  <path d="M 1020 450 L 1060 450" stroke="#3a3a3a" stroke-width="2.2" fill="none"/>
  <polygon points="1068,450 1058,445 1058,455" fill="#3a3a3a"/>

  <!-- ═════ STEP 4 — PROPOSE ═════ -->
  <g>
    <rect x="1072" y="200" width="280" height="500" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.6" rx="8"/>
    <rect x="1072" y="200" width="280" height="50" fill="#eef2f8" rx="8"/>
    <rect x="1072" y="240" width="280" height="10" fill="#eef2f8"/>
    <text x="1090" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#3d5a82">4 · PROPOSE</text>

    <text x="1090" y="276" font-size="13" font-weight="600" fill="#3d5a82">Render ≈ 200 ms · side-panel CRM</text>

    <line x1="1090" y1="298" x2="1334" y2="298" stroke="#c5b9a3" stroke-width="0.6"/>

    <!-- mini product card -->
    <rect x="1090" y="316" width="244" height="288" fill="#fffaf2" stroke="#b8582e" stroke-width="1.4" rx="6"/>
    <text x="1106" y="340" font-size="13" font-weight="700" fill="#b8582e">Crédit Travaux Vert</text>
    <text x="1106" y="358" font-size="12" fill="#5a5a5a">18 000 € / 84 mois</text>

    <line x1="1106" y1="372" x2="1318" y2="372" stroke="#e8d8c8" stroke-width="0.6"/>

    <text x="1106" y="394" font-size="12" fill="#5a5a5a">TAEG estimé <tspan font-weight="700" fill="#1a1a1a">2,9 %</tspan></text>
    <text x="1106" y="412" font-size="11" fill="#7a7a7a">−1,2 pt vs standard</text>

    <text x="1106" y="434" font-size="12" fill="#5a5a5a">Mensualité <tspan font-weight="700" fill="#1a1a1a">~234 €</tspan></text>
    <text x="1106" y="456" font-size="12" fill="#5a5a5a">DTI projeté <tspan font-weight="700" fill="#1a1a1a">32 %</tspan> ✓</text>
    <text x="1106" y="476" font-size="12" fill="#2e7a7a" font-weight="600">✓ DDA conforme (v2026-04)</text>

    <line x1="1106" y1="492" x2="1318" y2="492" stroke="#e8d8c8" stroke-width="0.6"/>

    <text x="1106" y="514" font-size="11" font-style="italic" fill="#5a5a5a">Performance énergétique</text>
    <text x="1106" y="530" font-size="11" font-style="italic" fill="#5a5a5a">→ bonification.</text>
    <text x="1106" y="548" font-size="11" font-style="italic" fill="#5a5a5a">Profil favorable.</text>

    <text x="1106" y="572" font-size="11" font-weight="600" fill="#b8582e">+ Cross-sell : Assurance Empr.</text>

    <rect x="1106" y="580" width="96" height="22" fill="#1a1a1a" rx="3"/>
    <text x="1154" y="596" class="mono" font-size="11" font-weight="700" style="fill:#ffffff" text-anchor="middle">Insérer</text>
    <rect x="1212" y="580" width="80" height="22" fill="none" stroke="#7a7a7a" stroke-width="1.2" rx="3"/>
    <text x="1252" y="596" class="mono" font-size="11" font-weight="600" style="fill:#7a7a7a" text-anchor="middle">Ignorer</text>

    <text x="1090" y="640" font-size="11" font-style="italic" fill="#8a8a8a">Conseiller décide en 1 clic — pas de rupture.</text>
  </g>

  <!-- arrow 4 → 5 -->
  <path d="M 1364 450 L 1404 450" stroke="#3a3a3a" stroke-width="2.2" fill="none"/>
  <polygon points="1412,450 1402,445 1402,455" fill="#3a3a3a"/>

  <!-- ═════ STEP 5 — AUDIT ═════ -->
  <g>
    <rect x="1416" y="200" width="160" height="500" fill="#ffffff" stroke="#c5b9a3" stroke-width="1.6" rx="8"/>
    <rect x="1416" y="200" width="160" height="50" fill="#eef2f8" rx="8"/>
    <rect x="1416" y="240" width="160" height="10" fill="#eef2f8"/>
    <text x="1434" y="232" class="mono" font-size="14" font-weight="700" letter-spacing="0.18" fill="#3d5a82">5 · AUDIT</text>

    <text x="1434" y="276" font-size="13" font-weight="600" fill="#3d5a82">Sync · bucket S3</text>

    <line x1="1434" y1="298" x2="1558" y2="298" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="1434" y="324" font-size="14" font-weight="600">Log structuré :</text>

    <text x="1434" y="354" font-size="12" fill="#5a5a5a">▸ Chain-of-thought</text>
    <text x="1434" y="376" font-size="12" fill="#5a5a5a">▸ Sources retrieve</text>
    <text x="1434" y="398" font-size="12" fill="#5a5a5a">▸ Décision conseiller</text>
    <text x="1434" y="420" font-size="12" fill="#5a5a5a">▸ Horodatage</text>

    <line x1="1434" y1="448" x2="1558" y2="448" stroke="#c5b9a3" stroke-width="0.6"/>

    <text x="1434" y="476" class="mono" font-size="11" font-weight="700" letter-spacing="0.1" fill="#5a5a5a">RÉTENTION</text>
    <text x="1434" y="498" font-size="13" font-weight="600">6 ans (DDA)</text>

    <text x="1434" y="528" font-size="12" fill="#5a5a5a">Accessible via</text>
    <text x="1434" y="546" font-size="12" fill="#5a5a5a">tableau RGPD</text>
    <text x="1434" y="564" font-size="12" fill="#5a5a5a">client sur demande.</text>

    <text x="1434" y="616" font-size="11" font-style="italic" fill="#8a8a8a">Mobilise ch.18</text>
    <text x="1434" y="634" font-size="11" font-style="italic" fill="#8a8a8a">(audit trail cognitif).</text>
  </g>

  <!-- ═════ TOTAL TIMING BAR ═════ -->
  <line x1="60" y1="750" x2="1576" y2="750" stroke="#1a1a1a" stroke-width="1.8"/>
  <text x="60" y="780" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#5a5a5a">TOTAL CUMULÉ</text>

  <text x="140" y="778" font-size="13" fill="#5a5a5a">≈ 200 ms</text>
  <text x="464" y="778" font-size="13" fill="#5a5a5a">+ 1 200 ms</text>
  <text x="858" y="778" font-size="13" fill="#5a5a5a">+ 400 ms</text>
  <text x="1212" y="778" font-size="13" fill="#5a5a5a">+ 200 ms</text>
  <text x="1496" y="778" font-size="13" fill="#5a5a5a">async</text>

  <rect x="60" y="800" width="1480" height="40" fill="#f5e6dc" stroke="#b8582e" stroke-width="1.2" rx="6"/>
  <text x="800" y="826" font-size="16" font-weight="600" fill="#b8582e" text-anchor="middle">
    Moins de 2 secondes du « 18 000 € sur 7 ans » prononcé à la carte affichée.
  </text>

  <text x="60" y="888" font-size="13" font-style="italic" fill="#5a5a5a">
    Cette fluidité fait la différence entre un copilot adopté et un copilot toléré. C'est aussi ce qui distingue un copilot 2026 d'un chatbot 2023 :
  </text>
  <text x="60" y="908" font-size="13" font-style="italic" fill="#5a5a5a">
    une vraie chaîne agentic (Listen → Retrieve parallèle → Reason chain-of-thought → Propose → Audit), pas du RAG one-shot.
  </text>
</svg>
