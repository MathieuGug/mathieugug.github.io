<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1130"
     font-family="Inter, system-ui, sans-serif" fill="#1a1a1a">
  <style>
    .display { font-family: 'Fraunces', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    text { fill: #1a1a1a; }
  </style>

  <!-- ═════ BACKGROUND ═════ -->
  <rect width="1600" height="1130" fill="#faf6ec"/>

  <!-- ═════ HEADER ═════ -->
  <text x="60" y="58" font-size="32" font-weight="600" letter-spacing="-0.5">
    Architecture SI actuelle — détection fraude temps réel, banque émettrice 2026
  </text>
  <text x="60" y="96" class="display" font-size="20" font-style="italic" fill="#5a5a5a">
    Un chemin chaud sous 50 ms, une boucle froide à J+30/J+90 : c'est ce décalage qui rend la dérive silencieuse.
  </text>

  <!-- ═════ ZONES ═════ -->
  <rect x="290" y="160" width="1270" height="310" fill="#fbf2f2" stroke="#b8582e" stroke-width="1.5" stroke-dasharray="8 4" rx="14"/>
  <text x="308" y="188" class="mono" font-size="13" font-weight="700" letter-spacing="0.16" fill="#b8582e">CHEMIN CHAUD — SCORING TEMPS RÉEL &lt; 50 ms</text>

  <rect x="290" y="600" width="1270" height="380" fill="#eef5f4" stroke="#2e7a7a" stroke-width="1.5" stroke-dasharray="8 4" rx="14"/>
  <text x="308" y="628" class="mono" font-size="13" font-weight="700" letter-spacing="0.16" fill="#2e7a7a">BOUCLE FROIDE — APPRENTISSAGE (vérité terrain J+30 / J+90)</text>

  <!-- ═════ TRANSACTION ENTRANTE (gauche) ═════ -->
  <g>
    <rect x="70" y="278" width="150" height="92" fill="#ffffff" stroke="#5a5a5a" stroke-width="1.6" rx="8"/>
    <rect x="70" y="278" width="150" height="22" fill="#efe9dc" rx="8"/>
    <text x="84" y="294" class="mono" font-size="10" font-weight="700" fill="#5a5a5a">CARTE CB</text>
    <text x="84" y="326" font-size="14" font-weight="600">Transaction</text>
    <text x="84" y="346" font-size="12" fill="#5a5a5a">1 240 € · 3 h 12</text>
    <text x="84" y="362" font-size="12" fill="#5a5a5a">device inconnu</text>
    <text x="78" y="394" font-size="12" fill="#5a5a5a">40 M / an · fraude ≈ 0,08 %</text>
  </g>

  <!-- ═════ CHEMIN CHAUD ═════ -->

  <!-- Switch autorisation -->
  <g>
    <rect x="320" y="235" width="240" height="175" fill="#fbf2f2" stroke="#a83232" stroke-width="2.0" rx="8"/>
    <text x="336" y="261" class="mono" font-size="11" font-weight="700" letter-spacing="0.12" fill="#a83232">CORE · MAINFRAME</text>
    <text x="336" y="289" font-size="17" font-weight="600">Switch autorisation</text>
    <text x="336" y="311" font-size="13" fill="#5a5a5a">Réseaux Visa / Mastercard</text>
    <text x="336" y="329" font-size="13" fill="#5a5a5a">Passe / bloque (règle métier)</text>
    <text x="336" y="356" font-size="13" font-style="italic" fill="#a83232">Le modèle score,</text>
    <text x="336" y="374" font-size="13" font-style="italic" fill="#a83232">il ne décide pas seul</text>
    <rect x="336" y="384" width="150" height="20" fill="#f4dcdc" stroke="#a83232" stroke-width="1.2" rx="3"/>
    <text x="346" y="399" class="mono" font-size="10" font-weight="700" fill="#a83232">PAS TOUCHE · &lt; 50 ms</text>
  </g>

  <!-- Feature store -->
  <g>
    <rect x="600" y="235" width="230" height="175" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.6" rx="8"/>
    <text x="616" y="261" class="mono" font-size="11" font-weight="600" letter-spacing="0.14" fill="#2e7a7a">DATA · TEMPS RÉEL</text>
    <text x="616" y="289" font-size="16" font-weight="600">Feature store</text>
    <text x="616" y="311" font-size="13" fill="#5a5a5a">Kafka + Feast / Tecton</text>
    <text x="616" y="329" font-size="13" fill="#5a5a5a">Vélocité · géoloc · device</text>
    <text x="616" y="347" font-size="13" fill="#5a5a5a">écart au comportement</text>
    <text x="616" y="374" font-size="12" font-style="italic" fill="#8a6500">skew online/offline = sclérosant</text>
    <rect x="616" y="384" width="68" height="20" fill="#e8f0ef" stroke="#2e7a7a" rx="3"/>
    <text x="626" y="399" class="mono" font-size="10" font-weight="700" fill="#2e7a7a">READ</text>
  </g>

  <!-- Scoring GBM+GNN — LE BUILD (accent) -->
  <g>
    <rect x="870" y="225" width="280" height="190" fill="#ffffff" stroke="#b8582e" stroke-width="2.2" rx="8"/>
    <text x="886" y="251" class="mono" font-size="11" font-weight="700" letter-spacing="0.12" fill="#b8582e">LE BUILD · SELF-HOSTED</text>
    <text x="886" y="279" font-size="18" font-weight="600">Scoring ML</text>
    <text x="886" y="301" font-size="13" fill="#5a5a5a">GBM (&lt; 20 ms) — chemin chaud</text>
    <text x="886" y="319" font-size="13" fill="#5a5a5a">GNN : réseaux d'entités liées</text>
    <text x="886" y="337" font-size="13" fill="#5a5a5a">SHAP : explicable (analystes)</text>
    <text x="886" y="364" font-size="13" font-weight="600" fill="#b8582e">★ Pas de LLM dans le</text>
    <text x="886" y="382" font-size="13" font-weight="600" fill="#b8582e">chemin chaud (commodité)</text>
    <rect x="1040" y="237" width="96" height="22" fill="#f5e6dc" stroke="#b8582e" rx="3"/>
    <text x="1050" y="252" class="mono" font-size="10" font-weight="700" fill="#b8582e">R+W score</text>
  </g>

  <!-- Décision règle métier -->
  <g>
    <rect x="1190" y="235" width="350" height="175" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.6" rx="8"/>
    <text x="1206" y="261" class="mono" font-size="11" font-weight="600" letter-spacing="0.14" fill="#5a5a5a">RÈGLE MÉTIER</text>
    <text x="1206" y="289" font-size="17" font-weight="600">Décision</text>
    <!-- trois issues -->
    <rect x="1206" y="304" width="100" height="26" fill="#e8f0ef" stroke="#2e7a7a" rx="4"/>
    <text x="1216" y="322" font-size="12" font-weight="600" fill="#2e7a7a">✓ Passer</text>
    <rect x="1316" y="304" width="148" height="26" fill="#fff8e8" stroke="#d4a000" rx="4"/>
    <text x="1326" y="322" font-size="12" font-weight="600" fill="#8a6500">⟳ Challenger 3-DS</text>
    <rect x="1206" y="338" width="200" height="26" fill="#f4dcdc" stroke="#a83232" rx="4"/>
    <text x="1216" y="356" font-size="12" font-weight="600" fill="#a83232">✕ Bloquer (réversible)</text>
    <text x="1206" y="390" font-size="12" font-style="italic" fill="#5a5a5a">RGPD Art. 22 : voie de contestation humaine obligatoire</text>
  </g>

  <!-- ═════ BOUCLE FROIDE ═════ -->

  <!-- Console analyste (droite) -->
  <g>
    <rect x="1280" y="655" width="260" height="155" fill="#ffffff" stroke="#b8582e" stroke-width="1.8" rx="8"/>
    <text x="1296" y="681" class="mono" font-size="11" font-weight="600" letter-spacing="0.14" fill="#b8582e">BACK-OFFICE · ANALYSTES</text>
    <text x="1296" y="709" font-size="16" font-weight="600">Console fraude</text>
    <text x="1296" y="731" font-size="13" fill="#5a5a5a">Alertes priorisées</text>
    <text x="1296" y="749" font-size="13" fill="#5a5a5a">(score × montant × graphe)</text>
    <text x="1296" y="767" font-size="13" fill="#5a5a5a">SHAP + graphe d'entités</text>
    <text x="1296" y="789" font-size="13" font-weight="600" fill="#1a1a1a">Qualification → labels</text>
    <rect x="1452" y="665" width="78" height="20" fill="#f5e6dc" stroke="#b8582e" rx="3"/>
    <text x="1462" y="680" class="mono" font-size="10" font-weight="700" fill="#b8582e">R+W</text>
  </g>

  <!-- Labels retardés — GOLD (vérité terrain) -->
  <g>
    <rect x="950" y="655" width="290" height="155" fill="#fff8e8" stroke="#d4a000" stroke-width="2.2" rx="8"/>
    <text x="966" y="681" class="mono" font-size="11" font-weight="700" letter-spacing="0.12" fill="#8a6500">VÉRITÉ TERRAIN · RETARDÉE</text>
    <text x="966" y="709" font-size="17" font-weight="600">Labels (chargeback)</text>
    <text x="966" y="733" font-size="14" font-weight="600" fill="#8a6500">Reviennent à J+30 / J+90</text>
    <text x="966" y="757" font-size="13" fill="#1a1a1a">⚠ décalage = dérive silencieuse</text>
    <text x="966" y="779" font-size="13" fill="#5a5a5a">on pilote sur des proxies :</text>
    <text x="966" y="797" font-size="13" fill="#5a5a5a">PSI features · taux de challenge</text>
  </g>

  <!-- Datalake + MLflow -->
  <g>
    <rect x="600" y="655" width="300" height="155" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.6" rx="8"/>
    <text x="616" y="681" class="mono" font-size="11" font-weight="600" letter-spacing="0.14" fill="#2e7a7a">DATA · ENTRAÎNEMENT</text>
    <text x="616" y="709" font-size="16" font-weight="600">Datalake + MLflow</text>
    <text x="616" y="731" font-size="13" fill="#5a5a5a">Ré-entraînement challenger</text>
    <text x="616" y="749" font-size="13" fill="#5a5a5a">hebdo → quotidien (attaque)</text>
    <text x="616" y="767" font-size="13" fill="#5a5a5a">registre · rollback en minutes</text>
    <text x="616" y="789" font-size="12" font-style="italic" fill="#2e7a7a">holdout TEMPOREL (anti-leakage)</text>
    <rect x="806" y="665" width="78" height="20" fill="#e8f0ef" stroke="#2e7a7a" rx="3"/>
    <text x="816" y="680" class="mono" font-size="10" font-weight="700" fill="#2e7a7a">READ</text>
  </g>

  <!-- Champion / Challenger -->
  <g>
    <rect x="320" y="655" width="230" height="155" fill="#ffffff" stroke="#2e7a7a" stroke-width="1.8" rx="8"/>
    <text x="336" y="681" class="mono" font-size="11" font-weight="700" letter-spacing="0.12" fill="#2e7a7a">ÉVALUATION CONTINUE</text>
    <text x="336" y="709" font-size="16" font-weight="600">Champion /</text>
    <text x="336" y="729" font-size="16" font-weight="600">Challenger</text>
    <text x="336" y="751" font-size="13" fill="#5a5a5a">Shadow permanent</text>
    <text x="336" y="769" font-size="13" fill="#5a5a5a">Drift : rappel 7j vs 90j</text>
    <text x="336" y="793" font-size="12" font-style="italic" fill="#b8582e">★ décide le ROI à 18 mois</text>
  </g>

  <!-- ═════ FLUX CHEMIN CHAUD (accent, solides) ═════ -->

  <!-- Transaction → Switch -->
  <path d="M 220 322 L 308 322" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="314,322 304,318 304,326" fill="#1a1a1a"/>

  <!-- Switch → Feature store -->
  <path d="M 560 322 L 588 322" fill="none" stroke="#b8582e" stroke-width="2.2"/>
  <polygon points="594,322 584,318 584,326" fill="#b8582e"/>

  <!-- Feature store → Scoring -->
  <path d="M 830 322 L 858 320" fill="none" stroke="#b8582e" stroke-width="2.2"/>
  <polygon points="864,320 854,316 855,326" fill="#b8582e"/>

  <!-- Scoring → Décision -->
  <path d="M 1150 320 L 1178 320" fill="none" stroke="#b8582e" stroke-width="2.2"/>
  <polygon points="1184,320 1174,316 1174,324" fill="#b8582e"/>

  <!-- libellé chemin chaud -->
  <rect x="700" y="206" width="240" height="20" fill="#fbf2f2" opacity="0.95" rx="3"/>
  <text x="820" y="221" class="mono" font-size="11" font-weight="700" fill="#b8582e" text-anchor="middle">pipeline temps réel &lt; 50 ms</text>

  <!-- Décision → Switch (retour, arc haut) -->
  <path d="M 1300 235 L 1300 214 L 440 214 L 440 231" fill="none" stroke="#a83232" stroke-width="1.6" stroke-dasharray="2 0"/>
  <polygon points="440,225 436,233 444,233" fill="#a83232"/>
  <rect x="980" y="205" width="200" height="18" fill="#fbf2f2" opacity="0.95" rx="3"/>
  <text x="1080" y="219" class="mono" font-size="10" font-weight="600" fill="#a83232" text-anchor="middle">décision → switch (passe/bloque)</text>

  <!-- ═════ FLUX BOUCLE FROIDE (teal, pointillés, lents) ═════ -->

  <!-- Scoring → Console (alerte, descend à droite) -->
  <path d="M 1080 415 C 1200 500, 1400 560, 1410 649" fill="none" stroke="#2e7a7a" stroke-width="1.7" stroke-dasharray="7 4"/>
  <polygon points="1410,655 1406,645 1414,645" fill="#2e7a7a"/>
  <rect x="1322" y="520" width="120" height="20" fill="#eef5f4" opacity="0.95" rx="3"/>
  <text x="1382" y="535" class="mono" font-size="11" font-weight="600" fill="#2e7a7a" text-anchor="middle">alerte P1</text>

  <!-- Console → Labels -->
  <path d="M 1280 732 L 1246 732" fill="none" stroke="#2e7a7a" stroke-width="1.7" stroke-dasharray="7 4"/>
  <polygon points="1240,732 1250,728 1250,736" fill="#2e7a7a"/>
  <text x="1262" y="722" class="mono" font-size="10" font-weight="600" fill="#2e7a7a" text-anchor="middle">qualif.</text>

  <!-- Labels → Datalake (J+30/J+90, le décalage) -->
  <path d="M 950 732 L 906 732" fill="none" stroke="#8a6500" stroke-width="2.0" stroke-dasharray="7 4"/>
  <polygon points="900,732 910,728 910,736" fill="#8a6500"/>
  <rect x="902" y="746" width="146" height="20" fill="#eef5f4" opacity="0.95" rx="3"/>
  <text x="975" y="761" class="mono" font-size="11" font-weight="700" fill="#8a6500" text-anchor="middle">retard J+30 / J+90</text>

  <!-- Datalake → Champion/Challenger -->
  <path d="M 600 732 L 556 732" fill="none" stroke="#2e7a7a" stroke-width="1.7" stroke-dasharray="7 4"/>
  <polygon points="550,732 560,728 560,736" fill="#2e7a7a"/>

  <!-- Champion/Challenger → Scoring (promotion, remonte) -->
  <path d="M 435 655 C 435 520, 600 440, 900 412" fill="none" stroke="#2e7a7a" stroke-width="1.7" stroke-dasharray="7 4"/>
  <polygon points="906,411 896,409 898,419" fill="#2e7a7a"/>
  <rect x="470" y="486" width="260" height="20" fill="#eef5f4" opacity="0.95" rx="3"/>
  <text x="600" y="501" class="mono" font-size="11" font-weight="600" fill="#2e7a7a" text-anchor="middle">promotion (validation humaine)</text>

  <!-- ═════ SOURCE + LÉGENDE ═════ -->
  <text x="60" y="1010" font-size="13" font-style="italic" fill="#8a8a8a">
    Source : analyse des dépendances détection fraude · juin 2026 · l'inférence est triviale ; le poste qui décide le ROI à 18 mois est l'évaluation continue (fraude adversariale).
  </text>

  <g>
    <line x1="60" y1="1022" x2="1540" y2="1022" stroke="#c5b9a3" stroke-width="1"/>
    <text x="60" y="1048" class="mono" font-size="12" font-weight="700" letter-spacing="0.18" fill="#5a5a5a">LÉGENDE</text>

    <line x1="200" y1="1044" x2="234" y2="1044" stroke="#b8582e" stroke-width="2.2"/>
    <text x="244" y="1049" font-size="12">Chemin chaud (&lt; 50 ms)</text>

    <line x1="470" y1="1044" x2="504" y2="1044" stroke="#2e7a7a" stroke-width="1.7" stroke-dasharray="6 3"/>
    <text x="514" y="1049" font-size="12">Boucle froide (apprentissage)</text>

    <line x1="790" y1="1044" x2="824" y2="1044" stroke="#8a6500" stroke-width="2.0" stroke-dasharray="6 3"/>
    <text x="834" y="1049" font-size="12">Vérité terrain retardée (J+30/J+90)</text>

    <rect x="1160" y="1036" width="14" height="14" fill="#f4dcdc" stroke="#a83232" stroke-width="1.2"/>
    <text x="1182" y="1048" font-size="12">Régulé / pas touche</text>

    <rect x="1340" y="1036" width="14" height="14" fill="#fff8e8" stroke="#d4a000" stroke-width="1.4"/>
    <text x="1362" y="1048" font-size="12">Point de bascule du cas</text>
  </g>
</svg>
