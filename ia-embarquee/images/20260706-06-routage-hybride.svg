<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arr6" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#5A5A5A" stroke-width="1.5"/>
    </marker>
    <marker id="arr6t" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">La frontière de routage device ↔ cloud</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">La réponse de 2026 n'est pas « tout local » mais une escalade vérifiablement privée quand le budget ne suffit pas</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Device -->
  <g class="interactive" data-card="on-device" tabindex="0" role="button" aria-label="Le modèle on-device — cliquez pour les détails">
    <rect x="70" y="250" width="250" height="190" rx="6" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.5"/>
    <text x="195" y="285" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A" text-anchor="middle">L'APPAREIL</text>
    <rect x="100" y="305" width="190" height="110" rx="3" fill="#1F5560" fill-opacity="0.15" stroke="#1F5560" stroke-width="1.25"/>
    <text x="195" y="345" class="body" font-size="14" font-weight="600" fill="#1F5560" text-anchor="middle">Modèle on-device</text>
    <text x="195" y="368" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">~3 Md, 2-4 bits</text>
    <text x="195" y="392" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">latence nulle · hors-ligne · privé</text>
  </g>

  <!-- arrow to diamond -->
  <path d="M320 345 L410 345" stroke="#5A5A5A" stroke-width="1.5" marker-end="url(#arr6)"/>

  <!-- decision diamond -->
  <g class="interactive" data-card="critere-escalade" tabindex="0" role="button" aria-label="Les critères d'escalade — cliquez pour les détails">
    <path d="M540 345 L620 275 L700 345 L620 415 Z" fill="#B58A2C" fill-opacity="0.14" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="620" y="340" class="body" font-size="13" font-weight="600" fill="#B58A2C" text-anchor="middle">Escalader ?</text>
    <text x="620" y="360" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">4 critères</text>
  </g>
  <!-- criteria card -->
  <rect x="430" y="470" width="380" height="150" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1.25"/>
  <text x="450" y="500" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A">LA FRONTIÈRE DE DÉCISION</text>
  <text x="450" y="528" class="body" font-size="12" fill="#5A5A5A">① Complexité de la requête</text>
  <text x="450" y="551" class="body" font-size="12" fill="#5A5A5A">② Confidentialité des données</text>
  <text x="450" y="574" class="body" font-size="12" fill="#5A5A5A">③ État réseau (hors-ligne → local forcé)</text>
  <text x="450" y="597" class="body" font-size="12" fill="#5A5A5A">④ Budget énergétique (batterie)</text>
  <path d="M620 415 L620 470" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- branch NON : local answer -->
  <path d="M578 383 L410 383 L410 620 L470 620" stroke="#1F5560" stroke-width="1.5" fill="none" marker-end="url(#arr6t)"/>
  <text x="360" y="500" class="mono" font-size="12" font-weight="600" fill="#1F5560">NON</text>
  <rect x="90" y="580" width="290" height="80" rx="3" fill="#1F5560" fill-opacity="0.1" stroke="#1F5560" stroke-width="1.25"/>
  <text x="235" y="614" class="body" font-size="14" font-weight="600" fill="#1F5560" text-anchor="middle">Réponse locale</text>
  <text x="235" y="637" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">rien ne quitte l'appareil</text>

  <!-- branch OUI : to PCC -->
  <path d="M700 320 L740 320" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arr6)"/>
  <text x="712" y="305" class="mono" font-size="12" font-weight="600" fill="#B7332C">OUI</text>

  <!-- PCC cluster -->
  <rect x="748" y="250" width="392" height="370" rx="6" fill="#B7332C" fill-opacity="0.04" stroke="#B7332C" stroke-width="1.5"/>
  <text x="944" y="282" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#B7332C" text-anchor="middle">PRIVATE CLOUD COMPUTE</text>

  <g class="interactive" data-card="pcc-attestation" tabindex="0" role="button" aria-label="Attestation cryptographique — cliquez pour les détails">
    <rect x="772" y="298" width="344" height="110" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="792" y="328" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Nœud attesté</text>
    <text x="792" y="352" class="body" font-size="12" fill="#5A5A5A">La charge est chiffrée uniquement vers</text>
    <text x="792" y="371" class="body" font-size="12" fill="#5A5A5A">les nœuds dont la mesure figure au</text>
    <text x="792" y="390" class="mono" font-size="12" fill="#B7332C">journal de transparence public</text>
  </g>
  <g class="interactive" data-card="stateless" tabindex="0" role="button" aria-label="Sans état — cliquez pour les détails">
    <rect x="772" y="420" width="344" height="90" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="792" y="450" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Sans état</text>
    <text x="792" y="474" class="body" font-size="12" fill="#5A5A5A">Données jamais stockées, utilisées pour</text>
    <text x="792" y="493" class="body" font-size="12" fill="#5A5A5A">la seule requête. « No privileged access ».</text>
  </g>
  <text x="944" y="545" class="display" font-size="16" font-style="italic" fill="#1A1A1A" text-anchor="middle">Vérifier, plutôt que faire confiance.</text>
  <text x="944" y="575" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">La confidentialité devient une propriété architecturale,</text>
  <text x="944" y="592" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">pas une clause contractuelle.</text>

  <!-- bottom insight -->
  <text x="70" y="700" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Le petit modèle local n'est pas une fin en soi : c'est le premier étage d'une pile où le vrai produit est le routage.</text>

  <!-- FOOTER -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="768" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : Apple Security Research, « Private Cloud Compute » (2024) ; Apple Foundation Models 2024-2025.</text>
</svg>
