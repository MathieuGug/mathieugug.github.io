<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arr4" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#5A5A5A" stroke-width="1.25"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le NPU, la mémoire et le pipeline hétérogène</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Trois unités se partagent une mémoire unifiée — le TOPS vend le silicium, la bande passante décide du débit</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LEFT : SoC diagram -->
  <text x="70" y="185" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">LE SoC — CALCUL PARTAGÉ, MÉMOIRE COMMUNE</text>

  <!-- CPU -->
  <rect x="90" y="205" width="150" height="80" rx="3" fill="#5A5A5A" fill-opacity="0.12" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="165" y="240" class="body" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">CPU</text>
  <text x="165" y="262" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">polyvalent</text>
  <!-- GPU -->
  <rect x="255" y="205" width="150" height="80" rx="3" fill="#5A5A5A" fill-opacity="0.12" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="330" y="240" class="body" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">GPU</text>
  <text x="330" y="262" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">parallèle</text>
  <!-- NPU highlighted -->
  <g class="interactive" data-card="npu" tabindex="0" role="button" aria-label="Le NPU — cliquez pour les détails">
    <rect x="420" y="205" width="170" height="80" rx="3" fill="#B7332C" fill-opacity="0.14" stroke="#B7332C" stroke-width="1.5"/>
    <text x="505" y="238" class="body" font-size="14" font-weight="600" fill="#B7332C" text-anchor="middle">NPU</text>
    <text x="505" y="260" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">neuronal · efficace</text>
    <text x="505" y="277" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">~1,5 W</text>
  </g>

  <!-- arrows to bus -->
  <path d="M165 285 L165 340" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr4)"/>
  <path d="M330 285 L330 340" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr4)"/>
  <path d="M505 285 L505 340" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arr4)"/>

  <!-- bandwidth throat -->
  <g class="interactive" data-card="bande-passante" tabindex="0" role="button" aria-label="La bande passante mémoire — cliquez pour les détails">
    <path d="M90 348 L590 348 L470 400 L210 400 Z" fill="#B58A2C" fill-opacity="0.16" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="340" y="372" class="body" font-size="13" font-weight="600" fill="#B58A2C" text-anchor="middle">Bande passante mémoire</text>
    <text x="340" y="390" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">~50–120 Go/s — le goulot du décodage</text>
  </g>

  <!-- unified memory -->
  <rect x="90" y="420" width="500" height="110" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.5"/>
  <text x="340" y="450" class="body" font-size="14" font-weight="600" fill="#1F5560" text-anchor="middle">Mémoire unifiée (RAM)</text>
  <rect x="115" y="465" width="230" height="45" rx="3" fill="#1F5560" fill-opacity="0.3"/>
  <text x="230" y="492" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">poids résidents</text>
  <rect x="360" y="465" width="205" height="45" rx="3" fill="#2F5D3F" fill-opacity="0.3"/>
  <text x="462" y="492" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">KV-cache + activations</text>

  <text x="90" y="575" class="body" font-size="12" font-style="italic" fill="#5A5A5A">À chaque token, tous les poids sont relus depuis la RAM :</text>
  <text x="90" y="595" class="body" font-size="12" font-style="italic" fill="#5A5A5A">un NPU à 45 TOPS relié à une RAM lente reste bridé par la RAM.</text>

  <!-- RIGHT : landscape -->
  <text x="700" y="185" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">LE PAYSAGE SILICIUM 2026</text>

  <g class="interactive" data-card="apple-ane" tabindex="0" role="button" aria-label="Apple — cliquez pour les détails">
    <rect x="700" y="205" width="440" height="105" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1.25"/>
    <text x="720" y="235" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Apple</text>
    <text x="720" y="260" class="body" font-size="12" fill="#5A5A5A">Neural Engine jusqu'au M5 (oct. 2025), puis bascule</text>
    <text x="720" y="279" class="body" font-size="12" fill="#5A5A5A">vers des accélérateurs neuronaux par cœur GPU.</text>
    <text x="720" y="299" class="mono" font-size="11" fill="#B7332C">TOPS ANE non publié — la frontière NPU/GPU se brouille</text>
  </g>
  <g class="interactive" data-card="hexagon" tabindex="0" role="button" aria-label="Qualcomm Hexagon — cliquez pour les détails">
    <rect x="700" y="325" width="440" height="105" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1.25"/>
    <text x="720" y="355" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Qualcomm — Hexagon</text>
    <text x="1120" y="355" class="mono" font-size="15" font-weight="600" fill="#B7332C" text-anchor="end">45 TOPS</text>
    <text x="720" y="380" class="body" font-size="12" fill="#5A5A5A">Snapdragon X ; socle des Copilot+ PC.</text>
    <text x="720" y="400" class="body" font-size="12" fill="#5A5A5A">Phi-Silica : 650 tok/s à ~1,5 W.</text>
    <text x="720" y="420" class="mono" font-size="11" fill="#5A5A5A">collaboration Windows AI Foundry</text>
  </g>
  <g>
    <rect x="700" y="445" width="440" height="90" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1.25"/>
    <text x="720" y="475" class="body" font-size="14" font-weight="600" fill="#1A1A1A">MediaTek · Arm · Intel · AMD</text>
    <text x="720" y="500" class="body" font-size="12" fill="#5A5A5A">Ciblés day one par Meta pour Llama 3.2 ;</text>
    <text x="720" y="520" class="body" font-size="12" fill="#5A5A5A">l'inférence répartit CPU + GPU + NPU.</text>
  </g>

  <!-- bottom insight strip -->
  <rect x="90" y="620" width="1050" height="90" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="115" y="655" class="display" font-size="18" font-style="italic" fill="#1A1A1A">Le NPU n'est pas un remplaçant, c'est un membre d'un pipeline hétérogène.</text>
  <text x="115" y="685" class="body" font-size="12" fill="#5A5A5A">Prochain champ de bataille : non pas plus de TOPS, mais plus de bande passante mémoire.</text>

  <!-- FOOTER -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="768" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Notebookcheck (Snapdragon X, 45 TOPS) ; VentureBeat (Phi-Silica) ; arXiv:2501.14794 (heterogeneous mobile inference).</text>
</svg>
