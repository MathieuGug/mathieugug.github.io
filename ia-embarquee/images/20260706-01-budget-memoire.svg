<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le mur mémoire de l'appareil</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Ce n'est pas la taille du modèle qui décide, mais l'enveloppe de RAM allouable une fois l'OS et l'app servis</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- RAM UNIFIÉE bar -->
  <text x="60" y="195" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">RAM UNIFIÉE D'UN FLAGSHIP — 12 Go partagés</text>
  <g class="interactive" data-card="marge-os" tabindex="0" role="button" aria-label="OS et système — cliquez pour les détails">
    <rect x="60" y="212" width="430" height="70" rx="3" fill="#1A1A1A" fill-opacity="0.82"/>
    <text x="275" y="245" class="body" font-size="13" font-weight="500" fill="#FAF8F3" text-anchor="middle">Système d'exploitation</text>
    <text x="275" y="266" class="mono" font-size="12" fill="#FAF8F3" text-anchor="middle" opacity="0.85">~5 Go réservés</text>
  </g>
  <g class="interactive" data-card="app-buffer" tabindex="0" role="button" aria-label="App et graphismes — cliquez pour les détails">
    <rect x="494" y="212" width="230" height="70" rx="3" fill="#5A5A5A" fill-opacity="0.55"/>
    <text x="609" y="245" class="body" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">App + tampon</text>
    <text x="609" y="266" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle">~3 Go</text>
  </g>
  <g class="interactive" data-card="ram-totale" tabindex="0" role="button" aria-label="Enveloppe allouable au modèle — cliquez pour les détails">
    <rect x="728" y="212" width="412" height="70" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1.5"/>
    <text x="934" y="243" class="body" font-size="13" font-weight="600" fill="#1F5560" text-anchor="middle">Enveloppe allouable au modèle</text>
    <text x="934" y="266" class="mono" font-size="13" font-weight="600" fill="#1F5560" text-anchor="middle">≈ 2 – 4 Go</text>
  </g>
  <!-- bracket under enveloppe -->
  <path d="M728 292 L728 302 L1140 302 L1140 292" fill="none" stroke="#1F5560" stroke-width="1"/>
  <text x="934" y="322" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">Au-delà, le système tue l'application</text>

  <!-- Model scenarios -->
  <text x="60" y="380" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">EMPREINTE D'UN MODÈLE 3 Md SELON LA PRÉCISION — rapportée à l'enveloppe</text>

  <!-- scale reference: enveloppe max 4 Go maps to x 728..1140? Use own scale. 0 Go at x=200, 4 Go at x=760 -> but weights go to 6 Go. Use 1 Go = 140px from x=200 -->
  <!-- allocatable zone shading 2-4 Go -->
  <rect x="480" y="405" width="280" height="300" fill="#1F5560" fill-opacity="0.06"/>
  <line x1="480" y1="405" x2="480" y2="705" stroke="#1F5560" stroke-width="0.75" stroke-dasharray="2 3"/>
  <line x1="760" y1="405" x2="760" y2="705" stroke="#B7332C" stroke-width="1.25" stroke-dasharray="4 3"/>
  <text x="620" y="425" class="body" font-size="11" font-style="italic" fill="#1F5560" text-anchor="middle">zone allouable</text>
  <text x="766" y="425" class="mono" font-size="11" fill="#B7332C">plafond 4 Go</text>

  <!-- FP16 -->
  <text x="60" y="470" class="body" font-size="13" fill="#5A5A5A">FP16 · 16 bits</text>
  <rect x="200" y="452" width="840" height="30" rx="2" fill="#B7332C" fill-opacity="0.5"/>
  <text x="1050" y="472" class="mono" font-size="13" font-weight="600" fill="#B7332C">6 Go ✗</text>

  <!-- INT8 -->
  <text x="60" y="530" class="body" font-size="13" fill="#5A5A5A">INT8 · 8 bits</text>
  <rect x="200" y="512" width="420" height="30" rx="2" fill="#B58A2C" fill-opacity="0.6"/>
  <text x="632" y="532" class="mono" font-size="13" font-weight="600" fill="#B58A2C">3 Go ⚠</text>

  <!-- INT4 weights + kv -->
  <g class="interactive" data-card="poids-modele" tabindex="0" role="button" aria-label="Poids en INT4 — cliquez pour les détails">
    <text x="60" y="590" class="body" font-size="13" fill="#5A5A5A">INT4 · 4 bits</text>
    <rect x="200" y="572" width="210" height="30" rx="2" fill="#1F5560" fill-opacity="0.65"/>
    <text x="305" y="592" class="mono" font-size="12" fill="#FAF8F3" text-anchor="middle">poids 1,5 Go</text>
  </g>
  <g class="interactive" data-card="kv-cache" tabindex="0" role="button" aria-label="KV-cache — cliquez pour les détails">
    <rect x="412" y="572" width="150" height="30" rx="2" fill="#2F5D3F" fill-opacity="0.55"/>
    <text x="487" y="592" class="mono" font-size="12" fill="#FAF8F3" text-anchor="middle">KV-cache</text>
  </g>
  <text x="580" y="592" class="mono" font-size="13" font-weight="600" fill="#1F5560">≈ 2,6 Go ✓</text>

  <!-- caption verdict -->
  <text x="60" y="660" class="display" font-size="18" font-style="italic" fill="#1A1A1A">Verdict : aucun modèle utile ne tient sur l'appareil sans compression 4 bits.</text>
  <text x="60" y="688" class="body" font-size="13" fill="#5A5A5A">Le décodage relit tous les poids à chaque token — le débit est plafonné par la bande passante mémoire, pas par les TOPS.</text>

  <!-- FOOTER -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="768" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : arXiv:2501.14794 (Mobile SoC heterogeneous inference) ; ordres de grandeur pour un modèle 3 Md. Enveloppe allouable variable selon l'appareil.</text>
</svg>
