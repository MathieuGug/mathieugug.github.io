<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Quatre lignes de force, 2026-2028</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Où l'IA embarquée se dirige : matériel, méthode, usage et régulation convergent</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- time axis -->
  <line x1="330" y1="185" x2="330" y2="660" stroke="#E5E1D8" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="660" y1="185" x2="660" y2="660" stroke="#E5E1D8" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="990" y1="185" x2="990" y2="660" stroke="#E5E1D8" stroke-width="1" stroke-dasharray="2 4"/>
  <text x="330" y="180" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" text-anchor="middle">2026</text>
  <text x="660" y="180" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" text-anchor="middle">2027</text>
  <text x="990" y="180" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" text-anchor="middle">2028</text>

  <!-- Track 1 : ternaire -->
  <g class="interactive" data-card="ternaire-2027" tabindex="0" role="button" aria-label="Natif ternaire généralisé — cliquez pour les détails">
    <rect x="70" y="205" width="1070" height="100" rx="3" fill="#B58A2C" fill-opacity="0.07" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="90" y="235" class="body" font-size="15" font-weight="600" fill="#B58A2C">① Le natif ternaire se généralise</text>
    <rect x="330" y="252" width="700" height="30" rx="15" fill="#B58A2C" fill-opacity="0.25"/>
    <circle cx="660" cy="267" r="7" fill="#B58A2C"/>
    <text x="350" y="272" class="body" font-size="12" fill="#1A1A1A">modèles ternaires natifs plus gros &amp; multimodaux · kernels CPU dédiés · le NPU devient un luxe</text>
  </g>

  <!-- Track 2 : NPU-first -->
  <g class="interactive" data-card="npu-first" tabindex="0" role="button" aria-label="NPU comme unité première — cliquez pour les détails">
    <rect x="70" y="320" width="1070" height="100" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="90" y="350" class="body" font-size="15" font-weight="600" fill="#B7332C">② Le NPU devient l'unité première</text>
    <rect x="330" y="367" width="700" height="30" rx="15" fill="#B7332C" fill-opacity="0.22"/>
    <circle cx="990" cy="382" r="7" fill="#B7332C"/>
    <text x="350" y="387" class="body" font-size="12" fill="#1A1A1A">l'inférence neuronale, citoyen de première classe du SoC · la bande passante mémoire, prochain champ de bataille</text>
  </g>

  <!-- Track 3 : agents on-device -->
  <g class="interactive" data-card="agents-local" tabindex="0" role="button" aria-label="Agents on-device — cliquez pour les détails">
    <rect x="70" y="435" width="1070" height="100" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="90" y="465" class="body" font-size="15" font-weight="600" fill="#1F5560">③ Les agents on-device arrivent</text>
    <rect x="500" y="482" width="530" height="30" rx="15" fill="#1F5560" fill-opacity="0.22"/>
    <circle cx="820" cy="497" r="7" fill="#1F5560"/>
    <text x="520" y="502" class="body" font-size="12" fill="#1A1A1A">du chatbot local à l'agent local · le KV-cache du contexte long devient le poste mémoire dominant</text>
  </g>

  <!-- Track 4 : regulation -->
  <g class="interactive" data-card="regulation" tabindex="0" role="button" aria-label="Confidentialité et régulation — cliquez pour les détails">
    <rect x="70" y="550" width="1070" height="100" rx="3" fill="#2F5D3F" fill-opacity="0.06" stroke="#2F5D3F" stroke-width="1.25"/>
    <text x="90" y="580" class="body" font-size="15" font-weight="600" fill="#2F5D3F">④ La confidentialité, argument produit &amp; levier réglementaire</text>
    <rect x="330" y="597" width="700" height="30" rx="15" fill="#2F5D3F" fill-opacity="0.22"/>
    <circle cx="660" cy="612" r="7" fill="#2F5D3F"/>
    <text x="350" y="617" class="body" font-size="12" fill="#1A1A1A">traitement local = minimisation (RGPD) · attestation vérifiable · un angle que l'AI Act est outillé pour récompenser</text>
  </g>

  <!-- closing line -->
  <text x="600" y="705" class="display" font-size="18" font-style="italic" fill="#1A1A1A" text-anchor="middle">L'IA embarquée n'est pas qu'une optimisation technique : c'est une architecture de la confiance.</text>

  <!-- FOOTER -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="768" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Synthèse de l'auteur, à partir des sources du dossier. Positions temporelles indicatives.</text>
</svg>
