<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">L'échelle de quantification et sa falaise</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Compresser divise l'empreinte — mais la qualité chute d'un coup en dessous de 4 bits, sauf à réentraîner ou entraîner natif</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Axes -->
  <line x1="180" y1="230" x2="180" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="180" y1="620" x2="1080" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="70" y="235" class="body" font-size="11" fill="#5A5A5A">100 %</text>
  <text x="88" y="430" class="body" font-size="11" fill="#5A5A5A">85 %</text>
  <text x="88" y="615" class="body" font-size="11" fill="#5A5A5A">70 %</text>
  <text x="120" y="400" class="body" font-size="12" fill="#5A5A5A" transform="rotate(-90 120 400)" text-anchor="middle">Qualité retenue vs FP16</text>
  <text x="630" y="662" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Facteur de compression (empreinte / FP16) →</text>
  <!-- x ticks -->
  <text x="200" y="642" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">×1</text>
  <text x="392" y="642" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">×2</text>
  <text x="584" y="642" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">×4</text>
  <text x="870" y="642" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">×8</text>
  <text x="1060" y="642" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">×10</text>

  <!-- PTQ cliff curve (drops after INT4) -->
  <path d="M200 230 L392 240 L584 268 L870 470 L1000 590" fill="none" stroke="#B7332C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- QAT curve (stays high) -->
  <path d="M584 250 L870 300 L1000 360" fill="none" stroke="#1F5560" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="7 4"/>

  <!-- cliff annotation -->
  <rect x="720" y="490" width="230" height="70" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="835" y="515" class="body" font-size="12" font-weight="600" fill="#B7332C" text-anchor="middle">La falaise PTQ</text>
  <text x="835" y="536" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">sous 4 bits, la simple</text>
  <text x="835" y="551" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">compression casse le modèle</text>

  <!-- POINT: FP16 -->
  <g class="interactive" data-card="fp16" tabindex="0" role="button" aria-label="FP16 référence — cliquez pour les détails">
    <circle cx="200" cy="230" r="8" fill="#1A1A1A"/>
    <text x="200" y="210" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">FP16</text>
    <text x="200" y="195" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">6 Go · référence</text>
  </g>
  <!-- POINT: INT8 -->
  <circle cx="392" cy="240" r="7" fill="#5A5A5A"/>
  <text x="392" y="222" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">INT8</text>
  <!-- POINT: INT4 PTQ -->
  <g class="interactive" data-card="int4-ptq" tabindex="0" role="button" aria-label="INT4 post-training — cliquez pour les détails">
    <circle cx="584" cy="268" r="8" fill="#B7332C"/>
    <text x="584" y="248" class="body" font-size="12" font-weight="600" fill="#B7332C" text-anchor="middle">INT4 · PTQ</text>
    <text x="584" y="300" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">AWQ 97-99 %</text>
  </g>
  <!-- POINT: QAT -->
  <g class="interactive" data-card="qat" tabindex="0" role="button" aria-label="QAT quantization-aware training — cliquez pour les détails">
    <circle cx="870" cy="300" r="8" fill="#1F5560"/>
    <text x="895" y="296" class="body" font-size="12" font-weight="600" fill="#1F5560">QAT + LoRA</text>
    <text x="895" y="314" class="mono" font-size="10" fill="#5A5A5A">Apple 2-bit · Meta</text>
  </g>
  <!-- POINT: ternaire natif -->
  <g class="interactive" data-card="ternaire" tabindex="0" role="button" aria-label="Natif ternaire BitNet — cliquez pour les détails">
    <circle cx="1000" cy="360" r="9" fill="#B58A2C"/>
    <text x="1000" y="340" class="body" font-size="12" font-weight="600" fill="#B58A2C" text-anchor="middle">Ternaire natif</text>
    <text x="1000" y="392" class="mono" font-size="10" fill="#B58A2C" text-anchor="middle">1,58 bit · BitNet</text>
  </g>

  <!-- Legend -->
  <line x1="200" y1="705" x2="240" y2="705" stroke="#B7332C" stroke-width="2.5"/>
  <text x="250" y="709" class="body" font-size="12" fill="#5A5A5A">PTQ — compression post-entraînement (bon marché, s'effondre bas)</text>
  <line x1="640" y1="705" x2="680" y2="705" stroke="#1F5560" stroke-width="2.5" stroke-dasharray="7 4"/>
  <text x="690" y="709" class="body" font-size="12" fill="#5A5A5A">QAT / natif — le modèle apprend à résister à la perte</text>

  <!-- FOOTER -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="768" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : synthèse LLM quantization 2026 (AWQ/GPTQ/GGUF) ; Apple Foundation Models 2024-2025 ; BitNet b1.58 2B4T (arXiv:2504.12285). Courbes schématiques.</text>
</svg>
