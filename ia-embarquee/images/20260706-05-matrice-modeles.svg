<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le paysage des modèles embarqués 2026</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">La contrainte mémoire dessine une convergence : ~2-4 Md de paramètres, 2-4 bits, 1-3 Go d'empreinte</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Column headers -->
  <text x="80" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A">MODÈLE</text>
  <text x="360" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A" text-anchor="middle">PARAMS</text>
  <text x="500" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A" text-anchor="middle">EMPREINTE</text>
  <text x="650" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A">TECHNIQUE DE COMPRESSION</text>
  <text x="1000" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A">CIBLE MATÉRIELLE</text>
  <line x1="80" y1="212" x2="1120" y2="212" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- Row 1 : Apple -->
  <g class="interactive" data-card="apple-fm" tabindex="0" role="button" aria-label="Apple Foundation — cliquez pour les détails">
    <rect x="80" y="220" width="1040" height="76" fill="#B7332C" fill-opacity="0.05"/>
    <text x="92" y="252" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Apple Foundation</text>
    <text x="92" y="274" class="body" font-size="11" font-style="italic" fill="#5A5A5A">livré dans iOS · Foundation Models framework</text>
    <text x="360" y="262" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">~3 Md</text>
    <text x="500" y="262" class="mono" font-size="13" font-weight="600" fill="#1F5560" text-anchor="middle">~1 Go</text>
    <text x="650" y="262" class="body" font-size="12" fill="#5A5A5A">QAT 2-bit + LoRA + KV-cache partagé</text>
    <text x="1000" y="262" class="body" font-size="12" fill="#5A5A5A">Apple Silicon</text>
  </g>
  <!-- Row 2 : Gemma 3n -->
  <g class="interactive" data-card="gemma3n" tabindex="0" role="button" aria-label="Gemma 3n — cliquez pour les détails">
    <rect x="80" y="296" width="1040" height="76" fill="#1F5560" fill-opacity="0.04"/>
    <text x="92" y="328" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Gemma 3n E4B</text>
    <text x="92" y="350" class="body" font-size="11" font-style="italic" fill="#5A5A5A">multimodal · mobile-first (Google)</text>
    <text x="360" y="338" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">8 Md brut</text>
    <text x="500" y="338" class="mono" font-size="13" font-weight="600" fill="#1F5560" text-anchor="middle">3 Go</text>
    <text x="650" y="338" class="body" font-size="12" fill="#5A5A5A">MatFormer + Per-Layer Embedding</text>
    <text x="1000" y="338" class="body" font-size="12" fill="#5A5A5A">téléphone / tablette</text>
  </g>
  <!-- Row 3 : Phi-Silica -->
  <g class="interactive" data-card="phi-silica" tabindex="0" role="button" aria-label="Phi-Silica — cliquez pour les détails">
    <rect x="80" y="372" width="1040" height="76" fill="#B7332C" fill-opacity="0.05"/>
    <text x="92" y="404" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Phi-Silica</text>
    <text x="92" y="426" class="body" font-size="11" font-style="italic" fill="#5A5A5A">650 tok/s à ~1,5 W (Microsoft)</text>
    <text x="360" y="414" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">3,3 Md</text>
    <text x="500" y="414" class="mono" font-size="13" fill="#5A5A5A" text-anchor="middle">NPU-résident</text>
    <text x="650" y="414" class="body" font-size="12" fill="#5A5A5A">distillation, optimisé Hexagon</text>
    <text x="1000" y="414" class="body" font-size="12" fill="#5A5A5A">Copilot+ PC</text>
  </g>
  <!-- Row 4 : Llama 3.2 -->
  <g>
    <rect x="80" y="448" width="1040" height="76" fill="#1F5560" fill-opacity="0.04"/>
    <text x="92" y="480" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Llama 3.2 3B</text>
    <text x="92" y="502" class="body" font-size="11" font-style="italic" fill="#5A5A5A">contexte 128K · day one (Meta)</text>
    <text x="360" y="490" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">3 Md</text>
    <text x="500" y="490" class="mono" font-size="13" fill="#5A5A5A" text-anchor="middle">~1,8 Go</text>
    <text x="650" y="490" class="body" font-size="12" fill="#5A5A5A">QAT+LoRA / SpinQuant (−56 % taille)</text>
    <text x="1000" y="490" class="body" font-size="12" fill="#5A5A5A">Qualcomm/MediaTek/Arm</text>
  </g>
  <!-- Row 5 : Qwen -->
  <g>
    <rect x="80" y="524" width="1040" height="76" fill="#B7332C" fill-opacity="0.05"/>
    <text x="92" y="556" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Qwen2.5-3B</text>
    <text x="92" y="578" class="body" font-size="11" font-style="italic" fill="#5A5A5A">populaire en GGUF (Alibaba)</text>
    <text x="360" y="566" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">3 Md</text>
    <text x="500" y="566" class="mono" font-size="13" fill="#5A5A5A" text-anchor="middle">~1,9 Go</text>
    <text x="650" y="566" class="body" font-size="12" fill="#5A5A5A">GPTQ 4-bit (PTQ, écosystème ouvert)</text>
    <text x="1000" y="566" class="body" font-size="12" fill="#5A5A5A">flagship ~15-40 tok/s</text>
  </g>
  <!-- Row 6 : BitNet -->
  <g class="interactive" data-card="bitnet" tabindex="0" role="button" aria-label="BitNet 2B4T — cliquez pour les détails">
    <rect x="80" y="600" width="1040" height="76" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="92" y="632" class="body" font-size="15" font-weight="600" fill="#B58A2C">BitNet b1.58 2B4T</text>
    <text x="92" y="654" class="body" font-size="11" font-style="italic" fill="#5A5A5A">le seul natif ternaire (Microsoft)</text>
    <text x="360" y="642" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">2 Md</text>
    <text x="500" y="642" class="mono" font-size="13" font-weight="600" fill="#B58A2C" text-anchor="middle">minimal</text>
    <text x="650" y="642" class="body" font-size="12" fill="#5A5A5A">entraîné natif 1,58-bit (pas compressé)</text>
    <text x="1000" y="642" class="body" font-size="12" fill="#5A5A5A">CPU sans GPU</text>
  </g>

  <!-- insight -->
  <text x="80" y="710" class="display" font-size="16" font-style="italic" fill="#5A5A5A">La stratégie de compression trahit le contrôle du pipeline : QAT quand on maîtrise l'entraînement, PTQ dans l'écosystème ouvert.</text>

  <!-- FOOTER -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="768" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Apple, Google, Microsoft, Meta (blogs officiels 2024-2025) ; BitNet arXiv:2504.12285. Empreintes = ordres de grandeur en 4-bit sauf mention.</text>
</svg>
