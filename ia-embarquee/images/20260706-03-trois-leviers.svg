<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Trois leviers pour tenir dans le budget</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Compresser après coup, réorganiser l'occupation mémoire, ou entraîner directement à basse précision</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Column labels -->
  <text x="235" y="185" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A" text-anchor="middle">LEVIER 1 · PRÉCISION</text>
  <text x="600" y="185" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A" text-anchor="middle">LEVIER 2 · ARCHITECTURE</text>
  <text x="965" y="185" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A" text-anchor="middle">LEVIER 3 · NATIF</text>

  <!-- COL 1 : Quantif -->
  <g class="interactive" data-card="quantif" tabindex="0" role="button" aria-label="Quantification post-hoc — cliquez pour les détails">
    <rect x="60" y="205" width="350" height="470" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="235" y="248" class="display" font-size="20" font-weight="600" fill="#B7332C" text-anchor="middle">Quantification</text>
    <text x="235" y="272" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">compresser un modèle déjà entraîné</text>
    <line x1="90" y1="292" x2="380" y2="292" stroke="#B7332C" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="90" y="325" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Ce qu'on réduit</text>
    <text x="90" y="348" class="body" font-size="12" fill="#5A5A5A">Les bits par poids : 16 → 8 → 4</text>
    <text x="90" y="392" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Comment</text>
    <text x="90" y="415" class="mono" font-size="12" fill="#5A5A5A">GGUF Q4_K_M · AWQ · GPTQ</text>
    <text x="90" y="435" class="body" font-size="12" fill="#5A5A5A">→ facteur ×2 à ×8 sur l'empreinte</text>
    <text x="90" y="479" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Le coût</text>
    <text x="90" y="502" class="body" font-size="12" fill="#5A5A5A">Falaise de qualité sous 4 bits ;</text>
    <text x="90" y="521" class="body" font-size="12" fill="#5A5A5A">code &amp; maths plus sensibles.</text>
    <rect x="90" y="560" width="290" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="235" y="588" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">« Prix d'entrée » —</text>
    <text x="235" y="610" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">aucun modèle utile ne tient</text>
    <text x="235" y="628" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">sans passer par là.</text>
  </g>

  <!-- COL 2 : Architecture (two cards) -->
  <g class="interactive" data-card="matformer" tabindex="0" role="button" aria-label="MatFormer matriochka — cliquez pour les détails">
    <rect x="425" y="205" width="350" height="222" rx="3" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.5"/>
    <text x="600" y="240" class="display" font-size="18" font-weight="600" fill="#1F5560" text-anchor="middle">MatFormer</text>
    <text x="600" y="261" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">un modèle matriochka</text>
    <!-- nested boxes -->
    <rect x="470" y="278" width="260" height="120" rx="3" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <rect x="500" y="298" width="200" height="80" rx="3" fill="none" stroke="#1F5560" stroke-width="1.25" stroke-opacity="0.7"/>
    <rect x="530" y="318" width="140" height="40" rx="3" fill="#1F5560" fill-opacity="0.25" stroke="#1F5560" stroke-width="1.25"/>
    <text x="600" y="343" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">cœur actif</text>
    <text x="600" y="415" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">exécuter le sous-modèle sans activer l'englobant</text>
  </g>
  <g class="interactive" data-card="ple" tabindex="0" role="button" aria-label="Per-Layer Embeddings — cliquez pour les détails">
    <rect x="425" y="440" width="350" height="235" rx="3" fill="#2F5D3F" fill-opacity="0.07" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="600" y="475" class="display" font-size="18" font-weight="600" fill="#2F5D3F" text-anchor="middle">Per-Layer Embedding</text>
    <text x="600" y="496" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">décharger vers la RAM lente</text>
    <!-- fast vs slow memory -->
    <rect x="455" y="516" width="130" height="55" rx="3" fill="#B7332C" fill-opacity="0.12" stroke="#B7332C" stroke-width="1"/>
    <text x="520" y="540" class="body" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">mémoire rapide</text>
    <text x="520" y="557" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">couches actives</text>
    <rect x="615" y="516" width="130" height="55" rx="3" fill="#5A5A5A" fill-opacity="0.12" stroke="#5A5A5A" stroke-width="1"/>
    <text x="680" y="540" class="body" font-size="11" font-weight="600" fill="#5A5A5A" text-anchor="middle">RAM lente</text>
    <text x="680" y="557" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">embeddings cachés</text>
    <path d="M615 543 L590 543" stroke="#2F5D3F" stroke-width="1.5" marker-end="url(#arr3)"/>
    <text x="600" y="612" class="mono" font-size="12" font-weight="600" fill="#2F5D3F" text-anchor="middle">Gemma 3n : 8B brut → 3 Go résidents</text>
    <text x="600" y="640" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">l'empreinte compte, pas le décompte</text>
  </g>

  <!-- COL 3 : Natif ternaire -->
  <g class="interactive" data-card="bitnet-natif" tabindex="0" role="button" aria-label="BitNet natif ternaire — cliquez pour les détails">
    <rect x="790" y="205" width="350" height="470" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="965" y="248" class="display" font-size="20" font-weight="600" fill="#B58A2C" text-anchor="middle">Natif ternaire</text>
    <text x="965" y="272" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">entraîner directement en 1,58 bit</text>
    <line x1="820" y1="292" x2="1110" y2="292" stroke="#B58A2C" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- ternary values -->
    <g>
      <rect x="850" y="315" width="60" height="50" rx="3" fill="#B58A2C" fill-opacity="0.2" stroke="#B58A2C" stroke-width="1.25"/>
      <text x="880" y="347" class="mono" font-size="20" font-weight="600" fill="#B58A2C" text-anchor="middle">−1</text>
      <rect x="935" y="315" width="60" height="50" rx="3" fill="#B58A2C" fill-opacity="0.2" stroke="#B58A2C" stroke-width="1.25"/>
      <text x="965" y="347" class="mono" font-size="20" font-weight="600" fill="#B58A2C" text-anchor="middle">0</text>
      <rect x="1020" y="315" width="60" height="50" rx="3" fill="#B58A2C" fill-opacity="0.2" stroke="#B58A2C" stroke-width="1.25"/>
      <text x="1050" y="347" class="mono" font-size="20" font-weight="600" fill="#B58A2C" text-anchor="middle">+1</text>
    </g>
    <text x="965" y="392" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle">log₂(3) ≈ 1,58 bit/poids</text>
    <text x="820" y="432" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Trois gains d'un coup</text>
    <text x="820" y="458" class="body" font-size="12" fill="#5A5A5A">• Mémoire minimale</text>
    <text x="820" y="480" class="body" font-size="12" fill="#5A5A5A">• −82 % d'énergie</text>
    <text x="820" y="502" class="body" font-size="12" fill="#5A5A5A">• Additions au lieu de ×  → CPU sans GPU</text>
    <rect x="820" y="535" width="290" height="105" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="965" y="565" class="body" font-size="12" font-weight="600" fill="#B58A2C" text-anchor="middle">BitNet b1.58 2B4T</text>
    <text x="965" y="588" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">2 Md, entraîné natif sur 4 000 Md tokens</text>
    <text x="965" y="612" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">jusqu'à 100 Md sur un seul CPU,</text>
    <text x="965" y="629" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">à vitesse de lecture humaine</text>
  </g>

  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#2F5D3F" stroke-width="1.25"/>
    </marker>
  </defs>

  <!-- FOOTER -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="768" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Gemma 3n (ai.google.dev) ; BitNet b1.58 2B4T (arXiv:2504.12285) &amp; bitnet.cpp (github.com/microsoft/BitNet) ; Apple Foundation Models 2024.</text>
</svg>
