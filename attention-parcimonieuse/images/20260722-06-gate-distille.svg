<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arr6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Le gate distillé · SeerAttention</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Extraire la parcimonie déjà latente d'un modèle dense, sans retoucher ses poids.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Stage 1 -->
  <rect x="70" y="240" width="180" height="130" rx="4" fill="#1A1A1A" fill-opacity="0.05" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="160" y="292" class="display" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="middle">modèle dense</text>
  <text x="160" y="314" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">déjà entraîné,</text>
  <text x="160" y="332" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">poids FIGÉS</text>
  <line x1="252" y1="305" x2="296" y2="305" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr6)"/>

  <!-- Stage 2: attn maps -->
  <g class="interactive" data-card="attn-maps" tabindex="0" role="button" aria-label="Cartes d'attention réelles">
    <rect x="300" y="240" width="200" height="130" rx="4" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.25"/>
    <text x="320" y="268" class="mono" font-size="11" letter-spacing="1" fill="#1F5560">OBSERVER</text>
    <text x="400" y="300" class="display" font-size="15.5" font-weight="600" fill="#1A1A1A" text-anchor="middle">cartes d'attention</text>
    <!-- mini heatmap -->
    <rect x="340" y="316" width="120" height="42" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <rect x="344" y="320" width="10" height="10" fill="#1F5560" fill-opacity="0.7"/>
    <rect x="356" y="332" width="10" height="10" fill="#1F5560" fill-opacity="0.5"/>
    <rect x="380" y="344" width="10" height="10" fill="#1F5560" fill-opacity="0.8"/>
    <rect x="416" y="322" width="10" height="10" fill="#1F5560" fill-opacity="0.4"/>
  </g>
  <line x1="502" y1="305" x2="546" y2="305" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr6)"/>

  <!-- Stage 3: maxpool target -->
  <g class="interactive" data-card="maxpool-cible" tabindex="0" role="button" aria-label="2D-maxpool par bloc — la cible de distillation">
    <rect x="550" y="240" width="200" height="130" rx="4" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="570" y="268" class="mono" font-size="11" letter-spacing="1" fill="#B58A2C">RÉDUIRE</text>
    <text x="650" y="300" class="display" font-size="15.5" font-weight="600" fill="#1A1A1A" text-anchor="middle">2D-maxpool</text>
    <text x="650" y="320" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">par bloc = la CIBLE</text>
    <text x="650" y="350" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">« quels blocs le modèle</text>
    <text x="650" y="366" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">regarde-t-il vraiment ? »</text>
  </g>
  <line x1="752" y1="305" x2="796" y2="305" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr6)"/>

  <!-- Stage 4: AttnGate -->
  <g class="interactive" data-card="attngate" tabindex="0" role="button" aria-label="AttnGate — le seul module appris">
    <rect x="800" y="240" width="200" height="130" rx="4" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.5"/>
    <text x="820" y="268" class="mono" font-size="11" letter-spacing="1" fill="#B7332C">APPRENDRE</text>
    <text x="900" y="300" class="display" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="middle">AttnGate</text>
    <text x="900" y="322" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">seul module entraîné</text>
    <text x="900" y="350" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">distillé pour imiter la</text>
    <text x="900" y="366" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">cible → convergence rapide</text>
  </g>
  <line x1="1002" y1="305" x2="1046" y2="305" stroke="#B7332C" stroke-width="2.5" marker-end="url(#arr6)"/>

  <!-- Stage 5: inference -->
  <rect x="1050" y="240" width="92" height="130" rx="4" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
  <text x="1096" y="292" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="500">noyau</text>
  <text x="1096" y="310" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="500">block-</text>
  <text x="1096" y="328" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="500">sparse</text>

  <!-- distillation loop annotation -->
  <path d="M650,378 C650,410 900,410 900,378" fill="none" stroke="#B7332C" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="775" y="426" class="body" font-size="11.5" font-style="italic" fill="#B7332C" text-anchor="middle">auto-distillation : la cible vient du modèle lui-même</text>

  <!-- deux voies -->
  <g class="interactive" data-card="deux-voies" tabindex="0" role="button" aria-label="Deux voies vers la parcimonie entraînée">
    <rect x="60" y="470" width="1080" height="240" rx="4" fill="#1A1A1A" fill-opacity="0.03" stroke="#1A1A1A" stroke-width="1"/>
    <text x="82" y="502" class="mono" font-size="12" letter-spacing="1.2" fill="#1A1A1A">DEUX VOIES VERS LA PARCIMONIE ENTRAÎNÉE</text>
    <line x1="600" y1="520" x2="600" y2="690" stroke="#E5E1D8" stroke-width="1"/>

    <text x="82" y="546" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Voie A · from-scratch</text>
    <text x="82" y="572" class="body" font-size="13" fill="#5A5A5A">NSA, MoBA</text>
    <text x="82" y="600" class="body" font-size="12.5" fill="#5A5A5A">La parcimonie est présente dès le pré-entraînement.</text>
    <text x="82" y="620" class="body" font-size="12.5" fill="#5A5A5A">Meilleure qualité, mais coûte un entraînement complet.</text>
    <text x="82" y="656" class="body" font-size="12.5" fill="#5A5A5A">Pour les modèles neufs.</text>

    <text x="622" y="546" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Voie B · post-training</text>
    <text x="622" y="572" class="body" font-size="13" fill="#5A5A5A">SeerAttention (et SeerAttention-R pour le raisonnement long)</text>
    <text x="622" y="600" class="body" font-size="12.5" fill="#5A5A5A">Distiller la parcimonie d'un modèle dense EXISTANT.</text>
    <text x="622" y="620" class="body" font-size="12.5" fill="#5A5A5A">Le corps reste figé ; seul le gate s'apprend.</text>
    <text x="622" y="656" class="display" font-size="13" font-style="italic" fill="#B7332C">Le compromis pragmatique : parcimonie apprise, pas de reprise à zéro.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="742" x2="1140" y2="742" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Source : Gao et al., « SeerAttention: Learning Intrinsic Sparse Attention in Your LLMs », Microsoft, arXiv:2410.13276 ; SeerAttention-R, arXiv:2506.08889.</text>
</svg>
