<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#B7332C" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Deux générations de parcimonie</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Du motif fixe conçu à la main à la parcimonie apprise par descente de gradient.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Generation 1 lane -->
  <g class="interactive" data-card="motifs-fixes" tabindex="0" role="button" aria-label="Génération 1 — motifs fixes">
    <rect x="60" y="180" width="1080" height="180" rx="4" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.25"/>
    <text x="80" y="212" class="mono" font-size="12" letter-spacing="1.5" fill="#1F5560">GÉNÉRATION 1 · MOTIFS FIXES · 2019-2020</text>
    <text x="80" y="240" class="display" font-size="16" font-style="italic" fill="#5A5A5A">« Le concepteur sait à l'avance où l'attention doit se porter. »</text>
  </g>
  <g class="interactive" data-card="sparse-transformers" tabindex="0" role="button" aria-label="Sparse Transformers">
    <rect x="80" y="262" width="330" height="80" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="98" y="290" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Sparse Transformers</text>
    <text x="98" y="312" class="body" font-size="12" fill="#5A5A5A">OpenAI 2019 · factorisé strided/fixed</text>
    <text x="98" y="330" class="mono" font-size="11" fill="#1F5560">O(n·√n)</text>
  </g>
  <g>
    <rect x="430" y="262" width="330" height="80" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="448" y="290" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Longformer</text>
    <text x="448" y="312" class="body" font-size="12" fill="#5A5A5A">AllenAI 2020 · fenêtre glissante</text>
    <text x="448" y="330" class="body" font-size="11" fill="#5A5A5A">+ quelques tokens à attention globale</text>
  </g>
  <g class="interactive" data-card="bigbird-theorie" tabindex="0" role="button" aria-label="BigBird — garanties théoriques">
    <rect x="780" y="262" width="340" height="80" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="798" y="290" class="display" font-size="16" font-weight="600" fill="#1A1A1A">BigBird</text>
    <text x="798" y="312" class="body" font-size="12" fill="#5A5A5A">Google 2020 · fenêtre + global + aléatoire</text>
    <text x="798" y="330" class="mono" font-size="11" fill="#1F5560">approximateur universel · Turing-complet</text>
  </g>

  <!-- Bascule arrow -->
  <g class="interactive" data-card="bascule-apprise" tabindex="0" role="button" aria-label="La bascule vers la parcimonie apprise">
    <line x1="600" y1="372" x2="600" y2="428" stroke="#B7332C" stroke-width="2.5" marker-end="url(#arr2)"/>
    <rect x="330" y="384" width="540" height="34" rx="17" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1"/>
    <text x="600" y="406" class="mono" font-size="12" letter-spacing="1" fill="#B7332C" text-anchor="middle">LA BASCULE · 2024-2025 · « laisser le modèle décider »</text>
  </g>

  <!-- Generation 2 lane -->
  <rect x="60" y="440" width="1080" height="230" rx="4" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
  <text x="80" y="472" class="mono" font-size="12" letter-spacing="1.5" fill="#B7332C">GÉNÉRATION 2 · PARCIMONIE APPRISE / DYNAMIQUE · 2024-2025</text>
  <text x="80" y="500" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Le motif n'est plus gravé dans l'architecture : il est calculé selon l'entrée, voire appris.</text>

  <g>
    <rect x="80" y="516" width="250" height="132" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="98" y="544" class="display" font-size="15" font-weight="600" fill="#1A1A1A">MInference</text>
    <text x="98" y="564" class="body" font-size="11.5" fill="#5A5A5A">NeurIPS 2024 · dynamique</text>
    <text x="98" y="581" class="body" font-size="11.5" fill="#5A5A5A">mais training-free (prefill)</text>
    <text x="98" y="616" class="mono" font-size="10.5" fill="#B58A2C">post-hoc</text>
    <text x="98" y="634" class="body" font-size="11" fill="#5A5A5A">motifs reconnus en ligne</text>
  </g>
  <g>
    <rect x="344" y="516" width="250" height="132" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="362" y="544" class="display" font-size="15" font-weight="600" fill="#1A1A1A">SeerAttention</text>
    <text x="362" y="564" class="body" font-size="11.5" fill="#5A5A5A">MS 2024 · gate distillé</text>
    <text x="362" y="616" class="mono" font-size="10.5" fill="#B7332C">appris (post-training)</text>
    <text x="362" y="634" class="body" font-size="11" fill="#5A5A5A">sur modèle dense existant</text>
  </g>
  <g>
    <rect x="608" y="516" width="250" height="132" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="626" y="544" class="display" font-size="15" font-weight="600" fill="#1A1A1A">NSA · MoBA</text>
    <text x="626" y="564" class="body" font-size="11.5" fill="#5A5A5A">DeepSeek / Moonshot 2025</text>
    <text x="626" y="616" class="mono" font-size="10.5" fill="#B7332C">appris (from-scratch)</text>
    <text x="626" y="634" class="body" font-size="11" fill="#5A5A5A">parcimonie native, pré-entraînée</text>
  </g>
  <g>
    <rect x="872" y="516" width="248" height="132" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.5"/>
    <text x="890" y="544" class="display" font-size="15" font-weight="600" fill="#1A1A1A">DSA</text>
    <text x="890" y="564" class="body" font-size="11.5" fill="#5A5A5A">DeepSeek-V3.2 · sept. 2025</text>
    <text x="890" y="616" class="mono" font-size="10.5" fill="#B7332C">en production</text>
    <text x="890" y="634" class="body" font-size="11" fill="#5A5A5A">servi, tarifé, −50 % API</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Sources : Child et al. 2019 ; Beltagy et al. 2020 ; Zaheer et al. 2020 ; Jiang et al. 2024 ; Gao et al. 2024 ; Yuan et al. 2025 ; Lu et al. 2025 ; DeepSeek 2025.</text>
</svg>
