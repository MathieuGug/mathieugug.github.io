<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Le mur quadratique</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">L'attention dense coûte O(n²) ; la parcimonie ramène le calcul à O(n·k), linéaire en longueur.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Plot axes -->
  <line x1="150" y1="670" x2="740" y2="670" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr1)"/>
  <line x1="150" y1="670" x2="150" y2="210" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr1)"/>
  <text x="745" y="695" class="body" font-size="12" fill="#5A5A5A">longueur de séquence n</text>
  <text x="150" y="198" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">coût</text>

  <!-- gridlines -->
  <line x1="150" y1="440" x2="740" y2="440" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- Dense curve O(n^2) -->
  <path d="M150,670 C420,660 590,520 720,235" fill="none" stroke="#B7332C" stroke-width="2.5"/>
  <g class="interactive" data-card="cout-dense" tabindex="0" role="button" aria-label="Coût dense O(n carré)">
    <rect x="560" y="250" width="200" height="58" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1"/>
    <text x="575" y="277" class="mono" font-size="15" font-weight="500" fill="#B7332C">O(n²)</text>
    <text x="575" y="298" class="body" font-size="12" fill="#5A5A5A">attention dense</text>
  </g>

  <!-- Sparse curve O(nk) -->
  <path d="M150,670 L720,548" fill="none" stroke="#1F5560" stroke-width="2.5"/>
  <g class="interactive" data-card="cout-sparse" tabindex="0" role="button" aria-label="Coût parcimonieux O(n fois k)">
    <rect x="540" y="560" width="200" height="58" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1"/>
    <text x="555" y="587" class="mono" font-size="15" font-weight="500" fill="#1F5560">O(n·k)</text>
    <text x="555" y="608" class="body" font-size="12" fill="#5A5A5A">k clés fixées par requête</text>
  </g>

  <!-- Crossover marker -->
  <g class="interactive" data-card="point-bascule" tabindex="0" role="button" aria-label="Point de bascule long contexte">
    <circle cx="333" cy="622" r="8" fill="#B58A2C"/>
    <text x="333" y="627" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">×</text>
    <line x1="333" y1="614" x2="333" y2="440" stroke="#B58A2C" stroke-width="0.75" stroke-dasharray="2 3"/>
    <text x="345" y="428" class="body" font-size="12" fill="#B58A2C">au-delà, l'écart explose</text>
    <text x="345" y="446" class="body" font-size="11" fill="#5A5A5A">— le long contexte devient inabordable en dense</text>
  </g>

  <!-- Right panel: prefill vs decode -->
  <g class="interactive" data-card="prefill-vs-decode" tabindex="0" role="button" aria-label="Prefill compute-bound vs decode memory-bound">
    <rect x="820" y="215" width="320" height="470" rx="4" fill="#1A1A1A" fill-opacity="0.03" stroke="#1A1A1A" stroke-width="1"/>
    <text x="840" y="252" class="mono" font-size="12" letter-spacing="1.5" fill="#1A1A1A">DEUX RÉGIMES</text>

    <rect x="840" y="272" width="280" height="176" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="858" y="302" class="display" font-size="19" font-weight="600" fill="#1A1A1A">Prefill</text>
    <text x="858" y="328" class="body" font-size="13" fill="#5A5A5A">lecture du prompt d'entrée</text>
    <text x="858" y="360" class="mono" font-size="12" fill="#B7332C">borné par le CALCUL</text>
    <text x="858" y="388" class="body" font-size="12.5" fill="#5A5A5A">la matrice n×n est le goulot ;</text>
    <text x="858" y="406" class="body" font-size="12.5" fill="#5A5A5A">c'est ici que O(n²) mord —</text>
    <text x="858" y="424" class="body" font-size="12.5" fill="#5A5A5A">et ce que la parcimonie attaque.</text>

    <rect x="840" y="466" width="280" height="176" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="858" y="496" class="display" font-size="19" font-weight="600" fill="#1A1A1A">Decode</text>
    <text x="858" y="522" class="body" font-size="13" fill="#5A5A5A">génération token par token</text>
    <text x="858" y="554" class="mono" font-size="12" fill="#1F5560">borné par la MÉMOIRE</text>
    <text x="858" y="582" class="body" font-size="12.5" fill="#5A5A5A">c'est la taille du KV-cache</text>
    <text x="858" y="600" class="body" font-size="12.5" fill="#5A5A5A">qui plafonne — objet des dossiers</text>
    <text x="858" y="618" class="body" font-size="12.5" fill="#5A5A5A">kv-cache et compression-kv-cache.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Source : Vaswani et al. 2017 ; Kwon et al. (vLLM) SOSP 2023. Coûts schématiques (ordres de grandeur, non à l'échelle).</text>
</svg>
