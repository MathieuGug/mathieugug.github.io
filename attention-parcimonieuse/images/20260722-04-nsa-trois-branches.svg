<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">NSA · trois branches, un gate appris</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Résumer grossièrement, sélectionner finement, garder le local — puis pondérer le tout par un gate différentiable.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Query -->
  <rect x="70" y="330" width="120" height="150" rx="4" fill="#1A1A1A" fill-opacity="0.06" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="130" y="398" class="display" font-size="18" font-weight="600" fill="#1A1A1A" text-anchor="middle">requête</text>
  <text x="130" y="422" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">token courant</text>
  <text x="130" y="524" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">tout le passé,</text>
  <text x="130" y="542" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">découpé en blocs</text>

  <!-- Arrows to branches -->
  <line x1="196" y1="365" x2="288" y2="248" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr4)"/>
  <line x1="196" y1="405" x2="288" y2="412" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr4)"/>
  <line x1="196" y1="445" x2="288" y2="576" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr4)"/>

  <!-- Branch 1: compression -->
  <g class="interactive" data-card="branche-compression" tabindex="0" role="button" aria-label="Branche compression — résumés grossiers par bloc">
    <rect x="295" y="200" width="470" height="118" rx="4" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.25"/>
    <text x="315" y="230" class="mono" font-size="12" letter-spacing="1.2" fill="#1F5560">BRANCHE 1 · COMPRESSION</text>
    <text x="315" y="258" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Résumer chaque bloc en un token</text>
    <text x="315" y="284" class="body" font-size="12.5" fill="#5A5A5A">Un petit réseau appris compresse chaque bloc contigu.</text>
    <text x="315" y="302" class="body" font-size="12.5" fill="#5A5A5A">Vue basse résolution de TOUT le contexte, coût réduit.</text>
  </g>

  <!-- Branch 2: selection -->
  <g class="interactive" data-card="branche-selection" tabindex="0" role="button" aria-label="Branche sélection — top-n blocs en pleine résolution">
    <rect x="295" y="358" width="470" height="118" rx="4" fill="#B7332C" fill-opacity="0.07" stroke="#B7332C" stroke-width="1.5"/>
    <text x="315" y="388" class="mono" font-size="12" letter-spacing="1.2" fill="#B7332C">BRANCHE 2 · SÉLECTION</text>
    <text x="315" y="416" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Top-n blocs, pleine résolution</text>
    <text x="315" y="442" class="body" font-size="12.5" fill="#5A5A5A">Les scores de compression classent les blocs ; on retient</text>
    <text x="315" y="460" class="body" font-size="12.5" fill="#5A5A5A">les meilleurs et on y regarde FINEMENT. La précision.</text>
  </g>

  <!-- Branch 3: window -->
  <g class="interactive" data-card="branche-fenetre" tabindex="0" role="button" aria-label="Branche fenêtre glissante — le voisinage local">
    <rect x="295" y="516" width="470" height="110" rx="4" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="315" y="546" class="mono" font-size="12" letter-spacing="1.2" fill="#B58A2C">BRANCHE 3 · FENÊTRE GLISSANTE</text>
    <text x="315" y="574" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Garantir le voisinage local</text>
    <text x="315" y="600" class="body" font-size="12.5" fill="#5A5A5A">Accès direct aux tokens récents, que les deux premières</text>
    <text x="315" y="618" class="body" font-size="12.5" fill="#5A5A5A">branches pourraient négliger.</text>
  </g>

  <!-- Arrows to gate -->
  <line x1="768" y1="259" x2="858" y2="378" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr4)"/>
  <line x1="768" y1="417" x2="858" y2="410" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr4)"/>
  <line x1="768" y1="571" x2="858" y2="442" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr4)"/>

  <!-- Gate -->
  <g class="interactive" data-card="gate-appris" tabindex="0" role="button" aria-label="Gate appris — pondération différentiable des trois branches">
    <rect x="865" y="340" width="150" height="150" rx="4" fill="#1A1A1A" fill-opacity="0.06" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="940" y="392" class="display" font-size="18" font-weight="600" fill="#1A1A1A" text-anchor="middle">gate</text>
    <text x="940" y="414" class="display" font-size="16" font-style="italic" fill="#5A5A5A" text-anchor="middle">appris</text>
    <text x="940" y="446" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">pondère les 3</text>
    <text x="940" y="463" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">par requête</text>
  </g>
  <line x1="1017" y1="415" x2="1095" y2="415" stroke="#B7332C" stroke-width="2.5" marker-end="url(#arr4)"/>
  <text x="1100" y="410" class="body" font-size="12" fill="#1A1A1A">sortie</text>
  <text x="1100" y="428" class="body" font-size="11" fill="#5A5A5A">d'attention</text>

  <!-- Hardware band -->
  <g class="interactive" data-card="hardware-align" tabindex="0" role="button" aria-label="Alignement matériel et sélection différentiable">
    <rect x="60" y="654" width="1080" height="66" rx="4" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
    <text x="80" y="682" class="mono" font-size="12" letter-spacing="1.2" fill="#B7332C">NATIVELY TRAINABLE · HARDWARE-ALIGNED</text>
    <text x="80" y="706" class="body" font-size="12.5" fill="#5A5A5A">Le gradient traverse la sélection par blocs (représenter et sélectionner s'apprennent ensemble). Noyaux GPU à accès contigus, intensité arithmétique équilibrée — 11× sur 64k.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="742" x2="1140" y2="742" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Source : Yuan et al., « Native Sparse Attention », ACL 2025 (Best Paper), arXiv:2502.11089.</text>
</svg>
