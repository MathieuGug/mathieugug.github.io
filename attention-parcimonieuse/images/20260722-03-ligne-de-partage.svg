<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
    .chip { font-size: 12px; }
  </style>
  <rect x="0" y="0" width="900" height="900" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="55" y="52" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 03</text>
  <text x="55" y="90" class="display" font-size="27" font-weight="600" fill="#1A1A1A">La ligne de partage</text>
  <text x="55" y="118" class="display" font-size="15.5" font-style="italic" fill="#5A5A5A">Deux axes : quand la parcimonie est-elle décidée, et que cible-t-elle ?</text>
  <line x1="55" y1="138" x2="845" y2="138" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Quadrant backgrounds -->
  <rect x="185" y="200" width="315" height="290" fill="#B58A2C" fill-opacity="0.05"/>
  <rect x="500" y="200" width="315" height="290" fill="#B7332C" fill-opacity="0.06"/>
  <rect x="185" y="490" width="315" height="290" fill="#1A1A1A" fill-opacity="0.04"/>
  <rect x="500" y="490" width="315" height="290" fill="#1F5560" fill-opacity="0.06"/>

  <!-- Axes -->
  <line x1="185" y1="490" x2="815" y2="490" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="500" y1="200" x2="500" y2="780" stroke="#1A1A1A" stroke-width="1.5"/>
  <rect x="185" y="200" width="630" height="580" fill="none" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- Axis labels -->
  <text x="342" y="188" class="mono" font-size="11.5" letter-spacing="1" fill="#5A5A5A" text-anchor="middle">DÉCIDÉ À L'INFÉRENCE · POST-HOC</text>
  <text x="658" y="188" class="mono" font-size="11.5" letter-spacing="1" fill="#B7332C" text-anchor="middle">DÉCIDÉ À L'ENTRAÎNEMENT · NATIF</text>
  <text x="175" y="345" class="mono" font-size="11.5" letter-spacing="1" fill="#5A5A5A" text-anchor="middle" transform="rotate(-90 175 345)">CIBLE : LE CALCUL DE L'ATTENTION</text>
  <text x="175" y="635" class="mono" font-size="11.5" letter-spacing="1" fill="#5A5A5A" text-anchor="middle" transform="rotate(-90 175 635)">CIBLE : LES OCTETS DU CACHE</text>

  <!-- Q top-left: post-hoc × compute -->
  <g class="interactive" data-card="quadrant-posthoc" tabindex="0" role="button" aria-label="Post-hoc — parcimonie greffée sur modèle figé">
    <text x="205" y="230" class="display" font-size="15" font-style="italic" fill="#B58A2C">Parcimonie dynamique, non apprise</text>
    <rect x="205" y="245" width="130" height="46" rx="4" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="270" y="266" class="body chip" fill="#1A1A1A" text-anchor="middle" font-weight="500">MInference</text>
    <text x="270" y="282" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">prefill dynamique</text>
    <rect x="345" y="245" width="130" height="46" rx="4" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="410" y="266" class="body chip" fill="#1A1A1A" text-anchor="middle" font-weight="500">Quest</text>
    <text x="410" y="282" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">pages requête-conscientes</text>
    <text x="205" y="330" class="body" font-size="12" fill="#5A5A5A">Motif calculé selon l'entrée, mais</text>
    <text x="205" y="348" class="body" font-size="12" fill="#5A5A5A">les poids ne changent pas.</text>
  </g>

  <!-- Q top-right: trained × compute -->
  <g class="interactive" data-card="quadrant-entraine" tabindex="0" role="button" aria-label="Natif — parcimonie entraînée dans le modèle">
    <text x="520" y="230" class="display" font-size="15" font-style="italic" fill="#B7332C">Parcimonie native, apprise</text>
    <rect x="520" y="245" width="128" height="46" rx="4" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.5"/>
    <text x="584" y="266" class="body chip" fill="#1A1A1A" text-anchor="middle" font-weight="600">NSA</text>
    <text x="584" y="282" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">trois branches</text>
    <rect x="656" y="245" width="128" height="46" rx="4" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.5"/>
    <text x="720" y="266" class="body chip" fill="#1A1A1A" text-anchor="middle" font-weight="600">MoBA</text>
    <text x="720" y="282" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">blocs = experts</text>
    <rect x="520" y="300" width="128" height="42" rx="4" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="584" y="326" class="body chip" fill="#1A1A1A" text-anchor="middle" font-weight="500">DSA</text>
    <rect x="656" y="300" width="128" height="42" rx="4" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="720" y="320" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle" font-weight="500">SeerAttention</text>
    <text x="720" y="335" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">gate distillé</text>
    <text x="520" y="372" class="body" font-size="12" fill="#5A5A5A">Le trou est le régime nominal :</text>
    <text x="520" y="390" class="body" font-size="12" fill="#5A5A5A">le modèle apprend à vivre avec.</text>
  </g>

  <!-- Q bottom-left: post-hoc × memory (OOD risk) -->
  <g class="interactive" data-card="risque-ood" tabindex="0" role="button" aria-label="Éviction gloutonne — le risque hors distribution">
    <text x="205" y="522" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Éviction gloutonne du cache</text>
    <rect x="205" y="538" width="128" height="44" rx="4" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.1"/>
    <text x="269" y="565" class="body chip" fill="#1A1A1A" text-anchor="middle" font-weight="500">H2O</text>
    <rect x="343" y="538" width="132" height="44" rx="4" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.1"/>
    <text x="409" y="560" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle" font-weight="500">StreamingLLM</text>
    <text x="409" y="574" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">puits d'attention</text>
    <rect x="205" y="600" width="270" height="8" rx="4" fill="#B7332C" fill-opacity="0.15"/>
    <text x="205" y="638" class="body" font-size="12" fill="#B7332C" font-weight="500">⚠ risque OOD</text>
    <text x="205" y="658" class="body" font-size="12" fill="#5A5A5A">le modèle n'a jamais vu ces trous</text>
    <text x="205" y="676" class="body" font-size="12" fill="#5A5A5A">à l'entraînement : l'info jetée est perdue.</text>
  </g>

  <!-- Q bottom-right: trained × memory (MLA analogy) -->
  <g class="interactive" data-card="analogie-mla" tabindex="0" role="button" aria-label="MLA / GQA — l'analogie de la compression apprise">
    <text x="520" y="522" class="display" font-size="15" font-style="italic" fill="#1F5560">Compression apprise de la mémoire</text>
    <rect x="520" y="538" width="128" height="44" rx="4" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.25"/>
    <text x="584" y="565" class="body chip" fill="#1A1A1A" text-anchor="middle" font-weight="600">MLA</text>
    <rect x="656" y="538" width="128" height="44" rx="4" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.25"/>
    <text x="720" y="565" class="body chip" fill="#1A1A1A" text-anchor="middle" font-weight="600">GQA</text>
    <text x="520" y="614" class="body" font-size="12" fill="#5A5A5A">L'objet du dossier compression-kv-cache.</text>
    <text x="520" y="646" class="display" font-size="13.5" font-style="italic" fill="#1F5560">L'analogie porteuse ↔</text>
    <text x="520" y="668" class="body" font-size="12" fill="#5A5A5A">la parcimonie native est à l'éviction</text>
    <text x="520" y="686" class="body" font-size="12" fill="#5A5A5A">ce que MLA est à GQA.</text>
  </g>

  <!-- Diagonal analogy hint -->
  <line x1="336" y1="604" x2="518" y2="604" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="3 3"/>

  <!-- Footer -->
  <line x1="55" y1="840" x2="845" y2="840" stroke="#E5E1D8" stroke-width="1"/>
  <text x="55" y="868" class="body" font-size="10" font-style="italic" letter-spacing="0.3" fill="#5A5A5A">Sources : Zhang et al. 2023 ; Xiao et al. 2024 ; Jiang et al. 2024 ; Tang et al. 2024 ; Yuan et al. 2025 ; Lu et al. 2025 ; DeepSeek 2025.</text>
</svg>
