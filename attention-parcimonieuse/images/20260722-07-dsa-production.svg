<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arr7" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">DSA · la parcimonie entre en production</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Un indexeur distillé désigne les tokens ; la sélection top-k rend le coût linéaire. DeepSeek-V3.2-Exp.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Mechanism (left) -->
  <rect x="70" y="205" width="100" height="110" rx="4" fill="#1A1A1A" fill-opacity="0.06" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="120" y="256" class="display" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">requête</text>
  <text x="120" y="278" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">+ contexte</text>
  <line x1="172" y1="260" x2="214" y2="260" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr7)"/>

  <g class="interactive" data-card="lightning-indexer" tabindex="0" role="button" aria-label="Lightning indexer — la fonction de score distillée">
    <rect x="218" y="200" width="230" height="120" rx="4" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.5"/>
    <text x="238" y="228" class="mono" font-size="11" letter-spacing="1" fill="#B7332C">LIGHTNING INDEXER</text>
    <text x="238" y="256" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Score de similarité léger</text>
    <text x="238" y="282" class="body" font-size="12" fill="#5A5A5A">Entraîné sur 2,1 Md tokens à prédire</text>
    <text x="238" y="300" class="body" font-size="12" fill="#5A5A5A">ce que la dense de V3.1 regardait.</text>
  </g>
  <line x1="450" y1="260" x2="492" y2="260" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr7)"/>

  <g class="interactive" data-card="topk-select" tabindex="0" role="button" aria-label="Sélection top-k fine sur MLA">
    <rect x="496" y="200" width="210" height="120" rx="4" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.25"/>
    <text x="516" y="228" class="mono" font-size="11" letter-spacing="1" fill="#1F5560">SÉLECTION TOP-K</text>
    <text x="516" y="256" class="display" font-size="16" font-weight="600" fill="#1A1A1A">k tokens seulement</text>
    <text x="516" y="282" class="body" font-size="12" fill="#5A5A5A">Attention calculée en MLA</text>
    <text x="516" y="300" class="body" font-size="12" fill="#5A5A5A">sur les k désignés (pont latent).</text>
  </g>

  <!-- Cost chart (right) -->
  <g class="interactive" data-card="cout-lineaire" tabindex="0" role="button" aria-label="Coût linéaire O(Lk)">
    <rect x="740" y="190" width="400" height="240" rx="4" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="762" y="220" class="mono" font-size="11" letter-spacing="1" fill="#1A1A1A">COÛT CŒUR D'ATTENTION</text>
    <line x1="775" y1="400" x2="1110" y2="400" stroke="#1A1A1A" stroke-width="1.1" marker-end="url(#arr7)"/>
    <line x1="775" y1="400" x2="775" y2="240" stroke="#1A1A1A" stroke-width="1.1" marker-end="url(#arr7)"/>
    <text x="1085" y="420" class="body" font-size="11" fill="#5A5A5A">longueur L</text>
    <path d="M775,400 C930,392 1010,320 1070,250" fill="none" stroke="#B7332C" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="1000" y="288" class="mono" font-size="12" fill="#B7332C">O(L²) dense</text>
    <line x1="775" y1="400" x2="1090" y2="336" stroke="#1F5560" stroke-width="2.5"/>
    <text x="900" y="352" class="mono" font-size="12" fill="#1F5560">O(Lk) — DSA</text>
    <text x="762" y="392" class="body" font-size="11" font-style="italic" fill="#5A5A5A">linéaire en longueur d'entrée</text>
  </g>

  <!-- Key result strip -->
  <rect x="70" y="360" width="636" height="70" rx="4" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
  <text x="92" y="388" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Qualité quasi identique à la dense — pour la moitié du prix.</text>
  <text x="92" y="412" class="body" font-size="12.5" fill="#5A5A5A">Seule modification de V3.2-Exp vs V3.1-Terminus. La complexité passe de O(L²) à O(Lk).</text>

  <!-- Adoption timeline -->
  <g class="interactive" data-card="adoption" tabindex="0" role="button" aria-label="Adoption — de l'artefact de recherche à la brique de service">
    <rect x="60" y="470" width="1080" height="240" rx="4" fill="#1A1A1A" fill-opacity="0.03" stroke="#1A1A1A" stroke-width="1"/>
    <text x="82" y="502" class="mono" font-size="12" letter-spacing="1.2" fill="#1A1A1A">DE L'ARTEFACT DE RECHERCHE À LA BRIQUE DE SERVICE</text>
    <line x1="150" y1="590" x2="1080" y2="590" stroke="#B8B5AE" stroke-width="1.25"/>

    <circle cx="220" cy="590" r="8" fill="#5A5A5A"/>
    <text x="220" y="558" class="display" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">V3.1-Terminus</text>
    <text x="220" y="622" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">dense (référence)</text>

    <circle cx="560" cy="590" r="9" fill="#B7332C"/>
    <text x="560" y="558" class="display" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">V3.2-Exp · sept. 2025</text>
    <text x="560" y="622" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">introduit DSA</text>
    <text x="560" y="642" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">indexeur + top-k</text>

    <circle cx="920" cy="590" r="8" fill="#1F5560"/>
    <text x="920" y="558" class="display" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">vLLM · SGLang</text>
    <text x="920" y="622" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">support day-0 des noyaux</text>
    <text x="920" y="642" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">DSA · prix API −50 %</text>

    <text x="600" y="690" class="display" font-size="14" font-style="italic" fill="#B7332C" text-anchor="middle">La parcimonie entraînée cesse d'être un résultat de laboratoire : elle est servie, tarifée, à grande échelle.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="742" x2="1140" y2="742" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Source : DeepSeek-AI, « DeepSeek-V3.2 », arXiv:2512.02556 ; dépôt deepseek-ai/DeepSeek-V3.2-Exp ; blogs vLLM / SGLang, 29 septembre 2025.</text>
</svg>
