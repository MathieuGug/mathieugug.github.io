<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arr5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#B7332C" stroke-width="1.4"/>
    </marker>
    <marker id="arr5g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#B8B5AE" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">MoBA · l'attention comme mélange d'experts</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Les blocs de contexte deviennent des experts ; un routeur envoie chaque requête vers les top-k blocs.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Query + router -->
  <rect x="70" y="230" width="110" height="120" rx="4" fill="#1A1A1A" fill-opacity="0.06" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="125" y="288" class="display" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="middle">requête</text>
  <text x="125" y="310" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">token courant</text>
  <line x1="182" y1="290" x2="228" y2="290" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr5)"/>

  <g class="interactive" data-card="routeur-topk" tabindex="0" role="button" aria-label="Routeur top-k — sélection apprise des blocs">
    <rect x="232" y="230" width="130" height="120" rx="4" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.5"/>
    <text x="297" y="282" class="display" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="middle">routeur</text>
    <text x="297" y="304" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">affinité requête</text>
    <text x="297" y="320" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">× bloc → top-k</text>
  </g>

  <!-- Blocks (experts) -->
  <g class="interactive" data-card="blocs-experts" tabindex="0" role="button" aria-label="Blocs de contexte comme experts">
    <text x="400" y="204" class="mono" font-size="12" letter-spacing="1" fill="#5A5A5A">CONTEXTE DÉCOUPÉ EN BLOCS = EXPERTS</text>
    <!-- selected blocks (carmine) -->
    <rect x="400" y="222" width="92" height="70" rx="3" fill="#B7332C" fill-opacity="0.14" stroke="#B7332C" stroke-width="1.5"/>
    <text x="446" y="262" class="mono" font-size="13" fill="#B7332C" text-anchor="middle">bloc 1</text>
    <rect x="700" y="222" width="92" height="70" rx="3" fill="#B7332C" fill-opacity="0.14" stroke="#B7332C" stroke-width="1.5"/>
    <text x="746" y="262" class="mono" font-size="13" fill="#B7332C" text-anchor="middle">bloc 4</text>
    <rect x="1000" y="222" width="92" height="70" rx="3" fill="#B7332C" fill-opacity="0.14" stroke="#B7332C" stroke-width="1.5"/>
    <text x="1046" y="262" class="mono" font-size="13" fill="#B7332C" text-anchor="middle">bloc 7</text>
    <!-- skipped blocks (grey) -->
    <rect x="500" y="222" width="92" height="70" rx="3" fill="#B8B5AE" fill-opacity="0.10" stroke="#B8B5AE" stroke-width="1.1"/>
    <text x="546" y="262" class="mono" font-size="13" fill="#9a9ca5" text-anchor="middle">bloc 2</text>
    <rect x="600" y="222" width="92" height="70" rx="3" fill="#B8B5AE" fill-opacity="0.10" stroke="#B8B5AE" stroke-width="1.1"/>
    <text x="646" y="262" class="mono" font-size="13" fill="#9a9ca5" text-anchor="middle">bloc 3</text>
    <rect x="800" y="222" width="92" height="70" rx="3" fill="#B8B5AE" fill-opacity="0.10" stroke="#B8B5AE" stroke-width="1.1"/>
    <text x="846" y="262" class="mono" font-size="13" fill="#9a9ca5" text-anchor="middle">bloc 5</text>
    <rect x="900" y="222" width="92" height="70" rx="3" fill="#B8B5AE" fill-opacity="0.10" stroke="#B8B5AE" stroke-width="1.1"/>
    <text x="946" y="262" class="mono" font-size="13" fill="#9a9ca5" text-anchor="middle">bloc 6</text>
    <text x="400" y="316" class="body" font-size="11.5" fill="#B7332C">■ sélectionnés (calculés)</text>
    <text x="640" y="316" class="body" font-size="11.5" fill="#9a9ca5">■ ignorés (économie)</text>
  </g>

  <!-- router arrows to selected -->
  <line x1="364" y1="278" x2="398" y2="262" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arr5)"/>
  <line x1="364" y1="286" x2="698" y2="258" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arr5)"/>
  <line x1="364" y1="294" x2="998" y2="258" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arr5)"/>
  <line x1="364" y1="304" x2="498" y2="258" stroke="#B8B5AE" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- less structure -->
  <g class="interactive" data-card="less-structure" tabindex="0" role="button" aria-label="Le principe less structure">
    <rect x="60" y="400" width="530" height="150" rx="4" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="82" y="432" class="mono" font-size="12" letter-spacing="1.2" fill="#1F5560">PRINCIPE · « LESS STRUCTURE »</text>
    <text x="82" y="462" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Ne rien présupposer sur le « où »</text>
    <text x="82" y="490" class="body" font-size="12.5" fill="#5A5A5A">Contrairement à Longformer ou StreamingLLM qui imposent</text>
    <text x="82" y="508" class="body" font-size="12.5" fill="#5A5A5A">fenêtre et puits, MoBA n'impose aucun motif : le routeur</text>
    <text x="82" y="526" class="body" font-size="12.5" fill="#5A5A5A">apprend seul où se trouve l'information pertinente.</text>
  </g>

  <!-- switch full/sparse -->
  <g class="interactive" data-card="switch-full-sparse" tabindex="0" role="button" aria-label="Bascule sans couture full vers sparse">
    <rect x="610" y="400" width="530" height="150" rx="4" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="632" y="432" class="mono" font-size="12" letter-spacing="1.2" fill="#B58A2C">BASCULE SANS COUTURE</text>
    <text x="632" y="462" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Full ↔ sparse, sans réentraîner</text>
    <text x="632" y="490" class="body" font-size="12.5" fill="#5A5A5A">MoBA sur certaines couches, dense sur d'autres ; passage</text>
    <text x="632" y="508" class="body" font-size="12.5" fill="#5A5A5A">de l'un à l'autre selon la phase. Déployé en production</text>
    <text x="632" y="526" class="body" font-size="12.5" fill="#5A5A5A">sur Kimi (Moonshot) pour les requêtes long-contexte.</text>
  </g>

  <!-- NSA vs MoBA comparison -->
  <rect x="60" y="580" width="1080" height="132" rx="4" fill="#1A1A1A" fill-opacity="0.03" stroke="#1A1A1A" stroke-width="1"/>
  <text x="82" y="610" class="mono" font-size="12" letter-spacing="1.2" fill="#1A1A1A">DEUX PHILOSOPHIES DE LA MÊME BASCULE</text>
  <line x1="600" y1="626" x2="600" y2="694" stroke="#E5E1D8" stroke-width="1"/>
  <text x="82" y="644" class="display" font-size="15" font-weight="600" fill="#B7332C">NSA</text>
  <text x="140" y="644" class="body" font-size="13" fill="#5A5A5A">trois branches FIXES, chacune apprise</text>
  <text x="82" y="668" class="body" font-size="12.5" fill="#5A5A5A">compression + sélection + fenêtre, combinées par un gate.</text>
  <text x="82" y="690" class="body" font-size="12.5" fill="#5A5A5A">La structure est posée ; ses paramètres s'apprennent.</text>
  <text x="622" y="644" class="display" font-size="15" font-weight="600" fill="#1F5560">MoBA</text>
  <text x="692" y="644" class="body" font-size="13" fill="#5A5A5A">une branche, mais un ROUTAGE de type MoE</text>
  <text x="622" y="668" class="body" font-size="12.5" fill="#5A5A5A">router chaque requête vers k blocs sur N, comme un MoE</text>
  <text x="622" y="690" class="body" font-size="12.5" fill="#5A5A5A">route un token vers k experts FFN. Moins de structure.</text>

  <!-- Footer -->
  <line x1="60" y1="742" x2="1140" y2="742" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Source : Lu et al., « MoBA: Mixture of Block Attention for Long-Context LLMs », Moonshot AI, arXiv:2502.13189.</text>
</svg>
