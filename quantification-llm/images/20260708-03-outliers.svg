<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Le problème des valeurs aberrantes</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Quelques canaux à magnitude extrême cassent la quantification naïve. Toute la discipline en découle.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- LEFT: activation histogram with outliers -->
  <g class="interactive" data-card="emergent-features" tabindex="0" role="button" aria-label="Traits émergents">
    <text x="60" y="195" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Distribution des activations</text>
    <line x1="90" y1="450" x2="470" y2="450" stroke="#1A1A1A" stroke-width="1.25"/>
    <line x1="90" y1="230" x2="90" y2="450" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="72" y="240" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">|max|</text>
    <!-- normal channels -->
    <g fill="#1F5560" fill-opacity="0.55">
      <rect x="100" y="432" width="10" height="18"/><rect x="114" y="428" width="10" height="22"/>
      <rect x="128" y="436" width="10" height="14"/><rect x="142" y="430" width="10" height="20"/>
      <rect x="156" y="434" width="10" height="16"/><rect x="184" y="431" width="10" height="19"/>
      <rect x="198" y="435" width="10" height="15"/><rect x="212" y="429" width="10" height="21"/>
      <rect x="240" y="433" width="10" height="17"/><rect x="254" y="430" width="10" height="20"/>
      <rect x="282" y="434" width="10" height="16"/><rect x="296" y="428" width="10" height="22"/>
      <rect x="338" y="432" width="10" height="18"/><rect x="352" y="435" width="10" height="15"/>
      <rect x="394" y="430" width="10" height="20"/><rect x="408" y="433" width="10" height="17"/>
      <rect x="436" y="431" width="10" height="19"/><rect x="450" y="434" width="10" height="16"/>
    </g>
    <!-- outlier channels -->
    <rect x="170" y="245" width="10" height="205" fill="#B7332C"/>
    <rect x="316" y="262" width="10" height="188" fill="#B7332C"/>
    <rect x="368" y="250" width="10" height="200" fill="#B7332C"/>
    <text x="300" y="470" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">canaux (dimensions du modèle)</text>
    <text x="200" y="240" class="body" font-size="11" fill="#B7332C">&lt; 0,1 % des canaux — outliers émergents</text>
  </g>

  <!-- why it breaks -->
  <g class="interactive" data-card="why-breaks-int8" tabindex="0" role="button" aria-label="Pourquoi ça casse INT8">
    <rect x="90" y="500" width="380" height="88" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.25"/>
    <text x="106" y="524" class="body" font-size="12" font-weight="600" fill="#1A1A1A">Pourquoi une seule échelle s'effondre</text>
    <text x="106" y="546" class="body" font-size="11.5" fill="#5A5A5A">Un pic à 70 quand le reste est à ~0,1 force un pas si</text>
    <text x="106" y="563" class="body" font-size="11.5" fill="#5A5A5A">grossier que les valeurs normales tombent dans le bruit</text>
    <text x="106" y="580" class="body" font-size="11.5" fill="#5A5A5A">d'arrondi. Découverte : LLM.int8(), Dettmers 2022.</text>
  </g>

  <!-- RIGHT TOP: SmoothQuant migration -->
  <g class="interactive" data-card="smoothquant-migration" tabindex="0" role="button" aria-label="SmoothQuant : migration de difficulté">
    <text x="560" y="195" class="body" font-size="13" font-weight="600" fill="#1A1A1A">SmoothQuant — migrer la difficulté</text>
    <!-- activation before -->
    <rect x="560" y="220" width="110" height="70" rx="3" fill="#B7332C" fill-opacity="0.16" stroke="#B7332C" stroke-width="1.25"/>
    <text x="615" y="252" class="body" font-size="11.5" fill="#1A1A1A" text-anchor="middle">activation X</text>
    <text x="615" y="270" class="body" font-size="10.5" fill="#B7332C" text-anchor="middle">difficile (outliers)</text>
    <!-- weight before -->
    <rect x="560" y="310" width="110" height="70" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1.25"/>
    <text x="615" y="342" class="body" font-size="11.5" fill="#1A1A1A" text-anchor="middle">poids W</text>
    <text x="615" y="360" class="body" font-size="10.5" fill="#1F5560" text-anchor="middle">facile</text>
    <!-- migration arrow -->
    <path d="M 690 265 C 760 265, 760 335, 690 335" fill="none" stroke="#B58A2C" stroke-width="2" marker-end="url(#arr03)"/>
    <text x="805" y="290" class="body" font-size="11" fill="#B58A2C" text-anchor="middle">÷ α  sur X</text>
    <text x="805" y="308" class="body" font-size="11" fill="#B58A2C" text-anchor="middle">× α  sur W</text>
    <!-- after -->
    <rect x="880" y="220" width="120" height="70" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1.25"/>
    <text x="940" y="248" class="body" font-size="11.5" fill="#1A1A1A" text-anchor="middle">X lissée</text>
    <text x="940" y="266" class="body" font-size="10.5" fill="#1F5560" text-anchor="middle">quantifiable</text>
    <rect x="880" y="310" width="120" height="70" rx="3" fill="#B58A2C" fill-opacity="0.14" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="940" y="338" class="body" font-size="11.5" fill="#1A1A1A" text-anchor="middle">W à peine durcie</text>
    <text x="940" y="356" class="body" font-size="10.5" fill="#B58A2C" text-anchor="middle">sortie inchangée</text>
    <text x="1015" y="255" class="body" font-size="11" fill="#5A5A5A" transform="rotate(90 1015 255)" text-anchor="middle"> </text>
  </g>

  <!-- RIGHT BOTTOM: mixed decomposition -->
  <g class="interactive" data-card="mixed-decomposition" tabindex="0" role="button" aria-label="Décomposition à précision mixte">
    <text x="560" y="440" class="body" font-size="13" font-weight="600" fill="#1A1A1A">LLM.int8() — décomposition mixte</text>
    <rect x="560" y="460" width="300" height="120" rx="3" fill="none" stroke="#5A5A5A" stroke-width="1"/>
    <!-- int8 mass -->
    <rect x="560" y="460" width="250" height="120" fill="#1F5560" fill-opacity="0.14"/>
    <text x="685" y="525" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">99,9 %  →  INT8</text>
    <!-- fp16 outlier columns -->
    <rect x="810" y="460" width="50" height="120" fill="#B7332C" fill-opacity="0.22"/>
    <text x="835" y="516" class="body" font-size="10" fill="#B7332C" text-anchor="middle">outliers</text>
    <text x="835" y="532" class="body" font-size="10" fill="#B7332C" text-anchor="middle">FP16</text>
    <text x="560" y="600" class="body" font-size="11" fill="#5A5A5A">Correct — mais la voie mixte casse la régularité du calcul.</text>
  </g>

  <defs>
    <marker id="arr03" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#B58A2C" stroke-width="1.25"/></marker>
  </defs>

  <line x1="60" y1="720" x2="1140" y2="720" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="748" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Sources : Dettmers et al., LLM.int8(), NeurIPS 2022 ; Xiao et al., SmoothQuant, ICML 2023.</text>
</svg>
