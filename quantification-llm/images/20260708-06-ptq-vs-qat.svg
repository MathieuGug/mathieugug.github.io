<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">PTQ contre QAT : coût contre qualité</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Payer du calcul d'entraînement pour repousser la falaise des basses précisions.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Axes -->
  <line x1="150" y1="640" x2="1090" y2="640" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="150" y1="200" x2="150" y2="640" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="620" y="690" class="body" font-size="12.5" fill="#1A1A1A" text-anchor="middle">coût de calibration / entraînement  →  (minutes GPU → jours GPU, échelle log)</text>
  <text x="105" y="420" class="body" font-size="12.5" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90 105 420)">qualité récupérée à basse précision  →</text>

  <!-- x ticks -->
  <text x="280" y="662" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">~minutes</text>
  <text x="560" y="662" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">~heures</text>
  <text x="850" y="662" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">~jours</text>

  <!-- horizontal quality bands -->
  <line x1="150" y1="270" x2="1090" y2="270" stroke="#E5E1D8" stroke-width="0.75" stroke-dasharray="2 3"/>
  <text x="160" y="264" class="body" font-size="10" fill="#5A5A5A">qualité ≈ FP16</text>

  <!-- PTQ zone -->
  <g class="interactive" data-card="ptq-fast" tabindex="0" role="button" aria-label="PTQ — rapide, plafonne au bord de la falaise">
    <ellipse cx="300" cy="360" rx="120" ry="80" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25" stroke-dasharray="3 3"/>
    <text x="300" y="330" class="body" font-size="13" font-weight="600" fill="#1F5560" text-anchor="middle">PTQ</text>
    <circle cx="255" cy="360" r="5" fill="#1F5560"/><text x="248" y="380" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">GPTQ</text>
    <circle cx="320" cy="345" r="5" fill="#1F5560"/><text x="330" y="342" class="body" font-size="10" fill="#5A5A5A">AWQ</text>
    <circle cx="300" cy="395" r="5" fill="#1F5560"/><text x="310" y="410" class="body" font-size="10" fill="#5A5A5A">GGUF</text>
    <text x="300" y="430" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">excellent ≥4 bits</text>
  </g>

  <!-- Rotations zone -->
  <g class="interactive" data-card="rotations-mid" tabindex="0" role="button" aria-label="Rotations — repoussent la falaise à coût modéré">
    <ellipse cx="560" cy="315" rx="110" ry="70" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25" stroke-dasharray="3 3"/>
    <text x="560" y="292" class="body" font-size="13" font-weight="600" fill="#B58A2C" text-anchor="middle">Rotations</text>
    <circle cx="520" cy="320" r="5" fill="#B58A2C"/><text x="512" y="338" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">QuaRot</text>
    <circle cx="595" cy="308" r="5" fill="#B58A2C"/><text x="605" y="305" class="body" font-size="10" fill="#5A5A5A">SpinQuant</text>
    <text x="560" y="360" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">débloque le 4 bits complet</text>
  </g>

  <!-- QAT zone -->
  <g class="interactive" data-card="qat-costly" tabindex="0" role="button" aria-label="QAT — coûteuse mais meilleure qualité récupérée">
    <ellipse cx="870" cy="290" rx="120" ry="80" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.25" stroke-dasharray="3 3"/>
    <text x="870" y="262" class="body" font-size="13" font-weight="600" fill="#B7332C" text-anchor="middle">QAT</text>
    <circle cx="830" cy="300" r="5" fill="#B7332C"/><text x="822" y="318" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">LLM-QAT</text>
    <circle cx="900" cy="285" r="5" fill="#B7332C"/><text x="910" y="282" class="body" font-size="10" fill="#5A5A5A">Apple ~2 bits</text>
    <text x="870" y="345" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">tient sous 4 bits</text>
  </g>

  <!-- The cliff, for naive PTQ below 4 bits -->
  <g class="interactive" data-card="cliff-4bit" tabindex="0" role="button" aria-label="La falaise sous 4 bits pour la PTQ naïve">
    <path d="M 200 470 L 380 480 C 430 485, 440 590, 470 600 L 620 610" fill="none" stroke="#B7332C" stroke-width="2.5"/>
    <text x="250" y="460" class="body" font-size="11" fill="#B7332C">PTQ naïve : chute sous 4 bits</text>
    <circle cx="200" cy="470" r="4" fill="#B7332C"/>
    <circle cx="470" cy="600" r="4" fill="#B7332C"/>
    <text x="500" y="600" class="body" font-size="10.5" fill="#5A5A5A">2 bits sans artillerie</text>
  </g>

  <!-- Ternary native, off-scale -->
  <g class="interactive" data-card="ternary-native6" tabindex="0" role="button" aria-label="Ternaire natif — hors échelle PTQ">
    <rect x="1000" y="205" width="120" height="130" rx="3" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-width="1.25"/>
    <text x="1060" y="232" class="body" font-size="12" font-weight="600" fill="#2F5D3F" text-anchor="middle">BitNet</text>
    <text x="1060" y="250" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">1,58 bit natif</text>
    <text x="1060" y="278" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">entraîné ainsi</text>
    <text x="1060" y="294" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">dès le départ —</text>
    <text x="1060" y="310" class="body" font-size="10" fill="#2F5D3F" text-anchor="middle">hors courbe PTQ</text>
  </g>

  <line x1="60" y1="720" x2="1140" y2="720" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="748" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Positions schématiques. Sources : LLM-QAT ; EfficientQAT ; Apple Foundation Models ; BitNet b1.58, 2024.</text>
</svg>
