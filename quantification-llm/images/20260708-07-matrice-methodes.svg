<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Le paysage des méthodes</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Neuf approches, cinq dimensions : bits, cibles, réentraînement, matériel, qualité.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Column headers -->
  <text x="70" y="200" class="body" font-size="11.5" font-weight="600" fill="#1A1A1A">Méthode</text>
  <text x="360" y="200" class="body" font-size="11.5" font-weight="600" fill="#1A1A1A" text-anchor="middle">Bits</text>
  <text x="490" y="200" class="body" font-size="11.5" font-weight="600" fill="#1A1A1A" text-anchor="middle">Cible</text>
  <g class="interactive" data-card="col-retrain" tabindex="0" role="button" aria-label="Colonne réentraînement">
    <rect x="600" y="184" width="150" height="480" fill="#B7332C" fill-opacity="0.04"/>
    <text x="675" y="200" class="body" font-size="11.5" font-weight="600" fill="#B7332C" text-anchor="middle">Réentraîne ?</text>
  </g>
  <g class="interactive" data-card="col-hardware" tabindex="0" role="button" aria-label="Colonne matériel natif">
    <rect x="770" y="184" width="180" height="480" fill="#1F5560" fill-opacity="0.04"/>
    <text x="860" y="200" class="body" font-size="11.5" font-weight="600" fill="#1F5560" text-anchor="middle">Matériel natif</text>
  </g>
  <text x="1050" y="200" class="body" font-size="11.5" font-weight="600" fill="#1A1A1A" text-anchor="middle">Qualité</text>
  <line x1="60" y1="212" x2="1140" y2="212" stroke="#1A1A1A" stroke-width="1"/>

  <!-- Rows -->
  <!-- helper: symbols ● full ◐ partial ○ none -->
  <!-- Row 1 LLM.int8 -->
  <g>
    <text x="70" y="242" class="body" font-size="12.5" fill="#1A1A1A">LLM.int8()</text>
    <text x="360" y="242" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">8</text>
    <text x="490" y="242" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">W+A</text>
    <text x="675" y="242" class="body" font-size="13" fill="#2F5D3F" text-anchor="middle">non</text>
    <text x="860" y="242" class="body" font-size="13" fill="#1F5560" text-anchor="middle">INT8</text>
    <text x="1050" y="242" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">●●●○</text>
  </g>
  <!-- Row 2 SmoothQuant -->
  <g>
    <text x="70" y="286" class="body" font-size="12.5" fill="#1A1A1A">SmoothQuant</text>
    <text x="360" y="286" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">8</text>
    <text x="490" y="286" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">W+A</text>
    <text x="675" y="286" class="body" font-size="13" fill="#2F5D3F" text-anchor="middle">non</text>
    <text x="860" y="286" class="body" font-size="13" fill="#1F5560" text-anchor="middle">INT8</text>
    <text x="1050" y="286" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">●●●○</text>
  </g>
  <line x1="60" y1="306" x2="1140" y2="306" stroke="#E5E1D8" stroke-width="0.5"/>
  <!-- Row 3 GPTQ -->
  <g>
    <text x="70" y="330" class="body" font-size="12.5" fill="#1A1A1A">GPTQ</text>
    <text x="360" y="330" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">3-4</text>
    <text x="490" y="330" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">W</text>
    <text x="675" y="330" class="body" font-size="13" fill="#2F5D3F" text-anchor="middle">non</text>
    <text x="860" y="330" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">via kernels</text>
    <text x="1050" y="330" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">●●●○</text>
  </g>
  <!-- Row 4 AWQ -->
  <g>
    <text x="70" y="374" class="body" font-size="12.5" fill="#1A1A1A">AWQ</text>
    <text x="360" y="374" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">4</text>
    <text x="490" y="374" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">W</text>
    <text x="675" y="374" class="body" font-size="13" fill="#2F5D3F" text-anchor="middle">non</text>
    <text x="860" y="374" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">via kernels</text>
    <text x="1050" y="374" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">●●●◐</text>
  </g>
  <!-- Row 5 QuaRot / Row 6 SpinQuant (rotations group) -->
  <g class="interactive" data-card="row-rotations" tabindex="0" role="button" aria-label="Les rotations : QuaRot et SpinQuant">
    <rect x="60" y="392" width="1080" height="90" fill="#B58A2C" fill-opacity="0.06"/>
    <text x="70" y="420" class="body" font-size="12.5" fill="#1A1A1A">QuaRot</text>
    <text x="360" y="420" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">4</text>
    <text x="490" y="420" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">W+A+KV</text>
    <text x="675" y="420" class="body" font-size="13" fill="#2F5D3F" text-anchor="middle">non</text>
    <text x="860" y="420" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Hadamard</text>
    <text x="1050" y="420" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">●●●◐</text>
    <text x="70" y="464" class="body" font-size="12.5" fill="#1A1A1A">SpinQuant</text>
    <text x="360" y="464" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">4</text>
    <text x="490" y="464" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">W+A+KV</text>
    <text x="675" y="464" class="body" font-size="12" fill="#B58A2C" text-anchor="middle">léger (rot.)</text>
    <text x="860" y="464" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Hadamard</text>
    <text x="1050" y="464" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">●●●●</text>
    <text x="1130" y="437" class="body" font-size="10.5" fill="#B58A2C" text-anchor="end" transform="rotate(-90 1130 437)">rotations</text>
  </g>
  <line x1="60" y1="482" x2="1140" y2="482" stroke="#E5E1D8" stroke-width="0.5"/>
  <!-- Row 7 GGUF -->
  <g>
    <text x="70" y="510" class="body" font-size="12.5" fill="#1A1A1A">GGUF k-quant</text>
    <text x="360" y="510" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">2-8</text>
    <text x="490" y="510" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">W</text>
    <text x="675" y="510" class="body" font-size="13" fill="#2F5D3F" text-anchor="middle">non</text>
    <text x="860" y="510" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">CPU/GPU</text>
    <text x="1050" y="510" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">●●◐○</text>
  </g>
  <!-- Row 8 BitNet + Row 9 NVFP4 (native formats group) -->
  <g class="interactive" data-card="row-native-formats" tabindex="0" role="button" aria-label="Formats natifs : BitNet et NVFP4">
    <rect x="60" y="528" width="1080" height="92" fill="#1F5560" fill-opacity="0.06"/>
    <text x="70" y="556" class="body" font-size="12.5" fill="#1A1A1A">BitNet b1.58</text>
    <text x="360" y="556" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">1,58</text>
    <text x="490" y="556" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">W</text>
    <text x="675" y="556" class="body" font-size="12" fill="#B7332C" text-anchor="middle">natif (dès 0)</text>
    <text x="860" y="556" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">CPU (add.)</text>
    <text x="1050" y="556" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">●●●◐</text>
    <text x="70" y="600" class="body" font-size="12.5" fill="#1A1A1A">NVFP4 / MXFP4</text>
    <text x="360" y="600" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">4 (FP)</text>
    <text x="490" y="600" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">W+A</text>
    <text x="675" y="600" class="body" font-size="12" fill="#B58A2C" text-anchor="middle">calibr. (MR-GPTQ)</text>
    <text x="860" y="600" class="body" font-size="12" fill="#1F5560" text-anchor="middle" font-weight="600">Blackwell</text>
    <text x="1050" y="600" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">●●●●</text>
    <text x="1130" y="573" class="body" font-size="10.5" fill="#1F5560" text-anchor="end" transform="rotate(-90 1130 573)">natif HW</text>
  </g>

  <!-- Legend -->
  <text x="70" y="656" class="body" font-size="10.5" fill="#5A5A5A">Qualité (4 pastilles) : ● pleine · ◐ partielle · ○ vide — lecture qualitative, non un score.</text>

  <line x1="60" y1="720" x2="1140" y2="720" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="748" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Synthèse de l'auteur d'après les publications citées (2022-2025). Positions indicatives, dépendantes du modèle et de la tâche.</text>
</svg>
