<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">L'échelle des bits</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Chaque palier vers le bas double le débit — et rapproche de la falaise de qualité.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Axis -->
  <text x="60" y="200" class="mono" font-size="12" fill="#5A5A5A">bits / poids</text>
  <line x1="120" y1="620" x2="1120" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="120" y="645" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">16</text>
  <text x="370" y="645" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">8</text>
  <text x="620" y="645" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">4</text>
  <text x="870" y="645" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">2</text>
  <text x="1070" y="645" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">1,58</text>
  <text x="600" y="678" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">← moins de mémoire, plus de débit · plus de risque de dégradation →</text>

  <!-- Memory bars (70B model footprint, height ∝ GB) -->
  <!-- FP16: 140 GB -->
  <g class="interactive" data-card="fp16-baseline" tabindex="0" role="button" aria-label="FP16 — référence pleine précision">
    <rect x="90" y="250" width="120" height="370" rx="3" fill="#1F5560" fill-opacity="0.14" stroke="#1F5560" stroke-width="1.25"/>
    <text x="150" y="235" class="mono" font-size="13" fill="#1F5560" text-anchor="middle" font-weight="500">140 Go</text>
    <text x="150" y="290" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle" font-weight="600">FP16</text>
    <text x="150" y="310" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">BF16</text>
    <text x="150" y="595" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">×1</text>
  </g>
  <!-- INT8/FP8: 70 GB -->
  <g class="interactive" data-card="int8-fp8-safe" tabindex="0" role="button" aria-label="INT8 et FP8 — le palier sûr">
    <rect x="340" y="435" width="120" height="185" rx="3" fill="#1F5560" fill-opacity="0.22" stroke="#1F5560" stroke-width="1.25"/>
    <text x="400" y="420" class="mono" font-size="13" fill="#1F5560" text-anchor="middle" font-weight="500">70 Go</text>
    <text x="400" y="475" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle" font-weight="600">INT8 · FP8</text>
    <text x="400" y="595" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">×2</text>
  </g>
  <!-- INT4: 35 GB -->
  <g class="interactive" data-card="int4-cliff" tabindex="0" role="button" aria-label="INT4 — le bord de la falaise">
    <rect x="590" y="528" width="120" height="92" rx="3" fill="#B7332C" fill-opacity="0.20" stroke="#B7332C" stroke-width="2"/>
    <text x="650" y="513" class="mono" font-size="13" fill="#B7332C" text-anchor="middle" font-weight="500">35 Go</text>
    <text x="650" y="562" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle" font-weight="600">INT4 · NF4</text>
    <text x="650" y="595" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">×4</text>
  </g>
  <!-- 2-bit: 17.5 GB -->
  <g class="interactive" data-card="sub4-artillery" tabindex="0" role="button" aria-label="2 bits — codebooks et artillerie lourde">
    <rect x="840" y="574" width="110" height="46" rx="3" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="895" y="559" class="mono" font-size="13" fill="#B58A2C" text-anchor="middle" font-weight="500">~18 Go</text>
    <text x="895" y="600" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">2 bits · ×8</text>
  </g>
  <!-- Ternary -->
  <g class="interactive" data-card="ternary-native" tabindex="0" role="button" aria-label="Ternaire natif — hors échelle post-quantification">
    <rect x="1015" y="588" width="105" height="32" rx="3" fill="#2F5D3F" fill-opacity="0.22" stroke="#2F5D3F" stroke-width="1.25"/>
    <text x="1067" y="573" class="mono" font-size="13" fill="#2F5D3F" text-anchor="middle" font-weight="500">~14 Go</text>
    <text x="1067" y="608" class="body" font-size="10" fill="#2F5D3F" text-anchor="middle">1,58 bit</text>
  </g>

  <!-- Quality line (drops off after 4-bit) -->
  <path d="M 150 250 L 400 262 L 650 300 C 760 340, 820 470, 895 490 L 1067 400" fill="none" stroke="#B7332C" stroke-width="2.5" stroke-dasharray="1 0"/>
  <circle cx="150" cy="250" r="4" fill="#B7332C"/>
  <circle cx="400" cy="262" r="4" fill="#B7332C"/>
  <circle cx="650" cy="300" r="4" fill="#B7332C"/>
  <circle cx="895" cy="490" r="4" fill="#B7332C"/>
  <circle cx="1067" cy="400" r="4" fill="#2F5D3F"/>
  <text x="470" y="235" class="body" font-size="12" fill="#B7332C" font-style="italic">qualité (tâches en aval)</text>

  <!-- Cliff annotation -->
  <line x1="720" y1="180" x2="720" y2="620" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="2 3"/>
  <text x="732" y="200" class="body" font-size="12" fill="#B7332C" font-weight="600">la falaise des 4 bits</text>
  <text x="732" y="218" class="body" font-size="11" fill="#5A5A5A">sous ce seuil : rotations,</text>
  <text x="732" y="234" class="body" font-size="11" fill="#5A5A5A">codebooks ou QAT obligatoires</text>

  <!-- Note ternary off-curve -->
  <text x="1000" y="360" class="body" font-size="11" fill="#2F5D3F" text-anchor="end">entraîné nativement,</text>
  <text x="1000" y="376" class="body" font-size="11" fill="#2F5D3F" text-anchor="end">hors courbe PTQ</text>

  <!-- Footer -->
  <line x1="60" y1="720" x2="1140" y2="720" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="748" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Empreinte mémoire d'un modèle ~70 Md de paramètres selon le format des poids. La courbe qualité est schématique (les tâches de raisonnement décrochent avant la perplexité).</text>
</svg>
