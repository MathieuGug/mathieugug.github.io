<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="900" height="900" fill="#FAF8F3"/>

  <text x="55" y="56" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 04</text>
  <text x="55" y="94" class="display" font-size="28" font-weight="600" fill="#1A1A1A">Taxonomie de la PTQ</text>
  <text x="55" y="122" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Quantifier sans réentraîner : deux grandes branches, quatre familles.</text>
  <line x1="55" y1="144" x2="845" y2="144" stroke="#E5E1D8" stroke-width="1"/>

  <!-- root -->
  <rect x="360" y="172" width="180" height="46" rx="3" fill="#1A1A1A"/>
  <text x="450" y="200" class="body" font-size="14" font-weight="600" fill="#FAF8F3" text-anchor="middle">PTQ (post-entraînement)</text>

  <!-- two branches -->
  <line x1="450" y1="218" x2="450" y2="240" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="250" y1="240" x2="650" y2="240" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="250" y1="240" x2="250" y2="264" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="650" y1="240" x2="650" y2="264" stroke="#5A5A5A" stroke-width="1"/>

  <rect x="130" y="264" width="240" height="44" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1.25"/>
  <text x="250" y="285" class="body" font-size="13" font-weight="600" fill="#1F5560" text-anchor="middle">Poids seuls (W4A16)</text>
  <text x="250" y="301" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">attaque le decode memory-bound</text>

  <rect x="530" y="264" width="240" height="44" rx="3" fill="#B58A2C" fill-opacity="0.14" stroke="#B58A2C" stroke-width="1.25"/>
  <text x="650" y="285" class="body" font-size="13" font-weight="600" fill="#B58A2C" text-anchor="middle">Poids + activations (W8A8)</text>
  <text x="650" y="301" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">active les unités entières</text>

  <!-- W-only leaves -->
  <g class="interactive" data-card="gptq-hessian" tabindex="0" role="button" aria-label="GPTQ — compensation par la Hessienne">
    <rect x="90" y="360" width="200" height="90" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="106" y="386" class="body" font-size="13" font-weight="600" fill="#1A1A1A">GPTQ</text>
    <text x="106" y="408" class="body" font-size="11" fill="#5A5A5A">compensation d'erreur</text>
    <text x="106" y="424" class="body" font-size="11" fill="#5A5A5A">via l'inverse de la</text>
    <text x="106" y="440" class="body" font-size="11" fill="#5A5A5A">Hessienne (OBQ)</text>
  </g>
  <g class="interactive" data-card="awq-activation" tabindex="0" role="button" aria-label="AWQ — mise à l'échelle activation-aware">
    <rect x="310" y="360" width="200" height="90" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="326" y="386" class="body" font-size="13" font-weight="600" fill="#1A1A1A">AWQ</text>
    <text x="326" y="408" class="body" font-size="11" fill="#5A5A5A">1 % de poids saillants</text>
    <text x="326" y="424" class="body" font-size="11" fill="#5A5A5A">protégés, activation-aware,</text>
    <text x="326" y="440" class="body" font-size="11" fill="#5A5A5A">sans backprop</text>
  </g>
  <g class="interactive" data-card="gguf-kquant" tabindex="0" role="button" aria-label="GGUF k-quants — le format de l'edge">
    <rect x="90" y="470" width="200" height="90" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="106" y="496" class="body" font-size="13" font-weight="600" fill="#1A1A1A">GGUF k-quants</text>
    <text x="106" y="518" class="body" font-size="11" fill="#5A5A5A">blocs à bits mixtes</text>
    <text x="106" y="534" class="body" font-size="11" fill="#5A5A5A">(Q4_K_M) — llama.cpp,</text>
    <text x="106" y="550" class="body" font-size="11" fill="#5A5A5A">le format de l'edge</text>
  </g>
  <g class="interactive" data-card="codebooks-2bit" tabindex="0" role="button" aria-label="Codebooks — la frontière 2 bits">
    <rect x="310" y="470" width="200" height="90" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="326" y="496" class="body" font-size="13" font-weight="600" fill="#B7332C">Codebooks (2 bits)</text>
    <text x="326" y="518" class="body" font-size="11" fill="#5A5A5A">AQLM, QuIP# —</text>
    <text x="326" y="534" class="body" font-size="11" fill="#5A5A5A">dictionnaires + incohérence</text>
    <text x="326" y="550" class="body" font-size="11" fill="#5A5A5A">là où le scalaire cède</text>
  </g>

  <!-- links to W-only -->
  <g stroke="#5A5A5A" stroke-width="0.75">
    <line x1="250" y1="308" x2="250" y2="330"/><line x1="190" y1="330" x2="410" y2="330"/>
    <line x1="190" y1="330" x2="190" y2="360"/><line x1="410" y1="330" x2="410" y2="360"/>
    <line x1="190" y1="450" x2="190" y2="470"/><line x1="410" y1="450" x2="410" y2="470"/>
  </g>

  <!-- W+A leaves -->
  <g class="interactive" data-card="wa-smoothquant" tabindex="0" role="button" aria-label="SmoothQuant et LLM.int8 — la branche activations">
    <rect x="555" y="360" width="200" height="90" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="571" y="386" class="body" font-size="13" font-weight="600" fill="#1A1A1A">SmoothQuant</text>
    <text x="571" y="408" class="body" font-size="11" fill="#5A5A5A">migration de difficulté</text>
    <text x="571" y="424" class="body" font-size="11" fill="#5A5A5A">activation → poids ;</text>
    <text x="571" y="440" class="body" font-size="11" fill="#5A5A5A">accélère le prefill</text>
  </g>
  <g class="interactive" data-card="wa-llmint8" tabindex="0" role="button" aria-label="LLM.int8 décomposition mixte">
    <rect x="555" y="470" width="200" height="90" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="571" y="496" class="body" font-size="13" font-weight="600" fill="#1A1A1A">LLM.int8()</text>
    <text x="571" y="518" class="body" font-size="11" fill="#5A5A5A">décomposition mixte :</text>
    <text x="571" y="534" class="body" font-size="11" fill="#5A5A5A">outliers en FP16,</text>
    <text x="571" y="550" class="body" font-size="11" fill="#5A5A5A">le reste en INT8</text>
  </g>
  <g stroke="#5A5A5A" stroke-width="0.75">
    <line x1="650" y1="308" x2="650" y2="360"/><line x1="655" y1="450" x2="655" y2="470"/>
  </g>

  <!-- Bottom note: rotations as bridge -->
  <rect x="90" y="620" width="720" height="86" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="110" y="648" class="body" font-size="13" font-weight="600" fill="#B7332C">Au-delà du contournement : les rotations (schéma 05)</text>
  <text x="110" y="672" class="body" font-size="11.5" fill="#5A5A5A">Toutes ces méthodes contournent l'outlier — l'isolent, le migrent, le protègent. Les rotations orthogonales le</text>
  <text x="110" y="690" class="body" font-size="11.5" fill="#5A5A5A">dissolvent en changeant de base : QuaRot, SpinQuant. C'est ce qui débloque le 4 bits de bout en bout.</text>

  <line x1="55" y1="740" x2="845" y2="740" stroke="#E5E1D8" stroke-width="1"/>
  <text x="55" y="766" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Sources : GPTQ (ICLR 2023) ; AWQ (MLSys 2024) ; QuIP# (ICML 2024) ; llama.cpp / GGUF ; LLM.int8() ; SmoothQuant.</text>
</svg>
