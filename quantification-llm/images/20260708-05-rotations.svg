<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">La rotation qui dissout l'outlier</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">L'outlier n'est pas intrinsèque : c'est un artefact de la base. Changez de repère, il disparaît.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- BEFORE -->
  <g class="interactive" data-card="original-basis" tabindex="0" role="button" aria-label="Base d'origine avec outliers">
    <text x="90" y="200" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Base d'origine</text>
    <rect x="90" y="220" width="250" height="200" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="110" y1="400" x2="320" y2="400" stroke="#1A1A1A" stroke-width="1"/>
    <g fill="#1F5560" fill-opacity="0.5">
      <rect x="120" y="388" width="9" height="12"/><rect x="134" y="384" width="9" height="16"/>
      <rect x="148" y="390" width="9" height="10"/><rect x="176" y="386" width="9" height="14"/>
      <rect x="204" y="389" width="9" height="11"/><rect x="232" y="385" width="9" height="15"/>
      <rect x="260" y="390" width="9" height="10"/><rect x="288" y="387" width="9" height="13"/>
      <rect x="302" y="384" width="9" height="16"/>
    </g>
    <rect x="162" y="245" width="9" height="155" fill="#B7332C"/>
    <rect x="246" y="258" width="9" height="142" fill="#B7332C"/>
    <text x="215" y="440" class="body" font-size="11" fill="#B7332C" text-anchor="middle">quelques pics extrêmes</text>
  </g>

  <!-- rotation operator -->
  <g class="interactive" data-card="hadamard-rotation" tabindex="0" role="button" aria-label="Rotation de Hadamard">
    <circle cx="470" cy="320" r="52" fill="#B58A2C" fill-opacity="0.14" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="470" y="316" class="display" font-size="26" fill="#B58A2C" text-anchor="middle" font-style="italic">R</text>
    <text x="470" y="340" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">rotation</text>
    <text x="470" y="405" class="body" font-size="11" fill="#B58A2C" text-anchor="middle">Hadamard (orthogonale)</text>
    <line x1="342" y1="320" x2="414" y2="320" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr05)"/>
    <line x1="526" y1="320" x2="598" y2="320" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arr05)"/>
  </g>

  <!-- AFTER -->
  <g class="interactive" data-card="computational-equivalence" tabindex="0" role="button" aria-label="Équivalence computationnelle">
    <text x="620" y="200" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Base tournée</text>
    <rect x="620" y="220" width="250" height="200" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="640" y1="400" x2="850" y2="400" stroke="#1A1A1A" stroke-width="1"/>
    <g fill="#1F5560" fill-opacity="0.6">
      <rect x="650" y="352" width="9" height="48"/><rect x="664" y="346" width="9" height="54"/>
      <rect x="678" y="350" width="9" height="50"/><rect x="692" y="344" width="9" height="56"/>
      <rect x="706" y="348" width="9" height="52"/><rect x="720" y="346" width="9" height="54"/>
      <rect x="734" y="350" width="9" height="50"/><rect x="748" y="345" width="9" height="55"/>
      <rect x="762" y="349" width="9" height="51"/><rect x="776" y="347" width="9" height="53"/>
      <rect x="790" y="351" width="9" height="49"/><rect x="804" y="345" width="9" height="55"/>
      <rect x="818" y="348" width="9" height="52"/><rect x="832" y="350" width="9" height="50"/>
    </g>
    <text x="745" y="440" class="body" font-size="11" fill="#1F5560" text-anchor="middle">énergie redistribuée — quasi-gaussienne</text>
  </g>

  <!-- equivalence band -->
  <rect x="90" y="480" width="780" height="70" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="110" y="508" class="body" font-size="13" font-weight="600" fill="#1F5560">R est fusionnée dans les poids adjacents</text>
  <text x="110" y="532" class="body" font-size="11.5" fill="#5A5A5A">Le réseau reste computationnellement équivalent — même sortie — mais quantifiable en 4 bits partout : poids, activations ET KV-cache (QuaRot).</text>

  <!-- learned rotation -->
  <g class="interactive" data-card="learned-rotation" tabindex="0" role="button" aria-label="Rotation apprise — SpinQuant">
    <rect x="920" y="220" width="200" height="330" rx="3" fill="#B7332C" fill-opacity="0.07" stroke="#B7332C" stroke-width="1.25"/>
    <text x="1020" y="252" class="body" font-size="13" font-weight="600" fill="#B7332C" text-anchor="middle">SpinQuant</text>
    <text x="1020" y="274" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">apprendre la rotation</text>
    <text x="1020" y="290" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">(optimisation de Cayley)</text>
    <line x1="945" y1="308" x2="1095" y2="308" stroke="#E5E1D8" stroke-width="1"/>
    <text x="1020" y="340" class="mono" font-size="26" fill="#B7332C" text-anchor="middle" font-weight="500">2,9</text>
    <text x="1020" y="360" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">pts d'écart à FP16</text>
    <text x="1020" y="376" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">LLaMA-2 7B · W4A4KV4</text>
    <line x1="945" y1="396" x2="1095" y2="396" stroke="#E5E1D8" stroke-width="1"/>
    <text x="1020" y="424" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">bat Hadamard fixe :</text>
    <text x="1020" y="442" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle" font-weight="600">−30 % d'écart résiduel</text>
    <text x="1020" y="458" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">vs QuaRot (modèles durs)</text>
    <text x="1020" y="500" class="body" font-size="10.5" font-style="italic" fill="#B7332C" text-anchor="middle">la meilleure base</text>
    <text x="1020" y="516" class="body" font-size="10.5" font-style="italic" fill="#B7332C" text-anchor="middle">n'est pas aléatoire</text>
  </g>

  <defs>
    <marker id="arr05" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#5A5A5A" stroke-width="1.25"/></marker>
  </defs>

  <line x1="60" y1="720" x2="1140" y2="720" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="748" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Sources : Ashkboos et al., QuaRot, NeurIPS 2024 ; Liu et al., SpinQuant, ICLR 2025.</text>
</svg>
