<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Anatomie d'une quantification affine</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Deux paramètres — une échelle, un point-zéro — et un choix de granularité.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- LEFT: continuous → grid -->
  <text x="60" y="195" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Projeter le continu sur une grille</text>

  <!-- continuous distribution -->
  <g class="interactive" data-card="scale-zeropoint" tabindex="0" role="button" aria-label="Échelle et point-zéro">
    <path d="M 90 400 C 180 400, 200 250, 300 250 C 400 250, 420 400, 540 400" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.25"/>
    <line x1="90" y1="400" x2="540" y2="400" stroke="#1A1A1A" stroke-width="1.25"/>
    <!-- grid ticks -->
    <g stroke="#5A5A5A" stroke-width="0.75">
      <line x1="120" y1="400" x2="120" y2="412"/><line x1="180" y1="400" x2="180" y2="412"/>
      <line x1="240" y1="400" x2="240" y2="412"/><line x1="300" y1="400" x2="300" y2="412"/>
      <line x1="360" y1="400" x2="360" y2="412"/><line x1="420" y1="400" x2="420" y2="412"/>
      <line x1="480" y1="400" x2="480" y2="412"/>
    </g>
    <text x="115" y="430" class="mono" font-size="10" fill="#5A5A5A">0</text>
    <text x="235" y="430" class="mono" font-size="10" fill="#5A5A5A">2</text>
    <text x="355" y="430" class="mono" font-size="10" fill="#5A5A5A">4</text>
    <text x="475" y="430" class="mono" font-size="10" fill="#5A5A5A">6</text>
    <text x="315" y="455" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">niveaux entiers (INT)</text>
    <!-- scale bracket -->
    <line x1="300" y1="470" x2="360" y2="470" stroke="#B7332C" stroke-width="1.25"/>
    <line x1="300" y1="466" x2="300" y2="474" stroke="#B7332C" stroke-width="1.25"/>
    <line x1="360" y1="466" x2="360" y2="474" stroke="#B7332C" stroke-width="1.25"/>
    <text x="330" y="490" class="body" font-size="11" fill="#B7332C" text-anchor="middle">échelle (pas)</text>
    <!-- zero point -->
    <circle cx="120" cy="400" r="5" fill="#B58A2C"/>
    <text x="120" y="385" class="body" font-size="11" fill="#B58A2C" text-anchor="middle">point-zéro</text>
  </g>
  <text x="90" y="530" class="mono" font-size="13" fill="#1A1A1A">valeur ≈ échelle × (entier − point_zéro)</text>
  <text x="90" y="552" class="body" font-size="11" font-style="italic" fill="#5A5A5A">déquantification : reconstruire le flottant à l'inférence</text>

  <g class="interactive" data-card="dequant" tabindex="0" role="button" aria-label="Déquantification à l'inférence">
    <rect x="90" y="568" width="450" height="52" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="106" y="590" class="body" font-size="11.5" fill="#1A1A1A">Stockage en 4/8 bits → déquantifié en FP16 pour le calcul.</text>
    <text x="106" y="608" class="body" font-size="11.5" fill="#1A1A1A">Gain : mémoire + bande passante (pas les FLOPs, sauf W8A8).</text>
  </g>

  <!-- symmetric / asymmetric -->
  <g class="interactive" data-card="sym-asym" tabindex="0" role="button" aria-label="Symétrique contre asymétrique">
    <text x="60" y="660" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Symétrique vs asymétrique</text>
    <line x1="90" y1="700" x2="260" y2="700" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="175" y1="692" x2="175" y2="708" stroke="#1F5560" stroke-width="2"/>
    <text x="175" y="725" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">symétrique — 0 centré</text>
    <line x1="310" y1="700" x2="480" y2="700" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="335" y1="692" x2="335" y2="708" stroke="#B58A2C" stroke-width="2"/>
    <text x="395" y="725" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">asymétrique — décalé</text>
  </g>

  <!-- RIGHT: granularity -->
  <g class="interactive" data-card="granularity" tabindex="0" role="button" aria-label="Granularité per-tensor, per-channel, per-group">
    <text x="640" y="195" class="body" font-size="13" font-weight="600" fill="#1A1A1A">La granularité de l'échelle</text>

    <!-- per-tensor -->
    <text x="640" y="235" class="mono" font-size="11" fill="#5A5A5A">per-tensor — 1 échelle</text>
    <rect x="640" y="245" width="150" height="90" rx="3" fill="#B8B5AE" fill-opacity="0.12" stroke="#5A5A5A" stroke-width="1.25"/>
    <circle cx="805" cy="290" r="7" fill="#1F5560"/>
    <text x="820" y="294" class="body" font-size="10.5" fill="#5A5A5A">grossier</text>

    <!-- per-channel -->
    <text x="640" y="375" class="mono" font-size="11" fill="#5A5A5A">per-channel — 1 / colonne</text>
    <g stroke="#5A5A5A" stroke-width="0.75" fill="none">
      <rect x="640" y="385" width="30" height="90" fill="#1F5560" fill-opacity="0.10"/>
      <rect x="670" y="385" width="30" height="90" fill="#1F5560" fill-opacity="0.18"/>
      <rect x="700" y="385" width="30" height="90" fill="#1F5560" fill-opacity="0.10"/>
      <rect x="730" y="385" width="30" height="90" fill="#1F5560" fill-opacity="0.18"/>
      <rect x="760" y="385" width="30" height="90" fill="#1F5560" fill-opacity="0.10"/>
    </g>

    <!-- per-group -->
    <text x="640" y="515" class="mono" font-size="11" fill="#5A5A5A">per-group — 1 / bloc (64-128)</text>
    <g stroke="#5A5A5A" stroke-width="0.5" fill="none">
      <rect x="640" y="525" width="150" height="90" fill="none" stroke="#B7332C" stroke-width="1.25"/>
      <line x1="678" y1="525" x2="678" y2="615"/><line x1="715" y1="525" x2="715" y2="615"/><line x1="753" y1="525" x2="753" y2="615"/>
      <line x1="640" y1="570" x2="790" y2="570"/>
    </g>
    <g fill="#B7332C">
      <circle cx="659" cy="547" r="3"/><circle cx="696" cy="547" r="3"/><circle cx="734" cy="547" r="3"/><circle cx="771" cy="547" r="3"/>
      <circle cx="659" cy="592" r="3"/><circle cx="696" cy="592" r="3"/><circle cx="734" cy="592" r="3"/><circle cx="771" cy="592" r="3"/>
    </g>
    <text x="820" y="570" class="body" font-size="10.5" fill="#B7332C">fin — meilleur,</text>
    <text x="820" y="586" class="body" font-size="10.5" fill="#B7332C">+ métadonnées</text>

    <!-- arrow finer -->
    <line x1="920" y1="255" x2="920" y2="605" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arr02)"/>
    <text x="945" y="430" class="body" font-size="11" fill="#5A5A5A" transform="rotate(90 945 430)" text-anchor="middle">plus fin → plus fidèle</text>
  </g>

  <defs>
    <marker id="arr02" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#5A5A5A" stroke-width="1"/></marker>
  </defs>

  <line x1="60" y1="748" x2="1140" y2="748" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="772" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Quantification uniforme affine. Réf. pédagogique : white paper Qualcomm sur la quantification des réseaux, 2021.</text>
</svg>
