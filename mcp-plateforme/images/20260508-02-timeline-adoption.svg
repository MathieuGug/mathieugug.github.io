<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-02">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Effet de réseau : 18 mois d'adoption MCP</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">De la proposition Anthropic à l'infrastructure industrielle Linux Foundation.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Time axis -->
  <line x1="100" y1="540" x2="1100" y2="540" stroke="#1A1A1A" stroke-width="1.25"/>
  <!-- Tick marks -->
  <g class="mono" font-size="10" fill="#5A5A5A">
    <line x1="120" y1="535" x2="120" y2="545" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="120" y="565" text-anchor="middle">nov 2024</text>

    <line x1="305" y1="535" x2="305" y2="545" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="305" y="565" text-anchor="middle">mars 2025</text>

    <line x1="490" y1="535" x2="490" y2="545" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="490" y="565" text-anchor="middle">été 2025</text>

    <line x1="675" y1="535" x2="675" y2="545" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="675" y="565" text-anchor="middle">sept 2025</text>

    <line x1="860" y1="535" x2="860" y2="545" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="860" y="565" text-anchor="middle">déc 2025</text>

    <line x1="1080" y1="535" x2="1080" y2="545" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="1080" y="565" text-anchor="middle">Q1 2026</text>
  </g>

  <!-- Growth curve (downloads SDK / month) -->
  <text x="60" y="180" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">TÉLÉCHARGEMENTS SDK / MOIS</text>
  <path d="M 120 530 C 250 528, 305 522, 305 515 S 490 480, 490 450 S 675 360, 675 320 S 860 220, 860 180 S 1080 165, 1080 160" fill="none" stroke="#B7332C" stroke-width="2.5"/>

  <!-- Y axis labels -->
  <text x="100" y="525" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">100 k</text>
  <text x="100" y="370" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">10 M</text>
  <text x="100" y="200" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">100 M</text>
  <line x1="100" y1="525" x2="1100" y2="525" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="100" y1="370" x2="1100" y2="370" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="100" y1="200" x2="1100" y2="200" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- Milestones -->
  <!-- 1: Launch -->
  <g class="interactive" data-card="launch" tabindex="0" role="button" aria-label="Lancement MCP — détails">
    <circle cx="120" cy="530" r="6" fill="#B7332C"/>
    <line x1="120" y1="525" x2="120" y2="430" stroke="#B58A2C" stroke-width="0.75"/>
    <rect x="60" y="380" width="160" height="50" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1"/>
    <text x="68" y="398" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#B58A2C">25 NOV 2024</text>
    <text x="68" y="416" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Anthropic publie MCP</text>
  </g>

  <!-- 2: OpenAI pivot -->
  <g class="interactive" data-card="openai-pivot" tabindex="0" role="button" aria-label="OpenAI rejoint MCP — détails">
    <circle cx="305" cy="515" r="8" fill="#B7332C"/>
    <line x1="305" y1="508" x2="305" y2="290" stroke="#B7332C" stroke-width="0.75"/>
    <rect x="240" y="240" width="190" height="50" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="248" y="258" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#B7332C">26 MARS 2025 — BASCULE</text>
    <text x="248" y="276" class="body" font-size="11" font-weight="500" fill="#1A1A1A">OpenAI adopte MCP</text>
  </g>

  <!-- 3: Microsoft -->
  <g class="interactive" data-card="microsoft" tabindex="0" role="button" aria-label="Microsoft expédie ses serveurs — détails">
    <circle cx="490" cy="450" r="6" fill="#1F5560"/>
    <line x1="490" y1="445" x2="490" y2="350" stroke="#1F5560" stroke-width="0.75"/>
    <rect x="425" y="300" width="170" height="50" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="433" y="318" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#1F5560">Q3 2025</text>
    <text x="433" y="336" class="body" font-size="11" font-weight="500" fill="#1A1A1A">MS : GitHub, Azure, Teams</text>
  </g>

  <!-- 4: Registry -->
  <g class="interactive" data-card="registry" tabindex="0" role="button" aria-label="Registre officiel — détails">
    <circle cx="675" cy="320" r="6" fill="#1F5560"/>
    <line x1="675" y1="315" x2="675" y2="270" stroke="#1F5560" stroke-width="0.75"/>
    <rect x="600" y="220" width="170" height="50" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="608" y="238" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#1F5560">8 SEPT 2025</text>
    <text x="608" y="256" class="body" font-size="11" font-weight="500" fill="#1A1A1A">MCP Registry officiel</text>
  </g>

  <!-- 5: Donation -->
  <g class="interactive" data-card="donation" tabindex="0" role="button" aria-label="Donation Linux Foundation — détails">
    <circle cx="860" cy="180" r="9" fill="#B7332C"/>
    <line x1="860" y1="178" x2="860" y2="170" stroke="#B7332C" stroke-width="0.75"/>
    <rect x="775" y="412" width="200" height="68" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="783" y="430" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#B7332C">9 DÉC 2025 — TRANSFERT</text>
    <text x="783" y="448" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Donation Linux Foundation,</text>
    <text x="783" y="464" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Agentic AI Foundation</text>
    <line x1="875" y1="412" x2="864" y2="195" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="2 3"/>
  </g>

  <!-- 6: Enterprise -->
  <g class="interactive" data-card="enterprise" tabindex="0" role="button" aria-label="78 % des équipes IA enterprise — détails">
    <circle cx="1080" cy="160" r="8" fill="#B7332C"/>
    <rect x="935" y="290" width="180" height="68" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="943" y="308" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#B7332C">MARS 2026</text>
    <text x="943" y="326" class="display" font-size="20" font-weight="600" fill="#B7332C">78 %</text>
    <text x="943" y="346" class="body" font-size="10" fill="#1A1A1A">enterprise teams en prod</text>
    <line x1="1085" y1="290" x2="1083" y2="175" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="2 3"/>
  </g>

  <!-- Bottom annotation -->
  <line x1="60" y1="610" x2="1140" y2="610" stroke="#E5E1D8" stroke-width="0.5"/>

  <text x="60" y="640" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1A1A1A">CROISSANCE × 970 EN 18 MOIS</text>
  <text x="60" y="664" class="body" font-size="12" fill="#1A1A1A">100 000 téléchargements SDK / mois en novembre 2024 → 97 millions en mars 2026.</text>
  <text x="60" y="684" class="body" font-size="12" fill="#5A5A5A">Le pivot d'OpenAI (mars 2025) marque le passage de proposition à standard de fait.</text>

  <text x="600" y="640" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1A1A1A">ÉCOSYSTÈME EN MAI 2026</text>
  <text x="600" y="664" class="body" font-size="12" fill="#1A1A1A">~7 500 serveurs actifs · 300+ clients · &gt; 1 G appels d'outils / mois via Claude seul.</text>
  <text x="600" y="684" class="body" font-size="12" fill="#5A5A5A">Distribution langages : Python ≈ TS &gt;&gt; JS &gt; Go &gt; Rust.</text>

  <!-- FOOTER -->
  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Anthropic ; Pento (A Year of MCP) ; Wikipédia ; The New Stack ; crawl Meyhem 2026.</text>
</svg>
