<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" data-schema-id="schema-04">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Surface d'attaque MCP</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Quatre vecteurs documentés et reproductibles ; aucun n'a de défense native dans la spec.</text>
  <line x1="60" y1="138" x2="840" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Axis labels -->
  <text x="450" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#5A5A5A" text-anchor="middle">DEUX QUESTIONS, QUATRE COMBINAISONS</text>

  <!-- Axes -->
  <line x1="450" y1="220" x2="450" y2="780" stroke="#5A5A5A" stroke-width="0.75"/>
  <line x1="100" y1="500" x2="800" y2="500" stroke="#5A5A5A" stroke-width="0.75"/>

  <!-- Axis labels -->
  <text x="450" y="210" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1A1A1A" text-anchor="middle">CONTROL PLANE ↑</text>
  <text x="450" y="800" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1A1A1A" text-anchor="middle">↓ DATA PLANE</text>
  <text x="100" y="495" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1A1A1A" text-anchor="end">← INSTANT T</text>
  <text x="800" y="495" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1A1A1A">DURÉE →</text>

  <!-- Quadrant 1 (top-left): Tool poisoning — Control plane, durable -->
  <g class="interactive" data-card="tool-poisoning" tabindex="0" role="button" aria-label="Tool poisoning — détails">
    <rect x="120" y="240" width="310" height="240" rx="3" fill="#B7332C" opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
    <text x="140" y="270" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">A — TOOL POISONING</text>
    <text x="140" y="298" class="display" font-size="18" font-weight="600" fill="#1A1A1A">La description</text>
    <text x="140" y="320" class="display" font-size="18" font-weight="600" fill="#1A1A1A">du tool est exécutable</text>
    <text x="140" y="350" class="body" font-size="12" fill="#5A5A5A">Le LLM lit la description en NL pour</text>
    <text x="140" y="368" class="body" font-size="12" fill="#5A5A5A">décider quand invoquer le tool.</text>
    <text x="140" y="386" class="body" font-size="12" fill="#5A5A5A">Un attaquant y planque des</text>
    <text x="140" y="404" class="body" font-size="12" fill="#5A5A5A">instructions cachées.</text>
    <text x="140" y="438" class="body" font-size="11" font-style="italic" fill="#B7332C">Persiste tant que le serveur sert</text>
    <text x="140" y="456" class="body" font-size="11" font-style="italic" fill="#B7332C">la description compromise.</text>
  </g>

  <!-- Quadrant 2 (top-right): Cross-server — Control plane, instantané -->
  <g class="interactive" data-card="cross-server" tabindex="0" role="button" aria-label="Cross-server contamination — détails">
    <rect x="470" y="240" width="310" height="240" rx="3" fill="#B58A2C" opacity="0.05" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="490" y="270" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B58A2C">B — CROSS-SERVER</text>
    <text x="490" y="298" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Un serveur</text>
    <text x="490" y="320" class="display" font-size="18" font-weight="600" fill="#1A1A1A">influence les autres</text>
    <text x="490" y="350" class="body" font-size="12" fill="#5A5A5A">Une description compromise</text>
    <text x="490" y="368" class="body" font-size="12" fill="#5A5A5A">redirige les invocations vers</text>
    <text x="490" y="386" class="body" font-size="12" fill="#5A5A5A">d'autres serveurs (exfiltration,</text>
    <text x="490" y="404" class="body" font-size="12" fill="#5A5A5A">side-effects).</text>
    <text x="490" y="438" class="body" font-size="11" font-style="italic" fill="#B58A2C">Tool-mediated prompt injection.</text>
    <text x="490" y="456" class="body" font-size="11" font-style="italic" fill="#B58A2C">Surface = N(N-1)/2 paires.</text>
  </g>

  <!-- Quadrant 3 (bottom-left): Supply chain — Data plane, durable -->
  <g class="interactive" data-card="supply-chain" tabindex="0" role="button" aria-label="Supply chain — détails">
    <rect x="120" y="520" width="310" height="240" rx="3" fill="#1F5560" opacity="0.05" stroke="#1F5560" stroke-width="1.25"/>
    <text x="140" y="550" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560">C — SUPPLY CHAIN</text>
    <text x="140" y="578" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Un paquet</text>
    <text x="140" y="600" class="display" font-size="18" font-weight="600" fill="#1A1A1A">npm / PyPI parmi d'autres</text>
    <text x="140" y="630" class="body" font-size="12" fill="#5A5A5A">Typosquatting, maintainer hijack,</text>
    <text x="140" y="648" class="body" font-size="12" fill="#5A5A5A">dependency confusion, post-install</text>
    <text x="140" y="666" class="body" font-size="12" fill="#5A5A5A">scripts. Toutes les classiques s'appliquent</text>
    <text x="140" y="684" class="body" font-size="12" fill="#5A5A5A">aux serveurs MCP.</text>
    <text x="140" y="718" class="body" font-size="11" font-style="italic" fill="#1F5560">10 / 14 paquets MCP top npm</text>
    <text x="140" y="736" class="body" font-size="11" font-style="italic" fill="#1F5560">avec ≥ 1 CVE non patchée (MCPwn 2026).</text>
  </g>

  <!-- Quadrant 4 (bottom-right): Indirect injection — Data plane, instantané -->
  <g class="interactive" data-card="indirect-injection" tabindex="0" role="button" aria-label="Indirect prompt injection — détails">
    <rect x="470" y="520" width="310" height="240" rx="3" fill="#5A5A5A" opacity="0.06" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="490" y="550" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#5A5A5A">D — INDIRECT INJECTION</text>
    <text x="490" y="578" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Le contenu lu</text>
    <text x="490" y="600" class="display" font-size="18" font-weight="600" fill="#1A1A1A">contient des instructions</text>
    <text x="490" y="630" class="body" font-size="12" fill="#5A5A5A">Email, page web, ticket Jira lus par</text>
    <text x="490" y="648" class="body" font-size="12" fill="#5A5A5A">l'agent peuvent contenir un payload</text>
    <text x="490" y="666" class="body" font-size="12" fill="#5A5A5A">qui détourne les appels suivants.</text>
    <text x="490" y="684" class="body" font-size="12" fill="#5A5A5A">Sampling 2025-06 aggrave la surface.</text>
    <text x="490" y="718" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Lethal trifecta : data privée + lecture</text>
    <text x="490" y="736" class="body" font-size="11" font-style="italic" fill="#5A5A5A">d'instructions tierces + exfiltration.</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="800" x2="840" y2="800" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="828" class="body" font-size="11" fill="#1A1A1A">La spec MCP n'inclut <tspan font-style="italic">aucun</tspan> mécanisme natif de signature des descriptions ni de chain-of-trust.</text>
  <text x="60" y="846" class="body" font-size="11" fill="#5A5A5A">OWASP MCP Top 10 (mars 2026) canonise ces vecteurs ; les défenses arrivent ~9 mois après les attaques.</text>
  <text x="60" y="880" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Invariant Labs ; Palo Alto Unit42 ; Simon Willison ; AuthZed ; OWASP ; MCPwn 2026.</text>
</svg>
