<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-05bis">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05bis · LIVRE</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Cinq couches d'intégration agentique</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Layering, pas concurrence — un agent en production utilise les cinq simultanément.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Stack diagram (vertical cake) -->
  <text x="60" y="180" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#5A5A5A">PILE D'INTÉGRATION</text>

  <!-- AG-UI (top, agent ↔ frontend / user) -->
  <g>
    <rect x="80" y="200" width="540" height="72" rx="3" fill="#6B7A3F" opacity="0.08" stroke="#6B7A3F" stroke-width="1.25"/>
    <text x="100" y="222" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#6B7A3F">AG-UI — AGENT ↔ FRONTEND</text>
    <text x="100" y="244" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Stream l'état d'un agent vers son interface utilisateur</text>
    <text x="100" y="262" class="body" font-size="11" fill="#5A5A5A">17 events SSE (CopilotKit). Pas encore en gouvernance neutre. Cf. Ch.14.</text>
  </g>

  <!-- A2A (agent ↔ agent) -->
  <g>
    <rect x="80" y="282" width="540" height="72" rx="3" fill="#B58A2C" opacity="0.07" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="100" y="304" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B58A2C">A2A — AGENT ↔ AGENT</text>
    <text x="100" y="326" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Agents qui se parlent entre eux</text>
    <text x="100" y="344" class="body" font-size="11" fill="#5A5A5A">Google A2A → Linux Foundation 2025. 150+ orgs en avril 2026. Cf. §12.5.1.</text>
  </g>

  <!-- MCP (highlighted, agent ↔ tools inter-app) -->
  <g>
    <rect x="80" y="364" width="540" height="72" rx="3" fill="#B7332C" opacity="0.09" stroke="#B7332C" stroke-width="2.5"/>
    <text x="100" y="386" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">MCP — MODEL CONTEXT PROTOCOL</text>
    <text x="100" y="408" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Standardise comment N apps exposent leurs tools à un host LLM</text>
    <text x="100" y="426" class="body" font-size="11" fill="#5A5A5A">Inter-app, intra-organisation. JSON-RPC 2.0. Anthropic 2024 → Linux Foundation 2025.</text>
  </g>

  <!-- Function calling (LLM ↔ tools intra-app) -->
  <g>
    <rect x="80" y="446" width="540" height="72" rx="3" fill="#1F5560" opacity="0.07" stroke="#1F5560" stroke-width="1.25"/>
    <text x="100" y="468" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560">FUNCTION CALLING</text>
    <text x="100" y="490" class="display" font-size="14" font-weight="600" fill="#1A1A1A">L'API du modèle — décide quelle fonction appeler avec quels arguments</text>
    <text x="100" y="508" class="body" font-size="11" fill="#5A5A5A">Intra-app. OpenAI tools, Anthropic tool_use, Gemini functionDeclarations.</text>
  </g>

  <!-- OpenAPI (bottom, format de description HTTP) -->
  <g>
    <rect x="80" y="528" width="540" height="72" rx="3" fill="#5A5A5A" opacity="0.07" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="100" y="550" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#5A5A5A">OPENAPI</text>
    <text x="100" y="572" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Format de description des services HTTP — sous MCP, ou direct</text>
    <text x="100" y="590" class="body" font-size="11" fill="#5A5A5A">Inter-organisation. Existe depuis 2011. UTCP propose une variante agent-friendly.</text>
  </g>

  <!-- Layer connectors (left side) — vertical axis with rotated label -->
  <line x1="50" y1="236" x2="50" y2="600" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="50" y="228" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">↑</text>
  <text x="20" y="418" class="mono" font-size="9" letter-spacing="0.12em" fill="#5A5A5A" text-anchor="middle" transform="rotate(-90 20 418)">abstraction</text>
  <text x="50" y="613" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">↓</text>

  <!-- Comparison table on the right -->
  <text x="700" y="180" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#5A5A5A">COMPARATIF</text>

  <!-- Header row -->
  <text x="700" y="220" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">COUCHE</text>
  <text x="880" y="220" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">PÉRIMÈTRE</text>
  <text x="1060" y="220" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">QUI L'UTILISE</text>

  <line x1="700" y1="230" x2="1140" y2="230" stroke="#5A5A5A" stroke-width="0.5"/>

  <!-- AG-UI row -->
  <text x="700" y="252" class="body" font-size="11" font-weight="500" fill="#6B7A3F">AG-UI</text>
  <text x="880" y="252" class="body" font-size="11" fill="#1A1A1A">agent ↔ frontend</text>
  <text x="1060" y="252" class="body" font-size="11" fill="#5A5A5A">CopilotKit, Vercel AI SDK</text>

  <line x1="700" y1="266" x2="1140" y2="266" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- A2A row -->
  <text x="700" y="288" class="body" font-size="11" font-weight="500" fill="#B58A2C">A2A</text>
  <text x="880" y="288" class="body" font-size="11" fill="#1A1A1A">inter-org, agents</text>
  <text x="1060" y="288" class="body" font-size="11" fill="#5A5A5A">Google, Anthropic, 150+ orgs</text>

  <line x1="700" y1="302" x2="1140" y2="302" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- MCP row -->
  <text x="700" y="324" class="body" font-size="11" font-weight="500" fill="#B7332C">MCP</text>
  <text x="880" y="324" class="body" font-size="11" fill="#1A1A1A">inter-app, intra-org</text>
  <text x="1060" y="324" class="body" font-size="11" fill="#5A5A5A">tous les majors</text>

  <line x1="700" y1="338" x2="1140" y2="338" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Function calling row -->
  <text x="700" y="360" class="body" font-size="11" font-weight="500" fill="#1F5560">Function calling</text>
  <text x="880" y="360" class="body" font-size="11" fill="#1A1A1A">intra-app</text>
  <text x="1060" y="360" class="body" font-size="11" fill="#5A5A5A">tous les modèles</text>

  <line x1="700" y1="374" x2="1140" y2="374" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- OpenAPI row -->
  <text x="700" y="396" class="body" font-size="11" font-weight="500" fill="#5A5A5A">OpenAPI</text>
  <text x="880" y="396" class="body" font-size="11" fill="#1A1A1A">inter-org, services</text>
  <text x="1060" y="396" class="body" font-size="11" fill="#5A5A5A">microservices, gateways</text>

  <line x1="700" y1="410" x2="1140" y2="410" stroke="#5A5A5A" stroke-width="0.5"/>

  <!-- Pull quote -->
  <text x="700" y="450" class="display" font-size="14" font-style="italic" fill="#1A1A1A">« MCP est le protocole d'intégration outils ;</text>
  <text x="700" y="470" class="display" font-size="14" font-style="italic" fill="#1A1A1A">A2A relie les agents entre eux ; AG-UI fait</text>
  <text x="700" y="490" class="display" font-size="14" font-style="italic" fill="#1A1A1A">le pont vers l'utilisateur final. Trinité. »</text>
  <text x="700" y="514" class="body" font-size="10" fill="#5A5A5A">— Synthèse Ch.12 du livre.</text>

  <!-- UTCP callout -->
  <rect x="700" y="540" width="380" height="95" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="720" y="564" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#B58A2C">CHALLENGER — UTCP</text>
  <text x="720" y="586" class="body" font-size="11" fill="#1A1A1A">Universal Tool Calling Protocol étend OpenAPI</text>
  <text x="720" y="604" class="body" font-size="11" fill="#1A1A1A">avec des métadonnées agent-friendly. Plus pure</text>
  <text x="720" y="622" class="body" font-size="11" fill="#1A1A1A">techniquement, accuse 18 mois sur l'effet de réseau.</text>

  <!-- Footer -->
  <line x1="60" y1="660" x2="1140" y2="660" stroke="#E5E1D8" stroke-width="0.5"/>

  <text x="60" y="694" class="body" font-size="12" fill="#1A1A1A">Un agent en production en 2026 utilise <tspan font-weight="600">les cinq simultanément</tspan> : function calling pour l'API du modèle,</text>
  <text x="60" y="712" class="body" font-size="12" fill="#1A1A1A">MCP comme couche d'intégration outils, OpenAPI dans les serveurs HTTP, A2A pour la sous-traitance, AG-UI vers le frontend.</text>

  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : MarkTechPost, oct. 2025 ; Nordic APIs sur UTCP ; CopilotKit AG-UI spec ; analyse de l'auteur.</text>
</svg>
