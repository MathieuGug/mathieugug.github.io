<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-06">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Trajectoire 2026-2027</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Trois mouvements simultanés vont redessiner les contours de MCP — sans en menacer la place.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Time axis -->
  <line x1="120" y1="700" x2="1100" y2="700" stroke="#1A1A1A" stroke-width="1.25"/>
  <g class="mono" font-size="10" fill="#5A5A5A">
    <line x1="120" y1="695" x2="120" y2="705" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="120" y="725" text-anchor="middle">mai 2026</text>
    <line x1="445" y1="695" x2="445" y2="705" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="445" y="725" text-anchor="middle">automne 2026</text>
    <line x1="775" y1="695" x2="775" y2="705" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="775" y="725" text-anchor="middle">printemps 2027</text>
    <line x1="1100" y1="695" x2="1100" y2="705" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="1100" y="725" text-anchor="middle">fin 2027</text>
  </g>

  <!-- Track 1: Commodification (top, teal) -->
  <g class="interactive" data-card="commodification" tabindex="0" role="button" aria-label="Commodification — détails">
    <rect x="120" y="200" width="980" height="110" rx="3" fill="#1F5560" opacity="0.05" stroke="#1F5560" stroke-width="1.25"/>
    <text x="140" y="225" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560">PISTE 1 — COMMODIFICATION</text>
    <text x="140" y="250" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Consolidation des registres et marketplaces</text>
    <text x="140" y="275" class="body" font-size="11" fill="#5A5A5A">Standard de métadonnée commun (mcp.json) · mirrors signés AWS / Azure / GCP / Cloudflare ·</text>
    <text x="140" y="293" class="body" font-size="11" fill="#5A5A5A">distribution dominée par les marketplaces IDE (Cursor, VS Code) — comme Chrome Web Store pour les extensions.</text>
  </g>

  <!-- Track 2: Governance (middle, carmine) -->
  <g class="interactive" data-card="gouvernance" tabindex="0" role="button" aria-label="Gouvernance et durcissement — détails">
    <rect x="120" y="330" width="980" height="110" rx="3" fill="#B7332C" opacity="0.05" stroke="#B7332C" stroke-width="2.5"/>
    <text x="140" y="355" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">PISTE 2 — GOUVERNANCE</text>
    <text x="140" y="380" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Durcissement de la spec et premiers contrôles AI Act</text>
    <text x="140" y="405" class="body" font-size="11" fill="#5A5A5A">Signature Sigstore des descriptions · isolation par défaut entre serveurs · audit log OTel GenAI ·</text>
    <text x="140" y="423" class="body" font-size="11" fill="#5A5A5A">OWASP MCP Top 10 comme référence enterprise · premiers contrôles d'organismes notifiés (été 2026).</text>
  </g>

  <!-- Track 3: Next layer (bottom, mustard) -->
  <g class="interactive" data-card="prochaine-couche" tabindex="0" role="button" aria-label="Prochaine couche — détails">
    <rect x="120" y="460" width="980" height="110" rx="3" fill="#B58A2C" opacity="0.07" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="140" y="485" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B58A2C">PISTE 3 — PROCHAINE COUCHE</text>
    <text x="140" y="510" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Agent-to-agent : MCP absorbe ou se fait absorber ?</text>
    <text x="140" y="535" class="body" font-size="11" fill="#5A5A5A">Sampling et sub-agents pourraient absorber A2A — MCP devient le HTTP du Web agentique.</text>
    <text x="140" y="553" class="body" font-size="11" fill="#5A5A5A">Sinon, A2A (Google) ou un autre standard prend la couche supérieure et MCP reste tool-LLM.</text>
  </g>

  <!-- Milestones across tracks -->
  <!-- Sept 2026: OWASP-aligned spec rev -->
  <circle cx="445" cy="385" r="7" fill="#B7332C"/>
  <line x1="445" y1="392" x2="445" y2="690" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
  <text x="445" y="660" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">spec rev sécurisée</text>
  <text x="445" y="675" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">aut 2026</text>

  <!-- Spring 2027: A2A absorption decision -->
  <circle cx="775" cy="515" r="8" fill="#B58A2C"/>
  <line x1="775" y1="523" x2="775" y2="690" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="2 3"/>
  <text x="775" y="660" class="mono" font-size="10" fill="#B58A2C" text-anchor="middle">arbitrage A2A</text>
  <text x="775" y="675" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">printemps 2027</text>

  <!-- Late 2027: registry consolidation -->
  <circle cx="1000" cy="255" r="7" fill="#1F5560"/>
  <line x1="1000" y1="262" x2="1000" y2="690" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 3"/>
  <text x="1000" y="660" class="mono" font-size="10" fill="#1F5560" text-anchor="middle">registres consolidés</text>
  <text x="1000" y="675" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">fin 2027</text>

  <!-- Footer -->
  <line x1="60" y1="755" x2="1140" y2="755" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="780" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : analyse de l'auteur · roadmap publique de l'Agentic AI Foundation · projection 12-18 mois.</text>
</svg>
