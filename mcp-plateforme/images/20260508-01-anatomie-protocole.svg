<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-01">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrow1c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Anatomie du protocole MCP</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Trois rôles, un seul format de message — JSON-RPC 2.0 sur stdio ou Streamable HTTP.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- HOST (left) -->
  <g class="interactive" data-card="host" tabindex="0" role="button" aria-label="Host — détails">
    <rect x="80" y="180" width="280" height="380" rx="3" fill="#1F5560" opacity="0.05" stroke="#1F5560" stroke-width="1.25"/>
    <text x="100" y="208" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560">HOST</text>
    <text x="100" y="240" class="display" font-size="20" font-weight="600" fill="#1A1A1A">L'application</text>
    <text x="100" y="262" class="body" font-size="12" fill="#5A5A5A">Claude Desktop, Cursor,</text>
    <text x="100" y="280" class="body" font-size="12" fill="#5A5A5A">ChatGPT desktop, Continue…</text>

    <!-- LLM block inside host -->
    <rect x="100" y="310" width="240" height="90" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="220" y="338" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">Modèle (LLM)</text>
    <text x="220" y="360" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">voit une liste agrégée de tools</text>
    <text x="220" y="378" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">décide lequel appeler</text>

    <!-- Clients inside host -->
    <text x="100" y="430" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">CLIENTS MCP</text>
    <rect x="100" y="445" width="105" height="40" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="152.5" y="470" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">client A</text>
    <rect x="215" y="445" width="105" height="40" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="267.5" y="470" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">client B</text>

    <text x="100" y="520" class="body" font-size="11" font-style="italic" fill="#1F5560">Un client = une connexion 1-pour-1</text>
    <text x="100" y="538" class="body" font-size="11" font-style="italic" fill="#1F5560">vers un serveur.</text>
  </g>

  <!-- TRANSPORT (middle band) -->
  <g class="interactive" data-card="transport" tabindex="0" role="button" aria-label="Transport — détails">
    <rect x="400" y="280" width="400" height="180" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="600" y="310" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B58A2C" text-anchor="middle">TRANSPORT</text>

    <text x="600" y="340" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">JSON-RPC 2.0</text>

    <text x="600" y="380" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">stdio</text>
    <text x="600" y="398" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">processus enfant, latence sub-ms</text>

    <line x1="500" y1="412" x2="700" y2="412" stroke="#E5E1D8" stroke-width="0.5"/>

    <text x="600" y="430" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">Streamable HTTP</text>
    <text x="600" y="448" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">POST + SSE optionnel</text>
  </g>

  <!-- Arrows host ↔ transport -->
  <line x1="360" y1="360" x2="395" y2="360" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow1)"/>
  <line x1="395" y1="380" x2="360" y2="380" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow1)"/>

  <!-- SERVER (right) -->
  <g class="interactive" data-card="server" tabindex="0" role="button" aria-label="Serveur — détails">
    <rect x="840" y="180" width="280" height="380" rx="3" fill="#B7332C" opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
    <text x="860" y="208" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SERVER</text>
    <text x="860" y="240" class="display" font-size="20" font-weight="600" fill="#1A1A1A">L'intégration</text>
    <text x="860" y="262" class="body" font-size="12" fill="#5A5A5A">processus dédié, expose des</text>
    <text x="860" y="280" class="body" font-size="12" fill="#5A5A5A">primitives au host distant.</text>

    <!-- Primitives -->
    <text x="860" y="320" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">PRIMITIVES</text>
    <rect x="860" y="335" width="240" height="32" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <text x="876" y="356" class="body" font-size="12" fill="#1A1A1A">tools</text>
    <text x="1086" y="356" class="body" font-size="11" fill="#5A5A5A" text-anchor="end">fonctions appelables</text>

    <rect x="860" y="375" width="240" height="32" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <text x="876" y="396" class="body" font-size="12" fill="#1A1A1A">resources</text>
    <text x="1086" y="396" class="body" font-size="11" fill="#5A5A5A" text-anchor="end">documents lisibles</text>

    <rect x="860" y="415" width="240" height="32" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <text x="876" y="436" class="body" font-size="12" fill="#1A1A1A">prompts</text>
    <text x="1086" y="436" class="body" font-size="11" fill="#5A5A5A" text-anchor="end">templates pré-écrits</text>

    <rect x="860" y="455" width="240" height="32" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <text x="876" y="476" class="body" font-size="12" fill="#1A1A1A">sampling</text>
    <text x="1086" y="476" class="body" font-size="11" fill="#5A5A5A" text-anchor="end">retour vers le LLM (2025-06)</text>

    <text x="860" y="525" class="body" font-size="11" font-style="italic" fill="#B7332C">Le LLM ne voit jamais le serveur :</text>
    <text x="860" y="543" class="body" font-size="11" font-style="italic" fill="#B7332C">il voit la liste de tools agrégée.</text>
  </g>

  <!-- Arrows transport ↔ server -->
  <line x1="800" y1="360" x2="835" y2="360" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow1)"/>
  <line x1="835" y1="380" x2="800" y2="380" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow1)"/>

  <!-- Annotations -->
  <line x1="60" y1="610" x2="1140" y2="610" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Legend -->
  <circle cx="80" cy="650" r="9" fill="#B7332C"/>
  <text x="80" y="654" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>
  <text x="100" y="654" class="body" font-size="11" fill="#1A1A1A">Le host instancie un client par serveur cible — la composition se fait côté host, pas côté serveur.</text>

  <circle cx="80" cy="680" r="9" fill="#B7332C"/>
  <text x="80" y="684" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">2</text>
  <text x="100" y="684" class="body" font-size="11" fill="#1A1A1A">JSON-RPC 2.0 = format wire ; stdio et Streamable HTTP = transports. Le SSE pur est désormais legacy.</text>

  <circle cx="80" cy="710" r="9" fill="#B7332C"/>
  <text x="80" y="714" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">3</text>
  <text x="100" y="714" class="body" font-size="11" fill="#1A1A1A">Quatre primitives — tools, resources, prompts, sampling. Sampling permet au serveur de demander une inférence au host.</text>

  <!-- FOOTER -->
  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : spécification officielle Model Context Protocol, révision 2025-06-18.</text>
</svg>
