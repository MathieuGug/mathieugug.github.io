<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-03">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Composition multi-server : un agent, quatre intégrations</text>
  <text x="60" y="118" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Le pattern qui crée la valeur — et la surface d'attaque cross-server.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- AGENT (center) -->
  <g class="interactive" data-card="agent" tabindex="0" role="button" aria-label="L'agent — détails">
    <circle cx="600" cy="400" r="110" fill="#1F5560" opacity="0.08" stroke="#1F5560" stroke-width="2.5"/>
    <text x="600" y="380" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560" text-anchor="middle">HOST + LLM</text>
    <text x="600" y="408" class="display" font-size="22" font-weight="600" fill="#1A1A1A" text-anchor="middle">Agent support</text>
    <text x="600" y="430" class="display" font-size="22" font-weight="600" fill="#1A1A1A" text-anchor="middle">technique</text>
    <text x="600" y="452" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">voit 4 listes de tools</text>
    <text x="600" y="468" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">comme une seule</text>
  </g>

  <!-- 4 servers around agent -->
  <!-- Top-left: GitHub (mcp-github) -->
  <g class="interactive" data-card="mcp-github" tabindex="0" role="button" aria-label="MCP GitHub — détails">
    <rect x="100" y="200" width="240" height="120" rx="3" fill="#B7332C" opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
    <text x="120" y="225" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">MCP-GITHUB</text>
    <text x="120" y="250" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Issues, PRs, commits</text>
    <text x="120" y="272" class="body" font-size="11" fill="#5A5A5A">create_issue, get_pr,</text>
    <text x="120" y="288" class="body" font-size="11" fill="#5A5A5A">list_commits, search_code</text>
    <text x="120" y="310" class="mono" font-size="9" letter-spacing="0.08em" fill="#B7332C">streamable HTTP · OAuth 2.0</text>
  </g>

  <!-- Top-right: Slack (mcp-slack) -->
  <g class="interactive" data-card="mcp-slack" tabindex="0" role="button" aria-label="MCP Slack — détails">
    <rect x="860" y="200" width="240" height="120" rx="3" fill="#B58A2C" opacity="0.05" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="880" y="225" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B58A2C">MCP-SLACK</text>
    <text x="880" y="250" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Notif équipes</text>
    <text x="880" y="272" class="body" font-size="11" fill="#5A5A5A">post_message,</text>
    <text x="880" y="288" class="body" font-size="11" fill="#5A5A5A">read_channel, react</text>
    <text x="880" y="310" class="mono" font-size="9" letter-spacing="0.08em" fill="#B58A2C">streamable HTTP · OAuth 2.0</text>
  </g>

  <!-- Bottom-left: Postgres (mcp-postgres) -->
  <g class="interactive" data-card="mcp-postgres" tabindex="0" role="button" aria-label="MCP Postgres — détails">
    <rect x="100" y="500" width="240" height="120" rx="3" fill="#1F5560" opacity="0.05" stroke="#1F5560" stroke-width="1.25"/>
    <text x="120" y="525" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560">MCP-POSTGRES</text>
    <text x="120" y="550" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Données client</text>
    <text x="120" y="572" class="body" font-size="11" fill="#5A5A5A">read_only_query,</text>
    <text x="120" y="588" class="body" font-size="11" fill="#5A5A5A">describe_table, list_schemas</text>
    <text x="120" y="610" class="mono" font-size="9" letter-spacing="0.08em" fill="#1F5560">stdio · process enfant local</text>
  </g>

  <!-- Bottom-right: Filesystem (mcp-fs) -->
  <g class="interactive" data-card="mcp-fs" tabindex="0" role="button" aria-label="MCP Filesystem — détails">
    <rect x="860" y="500" width="240" height="120" rx="3" fill="#5A5A5A" opacity="0.06" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="880" y="525" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#5A5A5A">MCP-FS</text>
    <text x="880" y="550" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Logs locaux</text>
    <text x="880" y="572" class="body" font-size="11" fill="#5A5A5A">read_file, list_dir,</text>
    <text x="880" y="588" class="body" font-size="11" fill="#5A5A5A">grep, write_file</text>
    <text x="880" y="610" class="mono" font-size="9" letter-spacing="0.08em" fill="#5A5A5A">stdio · sandbox de paths</text>
  </g>

  <!-- Edges from agent (circle r=110) to servers — start on the perimeter -->
  <!-- to mcp-github at (340, 260) — direction (-260, -140), L≈295, start = 600 - 110*260/295, 400 - 110*140/295 -->
  <line x1="503" y1="348" x2="345" y2="265" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow3)"/>
  <text x="430" y="318" class="mono" font-size="10" fill="#5A5A5A">client A</text>
  <!-- to mcp-slack at (860, 260) — direction (260, -140), L≈295 -->
  <line x1="697" y1="348" x2="855" y2="265" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow3)"/>
  <text x="745" y="318" class="mono" font-size="10" fill="#5A5A5A">client B</text>
  <!-- to mcp-postgres at (340, 540) — direction (-260, 140), L≈295 -->
  <line x1="503" y1="452" x2="345" y2="535" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow3)"/>
  <text x="430" y="500" class="mono" font-size="10" fill="#5A5A5A">client C</text>
  <!-- to mcp-fs at (860, 540) — direction (260, 140) -->
  <line x1="697" y1="452" x2="855" y2="535" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow3)"/>
  <text x="745" y="500" class="mono" font-size="10" fill="#5A5A5A">client D</text>

  <!-- Footer rule -->
  <line x1="60" y1="660" x2="1140" y2="660" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Annotations -->
  <circle cx="80" cy="700" r="9" fill="#B7332C"/>
  <text x="80" y="704" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>
  <text x="100" y="704" class="body" font-size="11" fill="#1A1A1A">Le LLM voit la liste agrégée — il choisit un tool sans savoir derrière quel serveur il vit.</text>

  <circle cx="80" cy="730" r="9" fill="#B7332C"/>
  <text x="80" y="734" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">2</text>
  <text x="100" y="734" class="body" font-size="11" fill="#1A1A1A">Composition = N serveurs indépendants, mais aussi N surfaces d'attaque potentielles (cf. schéma 04).</text>

  <!-- FOOTER -->
  <text x="60" y="770" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : modèle de référence MCP, spec officielle ; pattern observé sur Claude Desktop et Cursor en production.</text>
</svg>
