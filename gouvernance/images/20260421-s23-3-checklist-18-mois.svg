  <rect width="1600" height="720" fill="#FAF8F3"/>

  <!-- ===================== HEADER ===================== -->
  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCHÉMA S23.3 · CHAPITRE 23 §23.9</text>
  <text x="60" y="98" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Checklist opérationnelle 18 mois — entrer en conformité</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Du 28 mai 2026 à l'audit-ready automne 2027. Cinq jalons, quatre rôles co-signataires.</text>
  <line x1="60" y1="148" x2="1540" y2="148" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ===================== TIMELINE BASE ===================== -->
  <!-- Cards: y=170..490 (320 high). Timeline at y=540 -->
  <line x1="100" y1="540" x2="1540" y2="540" stroke="#1A1A1A" stroke-width="2"/>
  <polygon points="1540,540 1530,535 1530,545" fill="#1A1A1A"/>

  <!-- Pivot 2 août 2026 (between jalons 1 and 2, near jalon 2) -->
  <line x1="334" y1="510" x2="334" y2="570" stroke="#B7332C" stroke-width="2.5" stroke-dasharray="6 4"/>
