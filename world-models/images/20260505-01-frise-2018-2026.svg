<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100" data-schema-id="schema-01" role="img" aria-labelledby="s01-title s01-desc">
  <title id="s01-title">Chronologie 2018 ▸ 2026 — du papier fondateur Ha &amp; Schmidhuber au boom industriel des world models</title>
  <desc id="s01-desc">Chronologie verticale des world models. Vingt et un jalons listés du plus ancien (mars 2018) au plus récent (avril 2026). Trois catégories : recherche (mustard), produits (carmine), capital et personnes (teal). Trois colonnes : avant 2025 (recherche lente), 2025 (sprint industriel) et 2026 (consensus).</desc>

  <defs>
    <linearGradient id="s01-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4EB"/>
      <stop offset="100%" stop-color="#EFEADC"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="1100" fill="url(#s01-bg)"/>

  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#B23B1B" letter-spacing="0.22em">
    <text x="60" y="56">SCHÉMA 01 — CHRONOLOGIE 2018 ▸ 2026</text>
  </g>
  <g font-family="Spectral, Georgia, serif" font-size="26" fill="#111110" letter-spacing="-0.01em">
    <text x="60" y="92">Du papier fondateur au consensus industriel <tspan font-style="italic" fill="#B23B1B">— huit années, vingt et un jalons.</tspan></text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13.5" fill="#5A5A5A">
    <text x="60" y="118">Sept ans de recherche lente, puis huit mois (mai 2025 ▸ janvier 2026) qui basculent l'industrie. Cliquez sur chaque jalon pour le détail.</text>
  </g>

  <!-- Legend -->
