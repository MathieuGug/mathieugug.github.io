<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" data-schema-id="schema-09" role="img" aria-labelledby="s09-title s09-desc">
  <title id="s09-title">Trois scénarios à 24 mois — convergence pixel, convergence latent, bifurcation par usage</title>
  <desc id="s09-desc">Trois trajectoires possibles entre mai 2026 et mai 2028 pour le marché des world models. Scénario A : l'école pixel l'emporte (NVIDIA Cosmos = infra standard). Scénario B : la lignée JEPA rattrape (AMI Labs et un challenger). Scénario C : bifurcation par usage. Chaque trajectoire est jalonnée d'événements indicateurs.</desc>

  <defs>
    <linearGradient id="s09-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4EB"/>
      <stop offset="100%" stop-color="#EFEADC"/>
    </linearGradient>
    <marker id="s09-arr-pix" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#B23B1B"/>
    </marker>
    <marker id="s09-arr-lat" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#1F5560"/>
    </marker>
    <marker id="s09-arr-mix" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#7A6837"/>
    </marker>
  </defs>

  <rect width="1400" height="760" fill="url(#s09-bg)"/>

  <!-- Header -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#B23B1B" letter-spacing="0.22em">
    <text x="60" y="56">SCHÉMA 09 — TROIS SCÉNARIOS · 2026 → 2028</text>
  </g>
  <g font-family="Spectral, Georgia, serif" font-size="26" fill="#111110" letter-spacing="-0.01em">
    <text x="60" y="92">Convergence pixel, convergence latent, bifurcation <tspan font-style="italic" fill="#B23B1B">— les trois trajectoires plausibles à 24 mois.</tspan></text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13.5" fill="#5A5A5A">
    <text x="60" y="118">Lecture : un point d'origine commun (mai 2026), trois fins distinctes (mai 2028) selon les paris technologiques, capitalistiques et réglementaires des 24 prochains mois.</text>
  </g>

  <!-- Time axis labels at bottom -->
  <line x1="180" y1="700" x2="1340" y2="700" stroke="#9a9ca5" stroke-width="0.4" stroke-dasharray="3 3" opacity="0.55"/>
  <g font-family="JetBrains Mono, monospace" font-size="9.5" fill="#9a9ca5" letter-spacing="0.16em" text-anchor="middle">
    <text x="180" y="720">MAI 2026</text>
    <text x="500" y="720">Q4 2026</text>
    <text x="780" y="720">Q2 2027</text>
    <text x="1060" y="720">Q4 2027</text>
    <text x="1300" y="720">MAI 2028</text>
  </g>

  <!-- Origin point -->
  <circle cx="180" cy="430" r="14" fill="#111110"/>
  <text x="180" y="476" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#5A5A5A" letter-spacing="0.18em">MAI 2026</text>
  <text x="180" y="490" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#5A5A5A">point de bascule</text>

  <!-- ============= SCENARIO A — Convergence pixel (top) ============= -->
  <g class="interactive" data-card="scn-pixel" tabindex="0" role="button" aria-label="Scénario A — convergence pixel">
    <!-- Curve from origin going UP -->
    <path d="M 200 425 C 380 320 700 240 1000 200 L 1218 200" fill="none" stroke="#B23B1B" stroke-width="2.4" marker-end="url(#s09-arr-pix)"/>

    <!-- Scenario label (placed below origin, far from curve) -->
    <text x="220" y="408" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A2810" letter-spacing="0.18em">SCÉNARIO A</text>
    <text x="220" y="396" font-family="Spectral, Georgia, serif" font-size="18" font-weight="600" fill="#111110">Convergence <tspan font-style="italic" fill="#B23B1B">pixel</tspan></text>

    <!-- Milestones — dots on curve, label CARDS placed in clear top zone -->
    <!-- Q4 2026 -->
    <circle cx="500" cy="318" r="6" fill="#B23B1B"/>
    <line x1="500" y1="312" x2="500" y2="218" stroke="#B23B1B" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.55"/>
    <rect x="408" y="174" width="200" height="40" rx="3" fill="#FBF8F0" stroke="#B23B1B" stroke-width="0.8"/>
    <text x="418" y="190" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A2810" letter-spacing="0.16em">Q4 2026</text>
    <text x="418" y="206" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">Genie 4 — cohérence 5 min</text>

    <!-- Q2 2027 -->
    <circle cx="780" cy="240" r="6" fill="#B23B1B"/>
    <line x1="780" y1="234" x2="780" y2="218" stroke="#B23B1B" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.55"/>
    <rect x="688" y="174" width="200" height="40" rx="3" fill="#FBF8F0" stroke="#B23B1B" stroke-width="0.8"/>
    <text x="698" y="190" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A2810" letter-spacing="0.16em">Q2 2027 · « CUDA des WM »</text>
    <text x="698" y="206" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">Cosmos = infra standard</text>

    <!-- Q4 2027 -->
    <circle cx="1060" cy="206" r="6" fill="#B23B1B"/>
    <line x1="1060" y1="200" x2="1060" y2="174" stroke="#B23B1B" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.55"/>
    <rect x="968" y="130" width="200" height="40" rx="3" fill="#FBF8F0" stroke="#B23B1B" stroke-width="0.8"/>
    <text x="978" y="146" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A2810" letter-spacing="0.16em">Q4 2027</text>
    <text x="978" y="162" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">Marble 2.0 = standard 3D</text>

    <!-- End state card -->
    <rect x="1218" y="146" width="160" height="80" rx="3" fill="#FBF8F0" stroke="#B23B1B" stroke-width="1.2"/>
    <text x="1298" y="166" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A2810" letter-spacing="0.16em">FIN MAI 2028</text>
    <text x="1298" y="186" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">agents commerciaux</text>
    <text x="1298" y="202" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">explosent · AGI hors</text>
    <text x="1298" y="218" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">de portée encore</text>
  </g>

  <!-- ============= SCENARIO C — Bifurcation par usage (middle, horizontal) ============= -->
  <g class="interactive" data-card="scn-mix" tabindex="0" role="button" aria-label="Scénario C — bifurcation par usage">
    <path d="M 200 430 L 1218 430" fill="none" stroke="#7A6837" stroke-width="2.4" marker-end="url(#s09-arr-mix)"/>

    <!-- Scenario label (placed below the line, just under origin) -->
    <text x="220" y="514" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A6837" letter-spacing="0.18em">SCÉNARIO C · LE PLUS PROBABLE</text>
    <text x="220" y="534" font-family="Spectral, Georgia, serif" font-size="18" font-weight="600" fill="#111110">Bifurcation <tspan font-style="italic" fill="#7A6837">par usage</tspan></text>

    <!-- Milestones — dots on horizontal line, label cards BELOW -->
    <!-- Q4 2026 -->
    <circle cx="500" cy="430" r="6" fill="#7A6837"/>
    <line x1="500" y1="436" x2="500" y2="464" stroke="#7A6837" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.55"/>
    <rect x="408" y="464" width="200" height="40" rx="3" fill="#FBF8F0" stroke="#7A6837" stroke-width="0.8"/>
    <text x="418" y="480" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837" letter-spacing="0.16em">Q4 2026</text>
    <text x="418" y="496" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">création = pixel · agent = latent</text>

    <!-- Q2 2027 -->
    <circle cx="780" cy="430" r="6" fill="#7A6837"/>
    <line x1="780" y1="436" x2="780" y2="464" stroke="#7A6837" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.55"/>
    <rect x="688" y="464" width="200" height="40" rx="3" fill="#FBF8F0" stroke="#7A6837" stroke-width="0.8"/>
    <text x="698" y="480" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837" letter-spacing="0.16em">Q2 2027</text>
    <text x="698" y="496" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">consolidation infra (NVIDIA + cloud)</text>

    <!-- Q4 2027 -->
    <circle cx="1060" cy="430" r="6" fill="#7A6837"/>
    <line x1="1060" y1="436" x2="1060" y2="464" stroke="#7A6837" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.55"/>
    <rect x="968" y="464" width="200" height="40" rx="3" fill="#FBF8F0" stroke="#7A6837" stroke-width="0.8"/>
    <text x="978" y="480" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837" letter-spacing="0.16em">Q4 2027</text>
    <text x="978" y="496" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">Wayve, World Labs, 1X consolident</text>

    <!-- End state card -->
    <rect x="1218" y="394" width="160" height="80" rx="3" fill="#FBF8F0" stroke="#7A6837" stroke-width="1.2"/>
    <text x="1298" y="414" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837" letter-spacing="0.16em">FIN MAI 2028</text>
    <text x="1298" y="434" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">chaque école son</text>
    <text x="1298" y="450" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">terrain · les hybrides</text>
    <text x="1298" y="466" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">deviennent la norme</text>
  </g>

  <!-- ============= SCENARIO B — Convergence latent (bottom) ============= -->
  <g class="interactive" data-card="scn-latent" tabindex="0" role="button" aria-label="Scénario B — convergence latent">
    <path d="M 200 435 C 380 540 700 620 1000 660 L 1218 660" fill="none" stroke="#1F5560" stroke-width="2.4" marker-end="url(#s09-arr-lat)"/>

    <!-- Scenario label (placed above curve start) -->
    <text x="220" y="568" font-family="JetBrains Mono, monospace" font-size="10" fill="#13253D" letter-spacing="0.18em">SCÉNARIO B</text>
    <text x="220" y="588" font-family="Spectral, Georgia, serif" font-size="18" font-weight="600" fill="#111110">Convergence <tspan font-style="italic" fill="#1F5560">latent</tspan></text>

    <!-- Milestones — dots on curve, label cards BELOW curve in bottom zone -->
    <!-- Q4 2026 — dot on curve approx y=540 -->
    <circle cx="500" cy="540" r="6" fill="#1F5560"/>
    <line x1="500" y1="546" x2="500" y2="624" stroke="#1F5560" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.55"/>
    <rect x="408" y="624" width="200" height="40" rx="3" fill="#FBF8F0" stroke="#1F5560" stroke-width="0.8"/>
    <text x="418" y="640" font-family="JetBrains Mono, monospace" font-size="9" fill="#13253D" letter-spacing="0.16em">Q4 2026</text>
    <text x="418" y="656" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">AMI Labs sort modèle JEPA 100 G</text>

    <!-- Q2 2027 — dot on curve approx y=614 -->
    <circle cx="780" cy="614" r="6" fill="#1F5560"/>
    <line x1="780" y1="620" x2="780" y2="624" stroke="#1F5560" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.55"/>
    <rect x="688" y="624" width="200" height="40" rx="3" fill="#FBF8F0" stroke="#1F5560" stroke-width="0.8"/>
    <text x="698" y="640" font-family="JetBrains Mono, monospace" font-size="9" fill="#13253D" letter-spacing="0.16em">Q2 2027 · benchmarks robotiques</text>
    <text x="698" y="656" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">V-JEPA 3 dépasse les pixel</text>

    <!-- Q4 2027 — dot on curve approx y=652 -->
    <circle cx="1060" cy="652" r="6" fill="#1F5560"/>
    <rect x="968" y="610" width="200" height="40" rx="3" fill="#FBF8F0" stroke="#1F5560" stroke-width="0.8"/>
    <text x="978" y="626" font-family="JetBrains Mono, monospace" font-size="9" fill="#13253D" letter-spacing="0.16em">Q4 2027 · ratio 16 000:1</text>
    <text x="978" y="642" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">humanoïdes adoptent latent</text>

    <!-- End state card -->
    <rect x="1218" y="624" width="160" height="80" rx="3" fill="#FBF8F0" stroke="#1F5560" stroke-width="1.2"/>
    <text x="1298" y="644" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#13253D" letter-spacing="0.16em">FIN MAI 2028</text>
    <text x="1298" y="664" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">pixel cantonné à la</text>
    <text x="1298" y="680" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">création · latent gagne</text>
    <text x="1298" y="696" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">la robotique sérieuse</text>
  </g>

  <!-- Three indicators to monitor (bottom-left small block) -->
  <g transform="translate(60 568)">
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#5A5A5A" letter-spacing="0.18em">TROIS INDICATEURS À SURVEILLER</text>
    <text x="0" y="22" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">⊳ benchmarks robotiques 2027</text>
    <text x="0" y="42" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">⊳ coût marginal d'inférence</text>
    <text x="0" y="62" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">⊳ régulation EU/US/CN</text>
  </g>

  <text x="60" y="744" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#9a9ca5" letter-spacing="0.14em">SCÉNARIOS PROPRES À CE RAPPORT — INSPIRÉS DES POSITIONS PUBLIQUES DES ACTEURS · MAI 2026</text>
</svg>
