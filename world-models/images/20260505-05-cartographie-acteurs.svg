<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" data-schema-id="schema-05" role="img" aria-labelledby="s05-title s05-desc">
  <title id="s05-title">Cartographie des dix acteurs majeurs de world models en 2026</title>
  <desc id="s05-desc">Cartographie 2D des dix acteurs majeurs des world models en mai 2026. Axe horizontal : modèle ouvert (gauche) vs fermé / propriétaire (droite). Axe vertical : usage générique / horizontal (haut) vs usage vertical / spécialisé (bas). Hyperscalers, pure-players, industriels.</desc>

  <defs>
    <linearGradient id="s05-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4EB"/>
      <stop offset="100%" stop-color="#EFEADC"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="760" fill="url(#s05-bg)"/>

  <!-- Header -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#B23B1B" letter-spacing="0.22em">
    <text x="60" y="56">SCHÉMA 05 — CARTOGRAPHIE 2026</text>
  </g>
  <g font-family="Spectral, Georgia, serif" font-size="26" fill="#111110" letter-spacing="-0.01em">
    <text x="60" y="92">Dix acteurs <tspan font-style="italic" fill="#B23B1B">— ouvert/fermé × générique/vertical.</tspan></text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13.5" fill="#5A5A5A">
    <text x="60" y="118">Trois familles : hyperscalers généralistes, pure-players grand public, industriels verticaux. Le débat ouvert/fermé recouvre celui de la dépendance.</text>
  </g>

  <!-- ===== Matrix frame ===== -->
  <rect x="220" y="180" width="960" height="500" fill="none" stroke="#111110" stroke-width="1"/>
  <line x1="700" y1="180" x2="700" y2="680" stroke="#111110" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="220" y1="430" x2="1180" y2="430" stroke="#111110" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- Axis labels -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#5A5A5A" letter-spacing="0.18em">
    <text x="460" y="160" text-anchor="middle">OUVERT · POIDS PUBLICS</text>
    <text x="940" y="160" text-anchor="middle">FERMÉ · API · PROPRIÉTAIRE</text>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#5A5A5A" letter-spacing="0.18em">
    <text x="120" y="305" text-anchor="middle" transform="rotate(-90 120 305)">GÉNÉRIQUE · HORIZONTAL</text>
    <text x="120" y="555" text-anchor="middle" transform="rotate(-90 120 555)">VERTICAL · SPÉCIALISÉ</text>
  </g>

  <!-- Quadrant captions -->
  <g font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#9a9ca5">
    <text x="460" y="200">infrastructure ouverte pour tous</text>
    <text x="940" y="200">plateforme propriétaire généraliste</text>
    <text x="460" y="670">framework vertical open source</text>
    <text x="940" y="670">SaaS / produit fini fermé</text>
  </g>

  <!-- ===== Bubbles per actor ===== -->

  <!-- Quadrant: ouvert × générique -->
  <g class="interactive" data-card="meta-act" tabindex="0" role="button" aria-label="Meta — V-JEPA 2 ouvert">
    <circle cx="380" cy="290" r="48" fill="#E2EBED" stroke="#1F5560" stroke-width="1.6"/>
    <text x="380" y="285" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="15" font-weight="600" fill="#111110">Meta · V-JEPA 2</text>
    <text x="380" y="303" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">code · poids · datasets</text>
  </g>

  <g class="interactive" data-card="nvidia-act" tabindex="0" role="button" aria-label="NVIDIA — Cosmos ouvert généraliste">
    <circle cx="540" cy="370" r="50" fill="#E2EBED" stroke="#1F5560" stroke-width="1.6"/>
    <text x="540" y="365" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="15" font-weight="600" fill="#111110">NVIDIA · Cosmos</text>
    <text x="540" y="383" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">Nano · Super · Ultra</text>
  </g>

  <!-- Quadrant: fermé × générique -->
  <g class="interactive" data-card="dm-act" tabindex="0" role="button" aria-label="DeepMind — Genie 3 fermé">
    <circle cx="900" cy="280" r="56" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1.8"/>
    <text x="900" y="276" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="16" font-weight="600" fill="#111110">DeepMind · Genie 3</text>
    <text x="900" y="293" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">+ SIMA 2 · API Ultra US</text>
  </g>

  <g class="interactive" data-card="runway-act" tabindex="0" role="button" aria-label="Runway — GWM-1 fermé">
    <circle cx="1060" cy="370" r="46" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1.6"/>
    <text x="1060" y="367" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">Runway · GWM-1</text>
    <text x="1060" y="384" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">3 variantes · API</text>
  </g>

  <g class="interactive" data-card="openai-act" tabindex="0" role="button" aria-label="OpenAI — Sora fermé">
    <circle cx="1010" cy="240" r="36" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1.4"/>
    <text x="1010" y="238" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-weight="600" fill="#111110">OpenAI · Sora</text>
    <text x="1010" y="253" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">vidéo · API</text>
  </g>

  <!-- Quadrant: ouvert × vertical -->
  <g class="interactive" data-card="ami-act" tabindex="0" role="button" aria-label="AMI Labs (LeCun)">
    <circle cx="350" cy="510" r="50" fill="#E2EBED" stroke="#1F5560" stroke-width="1.6" stroke-dasharray="3 3"/>
    <text x="350" y="505" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">AMI Labs · LeCun</text>
    <text x="350" y="522" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">industrie · santé · à venir</text>
  </g>

  <g class="interactive" data-card="dreamer-act" tabindex="0" role="button" aria-label="DeepMind — Dreamer V3 open source">
    <circle cx="500" cy="580" r="40" fill="#E2EBED" stroke="#1F5560" stroke-width="1.4"/>
    <text x="500" y="576" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-weight="600" fill="#111110">DreamerV3</text>
    <text x="500" y="592" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">code Hafner · open</text>
  </g>

  <g class="interactive" data-card="decart-act" tabindex="0" role="button" aria-label="Decart Oasis">
    <circle cx="600" cy="510" r="36" fill="#E2EBED" stroke="#1F5560" stroke-width="1.4"/>
    <text x="600" y="508" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-weight="600" fill="#111110">Decart · Oasis</text>
    <text x="600" y="523" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">démo open</text>
  </g>

  <!-- Quadrant: fermé × vertical -->
  <g class="interactive" data-card="wayve-act" tabindex="0" role="button" aria-label="Wayve — GAIA-3">
    <circle cx="900" cy="510" r="48" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1.6"/>
    <text x="900" y="506" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">Wayve · GAIA-3</text>
    <text x="900" y="522" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">conduite autonome</text>
  </g>

  <g class="interactive" data-card="tesla-act" tabindex="0" role="button" aria-label="Tesla FSD V14">
    <circle cx="1050" cy="560" r="42" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1.5"/>
    <text x="1050" y="558" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-weight="600" fill="#111110">Tesla · FSD V14</text>
    <text x="1050" y="573" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">end-to-end · 10 G</text>
  </g>

  <g class="interactive" data-card="onex-act" tabindex="0" role="button" aria-label="1X World Model">
    <circle cx="780" cy="600" r="40" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1.5"/>
    <text x="780" y="598" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-weight="600" fill="#111110">1X · NEO WM</text>
    <text x="780" y="613" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">humanoïde · grand public</text>
  </g>

  <g class="interactive" data-card="worldlabs-act" tabindex="0" role="button" aria-label="World Labs — Marble">
    <circle cx="970" cy="610" r="44" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1.5"/>
    <text x="970" y="608" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">World Labs · Marble</text>
    <text x="970" y="624" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">création 3D</text>
  </g>

  <!-- ===== Right-side legend / family colors ===== -->
  <g transform="translate(1220 200)">
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#5A5A5A" letter-spacing="0.18em">FAMILLES</text>

    <circle cx="14" cy="40" r="9" fill="#E2EBED" stroke="#1F5560" stroke-width="1.4"/>
    <text x="32" y="44" font-family="Inter, sans-serif" font-size="11.5" fill="#111110">école latent / open</text>

    <circle cx="14" cy="68" r="9" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1.4"/>
    <text x="32" y="72" font-family="Inter, sans-serif" font-size="11.5" fill="#111110">école pixel / fermé</text>

    <line x1="6" y1="100" x2="22" y2="100" stroke="#1F5560" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="32" y="104" font-family="Inter, sans-serif" font-size="11.5" fill="#111110">à venir / annoncé</text>

    <text x="0" y="160" font-family="JetBrains Mono, monospace" font-size="10" fill="#5A5A5A" letter-spacing="0.18em">TAILLE BULLE</text>
    <circle cx="14" cy="186" r="14" fill="#FBF8F0" stroke="#5A5A5A" stroke-width="1"/>
    <text x="36" y="190" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">poids stratégique du modèle</text>
    <text x="36" y="204" font-family="Inter, sans-serif" font-size="11" fill="#9a9ca5">(échelle approximative)</text>
  </g>

  <!-- Caption strip -->
  <g transform="translate(60 712)">
    <text x="0" y="0" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#5A5A5A">Lecture : la quadrature « ouvert × générique » est la plus convoitée — c'est là que se joue le rôle de plateforme à la CUDA pour la décennie qui vient.</text>
  </g>

  <text x="60" y="744" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#9a9ca5" letter-spacing="0.14em">SOURCES · ANNONCES OFFICIELLES DES 10 ACTEURS · TECHCRUNCH · MIT TR · MAI 2026</text>
</svg>
