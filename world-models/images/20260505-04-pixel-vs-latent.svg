<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" data-schema-id="schema-04" role="img" aria-labelledby="s04-title s04-desc">
  <title id="s04-title">Matrice 2×2 — où prédire (pixel vs latent), comment prédire (autoregressif vs diffusif)</title>
  <desc id="s04-desc">Matrice à deux axes positionnant les principaux world models de 2025-2026. Axe horizontal : autoregressif vs diffusion. Axe vertical : prédiction pixel vs prédiction latente.</desc>

  <defs>
    <linearGradient id="s04-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4EB"/>
      <stop offset="100%" stop-color="#EFEADC"/>
    </linearGradient>
    <linearGradient id="s04-pixel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBE9E1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FBE9E1" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="s04-latent" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#DEEBED" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#DEEBED" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="760" fill="url(#s04-bg)"/>

  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#B23B1B" letter-spacing="0.22em">
    <text x="60" y="56">SCHÉMA 04 — DEUX ÉCOLES, UN MÊME MOT</text>
  </g>
  <g font-family="Spectral, Georgia, serif" font-size="26" fill="#111110" letter-spacing="-0.01em">
    <text x="60" y="92">Pixel ou latent <tspan font-style="italic" fill="#B23B1B">— l'arbitrage technique le plus disputé de 2026.</tspan></text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13.5" fill="#5A5A5A">
    <text x="60" y="118">Deux axes, dix modèles. Chaque case a ses produits commerciaux — aucun domaine n'a un vainqueur évident.</text>
  </g>

  <!-- ===== Matrix frame: 240 to 1180 horizontally, 200 to 620 vertically ===== -->
  <!-- Quadrant backgrounds -->
  <rect x="240" y="200" width="940" height="210" fill="url(#s04-pixel)"/>
  <rect x="240" y="410" width="940" height="210" fill="url(#s04-latent)"/>

  <rect x="240" y="200" width="940" height="420" fill="none" stroke="#111110" stroke-width="1"/>
  <line x1="710" y1="200" x2="710" y2="620" stroke="#111110" stroke-width="0.6" stroke-dasharray="4 4"/>
  <line x1="240" y1="410" x2="1180" y2="410" stroke="#111110" stroke-width="0.6" stroke-dasharray="4 4"/>

  <!-- Axis labels -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#7A2810" letter-spacing="0.18em">
    <text x="475" y="180" text-anchor="middle">AUTORÉGRESSIF · NEXT-FRAME</text>
    <text x="945" y="180" text-anchor="middle">DIFFUSION · LATENT DIFFUSION</text>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#7A6837" letter-spacing="0.18em">
    <text x="120" y="305" text-anchor="middle" transform="rotate(-90 120 305)">PRÉDICTION PIXEL</text>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#13253D" letter-spacing="0.18em">
    <text x="120" y="515" text-anchor="middle" transform="rotate(-90 120 515)">PRÉDICTION LATENTE</text>
  </g>

  <!-- Quadrant captions -->
  <g font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#9a9ca5">
    <text x="475" y="218">image suivante, frame par frame</text>
    <text x="945" y="218">débruite vers une scène future</text>
    <text x="475" y="610">DreamerV3 — pixels = cible auxiliaire</text>
    <text x="945" y="610">JEPA — pixels jamais en sortie</text>
  </g>

  <!-- ===== Models — bubbles ===== -->
  <!-- TOP-LEFT (pixel × autoregressive): x 240-710, y 200-410 -->
  <g class="interactive" data-card="genie3-cell" tabindex="0" role="button" aria-label="Genie 3 — pixel autoregressif">
    <circle cx="345" cy="285" r="42" fill="#FBE9E1" stroke="#B23B1B" stroke-width="1.6"/>
    <text x="345" y="282" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">Genie 3</text>
    <text x="345" y="298" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">11 G · 24 fps</text>
  </g>
  <g class="interactive" data-card="oasis-cell" tabindex="0" role="button" aria-label="Decart Oasis">
    <circle cx="490" cy="365" r="34" fill="#FBE9E1" stroke="#B23B1B" stroke-width="1.4"/>
    <text x="490" y="363" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-weight="600" fill="#111110">Oasis</text>
    <text x="490" y="378" text-anchor="middle" font-family="Inter, sans-serif" font-size="9.5" fill="#5A5A5A">20 fps · MC</text>
  </g>
  <g class="interactive" data-card="gwm1-cell" tabindex="0" role="button" aria-label="Runway GWM-1">
    <circle cx="600" cy="278" r="36" fill="#FBE9E1" stroke="#B23B1B" stroke-width="1.4"/>
    <text x="600" y="275" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-weight="600" fill="#111110">GWM-1</text>
    <text x="600" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">Runway</text>
  </g>
  <g class="interactive" data-card="onex-cell" tabindex="0" role="button" aria-label="1X World Model">
    <circle cx="630" cy="365" r="32" fill="#FBE9E1" stroke="#B23B1B" stroke-width="1.4"/>
    <text x="630" y="363" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="12" font-weight="600" fill="#111110">1X-WM</text>
    <text x="630" y="378" text-anchor="middle" font-family="Inter, sans-serif" font-size="9.5" fill="#5A5A5A">vidéo→action</text>
  </g>

  <!-- TOP-RIGHT (pixel × diffusion): x 710-1180, y 200-410 -->
  <g class="interactive" data-card="sora-cell" tabindex="0" role="button" aria-label="Sora — pixel diffusion">
    <circle cx="820" cy="285" r="42" fill="#FBE9E1" stroke="#B23B1B" stroke-width="1.6"/>
    <text x="820" y="282" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">Sora</text>
    <text x="820" y="298" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">DiT · OpenAI</text>
  </g>
  <g class="interactive" data-card="gaia3-cell" tabindex="0" role="button" aria-label="Wayve GAIA-3">
    <circle cx="965" cy="278" r="44" fill="#FBE9E1" stroke="#B23B1B" stroke-width="1.6"/>
    <text x="965" y="275" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">GAIA-3</text>
    <text x="965" y="291" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">15 G · l. diffusion</text>
  </g>
  <g class="interactive" data-card="cosmos-cell" tabindex="0" role="button" aria-label="NVIDIA Cosmos">
    <circle cx="1085" cy="298" r="40" fill="#FBE9E1" stroke="#B23B1B" stroke-width="1.5"/>
    <text x="1085" y="296" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">Cosmos</text>
    <text x="1085" y="312" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">NVIDIA · multi</text>
  </g>
  <g class="interactive" data-card="marble-cell" tabindex="0" role="button" aria-label="Marble World Labs">
    <circle cx="900" cy="375" r="34" fill="#FBE9E1" stroke="#B23B1B" stroke-width="1.5"/>
    <text x="900" y="373" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-weight="600" fill="#111110">Marble</text>
    <text x="900" y="388" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">Gauss splat</text>
  </g>

  <!-- BOTTOM-LEFT (latent × autoregressive): x 240-710, y 410-620 -->
  <g class="interactive" data-card="dreamer-cell" tabindex="0" role="button" aria-label="DreamerV3">
    <circle cx="475" cy="500" r="44" fill="#DEEBED" stroke="#1F5560" stroke-width="1.6"/>
    <text x="475" y="498" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">DreamerV3</text>
    <text x="475" y="514" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">RSSM · 150 tâches</text>
  </g>
  <g class="interactive" data-card="vmc-cell" tabindex="0" role="button" aria-label="V/M/C Ha &amp; Schmidhuber 2018">
    <circle cx="350" cy="565" r="34" fill="#DEEBED" stroke="#1F5560" stroke-width="1.4" stroke-dasharray="2 3" opacity="0.7"/>
    <text x="350" y="563" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-weight="600" fill="#111110">V/M/C</text>
    <text x="350" y="578" text-anchor="middle" font-family="Inter, sans-serif" font-size="9.5" fill="#5A5A5A">Ha 2018 · histo</text>
  </g>

  <!-- BOTTOM-RIGHT (latent × diffusion-ish/predictive): x 710-1180, y 410-620 -->
  <g class="interactive" data-card="vjepa2-cell" tabindex="0" role="button" aria-label="V-JEPA 2">
    <circle cx="930" cy="500" r="50" fill="#DEEBED" stroke="#1F5560" stroke-width="2"/>
    <text x="930" y="497" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="15" font-weight="600" fill="#111110">V-JEPA 2</text>
    <text x="930" y="514" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5A5A5A">Meta · 1,2 G</text>
  </g>
  <g class="interactive" data-card="ami-cell" tabindex="0" role="button" aria-label="AMI Labs (LeCun) — modèles à venir">
    <circle cx="1080" cy="555" r="38" fill="#DEEBED" stroke="#1F5560" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="1080" y="553" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-weight="600" fill="#111110">AMI Labs</text>
    <text x="1080" y="568" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#5A5A5A">à venir 2026-27</text>
  </g>

  <!-- ===== Side legend / school summary ===== -->
  <g transform="translate(1220 200)">
    <rect x="0" y="0" width="160" height="200" rx="3" fill="#FBE9E1" stroke="#B23B1B" stroke-width="1"/>
    <text x="80" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A2810" letter-spacing="0.18em">ÉCOLE PIXEL</text>
    <text x="14" y="48" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">+ image directement</text>
    <text x="14" y="64" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">  exploitable</text>
    <text x="14" y="86" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">+ création, simulation,</text>
    <text x="14" y="102" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">  évaluation</text>
    <text x="14" y="124" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#7A2810">− coûteux en compute</text>
    <text x="14" y="146" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#7A2810">− physique fine fragile</text>
    <text x="14" y="168" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#7A2810">− détails inessentiels</text>
    <text x="14" y="184" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#7A2810">  consomment la capacité</text>
  </g>

  <g transform="translate(1220 420)">
    <rect x="0" y="0" width="160" height="200" rx="3" fill="#DEEBED" stroke="#1F5560" stroke-width="1"/>
    <text x="80" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#13253D" letter-spacing="0.18em">ÉCOLE LATENT</text>
    <text x="14" y="48" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">+ planification efficace</text>
    <text x="14" y="70" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">+ fine-tuning robotique</text>
    <text x="14" y="86" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">  ratio 16 000 :1</text>
    <text x="14" y="108" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">+ gère la multi-modalité</text>
    <text x="14" y="124" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">  des futurs</text>
    <text x="14" y="148" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#13253D">− pas de rendu visuel</text>
    <text x="14" y="170" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#13253D">− évaluation dure</text>
    <text x="14" y="192" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#13253D">− moins de produits</text>
  </g>

  <!-- LeCun citation -->
  <g transform="translate(60 660)">
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#7A2810" letter-spacing="0.2em">CITATION LECUN · FÉV 2024</text>
    <text x="0" y="22" font-family="Spectral, Georgia, serif" font-size="14" font-style="italic" fill="#111110">« Modéliser le monde pour l'action en générant des pixels est aussi gaspilleur que voué à l'échec. »</text>
  </g>

  <text x="60" y="744" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#9a9ca5" letter-spacing="0.14em">SOURCES · OPENAI · DEEPMIND · WAYVE · NVIDIA · META · WORLD LABS · DECART · RUNWAY · LECUN 2024</text>
</svg>
