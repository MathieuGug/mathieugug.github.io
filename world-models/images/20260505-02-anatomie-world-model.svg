<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" data-schema-id="schema-02" role="img" aria-labelledby="s02-title s02-desc">
  <title id="s02-title">Anatomie fonctionnelle — un world model décompose le réel en trois fonctions : comprendre, prédire, planifier</title>
  <desc id="s02-desc">Schéma fonctionnel d'un world model. À gauche, les trois entrées (observation, action candidate, état latent). Au centre, trois fonctions empilées : Comprendre, Prédire, Planifier. À droite, deux sorties (état suivant prédit et meilleure action). Une boucle de rétroaction « monde réel » ferme le cycle.</desc>

  <defs>
    <linearGradient id="s02-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4EB"/>
      <stop offset="100%" stop-color="#EFEADC"/>
    </linearGradient>
    <linearGradient id="s02-core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF8F0"/>
      <stop offset="100%" stop-color="#F1EBDC"/>
    </linearGradient>
    <marker id="s02-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#3a3a3a"/>
    </marker>
    <marker id="s02-arr-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#B23B1B"/>
    </marker>
  </defs>

  <rect width="1400" height="760" fill="url(#s02-bg)"/>

  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#B23B1B" letter-spacing="0.22em">
    <text x="60" y="56">SCHÉMA 02 — ANATOMIE FONCTIONNELLE</text>
  </g>
  <g font-family="Spectral, Georgia, serif" font-size="26" fill="#111110" letter-spacing="-0.01em">
    <text x="60" y="92">État + action <tspan font-style="italic" fill="#B23B1B">→ futur prédit → action choisie.</tspan></text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13.5" fill="#5A5A5A">
    <text x="60" y="118">Un world model n'est pas une seule fonction : c'est trois fonctions enchaînées qui partagent une représentation latente compacte.</text>
  </g>

  <!-- ENTRÉES (gauche) -->
  <g class="interactive" data-card="input-obs" tabindex="0" role="button" aria-label="Entrée observation">
    <rect x="60" y="200" width="200" height="84" rx="3" fill="#FBF8F0" stroke="#A98F55" stroke-width="1.5"/>
    <text x="76" y="226" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#7A6837" letter-spacing="0.18em">ENTRÉE 1</text>
    <text x="76" y="252" font-family="Spectral, Georgia, serif" font-size="17" font-weight="600" fill="#111110">Observation o<tspan font-size="11" baseline-shift="-30%">t</tspan></text>
    <text x="76" y="272" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">caméras · profondeur · son</text>
  </g>

  <g class="interactive" data-card="input-action" tabindex="0" role="button" aria-label="Entrée action candidate">
    <rect x="60" y="338" width="200" height="84" rx="3" fill="#FBF8F0" stroke="#A98F55" stroke-width="1.5"/>
    <text x="76" y="364" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#7A6837" letter-spacing="0.18em">ENTRÉE 2</text>
    <text x="76" y="390" font-family="Spectral, Georgia, serif" font-size="17" font-weight="600" fill="#111110">Action a<tspan font-size="11" baseline-shift="-30%">t</tspan></text>
    <text x="76" y="410" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">commande motrice candidate</text>
  </g>

  <g class="interactive" data-card="input-state" tabindex="0" role="button" aria-label="Entrée état latent mémoire">
    <rect x="60" y="476" width="200" height="84" rx="3" fill="#FBF8F0" stroke="#A98F55" stroke-width="1.5"/>
    <text x="76" y="502" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#7A6837" letter-spacing="0.18em">ENTRÉE 3</text>
    <text x="76" y="528" font-family="Spectral, Georgia, serif" font-size="17" font-weight="600" fill="#111110">État latent h<tspan font-size="11" baseline-shift="-30%">t</tspan></text>
    <text x="76" y="548" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">mémoire récurrente</text>
  </g>

  <g stroke="#3a3a3a" stroke-width="1" fill="none" marker-end="url(#s02-arr)">
    <line x1="262" y1="242" x2="425" y2="270"/>
    <line x1="262" y1="380" x2="425" y2="380"/>
    <line x1="262" y1="518" x2="425" y2="490"/>
  </g>

  <!-- CORE (centre) -->
  <rect x="430" y="190" width="540" height="400" rx="6" fill="url(#s02-core)" stroke="#111110" stroke-width="0.8"/>
  <text x="700" y="218" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#5A5A5A" letter-spacing="0.22em">WORLD MODEL — TROIS FONCTIONS</text>

  <g class="interactive" data-card="comprendre" tabindex="0" role="button" aria-label="Fonction 1 — Comprendre / encoder">
    <rect x="450" y="240" width="500" height="98" rx="3" fill="#F5EFDA" stroke="#A98F55" stroke-width="1.2"/>
    <text x="468" y="266" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A6837" letter-spacing="0.18em">FONCTION 1</text>
    <text x="468" y="294" font-family="Spectral, Georgia, serif" font-size="20" font-weight="600" fill="#111110">Comprendre</text>
    <text x="468" y="316" font-family="Inter, sans-serif" font-size="12" fill="#5A5A5A">Encoder l'observation en représentation latente compacte z</text>
    <text x="468" y="330" font-family="Inter, sans-serif" font-size="12" fill="#5A5A5A" font-style="italic">VAE (Ha 2018) · ViT · JEPA encoder</text>
    <text x="934" y="294" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#7A6837">o → z</text>
  </g>

  <g class="interactive" data-card="predire" tabindex="0" role="button" aria-label="Fonction 2 — Prédire / dynamics">
    <rect x="450" y="354" width="500" height="98" rx="3" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1.2"/>
    <text x="468" y="380" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A2810" letter-spacing="0.18em">FONCTION 2</text>
    <text x="468" y="408" font-family="Spectral, Georgia, serif" font-size="20" font-weight="600" fill="#111110">Prédire</text>
    <text x="468" y="430" font-family="Inter, sans-serif" font-size="12" fill="#5A5A5A">Dérouler la dynamique : étant donné z et a, prédire z'</text>
    <text x="468" y="444" font-family="Inter, sans-serif" font-size="12" fill="#5A5A5A" font-style="italic">RNN (Ha) · RSSM (Dreamer) · Transformer · Diffusion</text>
    <text x="934" y="408" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#7A2810">f(z, a) → z'</text>
  </g>

  <g class="interactive" data-card="planifier" tabindex="0" role="button" aria-label="Fonction 3 — Planifier / rollout">
    <rect x="450" y="468" width="500" height="98" rx="3" fill="#E2EBED" stroke="#1F5560" stroke-width="1.2"/>
    <text x="468" y="494" font-family="JetBrains Mono, monospace" font-size="10" fill="#13253D" letter-spacing="0.18em">FONCTION 3</text>
    <text x="468" y="522" font-family="Spectral, Georgia, serif" font-size="20" font-weight="600" fill="#111110">Planifier</text>
    <text x="468" y="544" font-family="Inter, sans-serif" font-size="12" fill="#5A5A5A">Comparer plusieurs séquences d'actions (rollouts) — choisir la meilleure</text>
    <text x="468" y="558" font-family="Inter, sans-serif" font-size="12" fill="#5A5A5A" font-style="italic">CEM · MCTS · gradient-based search · imagination</text>
    <text x="934" y="522" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#13253D">argmax Σ r(z)</text>
  </g>

  <g stroke="#3a3a3a" stroke-width="1" fill="none" marker-end="url(#s02-arr)">
    <line x1="700" y1="338" x2="700" y2="350"/>
    <line x1="700" y1="452" x2="700" y2="464"/>
  </g>

  <!-- SORTIES (droite) -->
  <g class="interactive" data-card="output-state" tabindex="0" role="button" aria-label="Sortie — état suivant prédit">
    <rect x="1140" y="248" width="200" height="84" rx="3" fill="#FBF8F0" stroke="#A98F55" stroke-width="1.5"/>
    <text x="1156" y="274" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#7A6837" letter-spacing="0.18em">SORTIE 1</text>
    <text x="1156" y="300" font-family="Spectral, Georgia, serif" font-size="17" font-weight="600" fill="#111110">État suivant ẑ<tspan font-size="11" baseline-shift="-30%">t+1</tspan></text>
    <text x="1156" y="320" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">prédit · pixel ou latent</text>
  </g>

  <g class="interactive" data-card="output-action" tabindex="0" role="button" aria-label="Sortie — action choisie">
    <rect x="1140" y="476" width="200" height="84" rx="3" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1.5"/>
    <text x="1156" y="502" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#7A2810" letter-spacing="0.18em">SORTIE 2</text>
    <text x="1156" y="528" font-family="Spectral, Georgia, serif" font-size="17" font-weight="600" fill="#111110">Action a*</text>
    <text x="1156" y="548" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">la meilleure trajectoire</text>
  </g>

  <g stroke="#3a3a3a" stroke-width="1" fill="none" marker-end="url(#s02-arr)">
    <path d="M 952 290 Q 1050 290 1138 290"/>
    <path d="M 952 518 Q 1050 518 1138 518"/>
  </g>

  <!-- ROLLOUT TREE -->
  <g transform="translate(990 374)" opacity="0.85">
    <text x="180" y="-2" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#13253D" letter-spacing="0.16em">ROLLOUT D'IMAGINATION</text>
    <circle cx="14" cy="40" r="6" fill="#1F5560"/>
    <line x1="20" y1="40" x2="78" y2="22" stroke="#5A5A5A" stroke-width="0.8"/>
    <line x1="20" y1="40" x2="78" y2="40" stroke="#5A5A5A" stroke-width="0.8"/>
    <line x1="20" y1="40" x2="78" y2="58" stroke="#5A5A5A" stroke-width="0.8"/>
    <circle cx="84" cy="22" r="4.5" fill="#A98F55"/>
    <circle cx="84" cy="40" r="4.5" fill="#1F5560"/>
    <circle cx="84" cy="58" r="4.5" fill="#A98F55"/>
    <line x1="89" y1="22" x2="148" y2="14" stroke="#5A5A5A" stroke-width="0.7"/>
    <line x1="89" y1="22" x2="148" y2="30" stroke="#5A5A5A" stroke-width="0.7"/>
    <line x1="89" y1="40" x2="148" y2="40" stroke="#B23B1B" stroke-width="1.6"/>
    <line x1="89" y1="58" x2="148" y2="50" stroke="#5A5A5A" stroke-width="0.7"/>
    <line x1="89" y1="58" x2="148" y2="66" stroke="#5A5A5A" stroke-width="0.7"/>
    <circle cx="154" cy="14" r="3.5" fill="#A98F55"/>
    <circle cx="154" cy="30" r="3.5" fill="#A98F55"/>
    <circle cx="154" cy="40" r="6" fill="#B23B1B" stroke="#7A2810" stroke-width="1"/>
    <circle cx="154" cy="50" r="3.5" fill="#A98F55"/>
    <circle cx="154" cy="66" r="3.5" fill="#A98F55"/>
    <text x="170" y="44" font-family="Spectral, Georgia, serif" font-size="11.5" font-style="italic" fill="#7A2810">meilleure trajectoire</text>
  </g>

  <!-- Feedback loop -->
  <g>
    <path d="M 1240 562 C 1240 660 700 700 700 660 L 700 614" fill="none" stroke="#B23B1B" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#s02-arr-c)"/>
    <text x="970" y="700" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#B23B1B">action exécutée dans le monde réel · nouvelle observation · retour à l'entrée</text>
    <text x="970" y="718" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#7A2810" letter-spacing="0.16em">BOUCLE DE RÉTROACTION</text>
  </g>

  <text x="60" y="744" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#9a9ca5" letter-spacing="0.14em">SOURCES · HA &amp; SCHMIDHUBER 2018 · HAFNER 2023 · LECUN 2022 · SUTTON &amp; BARTO 2018</text>
</svg>
