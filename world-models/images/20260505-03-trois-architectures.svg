<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" data-schema-id="schema-03" role="img" aria-labelledby="s03-title s03-desc">
  <title id="s03-title">Trois architectures successives — V/M/C (2018), RSSM Dreamer (2023), JEPA (2025)</title>
  <desc id="s03-desc">Comparaison côte-à-côte des trois grandes architectures de world model. Chaque colonne se lit du bas vers le haut, des données brutes vers le module de décision.</desc>

  <defs>
    <linearGradient id="s03-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4EB"/>
      <stop offset="100%" stop-color="#EFEADC"/>
    </linearGradient>
    <marker id="s03-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="1400" height="760" fill="url(#s03-bg)"/>

  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#B23B1B" letter-spacing="0.22em">
    <text x="60" y="56">SCHÉMA 03 — TROIS ARCHITECTURES</text>
  </g>
  <g font-family="Spectral, Georgia, serif" font-size="26" fill="#111110" letter-spacing="-0.01em">
    <text x="60" y="92">Du VAE+RNN au prédictif latent <tspan font-style="italic" fill="#B23B1B">— sept ans, trois bascules.</tspan></text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13.5" fill="#5A5A5A">
    <text x="60" y="118">Trois familles cohabitent. Aucune n'a chassé la précédente. Chaque colonne se lit du bas vers le haut.</text>
  </g>

  <!-- Reading direction marker -->
  <g transform="translate(60 700)">
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#5A5A5A" letter-spacing="0.16em">SENS DE LECTURE</text>
    <line x1="0" y1="14" x2="120" y2="14" stroke="#5A5A5A" stroke-width="1" marker-end="url(#s03-arr)"/>
    <text x="0" y="32" font-family="Spectral, Georgia, serif" font-size="11" font-style="italic" fill="#5A5A5A">données brutes (bas) → module de décision (haut)</text>
  </g>

  <!-- COLUMN 1 — Ha & Schmidhuber -->
  <g class="interactive" data-card="vmc" tabindex="0" role="button" aria-label="V/M/C — Ha &amp; Schmidhuber 2018">
    <rect x="80" y="170" width="380" height="500" rx="6" fill="#FBF8F0" stroke="#A98F55" stroke-width="1.2"/>
    <text x="270" y="198" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A6837" letter-spacing="0.18em">2018 · NEURIPS</text>
    <text x="270" y="226" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="22" font-weight="600" fill="#111110">V / M / C</text>
    <text x="270" y="246" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#7A6837">Ha &amp; Schmidhuber</text>

    <!-- C (top, smallest) -->
    <rect x="180" y="278" width="180" height="48" rx="3" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1"/>
    <text x="270" y="297" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A2810" letter-spacing="0.16em">C — CONTROLLER</text>
    <text x="270" y="315" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">~1 000 params · évolution</text>

    <!-- Arrow C ← M -->
    <line x1="270" y1="370" x2="270" y2="334" stroke="#3a3a3a" stroke-width="1.2" marker-end="url(#s03-arr)"/>

    <!-- M (middle) -->
    <rect x="140" y="378" width="260" height="80" rx="3" fill="#E2EBED" stroke="#1F5560" stroke-width="1"/>
    <text x="270" y="398" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#13253D" letter-spacing="0.16em">M — MEMORY (RNN+MDN)</text>
    <text x="270" y="418" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">prédit z' depuis (z, a, h)</text>
    <text x="270" y="438" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5A5A5A">distribution stochastique</text>

    <!-- Arrow M ← V -->
    <line x1="270" y1="504" x2="270" y2="466" stroke="#3a3a3a" stroke-width="1.2" marker-end="url(#s03-arr)"/>

    <!-- V (bottom, biggest) -->
    <rect x="115" y="510" width="310" height="96" rx="3" fill="#F5EFDA" stroke="#A98F55" stroke-width="1"/>
    <text x="270" y="530" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837" letter-spacing="0.16em">V — VISION (VAE)</text>
    <text x="270" y="552" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">image → vecteur z (32 dims)</text>
    <text x="270" y="572" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5A5A5A">encoder · decoder</text>
    <text x="270" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5A5A5A">non-supervisé</text>

    <!-- Bottom signature -->
    <text x="270" y="638" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#B23B1B">« apprendre dans le rêve »</text>
    <text x="270" y="657" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">CarRacing · DoomTakeCover · arXiv 1803.10122</text>
  </g>

  <!-- COLUMN 2 — Dreamer / RSSM -->
  <g class="interactive" data-card="dreamer" tabindex="0" role="button" aria-label="DreamerV3 — RSSM, 2023">
    <rect x="510" y="170" width="380" height="500" rx="6" fill="#FBF8F0" stroke="#1F5560" stroke-width="1.2"/>
    <text x="700" y="198" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#13253D" letter-spacing="0.18em">2023 · NATURE 2025</text>
    <text x="700" y="226" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="22" font-weight="600" fill="#111110">RSSM · Dreamer V3</text>
    <text x="700" y="246" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#13253D">Hafner et al. — DeepMind</text>

    <!-- Actor + Critic (top) -->
    <rect x="540" y="278" width="150" height="48" rx="3" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1"/>
    <text x="615" y="297" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A2810" letter-spacing="0.16em">ACTOR</text>
    <text x="615" y="315" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">policy π(a|z)</text>

    <rect x="710" y="278" width="150" height="48" rx="3" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1"/>
    <text x="785" y="297" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A2810" letter-spacing="0.16em">CRITIC</text>
    <text x="785" y="315" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">value V(z)</text>

    <!-- Arrows from RSSM up to actor/critic -->
    <line x1="615" y1="370" x2="615" y2="334" stroke="#3a3a3a" stroke-width="1.2" marker-end="url(#s03-arr)"/>
    <line x1="785" y1="370" x2="785" y2="334" stroke="#3a3a3a" stroke-width="1.2" marker-end="url(#s03-arr)"/>

    <!-- RSSM core -->
    <rect x="540" y="378" width="320" height="120" rx="3" fill="#E2EBED" stroke="#1F5560" stroke-width="1"/>
    <text x="700" y="398" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#13253D" letter-spacing="0.16em">RSSM — RECURRENT STATE-SPACE MODEL</text>

    <rect x="558" y="414" width="140" height="68" rx="2" fill="#F1ECE0" stroke="#5A5A5A" stroke-width="0.6"/>
    <text x="628" y="434" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">déterministe</text>
    <text x="628" y="452" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">h = GRU(h, z, a)</text>
    <text x="628" y="468" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">mémoire récurrente</text>

    <rect x="704" y="414" width="140" height="68" rx="2" fill="#F1ECE0" stroke="#5A5A5A" stroke-width="0.6"/>
    <text x="774" y="434" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">stochastique</text>
    <text x="774" y="452" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">z ~ p(z|h)</text>
    <text x="774" y="468" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">catégorielle discrète</text>

    <!-- Arrow RSSM ← input row -->
    <line x1="700" y1="540" x2="700" y2="506" stroke="#3a3a3a" stroke-width="1.2" marker-end="url(#s03-arr)"/>

    <!-- Reward + Decoder predictors -->
    <rect x="540" y="544" width="150" height="42" rx="3" fill="#F5EFDA" stroke="#A98F55" stroke-width="0.8"/>
    <text x="615" y="572" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#7A6837">reward predictor</text>
    <rect x="710" y="544" width="150" height="42" rx="3" fill="#F5EFDA" stroke="#A98F55" stroke-width="0.8"/>
    <text x="785" y="572" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#7A6837">decoder (pixels)</text>

    <text x="700" y="606" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#5A5A5A" letter-spacing="0.16em">PIXELS · ÉTAT · ACTION</text>

    <text x="700" y="638" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#B23B1B">« 150+ tâches · 1 hyper-config »</text>
    <text x="700" y="657" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">premier diamant Minecraft sans humain · arXiv 2301.04104</text>
  </g>

  <!-- COLUMN 3 — JEPA / V-JEPA 2 -->
  <g class="interactive" data-card="jepa" tabindex="0" role="button" aria-label="V-JEPA 2 — JEPA, 2025">
    <rect x="940" y="170" width="380" height="500" rx="6" fill="#FBF8F0" stroke="#B23B1B" stroke-width="1.4"/>
    <text x="1130" y="198" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A2810" letter-spacing="0.18em">JUIN 2025</text>
    <text x="1130" y="226" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="22" font-weight="600" fill="#111110">V-JEPA 2 · JEPA</text>
    <text x="1130" y="246" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#7A2810">Bardes, Ballas, LeCun et al. — Meta</text>

    <!-- Planner (top) -->
    <rect x="980" y="278" width="300" height="48" rx="3" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1"/>
    <text x="1130" y="297" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A2810" letter-spacing="0.16em">PLANIFICATEUR (62 H ROBOT)</text>
    <text x="1130" y="315" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="12" font-style="italic" fill="#111110">action conditionnée sur représentation</text>

    <line x1="1130" y1="370" x2="1130" y2="334" stroke="#3a3a3a" stroke-width="1.2" marker-end="url(#s03-arr)"/>

    <!-- Predictor (middle) -->
    <rect x="980" y="378" width="300" height="80" rx="3" fill="#E2EBED" stroke="#1F5560" stroke-width="1"/>
    <text x="1130" y="398" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#13253D" letter-spacing="0.16em">PREDICTOR (LATENT)</text>
    <text x="1130" y="420" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">prédit ẑ' dans l'espace appris</text>
    <text x="1130" y="440" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5A5A5A">— jamais en pixels —</text>

    <line x1="1130" y1="504" x2="1130" y2="466" stroke="#3a3a3a" stroke-width="1.2" marker-end="url(#s03-arr)"/>

    <!-- Encoder (bottom, big) -->
    <rect x="965" y="510" width="330" height="96" rx="3" fill="#F5EFDA" stroke="#A98F55" stroke-width="1"/>
    <text x="1130" y="530" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837" letter-spacing="0.16em">JOINT-EMBEDDING ENCODER</text>
    <text x="1130" y="552" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">vidéo → latent abstrait z</text>
    <text x="1130" y="572" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5A5A5A">pré-entraînement auto-supervisé</text>
    <text x="1130" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5A5A5A">1 M h vidéo internet</text>

    <text x="1130" y="638" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#B23B1B">« 16 000 :1 passif vs actif »</text>
    <text x="1130" y="657" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">65–80 % succès pick-and-place inédit · arXiv 2506.09985</text>
  </g>

  <text x="60" y="744" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#9a9ca5" letter-spacing="0.14em">SOURCES · HA &amp; SCHMIDHUBER 2018 · HAFNER 2023 · BARDES &amp; AL. 2025 · META AI BLOG</text>
</svg>
