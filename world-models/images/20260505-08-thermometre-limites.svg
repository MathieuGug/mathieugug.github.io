<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" data-schema-id="schema-08" role="img" aria-labelledby="s08-title s08-desc">
  <title id="s08-title">Six limites dures — du verrou « mémoire courte » au verrou « sécurité » sur les world models 2026</title>
  <desc id="s08-desc">Six barres horizontales mesurant la gravité actuelle de chacune des six limites des world models en 2026 : mémoire courte, physique imparfaite, compute coûteux, données vidéo bornées, évaluation immature, sécurité. Chaque barre indique l'état présent et la marge de progression à 24 mois.</desc>

  <defs>
    <linearGradient id="s08-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4EB"/>
      <stop offset="100%" stop-color="#EFEADC"/>
    </linearGradient>
    <linearGradient id="s08-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B23B1B"/>
      <stop offset="100%" stop-color="#7A2810"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="760" fill="url(#s08-bg)"/>

  <!-- Header -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#B23B1B" letter-spacing="0.22em">
    <text x="60" y="56">SCHÉMA 08 — SIX LIMITES DURES</text>
  </g>
  <g font-family="Spectral, Georgia, serif" font-size="26" fill="#111110" letter-spacing="-0.01em">
    <text x="60" y="92">Ce qui freine encore <tspan font-style="italic" fill="#B23B1B">— mai 2026, six verrous mesurés.</tspan></text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13.5" fill="#5A5A5A">
    <text x="60" y="118">Plus la barre est longue, plus la limite mord. Repère 0 = problème résolu, 100 = blocage opérationnel total.</text>
  </g>

  <!-- Axis -->
  <g>
    <line x1="350" y1="170" x2="350" y2="640" stroke="#111110" stroke-width="1"/>
    <line x1="1230" y1="170" x2="1230" y2="640" stroke="#111110" stroke-width="0.4" stroke-dasharray="3 3" opacity="0.5"/>

    <!-- Tick marks at 25, 50, 75, 100 -->
    <g font-family="JetBrains Mono, monospace" font-size="9.5" fill="#5A5A5A" letter-spacing="0.14em" text-anchor="middle">
      <line x1="350"  y1="170" x2="350"  y2="160" stroke="#111110" stroke-width="0.6"/><text x="350"  y="152">0</text>
      <line x1="570"  y1="170" x2="570"  y2="160" stroke="#111110" stroke-width="0.4" opacity="0.5"/><text x="570"  y="152" opacity="0.7">25</text>
      <line x1="790"  y1="170" x2="790"  y2="160" stroke="#111110" stroke-width="0.4" opacity="0.5"/><text x="790"  y="152" opacity="0.7">50</text>
      <line x1="1010" y1="170" x2="1010" y2="160" stroke="#111110" stroke-width="0.4" opacity="0.5"/><text x="1010" y="152" opacity="0.7">75</text>
      <line x1="1230" y1="170" x2="1230" y2="160" stroke="#111110" stroke-width="0.6"/><text x="1230" y="152">100</text>
    </g>
    <text x="350" y="142" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#5A5A5A">résolu</text>
    <text x="1230" y="142" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#5A5A5A">blocage opérationnel</text>
  </g>

  <!-- Helper for bar widths: full = 880px (350 → 1230), so each unit = 8.8 -->
  <!-- Memory short: 85 -->
  <g class="interactive" data-card="lim-memory" tabindex="0" role="button" aria-label="Limite — mémoire courte">
    <text x="60" y="208" font-family="Spectral, Georgia, serif" font-size="17" font-weight="600" fill="#111110">Mémoire courte</text>
    <text x="60" y="226" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">Genie 3 oublie après ~ 60 s</text>
    <text x="60" y="240" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">aucune tâche &gt; quelques min.</text>
    <rect x="350" y="200" width="748" height="42" rx="2" fill="url(#s08-bar)"/>
    <text x="1110" y="226" font-family="JetBrains Mono, monospace" font-size="11" fill="#7A2810" letter-spacing="0.14em">85 / 100</text>
  </g>

  <!-- Physics imperfect: 70 -->
  <g class="interactive" data-card="lim-physics" tabindex="0" role="button" aria-label="Limite — physique imparfaite">
    <text x="60" y="278" font-family="Spectral, Georgia, serif" font-size="17" font-weight="600" fill="#111110">Physique imparfaite</text>
    <text x="60" y="296" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">fourmis 4 pattes (Sora)</text>
    <text x="60" y="310" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">flammes immobiles, neige fixe</text>
    <rect x="350" y="270" width="616" height="42" rx="2" fill="url(#s08-bar)"/>
    <text x="978" y="296" font-family="JetBrains Mono, monospace" font-size="11" fill="#7A2810" letter-spacing="0.14em">70 / 100</text>
  </g>

  <!-- Compute: 80 -->
  <g class="interactive" data-card="lim-compute" tabindex="0" role="button" aria-label="Limite — compute coûteux">
    <text x="60" y="348" font-family="Spectral, Georgia, serif" font-size="17" font-weight="600" fill="#111110">Compute coûteux</text>
    <text x="60" y="366" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">GAIA-3 = 5× Cosmos = ÷ rares</text>
    <text x="60" y="380" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">ticket d'entrée hyperscale</text>
    <rect x="350" y="340" width="704" height="42" rx="2" fill="url(#s08-bar)"/>
    <text x="1066" y="366" font-family="JetBrains Mono, monospace" font-size="11" fill="#7A2810" letter-spacing="0.14em">80 / 100</text>
  </g>

  <!-- Data bounded: 60 -->
  <g class="interactive" data-card="lim-data" tabindex="0" role="button" aria-label="Limite — données vidéo bornées">
    <text x="60" y="418" font-family="Spectral, Georgia, serif" font-size="17" font-weight="600" fill="#111110">Données vidéo bornées</text>
    <text x="60" y="436" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">vidéo internet largement consommée</text>
    <text x="60" y="450" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">droits, qualité, diversité</text>
    <rect x="350" y="410" width="528" height="42" rx="2" fill="url(#s08-bar)"/>
    <text x="890" y="436" font-family="JetBrains Mono, monospace" font-size="11" fill="#7A2810" letter-spacing="0.14em">60 / 100</text>
  </g>

  <!-- Evaluation immature: 90 -->
  <g class="interactive" data-card="lim-eval" tabindex="0" role="button" aria-label="Limite — évaluation immature">
    <text x="60" y="488" font-family="Spectral, Georgia, serif" font-size="17" font-weight="600" fill="#111110">Évaluation immature</text>
    <text x="60" y="506" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">FVD/FID mesurent l'image, pas la physique</text>
    <text x="60" y="520" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">pas de métrique consensuelle</text>
    <rect x="350" y="480" width="792" height="42" rx="2" fill="url(#s08-bar)"/>
    <text x="1154" y="506" font-family="JetBrains Mono, monospace" font-size="11" fill="#7A2810" letter-spacing="0.14em">90 / 100</text>
  </g>

  <!-- Safety: 75 -->
  <g class="interactive" data-card="lim-safety" tabindex="0" role="button" aria-label="Limite — sécurité et désalignement">
    <text x="60" y="558" font-family="Spectral, Georgia, serif" font-size="17" font-weight="600" fill="#111110">Sécurité &amp; désalignement</text>
    <text x="60" y="576" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">peut entraîner des agents qu'on ne</text>
    <text x="60" y="590" font-family="Inter, sans-serif" font-size="11.5" fill="#5A5A5A">souhaiterait pas voir déployés</text>
    <rect x="350" y="550" width="660" height="42" rx="2" fill="url(#s08-bar)"/>
    <text x="1022" y="576" font-family="JetBrains Mono, monospace" font-size="11" fill="#7A2810" letter-spacing="0.14em">75 / 100</text>
  </g>

  <!-- Inflection arrow showing trajectory expected -->
  <g transform="translate(60 626)">
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#7A2810" letter-spacing="0.2em">TRAJECTOIRE 24 MOIS — ESTIMATION CONSENSUELLE</text>
  </g>
  <g>
    <path d="M 1090 200 C 1090 240 980 240 980 280" fill="none" stroke="#1F5560" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
    <path d="M 970 200 C 970 240 880 240 880 280" fill="none" stroke="#1F5560" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
    <text x="1090" y="172" font-family="JetBrains Mono, monospace" font-size="9" fill="#1F5560" letter-spacing="0.16em" text-anchor="middle" opacity="0.7">⤓ ÷ progrès attendu</text>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(60 660)">
    <text x="0" y="0" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#5A5A5A">Score subjectif (0–100) consolidé sur la base des publications ouvertes 2025-2026 et des démonstrations publiques.</text>
    <text x="0" y="22" font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#5A5A5A">Lecture : l'évaluation est aujourd'hui le verrou le plus dur — sans métrique commune, le débat pixel/latent ne se tranchera pas.</text>
  </g>

  <text x="60" y="744" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#9a9ca5" letter-spacing="0.14em">SOURCES · BENCHMARKS PUBLIÉS DEEPMIND · META · WAYVE · NVIDIA · CRITIQUES BD TECHTALKS · GARY MARCUS</text>
</svg>
