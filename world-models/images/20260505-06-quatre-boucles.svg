<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" data-schema-id="schema-06" role="img" aria-labelledby="s06-title s06-desc">
  <title id="s06-title">Quatre boucles d'application — robotique, conduite, création 3D, agent virtuel</title>
  <desc id="s06-desc">Quatre boucles d'usage distinctes pour les world models. Chaque boucle est représentée comme un cycle fermé reliant un agent ou un humain au modèle, avec ses entrées, sa sortie utile, et la métrique principale qui en mesure le succès.</desc>

  <defs>
    <linearGradient id="s06-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4EB"/>
      <stop offset="100%" stop-color="#EFEADC"/>
    </linearGradient>
    <marker id="s06-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#3a3a3a"/>
    </marker>
    <marker id="s06-arr-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#B23B1B"/>
    </marker>
  </defs>

  <rect width="1400" height="760" fill="url(#s06-bg)"/>

  <!-- Header -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#B23B1B" letter-spacing="0.22em">
    <text x="60" y="56">SCHÉMA 06 — QUATRE BOUCLES D'USAGE</text>
  </g>
  <g font-family="Spectral, Georgia, serif" font-size="26" fill="#111110" letter-spacing="-0.01em">
    <text x="60" y="92">Pas un marché — quatre boucles <tspan font-style="italic" fill="#B23B1B">avec leurs propres contraintes.</tspan></text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13.5" fill="#5A5A5A">
    <text x="60" y="118">Chaque boucle a son verrou : généralisation, fidélité physique, qualité visuelle, mémoire longue. Aucun modèle 2026 n'est compétitif sur les quatre.</text>
  </g>

  <!-- ============= LOOP 1 — Robotique (top-left) ============= -->
  <g class="interactive" data-card="loop-robot" tabindex="0" role="button" aria-label="Boucle 1 — Robotique">
    <rect x="60" y="170" width="620" height="270" rx="6" fill="#FBF8F0" stroke="#B23B1B" stroke-width="1.2"/>
    <text x="78" y="196" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A2810" letter-spacing="0.18em">BOUCLE 1 · ROBOTIQUE</text>
    <text x="78" y="224" font-family="Spectral, Georgia, serif" font-size="20" font-weight="600" fill="#111110">Imaginer pour manipuler</text>

    <!-- agent (humanoid icon — abstract) -->
    <g transform="translate(110 290)">
      <circle cx="0" cy="0" r="14" fill="#1F5560"/>
      <rect x="-12" y="14" width="24" height="34" rx="4" fill="#1F5560"/>
      <line x1="-12" y1="20" x2="-22" y2="40" stroke="#1F5560" stroke-width="4" stroke-linecap="round"/>
      <line x1="12" y1="20" x2="22" y2="40" stroke="#1F5560" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#13253D" letter-spacing="0.14em">ROBOT NEO / V-JEPA 2</text>
    </g>

    <!-- world model -->
    <rect x="240" y="270" width="180" height="60" rx="3" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1.2"/>
    <text x="330" y="292" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">World Model</text>
    <text x="330" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">imagine la trajectoire</text>
    <text x="330" y="324" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">candidate</text>

    <!-- objects -->
    <g transform="translate(560 295)">
      <rect x="-30" y="-12" width="22" height="22" rx="2" fill="#A98F55"/>
      <circle cx="6" cy="0" r="11" fill="#1F5560"/>
      <polygon points="22,-10 38,-10 30,10" fill="#B23B1B"/>
      <text x="0" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837" letter-spacing="0.14em">OBJETS INÉDITS</text>
    </g>

    <!-- arrows around the loop -->
    <path d="M 145 290 Q 195 290 235 290" fill="none" stroke="#3a3a3a" stroke-width="1" marker-end="url(#s06-arr)"/>
    <path d="M 425 300 Q 470 312 525 300" fill="none" stroke="#3a3a3a" stroke-width="1" marker-end="url(#s06-arr)"/>
    <path d="M 545 318 Q 425 380 240 348 Q 175 348 120 332" fill="none" stroke="#B23B1B" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#s06-arr-c)"/>

    <!-- micro labels along arrows -->
    <text x="190" y="282" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A" font-style="italic">observe</text>
    <text x="475" y="290" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A" font-style="italic">manipule</text>
    <text x="320" y="395" font-family="Inter, sans-serif" font-size="10.5" fill="#7A2810" font-style="italic">retour proprioceptif &amp; visuel</text>

    <!-- KPI -->
    <text x="78" y="412" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#5A5A5A" letter-spacing="0.16em">KPI · GÉNÉRALISATION SUR OBJETS NOUVEAUX · 65–80 % VJEPA-2</text>
  </g>

  <!-- ============= LOOP 2 — Conduite autonome (top-right) ============= -->
  <g class="interactive" data-card="loop-drive" tabindex="0" role="button" aria-label="Boucle 2 — Conduite autonome">
    <rect x="720" y="170" width="620" height="270" rx="6" fill="#FBF8F0" stroke="#1F5560" stroke-width="1.2"/>
    <text x="738" y="196" font-family="JetBrains Mono, monospace" font-size="10" fill="#13253D" letter-spacing="0.18em">BOUCLE 2 · CONDUITE</text>
    <text x="738" y="224" font-family="Spectral, Georgia, serif" font-size="20" font-weight="600" fill="#111110">Évaluer pour qualifier</text>

    <!-- car icon -->
    <g transform="translate(770 295)">
      <rect x="-26" y="-10" width="52" height="22" rx="6" fill="#1F5560"/>
      <rect x="-18" y="-22" width="36" height="14" rx="4" fill="#13253D"/>
      <circle cx="-15" cy="14" r="6" fill="#111110"/>
      <circle cx="15" cy="14" r="6" fill="#111110"/>
      <text x="0" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#13253D" letter-spacing="0.14em">FLOTTE RÉELLE</text>
    </g>

    <!-- world model -->
    <rect x="900" y="270" width="180" height="60" rx="3" fill="#E2EBED" stroke="#1F5560" stroke-width="1.2"/>
    <text x="990" y="292" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">GAIA-3 / Cosmos</text>
    <text x="990" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">re-conduit avec variations</text>
    <text x="990" y="324" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">contrôlées</text>

    <!-- evaluation board -->
    <g transform="translate(1220 295)">
      <rect x="-30" y="-26" width="60" height="44" rx="3" fill="#F5EFDA" stroke="#A98F55" stroke-width="1.2"/>
      <line x1="-22" y1="-16" x2="22" y2="-16" stroke="#7A6837" stroke-width="1"/>
      <line x1="-22" y1="-6" x2="14" y2="-6" stroke="#7A6837" stroke-width="1"/>
      <line x1="-22" y1="4" x2="22" y2="4" stroke="#7A6837" stroke-width="1"/>
      <line x1="-22" y1="14" x2="6" y2="14" stroke="#7A6837" stroke-width="1"/>
      <text x="0" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837" letter-spacing="0.14em">SCÉNARIOS QUALIF.</text>
    </g>

    <!-- arrows -->
    <path d="M 800 290 Q 850 290 895 290" fill="none" stroke="#3a3a3a" stroke-width="1" marker-end="url(#s06-arr)"/>
    <path d="M 1085 300 Q 1135 305 1185 300" fill="none" stroke="#3a3a3a" stroke-width="1" marker-end="url(#s06-arr)"/>
    <path d="M 1205 318 Q 1100 380 900 348 Q 850 348 790 332" fill="none" stroke="#B23B1B" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#s06-arr-c)"/>

    <text x="848" y="282" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A" font-style="italic">séquence réelle</text>
    <text x="1110" y="290" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A" font-style="italic">verdict</text>
    <text x="980" y="395" font-family="Inter, sans-serif" font-size="10.5" fill="#7A2810" font-style="italic">déploiement / régression</text>

    <text x="738" y="412" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#5A5A5A" letter-spacing="0.16em">KPI · TAUX DE REJET DES TESTS SYNTHÉTIQUES · ÷ 5 SUR GAIA-3</text>
  </g>

  <!-- ============= LOOP 3 — Création 3D (bottom-left) ============= -->
  <g class="interactive" data-card="loop-create" tabindex="0" role="button" aria-label="Boucle 3 — Création 3D">
    <rect x="60" y="460" width="620" height="240" rx="6" fill="#FBF8F0" stroke="#A98F55" stroke-width="1.2"/>
    <text x="78" y="486" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A6837" letter-spacing="0.18em">BOUCLE 3 · CRÉATION 3D</text>
    <text x="78" y="514" font-family="Spectral, Georgia, serif" font-size="20" font-weight="600" fill="#111110">Décrire pour explorer</text>

    <!-- human icon -->
    <g transform="translate(110 580)">
      <circle cx="0" cy="-14" r="10" fill="#1F5560"/>
      <path d="M -14 4 Q 0 -8 14 4 L 12 24 L -12 24 z" fill="#1F5560"/>
      <text x="0" y="44" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#13253D" letter-spacing="0.14em">CRÉATEUR</text>
    </g>

    <!-- World model -->
    <rect x="240" y="555" width="180" height="60" rx="3" fill="#F5EFDA" stroke="#A98F55" stroke-width="1.2"/>
    <text x="330" y="577" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">Marble / GWM-Worlds</text>
    <text x="330" y="595" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">génère scène 3D éditable</text>
    <text x="330" y="609" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">Gaussian splats · .ply</text>

    <!-- scene preview -->
    <g transform="translate(560 580)">
      <rect x="-40" y="-22" width="80" height="44" rx="3" fill="#FBF8F0" stroke="#7A6837" stroke-width="0.8"/>
      <polygon points="-30,12 -10,-8 10,8 30,-14 30,18 -30,18" fill="#A98F55" opacity="0.6"/>
      <circle cx="20" cy="-10" r="4" fill="#B23B1B"/>
      <text x="0" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837" letter-spacing="0.14em">SCÈNE GÉNÉRÉE</text>
    </g>

    <!-- arrows -->
    <path d="M 145 580 Q 195 580 235 580" fill="none" stroke="#3a3a3a" stroke-width="1" marker-end="url(#s06-arr)"/>
    <path d="M 425 580 Q 470 580 525 580" fill="none" stroke="#3a3a3a" stroke-width="1" marker-end="url(#s06-arr)"/>
    <path d="M 545 605 Q 425 660 240 632 Q 175 632 120 612" fill="none" stroke="#B23B1B" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#s06-arr-c)"/>

    <text x="190" y="572" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A" font-style="italic">prompt</text>
    <text x="455" y="572" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A" font-style="italic">render</text>
    <text x="320" y="675" font-family="Inter, sans-serif" font-size="10.5" fill="#7A2810" font-style="italic">re-prompt &amp; édition itérative</text>
  </g>

  <!-- ============= LOOP 4 — Agent virtuel (bottom-right) ============= -->
  <g class="interactive" data-card="loop-agent" tabindex="0" role="button" aria-label="Boucle 4 — Agent virtuel">
    <rect x="720" y="460" width="620" height="240" rx="6" fill="#FBF8F0" stroke="#7A6837" stroke-width="1.2"/>
    <text x="738" y="486" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A6837" letter-spacing="0.18em">BOUCLE 4 · AGENT VIRTUEL</text>
    <text x="738" y="514" font-family="Spectral, Georgia, serif" font-size="20" font-weight="600" fill="#111110">Entraîner dans des mondes infinis</text>

    <!-- LLM agent icon -->
    <g transform="translate(770 580)">
      <rect x="-20" y="-22" width="40" height="44" rx="4" fill="#1F5560"/>
      <text x="0" y="6" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#FBF8F0" letter-spacing="0.14em">SIMA</text>
      <text x="0" y="42" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#13253D" letter-spacing="0.14em">AGENT GENERALISTE</text>
    </g>

    <!-- world model -->
    <rect x="900" y="555" width="180" height="60" rx="3" fill="#F5E5DD" stroke="#B23B1B" stroke-width="1.2"/>
    <text x="990" y="577" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="14" font-weight="600" fill="#111110">Genie 3</text>
    <text x="990" y="595" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">génère monde 3D à la volée</text>
    <text x="990" y="609" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A">à 24 fps</text>

    <!-- objective list -->
    <g transform="translate(1220 580)">
      <rect x="-30" y="-26" width="60" height="44" rx="3" fill="#F5EFDA" stroke="#A98F55" stroke-width="1"/>
      <text x="-22" y="-12" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837">⊳ goal 1</text>
      <text x="-22" y="2" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837">⊳ goal 2</text>
      <text x="-22" y="16" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837">⊳ goal 3</text>
      <text x="0" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A6837" letter-spacing="0.14em">OBJECTIFS</text>
    </g>

    <!-- arrows -->
    <path d="M 800 580 Q 850 580 895 580" fill="none" stroke="#3a3a3a" stroke-width="1" marker-end="url(#s06-arr)"/>
    <path d="M 1085 590 Q 1135 595 1185 590" fill="none" stroke="#3a3a3a" stroke-width="1" marker-end="url(#s06-arr)"/>
    <path d="M 1205 605 Q 1100 660 900 632 Q 850 632 790 615" fill="none" stroke="#B23B1B" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#s06-arr-c)"/>

    <text x="848" y="572" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A" font-style="italic">action</text>
    <text x="1115" y="582" font-family="Inter, sans-serif" font-size="10.5" fill="#5A5A5A" font-style="italic">objectif</text>
    <text x="980" y="675" font-family="Inter, sans-serif" font-size="10.5" fill="#7A2810" font-style="italic">limite Genie 3 : mémoire ~ 60 s</text>
  </g>

  <text x="60" y="744" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#9a9ca5" letter-spacing="0.14em">SOURCES · META V-JEPA 2 · WAYVE GAIA-3 · WORLD LABS · DEEPMIND SIMA × GENIE 3</text>
</svg>
