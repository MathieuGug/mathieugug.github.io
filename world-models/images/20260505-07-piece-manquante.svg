<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" data-schema-id="schema-07" role="img" aria-labelledby="s07-title s07-desc">
  <title id="s07-title">La pièce manquante — LLM verbal + World Model physique → agent général</title>
  <desc id="s07-desc">Schéma conceptuel de l'argument Hassabis. À gauche, le LLM excelle dans le langage, le raisonnement symbolique, la connaissance encyclopédique. À droite, le world model excelle en physique, en planification, en raisonnement causal. L'intersection forme l'agent général. Trois flèches montrent les fonctions où la combinaison débloque ce que ni l'un ni l'autre ne fait seul.</desc>

  <defs>
    <linearGradient id="s07-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4EB"/>
      <stop offset="100%" stop-color="#EFEADC"/>
    </linearGradient>
    <radialGradient id="s07-llm" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F5EFDA" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#F5EFDA" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="s07-wm" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#E2EBED" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E2EBED" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="s07-int" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F5E5DD" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#F5E5DD" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="760" fill="url(#s07-bg)"/>

  <!-- Header -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#B23B1B" letter-spacing="0.22em">
    <text x="60" y="56">SCHÉMA 07 — LA PIÈCE MANQUANTE</text>
  </g>
  <g font-family="Spectral, Georgia, serif" font-size="26" fill="#111110" letter-spacing="-0.01em">
    <text x="60" y="92">LLM verbal + World Model physique <tspan font-style="italic" fill="#B23B1B">→ agent général.</tspan></text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13.5" fill="#5A5A5A">
    <text x="60" y="118">L'argument Hassabis (et LeCun, et Fei-Fei Li) tient dans une intersection. La voie majoritaire en 2026 n'est ni le LLM seul, ni le world model seul.</text>
  </g>

  <!-- ===== Two overlapping circles (Venn) ===== -->
  <g>
    <!-- LLM (left) -->
    <circle cx="540" cy="430" r="240" fill="url(#s07-llm)" stroke="#7A6837" stroke-width="1.6"/>
    <!-- WM (right) -->
    <circle cx="900" cy="430" r="240" fill="url(#s07-wm)" stroke="#1F5560" stroke-width="1.6"/>
    <!-- Intersection darker overlay (visual emphasis) -->
    <path d="
      M 720 230
      A 240 240 0 0 1 720 630
      A 240 240 0 0 1 720 230
      Z" fill="url(#s07-int)" opacity="0.55"/>
  </g>

  <!-- ===== Labels for each circle ===== -->
  <g class="interactive" data-card="zone-llm" tabindex="0" role="button" aria-label="Zone LLM — langage, symbolique">
    <text x="380" y="252" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7A6837" letter-spacing="0.18em">LLM · LANGAGE · SYMBOLE</text>
    <g font-family="Spectral, Georgia, serif" font-size="14.5" fill="#111110" font-style="italic">
      <text x="370" y="306" text-anchor="middle">grammaire</text>
      <text x="370" y="328" text-anchor="middle">connaissance encyclopédique</text>
      <text x="370" y="350" text-anchor="middle">raisonnement symbolique</text>
      <text x="370" y="372" text-anchor="middle">décomposition de tâches</text>
      <text x="370" y="394" text-anchor="middle">communication</text>
    </g>
    <text x="370" y="540" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#9a9ca5" font-style="italic">manque : l'anticipation physique fine</text>
  </g>

  <g class="interactive" data-card="zone-wm" tabindex="0" role="button" aria-label="Zone World Model — physique, causal">
    <text x="1060" y="252" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#13253D" letter-spacing="0.18em">WORLD MODEL · PHYSIQUE</text>
    <g font-family="Spectral, Georgia, serif" font-size="14.5" fill="#111110" font-style="italic">
      <text x="1070" y="306" text-anchor="middle">représentation spatiale</text>
      <text x="1070" y="328" text-anchor="middle">prédiction de trajectoire</text>
      <text x="1070" y="350" text-anchor="middle">causalité physique</text>
      <text x="1070" y="372" text-anchor="middle">continuité d'identité</text>
      <text x="1070" y="394" text-anchor="middle">planification motrice</text>
    </g>
    <text x="1070" y="540" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#9a9ca5" font-style="italic">manque : la décomposition langagière</text>
  </g>

  <!-- ===== Intersection — agent général ===== -->
  <g class="interactive" data-card="zone-agent" tabindex="0" role="button" aria-label="Intersection — agent général hybride">
    <text x="720" y="282" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7A2810" letter-spacing="0.22em">INTERSECTION</text>
    <text x="720" y="320" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="22" font-weight="600" fill="#111110">Agent</text>
    <text x="720" y="348" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="22" font-weight="600" font-style="italic" fill="#B23B1B">général</text>
    <g font-family="Spectral, Georgia, serif" font-size="13" font-style="italic" fill="#111110">
      <text x="720" y="392" text-anchor="middle">planning long-terme</text>
      <text x="720" y="412" text-anchor="middle">raisonnement causal</text>
      <text x="720" y="432" text-anchor="middle">adaptation continue</text>
    </g>
    <text x="720" y="492" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#7A2810" font-style="italic">SIMA 2 · 1X-WM · hybrides 2026</text>
  </g>

  <!-- ===== Arrows showing combination effect (above) ===== -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#5A5A5A" letter-spacing="0.16em">
    <text x="720" y="150" text-anchor="middle">CE QUE LA COMBINAISON DÉBLOQUE</text>
  </g>
  <g stroke="#B23B1B" stroke-width="1" fill="none" stroke-dasharray="3 3" opacity="0.7">
    <line x1="720" y1="160" x2="720" y2="195"/>
  </g>

  <!-- Three quote-style cards on top -->
  <g class="interactive" data-card="card-plan" tabindex="0" role="button" aria-label="Planning long terme — System 2">
    <rect x="160" y="170" width="220" height="44" rx="3" fill="#FBF8F0" stroke="#B23B1B" stroke-width="0.8"/>
    <text x="174" y="188" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A2810" letter-spacing="0.16em">PLANNING</text>
    <text x="174" y="206" font-family="Spectral, Georgia, serif" font-size="11.5" font-style="italic" fill="#111110">multi-étape · System 2 (AlphaGo)</text>
  </g>

  <g class="interactive" data-card="card-causal" tabindex="0" role="button" aria-label="Raisonnement causal">
    <rect x="610" y="170" width="220" height="44" rx="3" fill="#FBF8F0" stroke="#B23B1B" stroke-width="0.8"/>
    <text x="624" y="188" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A2810" letter-spacing="0.16em">CAUSALITÉ</text>
    <text x="624" y="206" font-family="Spectral, Georgia, serif" font-size="11.5" font-style="italic" fill="#111110">A produit B parce que C</text>
  </g>

  <g class="interactive" data-card="card-identity" tabindex="0" role="button" aria-label="Continuité d'identité d'objet">
    <rect x="1060" y="170" width="220" height="44" rx="3" fill="#FBF8F0" stroke="#B23B1B" stroke-width="0.8"/>
    <text x="1074" y="188" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A2810" letter-spacing="0.16em">CONTINUITÉ</text>
    <text x="1074" y="206" font-family="Spectral, Georgia, serif" font-size="11.5" font-style="italic" fill="#111110">objet persistant à travers le temps</text>
  </g>

  <!-- Hassabis quote at bottom -->
  <g transform="translate(60 690)">
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#7A2810" letter-spacing="0.2em">CITATION HASSABIS · 2026</text>
    <text x="0" y="22" font-family="Spectral, Georgia, serif" font-size="14" font-style="italic" fill="#111110">« Pour parvenir à l'AGI, la pièce manquante des grands modèles, c'est le world model. Une ou deux percées algorithmiques sont encore nécessaires. »</text>
  </g>

  <text x="60" y="744" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#9a9ca5" letter-spacing="0.14em">SOURCES · DEMIS HASSABIS — DEEPMIND · YANN LECUN — META/AMI · FEI-FEI LI — WORLD LABS · DAVID SILVER</text>
</svg>
