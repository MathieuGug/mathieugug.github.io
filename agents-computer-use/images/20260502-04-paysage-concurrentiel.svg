  <text x="387" y="420" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">desktop+web+mobile</text>
  <text x="492" y="420" class="body" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">Apache 2.0</text>
  <text x="597" y="420" class="body" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">gratuit</text>
