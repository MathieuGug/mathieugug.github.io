  <text x="702" y="370" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">non publié</text>
  <text x="807" y="370" class="body" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">10 tâches //</text>
  <text x="912" y="370" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Search-grade</text>
  <text x="1022" y="370" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Ticketmaster · Resy</text>

