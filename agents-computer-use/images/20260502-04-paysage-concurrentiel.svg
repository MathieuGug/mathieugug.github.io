<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.08em">SCHÉMA 04 · PAYSAGE CONCURRENTIEL</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Six acteurs, sept dimensions, aucune domination claire</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Matrice acteurs × capacités, début 2026</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Column headers (capabilities) -->
  <g class="body" font-size="11" font-weight="500" fill="#1A1A1A">
    <text transform="translate(390 220) rotate(-30)" text-anchor="end">Périmètre</text>
    <text transform="translate(495 220) rotate(-30)" text-anchor="end">Accès / open</text>
    <text transform="translate(600 220) rotate(-30)" text-anchor="end">Prix unitaire</text>
    <text transform="translate(705 220) rotate(-30)" text-anchor="end">OSWorld 2025</text>
    <text transform="translate(810 220) rotate(-30)" text-anchor="end">Parallélisme</text>
