  <text x="492" y="520" class="body" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">open weights</text>
  <text x="597" y="520" class="body" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">gratuit</text>
  <text x="702" y="520" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">variable</text>
  <text x="807" y="520" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">selon harness</text>
  <text x="912" y="520" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">DIY / faible</text>
