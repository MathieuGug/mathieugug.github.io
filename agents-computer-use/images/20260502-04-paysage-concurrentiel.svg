  <!-- Legend -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="610" class="body" font-size="11" font-weight="600" fill="#1A1A1A">Lecture rapide</text>
  <text x="60" y="635" class="body" font-size="10" fill="#5A5A5A">·  En <tspan fill="#B7332C" font-weight="600">carmin</tspan>, l'avantage différenciant clair de l'acteur sur la dimension. ·  En <tspan fill="#1F5560" font-weight="600">vert teal</tspan>, l'argument open source.</text>
  <text x="60" y="652" class="body" font-size="10" fill="#5A5A5A">·  Les chiffres OSWorld sont les meilleurs scores publiés au 1er trimestre 2026 ; OpenAI : 38 % CUA initial, 58 % WebArena ; OSAgent (76 %) n'est pas un modèle propriétaire mais un système d'agent.</text>
  <text x="60" y="669" class="body" font-size="10" fill="#5A5A5A">·  Le marché ne se trie pas sur une seule colonne — chaque acteur excelle sur au moins une dimension structurelle, ce qui explique la coexistence durable.</text>

  <!-- Footer -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="752" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Source : pricing pages officielles, system cards Anthropic / OpenAI / ByteDance, articles Microsoft Copilot Studio, Project Mariner deepmind.google ; cadre analytique de l'auteur — 2026.</text>
  <text x="60" y="770" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Note : prix Anthropic en USD par million de tokens (input/output) ; les abonnements Pro et Ultra incluent l'agent au sein d'un bundle plus large.</text>
</svg>
