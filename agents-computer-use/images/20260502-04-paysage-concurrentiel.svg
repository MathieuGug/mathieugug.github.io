    <line x1="335" y1="240" x2="1080" y2="240"/>
    <line x1="335" y1="290" x2="1080" y2="290"/>
    <line x1="335" y1="340" x2="1080" y2="340"/>
    <line x1="335" y1="390" x2="1080" y2="390"/>
