<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
    <marker id="arrow3-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.08em">SCHÉMA 03 · ARCHITECTURE</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">La boucle observer → planifier → ancrer → agir → vérifier</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Architecture canonique d'un agent computer use de production</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Five nodes of the loop -->
  <g class="interactive" data-card="phase-observe" tabindex="0" role="button" aria-label="Phase Observer — capture d'écran et accessibility tree">
    <circle cx="170" cy="320" r="68" fill="#FAF8F3" stroke="#1F5560" stroke-width="2"/>
    <text x="170" y="305" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">1</text>
    <text x="170" y="328" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Observer</text>
    <text x="170" y="346" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">screenshot</text>
    <text x="170" y="358" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">+ a11y tree</text>
  </g>

  <g class="interactive" data-card="phase-plan" tabindex="0" role="button" aria-label="Phase Planifier — décomposition du goal en sous-objectifs">
    <circle cx="395" cy="320" r="68" fill="#FAF8F3" stroke="#1F5560" stroke-width="2"/>
    <text x="395" y="305" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">2</text>
    <text x="395" y="328" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Planifier</text>
    <text x="395" y="346" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">décomposition</text>
    <text x="395" y="358" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">en sous-buts</text>
  </g>

  <g class="interactive" data-card="phase-ground" tabindex="0" role="button" aria-label="Phase Ancrer — coordonnées x y précises sur l'écran">
    <circle cx="615" cy="320" r="68" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <text x="615" y="305" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">3</text>
    <text x="615" y="328" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Ancrer</text>
    <text x="615" y="346" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">coordonnées</text>
    <text x="615" y="358" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">x, y précises</text>
  </g>

  <g class="interactive" data-card="phase-act" tabindex="0" role="button" aria-label="Phase Agir — primitives mouse keyboard">
    <circle cx="835" cy="320" r="68" fill="#FAF8F3" stroke="#1F5560" stroke-width="2"/>
    <text x="835" y="305" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">4</text>
    <text x="835" y="328" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Agir</text>
    <text x="835" y="346" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">click / type</text>
    <text x="835" y="358" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">scroll / drag</text>
  </g>

  <g class="interactive" data-card="phase-verify" tabindex="0" role="button" aria-label="Phase Vérifier — auto-vérification critique pour la fiabilité">
    <circle cx="1055" cy="320" r="68" fill="#FAF8F3" stroke="#B58A2C" stroke-width="2"/>
    <text x="1055" y="305" class="mono" font-size="11" font-weight="600" fill="#B58A2C" text-anchor="middle">5</text>
    <text x="1055" y="328" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Vérifier</text>
    <text x="1055" y="346" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">critic loop</text>
    <text x="1055" y="358" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">+ correction</text>
  </g>

  <!-- Arrows between nodes (forward flow) -->
  <line x1="240" y1="320" x2="320" y2="320" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="465" y1="320" x2="540" y2="320" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="685" y1="320" x2="760" y2="320" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="905" y1="320" x2="980" y2="320" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <!-- Loop back from verify to observe (carmine — critical) -->
  <path d="M 1055 388 Q 1055 460 900 460 L 320 460 Q 170 460 170 388" stroke="#B7332C" stroke-width="2" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow3-c)"/>
  <text x="615" y="453" class="body" font-size="10" font-style="italic" fill="#B7332C" text-anchor="middle">boucle d'auto-correction (clé de la performance superhumaine d'OSAgent)</text>

  <!-- Latency annotation (75-94%) -->
  <line x1="280" y1="225" x2="280" y2="252" stroke="#5A5A5A" stroke-width="0.75"/>
  <line x1="510" y1="225" x2="510" y2="252" stroke="#5A5A5A" stroke-width="0.75"/>
  <rect x="280" y="200" width="230" height="22" rx="3" fill="#F2EFE7" stroke="#B58A2C" stroke-width="0.75"/>
  <text x="395" y="216" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">75–94 % de la latence totale</text>

  <!-- Three transversal layers -->
  <text x="60" y="525" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" letter-spacing="0.06em">COUCHES TRANSVERSALES</text>
  <line x1="60" y1="535" x2="1140" y2="535" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Layer 1: Sandbox -->
  <g class="interactive" data-card="layer-sandbox" tabindex="0" role="button" aria-label="Couche sandbox — isolation Docker VM">
    <rect x="60" y="555" width="350" height="80" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1"/>
    <text x="80" y="580" class="body" font-size="12" font-weight="600" fill="#1F5560">Sandbox isolée</text>
    <text x="80" y="600" class="body" font-size="11" fill="#1A1A1A">Docker · VM Ubuntu / Windows · network egress</text>
    <text x="80" y="618" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Anthropic ref impl · OmniTool · Cloud PC pools</text>
  </g>

  <!-- Layer 2: Access control -->
  <g class="interactive" data-card="layer-access" tabindex="0" role="button" aria-label="Couche contrôle d'accès — confirmation humaine sur actions sensibles">
    <rect x="425" y="555" width="350" height="80" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1"/>
    <text x="445" y="580" class="body" font-size="12" font-weight="600" fill="#B7332C">Contrôle d'accès aux actions</text>
    <text x="445" y="600" class="body" font-size="11" fill="#1A1A1A">Human-in-the-loop sur login, paiement, CAPTCHA</text>
    <text x="445" y="618" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Operator · Mariner approval gates · ASL-3 classifiers</text>
  </g>

  <!-- Layer 3: Observability -->
  <g class="interactive" data-card="layer-obs" tabindex="0" role="button" aria-label="Couche observabilité — traces OTel session replay">
    <rect x="790" y="555" width="350" height="80" rx="3" fill="#F2EFE7" stroke="#B58A2C" stroke-width="1"/>
    <text x="810" y="580" class="body" font-size="12" font-weight="600" fill="#B58A2C">Observabilité &amp; traces</text>
    <text x="810" y="600" class="body" font-size="11" fill="#1A1A1A">OTel GenAI conventions · session replay · audit log</text>
    <text x="810" y="618" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Browserbase · Datadog · Dynatrace · prompt observability</text>
  </g>

  <!-- Annotation legend (numbered markers explaining nodes) -->
  <g font-size="10" fill="#5A5A5A">
    <rect x="60" y="660" width="1080" height="60" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="80" y="682" class="body" font-size="10" font-weight="600" fill="#1A1A1A">3 — L'ancrage est le maillon faible</text>
    <text x="80" y="700" class="body" font-size="10" fill="#5A5A5A">OmniParser fait passer GPT-4o de 0,8 % à 39,6 % sur ScreenSpot Pro ; UI-TARS-1.5 atteint 61,6 %.</text>
    <text x="640" y="682" class="body" font-size="10" font-weight="600" fill="#1A1A1A">5 — La vérification est le facteur critique 2025</text>
    <text x="640" y="700" class="body" font-size="10" fill="#5A5A5A">OSAgent franchit le baseline humain via auto-vérification + correction au tour suivant.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="767" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Source : Anthropic computer use docs ; OpenAI CUA paper ; Agent S2 (Agashe et al., 2025) ; OSWorld-Human (2506.16042) ; The AGI Company OSAgent ; cadre analytique de l'auteur.</text>
</svg>
