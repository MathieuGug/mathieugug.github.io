<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.08em">SCHÉMA 06 · CAS D'USAGE</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Là où les agents tournent vraiment, début 2026</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Cartographie valeur business × maturité technologique</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="1"/>

  <!-- 2x2 quadrant frame -->
  <!-- x axis: maturity (left=pilot, right=production) -->
  <!-- y axis: value (bottom=low, top=high) -->
  <line x1="200" y1="220" x2="200" y2="640" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arrow6)"/>
  <line x1="200" y1="640" x2="1100" y2="640" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arrow6)"/>
  
  <!-- Quadrant divider -->
  <line x1="650" y1="220" x2="650" y2="640" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="200" y1="430" x2="1100" y2="430" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- Axis labels -->
  <text x="190" y="225" class="body" font-size="11" font-weight="600" fill="#5A5A5A" text-anchor="end">Valeur business</text>
  <text x="1090" y="660" class="body" font-size="11" font-weight="600" fill="#5A5A5A" text-anchor="end">Maturité technologique</text>
  <text x="190" y="640" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">faible</text>
  <text x="190" y="225" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">élevée</text>
  <text x="200" y="660" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">pilote</text>
  <text x="1100" y="660" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">production</text>

  <!-- Quadrant labels (subtle, italic) -->
  <text x="425" y="245" class="display" font-size="14" font-style="italic" fill="#B8B5AE" text-anchor="middle">Promesse non démontrée</text>
  <text x="875" y="245" class="display" font-size="14" font-style="italic" fill="#B8B5AE" text-anchor="middle">Quadrant de l'industrialisation ★</text>
  <text x="425" y="615" class="display" font-size="14" font-style="italic" fill="#B8B5AE" text-anchor="middle">Démos médiatiques</text>
  <text x="875" y="615" class="display" font-size="14" font-style="italic" fill="#B8B5AE" text-anchor="middle">Volume / RPA classique</text>

  <!-- Quadrant background tints -->
  <rect x="650" y="220" width="450" height="210" rx="3" fill="#1F5560" fill-opacity="0.04"/>

  <!-- USE CASES PLOTTING -->
  <!-- Top-right: high-value production (the goal quadrant) -->
  <g class="interactive" data-card="case-bridgewater" tabindex="0" role="button" aria-label="Bridgewater — Investment Analyst Assistant Claude Opus 4">
    <circle cx="930" cy="295" r="9" fill="#B7332C"/>
    <text x="945" y="299" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Bridgewater · Analyst Assistant</text>
  </g>

  <g class="interactive" data-card="case-tines" tabindex="0" role="button" aria-label="Tines — automatisation cybersecurité workflows">
    <circle cx="980" cy="335" r="8" fill="#B7332C"/>
    <text x="995" y="339" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Tines · cybersec workflows</text>
  </g>

  <g class="interactive" data-card="case-replit" tabindex="0" role="button" aria-label="Replit Agent — évaluation visuelle d'apps en construction">
    <circle cx="870" cy="370" r="8" fill="#B7332C"/>
    <text x="885" y="374" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Replit Agent · GUI testing</text>
  </g>

  <!-- Top-left: high value but pilot -->
  <g class="interactive" data-card="case-finance-rpa" tabindex="0" role="button" aria-label="Workflows finance / juridique en pilote">
    <circle cx="350" cy="320" r="8" fill="#B58A2C"/>
    <text x="365" y="324" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Workflows finance / juridique</text>
  </g>

  <g class="interactive" data-card="case-medical" tabindex="0" role="button" aria-label="Saisie EHR pré-consultation (pilotes hospitaliers)">
    <circle cx="430" cy="380" r="8" fill="#B58A2C"/>
    <text x="445" y="384" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Saisie EHR pré-consultation</text>
  </g>

  <g class="interactive" data-card="case-sap" tabindex="0" role="button" aria-label="Migration et automatisation SAP / ERP legacy">
    <circle cx="500" cy="280" r="9" fill="#B58A2C"/>
    <text x="515" y="284" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Migrations SAP / ERP legacy</text>
  </g>

  <!-- Bottom-right: production but lower value -->
  <g class="interactive" data-card="case-itsm" tabindex="0" role="button" aria-label="ITSM tickets niveau 1 — résolution assistance">
    <circle cx="900" cy="490" r="11" fill="#1F5560"/>
    <text x="918" y="494" class="body" font-size="11" font-weight="500" fill="#1A1A1A">ITSM L1 · ticket triage / réso</text>
  </g>

  <g class="interactive" data-card="case-ecommerce" tabindex="0" role="button" aria-label="E-commerce ordering — Operator avec DoorDash Instacart">
    <circle cx="850" cy="540" r="9" fill="#1F5560"/>
    <text x="865" y="544" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Operator e-commerce ordering</text>
  </g>

  <g class="interactive" data-card="case-booking" tabindex="0" role="button" aria-label="Mariner — réservations Ticketmaster Resy">
    <circle cx="950" cy="575" r="8" fill="#1F5560"/>
    <text x="965" y="579" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Mariner · booking partners</text>
  </g>

  <g class="interactive" data-card="case-data-extract" tabindex="0" role="button" aria-label="Scraping et extraction données structurées via Stagehand Browser Use">
    <circle cx="780" cy="560" r="9" fill="#1F5560"/>
    <text x="800" y="564" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Scraping / extraction (Stagehand, Browser Use)</text>
  </g>

  <!-- Bottom-left: low value pilot (demos) -->
  <g class="interactive" data-card="case-demos" tabindex="0" role="button" aria-label="Démos viralité — meme creation grocery ordering">
    <circle cx="380" cy="520" r="8" fill="#B8B5AE"/>
    <text x="395" y="524" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Démos virales · meme / paint</text>
  </g>

  <g class="interactive" data-card="case-personal" tabindex="0" role="button" aria-label="Assistants personnels divers usages quotidiens">
    <circle cx="320" cy="570" r="7" fill="#B8B5AE"/>
    <text x="335" y="574" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Assistants perso (usages variés)</text>
  </g>

  <!-- Bridge area annotation -->
  <g class="interactive" data-card="diagonal" tabindex="0" role="button" aria-label="La diagonale d'industrialisation — enjeu 2026-2027">
    <line x1="425" y1="525" x2="850" y2="305" stroke="#B7332C" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="640" y="430" class="body" font-size="12" font-weight="600" fill="#B7332C" text-anchor="middle" font-style="italic">↗ La diagonale d'industrialisation</text>
    <text x="640" y="445" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">enjeu majeur 2026–2027 : faire passer les pilotes en production sans dégrader la valeur</text>
  </g>

  <!-- Numbered key insights (right side panel) -->
  <g transform="translate(60 690)">
    <rect x="0" y="0" width="1080" height="55" rx="3" fill="#F2EFE7" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="20" y="22" class="body" font-size="11" font-weight="600" fill="#1A1A1A">Lecture stratégique</text>
    <text x="20" y="40" class="body" font-size="10" fill="#5A5A5A">Le quadrant haut-droite reste mince. La masse opérationnelle de 2026 est concentrée bas-droite (back-office, RPA augmenté) ;</text>
    <text x="20" y="52" class="body" font-size="10" fill="#5A5A5A">la masse stratégique de 2027 dépendra de la capacité à industrialiser les pilotes de la colonne gauche — ce qu'UI-CUBE révèle comme structurellement difficile.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="765" x2="1140" y2="765" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="787" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Source : DataStudios case studies Claude enterprise ; OpenAI / Anthropic launch partners ; TechTarget interviews avec Info-Tech Research ; Neo4j / Datacreds case studies ; cadre analytique de l'auteur — 2026.</text>
</svg>
