<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive:hover .risk-bg { fill: #F6E9E6; }
      .interactive:hover .lat-bg { fill: #E8EFF1; }
    </style>
    <pattern id="hatch8" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#B7332C" stroke-width="0.6" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.08em">SCHÉMA 08 · FIABILITÉ &amp; FRICTION</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Surface d'attaque et budget temps d'un agent</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Pourquoi 40% des projets agentiques seront abandonnés d'ici 2027 (Gartner)</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="1"/>

  <!-- TOP HALF: Attack surface -->
  <text x="60" y="172" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" letter-spacing="0.08em">A · QUATRE FAMILLES DE RISQUES OBSERVÉES EN 2025-2026</text>

  <!-- Risk card 1: VPI -->
  <g class="interactive" data-card="risk-vpi" tabindex="0" role="button" aria-label="Risque prompt injection visuelle">
    <rect class="risk-bg" x="60" y="190" width="262" height="180" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <rect x="60" y="190" width="262" height="22" fill="url(#hatch8)"/>
    <text x="72" y="206" class="mono" font-size="9" font-weight="600" fill="#B7332C" letter-spacing="0.06em">RISQUE 01 · VPI</text>
    <text x="72" y="240" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Visual Prompt</text>
    <text x="72" y="260" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Injection</text>
    <text x="72" y="285" class="body" font-size="11" fill="#5A5A5A">Instruction malveillante</text>
    <text x="72" y="300" class="body" font-size="11" fill="#5A5A5A">incrustée dans une page,</text>
    <text x="72" y="315" class="body" font-size="11" fill="#5A5A5A">image ou pop-up.</text>
    <text x="72" y="345" class="mono" font-size="11" font-weight="600" fill="#B7332C">CUA : 51%</text>
    <text x="72" y="360" class="mono" font-size="11" font-weight="600" fill="#B7332C">BUA : jusqu'à 100%</text>
  </g>

  <!-- Risk card 2: Drift -->
  <g class="interactive" data-card="risk-drift" tabindex="0" role="button" aria-label="Risque dérive d'exécution">
    <rect class="risk-bg" x="332" y="190" width="262" height="180" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <rect x="332" y="190" width="262" height="22" fill="url(#hatch8)"/>
    <text x="344" y="206" class="mono" font-size="9" font-weight="600" fill="#B7332C" letter-spacing="0.06em">RISQUE 02 · DRIFT</text>
    <text x="344" y="240" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Dérive</text>
    <text x="344" y="260" class="display" font-size="16" font-weight="600" fill="#1A1A1A">d'exécution</text>
    <text x="344" y="285" class="body" font-size="11" fill="#5A5A5A">Boucles infinies, achats</text>
    <text x="344" y="300" class="body" font-size="11" fill="#5A5A5A">non sollicités, écrans</text>
    <text x="344" y="315" class="body" font-size="11" fill="#5A5A5A">de modal mal traités.</text>
    <text x="344" y="345" class="mono" font-size="11" font-weight="600" fill="#B7332C">15-32% succès</text>
    <text x="344" y="360" class="mono" font-size="11" font-weight="600" fill="#B7332C">sur tâches complexes</text>
  </g>

  <!-- Risk card 3: Data leak -->
  <g class="interactive" data-card="risk-data" tabindex="0" role="button" aria-label="Risque fuites de données">
    <rect class="risk-bg" x="604" y="190" width="262" height="180" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <rect x="604" y="190" width="262" height="22" fill="url(#hatch8)"/>
    <text x="616" y="206" class="mono" font-size="9" font-weight="600" fill="#B7332C" letter-spacing="0.06em">RISQUE 03 · DATA</text>
    <text x="616" y="240" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Fuites</text>
    <text x="616" y="260" class="display" font-size="16" font-weight="600" fill="#1A1A1A">de données</text>
    <text x="616" y="285" class="body" font-size="11" fill="#5A5A5A">Captures d'écran, cookies,</text>
    <text x="616" y="300" class="body" font-size="11" fill="#5A5A5A">tokens persistés. Partage</text>
    <text x="616" y="315" class="body" font-size="11" fill="#5A5A5A">implicite avec le modèle.</text>
    <text x="616" y="345" class="mono" font-size="11" font-weight="600" fill="#B7332C">ZDR + sandbox local</text>
    <text x="616" y="360" class="mono" font-size="11" font-weight="600" fill="#B7332C">comme contre-mesures</text>
  </g>

  <!-- Risk card 4: CVE / control plane -->
  <g class="interactive" data-card="risk-cve" tabindex="0" role="button" aria-label="Risque vulnérabilités du control plane">
    <rect class="risk-bg" x="876" y="190" width="262" height="180" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <rect x="876" y="190" width="262" height="22" fill="url(#hatch8)"/>
    <text x="888" y="206" class="mono" font-size="9" font-weight="600" fill="#B7332C" letter-spacing="0.06em">RISQUE 04 · CVE</text>
    <text x="888" y="240" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Vulnérabilités</text>
    <text x="888" y="260" class="display" font-size="16" font-weight="600" fill="#1A1A1A">control plane</text>
    <text x="888" y="285" class="body" font-size="11" fill="#5A5A5A">RCE sur l'orchestrateur,</text>
    <text x="888" y="300" class="body" font-size="11" fill="#5A5A5A">élévation de privilèges,</text>
    <text x="888" y="315" class="body" font-size="11" fill="#5A5A5A">injections en chaîne.</text>
    <text x="888" y="345" class="mono" font-size="11" font-weight="600" fill="#B7332C">CVE-2025-55322</text>
    <text x="888" y="360" class="mono" font-size="11" font-weight="600" fill="#B7332C">OmniParser · sept 2025</text>
  </g>

  <!-- Divider -->
  <line x1="60" y1="410" x2="1140" y2="410" stroke="#1A1A1A" stroke-width="0.8"/>

  <!-- BOTTOM HALF: Latency profile -->
  <text x="60" y="440" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" letter-spacing="0.08em">B · BUDGET TEMPS D'UNE TÂCHE OSWORLD MOYENNE · AGENT vs HUMAIN</text>

  <!-- Human bar -->
  <text x="60" y="490" class="mono" font-size="10" font-weight="600" fill="#1F5560">HUMAIN</text>
  <text x="60" y="505" class="mono" font-size="9" fill="#5A5A5A">expert</text>
  <rect x="160" y="478" width="35" height="32" fill="#1F5560"/>
  <text x="205" y="500" class="body" font-size="13" font-weight="600" fill="#1A1A1A">~30 sec</text>
  <text x="265" y="500" class="body" font-size="11" fill="#5A5A5A" font-style="italic">— action quasi continue, plan implicite</text>

  <!-- Agent bar - segmented -->
  <text x="60" y="555" class="mono" font-size="10" font-weight="600" fill="#B7332C">AGENT</text>
  <text x="60" y="570" class="mono" font-size="9" fill="#5A5A5A">CUA 2026</text>

  <!-- Segment 1: Planification -->
  <g class="interactive" data-card="lat-plan" tabindex="0" role="button" aria-label="Phase de planification">
    <rect class="lat-bg" x="160" y="543" width="640" height="32" fill="#B7332C" opacity="0.85"/>
    <text x="170" y="565" class="mono" font-size="11" font-weight="600" fill="#FAF8F3">PLANIFICATION + RÉFLEXION · 75-94%</text>
  </g>

  <!-- Segment 2: Grounding -->
  <g class="interactive" data-card="lat-ground" tabindex="0" role="button" aria-label="Phase de grounding">
    <rect class="lat-bg" x="800" y="543" width="160" height="32" fill="#B58A2C" opacity="0.85"/>
    <text x="810" y="565" class="mono" font-size="11" font-weight="600" fill="#FAF8F3">GROUNDING</text>
  </g>

  <!-- Segment 3: Action -->
  <g class="interactive" data-card="lat-action" tabindex="0" role="button" aria-label="Phase d'action">
    <rect class="lat-bg" x="960" y="543" width="100" height="32" fill="#1F5560" opacity="0.85"/>
    <text x="970" y="565" class="mono" font-size="11" font-weight="600" fill="#FAF8F3">ACTION</text>
  </g>

  <text x="1075" y="565" class="body" font-size="13" font-weight="600" fill="#1A1A1A">~12 min</text>

  <!-- Ratio annotation -->
  <line x1="160" y1="600" x2="1060" y2="600" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="610" y="625" class="display" font-size="20" font-weight="600" fill="#1A1A1A" text-anchor="middle">≈ 24× plus lent que l'humain</text>
  <text x="610" y="650" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">— mais 5 à 50× plus cher en coût direct, sans compter la supervision</text>

  <!-- Mitigation strip -->
  <rect x="60" y="680" width="1080" height="65" fill="none" stroke="#E5E1D8" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="80" y="703" class="mono" font-size="9" font-weight="600" fill="#1F5560" letter-spacing="0.06em">MITIGATIONS DOCUMENTÉES</text>
  <text x="80" y="725" class="body" font-size="11" fill="#1A1A1A">Prompt caching (-90% tokens en lecture) · batch processing (-50%) · sandbox éphémère · ZDR · guardian agents (10-15% du marché agentique en 2030, Gartner)</text>

  <!-- Footer -->
  <line x1="60" y1="760" x2="1140" y2="760" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="780" class="mono" font-size="9" fill="#5A5A5A">SOURCES · VPI-Bench · UI-CUBE (UiPath, nov. 2025) · CVE Mitre · Gartner Predicts 2026 · Anthropic API docs · OSWorld</text>
</svg>
