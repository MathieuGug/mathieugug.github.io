<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive:hover .layer-bg { fill: #F1ECDF; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.08em">SCHÉMA 07 · STACK DE PRODUCTION</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Anatomie d'un déploiement d'agent computer use</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Quatre couches, du modèle de base aux plateformes d'orchestration entreprise</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Side axis labels -->
  <text x="40" y="190" class="mono" font-size="9" font-weight="600" fill="#5A5A5A" letter-spacing="0.06em" transform="rotate(-90 40 190)">↑ ABSTRACTION</text>
  <text x="40" y="720" class="mono" font-size="9" font-weight="600" fill="#5A5A5A" letter-spacing="0.06em" transform="rotate(-90 40 720)">RAW CAPABILITY ↓</text>

  <!-- Layer 4 (top): GOUVERNANCE -->
  <g class="interactive" data-card="layer-gouvernance" tabindex="0" role="button" aria-label="Couche gouvernance entreprise">
    <rect class="layer-bg" x="80" y="170" width="1080" height="130" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <rect x="80" y="170" width="6" height="130" fill="#B58A2C"/>
    <text x="105" y="200" class="mono" font-size="10" font-weight="600" fill="#B58A2C" letter-spacing="0.08em">04 · GOUVERNANCE ENTREPRISE</text>
    <text x="105" y="226" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Plateformes d'orchestration et conformité</text>
    <text x="105" y="248" class="body" font-size="12" fill="#5A5A5A">Identité, audit, RBAC, intégration métier, gestion d'agents à l'échelle</text>

    <!-- Examples -->
    <g class="mono" font-size="11" fill="#1A1A1A">
      <rect x="105" y="260" width="155" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="115" y="277">Microsoft Copilot Studio</text>
      <rect x="270" y="260" width="115" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="280" y="277">Agent 365 (MS)</text>
      <rect x="395" y="260" width="155" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="405" y="277">Salesforce Agentforce</text>
      <rect x="560" y="260" width="135" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="570" y="277">ServiceNow AI</text>
      <rect x="705" y="260" width="105" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="715" y="277">UiPath</text>
      <rect x="820" y="260" width="155" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="830" y="277">ESN intégrateurs (Alten…)</text>
    </g>
  </g>

  <!-- Layer 3: INFRASTRUCTURE -->
  <g class="interactive" data-card="layer-infrastructure" tabindex="0" role="button" aria-label="Couche infrastructure navigateur et desktop">
    <rect class="layer-bg" x="80" y="310" width="1080" height="130" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <rect x="80" y="310" width="6" height="130" fill="#1F5560"/>
    <text x="105" y="340" class="mono" font-size="10" font-weight="600" fill="#1F5560" letter-spacing="0.08em">03 · INFRASTRUCTURE NAVIGATEUR &amp; DESKTOP</text>
    <text x="105" y="366" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Sandboxs, pools de sessions, capture d'écran</text>
    <text x="105" y="388" class="body" font-size="12" fill="#5A5A5A">Isolement, parallélisation, anti-bot, persistance de session, mémoire visuelle</text>

    <g class="mono" font-size="11" fill="#1A1A1A">
      <rect x="105" y="400" width="115" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="115" y="417">Browserbase</text>
      <rect x="230" y="400" width="75" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="240" y="417">Steel</text>
      <rect x="315" y="400" width="135" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="325" y="417">AnchorBrowser</text>
      <rect x="460" y="400" width="125" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="470" y="417">OmniTool (MS)</text>
      <rect x="595" y="400" width="135" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="605" y="417">Cloud PC pools</text>
      <rect x="740" y="400" width="115" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="750" y="417">E2B sandbox</text>
      <rect x="865" y="400" width="155" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="875" y="417">Playwright/CDP custom</text>
    </g>
  </g>

  <!-- Layer 2: HARNESS -->
  <g class="interactive" data-card="layer-harness" tabindex="0" role="button" aria-label="Couche harness et frameworks d'orchestration">
    <rect class="layer-bg" x="80" y="450" width="1080" height="130" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <rect x="80" y="450" width="6" height="130" fill="#B7332C"/>
    <text x="105" y="480" class="mono" font-size="10" font-weight="600" fill="#B7332C" letter-spacing="0.08em">02 · HARNESS &amp; FRAMEWORKS</text>
    <text x="105" y="506" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Boucle observe-plan-act, primitives, mémoire</text>
    <text x="105" y="528" class="body" font-size="12" fill="#5A5A5A">Couche logique entre le modèle et l'environnement — open-source dominant</text>

    <g class="mono" font-size="11" fill="#1A1A1A">
      <rect x="105" y="540" width="135" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="115" y="557">Stagehand v3</text>
      <rect x="250" y="540" width="125" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="260" y="557">Browser Use</text>
      <rect x="385" y="540" width="105" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="395" y="557">Agent S2</text>
      <rect x="500" y="540" width="175" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="510" y="557">anthropic-quickstarts</text>
      <rect x="685" y="540" width="135" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="695" y="557">UI-TARS Desktop</text>
      <rect x="830" y="540" width="115" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="840" y="557">Skyvern</text>
      <rect x="955" y="540" width="115" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="965" y="557">LangGraph</text>
    </g>
  </g>

  <!-- Layer 1 (bottom): MODÈLE -->
  <g class="interactive" data-card="layer-modele" tabindex="0" role="button" aria-label="Couche modèle de fondation">
    <rect class="layer-bg" x="80" y="590" width="1080" height="130" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <rect x="80" y="590" width="6" height="130" fill="#1A1A1A"/>
    <text x="105" y="620" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" letter-spacing="0.08em">01 · MODÈLE DE FONDATION</text>
    <text x="105" y="646" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Vision + raisonnement + grounding pixel-précis</text>
    <text x="105" y="668" class="body" font-size="12" fill="#5A5A5A">Capability ceiling : ce que le modèle ne sait pas faire, le harness ne le rattrape pas</text>

    <g class="mono" font-size="11" fill="#1A1A1A">
      <rect x="105" y="680" width="155" height="26" fill="none" stroke="#1A1A1A" stroke-width="1.25"/>
      <text x="115" y="697">Claude Opus 4.7 (CUA)</text>
      <rect x="270" y="680" width="115" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="280" y="697">GPT-CUA / 4.1</text>
      <rect x="395" y="680" width="135" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="405" y="697">Gemini 2.5 Pro</text>
      <rect x="540" y="680" width="125" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="550" y="697">UI-TARS-2 (BD)</text>
      <rect x="675" y="680" width="125" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="685" y="697">DeepSeek-CUA</text>
      <rect x="810" y="680" width="115" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="820" y="697">Qwen3-VL</text>
      <rect x="935" y="680" width="125" height="26" fill="none" stroke="#E5E1D8" stroke-width="1"/>
      <text x="945" y="697">OmniParser+VLM</text>
    </g>
  </g>

  <!-- Right-side annotations -->
  <text x="1080" y="237" class="mono" font-size="9" fill="#B58A2C" letter-spacing="0.05em" text-anchor="end">audit · RBAC · facturation</text>
  <text x="1080" y="377" class="mono" font-size="9" fill="#1F5560" letter-spacing="0.05em" text-anchor="end">isolation · parallélisme</text>
  <text x="1080" y="517" class="mono" font-size="9" fill="#B7332C" letter-spacing="0.05em" text-anchor="end">primitives · prompting · loops</text>
  <text x="1080" y="657" class="mono" font-size="9" fill="#1A1A1A" letter-spacing="0.05em" text-anchor="end">vision + tool-use natif</text>

  <!-- Footer note -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="765" class="mono" font-size="9" fill="#5A5A5A">SOURCES · Anthropic Quickstarts · Stagehand docs · Browser Use repo · Microsoft OmniTool · UiPath UI-CUBE · UI-TARS-2 paper</text>
  <text x="60" y="780" class="mono" font-size="9" fill="#5A5A5A" font-style="italic">Couches indicatives · cliquez sur chaque couche pour les enjeux et choix d'architecture</text>
</svg>
