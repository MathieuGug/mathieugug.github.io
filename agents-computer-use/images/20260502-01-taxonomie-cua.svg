<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="60" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.08em">SCHÉMA 01 · TAXONOMIE</text>
  <text x="60" y="98" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Anatomie d'un agent qui pilote un écran</text>
  <text x="60" y="124" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Périmètre, modalités d'observation, primitives d'action</text>
  <line x1="60" y1="148" x2="840" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Central node -->
  <g class="interactive" data-card="agent-cua" tabindex="0" role="button" aria-label="Agent computer use — racine de la taxonomie">
    <circle cx="450" cy="320" r="68" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="450" y="313" class="display" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">Agent</text>
    <text x="450" y="333" class="display" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">computer use</text>
    <text x="450" y="354" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">CUA</text>
  </g>

  <!-- Three primary branches -->
  <line x1="450" y1="388" x2="220" y2="490" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="450" y1="388" x2="450" y2="490" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="450" y1="388" x2="680" y2="490" stroke="#5A5A5A" stroke-width="1.25"/>

  <!-- BROWSER branch -->
  <g class="interactive" data-card="browser-agent" tabindex="0" role="button" aria-label="Browser Use Agent — périmètre navigateur">
    <rect x="100" y="490" width="240" height="68" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="220" y="518" class="body" font-size="13" font-weight="600" fill="#1F5560" text-anchor="middle">Browser Use Agent (BUA)</text>
    <text x="220" y="540" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">Périmètre : navigateur</text>
  </g>
  <text x="220" y="585" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Operator (ex.) · Mariner</text>
  <text x="220" y="600" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Stagehand · Browser Use</text>

  <!-- DESKTOP branch -->
  <g class="interactive" data-card="desktop-agent" tabindex="0" role="button" aria-label="Desktop Agent — périmètre OS et apps natives">
    <rect x="330" y="490" width="240" height="68" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="450" y="518" class="body" font-size="13" font-weight="600" fill="#B7332C" text-anchor="middle">Desktop Agent</text>
    <text x="450" y="540" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">Périmètre : OS + applis</text>
  </g>
  <text x="450" y="585" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Claude computer use</text>
  <text x="450" y="600" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">UI-TARS Desktop · OmniTool</text>

  <!-- MOBILE branch -->
  <g class="interactive" data-card="mobile-agent" tabindex="0" role="button" aria-label="Mobile Agent — Android iOS">
    <rect x="560" y="490" width="240" height="68" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="680" y="518" class="body" font-size="13" font-weight="600" fill="#B58A2C" text-anchor="middle">Mobile Agent</text>
    <text x="680" y="540" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">Périmètre : Android / iOS</text>
  </g>
  <text x="680" y="585" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">UI-TARS mobile · AppAgent</text>
  <text x="680" y="600" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Apple Intelligence (limité)</text>

  <!-- Modalités d'observation header -->
  <text x="60" y="655" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" letter-spacing="0.06em">MODALITÉS D'OBSERVATION</text>
  <line x1="60" y1="665" x2="840" y2="665" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- 3 columns of observation modalities -->
  <g class="interactive" data-card="obs-pixel" tabindex="0" role="button" aria-label="Observation par pixels purs">
    <rect x="60" y="685" width="240" height="78" rx="3" fill="#F2EFE7" stroke="#B8B5AE" stroke-width="1"/>
    <text x="180" y="708" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Pixels purs</text>
    <text x="180" y="725" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Screenshot → VLM</text>
    <text x="180" y="744" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">UI-TARS · Mariner · Claude</text>
    <text x="180" y="757" class="body" font-size="9" font-style="italic" fill="#B7332C" text-anchor="middle">universel · ancrage fragile</text>
  </g>

  <g class="interactive" data-card="obs-at" tabindex="0" role="button" aria-label="Accessibility tree desktop">
    <rect x="330" y="685" width="240" height="78" rx="3" fill="#F2EFE7" stroke="#B8B5AE" stroke-width="1"/>
    <text x="450" y="708" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Accessibility tree</text>
    <text x="450" y="725" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">a11y nodes structurés</text>
    <text x="450" y="744" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Windows UIA · macOS AX</text>
    <text x="450" y="757" class="body" font-size="9" font-style="italic" fill="#B7332C" text-anchor="middle">précis · couverture inégale</text>
  </g>

  <g class="interactive" data-card="obs-dom" tabindex="0" role="button" aria-label="DOM ou Chrome accessibility tree pour browser">
    <rect x="600" y="685" width="240" height="78" rx="3" fill="#F2EFE7" stroke="#B8B5AE" stroke-width="1"/>
    <text x="720" y="708" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">DOM hybride</text>
    <text x="720" y="725" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">DOM + screenshot</text>
    <text x="720" y="744" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Stagehand · OmniParser+VLM</text>
    <text x="720" y="757" class="body" font-size="9" font-style="italic" fill="#B7332C" text-anchor="middle">robuste · spécifique browser</text>
  </g>

  <!-- Primitives bar -->
  <text x="60" y="800" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" letter-spacing="0.06em">PRIMITIVES D'ACTION COMMUNES</text>
  <text x="60" y="822" class="body" font-size="11" fill="#1A1A1A">click(x,y) · double_click · right_click · drag · type(text) · keypress · scroll · wait · screenshot · zoom (récent)</text>

  <!-- Footer -->
  <line x1="60" y1="860" x2="840" y2="860" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="878" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Source : analyse des documentations Anthropic, OpenAI, ByteDance UI-TARS, Microsoft OmniParser ; cadre analytique de l'auteur — 2026.</text>
</svg>
