<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.08em">SCHÉMA 05 · ÉVOLUTION BENCHMARKS</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Saturation accélérée d'OSWorld, course en cours sur WebArena</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Score SOTA contre baseline humain, Q2 2024 → Q2 2026</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Chart axes setup -->
  <!-- Plot area: x = 140 to 1100, y = 220 to 580 -->
  <!-- y axis: 0% at y=580, 100% at y=220 (360 px for 100%) -->
  <!-- x axis: 9 quarters Q2 24 to Q2 26 -->
  
  <!-- Y grid lines -->
  <g stroke="#E5E1D8" stroke-width="0.5">
    <line x1="140" y1="220" x2="1100" y2="220"/>
    <line x1="140" y1="292" x2="1100" y2="292"/>
    <line x1="140" y1="364" x2="1100" y2="364"/>
    <line x1="140" y1="436" x2="1100" y2="436"/>
    <line x1="140" y1="508" x2="1100" y2="508"/>
    <line x1="140" y1="580" x2="1100" y2="580"/>
  </g>

  <!-- Y axis labels -->
  <g class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">
    <text x="130" y="224">100 %</text>
    <text x="130" y="296">80 %</text>
    <text x="130" y="368">60 %</text>
    <text x="130" y="440">40 %</text>
    <text x="130" y="512">20 %</text>
    <text x="130" y="584">0 %</text>
  </g>

  <!-- X axis -->
  <line x1="140" y1="580" x2="1100" y2="580" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="140" y1="220" x2="140" y2="580" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- X axis quarter ticks -->
  <g class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">
    <text x="180" y="600">Q2 24</text>
    <text x="295" y="600">Q3 24</text>
    <text x="410" y="600">Q4 24</text>
    <text x="525" y="600">Q1 25</text>
    <text x="640" y="600">Q2 25</text>
    <text x="755" y="600">Q3 25</text>
    <text x="870" y="600">Q4 25</text>
    <text x="985" y="600">Q1 26</text>
    <text x="1090" y="600">Q2 26</text>
  </g>
  <g stroke="#B8B5AE" stroke-width="0.5">
    <line x1="180" y1="580" x2="180" y2="585"/>
    <line x1="295" y1="580" x2="295" y2="585"/>
    <line x1="410" y1="580" x2="410" y2="585"/>
    <line x1="525" y1="580" x2="525" y2="585"/>
    <line x1="640" y1="580" x2="640" y2="585"/>
    <line x1="755" y1="580" x2="755" y2="585"/>
    <line x1="870" y1="580" x2="870" y2="585"/>
    <line x1="985" y1="580" x2="985" y2="585"/>
    <line x1="1090" y1="580" x2="1090" y2="585"/>
  </g>

  <!-- Human baseline lines -->
  <!-- OSWorld human ~72% → y = 580 - 72*3.6 = 580 - 259.2 = 320.8 -->
  <line x1="140" y1="320" x2="1100" y2="320" stroke="#B58A2C" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="1095" y="316" class="body" font-size="10" font-style="italic" fill="#B58A2C" text-anchor="end">baseline humain OSWorld ≈ 72 %</text>
  
  <!-- WebArena human ~78% → y = 580 - 78*3.6 = 580 - 280.8 = 299.2 -->
  <line x1="140" y1="299" x2="1100" y2="299" stroke="#B7332C" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="1095" y="294" class="body" font-size="10" font-style="italic" fill="#B7332C" text-anchor="end">baseline humain WebArena ≈ 78 %</text>

  <!-- OSWorld curve (orange, from 12% Apr 2024 to 76% Oct 2025) -->
  <!-- Data points (x, y) using y = 580 - score*3.6 -->
  <!-- Q2 2024 12.2% → 580 - 43.9 = 536 -->
  <!-- Q4 2024 22% → 580 - 79.2 = 500 -->
  <!-- Q1 2025 38.1% → 580 - 137 = 443 -->
  <!-- Q2 2025 50% → 580 - 180 = 400 (Agent S2 etc) -->
  <!-- Q3 2025 60% → 580 - 216 = 364 -->
  <!-- Q4 2025 76.26% (oct) → 580 - 274.5 = 305 -->
  <!-- Q1 2026 ~75% (varied) → 580 - 270 = 310 -->
  
  <path d="M 180 536 L 410 500 L 525 443 L 640 400 L 755 364 L 870 305 L 985 310" fill="none" stroke="#B58A2C" stroke-width="2.5"/>
  
  <!-- Dots on OSWorld line -->
  <g fill="#B58A2C">
    <circle cx="180" cy="536" r="4.5"/>
    <circle cx="410" cy="500" r="4.5"/>
    <circle cx="525" cy="443" r="4.5"/>
    <circle cx="640" cy="400" r="4.5"/>
    <circle cx="755" cy="364" r="4.5"/>
    <circle cx="870" cy="305" r="6"/>
    <circle cx="985" cy="310" r="4.5"/>
  </g>

  <!-- WebArena curve (carmine, from ~14% to peaks around 58% then > -->
  <!-- Q3 2024 ~14% (GPT-4) → 580 - 50.4 = 530 -->
  <!-- Q1 2025 58.1% (CUA Operator) → 580 - 209 = 371 -->
  <!-- Q3 2025 ~70% (ChatGPT agent) → 580 - 252 = 328 -->
  <!-- Q4 2025 ~73% Claude Opus 4.5 SOTA single agent → 580 - 263 = 317 -->
  <!-- Q1 2026 estimates ~76% → 580 - 273.6 = 306 -->
  
  <path d="M 295 530 L 525 371 L 755 328 L 870 317 L 985 306" fill="none" stroke="#B7332C" stroke-width="2.5"/>
  
  <g fill="#B7332C">
    <circle cx="295" cy="530" r="4.5"/>
    <circle cx="525" cy="371" r="4.5"/>
    <circle cx="755" cy="328" r="4.5"/>
    <circle cx="870" cy="317" r="4.5"/>
    <circle cx="985" cy="306" r="4.5"/>
  </g>

  <!-- Annotations on key points -->
  <!-- OSWorld start -->
  <line x1="180" y1="536" x2="180" y2="555" stroke="#5A5A5A" stroke-width="0.5"/>
  <text x="170" y="568" class="body" font-size="9" fill="#5A5A5A" text-anchor="end">12 %</text>

  <!-- OSWorld superhuman crossing point -->
  <g class="interactive" data-card="point-osagent" tabindex="0" role="button" aria-label="OSAgent franchit baseline humain — 23 octobre 2025">
    <circle cx="870" cy="305" r="10" fill="none" stroke="#B7332C" stroke-width="1.5"/>
    <line x1="870" y1="305" x2="940" y2="252" stroke="#5A5A5A" stroke-width="0.5"/>
    <rect x="940" y="232" width="155" height="42" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="950" y="250" class="body" font-size="11" font-weight="600" fill="#B7332C">★ OSAgent 76,26 %</text>
    <text x="950" y="266" class="body" font-size="10" fill="#5A5A5A">23 oct. 2025 — superhumain</text>
  </g>

  <!-- WebArena CUA launch annotation -->
  <line x1="525" y1="371" x2="525" y2="348" stroke="#5A5A5A" stroke-width="0.5"/>
  <rect x="445" y="328" width="160" height="22" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
  <text x="525" y="343" class="body" font-size="10" fill="#B7332C" text-anchor="middle">CUA Operator 58,1 %</text>

  <!-- OSWorld v1 → v2 -->
  <line x1="755" y1="364" x2="755" y2="385" stroke="#5A5A5A" stroke-width="0.5"/>
  <text x="755" y="400" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">passage OSWorld-Verified (juil. 25)</text>
  <text x="755" y="412" class="body" font-size="9" font-style="italic" fill="#B7332C" text-anchor="middle">comparabilité partielle avant/après</text>

  <!-- Legend -->
  <g transform="translate(170 660)">
    <rect x="0" y="0" width="900" height="55" rx="3" fill="#F2EFE7" stroke="#E5E1D8" stroke-width="0.5"/>
    <line x1="20" y1="20" x2="55" y2="20" stroke="#B58A2C" stroke-width="2.5"/>
    <circle cx="38" cy="20" r="4.5" fill="#B58A2C"/>
    <text x="65" y="24" class="body" font-size="11" fill="#1A1A1A">OSWorld (369 tâches Linux/Ubuntu, baseline humain ~72 %)</text>
    <line x1="20" y1="42" x2="55" y2="42" stroke="#B7332C" stroke-width="2.5"/>
    <circle cx="38" cy="42" r="4.5" fill="#B7332C"/>
    <text x="65" y="46" class="body" font-size="11" fill="#1A1A1A">WebArena (812 tâches multi-pages, baseline humain ~78 %)</text>
    <text x="500" y="24" class="body" font-size="10" font-style="italic" fill="#5A5A5A">─ ─ ─ baselines humains (référence)</text>
    <text x="500" y="46" class="body" font-size="10" font-style="italic" fill="#5A5A5A">★ point d'inflexion superhumain</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="767" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Source : leaderboards XLANG OSWorld/OSWorld-Verified ; The AGI Company OSAgent post Oct. 2025 ; system cards Claude Opus 4.5, OpenAI Operator launch ; Steel.dev results index ; Epoch AI analyses.</text>
  <text x="60" y="785" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Note méthodologique : OSWorld a été refondu en juillet 2025 (300+ tâches modifiées) ; les comparaisons à travers cette refonte sont à manier avec précaution.</text>
</svg>
