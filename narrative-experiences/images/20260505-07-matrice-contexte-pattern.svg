<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-07" role="img" aria-label="Matrice contexte × pattern narratif recommandé">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .ink   { fill: #1A1A1A; }
    .graphite { fill: #5A5A5A; }
    .carmine { fill: #B7332C; }
    .teal  { fill: #1F5560; }
  </style>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono ink" font-size="11" font-weight="600" letter-spacing="0.18em">SCHÉMA 07</text>
  <text x="60" y="100" class="display ink" font-size="26" font-weight="600" letter-spacing="-0.01em">Choisir le pattern : matrice contexte × format</text>
  <text x="60" y="128" class="display graphite" font-size="16" font-style="italic">Cinq cas-types, le pattern dominant et le pattern à éviter pour chacun.</text>

  <!-- 5 cards in a 5-column grid -->
  <g transform="translate(60, 180)">
    <!-- Cas A — Briefing court -->
    <g class="interactive" data-card="cas-A" tabindex="0" role="button" aria-label="Cas A — Briefing court">
      <rect x="0" y="0" width="200" height="500" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
      <text x="14" y="30" class="mono teal" font-size="11" font-weight="600" letter-spacing="0.14em">CAS A</text>
      <text x="14" y="58" class="display ink" font-size="16" font-weight="500">Briefing court</text>
      <text x="14" y="78" class="body graphite" font-size="11" font-style="italic">Comité, décision rapide</text>

      <line x1="14" y1="100" x2="186" y2="100" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="14" y="130" class="mono graphite" font-size="9" letter-spacing="0.12em">PUBLIC</text>
      <text x="14" y="148" class="body ink" font-size="12">Expert, décide</text>
      <text x="14" y="172" class="mono graphite" font-size="9" letter-spacing="0.12em">TEMPO</text>
      <text x="14" y="190" class="body ink" font-size="12">5–15 minutes</text>
      <text x="14" y="214" class="mono graphite" font-size="9" letter-spacing="0.12em">CHARGE</text>
      <text x="14" y="232" class="body ink" font-size="12">1–3 jours</text>

      <line x1="14" y1="270" x2="186" y2="270" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="14" y="296" class="mono carmine" font-size="9" font-weight="600" letter-spacing="0.12em">PATTERN</text>
      <text x="14" y="316" class="body ink" font-size="13" font-weight="500">Annotated chart</text>
      <text x="14" y="332" class="body ink" font-size="13" font-weight="500">en série</text>
      <text x="14" y="356" class="body graphite" font-size="11">Pointe explicite</text>
      <text x="14" y="372" class="body graphite" font-size="11">3–5 graphiques</text>

      <line x1="14" y1="410" x2="186" y2="410" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="14" y="436" class="mono graphite" font-size="9" font-weight="600" letter-spacing="0.12em">À ÉVITER</text>
      <text x="14" y="456" class="body graphite" font-size="11">Slideshow interactif,</text>
      <text x="14" y="472" class="body graphite" font-size="11">vidéo</text>
    </g>

    <!-- Cas B — Long-format public -->
    <g class="interactive" data-card="cas-B" tabindex="0" role="button" aria-label="Cas B — Long-format public">
      <rect x="220" y="0" width="200" height="500" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
      <text x="234" y="30" class="mono carmine" font-size="11" font-weight="600" letter-spacing="0.14em">CAS B</text>
      <text x="234" y="58" class="display ink" font-size="16" font-weight="500">Long-format</text>
      <text x="234" y="78" class="body graphite" font-size="11" font-style="italic">Civique, pédagogique</text>

      <line x1="234" y1="100" x2="406" y2="100" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="234" y="130" class="mono graphite" font-size="9" letter-spacing="0.12em">PUBLIC</text>
      <text x="234" y="148" class="body ink" font-size="12">Grand public motivé</text>
      <text x="234" y="172" class="mono graphite" font-size="9" letter-spacing="0.12em">TEMPO</text>
      <text x="234" y="190" class="body ink" font-size="12">15–40 minutes</text>
      <text x="234" y="214" class="mono graphite" font-size="9" letter-spacing="0.12em">CHARGE</text>
      <text x="234" y="232" class="body ink" font-size="12">Plusieurs semaines</text>

      <line x1="234" y1="270" x2="406" y2="270" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="234" y="296" class="mono carmine" font-size="9" font-weight="600" letter-spacing="0.12em">PATTERN</text>
      <text x="234" y="316" class="body ink" font-size="13" font-weight="600">Scrollytelling</text>
      <text x="234" y="332" class="body ink" font-size="13" font-weight="500">+ sticky graphic</text>
      <text x="234" y="356" class="body graphite" font-size="11">Variantes : explorable</text>
      <text x="234" y="372" class="body graphite" font-size="11">explanation, comic strip</text>

      <line x1="234" y1="410" x2="406" y2="410" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="234" y="436" class="mono graphite" font-size="9" font-weight="600" letter-spacing="0.12em">À ÉVITER</text>
      <text x="234" y="456" class="body graphite" font-size="11">Dashboard,</text>
      <text x="234" y="472" class="body graphite" font-size="11">PowerPoint commenté</text>
    </g>

    <!-- Cas C — Document structurant -->
    <g class="interactive" data-card="cas-C" tabindex="0" role="button" aria-label="Cas C — Document structurant">
      <rect x="440" y="0" width="200" height="500" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
      <text x="454" y="30" class="mono teal" font-size="11" font-weight="600" letter-spacing="0.14em">CAS C</text>
      <text x="454" y="58" class="display ink" font-size="16" font-weight="500">Référence</text>
      <text x="454" y="78" class="body graphite" font-size="11" font-style="italic">Cadre durable</text>

      <line x1="454" y1="100" x2="626" y2="100" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="454" y="130" class="mono graphite" font-size="9" letter-spacing="0.12em">PUBLIC</text>
      <text x="454" y="148" class="body ink" font-size="12">Mixte, revient</text>
      <text x="454" y="172" class="mono graphite" font-size="9" letter-spacing="0.12em">TEMPO</text>
      <text x="454" y="190" class="body ink" font-size="12">Non-linéaire</text>
      <text x="454" y="214" class="mono graphite" font-size="9" letter-spacing="0.12em">CHARGE</text>
      <text x="454" y="232" class="body ink" font-size="12">Élevée</text>

      <line x1="454" y1="270" x2="626" y2="270" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="454" y="296" class="mono carmine" font-size="9" font-weight="600" letter-spacing="0.12em">PATTERN</text>
      <text x="454" y="316" class="body ink" font-size="13" font-weight="500">Magazine style</text>
      <text x="454" y="332" class="body ink" font-size="13" font-weight="500">+ TOC persistante</text>
      <text x="454" y="356" class="body graphite" font-size="11">Schémas autonomes,</text>
      <text x="454" y="372" class="body graphite" font-size="11">lus indépendamment</text>

      <line x1="454" y1="410" x2="626" y2="410" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="454" y="436" class="mono graphite" font-size="9" font-weight="600" letter-spacing="0.12em">À ÉVITER</text>
      <text x="454" y="456" class="body graphite" font-size="11">Scrollytelling</text>
      <text x="454" y="472" class="body graphite" font-size="11">(chemin imposé)</text>
    </g>

    <!-- Cas D — Émotionnel / politique -->
    <g class="interactive" data-card="cas-D" tabindex="0" role="button" aria-label="Cas D — Dispositif émotionnel">
      <rect x="660" y="0" width="200" height="500" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
      <text x="674" y="30" class="mono carmine" font-size="11" font-weight="600" letter-spacing="0.14em">CAS D</text>
      <text x="674" y="58" class="display ink" font-size="16" font-weight="500">Émotionnel</text>
      <text x="674" y="78" class="body graphite" font-size="11" font-style="italic">Sujet humain ou politique</text>

      <line x1="674" y1="100" x2="846" y2="100" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="674" y="130" class="mono graphite" font-size="9" letter-spacing="0.12em">PUBLIC</text>
      <text x="674" y="148" class="body ink" font-size="12">Grand public</text>
      <text x="674" y="172" class="mono graphite" font-size="9" letter-spacing="0.12em">TEMPO</text>
      <text x="674" y="190" class="body ink" font-size="12">3–8 minutes</text>
      <text x="674" y="214" class="mono graphite" font-size="9" letter-spacing="0.12em">CHARGE</text>
      <text x="674" y="232" class="body ink" font-size="12">Variable</text>

      <line x1="674" y1="270" x2="846" y2="270" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="674" y="296" class="mono carmine" font-size="9" font-weight="600" letter-spacing="0.12em">PATTERN</text>
      <text x="674" y="316" class="body ink" font-size="13" font-weight="500">Lupi / Fragapane</text>
      <text x="674" y="332" class="body ink" font-size="13" font-weight="500">— formes organiques</text>
      <text x="674" y="356" class="body graphite" font-size="11">Petits datasets,</text>
      <text x="674" y="372" class="body graphite" font-size="11">cas individuels</text>

      <line x1="674" y1="410" x2="846" y2="410" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="674" y="436" class="mono graphite" font-size="9" font-weight="600" letter-spacing="0.12em">À ÉVITER</text>
      <text x="674" y="456" class="body graphite" font-size="11">Palette dashboard,</text>
      <text x="674" y="472" class="body graphite" font-size="11">grille analytique</text>
    </g>

    <!-- Cas E — Outil interne -->
    <g class="interactive" data-card="cas-E" tabindex="0" role="button" aria-label="Cas E — Outil interne récurrent">
      <rect x="880" y="0" width="200" height="500" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1.25" stroke-dasharray="3 3"/>
      <text x="894" y="30" class="mono graphite" font-size="11" font-weight="600" letter-spacing="0.14em">CAS E</text>
      <text x="894" y="58" class="display ink" font-size="16" font-weight="500">Outil interne</text>
      <text x="894" y="78" class="body graphite" font-size="11" font-style="italic">Récurrent, expert</text>

      <line x1="894" y1="100" x2="1066" y2="100" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="894" y="130" class="mono graphite" font-size="9" letter-spacing="0.12em">PUBLIC</text>
      <text x="894" y="148" class="body ink" font-size="12">Équipe data, métier</text>
      <text x="894" y="172" class="mono graphite" font-size="9" letter-spacing="0.12em">TEMPO</text>
      <text x="894" y="190" class="body ink" font-size="12">Court, répété</text>
      <text x="894" y="214" class="mono graphite" font-size="9" letter-spacing="0.12em">CHARGE</text>
      <text x="894" y="232" class="body ink" font-size="12">Maintenance</text>

      <line x1="894" y1="270" x2="1066" y2="270" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="894" y="296" class="mono graphite" font-size="9" font-weight="600" letter-spacing="0.12em">CE N'EST PAS</text>
      <text x="894" y="316" class="body ink" font-size="13" font-weight="500">une expérience</text>
      <text x="894" y="332" class="body ink" font-size="13" font-weight="500">narrative.</text>
      <text x="894" y="356" class="body graphite" font-size="11">→ Dashboard exploratoire</text>
      <text x="894" y="372" class="body graphite" font-size="11">classique.</text>

      <line x1="894" y1="410" x2="1066" y2="410" stroke="#E5E1D8" stroke-width="0.5"/>

      <text x="894" y="436" class="mono graphite" font-size="9" font-weight="600" letter-spacing="0.12em">PIÈGE</text>
      <text x="894" y="456" class="body graphite" font-size="11">Sur-narrer un usage</text>
      <text x="894" y="472" class="body graphite" font-size="11">qui demande efficacité</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="60" y1="755" x2="1140" y2="755" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="775" class="body graphite" font-size="10" font-style="italic">Source : grille empirique de l'auteur, validée sur une dizaine d'artefacts produits depuis 2024.</text>
</svg>
