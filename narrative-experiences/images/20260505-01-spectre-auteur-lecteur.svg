<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-01" role="img" aria-label="Spectre auteur ↔ lecteur de Segel-Heer (2010), avec les sept genres positionnés">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .ink   { fill: #1A1A1A; }
    .graphite { fill: #5A5A5A; }
    .mist  { fill: #B8B5AE; }
    .carmine { fill: #B7332C; }
    .teal  { fill: #1F5560; }
  </style>
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1A1A1A"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono ink" font-size="11" font-weight="600" letter-spacing="0.18em">SCHÉMA 01</text>
  <text x="60" y="100" class="display ink" font-size="26" font-weight="600" letter-spacing="-0.01em">Le spectre auteur ↔ lecteur</text>
  <text x="60" y="128" class="display graphite" font-size="16" font-style="italic">Sept genres narratifs (Segel &amp; Heer, 2010), positionnés selon le degré de contrôle auctorial</text>

  <!-- Axis line -->
  <line x1="120" y1="430" x2="1080" y2="430" stroke="#1A1A1A" stroke-width="2.5" marker-end="url(#arrow1)" marker-start="url(#arrow1)"/>

  <!-- Pole labels -->
  <text x="120" y="470" class="mono carmine" font-size="11" font-weight="600" letter-spacing="0.18em">AUTHOR-DRIVEN</text>
  <text x="120" y="490" class="body graphite" font-size="11">Chemin linéaire strict · message imposé · zéro interactivité</text>

  <text x="1080" y="470" class="mono teal" font-size="11" font-weight="600" letter-spacing="0.18em" text-anchor="end">READER-DRIVEN</text>
  <text x="1080" y="490" class="body graphite" font-size="11" text-anchor="end">Exploration libre · pas de chemin imposé · maximale interactivité</text>

  <!-- Tick marks -->
  <g stroke="#5A5A5A" stroke-width="0.75">
    <line x1="120" y1="425" x2="120" y2="445"/>
    <line x1="360" y1="425" x2="360" y2="445"/>
    <line x1="600" y1="425" x2="600" y2="445"/>
    <line x1="840" y1="425" x2="840" y2="445"/>
    <line x1="1080" y1="425" x2="1080" y2="445"/>
  </g>

  <!-- Genres - upper row -->
  <g class="interactive" data-card="comic-strip" tabindex="0" role="button" aria-label="Comic strip">
    <line x1="180" y1="430" x2="180" y2="290" stroke="#5A5A5A" stroke-width="0.75"/>
    <circle cx="180" cy="290" r="34" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="180" y="284" class="body ink" font-size="11" font-weight="500" text-anchor="middle">Comic</text>
    <text x="180" y="298" class="body ink" font-size="11" font-weight="500" text-anchor="middle">strip</text>
    <text x="180" y="244" class="mono graphite" font-size="10" text-anchor="middle">Tonal · linéaire</text>
  </g>

  <g class="interactive" data-card="film-video" tabindex="0" role="button" aria-label="Film / video / animation">
    <line x1="280" y1="430" x2="280" y2="220" stroke="#5A5A5A" stroke-width="0.75"/>
    <circle cx="280" cy="220" r="34" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="280" y="214" class="body ink" font-size="11" font-weight="500" text-anchor="middle">Film /</text>
    <text x="280" y="228" class="body ink" font-size="11" font-weight="500" text-anchor="middle">video</text>
    <text x="280" y="174" class="mono graphite" font-size="10" text-anchor="middle">Tempo total</text>
  </g>

  <g class="interactive" data-card="annotated" tabindex="0" role="button" aria-label="Annotated chart">
    <line x1="420" y1="430" x2="420" y2="290" stroke="#5A5A5A" stroke-width="0.75"/>
    <circle cx="420" cy="290" r="34" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="420" y="284" class="body ink" font-size="11" font-weight="500" text-anchor="middle">Annotated</text>
    <text x="420" y="298" class="body ink" font-size="11" font-weight="500" text-anchor="middle">chart</text>
    <text x="420" y="244" class="mono graphite" font-size="10" text-anchor="middle">Une pointe · sobre</text>
  </g>

  <g class="interactive" data-card="magazine" tabindex="0" role="button" aria-label="Magazine style">
    <line x1="540" y1="430" x2="540" y2="220" stroke="#5A5A5A" stroke-width="0.75"/>
    <circle cx="540" cy="220" r="36" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="540" y="216" class="body ink" font-size="11" font-weight="500" text-anchor="middle">Magazine</text>
    <text x="540" y="230" class="body ink" font-size="11" font-weight="500" text-anchor="middle">style</text>
    <text x="540" y="170" class="mono graphite" font-size="10" text-anchor="middle">Référence durable</text>
  </g>

  <g class="interactive" data-card="scrolly" tabindex="0" role="button" aria-label="Scrollytelling">
    <line x1="660" y1="430" x2="660" y2="600" stroke="#5A5A5A" stroke-width="0.75"/>
    <circle cx="660" cy="600" r="40" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <text x="660" y="596" class="body ink" font-size="11" font-weight="600" text-anchor="middle">Scrolly-</text>
    <text x="660" y="610" class="body ink" font-size="11" font-weight="600" text-anchor="middle">telling</text>
    <text x="660" y="660" class="mono carmine" font-size="10" font-weight="600" text-anchor="middle">post-2010 · dominant 2026</text>
  </g>

  <g class="interactive" data-card="slideshow" tabindex="0" role="button" aria-label="Slide show">
    <line x1="780" y1="430" x2="780" y2="600" stroke="#5A5A5A" stroke-width="0.75"/>
    <circle cx="780" cy="600" r="34" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="780" y="596" class="body ink" font-size="11" font-weight="500" text-anchor="middle">Slide</text>
    <text x="780" y="610" class="body ink" font-size="11" font-weight="500" text-anchor="middle">show</text>
    <text x="780" y="654" class="mono graphite" font-size="10" text-anchor="middle">Étapes interactives</text>
  </g>

  <g class="interactive" data-card="flow-chart" tabindex="0" role="button" aria-label="Flow chart">
    <line x1="900" y1="430" x2="900" y2="290" stroke="#5A5A5A" stroke-width="0.75"/>
    <circle cx="900" cy="290" r="34" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="900" y="284" class="body ink" font-size="11" font-weight="500" text-anchor="middle">Flow</text>
    <text x="900" y="298" class="body ink" font-size="11" font-weight="500" text-anchor="middle">chart</text>
    <text x="900" y="244" class="mono graphite" font-size="10" text-anchor="middle">Branchements</text>
  </g>

  <g class="interactive" data-card="poster" tabindex="0" role="button" aria-label="Partitioned poster">
    <line x1="1010" y1="430" x2="1010" y2="600" stroke="#5A5A5A" stroke-width="0.75"/>
    <circle cx="1010" cy="600" r="38" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="1010" y="596" class="body ink" font-size="11" font-weight="500" text-anchor="middle">Partitioned</text>
    <text x="1010" y="610" class="body ink" font-size="11" font-weight="500" text-anchor="middle">poster</text>
    <text x="1010" y="660" class="mono graphite" font-size="10" text-anchor="middle">Composition libre</text>
  </g>

  <!-- Caption legend -->
  <g transform="translate(60, 700)">
    <circle cx="0" cy="0" r="6" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="14" y="4" class="body graphite" font-size="11">Genres à dominante author-driven</text>
    <circle cx="320" cy="0" r="6" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="334" y="4" class="body graphite" font-size="11">Genres avec poignées d'exploration</text>
    <circle cx="660" cy="0" r="7" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <text x="676" y="4" class="body ink" font-size="11" font-weight="500">Pattern dominant 2026</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="762" class="body graphite" font-size="10" font-style="italic">Source : Segel &amp; Heer, « Narrative Visualization », IEEE TVCG, 2010 ; le scrollytelling ajouté à partir des conventions stabilisées 2012–2024.</text>
</svg>
