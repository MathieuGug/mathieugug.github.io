<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-03" role="img" aria-label="Matrice genres × dimensions de design narratif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .ink   { fill: #1A1A1A; }
    .graphite { fill: #5A5A5A; }
    .carmine { fill: #B7332C; }
    .teal  { fill: #1F5560; }
  </style>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono ink" font-size="11" font-weight="600" letter-spacing="0.18em">SCHÉMA 03</text>
  <text x="60" y="100" class="display ink" font-size="26" font-weight="600" letter-spacing="-0.01em">Genres × dimensions de design</text>
  <text x="60" y="128" class="display graphite" font-size="16" font-style="italic">Lecture en intensité : disque plein = forte présence ; quart = présence ponctuelle.</text>

  <!-- Matrix coordinates -->
  <!-- 4 columns (dimensions) starting at x=420, gap 165 -->
  <!-- 8 rows (genres) starting at y=210, gap 60 -->

  <!-- Column headers -->
  <g class="body" font-size="11" font-weight="500">
    <text x="430" y="170" class="ink" transform="rotate(-25 430 170)">Structure narrative</text>
    <text x="600" y="170" class="ink" transform="rotate(-25 600 170)">Interactivité</text>
    <text x="765" y="170" class="ink" transform="rotate(-25 765 170)">Registre émotionnel</text>
    <text x="930" y="170" class="ink" transform="rotate(-25 930 170)">Charge de production</text>
  </g>

  <!-- Subheaders -->
  <g class="mono graphite" font-size="9" letter-spacing="0.1em">
    <text x="450" y="195" text-anchor="middle">LIN. → OUVERTE</text>
    <text x="615" y="195" text-anchor="middle">FAIBLE → FORTE</text>
    <text x="780" y="195" text-anchor="middle">SOBRE → CHALEUR</text>
    <text x="945" y="195" text-anchor="middle">LÉGÈRE → LOURDE</text>
  </g>

  <!-- Row labels and circles -->
  <g class="body ink" font-size="13" font-weight="500">
    <!-- Magazine style -->
    <g class="interactive" data-card="magazine-row" tabindex="0" role="button" aria-label="Magazine style — détails par dimension">
      <text x="60" y="234">Magazine style</text>
      <circle cx="450" cy="230" r="14" fill="#1F5560" fill-opacity="0.35"/>
      <circle cx="615" cy="230" r="10" fill="#1F5560" fill-opacity="0.30"/>
      <circle cx="780" cy="230" r="10" fill="#1F5560" fill-opacity="0.30"/>
      <circle cx="945" cy="230" r="14" fill="#1F5560" fill-opacity="0.55"/>
    </g>
    <!-- Annotated chart -->
    <g class="interactive" data-card="annotated-row" tabindex="0" role="button" aria-label="Annotated chart — détails par dimension">
      <text x="60" y="294">Annotated chart</text>
      <circle cx="450" cy="290" r="8" fill="#B7332C" fill-opacity="0.35"/>
      <circle cx="615" cy="290" r="8" fill="#1F5560" fill-opacity="0.30"/>
      <circle cx="780" cy="290" r="8" fill="#1F5560" fill-opacity="0.20"/>
      <circle cx="945" cy="290" r="8" fill="#1F5560" fill-opacity="0.25"/>
    </g>
    <!-- Partitioned poster -->
    <g class="interactive" data-card="poster-row" tabindex="0" role="button" aria-label="Partitioned poster — détails par dimension">
      <text x="60" y="354">Partitioned poster</text>
      <circle cx="450" cy="350" r="14" fill="#1F5560" fill-opacity="0.55"/>
      <circle cx="615" cy="350" r="10" fill="#1F5560" fill-opacity="0.30"/>
      <circle cx="780" cy="350" r="12" fill="#1F5560" fill-opacity="0.40"/>
      <circle cx="945" cy="350" r="12" fill="#1F5560" fill-opacity="0.40"/>
    </g>
    <!-- Flow chart -->
    <g class="interactive" data-card="flow-row" tabindex="0" role="button" aria-label="Flow chart — détails par dimension">
      <text x="60" y="414">Flow chart</text>
      <circle cx="450" cy="410" r="14" fill="#1F5560" fill-opacity="0.50"/>
      <circle cx="615" cy="410" r="14" fill="#B7332C" fill-opacity="0.45"/>
      <circle cx="780" cy="410" r="10" fill="#1F5560" fill-opacity="0.30"/>
      <circle cx="945" cy="410" r="14" fill="#1F5560" fill-opacity="0.50"/>
    </g>
    <!-- Comic strip -->
    <g class="interactive" data-card="comic-row" tabindex="0" role="button" aria-label="Comic strip — détails par dimension">
      <text x="60" y="474">Comic strip</text>
      <circle cx="450" cy="470" r="8" fill="#B7332C" fill-opacity="0.30"/>
      <circle cx="615" cy="470" r="8" fill="#B7332C" fill-opacity="0.20"/>
      <circle cx="780" cy="470" r="16" fill="#B7332C" fill-opacity="0.55"/>
      <circle cx="945" cy="470" r="12" fill="#1F5560" fill-opacity="0.40"/>
    </g>
    <!-- Slideshow -->
    <g class="interactive" data-card="slide-row" tabindex="0" role="button" aria-label="Slide show — détails par dimension">
      <text x="60" y="534">Slide show</text>
      <circle cx="450" cy="530" r="10" fill="#1F5560" fill-opacity="0.35"/>
      <circle cx="615" cy="530" r="14" fill="#1F5560" fill-opacity="0.55"/>
      <circle cx="780" cy="530" r="10" fill="#1F5560" fill-opacity="0.30"/>
      <circle cx="945" cy="530" r="14" fill="#1F5560" fill-opacity="0.50"/>
    </g>
    <!-- Scrollytelling -->
    <g class="interactive" data-card="scrolly-row" tabindex="0" role="button" aria-label="Scrollytelling — détails par dimension">
      <text x="60" y="594" font-weight="600" fill="#B7332C">Scrollytelling</text>
      <text x="220" y="594" class="mono carmine" font-size="9" font-weight="600" letter-spacing="0.1em">post-2010</text>
      <circle cx="450" cy="590" r="10" fill="#B7332C" fill-opacity="0.40"/>
      <circle cx="615" cy="590" r="14" fill="#B7332C" fill-opacity="0.55"/>
      <circle cx="780" cy="590" r="14" fill="#B7332C" fill-opacity="0.45"/>
      <circle cx="945" cy="590" r="16" fill="#B7332C" fill-opacity="0.65"/>
    </g>
    <!-- Film -->
    <g class="interactive" data-card="film-row" tabindex="0" role="button" aria-label="Film / video — détails par dimension">
      <text x="60" y="654">Film / video</text>
      <circle cx="450" cy="650" r="8" fill="#B7332C" fill-opacity="0.30"/>
      <circle cx="615" cy="650" r="6" fill="#B7332C" fill-opacity="0.20"/>
      <circle cx="780" cy="650" r="14" fill="#B7332C" fill-opacity="0.55"/>
      <circle cx="945" cy="650" r="16" fill="#1F5560" fill-opacity="0.65"/>
    </g>
  </g>

  <!-- Vertical separators between columns -->
  <g stroke="#E5E1D8" stroke-width="0.5">
    <line x1="370" y1="210" x2="370" y2="680"/>
    <line x1="535" y1="210" x2="535" y2="680"/>
    <line x1="700" y1="210" x2="700" y2="680"/>
    <line x1="865" y1="210" x2="865" y2="680"/>
    <line x1="1025" y1="210" x2="1025" y2="680"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 712)">
    <circle cx="0" cy="0" r="6" fill="#B7332C" fill-opacity="0.55"/>
    <text x="14" y="4" class="body graphite" font-size="11">Pôle author-driven (chemin imposé)</text>
    <circle cx="280" cy="0" r="6" fill="#1F5560" fill-opacity="0.55"/>
    <text x="294" y="4" class="body graphite" font-size="11">Pôle reader-driven (poignée d'exploration)</text>
    <text x="600" y="4" class="body graphite" font-size="11" font-style="italic">Cliquer une ligne pour voir la règle d'or du genre.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="755" x2="1140" y2="755" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="775" class="body graphite" font-size="10" font-style="italic">Source : adaptation Segel &amp; Heer 2010, Riche et al. 2018, lectures empiriques 2024–2026.</text>
</svg>
