<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-06" role="img" aria-label="Chaîne de production augmentée par IA — apport et risque par étape">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .ink   { fill: #1A1A1A; }
    .graphite { fill: #5A5A5A; }
    .carmine { fill: #B7332C; }
    .teal  { fill: #1F5560; }
    .mustard { fill: #B58A2C; }
  </style>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono ink" font-size="11" font-weight="600" letter-spacing="0.18em">SCHÉMA 06</text>
  <text x="60" y="100" class="display ink" font-size="26" font-weight="600" letter-spacing="-0.01em">L'IA dans la chaîne narrative</text>
  <text x="60" y="128" class="display graphite" font-size="16" font-style="italic">Sept étapes, deux régimes : ce que l'IA accélère (vert-teal) et ce qu'elle ne remplace pas (carmine).</text>

  <!-- Top legend -->
  <g transform="translate(60, 168)">
    <rect x="0" y="0" width="14" height="14" fill="#1F5560" fill-opacity="0.50"/>
    <text x="22" y="11" class="body ink" font-size="11">Apport IA dominant</text>
    <rect x="200" y="0" width="14" height="14" fill="#B58A2C" fill-opacity="0.50"/>
    <text x="222" y="11" class="body ink" font-size="11">Augmentation IA modérée</text>
    <rect x="430" y="0" width="14" height="14" fill="#B7332C" fill-opacity="0.55"/>
    <text x="452" y="11" class="body ink" font-size="11">Acte humain non substituable</text>
    <text x="700" y="11" class="body graphite" font-size="11" font-style="italic">Hauteur de barre = intensité ; texte = risque dominant à l'étape.</text>
  </g>

  <!-- Steps as vertical bars / timeline -->
  <g transform="translate(80, 220)">
    <!-- Baseline -->
    <line x1="0" y1="380" x2="1080" y2="380" stroke="#1A1A1A" stroke-width="1.25"/>

    <!-- 7 steps, each ~150 wide -->
    <!-- Step 1 — Cadrage (humain dominant) -->
    <g class="interactive" data-card="step-cadrage" tabindex="0" role="button" aria-label="Étape 1 — Cadrage">
      <rect x="20" y="60" width="120" height="320" fill="#B7332C" fill-opacity="0.50"/>
      <text x="80" y="408" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">01</text>
      <text x="80" y="428" class="body ink" font-size="12" font-weight="500" text-anchor="middle">Cadrage</text>
      <text x="80" y="446" class="body graphite" font-size="10" text-anchor="middle">&amp; thèse</text>
      <text x="80" y="40" class="body graphite" font-size="10" text-anchor="middle" font-style="italic">Risque : récit moyen</text>
    </g>

    <!-- Step 2 — Données (IA dominante) -->
    <g class="interactive" data-card="step-donnees" tabindex="0" role="button" aria-label="Étape 2 — Données">
      <rect x="160" y="200" width="120" height="180" fill="#1F5560" fill-opacity="0.50"/>
      <text x="220" y="408" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">02</text>
      <text x="220" y="428" class="body ink" font-size="12" font-weight="500" text-anchor="middle">Données</text>
      <text x="220" y="446" class="body graphite" font-size="10" text-anchor="middle">collecte / clean</text>
      <text x="220" y="180" class="body graphite" font-size="10" text-anchor="middle" font-style="italic">Risque : hallucination silencieuse</text>
    </g>

    <!-- Step 3 — Exploration (IA dominante avec curation humaine) -->
    <g class="interactive" data-card="step-exploration" tabindex="0" role="button" aria-label="Étape 3 — Exploration">
      <rect x="300" y="170" width="120" height="210" fill="#1F5560" fill-opacity="0.50"/>
      <text x="360" y="408" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">03</text>
      <text x="360" y="428" class="body ink" font-size="12" font-weight="500" text-anchor="middle">Exploration</text>
      <text x="360" y="446" class="body graphite" font-size="10" text-anchor="middle">analytique</text>
      <text x="360" y="150" class="body graphite" font-size="10" text-anchor="middle" font-style="italic">Risque : confondre signal et bruit</text>
    </g>

    <!-- Step 4 — Scénario (humain dominant) -->
    <g class="interactive" data-card="step-scenario" tabindex="0" role="button" aria-label="Étape 4 — Scénario">
      <rect x="440" y="60" width="120" height="320" fill="#B7332C" fill-opacity="0.55"/>
      <text x="500" y="408" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">04</text>
      <text x="500" y="428" class="body ink" font-size="12" font-weight="600" text-anchor="middle">Scénario</text>
      <text x="500" y="446" class="body graphite" font-size="10" text-anchor="middle">acte d'auteur</text>
      <text x="500" y="40" class="body graphite" font-size="10" text-anchor="middle" font-style="italic">Risque : sur-structuration LLM</text>
    </g>

    <!-- Step 5 — Production (mixte fort) -->
    <g class="interactive" data-card="step-production" tabindex="0" role="button" aria-label="Étape 5 — Production">
      <rect x="580" y="140" width="120" height="240" fill="#B58A2C" fill-opacity="0.55"/>
      <text x="640" y="408" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">05</text>
      <text x="640" y="428" class="body ink" font-size="12" font-weight="500" text-anchor="middle">Production</text>
      <text x="640" y="446" class="body graphite" font-size="10" text-anchor="middle">artefacts</text>
      <text x="640" y="120" class="body graphite" font-size="10" text-anchor="middle" font-style="italic">Risque : clichés visuels</text>
    </g>

    <!-- Step 6 — Intégration (IA dominante) -->
    <g class="interactive" data-card="step-integration" tabindex="0" role="button" aria-label="Étape 6 — Intégration">
      <rect x="720" y="180" width="120" height="200" fill="#1F5560" fill-opacity="0.50"/>
      <text x="780" y="408" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">06</text>
      <text x="780" y="428" class="body ink" font-size="12" font-weight="500" text-anchor="middle">Intégration</text>
      <text x="780" y="446" class="body graphite" font-size="10" text-anchor="middle">interactive</text>
      <text x="780" y="160" class="body graphite" font-size="10" text-anchor="middle" font-style="italic">Risque : mobile cassé</text>
    </g>

    <!-- Step 7 — QA + publication (mixte) -->
    <g class="interactive" data-card="step-qa" tabindex="0" role="button" aria-label="Étape 7 — QA et publication">
      <rect x="860" y="140" width="120" height="240" fill="#B58A2C" fill-opacity="0.50"/>
      <text x="920" y="408" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">07</text>
      <text x="920" y="428" class="body ink" font-size="12" font-weight="500" text-anchor="middle">QA &amp; publi.</text>
      <text x="920" y="446" class="body graphite" font-size="10" text-anchor="middle">jugement final</text>
      <text x="920" y="120" class="body graphite" font-size="10" text-anchor="middle" font-style="italic">Risque : effacement du POV</text>
    </g>
  </g>

  <!-- Insight strip -->
  <g transform="translate(60, 720)">
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="0" y="22" class="body ink" font-size="12" font-weight="500">Régularité 2024–2026 :</text>
    <text x="148" y="22" class="body ink" font-size="12">l'IA augmente la productivité d'un facteur 2 à 5 sur les étapes industrielles ; elle ne crée pas la pointe éditoriale.</text>
  </g>

  <!-- Footer -->
  <text x="60" y="775" class="body graphite" font-size="10" font-style="italic">Source : observation pipelines NYT, FT, Reuters Graphics, The Pudding, Le Monde 2024–2026 ; arXiv 2503.02631 (Reflection on Data Storytelling Tools, 2025).</text>
</svg>
