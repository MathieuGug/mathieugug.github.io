<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-06" role="img" aria-label="Chaîne narrative augmentée par IA — part IA et part humaine par étape">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .ink   { fill: #1A1A1A; }
    .graphite { fill: #5A5A5A; }
    .carmine { fill: #B7332C; }
    .teal  { fill: #1F5560; }
  </style>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono ink" font-size="11" font-weight="600" letter-spacing="0.18em">SCHÉMA 06</text>
  <text x="60" y="100" class="display ink" font-size="26" font-weight="600" letter-spacing="-0.01em">L'IA dans la chaîne narrative</text>
  <text x="60" y="128" class="display graphite" font-size="16" font-style="italic">Sept étapes, deux zones : ce que l'IA peut prendre (au-dessus) et ce qu'elle ne remplace pas — là où vit le risque.</text>

  <!-- Legend -->
  <g transform="translate(60, 168)">
    <rect x="0" y="0" width="14" height="14" fill="#1F5560" fill-opacity="0.55"/>
    <text x="22" y="11" class="body ink" font-size="11">Part menée par l'IA</text>
    <rect x="220" y="0" width="14" height="14" fill="#B7332C" fill-opacity="0.55"/>
    <text x="242" y="11" class="body ink" font-size="11">Part irréductiblement humaine</text>
    <text x="1100" y="11" class="body graphite" font-size="11" font-style="italic" text-anchor="end">Texte = risque dominant si l'IA déborde sur la zone humaine.</text>
  </g>

  <!-- Chart area -->
  <g>
    <!-- Faint top/bottom guides -->
    <line x1="70" y1="220" x2="1090" y2="220" stroke="#5A5A5A" stroke-width="0.4" stroke-dasharray="2 4" opacity="0.32"/>
    <line x1="70" y1="600" x2="1090" y2="600" stroke="#5A5A5A" stroke-width="0.4" stroke-dasharray="2 4" opacity="0.32"/>
    <!-- Midline (zero axis) -->
    <line x1="70" y1="425" x2="1090" y2="425" stroke="#1A1A1A" stroke-width="1.25"/>

    <!-- Step 1 — Cadrage : faible IA, forte zone humaine -->
    <g class="interactive" data-card="step-cadrage" tabindex="0" role="button" aria-label="Étape 1 — Cadrage">
      <rect x="70" y="385" width="120" height="40" fill="#1F5560" fill-opacity="0.55"/>
      <rect x="70" y="425" width="120" height="160" fill="#B7332C" fill-opacity="0.55"/>
      <text x="130" y="608" class="body graphite" font-size="9" text-anchor="middle" font-style="italic" letter-spacing="0.04em">RISQUE</text>
      <text x="130" y="624" class="body graphite" font-size="11" text-anchor="middle" font-style="italic">récit moyen</text>
      <text x="130" y="685" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">01</text>
      <text x="130" y="705" class="body ink" font-size="12" font-weight="500" text-anchor="middle">Cadrage</text>
      <text x="130" y="723" class="body graphite" font-size="10" text-anchor="middle">&amp; thèse</text>
    </g>

    <!-- Step 2 — Données : forte IA, faible zone humaine -->
    <g class="interactive" data-card="step-donnees" tabindex="0" role="button" aria-label="Étape 2 — Données">
      <rect x="220" y="255" width="120" height="170" fill="#1F5560" fill-opacity="0.55"/>
      <rect x="220" y="425" width="120" height="40" fill="#B7332C" fill-opacity="0.55"/>
      <text x="280" y="608" class="body graphite" font-size="9" text-anchor="middle" font-style="italic" letter-spacing="0.04em">RISQUE</text>
      <text x="280" y="624" class="body graphite" font-size="11" text-anchor="middle" font-style="italic">hallucination silencieuse</text>
      <text x="280" y="685" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">02</text>
      <text x="280" y="705" class="body ink" font-size="12" font-weight="500" text-anchor="middle">Données</text>
      <text x="280" y="723" class="body graphite" font-size="10" text-anchor="middle">collecte / clean</text>
    </g>

    <!-- Step 3 — Exploration : IA dominante avec curation -->
    <g class="interactive" data-card="step-exploration" tabindex="0" role="button" aria-label="Étape 3 — Exploration">
      <rect x="370" y="280" width="120" height="145" fill="#1F5560" fill-opacity="0.55"/>
      <rect x="370" y="425" width="120" height="60" fill="#B7332C" fill-opacity="0.55"/>
      <text x="430" y="608" class="body graphite" font-size="9" text-anchor="middle" font-style="italic" letter-spacing="0.04em">RISQUE</text>
      <text x="430" y="624" class="body graphite" font-size="11" text-anchor="middle" font-style="italic">confondre signal et bruit</text>
      <text x="430" y="685" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">03</text>
      <text x="430" y="705" class="body ink" font-size="12" font-weight="500" text-anchor="middle">Exploration</text>
      <text x="430" y="723" class="body graphite" font-size="10" text-anchor="middle">analytique</text>
    </g>

    <!-- Step 4 — Scénario : acte d'auteur (zone humaine la plus profonde) -->
    <g class="interactive" data-card="step-scenario" tabindex="0" role="button" aria-label="Étape 4 — Scénario">
      <rect x="520" y="395" width="120" height="30" fill="#1F5560" fill-opacity="0.55"/>
      <rect x="520" y="425" width="120" height="170" fill="#B7332C" fill-opacity="0.65"/>
      <text x="580" y="608" class="body graphite" font-size="9" text-anchor="middle" font-style="italic" letter-spacing="0.04em">RISQUE</text>
      <text x="580" y="624" class="body graphite" font-size="11" text-anchor="middle" font-style="italic">sur-structuration LLM</text>
      <text x="580" y="685" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">04</text>
      <text x="580" y="705" class="body ink" font-size="12" font-weight="600" text-anchor="middle">Scénario</text>
      <text x="580" y="723" class="body graphite" font-size="10" text-anchor="middle">acte d'auteur</text>
    </g>

    <!-- Step 5 — Production : équilibrée -->
    <g class="interactive" data-card="step-production" tabindex="0" role="button" aria-label="Étape 5 — Production">
      <rect x="670" y="315" width="120" height="110" fill="#1F5560" fill-opacity="0.55"/>
      <rect x="670" y="425" width="120" height="85" fill="#B7332C" fill-opacity="0.55"/>
      <text x="730" y="608" class="body graphite" font-size="9" text-anchor="middle" font-style="italic" letter-spacing="0.04em">RISQUE</text>
      <text x="730" y="624" class="body graphite" font-size="11" text-anchor="middle" font-style="italic">clichés visuels</text>
      <text x="730" y="685" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">05</text>
      <text x="730" y="705" class="body ink" font-size="12" font-weight="500" text-anchor="middle">Production</text>
      <text x="730" y="723" class="body graphite" font-size="10" text-anchor="middle">artefacts</text>
    </g>

    <!-- Step 6 — Intégration : IA dominante -->
    <g class="interactive" data-card="step-integration" tabindex="0" role="button" aria-label="Étape 6 — Intégration">
      <rect x="820" y="295" width="120" height="130" fill="#1F5560" fill-opacity="0.55"/>
      <rect x="820" y="425" width="120" height="65" fill="#B7332C" fill-opacity="0.55"/>
      <text x="880" y="608" class="body graphite" font-size="9" text-anchor="middle" font-style="italic" letter-spacing="0.04em">RISQUE</text>
      <text x="880" y="624" class="body graphite" font-size="11" text-anchor="middle" font-style="italic">mobile cassé</text>
      <text x="880" y="685" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">06</text>
      <text x="880" y="705" class="body ink" font-size="12" font-weight="500" text-anchor="middle">Intégration</text>
      <text x="880" y="723" class="body graphite" font-size="10" text-anchor="middle">interactive</text>
    </g>

    <!-- Step 7 — QA & publication : jugement humain -->
    <g class="interactive" data-card="step-qa" tabindex="0" role="button" aria-label="Étape 7 — QA et publication">
      <rect x="970" y="370" width="120" height="55" fill="#1F5560" fill-opacity="0.55"/>
      <rect x="970" y="425" width="120" height="140" fill="#B7332C" fill-opacity="0.55"/>
      <text x="1030" y="608" class="body graphite" font-size="9" text-anchor="middle" font-style="italic" letter-spacing="0.04em">RISQUE</text>
      <text x="1030" y="624" class="body graphite" font-size="11" text-anchor="middle" font-style="italic">effacement du POV</text>
      <text x="1030" y="685" class="mono ink" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">07</text>
      <text x="1030" y="705" class="body ink" font-size="12" font-weight="500" text-anchor="middle">QA &amp; publi.</text>
      <text x="1030" y="723" class="body graphite" font-size="10" text-anchor="middle">jugement final</text>
    </g>
  </g>

  <!-- Insight strip -->
  <g transform="translate(60, 758)">
    <line x1="0" y1="-8" x2="1080" y2="-8" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="0" y="6" class="body ink" font-size="12" font-weight="500">Régularité 2024–2026 :</text>
    <text x="148" y="6" class="body ink" font-size="12">l'IA augmente la productivité d'un facteur 2 à 5 sur les étapes industrielles ; elle ne crée pas la pointe éditoriale.</text>
  </g>

  <!-- Footer -->
  <text x="60" y="788" class="body graphite" font-size="10" font-style="italic">Source : observation pipelines NYT, FT, Reuters Graphics, The Pudding, Le Monde 2024–2026 ; arXiv 2503.02631 (Reflection on Data Storytelling Tools, 2025).</text>
</svg>
