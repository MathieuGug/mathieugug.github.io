<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-05" role="img" aria-label="Pipelines techniques : scrollytelling classique vs pipeline agentique IA-driven">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .ink   { fill: #1A1A1A; }
    .graphite { fill: #5A5A5A; }
    .carmine { fill: #B7332C; }
    .teal  { fill: #1F5560; }
  </style>
  <defs>
    <marker id="arrow5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono ink" font-size="11" font-weight="600" letter-spacing="0.18em">SCHÉMA 05</text>
  <text x="60" y="100" class="display ink" font-size="26" font-weight="600" letter-spacing="-0.01em">Deux architectures, une convergence</text>
  <text x="60" y="128" class="display graphite" font-size="16" font-style="italic">Le pipeline scrollytelling « classique » et le pipeline agentique IA-driven coexistent — la pratique 2026 les hybride.</text>

  <!-- Top — scrollytelling classique -->
  <text x="60" y="186" class="mono teal" font-size="11" font-weight="600" letter-spacing="0.16em">A · PIPELINE SCROLLYTELLING CLASSIQUE — humain au centre, outils dédiés</text>

  <g transform="translate(60, 210)">
    <g class="interactive" data-card="classic-data" tabindex="0" role="button" aria-label="Étape : données brutes">
      <rect x="0" y="0" width="160" height="80" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
      <text x="14" y="24" class="mono teal" font-size="9" font-weight="600" letter-spacing="0.1em">DONNÉES</text>
      <text x="14" y="46" class="body ink" font-size="12" font-weight="500">CSV / API / scraping</text>
      <text x="14" y="64" class="body graphite" font-size="11">Python, dbt, Pandas</text>
    </g>
    <line x1="172" y1="40" x2="218" y2="40" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arrow5)"/>

    <g class="interactive" data-card="classic-explore" tabindex="0" role="button" aria-label="Étape : exploration analytique">
      <rect x="225" y="0" width="160" height="80" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
      <text x="239" y="24" class="mono teal" font-size="9" font-weight="600" letter-spacing="0.1em">EXPLORATION</text>
      <text x="239" y="46" class="body ink" font-size="12" font-weight="500">Notebooks, Observable</text>
      <text x="239" y="64" class="body graphite" font-size="11">Tâche d'analyste</text>
    </g>
    <line x1="397" y1="40" x2="443" y2="40" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arrow5)"/>

    <g class="interactive" data-card="classic-script" tabindex="0" role="button" aria-label="Étape : scénarisation">
      <rect x="450" y="0" width="160" height="80" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
      <text x="464" y="24" class="mono teal" font-size="9" font-weight="600" letter-spacing="0.1em">SCÉNARIO</text>
      <text x="464" y="46" class="body ink" font-size="12" font-weight="500">Storyboard, sections</text>
      <text x="464" y="64" class="body graphite" font-size="11">Auteur · designer</text>
    </g>
    <line x1="622" y1="40" x2="668" y2="40" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arrow5)"/>

    <g class="interactive" data-card="classic-build" tabindex="0" role="button" aria-label="Étape : intégration scrollama + D3">
      <rect x="675" y="0" width="180" height="80" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
      <text x="689" y="24" class="mono teal" font-size="9" font-weight="600" letter-spacing="0.1em">BUILD</text>
      <text x="689" y="46" class="body ink" font-size="12" font-weight="500">scrollama + D3 + Svelte</text>
      <text x="689" y="64" class="body graphite" font-size="11">SVG, transitions, sticky</text>
    </g>
    <line x1="867" y1="40" x2="913" y2="40" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arrow5)"/>

    <g class="interactive" data-card="classic-publish" tabindex="0" role="button" aria-label="Étape : publication">
      <rect x="920" y="0" width="160" height="80" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
      <text x="934" y="24" class="mono teal" font-size="9" font-weight="600" letter-spacing="0.1em">PUBLICATION</text>
      <text x="934" y="46" class="body ink" font-size="12" font-weight="500">Statique, CDN, mobile</text>
      <text x="934" y="64" class="body graphite" font-size="11">QA accessibilité</text>
    </g>
  </g>

  <!-- Mid — separator -->
  <line x1="60" y1="370" x2="1140" y2="370" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- Bottom — pipeline agentique -->
  <text x="60" y="408" class="mono carmine" font-size="11" font-weight="600" letter-spacing="0.16em">B · PIPELINE AGENTIQUE IA-DRIVEN — orchestration LLM, génération assistée à chaque étape</text>

  <g transform="translate(60, 432)">
    <!-- Orchestrator at center top -->
    <g class="interactive" data-card="agent-orchestrator" tabindex="0" role="button" aria-label="Orchestrateur LLM">
      <rect x="420" y="0" width="240" height="60" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
      <text x="540" y="22" class="mono carmine" font-size="9" font-weight="600" letter-spacing="0.14em" text-anchor="middle">ORCHESTRATEUR LLM</text>
      <text x="540" y="44" class="body ink" font-size="12" font-weight="500" text-anchor="middle">Plan · délégation · contrôle</text>
    </g>

    <!-- 4 specialised agents below -->
    <g class="interactive" data-card="agent-data" tabindex="0" role="button" aria-label="Agent données">
      <rect x="20" y="130" width="200" height="80" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
      <text x="34" y="154" class="mono carmine" font-size="9" font-weight="600" letter-spacing="0.1em">AGENT 1 — DONNÉES</text>
      <text x="34" y="176" class="body ink" font-size="12" font-weight="500">Analyse &amp; insights</text>
      <text x="34" y="194" class="body graphite" font-size="11">Anomalies, tournants, trends</text>
    </g>

    <g class="interactive" data-card="agent-script" tabindex="0" role="button" aria-label="Agent scénario">
      <rect x="240" y="130" width="200" height="80" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
      <text x="254" y="154" class="mono carmine" font-size="9" font-weight="600" letter-spacing="0.1em">AGENT 2 — SCÉNARIO</text>
      <text x="254" y="176" class="body ink" font-size="12" font-weight="500">Séquence des insights</text>
      <text x="254" y="194" class="body graphite" font-size="11">Hook, corps, pointe</text>
    </g>

    <g class="interactive" data-card="agent-viz" tabindex="0" role="button" aria-label="Agent visualisation">
      <rect x="640" y="130" width="200" height="80" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
      <text x="654" y="154" class="mono carmine" font-size="9" font-weight="600" letter-spacing="0.1em">AGENT 3 — VISU</text>
      <text x="654" y="176" class="body ink" font-size="12" font-weight="500">Génération graphiques</text>
      <text x="654" y="194" class="body graphite" font-size="11">SVG · Vega-Lite · code D3</text>
    </g>

    <g class="interactive" data-card="agent-narration" tabindex="0" role="button" aria-label="Agent narration">
      <rect x="860" y="130" width="200" height="80" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
      <text x="874" y="154" class="mono carmine" font-size="9" font-weight="600" letter-spacing="0.1em">AGENT 4 — TEXTE</text>
      <text x="874" y="176" class="body ink" font-size="12" font-weight="500">Steps, captions, voix</text>
      <text x="874" y="194" class="body graphite" font-size="11">Synchronisation prose-visuel</text>
    </g>

    <!-- Connectors from orchestrator to agents -->
    <g stroke="#B7332C" stroke-width="0.75">
      <line x1="540" y1="60" x2="120" y2="130" marker-end="url(#arrow5)"/>
      <line x1="540" y1="60" x2="340" y2="130" marker-end="url(#arrow5)"/>
      <line x1="540" y1="60" x2="740" y2="130" marker-end="url(#arrow5)"/>
      <line x1="540" y1="60" x2="960" y2="130" marker-end="url(#arrow5)"/>
    </g>

    <!-- Human reviewer below -->
    <g class="interactive" data-card="human-reviewer" tabindex="0" role="button" aria-label="Réviseur humain">
      <rect x="380" y="240" width="320" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.5"/>
      <text x="540" y="264" class="mono ink" font-size="9" font-weight="600" letter-spacing="0.14em" text-anchor="middle">RÉVISEUR HUMAIN — ACTE D'AUTEUR FINAL</text>
      <text x="540" y="286" class="body ink" font-size="12" font-style="italic" text-anchor="middle">Thèse · rythme · registre · responsabilité</text>
    </g>

    <g stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3">
      <line x1="540" y1="210" x2="540" y2="240" marker-end="url(#arrow5)"/>
    </g>
  </g>

  <!-- Footer -->
  <line x1="60" y1="755" x2="1140" y2="755" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="775" class="body graphite" font-size="10" font-style="italic">Pipeline B inspiré de Shen et al., « From Data to Story », Gen4DS Workshop, IEEE VIS 2024.</text>
</svg>
