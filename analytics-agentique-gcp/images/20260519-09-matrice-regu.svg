<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 820" data-schema-id="schema-09" role="img" aria-labelledby="schema-09-title schema-09-desc">
  <title id="schema-09-title">Matrice contrainte régulaire × couche stack — banque française tier 1</title>
  <desc id="schema-09-desc">Cinq familles de contraintes (DORA, AI Act, EBA Outsourcing + ACPR, BCBS 239 + RGPD, souveraineté) projetées sur sept couches de la stack data agentique. Cellules : objets GCP qui répondent à l'obligation.</desc>

