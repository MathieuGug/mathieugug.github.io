<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 860" data-schema-id="schema-06" role="img" aria-labelledby="schema-06-title schema-06-desc">
  <title id="schema-06-title">Anatomie d'un data agent custom sur GCP</title>
  <desc id="schema-06-desc">Six couches verticales du warehouse au modèle, encadrées par deux sidebars — gouvernance à gauche (Tool Governance, Model Armor, DLP), observabilité à droite (BigQuery Agent Analytics). C'est le pattern de référence pour un agent custom métier sous Gemini Enterprise Agent Platform.</desc>

  <defs>
    <style>
      .display { font-family: 'Spectral', 'Source Serif Pro', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .interactive { cursor: pointer; outline: none; }
      .interactive:focus-visible > .layer-frame,
      .interactive:hover > .layer-frame { filter: brightness(0.97); }
    </style>
  </defs>

  <rect x="0" y="0" width="1300" height="860" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A">Anatomie d'un data agent custom sur GCP</text>
  <text x="60" y="120" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Six couches verticales, encadrées par gouvernance et observabilité.</text>

  <line x1="60" y1="148" x2="1240" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- ============ SIDEBAR GAUCHE — GOUVERNANCE ============ -->
  <g>
    <rect x="80" y="200" width="200" height="560" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="180" y="225" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.16em" text-anchor="middle">GOUVERNANCE</text>
    <text x="180" y="246" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">verticale, traverse les 6 couches</text>

    <line x1="100" y1="262" x2="260" y2="262" stroke="#B7332C" stroke-width="0.5"/>

    <g class="interactive" data-card="gov-tool-governance" tabindex="0" role="button" aria-label="Tool Governance">
      <rect x="100" y="280" width="160" height="60" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
      <text x="180" y="302" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Tool Governance</text>
      <text x="180" y="320" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">contrôle des appels</text>
      <text x="180" y="334" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">par scope · utilisateur</text>
    </g>

    <g class="interactive" data-card="gov-model-armor" tabindex="0" role="button" aria-label="Model Armor">
      <rect x="100" y="355" width="160" height="60" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
      <text x="180" y="377" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Model Armor</text>
      <text x="180" y="395" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">prompt injection · DLP</text>
      <text x="180" y="409" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">RAI · URL malveillantes</text>
    </g>

    <g class="interactive" data-card="gov-dlp" tabindex="0" role="button" aria-label="DLP / SDP">
      <rect x="100" y="430" width="160" height="60" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
      <text x="180" y="452" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">DLP / SDP</text>
      <text x="180" y="470" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">150+ infoTypes</text>
      <text x="180" y="484" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">détection · masking</text>
    </g>

    <g class="interactive" data-card="gov-vpc" tabindex="0" role="button" aria-label="VPC-SC / CMEK">
      <rect x="100" y="505" width="160" height="60" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
      <text x="180" y="527" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">VPC-SC · CMEK</text>
      <text x="180" y="545" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">périmètre · clés</text>
      <text x="180" y="559" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">contrôlées</text>
    </g>

    <text x="180" y="610" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">+ Assured Workloads EU</text>
    <text x="180" y="625" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">+ S3NS / Premi3NS</text>
    <text x="180" y="640" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">si OIV / haut risque</text>

    <text x="180" y="690" class="body" font-size="11" font-style="italic" fill="#B7332C" text-anchor="middle">→ §10 régu</text>
  </g>

  <!-- ============ COLONNE CENTRALE — 6 COUCHES VERTICALES ============ -->
  <!-- couches empilées : modèle (haut), agent runtime, ADK orchestration, MCP servers, semantic, warehouse (bas) -->

  <!-- COUCHE 6 — MODÈLE -->
  <g class="interactive" data-card="layer-model" tabindex="0" role="button" aria-label="Modèle">
    <rect class="layer-frame" x="320" y="200" width="640" height="80" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="640" y="225" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.16em" text-anchor="middle">COUCHE 6 · MODÈLE</text>
    <text x="640" y="248" class="display" font-size="18" font-weight="600" fill="#1A1A1A" text-anchor="middle">Gemini · Claude · Llama · Mistral · custom</text>
    <text x="640" y="268" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">200+ modèles disponibles via Gemini Enterprise Agent Platform — choix par cas d'usage</text>
  </g>

  <!-- COUCHE 5 — AGENT ENGINE -->
  <g class="interactive" data-card="layer-engine" tabindex="0" role="button" aria-label="Agent Engine">
    <rect class="layer-frame" x="320" y="295" width="640" height="70" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.25"/>
    <text x="640" y="320" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.16em" text-anchor="middle">COUCHE 5 · AGENT ENGINE</text>
    <text x="640" y="343" class="display" font-size="17" font-weight="600" fill="#1A1A1A" text-anchor="middle">Runtime managé · persistent memory · session state · scale</text>
  </g>

  <!-- COUCHE 4 — ADK ORCHESTRATION -->
  <g class="interactive" data-card="layer-adk" tabindex="0" role="button" aria-label="ADK orchestration">
    <rect class="layer-frame" x="320" y="380" width="640" height="80" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1.5"/>
    <text x="640" y="405" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.16em" text-anchor="middle">COUCHE 4 · ADK ORCHESTRATION</text>
    <text x="640" y="428" class="display" font-size="17" font-weight="600" fill="#1A1A1A" text-anchor="middle">Workflow agents · routing dynamique · multi-agent</text>
    <text x="640" y="448" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">Python · Go · Java · TypeScript — 7M+ downloads — open source</text>
  </g>

  <!-- COUCHE 3 — MCP SERVERS -->
  <g class="interactive" data-card="layer-mcp" tabindex="0" role="button" aria-label="MCP servers">
    <rect class="layer-frame" x="320" y="475" width="640" height="80" rx="3" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.25"/>
    <text x="640" y="500" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.16em" text-anchor="middle">COUCHE 3 · MCP SERVERS</text>
    <text x="640" y="523" class="display" font-size="17" font-weight="600" fill="#1A1A1A" text-anchor="middle">BQ MCP managed · Looker MCP · MCP banque internes</text>
    <text x="640" y="543" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">→ §7 — tissus connectif vers les systèmes métier</text>
  </g>

  <!-- COUCHE 2 — SEMANTIC LAYER -->
  <g class="interactive" data-card="layer-semantic" tabindex="0" role="button" aria-label="Semantic layer">
    <rect class="layer-frame" x="320" y="570" width="640" height="80" rx="3" fill="#2F5D3F" fill-opacity="0.12" stroke="#2F5D3F" stroke-width="2"/>
    <text x="640" y="595" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.16em" text-anchor="middle">COUCHE 2 · SEMANTIC LAYER · PIVOT</text>
    <text x="640" y="618" class="display" font-size="17" font-weight="600" fill="#1A1A1A" text-anchor="middle">Looker semantic model · ou Cube · ou dbt MetricFlow</text>
    <text x="640" y="638" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">→ §4 — la pièce qui décide</text>
  </g>

  <!-- COUCHE 1 — WAREHOUSE -->
  <g class="interactive" data-card="layer-warehouse" tabindex="0" role="button" aria-label="Warehouse">
    <rect class="layer-frame" x="320" y="665" width="640" height="80" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25"/>
    <text x="640" y="690" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.16em" text-anchor="middle">COUCHE 1 · WAREHOUSE</text>
    <text x="640" y="713" class="display" font-size="17" font-weight="600" fill="#1A1A1A" text-anchor="middle">BigQuery · BigLake · AlloyDB</text>
    <text x="640" y="733" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">Stockage colonnaire, scan-based, slots élastiques</text>
  </g>

  <!-- ============ SIDEBAR DROITE — OBSERVABILITÉ ============ -->
  <g>
    <rect x="1000" y="200" width="200" height="560" rx="3" fill="#2F5D3F" fill-opacity="0.05" stroke="#2F5D3F" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="1100" y="225" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.16em" text-anchor="middle">OBSERVABILITÉ</text>
    <text x="1100" y="246" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">verticale, traverse les 6 couches</text>

    <line x1="1020" y1="262" x2="1180" y2="262" stroke="#2F5D3F" stroke-width="0.5"/>

    <g class="interactive" data-card="obs-bq-analytics" tabindex="0" role="button" aria-label="BigQuery Agent Analytics">
      <rect x="1020" y="280" width="160" height="60" rx="2" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="1100" y="302" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">BQ Agent Analytics</text>
      <text x="1100" y="320" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">ADK plugin natif</text>
      <text x="1100" y="334" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">traces → tables BQ</text>
    </g>

    <g class="interactive" data-card="obs-otel" tabindex="0" role="button" aria-label="OpenTelemetry GenAI">
      <rect x="1020" y="355" width="160" height="60" rx="2" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="1100" y="377" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">OTel GenAI</text>
      <text x="1100" y="395" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">semantic conventions</text>
      <text x="1100" y="409" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">→ dossier observabilité</text>
    </g>

    <g class="interactive" data-card="obs-eval" tabindex="0" role="button" aria-label="Évaluation offline">
      <rect x="1020" y="430" width="160" height="60" rx="2" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="1100" y="452" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Eval offline</text>
      <text x="1100" y="470" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">ground-truth SQL</text>
      <text x="1100" y="484" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">+ LLM judge</text>
    </g>

    <g class="interactive" data-card="obs-cost" tabindex="0" role="button" aria-label="Cost drift">
      <rect x="1020" y="505" width="160" height="60" rx="2" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="0.75"/>
      <text x="1100" y="527" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Cost drift BQ</text>
      <text x="1100" y="545" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">scan size · slots</text>
      <text x="1100" y="559" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">INFORMATION_SCHEMA</text>
    </g>

    <text x="1100" y="610" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">Métriques data-spécifiques :</text>
    <text x="1100" y="625" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">query failure rate · halluc</text>
    <text x="1100" y="640" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">jointures · plausibilité insight</text>

    <text x="1100" y="690" class="body" font-size="11" font-style="italic" fill="#2F5D3F" text-anchor="middle">→ §8 observabilité</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="790" x2="1240" y2="790" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="818" class="body" font-size="13" font-style="italic" fill="#5A5A5A">« L'agent custom est une composition de six couches sur GCP — pas un appel d'API à un modèle. Le différenciateur est aux extrémités : semantic en bas, gouvernance et observabilité sur les côtés. »</text>
</svg>
