<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 820" data-schema-id="schema-07" role="img" aria-labelledby="schema-07-title schema-07-desc">
  <title id="schema-07-title">Topologie MCP banque interne — auth, scope, audit, isolation</title>
  <desc id="schema-07-desc">Un agent (Claude Code, Vertex Agent, app banque) parle à plusieurs MCP servers déployés sur Cloud Run (BigQuery managed, Looker, Dataform, KYC, AML, référentiel, lineage). Auth OAuth + PKCE par server, audit log OTel, isolation par service.</desc>

  <defs>
    <style>
      .display { font-family: 'Spectral', 'Source Serif Pro', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .interactive { cursor: pointer; outline: none; }
      .interactive:focus-visible > .node-frame,
      .interactive:hover > .node-frame { filter: brightness(0.96); }
    </style>
    <marker id="arr7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="820" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 07</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A">Topologie MCP banque interne</text>
  <text x="60" y="120" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Auth OAuth + PKCE, scope par tool, audit log OTel, isolation par service Cloud Run.</text>

  <line x1="60" y1="148" x2="1240" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- ============ TIER 1 — AGENTS CLIENTS (gauche) ============ -->
  <text x="170" y="205" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.14em" text-anchor="middle">AGENTS CLIENTS</text>

  <g class="interactive" data-card="agent-claude-code" tabindex="0" role="button" aria-label="Agent — Claude Code">
    <rect class="node-frame" x="80" y="230" width="180" height="56" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="170" y="252" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Claude Code</text>
    <text x="170" y="271" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">étage 3 — data expert</text>
  </g>

  <g class="interactive" data-card="agent-vertex" tabindex="0" role="button" aria-label="Agent — Vertex / ADK">
    <rect class="node-frame" x="80" y="305" width="180" height="56" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="170" y="327" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Vertex Agent / ADK</text>
    <text x="170" y="346" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">étage 4 — produit</text>
  </g>

  <g class="interactive" data-card="agent-app" tabindex="0" role="button" aria-label="Agent — App banque embedded">
    <rect class="node-frame" x="80" y="380" width="180" height="56" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="170" y="402" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">App banque embedded</text>
    <text x="170" y="421" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">portail conseiller / B2B</text>
  </g>

  <!-- Flèches vers MCP host -->
  <line x1="265" y1="258" x2="370" y2="335" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>
  <line x1="265" y1="333" x2="370" y2="350" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>
  <line x1="265" y1="408" x2="370" y2="365" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>

  <!-- ============ TIER 2 — MCP HOST ============ -->
  <text x="475" y="205" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.14em" text-anchor="middle">MCP HOST</text>

  <g class="interactive" data-card="mcp-host" tabindex="0" role="button" aria-label="MCP host orchestrateur">
    <rect class="node-frame" x="380" y="290" width="190" height="120" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1.5"/>
    <text x="475" y="315" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Orchestrateur</text>
    <text x="475" y="333" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">côté agent</text>

    <line x1="400" y1="346" x2="550" y2="346" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="475" y="365" class="mono" font-size="10" font-weight="600" fill="#B7332C" letter-spacing="0.12em" text-anchor="middle">AUTH + DISPATCH</text>
    <text x="475" y="381" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">OAuth 2.0 + PKCE</text>
    <text x="475" y="397" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">token court · scope par tool</text>
  </g>

  <!-- Flèches host → servers (fan-out) -->
  <line x1="575" y1="320" x2="700" y2="240" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>
  <line x1="575" y1="335" x2="700" y2="305" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>
  <line x1="575" y1="350" x2="700" y2="370" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>
  <line x1="575" y1="365" x2="700" y2="435" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>
  <line x1="575" y1="380" x2="700" y2="500" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>
  <line x1="575" y1="395" x2="700" y2="565" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>

  <!-- ============ TIER 3 — MCP SERVERS (Cloud Run) ============ -->
  <text x="790" y="205" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.14em" text-anchor="middle">MCP SERVERS · CLOUD RUN</text>

  <!-- 6 servers en colonne -->
  <g class="interactive" data-card="mcp-bq" tabindex="0" role="button" aria-label="BQ MCP managed">
    <rect class="node-frame" x="700" y="218" width="180" height="48" rx="3" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1"/>
    <text x="790" y="238" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">BigQuery MCP</text>
    <text x="790" y="256" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">fully managed (Google)</text>
  </g>

  <g class="interactive" data-card="mcp-semantic" tabindex="0" role="button" aria-label="MCP semantic (Looker)">
    <rect class="node-frame" x="700" y="283" width="180" height="48" rx="3" fill="#2F5D3F" fill-opacity="0.14" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="790" y="303" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">MCP semantic</text>
    <text x="790" y="321" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">façade Looker semantic</text>
  </g>

  <g class="interactive" data-card="mcp-lineage" tabindex="0" role="button" aria-label="MCP lineage (Dataplex)">
    <rect class="node-frame" x="700" y="348" width="180" height="48" rx="3" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-width="1.25"/>
    <text x="790" y="368" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">MCP lineage</text>
    <text x="790" y="386" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">façade Dataplex — BCBS 239</text>
  </g>

  <g class="interactive" data-card="mcp-ref" tabindex="0" role="button" aria-label="MCP référentiel">
    <rect class="node-frame" x="700" y="413" width="180" height="48" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1"/>
    <text x="790" y="433" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">MCP référentiel</text>
    <text x="790" y="451" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">catalogue produits, segments</text>
  </g>

  <g class="interactive" data-card="mcp-kyc" tabindex="0" role="button" aria-label="MCP KYC / AML">
    <rect class="node-frame" x="700" y="478" width="180" height="48" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1"/>
    <text x="790" y="498" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">MCP KYC / AML</text>
    <text x="790" y="516" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">colonnes sensibles maskées</text>
  </g>

  <g class="interactive" data-card="mcp-conformite" tabindex="0" role="button" aria-label="MCP conformité">
    <rect class="node-frame" x="700" y="543" width="180" height="48" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1"/>
    <text x="790" y="563" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">MCP conformité</text>
    <text x="790" y="581" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">règles d'accès par profil</text>
  </g>

  <!-- Flèches MCP servers → backends -->
  <line x1="885" y1="242" x2="990" y2="242" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>
  <line x1="885" y1="307" x2="990" y2="307" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>
  <line x1="885" y1="372" x2="990" y2="372" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>
  <line x1="885" y1="437" x2="990" y2="437" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>
  <line x1="885" y1="502" x2="990" y2="502" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>
  <line x1="885" y1="567" x2="990" y2="567" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr7)"/>

  <!-- ============ TIER 4 — BACKENDS ============ -->
  <text x="1085" y="205" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.14em" text-anchor="middle">BACKENDS</text>

  <rect x="990" y="218" width="170" height="48" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="0.75"/>
  <text x="1075" y="238" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">BigQuery</text>
  <text x="1075" y="256" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">datasets banque</text>

  <rect x="990" y="283" width="170" height="48" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="0.75"/>
  <text x="1075" y="303" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Looker</text>
  <text x="1075" y="321" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">semantic model</text>

  <rect x="990" y="348" width="170" height="48" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="0.75"/>
  <text x="1075" y="368" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Dataplex</text>
  <text x="1075" y="386" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">lineage + catalog</text>

  <rect x="990" y="413" width="170" height="48" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="0.75"/>
  <text x="1075" y="433" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">AlloyDB</text>
  <text x="1075" y="451" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">référentiels OLTP</text>

  <rect x="990" y="478" width="170" height="48" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="0.75"/>
  <text x="1075" y="498" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Service KYC interne</text>
  <text x="1075" y="516" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">via API</text>

  <rect x="990" y="543" width="170" height="48" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="0.75"/>
  <text x="1075" y="563" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Policy server</text>
  <text x="1075" y="581" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">règles RGPD/AI Act</text>

  <!-- ============ AUDIT LOG (BAS - traverse) ============ -->
  <g>
    <rect x="80" y="640" width="1080" height="60" rx="3" fill="#2F5D3F" fill-opacity="0.06" stroke="#2F5D3F" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="100" y="660" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em">AUDIT LOG OTEL — TRANSVERSAL</text>
    <text x="100" y="680" class="body" font-size="12" fill="#1A1A1A">Chaque appel MCP tracé : client, tool, arguments, réponse, latency. Compatible OTel GenAI semconv.</text>
    <text x="100" y="695" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Cloud Logging + BigQuery sink + Cloud Audit Logs. → §8 observabilité.</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="740" x2="1240" y2="740" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="768" class="body" font-size="13" font-style="italic" fill="#5A5A5A">« Isolation par service Cloud Run. Auth OAuth + PKCE par MCP server. Audit log OTel transversal.</text>
  <text x="60" y="786" class="body" font-size="13" font-style="italic" fill="#5A5A5A">Pour la surface d'attaque MCP (tool poisoning, prompt injection cross-server), voir le dossier mcp-plateforme. »</text>
</svg>
