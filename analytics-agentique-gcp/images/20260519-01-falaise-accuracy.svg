<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" data-schema-id="schema-01" role="img" aria-labelledby="schema-01-title schema-01-desc">
  <title id="schema-01-title">La falaise d'accuracy du NL→SQL</title>
  <desc id="schema-01-desc">Quatre paliers — Spider académique ~85 %, schéma enterprise raw 10-20 %, semantic documentation +17-23 points, semantic layer bien modélisé ~100 %. La pièce qui rattrape l'écart n'est pas le modèle, c'est le contexte sémantique.</desc>

  <defs>
    <style>
      .display { font-family: 'Spectral', 'Source Serif Pro', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .interactive { cursor: pointer; outline: none; }
      .interactive:focus-visible > .bar-frame,
      .interactive:hover > .bar-frame { filter: brightness(0.96); }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A">La falaise d'accuracy du NL→SQL</text>
  <text x="60" y="120" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Du benchmark académique au schéma enterprise raw, puis remontée par la documentation et le semantic layer.</text>

  <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- AXE Y -->
  <text x="80" y="200" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.12em">ACCURACY</text>
  <text x="80" y="216" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.12em">NL→SQL</text>

  <!-- Échelle 0-100% -->
  <line x1="140" y1="240" x2="140" y2="540" stroke="#1A1A1A" stroke-width="1.2"/>
  <line x1="140" y1="540" x2="1100" y2="540" stroke="#1A1A1A" stroke-width="1.2"/>

  <!-- Graduations Y -->
  <g>
    <line x1="135" y1="240" x2="140" y2="240" stroke="#1A1A1A" stroke-width="1"/>
    <text x="128" y="244" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">100 %</text>

    <line x1="135" y1="300" x2="140" y2="300" stroke="#1A1A1A" stroke-width="1"/>
    <text x="128" y="304" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">80</text>

    <line x1="135" y1="360" x2="140" y2="360" stroke="#1A1A1A" stroke-width="1"/>
    <text x="128" y="364" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">60</text>

    <line x1="135" y1="420" x2="140" y2="420" stroke="#1A1A1A" stroke-width="1"/>
    <text x="128" y="424" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">40</text>

    <line x1="135" y1="480" x2="140" y2="480" stroke="#1A1A1A" stroke-width="1"/>
    <text x="128" y="484" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">20</text>

    <line x1="135" y1="540" x2="140" y2="540" stroke="#1A1A1A" stroke-width="1"/>
    <text x="128" y="544" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">0</text>
  </g>

  <!-- Graduations dashées horizontales -->
  <line x1="140" y1="300" x2="1100" y2="300" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="140" y1="360" x2="1100" y2="360" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="140" y1="420" x2="1100" y2="420" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="140" y1="480" x2="1100" y2="480" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2,3"/>

  <!-- ============ PALIER 1 — Spider académique ~85% ============ -->
  <g class="interactive" data-card="palier-spider" tabindex="0" role="button" aria-label="Spider — benchmark académique">
    <rect class="bar-frame" x="200" y="285" width="160" height="255" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-width="1.5"/>
    <text x="280" y="270" class="mono" font-size="22" font-weight="600" fill="#1F5560" text-anchor="middle">85 %</text>
    <text x="280" y="568" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.14em" text-anchor="middle">PALIER 1</text>
    <text x="280" y="588" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Spider académique</text>
    <text x="280" y="606" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Schéma propre, peu de tables</text>
    <text x="280" y="622" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">EMNLP 2018, Yu et al.</text>
  </g>

  <!-- ============ PALIER 2 — Enterprise raw ~15% ============ -->
  <g class="interactive" data-card="palier-enterprise-raw" tabindex="0" role="button" aria-label="Enterprise schéma raw">
    <rect class="bar-frame" x="430" y="495" width="160" height="45" fill="#B7332C" fill-opacity="0.20" stroke="#B7332C" stroke-width="1.5"/>
    <text x="510" y="480" class="mono" font-size="22" font-weight="600" fill="#B7332C" text-anchor="middle">10-20 %</text>
    <text x="510" y="568" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.14em" text-anchor="middle">PALIER 2</text>
    <text x="510" y="588" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Enterprise « raw »</text>
    <text x="510" y="606" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Schéma réel, tables historisées</text>
    <text x="510" y="622" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Hallucinations de jointures</text>
  </g>

  <!-- Flèche descente entre 1 et 2 -->
  <line x1="370" y1="305" x2="425" y2="490" stroke="#B7332C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="395" y="395" class="body" font-size="11" font-style="italic" fill="#B7332C" text-anchor="middle">−65 à 70 pts</text>

  <!-- ============ PALIER 3 — +semantic doc ~68% ============ -->
  <g class="interactive" data-card="palier-semantic-doc" tabindex="0" role="button" aria-label="Schéma + documentation sémantique">
    <rect class="bar-frame" x="660" y="336" width="160" height="204" fill="#B58A2C" fill-opacity="0.18" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="740" y="321" class="mono" font-size="22" font-weight="600" fill="#B58A2C" text-anchor="middle">67-69 %</text>
    <text x="740" y="568" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.14em" text-anchor="middle">PALIER 3</text>
    <text x="740" y="588" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">+ Documentation sémantique</text>
    <text x="740" y="606" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Descriptions colonnes, relations</text>
    <text x="740" y="622" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">arxiv 2604.25149, +17-23 pts</text>
  </g>

  <!-- Flèche montée entre 2 et 3 -->
  <line x1="600" y1="490" x2="655" y2="345" stroke="#B58A2C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="635" y="395" class="body" font-size="11" font-style="italic" fill="#B58A2C" text-anchor="middle">+17 à 23 pts</text>

  <!-- ============ PALIER 4 — Semantic layer ~95% ============ -->
  <g class="interactive" data-card="palier-semantic-layer" tabindex="0" role="button" aria-label="Semantic layer bien modélisé">
    <rect class="bar-frame" x="890" y="255" width="160" height="285" fill="#2F5D3F" fill-opacity="0.18" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="970" y="240" class="mono" font-size="22" font-weight="600" fill="#2F5D3F" text-anchor="middle">~ 100 %</text>
    <text x="970" y="568" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em" text-anchor="middle">PALIER 4</text>
    <text x="970" y="588" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Semantic layer modélisé</text>
    <text x="970" y="606" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Métriques nommées comme tools</text>
    <text x="970" y="622" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Looker, dbt, Cube, Cortex</text>
  </g>

  <!-- Flèche montée entre 3 et 4 -->
  <line x1="830" y1="335" x2="885" y2="265" stroke="#2F5D3F" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="858" y="295" class="body" font-size="11" font-style="italic" fill="#2F5D3F" text-anchor="middle">+30 à 35 pts</text>

  <!-- ============ CALLOUT GARTNER 2028 ============ -->
  <g>
    <rect x="60" y="640" width="540" height="56" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <text x="76" y="660" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.14em">GARTNER 2028</text>
    <text x="76" y="681" class="body" font-size="12" fill="#1A1A1A">60 % des projets agentiques s'appuyant uniquement sur MCP,</text>
    <text x="76" y="697" class="body" font-size="12" fill="#1A1A1A">sans semantic layer, auront échoué.</text>
  </g>

  <!-- FOOTER -->
  <text x="1140" y="660" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="end">Sources : Spider (EMNLP 2018) · BIRD (arxiv 2305.03111) · arxiv 2604.25149 (2026) ·</text>
  <text x="1140" y="676" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="end">dbt Labs 2026 · VentureBeat headless vs native · Gartner via InformationDifference.</text>
</svg>
