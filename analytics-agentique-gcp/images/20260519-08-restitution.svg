<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 800" data-schema-id="schema-08" role="img" aria-labelledby="schema-08-title schema-08-desc">
  <title id="schema-08-title">Du dashboard fixe à l'expérience narrative générative</title>
  <desc id="schema-08-desc">Trois formats de restitution cohabitent en 2026. Dashboard fixe (audité, distribué, stable), dashboard conversationnel (chat embedded sur dashboard), expérience narrative générative (page d'analyse produite à la demande par un agent). Le watermarking distingue le signé du généré.</desc>

  <defs>
    <style>
      .display { font-family: 'Spectral', 'Source Serif Pro', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .interactive { cursor: pointer; outline: none; }
      .interactive:focus-visible > .format-frame,
      .interactive:hover > .format-frame { filter: brightness(0.97); }
    </style>
  </defs>

  <rect x="0" y="0" width="1300" height="800" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" fill="#a83e55" letter-spacing="0.18em">SCHÉMA 08</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" fill="#1e1e2a">Du dashboard fixe à l'expérience générative</text>
  <text x="60" y="120" class="display" font-size="16" font-style="italic" fill="#6b6f7c">Trois formats de restitution qui cohabitent. Le dashboard ne meurt pas — il devient un objet parmi trois.</text>

  <line x1="60" y1="148" x2="1240" y2="148" stroke="rgba(30,30,42,0.10)" stroke-width="1"/>

  <!-- ============ COLONNE 1 — DASHBOARD FIXE ============ -->
  <g class="interactive" data-card="format-fixe" tabindex="0" role="button" aria-label="Dashboard fixe">
    <rect class="format-frame" x="80" y="200" width="370" height="470" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.5"/>
    <text x="265" y="227" class="mono" font-size="12" font-weight="600" fill="#1F5560" letter-spacing="0.16em" text-anchor="middle">FORMAT 1 · LE SIGNÉ</text>
    <text x="265" y="258" class="display" font-size="22" font-weight="600" fill="#1e1e2a" text-anchor="middle">Dashboard fixe</text>
    <text x="265" y="280" class="body" font-size="13" font-style="italic" fill="#6b6f7c" text-anchor="middle">LookML versionné, Looker Studio Pro</text>

    <line x1="100" y1="295" x2="430" y2="295" stroke="#1F5560" stroke-width="0.5"/>

    <!-- mockup miniature dashboard fixe -->
    <rect x="120" y="315" width="290" height="125" rx="2" fill="#faf6ec" stroke="#1F5560" stroke-width="0.75"/>
    <text x="135" y="335" class="body" font-size="11" font-weight="600" fill="#1e1e2a">PNB par segment · T1 2026</text>
    <rect x="135" y="345" width="60" height="50" fill="#1F5560" fill-opacity="0.5"/>
    <rect x="200" y="355" width="60" height="40" fill="#1F5560" fill-opacity="0.4"/>
    <rect x="265" y="360" width="60" height="35" fill="#1F5560" fill-opacity="0.3"/>
    <rect x="330" y="370" width="60" height="25" fill="#1F5560" fill-opacity="0.25"/>
    <text x="135" y="415" class="body" font-size="10" fill="#6b6f7c">Détail · BP · BPR · BFI · BGI</text>
    <text x="135" y="430" class="body" font-size="10" fill="#6b6f7c">Mise à jour : quotidienne</text>

    <line x1="100" y1="460" x2="430" y2="460" stroke="#1F5560" stroke-width="0.3"/>

    <text x="100" y="485" class="body" font-size="12" font-weight="600" fill="#1e1e2a">Caractéristiques</text>

    <text x="115" y="508" class="body" font-size="11" fill="#1e1e2a">✓ Audité, signé, distribué</text>
    <text x="115" y="528" class="body" font-size="11" fill="#1e1e2a">✓ Reproductible — même chiffre demain</text>
    <text x="115" y="548" class="body" font-size="11" fill="#1e1e2a">✓ Versionné en git</text>
    <text x="115" y="568" class="body" font-size="11" fill="#1e1e2a">✓ Public cible : comités, distribution</text>
    <text x="115" y="588" class="body" font-size="11" fill="#6b6f7c">✗ Pas d'exploration en profondeur</text>
    <text x="115" y="608" class="body" font-size="11" fill="#6b6f7c">✗ Ne répond pas hors-périmètre</text>

    <text x="115" y="640" class="mono" font-size="10" font-weight="600" fill="#1F5560" letter-spacing="0.12em">USAGE BANQUE</text>
    <text x="115" y="656" class="body" font-size="11" fill="#1e1e2a">Reporting réglementaire · comités</text>
  </g>

  <!-- ============ COLONNE 2 — DASHBOARD CONVERSATIONNEL ============ -->
  <g class="interactive" data-card="format-conv" tabindex="0" role="button" aria-label="Dashboard conversationnel">
    <rect class="format-frame" x="465" y="200" width="370" height="470" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="650" y="227" class="mono" font-size="12" font-weight="600" fill="#B58A2C" letter-spacing="0.16em" text-anchor="middle">FORMAT 2 · LE HYBRIDE</text>
    <text x="650" y="258" class="display" font-size="22" font-weight="600" fill="#1e1e2a" text-anchor="middle">Dashboard conversationnel</text>
    <text x="650" y="280" class="body" font-size="13" font-style="italic" fill="#6b6f7c" text-anchor="middle">Conv Analytics embedded · Dashboard Agents</text>

    <line x1="485" y1="295" x2="815" y2="295" stroke="#B58A2C" stroke-width="0.5"/>

    <!-- mockup miniature dashboard + chat -->
    <rect x="505" y="315" width="200" height="125" rx="2" fill="#faf6ec" stroke="#B58A2C" stroke-width="0.75"/>
    <text x="520" y="335" class="body" font-size="11" font-weight="600" fill="#1e1e2a">PNB segment T1</text>
    <rect x="520" y="345" width="40" height="50" fill="#B58A2C" fill-opacity="0.5"/>
    <rect x="565" y="355" width="40" height="40" fill="#B58A2C" fill-opacity="0.4"/>
    <rect x="610" y="360" width="40" height="35" fill="#B58A2C" fill-opacity="0.3"/>
    <rect x="655" y="370" width="40" height="25" fill="#B58A2C" fill-opacity="0.25"/>

    <!-- mini chat panel à droite -->
    <rect x="720" y="315" width="95" height="125" rx="2" fill="#faf6ec" stroke="#B58A2C" stroke-width="0.75"/>
    <text x="729" y="333" class="mono" font-size="9" font-weight="600" fill="#B58A2C" letter-spacing="0.10em">CHAT</text>
    <rect x="729" y="343" width="78" height="20" rx="2" fill="#B58A2C" fill-opacity="0.15"/>
    <text x="734" y="356" class="body" font-size="8" fill="#1e1e2a">Pourquoi BFI ↓ ?</text>

    <rect x="729" y="370" width="78" height="34" rx="2" fill="#faf6ec" stroke="#B58A2C" stroke-width="0.3"/>
    <text x="734" y="383" class="body" font-size="8" fill="#1e1e2a">Marchés actions</text>
    <text x="734" y="394" class="body" font-size="8" fill="#1e1e2a">−12 %, prim. fixed</text>
    <text x="734" y="403" class="body" font-size="8" fill="#1e1e2a">income flat...</text>

    <line x1="485" y1="460" x2="815" y2="460" stroke="#B58A2C" stroke-width="0.3"/>

    <text x="485" y="485" class="body" font-size="12" font-weight="600" fill="#1e1e2a">Caractéristiques</text>

    <text x="500" y="508" class="body" font-size="11" fill="#1e1e2a">✓ Dashboard fixe en sous-jacent</text>
    <text x="500" y="528" class="body" font-size="11" fill="#1e1e2a">✓ Profondeur via chat sur métriques</text>
    <text x="500" y="548" class="body" font-size="11" fill="#1e1e2a">✓ Grounding semantic model</text>
    <text x="500" y="568" class="body" font-size="11" fill="#1e1e2a">✓ Audit du dashboard préservé</text>
    <text x="500" y="588" class="body" font-size="11" fill="#6b6f7c">⚠ Latence questions complexes</text>
    <text x="500" y="608" class="body" font-size="11" fill="#6b6f7c">⚠ Watermarking nécessaire</text>

    <text x="500" y="640" class="mono" font-size="10" font-weight="600" fill="#B58A2C" letter-spacing="0.12em">USAGE BANQUE</text>
    <text x="500" y="656" class="body" font-size="11" fill="#1e1e2a">Comités de pilotage · suivi opérationnel</text>
  </g>

  <!-- ============ COLONNE 3 — EXPÉRIENCE GÉNÉRATIVE ============ -->
  <g class="interactive" data-card="format-generative" tabindex="0" role="button" aria-label="Expérience narrative générative">
    <rect class="format-frame" x="850" y="200" width="370" height="470" rx="3" fill="#a83e55" fill-opacity="0.10" stroke="#a83e55" stroke-width="2"/>
    <text x="1035" y="227" class="mono" font-size="12" font-weight="600" fill="#a83e55" letter-spacing="0.16em" text-anchor="middle">FORMAT 3 · LE GÉNÉRÉ</text>
    <text x="1035" y="258" class="display" font-size="22" font-weight="600" fill="#1e1e2a" text-anchor="middle">Expérience narrative</text>
    <text x="1035" y="280" class="body" font-size="13" font-style="italic" fill="#6b6f7c" text-anchor="middle">Vertex Agent + generative UI à la demande</text>

    <line x1="870" y1="295" x2="1200" y2="295" stroke="#a83e55" stroke-width="0.5"/>

    <!-- mockup page narrative générée -->
    <rect x="890" y="315" width="290" height="125" rx="2" fill="#faf6ec" stroke="#a83e55" stroke-width="0.75"/>
    <text x="905" y="332" class="display" font-size="11" font-style="italic" fill="#1e1e2a">L'exposition sécheresse</text>
    <text x="905" y="345" class="body" font-size="9" fill="#6b6f7c">Réponse générée — questions du CRO</text>

    <!-- petite carte chaleur -->
    <rect x="905" y="352" width="80" height="60" fill="#a83e55" fill-opacity="0.18"/>
    <circle cx="930" cy="372" r="6" fill="#a83e55" fill-opacity="0.4"/>
    <circle cx="952" cy="385" r="8" fill="#a83e55" fill-opacity="0.5"/>
    <circle cx="970" cy="395" r="5" fill="#a83e55" fill-opacity="0.3"/>

    <text x="998" y="365" class="body" font-size="9" fill="#1e1e2a">Portefeuille immo</text>
    <text x="998" y="378" class="body" font-size="9" fill="#1e1e2a">locatif zones risque</text>
    <text x="998" y="391" class="body" font-size="9" fill="#1e1e2a">→ ≈ 8 % encours</text>
    <text x="998" y="404" class="body" font-size="9" fill="#6b6f7c">cf. lineage exposé</text>

    <text x="905" y="430" class="body" font-size="9" font-style="italic" fill="#6b6f7c">Généré à la demande · watermark visible</text>

    <line x1="870" y1="460" x2="1200" y2="460" stroke="#a83e55" stroke-width="0.3"/>

    <text x="870" y="485" class="body" font-size="12" font-weight="600" fill="#1e1e2a">Caractéristiques</text>

    <text x="885" y="508" class="body" font-size="11" fill="#1e1e2a">✓ Sur-mesure pour 1 question</text>
    <text x="885" y="528" class="body" font-size="11" fill="#1e1e2a">✓ Combine données internes / externes</text>
    <text x="885" y="548" class="body" font-size="11" fill="#1e1e2a">✓ Lineage exposé en un clic</text>
    <text x="885" y="568" class="body" font-size="11" fill="#1e1e2a">✓ Generative UI · agent ADK</text>
    <text x="885" y="588" class="body" font-size="11" fill="#6b6f7c">⚠ Non-reproductible exact</text>
    <text x="885" y="608" class="body" font-size="11" fill="#6b6f7c">⚠ Watermarking obligatoire</text>

    <text x="885" y="640" class="mono" font-size="10" font-weight="600" fill="#a83e55" letter-spacing="0.12em">USAGE BANQUE</text>
    <text x="885" y="656" class="body" font-size="11" fill="#1e1e2a">Comité CRO/CFO · portail client B2B</text>
  </g>

  <!-- ============ NOTE TRANSVERSE ============ -->
  <g>
    <rect x="80" y="700" width="1140" height="50" rx="3" fill="#faf6ec" stroke="#1e1e2a" stroke-width="0.75"/>
    <text x="100" y="720" class="mono" font-size="11" font-weight="600" fill="#1e1e2a" letter-spacing="0.14em">PRÉ-REQUIS COMMUN AUX TROIS FORMATS</text>
    <text x="100" y="740" class="body" font-size="12" fill="#1e1e2a">Semantic layer gouverné (§4) · lineage exposable · watermarking visuel pour distinguer signé / conversationnel / généré. Sans ces trois pièces, les formats divergent et l'audit s'effondre.</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="770" x2="1240" y2="770" stroke="rgba(30,30,42,0.10)" stroke-width="1"/>
</svg>
