<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 1188" data-schema-id="schema-00" role="img" aria-labelledby="schema-00-title schema-00-desc">
  <title id="schema-00-title">Exec sum visuelle — IA pour la data sur GCP, 5 messages-clés</title>
  <desc id="schema-00-desc">Infographie A4 portrait. Cinq messages condensés : effondrement du NL→SQL brut rattrapé par le semantic layer, trois surfaces agentiques sur GCP, alignement du marché en dix-huit mois, double étage de contrainte bancaire (DORA + AI Act), asymétrie d'investissement 70/20/10.</desc>

  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="840" height="1188" fill="#faf6ec"/>

  <!-- ============ HEADER ============ -->
  <text x="60" y="56" class="mono" font-size="12" font-weight="600" fill="#a83e55" letter-spacing="0.20em">IA POUR LA DATA · GCP — 19 MAI 2026</text>
  <text x="60" y="100" class="display" font-size="34" font-weight="600" fill="#1e1e2a">Cinq messages-clés à retenir</text>
  <text x="60" y="128" class="display" font-size="16" font-style="italic" fill="#6b6f7c">Trois surfaces agentiques. Un pivot : le semantic layer décide, pas le modèle.</text>

  <line x1="60" y1="152" x2="780" y2="152" stroke="rgba(30,30,42,0.16)" stroke-width="1"/>

  <!-- ============ MSG 1 — La falaise NL→SQL ============ -->
  <g>
    <!-- Numéro -->
    <circle cx="84" cy="200" r="20" fill="none" stroke="#a83e55" stroke-width="1.5"/>
    <text x="84" y="207" class="mono" font-size="15" font-weight="600" fill="#a83e55" text-anchor="middle">01</text>

    <!-- Titre -->
    <text x="120" y="195" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">LA FALAISE</text>
    <text x="120" y="216" class="display" font-size="20" font-weight="600" fill="#1e1e2a">Le NL→SQL « brut » s'effondre en production.</text>

    <!-- Quatre paliers en mini-bar -->
    <g transform="translate(160, 248)">
      <!-- Y-axis : graduations 0 / 50 / 100 % accuracy -->
      <text x="-8" y="36" class="mono" font-size="9" fill="#9a9ca5" text-anchor="end">100</text>
      <text x="-8" y="76" class="mono" font-size="9" fill="#9a9ca5" text-anchor="end">50</text>
      <text x="-8" y="116" class="mono" font-size="9" fill="#9a9ca5" text-anchor="end">0</text>
      <text x="-32" y="78" class="mono" font-size="9" font-weight="600" fill="#6b6f7c" letter-spacing="0.14em" text-anchor="middle" transform="rotate(-90, -32, 78)">ACCURACY %</text>

      <!-- Axe Y vertical -->
      <line x1="0" y1="32" x2="0" y2="112" stroke="#1e1e2a" stroke-width="0.75"/>
      <!-- Tick marks Y -->
      <line x1="-3" y1="32"  x2="0" y2="32"  stroke="#1e1e2a" stroke-width="0.75"/>
      <line x1="-3" y1="72"  x2="0" y2="72"  stroke="#1e1e2a" stroke-width="0.75"/>
      <line x1="-3" y1="112" x2="0" y2="112" stroke="#1e1e2a" stroke-width="0.75"/>
      <!-- Gridlines horizontales -->
      <line x1="0" y1="32"  x2="565" y2="32"  stroke="rgba(30,30,42,0.12)" stroke-width="0.5" stroke-dasharray="2,3"/>
      <line x1="0" y1="72"  x2="565" y2="72"  stroke="rgba(30,30,42,0.10)" stroke-width="0.5" stroke-dasharray="2,3"/>
      <line x1="0" y1="112" x2="565" y2="112" stroke="#1e1e2a" stroke-width="0.75"/>

      <!-- Spider 85% : top à y=32+(100-85)/100*80=44 -->
      <rect x="0" y="44" width="100" height="68" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="1"/>
      <text x="50" y="34" class="mono" font-size="20" font-weight="600" fill="#1F5560" text-anchor="middle">85 %</text>
      <text x="50" y="128" class="body" font-size="10.5" fill="#6b6f7c" text-anchor="middle">Spider</text>
      <text x="50" y="142" class="body" font-size="10.5" fill="#6b6f7c" text-anchor="middle">académique</text>

      <!-- Enterprise raw 10-20% : top à y=32+(100-15)/100*80=100 (midpoint 15%) -->
      <rect x="155" y="100" width="100" height="12" fill="#a83e55" fill-opacity="0.22" stroke="#a83e55" stroke-width="1"/>
      <text x="205" y="90" class="mono" font-size="20" font-weight="600" fill="#a83e55" text-anchor="middle">10-20 %</text>
      <text x="205" y="128" class="body" font-size="10.5" fill="#6b6f7c" text-anchor="middle">Enterprise</text>
      <text x="205" y="142" class="body" font-size="10.5" fill="#6b6f7c" text-anchor="middle">« raw »</text>

      <!-- +doc sémantique 67-69% : top à y=32+(100-68)/100*80=57.6 → 58 -->
      <rect x="310" y="58" width="100" height="54" fill="#B58A2C" fill-opacity="0.20" stroke="#B58A2C" stroke-width="1"/>
      <text x="360" y="48" class="mono" font-size="20" font-weight="600" fill="#B58A2C" text-anchor="middle">67-69 %</text>
      <text x="360" y="128" class="body" font-size="10.5" fill="#6b6f7c" text-anchor="middle">+ documentation</text>
      <text x="360" y="142" class="body" font-size="10.5" fill="#6b6f7c" text-anchor="middle">sémantique</text>

      <!-- Semantic layer ~100% : top à y=32 -->
      <rect x="465" y="32" width="100" height="80" fill="#2F5D3F" fill-opacity="0.20" stroke="#2F5D3F" stroke-width="1.5"/>
      <text x="515" y="22" class="mono" font-size="20" font-weight="600" fill="#2F5D3F" text-anchor="middle">~ 100 %</text>
      <text x="515" y="128" class="body" font-size="10.5" fill="#6b6f7c" text-anchor="middle">Semantic layer</text>
      <text x="515" y="142" class="body" font-size="10.5" fill="#6b6f7c" text-anchor="middle">modélisé</text>
    </g>

    <!-- Encart Gartner -->
    <g transform="translate(120, 408)">
      <rect x="0" y="0" width="660" height="42" fill="#faf6ec" stroke="#a83e55" stroke-width="0.75"/>
      <text x="14" y="20" class="mono" font-size="10" font-weight="600" fill="#a83e55" letter-spacing="0.14em">GARTNER 2028</text>
      <text x="14" y="35" class="body" font-size="11.5" fill="#1e1e2a">60 % des projets agentiques s'appuyant uniquement sur MCP, sans semantic layer, auront échoué.</text>
    </g>
  </g>

  <!-- ============ MSG 2 — Trois surfaces agentiques sur GCP ============ -->
  <g>
    <line x1="60" y1="478" x2="780" y2="478" stroke="rgba(30,30,42,0.10)" stroke-width="0.75" stroke-dasharray="3,4"/>

    <circle cx="84" cy="514" r="20" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="84" y="521" class="mono" font-size="15" font-weight="600" fill="#1F5560" text-anchor="middle">02</text>

    <text x="120" y="509" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.14em">TROIS SURFACES</text>
    <text x="120" y="530" class="display" font-size="20" font-weight="600" fill="#1e1e2a">Trois surfaces agentiques sur GCP, aujourd'hui.</text>

    <g transform="translate(120, 552)">
      <!-- Surface 1 — Conv Analytics -->
      <rect x="0" y="0" width="210" height="100" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25" rx="2"/>
      <text x="105" y="24" class="mono" font-size="10" font-weight="600" fill="#1F5560" letter-spacing="0.14em" text-anchor="middle">SURFACE A</text>
      <text x="105" y="48" class="display" font-size="15" font-weight="600" fill="#1e1e2a" text-anchor="middle">Conversational</text>
      <text x="105" y="65" class="display" font-size="15" font-weight="600" fill="#1e1e2a" text-anchor="middle">analytics</text>
      <text x="105" y="84" class="body" font-size="10.5" font-style="italic" fill="#6b6f7c" text-anchor="middle">Looker + BQ Data Canvas</text>
      <text x="105" y="97" class="body" font-size="10.5" font-style="italic" fill="#6b6f7c" text-anchor="middle">Conv Analytics API</text>

      <!-- Surface 2 — Agents custom -->
      <rect x="225" y="0" width="210" height="100" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25" rx="2"/>
      <text x="330" y="24" class="mono" font-size="10" font-weight="600" fill="#B58A2C" letter-spacing="0.14em" text-anchor="middle">SURFACE B</text>
      <text x="330" y="48" class="display" font-size="15" font-weight="600" fill="#1e1e2a" text-anchor="middle">Agents</text>
      <text x="330" y="65" class="display" font-size="15" font-weight="600" fill="#1e1e2a" text-anchor="middle">custom</text>
      <text x="330" y="84" class="body" font-size="10.5" font-style="italic" fill="#6b6f7c" text-anchor="middle">Gemini Enterprise</text>
      <text x="330" y="97" class="body" font-size="10.5" font-style="italic" fill="#6b6f7c" text-anchor="middle">Agent Platform · ADK</text>

      <!-- Surface 3 — MCP -->
      <rect x="450" y="0" width="210" height="100" fill="#a83e55" fill-opacity="0.08" stroke="#a83e55" stroke-width="1.25" rx="2"/>
      <text x="555" y="24" class="mono" font-size="10" font-weight="600" fill="#a83e55" letter-spacing="0.14em" text-anchor="middle">SURFACE C</text>
      <text x="555" y="48" class="display" font-size="15" font-weight="600" fill="#1e1e2a" text-anchor="middle">MCP &amp;</text>
      <text x="555" y="65" class="display" font-size="15" font-weight="600" fill="#1e1e2a" text-anchor="middle">connecteurs</text>
      <text x="555" y="84" class="body" font-size="10.5" font-style="italic" fill="#6b6f7c" text-anchor="middle">BQ MCP managed</text>
      <text x="555" y="97" class="body" font-size="10.5" font-style="italic" fill="#6b6f7c" text-anchor="middle">+ MCP banque Cloud Run</text>
    </g>

    <text x="120" y="676" class="body" font-size="11.5" font-style="italic" fill="#6b6f7c">Trois surfaces qui traversent les étages d'usage. Le semantic layer est leur pivot transverse.</text>
  </g>

  <!-- ============ MSG 3 — Marché aligné ============ -->
  <g>
    <line x1="60" y1="704" x2="780" y2="704" stroke="rgba(30,30,42,0.10)" stroke-width="0.75" stroke-dasharray="3,4"/>

    <circle cx="84" cy="740" r="20" fill="none" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="84" y="747" class="mono" font-size="15" font-weight="600" fill="#2F5D3F" text-anchor="middle">03</text>

    <text x="120" y="735" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em">CONVERGENCE</text>
    <text x="120" y="756" class="display" font-size="20" font-weight="600" fill="#1e1e2a">Le marché s'est aligné en dix-huit mois.</text>

    <g transform="translate(120, 776)">
      <text x="0" y="14" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600" fill="#2F5D3F">Snowflake</tspan> · Cortex Analyst, Cortex Agents, Cortex Code, AI Guardrails GA mai 2026.</text>
      <text x="0" y="36" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600" fill="#2F5D3F">Databricks</tspan> · Genie, Agent Bricks.</text>
      <text x="0" y="58" class="body" font-size="12" fill="#1e1e2a"><tspan font-weight="600" fill="#2F5D3F">Microsoft Fabric</tspan> · Copilot, Data Agents consommables via MCP.</text>
      <text x="0" y="84" class="body" font-size="11.5" font-style="italic" fill="#6b6f7c">Différenciateur 2026 : pas le modèle — le semantic, l'observabilité native, la stratégie MCP.</text>
    </g>
  </g>

  <!-- ============ MSG 4 — Banque · contraintes ============ -->
  <g>
    <line x1="60" y1="890" x2="780" y2="890" stroke="rgba(30,30,42,0.10)" stroke-width="0.75" stroke-dasharray="3,4"/>

    <circle cx="84" cy="926" r="20" fill="none" stroke="#a83e55" stroke-width="1.5"/>
    <text x="84" y="933" class="mono" font-size="15" font-weight="600" fill="#a83e55" text-anchor="middle">04</text>

    <text x="120" y="921" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">DEUX ÉTAGES BANQUE</text>
    <text x="120" y="942" class="display" font-size="20" font-weight="600" fill="#1e1e2a">Régulation et souveraineté en surplus.</text>

    <g transform="translate(120, 960)">
      <!-- 6 badges constraints -->
      <g>
        <rect x="0" y="0" width="105" height="34" fill="#faf6ec" stroke="#a83e55" stroke-width="1" rx="2"/>
        <text x="52" y="15" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" letter-spacing="0.12em" text-anchor="middle">DORA</text>
        <text x="52" y="28" class="body" font-size="9.5" fill="#6b6f7c" text-anchor="middle">Google = CTPP</text>
      </g>
      <g>
        <rect x="115" y="0" width="105" height="34" fill="#faf6ec" stroke="#a83e55" stroke-width="1.5" rx="2"/>
        <text x="167" y="15" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" letter-spacing="0.12em" text-anchor="middle">AI ACT</text>
        <text x="167" y="28" class="body" font-size="9.5" fill="#6b6f7c" text-anchor="middle">deadline 2 août</text>
      </g>
      <g>
        <rect x="230" y="0" width="105" height="34" fill="#faf6ec" stroke="#a83e55" stroke-width="1" rx="2"/>
        <text x="282" y="15" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" letter-spacing="0.12em" text-anchor="middle">EBA</text>
        <text x="282" y="28" class="body" font-size="9.5" fill="#6b6f7c" text-anchor="middle">outsourcing cloud</text>
      </g>
      <g>
        <rect x="345" y="0" width="105" height="34" fill="#faf6ec" stroke="#a83e55" stroke-width="1" rx="2"/>
        <text x="397" y="15" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" letter-spacing="0.12em" text-anchor="middle">BCBS 239</text>
        <text x="397" y="28" class="body" font-size="9.5" fill="#6b6f7c" text-anchor="middle">data lineage</text>
      </g>
      <g>
        <rect x="460" y="0" width="105" height="34" fill="#faf6ec" stroke="#a83e55" stroke-width="1" rx="2"/>
        <text x="512" y="15" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" letter-spacing="0.12em" text-anchor="middle">ACPR</text>
        <text x="512" y="28" class="body" font-size="9.5" fill="#6b6f7c" text-anchor="middle">supervision IA</text>
      </g>
      <g>
        <rect x="575" y="0" width="105" height="34" fill="#faf6ec" stroke="#a83e55" stroke-width="1" rx="2"/>
        <text x="627" y="15" class="mono" font-size="9.5" font-weight="600" fill="#a83e55" letter-spacing="0.12em" text-anchor="middle">SOUVERAINETÉ</text>
        <text x="627" y="28" class="body" font-size="8" fill="#6b6f7c" text-anchor="middle">Assured EU · S3NS</text>
      </g>
    </g>

    <text x="120" y="1020" class="body" font-size="11.5" font-style="italic" fill="#6b6f7c">2 août 2026 — échéance haut-risque AI Act. Le scoring crédit y bascule.</text>
  </g>

  <!-- ============ MSG 5 — Asymétrie 70/20/10 ============ -->
  <g>
    <line x1="60" y1="1042" x2="780" y2="1042" stroke="rgba(30,30,42,0.10)" stroke-width="0.75" stroke-dasharray="3,4"/>

    <circle cx="84" cy="1078" r="20" fill="none" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="84" y="1085" class="mono" font-size="15" font-weight="600" fill="#B58A2C" text-anchor="middle">05</text>

    <text x="120" y="1073" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.14em">L'ASYMÉTRIE 70 / 20 / 10</text>
    <text x="120" y="1094" class="display" font-size="20" font-weight="600" fill="#1e1e2a">Où mettre le budget agentique data.</text>

    <!-- Bar 70/20/10 -->
    <g transform="translate(120, 1108)">
      <!-- 70% Socle -->
      <rect x="0" y="0" width="462" height="32" fill="#2F5D3F" fill-opacity="0.18" stroke="#2F5D3F" stroke-width="1"/>
      <text x="231" y="20" class="mono" font-size="13" font-weight="600" fill="#2F5D3F" text-anchor="middle">70 % · SOCLE</text>

      <!-- 20% Agent -->
      <rect x="462" y="0" width="132" height="32" fill="#B58A2C" fill-opacity="0.20" stroke="#B58A2C" stroke-width="1"/>
      <text x="528" y="20" class="mono" font-size="11" font-weight="600" fill="#B58A2C" text-anchor="middle">20 % · AGENT</text>

      <!-- 10% LLM -->
      <rect x="594" y="0" width="66" height="32" fill="#a83e55" fill-opacity="0.20" stroke="#a83e55" stroke-width="1"/>
      <text x="627" y="20" class="mono" font-size="10" font-weight="600" fill="#a83e55" text-anchor="middle">10 % · LLM</text>

      <text x="0" y="50" class="body" font-size="10.5" fill="#6b6f7c">semantic, lineage, observabilité, DLP, eval</text>
      <text x="528" y="50" class="body" font-size="10.5" fill="#6b6f7c" text-anchor="middle">orchestration, MCP</text>
      <text x="627" y="50" class="body" font-size="10.5" fill="#6b6f7c" text-anchor="middle">modèle</text>
    </g>
  </g>

  <!-- ============ FOOTER ============ -->
  <line x1="60" y1="1170" x2="780" y2="1170" stroke="rgba(30,30,42,0.16)" stroke-width="1"/>
</svg>
