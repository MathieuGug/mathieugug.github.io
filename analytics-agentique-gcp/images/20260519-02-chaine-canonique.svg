<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" data-schema-id="schema-02" role="img" aria-labelledby="schema-02-title schema-02-desc">
  <title id="schema-02-title">Chaîne data canonique sur GCP</title>
  <desc id="schema-02-desc">Cinq couches — ingestion, warehouse, transformation, sémantique et serving, restitution — traversées verticalement par le lineage Dataplex. C'est la base sur laquelle s'ajoutent les surfaces agentiques.</desc>

  <defs>
    <style>
      .display { font-family: 'Spectral', 'Source Serif Pro', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .interactive { cursor: pointer; outline: none; }
      .interactive:focus-visible > .layer-frame,
      .interactive:hover > .layer-frame { filter: brightness(0.97); }
    </style>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6f7c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" fill="#a83e55" letter-spacing="0.18em">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" fill="#1e1e2a">Chaîne data canonique sur GCP — avant agents</text>
  <text x="60" y="120" class="display" font-size="16" font-style="italic" fill="#6b6f7c">Cinq couches qui structurent le quotidien de la donnée. Le lineage Dataplex les traverse verticalement.</text>

  <line x1="60" y1="148" x2="1140" y2="148" stroke="rgba(30,30,42,0.10)" stroke-width="1"/>

  <!-- Layers : 5 colonnes de 200px de large, espacées de 20px -->
  <!-- x positions : 80, 300, 520, 740, 960 -->
  <!-- ============ COUCHE 1 — INGESTION ============ -->
  <g class="interactive" data-card="couche-ingestion" tabindex="0" role="button" aria-label="Couche ingestion">
    <rect class="layer-frame" x="80" y="200" width="200" height="340" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.5"/>
    <text x="180" y="230" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.16em" text-anchor="middle">COUCHE 1</text>
    <text x="180" y="258" class="display" font-size="18" font-weight="600" fill="#1e1e2a" text-anchor="middle">Ingestion</text>
    <text x="180" y="278" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">Streaming · CDC · Batch</text>

    <line x1="100" y1="294" x2="260" y2="294" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="180" y="320" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Pub/Sub</text>
    <text x="180" y="338" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">événementiel</text>

    <text x="180" y="370" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Datastream</text>
    <text x="180" y="388" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">CDC OLTP→BQ</text>

    <text x="180" y="420" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Storage Transfer</text>
    <text x="180" y="438" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">batch externes</text>

    <text x="180" y="470" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">BigLake</text>
    <text x="180" y="488" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">lac externe</text>
  </g>

  <line x1="285" y1="370" x2="296" y2="370" stroke="#6b6f7c" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- ============ COUCHE 2 — WAREHOUSE ============ -->
  <g class="interactive" data-card="couche-warehouse" tabindex="0" role="button" aria-label="Couche warehouse">
    <rect class="layer-frame" x="300" y="200" width="200" height="340" rx="3" fill="#a83e55" fill-opacity="0.08" stroke="#a83e55" stroke-width="1.5"/>
    <text x="400" y="230" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.16em" text-anchor="middle">COUCHE 2</text>
    <text x="400" y="258" class="display" font-size="18" font-weight="600" fill="#1e1e2a" text-anchor="middle">Warehouse</text>
    <text x="400" y="278" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">Stockage colonnaire</text>

    <line x1="320" y1="294" x2="480" y2="294" stroke="#a83e55" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="400" y="325" class="display" font-size="20" font-weight="600" fill="#a83e55" text-anchor="middle">BigQuery</text>
    <text x="400" y="345" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">storage / compute découplés</text>
    <text x="400" y="361" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">scan-based, slots élastiques</text>

    <line x1="340" y1="385" x2="460" y2="385" stroke="#a83e55" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="400" y="410" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">AlloyDB</text>
    <text x="400" y="428" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">OLTP transactionnel</text>

    <text x="400" y="460" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Cloud Storage</text>
    <text x="400" y="478" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">données froides / sources</text>
  </g>

  <line x1="505" y1="370" x2="516" y2="370" stroke="#6b6f7c" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- ============ COUCHE 3 — TRANSFORMATION ============ -->
  <g class="interactive" data-card="couche-transform" tabindex="0" role="button" aria-label="Couche transformation">
    <rect class="layer-frame" x="520" y="200" width="200" height="340" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="620" y="230" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.16em" text-anchor="middle">COUCHE 3</text>
    <text x="620" y="258" class="display" font-size="18" font-weight="600" fill="#1e1e2a" text-anchor="middle">Transformation</text>
    <text x="620" y="278" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">SQL géré · Streaming</text>

    <line x1="540" y1="294" x2="700" y2="294" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="620" y="320" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Dataform</text>
    <text x="620" y="338" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">SQLX versionné, héritier dbt</text>

    <text x="620" y="370" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Dataflow</text>
    <text x="620" y="388" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">streaming + batch</text>

    <text x="620" y="420" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">BQ DataFrames</text>
    <text x="620" y="438" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">Python sur BQ</text>

    <text x="620" y="470" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Cloud Composer</text>
    <text x="620" y="488" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">Airflow managé</text>
  </g>

  <line x1="725" y1="370" x2="736" y2="370" stroke="#6b6f7c" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- ============ COUCHE 4 — SÉMANTIQUE & SERVING ============ -->
  <g class="interactive" data-card="couche-semantique" tabindex="0" role="button" aria-label="Couche sémantique et serving">
    <rect class="layer-frame" x="740" y="200" width="200" height="340" rx="3" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-width="2"/>
    <text x="840" y="230" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.16em" text-anchor="middle">COUCHE 4 · PIVOT</text>
    <text x="840" y="258" class="display" font-size="18" font-weight="600" fill="#1e1e2a" text-anchor="middle">Sémantique</text>
    <text x="840" y="278" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">Métriques gouvernées</text>

    <line x1="760" y1="294" x2="920" y2="294" stroke="#2F5D3F" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="840" y="325" class="display" font-size="18" font-weight="600" fill="#2F5D3F" text-anchor="middle">Looker semantic</text>
    <text x="840" y="345" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">LookML versionné</text>
    <text x="840" y="361" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">métriques · dimensions · joints</text>

    <line x1="780" y1="385" x2="900" y2="385" stroke="#2F5D3F" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="840" y="410" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Looker Studio Pro</text>
    <text x="840" y="428" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">BI self-service gouvernée</text>

    <text x="840" y="460" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Connected Sheets</text>
    <text x="840" y="478" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">tableur sur BQ</text>
  </g>

  <line x1="945" y1="370" x2="956" y2="370" stroke="#6b6f7c" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- ============ COUCHE 5 — RESTITUTION ============ -->
  <g class="interactive" data-card="couche-restitution" tabindex="0" role="button" aria-label="Couche restitution">
    <rect class="layer-frame" x="960" y="200" width="180" height="340" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.5"/>
    <text x="1050" y="230" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.16em" text-anchor="middle">COUCHE 5</text>
    <text x="1050" y="258" class="display" font-size="18" font-weight="600" fill="#1e1e2a" text-anchor="middle">Restitution</text>
    <text x="1050" y="278" class="body" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">Surfaces utilisateur</text>

    <line x1="980" y1="294" x2="1120" y2="294" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="1050" y="325" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Dashboards Looker</text>

    <text x="1050" y="358" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Embedded</text>

    <text x="1050" y="391" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Applications data</text>

    <text x="1050" y="424" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">API Looker</text>

    <text x="1050" y="457" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Sheets / Excel</text>

    <text x="1050" y="490" class="body" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">→ Conv Analytics</text>
  </g>

  <!-- ============ LINEAGE TRANSVERSAL (DATAPLEX) ============ -->
  <g>
    <rect x="80" y="570" width="1060" height="60" rx="3" fill="#a83e55" fill-opacity="0.05" stroke="#a83e55" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="100" y="590" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">DATAPLEX — LINEAGE TRANSVERSAL</text>
    <text x="100" y="614" class="body" font-size="12" fill="#1e1e2a">Catalogue · graphe d'origine · traçabilité bout-en-bout · pièce critique pour BCBS 239 (voir §10).</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="660" x2="1140" y2="660" stroke="rgba(30,30,42,0.10)" stroke-width="1"/>
  <text x="60" y="688" class="body" font-size="13" font-style="italic" fill="#6b6f7c">« Cette chaîne tournait déjà avant l'agentique. Ce qui change en 2026, c'est qu'à chaque couche s'ajoute une surface agentique. »</text>
</svg>
