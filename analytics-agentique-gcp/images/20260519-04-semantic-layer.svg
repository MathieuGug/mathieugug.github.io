<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 820" data-schema-id="schema-04" role="img" aria-labelledby="schema-04-title schema-04-desc">
  <title id="schema-04-title">Semantic layer — avec et sans, en miroir</title>
  <desc id="schema-04-desc">Comparaison en miroir. À gauche, l'agent génère du SQL brut contre le schéma : hallucinations de jointures, accuracy 10-20 %. À droite, l'agent appelle des métriques nommées via semantic layer : SQL compilé, accuracy proche de 100 %.</desc>

  <defs>
    <style>
      .display { font-family: 'Spectral', 'Source Serif Pro', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .interactive { cursor: pointer; outline: none; }
      .interactive:focus-visible > .box-frame,
      .interactive:hover > .box-frame { filter: brightness(0.96); }
    </style>
    <marker id="arr4r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
    <marker id="arr4g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F5D3F"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="820" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A">Semantic layer — avec et sans, en miroir</text>
  <text x="60" y="120" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Même prompt, deux architectures. La pièce qui décide n'est pas le modèle, c'est le contexte sémantique.</text>

  <line x1="60" y1="148" x2="1240" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- PROMPT IDENTIQUE EN HAUT -->
  <g>
    <rect x="350" y="178" width="600" height="60" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.2"/>
    <text x="370" y="200" class="mono" font-size="11" font-weight="600" fill="#5A5A5A" letter-spacing="0.14em">PROMPT NATUREL</text>
    <text x="370" y="222" class="body" font-size="13" font-style="italic" fill="#1A1A1A">« Total des opérations au T1 2026 par segment client en Europe »</text>
  </g>

  <!-- Séparateur vertical -->
  <line x1="650" y1="260" x2="650" y2="720" stroke="#E5E1D8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============ COLONNE GAUCHE — SANS SEMANTIC ============ -->
  <text x="285" y="290" class="mono" font-size="12" font-weight="600" fill="#B7332C" letter-spacing="0.16em" text-anchor="middle">SANS SEMANTIC LAYER</text>
  <text x="285" y="312" class="display" font-size="20" font-weight="600" fill="#1A1A1A" text-anchor="middle">Génération de SQL brut</text>

  <!-- Agent -->
  <g class="interactive" data-card="sans-agent" tabindex="0" role="button" aria-label="Sans semantic — agent">
    <rect class="box-frame" x="100" y="340" width="370" height="80" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="285" y="365" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Agent (Gemini / Claude / autre)</text>
    <text x="285" y="384" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Génère du SQL en devinant les jointures,</text>
    <text x="285" y="401" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">les noms de tables de référence, les colonnes métriques.</text>
  </g>

  <line x1="285" y1="423" x2="285" y2="448" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arr4r)"/>

  <!-- SQL généré -->
  <g class="interactive" data-card="sans-sql" tabindex="0" role="button" aria-label="Sans semantic — SQL généré">
    <rect class="box-frame" x="100" y="455" width="370" height="135" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="285" y="478" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.14em" text-anchor="middle">SQL GÉNÉRÉ (HALLUCINÉ)</text>
    <text x="120" y="500" class="mono" font-size="11" fill="#1A1A1A">SELECT c.segment,</text>
    <text x="120" y="516" class="mono" font-size="11" fill="#1A1A1A">       SUM(o.montant_eur) AS total</text>
    <text x="120" y="532" class="mono" font-size="11" fill="#1A1A1A">FROM client c</text>
    <text x="120" y="548" class="mono" font-size="11" fill="#1A1A1A">JOIN compte a ON c.id = a.client_id</text>
    <text x="120" y="564" class="mono" font-size="11" fill="#1A1A1A">JOIN operation o ON a.id = o.compte_id</text>
    <text x="120" y="580" class="mono" font-size="11" fill="#B7332C">WHERE c.region_id IN (...regions Europe?)</text>
  </g>

  <line x1="285" y1="595" x2="285" y2="618" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arr4r)"/>

  <!-- BigQuery -->
  <g class="interactive" data-card="sans-warehouse" tabindex="0" role="button" aria-label="Sans semantic — BigQuery">
    <rect class="box-frame" x="100" y="625" width="370" height="60" rx="3" fill="#B7332C" fill-opacity="0.04" stroke="#5A5A5A" stroke-width="1"/>
    <text x="285" y="650" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">BigQuery</text>
    <text x="285" y="670" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">Exécute. Retourne un résultat. Peut être faux.</text>
  </g>

  <!-- Accuracy box -->
  <g>
    <rect x="100" y="710" width="370" height="60" rx="3" fill="#B7332C" fill-opacity="0.12" stroke="#B7332C" stroke-width="1.5"/>
    <text x="115" y="730" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.14em">VECTEURS D'ERREUR</text>
    <text x="115" y="750" class="body" font-size="12" fill="#1A1A1A">Hallucination de jointures · mauvaise convention métrique · table</text>
    <text x="115" y="765" class="body" font-size="12" fill="#1A1A1A">référence devinée · convention temporelle implicite. Accuracy ≈ 10-20 %.</text>
  </g>

  <!-- ============ COLONNE DROITE — AVEC SEMANTIC ============ -->
  <text x="940" y="290" class="mono" font-size="12" font-weight="600" fill="#2F5D3F" letter-spacing="0.16em" text-anchor="middle">AVEC SEMANTIC LAYER</text>
  <text x="940" y="312" class="display" font-size="20" font-weight="600" fill="#1A1A1A" text-anchor="middle">Appel de métriques nommées</text>

  <!-- Agent -->
  <g class="interactive" data-card="avec-agent" tabindex="0" role="button" aria-label="Avec semantic — agent">
    <rect class="box-frame" x="755" y="340" width="370" height="80" rx="3" fill="#2F5D3F" fill-opacity="0.06" stroke="#2F5D3F" stroke-width="1.25"/>
    <text x="940" y="365" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Agent (Gemini / Claude / autre)</text>
    <text x="940" y="384" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Appelle une métrique nommée comme tool,</text>
    <text x="940" y="401" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">avec dimensions et filtres en paramètres typés.</text>
  </g>

  <line x1="940" y1="423" x2="940" y2="448" stroke="#2F5D3F" stroke-width="1.5" marker-end="url(#arr4g)"/>

  <!-- Semantic layer call -->
  <g class="interactive" data-card="avec-semantic" tabindex="0" role="button" aria-label="Avec semantic — call sémantique">
    <rect class="box-frame" x="755" y="455" width="370" height="135" rx="3" fill="#2F5D3F" fill-opacity="0.08" stroke="#2F5D3F" stroke-width="2"/>
    <text x="940" y="478" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em" text-anchor="middle">SEMANTIC LAYER (LOOKER / CUBE / DBT)</text>
    <text x="775" y="503" class="mono" font-size="11" fill="#1A1A1A">get_metric(</text>
    <text x="795" y="520" class="mono" font-size="11" fill="#1A1A1A">name: "total_operations",</text>
    <text x="795" y="536" class="mono" font-size="11" fill="#1A1A1A">dimensions: ["client.segment"],</text>
    <text x="795" y="552" class="mono" font-size="11" fill="#1A1A1A">filters: {region: "EU", period: "2026Q1"}</text>
    <text x="775" y="568" class="mono" font-size="11" fill="#1A1A1A">)</text>
    <text x="940" y="585" class="body" font-size="11" font-style="italic" fill="#2F5D3F" text-anchor="middle">→ Compile en SQL gouverné</text>
  </g>

  <line x1="940" y1="595" x2="940" y2="618" stroke="#2F5D3F" stroke-width="1.5" marker-end="url(#arr4g)"/>

  <!-- BigQuery -->
  <g class="interactive" data-card="avec-warehouse" tabindex="0" role="button" aria-label="Avec semantic — BigQuery">
    <rect class="box-frame" x="755" y="625" width="370" height="60" rx="3" fill="#2F5D3F" fill-opacity="0.04" stroke="#5A5A5A" stroke-width="1"/>
    <text x="940" y="650" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">BigQuery</text>
    <text x="940" y="670" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">Exécute le SQL compilé. Résultat conforme aux définitions métier.</text>
  </g>

  <!-- Accuracy box -->
  <g>
    <rect x="755" y="710" width="370" height="60" rx="3" fill="#2F5D3F" fill-opacity="0.12" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="770" y="730" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em">CONTRATS RESPECTÉS</text>
    <text x="770" y="750" class="body" font-size="12" fill="#1A1A1A">Métrique gouvernée · jointures déclarées · contraintes typées · gouvernance Looker</text>
    <text x="770" y="765" class="body" font-size="12" fill="#1A1A1A">native. Accuracy ≈ 100 % sur queries couvertes par le semantic.</text>
  </g>

  <!-- ============ FOOTER ============ -->
  <line x1="60" y1="795" x2="1240" y2="795" stroke="#E5E1D8" stroke-width="1"/>
</svg>
