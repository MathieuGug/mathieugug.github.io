    <text x="1100" y="270" class="mono" font-size="11" font-weight="600" fill="#6b6f7c" letter-spacing="0.14em">AGENTIQUES</text>

    <!-- Conv Analytics -->
    <rect x="1100" y="295" width="14" height="14" fill="#1F5560" fill-opacity="0.30" stroke="#1F5560" stroke-width="1"/>
    <text x="1122" y="307" class="body" font-size="12" font-weight="600" fill="#1e1e2a">Conversational</text>
    <text x="1122" y="324" class="body" font-size="11" fill="#6b6f7c">étages 1-2 · §5</text>

    <!-- Agents custom -->
    <rect x="1100" y="350" width="14" height="14" fill="#B58A2C" fill-opacity="0.30" stroke="#B58A2C" stroke-width="1"/>
    <text x="1122" y="362" class="body" font-size="12" font-weight="600" fill="#1e1e2a">Agents custom</text>
    <text x="1122" y="379" class="body" font-size="11" fill="#6b6f7c">étages 3-4 · §6</text>

    <!-- MCP -->
    <rect x="1100" y="405" width="14" height="14" fill="#a83e55" fill-opacity="0.30" stroke="#a83e55" stroke-width="1"/>
    <text x="1122" y="417" class="body" font-size="12" font-weight="600" fill="#1e1e2a">MCP &amp; connecteurs</text>
    <text x="1122" y="434" class="body" font-size="11" fill="#6b6f7c">étages 3-4 · §7</text>

    <!-- Sémantique pivot -->
    <rect x="1100" y="465" width="14" height="14" fill="#2F5D3F" fill-opacity="0.30" stroke="#2F5D3F" stroke-width="1"/>
    <text x="1122" y="477" class="body" font-size="12" font-weight="600" fill="#1e1e2a">Sémantique</text>
    <text x="1122" y="494" class="body" font-size="11" fill="#6b6f7c">pivot transverse · §4</text>

    <text x="1100" y="540" class="body" font-size="11" font-style="italic" fill="#6b6f7c">Cellules vides :</text>
    <text x="1100" y="555" class="body" font-size="11" font-style="italic" fill="#6b6f7c">pas de pénétration</text>
    <text x="1100" y="570" class="body" font-size="11" font-style="italic" fill="#6b6f7c">agentique significative</text>
    <text x="1100" y="585" class="body" font-size="11" font-style="italic" fill="#6b6f7c">à cet étage × cette couche</text>
    <text x="1100" y="600" class="body" font-size="11" font-style="italic" fill="#6b6f7c">en mai 2026.</text>
  </g>

  <!-- ============ NOTE PYRAMIDE EN BAS ============ -->
  <g>
    <text x="650" y="690" class="body" font-size="13" font-style="italic" fill="#6b6f7c" text-anchor="middle">« La pyramide ordonne la posture face à l'agent ; les couches ordonnent le terrain où il agit. »</text>
    <text x="650" y="710" class="body" font-size="13" font-style="italic" fill="#6b6f7c" text-anchor="middle">L'étage 1 ne s'exprime aujourd'hui qu'en restitution. L'étage 4 commence à toucher l'agent custom et la restitution générative.</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="780" x2="1240" y2="780" stroke="rgba(30,30,42,0.10)" stroke-width="1"/>
  <text x="60" y="808" class="body" font-size="13" font-style="italic" fill="#6b6f7c">« Cadre éditorial de l'auteur — typologie pyramide héritée du dossier coding-agents (mai 2026), réinstanciée sur la chaîne data GCP. »</text>
</svg>
