<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 900" data-schema-id="schema-03" role="img" aria-labelledby="schema-03-title schema-03-desc">
  <title id="schema-03-title">Pyramide d'usage × cinq couches de chaîne — outils GCP par cellule</title>
  <desc id="schema-03-desc">Quatre étages d'usage (transverse, data quotidien, data expert, produit / décideurs) croisés avec les cinq couches de chaîne data GCP. Trois surfaces agentiques transverses émergent : conversational analytics, agents custom, MCP.</desc>

  <defs>
    <style>
      .display { font-family: 'Spectral', 'Source Serif Pro', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .interactive { cursor: pointer; outline: none; }
      .interactive:focus-visible > .cell-frame,
      .interactive:hover > .cell-frame { filter: brightness(0.95); }
    </style>
  </defs>

  <rect x="0" y="0" width="1300" height="900" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" fill="#a83e55" letter-spacing="0.18em">SCHÉMA 03 · SIGNATURE</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" fill="#1e1e2a">Pyramide d'usage × cinq couches de chaîne</text>
  <text x="60" y="120" class="display" font-size="16" font-style="italic" fill="#6b6f7c">Trois surfaces agentiques transverses émergent : conversational analytics, agents custom, MCP.</text>

  <line x1="60" y1="148" x2="1240" y2="148" stroke="rgba(30,30,42,0.10)" stroke-width="1"/>

  <!-- ============ COLUMNS — chaîne data en haut ============ -->
  <!-- 5 colonnes x=[160,340,520,700,880,1060,1240], width=180 chacune -->
  <g>
    <text x="250" y="195" class="mono" font-size="11" font-weight="600" fill="#6b6f7c" letter-spacing="0.14em" text-anchor="middle">INGESTION</text>
    <text x="430" y="195" class="mono" font-size="11" font-weight="600" fill="#6b6f7c" letter-spacing="0.14em" text-anchor="middle">WAREHOUSE</text>
    <text x="610" y="195" class="mono" font-size="11" font-weight="600" fill="#6b6f7c" letter-spacing="0.14em" text-anchor="middle">TRANSFORM</text>
    <text x="790" y="195" class="mono" font-size="11" font-weight="600" fill="#6b6f7c" letter-spacing="0.14em" text-anchor="middle">SÉMANTIQUE</text>
    <text x="970" y="195" class="mono" font-size="11" font-weight="600" fill="#6b6f7c" letter-spacing="0.14em" text-anchor="middle">RESTITUTION</text>

    <line x1="160" y1="208" x2="1060" y2="208" stroke="#1e1e2a" stroke-width="1"/>
  </g>

  <!-- ============ RANGÉE — Étage 4 PRODUIT / DÉCIDEURS ============ -->
  <g>
    <text x="80" y="252" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.14em">ÉTAGE 4</text>
    <text x="80" y="270" class="body" font-size="13" font-weight="600" fill="#1e1e2a">Produit /</text>
    <text x="80" y="288" class="body" font-size="13" font-weight="600" fill="#1e1e2a">décideurs</text>

    <!-- 4 cellules vides ou peu peuplées -->
    <rect x="160" y="230" width="180" height="80" rx="2" fill="#faf6ec" stroke="rgba(30,30,42,0.10)" stroke-width="0.5"/>
    <rect x="340" y="230" width="180" height="80" rx="2" fill="#faf6ec" stroke="rgba(30,30,42,0.10)" stroke-width="0.5"/>
    <rect x="520" y="230" width="180" height="80" rx="2" fill="#faf6ec" stroke="rgba(30,30,42,0.10)" stroke-width="0.5"/>
    <rect x="700" y="230" width="180" height="80" rx="2" fill="#faf6ec" stroke="rgba(30,30,42,0.10)" stroke-width="0.5"/>

    <!-- Restitution cellule : Agents custom, Expériences narratives -->
    <g class="interactive" data-card="cell-4-restitution" tabindex="0" role="button" aria-label="Étage 4 × restitution">
      <rect class="cell-frame" x="880" y="230" width="180" height="80" rx="2" fill="#B58A2C" fill-opacity="0.14" stroke="#B58A2C" stroke-width="1"/>
      <text x="970" y="255" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">Vertex Agent Builder</text>
      <text x="970" y="272" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">ADK · A2A</text>
      <text x="970" y="290" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">Expériences génératives</text>
      <text x="970" y="305" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">data apps embedded</text>
    </g>
  </g>

  <!-- ============ RANGÉE — Étage 3 DATA EXPERT ============ -->
  <g>
    <text x="80" y="362" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">ÉTAGE 3</text>
    <text x="80" y="380" class="body" font-size="13" font-weight="600" fill="#1e1e2a">Data expert</text>
    <text x="80" y="398" class="body" font-size="11" fill="#6b6f7c">ingé data, DS, MLOps</text>

    <!-- Cellule ingestion vide -->
    <rect x="160" y="320" width="180" height="100" rx="2" fill="#faf6ec" stroke="rgba(30,30,42,0.10)" stroke-width="0.5"/>
    <text x="250" y="370" class="body" font-size="11" font-style="italic" fill="#9a9ca5" text-anchor="middle">—</text>

    <!-- Cellule warehouse : Code Assist BQ, BQ DataFrames -->
    <g class="interactive" data-card="cell-3-warehouse" tabindex="0" role="button" aria-label="Étage 3 × warehouse">
      <rect class="cell-frame" x="340" y="320" width="180" height="100" rx="2" fill="#a83e55" fill-opacity="0.10" stroke="#a83e55" stroke-width="1"/>
      <text x="430" y="345" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">Gemini Code Assist</text>
      <text x="430" y="362" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">BQ DataFrames + Gemini</text>
      <text x="430" y="380" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">Colab Enterprise</text>
      <text x="430" y="398" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">+ Claude Code, Codex CLI</text>
    </g>

    <!-- Cellule transform : Dataform Gemini, Data Engineering Agent -->
    <g class="interactive" data-card="cell-3-transform" tabindex="0" role="button" aria-label="Étage 3 × transform">
      <rect class="cell-frame" x="520" y="320" width="180" height="100" rx="2" fill="#a83e55" fill-opacity="0.10" stroke="#a83e55" stroke-width="1"/>
      <text x="610" y="345" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">Dataform + Gemini</text>
      <text x="610" y="362" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">Data Engineering Agent</text>
      <text x="610" y="380" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">SQL gen via NL</text>
      <text x="610" y="398" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">auto-doc modèles</text>
    </g>

    <!-- Cellule sémantique : LookML édition assistée -->
    <g class="interactive" data-card="cell-3-semantique" tabindex="0" role="button" aria-label="Étage 3 × sémantique">
      <rect class="cell-frame" x="700" y="320" width="180" height="100" rx="2" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-width="1"/>
      <text x="790" y="345" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">LookML +</text>
      <text x="790" y="362" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">coding agents</text>
      <text x="790" y="380" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">modélisation sémantique</text>
      <text x="790" y="398" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">via Claude Code · Copilot</text>
    </g>

    <!-- Cellule restitution : MCP servers, embedded apps -->
    <g class="interactive" data-card="cell-3-restitution" tabindex="0" role="button" aria-label="Étage 3 × restitution">
      <rect class="cell-frame" x="880" y="320" width="180" height="100" rx="2" fill="#a83e55" fill-opacity="0.10" stroke="#a83e55" stroke-width="1"/>
      <text x="970" y="345" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">MCP servers</text>
      <text x="970" y="362" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">internes / managed</text>
      <text x="970" y="380" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">BQ MCP managed</text>
      <text x="970" y="398" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">+ MCP banque sur Cloud Run</text>
    </g>
  </g>

  <!-- ============ RANGÉE — Étage 2 DATA QUOTIDIEN ============ -->
  <g>
    <text x="80" y="472" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.14em">ÉTAGE 2</text>
    <text x="80" y="490" class="body" font-size="13" font-weight="600" fill="#1e1e2a">Data quotidien</text>
    <text x="80" y="508" class="body" font-size="11" fill="#6b6f7c">analystes, BI, contrôle</text>

    <rect x="160" y="430" width="180" height="100" rx="2" fill="#faf6ec" stroke="rgba(30,30,42,0.10)" stroke-width="0.5"/>
    <text x="250" y="480" class="body" font-size="11" font-style="italic" fill="#9a9ca5" text-anchor="middle">—</text>

    <!-- Cellule warehouse : BQ Data Canvas -->
    <g class="interactive" data-card="cell-2-warehouse" tabindex="0" role="button" aria-label="Étage 2 × warehouse">
      <rect class="cell-frame" x="340" y="430" width="180" height="100" rx="2" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1"/>
      <text x="430" y="458" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">BigQuery Data Canvas</text>
      <text x="430" y="476" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">DAG visuel · NL prompts</text>
      <text x="430" y="492" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">AI assistive chat (GA)</text>
      <text x="430" y="510" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">+ Python avancé</text>
    </g>

    <!-- Cellule transform vide ou peu peuplée -->
    <rect x="520" y="430" width="180" height="100" rx="2" fill="#faf6ec" stroke="rgba(30,30,42,0.10)" stroke-width="0.5"/>
    <text x="610" y="475" class="body" font-size="11" font-style="italic" fill="#9a9ca5" text-anchor="middle">Dataform UI</text>
    <text x="610" y="492" class="body" font-size="11" font-style="italic" fill="#9a9ca5" text-anchor="middle">(consultatif)</text>

    <!-- Cellule sémantique : NotebookLM Enterprise -->
    <g class="interactive" data-card="cell-2-semantique" tabindex="0" role="button" aria-label="Étage 2 × sémantique">
      <rect class="cell-frame" x="700" y="430" width="180" height="100" rx="2" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1"/>
      <text x="790" y="458" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">NotebookLM Enterprise</text>
      <text x="790" y="476" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">synthèse documentaire</text>
      <text x="790" y="492" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">contexte métier</text>
      <text x="790" y="510" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">+ Looker Explores</text>
    </g>

    <!-- Cellule restitution : Looker Dashboard Agents -->
    <g class="interactive" data-card="cell-2-restitution" tabindex="0" role="button" aria-label="Étage 2 × restitution">
      <rect class="cell-frame" x="880" y="430" width="180" height="100" rx="2" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1"/>
      <text x="970" y="458" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">Looker Dashboard Agents</text>
      <text x="970" y="476" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">questions dans dashboard</text>
      <text x="970" y="492" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">Agentic Workflows</text>
      <text x="970" y="510" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">monitoring de métriques</text>
    </g>
  </g>

  <!-- ============ RANGÉE — Étage 1 TRANSVERSE ============ -->
  <g>
    <text x="80" y="582" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em">ÉTAGE 1</text>
    <text x="80" y="600" class="body" font-size="13" font-weight="600" fill="#1e1e2a">Transverse</text>
    <text x="80" y="618" class="body" font-size="11" fill="#6b6f7c">tous métiers, fonctions support</text>

    <rect x="160" y="540" width="180" height="100" rx="2" fill="#faf6ec" stroke="rgba(30,30,42,0.10)" stroke-width="0.5"/>
    <text x="250" y="590" class="body" font-size="11" font-style="italic" fill="#9a9ca5" text-anchor="middle">—</text>

    <rect x="340" y="540" width="180" height="100" rx="2" fill="#faf6ec" stroke="rgba(30,30,42,0.10)" stroke-width="0.5"/>
    <text x="430" y="590" class="body" font-size="11" font-style="italic" fill="#9a9ca5" text-anchor="middle">—</text>

    <rect x="520" y="540" width="180" height="100" rx="2" fill="#faf6ec" stroke="rgba(30,30,42,0.10)" stroke-width="0.5"/>
    <text x="610" y="590" class="body" font-size="11" font-style="italic" fill="#9a9ca5" text-anchor="middle">—</text>

    <rect x="700" y="540" width="180" height="100" rx="2" fill="#faf6ec" stroke="rgba(30,30,42,0.10)" stroke-width="0.5"/>
    <text x="790" y="590" class="body" font-size="11" font-style="italic" fill="#9a9ca5" text-anchor="middle">—</text>

    <!-- Cellule restitution : Gemini in Sheets, Connected Sheets, Looker Conv Embedded -->
    <g class="interactive" data-card="cell-1-restitution" tabindex="0" role="button" aria-label="Étage 1 × restitution">
      <rect class="cell-frame" x="880" y="540" width="180" height="100" rx="2" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-width="1"/>
      <text x="970" y="568" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">Gemini in Sheets</text>
      <text x="970" y="586" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">Connected Sheets</text>
      <text x="970" y="604" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">Looker Conversational</text>
      <text x="970" y="620" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">embedded (iframe)</text>
    </g>
  </g>

  <!-- ============ LÉGENDE DES SURFACES (à droite) ============ -->
  <g>
    <line x1="1080" y1="230" x2="1080" y2="640" stroke="rgba(30,30,42,0.10)" stroke-width="1"/>

