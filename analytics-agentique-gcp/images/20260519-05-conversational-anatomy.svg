<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" data-schema-id="schema-05" role="img" aria-labelledby="schema-05-title schema-05-desc">
  <title id="schema-05-title">Anatomie d'un appel Conversational Analytics sur GCP</title>
  <desc id="schema-05-desc">Topologie d'un appel : utilisateur (Sheets, Looker UI, app embedded) → Conversational Analytics API → Gemini → Looker semantic / BigQuery schema → SQL exécuté → résultat. Le semantic layer intervient à mi-chaîne ; il transforme la conversation en requête gouvernée.</desc>

  <defs>
    <style>
      .display { font-family: 'Spectral', 'Source Serif Pro', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .interactive { cursor: pointer; outline: none; }
      .interactive:focus-visible > .step-frame,
      .interactive:hover > .step-frame { filter: brightness(0.97); }
    </style>
    <marker id="arr5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6f7c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="760" fill="#faf6ec"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" fill="#a83e55" letter-spacing="0.18em">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" fill="#1e1e2a">Anatomie d'un appel Conversational Analytics</text>
  <text x="60" y="120" class="display" font-size="16" font-style="italic" fill="#6b6f7c">Du prompt utilisateur au résultat exploité — la chaîne complète sur GCP.</text>

  <line x1="60" y1="148" x2="1240" y2="148" stroke="rgba(30,30,42,0.10)" stroke-width="1"/>

  <!-- ============ STEP 1 — SURFACE UTILISATEUR ============ -->
  <g class="interactive" data-card="step-surface" tabindex="0" role="button" aria-label="Surface utilisateur">
    <rect class="step-frame" x="80" y="200" width="180" height="270" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25"/>
    <text x="170" y="225" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.14em" text-anchor="middle">ÉTAPE 1</text>
    <text x="170" y="250" class="body" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">Surface utilisateur</text>

    <line x1="100" y1="268" x2="240" y2="268" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="170" y="295" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">Sheets · Sheets</text>
    <text x="170" y="312" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">Gemini in Sheets</text>

    <text x="170" y="345" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">Looker UI</text>
    <text x="170" y="362" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">Dashboard Agents</text>

    <text x="170" y="395" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">App embedded</text>
    <text x="170" y="412" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">iframe · signed</text>

    <text x="170" y="445" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">BigQuery Data</text>
    <text x="170" y="462" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">Canvas</text>
  </g>

  <line x1="265" y1="335" x2="290" y2="335" stroke="#6b6f7c" stroke-width="1.5" marker-end="url(#arr5)"/>

  <!-- ============ STEP 2 — CONV ANALYTICS API ============ -->
  <g class="interactive" data-card="step-api" tabindex="0" role="button" aria-label="Conversational Analytics API">
    <rect class="step-frame" x="295" y="200" width="200" height="270" rx="3" fill="#a83e55" fill-opacity="0.08" stroke="#a83e55" stroke-width="1.25"/>
    <text x="395" y="225" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em" text-anchor="middle">ÉTAPE 2</text>
    <text x="395" y="250" class="body" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">Conv Analytics API</text>

    <line x1="315" y1="268" x2="475" y2="268" stroke="#a83e55" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="395" y="295" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">Point d'entrée HTTP</text>
    <text x="395" y="315" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">GA — fév. 2026</text>

    <text x="395" y="350" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">Multi-tour</text>
    <text x="395" y="370" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">vérif. + explication SQL</text>

    <text x="395" y="405" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">Auth Looker ou</text>
    <text x="395" y="422" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">applicative (signed)</text>

    <text x="395" y="450" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">surface portail conseiller, B2B</text>
  </g>

  <line x1="500" y1="335" x2="525" y2="335" stroke="#6b6f7c" stroke-width="1.5" marker-end="url(#arr5)"/>

  <!-- ============ STEP 3 — GEMINI ============ -->
  <g class="interactive" data-card="step-gemini" tabindex="0" role="button" aria-label="Gemini intent + grounding">
    <rect class="step-frame" x="530" y="200" width="180" height="270" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="620" y="225" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.14em" text-anchor="middle">ÉTAPE 3</text>
    <text x="620" y="250" class="body" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">Gemini</text>

    <line x1="550" y1="268" x2="690" y2="268" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="620" y="295" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">Compréhension</text>
    <text x="620" y="312" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">d'intent</text>

    <text x="620" y="345" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">Mapping métriques</text>
    <text x="620" y="362" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">+ dimensions</text>

    <text x="620" y="395" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">Disambiguation</text>
    <text x="620" y="412" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">demande à l'utilisateur</text>
    <text x="620" y="428" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">si ambiguïté</text>
  </g>

  <line x1="715" y1="335" x2="740" y2="335" stroke="#6b6f7c" stroke-width="1.5" marker-end="url(#arr5)"/>

  <!-- ============ STEP 4 — SEMANTIC LAYER (PIVOT) ============ -->
  <g class="interactive" data-card="step-semantic" tabindex="0" role="button" aria-label="Semantic layer — pivot">
    <rect class="step-frame" x="745" y="200" width="200" height="270" rx="3" fill="#2F5D3F" fill-opacity="0.12" stroke="#2F5D3F" stroke-width="2"/>
    <text x="845" y="225" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em" text-anchor="middle">ÉTAPE 4 · PIVOT</text>
    <text x="845" y="250" class="body" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">Semantic layer</text>

    <line x1="765" y1="268" x2="925" y2="268" stroke="#2F5D3F" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="845" y="295" class="body" font-size="13" font-weight="600" fill="#2F5D3F" text-anchor="middle">Looker semantic</text>
    <text x="845" y="313" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">LookML — défaut GCP</text>

    <text x="845" y="345" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">Ou Cube / dbt</text>
    <text x="845" y="362" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">si multi-warehouse</text>

    <text x="845" y="395" class="body" font-size="11" font-style="italic" fill="#1e1e2a" text-anchor="middle">Conv Analytics → Looker :</text>
    <text x="845" y="412" class="body" font-size="11" font-style="italic" fill="#1e1e2a" text-anchor="middle">−2/3 erreurs gen AI</text>
    <text x="845" y="428" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">vs sans (source Google)</text>

    <text x="845" y="455" class="body" font-size="11" fill="#6b6f7c" text-anchor="middle">+ gouvernance Looker</text>
  </g>

  <line x1="950" y1="335" x2="975" y2="335" stroke="#6b6f7c" stroke-width="1.5" marker-end="url(#arr5)"/>

  <!-- ============ STEP 5 — BIGQUERY ============ -->
  <g class="interactive" data-card="step-bq" tabindex="0" role="button" aria-label="BigQuery exécution">
    <rect class="step-frame" x="980" y="200" width="200" height="270" rx="3" fill="#a83e55" fill-opacity="0.06" stroke="#a83e55" stroke-width="1.25"/>
    <text x="1080" y="225" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em" text-anchor="middle">ÉTAPE 5</text>
    <text x="1080" y="250" class="body" font-size="14" font-weight="600" fill="#1e1e2a" text-anchor="middle">BigQuery + résultat</text>

    <line x1="1000" y1="268" x2="1160" y2="268" stroke="#a83e55" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="1080" y="295" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">SQL compilé exécuté</text>

    <text x="1080" y="330" class="body" font-size="12" font-weight="600" fill="#1e1e2a" text-anchor="middle">Résultat :</text>

    <text x="1080" y="358" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">• Chart</text>
    <text x="1080" y="378" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">• Table</text>
    <text x="1080" y="398" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">• SQL explained</text>
    <text x="1080" y="418" class="body" font-size="12" fill="#1e1e2a" text-anchor="middle">• Lineage exposé</text>

    <text x="1080" y="450" class="body" font-size="11" font-style="italic" fill="#6b6f7c" text-anchor="middle">audit-able, partageable</text>
  </g>

  <!-- ============ GOUVERNANCE TRANSVERSE (DESSOUS) ============ -->
  <g>
    <rect x="80" y="510" width="1100" height="60" rx="3" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="0.75" stroke-dasharray="5,3"/>
    <text x="100" y="530" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.14em">GOUVERNANCE TRANSVERSE</text>
    <text x="100" y="550" class="body" font-size="12" fill="#1e1e2a">Model Armor (prompt injection, DLP) · IAM Looker (permissions) · audit logs BigQuery · row-level security · Sensitive Data Protection.</text>
    <text x="100" y="565" class="body" font-size="11" font-style="italic" fill="#6b6f7c">→ Voir §10 pour le détail des objets GCP de défense en profondeur.</text>
  </g>

  <!-- ============ ENCADRÉ — Pattern hybride ============ -->
  <g>
    <rect x="80" y="600" width="1100" height="80" rx="3" fill="#faf6ec" stroke="#1e1e2a" stroke-width="0.75"/>
    <text x="100" y="623" class="mono" font-size="11" font-weight="600" fill="#1e1e2a" letter-spacing="0.14em">PATTERN HYBRIDE — DASHBOARD + CHAT</text>
    <text x="100" y="645" class="body" font-size="12" fill="#1e1e2a">Dashboard fixe Looker pour ce qui doit être audité, signé, distribué (reporting comité, ALM, COREP/FINREP).</text>
    <text x="100" y="662" class="body" font-size="12" fill="#1e1e2a">Conversational ouvre la profondeur : creuser une cellule, demander une variante, isoler une sous-population. Les Dashboard Agents Next 2026</text>
    <text x="100" y="677" class="body" font-size="11" font-style="italic" fill="#6b6f7c">matérialisent ce pattern produit.</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="710" x2="1240" y2="710" stroke="rgba(30,30,42,0.10)" stroke-width="1"/>
  <text x="60" y="738" class="body" font-size="13" font-style="italic" fill="#6b6f7c">Sources : Google Cloud doc Conv Analytics API · Looker Conv Analytics GA blog · Cloud Next 2026 announcements · arxiv 2604.25149.</text>
</svg>
