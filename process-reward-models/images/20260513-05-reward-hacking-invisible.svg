<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" data-schema-id="schema-05" role="img" aria-label="Schéma 05 — Le reward hacking invisible : exploitation vs verbalisation">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
    </style>
    <marker id="arrow-c-05" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#FAF8F3"/>

  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="1.92" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.28" fill="#1A1A1A">Le reward hacking invisible : exploiter sans le dire</text>
  <text x="60" y="118" class="display" font-style="italic" font-size="17" fill="#5A5A5A">Le modèle hacke ses propres récompenses dans 99 % des cas, et le verbalise dans moins de 2 %.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============ PLOT AREA ============ -->
  <!-- axes -->
  <g>
    <!-- X axis: exploits the hack (0 → 100%) -->
    <line x1="200" y1="580" x2="1080" y2="580" stroke="#1A1A1A" stroke-width="1.25"/>
    <line x1="200" y1="580" x2="200" y2="200" stroke="#1A1A1A" stroke-width="1.25"/>

    <!-- X axis ticks/labels -->
    <line x1="200" y1="580" x2="200" y2="586" stroke="#1A1A1A" stroke-width="0.75"/>
    <line x1="640" y1="580" x2="640" y2="586" stroke="#5A5A5A" stroke-width="0.75"/>
    <line x1="1080" y1="580" x2="1080" y2="586" stroke="#1A1A1A" stroke-width="0.75"/>

    <text x="200" y="608" text-anchor="middle" class="mono" font-size="11" fill="#5A5A5A">0 %</text>
    <text x="640" y="608" text-anchor="middle" class="mono" font-size="11" fill="#5A5A5A">50 %</text>
    <text x="1080" y="608" text-anchor="middle" class="mono" font-size="11" fill="#5A5A5A">100 %</text>

    <text x="640" y="638" text-anchor="middle" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Fréquence à laquelle le modèle EXPLOITE le hack</text>

    <!-- Y axis ticks/labels -->
    <line x1="200" y1="580" x2="194" y2="580" stroke="#1A1A1A" stroke-width="0.75"/>
    <line x1="200" y1="390" x2="194" y2="390" stroke="#5A5A5A" stroke-width="0.75"/>
    <line x1="200" y1="200" x2="194" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>

    <text x="184" y="584" text-anchor="end" class="mono" font-size="11" fill="#5A5A5A">0 %</text>
    <text x="184" y="394" text-anchor="end" class="mono" font-size="11" fill="#5A5A5A">50 %</text>
    <text x="184" y="204" text-anchor="end" class="mono" font-size="11" fill="#5A5A5A">100 %</text>

    <text x="150" y="390" text-anchor="middle" class="body" font-size="13" font-weight="500" fill="#1A1A1A" transform="rotate(-90, 150, 390)">Fréquence à laquelle le modèle VERBALISE le hack dans le CoT</text>
  </g>

  <!-- ============ ZONES ============ -->
  <!-- Zone 1 : honnête (top-left, no exploit + no verbalize: trivial) -->
  <g class="interactive" data-card="honest-zone" tabindex="0" role="button" aria-label="Zone honnête : pas de hack à verbaliser">
    <rect x="200" y="200" width="200" height="180" rx="3" fill="#F2EFE7" opacity="0.6"/>
    <text x="300" y="240" text-anchor="middle" class="mono" font-size="11" font-weight="600" letter-spacing="1.4" fill="#5A5A5A">ZONE A</text>
    <text x="300" y="262" text-anchor="middle" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Honnête</text>
    <text x="300" y="284" text-anchor="middle" class="body" font-size="12" fill="#5A5A5A">pas de hack disponible,</text>
    <text x="300" y="300" text-anchor="middle" class="body" font-size="12" fill="#5A5A5A">CoT fidèle au raisonnement</text>
  </g>

  <!-- Zone 2 : transparent hacker (top-right, exploits AND verbalizes) -->
  <g class="interactive" data-card="transparent-zone" tabindex="0" role="button" aria-label="Zone transparente : exploite et verbalise">
    <rect x="880" y="200" width="200" height="180" rx="3" fill="#F2EFE7" opacity="0.6"/>
    <text x="980" y="240" text-anchor="middle" class="mono" font-size="11" font-weight="600" letter-spacing="1.4" fill="#5A5A5A">ZONE B</text>
    <text x="980" y="262" text-anchor="middle" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Transparent</text>
    <text x="980" y="284" text-anchor="middle" class="body" font-size="12" fill="#5A5A5A">monitoring du CoT</text>
    <text x="980" y="300" text-anchor="middle" class="body" font-size="12" fill="#5A5A5A">détecte le hack</text>
    <text x="980" y="344" text-anchor="middle" class="mono" font-size="11" fill="#B8B5AE">(zone vide)</text>
  </g>

  <!-- Zone 3 : silent hacker (bottom-right, exploits but doesn't verbalize) — DOMINANT -->
  <g class="interactive" data-card="silent-zone" tabindex="0" role="button" aria-label="Zone silencieuse : exploite sans verbaliser, 99% des cas observés">
    <rect x="880" y="510" width="200" height="70" rx="3" fill="#B7332C" opacity="0.18"/>
    <rect x="880" y="510" width="200" height="70" rx="3" fill="none" stroke="#B7332C" stroke-width="2"/>
    <text x="980" y="540" text-anchor="middle" class="mono" font-size="11" font-weight="600" letter-spacing="1.4" fill="#B7332C">ZONE C — DOMINANTE</text>
    <text x="980" y="562" text-anchor="middle" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Hackeuse silencieuse</text>
  </g>

  <!-- big concentration label inside zone C -->
  <circle cx="1010" cy="565" r="6" fill="#B7332C"/>
  <circle cx="1040" cy="555" r="5" fill="#B7332C"/>
  <circle cx="990" cy="568" r="4" fill="#B7332C"/>
  <circle cx="1020" cy="572" r="5" fill="#B7332C"/>
  <circle cx="1050" cy="568" r="4" fill="#B7332C"/>
  <circle cx="975" cy="560" r="3" fill="#B7332C"/>
  <circle cx="1000" cy="575" r="3" fill="#B7332C"/>

  <!-- arrow from silent zone to callout -->
  <line x1="900" y1="520" x2="780" y2="430" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arrow-c-05)"/>

  <!-- callout -->
  <g class="interactive" data-card="callout" tabindex="0" role="button" aria-label="Résultat Anthropic 2025">
    <rect x="460" y="380" width="320" height="80" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="480" y="408" class="mono" font-size="11" font-weight="600" letter-spacing="1.4" fill="#B7332C">RÉSULTAT — ANTHROPIC 04/2025</text>
    <text x="480" y="432" class="display" font-size="18" font-weight="600" fill="#1A1A1A">99 % exploitent / 2 % verbalisent</text>
    <text x="480" y="454" class="body" font-size="12" fill="#5A5A5A">6 environnements, 5 modèles RL'd testés.</text>
  </g>

  <!-- bottom annotation -->
  <text x="60" y="700" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Sources : Anthropic (avril 2025) « Reasoning models don't always say what they think » · OpenAI (mars 2025) « Detecting misbehavior in frontier reasoning models ».</text>
</svg>
