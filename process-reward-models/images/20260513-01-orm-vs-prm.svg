<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" data-schema-id="schema-01" role="img" aria-label="Schéma 01 — ORM vs PRM : noter le résultat ou noter le chemin">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive:focus { outline: none; }
      .interactive:hover .col-card { filter: brightness(0.97); }
    </style>
    <marker id="arrow-carmine-01" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
    <marker id="arrow-graphite-01" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="1.92" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.28" fill="#1A1A1A">Outcome vs Process : noter la destination, ou noter le chemin</text>
  <text x="60" y="118" class="display" font-style="italic" font-size="17" fill="#5A5A5A">L'idée fondatrice de Lightman et al. (2023) : la même chaîne, deux régimes de récompense.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============ LEFT : ORM ============ -->
  <g class="interactive" data-card="orm" tabindex="0" role="button" aria-label="Outcome Reward Model : un seul score à la fin">
    <rect class="col-card" x="80" y="170" width="500" height="60" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="100" y="200" class="mono" font-size="12" font-weight="600" letter-spacing="1.6" fill="#1F5560">RÉGIME A · OUTCOME</text>
    <text x="100" y="222" class="display" font-size="20" font-weight="600" fill="#1A1A1A">ORM — Outcome Reward Model</text>

    <!-- chain of steps, plain -->
    <rect x="100" y="270" width="120" height="44" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1"/>
    <text x="160" y="295" text-anchor="middle" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Étape 1</text>
    <text x="160" y="308" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">poser les variables</text>

    <rect x="240" y="270" width="120" height="44" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1"/>
    <text x="300" y="295" text-anchor="middle" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Étape 2</text>
    <text x="300" y="308" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">équation principale</text>

    <rect x="380" y="270" width="120" height="44" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1"/>
    <text x="440" y="295" text-anchor="middle" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Étape 3</text>
    <text x="440" y="308" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">résolution</text>

    <!-- arrows between steps -->
    <line x1="222" y1="292" x2="236" y2="292" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-graphite-01)"/>
    <line x1="362" y1="292" x2="376" y2="292" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-graphite-01)"/>

    <!-- arrow to final answer -->
    <line x1="502" y1="292" x2="534" y2="292" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-graphite-01)"/>

    <!-- final answer -->
    <rect x="540" y="270" width="40" height="44" rx="2" fill="#1F5560" stroke="#1F5560" stroke-width="1"/>
    <text x="560" y="298" text-anchor="middle" class="display" font-size="20" font-weight="600" fill="#FAF8F3">y</text>

    <!-- ORM scoring : single bracket on final answer -->
    <line x1="540" y1="360" x2="580" y2="360" stroke="#B7332C" stroke-width="2"/>
    <line x1="540" y1="360" x2="540" y2="350" stroke="#B7332C" stroke-width="2"/>
    <line x1="580" y1="360" x2="580" y2="350" stroke="#B7332C" stroke-width="2"/>
    <line x1="560" y1="360" x2="560" y2="384" stroke="#B7332C" stroke-width="2"/>

    <rect x="510" y="392" width="100" height="34" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="560" y="414" text-anchor="middle" class="mono" font-size="13" font-weight="600" fill="#B7332C">SCORE: 0/1</text>

    <text x="100" y="465" class="body" font-size="13" fill="#5A5A5A" font-style="italic">Le verifier ne lit que la réponse finale.</text>
    <text x="100" y="485" class="body" font-size="13" fill="#5A5A5A" font-style="italic">Mauvais chemin, bonne réponse → accepté.</text>
  </g>

  <!-- divider -->
  <line x1="620" y1="170" x2="620" y2="640" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============ RIGHT : PRM ============ -->
  <g class="interactive" data-card="prm" tabindex="0" role="button" aria-label="Process Reward Model : un score par étape">
    <rect class="col-card" x="640" y="170" width="500" height="60" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <text x="660" y="200" class="mono" font-size="12" font-weight="600" letter-spacing="1.6" fill="#B7332C">RÉGIME B · PROCESS</text>
    <text x="660" y="222" class="display" font-size="20" font-weight="600" fill="#1A1A1A">PRM — Process Reward Model</text>

    <rect x="660" y="270" width="120" height="44" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="720" y="295" text-anchor="middle" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Étape 1</text>
    <text x="720" y="308" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">poser les variables</text>

    <rect x="800" y="270" width="120" height="44" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="860" y="295" text-anchor="middle" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Étape 2</text>
    <text x="860" y="308" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">équation principale</text>

    <rect x="940" y="270" width="120" height="44" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="1000" y="295" text-anchor="middle" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Étape 3</text>
    <text x="1000" y="308" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">résolution</text>

    <line x1="782" y1="292" x2="796" y2="292" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-graphite-01)"/>
    <line x1="922" y1="292" x2="936" y2="292" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-graphite-01)"/>
    <line x1="1062" y1="292" x2="1094" y2="292" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-graphite-01)"/>

    <rect x="1100" y="270" width="40" height="44" rx="2" fill="#1F5560" stroke="#1F5560" stroke-width="1"/>
    <text x="1120" y="298" text-anchor="middle" class="display" font-size="20" font-weight="600" fill="#FAF8F3">y</text>

    <!-- PRM scoring : bracket on each step -->
    <g class="interactive" data-card="step-label" tabindex="0" role="button" aria-label="Annotation step-level : un label par étape">
      <rect x="685" y="340" width="70" height="28" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
      <text x="720" y="358" text-anchor="middle" class="mono" font-size="12" font-weight="600" fill="#1F5560">+1</text>

      <rect x="825" y="340" width="70" height="28" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
      <text x="860" y="358" text-anchor="middle" class="mono" font-size="12" font-weight="600" fill="#B7332C">−1</text>

      <rect x="965" y="340" width="70" height="28" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
      <text x="1000" y="358" text-anchor="middle" class="mono" font-size="12" font-weight="600" fill="#1F5560">+1</text>

      <!-- connecting lines from step to label -->
      <line x1="720" y1="316" x2="720" y2="338" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 2"/>
      <line x1="860" y1="316" x2="860" y2="338" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 2"/>
      <line x1="1000" y1="316" x2="1000" y2="338" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 2"/>
    </g>

    <text x="660" y="405" class="mono" font-size="11" font-weight="600" letter-spacing="1.4" fill="#B7332C">VECTEUR DE SCORES</text>
    <text x="660" y="430" class="body" font-size="13" fill="#5A5A5A" font-style="italic">Le verifier voit que l'étape 2 est fausse,</text>
    <text x="660" y="450" class="body" font-size="13" fill="#5A5A5A" font-style="italic">même si la réponse finale tombe juste.</text>
  </g>

  <!-- ============ BOTTOM CALLOUT : performance delta ============ -->
  <g class="interactive" data-card="performance-delta" tabindex="0" role="button" aria-label="Delta de performance : 72,4% vs 78,2% sur MATH">
    <rect x="80" y="540" width="1060" height="120" rx="3" fill="#F2EFE7" stroke="#E5E1D8" stroke-width="1"/>
    <text x="105" y="572" class="mono" font-size="11" font-weight="600" letter-spacing="1.6" fill="#B7332C">RÉSULTAT — LIGHTMAN et al. 2023</text>
    <text x="105" y="608" class="display" font-size="22" font-weight="600" fill="#1A1A1A">72,4 % → 78,2 %</text>
    <text x="105" y="638" class="body" font-size="14" fill="#5A5A5A">Best-of-N reranking sur MATH, 1 800 problèmes test. PRM avec 800K labels humains (PRM800K).</text>

    <!-- big numbers right side -->
    <text x="780" y="582" class="mono" font-size="11" font-weight="600" letter-spacing="1.6" fill="#1F5560">ORM</text>
    <text x="780" y="618" class="display" font-size="34" font-weight="600" fill="#1F5560">72,4 %</text>
    <text x="780" y="640" class="body" font-size="12" fill="#5A5A5A">outcome supervision</text>

    <text x="950" y="582" class="mono" font-size="11" font-weight="600" letter-spacing="1.6" fill="#B7332C">PRM</text>
    <text x="950" y="618" class="display" font-size="34" font-weight="600" fill="#B7332C">78,2 %</text>
    <text x="950" y="640" class="body" font-size="12" fill="#5A5A5A">process supervision</text>

    <!-- delta arrow -->
    <line x1="880" y1="608" x2="940" y2="608" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arrow-carmine-01)"/>
  </g>

  <text x="60" y="700" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : Lightman, H. et al., « Let's Verify Step by Step », arXiv:2305.20050 (OpenAI, 2023) — PRM800K, 800 000 labels step-level sur MATH.</text>
</svg>
