<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" data-schema-id="schema-06" role="img" aria-label="Schéma 06 — Quatre trajectoires pour la couche notateur">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#FAF8F3"/>

  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="1.92" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.28" fill="#1A1A1A">Quatre trajectoires pour la couche notateur</text>
  <text x="60" y="118" class="display" font-style="italic" font-size="17" fill="#5A5A5A">Vérifiabilité de la tâche × besoin d'un signal intermédiaire = quatre stratégies en 2027-2028.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============ AXES ============ -->
  <g>
    <!-- vertical axis (Y) -->
    <line x1="600" y1="200" x2="600" y2="680" stroke="#1A1A1A" stroke-width="1"/>
    <!-- horizontal axis (X) -->
    <line x1="160" y1="440" x2="1080" y2="440" stroke="#1A1A1A" stroke-width="1"/>

    <!-- axis labels -->
    <text x="1090" y="445" class="mono" font-size="11" font-weight="600" letter-spacing="1.4" fill="#5A5A5A">→</text>
    <text x="1090" y="466" class="body" font-size="12" fill="#1A1A1A">vérifiabilité ↑</text>

    <text x="600" y="190" text-anchor="middle" class="body" font-size="12" fill="#1A1A1A">besoin de signal intermédiaire ↑</text>

    <!-- low/high tags -->
    <text x="160" y="466" text-anchor="start" class="mono" font-size="10" letter-spacing="1.4" fill="#5A5A5A">VÉRIFIABILITÉ FAIBLE</text>
    <text x="1078" y="430" text-anchor="end" class="mono" font-size="10" letter-spacing="1.4" fill="#5A5A5A">VÉRIFIABILITÉ FORTE</text>
    <text x="612" y="210" text-anchor="start" class="mono" font-size="10" letter-spacing="1.4" fill="#5A5A5A">BESOIN FORT</text>
    <text x="612" y="678" text-anchor="start" class="mono" font-size="10" letter-spacing="1.4" fill="#5A5A5A">BESOIN FAIBLE</text>
  </g>

  <!-- ============ QUADRANT TL : Generative verifier (peu vérifiable, besoin fort) ============ -->
  <g class="interactive" data-card="generative-quadrant" tabindex="0" role="button" aria-label="Generative verifier intégré : peu vérifiable + besoin fort">
    <rect x="200" y="230" width="360" height="170" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <text x="220" y="258" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#B7332C">TRAJECTOIRE 2</text>
    <text x="220" y="285" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Generative verifier intégré</text>
    <text x="220" y="313" class="body" font-size="13" fill="#5A5A5A">Le raisonneur et le notateur fusionnent.</text>
    <text x="220" y="331" class="body" font-size="13" fill="#5A5A5A">Un seul modèle, deux modes alternés.</text>
    <text x="220" y="365" class="mono" font-size="11" letter-spacing="1.3" fill="#1F5560">ACTEURS · ANTHROPIC, GOOGLE DEEPMIND</text>
    <text x="220" y="385" class="mono" font-size="11" letter-spacing="1.3" fill="#1F5560">FONDATIONS · GENRM, THINKPRM</text>
  </g>

  <!-- ============ QUADRANT TR : RLVR généralisé (vérifiable, besoin fort) ============ -->
  <g class="interactive" data-card="rlvr-quadrant" tabindex="0" role="button" aria-label="RLVR généralisé : vérifiable + besoin fort">
    <rect x="640" y="230" width="360" height="170" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <text x="660" y="258" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#B7332C">TRAJECTOIRE 1 · DOMINANTE</text>
    <text x="660" y="285" class="display" font-size="20" font-weight="600" fill="#1A1A1A">RLVR généralisé</text>
    <text x="660" y="313" class="body" font-size="13" fill="#5A5A5A">Vérificateur symbolique externe + GRPO.</text>
    <text x="660" y="331" class="body" font-size="13" fill="#5A5A5A">Aucun reward model appris.</text>
    <text x="660" y="365" class="mono" font-size="11" letter-spacing="1.3" fill="#1F5560">ACTEURS · DEEPSEEK, OPENAI o-SERIES</text>
    <text x="660" y="385" class="mono" font-size="11" letter-spacing="1.3" fill="#1F5560">FONDATIONS · DEEPSEEK-R1, RAZIN 2025</text>
  </g>

  <!-- ============ QUADRANT BL : PRM-as-a-service (peu vérifiable, besoin faible mais persistant) ============ -->
  <g class="interactive" data-card="paas-quadrant" tabindex="0" role="button" aria-label="PRM-as-a-service : peu vérifiable + besoin externalisé">
    <rect x="200" y="480" width="360" height="170" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="220" y="508" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#1F5560">TRAJECTOIRE 4</text>
    <text x="220" y="535" class="display" font-size="20" font-weight="600" fill="#1A1A1A">PRM-as-a-service</text>
    <text x="220" y="563" class="body" font-size="13" fill="#5A5A5A">API externe : envoyer une chaîne,</text>
    <text x="220" y="581" class="body" font-size="13" fill="#5A5A5A">recevoir un vecteur de scores.</text>
    <text x="220" y="615" class="mono" font-size="11" letter-spacing="1.3" fill="#1F5560">ACTEURS · SURGE, PATRONUS, SCALE</text>
    <text x="220" y="635" class="mono" font-size="11" letter-spacing="1.3" fill="#1F5560">MATURITÉ · ÉMERGENT, 2026</text>
  </g>

  <!-- ============ QUADRANT BR : PRM spécialisé (vérifiable, besoin faible mais ciblé) ============ -->
  <g class="interactive" data-card="specialized-quadrant" tabindex="0" role="button" aria-label="PRM spécialisé : vérifiable mais domaine spécifique">
    <rect x="640" y="480" width="360" height="170" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="660" y="508" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#1F5560">TRAJECTOIRE 3</text>
    <text x="660" y="535" class="display" font-size="20" font-weight="600" fill="#1A1A1A">PRM spécialisé</text>
    <text x="660" y="563" class="body" font-size="13" fill="#5A5A5A">Domaines verticaux où la vérification</text>
    <text x="660" y="581" class="body" font-size="13" fill="#5A5A5A">est possible mais coûteuse / différée.</text>
    <text x="660" y="615" class="mono" font-size="11" letter-spacing="1.3" fill="#1F5560">ACTEURS · STANFORD MED, HARVEY, CURSOR</text>
    <text x="660" y="635" class="mono" font-size="11" letter-spacing="1.3" fill="#1F5560">VERTICAUX · MÉDICAL, LÉGAL, CODE</text>
  </g>

  <!-- bottom annotation -->
  <text x="60" y="720" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Lecture : axe X = la tâche admet-elle un vérificateur fiable (test, calcul, parseur) ? Axe Y = un signal final binaire suffit-il à former un agent stable ?</text>
  <text x="60" y="738" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Aucune trajectoire ne supprime le besoin de noter le chemin ; chacune redistribue qui le fait, où, à quel coût. Source : synthèse de l'auteur, mai 2026.</text>
</svg>
