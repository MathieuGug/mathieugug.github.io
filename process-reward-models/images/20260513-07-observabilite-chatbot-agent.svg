<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" data-schema-id="schema-07" role="img" aria-label="Schéma 07 — Observabilité step-level d'un chatbot agentique : boucle synchrone à gauche, audit out-of-band à droite">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
    </style>
    <marker id="arrow-g-07" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrow-c-07" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
    <marker id="arrow-t-07" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F5560"/>
    </marker>
  </defs>

  <rect width="1200" height="780" fill="#FAF8F3"/>

  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="1.92" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.28" fill="#1A1A1A">Auditer un chatbot agentique : la boucle et son ombre</text>
  <text x="60" y="118" class="display" font-style="italic" font-size="17" fill="#5A5A5A">La conversation tourne à gauche, à pleine vitesse. Le notateur lit l'historique à droite, sans la freiner.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- column dividers / column headers -->
  <line x1="600" y1="165" x2="600" y2="700" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="4 4"/>

  <text x="80" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#5A5A5A">1 · BOUCLE SYNCHRONE · CHEMIN CRITIQUE</text>
  <text x="620" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#B7332C">2 · AUDIT OUT-OF-BAND · COUCHE NOTATEUR</text>

  <!-- =========== LEFT : agentic loop =========== -->

  <!-- User input -->
  <g class="interactive" data-card="user-input" tabindex="0" role="button" aria-label="Message utilisateur entrant">
    <rect x="80" y="200" width="440" height="58" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="98" y="223" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#1F5560">USER · ENTRÉE</text>
    <text x="98" y="245" class="body" font-style="italic" font-size="13" fill="#1A1A1A">« Mon colis est en retard, je veux être remboursée. »</text>
  </g>

  <!-- arrow down to reasoner -->
  <line x1="300" y1="266" x2="300" y2="290" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-g-07)"/>

  <!-- Reasoner card -->
  <g class="interactive" data-card="reasoner" tabindex="0" role="button" aria-label="Reasoner Claude 4.x avec extended thinking et tool calls">
    <rect x="80" y="300" width="440" height="290" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="2"/>
    <text x="98" y="324" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#1F5560">REASONER · CLAUDE 4.X · EXTENDED THINKING</text>
    <text x="98" y="346" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Boucle thinking → tool → result → thinking…</text>

    <!-- Step 1 : thinking -->
    <rect x="98" y="362" width="404" height="32" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.5"/>
    <text x="112" y="375" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#5A5A5A">THINKING · 8 K BUDGET</text>
    <text x="112" y="389" class="body" font-style="italic" font-size="11" fill="#1A1A1A">« Identifions la commande puis vérifions le statut du tracker. »</text>

    <!-- Step 2 : tool_use -->
    <rect x="98" y="400" width="404" height="32" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.5"/>
    <text x="112" y="413" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#5A5A5A">TOOL_USE · LOOKUP_ORDER</text>
    <text x="112" y="427" class="mono" font-size="11" fill="#1A1A1A">{ "order_id": "ORD-19284" }</text>

    <!-- Step 3 : tool_result -->
    <rect x="98" y="438" width="404" height="32" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.5"/>
    <text x="112" y="451" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#5A5A5A">TOOL_RESULT</text>
    <text x="112" y="465" class="mono" font-size="11" fill="#1A1A1A">{ "status": "in_transit", "eta": "+3 jours" }</text>

    <!-- Step 4 : tool_use issue_refund -->
    <rect x="98" y="476" width="404" height="32" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="112" y="489" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#B7332C">TOOL_USE · ISSUE_REFUND · ⚠ SUSPECT</text>
    <text x="112" y="503" class="mono" font-size="11" fill="#1A1A1A">{ "amount": 89.0, "reason": "delay" }</text>

    <!-- Step 5 : text -->
    <rect x="98" y="514" width="404" height="32" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.5"/>
    <text x="112" y="527" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#5A5A5A">TEXT · RÉPONSE</text>
    <text x="112" y="541" class="body" font-style="italic" font-size="11" fill="#1A1A1A">« Désolé pour le délai — un remboursement de 89 € est en cours. »</text>

    <text x="98" y="572" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Le 👍 final arrive : la métrique d'entraînement est verte.</text>
  </g>

  <!-- arrow down to response -->
  <line x1="300" y1="598" x2="300" y2="622" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-g-07)"/>

  <!-- Response -->
  <g class="interactive" data-card="response" tabindex="0" role="button" aria-label="Réponse renvoyée à l'utilisateur">
    <rect x="80" y="632" width="440" height="48" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="98" y="652" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#1F5560">RESPONSE → USER · LATENCE 4,1 S</text>
    <text x="98" y="671" class="body" font-size="12" fill="#1A1A1A">Refund émis · thumbs-up reçu · trace persistée à T0+0 ms</text>
  </g>

  <!-- =========== Bridge : trace export OTel =========== -->
  <!-- horizontal arrow from Reasoner right edge into Trace store left edge -->
  <line x1="520" y1="445" x2="650" y2="280" stroke="#1F5560" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow-t-07)"/>
  <text x="540" y="368" class="mono" font-size="10" letter-spacing="1.3" fill="#1F5560" transform="rotate(-50 540 368)">trace OTel · async</text>

  <!-- =========== RIGHT : audit out-of-band =========== -->

  <!-- Trace store -->
  <g class="interactive" data-card="trace-store" tabindex="0" role="button" aria-label="Trace store OpenTelemetry gen_ai">
    <rect x="660" y="220" width="460" height="68" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="678" y="243" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#1F5560">TRACE STORE · OPENTELEMETRY GEN_AI.*</text>
    <text x="678" y="263" class="body" font-size="12" fill="#1A1A1A">spans : request · thinking · tool_call · tool_result · response</text>
    <text x="678" y="280" class="mono" font-size="11" fill="#5A5A5A">conversation_id · trace_id · timestamps · tokens</text>
  </g>

  <!-- arrow down -->
  <line x1="890" y1="296" x2="890" y2="318" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-g-07)"/>

  <!-- 3 probes -->
  <text x="678" y="334" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#5A5A5A">TROIS SONDES ORTHOGONALES</text>

  <!-- Probe A : Règle déterministe -->
  <g class="interactive" data-card="probe-rules" tabindex="0" role="button" aria-label="Sonde A : règles déterministes">
    <rect x="660" y="346" width="148" height="118" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="676" y="368" class="mono" font-size="10" font-weight="600" letter-spacing="1.3" fill="#1F5560">A · DÉTERMINISTE</text>
    <text x="676" y="389" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Règles</text>
    <text x="676" y="411" class="body" font-size="11" fill="#5A5A5A">precision = 1, recall</text>
    <text x="676" y="425" class="body" font-size="11" fill="#5A5A5A">étroit. Ex : refund</text>
    <text x="676" y="439" class="body" font-size="11" fill="#5A5A5A">&gt; 200 € sans</text>
    <text x="676" y="453" class="body" font-size="11" fill="#5A5A5A">escalate_to_human.</text>
  </g>

  <!-- Probe B : Judge LLM -->
  <g class="interactive" data-card="probe-judge" tabindex="0" role="button" aria-label="Sonde B : judge LLM step-level">
    <rect x="816" y="346" width="148" height="118" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="832" y="368" class="mono" font-size="10" font-weight="600" letter-spacing="1.3" fill="#B7332C">B · STEP-LEVEL</text>
    <text x="832" y="389" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Judge LLM</text>
    <text x="832" y="411" class="body" font-size="11" fill="#5A5A5A">Claude Haiku 4.5,</text>
    <text x="832" y="425" class="body" font-size="11" fill="#5A5A5A">large couverture,</text>
    <text x="832" y="439" class="body" font-size="11" fill="#5A5A5A">faux positifs élevés.</text>
    <text x="832" y="453" class="body" font-size="11" font-style="italic" fill="#B7332C">— hors loop d'entraînement</text>
  </g>

  <!-- Probe C : Humain -->
  <g class="interactive" data-card="probe-human" tabindex="0" role="button" aria-label="Sonde C : sampling humain ground-truth">
    <rect x="972" y="346" width="148" height="118" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="988" y="368" class="mono" font-size="10" font-weight="600" letter-spacing="1.3" fill="#1F5560">C · GROUND-TRUTH</text>
    <text x="988" y="389" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Humain</text>
    <text x="988" y="411" class="body" font-size="11" fill="#5A5A5A">Sampling 0,5–2 %.</text>
    <text x="988" y="425" class="body" font-size="11" fill="#5A5A5A">Calibre A et B,</text>
    <text x="988" y="439" class="body" font-size="11" fill="#5A5A5A">détecte les biais</text>
    <text x="988" y="453" class="body" font-size="11" fill="#5A5A5A">de catégorie.</text>
  </g>

  <!-- arrows down from each probe -->
  <line x1="734" y1="472" x2="734" y2="496" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-g-07)"/>
  <line x1="890" y1="472" x2="890" y2="496" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arrow-c-07)"/>
  <line x1="1046" y1="472" x2="1046" y2="496" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-g-07)"/>

  <!-- Outputs : Alerts + Metrics -->
  <g class="interactive" data-card="alerts" tabindex="0" role="button" aria-label="Alertes oncall pour les flags severity high">
    <rect x="660" y="506" width="220" height="68" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="678" y="528" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#B7332C">ALERTES ONCALL</text>
    <text x="678" y="548" class="body" font-size="12" fill="#1A1A1A">severity = high · PagerDuty</text>
    <text x="678" y="565" class="body" font-size="11" font-style="italic" fill="#5A5A5A">refund &gt; seuil sans escalade → page</text>
  </g>

  <g class="interactive" data-card="metrics" tabindex="0" role="button" aria-label="Métriques agrégées pour le dashboard">
    <rect x="900" y="506" width="220" height="68" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="918" y="528" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#1F5560">MÉTRIQUES AGRÉGÉES</text>
    <text x="918" y="548" class="body" font-size="12" fill="#1A1A1A">flag/min · dérive · taux</text>
    <text x="918" y="565" class="body" font-size="11" font-style="italic" fill="#5A5A5A">dashboard, weekly review, post-mortem</text>
  </g>

  <!-- Calibration loop -->
  <path d="M 1046 470 Q 1140 480 1140 530 Q 1140 580 1046 580" fill="none" stroke="#1F5560" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="1085" y="540" class="mono" font-size="9" letter-spacing="1.2" fill="#1F5560" text-anchor="middle">calibre →</text>

  <!-- =========== Footer / Caption =========== -->
  <line x1="60" y1="708" x2="1140" y2="708" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="730" class="body" font-style="italic" font-size="12" fill="#5A5A5A">Faithfulness CoT &lt; 50 % (§5) : la trace est un brouillon lisible, pas un journal de preuve. La couche notateur sert à détecter dérive et incohérence — pas à prouver l'absence d'un hack silencieux.</text>
  <text x="60" y="751" class="mono" font-size="10" letter-spacing="1.4" fill="#5A5A5A">SOURCE · ANTHROPIC EXTENDED THINKING API · OPENTELEMETRY GEN_AI SPEC · §5 §6 DE CE RAPPORT</text>
</svg>
