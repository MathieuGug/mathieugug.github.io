<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" data-schema-id="schema-02" role="img" aria-label="Schéma 02 — Math-Shepherd : annotation step-level par rollouts MCTS">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
    </style>
    <marker id="arrow-g-02" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrow-correct-02" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F5560"/>
    </marker>
    <marker id="arrow-wrong-02" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#FAF8F3"/>

  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="1.92" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.28" fill="#1A1A1A">Math-Shepherd : déduire la qualité d'une étape de ses rollouts</text>
  <text x="60" y="118" class="display" font-style="italic" font-size="17" fill="#5A5A5A">Pas d'humain dans la boucle : la valeur d'un état se lit dans la fréquence des bonnes feuilles.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ROOT STEP -->
  <g class="interactive" data-card="root-step" tabindex="0" role="button" aria-label="Étape candidate à annoter">
    <rect x="100" y="320" width="180" height="64" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <text x="190" y="345" text-anchor="middle" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#B7332C">ÉTAPE CANDIDATE</text>
    <text x="190" y="368" text-anchor="middle" class="body" font-size="13" font-weight="500" fill="#1A1A1A">« on pose x = 3y + 2 »</text>
    <text x="100" y="408" class="body" font-size="13" fill="#5A5A5A" font-style="italic">À évaluer : cette étape est-elle</text>
    <text x="100" y="426" class="body" font-size="13" fill="#5A5A5A" font-style="italic">une bonne ou une mauvaise idée ?</text>
  </g>

  <!-- ROLLOUT BRANCHES (8 trajectories) -->
  <g class="interactive" data-card="rollouts" tabindex="0" role="button" aria-label="Rollouts depuis l'étape candidate">
    <!-- text label -->
    <text x="430" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#5A5A5A">N ROLLOUTS DEPUIS L'ÉTAPE</text>
    <text x="430" y="218" class="body" font-size="12" fill="#5A5A5A" font-style="italic">le modèle complète librement la solution</text>

    <!-- arrows from root step splaying out -->
    <line x1="280" y1="335" x2="430" y2="260" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow-g-02)"/>
    <line x1="280" y1="345" x2="430" y2="305" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow-g-02)"/>
    <line x1="280" y1="355" x2="430" y2="350" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow-g-02)"/>
    <line x1="280" y1="365" x2="430" y2="395" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow-g-02)"/>
    <line x1="280" y1="370" x2="430" y2="440" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow-g-02)"/>
    <line x1="280" y1="376" x2="430" y2="485" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow-g-02)"/>
    <line x1="280" y1="376" x2="430" y2="530" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow-g-02)"/>
    <line x1="280" y1="378" x2="430" y2="575" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow-g-02)"/>

    <!-- mid-step boxes -->
    <rect x="440" y="248" width="140" height="28" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
    <text x="510" y="266" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">rollout 1 →</text>

    <rect x="440" y="293" width="140" height="28" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
    <text x="510" y="311" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">rollout 2 →</text>

    <rect x="440" y="338" width="140" height="28" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
    <text x="510" y="356" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">rollout 3 →</text>

    <rect x="440" y="383" width="140" height="28" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
    <text x="510" y="401" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">rollout 4 →</text>

    <rect x="440" y="428" width="140" height="28" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
    <text x="510" y="446" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">rollout 5 →</text>

    <rect x="440" y="473" width="140" height="28" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
    <text x="510" y="491" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">rollout 6 →</text>

    <rect x="440" y="518" width="140" height="28" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
    <text x="510" y="536" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">rollout 7 →</text>

    <rect x="440" y="563" width="140" height="28" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
    <text x="510" y="581" text-anchor="middle" class="body" font-size="11" fill="#5A5A5A">rollout 8 →</text>
  </g>

  <!-- LEAF OUTCOMES (correct/wrong) -->
  <g>
    <!-- arrows from mid to leaf -->
    <line x1="580" y1="262" x2="650" y2="262" stroke="#1F5560" stroke-width="1" marker-end="url(#arrow-correct-02)"/>
    <line x1="580" y1="307" x2="650" y2="307" stroke="#1F5560" stroke-width="1" marker-end="url(#arrow-correct-02)"/>
    <line x1="580" y1="352" x2="650" y2="352" stroke="#B7332C" stroke-width="1" marker-end="url(#arrow-wrong-02)"/>
    <line x1="580" y1="397" x2="650" y2="397" stroke="#1F5560" stroke-width="1" marker-end="url(#arrow-correct-02)"/>
    <line x1="580" y1="442" x2="650" y2="442" stroke="#1F5560" stroke-width="1" marker-end="url(#arrow-correct-02)"/>
    <line x1="580" y1="487" x2="650" y2="487" stroke="#1F5560" stroke-width="1" marker-end="url(#arrow-correct-02)"/>
    <line x1="580" y1="532" x2="650" y2="532" stroke="#B7332C" stroke-width="1" marker-end="url(#arrow-wrong-02)"/>
    <line x1="580" y1="577" x2="650" y2="577" stroke="#1F5560" stroke-width="1" marker-end="url(#arrow-correct-02)"/>

    <!-- leaf circles -->
    <circle cx="668" cy="262" r="9" fill="#1F5560"/>
    <text x="668" y="266" text-anchor="middle" class="mono" font-size="10" font-weight="600" fill="#FAF8F3">✓</text>
    <circle cx="668" cy="307" r="9" fill="#1F5560"/>
    <text x="668" y="311" text-anchor="middle" class="mono" font-size="10" font-weight="600" fill="#FAF8F3">✓</text>
    <circle cx="668" cy="352" r="9" fill="#B7332C"/>
    <text x="668" y="356" text-anchor="middle" class="mono" font-size="10" font-weight="600" fill="#FAF8F3">✗</text>
    <circle cx="668" cy="397" r="9" fill="#1F5560"/>
    <text x="668" y="401" text-anchor="middle" class="mono" font-size="10" font-weight="600" fill="#FAF8F3">✓</text>
    <circle cx="668" cy="442" r="9" fill="#1F5560"/>
    <text x="668" y="446" text-anchor="middle" class="mono" font-size="10" font-weight="600" fill="#FAF8F3">✓</text>
    <circle cx="668" cy="487" r="9" fill="#1F5560"/>
    <text x="668" y="491" text-anchor="middle" class="mono" font-size="10" font-weight="600" fill="#FAF8F3">✓</text>
    <circle cx="668" cy="532" r="9" fill="#B7332C"/>
    <text x="668" y="536" text-anchor="middle" class="mono" font-size="10" font-weight="600" fill="#FAF8F3">✗</text>
    <circle cx="668" cy="577" r="9" fill="#1F5560"/>
    <text x="668" y="581" text-anchor="middle" class="mono" font-size="10" font-weight="600" fill="#FAF8F3">✓</text>

    <text x="690" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#5A5A5A">RÉPONSE FINALE</text>
    <text x="690" y="218" class="body" font-size="12" fill="#5A5A5A" font-style="italic">vérifiée contre la ground-truth</text>
  </g>

  <!-- AGGREGATION -->
  <g class="interactive" data-card="aggregation" tabindex="0" role="button" aria-label="Agrégation des feuilles en label automatique">
    <!-- big bracket -->
    <line x1="720" y1="262" x2="720" y2="577" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="720" y1="262" x2="730" y2="262" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="720" y1="577" x2="730" y2="577" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="720" y1="420" x2="760" y2="420" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-g-02)"/>

    <rect x="770" y="380" width="320" height="84" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="2"/>
    <text x="790" y="408" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#B7332C">LABEL AUTOMATIQUE</text>
    <text x="790" y="434" class="display" font-size="22" font-weight="600" fill="#1A1A1A">6 / 8 → score = 0,75</text>
    <text x="790" y="454" class="body" font-size="12" fill="#5A5A5A">fréquence des feuilles correctes</text>
  </g>

  <!-- BOTTOM RESULT -->
  <g class="interactive" data-card="result" tabindex="0" role="button" aria-label="Performance Math-Shepherd sur Mistral-7B">
    <rect x="80" y="610" width="1060" height="60" rx="3" fill="#F2EFE7" stroke="#E5E1D8" stroke-width="1"/>
    <text x="100" y="637" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#1F5560">RÉSULTAT</text>
    <text x="100" y="657" class="body" font-size="13" fill="#1A1A1A">Mistral-7B + PPO step-by-step : <tspan font-weight="600">28,6 % → 33,0 %</tspan> sur MATH ; avec verification best-of-N : <tspan font-weight="600">43,5 %</tspan>. Aucun annotateur humain.</text>
  </g>

  <text x="60" y="690" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : Wang, P. et al., « Math-Shepherd: Verify and Reinforce LLMs Step-by-step without Human Annotations », arXiv:2312.08935 (ACL 2024).</text>
</svg>
