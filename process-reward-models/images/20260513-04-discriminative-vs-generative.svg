<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" data-schema-id="schema-04" role="img" aria-label="Schéma 04 — Verifier discriminatif vs verifier génératif">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
    </style>
    <marker id="arrow-g-04" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrow-c-04" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#FAF8F3"/>

  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="1.92" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.28" fill="#1A1A1A">Le verifier qui pense : du classifier à la critique générative</text>
  <text x="60" y="118" class="display" font-style="italic" font-size="17" fill="#5A5A5A">Quand le notateur exploite la chain-of-thought, il bat le classifier sur tous les axes.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============ LEFT : DISCRIMINATIVE ============ -->
  <g class="interactive" data-card="discriminative" tabindex="0" role="button" aria-label="Verifier discriminatif : un classifier binaire">
    <rect x="80" y="170" width="500" height="60" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="100" y="200" class="mono" font-size="12" font-weight="600" letter-spacing="1.5" fill="#1F5560">APPROCHE A · DISCRIMINATIF</text>
    <text x="100" y="222" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Classifier-PRM</text>

    <!-- input -->
    <rect x="100" y="260" width="460" height="48" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
    <text x="115" y="280" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#5A5A5A">INPUT</text>
    <text x="115" y="298" class="body" font-size="13" fill="#1A1A1A">« x = 3y + 2, y = 4 → x = 14 »</text>

    <!-- arrow down -->
    <line x1="330" y1="316" x2="330" y2="346" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-g-04)"/>

    <!-- model box -->
    <rect x="180" y="356" width="300" height="56" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.5"/>
    <text x="330" y="380" text-anchor="middle" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Verifier (head linéaire)</text>
    <text x="330" y="400" text-anchor="middle" class="body" font-size="12" fill="#5A5A5A">logits → softmax → P(correct)</text>

    <!-- arrow down -->
    <line x1="330" y1="420" x2="330" y2="450" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-g-04)"/>

    <!-- output -->
    <rect x="240" y="460" width="180" height="44" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="330" y="488" text-anchor="middle" class="mono" font-size="13" font-weight="600" fill="#1F5560">P(correct) = 0.83</text>

    <text x="100" y="552" class="body" font-size="13" fill="#5A5A5A" font-style="italic">Pas d'usage de la génération.</text>
    <text x="100" y="572" class="body" font-size="13" fill="#5A5A5A" font-style="italic">Pas de chain-of-thought de vérification.</text>
    <text x="100" y="592" class="body" font-size="13" fill="#5A5A5A" font-style="italic">Pas de bénéfice du compute test-time.</text>
  </g>

  <!-- divider -->
  <line x1="620" y1="170" x2="620" y2="600" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============ RIGHT : GENERATIVE ============ -->
  <g class="interactive" data-card="generative" tabindex="0" role="button" aria-label="Verifier génératif : produit Yes/No et une critique">
    <rect x="640" y="170" width="500" height="60" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <text x="660" y="200" class="mono" font-size="12" font-weight="600" letter-spacing="1.5" fill="#B7332C">APPROCHE B · GÉNÉRATIF</text>
    <text x="660" y="222" class="display" font-size="20" font-weight="600" fill="#1A1A1A">GenRM / ThinkPRM</text>

    <rect x="660" y="260" width="460" height="48" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
    <text x="675" y="280" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#5A5A5A">INPUT</text>
    <text x="675" y="298" class="body" font-size="13" fill="#1A1A1A">« x = 3y + 2, y = 4 → x = 14 »</text>

    <line x1="890" y1="316" x2="890" y2="346" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow-g-04)"/>

    <rect x="740" y="356" width="300" height="56" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="2"/>
    <text x="890" y="380" text-anchor="middle" class="display" font-size="16" font-weight="600" fill="#1A1A1A">LLM verifier (next-token)</text>
    <text x="890" y="400" text-anchor="middle" class="body" font-size="12" fill="#5A5A5A">génère une chaîne de critique</text>

    <line x1="890" y1="420" x2="890" y2="450" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arrow-c-04)"/>

    <!-- output : critique + verdict -->
    <rect x="660" y="460" width="460" height="92" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="675" y="480" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="#B7332C">CRITIQUE GÉNÉRÉE</text>
    <text x="675" y="500" class="body" font-style="italic" font-size="12" fill="#5A5A5A">« Vérifions : 3 × 4 + 2 = 14 ✓.</text>
    <text x="675" y="516" class="body" font-style="italic" font-size="12" fill="#5A5A5A">L'arithmétique est correcte. »</text>
    <text x="675" y="540" class="mono" font-size="14" font-weight="600" fill="#B7332C">VERDICT : Yes</text>
  </g>

  <!-- BOTTOM CALLOUT : performance -->
  <g class="interactive" data-card="performance" tabindex="0" role="button" aria-label="Performance comparée GenRM vs classifier">
    <rect x="80" y="620" width="1060" height="80" rx="3" fill="#F2EFE7" stroke="#E5E1D8" stroke-width="1"/>
    <text x="100" y="648" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#B7332C">GAINS BEST-OF-N — ZHANG et al. 2024 (ICLR 2025)</text>

    <text x="100" y="680" class="display" font-size="20" font-weight="600" fill="#1A1A1A">5 % → 45,3 %</text>
    <text x="100" y="697" class="body" font-size="12" fill="#5A5A5A">tâches algorithmiques (Last Letter Concatenation, Word Sorting)</text>

    <text x="430" y="680" class="display" font-size="20" font-weight="600" fill="#1A1A1A">73 % → 93,4 %</text>
    <text x="430" y="697" class="body" font-size="12" fill="#5A5A5A">GSM8K (math primaire)</text>

    <text x="760" y="680" class="display" font-size="20" font-weight="600" fill="#1A1A1A">1 % des labels</text>
    <text x="760" y="697" class="body" font-size="12" fill="#5A5A5A">ThinkPRM 2025 vs PRM discriminatif équivalent</text>
  </g>
</svg>
