<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" data-schema-id="schema-03" role="img" aria-label="Schéma 03 — Trois familles de récompenses : ORM, PRM, RLVR">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
    </style>
    <marker id="arrow-g-03" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#FAF8F3"/>

  <text x="60" y="55" class="mono" font-size="12" font-weight="600" letter-spacing="1.92" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.28" fill="#1A1A1A">Trois familles de récompenses pour le raisonnement</text>
  <text x="60" y="118" class="display" font-style="italic" font-size="17" fill="#5A5A5A">Du verifier appris au verifier symbolique : un même problème, trois architectures.</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- header row labels -->
  <text x="80" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#5A5A5A">SIGNAL</text>
  <text x="80" y="305" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#5A5A5A">VERIFIER</text>
  <text x="80" y="430" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#5A5A5A">COÛT</text>
  <text x="80" y="555" class="mono" font-size="11" font-weight="600" letter-spacing="1.5" fill="#5A5A5A">DOMAINES</text>

  <!-- divider lines -->
  <line x1="220" y1="218" x2="1140" y2="218" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="220" y1="343" x2="1140" y2="343" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="220" y1="468" x2="1140" y2="468" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="220" y1="593" x2="1140" y2="593" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ============ COLUMN 1 : ORM ============ -->
  <g class="interactive" data-card="orm-family" tabindex="0" role="button" aria-label="ORM : outcome reward model">
    <rect x="240" y="158" width="280" height="70" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="260" y="187" class="mono" font-size="12" font-weight="600" letter-spacing="1.5" fill="#1F5560">FAMILLE A</text>
    <text x="260" y="212" class="display" font-size="20" font-weight="600" fill="#1A1A1A">ORM</text>

    <text x="260" y="265" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Score binaire final</text>
    <text x="260" y="285" class="body" font-size="12" fill="#5A5A5A">un seul nombre à la fin</text>
    <text x="260" y="303" class="body" font-size="12" fill="#5A5A5A">de la chaîne complète</text>

    <text x="260" y="385" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Reward model appris</text>
    <text x="260" y="405" class="body" font-size="12" fill="#5A5A5A">classifier sur réponse</text>
    <text x="260" y="423" class="body" font-size="12" fill="#5A5A5A">finale uniquement</text>

    <text x="260" y="510" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Modéré</text>
    <text x="260" y="530" class="body" font-size="12" fill="#5A5A5A">~10K–100K paires</text>
    <text x="260" y="548" class="body" font-size="12" fill="#5A5A5A">de préférences humaines</text>

    <text x="260" y="630" class="body" font-size="13" fill="#5A5A5A">RLHF, summarisation,</text>
    <text x="260" y="648" class="body" font-size="13" fill="#5A5A5A">conversation, créatif</text>
  </g>

  <!-- ============ COLUMN 2 : PRM ============ -->
  <g class="interactive" data-card="prm-family" tabindex="0" role="button" aria-label="PRM : process reward model">
    <rect x="540" y="158" width="280" height="70" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <text x="560" y="187" class="mono" font-size="12" font-weight="600" letter-spacing="1.5" fill="#B7332C">FAMILLE B</text>
    <text x="560" y="212" class="display" font-size="20" font-weight="600" fill="#1A1A1A">PRM</text>

    <text x="560" y="265" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Vecteur de scores</text>
    <text x="560" y="285" class="body" font-size="12" fill="#5A5A5A">un score par étape</text>
    <text x="560" y="303" class="body" font-size="12" fill="#5A5A5A">de la chaîne</text>

    <text x="560" y="385" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Reward model appris</text>
    <text x="560" y="405" class="body" font-size="12" fill="#5A5A5A">classifier ou génératif</text>
    <text x="560" y="423" class="body" font-size="12" fill="#5A5A5A">step-level</text>

    <text x="560" y="510" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Élevé</text>
    <text x="560" y="530" class="body" font-size="12" fill="#5A5A5A">~100K–1M labels step,</text>
    <text x="560" y="548" class="body" font-size="12" fill="#5A5A5A">humains ou MCTS</text>

    <text x="560" y="630" class="body" font-size="13" fill="#5A5A5A">Math, code complexe,</text>
    <text x="560" y="648" class="body" font-size="13" fill="#5A5A5A">raisonnement multi-étape</text>
  </g>

  <!-- ============ COLUMN 3 : RLVR ============ -->
  <g class="interactive" data-card="rlvr-family" tabindex="0" role="button" aria-label="RLVR : reinforcement learning with verifiable rewards">
    <rect x="840" y="158" width="280" height="70" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="860" y="187" class="mono" font-size="12" font-weight="600" letter-spacing="1.5" fill="#1F5560">FAMILLE C</text>
    <text x="860" y="212" class="display" font-size="20" font-weight="600" fill="#1A1A1A">RLVR</text>

    <text x="860" y="265" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Score binaire final</text>
    <text x="860" y="285" class="body" font-size="12" fill="#5A5A5A">propagé par GRPO/PPO</text>
    <text x="860" y="303" class="body" font-size="12" fill="#5A5A5A">sur tous les tokens</text>

    <text x="860" y="385" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Vérificateur symbolique</text>
    <text x="860" y="405" class="body" font-size="12" fill="#5A5A5A">calculateur, compilateur,</text>
    <text x="860" y="423" class="body" font-size="12" fill="#5A5A5A">test unitaire, parseur</text>

    <text x="860" y="510" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Marginal</text>
    <text x="860" y="530" class="body" font-size="12" fill="#5A5A5A">~10K–100K problèmes</text>
    <text x="860" y="548" class="body" font-size="12" fill="#5A5A5A">avec ground-truth</text>

    <text x="860" y="630" class="body" font-size="13" fill="#5A5A5A">Math, code, jeux,</text>
    <text x="860" y="648" class="body" font-size="13" fill="#5A5A5A">sciences vérifiables</text>
  </g>

  <!-- LEGEND BOTTOM -->
  <text x="60" y="700" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Sources : Lightman 2023 (ORM/PRM) · Wang 2024 Math-Shepherd (PRM auto) · DeepSeek-AI 2025 DeepSeek-R1 (RLVR + GRPO) · Razin 2025 (analyse RLVR).</text>
</svg>
