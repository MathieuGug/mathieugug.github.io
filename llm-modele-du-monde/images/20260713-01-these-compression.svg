<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arw01" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1A1A1A"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">La thèse de la compression — et sa faille</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Prédire assez bien forcerait un modèle du monde. Mais il y a toujours plus d'une façon de prédire.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Chain -->
  <g class="interactive" data-card="predict" tabindex="0" role="button" aria-label="Prédire le prochain token">
    <rect x="70" y="300" width="230" height="96" rx="4" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.25"/>
    <text x="185" y="340" class="body" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">Prédire</text>
    <text x="185" y="362" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle">le prochain token</text>
    <text x="185" y="383" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">seul objectif d'entraînement</text>
  </g>

  <line x1="300" y1="348" x2="392" y2="348" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arw01)"/>

  <g class="interactive" data-card="compress" tabindex="0" role="button" aria-label="Comprimer la source">
    <rect x="406" y="300" width="230" height="96" rx="4" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.25"/>
    <text x="521" y="340" class="body" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">Comprimer</text>
    <text x="521" y="362" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle">= capturer la structure</text>
    <text x="521" y="383" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">prédire ⇒ compresser</text>
  </g>

  <!-- Fork -->
  <line x1="636" y1="348" x2="705" y2="348" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="712" cy="348" r="7" fill="#B7332C"/>
  <text x="712" y="326" class="mono" font-size="11" fill="#B7332C" text-anchor="middle">≥ 1 façon de prédire</text>
  <path d="M718,344 C755,344 760,258 800,258" fill="none" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arw01)"/>
  <path d="M718,352 C755,352 760,438 800,438" fill="none" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arw01)"/>

  <g class="interactive" data-card="issue-vrai-modele" tabindex="0" role="button" aria-label="Vrai modèle du monde">
    <rect x="814" y="212" width="316" height="96" rx="4" fill="#1F5560" fill-opacity="0.16" stroke="#1F5560" stroke-width="1.5"/>
    <text x="832" y="246" class="body" font-size="15" font-weight="600" fill="#1F5560">Vrai modèle du monde</text>
    <text x="832" y="270" class="body" font-size="13" fill="#1A1A1A">carte compacte, cohérente,</text>
    <text x="832" y="290" class="body" font-size="13" fill="#1A1A1A">causalement branchée</text>
  </g>

  <g class="interactive" data-card="issue-patchwork" tabindex="0" role="button" aria-label="Patchwork d'heuristiques">
    <rect x="814" y="392" width="316" height="96" rx="4" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1.5"/>
    <text x="832" y="426" class="body" font-size="15" font-weight="600" fill="#B7332C">Patchwork d'heuristiques</text>
    <text x="832" y="450" class="body" font-size="13" fill="#1A1A1A">règles locales, associations,</text>
    <text x="832" y="470" class="body" font-size="13" fill="#1A1A1A">mémorisation par cas</text>
  </g>

  <!-- Divergence banner -->
  <line x1="70" y1="580" x2="1130" y2="580" stroke="#E5E1D8" stroke-width="1"/>
  <rect x="70" y="600" width="510" height="120" rx="4" fill="#FFFFFF" stroke="#E5E1D8" stroke-width="1"/>
  <text x="90" y="632" class="mono" font-size="12" letter-spacing="2" fill="#5A5A5A">SUR LA DISTRIBUTION D'ENTRAÎNEMENT</text>
  <text x="90" y="664" class="display" font-size="19" font-style="italic" fill="#1A1A1A">Sorties identiques.</text>
  <text x="90" y="694" class="body" font-size="13" fill="#5A5A5A">Les deux stratégies sont indiscernables par la seule performance.</text>

  <rect x="620" y="600" width="510" height="120" rx="4" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
  <text x="640" y="632" class="mono" font-size="12" letter-spacing="2" fill="#B7332C">HORS DISTRIBUTION</text>
  <text x="640" y="664" class="display" font-size="19" font-style="italic" fill="#1A1A1A">Divergence radicale.</text>
  <text x="640" y="694" class="body" font-size="13" fill="#5A5A5A">C'est l'écart que la recherche a appris à mesurer (§4-§5).</text>
</svg>
