<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arw02" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1A1A1A"/></marker>
    <marker id="arw02c" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#B7332C"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Anatomie d'une sonde linéaire</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Othello-GPT n'a jamais vu le plateau. On le retrouve pourtant dans ses activations — et on peut l'éditer.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Input sequence -->
  <text x="70" y="205" class="mono" font-size="12" fill="#5A5A5A">Entrée : suite de coups (aucune règle, aucun plateau)</text>
  <g class="mono" font-size="13" fill="#1A1A1A">
    <rect x="70" y="220" width="46" height="30" rx="3" fill="#FFFFFF" stroke="#E5E1D8"/><text x="93" y="240" text-anchor="middle">E4</text>
    <rect x="122" y="220" width="46" height="30" rx="3" fill="#FFFFFF" stroke="#E5E1D8"/><text x="145" y="240" text-anchor="middle">D3</text>
    <rect x="174" y="220" width="46" height="30" rx="3" fill="#FFFFFF" stroke="#E5E1D8"/><text x="197" y="240" text-anchor="middle">C5</text>
    <rect x="226" y="220" width="46" height="30" rx="3" fill="#FFFFFF" stroke="#E5E1D8"/><text x="249" y="240" text-anchor="middle">F6</text>
    <text x="282" y="240">…</text>
  </g>

  <!-- Model / activations -->
  <g class="interactive" data-card="activations" tabindex="0" role="button" aria-label="Activations internes">
    <rect x="70" y="300" width="240" height="240" rx="4" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25"/>
    <text x="190" y="330" class="body" font-size="14" font-weight="600" fill="#1F5560" text-anchor="middle">Othello-GPT</text>
    <line x1="95" y1="348" x2="285" y2="348" stroke="#1F5560" stroke-opacity="0.3"/>
    <text x="190" y="368" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">couche 1 · 2 · 3 · 4 · …</text>
    <!-- activation vector -->
    <g>
      <rect x="120" y="400" width="20" height="100" fill="#1F5560" fill-opacity="0.25"/>
      <rect x="145" y="400" width="20" height="100" fill="#1F5560" fill-opacity="0.55"/>
      <rect x="170" y="400" width="20" height="100" fill="#1F5560" fill-opacity="0.15"/>
      <rect x="195" y="400" width="20" height="100" fill="#1F5560" fill-opacity="0.70"/>
      <rect x="220" y="400" width="20" height="100" fill="#1F5560" fill-opacity="0.35"/>
    </g>
    <text x="190" y="522" class="mono" font-size="10.5" fill="#1A1A1A" text-anchor="middle">vecteur d'activation (couche 4+)</text>
  </g>
  <line x1="197" y1="252" x2="197" y2="296" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arw02)"/>

  <!-- Probe -->
  <line x1="310" y1="420" x2="392" y2="420" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arw02)"/>
  <g class="interactive" data-card="probe-lineaire" tabindex="0" role="button" aria-label="Sonde linéaire">
    <rect x="406" y="360" width="200" height="120" rx="4" fill="#B58A2C" fill-opacity="0.12" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="506" y="392" class="body" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">Sonde linéaire</text>
    <text x="506" y="416" class="mono" font-size="13" fill="#B58A2C" text-anchor="middle">y = W · h</text>
    <text x="506" y="444" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">un simple classifieur</text>
    <text x="506" y="462" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">linéaire entraîné</text>
  </g>

  <!-- Board reconstructed -->
  <line x1="606" y1="420" x2="700" y2="420" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arw02)"/>
  <g class="interactive" data-card="board-reconstruit" tabindex="0" role="button" aria-label="Plateau reconstruit">
    <text x="880" y="330" class="body" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">Plateau reconstruit — référentiel joueur</text>
    <g stroke="#E5E1D8" stroke-width="1">
      <!-- 8x8 grid, 38px cells, origin 720,350 -->
      <rect x="720" y="350" width="320" height="320" fill="#FFFFFF"/>
      <!-- sample fills: teal=MINE, carmine=YOURS -->
      <rect x="796" y="426" width="40" height="40" fill="#1F5560" fill-opacity="0.55"/>
      <rect x="836" y="426" width="40" height="40" fill="#B7332C" fill-opacity="0.5"/>
      <rect x="836" y="466" width="40" height="40" fill="#1F5560" fill-opacity="0.55"/>
      <rect x="876" y="466" width="40" height="40" fill="#B7332C" fill-opacity="0.5"/>
      <rect x="876" y="426" width="40" height="40" fill="#1F5560" fill-opacity="0.55"/>
      <rect x="796" y="466" width="40" height="40" fill="#B7332C" fill-opacity="0.5"/>
      <!-- grid lines -->
      <line x1="760" y1="350" x2="760" y2="670"/><line x1="800" y1="350" x2="800" y2="670"/><line x1="840" y1="350" x2="840" y2="670"/><line x1="880" y1="350" x2="880" y2="670"/><line x1="920" y1="350" x2="920" y2="670"/><line x1="960" y1="350" x2="960" y2="670"/><line x1="1000" y1="350" x2="1000" y2="670"/>
      <line x1="720" y1="390" x2="1040" y2="390"/><line x1="720" y1="430" x2="1040" y2="430"/><line x1="720" y1="470" x2="1040" y2="470"/><line x1="720" y1="510" x2="1040" y2="510"/><line x1="720" y1="550" x2="1040" y2="550"/><line x1="720" y1="590" x2="1040" y2="590"/><line x1="720" y1="630" x2="1040" y2="630"/>
      <rect x="720" y="350" width="320" height="320" fill="none" stroke="#1A1A1A" stroke-width="1.25"/>
    </g>
    <rect x="720" y="692" width="18" height="14" fill="#1F5560" fill-opacity="0.55"/><text x="744" y="704" class="mono" font-size="11" fill="#5A5A5A">MINE</text>
    <rect x="820" y="692" width="18" height="14" fill="#B7332C" fill-opacity="0.5"/><text x="844" y="704" class="mono" font-size="11" fill="#5A5A5A">YOURS</text>
    <rect x="930" y="692" width="18" height="14" fill="#FFFFFF" stroke="#E5E1D8"/><text x="954" y="704" class="mono" font-size="11" fill="#5A5A5A">EMPTY</text>
    <text x="1040" y="704" class="mono" font-size="12" fill="#1F5560" text-anchor="end" font-weight="600">précision &gt; 99 %</text>
  </g>

  <!-- Intervention -->
  <g class="interactive" data-card="intervention" tabindex="0" role="button" aria-label="Intervention causale">
    <path d="M796,440 C560,600 360,600 190,548" fill="none" stroke="#B7332C" stroke-width="1.75" stroke-dasharray="6 5" marker-end="url(#arw02c)"/>
    <rect x="410" y="560" width="360" height="72" rx="4" fill="#B7332C" fill-opacity="0.07" stroke="#B7332C" stroke-width="1.25"/>
    <text x="590" y="588" class="body" font-size="14" font-weight="600" fill="#B7332C" text-anchor="middle">Intervention causale</text>
    <text x="590" y="612" class="body" font-size="12.5" fill="#1A1A1A" text-anchor="middle">on édite le vecteur → le modèle joue dans le nouvel état</text>
  </g>
</svg>
