<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arw06" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#5A5A5A"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Le piège du benchmark</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Réussir un examen humain ne mesure la compréhension que si la machine se trompe comme un humain.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Définir -->
  <g class="interactive" data-card="definir" tabindex="0" role="button" aria-label="Définir — ce que mesure le benchmark">
    <rect x="80" y="205" width="360" height="150" rx="4" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.5"/>
    <text x="100" y="240" class="mono" font-size="11" letter-spacing="2" fill="#1F5560">CE QUE MESURE LE BENCHMARK</text>
    <text x="100" y="272" class="body" font-size="18" font-weight="600" fill="#1A1A1A">Définir le concept</text>
    <text x="100" y="302" class="body" font-size="13" fill="#5A5A5A">Le modèle donne la bonne définition.</text>
    <circle cx="115" cy="326" r="9" fill="#1F5560"/><path d="M110,326 l4,4 l7,-8" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <text x="132" y="331" class="body" font-size="13" fill="#1F5560" font-weight="600">réponse correcte</text>
  </g>

  <!-- inference broken -->
  <text x="600" y="252" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle">l'inférence tacite :</text>
  <text x="600" y="274" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">définir ⇒ appliquer</text>
  <line x1="450" y1="300" x2="560" y2="300" stroke="#5A5A5A" stroke-width="1.5" marker-end="url(#arw06)"/>
  <line x1="640" y1="300" x2="750" y2="300" stroke="#5A5A5A" stroke-width="1.5" marker-end="url(#arw06)"/>
  <g stroke="#B7332C" stroke-width="3"><line x1="588" y1="288" x2="612" y2="312"/><line x1="612" y1="288" x2="588" y2="312"/></g>
  <text x="600" y="338" class="body" font-size="11.5" fill="#B7332C" text-anchor="middle">valide chez l'humain,</text>
  <text x="600" y="354" class="body" font-size="11.5" fill="#B7332C" text-anchor="middle">rompue chez le LLM</text>

  <!-- Appliquer -->
  <g class="interactive" data-card="appliquer" tabindex="0" role="button" aria-label="Appliquer — où le modèle se contredit">
    <rect x="760" y="205" width="360" height="150" rx="4" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.5"/>
    <text x="780" y="240" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">CE QUE LE BENCHMARK NE VOIT PAS</text>
    <text x="780" y="272" class="body" font-size="18" font-weight="600" fill="#1A1A1A">Appliquer le concept</text>
    <text x="780" y="302" class="body" font-size="13" fill="#5A5A5A">Le modèle se contredit dès l'usage.</text>
    <g stroke="#B7332C" stroke-width="2.5"><line x1="789" y1="320" x2="801" y2="332"/><line x1="801" y1="320" x2="789" y2="332"/></g>
    <text x="814" y="331" class="body" font-size="13" fill="#B7332C" font-weight="600">incohérence</text>
  </g>

  <line x1="60" y1="410" x2="1140" y2="410" stroke="#E5E1D8"/>
  <text x="60" y="448" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Deux façons de mentir</text>

  <!-- Hallucination -->
  <g class="interactive" data-card="hallucination" tabindex="0" role="button" aria-label="Hallucination">
    <rect x="80" y="470" width="500" height="250" rx="4" fill="#FFFFFF" stroke="#E5E1D8" stroke-width="1.25"/>
    <text x="105" y="512" class="body" font-size="18" font-weight="600" fill="#5A5A5A">Hallucination</text>
    <text x="105" y="540" class="mono" font-size="11" letter-spacing="1" fill="#5A5A5A">CONNAISSANCE FACTUELLE</text>
    <line x1="105" y1="558" x2="555" y2="558" stroke="#E5E1D8"/>
    <text x="105" y="592" class="body" font-size="14" fill="#1A1A1A">Fabrique un <tspan font-weight="600">faux fait</tspan>.</text>
    <text x="105" y="628" class="body" font-size="13" fill="#5A5A5A">« La tour Eiffel mesure 450 m. »</text>
    <text x="105" y="676" class="body" font-size="12.5" font-style="italic" fill="#5A5A5A">Une donnée est fausse ; le concept</text>
    <text x="105" y="695" class="body" font-size="12.5" font-style="italic" fill="#5A5A5A">reste, lui, correctement manié.</text>
  </g>

  <!-- Potemkine -->
  <g class="interactive" data-card="potemkine" tabindex="0" role="button" aria-label="Potemkine">
    <rect x="620" y="470" width="500" height="250" rx="4" fill="#B7332C" fill-opacity="0.07" stroke="#B7332C" stroke-width="1.5"/>
    <text x="645" y="512" class="body" font-size="18" font-weight="600" fill="#B7332C">Potemkine</text>
    <text x="645" y="540" class="mono" font-size="11" letter-spacing="1" fill="#B7332C">CONNAISSANCE CONCEPTUELLE</text>
    <line x1="645" y1="558" x2="1095" y2="558" stroke="#B7332C" stroke-opacity="0.3"/>
    <text x="645" y="592" class="body" font-size="14" fill="#1A1A1A">Fabrique une <tspan font-weight="600">fausse cohérence</tspan>.</text>
    <text x="645" y="628" class="body" font-size="13" fill="#5A5A5A">Définit juste, applique faux.</text>
    <text x="645" y="676" class="body" font-size="12.5" font-style="italic" fill="#5A5A5A">La façade conceptuelle tient ;</text>
    <text x="645" y="695" class="body" font-size="12.5" font-style="italic" fill="#5A5A5A">rien ne la soutient. Ubiquitaire.</text>
  </g>
</svg>
