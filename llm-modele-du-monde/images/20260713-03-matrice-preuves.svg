<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Le faisceau converge</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Quatre études indépendantes, du jouet synthétique au vrai LLM : le même signal.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- column headers -->
  <text x="80" y="192" class="mono" font-size="11" letter-spacing="2" fill="#5A5A5A">ÉTUDE</text>
  <text x="370" y="192" class="mono" font-size="11" letter-spacing="2" fill="#5A5A5A">VARIABLE DU MONDE RÉCUPÉRÉE</text>
  <text x="700" y="192" class="mono" font-size="11" letter-spacing="2" fill="#5A5A5A">PREUVE</text>
  <text x="960" y="192" class="mono" font-size="11" letter-spacing="2" fill="#5A5A5A">PORTÉE</text>
  <line x1="60" y1="205" x2="1140" y2="205" stroke="#1A1A1A" stroke-width="1"/>

  <!-- row 1 : Othello -->
  <g class="interactive" data-card="othello" tabindex="0" role="button" aria-label="Othello-GPT">
    <rect x="60" y="210" width="1080" height="120" fill="#1F5560" fill-opacity="0.04"/>
    <text x="80" y="252" class="body" font-size="17" font-weight="600" fill="#1A1A1A">Othello-GPT</text>
    <text x="80" y="276" class="mono" font-size="11.5" fill="#5A5A5A">Li 2023 · Nanda 2023</text>
    <text x="80" y="300" class="body" font-size="12" fill="#5A5A5A">jouet synthétique</text>
    <text x="370" y="258" class="body" font-size="13.5" fill="#1A1A1A">État du plateau, en référentiel</text>
    <text x="370" y="278" class="body" font-size="13.5" fill="#1A1A1A">joueur (MINE / YOURS / EMPTY)</text>
    <text x="700" y="258" class="body" font-size="13.5" fill="#1A1A1A">Sonde linéaire &gt; 99 %</text>
    <text x="700" y="278" class="body" font-size="13.5" fill="#1A1A1A">+ intervention causale</text>
    <rect x="960" y="242" width="150" height="26" rx="13" fill="#1F5560" fill-opacity="0.14"/>
    <text x="1035" y="260" class="mono" font-size="12" fill="#1F5560" text-anchor="middle">preuve nette</text>
  </g>
  <line x1="60" y1="330" x2="1140" y2="330" stroke="#E5E1D8"/>

  <!-- row 2 : Échecs -->
  <g class="interactive" data-card="echecs" tabindex="0" role="button" aria-label="Chess-GPT">
    <rect x="60" y="330" width="1080" height="120" fill="#1F5560" fill-opacity="0.0"/>
    <text x="80" y="372" class="body" font-size="17" font-weight="600" fill="#1A1A1A">Chess-GPT</text>
    <text x="80" y="396" class="mono" font-size="11.5" fill="#5A5A5A">Karvonen 2024</text>
    <text x="80" y="420" class="body" font-size="12" fill="#5A5A5A">parties réelles, texte brut</text>
    <text x="370" y="378" class="body" font-size="13.5" fill="#1A1A1A">Échiquier + variable latente</text>
    <text x="370" y="398" class="body" font-size="13.5" fill="#1A1A1A">jamais écrite : le niveau du joueur</text>
    <text x="700" y="378" class="body" font-size="13.5" fill="#1A1A1A">Sonde + intervention ;</text>
    <text x="700" y="398" class="body" font-size="13.5" fill="#1A1A1A">« vecteur de niveau » → victoires ×2,6</text>
    <rect x="960" y="362" width="150" height="26" rx="13" fill="#1F5560" fill-opacity="0.14"/>
    <text x="1035" y="380" class="mono" font-size="12" fill="#1F5560" text-anchor="middle">preuve nette</text>
  </g>
  <line x1="60" y1="450" x2="1140" y2="450" stroke="#E5E1D8"/>

  <!-- row 3 : Karel -->
  <g class="interactive" data-card="karel" tabindex="0" role="button" aria-label="Programmes Karel">
    <rect x="60" y="450" width="1080" height="120" fill="#1F5560" fill-opacity="0.04"/>
    <text x="80" y="492" class="body" font-size="17" font-weight="600" fill="#1A1A1A">Programmes Karel</text>
    <text x="80" y="516" class="mono" font-size="11.5" fill="#5A5A5A">Jin &amp; Rinard 2024</text>
    <text x="80" y="540" class="body" font-size="12" fill="#5A5A5A">code de navigation</text>
    <text x="370" y="498" class="body" font-size="13.5" fill="#1A1A1A">Sémantique des états</text>
    <text x="370" y="518" class="body" font-size="13.5" fill="#1A1A1A">intermédiaires du programme</text>
    <text x="700" y="498" class="body" font-size="13.5" fill="#1A1A1A">Sonde dont la précision</text>
    <text x="700" y="518" class="body" font-size="13.5" fill="#1A1A1A">croît au fil de l'entraînement</text>
    <rect x="960" y="482" width="150" height="26" rx="13" fill="#1F5560" fill-opacity="0.14"/>
    <text x="1035" y="500" class="mono" font-size="12" fill="#1F5560" text-anchor="middle">preuve nette</text>
  </g>
  <line x1="60" y1="570" x2="1140" y2="570" stroke="#E5E1D8"/>

  <!-- row 4 : Space/Time -->
  <g class="interactive" data-card="espace-temps" tabindex="0" role="button" aria-label="Espace et temps dans Llama-2">
    <rect x="60" y="570" width="1080" height="120" fill="#B58A2C" fill-opacity="0.05"/>
    <text x="80" y="612" class="body" font-size="17" font-weight="600" fill="#1A1A1A">Espace &amp; temps</text>
    <text x="80" y="636" class="mono" font-size="11.5" fill="#5A5A5A">Gurnee &amp; Tegmark 2024</text>
    <text x="80" y="660" class="body" font-size="12" fill="#B58A2C" font-weight="600">vrai LLM : Llama-2</text>
    <text x="370" y="618" class="body" font-size="13.5" fill="#1A1A1A">Coordonnées spatiales et</text>
    <text x="370" y="638" class="body" font-size="13.5" fill="#1A1A1A">temporelles, unifiées entre entités</text>
    <text x="700" y="618" class="body" font-size="13.5" fill="#1A1A1A">Sondes de régression ;</text>
    <text x="700" y="638" class="body" font-size="13.5" fill="#1A1A1A">« neurones d'espace » et « de temps »</text>
    <rect x="960" y="602" width="150" height="26" rx="13" fill="#B58A2C" fill-opacity="0.18"/>
    <text x="1035" y="620" class="mono" font-size="12" fill="#B58A2C" text-anchor="middle">à l'échelle</text>
  </g>
  <line x1="60" y1="690" x2="1140" y2="690" stroke="#1A1A1A" stroke-width="1"/>
  <text x="60" y="720" class="body" font-size="13" font-style="italic" fill="#5A5A5A">Un même verdict : entraîné seulement à prédire, un transformeur construit des représentations structurées, linéaires et causalement actives.</text>
</svg>
