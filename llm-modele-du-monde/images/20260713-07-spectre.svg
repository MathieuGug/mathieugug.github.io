<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Le spectre du modèle du monde</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Non pas un oui/non, mais quatre exigences emboîtées, de plus en plus dures.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- staircase, baseline y=660 -->
  <!-- Step 1 -->
  <g class="interactive" data-card="palier-1-surface" tabindex="0" role="button" aria-label="Palier 1 — corrélations de surface">
    <rect x="70" y="565" width="258" height="95" fill="#B8B5AE" fill-opacity="0.22" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="86" y="595" class="mono" font-size="12" fill="#5A5A5A">PALIER 1</text>
    <text x="86" y="620" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Corrélations</text>
    <text x="86" y="640" class="body" font-size="15" font-weight="600" fill="#1A1A1A">de surface</text>
  </g>
  <!-- Step 2 -->
  <g class="interactive" data-card="palier-2-etat" tabindex="0" role="button" aria-label="Palier 2 — état récupérable">
    <rect x="328" y="470" width="258" height="190" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1.25"/>
    <text x="344" y="500" class="mono" font-size="12" fill="#1F5560">PALIER 2</text>
    <text x="344" y="525" class="body" font-size="15" font-weight="600" fill="#1A1A1A">État récupérable</text>
    <text x="344" y="552" class="body" font-size="12.5" fill="#5A5A5A">une variable est décodable</text>
    <text x="344" y="570" class="body" font-size="12.5" fill="#5A5A5A">et causalement active</text>
    <text x="344" y="600" class="body" font-size="11.5" font-style="italic" fill="#1F5560">Othello · échecs · Karel ·</text>
    <text x="344" y="617" class="body" font-size="11.5" font-style="italic" fill="#1F5560">espace-temps</text>
  </g>
  <!-- Step 3 -->
  <g class="interactive" data-card="palier-3-coherent" tabindex="0" role="button" aria-label="Palier 3 — modèle cohérent">
    <rect x="586" y="375" width="258" height="285" fill="#1F5560" fill-opacity="0.20" stroke="#1F5560" stroke-width="1.5"/>
    <text x="602" y="405" class="mono" font-size="12" fill="#1F5560">PALIER 3</text>
    <text x="602" y="430" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Modèle cohérent</text>
    <text x="602" y="457" class="body" font-size="12.5" fill="#5A5A5A">une carte unique, sans</text>
    <text x="602" y="475" class="body" font-size="12.5" fill="#5A5A5A">contradiction (compression</text>
    <text x="602" y="493" class="body" font-size="12.5" fill="#5A5A5A">et distinction réussies)</text>
    <text x="602" y="523" class="body" font-size="11.5" font-style="italic" fill="#B7332C">manque au modèle des taxis</text>
    <text x="602" y="540" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">de Vafa ; atteint en</text>
    <text x="602" y="557" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">domaines étroits</text>
  </g>
  <!-- Step 4 -->
  <g class="interactive" data-card="palier-4-loi" tabindex="0" role="button" aria-label="Palier 4 — loi générative correcte">
    <rect x="844" y="280" width="258" height="380" fill="#B58A2C" fill-opacity="0.16" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="860" y="310" class="mono" font-size="12" fill="#B58A2C">PALIER 4</text>
    <text x="860" y="335" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Loi générative</text>
    <text x="860" y="355" class="body" font-size="15" font-weight="600" fill="#1A1A1A">correcte</text>
    <text x="860" y="385" class="body" font-size="12.5" fill="#5A5A5A">la structure causale qui</text>
    <text x="860" y="403" class="body" font-size="12.5" fill="#5A5A5A">généralise à des tâches</text>
    <text x="860" y="421" class="body" font-size="12.5" fill="#5A5A5A">inédites</text>
    <text x="860" y="452" class="body" font-size="13" font-weight="600" font-style="italic" fill="#B58A2C">Newton, pas Kepler</text>
    <text x="860" y="480" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">non atteint, même par</text>
    <text x="860" y="497" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">les modèles cohérents</text>
  </g>

  <line x1="70" y1="660" x2="1102" y2="660" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="70" y="690" class="body" font-size="13" fill="#5A5A5A">exigence croissante · la performance seule ne distingue pas ces paliers</text>
  <text x="1102" y="690" class="body" font-size="13" fill="#1A1A1A" text-anchor="end">seule la perturbation les sépare →</text>

  <!-- 2026 position marker -->
  <path d="M457,468 C457,430 590,430 640,395" fill="none" stroke="#B7332C" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="360" y="200" width="470" height="56" rx="4" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1"/>
  <text x="380" y="225" class="body" font-size="13" font-weight="600" fill="#B7332C">Où en sont les systèmes de 2026</text>
  <text x="380" y="245" class="body" font-size="12.5" fill="#5A5A5A">solidement au palier 2, palier 3 en domaines étroits, palier 4 hors d'atteinte.</text>
</svg>
