<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arw05t" markerWidth="9" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1F5560"/></marker>
    <marker id="arw05c" markerWidth="9" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#B7332C"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Kepler, pas Newton</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Prédire parfaitement l'orbite ne prouve pas qu'on a capturé la loi. La preuve arrive avec la tâche suivante.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- LEFT : orbit both predict identically -->
  <g class="interactive" data-card="meme-prediction" tabindex="0" role="button" aria-label="Même prédiction de l'orbite">
    <text x="80" y="192" class="mono" font-size="12" letter-spacing="1" fill="#5A5A5A">LES DEUX MODÈLES PRÉDISENT L'ORBITE À L'IDENTIQUE</text>
    <rect x="70" y="205" width="520" height="360" rx="4" fill="#FFFFFF" stroke="#E5E1D8" stroke-width="1"/>
    <ellipse cx="340" cy="385" rx="220" ry="135" fill="none" stroke="#1F5560" stroke-width="2.5"/>
    <ellipse cx="340" cy="385" rx="220" ry="135" fill="none" stroke="#B7332C" stroke-width="2.5" stroke-dasharray="8 7"/>
    <circle cx="470" cy="385" r="16" fill="#B58A2C" fill-opacity="0.85"/>
    <text x="470" y="420" class="mono" font-size="11" fill="#B58A2C" text-anchor="middle">foyer</text>
    <circle cx="340" cy="250" r="9" fill="#1A1A1A"/>
    <rect x="330" y="530" width="18" height="12" fill="#1F5560"/><text x="356" y="540" class="mono" font-size="11" fill="#5A5A5A">modèle N</text>
    <rect x="440" y="530" width="18" height="12" fill="#B7332C"/><text x="466" y="540" class="mono" font-size="11" fill="#5A5A5A">modèle K</text>
    <text x="200" y="540" class="body" font-size="12" fill="#5A5A5A">prédictions superposées</text>
  </g>

  <!-- method callout -->
  <g class="interactive" data-card="biais-inductif" tabindex="0" role="button" aria-label="Sonde de biais inductif">
    <rect x="70" y="590" width="520" height="135" rx="4" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="90" y="622" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Sonde de biais inductif</text>
    <text x="90" y="650" class="body" font-size="12.5" fill="#5A5A5A">On ne sonde plus ce que le modèle <tspan font-style="italic">représente</tspan>, mais comment il</text>
    <text x="90" y="670" class="body" font-size="12.5" fill="#5A5A5A"><tspan font-style="italic">s'adapte</tspan> à de petites tâches issues d'un modèle du monde postulé.</text>
    <text x="90" y="698" class="body" font-size="12.5" fill="#5A5A5A">Un modèle qui a intériorisé la loi apprend avec son biais.</text>
  </g>

  <!-- RIGHT : new task -->
  <text x="650" y="192" class="mono" font-size="12" letter-spacing="1" fill="#B7332C">NOUVELLE TÂCHE : PRÉDIRE LE VECTEUR DE FORCE</text>

  <g class="interactive" data-card="kepler" tabindex="0" role="button" aria-label="Modèle Kepler échoue">
    <rect x="640" y="205" width="490" height="245" rx="4" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="662" y="238" class="body" font-size="14" font-weight="600" fill="#B7332C">Modèle « Kepler » — heuristiques par tâche</text>
    <circle cx="885" cy="345" r="12" fill="#B58A2C" fill-opacity="0.7"/>
    <!-- scattered incoherent force arrows -->
    <line x1="760" y1="300" x2="720" y2="270" stroke="#B7332C" stroke-width="2" marker-end="url(#arw05c)"/>
    <line x1="1010" y1="320" x2="1060" y2="300" stroke="#B7332C" stroke-width="2" marker-end="url(#arw05c)"/>
    <line x1="820" y1="410" x2="800" y2="440" stroke="#B7332C" stroke-width="2" marker-end="url(#arw05c)"/>
    <line x1="970" y1="400" x2="1010" y2="425" stroke="#B7332C" stroke-width="2" marker-end="url(#arw05c)"/>
    <line x1="900" y1="270" x2="905" y2="235" stroke="#B7332C" stroke-width="2" marker-end="url(#arw05c)"/>
    <text x="885" y="432" class="body" font-size="12.5" fill="#5A5A5A" text-anchor="middle">forces incohérentes — ne généralise pas</text>
  </g>

  <g class="interactive" data-card="newton" tabindex="0" role="button" aria-label="Modèle Newton réussit">
    <rect x="640" y="470" width="490" height="245" rx="4" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.5"/>
    <text x="662" y="503" class="body" font-size="14" font-weight="600" fill="#1F5560">Modèle « Newton » — loi générative</text>
    <circle cx="885" cy="605" r="12" fill="#B58A2C" fill-opacity="0.7"/>
    <!-- radial force arrows pointing toward the sun -->
    <line x1="760" y1="560" x2="850" y2="592" stroke="#1F5560" stroke-width="2" marker-end="url(#arw05t)"/>
    <line x1="1010" y1="560" x2="920" y2="592" stroke="#1F5560" stroke-width="2" marker-end="url(#arw05t)"/>
    <line x1="770" y1="655" x2="852" y2="618" stroke="#1F5560" stroke-width="2" marker-end="url(#arw05t)"/>
    <line x1="1000" y1="660" x2="918" y2="618" stroke="#1F5560" stroke-width="2" marker-end="url(#arw05t)"/>
    <line x1="885" y1="520" x2="885" y2="580" stroke="#1F5560" stroke-width="2" marker-end="url(#arw05t)"/>
    <text x="885" y="695" class="body" font-size="12.5" fill="#5A5A5A" text-anchor="middle">force radiale correcte — généralise à des tâches inédites</text>
  </g>
</svg>
