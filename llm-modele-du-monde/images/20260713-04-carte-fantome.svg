<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">La carte fantôme</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Le modèle des taxis donne des itinéraires presque parfaits — sur une carte de Manhattan qui n'existe pas.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- LEFT : true map -->
  <g class="interactive" data-card="carte-vraie" tabindex="0" role="button" aria-label="Vraie carte de Manhattan">
    <text x="80" y="192" class="mono" font-size="12" letter-spacing="1" fill="#1F5560">VRAIE MANHATTAN — grille cohérente</text>
    <rect x="70" y="205" width="470" height="340" rx="4" fill="#FFFFFF" stroke="#1F5560" stroke-width="1.25"/>
    <g stroke="#1F5560" stroke-opacity="0.55" stroke-width="1.5">
      <line x1="130" y1="205" x2="130" y2="545"/><line x1="200" y1="205" x2="200" y2="545"/><line x1="270" y1="205" x2="270" y2="545"/><line x1="340" y1="205" x2="340" y2="545"/><line x1="410" y1="205" x2="410" y2="545"/><line x1="480" y1="205" x2="480" y2="545"/>
      <line x1="70" y1="265" x2="540" y2="265"/><line x1="70" y1="325" x2="540" y2="325"/><line x1="70" y1="385" x2="540" y2="385"/><line x1="70" y1="445" x2="540" y2="445"/><line x1="70" y1="505" x2="540" y2="505"/>
    </g>
    <!-- a route -->
    <path d="M130,505 L130,325 L340,325 L340,265" fill="none" stroke="#1A1A1A" stroke-width="3"/>
    <circle cx="130" cy="505" r="6" fill="#1A1A1A"/><circle cx="340" cy="265" r="6" fill="#B7332C"/>
    <text x="305" y="535" class="body" font-size="12" fill="#5A5A5A">itinéraire valide</text>
  </g>

  <!-- RIGHT : implicit map -->
  <g class="interactive" data-card="carte-implicite" tabindex="0" role="button" aria-label="Carte implicite du modèle">
    <text x="650" y="192" class="mono" font-size="12" letter-spacing="1" fill="#B7332C">CARTE IMPLICITE DU MODÈLE — incohérente</text>
    <rect x="640" y="205" width="470" height="340" rx="4" fill="#FFFFFF" stroke="#B7332C" stroke-width="1.25"/>
    <!-- distorted base grid -->
    <g stroke="#B8B5AE" stroke-width="1.2">
      <line x1="700" y1="205" x2="710" y2="545"/><line x1="770" y1="205" x2="758" y2="545"/><line x1="840" y1="205" x2="852" y2="545"/><line x1="912" y1="205" x2="905" y2="545"/><line x1="980" y1="205" x2="992" y2="545"/><line x1="1050" y1="205" x2="1044" y2="545"/>
      <line x1="640" y1="265" x2="1110" y2="272"/><line x1="640" y1="326" x2="1110" y2="318"/><line x1="640" y1="386" x2="1110" y2="392"/><line x1="640" y1="446" x2="1110" y2="440"/><line x1="640" y1="505" x2="1110" y2="510"/>
    </g>
  </g>

  <!-- phantom streets (own clickable region, drawn on top) -->
  <g class="interactive" data-card="rues-fantomes" tabindex="0" role="button" aria-label="Rues fantômes">
    <line x1="700" y1="500" x2="905" y2="300" stroke="#B7332C" stroke-width="2.5" stroke-dasharray="7 5"/>
    <line x1="770" y1="270" x2="1050" y2="470" stroke="#B7332C" stroke-width="2.5" stroke-dasharray="7 5"/>
    <line x1="840" y1="520" x2="990" y2="230" stroke="#B7332C" stroke-width="2.5" stroke-dasharray="7 5"/>
    <circle cx="905" cy="300" r="5" fill="#B7332C"/><circle cx="1050" cy="470" r="5" fill="#B7332C"/>
    <rect x="820" y="470" width="240" height="60" rx="4" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="940" y="494" class="body" font-size="12.5" font-weight="600" fill="#B7332C" text-anchor="middle">Rues fantômes</text>
    <text x="940" y="514" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">segments qui traversent des immeubles</text>
  </g>

  <!-- fragility -->
  <g class="interactive" data-card="fragilite-detour" tabindex="0" role="button" aria-label="Fragilité au détour">
    <line x1="60" y1="590" x2="1140" y2="590" stroke="#E5E1D8"/>
    <text x="80" y="630" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Le test qui trahit le vernis : fermer 1 % des rues (un simple détour)</text>
    <!-- bar 100% -->
    <text x="80" y="672" class="mono" font-size="12" fill="#5A5A5A">avant</text>
    <rect x="160" y="658" width="500" height="24" rx="3" fill="#1F5560" fill-opacity="0.55"/>
    <text x="672" y="676" class="mono" font-size="14" fill="#1F5560" font-weight="600">≈ 100 %</text>
    <!-- bar 67% -->
    <text x="80" y="712" class="mono" font-size="12" fill="#5A5A5A">après</text>
    <rect x="160" y="698" width="335" height="24" rx="3" fill="#B7332C" fill-opacity="0.5"/>
    <text x="507" y="716" class="mono" font-size="14" fill="#B7332C" font-weight="600">67 %</text>
    <text x="760" y="690" class="body" font-size="13" fill="#5A5A5A">La justesse s'effondre :</text>
    <text x="760" y="710" class="body" font-size="13" fill="#5A5A5A">la performance était un vernis.</text>
  </g>
</svg>
