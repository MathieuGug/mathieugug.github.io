<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anatomie d'un système agentique — un livre en dix couches</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #faf6ec;
  --paper-2: #f3eedf;
  --paper-3: #ede6d2;
  --ink: #1e1e2a;
  --ink-2: #3b3f4d;
  --ink-3: #6b6f7c;
  --ink-faint: #9a9ca5;
  --line: rgba(30,30,44,0.10);
  --line-strong: rgba(30,30,44,0.22);
  --accent: #b8582e;
  --pink: #a83e55;
  --gold: #8a6a2c;
  --core: #c34e3a;
  --shadow: 0 30px 80px rgba(30,25,18,0.18), 0 10px 30px rgba(30,25,18,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Inter', sans-serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  background: #2b2620;
  background:
    radial-gradient(ellipse at 30% 30%, #3a332a 0%, #1f1c17 65%);
}

/* Stage: fixed 1600x1100 book, scaled to viewport */
.stage {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
.book-frame {
  width: 1600px;
  height: 1100px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: center center;
  /* transform set by JS: translate(-50%,-50%) scale(s) */
}

/* ═════ BOOK ═════ */
.book {
  position: absolute;
  inset: 0;
  display: flex;
  filter: drop-shadow(0 40px 80px rgba(0,0,0,0.45));
}
.page {
  position: relative;
  width: 800px;
  height: 1100px;
  background: var(--paper);
  overflow: hidden;
}
.page.left {
  border-radius: 4px 0 0 4px;
  background:
    linear-gradient(270deg, rgba(30,20,10,0.12) 0%, transparent 4%),
    var(--paper);
}
.page.right {
  border-radius: 0 4px 4px 0;
  background:
    linear-gradient(90deg, rgba(30,20,10,0.14) 0%, transparent 5%),
    var(--paper);
}
/* Spine seam */
.book::before {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 18px;
  background:
    linear-gradient(90deg,
      rgba(0,0,0,0.05) 0%,
      rgba(0,0,0,0.28) 40%,
      rgba(0,0,0,0.35) 50%,
      rgba(0,0,0,0.28) 60%,
      rgba(0,0,0,0.05) 100%);
  z-index: 5;
  pointer-events: none;
}

/* Paper grain on every page */
.page::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 12% 22%, rgba(80,60,40,0.035) 0.8px, transparent 1px),
    radial-gradient(circle at 68% 74%, rgba(80,60,40,0.025) 1px, transparent 1.2px),
    radial-gradient(circle at 35% 88%, rgba(80,60,40,0.03) 0.8px, transparent 1px),
    radial-gradient(circle at 82% 18%, rgba(80,60,40,0.02) 1px, transparent 1.2px);
  background-size: 7px 7px, 11px 11px, 13px 13px, 9px 9px;
  opacity: 0.85;
  mix-blend-mode: multiply;
  z-index: 2;
}

/* ═════ PAGE CONTENT ═════ */
.page-inner {
  position: absolute;
  inset: 0;
  padding: 90px 80px 80px 80px;
  display: flex;
  flex-direction: column;
  z-index: 3;
}
.page.left .page-inner { padding-left: 90px; padding-right: 70px; }
.page.right .page-inner { padding-left: 70px; padding-right: 90px; }

/* Running header */
.running-head {
  position: absolute;
  top: 42px;
  left: 80px;
  right: 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faint);
  z-index: 4;
}
.page.left .running-head { padding-left: 10px; }
.page.right .running-head { padding-right: 10px; }
.running-head .dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  vertical-align: middle;
  margin: 0 8px;
}

/* Folio (page number) */
.folio {
  position: absolute;
  bottom: 42px;
  left: 0;
  right: 0;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--ink-faint);
  z-index: 4;
}
.page.left .folio { text-align: left; padding-left: 90px; }
.page.right .folio { text-align: right; padding-right: 90px; }

/* ═════ LEFT PAGE TYPE ═════ */
.layer-num {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 140px;
  line-height: 0.9;
  letter-spacing: -0.04em;
  color: var(--ink);
  margin-bottom: 6px;
  display: flex;
  align-items: baseline;
  gap: 20px;
}
.layer-num .couche {
  font-family: 'JetBrains Mono', monospace;
  font-style: normal;
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faint);
  align-self: flex-end;
  padding-bottom: 18px;
}
.layer-title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 44px;
  line-height: 1.08;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin-top: 8px;
  margin-bottom: 28px;
  max-width: 580px;
}
.layer-title em { font-style: italic; color: var(--accent); font-weight: 500; }

.rule {
  width: 44px;
  height: 2px;
  background: var(--accent);
  margin: 0 0 26px;
}

.question {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 22px;
  line-height: 1.35;
  color: var(--ink-2);
  letter-spacing: -0.005em;
  margin-bottom: 30px;
  padding-left: 18px;
  border-left: 2px solid var(--layer-color, var(--accent));
  max-width: 560px;
}
.question em { font-style: italic; color: var(--accent); }

.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--layer-color, var(--accent));
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--layer-color, var(--accent)) 0%, transparent 100%);
  opacity: 0.35;
}

.narrative {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 15.5px;
  line-height: 1.7;
  color: var(--ink-2);
  margin-bottom: 28px;
  max-width: 580px;
  text-wrap: pretty;
  hyphens: auto;
}
.narrative strong { color: var(--ink); font-weight: 500; }
.narrative em { color: var(--ink); font-style: italic; }
.narrative code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  background: rgba(184,88,46,0.08);
  color: var(--accent);
  padding: 1px 6px;
  border-radius: 3px;
}

.kw-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 26px;
  max-width: 580px;
}
.kw-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.02em;
  padding: 4px 10px;
  border: 1px solid var(--line-strong);
  border-radius: 100px;
  color: var(--ink-2);
  background: rgba(255,253,246,0.6);
}

.roles-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 26px;
  max-width: 580px;
}
.role-chip {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 11px 9px 9px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--paper-2);
  font-size: 12px;
  color: var(--ink-2);
  min-width: 0;
}
.role-chip .av {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 11.5px;
  color: #fff;
  letter-spacing: 0.02em;
  flex-shrink: 0;
  margin-top: 1px;
}
.role-chip .role-txt { min-width: 0; flex: 1; }
.role-chip .role-name {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 12px;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 2px;
}
.role-chip .role-mission {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 10.5px;
  line-height: 1.4;
  color: var(--ink-3);
  text-wrap: pretty;
}
.role-chip .role-mission em { color: var(--ink-2); font-style: italic; }

.risk {
  margin-top: auto;
  padding: 18px 20px;
  background: linear-gradient(135deg, rgba(168,62,85,0.08), rgba(255,253,246,0.5));
  border: 1px solid rgba(168,62,85,0.25);
  border-left-width: 3px;
  border-radius: 4px;
  max-width: 580px;
}
.risk-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--pink);
  margin-bottom: 8px;
  font-weight: 500;
}
.risk-text {
  font-family: 'Inter', sans-serif;
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--ink-2);
  font-weight: 300;
}
.risk-text strong { color: var(--pink); font-weight: 500; }
.risk-text em { color: var(--ink); font-style: italic; }
.risk-text code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  background: rgba(168,62,85,0.1);
  color: var(--pink);
  padding: 1px 5px;
  border-radius: 3px;
}

/* ═════ RIGHT PAGE — ILLUSTRATION (cover / toc / close) ═════ */
.illus-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px;
  z-index: 3;
}
.illus-svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}
.illus-caption {
  position: absolute;
  bottom: 90px;
  left: 90px;
  right: 90px;
  text-align: center;
  z-index: 4;
}
.illus-cap-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 6px;
}
.illus-cap-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 17px;
  color: var(--ink-2);
  line-height: 1.35;
  letter-spacing: -0.005em;
}
.illus-cap-title em { color: var(--accent); }

/* ═════ RIGHT PAGE — CONCEPT SHEET (layer spreads) ═════ */
.concepts-inner {
  position: absolute;
  inset: 0;
  padding: 90px 90px 80px 70px;
  display: flex;
  flex-direction: column;
  z-index: 3;
}
.concepts-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 4px;
}
.concepts-title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 30px;
  line-height: 1.05;
  letter-spacing: -0.015em;
  color: var(--ink);
}
.concepts-title em { font-style: italic; color: var(--layer-color, var(--accent)); }
.concepts-mini {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.concepts-mini .mini-svg {
  width: 38px;
  height: 38px;
}
.concepts-lede {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink-3);
  margin-top: 6px;
  margin-bottom: 22px;
  max-width: 560px;
  font-style: italic;
}
.concepts-rule {
  height: 2px;
  background: var(--layer-color, var(--accent));
  width: 44px;
  margin-bottom: 24px;
}
.defs-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.def-item {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 18px;
  padding: 14px 0;
  border-top: 1px solid var(--line);
  align-items: baseline;
}
.def-item:last-child { border-bottom: 1px solid var(--line); }
.def-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--layer-color, var(--accent));
  padding-top: 3px;
  font-weight: 500;
}
.def-term {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 17px;
  color: var(--ink);
  letter-spacing: -0.005em;
  margin-bottom: 4px;
  line-height: 1.2;
}
.def-term em { font-style: italic; }
.def-body {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--ink-2);
  text-wrap: pretty;
}
.def-body strong { color: var(--ink); font-weight: 500; }
.def-body em { color: var(--ink); font-style: italic; }
.def-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  background: rgba(184,88,46,0.08);
  color: var(--layer-color, var(--accent));
  padding: 1px 5px;
  border-radius: 3px;
}
.concepts-footer {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px dashed var(--line);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faint);
  display: flex;
  justify-content: space-between;
}

/* ═════ COVER ═════ */
.cover-left {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: flex-start;
  padding: 120px 90px 100px;
  position: absolute;
  inset: 0;
  z-index: 3;
}
.cover-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
}
.cover-eyebrow span.bar {
  display: inline-block;
  width: 40px;
  height: 2px;
  background: var(--accent);
  vertical-align: middle;
  margin-right: 14px;
}
.cover-title {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 88px;
  line-height: 0.94;
  letter-spacing: -0.03em;
  color: var(--ink);
  margin-top: 40px;
}
.cover-title em {
  font-style: italic;
  color: var(--accent);
  font-weight: 400;
}
.cover-sub {
  margin-top: 32px;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 24px;
  line-height: 1.35;
  color: var(--ink-2);
  max-width: 520px;
}
.cover-meta {
  margin-top: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  line-height: 1.9;
}
.cover-meta strong { color: var(--ink-2); font-weight: 500; }

/* Cover right — big ornamental onion */
.cover-right-content {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  z-index: 3;
}

/* ═════ TOC PAGE ═════ */
.toc-inner {
  padding: 90px 80px 80px;
  height: 100%;
  display: flex;
  flex-direction: column;
}
.toc-head {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 38px;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
}
.toc-head em { font-style: italic; color: var(--accent); }
.toc-sub {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 14px;
  color: var(--ink-3);
  max-width: 560px;
  line-height: 1.6;
  margin-bottom: 44px;
}
.toc-list { display: flex; flex-direction: column; gap: 0; }
.toc-item {
  display: grid;
  grid-template-columns: 36px 16px 1fr auto 36px;
  gap: 16px;
  align-items: center;
  padding: 14px 4px;
  border-top: 1px solid var(--line);
  cursor: pointer;
  transition: padding 0.2s ease, background 0.2s ease;
  font-family: 'Fraunces', serif;
}
.toc-item:last-child { border-bottom: 1px solid var(--line); }
.toc-item:hover { background: rgba(184,88,46,0.04); padding-left: 10px; }
.toc-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.12em;
  color: var(--ink-faint);
  text-align: right;
}
.toc-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.toc-title {
  font-size: 18px;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.toc-short {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.toc-folio {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  text-align: right;
}

/* ═════ CLOSING PAGE ═════ */
.closing-inner {
  padding: 120px 90px 100px;
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  z-index: 3;
}
.closing-quote {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 32px;
  line-height: 1.3;
  color: var(--ink);
  letter-spacing: -0.01em;
  margin-bottom: 28px;
  max-width: 560px;
}
.closing-quote::before {
  content: '“';
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 96px;
  line-height: 0.6;
  color: var(--accent);
  display: block;
  margin-bottom: 8px;
}
.closing-attr {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 48px;
}
.closing-body {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 15.5px;
  line-height: 1.75;
  color: var(--ink-2);
  max-width: 560px;
  margin-bottom: auto;
}
.closing-body strong { color: var(--ink); font-weight: 500; }
.closing-body em { color: var(--ink); font-style: italic; }
.closing-sig {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--ink-2);
  padding-top: 18px;
  border-top: 1px solid var(--line);
}

/* ═════ COLOPHON ═════ */
.colophon-inner {
  padding: 100px 90px 100px;
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  z-index: 3;
}
.colophon-head {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
}
.colophon-title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 28px;
  line-height: 1.2;
  margin-bottom: 8px;
}
.colophon-title em { font-style: italic; color: var(--accent); }
.colophon-intro {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--ink-3);
  margin-bottom: 32px;
  max-width: 540px;
}
.col-group { margin-bottom: 24px; }
.col-group h4 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--line);
}
.col-group ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.col-group li {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 12px;

  line-height: 1.4;
}
.col-group li strong { color: var(--ink); font-weight: 500; }
.col-group li em { color: var(--ink-2); font-style: italic; }

/* ═════ NAV CONTROLS ═════ */
.nav {
  position: fixed;
  bottom: 26px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 14px;
  z-index: 60;
  background: rgba(250,246,236,0.94);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 8px 8px 8px 20px;
  border-radius: 100px;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.nav button {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.1);
  background: #fff;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: all 0.2s ease;
  color: var(--ink);
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 20px;
  line-height: 1;
}
.nav button:hover:not(:disabled) {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  transform: translateY(-1px);
}
.nav button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.nav .spread-idx {
  min-width: 80px;
  text-align: center;
  color: var(--ink-2);
  font-weight: 500;
}
.nav .spread-idx b { color: var(--accent); font-weight: 500; }

.toc-toggle {
  position: fixed;
  top: 26px;
  right: 26px;
  z-index: 60;
  padding: 10px 16px 10px 14px;
  background: rgba(250,246,236,0.94);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 100px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.2s ease;
}
.toc-toggle:hover { color: var(--accent); }
.toc-toggle .icon {
  display: flex;
  flex-direction: column;
  gap: 2.5px;
  width: 14px;
}
.toc-toggle .icon span {
  display: block;
  height: 1.5px;
  background: currentColor;
  border-radius: 1px;
}
.toc-toggle .icon span:nth-child(1) { width: 100%; }
.toc-toggle .icon span:nth-child(2) { width: 70%; }
.toc-toggle .icon span:nth-child(3) { width: 85%; }

/* ═════ PAGE TURN TRANSITION ═════ */
.spread {
  position: absolute;
  inset: 0;
  display: flex;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
.spread.active {
  opacity: 1;
  pointer-events: auto;
}

/* Subtle enter animation for active spread */
.spread.active .page-inner > *,
.spread.active .cover-left > *,
.spread.active .closing-inner > *,
.spread.active .colophon-inner > *,
.spread.active .toc-inner > *,
.spread.active .illus-wrap,
.spread.active .illus-caption {
  animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) backwards;
}
.spread.active .page-inner > *:nth-child(1) { animation-delay: 0.08s; }
.spread.active .page-inner > *:nth-child(2) { animation-delay: 0.12s; }
.spread.active .page-inner > *:nth-child(3) { animation-delay: 0.16s; }
.spread.active .page-inner > *:nth-child(4) { animation-delay: 0.20s; }
.spread.active .page-inner > *:nth-child(5) { animation-delay: 0.24s; }
.spread.active .page-inner > *:nth-child(6) { animation-delay: 0.28s; }
.spread.active .page-inner > *:nth-child(7) { animation-delay: 0.32s; }
.spread.active .page-inner > *:nth-child(8) { animation-delay: 0.36s; }
.spread.active .illus-wrap { animation-delay: 0.15s; }
.spread.active .illus-caption { animation-delay: 0.40s; }

@keyframes rise {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═════ SVG RINGS ═════ */
.ring-fill { transition: fill-opacity 0.5s ease, fill 0.5s ease; }
.ring-stroke { transition: stroke-opacity 0.5s ease, stroke-width 0.4s ease; }
.ring-tick { transition: stroke-opacity 0.4s ease; }
.ring-label-text { transition: fill 0.4s ease, opacity 0.4s ease; }
