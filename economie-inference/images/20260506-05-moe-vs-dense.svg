<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="t05">
<title id="t05">MoE vs dense — l'arbitrage VRAM / FLOPs</title>
<defs>
<style>
  .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
  .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
  .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
  .interactive { cursor: pointer; }
</style>
<marker id="arrow05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#5A5A5A"/>
</marker>
</defs>
<rect width="900" height="900" fill="#FAF8F3"/>

<!-- Header -->
<text x="60" y="62" class="mono" font-size="11" font-weight="600" letter-spacing="0.18em" fill="#B7332C">SCHÉMA 05 — MoE vs DENSE</text>
<text x="60" y="100" class="display" font-size="24" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">L'arbitrage de l'inférence sparse.</text>
<text x="60" y="124" class="display" font-size="14" font-style="italic" fill="#5A5A5A">Paramètres totaux (VRAM, en abscisse) × paramètres actifs par token (FLOPs, en ordonnée).</text>
<line x1="60" y1="144" x2="840" y2="144" stroke="#E5E1D8" stroke-width="1"/>

<!-- Plot area: x=140..820, y=200..720 -->
<!-- X axis: total params (log) 7B → 700B -->
<!-- Y axis: active params (log) 1B → 100B -->
<line x1="140" y1="200" x2="140" y2="720" stroke="#1A1A1A" stroke-width="1.25"/>
<line x1="140" y1="720" x2="820" y2="720" stroke="#1A1A1A" stroke-width="1.25"/>

<!-- X axis labels (log: 7B at x=140, 70B at x=400, 700B at x=660) -->
<g class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">
  <text x="140" y="744">7 B</text>
  <text x="270" y="744">~20 B</text>
  <text x="400" y="744">70 B</text>
  <text x="530" y="744">~200 B</text>
  <text x="660" y="744">700 B</text>
</g>
<text x="480" y="772" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">Paramètres totaux (VRAM requise) →</text>

<!-- Y axis labels (log: 1B at y=720, 10B at y=480, 100B at y=240) -->
<g class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">
  <text x="130" y="724">1 B</text>
  <text x="130" y="604">~3 B</text>
  <text x="130" y="484">10 B</text>
  <text x="130" y="364">~30 B</text>
  <text x="130" y="244">100 B</text>
</g>
<text x="60" y="460" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90 60 460)">↑ Paramètres actifs par token (FLOPs)</text>

<!-- Gridlines -->
<g stroke="#E5E1D8" stroke-width="0.5">
  <line x1="270" y1="200" x2="270" y2="720"/>
  <line x1="400" y1="200" x2="400" y2="720"/>
  <line x1="530" y1="200" x2="530" y2="720"/>
  <line x1="660" y1="200" x2="660" y2="720"/>
  <line x1="140" y1="600" x2="820" y2="600"/>
  <line x1="140" y1="480" x2="820" y2="480"/>
  <line x1="140" y1="360" x2="820" y2="360"/>
  <line x1="140" y1="240" x2="820" y2="240"/>
</g>

<!-- Diagonal "dense line": active = total -->
<line x1="140" y1="640" x2="660" y2="240" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="3 3"/>
<text x="540" y="354" class="body" font-size="11" font-style="italic" fill="#5A5A5A" transform="rotate(-30 540 354)">ligne « dense » : actif = total</text>

<!-- MoE region (below the diagonal) -->
<path d="M 270,720 L 660,240 L 820,240 L 820,720 Z" fill="#1F5560" fill-opacity="0.05"/>
<text x="700" y="500" class="body" font-size="11" font-style="italic" fill="#1F5560">zone MoE</text>
<text x="700" y="516" class="body" font-size="11" font-style="italic" fill="#1F5560">actif &lt; total</text>

<!-- Dense models (on or near diagonal) -->
<g class="interactive" data-card="dense-llama7b" tabindex="0" role="button" aria-label="Llama 3 8B (dense)">
  <circle cx="160" cy="624" r="9" fill="#1F5560" stroke="#FAF8F3" stroke-width="2"/>
  <text x="180" y="620" class="body" font-size="11" fill="#1A1A1A">Llama 3 8B</text>
  <text x="180" y="634" class="body" font-size="10" font-style="italic" fill="#5A5A5A">8 B / 8 B · dense</text>
</g>

<g class="interactive" data-card="dense-llama70b" tabindex="0" role="button" aria-label="Llama 3 70B (dense)">
  <circle cx="400" cy="318" r="11" fill="#1F5560" stroke="#FAF8F3" stroke-width="2"/>
  <text x="416" y="314" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Llama 3 70B</text>
  <text x="416" y="328" class="body" font-size="10" font-style="italic" fill="#5A5A5A">70 B / 70 B · dense</text>
</g>

<g class="interactive" data-card="dense-llama405b" tabindex="0" role="button" aria-label="Llama 3.1 405B (dense)">
  <circle cx="600" cy="240" r="13" fill="#1F5560" stroke="#FAF8F3" stroke-width="2"/>
  <text x="586" y="218" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="end">Llama 3.1 405B</text>
  <text x="586" y="232" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="end">405 B / 405 B · dense</text>
</g>

<!-- MoE models (below diagonal) -->
<g class="interactive" data-card="moe-mixtral" tabindex="0" role="button" aria-label="Mixtral 8x7B">
  <circle cx="320" cy="448" r="11" fill="#B7332C" stroke="#FAF8F3" stroke-width="2"/>
  <text x="336" y="444" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Mixtral 8×7B</text>
  <text x="336" y="458" class="body" font-size="10" font-style="italic" fill="#5A5A5A">47 B / 13 B</text>
</g>

<g class="interactive" data-card="moe-deepseek" tabindex="0" role="button" aria-label="DeepSeek V3 (671B / 37B actifs)">
  <circle cx="660" cy="338" r="14" fill="#B7332C" stroke="#FAF8F3" stroke-width="2"/>
  <text x="678" y="334" class="body" font-size="11" font-weight="600" fill="#1A1A1A">DeepSeek V3</text>
  <text x="678" y="348" class="body" font-size="10" font-style="italic" fill="#5A5A5A">671 B / 37 B</text>
</g>

<g class="interactive" data-card="moe-llama4" tabindex="0" role="button" aria-label="Llama 4 Maverick (~400B / 17B actifs)">
  <circle cx="600" cy="494" r="12" fill="#B7332C" stroke="#FAF8F3" stroke-width="2"/>
  <text x="618" y="490" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Llama 4 Maverick</text>
  <text x="618" y="504" class="body" font-size="10" font-style="italic" fill="#5A5A5A">~400 B / 17 B</text>
</g>

<!-- Annotations -->
<g class="interactive" data-card="annotation-vram" tabindex="0" role="button" aria-label="Coût VRAM (axe X)">
  <circle cx="80" cy="800" r="9" fill="#B7332C"/>
  <text x="80" y="804" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>
  <text x="100" y="804" class="body" font-size="11" fill="#1A1A1A">Hosting (VRAM, prix d'entrée) : suit l'axe X — DeepSeek V3 demande la VRAM d'un dense 671B.</text>
</g>
<g class="interactive" data-card="annotation-flops" tabindex="0" role="button" aria-label="Coût FLOPs (axe Y)">
  <circle cx="80" cy="828" r="9" fill="#B7332C"/>
  <text x="80" y="832" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">2</text>
  <text x="100" y="832" class="body" font-size="11" fill="#1A1A1A">Inférence (FLOPs/token) : suit l'axe Y — DeepSeek V3 calcule comme un dense 37 B.</text>
</g>
<g class="interactive" data-card="annotation-mla" tabindex="0" role="button" aria-label="MLA (Multi-head Latent Attention) compression KV">
  <circle cx="80" cy="856" r="9" fill="#B7332C"/>
  <text x="80" y="860" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">3</text>
  <text x="100" y="860" class="body" font-size="11" fill="#1A1A1A">DeepSeek + MLA : KV cache compressé ×20 → l'arbitrage VRAM s'efface partiellement.</text>
</g>

<!-- Legend -->
<g>
  <circle cx="640" cy="178" r="7" fill="#1F5560"/>
  <text x="654" y="182" class="body" font-size="11" fill="#1A1A1A">Dense</text>
  <circle cx="720" cy="178" r="7" fill="#B7332C"/>
  <text x="734" y="182" class="body" font-size="11" fill="#1A1A1A">MoE (sparse)</text>
</g>
</svg>
