<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="t07">
<title id="t07">Reasoning models — la facture qui revient</title>
<defs>
<style>
  .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
  .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
  .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
  .interactive { cursor: pointer; }
</style>
<marker id="arrow07" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#5A5A5A"/>
</marker>
</defs>
<rect width="1200" height="800" fill="#FAF8F3"/>

<!-- Header -->
<text x="60" y="62" class="mono" font-size="11" font-weight="600" letter-spacing="0.18em" fill="#B7332C">SCHÉMA 07 — REASONING vs NON-REASONING</text>
<text x="60" y="100" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">×10 à ×74 sur le coût par tâche.</text>
<text x="60" y="126" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Performance AIME 2024 (axe Y) × coût par résolution complète (axe X, log) — deux nuages, deux régimes.</text>
<line x1="60" y1="146" x2="1140" y2="146" stroke="#E5E1D8" stroke-width="1"/>

<!-- Plot area: x=160..1100, y=200..620 -->
<line x1="160" y1="200" x2="160" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>
<line x1="160" y1="620" x2="1100" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>

<!-- Y axis: AIME accuracy 0% to 100% -->
<g class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">
  <text x="150" y="624">0 %</text>
  <text x="150" y="540">20 %</text>
  <text x="150" y="456">40 %</text>
  <text x="150" y="372">60 %</text>
  <text x="150" y="288">80 %</text>
  <text x="150" y="204">100 %</text>
</g>
<g stroke="#E5E1D8" stroke-width="0.5">
  <line x1="160" y1="540" x2="1100" y2="540"/>
  <line x1="160" y1="456" x2="1100" y2="456"/>
  <line x1="160" y1="372" x2="1100" y2="372"/>
  <line x1="160" y1="288" x2="1100" y2="288"/>
</g>
<text x="100" y="410" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90 100 410)">↑ Accuracy AIME 2024</text>

<!-- X axis: cost per problem (log) - $0.001 to $5.00 -->
<!-- $0.001 → x=200; $0.01 → x=380; $0.10 → x=560; $1.00 → x=740; $10.00 → x=920 -->
<g class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">
  <text x="200" y="644">0,001 $</text>
  <text x="380" y="644">0,01 $</text>
  <text x="560" y="644">0,10 $</text>
  <text x="740" y="644">1,00 $</text>
  <text x="920" y="644">10 $</text>
  <text x="1080" y="644">100 $</text>
</g>
<g stroke="#E5E1D8" stroke-width="0.5">
  <line x1="380" y1="200" x2="380" y2="620"/>
  <line x1="560" y1="200" x2="560" y2="620"/>
  <line x1="740" y1="200" x2="740" y2="620"/>
  <line x1="920" y1="200" x2="920" y2="620"/>
  <line x1="1080" y1="200" x2="1080" y2="620"/>
</g>
<text x="630" y="680" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">Coût par problème AIME résolu (échelle log) →</text>

<!-- Non-reasoning cluster (low-left) -->
<ellipse cx="320" cy="555" rx="180" ry="50" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1" stroke-dasharray="2 3"/>
<text x="320" y="498" class="body" font-size="13" font-style="italic" font-weight="500" fill="#1F5560" text-anchor="middle">Non-reasoning</text>

<!-- Non-reasoning models -->
<g class="interactive" data-card="model-gpt4o" tabindex="0" role="button" aria-label="GPT-4o">
  <circle cx="380" cy="555" r="9" fill="#1F5560" stroke="#FAF8F3" stroke-width="2"/>
  <text x="396" y="551" class="body" font-size="11" fill="#1A1A1A">GPT-4o · 12 % · 0,01 $</text>
</g>
<g class="interactive" data-card="model-claude35" tabindex="0" role="button" aria-label="Claude 3.5 Sonnet">
  <circle cx="440" cy="525" r="9" fill="#1F5560" stroke="#FAF8F3" stroke-width="2"/>
  <text x="456" y="521" class="body" font-size="11" fill="#1A1A1A">Claude 3.5 Sonnet · 16 % · 0,03 $</text>
</g>
<g class="interactive" data-card="model-llama70b" tabindex="0" role="button" aria-label="Llama 3.1 70B">
  <circle cx="280" cy="585" r="8" fill="#1F5560" stroke="#FAF8F3" stroke-width="2"/>
  <text x="296" y="581" class="body" font-size="11" fill="#1A1A1A">Llama 3.1 70B · 5 % · 0,003 $</text>
</g>

<!-- Reasoning cluster (high-right) -->
<ellipse cx="900" cy="290" rx="180" ry="80" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1" stroke-dasharray="2 3"/>
<text x="900" y="200" class="body" font-size="13" font-style="italic" font-weight="500" fill="#B7332C" text-anchor="middle">Reasoning</text>

<!-- o1 (74% on AIME for $1.20/problem) -->
<g class="interactive" data-card="model-o1" tabindex="0" role="button" aria-label="OpenAI o1">
  <circle cx="780" cy="310" r="11" fill="#B7332C" stroke="#FAF8F3" stroke-width="2"/>
  <text x="798" y="306" class="body" font-size="11" font-weight="500" fill="#1A1A1A">o1 · 74 % · 1,20 $</text>
  <text x="798" y="320" class="body" font-size="10" font-style="italic" fill="#5A5A5A">single sample</text>
</g>
<!-- o1 with reranking (93%) -->
<g class="interactive" data-card="model-o1-rerank" tabindex="0" role="button" aria-label="o1 + reranking">
  <circle cx="980" cy="231" r="11" fill="#B7332C" stroke="#FAF8F3" stroke-width="2"/>
  <text x="996" y="227" class="body" font-size="11" font-weight="500" fill="#1A1A1A">o1 + reranking · 93 %</text>
  <text x="996" y="241" class="body" font-size="10" font-style="italic" fill="#5A5A5A">~15 $ · 64 samples</text>
</g>
<!-- o3 -->
<g class="interactive" data-card="model-o3" tabindex="0" role="button" aria-label="OpenAI o3">
  <circle cx="900" cy="217" r="13" fill="#B7332C" stroke="#FAF8F3" stroke-width="2"/>
  <text x="744" y="213" class="body" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="end">o3 · 96,7 %</text>
  <text x="744" y="227" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="end">3 $-7 $</text>
  <line x1="748" y1="217" x2="888" y2="217" stroke="#5A5A5A" stroke-width="0.75"/>
</g>
<!-- o3-mini (cheaper than o1-mini) -->
<g class="interactive" data-card="model-o3mini" tabindex="0" role="button" aria-label="OpenAI o3-mini">
  <circle cx="660" cy="350" r="9" fill="#B7332C" stroke="#FAF8F3" stroke-width="2"/>
  <text x="676" y="346" class="body" font-size="11" fill="#1A1A1A">o3-mini · 60 % · 0,30 $</text>
  <text x="676" y="360" class="body" font-size="10" font-style="italic" fill="#5A5A5A">63 % moins cher qu'o1-mini</text>
</g>
<!-- DeepSeek R1 -->
<g class="interactive" data-card="model-r1" tabindex="0" role="button" aria-label="DeepSeek R1">
  <circle cx="640" cy="295" r="9" fill="#B7332C" stroke="#FAF8F3" stroke-width="2"/>
  <text x="490" y="291" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="end">DeepSeek R1 · 79 %</text>
  <text x="490" y="305" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="end">~0,40 $ · open-weight</text>
  <line x1="494" y1="295" x2="630" y2="295" stroke="#5A5A5A" stroke-width="0.75"/>
</g>

<!-- Pareto frontier curve -->
<path d="M 280,585 C 380,560 500,510 660,360 C 720,330 760,310 800,290 C 850,255 880,235 920,215"
      fill="none" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="4 3"/>
<text x="500" y="430" class="body" font-size="11" font-style="italic" fill="#5A5A5A" transform="rotate(-30 500 430)">frontière de Pareto perf/coût</text>

<!-- Big gap arrow showing "10-74×" cost between regimes -->
<g class="interactive" data-card="annotation-gap" tabindex="0" role="button" aria-label="Écart de coût 10-74×">
  <line x1="400" y1="590" x2="780" y2="330" stroke="#B7332C" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="540" y="430" width="160" height="46" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
  <text x="620" y="450" class="body" font-size="13" font-weight="600" fill="#B7332C" text-anchor="middle">×10 à ×74</text>
  <text x="620" y="466" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">sur AIME (Raschka, 2025)</text>
</g>

<!-- Footer -->
<line x1="60" y1="700" x2="1140" y2="700" stroke="#E5E1D8" stroke-width="1"/>
<text x="60" y="724" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Source : OpenAI o1/o3 announcements (sept. 2024 - janv. 2025) ; benchmarks AIME 2024 ; analyses Sebastian Raschka et Towards Data Science (déc. 2025).</text>
<text x="60" y="744" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Note : les coûts par problème agrègent input + chain-of-thought caché + output, aux tarifs publics au 1ᵉʳ mai 2026. Les modèles open-weight (R1) sont calculés sur API hébergée Together / Fireworks.</text>
</svg>
