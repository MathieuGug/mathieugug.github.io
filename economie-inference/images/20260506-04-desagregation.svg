<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="t04">
<title id="t04">Architecture désagrégée prefill / decode / KV bus</title>
<defs>
<style>
  .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
  .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
  .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
  .interactive { cursor: pointer; }
</style>
<marker id="arrow04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#5A5A5A"/>
</marker>
<marker id="arrow04r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#B7332C"/>
</marker>
</defs>
<rect width="1200" height="800" fill="#FAF8F3"/>

<!-- Header -->
<text x="60" y="62" class="mono" font-size="11" font-weight="600" letter-spacing="0.18em" fill="#B7332C">SCHÉMA 04 — DÉSAGRÉGATION P/D</text>
<text x="60" y="100" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Deux clusters, un bus KV cache, +1,4-2,3× sur la TTFT.</text>
<text x="60" y="126" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Splitwise (Microsoft), Mooncake (Moonshot AI / Kimi), DistServe (UCSD) : architectures qui séparent les phases pour les optimiser.</text>
<line x1="60" y1="146" x2="1140" y2="146" stroke="#E5E1D8" stroke-width="1"/>

<!-- Client side -->
<g class="interactive" data-card="client" tabindex="0" role="button" aria-label="Client / requête">
  <rect x="80" y="380" width="140" height="80" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="150" y="410" class="mono" font-size="10" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A" text-anchor="middle">CLIENT</text>
  <text x="150" y="432" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">Prompt</text>
  <text x="150" y="450" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">+ context</text>
</g>

<!-- Router/scheduler -->
<g class="interactive" data-card="router" tabindex="0" role="button" aria-label="Router / scheduler">
  <rect x="270" y="390" width="120" height="60" rx="3" fill="#1A1A1A" fill-opacity="0.06" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="330" y="416" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">Router</text>
  <text x="330" y="434" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">SLO TTFT / TPOT</text>
</g>

<!-- Prefill cluster (compute-bound, H100/B200) -->
<g class="interactive" data-card="prefill-cluster" tabindex="0" role="button" aria-label="Cluster prefill">
  <rect x="450" y="200" width="320" height="200" rx="3" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.25"/>
  <text x="610" y="230" class="mono" font-size="10" font-weight="600" letter-spacing="0.18em" fill="#1F5560" text-anchor="middle">CLUSTER PREFILL</text>
  <text x="610" y="252" class="display" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="middle">Compute-bound</text>
  <text x="610" y="272" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">H100 ou B200 · FLOPs élevés</text>
  <!-- GPU rectangles -->
  <g>
    <rect x="478" y="294" width="56" height="40" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="506" y="318" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">GPU</text>
    <rect x="544" y="294" width="56" height="40" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="572" y="318" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">GPU</text>
    <rect x="610" y="294" width="56" height="40" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="638" y="318" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">GPU</text>
    <rect x="676" y="294" width="56" height="40" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="704" y="318" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">GPU</text>
  </g>
  <text x="610" y="362" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Util. FLOPs ≥ 80 %</text>
  <text x="610" y="380" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Provisionné selon longueur de prompt p99</text>
</g>

<!-- Decode cluster (memory-bound, A100/H100/MI300X) -->
<g class="interactive" data-card="decode-cluster" tabindex="0" role="button" aria-label="Cluster decode">
  <rect x="450" y="440" width="320" height="200" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1.25"/>
  <text x="610" y="470" class="mono" font-size="10" font-weight="600" letter-spacing="0.18em" fill="#B7332C" text-anchor="middle">CLUSTER DECODE</text>
  <text x="610" y="492" class="display" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="middle">Memory-bound</text>
  <text x="610" y="512" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">A100 / MI300X · HBM élevée</text>
  <g>
    <rect x="478" y="534" width="56" height="40" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="506" y="558" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">GPU</text>
    <rect x="544" y="534" width="56" height="40" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="572" y="558" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">GPU</text>
    <rect x="610" y="534" width="56" height="40" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="638" y="558" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">GPU</text>
    <rect x="676" y="534" width="56" height="40" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="704" y="558" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">GPU</text>
  </g>
  <text x="610" y="602" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Util. HBM ≥ 80 %</text>
  <text x="610" y="620" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Provisionné selon nb tokens output p99</text>
</g>

<!-- KV cache transfer bus -->
<g class="interactive" data-card="kv-bus" tabindex="0" role="button" aria-label="Bus de transfert KV cache (RDMA)">
  <rect x="830" y="380" width="280" height="80" rx="3" fill="#B58A2C" fill-opacity="0.18" stroke="#B58A2C" stroke-width="1.25"/>
  <text x="970" y="410" class="mono" font-size="10" font-weight="600" letter-spacing="0.18em" fill="#B58A2C" text-anchor="middle">BUS KV CACHE</text>
  <text x="970" y="432" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">RDMA / NVLink / NCCL</text>
  <text x="970" y="450" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">800 Gbps Ethernet ou InfiniBand HDR</text>
</g>

<!-- Connectors -->
<!-- Client → Router -->
<line x1="222" y1="420" x2="266" y2="420" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow04)"/>
<!-- Router → Prefill -->
<line x1="392" y1="408" x2="446" y2="320" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow04)"/>
<text x="408" y="350" class="body" font-size="10" font-style="italic" fill="#5A5A5A">prompt</text>
<!-- Prefill → KV bus (writes KV cache) -->
<line x1="772" y1="320" x2="826" y2="394" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arrow04r)"/>
<text x="800" y="350" class="body" font-size="10" font-style="italic" fill="#B7332C">KV cache</text>
<!-- KV bus → Decode (delivers KV) -->
<line x1="826" y1="446" x2="772" y2="520" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arrow04r)"/>
<text x="800" y="496" class="body" font-size="10" font-style="italic" fill="#B7332C">prefix KV</text>
<!-- Decode → Router (tokens stream) -->
<line x1="446" y1="520" x2="392" y2="436" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow04)"/>
<text x="392" y="500" class="body" font-size="10" font-style="italic" fill="#5A5A5A">tokens</text>
<!-- Router → Client (tokens stream back) -->
<line x1="266" y1="438" x2="222" y2="438" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow04)"/>

<!-- Numbered annotations on right -->
<g class="interactive" data-card="annotation-ttft" tabindex="0" role="button" aria-label="Gain TTFT">
  <circle cx="80" cy="650" r="9" fill="#B7332C"/>
  <text x="80" y="654" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>
  <text x="100" y="654" class="body" font-size="11" fill="#1A1A1A">TTFT (time-to-first-token) : 1,4× à 2,3× plus rapide que prefill+decode co-localisés.</text>
</g>
<g class="interactive" data-card="annotation-mooncake" tabindex="0" role="button" aria-label="Mooncake en production">
  <circle cx="80" cy="678" r="9" fill="#B7332C"/>
  <text x="80" y="682" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">2</text>
  <text x="100" y="682" class="body" font-size="11" fill="#1A1A1A">Mooncake (Kimi) : &gt;100 G tokens/jour servis, KV cache mutualisé sur DRAM CPU + SSD.</text>
</g>
<g class="interactive" data-card="annotation-cost" tabindex="0" role="button" aria-label="Coût réseau du KV transfer">
  <circle cx="80" cy="706" r="9" fill="#B7332C"/>
  <text x="80" y="710" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">3</text>
  <text x="100" y="710" class="body" font-size="11" fill="#1A1A1A">Coût : transfert KV linéaire avec contexte (~20 Go pour Llama 70B FP16 à 128K).</text>
</g>

<!-- Footer -->
<line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="1"/>
<text x="60" y="764" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Source : Patel et al., Splitwise (ISCA 2024) ; Qin et al., Mooncake (ACM ToS 2025) ; Hao AI Lab UCSD, Disaggregated Inference: 18 Months Later (2025).</text>
<text x="60" y="784" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Note : la mixité matérielle prefill/decode (H100 vs A100) suit Splitwise. Mooncake utilise un seul type de GPU mais externalise le KV cache sur stockage hiérarchique.</text>
</svg>
