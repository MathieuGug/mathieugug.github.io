<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="t03">
<title id="t03">Pile d'optimisation logicielle — gains cumulés sur le même silicium</title>
<defs>
<style>
  .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
  .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
  .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
  .interactive { cursor: pointer; }
</style>
</defs>
<rect width="1200" height="800" fill="#FAF8F3"/>

<!-- Header -->
<text x="60" y="62" class="mono" font-size="11" font-weight="600" letter-spacing="0.18em" fill="#B7332C">SCHÉMA 03 — PILE D'OPTIMISATION</text>
<text x="60" y="100" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Sept couches empilées, ×14 sur le même silicium.</text>
<text x="60" y="126" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Throughput d'une instance B300 entre version naïve et version pleinement optimisée — chaque couche multiplie la précédente.</text>
<line x1="60" y1="146" x2="1140" y2="146" stroke="#E5E1D8" stroke-width="1"/>

<!-- Stack: layers from bottom (naïve) to top (optimized) -->
<!-- Plot area for the stack: x=80..720, y=190..630, 7 layers of 60px height + 5px spacing -->
<!-- Width grows with cumulative throughput -->

<!-- Naïve baseline -->
<g class="interactive" data-card="layer-baseline" tabindex="0" role="button" aria-label="Baseline naïve">
  <rect x="80" y="600" width="80" height="40" rx="3" fill="#B8B5AE" fill-opacity="0.30" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="120" y="624" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">Baseline naïve</text>
  <text x="172" y="618" class="mono" font-size="11" fill="#5A5A5A">~1 000 tok/s/GPU</text>
  <text x="172" y="632" class="body" font-size="10" font-style="italic" fill="#5A5A5A">PyTorch eager · sans optimisation</text>
</g>

<!-- Layer 1: Kernel fusion + Tensor cores -->
<g class="interactive" data-card="layer-kernel-fusion" tabindex="0" role="button" aria-label="Kernel fusion et Tensor Cores">
  <rect x="80" y="540" width="120" height="40" rx="3" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-width="1.25"/>
  <text x="140" y="564" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">Kernel fusion · Tensor Cores</text>
  <text x="212" y="558" class="mono" font-size="11" fill="#5A5A5A">×1,5 · 1 500 tok/s</text>
  <text x="212" y="572" class="body" font-size="10" font-style="italic" fill="#5A5A5A">FlashAttention-1 · matmul fusionnée</text>
</g>

<!-- Layer 2: FlashAttention-3 -->
<g class="interactive" data-card="layer-flashattn3" tabindex="0" role="button" aria-label="FlashAttention-3">
  <rect x="80" y="480" width="220" height="40" rx="3" fill="#1F5560" fill-opacity="0.30" stroke="#1F5560" stroke-width="1.25"/>
  <text x="190" y="504" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">FlashAttention-3 · async + warp-spec</text>
  <text x="312" y="498" class="mono" font-size="11" fill="#5A5A5A">×2 · 3 000 tok/s</text>
  <text x="312" y="512" class="body" font-size="10" font-style="italic" fill="#5A5A5A">75 % util. H100 BF16 · FP8 1,2 PFLOPS</text>
</g>

<!-- Layer 3: PagedAttention + continuous batching -->
<g class="interactive" data-card="layer-paged-cb" tabindex="0" role="button" aria-label="PagedAttention et continuous batching">
  <rect x="80" y="420" width="380" height="40" rx="3" fill="#1F5560" fill-opacity="0.40" stroke="#1F5560" stroke-width="1.25"/>
  <text x="270" y="444" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">PagedAttention + continuous batching</text>
  <text x="472" y="438" class="mono" font-size="11" fill="#5A5A5A">×1,7 · 5 000 tok/s</text>
  <text x="472" y="452" class="body" font-size="10" font-style="italic" fill="#5A5A5A">vLLM · util. GPU 40 % → 90 %</text>
</g>

<!-- Layer 4: FP8 quantization -->
<g class="interactive" data-card="layer-fp8" tabindex="0" role="button" aria-label="Quantization FP8">
  <rect x="80" y="360" width="540" height="40" rx="3" fill="#B58A2C" fill-opacity="0.30" stroke="#B58A2C" stroke-width="1.25"/>
  <text x="350" y="384" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">Quantization FP8 (Hopper)</text>
  <text x="632" y="378" class="mono" font-size="11" fill="#5A5A5A">×1,6 · 8 000 tok/s</text>
  <text x="632" y="392" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Tensor Cores 2× densité, perte qualité &lt; 1 %</text>
</g>

<!-- Layer 5: FP4 (Blackwell) -->
<g class="interactive" data-card="layer-fp4" tabindex="0" role="button" aria-label="Quantization FP4 sur Blackwell">
  <rect x="80" y="300" width="660" height="40" rx="3" fill="#B58A2C" fill-opacity="0.45" stroke="#B58A2C" stroke-width="1.25"/>
  <text x="410" y="324" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">FP4 (Blackwell, Tensor Cores 5e gén.)</text>
  <text x="752" y="318" class="mono" font-size="11" fill="#5A5A5A">×1,4 · 11 000 tok/s</text>
  <text x="752" y="332" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Calibration soigneuse requise</text>
</g>

<!-- Layer 6: Speculative decoding (EAGLE-3 / P-EAGLE) -->
<g class="interactive" data-card="layer-spec-decode" tabindex="0" role="button" aria-label="Speculative decoding EAGLE-3 et P-EAGLE">
  <rect x="80" y="240" width="780" height="40" rx="3" fill="#B7332C" fill-opacity="0.30" stroke="#B7332C" stroke-width="1.25"/>
  <text x="470" y="264" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">Speculative decoding (EAGLE-3 + P-EAGLE)</text>
  <text x="872" y="258" class="mono" font-size="11" fill="#5A5A5A">×1,2 · 13 000 tok/s</text>
  <text x="872" y="272" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Draft head 1-2 couches · 3-6,5×</text>
</g>

<!-- Layer 7: Prefix caching + harness tuning -->
<g class="interactive" data-card="layer-prefix-cache" tabindex="0" role="button" aria-label="Prefix caching et harness tuning">
  <rect x="80" y="180" width="840" height="40" rx="3" fill="#B7332C" fill-opacity="0.45" stroke="#B7332C" stroke-width="1.25"/>
  <text x="500" y="204" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">Prefix caching + désagrégation P/D + harness tuning</text>
  <text x="932" y="198" class="mono" font-size="11" font-weight="500" fill="#1A1A1A">×1,08 · 14 000 tok/s</text>
  <text x="932" y="212" class="body" font-size="10" font-style="italic" fill="#5A5A5A">RAG · agents · long-context</text>
</g>

<!-- Total annotation -->
<line x1="80" y1="170" x2="80" y2="640" stroke="#1A1A1A" stroke-width="1.25"/>
<line x1="78" y1="170" x2="86" y2="170" stroke="#1A1A1A" stroke-width="1.25"/>
<line x1="78" y1="640" x2="86" y2="640" stroke="#1A1A1A" stroke-width="1.25"/>

<g>
  <rect x="990" y="350" width="180" height="80" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
  <text x="1080" y="378" class="display" font-size="22" font-weight="600" fill="#B7332C" text-anchor="middle">×14</text>
  <text x="1080" y="398" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">throughput total</text>
  <text x="1080" y="416" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">B300, même silicium</text>
</g>

<!-- Caption left of stack: "même silicium" -->
<text x="60" y="200" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A" transform="rotate(-90 60 200)">SOFTWARE STACK · MÊME SILICIUM</text>

<!-- Footer -->
<line x1="60" y1="690" x2="1140" y2="690" stroke="#E5E1D8" stroke-width="1"/>
<text x="60" y="714" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Source : SemiAnalysis InferenceMAX (oct. 2025), benchmark B300 GPT-OSS-120B en mode TensorRT-LLM optimisé.</text>
<text x="60" y="734" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Note : les multiplicateurs par couche sont indicatifs (l'ordre de composition modifie les gains marginaux). Le ×14 total est mesuré, pas calculé.</text>
<text x="60" y="754" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Lecture : la largeur de chaque barre représente le throughput cumulé après cette couche, en tokens/seconde par GPU.</text>
</svg>
