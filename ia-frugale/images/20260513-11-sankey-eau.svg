<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive rect.hit { fill: transparent; stroke: transparent; }
      .interactive:hover rect.hit, .interactive:focus rect.hit { stroke: #B7332C; stroke-width: 1.5; stroke-dasharray: 3 3; }
    </style>
    <marker id="arrow-makeup" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#1F5560"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <g class="svg-header">
    <text x="80" y="48" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCHÉMA 11 — SANKEY DES FLUX D'EAU</text>
    <text x="80" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Où va vraiment l'eau d'un datacenter ?</text>
    <text x="80" y="124" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Comparaison des deux régimes industriels actuels — évaporatif (héritage) vs boucle fermée (Microsoft post-08/2024) — en m³/MW d'IT load par an</text>
  </g>

  <!-- ============================================================== -->
  <!-- LEFT PANEL : ÉVAPORATIF (~1 200 m³/MW/an) -->
  <!-- ============================================================== -->
  <g>
    <rect x="60" y="160" width="540" height="540" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="80" y="190" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#B7332C">A · ÉVAPORATIF (HÉRITAGE)</text>
    <text x="80" y="220" class="display" font-size="20" font-weight="600" fill="#1A1A1A">~1 200 m³ / MW / an prélevés</text>
    <text x="80" y="240" class="body" font-size="12" font-style="italic" fill="#5A5A5A">~80 % des datacenters existants en 2026 — flotte avant 08/2024</text>

    <!-- SOURCE BAR (left side) -->
    <!-- y range: 280 to 600 = 320 tall = 100% = 1200 m³ -->
    <g class="interactive" data-card="evap-source" tabindex="0" role="button" aria-label="Source évaporative">
      <rect class="hit" x="80" y="280" width="80" height="320"/>
      <rect x="80" y="280" width="60" height="320" rx="2" fill="#1F5560" opacity="0.85"/>
      <text x="110" y="442" class="mono" font-size="12" font-weight="600" fill="#FAF8F3" text-anchor="middle" transform="rotate(-90 110 442)">PRÉLÈVEMENT MUNICIPAL</text>
      <text x="80" y="624" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">1 200 m³</text>
      <text x="80" y="640" class="body" font-size="11" font-style="italic" fill="#5A5A5A">par MW / an</text>
    </g>

    <!-- SANKEY FLOWS to 3 destinations -->
    <!-- Source segments: -->
    <!-- Atmosphère 70% (y 280-504, height 224) -->
    <!-- Égout 20% (y 504-568, height 64) -->
    <!-- Recyclage interne 10% (y 568-600, height 32) -->

    <!-- Destinations at x=400-460 -->
    <!-- Atmosphère 70% : y 280-504 -->
    <!-- Égout 20% : y 514-578 -->
    <!-- Recyclage interne 10% : y 588-620 -->

    <!-- Flow 1: Source segment (140, 280-504) → Atmosphère dest (400, 280-504) -->
    <path d="M 140,280 C 270,280 270,280 400,280 L 400,504 C 270,504 270,504 140,504 Z"
          fill="#B7332C" opacity="0.55"/>

    <!-- Flow 2: Source segment (140, 504-568) → Égout dest (400, 514-578) -->
    <path d="M 140,504 C 270,504 270,514 400,514 L 400,578 C 270,578 270,568 140,568 Z"
          fill="#B58A2C" opacity="0.6"/>

    <!-- Flow 3: Source segment (140, 568-600) → Recyclage dest (400, 588-620) -->
    <path d="M 140,568 C 270,568 270,588 400,588 L 400,620 C 270,620 270,600 140,600 Z"
          fill="#1F5560" opacity="0.4"/>

    <!-- DESTINATION RECTS -->
    <g class="interactive" data-card="evap-atmosphere" tabindex="0" role="button" aria-label="Évaporation atmosphère">
      <rect class="hit" x="400" y="280" width="180" height="224"/>
      <rect x="400" y="280" width="20" height="224" fill="#B7332C" opacity="0.85"/>
      <text x="430" y="306" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Atmosphère</text>
      <text x="430" y="325" class="body" font-size="11" font-style="italic" fill="#5A5A5A">évaporation cooling tower</text>
      <text x="430" y="360" class="mono" font-size="22" font-weight="600" fill="#B7332C">840 m³</text>
      <text x="430" y="378" class="body" font-size="11" fill="#5A5A5A">70 % du total</text>
      <text x="430" y="402" class="body" font-size="11" font-style="italic" fill="#1A1A1A">retourne en pluie</text>
      <text x="430" y="416" class="body" font-size="11" font-style="italic" fill="#1A1A1A">ailleurs sur la planète,</text>
      <text x="430" y="430" class="body" font-size="11" font-style="italic" fill="#1A1A1A">perdue localement</text>
    </g>

    <g class="interactive" data-card="evap-egout" tabindex="0" role="button" aria-label="Blowdown vers égout">
      <rect class="hit" x="400" y="514" width="180" height="64"/>
      <rect x="400" y="514" width="20" height="64" fill="#B58A2C" opacity="0.85"/>
      <text x="430" y="535" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Égout</text>
      <text x="430" y="552" class="body" font-size="11" font-style="italic" fill="#5A5A5A">blowdown · purge minéralisée</text>
      <text x="430" y="574" class="mono" font-size="16" font-weight="600" fill="#B58A2C">240 m³ · 20 %</text>
    </g>

    <g class="interactive" data-card="evap-recyclage" tabindex="0" role="button" aria-label="Recyclage interne">
      <rect class="hit" x="400" y="588" width="180" height="32"/>
      <rect x="400" y="588" width="20" height="32" fill="#1F5560" opacity="0.6"/>
      <text x="430" y="606" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Sanitaire / process · </text>
      <text x="550" y="606" class="mono" font-size="12" font-weight="600" fill="#1F5560">120 m³ · 10 %</text>
    </g>

    <!-- Annotation perte locale -->
    <text x="80" y="668" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Bilan : 70 % des 1 200 m³ <strong>évaporés à l'atmosphère</strong> — perdus du bassin local pour des mois,</text>
    <text x="80" y="684" class="body" font-size="11" font-style="italic" fill="#5A5A5A">retournent en pluie ailleurs. C'est le mécanisme qui crée le stress hydrique à Phoenix, Dublin.</text>
  </g>

  <!-- ============================================================== -->
  <!-- RIGHT PANEL : BOUCLE FERMÉE (Microsoft post-08/2024) -->
  <!-- ============================================================== -->
  <g>
    <rect x="620" y="160" width="540" height="540" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="640" y="190" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#2F5D3F">B · BOUCLE FERMÉE (08/2024+)</text>
    <text x="640" y="220" class="display" font-size="20" font-weight="600" fill="#1A1A1A">~10 m³ / MW / an de makeup</text>
    <text x="640" y="240" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Microsoft pilots Phoenix &amp; Mt Pleasant 2026, déploiement commercial 2027+</text>

    <!-- INITIAL FILL (one-time, at construction) -->
    <g class="interactive" data-card="bf-construction" tabindex="0" role="button" aria-label="Initial fill à la construction">
      <rect class="hit" x="640" y="280" width="200" height="64"/>
      <rect x="640" y="280" width="200" height="64" rx="3" fill="#1F5560" opacity="0.25"/>
      <text x="650" y="304" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">UNE FOIS À LA CONSTRUCTION</text>
      <text x="650" y="324" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Initial fill ~1 000 m³/MW</text>
      <text x="650" y="338" class="body" font-size="11" font-style="italic" fill="#5A5A5A">eau scellée dans le circuit</text>
    </g>

    <!-- BIG LOOP : closed circuit -->
    <g class="interactive" data-card="bf-loop" tabindex="0" role="button" aria-label="Closed loop recirculation">
      <rect class="hit" x="640" y="360" width="500" height="220"/>
      <!-- Loop arrow circle -->
      <ellipse cx="890" cy="470" rx="170" ry="90" fill="none" stroke="#2F5D3F" stroke-width="3"/>
      <!-- Arrow heads on the loop -->
      <polygon points="889,377 879,373 889,367" fill="#2F5D3F" transform="rotate(-90 889 372)"/>
      <polygon points="889,563 879,567 889,573" fill="#2F5D3F" transform="rotate(90 889 568)"/>

      <text x="890" y="442" class="display" font-size="22" font-weight="600" fill="#2F5D3F" text-anchor="middle">100 %</text>
      <text x="890" y="466" class="body" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">recirculation</text>
      <text x="890" y="486" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">chillers mécaniques + échangeurs</text>
      <text x="890" y="506" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">jamais d'évaporation</text>
    </g>

    <!-- MAKEUP arrow (tiny, from outside) -->
    <g class="interactive" data-card="bf-makeup" tabindex="0" role="button" aria-label="Annual makeup">
      <rect class="hit" x="640" y="600" width="500" height="50"/>
      <line x1="650" y1="620" x2="715" y2="620" stroke="#1F5560" stroke-width="2" marker-end="url(#arrow-makeup)"/>
      <text x="730" y="618" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Makeup annuel</text>
      <text x="730" y="636" class="body" font-size="11" font-style="italic" fill="#5A5A5A">compensation des fuites résiduelles</text>
      <text x="1140" y="618" class="mono" font-size="14" font-weight="600" fill="#1F5560" text-anchor="end">~10 m³ / MW / an</text>
      <text x="1140" y="638" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">×120 moins que évaporatif</text>
    </g>

    <!-- Annotation -->
    <text x="640" y="668" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Coût : un PUE légèrement dégradé (besoin de chillers mécaniques) →</text>
    <text x="640" y="684" class="body" font-size="11" font-style="italic" fill="#5A5A5A">économie : 125 M L/an par DC sur le bassin local (Microsoft 12/2024).</text>
  </g>

  <!-- FOOTER -->
  <line x1="80" y1="735" x2="1120" y2="735" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="756" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Sources : Microsoft Cloud Blog 09/12/2024 (zero-water design) ; Li &amp; al. arXiv 2304.03271 ; Uptime Institute Water Stewardship Report 2024 ; profils flotte évaporative reconstruits.</text>
  <text x="80" y="774" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Lecture : la transition industrielle d'un facteur 120 sur l'eau de cooling est <em>déjà engagée</em> chez les hyperscalers. Le débat médiatique est en retard d'un cycle.</text>
</svg>
