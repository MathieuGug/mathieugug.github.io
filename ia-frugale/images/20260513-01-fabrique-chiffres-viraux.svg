<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1A1A1A"/>
    </marker>
    <marker id="arrow-carmine" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#B7332C"/>
    </marker>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive rect.hit { fill: transparent; stroke: transparent; }
      .interactive:hover rect.hit, .interactive:focus rect.hit { stroke: #B7332C; stroke-width: 1.5; stroke-dasharray: 3 3; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <g class="svg-header">
    <text x="80" y="48" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCHÉMA 01 — LA FABRIQUE DES CHIFFRES</text>
    <text x="80" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Six ans de chiffres viraux, et leur correction</text>
    <text x="80" y="124" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Quatre jalons médiatiques de l'empreinte IA, du calcul d'origine à l'usage agrégé qui en a été fait</text>
  </g>

  <!-- TIMELINE AXIS -->
  <line x1="120" y1="420" x2="1120" y2="420" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="120" y="448" class="mono" font-size="13" fill="#5A5A5A">2019</text>
  <text x="450" y="448" class="mono" font-size="13" fill="#5A5A5A">2023</text>
  <text x="730" y="448" class="mono" font-size="13" fill="#5A5A5A">2024</text>
  <text x="1010" y="448" class="mono" font-size="13" fill="#5A5A5A">2025</text>

  <line x1="120" y1="415" x2="120" y2="425" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="450" y1="415" x2="450" y2="425" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="730" y1="415" x2="730" y2="425" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="1010" y1="415" x2="1010" y2="425" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- LEGEND -->
  <g transform="translate(80, 165)">
    <circle cx="8" cy="8" r="6" fill="#B7332C"/>
    <text x="22" y="13" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Chiffre d'origine — méthodologie rigoureuse mais cas spécifique</text>
    <circle cx="8" cy="34" r="6" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="22" y="39" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Usage médiatique — généralisation, perte de la clause de scope</text>
    <line x1="630" y1="20" x2="660" y2="20" stroke="#1F5560" stroke-width="2.5"/>
    <text x="670" y="25" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Correction — mise à jour méthodologique ou contradictoire</text>
  </g>

  <!-- 1. STRUBELL 2019 -->
  <g class="interactive" data-card="strubell-2019" tabindex="0" role="button" aria-label="Strubell 2019 — détails">
    <rect class="hit" x="120" y="218" width="280" height="180" rx="3"/>
    <circle cx="120" cy="420" r="9" fill="#B7332C"/>
    <text x="120" y="424" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>

    <text x="135" y="240" class="mono" font-size="11" letter-spacing="0.12em" fill="#5A5A5A">JUIN 2019 · ACL</text>
    <text x="135" y="270" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Strubell, Ganesh,</text>
    <text x="135" y="294" class="display" font-size="20" font-weight="600" fill="#1A1A1A">McCallum</text>

    <text x="135" y="328" class="mono" font-size="22" font-weight="600" fill="#B7332C">≈ 5 voitures</text>
    <text x="135" y="350" class="body" font-size="12" fill="#5A5A5A">d'émissions sur leur durée de vie</text>

    <text x="135" y="378" class="body" font-size="12" fill="#1A1A1A" font-style="italic">pour entraîner un Transformer NLP</text>
    <text x="135" y="394" class="body" font-size="12" fill="#1A1A1A" font-style="italic">avec neural architecture search</text>

    <!-- Leader -->
    <line x1="260" y1="398" x2="260" y2="412" stroke="#B7332C" stroke-width="0.75"/>
  </g>

  <!-- 2. DE VRIES 2023 (3 Wh per query) -->
  <g class="interactive" data-card="devries-2023" tabindex="0" role="button" aria-label="De Vries 2023 — détails">
    <rect class="hit" x="420" y="218" width="280" height="180" rx="3"/>
    <circle cx="450" cy="420" r="9" fill="#B7332C"/>
    <text x="450" y="424" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">2</text>

    <text x="435" y="240" class="mono" font-size="11" letter-spacing="0.12em" fill="#5A5A5A">OCT 2023 · JOULE</text>
    <text x="435" y="270" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Alex de Vries</text>

    <text x="435" y="318" class="mono" font-size="24" font-weight="600" fill="#B7332C">3 Wh / requête</text>
    <text x="435" y="340" class="body" font-size="12" fill="#5A5A5A">par requête ChatGPT, extrapolation</text>

    <text x="435" y="368" class="body" font-size="12" fill="#1A1A1A" font-style="italic">scénario « si Google search devenait</text>
    <text x="435" y="384" class="body" font-size="12" fill="#1A1A1A" font-style="italic">entièrement LLM », pas une mesure</text>

    <line x1="555" y1="398" x2="555" y2="412" stroke="#B7332C" stroke-width="0.75"/>
  </g>

  <!-- 3. LI 2023 (500ml water) -->
  <g class="interactive" data-card="li-2023" tabindex="0" role="button" aria-label="Li 2023 — eau">
    <rect class="hit" x="420" y="468" width="280" height="180" rx="3"/>
    <circle cx="555" cy="420" r="9" fill="#B7332C"/>
    <text x="555" y="424" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">3</text>

    <line x1="555" y1="429" x2="555" y2="466" stroke="#B7332C" stroke-width="0.75"/>

    <text x="435" y="494" class="mono" font-size="11" letter-spacing="0.12em" fill="#5A5A5A">AVR 2023 · ARXIV</text>
    <text x="435" y="524" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Li, Yang, Islam,</text>
    <text x="435" y="548" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Ren — UC Riverside</text>

    <text x="435" y="582" class="mono" font-size="22" font-weight="600" fill="#B7332C">500 ml / 10–50 réponses</text>
    <text x="435" y="604" class="body" font-size="12" fill="#5A5A5A">GPT-3, datacenter Washington, été 2023</text>

    <text x="435" y="630" class="body" font-size="12" fill="#1A1A1A" font-style="italic">fourchette large, ramenée par la presse</text>
    <text x="435" y="646" class="body" font-size="12" fill="#1A1A1A" font-style="italic">à « 500 ml par requête »</text>
  </g>

  <!-- 4. EPOCH 2025 -->
  <g class="interactive" data-card="epoch-2025" tabindex="0" role="button" aria-label="Epoch AI 2025">
    <rect class="hit" x="850" y="218" width="280" height="180" rx="3"/>
    <circle cx="1010" cy="420" r="9" fill="#1F5560"/>
    <text x="1010" y="424" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">4</text>

    <text x="865" y="240" class="mono" font-size="11" letter-spacing="0.12em" fill="#5A5A5A">FÉV 2025 · EPOCH AI</text>
    <text x="865" y="270" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Joshua You</text>

    <text x="865" y="318" class="mono" font-size="24" font-weight="600" fill="#1F5560">0,3 Wh / requête</text>
    <text x="865" y="340" class="body" font-size="12" fill="#5A5A5A">GPT-4o, H100 batched, mesure 2024</text>

    <text x="865" y="368" class="body" font-size="12" fill="#1A1A1A" font-style="italic">confirmé par Sam Altman (OpenAI)</text>
    <text x="865" y="384" class="body" font-size="12" fill="#1A1A1A" font-style="italic">et Google (Gemini : 0,24 Wh)</text>

    <line x1="990" y1="398" x2="990" y2="412" stroke="#1F5560" stroke-width="0.75"/>
  </g>

  <!-- Arrow from de Vries to Epoch — "÷ 10" -->
  <path d="M 700 308 Q 800 280 850 308" stroke="#1F5560" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="775" y="270" class="mono" font-size="14" font-weight="600" fill="#1F5560" text-anchor="middle">÷ 10</text>
  <text x="775" y="288" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">hardware obsolète, comptage tokens pessimiste</text>

  <!-- Annotation at right of Li 2023 -->
  <g class="interactive" data-card="microsoft-2024" tabindex="0" role="button" aria-label="Microsoft décembre 2024">
    <rect class="hit" x="730" y="468" width="400" height="180" rx="3"/>
    <circle cx="730" cy="420" r="9" fill="#1F5560"/>
    <text x="730" y="424" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">5</text>

    <line x1="730" y1="429" x2="730" y2="466" stroke="#1F5560" stroke-width="0.75"/>

    <text x="745" y="494" class="mono" font-size="11" letter-spacing="0.12em" fill="#5A5A5A">DÉC 2024 · MICROSOFT</text>
    <text x="745" y="524" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Zero-water cooling design</text>

    <text x="745" y="568" class="mono" font-size="22" font-weight="600" fill="#1F5560">~0 L / kWh</text>
    <text x="745" y="588" class="body" font-size="12" fill="#5A5A5A">sur les nouveaux sites depuis août 2024</text>

    <text x="745" y="616" class="body" font-size="12" fill="#1A1A1A" font-style="italic">pilotes Phoenix &amp; Mt Pleasant 2026 —</text>
    <text x="745" y="632" class="body" font-size="12" fill="#1A1A1A" font-style="italic">l'industrie a tranché en 18 mois</text>
  </g>

  <!-- FOOTER -->
  <line x1="80" y1="730" x2="1120" y2="730" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="754" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Sources : Strubell &amp; al. ACL 2019 ; de Vries Joule 10/2023 ; Li &amp; al. arXiv 2304.03271 ; Epoch AI 02/2025 ; Microsoft Cloud Blog 12/2024.</text>
  <text x="80" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Lecture : chaque chiffre était techniquement défendable à sa publication. Le glissement s'est fait dans la généralisation médiatique.</text>
</svg>
