<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive circle.hit { fill: transparent; stroke: transparent; }
      .interactive:hover circle.hit, .interactive:focus circle.hit { stroke: #B7332C; stroke-width: 1.5; stroke-dasharray: 3 3; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <g class="svg-header">
    <text x="80" y="48" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCHÉMA 07 — LEVIERS STRUCTURELS</text>
    <text x="80" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Cinq familles de leviers, sept ordres de grandeur</text>
    <text x="80" y="124" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Niveau d'action × gain potentiel — chaque levier mesuré indépendamment, et le facteur 100-1 000× qui les combine</text>
  </g>

  <!-- AXES -->
  <!-- Y bands: Usage, Architecture, Hardware, Site, Régulation -->
  <!-- X log scale: 1× 3× 10× 30× 100× 300× 1000× -->

  <!-- X axis: x from 200 to 1100 (900 wide) ; 7 ticks at log positions -->
  <!-- log10(1)=0 → x=200; log10(1000)=3 → x=1100 ; 300 per log unit -->
  <!-- 1× = 200; 3× = 343; 10× = 500; 30× = 643; 100× = 800; 300× = 943; 1000× = 1100 -->

  <!-- Y bands at y = 200, 290, 380, 470, 560 (bottom labels) -->
  <line x1="200" y1="620" x2="1100" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="200" y1="170" x2="200" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- X grid -->
  <g stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3">
    <line x1="343" y1="170" x2="343" y2="620"/>
    <line x1="500" y1="170" x2="500" y2="620"/>
    <line x1="643" y1="170" x2="643" y2="620"/>
    <line x1="800" y1="170" x2="800" y2="620"/>
    <line x1="943" y1="170" x2="943" y2="620"/>
  </g>

  <!-- X labels -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#5A5A5A" text-anchor="middle">
    <text x="200" y="640">1×</text>
    <text x="343" y="640">3×</text>
    <text x="500" y="640">10×</text>
    <text x="643" y="640">30×</text>
    <text x="800" y="640">100×</text>
    <text x="943" y="640">300×</text>
    <text x="1100" y="640">1 000×</text>
  </g>
  <text x="650" y="664" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A" text-anchor="middle">GAIN ÉNERGÉTIQUE (LOG)</text>

  <!-- Y bands -->
  <text x="80" y="206" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#B7332C">ARCHITECTURE</text>
  <text x="80" y="220" class="body" font-size="10" font-style="italic" fill="#5A5A5A">modèle</text>

  <text x="80" y="296" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#B7332C">HARDWARE</text>
  <text x="80" y="310" class="body" font-size="10" font-style="italic" fill="#5A5A5A">processeurs, cooling</text>

  <text x="80" y="386" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#B7332C">SITE</text>
  <text x="80" y="400" class="body" font-size="10" font-style="italic" fill="#5A5A5A">localisation, mix</text>

  <text x="80" y="476" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#B7332C">RÉGULATION</text>
  <text x="80" y="490" class="body" font-size="10" font-style="italic" fill="#5A5A5A">disclosure, prix C</text>

  <text x="80" y="566" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#B7332C">USAGE</text>
  <text x="80" y="580" class="body" font-size="10" font-style="italic" fill="#5A5A5A">produit, routage</text>

  <!-- Horizontal dividers -->
  <line x1="200" y1="245" x2="1100" y2="245" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="200" y1="335" x2="1100" y2="335" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="200" y1="425" x2="1100" y2="425" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="200" y1="515" x2="1100" y2="515" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- BUBBLES — Architecture (y=200) -->
  <g class="interactive" data-card="moe" tabindex="0" role="button" aria-label="MoE Mixture of Experts">
    <circle class="hit" cx="500" cy="200" r="32"/>
    <circle cx="500" cy="200" r="22" fill="#B7332C" opacity="0.7"/>
    <text x="500" y="204" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">MoE</text>
    <text x="500" y="245" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">3-10×</text>
  </g>

  <g class="interactive" data-card="distillation" tabindex="0" role="button" aria-label="Distillation Phi-4">
    <circle class="hit" cx="700" cy="210" r="32"/>
    <circle cx="700" cy="210" r="22" fill="#B7332C" opacity="0.7"/>
    <text x="700" y="200" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">Distil</text>
    <text x="700" y="214" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">+ SLM</text>
    <text x="700" y="245" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">5-30×</text>
  </g>

  <g class="interactive" data-card="quantization" tabindex="0" role="button" aria-label="Quantization int4">
    <circle class="hit" cx="385" cy="200" r="32"/>
    <circle cx="385" cy="200" r="18" fill="#B7332C" opacity="0.55"/>
    <text x="385" y="204" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">Quant</text>
    <text x="385" y="232" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">2-4×</text>
  </g>

  <!-- Hardware (y=290) -->
  <g class="interactive" data-card="accelerateurs" tabindex="0" role="button" aria-label="Accélérateurs TPU Trainium">
    <circle class="hit" cx="420" cy="290" r="32"/>
    <circle cx="420" cy="290" r="20" fill="#1F5560" opacity="0.7"/>
    <text x="420" y="294" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">ASIC</text>
    <text x="420" y="324" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">2-5×</text>
  </g>

  <g class="interactive" data-card="cooling-liquide" tabindex="0" role="button" aria-label="Refroidissement liquide">
    <circle class="hit" cx="270" cy="295" r="32"/>
    <circle cx="270" cy="295" r="14" fill="#1F5560" opacity="0.55"/>
    <text x="270" y="299" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">D2C</text>
    <text x="270" y="323" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">~1,3×</text>
  </g>

  <!-- Site (y=380) -->
  <g class="interactive" data-card="geo-carbon-aware" tabindex="0" role="button" aria-label="Géo-distribution carbon-aware">
    <circle class="hit" cx="450" cy="380" r="32"/>
    <circle cx="450" cy="380" r="20" fill="#2F5D3F" opacity="0.7"/>
    <text x="450" y="378" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">Geo</text>
    <text x="450" y="390" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">aware</text>
    <text x="450" y="414" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">1,5-3×</text>
  </g>

  <g class="interactive" data-card="nuclear-dedie" tabindex="0" role="button" aria-label="Mix nucléaire dédié">
    <circle class="hit" cx="600" cy="385" r="32"/>
    <circle cx="600" cy="385" r="22" fill="#2F5D3F" opacity="0.7"/>
    <text x="600" y="384" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">Nucléaire</text>
    <text x="600" y="396" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">dédié</text>
    <text x="600" y="420" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">10-20×</text>
  </g>

  <!-- Combinaison Patterson 100-1000× (across columns) -->
  <g class="interactive" data-card="patterson-combine" tabindex="0" role="button" aria-label="Combinaison Patterson DC×DNN×CPU">
    <circle class="hit" cx="970" cy="385" r="50"/>
    <circle cx="970" cy="385" r="42" fill="#2F5D3F" opacity="0.45"/>
    <circle cx="970" cy="385" r="32" fill="#2F5D3F" opacity="0.7"/>
    <text x="970" y="380" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">DC × DNN × CPU</text>
    <text x="970" y="394" class="body" font-size="9" font-style="italic" fill="#FAF8F3" text-anchor="middle">Patterson 2021</text>
    <text x="970" y="445" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">100-1 000× combiné</text>
  </g>

  <!-- Régulation (y=470) — gains indirects -->
  <g class="interactive" data-card="eu-dc-ee" tabindex="0" role="button" aria-label="EU DC EE Package Q2 2026">
    <circle class="hit" cx="500" cy="470" r="32"/>
    <circle cx="500" cy="470" r="16" fill="#B58A2C" opacity="0.7"/>
    <text x="500" y="474" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">EU DC EE</text>
    <text x="500" y="500" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">indirect</text>
  </g>

  <g class="interactive" data-card="carbon-price" tabindex="0" role="button" aria-label="Prix carbone interne">
    <circle class="hit" cx="700" cy="475" r="32"/>
    <circle cx="700" cy="475" r="16" fill="#B58A2C" opacity="0.7"/>
    <text x="700" y="479" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">Prix C</text>
    <text x="700" y="505" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">indirect</text>
  </g>

  <g class="interactive" data-card="aies" tabindex="0" role="button" aria-label="AI Energy Score">
    <circle class="hit" cx="340" cy="475" r="32"/>
    <circle cx="340" cy="475" r="13" fill="#B58A2C" opacity="0.55"/>
    <text x="340" y="479" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">AIES</text>
    <text x="340" y="500" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">indirect</text>
  </g>

  <!-- Usage (y=560) -->
  <g class="interactive" data-card="smart-routing" tabindex="0" role="button" aria-label="Smart routing GPT-5">
    <circle class="hit" cx="500" cy="560" r="32"/>
    <circle cx="500" cy="560" r="20" fill="#1E3A5F" opacity="0.7"/>
    <text x="500" y="558" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">Smart</text>
    <text x="500" y="570" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">routing</text>
    <text x="500" y="595" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">5-10×</text>
  </g>

  <g class="interactive" data-card="caching" tabindex="0" role="button" aria-label="Prompt &amp; KV cache">
    <circle class="hit" cx="550" cy="560" r="32"/>
    <circle cx="550" cy="560" r="18" fill="#1E3A5F" opacity="0.55"/>
    <text x="550" y="564" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">Caching</text>
    <text x="600" y="595" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">5-10×</text>
  </g>

  <g class="interactive" data-card="slm-edge" tabindex="0" role="button" aria-label="SLM on-device">
    <circle class="hit" cx="680" cy="560" r="32"/>
    <circle cx="680" cy="560" r="22" fill="#1E3A5F" opacity="0.7"/>
    <text x="680" y="558" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">SLM</text>
    <text x="680" y="570" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">on-device</text>
    <text x="680" y="595" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">10-30×</text>
  </g>

  <!-- LEGEND BUBBLE SIZE -->
  <g transform="translate(80, 700)">
    <text x="0" y="0" class="mono" font-size="10" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">DIAMÈTRE = MATURITÉ INDUSTRIELLE</text>
    <circle cx="50" cy="20" r="10" fill="#5A5A5A" opacity="0.4"/>
    <text x="65" y="24" class="body" font-size="11" fill="#1A1A1A">recherche</text>
    <circle cx="170" cy="20" r="16" fill="#5A5A5A" opacity="0.5"/>
    <text x="190" y="24" class="body" font-size="11" fill="#1A1A1A">pilote</text>
    <circle cx="280" cy="20" r="22" fill="#5A5A5A" opacity="0.7"/>
    <text x="307" y="24" class="body" font-size="11" fill="#1A1A1A">déployé en production 2025-2026</text>
  </g>

  <!-- FOOTER -->
  <line x1="80" y1="755" x2="1120" y2="755" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="778" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Sources : Patterson &amp; al. 2021 ; Mistral Mixtral 2024 ; Microsoft Phi-4 ; Google Cloud blog 08/2025 ; Hugging Face AI Energy Score ; EU DC EE Package Q2 2026.</text>
</svg>
