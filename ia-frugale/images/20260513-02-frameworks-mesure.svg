<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive rect.hit { fill: transparent; stroke: transparent; }
      .interactive:hover rect.hit, .interactive:focus rect.hit { stroke: #B7332C; stroke-width: 1.5; stroke-dasharray: 3 3; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <g class="svg-header">
    <text x="80" y="48" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCHÉMA 02 — CADRE DE MESURE</text>
    <text x="80" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Une empreinte IA, neuf cases à remplir</text>
    <text x="80" y="124" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Trois scopes (GHG Protocol) × trois phases (cycle de vie) — la grille que 90 % des chiffres viraux ne précisent pas</text>
  </g>

  <!-- COLUMN HEADERS -->
  <text x="380" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A" text-anchor="middle">ENTRAÎNEMENT</text>
  <text x="380" y="198" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">ponctuel · discret</text>

  <text x="620" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A" text-anchor="middle">INFÉRENCE</text>
  <text x="620" y="198" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">continu · distribué</text>

  <text x="860" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A" text-anchor="middle">EMBODIED</text>
  <text x="860" y="198" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">amorti · scope 3</text>

  <!-- ROW HEADERS -->
  <g class="interactive" data-card="scope-1" tabindex="0" role="button" aria-label="Scope 1 — émissions directes">
    <rect class="hit" x="80" y="220" width="180" height="140" rx="3"/>
    <text x="90" y="252" class="display" font-size="20" font-weight="600" fill="#B7332C">Scope 1</text>
    <text x="90" y="280" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Émissions directes</text>
    <text x="90" y="300" class="body" font-size="12" fill="#5A5A5A">générateurs diesel,</text>
    <text x="90" y="316" class="body" font-size="12" fill="#5A5A5A">gaz frigorigènes,</text>
    <text x="90" y="332" class="body" font-size="12" fill="#5A5A5A">évaporation cooling</text>
    <text x="90" y="354" class="mono" font-size="11" fill="#B7332C">2-5 % du total</text>
  </g>

  <g class="interactive" data-card="scope-2" tabindex="0" role="button" aria-label="Scope 2 — électricité achetée">
    <rect class="hit" x="80" y="380" width="180" height="140" rx="3"/>
    <text x="90" y="412" class="display" font-size="20" font-weight="600" fill="#B7332C">Scope 2</text>
    <text x="90" y="440" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Électricité achetée</text>
    <text x="90" y="460" class="body" font-size="12" fill="#5A5A5A">poste dominant en</text>
    <text x="90" y="476" class="body" font-size="12" fill="#5A5A5A">exploitation, varie</text>
    <text x="90" y="492" class="body" font-size="12" fill="#5A5A5A">de 1× à 4× selon mix</text>
    <text x="90" y="514" class="mono" font-size="11" fill="#B7332C">55-75 % du total</text>
  </g>

  <g class="interactive" data-card="scope-3" tabindex="0" role="button" aria-label="Scope 3 — fabrication et chaîne">
    <rect class="hit" x="80" y="540" width="180" height="140" rx="3"/>
    <text x="90" y="572" class="display" font-size="20" font-weight="600" fill="#B7332C">Scope 3</text>
    <text x="90" y="600" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Chaîne complète</text>
    <text x="90" y="620" class="body" font-size="12" fill="#5A5A5A">fabrication GPU,</text>
    <text x="90" y="636" class="body" font-size="12" fill="#5A5A5A">bâtiment, transport,</text>
    <text x="90" y="652" class="body" font-size="12" fill="#5A5A5A">fin de vie</text>
    <text x="90" y="674" class="mono" font-size="11" fill="#B7332C">25-40 % du total</text>
  </g>

  <!-- VERTICAL DIVIDERS -->
  <line x1="280" y1="220" x2="280" y2="680" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="500" y1="220" x2="500" y2="680" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="740" y1="220" x2="740" y2="680" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="980" y1="220" x2="980" y2="680" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="280" y1="370" x2="980" y2="370" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="280" y1="530" x2="980" y2="530" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- CELLS -->
  <!-- Row 1 Scope 1 -->
  <text x="294" y="252" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Cooling tours,</text>
  <text x="294" y="270" class="body" font-size="12" font-weight="500" fill="#1A1A1A">backup diesel</text>
  <text x="294" y="296" class="mono" font-size="13" font-weight="600" fill="#1F5560">~50 t CO₂eq</text>
  <text x="294" y="316" class="body" font-size="11" font-style="italic" fill="#5A5A5A">GPT-3 (Microsoft Iowa)</text>

  <text x="514" y="252" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Évaporation</text>
  <text x="514" y="270" class="body" font-size="12" font-weight="500" fill="#1A1A1A">cooling continue</text>
  <text x="514" y="296" class="mono" font-size="13" font-weight="600" fill="#1F5560">0,30 L / kWh</text>
  <text x="514" y="316" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Microsoft 2024 moyenne</text>

  <text x="754" y="252" class="body" font-size="12" font-weight="500" fill="#1A1A1A">N/A</text>
  <text x="754" y="272" class="body" font-size="11" font-style="italic" fill="#5A5A5A">l'embodied vit</text>
  <text x="754" y="288" class="body" font-size="11" font-style="italic" fill="#5A5A5A">en scope 3</text>

  <!-- Row 2 Scope 2 -->
  <text x="294" y="412" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Électricité grid</text>
  <text x="294" y="436" class="mono" font-size="13" font-weight="600" fill="#1F5560">552 t CO₂eq</text>
  <text x="294" y="455" class="body" font-size="11" font-style="italic" fill="#5A5A5A">GPT-3 (estimation)</text>
  <text x="294" y="475" class="mono" font-size="13" font-weight="600" fill="#1F5560">50,5 t CO₂eq</text>
  <text x="294" y="494" class="body" font-size="11" font-style="italic" fill="#5A5A5A">BLOOM (grid FR bas-C)</text>
  <text x="294" y="514" class="mono" font-size="13" font-weight="600" fill="#1F5560">8 930 t CO₂eq</text>
  <text x="294" y="513" class="body" font-size="11" font-style="italic" fill="#5A5A5A"></text>

  <text x="514" y="412" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Électricité grid</text>
  <text x="514" y="438" class="mono" font-size="13" font-weight="600" fill="#1F5560">0,3 Wh / requête</text>
  <text x="514" y="456" class="body" font-size="11" font-style="italic" fill="#5A5A5A">GPT-4o texte direct</text>
  <text x="514" y="476" class="mono" font-size="13" font-weight="600" fill="#1F5560">5-20 Wh</text>
  <text x="514" y="494" class="body" font-size="11" font-style="italic" fill="#5A5A5A">modèle de raisonnement</text>
  <text x="514" y="514" class="mono" font-size="13" font-weight="600" fill="#1F5560">50-1000 Wh</text>
  <text x="514" y="495" class="body" font-size="11" font-style="italic" fill="#5A5A5A"></text>

  <text x="754" y="412" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Indirect — embodied</text>
  <text x="754" y="428" class="body" font-size="12" font-weight="500" fill="#1A1A1A">du grid lui-même</text>
  <text x="754" y="454" class="body" font-size="11" font-style="italic" fill="#5A5A5A">centrales, lignes HT,</text>
  <text x="754" y="470" class="body" font-size="11" font-style="italic" fill="#5A5A5A">stockage. Souvent</text>
  <text x="754" y="486" class="body" font-size="11" font-style="italic" fill="#5A5A5A">amalgamé au scope 3.</text>

  <!-- Row 3 Scope 3 -->
  <text x="294" y="572" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Compute hardware</text>
  <text x="294" y="588" class="body" font-size="12" font-weight="500" fill="#1A1A1A">+ bâtiment + énergie</text>
  <text x="294" y="614" class="body" font-size="11" font-style="italic" fill="#5A5A5A">L'entraînement amortit</text>
  <text x="294" y="630" class="body" font-size="11" font-style="italic" fill="#5A5A5A">les GPU sur ses runs.</text>

  <text x="514" y="572" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Amortissement</text>
  <text x="514" y="588" class="body" font-size="12" font-weight="500" fill="#1A1A1A">GPU sur l'usage</text>
  <text x="514" y="614" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Devient dominant quand</text>
  <text x="514" y="630" class="body" font-size="11" font-style="italic" fill="#5A5A5A">l'opérationnel se décarbone.</text>

  <text x="754" y="572" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Fabrication GPU</text>
  <text x="754" y="598" class="mono" font-size="13" font-weight="600" fill="#1F5560">164 kg CO₂eq</text>
  <text x="754" y="616" class="body" font-size="11" font-style="italic" fill="#5A5A5A">par carte H100 (NVIDIA PCF)</text>
  <text x="754" y="636" class="mono" font-size="13" font-weight="600" fill="#1F5560">~25-40 % du total</text>
  <text x="754" y="654" class="body" font-size="11" font-style="italic" fill="#5A5A5A">une fois opérationnel décarboné</text>

  <!-- TOOL & NORM LEGEND -->
  <g class="interactive" data-card="outils-normes" tabindex="0" role="button" aria-label="Outils et normes">
    <rect class="hit" x="1000" y="220" width="160" height="460" rx="3"/>
    <rect x="1000" y="220" width="160" height="460" rx="3" fill="#F2EDDE" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="1010" y="244" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">OUTILS</text>

    <text x="1010" y="272" class="body" font-size="12" font-weight="500" fill="#1A1A1A">CodeCarbon</text>
    <text x="1010" y="289" class="body" font-size="11" font-style="italic" fill="#5A5A5A">instrumentation training</text>

    <text x="1010" y="312" class="body" font-size="12" font-weight="500" fill="#1A1A1A">ML CO₂ Impact</text>
    <text x="1010" y="329" class="body" font-size="11" font-style="italic" fill="#5A5A5A">GPU-heure × région</text>

    <text x="1010" y="352" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Green Algorithms</text>
    <text x="1010" y="369" class="body" font-size="11" font-style="italic" fill="#5A5A5A">modèle générique</text>

    <text x="1010" y="392" class="body" font-size="12" font-weight="500" fill="#1A1A1A">MLPerf Power</text>
    <text x="1010" y="409" class="body" font-size="11" font-style="italic" fill="#5A5A5A">benchmark hardware</text>

    <text x="1010" y="432" class="body" font-size="12" font-weight="500" fill="#1A1A1A">AI Energy Score</text>
    <text x="1010" y="449" class="body" font-size="11" font-style="italic" fill="#5A5A5A">HuggingFace, modèles</text>

    <line x1="1010" y1="470" x2="1150" y2="470" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="1010" y="494" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">NORMES</text>

    <text x="1010" y="522" class="body" font-size="12" font-weight="500" fill="#1A1A1A">ISO/IEC 30134</text>
    <text x="1010" y="539" class="body" font-size="11" font-style="italic" fill="#5A5A5A">PUE, WUE, CUE, ERF</text>

    <text x="1010" y="562" class="body" font-size="12" font-weight="500" fill="#1A1A1A">ISO/IEC 21031</text>
    <text x="1010" y="579" class="body" font-size="11" font-style="italic" fill="#5A5A5A">ML software efficiency</text>
    <text x="1010" y="594" class="body" font-size="11" font-style="italic" fill="#5A5A5A">(en validation)</text>

    <text x="1010" y="618" class="body" font-size="12" font-weight="500" fill="#1A1A1A">EU CoC + DC EE</text>
    <text x="1010" y="635" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Package — Q2 2026</text>

    <text x="1010" y="658" class="body" font-size="12" font-weight="500" fill="#1A1A1A">GHG Protocol</text>
    <text x="1010" y="675" class="body" font-size="11" font-style="italic" fill="#5A5A5A">référence scopes 1/2/3</text>
  </g>

  <!-- FOOTER -->
  <line x1="80" y1="730" x2="1120" y2="730" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="754" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Sources : GHG Protocol Corporate Standard ; ISO/IEC 30134 ; Luccioni &amp; al. (BLOOM) ; Patterson 2021 ; NVIDIA PCF Summary HGX H100 ; Meta Llama 3.1 model card.</text>
  <text x="80" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Lecture : tout chiffre d'empreinte IA cité sans son scope et sa phase est statistiquement inexploitable.</text>
</svg>
