<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive rect.hit { fill: transparent; stroke: transparent; }
      .interactive:hover rect.hit, .interactive:focus rect.hit { stroke: #B7332C; stroke-width: 1.5; stroke-dasharray: 3 3; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <g class="svg-header">
    <text x="80" y="48" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCHÉMA 08 — JEVONS &amp; TRAJECTOIRES</text>
    <text x="80" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Trois trajectoires possibles à 2030, un choix politique</text>
    <text x="80" y="124" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Consommation mondiale des datacenters en TWh selon trois jeux de politiques publiques — le scénario central AIE est l'écart Jevons</text>
  </g>

  <!-- CHART AREA -->
  <!-- x: 2024 → 2030 ; chart from x=140 to x=1100 (960 wide); 6 years → 160 px/year -->
  <!-- y: 0 → 1700 TWh ; chart from y=620 (bottom) to y=180 (top) → 440 px / 1700 = 0.259 px/TWh -->
  <!-- y(twh) = 620 - twh * 0.259 -->

  <!-- gridlines -->
  <line x1="140" y1="620" x2="1100" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="140" y1="180" x2="140" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>

  <g stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3">
    <line x1="140" y1="491" x2="1100" y2="491"/>
    <line x1="140" y1="361" x2="1100" y2="361"/>
    <line x1="140" y1="232" x2="1100" y2="232"/>
  </g>

  <!-- y labels -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#5A5A5A" text-anchor="end">
    <text x="132" y="623">0</text>
    <text x="132" y="494">500</text>
    <text x="132" y="364">1 000</text>
    <text x="132" y="235">1 500 TWh</text>
  </g>

  <!-- x labels -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#5A5A5A" text-anchor="middle">
    <text x="140" y="640">2024</text>
    <text x="300" y="640">2025</text>
    <text x="460" y="640">2026</text>
    <text x="620" y="640">2027</text>
    <text x="780" y="640">2028</text>
    <text x="940" y="640">2029</text>
    <text x="1100" y="640">2030</text>
  </g>

  <!-- Historic point 2024 (460 TWh, all trajectories start) -->
  <!-- y(460) = 620 - 460*0.259 = 620 - 119 = 501 -->
  <!-- y(485 in 2025) = 620 - 125.6 = 494 -->
  <circle cx="140" cy="501" r="4" fill="#1A1A1A"/>
  <text x="140" y="488" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">460</text>
  <circle cx="300" cy="494" r="4" fill="#1A1A1A"/>

  <!-- TRAJECTOIRE 1: LAISSEZ-FAIRE (1500 TWh @ 2030) -->
  <!-- y(1500) = 620 - 388 = 232 -->
  <g class="interactive" data-card="laissez-faire" tabindex="0" role="button" aria-label="Trajectoire laissez-faire">
    <rect class="hit" x="500" y="200" width="600" height="100" rx="3"/>
    <path d="M 140 501 Q 300 494 460 460 T 780 350 T 1100 232"
          fill="none" stroke="#B7332C" stroke-width="2.5"/>
    <circle cx="1100" cy="232" r="6" fill="#B7332C"/>
    <text x="1090" y="218" class="mono" font-size="16" font-weight="600" fill="#B7332C" text-anchor="end">≈ 1 500 TWh</text>
    <text x="1090" y="234" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="end">soit ~4-5 % global</text>
  </g>

  <!-- TRAJECTOIRE 2: EFFICIENCE SEULE (1100 TWh @ 2030) — AIE central -->
  <!-- y(1100) = 620 - 285 = 335 -->
  <g class="interactive" data-card="efficience-seule" tabindex="0" role="button" aria-label="Efficience seule">
    <rect class="hit" x="460" y="320" width="640" height="80" rx="3"/>
    <path d="M 140 501 Q 300 494 460 470 T 780 410 T 1100 335"
          fill="none" stroke="#B58A2C" stroke-width="2.5"/>
    <circle cx="1100" cy="335" r="6" fill="#B58A2C"/>
    <text x="1090" y="322" class="mono" font-size="16" font-weight="600" fill="#B58A2C" text-anchor="end">≈ 1 100 TWh</text>
    <text x="1090" y="337" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="end">scénario central AIE</text>
  </g>

  <!-- TRAJECTOIRE 3: EFFICIENCE + CAP (650 TWh @ 2030) -->
  <!-- y(650) = 620 - 168 = 452 -->
  <g class="interactive" data-card="efficience-plafond" tabindex="0" role="button" aria-label="Efficience + plafond">
    <rect class="hit" x="460" y="430" width="640" height="80" rx="3"/>
    <path d="M 140 501 Q 300 494 460 488 T 780 470 T 1100 452"
          fill="none" stroke="#2F5D3F" stroke-width="2.5"/>
    <circle cx="1100" cy="452" r="6" fill="#2F5D3F"/>
    <text x="1090" y="442" class="mono" font-size="16" font-weight="600" fill="#2F5D3F" text-anchor="end">≈ 650 TWh</text>
    <text x="1090" y="456" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="end">scénario Net-Zero Energy</text>
  </g>

  <!-- HISTORICAL LABEL -->
  <text x="140" y="170" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">AIE BASELINE 2024 :</text>
  <text x="295" y="170" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#1A1A1A">460 TWh</text>
  <text x="380" y="170" class="body" font-size="11" font-style="italic" fill="#5A5A5A">≈ 1,5 % du grid mondial</text>

  <!-- POLICY LEVERS overlay -->
  <g class="interactive" data-card="lever-prix-carbone" tabindex="0" role="button" aria-label="Prix carbone élevé sur compute">
    <rect class="hit" x="80" y="675" width="340" height="80" rx="3"/>
    <text x="80" y="700" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">LEVIER 1 — PRIX CARBONE</text>
    <text x="80" y="720" class="body" font-size="12" fill="#1A1A1A">Internaliser le coût climat sur le compute,</text>
    <text x="80" y="736" class="body" font-size="12" fill="#1A1A1A">indépendant du marché électrique.</text>
  </g>

  <g class="interactive" data-card="lever-cap-regional" tabindex="0" role="button" aria-label="Plafonds régionaux datacenter">
    <rect class="hit" x="430" y="675" width="340" height="80" rx="3"/>
    <text x="430" y="700" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">LEVIER 2 — CAPS RÉGIONAUX</text>
    <text x="430" y="720" class="body" font-size="12" fill="#1A1A1A">Moratoire Dublin, Singapour — Cloud and AI</text>
    <text x="430" y="736" class="body" font-size="12" fill="#1A1A1A">Act EU mentionne plafonds par hub Q1 2026.</text>
  </g>

  <g class="interactive" data-card="lever-reorienter" tabindex="0" role="button" aria-label="Réorienter vers usages à fort retour">
    <rect class="hit" x="780" y="675" width="340" height="80" rx="3"/>
    <text x="780" y="700" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">LEVIER 3 — ALLOCATION</text>
    <text x="780" y="720" class="body" font-size="12" fill="#1A1A1A">Réorienter le compute vers santé,</text>
    <text x="780" y="736" class="body" font-size="12" fill="#1A1A1A">énergie, climat. Moins discuté, plus efficace.</text>
  </g>

  <!-- JEVONS BOX (top center) -->
  <g>
    <rect x="450" y="195" width="290" height="32" rx="3" fill="#F2EDDE" opacity="0.6"/>
    <text x="465" y="217" class="body" font-size="12" font-style="italic" fill="#1A1A1A">Jevons mange 60 % des gains d'efficience</text>
  </g>

  <!-- Footer -->
  <line x1="80" y1="769" x2="1120" y2="769" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="787" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Sources : IEA Energy and AI 04/2025 (scénarios central et Net-Zero) ; ACM FAccT 2025 (Jevons paradox) ; NPR Planet Money 02/2025 (réaction DeepSeek-V3) ; Google Environmental Report 2024.</text>
</svg>
