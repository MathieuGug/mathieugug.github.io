<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive rect.hit { fill: transparent; stroke: transparent; }
      .interactive:hover rect.hit, .interactive:focus rect.hit { stroke: #B7332C; stroke-width: 1.5; stroke-dasharray: 3 3; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <g class="svg-header">
    <text x="80" y="48" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCHÉMA 09 — FACTURE MONDIALE D'ÉLECTRICITÉ</text>
    <text x="80" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">L'IA dans la facture mondiale, par ordre de grandeur</text>
    <text x="80" y="124" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Production mondiale (~30 000 TWh) et consommation par grand secteur — en haut, les usages numériques ; en bas, les grandes industries</text>
  </g>

  <!-- COLUMN DIVIDER -->
  <line x1="380" y1="170" x2="380" y2="650" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- COLUMN HEADERS -->
  <text x="80" y="166" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">SECTEUR / USAGE</text>
  <text x="390" y="166" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">ÉCHELLE LOGARITHMIQUE — TWh / AN</text>

  <!-- LOG AXIS bottom : chart area x=380 to x=1110, 3 decades 100 → 100 000 TWh -->
  <!-- x for v (TWh) = 380 + log10(v/100) * 243.33 -->
  <line x1="380" y1="620" x2="1110" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>

  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5A" text-anchor="middle">
    <line x1="380" y1="615" x2="380" y2="625" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="380" y="644">100</text>

    <line x1="623" y1="615" x2="623" y2="625" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="623" y="644">1 000</text>

    <line x1="867" y1="615" x2="867" y2="625" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="867" y="644">10 000</text>

    <line x1="1110" y1="615" x2="1110" y2="625" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="1110" y="644">100 000 TWh</text>
  </g>

  <!-- Vertical gridlines -->
  <line x1="623" y1="195" x2="623" y2="615" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="867" y1="195" x2="867" y2="615" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- USAGES NUMÉRIQUES (top group) -->
  <text x="80" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#B7332C">USAGES NUMÉRIQUES</text>

  <!-- ROW 1: Crypto-mining 150 TWh -->
  <g class="interactive" data-card="crypto" tabindex="0" role="button" aria-label="Crypto mining">
    <rect class="hit" x="80" y="215" width="1040" height="44" rx="3"/>
    <text x="80" y="237" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Crypto-mining (mondial)</text>
    <text x="80" y="254" class="body" font-size="11" font-style="italic" fill="#5A5A5A">CBECI Cambridge 2024</text>
    <!-- bar from x(100)=380 to x(150)=423 -->
    <rect x="380" y="225" width="43" height="14" rx="2" fill="#1F5560" opacity="0.7"/>
    <text x="430" y="235" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">~150 TWh</text>
  </g>

  <!-- ROW 2: IA accélérée 155 TWh -->
  <g class="interactive" data-card="ia-acceleree" tabindex="0" role="button" aria-label="IA accélérée">
    <rect class="hit" x="80" y="263" width="1040" height="44" rx="3"/>
    <text x="80" y="285" class="body" font-size="14" font-weight="500" fill="#B7332C">IA accélérée (DC dédiés)</text>
    <text x="80" y="302" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Ritchie / IEA estimation 2025</text>
    <!-- bar from x(100)=380 to x(155)=427 -->
    <rect x="380" y="273" width="47" height="14" rx="2" fill="#B7332C" opacity="0.85"/>
    <text x="434" y="283" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">~155 TWh · 0,5 % global</text>
  </g>

  <!-- ROW 3: Streaming vidéo 200 TWh -->
  <g class="interactive" data-card="streaming" tabindex="0" role="button" aria-label="Streaming vidéo">
    <rect class="hit" x="80" y="311" width="1040" height="44" rx="3"/>
    <text x="80" y="333" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Streaming vidéo (Netflix, YouTube, TikTok…)</text>
    <text x="80" y="350" class="body" font-size="11" font-style="italic" fill="#5A5A5A">IEA Data Centres 2024</text>
    <!-- bar from x(100)=380 to x(200)=453 -->
    <rect x="380" y="321" width="73" height="14" rx="2" fill="#1F5560" opacity="0.7"/>
    <text x="460" y="331" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">~200 TWh</text>
  </g>

  <!-- ROW 4: DC tous usages 485 TWh -->
  <g class="interactive" data-card="dc-total" tabindex="0" role="button" aria-label="Datacenters mondiaux tous usages">
    <rect class="hit" x="80" y="359" width="1040" height="44" rx="3"/>
    <text x="80" y="381" class="body" font-size="14" font-weight="500" fill="#B7332C">Datacenters mondiaux 2025 (tous usages)</text>
    <text x="80" y="398" class="body" font-size="11" font-style="italic" fill="#5A5A5A">IEA Energy and AI 04/2025</text>
    <!-- bar from x(100)=380 to x(485)=547 -->
    <rect x="380" y="369" width="167" height="14" rx="2" fill="#B7332C" opacity="0.85"/>
    <text x="555" y="379" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">485 TWh · 1,5 % global</text>
  </g>

  <!-- ROW 5: Projection DC 2030 945 TWh -->
  <g class="interactive" data-card="dc-2030" tabindex="0" role="button" aria-label="Projection datacenters 2030">
    <rect class="hit" x="80" y="407" width="1040" height="44" rx="3"/>
    <text x="80" y="429" class="body" font-size="14" font-weight="500" fill="#B7332C">Projection datacenters 2030 (AIE central)</text>
    <text x="80" y="446" class="body" font-size="11" font-style="italic" fill="#5A5A5A">IEA Energy and AI — scénario base 04/2025</text>
    <!-- bar from x(100)=380 to x(945)=617 -->
    <rect x="380" y="417" width="237" height="14" rx="2" fill="#B7332C" opacity="0.55"/>
    <text x="624" y="427" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">945 TWh · ~3 % global</text>
  </g>

  <!-- DIVIDER -->
  <line x1="80" y1="464" x2="1110" y2="464" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- COMPARAISONS GRANDS SECTEURS (bottom group) -->
  <text x="80" y="488" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">COMPARAISONS — GRANDS SECTEURS DE LA DEMANDE</text>

  <!-- ROW 6: Aviation civile 1400 TWh -->
  <g class="interactive" data-card="aviation" tabindex="0" role="button" aria-label="Aviation civile mondiale">
    <rect class="hit" x="80" y="500" width="1040" height="36" rx="3"/>
    <text x="80" y="520" class="body" font-size="13" fill="#5A5A5A">Aviation civile mondiale (équivalent énergie)</text>
    <!-- bar from x(100)=380 to x(1400)=638 -->
    <rect x="380" y="510" width="258" height="11" rx="2" fill="#5A5A5A" opacity="0.55"/>
    <text x="646" y="519" class="mono" font-size="12" fill="#5A5A5A">~1 400 TWh</text>
  </g>

  <!-- ROW 7: AC résidentiel 2200 TWh -->
  <g class="interactive" data-card="aircon" tabindex="0" role="button" aria-label="Air conditioning résidentiel mondial">
    <rect class="hit" x="80" y="536" width="1040" height="36" rx="3"/>
    <text x="80" y="556" class="body" font-size="13" fill="#5A5A5A">Air conditioning résidentiel mondial</text>
    <!-- bar from x(100)=380 to x(2200)=688 -->
    <rect x="380" y="546" width="308" height="11" rx="2" fill="#5A5A5A" opacity="0.55"/>
    <text x="696" y="555" class="mono" font-size="12" fill="#5A5A5A">~2 200 TWh</text>
  </g>

  <!-- ROW 8: Lighting 3500 TWh -->
  <g class="interactive" data-card="eclairage" tabindex="0" role="button" aria-label="Éclairage mondial">
    <rect class="hit" x="80" y="572" width="1040" height="36" rx="3"/>
    <text x="80" y="592" class="body" font-size="13" fill="#5A5A5A">Éclairage mondial (résidentiel + commercial)</text>
    <!-- bar from x(100)=380 to x(3500)=730 -->
    <rect x="380" y="582" width="350" height="11" rx="2" fill="#5A5A5A" opacity="0.55"/>
    <text x="738" y="591" class="mono" font-size="12" fill="#5A5A5A">~3 500 TWh</text>
  </g>

  <!-- PRODUCTION ELEC MONDIALE — référence master -->
  <g class="interactive" data-card="prod-mondiale" tabindex="0" role="button" aria-label="Production électrique mondiale">
    <rect class="hit" x="80" y="660" width="1040" height="62" rx="3"/>
    <line x1="80" y1="657" x2="1110" y2="657" stroke="#E5E1D8" stroke-width="0.5"/>
    <!-- Title row -->
    <text x="80" y="678" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Production électrique mondiale (2024)</text>
    <text x="80" y="694" class="body" font-size="11" font-style="italic" fill="#5A5A5A">référence — IEA World Energy Outlook 2024</text>
    <!-- Bar row, stacked below title -->
    <rect x="380" y="702" width="623" height="13" rx="2" fill="#1A1A1A" opacity="0.85"/>
    <text x="1010" y="712" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">~30 000 TWh</text>
  </g>

  <!-- HIGHLIGHT ANNOTATION (top right) -->
  <g>
    <rect x="640" y="170" width="470" height="22" rx="3" fill="#FAEDC8" opacity="0.6"/>
    <text x="650" y="186" class="body" font-size="12" font-style="italic" fill="#1A1A1A">L'IA accélérée = équivalent crypto, &lt; streaming vidéo, &lt;&lt; aviation</text>
  </g>

  <!-- FOOTER -->
  <line x1="80" y1="735" x2="1120" y2="735" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="756" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Sources : IEA Energy and AI 04/2025 ; IEA World Energy Outlook 2024 ; Cambridge CBECI ; Ritchie 08/2025 ; IEA Air Conditioning Future ; UN Environment Lighting.</text>
  <text x="80" y="774" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Lecture : l'IA accélérée ≈ équivalent du crypto et inférieur au streaming vidéo en absolu mondial. Le débat agrégé doit déplacer vers la concentration locale (cf. schéma 5).</text>
</svg>
