<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive rect.hit { fill: transparent; stroke: transparent; }
      .interactive:hover rect.hit, .interactive:focus rect.hit { stroke: #B7332C; stroke-width: 1.5; stroke-dasharray: 3 3; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <g class="svg-header">
    <text x="80" y="48" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCHÉMA 03 — ÉCHELLE LOGARITHMIQUE</text>
    <text x="80" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Une requête, quatre ordres de grandeur</text>
    <text x="80" y="124" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Énergie par interaction IA en 2026, classée par ordre croissant — colonnes labels (gauche) et zone chart (droite)</text>
  </g>

  <!-- COLUMN DIVIDER between labels and chart -->
  <line x1="320" y1="180" x2="320" y2="660" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- COLUMN HEADERS -->
  <text x="80" y="174" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">CATÉGORIE</text>
  <text x="330" y="174" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">ÉCHELLE LOGARITHMIQUE (Wh)</text>

  <!-- LOG AXIS bottom (chart area x=320 to x=1110, 4 decades 0,1 → 1000) -->
  <!-- x for v = 320 + log10(v/0.1)*197.5 -->
  <line x1="320" y1="620" x2="1110" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- Tick marks: 0.1, 1, 10, 100, 1000 Wh -->
  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5A" text-anchor="middle">
    <line x1="320" y1="615" x2="320" y2="625" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="320" y="644">0,1 Wh</text>

    <line x1="517" y1="615" x2="517" y2="625" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="517" y="644">1 Wh</text>

    <line x1="715" y1="615" x2="715" y2="625" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="715" y="644">10 Wh</text>

    <line x1="912" y1="615" x2="912" y2="625" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="912" y="644">100 Wh</text>

    <line x1="1110" y1="615" x2="1110" y2="625" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="1110" y="644">1 000 Wh</text>
  </g>

  <!-- Vertical gridlines -->
  <line x1="517" y1="200" x2="517" y2="615" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="715" y1="200" x2="715" y2="615" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="912" y1="200" x2="912" y2="615" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- ROW 1: TEXTE DIRECT 0.2-0.4 Wh (ordre croissant 1) -->
  <g class="interactive" data-card="texte-direct" tabindex="0" role="button" aria-label="Texte direct GPT-4o">
    <rect class="hit" x="80" y="200" width="1040" height="46" rx="3"/>
    <text x="80" y="222" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Texte direct</text>
    <text x="80" y="240" class="body" font-size="11" font-style="italic" fill="#5A5A5A">GPT-4o, Gemini Flash, Claude Sonnet</text>
    <!-- bar from x(0.2)=379 to x(0.4)=439 -->
    <rect x="379" y="225" width="60" height="14" rx="2" fill="#1F5560" opacity="0.85"/>
    <text x="447" y="235" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">0,2–0,4 Wh</text>
  </g>

  <!-- ROW 2: IMAGE GÉNÉRÉE 2-4 Wh (ordre croissant 2) -->
  <g class="interactive" data-card="image-gen" tabindex="0" role="button" aria-label="Image générée">
    <rect class="hit" x="80" y="260" width="1040" height="46" rx="3"/>
    <text x="80" y="282" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Image générée</text>
    <text x="80" y="300" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Imagen 4, Flux 1.1 Pro, Midjourney v7 — 1024×1024</text>
    <!-- bar from x(2)=577 to x(4)=636 -->
    <rect x="577" y="285" width="59" height="14" rx="2" fill="#B58A2C" opacity="0.85"/>
    <text x="644" y="295" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">2–4 Wh</text>
  </g>

  <!-- ROW 3: TEXTE RAISONNEMENT 5-20 Wh (ordre croissant 3) -->
  <g class="interactive" data-card="texte-raisonnement" tabindex="0" role="button" aria-label="Texte raisonnement o3/R1">
    <rect class="hit" x="80" y="320" width="1040" height="46" rx="3"/>
    <text x="80" y="342" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Texte avec raisonnement</text>
    <text x="80" y="360" class="body" font-size="11" font-style="italic" fill="#5A5A5A">o3, Claude Opus thinking, DeepSeek R1</text>
    <!-- bar from x(5)=655 to x(20)=774 -->
    <rect x="655" y="345" width="119" height="14" rx="2" fill="#B7332C" opacity="0.85"/>
    <text x="782" y="355" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">5–20 Wh · ×20-70</text>
  </g>

  <!-- ROW 4: VIDÉO GÉNÉRÉE 50-1000 Wh (ordre croissant 4) -->
  <g class="interactive" data-card="video-gen" tabindex="0" role="button" aria-label="Vidéo générée">
    <rect class="hit" x="80" y="380" width="1040" height="46" rx="3"/>
    <text x="80" y="402" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Vidéo générée</text>
    <text x="80" y="420" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Sora 2, Veo 3, Kling 2 — clip 6-30 s</text>
    <!-- bar from x(50)=853 to x(1000)=1110 -->
    <rect x="853" y="405" width="257" height="14" rx="2" fill="#B7332C" opacity="0.95"/>
    <text x="853" y="395" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">50–1 000 Wh · le poste qui explose</text>
  </g>

  <!-- DIVIDER -->
  <line x1="80" y1="442" x2="1110" y2="442" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="465" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">RÉFÉRENCES FAMILIÈRES — ORDRE CROISSANT</text>

  <!-- ROW 5: MICROWAVE 0.28 Wh (ref croissant 1) -->
  <g class="interactive" data-card="microwave" tabindex="0" role="button" aria-label="Micro-ondes 1 seconde">
    <rect class="hit" x="80" y="475" width="1040" height="38" rx="3"/>
    <text x="80" y="498" class="body" font-size="13" fill="#5A5A5A">Micro-ondes (1 seconde)</text>
    <!-- dot at x(0.28)=408 -->
    <circle cx="408" cy="497" r="6" fill="#5A5A5A"/>
    <text x="421" y="501" class="mono" font-size="12" fill="#5A5A5A">0,28 Wh</text>
  </g>

  <!-- ROW 6: GOOGLE SEARCH AI 3-4 Wh (ref croissant 2) -->
  <g class="interactive" data-card="google-search" tabindex="0" role="button" aria-label="Recherche Google AI">
    <rect class="hit" x="80" y="513" width="1040" height="38" rx="3"/>
    <text x="80" y="536" class="body" font-size="13" fill="#5A5A5A">Recherche Google avec AI Overview</text>
    <!-- dot at x(3.5)≈625 -->
    <circle cx="625" cy="535" r="6" fill="#5A5A5A"/>
    <text x="638" y="539" class="mono" font-size="12" fill="#5A5A5A">3–4 Wh</text>
  </g>

  <!-- ROW 7: LED 5-10 Wh (ref croissant 3) -->
  <g class="interactive" data-card="led" tabindex="0" role="button" aria-label="Ampoule LED 1 heure">
    <rect class="hit" x="80" y="551" width="1040" height="38" rx="3"/>
    <text x="80" y="574" class="body" font-size="13" fill="#5A5A5A">Ampoule LED (1 heure)</text>
    <!-- dot at x(7.5)≈690 -->
    <circle cx="690" cy="573" r="6" fill="#5A5A5A"/>
    <text x="703" y="577" class="mono" font-size="12" fill="#5A5A5A">5–10 Wh</text>
  </g>

  <!-- ROW 8: IPHONE 17 Wh (ref croissant 4) -->
  <g class="interactive" data-card="iphone" tabindex="0" role="button" aria-label="Charge iPhone">
    <rect class="hit" x="80" y="589" width="1040" height="38" rx="3"/>
    <text x="80" y="612" class="body" font-size="13" fill="#5A5A5A">Charge complète iPhone 15 Pro</text>
    <!-- dot at x(17)=760 -->
    <circle cx="760" cy="611" r="6" fill="#5A5A5A"/>
    <text x="773" y="615" class="mono" font-size="12" fill="#5A5A5A">17 Wh</text>
  </g>

  <!-- HIGHLIGHT ANNOTATION (top right) -->
  <g>
    <rect x="620" y="170" width="490" height="22" rx="3" fill="#FAEDC8" opacity="0.6"/>
    <text x="630" y="186" class="body" font-size="12" font-style="italic" fill="#1A1A1A">10 requêtes ChatGPT ≈ 10 secondes de four micro-ondes (Hannah Ritchie, 08/2025)</text>
  </g>

  <!-- AXIS TITLE -->
  <text x="715" y="668" class="mono" font-size="12" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A" text-anchor="middle">ÉNERGIE PAR INTERACTION (LOG)</text>

  <!-- FOOTER -->
  <line x1="80" y1="730" x2="1120" y2="730" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="754" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Sources : Epoch AI (02/2025) ; OpenAI &amp; Google Cloud blogs (08/2025) ; estimations Sora 2 / Veo 3 d'après token-counts publics ; Ritchie 2025.</text>
  <text x="80" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Lecture : 4 ordres de grandeur séparent une réponse texte d'une génération vidéo. La même métrique « par requête » écrase cette diversité.</text>
</svg>
