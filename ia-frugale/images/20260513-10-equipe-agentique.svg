<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive rect.hit { fill: transparent; stroke: transparent; }
      .interactive:hover rect.hit, .interactive:focus rect.hit { stroke: #B7332C; stroke-width: 1.5; stroke-dasharray: 3 3; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <g class="svg-header">
    <text x="80" y="48" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCHÉMA 10 — CAS CONCRET : ÉQUIPE AGENTIQUE</text>
    <text x="80" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Une équipe de 10 personnes, 220 jours, agents + MCP</text>
    <text x="80" y="124" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Stack-up énergétique d'un développeur agentique 2026, multiplié par l'équipe, comparé aux usages familiers — kWh annuels</text>
  </g>

  <!-- ============================================================== -->
  <!-- PANEL A : 1 JOURNÉE / 1 PERSONNE (y=155 to y=400) -->
  <!-- ============================================================== -->
  <text x="80" y="172" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">A · UNE JOURNÉE DE TRAVAIL — 1 DÉVELOPPEUR AGENTIQUE 2026</text>

  <!-- Bar layout : 5 actions stacked horizontally, total 645 Wh -->
  <!-- Total width = 1040 px (x=80 to x=1120). Scale: 1040 px = 645 Wh, so 1 Wh = 1.612 px -->
  <!-- chat 60 Wh = 96.7 px ; reasoning 400 Wh = 645 px ; MCP 160 Wh = 258 px ; image 15 Wh = 24 px ; video 10 Wh = 16 px -->
  <!-- positions: x=80, chat ends 176.7 ; reasoning ends 822 ; MCP ends 1080 ; image ends 1104 ; video ends 1120 -->

  <g transform="translate(80, 200)">
    <!-- CHAT 60 Wh -->
    <g class="interactive" data-card="daily-chat" tabindex="0" role="button" aria-label="Chat direct 200 msg/jour">
      <rect class="hit" x="0" y="0" width="97" height="48" rx="3"/>
      <rect x="0" y="0" width="97" height="48" rx="2" fill="#1F5560" opacity="0.85"/>
      <text x="48" y="22" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">CHAT</text>
      <text x="48" y="38" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">60 Wh</text>
    </g>
    <!-- REASONING 400 Wh -->
    <g class="interactive" data-card="daily-reasoning" tabindex="0" role="button" aria-label="Reasoning 50 turns/jour">
      <rect class="hit" x="100" y="0" width="645" height="48" rx="3"/>
      <rect x="100" y="0" width="645" height="48" rx="2" fill="#B7332C" opacity="0.85"/>
      <text x="422" y="22" class="display" font-size="14" font-weight="600" fill="#FAF8F3" text-anchor="middle">REASONING (o3, Claude thinking, R1)</text>
      <text x="422" y="40" class="mono" font-size="12" fill="#FAF8F3" text-anchor="middle">50 turns × 8 Wh = 400 Wh · le poste qui dominent</text>
    </g>
    <!-- MCP 160 Wh -->
    <g class="interactive" data-card="daily-mcp" tabindex="0" role="button" aria-label="MCP tool calls 80/jour">
      <rect class="hit" x="748" y="0" width="258" height="48" rx="3"/>
      <rect x="748" y="0" width="258" height="48" rx="2" fill="#B58A2C" opacity="0.85"/>
      <text x="877" y="22" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">MCP TOOL CALLS</text>
      <text x="877" y="38" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">80 × 2 Wh = 160 Wh</text>
    </g>
    <!-- IMAGE 15 Wh -->
    <g class="interactive" data-card="daily-image" tabindex="0" role="button" aria-label="Image gen 5/jour">
      <rect class="hit" x="1009" y="0" width="24" height="48" rx="3"/>
      <rect x="1009" y="0" width="24" height="48" rx="2" fill="#2F5D3F" opacity="0.8"/>
    </g>
    <!-- VIDEO 10 Wh -->
    <g class="interactive" data-card="daily-video" tabindex="0" role="button" aria-label="Vidéo amortie">
      <rect class="hit" x="1036" y="0" width="16" height="48" rx="3"/>
      <rect x="1036" y="0" width="16" height="48" rx="2" fill="#1E3A5F" opacity="0.8"/>
    </g>

    <!-- Annotation for image and video below the bar -->
    <line x1="1021" y1="56" x2="1021" y2="68" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="970" y="82" class="body" font-size="11" fill="#5A5A5A" text-anchor="end">Image · 15 Wh</text>
    <text x="970" y="96" class="body" font-size="10" fill="#5A5A5A" font-style="italic" text-anchor="end">5 × 3 Wh (slides)</text>

    <line x1="1044" y1="56" x2="1044" y2="68" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="1110" y="82" class="body" font-size="11" fill="#5A5A5A" text-anchor="end">Vidéo · 10 Wh</text>
    <text x="1110" y="96" class="body" font-size="10" fill="#5A5A5A" font-style="italic" text-anchor="end">amorti / occasionnel</text>
  </g>

  <!-- Annotations chat, reasoning, MCP volumes below -->
  <text x="80" y="285" class="body" font-size="11" font-style="italic" fill="#5A5A5A">200 messages</text>
  <text x="180" y="285" class="body" font-size="11" font-style="italic" fill="#5A5A5A">50 turns (réflexion 5-30 s chacun, ×20-70 vs chat direct)</text>
  <text x="828" y="285" class="body" font-size="11" font-style="italic" fill="#5A5A5A">80 calls (avec prompt caching)</text>

  <!-- Total -->
  <g>
    <rect x="80" y="318" width="1040" height="46" rx="3" fill="#F2EDDE" opacity="0.6"/>
    <text x="100" y="340" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Total quotidien — 1 personne</text>
    <text x="1100" y="340" class="mono" font-size="22" font-weight="600" fill="#B7332C" text-anchor="end">~645 Wh / jour</text>
    <text x="100" y="358" class="body" font-size="12" font-style="italic" fill="#5A5A5A">soit l'équivalent d'1h d'ordinateur portable, ou ~2 charges complètes d'iPhone 15 Pro</text>
  </g>

  <!-- ============================================================== -->
  <!-- PANEL B : ÉCHELLE ANNUELLE — COMPARAISONS (y=405 to y=710) -->
  <!-- ============================================================== -->
  <!-- Highlight band between Panel A and Panel B -->
  <rect x="80" y="372" width="1040" height="20" rx="3" fill="#FAEDC8" opacity="0.6"/>
  <text x="90" y="387" class="body" font-size="12" font-style="italic" fill="#1A1A1A">10 % d'une voiture, ~½ vol Paris-NY, 7 frigos — pour 10 personnes agentiques sur une année entière</text>

  <line x1="80" y1="402" x2="1120" y2="402" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="424" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">B · UNE ANNÉE × ÉQUIPE — KWH ANNUELS, ÉCHELLE LOGARITHMIQUE</text>

  <!-- Column divider labels left, chart right -->
  <line x1="380" y1="430" x2="380" y2="690" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LOG AXIS bottom : x=380 to x=1110, 3 decades 100 → 100 000 kWh -->
  <!-- x for v = 380 + log10(v/100) * 243.33 -->
  <line x1="380" y1="690" x2="1110" y2="690" stroke="#1A1A1A" stroke-width="1.25"/>

  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#5A5A5A" text-anchor="middle">
    <line x1="380" y1="685" x2="380" y2="695" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="380" y="708">100</text>

    <line x1="623" y1="685" x2="623" y2="695" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="623" y="708">1 000</text>

    <line x1="867" y1="685" x2="867" y2="695" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="867" y="708">10 000</text>

    <line x1="1110" y1="685" x2="1110" y2="695" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="1110" y="708">100 000 kWh / an</text>
  </g>

  <line x1="623" y1="436" x2="623" y2="685" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="867" y1="436" x2="867" y2="685" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- ROW 1 : 1 personne 142 kWh/an -->
  <g class="interactive" data-card="annual-1-personne" tabindex="0" role="button" aria-label="1 personne 142 kWh / an">
    <rect class="hit" x="80" y="436" width="1040" height="34" rx="3"/>
    <text x="80" y="456" class="body" font-size="13" font-weight="500" fill="#B7332C">1 personne agentique (220 j ouvrés)</text>
    <text x="80" y="470" class="body" font-size="11" font-style="italic" fill="#5A5A5A">220 × 0,645 kWh</text>
    <!-- bar from x(100)=380 to x(142)=417 -->
    <rect x="380" y="445" width="37" height="12" rx="2" fill="#B7332C" opacity="0.85"/>
    <text x="424" y="455" class="mono" font-size="12" font-weight="600" fill="#1A1A1A">~142 kWh</text>
  </g>

  <!-- ROW 2 : Équipe 10 personnes 1420 kWh/an -->
  <g class="interactive" data-card="annual-equipe-10" tabindex="0" role="button" aria-label="Équipe 10 personnes 1420 kWh">
    <rect class="hit" x="80" y="473" width="1040" height="34" rx="3"/>
    <text x="80" y="493" class="body" font-size="13" font-weight="500" fill="#B7332C">Équipe 10 personnes (220 j)</text>
    <text x="80" y="507" class="body" font-size="11" font-style="italic" fill="#5A5A5A">10 × 142 kWh</text>
    <!-- bar from x(100)=380 to x(1420)=652 -->
    <rect x="380" y="482" width="272" height="12" rx="2" fill="#B7332C" opacity="0.85"/>
    <text x="659" y="492" class="mono" font-size="12" font-weight="600" fill="#1A1A1A">~1 420 kWh = 1,4 MWh</text>
  </g>

  <line x1="80" y1="515" x2="1110" y2="515" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ROW 3 : 1 frigo 200 kWh -->
  <g class="interactive" data-card="annual-frigo" tabindex="0" role="button" aria-label="1 frigo A++ 200 kWh">
    <rect class="hit" x="80" y="520" width="1040" height="32" rx="3"/>
    <text x="80" y="540" class="body" font-size="13" fill="#5A5A5A">1 réfrigérateur A++ moderne</text>
    <!-- bar from x(100)=380 to x(200)=453 -->
    <rect x="380" y="530" width="73" height="10" rx="2" fill="#5A5A5A" opacity="0.55"/>
    <text x="460" y="539" class="mono" font-size="12" fill="#5A5A5A">200 kWh / an</text>
  </g>

  <!-- ROW 4 : 1 climatiseur résidentiel 600 kWh -->
  <g class="interactive" data-card="annual-climat" tabindex="0" role="button" aria-label="1 climatiseur résidentiel saison 600 kWh">
    <rect class="hit" x="80" y="555" width="1040" height="32" rx="3"/>
    <text x="80" y="575" class="body" font-size="13" fill="#5A5A5A">1 climatiseur résidentiel · saison été</text>
    <!-- bar from x(100)=380 to x(600)=569 -->
    <rect x="380" y="565" width="189" height="10" rx="2" fill="#5A5A5A" opacity="0.55"/>
    <text x="577" y="574" class="mono" font-size="12" fill="#5A5A5A">600 kWh</text>
  </g>

  <!-- ROW 5 : 1 vol Paris-NY 1 pax 2200 kWh -->
  <g class="interactive" data-card="annual-vol" tabindex="0" role="button" aria-label="1 vol Paris-NY 1 pax 2200 kWh">
    <rect class="hit" x="80" y="590" width="1040" height="32" rx="3"/>
    <text x="80" y="610" class="body" font-size="13" fill="#5A5A5A">1 vol Paris-NY aller-retour (1 pax)</text>
    <!-- bar from x(100)=380 to x(2200)=716 -->
    <rect x="380" y="600" width="336" height="10" rx="2" fill="#5A5A5A" opacity="0.55"/>
    <text x="724" y="609" class="mono" font-size="12" fill="#5A5A5A">~2 200 kWh</text>
  </g>

  <!-- ROW 6 : 1 ménage français élec 4500 kWh -->
  <g class="interactive" data-card="annual-menage" tabindex="0" role="button" aria-label="1 ménage français électricité 4500 kWh">
    <rect class="hit" x="80" y="625" width="1040" height="32" rx="3"/>
    <text x="80" y="645" class="body" font-size="13" fill="#5A5A5A">1 ménage français · électricité hors chauffage</text>
    <!-- bar from x(100)=380 to x(4500)=783 -->
    <rect x="380" y="635" width="403" height="10" rx="2" fill="#5A5A5A" opacity="0.55"/>
    <text x="791" y="644" class="mono" font-size="12" fill="#5A5A5A">~4 500 kWh</text>
  </g>

  <!-- ROW 7 : 1 voiture essence 10k km 14000 kWh -->
  <g class="interactive" data-card="annual-voiture" tabindex="0" role="button" aria-label="1 voiture essence 14000 kWh">
    <rect class="hit" x="80" y="660" width="1040" height="28" rx="3"/>
    <text x="80" y="678" class="body" font-size="13" fill="#5A5A5A">1 voiture essence · 10 000 km/an</text>
    <!-- bar from x(100)=380 to x(14000)=906 -->
    <rect x="380" y="668" width="526" height="10" rx="2" fill="#5A5A5A" opacity="0.55"/>
    <text x="914" y="677" class="mono" font-size="12" fill="#5A5A5A">~14 000 kWh</text>
  </g>

  <!-- FOOTER -->
  <line x1="80" y1="735" x2="1120" y2="735" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="756" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Sources : profil &quot;dev agentique 2026&quot; reconstruit d'après usage observé Anthropic/Cursor/Copilot ; ADEME (frigo, climat, ménage FR) ; ICAO carbon calculator ; ConsoGlobe.</text>
  <text x="80" y="774" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Lecture : à l'échelle d'une équipe complète, l'usage agentique est mesurable mais pas dramatique. Le débat individuel « culpabilité du prompt » est mal calibré.</text>
</svg>
