<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive rect.hit { fill: transparent; stroke: transparent; }
      .interactive:hover rect.hit, .interactive:focus rect.hit { stroke: #B7332C; stroke-width: 1.5; stroke-dasharray: 3 3; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <g class="svg-header">
    <text x="80" y="48" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCHÉMA 06 — CARBONE FANTÔME</text>
    <text x="80" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">L'embodied carbon, le poste qui devient dominant</text>
    <text x="80" y="124" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Décomposition d'un H100 baseboard (1 312 kg CO₂eq) et durée d'usage pour amortir l'embodied selon le mix électrique</text>
  </g>

  <!-- LEFT PANEL: H100 STACKED BAR (decomposition) -->
  <g>
    <text x="80" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">A. EMPREINTE FABRICATION — HGX H100 BASEBOARD</text>

    <text x="80" y="220" class="display" font-size="22" font-weight="600" fill="#1A1A1A">1 312 kg CO₂eq</text>
    <text x="80" y="244" class="body" font-size="12" fill="#5A5A5A">par baseboard 8× GPU · ~164 kg / carte</text>

    <!-- Stacked vertical bar -->
    <!-- Total 1312 kg = height 380 (from y=290 to y=670) -->
    <!-- Mémoire 42% = 159.6 px; ICs 25% = 95 px; Thermique 18% = 68.4 px; Autres 15% = 57 px -->
    <!-- y top: 290; segments: 0-160 (memory), 160-255 (ICs), 255-323 (thermal), 323-380 (others) -->

    <g transform="translate(80, 290)">
      <g class="interactive" data-card="h100-memory" tabindex="0" role="button" aria-label="Mémoire HBM3">
        <rect class="hit" x="0" y="0" width="220" height="160" rx="3"/>
        <rect x="0" y="0" width="220" height="160" fill="#B7332C" opacity="0.85"/>
        <text x="110" y="68" class="display" font-size="22" font-weight="600" fill="#FAF8F3" text-anchor="middle">42 %</text>
        <text x="110" y="92" class="body" font-size="13" fill="#FAF8F3" text-anchor="middle">Mémoire HBM3</text>
        <text x="110" y="108" class="body" font-size="11" fill="#FAF8F3" text-anchor="middle" font-style="italic">SK Hynix dominant</text>
      </g>

      <g class="interactive" data-card="h100-ics" tabindex="0" role="button" aria-label="Logique die GPU">
        <rect class="hit" x="0" y="160" width="220" height="95" rx="3"/>
        <rect x="0" y="160" width="220" height="95" fill="#1F5560" opacity="0.85"/>
        <text x="110" y="200" class="display" font-size="20" font-weight="600" fill="#FAF8F3" text-anchor="middle">25 %</text>
        <text x="110" y="222" class="body" font-size="12" fill="#FAF8F3" text-anchor="middle">Logique die + interposeur</text>
        <text x="110" y="238" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle" font-style="italic">TSMC 4N · CoWoS</text>
      </g>

      <g class="interactive" data-card="h100-thermal" tabindex="0" role="button" aria-label="Thermique vapor chamber">
        <rect class="hit" x="0" y="255" width="220" height="68" rx="3"/>
        <rect x="0" y="255" width="220" height="68" fill="#B58A2C" opacity="0.85"/>
        <text x="110" y="285" class="display" font-size="18" font-weight="600" fill="#FAF8F3" text-anchor="middle">18 %</text>
        <text x="110" y="305" class="body" font-size="11" fill="#FAF8F3" text-anchor="middle">Vapor chamber, plaque</text>
      </g>

      <g class="interactive" data-card="h100-others" tabindex="0" role="button" aria-label="Autres composants">
        <rect class="hit" x="0" y="323" width="220" height="57" rx="3"/>
        <rect x="0" y="323" width="220" height="57" fill="#5A5A5A" opacity="0.7"/>
        <text x="110" y="350" class="display" font-size="16" font-weight="600" fill="#FAF8F3" text-anchor="middle">15 %</text>
        <text x="110" y="367" class="body" font-size="11" fill="#FAF8F3" text-anchor="middle">PCB, connecteurs, packaging</text>
      </g>
    </g>

    <!-- Annotations à droite -->
    <line x1="320" y1="370" x2="370" y2="370" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="378" y="365" class="body" font-size="12" fill="#1A1A1A" font-weight="500">Mémoire HBM = 42 %</text>
    <text x="378" y="379" class="body" font-size="11" font-style="italic" fill="#5A5A5A">l'angle mort de la décarbonation : SK Hynix &amp; Samsung en Corée</text>

    <line x1="320" y1="488" x2="370" y2="488" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="378" y="483" class="body" font-size="12" fill="#1A1A1A" font-weight="500">B200 : –24 % par exaflop</text>
    <text x="378" y="497" class="body" font-size="11" font-style="italic" fill="#5A5A5A">mais +2,6× transistors et +2× die → embodied par carte plus élevé</text>

    <!-- Quote -->
    <rect x="80" y="700" width="540" height="36" rx="3" fill="#F2EDDE" opacity="0.6"/>
    <text x="100" y="722" class="body" font-size="11" font-style="italic" fill="#1A1A1A">« 1 312 kg CO₂eq par baseboard HGX H100 » — NVIDIA, Product Carbon Footprint Summary 2024</text>
  </g>

  <!-- RIGHT PANEL: AMORTISATION CURVE -->
  <g>
    <text x="700" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">B. AMORTISSEMENT EMBODIED vs OPÉRATIONNEL</text>
    <text x="700" y="200" class="body" font-size="12" fill="#5A5A5A" font-style="italic">Combien d'années d'usage pour que l'opérationnel dépasse les 164 kg fabrication ?</text>

    <!-- Axes -->
    <!-- x = années 0 à 7; chart from 700 to 1150 wide = 450 px; 1 year = 64.3 px -->
    <!-- y = kg CO2eq 0 à 800 ; chart from 240 to 620 height = 380 px; 100 kg = 47.5 px -->
    <line x1="700" y1="620" x2="1150" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>
    <line x1="700" y1="240" x2="700" y2="620" stroke="#1A1A1A" stroke-width="1.25"/>

    <!-- y gridlines -->
    <line x1="700" y1="525" x2="1150" y2="525" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
    <line x1="700" y1="430" x2="1150" y2="430" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
    <line x1="700" y1="335" x2="1150" y2="335" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
    <line x1="700" y1="240" x2="1150" y2="240" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>

    <!-- y labels -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#5A5A5A" text-anchor="end">
      <text x="692" y="623">0</text>
      <text x="692" y="528">200</text>
      <text x="692" y="433">400</text>
      <text x="692" y="338">600</text>
      <text x="692" y="243">800 kg CO₂eq</text>
    </g>

    <!-- x labels -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#5A5A5A" text-anchor="middle">
      <text x="700" y="638">0 an</text>
      <text x="764" y="638">1</text>
      <text x="828" y="638">2</text>
      <text x="892" y="638">3</text>
      <text x="957" y="638">4</text>
      <text x="1021" y="638">5</text>
      <text x="1085" y="638">6</text>
      <text x="1149" y="638">7</text>
    </g>

    <!-- Embodied baseline horizontal -->
    <line x1="700" y1="542" x2="1150" y2="542" stroke="#1A1A1A" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="1150" y="540" class="mono" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="end">164 kg embodied · constant</text>

    <!-- Curve 1: Carbon grid 600 g/kWh (Wyoming/Inde) — 300W active × 8760h/year × 0.6 kg/kWh = 1577 kg/year — y mapping bad. Use 300W × 6000 h/year (50% load) × 0.6 = 1080 kg/year => slope 1080/year -->
    <!-- y(1080) at year 1: 620 - 1080 * 0.475 = 620 - 513.. ouch off chart. Let me rescale: max y = 800 kg, so y=620-kg*0.475 -->
    <!-- Let's use realistic 300W × 4000h × c -->
    <!-- Carbon grid c=0.6 kg/kWh → 720 kg/year → y(year)=620-720*y*0.475 → too much. Recompute mapping: pixel per kg = 380/800 = 0.475. y(720 at year 1) = 620 - 720*0.475 = 620-342 = 278. OK that fits. -->
    <!-- carbon grid: slope 720 kg/year, hits 164 kg at year 0.228 (~3 months) -->
    <g class="interactive" data-card="amort-carbon" tabindex="0" role="button" aria-label="Mix carboné">
      <rect class="hit" x="700" y="240" width="200" height="385"/>
      <!-- linear y = 620 - (slope*year)*0.475; for slope=720, points: (0,620), (1, 620-720*0.475)=(1, 278) -->
      <line x1="700" y1="620" x2="764" y2="278" stroke="#B7332C" stroke-width="2.5"/>
      <line x1="764" y1="278" x2="780" y2="245" stroke="#B7332C" stroke-width="2.5" stroke-dasharray="3 3"/>
      <text x="794" y="263" class="body" font-size="12" font-weight="500" fill="#B7332C">Grid carboné 600 g/kWh</text>
      <text x="794" y="278" class="body" font-size="11" font-style="italic" fill="#5A5A5A">~3 mois pour amortir l'embodied</text>
    </g>

    <!-- EU mix 250 g/kWh: slope 300 kg/year ; (1, 620-142)=478, (2, 620-285)=335, (3, 620-427)=193, (4, 620-570)=50 -->
    <g class="interactive" data-card="amort-eu" tabindex="0" role="button" aria-label="Mix Europe">
      <rect class="hit" x="700" y="380" width="350" height="245"/>
      <line x1="700" y1="620" x2="1085" y2="245" stroke="#B58A2C" stroke-width="2.5"/>
      <text x="900" y="495" class="body" font-size="12" font-weight="500" fill="#B58A2C">Grid EU mix 250 g/kWh</text>
      <text x="900" y="510" class="body" font-size="11" font-style="italic" fill="#5A5A5A">~7 mois pour amortir</text>
    </g>

    <!-- Nuclear dedicated 30 g/kWh: slope 36 kg/year; year 7: 620-36*7*0.475 = 620-120 = 500 -->
    <g class="interactive" data-card="amort-nuclear" tabindex="0" role="button" aria-label="Mix nucléaire dédié">
      <rect class="hit" x="700" y="450" width="450" height="175"/>
      <line x1="700" y1="620" x2="1149" y2="500" stroke="#1F5560" stroke-width="2.5"/>
      <text x="900" y="588" class="body" font-size="12" font-weight="500" fill="#1F5560">Nucléaire dédié 30 g/kWh</text>
      <text x="900" y="603" class="body" font-size="11" font-style="italic" fill="#5A5A5A">~4–5 ans : embodied dominant</text>
    </g>

    <!-- Crossing points marker -->
    <circle cx="764" cy="278" r="4" fill="#B7332C"/>

    <!-- Quote -->
    <g class="interactive" data-card="inversion" tabindex="0" role="button" aria-label="Inversion silencieuse">
      <rect class="hit" x="700" y="700" width="450" height="50" rx="3"/>
      <rect x="700" y="700" width="450" height="50" rx="3" fill="#F2EDDE" opacity="0.6"/>
      <text x="715" y="722" class="body" font-size="12" font-weight="500" fill="#1A1A1A">L'inversion silencieuse</text>
      <text x="715" y="740" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Plus l'opérationnel se décarbone, plus la fabrication devient dominante.</text>
    </g>
  </g>

  <!-- FOOTER -->
  <line x1="80" y1="760" x2="1120" y2="760" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="785" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Sources : NVIDIA HGX-H100 PCF Summary 2024 ; Patterson &amp; al. 2021 ; Gupta &amp; al. (Chasing Carbon) HPCA 2021 ; Greenpeace East Asia 04/2025 ; hypothèse 300 W × 4 000 h/an d'usage.</text>
</svg>
