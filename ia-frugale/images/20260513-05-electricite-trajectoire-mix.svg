<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive rect.hit { fill: transparent; stroke: transparent; }
      .interactive:hover rect.hit, .interactive:focus rect.hit { stroke: #B7332C; stroke-width: 1.5; stroke-dasharray: 3 3; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <g class="svg-header">
    <text x="80" y="48" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCHÉMA 05 — DEMANDE ÉLECTRIQUE</text>
    <text x="80" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Doubler en cinq ans, et payer la facture localement</text>
    <text x="80" y="124" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Trajectoire mondiale des datacenters, mix énergétique de la nouvelle demande, et concentration sur trois hubs</text>
  </g>

  <!-- LEFT PANEL: STACKED AREA 2014-2035 -->
  <g>
    <text x="80" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">A. CONSOMMATION DATACENTERS — MONDE (TWh)</text>

    <!-- y axis 0-1400 TWh; x axis 2014-2035 -->
    <!-- y mapping: 600 (bottom) → 0 ; 220 (top) → 1400. height 380 -->
    <!-- 1400 TWh = top, 0 TWh = bottom -->
    <!-- y(twh) = 600 - twh * 380/1400 = 600 - twh*0.2714 -->
    <!-- x mapping: 100 (2014) → 600 (2035). 21 years over 500 px = 23.8/year -->
    <!-- x(year) = 100 + (year-2014) * 23.81 -->

    <!-- gridlines -->
    <line x1="100" y1="220" x2="600" y2="220" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
    <line x1="100" y1="315" x2="600" y2="315" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
    <line x1="100" y1="410" x2="600" y2="410" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
    <line x1="100" y1="505" x2="600" y2="505" stroke="#E5E1D8" stroke-width="0.5" stroke-dasharray="2 3"/>
    <line x1="100" y1="600" x2="600" y2="600" stroke="#1A1A1A" stroke-width="1.25"/>
    <line x1="100" y1="200" x2="100" y2="600" stroke="#1A1A1A" stroke-width="1.25"/>

    <!-- y labels -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#5A5A5A" text-anchor="end">
      <text x="92" y="603">0</text>
      <text x="92" y="509">350</text>
      <text x="92" y="414">700</text>
      <text x="92" y="319">1 050</text>
      <text x="92" y="224">1 400 TWh</text>
    </g>

    <!-- x labels -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#5A5A5A" text-anchor="middle">
      <text x="100" y="618">2014</text>
      <text x="219" y="618">2019</text>
      <text x="338" y="618">2024</text>
      <text x="457" y="618">2030</text>
      <text x="600" y="618">2035</text>
    </g>

    <!-- Total area: 2014=58, 2019=105, 2023=176, 2024=460(world), 2025=485, 2030=945, 2035=1300 -->
    <!-- y(58)=584, y(105)=572, y(176)=552, y(460)=475, y(485)=468, y(945)=343, y(1300)=247 -->
    <!-- x(2014)=100, x(2019)=219, x(2024)=338, x(2025)=362, x(2030)=481, x(2035)=600 -->

    <path d="M 100 584
             L 219 572
             L 338 475
             L 362 468
             L 481 343
             L 600 247
             L 600 600
             L 100 600 Z" fill="#1F5560" opacity="0.18"/>

    <!-- AI share overlay -->
    <!-- AI: ~5% 2014, ~10% 2019, ~25% 2023, ~30% 2025 (155 TWh), ~50% 2030 (475), ~55% 2035 (715) -->
    <!-- AI values: 2014=3 (y=599), 2019=10 (y=597), 2024=120 (y=567), 2025=155 (y=558), 2030=475 (y=471), 2035=715 (y=406) -->
    <path d="M 100 599
             L 219 597
             L 338 567
             L 362 558
             L 481 471
             L 600 406
             L 600 600
             L 100 600 Z" fill="#B7332C" opacity="0.55"/>

    <!-- Outline curves -->
    <path d="M 100 584 L 219 572 L 338 475 L 362 468 L 481 343 L 600 247"
          fill="none" stroke="#1F5560" stroke-width="2"/>
    <path d="M 100 599 L 219 597 L 338 567 L 362 558 L 481 471 L 600 406"
          fill="none" stroke="#B7332C" stroke-width="2"/>

    <!-- Key annotations -->
    <circle cx="362" cy="468" r="4" fill="#1F5560"/>
    <text x="372" y="463" class="body" font-size="11" fill="#1A1A1A" font-weight="500">485 TWh</text>
    <text x="372" y="478" class="body" font-size="10" fill="#5A5A5A" font-style="italic">2025</text>

    <circle cx="481" cy="343" r="4" fill="#1F5560"/>
    <text x="491" y="338" class="body" font-size="11" fill="#1A1A1A" font-weight="500">945 TWh</text>
    <text x="491" y="353" class="body" font-size="10" fill="#5A5A5A" font-style="italic">2030 · ~3 % global</text>

    <circle cx="481" cy="471" r="4" fill="#B7332C"/>
    <text x="491" y="500" class="body" font-size="11" fill="#1A1A1A" font-weight="500">475 TWh IA</text>

    <!-- Vertical divider entre historique et projection -->
    <line x1="362" y1="220" x2="362" y2="600" stroke="#5A5A5A" stroke-width="0.5" stroke-dasharray="3 3"/>
    <text x="362" y="216" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">projection AIE</text>

    <!-- Legend -->
    <g transform="translate(100, 640)">
      <rect x="0" y="0" width="14" height="14" fill="#B7332C" opacity="0.55"/>
      <text x="22" y="11" class="body" font-size="11" fill="#1A1A1A">Datacenters IA accélérés</text>
      <rect x="200" y="0" width="14" height="14" fill="#1F5560" opacity="0.18" stroke="#1F5560" stroke-width="1"/>
      <text x="222" y="11" class="body" font-size="11" fill="#1A1A1A">Datacenters tous usages</text>
    </g>
  </g>

  <!-- RIGHT PANEL: MIX DEMANDE NOUVELLE (640 to 870) -->
  <g>
    <text x="700" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">B. MIX ÉNERGÉTIQUE — 530 TWh additionnels 2024 → 2030</text>

    <!-- Stacked horizontal bar -->
    <!-- total width 240px : renouvelables 46% (110), gaz 31% (74), nucléaire 22% (53), charbon 1% (3) -->
    <g transform="translate(700, 210)">
      <g class="interactive" data-card="renouvelables" tabindex="0" role="button" aria-label="Renouvelables">
        <rect class="hit" x="0" y="0" width="110" height="60" rx="3"/>
        <rect x="0" y="0" width="110" height="60" rx="3" fill="#2F5D3F"/>
        <text x="55" y="36" class="mono" font-size="16" font-weight="600" fill="#FAF8F3" text-anchor="middle">46 %</text>
      </g>
      <g class="interactive" data-card="gaz" tabindex="0" role="button" aria-label="Gaz naturel">
        <rect class="hit" x="113" y="0" width="74" height="60" rx="3"/>
        <rect x="113" y="0" width="74" height="60" rx="3" fill="#B58A2C"/>
        <text x="150" y="36" class="mono" font-size="16" font-weight="600" fill="#FAF8F3" text-anchor="middle">31 %</text>
      </g>
      <g class="interactive" data-card="nucleaire" tabindex="0" role="button" aria-label="Nucléaire">
        <rect class="hit" x="190" y="0" width="53" height="60" rx="3"/>
        <rect x="190" y="0" width="53" height="60" rx="3" fill="#1F5560"/>
        <text x="216" y="36" class="mono" font-size="16" font-weight="600" fill="#FAF8F3" text-anchor="middle">22 %</text>
      </g>
      <g class="interactive" data-card="charbon" tabindex="0" role="button" aria-label="Charbon">
        <rect class="hit" x="246" y="0" width="14" height="60" rx="3"/>
        <rect x="246" y="0" width="14" height="60" rx="3" fill="#1A1A1A"/>
      </g>
    </g>

    <!-- Legend below -->
    <g transform="translate(700, 290)">
      <rect x="0" y="0" width="14" height="14" fill="#2F5D3F"/>
      <text x="22" y="11" class="body" font-size="12" fill="#1A1A1A">Renouvelables (solaire, éolien, hydro)</text>
      <text x="22" y="27" class="body" font-size="10" font-style="italic" fill="#5A5A5A">~244 TWh ajoutés</text>

      <rect x="0" y="50" width="14" height="14" fill="#B58A2C"/>
      <text x="22" y="61" class="body" font-size="12" fill="#1A1A1A">Gaz naturel</text>
      <text x="22" y="77" class="body" font-size="10" font-style="italic" fill="#5A5A5A">~164 TWh ; +137 TWh sur 2024 → 2035</text>

      <rect x="0" y="100" width="14" height="14" fill="#1F5560"/>
      <text x="22" y="111" class="body" font-size="12" fill="#1A1A1A">Nucléaire (relance)</text>
      <text x="22" y="127" class="body" font-size="10" font-style="italic" fill="#5A5A5A">~117 TWh ; 10 GW+ signés par Big Tech</text>

      <rect x="0" y="150" width="14" height="14" fill="#1A1A1A"/>
      <text x="22" y="161" class="body" font-size="12" fill="#1A1A1A">Charbon</text>
      <text x="22" y="177" class="body" font-size="10" font-style="italic" fill="#5A5A5A">~5 TWh, surtout Asie</text>
    </g>
  </g>

  <!-- RUSH NUCLÉAIRE (right panel bottom 480-700) -->
  <g>
    <text x="700" y="500" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">C. LE RUSH NUCLÉAIRE DES HYPERSCALERS</text>

    <g transform="translate(700, 520)">
      <g class="interactive" data-card="three-mile-island" tabindex="0" role="button" aria-label="Three Mile Island Microsoft">
        <rect class="hit" x="0" y="0" width="420" height="40" rx="3"/>
        <text x="0" y="22" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Microsoft · Three Mile Island Unit 1</text>
        <text x="0" y="36" class="body" font-size="11" font-style="italic" fill="#5A5A5A">PPA 20 ans · 835 MW · démarrage 2028</text>
      </g>

      <g class="interactive" data-card="susquehanna" tabindex="0" role="button" aria-label="Susquehanna Amazon">
        <rect class="hit" x="0" y="50" width="420" height="40" rx="3"/>
        <text x="0" y="72" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Amazon · Susquehanna (PA)</text>
        <text x="0" y="86" class="body" font-size="11" font-style="italic" fill="#5A5A5A">acquisition campus · 1 920 MW · 20 Md $</text>
      </g>

      <g class="interactive" data-card="kairos" tabindex="0" role="button" aria-label="Google Kairos SMR">
        <rect class="hit" x="0" y="100" width="420" height="40" rx="3"/>
        <text x="0" y="122" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Google · Kairos Power SMR fleet</text>
        <text x="0" y="136" class="body" font-size="11" font-style="italic" fill="#5A5A5A">500 MW SMR · premiers réacteurs 2030</text>
      </g>

      <g class="interactive" data-card="meta-vistra" tabindex="0" role="button" aria-label="Meta Vistra">
        <rect class="hit" x="0" y="150" width="420" height="40" rx="3"/>
        <text x="0" y="172" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Meta · Vistra (multi-sites)</text>
        <text x="0" y="186" class="body" font-size="11" font-style="italic" fill="#5A5A5A">soutien centrales existantes + extensions · 01/2026</text>
      </g>
    </g>
  </g>

  <!-- TOTAL CALLOUT bottom left -->
  <g class="interactive" data-card="concentration-locale" tabindex="0" role="button" aria-label="Concentration locale">
    <rect class="hit" x="80" y="690" width="540" height="40" rx="3"/>
    <text x="80" y="710" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Concentration locale :</text>
    <text x="220" y="710" class="mono" font-size="13" font-weight="600" fill="#B7332C">Dublin 79 %</text>
    <text x="335" y="710" class="body" font-size="13" fill="#5A5A5A">·</text>
    <text x="345" y="710" class="mono" font-size="13" font-weight="600" fill="#B7332C">Virginia 26 %</text>
    <text x="475" y="710" class="body" font-size="13" fill="#5A5A5A">·</text>
    <text x="490" y="710" class="mono" font-size="13" font-weight="600" fill="#B7332C">USA 4,4 % (2023)</text>
  </g>

  <!-- FOOTER -->
  <line x1="80" y1="745" x2="1120" y2="745" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="770" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Sources : IEA Energy and AI (04/2025) ; LBNL 2024 US DC Energy Report ; Carbon Brief 05/2025 ; DCD &amp; IEEE Spectrum sur deals nucléaires 09/2024–01/2026 ; CRU Ireland.</text>
  <text x="80" y="787" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Lecture : la croissance mondiale est gérable en mix ; le pic local par hub crée la tension. Les hyperscalers achètent désormais des centrales, pas de l'électricité.</text>
</svg>
