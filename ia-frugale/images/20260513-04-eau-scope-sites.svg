<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive rect.hit { fill: transparent; stroke: transparent; }
      .interactive:hover rect.hit, .interactive:focus rect.hit { stroke: #B7332C; stroke-width: 1.5; stroke-dasharray: 3 3; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <g class="svg-header">
    <text x="80" y="48" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCHÉMA 04 — L'EAU EN TROIS SCOPES</text>
    <text x="80" y="92" class="display" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">La goutte n'est pas le problème — le bassin l'est</text>
    <text x="80" y="124" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Trois scopes hydriques d'un datacenter IA et leurs ordres de grandeur, plus trois sites où la concentration locale change la donne</text>
  </g>

  <!-- TOP HALF: 3 SCOPES -->
  <text x="80" y="195" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">LES TROIS FLUX HYDRIQUES D'UN DATACENTER</text>

  <!-- SCOPE 1 -->
  <g class="interactive" data-card="scope-1-cooling" tabindex="0" role="button" aria-label="Scope 1 cooling tower">
    <rect class="hit" x="80" y="210" width="340" height="240" rx="3"/>
    <rect x="80" y="210" width="340" height="240" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>

    <text x="100" y="240" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#B7332C">SCOPE 1</text>
    <text x="100" y="270" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Cooling direct</text>

    <text x="100" y="306" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Eau qui s'évapore dans</text>
    <text x="100" y="322" class="body" font-size="13" font-weight="500" fill="#1A1A1A">l'atmosphère via les tours</text>
    <text x="100" y="338" class="body" font-size="13" font-weight="500" fill="#1A1A1A">de refroidissement</text>

    <text x="100" y="378" class="mono" font-size="22" font-weight="600" fill="#1F5560">0,30 L / kWh</text>
    <text x="100" y="398" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Microsoft moyenne mondiale 2024</text>
    <text x="100" y="414" class="body" font-size="11" font-style="italic" fill="#5A5A5A">(0,49 en 2021 — Δ –39 %)</text>

    <text x="100" y="436" class="body" font-size="11" font-style="italic" fill="#1F5560">→ ~0 sur les nouveaux sites zero-water</text>
  </g>

  <!-- SCOPE 2 -->
  <g class="interactive" data-card="scope-2-thermique" tabindex="0" role="button" aria-label="Scope 2 thermique">
    <rect class="hit" x="430" y="210" width="340" height="240" rx="3"/>
    <rect x="430" y="210" width="340" height="240" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>

    <text x="450" y="240" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#B7332C">SCOPE 2</text>
    <text x="450" y="270" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Production électricité</text>

    <text x="450" y="306" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Eau évaporée par les</text>
    <text x="450" y="322" class="body" font-size="13" font-weight="500" fill="#1A1A1A">centrales thermiques en</text>
    <text x="450" y="338" class="body" font-size="13" font-weight="500" fill="#1A1A1A">amont du grid (nuc, gaz, charbon)</text>

    <text x="450" y="378" class="mono" font-size="22" font-weight="600" fill="#1F5560">1,8 – 7,5 L / kWh</text>
    <text x="450" y="398" class="body" font-size="11" font-style="italic" fill="#5A5A5A">withdrawal ; consumption évaporée</text>
    <text x="450" y="414" class="body" font-size="11" font-style="italic" fill="#5A5A5A">1 – 3 L / kWh selon technologie</text>

    <text x="450" y="436" class="body" font-size="11" font-style="italic" fill="#1F5560">→ souvent &gt; scope 1, presque jamais affiché</text>
  </g>

  <!-- SCOPE 3 -->
  <g class="interactive" data-card="scope-3-fabrication" tabindex="0" role="button" aria-label="Scope 3 fabrication TSMC">
    <rect class="hit" x="780" y="210" width="340" height="240" rx="3"/>
    <rect x="780" y="210" width="340" height="240" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>

    <text x="800" y="240" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#B7332C">SCOPE 3</text>
    <text x="800" y="270" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Fabrication GPU</text>

    <text x="800" y="306" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Eau ultrapure consommée</text>
    <text x="800" y="322" class="body" font-size="13" font-weight="500" fill="#1A1A1A">par les fabs TSMC pour</text>
    <text x="800" y="338" class="body" font-size="13" font-weight="500" fill="#1A1A1A">la fabrication des chips</text>

    <text x="800" y="378" class="mono" font-size="22" font-weight="600" fill="#1F5560">700 – 1 500 L / H100</text>
    <text x="800" y="398" class="body" font-size="11" font-style="italic" fill="#5A5A5A">eau ultrapure de fab</text>
    <text x="800" y="414" class="body" font-size="11" font-style="italic" fill="#5A5A5A">TSMC : 200 M L / jour à Taïwan</text>

    <text x="800" y="436" class="body" font-size="11" font-style="italic" fill="#1F5560">→ amorti sur la durée de vie GPU (~5 ans)</text>
  </g>

  <!-- ARITHMETIC BAND -->
  <rect x="80" y="470" width="1040" height="58" rx="3" fill="#F2EDDE" opacity="0.6"/>
  <text x="100" y="497" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">50 REQUÊTES TYPE GPT-4o (US MOYENNE 2026)</text>
  <text x="100" y="517" class="body" font-size="13" fill="#1A1A1A">Scope 1 — <tspan class="mono" font-weight="600" fill="#1F5560">~7,5 cL</tspan> &#160; · &#160; Scope 2 — <tspan class="mono" font-weight="600" fill="#1F5560">~25 cL</tspan> &#160; · &#160; Scope 3 amorti — <tspan class="mono" font-weight="600" fill="#1F5560">~3 cL</tspan> &#160;&#160;⇒&#160;&#160; total ≈ <tspan class="mono" font-weight="600" font-size="14" fill="#B7332C">35 cL</tspan>, soit deux tiers d'un verre</text>

  <!-- BOTTOM HALF: 3 SITES -->
  <text x="80" y="565" class="mono" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">LE VRAI SUJET : LA CONCENTRATION LOCALE</text>

  <!-- Phoenix -->
  <g class="interactive" data-card="phoenix" tabindex="0" role="button" aria-label="Phoenix stress hydrique">
    <rect class="hit" x="80" y="580" width="340" height="140" rx="3"/>
    <rect x="80" y="580" width="340" height="140" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="100" y="610" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Phoenix, Arizona</text>
    <text x="100" y="632" class="body" font-size="12" font-style="italic" fill="#B7332C">bassin Colorado River, drought permanente</text>
    <text x="100" y="660" class="body" font-size="12" fill="#1A1A1A">Hyperscalers : Microsoft, Meta, Google, AWS</text>
    <text x="100" y="700" class="mono" font-size="12" font-weight="600" fill="#1F5560">Microsoft : pilote zero-water 2026</text>
  </g>

  <!-- Dublin -->
  <g class="interactive" data-card="dublin" tabindex="0" role="button" aria-label="Dublin moratoire">
    <rect class="hit" x="430" y="580" width="340" height="140" rx="3"/>
    <rect x="430" y="580" width="340" height="140" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="450" y="610" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Dublin, Irlande</text>
    <text x="450" y="632" class="body" font-size="12" font-style="italic" fill="#B7332C">moratoire municipal sur DC (2024-2025)</text>
    <text x="450" y="660" class="body" font-size="12" fill="#1A1A1A">Datacenters absorbent</text>
    <text x="450" y="682" class="mono" font-size="15" font-weight="600" fill="#1F5560">79 % de l'élec urbaine</text>
    <text x="450" y="708" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Charge sur réseau dépasse la capacité</text>
  </g>

  <!-- Taiwan -->
  <g class="interactive" data-card="taiwan" tabindex="0" role="button" aria-label="Taïwan TSMC">
    <rect class="hit" x="780" y="580" width="340" height="140" rx="3"/>
    <rect x="780" y="580" width="340" height="140" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="800" y="610" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Taïwan — TSMC fabs</text>
    <text x="800" y="632" class="body" font-size="12" font-style="italic" fill="#B7332C">sécheresse 2021 : prélèvement dans réserves</text>
    <text x="800" y="660" class="body" font-size="12" fill="#1A1A1A">Eau ultrapure procédé 4N/4NP/3nm</text>
    <text x="800" y="700" class="mono" font-size="12" font-weight="600" fill="#1F5560">Recyclage 90 %, mais 200 M L/jour</text>
  </g>

  <!-- FOOTER -->
  <line x1="80" y1="730" x2="1120" y2="730" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="80" y="754" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Sources : Microsoft Cloud Blog 12/2024 ; Li &amp; al. arXiv 2304.03271 ; TSMC Sustainability Report 2024 ; CRU Ireland 2024 ; Maricopa Association of Governments AZ 2024.</text>
  <text x="80" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Lecture : le scope 2 (eau pour produire l'élec) est presque toujours plus lourd que le scope 1 (cooling direct), et reste invisible dans les communications.</text>
</svg>
