<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow06" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Trajectoires 2026 – 2028</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Quatre futurs parallèles du scheduler agentique</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Horizon axis -->
  <line x1="120" y1="700" x2="1100" y2="700" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow06)"/>
  <line x1="120" y1="695" x2="120" y2="705" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="330" y1="695" x2="330" y2="705" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="560" y1="695" x2="560" y2="705" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="780" y1="695" x2="780" y2="705" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="1010" y1="695" x2="1010" y2="705" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="120" y="725" class="mono" font-size="11" font-weight="500" fill="#5A5A5A" text-anchor="middle">2026 S1</text>
  <text x="330" y="725" class="mono" font-size="11" font-weight="500" fill="#5A5A5A" text-anchor="middle">2026 S2</text>
  <text x="560" y="725" class="mono" font-size="11" font-weight="500" fill="#5A5A5A" text-anchor="middle">2027 S1</text>
  <text x="780" y="725" class="mono" font-size="11" font-weight="500" fill="#5A5A5A" text-anchor="middle">2027 S2</text>
  <text x="1010" y="725" class="mono" font-size="11" font-weight="500" fill="#5A5A5A" text-anchor="middle">2028</text>

  <!-- Today marker -->
  <line x1="200" y1="180" x2="200" y2="710" stroke="#B7332C" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="200" y="170" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C" text-anchor="middle">JUIN 2026</text>

  <!-- Track 1: Learned scheduler (top) -->
  <g class="interactive" data-card="learned-scheduler" tabindex="0" role="button" aria-label="Scheduler appris">
    <text x="60" y="210" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C">TRACK 1</text>
    <text x="60" y="232" class="display" font-size="14" font-weight="500" fill="#1A1A1A">Scheduler appris</text>
    <text x="60" y="248" class="body" font-size="10" font-style="italic" fill="#5A5A5A">RL sur trajectoires</text>

    <!-- Phase blocks -->
    <rect x="120" y="200" width="210" height="38" rx="3" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.5"/>
    <text x="225" y="223" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Recherche académique</text>

    <rect x="330" y="200" width="230" height="38" rx="3" fill="#B58A2C" fill-opacity="0.12" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="445" y="223" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Prototypes Tool-LLM</text>

    <rect x="560" y="200" width="220" height="38" rx="3" fill="#B7332C" fill-opacity="0.12" stroke="#B7332C" stroke-width="1.5"/>
    <text x="670" y="223" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Agents managés (Devin, Manus)</text>

    <rect x="780" y="200" width="290" height="38" rx="3" fill="#B7332C" fill-opacity="0.20" stroke="#B7332C" stroke-width="2.5"/>
    <text x="925" y="223" class="body" font-size="11" font-weight="500" fill="#FAF8F3" text-anchor="middle">SDK ouverts</text>
    <circle cx="1010" cy="219" r="6" fill="#B7332C"/>
  </g>

  <!-- Track 2: RL-guided ordering -->
  <g class="interactive" data-card="rl-guided" tabindex="0" role="button" aria-label="RL-guided ordering">
    <text x="60" y="320" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C">TRACK 2</text>
    <text x="60" y="342" class="display" font-size="14" font-weight="500" fill="#1A1A1A">RL-guided ordering</text>
    <text x="60" y="358" class="body" font-size="10" font-style="italic" fill="#5A5A5A">classifieur ordering</text>

    <rect x="120" y="310" width="200" height="38" rx="3" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.5"/>
    <text x="220" y="333" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Décor. spec-decoding</text>

    <rect x="330" y="310" width="220" height="38" rx="3" fill="#B58A2C" fill-opacity="0.12" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="440" y="333" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Publications fin 2026</text>

    <rect x="560" y="310" width="510" height="38" rx="3" fill="#B7332C" fill-opacity="0.15" stroke="#B7332C" stroke-width="1.5"/>
    <text x="815" y="333" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Intégration vLLM-style dans les harness ouverts</text>
  </g>

  <!-- Track 3: SLO-driven scheduling -->
  <g class="interactive" data-card="slo-driven" tabindex="0" role="button" aria-label="SLO-driven scheduling">
    <text x="60" y="430" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C">TRACK 3</text>
    <text x="60" y="452" class="display" font-size="14" font-weight="500" fill="#1A1A1A">SLO-driven</text>
    <text x="60" y="468" class="body" font-size="10" font-style="italic" fill="#5A5A5A">contrôleur PID budgets</text>

    <rect x="120" y="420" width="430" height="38" rx="3" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.5"/>
    <text x="335" y="443" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">OTel GenAI semconv mature (juin 2026)</text>

    <rect x="560" y="420" width="290" height="38" rx="3" fill="#B58A2C" fill-opacity="0.12" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="705" y="443" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Premiers patterns production</text>

    <rect x="850" y="420" width="220" height="38" rx="3" fill="#B7332C" fill-opacity="0.15" stroke="#B7332C" stroke-width="1.5"/>
    <text x="960" y="443" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">SLA-driven généralisé</text>
  </g>

  <!-- Track 4: Scheduler-as-a-service -->
  <g class="interactive" data-card="scheduler-as-a-service" tabindex="0" role="button" aria-label="Scheduler-as-a-service">
    <text x="60" y="540" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C">TRACK 4</text>
    <text x="60" y="562" class="display" font-size="14" font-weight="500" fill="#1A1A1A">Scheduler-as-a-service</text>
    <text x="60" y="578" class="body" font-size="10" font-style="italic" fill="#5A5A5A">offre SaaS découplée</text>

    <rect x="120" y="530" width="210" height="38" rx="3" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-width="1.5"/>
    <text x="225" y="553" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">MCP révision v2</text>

    <rect x="330" y="530" width="450" height="38" rx="3" fill="#B58A2C" fill-opacity="0.12" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="555" y="553" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Premières offres Datadog / Honeycomb / vendeurs MCP</text>

    <rect x="780" y="530" width="290" height="38" rx="3" fill="#B7332C" fill-opacity="0.15" stroke="#B7332C" stroke-width="1.5"/>
    <text x="925" y="553" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Marché établi · catégorie nommée</text>
  </g>

  <!-- Convergence call-out -->
  <text x="60" y="625" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C">POINT DE CONVERGENCE — 2028</text>
  <text x="60" y="650" class="body" font-size="11" fill="#1A1A1A">Les quatre trajectoires se rejoignent : un scheduler appris, asservi à des SLO, exposé comme service découplé du modèle.</text>
  <text x="60" y="668" class="body" font-size="11" fill="#1A1A1A">Le LLM décide quoi faire ; la politique apprise décide comment, quand, à quel coût — séparation des responsabilités à la distribué-2000s.</text>

  <!-- FOOTER -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="768" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : extrapolation à partir des dossiers OTel GenAI semconv (juin 2026), MCP-sécurité (mai 2026), decode-speculative (mai 2026).</text>
</svg>
