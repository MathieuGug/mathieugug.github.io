<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Matrice retry × idempotence</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Quatre quadrants — un seul est dangereux, mais c'est celui où vivent les incidents</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Axes -->
  <!-- Vertical axis: fault type (top = transient, bottom = permanent) -->
  <!-- Horizontal axis: tool type (left = idempotent, right = non-idempotent) -->

  <!-- Axis labels -->
  <text x="60" y="220" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">FAUTE</text>
  <text x="60" y="240" class="body" font-size="11" font-style="italic" fill="#5A5A5A">L'appel a-t-il</text>
  <text x="60" y="256" class="body" font-size="11" font-style="italic" fill="#5A5A5A">une chance de</text>
  <text x="60" y="272" class="body" font-size="11" font-style="italic" fill="#5A5A5A">réussir au retry ?</text>

  <text x="600" y="180" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A" text-anchor="middle">OUTIL</text>
  <text x="600" y="200" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">L'exécuter N fois donne-t-il le même résultat ?</text>

  <!-- Column labels -->
  <text x="380" y="240" class="display" font-size="18" font-weight="500" fill="#2F5D3F" text-anchor="middle">Idempotent</text>
  <text x="380" y="260" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">lecture · GET HTTP · recherche · calcul pur</text>

  <text x="820" y="240" class="display" font-size="18" font-weight="500" fill="#B7332C" text-anchor="middle">Non-idempotent</text>
  <text x="820" y="260" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">paiement · email · création · POST sans clé</text>

  <!-- Row labels -->
  <text x="160" y="370" class="display" font-size="18" font-weight="500" fill="#1F5560" text-anchor="middle">Transient</text>
  <text x="160" y="390" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">timeout réseau</text>
  <text x="160" y="406" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">rate-limit 429</text>
  <text x="160" y="422" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">500 éphémère</text>
  <text x="160" y="438" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">contention DB</text>

  <text x="160" y="580" class="display" font-size="18" font-weight="500" fill="#5A5A5A" text-anchor="middle">Permanent</text>
  <text x="160" y="600" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">404 not found</text>
  <text x="160" y="616" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">schéma invalide</text>
  <text x="160" y="632" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">paramètre OOB</text>
  <text x="160" y="648" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">403 autorisation</text>

  <!-- The 4 quadrants — drawn as a 2x2 grid centered around (600, 480) -->
  <!-- Q1 top-left: Transient × Idempotent = SAFE RETRY -->
  <g class="interactive" data-card="quadrant-safe-retry" tabindex="0" role="button" aria-label="Safe retry">
    <rect x="270" y="290" width="320" height="190" rx="3" fill="#2F5D3F" fill-opacity="0.08" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="430" y="320" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#2F5D3F" text-anchor="middle">SAFE RETRY</text>
    <text x="430" y="350" class="display" font-size="20" font-weight="500" fill="#1A1A1A" text-anchor="middle">Réessaie</text>
    <line x1="310" y1="368" x2="550" y2="368" stroke="#2F5D3F" stroke-width="0.5"/>
    <text x="430" y="390" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Exponential backoff classique</text>
    <text x="430" y="408" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">3-5 tentatives, plafond 30 s</text>
    <text x="430" y="426" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Jitter pour éviter les vagues</text>
    <text x="430" y="455" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Le cas standard depuis 20 ans.</text>
  </g>

  <!-- Q2 top-right: Transient × Non-idempotent = DANGER -->
  <g class="interactive" data-card="quadrant-dangerous-retry" tabindex="0" role="button" aria-label="Quadrant dangereux">
    <rect x="610" y="290" width="320" height="190" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="2.5"/>
    <text x="770" y="320" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C" text-anchor="middle">⚠ ZONE DANGEREUSE</text>
    <text x="770" y="350" class="display" font-size="20" font-weight="500" fill="#1A1A1A" text-anchor="middle">Compense ou clé</text>
    <line x1="650" y1="368" x2="890" y2="368" stroke="#B7332C" stroke-width="0.5"/>
    <text x="770" y="390" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Idempotency key générée AVANT le 1er essai</text>
    <text x="770" y="408" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">État persistant (sinon clé perdue au retry)</text>
    <text x="770" y="426" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Sinon : compensation explicite</text>
    <text x="770" y="455" class="body" font-size="10" font-style="italic" fill="#B7332C" text-anchor="middle">Source des incidents agent 2025 (paiements, emails doublons).</text>
  </g>

  <!-- Q3 bottom-left: Permanent × Idempotent = NO RETRY -->
  <g class="interactive" data-card="quadrant-no-retry" tabindex="0" role="button" aria-label="No retry, log and fail">
    <rect x="270" y="500" width="320" height="190" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1.5"/>
    <text x="430" y="530" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#5A5A5A" text-anchor="middle">NO RETRY</text>
    <text x="430" y="560" class="display" font-size="20" font-weight="500" fill="#1A1A1A" text-anchor="middle">Log + fail-fast</text>
    <line x1="310" y1="578" x2="550" y2="578" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="430" y="600" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Réessayer est un gaspillage net</text>
    <text x="430" y="618" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">L'erreur remonte au LLM</text>
    <text x="430" y="636" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Qui peut pivoter ou abandonner</text>
    <text x="430" y="665" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Ne pas masquer — le pivot du LLM dépend de la transparence.</text>
  </g>

  <!-- Q4 bottom-right: Permanent × Non-idempotent = SURFACE ERROR -->
  <g class="interactive" data-card="quadrant-compensate" tabindex="0" role="button" aria-label="Surface l'erreur">
    <rect x="610" y="500" width="320" height="190" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1.5"/>
    <text x="770" y="530" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#5A5A5A" text-anchor="middle">NO RETRY · SURFACE</text>
    <text x="770" y="560" class="display" font-size="20" font-weight="500" fill="#1A1A1A" text-anchor="middle">Remonte l'erreur</text>
    <line x1="650" y1="578" x2="890" y2="578" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="770" y="600" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">L'effet a-t-il eu lieu ? On ne sait pas</text>
    <text x="770" y="618" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Le LLM doit décider de compenser</text>
    <text x="770" y="636" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Ou demander confirmation à l'humain</text>
    <text x="770" y="665" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Cas typique de la HITL gate sur action irréversible.</text>
  </g>

  <!-- Side note: idempotence by construction -->
  <rect x="960" y="290" width="180" height="400" rx="3" fill="#1A1A1A"/>
  <text x="1050" y="320" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C" text-anchor="middle">PARADE STRUCTURELLE</text>
  <text x="1050" y="345" class="display" font-size="14" font-weight="500" fill="#FAF8F3" text-anchor="middle">Idempotence</text>
  <text x="1050" y="361" class="display" font-size="14" font-weight="500" fill="#FAF8F3" text-anchor="middle">by construction</text>
  <line x1="980" y1="378" x2="1120" y2="378" stroke="#5A5A5A" stroke-width="0.5"/>
  <text x="1050" y="402" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle">Concevoir l'outil pour qu'il</text>
  <text x="1050" y="416" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle">soit idempotent par défaut.</text>
  <line x1="980" y1="436" x2="1120" y2="436" stroke="#5A5A5A" stroke-width="0.5" stroke-dasharray="2 3"/>
  <text x="1050" y="458" class="mono" font-size="9" fill="#B8B5AE" text-anchor="middle">write_file</text>
  <text x="1050" y="476" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle">contenu = contrat</text>
  <text x="1050" y="500" class="mono" font-size="9" fill="#B8B5AE" text-anchor="middle">send_email</text>
  <text x="1050" y="518" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle">message-id stable</text>
  <text x="1050" y="542" class="mono" font-size="9" fill="#B8B5AE" text-anchor="middle">create_user</text>
  <text x="1050" y="560" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle">create_or_update</text>
  <line x1="980" y1="585" x2="1120" y2="585" stroke="#5A5A5A" stroke-width="0.5"/>
  <text x="1050" y="610" class="body" font-size="10" font-style="italic" fill="#B8B5AE" text-anchor="middle">Le manifest MCP v2</text>
  <text x="1050" y="624" class="body" font-size="10" font-style="italic" fill="#B8B5AE" text-anchor="middle">(automne 2026)</text>
  <text x="1050" y="638" class="body" font-size="10" font-style="italic" fill="#B8B5AE" text-anchor="middle">prévoit de standardiser</text>
  <text x="1050" y="652" class="body" font-size="10" font-style="italic" fill="#B8B5AE" text-anchor="middle">la déclaration</text>
  <text x="1050" y="666" class="body" font-size="10" font-style="italic" fill="#B8B5AE" text-anchor="middle">d'idempotence par outil.</text>

  <!-- FOOTER -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="768" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Helland ACM Queue 2012 « Idempotence Is Not a Medical Condition », Stripe Engineering blog, observations production agent 2025.</text>
</svg>
