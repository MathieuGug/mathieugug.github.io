  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Huit harness × six dimensions</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Cellule pleine = câblage natif · demi = support partiel · vide = absence</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Column headers (dimensions) - tilted -->
  <g>
    <text x="380" y="195" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1A1A1A" text-anchor="middle" transform="rotate(-30 380 195)">Parallel-batch</text>
    <text x="490" y="195" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1A1A1A" text-anchor="middle" transform="rotate(-30 490 195)">DAG-planning</text>
