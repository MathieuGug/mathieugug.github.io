<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Sept harness × six dimensions</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Cellule pleine = câblage natif · demi = support partiel · vide = absence</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Column headers (dimensions) - tilted -->
  <g transform="translate(0,0)">
    <text x="380" y="195" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1A1A1A" text-anchor="middle" transform="rotate(-30 380 195)">Parallel-batch</text>
    <text x="490" y="195" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1A1A1A" text-anchor="middle" transform="rotate(-30 490 195)">DAG-planning</text>
    <text x="600" y="195" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1A1A1A" text-anchor="middle" transform="rotate(-30 600 195)">Budget multi-axes</text>
    <text x="710" y="195" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1A1A1A" text-anchor="middle" transform="rotate(-30 710 195)">Retry-aware</text>
    <text x="820" y="195" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1A1A1A" text-anchor="middle" transform="rotate(-30 820 195)">Back-pressure</text>
    <text x="930" y="195" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1A1A1A" text-anchor="middle" transform="rotate(-30 930 195)">Scheduler appris</text>
  </g>
  <line x1="200" y1="220" x2="1010" y2="220" stroke="#5A5A5A" stroke-width="1.25"/>

  <!-- Row : Claude Code -->
  <g class="interactive" data-card="claude-code" tabindex="0" role="button" aria-label="Claude Code">
    <rect x="60" y="234" width="1080" height="52" rx="3" fill="#FAF8F3"/>
    <text x="76" y="262" class="display" font-size="14" font-weight="500" fill="#1A1A1A">Claude Code</text>
    <text x="76" y="278" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Anthropic, agent CLI tour-par-tour</text>
    <!-- cells -->
    <circle cx="380" cy="260" r="11" fill="#B7332C"/>
    <circle cx="490" cy="260" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <circle cx="600" cy="260" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
    <circle cx="710" cy="260" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
    <circle cx="820" cy="260" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <circle cx="930" cy="260" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
  </g>
  <line x1="60" y1="290" x2="1140" y2="290" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Row : Cursor -->
  <g class="interactive" data-card="cursor" tabindex="0" role="button" aria-label="Cursor">
    <rect x="60" y="294" width="1080" height="52" rx="3" fill="#FAF8F3"/>
    <text x="76" y="322" class="display" font-size="14" font-weight="500" fill="#1A1A1A">Cursor</text>
    <text x="76" y="338" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Anysphere, agent intégré IDE</text>
    <circle cx="380" cy="320" r="11" fill="#B7332C"/>
    <circle cx="490" cy="320" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <circle cx="600" cy="320" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
    <circle cx="710" cy="320" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <circle cx="820" cy="320" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <circle cx="930" cy="320" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
  </g>
  <line x1="60" y1="350" x2="1140" y2="350" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Row : OpenHands -->
  <g class="interactive" data-card="openhands" tabindex="0" role="button" aria-label="OpenHands">
    <rect x="60" y="354" width="1080" height="52" rx="3" fill="#FAF8F3"/>
    <text x="76" y="382" class="display" font-size="14" font-weight="500" fill="#1A1A1A">OpenHands</text>
    <text x="76" y="398" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Open-source, EventStream queue typée</text>
    <circle cx="380" cy="380" r="11" fill="#B7332C"/>
    <circle cx="490" cy="380" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
    <circle cx="600" cy="380" r="11" fill="#B7332C"/>
    <circle cx="710" cy="380" r="11" fill="#B7332C"/>
    <circle cx="820" cy="380" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
    <circle cx="930" cy="380" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
  </g>
  <line x1="60" y1="410" x2="1140" y2="410" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Row : Aider -->
  <g class="interactive" data-card="aider" tabindex="0" role="button" aria-label="Aider">
    <rect x="60" y="414" width="1080" height="52" rx="3" fill="#FAF8F3"/>
    <text x="76" y="442" class="display" font-size="14" font-weight="500" fill="#1A1A1A">Aider</text>
    <text x="76" y="458" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Léger, séquentiel par design</text>
    <circle cx="380" cy="440" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <circle cx="490" cy="440" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <circle cx="600" cy="440" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
    <circle cx="710" cy="440" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
    <circle cx="820" cy="440" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <circle cx="930" cy="440" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
  </g>
  <line x1="60" y1="470" x2="1140" y2="470" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Row : LangGraph -->
  <g class="interactive" data-card="langgraph" tabindex="0" role="button" aria-label="LangGraph">
    <rect x="60" y="474" width="1080" height="52" rx="3" fill="#FAF8F3"/>
    <text x="76" y="502" class="display" font-size="14" font-weight="500" fill="#1A1A1A">LangGraph</text>
    <text x="76" y="518" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Framework, DAG comme primitive</text>
    <circle cx="380" cy="500" r="11" fill="#B7332C"/>
    <circle cx="490" cy="500" r="11" fill="#B7332C"/>
    <circle cx="600" cy="500" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
    <circle cx="710" cy="500" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
    <circle cx="820" cy="500" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
    <circle cx="930" cy="500" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
  </g>
  <line x1="60" y1="530" x2="1140" y2="530" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Row : Devin -->
  <g class="interactive" data-card="devin" tabindex="0" role="button" aria-label="Devin">
    <rect x="60" y="534" width="1080" height="52" rx="3" fill="#FAF8F3"/>
    <text x="76" y="562" class="display" font-size="14" font-weight="500" fill="#1A1A1A">Devin</text>
    <text x="76" y="578" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Cognition AI, séquentiel long-horizon</text>
    <circle cx="380" cy="560" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <circle cx="490" cy="560" r="11" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <circle cx="600" cy="560" r="11" fill="#B7332C"/>
    <circle cx="710" cy="560" r="11" fill="#B7332C"/>
    <circle cx="820" cy="560" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
    <circle cx="930" cy="560" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
  </g>
  <line x1="60" y1="590" x2="1140" y2="590" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Row : Manus -->
  <g class="interactive" data-card="manus" tabindex="0" role="button" aria-label="Manus">
    <rect x="60" y="594" width="1080" height="52" rx="3" fill="#FAF8F3"/>
    <text x="76" y="622" class="display" font-size="14" font-weight="500" fill="#1A1A1A">Manus</text>
    <text x="76" y="638" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Multi-machines, sandbox parallèle</text>
    <circle cx="380" cy="620" r="11" fill="#B7332C"/>
    <circle cx="490" cy="620" r="11" fill="#B7332C"/>
    <circle cx="600" cy="620" r="11" fill="#B7332C"/>
    <circle cx="710" cy="620" r="11" fill="#B7332C"/>
    <circle cx="820" cy="620" r="11" fill="#B7332C"/>
    <circle cx="930" cy="620" r="11" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
  </g>
  <line x1="60" y1="650" x2="1140" y2="650" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Legend -->
  <text x="60" y="685" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C">LÉGENDE</text>
  <circle cx="60" cy="709" r="9" fill="#B7332C"/>
  <text x="78" y="713" class="body" font-size="11" fill="#1A1A1A">câblage natif documenté</text>
  <circle cx="260" cy="709" r="9" fill="#B7332C" fill-opacity="0.5" stroke="#B7332C" stroke-width="1"/>
  <text x="278" y="713" class="body" font-size="11" fill="#1A1A1A">support partiel ou via configuration</text>
  <circle cx="540" cy="709" r="9" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
  <text x="558" y="713" class="body" font-size="11" fill="#1A1A1A">non câblé</text>

  <!-- FOOTER -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="768" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : documentations officielles (Claude Code, LangGraph, Cursor), papier OpenHands ICLR 2025, blog Cognition (Devin), public retex Manus AI (mars 2026).</text>
</svg>
