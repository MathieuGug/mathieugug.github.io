    <text x="820" y="195" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1A1A1A" text-anchor="middle" transform="rotate(-30 820 195)">Back-pressure</text>
    <text x="930" y="195" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1A1A1A" text-anchor="middle" transform="rotate(-30 930 195)">Scheduler appris</text>
