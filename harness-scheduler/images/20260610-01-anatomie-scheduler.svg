<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Anatomie du scheduler</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Cinq sous-composants en pipeline : du LLM à l'exécution effective des outils</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LLM input -->
  <g>
    <rect x="60" y="200" width="130" height="60" rx="3" fill="#1A1A1A"/>
    <text x="125" y="225" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#FAF8F3" text-anchor="middle">LLM OUTPUT</text>
    <text x="125" y="245" class="mono" font-size="11" font-weight="400" fill="#FAF8F3" text-anchor="middle">tool_calls[]</text>
  </g>

  <!-- Five components in pipeline -->
  <!-- 1. Selector -->
  <g class="interactive" data-card="selector" tabindex="0" role="button" aria-label="Selector — validation et résolution">
    <rect x="220" y="180" width="160" height="180" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="300" y="204" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C" text-anchor="middle">1 · SELECTOR</text>
    <text x="300" y="228" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">Validation</text>
    <line x1="240" y1="241" x2="360" y2="241" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="300" y="262" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">schéma JSON</text>
    <text x="300" y="278" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">namespace collision</text>
    <text x="300" y="294" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">allowlist / denylist</text>
    <text x="300" y="310" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">HITL gate</text>
    <text x="300" y="326" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">défenses MCP</text>
    <rect x="265" y="340" width="70" height="14" rx="2" fill="#B7332C"/>
    <text x="300" y="350" class="mono" font-size="8" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">ENTRÉE</text>
  </g>

  <!-- 2. Queue -->
  <g class="interactive" data-card="queue" tabindex="0" role="button" aria-label="Queue — file d'attente">
    <rect x="400" y="180" width="160" height="180" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="480" y="204" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1F5560" text-anchor="middle">2 · QUEUE</text>
    <text x="480" y="228" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">File d'attente</text>
    <line x1="420" y1="241" x2="540" y2="241" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="480" y="262" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">FIFO ou réordonnée</text>
    <text x="480" y="278" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">groupement batch</text>
    <text x="480" y="294" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">déduplication</text>
    <text x="480" y="310" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">profondeur configurable</text>
    <text x="480" y="326" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">EventStream / DAG</text>
    <rect x="445" y="340" width="70" height="14" rx="2" fill="#1F5560"/>
    <text x="480" y="350" class="mono" font-size="8" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">ATTENTE</text>
  </g>

  <!-- 3. Budget tracker -->
  <g class="interactive" data-card="budget-tracker" tabindex="0" role="button" aria-label="Budget tracker — trois axes">
    <rect x="580" y="180" width="160" height="180" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="660" y="204" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B58A2C" text-anchor="middle">3 · BUDGET</text>
    <text x="660" y="228" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">Trois compteurs</text>
    <line x1="600" y1="241" x2="720" y2="241" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="660" y="262" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">tokens cumulés</text>
    <text x="660" y="278" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">wall-clock</text>
    <text x="660" y="294" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">$ pricing</text>
    <text x="660" y="310" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">seuils 70 / 90 %</text>
    <text x="660" y="326" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">dégradation</text>
    <rect x="625" y="340" width="70" height="14" rx="2" fill="#B58A2C"/>
    <text x="660" y="350" class="mono" font-size="8" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">CONTRÔLE</text>
  </g>

  <!-- 4. Parallelizer -->
  <g class="interactive" data-card="parallelizer" tabindex="0" role="button" aria-label="Parallelizer — exécution simultanée">
    <rect x="760" y="180" width="160" height="180" rx="3" fill="#2F5D3F" fill-opacity="0.07" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="840" y="204" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#2F5D3F" text-anchor="middle">4 · PARALLELIZER</text>
    <text x="840" y="228" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">Exécution</text>
    <line x1="780" y1="241" x2="900" y2="241" stroke="#2F5D3F" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="840" y="262" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">commutativité</text>
    <text x="840" y="278" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">batch ≤ 6 (Claude)</text>
    <text x="840" y="294" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">lecture // écriture</text>
    <text x="840" y="310" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">timeout individuel</text>
    <text x="840" y="326" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">ordre préservé</text>
    <rect x="805" y="340" width="70" height="14" rx="2" fill="#2F5D3F"/>
    <text x="840" y="350" class="mono" font-size="8" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">DISPATCH</text>
  </g>

  <!-- 5. Retry/timeout -->
  <g class="interactive" data-card="retry-timeout" tabindex="0" role="button" aria-label="Retry/timeout — politique de fiabilité">
    <rect x="940" y="180" width="160" height="180" rx="3" fill="#1E3A5F" fill-opacity="0.07" stroke="#1E3A5F" stroke-width="1.5"/>
    <text x="1020" y="204" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1E3A5F" text-anchor="middle">5 · RETRY</text>
    <text x="1020" y="228" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">Fiabilité</text>
    <line x1="960" y1="241" x2="1080" y2="241" stroke="#1E3A5F" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="1020" y="262" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">transient / permanent</text>
    <text x="1020" y="278" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">exp. backoff</text>
    <text x="1020" y="294" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">idempotency-key</text>
    <text x="1020" y="310" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">compensation</text>
    <text x="1020" y="326" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">circuit breaker</text>
    <rect x="985" y="340" width="70" height="14" rx="2" fill="#1E3A5F"/>
    <text x="1020" y="350" class="mono" font-size="8" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">SORTIE</text>
  </g>

  <!-- Arrows between pipeline stages -->
  <line x1="190" y1="230" x2="216" y2="230" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow01)"/>
  <line x1="380" y1="270" x2="396" y2="270" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow01)"/>
  <line x1="560" y1="270" x2="576" y2="270" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow01)"/>
  <line x1="740" y1="270" x2="756" y2="270" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow01)"/>
  <line x1="920" y1="270" x2="936" y2="270" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow01)"/>

  <!-- Output: tools executed -->
  <g>
    <rect x="940" y="430" width="160" height="50" rx="3" fill="#1A1A1A"/>
    <text x="1020" y="452" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#FAF8F3" text-anchor="middle">EFFETS RÉELS</text>
    <text x="1020" y="468" class="mono" font-size="10" font-weight="400" fill="#FAF8F3" text-anchor="middle">fs · http · db · mcp</text>
  </g>
  <line x1="1020" y1="360" x2="1020" y2="426" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow01)"/>

  <!-- Observation back to LLM -->
  <path d="M 940 455 Q 500 455 125 455 L 125 270" fill="none" stroke="#B7332C" stroke-width="1.25" stroke-dasharray="4 3" marker-end="url(#arrow01)"/>
  <text x="540" y="475" class="body" font-size="11" font-style="italic" fill="#B7332C" text-anchor="middle">observations renvoyées au LLM au prochain tour</text>

  <!-- Annotations layer -->
  <line x1="60" y1="540" x2="1140" y2="540" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="568" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C">ANNOTATIONS</text>

  <!-- A -->
  <circle cx="80" cy="600" r="9" fill="#B7332C"/>
  <text x="80" y="604" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">a</text>
  <text x="100" y="604" class="body" font-size="11" fill="#1A1A1A">Le LLM ne sait pas si deux outils sont commutatifs ; le parallelizer décide via heuristique (lecture vs écriture) ou via flag explicite côté API.</text>

  <!-- B -->
  <circle cx="80" cy="635" r="9" fill="#B7332C"/>
  <text x="80" y="639" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">b</text>
  <text x="100" y="639" class="body" font-size="11" fill="#1A1A1A">Les cinq sous-composants peuvent être implémentés comme couches indépendantes (LangGraph, OpenHands) ou enchevêtrés (Aider, Claude Code).</text>

  <!-- C -->
  <circle cx="80" cy="670" r="9" fill="#B7332C"/>
  <text x="80" y="674" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">c</text>
  <text x="100" y="674" class="body" font-size="11" fill="#1A1A1A">La boucle de feedback (observations → LLM) ferme le système — un scheduler qui n'informe pas le LLM des échecs perd la possibilité de pivot stratégique.</text>

  <!-- D -->
  <circle cx="80" cy="705" r="9" fill="#B7332C"/>
  <text x="80" y="709" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">d</text>
  <text x="100" y="709" class="body" font-size="11" fill="#1A1A1A">La trajectoire 2027-2028 remplace l'heuristique du parallelizer par une politique apprise — premier pas vers le « scheduler appris ».</text>

  <!-- FOOTER -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="768" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : synthèse d'après Anthropic Claude Code docs (2025), OpenHands ICLR 2025, LangGraph 2025.</text>
</svg>
