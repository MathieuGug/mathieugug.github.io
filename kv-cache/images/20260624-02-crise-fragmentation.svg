<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <pattern id="hatch02" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#B7332C" fill-opacity="0.08"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#B7332C" stroke-width="1.2" stroke-opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">La crise de la fragmentation</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Pourquoi l'allocation contiguë gaspillait 60 à 80 % de la mémoire du KV-cache</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- AVANT label -->
  <text x="60" y="186" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#1A1A1A">AVANT 2023 · UN TENSEUR CONTIGU PAR REQUÊTE</text>
  <text x="60" y="208" class="body" font-size="12" fill="#5A5A5A">Mémoire HBM du GPU — chaque requête réserve un bloc contigu dimensionné sur la longueur maximale possible</text>

  <!-- Memory lane frame -->
  <rect x="60" y="232" width="1080" height="92" rx="2" fill="none" stroke="#B8B5AE" stroke-width="1"/>

  <!-- legend -->
  <rect x="60" y="346" width="16" height="14" fill="#1F5560"/>
  <text x="84" y="357" class="body" font-size="11" fill="#5A5A5A">tokens réellement générés</text>
  <rect x="300" y="346" width="16" height="14" fill="url(#hatch02)" stroke="#B7332C" stroke-width="0.5"/>
  <text x="324" y="357" class="body" font-size="11" fill="#5A5A5A">réservé mais jamais utilisé</text>
  <rect x="560" y="346" width="16" height="14" fill="#E5E1D8"/>
  <text x="584" y="357" class="body" font-size="11" fill="#5A5A5A">trou inutilisable entre requêtes</text>

  <!-- Requête 1 — RESERVATION MAX (interactive) -->
  <g class="interactive" data-card="reservation-max" tabindex="0" role="button" aria-label="Réservation jusqu'au maximum">
    <rect x="62" y="234" width="318" height="88" rx="2" fill="#FAF8F3"/>
    <rect x="62" y="234" width="108" height="88" fill="#1F5560"/>
    <rect x="170" y="234" width="210" height="88" fill="url(#hatch02)"/>
    <rect x="62" y="234" width="318" height="88" rx="2" fill="none" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="70" y="252" class="mono" font-size="9" fill="#FAF8F3">REQ 1</text>
    <text x="116" y="296" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">200 tok</text>
    <text x="221" y="190" class="body" font-size="0" fill="#1A1A1A"></text>
  </g>
  <!-- gap 1 -->
  <rect x="380" y="234" width="34" height="88" fill="#E5E1D8"/>

  <!-- Requête 2 — FRAG INTERNE (interactive) -->
  <g class="interactive" data-card="frag-interne" tabindex="0" role="button" aria-label="Fragmentation interne">
    <rect x="414" y="234" width="372" height="88" rx="2" fill="#FAF8F3"/>
    <rect x="414" y="234" width="170" height="88" fill="#1F5560"/>
    <rect x="584" y="234" width="202" height="88" fill="url(#hatch02)"/>
    <rect x="414" y="234" width="372" height="88" rx="2" fill="none" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="422" y="252" class="mono" font-size="9" fill="#FAF8F3">REQ 2</text>
    <text x="499" y="296" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">340 tok</text>
  </g>
  <!-- gap 2 — FRAG EXTERNE (interactive) -->
  <g class="interactive" data-card="frag-externe" tabindex="0" role="button" aria-label="Fragmentation externe">
    <rect x="786" y="234" width="48" height="88" fill="#E5E1D8"/>
    <rect x="786" y="234" width="48" height="88" fill="none" stroke="#B58A2C" stroke-width="1.5" stroke-dasharray="3 2"/>
  </g>

  <!-- Requête 3 -->
  <rect x="834" y="234" width="304" height="88" rx="2" fill="#FAF8F3"/>
  <rect x="834" y="234" width="92" height="88" fill="#1F5560"/>
  <rect x="926" y="234" width="212" height="88" fill="url(#hatch02)"/>
  <rect x="834" y="234" width="304" height="88" rx="2" fill="none" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="842" y="252" class="mono" font-size="9" fill="#FAF8F3">REQ 3</text>
  <text x="880" y="296" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">160 tok</text>

  <!-- annotation leaders -->
  <line x1="275" y1="234" x2="275" y2="214" stroke="#5A5A5A" stroke-width="0.75"/>
  <text x="275" y="206" class="body" font-size="10.5" font-weight="600" fill="#B7332C" text-anchor="middle">réservé pour max_seq_len</text>

  <!-- WASTE summary -->
  <g>
    <rect x="60" y="396" width="1080" height="120" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="84" y="428" class="mono" font-size="10" font-weight="600" letter-spacing="0.14em" fill="#B7332C">LE DIAGNOSTIC vLLM, 2023</text>
    <text x="84" y="462" class="display" font-size="40" font-weight="600" fill="#B7332C">60–80 %</text>
    <text x="300" y="448" class="body" font-size="14" fill="#1A1A1A">de la mémoire allouée au KV-cache était gaspillée.</text>
    <text x="300" y="472" class="body" font-size="12.5" fill="#5A5A5A">Trois fuites cumulées : sur-réservation anticipée + fragmentation interne + fragmentation externe.</text>
    <text x="84" y="500" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">Conséquence directe : autant de requêtes simultanées en moins sur le même GPU. La rareté n'était pas physique, elle était organisationnelle.</text>
  </g>

  <!-- CIBLE PAGINATION (interactive) -->
  <g class="interactive" data-card="cible-pagination" tabindex="0" role="button" aria-label="La cible : pagination">
    <rect x="60" y="540" width="1080" height="180" rx="3" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.5"/>
    <text x="84" y="572" class="mono" font-size="10" font-weight="600" letter-spacing="0.14em" fill="#1F5560">LA CIBLE · BLOCS PAGINÉS (voir Schéma 03)</text>
    <text x="84" y="596" class="body" font-size="12.5" fill="#1A1A1A">Découper le cache en blocs fixes alloués à la demande — plus de réservation anticipée, plus de trous</text>
    <!-- tight packed blocks -->
    <g>
      <rect x="84" y="620" width="40" height="62" rx="2" fill="#1F5560" fill-opacity="0.85"/>
      <rect x="128" y="620" width="40" height="62" rx="2" fill="#1F5560" fill-opacity="0.85"/>
      <rect x="172" y="620" width="40" height="62" rx="2" fill="#1F5560" fill-opacity="0.6"/>
      <rect x="216" y="620" width="40" height="62" rx="2" fill="#1F5560" fill-opacity="0.6"/>
      <rect x="260" y="620" width="40" height="62" rx="2" fill="#B58A2C" fill-opacity="0.8"/>
      <rect x="304" y="620" width="40" height="62" rx="2" fill="#B58A2C" fill-opacity="0.8"/>
      <rect x="348" y="620" width="40" height="62" rx="2" fill="#1F5560" fill-opacity="0.85"/>
      <rect x="392" y="620" width="40" height="62" rx="2" fill="#B58A2C" fill-opacity="0.8"/>
      <rect x="436" y="620" width="40" height="62" rx="2" fill="#1F5560" fill-opacity="0.6"/>
      <rect x="480" y="620" width="40" height="62" rx="2" fill="#1F5560" fill-opacity="0.85"/>
    </g>
    <text x="556" y="648" class="body" font-size="12" fill="#5A5A5A">Blocs de 16 tokens, mémoire physique non contiguë,</text>
    <text x="556" y="668" class="body" font-size="12" fill="#5A5A5A">référençables par plusieurs requêtes.</text>
    <text x="556" y="692" class="mono" font-size="12" font-weight="600" fill="#1F5560">gaspillage &lt; 4 %</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="760" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : Kwon et al., PagedAttention (SOSP 2023). Longueurs de requêtes illustratives.</text>
</svg>
