<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">L'attention a une mémoire — et elle a un prix</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">D'où vient le KV-cache, comment sa taille se calcule, et quand il dépasse les poids du modèle</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- A · LA FORMULE -->
  <g class="interactive" data-card="la-formule" tabindex="0" role="button" aria-label="La formule de taille du KV-cache">
    <rect x="60" y="178" width="500" height="244" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.5"/>
    <text x="84" y="208" class="mono" font-size="10" font-weight="600" letter-spacing="0.14em" fill="#B7332C">A · LA FORMULE</text>
    <text x="84" y="236" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Taille du cache pour une requête</text>
    <rect x="84" y="252" width="452" height="40" rx="3" fill="#1A1A1A"/>
    <text x="310" y="277" class="mono" font-size="13" font-weight="500" fill="#FAF8F3" text-anchor="middle">2 · L · H_kv · d · seq · batch · octets</text>
    <text x="84" y="322" class="body" font-size="11" fill="#5A5A5A"><tspan font-weight="600" fill="#1A1A1A">2</tspan> clé + valeur · <tspan font-weight="600" fill="#1A1A1A">L</tspan> couches · <tspan font-weight="600" fill="#1A1A1A">H_kv</tspan> têtes KV</text>
    <text x="84" y="342" class="body" font-size="11" fill="#5A5A5A"><tspan font-weight="600" fill="#1A1A1A">d</tspan> dim. tête · <tspan font-weight="600" fill="#1A1A1A">seq</tspan> longueur · <tspan font-weight="600" fill="#1A1A1A">batch</tspan> requêtes</text>
    <line x1="84" y1="356" x2="536" y2="356" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="84" y="380" class="body" font-size="11.5" fill="#1A1A1A">Seul terme qui dépend de la <tspan font-style="italic">charge</tspan>, pas du modèle :</text>
    <text x="84" y="400" class="mono" font-size="11.5" font-weight="600" fill="#B7332C">seq × batch</text>
    <text x="172" y="400" class="body" font-size="11.5" fill="#5A5A5A">— d'où la rareté à gérer.</text>
  </g>

  <!-- B · RECOMPUTE VS CACHE -->
  <g class="interactive" data-card="recompute-vs-cache" tabindex="0" role="button" aria-label="Recompute quadratique contre cache linéaire">
    <rect x="60" y="448" width="500" height="284" rx="3" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.5"/>
    <text x="84" y="478" class="mono" font-size="10" font-weight="600" letter-spacing="0.14em" fill="#1F5560">B · POURQUOI LE CACHE EXISTE</text>
    <text x="84" y="504" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Recalculer O(n²) ou mémoriser O(n)</text>
    <!-- mini axes -->
    <line x1="110" y1="690" x2="510" y2="690" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="110" y1="690" x2="110" y2="528" stroke="#5A5A5A" stroke-width="1"/>
    <text x="84" y="612" class="body" font-size="10" fill="#5A5A5A" transform="rotate(-90 84 612)" text-anchor="middle">coût cumulé</text>
    <text x="310" y="712" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">tokens générés →</text>
    <!-- O(n^2) curve (no cache) -->
    <path d="M110 688 Q 360 685 440 540 T 500 535" fill="none" stroke="#B7332C" stroke-width="2.5"/>
    <text x="455" y="560" class="body" font-size="11" font-weight="600" fill="#B7332C">sans cache</text>
    <text x="455" y="576" class="mono" font-size="10" fill="#B7332C">O(n²)</text>
    <!-- O(n) line (with cache) -->
    <path d="M110 688 L500 632" fill="none" stroke="#1F5560" stroke-width="2.5"/>
    <text x="430" y="652" class="body" font-size="11" font-weight="600" fill="#1F5560">avec cache</text>
    <text x="430" y="668" class="mono" font-size="10" fill="#1F5560">O(n)</text>
  </g>

  <!-- C · DOMINATION MEMOIRE -->
  <g class="interactive" data-card="domination-memoire" tabindex="0" role="button" aria-label="Le cache finit par dépasser les poids">
    <rect x="600" y="178" width="540" height="306" rx="3" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="624" y="208" class="mono" font-size="10" font-weight="600" letter-spacing="0.14em" fill="#B58A2C">C · POIDS vs CACHE</text>
    <text x="624" y="234" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Le cache franchit la barre des poids quand le contexte s'allonge</text>
    <!-- baseline -->
    <line x1="648" y1="452" x2="1108" y2="452" stroke="#5A5A5A" stroke-width="1"/>
    <!-- weights constant band -->
    <line x1="648" y1="360" x2="1108" y2="360" stroke="#1A1A1A" stroke-width="1.25" stroke-dasharray="4 3"/>
    <text x="1104" y="352" class="body" font-size="10.5" fill="#1A1A1A" text-anchor="end">poids du modèle (constants)</text>
    <!-- three context bars: short / medium / long -->
    <!-- short -->
    <rect x="690" y="412" width="70" height="40" fill="#B58A2C" fill-opacity="0.55"/>
    <text x="725" y="470" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">court</text>
    <text x="725" y="484" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">2 k · b1</text>
    <!-- medium -->
    <rect x="820" y="358" width="70" height="94" fill="#B58A2C" fill-opacity="0.7"/>
    <text x="855" y="470" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">moyen</text>
    <text x="855" y="484" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">8 k · b8</text>
    <!-- long -->
    <rect x="950" y="276" width="70" height="176" fill="#B58A2C"/>
    <text x="985" y="470" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">long</text>
    <text x="985" y="484" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">32 k · b16</text>
    <text x="985" y="266" class="mono" font-size="10" font-weight="600" fill="#B58A2C" text-anchor="middle">KV &gt; poids</text>
    <!-- crossover marker -->
    <circle cx="855" cy="360" r="5" fill="#B7332C"/>
    <text x="624" y="430" class="body" font-size="10.5" fill="#5A5A5A">barres = KV-cache</text>
  </g>

  <!-- D · CROISSANCE LINEAIRE -->
  <g class="interactive" data-card="croissance-lineaire" tabindex="0" role="button" aria-label="Croissance linéaire par token">
    <rect x="600" y="510" width="540" height="222" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="624" y="540" class="mono" font-size="10" font-weight="600" letter-spacing="0.14em" fill="#1A1A1A">D · UN ORDRE DE GRANDEUR</text>
    <text x="624" y="566" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Modèle 13 Md, FP16 — le coût par token</text>
    <!-- per token block -->
    <rect x="624" y="586" width="150" height="58" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="699" y="612" class="mono" font-size="16" font-weight="600" fill="#1F5560" text-anchor="middle">≈ 800 Ko</text>
    <text x="699" y="632" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">par token mis en cache</text>
    <line x1="784" y1="615" x2="838" y2="615" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow01)"/>
    <text x="848" y="606" class="mono" font-size="13" fill="#1A1A1A">× 2 000 tokens</text>
    <text x="848" y="624" class="body" font-size="10.5" fill="#5A5A5A">une seule requête</text>
    <rect x="624" y="664" width="488" height="44" rx="3" fill="#B7332C" fill-opacity="0.08"/>
    <text x="648" y="691" class="body" font-size="12" fill="#1A1A1A"><tspan font-weight="600">≈ 1,6 Go pour une requête</tspan> — et le cache d'un lot peut dépasser la taille des poids.</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="772" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : Kwon et al., PagedAttention (SOSP 2023). Ordres de grandeur indicatifs, modèle ~13 Md paramètres en FP16.</text>
</svg>
