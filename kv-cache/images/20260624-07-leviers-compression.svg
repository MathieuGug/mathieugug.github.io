<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Comprimer le cache lui-même : quatre leviers</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Réduire la taille à la source — chacun déplace un curseur sur l'axe mémoire / qualité</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- column headers -->
  <text x="84" y="184" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A">LEVIER</text>
  <text x="372" y="184" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A">DÉCIDÉ</text>
  <text x="560" y="184" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A">CE QU'IL RÉDUIT</text>
  <text x="820" y="184" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A">FACTEUR</text>
  <text x="1000" y="184" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A">COÛT QUALITÉ</text>
  <line x1="60" y1="196" x2="1140" y2="196" stroke="#B8B5AE" stroke-width="0.75"/>

  <!-- ROW 1 : GQA / MQA -->
  <g class="interactive" data-card="gqa-mqa" tabindex="0" role="button" aria-label="GQA et MQA, moins de têtes KV">
    <rect x="60" y="204" width="1080" height="96" rx="3" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.25"/>
    <text x="84" y="244" class="body" font-size="16" font-weight="600" fill="#1F5560">GQA / MQA</text>
    <text x="84" y="266" class="body" font-size="10.5" fill="#5A5A5A">grouped / multi-query attention</text>
    <text x="84" y="284" class="body" font-size="9.5" font-style="italic" fill="#5A5A5A">Shazeer 2019 · Ainslie 2023</text>
    <rect x="362" y="232" width="120" height="22" rx="11" fill="#1F5560" fill-opacity="0.15"/>
    <text x="422" y="247" class="body" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">entraînement</text>
    <text x="560" y="250" class="body" font-size="12.5" fill="#1A1A1A">nombre de têtes KV</text>
    <text x="560" y="270" class="body" font-size="10" fill="#5A5A5A">têtes partagées entre requêtes</text>
    <text x="820" y="252" class="mono" font-size="15" font-weight="600" fill="#1A1A1A">÷ groupes</text>
    <text x="820" y="272" class="body" font-size="10" fill="#5A5A5A">standard Llama 2 70B</text>
    <circle cx="1010" cy="252" r="7" fill="#B58A2C"/><circle cx="1032" cy="252" r="7" fill="#B58A2C"/><circle cx="1054" cy="252" r="7" fill="#E5E1D8"/>
    <text x="1010" y="282" class="body" font-size="10" fill="#5A5A5A">modéré</text>
  </g>

  <!-- ROW 2 : MLA -->
  <g class="interactive" data-card="mla" tabindex="0" role="button" aria-label="MLA, latent compressé DeepSeek">
    <rect x="60" y="308" width="1080" height="96" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
    <text x="84" y="348" class="body" font-size="16" font-weight="600" fill="#B7332C">MLA</text>
    <text x="84" y="370" class="body" font-size="10.5" fill="#5A5A5A">multi-head latent attention</text>
    <text x="84" y="388" class="body" font-size="9.5" font-style="italic" fill="#5A5A5A">DeepSeek-V2, 2024</text>
    <rect x="362" y="336" width="120" height="22" rx="11" fill="#B7332C" fill-opacity="0.12"/>
    <text x="422" y="351" class="body" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">entraînement</text>
    <text x="560" y="354" class="body" font-size="12.5" fill="#1A1A1A">dimension cachée (latent)</text>
    <text x="560" y="374" class="body" font-size="10" fill="#5A5A5A">cache un vecteur latent, reconstruit K/V</text>
    <text x="820" y="356" class="mono" font-size="15" font-weight="600" fill="#B7332C">~ ×10</text>
    <text x="820" y="376" class="body" font-size="10" fill="#5A5A5A">ordre de grandeur</text>
    <circle cx="1010" cy="356" r="7" fill="#B58A2C"/><circle cx="1032" cy="356" r="7" fill="#E5E1D8"/><circle cx="1054" cy="356" r="7" fill="#E5E1D8"/>
    <text x="1010" y="386" class="body" font-size="10" fill="#5A5A5A">faible</text>
  </g>

  <!-- ROW 3 : Quantization -->
  <g class="interactive" data-card="quantization" tabindex="0" role="button" aria-label="Quantization KIVI 2-bit">
    <rect x="60" y="412" width="1080" height="96" rx="3" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.25"/>
    <text x="84" y="452" class="body" font-size="16" font-weight="600" fill="#1F5560">Quantization</text>
    <text x="84" y="474" class="body" font-size="10.5" fill="#5A5A5A">KIVI · 2-bit asymétrique</text>
    <text x="84" y="492" class="body" font-size="9.5" font-style="italic" fill="#5A5A5A">Liu et al., ICML 2024</text>
    <rect x="362" y="440" width="100" height="22" rx="11" fill="#1F5560" fill-opacity="0.15"/>
    <text x="412" y="455" class="body" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">runtime</text>
    <text x="560" y="456" class="body" font-size="12.5" fill="#1A1A1A">bits par élément</text>
    <text x="560" y="476" class="body" font-size="10" fill="#5A5A5A">clés par canal, valeurs par token · sans fine-tuning</text>
    <text x="820" y="458" class="mono" font-size="15" font-weight="600" fill="#1A1A1A">÷ ~8</text>
    <text x="820" y="478" class="body" font-size="10" fill="#5A5A5A">FP16 → 2-bit</text>
    <circle cx="1010" cy="458" r="7" fill="#B58A2C"/><circle cx="1032" cy="458" r="7" fill="#E5E1D8"/><circle cx="1054" cy="458" r="7" fill="#E5E1D8"/>
    <text x="1010" y="488" class="body" font-size="10" fill="#5A5A5A">marginal</text>
  </g>

  <!-- ROW 4 : Eviction -->
  <g class="interactive" data-card="eviction" tabindex="0" role="button" aria-label="Éviction H2O StreamingLLM">
    <rect x="60" y="516" width="1080" height="96" rx="3" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="84" y="556" class="body" font-size="16" font-weight="600" fill="#B58A2C">Éviction</text>
    <text x="84" y="578" class="body" font-size="10.5" fill="#5A5A5A">H2O · StreamingLLM</text>
    <text x="84" y="596" class="body" font-size="9.5" font-style="italic" fill="#5A5A5A">cf. compaction-agentique</text>
    <rect x="362" y="544" width="100" height="22" rx="11" fill="#B58A2C" fill-opacity="0.15"/>
    <text x="412" y="559" class="body" font-size="11" font-weight="600" fill="#B58A2C" text-anchor="middle">runtime</text>
    <text x="560" y="560" class="body" font-size="12.5" fill="#1A1A1A">nombre de tokens gardés</text>
    <text x="560" y="580" class="body" font-size="10" fill="#5A5A5A">oublie les tokens à faible poids d'attention</text>
    <text x="820" y="562" class="mono" font-size="15" font-weight="600" fill="#1A1A1A">variable</text>
    <text x="820" y="582" class="body" font-size="10" fill="#5A5A5A">selon budget</text>
    <circle cx="1010" cy="562" r="7" fill="#B58A2C"/><circle cx="1032" cy="562" r="7" fill="#B58A2C"/><circle cx="1054" cy="562" r="7" fill="#B58A2C"/>
    <text x="1010" y="592" class="body" font-size="10" fill="#5A5A5A">dépend de la tâche</text>
  </g>

  <!-- COUT QUALITE band (interactive) -->
  <g class="interactive" data-card="cout-qualite" tabindex="0" role="button" aria-label="L'axe mémoire contre qualité">
    <rect x="60" y="628" width="1080" height="98" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="84" y="656" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1A1A1A">L'AXE PORTEUR · MÉMOIRE ⇄ QUALITÉ</text>
    <text x="84" y="680" class="body" font-size="12.5" fill="#1A1A1A">Aucun levier n'est gratuit : chacun échange de la mémoire contre une dégradation. La discipline de 2026 est de</text>
    <text x="84" y="700" class="body" font-size="12.5" font-weight="600" fill="#1F5560">composer pagination + partage + désagrégation + compression selon la charge — pas de balle d'argent.</text>
    <!-- gradient legend bar -->
    <rect x="84" y="710" width="1032" height="8" rx="4" fill="#B58A2C" fill-opacity="0.35"/>
    <text x="84" y="708" class="body" font-size="9" fill="#5A5A5A">← plus de mémoire économisée, plus de qualité risquée →</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="752" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Shazeer 2019 (MQA) ; Ainslie 2023 (GQA) ; DeepSeek-V2 2024 (MLA) ; Liu 2024 (KIVI) ; Zhang 2023 (H2O). ● = intensité du coût qualité.</text>
</svg>
