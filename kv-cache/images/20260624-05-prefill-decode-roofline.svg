<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Prefill et decode : deux régimes, un conflit</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Le prefill sature le calcul, le decode sature la mémoire — les mêler sur un GPU les fait s'entre-gêner</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LEFT : ROOFLINE -->
  <text x="60" y="180" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1A1A1A">LE ROOFLINE</text>
  <!-- axes -->
  <line x1="120" y1="620" x2="560" y2="620" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="120" y1="620" x2="120" y2="220" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="340" y="660" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">intensité arithmétique  (FLOP / octet) →</text>
  <text x="78" y="420" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle" transform="rotate(-90 78 420)">débit atteignable →</text>
  <!-- roofline curve: memory-bound slope then compute roof -->
  <path d="M120 600 L360 300 L560 300" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <text x="240" y="430" class="body" font-size="10" fill="#5A5A5A" transform="rotate(-51 240 430)">plafond mémoire (bande passante)</text>
  <text x="460" y="290" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">plafond calcul (FLOPs)</text>

  <!-- DECODE point (interactive) -->
  <g class="interactive" data-card="decode-memory" tabindex="0" role="button" aria-label="Decode memory-bound">
    <rect x="120" y="500" width="170" height="120" fill="#1F5560" fill-opacity="0.07"/>
    <circle cx="190" cy="537" r="9" fill="#1F5560"/>
    <text x="206" y="528" class="body" font-size="12.5" font-weight="600" fill="#1F5560">DECODE</text>
    <text x="206" y="546" class="body" font-size="10.5" fill="#5A5A5A">memory-bound</text>
    <text x="206" y="562" class="body" font-size="10.5" fill="#5A5A5A">1 token / pas</text>
    <text x="206" y="578" class="mono" font-size="10.5" font-weight="600" fill="#1F5560">&lt;10 % FLOPs</text>
  </g>

  <!-- PREFILL point (interactive) -->
  <g class="interactive" data-card="prefill-compute" tabindex="0" role="button" aria-label="Prefill compute-bound">
    <rect x="390" y="232" width="170" height="100" fill="#B7332C" fill-opacity="0.07"/>
    <circle cx="470" cy="305" r="9" fill="#B7332C"/>
    <text x="402" y="258" class="body" font-size="12.5" font-weight="600" fill="#B7332C">PREFILL</text>
    <text x="402" y="276" class="body" font-size="10.5" fill="#5A5A5A">compute-bound</text>
    <text x="402" y="292" class="body" font-size="10.5" fill="#5A5A5A">tout le prompt en parallèle</text>
    <text x="402" y="308" class="mono" font-size="10.5" font-weight="600" fill="#B7332C">sature les FLOPs</text>
  </g>

  <!-- RIGHT TOP : INTERFERENCE (interactive) -->
  <g class="interactive" data-card="interference" tabindex="0" role="button" aria-label="Interférence prefill/decode">
    <rect x="620" y="172" width="520" height="252" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.5"/>
    <text x="644" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C">L'INTERFÉRENCE (continuous batching naïf)</text>
    <text x="644" y="222" class="body" font-size="11.5" fill="#5A5A5A">Un prefill lourd s'insère dans un lot de decodes et les fige</text>
    <!-- decode stream timeline -->
    <text x="644" y="262" class="body" font-size="10.5" fill="#1A1A1A">decodes en cours</text>
    <g fill="#1F5560">
      <rect x="644" y="272" width="14" height="20" rx="2"/>
      <rect x="664" y="272" width="14" height="20" rx="2"/>
      <rect x="684" y="272" width="14" height="20" rx="2"/>
      <rect x="704" y="272" width="14" height="20" rx="2"/>
    </g>
    <!-- big prefill block causing a gap -->
    <rect x="730" y="262" width="170" height="40" rx="3" fill="#B7332C"/>
    <text x="815" y="287" class="body" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">PREFILL (bloque)</text>
    <!-- stall gap marker -->
    <rect x="730" y="320" width="170" height="0" />
    <line x1="730" y1="330" x2="900" y2="330" stroke="#B7332C" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="815" y="348" class="body" font-size="10.5" font-weight="600" fill="#B7332C" text-anchor="middle">decodes stalés ⟶ latence ↑</text>
    <!-- resumed decodes -->
    <g fill="#1F5560" fill-opacity="0.5">
      <rect x="912" y="272" width="14" height="20" rx="2"/>
      <rect x="932" y="272" width="14" height="20" rx="2"/>
      <rect x="952" y="272" width="14" height="20" rx="2"/>
    </g>
    <text x="644" y="392" class="body" font-size="11" fill="#1A1A1A">Tous les utilisateurs actifs subissent un pic de latence inter-token.</text>
  </g>

  <!-- RIGHT BOTTOM : CHUNKED PREFILL (interactive) -->
  <g class="interactive" data-card="chunked-prefill" tabindex="0" role="button" aria-label="Chunked prefill, le remède">
    <rect x="620" y="446" width="520" height="252" rx="3" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.5"/>
    <text x="644" y="474" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1F5560">LE REMÈDE · CHUNKED PREFILL (Sarathi-Serve)</text>
    <text x="644" y="496" class="body" font-size="11.5" fill="#5A5A5A">Découper le prefill en morceaux insérables sans interrompre les decodes</text>
    <!-- interleaved timeline -->
    <g>
      <rect x="644" y="520" width="40" height="36" rx="3" fill="#B7332C" fill-opacity="0.8"/><text x="664" y="543" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">P-1</text>
      <rect x="690" y="520" width="14" height="36" rx="2" fill="#1F5560"/>
      <rect x="710" y="520" width="14" height="36" rx="2" fill="#1F5560"/>
      <rect x="730" y="520" width="40" height="36" rx="3" fill="#B7332C" fill-opacity="0.8"/><text x="750" y="543" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">P-2</text>
      <rect x="776" y="520" width="14" height="36" rx="2" fill="#1F5560"/>
      <rect x="796" y="520" width="14" height="36" rx="2" fill="#1F5560"/>
      <rect x="816" y="520" width="40" height="36" rx="3" fill="#B7332C" fill-opacity="0.8"/><text x="836" y="543" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">P-3</text>
      <rect x="862" y="520" width="14" height="36" rx="2" fill="#1F5560"/>
      <rect x="882" y="520" width="14" height="36" rx="2" fill="#1F5560"/>
    </g>
    <text x="644" y="586" class="body" font-size="10.5" fill="#5A5A5A">morceaux de prefill ▦  ·  decodes continus ▮  —  ordonnancement stall-free</text>
    <rect x="644" y="606" width="472" height="68" rx="3" fill="#1F5560" fill-opacity="0.1"/>
    <text x="668" y="636" class="display" font-size="26" font-weight="600" fill="#1F5560">×2,6–3,7</text>
    <text x="800" y="630" class="body" font-size="11.5" fill="#1A1A1A">capacité de service vs vLLM</text>
    <text x="800" y="650" class="body" font-size="10.5" fill="#5A5A5A">(Mistral-7B / Yi-34B, A100)</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="772" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Agrawal et al., Sarathi-Serve (OSDI 2024) ; Zhong et al., DistServe (OSDI 2024). Schéma de principe.</text>
</svg>
