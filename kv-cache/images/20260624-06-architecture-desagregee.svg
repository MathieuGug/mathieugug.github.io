<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow06" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">La désagrégation : séparer physiquement prefill et decode</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Deux pools de GPU optimisés pour leur régime ; le KV-cache transite de l'un à l'autre</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- request in -->
  <rect x="60" y="278" width="92" height="56" rx="3" fill="#1A1A1A"/>
  <text x="106" y="302" class="body" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">requête</text>
  <text x="106" y="320" class="body" font-size="9" fill="#FAF8F3" text-anchor="middle">+ prompt</text>
  <line x1="152" y1="306" x2="186" y2="306" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow06)"/>

  <!-- POOL PREFILL (interactive) -->
  <g class="interactive" data-card="pool-prefill" tabindex="0" role="button" aria-label="Pool prefill compute-optimisé">
    <rect x="190" y="200" width="300" height="210" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="214" y="230" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B7332C">POOL PREFILL</text>
    <text x="214" y="250" class="body" font-size="11.5" fill="#5A5A5A">compute-optimisé · sature les FLOPs</text>
    <g fill="#B7332C" fill-opacity="0.85">
      <rect x="214" y="266" width="58" height="70" rx="3"/>
      <rect x="282" y="266" width="58" height="70" rx="3"/>
      <rect x="350" y="266" width="58" height="70" rx="3"/>
    </g>
    <text x="243" y="306" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="311" y="306" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="379" y="306" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="214" y="364" class="body" font-size="10.5" fill="#1A1A1A">parallélisme &amp; lot dimensionnés</text>
    <text x="214" y="380" class="body" font-size="10.5" fill="#1A1A1A">pour le calcul du prompt</text>
    <text x="214" y="398" class="body" font-size="10" font-style="italic" fill="#5A5A5A">produit le KV-cache</text>
  </g>

  <!-- KV TRANSFER (interactive) -->
  <g class="interactive" data-card="kv-transfer" tabindex="0" role="button" aria-label="Transfert du KV-cache sur le réseau">
    <rect x="500" y="244" width="200" height="122" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="600" y="270" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#B58A2C" text-anchor="middle">TRANSFERT KV</text>
    <!-- moving KV blocks -->
    <g fill="#B58A2C">
      <rect x="522" y="288" width="22" height="22" rx="2"/>
      <rect x="552" y="288" width="22" height="22" rx="2" fill-opacity="0.7"/>
      <rect x="582" y="288" width="22" height="22" rx="2" fill-opacity="0.5"/>
    </g>
    <line x1="612" y1="299" x2="678" y2="299" stroke="#B58A2C" stroke-width="1.5" marker-end="url(#arrow06)"/>
    <text x="600" y="334" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">plusieurs Go d'états</text>
    <text x="600" y="350" class="body" font-size="10" font-weight="600" fill="#B58A2C" text-anchor="middle">RDMA / NVLink</text>
  </g>
  <line x1="490" y1="306" x2="500" y2="306" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="700" y1="306" x2="708" y2="306" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow06)"/>

  <!-- POOL DECODE (interactive) -->
  <g class="interactive" data-card="pool-decode" tabindex="0" role="button" aria-label="Pool decode mémoire-optimisé">
    <rect x="712" y="200" width="300" height="210" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="736" y="230" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1F5560">POOL DECODE</text>
    <text x="736" y="250" class="body" font-size="11.5" fill="#5A5A5A">mémoire-optimisé · sature la bande passante</text>
    <g fill="#1F5560" fill-opacity="0.85">
      <rect x="736" y="266" width="58" height="70" rx="3"/>
      <rect x="804" y="266" width="58" height="70" rx="3"/>
      <rect x="872" y="266" width="58" height="70" rx="3"/>
      <rect x="940" y="266" width="48" height="70" rx="3"/>
    </g>
    <text x="765" y="306" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="833" y="306" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="901" y="306" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="964" y="306" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="736" y="364" class="body" font-size="10.5" fill="#1A1A1A">génère token par token sans</text>
    <text x="736" y="380" class="body" font-size="10.5" fill="#1A1A1A">interférence du prefill</text>
    <text x="736" y="398" class="body" font-size="10" font-style="italic" fill="#5A5A5A">consomme le KV-cache</text>
  </g>
  <!-- tokens out -->
  <line x1="1012" y1="306" x2="1046" y2="306" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow06)"/>
  <rect x="1048" y="278" width="84" height="56" rx="3" fill="#1A1A1A"/>
  <text x="1090" y="302" class="body" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">tokens</text>
  <text x="1090" y="320" class="body" font-size="9" fill="#FAF8F3" text-anchor="middle">en flux</text>

  <!-- KVCACHE POOL (interactive) -->
  <g class="interactive" data-card="kvcache-pool" tabindex="0" role="button" aria-label="Pool KVCache désagrégé Mooncake">
    <rect x="190" y="430" width="822" height="120" rx="3" fill="#1A1A1A" fill-opacity="0.05" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="214" y="458" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1A1A1A">POOL KVCACHE GLOBAL · architecture KVCache-centric (Mooncake)</text>
    <text x="214" y="478" class="body" font-size="11" fill="#5A5A5A">Le cache n'est plus attaché à un GPU : il vit dans un pool exploitant DRAM, SSD et CPU sous-utilisés du cluster</text>
    <g>
      <rect x="214" y="494" width="150" height="40" rx="3" fill="#1F5560" fill-opacity="0.8"/><text x="289" y="519" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">HBM (chaud)</text>
      <rect x="378" y="494" width="150" height="40" rx="3" fill="#1F5560" fill-opacity="0.55"/><text x="453" y="519" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">DRAM</text>
      <rect x="542" y="494" width="150" height="40" rx="3" fill="#1F5560" fill-opacity="0.35"/><text x="617" y="519" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">SSD (froid)</text>
      <rect x="706" y="494" width="150" height="40" rx="3" fill="#E5E1D8"/><text x="781" y="519" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">CPU host</text>
      <text x="884" y="513" class="body" font-size="10.5" fill="#1A1A1A">le placement du KV</text>
      <text x="884" y="528" class="body" font-size="10.5" font-weight="600" fill="#1F5560">= ordonnancement</text>
    </g>
  </g>
  <line x1="340" y1="410" x2="340" y2="428" stroke="#B8B5AE" stroke-width="1" marker-end="url(#arrow06)"/>
  <line x1="860" y1="428" x2="860" y2="410" stroke="#B8B5AE" stroke-width="1" marker-end="url(#arrow06)"/>

  <!-- STATS -->
  <text x="60" y="592" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1A1A1A">LES TROIS SYSTÈMES DE RÉFÉRENCE</text>
  <g>
    <rect x="60" y="606" width="346" height="118" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1"/>
    <text x="84" y="634" class="body" font-size="13" font-weight="600" fill="#1A1A1A">DistServe</text>
    <text x="84" y="652" class="body" font-size="10" fill="#5A5A5A">OSDI 2024 · co-optimise par phase</text>
    <text x="84" y="690" class="display" font-size="28" font-weight="600" fill="#B7332C">×7,4</text>
    <text x="180" y="684" class="body" font-size="11" fill="#1A1A1A">requêtes, ou ×12,6</text>
    <text x="180" y="700" class="body" font-size="11" fill="#1A1A1A">sur la contrainte SLO</text>
  </g>
  <g>
    <rect x="426" y="606" width="346" height="118" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1"/>
    <text x="450" y="634" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Splitwise</text>
    <text x="450" y="652" class="body" font-size="10" fill="#5A5A5A">Microsoft · ISCA 2024 · phase splitting</text>
    <text x="450" y="690" class="display" font-size="28" font-weight="600" fill="#B7332C">×2,35</text>
    <text x="556" y="684" class="body" font-size="11" fill="#1A1A1A">débit à coût et énergie</text>
    <text x="556" y="700" class="body" font-size="11" fill="#1A1A1A">constants (ou −20 % coût)</text>
  </g>
  <g>
    <rect x="792" y="606" width="348" height="118" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25"/>
    <text x="816" y="634" class="body" font-size="13" font-weight="600" fill="#1F5560">Mooncake</text>
    <text x="816" y="652" class="body" font-size="10" fill="#5A5A5A">Moonshot · FAST 2025 Best Paper</text>
    <text x="816" y="690" class="display" font-size="28" font-weight="600" fill="#1F5560">+59→498 %</text>
    <text x="816" y="712" class="body" font-size="11" fill="#1A1A1A">capacité · sert Kimi, &gt;100 Md tokens/jour</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="760" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Zhong et al. (DistServe) ; Patel et al. (Splitwise) ; Qin et al. (Mooncake, FAST 2025).</text>
</svg>
