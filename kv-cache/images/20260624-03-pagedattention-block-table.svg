<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow03" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">PagedAttention : la pagination de l'OS appliquée à l'attention</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Une block table traduit la vue logique contiguë en blocs physiques épars — comme une table des pages</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- VUE LOGIQUE (interactive) -->
  <g class="interactive" data-card="blocs-logiques" tabindex="0" role="button" aria-label="Vue logique contiguë">
    <rect x="60" y="172" width="220" height="300" rx="3" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.5"/>
    <text x="80" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1F5560">VUE LOGIQUE</text>
    <text x="80" y="220" class="body" font-size="11" fill="#5A5A5A">Requête A — contiguë</text>
    <rect x="80" y="234" width="180" height="48" rx="2" fill="#1F5560" fill-opacity="0.85"/>
    <text x="170" y="256" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">bloc logique 0</text>
    <text x="170" y="272" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">tokens 0–15</text>
    <rect x="80" y="288" width="180" height="48" rx="2" fill="#1F5560" fill-opacity="0.85"/>
    <text x="170" y="310" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">bloc logique 1</text>
    <text x="170" y="326" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">tokens 16–31</text>
    <rect x="80" y="342" width="180" height="48" rx="2" fill="#1F5560" fill-opacity="0.85"/>
    <text x="170" y="364" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">bloc logique 2</text>
    <text x="170" y="380" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">tokens 32–47</text>
    <rect x="80" y="396" width="180" height="48" rx="2" fill="#1F5560" fill-opacity="0.55"/>
    <text x="170" y="418" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">bloc logique 3</text>
    <text x="170" y="434" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">en cours…</text>
  </g>

  <!-- BLOCK TABLE (interactive) -->
  <g class="interactive" data-card="block-table" tabindex="0" role="button" aria-label="La block table de traduction">
    <rect x="360" y="172" width="240" height="300" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.5"/>
    <text x="380" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B7332C">BLOCK TABLE</text>
    <text x="380" y="220" class="body" font-size="11" fill="#5A5A5A">logique → physique</text>
    <!-- rows -->
    <g class="mono" font-size="11" fill="#1A1A1A">
      <rect x="380" y="234" width="200" height="48" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
      <text x="396" y="263">L0  →  <tspan font-weight="600" fill="#B7332C">P07</tspan></text>
      <rect x="380" y="288" width="200" height="48" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
      <text x="396" y="317">L1  →  <tspan font-weight="600" fill="#B7332C">P02</tspan></text>
      <rect x="380" y="342" width="200" height="48" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
      <text x="396" y="371">L2  →  <tspan font-weight="600" fill="#B7332C">P09</tspan></text>
      <rect x="380" y="396" width="200" height="48" rx="2" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.75"/>
      <text x="396" y="425">L3  →  <tspan font-weight="600" fill="#B7332C">P04</tspan></text>
    </g>
  </g>

  <!-- arrows logical -> table -->
  <line x1="262" y1="258" x2="358" y2="258" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow03)"/>
  <line x1="262" y1="312" x2="358" y2="312" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow03)"/>
  <line x1="262" y1="366" x2="358" y2="366" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow03)"/>
  <line x1="262" y1="420" x2="358" y2="420" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow03)"/>

  <!-- MEMOIRE PHYSIQUE (interactive) -->
  <g class="interactive" data-card="blocs-physiques" tabindex="0" role="button" aria-label="Mémoire physique fragmentée">
    <rect x="700" y="172" width="440" height="300" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="720" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1A1A1A">MÉMOIRE PHYSIQUE — blocs épars</text>
    <text x="720" y="220" class="body" font-size="11" fill="#5A5A5A">teal = appartient à la requête A · gris = autres requêtes / libre</text>
    <!-- grid 4x3 -->
    <!-- row 0 -->
    <rect x="720" y="234" width="96" height="44" rx="2" fill="#E5E1D8"/><text x="768" y="261" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">P00</text>
    <rect x="826" y="234" width="96" height="44" rx="2" fill="#E5E1D8"/><text x="874" y="261" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">P01</text>
    <rect x="932" y="234" width="96" height="44" rx="2" fill="#1F5560" fill-opacity="0.85"/><text x="980" y="261" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">P02 ·L1</text>
    <rect x="1038" y="234" width="96" height="44" rx="2" fill="#E5E1D8"/><text x="1086" y="261" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">P03</text>
    <!-- row 1 -->
    <rect x="720" y="288" width="96" height="44" rx="2" fill="#1F5560" fill-opacity="0.55"/><text x="768" y="315" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">P04 ·L3</text>
    <rect x="826" y="288" width="96" height="44" rx="2" fill="#E5E1D8"/><text x="874" y="315" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">P05</text>
    <rect x="932" y="288" width="96" height="44" rx="2" fill="#E5E1D8"/><text x="980" y="315" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">P06</text>
    <rect x="1038" y="288" width="96" height="44" rx="2" fill="#1F5560" fill-opacity="0.85"/><text x="1086" y="315" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">P07 ·L0</text>
    <!-- row 2 -->
    <rect x="720" y="342" width="96" height="44" rx="2" fill="#E5E1D8"/><text x="768" y="369" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">P08</text>
    <rect x="826" y="342" width="96" height="44" rx="2" fill="#1F5560" fill-opacity="0.85"/><text x="874" y="369" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">P09 ·L2</text>
    <rect x="932" y="342" width="96" height="44" rx="2" fill="#E5E1D8"/><text x="980" y="369" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">P10</text>
    <rect x="1038" y="342" width="96" height="44" rx="2" fill="#E5E1D8"/><text x="1086" y="369" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">P11</text>
    <text x="720" y="424" class="body" font-size="11.5" fill="#1A1A1A">Aucune contrainte de contiguïté : un bloc se matérialise quand son token</text>
    <text x="720" y="442" class="body" font-size="11.5" fill="#1A1A1A">est généré. <tspan font-weight="600" fill="#1F5560">Gaspillage &lt; 4 %, débit ×2–4</tspan> à latence égale.</text>
  </g>

  <!-- arrow table -> physical -->
  <line x1="582" y1="300" x2="700" y2="300" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arrow03)"/>
  <text x="641" y="292" class="body" font-size="10" fill="#B7332C" text-anchor="middle">indirection</text>

  <!-- COPY ON WRITE (interactive) -->
  <g class="interactive" data-card="copy-on-write" tabindex="0" role="button" aria-label="Copy-on-write pour le partage">
    <rect x="60" y="500" width="1080" height="230" rx="3" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="80" y="528" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B58A2C">COPY-ON-WRITE · partage de préfixe gratuit</text>
    <text x="80" y="550" class="body" font-size="12" fill="#5A5A5A">Échantillonnage parallèle &amp; beam search : un seul exemplaire du préfixe pour k branches, dupliqué seulement à l'écriture</text>

    <!-- shared phase -->
    <rect x="100" y="572" width="150" height="42" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="175" y="598" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">table A · L0→P07</text>
    <rect x="100" y="640" width="150" height="42" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="175" y="666" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">table B · L0→P07</text>
    <rect x="360" y="606" width="130" height="42" rx="3" fill="#1F5560"/>
    <text x="425" y="632" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">P07 partagé</text>
    <line x1="250" y1="593" x2="358" y2="620" stroke="#1F5560" stroke-width="1.25" marker-end="url(#arrow03)"/>
    <line x1="250" y1="661" x2="358" y2="634" stroke="#1F5560" stroke-width="1.25" marker-end="url(#arrow03)"/>
    <text x="295" y="700" class="body" font-size="10.5" font-style="italic" fill="#5A5A5A">tant qu'aucune branche n'écrit</text>

    <!-- write event -->
    <text x="560" y="632" class="body" font-size="13" fill="#1A1A1A">B écrit →</text>
    <line x1="630" y1="627" x2="700" y2="627" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arrow03)"/>

    <!-- forked phase -->
    <rect x="720" y="572" width="150" height="42" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="795" y="598" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">table A · L0→P07</text>
    <rect x="720" y="640" width="150" height="42" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="795" y="666" class="mono" font-size="11" fill="#B7332C" text-anchor="middle">table B · L0→P11</text>
    <rect x="960" y="572" width="130" height="42" rx="3" fill="#1F5560"/>
    <text x="1025" y="598" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">P07 (A)</text>
    <rect x="960" y="640" width="130" height="42" rx="3" fill="#B7332C"/>
    <text x="1025" y="666" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">P11 copié (B)</text>
    <line x1="870" y1="593" x2="958" y2="593" stroke="#1F5560" stroke-width="1.25" marker-end="url(#arrow03)"/>
    <line x1="870" y1="661" x2="958" y2="661" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arrow03)"/>
  </g>

  <!-- FOOTER -->
  <text x="60" y="772" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : Kwon et al., PagedAttention (SOSP 2023). Identifiants de blocs illustratifs.</text>
</svg>
