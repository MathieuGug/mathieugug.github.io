<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">L'arbre radix du préfixe partagé</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">RadixAttention fusionne les préfixes communs ; on ne calcule que le suffixe nouveau</text>
  <line x1="60" y1="140" x2="840" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- root -->
  <rect x="400" y="172" width="100" height="40" rx="3" fill="#1A1A1A"/>
  <text x="450" y="197" class="mono" font-size="12" fill="#FAF8F3" text-anchor="middle">∅ racine</text>

  <!-- edges root -> system -->
  <path d="M450 212 L450 256" fill="none" stroke="#5A5A5A" stroke-width="1.5"/>

  <!-- SYSTEM PROMPT (interactive) -->
  <g class="interactive" data-card="prefixe-systeme" tabindex="0" role="button" aria-label="Préfixe système partagé">
    <rect x="270" y="258" width="360" height="62" rx="3" fill="#B7332C" fill-opacity="0.9"/>
    <text x="450" y="284" class="body" font-size="14" font-weight="600" fill="#FAF8F3" text-anchor="middle">SYSTEM PROMPT</text>
    <text x="450" y="306" class="body" font-size="11" fill="#FAF8F3" text-anchor="middle">cache chaud · partagé par toutes les requêtes</text>
  </g>

  <!-- edges system -> branches -->
  <path d="M380 320 C 330 360, 290 360, 250 392" fill="none" stroke="#5A5A5A" stroke-width="1.5" marker-end="url(#arrow04)"/>
  <path d="M520 320 C 580 360, 620 360, 660 392" fill="none" stroke="#5A5A5A" stroke-width="1.5" marker-end="url(#arrow04)"/>

  <!-- BRANCHE PARTAGEE (interactive) -->
  <g class="interactive" data-card="branche-partagee" tabindex="0" role="button" aria-label="Branche partagée few-shot ou RAG">
    <rect x="110" y="394" width="280" height="58" rx="3" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-width="1.5"/>
    <text x="250" y="418" class="body" font-size="12.5" font-weight="600" fill="#1F5560" text-anchor="middle">exemples few-shot (jeu A)</text>
    <text x="250" y="438" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">partagés par 2 requêtes</text>
  </g>

  <!-- RAG branch (non interactive base) -->
  <rect x="520" y="394" width="280" height="58" rx="3" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-width="1.5"/>
  <text x="660" y="418" class="body" font-size="12.5" font-weight="600" fill="#1F5560" text-anchor="middle">contexte RAG · doc-X</text>
  <text x="660" y="438" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">partagé par 2 requêtes</text>

  <!-- edges branches -> leaves -->
  <path d="M190 452 L160 506" fill="none" stroke="#B8B5AE" stroke-width="1.25" marker-end="url(#arrow04)"/>
  <path d="M310 452 L340 506" fill="none" stroke="#B8B5AE" stroke-width="1.25" marker-end="url(#arrow04)"/>
  <path d="M600 452 L570 506" fill="none" stroke="#B8B5AE" stroke-width="1.25" marker-end="url(#arrow04)"/>
  <path d="M720 452 L745 506" fill="none" stroke="#B8B5AE" stroke-width="1.25" marker-end="url(#arrow04)"/>

  <!-- leaves -->
  <rect x="100" y="508" width="120" height="44" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="160" y="528" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">req 1</text>
  <text x="160" y="544" class="body" font-size="9" fill="#5A5A5A" text-anchor="middle">suffixe propre</text>
  <rect x="280" y="508" width="120" height="44" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="340" y="528" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">req 2</text>
  <text x="340" y="544" class="body" font-size="9" fill="#5A5A5A" text-anchor="middle">suffixe propre</text>
  <rect x="510" y="508" width="120" height="44" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="570" y="528" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">req 3</text>
  <text x="570" y="544" class="body" font-size="9" fill="#5A5A5A" text-anchor="middle">suffixe propre</text>

  <!-- LRU EVICTION (interactive) — cold leaf -->
  <g class="interactive" data-card="lru-eviction" tabindex="0" role="button" aria-label="Éviction LRU des feuilles froides">
    <rect x="690" y="508" width="120" height="44" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="750" y="528" class="mono" font-size="11" fill="#B58A2C" text-anchor="middle">req 4 · froide</text>
    <text x="750" y="544" class="body" font-size="9" fill="#B58A2C" text-anchor="middle">candidate à éviction</text>
  </g>
  <text x="750" y="578" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">LRU : on libère les feuilles,</text>
  <text x="750" y="592" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="middle">jamais les préfixes chauds</text>

  <!-- CACHE-AWARE SCHEDULING (interactive) -->
  <g class="interactive" data-card="cache-aware-scheduling" tabindex="0" role="button" aria-label="Cache-aware scheduling">
    <rect x="60" y="630" width="780" height="186" rx="3" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="84" y="660" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B58A2C">CACHE-AWARE SCHEDULING</text>
    <text x="84" y="684" class="body" font-size="12.5" fill="#1A1A1A">L'ordonnanceur route la requête entrante vers le nœud de l'arbre où son préfixe est déjà chaud</text>
    <!-- incoming request -->
    <rect x="84" y="710" width="160" height="50" rx="3" fill="#1A1A1A"/>
    <text x="164" y="732" class="body" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">nouvelle requête</text>
    <text x="164" y="750" class="body" font-size="9.5" fill="#FAF8F3" text-anchor="middle">même system prompt</text>
    <line x1="244" y1="735" x2="360" y2="735" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arrow04)"/>
    <text x="302" y="726" class="body" font-size="10" fill="#B7332C" text-anchor="middle">route vers</text>
    <rect x="370" y="710" width="200" height="50" rx="3" fill="#B7332C" fill-opacity="0.9"/>
    <text x="470" y="732" class="body" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">nœud chaud existant</text>
    <text x="470" y="750" class="body" font-size="9.5" fill="#FAF8F3" text-anchor="middle">0 recalcul du préfixe</text>
    <text x="600" y="728" class="body" font-size="11.5" fill="#1A1A1A">→ le partage devient</text>
    <text x="600" y="746" class="body" font-size="11.5" font-weight="600" fill="#1F5560">stratégie, pas hasard</text>
  </g>

  <!-- monetisation note -->
  <text x="60" y="852" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Monétisation directe : le « prompt caching » des API (Anthropic, OpenAI) facture les tokens en cache jusqu'à −90 %.</text>

  <!-- FOOTER -->
  <text x="60" y="880" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : Zheng et al., SGLang / RadixAttention (NeurIPS 2024) ; documentation prompt caching, 2024.</text>
</svg>
