<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, system-ui, sans-serif">
  <style>
    .display { font-family: 'Spectral', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', monospace; }
    .interactive { cursor: pointer; }
    .interactive:hover rect, .interactive:focus-visible rect { stroke-width: 2.5; }
    .interactive:hover circle, .interactive:focus-visible circle { stroke-width: 2.5; }
  </style>
  <defs>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
    <marker id="arrow4g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.05em">SCHEMA 04</text>
  <text x="60" y="96" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">The agent attack surface</text>
  <text x="60" y="124" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Eight vectors by which an instruction can reach the model — only one of them is the user.</text>
  <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Central agent runtime -->
  <g>
    <rect x="490" y="370" width="220" height="140" rx="4" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="600" y="398" class="display" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">Agent runtime</text>
    <text x="600" y="418" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">LLM + tool-use loop</text>
    <line x1="510" y1="430" x2="690" y2="430" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="600" y="450" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">system prompt</text>
    <text x="600" y="466" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">+ context window</text>
    <text x="600" y="482" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">+ tool permissions</text>
    <text x="600" y="498" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">+ memory store</text>
  </g>

  <!-- Surface 1: Direct user injection (top-left) -->
  <g class="interactive" data-card="direct-injection" tabindex="0" role="button" aria-label="Direct user injection">
    <rect x="60" y="180" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="76" y="202" class="mono" font-size="9" font-weight="600" fill="#5A5A5A">① DIRECT INJECTION</text>
    <text x="76" y="222" class="display" font-size="13" font-weight="600" fill="#1A1A1A">User prompt</text>
    <text x="76" y="240" class="body" font-size="10" fill="#5A5A5A">DAN, GCG, PAIR, Crescendo,</text>
    <text x="76" y="252" class="body" font-size="10" fill="#5A5A5A">Policy Puppetry, persona attacks</text>
  </g>
  <line x1="280" y1="220" x2="488" y2="395" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow4g)"/>

  <!-- Surface 2: Indirect via RAG (top-center-left) -->
  <g class="interactive" data-card="rag-injection" tabindex="0" role="button" aria-label="RAG indirect injection">
    <rect x="320" y="180" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="336" y="202" class="mono" font-size="9" font-weight="600" fill="#B7332C">② INDIRECT · RAG</text>
    <text x="336" y="222" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Retrieved documents</text>
    <text x="336" y="240" class="body" font-size="10" fill="#5A5A5A">Poisoned knowledge base, indexed</text>
    <text x="336" y="252" class="body" font-size="10" fill="#5A5A5A">PDFs with hidden instructions</text>
  </g>
  <line x1="430" y1="260" x2="510" y2="375" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arrow4)"/>

  <!-- Surface 3: Indirect via email/web (top-center-right) -->
  <g class="interactive" data-card="email-web-injection" tabindex="0" role="button" aria-label="Email and web injection">
    <rect x="660" y="180" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="676" y="202" class="mono" font-size="9" font-weight="600" fill="#B7332C">③ INDIRECT · EMAIL/WEB</text>
    <text x="676" y="222" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Email, browsing, tickets</text>
    <text x="676" y="240" class="body" font-size="10" fill="#5A5A5A">EchoLeak (Copilot), Comet browser,</text>
    <text x="676" y="252" class="body" font-size="10" fill="#5A5A5A">scraped pages, Slack/Jira tickets</text>
  </g>
  <line x1="770" y1="260" x2="690" y2="375" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arrow4)"/>

  <!-- Surface 4: MCP tool poisoning (top-right) -->
  <g class="interactive" data-card="mcp-poisoning" tabindex="0" role="button" aria-label="MCP tool poisoning">
    <rect x="920" y="180" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="936" y="202" class="mono" font-size="9" font-weight="600" fill="#B7332C">④ MCP TOOL POISONING</text>
    <text x="936" y="222" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Malicious server</text>
    <text x="936" y="240" class="body" font-size="10" fill="#5A5A5A">Hostile description, rug pull,</text>
    <text x="936" y="252" class="body" font-size="10" fill="#5A5A5A">marketplace squatting</text>
  </g>
  <line x1="1010" y1="260" x2="710" y2="395" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arrow4)"/>

  <!-- Surface 5: Memory poisoning (left of center) -->
  <g class="interactive" data-card="memory-poisoning" tabindex="0" role="button" aria-label="Memory poisoning">
    <rect x="60" y="380" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="76" y="402" class="mono" font-size="9" font-weight="600" fill="#B7332C">⑤ MEMORY POISONING</text>
    <text x="76" y="422" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Persistent store</text>
    <text x="76" y="440" class="body" font-size="10" fill="#5A5A5A">MINJA-style records;</text>
    <text x="76" y="452" class="body" font-size="10" fill="#5A5A5A">cross-session contamination</text>
  </g>
  <line x1="280" y1="420" x2="488" y2="440" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arrow4)"/>

  <!-- Surface 6: XPIA agent-to-agent (right of center) -->
  <g class="interactive" data-card="xpia" tabindex="0" role="button" aria-label="Agent-to-agent XPIA">
    <rect x="920" y="380" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="936" y="402" class="mono" font-size="9" font-weight="600" fill="#B7332C">⑥ XPIA · AGENT-TO-AGENT</text>
    <text x="936" y="422" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Sub-agent output</text>
    <text x="936" y="440" class="body" font-size="10" fill="#5A5A5A">Multi-agent worm propagation;</text>
    <text x="936" y="452" class="body" font-size="10" fill="#5A5A5A">orchestrator trusts worker</text>
  </g>
  <line x1="920" y1="420" x2="710" y2="440" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arrow4)"/>

  <!-- Surface 7: Output handling (bottom-left) -->
  <g class="interactive" data-card="output-handling" tabindex="0" role="button" aria-label="Insecure output handling">
    <rect x="220" y="580" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="236" y="602" class="mono" font-size="9" font-weight="600" fill="#1F5560">⑦ INSECURE OUTPUT HANDLING</text>
    <text x="236" y="622" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Downstream consumers</text>
    <text x="236" y="640" class="body" font-size="10" fill="#5A5A5A">Markdown image exfil, XSS in chat UI,</text>
    <text x="236" y="652" class="body" font-size="10" fill="#5A5A5A">SQL/shell command injection</text>
  </g>
  <line x1="510" y1="510" x2="380" y2="580" stroke="#1F5560" stroke-width="1.25" marker-end="url(#arrow4g)"/>

  <!-- Surface 8: Excessive agency (bottom-right) -->
  <g class="interactive" data-card="excessive-agency" tabindex="0" role="button" aria-label="Excessive agency">
    <rect x="740" y="580" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="756" y="602" class="mono" font-size="9" font-weight="600" fill="#1F5560">⑧ EXCESSIVE AGENCY</text>
    <text x="756" y="622" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Over-permissioned tools</text>
    <text x="756" y="640" class="body" font-size="10" fill="#5A5A5A">Send-email, transfer-funds, exec-shell;</text>
    <text x="756" y="652" class="body" font-size="10" fill="#5A5A5A">no human-in-the-loop gate</text>
  </g>
  <line x1="690" y1="510" x2="820" y2="580" stroke="#1F5560" stroke-width="1.25" marker-end="url(#arrow4g)"/>

  <!-- Legend -->
  <g>
    <rect x="60" y="700" width="1080" height="60" rx="3" fill="#F2EFE7" stroke="#E5E1D8" stroke-width="0.5"/>
    <circle cx="80" cy="720" r="5" fill="#5A5A5A"/>
    <text x="94" y="724" class="body" font-size="10" fill="#1A1A1A">Trusted channel (user, gated)</text>
    <circle cx="280" cy="720" r="5" fill="#B7332C"/>
    <text x="294" y="724" class="body" font-size="10" fill="#1A1A1A">Untrusted channel — instruction can arrive disguised as data</text>
    <circle cx="660" cy="720" r="5" fill="#1F5560"/>
    <text x="674" y="724" class="body" font-size="10" fill="#1A1A1A">Egress / action surface — where compromise becomes consequence</text>
    <text x="80" y="746" class="body" font-size="10" font-style="italic" fill="#5A5A5A">An agent has no built-in way to distinguish a user instruction from a string of text inside an email or a tool description. Mitigation = architecture, not prompts.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="775" x2="1140" y2="775" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="790" class="body" font-size="9" font-style="italic" fill="#5A5A5A">Sources: OWASP Top 10 LLM 2025; AgentDojo (Debenedetti et al. 2024); InjecAgent (Zhan et al. 2024); MCPTox (2025); EchoLeak CVE-2025-32711.</text>
</svg>
