<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, system-ui, sans-serif">
  <style>
    .display { font-family: 'Spectral', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', monospace; }
    .interactive { cursor: pointer; }
    .interactive:hover rect, .interactive:focus-visible rect { stroke-width: 2.5; }
  </style>
  <defs>
    <marker id="arrow6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.05em">SCHEMA 06</text>
  <text x="60" y="96" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Five layers of defense</text>
  <text x="60" y="124" class="display" font-size="15" font-style="italic" fill="#5A5A5A">No single layer is sufficient. Robustness comes from stacking complementary controls along the request path.</text>
  <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Left axis: request flow -->
  <text x="80" y="190" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" letter-spacing="0.05em">REQUEST FLOW</text>
  <line x1="120" y1="200" x2="120" y2="700" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow6)"/>
  <text x="80" y="710" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" letter-spacing="0.05em">RESPONSE</text>

  <!-- Layer 1: Training-time -->
  <g class="interactive" data-card="layer-training" tabindex="0" role="button" aria-label="Training-time alignment">
    <rect x="160" y="180" width="980" height="92" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.5"/>
    <text x="180" y="208" class="mono" font-size="10" font-weight="600" fill="#1F5560">LAYER 1 · TRAINING TIME</text>
    <text x="180" y="232" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Alignment baked into weights</text>
    <text x="180" y="252" class="body" font-size="11" fill="#5A5A5A">RLHF · Constitutional AI · Circuit Breakers · adversarial training (StruQ, SecAlign) · refusal-direction tuning</text>
    <text x="180" y="266" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Catches: most low-effort attacks · Misses: novel jailbreaks, agentic IPI, encoding tricks · Cost: months of training</text>
  </g>

  <!-- Layer 2: Input classifiers -->
  <g class="interactive" data-card="layer-input" tabindex="0" role="button" aria-label="Input classifiers">
    <rect x="160" y="282" width="980" height="92" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.5"/>
    <text x="180" y="310" class="mono" font-size="10" font-weight="600" fill="#1F5560">LAYER 2 · INPUT CLASSIFIERS</text>
    <text x="180" y="334" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Pre-model gates and tagging</text>
    <text x="180" y="354" class="body" font-size="11" fill="#5A5A5A">Llama Guard · ShieldGemma · Constitutional Classifier · Prompt Shields · Spotlighting (encode untrusted input)</text>
    <text x="180" y="368" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Catches: known jailbreak patterns, prompt injection markers · Misses: novel encodings, very subtle multi-turn · Cost: latency + FP rate</text>
  </g>

  <!-- Layer 3: System prompt -->
  <g class="interactive" data-card="layer-prompt" tabindex="0" role="button" aria-label="System prompt hardening">
    <rect x="160" y="384" width="980" height="92" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.5"/>
    <text x="180" y="412" class="mono" font-size="10" font-weight="600" fill="#1F5560">LAYER 3 · SYSTEM PROMPT &amp; INSTRUCTION HIERARCHY</text>
    <text x="180" y="436" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Make the rules legible to the model</text>
    <text x="180" y="456" class="body" font-size="11" fill="#5A5A5A">Explicit refusal taxonomy · delimiters around untrusted data · OpenAI-style instruction hierarchy · "data ≠ instructions" framing</text>
    <text x="180" y="470" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Catches: confusion between channels · Misses: dedicated multi-turn attackers · Cost: prompt engineering iteration; never sufficient alone</text>
  </g>

  <!-- Layer 4: Architectural isolation -->
  <g class="interactive" data-card="layer-architecture" tabindex="0" role="button" aria-label="Architectural isolation">
    <rect x="160" y="486" width="980" height="92" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.5"/>
    <text x="180" y="514" class="mono" font-size="10" font-weight="600" fill="#1F5560">LAYER 4 · ARCHITECTURE &amp; CAPABILITIES</text>
    <text x="180" y="538" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Reduce blast radius — assume compromise</text>
    <text x="180" y="558" class="body" font-size="11" fill="#5A5A5A">CaMeL dual-LLM · capability tokens · least-privilege tools · per-request sandboxing · HITL on high-impact actions · provenance tracking</text>
    <text x="180" y="572" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Catches: turns a jailbreak into a non-event · Misses: nothing if designed well · Cost: engineering complexity, UX friction on confirmations</text>
  </g>

  <!-- Layer 5: Output filtering -->
  <g class="interactive" data-card="layer-output" tabindex="0" role="button" aria-label="Output filtering and monitoring">
    <rect x="160" y="588" width="980" height="92" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.5"/>
    <text x="180" y="616" class="mono" font-size="10" font-weight="600" fill="#1F5560">LAYER 5 · OUTPUT FILTERING &amp; MONITORING</text>
    <text x="180" y="640" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Detect what slipped through; learn fast</text>
    <text x="180" y="660" class="body" font-size="11" fill="#5A5A5A">Output classifiers · DLP · markdown-image stripping · audit logs · canary prompts · LLM-as-judge red-team · incident replay</text>
    <text x="180" y="674" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Catches: data exfil, policy violations, refusal-bypass tells · Misses: harms that don't manifest in the text · Cost: review queue; alert fatigue</text>
  </g>

  <!-- Side annotations: trust gradient -->
  <g>
    <text x="1158" y="220" class="mono" font-size="9" font-weight="600" fill="#5A5A5A" text-anchor="end" transform="rotate(-90, 1158, 220)">SLOW · STATIC</text>
    <text x="1158" y="640" class="mono" font-size="9" font-weight="600" fill="#5A5A5A" text-anchor="end" transform="rotate(-90, 1158, 640)">FAST · DYNAMIC</text>
  </g>

  <!-- Bottom annotation -->
  <g>
    <rect x="60" y="710" width="1080" height="50" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="80" y="734" class="display" font-size="13" font-weight="600" fill="#B7332C">Defense-in-depth principle</text>
    <text x="80" y="752" class="body" font-size="10" font-style="italic" fill="#1A1A1A">Anthropic's Constitutional Classifiers cut jailbreak success from ~86% (no defense) to ~4.4% — but only when paired with a robust base model. Layers compound multiplicatively, not additively.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="775" x2="1140" y2="775" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="790" class="body" font-size="9" font-style="italic" fill="#5A5A5A">Sources: Anthropic Constitutional Classifiers v1/v2 (2025–2026); Inan et al. Llama Guard 2 (2024); Microsoft Spotlighting (Hines et al. 2024); Google DeepMind CaMeL (Debenedetti et al. 2025); OWASP Top 10 LLM 2025.</text>
</svg>
