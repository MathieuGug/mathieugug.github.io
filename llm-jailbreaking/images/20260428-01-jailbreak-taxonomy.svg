<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="Inter, system-ui, sans-serif">
  <style>
    .display { font-family: 'Spectral', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', monospace; }
    .interactive { cursor: pointer; }
    .interactive:hover rect, .interactive:focus-visible rect { stroke-width: 2.5; }
  </style>
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <!-- Paper background -->
  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- Header strip -->
  <text x="60" y="62" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.05em">SCHEMA 01</text>
  <text x="60" y="100" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">A Taxonomy of LLM &amp; Agent Jailbreaks</text>
  <text x="60" y="128" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Four orthogonal axes that determine attack mechanics — and which defenses apply.</text>
  <line x1="60" y1="148" x2="840" y2="148" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Central object: jailbreak -->
  <g>
    <circle cx="450" cy="475" r="58" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="2"/>
    <text x="450" y="468" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">JAILBREAK</text>
    <text x="450" y="486" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle" font-style="italic">aligned model →</text>
    <text x="450" y="500" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle" font-style="italic">prohibited output</text>
  </g>

  <!-- Axis 1: TOP — Attacker Access -->
  <g class="interactive" data-card="axis-access" tabindex="0" role="button" aria-label="Axis 1 — Attacker Access">
    <text x="450" y="200" class="display" font-size="13" font-weight="600" fill="#B7332C" text-anchor="middle" letter-spacing="0.02em">AXIS 1 — ATTACKER ACCESS</text>
    <line x1="450" y1="215" x2="450" y2="412" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow1)"/>

    <rect x="225" y="225" width="140" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="295" y="248" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Black-box</text>
    <text x="295" y="266" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">API only · PAIR, BoN</text>

    <rect x="385" y="225" width="130" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="450" y="248" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Gray-box</text>
    <text x="450" y="266" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Logits · TAP</text>

    <rect x="535" y="225" width="140" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="605" y="248" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">White-box</text>
    <text x="605" y="266" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Weights · GCG, AutoDAN</text>
  </g>

  <!-- Axis 2: LEFT — Optimization vs. Crafted -->
  <g class="interactive" data-card="axis-optimization" tabindex="0" role="button" aria-label="Axis 2 — Optimization vs Crafted">
    <text x="155" y="475" class="display" font-size="13" font-weight="600" fill="#1F5560" text-anchor="middle" letter-spacing="0.02em" transform="rotate(-90, 155, 475)">AXIS 2 — TOKEN VS PROMPT LEVEL</text>
    <line x1="245" y1="475" x2="388" y2="475" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow1)"/>

    <rect x="50" y="380" width="155" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="127" y="403" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Token-level</text>
    <text x="127" y="421" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Adv. suffixes · GCG</text>

    <rect x="50" y="445" width="155" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="127" y="468" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Semantic prompt</text>
    <text x="127" y="486" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Persona · DAN, AIM</text>

    <rect x="50" y="510" width="155" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="127" y="533" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Iterative refinement</text>
    <text x="127" y="551" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">PAIR · TAP · AutoInject</text>
  </g>

  <!-- Axis 3: BOTTOM — Single-turn vs Multi-turn -->
  <g class="interactive" data-card="axis-turns" tabindex="0" role="button" aria-label="Axis 3 — Single-turn vs Multi-turn">
    <text x="450" y="745" class="display" font-size="13" font-weight="600" fill="#B58A2C" text-anchor="middle" letter-spacing="0.02em">AXIS 3 — TEMPORAL STRUCTURE</text>
    <line x1="450" y1="538" x2="450" y2="730" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow1)"/>

    <rect x="240" y="755" width="135" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="307" y="778" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Single-turn</text>
    <text x="307" y="796" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">DAN · GCG · MSJ</text>

    <rect x="395" y="755" width="135" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="462" y="778" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Multi-turn</text>
    <text x="462" y="796" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Crescendo · Skeleton Key</text>

    <rect x="550" y="755" width="135" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="617" y="778" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Persistent</text>
    <text x="617" y="796" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">MINJA · MemoryGraft</text>
  </g>

  <!-- Axis 4: RIGHT — Modality -->
  <g class="interactive" data-card="axis-modality" tabindex="0" role="button" aria-label="Axis 4 — Modality and channel">
    <text x="745" y="475" class="display" font-size="13" font-weight="600" fill="#2F5D3F" text-anchor="middle" letter-spacing="0.02em" transform="rotate(90, 745, 475)">AXIS 4 — MODALITY &amp; CHANNEL</text>

    <line x1="513" y1="475" x2="655" y2="475" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow1)"/>

    <rect x="675" y="380" width="155" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="752" y="403" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Text · Direct</text>
    <text x="752" y="421" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">User → model</text>

    <rect x="675" y="445" width="155" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="752" y="468" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Text · Indirect</text>
    <text x="752" y="486" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">RAG · email · MCP</text>

    <rect x="675" y="510" width="155" height="56" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="752" y="533" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Multimodal</text>
    <text x="752" y="551" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">Image · audio · cipher</text>
  </g>

  <!-- Cross-cutting note -->
  <g class="interactive" data-card="cross-cutting" tabindex="0" role="button" aria-label="Cross-cutting principle">
    <rect x="60" y="640" width="780" height="58" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="450" y="664" class="body" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle" letter-spacing="0.02em">CROSS-CUTTING PRINCIPLE</text>
    <text x="450" y="682" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle" font-style="italic">Defenses do not generalize across cells. A perplexity filter for GCG suffixes does nothing against PAIR's natural-language refinement.</text>
  </g>

  <!-- Footer strip -->
  <line x1="60" y1="838" x2="840" y2="838" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="858" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Source: Adapted from Mao et al. (arXiv:2506.15170), Wei et al. survey TechRxiv 2026, Chu et al. JailbreakRadar.</text>
  <text x="60" y="874" class="body" font-size="10" font-style="italic" fill="#5A5A5A" letter-spacing="0.02em">Methodology: only attack families with peer-reviewed or industry red-team disclosure are included; non-academic forum prompts excluded.</text>
</svg>
