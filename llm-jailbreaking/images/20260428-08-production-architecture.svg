<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, system-ui, sans-serif">
  <style>
    .display { font-family: 'Spectral', Georgia, serif; }
    .body    { font-family: 'Inter', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', monospace; }
    .interactive { cursor: pointer; }
    .interactive:hover rect, .interactive:focus-visible rect { stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrow8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrow8r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="11" font-weight="600" fill="#B7332C" letter-spacing="0.05em">SCHEMA 08</text>
  <text x="60" y="96" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">A reference production architecture</text>
  <text x="60" y="124" class="display" font-size="15" font-style="italic" fill="#5A5A5A">Trust boundaries, channel separation, capability gates, and the observability spine that makes the rest auditable.</text>
  <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Trust zone labels (top band) -->
  <text x="180" y="178" class="mono" font-size="9" font-weight="600" fill="#5A5A5A" text-anchor="middle" letter-spacing="0.05em">UNTRUSTED · USER</text>
  <text x="430" y="178" class="mono" font-size="9" font-weight="600" fill="#B7332C" text-anchor="middle" letter-spacing="0.05em">UNTRUSTED · DATA</text>
  <text x="690" y="178" class="mono" font-size="9" font-weight="600" fill="#1F5560" text-anchor="middle" letter-spacing="0.05em">SEMI-TRUSTED · MODEL</text>
  <text x="940" y="178" class="mono" font-size="9" font-weight="600" fill="#1A1A1A" text-anchor="middle" letter-spacing="0.05em">TRUSTED · ACTIONS</text>

  <!-- Top stack (left to right) -->

  <!-- 1. User input -->
  <g class="interactive" data-card="prod-user" tabindex="0" role="button" aria-label="User input zone">
    <rect x="80" y="195" width="200" height="100" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="100" y="218" class="display" font-size="13" font-weight="600" fill="#1A1A1A">User input</text>
    <text x="100" y="237" class="body" font-size="10" fill="#5A5A5A">Web UI, API, IDE, mobile</text>
    <line x1="100" y1="248" x2="260" y2="248" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="100" y="263" class="mono" font-size="9" fill="#1A1A1A">▸ rate limit / per-user</text>
    <text x="100" y="277" class="mono" font-size="9" fill="#1A1A1A">▸ auth + session id</text>
    <text x="100" y="291" class="mono" font-size="9" fill="#1A1A1A">▸ prompt-injection detector</text>
  </g>

  <!-- 2. Untrusted data ingestion (RAG, tools) -->
  <g class="interactive" data-card="prod-data" tabindex="0" role="button" aria-label="Untrusted data ingestion">
    <rect x="320" y="195" width="220" height="100" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1.5"/>
    <text x="340" y="218" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Untrusted data</text>
    <text x="340" y="237" class="body" font-size="10" fill="#5A5A5A">RAG · email · web · tickets · MCP</text>
    <line x1="340" y1="248" x2="520" y2="248" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="340" y="263" class="mono" font-size="9" fill="#1A1A1A">▸ source provenance tags</text>
    <text x="340" y="277" class="mono" font-size="9" fill="#1A1A1A">▸ Spotlighting / encoding</text>
    <text x="340" y="291" class="mono" font-size="9" fill="#1A1A1A">▸ MCP allowlist + pin hash</text>
  </g>

  <!-- 3. Pre-LLM guard -->
  <g class="interactive" data-card="prod-pre-guard" tabindex="0" role="button" aria-label="Pre-LLM guard">
    <rect x="580" y="195" width="200" height="100" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.25"/>
    <text x="600" y="218" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Pre-LLM guard</text>
    <text x="600" y="237" class="body" font-size="10" fill="#5A5A5A">Llama Guard / Constitutional</text>
    <line x1="600" y1="248" x2="760" y2="248" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="600" y="263" class="mono" font-size="9" fill="#1A1A1A">▸ injection classifier</text>
    <text x="600" y="277" class="mono" font-size="9" fill="#1A1A1A">▸ harm category scoring</text>
    <text x="600" y="291" class="mono" font-size="9" fill="#1A1A1A">▸ hard-block + soft-flag</text>
  </g>

  <!-- 4. Model -->
  <g class="interactive" data-card="prod-model" tabindex="0" role="button" aria-label="Model runtime">
    <rect x="820" y="195" width="200" height="100" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.5"/>
    <text x="840" y="218" class="display" font-size="13" font-weight="600" fill="#1A1A1A">LLM runtime</text>
    <text x="840" y="237" class="body" font-size="10" fill="#5A5A5A">Frontier model + system prompt</text>
    <line x1="840" y1="248" x2="1000" y2="248" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="840" y="263" class="mono" font-size="9" fill="#1A1A1A">▸ instruction hierarchy</text>
    <text x="840" y="277" class="mono" font-size="9" fill="#1A1A1A">▸ refusal taxonomy</text>
    <text x="840" y="291" class="mono" font-size="9" fill="#1A1A1A">▸ tool schemas (typed)</text>
  </g>

  <!-- 5. Post-LLM filter -->
  <g class="interactive" data-card="prod-post" tabindex="0" role="button" aria-label="Post-LLM filter">
    <rect x="1050" y="195" width="90" height="100" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.25"/>
    <text x="1095" y="218" class="display" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Output</text>
    <text x="1095" y="232" class="display" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">filter</text>
    <text x="1095" y="252" class="body" font-size="9" fill="#5A5A5A" text-anchor="middle">DLP</text>
    <text x="1095" y="266" class="body" font-size="9" fill="#5A5A5A" text-anchor="middle">md sanitize</text>
    <text x="1095" y="280" class="body" font-size="9" fill="#5A5A5A" text-anchor="middle">refusal check</text>
  </g>

  <!-- Flow arrows top stack -->
  <line x1="280" y1="245" x2="318" y2="245" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow8)"/>
  <line x1="540" y1="245" x2="578" y2="245" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow8)"/>
  <line x1="780" y1="245" x2="818" y2="245" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow8)"/>
  <line x1="1020" y1="245" x2="1048" y2="245" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow8)"/>

  <!-- Tool execution layer (middle band) -->
  <text x="60" y="335" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" letter-spacing="0.05em">CAPABILITY-GATED EXECUTION</text>
  <line x1="60" y1="345" x2="1140" y2="345" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Action gateway -->
  <g class="interactive" data-card="prod-gateway" tabindex="0" role="button" aria-label="Action gateway with capability tokens">
    <rect x="80" y="365" width="500" height="120" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="100" y="390" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Action gateway · capability tokens</text>
    <text x="100" y="408" class="body" font-size="10" fill="#5A5A5A">CaMeL-style: model proposes, gateway authorizes against typed policy</text>
    <line x1="100" y1="420" x2="560" y2="420" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="100" y="437" class="mono" font-size="10" fill="#1A1A1A">▸ tool: send_email(to, subject, body) — require token: write:email</text>
    <text x="100" y="453" class="mono" font-size="10" fill="#1A1A1A">▸ tool: transfer_funds(...)         — HITL confirmation REQUIRED</text>
    <text x="100" y="469" class="mono" font-size="10" fill="#1A1A1A">▸ tool: exec_shell(...)              — disabled by default; canary if used</text>
  </g>

  <!-- HITL queue -->
  <g class="interactive" data-card="prod-hitl" tabindex="0" role="button" aria-label="Human-in-the-loop queue">
    <rect x="620" y="365" width="240" height="120" rx="3" fill="#F2EFE7" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="640" y="390" class="display" font-size="13" font-weight="600" fill="#1A1A1A">HITL queue</text>
    <text x="640" y="408" class="body" font-size="10" fill="#5A5A5A">High-impact actions require approval</text>
    <line x1="640" y1="420" x2="840" y2="420" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="640" y="437" class="mono" font-size="9" fill="#1A1A1A">▸ external email send</text>
    <text x="640" y="451" class="mono" font-size="9" fill="#1A1A1A">▸ funds movement / writes</text>
    <text x="640" y="465" class="mono" font-size="9" fill="#1A1A1A">▸ data egress &gt; threshold</text>
    <text x="640" y="479" class="mono" font-size="9" fill="#1A1A1A">▸ irreversible actions</text>
  </g>

  <!-- Sandbox -->
  <g class="interactive" data-card="prod-sandbox" tabindex="0" role="button" aria-label="Per-request sandbox">
    <rect x="900" y="365" width="240" height="120" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.5"/>
    <text x="920" y="390" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Per-request sandbox</text>
    <text x="920" y="408" class="body" font-size="10" fill="#5A5A5A">Ephemeral, network-restricted</text>
    <line x1="920" y1="420" x2="1120" y2="420" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="920" y="437" class="mono" font-size="9" fill="#1A1A1A">▸ allowlisted egress only</text>
    <text x="920" y="451" class="mono" font-size="9" fill="#1A1A1A">▸ FS RO except /tmp scoped</text>
    <text x="920" y="465" class="mono" font-size="9" fill="#1A1A1A">▸ memory: per-session, signed</text>
    <text x="920" y="479" class="mono" font-size="9" fill="#1A1A1A">▸ TTL on long-lived state</text>
  </g>

  <!-- Arrows model→gateway -->
  <line x1="920" y1="295" x2="600" y2="365" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow8)"/>
  <line x1="580" y1="425" x2="618" y2="425" stroke="#B58A2C" stroke-width="1" marker-end="url(#arrow8r)"/>
  <line x1="580" y1="445" x2="898" y2="425" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow8)"/>

  <!-- Observability spine (bottom band) -->
  <text x="60" y="525" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" letter-spacing="0.05em">OBSERVABILITY · GROUND TRUTH FOR DEBUGGING AND IR</text>
  <line x1="60" y1="535" x2="1140" y2="535" stroke="#E5E1D8" stroke-width="0.5"/>

  <g class="interactive" data-card="prod-obs-traces" tabindex="0" role="button" aria-label="OpenTelemetry traces">
    <rect x="80" y="555" width="240" height="100" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="100" y="578" class="display" font-size="13" font-weight="600" fill="#1A1A1A">OTel GenAI traces</text>
    <text x="100" y="596" class="body" font-size="10" fill="#5A5A5A">prompts, tools, decisions</text>
    <line x1="100" y1="608" x2="300" y2="608" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="100" y="624" class="mono" font-size="9" fill="#1A1A1A">▸ system + user + tool calls</text>
    <text x="100" y="638" class="mono" font-size="9" fill="#1A1A1A">▸ provenance chain per token</text>
  </g>

  <g class="interactive" data-card="prod-obs-classifier" tabindex="0" role="button" aria-label="Classifier scores logged">
    <rect x="350" y="555" width="240" height="100" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="370" y="578" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Classifier scores</text>
    <text x="370" y="596" class="body" font-size="10" fill="#5A5A5A">all gates, every request</text>
    <line x1="370" y1="608" x2="570" y2="608" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="370" y="624" class="mono" font-size="9" fill="#1A1A1A">▸ pre/post + harm category</text>
    <text x="370" y="638" class="mono" font-size="9" fill="#1A1A1A">▸ false-pos labels feed back</text>
  </g>

  <g class="interactive" data-card="prod-obs-canary" tabindex="0" role="button" aria-label="Canary prompts and red team">
    <rect x="620" y="555" width="240" height="100" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="640" y="578" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Canaries + red-team CI</text>
    <text x="640" y="596" class="body" font-size="10" fill="#5A5A5A">continuous adversarial eval</text>
    <line x1="640" y1="608" x2="840" y2="608" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="640" y="624" class="mono" font-size="9" fill="#1A1A1A">▸ HarmBench / AgentDojo runs</text>
    <text x="640" y="638" class="mono" font-size="9" fill="#1A1A1A">▸ model upgrade → re-eval gate</text>
  </g>

  <g class="interactive" data-card="prod-obs-ir" tabindex="0" role="button" aria-label="Incident response and replay">
    <rect x="890" y="555" width="240" height="100" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1.25"/>
    <text x="910" y="578" class="display" font-size="13" font-weight="600" fill="#1A1A1A">IR &amp; replay</text>
    <text x="910" y="596" class="body" font-size="10" fill="#5A5A5A">contain, study, patch</text>
    <line x1="910" y1="608" x2="1110" y2="608" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="910" y="624" class="mono" font-size="9" fill="#1A1A1A">▸ deterministic replay seed</text>
    <text x="910" y="638" class="mono" font-size="9" fill="#1A1A1A">▸ kill-switch per tool / user</text>
  </g>

  <!-- Bottom note -->
  <g>
    <rect x="60" y="690" width="1080" height="60" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="80" y="713" class="display" font-size="13" font-weight="600" fill="#B7332C">Architectural principles</text>
    <text x="80" y="731" class="body" font-size="10" fill="#1A1A1A">① Treat every channel that isn't the authenticated user as untrusted. ② The model proposes, the gateway authorizes — never the reverse.</text>
    <text x="80" y="745" class="body" font-size="10" fill="#1A1A1A">③ Capability tokens, not prompt rules, gate side-effects. ④ Observe everything; a jailbreak you can't replay is a jailbreak you can't fix.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="775" x2="1140" y2="775" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="790" class="body" font-size="9" font-style="italic" fill="#5A5A5A">Synthesis of: NIST AI RMF GenAI Profile (2024); OWASP Top 10 LLM 2025 (LLM06, LLM07, LLM08); CaMeL (Debenedetti et al. 2025); Anthropic Responsible Scaling Policy (2024–2026).</text>
</svg>
