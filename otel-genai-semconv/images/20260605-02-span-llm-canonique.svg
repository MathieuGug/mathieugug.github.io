<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow02" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1A1A1A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le span LLM canonique <tspan class="mono" font-size="20">gen_ai.client.chat</tspan></text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Cinq étapes d'un appel synchrone, leurs attributs et leurs événements OTel</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Timeline rail -->
  <line x1="120" y1="280" x2="1080" y2="280" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arrow02)"/>
  <text x="60" y="284" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">TEMPS →</text>
  <text x="1110" y="284" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">t</text>

  <!-- Step 1: span start -->
  <g class="interactive" data-card="span-start" tabindex="0" role="button" aria-label="Étape span start">
    <circle cx="200" cy="280" r="12" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <text x="200" y="285" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">1</text>
    <rect x="120" y="320" width="160" height="170" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="200" y="343" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B7332C" text-anchor="middle">SPAN START</text>
    <text x="200" y="362" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Ouverture du span</text>
    <line x1="135" y1="378" x2="265" y2="378" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="200" y="397" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">name = chat &lt;model&gt;</text>
    <text x="200" y="412" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">kind = CLIENT</text>
    <text x="200" y="427" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">gen_ai.system</text>
    <text x="200" y="442" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">gen_ai.operation.name</text>
    <text x="200" y="465" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">SDK auto-instrumenté</text>
    <text x="200" y="478" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">démarre le chrono</text>
  </g>

  <!-- Step 2: request emitted -->
  <g class="interactive" data-card="request-emit" tabindex="0" role="button" aria-label="Étape requête émise">
    <circle cx="395" cy="280" r="12" fill="#FAF8F3" stroke="#1F5560" stroke-width="2"/>
    <text x="395" y="285" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">2</text>
    <rect x="315" y="320" width="160" height="170" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="395" y="343" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1F5560" text-anchor="middle">REQUEST</text>
    <text x="395" y="362" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Attributs côté demande</text>
    <line x1="330" y1="378" x2="460" y2="378" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="395" y="397" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">request.model</text>
    <text x="395" y="412" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">request.temperature</text>
    <text x="395" y="427" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">request.max_tokens</text>
    <text x="395" y="442" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">request.top_p</text>
    <text x="395" y="465" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">Événement optionnel</text>
    <text x="395" y="478" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">gen_ai.user.message</text>
  </g>

  <!-- Step 3: streaming / time-to-first-token -->
  <g class="interactive" data-card="ttft" tabindex="0" role="button" aria-label="Étape time to first token">
    <circle cx="590" cy="280" r="12" fill="#FAF8F3" stroke="#B58A2C" stroke-width="2"/>
    <text x="590" y="285" class="mono" font-size="11" font-weight="600" fill="#B58A2C" text-anchor="middle">3</text>
    <rect x="510" y="320" width="160" height="170" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="590" y="343" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B58A2C" text-anchor="middle">TTFT</text>
    <text x="590" y="362" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Premier token reçu</text>
    <line x1="525" y1="378" x2="655" y2="378" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="590" y="397" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">client.time_to_</text>
    <text x="590" y="409" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">first_token</text>
    <text x="590" y="427" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">métrique séparée</text>
    <text x="590" y="453" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">Critique pour UX</text>
    <text x="590" y="466" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">streaming — éviter</text>
    <text x="590" y="479" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">le piège duration=AR HTTP</text>
  </g>

  <!-- Step 4: response -->
  <g class="interactive" data-card="response-end" tabindex="0" role="button" aria-label="Étape réponse complète">
    <circle cx="785" cy="280" r="12" fill="#FAF8F3" stroke="#1F5560" stroke-width="2"/>
    <text x="785" y="285" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">4</text>
    <rect x="705" y="320" width="160" height="170" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="785" y="343" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1F5560" text-anchor="middle">RESPONSE</text>
    <text x="785" y="362" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Attributs côté réponse</text>
    <line x1="720" y1="378" x2="850" y2="378" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="785" y="397" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">response.id</text>
    <text x="785" y="412" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">response.model</text>
    <text x="785" y="427" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">response.finish_reasons</text>
    <text x="785" y="442" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">usage.input_tokens</text>
    <text x="785" y="457" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">usage.output_tokens</text>
    <text x="785" y="478" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">gen_ai.assistant.message</text>
  </g>

  <!-- Step 5: span end -->
  <g class="interactive" data-card="span-end" tabindex="0" role="button" aria-label="Étape span end">
    <circle cx="980" cy="280" r="12" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <text x="980" y="285" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">5</text>
    <rect x="900" y="320" width="160" height="170" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="980" y="343" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B7332C" text-anchor="middle">SPAN END</text>
    <text x="980" y="362" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Fermeture &amp; export</text>
    <line x1="915" y1="378" x2="1045" y2="378" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="980" y="397" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">duration =</text>
    <text x="980" y="409" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">end - start</text>
    <text x="980" y="427" class="mono" font-size="9" fill="#1A1A1A" text-anchor="middle">status.code</text>
    <text x="980" y="453" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">Export OTLP →</text>
    <text x="980" y="466" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">collector → backend</text>
    <text x="980" y="479" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">(Honeycomb, Datadog…)</text>
  </g>

  <!-- Metric pipe below -->
  <line x1="120" y1="565" x2="1080" y2="565" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="600" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">MÉTRIQUES SYSTÉMATIQUES (HISTOGRAMMES)</text>

  <g>
    <rect x="60" y="615" width="500" height="48" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="80" y="638" class="mono" font-size="11" font-weight="500" fill="#1A1A1A">gen_ai.client.operation.duration</text>
    <text x="80" y="655" class="body" font-size="10" font-style="italic" fill="#5A5A5A">bucketé par gen_ai.system × gen_ai.request.model × gen_ai.operation.name</text>
  </g>
  <g>
    <rect x="580" y="615" width="500" height="48" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="600" y="638" class="mono" font-size="11" font-weight="500" fill="#1A1A1A">gen_ai.client.token.usage</text>
    <text x="600" y="655" class="body" font-size="10" font-style="italic" fill="#5A5A5A">bucketé par gen_ai.token.type = input | output</text>
  </g>

  <!-- The streaming pitfall callout -->
  <rect x="60" y="690" width="1080" height="40" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="0.75"/>
  <text x="78" y="714" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600" fill="#B7332C">Piège streaming :</tspan> duration = time-to-last-token, pas time-to-HTTP-roundtrip. Mesurer time_to_first_token séparément pour ne pas masquer la latence ressentie.</text>

  <!-- Footer -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="772" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : OpenTelemetry Semantic Conventions, gen_ai.client.chat span spec (mai 2026). Honeycomb 2024 pour le retex streaming.</text>
</svg>
