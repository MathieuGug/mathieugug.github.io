<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Anatomie du namespace <tspan class="mono" font-size="22">gen_ai.*</tspan></text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Six familles d'attributs, trois statuts de maturité — la grammaire OpenTelemetry pour les systèmes génératifs</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Root node -->
  <g>
    <rect x="540" y="180" width="120" height="46" rx="3" fill="#1A1A1A"/>
    <text x="600" y="201" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#FAF8F3" text-anchor="middle">NAMESPACE</text>
    <text x="600" y="219" class="mono" font-size="14" font-weight="500" fill="#FAF8F3" text-anchor="middle">gen_ai.*</text>
  </g>

  <!-- Trunk lines descending to 6 branches -->
  <line x1="600" y1="226" x2="600" y2="270" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="155" y1="270" x2="1045" y2="270" stroke="#5A5A5A" stroke-width="1.25"/>

  <!-- 6 vertical drops -->
  <line x1="155" y1="270" x2="155" y2="295" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="333" y1="270" x2="333" y2="295" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="511" y1="270" x2="511" y2="295" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="689" y1="270" x2="689" y2="295" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="867" y1="270" x2="867" y2="295" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="1045" y1="270" x2="1045" y2="295" stroke="#5A5A5A" stroke-width="1.25"/>

  <!-- Branch 1: request -->
  <g class="interactive" data-card="request" tabindex="0" role="button" aria-label="Famille gen_ai.request">
    <rect x="80" y="295" width="150" height="180" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="155" y="319" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1F5560" text-anchor="middle">REQUEST</text>
    <text x="155" y="343" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Côté demande</text>
    <line x1="100" y1="356" x2="210" y2="356" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="155" y="375" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.model</text>
    <text x="155" y="390" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.temperature</text>
    <text x="155" y="405" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.max_tokens</text>
    <text x="155" y="420" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.top_p</text>
    <text x="155" y="435" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.stop_sequences</text>
    <rect x="115" y="450" width="80" height="16" rx="2" fill="#1F5560"/>
    <text x="155" y="461" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">STABLE</text>
  </g>

  <!-- Branch 2: response -->
  <g class="interactive" data-card="response" tabindex="0" role="button" aria-label="Famille gen_ai.response">
    <rect x="258" y="295" width="150" height="180" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="333" y="319" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1F5560" text-anchor="middle">RESPONSE</text>
    <text x="333" y="343" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Côté réponse</text>
    <line x1="278" y1="356" x2="388" y2="356" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="333" y="375" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.id</text>
    <text x="333" y="390" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.model</text>
    <text x="333" y="405" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.finish_reasons</text>
    <text x="333" y="420" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.choices_count</text>
    <text x="333" y="435" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.system_fingerprint</text>
    <rect x="293" y="450" width="80" height="16" rx="2" fill="#1F5560"/>
    <text x="333" y="461" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">STABLE</text>
  </g>

  <!-- Branch 3: usage -->
  <g class="interactive" data-card="usage" tabindex="0" role="button" aria-label="Famille gen_ai.usage">
    <rect x="436" y="295" width="150" height="180" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="511" y="319" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1F5560" text-anchor="middle">USAGE</text>
    <text x="511" y="343" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Comptage tokens</text>
    <line x1="456" y1="356" x2="566" y2="356" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="511" y="375" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.input_tokens</text>
    <text x="511" y="390" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.output_tokens</text>
    <text x="511" y="405" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.total_tokens</text>
    <text x="511" y="420" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.cached_tokens</text>
    <text x="511" y="435" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.cost (optionnel)</text>
    <rect x="471" y="450" width="80" height="16" rx="2" fill="#1F5560"/>
    <text x="511" y="461" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">STABLE</text>
  </g>

  <!-- Branch 4: agent -->
  <g class="interactive" data-card="agent" tabindex="0" role="button" aria-label="Famille gen_ai.agent">
    <rect x="614" y="295" width="150" height="180" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="689" y="319" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B58A2C" text-anchor="middle">AGENT</text>
    <text x="689" y="343" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Boucle agent</text>
    <line x1="634" y1="356" x2="744" y2="356" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="689" y="375" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.id</text>
    <text x="689" y="390" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.name</text>
    <text x="689" y="405" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.type</text>
    <text x="689" y="420" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.description</text>
    <text x="689" y="435" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.tool_calls[]</text>
    <rect x="649" y="450" width="80" height="16" rx="2" fill="#B58A2C"/>
    <text x="689" y="461" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">RELEASE CAND.</text>
  </g>

  <!-- Branch 5: evaluation -->
  <g class="interactive" data-card="evaluation" tabindex="0" role="button" aria-label="Famille gen_ai.evaluation">
    <rect x="792" y="295" width="150" height="180" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="867" y="319" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B58A2C" text-anchor="middle">EVALUATION</text>
    <text x="867" y="343" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Éval comme span</text>
    <line x1="812" y1="356" x2="922" y2="356" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="867" y="375" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.name</text>
    <text x="867" y="390" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.score</text>
    <text x="867" y="405" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.threshold</text>
    <text x="867" y="420" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.passed</text>
    <text x="867" y="435" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.judge.model</text>
    <rect x="827" y="450" width="80" height="16" rx="2" fill="#B58A2C"/>
    <text x="867" y="461" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">RELEASE CAND.</text>
  </g>

  <!-- Branch 6: compaction -->
  <g class="interactive" data-card="compaction" tabindex="0" role="button" aria-label="Famille gen_ai.compaction">
    <rect x="970" y="295" width="150" height="180" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="1045" y="319" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C" text-anchor="middle">COMPACTION</text>
    <text x="1045" y="343" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">Ledger résumé</text>
    <line x1="990" y1="356" x2="1100" y2="356" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="1045" y="375" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.operation</text>
    <text x="1045" y="390" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.strategy.name</text>
    <text x="1045" y="405" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.ratio</text>
    <text x="1045" y="420" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.retained_segments</text>
    <text x="1045" y="435" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">.judge.score</text>
    <rect x="1005" y="450" width="80" height="16" rx="2" fill="#B7332C"/>
    <text x="1045" y="461" class="mono" font-size="9" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3" text-anchor="middle">DRAFT</text>
  </g>

  <!-- Spans cross-cutting layer -->
  <line x1="60" y1="520" x2="1140" y2="520" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="548" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">SPANS &amp; MÉTRIQUES — ÉMETTEURS PAR LA CONVENTION</text>

  <g>
    <rect x="60" y="568" width="240" height="42" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <text x="180" y="584" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">gen_ai.client.chat</text>
    <text x="180" y="600" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">span CLIENT — appel LLM synchrone</text>
  </g>
  <g>
    <rect x="320" y="568" width="240" height="42" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <text x="440" y="584" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">gen_ai.agent.invocation</text>
    <text x="440" y="600" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">span racine — boucle agent</text>
  </g>
  <g>
    <rect x="580" y="568" width="240" height="42" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <text x="700" y="584" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">gen_ai.tool.execution</text>
    <text x="700" y="600" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">span enfant — outil invoqué</text>
  </g>
  <g>
    <rect x="840" y="568" width="240" height="42" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1"/>
    <text x="960" y="584" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">gen_ai.compaction.execution</text>
    <text x="960" y="600" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">span CLIENT — résumé (draft)</text>
  </g>

  <text x="60" y="640" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">MÉTRIQUES HISTOGRAMME</text>
  <g>
    <rect x="60" y="658" width="500" height="34" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="0.75"/>
    <text x="80" y="680" class="mono" font-size="10" fill="#1F5560">gen_ai.client.operation.duration</text>
    <text x="345" y="680" class="body" font-size="9" font-style="italic" fill="#5A5A5A">par system × model × operation</text>
  </g>
  <g>
    <rect x="580" y="658" width="500" height="34" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="0.75"/>
    <text x="600" y="680" class="mono" font-size="10" fill="#1F5560">gen_ai.client.token.usage</text>
    <text x="855" y="680" class="body" font-size="9" font-style="italic" fill="#5A5A5A">par type=input | output</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="755" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : OpenTelemetry Semantic Conventions for Generative AI (model/gen-ai/), version mai 2026.</text>
  <text x="60" y="772" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : seules les trois familles encadrées en teal sont scellées en stable. Les trois autres restent en cours d'itération SIG.</text>
</svg>
