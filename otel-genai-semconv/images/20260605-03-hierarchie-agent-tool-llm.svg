<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Hiérarchie agent → outil → LLM</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">L'arbre de spans canonique d'une boucle agent OTel — release candidate mars 2026</text>
  <line x1="60" y1="140" x2="840" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Agent root span -->
  <g class="interactive" data-card="agent-root" tabindex="0" role="button" aria-label="Span racine agent.invocation">
    <rect x="60" y="180" width="780" height="56" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="2"/>
    <text x="80" y="206" class="mono" font-size="13" font-weight="600" fill="#B58A2C">gen_ai.agent.invocation</text>
    <text x="80" y="225" class="body" font-size="11" font-style="italic" fill="#1A1A1A">name=&quot;researcher&quot; · type=&quot;tool_using&quot; · duration = end-to-end boucle</text>
    <text x="820" y="212" class="mono" font-size="11" fill="#1A1A1A" text-anchor="end">1240 ms</text>
    <text x="820" y="228" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">3 children</text>
  </g>

  <!-- Vertical guide -->
  <line x1="100" y1="246" x2="100" y2="780" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="1 3"/>

  <!-- Child 1: first LLM chat (planning) -->
  <g class="interactive" data-card="chat-1" tabindex="0" role="button" aria-label="Premier appel LLM — planning">
    <rect x="130" y="270" width="600" height="50" rx="3" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.5"/>
    <text x="148" y="293" class="mono" font-size="11" font-weight="600" fill="#1F5560">gen_ai.client.chat claude-sonnet-4-6</text>
    <text x="148" y="310" class="body" font-size="10" font-style="italic" fill="#5A5A5A">1ᵉʳ tour — planification, demande tool_calls : [read_file, search_docs]</text>
    <text x="720" y="298" class="mono" font-size="10" fill="#1A1A1A" text-anchor="end">320 ms</text>
  </g>
  <line x1="100" y1="295" x2="130" y2="295" stroke="#B8B5AE" stroke-width="0.5"/>
  <text x="745" y="285" class="mono" font-size="9" fill="#5A5A5A">attrs:</text>
  <text x="745" y="298" class="mono" font-size="8" fill="#5A5A5A">request.model</text>
  <text x="745" y="310" class="mono" font-size="8" fill="#5A5A5A">usage.*_tokens</text>

  <!-- Child 2: tool execution read_file -->
  <g class="interactive" data-card="tool-read" tabindex="0" role="button" aria-label="Outil read_file">
    <rect x="170" y="360" width="320" height="44" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="188" y="380" class="mono" font-size="10" font-weight="600" fill="#B7332C">gen_ai.tool.execution</text>
    <text x="188" y="395" class="body" font-size="9" font-style="italic" fill="#5A5A5A">name=&quot;read_file&quot; · type=&quot;function&quot; · call_id=tool_12</text>
    <text x="478" y="386" class="mono" font-size="9" fill="#1A1A1A" text-anchor="end">12 ms</text>
  </g>
  <line x1="140" y1="382" x2="170" y2="382" stroke="#B8B5AE" stroke-width="0.5"/>
  <text x="170" y="346" class="mono" font-size="8" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">PARALLEL TOOLS — DEMANDÉS DANS CHAT 1</text>

  <!-- Child 3: tool execution search_docs -->
  <g class="interactive" data-card="tool-search" tabindex="0" role="button" aria-label="Outil search_docs">
    <rect x="510" y="360" width="320" height="44" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="528" y="380" class="mono" font-size="10" font-weight="600" fill="#B7332C">gen_ai.tool.execution</text>
    <text x="528" y="395" class="body" font-size="9" font-style="italic" fill="#5A5A5A">name=&quot;search_docs&quot; · type=&quot;retrieval&quot; · call_id=tool_13</text>
    <text x="818" y="386" class="mono" font-size="9" fill="#1A1A1A" text-anchor="end">85 ms</text>
  </g>

  <!-- Child 4: second chat (after tools) -->
  <g class="interactive" data-card="chat-2" tabindex="0" role="button" aria-label="Second appel LLM après outils">
    <rect x="130" y="440" width="600" height="50" rx="3" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.5"/>
    <text x="148" y="463" class="mono" font-size="11" font-weight="600" fill="#1F5560">gen_ai.client.chat claude-sonnet-4-6</text>
    <text x="148" y="480" class="body" font-size="10" font-style="italic" fill="#5A5A5A">2ᵉ tour — réflexion après tool results, synthèse</text>
    <text x="720" y="468" class="mono" font-size="10" fill="#1A1A1A" text-anchor="end">580 ms</text>
  </g>
  <line x1="100" y1="465" x2="130" y2="465" stroke="#B8B5AE" stroke-width="0.5"/>

  <!-- Child 5: evaluation span -->
  <g>
    <rect x="170" y="525" width="560" height="44" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25" stroke-dasharray="3 2"/>
    <text x="188" y="545" class="mono" font-size="10" font-weight="600" fill="#B58A2C">gen_ai.evaluation</text>
    <text x="188" y="560" class="body" font-size="9" font-style="italic" fill="#5A5A5A">name=&quot;answer_relevance&quot; · score=0.87 · passed=true · judge.model=gpt-4o-mini</text>
    <text x="718" y="551" class="mono" font-size="9" fill="#1A1A1A" text-anchor="end">95 ms</text>
  </g>
  <line x1="100" y1="547" x2="170" y2="547" stroke="#B8B5AE" stroke-width="0.5"/>
  <text x="170" y="515" class="mono" font-size="8" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">ÉVAL ATTACHÉE — RC</text>

  <!-- Multi-agent escape zone -->
  <rect x="60" y="610" width="780" height="160" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#1A1A1A" stroke-width="0.75" stroke-dasharray="4 3"/>
  <text x="80" y="638" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1A1A1A">ANGLE MORT — MULTI-AGENT NON CONVENTIONNÉ (FIN 2026)</text>

  <g class="interactive" data-card="multi-agent-options" tabindex="0" role="button" aria-label="Trois options multi-agent">
    <rect x="78" y="650" width="240" height="105" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="92" y="671" class="mono" font-size="10" font-weight="600" fill="#1A1A1A">Option 1 — parent unique</text>
    <text x="92" y="688" class="body" font-size="9" fill="#5A5A5A">A reste root, B devient child.</text>
    <text x="92" y="702" class="body" font-size="9" fill="#5A5A5A">Simple mais ment sur la responsabilité.</text>
    <text x="92" y="725" class="body" font-size="9" font-style="italic" fill="#1A1A1A">Pratique : pattern par défaut</text>
    <text x="92" y="738" class="body" font-size="9" font-style="italic" fill="#1A1A1A">de la plupart des SDK.</text>
  </g>

  <g class="interactive" data-card="multi-agent-link" tabindex="0" role="button" aria-label="Option lien causal">
    <rect x="330" y="650" width="240" height="105" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="344" y="671" class="mono" font-size="10" font-weight="600" fill="#1A1A1A">Option 2 — span link OTel</text>
    <text x="344" y="688" class="body" font-size="9" fill="#5A5A5A">B = root indépendant, lié à A</text>
    <text x="344" y="702" class="body" font-size="9" fill="#5A5A5A">via attribut natif `link`.</text>
    <text x="344" y="725" class="body" font-size="9" font-style="italic" fill="#1A1A1A">Pratique : fidèle mais</text>
    <text x="344" y="738" class="body" font-size="9" font-style="italic" fill="#1A1A1A">UI APM rend mal les liens.</text>
  </g>

  <g class="interactive" data-card="multi-agent-parent" tabindex="0" role="button" aria-label="Option parent_id">
    <rect x="582" y="650" width="240" height="105" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="596" y="671" class="mono" font-size="10" font-weight="600" fill="#1A1A1A">Option 3 — agent.parent_id</text>
    <text x="596" y="688" class="body" font-size="9" fill="#5A5A5A">Attribut logique séparé,</text>
    <text x="596" y="702" class="body" font-size="9" fill="#5A5A5A">proposé par Microsoft avril 2026.</text>
    <text x="596" y="725" class="body" font-size="9" font-style="italic" fill="#1A1A1A">Pratique : non voté ;</text>
    <text x="596" y="738" class="body" font-size="9" font-style="italic" fill="#1A1A1A">attente convergence frameworks.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="810" x2="840" y2="810" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="836" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : OpenTelemetry Semantic Conventions, gen_ai.agent.invocation + gen_ai.tool.execution (RC mars 2026).</text>
  <text x="60" y="852" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : la hiérarchie mono-agent + outils est canonique. Le multi-agent (en bas) reste hors-convention.</text>
</svg>
