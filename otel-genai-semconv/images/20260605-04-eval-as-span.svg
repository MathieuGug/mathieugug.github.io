<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">L'éval comme span — bascule architecturale</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">De l'éval batch en sidecar à l'éval attachée au span jugé — convention <tspan class="mono" font-size="14">gen_ai.evaluation.*</tspan></text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LEFT side: LEGACY -->
  <text x="60" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.15em" fill="#5A5A5A">AVANT — ÉVAL EN SIDECAR (LEGACY)</text>
  <rect x="60" y="200" width="520" height="380" rx="3" fill="#5A5A5A" fill-opacity="0.05" stroke="#5A5A5A" stroke-width="0.75"/>

  <g class="interactive" data-card="legacy-side" tabindex="0" role="button" aria-label="Architecture éval legacy en sidecar">
    <!-- Production trace -->
    <rect x="80" y="225" width="220" height="100" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25"/>
    <text x="92" y="247" class="mono" font-size="10" font-weight="600" fill="#1F5560">Production trace</text>
    <text x="92" y="266" class="body" font-size="10" fill="#1A1A1A">chat → tool → chat</text>
    <text x="92" y="282" class="body" font-size="9" font-style="italic" fill="#5A5A5A">prompt + completion</text>
    <text x="92" y="298" class="body" font-size="9" font-style="italic" fill="#5A5A5A">stockés en logs séparés</text>
    <text x="92" y="316" class="mono" font-size="9" fill="#5A5A5A">→ APM (Honeycomb, DD…)</text>

    <!-- Export pipeline arrow -->
    <line x1="180" y1="345" x2="180" y2="395" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow04)"/>
    <text x="195" y="370" class="body" font-size="9" font-style="italic" fill="#5A5A5A">export batch nuit</text>

    <!-- Eval job -->
    <rect x="80" y="410" width="440" height="80" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="92" y="432" class="mono" font-size="10" font-weight="600" fill="#B58A2C">Job batch éval</text>
    <text x="92" y="452" class="body" font-size="10" fill="#1A1A1A">Rejouage prompts vs réf · BLEU, ROUGE, F1</text>
    <text x="92" y="467" class="body" font-size="9" font-style="italic" fill="#5A5A5A">tableau de bord séparé · pas de retour au span</text>
    <text x="92" y="481" class="body" font-size="9" font-style="italic" fill="#5A5A5A">latence corrélation = 24 h</text>

    <!-- Dashboard -->
    <rect x="80" y="510" width="440" height="50" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="0.75"/>
    <text x="92" y="532" class="mono" font-size="10" fill="#1A1A1A">Dashboard sidecar</text>
    <text x="92" y="549" class="body" font-size="9" font-style="italic" fill="#5A5A5A">Moyennes hebdo · pas de drill-down vers le span d'origine</text>
  </g>

  <!-- RIGHT side: NEW -->
  <text x="620" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.15em" fill="#B7332C">APRÈS — ÉVAL ATTACHÉE AU SPAN (RC)</text>
  <rect x="620" y="200" width="520" height="380" rx="3" fill="#B7332C" fill-opacity="0.04" stroke="#B7332C" stroke-width="1.25"/>

  <g class="interactive" data-card="new-side" tabindex="0" role="button" aria-label="Architecture éval-as-span">
    <!-- Single trace with eval child -->
    <rect x="640" y="225" width="480" height="44" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.5"/>
    <text x="652" y="246" class="mono" font-size="11" font-weight="600" fill="#1F5560">gen_ai.client.chat (span parent)</text>
    <text x="652" y="261" class="body" font-size="9" font-style="italic" fill="#5A5A5A">prompt envoyé · completion reçue</text>

    <!-- Eval children -->
    <line x1="680" y1="275" x2="680" y2="430" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="1 3"/>

    <rect x="700" y="285" width="400" height="34" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1"/>
    <line x1="680" y1="302" x2="700" y2="302" stroke="#B7332C" stroke-width="0.5"/>
    <text x="712" y="302" class="mono" font-size="9" font-weight="600" fill="#B7332C">gen_ai.evaluation</text>
    <text x="712" y="314" class="body" font-size="9" fill="#1A1A1A">name=&quot;hallucination_check&quot; · passed=true · score=0.92</text>

    <rect x="700" y="333" width="400" height="34" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1"/>
    <line x1="680" y1="350" x2="700" y2="350" stroke="#B7332C" stroke-width="0.5"/>
    <text x="712" y="350" class="mono" font-size="9" font-weight="600" fill="#B7332C">gen_ai.evaluation</text>
    <text x="712" y="362" class="body" font-size="9" fill="#1A1A1A">name=&quot;toxicity_check&quot; · passed=true · score=0.98</text>

    <rect x="700" y="381" width="400" height="34" rx="3" fill="#B7332C" fill-opacity="0.18" stroke="#B7332C" stroke-width="1.5"/>
    <line x1="680" y1="398" x2="700" y2="398" stroke="#B7332C" stroke-width="0.5"/>
    <text x="712" y="398" class="mono" font-size="9" font-weight="600" fill="#B7332C">gen_ai.evaluation</text>
    <text x="712" y="410" class="body" font-size="9" font-weight="600" fill="#B7332C">name=&quot;answer_relevance&quot; · passed=false · score=0.42</text>

    <!-- Real-time response triggers -->
    <rect x="640" y="445" width="480" height="120" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="0.75"/>
    <text x="652" y="466" class="mono" font-size="10" font-weight="600" fill="#1A1A1A">Triggers temps réel débloqués</text>
    <line x1="652" y1="475" x2="1108" y2="475" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="652" y="491" class="body" font-size="9" fill="#1A1A1A"><tspan font-weight="600">·</tspan> re-routing : si failed → retry, fallback humain, modèle plus gros</text>
    <text x="652" y="506" class="body" font-size="9" fill="#1A1A1A"><tspan font-weight="600">·</tspan> corrélation : régression visible immédiatement, drill vers prompt/completion</text>
    <text x="652" y="521" class="body" font-size="9" fill="#1A1A1A"><tspan font-weight="600">·</tspan> audit trail : éval = partie intégrante du record (AI Act art. 12)</text>
    <text x="652" y="538" class="body" font-size="9" fill="#1A1A1A"><tspan font-weight="600">·</tspan> filtrage : SLO observable (« 95% des chats passent toxicity_check »)</text>
    <text x="652" y="555" class="body" font-size="9" font-style="italic" fill="#5A5A5A">latence corrélation = millisecondes</text>
  </g>

  <!-- Debate band at bottom -->
  <rect x="60" y="610" width="1080" height="110" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="80" y="638" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1A1A1A">DÉBAT ACTIF AU SIG — GRANULARITÉ DES ATTRIBUTS</text>

  <g class="interactive" data-card="debate-flat" tabindex="0" role="button" aria-label="Position attribut libre">
    <rect x="80" y="654" width="500" height="56" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="0.75"/>
    <text x="92" y="673" class="mono" font-size="10" font-weight="600" fill="#5A5A5A">Position APM généralistes (Datadog, NR)</text>
    <text x="92" y="690" class="body" font-size="9" fill="#1A1A1A">Un seul attribut <tspan class="mono">gen_ai.evaluation.metadata</tspan> en JSON libre</text>
    <text x="92" y="703" class="body" font-size="9" font-style="italic" fill="#5A5A5A">Moins de cardinalité à modéliser côté backend</text>
  </g>

  <g class="interactive" data-card="debate-typed" tabindex="0" role="button" aria-label="Position attributs typés">
    <rect x="600" y="654" width="520" height="56" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1"/>
    <text x="612" y="673" class="mono" font-size="10" font-weight="600" fill="#B58A2C">Position vendeurs éval (Langfuse, Arize, Braintrust)</text>
    <text x="612" y="690" class="body" font-size="9" fill="#1A1A1A">Familles typées : <tspan class="mono">judge.*</tspan>, <tspan class="mono">rubric.*</tspan>, <tspan class="mono">dataset.*</tspan></text>
    <text x="612" y="703" class="body" font-size="9" font-style="italic" fill="#5A5A5A">Intégration mécanique depuis le schéma OpenInference</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="765" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : OpenTelemetry GenAI SIG, gen_ai.evaluation.* RC (mars 2026). OpenInference (Arize), Langfuse docs.</text>
  <text x="60" y="781" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : le passage de l'éval en sidecar à l'éval en span débloque le filtrage temps réel et l'audit trail régulatoire.</text>
</svg>
