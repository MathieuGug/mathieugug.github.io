<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le ledger compaction <tspan class="mono" font-size="20">gen_ai.compaction.*</tspan></text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Rendre observable ce qui se passe quand 200 k tokens deviennent 8 k — draft, mi-2027 visé</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LEFT: AVANT compaction -->
  <text x="60" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.15em" fill="#5A5A5A">AVANT COMPACTION — CONTEXTE COMPLET</text>

  <g class="interactive" data-card="before-context" tabindex="0" role="button" aria-label="Contexte avant compaction">
    <rect x="60" y="200" width="440" height="280" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="80" y="226" class="mono" font-size="11" fill="#1F5560">turn_001 user message</text>
    <rect x="80" y="232" width="400" height="6" fill="#1F5560" opacity="0.7"/>
    <text x="80" y="252" class="mono" font-size="11" fill="#1F5560">turn_002 assistant + tool</text>
    <rect x="80" y="258" width="400" height="14" fill="#1F5560" opacity="0.7"/>
    <text x="80" y="288" class="mono" font-size="11" fill="#1F5560">turn_003 tool result + user</text>
    <rect x="80" y="294" width="400" height="20" fill="#1F5560" opacity="0.7"/>
    <text x="80" y="330" class="mono" font-size="11" fill="#1F5560">turn_004…turn_037</text>
    <rect x="80" y="336" width="400" height="100" fill="#1F5560" opacity="0.7"/>
    <text x="80" y="455" class="mono" font-size="11" fill="#1F5560">turn_038 dernier user</text>
    <rect x="80" y="461" width="400" height="8" fill="#1F5560" opacity="0.7"/>

    <text x="280" y="485" class="mono" font-size="13" font-weight="600" fill="#1F5560" text-anchor="middle">203 412 tokens</text>
  </g>

  <!-- Compaction arrow with span -->
  <g>
    <line x1="520" y1="340" x2="660" y2="340" stroke="#B7332C" stroke-width="2.5" marker-end="url(#arrow05)"/>
    <rect x="510" y="270" width="170" height="60" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="595" y="292" class="mono" font-size="10" font-weight="600" fill="#B7332C" text-anchor="middle">gen_ai.compaction</text>
    <text x="595" y="306" class="mono" font-size="10" font-weight="600" fill="#B7332C" text-anchor="middle">.execution</text>
    <text x="595" y="321" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">span CLIENT — durée 1.8s</text>
  </g>

  <!-- RIGHT: APRÈS compaction -->
  <text x="700" y="180" class="mono" font-size="11" font-weight="600" letter-spacing="0.15em" fill="#5A5A5A">APRÈS — CONTEXTE COMPACTÉ</text>

  <g class="interactive" data-card="after-context" tabindex="0" role="button" aria-label="Contexte après compaction">
    <rect x="700" y="200" width="440" height="280" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="720" y="226" class="mono" font-size="11" fill="#B58A2C">summary segment</text>
    <rect x="720" y="232" width="400" height="30" fill="#B58A2C" opacity="0.7"/>
    <text x="720" y="282" class="mono" font-size="11" fill="#B58A2C">turn_038 dernier user (retained)</text>
    <rect x="720" y="288" width="400" height="8" fill="#B58A2C" opacity="0.7"/>
    <text x="720" y="316" class="mono" font-size="11" fill="#B58A2C">turn_037 (retained intact)</text>
    <rect x="720" y="322" width="400" height="14" fill="#B58A2C" opacity="0.7"/>
    <text x="720" y="356" class="mono" font-size="11" fill="#B58A2C">turn_036 (retained intact)</text>
    <rect x="720" y="362" width="400" height="10" fill="#B58A2C" opacity="0.7"/>

    <text x="720" y="455" class="body" font-size="11" font-style="italic" fill="#5A5A5A">summary + 3 derniers tours</text>
    <text x="920" y="485" class="mono" font-size="13" font-weight="600" fill="#B58A2C" text-anchor="middle">8 240 tokens</text>
  </g>

  <!-- Attributes of the compaction span -->
  <text x="60" y="525" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">ATTRIBUTS DU SPAN COMPACTION (DRAFT)</text>

  <g class="interactive" data-card="attrs-shape" tabindex="0" role="button" aria-label="Attributs de forme">
    <rect x="60" y="545" width="340" height="120" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="80" y="566" class="mono" font-size="10" font-weight="600" fill="#B7332C">Famille — forme de la réduction</text>
    <line x1="80" y1="572" x2="380" y2="572" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="80" y="588" class="mono" font-size="9" fill="#1A1A1A">.operation = "summarize" | "evict" | "hierarchical"</text>
    <text x="80" y="603" class="mono" font-size="9" fill="#1A1A1A">.strategy.name = "claude-code-/compact"</text>
    <text x="80" y="618" class="mono" font-size="9" fill="#1A1A1A">.input_tokens = 203412</text>
    <text x="80" y="633" class="mono" font-size="9" fill="#1A1A1A">.output_tokens = 8240</text>
    <text x="80" y="648" class="mono" font-size="9" font-weight="600" fill="#B7332C">.ratio = 0.0405</text>
  </g>

  <g class="interactive" data-card="attrs-content" tabindex="0" role="button" aria-label="Attributs de contenu retenu">
    <rect x="420" y="545" width="340" height="120" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="440" y="566" class="mono" font-size="10" font-weight="600" fill="#B7332C">Famille — contenu retenu</text>
    <line x1="440" y1="572" x2="740" y2="572" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="440" y="588" class="mono" font-size="9" fill="#1A1A1A">.retained_segments = 4</text>
    <text x="440" y="603" class="mono" font-size="9" fill="#1A1A1A">.evicted_segments = 33</text>
    <text x="440" y="618" class="mono" font-size="9" fill="#1A1A1A">events:</text>
    <text x="440" y="633" class="mono" font-size="9" fill="#5A5A5A">  gen_ai.compaction.summary</text>
    <text x="440" y="648" class="body" font-size="8" font-style="italic" fill="#5A5A5A">  (gated, capture flag off par défaut)</text>
  </g>

  <g class="interactive" data-card="attrs-judge" tabindex="0" role="button" aria-label="Attributs de jugement">
    <rect x="780" y="545" width="340" height="120" rx="3" fill="#B7332C" fill-opacity="0.15" stroke="#B7332C" stroke-width="1.5"/>
    <text x="800" y="566" class="mono" font-size="10" font-weight="600" fill="#B7332C">Famille — fidélité jugée</text>
    <line x1="800" y1="572" x2="1100" y2="572" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="800" y="588" class="mono" font-size="9" fill="#1A1A1A">.judge.score = 0.78</text>
    <text x="800" y="603" class="mono" font-size="9" fill="#1A1A1A">.judge.model = "claude-haiku-4-5"</text>
    <text x="800" y="618" class="mono" font-size="9" fill="#1A1A1A">.judge.method = "fact_recall"</text>
    <text x="800" y="640" class="body" font-size="9" font-style="italic" fill="#5A5A5A">Crée le premier verdict natif</text>
    <text x="800" y="653" class="body" font-size="9" font-style="italic" fill="#5A5A5A">sur une opération — vs LLM-call neutre.</text>
  </g>

  <!-- Footer -->
  <rect x="60" y="685" width="1080" height="38" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="0.75"/>
  <text x="78" y="709" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600" fill="#B7332C">Pourquoi observer la compaction :</tspan> sans ledger, un fait privé révélé par un utilisateur peut disparaître entre deux cycles sans laisser de trace.</text>

  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="765" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : OpenTelemetry GenAI SIG, gen_ai.compaction.* draft (janvier 2026, draft de juin 2026).</text>
  <text x="60" y="781" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Voir aussi le dossier compaction-agentique pour la taxonomie 5 familles et le triangle fidélité × coût × oubliabilité.</text>
</svg>
