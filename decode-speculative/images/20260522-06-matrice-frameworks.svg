<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-06">
  <title id="title-06">Matrice frameworks × variantes spéculatives (2026)</title>
  <defs>
    <style>
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .col-title{font:600 19px/1.15 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .row-title{font:600 14px/1.2 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .body-label{font:500 13px/1.4 'Inter',sans-serif;fill:#1e1e2a}
      .annotation{font:400 12px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .tick{font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#9a9ca5}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .axis-label{font:500 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c;text-transform:uppercase}
      .cell-frame{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1}
      .cell-header{fill:#f3eedf;stroke:rgba(30,30,44,0.22);stroke-width:1}
      .ga{fill:#1a5c6b}
      .ga-text{fill:#faf6ec}
      .preview{fill:rgba(184,88,46,0.55);stroke:#b8582e;stroke-width:1}
      .none{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1}
      .badge-ga{font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#faf6ec}
      .badge-preview{font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#b8582e}
      .badge-none{font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#9a9ca5}
    </style>
  </defs>

  <rect width="1200" height="740" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 06</text>
  <text x="80" y="62" class="title">Quel framework supporte quelle variante</text>
  <text x="80" y="92" class="subtitle">Disponibilité et maturité d'intégration scheduler (avec activation conditionnelle par batch) au S1 2026.</text>

  <!-- Headers : colonnes = variantes -->
  <g>
    <!-- Coin haut-gauche (vide) -->
    <rect x="120" y="150" width="200" height="60" class="cell-header"/>
    <text x="140" y="178" class="col-eyebrow">FRAMEWORK</text>
    <text x="140" y="200" class="annotation">↓ vs variantes →</text>

    <!-- Variante 1 : Draft externe -->
    <rect x="320" y="150" width="160" height="60" class="cell-header"/>
    <text x="400" y="174" class="row-title" text-anchor="middle">Draft externe</text>
    <text x="400" y="194" class="annotation" text-anchor="middle">Leviathan / Chen</text>

    <!-- Variante 2 : Medusa -->
    <rect x="480" y="150" width="160" height="60" class="cell-header"/>
    <text x="560" y="174" class="row-title" text-anchor="middle">Medusa</text>
    <text x="560" y="194" class="annotation" text-anchor="middle">Têtes additionnelles</text>

    <!-- Variante 3 : EAGLE-2 -->
    <rect x="640" y="150" width="160" height="60" class="cell-header"/>
    <text x="720" y="174" class="row-title" text-anchor="middle">EAGLE-2</text>
    <text x="720" y="194" class="annotation" text-anchor="middle">Feature + tree dyn.</text>

    <!-- Variante 4 : EAGLE-3 -->
    <rect x="800" y="150" width="160" height="60" class="cell-header"/>
    <text x="880" y="174" class="row-title" text-anchor="middle">EAGLE-3</text>
    <text x="880" y="194" class="annotation" text-anchor="middle">SOTA 2025</text>

    <!-- Variante 5 : Lookahead -->
    <rect x="960" y="150" width="160" height="60" class="cell-header"/>
    <text x="1040" y="174" class="row-title" text-anchor="middle">Lookahead</text>
    <text x="1040" y="194" class="annotation" text-anchor="middle">Jacobi parallel</text>
  </g>

  <!-- Lignes : 4 frameworks -->
  <!-- vLLM -->
  <g class="interactive" data-region="fw-vllm">
    <rect x="120" y="210" width="200" height="100" class="cell-frame"/>
    <text x="140" y="240" class="col-eyebrow">UC BERKELEY · APACHE 2.0</text>
    <text x="140" y="266" class="col-title">vLLM</text>
    <text x="140" y="288" class="annotation">PagedAttention. Référence de fait.</text>
    <text x="140" y="303" class="annotation">Scheduler hybride depuis 0.6.</text>

    <rect x="320" y="210" width="160" height="100" class="ga"/>
    <text x="400" y="248" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="400" y="270" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">depuis 0.4</text>
    <text x="400" y="286" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">Llama / Qwen / Mistral</text>

    <rect x="480" y="210" width="160" height="100" class="ga"/>
    <text x="560" y="248" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="560" y="270" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">depuis 0.5</text>
    <text x="560" y="286" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">+ MLP-speculator</text>

    <rect x="640" y="210" width="160" height="100" class="ga"/>
    <text x="720" y="248" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="720" y="270" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">depuis 0.6</text>
    <text x="720" y="286" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">tree dynamique</text>

    <rect x="800" y="210" width="160" height="100" class="ga"/>
    <text x="880" y="248" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="880" y="270" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">depuis 0.6 (mi-2025)</text>
    <text x="880" y="286" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">défaut Llama 3.x</text>

    <rect x="960" y="210" width="160" height="100" class="preview"/>
    <text x="1040" y="248" class="row-title" text-anchor="middle" fill="#1e1e2a">Preview</text>
    <text x="1040" y="270" class="annotation" text-anchor="middle">expérimental</text>
    <text x="1040" y="286" class="annotation" text-anchor="middle">depuis 0.7</text>
  </g>

  <!-- SGLang -->
  <g class="interactive" data-region="fw-sglang">
    <rect x="120" y="310" width="200" height="100" class="cell-frame"/>
    <text x="140" y="340" class="col-eyebrow">SGL-PROJECT · APACHE 2.0</text>
    <text x="140" y="366" class="col-title">SGLang</text>
    <text x="140" y="388" class="annotation">RadixAttention + prefix cache.</text>
    <text x="140" y="403" class="annotation">Spéculation × multi-tour : excellent.</text>

    <rect x="320" y="310" width="160" height="100" class="ga"/>
    <text x="400" y="348" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="400" y="370" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">depuis 0.2</text>
    <text x="400" y="386" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">aligné vLLM</text>

    <rect x="480" y="310" width="160" height="100" class="ga"/>
    <text x="560" y="348" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="560" y="370" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">depuis 0.3</text>
    <text x="560" y="386" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">multi-tour optimisé</text>

    <rect x="640" y="310" width="160" height="100" class="ga"/>
    <text x="720" y="348" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="720" y="370" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">depuis 0.4</text>
    <text x="720" y="386" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">tree natif</text>

    <rect x="800" y="310" width="160" height="100" class="ga"/>
    <text x="880" y="348" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="880" y="370" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">depuis 0.4 (fin 2025)</text>
    <text x="880" y="386" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">workloads agentiques</text>

    <rect x="960" y="310" width="160" height="100" class="none"/>
    <text x="1040" y="348" class="row-title" text-anchor="middle" fill="#9a9ca5">—</text>
    <text x="1040" y="370" class="annotation" text-anchor="middle" fill="#9a9ca5">non prioritaire</text>
    <text x="1040" y="386" class="annotation" text-anchor="middle" fill="#9a9ca5">community fork</text>
  </g>

  <!-- TensorRT-LLM -->
  <g class="interactive" data-region="fw-trtllm">
    <rect x="120" y="410" width="200" height="100" class="cell-frame"/>
    <text x="140" y="440" class="col-eyebrow">NVIDIA · APACHE 2.0 / CUDA</text>
    <text x="140" y="466" class="col-title">TensorRT-LLM</text>
    <text x="140" y="488" class="annotation">FP8 attention + KV quantization.</text>
    <text x="140" y="503" class="annotation">Deux schedulers parallèles 0.9+.</text>

    <rect x="320" y="410" width="160" height="100" class="ga"/>
    <text x="400" y="448" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="400" y="470" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">draft target</text>
    <text x="400" y="486" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">inflight batching</text>

    <rect x="480" y="410" width="160" height="100" class="ga"/>
    <text x="560" y="448" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="560" y="470" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">+ ReDrafter</text>
    <text x="560" y="486" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">variante NVIDIA</text>

    <rect x="640" y="410" width="160" height="100" class="ga"/>
    <text x="720" y="448" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="720" y="470" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">depuis 0.8</text>
    <text x="720" y="486" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">H100 / H200 / B200</text>

    <rect x="800" y="410" width="160" height="100" class="ga"/>
    <text x="880" y="448" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="880" y="470" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">depuis 0.10</text>
    <text x="880" y="486" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">optimisé B200</text>

    <rect x="960" y="410" width="160" height="100" class="none"/>
    <text x="1040" y="448" class="row-title" text-anchor="middle" fill="#9a9ca5">—</text>
    <text x="1040" y="470" class="annotation" text-anchor="middle" fill="#9a9ca5">non roadmap</text>
    <text x="1040" y="486" class="annotation" text-anchor="middle" fill="#9a9ca5">2026</text>
  </g>

  <!-- DeepSpeed-MII -->
  <g class="interactive" data-region="fw-deepspeed">
    <rect x="120" y="510" width="200" height="100" class="cell-frame"/>
    <text x="140" y="540" class="col-eyebrow">MICROSOFT · APACHE 2.0</text>
    <text x="140" y="566" class="col-title">DeepSpeed-MII</text>
    <text x="140" y="588" class="annotation">ZeRO-Inference, multi-GPU.</text>
    <text x="140" y="603" class="annotation">Intégration Azure ML native.</text>

    <rect x="320" y="510" width="160" height="100" class="ga"/>
    <text x="400" y="548" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="400" y="570" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">draft externe</text>
    <text x="400" y="586" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">ZeRO-3 compatible</text>

    <rect x="480" y="510" width="160" height="100" class="ga"/>
    <text x="560" y="548" class="row-title" text-anchor="middle" fill="#faf6ec">GA</text>
    <text x="560" y="570" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.85)">basique</text>
    <text x="560" y="586" class="annotation" text-anchor="middle" fill="rgba(250,246,236,0.7)">sans tree dynamique</text>

    <rect x="640" y="510" width="160" height="100" class="preview"/>
    <text x="720" y="548" class="row-title" text-anchor="middle" fill="#1e1e2a">Preview</text>
    <text x="720" y="570" class="annotation" text-anchor="middle">community PR</text>
    <text x="720" y="586" class="annotation" text-anchor="middle">non Azure-validated</text>

    <rect x="800" y="510" width="160" height="100" class="none"/>
    <text x="880" y="548" class="row-title" text-anchor="middle" fill="#9a9ca5">—</text>
    <text x="880" y="570" class="annotation" text-anchor="middle" fill="#9a9ca5">retard de phase</text>
    <text x="880" y="586" class="annotation" text-anchor="middle" fill="#9a9ca5">S1 2026</text>

    <rect x="960" y="510" width="160" height="100" class="none"/>
    <text x="1040" y="548" class="row-title" text-anchor="middle" fill="#9a9ca5">—</text>
    <text x="1040" y="570" class="annotation" text-anchor="middle" fill="#9a9ca5">absent</text>
    <text x="1040" y="586" class="annotation" text-anchor="middle" fill="#9a9ca5">roadmap</text>
  </g>

  <!-- Légende -->
  <g transform="translate(80 632)">
    <rect x="0" y="0" width="22" height="16" class="ga"/>
    <text x="30" y="13" class="annotation"><tspan font-weight="600" fill="#1e1e2a">GA</tspan> · intégration mature, activable en production</text>

    <rect x="320" y="0" width="22" height="16" class="preview"/>
    <text x="350" y="13" class="annotation"><tspan font-weight="600" fill="#1e1e2a">Preview</tspan> · expérimental, sans garantie</text>

    <rect x="600" y="0" width="22" height="16" class="none"/>
    <text x="630" y="13" class="annotation"><tspan font-weight="600" fill="#1e1e2a">—</tspan> · non supporté</text>
  </g>

  <text x="80" y="688" class="caption">Lecture : vLLM et SGLang couvrent le plus large ; TensorRT-LLM optimise le plus profond sur stack NVIDIA ; DeepSpeed-MII garde un retard de phase sur EAGLE-3.</text>
  <text x="80" y="718" class="caption">Sources — release notes vLLM 0.4-0.7 ; SGLang GitHub README et blog ; TensorRT-LLM Advanced Speculative Decoding docs ; DeepSpeed-MII changelog 2024-2026.</text>
</svg>
