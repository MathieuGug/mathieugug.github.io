<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-05">
  <title id="title-05">Le point de bascule speedup vs batch size</title>
  <defs>
    <style>
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .body-label{font:500 14px/1.4 'Inter',sans-serif;fill:#1e1e2a}
      .annotation{font:400 12.5px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .tick{font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#9a9ca5}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .axis-label{font:500 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c;text-transform:uppercase}
      .frame{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .axis{stroke:rgba(30,30,44,0.30);stroke-width:1;fill:none}
      .grid{stroke:rgba(30,30,44,0.10);stroke-width:0.6;fill:none}
      .curve-spec{stroke:#b8582e;stroke-width:2.8;fill:none}
      .curve-baseline{stroke:#1a5c6b;stroke-width:2.2;stroke-dasharray:6 4;fill:none}
      .zone-win{fill:rgba(26,92,107,0.10)}
      .zone-loss{fill:rgba(168,62,85,0.10)}
      .point{fill:#a83e55;stroke:#faf6ec;stroke-width:2}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 05</text>
  <text x="80" y="62" class="title">Le speedup spéculatif s'effondre avec la charge</text>
  <text x="80" y="92" class="subtitle">À batch 1, le GPU a du slack compute. À batch 32+, il sature — le surcoût de la vérification annule le gain.</text>

  <!-- Cadre -->
  <rect x="80" y="135" width="1040" height="430" rx="6" class="frame"/>

  <!-- Zones de fond -->
  <g class="interactive" data-region="batch-1">
    <rect x="170" y="160" width="370" height="380" class="zone-win"/>
    <text x="355" y="186" class="body-label" text-anchor="middle" fill="#1a5c6b" font-weight="600">ZONE GAIN — memory-bound</text>
  </g>
  <g class="interactive" data-region="batch-cross">
    <rect x="540" y="160" width="220" height="380" fill="rgba(184,88,46,0.07)"/>
    <text x="650" y="186" class="body-label" text-anchor="middle" fill="#b8582e" font-weight="600">ZONE INDIFFÉRENCE</text>
  </g>
  <g class="interactive" data-region="batch-loss">
    <rect x="760" y="160" width="320" height="380" class="zone-loss"/>
    <text x="920" y="186" class="body-label" text-anchor="middle" fill="#a83e55" font-weight="600">ZONE PERTE — compute-bound</text>
  </g>

  <!-- Axes -->
  <line x1="170" y1="540" x2="1080" y2="540" class="axis"/>
  <line x1="170" y1="540" x2="170" y2="200" class="axis"/>

  <!-- Y ticks (speedup) -->
  <g>
    <text x="160" y="544" class="tick" text-anchor="end">0,5×</text>
    <text x="160" y="471" class="tick" text-anchor="end">1,0×</text>
    <text x="160" y="398" class="tick" text-anchor="end">2,0×</text>
    <text x="160" y="325" class="tick" text-anchor="end">3,0×</text>
    <text x="160" y="252" class="tick" text-anchor="end">4,0×</text>

    <line x1="165" y1="540" x2="170" y2="540" class="axis"/>
    <line x1="165" y1="468" x2="170" y2="468" class="axis"/>
    <line x1="165" y1="395" x2="170" y2="395" class="axis"/>
    <line x1="165" y1="322" x2="170" y2="322" class="axis"/>
    <line x1="165" y1="249" x2="170" y2="249" class="axis"/>

    <text x="100" y="370" class="axis-label" transform="rotate(-90 100 370)" text-anchor="middle">SPEEDUP EFFECTIF</text>
  </g>

  <!-- X ticks (batch size, log-like) -->
  <g>
    <text x="220" y="558" class="tick" text-anchor="middle">1</text>
    <text x="320" y="558" class="tick" text-anchor="middle">4</text>
    <text x="430" y="558" class="tick" text-anchor="middle">8</text>
    <text x="540" y="558" class="tick" text-anchor="middle">16</text>
    <text x="650" y="558" class="tick" text-anchor="middle">24</text>
    <text x="760" y="558" class="tick" text-anchor="middle">32</text>
    <text x="870" y="558" class="tick" text-anchor="middle">48</text>
    <text x="980" y="558" class="tick" text-anchor="middle">64</text>
    <text x="1060" y="558" class="tick" text-anchor="middle">96</text>

    <text x="620" y="585" class="axis-label" text-anchor="middle">BATCH SIZE (continuous batching)</text>
  </g>

  <!-- Ligne baseline (speedup = 1) -->
  <line x1="170" y1="468" x2="1080" y2="468" class="curve-baseline"/>
  <text x="1085" y="463" class="annotation" fill="#1a5c6b" font-weight="600">décode standard (1,0×)</text>

  <!-- Courbe speedup spéculatif (descend de ~4× à ~0,9×) -->
  <path d="M 220,252 C 280,260 320,275 360,295 C 400,318 430,338 470,365 C 500,390 530,415 570,440 C 600,455 640,465 680,470 C 720,473 760,475 800,478 C 840,484 870,494 910,505 C 950,514 980,519 1020,524 C 1050,527 1070,528 1080,528" class="curve-spec"/>

  <!-- Annotation pic de speedup -->
  <circle cx="220" cy="252" r="6" class="point"/>
  <text x="240" y="248" class="body-label" font-weight="600" fill="#b8582e">3,8× à batch 1</text>

  <!-- Annotation point de croisement (zone à ~batch 24) -->
  <line x1="650" y1="200" x2="650" y2="540" class="grid" stroke-dasharray="4 3" stroke="rgba(184,88,46,0.45)"/>
  <text x="650" y="206" class="annotation" text-anchor="middle" fill="#b8582e" font-weight="600">point d'équilibre</text>
  <text x="650" y="222" class="annotation" text-anchor="middle" fill="#b8582e">≈ batch 24 (EAGLE-3, H100)</text>

  <!-- Annotation perte nette -->
  <circle cx="980" cy="519" r="5" class="point"/>
  <text x="970" y="510" class="annotation" text-anchor="end" fill="#a83e55" font-weight="600">0,9× à batch 64</text>

  <!-- Légende courbes -->
  <g transform="translate(900 260)">
    <line x1="0" y1="6" x2="40" y2="6" class="curve-spec"/>
    <text x="48" y="10" class="annotation">spéculation activée</text>
    <line x1="0" y1="30" x2="40" y2="30" class="curve-baseline"/>
    <text x="48" y="34" class="annotation">décode standard</text>
  </g>

  <!-- Policy adaptative -->
  <g class="interactive" data-region="policy-adapt">
    <rect x="80" y="600" width="1040" height="70" rx="4" fill="#fbf3e5" stroke="#1a5c6b" stroke-width="1.2"/>
    <text x="100" y="622" class="body-label" font-weight="600" fill="#1a5c6b">Politique d'activation conditionnelle (vLLM 0.6+, TensorRT-LLM 0.9+, SGLang)</text>
    <text x="100" y="643" class="annotation">Le scheduler désactive la spéculation au-delà d'un seuil de batch_size configurable (typiquement 16–24).</text>
    <text x="100" y="660" class="annotation">TensorRT-LLM maintient deux schedulers parallèles et migre les requêtes selon batch_size + α observé + SLA.</text>
  </g>

  <text x="80" y="700" class="caption">Sources — vLLM 0.6 release notes ; TensorRT-LLM 0.9 speculative decoding guide ; benchmarks SGLang sur H100/B200 ; Together AI engineering blog.</text>
</svg>
