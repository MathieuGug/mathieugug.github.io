<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-03">
  <title id="title-03">Taxonomie des variantes de décode spéculative</title>
  <defs>
    <style>
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .col-title{font:600 19px/1.15 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .body-label{font:500 14px/1.4 'Inter',sans-serif;fill:#1e1e2a}
      .annotation{font:400 12.5px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .tick{font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#9a9ca5}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .family-frame-1{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .family-frame-2{fill:#fbf3e5;stroke:rgba(30,30,44,0.22);stroke-width:1.2}
      .family-frame-3{fill:#f7eed8;stroke:rgba(30,30,44,0.26);stroke-width:1.2}
      .family-frame-4{fill:#f2e6c8;stroke:rgba(30,30,44,0.30);stroke-width:1.2}
      .badge{fill:#1a5c6b;rx:3}
      .badge-text{font:500 10.5px/1 'JetBrains Mono',monospace;letter-spacing:0.08em;fill:#faf6ec}
      .target-box{fill:#b8582e;stroke:#7d3a1a;stroke-width:1.2}
      .draft-box{fill:#fdfaf0;stroke:#b8582e;stroke-width:1.4;stroke-dasharray:4 3}
      .head-box{fill:#fdfaf0;stroke:#1a5c6b;stroke-width:1.4}
      .arrow{stroke:rgba(30,30,44,0.6);stroke-width:1.2;fill:none}
      .arrow-feature{stroke:#1a5c6b;stroke-width:1.6;fill:none}
    </style>
    <marker id="ar03" markerWidth="9" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="rgba(30,30,44,0.6)"/>
    </marker>
    <marker id="ar03b" markerWidth="9" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#1a5c6b"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 03</text>
  <text x="80" y="62" class="title">Quatre stratégies pour trouver un draft</text>
  <text x="80" y="92" class="subtitle">D'un modèle externe à pas de modèle du tout : où trouver le draft qui propose les K tokens spéculatifs.</text>

  <!-- Famille 1 — Draft externe -->
  <g class="interactive" data-region="family-draft">
    <rect x="80" y="140" width="260" height="480" rx="6" class="family-frame-1"/>
    <text x="100" y="172" class="col-eyebrow">FAMILLE 1 · 2022</text>
    <text x="100" y="200" class="col-title">Draft model</text>
    <text x="100" y="222" class="col-title">externe</text>
    <text x="100" y="252" class="annotation">Un petit modèle de la même famille</text>
    <text x="100" y="270" class="annotation">(10–100× plus petit) propose K tokens.</text>

    <!-- Visuel : target (gros) + draft (petit) -->
    <rect x="115" y="305" width="100" height="80" rx="3" class="target-box"/>
    <text x="165" y="338" class="body-label" text-anchor="middle" fill="#faf6ec">target</text>
    <text x="165" y="358" class="tick" text-anchor="middle" fill="#faf6ec">70B</text>
    <text x="165" y="376" class="tick" text-anchor="middle" fill="#faf6ec">FP16</text>

    <rect x="240" y="335" width="60" height="50" rx="3" class="draft-box"/>
    <text x="270" y="358" class="body-label" text-anchor="middle" fill="#b8582e">draft</text>
    <text x="270" y="376" class="tick" text-anchor="middle" fill="#b8582e">1B</text>

    <!-- Bullets -->
    <text x="100" y="425" class="body-label" font-weight="600">✓ Zéro modif du target</text>
    <text x="100" y="445" class="annotation">Pas de fine-tuning, sampling propre.</text>

    <text x="100" y="475" class="body-label" font-weight="600">✗ Second poids à charger</text>
    <text x="100" y="495" class="annotation">VRAM additionnelle ; matching de</text>
    <text x="100" y="511" class="annotation">distribution requis.</text>

    <rect x="100" y="552" width="120" height="22" class="badge"/>
    <text x="160" y="567" class="badge-text" text-anchor="middle">2,2× LLAMA-2 70B</text>
    <text x="100" y="595" class="annotation">Leviathan ; Chen et al. (DeepMind).</text>
  </g>

  <!-- Famille 2 — Medusa -->
  <g class="interactive" data-region="family-medusa">
    <rect x="360" y="140" width="260" height="480" rx="6" class="family-frame-2"/>
    <text x="380" y="172" class="col-eyebrow">FAMILLE 2 · 2024</text>
    <text x="380" y="200" class="col-title">Têtes additionnelles</text>
    <text x="380" y="222" class="col-title">(Medusa, Hydra)</text>
    <text x="380" y="252" class="annotation">K têtes de décode ajoutées sur le</text>
    <text x="380" y="270" class="annotation">target ; chaque tête prédit i+k.</text>

    <!-- Visuel -->
    <rect x="395" y="305" width="100" height="80" rx="3" class="target-box"/>
    <text x="445" y="338" class="body-label" text-anchor="middle" fill="#faf6ec">target</text>
    <text x="445" y="358" class="tick" text-anchor="middle" fill="#faf6ec">+ K têtes</text>
    <text x="445" y="376" class="tick" text-anchor="middle" fill="#faf6ec">MLP</text>

    <rect x="515" y="315" width="42" height="20" rx="2" class="head-box"/>
    <text x="536" y="329" class="tick" text-anchor="middle" fill="#1a5c6b">h+1</text>
    <rect x="515" y="338" width="42" height="20" rx="2" class="head-box"/>
    <text x="536" y="352" class="tick" text-anchor="middle" fill="#1a5c6b">h+2</text>
    <rect x="515" y="361" width="42" height="20" rx="2" class="head-box"/>
    <text x="536" y="375" class="tick" text-anchor="middle" fill="#1a5c6b">h+3</text>

    <line x1="495" y1="325" x2="515" y2="325" class="arrow" marker-end="url(#ar03)"/>
    <line x1="495" y1="348" x2="515" y2="348" class="arrow" marker-end="url(#ar03)"/>
    <line x1="495" y1="371" x2="515" y2="371" class="arrow" marker-end="url(#ar03)"/>

    <!-- Bullets -->
    <text x="380" y="425" class="body-label" font-weight="600">✓ Pas de second poids</text>
    <text x="380" y="445" class="annotation">Têtes attachées au target.</text>

    <text x="380" y="475" class="body-label" font-weight="600">✗ Têtes non-autoregressives</text>
    <text x="380" y="495" class="annotation">L'acceptance chute pour les têtes</text>
    <text x="380" y="511" class="annotation">lointaines. Hydra corrige partiellement.</text>

    <rect x="380" y="552" width="120" height="22" class="badge"/>
    <text x="440" y="567" class="badge-text" text-anchor="middle">2,8× VICUNA 7B</text>
    <text x="380" y="595" class="annotation">Cai et al. ; Yan et al. (Hydra).</text>
  </g>

  <!-- Famille 3 — EAGLE -->
  <g class="interactive" data-region="family-eagle">
    <rect x="640" y="140" width="260" height="480" rx="6" class="family-frame-3"/>
    <text x="660" y="172" class="col-eyebrow">FAMILLE 3 · 2024–2025</text>
    <text x="660" y="200" class="col-title">Feature-level</text>
    <text x="660" y="222" class="col-title">(EAGLE 1/2/3)</text>
    <text x="660" y="252" class="annotation">Prédit la feature (embedding</text>
    <text x="660" y="270" class="annotation">pénultième), pas le token.</text>

    <!-- Visuel -->
    <rect x="675" y="305" width="100" height="80" rx="3" class="target-box"/>
    <text x="725" y="338" class="body-label" text-anchor="middle" fill="#faf6ec">target</text>
    <text x="725" y="358" class="tick" text-anchor="middle" fill="#faf6ec">layers</text>
    <text x="725" y="376" class="tick" text-anchor="middle" fill="#faf6ec">1..L−1</text>

    <rect x="795" y="335" width="80" height="22" rx="2" class="head-box"/>
    <text x="835" y="350" class="tick" text-anchor="middle" fill="#1a5c6b">feature head</text>
    <line x1="775" y1="345" x2="795" y2="345" class="arrow-feature" marker-end="url(#ar03b)"/>

    <rect x="675" y="395" width="100" height="22" rx="2" class="head-box"/>
    <text x="725" y="410" class="tick" text-anchor="middle" fill="#1a5c6b">LM head (target)</text>
    <line x1="835" y1="357" x2="780" y2="395" class="arrow-feature" marker-end="url(#ar03b)"/>

    <!-- Bullets -->
    <text x="660" y="450" class="body-label" font-weight="600">✓ Acceptance +30–40 %</text>
    <text x="660" y="470" class="annotation">La feature est plus stable que le token.</text>

    <text x="660" y="498" class="body-label" font-weight="600">✓ Tree dynamique (EAGLE-2)</text>
    <text x="660" y="518" class="annotation">EAGLE-3 : loss sequence-level.</text>

    <rect x="660" y="552" width="160" height="22" class="badge"/>
    <text x="740" y="567" class="badge-text" text-anchor="middle">3,0–4,5× LLAMA-3 70B</text>
    <text x="660" y="595" class="annotation">Li, Wei, Zhang × 3. État de l'art 2026.</text>
  </g>

  <!-- Famille 4 — Lookahead -->
  <g class="interactive" data-region="family-lookahead">
    <rect x="920" y="140" width="200" height="480" rx="6" class="family-frame-4"/>
    <text x="940" y="172" class="col-eyebrow">FAMILLE 4 · 2024</text>
    <text x="940" y="200" class="col-title">Jacobi parallel</text>
    <text x="940" y="222" class="col-title">(Lookahead)</text>
    <text x="940" y="252" class="annotation">Aucun draft. Solver Jacobi sur</text>
    <text x="940" y="270" class="annotation">fixe-points en parallèle.</text>

    <!-- Visuel -->
    <rect x="965" y="305" width="110" height="80" rx="3" class="target-box"/>
    <text x="1020" y="338" class="body-label" text-anchor="middle" fill="#faf6ec">target</text>
    <text x="1020" y="358" class="tick" text-anchor="middle" fill="#faf6ec">solo</text>
    <text x="1020" y="376" class="tick" text-anchor="middle" fill="#faf6ec">(Jacobi)</text>

    <!-- Bullets -->
    <text x="940" y="425" class="body-label" font-weight="600">✓ Zero VRAM additionnelle</text>
    <text x="940" y="445" class="annotation">Pas de second poids, pas</text>
    <text x="940" y="461" class="annotation">d'entraînement.</text>

    <text x="940" y="491" class="body-label" font-weight="600">✗ Acceptance plus basse</text>
    <text x="940" y="511" class="annotation">35–55 % sans tree dédié.</text>

    <rect x="940" y="552" width="130" height="22" class="badge"/>
    <text x="1005" y="567" class="badge-text" text-anchor="middle">1,5–2,3× LLAMA-2</text>
    <text x="940" y="595" class="annotation">Fu et al. (LMSYS, UCSD).</text>
  </g>

  <text x="80" y="660" class="caption">Lecture : EAGLE-3 domine la qualité par token gagné ; Lookahead domine le coût de déploiement (zero training, zero VRAM additionnelle).</text>
  <text x="80" y="678" class="caption">Medusa garde sa place quand on veut éviter de gérer un second poids GPU mais accepte de fine-tuner les têtes sur le target.</text>
  <text x="80" y="708" class="caption">Une stratégie orthogonale, la décode spéculative en ligne (Liu et al., ICML 2024), ré-entraîne le draft sur les rejets observés en production.</text>
  <text x="80" y="735" class="caption">Sources — Leviathan (2022) ; Chen et al. (2023) ; Cai et al. (ICML 2024) ; Li et al. EAGLE 1/2/3 (2024–2025) ; Fu et al. Lookahead (2024) ; Yan et al. Hydra (COLM 2024).</text>
</svg>
