<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-02">
  <title id="title-02">L'arbre de tokens spéculatifs et la vérification parallèle</title>
  <defs>
    <style>
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .col-title{font:600 20px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .body-label{font:500 15px/1.3 'Inter',sans-serif;fill:#1e1e2a}
      .annotation{font:400 13px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .nodelabel{font:500 12px/1 'JetBrains Mono',monospace;letter-spacing:0.02em;fill:#1e1e2a}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .axis-label{font:500 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c;text-transform:uppercase}
      .frame{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .frame-spec{fill:#fbf3e5;stroke:rgba(30,30,44,0.22);stroke-width:1.2}
      .branch{stroke:rgba(30,30,44,0.35);stroke-width:1.4;fill:none}
      .branch-accepted{stroke:#1a5c6b;stroke-width:2.6;fill:none}
      .node-root{fill:#b8582e;stroke:#7d3a1a;stroke-width:1.4}
      .node-cand{fill:#fdfaf0;stroke:rgba(30,30,44,0.55);stroke-width:1.2}
      .node-accept{fill:#1a5c6b;stroke:#0e3f4a;stroke-width:1.6}
      .grid-cell{stroke:rgba(30,30,44,0.18);stroke-width:0.8}
      .grid-mask{fill:#1e1e2a}
      .grid-attend{fill:rgba(184,88,46,0.5)}
      .grid-self{fill:#1a5c6b}
    </style>
    <marker id="ar02" markerWidth="9" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="rgba(30,30,44,0.55)"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 02</text>
  <text x="80" y="62" class="title">Tree attention : vérifier plusieurs hypothèses en un seul forward</text>
  <text x="80" y="92" class="subtitle">Au lieu d'une seule séquence linéaire, le draft propose un arbre de continuations. Un masque d'attention spécialisé les vérifie toutes en parallèle.</text>

  <!-- Bloc gauche : l'arbre -->
  <g class="interactive" data-region="tree-branch">
    <rect x="80" y="140" width="580" height="520" rx="6" class="frame"/>
    <text x="100" y="172" class="col-eyebrow">A · L'ARBRE DE CANDIDATS</text>
    <text x="100" y="200" class="col-title">Le draft propose plusieurs continuations</text>
    <text x="100" y="226" class="annotation">Largeur 2 × profondeur 3 = 7 nœuds candidats + 1 racine.</text>

    <!-- Racine -->
    <g class="interactive" data-region="tree-root">
      <circle cx="170" cy="380" r="32" class="node-root"/>
      <text x="170" y="385" class="nodelabel" text-anchor="middle" fill="#faf6ec">racine</text>
      <text x="170" y="430" class="annotation" text-anchor="middle">dernier token confirmé</text>
    </g>

    <!-- Niveau 1 : 2 branches -->
    <line x1="202" y1="380" x2="288" y2="290" class="branch-accepted"/>
    <line x1="202" y1="380" x2="288" y2="470" class="branch"/>

    <circle cx="320" cy="290" r="26" class="node-accept"/>
    <text x="320" y="295" class="nodelabel" text-anchor="middle" fill="#faf6ec">A1</text>
    <circle cx="320" cy="470" r="26" class="node-cand"/>
    <text x="320" y="475" class="nodelabel" text-anchor="middle">B1</text>

    <!-- Niveau 2 : depuis A1 et B1 -->
    <line x1="346" y1="290" x2="430" y2="240" class="branch-accepted"/>
    <line x1="346" y1="290" x2="430" y2="340" class="branch"/>
    <line x1="346" y1="470" x2="430" y2="430" class="branch"/>
    <line x1="346" y1="470" x2="430" y2="520" class="branch"/>

    <circle cx="462" cy="240" r="26" class="node-accept"/>
    <text x="462" y="245" class="nodelabel" text-anchor="middle" fill="#faf6ec">A2a</text>
    <circle cx="462" cy="340" r="26" class="node-cand"/>
    <text x="462" y="345" class="nodelabel" text-anchor="middle">A2b</text>
    <circle cx="462" cy="430" r="26" class="node-cand"/>
    <text x="462" y="435" class="nodelabel" text-anchor="middle">B2a</text>
    <circle cx="462" cy="520" r="26" class="node-cand"/>
    <text x="462" y="525" class="nodelabel" text-anchor="middle">B2b</text>

    <!-- Niveau 3 : depuis A2a, A2b, B2a, B2b -->
    <line x1="488" y1="240" x2="572" y2="220" class="branch-accepted"/>
    <line x1="488" y1="340" x2="572" y2="320" class="branch"/>
    <line x1="488" y1="430" x2="572" y2="410" class="branch"/>
    <line x1="488" y1="520" x2="572" y2="500" class="branch"/>

    <circle cx="604" cy="220" r="26" class="node-accept"/>
    <text x="604" y="225" class="nodelabel" text-anchor="middle" fill="#faf6ec">A3</text>
    <circle cx="604" cy="320" r="26" class="node-cand"/>
    <text x="604" y="325" class="nodelabel" text-anchor="middle">A3'</text>
    <circle cx="604" cy="410" r="26" class="node-cand"/>
    <text x="604" y="415" class="nodelabel" text-anchor="middle">B3</text>
    <circle cx="604" cy="500" r="26" class="node-cand"/>
    <text x="604" y="505" class="nodelabel" text-anchor="middle">B3'</text>

    <!-- Légende chemin retenu -->
    <g class="interactive" data-region="commit-path">
      <rect x="98" y="580" width="544" height="58" rx="4" fill="#fbf3e5" stroke="#1a5c6b" stroke-width="1.2"/>
      <text x="118" y="603" class="body-label"><tspan fill="#1a5c6b" font-weight="600">Chemin accepté ·</tspan> racine → A1 → A2a → A3</text>
      <text x="118" y="623" class="annotation">3 tokens accumulés en 1 forward target. Les 4 autres branches sont jetées.</text>
    </g>
  </g>

  <!-- Bloc droit : masque d'attention -->
  <g class="interactive" data-region="verify-mask">
    <rect x="680" y="140" width="440" height="520" rx="6" class="frame-spec"/>
    <text x="700" y="172" class="col-eyebrow">B · MASQUE D'ATTENTION ARBORESCENT</text>
    <text x="700" y="200" class="col-title">Chaque nœud ne voit que ses ancêtres</text>
    <text x="700" y="226" class="annotation">Une seule matrice Q·Kᵀ, un masque spécifique : les branches</text>
    <text x="700" y="242" class="annotation">parallèles ne se contaminent pas mutuellement.</text>

    <!-- Matrice 8×8 : racine + A1 + A2a + A3 + B1 + B2a + B2b + A2b -->
    <g transform="translate(750 290)">
      <!-- Labels colonnes (Keys) -->
      <text x="0" y="-12" class="nodelabel" fill="#6b6f7c">K →</text>
      <text x="40" y="-8" class="nodelabel" text-anchor="middle">R</text>
      <text x="80" y="-8" class="nodelabel" text-anchor="middle">A1</text>
      <text x="120" y="-8" class="nodelabel" text-anchor="middle">A2a</text>
      <text x="160" y="-8" class="nodelabel" text-anchor="middle">A3</text>
      <text x="200" y="-8" class="nodelabel" text-anchor="middle">B1</text>
      <text x="240" y="-8" class="nodelabel" text-anchor="middle">A2b</text>
      <text x="280" y="-8" class="nodelabel" text-anchor="middle">B2a</text>
      <text x="320" y="-8" class="nodelabel" text-anchor="middle">B2b</text>

      <!-- Labels lignes (Queries) -->
      <text x="-12" y="20" class="nodelabel" fill="#6b6f7c" text-anchor="end">R</text>
      <text x="-12" y="48" class="nodelabel" text-anchor="end">A1</text>
      <text x="-12" y="76" class="nodelabel" text-anchor="end">A2a</text>
      <text x="-12" y="104" class="nodelabel" text-anchor="end">A3</text>
      <text x="-12" y="132" class="nodelabel" text-anchor="end">B1</text>
      <text x="-12" y="160" class="nodelabel" text-anchor="end">A2b</text>
      <text x="-12" y="188" class="nodelabel" text-anchor="end">B2a</text>
      <text x="-12" y="216" class="nodelabel" text-anchor="end">B2b</text>

      <!-- Cellules : 1 = attend (orange), 0 = masqué (sombre), diagonale = self -->
      <!-- Ligne R : voit elle-même seulement -->
      <rect x="20" y="6" width="40" height="28" class="grid-self"/>
      <rect x="60" y="6" width="40" height="28" class="grid-mask"/>
      <rect x="100" y="6" width="40" height="28" class="grid-mask"/>
      <rect x="140" y="6" width="40" height="28" class="grid-mask"/>
      <rect x="180" y="6" width="40" height="28" class="grid-mask"/>
      <rect x="220" y="6" width="40" height="28" class="grid-mask"/>
      <rect x="260" y="6" width="40" height="28" class="grid-mask"/>
      <rect x="300" y="6" width="40" height="28" class="grid-mask"/>

      <!-- Ligne A1 : voit R + A1 -->
      <rect x="20" y="34" width="40" height="28" class="grid-attend"/>
      <rect x="60" y="34" width="40" height="28" class="grid-self"/>
      <rect x="100" y="34" width="40" height="28" class="grid-mask"/>
      <rect x="140" y="34" width="40" height="28" class="grid-mask"/>
      <rect x="180" y="34" width="40" height="28" class="grid-mask"/>
      <rect x="220" y="34" width="40" height="28" class="grid-mask"/>
      <rect x="260" y="34" width="40" height="28" class="grid-mask"/>
      <rect x="300" y="34" width="40" height="28" class="grid-mask"/>

      <!-- Ligne A2a : voit R + A1 + A2a -->
      <rect x="20" y="62" width="40" height="28" class="grid-attend"/>
      <rect x="60" y="62" width="40" height="28" class="grid-attend"/>
      <rect x="100" y="62" width="40" height="28" class="grid-self"/>
      <rect x="140" y="62" width="40" height="28" class="grid-mask"/>
      <rect x="180" y="62" width="40" height="28" class="grid-mask"/>
      <rect x="220" y="62" width="40" height="28" class="grid-mask"/>
      <rect x="260" y="62" width="40" height="28" class="grid-mask"/>
      <rect x="300" y="62" width="40" height="28" class="grid-mask"/>

      <!-- Ligne A3 : voit R + A1 + A2a + A3 -->
      <rect x="20" y="90" width="40" height="28" class="grid-attend"/>
      <rect x="60" y="90" width="40" height="28" class="grid-attend"/>
      <rect x="100" y="90" width="40" height="28" class="grid-attend"/>
      <rect x="140" y="90" width="40" height="28" class="grid-self"/>
      <rect x="180" y="90" width="40" height="28" class="grid-mask"/>
      <rect x="220" y="90" width="40" height="28" class="grid-mask"/>
      <rect x="260" y="90" width="40" height="28" class="grid-mask"/>
      <rect x="300" y="90" width="40" height="28" class="grid-mask"/>

      <!-- Ligne B1 : voit R + B1 -->
      <rect x="20" y="118" width="40" height="28" class="grid-attend"/>
      <rect x="60" y="118" width="40" height="28" class="grid-mask"/>
      <rect x="100" y="118" width="40" height="28" class="grid-mask"/>
      <rect x="140" y="118" width="40" height="28" class="grid-mask"/>
      <rect x="180" y="118" width="40" height="28" class="grid-self"/>
      <rect x="220" y="118" width="40" height="28" class="grid-mask"/>
      <rect x="260" y="118" width="40" height="28" class="grid-mask"/>
      <rect x="300" y="118" width="40" height="28" class="grid-mask"/>

      <!-- Ligne A2b : voit R + A1 + A2b -->
      <rect x="20" y="146" width="40" height="28" class="grid-attend"/>
      <rect x="60" y="146" width="40" height="28" class="grid-attend"/>
      <rect x="100" y="146" width="40" height="28" class="grid-mask"/>
      <rect x="140" y="146" width="40" height="28" class="grid-mask"/>
      <rect x="180" y="146" width="40" height="28" class="grid-mask"/>
      <rect x="220" y="146" width="40" height="28" class="grid-self"/>
      <rect x="260" y="146" width="40" height="28" class="grid-mask"/>
      <rect x="300" y="146" width="40" height="28" class="grid-mask"/>

      <!-- Ligne B2a : voit R + B1 + B2a -->
      <rect x="20" y="174" width="40" height="28" class="grid-attend"/>
      <rect x="60" y="174" width="40" height="28" class="grid-mask"/>
      <rect x="100" y="174" width="40" height="28" class="grid-mask"/>
      <rect x="140" y="174" width="40" height="28" class="grid-mask"/>
      <rect x="180" y="174" width="40" height="28" class="grid-attend"/>
      <rect x="220" y="174" width="40" height="28" class="grid-mask"/>
      <rect x="260" y="174" width="40" height="28" class="grid-self"/>
      <rect x="300" y="174" width="40" height="28" class="grid-mask"/>

      <!-- Ligne B2b : voit R + B1 + B2b -->
      <rect x="20" y="202" width="40" height="28" class="grid-attend"/>
      <rect x="60" y="202" width="40" height="28" class="grid-mask"/>
      <rect x="100" y="202" width="40" height="28" class="grid-mask"/>
      <rect x="140" y="202" width="40" height="28" class="grid-mask"/>
      <rect x="180" y="202" width="40" height="28" class="grid-attend"/>
      <rect x="220" y="202" width="40" height="28" class="grid-mask"/>
      <rect x="260" y="202" width="40" height="28" class="grid-mask"/>
      <rect x="300" y="202" width="40" height="28" class="grid-self"/>

      <!-- Grille -->
      <g stroke="rgba(30,30,44,0.18)" stroke-width="0.8" fill="none">
        <rect x="20" y="6" width="320" height="224"/>
      </g>
    </g>

    <!-- Légende couleurs -->
    <g transform="translate(700 555)">
      <rect x="0" y="0" width="16" height="16" class="grid-self"/>
      <text x="22" y="13" class="annotation">position courante (self)</text>
      <rect x="0" y="24" width="16" height="16" class="grid-attend"/>
      <text x="22" y="37" class="annotation">attendu (ancêtre dans l'arbre)</text>
      <rect x="0" y="48" width="16" height="16" class="grid-mask"/>
      <text x="22" y="61" class="annotation">masqué (branche concurrente)</text>
    </g>
  </g>

  <text x="80" y="700" class="caption">Lecture : Medusa, EAGLE et TensorRT-LLM utilisent ce schéma. Le tree mask est calculé une fois par étape, partagé entre toutes les têtes.</text>
  <text x="80" y="718" class="caption">Le tree dynamique (EAGLE-2/3) ajuste la largeur et la profondeur à la confiance courante du draft.</text>
  <text x="80" y="745" class="caption">Sources — Cai et al. <tspan font-style="italic">Medusa</tspan> (ICML 2024) ; Li et al. <tspan font-style="italic">EAGLE-2</tspan> (2024) ; documentation TensorRT-LLM tree decoding.</text>
</svg>
