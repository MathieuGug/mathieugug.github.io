<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-04">
  <title id="title-04">Acceptance rate selon le domaine</title>
  <defs>
    <style>
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .col-title{font:600 18px/1.15 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .body-label{font:500 14px/1.4 'Inter',sans-serif;fill:#1e1e2a}
      .annotation{font:400 12.5px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .tick{font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#9a9ca5}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .axis-label{font:500 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c;text-transform:uppercase}
      .frame{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .axis{stroke:rgba(30,30,44,0.30);stroke-width:1;fill:none}
      .bar-high{fill:#1a5c6b}
      .bar-mid{fill:#b8582e}
      .bar-low{fill:rgba(184,88,46,0.5)}
      .bar-loss{fill:#a83e55}
      .ref-line{stroke:#a83e55;stroke-width:1.4;stroke-dasharray:5 4;fill:none}
    </style>
    <marker id="ar04" markerWidth="9" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="rgba(30,30,44,0.55)"/>
    </marker>
  </defs>

  <rect width="1200" height="740" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 04</text>
  <text x="80" y="62" class="title">Le speedup paie plein pot — ou pas du tout</text>
  <text x="80" y="92" class="subtitle">Acceptance rate α et speedup effectif par domaine. Sous α ≈ 30 %, la spéculation devient perte nette.</text>

  <!-- Cadre graphique -->
  <rect x="80" y="140" width="1040" height="430" rx="6" class="frame"/>

  <!-- Axes -->
  <line x1="170" y1="510" x2="1080" y2="510" class="axis"/>
  <line x1="170" y1="180" x2="170" y2="510" class="axis"/>

  <!-- Y-axis ticks (acceptance rate, 0 → 100%) -->
  <g>
    <text x="160" y="514" class="tick" text-anchor="end">0 %</text>
    <text x="160" y="447" class="tick" text-anchor="end">25 %</text>
    <text x="160" y="380" class="tick" text-anchor="end">50 %</text>
    <text x="160" y="313" class="tick" text-anchor="end">75 %</text>
    <text x="160" y="246" class="tick" text-anchor="end">100 %</text>

    <line x1="165" y1="510" x2="170" y2="510" class="axis"/>
    <line x1="165" y1="443" x2="170" y2="443" class="axis"/>
    <line x1="165" y1="376" class="axis" x2="170" y2="376"/>
    <line x1="165" y1="309" x2="170" y2="309" class="axis"/>
    <line x1="165" y1="242" x2="170" y2="242" class="axis"/>

    <text x="92" y="345" class="axis-label" transform="rotate(-90 92 345)" text-anchor="middle">α — ACCEPTANCE RATE</text>
  </g>

  <!-- Reference line at α = 0.30 (perte nette) -->
  <line x1="170" y1="429" x2="1080" y2="429" class="ref-line"/>
  <text x="1086" y="433" class="annotation" fill="#a83e55">α = 30 % · seuil perte nette</text>

  <!-- Reference line at α = 0.50 (gain marginal) -->
  <line x1="170" y1="376" x2="1080" y2="376" class="ref-line" stroke="rgba(107,111,124,0.5)"/>
  <text x="1086" y="380" class="annotation" fill="#9a9ca5">α = 50 %</text>

  <!-- Bars : 6 domaines -->
  <!-- 1. Code -->
  <g class="interactive" data-region="domain-code">
    <rect x="220" y="296" width="100" height="214" class="bar-high"/>
    <text x="270" y="288" class="body-label" text-anchor="middle" fill="#1a5c6b" font-weight="600">α ≈ 80 %</text>
    <text x="270" y="525" class="annotation" text-anchor="middle">CODE</text>
    <text x="270" y="542" class="tick" text-anchor="middle">3,8× speedup</text>
  </g>

  <!-- 2. Q&A factuel / résumé -->
  <g class="interactive" data-region="domain-summary">
    <rect x="356" y="336" width="100" height="174" class="bar-high"/>
    <text x="406" y="328" class="body-label" text-anchor="middle" fill="#1a5c6b" font-weight="600">α ≈ 65 %</text>
    <text x="406" y="525" class="annotation" text-anchor="middle">RÉSUMÉ / Q&amp;A</text>
    <text x="406" y="542" class="tick" text-anchor="middle">2,8× speedup</text>
  </g>

  <!-- 3. Traduction -->
  <g>
    <rect x="492" y="349" width="100" height="161" class="bar-mid"/>
    <text x="542" y="341" class="body-label" text-anchor="middle" fill="#b8582e" font-weight="600">α ≈ 60 %</text>
    <text x="542" y="525" class="annotation" text-anchor="middle">TRADUCTION</text>
    <text x="542" y="542" class="tick" text-anchor="middle">2,4× speedup</text>
  </g>

  <!-- 4. Créatif (haute T°) -->
  <g class="interactive" data-region="domain-creative">
    <rect x="628" y="389" width="100" height="121" class="bar-low"/>
    <text x="678" y="381" class="body-label" text-anchor="middle" fill="#b8582e" font-weight="600">α ≈ 45 %</text>
    <text x="678" y="525" class="annotation" text-anchor="middle">CRÉATIF (T° 0,9)</text>
    <text x="678" y="542" class="tick" text-anchor="middle">1,5× speedup</text>
  </g>

  <!-- 5. Drift / cold -->
  <g class="interactive" data-region="domain-cold">
    <rect x="764" y="436" width="100" height="74" class="bar-loss"/>
    <text x="814" y="428" class="body-label" text-anchor="middle" fill="#a83e55" font-weight="600">α ≈ 28 %</text>
    <text x="814" y="525" class="annotation" text-anchor="middle">DRIFT DOMAINE</text>
    <text x="814" y="542" class="tick" text-anchor="middle">0,9× — perte nette</text>
  </g>

  <!-- 6. Adversarial / OOD -->
  <g>
    <rect x="900" y="463" width="100" height="47" class="bar-loss"/>
    <text x="950" y="455" class="body-label" text-anchor="middle" fill="#a83e55" font-weight="600">α ≈ 18 %</text>
    <text x="950" y="525" class="annotation" text-anchor="middle">OUT-OF-DIST.</text>
    <text x="950" y="542" class="tick" text-anchor="middle">0,7× — fort coût</text>
  </g>

  <text x="600" y="565" class="axis-label" text-anchor="middle">DOMAINE DE LA RÉPONSE GÉNÉRÉE</text>

  <!-- Annotations latérales -->
  <g>
    <text x="80" y="600" class="body-label" font-weight="600">Trois facteurs gouvernent α en production :</text>
    <text x="80" y="624" class="annotation"><tspan fill="#1e1e2a" font-weight="600">1 · Le domaine</tspan> — code &gt;&gt; prose informative &gt;&gt; génération créative.</text>
    <text x="80" y="644" class="annotation"><tspan fill="#1e1e2a" font-weight="600">2 · La température et le sampling</tspan> — T° élevée + top-p désaccordé entre draft et target = effondrement silencieux.</text>
    <text x="80" y="664" class="annotation"><tspan fill="#1e1e2a" font-weight="600">3 · Le drift</tspan> — un draft pré-2024 sur prompts agentiques 2026 perd 15–25 points d'α en quelques mois.</text>
  </g>

  <text x="80" y="700" class="caption">Lecture : sous α ≈ 30 %, le surcoût du drafting et de la vérification dépasse le gain. La spéculation devient perte nette.</text>
  <text x="80" y="718" class="caption">Sources — chiffres calibrés sur Together AI benchmarks ; EAGLE-3 paper (2025) ; vLLM telemetry guides ; Xia et al. survey (ACL 2024).</text>
</svg>
