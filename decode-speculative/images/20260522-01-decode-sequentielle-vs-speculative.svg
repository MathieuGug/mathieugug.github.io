<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-01">
  <title id="title-01">Décode séquentielle vs spéculative : anatomie temporelle</title>
  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .col-title{font:600 22px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .body-label{font:500 15px/1.3 'Inter',sans-serif;fill:#1e1e2a}
      .annotation{font:400 13px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .tick{font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:0.08em;fill:#9a9ca5}
      .axis-label{font:500 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c;text-transform:uppercase}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .frame{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .frame-spec{fill:#fbf3e5;stroke:rgba(30,30,44,0.22);stroke-width:1.2}
      .token-target{fill:#b8582e}
      .token-draft{fill:rgba(184,88,46,0.32);stroke:#b8582e;stroke-width:1}
      .token-accepted{fill:#1a5c6b}
      .token-rejected{fill:#a83e55;opacity:0.55}
      .arrow{stroke:rgba(30,30,44,0.55);stroke-width:1.2;fill:none}
      .axis{stroke:rgba(30,30,44,0.30);stroke-width:1;fill:none}
    </style>
    <marker id="ar01" markerWidth="9" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="rgba(30,30,44,0.55)"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 01</text>
  <text x="80" y="62" class="title">Décoder un token à la fois — ou en paquet</text>
  <text x="80" y="92" class="subtitle">À gauche, la décode autoregressive standard. À droite, la version spéculative : un draft propose K tokens, le target les valide en un seul forward.</text>

  <!-- Colonne gauche : séquentielle -->
  <g class="interactive" data-region="seq-loop">
    <rect x="80" y="140" width="510" height="520" rx="6" class="frame"/>
    <text x="100" y="172" class="col-eyebrow">A · DÉCODE AUTOREGRESSIVE</text>
    <text x="100" y="206" class="col-title">Un token, un forward target</text>
    <text x="100" y="234" class="annotation">Chaque token N exige la sortie du token N−1.</text>
    <text x="100" y="252" class="annotation">Memory-bound : la HBM est le goulot, les tensor cores sous-utilisés.</text>

    <!-- Axe temps vertical -->
    <text x="106" y="290" class="axis-label">TEMPS</text>
    <line x1="138" y1="298" x2="138" y2="618" class="axis" marker-end="url(#ar01)"/>

    <!-- 6 forwards target en séquence -->
    <g>
      <rect x="160" y="305" width="380" height="38" rx="3" class="token-target"/>
      <text x="180" y="329" class="body-label" fill="#faf6ec">forward target · token 1</text>
      <text x="552" y="329" class="tick" text-anchor="end" fill="#faf6ec">≈ 40 ms</text>
    </g>
    <g>
      <rect x="160" y="355" width="380" height="38" rx="3" class="token-target"/>
      <text x="180" y="379" class="body-label" fill="#faf6ec">forward target · token 2</text>
      <text x="552" y="379" class="tick" text-anchor="end" fill="#faf6ec">≈ 40 ms</text>
    </g>
    <g>
      <rect x="160" y="405" width="380" height="38" rx="3" class="token-target"/>
      <text x="180" y="429" class="body-label" fill="#faf6ec">forward target · token 3</text>
      <text x="552" y="429" class="tick" text-anchor="end" fill="#faf6ec">≈ 40 ms</text>
    </g>
    <g>
      <rect x="160" y="455" width="380" height="38" rx="3" class="token-target"/>
      <text x="180" y="479" class="body-label" fill="#faf6ec">forward target · token 4</text>
      <text x="552" y="479" class="tick" text-anchor="end" fill="#faf6ec">≈ 40 ms</text>
    </g>
    <g>
      <rect x="160" y="505" width="380" height="38" rx="3" class="token-target"/>
      <text x="180" y="529" class="body-label" fill="#faf6ec">forward target · token 5</text>
      <text x="552" y="529" class="tick" text-anchor="end" fill="#faf6ec">≈ 40 ms</text>
    </g>
    <g>
      <rect x="160" y="555" width="380" height="38" rx="3" class="token-target"/>
      <text x="180" y="579" class="body-label" fill="#faf6ec">forward target · token 6</text>
      <text x="552" y="579" class="tick" text-anchor="end" fill="#faf6ec">≈ 40 ms</text>
    </g>

    <text x="100" y="625" class="annotation"><tspan font-weight="600" fill="#1e1e2a">Total · 6 tokens ≈ 240 ms</tspan></text>
    <text x="100" y="645" class="caption">Llama 3.1 70B, H100, batch 1, FP16. Ordres de grandeur.</text>
  </g>

  <!-- Colonne droite : spéculative -->
  <g>
    <rect x="610" y="140" width="510" height="520" rx="6" class="frame-spec"/>
    <text x="630" y="172" class="col-eyebrow">B · DÉCODE SPÉCULATIVE</text>
    <text x="630" y="206" class="col-title">K tokens drafted, 1 forward target</text>
    <text x="630" y="234" class="annotation">Le draft (10–100× plus petit) propose K tokens rapides.</text>
    <text x="630" y="252" class="annotation">Le target les vérifie tous en un seul forward parallèle.</text>

    <text x="636" y="290" class="axis-label">TEMPS</text>
    <line x1="668" y1="298" x2="668" y2="618" class="axis" marker-end="url(#ar01)"/>

    <!-- Étape 1 : drafting -->
    <g class="interactive" data-region="spec-draft">
      <rect x="690" y="305" width="60" height="22" rx="2" class="token-draft"/>
      <text x="720" y="320" class="tick" text-anchor="middle">draft 1</text>
      <rect x="755" y="305" width="60" height="22" rx="2" class="token-draft"/>
      <text x="785" y="320" class="tick" text-anchor="middle">draft 2</text>
      <rect x="820" y="305" width="60" height="22" rx="2" class="token-draft"/>
      <text x="850" y="320" class="tick" text-anchor="middle">draft 3</text>
      <rect x="885" y="305" width="60" height="22" rx="2" class="token-draft"/>
      <text x="915" y="320" class="tick" text-anchor="middle">draft 4</text>
      <rect x="950" y="305" width="60" height="22" rx="2" class="token-draft"/>
      <text x="980" y="320" class="tick" text-anchor="middle">draft 5</text>
      <text x="1085" y="320" class="annotation" text-anchor="end" fill="#6b6f7c">≈ 8 ms total</text>
    </g>

    <text x="690" y="358" class="annotation">↓ envoi des K=5 tokens au target</text>

    <!-- Étape 2 : verification -->
    <g class="interactive" data-region="spec-verify">
      <rect x="690" y="375" width="395" height="42" rx="3" class="token-target"/>
      <text x="710" y="402" class="body-label" fill="#faf6ec">forward target unique · vérifie 6 positions en parallèle</text>
    </g>
    <text x="1085" y="402" class="annotation" text-anchor="end" fill="#6b6f7c">≈ 45 ms</text>

    <!-- Étape 3 : accept/reject -->
    <g class="interactive" data-region="spec-accept">
      <text x="690" y="450" class="body-label">Accept/Reject (Leviathan rule)</text>
      <text x="690" y="470" class="annotation">accept_with_prob(min(1, p_target / p_draft))</text>

      <!-- Bandeau résultat -->
      <rect x="690" y="490" width="60" height="22" rx="2" class="token-accepted"/>
      <text x="720" y="505" class="tick" text-anchor="middle" fill="#faf6ec">accept</text>
      <rect x="755" y="490" width="60" height="22" rx="2" class="token-accepted"/>
      <text x="785" y="505" class="tick" text-anchor="middle" fill="#faf6ec">accept</text>
      <rect x="820" y="490" width="60" height="22" rx="2" class="token-accepted"/>
      <text x="850" y="505" class="tick" text-anchor="middle" fill="#faf6ec">accept</text>
      <rect x="885" y="490" width="60" height="22" rx="2" class="token-accepted"/>
      <text x="915" y="505" class="tick" text-anchor="middle" fill="#faf6ec">accept</text>
      <rect x="950" y="490" width="60" height="22" rx="2" class="token-rejected"/>
      <text x="980" y="505" class="tick" text-anchor="middle" fill="#faf6ec">reject</text>

      <text x="690" y="540" class="annotation">α = 4/5 = 80 % d'acceptance ; le token 5 est rééchantillonné.</text>
      <text x="690" y="558" class="annotation">Le token 6 (bonus) est tiré frais depuis la sortie target à la position K+1.</text>
    </g>

    <text x="630" y="610" class="annotation"><tspan font-weight="600" fill="#1e1e2a">Total · 5 tokens utiles ≈ 53 ms</tspan></text>
    <text x="630" y="630" class="annotation"><tspan font-weight="600" fill="#b8582e">Speedup ≈ 3,8× sur cet exemple.</tspan></text>
    <text x="630" y="645" class="caption">Speedup réel : (1 + α + α² + … + α^K) × (T_target / (T_target + K·T_draft + T_verify)).</text>
  </g>

  <text x="80" y="700" class="caption">Lecture : la spéculation transforme K forwards memory-bound en 1 forward compute-bound. Elle exploite le slack compute du GPU pendant la décode.</text>
  <text x="80" y="718" class="caption">Le théorème d'équivalence (Leviathan 2022) garantit que la distribution de sortie est strictement identique à la décode autoregressive standard.</text>
  <text x="80" y="745" class="caption">Sources — Leviathan, Kalman, Matias (Google Research, 2022) ; Chen et al. (DeepMind, 2023) ; documentation vLLM speculative decoding.</text>
</svg>
