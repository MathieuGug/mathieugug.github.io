<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-01">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <!-- Background paper -->
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER STRIP -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Le déficit d'apprentissage</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">Trois mesures qui expliquent pourquoi la mémoire est devenue le goulot d'étranglement</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ═══════════════ PANEL 1 — MIT NANDA ═══════════════ -->
  <g class="interactive" data-card="mit-nanda" tabindex="0" role="button"
     aria-label="MIT NANDA — cliquez pour les détails">
    <rect x="60" y="170" width="345" height="510" rx="3" fill="#FAF8F3"
          stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="200" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.08em" fill="#5A5A5A">PANEL A · MIT NANDA · JUILLET 2025</text>
    <text x="80" y="232" class="display" font-size="18" font-weight="600" fill="#1A1A1A">
      Le « GenAI Divide »
    </text>
    <text x="80" y="254" class="body" font-size="12" font-style="italic" fill="#5A5A5A">
      Pilotes GenAI livrant un ROI mesurable
    </text>

    <!-- Big number -->
    <text x="80" y="350" class="display" font-size="92" font-weight="600"
          letter-spacing="-0.04em" fill="#B7332C">5%</text>
    <text x="80" y="380" class="body" font-size="11" fill="#5A5A5A">
      des entreprises constatent un impact mesurable
    </text>
    <text x="80" y="400" class="body" font-size="11" fill="#5A5A5A">
      sur leur P&amp;L après 12+ mois de déploiement
    </text>

    <!-- Bar viz: 5% vs 95% -->
    <text x="80" y="450" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#5A5A5A">RÉPARTITION DES PILOTES</text>
    <rect x="80" y="460" width="305" height="22" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="0.5"/>
    <rect x="80" y="460" width="15.25" height="22" fill="#B7332C"/>
    <rect x="95.25" y="460" width="289.75" height="22" fill="#E5E1D8"/>
    <text x="89" y="500" class="mono" font-size="10" fill="#B7332C">5% RAPID ROI</text>
    <text x="385" y="500" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">95% NO MEASURABLE IMPACT</text>

    <!-- Stats -->
    <text x="80" y="555" class="mono" font-size="11" font-weight="500" fill="#1A1A1A">$30–40 Md$</text>
    <text x="80" y="572" class="body" font-size="11" fill="#5A5A5A">investis en GenAI à mi-2025</text>

    <text x="80" y="600" class="mono" font-size="11" font-weight="500" fill="#1A1A1A">300 déploiements publics</text>
    <text x="80" y="617" class="body" font-size="11" fill="#5A5A5A">analysés · 52 entretiens · 153 dirigeants</text>

    <text x="80" y="650" class="display" font-size="11" font-style="italic" fill="#1F5560">
      « Le facteur central n'est ni le modèle,
    </text>
    <text x="80" y="666" class="display" font-size="11" font-style="italic" fill="#1F5560">
      ni la régulation, ni le talent — c'est
    </text>
    <text x="80" y="682" class="display" font-size="11" font-style="italic" fill="#1F5560">
      l'absence de mémoire et d'apprentissage. »
    </text>
  </g>

  <!-- ═══════════════ PANEL 2 — GARTNER ═══════════════ -->
  <g class="interactive" data-card="gartner" tabindex="0" role="button"
     aria-label="Gartner — cliquez pour les détails">
    <rect x="427" y="170" width="345" height="510" rx="3" fill="#FAF8F3"
          stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="447" y="200" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.08em" fill="#5A5A5A">PANEL B · GARTNER · JUIN 2025</text>
    <text x="447" y="232" class="display" font-size="18" font-weight="600" fill="#1A1A1A">
      L'abandon annoncé
    </text>
    <text x="447" y="254" class="body" font-size="12" font-style="italic" fill="#5A5A5A">
      Projets agentiques canceled d'ici fin 2027
    </text>

    <!-- Donut chart -->
    <g transform="translate(599, 410)">
      <circle cx="0" cy="0" r="100" fill="none" stroke="#E5E1D8" stroke-width="22"/>
      <!-- 40% arc: from -90deg to +54deg (40% of 360 = 144deg) -->
      <path d="M 0 -100 A 100 100 0 0 1 95.106 -30.902 A 100 100 0 0 1 58.779 80.902"
            fill="none" stroke="#B7332C" stroke-width="22"/>
      <text x="0" y="-2" class="display" font-size="42" font-weight="600"
            letter-spacing="-0.03em" fill="#1A1A1A" text-anchor="middle">40%+</text>
      <text x="0" y="22" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">
        canceled
      </text>
    </g>

    <!-- Causes -->
    <text x="447" y="555" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#5A5A5A">TROIS CAUSES IDENTIFIÉES</text>
    <line x1="447" y1="565" x2="752" y2="565" stroke="#B8B5AE" stroke-width="0.5"/>

    <circle cx="455" cy="585" r="3" fill="#B7332C"/>
    <text x="467" y="589" class="body" font-size="11" fill="#1A1A1A">Coûts incontrôlés</text>

    <circle cx="455" cy="610" r="3" fill="#B7332C"/>
    <text x="467" y="614" class="body" font-size="11" fill="#1A1A1A">Valeur business floue</text>

    <circle cx="455" cy="635" r="3" fill="#B7332C"/>
    <text x="467" y="639" class="body" font-size="11" fill="#1A1A1A">Contrôles de risque inadéquats</text>

    <text x="447" y="676" class="display" font-size="11" font-style="italic" fill="#5A5A5A">
      130 vendors « réels » sur des milliers — « agent washing »
    </text>
  </g>

  <!-- ═══════════════ PANEL 3 — REASONING IN HAYSTACK ═══════════════ -->
  <g class="interactive" data-card="haystack" tabindex="0" role="button"
     aria-label="Reasoning in haystack — cliquez pour les détails">
    <rect x="794" y="170" width="345" height="510" rx="3" fill="#FAF8F3"
          stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="814" y="200" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.08em" fill="#5A5A5A">PANEL C · SHANG ET AL. · 2024</text>
    <text x="814" y="232" class="display" font-size="18" font-weight="600" fill="#1A1A1A">
      Le contexte long ne suffit pas
    </text>
    <text x="814" y="254" class="body" font-size="12" font-style="italic" fill="#5A5A5A">
      Précision vs longueur du contexte (reasoning-in-a-haystack)
    </text>

    <!-- Chart axes -->
    <g transform="translate(840, 290)">
      <!-- Y axis -->
      <line x1="0" y1="0" x2="0" y2="240" stroke="#1A1A1A" stroke-width="1"/>
      <!-- X axis -->
      <line x1="0" y1="240" x2="280" y2="240" stroke="#1A1A1A" stroke-width="1"/>

      <!-- Y ticks -->
      <text x="-8" y="4" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">100%</text>
      <text x="-8" y="64" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">75%</text>
      <text x="-8" y="124" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">50%</text>
      <text x="-8" y="184" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">25%</text>
      <text x="-8" y="244" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">0%</text>

      <!-- Gridlines -->
      <line x1="0" y1="0" x2="280" y2="0" stroke="#E5E1D8" stroke-width="0.5"/>
      <line x1="0" y1="60" x2="280" y2="60" stroke="#E5E1D8" stroke-width="0.5"/>
      <line x1="0" y1="120" x2="280" y2="120" stroke="#E5E1D8" stroke-width="0.5"/>
      <line x1="0" y1="180" x2="280" y2="180" stroke="#E5E1D8" stroke-width="0.5"/>

      <!-- X ticks -->
      <text x="0" y="258" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">8K</text>
      <text x="70" y="258" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">32K</text>
      <text x="140" y="258" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">128K</text>
      <text x="210" y="258" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">512K</text>
      <text x="280" y="258" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">2M</text>

      <!-- Curve: retrieval (stays high) -->
      <path d="M 0 25 Q 70 28, 140 35 T 280 70" fill="none" stroke="#1F5560"
            stroke-width="1.75" stroke-dasharray="4 3"/>
      <text x="265" y="78" class="mono" font-size="9" fill="#1F5560" text-anchor="end">retrieval pur</text>

      <!-- Curve: reasoning (drops fast) -->
      <path d="M 0 30 Q 70 50, 140 110 T 280 200" fill="none" stroke="#B7332C"
            stroke-width="2.5"/>
      <text x="265" y="195" class="mono" font-size="9" fill="#B7332C" text-anchor="end">retrieval + raisonnement</text>

      <!-- Annotations -->
      <line x1="140" y1="110" x2="140" y2="0" stroke="#5A5A5A" stroke-width="0.5" stroke-dasharray="2 2"/>
      <text x="143" y="-6" class="mono" font-size="9" fill="#5A5A5A">décrochage</text>

      <!-- Axis labels -->
      <text x="140" y="285" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">
        Longueur du contexte (tokens)
      </text>
    </g>

    <text x="814" y="615" class="display" font-size="11" font-style="italic" fill="#1F5560">
      « Le long contexte nuit à la capacité
    </text>
    <text x="814" y="631" class="display" font-size="11" font-style="italic" fill="#1F5560">
      de raisonner et de récupérer
    </text>
    <text x="814" y="647" class="display" font-size="11" font-style="italic" fill="#1F5560">
      simultanément. »
    </text>
    <text x="814" y="676" class="body" font-size="10" fill="#5A5A5A">
      Tendance qualitative — modèles GPT-4, Claude, Gemini
    </text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="715" x2="1140" y2="715" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="745" class="body" font-size="10" font-style="italic" fill="#5A5A5A">
    Sources : MIT NANDA, The GenAI Divide (2025) ; Gartner, communiqué presse, juin 2025 ; Shang et al., AI-native Memory (2024).
  </text>
  <text x="60" y="762" class="body" font-size="10" font-style="italic" fill="#5A5A5A">
    Méthodologie : panneau A — 300 déploiements + 153 dirigeants ; panneau B — sondage 3 412 répondants ; panneau C — reproduction qualitative de la courbe.
  </text>
</svg>
