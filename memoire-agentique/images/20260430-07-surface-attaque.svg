<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-07">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow7" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1A1A1A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Surface d'attaque de la mémoire persistante</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">Chaîne d'attaque en cinq étapes, cas documentés et couches de mitigation</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ─── KILL CHAIN — top band ─── -->
  <text x="60" y="178" class="mono" font-size="10" font-weight="600"
        letter-spacing="0.14em" fill="#5A5A5A">CHAÎNE D'ATTAQUE — KILL CHAIN</text>

  <!-- 5 steps -->
  <!-- Step 1 RECON -->
  <g class="interactive" data-card="recon" tabindex="0" role="button"
     aria-label="Étape 1 — Reconnaissance">
    <rect x="60" y="195" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="75" y="218" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.1em" fill="#B7332C">01 · RECON</text>
    <text x="75" y="240" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Reconnaissance</text>
    <text x="75" y="258" class="body" font-size="10" fill="#5A5A5A">Repérage des canaux</text>
    <text x="75" y="270" class="body" font-size="10" fill="#5A5A5A">d'ingestion : web, mail,</text>
  </g>

  <!-- Step 2 INJECT -->
  <g class="interactive" data-card="inject" tabindex="0" role="button"
     aria-label="Étape 2 — Injection">
    <rect x="280" y="195" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="295" y="218" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.1em" fill="#B7332C">02 · INJECT</text>
    <text x="295" y="240" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Injection indirecte</text>
    <text x="295" y="258" class="body" font-size="10" fill="#5A5A5A">Charge utile dans un</text>
    <text x="295" y="270" class="body" font-size="10" fill="#5A5A5A">contenu légitime ingéré</text>
  </g>

  <!-- Step 3 PERSIST -->
  <g class="interactive" data-card="persist" tabindex="0" role="button"
     aria-label="Étape 3 — Persistance">
    <rect x="500" y="195" width="200" height="80" rx="3"
          fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1"/>
    <text x="515" y="218" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.1em" fill="#FAF8F3">03 · PERSIST</text>
    <text x="515" y="240" class="display" font-size="14" font-weight="600" fill="#FAF8F3">Persistance mémoire</text>
    <text x="515" y="258" class="body" font-size="10" fill="#FAF8F3">Écriture via outil bio,</text>
    <text x="515" y="270" class="body" font-size="10" fill="#FAF8F3">CLAUDE.md, Personal Context</text>
  </g>

  <!-- Step 4 ACTIVATE -->
  <g class="interactive" data-card="activate" tabindex="0" role="button"
     aria-label="Étape 4 — Activation">
    <rect x="720" y="195" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="735" y="218" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.1em" fill="#B7332C">04 · ACTIVATE</text>
    <text x="735" y="240" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Activation différée</text>
    <text x="735" y="258" class="body" font-size="10" fill="#5A5A5A">Trigger par mot-clé,</text>
    <text x="735" y="270" class="body" font-size="10" fill="#5A5A5A">condition ou délai</text>
  </g>

  <!-- Step 5 EXFIL -->
  <g class="interactive" data-card="exfiltrate" tabindex="0" role="button"
     aria-label="Étape 5 — Exfiltration">
    <rect x="940" y="195" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="955" y="218" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.1em" fill="#B7332C">05 · EXFILTRATE</text>
    <text x="955" y="240" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Exfiltration silencieuse</text>
    <text x="955" y="258" class="body" font-size="10" fill="#5A5A5A">Transmission vers serveur</text>
    <text x="955" y="270" class="body" font-size="10" fill="#5A5A5A">attaquant à chaque session</text>
  </g>

  <!-- Arrows between steps -->
  <line x1="262" y1="235" x2="278" y2="235" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arrow7)"/>
  <line x1="482" y1="235" x2="498" y2="235" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arrow7)"/>
  <line x1="702" y1="235" x2="718" y2="235" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arrow7)"/>
  <line x1="922" y1="235" x2="938" y2="235" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arrow7)"/>

  <!-- ─── DOCUMENTED ATTACKS — middle band ─── -->
  <text x="60" y="320" class="mono" font-size="10" font-weight="600"
        letter-spacing="0.14em" fill="#5A5A5A">CAS DOCUMENTÉS — MITRE ATLAS AML.T0080</text>

  <line x1="60" y1="335" x2="1140" y2="335" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- 4 attack tiles -->
  <g class="interactive" data-card="spaiware" tabindex="0" role="button"
     aria-label="SpAIware — Rehberger, septembre 2024">
    <rect x="60" y="355" width="250" height="135" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="75" y="378" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.08em" fill="#B7332C">SEPT. 2024 · CHATGPT</text>
    <text x="75" y="402" class="display" font-size="18" font-weight="600" fill="#1A1A1A">SpAIware</text>
    <text x="75" y="424" class="body" font-size="10.5" fill="#5A5A5A">Rehberger documente la première</text>
    <text x="75" y="438" class="body" font-size="10.5" fill="#5A5A5A">chaîne complète d'injection</text>
    <text x="75" y="452" class="body" font-size="10.5" fill="#5A5A5A">indirecte vers la mémoire long</text>
    <text x="75" y="466" class="body" font-size="10.5" fill="#5A5A5A">terme de ChatGPT macOS via</text>
    <text x="75" y="480" class="body" font-size="10.5" fill="#5A5A5A">l'outil bio.</text>
  </g>

  <g class="interactive" data-card="delayed-tool" tabindex="0" role="button"
     aria-label="Delayed Tool Invocation — Gemini, février 2025">
    <rect x="330" y="355" width="250" height="135" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="345" y="378" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.08em" fill="#B7332C">FÉV. 2025 · GEMINI</text>
    <text x="345" y="402" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Delayed Tool</text>
    <text x="345" y="424" class="body" font-size="10.5" fill="#5A5A5A">Variante Gemini Advanced :</text>
    <text x="345" y="438" class="body" font-size="10.5" fill="#5A5A5A">l'instruction est armée pour</text>
    <text x="345" y="452" class="body" font-size="10.5" fill="#5A5A5A">se déclencher sur des mots-clés</text>
    <text x="345" y="466" class="body" font-size="10.5" fill="#5A5A5A">futurs (yes, no, sure), pas</text>
    <text x="345" y="480" class="body" font-size="10.5" fill="#5A5A5A">à l'ingestion.</text>
  </g>

  <g class="interactive" data-card="shadowleak" tabindex="0" role="button"
     aria-label="ShadowLeak — Deep Research, septembre 2025">
    <rect x="600" y="355" width="250" height="135" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="615" y="378" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.08em" fill="#B7332C">SEPT. 2025 · OPENAI</text>
    <text x="615" y="402" class="display" font-size="18" font-weight="600" fill="#1A1A1A">ShadowLeak</text>
    <text x="615" y="424" class="body" font-size="10.5" fill="#5A5A5A">Détournement du Deep Research</text>
    <text x="615" y="438" class="body" font-size="10.5" fill="#5A5A5A">d'OpenAI : un agent autonome</text>
    <text x="615" y="452" class="body" font-size="10.5" fill="#5A5A5A">parcourant des sources reçoit</text>
    <text x="615" y="466" class="body" font-size="10.5" fill="#5A5A5A">l'injection puis la stocke en</text>
    <text x="615" y="480" class="body" font-size="10.5" fill="#5A5A5A">mémoire.</text>
  </g>

  <g class="interactive" data-card="hyperlink-leak" tabindex="0" role="button"
     aria-label="Single hyperlink leak — ChatGPT, 2026">
    <rect x="870" y="355" width="270" height="135" rx="3"
          fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="885" y="378" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.08em" fill="#B7332C">MARS 2026 · CHATGPT</text>
    <text x="885" y="402" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Single hyperlink leak</text>
    <text x="885" y="424" class="body" font-size="10.5" fill="#5A5A5A">Une chaîne SSRF + injection +</text>
    <text x="885" y="438" class="body" font-size="10.5" fill="#5A5A5A">mémoire persistante : un seul</text>
    <text x="885" y="452" class="body" font-size="10.5" fill="#5A5A5A">lien suffit. Plusieurs mois pour</text>
    <text x="885" y="466" class="body" font-size="10.5" fill="#5A5A5A">qu'OpenAI publie un correctif</text>
    <text x="885" y="480" class="body" font-size="10.5" fill="#5A5A5A">complet.</text>
  </g>

  <!-- ─── MITIGATION LAYERS — bottom band ─── -->
  <text x="60" y="540" class="mono" font-size="10" font-weight="600"
        letter-spacing="0.14em" fill="#5A5A5A">COUCHES DE MITIGATION — DÉFENSE EN PROFONDEUR</text>

  <line x1="60" y1="555" x2="1140" y2="555" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- 4 mitigation columns -->
  <g class="interactive" data-card="mitig-infra" tabindex="0" role="button"
     aria-label="Mitigation infrastructure">
    <rect x="60" y="575" width="250" height="180" rx="3"
          fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="75" y="598" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.08em" fill="#1F5560">COUCHE 1 · INFRA</text>
    <text x="75" y="622" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Sandboxing &amp; logs</text>
    <line x1="75" y1="638" x2="125" y2="638" stroke="#1F5560" stroke-width="1"/>
    <text x="75" y="662" class="body" font-size="10.5" fill="#5A5A5A">Sandbox des outils mémoire</text>
    <text x="75" y="678" class="body" font-size="10.5" fill="#5A5A5A">Validation explicite avant</text>
    <text x="75" y="694" class="body" font-size="10.5" fill="#5A5A5A">écriture</text>
    <text x="75" y="714" class="body" font-size="10.5" fill="#5A5A5A">Journalisation auditable</text>
    <text x="75" y="730" class="body" font-size="10.5" fill="#5A5A5A">de chaque opération CRUD</text>
  </g>

  <g class="interactive" data-card="mitig-modele" tabindex="0" role="button"
     aria-label="Mitigation au niveau modèle">
    <rect x="330" y="575" width="250" height="180" rx="3"
          fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="345" y="598" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.08em" fill="#1F5560">COUCHE 2 · MODÈLE</text>
    <text x="345" y="622" class="display" font-size="15" font-weight="600" fill="#1A1A1A">LLM-scorer</text>
    <line x1="345" y1="638" x2="395" y2="638" stroke="#1F5560" stroke-width="1"/>
    <text x="345" y="662" class="body" font-size="10.5" fill="#5A5A5A">Agent dédié qui évalue la</text>
    <text x="345" y="678" class="body" font-size="10.5" fill="#5A5A5A">qualité de chaque mémoire</text>
    <text x="345" y="694" class="body" font-size="10.5" fill="#5A5A5A">candidate avant intégration</text>
    <text x="345" y="714" class="body" font-size="10.5" fill="#5A5A5A">Détection de patterns</text>
    <text x="345" y="730" class="body" font-size="10.5" fill="#5A5A5A">d'instruction injectée</text>
  </g>

  <g class="interactive" data-card="mitig-user" tabindex="0" role="button"
     aria-label="Mitigation au niveau utilisateur">
    <rect x="600" y="575" width="250" height="180" rx="3"
          fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="615" y="598" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.08em" fill="#1F5560">COUCHE 3 · USER</text>
    <text x="615" y="622" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Memory dashboard</text>
    <line x1="615" y1="638" x2="665" y2="638" stroke="#1F5560" stroke-width="1"/>
    <text x="615" y="662" class="body" font-size="10.5" fill="#5A5A5A">Visualiser, corriger,</text>
    <text x="615" y="678" class="body" font-size="10.5" fill="#5A5A5A">oublier sélectivement</text>
    <text x="615" y="694" class="body" font-size="10.5" fill="#5A5A5A">Mode Incognito pour</text>
    <text x="615" y="714" class="body" font-size="10.5" fill="#5A5A5A">conversations sensibles</text>
    <text x="615" y="730" class="body" font-size="10.5" fill="#5A5A5A">Notifications d'écriture</text>
  </g>

  <g class="interactive" data-card="mitig-gouv" tabindex="0" role="button"
     aria-label="Mitigation gouvernance">
    <rect x="870" y="575" width="270" height="180" rx="3"
          fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="885" y="598" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.08em" fill="#1F5560">COUCHE 4 · GOUV.</text>
    <text x="885" y="622" class="display" font-size="15" font-weight="600" fill="#1A1A1A">RGPD &amp; AI Act</text>
    <line x1="885" y1="638" x2="935" y2="638" stroke="#1F5560" stroke-width="1"/>
    <text x="885" y="662" class="body" font-size="10.5" fill="#5A5A5A">Effacement opérationnel</text>
    <text x="885" y="678" class="body" font-size="10.5" fill="#5A5A5A">documenté, durée bornée</text>
    <text x="885" y="694" class="body" font-size="10.5" fill="#5A5A5A">Transparence sur limites</text>
    <text x="885" y="714" class="body" font-size="10.5" fill="#5A5A5A">du machine unlearning</text>
    <text x="885" y="730" class="body" font-size="10.5" fill="#5A5A5A">paramétrique</text>
  </g>

  <!-- Footer caption -->
  <text x="60" y="785" class="body" font-size="10" font-style="italic" fill="#5A5A5A">
    Sources : Rehberger 2024 · MITRE ATLAS AML.T0080 · Microsoft Research 2026 · Anthropic Memory Tool docs · IMA novembre 2025.
  </text>
</svg>
