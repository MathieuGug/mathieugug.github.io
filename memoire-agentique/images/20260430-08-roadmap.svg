<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-08">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 08</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Feuille de route 18 mois — trois pistes parallèles</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">De l'audit d'amnésie au partenaire persistant : architecture, gouvernance, adoption</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ─── HORIZON HEADERS ─── -->
  <text x="60" y="180" class="mono" font-size="10" font-weight="600"
        letter-spacing="0.14em" fill="#5A5A5A">HORIZONS</text>

  <!-- 3 horizon labels above tracks -->
  <g class="interactive" data-card="horizon-1" tabindex="0" role="button"
     aria-label="Horizon 0-6 mois">
    <rect x="240" y="200" width="290" height="50" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="260" y="222" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.1em" fill="#B7332C">H1 · 0–6 MOIS</text>
    <text x="260" y="242" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Auditer · Prototyper · Gouverner</text>
  </g>

  <g class="interactive" data-card="horizon-2" tabindex="0" role="button"
     aria-label="Horizon 6-12 mois">
    <rect x="540" y="200" width="290" height="50" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="560" y="222" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.1em" fill="#B7332C">H2 · 6–12 MOIS</text>
    <text x="560" y="242" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Industrialiser · Mesurer</text>
  </g>

  <g class="interactive" data-card="horizon-3" tabindex="0" role="button"
     aria-label="Horizon 12-18 mois">
    <rect x="840" y="200" width="290" height="50" rx="3"
          fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1"/>
    <text x="860" y="222" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.1em" fill="#FAF8F3">H3 · 12–18 MOIS</text>
    <text x="860" y="242" class="display" font-size="16" font-weight="600" fill="#FAF8F3">Autonomiser · Partenariser</text>
  </g>

  <!-- ─── TIMELINE AXIS ─── -->
  <line x1="240" y1="285" x2="1130" y2="285" stroke="#1A1A1A" stroke-width="1.25"/>
  <!-- Tick marks -->
  <line x1="240" y1="280" x2="240" y2="290" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="535" y1="280" x2="535" y2="290" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="835" y1="280" x2="835" y2="290" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="1130" y1="280" x2="1130" y2="290" stroke="#1A1A1A" stroke-width="1.25"/>
  <!-- Tick labels -->
  <text x="240" y="305" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">M0</text>
  <text x="535" y="305" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">M+6</text>
  <text x="835" y="305" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">M+12</text>
  <text x="1130" y="305" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">M+18</text>

  <!-- ─── TRACK 1 — ARCHITECTURE ─── -->
  <g class="interactive" data-card="track-architecture" tabindex="0" role="button"
     aria-label="Piste Architecture">
    <rect x="60" y="335" width="170" height="120" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="75" y="358" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.1em" fill="#B7332C">PISTE 1</text>
    <text x="75" y="382" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Architecture</text>
    <text x="75" y="404" class="body" font-size="10.5" fill="#5A5A5A">Le socle technique :</text>
    <text x="75" y="418" class="body" font-size="10.5" fill="#5A5A5A">framework, stockage,</text>
    <text x="75" y="432" class="body" font-size="10.5" fill="#5A5A5A">orchestration mémoire,</text>
    <text x="75" y="446" class="body" font-size="10.5" fill="#5A5A5A">context engineering.</text>
  </g>

  <!-- Track 1 milestones H1 -->
  <rect x="245" y="345" width="285" height="100" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
  <circle cx="265" cy="365" r="4" fill="#B7332C"/>
  <text x="278" y="369" class="body" font-size="11" fill="#1A1A1A">Choix architecture (Letta / Mem0 /</text>
  <text x="278" y="383" class="body" font-size="11" fill="#1A1A1A">Zep / Anthropic file-based)</text>
  <circle cx="265" cy="408" r="4" fill="#B7332C"/>
  <text x="278" y="412" class="body" font-size="11" fill="#1A1A1A">Prototype memory dashboard</text>
  <text x="278" y="426" class="body" font-size="11" fill="#1A1A1A">périmètre restreint</text>

  <!-- Track 1 milestones H2 -->
  <rect x="545" y="345" width="285" height="100" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
  <circle cx="565" cy="365" r="4" fill="#B7332C"/>
  <text x="578" y="369" class="body" font-size="11" fill="#1A1A1A">Migration cas critique vers</text>
  <text x="578" y="383" class="body" font-size="11" fill="#1A1A1A">architecture 4 piliers / 6 ops</text>
  <circle cx="565" cy="408" r="4" fill="#B7332C"/>
  <text x="578" y="412" class="body" font-size="11" fill="#1A1A1A">LLM-scorer en production</text>
  <text x="578" y="426" class="body" font-size="11" fill="#1A1A1A">(validation pré-écriture)</text>

  <!-- Track 1 milestones H3 -->
  <rect x="845" y="345" width="285" height="100" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
  <circle cx="865" cy="365" r="4" fill="#B7332C"/>
  <text x="878" y="369" class="body" font-size="11" fill="#1A1A1A">Multi-agents avec Memory Pool</text>
  <text x="878" y="383" class="body" font-size="11" fill="#1A1A1A">gouverné</text>
  <circle cx="865" cy="408" r="4" fill="#B7332C"/>
  <text x="878" y="412" class="body" font-size="11" fill="#1A1A1A">Mémoire procédurale induite</text>
  <text x="878" y="426" class="body" font-size="11" fill="#1A1A1A">(Agent Workflow Memory)</text>

  <!-- ─── TRACK 2 — GOUVERNANCE ─── -->
  <g class="interactive" data-card="track-gouvernance" tabindex="0" role="button"
     aria-label="Piste Gouvernance">
    <rect x="60" y="475" width="170" height="120" rx="3"
          fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="75" y="498" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.1em" fill="#1F5560">PISTE 2</text>
    <text x="75" y="522" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Gouvernance</text>
    <text x="75" y="544" class="body" font-size="10.5" fill="#5A5A5A">RGPD, AI Act, sécurité,</text>
    <text x="75" y="558" class="body" font-size="10.5" fill="#5A5A5A">audit, traçabilité, droit</text>
    <text x="75" y="572" class="body" font-size="10.5" fill="#5A5A5A">à l'oubli, transparence</text>
    <text x="75" y="586" class="body" font-size="10.5" fill="#5A5A5A">du machine unlearning.</text>
  </g>

  <!-- Track 2 milestones H1 -->
  <rect x="245" y="485" width="285" height="100" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
  <circle cx="265" cy="505" r="4" fill="#1F5560"/>
  <text x="278" y="509" class="body" font-size="11" fill="#1A1A1A">Charte de gouvernance mémoire,</text>
  <text x="278" y="523" class="body" font-size="11" fill="#1A1A1A">politique de rétention bornée</text>
  <circle cx="265" cy="548" r="4" fill="#1F5560"/>
  <text x="278" y="552" class="body" font-size="11" fill="#1A1A1A">Mécanisme d'effacement</text>
  <text x="278" y="566" class="body" font-size="11" fill="#1A1A1A">opérationnel documenté</text>

  <!-- Track 2 milestones H2 -->
  <rect x="545" y="485" width="285" height="100" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
  <circle cx="565" cy="505" r="4" fill="#1F5560"/>
  <text x="578" y="509" class="body" font-size="11" fill="#1A1A1A">Audit MITRE ATLAS AML.T0080</text>
  <text x="578" y="523" class="body" font-size="11" fill="#1A1A1A">sur le périmètre de production</text>
  <circle cx="565" cy="548" r="4" fill="#1F5560"/>
  <text x="578" y="552" class="body" font-size="11" fill="#1A1A1A">Journalisation auditable</text>
  <text x="578" y="566" class="body" font-size="11" fill="#1A1A1A">des opérations CRUD mémoire</text>

  <!-- Track 2 milestones H3 -->
  <rect x="845" y="485" width="285" height="100" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
  <circle cx="865" cy="505" r="4" fill="#1F5560"/>
  <text x="878" y="509" class="body" font-size="11" fill="#1A1A1A">Conformité AI Act déploiement</text>
  <text x="878" y="523" class="body" font-size="11" fill="#1A1A1A">progressif (high-risk si applicable)</text>
  <circle cx="865" cy="548" r="4" fill="#1F5560"/>
  <text x="878" y="552" class="body" font-size="11" fill="#1A1A1A">Politique de partage mémoire</text>
  <text x="878" y="566" class="body" font-size="11" fill="#1A1A1A">cross-équipes (Memory Pool)</text>

  <!-- ─── TRACK 3 — ADOPTION ─── -->
  <g class="interactive" data-card="track-adoption" tabindex="0" role="button"
     aria-label="Piste Adoption">
    <rect x="60" y="615" width="170" height="120" rx="3"
          fill="#FAF8F3" stroke="#B58A2C" stroke-width="1"/>
    <text x="75" y="638" class="mono" font-size="9" font-weight="600"
          letter-spacing="0.1em" fill="#B58A2C">PISTE 3</text>
    <text x="75" y="662" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Adoption</text>
    <text x="75" y="684" class="body" font-size="10.5" fill="#5A5A5A">Cas d'usage, mesure de</text>
    <text x="75" y="698" class="body" font-size="10.5" fill="#5A5A5A">la valeur, KPIs, conduite</text>
    <text x="75" y="712" class="body" font-size="10.5" fill="#5A5A5A">du changement, lien aux</text>
    <text x="75" y="726" class="body" font-size="10.5" fill="#5A5A5A">métiers utilisateurs.</text>
  </g>

  <!-- Track 3 milestones H1 -->
  <rect x="245" y="625" width="285" height="100" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
  <circle cx="265" cy="645" r="4" fill="#B58A2C"/>
  <text x="278" y="649" class="body" font-size="11" fill="#1A1A1A">Audit de l'amnésie : 3 processus</text>
  <text x="278" y="663" class="body" font-size="11" fill="#1A1A1A">prioritaires + sondage Shadow AI</text>
  <circle cx="265" cy="688" r="4" fill="#B58A2C"/>
  <text x="278" y="692" class="body" font-size="11" fill="#1A1A1A">Sélection des utilisateurs</text>
  <text x="278" y="706" class="body" font-size="11" fill="#1A1A1A">pilotes (10–20 personnes)</text>

  <!-- Track 3 milestones H2 -->
  <rect x="545" y="625" width="285" height="100" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
  <circle cx="565" cy="645" r="4" fill="#B58A2C"/>
  <text x="578" y="649" class="body" font-size="11" fill="#1A1A1A">KPIs : pertinence, résolution</text>
  <text x="578" y="663" class="body" font-size="11" fill="#1A1A1A">sans escalade, Quotient Contextuel</text>
  <circle cx="565" cy="688" r="4" fill="#B58A2C"/>
  <text x="578" y="692" class="body" font-size="11" fill="#1A1A1A">Benchmark interne</text>
  <text x="578" y="706" class="body" font-size="11" fill="#1A1A1A">(LongMemEval / LOCOMO dérivé)</text>

  <!-- Track 3 milestones H3 -->
  <rect x="845" y="625" width="285" height="100" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="0.5"/>
  <circle cx="865" cy="645" r="4" fill="#B58A2C"/>
  <text x="878" y="649" class="body" font-size="11" fill="#1A1A1A">Auto-amélioration self-reflection</text>
  <text x="878" y="663" class="body" font-size="11" fill="#1A1A1A">+15 % résolution / trim. visé</text>
  <circle cx="865" cy="688" r="4" fill="#B58A2C"/>
  <text x="878" y="692" class="body" font-size="11" fill="#1A1A1A">Généralisation à l'ensemble</text>
  <text x="878" y="706" class="body" font-size="11" fill="#1A1A1A">des cas d'usage matures</text>

  <!-- Footer caption -->
  <text x="60" y="775" class="body" font-size="10" font-style="italic" fill="#5A5A5A">
    Synthèse à partir de IMA novembre 2025 (chap. 5), MIT NANDA juillet 2025, retours empiriques Mem0 / Zep / Letta. Calibrage indicatif.
  </text>
</svg>
