<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-06">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Trois fournisseurs, trois philosophies</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">OpenAI ChatGPT, Anthropic Claude, Google Gemini — architectures grand public et professionnelles</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- THREE COLUMNS -->

  <!-- ─── OpenAI ─── -->
  <g class="interactive" data-card="openai" tabindex="0" role="button"
     aria-label="OpenAI ChatGPT — cliquez pour les détails">
    <rect x="80" y="170" width="320" height="510" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>

    <text x="100" y="200" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.08em" fill="#5A5A5A">FOURNISSEUR A</text>
    <text x="100" y="232" class="display" font-size="22" font-weight="600"
          letter-spacing="-0.01em" fill="#1A1A1A">OpenAI ChatGPT</text>
    <text x="100" y="252" class="display" font-size="13" font-style="italic" fill="#5A5A5A">
      Profil implicite + outil bio
    </text>

    <line x1="100" y1="270" x2="380" y2="270" stroke="#E5E1D8" stroke-width="0.5"/>

    <text x="100" y="298" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">ARCHITECTURE</text>
    <text x="100" y="318" class="body" font-size="12" fill="#1A1A1A">
      Outil <tspan class="mono" font-size="11">bio</tspan> : opérations CRUD
    </text>
    <text x="100" y="335" class="body" font-size="12" fill="#1A1A1A">
      explicites · Chat History
    </text>
    <text x="100" y="352" class="body" font-size="12" fill="#1A1A1A">
      Reference : profil implicite
    </text>

    <text x="100" y="385" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">CONTEXTE NATIF</text>
    <text x="100" y="408" class="display" font-size="20" font-weight="600" fill="#1A1A1A">
      128–200K
    </text>
    <text x="195" y="408" class="body" font-size="12" font-style="italic" fill="#5A5A5A">tokens</text>

    <text x="100" y="445" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">TRANSPARENCE</text>
    <!-- 5 dot rating: 2/5 -->
    <circle cx="105" cy="465" r="6" fill="#1A1A1A"/>
    <circle cx="125" cy="465" r="6" fill="#1A1A1A"/>
    <circle cx="145" cy="465" r="6" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <circle cx="165" cy="465" r="6" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <circle cx="185" cy="465" r="6" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="100" y="492" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
      Profil implicite opaque
    </text>

    <text x="100" y="525" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">CONTRÔLE UTILISATEUR</text>
    <text x="100" y="546" class="body" font-size="11" fill="#1A1A1A">
      ✓ Visualisation mémoire
    </text>
    <text x="100" y="562" class="body" font-size="11" fill="#1A1A1A">
      ✓ Suppression sélective
    </text>
    <text x="100" y="578" class="body" font-size="11" fill="#1A1A1A">
      ✓ Mode Temporary Chat
    </text>

    <text x="100" y="615" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">DISPONIBILITÉ</text>
    <text x="100" y="635" class="body" font-size="11" fill="#1A1A1A">
      Plus / Pro / Enterprise / API
    </text>

    <text x="100" y="665" class="display" font-size="11" font-style="italic" fill="#1F5560">
      Force : richesse du profilage
    </text>
  </g>

  <!-- ─── Anthropic ─── -->
  <g class="interactive" data-card="anthropic" tabindex="0" role="button"
     aria-label="Anthropic Claude — cliquez pour les détails">
    <rect x="440" y="170" width="320" height="510" rx="3"
          fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>

    <text x="460" y="200" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.08em" fill="#5A5A5A">FOURNISSEUR B</text>
    <text x="460" y="232" class="display" font-size="22" font-weight="600"
          letter-spacing="-0.01em" fill="#1A1A1A">Anthropic Claude</text>
    <text x="460" y="252" class="display" font-size="13" font-style="italic" fill="#5A5A5A">
      File-based · CLAUDE.md hiérarchique
    </text>

    <line x1="460" y1="270" x2="740" y2="270" stroke="#E5E1D8" stroke-width="0.5"/>

    <text x="460" y="298" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">ARCHITECTURE</text>
    <text x="460" y="318" class="body" font-size="12" fill="#1A1A1A">
      Fichiers Markdown chargés en
    </text>
    <text x="460" y="335" class="body" font-size="12" fill="#1A1A1A">
      cascade · Memory Tool API
    </text>
    <text x="460" y="352" class="body" font-size="12" fill="#1A1A1A">
      (CRUD client-side)
    </text>

    <text x="460" y="385" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">CONTEXTE NATIF</text>
    <text x="460" y="408" class="display" font-size="20" font-weight="600" fill="#1A1A1A">
      200K–1M
    </text>
    <text x="555" y="408" class="body" font-size="12" font-style="italic" fill="#5A5A5A">
      tokens (Sonnet 4.6)
    </text>

    <text x="460" y="445" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">TRANSPARENCE</text>
    <!-- 5 dot rating: 5/5 -->
    <circle cx="465" cy="465" r="6" fill="#B7332C"/>
    <circle cx="485" cy="465" r="6" fill="#B7332C"/>
    <circle cx="505" cy="465" r="6" fill="#B7332C"/>
    <circle cx="525" cy="465" r="6" fill="#B7332C"/>
    <circle cx="545" cy="465" r="6" fill="#B7332C"/>
    <text x="460" y="492" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
      Fichiers texte versionnables
    </text>

    <text x="460" y="525" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">CONTRÔLE UTILISATEUR</text>
    <text x="460" y="546" class="body" font-size="11" fill="#1A1A1A">
      ✓ Édition fichier-par-fichier
    </text>
    <text x="460" y="562" class="body" font-size="11" fill="#1A1A1A">
      ✓ Hiérarchie Org/Projet/User
    </text>
    <text x="460" y="578" class="body" font-size="11" fill="#1A1A1A">
      ✓ Mode Incognito · Auto Dream
    </text>

    <text x="460" y="615" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">DISPONIBILITÉ</text>
    <text x="460" y="635" class="body" font-size="11" fill="#1A1A1A">
      Pro / Max / Team / Enterprise / API
    </text>

    <text x="460" y="665" class="display" font-size="11" font-style="italic" fill="#1F5560">
      Force : auditabilité, gouvernance
    </text>
  </g>

  <!-- ─── Google ─── -->
  <g class="interactive" data-card="gemini" tabindex="0" role="button"
     aria-label="Google Gemini — cliquez pour les détails">
    <rect x="800" y="170" width="320" height="510" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>

    <text x="820" y="200" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.08em" fill="#5A5A5A">FOURNISSEUR C</text>
    <text x="820" y="232" class="display" font-size="22" font-weight="600"
          letter-spacing="-0.01em" fill="#1A1A1A">Google Gemini</text>
    <text x="820" y="252" class="display" font-size="13" font-style="italic" fill="#5A5A5A">
      Personal Context + Workspace
    </text>

    <line x1="820" y1="270" x2="1100" y2="270" stroke="#E5E1D8" stroke-width="0.5"/>

    <text x="820" y="298" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">ARCHITECTURE</text>
    <text x="820" y="318" class="body" font-size="12" fill="#1A1A1A">
      Profil dynamique + intégration
    </text>
    <text x="820" y="335" class="body" font-size="12" fill="#1A1A1A">
      profonde Gmail, Drive, Calendar
    </text>
    <text x="820" y="352" class="body" font-size="12" fill="#1A1A1A">
      (Workspace cross-app)
    </text>

    <text x="820" y="385" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">CONTEXTE NATIF</text>
    <text x="820" y="408" class="display" font-size="20" font-weight="600" fill="#1A1A1A">
      1M–2M
    </text>
    <text x="900" y="408" class="body" font-size="12" font-style="italic" fill="#5A5A5A">tokens</text>

    <text x="820" y="445" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">TRANSPARENCE</text>
    <!-- 5 dot rating: 3/5 -->
    <circle cx="825" cy="465" r="6" fill="#1A1A1A"/>
    <circle cx="845" cy="465" r="6" fill="#1A1A1A"/>
    <circle cx="865" cy="465" r="6" fill="#1A1A1A"/>
    <circle cx="885" cy="465" r="6" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <circle cx="905" cy="465" r="6" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1"/>
    <text x="820" y="492" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
      Visualisable, opaque pour Workspace
    </text>

    <text x="820" y="525" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">CONTRÔLE UTILISATEUR</text>
    <text x="820" y="546" class="body" font-size="11" fill="#1A1A1A">
      ✓ Visualisation, suppression
    </text>
    <text x="820" y="562" class="body" font-size="11" fill="#1A1A1A">
      ◐ Mode Incognito limité
    </text>
    <text x="820" y="578" class="body" font-size="11" fill="#1A1A1A">
      ✗ Granularité par app limitée
    </text>

    <text x="820" y="615" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.05em" fill="#B58A2C">DISPONIBILITÉ</text>
    <text x="820" y="635" class="body" font-size="11" fill="#1A1A1A">
      Workspace / Gemini Advanced / API
    </text>

    <text x="820" y="665" class="display" font-size="11" font-style="italic" fill="#1F5560">
      Force : intégration native cross-app
    </text>
  </g>

  <!-- Synthesis row -->
  <line x1="60" y1="710" x2="1140" y2="710" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="738" class="display" font-size="14" font-weight="600" font-style="italic" fill="#1A1A1A">
    Quel choix ? — Trois cas d'usage, trois recommandations
  </text>
  <text x="60" y="760" class="body" font-size="11" fill="#1A1A1A">
    <tspan font-weight="500">Régulé / auditabilité prime</tspan> : Anthropic · <tspan font-weight="500">Productivité bureautique intégrée</tspan> : Google · <tspan font-weight="500">Personnalisation grand public</tspan> : OpenAI
  </text>

  <!-- FOOTER -->
  <text x="60" y="785" class="body" font-size="10" font-style="italic" fill="#5A5A5A">
    Sources : Anthropic Claude Docs (Memory Tool, Auto Dream) ; Skywork.ai analyse Claude Memory ; MacRumors (octobre 2025) ; release notes vendor.
  </text>
</svg>
