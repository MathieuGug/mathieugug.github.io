    <text x="80" y="355" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
      Stanford · Park et al. UIST 2023
    </text>
    <text x="80" y="370" class="mono" font-size="9" fill="#5A5A5A">
      arXiv:2304.03442
    </text>

