  <!-- FOOTER -->
  <line x1="60" y1="735" x2="1140" y2="735" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="763" class="body" font-size="10" font-style="italic" fill="#5A5A5A">
