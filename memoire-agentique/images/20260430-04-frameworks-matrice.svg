  <circle cx="170" cy="707" r="7" fill="#1F5560"/>
  <text x="183" y="711" class="body" font-size="11" fill="#1A1A1A">Présent / supporté</text>

  <circle cx="320" cy="707" r="7" fill="#E5E1D8" stroke="#5A5A5A" stroke-width="0.5"/>
  <text x="320" y="711" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" text-anchor="middle">◐</text>
  <text x="333" y="711" class="body" font-size="11" fill="#1A1A1A">Partiel / via plugin</text>

  <circle cx="475" cy="707" r="7" fill="#E5E1D8" stroke="#5A5A5A" stroke-width="0.5"/>
