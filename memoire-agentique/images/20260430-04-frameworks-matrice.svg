  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Cinq architectures de référence</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">Comparaison des frameworks de production sur six dimensions clés</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Column headers -->
  <text x="60" y="190" class="mono" font-size="10" font-weight="600"
        letter-spacing="0.08em" fill="#5A5A5A">FRAMEWORK</text>

  <text x="350" y="170" class="body" font-size="11" font-weight="500"
        fill="#1A1A1A" text-anchor="middle">Stockage</text>
  <text x="350" y="186" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">
    structure principale
  </text>

  <text x="490" y="170" class="body" font-size="11" font-weight="500"
        fill="#1A1A1A" text-anchor="middle">Réflexion</text>
  <text x="490" y="186" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">
    auto-synthèse
  </text>

  <text x="620" y="170" class="body" font-size="11" font-weight="500"
        fill="#1A1A1A" text-anchor="middle">Temporalité</text>
  <text x="620" y="186" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">
    bi-temporel
  </text>

  <text x="760" y="170" class="body" font-size="11" font-weight="500"
        fill="#1A1A1A" text-anchor="middle">Auto-édition</text>
  <text x="760" y="186" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">
    agent écrit ses mémoires
  </text>

  <text x="900" y="170" class="body" font-size="11" font-weight="500"
        fill="#1A1A1A" text-anchor="middle">Production</text>
  <text x="900" y="186" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">
    maturité ops
  </text>

  <text x="1050" y="170" class="body" font-size="11" font-weight="500"
