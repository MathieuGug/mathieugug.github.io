    <circle cx="760" cy="628" r="8" fill="#E5E1D8" stroke="#5A5A5A" stroke-width="0.5"/>
    <text x="760" y="632" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" text-anchor="middle">◐</text>

    <circle cx="900" cy="628" r="8" fill="#B7332C"/>
