<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-03">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow03" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrow03-emph" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Cycle de vie : six opérations</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">Comment l'information circule entre les piliers — la mémoire comme système dynamique</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Layer label -->
  <text x="60" y="180" class="mono" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A">CYCLE EN BOUCLE</text>
  <line x1="60" y1="190" x2="180" y2="190" stroke="#B8B5AE" stroke-width="0.5"/>

  <!-- ═══════════ Six operations in a circle ═══════════ -->
  <!-- Center label -->
  <g>
    <circle cx="600" cy="450" r="80" fill="#1A1A1A"/>
    <text x="600" y="445" class="display" font-size="15" font-weight="600" fill="#FAF8F3" text-anchor="middle">
      Opérations
    </text>
    <text x="600" y="465" class="display" font-size="15" font-weight="600" fill="#FAF8F3" text-anchor="middle">
      mémoire
    </text>
    <text x="600" y="485" class="body" font-size="10" font-style="italic" fill="#FAF8F3" text-anchor="middle">
      Du et al. 2025
    </text>
  </g>

  <!-- Operations around the circle (6 nodes at 60° each) -->
  <!-- Position calculation: center (600, 450), radius 230 -->
  <!-- Node 1: top (270°) — Encodage / Indexation -->
  <g class="interactive" data-card="indexing" tabindex="0" role="button"
     aria-label="Indexation — cliquez pour les détails">
    <rect x="500" y="200" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <circle cx="525" cy="223" r="9" fill="#B7332C"/>
    <text x="525" y="227" class="mono" font-size="11" font-weight="600"
          fill="#FAF8F3" text-anchor="middle">1</text>
    <text x="545" y="230" class="display" font-size="14" font-weight="600" fill="#1A1A1A">
      Indexation
    </text>
    <text x="600" y="252" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">
      embeddings · graphes
    </text>
    <text x="600" y="268" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">
      organisation pour recherche
    </text>
  </g>

  <!-- Node 2: top-right (330°) — Récupération -->
  <g class="interactive" data-card="retrieval" tabindex="0" role="button"
     aria-label="Récupération — cliquez pour les détails">
    <rect x="800" y="290" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <circle cx="825" cy="313" r="9" fill="#B7332C"/>
    <text x="825" y="317" class="mono" font-size="11" font-weight="600"
          fill="#FAF8F3" text-anchor="middle">2</text>
    <text x="845" y="320" class="display" font-size="14" font-weight="600" fill="#1A1A1A">
      Récupération
    </text>
    <text x="900" y="342" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">
      RAG · similarité sémantique
    </text>
    <text x="900" y="358" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">
      ranking récence/importance
    </text>
  </g>

  <!-- Node 3: bottom-right (30°) — Consolidation -->
  <g class="interactive" data-card="consolidation" tabindex="0" role="button"
     aria-label="Consolidation — cliquez pour les détails">
    <rect x="800" y="530" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <circle cx="825" cy="553" r="9" fill="#B7332C"/>
    <text x="825" y="557" class="mono" font-size="11" font-weight="600"
          fill="#FAF8F3" text-anchor="middle">3</text>
    <text x="845" y="560" class="display" font-size="14" font-weight="600" fill="#1A1A1A">
      Consolidation
    </text>
    <text x="900" y="582" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">
      réflexion · synthèse
    </text>
    <text x="900" y="598" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">
      expérience → compétence
    </text>
  </g>

  <!-- Node 4: bottom (90°) — Mise à jour -->
  <g class="interactive" data-card="updating" tabindex="0" role="button"
     aria-label="Mise à jour — cliquez pour les détails">
    <rect x="500" y="620" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <circle cx="525" cy="643" r="9" fill="#B7332C"/>
    <text x="525" y="647" class="mono" font-size="11" font-weight="600"
          fill="#FAF8F3" text-anchor="middle">4</text>
    <text x="545" y="650" class="display" font-size="14" font-weight="600" fill="#1A1A1A">
      Mise à jour
    </text>
    <text x="600" y="672" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">
      invalidation temporelle
    </text>
    <text x="600" y="688" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">
      gestion des conflits
    </text>
  </g>

  <!-- Node 5: bottom-left (150°) — Compression -->
  <g class="interactive" data-card="compression" tabindex="0" role="button"
     aria-label="Compression — cliquez pour les détails">
    <rect x="200" y="530" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <circle cx="225" cy="553" r="9" fill="#B7332C"/>
    <text x="225" y="557" class="mono" font-size="11" font-weight="600"
          fill="#FAF8F3" text-anchor="middle">5</text>
    <text x="245" y="560" class="display" font-size="14" font-weight="600" fill="#1A1A1A">
      Compression
    </text>
    <text x="300" y="582" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">
      résumé · synthèse hiérarchique
    </text>
    <text x="300" y="598" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">
      MemoryBank · TiM · Reflexion
    </text>
  </g>

  <!-- Node 6: top-left (210°) — Oubli -->
  <g class="interactive" data-card="forgetting" tabindex="0" role="button"
     aria-label="Oubli — cliquez pour les détails">
    <rect x="200" y="290" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <circle cx="225" cy="313" r="9" fill="#B7332C"/>
    <text x="225" y="317" class="mono" font-size="11" font-weight="600"
          fill="#FAF8F3" text-anchor="middle">6</text>
    <text x="245" y="320" class="display" font-size="14" font-weight="600" fill="#1A1A1A">
      Oubli
    </text>
    <text x="300" y="342" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">
      decay · pruning · RGPD
    </text>
    <text x="300" y="358" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">
      courbe d'Ebbinghaus
    </text>
  </g>

  <!-- Cyclical arrows around the perimeter -->
  <!-- 1 -> 2 -->
  <path d="M 700 270 Q 770 280, 810 305" fill="none" stroke="#5A5A5A"
        stroke-width="1.25" marker-end="url(#arrow03)"/>
  <!-- 2 -> 3 -->
  <path d="M 900 370 Q 920 450, 900 530" fill="none" stroke="#5A5A5A"
        stroke-width="1.25" marker-end="url(#arrow03)"/>
  <!-- 3 -> 4 (emphasized — key learning loop) -->
  <path d="M 800 600 Q 740 640, 700 650" fill="none" stroke="#B7332C"
        stroke-width="2.5" marker-end="url(#arrow03-emph)"/>
  <!-- 4 -> 5 -->
  <path d="M 500 670 Q 430 660, 400 605" fill="none" stroke="#5A5A5A"
        stroke-width="1.25" marker-end="url(#arrow03)"/>
  <!-- 5 -> 6 -->
  <path d="M 295 530 Q 280 450, 295 370" fill="none" stroke="#5A5A5A"
        stroke-width="1.25" marker-end="url(#arrow03)"/>
  <!-- 6 -> 1 -->
  <path d="M 400 305 Q 460 280, 500 270" fill="none" stroke="#5A5A5A"
        stroke-width="1.25" marker-end="url(#arrow03)"/>

  <!-- Annotation: emphasized arrow -->
  <text x="745" y="640" class="mono" font-size="10" font-weight="500"
        letter-spacing="0.05em" fill="#B7332C">BOUCLE D'APPRENTISSAGE</text>

  <!-- Storage layer (bottom horizontal bar) -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="755" class="mono" font-size="10" font-weight="600"
        letter-spacing="0.08em" fill="#5A5A5A">STOCKAGE SOUS-JACENT</text>
  <text x="60" y="775" class="body" font-size="11" fill="#1A1A1A">
    Vector DB (FAISS, Pinecone, Chroma) — embeddings sémantiques
  </text>
  <text x="450" y="775" class="body" font-size="11" fill="#1A1A1A">
    Knowledge Graph (Neo4j, Graphiti) — relations temporelles
  </text>
  <text x="850" y="775" class="body" font-size="11" fill="#1A1A1A">
    Files / KV (CLAUDE.md) — auditabilité
  </text>

  <!-- FOOTER -->
  <text x="60" y="795" class="body" font-size="10" font-style="italic" fill="#5A5A5A">
    Sources : Du, Huang, Zheng et al., Rethinking Memory in AI (arXiv 2505.00675, 2025) ; livre blanc IMA Agentic AI (novembre 2025).
  </text>
</svg>
