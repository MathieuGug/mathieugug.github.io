<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 900" data-schema-id="schema-02">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1140" height="900" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Les quatre piliers de la mémoire</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">Une taxonomie héritée des architectures cognitives, formalisée par CoALA</text>
  <line x1="60" y1="140" x2="1080" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Root: Mémoire de l'agent -->
  <g>
    <rect x="340" y="180" width="260" height="80" rx="3" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="470" y="215" class="display" font-size="17" font-weight="600" fill="#FAF8F3" text-anchor="middle">
      Mémoire de l'agent
    </text>
    <text x="470" y="237" class="body" font-size="11" font-style="italic" fill="#FAF8F3" text-anchor="middle">
      taxonomie CoALA · IMA
    </text>
  </g>

  <!-- Branches -->
  <line x1="470" y1="260" x2="470" y2="290" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="220" y1="290" x2="720" y2="290" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- Court terme branch -->
  <line x1="220" y1="290" x2="220" y2="320" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="220" y="285" class="mono" font-size="10" font-weight="600"
        letter-spacing="0.08em" fill="#5A5A5A" text-anchor="middle">COURT TERME</text>

  <!-- Long terme branch -->
  <line x1="720" y1="290" x2="720" y2="320" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="720" y="285" class="mono" font-size="10" font-weight="600"
        letter-spacing="0.08em" fill="#5A5A5A" text-anchor="middle">LONG TERME</text>

  <!-- Court terme: 1 leaf - Mémoire de travail -->
  <g class="interactive" data-card="working" tabindex="0" role="button"
     aria-label="Mémoire de travail — cliquez pour les détails">
    <rect x="80" y="320" width="280" height="180" rx="3" fill="#FAF8F3"
          stroke="#B7332C" stroke-width="1.5"/>
    <circle cx="100" cy="343" r="9" fill="#B7332C"/>
    <text x="100" y="347" class="mono" font-size="11" font-weight="600"
          fill="#FAF8F3" text-anchor="middle">1</text>
    <text x="120" y="350" class="display" font-size="16" font-weight="600" fill="#1A1A1A">
      Mémoire de travail
    </text>
    <text x="100" y="380" class="mono" font-size="10" font-weight="500"
          letter-spacing="0.05em" fill="#5A5A5A">SCRATCHPAD</text>
    <text x="100" y="408" class="body" font-size="12" fill="#1A1A1A">
      Le « bloc-notes » de l'instant
    </text>
    <text x="100" y="425" class="body" font-size="12" fill="#1A1A1A">
      présent. Maintient l'état
    </text>
    <text x="100" y="442" class="body" font-size="12" fill="#1A1A1A">
      d'avancement de la tâche.
    </text>
    <line x1="100" y1="458" x2="340" y2="458" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="100" y="478" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
      Implémentation : injection
    </text>
    <text x="100" y="492" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
      directe dans le prompt
    </text>
  </g>

  <!-- Long terme: 3 leaves -->
  <line x1="720" y1="320" x2="720" y2="350" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="490" y1="350" x2="950" y2="350" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="490" y1="350" x2="490" y2="370" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="720" y1="350" x2="720" y2="370" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="950" y1="350" x2="950" y2="370" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- Sémantique -->
  <g class="interactive" data-card="semantic" tabindex="0" role="button"
     aria-label="Mémoire sémantique — cliquez pour les détails">
    <rect x="380" y="370" width="220" height="220" rx="3" fill="#FAF8F3"
          stroke="#1F5560" stroke-width="1.5"/>
    <circle cx="400" cy="393" r="9" fill="#1F5560"/>
    <text x="400" y="397" class="mono" font-size="11" font-weight="600"
          fill="#FAF8F3" text-anchor="middle">2</text>
    <text x="420" y="400" class="display" font-size="16" font-weight="600" fill="#1A1A1A">
      Sémantique
    </text>
    <text x="400" y="430" class="mono" font-size="10" font-weight="500"
          letter-spacing="0.05em" fill="#5A5A5A">RÈGLES &amp; FAITS</text>
    <text x="400" y="458" class="body" font-size="12" fill="#1A1A1A">
      L'« encyclopédie ».
    </text>
    <text x="400" y="475" class="body" font-size="12" fill="#1A1A1A">
      Règles métier, procédures
    </text>
    <text x="400" y="492" class="body" font-size="12" fill="#1A1A1A">
      de conformité, jargon.
    </text>
    <line x1="400" y1="510" x2="580" y2="510" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="400" y="530" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
      Implémentation : RAG
    </text>
    <text x="400" y="544" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
      sur base de connaissances
    </text>
    <text x="400" y="572" class="mono" font-size="10" fill="#5A5A5A">
      ex : politique KYC, taxonomies
    </text>
  </g>

  <!-- Épisodique -->
  <g class="interactive" data-card="episodic" tabindex="0" role="button"
     aria-label="Mémoire épisodique — cliquez pour les détails">
    <rect x="610" y="370" width="220" height="220" rx="3" fill="#FAF8F3"
          stroke="#1F5560" stroke-width="1.5"/>
    <circle cx="630" cy="393" r="9" fill="#1F5560"/>
    <text x="630" y="397" class="mono" font-size="11" font-weight="600"
          fill="#FAF8F3" text-anchor="middle">3</text>
    <text x="650" y="400" class="display" font-size="16" font-weight="600" fill="#1A1A1A">
      Épisodique
    </text>
    <text x="630" y="430" class="mono" font-size="10" font-weight="500"
          letter-spacing="0.05em" fill="#5A5A5A">EXPÉRIENCES VÉCUES</text>
    <text x="630" y="458" class="body" font-size="12" fill="#1A1A1A">
      Le « journal de bord ».
    </text>
    <text x="630" y="475" class="body" font-size="12" fill="#1A1A1A">
      Cas traités, erreurs
    </text>
    <text x="630" y="492" class="body" font-size="12" fill="#1A1A1A">
      corrigées, interactions.
    </text>
    <line x1="630" y1="510" x2="810" y2="510" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="630" y="530" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
      Implémentation : embeddings
    </text>
    <text x="630" y="544" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
      vectoriels horodatés
    </text>
    <text x="630" y="572" class="mono" font-size="10" fill="#5A5A5A">
      ex : memory stream Park et al.
    </text>
  </g>

  <!-- Procédurale -->
  <g class="interactive" data-card="procedural" tabindex="0" role="button"
     aria-label="Mémoire procédurale — cliquez pour les détails">
    <rect x="840" y="370" width="220" height="220" rx="3" fill="#FAF8F3"
          stroke="#1F5560" stroke-width="1.5"/>
    <circle cx="860" cy="393" r="9" fill="#1F5560"/>
    <text x="860" y="397" class="mono" font-size="11" font-weight="600"
          fill="#FAF8F3" text-anchor="middle">4</text>
    <text x="880" y="400" class="display" font-size="16" font-weight="600" fill="#1A1A1A">
      Procédurale
    </text>
    <text x="860" y="430" class="mono" font-size="10" font-weight="500"
          letter-spacing="0.05em" fill="#5A5A5A">SAVOIR-FAIRE</text>
    <text x="860" y="458" class="body" font-size="12" fill="#1A1A1A">
      Le « comment faire ».
    </text>
    <text x="860" y="475" class="body" font-size="12" fill="#1A1A1A">
      Séquences d'actions,
    </text>
    <text x="860" y="492" class="body" font-size="12" fill="#1A1A1A">
      stratégies, workflows.
    </text>
    <line x1="860" y1="510" x2="1040" y2="510" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="860" y="530" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
      Implémentation : workflows
    </text>
    <text x="860" y="544" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
      induits, prompt templates
    </text>
    <text x="860" y="572" class="mono" font-size="10" fill="#5A5A5A">
      ex : Agent Workflow Memory
    </text>
  </g>

  <!-- Bottom annotation grid -->
  <line x1="60" y1="640" x2="1080" y2="640" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="668" class="display" font-size="14" font-weight="600" font-style="italic" fill="#1A1A1A">
    Pourquoi cette taxonomie compte
  </text>

  <text x="60" y="700" class="mono" font-size="10" font-weight="600"
        letter-spacing="0.08em" fill="#B58A2C">DURABILITÉ</text>
  <text x="60" y="722" class="body" font-size="11" fill="#1A1A1A">
    Working : éphémère · Sémantique : permanent
  </text>
  <text x="60" y="738" class="body" font-size="11" fill="#1A1A1A">
    Épisodique : horodaté · Procédural : versionné
  </text>

  <text x="400" y="700" class="mono" font-size="10" font-weight="600"
        letter-spacing="0.08em" fill="#B58A2C">CONSOLIDATION</text>
  <text x="400" y="722" class="body" font-size="11" fill="#1A1A1A">
    Une expérience (épisodique), après
  </text>
  <text x="400" y="738" class="body" font-size="11" fill="#1A1A1A">
    analyse, devient une compétence (procédurale)
  </text>

  <text x="740" y="700" class="mono" font-size="10" font-weight="600"
        letter-spacing="0.08em" fill="#B58A2C">CONFLITS</text>
  <text x="740" y="722" class="body" font-size="11" fill="#1A1A1A">
    En cas de conflit, la règle sémantique
  </text>
  <text x="740" y="738" class="body" font-size="11" fill="#1A1A1A">
    prime, mais déclenche une alerte d'audit
  </text>

  <!-- FOOTER -->
  <line x1="60" y1="800" x2="1080" y2="800" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="828" class="body" font-size="10" font-style="italic" fill="#5A5A5A">
    Sources : Sumers et al., Cognitive Architectures for Language Agents (TMLR 2024) ; livre blanc IMA Agentic AI, chapitre 5 (novembre 2025).
  </text>
  <text x="60" y="845" class="body" font-size="10" font-style="italic" fill="#5A5A5A">
    Méthodologie : taxonomie inspirée des architectures cognitives ACT-R / Soar, recoupée avec les implémentations production récentes.
  </text>
</svg>
