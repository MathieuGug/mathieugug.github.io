<style>
:root {
  --bg: #faf6ec;
  --bg-2: #f3eedf;
  --paper: #ffffff;
  --line: rgba(30,30,44,0.08);
  --line-strong: rgba(30,30,44,0.20);
  --text: #1e1e2a;
  --text-dim: #3b3f4d;
  --text-mid: #6b6f7c;
  --text-faint: #9a9ca5;
  --accent: #b8582e;
  --carmine: #b23b1b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; line-height: 1.55; -webkit-font-smoothing: antialiased; height: 100vh; overflow: hidden; max-width: 100vw; }
body { background:
  radial-gradient(ellipse at 14% 8%, rgba(184,88,46,0.06) 0%, transparent 55%),
  radial-gradient(ellipse at 86% 92%, rgba(75,148,102,0.04) 0%, transparent 55%),
  var(--bg);
}
a { color: inherit; }

/* Topbar — copie du pattern site */
.topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 50; padding: 12px 28px; height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 24px; background: rgba(250,246,236,0.78); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid transparent; transition: opacity 0.25s, border-color 0.3s; }
.topbar > a { font-family: 'Fraunces', serif; font-weight: 500; font-size: 15.5px; letter-spacing: -0.01em; text-decoration: none; color: var(--text); flex-shrink: 0; }
.topbar em { font-style: italic; color: var(--accent); }
.topbar .back { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-mid); }
.topbar .back:hover { color: var(--accent); }
.scene-title-bar { flex: 1; min-width: 0; display: flex; align-items: baseline; justify-content: center; gap: 14px; font-family: 'Fraunces', serif; font-weight: 400; font-size: clamp(20px, 2.6vw, 32px); letter-spacing: -0.01em; color: var(--text); text-align: center; opacity: 1; transition: opacity 220ms ease; overflow: hidden; }
.scene-title-bar.fade { opacity: 0; }
.scene-title-bar .num { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; letter-spacing: 0.24em; color: var(--text-faint); flex-shrink: 0; }
.scene-title-bar .title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.scene-title-bar:empty { display: none; }

/* Surlignage stabilo — signature site */
mark { background: linear-gradient(transparent 58%, rgba(178, 59, 27, 0.14) 58%); color: inherit; padding: 0 2px; }

/* Stage : zone scène plein écran (libère l'espace à droite pour la sidebar timeline).
   Le modal flotte par-dessus la stage et n'altère pas sa taille — on évite ainsi les
   sauts de width du SVG entre les steps avec/sans modalAuto. La partie droite du
   schéma se retrouve cachée derrière le panneau modal sur desktop, mais ce n'est pas
   la zone en focus (le focus zoom centre toujours le highlight dans la stage entière). */
.stage { position: fixed; top: 64px; left: 0; right: 64px; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px 24px 24px; overflow: hidden; transition: opacity 250ms ease; }
.stage.fading-out { opacity: 0; }

/* Mobile */
@media (max-width: 768px) {
  .topbar { height: 56px; padding: 10px 16px; gap: 12px; }
  .scene-title-bar { font-size: clamp(13px, 3vw, 18px); }
  .scene-title-bar .num { font-size: 9px; letter-spacing: 0.18em; }
  .stage { top: 56px; }
}
@media (max-width: 560px) {
  .topbar { padding: 10px 14px; gap: 8px; }
  .topbar > a { font-size: 13px; }
  .topbar .back { font-size: 9px; letter-spacing: 0.16em; }
  .scene-title-bar .num { display: none; }
  .stage { padding: 16px 16px 80px; }
}
@media (max-width: 480px) {
  .scene-title-bar { display: none; }
}
@media (max-width: 380px) {
  .topbar > a:first-child em { display: none; }
}

.scene-punchline { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; max-width: 1000px; padding: 0 24px; gap: 32px; }
.scene-punchline .body { font-family: 'Fraunces', serif; font-style: italic; font-weight: 300; font-size: clamp(32px, 5.5vw, 64px); line-height: 1.18; letter-spacing: -0.015em; color: var(--text); }
.scene-punchline .body mark { background: linear-gradient(transparent 58%, rgba(178, 59, 27, 0.18) 58%); padding: 0 4px; }
.scene-punchline .attribution { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-faint); }

@media (max-width: 560px) {
  .scene-punchline .body { font-size: clamp(22px, 7vw, 32px); line-height: 1.25; }
}

.scene-outro { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; max-width: 700px; gap: 36px; padding: 0 24px; }
.scene-outro .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); }
.scene-outro h2 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(36px, 5vw, 56px); line-height: 1.1; letter-spacing: -0.02em; }
.scene-outro h2 em { font-style: italic; color: var(--accent); }
.scene-outro .body { font-family: 'Fraunces', serif; font-style: italic; font-size: clamp(17px, 2.2vw, 22px); line-height: 1.5; color: var(--text-dim); max-width: 560px; }
.scene-outro .ctas { display: flex; flex-direction: column; gap: 14px; align-items: stretch; min-width: 320px; }
.scene-outro .cta-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 16px 28px; background: var(--accent); color: white; text-decoration: none; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; border-radius: 4px; transition: background 0.2s; }
.scene-outro .cta-primary:hover { background: var(--carmine); }
.scene-outro .cta-secondary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 24px; background: transparent; color: var(--text); text-decoration: none; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; border: 1px solid var(--line-strong); border-radius: 4px; transition: border-color 0.2s, color 0.2s; }
.scene-outro .cta-secondary:hover { border-color: var(--accent); color: var(--accent); }
.scene-outro .restart { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-faint); cursor: pointer; background: none; border: none; padding: 8px; }
.scene-outro .restart:hover { color: var(--accent); }
.scene-outro .disclosure { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint); margin-top: 24px; }

#schemas { display: none; }
#schemas[hidden] { display: none !important; }
.schema-host { display: flex; flex-direction: column; align-items: center; justify-content: center; max-width: min(1400px, 92vw); width: 100%; gap: 12px; }
.schema-host .scene-title { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--text-mid); display: flex; align-items: baseline; gap: 12px; }
.schema-host .scene-title .num { color: var(--text-faint); }
.schema-host .scene-title .title { font-family: 'Fraunces', serif; font-weight: 400; font-size: clamp(20px, 2.8vw, 32px); letter-spacing: -0.01em; text-transform: none; color: var(--text); }
.schema-host svg { width: 100%; max-width: 100%; height: auto; max-height: calc(100vh - 170px); display: block; }
.schema-host .caption { font-family: 'Fraunces', serif; font-style: italic; font-weight: 300; font-size: clamp(16px, 1.8vw, 20px); line-height: 1.5; color: var(--text-dim); text-align: center; max-width: 720px; min-height: 2.4em; padding: 8px 24px; position: relative; z-index: 2; transition: opacity 180ms ease, max-width 280ms cubic-bezier(0.22, 1, 0.36, 1), transform 280ms cubic-bezier(0.22, 1, 0.36, 1); }
.schema-host .caption.fade-out { opacity: 0; }
/* Bloc opaque full-screen-width derrière la caption, pour masquer ce qui
   pourrait subsister du SVG transformé (zoom-in extending below natural box,
   contenu shifté hors zone, etc.). Posé sur la stage avec un soft fade-in
   en haut pour que la transition entre schéma et caption soit douce. */
.stage::after { content: ''; position: fixed; left: 0; right: 0; bottom: 0; height: 96px; background: linear-gradient(to top, var(--bg) 0%, var(--bg) 55%, rgba(250,246,236,0) 100%); pointer-events: none; z-index: 1; }
/* Caption recentrée dans l'espace restant quand un modal est ouvert sur
   desktop. La stage ne shrink pas (le SVG reste full-width avec sa droite
   cachée derrière le panneau modal), mais le texte de la caption se déplace
   pour rester centré dans la portion de stage encore visible. */
@media (min-width: 1025px) {
  body.modal-open .schema-host .caption { max-width: min(720px, calc(100vw - 560px)); transform: translateX(-208px); }
}

/* Vocabulaire visuel des révélations */
.schema-host svg [data-step-state="dim"] { opacity: 0.18; transition: opacity 220ms ease, filter 220ms ease; }
.schema-host svg [data-step-state="active"] { opacity: 1; transition: opacity 220ms ease, filter 220ms ease; }
.schema-host svg [data-step-state="hidden"] { opacity: 0; pointer-events: none; transition: opacity 220ms ease; }

/* Masquer l'en-tête interne du SVG (eyebrow + titre + lede) — le slideshow a son propre titre externe */
.schema-host svg .svg-header { display: none; }

@media (prefers-reduced-motion: reduce) {
  .stage { transition: opacity 0ms ease, right 0ms ease !important; }
  .schema-host svg [data-step-state] { transition: none !important; }
  .schema-host .caption { transition: none !important; }
  .scene-outro .cta-primary, .scene-outro .cta-secondary { transition: none !important; }
  #modal-root { transition: transform 0ms ease !important; }
  .toaster { transition: none !important; }
}

/* ── Zoom overlay ── */
#zoom-overlay[hidden] { display: none !important; }
#zoom-overlay {
  position: fixed; inset: 0; z-index: 400;
  display: flex; flex-direction: column;
  background: rgba(26, 26, 26, 0.94);
  backdrop-filter: blur(3px);
}
#zoom-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; padding: 12px 20px;
  color: #faf6ec;
  font-family: 'Inter', system-ui, sans-serif; font-size: 0.85rem;
  border-bottom: 1px solid rgba(250, 248, 243, 0.12);
}
#zoom-caption {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  opacity: 0.85;
}
.zoom-controls { display: flex; gap: 4px; flex-shrink: 0; }
.zoom-controls button {
  background: transparent;
  border: 1px solid rgba(250, 248, 243, 0.32);
  color: #faf6ec; padding: 6px 12px;
  min-width: 36px; cursor: pointer;
  font: inherit; font-size: 0.85rem; border-radius: 3px;
  transition: background 120ms, border-color 120ms;
}
.zoom-controls button:hover { background: rgba(250, 248, 243, 0.12); border-color: rgba(250, 248, 243, 0.6); }
.zoom-controls button:focus-visible { outline: 2px solid #faf6ec; outline-offset: 2px; }
.zoom-controls .zoom-close { font-size: 1.3rem; line-height: 1; padding: 2px 10px; }
#zoom-stage { flex: 1; overflow: hidden; position: relative; cursor: grab; touch-action: none; }
#zoom-stage.grabbing { cursor: grabbing; }
#zoom-content { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
#zoom-content > svg {
  display: block; max-width: none; max-height: none;
  background: var(--bg); box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
}
#zoom-hint {
  position: absolute; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  color: rgba(250, 248, 243, 0.55);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 0.75rem; pointer-events: none;
  transition: opacity 400ms;
}
#zoom-hint.fade { opacity: 0; }
@media (max-width: 640px) {
  .zoom-controls .zoom-reset { display: none; }
  #zoom-caption { font-size: 0.78rem; }
}

/* Bouton zoom sur les schémas */
.schema-wrapper { position: relative; }
.zoom-btn {
  position: absolute; top: 10px; left: 10px;
  background: rgba(250,246,236,0.85); border: 1px solid rgba(30,30,44,0.18);
  color: var(--text-dim); font-size: 1.15rem; line-height: 1;
  width: 36px; height: 36px; border-radius: 4px;
  cursor: pointer; opacity: 0;
  transition: opacity 150ms, background 120ms, border-color 120ms, color 120ms;
  z-index: 2;
}
.schema-wrapper:hover .zoom-btn, .schema-wrapper:focus-within .zoom-btn, .zoom-btn:focus-visible { opacity: 1; }
.zoom-btn:hover { background: var(--bg-2); border-color: var(--text); color: var(--text); }
@media (hover: none) { .zoom-btn { opacity: 0.85; } }

/* ── Modal en sidebar toggable à droite (préserve la vue du SVG) ── */
#modal-root[hidden] { display: none !important; }
#modal-root {
  position: fixed; right: 64px; top: 64px; bottom: 0;
  width: 400px;
  z-index: 200;
  pointer-events: none;
  transform: translateX(calc(100% + 64px));
  transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1);
}
#modal-root:not([hidden]) {
  transform: translateX(0);
  pointer-events: auto;
}
.modal-backdrop { display: none; }
.modal-card {
  position: relative;
  background: var(--paper);
  width: 100%;
  height: 100%;
  overflow-y: auto;
  padding: 36px 32px 32px;
  border-left: 4px solid var(--carmine);
  box-shadow: -16px 0 48px rgba(30,25,18,0.08);
}
@media (max-width: 1024px) {
  /* Sur mobile : modal redevient centré plein écran */
  #modal-root { right: 0; top: 0; bottom: 0; width: 100%; transform: translateY(100%); transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1); display: flex; align-items: flex-end; justify-content: center; }
  #modal-root:not([hidden]) { transform: translateY(0); }
  .modal-card { width: 100%; max-width: 100%; height: 90vh; max-height: 90vh; border-left: none; border-top: 4px solid var(--carmine); border-radius: 12px 12px 0 0; box-shadow: 0 -16px 48px rgba(30,25,18,0.2); }
}
.modal-close {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none;
  font-size: 1.6rem; line-height: 1; cursor: pointer;
  color: var(--text-mid);
  width: 32px; height: 32px; border-radius: 4px;
}
.modal-close:hover { background: var(--bg-2); color: var(--text); }
.modal-card h3 {
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: 1.4rem; margin: 0 0 6px; letter-spacing: -0.01em;
}
.modal-card .modal-eyebrow {
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--carmine); margin: 0 0 14px;
}
.modal-card .modal-body p { margin: 0 0 0.9rem; font-size: 0.95rem; }
.modal-card .modal-body p:last-child { margin-bottom: 0; }
.modal-card .modal-body figure.ref {
  margin: 0.6rem 0 1.1rem;
}
.modal-card .modal-body figure.ref img {
  display: block; width: 100%; height: auto;
  border-radius: 3px;
  border: 1px solid rgba(26,26,26,0.08);
  box-shadow: 0 8px 22px rgba(0,0,0,0.12);
  background: var(--bg-2);
}
.modal-card .modal-body figure.ref figcaption {
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; line-height: 1.5;
  letter-spacing: 0.02em; color: var(--text-mid);
}
.modal-card .modal-body figure.ref figcaption em { font-style: italic; color: var(--text); }
.modal-card .modal-body figure.ref figcaption a { color: var(--accent); text-decoration: none; }
.modal-card .modal-body figure.ref figcaption a:hover { text-decoration: underline; }
.modal-card .modal-body .combined-card { margin-top: 1.4rem; padding-top: 1.1rem; border-top: 1px solid var(--line, #E5E1D8); }
.modal-card .modal-body .combined-card:first-child { margin-top: 0; padding-top: 0; border-top: none; }
.modal-card .modal-body .combined-card .combined-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--carmine); margin: 0 0 6px; }
.modal-card .modal-body .combined-card h4 { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 600; margin: 0 0 0.55rem; letter-spacing: -0.01em; }

/* Timeline en sidebar verticale à droite + boutons */
.footer-bar { position: fixed; right: 18px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 24px; z-index: 40; pointer-events: none; }
.timeline { display: flex; flex-direction: column; gap: 4px; align-items: center; pointer-events: auto; }
.timeline .seg { width: 4px; height: 36px; background: var(--text-faint); opacity: 0.4; cursor: pointer; position: relative; transition: opacity 0.2s, background 0.2s; }
.timeline .seg.visited { background: var(--accent); opacity: 0.5; }
.timeline .seg.current { background: var(--accent); opacity: 1; }
.timeline .seg .fill { position: absolute; left: 0; right: 0; top: 0; height: 0%; background: var(--accent); transition: height 220ms ease; }
.timeline .seg:hover { opacity: 1; }
.timeline .seg .label { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); white-space: nowrap; font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-mid); background: var(--bg); padding: 4px 8px; border-radius: 3px; opacity: 0; pointer-events: none; transition: opacity 0.15s; box-shadow: 0 1px 3px rgba(30,30,44,0.08); }
.timeline .seg:hover .label { opacity: 1; }
.timeline .seg.punchline { width: 8px; height: 8px; border-radius: 50%; background: var(--text-faint); }
.timeline .seg.punchline.visited { background: var(--accent); opacity: 0.7; }
.timeline .seg.punchline.current { background: var(--accent); opacity: 1; transform: scale(1.3); }
.timeline .seg.outro::after { content: '▸'; position: absolute; left: -7px; bottom: -2px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-faint); }
.timeline .seg.outro.visited::after, .timeline .seg.outro.current::after { color: var(--accent); }
.footer-actions { display: flex; flex-direction: column; gap: 10px; align-items: center; pointer-events: auto; writing-mode: vertical-rl; }
.footer-actions .footer-btn { writing-mode: vertical-rl; transform: rotate(180deg); }
.footer-btn { background: none; border: none; font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-mid); cursor: pointer; padding: 6px 4px; transition: color 0.2s; }

  <g class="interactive" data-card="trace-frey" tabindex="0" role="button" aria-label="Chemin Frey-Osborne 2013"><rect x="60" y="410" width="540" height="160" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/><text x="80" y="436" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">CHEMIN A — FREY &amp; OSBORNE 2013</text><line x1="80" y1="446" x2="580" y2="446" stroke="#E5E1D8" stroke-width="0.5"/><text x="80" y="468" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">Granularité :</tspan> profession · <tspan font-weight="600">Source :</tspan> 70 experts ML</text><text x="80" y="486" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">Métrique :</tspan> substitution complète si majorité tâches automatisables</text><text x="80" y="504" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">Complémentarité :</tspan> non considérée · <tspan font-weight="600">Conversion :</tspan> % emplois</text><line x1="80" y1="518" x2="580" y2="518" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 2"/><text x="80" y="544" class="display" font-size="22" font-weight="600" fill="#B7332C">→ 47% des emplois</text><text x="80" y="562" class="body" font-size="10" font-style="italic" fill="#5A5A5A">à haut risque d'automatisation</text></g>
  <g class="interactive" data-card="trace-acemoglu" tabindex="0" role="button" aria-label="Chemin Acemoglu 2024"><rect x="620" y="410" width="520" height="160" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/><text x="640" y="436" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560">CHEMIN B — ACEMOGLU 2024</text><line x1="640" y1="446" x2="1120" y2="446" stroke="#E5E1D8" stroke-width="0.5"/><text x="640" y="468" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">Granularité :</tspan> tâche O*NET · <tspan font-weight="600">Source :</tspan> données empiriques</text><text x="640" y="486" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">Métrique :</tspan> seulement tâches profitablement automatisables</text><text x="640" y="504" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">Complémentarité :</tspan> implicite · <tspan font-weight="600">Conversion :</tspan> macro (Hulten)</text><line x1="640" y1="518" x2="1120" y2="518" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 2"/><text x="640" y="544" class="display" font-size="22" font-weight="600" fill="#1F5560">→ 0,55% TFP / 10 ans</text><text x="640" y="562" class="body" font-size="10" font-style="italic" fill="#5A5A5A">soit ≈ 1,1-1,6% PIB cumulé</text></g>

  <text x="60" y="628" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">L'AMPLEUR DE L'ÉCART</text>
  <text x="60" y="652" class="body" font-size="12" fill="#1A1A1A">Les deux études parlent de la même réalité — l'IA agit sur le travail —, mais elles répondent à des questions différentes.</text>
  <text x="60" y="671" class="body" font-size="12" fill="#1A1A1A">Frey-Osborne : <tspan font-style="italic">qu'est-ce qui pourrait techniquement être automatisé ?</tspan></text>
  <text x="60" y="690" class="body" font-size="12" fill="#1A1A1A">Acemoglu : <tspan font-style="italic">quel impact macroéconomique attendre une fois les coûts d'adoption pris en compte ?</tspan></text>
  <text x="60" y="722" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">Tout commentaire qui agrège ces chiffres sans préciser le framework les rend faussement comparables.</text>
  <text x="60" y="740" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">La presse populaire et les décideurs gagnent à parler en fourchettes liées aux hypothèses, plutôt qu'en chiffre choc.</text>

  <text x="472" y="200" class="mono" font-size="8" font-weight="600" letter-spacing="0.14em" fill="#1A1A1A" text-anchor="middle">FACTORY ACTS · ÉDUCATION · SUFFRAGE</text>
  <text x="80" y="595" class="mono" font-size="8" fill="#9A9CA5">Allen 2009, Engels' Pause — Explorations in Economic History</text>
  <line x1="765" y1="160" x2="765" y2="600" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="785" y="172" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">PROJECTION SCÉNARIO IA</text>
  <g class="interactive" data-card="engels-mecanisme" tabindex="0" role="button" aria-label="Mécanisme"><rect x="785" y="190" width="340" height="120" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/><text x="805" y="216" class="mono" font-size="9.5" font-weight="600" letter-spacing="0.16em" fill="#B7332C">MÉCANISME</text><text x="805" y="240" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Productivité ↑, salaires →</text><line x1="805" y1="252" x2="1105" y2="252" stroke="#E5E1D8" stroke-width="0.5"/><text x="805" y="272" class="body" font-size="11" fill="#1A1A1A">Gains captés par le capital</text><text x="805" y="288" class="body" font-size="11" fill="#1A1A1A">si pouvoir de négociation faible</text><text x="805" y="304" class="body" font-size="11" fill="#1A1A1A">+ marché concentré IA.</text></g>
  <g class="interactive" data-card="engels-vitesse" tabindex="0" role="button" aria-label="Vitesse"><rect x="785" y="325" width="340" height="120" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/><text x="805" y="351" class="mono" font-size="9.5" font-weight="600" letter-spacing="0.16em" fill="#1F5560">VITESSE</text><text x="805" y="375" class="display" font-size="14" font-weight="600" fill="#1A1A1A">50 ans → 10 ans ?</text><line x1="805" y1="387" x2="1105" y2="387" stroke="#E5E1D8" stroke-width="0.5"/><text x="805" y="407" class="body" font-size="11" fill="#1A1A1A">Diffusion logicielle plus rapide</text><text x="805" y="423" class="body" font-size="11" fill="#1A1A1A">— mais le palier dépend de la</text><text x="805" y="439" class="body" font-size="11" fill="#1A1A1A">réorganisation, pas de l'outil.</text></g>
  <g class="interactive" data-card="engels-cible" tabindex="0" role="button" aria-label="Cible"><rect x="785" y="460" width="340" height="120" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/><text x="805" y="486" class="mono" font-size="9.5" font-weight="600" letter-spacing="0.16em" fill="#B58A2C">CIBLE</text><text x="805" y="510" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Cols blancs cette fois</text><line x1="805" y1="522" x2="1105" y2="522" stroke="#E5E1D8" stroke-width="0.5"/><text x="805" y="542" class="body" font-size="11" fill="#1A1A1A">Reverse skill bias : la classe</text><text x="805" y="558" class="body" font-size="11" fill="#1A1A1A">moyenne cognitive est exposée,</text><text x="805" y="574" class="body" font-size="11" fill="#1A1A1A">pas l'ouvrier industriel.</text></g>
  <line x1="60" y1="630" x2="1140" y2="630" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="60" y="654" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">LA LEÇON HISTORIQUE</text>
  <text x="60" y="678" class="body" font-size="12" fill="#1A1A1A">Les gains de productivité ne se redistribuent pas automatiquement. La pause d'Engels n'a pris fin que par <tspan font-style="italic">conquête institutionnelle</tspan> :</text>
  <text x="60" y="697" class="body" font-size="12" fill="#1A1A1A">syndicalisation, scolarité, suffrage élargi, régulation industrielle. Le scénario IA dépend des mêmes leviers — sans automatisme.</text>
  <text x="60" y="730" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">Acemoglu, Johnson et Korinek convoquent explicitement ce précédent pour décrire le risque IA. La technologie est neuve ;</text>
  <text x="60" y="748" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">l'asymétrie de pouvoir entre détenteurs de capital algorithmique et travailleurs cognitifs ne l'est pas.</text>
</svg>

    "gpt-complementarite": { eyebrow: "Schéma 2 — Critère 3", title: "Complémentarités innovationnelles", body: "<p>L'adoption de la GPT stimule l'innovation chez ses utilisateurs (<em>spillovers</em>). C'est ce critère qui distingue une vraie GPT d'un simple gadget : si elle ne génère pas de nouvelles industries, elle reste périphérique.</p><p>Pour l'IA générative : agents autonomes, copilots métiers, recherche augmentée, biotech assistée, drug discovery. Industries entières en émergence. Critère validé.</p>" },
    "gpt-vapeur": { eyebrow: "Schéma 2 — Machine à vapeur", title: "Watt, 1769", body: "<p>Première GPT moderne. Pervasivité progressive (manufacture → transport → mines), amélioration continue (rendement multiplié par 4 en un siècle), complémentarité forte avec l'organisation usinière.</p><p>Délai de matérialisation économique : ≈ 50-80 ans. Coïncide avec la pause d'Engels (1790-1840).</p>" },
    "gpt-electricite": { eyebrow: "Schéma 2 — Électricité", title: "Edison, Tesla, ≈ 1880", body: "<p>GPT-archétype dans la littérature économique. Pervasivité totale (tous secteurs et foyers), amélioration spectaculaire (coût/kWh ÷10 en 50 ans), complémentarité massive (moteur unitaire, ligne d'assemblage, électronique).</p><p>Délai entre invention et productivité agrégée : 30-40 ans (David, 1990). Le précédent le plus cité pour calibrer les attentes IA.</p>" },
    "gpt-tic": { eyebrow: "Schéma 2 — TIC", title: "Semi-conducteurs, Internet, ≈ 1970", body: "<p>GPT contemporaine la plus proche de l'IA. Pervasivité totale, amélioration extrême (loi de Moore — coût/transistor ÷1000 en 30 ans), complémentarité massive (e-commerce, biotech, finance algorithmique).</p><p>Délai 25 ans entre arrivée commerciale et impact macro mesurable. <em>Solow paradox</em> documenté.</p>" },
    "gpt-ia": { eyebrow: "Schéma 2 — IA générative", title: "Transformer, ChatGPT, ≈ 2022", body: "<p>Diffusion logicielle inédite (100M utilisateurs en 2 mois pour ChatGPT), amélioration extrême (coût/token ÷100 en 24 mois), complémentarité en construction.</p><p>Différence-clé : <em>diffusion logicielle vs diffusion physique</em>. Mais le palier de productivité économique dépend de la réorganisation, pas du déploiement de l'outil — donc le palier sera lent malgré la rapidité de diffusion.</p>" }
  },
  "schema-03": {
    "step-granularite": { eyebrow: "Schéma 3 — Étape 1", title: "Granularité", body: "<p>Profession entière vs tâche. Choix le plus structurant. Refaire Frey-Osborne (profession) en granularité-tâche (Arntz et al. 2016) divise l'estimation par cinq.</p><p>Depuis 2018, la littérature mainstream (Acemoglu, Eloundou, FMI) raisonne par tâche. Frey-Osborne reste cité comme référence historique, plus comme méthode courante.</p>" },
    "step-source": { eyebrow: "Schéma 3 — Étape 2", title: "Source du jugement", body: "<p>Trois sources possibles : (a) experts humains qui étiquettent, (b) modèle économétrique sur attributs O*NET, (c) LLM lui-même comme évaluateur.</p><p>Chaque source a ses biais : humains influencés par les démos récentes, modèle statistique cristallisant des corrélations historiques, LLM tendant à surestimer ses propres capacités sur les tâches qu'il décrit. Aucune source n'est neutre.</p>" },
    "step-metrique": { eyebrow: "Schéma 3 — Étape 3", title: "Métrique d'exposition", body: "<p>Substitution complète, partielle, ou complémentarité. Eloundou utilise trois niveaux (E0/E1/E2). Le seuil retenu (≥10 % de tâches affectées vs ≥50 %) change radicalement le récit que produit la même étude.</p><p>Recommandation : toujours préciser le seuil quand on cite un chiffre de cette littérature.</p>" },
    "step-complementarite": { eyebrow: "Schéma 3 — Étape 4", title: "Complémentarité contextuelle", body: "<p>Approche du FMI (Pizzinelli et al. 2023). Pour chaque profession exposée, on évalue le contexte non-technologique : présence physique, jugement clinique/légal, autorité décisionnelle, relation interpersonnelle.</p><p>Cette pondération transforme une <em>liste d'emplois exposés</em> en <em>distribution de risques de substitution</em>, beaucoup plus utile pour les politiques publiques.</p>" },
    "step-conversion": { eyebrow: "Schéma 3 — Étape 5", title: "Conversion en impact", body: "<p>Quatre approches : comptabilité d'exposition (% emplois), heures-équivalent (ETP), macroéconomique (TFP/PIB via Hulten), empirique (RCT, A/B tests).</p><p>Chaque approche répond à une question différente. Aucune n'est dominante. Le débat public confond souvent les quatre.</p>" },
    "trace-frey": { eyebrow: "Schéma 3 — Chemin A", title: "Frey & Osborne — 47 % d'emplois", body: "<p>Granularité <strong>profession</strong> + source <strong>experts ML</strong> + métrique <strong>substitution complète</strong> + pas de complémentarité + conversion <strong>% emplois</strong>. Résultat : 47 %.</p><p>Le chemin choisi maximise mécaniquement le chiffre. Aucune erreur factuelle, mais le chiffre n'est pas comparable à un chiffre macroéconomique.</p>" },
    "trace-acemoglu": { eyebrow: "Schéma 3 — Chemin B", title: "Acemoglu — 0,55 % TFP", body: "<p>Granularité <strong>tâche</strong> + source <strong>O*NET + données empiriques</strong> + métrique <strong>tâches profitablement automatisables</strong> + complémentarité implicite + conversion <strong>macro Hulten</strong>. Résultat : 0,55 % TFP / 10 ans.</p><p>Le chemin choisi minimise mécaniquement le chiffre. Borne basse de la littérature. Très utile comme contrepoint méthodologique aux annonces optimistes.</p>" }
  },
  "schema-04": {
    "aug-zone": { eyebrow: "Schéma 4 — Augmentation", title: "L'utilisateur reste pilote", body: "<p>Conversations où l'utilisateur apprend, itère, demande un retour, vérifie son travail. Le travail humain n'est pas remplacé — il est outillé.</p><p>52 % des conversations Claude en février 2026. Tendance : légère baisse depuis le pic de mai 2025 (57 %), mais reste majoritaire.</p>" },
    "auto-zone": { eyebrow: "Schéma 4 — Automatisation", title: "L'IA fait le travail", body: "<p>Conversations <em>directives</em> où l'utilisateur délègue une tâche complète. Pas de retour itératif, juste un livrable.</p><p>45 % des conversations en février 2026. Tendance : croissance constante depuis fin 2024 (27 % → 39 % → 45 %). Signe d'une délégation croissante à mesure que la confiance et les capacités augmentent.</p>" },
    "obs-conversational": { eyebrow: "Schéma 4 — Méthodologie", title: "Analyse de conversations réelles", body: "<p>Anthropic Economic Index analyse des millions de conversations Claude (anonymisées, avec garanties de confidentialité), classifiées automatiquement sur la nature de l'usage.</p><p>Avantage : mesure directe de l'usage effectif, pas de l'usage déclaré. Limite : couvre un seul fournisseur, biais de sélection des utilisateurs Claude.</p>" },
    "obs-onet": { eyebrow: "Schéma 4 — Mapping O*NET", title: "Croisement avec les professions", body: "<p>Les conversations sont mappées sur les 900+ professions et 19 000 tâches de la base O*NET. Permet de distinguer <em>quelle</em> activité est augmentée vs automatisée.</p><p>Trouvaille : les usages varient fortement par profession. Programmeurs et rédacteurs en haut de la fréquence ; soignants et ouvriers en bas.</p>" },
    "obs-limites": { eyebrow: "Schéma 4 — Limites", title: "Concentration et biais", body: "<p>Les utilisateurs Claude ne sont pas représentatifs : surreprésentation des cadres tech et des marchés anglophones. Top 5 États US = 24 % des usages par habitant ; top 20 pays = 48 % de l'usage par habitant.</p><p>L'index donne une <em>tendance</em> et une <em>structure</em>, pas un nombre absolu d'emplois. Lecture relative recommandée.</p>" }
  },
  "schema-05": {
    "engels-mecanisme": { eyebrow: "Schéma 5 — Mécanisme", title: "Productivité ↑, salaires →", body: "<p>Quand le pouvoir de négociation des travailleurs est faible et que le marché des producteurs de la technologie est concentré, les gains de productivité se redistribuent à 90 % vers le capital.</p><p>Cas historique : Grande-Bretagne 1790-1840. Cas contemporain potentiel : économies OCDE 2025-2035 si aucune politique de partage n'est activée. Les six leviers du Schéma 8 répondent précisément à ce risque.</p>" },
    "engels-vitesse": { eyebrow: "Schéma 5 — Vitesse", title: "50 ans hier, 10 ans demain ?", body: "<p>La pause d'Engels britannique a duré 50 ans (1790-1840). Acemoglu et Korinek argumentent qu'une pause IA pourrait être plus courte (5-15 ans) parce que la diffusion logicielle est rapide.</p><p>Mais le palier de productivité agrégée dépend de la réorganisation, pas de la diffusion. Le scénario réaliste : un palier de 7-10 ans pendant lequel les pertes locales se concrétisent avant que les gains agrégés ne soient visibles.</p>" },
    "engels-cible": { eyebrow: "Schéma 5 — Cible", title: "Cols blancs cette fois", body: "<p>Reverse skill bias documenté par McKinsey, OCDE, FMI. La pause d'Engels frappait l'ouvrier industriel, mal organisé politiquement. La pause IA frapperait la classe moyenne cognitive — qui a (en théorie) plus de pouvoir politique.</p><p>Conséquence : la réaction politique pourrait être plus rapide qu'au XIX<sup>e</sup> siècle. Mais aussi plus chaotique, parce que les coalitions habituelles (gauche / droite, urbain / rural) ne sont pas stables sur ce clivage.</p>" }
  },
  "schema-06": {
    "metier-soins": { eyebrow: "Schéma 6 — Q1", title: "Soins, aide à la personne", body: "<p>Faible exposition à l'IA, forte complémentarité humaine. Présence physique, relation, jugement contextuel — tâches difficiles à automatiser et où le contexte humain est essentiel.</p><p>≈ 2,3 millions de postes en France. Secteur en croissance démographique (vieillissement). Rare cas où l'IA libère du temps administratif pour <em>plus</em> de relation humaine, pas <em>moins</em>.</p>" },
    "metier-batiment": { eyebrow: "Schéma 6 — Q1", title: "Bâtiment", body: "<p>Exposition très faible (gestes physiques, environnement non-structuré, conditions variables). Complémentarité forte (jugement, sécurité, savoir-faire).</p><p>1,7 million de postes. L'IA y entre par la marge (BIM, planification, achat de matériaux), mais le cœur du métier reste protégé pour les 10-15 prochaines années.</p>" },
    "metier-artisan": { eyebrow: "Schéma 6 — Q1", title: "Artisanat", body: "<p>Très peu exposé — combinaison gestes manuels, savoir-faire transmis, marché de niche. La rénovation et la création artisanale échappent aux modèles génériques.</p><p>≈ 0,6 million de postes. Métier sociétalement valorisé, soutenu par les politiques de transition écologique.</p>" },
    "metier-medecins": { eyebrow: "Schéma 6 — Q2", title: "Médecins", body: "<p>Forte exposition (l'IA performe dans certains diagnostics), <strong>très</strong> forte complémentarité (consultation, jugement clinique, autorité légale). Les LLM augmentent — pas remplacent.</p><p>≈ 0,2 million de postes. Le risque n'est pas la suppression mais une intensification (plus de patients, moins de temps par patient) si l'IA n'est pas négociée comme outil au service du soignant.</p>" },
    "metier-ingenieurs": { eyebrow: "Schéma 6 — Q2", title: "Ingénieurs et cadres techniques", body: "<p>Forte exposition (Copilot, design assisté, simulation), forte complémentarité (architecture, jugement système, responsabilité). C'est dans ce quadrant que les gains de productivité par travailleur sont les plus mesurables (Peng et al. : -56 % de temps).</p><p>≈ 1,2 million de postes en France. Risque marché : compression des juniors si la productivité par senior + IA suffit à couvrir la demande.</p>" },
    "metier-enseignement": { eyebrow: "Schéma 6 — Q2", title: "Enseignement supérieur", body: "<p>Exposition réelle (l'IA peut tenir une partie du cours magistral, faire l'évaluation), forte complémentarité (relation pédagogique, recherche, mentorat).</p><p>L'enjeu est moins le remplacement que la transformation des méthodes (classe inversée, accompagnement individualisé). Adoption institutionnelle lente.</p>" },
    "metier-magistrats": { eyebrow: "Schéma 6 — Q2", title: "Magistrats et juristes seniors", body: "<p>Forte exposition (IA juridique pour la recherche de jurisprudence, rédaction d'avis), très forte complémentarité (autorité, jugement, décision finale).</p><p>Le métier de magistrat senior est protégé. Les juniors juridiques (paralégaux, juristes en cabinet) sont en zone de risque (Schéma 6, Q4).</p>" },
    "metier-restauration": { eyebrow: "Schéma 6 — Q3", title: "Restauration", body: "<p>Exposition modérée (commande automatisée, optimisation de stocks, planning), faible complémentarité <em>algorithmique</em> mais forte composante humaine (service, ambiance).</p><p>≈ 1 million de postes. Ce qui s'automatise n'est pas le métier mais sa marge — caisse, prise de commande, certaines préparations.</p>" },
    "metier-agriculture": { eyebrow: "Schéma 6 — Q3", title: "Agriculture", body: "<p>Exposition limitée (robotique agricole, vision par ordinateur), faible complémentarité par travailleur (la transformation y est plus un sujet capital que travail).</p><p>≈ 0,5 million de postes. La pression vient moins de l'IA que de la concentration foncière, du climat, du commerce mondial.</p>" },
    "metier-secretariat": { eyebrow: "Schéma 6 — Q4", title: "Secrétariat, gestion administrative", body: "<p><strong>Quadrant rouge.</strong> Forte exposition (rédaction, planning, classement, comptabilité simple), faible complémentarité (peu de contexte humain irréductible). C'est la famille la plus à risque de substitution nette.</p><p>≈ 2 millions de postes en France. Première cible des reconversions, premier candidat aux scénarios « pause d'Engels » si les gains ne sont pas redistribués.</p>" },
    "metier-comptabilite": { eyebrow: "Schéma 6 — Q4", title: "Comptabilité", body: "<p>Forte exposition (saisie, contrôle, reporting), faible complémentarité (peu de relation client). L'IA + RPA peut absorber 50-70 % du temps comptable selon les études McKinsey.</p><p>≈ 0,5 million de postes. Métier qui s'élève vers l'expertise (audit, analyse) — les opérationnels sont en zone de risque.</p>" },
    "metier-centres-appel": { eyebrow: "Schéma 6 — Q4", title: "Centres d'appel", body: "<p>Forte exposition (Brynjolfsson et al. ont mesuré +14 % de productivité par agent ; certains rôles sont 100 % automatisables avec un agent vocal).</p><p>≈ 0,3 million de postes en France. Pression directe sur l'emploi attendue dès 2026-2028. Localisation souvent en villes moyennes — risque territorial significatif.</p>" },
    "metier-banque": { eyebrow: "Schéma 6 — Q4", title: "Banque de détail", body: "<p>Forte exposition (back-office, conformité, analyse de risque), faible complémentarité pour les rôles standardisés. Le rapport Benhamou identifie ce secteur comme l'un des trois prioritaires en France.</p><p>Restructurations bancaires déjà en cours depuis 2015 ; l'IA accélère un mouvement, ne le démarre pas.</p>" },
    "metier-journalisme": { eyebrow: "Schéma 6 — Q4", title: "Journalisme", body: "<p>Forte exposition (rédaction, recherche, traduction), complémentarité variable (l'investigation reste humaine ; la production de contenu de stock est automatisable).</p><p>Marché de l'emploi déjà tendu depuis 2010. L'IA accentue la pression sur les rôles standardisés et amplifie la concentration des médias.</p>" }
  },
  "schema-07": {
    "scenario-a-partagee": { eyebrow: "Schéma 7 — Scénario A", title: "Productivité partagée", body: "<p>Palier IA atteint en 7-10 ans, productivité agrégée +1 à +2 %/an, gains partagés entre capital et travail. Semaine de 4 jours dans les secteurs à fort gain. Revenu médian en croissance.</p><p>Conditions : politique fiscale active, formation continue à grande échelle, institutions de partage. <strong>Aucune n'est mécanique.</strong> Probabilité conditionnelle aux 3-5 prochaines années de choix politiques.</p>" },
    "scenario-b-engels": { eyebrow: "Schéma 7 — Scénario B", title: "Pause d'Engels 2.0", body: "<p>Productivité ↑, salaires médians stagnants. Concentration des gains au sommet. Polarisation de la classe moyenne cognitive. PIB mondial monte, bien-être médian stagne.</p><p>C'est le scénario par défaut sans choix politique. Politiquement explosif : réémergence des phénomènes de défiance démocratique, populisme, fragmentation. Acemoglu, Korinek le tiennent pour le risque dominant.</p>" },
    "scenario-c-plateau": { eyebrow: "Schéma 7 — Scénario C", title: "Le plateau", body: "<p>Palier IA plus long que prévu (15-20 ans). Modèles atteignant leurs limites (données, énergie, saturation des cas faciles). Gains diffus, intégration lente.</p><p>Le moins déstabilisant, mais aussi celui où l'Europe reste dépendante des modèles américains sans bénéfice industriel. Désillusion politique post-bulle possible.</p>" },
    "scenario-c2-stagnation": { eyebrow: "Schéma 7 — Variante C'", title: "Stagnation inégale", body: "<p>Diffusion lente <em>et</em> distribution dégradée. Pire des deux mondes : pas de gain agrégé suffisant pour amortir la transition, mais concentration croissante des rentes.</p><p>Configuration historiquement rare mais possible si les institutions de partage se dégradent plus vite que l'adoption IA ne progresse.</p>" },
    "scenario-d-rupture": { eyebrow: "Schéma 7 — Scénario D", title: "Rupture agentique", body: "<p>Palier &lt; 5 ans, porté par l'auto-amélioration des agents autonomes. Productivité macro +3-4 %/an. Choc de transition extrême sur le marché du travail.</p><p>Plausible selon les chercheurs en sécurité IA (Hinton, Bengio, Russell). Implique simultanément un saut technique et un effondrement institutionnel — soit deux questions à résoudre en parallèle, ce qui n'a quasiment jamais marché historiquement.</p>" }
  },
  "schema-08": {
    "levier-01-redirection": { eyebrow: "Schéma 8 — Levier 01", title: "Redirection technologique", body: "<p>Aligner fiscalement le travail et le capital algorithmique (aujourd'hui le travail supporte des cotisations massives, le capital algo presque rien). Financer la R&D <em>complémentaire</em>. Préférer dans les achats publics les systèmes qui démontrent une logique de complémentarité.</p><p>Référence : Acemoglu &amp; Johnson, <em>Power and Progress</em>, 2023. Levier le plus structurant à long terme — le moins activé politiquement aujourd'hui.</p>" },
    "levier-02-formation": { eyebrow: "Schéma 8 — Levier 02", title: "Formation continue à grande échelle", body: "<p>CPF universel et portable, formation aux outils IA pour 100 % des cadres en 5 ans, filières de reconversion accélérées 12-24 mois pour les métiers à forte exposition / faible complémentarité.</p><p>Référence : OCDE Employment Outlook 2025. Levier le plus consensuel, le plus cher, le plus structurellement difficile à activer dans des systèmes éducatifs conçus pour la formation initiale.</p>" },
    "levier-03-securisation": { eyebrow: "Schéma 8 — Levier 03", title: "Sécurisation des transitions", body: "<p>Indemnisation longue durée pour reconversions complexes (modèle danois), VAE accélérée, accompagnement individualisé (modèle suédois <em>Trygghetsråd</em>).</p><p>Référence : Benhamou, France Stratégie 2025. Coût ≈ 0,5-1 % du PIB pour une transition à grande échelle ; inférieur au coût social et politique d'une transition non-sécurisée.</p>" },
    "levier-04-partage": { eyebrow: "Schéma 8 — Levier 04", title: "Partage des gains", body: "<p>(a) Fiscalité du capital algorithmique (taxe modeste 1-3,7 %, MIT 2022). (b) Renforcement de la négociation collective. (c) Revenu universel (cas extrême, scénario D).</p><p>Le plus politiquement chargé. Convergence ponctuelle de Bill Gates, Mady Delvaux, Benoît Hamon, OIT, MIT — mais aucune mise en œuvre à grande échelle à ce jour.</p>" },
    "levier-05-gouvernance": { eyebrow: "Schéma 8 — Levier 05", title: "Gouvernance des modèles", body: "<p>AI Act EU (2024-2026), NIST AI RMF, codes de conduite volontaires. Audit, transparence, évaluation préalable, responsabilité. Voir mon dossier <em>Gouverner l'agent</em> pour le détail des 14 piliers et le coût ≈ 17 % du budget projet.</p><p>Levier transversal : plus la gouvernance est faible, plus le risque de scénarios B et D dominants augmente. Lien direct avec le procès Musk v. Altman sur la direction de l'IA.</p>" },
    "levier-06-territoires": { eyebrow: "Schéma 8 — Levier 06", title: "Revitalisation territoriale", body: "<p>Implantation IA hors métropoles, transformation numérique des PME régionales, investissement dans les infrastructures cognitives (santé, éducation) qui sont à la fois résistantes à l'automatisation et essentielles aux territoires.</p><p>Référence : Case &amp; Deaton, <em>Deaths of Despair</em> (2020). Le moins théorisé, le plus localement efficace. Les villes moyennes françaises sont la zone à risque dominante.</p>" }
  }
};
