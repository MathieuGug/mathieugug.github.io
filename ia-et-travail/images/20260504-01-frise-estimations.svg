<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" data-schema-id="schema-01">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="820" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="24" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Sept estimations, quatre unités de mesure incompatibles</text>
  <text x="60" y="116" class="display" font-size="14" font-style="italic" fill="#5A5A5A">Les chiffres marquants regroupés par <em>type de métrique</em>. Lire en colonne, pas en ligne — un % d'emplois exposés ne se compare pas à un % de productivité gagné.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LEGEND BAR — 4 metric types -->
  <text x="60" y="166" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">QUATRE FAÇONS DE MESURER L'IMPACT IA</text>

  <!-- legend pills -->
  <g>
    <rect x="60" y="178" width="270" height="28" rx="14" fill="#B7332C" opacity="0.10" stroke="#B7332C" stroke-width="1"/>
    <circle cx="78" cy="192" r="5" fill="#B7332C"/>
    <text x="92" y="196" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#B7332C">A · COMPTABILITÉ D'EXPOSITION</text>
  </g>
  <g>
    <rect x="345" y="178" width="215" height="28" rx="14" fill="#B58A2C" opacity="0.10" stroke="#B58A2C" stroke-width="1"/>
    <circle cx="363" cy="192" r="5" fill="#B58A2C"/>
    <text x="377" y="196" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#B58A2C">B · HEURES-ÉQUIVALENT</text>
  </g>
  <g>
    <rect x="575" y="178" width="290" height="28" rx="14" fill="#1F5560" opacity="0.10" stroke="#1F5560" stroke-width="1"/>
    <circle cx="593" cy="192" r="5" fill="#1F5560"/>
    <text x="607" y="196" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1F5560">C · EXPOSITION × COMPLÉMENTARITÉ</text>
  </g>
  <g>
    <rect x="880" y="178" width="260" height="28" rx="14" fill="#1A1A1A" opacity="0.08" stroke="#1A1A1A" stroke-width="1"/>
    <circle cx="898" cy="192" r="5" fill="#1A1A1A"/>
    <text x="912" y="196" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1A1A1A">D · MACROÉCONOMIQUE (TFP / PIB)</text>
  </g>

  <!-- Column headers -->
  <text x="60" y="240" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">SOURCE</text>
  <text x="60" y="252" class="mono" font-size="8" fill="#9A9CA5">auteur · institution · année</text>

  <text x="370" y="240" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">CHIFFRE PHARE</text>
  <text x="370" y="252" class="mono" font-size="8" fill="#9A9CA5">avec la <em>vraie</em> unité</text>

  <text x="640" y="240" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">CE QUE COMPTE LA MÉTRIQUE</text>
  <text x="640" y="252" class="mono" font-size="8" fill="#9A9CA5">méthode + hypothèse principale</text>

  <text x="1140" y="240" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A" text-anchor="end">FAMILLE</text>

  <line x1="60" y1="262" x2="1140" y2="262" stroke="#1A1A1A" stroke-width="0.75"/>

  <!-- ROW HEIGHTS: 70px each, starting y=272 -->

  <!-- ROW 1 — Frey & Osborne 2013 (FAMILY A) -->
  <g class="interactive" data-card="est-frey-osborne" tabindex="0" role="button" aria-label="Frey et Osborne 2013">
    <rect x="55" y="270" width="1090" height="68" fill="transparent"/>
    <!-- family pill on left -->
    <rect x="55" y="280" width="6" height="48" rx="3" fill="#B7332C"/>
    <!-- source -->
    <text x="72" y="298" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Frey &amp; Osborne</text>
    <text x="72" y="316" class="mono" font-size="10" fill="#5A5A5A">Oxford · 2013</text>
    <text x="72" y="330" class="mono" font-size="9" fill="#B7332C" letter-spacing="0.08em">A</text>
    <!-- chiffre + unit -->
    <text x="370" y="304" class="display" font-size="32" font-weight="600" fill="#B7332C">47<tspan font-size="22">%</tspan></text>
    <rect x="370" y="316" width="170" height="18" rx="9" fill="#B7332C" opacity="0.10"/>
    <text x="378" y="329" class="mono" font-size="9" font-weight="600" fill="#B7332C">% des emplois US à haut risque</text>
    <!-- méthode -->
    <text x="640" y="294" class="body" font-size="11" fill="#1A1A1A">Profession entière classée 100% automatisable</text>
    <text x="640" y="312" class="body" font-size="11" fill="#1A1A1A">si la majorité de ses tâches le sont.</text>
    <text x="640" y="330" class="body" font-size="10.5" font-style="italic" fill="#5A5A5A">étiquetage par 70 experts ML, extrapolation à 702 professions.</text>
    <text x="1140" y="298" class="mono" font-size="10" font-weight="600" fill="#B7332C" text-anchor="end">A</text>
    <text x="1140" y="316" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">granularité : profession</text>
  </g>
  <line x1="60" y1="346" x2="1140" y2="346" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ROW 2 — Arntz / OCDE 2016 (FAMILY A) -->
  <g class="interactive" data-card="est-arntz" tabindex="0" role="button" aria-label="Arntz et al OCDE 2016">
    <rect x="55" y="354" width="1090" height="68" fill="transparent"/>
    <rect x="55" y="364" width="6" height="48" rx="3" fill="#B7332C"/>
    <text x="72" y="382" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Arntz, Gregory, Zierahn</text>
    <text x="72" y="400" class="mono" font-size="10" fill="#5A5A5A">OCDE · 2016</text>
    <text x="72" y="414" class="mono" font-size="9" fill="#B7332C" letter-spacing="0.08em">A</text>
    <text x="370" y="388" class="display" font-size="32" font-weight="600" fill="#B7332C">9<tspan font-size="22">%</tspan></text>
    <rect x="370" y="400" width="170" height="18" rx="9" fill="#B7332C" opacity="0.10"/>
    <text x="378" y="413" class="mono" font-size="9" font-weight="600" fill="#B7332C">% des emplois OCDE</text>
    <text x="640" y="378" class="body" font-size="11" fill="#1A1A1A">Refait Frey-Osborne, mais en granularité tâche</text>
    <text x="640" y="396" class="body" font-size="11" fill="#1A1A1A">individuelle plutôt que profession entière.</text>
    <text x="640" y="414" class="body" font-size="10.5" font-style="italic" fill="#5A5A5A">divise mécaniquement le chiffre Frey-Osborne par cinq.</text>
    <text x="1140" y="382" class="mono" font-size="10" font-weight="600" fill="#B7332C" text-anchor="end">A</text>
    <text x="1140" y="400" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">granularité : tâche</text>
  </g>
  <line x1="60" y1="430" x2="1140" y2="430" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ROW 3 — Eloundou OpenAI 2023 (FAMILY A) -->
  <g class="interactive" data-card="est-eloundou" tabindex="0" role="button" aria-label="Eloundou OpenAI 2023">
    <rect x="55" y="438" width="1090" height="68" fill="transparent"/>
    <rect x="55" y="448" width="6" height="48" rx="3" fill="#B7332C"/>
    <text x="72" y="466" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Eloundou et al.</text>
    <text x="72" y="484" class="mono" font-size="10" fill="#5A5A5A">OpenAI · 2023 / Science 2024</text>
    <text x="72" y="498" class="mono" font-size="9" fill="#B7332C" letter-spacing="0.08em">A</text>
    <text x="370" y="472" class="display" font-size="28" font-weight="600" fill="#B7332C">80<tspan font-size="20">%</tspan> <tspan fill="#5A5A5A" font-size="20">/</tspan> 19<tspan font-size="20">%</tspan></text>
    <rect x="370" y="484" width="200" height="18" rx="9" fill="#B7332C" opacity="0.10"/>
    <text x="378" y="497" class="mono" font-size="9" font-weight="600" fill="#B7332C">% travailleurs · ≥10% / ≥50% tâches</text>
    <text x="640" y="462" class="body" font-size="11" fill="#1A1A1A">19 000 tâches O*NET évaluées par GPT-4 ;</text>
    <text x="640" y="480" class="body" font-size="11" fill="#1A1A1A">trois niveaux d'exposition (E0 / E1 / E2).</text>
    <text x="640" y="498" class="body" font-size="10.5" font-style="italic" fill="#5A5A5A">deux récits possibles selon la statistique mise en avant.</text>
    <text x="1140" y="466" class="mono" font-size="10" font-weight="600" fill="#B7332C" text-anchor="end">A</text>
    <text x="1140" y="484" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">granularité : tâche · LLM judge</text>
  </g>
  <line x1="60" y1="514" x2="1140" y2="514" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ROW 4 — Goldman Sachs 2023 (FAMILY B) -->
  <g class="interactive" data-card="est-goldman" tabindex="0" role="button" aria-label="Goldman Sachs 2023">
    <rect x="55" y="522" width="1090" height="68" fill="transparent"/>
    <rect x="55" y="532" width="6" height="48" rx="3" fill="#B58A2C"/>
    <text x="72" y="550" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Briggs &amp; Kodnani</text>
    <text x="72" y="568" class="mono" font-size="10" fill="#5A5A5A">Goldman Sachs · mars 2023</text>
    <text x="72" y="582" class="mono" font-size="9" fill="#B58A2C" letter-spacing="0.08em">B</text>
    <text x="370" y="556" class="display" font-size="32" font-weight="600" fill="#B58A2C">300<tspan font-size="20">M</tspan></text>
    <rect x="370" y="568" width="200" height="18" rx="9" fill="#B58A2C" opacity="0.12"/>
    <text x="378" y="581" class="mono" font-size="9" font-weight="600" fill="#B58A2C">M équivalents temps plein affectés</text>
    <text x="640" y="546" class="body" font-size="11" fill="#1A1A1A">Pour chaque profession, % de tâches automatisables</text>
    <text x="640" y="564" class="body" font-size="11" fill="#1A1A1A">× effectifs, sommé en heures-équivalent.</text>
    <text x="640" y="582" class="body" font-size="10.5" font-style="italic" fill="#5A5A5A">≈ 25 % du temps US/UE · 6-7 % de déplacement net sur 10 ans.</text>
    <text x="1140" y="550" class="mono" font-size="10" font-weight="600" fill="#B58A2C" text-anchor="end">B</text>
    <text x="1140" y="568" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">+ macro résiduel : +7 % PIB monde</text>
  </g>
  <line x1="60" y1="598" x2="1140" y2="598" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ROW 5 — McKinsey 2023/2025 (FAMILY B) -->
  <g class="interactive" data-card="est-mckinsey" tabindex="0" role="button" aria-label="McKinsey 2023">
    <rect x="55" y="606" width="1090" height="68" fill="transparent"/>
    <rect x="55" y="616" width="6" height="48" rx="3" fill="#B58A2C"/>
    <text x="72" y="634" class="display" font-size="14" font-weight="600" fill="#1A1A1A">McKinsey Global Institute</text>
    <text x="72" y="652" class="mono" font-size="10" fill="#5A5A5A">2023, mise à jour 2025</text>
    <text x="72" y="666" class="mono" font-size="9" fill="#B58A2C" letter-spacing="0.08em">B</text>
    <text x="370" y="640" class="display" font-size="32" font-weight="600" fill="#B58A2C">30<tspan font-size="22">%</tspan></text>
    <rect x="370" y="652" width="200" height="18" rx="9" fill="#B58A2C" opacity="0.12"/>
    <text x="378" y="665" class="mono" font-size="9" font-weight="600" fill="#B58A2C">% heures travaillées d'ici 2030</text>
    <text x="640" y="630" class="body" font-size="11" fill="#1A1A1A">Heures × scénario d'adoption (point milieu),</text>
    <text x="640" y="648" class="body" font-size="11" fill="#1A1A1A">par secteur, taille d'entreprise et délai d'amortissement.</text>
    <text x="640" y="666" class="body" font-size="10.5" font-style="italic" fill="#5A5A5A">+ <em>reverse skill bias</em> · + macro : 2,6 à 4,4 T$/an de valeur.</text>
    <text x="1140" y="634" class="mono" font-size="10" font-weight="600" fill="#B58A2C" text-anchor="end">B</text>
    <text x="1140" y="652" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">cols blancs surexposés</text>
  </g>
  <line x1="60" y1="682" x2="1140" y2="682" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ROW 6 — IMF 2024 (FAMILY C) -->
  <g class="interactive" data-card="est-imf" tabindex="0" role="button" aria-label="FMI Cazzaniga Pizzinelli 2024">
    <rect x="55" y="690" width="1090" height="68" fill="transparent"/>
    <rect x="55" y="700" width="6" height="48" rx="3" fill="#1F5560"/>
    <text x="72" y="718" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Cazzaniga, Jaumotte, Pizzinelli</text>
    <text x="72" y="736" class="mono" font-size="10" fill="#5A5A5A">FMI · janvier 2024</text>
    <text x="72" y="750" class="mono" font-size="9" fill="#1F5560" letter-spacing="0.08em">C</text>
    <text x="370" y="724" class="display" font-size="28" font-weight="600" fill="#1F5560">60<tspan font-size="20">%</tspan> <tspan fill="#5A5A5A" font-size="20">/</tspan> 40<tspan font-size="20">%</tspan></text>
    <rect x="370" y="736" width="220" height="18" rx="9" fill="#1F5560" opacity="0.10"/>
    <text x="378" y="749" class="mono" font-size="9" font-weight="600" fill="#1F5560">% emplois exposés · av. / mondial</text>
    <text x="640" y="714" class="body" font-size="11" fill="#1A1A1A">Pondère l'exposition par un indice de complémentarité</text>
    <text x="640" y="732" class="body" font-size="11" fill="#1A1A1A">humaine (jugement, présence, autorité légale).</text>
    <text x="640" y="750" class="body" font-size="10.5" font-style="italic" fill="#5A5A5A">26 % pays à bas revenu · complémentarité corrélée au revenu.</text>
    <text x="1140" y="718" class="mono" font-size="10" font-weight="600" fill="#1F5560" text-anchor="end">C</text>
    <text x="1140" y="736" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">expo. pondérée par contexte</text>
  </g>
  <line x1="60" y1="766" x2="1140" y2="766" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ROW 7 — Acemoglu 2024 (FAMILY D) -->
  <g class="interactive" data-card="est-acemoglu" tabindex="0" role="button" aria-label="Acemoglu 2024">
    <rect x="55" y="774" width="1090" height="34" fill="transparent"/>
    <rect x="55" y="776" width="6" height="28" rx="3" fill="#1A1A1A"/>
    <text x="72" y="788" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Daron Acemoglu</text>
    <text x="72" y="803" class="mono" font-size="9" fill="#5A5A5A">MIT · 2024 · borne basse</text>
    <text x="370" y="794" class="display" font-size="22" font-weight="600" fill="#1A1A1A">0,55<tspan font-size="16">%</tspan></text>
    <rect x="370" y="800" width="180" height="13" rx="6.5" fill="#1A1A1A" opacity="0.08"/>
    <text x="378" y="809" class="mono" font-size="8" font-weight="600" fill="#1A1A1A">% TFP cumulée sur 10 ans</text>
    <text x="640" y="788" class="body" font-size="10.5" fill="#1A1A1A">Théorème de Hulten : 20 % tâches × 23 % profitables × 27 % gain.</text>
    <text x="640" y="803" class="body" font-size="10" font-style="italic" fill="#5A5A5A">≈ 1,1-1,6 % PIB cumulé · 0,05 % par an.</text>
    <text x="1140" y="788" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="end">D</text>
    <text x="1140" y="803" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">macro après adoption profitable</text>
  </g>
</svg>
