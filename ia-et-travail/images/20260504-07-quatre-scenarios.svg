<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" data-schema-id="schema-07">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="780" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="92" class="display" font-size="24" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Quatre scénarios pour 2035</text>
  <text x="60" y="116" class="display" font-size="14" font-style="italic" fill="#5A5A5A">Vitesse de diffusion (lente / rapide) × distribution des gains (concentrée / partagée). Aucun n'est inéluctable.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- 2x2 quadrants -->
  <line x1="650" y1="180" x2="650" y2="600" stroke="#1A1A1A" stroke-width="0.75"/>
  <line x1="200" y1="390" x2="1100" y2="390" stroke="#1A1A1A" stroke-width="0.75"/>
  <rect x="200" y="180" width="900" height="420" fill="none" stroke="#1A1A1A" stroke-width="0.75"/>

  <!-- AXES LABELS -->
  <text x="650" y="170" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1A1A1A" text-anchor="middle">VITESSE DE DIFFUSION</text>
  <text x="425" y="170" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">← lente (palier &gt; 15 ans)</text>
  <text x="875" y="170" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">rapide (palier &lt; 7 ans) →</text>

  <text x="183" y="390" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90, 183, 390)">DISTRIBUTION DES GAINS</text>
  <text x="190" y="285" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">↑ partagés</text>
  <text x="190" y="500" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">↓ concentrés</text>

  <!-- QUADRANT TINTS -->
  <rect x="200.5" y="180.5" width="449" height="209" fill="#1F5560" opacity="0.06"/>
  <rect x="650.5" y="180.5" width="449" height="209" fill="#1F5560" opacity="0.10"/>
  <rect x="200.5" y="390.5" width="449" height="209" fill="#5A5A5A" opacity="0.04"/>
  <rect x="650.5" y="390.5" width="449" height="209" fill="#B7332C" opacity="0.08"/>

  <!-- TOP-LEFT: Scénario C — Plateau (slow + shared) -->
  <g class="interactive" data-card="scenario-c-plateau" tabindex="0" role="button" aria-label="Scénario C — Plateau">
    <rect x="210" y="190" width="430" height="190" fill="transparent"/>
    <text x="225" y="216" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560">SCÉNARIO C</text>
    <text x="225" y="244" class="display" font-size="22" font-weight="600" fill="#1A1A1A">Le plateau</text>
    <line x1="225" y1="256" x2="625" y2="256" stroke="#1F5560" stroke-width="0.5"/>
    <text x="225" y="278" class="body" font-size="11.5" fill="#1A1A1A">L'IA atteint un palier capacitaire ; gains</text>
    <text x="225" y="295" class="body" font-size="11.5" fill="#1A1A1A">diffus, lente intégration dans les processus.</text>
    <text x="225" y="324" class="body" font-size="11" font-style="italic" fill="#5A5A5A">≈ Acemoglu, scénario bas : 0,55% TFP / 10 ans</text>
    <text x="225" y="346" class="mono" font-size="10" fill="#1F5560">+ adaptation institutionnelle aisée</text>
    <text x="225" y="362" class="mono" font-size="10" fill="#5A5A5A">– désillusion politique post-bulle</text>
  </g>

  <!-- TOP-RIGHT: Scénario A — Productivité partagée (fast + shared) -->
  <g class="interactive" data-card="scenario-a-partagee" tabindex="0" role="button" aria-label="Scénario A — Productivité partagée">
    <rect x="660" y="190" width="430" height="190" fill="transparent"/>
    <text x="675" y="216" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560">SCÉNARIO A</text>
    <text x="675" y="244" class="display" font-size="22" font-weight="600" fill="#1A1A1A">Productivité partagée</text>
    <line x1="675" y1="256" x2="1075" y2="256" stroke="#1F5560" stroke-width="0.5"/>
    <text x="675" y="278" class="body" font-size="11.5" fill="#1A1A1A">Palier en 7-10 ans, gains entre 1 et 2%/an,</text>
    <text x="675" y="295" class="body" font-size="11.5" fill="#1A1A1A">redistribution active. Semaine de 4 jours.</text>
    <text x="675" y="324" class="body" font-size="11" font-style="italic" fill="#5A5A5A">≈ McKinsey haut, Aghion, Brynjolfsson</text>
    <text x="675" y="346" class="mono" font-size="10" fill="#1F5560">+ croissance + bien-être médian</text>
    <text x="675" y="362" class="mono" font-size="10" fill="#5A5A5A">– demande 3 conditions politiques fortes</text>
  </g>

  <!-- BOTTOM-LEFT: Variante C' — Stagnation inégale (slow + concentrated) -->
  <g class="interactive" data-card="scenario-c2-stagnation" tabindex="0" role="button" aria-label="Variante C' — Stagnation inégale">
    <rect x="210" y="400" width="430" height="190" fill="transparent"/>
    <text x="225" y="426" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#5A5A5A">VARIANTE C'</text>
    <text x="225" y="454" class="display" font-size="22" font-weight="600" fill="#1A1A1A">Stagnation inégale</text>
    <line x1="225" y1="466" x2="625" y2="466" stroke="#5A5A5A" stroke-width="0.5"/>
    <text x="225" y="488" class="body" font-size="11.5" fill="#1A1A1A">Diffusion lente, mais les rentes se</text>
    <text x="225" y="505" class="body" font-size="11.5" fill="#1A1A1A">concentrent quand même au sommet.</text>
    <text x="225" y="534" class="body" font-size="11" font-style="italic" fill="#5A5A5A">≈ extension de la stagnation TIC 2000-2020</text>
    <text x="225" y="556" class="mono" font-size="10" fill="#5A5A5A">– pire des deux mondes : pas de gain agrégé,</text>
    <text x="225" y="572" class="mono" font-size="10" fill="#5A5A5A">distribution dégradée, désengagement civique</text>
  </g>

  <!-- BOTTOM-RIGHT: Scénario B — Pause d'Engels 2.0 (fast + concentrated) -->
  <g class="interactive" data-card="scenario-b-engels" tabindex="0" role="button" aria-label="Scénario B — Pause d'Engels 2.0">
    <rect x="660" y="400" width="370" height="190" fill="transparent"/>
    <text x="675" y="426" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">SCÉNARIO B</text>
    <text x="675" y="454" class="display" font-size="22" font-weight="600" fill="#1A1A1A">Pause d'Engels 2.0</text>
    <line x1="675" y1="466" x2="1015" y2="466" stroke="#B7332C" stroke-width="0.5"/>
    <text x="675" y="488" class="body" font-size="11.5" fill="#1A1A1A">Productivité ↑, salaires médians stagnent,</text>
    <text x="675" y="505" class="body" font-size="11.5" fill="#1A1A1A">classe moyenne cognitive polarisée.</text>
    <text x="675" y="534" class="body" font-size="11" font-style="italic" fill="#5A5A5A">≈ Acemoglu-Korinek, scénario d'alerte</text>
    <text x="675" y="556" class="mono" font-size="10" fill="#5A5A5A">– défiance démocratique, vote populiste</text>
    <text x="675" y="572" class="mono" font-size="10" fill="#5A5A5A">– par défaut sans choix politique</text>
  </g>

  <!-- SCÉNARIO D — Rupture agentique (extreme of B, bottom-right corner with arrow showing it's "even more extreme") -->
  <g class="interactive" data-card="scenario-d-rupture" tabindex="0" role="button" aria-label="Scénario D — Rupture agentique">
    <!-- Container at bottom-right corner, slightly extruded outside the matrix box -->
    <rect x="1040" y="430" width="130" height="142" rx="6" fill="#B58A2C" opacity="0.10" stroke="#B58A2C" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="1105" y="452" class="mono" font-size="9" font-weight="600" letter-spacing="0.14em" fill="#B58A2C" text-anchor="middle">SCÉNARIO D</text>
    <text x="1105" y="478" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">Rupture</text>
    <text x="1105" y="494" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">agentique</text>
    <line x1="1055" y1="510" x2="1155" y2="510" stroke="#B58A2C" stroke-width="0.5"/>
    <text x="1105" y="530" class="body" font-size="9.5" font-style="italic" fill="#5A5A5A" text-anchor="middle">palier &lt; 5 ans</text>
    <text x="1105" y="544" class="body" font-size="9.5" font-style="italic" fill="#5A5A5A" text-anchor="middle">+3-4 %/an</text>
    <text x="1105" y="563" class="mono" font-size="9" fill="#B58A2C" text-anchor="middle">extrême de B</text>
  </g>
  <!-- arrow from B box pointing into D zone, signaling continuity -->
  <line x1="1015" y1="495" x2="1035" y2="495" stroke="#B58A2C" stroke-width="0.75" stroke-dasharray="2 2"/>

  <!-- BOTTOM PANEL — Variables clés -->
  <line x1="60" y1="630" x2="1140" y2="630" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="60" y="654" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">VARIABLES CLÉS — CE QUI BASCULE LE SCÉNARIO</text>

  <g>
    <text x="60" y="684" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Vitesse</text>
    <text x="60" y="704" class="body" font-size="11" fill="#5A5A5A">Capacités &amp; coûts modèles</text>
    <text x="60" y="720" class="body" font-size="11" fill="#5A5A5A">Délai de réorganisation</text>
    <text x="60" y="736" class="body" font-size="11" fill="#5A5A5A">Disponibilité des données</text>
  </g>
  <g>
    <text x="280" y="684" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Distribution</text>
    <text x="280" y="704" class="body" font-size="11" fill="#5A5A5A">Pouvoir de négociation</text>
    <text x="280" y="720" class="body" font-size="11" fill="#5A5A5A">Fiscalité du capital algo</text>
    <text x="280" y="736" class="body" font-size="11" fill="#5A5A5A">Concurrence amont</text>
  </g>
  <g>
    <text x="500" y="684" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Gouvernance</text>
    <text x="500" y="704" class="body" font-size="11" fill="#5A5A5A">AI Act, NIST AI RMF</text>
    <text x="500" y="720" class="body" font-size="11" fill="#5A5A5A">Gouvernance agentique</text>
    <text x="500" y="736" class="body" font-size="11" fill="#5A5A5A">Régulation marchés</text>
  </g>
  <g>
    <text x="720" y="684" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Formation</text>
    <text x="720" y="704" class="body" font-size="11" fill="#5A5A5A">Continue, à grande échelle</text>
    <text x="720" y="720" class="body" font-size="11" fill="#5A5A5A">Reconversion sectorielle</text>
    <text x="720" y="736" class="body" font-size="11" fill="#5A5A5A">Compétences cognitives</text>
  </g>
  <g>
    <text x="940" y="684" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Géographie</text>
    <text x="940" y="704" class="body" font-size="11" fill="#5A5A5A">Concentration calcul/données</text>
    <text x="940" y="720" class="body" font-size="11" fill="#5A5A5A">Souveraineté numérique</text>
    <text x="940" y="736" class="body" font-size="11" fill="#5A5A5A">Maillage territorial</text>
  </g>

  <text x="60" y="765" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : la trajectoire 2026 → 2035 dépend moins de la technologie que des cinq variables ci-dessus, toutes politiquement actionnables.</text>
</svg>
