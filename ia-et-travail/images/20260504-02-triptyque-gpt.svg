<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" data-schema-id="schema-02">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="780" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="24" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le triptyque GPT — pourquoi l'IA générative change d'époque</text>
  <text x="60" y="116" class="display" font-size="14" font-style="italic" fill="#5A5A5A">Les trois critères de Bresnahan &amp; Trajtenberg (1995) appliqués à quatre technologies à usage général.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- THREE CRITERIA HEADERS -->
  <g class="interactive" data-card="gpt-pervasivite" tabindex="0" role="button" aria-label="Critère 1 — pervasivité">
    <rect x="80" y="170" width="320" height="118" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="100" y="196" class="mono" font-size="10" font-weight="600" letter-spacing="0.18em" fill="#B7332C">CRITÈRE 01</text>
    <text x="100" y="224" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Pervasivité</text>
    <line x1="100" y1="234" x2="380" y2="234" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="100" y="254" class="body" font-size="11.5" fill="#1A1A1A">La technologie se diffuse à la majorité</text>
    <text x="100" y="270" class="body" font-size="11.5" fill="#1A1A1A">des secteurs économiques.</text>
  </g>

  <g class="interactive" data-card="gpt-amelioration" tabindex="0" role="button" aria-label="Critère 2 — amélioration">
    <rect x="440" y="170" width="320" height="118" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="460" y="196" class="mono" font-size="10" font-weight="600" letter-spacing="0.18em" fill="#1F5560">CRITÈRE 02</text>
    <text x="460" y="224" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Amélioration intrinsèque</text>
    <line x1="460" y1="234" x2="740" y2="234" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="460" y="254" class="body" font-size="11.5" fill="#1A1A1A">Elle se perfectionne dans le temps</text>
    <text x="460" y="270" class="body" font-size="11.5" fill="#1A1A1A">et fait baisser ses propres coûts d'usage.</text>
  </g>

  <g class="interactive" data-card="gpt-complementarite" tabindex="0" role="button" aria-label="Critère 3 — complémentarités">
    <rect x="800" y="170" width="320" height="118" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="820" y="196" class="mono" font-size="10" font-weight="600" letter-spacing="0.18em" fill="#B58A2C">CRITÈRE 03</text>
    <text x="820" y="224" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Complémentarités</text>
    <line x1="820" y1="234" x2="1100" y2="234" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="820" y="254" class="body" font-size="11.5" fill="#1A1A1A">Son adoption stimule l'innovation</text>
    <text x="820" y="270" class="body" font-size="11.5" fill="#1A1A1A">dans les secteurs qui l'utilisent.</text>
  </g>

  <!-- COMPARISON GRID HEADER -->
  <text x="60" y="328" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">QUATRE GPT, TROIS CRITÈRES</text>
  <line x1="60" y1="340" x2="1140" y2="340" stroke="#1A1A1A" stroke-width="0.75"/>

  <!-- columns headers (centered above dots+text zone of each criterion) -->
  <text x="60" y="368" class="mono" font-size="9" font-weight="600" letter-spacing="0.16em" fill="#5A5A5A">TECHNOLOGIE</text>
  <text x="447" y="368" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C" text-anchor="middle">PERVASIVITÉ</text>
  <text x="717" y="368" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560" text-anchor="middle">AMÉLIORATION</text>
  <text x="1005" y="368" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B58A2C" text-anchor="middle">COMPLÉMENTARITÉS</text>

  <!-- column separators (subtle vertical lines to delineate) -->
  <line x1="320" y1="380" x2="320" y2="690" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="575" y1="380" x2="575" y2="690" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="860" y1="380" x2="860" y2="690" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ROW 1 — Steam -->
  <g class="interactive" data-card="gpt-vapeur" tabindex="0" role="button" aria-label="Machine à vapeur">
    <rect x="55" y="385" width="1090" height="65" fill="transparent"/>
    <text x="65" y="412" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Machine à vapeur</text>
    <text x="65" y="430" class="mono" font-size="9" fill="#5A5A5A">≈ 1769 — Watt</text>
    <!-- pervasivité dots -->
    <circle cx="340" cy="423" r="6" fill="#B7332C"/>
    <circle cx="360" cy="423" r="6" fill="#B7332C"/>
    <circle cx="380" cy="423" r="6" fill="#B7332C"/>
    <circle cx="400" cy="423" r="6" fill="#E5E1D8"/>
    <circle cx="420" cy="423" r="6" fill="#E5E1D8"/>
    <text x="440" y="427" class="body" font-size="10" fill="#5A5A5A">manuf., transport, mines</text>
    <!-- amélioration dots -->
    <circle cx="595" cy="423" r="6" fill="#1F5560"/>
    <circle cx="615" cy="423" r="6" fill="#1F5560"/>
    <circle cx="635" cy="423" r="6" fill="#1F5560"/>
    <circle cx="655" cy="423" r="6" fill="#1F5560"/>
    <circle cx="675" cy="423" r="6" fill="#E5E1D8"/>
    <text x="695" y="427" class="body" font-size="10" fill="#5A5A5A">rendement × 4 / siècle</text>
    <!-- complémentarités dots -->
    <circle cx="880" cy="423" r="6" fill="#B58A2C"/>
    <circle cx="900" cy="423" r="6" fill="#B58A2C"/>
    <circle cx="920" cy="423" r="6" fill="#B58A2C"/>
    <circle cx="940" cy="423" r="6" fill="#E5E1D8"/>
    <circle cx="960" cy="423" r="6" fill="#E5E1D8"/>
    <text x="980" y="427" class="body" font-size="10" fill="#5A5A5A">organisation usinière</text>
  </g>
  <line x1="60" y1="455" x2="1140" y2="455" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ROW 2 — Electricity -->
  <g class="interactive" data-card="gpt-electricite" tabindex="0" role="button" aria-label="Électricité">
    <rect x="55" y="465" width="1090" height="65" fill="transparent"/>
    <text x="65" y="492" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Électricité</text>
    <text x="65" y="510" class="mono" font-size="9" fill="#5A5A5A">≈ 1880 — Edison, Tesla</text>
    <circle cx="340" cy="503" r="6" fill="#B7332C"/>
    <circle cx="360" cy="503" r="6" fill="#B7332C"/>
    <circle cx="380" cy="503" r="6" fill="#B7332C"/>
    <circle cx="400" cy="503" r="6" fill="#B7332C"/>
    <circle cx="420" cy="503" r="6" fill="#B7332C"/>
    <text x="440" y="507" class="body" font-size="10" fill="#5A5A5A">tous secteurs et foyers</text>
    <circle cx="595" cy="503" r="6" fill="#1F5560"/>
    <circle cx="615" cy="503" r="6" fill="#1F5560"/>
    <circle cx="635" cy="503" r="6" fill="#1F5560"/>
    <circle cx="655" cy="503" r="6" fill="#1F5560"/>
    <circle cx="675" cy="503" r="6" fill="#1F5560"/>
    <text x="695" y="507" class="body" font-size="10" fill="#5A5A5A">coût/kWh ÷10 / 50 ans</text>
    <circle cx="880" cy="503" r="6" fill="#B58A2C"/>
    <circle cx="900" cy="503" r="6" fill="#B58A2C"/>
    <circle cx="920" cy="503" r="6" fill="#B58A2C"/>
    <circle cx="940" cy="503" r="6" fill="#B58A2C"/>
    <circle cx="960" cy="503" r="6" fill="#E5E1D8"/>
    <text x="980" y="507" class="body" font-size="10" fill="#5A5A5A">moteur unitaire, ligne d'ass.</text>
  </g>
  <line x1="60" y1="535" x2="1140" y2="535" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ROW 3 — ICT -->
  <g class="interactive" data-card="gpt-tic" tabindex="0" role="button" aria-label="Technologies de l'information">
    <rect x="55" y="545" width="1090" height="65" fill="transparent"/>
    <text x="65" y="572" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Technologies de l'information</text>
    <text x="65" y="590" class="mono" font-size="9" fill="#5A5A5A">≈ 1970 — semi-conducteurs, Internet</text>
    <circle cx="340" cy="583" r="6" fill="#B7332C"/>
    <circle cx="360" cy="583" r="6" fill="#B7332C"/>
    <circle cx="380" cy="583" r="6" fill="#B7332C"/>
    <circle cx="400" cy="583" r="6" fill="#B7332C"/>
    <circle cx="420" cy="583" r="6" fill="#B7332C"/>
    <text x="440" y="587" class="body" font-size="10" fill="#5A5A5A">tous secteurs cognitifs</text>
    <circle cx="595" cy="583" r="6" fill="#1F5560"/>
    <circle cx="615" cy="583" r="6" fill="#1F5560"/>
    <circle cx="635" cy="583" r="6" fill="#1F5560"/>
    <circle cx="655" cy="583" r="6" fill="#1F5560"/>
    <circle cx="675" cy="583" r="6" fill="#1F5560"/>
    <text x="695" y="587" class="body" font-size="10" fill="#5A5A5A">Moore — coût/transistor ÷1000</text>
    <circle cx="880" cy="583" r="6" fill="#B58A2C"/>
    <circle cx="900" cy="583" r="6" fill="#B58A2C"/>
    <circle cx="920" cy="583" r="6" fill="#B58A2C"/>
    <circle cx="940" cy="583" r="6" fill="#B58A2C"/>
    <circle cx="960" cy="583" r="6" fill="#B58A2C"/>
    <text x="980" y="587" class="body" font-size="10" fill="#5A5A5A">e-commerce, biotech, finance</text>
  </g>
  <line x1="60" y1="615" x2="1140" y2="615" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ROW 4 — Generative AI -->
  <g class="interactive" data-card="gpt-ia" tabindex="0" role="button" aria-label="IA générative">
    <rect x="55" y="625" width="1090" height="65" fill="transparent"/>
    <text x="65" y="652" class="display" font-size="15" font-weight="600" fill="#1A1A1A">IA générative</text>
    <text x="65" y="670" class="mono" font-size="9" fill="#5A5A5A">≈ 2022 — Transformer, ChatGPT</text>
    <circle cx="340" cy="663" r="6" fill="#B7332C"/>
    <circle cx="360" cy="663" r="6" fill="#B7332C"/>
    <circle cx="380" cy="663" r="6" fill="#B7332C"/>
    <circle cx="400" cy="663" r="6" fill="#B7332C"/>
    <circle cx="420" cy="663" r="6" fill="#E5E1D8"/>
    <text x="440" y="667" class="body" font-size="10" fill="#5A5A5A">diffusion logicielle rapide</text>
    <circle cx="595" cy="663" r="6" fill="#1F5560"/>
    <circle cx="615" cy="663" r="6" fill="#1F5560"/>
    <circle cx="635" cy="663" r="6" fill="#1F5560"/>
    <circle cx="655" cy="663" r="6" fill="#1F5560"/>
    <circle cx="675" cy="663" r="6" fill="#E5E1D8"/>
    <text x="695" y="667" class="body" font-size="10" fill="#5A5A5A">coût/token ÷100 (2023-2025)</text>
    <circle cx="880" cy="663" r="6" fill="#B58A2C"/>
    <circle cx="900" cy="663" r="6" fill="#B58A2C"/>
    <circle cx="920" cy="663" r="6" fill="#B58A2C"/>
    <circle cx="940" cy="663" r="6" fill="#E5E1D8"/>
    <circle cx="960" cy="663" r="6" fill="#E5E1D8"/>
    <text x="980" y="667" class="body" font-size="10" fill="#5A5A5A">agents, copilots, recherche aug.</text>
  </g>
  <line x1="60" y1="695" x2="1140" y2="695" stroke="#1A1A1A" stroke-width="0.75"/>

  <!-- TAKEAWAY -->
  <text x="60" y="722" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">LECTURE</text>
  <text x="60" y="744" class="body" font-size="11.5" fill="#1A1A1A">L'IA générative coche les trois critères avec une intensité comparable aux GPT historiques. <tspan font-style="italic">Sa différence : la diffusion logicielle est plus rapide</tspan></text>
  <text x="60" y="761" class="body" font-size="11.5" fill="#1A1A1A">que la diffusion d'infrastructure physique — mais le palier de productivité dépend de la réorganisation, pas de la diffusion technique.</text>
</svg>
