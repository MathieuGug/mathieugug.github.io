<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" data-schema-id="schema-05">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="780" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="24" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">La pause d'Engels — productivité versus salaires réels</text>
  <text x="60" y="116" class="display" font-size="14" font-style="italic" fill="#5A5A5A">Grande-Bretagne, 1770-1900 (données Allen, 2009). Cinquante ans de gains capturés par le capital, jusqu'à ce que la politique change.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LEFT PANEL — Historic chart -->
  <text x="60" y="172" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">DONNÉES HISTORIQUES — GRANDE-BRETAGNE</text>

  <!-- Chart frame: x = 1770→1900, y = indice 100 = 1770 -->
  <!-- Plot area: x = 80..720, y = 200..540 (height 340, width 640) -->
  <!-- y-grid -->
  <g stroke="#E5E1D8" stroke-width="0.5" fill="none">
    <line x1="80" y1="540" x2="720" y2="540"/>
    <line x1="80" y1="475" x2="720" y2="475"/>
    <line x1="80" y1="410" x2="720" y2="410"/>
    <line x1="80" y1="345" x2="720" y2="345"/>
    <line x1="80" y1="280" x2="720" y2="280"/>
    <line x1="80" y1="215" x2="720" y2="215"/>
  </g>
  <line x1="80" y1="540" x2="720" y2="540" stroke="#1A1A1A" stroke-width="0.75"/>
  <line x1="80" y1="540" x2="80" y2="200" stroke="#1A1A1A" stroke-width="0.75"/>

  <!-- y-axis labels -->
  <text x="74" y="544" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">100</text>
  <text x="74" y="479" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">150</text>
  <text x="74" y="414" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">200</text>
  <text x="74" y="349" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">250</text>
  <text x="74" y="284" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">300</text>
  <text x="74" y="219" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">350</text>

  <!-- x-axis labels -->
  <text x="80" y="558" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">1770</text>
  <text x="178" y="558" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">1790</text>
  <text x="276" y="558" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">1810</text>
  <text x="374" y="558" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">1830</text>
  <text x="472" y="558" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">1840</text>
  <text x="570" y="558" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">1860</text>
  <text x="668" y="558" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">1900</text>
  <text x="720" y="572" class="mono" font-size="8" fill="#9A9CA5" text-anchor="end">indice base 100 = 1770</text>

  <!-- ENGELS PAUSE shading (1790-1840) -->
  <rect x="178" y="200" width="294" height="340" fill="#B7332C" opacity="0.06"/>
  <text x="325" y="190" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C" text-anchor="middle">PAUSE D'ENGELS · 1790–1840</text>

  <!-- Productivity curve (rising) — passes through (1770, 100), (1790, 110), (1810, 130), (1830, 165), (1840, 185), (1860, 230), (1900, 320) -->
  <!-- y_for_value: y = 540 - (value-100)*1.3  -->
  <!-- (100→540), (110→527), (130→501), (165→455.5), (185→429.5), (230→371), (320→254) -->
  <path d="M 80 540 L 178 527 L 276 501 L 374 455 L 472 430 L 570 371 L 668 254"
        fill="none" stroke="#1F5560" stroke-width="2.5"/>
  <circle cx="80" cy="540" r="3" fill="#1F5560"/>
  <circle cx="178" cy="527" r="3" fill="#1F5560"/>
  <circle cx="276" cy="501" r="3" fill="#1F5560"/>
  <circle cx="374" cy="455" r="3" fill="#1F5560"/>
  <circle cx="472" cy="430" r="3" fill="#1F5560"/>
  <circle cx="570" cy="371" r="3" fill="#1F5560"/>
  <circle cx="668" cy="254" r="3" fill="#1F5560"/>

  <!-- Real wages curve (flat 1790-1840 then rising) — (1770, 100), (1790, 102), (1810, 100), (1830, 105), (1840, 110), (1860, 145), (1900, 220) -->
  <!-- y values (using same scale): 540, 537.4, 540, 533.5, 527, 481.5, 384 -->
  <path d="M 80 540 L 178 537 L 276 540 L 374 534 L 472 527 L 570 482 L 668 384"
        fill="none" stroke="#B7332C" stroke-width="2.5"/>
  <circle cx="80" cy="540" r="3" fill="#B7332C"/>
  <circle cx="178" cy="537" r="3" fill="#B7332C"/>
  <circle cx="276" cy="540" r="3" fill="#B7332C"/>
  <circle cx="374" cy="534" r="3" fill="#B7332C"/>
  <circle cx="472" cy="527" r="3" fill="#B7332C"/>
  <circle cx="570" cy="482" r="3" fill="#B7332C"/>
  <circle cx="668" cy="384" r="3" fill="#B7332C"/>

  <!-- curve labels -->
  <text x="676" y="252" class="mono" font-size="10" font-weight="600" fill="#1F5560">productivité</text>
  <text x="676" y="266" class="body" font-size="9" font-style="italic" fill="#5A5A5A">×3,2</text>
  <text x="676" y="384" class="mono" font-size="10" font-weight="600" fill="#B7332C">salaires réels</text>
  <text x="676" y="398" class="body" font-size="9" font-style="italic" fill="#5A5A5A">×2,2</text>

  <!-- INFLECTION ANNOTATION at 1840 -->
  <line x1="472" y1="200" x2="472" y2="540" stroke="#1A1A1A" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="472" y="200" class="mono" font-size="8" font-weight="600" letter-spacing="0.14em" fill="#1A1A1A" text-anchor="middle">FACTORY ACTS · ÉDUCATION · SUFFRAGE</text>

  <!-- Source -->
  <text x="80" y="595" class="mono" font-size="8" fill="#9A9CA5">Allen 2009, Engels' Pause — Explorations in Economic History</text>

  <!-- RIGHT PANEL — IA scenario projection -->
  <line x1="765" y1="160" x2="765" y2="600" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="785" y="172" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">PROJECTION SCÉNARIO IA</text>

  <g class="interactive" data-card="engels-mecanisme" tabindex="0" role="button" aria-label="Mécanisme">
    <rect x="785" y="190" width="340" height="120" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="805" y="216" class="mono" font-size="9.5" font-weight="600" letter-spacing="0.16em" fill="#B7332C">MÉCANISME</text>
    <text x="805" y="240" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Productivité ↑, salaires →</text>
    <line x1="805" y1="252" x2="1105" y2="252" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="805" y="272" class="body" font-size="11" fill="#1A1A1A">Gains captés par le capital</text>
    <text x="805" y="288" class="body" font-size="11" fill="#1A1A1A">si pouvoir de négociation faible</text>
    <text x="805" y="304" class="body" font-size="11" fill="#1A1A1A">+ marché concentré IA.</text>
  </g>

  <g class="interactive" data-card="engels-vitesse" tabindex="0" role="button" aria-label="Vitesse">
    <rect x="785" y="325" width="340" height="120" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="805" y="351" class="mono" font-size="9.5" font-weight="600" letter-spacing="0.16em" fill="#1F5560">VITESSE</text>
    <text x="805" y="375" class="display" font-size="14" font-weight="600" fill="#1A1A1A">50 ans → 10 ans ?</text>
    <line x1="805" y1="387" x2="1105" y2="387" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="805" y="407" class="body" font-size="11" fill="#1A1A1A">Diffusion logicielle plus rapide</text>
    <text x="805" y="423" class="body" font-size="11" fill="#1A1A1A">— mais le palier dépend de la</text>
    <text x="805" y="439" class="body" font-size="11" fill="#1A1A1A">réorganisation, pas de l'outil.</text>
  </g>

  <g class="interactive" data-card="engels-cible" tabindex="0" role="button" aria-label="Cible">
    <rect x="785" y="460" width="340" height="120" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="805" y="486" class="mono" font-size="9.5" font-weight="600" letter-spacing="0.16em" fill="#B58A2C">CIBLE</text>
    <text x="805" y="510" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Cols blancs cette fois</text>
    <line x1="805" y1="522" x2="1105" y2="522" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="805" y="542" class="body" font-size="11" fill="#1A1A1A">Reverse skill bias : la classe</text>
    <text x="805" y="558" class="body" font-size="11" fill="#1A1A1A">moyenne cognitive est exposée,</text>
    <text x="805" y="574" class="body" font-size="11" fill="#1A1A1A">pas l'ouvrier industriel.</text>
  </g>

  <!-- BOTTOM TAKEAWAY (full width) -->
  <line x1="60" y1="630" x2="1140" y2="630" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="60" y="654" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">LA LEÇON HISTORIQUE</text>
  <text x="60" y="678" class="body" font-size="12" fill="#1A1A1A">Les gains de productivité ne se redistribuent pas automatiquement. La pause d'Engels n'a pris fin que par <tspan font-style="italic">conquête institutionnelle</tspan> :</text>
  <text x="60" y="697" class="body" font-size="12" fill="#1A1A1A">syndicalisation, scolarité, suffrage élargi, régulation industrielle. Le scénario IA dépend des mêmes leviers — sans automatisme.</text>
  <text x="60" y="730" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">Acemoglu, Johnson et Korinek convoquent explicitement ce précédent pour décrire le risque IA. La technologie est neuve ;</text>
  <text x="60" y="748" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">l'asymétrie de pouvoir entre détenteurs de capital algorithmique et travailleurs cognitifs ne l'est pas.</text>
</svg>
