<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" data-schema-id="schema-03">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arr-03" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="780" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="92" class="display" font-size="24" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Anatomie d'un framework d'estimation</text>
  <text x="60" y="116" class="display" font-size="14" font-style="italic" fill="#5A5A5A">Cinq étapes méthodologiques que chaque équipe combine différemment. Les choix faits à chaque étape déterminent l'ordre de grandeur du résultat.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- STEPS HEADER ROW (top) -->
  <!-- 5 steps in a row -->
  <g class="interactive" data-card="step-granularite" tabindex="0" role="button" aria-label="Étape 1 — granularité">
    <rect x="60" y="170" width="200" height="86" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="194" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">ÉTAPE 01</text>
    <text x="80" y="220" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Granularité</text>
    <text x="80" y="240" class="body" font-size="10.5" fill="#5A5A5A">profession entière vs tâche</text>
  </g>

  <g class="interactive" data-card="step-source" tabindex="0" role="button" aria-label="Étape 2 — source du jugement">
    <rect x="280" y="170" width="200" height="86" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="300" y="194" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">ÉTAPE 02</text>
    <text x="300" y="220" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Source du jugement</text>
    <text x="300" y="240" class="body" font-size="10.5" fill="#5A5A5A">expert, modèle, LLM</text>
  </g>

  <g class="interactive" data-card="step-metrique" tabindex="0" role="button" aria-label="Étape 3 — métrique d'exposition">
    <rect x="500" y="170" width="200" height="86" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="520" y="194" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">ÉTAPE 03</text>
    <text x="520" y="220" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Métrique d'exposition</text>
    <text x="520" y="240" class="body" font-size="10.5" fill="#5A5A5A">substitution / complément</text>
  </g>

  <g class="interactive" data-card="step-complementarite" tabindex="0" role="button" aria-label="Étape 4 — complémentarité">
    <rect x="720" y="170" width="200" height="86" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="740" y="194" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">ÉTAPE 04</text>
    <text x="740" y="220" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Complémentarité</text>
    <text x="740" y="240" class="body" font-size="10.5" fill="#5A5A5A">contexte de la profession</text>
  </g>

  <g class="interactive" data-card="step-conversion" tabindex="0" role="button" aria-label="Étape 5 — conversion en impact">
    <rect x="940" y="170" width="200" height="86" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="960" y="194" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">ÉTAPE 05</text>
    <text x="960" y="220" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Conversion en impact</text>
    <text x="960" y="240" class="body" font-size="10.5" fill="#5A5A5A">expo / heures / macro</text>
  </g>

  <!-- arrows between steps -->
  <line x1="262" y1="213" x2="278" y2="213" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr-03)"/>
  <line x1="482" y1="213" x2="498" y2="213" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr-03)"/>
  <line x1="702" y1="213" x2="718" y2="213" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr-03)"/>
  <line x1="922" y1="213" x2="938" y2="213" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arr-03)"/>

  <!-- VERTICAL OPTIONS BELOW EACH STEP -->
  <!-- Step 1 options -->
  <g>
    <rect x="60" y="285" width="95" height="50" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <text x="107" y="307" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">PROFESSION</text>
    <text x="107" y="324" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Frey 2013</text>
  </g>
  <g>
    <rect x="165" y="285" width="95" height="50" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="212" y="307" class="mono" font-size="10" fill="#1F5560" text-anchor="middle">TÂCHE</text>
    <text x="212" y="324" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">Acemoglu 2024</text>
  </g>

  <!-- Step 2 options -->
  <g>
    <rect x="280" y="285" width="62" height="50" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <text x="311" y="307" class="mono" font-size="9" fill="#B7332C" text-anchor="middle">EXPERT</text>
    <text x="311" y="324" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">Frey</text>
  </g>
  <g>
    <rect x="349" y="285" width="62" height="50" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="380" y="307" class="mono" font-size="9" fill="#1F5560" text-anchor="middle">O*NET</text>
    <text x="380" y="324" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">Acemoglu</text>
  </g>
  <g>
    <rect x="418" y="285" width="62" height="50" rx="2" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text x="449" y="307" class="mono" font-size="9" fill="#B58A2C" text-anchor="middle">LLM</text>
    <text x="449" y="324" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">Eloundou</text>
  </g>

  <!-- Step 3 options -->
  <g>
    <rect x="500" y="285" width="62" height="50" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <text x="531" y="307" class="mono" font-size="9" fill="#B7332C" text-anchor="middle">SUBST.</text>
    <text x="531" y="324" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">complète</text>
  </g>
  <g>
    <rect x="569" y="285" width="62" height="50" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="600" y="307" class="mono" font-size="9" fill="#1F5560" text-anchor="middle">SUBST.</text>
    <text x="600" y="324" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">partielle</text>
  </g>
  <g>
    <rect x="638" y="285" width="62" height="50" rx="2" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text x="669" y="307" class="mono" font-size="9" fill="#B58A2C" text-anchor="middle">COMPL.</text>
    <text x="669" y="324" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">augment.</text>
  </g>

  <!-- Step 4 options -->
  <g>
    <rect x="720" y="285" width="95" height="50" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <text x="767" y="307" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">FAIBLE</text>
    <text x="767" y="324" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">→ substitution</text>
  </g>
  <g>
    <rect x="825" y="285" width="95" height="50" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="872" y="307" class="mono" font-size="10" fill="#1F5560" text-anchor="middle">FORTE</text>
    <text x="872" y="324" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">→ complémentarité</text>
  </g>

  <!-- Step 5 options -->
  <g>
    <rect x="940" y="285" width="62" height="50" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75"/>
    <text x="971" y="307" class="mono" font-size="9" fill="#B7332C" text-anchor="middle">EXPO.</text>
    <text x="971" y="324" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">% emplois</text>
  </g>
  <g>
    <rect x="1009" y="285" width="62" height="50" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="1040" y="307" class="mono" font-size="9" fill="#1F5560" text-anchor="middle">HEURES</text>
    <text x="1040" y="324" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">ETP-équiv.</text>
  </g>
  <g>
    <rect x="1078" y="285" width="62" height="50" rx="2" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text x="1109" y="307" class="mono" font-size="9" fill="#B58A2C" text-anchor="middle">MACRO</text>
    <text x="1109" y="324" class="body" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">TFP/PIB</text>
  </g>

  <!-- TWO TRACES (illustrating different paths) -->
  <line x1="60" y1="370" x2="1140" y2="370" stroke="#1A1A1A" stroke-width="0.5"/>
  <text x="60" y="392" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">DEUX CHEMINS, DEUX RÉCITS</text>

  <!-- Trace A : Frey-Osborne -->
  <g class="interactive" data-card="trace-frey" tabindex="0" role="button" aria-label="Chemin Frey-Osborne 2013">
    <rect x="60" y="410" width="540" height="160" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="80" y="436" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">CHEMIN A — FREY &amp; OSBORNE 2013</text>
    <line x1="80" y1="446" x2="580" y2="446" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="80" y="468" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">Granularité :</tspan> profession · <tspan font-weight="600">Source :</tspan> 70 experts ML</text>
    <text x="80" y="486" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">Métrique :</tspan> substitution complète si majorité tâches automatisables</text>
    <text x="80" y="504" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">Complémentarité :</tspan> non considérée · <tspan font-weight="600">Conversion :</tspan> % emplois</text>
    <line x1="80" y1="518" x2="580" y2="518" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 2"/>
    <text x="80" y="544" class="display" font-size="22" font-weight="600" fill="#B7332C">→ 47% des emplois</text>
    <text x="80" y="562" class="body" font-size="10" font-style="italic" fill="#5A5A5A">à haut risque d'automatisation</text>
  </g>

  <!-- Trace B : Acemoglu -->
  <g class="interactive" data-card="trace-acemoglu" tabindex="0" role="button" aria-label="Chemin Acemoglu 2024">
    <rect x="620" y="410" width="520" height="160" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="640" y="436" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560">CHEMIN B — ACEMOGLU 2024</text>
    <line x1="640" y1="446" x2="1120" y2="446" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="640" y="468" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">Granularité :</tspan> tâche O*NET · <tspan font-weight="600">Source :</tspan> données empiriques</text>
    <text x="640" y="486" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">Métrique :</tspan> seulement tâches profitablement automatisables</text>
    <text x="640" y="504" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">Complémentarité :</tspan> implicite · <tspan font-weight="600">Conversion :</tspan> macro (Hulten)</text>
    <line x1="640" y1="518" x2="1120" y2="518" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 2"/>
    <text x="640" y="544" class="display" font-size="22" font-weight="600" fill="#1F5560">→ 0,55% TFP / 10 ans</text>
    <text x="640" y="562" class="body" font-size="10" font-style="italic" fill="#5A5A5A">soit ≈ 1,1-1,6% PIB cumulé</text>
  </g>

  <!-- BOTTOM TAKEAWAY -->
  <line x1="60" y1="600" x2="1140" y2="600" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="60" y="628" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">L'AMPLEUR DE L'ÉCART</text>
  <text x="60" y="652" class="body" font-size="12" fill="#1A1A1A">Les deux études parlent de la même réalité — l'IA agit sur le travail —, mais elles répondent à des questions différentes.</text>
  <text x="60" y="671" class="body" font-size="12" fill="#1A1A1A">Frey-Osborne : <tspan font-style="italic">qu'est-ce qui pourrait techniquement être automatisé ?</tspan></text>
  <text x="60" y="690" class="body" font-size="12" fill="#1A1A1A">Acemoglu : <tspan font-style="italic">quel impact macroéconomique attendre une fois les coûts d'adoption pris en compte ?</tspan></text>
  <text x="60" y="722" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">Tout commentaire qui agrège ces chiffres sans préciser le framework les rend faussement comparables.</text>
  <text x="60" y="740" class="body" font-size="11.5" font-style="italic" fill="#5A5A5A">La presse populaire et les décideurs gagnent à parler en fourchettes liées aux hypothèses, plutôt qu'en chiffre choc.</text>
</svg>
