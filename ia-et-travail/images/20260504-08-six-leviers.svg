<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" data-schema-id="schema-08">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="780" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 08</text>
  <text x="60" y="92" class="display" font-size="24" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Six leviers contre la catastrophe</text>
  <text x="60" y="116" class="display" font-size="14" font-style="italic" fill="#5A5A5A">Familles d'intervention publique pour orienter la trajectoire IA vers la productivité partagée. Convergent dans la littérature 2023-2025.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- HUB-AND-SPOKE: center hub + 6 levers around -->
  <!-- Center: 600, 420 -->
  <!-- 6 spokes at 60° intervals — angles in degrees: 90, 150, 210, 270, 330, 30 -->
  <!-- We'll place 3 above (across) and 3 below to use width better -->

  <!-- Center hub -->
  <circle cx="600" cy="420" r="92" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="600" cy="420" r="80" fill="none" stroke="#1A1A1A" stroke-width="0.5"/>
  <text x="600" y="408" class="display" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Orienter la</text>
  <text x="600" y="426" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">trajectoire IA</text>
  <text x="600" y="448" class="mono" font-size="9" font-style="italic" fill="#B7332C" text-anchor="middle">six leviers convergents</text>

  <!-- Lever 01 — Redirection technologique (top left) -->
  <g class="interactive" data-card="levier-01-redirection" tabindex="0" role="button" aria-label="Levier 1 — Redirection technologique">
    <rect x="60" y="180" width="290" height="140" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="80" y="206" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">LEVIER 01</text>
    <text x="80" y="232" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Redirection technologique</text>
    <line x1="80" y1="244" x2="330" y2="244" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="80" y="265" class="body" font-size="10.5" fill="#1A1A1A">Aligner fiscalement travail / capital algo</text>
    <text x="80" y="281" class="body" font-size="10.5" fill="#1A1A1A">Financer la R&amp;D <tspan font-style="italic">complémentaire</tspan></text>
    <text x="80" y="297" class="body" font-size="10.5" fill="#1A1A1A">Préférence achats publics</text>
    <text x="80" y="316" class="mono" font-size="9" fill="#5A5A5A">→ Acemoglu-Johnson, Power and Progress</text>
  </g>
  <line x1="350" y1="320" x2="510" y2="395" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- Lever 02 — Formation continue (top center) -->
  <g class="interactive" data-card="levier-02-formation" tabindex="0" role="button" aria-label="Levier 2 — Formation continue">
    <rect x="455" y="180" width="290" height="140" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="475" y="206" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560">LEVIER 02</text>
    <text x="475" y="232" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Formation continue</text>
    <line x1="475" y1="244" x2="725" y2="244" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="475" y="265" class="body" font-size="10.5" fill="#1A1A1A">CPF universel et portable</text>
    <text x="475" y="281" class="body" font-size="10.5" fill="#1A1A1A">100% des cadres formés en 5 ans</text>
    <text x="475" y="297" class="body" font-size="10.5" fill="#1A1A1A">Filières de reconversion 12-24 mois</text>
    <text x="475" y="316" class="mono" font-size="9" fill="#5A5A5A">→ OCDE Employment Outlook 2025</text>
  </g>
  <line x1="600" y1="320" x2="600" y2="328" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- Lever 03 — Sécurisation transitions (top right) -->
  <g class="interactive" data-card="levier-03-securisation" tabindex="0" role="button" aria-label="Levier 3 — Sécurisation des transitions">
    <rect x="850" y="180" width="290" height="140" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="870" y="206" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B58A2C">LEVIER 03</text>
    <text x="870" y="232" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Sécurisation des transitions</text>
    <line x1="870" y1="244" x2="1120" y2="244" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="870" y="265" class="body" font-size="10.5" fill="#1A1A1A">Indemnisation longue durée</text>
    <text x="870" y="281" class="body" font-size="10.5" fill="#1A1A1A">VAE accélérée, accompagnement</text>
    <text x="870" y="297" class="body" font-size="10.5" fill="#1A1A1A">Modèle flexicurité danois / suédois</text>
    <text x="870" y="316" class="mono" font-size="9" fill="#5A5A5A">→ Benhamou France Stratégie 2025</text>
  </g>
  <line x1="850" y1="320" x2="690" y2="395" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- Lever 04 — Partage des gains (bottom left) -->
  <g class="interactive" data-card="levier-04-partage" tabindex="0" role="button" aria-label="Levier 4 — Partage des gains">
    <rect x="60" y="520" width="290" height="140" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="80" y="546" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B7332C">LEVIER 04</text>
    <text x="80" y="572" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Partage des gains</text>
    <line x1="80" y1="584" x2="330" y2="584" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="80" y="605" class="body" font-size="10.5" fill="#1A1A1A">Fiscalité du capital algorithmique</text>
    <text x="80" y="621" class="body" font-size="10.5" fill="#1A1A1A">Renforcement négociation collective</text>
    <text x="80" y="637" class="body" font-size="10.5" fill="#1A1A1A">Revenu universel (cas extrême)</text>
    <text x="80" y="656" class="mono" font-size="9" fill="#5A5A5A">→ Costinot-Werning, Hamon, Delvaux</text>
  </g>
  <line x1="350" y1="520" x2="510" y2="445" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- Lever 05 — Gouvernance modèles (bottom center) -->
  <g class="interactive" data-card="levier-05-gouvernance" tabindex="0" role="button" aria-label="Levier 5 — Gouvernance des modèles">
    <rect x="455" y="520" width="290" height="140" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="475" y="546" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#1F5560">LEVIER 05</text>
    <text x="475" y="572" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Gouvernance des modèles</text>
    <line x1="475" y1="584" x2="725" y2="584" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="475" y="605" class="body" font-size="10.5" fill="#1A1A1A">AI Act EU, NIST AI RMF, audit</text>
    <text x="475" y="621" class="body" font-size="10.5" fill="#1A1A1A">14 piliers gouvernance agentique</text>
    <text x="475" y="637" class="body" font-size="10.5" fill="#1A1A1A">Coût ≈ 17% du budget projet IA</text>
    <text x="475" y="656" class="mono" font-size="9" fill="#5A5A5A">→ voir dossier Gouverner l'agent</text>
  </g>
  <line x1="600" y1="520" x2="600" y2="512" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- Lever 06 — Revitalisation territoriale (bottom right) -->
  <g class="interactive" data-card="levier-06-territoires" tabindex="0" role="button" aria-label="Levier 6 — Revitalisation territoriale">
    <rect x="850" y="520" width="290" height="140" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="870" y="546" class="mono" font-size="10" font-weight="600" letter-spacing="0.16em" fill="#B58A2C">LEVIER 06</text>
    <text x="870" y="572" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Revitalisation territoriale</text>
    <line x1="870" y1="584" x2="1120" y2="584" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="870" y="605" class="body" font-size="10.5" fill="#1A1A1A">Implantation IA hors métropoles</text>
    <text x="870" y="621" class="body" font-size="10.5" fill="#1A1A1A">Transformation numérique des PME</text>
    <text x="870" y="637" class="body" font-size="10.5" fill="#1A1A1A">Investir santé, éducation, social</text>
    <text x="870" y="656" class="mono" font-size="9" fill="#5A5A5A">→ Case-Deaton, deaths of despair</text>
  </g>
  <line x1="850" y1="520" x2="690" y2="445" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- BOTTOM TAKEAWAY -->
  <line x1="60" y1="690" x2="1140" y2="690" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="60" y="714" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">LECTURE</text>
  <text x="60" y="738" class="body" font-size="12" fill="#1A1A1A">Aucun levier ne suffit seul. La <tspan font-style="italic">combinaison</tspan> définit le scénario qu'une société choisit. La France a des atouts (formation continue,</text>
  <text x="60" y="757" class="body" font-size="12" fill="#1A1A1A">dialogue social) et des handicaps (lenteur d'adoption, fracture territoriale). Les choix faits dans les 3-5 prochaines années pèseront dix fois leur poids.</text>
</svg>
