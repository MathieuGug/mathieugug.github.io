<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" data-schema-id="schema-06">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="780" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="24" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Familles professionnelles françaises — exposition × complémentarité</text>
  <text x="60" y="116" class="display" font-size="14" font-style="italic" fill="#5A5A5A">DARES × INSEE × cadre Pizzinelli/FMI. Forte exposition + faible complémentarité = zone de risque substitutif (en bas à droite).</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- CHART AREA: x = exposition, y = complémentarité (high at top) -->
  <!-- Plot area: 200..1000 horizontal, 180..560 vertical -->
  <!-- (0..1) on x maps to 200..1000; (0..1) on y maps to 560..180 -->

  <!-- quadrant background tints -->
  <rect x="600" y="180" width="400" height="190" fill="#1F5560" opacity="0.04"/>
  <rect x="200" y="180" width="400" height="190" fill="#FAF8F3"/>
  <rect x="200" y="370" width="400" height="190" fill="#FAF8F3"/>
  <rect x="600" y="370" width="400" height="190" fill="#B7332C" opacity="0.06"/>

  <!-- axes -->
  <line x1="200" y1="560" x2="1000" y2="560" stroke="#1A1A1A" stroke-width="0.75"/>
  <line x1="200" y1="180" x2="200" y2="560" stroke="#1A1A1A" stroke-width="0.75"/>
  <!-- midpoint cross -->
  <line x1="600" y1="180" x2="600" y2="560" stroke="#5A5A5A" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="200" y1="370" x2="1000" y2="370" stroke="#5A5A5A" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- axis labels -->
  <text x="600" y="585" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">EXPOSITION À L'IA →</text>
  <text x="200" y="585" class="mono" font-size="9" fill="#5A5A5A" text-anchor="start">faible</text>
  <text x="1000" y="585" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">forte</text>

  <text x="180" y="370" class="mono" font-size="10" fill="#1A1A1A" text-anchor="end" transform="rotate(-90, 180, 370)">↑ COMPLÉMENTARITÉ HUMAINE</text>
  <text x="180" y="180" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">forte</text>
  <text x="180" y="555" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">faible</text>

  <!-- quadrant labels -->
  <text x="400" y="200" class="mono" font-size="9.5" font-weight="600" letter-spacing="0.16em" fill="#5A5A5A" text-anchor="middle">PEU TOUCHÉS</text>
  <text x="800" y="200" class="mono" font-size="9.5" font-weight="600" letter-spacing="0.16em" fill="#1F5560" text-anchor="middle">AUGMENTATION DE PRODUCTIVITÉ</text>
  <text x="400" y="556" class="mono" font-size="9.5" font-weight="600" letter-spacing="0.16em" fill="#5A5A5A" text-anchor="middle">PEU CONCERNÉS</text>
  <text x="800" y="556" class="mono" font-size="9.5" font-weight="600" letter-spacing="0.16em" fill="#B7332C" text-anchor="middle">RISQUE DE SUBSTITUTION</text>

  <!-- BUBBLES (12 families). r = sqrt(employment in millions) * factor -->
  <!-- Format: cx, cy, r, label, color, sector -->

  <!-- Q1: low expo, high compl (top-left) — services à la personne / artisanat / soins / bâtiment -->
  <g class="interactive" data-card="metier-soins" tabindex="0" role="button" aria-label="Soins et aide à la personne">
    <circle cx="320" cy="240" r="38" fill="#1F5560" opacity="0.2"/>
    <circle cx="320" cy="240" r="38" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="320" y="237" class="display" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Soins,</text>
    <text x="320" y="251" class="display" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">aide</text>
  </g>
  <g class="interactive" data-card="metier-batiment" tabindex="0" role="button" aria-label="Bâtiment">
    <circle cx="430" cy="290" r="32" fill="#1F5560" opacity="0.2"/>
    <circle cx="430" cy="290" r="32" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="430" y="294" class="display" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Bâtiment</text>
  </g>
  <g class="interactive" data-card="metier-artisan" tabindex="0" role="button" aria-label="Artisanat">
    <circle cx="280" cy="335" r="22" fill="#1F5560" opacity="0.2"/>
    <circle cx="280" cy="335" r="22" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="280" y="338" class="display" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">Artisanat</text>
  </g>

  <!-- Q2: high expo, high compl (top-right) — médecine, ingénierie, R&D, éducation supérieure, magistrature -->
  <g class="interactive" data-card="metier-medecins" tabindex="0" role="button" aria-label="Médecins et professions médicales">
    <circle cx="730" cy="225" r="26" fill="#1F5560" opacity="0.25"/>
    <circle cx="730" cy="225" r="26" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="730" y="228" class="display" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Médecins</text>
  </g>
  <g class="interactive" data-card="metier-ingenieurs" tabindex="0" role="button" aria-label="Ingénieurs et cadres techniques">
    <circle cx="850" cy="270" r="40" fill="#1F5560" opacity="0.25"/>
    <circle cx="850" cy="270" r="40" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="850" y="266" class="display" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Ingénieurs,</text>
    <text x="850" y="280" class="display" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">cadres tech.</text>
  </g>
  <g class="interactive" data-card="metier-enseignement" tabindex="0" role="button" aria-label="Enseignement supérieur et recherche">
    <circle cx="940" cy="320" r="28" fill="#1F5560" opacity="0.25"/>
    <circle cx="940" cy="320" r="28" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="940" y="316" class="display" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">Enseignants</text>
    <text x="940" y="328" class="display" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">supérieur</text>
  </g>
  <g class="interactive" data-card="metier-magistrats" tabindex="0" role="button" aria-label="Magistrats et juristes seniors">
    <circle cx="660" cy="320" r="20" fill="#1F5560" opacity="0.25"/>
    <circle cx="660" cy="320" r="20" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="660" y="324" class="display" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">Magistrats</text>
  </g>

  <!-- Q3: low expo, low compl (bottom-left) — agriculture, restauration, transport routier de personnes -->
  <g class="interactive" data-card="metier-restauration" tabindex="0" role="button" aria-label="Restauration">
    <circle cx="350" cy="450" r="34" fill="#5A5A5A" opacity="0.15"/>
    <circle cx="350" cy="450" r="34" fill="none" stroke="#5A5A5A" stroke-width="1.5"/>
    <text x="350" y="453" class="display" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Restauration</text>
  </g>
  <g class="interactive" data-card="metier-agriculture" tabindex="0" role="button" aria-label="Agriculture">
    <circle cx="280" cy="500" r="22" fill="#5A5A5A" opacity="0.15"/>
    <circle cx="280" cy="500" r="22" fill="none" stroke="#5A5A5A" stroke-width="1.5"/>
    <text x="280" y="503" class="display" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">Agriculture</text>
  </g>

  <!-- Q4: high expo, low compl (bottom-right) — secrétariat / comptabilité / centres d'appel / journalisme / banque détail / juniors juridiques -->
  <g class="interactive" data-card="metier-secretariat" tabindex="0" role="button" aria-label="Secrétariat et gestion administrative">
    <circle cx="850" cy="430" r="42" fill="#B7332C" opacity="0.22"/>
    <circle cx="850" cy="430" r="42" fill="none" stroke="#B7332C" stroke-width="1.5"/>
    <text x="850" y="426" class="display" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Secrétariat,</text>
    <text x="850" y="440" class="display" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">gestion admin.</text>
  </g>
  <g class="interactive" data-card="metier-comptabilite" tabindex="0" role="button" aria-label="Comptabilité">
    <circle cx="940" cy="475" r="26" fill="#B7332C" opacity="0.22"/>
    <circle cx="940" cy="475" r="26" fill="none" stroke="#B7332C" stroke-width="1.5"/>
    <text x="940" y="479" class="display" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Compta.</text>
  </g>
  <g class="interactive" data-card="metier-centres-appel" tabindex="0" role="button" aria-label="Centres d'appel et relation client à distance">
    <circle cx="730" cy="430" r="22" fill="#B7332C" opacity="0.22"/>
    <circle cx="730" cy="430" r="22" fill="none" stroke="#B7332C" stroke-width="1.5"/>
    <text x="730" y="427" class="display" font-size="9.5" font-weight="600" fill="#1A1A1A" text-anchor="middle">Centres</text>
    <text x="730" y="438" class="display" font-size="9.5" font-weight="600" fill="#1A1A1A" text-anchor="middle">d'appel</text>
  </g>
  <g class="interactive" data-card="metier-banque" tabindex="0" role="button" aria-label="Banque de détail et back-office">
    <circle cx="690" cy="490" r="22" fill="#B7332C" opacity="0.22"/>
    <circle cx="690" cy="490" r="22" fill="none" stroke="#B7332C" stroke-width="1.5"/>
    <text x="690" y="488" class="display" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">Banque</text>
    <text x="690" y="499" class="display" font-size="9" font-style="italic" fill="#5A5A5A" text-anchor="middle">détail</text>
  </g>
  <g class="interactive" data-card="metier-journalisme" tabindex="0" role="button" aria-label="Journalisme">
    <circle cx="800" cy="510" r="18" fill="#B7332C" opacity="0.22"/>
    <circle cx="800" cy="510" r="18" fill="none" stroke="#B7332C" stroke-width="1.5"/>
    <text x="800" y="513" class="display" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">Journ.</text>
  </g>

  <!-- Bubble size legend -->
  <text x="1030" y="195" class="mono" font-size="9" font-weight="600" letter-spacing="0.14em" fill="#5A5A5A">EFFECTIFS</text>
  <circle cx="1050" cy="225" r="14" fill="none" stroke="#1A1A1A" stroke-width="1"/>
  <text x="1075" y="229" class="mono" font-size="9" fill="#5A5A5A">≈ 0,5 M</text>
  <circle cx="1050" cy="265" r="22" fill="none" stroke="#1A1A1A" stroke-width="1"/>
  <text x="1080" y="269" class="mono" font-size="9" fill="#5A5A5A">≈ 1,5 M</text>
  <circle cx="1050" cy="320" r="34" fill="none" stroke="#1A1A1A" stroke-width="1"/>
  <text x="1093" y="324" class="mono" font-size="9" fill="#5A5A5A">≈ 3 M</text>

  <!-- BOTTOM PANEL — Stats and methodology -->
  <line x1="60" y1="610" x2="1140" y2="610" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="60" y="634" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">CHIFFRES CLÉS · FRANCE 2024</text>

  <g>
    <text x="60" y="664" class="display" font-size="32" font-weight="600" fill="#B7332C">35,5%</text>
    <text x="60" y="690" class="body" font-size="11" fill="#1A1A1A">des postes français en zone</text>
    <text x="60" y="706" class="body" font-size="11" fill="#1A1A1A">forte exposition (score ≥7/10)</text>
  </g>

  <g>
    <text x="280" y="664" class="display" font-size="32" font-weight="600" fill="#1F5560">28,7M</text>
    <text x="280" y="690" class="body" font-size="11" fill="#1A1A1A">de postes analysés (228 familles</text>
    <text x="280" y="706" class="body" font-size="11" fill="#1A1A1A">professionnelles DARES)</text>
  </g>

  <g>
    <text x="500" y="664" class="display" font-size="32" font-weight="600" fill="#B58A2C">10%</text>
    <text x="500" y="690" class="body" font-size="11" fill="#1A1A1A">des entreprises FR 10 sal.+</text>
    <text x="500" y="706" class="body" font-size="11" fill="#1A1A1A">utilisent au moins une IA en 2024</text>
  </g>

  <g>
    <text x="720" y="664" class="display" font-size="32" font-weight="600" fill="#1A1A1A">800k</text>
    <text x="720" y="690" class="body" font-size="11" fill="#1A1A1A">conducteurs concernés à terme</text>
    <text x="720" y="706" class="body" font-size="11" fill="#1A1A1A">(France Stratégie 2025)</text>
  </g>

  <g>
    <text x="940" y="664" class="display" font-size="32" font-weight="600" fill="#1A1A1A">≈ 4×</text>
    <text x="940" y="690" class="body" font-size="11" fill="#1A1A1A">retard d'adoption IA</text>
    <text x="940" y="706" class="body" font-size="11" fill="#1A1A1A">par rapport aux États-Unis</text>
  </g>

  <text x="60" y="746" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Lecture : un point dans le quadrant rouge cumule forte exposition (l'IA peut faire la tâche) et faible complémentarité (peu de contexte humain irréductible).</text>
  <text x="60" y="762" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Le diamètre des bulles est proportionnel aux effectifs en France ; la position est indicative et synthétise plusieurs sources.</text>
</svg>
