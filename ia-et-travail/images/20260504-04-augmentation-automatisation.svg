<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" data-schema-id="schema-04">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="780" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="24" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Augmentation vs automatisation, dans les conversations Claude</text>
  <text x="60" y="116" class="display" font-size="14" font-style="italic" fill="#5A5A5A">Anthropic Economic Index, mai 2025 → février 2026. La part d'automatisation a crû, mais l'augmentation reste majoritaire.</text>
  <line x1="60" y1="138" x2="1140" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- CHART AREA: x = time, y = % share. Stacked area: aug + auto -->
  <!-- Background grid -->
  <g stroke="#E5E1D8" stroke-width="0.5" fill="none">
    <line x1="120" y1="220" x2="1100" y2="220"/>
    <line x1="120" y1="320" x2="1100" y2="320"/>
    <line x1="120" y1="420" x2="1100" y2="420"/>
    <line x1="120" y1="520" x2="1100" y2="520"/>
  </g>

  <!-- y-axis labels -->
  <text x="110" y="222" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">100%</text>
  <text x="110" y="322" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">75%</text>
  <text x="110" y="422" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">50%</text>
  <text x="110" y="522" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">25%</text>
  <text x="110" y="595" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">0%</text>

  <!-- y-axis line -->
  <line x1="120" y1="220" x2="120" y2="595" stroke="#1A1A1A" stroke-width="0.75"/>
  <line x1="120" y1="595" x2="1100" y2="595" stroke="#1A1A1A" stroke-width="0.75"/>

  <!-- AREA AUTOMATION (bottom, carmine) -->
  <!-- 5 data points across width: t1=mai 2025, t2=juil 2025, t3=sept 2025, t4=déc 2025, t5=fev 2026 -->
  <!-- y for 0% = 595, 100% = 220, range = 375 -->
  <!-- Automation shares: 0.43 → 0.45 → 0.47 → 0.46 → 0.45 -->
  <!-- y(0.43) = 595 - 0.43*375 = 433.75 -->
  <!-- y(0.45) = 595 - 0.45*375 = 426.25 -->
  <!-- y(0.47) = 595 - 0.47*375 = 418.75 -->
  <!-- y(0.46) = 595 - 0.46*375 = 422.5 -->
  <!-- y(0.45) = 426.25 -->
  <path d="M 120 595 L 120 433.75 L 365 426.25 L 610 418.75 L 855 422.5 L 1100 426.25 L 1100 595 Z" fill="#B7332C" opacity="0.18"/>
  <path d="M 120 433.75 L 365 426.25 L 610 418.75 L 855 422.5 L 1100 426.25" fill="none" stroke="#B7332C" stroke-width="2"/>

  <!-- AREA AUGMENTATION (top, teal) — adds the augmentation share above automation -->
  <!-- Augmentation shares: 0.57 → 0.55 → 0.50 → 0.51 → 0.52 -->
  <!-- top of augmentation = automation_y - augmentation*375 -->
  <!-- t1: 433.75 - 0.57*375 = 433.75 - 213.75 = 220 -->
  <!-- t2: 426.25 - 0.55*375 = 426.25 - 206.25 = 220 -->
  <!-- t3: 418.75 - 0.50*375 = 418.75 - 187.5 = 231.25 (mais on accepte que ça atteigne presque 100% à t1, baisse ensuite) -->
  <!-- Mieux: laisser le total < 100% pour intégrer les 3% indéterminés -->
  <!-- t1: aug 57% → 220.0; auto 43% → 433.75; total 100% -->
  <!-- t2: aug 53% → 227.5; auto 45% → 426.25; total 98% -->
  <!-- t3: aug 50% → 231.25; auto 47% → 418.75; total 97% -->
  <!-- t4: aug 51% → 230.5; auto 46% → 422.5; total 97% -->
  <!-- t5: aug 52% → 231.25; auto 45% → 426.25; total 97% -->
  <path d="M 120 433.75 L 365 426.25 L 610 418.75 L 855 422.5 L 1100 426.25 L 1100 231.25 L 855 230.5 L 610 231.25 L 365 227.5 L 120 220 Z" fill="#1F5560" opacity="0.18"/>
  <path d="M 120 220 L 365 227.5 L 610 231.25 L 855 230.5 L 1100 231.25" fill="none" stroke="#1F5560" stroke-width="2"/>

  <!-- data point markers -->
  <g fill="#1F5560">
    <circle cx="120" cy="220" r="3.5"/>
    <circle cx="365" cy="227.5" r="3.5"/>
    <circle cx="610" cy="231.25" r="3.5"/>
    <circle cx="855" cy="230.5" r="3.5"/>
    <circle cx="1100" cy="231.25" r="3.5"/>
  </g>
  <g fill="#B7332C">
    <circle cx="120" cy="433.75" r="3.5"/>
    <circle cx="365" cy="426.25" r="3.5"/>
    <circle cx="610" cy="418.75" r="3.5"/>
    <circle cx="855" cy="422.5" r="3.5"/>
    <circle cx="1100" cy="426.25" r="3.5"/>
  </g>

  <!-- x-axis time labels -->
  <text x="120" y="615" class="mono" font-size="9.5" fill="#5A5A5A" text-anchor="middle">mai 2025</text>
  <text x="365" y="615" class="mono" font-size="9.5" fill="#5A5A5A" text-anchor="middle">juil 2025</text>
  <text x="610" y="615" class="mono" font-size="9.5" fill="#5A5A5A" text-anchor="middle">sept 2025</text>
  <text x="855" y="615" class="mono" font-size="9.5" fill="#5A5A5A" text-anchor="middle">déc 2025</text>
  <text x="1100" y="615" class="mono" font-size="9.5" fill="#5A5A5A" text-anchor="middle">fév 2026</text>

  <!-- ZONE LABELS (in chart) -->
  <g class="interactive" data-card="aug-zone" tabindex="0" role="button" aria-label="Zone augmentation">
    <rect x="455" y="282" width="350" height="64" fill="transparent"/>
    <text x="630" y="306" class="display" font-size="22" font-weight="600" fill="#1F5560" text-anchor="middle">AUGMENTATION</text>
    <text x="630" y="328" class="body" font-size="11" font-style="italic" fill="#1F5560" text-anchor="middle" opacity="0.9">l'utilisateur apprend, itère, demande un retour</text>
    <text x="630" y="343" class="mono" font-size="10" fill="#1F5560" text-anchor="middle">52% en février 2026</text>
  </g>
  <g class="interactive" data-card="auto-zone" tabindex="0" role="button" aria-label="Zone automatisation">
    <rect x="455" y="490" width="350" height="64" fill="transparent"/>
    <text x="630" y="514" class="display" font-size="22" font-weight="600" fill="#B7332C" text-anchor="middle">AUTOMATISATION</text>
    <text x="630" y="536" class="body" font-size="11" font-style="italic" fill="#B7332C" text-anchor="middle" opacity="0.9">l'IA fait la tâche à la place de l'utilisateur</text>
    <text x="630" y="551" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">45% en février 2026 — en croissance depuis fin 2024</text>
  </g>

  <!-- KEY DATAPOINT ANNOTATIONS -->
  <text x="120" y="206" class="mono" font-size="9" fill="#1F5560" text-anchor="middle">57%</text>
  <text x="1100" y="206" class="mono" font-size="9" fill="#1F5560" text-anchor="middle">52%</text>
  <text x="120" y="448" class="mono" font-size="9" fill="#B7332C" text-anchor="middle">43%</text>
  <text x="1100" y="448" class="mono" font-size="9" fill="#B7332C" text-anchor="middle">45%</text>

  <!-- BOTTOM PANEL — three observations -->
  <line x1="60" y1="640" x2="1140" y2="640" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="60" y="664" class="mono" font-size="9" font-weight="600" letter-spacing="0.18em" fill="#5A5A5A">CE QUE L'INDEX MESURE</text>

  <g class="interactive" data-card="obs-conversational" tabindex="0" role="button" aria-label="Observation conversationnelle">
    <rect x="60" y="678" width="340" height="84" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="78" y="700" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Conversations réelles</text>
    <text x="78" y="722" class="body" font-size="10.5" fill="#5A5A5A">Analyse de millions de dialogues Claude,</text>
    <text x="78" y="736" class="body" font-size="10.5" fill="#5A5A5A">classification automatique sur la nature</text>
    <text x="78" y="750" class="body" font-size="10.5" fill="#5A5A5A">de l'usage (apprendre / itérer / déléguer).</text>
  </g>

  <g class="interactive" data-card="obs-onet" tabindex="0" role="button" aria-label="Mapping O*NET">
    <rect x="430" y="678" width="340" height="84" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="448" y="700" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Mapping O*NET</text>
    <text x="448" y="722" class="body" font-size="10.5" fill="#5A5A5A">Croisement avec la base américaine</text>
    <text x="448" y="736" class="body" font-size="10.5" fill="#5A5A5A">des 900+ professions et leurs tâches.</text>
    <text x="448" y="750" class="body" font-size="10.5" fill="#5A5A5A">Permet de voir <tspan font-style="italic">qui</tspan> automatise <tspan font-style="italic">quoi</tspan>.</text>
  </g>

  <g class="interactive" data-card="obs-limites" tabindex="0" role="button" aria-label="Limites de l'index">
    <rect x="800" y="678" width="340" height="84" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="818" y="700" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Limites importantes</text>
    <text x="818" y="722" class="body" font-size="10.5" fill="#5A5A5A">Couvre les usagers de Claude, pas la totalité</text>
    <text x="818" y="736" class="body" font-size="10.5" fill="#5A5A5A">des usages IA. Concentration géographique</text>
    <text x="818" y="750" class="body" font-size="10.5" fill="#5A5A5A">forte (top 5 États US = 24% des usages).</text>
  </g>
</svg>
