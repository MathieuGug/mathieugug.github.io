<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">La m&#233;moire CoALA en cycle</title>
  <desc id="desc">Sch&#233;ma 11 &#8212; &#192; gauche, les quatre piliers de m&#233;moire CoALA (travail, s&#233;mantique, &#233;pisodique, proc&#233;durale) reli&#233;s en cycle. &#192; droite, les six op&#233;rations cycliques empil&#233;es : r&#233;cup&#233;ration, consolidation, mise &#224; jour, indexation, compression, oubli.</desc>
  <defs>
    <style>
      <![CDATA[
        .display { font-family: 'Fraunces', 'Cambria', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.01em; fill: #1e1e2a; }
        .subtitle { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-weight: 400; font-size: 18px; fill: #6b6f7c; }
        .block-title { font-family: 'JetBrains Mono', 'Consolas', monospace; font-weight: 600; font-size: 12px; letter-spacing: 0.16em; fill: #b8582e; }
        .block-subtitle { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-size: 14px; fill: #6b6f7c; }
        .body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #1e1e2a; }
        .body-label { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 15px; fill: #1e1e2a; }
        .caption { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 12px; fill: #6b6f7c; }
        .op-num { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; fill: #b8582e; }
        .op-name { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 14px; fill: #1e1e2a; letter-spacing: 0.04em; }
        .op-def { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #6b6f7c; }
        .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; }
        .schema-marker { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; fill: #b8582e; }
      ]]>
    </style>
    <!-- Arrowhead marker — carmine -->
    <marker id="arrow-carmine" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#b8582e"/>
    </marker>
    <!-- Arrowhead marker — ink-mid for liaison lines -->
    <marker id="arrow-ink" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="rgba(30,30,44,0.35)"/>
    </marker>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1300" height="720" fill="#faf6ec"/>

  <!-- ===== TOP BANDEAU ===== -->
  <text x="60" y="40" class="schema-marker">SCH&#201;MA 11</text>
  <text x="60" y="65" class="display">La m&#233;moire CoALA en cycle</text>
  <text x="60" y="90" class="subtitle">quatre piliers, six op&#233;rations &#8212; Princeton TMLR 2024</text>
  <line x1="60" y1="104" x2="1240" y2="104" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>

  <!-- ===== LEFT BLOCK (cycle) — x: 60–720 ===== -->
  <text x="60" y="138" class="block-title">A &#183; LE CYCLE</text>
  <text x="60" y="160" class="block-subtitle">Quatre piliers de m&#233;moire qui circulent entre eux.</text>

  <!--
    Cycle center: (390, 410). Memory boxes 200×70 around it.
    Top    : center (390, 220) — rect at x=290, y=185
    Right  : center (590, 410) — rect at x=490, y=375
    Bottom : center (390, 600) — rect at x=290, y=565
    Left   : center (190, 410) — rect at x=90,  y=375
    Ring at (390, 410), r=92.
  -->

  <!-- 4 MEMORY BOXES -->
  <!-- TRAVAIL (top) — bleu pâle -->
  <rect x="290" y="185" width="200" height="70" rx="6" fill="#e8f0f8" stroke="rgba(30,30,44,0.18)" stroke-width="1"/>
  <text x="390" y="215" class="op-name" text-anchor="middle">M&#201;MOIRE DE TRAVAIL</text>
  <text x="390" y="234" class="caption" text-anchor="middle">le bloc-notes de l&#39;instant</text>

  <!-- SÉMANTIQUE (right) — vert pâle -->
  <rect x="490" y="375" width="200" height="70" rx="6" fill="#e8f3ec" stroke="rgba(30,30,44,0.18)" stroke-width="1"/>
  <text x="590" y="405" class="op-name" text-anchor="middle">M&#201;MOIRE S&#201;MANTIQUE</text>
  <text x="590" y="424" class="caption" text-anchor="middle">encyclop&#233;die &#8212; r&#232;gles, RAG</text>

  <!-- ÉPISODIQUE (bottom) — sépia -->
  <rect x="290" y="565" width="200" height="70" rx="6" fill="#f5ede0" stroke="rgba(30,30,44,0.18)" stroke-width="1"/>
  <text x="390" y="595" class="op-name" text-anchor="middle">M&#201;MOIRE &#201;PISODIQUE</text>
  <text x="390" y="614" class="caption" text-anchor="middle">journal de bord &#8212; exp&#233;riences dat&#233;es</text>

  <!-- PROCÉDURALE (left) — gris-bleu -->
  <rect x="90" y="375" width="200" height="70" rx="6" fill="#eaecf4" stroke="rgba(30,30,44,0.18)" stroke-width="1"/>
  <text x="190" y="405" class="op-name" text-anchor="middle">M&#201;MOIRE PROC&#201;DURALE</text>
  <text x="190" y="424" class="caption" text-anchor="middle">le r&#233;pertoire des savoir-faire</text>

  <!-- CENTRAL RING -->
  <circle cx="390" cy="410" r="92" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1.5"/>
  <circle cx="390" cy="410" r="55" fill="#faf6ec" stroke="rgba(30,30,44,0.12)" stroke-width="1"/>
  <text x="390" y="406" class="mono" font-size="13" fill="#b8582e" text-anchor="middle" letter-spacing="0.14em">CYCLE</text>
  <text x="390" y="424" class="mono" font-size="10" fill="#b8582e" text-anchor="middle">6 op&#233;rations</text>

  <!-- Tiny rotation indicator inside inner disc -->
  <path d="M 405,392 A 15,15 0 1,1 403,392" fill="none" stroke="rgba(184,88,46,0.4)" stroke-width="1.2" marker-end="url(#arrow-carmine)"/>

  <!--
    4 CYCLE ARROWS (clockwise) — curved between adjacent memories, passing around the ring.
    Each arc on r=128 from (390, 410).
    Travail (top)        → Sémantique (right):  arc from ~340° to ~10°  (via top-right)
    Sémantique (right)   → Épisodique (bottom): arc from ~30° to ~80°
    Épisodique (bottom)  → Procédurale (left):  arc from ~160° to ~220°
    Procédurale (left)   → Travail (top):       arc from ~240° to ~290°
    All sweep clockwise (sweep-flag=1).
  -->

  <!-- Travail → Sémantique : top-right arc -->
  <!-- start at top box's right edge (490, 215) curve to right box top-left (495, 375) -->
  <path d="M 478,255 Q 540,290 540,375" fill="none" stroke="#b8582e" stroke-width="2" marker-end="url(#arrow-carmine)"/>

  <!-- Sémantique → Épisodique : bottom-right arc -->
  <!-- start at right box bottom-left (495, 445) curve to bottom box right (490, 600) -->
  <path d="M 540,445 Q 540,530 478,565" fill="none" stroke="#b8582e" stroke-width="2" marker-end="url(#arrow-carmine)"/>

  <!-- Épisodique → Procédurale : bottom-left arc -->
  <!-- start at bottom box left (290, 600) curve to left box bottom (290, 445) -->
  <path d="M 302,565 Q 240,530 240,445" fill="none" stroke="#b8582e" stroke-width="2" marker-end="url(#arrow-carmine)"/>

  <!-- Procédurale → Travail : top-left arc -->
  <!-- start at left box top (290, 375) curve to top box left (290, 220) -->
  <path d="M 240,375 Q 240,290 302,255" fill="none" stroke="#b8582e" stroke-width="2" marker-end="url(#arrow-carmine)"/>

  <!-- ===== DIVIDER between blocks ===== -->
  <line x1="730" y1="138" x2="730" y2="640" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>

  <!-- ===== RIGHT BLOCK (operations stacked) — x: 760–1240 ===== -->
  <text x="760" y="138" class="block-title">B &#183; LES SIX OP&#201;RATIONS</text>
  <text x="760" y="160" class="block-subtitle">Cycle complet, dans l&#39;ordre o&#249; elles apparaissent par tour.</text>

  <!--
    6 rows, each 72px tall, starting at y=185.
    Row layout:
      x=760-780: numbered marker (mono, carmine, "01" style)
      x=800-980: op name (bold)
      x=800-1240: definition (caption italic, 2 lines max)
    Row centers (top): 185, 257, 329, 401, 473, 545. Last row bottom at 617.
  -->

  <!-- Row 1 — RÉCUPÉRATION -->
  <rect x="760" y="185" width="480" height="62" rx="4" fill="rgba(255,255,255,0.55)" stroke="rgba(30,30,44,0.08)" stroke-width="0.8"/>
  <text x="780" y="210" class="op-num">01</text>
  <text x="810" y="210" class="op-name">R&#201;CUP&#201;RATION</text>
  <text x="810" y="232" class="op-def">Au d&#233;but de chaque tour, l&#39;agent interroge le pool</text>
  <text x="810" y="246" class="op-def">pour charger fragments, &#233;pisodes, r&#232;gles pertinents.</text>

  <!-- Row 2 — CONSOLIDATION -->
  <rect x="760" y="255" width="480" height="62" rx="4" fill="rgba(255,255,255,0.55)" stroke="rgba(30,30,44,0.08)" stroke-width="0.8"/>
  <text x="780" y="280" class="op-num">02</text>
  <text x="810" y="280" class="op-name">CONSOLIDATION</text>
  <text x="810" y="302" class="op-def">Les apprentissages de la session sont stabilis&#233;s</text>
  <text x="810" y="316" class="op-def">et int&#233;gr&#233;s au pool avant la fermeture du contexte.</text>

  <!-- Row 3 — MISE À JOUR -->
  <rect x="760" y="325" width="480" height="62" rx="4" fill="rgba(255,255,255,0.55)" stroke="rgba(30,30,44,0.08)" stroke-width="0.8"/>
  <text x="780" y="350" class="op-num">03</text>
  <text x="810" y="350" class="op-name">MISE &#192; JOUR</text>
  <text x="810" y="372" class="op-def">Une entr&#233;e existante est r&#233;vis&#233;e quand une nouvelle</text>
  <text x="810" y="386" class="op-def">interaction contredit ou affine ce qu&#39;elle contenait.</text>

  <!-- Row 4 — INDEXATION -->
  <rect x="760" y="395" width="480" height="62" rx="4" fill="rgba(255,255,255,0.55)" stroke="rgba(30,30,44,0.08)" stroke-width="0.8"/>
  <text x="780" y="420" class="op-num">04</text>
  <text x="810" y="420" class="op-name">INDEXATION</text>
  <text x="810" y="442" class="op-def">La nouvelle entr&#233;e est vectoris&#233;e et rendue retrouvable</text>
  <text x="810" y="456" class="op-def">par les agents qui n&#39;ont pas particip&#233; &#224; la session source.</text>

  <!-- Row 5 — COMPRESSION -->
  <rect x="760" y="465" width="480" height="62" rx="4" fill="rgba(255,255,255,0.55)" stroke="rgba(30,30,44,0.08)" stroke-width="0.8"/>
  <text x="780" y="490" class="op-num">05</text>
  <text x="810" y="490" class="op-name">COMPRESSION</text>
  <text x="810" y="512" class="op-def">Les entr&#233;es redondantes sont fusionn&#233;es, les d&#233;tails</text>
  <text x="810" y="526" class="op-def">de bas niveau r&#233;sum&#233;s, le signal utile pr&#233;serv&#233;.</text>

  <!-- Row 6 — OUBLI -->
  <rect x="760" y="535" width="480" height="62" rx="4" fill="rgba(255,255,255,0.55)" stroke="rgba(30,30,44,0.08)" stroke-width="0.8"/>
  <text x="780" y="560" class="op-num">06</text>
  <text x="810" y="560" class="op-name">OUBLI</text>
  <text x="810" y="582" class="op-def">Les entr&#233;es dont le TTL est expir&#233; ou dont le score</text>
  <text x="810" y="596" class="op-def">qualit&#233; est insuffisant sont archiv&#233;es ou supprim&#233;es.</text>

  <!-- ===== CAPTION ===== -->
  <line x1="60" y1="650" x2="1240" y2="650" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>
  <text x="640" y="666" class="caption" text-anchor="middle">Les six op&#233;rations s&#39;appliquent &#224; toutes les m&#233;moires. Le pool partag&#233; appara&#238;t au stade Mature multi-agents.</text>
  <text x="640" y="682" class="caption" text-anchor="middle">Voir dossier memoire-agentique pour creuser. Source&#160;: Sumers et al., CoALA, Princeton TMLR 2024.</text>

</svg>
