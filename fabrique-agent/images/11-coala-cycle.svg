<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">La m&#233;moire CoALA en cycle</title>
  <desc id="desc">Sch&#233;ma 11 &#8212; Les quatre types de m&#233;moire CoALA (travail, s&#233;mantique, &#233;pisodique, proc&#233;durale) reli&#233;s par six op&#233;rations cycliques (r&#233;cup&#233;ration, consolidation, mise &#224; jour, indexation, compression, oubli).</desc>
  <defs>
    <style>
      <![CDATA[
        .display { font-family: 'Fraunces', 'Cambria', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.01em; fill: #1e1e2a; }
        .subtitle { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-weight: 400; font-size: 18px; fill: #6b6f7c; }
        .body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #1e1e2a; }
        .body-label { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 15px; fill: #1e1e2a; }
        .caption { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 12px; fill: #6b6f7c; }
        .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; }
        .schema-marker { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; fill: #b8582e; }
      ]]>
    </style>
    <!-- Arrowhead marker — carmine -->
    <marker id="arrow-carmine" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#b8582e"/>
    </marker>
    <!-- Arrowhead marker — ink-mid for liaison lines -->
    <marker id="arrow-ink" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="rgba(30,30,44,0.35)"/>
    </marker>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1300" height="720" fill="#faf6ec"/>

  <!-- ===== TOP BANDEAU ===== -->
  <text x="60" y="40" class="schema-marker">SCH&#201;MA 11</text>
  <text x="60" y="65" class="display">La m&#233;moire CoALA en cycle</text>
  <text x="60" y="90" class="subtitle">quatre piliers, six op&#233;rations &#8212; Princeton TMLR 2024</text>
  <line x1="60" y1="104" x2="1240" y2="104" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>

  <!-- ===== 4 MEMORY TYPE BOXES =====
       Center of layout: (640, 380)
       Travail    : top    (640, 200)  rect 220×80 → x=530, y=160
       Sémantique : right  (960, 380)  rect 220×80 → x=850, y=340
       Épisodique : bottom (640, 560)  rect 220×80 → x=530, y=520
       Procédurale: left   (320, 380)  rect 220×80 → x=210, y=340
  -->

  <!-- TRAVAIL (top) — bleu pâle -->
  <rect x="530" y="160" width="220" height="80" rx="6" fill="#e8f0f8" stroke="rgba(30,30,44,0.18)" stroke-width="1"/>
  <text x="640" y="193" class="body-label" text-anchor="middle" font-size="13" font-weight="600">M&#201;MOIRE DE TRAVAIL</text>
  <text x="640" y="213" class="caption" text-anchor="middle">le bloc-notes de l&#39;instant</text>

  <!-- SÉMANTIQUE (right) — vert pâle -->
  <rect x="850" y="340" width="220" height="80" rx="6" fill="#e8f3ec" stroke="rgba(30,30,44,0.18)" stroke-width="1"/>
  <text x="960" y="373" class="body-label" text-anchor="middle" font-size="13" font-weight="600">M&#201;MOIRE S&#201;MANTIQUE</text>
  <text x="960" y="393" class="caption" text-anchor="middle">encyclop&#233;die &#8212; r&#232;gles, jargon, RAG</text>

  <!-- ÉPISODIQUE (bottom) — sépia -->
  <rect x="530" y="520" width="220" height="80" rx="6" fill="#f5ede0" stroke="rgba(30,30,44,0.18)" stroke-width="1"/>
  <text x="640" y="553" class="body-label" text-anchor="middle" font-size="13" font-weight="600">M&#201;MOIRE &#201;PISODIQUE</text>
  <text x="640" y="573" class="caption" text-anchor="middle">journal de bord &#8212; exp&#233;riences dat&#233;es</text>

  <!-- PROCÉDURALE (left) — gris-bleu -->
  <rect x="210" y="340" width="220" height="80" rx="6" fill="#eaecf4" stroke="rgba(30,30,44,0.18)" stroke-width="1"/>
  <text x="320" y="373" class="body-label" text-anchor="middle" font-size="13" font-weight="600">M&#201;MOIRE PROC&#201;DURALE</text>
  <text x="320" y="393" class="caption" text-anchor="middle">le r&#233;pertoire des savoir-faire</text>

  <!-- ===== LIAISON LINES — 4 radii from ring to organ boxes =====
       Central ring outer edge radius ~110.
       Center (640, 380).
       Travail    top:    from (640, 270) to box bottom (640, 520→ y=520, enter top y=240→ gap)
                          ring top: (640, 380-110) = (640, 270). Box bottom top: (640, 160+80) = (640, 240). Gap OK.
       Sémantique right:  ring right: (640+110, 380) = (750, 380). Box left: (850, 380). Gap OK.
       Épisodique bottom: ring bottom: (640, 380+110) = (640, 490). Box top: (640, 520). Gap OK.
       Procédurale left:  ring left: (640-110, 380) = (530, 380). Box right: (210+220, 380) = (430, 380). Gap OK.
  -->
  <line x1="640" y1="268" x2="640" y2="244" stroke="rgba(30,30,44,0.28)" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="752" y1="380" x2="848" y2="380" stroke="rgba(30,30,44,0.28)" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="640" y1="492" x2="640" y2="518" stroke="rgba(30,30,44,0.28)" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="528" y1="380" x2="432" y2="380" stroke="rgba(30,30,44,0.28)" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- ===== CENTRAL RING — anneau (cx=640, cy=380, r_outer=120, r_inner=72) ===== -->
  <!-- Outer ring fill (anneau blanc cassé) -->
  <circle cx="640" cy="380" r="120" fill="#faf6ec" stroke="rgba(30,30,44,0.20)" stroke-width="1.5"/>
  <!-- Inner disc (same bg to create donut) -->
  <circle cx="640" cy="380" r="72" fill="#faf6ec" stroke="rgba(30,30,44,0.12)" stroke-width="1"/>

  <!-- Center labels -->
  <text x="640" y="374" class="mono" font-size="13" fill="#b8582e" text-anchor="middle" letter-spacing="0.14em">CYCLE</text>
  <text x="640" y="393" class="mono" font-size="11" fill="#b8582e" text-anchor="middle">6 op&#233;rations</text>

  <!-- ===== 6 CURVED ARROWS around the ring — clockwise =====
       Ring outer radius = 120. We place arcs at radius ≈ 148 (ring outer + 28px clearance).
       Arrow arcs: short curved segments around the ring, each at 60° spacing.
       Each arc spans ~40° of the circle at r=148 from center (640, 380).
       Arc center points (midpoint of each arc, for label placement) at r=160:

       Op 1 RÉCUPÉRATION   : angle=30°  → arc from 10° to 50°
       Op 2 CONSOLIDATION  : angle=90°  → arc from 70° to 110°
       Op 3 MISE À JOUR    : angle=150° → arc from 130° to 170°
       Op 4 INDEXATION     : angle=210° → arc from 190° to 230°
       Op 5 COMPRESSION    : angle=270° → arc from 250° to 290°
       Op 6 OUBLI          : angle=330° → arc from 310° to 350°

       Angle 0° = right (3 o'clock), going clockwise.
       In SVG coordinates: x = cx + r*cos(θ), y = cy + r*sin(θ) (y increases downward)
       cos/sin in standard math → SVG: θ in degrees CW from right.

       Arc radius = 148. Arrows drawn as path arcs.
       Arc from θ1 to θ2 (clockwise), large-arc=0, sweep=1.

       For 10° to 50° at r=148:
         Start: (640 + 148*cos(10°), 380 + 148*sin(10°)) = (640+145.7, 380+25.7) = (785.7, 405.7)
         End:   (640 + 148*cos(50°), 380 + 148*sin(50°)) = (640+95.1, 380+113.4) = (735.1, 493.4)

       For clockwise arcs in SVG: sweep-flag=1.
       We stop each arc ~8px before the actual end to let the arrowhead show properly.

       Label positions at r=175 (outer label ring):
       Op 1 at 30°:  (640+175*cos30°, 380+175*sin30°) = (640+151.6, 380+87.5) = (791.6, 467.5)
       Op 2 at 90°:  (640+175*cos90°, 380+175*sin90°) = (640+0, 380+175) = (640, 555)
       Op 3 at 150°: (640+175*cos150°, 380+175*sin150°) = (640-151.6, 380+87.5) = (488.4, 467.5)
       Op 4 at 210°: (640+175*cos210°, 380+175*sin210°) = (640-151.6, 380-87.5) = (488.4, 292.5)
       Op 5 at 270°: (640+175*cos270°, 380+175*sin270°) = (640+0, 380-175) = (640, 205)
       Op 6 at 330°: (640+175*cos330°, 380+175*sin330°) = (640+151.6, 380-87.5) = (791.6, 292.5)

       Arc calculations (r=148, arrowhead stop 10° before end):
  -->

  <!--
    Angle conventions (degrees, clockwise from right/east, SVG math):
    cos(θ°) = cos(θ*π/180), sin(θ°) = sin(θ*π/180)

    Op 1 RÉCUPÉRATION : arc 10° to 50° (clockwise)
      Start (10°): 640+148*0.9848=785.7, 380+148*0.1736=405.7 → (786, 406)
      End   (50°): 640+148*0.6428=735.1, 380+148*0.7660=493.4 → (735, 493)
      Arrow tip at 50°, start arc from 12° leaving arrowhead room, arc to 46°:
        12°: 640+148*0.9781=784.8, 380+148*0.2079=410.8 → (785, 411)
        46°: 640+148*0.6947=742.8, 380+148*0.7193=486.5 → (743, 487)
  -->

  <!-- Op 1 — RÉCUPÉRATION (top-right, ~30°) -->
  <path d="M 785,411 A 148,148 0 0,1 743,487" fill="none" stroke="#b8582e" stroke-width="2" marker-end="url(#arrow-carmine)"/>

  <!--
    Op 2 CONSOLIDATION : arc 70° to 110° (clockwise)
      72°: 640+148*0.3090=685.7, 380+148*0.9511=520.8 → (686, 521)
      106°: 640+148*(-0.2756)=599.2, 380+148*0.9613=522.3 → (599, 522)
  -->
  <!-- Op 2 — CONSOLIDATION (right-bottom, ~90°) -->
  <path d="M 686,521 A 148,148 0 0,1 599,522" fill="none" stroke="#b8582e" stroke-width="2" marker-end="url(#arrow-carmine)"/>

  <!--
    Op 3 MISE À JOUR : arc 130° to 170° (clockwise)
      132°: 640+148*(-0.6691)=540.9, 380+148*0.7431=490.0 → (541, 490)
      166°: 640+148*(-0.9703)=496.6, 380+148*0.2419=415.8 → (497, 416)
  -->
  <!-- Op 3 — MISE À JOUR (bottom-left, ~150°) -->
  <path d="M 541,490 A 148,148 0 0,1 497,416" fill="none" stroke="#b8582e" stroke-width="2" marker-end="url(#arrow-carmine)"/>

  <!--
    Op 4 INDEXATION : arc 190° to 230° (clockwise)
      192°: 640+148*(-0.9781)=495.2, 380+148*(-0.2079)=349.2 → (495, 349)
      226°: 640+148*(-0.6947)=537.2, 380+148*(-0.7193)=273.5 → (537, 274)
  -->
  <!-- Op 4 — INDEXATION (left-bottom, ~210°) -->
  <path d="M 495,349 A 148,148 0 0,1 537,274" fill="none" stroke="#b8582e" stroke-width="2" marker-end="url(#arrow-carmine)"/>

  <!--
    Op 5 COMPRESSION : arc 250° to 290° (clockwise)
      252°: 640+148*(-0.3090)=594.3, 380+148*(-0.9511)=239.2 → (594, 239)
      286°: 640+148*0.2756=680.8, 380+148*(-0.9613)=237.7 → (681, 238)
  -->
  <!-- Op 5 — COMPRESSION (top, ~270°) -->
  <path d="M 594,239 A 148,148 0 0,1 681,238" fill="none" stroke="#b8582e" stroke-width="2" marker-end="url(#arrow-carmine)"/>

  <!--
    Op 6 OUBLI : arc 310° to 350° (clockwise)
      312°: 640+148*0.6691=739.1, 380+148*(-0.7431)=270.0 → (739, 270)
      346°: 640+148*0.9703=783.6, 380+148*(-0.2419)=344.2 → (784, 344)
  -->
  <!-- Op 6 — OUBLI (top-right, ~330°) -->
  <path d="M 739,270 A 148,148 0 0,1 784,344" fill="none" stroke="#b8582e" stroke-width="2" marker-end="url(#arrow-carmine)"/>

  <!-- ===== OPERATION LABELS =====
       Placed at r=200 from center, at midpoint angle of each arc.
       Op 1 (30°):  (640+200*cos30°, 380+200*sin30°) = (640+173.2, 380+100) = (813, 480)
       Op 2 (90°):  (640+0, 380+200) = (640, 580)
       Op 3 (150°): (640-173.2, 380+100) = (467, 480)
       Op 4 (210°): (640-173.2, 380-100) = (467, 280)
       Op 5 (270°): (640+0, 380-200) = (640, 180)  — conflicts with header, use 185
       Op 6 (330°): (640+173.2, 380-100) = (813, 280)
  -->

  <!-- Op 1 — RÉCUPÉRATION label (right-bottom quadrant) -->
  <text x="820" y="472" class="body-label" text-anchor="start" font-size="14">R&#201;CUP&#201;RATION</text>

  <!-- Op 2 — CONSOLIDATION label (bottom) -->
  <text x="640" y="586" class="body-label" text-anchor="middle" font-size="14">CONSOLIDATION</text>

  <!-- Op 3 — MISE À JOUR label (left-bottom quadrant) -->
  <text x="458" y="472" class="body-label" text-anchor="end" font-size="14">MISE &#192; JOUR</text>

  <!-- Op 4 — INDEXATION label (left-top quadrant) -->
  <text x="458" y="284" class="body-label" text-anchor="end" font-size="14">INDEXATION</text>

  <!-- Op 5 — COMPRESSION label (top) -->
  <text x="640" y="186" class="body-label" text-anchor="middle" font-size="14">COMPRESSION</text>

  <!-- Op 6 — OUBLI label (right-top quadrant) -->
  <text x="820" y="284" class="body-label" text-anchor="start" font-size="14">OUBLI</text>

  <!-- ===== SMALL CLOCKWISE INDICATOR at ring center ===== -->
  <!-- Tiny arc in the inner disc to show rotation direction -->
  <path d="M 655,362 A 15,15 0 1,1 653,362" fill="none" stroke="rgba(184,88,46,0.4)" stroke-width="1.2" marker-end="url(#arrow-carmine)"/>

  <!-- ===== CAPTION ===== -->
  <line x1="60" y1="650" x2="1240" y2="650" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>
  <text x="640" y="666" class="caption" text-anchor="middle">Toutes les op&#233;rations s&#39;appliquent &#224; toutes les m&#233;moires&#160;: r&#233;cup&#233;ration, consolidation, mise &#224; jour, indexation, compression, oubli.</text>
  <text x="640" y="682" class="caption" text-anchor="middle">Voir dossier memoire-agentique pour creuser. Source&#160;: Sumers et al., CoALA, Princeton TMLR 2024.</text>

</svg>
