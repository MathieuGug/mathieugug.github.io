<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">L&#8217;atelier &#183; Stade 2 &#183; Pilote</title>
  <desc id="desc">Sch&#233;ma 04 &#8212; Cross-section frontale de la fabrique au stade Pilote : le PO rejoint le dev, premier dashboard 3 cadrans, pile 50 cartes golden dataset, microphone feedback users, tuyau OTel au plafond.</desc>
  <defs>
    <style>
      <![CDATA[
        .display { font-family: 'Fraunces', 'Cambria', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.01em; fill: #1e1e2a; }
        .subtitle { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-weight: 400; font-size: 18px; fill: #6b6f7c; }
        .body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #1e1e2a; }
        .body-label { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 15px; fill: #1e1e2a; }
        .caption { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 12px; fill: #6b6f7c; }
        .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; }
        .numeric-callout { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 15px; font-weight: 500; fill: #b8582e; }
        .schema-marker { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; fill: #b8582e; }
        .prompt-text { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-size: 13px; fill: #1e1e2a; }
      ]]>
    </style>
    <!-- Arrowhead markers -->
    <marker id="arrow-ink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e2a"/>
    </marker>
    <marker id="arrow-carmine" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="arrow-graphite" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6f7c"/>
    </marker>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1300" height="800" fill="#faf6ec"/>

  <!-- Mur du fond — traits verticaux discrets -->
  <g id="background-wall">
    <line x1="80"  y1="100" x2="80"  y2="720" stroke="rgba(30,30,44,0.04)" stroke-width="1"/>
    <line x1="180" y1="100" x2="180" y2="720" stroke="rgba(30,30,44,0.04)" stroke-width="1"/>
    <line x1="280" y1="100" x2="280" y2="720" stroke="rgba(30,30,44,0.04)" stroke-width="1"/>
    <line x1="380" y1="100" x2="380" y2="720" stroke="rgba(30,30,44,0.04)" stroke-width="1"/>
    <line x1="480" y1="100" x2="480" y2="720" stroke="rgba(30,30,44,0.04)" stroke-width="1"/>
    <line x1="580" y1="100" x2="580" y2="720" stroke="rgba(30,30,44,0.04)" stroke-width="1"/>
    <line x1="680" y1="100" x2="680" y2="720" stroke="rgba(30,30,44,0.04)" stroke-width="1"/>
    <line x1="780" y1="100" x2="780" y2="720" stroke="rgba(30,30,44,0.04)" stroke-width="1"/>
    <line x1="880" y1="100" x2="880" y2="720" stroke="rgba(30,30,44,0.04)" stroke-width="1"/>
    <line x1="980" y1="100" x2="980" y2="720" stroke="rgba(30,30,44,0.04)" stroke-width="1"/>
    <line x1="1080" y1="100" x2="1080" y2="720" stroke="rgba(30,30,44,0.04)" stroke-width="1"/>
    <line x1="1180" y1="100" x2="1180" y2="720" stroke="rgba(30,30,44,0.04)" stroke-width="1"/>
  </g>

  <!-- Sol -->
  <line x1="40" y1="720" x2="1260" y2="720" stroke="#9a9ca5" stroke-width="0.6"/>

  <!-- ===== TOP BANDEAU ===== -->
  <g id="title-band">
    <text x="60" y="40" class="schema-marker">SCH&#201;MA 04</text>
    <text x="60" y="68" class="display">STADE 2 &#183; PILOTE</text>
    <text x="60" y="92" class="subtitle">&#171;&#160;&#231;a mesure&#160;&#187;</text>
    <line x1="60" y1="106" x2="1240" y2="106" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>
  </g>

  <!-- ===== POST-IT BACKLOG (plus dense, plus rempli — stade pilote) ===== -->
  <g id="postit-backlog" transform="rotate(-3, 240, 230)">
    <!-- Post-it body — fond légèrement plus foncé que stade 1 (plus écrit) -->
    <rect x="130" y="155" width="120" height="100" rx="2" fill="#f5e88a" stroke="rgba(30,30,44,0.16)" stroke-width="0.8"/>
    <!-- Fold top-right corner -->
    <polygon points="250,155 250,172 233,155" fill="rgba(30,30,44,0.10)"/>
    <!-- Label -->
    <text x="140" y="176" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#6b6f7c">BACKLOG</text>
    <!-- Griffonnage lignes — plus denses (plus de tâches complétées) -->
    <line x1="140" y1="190" x2="235" y2="190" stroke="rgba(30,30,44,0.30)" stroke-width="1.2"/>
    <line x1="140" y1="202" x2="220" y2="202" stroke="rgba(30,30,44,0.25)" stroke-width="1.2"/>
    <line x1="140" y1="214" x2="228" y2="214" stroke="rgba(30,30,44,0.25)" stroke-width="1.2"/>
    <line x1="140" y1="226" x2="210" y2="226" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <line x1="140" y1="238" x2="218" y2="238" stroke="rgba(30,30,44,0.20)" stroke-width="1.2"/>
    <!-- Barres de complétion (items cochés) — lignes rayées -->
    <line x1="140" y1="190" x2="185" y2="190" stroke="rgba(30,30,44,0.50)" stroke-width="2.5"/>
    <line x1="140" y1="202" x2="200" y2="202" stroke="rgba(30,30,44,0.45)" stroke-width="2.5"/>
  </g>

  <!-- ===== TABLE ===== -->
  <g id="table">
    <!-- Table surface -->
    <rect x="340" y="600" width="620" height="20" rx="2" fill="#9a9ca5" stroke="#6b6f7c" stroke-width="0.8"/>
    <!-- Table leg left -->
    <rect x="360" y="620" width="8" height="100" fill="#9a9ca5" stroke="#6b6f7c" stroke-width="0.5"/>
    <!-- Table leg right -->
    <rect x="944" y="620" width="8" height="100" fill="#9a9ca5" stroke="#6b6f7c" stroke-width="0.5"/>
  </g>

  <!-- ===== NOTEBOOK OUVERT ===== -->
  <g id="notebook">
    <!-- Notebook base — page gauche -->
    <rect x="500" y="548" width="86" height="52" rx="2" fill="#faf6ec" stroke="#6b6f7c" stroke-width="1"/>
    <!-- Notebook base — page droite (écran allumé) -->
    <rect x="586" y="545" width="86" height="55" rx="2" fill="#1e1e2a" stroke="#6b6f7c" stroke-width="1"/>
    <!-- Écran allumé — lueur bleutée -->
    <rect x="590" y="549" width="78" height="47" rx="1" fill="#1a2a3a"/>
    <!-- Lignes de code simulées sur l'écran -->
    <rect x="594" y="553" width="40" height="2.5" rx="1" fill="#b8582e" opacity="0.7"/>
    <rect x="594" y="559" width="60" height="2.5" rx="1" fill="#9a9ca5" opacity="0.5"/>
    <rect x="598" y="565" width="50" height="2.5" rx="1" fill="#9a9ca5" opacity="0.4"/>
    <rect x="598" y="571" width="38" height="2.5" rx="1" fill="#9a9ca5" opacity="0.4"/>
    <rect x="594" y="577" width="55" height="2.5" rx="1" fill="#9a9ca5" opacity="0.3"/>
    <rect x="594" y="583" width="30" height="2.5" rx="1" fill="#9a9ca5" opacity="0.3"/>
    <!-- Cursor clignotant -->
    <rect x="624" y="583" width="6" height="6" rx="1" fill="#faf6ec" opacity="0.8"/>
    <!-- Spinelle entre les deux pages -->
    <rect x="582" y="545" width="8" height="55" rx="1" fill="#6b6f7c"/>
    <!-- Notes page gauche -->
    <line x1="508" y1="562" x2="574" y2="562" stroke="rgba(30,30,44,0.18)" stroke-width="1"/>
    <line x1="508" y1="570" x2="570" y2="570" stroke="rgba(30,30,44,0.14)" stroke-width="1"/>
    <line x1="508" y1="578" x2="574" y2="578" stroke="rgba(30,30,44,0.12)" stroke-width="1"/>
    <line x1="508" y1="586" x2="558" y2="586" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>
  </g>

  <!-- ===== PERSONNAGE DEV ===== -->
  <g id="character-dev">
    <!-- Tête — cercle -->
    <circle cx="440" cy="438" r="20" fill="#9a9ca5" stroke="#6b6f7c" stroke-width="1"/>
    <!-- Cou -->
    <rect x="434" y="456" width="12" height="12" rx="1" fill="#9a9ca5"/>
    <!-- Torse — trapèze stylisé -->
    <path d="M 418 468 L 462 468 L 456 545 L 424 545 Z" fill="#6b6f7c"/>
    <!-- Épaule / bras droit vers le bas (naturel) -->
    <line x1="462" y1="480" x2="480" y2="530" stroke="#6b6f7c" stroke-width="8" stroke-linecap="round"/>
    <!-- Bras gauche — tendu vers le notebook -->
    <line x1="418" y1="480" x2="500" y2="555" stroke="#6b6f7c" stroke-width="8" stroke-linecap="round"/>
    <!-- Main gauche -->
    <circle cx="502" cy="557" r="5" fill="#9a9ca5"/>
    <!-- Jambes -->
    <line x1="432" y1="545" x2="428" y2="620" stroke="#6b6f7c" stroke-width="9" stroke-linecap="round"/>
    <line x1="448" y1="545" x2="450" y2="620" stroke="#6b6f7c" stroke-width="9" stroke-linecap="round"/>
    <!-- Label DEV -->
    <text x="440" y="412" class="mono" text-anchor="middle" font-size="12" font-weight="600" fill="#6b6f7c">DEV</text>
  </g>

  <!-- ===== PERSONNAGE PO ===== -->
  <g id="character-po">
    <!-- Tête — cercle (légèrement plus grand pour suggérer plan avant) -->
    <circle cx="726" cy="440" r="22" fill="#9a9ca5" stroke="#6b6f7c" stroke-width="1"/>
    <!-- Cou -->
    <rect x="719" y="460" width="14" height="13" rx="1" fill="#9a9ca5"/>
    <!-- Torse -->
    <path d="M 702 473 L 750 473 L 744 548 L 708 548 Z" fill="#6b6f7c"/>
    <!-- Bras droit légèrement tendu (gesticulant, en réunion) -->
    <line x1="750" y1="485" x2="780" y2="510" stroke="#6b6f7c" stroke-width="8" stroke-linecap="round"/>
    <circle cx="782" cy="513" r="5" fill="#9a9ca5"/>
    <!-- Bras gauche vers le bas -->
    <line x1="702" y1="485" x2="686" y2="528" stroke="#6b6f7c" stroke-width="8" stroke-linecap="round"/>
    <!-- Jambes -->
    <line x1="716" y1="548" x2="710" y2="622" stroke="#6b6f7c" stroke-width="9" stroke-linecap="round"/>
    <line x1="736" y1="548" x2="738" y2="622" stroke="#6b6f7c" stroke-width="9" stroke-linecap="round"/>
    <!-- Label PO -->
    <text x="726" y="413" class="mono" text-anchor="middle" font-size="12" font-weight="600" fill="#6b6f7c">PO</text>
  </g>

  <!-- ===== DASHBOARD 3 CADRANS ===== -->
  <g id="dashboard">
    <!-- Fond commun (planche de bord) -->
    <rect x="660" y="140" width="430" height="130" rx="6" fill="#faf6ec" stroke="rgba(30,30,44,0.18)" stroke-width="1.2"/>
    <!-- Ligne de titre du dashboard -->
    <text x="875" y="162" class="mono" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.14em" fill="#6b6f7c">DASHBOARD PILOTE</text>
    <line x1="670" y1="168" x2="1080" y2="168" stroke="rgba(30,30,44,0.10)" stroke-width="0.8"/>

    <!-- Cadran 1 : USAGE -->
    <rect x="672" y="174" width="118" height="86" rx="4" fill="#f5f3ee" stroke="rgba(30,30,44,0.14)" stroke-width="1"/>
    <text x="731" y="193" class="mono" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.10em" fill="#6b6f7c">USAGE</text>
    <line x1="680" y1="198" x2="782" y2="198" stroke="rgba(30,30,44,0.08)" stroke-width="0.6"/>
    <text x="731" y="228" class="numeric-callout" text-anchor="middle" font-size="18" font-weight="600">12k</text>
    <text x="731" y="244" class="mono" text-anchor="middle" font-size="11" font-weight="600" fill="#6b6f7c">tok/min</text>
    <text x="731" y="256" class="caption" text-anchor="middle">(input + output)</text>

    <!-- Cadran 2 : PERF -->
    <rect x="802" y="174" width="118" height="86" rx="4" fill="#f5f3ee" stroke="rgba(30,30,44,0.14)" stroke-width="1"/>
    <text x="861" y="193" class="mono" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.10em" fill="#6b6f7c">PERF</text>
    <line x1="810" y1="198" x2="912" y2="198" stroke="rgba(30,30,44,0.08)" stroke-width="0.6"/>
    <text x="861" y="228" class="numeric-callout" text-anchor="middle" font-size="18" font-weight="600">2.4s</text>
    <text x="861" y="244" class="mono" text-anchor="middle" font-size="11" font-weight="600" fill="#6b6f7c">p50</text>
    <text x="861" y="256" class="caption" text-anchor="middle">(lat. end-to-end)</text>

    <!-- Cadran 3 : COMPORTEMENT -->
    <rect x="932" y="174" width="148" height="86" rx="4" fill="#f5f3ee" stroke="rgba(30,30,44,0.14)" stroke-width="1"/>
    <text x="1006" y="193" class="mono" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#6b6f7c">COMPORTEMENT</text>
    <line x1="940" y1="198" x2="1072" y2="198" stroke="rgba(30,30,44,0.08)" stroke-width="0.6"/>
    <text x="1006" y="228" class="numeric-callout" text-anchor="middle" font-size="18" font-weight="600">87%</text>
    <text x="1006" y="244" class="mono" text-anchor="middle" font-size="11" font-weight="600" fill="#6b6f7c">thumbs up</text>
    <text x="1006" y="256" class="caption" text-anchor="middle">(&#233;val. utilisateurs)</text>
  </g>

  <!-- ===== TUYAU OTEL AU PLAFOND ===== -->
  <g id="otel-pipe">
    <!-- Nuage stylisé en haut — origine du pipeline de traces -->
    <!-- Corps nuage -->
    <ellipse cx="875" cy="38" rx="38" ry="18" fill="#faf6ec" stroke="#6b6f7c" stroke-width="1.2"/>
    <ellipse cx="848" cy="44" rx="22" ry="14" fill="#faf6ec" stroke="#6b6f7c" stroke-width="1.2"/>
    <ellipse cx="902" cy="44" rx="22" ry="14" fill="#faf6ec" stroke="#6b6f7c" stroke-width="1.2"/>
    <!-- Cover bottom of cloud to merge with ellipses -->
    <rect x="830" y="42" width="94" height="16" fill="#faf6ec"/>
    <!-- Ligne de base du nuage -->
    <line x1="830" y1="55" x2="924" y2="55" stroke="#6b6f7c" stroke-width="1.2"/>
    <!-- Label OTel dans le nuage -->
    <text x="875" y="48" class="mono" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.10em" fill="#b8582e">OTel GenAI</text>

    <!-- Tuyau courbé du nuage vers le notebook -->
    <!-- Courbe de (875, 58) vers (629, 545) — trajet courbe via point de contrôle (780, 280) -->
    <path d="M 875 58 C 860 200, 700 320, 629 540" fill="none" stroke="#6b6f7c" stroke-width="1.5" stroke-dasharray="5,3"/>
    <!-- Flèche en bas de la courbe -->
    <line x1="629" y1="540" x2="629" y2="548" stroke="#6b6f7c" stroke-width="1.5" marker-end="url(#arrow-graphite)"/>

    <!-- Label OTel le long du tuyau -->
    <text x="790" y="315" class="mono" font-size="11" font-weight="600" letter-spacing="0.10em" fill="#b8582e" transform="rotate(-60, 790, 315)">traces</text>
  </g>

  <!-- ===== MICROPHONE FEEDBACK USERS ===== -->
  <g id="microphone">
    <!-- Tige du micro -->
    <rect x="897" y="572" width="5" height="28" rx="2" fill="#9a9ca5" stroke="#6b6f7c" stroke-width="0.8"/>
    <!-- Base du micro (pied) -->
    <line x1="889" y1="600" x2="909" y2="600" stroke="#6b6f7c" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="899" y1="597" x2="899" y2="600" stroke="#6b6f7c" stroke-width="1.5" stroke-linecap="round"/>
    <!-- T&#234;te du micro — capsule arrondie -->
    <rect x="892" y="554" width="15" height="22" rx="7" fill="#6b6f7c" stroke="#1e1e2a" stroke-width="0.8"/>
    <!-- Grille micro — petits traits -->
    <line x1="896" y1="560" x2="904" y2="560" stroke="rgba(250,246,236,0.5)" stroke-width="1"/>
    <line x1="895" y1="564" x2="905" y2="564" stroke="rgba(250,246,236,0.4)" stroke-width="1"/>
    <line x1="896" y1="568" x2="904" y2="568" stroke="rgba(250,246,236,0.4)" stroke-width="1"/>
    <!-- Label feedback -->
    <text x="899" y="546" class="caption" text-anchor="middle" font-style="italic">feedback users</text>
    <!-- Icônes thumbs up/down stylisées -->
    <text x="870" y="590" class="mono" font-size="11" font-weight="600" fill="#b8582e">+&#160;&#8722;</text>
  </g>

  <!-- ===== PILE GOLDEN DATASET ===== -->
  <g id="golden-dataset">
    <!-- Pile de cartes — empilées en perspective (bas en premier) -->
    <!-- Ombre générale de la pile -->
    <rect x="940" y="668" width="130" height="42" rx="2" fill="rgba(30,30,44,0.06)"/>
    <!-- Cartes du bas — les plus éloignées -->
    <rect x="944" y="666" width="120" height="14" rx="1" fill="#faf6ec" stroke="rgba(30,30,44,0.15)" stroke-width="0.6" transform="rotate(3, 1004, 673)"/>
    <rect x="944" y="663" width="120" height="14" rx="1" fill="#faf6ec" stroke="rgba(30,30,44,0.15)" stroke-width="0.6" transform="rotate(2, 1004, 670)"/>
    <rect x="943" y="660" width="120" height="14" rx="1" fill="#faf6ec" stroke="rgba(30,30,44,0.14)" stroke-width="0.6" transform="rotate(1, 1004, 667)"/>
    <rect x="943" y="657" width="120" height="14" rx="1" fill="#faf6ec" stroke="rgba(30,30,44,0.14)" stroke-width="0.6" transform="rotate(-1, 1004, 664)"/>
    <rect x="943" y="654" width="120" height="14" rx="1" fill="#faf6ec" stroke="rgba(30,30,44,0.13)" stroke-width="0.6"/>
    <rect x="943" y="651" width="120" height="14" rx="1" fill="#faf6ec" stroke="rgba(30,30,44,0.13)" stroke-width="0.6" transform="rotate(1, 1003, 658)"/>
    <rect x="943" y="648" width="120" height="14" rx="1" fill="#faf6ec" stroke="rgba(30,30,44,0.12)" stroke-width="0.6" transform="rotate(-1, 1003, 655)"/>
    <rect x="943" y="645" width="120" height="14" rx="1" fill="#faf6ec" stroke="rgba(30,30,44,0.12)" stroke-width="0.6"/>
    <rect x="943" y="642" width="120" height="14" rx="1" fill="#faf6ec" stroke="rgba(30,30,44,0.11)" stroke-width="0.6" transform="rotate(1, 1003, 649)"/>
    <!-- Cartes du dessus — les plus visibles -->
    <rect x="942" y="638" width="122" height="14" rx="1" fill="#f0ede6" stroke="rgba(30,30,44,0.20)" stroke-width="0.8" transform="rotate(-1, 1003, 645)"/>
    <!-- Carte du sommet — la plus nette -->
    <rect x="941" y="634" width="124" height="14" rx="1" fill="#f5f3ee" stroke="#6b6f7c" stroke-width="1" transform="rotate(0.5, 1003, 641)"/>
    <!-- Mini lignes sur la carte du sommet -->
    <line x1="950" y1="639" x2="1000" y2="639" stroke="rgba(30,30,44,0.20)" stroke-width="1"/>
    <line x1="950" y1="643" x2="990" y2="643" stroke="rgba(30,30,44,0.15)" stroke-width="1"/>

    <!-- Label GOLDEN DATASET au-dessus de la pile -->
    <text x="1003" y="622" class="mono" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.10em" fill="#6b6f7c">GOLDEN DATASET</text>
    <text x="1003" y="635" class="mono" text-anchor="middle" font-size="11" font-weight="600" fill="#b8582e">50 cas</text>
  </g>

  <!-- ===== INDICATOR ALERTING ===== -->
  <g id="alerting-indicator">
    <!-- Triangle warning carmine -->
    <polygon points="310,145 340,195 280,195" fill="rgba(184,88,46,0.08)" stroke="#b8582e" stroke-width="1.5"/>
    <!-- Signe exclamation dans le triangle -->
    <line x1="310" y1="162" x2="310" y2="180" stroke="#b8582e" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="310" cy="186" r="2" fill="#b8582e"/>
    <!-- Label L0-L1 -->
    <text x="310" y="210" class="mono" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#b8582e">L0&#8211;L1</text>
    <text x="310" y="224" class="caption" text-anchor="middle">alerting actif</text>
  </g>

  <!-- ===== CAPTION BAS DE PAGE ===== -->
  <text x="650" y="758" class="caption" text-anchor="middle">
    Le PO rejoint le dev. Premier dashboard &#224; 3 cadrans, 50 cas pour &#233;valuer, un microphone qui capte le feedback. La discovery du Pilote&#160;: on d&#233;couvre ce qu&#8217;on ne mesurait pas.
  </text>

  <!-- ===== FLÈCHE CONNEXION DEV ↔ DASHBOARD ===== -->
