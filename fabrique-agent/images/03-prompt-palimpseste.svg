<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Anatomie du prompt v0 &#8212; un manuscrit ratur&#233;</title>
  <desc id="desc">Sch&#233;ma 03 &#8212; Le prompt syst&#232;me du Prototype dessin&#233; comme un palimpseste : 5 strates d&#8217;instructions accumul&#233;es, ratures dat&#233;es, ajouts marginaux.</desc>
  <defs>
    <style>
      <![CDATA[
        .display { font-family: 'Fraunces', 'Cambria', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.01em; fill: #1e1e2a; }
        .subtitle { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-weight: 400; font-size: 18px; fill: #6b6f7c; }
        .body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #1e1e2a; }
        .body-label { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 15px; fill: #1e1e2a; }
        .caption { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 12px; fill: #6b6f7c; }
        .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; }
        .schema-marker { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; fill: #b8582e; }
        .prompt-text { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-size: 13px; fill: #1e1e2a; }
        .added { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-size: 13px; fill: #b8582e; }
        .dated { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; fill: #b8582e; }
        .note-margin { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-size: 12px; fill: #b8582e; }
        .strika { text-decoration: line-through; fill: #1e1e2a; }
      ]]>
    </style>
    <!-- Arrowhead markers -->
    <marker id="arrow-carmine" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8582e"/>
    </marker>
    <marker id="arrow-ink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e2a"/>
    </marker>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1300" height="760" fill="#faf6ec"/>

  <!-- Subtle ruled lines across manuscript area (light) -->
  <g id="ruled-lines" opacity="0.04">
    <line x1="200" y1="130" x2="1240" y2="130" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="154" x2="1240" y2="154" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="178" x2="1240" y2="178" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="202" x2="1240" y2="202" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="226" x2="1240" y2="226" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="250" x2="1240" y2="250" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="274" x2="1240" y2="274" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="298" x2="1240" y2="298" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="322" x2="1240" y2="322" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="346" x2="1240" y2="346" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="370" x2="1240" y2="370" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="394" x2="1240" y2="394" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="418" x2="1240" y2="418" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="442" x2="1240" y2="442" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="466" x2="1240" y2="466" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="490" x2="1240" y2="490" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="514" x2="1240" y2="514" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="538" x2="1240" y2="538" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="562" x2="1240" y2="562" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="586" x2="1240" y2="586" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="610" x2="1240" y2="610" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="634" x2="1240" y2="634" stroke="#1e1e2a" stroke-width="0.6"/>
    <line x1="200" y1="658" x2="1240" y2="658" stroke="#1e1e2a" stroke-width="0.6"/>
  </g>

  <!-- Vertical margin line (left gutter separator) -->
  <line x1="200" y1="108" x2="200" y2="690" stroke="rgba(184,88,46,0.18)" stroke-width="1"/>

  <!-- ===== TOP BANDEAU ===== -->
  <text x="60" y="40" class="schema-marker">SCH&#201;MA 03</text>
  <text x="60" y="68" class="display">Anatomie du prompt v0</text>
  <text x="60" y="94" class="subtitle">un manuscrit ratur&#233; qui grossit sans gouvernance</text>
  <line x1="60" y1="108" x2="1240" y2="108" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>

  <!-- ===== STRATE 1 — Identité initiale, ratures (y ≈ 130–210) ===== -->
  <g id="strate-1">
    <!-- Strate separator label -->
    <text x="215" y="146" class="mono" font-size="11" fill="#6b6f7c" letter-spacing="0.10em">STRATE 1 &#8212; IDENTIT&#201;</text>

    <!-- Date marginale gauche -->
    <text x="70" y="180" class="dated">v0.1</text>
    <text x="70" y="196" class="dated">01/04</text>

    <!-- Texte original avec "assistant" rayé -->
    <!-- "Tu es un " -->
    <text x="215" y="180" class="prompt-text">Tu es un </text>
    <!-- "assistant" barré -->
    <text x="313" y="180" class="prompt-text">assistant</text>
    <line x1="313" y1="176" x2="389" y2="176" stroke="#1e1e2a" stroke-width="1.5"/>
    <!-- Ajout "agent" au-dessus, en carmine script -->
    <text x="316" y="165" class="added" font-size="14">agent</text>
    <!-- Suite de la phrase -->
    <text x="393" y="180" class="prompt-text">&#160;qui aide les utilisateurs &#224;...</text>

    <!-- Deuxième ligne de la strate 1 -->
    <text x="215" y="204" class="prompt-text">...accomplir des t&#226;ches complexes et r&#233;pondre &#224; leurs questions.</text>
  </g>

  <!-- Séparateur strate -->
  <line x1="215" y1="218" x2="1200" y2="218" stroke="rgba(30,30,44,0.07)" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- ===== STRATE 2 — Outils accumulés (y ≈ 230–320) ===== -->
  <g id="strate-2">
    <text x="215" y="246" class="mono" font-size="11" fill="#6b6f7c" letter-spacing="0.10em">STRATE 2 &#8212; OUTILS</text>

    <!-- Date marginale -->
    <text x="70" y="278" class="dated">v0.3</text>
    <text x="70" y="294" class="dated">12/04</text>

    <!-- Ligne originale rayée -->
    <text x="215" y="278" class="prompt-text">- outils&#160;: (vide)</text>
    <line x1="215" y1="274" x2="338" y2="274" stroke="#1e1e2a" stroke-width="1.5"/>

    <!-- Ajouts marginaux avec flèches carmine -->
    <!-- + web_search -->
    <line x1="340" y1="278" x2="395" y2="278" stroke="#b8582e" stroke-width="1" marker-end="url(#arrow-carmine)"/>
    <text x="400" y="282" class="added">+ web_search</text>

    <!-- + code_exec -->
    <text x="215" y="302" class="added">+ code_exec</text>
    <!-- Petite flèche à gauche -->
    <line x1="200" y1="298" x2="210" y2="298" stroke="#b8582e" stroke-width="1" marker-end="url(#arrow-carmine)"/>

    <!-- + read_file, write_file -->
    <text x="215" y="322" class="added">+ read_file, write_file</text>
    <line x1="200" y1="318" x2="210" y2="318" stroke="#b8582e" stroke-width="1" marker-end="url(#arrow-carmine)"/>
  </g>

  <!-- Séparateur strate -->
  <line x1="215" y1="336" x2="1200" y2="336" stroke="rgba(30,30,44,0.07)" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- ===== STRATE 3 — Note rouge, hidden constraint (y ≈ 348–422) ===== -->
  <g id="strate-3">
    <text x="215" y="362" class="mono" font-size="11" fill="#6b6f7c" letter-spacing="0.10em">STRATE 3 &#8212; CONTRAINTE CACH&#201;E</text>

    <!-- Date marginale -->
    <text x="70" y="394" class="dated">v0.5</text>
    <text x="70" y="410" class="dated">23/04</text>

    <!-- Encadré rouge léger -->
    <rect x="215" y="372" width="760" height="54" rx="3" fill="rgba(184,88,46,0.05)" stroke="#b8582e" stroke-width="1"/>

    <!-- Texte dans l'encadré — deux lignes -->
    <text x="228" y="394" class="prompt-text">IMPORTANT&#160;: ne mentionne jamais le nom de notre client principal</text>
    <text x="228" y="416" class="prompt-text">dans aucune r&#233;ponse, ni dans les logs, ni dans les exports.</text>

    <!-- Note griffonnée marge droite -->
    <text x="990" y="390" class="note-margin">Ne dis JAMAIS</text>
    <text x="990" y="406" class="note-margin">&#171;&#160;Acme&#160;&#187; &#8212; incident #142</text>
    <!-- Petite flèche courbe de la note vers l'encadré -->
    <path d="M 986 390 C 970 388 960 382 980 376" fill="none" stroke="#b8582e" stroke-width="1" marker-end="url(#arrow-carmine)"/>
  </g>

  <!-- Séparateur strate -->
  <line x1="215" y1="436" x2="1200" y2="436" stroke="rgba(30,30,44,0.07)" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- ===== STRATE 4 — Tests adressés au modèle (y ≈ 448–552) ===== -->
  <g id="strate-4">
    <text x="215" y="462" class="mono" font-size="11" fill="#6b6f7c" letter-spacing="0.10em">STRATE 4 &#8212; CAS DE TEST INLIN&#201;S</text>

    <!-- Date marginale -->
    <text x="70" y="494" class="dated">v0.6</text>
    <text x="70" y="510" class="dated">28/04</text>

    <!-- Commentaire code style -->
    <text x="215" y="492" class="mono" font-size="12" fill="#6b6f7c">// voici 3 cas :</text>

    <!-- Cas 1 -->
    <text x="215" y="514" class="mono" font-size="12" fill="#1e1e2a">case 1&#160;: &#171;&#160;rendre la facture #IN-2024&#160;&#187;</text>

    <!-- Cas 2 — avec annotation refuser -->
    <text x="215" y="534" class="mono" font-size="12" fill="#1e1e2a">case 2&#160;: &#171;&#160;annuler le ticket Acme&#160;&#187;</text>
    <text x="800" y="534" class="mono" font-size="12" fill="#b8582e">(refuser&#160;!)</text>

    <!-- Cas 3 -->
    <text x="215" y="554" class="mono" font-size="12" fill="#1e1e2a">case 3&#160;: &#171;&#160;expliquer le RGPD&#160;&#187;</text>
  </g>

  <!-- Séparateur strate -->
  <line x1="215" y1="568" x2="1200" y2="568" stroke="rgba(30,30,44,0.07)" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- ===== STRATE 5 — Le bricolage final (y ≈ 580–658) ===== -->
  <g id="strate-5">
    <text x="215" y="594" class="mono" font-size="11" fill="#6b6f7c" letter-spacing="0.10em">STRATE 5 &#8212; R&#200;GLE COMPOSITE</text>

    <!-- Date marginale -->
    <text x="70" y="626" class="dated">v0.7</text>
    <text x="70" y="642" class="dated">03/05</text>

    <!-- Ligne en italique longue — splittée en 2 -->
    <text x="215" y="628" class="prompt-text" fill="#6b6f7c">Si l&#8217;utilisateur demande X, fais Y, sauf si Z &#8212; et alors</text>
    <text x="215" y="650" class="prompt-text" fill="#6b6f7c">applique W, mais uniquement si A n&#8217;est pas actif. (cf. incident #142)</text>
  </g>

  <!-- ===== CAPTION ===== -->
  <line x1="60" y1="672" x2="1240" y2="672" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>
  <text x="215" y="690" class="caption">Cinq versions en un mois, jamais versionn&#233;es. Un palimpseste typique du Prototype&#160;: chaque incident ajoute une couche, aucune ne dispara&#238;t.</text>
  <text x="215" y="708" class="caption">Colonne gauche&#160;: num&#233;ro de version et date de l&#8217;ajout. Texte barr&#233;&#160;: formulation initiale. Rouge&#160;: ajout post-incident.</text>

</svg>
