<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">La vall&#233;e de la mort des pilotes</title>
  <desc id="desc">Sch&#233;ma 06 &#8212; Courbe de survie montrant que 70&#160;% des pilotes tombent dans la falaise entre Pilote et Production. La cohorte passe de 100 % &#224; 30 %. MIT NANDA 2026.</desc>
  <defs>
    <style>
      <![CDATA[
        .display { font-family: 'Fraunces', 'Cambria', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.01em; fill: #1e1e2a; }
        .subtitle { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-weight: 400; font-size: 18px; fill: #6b6f7c; }
        .body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #1e1e2a; }
        .body-label { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 15px; fill: #1e1e2a; }
        .caption { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 12px; fill: #6b6f7c; }
        .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; }
        .schema-marker { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; fill: #b8582e; }
        .danger { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 15px; fill: #b8582e; }
      ]]>
    </style>
    <!-- Arrowhead marker for accusatory arrows (pointing down toward cliff) -->
    <marker id="arrow-ink-mid" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b6f7c"/>
    </marker>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1300" height="720" fill="#faf6ec"/>

  <!-- ===== TOP BANDEAU ===== -->
  <text x="60" y="40" class="schema-marker">SCH&#201;MA 06</text>
  <text x="60" y="68" class="display">La vall&#233;e de la mort des pilotes</text>
  <text x="60" y="92" class="subtitle">70&#160;% tombent dans la falaise entre Pilote et Production &#8212; MIT NANDA, 2026</text>
  <line x1="60" y1="108" x2="1240" y2="108" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>

  <!-- ===== AXES =====
       Plot area: x: 120–1180, y: 135 (top=100%) to 605 (bottom=0%)
       Height = 470px for 100 percentage points.
       Key Y values:
         100% → y = 135
          85% → y = 135 + (1-0.85)*470 = 135 + 70.5 = 205  (≈206)
          75% → y = 252
          50% → y = 370
          30% → y = 135 + (1-0.30)*470 = 135 + 329 = 464
          25% → y = 487
           0% → y = 605
  -->

  <!-- Y-axis line -->
  <line x1="120" y1="130" x2="120" y2="605" stroke="rgba(30,30,44,0.35)" stroke-width="1.2"/>
  <!-- X-axis line -->
  <line x1="120" y1="605" x2="1185" y2="605" stroke="rgba(30,30,44,0.35)" stroke-width="1.2"/>

  <!-- Y-axis ticks and labels -->
  <!-- 0% -->
  <line x1="114" y1="605" x2="120" y2="605" stroke="rgba(30,30,44,0.35)" stroke-width="1"/>
  <text x="108" y="609" class="body" font-size="12" text-anchor="end" fill="#6b6f7c">0</text>
  <!-- 25% -->
  <line x1="114" y1="487" x2="120" y2="487" stroke="rgba(30,30,44,0.2)" stroke-width="1"/>
  <line x1="120" y1="487" x2="1180" y2="487" stroke="rgba(30,30,44,0.06)" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="108" y="491" class="body" font-size="12" text-anchor="end" fill="#6b6f7c">25</text>
  <!-- 30% — the plateau level (y=464) — subtle highlight -->
  <line x1="114" y1="464" x2="120" y2="464" stroke="rgba(184,88,46,0.4)" stroke-width="1"/>
  <line x1="120" y1="464" x2="1180" y2="464" stroke="rgba(184,88,46,0.08)" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="108" y="468" class="body" font-size="12" text-anchor="end" fill="#b8582e">30</text>
  <!-- 50% -->
  <line x1="114" y1="370" x2="120" y2="370" stroke="rgba(30,30,44,0.2)" stroke-width="1"/>
  <line x1="120" y1="370" x2="1180" y2="370" stroke="rgba(30,30,44,0.06)" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="108" y="374" class="body" font-size="12" text-anchor="end" fill="#6b6f7c">50</text>
  <!-- 75% -->
  <line x1="114" y1="252" x2="120" y2="252" stroke="rgba(30,30,44,0.2)" stroke-width="1"/>
  <line x1="120" y1="252" x2="1180" y2="252" stroke="rgba(30,30,44,0.06)" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="108" y="256" class="body" font-size="12" text-anchor="end" fill="#6b6f7c">75</text>
  <!-- 100% -->
  <line x1="114" y1="135" x2="120" y2="135" stroke="rgba(30,30,44,0.2)" stroke-width="1"/>
  <text x="108" y="139" class="body" font-size="12" text-anchor="end" fill="#6b6f7c">100</text>

  <!-- Y-axis label (rotated) -->
  <text transform="rotate(-90)" x="-370" y="62" class="body" font-size="13" text-anchor="middle" fill="#6b6f7c">Cohorte encore en course (%)</text>

  <!-- X-axis ticks: spacing=106 (same as original) -->
  <line x1="226" y1="605" x2="226" y2="612" stroke="rgba(30,30,44,0.3)" stroke-width="1"/>
  <text x="226" y="624" class="body" font-size="11" text-anchor="middle" fill="#6b6f7c">2</text>
  <line x1="332" y1="605" x2="332" y2="612" stroke="rgba(30,30,44,0.3)" stroke-width="1"/>
  <text x="332" y="624" class="body" font-size="11" text-anchor="middle" fill="#6b6f7c">4</text>
  <line x1="438" y1="605" x2="438" y2="612" stroke="rgba(30,30,44,0.3)" stroke-width="1"/>
  <text x="438" y="624" class="body" font-size="11" text-anchor="middle" fill="#6b6f7c">6</text>
  <line x1="544" y1="605" x2="544" y2="612" stroke="rgba(30,30,44,0.3)" stroke-width="1"/>
  <text x="544" y="624" class="body" font-size="11" text-anchor="middle" fill="#6b6f7c">8</text>
  <line x1="650" y1="605" x2="650" y2="612" stroke="rgba(30,30,44,0.3)" stroke-width="1"/>
  <text x="650" y="624" class="body" font-size="11" text-anchor="middle" fill="#6b6f7c">10</text>
  <line x1="756" y1="605" x2="756" y2="612" stroke="rgba(30,30,44,0.3)" stroke-width="1"/>
  <text x="756" y="624" class="body" font-size="11" text-anchor="middle" fill="#6b6f7c">12</text>
  <line x1="862" y1="605" x2="862" y2="612" stroke="rgba(30,30,44,0.3)" stroke-width="1"/>
  <text x="862" y="624" class="body" font-size="11" text-anchor="middle" fill="#6b6f7c">14</text>
  <line x1="968" y1="605" x2="968" y2="612" stroke="rgba(30,30,44,0.3)" stroke-width="1"/>
  <text x="968" y="624" class="body" font-size="11" text-anchor="middle" fill="#6b6f7c">16</text>
  <line x1="1074" y1="605" x2="1074" y2="612" stroke="rgba(30,30,44,0.3)" stroke-width="1"/>
  <text x="1074" y="624" class="body" font-size="11" text-anchor="middle" fill="#6b6f7c">18</text>
  <line x1="1180" y1="605" x2="1180" y2="612" stroke="rgba(30,30,44,0.3)" stroke-width="1"/>
  <text x="1180" y="624" class="body" font-size="11" text-anchor="middle" fill="#6b6f7c">20</text>

  <!-- X-axis label -->
  <text x="1185" y="609" class="body" font-size="13" text-anchor="start" fill="#6b6f7c">sem.</text>
  <text x="650" y="645" class="body" font-size="13" text-anchor="middle" fill="#6b6f7c">Temps de vie du pilote (semaines)</text>

  <!-- ===== CURVE =====
       Survival curve — reads as a cohort shrinkage over time.

       Key coordinate points (X=time axis, Y=cohort still alive):
         t=0  → (x=120, y=135)  = 100% start — ALL pilots alive
         t=4  → (x=332, y=155)  = ~96% — very slight early attrition
         t=8  → (x=544, y=192)  = ~91% — gentle attrition continues
         t=9  → (x=597, y=206)  = ~85% — last point before cliff
         t=10 → (x=650, y=212)  = cliff top ~84%
         t=10 → (x=660, y=464)  = cliff bottom — near-vertical drop to 30%
         Then plateau: (x=660, y=464) → (x=1180, y=464) = flat at 30%

       Path segments:
         1. Smooth descent 100% → ~85%: cubic bezier from (120,135) through (400,168) to (597,206)
         2. Slight continuation to cliff top: line/short curve to (650,212)
         3. Near-vertical cliff drop: steep bezier from (650,212) to (660,464)
         4. Flat plateau from (660,464) to (1180,464)
  -->
  <path d="M 120,135 C 250,142 450,168 597,206 C 618,212 638,214 650,214 C 653,214 656,290 658,380 C 660,430 660,460 660,464 L 1180,464"
    fill="none" stroke="#1e1e2a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ===== FALAISE vertical dashed line at x=655 ===== -->
  <line x1="655" y1="125" x2="655" y2="610" stroke="#b8582e" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.8"/>

  <!-- LA VALLÉE label above cliff -->
  <text x="655" y="118" class="mono" font-size="12" font-weight="600" letter-spacing="0.16em" fill="#b8582e" text-anchor="middle">LA VALL&#201;E</text>

  <!-- ===== VERTICAL BRACE + LOSS ANNOTATION in the cliff zone ===== -->
  <!--
       Brace spans from y=206 (85% — cliff top) to y=464 (30% — plateau).
       Height = 258px. Positioned at x≈740, to the right of the cliff dashed line.
       SVG curly brace drawn as a path: two symmetric S-curves meeting at midpoint.
       Mid y = (206 + 464) / 2 = 335. Brace tip points left (toward cliff) at x=740.
       The path draws: top-arm down to midpoint tip, then bottom-arm down to bottom.
  -->
  <!--
       Vertical left-pointing curly brace: opening faces right (toward label).
       Top arm: from (758,206) curves left to tip (736,335).
       Bottom arm: from tip (736,335) curves right back to (758,464).
       Two cubic beziers, symmetric around midpoint y=335.
  -->
  <path d="M 758,206 C 758,230 736,270 736,335 C 736,400 758,440 758,464"
    fill="none" stroke="#b8582e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- Tip nub: small horizontal tick at the midpoint pointing left -->
  <line x1="736" y1="335" x2="722" y2="335" stroke="#b8582e" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <!-- Annotation label: "70 sur 100 tombent ici" -->
  <text x="768" y="329" class="body-label" font-size="15" font-weight="500" text-anchor="start" fill="#b8582e">70 sur 100 tombent ici</text>
  <!-- Sub-label -->
  <text x="768" y="349" class="caption" font-size="12" text-anchor="start" fill="#6b6f7c">entre Pilote et Production</text>

  <!-- ===== COHORTE — 30 pilotes survivants on the plateau (Production) ===== -->
  <!-- Distributed along plateau: x ≈ 670–1180, y ≈ 464 ±6 -->
  <!-- Row 1: on the plateau line -->
  <circle cx="678" cy="462" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="697" cy="466" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="718" cy="461" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="740" cy="465" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="762" cy="462" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="785" cy="466" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="808" cy="461" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="832" cy="464" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="856" cy="462" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="880" cy="465" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="905" cy="461" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="930" cy="464" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="955" cy="462" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="980" cy="466" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="1005" cy="461" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <!-- Row 2: slight stagger above plateau line -->
  <circle cx="688" cy="454" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="710" cy="457" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="733" cy="454" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="756" cy="457" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="779" cy="453" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="803" cy="456" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="827" cy="453" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="851" cy="456" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="876" cy="453" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="901" cy="456" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="926" cy="453" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="951" cy="456" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="976" cy="453" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="1001" cy="456" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>
  <circle cx="1026" cy="453" r="3.5" fill="#faf6ec" stroke="#1e1e2a" stroke-width="1"/>

  <!-- Production plateau label -->
  <text x="1070" y="434" class="body-label" font-size="15" font-weight="500" text-anchor="middle" fill="#1e1e2a">Production</text>
  <text x="1070" y="451" class="caption" font-size="12" text-anchor="middle" fill="#6b6f7c">&#8764;&#160;30 survivants sur 100</text>

  <!-- ===== 3 ACCUSATORY LABELS — horizontal row at top of plot, ABOVE the curve ===== -->
  <!-- Placed at y≈148-182 (above the curve which starts at y=135 but descends slowly) -->
  <!-- Actually the curve is at y≈135-145 near x=120-250. Put labels in clear space above x=300 -->
  <!-- We'll use y=148 for rect top, labels centered on their x zone -->

  <!-- FinOps absent: left zone, x≈200-385 -->
  <rect x="198" y="232" width="173" height="34" rx="4" fill="rgba(184,88,46,0.08)"/>
  <text x="284" y="254" class="danger" font-size="15" font-weight="500" text-anchor="middle">FinOps absent</text>

  <!-- Éval discontinue: center zone, x≈490-675 — but cliff is at x=655, center on x=570 -->
  <rect x="405" y="232" width="192" height="34" rx="4" fill="rgba(184,88,46,0.08)"/>
  <text x="501" y="254" class="danger" font-size="15" font-weight="500" text-anchor="middle">&#201;val discontinue</text>

  <!-- Gouvernance informelle: right zone, x≈740-960 -->
  <rect x="742" y="232" width="224" height="34" rx="4" fill="rgba(184,88,46,0.08)"/>
  <text x="854" y="254" class="danger" font-size="15" font-weight="500" text-anchor="middle">Gouvernance informelle</text>

  <!-- Shared sub-title under the 3 pills -->
  <text x="570" y="286" class="caption" font-size="12" text-anchor="middle" fill="#6b6f7c">Les trois artefacts qui manquent &#8212; N3 jamais atteint.</text>

  <!-- ===== 3 SHORT ARROWS from pill bottom downward to cliff zone ===== -->
  <!-- Arrows converge toward the cliff area (x≈655, y≈300 approach zone) -->
  <!-- Gap rule: arrowhead stops ≥12px above the cliff dashed line zone -->
  <!-- Cliff zone = x≈655, the arrows don't point to the dashed line itself
       but to the cliff top area where the sharp drop begins (y≈215 is curve top of cliff) -->
  <!-- Arrow 1: from FinOps absent bottom (x=284, y=266) → toward cliff convergence (x=640, y=296) -->
  <path d="M 284,266 C 340,278 520,290 640,296"
    fill="none" stroke="#6b6f7c" stroke-width="1.2" marker-end="url(#arrow-ink-mid)" opacity="0.70"/>

  <!-- Arrow 2: from Éval discontinue bottom (x=501, y=266) → straight down to (x=643, y=296) -->
  <path d="M 501,266 C 530,278 590,290 641,296"
    fill="none" stroke="#6b6f7c" stroke-width="1.2" marker-end="url(#arrow-ink-mid)" opacity="0.70"/>

  <!-- Arrow 3: from Gouvernance informelle bottom (x=854, y=266) → toward cliff (x=648, y=296) -->
  <path d="M 854,266 C 800,278 720,290 650,296"
    fill="none" stroke="#6b6f7c" stroke-width="1.2" marker-end="url(#arrow-ink-mid)" opacity="0.70"/>

  <!-- ===== CAPTION LINE ===== -->
  <line x1="60" y1="660" x2="1240" y2="660" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>
  <text x="650" y="676" class="caption" font-size="12" text-anchor="middle">MIT NANDA 2026&#160;: sur 100 pilotes initialement lanc&#233;s, 70 ne franchissent jamais la falaise entre Pilote et Production. Les survivants &#8212; 30 sur 100 &#8212; partagent trois artefacts.</text>
  <text x="650" y="693" class="caption" font-size="11" text-anchor="middle" opacity="0.65">Format co-&#233;crit avec l&#8217;aide d&#8217;une IA</text>

</svg>
