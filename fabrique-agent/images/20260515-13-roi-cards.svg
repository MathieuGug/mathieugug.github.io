  <text x="60" y="586" class="body">Points = Base + Bonus Fit (&#215;2 si match use-case) + Bonus Contexte (+3 si r&#233;allocation document&#233;e) &#8722; Malus Mismatch.</text>
  <text x="60" y="603" class="body">La pond&#233;ration par axe est libre &#8212; chaque &#233;quipe l&#39;ajuste &#224; son contexte m&#233;tier.</text>

  <!-- Canonical formula -->
  <text x="60" y="630" class="mono" font-size="13" fill="#1e1e2a">ROI total = &#931;(points &#215; poids axe)</text>
  <text x="60" y="648" class="caption">seuil de validation Cigref Hard saving&#160;: &#8805; 25 pts cumul&#233;s</text>

