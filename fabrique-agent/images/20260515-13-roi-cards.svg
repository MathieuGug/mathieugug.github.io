<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Les 15 ROI cards &#8212; 5 axes &#215; 3 temporalit&#233;s</title>
  <desc id="desc">Sch&#233;ma 11 bis &#8212; Syst&#232;me de scoring canonique : 15 cartes ROI r&#233;parties selon 5 axes Cigref (Co&#251;t, Bien-&#234;tre, Vitesse, Volume, Qualit&#233;) et 3 temporalit&#233;s (Quick Wins, Medium, Strategic).</desc>
  <defs>
    <style>
      <![CDATA[
        .display { font-family: 'Fraunces', 'Cambria', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.01em; fill: #1e1e2a; }
        .subtitle { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-weight: 400; font-size: 18px; fill: #6b6f7c; }
        .body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #1e1e2a; }
        .body-label { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 15px; fill: #1e1e2a; }
        .caption { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 12px; fill: #6b6f7c; }
        .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; }
        .schema-marker { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; fill: #b8582e; }

        /* Card point markers per temporality. Note: only used as text labels for "pts" suffix
           and outline circle digits (rows 2T, 3T). The 1T row uses an inline style on its <text>
           to override fill — inline style beats class specificity, presentation attributes do NOT. */
        .pts-1t { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 11px; font-weight: 600; fill: #b8582e; }
        .pts-2t { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 11px; font-weight: 600; fill: #b8582e; }
        .pts-3t { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 11px; font-weight: 600; fill: rgba(184,88,46,0.55); }

        /* Card metric (main value) */
        .card-metric-1t { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 15px; fill: #1e1e2a; }
        .card-metric-2t { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 15px; fill: #1e1e2a; }
        .card-metric-3t { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 15px; fill: rgba(30,30,44,0.5); }

        /* Card mechanic (caption) */
        .card-mech { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 11px; fill: #6b6f7c; }
        .card-mech-3t { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 11px; fill: rgba(107,111,124,0.6); }

        /* Row/col headers */
        .col-header { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; fill: rgba(30,30,44,0.55); }
        .row-header { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; fill: rgba(30,30,44,0.55); }
        .row-header-sub { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 11px; fill: rgba(30,30,44,0.4); }
      ]]>
    </style>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1300" height="720" fill="#faf6ec"/>

  <!-- ===== TOP BANDEAU ===== -->
  <text x="60" y="40" class="schema-marker">SCH&#201;MA 11 bis</text>
  <text x="60" y="68" class="display">Les 15 ROI cards</text>
  <text x="60" y="93" class="subtitle">5 axes &#215; 3 temporalit&#233;s &#8212; syst&#232;me de scoring canonique</text>
  <line x1="60" y1="107" x2="1240" y2="107" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>

  <!-- ===== INTRO ONE-LINE ===== -->
  <text x="60" y="128" class="caption">Chaque axe a trois cartes selon la temporalit&#233; &#8212; Quick Wins (1T, &lt; 3 mois), Medium (2T, 3-12 mois), Strategic (3T, &gt; 12 mois). Le ROI total = somme pond&#233;r&#233;e des cartes activ&#233;es sur l&#39;ann&#233;e fiscale.</text>

