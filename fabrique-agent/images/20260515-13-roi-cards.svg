  <!-- 2T / VOLUME -->
  <rect x="805" y="293" width="208" height="108" rx="4" fill="#faf6ec" stroke="rgba(30,30,44,0.18)" stroke-width="0.8"/>
  <circle cx="825" cy="313" r="10" fill="none" stroke="#b8582e" stroke-width="1.5"/>
