<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 640" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Anatomie d&apos;un TestCase</title>
  <desc id="desc">Sch&#233;ma 05 &#8212; La formule canonique : TestCase = (Persona &#215; Quest &#215; Environment) &#8594; Expected Outcome, &#233;clat&#233;e en m&#233;triques d&#233;terministes et juges LLM single-responsibility.</desc>
  <defs>
    <style>
      <![CDATA[
        .display { font-family: 'Fraunces', 'Cambria', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.01em; fill: #1e1e2a; }
        .subtitle { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-weight: 400; font-size: 18px; fill: #6b6f7c; }
        .body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #1e1e2a; }
        .body-label { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 15px; fill: #1e1e2a; }
        .caption { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 12px; fill: #6b6f7c; }
        .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; }
        .schema-marker { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; fill: #b8582e; }
        .op { font-family: 'Fraunces', 'Cambria', serif; font-weight: 600; font-size: 28px; fill: #1e1e2a; }
      ]]>
    </style>
    <marker id="arrow-ink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e2a"/>
    </marker>
    <marker id="arrow-mid" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b6f7c"/>
    </marker>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1300" height="640" fill="#faf6ec"/>

  <!-- ===== TOP BANDEAU ===== -->
  <text x="60" y="40" class="schema-marker">SCH&#201;MA 05</text>
  <text x="60" y="68" class="display">Anatomie d&apos;un TestCase</text>
  <text x="60" y="92" class="subtitle">Persona &#215; Quest &#215; Environment &#8594; Expected Outcome</text>
  <line x1="60" y1="108" x2="1240" y2="108" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>

  <!-- ===== INPUT BOXES ===== -->

  <!-- PERSONA box (x=80, y=130, 300x150) -->
  <rect x="80" y="130" width="300" height="150" rx="4" fill="#fdf9f2" stroke="#1e1e2a" stroke-width="1.5"/>
  <text x="230" y="160" class="body-label" text-anchor="middle" letter-spacing="0.08em" font-size="13" font-family="'JetBrains Mono','Consolas',monospace" font-weight="600" fill="#b8582e">PERSONA</text>
  <line x1="80" y1="170" x2="380" y2="170" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>
  <text x="105" y="196" class="body">Role</text>
  <text x="105" y="218" class="body">Knowledge</text>
  <text x="105" y="240" class="body">Mood</text>
  <!-- bullets -->
  <circle cx="96" cy="192" r="2.5" fill="#b8582e" opacity="0.7"/>
  <circle cx="96" cy="214" r="2.5" fill="#b8582e" opacity="0.7"/>
  <circle cx="96" cy="236" r="2.5" fill="#b8582e" opacity="0.7"/>

  <!-- × operator between Persona and Quest -->
  <text x="400" y="212" class="op" text-anchor="middle">&#215;</text>

  <!-- QUEST box (x=480, y=130, 300x150) -->
  <rect x="420" y="130" width="300" height="150" rx="4" fill="#fdf9f2" stroke="#1e1e2a" stroke-width="1.5"/>
  <text x="570" y="160" class="body-label" text-anchor="middle" letter-spacing="0.08em" font-size="13" font-family="'JetBrains Mono','Consolas',monospace" font-weight="600" fill="#b8582e">QUEST</text>
  <line x1="420" y1="170" x2="720" y2="170" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>
  <text x="445" y="196" class="body">Goal</text>
  <text x="445" y="218" class="body">Hidden constraint</text>
  <text x="445" y="240" class="body">Success criterion</text>
  <circle cx="436" cy="192" r="2.5" fill="#b8582e" opacity="0.7"/>
  <circle cx="436" cy="214" r="2.5" fill="#b8582e" opacity="0.7"/>
  <circle cx="436" cy="236" r="2.5" fill="#b8582e" opacity="0.7"/>

  <!-- × operator between Quest and Environment -->
  <text x="740" y="212" class="op" text-anchor="middle">&#215;</text>

  <!-- ENVIRONMENT box (x=760, y=130, 340x150) -->
  <rect x="760" y="130" width="360" height="150" rx="4" fill="#fdf9f2" stroke="#1e1e2a" stroke-width="1.5"/>
  <text x="940" y="160" class="body-label" text-anchor="middle" letter-spacing="0.08em" font-size="13" font-family="'JetBrains Mono','Consolas',monospace" font-weight="600" fill="#b8582e">ENVIRONMENT</text>
  <line x1="760" y1="170" x2="1120" y2="170" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>
  <text x="785" y="196" class="body">Happy path</text>
  <text x="785" y="218" class="body">Chaos (timeout / 500 / quota)</text>
  <text x="785" y="240" class="body">Adversarial</text>
  <circle cx="776" cy="192" r="2.5" fill="#b8582e" opacity="0.7"/>
  <circle cx="776" cy="214" r="2.5" fill="#b8582e" opacity="0.7"/>
  <circle cx="776" cy="236" r="2.5" fill="#b8582e" opacity="0.7"/>

  <!-- → arrow from Environment to Expected Outcome -->
  <!-- Arrow from right edge of Environment box (x=1120) to Expected Outcome box (x=340) via top; arrow points down -->
  <!-- Arrow: horizontal right of env box → then down to Expected Outcome -->
  <!-- Use a simple right-pointing arrow at x=1148, y=205 pointing right, then curve down -->
  <!-- Simpler: label the → at x=1148, and draw arrow line from (1120+14, 205) → (1148, 205) then → (1195, 205) -->
  <!-- Actually per brief: arrow at (x=1220, y=200) → pointing toward expected outcome -->
  <!-- Draw line from right of env box to a short gap, then an arrow pointing down-left toward the outcome box -->
  <!-- For clarity: vertical arrow from midpoint of inputs row (y=280 bottom of boxes) down to expected outcome (y=330) -->
  <!-- The brief says → arrow at x=1220, y=200 — let's place it as a decorative right-pointing glyph, then draw the actual connection arrow going down from the center of the inputs to expected outcome -->

  <!-- Fat → glyph to the right of Environment box -->
  <text x="1148" y="212" class="op" text-anchor="middle">&#8594;</text>

  <!-- Vertical connection arrow: from bottom-center of inputs row down to Expected Outcome box -->
  <!-- Center of all 3 boxes roughly: Persona center=230, Quest center=570, Env center=940 — midpoint=585 -->
  <!-- Draw arrow from (650, 282) down to (650, 328) — leaving ~12px gap before box -->
  <line x1="650" y1="282" x2="650" y2="318" stroke="#1e1e2a" stroke-width="2" marker-end="url(#arrow-ink)"/>

  <!-- ===== EXPECTED OUTCOME BOX ===== -->
  <!-- x=340, y=330, width=620, height=110 -->
  <rect x="340" y="330" width="620" height="110" rx="4" fill="#f5ede0" stroke="#1e1e2a" stroke-width="1.5"/>
  <text x="650" y="365" class="body-label" text-anchor="middle" letter-spacing="0.08em" font-size="13" font-family="'JetBrains Mono','Consolas',monospace" font-weight="600" fill="#1e1e2a">EXPECTED OUTCOME</text>
  <text x="650" y="392" class="caption" text-anchor="middle" font-size="13" font-style="italic">Ce que le grader doit v&#233;rifier &#8212; d&#233;terministe ET LLM-as-judge.</text>
  <text x="650" y="420" class="caption" text-anchor="middle" font-size="12">D&#233;finit &#224; la fois le crit&#232;re objectif (code-checkable) et le jugement qualitatif (juge LLM).</text>

  <!-- ===== DECOMPOSITION ARROWS from Expected Outcome to two families ===== -->
  <!-- Arrow to Famille A: from (490, 442) down to (360, 468) — leaving ~12px gap -->
  <!-- Bottom center of Expected Outcome: (650, 442) -->
  <!-- Famille A center x = 80 + 560/2 = 360, Famille B center x = 660 + 560/2 = 940 -->

  <!-- Left branch: from (490, 442) curving to Famille A left (360, 468) -->
  <path d="M 490 442 Q 400 455 370 466" fill="none" stroke="#6b6f7c" stroke-width="1.2" marker-end="url(#arrow-mid)"/>

  <!-- Right branch: from (810, 442) curving to Famille B right (940, 468) -->
  <path d="M 810 442 Q 900 455 930 466" fill="none" stroke="#6b6f7c" stroke-width="1.2" marker-end="url(#arrow-mid)"/>

  <!-- ===== FAMILLE A — Metrics déterministes ===== -->
  <!-- x=80, y=470, width=560, height=120 -->
  <rect x="80" y="470" width="560" height="120" rx="4" fill="#fdf9f2" stroke="rgba(30,30,44,0.18)" stroke-width="1.2"/>
  <text x="360" y="498" class="body-label" text-anchor="middle">METRICS D&#201;TERMINISTES (code-checkable)</text>
  <line x1="80" y1="506" x2="640" y2="506" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>
  <text x="110" y="526" class="mono" font-size="12" fill="#1e1e2a">turn_count &#8804; 10</text>
  <text x="110" y="548" class="mono" font-size="12" fill="#1e1e2a">tool_schema_errors = 0</text>
  <text x="110" y="570" class="mono" font-size="12" fill="#1e1e2a">quest_completed = true</text>

  <!-- ===== FAMILLE B — Juges LLM ===== -->
  <!-- x=660, y=470, width=560, height=120 -->
  <rect x="660" y="470" width="560" height="120" rx="4" fill="#fdf9f2" stroke="rgba(30,30,44,0.18)" stroke-width="1.2"/>
  <text x="940" y="498" class="body-label" text-anchor="middle">JUGES LLM SINGLE-RESPONSIBILITY</text>
  <line x1="660" y1="506" x2="1220" y2="506" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>
  <text x="690" y="526" class="mono" font-size="12" fill="#1e1e2a">judge_no_hallucination</text>
  <text x="690" y="548" class="mono" font-size="12" fill="#1e1e2a">judge_pii_protection</text>
  <text x="690" y="570" class="mono" font-size="12" fill="#1e1e2a">judge_source_citation</text>

  <!-- ===== CAPTION ===== -->
  <line x1="60" y1="608" x2="1240" y2="608" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>
  <text x="650" y="624" class="caption" text-anchor="middle">Reprise de la convention canonique du dossier evaluation-agentique. Une suite de juges single-responsibility bat un juge monolithique.</text>

</svg>
