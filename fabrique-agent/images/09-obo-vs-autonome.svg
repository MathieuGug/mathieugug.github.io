<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">OBO vs R&#233;gime autonome &#8212; la facture cach&#233;e</title>
  <desc id="desc">Sch&#233;ma 09 &#8212; Diptyque comparatif des co&#251;ts de gouvernance : agents OBO (~17&#160;% du projet) vs r&#233;gime autonome (30&#8211;40&#160;%).</desc>
  <defs>
    <style>
      <![CDATA[
        .display { font-family: 'Fraunces', 'Cambria', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.01em; fill: #1e1e2a; }
        .subtitle { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-weight: 400; font-size: 18px; fill: #6b6f7c; }
        .body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #1e1e2a; }
        .body-label { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 15px; fill: #1e1e2a; }
        .caption { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 12px; fill: #6b6f7c; }
        .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; }
        .schema-marker { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; fill: #b8582e; }
        .carmine { fill: #b8582e; }
        .faint { fill: #6b6f7c; }
        .ink { fill: #1e1e2a; }
      ]]>
    </style>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1300" height="760" fill="#faf6ec"/>

  <!-- ===== TOP BANDEAU ===== -->
  <text x="60" y="40" class="schema-marker">SCH&#201;MA 09</text>
  <text x="60" y="67" class="display" font-size="28">OBO vs R&#233;gime autonome</text>
  <text x="60" y="91" class="subtitle">la facture cach&#233;e &#8212; chiffres canoniques du dossier gouvernance</text>

  <!-- Thin separator line -->
  <line x1="60" y1="108" x2="1240" y2="108" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>

  <!-- ===== BANDEAU COMMUN — caption ===== -->
  <text x="60" y="131" class="caption">Co&#251;ts cumul&#233;s de gouvernance, formation et op&#233;rations en pourcentage du projet d&#8217;impl&#233;mentation.</text>

  <!-- ===== VERTICAL SEPARATOR ===== -->
  <line x1="650" y1="155" x2="650" y2="685" stroke="rgba(30,30,44,0.14)" stroke-width="0.5"/>

  <!-- ================================================================ -->
  <!-- COLONNE GAUCHE : AGENTS OBO  (x=80..620, y=155..680)            -->
  <!-- ================================================================ -->

  <!-- Panel background (very subtle) -->
  <rect x="80" y="155" width="540" height="525" rx="6" fill="rgba(184,88,46,0.025)" stroke="rgba(184,88,46,0.10)" stroke-width="1"/>

  <!-- Title bandeau OBO -->
  <text x="350" y="193" class="body-label" text-anchor="middle" font-size="15" font-weight="600" letter-spacing="0.08em">AGENTS OBO</text>
  <text x="350" y="213" class="caption" text-anchor="middle">On-Behalf-Of &#183; token utilisateur d&#233;l&#233;gu&#233;</text>

  <!-- Thin rule under title -->
  <line x1="100" y1="225" x2="600" y2="225" stroke="rgba(30,30,44,0.08)" stroke-width="0.8"/>

  <!-- Grand chiffre OBO -->
  <text x="350" y="278" class="display" text-anchor="middle" font-size="52" fill="#b8582e">~ 17&#160;%</text>
  <text x="350" y="302" class="caption" text-anchor="middle">du budget projet</text>

  <!-- Thin rule -->
  <line x1="100" y1="320" x2="600" y2="320" stroke="rgba(30,30,44,0.08)" stroke-width="0.8"/>

  <!-- Liste des co&#251;ts OBO — 5 items -->
  <!-- Bullet plein carmine + label mono + valeur body -->

  <!-- Item 1 -->
  <circle cx="112" cy="346" r="4" fill="#b8582e"/>
  <text x="126" y="350" class="mono" font-size="12" fill="#1e1e2a">Provider (Registry/Defender)</text>
  <text x="594" y="350" class="mono" font-size="12" fill="#b8582e" text-anchor="end">4&#8211;5&#160;%</text>

  <!-- Item 2 -->
  <circle cx="112" cy="378" r="4" fill="#b8582e"/>
  <text x="126" y="382" class="mono" font-size="12" fill="#1e1e2a">Setup</text>
  <text x="594" y="382" class="mono" font-size="12" fill="#b8582e" text-anchor="end">2&#8211;3&#160;%</text>

  <!-- Item 3 -->
  <circle cx="112" cy="410" r="4" fill="#b8582e"/>
  <text x="126" y="414" class="mono" font-size="12" fill="#1e1e2a">M&#233;thodologie (comit&#233; + charte)</text>
  <text x="594" y="414" class="mono" font-size="12" fill="#b8582e" text-anchor="end">4&#8211;5&#160;%</text>

  <!-- Item 4 -->
  <circle cx="112" cy="442" r="4" fill="#b8582e"/>
  <text x="126" y="446" class="mono" font-size="12" fill="#1e1e2a">Formation</text>
  <text x="594" y="446" class="mono" font-size="12" fill="#b8582e" text-anchor="end">3&#8211;4&#160;%</text>

  <!-- Item 5 -->
  <circle cx="112" cy="474" r="4" fill="#b8582e"/>
  <text x="126" y="478" class="mono" font-size="12" fill="#1e1e2a">Tracking &amp; monitoring</text>
  <text x="594" y="478" class="mono" font-size="12" fill="#b8582e" text-anchor="end">2&#8211;3&#160;%</text>

  <!-- Dotted leader lines OBO (subtle) -->
  <line x1="126" y1="348" x2="480" y2="348" stroke="rgba(30,30,44,0.10)" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="126" y1="380" x2="480" y2="380" stroke="rgba(30,30,44,0.10)" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="126" y1="412" x2="480" y2="412" stroke="rgba(30,30,44,0.10)" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="126" y1="444" x2="480" y2="444" stroke="rgba(30,30,44,0.10)" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="126" y1="476" x2="480" y2="476" stroke="rgba(30,30,44,0.10)" stroke-width="0.5" stroke-dasharray="2 4"/>

  <!-- Thin rule before total -->
  <line x1="100" y1="502" x2="600" y2="502" stroke="rgba(30,30,44,0.12)" stroke-width="0.8"/>

  <!-- Sous-total OBO -->
  <text x="126" y="534" class="body-label" font-size="15" font-weight="600" fill="#b8582e">TOTAL</text>
  <text x="594" y="534" class="body-label" font-size="15" font-weight="600" fill="#b8582e" text-anchor="end">&#8776; 17&#160;%</text>

  <!-- ================================================================ -->
  <!-- COLONNE DROITE : R&#201;GIME AUTONOME  (x=680..1220, y=155..680)  -->
  <!-- ================================================================ -->

  <!-- Panel background (slightly more present to suggest heavier weight) -->
  <rect x="680" y="155" width="540" height="525" rx="6" fill="rgba(184,88,46,0.045)" stroke="rgba(184,88,46,0.18)" stroke-width="1.2"/>

  <!-- Title bandeau Autonome -->
  <text x="950" y="193" class="body-label" text-anchor="middle" font-size="15" font-weight="600" letter-spacing="0.08em">R&#201;GIME AUTONOME</text>
  <text x="950" y="213" class="caption" text-anchor="middle">identit&#233; propre &#183; action sans humain dans la boucle</text>

  <!-- Thin rule under title -->
  <line x1="700" y1="225" x2="1200" y2="225" stroke="rgba(30,30,44,0.08)" stroke-width="0.8"/>

  <!-- Grand chiffre Autonome (plus imposant : font-size 60) -->
  <text x="950" y="281" class="display" text-anchor="middle" font-size="60" font-weight="700" fill="#b8582e">30&#8211;40&#160;%</text>
  <text x="950" y="302" class="caption" text-anchor="middle">du budget projet</text>

  <!-- Thin rule -->
  <line x1="700" y1="320" x2="1200" y2="320" stroke="rgba(30,30,44,0.08)" stroke-width="0.8"/>

  <!-- Liste des co&#251;ts Autonome — 6 items (bullets creux = cercle stroke seul) -->

  <!-- Item 1 -->
  <circle cx="712" cy="346" r="4" fill="none" stroke="#b8582e" stroke-width="1.5"/>
  <text x="726" y="350" class="mono" font-size="12" fill="#1e1e2a">Provisioning double</text>
  <text x="1194" y="350" class="mono" font-size="12" fill="#b8582e" text-anchor="end">8&#8211;10&#160;%</text>

  <!-- Item 2 -->
  <circle cx="712" cy="378" r="4" fill="none" stroke="#b8582e" stroke-width="1.5"/>
  <text x="726" y="382" class="mono" font-size="12" fill="#1e1e2a">Compliance renforc&#233;e</text>
  <text x="1194" y="382" class="mono" font-size="12" fill="#b8582e" text-anchor="end">5&#8211;7&#160;%</text>

  <!-- Item 3 -->
  <circle cx="712" cy="410" r="4" fill="none" stroke="#b8582e" stroke-width="1.5"/>
  <text x="726" y="414" class="mono" font-size="12" fill="#1e1e2a">Incident response 24/7</text>
  <text x="1194" y="414" class="mono" font-size="12" fill="#b8582e" text-anchor="end">6&#8211;8&#160;%</text>

  <!-- Item 4 -->
  <circle cx="712" cy="442" r="4" fill="none" stroke="#b8582e" stroke-width="1.5"/>
  <text x="726" y="446" class="mono" font-size="12" fill="#1e1e2a">Plan r&#233;m&#233;diation</text>
  <text x="1194" y="446" class="mono" font-size="12" fill="#b8582e" text-anchor="end">4&#8211;5&#160;%</text>

  <!-- Item 5 -->
  <circle cx="712" cy="474" r="4" fill="none" stroke="#b8582e" stroke-width="1.5"/>
  <text x="726" y="478" class="mono" font-size="12" fill="#1e1e2a">Support juridique</text>
  <text x="1194" y="478" class="mono" font-size="12" fill="#b8582e" text-anchor="end">3&#8211;5&#160;%</text>

  <!-- Item 6 -->
  <circle cx="712" cy="506" r="4" fill="none" stroke="#b8582e" stroke-width="1.5"/>
  <text x="726" y="510" class="mono" font-size="12" fill="#1e1e2a">Audit + reporting</text>
  <text x="1194" y="510" class="mono" font-size="12" fill="#b8582e" text-anchor="end">4&#8211;5&#160;%</text>

  <!-- Dotted leader lines Autonome (subtle) -->
  <line x1="726" y1="348" x2="1080" y2="348" stroke="rgba(30,30,44,0.10)" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="726" y1="380" x2="1080" y2="380" stroke="rgba(30,30,44,0.10)" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="726" y1="412" x2="1080" y2="412" stroke="rgba(30,30,44,0.10)" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="726" y1="444" x2="1080" y2="444" stroke="rgba(30,30,44,0.10)" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="726" y1="476" x2="1080" y2="476" stroke="rgba(30,30,44,0.10)" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="726" y1="508" x2="1080" y2="508" stroke="rgba(30,30,44,0.10)" stroke-width="0.5" stroke-dasharray="2 4"/>

  <!-- Thin rule before total -->
  <line x1="700" y1="530" x2="1200" y2="530" stroke="rgba(30,30,44,0.12)" stroke-width="0.8"/>

  <!-- Sous-total Autonome -->
  <text x="726" y="562" class="body-label" font-size="15" font-weight="600" fill="#b8582e">TOTAL</text>
  <text x="1194" y="562" class="body-label" font-size="15" font-weight="600" fill="#b8582e" text-anchor="end">&#8776; 30&#8211;40&#160;%</text>

  <!-- ================================================================ -->
  <!-- NOTE DE BAS DE PAGE                                              -->
  <!-- ================================================================ -->
  <line x1="60" y1="700" x2="1240" y2="700" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>
  <text x="650" y="720" class="caption" text-anchor="middle">Source&#160;: dossier gouvernance &#183; 14 piliers &#183; 3 lignes de d&#233;fense (mod&#232;le SR&#160;11-7). Le choix OBO vs Autonome se d&#233;cide au stade Production.</text>
  <text x="650" y="740" class="caption" text-anchor="middle">Toutes les valeurs sont des fourchettes estim&#233;es par rapport au budget global du projet d&#8217;impl&#233;mentation agent.</text>

</svg>
