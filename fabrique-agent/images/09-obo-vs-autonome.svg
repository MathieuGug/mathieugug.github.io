<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">OBO vs R&#233;gime autonome &#8212; 17&#160;% comme plancher, pas comme total</title>
  <desc id="desc">Sch&#233;ma 09 &#8212; Stacked bars comparatifs : le co&#251;t Agent365 (17&#160;%) est un plancher commun aux deux r&#233;gimes. OBO ajoute &#8776;10&#160;% d&#8217;extras (total &#8776;27&#160;%). Autonome ajoute &#8776;31&#160;% d&#8217;extras (total &#8776;48&#160;%).</desc>
  <defs>
    <style>
      <![CDATA[
        .display { font-family: 'Fraunces', 'Cambria', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.01em; fill: #1e1e2a; }
        .subtitle { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-weight: 400; font-size: 18px; fill: #6b6f7c; }
        .body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #1e1e2a; }
        .body-label { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 15px; fill: #1e1e2a; }
        .caption { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 12px; fill: #6b6f7c; }
        .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; }
        .schema-marker { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; fill: #b8582e; }
        .carmine { fill: #b8582e; }
        .faint { fill: #6b6f7c; }
        .ink { fill: #1e1e2a; }
      ]]>
    </style>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1300" height="800" fill="#faf6ec"/>

  <!-- ===== TOP BANDEAU ===== -->
  <text x="60" y="40" class="schema-marker">SCH&#201;MA 09</text>
  <text x="60" y="68" class="display" font-size="28">OBO vs R&#233;gime autonome</text>
  <text x="60" y="92" class="subtitle">le co&#251;t Agent365 (&#8776;&#160;17&#160;%) est un plancher, pas un total</text>

  <!-- Thin separator line -->
  <line x1="60" y1="110" x2="1240" y2="110" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>

  <!-- Intro caption -->
  <text x="650" y="134" class="caption" text-anchor="middle">Le 17&#160;% du co&#251;t Agent365 (provider &#183; Registry &#183; Defender &#183; Purview) est un plancher commun aux deux r&#233;gimes. Sur ce plancher se posent les extras propres &#224; chaque r&#233;gime.</text>

  <!-- ================================================================ -->
  <!-- GEOMETRY                                                          -->
  <!-- Base y = 660. 1 % = 8 px. Bars rise upward.                    -->
  <!-- OBO bar   x=390–550 (160px wide). 27 % = 216 px tall → top y=444 -->
  <!-- Autonome  x=750–910 (160px wide). 48 % = 384 px tall → top y=276 -->
  <!-- Floor (17 %) = 136 px → floor top y = 524                       -->
  <!-- ================================================================ -->

  <!-- ===== FLOOR LABEL BRACKET (shared) ===== -->
  <!-- Bracket line between the two bars at floor level y=524 to y=660 -->
  <line x1="550" y1="524" x2="750" y2="524" stroke="rgba(30,30,44,0.20)" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="650" y="518" class="mono" font-size="11" fill="#6b6f7c" text-anchor="middle" font-weight="600">PLANCHER COMMUN</text>
  <line x1="650" y1="522" x2="650" y2="660" stroke="rgba(30,30,44,0.15)" stroke-width="0.8"/>

  <!-- ================================================================ -->
  <!-- OBO BAR  x=390–550, base y=660                                  -->
  <!-- Floor segment : y=524 → y=660, h=136 (17 %)                     -->
  <!-- Extra seg 1 : Tracking + setup 3 % = 24 px → y=500 → y=524      -->
  <!-- Extra seg 2 : Formation 4 % = 32 px → y=468 → y=500             -->
  <!-- Extra seg 3 : M&#233;thodologie 4 % = 32 px → y=436 → y=468          -->
  <!-- OBO top y = 660 - 216 = 444. Extras top = 444. Lets adjust:     -->
  <!-- Total extras = 3+4+4 = 11 %, total = 28 %. Height = 224 px.     -->
  <!-- Extras height = 88 px. Top = 660 - 224 = 436.                   -->
  <!-- Seg3 Méthodologie: y=436–468 h=32                               -->
  <!-- Seg2 Formation: y=468–500 h=32                                  -->
  <!-- Seg1 Tracking: y=500–524 h=24                                   -->
  <!-- Floor: y=524–660 h=136                                          -->
  <!-- ================================================================ -->

  <!-- OBO bar floor segment (ink-mid #9a9ca5) -->
  <rect x="390" y="524" width="160" height="136" fill="#9a9ca5" rx="0"/>
  <!-- OBO floor top cap rounded -->
  <rect x="390" y="524" width="160" height="4" fill="#9a9ca5"/>

  <!-- Floor label inside bar -->
  <text x="470" y="584" class="mono" font-size="11" fill="#faf6ec" text-anchor="middle" font-weight="600">17&#160;%</text>
  <text x="470" y="600" class="caption" font-size="11" fill="rgba(250,246,236,0.85)" text-anchor="middle">Agent365</text>
  <text x="470" y="614" class="caption" font-size="11" fill="rgba(250,246,236,0.70)" text-anchor="middle">infrastructure</text>

  <!-- OBO extra seg 1 : Tracking + setup 3 % (lightest carmine tint) -->
  <rect x="390" y="500" width="160" height="24" fill="#e8c3af" rx="0"/>
  <!-- OBO extra seg 2 : Formation 4 % -->
  <rect x="390" y="468" width="160" height="32" fill="#d9956e" rx="0"/>
  <!-- OBO extra seg 3 : M&#233;thodologie 4 % (top, most saturated) -->
  <rect x="390" y="436" width="160" height="32" fill="#c8703e" rx="0"/>
  <!-- Top rounded cap on OBO extras -->
  <rect x="390" y="436" width="160" height="5" rx="3" fill="#c8703e"/>

  <!-- Outer border on OBO bar -->
  <rect x="390" y="436" width="160" height="224" fill="none" stroke="rgba(184,88,46,0.30)" stroke-width="1" rx="0"/>

  <!-- OBO total label ABOVE bar -->
  <text x="470" y="424" class="display" font-size="26" fill="#1e1e2a" text-anchor="middle">&#8776;&#160;25&#8211;30&#160;%</text>
  <text x="470" y="408" class="caption" text-anchor="middle">du budget projet</text>

  <!-- OBO: labels to the LEFT of bar -->
  <!-- Seg 3 Méthodologie mid y = 452 -->
  <line x1="388" y1="452" x2="340" y2="452" stroke="rgba(30,30,44,0.20)" stroke-width="0.8"/>
  <text x="334" y="448" class="mono" font-size="11" fill="#b8582e" text-anchor="end">+ 4&#160;%</text>
  <text x="334" y="462" class="caption" font-size="11" fill="#1e1e2a" text-anchor="end">M&#233;thodologie (comit&#233; + charte)</text>

  <!-- Seg 2 Formation mid y = 484 -->
  <line x1="388" y1="484" x2="300" y2="484" stroke="rgba(30,30,44,0.20)" stroke-width="0.8"/>
  <text x="294" y="480" class="mono" font-size="11" fill="#b8582e" text-anchor="end">+ 4&#160;%</text>
  <text x="294" y="494" class="caption" font-size="11" fill="#1e1e2a" text-anchor="end">Formation</text>

  <!-- Seg 1 Tracking mid y = 512 -->
  <line x1="388" y1="512" x2="260" y2="512" stroke="rgba(30,30,44,0.20)" stroke-width="0.8"/>
  <text x="254" y="508" class="mono" font-size="11" fill="#b8582e" text-anchor="end">+ 3&#160;%</text>
  <text x="254" y="522" class="caption" font-size="11" fill="#1e1e2a" text-anchor="end">Tracking &amp; setup</text>

  <!-- OBO bar bottom title -->
  <text x="470" y="688" class="body-label" text-anchor="middle" font-size="15" font-weight="600" letter-spacing="0.08em">AGENTS OBO</text>
  <text x="470" y="706" class="caption" text-anchor="middle">On-Behalf-Of &#183; token utilisateur d&#233;l&#233;gu&#233;</text>

  <!-- ================================================================ -->
  <!-- AUTONOME BAR x=750–910, base y=660                               -->
  <!-- Extras = 9+6+7+4.5+4.5 = 31 %, height = 248 px                  -->
  <!-- Top y = 660 - (17+31)*8 = 660 - 384 = 276                        -->
  <!-- Floor: y=524–660 h=136                                           -->
  <!-- Seg A (Provisioning double 9 %=72 px): y=452–524 ← below floor! -->
  <!--   Correction: extras stack ABOVE floor, so from y=524 upward.   -->
  <!-- Seg A top: y=524-72=452                                          -->
  <!-- Seg B (Compliance 6%=48px): y=452-48=404                        -->
  <!-- Seg C (Incident 7%=56px): y=404-56=348                          -->
  <!-- Seg D (Rémédiation+juridique 4.5%=36px): y=348-36=312           -->
  <!-- Seg E (Audit+reporting 4.5%=36px): y=312-36=276                 -->
  <!-- ================================================================ -->

  <!-- Autonome bar floor segment -->
  <rect x="750" y="524" width="160" height="136" fill="#9a9ca5" rx="0"/>

  <!-- Floor label inside bar -->
  <text x="830" y="584" class="mono" font-size="11" fill="#faf6ec" text-anchor="middle" font-weight="600">17&#160;%</text>
  <text x="830" y="600" class="caption" font-size="11" fill="rgba(250,246,236,0.85)" text-anchor="middle">Agent365</text>
  <text x="830" y="614" class="caption" font-size="11" fill="rgba(250,246,236,0.70)" text-anchor="middle">infrastructure</text>

  <!-- Seg A: Provisioning double 9 % = 72 px (y=452–524) lightest -->
  <rect x="750" y="452" width="160" height="72" fill="#e8c3af" rx="0"/>
  <!-- Seg B: Compliance 6 % = 48 px (y=404–452) -->
  <rect x="750" y="404" width="160" height="48" fill="#d9956e" rx="0"/>
  <!-- Seg C: Incident response 7 % = 56 px (y=348–404) -->
  <rect x="750" y="348" width="160" height="56" fill="#c8703e" rx="0"/>
  <!-- Seg D: R&#233;m&#233;diation + juridique 4.5 % = 36 px (y=312–348) -->
  <rect x="750" y="312" width="160" height="36" fill="#b8582e" rx="0"/>
  <!-- Seg E: Audit + reporting 4.5 % = 36 px (y=276–312) darkest -->
  <rect x="750" y="276" width="160" height="36" fill="#a04020" rx="0"/>
  <!-- Top rounded cap -->
  <rect x="750" y="276" width="160" height="5" rx="3" fill="#a04020"/>

  <!-- Outer border on Autonome bar -->
  <rect x="750" y="276" width="160" height="384" fill="none" stroke="rgba(184,88,46,0.40)" stroke-width="1.2" rx="0"/>

  <!-- Autonome total label ABOVE bar -->
  <text x="830" y="264" class="display" font-size="26" fill="#b8582e" text-anchor="middle">&#8776;&#160;40&#8211;55&#160;%</text>
  <text x="830" y="248" class="caption" text-anchor="middle">du budget projet</text>

  <!-- Autonome: labels to the RIGHT of bar -->
  <!-- Seg E Audit mid y = 294 -->
  <line x1="912" y1="294" x2="960" y2="294" stroke="rgba(30,30,44,0.20)" stroke-width="0.8"/>
  <text x="966" y="290" class="mono" font-size="11" fill="#b8582e" text-anchor="start">+ 4&#8211;5&#160;%</text>
  <text x="966" y="304" class="caption" font-size="11" fill="#1e1e2a" text-anchor="start">Audit + reporting</text>

  <!-- Seg D R&#233;m&#233;diation mid y = 330 -->
  <line x1="912" y1="330" x2="990" y2="330" stroke="rgba(30,30,44,0.20)" stroke-width="0.8"/>
  <text x="996" y="326" class="mono" font-size="11" fill="#b8582e" text-anchor="start">+ 4&#8211;5&#160;%</text>
  <text x="996" y="340" class="caption" font-size="11" fill="#1e1e2a" text-anchor="start">Plan r&#233;m&#233;diation + juridique</text>

  <!-- Seg C Incident mid y = 376 -->
  <line x1="912" y1="376" x2="1020" y2="376" stroke="rgba(30,30,44,0.20)" stroke-width="0.8"/>
  <text x="1026" y="372" class="mono" font-size="11" fill="#b8582e" text-anchor="start">+ 6&#8211;8&#160;%</text>
  <text x="1026" y="386" class="caption" font-size="11" fill="#1e1e2a" text-anchor="start">Incident response 24/7</text>

  <!-- Seg B Compliance mid y = 428 -->
  <line x1="912" y1="428" x2="1020" y2="428" stroke="rgba(30,30,44,0.20)" stroke-width="0.8"/>
  <text x="1026" y="424" class="mono" font-size="11" fill="#b8582e" text-anchor="start">+ 5&#8211;7&#160;%</text>
  <text x="1026" y="438" class="caption" font-size="11" fill="#1e1e2a" text-anchor="start">Compliance renforc&#233;e</text>

  <!-- Seg A Provisioning mid y = 488 -->
  <line x1="912" y1="488" x2="1020" y2="488" stroke="rgba(30,30,44,0.20)" stroke-width="0.8"/>
  <text x="1026" y="484" class="mono" font-size="11" fill="#b8582e" text-anchor="start">+ 8&#8211;10&#160;%</text>
  <text x="1026" y="498" class="caption" font-size="11" fill="#1e1e2a" text-anchor="start">Provisioning double</text>

  <!-- Autonome bar bottom title -->
  <text x="830" y="688" class="body-label" text-anchor="middle" font-size="15" font-weight="600" letter-spacing="0.08em">R&#201;GIME AUTONOME</text>
  <text x="830" y="706" class="caption" text-anchor="middle">identit&#233; propre &#183; action sans humain dans la boucle</text>

  <!-- ================================================================ -->
  <!-- BASE LINE                                                          -->
  <!-- ================================================================ -->
  <line x1="350" y1="660" x2="950" y2="660" stroke="rgba(30,30,44,0.30)" stroke-width="1.5"/>

  <!-- 0 % label on axis -->
  <text x="340" y="664" class="mono" font-size="11" fill="#6b6f7c" text-anchor="end">0&#160;%</text>
  <text x="960" y="664" class="mono" font-size="11" fill="#6b6f7c" text-anchor="start">0&#160;%</text>

  <!-- Floor level tick -->
  <line x1="350" y1="524" x2="390" y2="524" stroke="rgba(30,30,44,0.25)" stroke-width="1"/>
  <text x="345" y="528" class="mono" font-size="11" fill="#6b6f7c" text-anchor="end">17&#160;%</text>
  <line x1="910" y1="524" x2="950" y2="524" stroke="rgba(30,30,44,0.25)" stroke-width="1"/>
  <text x="955" y="528" class="mono" font-size="11" fill="#6b6f7c" text-anchor="start">17&#160;%</text>

  <!-- ================================================================ -->
  <!-- NOTE DE BAS DE PAGE                                              -->
  <!-- ================================================================ -->
  <line x1="60" y1="730" x2="1240" y2="730" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>
  <text x="650" y="750" class="caption" text-anchor="middle">Source&#160;: dossier gouvernance. 17&#160;% = chiffre canonique Microsoft Agent365 (infrastructure provider). Les extras varient selon les r&#233;gulateurs et la complexit&#233; de l&#8217;agent.</text>
  <text x="650" y="768" class="caption" text-anchor="middle">Toutes les valeurs sont des fourchettes estim&#233;es en pourcentage du budget global du projet d&#8217;impl&#233;mentation agent.</text>

</svg>
