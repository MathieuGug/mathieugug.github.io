<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="arr02" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5a5a5a" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#faf6ec"/>

  <text x="64" y="60" class="mono" font-size="12" letter-spacing="3" fill="#b8582e">SCHÉMA 02 — L'ANATOMIE DE LA CONFIANCE</text>
  <text x="64" y="104" class="display" font-size="34" font-weight="600" fill="#1e1e2a">Pourquoi le noyau de Lean ne ment pas</text>
  <text x="64" y="138" class="display" font-size="18" font-style="italic" fill="#5a5a5a">L'énoncé est un type, la preuve un terme — le noyau vérifie qu'il l'habite</text>
  <line x1="64" y1="160" x2="1136" y2="160" stroke="#e5e1d8" stroke-width="1"/>

  <!-- Pipeline boxes -->
  <!-- 1 énoncé -->
  <g class="interactive" data-card="enonce" tabindex="0" role="button" aria-label="L'énoncé comme type">
    <rect x="64" y="250" width="210" height="120" rx="4" fill="#fff" stroke="#1e1e2a" stroke-width="1.25"/>
    <circle cx="92" cy="278" r="9" fill="#b8582e"/>
    <text x="92" y="282" class="mono" font-size="11" font-weight="600" text-anchor="middle" fill="#faf6ec">1</text>
    <text x="118" y="282" class="body" font-size="14" font-weight="600" fill="#1e1e2a">L'énoncé</text>
    <text x="84" y="312" class="mono" font-size="11" fill="#1f5560">theorem T :</text>
    <text x="84" y="330" class="mono" font-size="11" fill="#5a5a5a">  ∀ n, P n</text>
    <text x="84" y="356" class="body" font-size="10.5" fill="#5a5a5a">un type à habiter</text>
  </g>
  <line x1="274" y1="310" x2="332" y2="310" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr02)"/>

  <!-- 2 tactiques -->
  <g class="interactive" data-card="tactiques" tabindex="0" role="button" aria-label="Les tactiques construisent le terme">
    <rect x="340" y="250" width="210" height="120" rx="4" fill="#fff" stroke="#1e1e2a" stroke-width="1.25"/>
    <circle cx="368" cy="278" r="9" fill="#b8582e"/>
    <text x="368" y="282" class="mono" font-size="11" font-weight="600" text-anchor="middle" fill="#faf6ec">2</text>
    <text x="394" y="282" class="body" font-size="14" font-weight="600" fill="#1e1e2a">Les tactiques</text>
    <text x="360" y="312" class="mono" font-size="11" fill="#1f5560">intro n</text>
    <text x="360" y="330" class="mono" font-size="11" fill="#1f5560">induction n</text>
    <text x="360" y="356" class="body" font-size="10.5" fill="#5a5a5a">script de preuve (LLM)</text>
  </g>
  <line x1="550" y1="310" x2="608" y2="310" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr02)"/>

  <!-- 3 terme -->
  <g tabindex="0">
    <rect x="616" y="250" width="210" height="120" rx="4" fill="#fff" stroke="#1e1e2a" stroke-width="1.25"/>
    <circle cx="644" cy="278" r="9" fill="#b8582e"/>
    <text x="644" y="282" class="mono" font-size="11" font-weight="600" text-anchor="middle" fill="#faf6ec">3</text>
    <text x="670" y="282" class="body" font-size="14" font-weight="600" fill="#1e1e2a">Le terme</text>
    <text x="636" y="312" class="mono" font-size="11" fill="#1f5560">λ n =&gt; ...</text>
    <text x="636" y="330" class="body" font-size="10.5" fill="#5a5a5a">objet de preuve</text>
    <text x="636" y="356" class="body" font-size="10.5" fill="#5a5a5a">explicite</text>
  </g>
  <line x1="826" y1="310" x2="884" y2="310" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr02)"/>

  <!-- 4 noyau -->
  <g class="interactive" data-card="noyau-confiance" tabindex="0" role="button" aria-label="Le noyau de confiance">
    <rect x="892" y="240" width="210" height="140" rx="4" fill="#1e1e2a"/>
    <circle cx="920" cy="270" r="9" fill="#b8582e"/>
    <text x="920" y="274" class="mono" font-size="11" font-weight="600" text-anchor="middle" fill="#faf6ec">4</text>
    <text x="946" y="274" class="body" font-size="14" font-weight="600" fill="#faf6ec">Le noyau</text>
    <text x="912" y="304" class="body" font-size="11" fill="#d99a6c">type-checking</text>
    <text x="912" y="324" class="body" font-size="11" fill="#b8b5ae">~quelques k lignes</text>
    <text x="912" y="344" class="body" font-size="11" fill="#b8b5ae">critère de de Bruijn</text>
    <text x="912" y="368" class="mono" font-size="13" fill="#7fc99a">✓ QED</text>
  </g>

  <!-- Mathlib base layer -->
  <line x1="445" y1="370" x2="445" y2="470" stroke="#5a5a5a" stroke-width="1.25" stroke-dasharray="3 3" marker-start="url(#arr02)"/>
  <g class="interactive" data-card="mathlib" tabindex="0" role="button" aria-label="Mathlib, la bibliothèque vérifiée">
    <rect x="64" y="480" width="762" height="96" rx="4" fill="#fbeee7" stroke="#b8582e" stroke-width="1.25"/>
    <text x="88" y="514" class="body" font-size="15" font-weight="600" fill="#1e1e2a">Mathlib — la bibliothèque commune</text>
    <text x="88" y="540" class="body" font-size="12" fill="#5a5a5a">&gt; 1,5 M lignes · &gt; 200 000 théorèmes déjà passés au noyau. Chaque lemme invoqué est garanti ;</text>
    <text x="88" y="558" class="body" font-size="12" fill="#5a5a5a">un raisonnement qui dépend d'un lemme absent échoue, même s'il est correct.</text>
  </g>

  <!-- Contrast callout -->
  <g tabindex="0">
    <rect x="892" y="440" width="210" height="136" rx="4" fill="#fff" stroke="#1f5560" stroke-width="1.25" stroke-dasharray="2 3"/>
    <text x="912" y="470" class="body" font-size="13" font-weight="600" fill="#1f5560">Contraste : le PRM</text>
    <text x="912" y="496" class="body" font-size="11" fill="#5a5a5a">Un juge appris peut</text>
    <text x="912" y="513" class="body" font-size="11" fill="#5a5a5a">être trompé :</text>
    <text x="912" y="536" class="mono" font-size="12" fill="#b8582e">noté 99 % · juste 2 %</text>
    <text x="912" y="560" class="body" font-size="10.5" font-style="italic" fill="#5a5a5a">cf. process-reward-models</text>
  </g>

  <line x1="64" y1="724" x2="1136" y2="724" stroke="#e5e1d8" stroke-width="1"/>
  <text x="64" y="752" class="body" font-size="11" font-style="italic" fill="#5a5a5a">Source : communauté Lean / Mathlib. Lecture : toute la confiance repose sur un noyau minuscule, indépendant des tactiques — un modèle ne peut pas halluciner un terme qu'il accepte à tort.</text>
</svg>
