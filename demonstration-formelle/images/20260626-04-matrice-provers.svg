<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#faf6ec"/>

  <text x="64" y="60" class="mono" font-size="12" letter-spacing="3" fill="#b8582e">SCHÉMA 04 — PROVEURS × BENCHMARKS</text>
  <text x="64" y="104" class="display" font-size="34" font-weight="600" fill="#1e1e2a">La course de l'état de l'art</text>
  <text x="64" y="138" class="display" font-size="18" font-style="italic" fill="#5a5a5a">miniF2F sature à 90 % ; PutnamBench (universitaire) reste la vraie barre</text>
  <line x1="64" y1="160" x2="1136" y2="160" stroke="#e5e1d8" stroke-width="1"/>

  <!-- Column headers -->
  <text x="360" y="232" class="mono" font-size="12" text-anchor="middle" fill="#5a5a5a">miniF2F</text>
  <text x="520" y="232" class="mono" font-size="12" text-anchor="middle" fill="#5a5a5a">PutnamBench</text>
  <text x="680" y="232" class="mono" font-size="12" text-anchor="middle" fill="#5a5a5a">IMO 2025</text>
  <text x="820" y="232" class="mono" font-size="12" text-anchor="middle" fill="#5a5a5a">Vérif. formelle</text>
  <text x="980" y="232" class="mono" font-size="12" text-anchor="middle" fill="#5a5a5a">Ouvert</text>
  <line x1="64" y1="248" x2="1100" y2="248" stroke="#1e1e2a" stroke-width="1.25"/>

  <!-- Row template: y centers at 296, 364, 432, 500, 568 -->
  <!-- Row 1 AlphaProof -->
  <g class="interactive" data-card="alphaproof" tabindex="0" role="button" aria-label="AlphaProof">
    <rect x="64" y="262" width="1036" height="64" fill="#fbeee7" opacity="0.5"/>
    <text x="80" y="294" class="body" font-size="15" font-weight="600" fill="#1e1e2a">AlphaProof</text>
    <text x="80" y="314" class="body" font-size="10.5" fill="#5a5a5a">DeepMind · AlphaZero+Lean</text>
    <text x="360" y="302" class="mono" font-size="13" text-anchor="middle" fill="#5a5a5a">—</text>
    <text x="520" y="302" class="mono" font-size="13" text-anchor="middle" fill="#5a5a5a">—</text>
    <text x="680" y="302" class="body" font-size="12.5" text-anchor="middle" fill="#1e1e2a">argent (2024)</text>
    <text x="820" y="302" class="mono" font-size="14" text-anchor="middle" fill="#2f5d3f">●</text>
    <text x="980" y="302" class="mono" font-size="14" text-anchor="middle" fill="#b8582e">○</text>
  </g>
  <!-- Row 2 DeepSeek-Prover-V2 -->
  <g class="interactive" data-card="deepseek" tabindex="0" role="button" aria-label="DeepSeek-Prover-V2">
    <rect x="64" y="330" width="1036" height="64" fill="#fff" opacity="0"/>
    <text x="80" y="362" class="body" font-size="15" font-weight="600" fill="#1e1e2a">DeepSeek-Prover-V2</text>
    <text x="80" y="382" class="body" font-size="10.5" fill="#5a5a5a">671B · subgoal RL (GRPO)</text>
    <text x="360" y="370" class="mono" font-size="14" font-weight="600" text-anchor="middle" fill="#b8582e">88,9 %</text>
    <text x="520" y="370" class="mono" font-size="13" text-anchor="middle" fill="#1e1e2a">49/658</text>
    <text x="680" y="370" class="mono" font-size="13" text-anchor="middle" fill="#5a5a5a">—</text>
    <text x="820" y="370" class="mono" font-size="14" text-anchor="middle" fill="#2f5d3f">●</text>
    <text x="980" y="370" class="mono" font-size="14" text-anchor="middle" fill="#2f5d3f">●</text>
  </g>
  <!-- Row 3 Goedel-Prover-V2 -->
  <g class="interactive" data-card="goedel" tabindex="0" role="button" aria-label="Goedel-Prover-V2">
    <rect x="64" y="398" width="1036" height="64" fill="#fbeee7" opacity="0.5"/>
    <text x="80" y="430" class="body" font-size="15" font-weight="600" fill="#1e1e2a">Goedel-Prover-V2</text>
    <text x="80" y="450" class="body" font-size="10.5" fill="#5a5a5a">32B · data synth + self-correction</text>
    <text x="360" y="438" class="mono" font-size="14" font-weight="600" text-anchor="middle" fill="#b8582e">90,4 %</text>
    <text x="520" y="438" class="mono" font-size="13" text-anchor="middle" fill="#1e1e2a">86</text>
    <text x="680" y="438" class="mono" font-size="13" text-anchor="middle" fill="#5a5a5a">—</text>
    <text x="820" y="438" class="mono" font-size="14" text-anchor="middle" fill="#2f5d3f">●</text>
    <text x="980" y="438" class="mono" font-size="14" text-anchor="middle" fill="#2f5d3f">●</text>
  </g>
  <!-- Row 4 Aristotle -->
  <g class="interactive" data-card="aristotle" tabindex="0" role="button" aria-label="Aristotle, Harmonic">
    <rect x="64" y="466" width="1036" height="64" fill="#fff" opacity="0"/>
    <text x="80" y="498" class="body" font-size="15" font-weight="600" fill="#1e1e2a">Aristotle</text>
    <text x="80" y="518" class="body" font-size="10.5" fill="#5a5a5a">Harmonic · Lean 4</text>
    <text x="360" y="506" class="mono" font-size="13" text-anchor="middle" fill="#5a5a5a">—</text>
    <text x="520" y="506" class="mono" font-size="13" text-anchor="middle" fill="#5a5a5a">—</text>
    <text x="680" y="506" class="body" font-size="12.5" font-weight="600" text-anchor="middle" fill="#b8582e">or (formel)</text>
    <text x="820" y="506" class="mono" font-size="14" text-anchor="middle" fill="#2f5d3f">●</text>
    <text x="980" y="506" class="mono" font-size="14" text-anchor="middle" fill="#b8582e">○</text>
  </g>
  <!-- Row 5 Gemini Deep Think -->
  <g tabindex="0">
    <rect x="64" y="534" width="1036" height="64" fill="#e8f0f1" opacity="0.6"/>
    <text x="80" y="566" class="body" font-size="15" font-weight="600" fill="#1e1e2a">Gemini Deep Think</text>
    <text x="80" y="586" class="body" font-size="10.5" fill="#5a5a5a">langage naturel · parallel thinking</text>
    <text x="360" y="574" class="mono" font-size="13" text-anchor="middle" fill="#5a5a5a">—</text>
    <text x="520" y="574" class="mono" font-size="13" text-anchor="middle" fill="#5a5a5a">—</text>
    <text x="680" y="574" class="body" font-size="12.5" font-weight="600" text-anchor="middle" fill="#1f5560">or · 35/42</text>
    <text x="820" y="574" class="mono" font-size="14" text-anchor="middle" fill="#b8582e">○</text>
    <text x="980" y="574" class="mono" font-size="14" text-anchor="middle" fill="#b8582e">○</text>
  </g>
  <line x1="64" y1="598" x2="1100" y2="598" stroke="#e5e1d8" stroke-width="1"/>

  <!-- Legend -->
  <text x="64" y="648" class="mono" font-size="11" fill="#2f5d3f">● oui</text>
  <text x="150" y="648" class="mono" font-size="11" fill="#b8582e">○ non</text>
  <text x="240" y="648" class="body" font-size="11" fill="#5a5a5a">miniF2F = lycée/olympiade · PutnamBench = 658 problèmes universitaires (les meilleurs ouverts ≈ 13 %)</text>

  <line x1="64" y1="724" x2="1136" y2="724" stroke="#e5e1d8" stroke-width="1"/>
  <text x="64" y="752" class="body" font-size="11" font-style="italic" fill="#5a5a5a">Sources : arXiv 2504.21801 (DeepSeek-Prover-V2) ; 2508.03613 (Goedel-Prover-V2) ; 2510.01346 (Aristotle) ; DeepMind (IMO 2024/2025).</text>
</svg>
