<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="arr03" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#b8582e" stroke-width="1.5"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#faf6ec"/>

  <text x="64" y="60" class="mono" font-size="12" letter-spacing="3" fill="#b8582e">SCHÉMA 03 — LA BOUCLE ALPHAPROOF</text>
  <text x="64" y="104" class="display" font-size="34" font-weight="600" fill="#1e1e2a">AlphaZero rencontre le solveur</text>
  <text x="64" y="138" class="display" font-size="18" font-style="italic" fill="#5a5a5a">Le vérificateur produit à la fois le signal de récompense et les données d'entraînement</text>
  <line x1="64" y1="160" x2="1136" y2="160" stroke="#e5e1d8" stroke-width="1"/>

  <!-- Center -->
  <circle cx="600" cy="460" r="92" fill="#1e1e2a"/>
  <text x="600" y="448" class="display" font-size="19" font-weight="600" text-anchor="middle" fill="#faf6ec">AlphaProof</text>
  <text x="600" y="472" class="body" font-size="12" text-anchor="middle" fill="#b8b5ae">boucle RL</text>
  <text x="600" y="490" class="body" font-size="12" text-anchor="middle" fill="#b8b5ae">AlphaZero</text>

  <!-- Node 1: autoformaliseur (top-left) -->
  <g class="interactive" data-card="autoformaliseur" tabindex="0" role="button" aria-label="Réseau d'autoformalisation">
    <rect x="150" y="230" width="230" height="110" rx="4" fill="#fbeee7" stroke="#b8582e" stroke-width="1.25"/>
    <text x="174" y="262" class="mono" font-size="11" fill="#b8582e">① AUTOFORMALISEUR</text>
    <text x="174" y="290" class="body" font-size="14" font-weight="600" fill="#1e1e2a">~1 M problèmes en langue</text>
    <text x="174" y="312" class="body" font-size="12.5" fill="#5a5a5a">→ ~100 M énoncés Lean</text>
    <text x="174" y="330" class="body" font-size="10.5" font-style="italic" fill="#5a5a5a">le vrai déverrouillage</text>
  </g>

  <!-- Node 2: recherche (top-right) -->
  <g class="interactive" data-card="recherche-preuve" tabindex="0" role="button" aria-label="Recherche de preuve guidée">
    <rect x="820" y="230" width="230" height="110" rx="4" fill="#fff" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="844" y="262" class="mono" font-size="11" fill="#b8582e">② RECHERCHE DE PREUVE</text>
    <text x="844" y="290" class="body" font-size="14" font-weight="600" fill="#1e1e2a">arbre de pas de preuve</text>
    <text x="844" y="312" class="body" font-size="12.5" fill="#5a5a5a">guidé par le réseau</text>
    <text x="844" y="330" class="body" font-size="10.5" font-style="italic" fill="#5a5a5a">test-time RL · curriculum</text>
  </g>

  <!-- Node 3: verif lean (bottom-right) -->
  <g class="interactive" data-card="verif-lean" tabindex="0" role="button" aria-label="Vérification par Lean">
    <rect x="820" y="580" width="230" height="110" rx="4" fill="#1e1e2a"/>
    <text x="844" y="612" class="mono" font-size="11" fill="#d99a6c">③ VÉRIFICATION LEAN</text>
    <text x="844" y="640" class="body" font-size="14" font-weight="600" fill="#faf6ec">preuve acceptée ?</text>
    <text x="844" y="662" class="body" font-size="12.5" fill="#b8b5ae">verdict binaire</text>
    <text x="844" y="680" class="mono" font-size="11" fill="#7fc99a">✓ / ✗</text>
  </g>

  <!-- Node 4: renforcement (bottom-left) -->
  <g class="interactive" data-card="renforcement" tabindex="0" role="button" aria-label="Renforcement du modèle">
    <rect x="150" y="580" width="230" height="110" rx="4" fill="#e8f0f1" stroke="#1f5560" stroke-width="1.25"/>
    <text x="174" y="612" class="mono" font-size="11" fill="#1f5560">④ RENFORCEMENT</text>
    <text x="174" y="640" class="body" font-size="14" font-weight="600" fill="#1e1e2a">preuves vérifiées</text>
    <text x="174" y="662" class="body" font-size="12.5" fill="#5a5a5a">réinjectées au modèle</text>
    <text x="174" y="680" class="body" font-size="10.5" font-style="italic" fill="#5a5a5a">problèmes plus durs</text>
  </g>

  <!-- Cycle arrows (clockwise) -->
  <path d="M385,300 C520,320 540,360 555,398" fill="none" stroke="#b8582e" stroke-width="2.5" marker-end="url(#arr03)"/>
  <path d="M935,345 C935,420 935,440 935,575" fill="none" stroke="#b8582e" stroke-width="2.5" marker-end="url(#arr03)"/>
  <path d="M815,640 C600,665 540,560 540,540" fill="none" stroke="#b8582e" stroke-width="2.5" marker-end="url(#arr03)"/>
  <path d="M265,575 C265,460 265,420 360,335" fill="none" stroke="#b8582e" stroke-width="2.5" marker-end="url(#arr03)"/>

  <line x1="64" y1="724" x2="1136" y2="724" stroke="#e5e1d8" stroke-width="1"/>
  <text x="64" y="752" class="body" font-size="11" font-style="italic" fill="#5a5a5a">Source : DeepMind, AlphaProof (Nature, nov. 2025 ; blog juil. 2024). Lecture : IMO 2024 — P1, P2, P6 résolus en formel ; P4 par AlphaGeometry 2 ; parfois plusieurs jours de calcul.</text>
</svg>
