<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="arr01" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5a5a5a" stroke-width="1.4"/>
    </marker>
    <marker id="arr01c" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#b8582e" stroke-width="1.6"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#faf6ec"/>

  <!-- Header -->
  <text x="64" y="60" class="mono" font-size="12" letter-spacing="3" fill="#b8582e">SCHÉMA 01 — LA BIFURCATION</text>
  <text x="64" y="104" class="display" font-size="34" font-weight="600" fill="#1e1e2a">Deux routes vers le même sommet</text>
  <text x="64" y="138" class="display" font-size="18" font-style="italic" fill="#5a5a5a">De l'argent formel (IMO 2024) à l'or en langage naturel (IMO 2025)</text>
  <line x1="64" y1="160" x2="1136" y2="160" stroke="#e5e1d8" stroke-width="1"/>

  <!-- Source node -->
  <g class="interactive" data-card="probleme" tabindex="0" role="button" aria-label="Problème IMO">
    <rect x="64" y="360" width="170" height="92" rx="4" fill="#fff" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="149" y="398" class="body" font-size="14" font-weight="600" text-anchor="middle" fill="#1e1e2a">Problème IMO</text>
    <text x="149" y="420" class="body" font-size="11" text-anchor="middle" fill="#5a5a5a">énoncé en langue</text>
    <text x="149" y="436" class="body" font-size="11" text-anchor="middle" fill="#5a5a5a">naturelle</text>
  </g>

  <!-- Split lines -->
  <path d="M234,390 C300,390 300,250 360,250" fill="none" stroke="#b8582e" stroke-width="2.5" marker-end="url(#arr01c)"/>
  <path d="M234,422 C300,422 300,560 360,560" fill="none" stroke="#1f5560" stroke-width="2.5" marker-end="url(#arr01)"/>

  <!-- TOP ROUTE: formelle -->
  <text x="360" y="208" class="mono" font-size="11" letter-spacing="2" fill="#b8582e">ROUTE A · FORMELLE</text>
  <g class="interactive" data-card="route-formelle" tabindex="0" role="button" aria-label="Autoformalisation vers Lean">
    <rect x="360" y="222" width="190" height="80" rx="4" fill="#fbeee7" stroke="#b8582e" stroke-width="1.25"/>
    <text x="455" y="252" class="body" font-size="14" font-weight="600" text-anchor="middle" fill="#1e1e2a">Autoformalisation</text>
    <text x="455" y="274" class="body" font-size="11" text-anchor="middle" fill="#5a5a5a">traduction en Lean</text>
    <text x="455" y="290" class="mono" font-size="10" text-anchor="middle" fill="#b8582e">AlphaProof · Aristotle</text>
  </g>
  <line x1="550" y1="262" x2="616" y2="262" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr01)"/>

  <g class="interactive" data-card="verificateur" tabindex="0" role="button" aria-label="Noyau vérificateur Lean">
    <rect x="624" y="222" width="190" height="80" rx="4" fill="#fff" stroke="#b8582e" stroke-width="2"/>
    <text x="719" y="250" class="body" font-size="14" font-weight="600" text-anchor="middle" fill="#1e1e2a">Noyau de Lean</text>
    <text x="719" y="272" class="body" font-size="11" text-anchor="middle" fill="#5a5a5a">vérification mécanique</text>
    <text x="719" y="290" class="mono" font-size="10" text-anchor="middle" fill="#b8582e">récompense incorruptible</text>
  </g>
  <line x1="814" y1="262" x2="892" y2="262" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr01)"/>

  <!-- BOTTOM ROUTE: naturelle -->
  <text x="360" y="520" class="mono" font-size="11" letter-spacing="2" fill="#1f5560">ROUTE B · LANGAGE NATUREL</text>
  <g class="interactive" data-card="route-naturelle" tabindex="0" role="button" aria-label="Raisonnement en langage naturel">
    <rect x="360" y="532" width="190" height="80" rx="4" fill="#e8f0f1" stroke="#1f5560" stroke-width="1.25"/>
    <text x="455" y="562" class="body" font-size="14" font-weight="600" text-anchor="middle" fill="#1e1e2a">Raisonnement direct</text>
    <text x="455" y="584" class="body" font-size="11" text-anchor="middle" fill="#5a5a5a">preuve en prose</text>
    <text x="455" y="600" class="mono" font-size="10" text-anchor="middle" fill="#1f5560">Deep Think · o-series</text>
  </g>
  <line x1="550" y1="572" x2="616" y2="572" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr01)"/>

  <g tabindex="0">
    <rect x="624" y="532" width="190" height="80" rx="4" fill="#fff" stroke="#1f5560" stroke-width="1.25" stroke-dasharray="2 3"/>
    <text x="719" y="560" class="body" font-size="14" font-weight="600" text-anchor="middle" fill="#1e1e2a">Jury humain</text>
    <text x="719" y="582" class="body" font-size="11" text-anchor="middle" fill="#5a5a5a">notation, pas vérif.</text>
    <text x="719" y="600" class="mono" font-size="10" text-anchor="middle" fill="#1f5560">plausible, non garanti</text>
  </g>
  <line x1="814" y1="572" x2="892" y2="572" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr01)"/>

  <!-- Convergence: medals -->
  <g class="interactive" data-card="imo-2025" tabindex="0" role="button" aria-label="Le sommet IMO">
    <rect x="900" y="300" width="200" height="232" rx="4" fill="#1e1e2a"/>
    <text x="1000" y="344" class="display" font-size="20" font-weight="600" text-anchor="middle" fill="#faf6ec">Le sommet</text>
    <line x1="936" y1="362" x2="1064" y2="362" stroke="#5a5a5a" stroke-width="0.75"/>
    <text x="1000" y="396" class="mono" font-size="11" text-anchor="middle" fill="#b8582e">IMO 2024</text>
    <text x="1000" y="416" class="body" font-size="13" text-anchor="middle" fill="#faf6ec">Argent · 28 pts</text>
    <text x="1000" y="432" class="body" font-size="10" text-anchor="middle" fill="#b8b5ae">3/6 · formel</text>
    <text x="1000" y="470" class="mono" font-size="11" text-anchor="middle" fill="#d99a6c">IMO 2025</text>
    <text x="1000" y="490" class="body" font-size="13" text-anchor="middle" fill="#faf6ec">Or · 35/42</text>
    <text x="1000" y="506" class="body" font-size="10" text-anchor="middle" fill="#b8b5ae">5/6 · naturel</text>
  </g>

  <!-- Footer -->
  <line x1="64" y1="724" x2="1136" y2="724" stroke="#e5e1d8" stroke-width="1"/>
  <text x="64" y="752" class="body" font-size="11" font-style="italic" fill="#5a5a5a">Source : Google DeepMind (IMO 2024, IMO 2025) ; Harmonic, Aristotle 2025. Lecture : la route A garantit chaque pas, la route B raisonne directement mais sans garde-fou formel.</text>
</svg>
