<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="arr06" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5a5a5a" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#faf6ec"/>

  <text x="64" y="60" class="mono" font-size="12" letter-spacing="3" fill="#b8582e">SCHÉMA 06 — LE GOULOT D'ÉTRANGLEMENT</text>
  <text x="64" y="104" class="display" font-size="34" font-weight="600" fill="#1e1e2a">Le mur de l'autoformalisation</text>
  <text x="64" y="138" class="display" font-size="18" font-style="italic" fill="#5a5a5a">Traduire le langage naturel en Lean sans en trahir le sens — le vrai verrou</text>
  <line x1="64" y1="160" x2="1136" y2="160" stroke="#e5e1d8" stroke-width="1"/>

  <!-- Funnel stages: trapezoids decreasing -->
  <!-- Stage 1 -->
  <rect x="80" y="300" width="220" height="160" rx="4" fill="#1e1e2a"/>
  <text x="190" y="356" class="body" font-size="14" font-weight="600" text-anchor="middle" fill="#faf6ec">Problèmes en</text>
  <text x="190" y="376" class="body" font-size="14" font-weight="600" text-anchor="middle" fill="#faf6ec">langue naturelle</text>
  <text x="190" y="408" class="mono" font-size="16" text-anchor="middle" fill="#d99a6c">~1 M</text>
  <text x="190" y="432" class="body" font-size="10.5" text-anchor="middle" fill="#b8b5ae">abondants, scrapables</text>
  <line x1="300" y1="380" x2="346" y2="380" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr06)"/>

  <!-- Stage 2 -->
  <rect x="354" y="320" width="210" height="120" rx="4" fill="#fbeee7" stroke="#b8582e" stroke-width="1.25"/>
  <text x="459" y="362" class="body" font-size="14" font-weight="600" text-anchor="middle" fill="#1e1e2a">Énoncés Lean</text>
  <text x="459" y="382" class="body" font-size="14" font-weight="600" text-anchor="middle" fill="#1e1e2a">valides (syntaxe)</text>
  <text x="459" y="412" class="body" font-size="10.5" text-anchor="middle" fill="#5a5a5a">compilent</text>
  <line x1="564" y1="380" x2="610" y2="380" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr06)"/>

  <!-- Stage 3 -->
  <rect x="618" y="335" width="200" height="90" rx="4" fill="#fff" stroke="#b8582e" stroke-width="1.25"/>
  <text x="718" y="372" class="body" font-size="13.5" font-weight="600" text-anchor="middle" fill="#1e1e2a">Énoncés corrects</text>
  <text x="718" y="392" class="body" font-size="11" text-anchor="middle" fill="#5a5a5a">(le bon théorème)</text>
  <line x1="818" y1="380" x2="864" y2="380" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr06)"/>

  <!-- Stage 4 -->
  <rect x="872" y="348" width="180" height="64" rx="4" fill="#2f5d3f"/>
  <text x="962" y="378" class="body" font-size="13" font-weight="600" text-anchor="middle" fill="#faf6ec">Preuves complètes</text>
  <text x="962" y="398" class="mono" font-size="10.5" text-anchor="middle" fill="#cfe6d6">✓ vérifiées</text>

  <!-- Failure modes (top callouts) -->
  <g class="interactive" data-card="perte-semantique" tabindex="0" role="button" aria-label="Dérive sémantique">
    <rect x="354" y="206" width="464" height="76" rx="4" fill="#fff" stroke="#b8582e" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="374" y="234" class="mono" font-size="11" fill="#b8582e">MODES D'ÉCHEC DE LA TRADUCTION</text>
    <text x="374" y="256" class="body" font-size="12" fill="#5a5a5a">imports hallucinés · syntaxe mélangée (Coq/Isabelle) ·</text>
    <text x="374" y="273" class="body" font-size="12" fill="#5a5a5a">dérive sémantique : valide mais prouve le mauvais théorème</text>
  </g>
  <line x1="586" y1="282" x2="510" y2="318" stroke="#b8582e" stroke-width="0.75"/>
  <line x1="700" y1="282" x2="718" y2="333" stroke="#b8582e" stroke-width="0.75"/>

  <!-- Data scarcity callout (left, on stage 2 drop) -->
  <g class="interactive" data-card="data-scarcity" tabindex="0" role="button" aria-label="Rareté des données">
    <rect x="80" y="500" width="300" height="96" rx="4" fill="#e8f0f1" stroke="#1f5560" stroke-width="1.25"/>
    <text x="100" y="528" class="mono" font-size="11" fill="#1f5560">LE PROBLÈME DE FOND</text>
    <text x="100" y="550" class="body" font-size="13" font-weight="600" fill="#1e1e2a">Rareté des données</text>
    <text x="100" y="572" class="body" font-size="11.5" fill="#5a5a5a">Les preuves formelles ne se</text>
    <text x="100" y="588" class="body" font-size="11.5" fill="#5a5a5a">scrapent pas comme du code.</text>
  </g>

  <!-- Remedies (bottom) -->
  <g class="interactive" data-card="synthese-donnees" tabindex="0" role="button" aria-label="Synthèse de données">
    <rect x="410" y="500" width="300" height="96" rx="4" fill="#fbeee7" stroke="#b8582e" stroke-width="1.25"/>
    <text x="430" y="528" class="mono" font-size="11" fill="#b8582e">PARADE 1</text>
    <text x="430" y="550" class="body" font-size="13" font-weight="600" fill="#1e1e2a">Synthèse de données</text>
    <text x="430" y="572" class="body" font-size="11.5" fill="#5a5a5a">Autoformaliser en masse,</text>
    <text x="430" y="588" class="body" font-size="11.5" fill="#5a5a5a">échafauder par difficulté.</text>
  </g>
  <g class="interactive" data-card="expert-iteration" tabindex="0" role="button" aria-label="Itération d'expert">
    <rect x="740" y="500" width="312" height="96" rx="4" fill="#fff" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="760" y="528" class="mono" font-size="11" fill="#5a5a5a">PARADE 2</text>
    <text x="760" y="550" class="body" font-size="13" font-weight="600" fill="#1e1e2a">Itération d'expert</text>
    <text x="760" y="572" class="body" font-size="11.5" fill="#5a5a5a">Le prouveur fabrique ses propres</text>
    <text x="760" y="588" class="body" font-size="11.5" fill="#5a5a5a">données vérifiées — la boucle vertueuse.</text>
  </g>
  <path d="M560,500 C560,478 500,470 470,442" fill="none" stroke="#5a5a5a" stroke-width="0.75" stroke-dasharray="3 3" marker-end="url(#arr06)"/>
  <path d="M890,500 C890,478 920,460 945,414" fill="none" stroke="#5a5a5a" stroke-width="0.75" stroke-dasharray="3 3" marker-end="url(#arr06)"/>

  <line x1="64" y1="724" x2="1136" y2="724" stroke="#e5e1d8" stroke-width="1"/>
  <text x="64" y="752" class="body" font-size="11" font-style="italic" fill="#5a5a5a">Sources : arXiv 2510.15681 (ProofBridge) ; 2505.12031 (data synthesis). Lecture : c'est ce mur, et non la recherche de preuve, qui a poussé l'IMO 2025 à contourner le formel.</text>
</svg>
