<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="arr07" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5a5a5a" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#faf6ec"/>

  <text x="64" y="60" class="mono" font-size="12" letter-spacing="3" fill="#b8582e">SCHÉMA 07 — TRAJECTOIRE 2024-2028</text>
  <text x="64" y="104" class="display" font-size="34" font-weight="600" fill="#1e1e2a">Vers la convergence naturel × formel</text>
  <text x="64" y="138" class="display" font-size="18" font-style="italic" fill="#5a5a5a">Le langage naturel propose, Lean dispose — et le vérificateur devient récompense universelle</text>
  <line x1="64" y1="160" x2="1136" y2="160" stroke="#e5e1d8" stroke-width="1"/>

  <!-- Horizon columns -->
  <text x="230" y="206" class="mono" font-size="13" text-anchor="middle" fill="#1e1e2a">2024</text>
  <text x="470" y="206" class="mono" font-size="13" text-anchor="middle" fill="#1e1e2a">2025</text>
  <text x="710" y="206" class="mono" font-size="13" text-anchor="middle" fill="#1e1e2a">2026</text>
  <text x="970" y="206" class="mono" font-size="13" text-anchor="middle" fill="#1e1e2a">2027-2028</text>
  <line x1="350" y1="196" x2="350" y2="680" stroke="#e5e1d8" stroke-width="1"/>
  <line x1="590" y1="196" x2="590" y2="680" stroke="#e5e1d8" stroke-width="1"/>
  <line x1="830" y1="196" x2="830" y2="680" stroke="#e5e1d8" stroke-width="1"/>

  <!-- Track labels -->
  <text x="80" y="276" class="mono" font-size="11" letter-spacing="1.5" fill="#b8582e">CAPACITÉ</text>
  <text x="80" y="436" class="mono" font-size="11" letter-spacing="1.5" fill="#1f5560">MÉTHODE</text>
  <text x="80" y="596" class="mono" font-size="11" letter-spacing="1.5" fill="#b58a2c">USAGE</text>
  <line x1="64" y1="356" x2="1136" y2="356" stroke="#e5e1d8" stroke-width="0.5"/>
  <line x1="64" y1="516" x2="1136" y2="516" stroke="#e5e1d8" stroke-width="0.5"/>

  <!-- Milestones: capacité row (y~300) -->
  <circle cx="230" cy="300" r="7" fill="#b8582e"/>
  <text x="230" y="328" class="body" font-size="12" font-weight="600" text-anchor="middle" fill="#1e1e2a">IMO argent</text>
  <text x="230" y="344" class="body" font-size="10.5" text-anchor="middle" fill="#5a5a5a">formel (Lean)</text>

  <circle cx="470" cy="300" r="7" fill="#1f5560"/>
  <text x="470" y="328" class="body" font-size="12" font-weight="600" text-anchor="middle" fill="#1e1e2a">IMO or</text>
  <text x="470" y="344" class="body" font-size="10.5" text-anchor="middle" fill="#5a5a5a">naturel · 35/42</text>

  <g class="interactive" data-card="reward-universel" tabindex="0" role="button" aria-label="Le vérificateur comme récompense universelle">
    <rect x="888" y="270" width="232" height="70" rx="4" fill="#1e1e2a"/>
    <text x="908" y="296" class="body" font-size="12.5" font-weight="600" fill="#faf6ec">Vérificateur = reward</text>
    <text x="908" y="314" class="body" font-size="12.5" font-weight="600" fill="#faf6ec">universel du raisonnement</text>
    <text x="908" y="332" class="mono" font-size="10" fill="#d99a6c">la garantie exportée hors des maths</text>
  </g>

  <!-- Méthode row (y~460) -->
  <circle cx="230" cy="460" r="7" fill="#1f5560"/>
  <text x="230" y="488" class="body" font-size="11.5" text-anchor="middle" fill="#5a5a5a">autoformalisation</text>
  <text x="230" y="503" class="body" font-size="11.5" text-anchor="middle" fill="#5a5a5a">+ AlphaZero</text>

  <circle cx="470" cy="460" r="7" fill="#1f5560"/>
  <text x="470" y="488" class="body" font-size="11.5" text-anchor="middle" fill="#5a5a5a">RLVR · subgoal</text>
  <text x="470" y="503" class="body" font-size="11.5" text-anchor="middle" fill="#5a5a5a">self-correction</text>

  <g class="interactive" data-card="autoformaliseur-fiable" tabindex="0" role="button" aria-label="Autoformaliseurs fiables">
    <rect x="628" y="430" width="232" height="70" rx="4" fill="#e8f0f1" stroke="#1f5560" stroke-width="1.25"/>
    <text x="648" y="456" class="body" font-size="12.5" font-weight="600" fill="#1e1e2a">Autoformaliseurs fiables</text>
    <text x="648" y="474" class="body" font-size="11" fill="#5a5a5a">traduire NL→Lean aussi sûr</text>
    <text x="648" y="490" class="body" font-size="11" fill="#5a5a5a">que compiler du code</text>
  </g>

  <g class="interactive" data-card="convergence" tabindex="0" role="button" aria-label="Convergence naturel et formel">
    <rect x="888" y="430" width="232" height="70" rx="4" fill="#fbeee7" stroke="#b8582e" stroke-width="1.25"/>
    <text x="908" y="456" class="body" font-size="12.5" font-weight="600" fill="#1e1e2a">Fusion NL × formel</text>
    <text x="908" y="474" class="body" font-size="11" fill="#5a5a5a">le NL propose le plan,</text>
    <text x="908" y="490" class="body" font-size="11" fill="#5a5a5a">Lean certifie chaque pas</text>
  </g>

  <!-- Usage row (y~620) -->
  <circle cx="470" cy="620" r="7" fill="#b58a2c"/>
  <text x="470" y="648" class="body" font-size="11.5" text-anchor="middle" fill="#5a5a5a">math crowdsourcée</text>
  <text x="470" y="663" class="body" font-size="10.5" text-anchor="middle" fill="#5a5a5a">Equational Theories (Tao)</text>

  <g class="interactive" data-card="preuve-as-ci" tabindex="0" role="button" aria-label="La preuve comme intégration continue">
    <rect x="628" y="590" width="232" height="70" rx="4" fill="#fff" stroke="#b58a2c" stroke-width="1.25"/>
    <text x="648" y="616" class="body" font-size="12.5" font-weight="600" fill="#1e1e2a">Preuve-comme-CI</text>
    <text x="648" y="634" class="body" font-size="11" fill="#5a5a5a">bibliothèques et specs sous</text>
    <text x="648" y="650" class="body" font-size="11" fill="#5a5a5a">vérification permanente</text>
  </g>

  <!-- Flow arrows along capacity -->
  <line x1="244" y1="300" x2="450" y2="300" stroke="#5a5a5a" stroke-width="1" marker-end="url(#arr07)"/>
  <path d="M484,300 C620,300 740,300 880,302" fill="none" stroke="#5a5a5a" stroke-width="1" marker-end="url(#arr07)"/>

  <line x1="64" y1="700" x2="1136" y2="700" stroke="#e5e1d8" stroke-width="1"/>
  <text x="64" y="728" class="body" font-size="11" font-style="italic" fill="#5a5a5a">Sources : arXiv 2512.07087 (Equational Theories Project, Tao) ; 2506.14245 (RLVR) ; analyse de l'auteur.</text>
  <text x="64" y="748" class="body" font-size="11" font-style="italic" fill="#5a5a5a">Lecture : la ligne critique 2026-2028 est la fiabilisation de l'autoformalisation, qui referme la bifurcation des schémas 01 et 06.</text>
</svg>
