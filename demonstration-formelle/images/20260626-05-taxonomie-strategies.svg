<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="arr05" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#5a5a5a" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="900" fill="#faf6ec"/>

  <text x="60" y="58" class="mono" font-size="12" letter-spacing="3" fill="#b8582e">SCHÉMA 05 — TAXONOMIE</text>
  <text x="60" y="100" class="display" font-size="30" font-weight="600" fill="#1e1e2a">Quatre stratégies de preuve</text>
  <text x="60" y="132" class="display" font-size="16" font-style="italic" fill="#5a5a5a">Comment un modèle attaque un théorème en Lean</text>
  <line x1="60" y1="152" x2="840" y2="152" stroke="#e5e1d8" stroke-width="1"/>

  <!-- Root -->
  <rect x="350" y="186" width="200" height="62" rx="4" fill="#1e1e2a"/>
  <text x="450" y="216" class="body" font-size="14" font-weight="600" text-anchor="middle" fill="#faf6ec">Théorème à prouver</text>
  <text x="450" y="236" class="mono" font-size="10.5" text-anchor="middle" fill="#b8b5ae">énoncé Lean fixé</text>

  <!-- Connectors to 2x2 -->
  <path d="M420,248 C420,288 260,290 260,322" fill="none" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr05)"/>
  <path d="M480,248 C480,288 640,290 640,322" fill="none" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr05)"/>
  <path d="M420,248 C420,470 260,560 260,592" fill="none" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr05)"/>
  <path d="M480,248 C480,470 640,560 640,592" fill="none" stroke="#5a5a5a" stroke-width="1.25" marker-end="url(#arr05)"/>

  <!-- Card 1: whole-proof (top-left) -->
  <g class="interactive" data-card="whole-proof" tabindex="0" role="button" aria-label="Génération de preuve entière">
    <rect x="80" y="330" width="320" height="200" rx="4" fill="#fff" stroke="#b8582e" stroke-width="1.25"/>
    <text x="104" y="364" class="mono" font-size="11" fill="#b8582e">A · WHOLE-PROOF</text>
    <text x="104" y="392" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Preuve entière</text>
    <text x="104" y="420" class="body" font-size="12.5" fill="#5a5a5a">Générer toute la preuve d'un coup,</text>
    <text x="104" y="438" class="body" font-size="12.5" fill="#5a5a5a">la soumettre à Lean, rejouer jusqu'à</text>
    <text x="104" y="456" class="body" font-size="12.5" fill="#5a5a5a">ce qu'une tentative passe.</text>
    <text x="104" y="494" class="body" font-size="11.5" font-style="italic" fill="#5a5a5a">Simple, mais coûteux à l'échantillonnage.</text>
    <text x="104" y="516" class="mono" font-size="11" fill="#1f5560">pass@k élevé</text>
  </g>

  <!-- Card 2: subgoal (top-right) -->
  <g class="interactive" data-card="subgoal" tabindex="0" role="button" aria-label="Décomposition en sous-objectifs">
    <rect x="480" y="330" width="320" height="200" rx="4" fill="#fbeee7" stroke="#b8582e" stroke-width="1.25"/>
    <text x="504" y="364" class="mono" font-size="11" fill="#b8582e">B · SUBGOAL DECOMPOSITION</text>
    <text x="504" y="392" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Sous-objectifs</text>
    <text x="504" y="420" class="body" font-size="12.5" fill="#5a5a5a">Un grand modèle raisonne en langue</text>
    <text x="504" y="438" class="body" font-size="12.5" fill="#5a5a5a">sur le plan, découpe en lemmes,</text>
    <text x="504" y="456" class="body" font-size="12.5" fill="#5a5a5a">puis formalise chaque morceau.</text>
    <text x="504" y="494" class="body" font-size="11.5" font-style="italic" fill="#5a5a5a">DeepSeek-Prover-V2 · DeepSeek-V3 + GRPO</text>
    <text x="504" y="516" class="mono" font-size="11" fill="#1f5560">88,9 % miniF2F</text>
  </g>

  <!-- Card 3: tree-search (bottom-left) -->
  <g class="interactive" data-card="tree-search" tabindex="0" role="button" aria-label="Recherche arborescente et itération d'expert">
    <rect x="80" y="600" width="320" height="200" rx="4" fill="#e8f0f1" stroke="#1f5560" stroke-width="1.25"/>
    <text x="104" y="634" class="mono" font-size="11" fill="#1f5560">C · TREE-SEARCH + EXPERT ITER.</text>
    <text x="104" y="662" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Recherche + itération</text>
    <text x="104" y="690" class="body" font-size="12.5" fill="#5a5a5a">Explorer l'espace des tactiques,</text>
    <text x="104" y="708" class="body" font-size="12.5" fill="#5a5a5a">garder les preuves trouvées comme</text>
    <text x="104" y="726" class="body" font-size="12.5" fill="#5a5a5a">données d'entraînement, recommencer.</text>
    <text x="104" y="764" class="body" font-size="11.5" font-style="italic" fill="#5a5a5a">Goedel-Prover-V2 · AlphaProof</text>
    <text x="104" y="786" class="mono" font-size="11" fill="#1f5560">boucle auto-alimentée</text>
  </g>

  <!-- Card 4: autoformalize (bottom-right) -->
  <g class="interactive" data-card="autoformalize" tabindex="0" role="button" aria-label="Autoformaliser puis prouver">
    <rect x="480" y="600" width="320" height="200" rx="4" fill="#fff" stroke="#1e1e2a" stroke-width="1.25"/>
    <text x="504" y="634" class="mono" font-size="11" fill="#5a5a5a">D · AUTOFORMALIZE-THEN-PROVE</text>
    <text x="504" y="662" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Traduire d'abord</text>
    <text x="504" y="690" class="body" font-size="12.5" fill="#5a5a5a">L'amont des trois autres : passer du</text>
    <text x="504" y="708" class="body" font-size="12.5" fill="#5a5a5a">langage naturel à l'énoncé formel —</text>
    <text x="504" y="726" class="body" font-size="12.5" fill="#5a5a5a">le verrou réel (cf. schéma 06).</text>
    <text x="504" y="764" class="body" font-size="11.5" font-style="italic" fill="#5a5a5a">synthèse de données à grande échelle</text>
    <text x="504" y="786" class="mono" font-size="11" fill="#b8582e">le goulot d'étranglement</text>
  </g>

  <line x1="60" y1="852" x2="840" y2="852" stroke="#e5e1d8" stroke-width="1"/>
  <text x="60" y="878" class="body" font-size="10.5" font-style="italic" fill="#5a5a5a">Source : analyse de l'auteur d'après arXiv 2504.21801, 2508.03613, 2505.12031. Les voies B et C dominent l'open-source 2025.</text>
</svg>
