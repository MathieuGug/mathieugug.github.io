<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-03">
  <title id="title-03">Trois sub-modes du copilote inline — ghost text, sidebar, agent mode</title>
  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .panel-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .panel-title{font:600 19px/1.2 'Fraunces',serif;letter-spacing:-0.005em;fill:#1e1e2a}
      .panel-desc{font:400 13px/1.5 'Inter',sans-serif;fill:#1e1e2a}
      .body-soft{font:400 13px/1.5 'Inter',sans-serif;fill:#6b6f7c}
      .ux-label{font:500 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.12em;fill:#6b6f7c}
      .ux-value{font:600 13px/1.2 'Inter',sans-serif;fill:#1e1e2a}
      .mockup-bg{fill:#fdfaf0;stroke:rgba(30,30,44,0.20);stroke-width:1.2}
      .editor-bg{fill:#1e1e2a}
      .editor-line{font:400 11px/1.3 'JetBrains Mono',monospace;fill:#e6e2d4}
      .editor-line-soft{font:400 11px/1.3 'JetBrains Mono',monospace;fill:#9a9ca5}
      .editor-ghost{font:400 italic 11px/1.3 'JetBrains Mono',monospace;fill:#6b6f7c}
      .editor-accent{font:400 11px/1.3 'JetBrains Mono',monospace;fill:#b8582e}
      .sidebar-bg{fill:#f2e6c8;stroke:rgba(30,30,44,0.18);stroke-width:1}
      .sidebar-msg{font:400 11px/1.4 'Inter',sans-serif;fill:#1e1e2a}
      .sidebar-msg-user{font:500 11px/1.4 'Inter',sans-serif;fill:#a83e55}
      .agent-todo{font:400 11px/1.4 'Inter',sans-serif;fill:#1e1e2a}
      .agent-todo-done{font:400 11px/1.4 'Inter',sans-serif;fill:#9a9ca5;text-decoration:line-through}
      .check-done{fill:#1a5c6b}
      .check-pending{fill:none;stroke:#6b6f7c;stroke-width:1}
      .panel{fill:#fdfaf0;stroke:rgba(30,30,44,0.14);stroke-width:1.2}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .rule{stroke:rgba(30,30,44,0.20);stroke-width:1;fill:none}
    </style>
  </defs>

  <rect width="1120" height="720" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 03</text>
  <text x="80" y="62" class="title">Trois sub-modes inline du copilote</text>
  <text x="80" y="92" class="subtitle">Ils ne se canniba­lisent pas — ils s'empilent. Les bons produits 2026 basculent entre les trois sans rupture.</text>

  <line x1="80" y1="115" x2="1040" y2="115" class="rule"/>

  <!-- Sub-mode A : Ghost text -->
  <rect x="80" y="140" width="305" height="490" rx="3" class="panel"/>
  <text x="100" y="172" class="panel-eyebrow">SUB-MODE A · GHOST TEXT</text>
  <text x="100" y="200" class="panel-title">L'autocomplete</text>

  <!-- Mockup éditeur -->
  <rect x="100" y="220" width="265" height="130" rx="2" class="editor-bg"/>
  <text x="115" y="244" class="editor-line-soft">function getEmails(user) {</text>
  <text x="115" y="262" class="editor-line">  const inbox = await</text>
  <text x="115" y="280" class="editor-line">  fetch(`/api/${user.id}`);</text>
  <text x="115" y="298" class="editor-line-soft">  </text>
  <text x="125" y="298" class="editor-ghost">return inbox.json();</text>
  <text x="115" y="316" class="editor-line-soft">}</text>
  <text x="115" y="338" class="editor-accent">Tab ↹ accept · Esc reject</text>

  <text x="100" y="378" class="ux-label">DÉCLENCHEUR</text>
  <text x="100" y="396" class="ux-value">Frappe</text>

  <text x="100" y="428" class="ux-label">PROPRIÉTÉ UX</text>
  <text x="100" y="446" class="ux-value">Zéro friction</text>
  <text x="100" y="464" class="panel-desc">Pas de prompt, pas de panneau.</text>

  <text x="100" y="496" class="ux-label">LIMITE</text>
  <text x="100" y="514" class="panel-desc">Aucune négociation : 70 %</text>
  <text x="100" y="530" class="panel-desc">juste = accepter et corriger,</text>
  <text x="100" y="546" class="panel-desc">ou tout rejeter.</text>

  <text x="100" y="582" class="ux-label">RÉFÉRENCES</text>
  <text x="100" y="600" class="body-soft">GitHub Copilot · Cursor Tab v2</text>
  <text x="100" y="616" class="body-soft">Codeium · JetBrains AI</text>

  <!-- Sub-mode B : Sidebar chat -->
  <rect x="408" y="140" width="305" height="490" rx="3" class="panel"/>
  <text x="428" y="172" class="panel-eyebrow">SUB-MODE B · SIDEBAR CHAT</text>
  <text x="428" y="200" class="panel-title">La conversation contextuelle</text>

  <!-- Mockup sidebar -->
  <rect x="428" y="220" width="265" height="130" rx="2" class="sidebar-bg"/>
  <rect x="438" y="232" width="245" height="34" rx="2" fill="#fdfaf0" stroke="rgba(30,30,44,0.10)"/>
  <text x="446" y="250" class="sidebar-msg-user">Vous · sélection · 12 lignes</text>
  <text x="446" y="262" class="sidebar-msg">explique cette regex</text>
  <rect x="438" y="276" width="245" height="62" rx="2" fill="#fbf3e5" stroke="rgba(168,62,85,0.30)"/>
  <text x="446" y="294" class="sidebar-msg-user">Claude · contexte fichier</text>
  <text x="446" y="306" class="sidebar-msg">Cette regex matche un UUID</text>
  <text x="446" y="318" class="sidebar-msg">v4 — les blocs sont 8-4-4-4-</text>
  <text x="446" y="330" class="sidebar-msg">12 hex, version forcée à 4.</text>

  <text x="428" y="378" class="ux-label">DÉCLENCHEUR</text>
  <text x="428" y="396" class="ux-value">Raccourci · sélection</text>

  <text x="428" y="428" class="ux-label">PROPRIÉTÉ UX</text>
  <text x="428" y="446" class="ux-value">Négociation</text>
  <text x="428" y="464" class="panel-desc">Demander pourquoi, alternative,</text>
  <text x="428" y="480" class="panel-desc">contraindre la sortie.</text>

  <text x="428" y="510" class="ux-label">LIMITE</text>
  <text x="428" y="528" class="panel-desc">Articulation à fournir,</text>
  <text x="428" y="544" class="panel-desc">aller-retour réintroduit.</text>

  <text x="428" y="582" class="ux-label">RÉFÉRENCES</text>
  <text x="428" y="600" class="body-soft">Copilot Chat · Cursor Chat</text>
  <text x="428" y="616" class="body-soft">Notion AI · Zed AI · JetBrains</text>

  <!-- Sub-mode C : Agent mode -->
  <rect x="736" y="140" width="305" height="490" rx="3" class="panel"/>
  <text x="756" y="172" class="panel-eyebrow">SUB-MODE C · AGENT MODE</text>
  <text x="756" y="200" class="panel-title">L'IA prend la main</text>

  <!-- Mockup agent todo -->
  <rect x="756" y="220" width="265" height="130" rx="2" fill="#fdfaf0" stroke="rgba(30,30,44,0.10)"/>
  <text x="766" y="240" class="ux-label">PLAN EN COURS — 4/7</text>

  <rect x="769" y="252" width="9" height="9" rx="2" class="check-done"/>
  <path d="M770,256 L772,258 L777,253" stroke="#fdfaf0" stroke-width="1.2" fill="none"/>
  <text x="785" y="261" class="agent-todo-done">Read user model</text>

  <rect x="769" y="266" width="9" height="9" rx="2" class="check-done"/>
  <path d="M770,270 L772,272 L777,267" stroke="#fdfaf0" stroke-width="1.2" fill="none"/>
  <text x="785" y="275" class="agent-todo-done">Update auth flow</text>

  <rect x="769" y="280" width="9" height="9" rx="2" class="check-done"/>
  <path d="M770,284 L772,286 L777,281" stroke="#fdfaf0" stroke-width="1.2" fill="none"/>
  <text x="785" y="289" class="agent-todo-done">Run lint</text>

  <rect x="769" y="294" width="9" height="9" rx="2" class="check-done"/>
  <path d="M770,298 L772,300 L777,295" stroke="#fdfaf0" stroke-width="1.2" fill="none"/>
  <text x="785" y="303" class="agent-todo-done">Fix 2 type errors</text>

  <rect x="769" y="308" width="9" height="9" rx="2" class="check-pending"/>
  <text x="785" y="317" class="agent-todo">Run tests · en cours</text>

  <rect x="769" y="322" width="9" height="9" rx="2" class="check-pending"/>
  <text x="785" y="331" class="agent-todo">Update CHANGELOG</text>

  <rect x="769" y="336" width="9" height="9" rx="2" class="check-pending"/>
  <text x="785" y="345" class="agent-todo">Open PR</text>

  <text x="756" y="378" class="ux-label">DÉCLENCHEUR</text>
  <text x="756" y="396" class="ux-value">Prompt explicite</text>

  <text x="756" y="428" class="ux-label">PROPRIÉTÉ UX</text>
  <text x="756" y="446" class="ux-value">Productivité ×3 à ×5</text>
  <text x="756" y="464" class="panel-desc">Sur tâches multi-fichiers.</text>

  <text x="756" y="494" class="ux-label">LIMITE</text>
  <text x="756" y="512" class="panel-desc">Observabilité fragile :</text>
  <text x="756" y="528" class="panel-desc">l'utilisateur perd la trace</text>
  <text x="756" y="544" class="panel-desc">des micro-décisions.</text>

  <text x="756" y="582" class="ux-label">RÉFÉRENCES</text>
  <text x="756" y="600" class="body-soft">Cursor Composer · Windsurf</text>
  <text x="756" y="616" class="body-soft">Copilot Agent · Aider · Devin</text>

  <text x="80" y="660" class="caption">Lecture : les trois sub-modes répondent à trois niveaux d'investissement utilisateur — frappe / sélection / prompt.</text>
  <text x="80" y="678" class="caption">Cursor Tab v2 (RL-trained) prédit l'action suivante, pas le caractère suivant : matérialisation d'une intention, pas d'un complètement.</text>
  <text x="80" y="700" class="caption">Sources — VS Code Docs, GitHub Changelog 2026, InfoQ Cursor 3 (avril 2026), Windsurf Changelog, Notion Help.</text>
</svg>
