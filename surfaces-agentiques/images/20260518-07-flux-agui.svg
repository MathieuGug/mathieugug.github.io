<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 740" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-07">
  <title id="title-07">Flux d'événements AG-UI — séquence type d'un run</title>
  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .lane-label{font:600 13px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .lane-sub{font:400 italic 12px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .event-type{font:600 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#1e1e2a}
      .event-body{font:400 10px/1.3 'JetBrains Mono',monospace;fill:#6b6f7c}
      .event-delta{font:400 italic 10px/1.3 'Fraunces',serif;fill:#a83e55}
      .render-title{font:500 11px/1.2 'Inter',sans-serif;fill:#1e1e2a}
      .render-body{font:400 10px/1.3 'Inter',sans-serif;fill:#6b6f7c}
      .lifecycle{fill:#fdfaf0;stroke:#6b6f7c;stroke-width:1.2}
      .text-event{fill:#fdfaf0;stroke:#b8582e;stroke-width:1.2}
      .tool-event{fill:#fdfaf0;stroke:#1a5c6b;stroke-width:1.2}
      .state-event{fill:#fdfaf0;stroke:#a83e55;stroke-width:1.2}
      .render-panel{fill:#fbf3e5;stroke:rgba(30,30,44,0.18);stroke-width:1}
      .axis{stroke:rgba(30,30,44,0.25);stroke-width:1;fill:none}
      .ax-tick{stroke:rgba(30,30,44,0.15);stroke-width:1;fill:none;stroke-dasharray:3,3}
      .rule{stroke:rgba(30,30,44,0.20);stroke-width:1;fill:none}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .axis-label{font:600 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c}
    </style>
    <marker id="ar-time" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(30,30,44,0.4)"/>
    </marker>
  </defs>

  <rect width="1120" height="740" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 07</text>
  <text x="80" y="62" class="title">Une session AG-UI lue comme partition</text>
  <text x="80" y="92" class="subtitle">Lifecycle, text streamé, tool call, state delta. Bidirectionnel — l'UI peut renvoyer du state vers l'agent.</text>

  <line x1="80" y1="115" x2="1040" y2="115" class="rule"/>

  <!-- Axe de temps -->
  <line x1="80" y1="640" x2="1020" y2="640" class="axis" marker-end="url(#ar-time)"/>
  <text x="540" y="685" class="axis-label" text-anchor="middle">TEMPS D'EXÉCUTION DU RUN</text>

  <!-- Lane labels gauche -->
  <text x="80" y="155" class="lane-label">AGENT BACKEND</text>
  <text x="80" y="172" class="lane-sub">émet la séquence d'événements</text>

  <text x="80" y="440" class="lane-label">FRONTEND</text>
  <text x="80" y="457" class="lane-sub">rend chaque événement</text>

  <!-- Lane separator -->
  <line x1="80" y1="395" x2="1020" y2="395" class="ax-tick"/>

  <!-- Events séquence agent -->
  <!-- 1. RunStarted -->
  <rect x="115" y="200" width="100" height="60" rx="3" class="lifecycle"/>
  <text x="125" y="220" class="event-type">RunStarted</text>
  <text x="125" y="236" class="event-body">thread_id</text>
  <text x="125" y="250" class="event-body">run_id</text>

  <line x1="165" y1="260" x2="165" y2="640" class="ax-tick"/>

  <!-- 2. TextMessageStart + deltas + End -->
  <rect x="230" y="200" width="180" height="100" rx="3" class="text-event"/>
  <text x="240" y="220" class="event-type">TextMessage</text>
  <text x="240" y="236" class="event-body">Start · message_id="m1"</text>
  <text x="240" y="254" class="event-delta">Content delta: "Hello"</text>
  <text x="240" y="270" class="event-delta">Content delta: " world"</text>
  <text x="240" y="288" class="event-body">End · message_id="m1"</text>

  <line x1="320" y1="300" x2="320" y2="640" class="ax-tick"/>

  <!-- 3. ToolCallStart + ArgsDelta + End + Result -->
  <rect x="425" y="200" width="220" height="120" rx="3" class="tool-event"/>
  <text x="435" y="220" class="event-type">ToolCall</text>
  <text x="435" y="236" class="event-body">Start · tool="fetch_weather"</text>
  <text x="435" y="254" class="event-delta">Args delta: '{"city":"Par'</text>
  <text x="435" y="270" class="event-delta">Args delta: 'is"}'</text>
  <text x="435" y="288" class="event-body">End · tool_call_id="t1"</text>
  <text x="435" y="306" class="event-body">Result · "{...}"</text>

  <line x1="535" y1="320" x2="535" y2="640" class="ax-tick"/>

  <!-- 4. StateDelta (JSON Patch) -->
  <rect x="660" y="200" width="190" height="90" rx="3" class="state-event"/>
  <text x="670" y="220" class="event-type">StateDelta</text>
  <text x="670" y="236" class="event-body">[{"op":"replace",</text>
  <text x="670" y="252" class="event-body">  "path":"/temp_c",</text>
  <text x="670" y="268" class="event-body">  "value":17.2}]</text>
  <text x="670" y="284" class="event-delta">JSON Patch · RFC 6902</text>

  <line x1="755" y1="290" x2="755" y2="640" class="ax-tick"/>

  <!-- 5. RunFinished -->
  <rect x="865" y="200" width="120" height="60" rx="3" class="lifecycle"/>
  <text x="875" y="220" class="event-type">RunFinished</text>
  <text x="875" y="236" class="event-body">status: ok</text>
  <text x="875" y="250" class="event-body">duration: 2.4s</text>

  <line x1="925" y1="260" x2="925" y2="640" class="ax-tick"/>

  <!-- Connecteurs verticaux entre événements et rendus -->
  <!-- Lifecycle 1 -->
  <line x1="165" y1="260" x2="165" y2="490" class="rule"/>

  <!-- Frontend renders -->
  <!-- Render 1 : run banner -->
  <rect x="115" y="490" width="100" height="80" rx="3" class="render-panel"/>
  <text x="125" y="510" class="render-title">Run banner</text>
  <text x="125" y="528" class="render-body">"thinking..."</text>
  <text x="125" y="544" class="render-body">spinner on</text>

  <!-- Render 2 : streamed text -->
  <rect x="230" y="490" width="180" height="80" rx="3" class="render-panel"/>
  <text x="240" y="510" class="render-title">Streamed text</text>
  <text x="240" y="528" class="render-body">"Hello world" appears</text>
  <text x="240" y="544" class="render-body">character by character</text>
  <text x="240" y="560" class="render-body">in the chat bubble</text>

  <!-- Render 3 : tool call card -->
  <rect x="425" y="490" width="220" height="80" rx="3" class="render-panel"/>
  <text x="435" y="510" class="render-title">Tool call card</text>
  <text x="435" y="528" class="render-body">"Fetching weather for Paris..."</text>
  <text x="435" y="544" class="render-body">expand to see args + result</text>
  <text x="435" y="560" class="render-body">audit-friendly</text>

  <!-- Render 4 : UI state update -->
  <rect x="660" y="490" width="190" height="80" rx="3" class="render-panel"/>
  <text x="670" y="510" class="render-title">UI state update</text>
  <text x="670" y="528" class="render-body">temperature widget</text>
  <text x="670" y="544" class="render-body">refreshes to 17.2°C</text>
  <text x="670" y="560" class="render-body">no full re-render</text>

  <!-- Render 5 : completion -->
  <rect x="865" y="490" width="120" height="80" rx="3" class="render-panel"/>
  <text x="875" y="510" class="render-title">Completion</text>
  <text x="875" y="528" class="render-body">spinner off</text>
  <text x="875" y="544" class="render-body">input re-enabled</text>

  <!-- Caption colored legend -->
  <text x="80" y="710" class="caption">Légende — lifecycle (gris) · text message (orange) · tool call (sarcelle) · state delta (carmine). 17 events core + extensions draft.</text>
  <text x="80" y="728" class="caption">Sources — AG-UI Docs (docs.ag-ui.com/concepts/events), CopilotKit blog *Master the 17 AG-UI Event Types*, JSON Patch RFC 6902.</text>
</svg>
