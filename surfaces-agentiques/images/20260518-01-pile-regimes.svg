<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-01">
  <title id="title-01">Pile des quatre régimes d'accès à un agent</title>
  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .regime-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .regime-title{font:600 22px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .regime-desc{font:400 13px/1.5 'Inter',sans-serif;fill:#1e1e2a}
      .regime-prod{font:500 12px/1.3 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#6b6f7c}
      .axis-label{font:500 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c;text-transform:uppercase}
      .axis-tick{font:400 10px/1 'Inter',sans-serif;fill:#9a9ca5}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .frame-chat{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .frame-inline{fill:#fbf3e5;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .frame-canvas{fill:#f7eed8;stroke:rgba(30,30,44,0.22);stroke-width:1.2}
      .frame-onbehalf{fill:#f2e6c8;stroke:#a83e55;stroke-width:1.4}
      .axis{stroke:rgba(30,30,44,0.30);stroke-width:1;fill:none}
      .pip{fill:#b8582e}
      .pip-soft{fill:rgba(184,88,46,0.35)}
    </style>
    <marker id="ax-arrow-down" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L8,0 L4,6 z" fill="rgba(30,30,44,0.4)"/>
    </marker>
  </defs>

  <rect width="1120" height="760" fill="#faf6ec"/>

  <text x="120" y="34" class="marker">SCHÉMA 01</text>
  <text x="120" y="62" class="title">La pile d'accès à un agent</text>
  <text x="120" y="92" class="subtitle">Quatre régimes, du plus contraint au plus délégué. Ils ne se remplacent pas — ils s'empilent.</text>

  <!-- Axe gauche : autonomie de l'agent -->
  <line x1="80" y1="160" x2="80" y2="690" class="axis" marker-end="url(#ax-arrow-down)"/>
  <text x="74" y="160" class="axis-label" text-anchor="end" transform="rotate(-90 74 160)">AUTONOMIE DE L'AGENT</text>

  <!-- Régime 1 — Chat -->
  <rect x="120" y="155" width="840" height="115" rx="4" class="frame-chat"/>
  <text x="140" y="183" class="regime-eyebrow">RÉGIME 1 · CHAT</text>
  <text x="140" y="216" class="regime-title">Le chat conversationnel</text>
  <text x="140" y="244" class="regime-desc">Fenêtre vide, tour de parole, réponse markdown.</text>
  <text x="140" y="260" class="regime-desc">Universel pour la découverte ; rarement la bonne surface d'usage continu.</text>
  <text x="950" y="216" class="regime-prod" text-anchor="end">ChatGPT</text>
  <text x="950" y="234" class="regime-prod" text-anchor="end">Claude.ai</text>
  <text x="950" y="252" class="regime-prod" text-anchor="end">Gemini</text>

  <!-- Régime 2 — Inline -->
  <rect x="120" y="285" width="840" height="115" rx="4" class="frame-inline"/>
  <text x="140" y="313" class="regime-eyebrow">RÉGIME 2 · INLINE</text>
  <text x="140" y="346" class="regime-title">Le copilote dans l'outil</text>
  <text x="140" y="374" class="regime-desc">Trois sub-modes (ghost text, sidebar chat, agent mode)</text>
  <text x="140" y="390" class="regime-desc">embarqués dans l'éditeur ou le document.</text>
  <text x="950" y="346" class="regime-prod" text-anchor="end">Cursor · Windsurf</text>
  <text x="950" y="364" class="regime-prod" text-anchor="end">Copilot · Notion AI</text>
  <text x="950" y="382" class="regime-prod" text-anchor="end">M365 Copilot · Gemini</text>

  <!-- Régime 3 — Canvas -->
  <rect x="120" y="415" width="840" height="115" rx="4" class="frame-canvas"/>
  <text x="140" y="443" class="regime-eyebrow">RÉGIME 3 · CANVAS &amp; NARRATIF</text>
  <text x="140" y="476" class="regime-title">L'IA émet une surface pour la tâche</text>
  <text x="140" y="504" class="regime-desc">Composant React, slide, mini-app, brief éditorial scénarisé.</text>
  <text x="140" y="520" class="regime-desc">La conversation devient commande, l'artefact devient résultat.</text>
  <text x="950" y="476" class="regime-prod" text-anchor="end">Vercel v0 · Lovable</text>
  <text x="950" y="494" class="regime-prod" text-anchor="end">Artifacts · Canvas</text>
  <text x="950" y="512" class="regime-prod" text-anchor="end">Tableau Pulse · Sierra</text>

  <!-- Régime 4 — On-behalf-of -->
  <rect x="120" y="545" width="840" height="125" rx="4" class="frame-onbehalf"/>
  <text x="140" y="573" class="regime-eyebrow">RÉGIME 4 · ON-BEHALF-OF</text>
  <text x="140" y="606" class="regime-title">L'agent agit pour vous</text>
  <text x="140" y="634" class="regime-desc">VM cloud, navigateur, desktop, voice.</text>
  <text x="140" y="650" class="regime-desc">La surface devient fenêtre d'observation, plus terrain d'action direct.</text>
  <text x="950" y="606" class="regime-prod" text-anchor="end">Operator · Computer Use</text>
  <text x="950" y="624" class="regime-prod" text-anchor="end">Devin · Manus · Sierra</text>
  <text x="950" y="642" class="regime-prod" text-anchor="end">Vapi · Agentforce</text>

  <!-- Annotation latérale droite -->
  <text x="985" y="380" class="axis-label" transform="rotate(90 985 380)" text-anchor="middle">PRODUITS REPRÉSENTATIFS</text>

  <text x="120" y="715" class="caption">Lecture : à chaque régime, l'utilisateur abandonne une part du contrôle de bas niveau et gagne en délégation.</text>
  <text x="120" y="732" class="caption">Les bons produits 2026 (Cursor, M365 Copilot, Sierra) combinent plusieurs régimes plutôt que d'en imposer un seul.</text>
  <text x="120" y="755" class="caption">Sources — Anthropic Framework for Trustworthy Agents (2026), Knight Institute Levels of Autonomy (2025), NN/G AI Paradigm.</text>
</svg>
