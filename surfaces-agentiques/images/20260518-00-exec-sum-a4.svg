<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 1188" data-schema-id="schema-00" role="img" aria-labelledby="schema-00-title schema-00-desc">
  <title id="schema-00-title">Exec sum visuelle — Du chatbot au copilot on-behalf-of</title>
  <desc id="schema-00-desc">Infographie A4 portrait. Du chatbot au copilot on-behalf-of : la pile des quatre régimes empilés par autonomie croissante (chat, copilote inline, canvas génératif, agent on-behalf-of) ; le procès du chatbot — affordance, flow, articulation ; les trois piliers du frontend agentique MCP / A2A / AG-UI autour du hub agent ; la double bascule économique (coût/tâche 1,50 $ → 0,10 $, précision GUI 38 → 88 %) ; les cinq niveaux d'autonomie utilisateur (Knight Institute 2025).</desc>

  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
    <marker id="arr-surf" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6f7c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="840" height="1188" fill="#faf6ec"/>

  <!-- ============ HEADER ============ -->
  <text x="60" y="56" class="mono" font-size="12" font-weight="600" fill="#a83e55" letter-spacing="0.20em">SURFACES AGENTIQUES · 18 MAI 2026</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1e1e2a">Du chatbot au copilot on-behalf-of.</text>
  <text x="60" y="128" class="display" font-size="15" font-style="italic" fill="#6b6f7c">Quatre régimes empilés par autonomie croissante.</text>
  <line x1="60" y1="148" x2="780" y2="148" stroke="rgba(30,30,42,0.16)" stroke-width="1"/>

  <!-- ============ MSG 01 — LA PILE DES QUATRE RÉGIMES ============ -->
  <g>
    <circle cx="84" cy="184" r="20" fill="none" stroke="#a83e55" stroke-width="1.5"/>
    <text x="84" y="191" class="mono" font-size="15" font-weight="600" fill="#a83e55" text-anchor="middle">01</text>
    <text x="120" y="179" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">LA PILE</text>
    <text x="120" y="200" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Quatre régimes, pas un. Et ils s'empilent.</text>

    <!-- 4 régimes empilés du bas (transparent) vers le haut (saturé) -->
    <g transform="translate(60, 226)">
      <text x="0" y="0" class="mono" font-size="9" font-weight="600" fill="#a83e55" letter-spacing="0.12em">AUTONOMIE CROISSANTE →</text>
      <!-- Régime 4 — on-behalf-of (le plus saturé en haut) -->
      <g transform="translate(0, 14)">
        <rect x="0" y="0" width="500" height="26" fill="#a83e55" fill-opacity="0.30" stroke="#a83e55" stroke-opacity="0.85" stroke-width="0.85"/>
        <text x="12" y="17" class="display" font-size="12" font-weight="600" fill="#1e1e2a">04 · Agent on-behalf-of</text>
        <text x="510" y="17" class="body" font-size="9.5" fill="#6b6f7c" font-style="italic">Operator, Computer Use, Devin, Manus</text>
      </g>
      <g transform="translate(0, 44)">
        <rect x="0" y="0" width="500" height="26" fill="#a83e55" fill-opacity="0.22" stroke="#a83e55" stroke-opacity="0.65" stroke-width="0.75"/>
        <text x="12" y="17" class="display" font-size="12" font-weight="600" fill="#1e1e2a">03 · Canvas génératif</text>
        <text x="510" y="17" class="body" font-size="9.5" fill="#6b6f7c" font-style="italic">v0, Artifacts, Lovable, OpenAI Canvas</text>
      </g>
      <g transform="translate(0, 74)">
        <rect x="0" y="0" width="500" height="26" fill="#a83e55" fill-opacity="0.14" stroke="#a83e55" stroke-opacity="0.50" stroke-width="0.65"/>
        <text x="12" y="17" class="display" font-size="12" font-weight="600" fill="#1e1e2a">02 · Copilote inline</text>
        <text x="510" y="17" class="body" font-size="9.5" fill="#6b6f7c" font-style="italic">Cursor Tab, Copilot, Notion /AI</text>
      </g>
      <g transform="translate(0, 104)">
        <rect x="0" y="0" width="500" height="26" fill="#a83e55" fill-opacity="0.07" stroke="#a83e55" stroke-opacity="0.35" stroke-width="0.5"/>
        <text x="12" y="17" class="display" font-size="12" font-weight="600" fill="#1e1e2a">01 · Chat</text>
        <text x="510" y="17" class="body" font-size="9.5" fill="#6b6f7c" font-style="italic">ChatGPT, Claude, Gemini</text>
      </g>

      <!-- Side annotation — ce que l'utilisateur cède -->
      <g transform="translate(660, 14)">
        <text x="0" y="0" class="mono" font-size="8" font-weight="600" fill="#6b6f7c" letter-spacing="0.12em">CÈDE</text>
        <text x="0" y="17" class="body" font-size="9" fill="#1e1e2a">exécution</text>
        <text x="0" y="47" class="body" font-size="9" fill="#1e1e2a">composition</text>
        <text x="0" y="77" class="body" font-size="9" fill="#1e1e2a">la frappe</text>
        <text x="0" y="107" class="body" font-size="9" fill="#6b6f7c">rien</text>
      </g>
    </g>
  </g>

  <!-- ============ MSG 02 — LE PROCÈS DU CHATBOT ============ -->
  <g>
    <circle cx="84" cy="406" r="20" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="84" y="413" class="mono" font-size="15" font-weight="600" fill="#1F5560" text-anchor="middle">02</text>
    <text x="120" y="401" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.14em">LE PROCÈS DU CHATBOT</text>
    <text x="120" y="422" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Prise minimale, pas la bonne forme.</text>

    <!-- 3 griefs cards + verdict dashed -->
    <g transform="translate(60, 448)">
      <rect x="0" y="0" width="160" height="80" rx="2" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-opacity="0.55" stroke-width="0.7"/>
      <text x="12" y="18" class="mono" font-size="9" font-weight="600" fill="#1F5560" letter-spacing="0.14em">GRIEF 1 · AFFORDANCE</text>
      <text x="12" y="38" class="display" font-size="13" font-weight="600" fill="#1e1e2a">Fenêtre vide.</text>
      <text x="12" y="56" class="body" font-size="9.5" fill="#1e1e2a">Aucun indice de capacité.</text>
      <text x="12" y="70" class="body" font-size="9.5" fill="#6b6f7c" font-style="italic">— Wattenberger, Appleton</text>

      <rect x="175" y="0" width="160" height="80" rx="2" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-opacity="0.65" stroke-width="0.7"/>
      <text x="187" y="18" class="mono" font-size="9" font-weight="600" fill="#1F5560" letter-spacing="0.14em">GRIEF 2 · FLOW</text>
      <text x="187" y="38" class="display" font-size="13" font-weight="600" fill="#1e1e2a">Pas d'interruption.</text>
      <text x="187" y="56" class="body" font-size="9.5" fill="#1e1e2a">Le contexte se perd.</text>
      <text x="187" y="70" class="body" font-size="9.5" fill="#6b6f7c" font-style="italic">— Saarinen (Linear)</text>

      <rect x="350" y="0" width="160" height="80" rx="2" fill="#1F5560" fill-opacity="0.24" stroke="#1F5560" stroke-opacity="0.75" stroke-width="0.7"/>
      <text x="362" y="18" class="mono" font-size="9" font-weight="600" fill="#1F5560" letter-spacing="0.14em">GRIEF 3 · ARTICULATION</text>
      <text x="362" y="38" class="display" font-size="13" font-weight="600" fill="#1e1e2a">Tout dire en mots.</text>
      <text x="362" y="56" class="body" font-size="9.5" fill="#1e1e2a">Coût cognitif élevé.</text>
      <text x="362" y="70" class="body" font-size="9.5" fill="#6b6f7c" font-style="italic">— NN/G 2025, Pike</text>

      <!-- Verdict dashed -->
      <rect x="535" y="0" width="185" height="80" rx="2" fill="#a83e55" fill-opacity="0.05" stroke="#a83e55" stroke-opacity="0.65" stroke-width="0.85" stroke-dasharray="4,3"/>
      <text x="627" y="18" class="mono" font-size="9" font-weight="600" fill="#a83e55" letter-spacing="0.14em" text-anchor="middle">VERDICT</text>
      <text x="627" y="40" class="display" font-size="13" font-weight="600" fill="#1e1e2a" text-anchor="middle">Le chat reste</text>
      <text x="627" y="56" class="body" font-size="10.5" fill="#1e1e2a" text-anchor="middle">pour la découverte,</text>
      <text x="627" y="70" class="body" font-size="10.5" fill="#1e1e2a" text-anchor="middle">l'imprécis, le fallback.</text>
    </g>
  </g>

  <!-- ============ MSG 03 — LES TROIS PILIERS ============ -->
  <g>
    <circle cx="84" cy="612" r="20" fill="none" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="84" y="619" class="mono" font-size="15" font-weight="600" fill="#2F5D3F" text-anchor="middle">03</text>
    <text x="120" y="607" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em">LES TROIS PILIERS</text>
    <text x="120" y="628" class="display" font-size="19" font-weight="600" fill="#1e1e2a">MCP, A2A, AG-UI — la stack agentique se cale.</text>

    <!-- Hub central + 3 piliers -->
    <g transform="translate(0, 660)">
      <!-- Hub agent au centre -->
      <circle cx="420" cy="68" r="38" fill="#2F5D3F" fill-opacity="0.18" stroke="#2F5D3F" stroke-opacity="0.85" stroke-width="1"/>
      <text x="420" y="65" class="mono" font-size="9" font-weight="600" fill="#2F5D3F" text-anchor="middle" letter-spacing="0.14em">AGENT</text>
      <text x="420" y="80" class="body" font-size="9" fill="#1e1e2a" text-anchor="middle" font-style="italic">runtime</text>

      <!-- Pilier gauche : MCP (outils) -->
      <rect x="80" y="40" width="170" height="62" rx="2" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-opacity="0.55" stroke-width="0.7"/>
      <text x="165" y="60" class="mono" font-size="10" font-weight="600" fill="#2F5D3F" text-anchor="middle" letter-spacing="0.14em">MCP</text>
      <text x="165" y="78" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">agent ↔ tools</text>
      <text x="165" y="92" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle" font-style="italic">Linux Foundation</text>

      <!-- Pilier bas : A2A (agents) -->
      <rect x="335" y="148" width="170" height="62" rx="2" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-opacity="0.55" stroke-width="0.7"/>
      <text x="420" y="168" class="mono" font-size="10" font-weight="600" fill="#2F5D3F" text-anchor="middle" letter-spacing="0.14em">A2A</text>
      <text x="420" y="186" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">agent ↔ agent</text>
      <text x="420" y="200" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle" font-style="italic">Google ADK</text>

      <!-- Pilier droite : AG-UI (utilisateur) — accent carmin -->
      <rect x="590" y="40" width="170" height="62" rx="2" fill="#a83e55" fill-opacity="0.14" stroke="#a83e55" stroke-opacity="0.75" stroke-width="0.85"/>
      <text x="675" y="60" class="mono" font-size="10" font-weight="600" fill="#a83e55" text-anchor="middle" letter-spacing="0.14em">AG-UI</text>
      <text x="675" y="78" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">agent ↔ utilisateur</text>
      <text x="675" y="92" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle" font-style="italic">CopilotKit · 2025</text>

      <!-- Arrows depuis le périmètre du cercle agent vers les 3 piliers -->
      <line x1="382.5" y1="63" x2="254" y2="68" stroke="#6b6f7c" stroke-width="0.85" marker-end="url(#arr-surf)"/>
      <line x1="420" y1="106" x2="420" y2="144" stroke="#6b6f7c" stroke-width="0.85" marker-end="url(#arr-surf)"/>
      <line x1="457.5" y1="63" x2="586" y2="68" stroke="#a83e55" stroke-width="0.95" marker-end="url(#arr-surf)"/>
    </g>
  </g>

  <!-- ============ MSG 04 — LA DOUBLE BASCULE ============ -->
  <g>
    <circle cx="84" cy="892" r="20" fill="none" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="84" y="899" class="mono" font-size="15" font-weight="600" fill="#B58A2C" text-anchor="middle">04</text>
    <text x="120" y="887" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.14em">LA DOUBLE BASCULE</text>
    <text x="120" y="908" class="display" font-size="19" font-weight="600" fill="#1e1e2a">L'agent on-behalf-of devient économiquement viable.</text>

    <!-- 2 bar charts côte à côte -->
    <!-- Chart 1 : coût/tâche 2024 vs 2026 -->
    <g transform="translate(60, 934)">
      <text x="0" y="0" class="mono" font-size="9" font-weight="600" fill="#B58A2C" letter-spacing="0.12em">COÛT PAR TÂCHE ($)</text>
      <g transform="translate(0, 18)">
        <text x="-4" y="6" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">1,50</text>
        <text x="-4" y="40" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">0,75</text>
        <text x="-4" y="74" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">0</text>
        <line x1="0" y1="6" x2="280" y2="6" stroke="rgba(30,30,42,0.10)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="0" y1="40" x2="280" y2="40" stroke="rgba(30,30,42,0.10)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="0" y1="74" x2="280" y2="74" stroke="#1e1e2a" stroke-width="0.5"/>
        <line x1="0" y1="6" x2="0" y2="74" stroke="#1e1e2a" stroke-width="0.5"/>

        <rect x="40"  y="6" width="60" height="68" fill="#B58A2C" fill-opacity="0.25" stroke="#B58A2C" stroke-width="0.75"/>
        <text x="70"  y="0" class="mono" font-size="10" font-weight="600" fill="#B58A2C" text-anchor="middle">1,50 $</text>
        <text x="70"  y="92" class="body" font-size="9.5" fill="#6b6f7c" text-anchor="middle">2024</text>

        <rect x="180" y="69" width="60" height="5" fill="#a83e55" fill-opacity="0.55" stroke="#a83e55" stroke-width="0.85"/>
        <text x="210" y="64" class="mono" font-size="10" font-weight="600" fill="#a83e55" text-anchor="middle">0,10 $</text>
        <text x="210" y="92" class="body" font-size="9.5" fill="#6b6f7c" text-anchor="middle">2026</text>
      </g>
    </g>

    <!-- Chart 2 : précision GUI -->
    <g transform="translate(440, 934)">
      <text x="0" y="0" class="mono" font-size="9" font-weight="600" fill="#B58A2C" letter-spacing="0.12em">PRÉCISION GUI (%)</text>
      <g transform="translate(0, 18)">
        <text x="-4" y="6" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">100</text>
        <text x="-4" y="32" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">75</text>
        <text x="-4" y="60" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">50</text>
        <text x="-4" y="74" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">38</text>
        <line x1="0" y1="6" x2="280" y2="6" stroke="rgba(30,30,42,0.10)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="0" y1="32" x2="280" y2="32" stroke="rgba(30,30,42,0.10)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="0" y1="74" x2="280" y2="74" stroke="#1e1e2a" stroke-width="0.5"/>
        <line x1="0" y1="6" x2="0" y2="74" stroke="#1e1e2a" stroke-width="0.5"/>

        <!-- Seuil viabilité 90 % -->
        <line x1="0" y1="16" x2="280" y2="16" stroke="#a83e55" stroke-width="1" stroke-dasharray="4,3"/>
        <text x="284" y="19" class="mono" font-size="8.5" font-weight="600" fill="#a83e55">90 % — seuil viable</text>

        <rect x="40"  y="74" width="60" height="0" stroke="none"/>
        <rect x="40"  y="38" width="60" height="36" fill="#B58A2C" fill-opacity="0.25" stroke="#B58A2C" stroke-width="0.75"/>
        <text x="70"  y="33" class="mono" font-size="10" font-weight="600" fill="#B58A2C" text-anchor="middle">38 %</text>
        <text x="70"  y="92" class="body" font-size="9.5" fill="#6b6f7c" text-anchor="middle">Operator</text>

        <rect x="180" y="18" width="60" height="56" fill="#a83e55" fill-opacity="0.45" stroke="#a83e55" stroke-width="0.85"/>
        <text x="210" y="13" class="mono" font-size="10" font-weight="600" fill="#a83e55" text-anchor="middle">88 %</text>
        <text x="210" y="92" class="body" font-size="9.5" fill="#6b6f7c" text-anchor="middle">Convergence</text>
      </g>
    </g>
  </g>

  <!-- ============ MSG 05 — CINQ NIVEAUX D'AUTONOMIE ============ -->
  <g>
    <circle cx="84" cy="1064" r="20" fill="none" stroke="#a83e55" stroke-width="1.5"/>
    <text x="84" y="1071" class="mono" font-size="15" font-weight="600" fill="#a83e55" text-anchor="middle">05</text>
    <text x="120" y="1059" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">CINQ NIVEAUX</text>
    <text x="120" y="1080" class="display" font-size="16" font-weight="600" fill="#1e1e2a">Operator · Collaborator · Consultant · Approver · Observer <tspan class="body" font-size="11" fill="#6b6f7c" font-style="italic">— Knight Institute, 2025.</tspan></text>
  </g>

  <!-- ============ FOOTER ============ -->
  <line x1="60" y1="1112" x2="780" y2="1112" stroke="rgba(30,30,42,0.16)" stroke-width="0.5"/>
  <text x="60" y="1138" class="mono" font-size="9" fill="#9a9ca5" letter-spacing="0.18em">MATHIEU GUGLIELMINO · MATHIEUGUG.GITHUB.IO/SURFACES-AGENTIQUES</text>
  <text x="780" y="1138" class="mono" font-size="9" fill="#9a9ca5" letter-spacing="0.14em" text-anchor="end">A4 · SYNTHÈSE EXÉCUTIVE</text>
</svg>
