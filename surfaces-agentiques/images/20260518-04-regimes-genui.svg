<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-04">
  <title id="title-04">Quatre régimes de generative UI — controlled, declarative, open-ended, dynamic data-driven</title>
  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .axis-label{font:600 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c}
      .quad-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .quad-title{font:600 19px/1.2 'Fraunces',serif;letter-spacing:-0.005em;fill:#1e1e2a}
      .quad-desc{font:400 12px/1.5 'Inter',sans-serif;fill:#1e1e2a}
      .quad-flow{font:500 11px/1.3 'JetBrains Mono',monospace;letter-spacing:0.04em;fill:#6b6f7c}
      .quad-prod{font:500 11px/1.4 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#a83e55}
      .body-soft{font:400 12px/1.5 'Inter',sans-serif;fill:#6b6f7c}
      .frame-low{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .frame-mid{fill:#fbf3e5;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .frame-mid2{fill:#f7eed8;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .frame-hi{fill:#f2e6c8;stroke:#a83e55;stroke-width:1.4}
      .rule{stroke:rgba(30,30,44,0.20);stroke-width:1;fill:none}
      .axis{stroke:rgba(30,30,44,0.30);stroke-width:1;fill:none}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
    </style>
    <marker id="ax-arrow-r" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(30,30,44,0.4)"/>
    </marker>
    <marker id="ax-arrow-u" markerWidth="6" markerHeight="8" refX="3" refY="2" orient="auto">
      <path d="M0,8 L6,8 L3,2 z" fill="rgba(30,30,44,0.4)"/>
    </marker>
  </defs>

  <rect width="1120" height="760" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 04</text>
  <text x="80" y="62" class="title">Quatre régimes de generative UI</text>
  <text x="80" y="92" class="subtitle">Du plus contraint au plus libre. Choisir le régime avant de coder l'agent est une décision d'architecture.</text>

  <!-- Axes -->
  <line x1="160" y1="650" x2="1020" y2="650" class="axis" marker-end="url(#ax-arrow-r)"/>
  <line x1="160" y1="650" x2="160" y2="155" class="axis" marker-end="url(#ax-arrow-u)"/>

  <text x="540" y="688" class="axis-label" text-anchor="middle">FLEXIBILITÉ DE LA SORTIE</text>
  <text x="540" y="708" class="body-soft" text-anchor="middle">faible → maximale</text>

  <text x="135" y="400" class="axis-label" transform="rotate(-90 135 400)" text-anchor="middle">SÉCURITÉ / PRÉDICTIBILITÉ</text>
  <text x="115" y="400" class="body-soft" transform="rotate(-90 115 400)" text-anchor="middle">élevée → faible</text>

  <!-- Quadrant 1 : Controlled (haut-gauche) -->
  <rect x="180" y="155" width="395" height="240" rx="3" class="frame-low"/>
  <text x="200" y="185" class="quad-eyebrow">RÉGIME 1 · CONTROLLED</text>
  <text x="200" y="213" class="quad-title">Tool-call → composant React</text>
  <text x="200" y="248" class="quad-desc">L'agent appelle un composant pré-existant</text>
  <text x="200" y="264" class="quad-desc">comme une tool. Les arguments deviennent les</text>
  <text x="200" y="280" class="quad-desc">props. Couplage fort, prévisible.</text>
  <text x="200" y="318" class="quad-flow">agent → tool_call → &lt;Card props={...} /&gt;</text>
  <text x="200" y="358" class="quad-prod">CopilotKit classique</text>
  <text x="200" y="376" class="quad-prod">Vercel AI SDK streamUI legacy</text>

  <!-- Quadrant 2 : Declarative (haut-droit) -->
  <rect x="605" y="155" width="395" height="240" rx="3" class="frame-mid"/>
  <text x="625" y="185" class="quad-eyebrow">RÉGIME 2 · DECLARATIVE</text>
  <text x="625" y="213" class="quad-title">JSON schema → catalogue UI</text>
  <text x="625" y="248" class="quad-desc">L'agent émet un schéma JSON décrivant l'UI</text>
  <text x="625" y="264" class="quad-desc">à rendre parmi un catalogue connu côté frontend.</text>
  <text x="625" y="280" class="quad-desc">One tool, many UIs. Cross-platform.</text>
  <text x="625" y="318" class="quad-flow">agent → { type: "Card", props: {...} } → render</text>
  <text x="625" y="358" class="quad-prod">A2UI (Google)</text>
  <text x="625" y="376" class="quad-prod">json-render Vercel · AG-UI</text>

  <!-- Quadrant 3 : Open-ended (bas-droit) -->
  <rect x="605" y="410" width="395" height="240" rx="3" class="frame-hi"/>
  <text x="625" y="440" class="quad-eyebrow">RÉGIME 3 · OPEN-ENDED</text>
  <text x="625" y="468" class="quad-title">HTML brut → sandbox iframe</text>
  <text x="625" y="503" class="quad-desc">L'agent émet directement du HTML/JS exécuté</text>
  <text x="625" y="519" class="quad-desc">en sandbox (iframe, shadow DOM). Liberté max,</text>
  <text x="625" y="535" class="quad-desc">risque max — XSS, dark patterns hallucinés.</text>
  <text x="625" y="573" class="quad-flow">agent → &lt;!DOCTYPE html&gt;... → iframe sandbox</text>
  <text x="625" y="613" class="quad-prod">Claude Artifacts · ChatGPT Canvas</text>
  <text x="625" y="631" class="quad-prod">Vercel v0 · MCP Apps · Apps SDK</text>

  <!-- Quadrant 4 : Dynamic data-driven (bas-gauche) -->
  <rect x="180" y="410" width="395" height="240" rx="3" class="frame-mid2"/>
  <text x="200" y="440" class="quad-eyebrow">RÉGIME 4 · DYNAMIC DATA-DRIVEN</text>
  <text x="200" y="468" class="quad-title">NL → SQL → visualisation</text>
  <text x="200" y="503" class="quad-desc">L'UI est pré-codée ; ses paramètres et contenus</text>
  <text x="200" y="519" class="quad-desc">varient selon une requête sur semantic layer.</text>
  <text x="200" y="535" class="quad-desc">Contrainte par le data model, sûr.</text>
  <text x="200" y="573" class="quad-flow">agent → SQL → semantic layer → chart preset</text>
  <text x="200" y="613" class="quad-prod">Tableau Pulse · ThoughtSpot Spotter</text>
  <text x="200" y="631" class="quad-prod">Sigma AI · Sisense GenBI · Hex Magic</text>

  <text x="80" y="710" class="caption">Lecture — les régimes 1 et 4 (contraints) sont stables et auditables ; le régime 3 (open-ended) est expressif mais risqué.</text>
  <text x="80" y="728" class="caption">Le régime 2 (declarative) émerge en 2026 comme compromis : flexible côté agent, sécurisé côté rendu.</text>
  <text x="80" y="748" class="caption">Sources — CopilotKit *Three Kinds of Generative UI*, A2UI spec, Vercel AI SDK 3.0, MCP Apps Jan 2026, NN/G Generative UI.</text>
</svg>
