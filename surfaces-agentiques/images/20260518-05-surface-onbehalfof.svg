<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-05">
  <title id="title-05">La surface de l'agent on-behalf-of — quatre questions UX</title>
  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .core-title{font:600 17px/1.2 'Fraunces',serif;letter-spacing:-0.005em;fill:#fdfaf0}
      .core-sub{font:400 italic 12px/1.4 'Fraunces',serif;fill:#e6e2d4}
      .core-line{font:400 11px/1.3 'JetBrains Mono',monospace;fill:#e6e2d4}
      .core-line-soft{font:400 11px/1.3 'JetBrains Mono',monospace;fill:#9a9ca5}
      .core-dot{fill:#b8582e}
      .q-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .q-title{font:600 19px/1.2 'Fraunces',serif;letter-spacing:-0.005em;fill:#1e1e2a}
      .q-desc{font:400 13px/1.5 'Inter',sans-serif;fill:#1e1e2a}
      .q-prod{font:500 11px/1.4 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#6b6f7c}
      .panel{fill:#fdfaf0;stroke:rgba(30,30,44,0.16);stroke-width:1.2}
      .panel-screen{fill:#1e1e2a;stroke:rgba(168,62,85,0.4);stroke-width:1.4}
      .connector{stroke:#6b6f7c;stroke-width:1.2;fill:none;stroke-dasharray:5,3}
      .rule{stroke:rgba(30,30,44,0.20);stroke-width:1;fill:none}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
    </style>
  </defs>

  <rect width="1120" height="760" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 05</text>
  <text x="80" y="62" class="title">Surface de l'agent on-behalf-of</text>
  <text x="80" y="92" class="subtitle">Quatre questions UX et leurs patterns dominants. Un produit qui manque ces primitives part avec un déficit de confiance.</text>

  <line x1="80" y1="115" x2="1040" y2="115" class="rule"/>

  <!-- Central : Agent's computer -->
  <rect x="380" y="290" width="360" height="200" rx="4" class="panel-screen"/>
  <text x="560" y="320" class="core-title" text-anchor="middle">L'ORDINATEUR DE L'AGENT</text>
  <text x="560" y="342" class="core-sub" text-anchor="middle">Manus, Operator, Devin, Computer Use</text>
  <line x1="420" y1="358" x2="700" y2="358" stroke="#6b6f7c" stroke-width="0.6"/>

  <circle cx="404" cy="378" r="3" class="core-dot"/>
  <text x="416" y="382" class="core-line">browser/dashboard.html</text>
  <text x="416" y="398" class="core-line-soft">  → fetch metrics</text>
  <circle cx="404" cy="408" r="3" class="core-dot"/>
  <text x="416" y="412" class="core-line">terminal $ npm test</text>
  <text x="416" y="428" class="core-line-soft">  → 14 passing · 0 failing</text>
  <circle cx="404" cy="438" r="3" class="core-dot"/>
  <text x="416" y="442" class="core-line">editor: src/auth.ts modified</text>
  <text x="416" y="458" class="core-line-soft">  → diff +12 -4</text>
  <text x="404" y="478" class="core-line-soft">↻ working · take over | stop</text>

  <!-- Q1 : Qu'est-ce qu'il fait -->
  <rect x="80" y="155" width="360" height="120" rx="3" class="panel"/>
  <text x="100" y="183" class="q-eyebrow">Q1 · QU'EST-CE QU'IL FAIT MAINTENANT ?</text>
  <text x="100" y="210" class="q-title">Activity panel · screen mirroring</text>
  <text x="100" y="234" class="q-desc">Panneau qui mirroir l'écran de l'agent —</text>
  <text x="100" y="250" class="q-desc">onglets, clics, fichiers en temps réel.</text>
  <text x="100" y="266" class="q-prod">Manus's Computer · Devin workspace · Operator iframe</text>
  <line x1="380" y1="275" x2="430" y2="295" class="connector"/>

  <!-- Q2 : Comment j'interromps -->
  <rect x="680" y="155" width="360" height="120" rx="3" class="panel"/>
  <text x="700" y="183" class="q-eyebrow">Q2 · COMMENT J'INTERROMPS ?</text>
  <text x="700" y="210" class="q-title">Plan visible · take-over instantané</text>
  <text x="700" y="234" class="q-desc">Todo-list rendue inline, éditable.</text>
  <text x="700" y="250" class="q-desc">L'utilisateur saisit le contrôle à tout moment.</text>
  <text x="700" y="266" class="q-prod">Claude Code Plan Mode · Devin take-over</text>
  <line x1="740" y1="275" x2="690" y2="295" class="connector"/>

  <!-- Q3 : Comment je valide le destructif -->
  <rect x="80" y="500" width="360" height="125" rx="3" class="panel"/>
  <text x="100" y="528" class="q-eyebrow">Q3 · COMMENT JE VALIDE LE DESTRUCTIF ?</text>
  <text x="100" y="555" class="q-title">Escalade contextuelle</text>
  <text x="100" y="579" class="q-desc">La confirmation apparaît juste avant l'action</text>
  <text x="100" y="595" class="q-desc">irréversible — pas en début de session.</text>
  <text x="100" y="611" class="q-prod">Operator confirmations · Agentforce voice ack</text>
  <line x1="380" y1="500" x2="430" y2="485" class="connector"/>

  <!-- Q4 : Pourquoi a-t-il fait ça -->
  <rect x="680" y="500" width="360" height="125" rx="3" class="panel"/>
  <text x="700" y="528" class="q-eyebrow">Q4 · POURQUOI A-T-IL FAIT ÇA ?</text>
  <text x="700" y="555" class="q-title">Extended thinking visible</text>
  <text x="700" y="579" class="q-desc">Bloc dépliable du raisonnement. Trois flux</text>
  <text x="700" y="595" class="q-desc">séparés : plan / state / reasoning.</text>
  <text x="700" y="611" class="q-prod">Claude thinking · o1/o3 reasoning · WaitGPT (UIST'24)</text>
  <line x1="740" y1="500" x2="690" y2="485" class="connector"/>

  <!-- Bottom strip : warm handoff -->
  <rect x="80" y="645" width="960" height="70" rx="3" fill="#f7eed8" stroke="rgba(30,30,44,0.18)"/>
  <text x="100" y="673" class="q-eyebrow">QUESTION TRANSVERSE · WARM HANDOFF</text>
  <text x="100" y="697" class="q-desc">Quand l'agent identifie un scenario sensible — sentiment négatif, permissions humaines requises — il passe la main à un humain.</text>
  <text x="780" y="697" class="q-prod" text-anchor="end">Salesforce Agentic Patterns</text>

  <text x="80" y="740" class="caption">Sources — Manus AI blog, Cognition Devin docs, OpenAI Operator help, Anthropic Framework for Trustworthy Agents, Salesforce Architects Agentic Patterns, WaitGPT (UIST 2024).</text>
</svg>
