<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-09">
  <title id="title-09">Architecture canonique d'une surface agentique — cinq couches</title>
  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .layer-num{font:600 14px/1 'JetBrains Mono',monospace;letter-spacing:0.04em;fill:#a83e55}
      .layer-title{font:600 19px/1.1 'Fraunces',serif;letter-spacing:-0.005em;fill:#1e1e2a}
      .layer-sub{font:400 italic 13px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .layer-desc{font:400 12px/1.5 'Inter',sans-serif;fill:#1e1e2a}
      .layer-prod{font:500 11px/1.4 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#6b6f7c}
      .role{font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#9a9ca5}
      .frame-l1{fill:#1e1e2a;stroke:#b8582e;stroke-width:1.4}
      .frame-l2{fill:#f7eed8;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .frame-l3{fill:#fbf3e5;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .frame-l4{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .frame-l5{fill:#f2e6c8;stroke:#a83e55;stroke-width:1.4}
      .layer-title-dark{font:600 19px/1.1 'Fraunces',serif;letter-spacing:-0.005em;fill:#fdfaf0}
      .layer-sub-dark{font:400 italic 13px/1.3 'Fraunces',serif;fill:#e6e2d4}
      .layer-desc-dark{font:400 12px/1.5 'Inter',sans-serif;fill:#e6e2d4}
      .layer-prod-dark{font:500 11px/1.4 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#9a9ca5}
      .layer-num-dark{font:600 14px/1 'JetBrains Mono',monospace;letter-spacing:0.04em;fill:#b8582e}
      .rule{stroke:rgba(30,30,44,0.20);stroke-width:1;fill:none}
      .connector{stroke:#6b6f7c;stroke-width:1.2;fill:none;stroke-dasharray:5,3}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .lateral-label{font:600 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c}
    </style>
  </defs>

  <rect width="1120" height="760" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 09</text>
  <text x="80" y="62" class="title">Architecture canonique en cinq couches</text>
  <text x="80" y="92" class="subtitle">L'empilement de référence pour livrer une surface agentique de production, indépendamment du régime.</text>

  <line x1="80" y1="115" x2="1040" y2="115" class="rule"/>

  <!-- Lateral labels -->
  <text x="60" y="155" class="lateral-label" transform="rotate(-90 60 155)" text-anchor="end">BACKEND</text>
  <text x="60" y="535" class="lateral-label" transform="rotate(-90 60 535)" text-anchor="end">FRONTEND</text>

  <!-- Layer 1 : Agent backend -->
  <rect x="100" y="150" width="940" height="105" rx="3" class="frame-l1"/>
  <text x="120" y="180" class="layer-num-dark">COUCHE 1</text>
  <text x="120" y="208" class="layer-title-dark">Agent backend</text>
  <text x="120" y="226" class="layer-sub-dark">le moteur — harness, model, loop, filesystem, skills, hooks</text>
  <text x="120" y="252" class="layer-prod-dark">Claude Agent SDK · LangGraph · Mastra · Pydantic AI · CrewAI · OpenAI Agent SDK</text>

  <!-- Connector -->
  <line x1="560" y1="255" x2="560" y2="270" class="connector"/>

  <!-- Layer 2 : Pipe AG-UI -->
  <rect x="100" y="270" width="940" height="90" rx="3" class="frame-l2"/>
  <text x="120" y="300" class="layer-num">COUCHE 2</text>
  <text x="120" y="328" class="layer-title">Pipe AG-UI</text>
  <text x="120" y="346" class="layer-sub">transport bi-directionnel d'événements — SSE / WebSocket / binary</text>
  <text x="700" y="328" class="layer-desc" text-anchor="end">17 events core</text>
  <text x="700" y="346" class="layer-desc" text-anchor="end">JSON Patch state delta</text>
  <text x="940" y="328" class="layer-desc" text-anchor="end">thread_id / run_id</text>
  <text x="940" y="346" class="layer-desc" text-anchor="end">bi-dir</text>

  <line x1="560" y1="360" x2="560" y2="375" class="connector"/>

  <!-- Layer 3 : Frontend runtime -->
  <rect x="100" y="375" width="940" height="90" rx="3" class="frame-l3"/>
  <text x="120" y="405" class="layer-num">COUCHE 3</text>
  <text x="120" y="433" class="layer-title">Frontend runtime</text>
  <text x="120" y="451" class="layer-sub">ce qui rend les événements — hooks, store, render loop</text>
  <text x="940" y="433" class="layer-prod" text-anchor="end">CopilotKit React/Angular</text>
  <text x="940" y="451" class="layer-prod" text-anchor="end">Vercel AI SDK UI · custom</text>

  <line x1="560" y1="465" x2="560" y2="480" class="connector"/>

  <!-- Layer 4 : Generative UI surface -->
  <rect x="100" y="480" width="940" height="110" rx="3" class="frame-l4"/>
  <text x="120" y="510" class="layer-num">COUCHE 4</text>
  <text x="120" y="538" class="layer-title">Generative UI surface</text>
  <text x="120" y="556" class="layer-sub">ce que l'agent peut montrer — composants typés, sandbox, scenarios</text>
  <text x="120" y="582" class="layer-prod">shadcn registry · A2UI catalog · json-render Zod · iframe sandbox · scenarios narratifs</text>

  <line x1="560" y1="590" x2="560" y2="605" class="connector"/>

  <!-- Layer 5 : Guardrails -->
  <rect x="100" y="605" width="940" height="95" rx="3" class="frame-l5"/>
  <text x="120" y="635" class="layer-num">COUCHE 5</text>
  <text x="120" y="663" class="layer-title">Guardrails &amp; observability</text>
  <text x="120" y="681" class="layer-sub">contrôle d'accès, logging, audit, confirmation contextuelle</text>
  <text x="940" y="663" class="layer-prod" text-anchor="end">hooks PreToolUse / PostToolUse</text>
  <text x="940" y="681" class="layer-prod" text-anchor="end">permission deny-first · audit log</text>

  <text x="80" y="730" class="caption">Lecture — chaque couche est remplaçable indépendamment. La séparation couche 2 / couche 3 est ce qui permet la portabilité entre frameworks.</text>
  <text x="80" y="748" class="caption">Sources — CopilotKit (couches 2-3), Anthropic Trust Framework (couche 5), Vercel + shadcn (couche 4), Agent SDK Anthropic (couche 1).</text>
</svg>
