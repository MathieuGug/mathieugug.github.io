<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-02">
  <title id="title-02">Le procès du chatbot — trois griefs et trois usages qui restent</title>
  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-title{font:600 19px/1.2 'Fraunces',serif;letter-spacing:-0.005em;fill:#1e1e2a}
      .body{font:400 13px/1.5 'Inter',sans-serif;fill:#1e1e2a}
      .body-soft{font:400 13px/1.5 'Inter',sans-serif;fill:#6b6f7c}
      .quote{font:400 italic 13px/1.45 'Fraunces',serif;fill:#1e1e2a}
      .attrib{font:500 10px/1.2 'JetBrains Mono',monospace;letter-spacing:0.14em;fill:#9a9ca5}
      .panel{fill:#fdfaf0;stroke:rgba(30,30,44,0.14);stroke-width:1.2}
      .panel-bottom{fill:#f7eed8;stroke:rgba(30,30,44,0.14);stroke-width:1}
      .rule{stroke:rgba(30,30,44,0.18);stroke-width:1;fill:none}
      .rule-dashed{stroke:rgba(30,30,44,0.30);stroke-width:1;fill:none;stroke-dasharray:4,3}
      .ink{fill:#1e1e2a}
      .accent{fill:#b8582e}
      .carmine{fill:#a83e55}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .small-label{font:500 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.12em;fill:#6b6f7c}
    </style>
  </defs>

  <rect width="1120" height="720" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 02</text>
  <text x="80" y="62" class="title">Le procès du chatbot</text>
  <text x="80" y="92" class="subtitle">Trois griefs convergents et trois usages qui restent légitimes. Le chat survit comme port universel.</text>

  <line x1="80" y1="115" x2="1040" y2="115" class="rule"/>

  <!-- 3 colonnes : Affordance / Flow / Articulation -->
  <!-- Col 1 -->
  <rect x="80" y="140" width="300" height="370" rx="3" class="panel"/>
  <text x="100" y="172" class="col-eyebrow">GRIEF I · AFFORDANCE</text>
  <text x="100" y="200" class="col-title">Pas de port distinctif</text>
  <line x1="100" y1="216" x2="160" y2="216" class="rule"/>
  <text x="100" y="246" class="body">Un champ texte ChatGPT</text>
  <text x="100" y="262" class="body">ressemble à une barre Google,</text>
  <text x="100" y="278" class="body">à un login form, à un champ</text>
  <text x="100" y="294" class="body">carte bancaire. Rien ne dit</text>
  <text x="100" y="310" class="body">à l'utilisateur ce qu'il peut</text>
  <text x="100" y="326" class="body">y faire.</text>
  <text x="100" y="368" class="quote">« Un piano dit, sans rien apprendre,</text>
  <text x="100" y="386" class="quote">qu'on peut frapper toutes ses touches.</text>
  <text x="100" y="404" class="quote">Le chatbot n'a aucun équivalent. »</text>
  <text x="100" y="432" class="attrib">A. WATTENBERGER · 2023</text>

  <!-- Col 2 -->
  <rect x="410" y="140" width="300" height="370" rx="3" class="panel"/>
  <text x="430" y="172" class="col-eyebrow">GRIEF II · FLOW</text>
  <text x="430" y="200" class="col-title">L'aller-retour casse</text>
  <text x="430" y="222" class="col-title">le rythme</text>
  <line x1="430" y1="236" x2="490" y2="236" class="rule"/>
  <text x="430" y="266" class="body">Le flow exige une alternance</text>
  <text x="430" y="282" class="body">à très haute fréquence entre</text>
  <text x="430" y="298" class="body">action et feedback. Le chat</text>
  <text x="430" y="314" class="body">impose un cycle implement</text>
  <text x="430" y="330" class="body">→ wait → evaluate, exactement</text>
  <text x="430" y="346" class="body">l'inverse.</text>
  <text x="430" y="388" class="quote">« Chat is a debug interface ;</text>
  <text x="430" y="406" class="quote">it should not be the default</text>
  <text x="430" y="424" class="quote">surface for routine use. »</text>
  <text x="430" y="452" class="attrib">A. PIKE · POST-CHAT UI · 2025</text>

  <!-- Col 3 -->
  <rect x="740" y="140" width="300" height="370" rx="3" class="panel"/>
  <text x="760" y="172" class="col-eyebrow">GRIEF III · ARTICULATION</text>
  <text x="760" y="200" class="col-title">Tout doit être verbalisé</text>
  <text x="760" y="222" class="col-title">à l'avance</text>
  <line x1="760" y1="236" x2="820" y2="236" class="rule"/>
  <text x="760" y="266" class="body">On pense en demi-phrases,</text>
  <text x="760" y="282" class="body">en gestes, en pointages.</text>
  <text x="760" y="298" class="body">Le chat exige une formulation</text>
  <text x="760" y="314" class="body">verbale complète avant que</text>
  <text x="760" y="330" class="body">la machine ne fasse quoi</text>
  <text x="760" y="346" class="body">que ce soit.</text>
  <text x="760" y="388" class="quote">« The articulation barrier is</text>
  <text x="760" y="406" class="quote">heavier than designers admit,</text>
  <text x="760" y="424" class="quote">because designers love words. »</text>
  <text x="760" y="452" class="attrib">NN/G · 2024</text>

  <!-- Bottom strip : 3 usages légitimes du chat -->
  <rect x="80" y="540" width="960" height="120" rx="3" class="panel-bottom"/>
  <text x="100" y="568" class="col-eyebrow">CE QUI SURVIT — LE CHAT COMME PORT UNIVERSEL</text>
  <line x1="100" y1="582" x2="290" y2="582" class="rule-dashed"/>

  <!-- 3 usages -->
  <text x="100" y="610" class="small-label">DÉCOUVERTE</text>
  <text x="100" y="630" class="body">Première rencontre avec l'agent</text>
  <text x="100" y="646" class="body-soft">— quand l'utilisateur ne sait pas encore</text>

  <text x="430" y="610" class="small-label">IMPRÉCIS</text>
  <text x="430" y="630" class="body">Demandes qui ne tiennent</text>
  <text x="430" y="646" class="body-soft">pas dans des boutons (« comme ça mais... »)</text>

  <text x="760" y="610" class="small-label">FALLBACK</text>
  <text x="760" y="630" class="body">Quand l'UI structurée échoue</text>
  <text x="760" y="646" class="body-soft">— dernier recours, pas premier choix</text>

  <text x="80" y="685" class="caption">Le verdict synthétique : le chat est la prise minimale, pas la bonne forme. Il survit comme USB universel.</text>
  <text x="80" y="703" class="caption">Sources — Wattenberger 2023, Appleton 2023, Lee, Litt, Saarinen 2025, Pike 2025, Nielsen Norman Group 2024.</text>
</svg>
