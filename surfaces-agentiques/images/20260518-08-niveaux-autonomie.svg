<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-08">
  <title id="title-08">Cinq niveaux d'autonomie — Knight First Amendment Institute</title>
  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .level-num{font:600 26px/1 'JetBrains Mono',monospace;letter-spacing:0;fill:#a83e55}
      .level-name{font:600 18px/1.1 'Fraunces',serif;letter-spacing:-0.005em;fill:#1e1e2a}
      .level-decide{font:500 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.12em;fill:#6b6f7c}
      .level-pattern{font:400 12px/1.45 'Inter',sans-serif;fill:#1e1e2a}
      .level-example{font:500 10px/1.3 'JetBrains Mono',monospace;letter-spacing:0.04em;fill:#9a9ca5}
      .axis-label{font:600 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c}
      .axis-tick{font:400 10px/1 'Inter',sans-serif;fill:#9a9ca5}
      .frame-l1{fill:#fdfaf0;stroke:rgba(30,30,44,0.20);stroke-width:1.2}
      .frame-l2{fill:#fbf3e5;stroke:rgba(30,30,44,0.20);stroke-width:1.2}
      .frame-l3{fill:#f7eed8;stroke:rgba(30,30,44,0.22);stroke-width:1.2}
      .frame-l4{fill:#f2e6c8;stroke:rgba(30,30,44,0.24);stroke-width:1.4}
      .frame-l5{fill:#ecd9a8;stroke:#a83e55;stroke-width:1.4}
      .arrow{stroke:rgba(30,30,44,0.35);stroke-width:1.4;fill:none}
      .rule{stroke:rgba(30,30,44,0.20);stroke-width:1;fill:none}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .quote-box{fill:#fdfaf0;stroke:rgba(168,62,85,0.50);stroke-width:1.2;stroke-dasharray:6,4}
      .quote{font:400 italic 14px/1.4 'Fraunces',serif;fill:#1e1e2a}
      .attrib{font:500 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c}
    </style>
    <marker id="ax-arrow-r" markerWidth="9" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="rgba(30,30,44,0.4)"/>
    </marker>
  </defs>

  <rect width="1120" height="720" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 08</text>
  <text x="80" y="62" class="title">Cinq niveaux d'autonomie</text>
  <text x="80" y="92" class="subtitle">L'échelle du Knight First Amendment Institute. À chaque niveau, un pattern UX distinct.</text>

  <line x1="80" y1="115" x2="1040" y2="115" class="rule"/>

  <!-- Echelle horizontale -->
  <line x1="80" y1="500" x2="1040" y2="500" class="arrow" marker-end="url(#ax-arrow-r)"/>
  <text x="100" y="525" class="axis-label">CONTRÔLE UTILISATEUR ◄</text>
  <text x="1020" y="525" class="axis-label" text-anchor="end">► AUTONOMIE AGENT</text>

  <!-- Level 1 : Operator -->
  <rect x="80" y="160" width="180" height="310" rx="3" class="frame-l1"/>
  <text x="170" y="195" class="level-num" text-anchor="middle">01</text>
  <text x="170" y="225" class="level-name" text-anchor="middle">Operator</text>
  <line x1="120" y1="240" x2="220" y2="240" class="rule"/>
  <text x="170" y="260" class="level-decide" text-anchor="middle">QUI DÉCIDE</text>
  <text x="170" y="278" class="level-pattern" text-anchor="middle">L'utilisateur.</text>
  <text x="170" y="294" class="level-pattern" text-anchor="middle">L'agent suggère.</text>
  <text x="170" y="334" class="level-decide" text-anchor="middle">PATTERN UX</text>
  <text x="170" y="352" class="level-pattern" text-anchor="middle">Tab / Esc</text>
  <text x="170" y="368" class="level-pattern" text-anchor="middle">ghost text</text>
  <text x="170" y="384" class="level-pattern" text-anchor="middle">suggestion + accept</text>
  <text x="170" y="430" class="level-example" text-anchor="middle">Copilot autocomplete</text>
  <text x="170" y="446" class="level-example" text-anchor="middle">Cursor Tab v2</text>

  <!-- Level 2 : Collaborator -->
  <rect x="276" y="160" width="180" height="310" rx="3" class="frame-l2"/>
  <text x="366" y="195" class="level-num" text-anchor="middle">02</text>
  <text x="366" y="225" class="level-name" text-anchor="middle">Collaborator</text>
  <line x1="316" y1="240" x2="416" y2="240" class="rule"/>
  <text x="366" y="260" class="level-decide" text-anchor="middle">QUI DÉCIDE</text>
  <text x="366" y="278" class="level-pattern" text-anchor="middle">Utilisateur ET</text>
  <text x="366" y="294" class="level-pattern" text-anchor="middle">agent à parts égales.</text>
  <text x="366" y="334" class="level-decide" text-anchor="middle">PATTERN UX</text>
  <text x="366" y="352" class="level-pattern" text-anchor="middle">Canvas partagé</text>
  <text x="366" y="368" class="level-pattern" text-anchor="middle">co-édition</text>
  <text x="366" y="384" class="level-pattern" text-anchor="middle">négociation</text>
  <text x="366" y="430" class="level-example" text-anchor="middle">Cursor Composer</text>
  <text x="366" y="446" class="level-example" text-anchor="middle">Claude Artifacts itératif</text>

  <!-- Level 3 : Consultant -->
  <rect x="472" y="160" width="180" height="310" rx="3" class="frame-l3"/>
  <text x="562" y="195" class="level-num" text-anchor="middle">03</text>
  <text x="562" y="225" class="level-name" text-anchor="middle">Consultant</text>
  <line x1="512" y1="240" x2="612" y2="240" class="rule"/>
  <text x="562" y="260" class="level-decide" text-anchor="middle">QUI DÉCIDE</text>
  <text x="562" y="278" class="level-pattern" text-anchor="middle">L'utilisateur,</text>
  <text x="562" y="294" class="level-pattern" text-anchor="middle">après consultation.</text>
  <text x="562" y="334" class="level-decide" text-anchor="middle">PATTERN UX</text>
  <text x="562" y="352" class="level-pattern" text-anchor="middle">L'agent rend un</text>
  <text x="562" y="368" class="level-pattern" text-anchor="middle">avis ou un plan,</text>
  <text x="562" y="384" class="level-pattern" text-anchor="middle">l'utilisateur décide.</text>
  <text x="562" y="430" class="level-example" text-anchor="middle">Deep Research</text>
  <text x="562" y="446" class="level-example" text-anchor="middle">Tableau Pulse brief</text>

  <!-- Level 4 : Approver -->
  <rect x="668" y="160" width="180" height="310" rx="3" class="frame-l4"/>
  <text x="758" y="195" class="level-num" text-anchor="middle">04</text>
  <text x="758" y="225" class="level-name" text-anchor="middle">Approver</text>
  <line x1="708" y1="240" x2="808" y2="240" class="rule"/>
  <text x="758" y="260" class="level-decide" text-anchor="middle">QUI DÉCIDE</text>
  <text x="758" y="278" class="level-pattern" text-anchor="middle">L'agent. L'utilisateur</text>
  <text x="758" y="294" class="level-pattern" text-anchor="middle">approuve l'exécution.</text>
  <text x="758" y="334" class="level-decide" text-anchor="middle">PATTERN UX</text>
  <text x="758" y="352" class="level-pattern" text-anchor="middle">Plan mode</text>
  <text x="758" y="368" class="level-pattern" text-anchor="middle">confirmation</text>
  <text x="758" y="384" class="level-pattern" text-anchor="middle">pré-action</text>
  <text x="758" y="430" class="level-example" text-anchor="middle">Claude Code Plan</text>
  <text x="758" y="446" class="level-example" text-anchor="middle">Operator confirm</text>

  <!-- Level 5 : Observer -->
  <rect x="864" y="160" width="180" height="310" rx="3" class="frame-l5"/>
  <text x="954" y="195" class="level-num" text-anchor="middle">05</text>
  <text x="954" y="225" class="level-name" text-anchor="middle">Observer</text>
  <line x1="904" y1="240" x2="1004" y2="240" class="rule"/>
  <text x="954" y="260" class="level-decide" text-anchor="middle">QUI DÉCIDE</text>
  <text x="954" y="278" class="level-pattern" text-anchor="middle">L'agent décide</text>
  <text x="954" y="294" class="level-pattern" text-anchor="middle">et exécute seul.</text>
  <text x="954" y="334" class="level-decide" text-anchor="middle">PATTERN UX</text>
  <text x="954" y="352" class="level-pattern" text-anchor="middle">Activity panel</text>
  <text x="954" y="368" class="level-pattern" text-anchor="middle">narrate-as-you-go</text>
  <text x="954" y="384" class="level-pattern" text-anchor="middle">audit log post-hoc</text>
  <text x="954" y="430" class="level-example" text-anchor="middle">Devin · Manus</text>
  <text x="954" y="446" class="level-example" text-anchor="middle">Sierra · Agentforce</text>

  <!-- Quote -->
  <rect x="80" y="560" width="960" height="100" rx="3" class="quote-box"/>
  <text x="100" y="600" class="quote">« L'autonomie n'est pas un sous-produit de la capacité du modèle.</text>
  <text x="100" y="622" class="quote">C'est une décision de design — et elle doit être exposée explicitement à l'utilisateur. »</text>
  <text x="100" y="650" class="attrib">YONADAV SHAVIT ET AL. · LEVELS OF AUTONOMY FOR AI AGENTS · KNIGHT INSTITUTE · JUILLET 2025</text>

  <text x="80" y="700" class="caption">Sources — Knight First Amendment Institute (Columbia), juillet 2025 ; arXiv 2506.12469. Voir aussi Anthropic *Graduated Trust* (2026), Karpathy *autonomy slider* (Sequoia AI Ascent 2026).</text>
</svg>
