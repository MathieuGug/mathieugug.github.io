<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-06">
  <title id="title-06">Trois piliers de la stack agentique — MCP, A2A, AG-UI</title>
  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .pillar-eyebrow{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .pillar-title{font:600 24px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .pillar-sub{font:400 italic 14px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .pillar-desc{font:400 13px/1.5 'Inter',sans-serif;fill:#1e1e2a}
      .pillar-prod{font:500 11px/1.3 'JetBrains Mono',monospace;letter-spacing:0.06em;fill:#6b6f7c}
      .agent-label{font:600 14px/1.2 'Fraunces',serif;letter-spacing:-0.005em;fill:#fdfaf0;text-transform:uppercase}
      .agent-sub{font:400 italic 11px/1.3 'Fraunces',serif;fill:#e6e2d4}
      .endpoint-label{font:500 12px/1.2 'JetBrains Mono',monospace;letter-spacing:0.08em;fill:#6b6f7c}
      .panel-mcp{fill:#fdfaf0;stroke:#1a5c6b;stroke-width:1.4}
      .panel-a2a{fill:#fdfaf0;stroke:#b8582e;stroke-width:1.4}
      .panel-agui{fill:#fdfaf0;stroke:#a83e55;stroke-width:1.4}
      .core-agent{fill:#1e1e2a;stroke:#b8582e;stroke-width:1.6}
      .connector{stroke:#6b6f7c;stroke-width:1.6;fill:none}
      .rule{stroke:rgba(30,30,44,0.20);stroke-width:1;fill:none}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .badge-eb{font:500 10px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#9a9ca5}
    </style>
    <marker id="ar-double" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#6b6f7c"/>
    </marker>
    <marker id="ar-double-start" markerWidth="9" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <path d="M9,0 L0,3.5 L9,7 z" fill="#6b6f7c"/>
    </marker>
  </defs>

  <rect width="1120" height="720" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 06</text>
  <text x="80" y="62" class="title">Trois piliers de la stack agentique</text>
  <text x="80" y="92" class="subtitle">MCP côté tools, A2A entre agents, AG-UI côté utilisateur. La triangulation de la couche d'interaction.</text>

  <line x1="80" y1="115" x2="1040" y2="115" class="rule"/>

  <!-- Agent central -->
  <rect x="480" y="330" width="160" height="80" rx="4" class="core-agent"/>
  <text x="560" y="362" class="agent-label" text-anchor="middle">AGENT</text>
  <text x="560" y="384" class="agent-sub" text-anchor="middle">harness · model · loop</text>
  <text x="560" y="400" class="agent-sub" text-anchor="middle">filesystem · skills</text>

  <!-- Connecteurs vers les 3 piliers -->
  <!-- vers MCP (gauche) -->
  <line x1="478" y1="370" x2="305" y2="370" class="connector" marker-end="url(#ar-double)" marker-start="url(#ar-double-start)"/>
  <text x="392" y="358" class="endpoint-label" text-anchor="middle">tools · data</text>

  <!-- vers AG-UI (droite) -->
  <line x1="642" y1="370" x2="815" y2="370" class="connector" marker-end="url(#ar-double)" marker-start="url(#ar-double-start)"/>
  <text x="728" y="358" class="endpoint-label" text-anchor="middle">user · UI</text>

  <!-- vers A2A (bas) -->
  <line x1="560" y1="412" x2="560" y2="545" class="connector" marker-end="url(#ar-double)" marker-start="url(#ar-double-start)"/>
  <text x="595" y="485" class="endpoint-label">agent ↔ agent</text>

  <!-- Pilier 1 : MCP (gauche) -->
  <rect x="80" y="200" width="225" height="280" rx="4" class="panel-mcp"/>
  <text x="100" y="232" class="pillar-eyebrow">PILIER I</text>
  <text x="100" y="262" class="pillar-title">MCP</text>
  <text x="100" y="282" class="pillar-sub">Agent ↔ Tools / Data</text>
  <line x1="100" y1="298" x2="160" y2="298" class="rule"/>
  <text x="100" y="324" class="pillar-desc">Standard ouvert pour</text>
  <text x="100" y="340" class="pillar-desc">connecter un agent aux</text>
  <text x="100" y="356" class="pillar-desc">outils externes — APIs,</text>
  <text x="100" y="372" class="pillar-desc">bases, file systems.</text>
  <text x="100" y="402" class="badge-eb">PORTÉ PAR</text>
  <text x="100" y="420" class="pillar-prod">Anthropic + écosystème</text>
  <text x="100" y="442" class="badge-eb">LANCÉ</text>
  <text x="100" y="460" class="pillar-prod">Novembre 2024</text>

  <!-- Pilier 3 : AG-UI (droite) -->
  <rect x="815" y="200" width="225" height="280" rx="4" class="panel-agui"/>
  <text x="835" y="232" class="pillar-eyebrow">PILIER III</text>
  <text x="835" y="262" class="pillar-title">AG-UI</text>
  <text x="835" y="282" class="pillar-sub">Agent ↔ Utilisateur</text>
  <line x1="835" y1="298" x2="895" y2="298" class="rule"/>
  <text x="835" y="324" class="pillar-desc">Protocole d'événements</text>
  <text x="835" y="340" class="pillar-desc">bi-directionnel entre</text>
  <text x="835" y="356" class="pillar-desc">agent et UI — 17 events</text>
  <text x="835" y="372" class="pillar-desc">core, JSON Patch state.</text>
  <text x="835" y="402" class="badge-eb">PORTÉ PAR</text>
  <text x="835" y="420" class="pillar-prod">CopilotKit</text>
  <text x="835" y="442" class="badge-eb">LANCÉ</text>
  <text x="835" y="460" class="pillar-prod">Mai 2025</text>

  <!-- Pilier 2 : A2A (bas-centre) -->
  <rect x="447" y="555" width="225" height="140" rx="4" class="panel-a2a"/>
  <text x="467" y="585" class="pillar-eyebrow">PILIER II</text>
  <text x="467" y="615" class="pillar-title">A2A</text>
  <text x="467" y="635" class="pillar-sub">Agent ↔ Agent</text>
  <line x1="467" y1="651" x2="527" y2="651" class="rule"/>
  <text x="467" y="676" class="pillar-desc">Coordination multi-agents.</text>

  <!-- Annotations -->
  <text x="100" y="195" class="badge-eb">TOOLS / DATA</text>
  <text x="835" y="195" class="badge-eb">USER / UI</text>
  <text x="467" y="550" class="badge-eb">AGENT MESH</text>

  <!-- Caption -->
  <text x="80" y="710" class="caption">Sources — CopilotKit blog (lancement AG-UI mai 2025), MCP Apps Jan 2026, Microsoft Agent Framework, Google ADK, AWS Strands Agents.</text>
</svg>
