<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-10">
  <title id="title-10">Matrice de décision — quel régime pour quel cas d'usage</title>
  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .axis-label{font:600 12px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c}
      .axis-tick{font:400 10px/1 'Inter',sans-serif;fill:#9a9ca5}
      .quad-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .quad-title{font:600 17px/1.2 'Fraunces',serif;letter-spacing:-0.005em;fill:#1e1e2a}
      .quad-sub{font:400 italic 12px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .case-name{font:500 11px/1.3 'Inter',sans-serif;fill:#1e1e2a}
      .case-dot{fill:#b8582e}
      .case-dot-soft{fill:rgba(184,88,46,0.35)}
      .frame-q1{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .frame-q2{fill:#fbf3e5;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .frame-q3{fill:#f7eed8;stroke:rgba(30,30,44,0.22);stroke-width:1.2}
      .frame-q4{fill:#f2e6c8;stroke:#a83e55;stroke-width:1.4}
      .axis{stroke:rgba(30,30,44,0.30);stroke-width:1;fill:none}
      .rule{stroke:rgba(30,30,44,0.20);stroke-width:1;fill:none}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
    </style>
    <marker id="ax-arrow-r" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(30,30,44,0.4)"/>
    </marker>
    <marker id="ax-arrow-u" markerWidth="6" markerHeight="8" refX="3" refY="2" orient="auto">
      <path d="M0,8 L6,8 L3,2 z" fill="rgba(30,30,44,0.4)"/>
    </marker>
  </defs>

  <rect width="1120" height="760" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 10</text>
  <text x="80" y="62" class="title">Matrice de décision</text>
  <text x="80" y="92" class="subtitle">Quel régime pour quel cas. Deux axes — fréquence d'usage × enjeu de l'action — quatre quadrants, douze cas d'usage.</text>

  <line x1="80" y1="115" x2="1040" y2="115" class="rule"/>

  <!-- Axes -->
  <line x1="170" y1="660" x2="1020" y2="660" class="axis" marker-end="url(#ax-arrow-r)"/>
  <line x1="170" y1="660" x2="170" y2="155" class="axis" marker-end="url(#ax-arrow-u)"/>

  <text x="595" y="700" class="axis-label" text-anchor="middle">ENJEU DE L'ACTION →</text>
  <text x="595" y="718" class="axis-tick" text-anchor="middle">réversible · ad hoc / irréversible · production</text>

  <text x="145" y="410" class="axis-label" transform="rotate(-90 145 410)" text-anchor="middle">FRÉQUENCE D'USAGE →</text>
  <text x="160" y="410" class="axis-tick" transform="rotate(-90 160 410)" text-anchor="middle">rare / routinier</text>

  <!-- Quadrant 1 : Haut-gauche (routinier + réversible) -->
  <rect x="190" y="155" width="395" height="245" rx="3" class="frame-q1"/>
  <text x="210" y="185" class="quad-eyebrow">ROUTINIER · RÉVERSIBLE</text>
  <text x="210" y="213" class="quad-title">Régime dominant : Inline copilot</text>
  <text x="210" y="232" class="quad-sub">3 sub-modes (ghost · sidebar · agent)</text>

  <circle cx="220" cy="265" r="4" class="case-dot"/>
  <text x="234" y="269" class="case-name">Édition de code professionnelle</text>
  <circle cx="220" cy="290" r="4" class="case-dot"/>
  <text x="234" y="294" class="case-name">Écriture de document</text>
  <circle cx="220" cy="315" r="4" class="case-dot"/>
  <text x="234" y="319" class="case-name">Triage d'emails / Slack</text>
  <circle cx="220" cy="340" r="4" class="case-dot-soft"/>
  <text x="234" y="344" class="case-name">Recherche / lookup contextuel</text>
  <circle cx="220" cy="365" r="4" class="case-dot-soft"/>
  <text x="234" y="369" class="case-name">Analyse exploratoire ad hoc</text>

  <!-- Quadrant 2 : Haut-droit (routinier + irréversible) -->
  <rect x="605" y="155" width="395" height="245" rx="3" class="frame-q4"/>
  <text x="625" y="185" class="quad-eyebrow">ROUTINIER · IRRÉVERSIBLE</text>
  <text x="625" y="213" class="quad-title">Régime : On-behalf-of + guardrails</text>
  <text x="625" y="232" class="quad-sub">Plan mode, escalade contextuelle, warm handoff</text>

  <circle cx="635" cy="265" r="4" class="case-dot"/>
  <text x="649" y="269" class="case-name">Customer-service à la demande (Sierra)</text>
  <circle cx="635" cy="290" r="4" class="case-dot"/>
  <text x="649" y="294" class="case-name">Refactor multi-fichier (Devin, Cursor BG)</text>
  <circle cx="635" cy="315" r="4" class="case-dot"/>
  <text x="649" y="319" class="case-name">Voice call inbound / outbound (Vapi, Retell)</text>
  <circle cx="635" cy="340" r="4" class="case-dot-soft"/>
  <text x="649" y="344" class="case-name">Automation Slack / Teams cross-app</text>
  <circle cx="635" cy="365" r="4" class="case-dot-soft"/>
  <text x="649" y="369" class="case-name">CI/CD pre-review et auto-merge</text>

  <!-- Quadrant 3 : Bas-gauche (rare + réversible) -->
  <rect x="190" y="415" width="395" height="245" rx="3" class="frame-q2"/>
  <text x="210" y="445" class="quad-eyebrow">RARE · RÉVERSIBLE</text>
  <text x="210" y="473" class="quad-title">Régime dominant : Chat + Canvas</text>
  <text x="210" y="492" class="quad-sub">Découverte d'usage, génération d'objets one-shot</text>

  <circle cx="220" cy="525" r="4" class="case-dot"/>
  <text x="234" y="529" class="case-name">Présentation, deck (Gamma, Canvas)</text>
  <circle cx="220" cy="550" r="4" class="case-dot"/>
  <text x="234" y="554" class="case-name">Mini-app interne ad hoc (v0, Lovable)</text>
  <circle cx="220" cy="575" r="4" class="case-dot"/>
  <text x="234" y="579" class="case-name">Onboarding / découverte d'usage (chat)</text>
  <circle cx="220" cy="600" r="4" class="case-dot-soft"/>
  <text x="234" y="604" class="case-name">Brainstorming / exploration libre</text>

  <!-- Quadrant 4 : Bas-droit (rare + irréversible) -->
  <rect x="605" y="415" width="395" height="245" rx="3" class="frame-q3"/>
  <text x="625" y="445" class="quad-eyebrow">RARE · IRRÉVERSIBLE</text>
  <text x="625" y="473" class="quad-title">Régime : Narratif + escalade</text>
  <text x="625" y="492" class="quad-sub">Brief éditorial + confirmation humaine systématique</text>

  <circle cx="635" cy="525" r="4" class="case-dot"/>
  <text x="649" y="529" class="case-name">Dashboard sur métriques (Tableau Pulse)</text>
  <circle cx="635" cy="550" r="4" class="case-dot"/>
  <text x="649" y="554" class="case-name">Recherche web exploratoire (Operator)</text>
  <circle cx="635" cy="575" r="4" class="case-dot"/>
  <text x="649" y="579" class="case-name">Décision stratégique éclairée par data</text>
  <circle cx="635" cy="600" r="4" class="case-dot-soft"/>
  <text x="649" y="604" class="case-name">Migration / cleanup ponctuel critique</text>

  <text x="80" y="735" class="caption">Lecture — un cas ne tombe jamais dans un seul quadrant. Les meilleurs produits 2026 combinent plusieurs régimes selon le cran d'usage.</text>
  <text x="80" y="752" class="caption">Sources — synthèse éditoriale auteur, croisée avec Anthropic Framework for Trustworthy Agents, Knight Institute, Salesforce Architects Agentic Patterns.</text>
</svg>
