<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" data-schema-id="baro-03" role="img" aria-label="Baromètre CoC Data — Adoption &amp; Impact de l'IA — 60 % utilisent l'IA au moins chaque semaine, 27 % des clients en POC">
  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Georgia', serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'Consolas', monospace; }
      .interactive { cursor: pointer; }
      .interactive:hover .bar-bg  { stroke: #b8582e; stroke-width: 1.5; }
      .interactive:hover .card-bg { stroke: #b8582e; stroke-width: 2; }
      .interactive:focus { outline: none; }
      .interactive:focus .bar-bg  { stroke: #b8582e; stroke-width: 1.5; }
      .interactive:focus .card-bg { stroke: #b8582e; stroke-width: 2; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="760" fill="#faf6ec"/>

  <!-- ====================== HEADER ====================== -->
  <!-- Schema marker -->
  <text class="mono" x="60" y="54" font-size="12" font-weight="600" letter-spacing="2.5" fill="#b23b1b">SCHÉMA 03 — BAROMÈTRE</text>

  <!-- Title: ADOPTION &amp; IMPACT (italic accent on IMPACT) -->
  <text class="display" x="60" y="95" font-size="34" font-weight="400" fill="#1e1e2a">ADOPTION &amp; <tspan font-style="italic" fill="#b8582e">IMPACT</tspan> DE L'IA</text>

  <!-- Subtitle -->
  <text class="body" x="60" y="121" font-size="16" fill="#6b6f7c">60 % utilisent l'IA au moins chaque semaine — 27 % des clients en phase de POC</text>

  <!-- Hairline rule -->
  <line x1="60" y1="135" x2="1140" y2="135" stroke="#1e1e2a" stroke-width="0.6"/>

  <!-- ====================== COLUMN HEADERS ====================== -->
  <!-- Left column header: Fréquence d'usage IA -->
  <text class="display" x="60" y="170" font-size="18" font-weight="500" fill="#1e1e2a">Fréquence d'usage IA</text>

  <!-- Right column header: IA chez les clients -->
  <text class="display" x="640" y="170" font-size="18" font-weight="500" fill="#1e1e2a">IA chez les clients</text>

  <!-- Thin column header underlines -->
  <line x1="60" y1="178" x2="560" y2="178" stroke="rgba(30,30,44,0.12)" stroke-width="0.5"/>
  <line x1="640" y1="178" x2="1140" y2="178" stroke="rgba(30,30,44,0.12)" stroke-width="0.5"/>

  <!-- Vertical separator between columns -->
  <line x1="600" y1="155" x2="600" y2="590" stroke="rgba(30,30,44,0.12)" stroke-width="0.6"/>

  <!-- ====================== LEFT COLUMN — FRÉQUENCE D'USAGE IA ====================== -->
  <!--
    5 horizontal bars — absolute counts, ordered by hierarchy (dominant Hebdomadaire at top):
    Hebdomadaire : 31  → max → width = 31/31 * 320 = 320
    Rarement     : 26  → width = 26/31 * 320 = 268.4 ≈ 268
    Quotidien    : 21  → width = 21/31 * 320 = 216.8 ≈ 217
    Jamais       : 11  → width = 11/31 * 320 = 113.5 ≈ 114
    En continu   : 10  → width = 10/31 * 320 = 103.2 ≈ 103

    Visual ordering top-to-bottom: Hebdo (dominant) → Rarement → Quotidien → Jamais → En continu
    Bar x=60, max-width=320.
    Bar height=28. Row spacing ~58px.
    Row y-starts: 198, 256, 314, 372, 430
  -->

  <!-- Color legend — mini squares + labels above bars -->
  <rect x="60"  y="186" width="10" height="10" rx="2" fill="#b8582e"/>
  <text class="body" x="74"  y="196" font-size="11" fill="#6b6f7c">Hebdomadaire</text>
  <rect x="168" y="186" width="10" height="10" rx="2" fill="#b8582e" opacity="0.70"/>
  <text class="body" x="182" y="196" font-size="11" fill="#6b6f7c">Rarement</text>
  <rect x="252" y="186" width="10" height="10" rx="2" fill="#b8582e" opacity="0.55"/>
  <text class="body" x="266" y="196" font-size="11" fill="#6b6f7c">Quotidien</text>
  <rect x="336" y="186" width="10" height="10" rx="2" fill="rgba(107,111,124,0.50)"/>
  <text class="body" x="350" y="196" font-size="11" fill="#6b6f7c">Jamais</text>
  <rect x="406" y="186" width="10" height="10" rx="2" fill="rgba(184,88,46,0.30)"/>
  <text class="body" x="420" y="196" font-size="11" fill="#6b6f7c">En continu</text>

  <!-- ROW 1: Hebdomadaire — 31 — dominant -->
  <g class="interactive" data-card="freq-hebdo" tabindex="0" role="button" aria-label="Hebdomadaire : 31 répondants utilisent l'IA chaque semaine — fréquence dominante, 60 % cumulé avec quotidien et continu">
    <text class="body" x="60" y="216" font-size="13" fill="#3b3f4d">Hebdomadaire</text>
    <rect class="bar-bg" x="60" y="222" width="320" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 31/31 * 320 = 320 px -->
    <rect x="60" y="222" width="320" height="28" rx="4" fill="#b8582e"/>
    <text class="mono" x="370" y="241" font-size="13" font-weight="500" fill="#ffffff" text-anchor="end" dominant-baseline="middle">31</text>
  </g>

  <!-- ROW 2: Rarement — 26 -->
  <g class="interactive" data-card="freq-rarement" tabindex="0" role="button" aria-label="Rarement : 26 répondants utilisent l'IA de manière occasionnelle">
    <text class="body" x="60" y="274" font-size="13" fill="#3b3f4d">Rarement</text>
    <rect class="bar-bg" x="60" y="280" width="320" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 26/31 * 320 = 268 px -->
    <rect x="60" y="280" width="268" height="28" rx="4" fill="#b8582e" opacity="0.70"/>
    <text class="mono" x="318" y="299" font-size="13" font-weight="500" fill="#ffffff" text-anchor="end" dominant-baseline="middle">26</text>
  </g>

  <!-- ROW 3: Quotidien — 21 -->
  <g class="interactive" data-card="freq-quoti" tabindex="0" role="button" aria-label="Quotidien : 21 répondants utilisent l'IA tous les jours">
    <text class="body" x="60" y="332" font-size="13" fill="#3b3f4d">Quotidien</text>
    <rect class="bar-bg" x="60" y="338" width="320" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 21/31 * 320 = 217 px -->
    <rect x="60" y="338" width="217" height="28" rx="4" fill="#b8582e" opacity="0.55"/>
    <text class="mono" x="267" y="357" font-size="13" font-weight="500" fill="#ffffff" text-anchor="end" dominant-baseline="middle">21</text>
  </g>

  <!-- ROW 4: Jamais — 11 -->
  <g class="interactive" data-card="freq-jamais" tabindex="0" role="button" aria-label="Jamais : 11 répondants n'utilisent pas du tout l'IA">
    <text class="body" x="60" y="390" font-size="13" fill="#3b3f4d">Jamais</text>
    <rect class="bar-bg" x="60" y="396" width="320" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 11/31 * 320 = 114 px -->
    <rect x="60" y="396" width="114" height="28" rx="4" fill="rgba(107,111,124,0.50)"/>
    <text class="mono" x="164" y="415" font-size="13" font-weight="500" fill="#ffffff" text-anchor="end" dominant-baseline="middle">11</text>
  </g>

  <!-- ROW 5: En continu — 10 -->
  <g class="interactive" data-card="freq-continu" tabindex="0" role="button" aria-label="En continu : 10 répondants utilisent l'IA de manière continue tout au long de la journée">
    <text class="body" x="60" y="448" font-size="13" fill="#3b3f4d">En continu</text>
    <rect class="bar-bg" x="60" y="454" width="320" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 10/31 * 320 = 103 px -->
    <rect x="60" y="454" width="103" height="28" rx="3" fill="rgba(184,88,46,0.30)"/>
    <text class="mono" x="153" y="473" font-size="13" font-weight="500" fill="#1e1e2a" text-anchor="end" dominant-baseline="middle">10</text>
  </g>

  <!-- Annotation: 60 % = hebdo + quotidien + continu (31+21+10=62/99) -->
  <line x1="393" y1="226" x2="393" y2="480" stroke="rgba(30,30,44,0.18)" stroke-width="0.8"/>
  <line x1="387" y1="226" x2="393" y2="226" stroke="rgba(30,30,44,0.18)" stroke-width="0.8"/>
  <line x1="387" y1="480" x2="393" y2="480" stroke="rgba(30,30,44,0.18)" stroke-width="0.8"/>
  <text class="mono" x="400" y="353" font-size="11" font-weight="500" fill="#6b6f7c" dominant-baseline="middle">60 % reg.+</text>

  <!-- ====================== RIGHT COLUMN — IA CHEZ LES CLIENTS ====================== -->
  <!--
    4 stacked cards, each ~100px tall with 10px gap between
    Right column x=640 to x=1140, width=500
    Card y positions: 198, 308, 418, 498 (smaller last card)
    Ordered by visual emphasis: POC (yellow/warm), Agents (dark ink), Copilots (carmine), Aucun (grey)
  -->

  <!-- CARD 1: 27 % POC / expérimentation — emphasized (yellow/sand) -->
  <g class="interactive" data-card="client-poc" tabindex="0" role="button" aria-label="27 % des clients en phase POC ou expérimentation IA — fenêtre d'opportunité pour le CoC">
    <rect class="card-bg" x="640" y="198" width="500" height="100" rx="6" fill="rgba(232,201,122,0.45)" stroke="rgba(184,88,46,0.20)" stroke-width="1"/>
    <!-- Accent bar left -->
    <rect x="640" y="198" width="4" height="100" rx="2" fill="#b8582e" opacity="0.60"/>
    <!-- Percentage big -->
    <text class="display" x="666" y="255" font-size="42" font-weight="400" fill="#1e1e2a">27 <tspan font-size="28" fill="#b8582e">%</tspan></text>
    <!-- Label -->
    <text class="body" x="666" y="280" font-size="13" font-weight="500" fill="#3b3f4d">POC / expérimentation</text>
    <!-- Sub-label -->
    <text class="body" x="900" y="244" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">Clients en phase exploratoire</text>
    <!-- Tag badge -->
    <rect x="832" y="260" width="136" height="22" rx="11" fill="rgba(184,88,46,0.12)"/>
    <text class="mono" x="900" y="275" font-size="10" font-weight="600" letter-spacing="1.5" fill="#b8582e" text-anchor="middle">OPPORTUNITÉ</text>
  </g>

  <!-- CARD 2: 21 % Agents / analytics conv. — dark ink -->
  <g class="interactive" data-card="client-agents" tabindex="0" role="button" aria-label="21 % des clients avec des agents IA ou analytics conversationnels en production">
    <rect class="card-bg" x="640" y="308" width="500" height="100" rx="6" fill="#1e1e2a" stroke="none"/>
    <!-- Accent bar left -->
    <rect x="640" y="308" width="4" height="100" rx="2" fill="#b8582e"/>
    <!-- Percentage big -->
    <text class="display" x="666" y="365" font-size="42" font-weight="400" fill="#ffffff">21 <tspan font-size="28" fill="#b8582e">%</tspan></text>
    <!-- Label -->
    <text class="body" x="666" y="390" font-size="13" font-weight="500" fill="rgba(255,255,255,0.82)">Agents / analytics conv.</text>
    <!-- Sub-label right -->
    <text class="body" x="930" y="354" font-size="12" font-style="italic" fill="rgba(255,255,255,0.50)" text-anchor="middle">En production</text>
  </g>

  <!-- CARD 3: 18 % Copilots BI — carmine/accent -->
  <g class="interactive" data-card="client-copilots" tabindex="0" role="button" aria-label="18 % des clients avec des copilots BI déployés">
    <rect class="card-bg" x="640" y="418" width="500" height="100" rx="6" fill="#b8582e" stroke="none"/>
    <!-- Percentage big -->
    <text class="display" x="666" y="475" font-size="42" font-weight="400" fill="#ffffff">18 <tspan font-size="28" fill="rgba(255,255,255,0.65)">%</tspan></text>
    <!-- Label -->
    <text class="body" x="666" y="500" font-size="13" font-weight="500" fill="rgba(255,255,255,0.90)">Copilots BI</text>
    <!-- Sub-label right -->
    <text class="body" x="930" y="464" font-size="12" font-style="italic" fill="rgba(255,255,255,0.60)" text-anchor="middle">Assistants intégrés aux dashboards</text>
  </g>

  <!-- CARD 4: 14 % Non, pas du tout — grey -->
  <g class="interactive" data-card="client-aucun" tabindex="0" role="button" aria-label="14 % des clients sans déploiement IA — pas de projet en cours">
    <rect class="card-bg" x="640" y="528" width="500" height="62" rx="6" fill="rgba(154,156,165,0.22)" stroke="rgba(154,156,165,0.35)" stroke-width="1"/>
    <!-- Percentage -->
    <text class="display" x="666" y="567" font-size="30" font-weight="400" fill="#6b6f7c">14 <tspan font-size="20">%</tspan></text>
    <!-- Label -->
    <text class="body" x="740" y="562" font-size="13" fill="#6b6f7c">Non, pas du tout</text>
    <text class="body" x="740" y="579" font-size="12" font-style="italic" fill="#9a9ca5">Aucun projet IA client identifié</text>
  </g>

  <!-- ====================== SUB-BANNER ACCÈS IA ====================== -->
  <g class="interactive" data-card="acces-detail" tabindex="0" role="button" aria-label="Détail des accès IA chez les clients : 59 % accès limité, 27 % accès libre, 11 % bloqué">
    <text class="mono" x="900" y="614" font-size="12" font-style="italic" fill="#6b6f7c" text-anchor="middle">Accès IA : 59 % limité  |  27 % libre  |  11 % bloqué</text>
  </g>

  <!-- ====================== FOOTER CTA BANNER (full-width) ====================== -->
  <!--
    Third footer treatment: carmine (#b23b1b) — distinct from baro-01 (orange #b8582e) and baro-02 (dark ink #1e1e2a)
  -->
  <g class="interactive" data-card="cta-fenetre-opportunite" tabindex="0" role="button" aria-label="Recommandation : 27 % en POC représentent une fenêtre d'opportunité pour positionner le CoC comme accélérateur de déploiements IA chez les clients">
    <rect x="60" y="640" width="1080" height="82" rx="8" fill="#b23b1b"/>
    <!-- Eyebrow -->
    <text class="mono" x="80" y="664" font-size="11" font-weight="600" letter-spacing="3" fill="rgba(255,255,255,0.65)">RECOMMANDATION</text>
    <!-- CTA text — single line -->
    <text class="body" x="80" y="690" font-size="15" fill="#ffffff">
      <tspan font-weight="600">27 % en POC</tspan> = fenêtre d'opportunité pour positionner le CoC comme accélérateur de déploiements IA chez les clients
    </text>
    <!-- Right side: dingbat -->
    <text x="1110" y="688" font-size="24" fill="rgba(255,255,255,0.28)" text-anchor="middle">◆</text>
  </g>

</svg>
