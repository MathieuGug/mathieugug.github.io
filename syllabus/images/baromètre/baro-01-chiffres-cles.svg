<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" data-schema-id="baro-01" role="img" aria-label="Baromètre CoC Data — Chiffres clés — 103 consultants Data & Analytics interrogés">
  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Georgia', serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'Consolas', monospace; }
      .interactive { cursor: pointer; }
      .interactive:hover .card-bg { stroke: #b8582e; stroke-width: 2; }
      .interactive:focus { outline: none; }
      .interactive:focus .card-bg { stroke: #b8582e; stroke-width: 2; }
    </style>
    <!-- Subtle drop shadow for cards -->
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e1e2a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="760" fill="#faf6ec"/>

  <!-- ====================== HEADER ====================== -->
  <!-- Schema marker -->
  <text class="mono" x="60" y="54" font-size="12" font-weight="600" letter-spacing="2.5" fill="#b23b1b">SCHÉMA 01 — BAROMÈTRE</text>

  <!-- Title: CHIFFRES + CLÉS (italic accent) -->
  <text class="display" x="60" y="95" font-size="34" font-weight="400" fill="#1e1e2a">CHIFFRES <tspan font-style="italic" fill="#b8582e">CLÉS</tspan></text>

  <!-- Subtitle -->
  <text class="body" x="60" y="121" font-size="16" fill="#6b6f7c">Vue d'ensemble du baromètre — 103 consultants Data &amp; Analytics interrogés</text>

  <!-- Hairline rule -->
  <line x1="60" y1="135" x2="1140" y2="135" stroke="#1e1e2a" stroke-width="0.6"/>

  <!-- ====================== CARD GRID 3×2 ====================== -->
  <!--
    Grid layout:
    - Cards start at y=155
    - 3 columns, 2 rows
    - Card width: 340px, Card height: 200px
    - Horizontal gap: 30px
    - Column x positions: 60, 430, 800
    - Row y positions: 155, 375
    - Total grid width: 3×340 + 2×30 = 1080. Right edge: 60+1080=1140. OK.
    - Row 2 top: 155 + 200 + 20 = 375
  -->

  <!-- ===== ROW 1 ===== -->

  <!-- CARD 1: 103 Répondants -->
  <g class="interactive" data-card="103-repondants" tabindex="0" role="button" aria-label="103 répondants — Consultants Data et Analytics">
    <rect class="card-bg" x="60" y="155" width="340" height="200" rx="8" fill="#ffffff" stroke="rgba(30,30,44,0.08)" stroke-width="1" filter="url(#card-shadow)"/>
    <!-- Big number -->
    <text class="display" x="80" y="252" font-size="60" font-weight="400" fill="#1e1e2a">103</text>
    <!-- Label -->
    <text class="body" x="80" y="290" font-size="15" font-weight="500" fill="#1e1e2a">Répondants</text>
    <!-- Description -->
    <text class="body" x="80" y="311" font-size="13" font-weight="300" font-style="italic" fill="#6b6f7c">Consultants Data &amp; Analytics</text>
    <!-- Accent bar top -->
    <rect x="60" y="155" width="340" height="4" rx="2" fill="#b8582e" opacity="0.15"/>
  </g>

  <!-- CARD 2: 60% IA régulièrement+ -->
  <g class="interactive" data-card="60-pct-usage" tabindex="0" role="button" aria-label="60% utilisent l'IA au moins chaque semaine">
    <rect class="card-bg" x="430" y="155" width="340" height="200" rx="8" fill="#ffffff" stroke="rgba(30,30,44,0.08)" stroke-width="1" filter="url(#card-shadow)"/>
    <!-- Big number -->
    <text class="display" x="450" y="252" font-size="60" font-weight="400" fill="#1e1e2a">60 <tspan fill="#b8582e">%</tspan></text>
    <!-- Label -->
    <text class="body" x="450" y="290" font-size="15" font-weight="500" fill="#1e1e2a">IA régulièrement+</text>
    <!-- Description -->
    <text class="body" x="450" y="311" font-size="13" font-weight="300" font-style="italic" fill="#6b6f7c">Utilisent l'IA au moins chaque semaine</text>
    <!-- Accent bar top -->
    <rect x="430" y="155" width="340" height="4" rx="2" fill="#b8582e" opacity="0.15"/>
  </g>

  <!-- CARD 3: 3.8/5 Maturité data -->
  <g class="interactive" data-card="38-maturite" tabindex="0" role="button" aria-label="3.8 sur 5 — Score moyen de maturité data des organisations clientes">
    <rect class="card-bg" x="800" y="155" width="340" height="200" rx="8" fill="#ffffff" stroke="rgba(30,30,44,0.08)" stroke-width="1" filter="url(#card-shadow)"/>
    <!-- Big number -->
    <text class="display" x="820" y="252" font-size="60" font-weight="400" fill="#1e1e2a">3,8<tspan fill="#b8582e">/5</tspan></text>
    <!-- Label -->
    <text class="body" x="820" y="290" font-size="15" font-weight="500" fill="#1e1e2a">Maturité data</text>
    <!-- Description -->
    <text class="body" x="820" y="311" font-size="13" font-weight="300" font-style="italic" fill="#6b6f7c">Score moyen des organisations clientes</text>
    <!-- Accent bar top -->
    <rect x="800" y="155" width="340" height="4" rx="2" fill="#b8582e" opacity="0.15"/>
  </g>

  <!-- ===== ROW 2 ===== -->

  <!-- CARD 4: 3.6/5 IA bouleverse le métier -->
  <g class="interactive" data-card="36-bouleversement" tabindex="0" role="button" aria-label="3.6 sur 5 — Impact perçu significatif à radical de l'IA sur le métier">
    <rect class="card-bg" x="60" y="375" width="340" height="200" rx="8" fill="#ffffff" stroke="rgba(30,30,44,0.08)" stroke-width="1" filter="url(#card-shadow)"/>
    <!-- Big number -->
    <text class="display" x="80" y="472" font-size="60" font-weight="400" fill="#1e1e2a">3,6<tspan fill="#b8582e">/5</tspan></text>
    <!-- Label -->
    <text class="body" x="80" y="510" font-size="15" font-weight="500" fill="#1e1e2a">IA bouleverse le métier</text>
    <!-- Description -->
    <text class="body" x="80" y="531" font-size="13" font-weight="300" font-style="italic" fill="#6b6f7c">Impact perçu significatif à radical</text>
    <!-- Accent bar top -->
    <rect x="60" y="375" width="340" height="4" rx="2" fill="#b8582e" opacity="0.15"/>
  </g>

  <!-- CARD 5: 58% Génération de code -->
  <g class="interactive" data-card="58-pct-code" tabindex="0" role="button" aria-label="58% — Première tâche confiée à l'IA : génération de code">
    <rect class="card-bg" x="430" y="375" width="340" height="200" rx="8" fill="#ffffff" stroke="rgba(30,30,44,0.08)" stroke-width="1" filter="url(#card-shadow)"/>
    <!-- Big number -->
    <text class="display" x="450" y="472" font-size="60" font-weight="400" fill="#1e1e2a">58 <tspan fill="#b8582e">%</tspan></text>
    <!-- Label -->
    <text class="body" x="450" y="510" font-size="15" font-weight="500" fill="#1e1e2a">Génération de code</text>
    <!-- Description -->
    <text class="body" x="450" y="531" font-size="13" font-weight="300" font-style="italic" fill="#6b6f7c">Première tâche confiée à l'IA</text>
    <!-- Accent bar top -->
    <rect x="430" y="375" width="340" height="4" rx="2" fill="#b8582e" opacity="0.15"/>
  </g>

  <!-- CARD 6: 59% Accès IA limité -->
  <g class="interactive" data-card="59-pct-acces-limite" tabindex="0" role="button" aria-label="59% — Accès encadré ou restreint chez les clients">
    <rect class="card-bg" x="800" y="375" width="340" height="200" rx="8" fill="#ffffff" stroke="rgba(30,30,44,0.08)" stroke-width="1" filter="url(#card-shadow)"/>
    <!-- Big number -->
    <text class="display" x="820" y="472" font-size="60" font-weight="400" fill="#1e1e2a">59 <tspan fill="#b8582e">%</tspan></text>
    <!-- Label -->
    <text class="body" x="820" y="510" font-size="15" font-weight="500" fill="#1e1e2a">Accès IA limité</text>
    <!-- Description -->
    <text class="body" x="820" y="531" font-size="13" font-weight="300" font-style="italic" fill="#6b6f7c">Accès encadré ou restreint chez les clients</text>
    <!-- Accent bar top -->
    <rect x="800" y="375" width="340" height="4" rx="2" fill="#b8582e" opacity="0.15"/>
  </g>

  <!-- ====================== INSIGHT FOOTER BANNER ====================== -->
  <g class="interactive" data-card="insight-grand-compte" tabindex="0" role="button" aria-label="Insight clé : 92% sont en Grand Compte ou CAC 40 — l'IA est omniprésente mais l'accès reste encadré pour 59% des consultants">
    <rect class="card-bg" x="60" y="600" width="1080" height="118" rx="8" fill="#b8582e"/>
    <!-- Eyebrow -->
    <text class="mono" x="80" y="632" font-size="11" font-weight="600" letter-spacing="3" fill="rgba(255,255,255,0.75)">INSIGHT CLÉ</text>
    <!-- Insight text — line 1 -->
    <text class="body" x="80" y="659" font-size="15" fill="#ffffff">
      <tspan font-weight="600">92 %</tspan> sont en Grand Compte ou CAC 40 —
    </text>
    <!-- Insight text — line 2 -->
    <text class="body" x="80" y="682" font-size="15" fill="#ffffff">l'IA est omniprésente mais l'accès reste encadré pour <tspan font-weight="600">59 %</tspan> des consultants</text>
    <!-- Right side: subtle icon area -->
    <text x="1110" y="668" font-size="28" fill="rgba(255,255,255,0.3)" text-anchor="middle">◆</text>
  </g>

</svg>
