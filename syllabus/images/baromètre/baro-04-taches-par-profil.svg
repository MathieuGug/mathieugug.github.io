<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" data-schema-id="baro-04" role="img" aria-label="Baromètre CoC Data — Tâches IA par profil — génération de code 58 %, data storytelling 3 % sous-exploité">
  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Georgia', serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'Consolas', monospace; }
      .interactive { cursor: pointer; }
      .interactive:hover .bar-bg { stroke: #b8582e; stroke-width: 1.5; }
      .interactive:focus { outline: none; }
      .interactive:focus .bar-bg { stroke: #b8582e; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="760" fill="#faf6ec"/>

  <!-- ====================== HEADER ====================== -->
  <!-- Schema marker -->
  <text class="mono" x="60" y="54" font-size="12" font-weight="600" letter-spacing="2.5" fill="#b23b1b">SCHÉMA 04 — BAROMÈTRE</text>

  <!-- Title: TÂCHES IA PAR + PROFIL (italic accent) -->
  <text class="display" x="60" y="95" font-size="34" font-weight="400" fill="#1e1e2a">TÂCHES IA PAR <tspan font-style="italic" fill="#b8582e">PROFIL</tspan></text>

  <!-- Subtitle -->
  <text class="body" x="60" y="121" font-size="16" fill="#6b6f7c">La génération de code domine largement — les autres tâches révèlent les bonnes pratiques à accompagner</text>

  <!-- Hairline rule -->
  <line x1="60" y1="135" x2="1140" y2="135" stroke="#1e1e2a" stroke-width="0.6"/>

  <!-- ====================== COLUMN HEADERS — Mono 12pt 600 (differentiated from baro-02/03) ====================== -->
  <!-- Left column header -->
  <text class="mono" x="60" y="166" font-size="12" font-weight="600" letter-spacing="2.5" fill="#3b3f4d">RÉPARTITION GLOBALE DES TÂCHES IA</text>

  <!-- Right column header -->
  <text class="mono" x="640" y="166" font-size="12" font-weight="600" letter-spacing="2.5" fill="#3b3f4d">GÉNÉRATION DE CODE PAR PROFIL</text>

  <!-- Thin column header underlines -->
  <line x1="60" y1="174" x2="560" y2="174" stroke="rgba(30,30,44,0.12)" stroke-width="0.5"/>
  <line x1="640" y1="174" x2="1140" y2="174" stroke="rgba(30,30,44,0.12)" stroke-width="0.5"/>

  <!-- Vertical separator between columns -->
  <line x1="600" y1="155" x2="600" y2="590" stroke="rgba(30,30,44,0.12)" stroke-width="0.6"/>

  <!-- ====================== LEFT COLUMN — RÉPARTITION GLOBALE DES TÂCHES ====================== -->
  <!--
    6 bars, ordered per spec:
    1. Génération / débogage de code : 58 % → 220 px  (peak — sand/saturated)
    2. Pas d'IA / Non concerné       : 14 % →  53 px  (grey)
    3. Veille technologique          : 11 % →  42 px  (accent orange medium)
    4. Documentation technique       :  7 % →  27 px  (accent orange light)
    5. Livrables clients             :  7 % →  27 px  (accent orange light)
    6. Data storytelling             :  3 % →  11 px  (annotated carmine — angle mort)

    Bar x=60, max-width=380, height=28.
    Row y-starts: 192, 246, 300, 354, 408, 462
  -->

  <!-- ROW 1: Génération / débogage de code — 58 % — PEAK (sand/warm yellow saturated) -->
  <g class="interactive" data-card="tache-code" tabindex="0" role="button" aria-label="Génération et débogage de code : 58 % — tâche IA dominante, première utilisation de l'IA pour les consultants Data">
    <!-- Label -->
    <text class="body" x="60" y="203" font-size="13" fill="#3b3f4d">Génération / débogage de code</text>
    <!-- Bar background -->
    <rect class="bar-bg" x="60" y="210" width="380" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- Bar fill — 58 % → 220 px — sand/warm yellow to mark visual peak -->
    <rect x="60" y="210" width="220" height="28" rx="4" fill="#e8c97a"/>
    <!-- Value label inside bar -->
    <text class="mono" x="270" y="229" font-size="13" font-weight="700" fill="#5a3a00" text-anchor="end" dominant-baseline="middle">58 %</text>
    <!-- Star annotation for peak -->
    <text x="284" y="229" font-size="14" fill="#b8582e" dominant-baseline="middle">★</text>
  </g>

  <!-- ROW 2: Pas d'IA / Non concerné — 14 % — grey -->
  <g class="interactive" data-card="tache-pas-ia" tabindex="0" role="button" aria-label="Pas d'IA ou non concerné : 14 % — consultants sans usage IA déclaré">
    <text class="body" x="60" y="257" font-size="13" fill="#3b3f4d">Pas d'IA / Non concerné</text>
    <rect class="bar-bg" x="60" y="264" width="380" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 14 % → 53 px — grey -->
    <rect x="60" y="264" width="53" height="28" rx="4" fill="rgba(154,156,165,0.60)"/>
    <text class="mono" x="123" y="283" font-size="13" font-weight="500" fill="#6b6f7c" text-anchor="start" dominant-baseline="middle">  14 %</text>
  </g>

  <!-- ROW 3: Veille technologique — 11 % — accent orange medium -->
  <g class="interactive" data-card="tache-veille" tabindex="0" role="button" aria-label="Veille technologique : 11 % — usage IA pour la veille et la curation d'information">
    <text class="body" x="60" y="311" font-size="13" fill="#3b3f4d">Veille technologique</text>
    <rect class="bar-bg" x="60" y="318" width="380" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 11 % → 42 px — accent orange medium -->
    <rect x="60" y="318" width="42" height="28" rx="4" fill="#b8582e" opacity="0.72"/>
    <text class="mono" x="112" y="337" font-size="13" font-weight="500" fill="#1e1e2a" text-anchor="start" dominant-baseline="middle">  11 %</text>
  </g>

  <!-- ROW 4: Documentation technique — 7 % — accent orange light -->
  <g class="interactive" data-card="tache-doc" tabindex="0" role="button" aria-label="Documentation technique : 7 % — usage IA pour la rédaction de documentation">
    <text class="body" x="60" y="365" font-size="13" fill="#3b3f4d">Documentation technique</text>
    <rect class="bar-bg" x="60" y="372" width="380" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 7 % → 27 px — accent orange light -->
    <rect x="60" y="372" width="27" height="28" rx="4" fill="#b8582e" opacity="0.48"/>
    <text class="mono" x="97" y="391" font-size="13" font-weight="500" fill="#1e1e2a" text-anchor="start" dominant-baseline="middle">  7 %</text>
  </g>

  <!-- ROW 5: Livrables clients — 7 % — accent orange light -->
  <g class="interactive" data-card="tache-livrables" tabindex="0" role="button" aria-label="Livrables clients : 7 % — usage IA pour la production de livrables à destination des clients">
    <text class="body" x="60" y="419" font-size="13" fill="#3b3f4d">Livrables clients</text>
    <rect class="bar-bg" x="60" y="426" width="380" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 7 % → 27 px — accent orange light -->
    <rect x="60" y="426" width="27" height="28" rx="4" fill="#b8582e" opacity="0.48"/>
    <text class="mono" x="97" y="445" font-size="13" font-weight="500" fill="#1e1e2a" text-anchor="start" dominant-baseline="middle">  7 %</text>
  </g>

  <!-- ROW 6: Data storytelling — 3 % — carmine annotation "angle mort" -->
  <g class="interactive" data-card="tache-storytelling" tabindex="0" role="button" aria-label="Data storytelling : 3 % — tâche sous-exploitée, angle mort à accompagner dans les formations">
    <text class="body" x="60" y="473" font-size="13" fill="#3b3f4d">Data storytelling</text>
    <rect class="bar-bg" x="60" y="480" width="380" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 3 % → 11 px — very small, carmine underline emphasis -->
    <rect x="60" y="480" width="11" height="28" rx="3" fill="rgba(154,156,165,0.50)"/>
    <text class="mono" x="81" y="499" font-size="13" font-weight="500" fill="#1e1e2a" text-anchor="start" dominant-baseline="middle">3 %</text>
    <!-- Carmine "angle mort" annotation -->
    <text class="mono" x="120" y="499" font-size="11" font-weight="600" fill="#b23b1b" dominant-baseline="middle">← angle mort</text>
    <!-- Carmine underline under bar area (sous-exploité marker) -->
    <line x1="60" y1="510" x2="200" y2="510" stroke="#b23b1b" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.55"/>
  </g>

  <!-- ====================== RIGHT COLUMN — GÉNÉRATION DE CODE PAR PROFIL ====================== -->
  <!--
    5 bars, ordered by descending value:
    Data Scientist / ML      : 84 % (16/19) → 319 px  — full accent orange
    Architecte / Tech Lead   : 67 %  (4/6)  → 255 px  — accent orange 80%
    Data Analyst / BI        : 60 % (29/48) → 228 px  — accent orange 70%
    Data Engineer            : 44 %  (7/16) → 167 px  — accent orange 55%
    Manager / Chef de projet : 33 %  (2/6)  → 125 px  — accent orange 40%

    Bar x=640, max-width=380, height=28.
    Row y-starts: 192, 252, 312, 372, 432
    Label y offset: 8px above bar
  -->

  <!-- ROW 1: Data Scientist / ML — 84 % (16/19) — full accent orange -->
  <g class="interactive" data-card="code-ds-ml" tabindex="0" role="button" aria-label="Data Scientist ou Machine Learning : 84 % utilisent l'IA pour générer du code, soit 16 sur 19 répondants — profil le plus utilisateur">
    <text class="body" x="640" y="203" font-size="13" fill="#3b3f4d">Data Scientist / ML</text>
    <rect class="bar-bg" x="640" y="210" width="380" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 84 % → 319 px — full accent -->
    <rect x="640" y="210" width="319" height="28" rx="4" fill="#b8582e"/>
    <!-- Percentage inside bar -->
    <text class="mono" x="950" y="229" font-size="13" font-weight="600" fill="#ffffff" text-anchor="end" dominant-baseline="middle">84 %<tspan font-size="11" font-weight="400" fill="rgba(255,255,255,0.75)"> (16/19)</tspan></text>
  </g>

  <!-- ROW 2: Architecte / Tech Lead — 67 % (4/6) — accent 80% -->
  <g class="interactive" data-card="code-architecte" tabindex="0" role="button" aria-label="Architecte ou Tech Lead : 67 % utilisent l'IA pour générer du code, soit 4 sur 6 répondants">
    <text class="body" x="640" y="257" font-size="13" fill="#3b3f4d">Architecte / Tech Lead</text>
    <rect class="bar-bg" x="640" y="264" width="380" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 67 % → 255 px — accent 80% -->
    <rect x="640" y="264" width="255" height="28" rx="4" fill="#b8582e" opacity="0.80"/>
    <text class="mono" x="887" y="283" font-size="13" font-weight="600" fill="#ffffff" text-anchor="end" dominant-baseline="middle">67 %<tspan font-size="11" font-weight="400" fill="rgba(255,255,255,0.75)"> (4/6)</tspan></text>
  </g>

  <!-- ROW 3: Data Analyst / BI — 60 % (29/48) — accent 70% -->
  <g class="interactive" data-card="code-da-bi" tabindex="0" role="button" aria-label="Data Analyst ou BI : 60 % utilisent l'IA pour générer du code, soit 29 sur 48 répondants — profil majoritaire en volume">
    <text class="body" x="640" y="311" font-size="13" fill="#3b3f4d">Data Analyst / BI</text>
    <rect class="bar-bg" x="640" y="318" width="380" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 60 % → 228 px — accent 70% -->
    <rect x="640" y="318" width="228" height="28" rx="4" fill="#b8582e" opacity="0.70"/>
    <text class="mono" x="860" y="337" font-size="13" font-weight="600" fill="#ffffff" text-anchor="end" dominant-baseline="middle">60 %<tspan font-size="11" font-weight="400" fill="rgba(255,255,255,0.75)"> (29/48)</tspan></text>
  </g>

  <!-- ROW 4: Data Engineer — 44 % (7/16) — accent 55% -->
  <g class="interactive" data-card="code-de" tabindex="0" role="button" aria-label="Data Engineer : 44 % utilisent l'IA pour générer du code, soit 7 sur 16 répondants — usage plus modéré">
    <text class="body" x="640" y="365" font-size="13" fill="#3b3f4d">Data Engineer</text>
    <rect class="bar-bg" x="640" y="372" width="380" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 44 % → 167 px — accent 55% -->
    <rect x="640" y="372" width="167" height="28" rx="4" fill="#b8582e" opacity="0.55"/>
    <text class="mono" x="799" y="391" font-size="13" font-weight="600" fill="#ffffff" text-anchor="end" dominant-baseline="middle">44 %<tspan font-size="11" font-weight="400" fill="rgba(255,255,255,0.75)"> (7/16)</tspan></text>
  </g>

  <!-- ROW 5: Manager / Chef de projet — 33 % (2/6) — accent 40% -->
  <g class="interactive" data-card="code-manager" tabindex="0" role="button" aria-label="Manager ou Chef de projet : 33 % utilisent l'IA pour générer du code, soit 2 sur 6 répondants — usage le plus faible">
    <text class="body" x="640" y="419" font-size="13" fill="#3b3f4d">Manager / Chef de projet</text>
    <rect class="bar-bg" x="640" y="426" width="380" height="28" rx="4" fill="rgba(184,88,46,0.10)" stroke="none"/>
    <!-- 33 % → 125 px — accent 40% -->
    <rect x="640" y="426" width="125" height="28" rx="4" fill="#b8582e" opacity="0.40"/>
    <text class="mono" x="757" y="445" font-size="13" font-weight="500" fill="#1e1e2a" text-anchor="end" dominant-baseline="middle">33 %<tspan font-size="11" fill="#9a9ca5"> (2/6)</tspan></text>
  </g>

  <!-- Annotation right column: asymmetry DS/ML vs Manager -->
  <line x1="1037" y1="214" x2="1037" y2="452" stroke="rgba(30,30,44,0.18)" stroke-width="0.8"/>
  <line x1="1031" y1="214" x2="1037" y2="214" stroke="rgba(30,30,44,0.18)" stroke-width="0.8"/>
  <line x1="1031" y1="452" x2="1037" y2="452" stroke="rgba(30,30,44,0.18)" stroke-width="0.8"/>
  <text class="mono" x="1044" y="328" font-size="10" font-weight="500" fill="#6b6f7c" dominant-baseline="middle">84 % → 33 %</text>
  <text class="mono" x="1044" y="342" font-size="10" font-weight="500" fill="#6b6f7c" dominant-baseline="middle">écart x2,5</text>

  <!-- ====================== FOOTER BANNER — ENSEIGNEMENT CLÉ ====================== -->
  <!--
    4th treatment: subtle warm beige with darker text — most discreet of the 4 banners.
    baro-01 = orange, baro-02 = dark ink, baro-03 = carmine, baro-04 = warm beige 2-tone.
  -->
  <g class="interactive" data-card="enseignement-cle" tabindex="0" role="button" aria-label="Enseignement clé : La génération de code concentre 58 % des usages IA, mais les tâches à plus forte valeur ajoutée restent sous-exploitées — accompagner les bonnes pratiques au-delà du code">
    <!-- Banner background: warm beige 2-tone (left darker, right lighter) -->
    <rect x="60" y="600" width="1080" height="118" rx="8" fill="#ede4d3"/>
    <!-- Left accent bar -->
    <rect x="60" y="600" width="5" height="118" rx="2" fill="#b8582e" opacity="0.45"/>
    <!-- Eyebrow -->
    <text class="mono" x="82" y="630" font-size="11" font-weight="600" letter-spacing="3" fill="#b23b1b" opacity="0.80">ENSEIGNEMENT CLÉ</text>
    <!-- Text line 1 -->
    <text class="body" x="82" y="657" font-size="15" fill="#3b3f4d">
      La génération de code concentre <tspan font-weight="600" fill="#1e1e2a">58 %</tspan> des usages IA, mais les tâches à plus forte valeur ajoutée
    </text>
    <!-- Text line 2 -->
    <text class="body" x="82" y="680" font-size="15" fill="#3b3f4d">
      (data storytelling, exploration, conception dashboards) restent <tspan font-weight="600" fill="#b23b1b">sous-exploitées</tspan>
    </text>
    <!-- Text line 3 -->
    <text class="body" x="82" y="703" font-size="14" font-style="italic" fill="#6b6f7c">
      → accompagner les bonnes pratiques au-delà du code
    </text>
    <!-- Right dingbat -->
    <text x="1108" y="668" font-size="26" fill="rgba(184,88,46,0.22)" text-anchor="middle">◆</text>
  </g>

</svg>
