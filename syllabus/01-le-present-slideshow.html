  "baro-03": {

      "body": "<p>L'usage hebdomadaire est le premier niveau de régularité. Une fois par semaine, pour une tâche précise : un SQL complexe, une synthèse de document, un script ponctuel. Ce n'est pas encore une routine quotidienne, mais c'est suffisant pour calibrer la confiance et identifier les cas d'usage récurrents.</p><p>C'est le niveau cible pour la première semaine du syllabus : identifier une tâche hebdomadaire récurrente, l'automatiser avec l'IA, mesurer le gain. Un seul cas d'usage régulier vaut plus que dix essais ponctuels.</p>"

  "baro-04": {
    "tache-code": {
      "eyebrow": "TÂCHE · CODE",
      "title": "Génération de code — 58 %",
      "body": "<p>58 % des répondants citent la génération de code comme leur première tâche confiée à l'IA. C'est le cas d'usage le plus direct et le plus mesurable : le code tourne ou il ne tourne pas. La boucle de feedback est courte.</p><p>Les cas typiques : écrire du SQL ad hoc, générer des tests unitaires, scaffolder un script Python, refactorer une fonction. Ce sont des tâches où l'IA est véritablement plus rapide qu'un humain, et où la vérification reste simple.</p>"
    },
    "tache-pas-ia": {
      "eyebrow": "TÂCHE · SANS IA",
      "title": "Ce qu'on ne confie pas à l'IA",
      "body": "<p>Toutes les tâches ne sont pas candidates à la délégation IA. Les consultants identifient clairement les zones où l'IA n'aide pas ou nuit : la négociation client (l'IA ne lit pas la salle), la conception stratégique originale (elle optimise, elle n'invente pas de thèse), la relation humaine (feedback délicat, gestion de crise).</p><p>Savoir ce qu'on ne délègue <em>pas</em> est aussi important que savoir ce qu'on délègue. Un consultant qui sait poser cette limite est plus crédible qu'un qui dit 'l'IA fait tout'.</p>"
    },
    "tache-veille": {
      "eyebrow": "TÂCHE · VEILLE",
      "title": "Veille technologique — gain de temps majeur",
      "body": "<p>La veille est l'une des tâches les plus chronophages et les moins valorisées — lire, filtrer, synthétiser des dizaines de sources pour en extraire l'essentiel. L'IA change radicalement ce rapport : synthèse de PDF en 5 bullets, comparaison de sources contradictoires, identification des points saillants d'un rapport de 80 pages.</p><p>Le gain est réel et immédiat. La vigilance requise : l'IA peut halluciner des faits dans les synthèses, et peut manquer le sous-texte ou le contexte implicite d'un article. La veille IA demande toujours une validation humaine des points les plus structurants.</p>"
    },
    "tache-doc": {
      "eyebrow": "TÂCHE · DOCUMENTATION",
      "title": "Documentation — la tâche que personne ne fait",
      "body": "<p>La documentation est universellement reconnue comme nécessaire et universellement négligée faute de temps. L'IA change ce rapport : documenter une fonction, un pipeline, une décision d'architecture devient une tâche de quelques minutes plutôt que de quelques heures.</p><p>Pattern gagnant : générer la documentation en même temps que le code, pas après. L'IA produit un premier jet à partir du code existant, l'humain corrige et enrichit. Résultat : des codebases enfin documentés, des onboardings accélérés, une dette technique qui cesse de s'accumuler.</p>"
    },
    "tache-livrables": {
      "eyebrow": "TÂCHE · LIVRABLES",
      "title": "Production de livrables — le cas consulting",
      "body": "<p>Les livrables consulting (présentations, rapports, notes de cadrage, compte-rendus) sont des candidats naturels à l'assistance IA — à condition de ne pas confondre assistance et délégation totale. L'IA produit la structure, les transitions, le remplissage des sections standard. L'humain apporte le point de vue, les nuances, le jugement.</p><p>Le risque : des livrables qui ont l'air professionnels mais manquent de substance originale. La bonne pratique : utiliser l'IA pour libérer du temps sur la forme, et réinvestir ce temps sur le fond.</p>"
    },
    "tache-storytelling": {
      "eyebrow": "TÂCHE · STORYTELLING",
      "title": "Storytelling data — la limite de l'IA",
      "body": "<p>Le storytelling data (construire une narration autour d'analyses, faire parler les données à une audience non-technique) est une compétence où l'IA est un assistant, pas un auteur. Elle peut suggérer des structures, identifier des angles, produire des brouillons. Elle ne peut pas remplacer la compréhension du contexte client et de l'audience.</p><p>C'est une zone de différenciation forte pour le consultant : les algorithmes vont continuer à s'améliorer sur la forme, mais la compréhension de ce qui va résonner avec une audience spécifique reste humaine.</p>"
    },
    "code-ds-ml": {
      "eyebrow": "CODE PAR PROFIL · DATA SCIENTIST",
      "title": "Data Scientists — les plus grands codeurs avec l'IA",
      "body": "<p>Les Data Scientists sont le profil qui code le plus avec l'aide de l'IA. EDA automatisée, génération de notebooks, tests d'hypothèses rapides, comparaisons de modèles en parallèle. Leur stack technique (Python, notebooks, frameworks ML) se prête particulièrement bien aux coding agents.</p><p>Leur usage avancé : déléguer des tâches complètes à des sub-agents (un agent par hyperparamètre à tester), utiliser MCP pour connecter directement des datastores, et automatiser les pipelines de validation avec des skills récurrentes.</p>"
    },
    "code-architecte": {
      "eyebrow": "CODE PAR PROFIL · ARCHITECTE",
      "title": "Architectes — PoC et validation",
      "body": "<p>Les architectes utilisent les coding agents principalement pour les PoC (prototyper une stack en quelques heures) et la validation (vérifier qu'un pattern fonctionne dans leur contexte). Leur rapport au code est plus ponctuel que quotidien.</p><p>Leur usage distinctif : générer de la documentation architecturale (diagrammes, ADR, fiches de décision) et comparer des alternatives techniques rapidement. L'IA leur permet d'évaluer plus de candidats en moins de temps — ce qui améliore la qualité des décisions architecturales.</p>"
    },
    "code-da-bi": {
      "eyebrow": "CODE PAR PROFIL · DA / BI",
      "title": "DA / BI — sélectifs sur le code",
      "body": "<p>Les Data Analysts et BI developers sont plus sélectifs sur le code que les autres profils techniques. Ils maîtrisent déjà leur SQL et savent précisément quand l'IA apporte de la valeur (requêtes complexes, transformations inhabituelles) et quand ils vont plus vite sans elle (requêtes standards qu'ils écrivent en 30 secondes).</p><p>Leur usage principal : le SQL ad hoc sur des structures inconnues, la génération de DAX complexe, le scaffolding de dashboards Streamlit exploratoires. Pas de délégation aveugle — une collaboration outillée.</p>"
    },
    "code-de": {
      "eyebrow": "CODE PAR PROFIL · DATA ENGINEER",
      "title": "Data Engineers — refactos et tests",
      "body": "<p>Les Data Engineers utilisent les coding agents principalement pour les refactos et la génération de tests. Deux tâches chronophages, peu valorisées, mais critiques pour la qualité des pipelines. L'IA change l'équation : refactorer un script Python de 200 lignes prend 20 minutes au lieu de 2 heures, et les tests sont générés en même temps que le code.</p><p>Leur défi : les environnements de production contraints. Certains travaillent sur des systèmes où l'IA n'a pas accès aux données (confidentialité) ou aux outils (politique SI). Le sandboxing (Codex CLI) devient alors un argument clé pour débloquer l'accès.</p>"
    },
    "code-manager": {
      "eyebrow": "CODE PAR PROFIL · MANAGER",
      "title": "Managers — specs et revues",
      "body": "<p>Les managers qui ont arrêté de coder au quotidien retrouvent une capacité d'interaction avec le code grâce à l'IA. Pas pour produire eux-mêmes, mais pour lire et évaluer : comprendre un diff, demander une explication d'une fonction complexe, demander un audit rapide d'un repo legacy.</p><p>Leur usage principal : le brief de specs (transformer des notes de cadrage en spécifications structurées) et la revue de code assistée (demander à l'IA d'identifier les zones à risque d'un diff avant la revue humaine). Ce n'est pas du code — c'est de la supervision augmentée.</p>"

    "enseignement-cle": {
      "eyebrow": "ENSEIGNEMENT CLÉ",
      "title": "L'IA amplifie, elle ne remplace pas",
      "body": "<p>La carte des tâches par profil enseigne une chose : l'IA amplifie ce que le consultant sait déjà faire bien, elle ne comble pas ce qu'il ne sait pas faire. Un DA/BI qui ne maîtrise pas son SQL ne sera pas aidé par un agent SQL — il ne saura pas valider les outputs.</p><p>C'est l'argument central pour la formation : avant d'automatiser, il faut maîtriser. Le syllabus est conçu dans cet ordre — comprendre le présent (session 1), comprendre le raisonnement (session 2), puis organiser et décider (sessions 3 et 4).</p>"

  },

      "eyebrow": "SESSION 1 · LE PRÉSENT",
      "title": "Le présent — où en sommes-nous ?",
      "body": "<p>Session 1 couvre l'état de l'art en 2026 : les trois régimes des coding agents (autocomplete → IDE → agent), le comparatif des outils majeurs (Claude Code, Codex CLI, GitHub Copilot), et les chiffres du baromètre CoC Data — 103 consultants, leurs usages, leurs contraintes.</p><p>Objectif : ancrer chaque participant dans une réalité mesurée, pas dans des extrapolations. Le présent est déjà là — 60 % de réguliers, 58 % qui codent avec l'IA, 59 % contraints côté clients. C'est le terrain sur lequel on joue.</p>"

      "eyebrow": "SESSION 2 · LE RAISONNEMENT",
      "title": "Le raisonnement — comment les LLMs pensent",
      "body": "<p>Session 2 ouvre la boîte noire : comment un LLM raisonne, quelles sont ses limites structurelles (hallucinations, confabulations, biais de données d'entraînement), et comment construire des prompts qui tirent le meilleur du modèle.</p><p>Objectif pratique : calibrer la confiance de façon rationnelle. Pas de magie, pas de méfiance aveugle — comprendre le mécanisme pour savoir quand faire confiance, quand vérifier, et quand ne pas déléguer.</p>"

      "body": "<p>Session 3 passe de l'individuel au collectif : comment organiser son travail avec les agents (CLAUDE.md, skills, mémoire), comment partager ces outils avec une équipe, et comment gérer la transition entre outils personnels et contexte client.</p><p>Objectif : transformer l'adoption individuelle en pratique d'équipe. Une skill partagée dans un repo git vaut plus que dix tentatives individuelles isolées.</p>"

      "eyebrow": "SESSION 4 · LA DÉCISION",

      "body": "<p>Les quatre sessions forment un arc progressif : <strong>Voir</strong> (session 1 — le présent, les outils, les chiffres), <strong>Comprendre</strong> (session 2 — le raisonnement, les limites), <strong>Organiser</strong> (session 3 — pratique individuelle et collective), <strong>Décider</strong> (session 4 — gouvernance et impact).</p><p>Chaque session est autonome mais s'appuie sur la précédente. Un participant peut rejoindre en session 3 — mais il manquera les fondations du raisonnement qui expliquent pourquoi certaines pratiques organisationnelles sont nécessaires.</p>"

  /* ── Coding-agents schemas (verbatim from 20260512-coding-agents-slideshow.html) ── */
  "schema-01": {
    "regime-autocomplete": {
      "eyebrow": "RÉGIME 1 · 2018",
      "title": "Autocomplete — la fin de la ligne",
      "body": "<p>Le premier régime, popularisé par GitHub Copilot v1 en 2021 (et Tabnine avant lui). L'outil prédit la suite du curseur à partir d'un petit fenêtrage local — quelques centaines de tokens autour du point d'insertion. Latence à la milliseconde, livrable au fragment.</p><p>Son terrain d'élection : boucles, getters/setters, signatures de fonction, imports. Hors de ce périmètre, il décroche : il ne sait pas que la fonction qu'il propose existe déjà dans un autre fichier, ni que la convention du projet veut un nom différent. <strong>Pas de mémoire, pas de boucle, pas de livrable structuré.</strong></p>"
    },
    "regime-ide": {
      "eyebrow": "RÉGIME 2 · 2022",
      "title": "Assistant IDE — réponse au fichier ouvert",
      "body": "<p>Le panneau de chat dans l'éditeur : Copilot Chat, JetBrains AI Assistant, Cursor Chat avant le tournant agent. Le contexte s'élargit au fichier ouvert, parfois au projet via embeddings ; la boucle passe à la seconde ; le livrable devient une réponse texte ou un patch local proposé.</p><p>Toujours dans la conversation, jamais dans l'action. L'IDE répond, le développeur applique. C'est utile pour comprendre un bout de code obscur, refactorer une fonction isolée, écrire un docstring. <strong>Insuffisant dès que la tâche traverse plusieurs fichiers ou demande d'observer une sortie pour itérer.</strong></p>"
    },
    "regime-agent": {
      "eyebrow": "RÉGIME 3 · 2025",
      "title": "Coding agent — le projet en délégation",
      "body": "<p>La rupture. L'agent accède au système de fichiers, lance des commandes shell, observe leurs sorties, lit ce qu'il a écrit lui-même, modifie sa stratégie. Sa fenêtre de contexte se compte en centaines de milliers de tokens, sa boucle en dizaines de minutes, son livrable en pull request ouverte.</p><p>Ce n'est pas un assistant plus rapide. <mark>C'est un délégué.</mark> Quand on lui demande de fixer un bug, il ne propose pas un diff : il lit le repo, identifie le fichier, écrit le fix, lance les tests, propose un commit. La distinction avec ChatGPT n'est pas de modèle — c'est de régime de travail. Toute la suite du dossier découle de cette bascule.</p>"
    }
  },

  "schema-04": {
    "cell-claude-philo": {
      "eyebrow": "CLAUDE CODE · PHILO",
      "title": "Le terminal comme contexte universel",
      "body": "<p>Habitat : terminal. Dépend d'un dossier + un shell + une boucle. L'IDE n'est pas un prérequis — Claude Code tourne dans iTerm, VS Code intégré, ou un Tmux distant pareillement.</p><p>Conséquence philosophique : <strong>l'agent n'est pas un outil de développeur</strong>, c'est un outil pour qui que ce soit qui sait organiser son travail en dossiers, fichiers et commandes. C'est la condition de possibilité de la pyramide §5 — étage transverse, data quotidien, data expert. La même mécanique sert un consultant qui synthétise des PDF et un data engineer qui refactore un pipeline dbt.</p>"
    },
    "cell-codex-philo": {
      "eyebrow": "CODEX CLI · PHILO",
      "title": "Lightweight, sandbox-first",
      "body": "<p>Annoncé le 16 avril 2025 comme <em>« lightweight, open source coding agent that runs locally in your terminal »</em>. Apache 2.0, distribué via npm et Homebrew. Codebase réécrite à <strong>96% en Rust</strong> mi-2025 — latence (suppression du GC), packaging air-gapped, fin de la dépendance Node v22+.</p><p>La philosophie diffère sur un axe : la sécurité par isolation OS plutôt que par approbations. C'est explicite dans la doc : <em>« Codex uses platform-native enforcement on each OS »</em>. Détail important : en mode <code>workspace-write</code> (défaut), le réseau est désactivé — un cran de défense que Claude Code ne propose pas natif.</p>"
    },
    "cell-copilot-philo": {

const modalRoot = document.getElementById('modal-root');
const modalEyebrow = document.getElementById('modal-eyebrow');
const modalTitle = document.getElementById('modal-title');
const modalBody = document.getElementById('modal-body');
let lastFocused = null;

function openModal(eyebrow, title, body) {
  lastFocused = document.activeElement;
  modalEyebrow.textContent = eyebrow || '';
  modalTitle.innerHTML = title || '';
  modalBody.innerHTML = body || '';
  // Patch des références [N] en liens vers les sources
  const bodyEl = document.getElementById('modal-body');
  if (bodyEl) {
    bodyEl.innerHTML = bodyEl.innerHTML.replace(/\[(\d+)\]/g, (m, n) => `<a href="#" class="source-ref" data-source-num="${n}">[${n}]</a>`);
    bodyEl.querySelectorAll('.source-ref').forEach(a => {
      a.addEventListener('click', (ev) => {
        ev.preventDefault();
        const num = parseInt(a.dataset.sourceNum, 10);
        closeModal();
        flashSource(num);
      });
    });
  }
  modalRoot.hidden = false;
  document.body.classList.add('modal-open');
  document.body.style.overflow = '';
  modalRoot.querySelector('.modal-close')?.focus();
}

/**
 * openModalStack — Affiche plusieurs cards SCHEMAS empilées dans une seule
 * modale (séparateurs visuels entre chaque). Utilisé quand un step combine
 * 2-4 data-cards thématiquement cohérents pour réduire le nombre de steps.
 * cards = [{eyebrow, title, body}]
 * groupTitle / groupEyebrow facultatifs : si fournis, affichés une seule fois en haut.
 */
function openModalStack(cards, groupEyebrow, groupTitle) {
  if (!cards || cards.length === 0) return;
  if (cards.length === 1) {
    return openModal(cards[0].eyebrow, cards[0].title, cards[0].body);
  }
  const stackedBody = cards.map((c, i) => {
    const sep = i > 0 ? '<hr class="modal-stack-sep" aria-hidden="true">' : '';
    return `${sep}<div class="modal-substack"><p class="modal-substack-eyebrow">${c.eyebrow || ''}</p><h4 class="modal-substack-title">${c.title || ''}</h4><div class="modal-substack-body">${c.body || ''}</div></div>`;
  }).join('');
  openModal(groupEyebrow || '', groupTitle || '', stackedBody);
}

function flashSource(num) {
  toggleSources(true);
  setTimeout(() => {
    const li = document.querySelector(`#sources-list li[data-num="${num}"]`);
    if (!li) return;
    li.scrollIntoView({ behavior: 'smooth', block: 'center' });
    li.classList.add('flash');
    setTimeout(() => li.classList.remove('flash'), 1500);
  }, 100);
}

function closeModal() {
  const root = document.getElementById('modal-root');
  if (!root) return;
  root.hidden = true;
  document.body.classList.remove('modal-open');
  __modalAutoActive = false;
  __currentModalCardId = null;
  lastFocused?.focus?.();
}

let state = { sceneIndex: 0, stepIndex: 0 };
const stage = document.getElementById('stage');

function applyStepStyles(scene, step) {
  const svg = stage.querySelector('svg');
  if (!svg) return;
  svg.querySelectorAll('[data-step-state]').forEach(el => el.removeAttribute('data-step-state'));
  if (step.fullView) { return; }
  (step.dim || []).forEach(sel => svg.querySelectorAll(sel).forEach(el => el.setAttribute('data-step-state', 'dim')));
  (step.hidden || []).forEach(sel => svg.querySelectorAll(sel).forEach(el => el.setAttribute('data-step-state', 'hidden')));
  (step.highlight || []).forEach(sel => svg.querySelectorAll(sel).forEach(el => el.setAttribute('data-step-state', 'active')));
  const focusing = ((step.dim && step.dim.length) || (step.hidden && step.hidden.length)) && step.highlight && step.highlight.length && !step.fullView;
  if (focusing) {
    const vb = svg.viewBox && svg.viewBox.baseVal;
    const footerThreshold = vb && vb.width ? vb.y + vb.height - Math.min(120, vb.height * 0.18) : Infinity;
    svg.querySelectorAll(':scope > *').forEach(el => {
      const ln = el.localName;
      if (ln === 'defs' || ln === 'style' || ln === 'metadata' || ln === 'title' || ln === 'desc') return;
      if (el.classList && el.classList.contains('svg-header')) return;
      if (el.getAttribute('data-step-state') === 'active') return;
      if (ln === 'text') {
        let yPos = parseFloat(el.getAttribute('y') || '');
        if (!Number.isFinite(yPos)) { try { const bb = el.getBBox(); if (bb) yPos = bb.y; } catch(e) {} }
        if (Number.isFinite(yPos) && yPos >= footerThreshold && !el.hasAttribute('data-step-state')) el.setAttribute('data-step-state', 'hidden');
      } else if (!el.hasAttribute('data-step-state')) {
        el.setAttribute('data-step-state', 'dim');
      }
    });
  }
}

function renderTimeline(){
  const tl=document.getElementById('timeline');if(!tl)return;
  tl.innerHTML=SCENES.map((scene,i)=>{
    const v=i<state.sceneIndex,c=i===state.sceneIndex,cls=['seg'];
    if(scene.type==='punchline')cls.push('punchline');
    if(scene.type==='outro')cls.push('outro');
    if(v)cls.push('visited');if(c)cls.push('current');
    let f=0;
    if(c&&scene.steps&&scene.steps.length>1)f=Math.round((state.stepIndex/(scene.steps.length-1))*100);
    else if(v)f=100;
    const lbl=(i+1).toString().padStart(2,'0')+' · '+(scene.title||(scene.type==='punchline'?'Respiration':'Outro'));
    return '<div class="seg '+cls.join(' ')+'" data-index="'+i+'"><div class="fill" style="height:'+f+'%;width:'+f+'%;"></div><div class="label">'+lbl+'</div></div>';
  }).join('');
}

function updateSceneTitleBar(scene){
  const bar=document.getElementById('scene-title-bar');if(!bar)return;
  const num=(state.sceneIndex+1).toString().padStart(2,'0'),title=scene.title||'';
  if(!title){bar.innerHTML='';return;}
  bar.innerHTML='<span class="num">'+num+'</span><span class="title">'+title+'</span>';
}

function render(){
  const scene=SCENES[state.sceneIndex];if(!scene)return;
  updateSceneTitleBar(scene);
  if(scene.type==='punchline'){
    stage.innerHTML='<section class="scene-punchline" role="group"><div class="body">'+scene.body+'</div>'+(scene.attribution?'<div class="attribution">'+scene.attribution+'</div>':'')+'</section>';
    renderTimeline();return;
  }
  if(scene.type==='outro'){
    stage.innerHTML='<section class="scene-outro" role="group"><div class="eyebrow">Vous avez parcouru</div><h2>'+(scene.outroTitle||'')+'</h2><div class="body">'+scene.body+'</div><div class="ctas" data-no-advance><a class="cta-primary" href="'+scene.cta.href+'">'+scene.cta.label+'</a><a class="cta-secondary" href="'+scene.secondary.href+'">'+scene.secondary.label+'</a></div><button class="restart" data-no-advance type="button" onclick="gotoScene(0)">↺ Recommencer</button><div class="disclosure">Format co-écrit avec l\'aide d\'une IA</div></section>';
    renderTimeline();return;
  }
  if(scene.type==='schema'){
    const svgEl=document.querySelector('#schemas svg[data-schema-id="'+scene.schemaId+'"]');
    const svgClone=svgEl?svgEl.outerHTML:'<div style="color:red">SVG '+scene.schemaId+' introuvable</div>';
    let step=scene.steps[state.stepIndex]||{caption:''};
    if(__pendingRecap)step=Object.assign({},step,{fullView:true});
    stage.innerHTML='<section class="schema-host" role="group"><div class="schema-wrapper figure" style="position:relative;width:100%;max-width:100%;">'+svgClone+'<button class="zoom-btn" type="button" aria-label="Zoom plein écran" data-no-advance>⛶</button></div><div class="caption" aria-live="polite">'+step.caption+'</div></section>';
    applyStepStyles(scene,step);
    if(step.fullView&&!document.getElementById('modal-root').hidden)closeModal();
    if(step.modalAuto&&!step.fullView){
      const schKey=scene.schemaId||null;
      const bucket=schKey?(SCHEMAS?.[schKey]||null):null;
      if(bucket){
        const cardIds=Array.isArray(step.modalAuto)?step.modalAuto:[step.modalAuto];
        const cards=cardIds.map(id=>bucket[id]).filter(Boolean);
        if(cards.length>0){
          setTimeout(()=>{
            openModalStack(cards,step.modalGroupEyebrow,step.modalGroupTitle);
            __modalAutoActive=true;
          },220);
        }
      }
    }
    renderTimeline();return;
  }
}

let __transitioning=false, __pendingRecap=false;
function isFocusStep(step){return step&&((step.dim&&step.dim.length)||(step.hidden&&step.hidden.length))&&step.highlight&&step.highlight.length&&!step.fullView;}

async function gotoScene(index){
  if(index<0||index>=SCENES.length||__transitioning)return;
  __transitioning=true;__pendingRecap=false;
  stage.classList.add('fading-out');
  await new Promise(r=>setTimeout(r,FADE_MS));
  state.sceneIndex=index;state.stepIndex=0;render();
  stage.classList.remove('fading-out');
  await new Promise(r=>setTimeout(r,FADE_MS));
  __transitioning=false;
}

function advance(){
  if(__transitioning)return;
  const scene=SCENES[state.sceneIndex];
  const lastStep=(scene.steps&&scene.steps.length>0)?scene.steps.length-1:0;
  if(state.stepIndex<lastStep){state.stepIndex++;__pendingRecap=false;render();return;}
  if(!__pendingRecap&&scene.type==='schema'&&state.sceneIndex<SCENES.length-1&&isFocusStep(scene.steps&&scene.steps[lastStep])){__pendingRecap=true;render();return;}
  __pendingRecap=false;
  if(state.sceneIndex<SCENES.length-1)gotoScene(state.sceneIndex+1);
}

function retreat(){
  if(__transitioning)return;
  if(__pendingRecap){__pendingRecap=false;render();return;}
  if(state.stepIndex>0){state.stepIndex--;render();}
  else if(state.sceneIndex>0){
    const pS=SCENES[state.sceneIndex-1];
    const pL=(pS.steps&&pS.steps.length>0)?pS.steps.length-1:0;
    __transitioning=true;stage.classList.add('fading-out');
    setTimeout(()=>{
      state.sceneIndex--;state.stepIndex=pL;
      __pendingRecap=pS.type==='schema'&&isFocusStep(pS.steps&&pS.steps[pL]);
      render();stage.classList.remove('fading-out');
      setTimeout(()=>{__transitioning=false;},FADE_MS);
    },FADE_MS);
  }
}

render();

function isAnyOverlayOpen(){
  return !document.getElementById('modal-root').hidden||!document.getElementById('toc-overlay').hidden||!document.getElementById('sources-overlay').hidden||!document.getElementById('zoom-overlay').hidden;
}

document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){
    e.preventDefault();
    const mO=!document.getElementById('modal-root').hidden;
    if(mO&&__modalAutoActive){closeModal();advance();}else if(mO){closeModal();}else{advance();}
  }else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();if(isAnyOverlayOpen())return;retreat();}
  else if(e.key==='ArrowDown'){e.preventDefault();if(isAnyOverlayOpen())return;gotoScene(state.sceneIndex+1);}
  else if(e.key==='ArrowUp'){e.preventDefault();if(isAnyOverlayOpen())return;gotoScene(state.sceneIndex-1);}
  else if(e.key==='s'||e.key==='S'){if(e.target.tagName==='INPUT')return;e.preventDefault();toggleToc();}
  else if(e.key==='r'||e.key==='R'){if(e.target.tagName==='INPUT')return;e.preventDefault();toggleSources();}
  else if(e.key==='Escape'){
    if(!document.getElementById('modal-root').hidden){closeModal();e.preventDefault();return;}
    if(!document.getElementById('sources-overlay').hidden){toggleSources(false);e.preventDefault();return;}
    if(!document.getElementById('toc-overlay').hidden){toggleToc(false);e.preventDefault();return;}
  }
});

document.getElementById('timeline').addEventListener('click',(e)=>{
  const seg=e.target.closest('.seg');if(!seg)return;e.stopPropagation();gotoScene(parseInt(seg.dataset.index,10));
});

function renderToc(){
  const list=document.getElementById('toc-list');
  list.innerHTML=SCENES.map((scene,i)=>{
    const sc=scene.steps?scene.steps.length:1,sl=sc===1?'1 étape':sc+' étapes';
    const tl=scene.title||(scene.type==='punchline'?'✴ Respiration':'Outro — pour aller plus loin');
    return '<li data-index="'+i+'"><span class="num">'+(i+1).toString().padStart(2,'0')+'</span><span>'+tl+'</span><span class="meta">'+sl+'</span></li>';
  }).join('');
}
function toggleToc(f){const o=document.getElementById('toc-overlay');const h=f!==undefined?!f:!o.hidden;o.hidden=h;if(!h)renderToc();}
document.getElementById('btn-toc').addEventListener('click',(e)=>{e.stopPropagation();toggleToc(true);});
document.getElementById('toc-overlay').addEventListener('click',(e)=>{
  if(e.target.closest('.overlay-close')){toggleToc(false);return;}
  const li=e.target.closest('li[data-index]');if(li){gotoScene(parseInt(li.dataset.index,10));toggleToc(false);}
});

function renderSources(filter){
  const list=document.getElementById('sources-list'),f=(filter||'').toLowerCase();
  list.innerHTML=SOURCES.filter(s=>!f||((s.author||'')+' '+(s.title||'')+' '+(s.year||'')).toLowerCase().includes(f))
    .map(s=>'<li data-num="'+s.num+'"><span class="num">['+s.num+']</span><span><strong>'+(s.author||'')+'</strong> — '+(s.title||'')+', '+(s.year||'')+'.'+(s.publisher?' <em>'+s.publisher+'</em>.':'')+(s.url?' <a href="'+s.url+'" target="_blank" rel="noopener">Lien ↗</a>':'')+'</span></li>').join('');
}
function toggleSources(f){const o=document.getElementById('sources-overlay');const h=f!==undefined?!f:!o.hidden;o.hidden=h;if(!h){renderSources('');document.getElementById('sources-filter').value='';setTimeout(()=>document.getElementById('sources-filter').focus(),80);}}
document.getElementById('btn-sources').addEventListener('click',(e)=>{e.stopPropagation();toggleSources(true);});
document.getElementById('sources-overlay').addEventListener('click',(e)=>{if(e.target.closest('.overlay-close'))toggleSources(false);});
document.getElementById('sources-filter').addEventListener('input',(e)=>renderSources(e.target.value));

stage.addEventListener('click',(e)=>{
  if(isAnyOverlayOpen())return;if(e.target.closest('[data-no-advance]'))return;
  if(e.shiftKey)retreat();else advance();
});

/* Capture — PATCHED: direct schemaId lookup */
stage.addEventListener('click',(e)=>{
  const target=e.target.closest('[data-card]');if(!target)return;
  e.stopPropagation();
  const cardId=target.dataset.card;
  const mO=!document.getElementById('modal-root').hidden;
  if(mO&&__currentModalCardId===cardId){closeModal();return;}
  const scene=SCENES[state.sceneIndex];
  const schemaId=scene&&scene.schemaId?scene.schemaId:null;
  const card=schemaId?SCHEMAS?.[schemaId]?.[cardId]||null:null;
  if(card){openModal(card.eyebrow||'',card.title||'',card.body||'');__currentModalCardId=cardId;}
},true);

console.log('[slideshow]',SCENES.length,'scènes déclarées');

let touchStart=null;
stage.addEventListener('touchstart',(e)=>{if(e.touches.length!==1)return;touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY,t:Date.now()};},{passive:true});
stage.addEventListener('touchend',(e)=>{
  if(!touchStart)return;
  const t=e.changedTouches[0],dx=t.clientX-touchStart.x,dy=t.clientY-touchStart.y,dt=Date.now()-touchStart.t;
  touchStart=null;if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5||dt>600)return;
  if(dx>0)gotoScene(state.sceneIndex-1);else gotoScene(state.sceneIndex+1);
});

let __idleTimer=null;
function resetIdle(){
  const cue=document.getElementById('idle-cue');if(cue)cue.classList.remove('show');
  document.getElementById('topbar').classList.remove('idle');clearTimeout(__idleTimer);
  __idleTimer=setTimeout(()=>{if(cue)cue.classList.add('show');document.getElementById('topbar').classList.add('idle');},4000);
}
['keydown','click','touchstart','mousemove'].forEach(evt=>window.addEventListener(evt,resetIdle,{passive:true}));resetIdle();

function isTouchDevice(){return('ontouchstart'in window)||navigator.maxTouchPoints>0;}
function maybeShowOnboardingToaster(){
  if(!isTouchDevice()||localStorage.getItem('slideshow-onboarded'))return;
  const t=document.getElementById('toaster');if(!t)return;
  t.hidden=false;setTimeout(()=>t.classList.add('show'),50);
  const dismiss=()=>{t.classList.remove('show');setTimeout(()=>{t.hidden=true;},400);try{localStorage.setItem('slideshow-onboarded','1');}catch(_){}window.removeEventListener('touchstart',dismiss);};
  window.addEventListener('touchstart',dismiss,{once:true,passive:true});setTimeout(dismiss,6000);
}
maybeShowOnboardingToaster();

const __zoom=(function setupZoom(){
  const overlay=document.getElementById('zoom-overlay'),zStage=document.getElementById('zoom-stage'),content=document.getElementById('zoom-content'),captionE=document.getElementById('zoom-caption'),hint=document.getElementById('zoom-hint');
  if(!overlay||!zStage||!content)return{};
  let scale=1,tx=0,ty=0,svgW=0,svgH=0,fitScale=1,lastZoomTrigger=null;
  function applyTransform(){content.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';}
  function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
  function fitToStage(){if(!svgW||!svgH)return;const r=zStage.getBoundingClientRect(),m=32;fitScale=Math.min((r.width-m*2)/svgW,(r.height-m*2)/svgH);scale=fitScale;tx=(r.width-svgW*scale)/2;ty=(r.height-svgH*scale)/2;applyTransform();}
  function zoomAt(mx,my,factor){const ns=clamp(scale*factor,fitScale*0.5,fitScale*16);tx=mx-ns*(mx-tx)/scale;ty=my-ns*(my-ty)/scale;scale=ns;applyTransform();}
  function openZoom(svgEl,captionText){
    const clone=svgEl.cloneNode(true),vb=clone.viewBox?.baseVal;
    svgW=(vb&&vb.width)||svgEl.getBoundingClientRect().width||1200;svgH=(vb&&vb.height)||svgEl.getBoundingClientRect().height||780;
    clone.setAttribute('width',svgW);clone.setAttribute('height',svgH);clone.style.width=svgW+'px';clone.style.height=svgH+'px';
    content.innerHTML='';content.appendChild(clone);captionE.textContent=captionText||'';
    lastZoomTrigger=document.activeElement;overlay.hidden=false;document.body.style.overflow='hidden';
    requestAnimationFrame(()=>{fitToStage();zStage.focus({preventScroll:true});if(hint){hint.classList.remove('fade');clearTimeout(hint._t);hint._t=setTimeout(()=>hint.classList.add('fade'),2600);}});
  }
  function closeZoom(){overlay.hidden=true;content.innerHTML='';document.body.style.overflow='';lastZoomTrigger?.focus?.();}
  overlay.querySelector('.zoom-close')?.addEventListener('click',closeZoom);
  document.addEventListener('keydown',(e)=>{
    if(overlay.hidden)return;
    if(e.key==='Escape'){e.preventDefault();closeZoom();}
    else if(e.key==='+'||e.key==='='){e.preventDefault();const r=zStage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1.25);}
    else if(e.key==='-'||e.key==='_'){e.preventDefault();const r=zStage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1/1.25);}
    else if(e.key==='0'){e.preventDefault();fitToStage();}
  });
  overlay.querySelector('.zoom-in')?.addEventListener('click',()=>{const r=zStage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1.25);});
  overlay.querySelector('.zoom-out')?.addEventListener('click',()=>{const r=zStage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1/1.25);});
  overlay.querySelector('.zoom-reset')?.addEventListener('click',fitToStage);
  zStage.addEventListener('wheel',(e)=>{e.preventDefault();const r=zStage.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.15:1/1.15);},{passive:false});
  let dragging=false,sx=0,sy=0,stx=0,sty=0;
  zStage.addEventListener('pointerdown',(e)=>{dragging=true;zStage.classList.add('grabbing');zStage.setPointerCapture?.(e.pointerId);sx=e.clientX;sy=e.clientY;stx=tx;sty=ty;});
  zStage.addEventListener('pointermove',(e)=>{if(!dragging)return;tx=stx+(e.clientX-sx);ty=sty+(e.clientY-sy);applyTransform();});
  function endDrag(e){if(!dragging)return;dragging=false;zStage.classList.remove('grabbing');zStage.releasePointerCapture?.(e.pointerId);}
  zStage.addEventListener('pointerup',endDrag);zStage.addEventListener('pointercancel',endDrag);zStage.addEventListener('pointerleave',endDrag);
  let pSD=0,pSS=1,pM={x:0,y:0};
  zStage.addEventListener('touchstart',(e)=>{if(e.touches.length===2){dragging=false;const t1=e.touches[0],t2=e.touches[1];pSD=Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);pSS=scale;const r=zStage.getBoundingClientRect();pM={x:(t1.clientX+t2.clientX)/2-r.left,y:(t1.clientY+t2.clientY)/2-r.top};}},{passive:true});
  zStage.addEventListener('touchmove',(e)=>{if(e.touches.length===2&&pSD>0){e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);zoomAt(pM.x,pM.y,(d/pSD)*(pSS/scale));}},{passive:false});
  zStage.addEventListener('touchend',(e)=>{if(e.touches.length<2)pSD=0;});
  window.addEventListener('resize',()=>{if(!overlay.hidden)fitToStage();});
  return{openZoom};
})();

stage.addEventListener('click',(e)=>{
  const btn=e.target.closest('.zoom-btn');if(!btn)return;e.stopPropagation();
  const svg=btn.closest('.schema-wrapper')?.querySelector('svg');
  if(svg&&__zoom.openZoom){const cap=stage.querySelector('.caption')?.textContent?.trim()||'';__zoom.openZoom(svg,cap);}
},true);
</script>
