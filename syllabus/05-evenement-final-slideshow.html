const modalRoot = document.getElementById('modal-root');
const modalEyebrow = document.getElementById('modal-eyebrow');
const modalTitle = document.getElementById('modal-title');
const modalBody = document.getElementById('modal-body');
let lastFocused = null;

function openModal(eyebrow, title, body) {
  lastFocused = document.activeElement;

  modalBody.innerHTML = body || '';

let __modalAutoActive = false;
let __currentModalCardId = null;

function closeModal() {
  const root = document.getElementById('modal-root');

document.getElementById('modal-root').addEventListener('click', (e) => {

});

let state = { sceneIndex: 0, stepIndex: 0 };
const stage = document.getElementById('stage');

function applyStepStyles(scene, step) {
  const svg = stage.querySelector('svg');
  if (!svg) return;
  svg.querySelectorAll('[data-step-state]').forEach(el => el.removeAttribute('data-step-state'));
  if (step.fullView) { __schemaZoom.applyZoom(svg, step); return; }
  (step.dim || []).forEach(sel => svg.querySelectorAll(sel).forEach(el => el.setAttribute('data-step-state', 'dim')));
  (step.hidden || []).forEach(sel => svg.querySelectorAll(sel).forEach(el => el.setAttribute('data-step-state', 'hidden')));
  (step.highlight || []).forEach(sel => svg.querySelectorAll(sel).forEach(el => el.setAttribute('data-step-state', 'active')));
  const focusing = ((step.dim && step.dim.length) || (step.hidden && step.hidden.length)) && step.highlight && step.highlight.length && !step.fullView;
  if (focusing) {
    const vb = svg.viewBox && svg.viewBox.baseVal;
    const footerThreshold = vb && vb.width ? vb.y + vb.height - Math.min(120, vb.height * 0.18) : Infinity;
    svg.querySelectorAll(':scope > *').forEach(el => {
      const ln = el.localName;
      if (ln === 'defs' || ln === 'style' || ln === 'metadata' || ln === 'title' || ln === 'desc') return;
      if (el.classList && el.classList.contains('svg-header')) return;
      if (el.getAttribute('data-step-state') === 'active') return;
      if (ln === 'text') {
        let yPos = parseFloat(el.getAttribute('y') || '');
        if (!Number.isFinite(yPos)) { try { const bb = el.getBBox(); if (bb) yPos = bb.y; } catch(e) {} }
        if (Number.isFinite(yPos) && yPos >= footerThreshold && !el.hasAttribute('data-step-state')) el.setAttribute('data-step-state', 'hidden');
      } else if (!el.hasAttribute('data-step-state')) {
        el.setAttribute('data-step-state', 'dim');
      }
    });
  }
  __schemaZoom.applyZoom(svg, step);
}

const __schemaZoom = (() => {
  const DURATION = 520, PAD = 0.86, MAX_SCALE = 1.6, CAPTION_RESERVE = 80, MODAL_W = 480;
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let currentSvg = null, currentStep = null, resizeObs = null, resizeIdleTimer = null, lastStageW = -1, lastStageH = -1;
  function unionUserBBox(svg, selectors) {
    let result = null;
    (selectors || []).forEach(sel => svg.querySelectorAll(sel).forEach(el => {
      let bb; try { bb = el.getBBox(); } catch(e) { return; }
      if (!bb || (bb.width === 0 && bb.height === 0)) return;
      if (!result) result = { x: bb.x, y: bb.y, width: bb.width, height: bb.height };
      else { const x1=Math.min(result.x,bb.x),y1=Math.min(result.y,bb.y),x2=Math.max(result.x+result.width,bb.x+bb.width),y2=Math.max(result.y+result.height,bb.y+bb.height); result={x:x1,y:y1,width:x2-x1,height:y2-y1}; }
    }));
    return result;
  }
  function compute(svg, step) {
    const focusing = ((step.dim&&step.dim.length)||(step.hidden&&step.hidden.length))&&step.highlight&&step.highlight.length&&!step.fullView;
    if (!focusing) return null;
    const bbox = unionUserBBox(svg, step.highlight);
    if (!bbox || bbox.width===0 || bbox.height===0) return null;
    const wrapper=svg.parentElement, stage=document.getElementById('stage');
    if (!wrapper||!stage) return null;
    const svgW=svg.clientWidth, svgH=svg.clientHeight, vb=svg.viewBox.baseVal;
    if (svgW===0||svgH===0||!vb||vb.width===0||vb.height===0) return null;
    const wR=wrapper.getBoundingClientRect(), svgX=wR.left, svgY=wR.top;
    const uA=vb.width/vb.height, bA=svgW/svgH;
    let cs,cox,coy;
    if (bA>uA){cs=svgH/vb.height;cox=(svgW-vb.width*cs)/2;coy=0;}
    else{cs=svgW/vb.width;cox=0;coy=(svgH-vb.height*cs)/2;}
    const hCx=svgX+cox+(bbox.x+bbox.width/2-vb.x)*cs, hCy=svgY+coy+(bbox.y+bbox.height/2-vb.y)*cs;
    const hW=bbox.width*cs, hH=bbox.height*cs;
    const sR=stage.getBoundingClientRect();
    const mA=document.body.classList.contains('modal-open'), isDM=window.innerWidth>1024;
    const mX=(mA&&isDM)?MODAL_W:0, mY=(mA&&!isDM)?Math.min(window.innerHeight*0.5,400):0;
    const aW=Math.max(200,sR.width-mX), aH=Math.max(160,sR.height-CAPTION_RESERVE-mY);
    const aCx=sR.left+aW/2, aCy=sR.top+aH/2;
    const sX=(aW*PAD)/hW, sY=(aH*PAD)/hH, scale=Math.min(MAX_SCALE,Math.min(sX,sY));
    const tx=aCx-svgX-(hCx-svgX)*scale, ty=scale>1?aCy-svgY-(hCy-svgY)*scale:(hCy-svgY)*(1-scale);
    return {tx,ty,scale};
  }
  function setStyle(svg,t){svg.style.transform=t?'translate('+t.tx.toFixed(2)+'px,'+t.ty.toFixed(2)+'px) scale('+t.scale.toFixed(4)+')':(svg.style.transform='','');}
  function applySync(){if(!currentSvg||!currentStep)return;setStyle(currentSvg,compute(currentSvg,currentStep));}
  function setupObservers(){
    if(resizeObs)return;
    const stage=document.getElementById('stage');if(!stage)return;
    const r=stage.getBoundingClientRect();lastStageW=r.width;lastStageH=r.height;
    resizeObs=new ResizeObserver(()=>{
      if(!currentSvg||!currentStep)return;
      const rr=stage.getBoundingClientRect();
      if(Math.abs(rr.width-lastStageW)<0.5&&Math.abs(rr.height-lastStageH)<0.5)return;
      lastStageW=rr.width;lastStageH=rr.height;currentSvg.style.transition='none';applySync();
      clearTimeout(resizeIdleTimer);resizeIdleTimer=setTimeout(()=>{if(currentSvg&&!reduceMotion)currentSvg.style.transition='transform '+DURATION+'ms cubic-bezier(0.22,1,0.36,1)';},220);
    });
    resizeObs.observe(stage);
    new MutationObserver(()=>{if(currentSvg&&currentStep)requestAnimationFrame(applySync);}).observe(document.body,{attributes:true,attributeFilter:['class']});
  }
  function applyZoom(svg,step){
    currentSvg=svg;currentStep=step;
    svg.style.transformOrigin='0 0';svg.style.willChange='transform';
    svg.style.transition=reduceMotion?'none':'transform '+DURATION+'ms cubic-bezier(0.22,1,0.36,1)';
    setupObservers();
    requestAnimationFrame(()=>requestAnimationFrame(()=>{if(currentSvg===svg)applySync();}));
  }
  return {applyZoom};
})();

function renderTimeline(){
  const tl=document.getElementById('timeline');if(!tl)return;
  tl.innerHTML=SCENES.map((scene,i)=>{
    const v=i<state.sceneIndex,c=i===state.sceneIndex,cls=['seg'];
    if(scene.type==='punchline')cls.push('punchline');
    if(scene.type==='outro')cls.push('outro');
    if(v)cls.push('visited');if(c)cls.push('current');
    let f=0;
    if(c&&scene.steps&&scene.steps.length>1)f=Math.round((state.stepIndex/(scene.steps.length-1))*100);
    else if(v)f=100;
    const lbl=(i+1).toString().padStart(2,'0')+' · '+(scene.title||(scene.type==='punchline'?'Respiration':'Outro'));
    return '<div class="seg '+cls.join(' ')+'" data-index="'+i+'"><div class="fill" style="height:'+f+'%;width:'+f+'%;"></div><div class="label">'+lbl+'</div></div>';
  }).join('');
}

function updateSceneTitleBar(scene){
  const bar=document.getElementById('scene-title-bar');if(!bar)return;
  const num=(state.sceneIndex+1).toString().padStart(2,'0'),title=scene.title||'';
  if(!title){bar.innerHTML='';return;}
  bar.innerHTML='<span class="num">'+num+'</span><span class="title">'+title+'</span>';
}

function render(){
  const scene=SCENES[state.sceneIndex];if(!scene)return;
  updateSceneTitleBar(scene);
  if(scene.type==='punchline'){
    stage.innerHTML='<section class="scene-punchline" role="group"><div class="body">'+scene.body+'</div>'+(scene.attribution?'<div class="attribution">'+scene.attribution+'</div>':'')+'</section>';
    renderTimeline();return;
  }
  if(scene.type==='outro'){
    stage.innerHTML='<section class="scene-outro" role="group"><div class="eyebrow">Vous avez parcouru</div><h2>'+(scene.outroTitle||'')+'</h2><div class="body">'+scene.body+'</div><div class="ctas" data-no-advance><a class="cta-primary" href="'+scene.cta.href+'">'+scene.cta.label+'</a><a class="cta-secondary" href="'+scene.secondary.href+'">'+scene.secondary.label+'</a></div><button class="restart" data-no-advance type="button" onclick="gotoScene(0)">↺ Recommencer</button><div class="disclosure">Format co-écrit avec l\'aide d\'une IA</div></section>';
    renderTimeline();return;
  }
  if(scene.type==='schema'){
    const svgEl=document.querySelector('#schemas svg[data-schema-id="'+scene.schemaId+'"]');
    const svgClone=svgEl?svgEl.outerHTML:'<div style="color:red">SVG '+scene.schemaId+' introuvable</div>';
    let step=scene.steps[state.stepIndex]||{caption:''};
    if(__pendingRecap)step=Object.assign({},step,{fullView:true});
    stage.innerHTML='<section class="schema-host" role="group"><div class="schema-wrapper figure" style="position:relative;width:100%;max-width:100%;">'+svgClone+'<button class="zoom-btn" type="button" aria-label="Zoom plein écran" data-no-advance>⛶</button></div><div class="caption" aria-live="polite">'+step.caption+'</div></section>';
    applyStepStyles(scene,step);
    if(step.fullView&&!document.getElementById('modal-root').hidden)closeModal();
    if(step.modalAuto&&!step.fullView){
      const schKey=scene.schemaId||null;
      const cards=[];
      if(schKey&&step.highlight&&step.highlight.length){
        const seen=new Set();
        step.highlight.forEach(sel=>{
          const m=sel.match(/data-card="([^"]+)"/);
          if(!m||seen.has(m[1]))return;seen.add(m[1]);
          const c=SCHEMAS&&SCHEMAS[schKey]&&SCHEMAS[schKey][m[1]];
          if(c)cards.push(c);
        });
      }
      if(cards.length===0&&schKey){const c=SCHEMAS&&SCHEMAS[schKey]&&SCHEMAS[schKey][step.modalAuto];if(c)cards.push(c);}
      if(cards.length>0){
        setTimeout(()=>{
          let eyebrow,title,body;
          if(cards.length===1){eyebrow=cards[0].eyebrow||'';title=cards[0].title||'';body=cards[0].body||'';}
          else{
            const bE=cards[0].eyebrow?cards[0].eyebrow.split(' — ')[0]:'';
            eyebrow=bE;title=scene.title||cards[0].title||'';
            body=cards.map(c=>'<div class="combined-card">'+(c.eyebrow?'<p class="combined-eyebrow">'+c.eyebrow+'</p>':'')+(c.title?'<h4>'+c.title+'</h4>':'')+(c.body||'')+'</div>').join('');
          }
          openModal(eyebrow,title,body);__modalAutoActive=true;
        },220);
      }
    }
    renderTimeline();return;
  }
}

let __transitioning=false, __pendingRecap=false;
function isFocusStep(step){return step&&((step.dim&&step.dim.length)||(step.hidden&&step.hidden.length))&&step.highlight&&step.highlight.length&&!step.fullView;}

async function gotoScene(index){
  if(index<0||index>=SCENES.length||__transitioning)return;
  __transitioning=true;__pendingRecap=false;
  stage.classList.add('fading-out');
  await new Promise(r=>setTimeout(r,FADE_MS));
  state.sceneIndex=index;state.stepIndex=0;render();
  stage.classList.remove('fading-out');
  await new Promise(r=>setTimeout(r,FADE_MS));
  __transitioning=false;
}

function advance(){
  if(__transitioning)return;
  const scene=SCENES[state.sceneIndex];
  const lastStep=(scene.steps&&scene.steps.length>0)?scene.steps.length-1:0;
  if(state.stepIndex<lastStep){state.stepIndex++;__pendingRecap=false;render();return;}
  if(!__pendingRecap&&scene.type==='schema'&&state.sceneIndex<SCENES.length-1&&isFocusStep(scene.steps&&scene.steps[lastStep])){__pendingRecap=true;render();return;}
  __pendingRecap=false;
  if(state.sceneIndex<SCENES.length-1)gotoScene(state.sceneIndex+1);
}

function retreat(){
  if(__transitioning)return;
  if(__pendingRecap){__pendingRecap=false;render();return;}
  if(state.stepIndex>0){state.stepIndex--;render();}
  else if(state.sceneIndex>0){
    const pS=SCENES[state.sceneIndex-1];
    const pL=(pS.steps&&pS.steps.length>0)?pS.steps.length-1:0;
    __transitioning=true;stage.classList.add('fading-out');
    setTimeout(()=>{
      state.sceneIndex--;state.stepIndex=pL;
      __pendingRecap=pS.type==='schema'&&isFocusStep(pS.steps&&pS.steps[pL]);
      render();stage.classList.remove('fading-out');
      setTimeout(()=>{__transitioning=false;},FADE_MS);
    },FADE_MS);
  }
}

render();

function isAnyOverlayOpen(){
  return !document.getElementById('modal-root').hidden||!document.getElementById('toc-overlay').hidden||!document.getElementById('sources-overlay').hidden||!document.getElementById('zoom-overlay').hidden;
}

document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){
    e.preventDefault();
    const mO=!document.getElementById('modal-root').hidden;
    if(mO&&__modalAutoActive){closeModal();advance();}else if(mO){closeModal();}else{advance();}
  }else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();if(isAnyOverlayOpen())return;retreat();}
  else if(e.key==='ArrowDown'){e.preventDefault();if(isAnyOverlayOpen())return;gotoScene(state.sceneIndex+1);}
  else if(e.key==='ArrowUp'){e.preventDefault();if(isAnyOverlayOpen())return;gotoScene(state.sceneIndex-1);}
  else if(e.key==='s'||e.key==='S'){if(e.target.tagName==='INPUT')return;e.preventDefault();toggleToc();}
  else if(e.key==='r'||e.key==='R'){if(e.target.tagName==='INPUT')return;e.preventDefault();toggleSources();}
  else if(e.key==='Escape'){
    if(!document.getElementById('modal-root').hidden){closeModal();e.preventDefault();return;}
    if(!document.getElementById('sources-overlay').hidden){toggleSources(false);e.preventDefault();return;}
    if(!document.getElementById('toc-overlay').hidden){toggleToc(false);e.preventDefault();return;}
  }
});

document.getElementById('timeline').addEventListener('click',(e)=>{
  const seg=e.target.closest('.seg');if(!seg)return;e.stopPropagation();gotoScene(parseInt(seg.dataset.index,10));
});

function toggleToc(f){const o=document.getElementById('toc-overlay');const h=f!==undefined?!f:!o.hidden;o.hidden=h;if(!h)renderToc();}

function toggleSources(f){const o=document.getElementById('sources-overlay');const h=f!==undefined?!f:!o.hidden;o.hidden=h;if(!h){renderSources('');document.getElementById('sources-filter').value='';setTimeout(()=>document.getElementById('sources-filter').focus(),80);}}

/* Capture — PATCHED: direct schemaId lookup */
stage.addEventListener('click',(e)=>{
  const target=e.target.closest('[data-card]');if(!target)return;
  e.stopPropagation();
  const cardId=target.dataset.card;
  const mO=!document.getElementById('modal-root').hidden;
  if(mO&&__currentModalCardId===cardId){closeModal();return;}
  const scene=SCENES[state.sceneIndex];
  const schemaId=scene&&scene.schemaId?scene.schemaId:null;
  const card=schemaId?SCHEMAS?.[schemaId]?.[cardId]||null:null;
  if(card){openModal(card.eyebrow||'',card.title||'',card.body||'');__currentModalCardId=cardId;}
},true);

console.log('[slideshow]',SCENES.length,'scènes déclarées');

let touchStart=null;
stage.addEventListener('touchstart',(e)=>{if(e.touches.length!==1)return;touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY,t:Date.now()};},{passive:true});
stage.addEventListener('touchend',(e)=>{
  if(!touchStart)return;
  const t=e.changedTouches[0],dx=t.clientX-touchStart.x,dy=t.clientY-touchStart.y,dt=Date.now()-touchStart.t;
  touchStart=null;if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5||dt>600)return;
  if(dx>0)gotoScene(state.sceneIndex-1);else gotoScene(state.sceneIndex+1);
});

let __idleTimer=null;
function resetIdle(){
  const cue=document.getElementById('idle-cue');if(cue)cue.classList.remove('show');
  document.getElementById('topbar').classList.remove('idle');clearTimeout(__idleTimer);
  __idleTimer=setTimeout(()=>{if(cue)cue.classList.add('show');document.getElementById('topbar').classList.add('idle');},4000);
}
['keydown','click','touchstart','mousemove'].forEach(evt=>window.addEventListener(evt,resetIdle,{passive:true}));resetIdle();

function isTouchDevice(){return('ontouchstart'in window)||navigator.maxTouchPoints>0;}
function maybeShowOnboardingToaster(){
  if(!isTouchDevice()||localStorage.getItem('slideshow-onboarded'))return;
  const t=document.getElementById('toaster');if(!t)return;
  t.hidden=false;setTimeout(()=>t.classList.add('show'),50);
  const dismiss=()=>{t.classList.remove('show');setTimeout(()=>{t.hidden=true;},400);try{localStorage.setItem('slideshow-onboarded','1');}catch(_){}window.removeEventListener('touchstart',dismiss);};
  window.addEventListener('touchstart',dismiss,{once:true,passive:true});setTimeout(dismiss,6000);
}
maybeShowOnboardingToaster();

const __zoom=(function setupZoom(){
  const overlay=document.getElementById('zoom-overlay'),zStage=document.getElementById('zoom-stage'),content=document.getElementById('zoom-content'),captionE=document.getElementById('zoom-caption'),hint=document.getElementById('zoom-hint');
  if(!overlay||!zStage||!content)return{};
  let scale=1,tx=0,ty=0,svgW=0,svgH=0,fitScale=1,lastZoomTrigger=null;
  function applyTransform(){content.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';}
  function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
  function fitToStage(){if(!svgW||!svgH)return;const r=zStage.getBoundingClientRect(),m=32;fitScale=Math.min((r.width-m*2)/svgW,(r.height-m*2)/svgH);scale=fitScale;tx=(r.width-svgW*scale)/2;ty=(r.height-svgH*scale)/2;applyTransform();}
  function zoomAt(mx,my,factor){const ns=clamp(scale*factor,fitScale*0.5,fitScale*16);tx=mx-ns*(mx-tx)/scale;ty=my-ns*(my-ty)/scale;scale=ns;applyTransform();}
  function openZoom(svgEl,captionText){
    const clone=svgEl.cloneNode(true),vb=clone.viewBox?.baseVal;
    svgW=(vb&&vb.width)||svgEl.getBoundingClientRect().width||1200;svgH=(vb&&vb.height)||svgEl.getBoundingClientRect().height||780;
    clone.setAttribute('width',svgW);clone.setAttribute('height',svgH);clone.style.width=svgW+'px';clone.style.height=svgH+'px';
    content.innerHTML='';content.appendChild(clone);captionE.textContent=captionText||'';
    lastZoomTrigger=document.activeElement;overlay.hidden=false;document.body.style.overflow='hidden';
    requestAnimationFrame(()=>{fitToStage();zStage.focus({preventScroll:true});if(hint){hint.classList.remove('fade');clearTimeout(hint._t);hint._t=setTimeout(()=>hint.classList.add('fade'),2600);}});
  }
  function closeZoom(){overlay.hidden=true;content.innerHTML='';document.body.style.overflow='';lastZoomTrigger?.focus?.();}
  overlay.querySelector('.zoom-close')?.addEventListener('click',closeZoom);
  document.addEventListener('keydown',(e)=>{
    if(overlay.hidden)return;
    if(e.key==='Escape'){e.preventDefault();closeZoom();}
    else if(e.key==='+'||e.key==='='){e.preventDefault();const r=zStage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1.25);}
    else if(e.key==='-'||e.key==='_'){e.preventDefault();const r=zStage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1/1.25);}
    else if(e.key==='0'){e.preventDefault();fitToStage();}
  });
  overlay.querySelector('.zoom-in')?.addEventListener('click',()=>{const r=zStage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1.25);});
  overlay.querySelector('.zoom-out')?.addEventListener('click',()=>{const r=zStage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1/1.25);});
  overlay.querySelector('.zoom-reset')?.addEventListener('click',fitToStage);
  zStage.addEventListener('wheel',(e)=>{e.preventDefault();const r=zStage.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.15:1/1.15);},{passive:false});
  let dragging=false,sx=0,sy=0,stx=0,sty=0;
  zStage.addEventListener('pointerdown',(e)=>{dragging=true;zStage.classList.add('grabbing');zStage.setPointerCapture?.(e.pointerId);sx=e.clientX;sy=e.clientY;stx=tx;sty=ty;});
  zStage.addEventListener('pointermove',(e)=>{if(!dragging)return;tx=stx+(e.clientX-sx);ty=sty+(e.clientY-sy);applyTransform();});
  function endDrag(e){if(!dragging)return;dragging=false;zStage.classList.remove('grabbing');zStage.releasePointerCapture?.(e.pointerId);}
  zStage.addEventListener('pointerup',endDrag);zStage.addEventListener('pointercancel',endDrag);zStage.addEventListener('pointerleave',endDrag);
  let pSD=0,pSS=1,pM={x:0,y:0};
  zStage.addEventListener('touchstart',(e)=>{if(e.touches.length===2){dragging=false;const t1=e.touches[0],t2=e.touches[1];pSD=Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);pSS=scale;const r=zStage.getBoundingClientRect();pM={x:(t1.clientX+t2.clientX)/2-r.left,y:(t1.clientY+t2.clientY)/2-r.top};}},{passive:true});
  zStage.addEventListener('touchmove',(e)=>{if(e.touches.length===2&&pSD>0){e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);zoomAt(pM.x,pM.y,(d/pSD)*(pSS/scale));}},{passive:false});
  zStage.addEventListener('touchend',(e)=>{if(e.touches.length<2)pSD=0;});
  window.addEventListener('resize',()=>{if(!overlay.hidden)fitToStage();});
  return{openZoom};
})();

stage.addEventListener('click',(e)=>{
  const btn=e.target.closest('.zoom-btn');if(!btn)return;e.stopPropagation();
  const svg=btn.closest('.schema-wrapper')?.querySelector('svg');
  if(svg&&__zoom.openZoom){const cap=stage.querySelector('.caption')?.textContent?.trim()||'';__zoom.openZoom(svg,cap);}
},true);
</script>
