<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le collapse — et ses quatre parades</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Sans contrainte, le routeur s'effondre sur ses favoris ; toute l'ingénierie MoE consiste à rééquilibrer</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- COLLAPSE panel -->
  <g class="interactive" data-card="collapse" tabindex="0" role="button" aria-label="Le collapse — cliquez pour les détails">
    <rect x="60" y="180" width="440" height="440" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.5"/>
    <text x="84" y="212" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">LE PROBLÈME · COLLAPSE</text>
    <text x="84" y="240" class="body" font-size="14" fill="#1A1A1A">Charge des experts sans équilibrage</text>
    <!-- axis -->
    <line x1="100" y1="540" x2="476" y2="540" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="100" y1="270" x2="100" y2="540" stroke="#5A5A5A" stroke-width="1"/>
    <!-- bars: imbalanced -->
    <rect x="116" y="286" width="38" height="254" fill="#B7332C"/>
    <rect x="162" y="330" width="38" height="210" fill="#B7332C"/>
    <rect x="208" y="500" width="38" height="40" fill="#B7332C" fill-opacity="0.35"/>
    <rect x="254" y="524" width="38" height="16" fill="#B8B5AE"/>
    <rect x="300" y="530" width="38" height="10" fill="#B8B5AE"/>
    <rect x="346" y="524" width="38" height="16" fill="#B8B5AE"/>
    <rect x="392" y="532" width="38" height="8" fill="#B8B5AE"/>
    <rect x="438" y="530" width="38" height="10" fill="#B8B5AE"/>
    <text x="135" y="558" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">E1</text>
    <text x="181" y="558" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">E2</text>
    <text x="290" y="576" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">…experts morts, jamais entraînés</text>
    <text x="84" y="602" class="body" font-size="12" fill="#1A1A1A">Cercle vicieux : les favoris voient plus de données, s'améliorent, sont plus choisis.</text>
  </g>

  <!-- Parade 1 -->
  <g class="interactive" data-card="loss-auxiliaire" tabindex="0" role="button" aria-label="La loss auxiliaire — cliquez pour les détails">
    <rect x="540" y="180" width="600" height="130" rx="3" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.25"/>
    <text x="564" y="210" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#1F5560">PARADE 1 · LOSS AUXILIAIRE</text>
    <text x="564" y="238" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Un terme de perte pénalise le déséquilibre</text>
    <text x="564" y="262" class="body" font-size="12.5" fill="#5A5A5A">Switch Transformer 2021 · + router z-loss (ST-MoE) pour la stabilité</text>
    <text x="564" y="290" class="body" font-size="12.5" font-style="italic" fill="#B7332C">Défaut : un impôt sur la qualité — en tension avec la perte principale</text>
  </g>

  <!-- Parade 2 -->
  <g class="interactive" data-card="expert-choice" tabindex="0" role="button" aria-label="L'expert-choice — cliquez pour les détails">
    <rect x="540" y="322" width="600" height="130" rx="3" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="564" y="352" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#B58A2C">PARADE 2 · EXPERT-CHOICE</text>
    <text x="564" y="380" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Les experts choisissent — équilibre mécanique</text>
    <text x="564" y="404" class="body" font-size="12.5" fill="#5A5A5A">Zhou et al. 2022 · aucune loss auxiliaire nécessaire</text>
    <text x="564" y="432" class="body" font-size="12.5" font-style="italic" fill="#B7332C">Limite : mal adapté à la génération auto-régressive</text>
  </g>

  <!-- Parade 3 -->
  <g class="interactive" data-card="biais-sans-loss" tabindex="0" role="button" aria-label="Le biais sans-loss — cliquez pour les détails">
    <rect x="540" y="464" width="600" height="156" rx="3" fill="#2F5D3F" fill-opacity="0.07" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="564" y="494" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#2F5D3F">PARADE 3 · BIAIS SANS-LOSS  ★</text>
    <text x="564" y="522" class="body" font-size="14" font-weight="500" fill="#1A1A1A">Un biais externe ajusté après chaque pas</text>
    <text x="564" y="546" class="body" font-size="12.5" fill="#5A5A5A">DeepSeek-V3 2024 · +biais aux sous-chargés, −biais aux surchargés</text>
    <text x="564" y="574" class="body" font-size="12.5" fill="#1A1A1A">Découplé de la descente de gradient →</text>
    <text x="564" y="596" class="body" font-size="12.5" font-weight="600" fill="#2F5D3F">équilibre sans impôt sur la qualité — nouveau standard</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="650" x2="1140" y2="650" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="682" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : Fedus et al. 2021 ; Zoph et al. 2022 (ST-MoE) ; Zhou et al. 2022 ; DeepSeek-AI 2024.</text>
</svg>
