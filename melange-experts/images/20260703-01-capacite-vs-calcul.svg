<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">La bascule capacité / calcul</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Le mélange d'experts sépare ce que le modèle sait (paramètres totaux) de ce qu'il dépense par token (paramètres activés)</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Column headers -->
  <text x="300" y="185" class="display" font-size="18" font-style="italic" fill="#5A5A5A" text-anchor="middle">Modèle dense</text>
  <text x="880" y="185" class="display" font-size="18" font-style="italic" fill="#5A5A5A" text-anchor="middle">Modèle creux (MoE)</text>
  <line x1="600" y1="170" x2="600" y2="690" stroke="#E5E1D8" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- DENSE column -->
  <g class="interactive" data-card="dense" tabindex="0" role="button" aria-label="Le modèle dense — cliquez pour les détails">
    <rect x="120" y="210" width="360" height="230" rx="3" fill="#B7332C" fill-opacity="0.14" stroke="#B7332C" stroke-width="1.5"/>
    <text x="300" y="250" class="body" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">Tous les paramètres traitent chaque token</text>
    <text x="300" y="322" class="display" font-size="40" font-weight="600" fill="#B7332C" text-anchor="middle">70 Md</text>
    <text x="300" y="352" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle">totaux = activés</text>
    <text x="300" y="410" class="mono" font-size="14" font-weight="500" fill="#B7332C" text-anchor="middle">100 % actif</text>
  </g>

  <!-- CREUX column -->
  <g class="interactive" data-card="creux" tabindex="0" role="button" aria-label="Le modèle creux — cliquez pour les détails">
    <rect x="700" y="210" width="360" height="230" rx="3" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.5"/>
    <text x="880" y="250" class="body" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">Une fraction des paramètres par token</text>
    <text x="880" y="322" class="display" font-size="40" font-weight="600" fill="#1F5560" text-anchor="middle">671 Md</text>
    <text x="880" y="352" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle">totaux (capacité)</text>
  </g>
  <!-- fraction active overlay -->
  <g class="interactive" data-card="fraction-active" tabindex="0" role="button" aria-label="La fraction activée — cliquez pour les détails">
    <rect x="724" y="382" width="126" height="42" rx="3" fill="#B7332C"/>
    <text x="787" y="409" class="mono" font-size="14" font-weight="500" fill="#FAF8F3" text-anchor="middle">37 Md actifs</text>
    <text x="990" y="402" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle">≈ 5,5 %</text>
    <text x="990" y="420" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle">activé</text>
  </g>

  <!-- COMPARISON BARS -->
  <g class="interactive" data-card="memoire-vs-flops" tabindex="0" role="button" aria-label="Mémoire contre FLOPs — cliquez pour les détails">
    <rect x="120" y="480" width="940" height="180" rx="3" fill="#5A5A5A" fill-opacity="0.03" stroke="#B8B5AE" stroke-width="1.25" stroke-dasharray="2 3"/>
    <text x="144" y="510" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">EMPREINTE MÉMOIRE (poids résidents)</text>
    <!-- memory dense -->
    <text x="144" y="540" class="body" font-size="12" fill="#5A5A5A">dense</text>
    <rect x="220" y="528" width="120" height="16" rx="2" fill="#B7332C" fill-opacity="0.5"/>
    <!-- memory moe -->
    <text x="144" y="566" class="body" font-size="12" fill="#5A5A5A">MoE</text>
    <rect x="220" y="554" width="820" height="16" rx="2" fill="#1F5560" fill-opacity="0.5"/>
    <text x="1030" y="566" class="mono" font-size="11" fill="#1F5560" text-anchor="end">×9,6</text>

    <text x="144" y="608" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">CALCUL PAR TOKEN (FLOPs)</text>
    <text x="144" y="636" class="body" font-size="12" fill="#5A5A5A">dense</text>
    <rect x="220" y="624" width="120" height="16" rx="2" fill="#B7332C"/>
    <text x="144" y="662" class="body" font-size="12" fill="#5A5A5A">MoE</text>
    <rect x="220" y="650" width="64" height="16" rx="2" fill="#1F5560"/>
    <text x="300" y="662" class="mono" font-size="11" fill="#1F5560">×0,5 — moins de calcul, plus de savoir</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="732" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Chiffres illustratifs (DeepSeek-V3 : 671 Md totaux, 37 Md activés). Le creux a l'empreinte mémoire d'un géant et l'appétit de calcul d'un modèle moyen.</text>
  <text x="60" y="752" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : DeepSeek-AI 2024 ; Clark et al. 2022 (Unified Scaling Laws).</text>
</svg>
