<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1F5560"/>
    </marker>
    <marker id="arrow05b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#B58A2C"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le mur des systèmes</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Les experts sont répartis sur des dizaines de GPU ; à chaque couche, les tokens voyagent en all-to-all</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Tokens (left) -->
  <text x="60" y="185" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A">TOKENS DU LOT</text>
  <rect x="60" y="250" width="120" height="300" rx="3" fill="#1A1A1A"/>
  <text x="120" y="290" class="body" font-size="12" fill="#FAF8F3" text-anchor="middle">lot de tokens</text>
  <g fill="#B7332C">
    <rect x="80" y="310" width="80" height="20" rx="2" fill-opacity="0.9"/>
    <rect x="80" y="340" width="80" height="20" rx="2" fill-opacity="0.7"/>
    <rect x="80" y="370" width="80" height="20" rx="2" fill-opacity="0.5"/>
    <rect x="80" y="400" width="80" height="20" rx="2" fill-opacity="0.85"/>
    <rect x="80" y="430" width="80" height="20" rx="2" fill-opacity="0.6"/>
  </g>
  <text x="120" y="480" class="body" font-size="11" font-style="italic" fill="#B8B5AE" text-anchor="middle">chacun routé vers</text>
  <text x="120" y="496" class="body" font-size="11" font-style="italic" fill="#B8B5AE" text-anchor="middle">un expert distant</text>

  <!-- Dispatch band -->
  <g class="interactive" data-card="all-to-all-dispatch" tabindex="0" role="button" aria-label="All-to-all dispatch — cliquez pour les détails">
    <rect x="210" y="220" width="150" height="360" rx="3" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.25" stroke-dasharray="2 3"/>
    <text x="285" y="245" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">DISPATCH</text>
    <text x="285" y="262" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">all-to-all</text>
    <path d="M188 320 C 240 320, 300 300, 372 300" fill="none" stroke="#1F5560" stroke-width="1.5" marker-end="url(#arrow05)"/>
    <path d="M188 350 C 240 350, 300 470, 372 470" fill="none" stroke="#1F5560" stroke-width="1.5" marker-end="url(#arrow05)"/>
    <path d="M188 410 C 240 410, 300 380, 372 380" fill="none" stroke="#1F5560" stroke-width="1.5" marker-end="url(#arrow05)"/>
    <path d="M188 440 C 240 440, 300 550, 372 550" fill="none" stroke="#1F5560" stroke-width="1.5" marker-end="url(#arrow05)"/>
  </g>

  <!-- Experts on GPUs -->
  <g class="interactive" data-card="expert-parallelism" tabindex="0" role="button" aria-label="Le parallélisme d'experts — cliquez pour les détails">
    <rect x="384" y="200" width="440" height="400" rx="3" fill="#5A5A5A" fill-opacity="0.03" stroke="#B8B5AE" stroke-width="1.25"/>
    <text x="408" y="228" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#5A5A5A">PARALLÉLISME D'EXPERTS — 4 GPU, experts répartis</text>
    <!-- GPU 0 -->
    <rect x="408" y="248" width="188" height="150" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="422" y="270" class="mono" font-size="11" font-weight="600" fill="#1F5560">GPU 0</text>
    <rect x="422" y="284" width="72" height="44" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1"/>
    <text x="458" y="311" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">E0</text>
    <rect x="506" y="284" width="72" height="44" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1"/>
    <text x="542" y="311" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">E1</text>
    <rect x="422" y="340" width="156" height="42" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1"/>
    <text x="500" y="366" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">tokens locaux + distants</text>
    <!-- GPU 1 -->
    <rect x="612" y="248" width="188" height="150" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="626" y="270" class="mono" font-size="11" font-weight="600" fill="#1F5560">GPU 1</text>
    <rect x="626" y="284" width="72" height="44" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1"/>
    <text x="662" y="311" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">E2</text>
    <rect x="710" y="284" width="72" height="44" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1"/>
    <text x="746" y="311" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">E3</text>
    <rect x="626" y="340" width="156" height="42" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1"/>
    <text x="704" y="366" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">tokens locaux + distants</text>
    <!-- GPU 2 -->
    <rect x="408" y="416" width="188" height="150" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="422" y="438" class="mono" font-size="11" font-weight="600" fill="#1F5560">GPU 2</text>
    <rect x="422" y="452" width="72" height="44" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1"/>
    <text x="458" y="479" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">E4</text>
    <rect x="506" y="452" width="72" height="44" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1"/>
    <text x="542" y="479" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">E5</text>
    <rect x="422" y="508" width="156" height="42" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1"/>
    <text x="500" y="534" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">tokens locaux + distants</text>
    <!-- GPU 3 -->
    <rect x="612" y="416" width="188" height="150" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="626" y="438" class="mono" font-size="11" font-weight="600" fill="#1F5560">GPU 3</text>
    <rect x="626" y="452" width="72" height="44" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1"/>
    <text x="662" y="479" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">E6</text>
    <rect x="710" y="452" width="72" height="44" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1"/>
    <text x="746" y="479" class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">E7</text>
    <rect x="626" y="508" width="156" height="42" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="1"/>
    <text x="704" y="534" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">tokens locaux + distants</text>
  </g>

  <!-- Combine band -->
  <g class="interactive" data-card="all-to-all-combine" tabindex="0" role="button" aria-label="All-to-all combine — cliquez pour les détails">
    <rect x="848" y="220" width="140" height="360" rx="3" fill="#B58A2C" fill-opacity="0.05" stroke="#B58A2C" stroke-width="1.25" stroke-dasharray="2 3"/>
    <text x="918" y="245" class="mono" font-size="11" font-weight="600" fill="#B58A2C" text-anchor="middle">COMBINE</text>
    <text x="918" y="262" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">all-to-all retour</text>
    <path d="M826 310 C 870 310, 940 340, 986 340" fill="none" stroke="#B58A2C" stroke-width="1.5" marker-end="url(#arrow05b)"/>
    <path d="M826 480 C 870 480, 940 400, 986 400" fill="none" stroke="#B58A2C" stroke-width="1.5" marker-end="url(#arrow05b)"/>
  </g>

  <!-- Output -->
  <rect x="1006" y="300" width="120" height="140" rx="3" fill="#1A1A1A"/>
  <text x="1066" y="360" class="body" font-size="12" fill="#FAF8F3" text-anchor="middle">tokens</text>
  <text x="1066" y="380" class="body" font-size="12" fill="#FAF8F3" text-anchor="middle">recomposés</text>

  <!-- Bottleneck callout -->
  <g class="interactive" data-card="goulot-reseau" tabindex="0" role="button" aria-label="Le goulot réseau — cliquez pour les détails">
    <rect x="60" y="620" width="1080" height="70" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.5"/>
    <text x="84" y="650" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#B7332C">LE GOULOT ⚠</text>
    <text x="84" y="676" class="body" font-size="14" fill="#1A1A1A">Le calcul des experts est trivialement parallèle. Le vrai coût, ce sont les deux collectifs <tspan font-weight="600">all-to-all</tspan> — la performance dépend de la bande passante (NVLink, InfiniBand) autant que des FLOPs.</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="730" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : Lepikhin et al. 2020 (GShard) ; Rajbhandari et al. 2022 (DeepSpeed-MoE) ; Gale et al. 2023 (MegaBlocks) ; DeepSeek-AI 2024.</text>
</svg>
