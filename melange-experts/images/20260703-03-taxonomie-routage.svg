<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="56" y="52" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="56" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">La taxonomie du routage</text>
  <text x="56" y="120" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Deux décisions orthogonales : qui choisit, et comment structurer les experts</text>
  <line x1="56" y1="142" x2="844" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- AXIS A -->
  <text x="56" y="182" class="mono" font-size="12" font-weight="600" letter-spacing="0.12em" fill="#1F5560">A · QUI CHOISIT LES AFFECTATIONS ?</text>

  <g class="interactive" data-card="token-choice" tabindex="0" role="button" aria-label="Routage token-choice — cliquez pour les détails">
    <rect x="56" y="200" width="380" height="184" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="80" y="234" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Token-choice</text>
    <text x="80" y="262" class="body" font-size="14" fill="#5A5A5A">Chaque token choisit ses k experts</text>
    <line x1="80" y1="278" x2="412" y2="278" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="80" y="304" class="body" font-size="13" fill="#1A1A1A">• <tspan font-weight="600">top-1</tspan> — Switch, Llama 4</text>
    <text x="80" y="328" class="body" font-size="13" fill="#1A1A1A">• <tspan font-weight="600">top-2</tspan> — Mixtral</text>
    <text x="80" y="352" class="body" font-size="13" fill="#1A1A1A">• <tspan font-weight="600">top-8</tspan> — Qwen3, DeepSeek</text>
    <text x="80" y="374" class="body" font-size="12" font-style="italic" fill="#B7332C">Risque : déséquilibre de charge</text>
  </g>

  <g class="interactive" data-card="expert-choice" tabindex="0" role="button" aria-label="Routage expert-choice — cliquez pour les détails">
    <rect x="464" y="200" width="380" height="184" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="488" y="234" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Expert-choice</text>
    <text x="488" y="262" class="body" font-size="14" fill="#5A5A5A">Chaque expert choisit ses tokens</text>
    <line x1="488" y1="278" x2="820" y2="278" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="488" y="304" class="body" font-size="13" fill="#1A1A1A">• Équilibre <tspan font-weight="600">garanti par construction</tspan></text>
    <text x="488" y="328" class="body" font-size="13" fill="#1A1A1A">• Pas de loss auxiliaire</text>
    <text x="488" y="352" class="body" font-size="13" fill="#1A1A1A">• Zhou et al. 2022</text>
    <text x="488" y="374" class="body" font-size="12" font-style="italic" fill="#1F5560">Limite : mal adapté à l'auto-régressif</text>
  </g>

  <!-- AXIS B -->
  <text x="56" y="452" class="mono" font-size="12" font-weight="600" letter-spacing="0.12em" fill="#B58A2C">B · COMMENT STRUCTURER LES EXPERTS ?</text>

  <g class="interactive" data-card="experts-fins" tabindex="0" role="button" aria-label="Experts fins — cliquez pour les détails">
    <rect x="56" y="470" width="380" height="200" rx="3" fill="#B58A2C" fill-opacity="0.07" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="80" y="504" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Experts fins</text>
    <text x="80" y="532" class="body" font-size="14" fill="#5A5A5A">Beaucoup de petits experts</text>
    <!-- fine grid -->
    <g fill="#B58A2C" fill-opacity="0.55">
      <rect x="80" y="548" width="26" height="26" rx="2"/><rect x="112" y="548" width="26" height="26" rx="2"/>
      <rect x="144" y="548" width="26" height="26" rx="2"/><rect x="176" y="548" width="26" height="26" rx="2"/>
      <rect x="208" y="548" width="26" height="26" rx="2"/><rect x="240" y="548" width="26" height="26" rx="2"/>
      <rect x="80" y="580" width="26" height="26" rx="2"/><rect x="112" y="580" width="26" height="26" rx="2"/>
      <rect x="144" y="580" width="26" height="26" rx="2"/><rect x="176" y="580" width="26" height="26" rx="2"/>
      <rect x="208" y="580" width="26" height="26" rx="2"/><rect x="240" y="580" width="26" height="26" rx="2"/>
    </g>
    <text x="80" y="638" class="body" font-size="13" fill="#1A1A1A">Plus de combinaisons → spécialisation</text>
    <text x="80" y="658" class="body" font-size="12" font-style="italic" fill="#B58A2C">DeepSeekMoE 2024</text>
  </g>

  <g class="interactive" data-card="expert-partage" tabindex="0" role="button" aria-label="Expert partagé — cliquez pour les détails">
    <rect x="464" y="470" width="380" height="200" rx="3" fill="#2F5D3F" fill-opacity="0.07" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="488" y="504" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Expert partagé</text>
    <text x="488" y="532" class="body" font-size="14" fill="#5A5A5A">Un expert toujours actif pour le commun</text>
    <rect x="488" y="548" width="120" height="58" rx="3" fill="#2F5D3F" fill-opacity="0.55"/>
    <text x="548" y="583" class="body" font-size="12" font-weight="600" fill="#FAF8F3" text-anchor="middle">partagé</text>
    <g fill="#B8B5AE">
      <rect x="628" y="548" width="26" height="26" rx="2"/><rect x="660" y="548" width="26" height="26" rx="2"/>
      <rect x="692" y="548" width="26" height="26" rx="2"/><rect x="724" y="548" width="26" height="26" rx="2"/>
      <rect x="628" y="580" width="26" height="26" rx="2"/><rect x="660" y="580" width="26" height="26" rx="2"/>
      <rect x="692" y="580" width="26" height="26" rx="2"/><rect x="724" y="580" width="26" height="26" rx="2"/>
    </g>
    <text x="488" y="638" class="body" font-size="13" fill="#1A1A1A">Connaissance commune hors du routage</text>
    <text x="488" y="658" class="body" font-size="12" font-style="italic" fill="#2F5D3F">DeepSeek oui · Qwen3 non</text>
  </g>

  <!-- convergence note -->
  <rect x="56" y="700" width="788" height="60" rx="3" fill="#1A1A1A"/>
  <text x="450" y="726" class="body" font-size="13" font-weight="500" fill="#FAF8F3" text-anchor="middle">Recette dominante 2026 : token-choice top-k + experts fins (+ expert partagé, point de désaccord vif)</text>
  <text x="450" y="746" class="body" font-size="12" font-style="italic" fill="#B8B5AE" text-anchor="middle">Les deux axes se combinent librement — chaque laboratoire place ses curseurs</text>

  <!-- FOOTER -->
  <text x="56" y="800" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : Fedus et al. 2021 ; Zhou et al. 2022 ; Dai et al. 2024 (DeepSeekMoE) ; Qwen Team 2025.</text>
</svg>
