<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow06" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Servir un modèle creux — l'asymétrie mémoire / calcul</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Tous les experts résidents, une poignée seulement active : cadeau pour le débit, casse-tête pour la VRAM</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- MEMORY -->
  <g class="interactive" data-card="memoire-residente" tabindex="0" role="button" aria-label="La mémoire résidente — cliquez pour les détails">
    <rect x="60" y="180" width="520" height="196" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="84" y="210" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#1F5560">CE QU'IL FAUT STOCKER</text>
    <text x="84" y="238" class="body" font-size="15" font-weight="500" fill="#1A1A1A">Tous les experts en mémoire</text>
    <text x="84" y="260" class="body" font-size="12.5" fill="#5A5A5A">On ignore à l'avance lesquels serviront → tout doit être résident</text>
    <!-- 16 expert cells all filled -->
    <g fill="#1F5560" fill-opacity="0.5">
      <rect x="84" y="288" width="28" height="56" rx="2"/><rect x="116" y="288" width="28" height="56" rx="2"/>
      <rect x="148" y="288" width="28" height="56" rx="2"/><rect x="180" y="288" width="28" height="56" rx="2"/>
      <rect x="212" y="288" width="28" height="56" rx="2"/><rect x="244" y="288" width="28" height="56" rx="2"/>
      <rect x="276" y="288" width="28" height="56" rx="2"/><rect x="308" y="288" width="28" height="56" rx="2"/>
      <rect x="340" y="288" width="28" height="56" rx="2"/><rect x="372" y="288" width="28" height="56" rx="2"/>
      <rect x="404" y="288" width="28" height="56" rx="2"/><rect x="436" y="288" width="28" height="56" rx="2"/>
      <rect x="468" y="288" width="28" height="56" rx="2"/><rect x="500" y="288" width="28" height="56" rx="2"/>
      <rect x="532" y="288" width="28" height="56" rx="2"/>
    </g>
    <text x="84" y="366" class="mono" font-size="13" font-weight="500" fill="#1F5560">671 Md résidents</text>
  </g>

  <!-- COMPUTE -->
  <g class="interactive" data-card="calcul-actif" tabindex="0" role="button" aria-label="Le calcul actif — cliquez pour les détails">
    <rect x="620" y="180" width="520" height="196" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="644" y="210" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#B7332C">CE QU'IL FAUT CALCULER</text>
    <text x="644" y="238" class="body" font-size="15" font-weight="500" fill="#1A1A1A">Une poignée d'experts actifs</text>
    <text x="644" y="260" class="body" font-size="12.5" fill="#5A5A5A">Par token, seuls k experts sur N travaillent réellement</text>
    <!-- same 15 cells, only 2 active -->
    <g fill="#B8B5AE" fill-opacity="0.35">
      <rect x="644" y="288" width="28" height="56" rx="2"/><rect x="676" y="288" width="28" height="56" rx="2"/>
      <rect x="708" y="288" width="28" height="56" rx="2"/><rect x="740" y="288" width="28" height="56" rx="2"/>
      <rect x="772" y="288" width="28" height="56" rx="2"/><rect x="804" y="288" width="28" height="56" rx="2"/>
      <rect x="836" y="288" width="28" height="56" rx="2"/><rect x="868" y="288" width="28" height="56" rx="2"/>
      <rect x="900" y="288" width="28" height="56" rx="2"/><rect x="932" y="288" width="28" height="56" rx="2"/>
      <rect x="964" y="288" width="28" height="56" rx="2"/><rect x="996" y="288" width="28" height="56" rx="2"/>
      <rect x="1028" y="288" width="28" height="56" rx="2"/>
    </g>
    <rect x="708" y="288" width="28" height="56" rx="2" fill="#B7332C"/>
    <rect x="900" y="288" width="28" height="56" rx="2" fill="#B7332C"/>
    <text x="644" y="366" class="mono" font-size="13" font-weight="500" fill="#B7332C">37 Md actifs</text>
  </g>

  <!-- BATCH IMBALANCE -->
  <g class="interactive" data-card="desequilibre-batch" tabindex="0" role="button" aria-label="Le déséquilibre au batch — cliquez pour les détails">
    <rect x="60" y="396" width="520" height="240" rx="3" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="84" y="426" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#B58A2C">LE PIÈGE DU BATCHING</text>
    <text x="84" y="452" class="body" font-size="14" fill="#1A1A1A">En regroupant des centaines de requêtes, les tokens</text>
    <text x="84" y="472" class="body" font-size="14" fill="#1A1A1A">se dispersent sur tous les experts — déséquilibre à l'inférence</text>
    <!-- inference load bars uneven -->
    <line x1="100" y1="600" x2="556" y2="600" stroke="#5A5A5A" stroke-width="1"/>
    <rect x="112" y="520" width="36" height="80" fill="#B58A2C" fill-opacity="0.7"/>
    <rect x="158" y="500" width="36" height="100" fill="#B58A2C" fill-opacity="0.7"/>
    <rect x="204" y="560" width="36" height="40" fill="#B58A2C" fill-opacity="0.5"/>
    <rect x="250" y="490" width="36" height="110" fill="#B7332C"/>
    <rect x="296" y="548" width="36" height="52" fill="#B58A2C" fill-opacity="0.5"/>
    <rect x="342" y="570" width="36" height="30" fill="#B58A2C" fill-opacity="0.4"/>
    <rect x="388" y="512" width="36" height="88" fill="#B58A2C" fill-opacity="0.7"/>
    <rect x="434" y="556" width="36" height="44" fill="#B58A2C" fill-opacity="0.5"/>
    <line x1="250" y1="490" x2="520" y2="490" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="3 3"/>
    <text x="524" y="493" class="body" font-size="11" font-style="italic" fill="#B7332C">latence dictée par l'expert le plus chargé</text>
  </g>

  <!-- OFFLOADING -->
  <g class="interactive" data-card="offloading" tabindex="0" role="button" aria-label="L'offloading — cliquez pour les détails">
    <rect x="620" y="396" width="520" height="240" rx="3" fill="#2F5D3F" fill-opacity="0.06" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="644" y="426" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#2F5D3F">LA PARADE MÉMOIRE · OFFLOADING</text>
    <text x="644" y="452" class="body" font-size="14" fill="#1A1A1A">Décharger les experts inactifs vers CPU / disque,</text>
    <text x="644" y="472" class="body" font-size="14" fill="#1A1A1A">les rappeler à la demande (+ quantization 4 bits)</text>
    <!-- VRAM box -->
    <rect x="644" y="500" width="150" height="90" rx="3" fill="#2F5D3F" fill-opacity="0.14" stroke="#2F5D3F" stroke-width="1.25"/>
    <text x="719" y="530" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">VRAM (HBM)</text>
    <text x="719" y="552" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">experts actifs</text>
    <!-- CPU/disk box -->
    <rect x="966" y="500" width="150" height="90" rx="3" fill="#B8B5AE" fill-opacity="0.2" stroke="#B8B5AE" stroke-width="1.25"/>
    <text x="1041" y="530" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">CPU / disque</text>
    <text x="1041" y="552" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">experts dormants</text>
    <path d="M800 528 C 860 528, 900 528, 960 528" fill="none" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow06)"/>
    <path d="M960 562 C 900 562, 860 562, 800 562" fill="none" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow06)"/>
    <text x="880" y="518" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">décharge</text>
    <text x="880" y="580" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">rappel à la demande</text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="660" x2="1140" y2="660" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="692" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Un MoE coûte en mémoire comme un dense de sa taille totale, mais ne calcule que comme un dense de sa taille active.</text>
  <text x="60" y="712" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : Rajbhandari et al. 2022 (DeepSpeed-MoE) ; Muennighoff et al. 2024 (OLMoE) ; DeepSeek-AI 2024.</text>
</svg>
