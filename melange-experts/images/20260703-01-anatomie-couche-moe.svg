<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrow01c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Anatomie d'une couche de mélange d'experts</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Un routeur note les experts, le top-k n'en active qu'une poignée, une somme pondérée recompose la sortie</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Input token -->
  <rect x="60" y="380" width="96" height="64" rx="3" fill="#1A1A1A"/>
  <text x="108" y="410" class="body" font-size="13" font-weight="500" fill="#FAF8F3" text-anchor="middle">token</text>
  <text x="108" y="428" class="mono" font-size="11" fill="#B8B5AE" text-anchor="middle">entrant</text>
  <line x1="156" y1="412" x2="222" y2="412" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow01)"/>

  <!-- 1 · ROUTER -->
  <g class="interactive" data-card="routeur" tabindex="0" role="button" aria-label="Le routeur (gate) — cliquez pour les détails">
    <rect x="236" y="300" width="176" height="224" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="260" y="330" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#1F5560">A · ROUTEUR</text>
    <text x="260" y="354" class="body" font-size="13" font-weight="500" fill="#1A1A1A">softmax(x · W)</text>
    <!-- gating score bars -->
    <rect x="260" y="372" width="60" height="14" rx="2" fill="#1F5560" fill-opacity="0.30"/>
    <rect x="260" y="392" width="128" height="14" rx="2" fill="#B7332C"/>
    <rect x="260" y="412" width="44" height="14" rx="2" fill="#1F5560" fill-opacity="0.30"/>
    <rect x="260" y="432" width="112" height="14" rx="2" fill="#B7332C"/>
    <rect x="260" y="452" width="52" height="14" rx="2" fill="#1F5560" fill-opacity="0.30"/>
    <rect x="260" y="472" width="38" height="14" rx="2" fill="#1F5560" fill-opacity="0.30"/>
    <text x="260" y="506" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Un score d'affinité par expert</text>
  </g>

  <!-- 2 · TOP-K gate label -->
  <g class="interactive" data-card="top-k" tabindex="0" role="button" aria-label="La sélection top-k — cliquez pour les détails">
    <rect x="440" y="386" width="96" height="52" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.5"/>
    <text x="488" y="410" class="mono" font-size="15" font-weight="600" fill="#B7332C" text-anchor="middle">top-k</text>
    <text x="488" y="428" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">k = 2 ici</text>
  </g>
  <line x1="412" y1="412" x2="436" y2="412" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow01)"/>

  <!-- 3 · EXPERT BANK -->
  <g class="interactive" data-card="banc-experts" tabindex="0" role="button" aria-label="Le banc d'experts — cliquez pour les détails">
    <rect x="592" y="212" width="392" height="400" rx="3" fill="#5A5A5A" fill-opacity="0.04" stroke="#B8B5AE" stroke-width="1.25" stroke-dasharray="2 3"/>
    <text x="616" y="240" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">B · BANC D'EXPERTS (N FFN)</text>
    <!-- Experts grid 2 cols x 4 rows -->
    <!-- inactive experts -->
    <rect x="616" y="256" width="160" height="66" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25"/>
    <text x="696" y="294" class="body" font-size="13" fill="#B8B5AE" text-anchor="middle">Expert 1</text>
    <rect x="800" y="256" width="160" height="66" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="2.5"/>
    <text x="880" y="290" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Expert 2</text>
    <text x="880" y="308" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">SÉLECTIONNÉ</text>
    <rect x="616" y="340" width="160" height="66" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25"/>
    <text x="696" y="378" class="body" font-size="13" fill="#B8B5AE" text-anchor="middle">Expert 3</text>
    <rect x="800" y="340" width="160" height="66" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25"/>
    <text x="880" y="378" class="body" font-size="13" fill="#B8B5AE" text-anchor="middle">Expert 4</text>
    <rect x="616" y="424" width="160" height="66" rx="3" fill="#B7332C" fill-opacity="0.10" stroke="#B7332C" stroke-width="2.5"/>
    <text x="696" y="458" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Expert 5</text>
    <text x="696" y="476" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">SÉLECTIONNÉ</text>
    <rect x="800" y="424" width="160" height="66" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25"/>
    <text x="880" y="462" class="body" font-size="13" fill="#B8B5AE" text-anchor="middle">Expert 6</text>
    <rect x="616" y="508" width="160" height="66" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25"/>
    <text x="696" y="546" class="body" font-size="13" fill="#B8B5AE" text-anchor="middle">Expert 7</text>
    <rect x="800" y="508" width="160" height="66" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25"/>
    <text x="880" y="546" class="body" font-size="13" fill="#B8B5AE" text-anchor="middle">Expert N</text>
  </g>

  <!-- routing connectors: 2 emphasized to selected experts -->
  <path d="M536 405 C 566 360, 576 300, 796 289" fill="none" stroke="#B7332C" stroke-width="2.5" marker-end="url(#arrow01c)"/>
  <path d="M536 419 C 566 460, 576 457, 612 457" fill="none" stroke="#B7332C" stroke-width="2.5" marker-end="url(#arrow01c)"/>

  <!-- 4 · COMBINE -->
  <g class="interactive" data-card="combine" tabindex="0" role="button" aria-label="La combinaison pondérée — cliquez pour les détails">
    <circle cx="1050" cy="412" r="42" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="2.5"/>
    <text x="1050" y="408" class="display" font-size="26" font-weight="600" fill="#1A1A1A" text-anchor="middle">Σ</text>
    <text x="1050" y="428" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">pondérée</text>
  </g>
  <!-- selected experts to combine -->
  <path d="M960 289 C 1010 300, 1030 350, 1044 372" fill="none" stroke="#B58A2C" stroke-width="2" marker-end="url(#arrow01)"/>
  <path d="M776 457 C 900 470, 990 450, 1016 428" fill="none" stroke="#B58A2C" stroke-width="2" marker-end="url(#arrow01)"/>

  <!-- output -->
  <line x1="1050" y1="454" x2="1050" y2="520" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow01)"/>
  <text x="1050" y="546" class="body" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">token transformé</text>
  <text x="1050" y="564" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">k/N des poids mobilisés</text>

  <!-- Annotation strip -->
  <line x1="60" y1="640" x2="1140" y2="640" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="672" class="mono" font-size="12" font-weight="600" fill="#1F5560">A</text>
  <text x="80" y="672" class="body" font-size="13" fill="#1A1A1A">Le gate note tous les experts…</text>
  <text x="360" y="672" class="mono" font-size="12" font-weight="600" fill="#B7332C">B</text>
  <text x="380" y="672" class="body" font-size="13" fill="#1A1A1A">…top-k n'en garde que k (la sparsité naît ici)…</text>
  <text x="760" y="672" class="mono" font-size="12" font-weight="600" fill="#B58A2C">C</text>
  <text x="780" y="672" class="body" font-size="13" fill="#1A1A1A">…Σ recompose la sortie, pondérée par les scores.</text>

  <!-- FOOTER -->
  <text x="60" y="720" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : Shazeer et al. 2017 ; Fedus, Zoph &amp; Shazeer 2021 (Switch Transformer). Capacité ∝ N, coût ∝ k.</text>
</svg>
