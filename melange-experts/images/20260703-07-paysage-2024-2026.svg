<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="13" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="95" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le paysage MoE, 2024-2026</text>
  <text x="60" y="123" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Un espace de conception bien cartographié où chaque laboratoire place ses curseurs</text>
  <line x1="60" y1="145" x2="1140" y2="145" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Table header -->
  <text x="76" y="192" class="mono" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A">MODÈLE</text>
  <text x="330" y="192" class="mono" font-size="11" font-weight="600" letter-spacing="0.06em" fill="#5A5A5A" text-anchor="middle">TOTAL</text>
  <text x="450" y="192" class="mono" font-size="11" font-weight="600" letter-spacing="0.06em" fill="#5A5A5A" text-anchor="middle">ACTIFS</text>
  <text x="570" y="192" class="mono" font-size="11" font-weight="600" letter-spacing="0.06em" fill="#5A5A5A" text-anchor="middle">EXPERTS</text>
  <text x="690" y="192" class="mono" font-size="11" font-weight="600" letter-spacing="0.06em" fill="#5A5A5A" text-anchor="middle">TOP-K</text>
  <text x="800" y="192" class="mono" font-size="11" font-weight="600" letter-spacing="0.06em" fill="#5A5A5A" text-anchor="middle">PARTAGÉ</text>
  <text x="960" y="192" class="mono" font-size="11" font-weight="600" letter-spacing="0.06em" fill="#5A5A5A" text-anchor="middle">ÉQUILIBRAGE</text>
  <line x1="60" y1="204" x2="1140" y2="204" stroke="#1A1A1A" stroke-width="1"/>

  <!-- Row Mixtral -->
  <g class="interactive" data-card="mixtral" tabindex="0" role="button" aria-label="Mixtral 8×7B — cliquez pour les détails">
    <rect x="60" y="212" width="1080" height="88" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="76" y="248" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Mixtral 8×7B</text>
    <text x="76" y="272" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Mistral · 2024 — l'open qui a rattrapé le dense</text>
    <text x="330" y="264" class="mono" font-size="14" fill="#1A1A1A" text-anchor="middle">47 Md</text>
    <text x="450" y="264" class="mono" font-size="14" fill="#B7332C" text-anchor="middle">13 Md</text>
    <text x="570" y="264" class="mono" font-size="14" fill="#1A1A1A" text-anchor="middle">8</text>
    <text x="690" y="264" class="mono" font-size="14" fill="#1A1A1A" text-anchor="middle">2</text>
    <text x="800" y="264" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle">non</text>
    <text x="960" y="264" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle">loss auxiliaire</text>
  </g>

  <!-- Row DeepSeek-V3 -->
  <g class="interactive" data-card="deepseek-v3" tabindex="0" role="button" aria-label="DeepSeek-V3 — cliquez pour les détails">
    <rect x="60" y="306" width="1080" height="88" rx="3" fill="#B7332C" fill-opacity="0.04" stroke="#B7332C" stroke-width="1.25"/>
    <text x="76" y="342" class="display" font-size="18" font-weight="600" fill="#1A1A1A">DeepSeek-V3</text>
    <text x="76" y="366" class="body" font-size="12" font-style="italic" fill="#5A5A5A">DeepSeek · 2024 — la synthèse la plus aboutie</text>
    <text x="330" y="358" class="mono" font-size="14" fill="#1A1A1A" text-anchor="middle">671 Md</text>
    <text x="450" y="358" class="mono" font-size="14" fill="#B7332C" text-anchor="middle">37 Md</text>
    <text x="570" y="358" class="mono" font-size="14" fill="#1A1A1A" text-anchor="middle">256 fins</text>
    <text x="690" y="358" class="mono" font-size="14" fill="#1A1A1A" text-anchor="middle">8</text>
    <text x="800" y="358" class="body" font-size="13" font-weight="600" fill="#2F5D3F" text-anchor="middle">oui (1)</text>
    <text x="960" y="358" class="body" font-size="13" font-weight="600" fill="#2F5D3F" text-anchor="middle">biais sans-loss ★</text>
  </g>

  <!-- Row Llama 4 -->
  <g class="interactive" data-card="llama4" tabindex="0" role="button" aria-label="Llama 4 Maverick — cliquez pour les détails">
    <rect x="60" y="400" width="1080" height="88" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="76" y="436" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Llama 4 Maverick</text>
    <text x="76" y="460" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Meta · 2025 — le pari de la sobriété du routage</text>
    <text x="330" y="452" class="mono" font-size="14" fill="#1A1A1A" text-anchor="middle">400 Md</text>
    <text x="450" y="452" class="mono" font-size="14" fill="#B7332C" text-anchor="middle">17 Md</text>
    <text x="570" y="452" class="mono" font-size="14" fill="#1A1A1A" text-anchor="middle">128</text>
    <text x="690" y="452" class="mono" font-size="14" font-weight="600" fill="#B7332C" text-anchor="middle">1</text>
    <text x="800" y="452" class="body" font-size="13" font-weight="600" fill="#2F5D3F" text-anchor="middle">oui (1)</text>
    <text x="960" y="452" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle">loss auxiliaire</text>
  </g>

  <!-- Row Qwen3 -->
  <g class="interactive" data-card="qwen3" tabindex="0" role="button" aria-label="Qwen3 — cliquez pour les détails">
    <rect x="60" y="494" width="1080" height="88" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="76" y="530" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Qwen3 235B</text>
    <text x="76" y="554" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Alibaba · 2025 — le contre-pied : spécialisation maximale</text>
    <text x="330" y="546" class="mono" font-size="14" fill="#1A1A1A" text-anchor="middle">235 Md</text>
    <text x="450" y="546" class="mono" font-size="14" fill="#B7332C" text-anchor="middle">22 Md</text>
    <text x="570" y="546" class="mono" font-size="14" fill="#1A1A1A" text-anchor="middle">128 fins</text>
    <text x="690" y="546" class="mono" font-size="14" fill="#1A1A1A" text-anchor="middle">8</text>
    <text x="800" y="546" class="body" font-size="13" font-weight="600" fill="#B7332C" text-anchor="middle">non</text>
    <text x="960" y="546" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle">loss (global-batch)</text>
  </g>

  <!-- vertical rules -->
  <g stroke="#E5E1D8" stroke-width="0.5">
    <line x1="270" y1="212" x2="270" y2="582"/>
    <line x1="390" y1="212" x2="390" y2="582"/>
    <line x1="510" y1="212" x2="510" y2="582"/>
    <line x1="630" y1="212" x2="630" y2="582"/>
    <line x1="750" y1="212" x2="750" y2="582"/>
    <line x1="850" y1="212" x2="850" y2="582"/>
  </g>

  <!-- Convergence note -->
  <rect x="60" y="602" width="1080" height="80" rx="3" fill="#1A1A1A"/>
  <text x="84" y="632" class="mono" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#B58A2C">TENDANCES DE CONVERGENCE</text>
  <text x="84" y="660" class="body" font-size="13.5" fill="#FAF8F3">La granularité fine s'impose · le nombre d'experts monte (8 → 128+) · l'équilibrage sans-loss gagne · l'expert partagé reste le seul désaccord vif.</text>

  <!-- FOOTER -->
  <text x="60" y="726" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Chiffres d'actifs approximatifs. Source : Jiang et al. 2024 (Mixtral) ; DeepSeek-AI 2024 ; Meta AI 2025 (Llama 4) ; Qwen Team 2025.</text>
</svg>
