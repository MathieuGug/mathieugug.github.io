<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="t06">
<title id="t06">L'échelle de diffusion — du raisonneur frontière à l'agent outillé</title>
<defs>
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <marker id="arrow06" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#B7332C"/>
  </marker>
</defs>
<rect width="1200" height="800" fill="#FAF8F3"/>

<!-- Header -->
<text x="60" y="62" class="mono" font-size="11" font-weight="600" letter-spacing="0.18em" fill="#B7332C">SCHÉMA 06 — DIFFUSION LADDER</text>
<text x="60" y="100" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Comment le raisonnement quitte les laboratoires.</text>
<text x="60" y="126" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Quatre paliers : frontière, distillé, on-device, agents en production. Chacun déplace les compétences vers une nouvelle classe d'usages.</text>
<line x1="60" y1="146" x2="1140" y2="146" stroke="#E5E1D8" stroke-width="1"/>

<!-- Four horizontal layers -->
<!-- Layer 1: Frontier -->
<g class="interactive" data-card="frontier" tabindex="0" role="button" aria-label="Frontier : modèles de tête">
  <rect x="80" y="190" width="1040" height="100" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.25"/>
  <text x="100" y="218" class="mono" font-size="10" font-weight="600" fill="#B7332C" letter-spacing="0.06em">PALIER 1 · FRONTIÈRE</text>
  <text x="100" y="252" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Modèles de raisonnement de tête</text>
  <text x="100" y="276" class="body" font-size="12" fill="#5A5A5A">o3, Gemini 2.5 Deep Think, Claude 4.6 Opus, R1 — quelques laboratoires, compute massif, état de l'art benchmarks.</text>
  <text x="900" y="252" class="mono" font-size="11" fill="#1A1A1A" text-anchor="end">~5,6 M$ run</text>
  <text x="1100" y="252" class="mono" font-size="11" fill="#1A1A1A" text-anchor="end">100B+ params</text>
  <text x="900" y="276" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">SOTA AIME, ARC-AGI</text>
  <text x="1100" y="276" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">cloud only</text>
</g>

<!-- Layer 2: Distilled -->
<g class="interactive" data-card="distilled" tabindex="0" role="button" aria-label="Distilled : R1-Distill, modèles 7-32B">
  <rect x="80" y="320" width="1040" height="100" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
  <text x="100" y="348" class="mono" font-size="10" font-weight="600" fill="#1F5560" letter-spacing="0.06em">PALIER 2 · DISTILLÉ</text>
  <text x="100" y="382" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Le raisonnement compressé</text>
  <text x="100" y="406" class="body" font-size="12" fill="#5A5A5A">DeepSeek-R1-Distill-Qwen-32B atteint 72% AIME ; -Distill-7B atteint 55%. Open-weights, fine-tunables.</text>
  <text x="900" y="382" class="mono" font-size="11" fill="#1A1A1A" text-anchor="end">7-32B params</text>
  <text x="1100" y="382" class="mono" font-size="11" fill="#1A1A1A" text-anchor="end">SFT sur traces R1</text>
  <text x="900" y="406" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">single GPU H100</text>
  <text x="1100" y="406" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">self-hostable</text>
</g>

<!-- Layer 3: On-device -->
<g class="interactive" data-card="ondevice" tabindex="0" role="button" aria-label="On-device : raisonneurs sub-7B">
  <rect x="80" y="450" width="1040" height="100" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>
  <text x="100" y="478" class="mono" font-size="10" font-weight="600" fill="#B58A2C" letter-spacing="0.06em">PALIER 3 · ON-DEVICE</text>
  <text x="100" y="512" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Raisonner sur un téléphone</text>
  <text x="100" y="536" class="body" font-size="12" fill="#5A5A5A">DeepSeek-R1-Distill-Qwen-1.5B, Phi-mini-reasoning, Gemma reasoning. Tâches limitées, mais latence locale.</text>
  <text x="900" y="512" class="mono" font-size="11" fill="#1A1A1A" text-anchor="end">1-7B params</text>
  <text x="1100" y="512" class="mono" font-size="11" fill="#1A1A1A" text-anchor="end">quantization 4-bit</text>
  <text x="900" y="536" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">Apple Neural Engine</text>
  <text x="1100" y="536" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">offline</text>
</g>

<!-- Layer 4: Agents -->
<g class="interactive" data-card="agents" tabindex="0" role="button" aria-label="Agents : raisonneurs outillés en production">
  <rect x="80" y="580" width="1040" height="100" rx="3" fill="#1A1A1A" fill-opacity="0.05" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="100" y="608" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" letter-spacing="0.06em">PALIER 4 · AGENTS EN PRODUCTION</text>
  <text x="100" y="642" class="display" font-size="18" font-weight="600" fill="#1A1A1A">La pensée comme programme outillé</text>
  <text x="100" y="666" class="body" font-size="12" fill="#5A5A5A">Claude Code, Cursor, Devin, Aider. Coding, research, computer-use. Le raisonneur est désormais le moteur, pas l'add-on.</text>
  <text x="900" y="642" class="mono" font-size="11" fill="#1A1A1A" text-anchor="end">interleaved thinking</text>
  <text x="1100" y="642" class="mono" font-size="11" fill="#1A1A1A" text-anchor="end">tools natifs</text>
  <text x="900" y="666" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">SWE-bench, GAIA</text>
  <text x="1100" y="666" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">utilisateurs finaux</text>
</g>

<!-- Vertical "diffusion" arrow on the left -->
<line x1="44" y1="200" x2="44" y2="670" stroke="#B7332C" stroke-width="2.5" marker-end="url(#arrow06)"/>
<text x="36" y="430" class="mono" font-size="10" fill="#B7332C" font-weight="600" letter-spacing="0.08em" text-anchor="middle" transform="rotate(-90 36 430)">DIFFUSION</text>

<!-- Right-side annotation: anti-distillation tension -->
<g class="interactive" data-card="antidistill" tabindex="0" role="button" aria-label="Tension anti-distillation">
  <rect x="80" y="700" width="1040" height="60" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="100" y="722" class="mono" font-size="10" font-weight="600" fill="#B7332C" letter-spacing="0.06em">TENSION OPAQUE / AUDITABLE</text>
  <text x="100" y="745" class="body" font-size="12" fill="#1A1A1A">Les laboratoires frontière publient des résumés de CoT (anti-distillation) ; les régulateurs demandent des chaînes auditables (safety). La distillation est le vecteur économique principal — la fermer ralentit la diffusion.</text>
</g>

<!-- Footer -->
<text x="60" y="785" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : DeepSeek R1 (Nature 645, 2025) ; documentation Claude Code, Cursor, Devin (2025-2026) ; recherche Anthropic, OpenAI, Google sur l'opacité des CoT.</text>
</svg>
