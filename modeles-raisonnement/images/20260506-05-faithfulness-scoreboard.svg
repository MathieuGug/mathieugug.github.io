<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="t05">
<title id="t05">La fidélité de la chaîne de pensée — résultats Anthropic 2025</title>
<defs>
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
</defs>
<rect width="1200" height="800" fill="#FAF8F3"/>

<!-- Header -->
<text x="60" y="62" class="mono" font-size="11" font-weight="600" letter-spacing="0.18em" fill="#B7332C">SCHÉMA 05 — FIDÉLITÉ DE LA CHAÎNE DE PENSÉE</text>
<text x="60" y="100" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Ce que le modèle dit n'est pas ce qu'il fait.</text>
<text x="60" y="126" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Pourcentage de cas où le modèle, dans sa CoT, mentionne explicitement un hint qui a influencé sa réponse.</text>
<line x1="60" y1="146" x2="1140" y2="146" stroke="#E5E1D8" stroke-width="1"/>

<!-- Bar chart layout: 4 categories × 2 models -->
<!-- y axis: 0% to 100% -->
<!-- x positions for groups: pool, unauth, MMLU, GPQA -->
<line x1="160" y1="600" x2="1100" y2="600" stroke="#1A1A1A" stroke-width="1"/>
<line x1="160" y1="240" x2="160" y2="600" stroke="#1A1A1A" stroke-width="1"/>

<!-- y gridlines -->
<g stroke="#E5E1D8" stroke-width="0.5">
  <line x1="160" y1="240" x2="1100" y2="240"/>
  <line x1="160" y1="330" x2="1100" y2="330"/>
  <line x1="160" y1="420" x2="1100" y2="420"/>
  <line x1="160" y1="510" x2="1100" y2="510"/>
</g>
<g class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">
  <text x="150" y="244">100%</text>
  <text x="150" y="334">75%</text>
  <text x="150" y="424">50%</text>
  <text x="150" y="514">25%</text>
  <text x="150" y="604">0%</text>
</g>

<!-- Y-axis label -->
<text x="80" y="420" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle" transform="rotate(-90 80 420)">Taux de fidélité (CoT mentionne le hint)</text>

<!-- Bars: each group has 2 bars, Claude 3.7 (left) and R1 (right). 4 groups. -->
<!-- Group spacing: 230 px. Group center positions: 280, 510, 740, 970 -->
<!-- Bar width: 60 px -->
<!-- Threshold for full faith = 100% (= y=240) -->

<!-- Group 1 — Pool de référence -->
<!-- Claude 3.7: 25%   → height = 25% of 360 = 90 → top y = 600-90 = 510 -->
<g class="interactive" data-card="claude37-pool" tabindex="0" role="button" aria-label="Claude 3.7 sur pool de référence : 25%">
  <rect x="240" y="510" width="60" height="90" fill="#1A1A1A"/>
  <text x="270" y="500" class="mono" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">25%</text>
</g>
<!-- R1 39% → height 140 → top y = 460 -->
<g class="interactive" data-card="r1-pool" tabindex="0" role="button" aria-label="R1 sur pool de référence : 39%">
  <rect x="305" y="460" width="60" height="140" fill="#B7332C"/>
  <text x="335" y="450" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">39%</text>
</g>
<text x="302" y="625" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">Pool de référence</text>
<text x="302" y="642" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">tous types de hints</text>

<!-- Group 2 — Unauthorized access -->
<!-- Claude 41% → 148 -->
<g class="interactive" data-card="claude37-unauth" tabindex="0" role="button" aria-label="Claude 3.7 sur classe unauthorized access : 41%">
  <rect x="470" y="452" width="60" height="148" fill="#1A1A1A"/>
  <text x="500" y="442" class="mono" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">41%</text>
</g>
<!-- R1 19% → 68 → top 532 -->
<g class="interactive" data-card="r1-unauth" tabindex="0" role="button" aria-label="R1 sur classe unauthorized access : 19%">
  <rect x="535" y="532" width="60" height="68" fill="#B7332C"/>
  <text x="565" y="522" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">19%</text>
</g>
<text x="532" y="625" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">Unauthorized access</text>
<text x="532" y="642" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">classe sensible</text>

<!-- Group 3 — MMLU (high faith baseline) -->
<!-- Claude 56% → 202 → top 398 -->
<g class="interactive" data-card="mmlu-claude" tabindex="0" role="button" aria-label="Claude 3.7 sur MMLU : 56%">
  <rect x="700" y="398" width="60" height="202" fill="#1A1A1A"/>
  <text x="730" y="388" class="mono" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">~56%</text>
</g>
<!-- R1 ~50% → 180 → top 420 -->
<g class="interactive" data-card="mmlu-r1" tabindex="0" role="button" aria-label="R1 sur MMLU : 50%">
  <rect x="765" y="420" width="60" height="180" fill="#B7332C"/>
  <text x="795" y="410" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">~50%</text>
</g>
<text x="762" y="625" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">MMLU</text>
<text x="762" y="642" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">tâche standard</text>

<!-- Group 4 — GPQA (drop) -->
<!-- Claude 31% → 112 -->
<g class="interactive" data-card="gpqa-claude" tabindex="0" role="button" aria-label="Claude 3.7 sur GPQA : 31%, baisse de 44% relative">
  <rect x="930" y="488" width="60" height="112" fill="#1A1A1A"/>
  <text x="960" y="478" class="mono" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">~31%</text>
  <text x="960" y="464" class="mono" font-size="9" fill="#B7332C" text-anchor="middle">−44% rel.</text>
</g>
<!-- R1 34% → 122 -->
<g class="interactive" data-card="gpqa-r1" tabindex="0" role="button" aria-label="R1 sur GPQA : 34%, baisse de 32% relative">
  <rect x="995" y="478" width="60" height="122" fill="#B7332C"/>
  <text x="1025" y="438" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">~34%</text>
  <text x="1025" y="424" class="mono" font-size="9" fill="#B7332C" text-anchor="middle">−32% rel.</text>
</g>
<text x="992" y="625" class="body" font-size="12" font-weight="500" fill="#1A1A1A" text-anchor="middle">GPQA</text>
<text x="992" y="642" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">PhD-level sciences</text>

<!-- Legend -->
<g>
  <rect x="160" y="180" width="14" height="14" fill="#1A1A1A"/>
  <text x="180" y="192" class="body" font-size="12" fill="#1A1A1A">Claude 3.7 Sonnet</text>
  <rect x="320" y="180" width="14" height="14" fill="#B7332C"/>
  <text x="340" y="192" class="body" font-size="12" fill="#1A1A1A">DeepSeek R1</text>
</g>

<!-- Insight callout (right side, below header) -->
<g class="interactive" data-card="insight" tabindex="0" role="button" aria-label="Implication safety">
  <rect x="60" y="680" width="1080" height="60" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1"/>
  <text x="80" y="703" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Plus la tâche est complexe, moins la CoT fait fenêtre sur le calcul réel.</text>
  <text x="80" y="725" class="body" font-size="12" fill="#5A5A5A">→ Implication : la supervision par CoT n'est pas un audit log fiable. Les politiques d'oversight (AISI, NIST) doivent intégrer cette imperfection.</text>
</g>

<!-- Footer -->
<text x="60" y="772" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Chen, Benton et al. (Anthropic Alignment), Reasoning Models Don't Always Say What They Think, mars 2025. Chiffres exacts pour les classes pool et unauthorized access ; chiffres MMLU/GPQA approximatifs reconstruits à partir des baisses relatives publiées.</text>
</svg>
