<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="t01">
<title id="t01">Le pivot raisonnement : 18 mois, quatre laboratoires</title>
<defs>
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <marker id="arrow01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#5A5A5A"/>
  </marker>
</defs>
<rect width="1200" height="800" fill="#FAF8F3"/>

<!-- Header -->
<text x="60" y="62" class="mono" font-size="11" font-weight="600" letter-spacing="0.18em" fill="#B7332C">SCHÉMA 01 — TIMELINE DU PIVOT</text>
<text x="60" y="100" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Septembre 2024 → mai 2026 : la généralisation des raisonneurs.</text>
<text x="60" y="126" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Quatre laboratoires frontière, quatre familles de modèles à raisonnement explicite en moins de vingt mois.</text>
<line x1="60" y1="146" x2="1140" y2="146" stroke="#E5E1D8" stroke-width="1"/>

<!-- Track labels (left) -->
<g class="mono" font-size="11" fill="#5A5A5A" font-weight="500" letter-spacing="0.06em">
  <text x="60" y="220">OPENAI</text>
  <text x="60" y="320">DEEPSEEK</text>
  <text x="60" y="420">GOOGLE</text>
  <text x="60" y="520">ANTHROPIC</text>
  <text x="60" y="620">BENCHMARKS</text>
</g>

<!-- Track lines -->
<g stroke="#E5E1D8" stroke-width="0.5">
  <line x1="180" y1="220" x2="1140" y2="220"/>
  <line x1="180" y1="320" x2="1140" y2="320"/>
  <line x1="180" y1="420" x2="1140" y2="420"/>
  <line x1="180" y1="520" x2="1140" y2="520"/>
  <line x1="180" y1="620" x2="1140" y2="620"/>
</g>

<!-- X axis: months from Sept 2024 to May 2026, 20 months -->
<!-- x=180 → Sept 2024, x=1140 → May 2026, ~48px per month -->
<g class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">
  <text x="180" y="700">SEP 24</text>
  <text x="370" y="700">JAN 25</text>
  <text x="560" y="700">MAI 25</text>
  <text x="750" y="700">SEP 25</text>
  <text x="940" y="700">JAN 26</text>
  <text x="1140" y="700">MAI 26</text>
</g>
<g stroke="#B8B5AE" stroke-width="0.5">
  <line x1="180" y1="675" x2="180" y2="685"/>
  <line x1="370" y1="675" x2="370" y2="685"/>
  <line x1="560" y1="675" x2="560" y2="685"/>
  <line x1="750" y1="675" x2="750" y2="685"/>
  <line x1="940" y1="675" x2="940" y2="685"/>
  <line x1="1140" y1="675" x2="1140" y2="685"/>
</g>
<line x1="180" y1="660" x2="1140" y2="660" stroke="#1A1A1A" stroke-width="1"/>

<!-- Milestones -->
<!-- o1 : Sep 12, 2024 → x=192 -->
<g class="interactive" data-card="o1" tabindex="0" role="button" aria-label="o1, OpenAI, septembre 2024">
  <circle cx="192" cy="220" r="9" fill="#B7332C"/>
  <text x="192" y="224" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>
  <text x="208" y="200" class="body" font-size="12" font-weight="500" fill="#1A1A1A">o1 (preview)</text>
  <text x="208" y="214" class="mono" font-size="10" fill="#5A5A5A">12 sept 2024</text>
</g>

<!-- o3 : Dec 20, 2024 → x=370 (approx) -->
<g class="interactive" data-card="o3" tabindex="0" role="button" aria-label="o3, OpenAI, décembre 2024">
  <circle cx="350" cy="220" r="9" fill="#B7332C"/>
  <text x="350" y="224" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">2</text>
  <text x="366" y="200" class="body" font-size="12" font-weight="500" fill="#1A1A1A">o3 — annonce</text>
  <text x="366" y="214" class="mono" font-size="10" fill="#5A5A5A">20 déc 2024 · ARC-AGI 87,5%</text>
</g>

<!-- o4-mini : early 2026 → x=940 -->
<g class="interactive" data-card="o4mini" tabindex="0" role="button" aria-label="o4-mini, OpenAI, début 2026">
  <circle cx="930" cy="220" r="7" fill="#B7332C" fill-opacity="0.7"/>
  <text x="945" y="200" class="body" font-size="12" font-weight="500" fill="#1A1A1A">o4-mini</text>
  <text x="945" y="214" class="mono" font-size="10" fill="#5A5A5A">déb. 2026 · 3-15 s/réponse</text>
</g>

<!-- DeepSeek-R1: Jan 20, 2025 → x=380 -->
<g class="interactive" data-card="r1" tabindex="0" role="button" aria-label="DeepSeek R1, janvier 2025">
  <circle cx="380" cy="320" r="9" fill="#1F5560"/>
  <text x="380" y="324" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">3</text>
  <text x="396" y="300" class="body" font-size="12" font-weight="500" fill="#1A1A1A">DeepSeek-R1 / R1-Zero</text>
  <text x="396" y="314" class="mono" font-size="10" fill="#5A5A5A">20 jan 2025 · open weights</text>
</g>

<!-- R1 Nature: Sep 2025 → x=750 -->
<g class="interactive" data-card="r1nature" tabindex="0" role="button" aria-label="R1 publié dans Nature, septembre 2025">
  <circle cx="750" cy="320" r="9" fill="#1F5560"/>
  <text x="750" y="324" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">4</text>
  <text x="766" y="300" class="body" font-size="12" font-weight="500" fill="#1A1A1A">R1 dans Nature</text>
  <text x="766" y="314" class="mono" font-size="10" fill="#5A5A5A">17 sept 2025 · vol. 645</text>
</g>

<!-- Gemini 2.5: March 2025 → x=466 -->
<g class="interactive" data-card="gemini25" tabindex="0" role="button" aria-label="Gemini 2.5, mars 2025">
  <circle cx="466" cy="420" r="9" fill="#B58A2C"/>
  <text x="466" y="424" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">5</text>
  <text x="482" y="400" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Gemini 2.5 (thinking)</text>
  <text x="482" y="414" class="mono" font-size="10" fill="#5A5A5A">mars 2025</text>
</g>

<!-- Deep Think: August 2025 → x=702 -->
<g class="interactive" data-card="deepthink" tabindex="0" role="button" aria-label="Gemini 2.5 Deep Think, août 2025">
  <circle cx="702" cy="420" r="9" fill="#B58A2C"/>
  <text x="702" y="424" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">6</text>
  <text x="718" y="400" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Deep Think · IMO gold</text>
  <text x="718" y="414" class="mono" font-size="10" fill="#5A5A5A">1ᵉʳ août 2025 · parallel thinking</text>
</g>

<!-- Claude 3.7: Feb 2025 → x=420 -->
<g class="interactive" data-card="claude37" tabindex="0" role="button" aria-label="Claude 3.7 extended thinking, février 2025">
  <circle cx="420" cy="520" r="9" fill="#1A1A1A"/>
  <text x="420" y="524" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">7</text>
  <text x="436" y="500" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Claude 3.7 · extended thinking</text>
  <text x="436" y="514" class="mono" font-size="10" fill="#5A5A5A">févr 2025</text>
</g>

<!-- Claude 4.x: 2025 → x=850 -->
<g class="interactive" data-card="claude4" tabindex="0" role="button" aria-label="Claude 4 et interleaved thinking, fin 2025">
  <circle cx="850" cy="520" r="9" fill="#1A1A1A"/>
  <text x="850" y="524" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">8</text>
  <text x="866" y="500" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Claude 4 · interleaved + adaptive</text>
  <text x="866" y="514" class="mono" font-size="10" fill="#5A5A5A">fin 2025 · effort levels</text>
</g>

<!-- AIME pivot: Sep 2024 marker -->
<g class="interactive" data-card="aime" tabindex="0" role="button" aria-label="Bond AIME 2024 sur o1">
  <circle cx="192" cy="620" r="7" fill="#B7332C" fill-opacity="0.7"/>
  <text x="208" y="600" class="body" font-size="11" fill="#1A1A1A">AIME : 13% (GPT-4o) → 74% (o1)</text>
  <text x="208" y="614" class="mono" font-size="10" fill="#5A5A5A">single-sample</text>
</g>

<!-- ARC-AGI : Dec 2024 -->
<g class="interactive" data-card="arc" tabindex="0" role="button" aria-label="ARC-AGI o3 breakthrough">
  <circle cx="350" cy="620" r="7" fill="#B7332C" fill-opacity="0.7"/>
  <text x="366" y="600" class="body" font-size="11" fill="#1A1A1A">ARC-AGI : 87,5% (o3 high)</text>
  <text x="366" y="614" class="mono" font-size="10" fill="#5A5A5A">premier seuil &gt; humain</text>
</g>

<!-- ARC-AGI-3 : 2026 -->
<g class="interactive" data-card="arc3" tabindex="0" role="button" aria-label="ARC-AGI-3 lancé 2025-2026">
  <circle cx="940" cy="620" r="7" fill="#B7332C" fill-opacity="0.7"/>
  <text x="956" y="600" class="body" font-size="11" fill="#1A1A1A">ARC-AGI-3 : 0,3% (frontier 2026)</text>
  <text x="956" y="614" class="mono" font-size="10" fill="#5A5A5A">env. interactifs</text>
</g>

<!-- Footer -->
<text x="60" y="755" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : OpenAI (sept 2024, déc 2024) ; Guo et al. Nature 645 (sept 2025) ; Google DeepMind (mars + août 2025) ; Anthropic (févr 2025, fin 2025) ; ARC Prize Foundation (déc 2024 ; 2025-2026).</text>
</svg>
