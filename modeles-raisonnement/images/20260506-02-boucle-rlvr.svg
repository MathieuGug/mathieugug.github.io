<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="t02">
<title id="t02">La boucle RLVR — RL sur récompense vérifiable</title>
<defs>
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <marker id="arrow02" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#B7332C"/>
  </marker>
  <marker id="arrow02b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#5A5A5A"/>
  </marker>
</defs>
<rect width="1200" height="800" fill="#FAF8F3"/>

<!-- Header -->
<text x="60" y="62" class="mono" font-size="11" font-weight="600" letter-spacing="0.18em" fill="#B7332C">SCHÉMA 02 — BOUCLE RLVR</text>
<text x="60" y="100" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Apprendre à raisonner sans démonstration humaine.</text>
<text x="60" y="126" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Reinforcement Learning with Verifiable Rewards : la boucle qui a produit o1, R1 et leurs successeurs.</text>
<line x1="60" y1="146" x2="1140" y2="146" stroke="#E5E1D8" stroke-width="1"/>

<!-- Flow rectangles arranged in a loop -->
<!-- Step 1 — Policy (top left) -->
<g class="interactive" data-card="policy" tabindex="0" role="button" aria-label="Policy : modèle pré-entraîné">
  <rect x="100" y="220" width="240" height="120" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="120" y="248" class="mono" font-size="10" font-weight="600" fill="#B7332C">1 · POLICY</text>
  <text x="120" y="280" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Modèle de base</text>
  <text x="120" y="306" class="body" font-size="12" fill="#5A5A5A">Pré-entraîné sur web,</text>
  <text x="120" y="322" class="body" font-size="12" fill="#5A5A5A">éventuellement SFT-cold-start</text>
</g>

<!-- Step 2 — Rollouts (top right) -->
<g class="interactive" data-card="rollouts" tabindex="0" role="button" aria-label="Rollouts : génération de plusieurs trajectoires">
  <rect x="500" y="220" width="240" height="120" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="520" y="248" class="mono" font-size="10" font-weight="600" fill="#B7332C">2 · ROLLOUTS</text>
  <text x="520" y="280" class="display" font-size="18" font-weight="600" fill="#1A1A1A">N trajectoires</text>
  <text x="520" y="306" class="body" font-size="12" fill="#5A5A5A">Pour un même prompt,</text>
  <text x="520" y="322" class="body" font-size="12" fill="#5A5A5A">N chaînes de pensée + réponse</text>
</g>

<!-- Step 3 — Verifier (right) -->
<g class="interactive" data-card="verifier" tabindex="0" role="button" aria-label="Verifier : récompense déterministe">
  <rect x="900" y="220" width="240" height="120" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
  <text x="920" y="248" class="mono" font-size="10" font-weight="600" fill="#1F5560">3 · VERIFIER</text>
  <text x="920" y="280" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Récompense {0, 1}</text>
  <text x="920" y="306" class="body" font-size="12" fill="#5A5A5A">Test unitaire, calcul exact,</text>
  <text x="920" y="322" class="body" font-size="12" fill="#5A5A5A">jugement booléen — pas humain</text>
</g>

<!-- Step 4 — GRPO update (bottom right) -->
<g class="interactive" data-card="grpo" tabindex="0" role="button" aria-label="GRPO update : mise à jour des poids">
  <rect x="700" y="430" width="280" height="120" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
  <text x="720" y="458" class="mono" font-size="10" font-weight="600" fill="#B7332C">4 · GRPO / PPO UPDATE</text>
  <text x="720" y="490" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Avantage relatif au groupe</text>
  <text x="720" y="516" class="body" font-size="12" fill="#5A5A5A">Renforce les chaînes correctes,</text>
  <text x="720" y="532" class="body" font-size="12" fill="#5A5A5A">décourage les chaînes fausses</text>
</g>

<!-- Step 5 — Aha moment (bottom left) -->
<g class="interactive" data-card="aha" tabindex="0" role="button" aria-label="Aha moment : émergence de comportements">
  <rect x="220" y="430" width="280" height="120" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>
  <text x="240" y="458" class="mono" font-size="10" font-weight="600" fill="#B58A2C">5 · ÉMERGENCE</text>
  <text x="240" y="490" class="display" font-size="18" font-weight="600" fill="#1A1A1A">« Aha moment »</text>
  <text x="240" y="516" class="body" font-size="12" fill="#5A5A5A">Self-correction, vérification,</text>
  <text x="240" y="532" class="body" font-size="12" fill="#5A5A5A">retour en arrière — non programmés</text>
</g>

<!-- Arrows: 1 → 2 → 3 → 4 → 1 ; with 5 as side annotation -->
<!-- 1 → 2 -->
<line x1="340" y1="280" x2="488" y2="280" stroke="#B7332C" stroke-width="2.5" marker-end="url(#arrow02)"/>
<text x="414" y="270" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">échantillonner</text>

<!-- 2 → 3 -->
<line x1="740" y1="280" x2="888" y2="280" stroke="#B7332C" stroke-width="2.5" marker-end="url(#arrow02)"/>
<text x="814" y="270" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">vérifier</text>

<!-- 3 → 4 (down + curve) -->
<path d="M 1020 340 L 1020 410 Q 1020 430 1000 430 L 980 430" stroke="#B7332C" stroke-width="2.5" fill="none" marker-end="url(#arrow02)"/>
<text x="1040" y="385" class="mono" font-size="10" fill="#5A5A5A">noter</text>

<!-- 4 → 1 (loop back, curve through bottom and up) -->
<path d="M 700 490 L 220 490 L 220 360 L 220 352" stroke="#B7332C" stroke-width="2.5" fill="none" marker-end="url(#arrow02)"/>
<text x="460" y="510" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">∇θ J(θ) — politique mise à jour</text>

<!-- 5 (aha) — emergent annotation linked to 4 with dashed line -->
<line x1="500" y1="490" x2="700" y2="490" stroke="#B58A2C" stroke-width="1" stroke-dasharray="3 3"/>
<text x="600" y="478" class="mono" font-size="10" fill="#B58A2C" text-anchor="middle">émerge avec l'entraînement</text>

<!-- Side annotation: typical scale -->
<g>
  <rect x="60" y="615" width="1080" height="100" fill="#F2EFE7" stroke="#E5E1D8"/>
  <text x="80" y="643" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" letter-spacing="0.06em">ORDRES DE GRANDEUR</text>
  <text x="80" y="668" class="body" font-size="12" fill="#1A1A1A"><tspan font-weight="500">N rollouts par prompt</tspan> · 8 à 64 selon les recettes (DeepSeek : 8 dans GRPO).</text>
  <text x="80" y="688" class="body" font-size="12" fill="#1A1A1A"><tspan font-weight="500">Domaines vérifiables aujourd'hui</tspan> · maths, code, logique formelle, certains puzzles. Étendre à l'open-ended (chemistry, droit) reste un problème ouvert.</text>
  <text x="80" y="708" class="body" font-size="12" fill="#1A1A1A"><tspan font-weight="500">Coût d'un run R1</tspan> · ~5,6 M$ de compute officiellement (mais beaucoup plus en pratique selon estimations indépendantes).</text>
</g>

<!-- Footer -->
<text x="60" y="755" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Guo et al. (DeepSeek-R1, Nature 645, 2025) ; OpenAI (Learning to reason with LLMs, sept 2024) ; Yue et al. (NeurIPS 2025) sur la critique RLVR.</text>
</svg>
