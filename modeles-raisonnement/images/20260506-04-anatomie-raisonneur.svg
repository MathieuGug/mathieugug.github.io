<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="t04">
<title id="t04">Anatomie d'un raisonneur en production</title>
<defs>
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
  </style>
  <marker id="arrow04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#5A5A5A"/>
  </marker>
</defs>
<rect width="1200" height="800" fill="#FAF8F3"/>

<!-- Header -->
<text x="60" y="62" class="mono" font-size="11" font-weight="600" letter-spacing="0.18em" fill="#B7332C">SCHÉMA 04 — ANATOMIE D'UN RAISONNEUR</text>
<text x="60" y="100" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">La pensée comme programme outillé.</text>
<text x="60" y="126" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Le modèle émet désormais deux flux : pensée et réponse — qui peuvent s'intercaler avec des appels d'outils.</text>
<line x1="60" y1="146" x2="1140" y2="146" stroke="#E5E1D8" stroke-width="1"/>

<!-- Token stream timeline (horizontal) -->
<text x="60" y="190" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" letter-spacing="0.06em">FLUX DE TOKENS — UN APPEL CLAUDE 4.6 EN INTERLEAVED THINKING</text>

<!-- Stream baseline -->
<line x1="80" y1="240" x2="1120" y2="240" stroke="#E5E1D8" stroke-width="0.5"/>

<!-- Prompt (start) -->
<g class="interactive" data-card="prompt" tabindex="0" role="button" aria-label="Prompt utilisateur">
  <rect x="80" y="220" width="80" height="40" rx="3" fill="#1A1A1A"/>
  <text x="120" y="245" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">PROMPT</text>
</g>

<!-- Thinking block 1 -->
<g class="interactive" data-card="thinking1" tabindex="0" role="button" aria-label="Bloc de pensée initial">
  <rect x="180" y="210" width="200" height="60" rx="3" fill="#B58A2C" fill-opacity="0.18" stroke="#B58A2C" stroke-width="1.25"/>
  <text x="280" y="234" class="mono" font-size="10" font-weight="600" fill="#B58A2C" text-anchor="middle">&lt;THINKING&gt; #1</text>
  <text x="280" y="252" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">décompose le problème</text>
</g>

<!-- Tool call 1 -->
<g class="interactive" data-card="tool1" tabindex="0" role="button" aria-label="Appel d'outil">
  <rect x="400" y="220" width="120" height="40" rx="3" fill="#1F5560"/>
  <text x="460" y="245" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">TOOL CALL</text>
</g>

<!-- Thinking 2 (interleaved) -->
<g class="interactive" data-card="thinking2" tabindex="0" role="button" aria-label="Pensée interleaved après outil">
  <rect x="540" y="200" width="220" height="80" rx="3" fill="#B58A2C" fill-opacity="0.18" stroke="#B58A2C" stroke-width="1.25"/>
  <text x="650" y="224" class="mono" font-size="10" font-weight="600" fill="#B58A2C" text-anchor="middle">&lt;THINKING&gt; #2 — interleaved</text>
  <text x="650" y="246" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">interprète le résultat,</text>
  <text x="650" y="262" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">replanifie</text>
</g>

<!-- Tool 2 -->
<g class="interactive" data-card="tool2" tabindex="0" role="button" aria-label="Second appel d'outil">
  <rect x="780" y="220" width="120" height="40" rx="3" fill="#1F5560"/>
  <text x="840" y="245" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">TOOL CALL</text>
</g>

<!-- Output -->
<g class="interactive" data-card="output" tabindex="0" role="button" aria-label="Réponse finale">
  <rect x="920" y="220" width="200" height="40" rx="3" fill="#B7332C"/>
  <text x="1020" y="245" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">OUTPUT</text>
</g>

<!-- Lower section: 3 lab variants comparison -->
<text x="60" y="340" class="mono" font-size="10" font-weight="600" fill="#5A5A5A" letter-spacing="0.06em">VARIANTES PAR LABORATOIRE</text>

<!-- OpenAI -->
<g>
  <rect x="60" y="360" width="340" height="200" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <text x="80" y="388" class="mono" font-size="10" font-weight="600" fill="#B7332C" letter-spacing="0.06em">OPENAI · o1, o3, o4-mini</text>
  <text x="80" y="412" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Résumé seulement</text>
  <text x="80" y="436" class="body" font-size="12" fill="#5A5A5A">L'API expose un summary du raisonnement.</text>
  <text x="80" y="453" class="body" font-size="12" fill="#5A5A5A">La chaîne brute est cachée — décision</text>
  <text x="80" y="470" class="body" font-size="12" fill="#5A5A5A">produit liée à la concurrence (anti-</text>
  <text x="80" y="487" class="body" font-size="12" fill="#5A5A5A">distillation) et à la safety.</text>
  <text x="80" y="525" class="mono" font-size="10" fill="#1A1A1A">Effort : low / medium / high</text>
  <text x="80" y="543" class="mono" font-size="10" fill="#5A5A5A">Latence typique : 3-15 s (o4-mini), 30-120 s (o3)</text>
</g>

<!-- Google -->
<g>
  <rect x="430" y="360" width="340" height="200" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <text x="450" y="388" class="mono" font-size="10" font-weight="600" fill="#B58A2C" letter-spacing="0.06em">GOOGLE · GEMINI 2.5 DEEP THINK</text>
  <text x="450" y="412" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Parallel thinking</text>
  <text x="450" y="436" class="body" font-size="12" fill="#5A5A5A">Plusieurs branches de raisonnement</text>
  <text x="450" y="453" class="body" font-size="12" fill="#5A5A5A">explorées en parallèle, agrégation finale.</text>
  <text x="450" y="470" class="body" font-size="12" fill="#5A5A5A">Variante de Deep Think décroche l'or aux</text>
  <text x="450" y="487" class="body" font-size="12" fill="#5A5A5A">IMO 2025.</text>
  <text x="450" y="525" class="mono" font-size="10" fill="#1A1A1A">Coût : exploration en largeur</text>
  <text x="450" y="543" class="mono" font-size="10" fill="#5A5A5A">Performance : tête de LMArena 2025</text>
</g>

<!-- Anthropic -->
<g>
  <rect x="800" y="360" width="340" height="200" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <text x="820" y="388" class="mono" font-size="10" font-weight="600" fill="#1F5560" letter-spacing="0.06em">ANTHROPIC · CLAUDE 4.X</text>
  <text x="820" y="412" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Interleaved + adaptive</text>
  <text x="820" y="436" class="body" font-size="12" fill="#5A5A5A">Blocs &lt;thinking&gt; explicites, peuvent</text>
  <text x="820" y="453" class="body" font-size="12" fill="#5A5A5A">s'intercaler avec les tool calls.</text>
  <text x="820" y="470" class="body" font-size="12" fill="#5A5A5A">Claude 4.6 décide dynamiquement combien</text>
  <text x="820" y="487" class="body" font-size="12" fill="#5A5A5A">penser selon l'effort level.</text>
  <text x="820" y="525" class="mono" font-size="10" fill="#1A1A1A">display : summarized / full</text>
  <text x="820" y="543" class="mono" font-size="10" fill="#5A5A5A">Ratio thinking/output : jusqu'à 100:1</text>
</g>

<!-- Bottom : economics -->
<g class="interactive" data-card="economics" tabindex="0" role="button" aria-label="Économie unitaire d'un raisonneur">
  <rect x="60" y="600" width="1080" height="120" rx="3" fill="#B7332C" fill-opacity="0.04" stroke="#B7332C" stroke-width="1"/>
  <text x="80" y="628" class="mono" font-size="10" font-weight="600" fill="#B7332C" letter-spacing="0.08em">ÉCONOMIE UNITAIRE</text>
  <text x="80" y="654" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Le coût d'une réponse cesse d'être linéaire.</text>
  <text x="80" y="680" class="body" font-size="13" fill="#1A1A1A">Un appel high-effort sur problème de coding agentique : 8 000 à 40 000 thinking tokens, facturés au prix output.</text>
  <text x="80" y="700" class="body" font-size="13" fill="#5A5A5A">→ L'allocation compute-optimale (par requête, par utilisateur, par produit) devient un paramètre de design produit.</text>
</g>

<!-- Footer -->
<text x="60" y="755" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Anthropic (extended thinking docs, 2025-2026) ; OpenAI (reasoning effort, 2025) ; Google DeepMind (Gemini 2.5 tech report, 2025).</text>
</svg>
