<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="La sparsité comme troisième axe d'échelle">
  <style>
    .display { font-family: 'Fraunces','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
  </style>
  <defs>
    <marker id="s6-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#B58A2C"/>
    </marker>
  </defs>
  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono" font-size="13" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 06</text>
  <text x="60" y="98" class="display" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">La sparsité, troisième axe d'échelle</text>
  <text x="60" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">À FLOPs par token fixes, le sparse « range » plus de paramètres — et va plus bas.</text>
  <line x1="60" y1="150" x2="840" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- axes -->
  <line x1="150" y1="220" x2="150" y2="720" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="150" y1="720" x2="820" y2="720" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="98" y="470" class="body" font-size="13" fill="#5A5A5A" transform="rotate(-90 98 470)" text-anchor="middle">perte (validation) →  bas = mieux</text>
  <text x="485" y="762" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle">paramètres totaux  (FLOPs/token ≈ constants)</text>

  <!-- dense curve -->
  <path d="M200 300 C 340 380, 460 470, 560 540" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
  <circle cx="560" cy="540" r="6" fill="#1A1A1A"/>
  <text x="548" y="524" class="body" font-size="13" fill="#1A1A1A" text-anchor="end">dense — bute ici</text>

  <!-- sparse curve -->
  <path d="M200 352 C 380 470, 560 570, 780 636" fill="none" stroke="#B7332C" stroke-width="2.5"/>
  <text x="600" y="612" class="body" font-size="13" fill="#B7332C">sparse (MoE)</text>

  <!-- granularity arrow -->
  <g class="interactive" data-card="granularity" tabindex="0" role="button" aria-label="La granularité comme dimension — cliquez pour les détails">
    <path d="M566 548 C 640 560, 690 590, 726 618" fill="none" stroke="#B58A2C" stroke-width="1.75" stroke-dasharray="4 3" marker-end="url(#s6-arrow)"/>
    <rect x="560" y="470" width="248" height="52" rx="4" fill="#F5EEDD" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="684" y="492" class="body" font-size="12.5" font-weight="600" fill="#B58A2C" text-anchor="middle">+ granularité</text>
    <text x="684" y="511" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">experts plus fins → gain croissant</text>
  </g>

  <!-- optimal point -->
  <g class="interactive" data-card="optimal" tabindex="0" role="button" aria-label="Optimum isoFLOP — cliquez pour les détails">
    <circle cx="726" cy="618" r="9" fill="#FAF8F3" stroke="#B7332C" stroke-width="2.5"/>
    <circle cx="726" cy="618" r="3.5" fill="#B7332C"/>
    <text x="742" y="656" class="mono" font-size="11.5" fill="#B7332C">optimum isoFLOP</text>
  </g>

  <!-- Legend (dense / sparse interactive) -->
  <g class="interactive" data-card="dense-curve" tabindex="0" role="button" aria-label="Courbe dense — cliquez pour les détails">
    <rect x="200" y="222" width="250" height="40" rx="4" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <line x1="216" y1="242" x2="252" y2="242" stroke="#1A1A1A" stroke-width="2.5"/>
    <text x="264" y="247" class="body" font-size="13" fill="#1A1A1A">dense : params ∝ FLOPs</text>
  </g>
  <g class="interactive" data-card="sparse-curve" tabindex="0" role="button" aria-label="Courbe sparse — cliquez pour les détails">
    <rect x="200" y="270" width="250" height="40" rx="4" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <line x1="216" y1="290" x2="252" y2="290" stroke="#B7332C" stroke-width="2.5"/>
    <text x="264" y="295" class="body" font-size="13" fill="#B7332C">sparse : params découplés</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="812" x2="840" y2="812" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="846" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : Switch Transformer (Fedus et al. 2021) ; Scaling Laws for Fine-Grained MoE (Krajewski et al. 2024). Courbes schématiques.</text>
</svg>
