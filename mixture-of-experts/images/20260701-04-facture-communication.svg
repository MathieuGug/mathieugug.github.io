<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="La facture communication : expert parallelism et all-to-all">
  <style>
    .display { font-family: 'Fraunces','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
  </style>
  <defs>
    <marker id="s4-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono" font-size="13" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 04</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">La facture communication</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Experts répartis sur les accélérateurs : chaque token doit voyager vers le bon GPU — deux fois.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Left : source GPUs (dispatch) -->
  <g class="interactive" data-card="dispatch" tabindex="0" role="button" aria-label="Dispatch des tokens — cliquez pour les détails">
    <text x="165" y="205" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle" letter-spacing="0.1em">TOKENS PAR GPU</text>
    <rect x="90" y="228" width="150" height="66" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="165" y="256" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">GPU 0</text>
    <circle cx="128" cy="278" r="8" fill="#B7332C"/><circle cx="152" cy="278" r="8" fill="#1F5560"/><circle cx="176" cy="278" r="8" fill="#B58A2C"/>
    <rect x="90" y="378" width="150" height="66" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="165" y="406" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">GPU 1</text>
    <circle cx="128" cy="428" r="8" fill="#1F5560"/><circle cx="152" cy="428" r="8" fill="#B58A2C"/><circle cx="176" cy="428" r="8" fill="#B7332C"/>
    <rect x="90" y="528" width="150" height="66" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="165" y="556" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">GPU 2</text>
    <circle cx="128" cy="578" r="8" fill="#B58A2C"/><circle cx="152" cy="578" r="8" fill="#B7332C"/><circle cx="176" cy="578" r="8" fill="#1F5560"/>
  </g>

  <!-- Center : all-to-all mesh (the bottleneck) -->
  <g class="interactive" data-card="alltoall" tabindex="0" role="button" aria-label="Le goulot all-to-all — cliquez pour les détails">
    <rect x="360" y="212" width="440" height="400" rx="6" fill="#B7332C" fill-opacity="0.055" stroke="#B7332C" stroke-width="1.25" stroke-dasharray="3 3"/>
    <text x="580" y="240" class="mono" font-size="14" font-weight="600" fill="#B7332C" text-anchor="middle" letter-spacing="0.14em">ALL-TO-ALL · DISPATCH</text>
    <text x="580" y="596" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle" font-style="italic">chaque GPU parle à tous les autres — le réseau, pas le calcul, dicte le débit</text>
  </g>
  <!-- mesh lines drawn on top (not interactive) -->
  <g stroke-width="1" fill="none">
    <path d="M240 261 L920 261" stroke="#B8B5AE"/><path d="M240 261 L920 411" stroke="#B7332C" stroke-width="1.5"/><path d="M240 261 L920 561" stroke="#B7332C" stroke-width="1.5"/>
    <path d="M240 411 L920 261" stroke="#B7332C" stroke-width="1.5"/><path d="M240 411 L920 411" stroke="#B8B5AE"/><path d="M240 411 L920 561" stroke="#B7332C" stroke-width="1.5"/>
    <path d="M240 561 L920 261" stroke="#B7332C" stroke-width="1.5"/><path d="M240 561 L920 411" stroke="#B7332C" stroke-width="1.5"/><path d="M240 561 L920 561" stroke="#B8B5AE"/>
  </g>

  <!-- Right : experts per GPU (compute) -->
  <g class="interactive" data-card="expert-compute" tabindex="0" role="button" aria-label="Calcul des experts — cliquez pour les détails">
    <text x="1000" y="205" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle" letter-spacing="0.1em">EXPERTS RÉSIDENTS</text>
    <rect x="920" y="228" width="180" height="66" rx="3" fill="#FBEEE7" stroke="#B7332C" stroke-width="1.25"/>
    <text x="1010" y="256" class="mono" font-size="12" fill="#B7332C" text-anchor="middle">GPU 0 · experts 0-63</text>
    <text x="1010" y="278" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">tous résidents en VRAM</text>
    <rect x="920" y="378" width="180" height="66" rx="3" fill="#FBEEE7" stroke="#B7332C" stroke-width="1.25"/>
    <text x="1010" y="406" class="mono" font-size="12" fill="#B7332C" text-anchor="middle">GPU 1 · experts 64-127</text>
    <text x="1010" y="428" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">≠ tokens actifs</text>
    <rect x="920" y="528" width="180" height="66" rx="3" fill="#FBEEE7" stroke="#B7332C" stroke-width="1.25"/>
    <text x="1010" y="556" class="mono" font-size="12" fill="#B7332C" text-anchor="middle">GPU 2 · experts 128-191</text>
    <text x="1010" y="578" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">empreinte = total, pas actif</text>
  </g>

  <!-- combine (2nd all-to-all) -->
  <g class="interactive" data-card="combine-a2a" tabindex="0" role="button" aria-label="Combine — second all-to-all — cliquez pour les détails">
    <rect x="360" y="638" width="740" height="42" rx="4" fill="#E8F0F1" stroke="#1F5560" stroke-width="1.25"/>
    <text x="730" y="665" class="body" font-size="13" fill="#1F5560" text-anchor="middle">↺  Le trajet retour (combine) est un <tspan font-weight="600">second all-to-all</tspan> — coût doublé, à chaque couche MoE</text>
  </g>
  <path d="M580 616 L580 634" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#s4-arrow)"/>

  <!-- Footer -->
  <line x1="60" y1="712" x2="1140" y2="712" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="746" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : GShard (Lepikhin et al. 2020) ; DeepSeek-V3 (schéma de communication DualPipe pour masquer l'all-to-all).</text>
</svg>
