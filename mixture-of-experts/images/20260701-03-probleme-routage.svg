<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Le problème du routage : effondrement et parades d'équilibrage">
  <style>
    .display { font-family: 'Fraunces','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
  </style>
  <defs>
    <marker id="s3-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="s3-arrow-t" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1F5560"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono" font-size="13" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 03</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Le problème du routage</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Le déséquilibre s'auto-renforce — trois familles de parades le corrigent.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- ===== Panel 1 : collapse ===== -->
  <g class="interactive" data-card="collapse" tabindex="0" role="button" aria-label="Effondrement du routage — cliquez pour les détails">
    <rect x="70" y="180" width="500" height="250" rx="4" fill="#FBEEE7" stroke="#B7332C" stroke-width="1.25"/>
    <text x="92" y="212" class="mono" font-size="12.5" font-weight="600" fill="#B7332C">1 · EFFONDREMENT (rich-get-richer)</text>
    <line x1="100" y1="392" x2="540" y2="392" stroke="#5A5A5A" stroke-width="1"/>
    <!-- bars: one huge, rest tiny -->
    <rect x="112" y="238" width="46" height="154" fill="#B7332C"/>
    <rect x="180" y="360" width="46" height="32" fill="#B8B5AE"/>
    <rect x="248" y="372" width="46" height="20" fill="#B8B5AE"/>
    <rect x="316" y="366" width="46" height="26" fill="#B8B5AE"/>
    <rect x="384" y="376" width="46" height="16" fill="#B8B5AE"/>
    <rect x="452" y="380" width="46" height="12" fill="#B8B5AE"/>
    <text x="135" y="228" class="mono" font-size="11" fill="#B7332C" text-anchor="middle">E2</text>
    <text x="320" y="418" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">charge par expert — un seul capte tout</text>
  </g>

  <!-- ===== Panel 2 : aux-loss ===== -->
  <g class="interactive" data-card="aux-loss" tabindex="0" role="button" aria-label="Perte auxiliaire d'équilibrage — cliquez pour les détails">
    <rect x="630" y="180" width="500" height="250" rx="4" fill="#E8F0F1" stroke="#1F5560" stroke-width="1.25"/>
    <text x="652" y="212" class="mono" font-size="12.5" font-weight="600" fill="#1F5560">2 · PERTE AUXILIAIRE</text>
    <line x1="660" y1="392" x2="1100" y2="392" stroke="#5A5A5A" stroke-width="1"/>
    <rect x="672" y="300" width="46" height="92" fill="#1F5560"/>
    <rect x="740" y="292" width="46" height="100" fill="#1F5560"/>
    <rect x="808" y="304" width="46" height="88" fill="#1F5560"/>
    <rect x="876" y="296" width="46" height="96" fill="#1F5560"/>
    <rect x="944" y="300" width="46" height="92" fill="#1F5560"/>
    <rect x="1012" y="298" width="46" height="94" fill="#1F5560"/>
    <text x="880" y="252" class="mono" font-size="12" fill="#1F5560" text-anchor="middle">coût += λ · L équilibrage  (+ z-loss)</text>
    <text x="880" y="418" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">charge répartie — au prix d'une tension avec la perplexité</text>
  </g>

  <!-- ===== Panel 3 : capacity / drop ===== -->
  <g class="interactive" data-card="capacity-drop" tabindex="0" role="button" aria-label="Capacité d'expert et token dropping — cliquez pour les détails">
    <rect x="70" y="460" width="500" height="250" rx="4" fill="#F5EEDD" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="92" y="492" class="mono" font-size="12.5" font-weight="600" fill="#B58A2C">3 · CAPACITÉ + TOKEN DROPPING</text>
    <rect x="200" y="520" width="160" height="120" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="280" y="512" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">expert (capacité fixe)</text>
    <line x1="200" y1="560" x2="360" y2="560" stroke="#B7332C" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="368" y="564" class="mono" font-size="10.5" fill="#B7332C">plafond</text>
    <!-- tokens inside -->
    <circle cx="230" cy="600" r="9" fill="#B58A2C"/><circle cx="258" cy="600" r="9" fill="#B58A2C"/><circle cx="286" cy="600" r="9" fill="#B58A2C"/><circle cx="314" cy="600" r="9" fill="#B58A2C"/>
    <!-- overflow token dropped -->
    <circle cx="120" cy="530" r="9" fill="none" stroke="#B7332C" stroke-width="1.25"/>
    <path d="M114 524 L126 536 M126 524 L114 536" stroke="#B7332C" stroke-width="1.25"/>
    <path d="M132 530 C160 530 170 560 196 560" fill="none" stroke="#B7332C" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="120" y="512" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">droppé</text>
    <text x="120" y="560" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">→ résiduel</text>
    <text x="440" y="600" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">MegaBlocks :</text>
    <text x="440" y="618" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">block-sparse,</text>
    <text x="440" y="636" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">zéro drop</text>
  </g>

  <!-- ===== Panel 4 : expert choice ===== -->
  <g class="interactive" data-card="expert-choice" tabindex="0" role="button" aria-label="Routage par les experts (expert choice) — cliquez pour les détails">
    <rect x="630" y="460" width="500" height="250" rx="4" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="652" y="492" class="mono" font-size="12.5" font-weight="600" fill="#1A1A1A">4 · EXPERT CHOICE</text>
    <!-- experts left -->
    <rect x="662" y="524" width="90" height="34" rx="3" fill="#E8F0F1" stroke="#1F5560" stroke-width="1.25"/>
    <text x="707" y="546" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">expert A</text>
    <rect x="662" y="596" width="90" height="34" rx="3" fill="#E8F0F1" stroke="#1F5560" stroke-width="1.25"/>
    <text x="707" y="618" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">expert B</text>
    <!-- token pool right -->
    <circle cx="980" cy="530" r="9" fill="#B8B5AE"/><circle cx="1010" cy="530" r="9" fill="#B8B5AE"/><circle cx="1040" cy="530" r="9" fill="#B8B5AE"/>
    <circle cx="980" cy="600" r="9" fill="#B8B5AE"/><circle cx="1010" cy="600" r="9" fill="#B8B5AE"/><circle cx="1040" cy="600" r="9" fill="#B8B5AE"/>
    <text x="1010" y="512" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">tokens</text>
    <path d="M752 538 C850 538 900 530 969 530" fill="none" stroke="#1F5560" stroke-width="1.5" marker-end="url(#s3-arrow-t)"/>
    <path d="M752 545 C850 560 900 600 969 600" fill="none" stroke="#1F5560" stroke-width="1.5" marker-end="url(#s3-arrow-t)"/>
    <text x="890" y="668" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">l'expert choisit ses top-k tokens → équilibrage parfait</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="736" x2="1140" y2="736" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="768" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : ST-MoE (Zoph et al. 2022) ; Expert Choice (Zhou et al. 2022) ; MegaBlocks (Gale et al. 2023) ; DeepSeek-V3 (équilibrage sans perte auxiliaire).</text>
</svg>
