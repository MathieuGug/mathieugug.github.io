<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="L'architecture DeepSeek : experts fins et expert partagé">
  <style>
    .display { font-family: 'Fraunces','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
  </style>
  <defs>
    <marker id="s5-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono" font-size="13" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 05</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">L'architecture DeepSeek : experts fins et partagés</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Découper les experts (fine-grained) et isoler le savoir commun (expert partagé, toujours actif).</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <line x1="600" y1="180" x2="600" y2="690" stroke="#B8B5AE" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- ===== LEFT : MoE classique ===== -->
  <text x="90" y="205" class="mono" font-size="13" font-weight="600" fill="#5A5A5A" letter-spacing="0.1em">MoE CLASSIQUE · 8 experts · top-2</text>
  <rect x="245" y="230" width="110" height="44" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="300" y="257" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle">token</text>
  <line x1="300" y1="274" x2="300" y2="304" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#s5-arrow)"/>
  <!-- 4 big experts, 2 active -->
  <g>
    <rect x="120" y="316" width="80" height="70" rx="3" fill="#FBEEE7" stroke="#B7332C" stroke-width="1.5"/><text x="160" y="356" class="mono" font-size="11" fill="#B7332C" text-anchor="middle">E1 ✓</text>
    <rect x="215" y="316" width="80" height="70" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25" stroke-dasharray="3 3"/><text x="255" y="356" class="mono" font-size="11" fill="#B8B5AE" text-anchor="middle">E2</text>
    <rect x="310" y="316" width="80" height="70" rx="3" fill="#FBEEE7" stroke="#B7332C" stroke-width="1.5"/><text x="350" y="356" class="mono" font-size="11" fill="#B7332C" text-anchor="middle">E3 ✓</text>
    <rect x="405" y="316" width="80" height="70" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25" stroke-dasharray="3 3"/><text x="445" y="356" class="mono" font-size="11" fill="#B8B5AE" text-anchor="middle">E4…</text>
  </g>
  <text x="120" y="460" class="body" font-size="13" fill="#5A5A5A">Gros experts, peu de combinaisons</text>
  <text x="120" y="484" class="mono" font-size="14" fill="#1A1A1A">C(8,2) = 28 combinaisons</text>
  <text x="120" y="530" class="body" font-size="12.5" fill="#5A5A5A">Chaque expert ré-apprend le savoir</text>
  <text x="120" y="550" class="body" font-size="12.5" fill="#5A5A5A">commun → capacité gaspillée.</text>

  <!-- ===== RIGHT : DeepSeek ===== -->
  <text x="640" y="205" class="mono" font-size="13" font-weight="600" fill="#1F5560" letter-spacing="0.1em">DEEPSEEK-V3 · 256 fins + 1 partagé · top-8</text>
  <rect x="825" y="230" width="110" height="44" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="880" y="257" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle">token</text>

  <!-- shared expert -->
  <g class="interactive" data-card="shared-expert" tabindex="0" role="button" aria-label="Expert partagé — cliquez pour les détails">
    <rect x="640" y="300" width="150" height="86" rx="3" fill="#E8F0F1" stroke="#1F5560" stroke-width="1.75"/>
    <text x="715" y="332" class="body" font-size="13" font-weight="600" fill="#1F5560" text-anchor="middle">expert partagé</text>
    <text x="715" y="354" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">toujours actif</text>
    <text x="715" y="372" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">savoir commun</text>
  </g>
  <path d="M860 274 C820 282 800 300 792 320" fill="none" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#s5-arrow)"/>

  <!-- fine-grained grid container (interactive) -->
  <g class="interactive" data-card="fine-grained" tabindex="0" role="button" aria-label="Experts fins (fine-grained) — cliquez pour les détails">
    <rect x="826" y="296" width="290" height="150" rx="4" fill="#B7332C" fill-opacity="0.04" stroke="#B7332C" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="971" y="290" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">256 experts fins (routés)</text>
    <g fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1">
      <rect x="845" y="306" width="26" height="26" rx="2"/><rect x="909" y="306" width="26" height="26" rx="2"/><rect x="941" y="306" width="26" height="26" rx="2"/><rect x="1005" y="306" width="26" height="26" rx="2"/><rect x="1069" y="306" width="26" height="26" rx="2"/>
      <rect x="845" y="338" width="26" height="26" rx="2"/><rect x="877" y="338" width="26" height="26" rx="2"/><rect x="941" y="338" width="26" height="26" rx="2"/><rect x="1005" y="338" width="26" height="26" rx="2"/><rect x="1037" y="338" width="26" height="26" rx="2"/>
      <rect x="877" y="370" width="26" height="26" rx="2"/><rect x="909" y="370" width="26" height="26" rx="2"/><rect x="973" y="370" width="26" height="26" rx="2"/><rect x="1037" y="370" width="26" height="26" rx="2"/><rect x="1069" y="370" width="26" height="26" rx="2"/>
      <rect x="845" y="402" width="26" height="26" rx="2"/><rect x="909" y="402" width="26" height="26" rx="2"/><rect x="973" y="402" width="26" height="26" rx="2"/><rect x="1005" y="402" width="26" height="26" rx="2"/><rect x="1069" y="402" width="26" height="26" rx="2"/>
    </g>
  </g>
  <!-- routed (active) cells on top -->
  <g class="interactive" data-card="routed" tabindex="0" role="button" aria-label="Experts routés actifs — cliquez pour les détails" fill="#B7332C">
    <rect x="877" y="306" width="26" height="26" rx="2"/><rect x="973" y="306" width="26" height="26" rx="2"/><rect x="1037" y="306" width="26" height="26" rx="2"/>
    <rect x="909" y="338" width="26" height="26" rx="2"/><rect x="1069" y="338" width="26" height="26" rx="2"/>
    <rect x="845" y="370" width="26" height="26" rx="2"/><rect x="1005" y="370" width="26" height="26" rx="2"/>
    <rect x="941" y="402" width="26" height="26" rx="2"/>
  </g>

  <!-- combinations callout -->
  <g class="interactive" data-card="combinations" tabindex="0" role="button" aria-label="Explosion combinatoire — cliquez pour les détails">
    <rect x="640" y="486" width="476" height="70" rx="4" fill="#FBEEE7" stroke="#B7332C" stroke-width="1.25"/>
    <text x="662" y="514" class="body" font-size="13" fill="#5A5A5A">Petits experts, explosion combinatoire :</text>
    <text x="662" y="540" class="mono" font-size="15" fill="#B7332C">C(256,8) ≈ 4 × 10¹⁴ combinaisons</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="712" x2="1140" y2="712" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="746" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : DeepSeekMoE (Dai et al. 2024) ; DeepSeek-V3 Technical Report (2024) ; ablations OLMoE (Muennighoff et al. 2024).</text>
</svg>
