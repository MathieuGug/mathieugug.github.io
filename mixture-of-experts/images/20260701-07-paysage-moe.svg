    <text x="72" y="256" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Mixtral 8×7B</text>
    <text x="380" y="256" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">47 Md</text>
    <text x="510" y="256" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">13 Md</text>
    <text x="650" y="256" class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">8</text>
