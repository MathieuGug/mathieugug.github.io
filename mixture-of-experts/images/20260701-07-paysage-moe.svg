    <text x="780" y="580" class="mono" font-size="13" fill="#1F5560" text-anchor="middle">8</text>
    <text x="905" y="580" class="mono" font-size="13" fill="#B8B5AE" text-anchor="middle">—</text>
    <text x="1035" y="580" class="mono" font-size="12" fill="#1F5560" text-anchor="middle">✓ tout</text>
