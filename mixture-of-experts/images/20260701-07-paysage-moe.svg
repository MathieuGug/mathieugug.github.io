<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Le paysage MoE 2024-2026 : matrice modèles par dimensions">
  <style>
    .display { font-family: 'Fraunces','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
  </style>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono" font-size="13" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 07</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Le paysage MoE 2024-2026</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">À l'échelle de frontière, la question n'est plus « si » mais « comment » on calibre la sparsité.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- column headers -->
  <text x="72"   y="206" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" letter-spacing="0.06em">MODÈLE</text>
  <text x="380"  y="206" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" text-anchor="middle">Total</text>
  <text x="510"  y="206" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" text-anchor="middle">Actifs</text>
  <text x="650"  y="206" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" text-anchor="middle">Experts</text>
  <text x="780"  y="206" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" text-anchor="middle">top-k</text>
  <text x="905"  y="206" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" text-anchor="middle">Partagé</text>
  <text x="1035" y="206" class="mono" font-size="12" font-weight="600" fill="#5A5A5A" text-anchor="middle">Ouvert</text>
  <line x1="60" y1="218" x2="1140" y2="218" stroke="#5A5A5A" stroke-width="1"/>

