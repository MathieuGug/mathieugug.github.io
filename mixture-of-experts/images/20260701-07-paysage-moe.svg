  <rect x="60" y="600" width="1080" height="54" fill="#F2EFE7"/>
  <text x="72" y="634" class="body" font-size="14" font-style="italic" fill="#5A5A5A">GPT-4 (rumeur)</text>
  <text x="380" y="634" class="mono" font-size="13" fill="#5A5A5A" text-anchor="middle">~1,8 T</text>
  <text x="510" y="634" class="mono" font-size="13" fill="#5A5A5A" text-anchor="middle">?</text>
  <text x="650" y="634" class="mono" font-size="13" fill="#5A5A5A" text-anchor="middle">16</text>
  <text x="780" y="634" class="mono" font-size="13" fill="#5A5A5A" text-anchor="middle">2</text>
  <text x="905" y="634" class="mono" font-size="13" fill="#5A5A5A" text-anchor="middle">?</text>
  <text x="1035" y="634" class="mono" font-size="13" fill="#B7332C" text-anchor="middle">✗</text>

  <line x1="60" y1="654" x2="1140" y2="654" stroke="#5A5A5A" stroke-width="1"/>

  <!-- Footer -->
  <text x="60" y="700" class="body" font-size="12" fill="#5A5A5A">Chiffres publics des rapports techniques / cartes modèles. GPT-4 : architecture MoE largement supposée, non confirmée.</text>
  <line x1="60" y1="722" x2="1140" y2="722" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="754" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : rapports techniques Mixtral, DeepSeek-V3, Qwen3, Llama 4, DBRX, Grok-1, OLMoE (2024-2025).</text>
