<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Anatomie d'une couche Mixture-of-Experts">
  <style>
    .display { font-family: 'Fraunces','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
  </style>
  <defs>
    <marker id="s2-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="s2-arrow-c" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#B7332C"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono" font-size="13" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 02</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Anatomie d'une couche MoE</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Le FFN unique devient N experts + un routeur qui en sélectionne k, puis combine.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- token -->
  <rect x="60" y="382" width="110" height="50" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="115" y="412" class="body" font-size="14" fill="#1A1A1A" text-anchor="middle">token</text>
  <line x1="170" y1="407" x2="204" y2="407" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#s2-arrow)"/>

  <!-- gate -->
  <g class="interactive" data-card="gate" tabindex="0" role="button" aria-label="Routeur (gate) — cliquez pour les détails">
    <rect x="214" y="360" width="156" height="94" rx="4" fill="#E8F0F1" stroke="#1F5560" stroke-width="1.5"/>
    <text x="292" y="393" class="body" font-size="14" font-weight="600" fill="#1F5560" text-anchor="middle">routeur</text>
    <text x="292" y="415" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">linéaire → softmax</text>
    <text x="292" y="435" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">N scores</text>
  </g>
  <line x1="370" y1="407" x2="404" y2="407" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#s2-arrow)"/>

  <!-- top-k -->
  <g class="interactive" data-card="topk" tabindex="0" role="button" aria-label="Sélection top-k — cliquez pour les détails">
    <rect x="414" y="360" width="156" height="94" rx="4" fill="#F5EEDD" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="492" y="393" class="body" font-size="14" font-weight="600" fill="#B58A2C" text-anchor="middle">top-k</text>
    <text x="492" y="415" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">k = 1 (Switch)</text>
    <text x="492" y="435" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">k = 2 (Mixtral)</text>
  </g>

  <!-- experts column -->
  <text x="680" y="196" class="mono" font-size="12" fill="#5A5A5A" letter-spacing="0.1em" text-anchor="middle">N EXPERTS (FFN)</text>
  <g class="interactive" data-card="expert-ffn" tabindex="0" role="button" aria-label="Experts FFN — cliquez pour les détails">
    <rect x="605" y="230" width="150" height="48" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25" stroke-dasharray="3 3"/>
    <text x="680" y="259" class="mono" font-size="12.5" fill="#B8B5AE" text-anchor="middle">expert 1</text>
    <rect x="605" y="300" width="150" height="48" rx="3" fill="#FBEEE7" stroke="#B7332C" stroke-width="1.5"/>
    <text x="680" y="329" class="mono" font-size="12.5" fill="#B7332C" text-anchor="middle">expert 2 ✓</text>
    <rect x="605" y="370" width="150" height="48" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25" stroke-dasharray="3 3"/>
    <text x="680" y="399" class="mono" font-size="12.5" fill="#B8B5AE" text-anchor="middle">expert 3</text>
    <rect x="605" y="440" width="150" height="48" rx="3" fill="#FBEEE7" stroke="#B7332C" stroke-width="1.5"/>
    <text x="680" y="469" class="mono" font-size="12.5" fill="#B7332C" text-anchor="middle">expert 4 ✓</text>
    <rect x="605" y="510" width="150" height="48" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25" stroke-dasharray="3 3"/>
    <text x="680" y="539" class="mono" font-size="12.5" fill="#B8B5AE" text-anchor="middle">expert N</text>
  </g>

  <!-- top-k to experts -->
  <path d="M570 407 C585 407 588 324 599 324" fill="none" stroke="#B7332C" stroke-width="2.5" marker-end="url(#s2-arrow-c)"/>
  <path d="M570 407 C585 407 588 464 599 464" fill="none" stroke="#B7332C" stroke-width="2.5" marker-end="url(#s2-arrow-c)"/>
  <path d="M572 400 C585 380 588 256 601 256" fill="none" stroke="#B8B5AE" stroke-width="0.75"/>
  <path d="M572 402 C585 394 588 394 601 394" fill="none" stroke="#B8B5AE" stroke-width="0.75"/>
  <path d="M572 414 C585 470 588 534 601 534" fill="none" stroke="#B8B5AE" stroke-width="0.75"/>

  <!-- combine -->
  <g class="interactive" data-card="combine" tabindex="0" role="button" aria-label="Combinaison pondérée — cliquez pour les détails">
    <rect x="880" y="360" width="160" height="94" rx="4" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="960" y="393" class="body" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">combinaison</text>
    <text x="960" y="415" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">Σ gᵢ · Eᵢ(x)</text>
    <text x="960" y="435" class="mono" font-size="11.5" fill="#5A5A5A" text-anchor="middle">pondérée par le gate</text>
  </g>
  <path d="M755 324 C820 324 830 400 874 405" fill="none" stroke="#B7332C" stroke-width="2.5" marker-end="url(#s2-arrow-c)"/>
  <path d="M755 464 C820 464 830 412 874 408" fill="none" stroke="#B7332C" stroke-width="2.5" marker-end="url(#s2-arrow-c)"/>

  <!-- output -->
  <line x1="1040" y1="407" x2="1074" y2="407" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#s2-arrow)"/>
  <rect x="1084" y="382" width="96" height="50" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="1132" y="412" class="body" font-size="14" fill="#1A1A1A" text-anchor="middle">sortie</text>

  <!-- annotation -->
  <text x="60" y="620" class="body" font-size="13" fill="#5A5A5A">Le routage se fait <tspan font-weight="600" fill="#1A1A1A">par token</tspan> : deux tokens voisins d'une même phrase peuvent partir vers des experts différents.</text>

  <!-- Footer -->
  <line x1="60" y1="712" x2="1140" y2="712" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="746" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : GShard (Lepikhin et al. 2020) ; Switch Transformer (Fedus et al. 2021) ; Mixtral of Experts (Jiang et al. 2024).</text>
</svg>
