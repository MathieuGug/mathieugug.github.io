<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dense contre sparse — le découplage entre paramètres et FLOPs">
  <style>
    .display { font-family: 'Fraunces','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
  </style>
  <defs>
    <marker id="s1-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="s1-arrow-c" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#B7332C"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono" font-size="13" fill="#B7332C" letter-spacing="0.18em">SCHÉMA 01</text>
  <text x="60" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Dense contre sparse : le découplage</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Le dense allume tous ses paramètres par token ; la MoE n'en allume que k sur N.</text>
  <line x1="60" y1="150" x2="1140" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- vertical divider -->
  <line x1="600" y1="180" x2="600" y2="690" stroke="#B8B5AE" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- ===== LEFT : DENSE ===== -->
  <text x="90" y="200" class="mono" font-size="14" font-weight="600" fill="#1A1A1A" letter-spacing="0.12em">DENSE</text>

  <rect x="250" y="212" width="120" height="44" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="310" y="239" class="body" font-size="14" fill="#1A1A1A" text-anchor="middle">token</text>
  <line x1="310" y1="256" x2="310" y2="292" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#s1-arrow)"/>

  <g class="interactive" data-card="dense-block" tabindex="0" role="button" aria-label="Bloc FFN dense — cliquez pour les détails">
    <rect x="180" y="302" width="260" height="230" rx="4" fill="#FBEEE7" stroke="#B7332C" stroke-width="1.25"/>
    <text x="310" y="330" class="body" font-size="14" font-weight="600" fill="#B7332C" text-anchor="middle">FFN — tous les paramètres</text>
    <!-- grid of all-active cells -->
    <g fill="#B7332C">
      <rect x="212" y="348" width="28" height="28" rx="2"/><rect x="248" y="348" width="28" height="28" rx="2"/><rect x="284" y="348" width="28" height="28" rx="2"/><rect x="320" y="348" width="28" height="28" rx="2"/><rect x="356" y="348" width="28" height="28" rx="2"/>
      <rect x="212" y="384" width="28" height="28" rx="2"/><rect x="248" y="384" width="28" height="28" rx="2"/><rect x="284" y="384" width="28" height="28" rx="2"/><rect x="320" y="384" width="28" height="28" rx="2"/><rect x="356" y="384" width="28" height="28" rx="2"/>
      <rect x="212" y="420" width="28" height="28" rx="2"/><rect x="248" y="420" width="28" height="28" rx="2"/><rect x="284" y="420" width="28" height="28" rx="2"/><rect x="320" y="420" width="28" height="28" rx="2"/><rect x="356" y="420" width="28" height="28" rx="2"/>
      <rect x="212" y="456" width="28" height="28" rx="2"/><rect x="248" y="456" width="28" height="28" rx="2"/><rect x="284" y="456" width="28" height="28" rx="2"/><rect x="320" y="456" width="28" height="28" rx="2"/><rect x="356" y="456" width="28" height="28" rx="2"/>
    </g>
    <text x="310" y="512" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle">100 % actifs</text>
  </g>

  <line x1="310" y1="532" x2="310" y2="568" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#s1-arrow)"/>
  <rect x="250" y="578" width="120" height="44" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="310" y="605" class="body" font-size="14" fill="#1A1A1A" text-anchor="middle">sortie</text>

  <text x="90" y="662" class="mono" font-size="15" fill="#1A1A1A">FLOPs  ∝  N<tspan font-size="11" dy="4">params</tspan><tspan dy="-4">  (tous)</tspan></text>

  <!-- ===== RIGHT : SPARSE / MoE ===== -->
  <text x="640" y="200" class="mono" font-size="14" font-weight="600" fill="#1F5560" letter-spacing="0.12em">SPARSE · MoE</text>

  <rect x="700" y="212" width="120" height="44" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="760" y="239" class="body" font-size="14" fill="#1A1A1A" text-anchor="middle">token</text>
  <line x1="760" y1="256" x2="760" y2="292" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#s1-arrow)"/>

  <g class="interactive" data-card="router" tabindex="0" role="button" aria-label="Routeur — cliquez pour les détails">
    <rect x="695" y="302" width="130" height="46" rx="3" fill="#E8F0F1" stroke="#1F5560" stroke-width="1.5"/>
    <text x="760" y="330" class="body" font-size="14" font-weight="600" fill="#1F5560" text-anchor="middle">routeur</text>
  </g>

  <!-- experts column -->
  <g class="interactive" data-card="active-expert" tabindex="0" role="button" aria-label="Experts actifs — cliquez pour les détails">
    <rect x="980" y="352" width="150" height="34" rx="3" fill="#B7332C" stroke="#B7332C" stroke-width="1.25"/>
    <text x="1055" y="374" class="mono" font-size="12" fill="#FAF8F3" text-anchor="middle">expert 2 · actif</text>
    <rect x="980" y="480" width="150" height="34" rx="3" fill="#B7332C" stroke="#B7332C" stroke-width="1.25"/>
    <text x="1055" y="502" class="mono" font-size="12" fill="#FAF8F3" text-anchor="middle">expert 6 · actif</text>
  </g>

  <g class="interactive" data-card="dormant-expert" tabindex="0" role="button" aria-label="Experts dormants — cliquez pour les détails">
    <rect x="980" y="310" width="150" height="34" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25" stroke-dasharray="3 3"/>
    <text x="1055" y="332" class="mono" font-size="12" fill="#B8B5AE" text-anchor="middle">expert 1</text>
    <rect x="980" y="394" width="150" height="34" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25" stroke-dasharray="3 3"/>
    <text x="1055" y="416" class="mono" font-size="12" fill="#B8B5AE" text-anchor="middle">expert 3…5</text>
    <rect x="980" y="438" width="150" height="34" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25" stroke-dasharray="3 3"/>
    <text x="1055" y="460" class="mono" font-size="12" fill="#B8B5AE" text-anchor="middle">…</text>
    <rect x="980" y="522" width="150" height="34" rx="3" fill="#FAF8F3" stroke="#B8B5AE" stroke-width="1.25" stroke-dasharray="3 3"/>
    <text x="1055" y="544" class="mono" font-size="12" fill="#B8B5AE" text-anchor="middle">expert N</text>
  </g>

  <!-- router to active experts (solid carmine) -->
  <path d="M825 322 C900 330 905 366 971 369" fill="none" stroke="#B7332C" stroke-width="2.5" marker-end="url(#s1-arrow-c)"/>
  <path d="M825 336 C900 420 905 494 971 497" fill="none" stroke="#B7332C" stroke-width="2.5" marker-end="url(#s1-arrow-c)"/>
  <!-- faint lines to dormant -->
  <path d="M828 314 C900 318 905 325 977 327" fill="none" stroke="#B8B5AE" stroke-width="0.75"/>
  <path d="M828 340 C900 545 905 537 977 539" fill="none" stroke="#B8B5AE" stroke-width="0.75"/>

  <!-- combine -->
  <line x1="1055" y1="514" x2="1055" y2="588" stroke="#5A5A5A" stroke-width="1.25"/>
  <line x1="1055" y1="386" x2="1055" y2="430" stroke="#5A5A5A" stroke-width="0.5"/>
  <rect x="700" y="578" width="130" height="44" rx="3" fill="#F2EFE7" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="765" y="605" class="body" font-size="14" fill="#1A1A1A" text-anchor="middle">combinaison</text>
  <path d="M980 600 L838 600" fill="none" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#s1-arrow)"/>

  <text x="640" y="662" class="mono" font-size="15" fill="#1F5560">FLOPs  ∝  k experts  (k ≪ N)</text>

  <!-- Footer -->
  <line x1="60" y1="712" x2="1140" y2="712" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="746" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : Shazeer et al. 2017 ; Fedus, Zoph &amp; Shazeer 2021 ; DeepSeek-V3 (671 Md totaux / 37 Md actifs).</text>
</svg>
