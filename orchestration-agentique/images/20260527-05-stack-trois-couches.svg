<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 05 · LE STACK</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">ADK ≠ runtime ≠ <tspan font-style="italic">plateforme</tspan>.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Trois couches qu'on confond souvent. Chacune a ses fournisseurs, ses arbitrages, et son périmètre de responsabilité.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Layer 0 : Application (top) -->
  <g class="interactive" data-card="layer-app" tabindex="0" role="button" aria-label="Couche : Application">
    <rect x="120" y="190" width="700" height="60" rx="3" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="140" y="216" class="mono" font-size="10.5" letter-spacing="1.5" fill="#5A5A5A">VOTRE APPLICATION</text>
    <text x="140" y="238" class="body" font-size="12" fill="#1A1A1A">Logique métier, UI, données spécifiques, contrats SLA.</text>
  </g>
  <text x="830" y="220" class="body" font-size="11" font-style="italic" fill="#5A5A5A">— ce qui vous différencie —</text>
  <text x="830" y="238" class="body" font-size="11" font-style="italic" fill="#5A5A5A">  toujours à vous.</text>

  <!-- Layer 1 : ADK (Agent Development Kit) -->
  <g class="interactive" data-card="layer-adk" tabindex="0" role="button" aria-label="Couche 1 : ADK">
    <rect x="120" y="270" width="700" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="140" y="296" class="mono" font-size="10.5" letter-spacing="1.5" fill="#B7332C">COUCHE 1 — ADK (DEV KIT)</text>
    <text x="140" y="318" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Le SDK : agent + outils + boucle + handoffs.</text>
    <text x="140" y="338" class="body" font-size="11" fill="#5A5A5A">Open : LangGraph · CrewAI · Mastra · Pydantic AI · LlamaIndex</text>
    <text x="140" y="354" class="body" font-size="11" fill="#5A5A5A">Vendeurs : OpenAI Agents SDK · Claude Agent SDK · Google ADK · MS Agent Framework</text>
  </g>
  <text x="830" y="298" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Définit la <tspan font-weight="500" font-style="normal">forme</tspan></text>
  <text x="830" y="316" class="body" font-size="11" font-style="italic" fill="#5A5A5A">d'un agent dans le code :</text>
  <text x="830" y="332" class="body" font-size="11" font-style="italic" fill="#5A5A5A">types, abstractions,</text>
  <text x="830" y="348" class="body" font-size="11" font-style="italic" fill="#5A5A5A">contrats avec les outils.</text>

  <!-- Layer 2 : Runtime -->
  <g class="interactive" data-card="layer-runtime" tabindex="0" role="button" aria-label="Couche 2 : Runtime">
    <rect x="120" y="390" width="700" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="140" y="416" class="mono" font-size="10.5" letter-spacing="1.5" fill="#B7332C">COUCHE 2 — RUNTIME (EXÉCUTION)</text>
    <text x="140" y="438" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Où les sessions tournent : isolation, scale, durée longue.</text>
    <text x="140" y="458" class="body" font-size="11" fill="#5A5A5A">Managés : AgentCore Runtime (microVM 8 h) · Vertex AI Agent Engine · Azure Foundry Agent Service</text>
    <text x="140" y="474" class="body" font-size="11" fill="#5A5A5A">À soi : container ECS/GKE · Lambda · Cloud Run · serveur dédié.</text>
  </g>
  <text x="830" y="416" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Tranche la session,</text>
  <text x="830" y="432" class="body" font-size="11" font-style="italic" fill="#5A5A5A">isole les exécutions,</text>
  <text x="830" y="448" class="body" font-size="11" font-style="italic" fill="#5A5A5A">gère la durée (jusqu'à</text>
  <text x="830" y="464" class="body" font-size="11" font-style="italic" fill="#5A5A5A">8 h chez AWS), le retry.</text>

  <!-- Layer 3 : Platform services -->
  <g class="interactive" data-card="layer-platform" tabindex="0" role="button" aria-label="Couche 3 : Plateforme">
    <rect x="120" y="510" width="700" height="140" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="140" y="536" class="mono" font-size="10.5" letter-spacing="1.5" fill="#B7332C">COUCHE 3 — SERVICES DE PLATEFORME</text>
    <text x="140" y="558" class="display" font-size="15" font-weight="600" fill="#1A1A1A">Ce qui rend un agent <tspan font-style="italic">opérable</tspan> en production.</text>
    <!-- 6 mini-tiles -->
    <rect x="140" y="572" width="100" height="64" rx="2" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
    <text x="190" y="592" class="mono" font-size="9" text-anchor="middle" fill="#1F5560">MEMORY</text>
    <text x="190" y="610" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">court terme,</text>
    <text x="190" y="624" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">long terme</text>

    <rect x="250" y="572" width="100" height="64" rx="2" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
    <text x="300" y="592" class="mono" font-size="9" text-anchor="middle" fill="#1F5560">IDENTITY</text>
    <text x="300" y="610" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">on-behalf-of</text>
    <text x="300" y="624" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">OAuth</text>

    <rect x="360" y="572" width="100" height="64" rx="2" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
    <text x="410" y="592" class="mono" font-size="9" text-anchor="middle" fill="#1F5560">GATEWAY</text>
    <text x="410" y="610" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">API →</text>
    <text x="410" y="624" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">MCP tools</text>

    <rect x="470" y="572" width="100" height="64" rx="2" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
    <text x="520" y="592" class="mono" font-size="9" text-anchor="middle" fill="#1F5560">OBSERV.</text>
    <text x="520" y="610" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">traces,</text>
    <text x="520" y="624" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">replay</text>

    <rect x="580" y="572" width="100" height="64" rx="2" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
    <text x="630" y="592" class="mono" font-size="9" text-anchor="middle" fill="#1F5560">CODE</text>
    <text x="630" y="610" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">sandbox</text>
    <text x="630" y="624" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">Py/JS/TS</text>

    <rect x="690" y="572" width="100" height="64" rx="2" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
    <text x="740" y="592" class="mono" font-size="9" text-anchor="middle" fill="#1F5560">BROWSER</text>
    <text x="740" y="610" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">remote</text>
    <text x="740" y="624" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">navigation</text>
  </g>
  <text x="830" y="544" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Modulaire : chaque</text>
  <text x="830" y="560" class="body" font-size="11" font-style="italic" fill="#5A5A5A">service est consommable</text>
  <text x="830" y="576" class="body" font-size="11" font-style="italic" fill="#5A5A5A">indépendamment.</text>
  <text x="830" y="600" class="body" font-size="11" font-style="italic" fill="#B7332C">AgentCore (AWS) sépare</text>
  <text x="830" y="616" class="body" font-size="11" font-style="italic" fill="#B7332C">explicitement ces 6 briques.</text>

  <!-- Layer 4 : Model providers -->
  <g class="interactive" data-card="layer-models" tabindex="0" role="button" aria-label="Couche 4 : Modèles">
    <rect x="120" y="670" width="700" height="60" rx="3" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="140" y="696" class="mono" font-size="10.5" letter-spacing="1.5" fill="#5A5A5A">SOCLE — MODÈLES (FONDATIONS)</text>
    <text x="140" y="718" class="body" font-size="11" fill="#1A1A1A">Anthropic Claude · OpenAI GPT · Google Gemini · Meta Llama · Mistral · Bedrock catalog · Vertex Model Garden.</text>
  </g>
  <text x="830" y="700" class="body" font-size="11" font-style="italic" fill="#5A5A5A">L'orchestration est</text>
  <text x="830" y="716" class="body" font-size="11" font-style="italic" fill="#5A5A5A">indépendante du modèle.</text>

  <!-- Stack arrow on the right of layers -->
  <path d="M 90 220 L 90 700" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M 90 220 L 84 230 L 96 230 z" fill="#1A1A1A"/>
  <text x="40" y="460" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A" transform="rotate(-90 60 460)">LE STACK</text>

  <!-- Source -->
  <text x="60" y="772" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Sources : AWS, « Amazon Bedrock AgentCore Overview » (oct. 2025) ; Google Cloud, ADK + Vertex AI Agent Engine docs (2026).</text>
</svg>
