<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr03" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 03 · QUI ORCHESTRE</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">Quatre régimes, du <tspan font-style="italic">déterministe</tspan> à l'<tspan font-style="italic">autonome</tspan>.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Plus on monte en autonomie, plus on perd en prévisibilité — et plus le coût d'observabilité augmente.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Horizontal axis -->
  <line x1="80" y1="690" x2="1140" y2="690" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#arr03)"/>
  <text x="80" y="724" class="mono" font-size="11" fill="#5A5A5A">DÉTERMINISTE</text>
  <text x="1108" y="724" class="mono" font-size="11" fill="#5A5A5A" text-anchor="end">AUTONOME</text>
  <text x="600" y="752" class="body" font-size="11" font-style="italic" text-anchor="middle" fill="#5A5A5A">— spectre de qui décide quoi tourne ensuite —</text>

  <!-- Régime 1 : Code-driven -->
  <g class="interactive" data-card="reg-code" tabindex="0" role="button" aria-label="Régime code-driven">
    <rect x="60" y="220" width="240" height="430" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="248" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">RÉGIME 1</text>
    <text x="80" y="278" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Code-driven</text>
    <text x="80" y="298" class="display" font-size="13" font-style="italic" fill="#5A5A5A">workflow</text>

    <line x1="80" y1="318" x2="280" y2="318" stroke="#E5E1D8" stroke-width="1"/>

    <text x="80" y="344" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Qui orchestre ?</text>
    <text x="80" y="362" class="body" font-size="10.5" fill="#5A5A5A">Le code applicatif. Le LLM</text>
    <text x="80" y="378" class="body" font-size="10.5" fill="#5A5A5A">est appelé à des étapes fixes.</text>

    <text x="80" y="408" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Patterns Anthropic :</text>
    <text x="80" y="426" class="body" font-size="10.5" fill="#5A5A5A">chaining, routing,</text>
    <text x="80" y="442" class="body" font-size="10.5" fill="#5A5A5A">parallelization.</text>

    <text x="80" y="472" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Prévisibilité :</text>
    <text x="80" y="490" class="mono" font-size="11" fill="#1F5560">★★★★★</text>

    <text x="80" y="518" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Cas type :</text>
    <text x="80" y="536" class="body" font-size="10.5" fill="#5A5A5A">extraction + résumé + envoi.</text>
    <text x="80" y="552" class="body" font-size="10.5" fill="#5A5A5A">Classification de tickets.</text>
    <text x="80" y="568" class="body" font-size="10.5" fill="#5A5A5A">Pipeline de modération.</text>

    <text x="80" y="610" class="mono" font-size="10" font-style="italic" fill="#B58A2C">« Use a workflow when</text>
    <text x="80" y="624" class="mono" font-size="10" font-style="italic" fill="#B58A2C">the path is predictable. »</text>
  </g>

  <!-- Régime 2 : LLM-driven (routines + handoffs) -->
  <g class="interactive" data-card="reg-llm" tabindex="0" role="button" aria-label="Régime LLM-driven">
    <rect x="320" y="220" width="240" height="430" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="340" y="248" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">RÉGIME 2</text>
    <text x="340" y="278" class="display" font-size="17" font-weight="600" fill="#1A1A1A">LLM-driven</text>
    <text x="340" y="298" class="display" font-size="13" font-style="italic" fill="#5A5A5A">routines + handoffs</text>

    <line x1="340" y1="318" x2="540" y2="318" stroke="#E5E1D8" stroke-width="1"/>

    <text x="340" y="344" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Qui orchestre ?</text>
    <text x="340" y="362" class="body" font-size="10.5" fill="#5A5A5A">Le modèle lui-même. Une</text>
    <text x="340" y="378" class="body" font-size="10.5" fill="#5A5A5A">routine = instructions + outils.</text>
    <text x="340" y="394" class="body" font-size="10.5" fill="#5A5A5A">Un hand-off rend la main à</text>
    <text x="340" y="410" class="body" font-size="10.5" fill="#5A5A5A">un autre agent (autre prompt).</text>

    <text x="340" y="440" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Origine :</text>
    <text x="340" y="458" class="body" font-size="10.5" fill="#5A5A5A">OpenAI Swarm (oct. 2024)</text>
    <text x="340" y="474" class="body" font-size="10.5" fill="#5A5A5A">→ OpenAI Agents SDK (2025).</text>

    <text x="340" y="504" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Prévisibilité :</text>
    <text x="340" y="522" class="mono" font-size="11" fill="#1F5560">★★★☆☆</text>

    <text x="340" y="550" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Cas type :</text>
    <text x="340" y="568" class="body" font-size="10.5" fill="#5A5A5A">triage support → spécialiste.</text>
    <text x="340" y="584" class="body" font-size="10.5" fill="#5A5A5A">Vente : qualif → démo → devis.</text>

    <text x="340" y="624" class="mono" font-size="10" font-style="italic" fill="#B58A2C">Le routing est dans la tête</text>
    <text x="340" y="638" class="mono" font-size="10" font-style="italic" fill="#B58A2C">du modèle, pas dans le code.</text>
  </g>

  <!-- Régime 3 : Graphe déclaratif -->
  <g class="interactive" data-card="reg-graph" tabindex="0" role="button" aria-label="Régime graphe déclaratif">
    <rect x="580" y="220" width="240" height="430" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="600" y="248" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">RÉGIME 3</text>
    <text x="600" y="278" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Graphe</text>
    <text x="600" y="298" class="display" font-size="13" font-style="italic" fill="#5A5A5A">déclaratif</text>

    <line x1="600" y1="318" x2="800" y2="318" stroke="#E5E1D8" stroke-width="1"/>

    <text x="600" y="344" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Qui orchestre ?</text>
    <text x="600" y="362" class="body" font-size="10.5" fill="#5A5A5A">Une machine d'états. Le dev</text>
    <text x="600" y="378" class="body" font-size="10.5" fill="#5A5A5A">déclare les nœuds, les arêtes</text>
    <text x="600" y="394" class="body" font-size="10.5" fill="#5A5A5A">conditionnelles, et l'état.</text>
    <text x="600" y="410" class="body" font-size="10.5" fill="#5A5A5A">Le moteur exécute, persiste,</text>
    <text x="600" y="426" class="body" font-size="10.5" fill="#5A5A5A">reprend, audite.</text>

    <text x="600" y="456" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Outil canonique :</text>
    <text x="600" y="474" class="body" font-size="10.5" fill="#5A5A5A">LangGraph (Klarna, Uber,</text>
    <text x="600" y="490" class="body" font-size="10.5" fill="#5A5A5A">LinkedIn, JPMorgan, Replit).</text>

    <text x="600" y="520" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Prévisibilité :</text>
    <text x="600" y="538" class="mono" font-size="11" fill="#1F5560">★★★★☆</text>

    <text x="600" y="566" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Cas type :</text>
    <text x="600" y="584" class="body" font-size="10.5" fill="#5A5A5A">workflow agentique durable</text>
    <text x="600" y="600" class="body" font-size="10.5" fill="#5A5A5A">avec retry, audit, rollback.</text>

    <text x="600" y="638" class="mono" font-size="10" font-style="italic" fill="#B58A2C">Le code est plus verbeux —</text>
    <text x="600" y="652" class="mono" font-size="10" font-style="italic" fill="#B58A2C">on gagne en contrôle.</text>
  </g>

  <!-- Régime 4 : Agent autonome -->
  <g class="interactive" data-card="reg-auto" tabindex="0" role="button" aria-label="Régime agent autonome">
    <rect x="840" y="220" width="300" height="430" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <text x="860" y="248" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">RÉGIME 4</text>
    <text x="860" y="278" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Agent autonome</text>
    <text x="860" y="298" class="display" font-size="13" font-style="italic" fill="#5A5A5A">boucle libre</text>

    <line x1="860" y1="318" x2="1120" y2="318" stroke="#E5E1D8" stroke-width="1"/>

    <text x="860" y="344" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Qui orchestre ?</text>
    <text x="860" y="362" class="body" font-size="10.5" fill="#5A5A5A">Personne d'autre que le modèle.</text>
    <text x="860" y="378" class="body" font-size="10.5" fill="#5A5A5A">Boucle Perceive → Decide → Act →</text>
    <text x="860" y="394" class="body" font-size="10.5" fill="#5A5A5A">Observe jusqu'à condition de stop</text>
    <text x="860" y="410" class="body" font-size="10.5" fill="#5A5A5A">(« done », budget épuisé, erreur).</text>

    <text x="860" y="440" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Exemples :</text>
    <text x="860" y="458" class="body" font-size="10.5" fill="#5A5A5A">Claude Code / Devin / Cursor agent.</text>
    <text x="860" y="474" class="body" font-size="10.5" fill="#5A5A5A">Manus, AutoGPT (les pionniers).</text>

    <text x="860" y="504" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Prévisibilité :</text>
    <text x="860" y="522" class="mono" font-size="11" fill="#B7332C">★★☆☆☆</text>

    <text x="860" y="550" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Cas type :</text>
    <text x="860" y="568" class="body" font-size="10.5" fill="#5A5A5A">tâche ouverte non-décomposable</text>
    <text x="860" y="584" class="body" font-size="10.5" fill="#5A5A5A">à l'avance — recherche, debug,</text>
    <text x="860" y="600" class="body" font-size="10.5" fill="#5A5A5A">exploration de code.</text>

    <text x="860" y="638" class="mono" font-size="10" font-style="italic" fill="#B58A2C">Anthropic : « réserver l'autonomie</text>
    <text x="860" y="652" class="mono" font-size="10" font-style="italic" fill="#B58A2C">aux tâches où elle est nécessaire ».</text>
  </g>

  <!-- Annotation : the price -->
  <text x="60" y="194" class="body" font-size="11" font-style="italic" fill="#B7332C">Chaque colonne englobe celle de gauche : un agent autonome contient ses propres routines, qui contiennent leurs propres workflows.</text>
</svg>
