<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr02" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
    <marker id="arr02soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A5A5A"/>
    </marker>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 02 · ANATOMIE</text>
  <text x="60" y="100" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Ce qu'on appelle <tspan font-style="italic">une boucle agentique</tspan>.</text>
  <text x="60" y="132" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Quatre phases internes, quatre ressources externes — et un orchestrateur qui enveloppe le tout.</text>
  <line x1="60" y1="160" x2="840" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Outer ring : the orchestrator -->
  <g class="interactive" data-card="orchestrator" tabindex="0" role="button" aria-label="L'orchestrateur — enveloppe la boucle">
    <circle cx="450" cy="560" r="320" fill="none" stroke="#B7332C" stroke-width="1.5" stroke-dasharray="6 5"/>
    <rect x="340" y="220" width="220" height="40" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="450" y="247" class="mono" font-size="12" letter-spacing="2.5" text-anchor="middle" fill="#B7332C">L'ORCHESTRATEUR</text>
  </g>

  <!-- Inner loop : 4 phases -->
  <!-- Center circle -->
  <circle cx="450" cy="560" r="100" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="450" y="548" class="display" font-size="15" font-weight="600" text-anchor="middle" fill="#1A1A1A">La boucle</text>
  <text x="450" y="568" class="display" font-size="15" font-weight="600" text-anchor="middle" font-style="italic" fill="#1A1A1A">agentique</text>
  <text x="450" y="590" class="mono" font-size="10" letter-spacing="1.5" text-anchor="middle" fill="#5A5A5A">PERCEIVE · DECIDE</text>
  <text x="450" y="604" class="mono" font-size="10" letter-spacing="1.5" text-anchor="middle" fill="#5A5A5A">ACT · OBSERVE</text>

  <!-- 4 phase nodes around the loop -->
  <g class="interactive" data-card="phase-perceive" tabindex="0" role="button" aria-label="Phase Perceive">
    <circle cx="450" cy="400" r="44" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="450" y="396" class="body" font-size="11" font-weight="500" text-anchor="middle" fill="#1A1A1A">1 · Perceive</text>
    <text x="450" y="412" class="body" font-size="10" text-anchor="middle" fill="#5A5A5A">lit le contexte</text>
  </g>

  <g class="interactive" data-card="phase-decide" tabindex="0" role="button" aria-label="Phase Decide">
    <circle cx="610" cy="560" r="44" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="610" y="556" class="body" font-size="11" font-weight="500" text-anchor="middle" fill="#1A1A1A">2 · Decide</text>
    <text x="610" y="572" class="body" font-size="10" text-anchor="middle" fill="#5A5A5A">tool ou réponse ?</text>
  </g>

  <g class="interactive" data-card="phase-act" tabindex="0" role="button" aria-label="Phase Act">
    <circle cx="450" cy="720" r="44" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="450" y="716" class="body" font-size="11" font-weight="500" text-anchor="middle" fill="#1A1A1A">3 · Act</text>
    <text x="450" y="732" class="body" font-size="10" text-anchor="middle" fill="#5A5A5A">exécute l'outil</text>
  </g>

  <g class="interactive" data-card="phase-observe" tabindex="0" role="button" aria-label="Phase Observe">
    <circle cx="290" cy="560" r="44" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="290" y="556" class="body" font-size="11" font-weight="500" text-anchor="middle" fill="#1A1A1A">4 · Observe</text>
    <text x="290" y="572" class="body" font-size="10" text-anchor="middle" fill="#5A5A5A">lit le résultat</text>
  </g>

  <!-- Arrows between phases (clockwise) -->
  <path d="M 484 432 A 110 110 0 0 1 580 528" fill="none" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr02)"/>
  <path d="M 580 596 A 110 110 0 0 1 484 688" fill="none" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr02)"/>
  <path d="M 416 688 A 110 110 0 0 1 320 596" fill="none" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr02)"/>
  <path d="M 320 528 A 110 110 0 0 1 416 432" fill="none" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr02)"/>

  <!-- 4 satellite resources -->
  <g class="interactive" data-card="res-model" tabindex="0" role="button" aria-label="Ressource Model">
    <rect x="60" y="340" width="170" height="74" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="80" y="365" class="mono" font-size="10" letter-spacing="1.5" fill="#1F5560">MODEL</text>
    <text x="80" y="385" class="body" font-size="11" fill="#1A1A1A">Qui réfléchit.</text>
    <text x="80" y="402" class="body" font-size="10" fill="#5A5A5A">Claude, GPT, Gemini, Llama.</text>
  </g>
  <path d="M 230 380 Q 320 380 410 400" fill="none" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arr02soft)"/>

  <g class="interactive" data-card="res-tools" tabindex="0" role="button" aria-label="Ressource Tools">
    <rect x="670" y="340" width="170" height="74" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="690" y="365" class="mono" font-size="10" letter-spacing="1.5" fill="#1F5560">TOOLS</text>
    <text x="690" y="385" class="body" font-size="11" fill="#1A1A1A">Ce qui agit.</text>
    <text x="690" y="402" class="body" font-size="10" fill="#5A5A5A">APIs, MCP, sandboxes.</text>
  </g>
  <path d="M 670 380 Q 580 380 490 400" fill="none" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arr02soft)"/>

  <g class="interactive" data-card="res-memory" tabindex="0" role="button" aria-label="Ressource Memory">
    <rect x="60" y="710" width="170" height="74" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="80" y="735" class="mono" font-size="10" letter-spacing="1.5" fill="#1F5560">MEMORY</text>
    <text x="80" y="755" class="body" font-size="11" fill="#1A1A1A">Ce qui persiste.</text>
    <text x="80" y="772" class="body" font-size="10" fill="#5A5A5A">Court terme, long terme, vecteur.</text>
  </g>
  <path d="M 230 740 Q 280 720 290 612" fill="none" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arr02soft)"/>

  <g class="interactive" data-card="res-control" tabindex="0" role="button" aria-label="Ressource Control">
    <rect x="670" y="710" width="170" height="74" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="690" y="735" class="mono" font-size="10" letter-spacing="1.5" fill="#1F5560">CONTROL</text>
    <text x="690" y="755" class="body" font-size="11" fill="#1A1A1A">Qui décide la suite.</text>
    <text x="690" y="772" class="body" font-size="10" fill="#5A5A5A">Conditions de stop, hand-offs.</text>
  </g>
  <path d="M 670 740 Q 620 720 610 612" fill="none" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arr02soft)"/>

  <!-- Source -->
  <text x="60" y="862" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Source : synthèse à partir de Claude Agent SDK (Anthropic, 2026) et OpenAI Agents SDK (2025) — la même structure se retrouve dans les principaux ADK.</text>
</svg>
