<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr08" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 08 · ARBRE DE DÉCISION</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">Produit · ADK + runtime · <tspan font-style="italic">build</tspan>.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Quatre questions cardinales — quatre destinations. Lire de gauche à droite ; on n'avance qu'en cas de « oui ».</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Root -->
  <rect x="60" y="200" width="220" height="70" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.5"/>
  <text x="80" y="226" class="mono" font-size="10.5" letter-spacing="1.5" fill="#B7332C">DÉPART</text>
  <text x="80" y="252" class="body" font-size="13" fill="#1A1A1A">Un cas d'usage agentique</text>
  <text x="80" y="268" class="body" font-size="13" fill="#1A1A1A">en tête.</text>

  <!-- Q1 : standard et critique métier ? -->
  <g class="interactive" data-card="dec-q1" tabindex="0" role="button" aria-label="Question 1">
    <rect x="320" y="200" width="220" height="70" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="340" y="222" class="mono" font-size="10" letter-spacing="1.5" fill="#1A1A1A">Q1</text>
    <text x="340" y="242" class="body" font-size="12" fill="#1A1A1A">Cas d'usage standard du</text>
    <text x="340" y="258" class="body" font-size="12" fill="#1A1A1A">marché (support, légal, code) ?</text>
  </g>
  <line x1="280" y1="235" x2="320" y2="235" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr08)"/>

  <!-- → produit vertical -->
  <g class="interactive" data-card="dec-out-product" tabindex="0" role="button" aria-label="Sortie : Produit vertical">
    <rect x="600" y="180" width="540" height="110" rx="3" fill="#F3EEDF" stroke="#B58A2C" stroke-width="2"/>
    <text x="620" y="206" class="mono" font-size="10.5" letter-spacing="2" fill="#B58A2C">OUI → PRODUIT VERTICAL</text>
    <text x="620" y="232" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Acheter. Et négocier l'intégration.</text>
    <text x="620" y="254" class="body" font-size="11" fill="#5A5A5A">Sierra, Harvey, Devin, Cursor, Hippocratic — quelqu'un a déjà payé la</text>
    <text x="620" y="270" class="body" font-size="11" fill="#5A5A5A">dette d'évals, le tuning métier et le support 24/7. Ne pas réinventer.</text>
  </g>
  <path d="M 540 230 L 600 230" stroke="#1A1A1A" stroke-width="1.25" fill="none" marker-end="url(#arr08)"/>
  <text x="560" y="222" class="mono" font-size="10" fill="#1A1A1A">oui</text>

  <!-- Q2 -->
  <g class="interactive" data-card="dec-q2" tabindex="0" role="button" aria-label="Question 2">
    <rect x="320" y="320" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="340" y="342" class="mono" font-size="10" letter-spacing="1.5" fill="#1A1A1A">Q2</text>
    <text x="340" y="362" class="body" font-size="12" fill="#1A1A1A">Workflow unique mais besoin</text>
    <text x="340" y="378" class="body" font-size="12" fill="#1A1A1A">mémoire / identité / audit</text>
    <text x="340" y="394" class="body" font-size="12" fill="#1A1A1A">production-grade ?</text>
  </g>
  <path d="M 430 270 L 430 320" stroke="#1A1A1A" stroke-width="1.25" fill="none" marker-end="url(#arr08)"/>
  <text x="440" y="298" class="mono" font-size="10" fill="#5A5A5A">non</text>

  <!-- → ADK + runtime managé -->
  <g class="interactive" data-card="dec-out-managed" tabindex="0" role="button" aria-label="Sortie : ADK + runtime managé">
    <rect x="600" y="310" width="540" height="110" rx="3" fill="#F3EEDF" stroke="#1F5560" stroke-width="2"/>
    <text x="620" y="336" class="mono" font-size="10.5" letter-spacing="2" fill="#1F5560">OUI → ADK + RUNTIME MANAGÉ</text>
    <text x="620" y="362" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Construire sur un socle managé.</text>
    <text x="620" y="384" class="body" font-size="11" fill="#5A5A5A">LangGraph ou ADK du cloud + AgentCore / Vertex AE / Foundry. Vous</text>
    <text x="620" y="400" class="body" font-size="11" fill="#5A5A5A">codez la logique métier, ils opèrent la mémoire, l'identité, l'observabilité.</text>
  </g>
  <path d="M 540 360 L 600 360" stroke="#1A1A1A" stroke-width="1.25" fill="none" marker-end="url(#arr08)"/>
  <text x="560" y="352" class="mono" font-size="10" fill="#1A1A1A">oui</text>

  <!-- Q3 -->
  <g class="interactive" data-card="dec-q3" tabindex="0" role="button" aria-label="Question 3">
    <rect x="320" y="450" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="340" y="472" class="mono" font-size="10" letter-spacing="1.5" fill="#1A1A1A">Q3</text>
    <text x="340" y="492" class="body" font-size="12" fill="#1A1A1A">Forte spécificité, latence basse,</text>
    <text x="340" y="508" class="body" font-size="12" fill="#1A1A1A">contrôle des coûts critique,</text>
    <text x="340" y="524" class="body" font-size="12" fill="#1A1A1A">équipe SRE en place ?</text>
  </g>
  <path d="M 430 400 L 430 450" stroke="#1A1A1A" stroke-width="1.25" fill="none" marker-end="url(#arr08)"/>
  <text x="440" y="428" class="mono" font-size="10" fill="#5A5A5A">non</text>

  <!-- → ADK open + runtime perso -->
  <g class="interactive" data-card="dec-out-self" tabindex="0" role="button" aria-label="Sortie : ADK open + runtime perso">
    <rect x="600" y="440" width="540" height="110" rx="3" fill="#F3EEDF" stroke="#1F5560" stroke-width="1.5"/>
    <text x="620" y="466" class="mono" font-size="10.5" letter-spacing="2" fill="#1F5560">OUI → ADK OPEN + RUNTIME PERSO</text>
    <text x="620" y="492" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Self-host. Pour optimiser tout en bout.</text>
    <text x="620" y="514" class="body" font-size="11" fill="#5A5A5A">LangGraph + container ECS/GKE, ou orchestration custom. Vous payez</text>
    <text x="620" y="530" class="body" font-size="11" fill="#5A5A5A">en SRE — vous gagnez en optim modèles, batching, latence p95.</text>
  </g>
  <path d="M 540 490 L 600 490" stroke="#1A1A1A" stroke-width="1.25" fill="none" marker-end="url(#arr08)"/>
  <text x="560" y="482" class="mono" font-size="10" fill="#1A1A1A">oui</text>

  <!-- Q4 -->
  <g class="interactive" data-card="dec-q4" tabindex="0" role="button" aria-label="Question 4">
    <rect x="320" y="580" width="220" height="80" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="340" y="602" class="mono" font-size="10" letter-spacing="1.5" fill="#1A1A1A">Q4</text>
    <text x="340" y="622" class="body" font-size="12" fill="#1A1A1A">Contraintes uniques : on-prem,</text>
    <text x="340" y="638" class="body" font-size="12" fill="#1A1A1A">edge, latence &lt; 50 ms, modèle</text>
    <text x="340" y="654" class="body" font-size="12" fill="#1A1A1A">fine-tuné maison ?</text>
  </g>
  <path d="M 430 530 L 430 580" stroke="#1A1A1A" stroke-width="1.25" fill="none" marker-end="url(#arr08)"/>
  <text x="440" y="558" class="mono" font-size="10" fill="#5A5A5A">non</text>

  <!-- → build from scratch -->
  <g class="interactive" data-card="dec-out-build" tabindex="0" role="button" aria-label="Sortie : Build from scratch">
    <rect x="600" y="570" width="540" height="110" rx="3" fill="#F3EEDF" stroke="#B7332C" stroke-width="2"/>
    <text x="620" y="596" class="mono" font-size="10.5" letter-spacing="2" fill="#B7332C">OUI → BÂTIR DE A À Z</text>
    <text x="620" y="622" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Boucle agentique maison, plumbing inclus.</text>
    <text x="620" y="644" class="body" font-size="11" fill="#5A5A5A">Justifié uniquement quand aucune des trois voies précédentes ne ferme</text>
    <text x="620" y="660" class="body" font-size="11" fill="#5A5A5A">le cas. Conseil : commencer petit — un workflow Anthropic suffit souvent.</text>
  </g>
  <path d="M 540 620 L 600 620" stroke="#1A1A1A" stroke-width="1.25" fill="none" marker-end="url(#arr08)"/>
  <text x="560" y="612" class="mono" font-size="10" fill="#1A1A1A">oui</text>

  <!-- Default route if all answers are "non" -->
  <g class="interactive" data-card="dec-default" tabindex="0" role="button" aria-label="Si toutes les réponses sont non">
    <rect x="60" y="700" width="1080" height="50" rx="3" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="80" y="724" class="mono" font-size="10" letter-spacing="1.5" fill="#5A5A5A">RÉPONSES TOUTES « NON »</text>
    <text x="80" y="740" class="body" font-size="11" fill="#1A1A1A">→ Probablement pas besoin d'un agent. Un workflow déterministe Anthropic (chaining + routing) suffit. Économie : 10× sur le run, 100× sur le debug.</text>
  </g>

  <!-- Source -->
  <text x="60" y="780" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Cadre analytique de l'auteur, synthèse des arbres de décision publiés par Anthropic, AWS, MadAppGang, Channel et Knowlee (2026).</text>
</svg>
