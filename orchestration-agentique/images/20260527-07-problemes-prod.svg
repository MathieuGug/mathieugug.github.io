<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 07 · FAILURE MODES</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">Cinq problèmes durs qui font <tspan font-style="italic">crasher en prod</tspan>.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Pas les boucles agentiques — les couches autour. Pour chaque problème : un symptôme, un signal, une parade.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Five problems as 5 cards : 3 + 2 layout -->

  <!-- P1 : Mémoire / contexte -->
  <g class="interactive" data-card="prob-memory" tabindex="0" role="button" aria-label="Problème : Mémoire et contexte">
    <rect x="60" y="190" width="340" height="270" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="80" y="216" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">1 · MÉMOIRE &amp; CONTEXTE</text>
    <text x="80" y="246" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Le contexte fuit, dérive, gonfle.</text>
    <line x1="80" y1="262" x2="380" y2="262" stroke="#E5E1D8"/>

    <text x="80" y="288" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Symptôme</text>
    <text x="80" y="306" class="body" font-size="10.5" fill="#5A5A5A">L'agent oublie ce qu'on lui a dit</text>
    <text x="80" y="322" class="body" font-size="10.5" fill="#5A5A5A">il y a 30 tours — ou pire, hallucine</text>
    <text x="80" y="338" class="body" font-size="10.5" fill="#5A5A5A">un fait d'une session précédente.</text>

    <text x="80" y="368" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Signal</text>
    <text x="80" y="386" class="body" font-size="10.5" fill="#5A5A5A">Tokens par session qui explosent ;</text>
    <text x="80" y="402" class="body" font-size="10.5" fill="#5A5A5A">CSAT qui baisse sur tickets longs.</text>

    <text x="80" y="430" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Parade</text>
    <text x="80" y="448" class="body" font-size="10.5" fill="#5A5A5A">Couche mémoire dédiée (Mem0,</text>
    <text x="80" y="464" class="body" font-size="10.5" fill="#5A5A5A">Letta, AgentCore Memory).</text>
  </g>

  <!-- P2 : Observabilité -->
  <g class="interactive" data-card="prob-observ" tabindex="0" role="button" aria-label="Problème : Observabilité">
    <rect x="420" y="190" width="340" height="270" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="440" y="216" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">2 · OBSERVABILITÉ</text>
    <text x="440" y="246" class="display" font-size="17" font-weight="600" fill="#1A1A1A">On ne sait pas pourquoi il a fait ça.</text>
    <line x1="440" y1="262" x2="740" y2="262" stroke="#E5E1D8"/>

    <text x="440" y="288" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Symptôme</text>
    <text x="440" y="306" class="body" font-size="10.5" fill="#5A5A5A">L'agent a appelé le mauvais outil</text>
    <text x="440" y="322" class="body" font-size="10.5" fill="#5A5A5A">3 fois sur 100 — impossible de</text>
    <text x="440" y="338" class="body" font-size="10.5" fill="#5A5A5A">reproduire, impossible d'auditer.</text>

    <text x="440" y="368" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Signal</text>
    <text x="440" y="386" class="body" font-size="10.5" fill="#5A5A5A">Tickets « pourquoi a-t-il fait ça ? »</text>
    <text x="440" y="402" class="body" font-size="10.5" fill="#5A5A5A">sans trace exploitable.</text>

    <text x="440" y="430" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Parade</text>
    <text x="440" y="448" class="body" font-size="10.5" fill="#5A5A5A">Tracing OpenTelemetry par défaut</text>
    <text x="440" y="464" class="body" font-size="10.5" fill="#5A5A5A">(Braintrust, Langfuse, AgentCore Obs).</text>
  </g>

  <!-- P3 : Sécurité -->
  <g class="interactive" data-card="prob-security" tabindex="0" role="button" aria-label="Problème : Sécurité">
    <rect x="780" y="190" width="360" height="270" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="800" y="216" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">3 · SÉCURITÉ</text>
    <text x="800" y="246" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Sandbox + identité déléguée.</text>
    <line x1="800" y1="262" x2="1120" y2="262" stroke="#E5E1D8"/>

    <text x="800" y="288" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Symptôme</text>
    <text x="800" y="306" class="body" font-size="10.5" fill="#5A5A5A">L'agent agit avec les droits du</text>
    <text x="800" y="322" class="body" font-size="10.5" fill="#5A5A5A">service. Une injection dans un mail</text>
    <text x="800" y="338" class="body" font-size="10.5" fill="#5A5A5A">lu déclenche un transfert bancaire.</text>

    <text x="800" y="368" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Signal</text>
    <text x="800" y="386" class="body" font-size="10.5" fill="#5A5A5A">Code exécuté hors sandbox.</text>
    <text x="800" y="402" class="body" font-size="10.5" fill="#5A5A5A">Token d'API admin partagé.</text>

    <text x="800" y="430" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Parade</text>
    <text x="800" y="448" class="body" font-size="10.5" fill="#5A5A5A">microVM par session (AgentCore),</text>
    <text x="800" y="464" class="body" font-size="10.5" fill="#5A5A5A">OAuth on-behalf-of, allowlist outils.</text>
  </g>

  <!-- P4 : Idempotence / retry -->
  <g class="interactive" data-card="prob-idemp" tabindex="0" role="button" aria-label="Problème : Idempotence">
    <rect x="60" y="480" width="500" height="220" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="80" y="506" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">4 · IDEMPOTENCE &amp; RETRY</text>
    <text x="80" y="536" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Un agent qui replanifie ne doit pas dupliquer ses actions.</text>
    <line x1="80" y1="552" x2="540" y2="552" stroke="#E5E1D8"/>

    <text x="80" y="578" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Symptôme</text>
    <text x="80" y="596" class="body" font-size="10.5" fill="#5A5A5A">Crash mi-session → replay → l'agent recrée le ticket Jira,</text>
    <text x="80" y="612" class="body" font-size="10.5" fill="#5A5A5A">renvoie le mail, refacture le client. Effets de bord doublés.</text>

    <text x="80" y="640" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Parade</text>
    <text x="80" y="658" class="body" font-size="10.5" fill="#5A5A5A">Workflow durable (LangGraph checkpointing,</text>
    <text x="80" y="674" class="body" font-size="10.5" fill="#5A5A5A">Temporal-pour-agents) + clés d'idempotence côté outils.</text>
  </g>

  <!-- P5 : Coût -->
  <g class="interactive" data-card="prob-cost" tabindex="0" role="button" aria-label="Problème : Coût">
    <rect x="580" y="480" width="560" height="220" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="600" y="506" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">5 · COÛT &amp; AMPLIFICATION DE TOKENS</text>
    <text x="600" y="536" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Une boucle qui s'auto-nourrit peut brûler un budget.</text>
    <line x1="600" y1="552" x2="1120" y2="552" stroke="#E5E1D8"/>

    <text x="600" y="578" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Symptôme</text>
    <text x="600" y="596" class="body" font-size="10.5" fill="#5A5A5A">L'agent appelle un outil qui renvoie 4 000 tokens, replanifie,</text>
    <text x="600" y="612" class="body" font-size="10.5" fill="#5A5A5A">rappelle un autre outil, etc. Tokens par tâche × 50.</text>

    <text x="600" y="640" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Parade</text>
    <text x="600" y="658" class="body" font-size="10.5" fill="#5A5A5A">Plafond de tours, plafond de tokens par session, compaction</text>
    <text x="600" y="674" class="body" font-size="10.5" fill="#5A5A5A">agentique, modèles plus petits sur les étapes routinières.</text>
  </g>

  <!-- Source -->
  <text x="60" y="772" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Sources : Braintrust « Agent Observability Guide 2026 » ; Mem0 « State of AI Agent Memory 2026 » ; Knowlee « Agent Orchestration 2026 » ; AWS AgentCore docs.</text>
</svg>
