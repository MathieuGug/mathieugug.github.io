<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 01 · GLISSEMENT 2023 → 2026</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">Du <tspan font-style="italic">chat</tspan> au <tspan font-style="italic">système</tspan>.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Chaque palier ajoute une couche que l'application doit désormais gérer — et que quelqu'un doit orchestrer.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Time axis -->
  <line x1="100" y1="700" x2="1140" y2="700" stroke="#1A1A1A" stroke-width="1.5"/>
  <text x="100" y="730" class="mono" font-size="12" fill="#5A5A5A">2023</text>
  <text x="360" y="730" class="mono" font-size="12" fill="#5A5A5A">2024</text>
  <text x="620" y="730" class="mono" font-size="12" fill="#5A5A5A">2025</text>
  <text x="900" y="730" class="mono" font-size="12" fill="#5A5A5A">2026</text>

  <!-- Tick marks -->
  <line x1="100" y1="695" x2="100" y2="705" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="360" y1="695" x2="360" y2="705" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="620" y1="695" x2="620" y2="705" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="900" y1="695" x2="900" y2="705" stroke="#1A1A1A" stroke-width="1.5"/>

  <!-- Column 2023 : Chat -->
  <g class="interactive" data-card="era-chat" tabindex="0" role="button" aria-label="Ère du chat — 2023">
    <rect x="60" y="540" width="240" height="120" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="568" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">L'ÈRE DU CHAT</text>
    <text x="80" y="598" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Un appel, une réponse.</text>
    <text x="80" y="624" class="body" font-size="11.5" fill="#5A5A5A">L'app envoie un prompt,</text>
    <text x="80" y="640" class="body" font-size="11.5" fill="#5A5A5A">reçoit du texte. Pas de boucle.</text>
  </g>

  <!-- Column 2024 : Tool calling -->
  <g class="interactive" data-card="era-tools" tabindex="0" role="button" aria-label="Ère du tool calling — 2024">
    <rect x="320" y="480" width="240" height="180" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="340" y="508" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">+ TOOL CALLING</text>
    <text x="340" y="538" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Le modèle agit.</text>
    <text x="340" y="562" class="body" font-size="11.5" fill="#5A5A5A">Function calling. JSON schemas.</text>
    <text x="340" y="578" class="body" font-size="11.5" fill="#5A5A5A">L'app exécute, renvoie le résultat,</text>
    <text x="340" y="594" class="body" font-size="11.5" fill="#5A5A5A">rappelle le modèle.</text>
    <text x="340" y="624" class="mono" font-size="10.5" font-style="italic" fill="#1F5560">→ première boucle.</text>
    <text x="340" y="640" class="mono" font-size="10.5" font-style="italic" fill="#1F5560">L'app reste pilote.</text>
  </g>

  <!-- Column 2025 : Agents -->
  <g class="interactive" data-card="era-agents" tabindex="0" role="button" aria-label="Ère des agents — 2025">
    <rect x="580" y="380" width="280" height="280" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="600" y="408" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">+ BOUCLE AGENTIQUE</text>
    <text x="600" y="438" class="display" font-size="16" font-weight="600" fill="#1A1A1A">L'agent décide.</text>
    <text x="600" y="462" class="body" font-size="11.5" fill="#5A5A5A">Le modèle décide quel outil</text>
    <text x="600" y="478" class="body" font-size="11.5" fill="#5A5A5A">appeler, quand s'arrêter,</text>
    <text x="600" y="494" class="body" font-size="11.5" fill="#5A5A5A">comment retenir l'état.</text>
    <text x="600" y="524" class="mono" font-size="10.5" font-style="italic" fill="#1F5560">+ Mémoire de travail</text>
    <text x="600" y="540" class="mono" font-size="10.5" font-style="italic" fill="#1F5560">+ Sub-agents</text>
    <text x="600" y="556" class="mono" font-size="10.5" font-style="italic" fill="#1F5560">+ Hand-off entre rôles</text>
    <text x="600" y="586" class="body" font-size="11" fill="#1A1A1A">Claude Code, Cursor, Devin, Sierra :</text>
    <text x="600" y="602" class="body" font-size="11" fill="#1A1A1A">les agents partent en prod.</text>
    <text x="600" y="632" class="mono" font-size="10" font-style="italic" fill="#B58A2C">Anthropic publie « Building</text>
    <text x="600" y="646" class="mono" font-size="10" font-style="italic" fill="#B58A2C">effective agents » (déc. 2024)</text>
  </g>

  <!-- Column 2026 : Orchestration -->
  <g class="interactive" data-card="era-orchestration" tabindex="0" role="button" aria-label="Ère de l'orchestration — 2026">
    <rect x="880" y="240" width="280" height="420" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <text x="900" y="268" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">+ ORCHESTRATION</text>
    <text x="900" y="298" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Qui pilote la boucle ?</text>
    <text x="900" y="322" class="body" font-size="11.5" fill="#5A5A5A">Plusieurs agents, plusieurs sessions,</text>
    <text x="900" y="338" class="body" font-size="11.5" fill="#5A5A5A">plusieurs jours d'exécution.</text>
    <text x="900" y="354" class="body" font-size="11.5" fill="#5A5A5A">L'orchestrateur devient une couche</text>
    <text x="900" y="370" class="body" font-size="11.5" fill="#5A5A5A">à part entière.</text>
    <text x="900" y="400" class="mono" font-size="10.5" font-style="italic" fill="#1F5560">+ Runtime managé (sessions,</text>
    <text x="900" y="416" class="mono" font-size="10.5" font-style="italic" fill="#1F5560">  isolation, durabilité 8 h)</text>
    <text x="900" y="438" class="mono" font-size="10.5" font-style="italic" fill="#1F5560">+ Mémoire partagée</text>
    <text x="900" y="460" class="mono" font-size="10.5" font-style="italic" fill="#1F5560">+ Identité déléguée</text>
    <text x="900" y="482" class="mono" font-size="10.5" font-style="italic" fill="#1F5560">+ Observabilité bout-en-bout</text>
    <text x="900" y="504" class="mono" font-size="10.5" font-style="italic" fill="#1F5560">+ Protocoles d'inter-op (A2A, MCP)</text>
    <text x="900" y="540" class="body" font-size="11" fill="#1A1A1A">AWS AgentCore (GA oct. 2025),</text>
    <text x="900" y="556" class="body" font-size="11" fill="#1A1A1A">Vertex Agent Engine, Azure Foundry,</text>
    <text x="900" y="572" class="body" font-size="11" fill="#1A1A1A">MS Agent Framework v1 (avr. 2026)</text>
    <text x="900" y="602" class="mono" font-size="10" font-style="italic" fill="#B58A2C">A2A : 150+ orgs sous Linux Foundation.</text>
    <text x="900" y="618" class="mono" font-size="10" font-style="italic" fill="#B58A2C">Google ADK : 7 M downloads (Q1 2026).</text>
  </g>

  <!-- Layer labels on the left -->
  <text x="60" y="200" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A">COUCHES AJOUTÉES</text>

  <text x="60" y="260" class="body" font-size="11" fill="#1A1A1A" font-weight="500">Plan de contrôle</text>
  <line x1="60" y1="272" x2="200" y2="272" stroke="#B7332C" stroke-width="2.5"/>
  <text x="60" y="288" class="body" font-size="10" fill="#5A5A5A">qui orchestre quoi, quand</text>

  <text x="60" y="330" class="body" font-size="11" fill="#1A1A1A" font-weight="500">Plan de données</text>
  <line x1="60" y1="342" x2="200" y2="342" stroke="#1F5560" stroke-width="2.5"/>
  <text x="60" y="358" class="body" font-size="10" fill="#5A5A5A">mémoire, état, sessions</text>

  <text x="60" y="400" class="body" font-size="11" fill="#1A1A1A" font-weight="500">Plan d'exécution</text>
  <line x1="60" y1="412" x2="200" y2="412" stroke="#5A5A5A" stroke-width="2.5"/>
  <text x="60" y="428" class="body" font-size="10" fill="#5A5A5A">isolation, sandbox, retry</text>

  <text x="60" y="470" class="body" font-size="11" fill="#1A1A1A" font-weight="500">Plan d'inférence</text>
  <line x1="60" y1="482" x2="200" y2="482" stroke="#B58A2C" stroke-width="2.5"/>
  <text x="60" y="498" class="body" font-size="10" fill="#5A5A5A">le modèle lui-même</text>

  <!-- Stacking arrow from chat box up to 2026 -->
  <path d="M 220 540 Q 220 250 870 250" fill="none" stroke="#B7332C" stroke-width="1.5" stroke-dasharray="3 4" marker-end="url(#arr01)" opacity="0.55"/>
  <text x="400" y="240" class="mono" font-size="10.5" font-style="italic" fill="#B7332C">Chaque palier conserve les précédents et en ajoute un.</text>

  <!-- Source -->
  <text x="60" y="772" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Sources : Anthropic, OpenAI, AWS, Google Cloud, Microsoft (annonces et docs 2023–2026).</text>
</svg>
