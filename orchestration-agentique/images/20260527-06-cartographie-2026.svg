<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 06 · CARTOGRAPHIE 2026</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">Qui propose <tspan font-style="italic">quoi</tspan>, à quelle couche.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Le marché s'est structuré en quatre bandes : ADK ouverts, ADK vendeurs, runtimes managés, produits verticaux. Deux protocoles relient le tout.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Bande 1 : ADK ouverts -->
  <g class="interactive" data-card="band-open-adk" tabindex="0" role="button" aria-label="ADK ouverts">
    <rect x="60" y="190" width="1080" height="110" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="216" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">ADK OUVERTS — INDÉPENDANTS DES FOURNISSEURS DE MODÈLES</text>
    <text x="80" y="240" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Choix par défaut quand on veut éviter le lock-in vendeur.</text>

    <!-- 5 chips -->
    <g>
      <rect x="80" y="252" width="180" height="36" rx="3" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
      <text x="170" y="270" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">LangGraph</text>
      <text x="170" y="284" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">graphe · état durable</text>
    </g>
    <g>
      <rect x="270" y="252" width="180" height="36" rx="3" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
      <text x="360" y="270" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">CrewAI</text>
      <text x="360" y="284" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">rôles · prototypage rapide</text>
    </g>
    <g>
      <rect x="460" y="252" width="180" height="36" rx="3" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
      <text x="550" y="270" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">Mastra</text>
      <text x="550" y="284" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">TypeScript-first · Vercel</text>
    </g>
    <g>
      <rect x="650" y="252" width="180" height="36" rx="3" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
      <text x="740" y="270" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">Pydantic AI</text>
      <text x="740" y="284" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">type-safe · validation</text>
    </g>
    <g>
      <rect x="840" y="252" width="180" height="36" rx="3" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
      <text x="930" y="270" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">LlamaIndex Agents</text>
      <text x="930" y="284" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">RAG-centric</text>
    </g>
  </g>

  <!-- Bande 2 : ADK vendeurs -->
  <g class="interactive" data-card="band-vendor-adk" tabindex="0" role="button" aria-label="ADK vendeurs">
    <rect x="60" y="320" width="1080" height="110" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="346" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">ADK VENDEURS — INTÉGRÉS AVEC UN MODÈLE/CLOUD DE RÉFÉRENCE</text>
    <text x="80" y="370" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Friction minimale si on adhère au socle du vendeur. Production-ready, support officiel.</text>

    <g>
      <rect x="80" y="382" width="220" height="36" rx="3" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
      <text x="190" y="400" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">OpenAI Agents SDK</text>
      <text x="190" y="414" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">handoffs · guardrails · tracing</text>
    </g>
    <g>
      <rect x="310" y="382" width="220" height="36" rx="3" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
      <text x="420" y="400" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">Claude Agent SDK</text>
      <text x="420" y="414" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">extrait de Claude Code · Skills</text>
    </g>
    <g>
      <rect x="540" y="382" width="220" height="36" rx="3" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
      <text x="650" y="400" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">Google ADK</text>
      <text x="650" y="414" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">Py·TS·Go·Java · 7 M dl Q1 2026</text>
    </g>
    <g>
      <rect x="770" y="382" width="250" height="36" rx="3" fill="#F3EEDF" stroke="#1A1A1A" stroke-width="0.75"/>
      <text x="895" y="400" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">Microsoft Agent Framework</text>
      <text x="895" y="414" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">v1 GA avr. 2026 · ex-AutoGen + SK</text>
    </g>
  </g>

  <!-- Bande 3 : Runtimes managés -->
  <g class="interactive" data-card="band-managed-runtime" tabindex="0" role="button" aria-label="Runtimes managés">
    <rect x="60" y="450" width="1080" height="110" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="80" y="476" class="mono" font-size="11" letter-spacing="2" fill="#1F5560">RUNTIMES + PLATEFORMES MANAGÉS — HYPERSCALERS</text>
    <text x="80" y="500" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Couches 2+3 du stack précédent. Vendus comme une suite modulaire.</text>

    <g>
      <rect x="80" y="512" width="320" height="36" rx="3" fill="#F3EEDF" stroke="#1F5560" stroke-width="0.75"/>
      <text x="240" y="530" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">AWS Bedrock AgentCore</text>
      <text x="240" y="544" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">Runtime · Memory · Identity · Gateway · Obs · Code · Browser</text>
    </g>
    <g>
      <rect x="410" y="512" width="320" height="36" rx="3" fill="#F3EEDF" stroke="#1F5560" stroke-width="0.75"/>
      <text x="570" y="530" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">Google Vertex AI Agent Engine</text>
      <text x="570" y="544" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">runtime ADK · Memory Bank · Eval · A2A natif</text>
    </g>
    <g>
      <rect x="740" y="512" width="280" height="36" rx="3" fill="#F3EEDF" stroke="#1F5560" stroke-width="0.75"/>
      <text x="880" y="530" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">Azure AI Foundry Agent Service</text>
      <text x="880" y="544" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">MS Agent Framework + Azure stack</text>
    </g>
  </g>

  <!-- Bande 4 : Produits verticaux -->
  <g class="interactive" data-card="band-vertical" tabindex="0" role="button" aria-label="Produits verticaux">
    <rect x="60" y="580" width="1080" height="110" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="80" y="606" class="mono" font-size="11" letter-spacing="2" fill="#B58A2C">PRODUITS VERTICAUX — UN AGENT POUR UN MÉTIER</text>
    <text x="80" y="630" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Le « buy » dans la décision build-vs-buy. Vendent une UX, un benchmark métier, des intégrations.</text>

    <g>
      <rect x="80" y="642" width="200" height="36" rx="3" fill="#F3EEDF" stroke="#B58A2C" stroke-width="0.75"/>
      <text x="180" y="660" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">Sierra</text>
      <text x="180" y="674" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">support client (Sonos, WW)</text>
    </g>
    <g>
      <rect x="290" y="642" width="200" height="36" rx="3" fill="#F3EEDF" stroke="#B58A2C" stroke-width="0.75"/>
      <text x="390" y="660" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">Harvey</text>
      <text x="390" y="674" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">légal · cabinets d'avocats</text>
    </g>
    <g>
      <rect x="500" y="642" width="200" height="36" rx="3" fill="#F3EEDF" stroke="#B58A2C" stroke-width="0.75"/>
      <text x="600" y="660" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">Devin / Cursor</text>
      <text x="600" y="674" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">ingénierie logicielle</text>
    </g>
    <g>
      <rect x="710" y="642" width="200" height="36" rx="3" fill="#F3EEDF" stroke="#B58A2C" stroke-width="0.75"/>
      <text x="810" y="660" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">Hippocratic</text>
      <text x="810" y="674" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">santé · agents vocaux</text>
    </g>
    <g>
      <rect x="920" y="642" width="200" height="36" rx="3" fill="#F3EEDF" stroke="#B58A2C" stroke-width="0.75"/>
      <text x="1020" y="660" class="body" font-size="11.5" font-weight="500" text-anchor="middle" fill="#1A1A1A">Lindy · EvenUp · …</text>
      <text x="1020" y="674" class="body" font-size="9.5" text-anchor="middle" fill="#5A5A5A">long tail métiers</text>
    </g>
  </g>

  <!-- Protocoles transverses -->
  <g class="interactive" data-card="protocols" tabindex="0" role="button" aria-label="Protocoles MCP et A2A">
    <rect x="60" y="710" width="1080" height="56" rx="3" fill="#F3EEDF" stroke="#B7332C" stroke-width="1.25" stroke-dasharray="4 3"/>
    <text x="80" y="734" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">PROTOCOLES TRANSVERSES — L'INFRASTRUCTURE D'INTER-OP</text>
    <text x="80" y="754" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="500">MCP</tspan> (Model Context Protocol) : agent ↔ outils &#160;·&#160; <tspan font-weight="500">A2A</tspan> (Agent-to-Agent, Linux Foundation) : agent ↔ agent (150+ orgs en avril 2026).</text>
  </g>

  <!-- Source -->
  <text x="60" y="792" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Sources : AgentMarketCap (avr. 2026) ; Google Cloud (Cloud Next 2026) ; Stellagent A2A tracker ; MightyBot market map.</text>
</svg>
