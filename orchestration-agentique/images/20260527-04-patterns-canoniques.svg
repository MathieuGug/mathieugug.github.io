<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', monospace; }
      .node    { fill: #FAF8F3; stroke: #1A1A1A; stroke-width: 1; }
      .acc     { fill: #FAF8F3; stroke: #B7332C; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 04 · BIBLIOTHÈQUE</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">Huit patterns canoniques, deux familles.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">En haut : les cinq workflows d'Anthropic. En bas : trois topologies multi-agents.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Row label : workflows -->
  <text x="60" y="200" class="mono" font-size="10.5" letter-spacing="2" fill="#1F5560">FAMILLE 1 — WORKFLOWS DÉTERMINISTES (Anthropic, déc. 2024)</text>

  <!-- P1 : Chaining -->
  <g class="interactive" data-card="pat-chaining" tabindex="0" role="button" aria-label="Pattern : Chaining">
    <rect x="60" y="220" width="200" height="200" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="246" class="mono" font-size="10" letter-spacing="1.5" fill="#B7332C">1 · CHAINING</text>
    <text x="80" y="266" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Prompt → prompt</text>
    <!-- mini diagram -->
    <rect x="80" y="284" width="40" height="24" rx="2" class="node"/>
    <text x="100" y="300" class="body" font-size="9.5" text-anchor="middle" fill="#1A1A1A">LLM</text>
    <line x1="120" y1="296" x2="148" y2="296" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arr04)"/>
    <rect x="150" y="284" width="40" height="24" rx="2" class="node"/>
    <text x="170" y="300" class="body" font-size="9.5" text-anchor="middle" fill="#1A1A1A">LLM</text>
    <line x1="190" y1="296" x2="218" y2="296" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arr04)"/>
    <rect x="220" y="284" width="20" height="24" rx="2" class="node"/>
    <text x="80" y="346" class="body" font-size="10" fill="#5A5A5A">Sortie d'un prompt</text>
    <text x="80" y="360" class="body" font-size="10" fill="#5A5A5A">= entrée du suivant.</text>
    <text x="80" y="384" class="mono" font-size="9" font-style="italic" fill="#B58A2C">Ex. brouillon →</text>
    <text x="80" y="398" class="mono" font-size="9" font-style="italic" fill="#B58A2C">  édition → résumé.</text>
  </g>

  <!-- P2 : Routing -->
  <g class="interactive" data-card="pat-routing" tabindex="0" role="button" aria-label="Pattern : Routing">
    <rect x="280" y="220" width="200" height="200" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="300" y="246" class="mono" font-size="10" letter-spacing="1.5" fill="#B7332C">2 · ROUTING</text>
    <text x="300" y="266" class="display" font-size="13" font-weight="600" fill="#1A1A1A">LLM-routeur</text>
    <!-- diagram -->
    <rect x="300" y="284" width="40" height="24" rx="2" class="node"/>
    <text x="320" y="300" class="body" font-size="9.5" text-anchor="middle" fill="#1A1A1A">LLM</text>
    <path d="M 340 296 L 380 280" stroke="#1A1A1A" stroke-width="1" fill="none" marker-end="url(#arr04)"/>
    <path d="M 340 296 L 380 296" stroke="#1A1A1A" stroke-width="1" fill="none" marker-end="url(#arr04)"/>
    <path d="M 340 296 L 380 312" stroke="#1A1A1A" stroke-width="1" fill="none" marker-end="url(#arr04)"/>
    <rect x="382" y="270" width="40" height="14" rx="2" class="node"/>
    <text x="402" y="280" class="body" font-size="8" text-anchor="middle" fill="#1A1A1A">Haiku</text>
    <rect x="382" y="289" width="40" height="14" rx="2" class="node"/>
    <text x="402" y="299" class="body" font-size="8" text-anchor="middle" fill="#1A1A1A">Sonnet</text>
    <rect x="382" y="308" width="40" height="14" rx="2" class="node"/>
    <text x="402" y="318" class="body" font-size="8" text-anchor="middle" fill="#1A1A1A">Opus</text>
    <text x="300" y="346" class="body" font-size="10" fill="#5A5A5A">Un premier LLM choisit</text>
    <text x="300" y="360" class="body" font-size="10" fill="#5A5A5A">le bon modèle / la suite.</text>
    <text x="300" y="384" class="mono" font-size="9" font-style="italic" fill="#B58A2C">Ex. faciles → Haiku,</text>
    <text x="300" y="398" class="mono" font-size="9" font-style="italic" fill="#B58A2C">  durs → Opus.</text>
  </g>

  <!-- P3 : Parallelization -->
  <g class="interactive" data-card="pat-parallel" tabindex="0" role="button" aria-label="Pattern : Parallelization">
    <rect x="500" y="220" width="200" height="200" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="520" y="246" class="mono" font-size="10" letter-spacing="1.5" fill="#B7332C">3 · PARALLELIZATION</text>
    <text x="520" y="266" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Concurrent + agrégé</text>
    <!-- diagram -->
    <rect x="520" y="278" width="20" height="14" rx="2" class="node"/>
    <path d="M 540 285 L 568 268" stroke="#1A1A1A" stroke-width="1" fill="none"/>
    <path d="M 540 285 L 568 285" stroke="#1A1A1A" stroke-width="1" fill="none"/>
    <path d="M 540 285 L 568 302" stroke="#1A1A1A" stroke-width="1" fill="none"/>
    <rect x="570" y="262" width="36" height="14" rx="2" class="node"/>
    <text x="588" y="272" class="body" font-size="8" text-anchor="middle">LLM</text>
    <rect x="570" y="279" width="36" height="14" rx="2" class="node"/>
    <text x="588" y="289" class="body" font-size="8" text-anchor="middle">LLM</text>
    <rect x="570" y="296" width="36" height="14" rx="2" class="node"/>
    <text x="588" y="306" class="body" font-size="8" text-anchor="middle">LLM</text>
    <path d="M 606 269 L 640 285" stroke="#1A1A1A" stroke-width="1" fill="none"/>
    <path d="M 606 286 L 640 286" stroke="#1A1A1A" stroke-width="1" fill="none"/>
    <path d="M 606 303 L 640 287" stroke="#1A1A1A" stroke-width="1" fill="none"/>
    <rect x="640" y="278" width="36" height="14" rx="2" class="acc"/>
    <text x="658" y="288" class="body" font-size="8" text-anchor="middle" fill="#B7332C">agg</text>
    <text x="520" y="340" class="body" font-size="10" fill="#5A5A5A">Voting (même tâche, n fois)</text>
    <text x="520" y="354" class="body" font-size="10" fill="#5A5A5A">ou sectioning (sous-tâches</text>
    <text x="520" y="368" class="body" font-size="10" fill="#5A5A5A">indépendantes).</text>
    <text x="520" y="392" class="mono" font-size="9" font-style="italic" fill="#B58A2C">Ex. modération sur 3 axes</text>
    <text x="520" y="406" class="mono" font-size="9" font-style="italic" fill="#B58A2C">en parallèle.</text>
  </g>

  <!-- P4 : Orchestrator-workers -->
  <g class="interactive" data-card="pat-orch-workers" tabindex="0" role="button" aria-label="Pattern : Orchestrator-Workers">
    <rect x="720" y="220" width="200" height="200" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="740" y="246" class="mono" font-size="10" letter-spacing="1.5" fill="#B7332C">4 · ORCHESTRATOR-WORKERS</text>
    <text x="740" y="266" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Décompose à la volée</text>
    <!-- diagram -->
    <rect x="800" y="290" width="40" height="22" rx="2" class="acc"/>
    <text x="820" y="305" class="body" font-size="9" text-anchor="middle" fill="#B7332C">orch.</text>
    <path d="M 800 301 L 760 284" stroke="#1A1A1A" stroke-width="1" fill="none" marker-end="url(#arr04)"/>
    <path d="M 800 301 L 760 316" stroke="#1A1A1A" stroke-width="1" fill="none" marker-end="url(#arr04)"/>
    <path d="M 840 301 L 880 284" stroke="#1A1A1A" stroke-width="1" fill="none" marker-end="url(#arr04)"/>
    <path d="M 840 301 L 880 316" stroke="#1A1A1A" stroke-width="1" fill="none" marker-end="url(#arr04)"/>
    <rect x="734" y="276" width="26" height="14" rx="2" class="node"/>
    <rect x="734" y="310" width="26" height="14" rx="2" class="node"/>
    <rect x="880" y="276" width="26" height="14" rx="2" class="node"/>
    <rect x="880" y="310" width="26" height="14" rx="2" class="node"/>
    <text x="740" y="346" class="body" font-size="10" fill="#5A5A5A">Sous-tâches non connues</text>
    <text x="740" y="360" class="body" font-size="10" fill="#5A5A5A">à l'avance. L'orch. les</text>
    <text x="740" y="374" class="body" font-size="10" fill="#5A5A5A">crée et fusionne.</text>
    <text x="740" y="398" class="mono" font-size="9" font-style="italic" fill="#B58A2C">Ex. Claude Code éditant</text>
    <text x="740" y="412" class="mono" font-size="9" font-style="italic" fill="#B58A2C">plusieurs fichiers.</text>
  </g>

  <!-- P5 : Evaluator-Optimizer -->
  <g class="interactive" data-card="pat-eval-opt" tabindex="0" role="button" aria-label="Pattern : Evaluator-Optimizer">
    <rect x="940" y="220" width="200" height="200" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="960" y="246" class="mono" font-size="10" letter-spacing="1.5" fill="#B7332C">5 · EVALUATOR-OPTIMIZER</text>
    <text x="960" y="266" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Boucle de critique</text>
    <!-- diagram -->
    <rect x="960" y="278" width="44" height="20" rx="2" class="node"/>
    <text x="982" y="291" class="body" font-size="9" text-anchor="middle">gen.</text>
    <path d="M 1004 288 L 1036 288" stroke="#1A1A1A" stroke-width="1" fill="none" marker-end="url(#arr04)"/>
    <rect x="1038" y="278" width="56" height="20" rx="2" class="acc"/>
    <text x="1066" y="291" class="body" font-size="9" text-anchor="middle" fill="#B7332C">judge</text>
    <path d="M 1066 298 Q 1066 322 982 322 Q 940 322 940 300 L 956 300" stroke="#1A1A1A" stroke-width="1" fill="none" marker-end="url(#arr04)"/>
    <text x="1006" y="338" class="body" font-size="8.5" text-anchor="middle" fill="#5A5A5A">retry until pass</text>
    <text x="960" y="362" class="body" font-size="10" fill="#5A5A5A">Un LLM génère, un autre</text>
    <text x="960" y="376" class="body" font-size="10" fill="#5A5A5A">évalue. Itère jusqu'à passer.</text>
    <text x="960" y="400" class="mono" font-size="9" font-style="italic" fill="#B58A2C">Ex. traduction itérative,</text>
    <text x="960" y="414" class="mono" font-size="9" font-style="italic" fill="#B58A2C">code + lint loop.</text>
  </g>

  <!-- Row label : multi-agent topologies -->
  <text x="60" y="466" class="mono" font-size="10.5" letter-spacing="2" fill="#1F5560">FAMILLE 2 — TOPOLOGIES MULTI-AGENTS</text>

  <!-- P6 : Supervisor-Workers -->
  <g class="interactive" data-card="top-supervisor" tabindex="0" role="button" aria-label="Topologie : Supervisor-Workers">
    <rect x="60" y="486" width="280" height="220" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="512" class="mono" font-size="10" letter-spacing="1.5" fill="#B7332C">6 · SUPERVISOR-WORKERS</text>
    <text x="80" y="532" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Un patron, n exécutants</text>
    <!-- diagram -->
    <rect x="170" y="548" width="60" height="22" rx="2" class="acc"/>
    <text x="200" y="563" class="body" font-size="9" text-anchor="middle" fill="#B7332C">supervisor</text>
    <path d="M 180 570 L 100 600" stroke="#1A1A1A" stroke-width="1" fill="none" marker-end="url(#arr04)"/>
    <path d="M 200 570 L 200 600" stroke="#1A1A1A" stroke-width="1" fill="none" marker-end="url(#arr04)"/>
    <path d="M 220 570 L 300 600" stroke="#1A1A1A" stroke-width="1" fill="none" marker-end="url(#arr04)"/>
    <rect x="80" y="604" width="44" height="18" rx="2" class="node"/>
    <text x="102" y="616" class="body" font-size="9" text-anchor="middle">research</text>
    <rect x="180" y="604" width="40" height="18" rx="2" class="node"/>
    <text x="200" y="616" class="body" font-size="9" text-anchor="middle">draft</text>
    <rect x="276" y="604" width="44" height="18" rx="2" class="node"/>
    <text x="298" y="616" class="body" font-size="9" text-anchor="middle">verify</text>
    <text x="80" y="652" class="body" font-size="10" fill="#5A5A5A">Variante explicite du pattern 4.</text>
    <text x="80" y="668" class="body" font-size="10" fill="#5A5A5A">Les workers sont des agents</text>
    <text x="80" y="682" class="body" font-size="10" fill="#5A5A5A">distincts, le superviseur planifie.</text>
    <text x="80" y="700" class="mono" font-size="9" font-style="italic" fill="#B58A2C">Ex. Sierra dispatch CRM/refund/escalation.</text>
  </g>

  <!-- P7 : Hierarchical -->
  <g class="interactive" data-card="top-hierarchical" tabindex="0" role="button" aria-label="Topologie : Hierarchical">
    <rect x="360" y="486" width="280" height="220" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="380" y="512" class="mono" font-size="10" letter-spacing="1.5" fill="#B7332C">7 · HIERARCHICAL</text>
    <text x="380" y="532" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Manager de managers</text>
    <!-- diagram -->
    <rect x="480" y="548" width="40" height="18" rx="2" class="acc"/>
    <text x="500" y="560" class="body" font-size="9" text-anchor="middle" fill="#B7332C">CEO</text>
    <path d="M 490 566 L 440 586" stroke="#1A1A1A" stroke-width="1" fill="none"/>
    <path d="M 510 566 L 560 586" stroke="#1A1A1A" stroke-width="1" fill="none"/>
    <rect x="420" y="588" width="44" height="16" rx="2" class="node"/>
    <text x="442" y="599" class="body" font-size="8.5" text-anchor="middle">mgr A</text>
    <rect x="538" y="588" width="44" height="16" rx="2" class="node"/>
    <text x="560" y="599" class="body" font-size="8.5" text-anchor="middle">mgr B</text>
    <path d="M 430 604 L 410 624" stroke="#1A1A1A" stroke-width="1" fill="none"/>
    <path d="M 454 604 L 474 624" stroke="#1A1A1A" stroke-width="1" fill="none"/>
    <path d="M 548 604 L 528 624" stroke="#1A1A1A" stroke-width="1" fill="none"/>
    <path d="M 572 604 L 592 624" stroke="#1A1A1A" stroke-width="1" fill="none"/>
    <rect x="394" y="626" width="32" height="14" rx="2" class="node"/>
    <rect x="458" y="626" width="32" height="14" rx="2" class="node"/>
    <rect x="512" y="626" width="32" height="14" rx="2" class="node"/>
    <rect x="576" y="626" width="32" height="14" rx="2" class="node"/>
    <text x="380" y="666" class="body" font-size="10" fill="#5A5A5A">L'arbre se prolonge.</text>
    <text x="380" y="680" class="body" font-size="10" fill="#5A5A5A">Permet de borner le contexte</text>
    <text x="380" y="694" class="body" font-size="10" fill="#5A5A5A">de chaque agent.</text>
    <text x="380" y="700" class="mono" font-size="9" font-style="italic" fill="#B58A2C"></text>
  </g>

  <!-- P8 : Peer-to-peer -->
  <g class="interactive" data-card="top-peer" tabindex="0" role="button" aria-label="Topologie : Peer-to-peer">
    <rect x="660" y="486" width="280" height="220" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="680" y="512" class="mono" font-size="10" letter-spacing="1.5" fill="#B7332C">8 · PEER-TO-PEER</text>
    <text x="680" y="532" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Conversation égalitaire</text>
    <!-- diagram : 4 nodes en cercle, échanges -->
    <circle cx="800" cy="600" r="60" fill="none" stroke="#E5E1D8" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="800" cy="540" r="14" class="node"/>
    <circle cx="860" cy="600" r="14" class="node"/>
    <circle cx="800" cy="660" r="14" class="node"/>
    <circle cx="740" cy="600" r="14" class="node"/>
    <text x="800" y="544" class="body" font-size="8" text-anchor="middle">A1</text>
    <text x="860" y="604" class="body" font-size="8" text-anchor="middle">A2</text>
    <text x="800" y="664" class="body" font-size="8" text-anchor="middle">A3</text>
    <text x="740" y="604" class="body" font-size="8" text-anchor="middle">A4</text>
    <line x1="814" y1="540" x2="846" y2="600" stroke="#1A1A1A" stroke-width="0.75"/>
    <line x1="860" y1="586" x2="800" y2="646" stroke="#1A1A1A" stroke-width="0.75"/>
    <line x1="800" y1="554" x2="800" y2="646" stroke="#1A1A1A" stroke-width="0.75"/>
    <line x1="786" y1="540" x2="754" y2="600" stroke="#1A1A1A" stroke-width="0.75"/>
    <text x="680" y="690" class="body" font-size="10" fill="#5A5A5A">Topologie de conversation</text>
    <text x="680" y="704" class="body" font-size="10" fill="#5A5A5A">(AutoGen, MS Agent Framework).</text>
  </g>

  <!-- Right side : meta-pattern note -->
  <g class="interactive" data-card="meta-composition" tabindex="0" role="button" aria-label="Compositions">
    <rect x="960" y="486" width="180" height="220" rx="3" fill="#F3EEDF" stroke="#B7332C" stroke-width="1.25"/>
    <text x="980" y="512" class="mono" font-size="10" letter-spacing="1.5" fill="#B7332C">META-PATTERN</text>
    <text x="980" y="532" class="display" font-size="14" font-weight="600" fill="#1A1A1A">On compose.</text>
    <text x="980" y="558" class="body" font-size="10.5" fill="#1A1A1A">Aucun pattern ne suffit seul.</text>
    <text x="980" y="572" class="body" font-size="10.5" fill="#1A1A1A">Les systèmes réels enchaînent</text>
    <text x="980" y="586" class="body" font-size="10.5" fill="#1A1A1A">routing → orchestrator-workers</text>
    <text x="980" y="600" class="body" font-size="10.5" fill="#1A1A1A">→ evaluator-optimizer.</text>
    <text x="980" y="630" class="mono" font-size="9.5" font-style="italic" fill="#B58A2C">« Simple, composable</text>
    <text x="980" y="644" class="mono" font-size="9.5" font-style="italic" fill="#B58A2C">patterns rather than</text>
    <text x="980" y="658" class="mono" font-size="9.5" font-style="italic" fill="#B58A2C">complex frameworks. »</text>
    <text x="980" y="688" class="body" font-size="9.5" fill="#5A5A5A">Anthropic, déc. 2024</text>
  </g>

  <!-- Source -->
  <text x="60" y="772" class="body" font-size="10" font-style="italic" letter-spacing="0.4" fill="#5A5A5A">Sources : Anthropic, « Building Effective Agents » (déc. 2024) ; Knowlee, « AI Agent Orchestration Guide 2026 » (mai 2026).</text>
</svg>
