<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    text { fill: #1A1A1A; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="98" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em">Throughput n'est pas goodput</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Le débit brut monte ; le débit utile sous SLO s'effondre au knee</text>
  <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Axes -->
  <line x1="160" y1="620" x2="1100" y2="620" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="160" y1="620" x2="160" y2="190" stroke="#5A5A5A" stroke-width="1"/>
  <text x="120" y="400" class="body" font-size="13" fill="#5A5A5A" transform="rotate(-90 120 400)" text-anchor="middle">débit (req/s)</text>
  <text x="620" y="654" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle">charge offerte →</text>

  <!-- Throughput curve -->
  <g class="interactive" data-card="throughput-curve" tabindex="0" role="button" aria-label="Courbe de throughput — détails">
    <path d="M160 612 C 340 380 540 300 760 276 C 900 262 1000 260 1080 260" fill="none" stroke="#B8B5AE" stroke-width="2.5"/>
    <rect x="828" y="232" width="150" height="26" rx="3" fill="#FAF8F3"/>
    <text x="836" y="251" class="body" font-size="14" font-weight="500" fill="#5A5A5A">throughput brut</text>
  </g>

  <!-- Goodput disagg -->
  <g class="interactive" data-card="disagg-gain" tabindex="0" role="button" aria-label="Gain de la désagrégation — détails">
    <path d="M160 612 C 340 400 600 308 820 296 C 880 292 920 360 980 460 C 1030 540 1060 575 1080 582" fill="none" stroke="#1F5560" stroke-width="2.5"/>
    <circle cx="820" cy="296" r="7" fill="#1F5560"/>
    <rect x="700" y="244" width="232" height="26" rx="3" fill="#FAF8F3"/>
    <text x="708" y="263" class="body" font-size="14" font-weight="500" fill="#1F5560">goodput — désagrégé</text>
    <!-- gain arrow between knees -->
    <line x1="548" y1="690" x2="812" y2="690" stroke="#1F5560" stroke-width="2" marker-end="url(#arrG)"/>
    <text x="680" y="682" class="body" font-size="13" fill="#1F5560" text-anchor="middle">knee repoussé</text>
    <text x="680" y="716" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle">= jusqu'à 7,4× plus de requêtes sous SLO (DistServe)</text>
  </g>

  <!-- Goodput colocation -->
  <g class="interactive" data-card="goodput-curve" tabindex="0" role="button" aria-label="Courbe de goodput — détails">
    <path d="M160 612 C 320 410 460 330 540 322 C 600 316 650 440 720 520 C 800 596 960 606 1080 606" fill="none" stroke="#B7332C" stroke-width="2.5"/>
    <rect x="300" y="356" width="232" height="26" rx="3" fill="#FAF8F3"/>
    <text x="308" y="375" class="body" font-size="14" font-weight="500" fill="#B7332C">goodput — colocation</text>
  </g>

  <!-- SLO knee -->
  <g class="interactive" data-card="slo-knee" tabindex="0" role="button" aria-label="Knee SLO — détails">
    <circle cx="540" cy="322" r="7" fill="#B7332C"/>
    <line x1="540" y1="322" x2="540" y2="620" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="3 3"/>
    <line x1="820" y1="296" x2="820" y2="620" stroke="#1F5560" stroke-width="0.75" stroke-dasharray="3 3"/>
    <text x="540" y="312" class="body" font-size="12" fill="#B7332C" text-anchor="middle">knee colocation</text>
    <text x="826" y="286" class="body" font-size="12" fill="#1F5560">knee désagrégé</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="744" x2="1140" y2="744" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Goodput = req/s respectant tous les SLO (TTFT + TBT). Source : DistServe (OSDI 2024) ; Hao AI Lab. Schéma : Mathieu Guglielmino.</text>

  <defs>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#1F5560"/></marker>
  </defs>
</svg>
