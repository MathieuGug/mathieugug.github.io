<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive:hover .hot { fill-opacity: 0.16; }
    </style>
    <marker id="ar02" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="820" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">L'interférence et les deux écoles</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Le batch mixte gèle les générations — chunked prefill ou désagrégation y répondent</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- A — THE STALL -->
  <text x="60" y="180" class="mono" font-size="12" letter-spacing="0.14em" fill="#1A1A1A" font-weight="600">A · BATCH MIXTE (continuous batching)</text>
  <g class="interactive" data-card="stall" tabindex="0" role="button" aria-label="Le generation stall">
    <rect class="hot" x="60" y="196" width="1080" height="130" fill="#B7332C" fill-opacity="0.05" rx="4"/>
    <!-- decode token ticks before -->
    <line x1="90" y1="240" x2="430" y2="240" stroke="#1F5560" stroke-width="2"/>
    <rect x="100" y="232" width="6" height="16" fill="#1F5560"/>
    <rect x="160" y="232" width="6" height="16" fill="#1F5560"/>
    <rect x="220" y="232" width="6" height="16" fill="#1F5560"/>
    <rect x="280" y="232" width="6" height="16" fill="#1F5560"/>
    <rect x="340" y="232" width="6" height="16" fill="#1F5560"/>
    <rect x="400" y="232" width="6" height="16" fill="#1F5560"/>
    <text x="100" y="222" class="mono" font-size="10" fill="#1F5560">decode fluide</text>
    <!-- long prefill block inserted -->
    <rect x="430" y="220" width="230" height="40" rx="3" fill="#B7332C"/>
    <text x="545" y="244" class="mono" font-size="12" font-weight="600" fill="#FAF8F3" text-anchor="middle">PREFILL long (prompt entrant)</text>
    <!-- gap then resumed decode -->
    <line x1="660" y1="240" x2="1110" y2="240" stroke="#1F5560" stroke-width="2" stroke-dasharray="2 6"/>
    <rect x="700" y="232" width="6" height="16" fill="#1F5560"/>
    <rect x="760" y="232" width="6" height="16" fill="#1F5560"/>
    <rect x="820" y="232" width="6" height="16" fill="#1F5560"/>
    <!-- stall bracket -->
    <path d="M430 290 L430 300 L660 300 L660 290" fill="none" stroke="#B7332C" stroke-width="1.5"/>
    <text x="545" y="318" class="body" font-size="13" font-weight="600" fill="#B7332C" text-anchor="middle">generation stall — pic d'ITL pour tout le batch</text>
  </g>

  <!-- divider -->
  <text x="600" y="370" class="display" font-size="17" font-style="italic" fill="#1A1A1A" text-anchor="middle">Deux écoles répondent à l'interférence</text>
  <line x1="600" y1="386" x2="600" y2="760" stroke="#E5E1D8" stroke-width="1"/>

  <!-- B — CHUNKED PREFILL -->
  <g class="interactive" data-card="chunked" tabindex="0" role="button" aria-label="École co-localisée — chunked prefill">
    <rect class="hot" x="60" y="404" width="500" height="330" rx="6" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.2"/>
    <text x="84" y="438" class="mono" font-size="11" letter-spacing="0.12em" font-weight="600" fill="#1F5560">CO-LOCALISÉ · Sarathi-Serve</text>
    <text x="84" y="470" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Chunked prefill</text>
    <text x="84" y="496" class="body" font-size="14" fill="#5A5A5A">Le prompt est découpé en morceaux de taille</text>
    <text x="84" y="516" class="body" font-size="14" fill="#5A5A5A">fixe, cousus à beaucoup de decodes.</text>
    <!-- mini timeline: small prefill chunks interleaved -->
    <line x1="84" y1="580" x2="536" y2="580" stroke="#1F5560" stroke-width="2"/>
    <rect x="100" y="570" width="20" height="20" fill="#B7332C" opacity="0.85"/>
    <rect x="140" y="572" width="6" height="16" fill="#1F5560"/>
    <rect x="170" y="572" width="6" height="16" fill="#1F5560"/>
    <rect x="200" y="570" width="20" height="20" fill="#B7332C" opacity="0.85"/>
    <rect x="240" y="572" width="6" height="16" fill="#1F5560"/>
    <rect x="270" y="572" width="6" height="16" fill="#1F5560"/>
    <rect x="300" y="570" width="20" height="20" fill="#B7332C" opacity="0.85"/>
    <rect x="340" y="572" width="6" height="16" fill="#1F5560"/>
    <rect x="370" y="572" width="6" height="16" fill="#1F5560"/>
    <rect x="400" y="570" width="20" height="20" fill="#B7332C" opacity="0.85"/>
    <text x="84" y="624" class="mono" font-size="10" fill="#5A5A5A">■ chunk prefill   |  decode</text>
    <text x="84" y="676" class="body" font-size="14" font-weight="600" fill="#1F5560">→ stall-free batching</text>
    <text x="84" y="700" class="body" font-size="13" fill="#5A5A5A">Une seule classe de machines, pas de</text>
    <text x="84" y="718" class="body" font-size="13" fill="#5A5A5A">transfert réseau.</text>
  </g>

  <!-- C — DISAGGREGATION -->
  <g class="interactive" data-card="disagg" tabindex="0" role="button" aria-label="École désagrégée">
    <rect class="hot" x="640" y="404" width="500" height="330" rx="6" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.2"/>
    <text x="664" y="438" class="mono" font-size="11" letter-spacing="0.12em" font-weight="600" fill="#B7332C">DÉSAGRÉGÉ · Splitwise · DistServe</text>
    <text x="664" y="470" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Séparation physique</text>
    <text x="664" y="496" class="body" font-size="14" fill="#5A5A5A">Prefill et decode sur deux pools de GPU</text>
    <text x="664" y="516" class="body" font-size="14" fill="#5A5A5A">distincts. Plus aucune collision possible.</text>
    <!-- two pools -->
    <rect x="664" y="556" width="180" height="58" rx="4" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.4"/>
    <text x="754" y="582" class="body" font-size="13" font-weight="600" fill="#B7332C" text-anchor="middle">pool PREFILL</text>
    <text x="754" y="601" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">compute-dense</text>
    <line x1="846" y1="585" x2="934" y2="585" stroke="#5A5A5A" stroke-width="1.5" marker-end="url(#ar02)"/>
    <text x="890" y="576" class="mono" font-size="9" fill="#5A5A5A" text-anchor="middle">KV cache</text>
    <rect x="936" y="556" width="180" height="58" rx="4" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.4"/>
    <text x="1026" y="582" class="body" font-size="13" font-weight="600" fill="#1F5560" text-anchor="middle">pool DECODE</text>
    <text x="1026" y="601" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">memory-dense</text>
    <text x="664" y="676" class="body" font-size="14" font-weight="600" fill="#B7332C">→ dimensionnement indépendant</text>
    <text x="664" y="700" class="body" font-size="13" fill="#5A5A5A">Le prix : transférer le KV cache sur le</text>
    <text x="664" y="718" class="body" font-size="13" fill="#5A5A5A">réseau (voir schémas 3 et 4).</text>
  </g>

  <!-- METRIC region -->
  <g class="interactive" data-card="metric" tabindex="0" role="button" aria-label="Métrique ITL / TBT">
    <rect class="hot" x="700" y="226" width="410" height="30" fill="#1A1A1A" fill-opacity="0.0"/>
    <text x="1110" y="200" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="end">ITL = temps entre deux tokens (TBT)</text>
  </g>

  <text x="60" y="795" class="body" font-size="13" font-style="italic" fill="#5A5A5A">Le vrai débat de 2026 n'oppose pas la désagrégation au statu quo, mais la désagrégation au chunked prefill. Cliquer une école.</text>
</svg>
