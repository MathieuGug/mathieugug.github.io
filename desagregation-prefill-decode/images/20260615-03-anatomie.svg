<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
    .interactive:hover rect, .interactive:focus rect { stroke-width: 2.5; }
  </style>
  <defs>
    <marker id="arr03" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="80" y="62" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 03</text>
  <text x="80" y="104" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Anatomie d'une pile désagrégée</text>
  <text x="80" y="136" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Deux pools indépendants, un routeur KV-aware, un transport de cache. Le monolithe éclate en organes.</text>
  <line x1="80" y1="158" x2="1120" y2="158" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Client -->
  <rect x="80" y="360" width="110" height="60" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="135" y="388" class="body" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">Requêtes</text>
  <text x="135" y="406" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">prompts</text>

  <!-- Router -->
  <g class="interactive" data-card="kv-router" tabindex="0" role="button" aria-label="Routeur KV-aware">
    <rect x="240" y="345" width="150" height="90" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="315" y="375" class="display" font-size="16" font-weight="600" fill="#B58A2C" text-anchor="middle">Routeur</text>
    <text x="315" y="396" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">KV-aware routing</text>
    <text x="315" y="413" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">recouvrement de cache</text>
    <text x="315" y="428" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">+ charge</text>
  </g>
  <line x1="192" y1="390" x2="232" y2="390" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arr03)"/>

  <!-- Prefill pool -->
  <g class="interactive" data-card="prefill-pool" tabindex="0" role="button" aria-label="Pool prefill">
    <rect x="460" y="250" width="230" height="160" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="575" y="282" class="display" font-size="18" font-weight="600" fill="#B7332C" text-anchor="middle">Pool prefill</text>
    <text x="575" y="304" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">compute-bound</text>
    <rect x="484" y="320" width="80" height="34" rx="2" fill="#B7332C" fill-opacity="0.18"/>
    <rect x="586" y="320" width="80" height="34" rx="2" fill="#B7332C" fill-opacity="0.18"/>
    <rect x="484" y="362" width="80" height="34" rx="2" fill="#B7332C" fill-opacity="0.18"/>
    <rect x="586" y="362" width="80" height="34" rx="2" fill="#B7332C" fill-opacity="0.18"/>
    <text x="575" y="343" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">GPU récents · TP agressif</text>
  </g>
  <line x1="392" y1="390" x2="452" y2="370" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arr03)"/>

  <!-- KV transfer -->
  <g class="interactive" data-card="kv-transfer" tabindex="0" role="button" aria-label="Transfert KV cache">
    <rect x="730" y="345" width="120" height="120" rx="3" fill="#B58A2C" fill-opacity="0.14" stroke="#B58A2C" stroke-width="1.5" stroke-dasharray="2 3"/>
    <text x="790" y="392" class="body" font-size="13" font-weight="600" fill="#B58A2C" text-anchor="middle">Transfert</text>
    <text x="790" y="410" class="body" font-size="13" font-weight="600" fill="#B58A2C" text-anchor="middle">KV cache</text>
    <text x="790" y="432" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">VRAM → VRAM</text>
    <text x="790" y="447" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">NIXL · RDMA</text>
  </g>
  <line x1="692" y1="360" x2="726" y2="385" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arr03)"/>

  <!-- Decode pool -->
  <g class="interactive" data-card="decode-pool" tabindex="0" role="button" aria-label="Pool decode">
    <rect x="890" y="250" width="230" height="160" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="1005" y="282" class="display" font-size="18" font-weight="600" fill="#1F5560" text-anchor="middle">Pool decode</text>
    <text x="1005" y="304" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">memory-bound</text>
    <rect x="914" y="320" width="80" height="34" rx="2" fill="#1F5560" fill-opacity="0.18"/>
    <rect x="1016" y="320" width="80" height="34" rx="2" fill="#1F5560" fill-opacity="0.18"/>
    <rect x="914" y="362" width="80" height="34" rx="2" fill="#1F5560" fill-opacity="0.18"/>
    <rect x="1016" y="362" width="80" height="34" rx="2" fill="#1F5560" fill-opacity="0.18"/>
    <text x="1005" y="343" class="mono" font-size="10" fill="#1F5560" text-anchor="middle">GPU moins chers · gros lot</text>
  </g>
  <line x1="852" y1="405" x2="886" y2="370" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arr03)"/>

  <!-- stream out -->
  <line x1="1005" y1="412" x2="1005" y2="448" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arr03)"/>
  <text x="1005" y="476" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">flux de tokens → utilisateur</text>

  <!-- Autoscale band -->
  <g class="interactive" data-card="autoscale" tabindex="0" role="button" aria-label="Autoscaling séparé">
    <rect x="460" y="520" width="660" height="120" rx="3" fill="#FAF8F3" stroke="#2F5D3F" stroke-width="1.25"/>
    <circle cx="490" cy="550" r="9" fill="#2F5D3F"/>
    <text x="490" y="554" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">⤢</text>
    <text x="512" y="554" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Autoscaling séparé — la vertu structurelle de l'éclatement</text>
    <text x="512" y="582" class="body" font-size="12" fill="#1A1A1A">Trafic riche en prompts longs (RAG) → le pool prefill scale seul.</text>
    <text x="512" y="604" class="body" font-size="12" fill="#1A1A1A">Trafic riche en générations longues (agent) → le pool decode scale seul.</text>
    <text x="512" y="626" class="body" font-size="12" font-style="italic" fill="#2F5D3F">Dans llm-d : deux déploiements K8s distincts, chacun son HPA. Splitwise ajoute un pool mixte élastique.</text>
  </g>

  <line x1="80" y1="724" x2="1120" y2="724" stroke="#E5E1D8" stroke-width="1"/>
  <text x="80" y="752" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : NVIDIA Dynamo (disaggregated serving) ; llm-d, CNCF Sandbox 2026 ; Splitwise, ISCA 2024.</text>
</svg>
