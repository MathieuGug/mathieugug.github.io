<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arr04" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="900" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="96" class="display" font-size="28" font-weight="600" fill="#1A1A1A">Goodput, pas throughput</text>
  <text x="60" y="125" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Seules comptent les requêtes servies dans la boîte SLO — TTFT et TPOT respectés à la fois.</text>
  <line x1="60" y1="146" x2="840" y2="146" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Axes -->
  <line x1="190" y1="780" x2="800" y2="780" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr04)"/>
  <line x1="190" y1="780" x2="190" y2="210" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr04)"/>

  <!-- SLO box -->
  <g class="interactive" data-card="slo-box" tabindex="0" role="button" aria-label="Boîte SLO">
    <rect x="190" y="500" width="300" height="280" fill="#2F5D3F" opacity="0.08"/>
    <line x1="490" y1="500" x2="490" y2="780" stroke="#2F5D3F" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="190" y1="500" x2="490" y2="500" stroke="#2F5D3F" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="340" y="640" class="body" font-size="15" font-weight="600" fill="#2F5D3F" text-anchor="middle">boîte SLO</text>
    <text x="340" y="664" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">TTFT &lt; seuil ET</text>
    <text x="340" y="682" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">TPOT &lt; seuil</text>
    <text x="496" y="516" class="mono" font-size="10" fill="#2F5D3F">TTFT max</text>
    <text x="120" y="498" class="mono" font-size="10" fill="#2F5D3F">TPOT max</text>
  </g>

  <!-- Colocated curve -->
  <g class="interactive" data-card="colocated-curve" tabindex="0" role="button" aria-label="Courbe colocalisée">
    <path d="M 230 760 C 320 720, 360 560, 470 420 C 540 330, 640 290, 720 270" fill="none" stroke="#B7332C" stroke-width="2.5"/>
    <circle cx="470" cy="420" r="6" fill="#B7332C"/>
    <text x="500" y="404" class="body" font-size="12.5" font-weight="600" fill="#B7332C">colocalisé</text>
    <text x="500" y="422" class="body" font-size="11" fill="#5A5A5A">sort vite de la boîte</text>
    <text x="640" y="312" class="mono" font-size="10.5" fill="#B7332C" text-anchor="middle">charge ↗</text>
  </g>

  <!-- Disaggregated curve -->
  <g class="interactive" data-card="disagg-curve" tabindex="0" role="button" aria-label="Courbe désagrégée">
    <path d="M 222 772 C 320 762, 420 740, 480 700 C 580 640, 660 520, 760 360" fill="none" stroke="#1F5560" stroke-width="2.5"/>
    <circle cx="480" cy="700" r="6" fill="#1F5560"/>
    <text x="232" y="724" class="body" font-size="12.5" font-weight="600" fill="#1F5560">désagrégé</text>
    <text x="232" y="742" class="body" font-size="11" fill="#5A5A5A">reste plus longtemps dans la boîte</text>
  </g>

  <!-- Axis labels -->
  <g class="interactive" data-card="ttft-axis" tabindex="0" role="button" aria-label="Axe TTFT">
    <text x="500" y="822" class="body" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">TTFT  →  (latence du prefill)</text>
  </g>
  <g class="interactive" data-card="tpot-axis" tabindex="0" role="button" aria-label="Axe TPOT">
    <text x="150" y="490" class="body" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90 150 490)">TPOT  →  (latence inter-token)</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="836" x2="840" y2="836" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="866" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : DistServe (OSDI 2024) ; Hao AI Lab, « Throughput is Not All You Need » (2024). Courbes schématiques.</text>
</svg>
