<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arr05" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="900" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="56" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="96" class="display" font-size="28" font-weight="600" fill="#1A1A1A">Désagréger ou multiplexer ?</text>
  <text x="60" y="125" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Le chunked prefill et la désagrégation occupent un continuum — le point de bascule suit l'échelle et la longueur des prompts.</text>
  <line x1="60" y1="146" x2="840" y2="146" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Quadrant backgrounds -->
  <rect x="180" y="480" width="300" height="280" fill="#B58A2C" opacity="0.05"/>
  <rect x="480" y="200" width="300" height="280" fill="#1F5560" opacity="0.07"/>
  <rect x="180" y="200" width="300" height="280" fill="#5A5A5A" opacity="0.04"/>
  <rect x="480" y="480" width="300" height="280" fill="#5A5A5A" opacity="0.04"/>

  <!-- Axes -->
  <line x1="180" y1="480" x2="800" y2="480" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr05)"/>
  <line x1="480" y1="780" x2="480" y2="180" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr05)"/>
  <text x="792" y="500" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="end">échelle du déploiement →</text>
  <text x="200" y="500" class="body" font-size="11" fill="#5A5A5A">← instance unique</text>
  <text x="498" y="196" class="body" font-size="13" font-weight="600" fill="#1A1A1A">↑ prompts longs</text>
  <text x="498" y="772" class="body" font-size="11" fill="#5A5A5A">prompts courts</text>

  <!-- Crossover diagonal -->
  <line x1="210" y1="740" x2="760" y2="230" stroke="#B7332C" stroke-width="1.5" stroke-dasharray="5 4"/>
  <g class="interactive" data-card="crossover" tabindex="0" role="button" aria-label="Ligne de bascule">
    <rect x="300" y="540" width="150" height="26" rx="13" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="375" y="558" class="mono" font-size="10.5" fill="#B7332C" text-anchor="middle">ligne de bascule</text>
  </g>

  <!-- Chunked quadrant (BL) -->
  <g class="interactive" data-card="chunked-quadrant" tabindex="0" role="button" aria-label="Chunked prefill">
    <text x="330" y="616" class="body" font-size="15" font-weight="600" fill="#B58A2C" text-anchor="middle">Chunked prefill</text>
    <text x="330" y="638" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">interleave intra-instance</text>
    <text x="330" y="656" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">(Sarathi-Serve)</text>
    <text x="330" y="680" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">0 transfert · stall-free</text>
  </g>

  <!-- Disagg quadrant (TR) -->
  <g class="interactive" data-card="disagg-quadrant" tabindex="0" role="button" aria-label="Désagrégation pleine">
    <text x="630" y="300" class="body" font-size="15" font-weight="600" fill="#1F5560" text-anchor="middle">Désagrégation pleine</text>
    <text x="630" y="322" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">pools P et D distincts</text>
    <text x="630" y="340" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">(DistServe, Mooncake)</text>
    <text x="630" y="364" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">découple TOUT · transfert recouvert</text>
  </g>

  <!-- Hybrid zone (off-diagonal) -->
  <g class="interactive" data-card="hybrid-zone" tabindex="0" role="button" aria-label="Zone hybride">
    <text x="330" y="300" class="body" font-size="13" font-weight="600" fill="#5A5A5A" text-anchor="middle">Zone hybride</text>
    <text x="330" y="320" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">chunked DANS le pool</text>
    <text x="330" y="336" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">prefill, désagrégé ENTRE</text>
    <text x="630" y="616" class="body" font-size="13" font-weight="600" fill="#5A5A5A" text-anchor="middle">Zone hybride</text>
    <text x="630" y="636" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">selon le coût du</text>
    <text x="630" y="652" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">transfert sur petits prompts</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="800" x2="840" y2="800" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="832" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : Sarathi-Serve (OSDI 2024) ; DistServe (OSDI 2024) ; vLLM / MI300X (2025). Trois variables : échelle, longueur, hétérogénéité.</text>
</svg>
