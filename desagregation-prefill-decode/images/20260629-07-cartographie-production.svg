<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">La désagrégation en production</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Cinq systèmes de référence et leurs choix de transfert, de pool KV et de routage</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- column headers -->
  <text x="76" y="186" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#5A5A5A">SYSTÈME</text>
  <text x="320" y="186" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#5A5A5A">TRANSFERT KV</text>
  <text x="540" y="186" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#5A5A5A">POOL KV / PLACEMENT</text>
  <text x="800" y="186" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#5A5A5A">ROUTAGE / ORDONNANCEMENT</text>
  <text x="1130" y="186" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#5A5A5A" text-anchor="end">GAIN PHARE</text>
  <line x1="60" y1="196" x2="1140" y2="196" stroke="#B8B5AE" stroke-width="1"/>

  <!-- ROW Mooncake (interactive) -->
  <g class="interactive" data-region="mooncake" tabindex="0" role="button" aria-label="Mooncake / Kimi">
    <rect x="60" y="202" width="1080" height="86" rx="3" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.25"/>
    <text x="76" y="232" class="body" font-size="14" font-weight="600" fill="#1F5560">Mooncake</text>
    <text x="76" y="252" class="body" font-size="10.5" fill="#5A5A5A">Moonshot · Kimi</text>
    <text x="76" y="270" class="body" font-size="10" font-style="italic" fill="#5A5A5A">FAST 2025 Best Paper</text>
    <text x="320" y="238" class="body" font-size="11" fill="#1A1A1A">RDMA RoCE</text>
    <text x="320" y="256" class="body" font-size="11" fill="#1A1A1A">87 → 190 Go/s</text>
    <text x="540" y="238" class="body" font-size="11" fill="#1A1A1A">Pool KV global</text>
    <text x="540" y="256" class="body" font-size="11" fill="#1A1A1A">DRAM + SSD du cluster</text>
    <text x="800" y="238" class="body" font-size="11" fill="#1A1A1A">Orienté surcharge :</text>
    <text x="800" y="256" class="body" font-size="11" fill="#1A1A1A">rejet anticipé prédictif</text>
    <text x="1130" y="240" class="display" font-size="20" font-weight="600" fill="#1F5560" text-anchor="end">+525 %</text>
    <text x="1130" y="262" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">sim. · +75 % réel (Kimi)</text>
  </g>

  <!-- ROW DeepSeek-V3 (interactive) -->
  <g class="interactive" data-region="deepseek-v3" tabindex="0" role="button" aria-label="DeepSeek-V3">
    <rect x="60" y="294" width="1080" height="86" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="76" y="324" class="body" font-size="14" font-weight="600" fill="#B7332C">DeepSeek-V3</text>
    <text x="76" y="344" class="body" font-size="10.5" fill="#5A5A5A">DeepSeek-AI</text>
    <text x="76" y="362" class="body" font-size="10" font-style="italic" fill="#5A5A5A">déploiement EP géant</text>
    <text x="320" y="330" class="body" font-size="11" fill="#1A1A1A">inter-nœuds,</text>
    <text x="320" y="348" class="body" font-size="11" fill="#1A1A1A">échelle d'experts</text>
    <text x="540" y="330" class="body" font-size="11" fill="#1A1A1A">Cache on-disk massif :</text>
    <text x="540" y="348" class="body" font-size="11" fill="#1A1A1A">56,3 % des entrées en cache</text>
    <text x="800" y="330" class="body" font-size="11" fill="#1A1A1A">Prefill EP32 / 4 nœuds</text>
    <text x="800" y="348" class="body" font-size="11" fill="#1A1A1A">Decode EP144 / 18 nœuds</text>
    <text x="1130" y="332" class="display" font-size="20" font-weight="600" fill="#B7332C" text-anchor="end">545 %</text>
    <text x="1130" y="354" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">marge profit théorique</text>
  </g>

  <!-- ROW Splitwise (interactive) -->
  <g class="interactive" data-region="splitwise" tabindex="0" role="button" aria-label="Splitwise / Azure">
    <rect x="60" y="386" width="1080" height="86" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="76" y="416" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Splitwise</text>
    <text x="76" y="436" class="body" font-size="10.5" fill="#5A5A5A">Microsoft · Azure</text>
    <text x="76" y="454" class="body" font-size="10" font-style="italic" fill="#5A5A5A">ISCA 2024</text>
    <text x="320" y="422" class="body" font-size="11" fill="#1A1A1A">InfiniBand</text>
    <text x="320" y="440" class="body" font-size="11" fill="#1A1A1A">(back-plane rapide)</text>
    <text x="540" y="422" class="body" font-size="11" fill="#1A1A1A">3 pools : prompt /</text>
    <text x="540" y="440" class="body" font-size="11" fill="#1A1A1A">token / mixte · hétérogène</text>
    <text x="800" y="422" class="body" font-size="11" fill="#1A1A1A">GPU récents au prefill,</text>
    <text x="800" y="440" class="body" font-size="11" fill="#1A1A1A">anciens au decode</text>
    <text x="1130" y="424" class="display" font-size="20" font-weight="600" fill="#1A1A1A" text-anchor="end">×2,35</text>
    <text x="1130" y="446" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">coût + énergie constants</text>
  </g>

  <!-- ROW Dynamo (interactive) -->
  <g class="interactive" data-region="dynamo" tabindex="0" role="button" aria-label="NVIDIA Dynamo">
    <rect x="60" y="478" width="1080" height="86" rx="3" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.25"/>
    <text x="76" y="508" class="body" font-size="14" font-weight="600" fill="#1F5560">NVIDIA Dynamo</text>
    <text x="76" y="528" class="body" font-size="10.5" fill="#5A5A5A">plateforme · GTC 2025</text>
    <text x="76" y="546" class="body" font-size="10" font-style="italic" fill="#5A5A5A">disagg. comme produit</text>
    <text x="320" y="514" class="body" font-size="11" fill="#1A1A1A">NIXL · VRAM → VRAM</text>
    <text x="320" y="532" class="body" font-size="11" fill="#1A1A1A">5 backends</text>
    <text x="540" y="514" class="body" font-size="11" fill="#1A1A1A">KV Manager +</text>
    <text x="540" y="532" class="body" font-size="11" fill="#1A1A1A">Planner (ratio dynamique)</text>
    <text x="800" y="514" class="body" font-size="11" fill="#1A1A1A">Smart Router KV-aware</text>
    <text x="800" y="532" class="body" font-size="11" fill="#1A1A1A">(score recouvrement + charge)</text>
    <text x="1130" y="516" class="display" font-size="20" font-weight="600" fill="#1F5560" text-anchor="end">×30</text>
    <text x="1130" y="538" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">DeepSeek-R1 (GB200)</text>
  </g>

  <!-- ROW vLLM/llm-d (interactive) -->
  <g class="interactive" data-region="vllm-llmd" tabindex="0" role="button" aria-label="vLLM / SGLang / llm-d">
    <rect x="60" y="570" width="1080" height="86" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="76" y="600" class="body" font-size="14" font-weight="600" fill="#1A1A1A">vLLM · SGLang · llm-d</text>
    <text x="76" y="620" class="body" font-size="10.5" fill="#5A5A5A">open source</text>
    <text x="76" y="638" class="body" font-size="10" font-style="italic" fill="#5A5A5A">CNCF Sandbox (2026)</text>
    <text x="320" y="606" class="body" font-size="11" fill="#1A1A1A">Connecteurs LMCache /</text>
    <text x="320" y="624" class="body" font-size="11" fill="#1A1A1A">NIXL · FlexKV</text>
    <text x="540" y="606" class="body" font-size="11" fill="#1A1A1A">Offload hiérarchique</text>
    <text x="540" y="624" class="body" font-size="11" fill="#1A1A1A">GPU / CPU / storage</text>
    <text x="800" y="606" class="body" font-size="11" fill="#1A1A1A">Prefix-cache-aware</text>
    <text x="800" y="624" class="body" font-size="11" fill="#1A1A1A">via Inference Gateway</text>
    <text x="1130" y="608" class="display" font-size="20" font-weight="600" fill="#1A1A1A" text-anchor="end">×3</text>
    <text x="1130" y="630" class="body" font-size="10" fill="#5A5A5A" text-anchor="end">débit, −½ TTFT (llm-d)</text>
  </g>

  <!-- takeaway -->
  <text x="60" y="694" class="body" font-size="11.5" font-style="italic" fill="#1A1A1A">Ce qui était recherche de pointe en 2024 est devenu, en 2026, le mode de déploiement standard des grands services — et une brique d'infrastructure.</text>

  <!-- FOOTER -->
  <text x="60" y="760" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Qin et al. (Mooncake) ; DeepSeek-AI ; Patel et al. (Splitwise) ; NVIDIA (Dynamo) ; vLLM &amp; llm-d (Red Hat / Google / IBM).</text>
</svg>
