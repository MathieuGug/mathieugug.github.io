<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <pattern id="hatch02" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#B8B5AE" fill-opacity="0.18"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#5A5A5A" stroke-width="1" stroke-opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Goodput : la métrique qui change la donne</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Deux SLO antagonistes — TTFT porté par le prefill, TPOT par le decode — sur un même matériel</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- TTFT card -->
  <g class="interactive" data-region="ttft-slo" tabindex="0" role="button" aria-label="TTFT : SLO du prefill">
    <rect x="60" y="172" width="540" height="118" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="84" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B7332C">TTFT · TIME-TO-FIRST-TOKEN</text>
    <text x="84" y="226" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Délai avant le premier token</text>
    <text x="84" y="248" class="body" font-size="12" fill="#5A5A5A">Dominé par le <tspan font-weight="600" fill="#B7332C">prefill</tspan> — la passe d'entrée</text>
    <text x="84" y="276" class="body" font-size="11" font-style="italic" fill="#5A5A5A">« combien de temps avant que ça réponde »</text>
  </g>

  <!-- TPOT card -->
  <g class="interactive" data-region="tpot-slo" tabindex="0" role="button" aria-label="TPOT : SLO du decode">
    <rect x="600" y="172" width="540" height="118" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="624" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1F5560">TPOT · TIME-PER-OUTPUT-TOKEN</text>
    <text x="624" y="226" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Intervalle entre deux tokens</text>
    <text x="624" y="248" class="body" font-size="12" fill="#5A5A5A">Dominé par le <tspan font-weight="600" fill="#1F5560">decode</tspan> — la génération</text>
    <text x="624" y="276" class="body" font-size="11" font-style="italic" fill="#5A5A5A">« à quelle vitesse ça défile ensuite »</text>
  </g>

  <!-- BAR COMPARISON -->
  <text x="60" y="330" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1A1A1A">CE QU'ON MESURE CHANGE CE QU'ON OPTIMISE</text>
  <line x1="60" y1="600" x2="60" y2="350" stroke="#B8B5AE" stroke-width="1"/>
  <line x1="60" y1="600" x2="760" y2="600" stroke="#B8B5AE" stroke-width="1"/>

  <!-- débit brut bar (interactive) -->
  <g class="interactive" data-region="debit-trompeur" tabindex="0" role="button" aria-label="Débit brut : métrique trompeuse">
    <rect x="150" y="368" width="160" height="232" fill="#5A5A5A" fill-opacity="0.18"/>
    <rect x="150" y="368" width="160" height="232" fill="url(#hatch02)"/>
    <rect x="150" y="496" width="160" height="104" fill="#5A5A5A" fill-opacity="0.55"/>
    <text x="230" y="392" class="mono" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">débit brut</text>
    <text x="230" y="436" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">part qui viole</text>
    <text x="230" y="450" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">un SLO</text>
    <text x="230" y="552" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle">requêtes</text>
    <text x="230" y="566" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle">vraiment utiles</text>
    <text x="230" y="624" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">tokens/s agrégés</text>
  </g>

  <!-- goodput bar (interactive) -->
  <g class="interactive" data-region="goodput-def" tabindex="0" role="button" aria-label="Goodput : requêtes respectant les deux SLO">
    <rect x="470" y="496" width="160" height="104" fill="#B7332C"/>
    <text x="550" y="392" class="mono" font-size="13" font-weight="600" fill="#B7332C" text-anchor="middle">goodput</text>
    <text x="550" y="540" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle">requêtes/s</text>
    <text x="550" y="554" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle">tenant les</text>
    <text x="550" y="568" class="body" font-size="10" fill="#FAF8F3" text-anchor="middle">2 SLO</text>
    <text x="550" y="624" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">la seule capacité réelle</text>
    <line x1="310" y1="496" x2="470" y2="496" stroke="#B7332C" stroke-width="1" stroke-dasharray="3 3"/>
  </g>

  <!-- arrow annotation -->
  <text x="660" y="455" class="body" font-size="11" fill="#5A5A5A">Maximiser le débit</text>
  <text x="660" y="471" class="body" font-size="11" fill="#5A5A5A">agrégé empile les</text>
  <text x="660" y="487" class="body" font-size="11" fill="#5A5A5A">requêtes jusqu'à la</text>
  <text x="660" y="503" class="body" font-size="11" font-weight="600" fill="#B7332C">violation des SLO.</text>

  <!-- DEFINITION BOX -->
  <g>
    <rect x="800" y="350" width="340" height="250" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
    <text x="824" y="380" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#B7332C">DÉFINITION · DistServe</text>
    <text x="824" y="410" class="display" font-size="18" font-style="italic" fill="#1A1A1A">goodput =</text>
    <text x="824" y="438" class="body" font-size="13" fill="#1A1A1A">requêtes par seconde et par</text>
    <text x="824" y="458" class="body" font-size="13" fill="#1A1A1A">GPU respectant <tspan font-weight="600">à la fois</tspan></text>
    <text x="824" y="478" class="body" font-size="13" fill="#1A1A1A">leur cible TTFT <tspan font-style="italic">et</tspan> leur cible TPOT</text>
    <line x1="824" y1="498" x2="1116" y2="498" stroke="#E5E1D8" stroke-width="0.75"/>
    <text x="824" y="534" class="display" font-size="28" font-weight="600" fill="#B7332C">×7,4</text>
    <text x="900" y="528" class="body" font-size="12" fill="#1A1A1A">requêtes servies, ou</text>
    <text x="900" y="546" class="body" font-size="12" fill="#1A1A1A">×12,6 sur la sévérité SLO</text>
    <text x="824" y="578" class="body" font-size="11" font-style="italic" fill="#5A5A5A">en tenant les cibles pour &gt; 90 % des requêtes</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="760" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : Zhong et al., « DistServe : Disaggregating Prefill and Decoding for Goodput-optimized LLM Serving », OSDI 2024.</text>
</svg>
