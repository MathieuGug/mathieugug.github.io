<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Deux écoles face au même conflit</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Entrelacer proprement sur un pool, ou séparer physiquement en deux pools</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ÉCOLE CHUNKED (interactive) -->
  <g class="interactive" data-card="ecole-chunked" tabindex="0" role="button" aria-label="École chunked prefill : entrelacer">
    <rect x="60" y="172" width="520" height="222" rx="3" fill="#B58A2C" fill-opacity="0.07" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="84" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B58A2C">ÉCOLE A · ENTRELACER — Sarathi-Serve</text>
    <text x="84" y="226" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Chunked prefill · stall-free batching</text>
    <text x="84" y="248" class="body" font-size="11.5" fill="#5A5A5A">Découpe le prefill en morceaux bornés, insérés dans</text>
    <text x="84" y="266" class="body" font-size="11.5" fill="#5A5A5A">les lots de decode sans jamais les interrompre.</text>
    <!-- mini timeline single pool -->
    <line x1="84" y1="306" x2="556" y2="306" stroke="#B8B5AE" stroke-width="1"/>
    <g fill="#1F5560"><rect x="92" y="294" width="12" height="24" rx="2"/><rect x="146" y="294" width="12" height="24" rx="2"/><rect x="232" y="294" width="12" height="24" rx="2"/><rect x="318" y="294" width="12" height="24" rx="2"/><rect x="404" y="294" width="12" height="24" rx="2"/><rect x="490" y="294" width="12" height="24" rx="2"/></g>
    <g fill="#B58A2C"><rect x="110" y="296" width="30" height="20" rx="2"/><rect x="196" y="296" width="30" height="20" rx="2"/><rect x="282" y="296" width="30" height="20" rx="2"/><rect x="368" y="296" width="30" height="20" rx="2"/><rect x="454" y="296" width="30" height="20" rx="2"/></g>
    <text x="84" y="338" class="body" font-size="10" font-style="italic" fill="#5A5A5A">un seul pool : chunks de prefill (or) glissés entre decodes (teal)</text>
    <text x="84" y="372" class="body" font-size="12" font-weight="600" fill="#B58A2C">+ Zéro transfert KV · ×2,6 → ×5,6 vs vLLM</text>
  </g>

  <!-- ÉCOLE DÉSAGRÉGÉE (interactive) -->
  <g class="interactive" data-card="ecole-desagregee" tabindex="0" role="button" aria-label="École désagrégée : séparer">
    <rect x="620" y="172" width="520" height="222" rx="3" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.5"/>
    <text x="644" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1F5560">ÉCOLE B · SÉPARER — DistServe, Splitwise</text>
    <text x="644" y="226" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Désagrégation prefill / decode</text>
    <text x="644" y="248" class="body" font-size="11.5" fill="#5A5A5A">Deux pools de GPU dédiés, chacun avec son</text>
    <text x="644" y="266" class="body" font-size="11.5" fill="#5A5A5A">parallélisme et son dimensionnement ; le KV transite.</text>
    <!-- two pools -->
    <rect x="644" y="290" width="150" height="48" rx="3" fill="#B7332C" fill-opacity="0.85"/>
    <text x="719" y="318" class="body" font-size="11" fill="#FAF8F3" text-anchor="middle">pool prefill</text>
    <line x1="800" y1="314" x2="838" y2="314" stroke="#B58A2C" stroke-width="2" marker-end="url(#arrow06b)"/>
    <rect x="844" y="290" width="150" height="48" rx="3" fill="#1F5560" fill-opacity="0.85"/>
    <text x="919" y="318" class="body" font-size="11" fill="#FAF8F3" text-anchor="middle">pool decode</text>
    <text x="800" y="300" class="mono" font-size="8" fill="#B58A2C" text-anchor="middle">KV</text>
    <text x="644" y="372" class="body" font-size="12" font-weight="600" fill="#1F5560">+ Parallélisme dédié · interférence supprimée</text>
  </g>
  <defs>
    <marker id="arrow06b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#B58A2C"/></marker>
  </defs>

  <!-- WHERE EACH WINS -->
  <text x="60" y="436" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1A1A1A">OÙ CHACUNE L'EMPORTE</text>

  <!-- charge favorable chunked (interactive) -->
  <g class="interactive" data-card="charge-favorable-chunked" tabindex="0" role="button" aria-label="Charges favorables au chunked prefill">
    <rect x="60" y="448" width="520" height="150" rx="3" fill="#B58A2C" fill-opacity="0.04" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="84" y="476" class="body" font-size="12" font-weight="600" fill="#B58A2C">L'entrelacement gagne quand…</text>
    <text x="84" y="502" class="body" font-size="11.5" fill="#5A5A5A">• déploiement modeste (1 à quelques nœuds)</text>
    <text x="84" y="524" class="body" font-size="11.5" fill="#5A5A5A">• lien inter-nœuds lent ou absent</text>
    <text x="84" y="546" class="body" font-size="11.5" fill="#5A5A5A">• prompts courts (transfert KV non rentable)</text>
    <text x="84" y="576" class="body" font-size="11" font-style="italic" fill="#1A1A1A">l'argument décisif : le transfert serait pure perte</text>
  </g>

  <!-- charge favorable désag (interactive) -->
  <g class="interactive" data-card="charge-favorable-desag" tabindex="0" role="button" aria-label="Charges favorables à la désagrégation">
    <rect x="620" y="448" width="520" height="150" rx="3" fill="#1F5560" fill-opacity="0.04" stroke="#1F5560" stroke-width="1.25"/>
    <text x="644" y="476" class="body" font-size="12" font-weight="600" fill="#1F5560">La séparation gagne quand…</text>
    <text x="644" y="502" class="body" font-size="11.5" fill="#5A5A5A">• grands clusters, échelle élevée</text>
    <text x="644" y="524" class="body" font-size="11.5" fill="#5A5A5A">• prompts longs, lien rapide (RDMA/NVLink)</text>
    <text x="644" y="546" class="body" font-size="11.5" fill="#5A5A5A">• TTFT et TPOT serrés simultanément</text>
    <text x="644" y="576" class="body" font-size="11" font-style="italic" fill="#1A1A1A">l'argument décisif : dimensionner les phases séparément</text>
  </g>

  <!-- CONVERGENCE -->
  <rect x="60" y="622" width="1080" height="76" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#5A5A5A" stroke-width="1.25"/>
  <text x="84" y="650" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1A1A1A">ELLES NE S'EXCLUENT PAS</text>
  <text x="84" y="674" class="body" font-size="11.5" fill="#5A5A5A">Un pool prefill désagrégé peut employer le chunked prefill en interne ; vLLM et SGLang exposent les deux leviers. La vraie</text>
  <text x="84" y="692" class="body" font-size="11.5" fill="#5A5A5A">question n'est pas « laquelle est la bonne », mais <tspan font-weight="600" fill="#1A1A1A">« à quelle échelle bascule-t-on de l'une à l'autre »</tspan> — débat encore ouvert.</text>

  <!-- FOOTER -->
  <text x="60" y="760" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Agrawal et al. (Sarathi-Serve, OSDI 2024) ; Zhong et al. (DistServe) ; « Beyond the Buzz », 2025.</text>
</svg>
