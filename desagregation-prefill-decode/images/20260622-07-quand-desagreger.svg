<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    text { fill: #1A1A1A; }
  </style>
  <rect x="0" y="0" width="900" height="900" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="98" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em">Quand désagréger — et quand non</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">La désagrégation n'est pas une amélioration de Pareto</text>
  <line x1="60" y1="148" x2="840" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Quadrant fills -->
  <rect x="150" y="460" width="325" height="260" fill="#B8B5AE" fill-opacity="0.10"/>
  <rect x="475" y="460" width="335" height="260" fill="#B58A2C" fill-opacity="0.10"/>
  <rect x="150" y="200" width="325" height="260" fill="#1F5560" fill-opacity="0.08"/>
  <rect x="475" y="200" width="335" height="260" fill="#B7332C" fill-opacity="0.08"/>

  <!-- Axes -->
  <line x1="150" y1="720" x2="824" y2="720" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#ax)"/>
  <line x1="150" y1="720" x2="150" y2="186" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#ax)"/>
  <line x1="475" y1="200" x2="475" y2="720" stroke="#E5E1D8" stroke-width="1"/>
  <line x1="150" y1="460" x2="810" y2="460" stroke="#E5E1D8" stroke-width="1"/>
  <text x="487" y="752" class="body" font-size="14" fill="#5A5A5A" text-anchor="middle">Longueur de contexte / poids du prefill →</text>
  <text x="112" y="460" class="body" font-size="14" fill="#5A5A5A" text-anchor="middle" transform="rotate(-90 112 460)">Charge &amp; débit sous SLO →</text>

  <!-- q-colocation (BL) -->
  <g class="interactive" data-card="q-colocation" tabindex="0" role="button" aria-label="Colocation simple — détails">
    <rect x="150" y="460" width="325" height="260" fill="#FAF8F3" fill-opacity="0.001"/>
    <text x="174" y="618" class="display" font-size="20" font-weight="600">Colocation simple</text>
    <text x="174" y="646" class="body" font-size="13" fill="#5A5A5A">1 type de GPU, batch continu</text>
    <text x="174" y="668" class="body" font-size="13" fill="#5A5A5A">SLO lâches — le défaut suffit</text>
  </g>

  <!-- q-chunked (BR) -->
  <g class="interactive" data-card="q-chunked" tabindex="0" role="button" aria-label="Prefill découpé — détails">
    <rect x="475" y="460" width="335" height="260" fill="#FAF8F3" fill-opacity="0.001"/>
    <text x="499" y="618" class="display" font-size="20" font-weight="600" fill="#B58A2C">Prefill découpé</text>
    <text x="499" y="646" class="body" font-size="13" fill="#5A5A5A">Sarathi-Serve — stall-free</text>
    <text x="499" y="668" class="body" font-size="13" fill="#5A5A5A">gros prefills sans 2 pools</text>
  </g>

  <!-- q-disagg (TL) -->
  <g class="interactive" data-card="q-disagg" tabindex="0" role="button" aria-label="Désagrégation — détails">
    <rect x="150" y="200" width="325" height="260" fill="#FAF8F3" fill-opacity="0.001"/>
    <text x="174" y="356" class="display" font-size="20" font-weight="600" fill="#1F5560">Désagrégation</text>
    <text x="174" y="384" class="body" font-size="13" fill="#5A5A5A">DistServe · Splitwise · Dynamo</text>
    <text x="174" y="406" class="body" font-size="13" fill="#5A5A5A">pools séparés, decode bon marché</text>
  </g>

  <!-- q-kvcentric (TR) -->
  <g class="interactive" data-card="q-kvcentric" tabindex="0" role="button" aria-label="KVCache-centric — détails">
    <rect x="475" y="200" width="335" height="260" fill="#FAF8F3" fill-opacity="0.001"/>
    <text x="499" y="356" class="display" font-size="20" font-weight="600" fill="#B7332C">KVCache-centric</text>
    <text x="499" y="384" class="body" font-size="13" fill="#5A5A5A">Mooncake — store global</text>
    <text x="499" y="406" class="body" font-size="13" fill="#5A5A5A">multi-nœuds + réutilisation préfixes</text>
  </g>

  <!-- progression arrow -->
  <line x1="300" y1="640" x2="640" y2="320" stroke="#B7332C" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#axc)"/>
  <text x="470" y="500" class="body" font-size="12" font-style="italic" fill="#B7332C" text-anchor="middle" transform="rotate(-37 470 500)">échelle &amp; complexité ↗</text>

  <!-- Horizon note -->
  <rect x="150" y="760" width="674" height="64" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="0.75" stroke-dasharray="2 3"/>
  <text x="168" y="786" class="mono" font-size="12" letter-spacing="0.08em" fill="#1F5560">HORIZON 2026-2028</text>
  <text x="168" y="808" class="body" font-size="12.5" fill="#1A1A1A">modèles de raisonnement (decode long) · MoE + expert-parallelism · KVCache-as-a-service → étendent le quadrant haut-droit</text>

  <!-- Footer -->
  <line x1="60" y1="852" x2="840" y2="852" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="878" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : « Beyond the Buzz » (arXiv 2506.05508) ; synthèse de l'auteur. Schéma : Mathieu Guglielmino.</text>

  <defs>
    <marker id="ax" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#5A5A5A"/></marker>
    <marker id="axc" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#B7332C"/></marker>
  </defs>
</svg>
