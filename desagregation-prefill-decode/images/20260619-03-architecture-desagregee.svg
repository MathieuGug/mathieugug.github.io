<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive:hover .hot { fill-opacity: 0.14; }
    </style>
    <marker id="ar03" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="ar03k" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">L'architecture désagrégée canonique</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Routeur → pool prefill → transfert KV → pool decode → flux de tokens</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- request in -->
  <text x="60" y="350" class="mono" font-size="12" fill="#5A5A5A">requête</text>
  <text x="60" y="370" class="mono" font-size="12" fill="#5A5A5A">(prompt)</text>
  <line x1="118" y1="360" x2="178" y2="360" stroke="#5A5A5A" stroke-width="1.6" marker-end="url(#ar03)"/>

  <!-- ROUTER -->
  <g class="interactive" data-card="router" tabindex="0" role="button" aria-label="Routeur / scheduler global">
    <rect class="hot" x="190" y="290" width="150" height="140" rx="4" fill="#1A1A1A" fill-opacity="0.04" stroke="#1A1A1A" stroke-width="1.4"/>
    <text x="265" y="318" class="mono" font-size="10" letter-spacing="0.12em" font-weight="600" fill="#1A1A1A" text-anchor="middle">ROUTEUR</text>
    <text x="265" y="344" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">scheduler</text>
    <text x="265" y="362" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">global</text>
    <line x1="210" y1="376" x2="320" y2="376" stroke="#1A1A1A" stroke-width="0.4" stroke-dasharray="2 3"/>
    <text x="265" y="396" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">équilibrage</text>
    <text x="265" y="412" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">appariement P→D</text>
  </g>
  <line x1="340" y1="360" x2="408" y2="360" stroke="#5A5A5A" stroke-width="1.6" marker-end="url(#ar03)"/>

  <!-- PREFILL POOL -->
  <g class="interactive" data-card="prefill-pool" tabindex="0" role="button" aria-label="Pool prefill">
    <rect class="hot" x="420" y="230" width="200" height="260" rx="6" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.4"/>
    <text x="520" y="262" class="mono" font-size="11" letter-spacing="0.1em" font-weight="600" fill="#B7332C" text-anchor="middle">POOL PREFILL</text>
    <text x="520" y="282" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">compute-bound</text>
    <rect x="445" y="302" width="150" height="40" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="520" y="327" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">GPU instance 1</text>
    <rect x="445" y="352" width="150" height="40" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="520" y="377" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">GPU instance 2</text>
    <text x="520" y="430" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">forward pass parallèle</text>
    <text x="520" y="448" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">→ KV cache + 1ᵉʳ token</text>
  </g>

  <!-- KV TRANSFER -->
  <g class="interactive" data-card="kv-transfer" tabindex="0" role="button" aria-label="Transfert du KV cache">
    <rect class="hot" x="636" y="300" width="148" height="120" rx="6" fill="#B7332C" fill-opacity="0.08"/>
    <line x1="624" y1="360" x2="792" y2="360" stroke="#B7332C" stroke-width="2.4" marker-end="url(#ar03k)"/>
    <text x="710" y="330" class="body" font-size="14" font-weight="600" fill="#B7332C" text-anchor="middle">TRANSFERT KV</text>
    <text x="710" y="392" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">RDMA · InfiniBand</text>
    <text x="710" y="408" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">NVLink · NIXL</text>
    <text x="710" y="288" class="body" font-size="11" font-style="italic" fill="#B7332C" text-anchor="middle">plusieurs Go / requête</text>
  </g>

  <!-- DECODE POOL -->
  <g class="interactive" data-card="decode-pool" tabindex="0" role="button" aria-label="Pool decode">
    <rect class="hot" x="800" y="230" width="200" height="260" rx="6" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.4"/>
    <text x="900" y="262" class="mono" font-size="11" letter-spacing="0.1em" font-weight="600" fill="#1F5560" text-anchor="middle">POOL DECODE</text>
    <text x="900" y="282" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">memory-bound</text>
    <rect x="825" y="302" width="150" height="40" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="900" y="327" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">GPU instance 1</text>
    <rect x="825" y="352" width="150" height="40" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="900" y="377" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">GPU instance 2</text>
    <rect x="825" y="402" width="150" height="40" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="900" y="427" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">GPU instance 3</text>
    <text x="900" y="466" class="body" font-size="12" font-style="italic" fill="#5A5A5A" text-anchor="middle">génération token par token</text>
  </g>

  <!-- tokens out -->
  <line x1="1002" y1="360" x2="1070" y2="360" stroke="#5A5A5A" stroke-width="1.6" marker-end="url(#ar03)"/>
  <text x="1085" y="356" class="mono" font-size="12" fill="#5A5A5A">flux de</text>
  <text x="1085" y="376" class="mono" font-size="12" fill="#5A5A5A">tokens</text>

  <!-- router supervises both pools -->
  <path d="M265 290 Q265 180 520 180 L520 224" fill="none" stroke="#9A9A9A" stroke-width="0.9" stroke-dasharray="3 4"/>
  <path d="M265 290 Q265 160 900 160 L900 224" fill="none" stroke="#9A9A9A" stroke-width="0.9" stroke-dasharray="3 4"/>
  <text x="600" y="150" class="mono" font-size="10" fill="#9A9A9A" text-anchor="middle">supervision des deux pools (ratio xP:yD ajustable)</text>

  <text x="60" y="640" class="body" font-size="13" font-style="italic" fill="#5A5A5A">Splitwise et DistServe ont posé cette ossature. Chaque pool est dimensionné, parallélisé et matériellement choisi pour sa seule phase.</text>
  <text x="60" y="668" class="body" font-size="13" font-style="italic" fill="#5A5A5A">Cliquer un bloc pour le détail.</text>
</svg>
