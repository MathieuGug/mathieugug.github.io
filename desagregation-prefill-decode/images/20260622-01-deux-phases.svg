<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    text { fill: #1A1A1A; }
  </style>
  <rect x="0" y="0" width="900" height="900" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="98" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em">Deux phases, deux régimes matériels</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Une requête LLM = un prefill compute-bound + un decode memory-bound</text>
  <line x1="60" y1="148" x2="840" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- PREFILL column -->
  <g class="interactive" data-card="prefill-phase" tabindex="0" role="button" aria-label="Phase de prefill — détails">
    <rect x="60" y="176" width="360" height="350" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="84" y="216" class="mono" font-size="13" letter-spacing="0.08em" fill="#1F5560">PHASE 1</text>
    <text x="84" y="250" class="display" font-size="24" font-weight="600">Prefill</text>
    <text x="84" y="278" class="body" font-size="15" font-style="italic" fill="#5A5A5A">Traitement du prompt</text>
    <text x="84" y="322" class="body" font-size="15" fill="#1A1A1A">• Tous les tokens en parallèle</text>
    <text x="84" y="350" class="body" font-size="15" fill="#1A1A1A">• Sature les unités de calcul</text>
    <text x="84" y="378" class="body" font-size="15" fill="#1A1A1A">• Écrit le KV cache</text>
    <text x="84" y="406" class="body" font-size="15" fill="#1A1A1A">• Gouverné par le TTFT</text>
    <rect x="84" y="432" width="312" height="68" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75" stroke-dasharray="2 3"/>
    <text x="100" y="462" class="mono" font-size="13" font-weight="500" fill="#1F5560">COMPUTE-BOUND</text>
    <text x="100" y="486" class="body" font-size="13" fill="#5A5A5A">veut le GPU le plus rapide en FLOPs</text>
  </g>

  <!-- DECODE column -->
  <g class="interactive" data-card="decode-phase" tabindex="0" role="button" aria-label="Phase de decode — détails">
    <rect x="480" y="176" width="360" height="350" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="504" y="216" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">PHASE 2</text>
    <text x="504" y="250" class="display" font-size="24" font-weight="600">Decode</text>
    <text x="504" y="278" class="body" font-size="15" font-style="italic" fill="#5A5A5A">Génération token par token</text>
    <text x="504" y="322" class="body" font-size="15" fill="#1A1A1A">• Un seul token par itération</text>
    <text x="504" y="350" class="body" font-size="15" fill="#1A1A1A">• Sous-utilise le calcul</text>
    <text x="504" y="378" class="body" font-size="15" fill="#1A1A1A">• Lit et étend le KV cache</text>
    <text x="504" y="406" class="body" font-size="15" fill="#1A1A1A">• Gouverné par le TBT</text>
    <rect x="504" y="432" width="312" height="68" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="2 3"/>
    <text x="520" y="462" class="mono" font-size="13" font-weight="500" fill="#B7332C">MEMORY-BOUND</text>
    <text x="520" y="486" class="body" font-size="13" fill="#5A5A5A">veut la bande passante mémoire</text>
  </g>

  <!-- Roofline mini -->
  <g class="interactive" data-card="roofline" tabindex="0" role="button" aria-label="Roofline — détails">
    <rect x="60" y="556" width="360" height="232" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1.25"/>
    <text x="84" y="588" class="mono" font-size="12" letter-spacing="0.08em" fill="#5A5A5A">ROOFLINE</text>
    <!-- axes -->
    <line x1="110" y1="760" x2="390" y2="760" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="110" y1="760" x2="110" y2="610" stroke="#5A5A5A" stroke-width="1"/>
    <!-- memory slope then compute roof -->
    <path d="M110 760 L250 632 L390 632" fill="none" stroke="#B8B5AE" stroke-width="1.5"/>
    <!-- decode dot (on memory slope) -->
    <circle cx="170" cy="705" r="7" fill="#B7332C"/>
    <text x="182" y="700" class="body" font-size="12" fill="#B7332C">decode</text>
    <!-- prefill dot (under compute roof) -->
    <circle cx="330" cy="632" r="7" fill="#1F5560"/>
    <text x="300" y="622" class="body" font-size="12" fill="#1F5560">prefill</text>
    <text x="118" y="600" class="body" font-size="11" fill="#5A5A5A">perf.</text>
    <text x="300" y="778" class="body" font-size="11" fill="#5A5A5A">intensité arithmétique</text>
  </g>

  <!-- KV cache shared band -->
  <g class="interactive" data-card="kv-cache" tabindex="0" role="button" aria-label="KV cache — détails">
    <rect x="480" y="556" width="360" height="232" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="504" y="588" class="mono" font-size="12" letter-spacing="0.08em" fill="#B58A2C">OBJET PARTAGÉ</text>
    <text x="504" y="624" class="display" font-size="20" font-weight="600">KV cache</text>
    <text x="504" y="652" class="body" font-size="13" fill="#5A5A5A">paires clé/valeur de l'attention</text>
    <!-- write arrow -->
    <line x1="504" y1="694" x2="690" y2="694" stroke="#1F5560" stroke-width="2" marker-end="url(#arrowT)"/>
    <text x="504" y="686" class="body" font-size="12" fill="#1F5560">prefill écrit →</text>
    <!-- read arrow -->
    <line x1="816" y1="730" x2="630" y2="730" stroke="#B7332C" stroke-width="2" marker-end="url(#arrowC)"/>
    <text x="650" y="722" class="body" font-size="12" fill="#B7332C">← decode lit / étend</text>
    <rect x="700" y="676" width="116" height="36" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="0.75"/>
    <text x="758" y="699" class="mono" font-size="12" fill="#5A5A5A" text-anchor="middle">plusieurs Go</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="828" x2="840" y2="828" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="858" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : Splitwise (ISCA 2024) ; DistServe (OSDI 2024). Schéma : Mathieu Guglielmino.</text>

  <defs>
    <marker id="arrowT" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#1F5560"/></marker>
    <marker id="arrowC" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#B7332C"/></marker>
  </defs>
</svg>
