<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le coût central : transférer le KV-cache</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">La désagrégation ne supprime pas la rareté du cache — elle la déplace dans le réseau</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- TAILLE TRANSFERT (interactive) -->
  <g class="interactive" data-card="taille-transfert" tabindex="0" role="button" aria-label="Taille du transfert">
    <rect x="60" y="172" width="500" height="150" rx="3" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="84" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B58A2C">CE QU'IL FAUT DÉPLACER</text>
    <text x="84" y="226" class="body" font-size="12.5" fill="#1A1A1A">Le KV-cache du prompt entier — pour un long</text>
    <text x="84" y="244" class="body" font-size="12.5" fill="#1A1A1A">contexte, <tspan font-weight="600">plusieurs gigaoctets par requête</tspan>.</text>
    <text x="84" y="286" class="display" font-size="22" font-weight="600" fill="#B58A2C">~800 Ko</text>
    <text x="240" y="280" class="body" font-size="11" fill="#5A5A5A">par token (modèle 13 Md, FP16)</text>
    <text x="240" y="298" class="body" font-size="11" fill="#5A5A5A">→ 2 000 tokens ≈ 1,6 Go</text>
    <text x="84" y="312" class="body" font-size="10" font-style="italic" fill="#5A5A5A">cf. dossier kv-cache §1</text>
  </g>

  <!-- HIERARCHIE LIEN (interactive) -->
  <g class="interactive" data-card="hierarchie-lien" tabindex="0" role="button" aria-label="Hiérarchie des liens de transfert">
    <rect x="640" y="172" width="500" height="150" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="664" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1F5560">LA HIÉRARCHIE DES LIENS · DÉBIT</text>
    <!-- ladder bars -->
    <text x="664" y="228" class="body" font-size="10.5" fill="#1A1A1A">NVLink (intra-nœud)</text>
    <rect x="664" y="234" width="452" height="14" rx="2" fill="#1F5560"/>
    <text x="1112" y="245" class="mono" font-size="9" fill="#FAF8F3" text-anchor="end">centaines de Go/s — To/s</text>
    <text x="664" y="266" class="body" font-size="10.5" fill="#1A1A1A">RDMA RoCE 8×400 Gbps</text>
    <rect x="664" y="272" width="300" height="14" rx="2" fill="#1F5560" fill-opacity="0.7"/>
    <text x="958" y="283" class="mono" font-size="9" fill="#FAF8F3" text-anchor="end">190 Go/s</text>
    <text x="664" y="304" class="body" font-size="10.5" fill="#1A1A1A">TCP (réseau classique)</text>
    <rect x="664" y="310" width="80" height="14" rx="2" fill="#B7332C" fill-opacity="0.5"/>
    <text x="752" y="321" class="mono" font-size="9" fill="#B7332C">2,4–4,6× plus lent</text>
  </g>

  <!-- RECOUVREMENT COUCHES (interactive) -->
  <g class="interactive" data-card="recouvrement-couches" tabindex="0" role="button" aria-label="Recouvrement couche-par-couche">
    <rect x="60" y="346" width="1080" height="160" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="84" y="374" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1A1A1A">LE RECOUVREMENT COUCHE-PAR-COUCHE · MASQUER LE TRANSFERT DERRIÈRE LE CALCUL</text>
    <text x="84" y="396" class="body" font-size="11.5" fill="#5A5A5A">On streame le KV d'une couche dès qu'elle est calculée, sans attendre la fin du prefill complet.</text>
    <!-- compute lane -->
    <text x="84" y="432" class="body" font-size="10" fill="#B7332C">calcul prefill</text>
    <g fill="#B7332C" fill-opacity="0.85">
      <rect x="180" y="420" width="70" height="20" rx="2"/><rect x="256" y="420" width="70" height="20" rx="2"/><rect x="332" y="420" width="70" height="20" rx="2"/><rect x="408" y="420" width="70" height="20" rx="2"/><rect x="484" y="420" width="70" height="20" rx="2"/>
    </g>
    <text x="215" y="434" class="mono" font-size="8" fill="#FAF8F3" text-anchor="middle">L1</text>
    <text x="291" y="434" class="mono" font-size="8" fill="#FAF8F3" text-anchor="middle">L2</text>
    <text x="367" y="434" class="mono" font-size="8" fill="#FAF8F3" text-anchor="middle">L3</text>
    <text x="443" y="434" class="mono" font-size="8" fill="#FAF8F3" text-anchor="middle">L4</text>
    <text x="519" y="434" class="mono" font-size="8" fill="#FAF8F3" text-anchor="middle">L5</text>
    <!-- transfer lane offset -->
    <text x="84" y="472" class="body" font-size="10" fill="#B58A2C">transfert KV</text>
    <g fill="#B58A2C" fill-opacity="0.85">
      <rect x="256" y="460" width="70" height="20" rx="2"/><rect x="332" y="460" width="70" height="20" rx="2"/><rect x="408" y="460" width="70" height="20" rx="2"/><rect x="484" y="460" width="70" height="20" rx="2"/><rect x="560" y="460" width="70" height="20" rx="2"/>
    </g>
    <line x1="215" y1="442" x2="285" y2="458" stroke="#B8B5AE" stroke-width="0.75" marker-end="url(#arrow05)"/>
    <text x="700" y="442" class="body" font-size="11" fill="#1A1A1A">Le transfert de la couche L<tspan font-style="italic">n</tspan> recouvre le calcul</text>
    <text x="700" y="462" class="body" font-size="11" fill="#1A1A1A">de L<tspan font-style="italic">n+1</tspan> : la latence réseau disparaît derrière</text>
    <text x="700" y="482" class="body" font-size="11" fill="#1A1A1A">le calcul. Exploité par DistServe et Mooncake.</text>
  </g>

  <!-- POINT DE BASCULE (interactive) -->
  <g class="interactive" data-card="point-bascule" tabindex="0" role="button" aria-label="Point de bascule : quand la désagrégation gagne">
    <rect x="60" y="530" width="1080" height="160" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
    <text x="84" y="558" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B7332C">LE POINT DE BASCULE</text>
    <!-- balance -->
    <text x="84" y="592" class="display" font-size="17" font-style="italic" fill="#1A1A1A">temps de transfert KV</text>
    <text x="372" y="592" class="display" font-size="20" fill="#5A5A5A">&lt;</text>
    <text x="398" y="592" class="display" font-size="17" font-style="italic" fill="#1A1A1A">temps de calcul libéré</text>
    <text x="700" y="592" class="body" font-size="13" font-weight="600" fill="#B7332C">→ la désagrégation gagne</text>
    <line x1="84" y1="612" x2="1116" y2="612" stroke="#E5E1D8" stroke-width="0.75"/>
    <text x="84" y="640" class="body" font-size="11.5" fill="#5A5A5A">Sous un lien lent (TCP) ou pour des prompts courts, le transfert dépasse le gain : <tspan font-weight="600" fill="#1A1A1A">le co-placement reste préférable</tspan>.</text>
    <text x="84" y="662" class="body" font-size="11.5" fill="#5A5A5A">D'où NIXL (NVIDIA Dynamo), qui déplace le KV <tspan font-weight="600" fill="#1A1A1A">directement de VRAM à VRAM</tspan> derrière 5 backends (RDMA/IB, RoCE, TCP, NVMe-oF, S3),</text>
    <text x="84" y="684" class="body" font-size="11.5" fill="#5A5A5A">et le routage cache-aware, qui évite carrément le transfert quand le préfixe est déjà chaud sur le bon nœud.</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="760" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Qin et al. (Mooncake — 87/190 Go/s RDMA RoCE) ; NVIDIA (Dynamo/NIXL) ; Zhong et al. (DistServe — recouvrement).</text>
</svg>
