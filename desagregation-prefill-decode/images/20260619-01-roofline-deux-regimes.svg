<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive:hover .hot { fill-opacity: 0.16; }
    </style>
    <marker id="ar01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le roofline des deux régimes</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Prefill compute-bound, decode memory-bound : deux profils opposés sur la même puce</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- AXES -->
  <line x1="200" y1="680" x2="1080" y2="680" stroke="#1A1A1A" stroke-width="1.2"/>
  <line x1="200" y1="680" x2="200" y2="220" stroke="#1A1A1A" stroke-width="1.2"/>
  <text x="640" y="730" class="mono" font-size="12" letter-spacing="0.1em" fill="#5A5A5A" text-anchor="middle">INTENSITÉ ARITHMÉTIQUE · opérations par octet lu →</text>
  <text x="150" y="450" class="mono" font-size="12" letter-spacing="0.1em" fill="#5A5A5A" text-anchor="middle" transform="rotate(-90 150 450)">DÉBIT ATTEIGNABLE · FLOP/s →</text>

  <!-- ROOFLINE -->
  <!-- memory roof (diagonal) -->
  <line x1="200" y1="680" x2="560" y2="300" stroke="#1F5560" stroke-width="2.5"/>
  <!-- compute roof (plateau) -->
  <line x1="560" y1="300" x2="1080" y2="300" stroke="#B7332C" stroke-width="2.5"/>

  <!-- DECODE ZONE (left, under diagonal) -->
  <g class="interactive" data-card="decode" tabindex="0" role="button" aria-label="Zone decode — memory-bound">
    <polygon class="hot" points="200,680 560,300 560,680" fill="#1F5560" fill-opacity="0.08"/>
    <circle cx="345" cy="535" r="7" fill="#1F5560"/>
    <text x="362" y="540" class="body" font-size="15" font-weight="600" fill="#1F5560">DECODE</text>
    <text x="362" y="560" class="body" font-size="13" fill="#5A5A5A">1 token/pas · relit tout le KV cache</text>
    <text x="362" y="578" class="body" font-size="13" fill="#5A5A5A">→ mur de la bande passante (HBM)</text>
    <text x="300" y="630" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">memory-bound</text>
  </g>

  <!-- PREFILL ZONE (right, under plateau) -->
  <g class="interactive" data-card="prefill" tabindex="0" role="button" aria-label="Zone prefill — compute-bound">
    <rect class="hot" x="560" y="300" width="520" height="380" fill="#B7332C" fill-opacity="0.06"/>
    <circle cx="850" cy="360" r="7" fill="#B7332C"/>
    <text x="867" y="365" class="body" font-size="15" font-weight="600" fill="#B7332C">PREFILL</text>
    <text x="867" y="385" class="body" font-size="13" fill="#5A5A5A">tout le prompt en un passage parallèle</text>
    <text x="867" y="403" class="body" font-size="13" fill="#5A5A5A">→ sature les tensor cores</text>
    <text x="820" y="640" class="mono" font-size="11" fill="#B7332C" text-anchor="middle">compute-bound</text>
  </g>

  <!-- RIDGE POINT -->
  <g class="interactive" data-card="ridge" tabindex="0" role="button" aria-label="Point d'inflexion — ridge point">
    <circle class="hot" cx="560" cy="300" r="26" fill="#1A1A1A" fill-opacity="0.06"/>
    <circle cx="560" cy="300" r="6" fill="#1A1A1A"/>
    <line x1="560" y1="300" x2="560" y2="680" stroke="#9A9A9A" stroke-width="0.8" stroke-dasharray="3 4"/>
    <text x="560" y="262" class="body" font-size="13" font-style="italic" fill="#1A1A1A" text-anchor="middle">point d'inflexion</text>
    <text x="560" y="700" class="mono" font-size="10" fill="#9A9A9A" text-anchor="middle">intensité critique</text>
  </g>

  <!-- CEILING -->
  <g class="interactive" data-card="ceiling" tabindex="0" role="button" aria-label="Plafond matériel — pic de calcul">
    <rect class="hot" x="600" y="276" width="480" height="22" fill="#B7332C" fill-opacity="0.0"/>
    <text x="1075" y="292" class="body" font-size="13" font-weight="600" fill="#B7332C" text-anchor="end">pic de calcul (FLOPS)</text>
    <text x="208" y="455" class="body" font-size="13" font-weight="600" fill="#1F5560">pente = bande passante HBM</text>
  </g>

  <!-- caption strip -->
  <text x="60" y="775" class="body" font-size="13" font-style="italic" fill="#5A5A5A">Co-loger les deux phases force un batch trop petit pour saturer le calcul, trop gros pour tenir les latences. Cliquer une zone pour le détail.</text>
</svg>
