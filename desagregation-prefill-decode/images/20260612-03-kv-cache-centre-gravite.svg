<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arr03" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="64" y="58" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 03</text>
  <text x="64" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Le KV cache, centre de gravité</text>
  <text x="64" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Transférer l'octet de cache devient le vrai goulot — la VRAM, la DRAM et le SSD du cluster forment un pool unique.</text>
  <line x1="64" y1="150" x2="1136" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- VRAM-to-VRAM transfer (NIXL) -->
  <g class="interactive" data-card="nixl-vram" tabindex="0" role="button" aria-label="Transfert VRAM vers VRAM (NIXL)">
    <rect x="120" y="200" width="200" height="92" rx="4" fill="#B7332C" opacity="0.06"/>
    <rect x="120" y="200" width="200" height="92" rx="4" fill="none" stroke="#B7332C" stroke-width="1.25"/>
    <text x="220" y="232" class="body" font-size="13.5" font-weight="600" fill="#B7332C" text-anchor="middle">VRAM prefill</text>
    <text x="220" y="256" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">KV calculé</text>
    <text x="220" y="276" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">~0,1–2 Go / req</text>

    <rect x="880" y="200" width="200" height="92" rx="4" fill="#1F5560" opacity="0.06"/>
    <rect x="880" y="200" width="200" height="92" rx="4" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <text x="980" y="232" class="body" font-size="13.5" font-weight="600" fill="#1F5560" text-anchor="middle">VRAM decode</text>
    <text x="980" y="256" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">KV reçu</text>
    <text x="980" y="276" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">génère la suite</text>

    <line x1="320" y1="246" x2="872" y2="246" stroke="#1F5560" stroke-width="2.5" marker-end="url(#arr03)"/>
    <rect x="540" y="222" width="120" height="26" rx="13" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="600" y="240" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">NIXL · RDMA</text>
    <text x="600" y="208" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">non bloquant — &gt; 4,5 Go/s requis</text>
  </g>

  <!-- Distributed KV pool: memory hierarchy -->
  <g class="interactive" data-card="dram-ssd-pool" tabindex="0" role="button" aria-label="Pool de KV cache DRAM / SSD (Mooncake)">
    <text x="600" y="346" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Pool de KV cache distribué — ressources sous-utilisées du cluster (Mooncake)</text>
    <rect x="220" y="364" width="240" height="74" rx="3" fill="#1F5560" opacity="0.18" stroke="#1F5560" stroke-width="1"/>
    <text x="340" y="394" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">VRAM (HBM)</text>
    <text x="340" y="414" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">rapide · petite · chère</text>
    <rect x="480" y="364" width="240" height="74" rx="3" fill="#1F5560" opacity="0.10" stroke="#1F5560" stroke-width="1"/>
    <text x="600" y="394" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">DRAM (CPU)</text>
    <text x="600" y="414" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">tiède · vaste</text>
    <rect x="740" y="364" width="240" height="74" rx="3" fill="#1F5560" opacity="0.05" stroke="#1F5560" stroke-width="1"/>
    <text x="860" y="394" class="body" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">SSD</text>
    <text x="860" y="414" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">froid · énorme · lent</text>
    <text x="600" y="462" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">↞ bande passante décroissante · capacité croissante ↠</text>
  </g>

  <!-- Pipelined transfer mini-timeline -->
  <g class="interactive" data-card="pipelined-transfer" tabindex="0" role="button" aria-label="Transfert pipeliné couche par couche">
    <rect x="120" y="510" width="470" height="180" rx="4" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
    <text x="142" y="540" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Transfert pipeliné couche par couche</text>
    <text x="142" y="560" class="mono" font-size="10.5" fill="#5A5A5A">recouvre calcul (prefill) et I/O réseau</text>
    <!-- compute bars -->
    <text x="142" y="592" class="mono" font-size="10" fill="#B7332C">calcul</text>
    <rect x="200" y="582" width="70" height="14" rx="2" fill="#B7332C" opacity="0.5"/>
    <rect x="276" y="582" width="70" height="14" rx="2" fill="#B7332C" opacity="0.5"/>
    <rect x="352" y="582" width="70" height="14" rx="2" fill="#B7332C" opacity="0.5"/>
    <rect x="428" y="582" width="70" height="14" rx="2" fill="#B7332C" opacity="0.5"/>
    <!-- transfer bars offset -->
    <text x="142" y="624" class="mono" font-size="10" fill="#1F5560">transfert</text>
    <rect x="276" y="614" width="70" height="14" rx="2" fill="#1F5560" opacity="0.5"/>
    <rect x="352" y="614" width="70" height="14" rx="2" fill="#1F5560" opacity="0.5"/>
    <rect x="428" y="614" width="70" height="14" rx="2" fill="#1F5560" opacity="0.5"/>
    <rect x="504" y="614" width="70" height="14" rx="2" fill="#1F5560" opacity="0.5"/>
    <text x="200" y="660" class="mono" font-size="9.5" fill="#5A5A5A">L1   L2   L3   L4 …  les couches partent dès qu'elles sont prêtes</text>
  </g>

  <!-- Prefix reuse -->
  <g class="interactive" data-card="prefix-reuse" tabindex="0" role="button" aria-label="Réutilisation de préfixe">
    <rect x="620" y="510" width="460" height="180" rx="4" fill="#B58A2C" opacity="0.06"/>
    <rect x="620" y="510" width="460" height="180" rx="4" fill="none" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="642" y="540" class="body" font-size="13" font-weight="600" fill="#B58A2C">Réutilisation de préfixe</text>
    <text x="642" y="566" class="body" font-size="12" fill="#5A5A5A">Un prompt système partagé entre milliers de</text>
    <text x="642" y="584" class="body" font-size="12" fill="#5A5A5A">requêtes n'est calculé qu'une fois ; son KV sert à tous.</text>
    <rect x="642" y="602" width="120" height="30" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1"/>
    <text x="702" y="622" class="mono" font-size="10.5" fill="#1A1A1A" text-anchor="middle">préfixe partagé</text>
    <line x1="762" y1="617" x2="800" y2="617" stroke="#B58A2C" stroke-width="1" marker-end="url(#arr03)"/>
    <text x="900" y="612" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">+59 % à +498 %</text>
    <text x="900" y="630" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">de capacité (traces réelles)</text>
    <text x="642" y="668" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Le calcul n'est plus roi — l'octet de cache l'est.</text>
  </g>

  <!-- Footer -->
  <line x1="64" y1="724" x2="1136" y2="724" stroke="#E5E1D8" stroke-width="1"/>
  <text x="64" y="756" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : Mooncake (FAST 2025) ; NVIDIA Dynamo / NIXL (2025) ; DistServe (OSDI 2024).</text>
</svg>
