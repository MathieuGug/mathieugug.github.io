<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
    .interactive:hover rect, .interactive:focus rect { stroke-width: 2.5; }
  </style>
  <defs>
    <marker id="arr01" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="80" y="62" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 01</text>
  <text x="80" y="104" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Deux phases, deux profils matériels opposés</text>
  <text x="80" y="136" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Le prefill sature le calcul ; le decode sature la mémoire. Colocalisés, ils se gênent.</text>
  <line x1="80" y1="158" x2="1120" y2="158" stroke="#E5E1D8" stroke-width="1"/>

  <!-- PREFILL panel -->
  <g class="interactive" data-card="prefill-phase" tabindex="0" role="button" aria-label="Prefill — compute-bound">
    <rect x="80" y="200" width="450" height="320" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
    <text x="104" y="240" class="display" font-size="22" font-weight="600" fill="#B7332C">Prefill</text>
    <text x="104" y="266" class="body" font-size="13" font-weight="500" fill="#5A5A5A">Ingestion du prompt · compute-bound</text>
    <text x="104" y="300" class="body" font-size="13" fill="#1A1A1A">Tout le prompt traité en un passage</text>
    <text x="104" y="320" class="body" font-size="13" fill="#1A1A1A">avant. Écrit le KV cache. Émet le</text>
    <text x="104" y="340" class="body" font-size="13" fill="#1A1A1A">premier token. Coût ∝ tokens d'entrée.</text>
    <!-- utilization bars -->
    <text x="104" y="386" class="mono" font-size="11" fill="#5A5A5A">CALCUL (tensor)</text>
    <rect x="104" y="394" width="402" height="16" rx="2" fill="#E5E1D8"/>
    <rect x="104" y="394" width="372" height="16" rx="2" fill="#B7332C"/>
    <text x="466" y="406" class="mono" font-size="11" fill="#FAF8F3" text-anchor="end">~90%</text>
    <text x="104" y="442" class="mono" font-size="11" fill="#5A5A5A">BANDE PASSANTE MÉMOIRE</text>
    <rect x="104" y="450" width="402" height="16" rx="2" fill="#E5E1D8"/>
    <rect x="104" y="450" width="120" height="16" rx="2" fill="#B7332C" fill-opacity="0.4"/>
    <text x="104" y="498" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Veut : GPU récents, parallélisme tensoriel → TTFT court</text>
  </g>

  <!-- DECODE panel -->
  <g class="interactive" data-card="decode-phase" tabindex="0" role="button" aria-label="Decode — memory-bound">
    <rect x="670" y="200" width="450" height="320" rx="3" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.25"/>
    <text x="694" y="240" class="display" font-size="22" font-weight="600" fill="#1F5560">Decode</text>
    <text x="694" y="266" class="body" font-size="13" font-weight="500" fill="#5A5A5A">Génération token-par-token · memory-bound</text>
    <text x="694" y="300" class="body" font-size="13" fill="#1A1A1A">Un token à la fois. Relit tous les poids</text>
    <text x="694" y="320" class="body" font-size="13" fill="#1A1A1A">+ tout le KV cache à chaque pas. Limité</text>
    <text x="694" y="340" class="body" font-size="13" fill="#1A1A1A">par la bande passante HBM, pas le calcul.</text>
    <text x="694" y="386" class="mono" font-size="11" fill="#5A5A5A">CALCUL (tensor)</text>
    <rect x="694" y="394" width="402" height="16" rx="2" fill="#E5E1D8"/>
    <rect x="694" y="394" width="92" height="16" rx="2" fill="#1F5560" fill-opacity="0.4"/>
    <text x="694" y="442" class="mono" font-size="11" fill="#5A5A5A">BANDE PASSANTE MÉMOIRE</text>
    <rect x="694" y="450" width="402" height="16" rx="2" fill="#E5E1D8"/>
    <rect x="694" y="450" width="384" height="16" rx="2" fill="#1F5560"/>
    <text x="1056" y="462" class="mono" font-size="11" fill="#FAF8F3" text-anchor="end">~95%</text>
    <text x="694" y="498" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Tolère : GPU moins chers, gros lot agrégé → TPOT régulier</text>
  </g>

  <!-- KV cache bridge -->
  <g class="interactive" data-card="kv-cache" tabindex="0" role="button" aria-label="KV cache — l'état partagé">
    <rect x="530" y="320" width="140" height="80" rx="3" fill="#B58A2C" fill-opacity="0.12" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="600" y="352" class="body" font-size="13" font-weight="600" fill="#B58A2C" text-anchor="middle">KV cache</text>
    <text x="600" y="372" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">écrit par prefill,</text>
    <text x="600" y="388" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">lu par decode</text>
    <line x1="506" y1="360" x2="528" y2="360" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arr01)"/>
    <line x1="672" y1="360" x2="692" y2="360" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arr01)"/>
  </g>

  <!-- Interference band -->
  <g class="interactive" data-card="interference" tabindex="0" role="button" aria-label="Interférence en colocalisation">
    <rect x="80" y="572" width="1040" height="118" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25" stroke-dasharray="2 3"/>
    <circle cx="110" cy="602" r="9" fill="#B7332C"/>
    <text x="110" y="606" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">!</text>
    <text x="132" y="606" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Colocalisés sur un même GPU (continuous batching), ils se gênent dans les deux sens :</text>
    <text x="132" y="636" class="body" font-size="13" fill="#1A1A1A">→ un long prefill bloque les decodes des autres requêtes (pic de TPOT) ;</text>
    <text x="132" y="660" class="body" font-size="13" fill="#1A1A1A">→ intercaler des decodes memory-bound dilue l'utilisation compute du prefill.</text>
    <text x="132" y="682" class="body" font-size="12" font-style="italic" fill="#B7332C">Interférence structurelle : on ne la règle pas par l'ordonnancement — les deux veulent des ressources antagonistes au même instant.</text>
  </g>

  <!-- Footer -->
  <line x1="80" y1="724" x2="1120" y2="724" stroke="#E5E1D8" stroke-width="1"/>
  <text x="80" y="752" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : DistServe, OSDI 2024 (arXiv:2401.09670) ; Splitwise, ISCA 2024 (arXiv:2311.18677). Pourcentages d'utilisation illustratifs.</text>
</svg>
