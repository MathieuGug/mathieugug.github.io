<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
    .interactive:hover rect, .interactive:focus rect { stroke-width: 2.5; }
    .interactive:hover line, .interactive:focus line { stroke-width: 3; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="80" y="62" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 02</text>
  <text x="80" y="104" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Le throughput ment, le goodput dit vrai</text>
  <text x="80" y="136" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Seules comptent les requêtes qui respectent simultanément leurs deux SLO de latence.</text>
  <line x1="80" y1="158" x2="1120" y2="158" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Plot frame: x = TTFT (200..820), y = TPOT (560 bottom .. 220 top) -->
  <!-- axes -->
  <line x1="200" y1="560" x2="200" y2="220" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="200" y1="560" x2="820" y2="560" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="200" y="592" class="body" font-size="13" font-weight="500" fill="#1A1A1A">TTFT (Time To First Token) — gouverné par le prefill →</text>
  <text x="150" y="390" class="body" font-size="13" font-weight="500" fill="#1A1A1A" transform="rotate(-90 150 390)">TPOT (Time Per Output Token) — gouverné par le decode →</text>

  <!-- Goodput zone: lower-left rectangle under both thresholds -->
  <g class="interactive" data-card="goodput-zone" tabindex="0" role="button" aria-label="Zone de goodput">
    <rect x="200" y="420" width="320" height="140" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-width="1.25"/>
    <text x="360" y="500" class="display" font-size="17" font-style="italic" fill="#2F5D3F" text-anchor="middle">zone de goodput</text>
    <text x="360" y="524" class="body" font-size="11" fill="#2F5D3F" text-anchor="middle">les deux SLO respectés</text>
  </g>

  <!-- TTFT SLO threshold (vertical) -->
  <g class="interactive" data-card="ttft-slo" tabindex="0" role="button" aria-label="Seuil SLO TTFT">
    <line x1="520" y1="560" x2="520" y2="220" stroke="#B7332C" stroke-width="2" stroke-dasharray="5 4"/>
    <rect x="528" y="232" width="150" height="40" rx="3" fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1"/>
    <text x="540" y="252" class="mono" font-size="11" font-weight="600" fill="#B7332C">SLO TTFT</text>
    <text x="540" y="267" class="body" font-size="10" fill="#5A5A5A">budget de réactivité</text>
  </g>

  <!-- TPOT SLO threshold (horizontal) -->
  <g class="interactive" data-card="tpot-slo" tabindex="0" role="button" aria-label="Seuil SLO TPOT">
    <line x1="200" y1="420" x2="820" y2="420" stroke="#1F5560" stroke-width="2" stroke-dasharray="5 4"/>
    <rect x="640" y="430" width="160" height="40" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1"/>
    <text x="652" y="450" class="mono" font-size="11" font-weight="600" fill="#1F5560">SLO TPOT</text>
    <text x="652" y="465" class="body" font-size="10" fill="#5A5A5A">budget de fluidité</text>
  </g>

  <!-- points: green inside zone, red outside -->
  <circle cx="270" cy="500" r="6" fill="#2F5D3F"/>
  <circle cx="330" cy="460" r="6" fill="#2F5D3F"/>
  <circle cx="420" cy="520" r="6" fill="#2F5D3F"/>
  <circle cx="470" cy="445" r="6" fill="#2F5D3F"/>
  <circle cx="380" cy="490" r="6" fill="#2F5D3F"/>
  <!-- outside (violations) -->
  <circle cx="600" cy="500" r="6" fill="#B7332C"/>
  <circle cx="680" cy="350" r="6" fill="#B7332C"/>
  <circle cx="560" cy="330" r="6" fill="#B7332C"/>
  <circle cx="450" cy="320" r="6" fill="#B7332C"/>
  <circle cx="730" cy="470" r="6" fill="#B7332C"/>
  <circle cx="290" cy="300" r="6" fill="#B7332C"/>

  <!-- Throughput trap callout -->
  <g class="interactive" data-card="throughput-trap" tabindex="0" role="button" aria-label="Le piège du throughput">
    <rect x="880" y="230" width="240" height="330" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="900" y="262" class="display" font-size="16" font-weight="600" fill="#B58A2C">Le piège</text>
    <circle cx="906" cy="298" r="6" fill="#2F5D3F"/>
    <text x="922" y="302" class="body" font-size="12" fill="#1A1A1A">5 requêtes dans la zone</text>
    <circle cx="906" cy="326" r="6" fill="#B7332C"/>
    <text x="922" y="330" class="body" font-size="12" fill="#1A1A1A">6 hors contrat</text>
    <line x1="900" y1="350" x2="1100" y2="350" stroke="#E5E1D8" stroke-width="1"/>
    <text x="900" y="384" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Throughput = 11</text>
    <text x="900" y="404" class="body" font-size="11" fill="#5A5A5A">compte tous les points</text>
    <text x="900" y="436" class="body" font-size="13" font-weight="600" fill="#2F5D3F">Goodput = 5</text>
    <text x="900" y="456" class="body" font-size="11" fill="#5A5A5A">ne compte que la zone</text>
    <text x="900" y="500" class="body" font-size="11" font-style="italic" fill="#B58A2C">Empiler de gros lots gonfle</text>
    <text x="900" y="516" class="body" font-size="11" font-style="italic" fill="#B58A2C">le throughput et détruit</text>
    <text x="900" y="532" class="body" font-size="11" font-style="italic" fill="#B58A2C">les latences individuelles.</text>
  </g>

  <!-- DistServe punchline -->
  <rect x="200" y="610" width="620" height="74" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1"/>
  <text x="224" y="640" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Raisonner en goodput rend la désagrégation nécessaire :</text>
  <text x="224" y="666" class="body" font-size="13" fill="#1A1A1A">DistServe sert 7,4× plus de requêtes, ou tient un SLO 12,6× plus serré, à latence tenue.</text>

  <line x1="80" y1="724" x2="1120" y2="724" stroke="#E5E1D8" stroke-width="1"/>
  <text x="80" y="752" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : DistServe, OSDI 2024 (arXiv:2401.09670). Nuage de points schématique.</text>
</svg>
