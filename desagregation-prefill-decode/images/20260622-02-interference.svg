<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    text { fill: #1A1A1A; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="98" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em">L'interférence en colocation</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Un prefill long fige les decodes en cours — head-of-line blocking</text>
  <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <text x="60" y="196" class="body" font-size="13" fill="#5A5A5A">temps →</text>

  <!-- Decode lanes (ongoing decode) -->
  <g class="interactive" data-card="ongoing-decode" tabindex="0" role="button" aria-label="Decodes en cours — détails">
    <rect x="56" y="216" width="1088" height="240" rx="3" fill="#B7332C" fill-opacity="0.04" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="2 3"/>
    <text x="72" y="244" class="mono" font-size="12" fill="#B7332C">DECODES EN COURS</text>
    <!-- lane labels -->
    <text x="72" y="296" class="body" font-size="13" fill="#5A5A5A">req A</text>
    <text x="72" y="356" class="body" font-size="13" fill="#5A5A5A">req B</text>
    <text x="72" y="416" class="body" font-size="13" fill="#5A5A5A">req C</text>
    <!-- ticks: pre-prefill (x 140..540 step 44), gap 556..720, post (x 744..) -->
    <!-- lane A y=280 -->
    <g fill="#B7332C">
      <rect x="140" y="280" width="12" height="24"/><rect x="184" y="280" width="12" height="24"/><rect x="228" y="280" width="12" height="24"/><rect x="272" y="280" width="12" height="24"/><rect x="316" y="280" width="12" height="24"/><rect x="360" y="280" width="12" height="24"/><rect x="404" y="280" width="12" height="24"/><rect x="448" y="280" width="12" height="24"/><rect x="492" y="280" width="12" height="24"/>
      <rect x="752" y="280" width="12" height="24"/><rect x="796" y="280" width="12" height="24"/><rect x="840" y="280" width="12" height="24"/><rect x="884" y="280" width="12" height="24"/><rect x="928" y="280" width="12" height="24"/><rect x="972" y="280" width="12" height="24"/><rect x="1016" y="280" width="12" height="24"/><rect x="1060" y="280" width="12" height="24"/>
    </g>
    <!-- lane B y=340 -->
    <g fill="#B7332C">
      <rect x="140" y="340" width="12" height="24"/><rect x="184" y="340" width="12" height="24"/><rect x="228" y="340" width="12" height="24"/><rect x="272" y="340" width="12" height="24"/><rect x="316" y="340" width="12" height="24"/><rect x="360" y="340" width="12" height="24"/><rect x="404" y="340" width="12" height="24"/><rect x="448" y="340" width="12" height="24"/><rect x="492" y="340" width="12" height="24"/>
      <rect x="752" y="340" width="12" height="24"/><rect x="796" y="340" width="12" height="24"/><rect x="840" y="340" width="12" height="24"/><rect x="884" y="340" width="12" height="24"/><rect x="928" y="340" width="12" height="24"/><rect x="972" y="340" width="12" height="24"/><rect x="1016" y="340" width="12" height="24"/><rect x="1060" y="340" width="12" height="24"/>
    </g>
    <!-- lane C y=400 -->
    <g fill="#B7332C">
      <rect x="140" y="400" width="12" height="24"/><rect x="184" y="400" width="12" height="24"/><rect x="228" y="400" width="12" height="24"/><rect x="272" y="400" width="12" height="24"/><rect x="316" y="400" width="12" height="24"/><rect x="360" y="400" width="12" height="24"/><rect x="404" y="400" width="12" height="24"/><rect x="448" y="400" width="12" height="24"/><rect x="492" y="400" width="12" height="24"/>
      <rect x="752" y="400" width="12" height="24"/><rect x="796" y="400" width="12" height="24"/><rect x="840" y="400" width="12" height="24"/><rect x="884" y="400" width="12" height="24"/><rect x="928" y="400" width="12" height="24"/><rect x="972" y="400" width="12" height="24"/><rect x="1016" y="400" width="12" height="24"/><rect x="1060" y="400" width="12" height="24"/>
    </g>
  </g>

  <!-- Prefill injection block -->
  <g class="interactive" data-card="prefill-injection" tabindex="0" role="button" aria-label="Injection d'un prefill — détails">
    <rect x="556" y="262" width="164" height="170" rx="3" fill="#1F5560" fill-opacity="0.85" stroke="#1F5560" stroke-width="1.5"/>
    <text x="638" y="338" class="display" font-size="18" font-weight="600" fill="#FAF8F3" text-anchor="middle">PREFILL</text>
    <text x="638" y="362" class="body" font-size="13" fill="#FAF8F3" text-anchor="middle">long prompt</text>
    <text x="638" y="240" class="body" font-size="12" fill="#1F5560" text-anchor="middle">inséré dans le batch</text>
  </g>

  <!-- HOL blocking gap -->
  <g class="interactive" data-card="hol-blocking" tabindex="0" role="button" aria-label="Head-of-line blocking — détails">
    <rect x="504" y="466" width="240" height="56" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="624" y="490" class="mono" font-size="12" fill="#B7332C" text-anchor="middle">HEAD-OF-LINE BLOCKING</text>
    <text x="624" y="510" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">tous les decodes en pause</text>
    <line x1="556" y1="456" x2="556" y2="262" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="3 3"/>
    <line x1="720" y1="456" x2="720" y2="262" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="3 3"/>
  </g>

  <!-- SLO violation / TBT spike -->
  <g class="interactive" data-card="slo-violation" tabindex="0" role="button" aria-label="Violation de SLO — détails">
    <!-- normal TBT bracket -->
    <line x1="152" y1="588" x2="196" y2="588" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="152" y1="582" x2="152" y2="594" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="196" y1="582" x2="196" y2="594" stroke="#5A5A5A" stroke-width="1"/>
    <text x="210" y="592" class="body" font-size="12" fill="#5A5A5A">TBT normal ≈ quelques ms</text>
    <!-- spike bracket -->
    <line x1="504" y1="588" x2="752" y2="588" stroke="#B7332C" stroke-width="2"/>
    <line x1="504" y1="580" x2="504" y2="596" stroke="#B7332C" stroke-width="2"/>
    <line x1="752" y1="580" x2="752" y2="596" stroke="#B7332C" stroke-width="2"/>
    <text x="628" y="624" class="mono" font-size="15" font-weight="500" fill="#B7332C" text-anchor="middle">TBT en pic ↑ jusqu'à 28,3×</text>
    <rect x="56" y="652" width="1088" height="56" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="0.75"/>
    <text x="72" y="686" class="body" font-size="14" fill="#1A1A1A">Le flux figé viole le SLO de TBT : pour l'utilisateur, l'écran se bloque le temps du prefill.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="744" x2="1140" y2="744" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : Sarathi-Serve (OSDI 2024), pic TBT jusqu'à 28,3×. Schéma : Mathieu Guglielmino.</text>
</svg>
