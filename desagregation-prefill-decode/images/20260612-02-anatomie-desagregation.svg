<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arr02" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    </marker>
    <marker id="arr02f" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#B58A2C" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="64" y="58" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 02</text>
  <text x="64" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Anatomie d'un serveur désagrégé</text>
  <text x="64" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Deux pools spécialisés reliés par un transfert de KV cache, pilotés par un ordonnanceur sous contrainte SLO.</text>
  <line x1="64" y1="150" x2="1136" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Requests in -->
  <text x="70" y="300" class="body" font-size="12" fill="#5A5A5A">requêtes</text>
  <line x1="70" y1="318" x2="118" y2="318" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr02)"/>

  <!-- Router / scheduler -->
  <g class="interactive" data-card="router-scheduler" tabindex="0" role="button" aria-label="Routeur et ordonnanceur">
    <rect x="128" y="260" width="170" height="120" rx="4" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="213" y="304" class="body" font-size="15" font-weight="600" fill="#1A1A1A" text-anchor="middle">Routeur</text>
    <text x="213" y="324" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle">ordonnanceur</text>
    <text x="213" y="350" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">choisit P, gère P:D</text>
  </g>
  <line x1="298" y1="320" x2="356" y2="320" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr02)"/>

  <!-- Prefill pool -->
  <g class="interactive" data-card="prefill-pool" tabindex="0" role="button" aria-label="Pool de prefill">
    <rect x="366" y="230" width="220" height="240" rx="4" fill="#B7332C" opacity="0.06"/>
    <rect x="366" y="230" width="220" height="240" rx="4" fill="none" stroke="#B7332C" stroke-width="1.25"/>
    <text x="476" y="262" class="body" font-size="15" font-weight="600" fill="#B7332C" text-anchor="middle">Pool PREFILL</text>
    <text x="476" y="282" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">compute-bound · H100 / B200</text>
    <rect x="392" y="300" width="168" height="44" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="476" y="327" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">GPU · TP fort</text>
    <rect x="392" y="356" width="168" height="44" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
    <text x="476" y="383" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">GPU · TP fort</text>
    <text x="476" y="436" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">calcule le KV du prompt</text>
  </g>

  <!-- KV transfer -->
  <line x1="586" y1="350" x2="636" y2="350" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr02)"/>
  <g class="interactive" data-card="kv-transfer" tabindex="0" role="button" aria-label="Transfert du KV cache">
    <rect x="646" y="300" width="160" height="100" rx="4" fill="#1F5560" opacity="0.07"/>
    <rect x="646" y="300" width="160" height="100" rx="4" fill="none" stroke="#1F5560" stroke-width="1.25" stroke-dasharray="4 3"/>
    <text x="726" y="338" class="body" font-size="14" font-weight="600" fill="#1F5560" text-anchor="middle">Transfert KV</text>
    <text x="726" y="360" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">RDMA / NVLink / NIXL</text>
    <text x="726" y="378" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">pipeliné couche/couche</text>
  </g>
  <line x1="806" y1="350" x2="856" y2="350" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr02)"/>

  <!-- Decode pool -->
  <g class="interactive" data-card="decode-pool" tabindex="0" role="button" aria-label="Pool de decode">
    <rect x="866" y="230" width="220" height="240" rx="4" fill="#1F5560" opacity="0.06"/>
    <rect x="866" y="230" width="220" height="240" rx="4" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <text x="976" y="262" class="body" font-size="15" font-weight="600" fill="#1F5560" text-anchor="middle">Pool DECODE</text>
    <text x="976" y="282" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">memory-bound · H200 141 Go</text>
    <rect x="892" y="300" width="168" height="44" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="976" y="327" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">GPU · gros batch</text>
    <rect x="892" y="356" width="168" height="44" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="976" y="383" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">GPU · gros batch</text>
    <text x="976" y="436" class="body" font-size="11.5" fill="#5A5A5A" text-anchor="middle">génère token par token</text>
  </g>

  <!-- Stream out -->
  <line x1="1086" y1="320" x2="1130" y2="320" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr02)"/>
  <text x="1108" y="300" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">stream</text>

  <!-- SLO feedback loop -->
  <g class="interactive" data-card="slo-feedback" tabindex="0" role="button" aria-label="Boucle de feedback SLO">
    <path d="M 976 470 C 976 580, 213 580, 213 392" fill="none" stroke="#B58A2C" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr02f)"/>
    <rect x="470" y="556" width="260" height="48" rx="4" fill="#B58A2C" opacity="0.08"/>
    <text x="600" y="580" class="body" font-size="12.5" font-weight="600" fill="#B58A2C" text-anchor="middle">Feedback SLO</text>
    <text x="600" y="597" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">mesure TTFT / TPOT → rééquilibre le ratio P:D</text>
  </g>

  <!-- Footer -->
  <line x1="64" y1="724" x2="1136" y2="724" stroke="#E5E1D8" stroke-width="1"/>
  <text x="64" y="756" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : DistServe (OSDI 2024) ; Splitwise (ISCA 2024) ; NVIDIA Dynamo (2025).</text>
</svg>
