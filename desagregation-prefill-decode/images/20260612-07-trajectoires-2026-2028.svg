<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="64" y="58" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 07</text>
  <text x="64" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Trajectoires 2026-2028</text>
  <text x="64" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Désagréger à grain de plus en plus fin — et faire du cache un service de premier ordre.</text>
  <line x1="64" y1="150" x2="1136" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Timeline axis -->
  <line x1="320" y1="200" x2="1100" y2="200" stroke="#1A1A1A" stroke-width="1.25"/>
  <g class="mono" font-size="13" fill="#1A1A1A" text-anchor="middle">
    <circle cx="380" cy="200" r="4" fill="#1A1A1A"/><text x="380" y="186">2026</text>
    <circle cx="700" cy="200" r="4" fill="#1A1A1A"/><text x="700" y="186">2027</text>
    <circle cx="1020" cy="200" r="4" fill="#1A1A1A"/><text x="1020" y="186">2028</text>
  </g>

  <!-- Lane labels -->
  <text x="80" y="284" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Granularité</text>
  <text x="80" y="404" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Matériel</text>
  <text x="80" y="524" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Cache</text>
  <text x="80" y="644" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Modèle</text>

  <!-- Lane 1: attention disaggregation -->
  <g class="interactive" data-card="attention-disagg" tabindex="0" role="button" aria-label="Désagrégation à grain fin">
    <rect x="320" y="258" width="640" height="56" rx="6" fill="#B7332C" opacity="0.07"/>
    <rect x="320" y="258" width="640" height="56" rx="6" fill="none" stroke="#B7332C" stroke-width="1.25"/>
    <text x="340" y="284" class="body" font-size="13" font-weight="600" fill="#B7332C">Désagrégation de l'attention (Adrenaline) · prefills multi-tour (PPD)</text>
    <text x="340" y="303" class="mono" font-size="10.5" fill="#5A5A5A">la granularité descend de la phase vers l'opérateur</text>
  </g>

  <!-- Lane 2: cross-vendor -->
  <g class="interactive" data-card="cross-vendor" tabindex="0" role="button" aria-label="Matériel cross-vendor">
    <rect x="500" y="378" width="560" height="56" rx="6" fill="#1F5560" opacity="0.07"/>
    <rect x="500" y="378" width="560" height="56" rx="6" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <text x="520" y="404" class="body" font-size="13" font-weight="600" fill="#1F5560">Cross-vendor : prefill H100 · decode MI300X</text>
    <text x="520" y="423" class="mono" font-size="10.5" fill="#5A5A5A">chaque phase sur le silicium le plus rentable, sans frontière fabricant</text>
  </g>

  <!-- Lane 3: global cache -->
  <g class="interactive" data-card="global-cache" tabindex="0" role="button" aria-label="KVCache global / as-a-service">
    <rect x="560" y="498" width="500" height="56" rx="6" fill="#B58A2C" opacity="0.08"/>
    <rect x="560" y="498" width="500" height="56" rx="6" fill="none" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="580" y="524" class="body" font-size="13" font-weight="600" fill="#B58A2C">KVCache global · cache-as-a-service</text>
    <text x="580" y="543" class="mono" font-size="10.5" fill="#5A5A5A">cache partagé entre modèles et requêtes, préfixe à l'échelle de la flotte</text>
  </g>

  <!-- Lane 4: MoE expert-parallel -->
  <g class="interactive" data-card="moe-ep" tabindex="0" role="button" aria-label="Couplage MoE / parallélisme d'experts">
    <rect x="320" y="618" width="740" height="56" rx="6" fill="#2F5D3F" opacity="0.07"/>
    <rect x="320" y="618" width="740" height="56" rx="6" fill="none" stroke="#2F5D3F" stroke-width="1.25"/>
    <text x="340" y="644" class="body" font-size="13" font-weight="600" fill="#2F5D3F">Couplage avec le MoE · parallélisme d'experts à grande échelle</text>
    <text x="340" y="663" class="mono" font-size="10.5" fill="#5A5A5A">un schéma de distribution d'experts par phase (DeepSeek, Kimi K2)</text>
  </g>

  <!-- vertical year guides -->
  <line x1="380" y1="200" x2="380" y2="690" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="700" y1="200" x2="700" y2="690" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="1020" y1="200" x2="1020" y2="690" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="2 4"/>

  <!-- Footer -->
  <line x1="64" y1="724" x2="1136" y2="724" stroke="#E5E1D8" stroke-width="1"/>
  <text x="64" y="756" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : Adrenaline (arXiv 2503.20552) ; Mooncake (FAST 2025) ; déploiements LMSYS DeepSeek / Kimi K2. Horizons indicatifs.</text>
</svg>
