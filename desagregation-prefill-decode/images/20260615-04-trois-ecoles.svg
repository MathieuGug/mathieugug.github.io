<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
    .interactive:hover rect, .interactive:focus rect { stroke-width: 2.5; stroke: #B7332C; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="80" y="62" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 04</text>
  <text x="80" y="104" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Trois écoles de désagrégation</text>
  <text x="80" y="136" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Même idée, trois fonctions-objectif. Elles ne s'opposent pas : elles se sédimentent.</text>
  <line x1="80" y1="158" x2="1120" y2="158" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Column header grid lines -->
  <!-- columns: sys 80-300 | obj 300-540 | kvstore 540-780 | materiel 780-940 | resultat 940-1120 -->
  <line x1="80" y1="250" x2="1120" y2="250" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="80" y1="360" x2="1120" y2="360" stroke="#E5E1D8" stroke-width="1"/>
  <line x1="80" y1="470" x2="1120" y2="470" stroke="#E5E1D8" stroke-width="1"/>
  <line x1="80" y1="580" x2="1120" y2="580" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- Header labels -->
  <text x="92" y="232" class="mono" font-size="11" font-weight="600" letter-spacing="0.04em" fill="#5A5A5A">SYSTÈME · ANNÉE</text>
  <g class="interactive" data-card="dimension-objectif" tabindex="0" role="button" aria-label="Dimension : fonction-objectif">
    <rect x="300" y="200" width="240" height="50" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1"/>
    <text x="312" y="222" class="mono" font-size="11" font-weight="600" fill="#B7332C">FONCTION-OBJECTIF</text>
    <text x="312" y="240" class="body" font-size="10" font-style="italic" fill="#5A5A5A">ce que le système optimise</text>
  </g>
  <g class="interactive" data-card="dimension-kvstore" tabindex="0" role="button" aria-label="Dimension : KV store">
    <rect x="540" y="200" width="240" height="50" rx="3" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1"/>
    <text x="552" y="222" class="mono" font-size="11" font-weight="600" fill="#1F5560">KV STORE</text>
    <text x="552" y="240" class="body" font-size="10" font-style="italic" fill="#5A5A5A">gestion du cache</text>
  </g>
  <text x="792" y="232" class="mono" font-size="11" font-weight="600" letter-spacing="0.04em" fill="#5A5A5A">MATÉRIEL</text>
  <text x="952" y="232" class="mono" font-size="11" font-weight="600" letter-spacing="0.04em" fill="#5A5A5A">RÉSULTAT PHARE</text>

  <!-- Row 1 : DistServe -->
  <g class="interactive" data-card="distserve" tabindex="0" role="button" aria-label="DistServe">
    <rect x="80" y="250" width="220" height="110" fill="#B7332C" fill-opacity="0.04"/>
    <text x="92" y="290" class="display" font-size="18" font-weight="600" fill="#B7332C">DistServe</text>
    <text x="92" y="312" class="body" font-size="11" fill="#5A5A5A">OSDI 2024 · académique</text>
    <text x="92" y="336" class="body" font-size="11" font-style="italic" fill="#1A1A1A">l'école du goodput</text>
  </g>
  <text x="312" y="288" class="body" font-size="12" fill="#1A1A1A">Maximiser le goodput</text>
  <text x="312" y="306" class="body" font-size="11" fill="#5A5A5A">parallélisme co-optimisé</text>
  <text x="312" y="322" class="body" font-size="11" fill="#5A5A5A">par phase, sous TTFT/TPOT</text>
  <text x="552" y="288" class="body" font-size="12" fill="#1A1A1A">Transfert direct</text>
  <text x="552" y="306" class="body" font-size="11" fill="#5A5A5A">placement selon affinité</text>
  <text x="552" y="322" class="body" font-size="11" fill="#5A5A5A">réseau (NVLink proche)</text>
  <text x="792" y="294" class="body" font-size="12" fill="#1A1A1A">Homogène,</text>
  <text x="792" y="312" class="body" font-size="11" fill="#5A5A5A">placement soigné</text>
  <text x="952" y="288" class="mono" font-size="13" font-weight="600" fill="#B7332C">7,4× requêtes</text>
  <text x="952" y="308" class="body" font-size="11" fill="#5A5A5A">ou 12,6× SLO serré</text>

  <!-- Row 2 : Splitwise -->
  <g class="interactive" data-card="splitwise" tabindex="0" role="button" aria-label="Splitwise">
    <rect x="80" y="360" width="220" height="110" fill="#B58A2C" fill-opacity="0.04"/>
    <text x="92" y="400" class="display" font-size="18" font-weight="600" fill="#B58A2C">Splitwise</text>
    <text x="92" y="422" class="body" font-size="11" fill="#5A5A5A">ISCA 2024 · Microsoft</text>
    <text x="92" y="446" class="body" font-size="11" font-style="italic" fill="#1A1A1A">l'école de l'efficacité</text>
  </g>
  <text x="312" y="398" class="body" font-size="12" fill="#1A1A1A">Coût &amp; puissance</text>
  <text x="312" y="416" class="body" font-size="11" fill="#5A5A5A">decode sur matériel moins</text>
  <text x="312" y="432" class="body" font-size="11" fill="#5A5A5A">cher / moins énergivore</text>
  <text x="552" y="398" class="body" font-size="12" fill="#1A1A1A">Transfert direct</text>
  <text x="552" y="416" class="body" font-size="11" fill="#5A5A5A">+ pool mixte élastique</text>
  <text x="552" y="432" class="body" font-size="11" fill="#5A5A5A">pour absorber les pics</text>
  <text x="792" y="398" class="body" font-size="12" fill="#1A1A1A">Hétérogène</text>
  <text x="792" y="416" class="body" font-size="11" fill="#5A5A5A">2 pools + mixte</text>
  <text x="952" y="398" class="mono" font-size="13" font-weight="600" fill="#B58A2C">2,35× débit</text>
  <text x="952" y="418" class="body" font-size="11" fill="#5A5A5A">à coût/puissance constants</text>

  <!-- Row 3 : Mooncake -->
  <g class="interactive" data-card="mooncake" tabindex="0" role="button" aria-label="Mooncake">
    <rect x="80" y="470" width="220" height="110" fill="#1F5560" fill-opacity="0.04"/>
    <text x="92" y="510" class="display" font-size="18" font-weight="600" fill="#1F5560">Mooncake</text>
    <text x="92" y="532" class="body" font-size="11" fill="#5A5A5A">FAST 2025 · Moonshot/Kimi</text>
    <text x="92" y="556" class="body" font-size="11" font-style="italic" fill="#1A1A1A">l'école KVCache-centric</text>
  </g>
  <text x="312" y="508" class="body" font-size="12" fill="#1A1A1A">Débit effectif sous SLO</text>
  <text x="312" y="526" class="body" font-size="11" fill="#5A5A5A">échanger du stockage</text>
  <text x="312" y="542" class="body" font-size="11" fill="#5A5A5A">contre du calcul</text>
  <text x="552" y="508" class="body" font-size="12" font-weight="600" fill="#1F5560">KV store désagrégé</text>
  <text x="552" y="526" class="body" font-size="11" fill="#5A5A5A">CPU / DRAM / SSD récupérés,</text>
  <text x="552" y="542" class="body" font-size="11" fill="#5A5A5A">ordonnanceur KVCache-centric</text>
  <text x="792" y="508" class="body" font-size="12" fill="#1A1A1A">Cluster entier</text>
  <text x="792" y="526" class="body" font-size="11" fill="#5A5A5A">mémoire multi-étages</text>
  <text x="952" y="508" class="mono" font-size="13" font-weight="600" fill="#1F5560">+75% requêtes</text>
  <text x="952" y="528" class="body" font-size="11" fill="#5A5A5A">100 Md tokens/jour, prod réelle</text>

  <!-- Sediment note -->
  <rect x="80" y="610" width="1040" height="70" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="104" y="640" class="body" font-size="13" font-weight="600" fill="#1A1A1A">Sédimentation, pas concurrence :</text>
  <text x="104" y="664" class="body" font-size="12" fill="#1A1A1A">DistServe a donné la métrique, Splitwise l'argument économique, Mooncake la preuve de production et le pattern du KV store désagrégé que reprennent Dynamo et llm-d.</text>

  <line x1="80" y1="724" x2="1120" y2="724" stroke="#E5E1D8" stroke-width="1"/>
  <text x="80" y="752" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : DistServe (arXiv:2401.09670) ; Splitwise (arXiv:2311.18677) ; Mooncake (arXiv:2407.00079, FAST '25).</text>
</svg>
