<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    text { fill: #1A1A1A; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="98" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em">Cartographie des systèmes, 2024-2026</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Du papier de recherche au standard de fait du serving</text>
  <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Column headers -->
  <g class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">
    <text x="348" y="200">Disagg.</text><text x="348" y="216">natif</text>
    <text x="482" y="200">Transport</text><text x="482" y="216">KV</text>
    <text x="608" y="200">KV cache</text><text x="608" y="216">global</text>
    <text x="704" y="200">Ratio P:D</text><text x="704" y="216">dynamique</text>
    <text x="850" y="200">Échelle</text><text x="850" y="216">production</text>
    <text x="1043" y="200">Licence</text>
  </g>
  <line x1="64" y1="228" x2="1138" y2="228" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="300" y1="180" x2="300" y2="612" stroke="#E5E1D8" stroke-width="1"/>

  <!-- row separators -->
  <g stroke="#E5E1D8" stroke-width="0.5"><line x1="64" y1="312" x2="1138" y2="312"/><line x1="64" y1="372" x2="1138" y2="372"/><line x1="64" y1="432" x2="1138" y2="432"/><line x1="64" y1="492" x2="1138" y2="492"/><line x1="64" y1="552" x2="1138" y2="552"/></g>

  <!-- DistServe -->
  <g class="interactive" data-card="distserve" tabindex="0" role="button" aria-label="DistServe — détails">
    <rect x="64" y="228" width="1074" height="60" fill="#1F5560" fill-opacity="0.001"/>
    <text x="80" y="266" class="body" font-size="15" font-weight="600">DistServe</text>
    <text x="80" y="283" class="body" font-size="11" fill="#5A5A5A">OSDI 2024</text>
    <circle cx="348" cy="258" r="8" fill="#1F5560"/>
    <text x="482" y="263" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">interne</text>
    <circle cx="608" cy="258" r="8" fill="none" stroke="#B8B5AE" stroke-width="1.25"/>
    <circle cx="704" cy="258" r="8" fill="#1F5560"/>
    <text x="850" y="263" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">recherche</text>
    <text x="1043" y="263" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">académique</text>
  </g>

  <!-- Splitwise -->
  <g class="interactive" data-card="splitwise" tabindex="0" role="button" aria-label="Splitwise — détails">
    <rect x="64" y="288" width="1074" height="60" fill="#1F5560" fill-opacity="0.001"/>
    <text x="80" y="326" class="body" font-size="15" font-weight="600">Splitwise</text>
    <text x="80" y="343" class="body" font-size="11" fill="#5A5A5A">ISCA 2024 · Best Paper</text>
    <circle cx="348" cy="318" r="8" fill="#1F5560"/>
    <text x="482" y="323" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">back-plane</text>
    <circle cx="608" cy="318" r="8" fill="none" stroke="#B8B5AE" stroke-width="1.25"/>
    <path d="M704 310 A 8 8 0 0 1 704 326 Z" fill="#1F5560"/><circle cx="704" cy="318" r="8" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <text x="850" y="323" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Microsoft</text>
    <text x="1043" y="323" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">recherche</text>
  </g>

  <!-- Mooncake -->
  <g class="interactive" data-card="mooncake" tabindex="0" role="button" aria-label="Mooncake — détails">
    <rect x="64" y="348" width="1074" height="60" fill="#1F5560" fill-opacity="0.001"/>
    <text x="80" y="386" class="body" font-size="15" font-weight="600">Mooncake</text>
    <text x="80" y="403" class="body" font-size="11" fill="#5A5A5A">FAST 2025 · Best Paper</text>
    <circle cx="348" cy="378" r="8" fill="#1F5560"/>
    <text x="482" y="383" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">RDMA</text>
    <circle cx="608" cy="378" r="8" fill="#1F5560"/>
    <circle cx="704" cy="378" r="8" fill="#1F5560"/>
    <text x="850" y="383" class="body" font-size="12" fill="#B7332C" text-anchor="middle">Kimi · 100 Md tok/j</text>
    <text x="1043" y="383" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">open source</text>
  </g>

  <!-- Dynamo -->
  <g class="interactive" data-card="dynamo" tabindex="0" role="button" aria-label="NVIDIA Dynamo — détails">
    <rect x="64" y="408" width="1074" height="60" fill="#1F5560" fill-opacity="0.001"/>
    <text x="80" y="446" class="body" font-size="15" font-weight="600">NVIDIA Dynamo</text>
    <text x="80" y="463" class="body" font-size="11" fill="#5A5A5A">GTC 2025</text>
    <circle cx="348" cy="438" r="8" fill="#1F5560"/>
    <text x="482" y="443" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">NIXL</text>
    <circle cx="608" cy="438" r="8" fill="#1F5560"/>
    <circle cx="704" cy="438" r="8" fill="#1F5560"/>
    <text x="850" y="443" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">plateforme</text>
    <text x="1043" y="443" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">Apache 2.0</text>
  </g>

  <!-- vLLM + LMCache -->
  <g class="interactive" data-card="vllm" tabindex="0" role="button" aria-label="vLLM + LMCache — détails">
    <rect x="64" y="468" width="1074" height="60" fill="#1F5560" fill-opacity="0.001"/>
    <text x="80" y="506" class="body" font-size="15" font-weight="600">vLLM + LMCache</text>
    <text x="80" y="523" class="body" font-size="11" fill="#5A5A5A">expérimental</text>
    <path d="M348 430 A 8 8 0 0 1 348 446 Z" fill="#1F5560"/><circle cx="348" cy="498" r="8" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <path d="M348 490 A 8 8 0 0 1 348 506 Z" fill="#1F5560"/>
    <text x="482" y="503" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">NIXL / LMCache</text>
    <path d="M608 490 A 8 8 0 0 1 608 506 Z" fill="#1F5560"/><circle cx="608" cy="498" r="8" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <path d="M704 490 A 8 8 0 0 1 704 506 Z" fill="#1F5560"/><circle cx="704" cy="498" r="8" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <text x="850" y="503" class="body" font-size="12" fill="#B7332C" text-anchor="middle">LMSYS 96×H100</text>
    <text x="1043" y="503" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">open source</text>
  </g>

  <!-- SGLang / TensorRT-LLM -->
  <g class="interactive" data-card="sglang-trtllm" tabindex="0" role="button" aria-label="SGLang et TensorRT-LLM — détails">
    <rect x="64" y="528" width="1074" height="60" fill="#1F5560" fill-opacity="0.001"/>
    <text x="80" y="566" class="body" font-size="15" font-weight="600">SGLang / TensorRT-LLM</text>
    <text x="80" y="583" class="body" font-size="11" fill="#5A5A5A">écosystème</text>
    <path d="M348 550 A 8 8 0 0 1 348 566 Z" fill="#1F5560"/><circle cx="348" cy="558" r="8" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <text x="482" y="563" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">propre</text>
    <path d="M608 550 A 8 8 0 0 1 608 566 Z" fill="#1F5560"/><circle cx="608" cy="558" r="8" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <path d="M704 550 A 8 8 0 0 1 704 566 Z" fill="#1F5560"/><circle cx="704" cy="558" r="8" fill="none" stroke="#1F5560" stroke-width="1.25"/>
    <text x="850" y="563" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">production</text>
    <text x="1043" y="563" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">open / NVIDIA</text>
  </g>

  <!-- Legend -->
  <g transform="translate(64,632)">
    <circle cx="8" cy="0" r="8" fill="#1F5560"/><text x="24" y="5" class="body" font-size="12" fill="#5A5A5A">natif / mûr</text>
    <path d="M156 -8 A 8 8 0 0 1 156 8 Z" fill="#1F5560"/><circle cx="156" cy="0" r="8" fill="none" stroke="#1F5560" stroke-width="1.25"/><text x="172" y="5" class="body" font-size="12" fill="#5A5A5A">partiel / expérimental</text>
    <circle cx="396" cy="0" r="8" fill="none" stroke="#B8B5AE" stroke-width="1.25"/><text x="412" y="5" class="body" font-size="12" fill="#5A5A5A">absent</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="728" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Sources : papiers respectifs ; docs vLLM/Dynamo ; démo LMSYS (mai 2025). Schéma : Mathieu Guglielmino.</text>
</svg>
