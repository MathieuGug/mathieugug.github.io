<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    text { fill: #1A1A1A; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="98" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em">L'architecture désagrégée de référence</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Routeur → pool prefill → transfert KV → pool decode, sur un socle SLO</text>
  <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Router -->
  <g class="interactive" data-card="router" tabindex="0" role="button" aria-label="Routeur KV-aware — détails">
    <rect x="64" y="244" width="150" height="170" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="139" y="318" class="display" font-size="17" font-weight="600" text-anchor="middle">Routeur</text>
    <text x="139" y="342" class="body" font-size="13" fill="#5A5A5A" text-anchor="middle">KV-aware</text>
    <text x="139" y="226" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">requêtes →</text>
  </g>
  <line x1="222" y1="329" x2="252" y2="329" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Prefill pool -->
  <g class="interactive" data-card="prefill-pool" tabindex="0" role="button" aria-label="Pool prefill — détails">
    <rect x="262" y="224" width="190" height="212" rx="3" fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.25"/>
    <text x="357" y="252" class="display" font-size="17" font-weight="600" fill="#1F5560" text-anchor="middle">Pool prefill</text>
    <text x="357" y="274" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">peu de GPU haut de gamme</text>
    <rect x="286" y="292" width="64" height="56" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="318" y="324" class="mono" font-size="12" fill="#1F5560" text-anchor="middle">GPU</text>
    <rect x="362" y="292" width="64" height="56" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="394" y="324" class="mono" font-size="12" fill="#1F5560" text-anchor="middle">GPU</text>
    <text x="357" y="392" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle">compute-bound</text>
    <text x="357" y="414" class="mono" font-size="12" fill="#1F5560" text-anchor="middle">cible : TTFT</text>
  </g>
  <line x1="452" y1="329" x2="486" y2="329" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- KV transfer fabric -->
  <g class="interactive" data-card="kv-transfer" tabindex="0" role="button" aria-label="Transfert du KV cache — détails">
    <rect x="496" y="224" width="118" height="212" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="555" y="312" class="body" font-size="14" font-weight="600" fill="#B58A2C" text-anchor="middle">Transfert</text>
    <text x="555" y="334" class="body" font-size="14" font-weight="600" fill="#B58A2C" text-anchor="middle">KV</text>
    <text x="555" y="362" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">RDMA /</text>
    <text x="555" y="378" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">NVLink</text>
  </g>
  <line x1="614" y1="329" x2="636" y2="329" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Decode pool -->
  <g class="interactive" data-card="decode-pool" tabindex="0" role="button" aria-label="Pool decode — détails">
    <rect x="646" y="224" width="300" height="212" rx="3" fill="#B7332C" fill-opacity="0.07" stroke="#B7332C" stroke-width="1.25"/>
    <text x="796" y="252" class="display" font-size="17" font-weight="600" fill="#B7332C" text-anchor="middle">Pool decode</text>
    <text x="796" y="274" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">plus de GPU, moins chers</text>
    <g fill="#FAF8F3" stroke="#B7332C" stroke-width="0.75">
      <rect x="670" y="292" width="60" height="56" rx="3"/><rect x="738" y="292" width="60" height="56" rx="3"/><rect x="806" y="292" width="60" height="56" rx="3"/><rect x="874" y="292" width="60" height="56" rx="3"/>
    </g>
    <g class="mono" font-size="12" fill="#B7332C" text-anchor="middle"><text x="700" y="324">GPU</text><text x="768" y="324">GPU</text><text x="836" y="324">GPU</text><text x="904" y="324">GPU</text></g>
    <text x="796" y="392" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle">memory-bound</text>
    <text x="796" y="414" class="mono" font-size="12" fill="#B7332C" text-anchor="middle">cible : TBT</text>
  </g>
  <line x1="946" y1="329" x2="1010" y2="329" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="1016" y="334" class="body" font-size="13" fill="#5A5A5A">réponse →</text>

  <!-- KV store global -->
  <g class="interactive" data-card="kv-store" tabindex="0" role="button" aria-label="KV store global — détails">
    <rect x="262" y="478" width="684" height="74" rx="3" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="284" y="506" class="display" font-size="16" font-weight="600" fill="#B58A2C">KV store global</text>
    <text x="284" y="532" class="body" font-size="13" fill="#5A5A5A">mutualise DRAM · SSD · NIC du cluster — prefix cache partagé (ex. Mooncake Store)</text>
    <line x1="357" y1="436" x2="357" y2="478" stroke="#B58A2C" stroke-width="0.75" stroke-dasharray="3 3"/>
    <line x1="796" y1="436" x2="796" y2="478" stroke="#B58A2C" stroke-width="0.75" stroke-dasharray="3 3"/>
  </g>

  <!-- SLO planner spine -->
  <g class="interactive" data-card="slo-planner" tabindex="0" role="button" aria-label="SLO planner — détails">
    <rect x="64" y="592" width="882" height="64" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="0.75" stroke-dasharray="2 3"/>
    <text x="86" y="620" class="mono" font-size="12" letter-spacing="0.08em" fill="#1F5560">SLO PLANNER</text>
    <text x="86" y="642" class="body" font-size="13" fill="#1A1A1A">surveille capacité &amp; activité prefill, réajuste le ratio prefill/decode pour tenir les SLO sous trafic variable</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="744" x2="1140" y2="744" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="772" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Synthèse : DistServe, Splitwise, Mooncake, NVIDIA Dynamo. Schéma : Mathieu Guglielmino.</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#1A1A1A"/></marker>
  </defs>
</svg>
