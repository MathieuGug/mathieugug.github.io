<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    text { fill: #1A1A1A; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="98" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em">Le nerf de la guerre : le transfert du KV cache</text>
  <text x="60" y="128" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Recouvrir, transporter, ou éviter le transfert — les trois parades</text>
  <line x1="60" y1="148" x2="1140" y2="148" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Layerwise transfer -->
  <g class="interactive" data-card="layerwise-transfer" tabindex="0" role="button" aria-label="Transfert layer-by-layer — détails">
    <rect x="64" y="176" width="1076" height="220" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1.25"/>
    <text x="86" y="204" class="mono" font-size="12" letter-spacing="0.08em" fill="#5A5A5A">PARADE 1 — TRANSFERT LAYER-BY-LAYER PIPELINÉ</text>
    <text x="86" y="252" class="body" font-size="13" fill="#1F5560">calcul prefill</text>
    <text x="86" y="334" class="body" font-size="13" fill="#B7332C">transfert KV</text>
    <!-- compute blocks (teal) -->
    <g fill="#1F5560" fill-opacity="0.85">
      <rect x="208" y="232" width="84" height="40" rx="3"/><rect x="300" y="232" width="84" height="40" rx="3"/><rect x="392" y="232" width="84" height="40" rx="3"/><rect x="484" y="232" width="84" height="40" rx="3"/><rect x="576" y="232" width="84" height="40" rx="3"/><rect x="668" y="232" width="84" height="40" rx="3"/>
    </g>
    <g class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle"><text x="250" y="257">L1</text><text x="342" y="257">L2</text><text x="434" y="257">L3</text><text x="526" y="257">L4</text><text x="618" y="257">L5</text><text x="710" y="257">L6</text></g>
    <!-- transfer blocks (carmine), offset right -->
    <g fill="#B7332C" fill-opacity="0.85">
      <rect x="254" y="314" width="84" height="40" rx="3"/><rect x="346" y="314" width="84" height="40" rx="3"/><rect x="438" y="314" width="84" height="40" rx="3"/><rect x="530" y="314" width="84" height="40" rx="3"/><rect x="622" y="314" width="84" height="40" rx="3"/><rect x="714" y="314" width="84" height="40" rx="3"/>
    </g>
    <g class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle"><text x="296" y="339">L1</text><text x="388" y="339">L2</text><text x="480" y="339">L3</text><text x="572" y="339">L4</text><text x="664" y="339">L5</text><text x="756" y="339">L6</text></g>
    <!-- stagger arrows -->
    <g stroke="#5A5A5A" stroke-width="0.75"><line x1="250" y1="272" x2="290" y2="312" marker-end="url(#a5)"/><line x1="342" y1="272" x2="382" y2="312" marker-end="url(#a5)"/><line x1="434" y1="272" x2="474" y2="312" marker-end="url(#a5)"/></g>
    <text x="824" y="290" class="body" font-size="13" fill="#1A1A1A">Chaque couche part dès qu'elle est</text>
    <text x="824" y="312" class="body" font-size="13" fill="#1A1A1A">calculée → le transfert recouvre le</text>
    <text x="824" y="334" class="body" font-size="13" fill="#1A1A1A">calcul. FlowKV : −96 à −98 % de latence.</text>
  </g>

  <!-- Transport backends -->
  <g class="interactive" data-card="transport-backends" tabindex="0" role="button" aria-label="Backends de transport — détails">
    <rect x="64" y="412" width="520" height="244" rx="3" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.25"/>
    <text x="86" y="440" class="mono" font-size="12" letter-spacing="0.08em" fill="#1F5560">PARADE 2 — LE TRANSPORT (NIXL)</text>
    <rect x="86" y="456" width="476" height="50" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="100" y="478" class="body" font-size="14" font-weight="600">NVLink</text>
    <text x="100" y="497" class="body" font-size="12" fill="#5A5A5A">intra-nœud, To/s — VRAM à VRAM</text>
    <rect x="86" y="514" width="476" height="50" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="100" y="536" class="body" font-size="14" font-weight="600">InfiniBand / RoCE (RDMA)</text>
    <text x="100" y="555" class="body" font-size="12" fill="#5A5A5A">inter-nœuds, 400+ Gbps en production</text>
    <rect x="86" y="572" width="476" height="64" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="100" y="594" class="body" font-size="14" font-weight="600">NIXL — abstraction multi-backend</text>
    <text x="100" y="613" class="body" font-size="12" fill="#5A5A5A">RDMA · RoCE/UCX · repli TCP · NVMe-oF · S3.</text>
    <text x="100" y="630" class="body" font-size="12" fill="#5A5A5A">Choisit le transport le plus rapide disponible.</text>
  </g>

  <!-- Bandwidth wall -->
  <g class="interactive" data-card="bandwidth-wall" tabindex="0" role="button" aria-label="Mur de bande passante — détails">
    <rect x="608" y="412" width="532" height="110" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="630" y="440" class="mono" font-size="12" letter-spacing="0.08em" fill="#B7332C">LE MUR DE BANDE PASSANTE</text>
    <text x="630" y="468" class="body" font-size="14" fill="#1A1A1A">Le transfert KV ne doit jamais excéder le</text>
    <text x="630" y="490" class="body" font-size="14" fill="#1A1A1A">budget de latence libéré par la suppression</text>
    <text x="630" y="512" class="body" font-size="14" fill="#1A1A1A">de l'interférence — sinon il devient le goulot.</text>
  </g>

  <!-- Prefix cache hit -->
  <g class="interactive" data-card="prefix-cache-hit" tabindex="0" role="button" aria-label="Hit de préfixe — détails">
    <rect x="608" y="532" width="532" height="124" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="630" y="560" class="mono" font-size="12" letter-spacing="0.08em" fill="#B58A2C">PARADE 3 — HIT DE PRÉFIXE</text>
    <text x="630" y="588" class="body" font-size="14" fill="#1A1A1A">Préfixe déjà dans le store (system prompt,</text>
    <text x="630" y="610" class="body" font-size="14" fill="#1A1A1A">document, tour antérieur) → ni recalcul ni transfert.</text>
    <text x="630" y="636" class="body" font-size="13" fill="#5A5A5A">Le coût devient une économie. Mooncake : 100 Md tokens/jour.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="728" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Source : NVIDIA Dynamo / NIXL ; FlowKV (arXiv 2504.03775) ; Mooncake (FAST 2025). Schéma : Mathieu Guglielmino.</text>

  <defs>
    <marker id="a5" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#5A5A5A"/></marker>
  </defs>
</svg>
