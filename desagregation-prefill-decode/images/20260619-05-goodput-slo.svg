<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive:hover .hot { fill-opacity: 0.16; }
    </style>
    <marker id="ar05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Goodput sous SLO</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Deux SLO opposés — désagréger permet de régler chaque pool pour le sien</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- AXES -->
  <line x1="240" y1="620" x2="900" y2="620" stroke="#1A1A1A" stroke-width="1.2"/>
  <line x1="240" y1="620" x2="240" y2="190" stroke="#1A1A1A" stroke-width="1.2"/>

  <!-- acceptance region -->
  <rect x="240" y="420" width="320" height="200" fill="#1F8A4C" fill-opacity="0.10"/>
  <text x="400" y="600" class="body" font-size="13" font-weight="600" fill="#1F7A44" text-anchor="middle">zone goodput</text>
  <text x="400" y="582" class="body" font-size="12" fill="#1F7A44" text-anchor="middle">(les DEUX SLO respectés)</text>

  <!-- SLO lines -->
  <line x1="560" y1="190" x2="560" y2="620" stroke="#B7332C" stroke-width="1.4" stroke-dasharray="5 4"/>
  <line x1="240" y1="420" x2="900" y2="420" stroke="#B7332C" stroke-width="1.4" stroke-dasharray="5 4"/>

  <!-- TTFT axis region -->
  <g class="interactive" data-card="ttft" tabindex="0" role="button" aria-label="Axe TTFT — gouverné par le prefill">
    <rect class="hot" x="240" y="630" width="660" height="50" fill="#B7332C" fill-opacity="0.0"/>
    <text x="570" y="660" class="mono" font-size="12" letter-spacing="0.08em" fill="#5A5A5A" text-anchor="middle">TTFT — délai du 1ᵉʳ token (gouverné par le PREFILL) →</text>
    <text x="566" y="186" class="body" font-size="12" font-weight="600" fill="#B7332C" text-anchor="start">SLO TTFT</text>
  </g>

  <!-- TPOT axis region -->
  <g class="interactive" data-card="tpot" tabindex="0" role="button" aria-label="Axe TPOT — gouverné par le decode">
    <rect class="hot" x="150" y="190" width="80" height="430" fill="#1F5560" fill-opacity="0.0"/>
    <text x="150" y="410" class="mono" font-size="12" letter-spacing="0.08em" fill="#5A5A5A" text-anchor="middle" transform="rotate(-90 150 410)">↑ TPOT — temps par token (gouverné par le DECODE)</text>
    <text x="232" y="414" class="body" font-size="12" font-weight="600" fill="#B7332C" text-anchor="end">SLO TPOT</text>
  </g>

  <!-- co-located point (outside, high TPOT due to stalls) -->
  <circle cx="470" cy="320" r="8" fill="#B7332C"/>
  <text x="486" y="316" class="body" font-size="13" font-weight="600" fill="#B7332C">co-localisé naïf</text>
  <text x="486" y="334" class="body" font-size="11" fill="#5A5A5A">TPOT violé (stalls)</text>

  <!-- disaggregated point (inside) -->
  <circle cx="400" cy="500" r="8" fill="#1F5560"/>
  <text x="416" y="496" class="body" font-size="13" font-weight="600" fill="#1F5560">désagrégé</text>
  <text x="416" y="514" class="body" font-size="11" fill="#5A5A5A">les deux SLO tenus</text>

  <!-- SCALING LEVER -->
  <g class="interactive" data-card="scaling" tabindex="0" role="button" aria-label="Levier de scaling indépendant">
    <rect class="hot" x="940" y="190" width="220" height="220" rx="6" fill="#1A1A1A" fill-opacity="0.04" stroke="#1A1A1A" stroke-width="1.1"/>
    <text x="964" y="222" class="mono" font-size="11" letter-spacing="0.1em" font-weight="600" fill="#1A1A1A">LEVIER xP : yD</text>
    <text x="964" y="252" class="body" font-size="13" fill="#5A5A5A">+ instances prefill</text>
    <line x1="964" y1="262" x2="1090" y2="262" stroke="#B7332C" stroke-width="1.6" marker-end="url(#ar05)"/>
    <text x="964" y="282" class="body" font-size="12" fill="#B7332C">→ TTFT baisse</text>
    <text x="964" y="320" class="body" font-size="13" fill="#5A5A5A">+ instances decode</text>
    <line x1="964" y1="330" x2="1090" y2="330" stroke="#1F5560" stroke-width="1.6" marker-end="url(#ar05)"/>
    <text x="964" y="350" class="body" font-size="12" fill="#1F5560">→ TPOT baisse</text>
    <text x="964" y="388" class="body" font-size="11" font-style="italic" fill="#5A5A5A">deux cadrans séparés</text>
  </g>

  <!-- CHUNKED WINS -->
  <g class="interactive" data-card="chunked-wins" tabindex="0" role="button" aria-label="Où le chunked prefill gagne">
    <rect class="hot" x="940" y="430" width="220" height="190" rx="6" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.1"/>
    <text x="964" y="462" class="mono" font-size="11" letter-spacing="0.1em" font-weight="600" fill="#1F5560">OÙ CHUNKED GAGNE</text>
    <text x="964" y="492" class="body" font-size="13" fill="#5A5A5A">petit déploiement</text>
    <text x="964" y="514" class="body" font-size="13" fill="#5A5A5A">charge homogène</text>
    <text x="964" y="536" class="body" font-size="13" fill="#5A5A5A">réseau coûteux</text>
    <text x="964" y="572" class="body" font-size="12" font-style="italic" fill="#1F5560">le coût fixe de la</text>
    <text x="964" y="590" class="body" font-size="12" font-style="italic" fill="#1F5560">désagrégation ne paie pas</text>
  </g>

  <text x="60" y="700" class="body" font-size="13" font-style="italic" fill="#5A5A5A">Le goodput = requêtes/s respectant TTFT ET TPOT. Optimiser le débit brut sans les deux SLO produit un système rapide en moyenne et inutilisable. Cliquer une zone.</text>
</svg>
