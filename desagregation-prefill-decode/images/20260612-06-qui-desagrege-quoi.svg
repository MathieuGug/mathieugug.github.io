<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="64" y="58" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 06</text>
  <text x="64" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Qui désagrège quoi — état de l'art 2026</text>
  <text x="64" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Cinq systèmes, cinq dimensions : du papier fondateur au socle de production à l'échelle.</text>
  <line x1="64" y1="150" x2="1136" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Column headers -->
  <text x="380" y="206" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Désagrégation</text>
  <text x="380" y="222" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">P / D</text>
  <text x="540" y="206" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Matériel</text>
  <text x="540" y="222" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">hétérogène</text>
  <text x="700" y="206" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Pool KV</text>
  <text x="700" y="222" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">DRAM / SSD</text>
  <text x="870" y="206" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Transfert</text>
  <text x="870" y="222" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">(backend)</text>
  <text x="1030" y="206" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Prod à</text>
  <text x="1030" y="222" class="body" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">l'échelle</text>
  <line x1="64" y1="236" x2="1136" y2="236" stroke="#1A1A1A" stroke-width="1"/>

  <!-- Row: DistServe -->
  <g class="interactive" data-card="distserve" tabindex="0" role="button" aria-label="DistServe">
    <rect x="64" y="240" width="1072" height="86" fill="#B7332C" opacity="0.03"/>
    <text x="84" y="286" class="body" font-size="15" font-weight="600" fill="#1A1A1A">DistServe</text>
    <text x="84" y="306" class="mono" font-size="10.5" fill="#5A5A5A">UCSD/PKU · OSDI'24</text>
    <text x="380" y="290" font-size="20" fill="#B7332C" text-anchor="middle">●</text>
    <text x="540" y="290" font-size="20" fill="#5A5A5A" text-anchor="middle">◐</text>
    <text x="700" y="290" font-size="20" fill="#B8B5AE" text-anchor="middle">○</text>
    <text x="870" y="290" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">pipeliné</text>
    <text x="1030" y="290" font-size="20" fill="#5A5A5A" text-anchor="middle">◐</text>
  </g>

  <!-- Row: Splitwise -->
  <g class="interactive" data-card="splitwise" tabindex="0" role="button" aria-label="Splitwise">
    <rect x="64" y="328" width="1072" height="86" fill="#1F5560" opacity="0.03"/>
    <text x="84" y="374" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Splitwise</text>
    <text x="84" y="394" class="mono" font-size="10.5" fill="#5A5A5A">Microsoft · ISCA'24</text>
    <text x="380" y="378" font-size="20" fill="#B7332C" text-anchor="middle">●</text>
    <text x="540" y="378" font-size="20" fill="#B7332C" text-anchor="middle">●</text>
    <text x="700" y="378" font-size="20" fill="#B8B5AE" text-anchor="middle">○</text>
    <text x="870" y="378" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">Infiniband</text>
    <text x="1030" y="378" font-size="20" fill="#5A5A5A" text-anchor="middle">◐</text>
  </g>

  <!-- Row: Mooncake -->
  <g class="interactive" data-card="mooncake" tabindex="0" role="button" aria-label="Mooncake">
    <rect x="64" y="416" width="1072" height="86" fill="#B7332C" opacity="0.03"/>
    <text x="84" y="462" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Mooncake</text>
    <text x="84" y="482" class="mono" font-size="10.5" fill="#5A5A5A">Moonshot/Kimi · FAST'25</text>
    <text x="380" y="466" font-size="20" fill="#B7332C" text-anchor="middle">●</text>
    <text x="540" y="466" font-size="20" fill="#5A5A5A" text-anchor="middle">◐</text>
    <text x="700" y="466" font-size="20" fill="#B7332C" text-anchor="middle">●</text>
    <text x="870" y="466" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">store dédié</text>
    <text x="1030" y="466" font-size="20" fill="#B7332C" text-anchor="middle">●</text>
  </g>

  <!-- Row: Dynamo -->
  <g class="interactive" data-card="dynamo" tabindex="0" role="button" aria-label="NVIDIA Dynamo">
    <rect x="64" y="504" width="1072" height="86" fill="#1F5560" opacity="0.03"/>
    <text x="84" y="550" class="body" font-size="15" font-weight="600" fill="#1A1A1A">NVIDIA Dynamo</text>
    <text x="84" y="570" class="mono" font-size="10.5" fill="#5A5A5A">NVIDIA · 2025</text>
    <text x="380" y="554" font-size="20" fill="#B7332C" text-anchor="middle">●</text>
    <text x="540" y="554" font-size="20" fill="#5A5A5A" text-anchor="middle">◐</text>
    <text x="700" y="554" font-size="20" fill="#5A5A5A" text-anchor="middle">◐</text>
    <text x="870" y="554" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">NIXL</text>
    <text x="1030" y="554" font-size="20" fill="#B7332C" text-anchor="middle">●</text>
  </g>

  <!-- Row: SGLang / vLLM -->
  <g class="interactive" data-card="sglang-vllm" tabindex="0" role="button" aria-label="SGLang et vLLM (llm-d)">
    <rect x="64" y="592" width="1072" height="86" fill="#B7332C" opacity="0.03"/>
    <text x="84" y="638" class="body" font-size="15" font-weight="600" fill="#1A1A1A">SGLang / vLLM (llm-d)</text>
    <text x="84" y="658" class="mono" font-size="10.5" fill="#5A5A5A">communauté · 2025</text>
    <text x="380" y="642" font-size="20" fill="#B7332C" text-anchor="middle">●</text>
    <text x="540" y="642" font-size="20" fill="#5A5A5A" text-anchor="middle">◐</text>
    <text x="700" y="642" font-size="20" fill="#5A5A5A" text-anchor="middle">◐</text>
    <text x="870" y="642" class="mono" font-size="10.5" fill="#5A5A5A" text-anchor="middle">Mooncake/NIXL</text>
    <text x="1030" y="642" font-size="20" fill="#B7332C" text-anchor="middle">●</text>
  </g>

  <line x1="64" y1="678" x2="1136" y2="678" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Legend -->
  <text x="64" y="706" class="body" font-size="11" fill="#5A5A5A"><tspan fill="#B7332C" font-size="14">●</tspan> natif / mûr   <tspan fill="#5A5A5A" font-size="14">◐</tspan> partiel / configurable   <tspan fill="#B8B5AE" font-size="14">○</tspan> hors périmètre</text>

  <!-- Footer -->
  <line x1="64" y1="724" x2="1136" y2="724" stroke="#E5E1D8" stroke-width="1"/>
  <text x="64" y="756" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : papiers et documentation respectifs ; déploiements LMSYS (DeepSeek-R1 96×H100, Kimi K2 128×H200).</text>
</svg>
