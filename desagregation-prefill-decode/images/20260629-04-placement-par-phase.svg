<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le placement par phase : parallélisme découplé</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Chaque phase choisit son parallélisme, son matériel et son nombre de nœuds — l'exemple DeepSeek-V3</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- PREFILL UNIT (interactive) -->
  <g class="interactive" data-region="parallelisme-prefill" tabindex="0" role="button" aria-label="Unité prefill DeepSeek-V3 : EP32, 4 nœuds">
    <rect x="60" y="172" width="500" height="248" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="84" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B7332C">UNITÉ PREFILL</text>
    <text x="84" y="226" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Dimensionnée pour le calcul du prompt</text>
    <!-- nodes -->
    <g fill="#B7332C" fill-opacity="0.85">
      <rect x="84" y="246" width="100" height="48" rx="3"/>
      <rect x="194" y="246" width="100" height="48" rx="3"/>
      <rect x="304" y="246" width="100" height="48" rx="3"/>
      <rect x="414" y="246" width="100" height="48" rx="3"/>
    </g>
    <text x="299" y="275" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">4 nœuds H800</text>
    <line x1="84" y1="312" x2="536" y2="312" stroke="#E5E1D8" stroke-width="0.75"/>
    <text x="84" y="338" class="mono" font-size="14" font-weight="600" fill="#B7332C">EP32</text>
    <text x="160" y="338" class="body" font-size="12" fill="#1A1A1A">parallélisme d'experts · 32 experts redondants</text>
    <text x="84" y="362" class="body" font-size="12" fill="#5A5A5A">9 routed + 1 shared expert par GPU</text>
    <text x="84" y="398" class="display" font-size="24" font-weight="600" fill="#B7332C">~73 700</text>
    <text x="220" y="392" class="body" font-size="12" fill="#1A1A1A">tokens/s en entrée</text>
    <text x="220" y="408" class="body" font-size="12" fill="#1A1A1A">par nœud</text>
  </g>

  <!-- DECODE UNIT (interactive) -->
  <g class="interactive" data-region="parallelisme-decode" tabindex="0" role="button" aria-label="Unité decode DeepSeek-V3 : EP144, 18 nœuds">
    <rect x="640" y="172" width="500" height="248" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="664" y="200" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1F5560">UNITÉ DECODE</text>
    <text x="664" y="226" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Dimensionnée pour la bande passante</text>
    <!-- many small nodes -->
    <g fill="#1F5560" fill-opacity="0.85">
      <rect x="664" y="246" width="44" height="22" rx="2"/><rect x="714" y="246" width="44" height="22" rx="2"/><rect x="764" y="246" width="44" height="22" rx="2"/><rect x="814" y="246" width="44" height="22" rx="2"/><rect x="864" y="246" width="44" height="22" rx="2"/><rect x="914" y="246" width="44" height="22" rx="2"/><rect x="964" y="246" width="44" height="22" rx="2"/><rect x="1014" y="246" width="44" height="22" rx="2"/><rect x="1064" y="246" width="52" height="22" rx="2"/>
      <rect x="664" y="272" width="44" height="22" rx="2"/><rect x="714" y="272" width="44" height="22" rx="2"/><rect x="764" y="272" width="44" height="22" rx="2"/><rect x="814" y="272" width="44" height="22" rx="2"/><rect x="864" y="272" width="44" height="22" rx="2"/><rect x="914" y="272" width="44" height="22" rx="2"/><rect x="964" y="272" width="44" height="22" rx="2"/><rect x="1014" y="272" width="44" height="22" rx="2"/><rect x="1064" y="272" width="52" height="22" rx="2"/>
    </g>
    <text x="890" y="287" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">18 nœuds H800</text>
    <line x1="664" y1="312" x2="1116" y2="312" stroke="#E5E1D8" stroke-width="0.75"/>
    <text x="664" y="338" class="mono" font-size="14" font-weight="600" fill="#1F5560">EP144</text>
    <text x="748" y="338" class="body" font-size="12" fill="#1A1A1A">parallélisme étalé sur 4,5× plus de GPU</text>
    <text x="664" y="362" class="body" font-size="12" fill="#5A5A5A">2 routed + 1 shared expert par GPU</text>
    <text x="664" y="398" class="display" font-size="24" font-weight="600" fill="#1F5560">~14 800</text>
    <text x="800" y="392" class="body" font-size="12" fill="#1A1A1A">tokens/s en sortie</text>
    <text x="800" y="408" class="body" font-size="12" fill="#1A1A1A">par nœud</text>
  </g>

  <!-- RATIO DYNAMIQUE (interactive) -->
  <g class="interactive" data-region="ratio-dynamique" tabindex="0" role="button" aria-label="Ratio prefill:decode ajusté à la charge">
    <rect x="60" y="446" width="1080" height="120" rx="3" fill="#B58A2C" fill-opacity="0.06" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="84" y="474" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#B58A2C">LE RATIO PREFILL : DECODE EST UN CADRAN, PAS UNE CONSTANTE</text>
    <!-- slider -->
    <line x1="84" y1="516" x2="1116" y2="516" stroke="#B8B5AE" stroke-width="2"/>
    <circle cx="430" cy="516" r="9" fill="#B58A2C"/>
    <text x="84" y="500" class="body" font-size="11" fill="#B7332C">+ prefill</text>
    <text x="84" y="544" class="body" font-size="10.5" fill="#5A5A5A">prompts longs, réponses courtes</text>
    <text x="84" y="558" class="body" font-size="10.5" fill="#5A5A5A">(RAG, résumé, classification)</text>
    <text x="1116" y="500" class="body" font-size="11" fill="#1F5560" text-anchor="end">+ decode</text>
    <text x="1116" y="544" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="end">réponses longues, prompts courts</text>
    <text x="1116" y="558" class="body" font-size="10.5" fill="#5A5A5A" text-anchor="end">(conversation, raisonnement)</text>
    <text x="600" y="540" class="body" font-size="11" font-style="italic" fill="#1A1A1A" text-anchor="middle">on règle l'allocation des nœuds selon la composition réelle du trafic</text>
  </g>

  <!-- CO-OPTIMISATION (interactive) -->
  <g class="interactive" data-region="co-optimisation" tabindex="0" role="button" aria-label="Co-optimisation DistServe">
    <rect x="60" y="592" width="1080" height="100" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="84" y="620" class="mono" font-size="10" font-weight="600" letter-spacing="0.1em" fill="#1A1A1A">CE QUE LE DÉCOUPLAGE DÉBLOQUE</text>
    <text x="84" y="644" class="body" font-size="11.5" fill="#5A5A5A">DistServe en fait un problème d'optimisation : <tspan font-weight="600" fill="#1A1A1A">co-optimiser le parallélisme et le placement de chaque phase</tspan> sous contrainte de bande passante,</text>
    <text x="84" y="664" class="body" font-size="11.5" fill="#5A5A5A">pour maximiser le goodput par GPU. On peut même composer des flottes hétérogènes : GPU récents pour le prefill, GPU à forte bande passante</text>
    <text x="84" y="684" class="body" font-size="11.5" fill="#5A5A5A">pour le decode (Splitwise) — un compromis d'architecture jadis figé devient un espace de configuration.</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="760" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : DeepSeek-AI (DeepSeek-V3/R1 Inference System Overview, 2025) ; Zhong et al. (DistServe) ; Patel et al. (Splitwise).</text>
</svg>
