<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive:hover .hot { fill-opacity: 0.14; }
    </style>
    <marker id="ar04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le KV cache comme objet réseau</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Désagréger ne supprime pas le coût — il le transforme en problème de transport</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- A — ANATOMY -->
  <g class="interactive" data-card="kv-anatomy" tabindex="0" role="button" aria-label="Anatomie et taille du KV cache">
    <rect class="hot" x="60" y="166" width="520" height="270" rx="6" fill="#1A1A1A" fill-opacity="0.04" stroke="#1A1A1A" stroke-width="1.1"/>
    <text x="84" y="198" class="mono" font-size="11" letter-spacing="0.12em" font-weight="600" fill="#1A1A1A">A · ANATOMIE & TAILLE</text>
    <text x="84" y="228" class="body" font-size="14" fill="#5A5A5A">Une paire (clé, valeur) par token, par tête,</text>
    <text x="84" y="248" class="body" font-size="14" fill="#5A5A5A">par couche. Croît linéairement avec le contexte.</text>
    <!-- stacked layer bars growing -->
    <rect x="84" y="280" width="60" height="22" fill="#B7332C" opacity="0.8"/>
    <rect x="84" y="306" width="120" height="22" fill="#B7332C" opacity="0.8"/>
    <rect x="84" y="332" width="200" height="22" fill="#B7332C" opacity="0.8"/>
    <rect x="84" y="358" width="320" height="22" fill="#B7332C" opacity="0.8"/>
    <text x="420" y="296" class="mono" font-size="11" fill="#5A5A5A">couche 1</text>
    <text x="420" y="374" class="mono" font-size="11" fill="#5A5A5A">couche L (contexte long)</text>
    <text x="84" y="416" class="body" font-size="14" font-weight="600" fill="#B7332C">→ plusieurs Go par requête</text>
  </g>

  <!-- B — TRANSPORTS -->
  <g class="interactive" data-card="transports" tabindex="0" role="button" aria-label="Transports rapides">
    <rect class="hot" x="620" y="166" width="520" height="270" rx="6" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.1"/>
    <text x="644" y="198" class="mono" font-size="11" letter-spacing="0.12em" font-weight="600" fill="#1F5560">B · TRANSPORT RAPIDE</text>
    <text x="644" y="228" class="body" font-size="14" fill="#5A5A5A">Pas de TCP : des liens à très faible latence.</text>
    <rect x="644" y="252" width="220" height="40" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="754" y="277" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">NVLink (intra-nœud)</text>
    <rect x="880" y="252" width="236" height="40" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="998" y="277" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">RDMA / InfiniBand · RoCE</text>
    <rect x="644" y="302" width="220" height="40" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="754" y="327" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">NIXL (NVIDIA Dynamo)</text>
    <rect x="880" y="302" width="236" height="40" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1"/>
    <text x="998" y="327" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">Transfer Engine (Mooncake)</text>
    <text x="644" y="376" class="body" font-size="13" font-style="italic" fill="#5A5A5A">Le transport devient une couche standardisée,</text>
    <text x="644" y="396" class="body" font-size="13" font-style="italic" fill="#5A5A5A">abstrayant HBM, DRAM et stockage.</text>
  </g>

  <!-- C — TIERED POOL -->
  <g class="interactive" data-card="tiered" tabindex="0" role="button" aria-label="Pool tiéré et réutilisation de préfixes">
    <rect class="hot" x="60" y="456" width="520" height="240" rx="6" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.1"/>
    <text x="84" y="488" class="mono" font-size="11" letter-spacing="0.12em" font-weight="600" fill="#B7332C">C · POOL TIÉRÉ (Mooncake)</text>
    <rect x="84" y="510" width="472" height="34" rx="3" fill="#B7332C" opacity="0.85"/>
    <text x="320" y="532" class="mono" font-size="12" font-weight="600" fill="#FAF8F3" text-anchor="middle">HBM (chaud · rapide · rare)</text>
    <rect x="84" y="548" width="472" height="34" rx="3" fill="#B7332C" opacity="0.55"/>
    <text x="320" y="570" class="mono" font-size="12" fill="#FAF8F3" text-anchor="middle">DRAM (tiède)</text>
    <rect x="84" y="586" width="472" height="34" rx="3" fill="#B7332C" opacity="0.3"/>
    <text x="320" y="608" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">SSD (froid · vaste · bon marché)</text>
    <text x="84" y="650" class="body" font-size="14" font-weight="600" fill="#B7332C">→ réutilisation des préfixes entre requêtes</text>
    <text x="84" y="672" class="body" font-size="13" fill="#5A5A5A">Un system prompt partagé n'est jamais recalculé.</text>
  </g>

  <!-- D — LAYERWISE STREAMING -->
  <g class="interactive" data-card="streaming" tabindex="0" role="button" aria-label="Streaming layer-by-layer">
    <rect class="hot" x="620" y="456" width="520" height="240" rx="6" fill="#1A1A1A" fill-opacity="0.04" stroke="#1A1A1A" stroke-width="1.1"/>
    <text x="644" y="488" class="mono" font-size="11" letter-spacing="0.12em" font-weight="600" fill="#1A1A1A">D · STREAMING LAYER-BY-LAYER</text>
    <text x="644" y="518" class="body" font-size="14" fill="#5A5A5A">Le transfert de la couche n recouvre</text>
    <text x="644" y="538" class="body" font-size="14" fill="#5A5A5A">le calcul de la couche n+1 (DéjàVu).</text>
    <!-- pipeline bars -->
    <text x="644" y="576" class="mono" font-size="10" fill="#B7332C">calcul</text>
    <rect x="710" y="566" width="80" height="16" fill="#B7332C" opacity="0.8"/>
    <rect x="794" y="566" width="80" height="16" fill="#B7332C" opacity="0.8"/>
    <rect x="878" y="566" width="80" height="16" fill="#B7332C" opacity="0.8"/>
    <rect x="962" y="566" width="80" height="16" fill="#B7332C" opacity="0.8"/>
    <text x="644" y="606" class="mono" font-size="10" fill="#1F5560">transfert</text>
    <rect x="752" y="596" width="80" height="16" fill="#1F5560" opacity="0.8"/>
    <rect x="836" y="596" width="80" height="16" fill="#1F5560" opacity="0.8"/>
    <rect x="920" y="596" width="80" height="16" fill="#1F5560" opacity="0.8"/>
    <rect x="1004" y="596" width="80" height="16" fill="#1F5560" opacity="0.8"/>
    <text x="644" y="652" class="body" font-size="14" font-weight="600" fill="#1A1A1A">→ transfert en grande partie masqué</text>
    <text x="644" y="674" class="body" font-size="13" fill="#5A5A5A">Sert aussi la tolérance aux pannes.</text>
  </g>

  <text x="60" y="738" class="body" font-size="13" font-style="italic" fill="#5A5A5A">La désagrégation déplace le goulot du GPU vers le réseau et la mémoire. Cliquer un panneau pour le détail.</text>
</svg>
