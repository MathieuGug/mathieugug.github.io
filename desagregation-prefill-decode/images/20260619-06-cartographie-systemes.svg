<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .interactive { cursor: pointer; }
      .interactive:hover .hot { fill-opacity: 0.14; }
      .chip { fill: #FAF8F3; stroke-width: 1.1; }
    </style>
  </defs>

  <rect width="1200" height="780" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Cartographie des systèmes 2026</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Des papiers fondateurs aux serveurs open-source : trois cercles, deux écoles</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- A — PURE DISAGG FOUNDERS -->
  <g class="interactive" data-card="pure-disagg" tabindex="0" role="button" aria-label="École désagrégée — fondateurs académiques">
    <rect class="hot" x="60" y="170" width="540" height="270" rx="8" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.3"/>
    <text x="84" y="204" class="mono" font-size="11" letter-spacing="0.12em" font-weight="600" fill="#B7332C">DÉSAGRÉGÉ · FONDATEURS</text>
    <text x="84" y="228" class="body" font-size="13" fill="#5A5A5A">2024 — la base conceptuelle</text>
    <rect class="chip" x="84" y="246" width="240" height="60" rx="5" stroke="#B7332C"/>
    <text x="100" y="272" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Splitwise</text>
    <text x="100" y="293" class="mono" font-size="10" fill="#5A5A5A">phase splitting · coût/énergie</text>
    <rect class="chip" x="340" y="246" width="240" height="60" rx="5" stroke="#B7332C"/>
    <text x="356" y="272" class="body" font-size="15" font-weight="600" fill="#1A1A1A">DistServe</text>
    <text x="356" y="293" class="mono" font-size="10" fill="#5A5A5A">goodput · placement par phase</text>
    <rect class="chip" x="84" y="318" width="240" height="60" rx="5" stroke="#B7332C"/>
    <text x="100" y="344" class="body" font-size="15" font-weight="600" fill="#1A1A1A">TetriInfer</text>
    <text x="100" y="365" class="mono" font-size="10" fill="#5A5A5A">+ classification de requêtes</text>
    <rect class="chip" x="340" y="318" width="240" height="60" rx="5" stroke="#B7332C"/>
    <text x="356" y="344" class="body" font-size="15" font-weight="600" fill="#1A1A1A">DéjàVu</text>
    <text x="356" y="365" class="mono" font-size="10" fill="#5A5A5A">KV streaming · tolérance pannes</text>
    <text x="84" y="412" class="body" font-size="12" font-style="italic" fill="#5A5A5A">Transport : InfiniBand / RDMA · statut : recherche</text>
  </g>

  <!-- B — COLOCATED -->
  <g class="interactive" data-card="colocated" tabindex="0" role="button" aria-label="École co-localisée">
    <rect class="hot" x="60" y="460" width="540" height="250" rx="8" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.3"/>
    <text x="84" y="494" class="mono" font-size="11" letter-spacing="0.12em" font-weight="600" fill="#1F5560">CO-LOCALISÉ · LE RIVAL</text>
    <text x="84" y="518" class="body" font-size="13" fill="#5A5A5A">pas de transfert KV — une seule classe de machines</text>
    <rect class="chip" x="84" y="538" width="240" height="64" rx="5" stroke="#1F5560"/>
    <text x="100" y="566" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Sarathi-Serve</text>
    <text x="100" y="588" class="mono" font-size="10" fill="#5A5A5A">chunked prefill · stall-free</text>
    <rect class="chip" x="340" y="538" width="240" height="64" rx="5" stroke="#9A9A9A"/>
    <text x="356" y="566" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Orca</text>
    <text x="356" y="588" class="mono" font-size="10" fill="#5A5A5A">ancêtre · continuous batching</text>
    <text x="84" y="640" class="body" font-size="13" fill="#5A5A5A">Le bon défaut à petite échelle ou charge homogène.</text>
    <text x="84" y="664" class="body" font-size="12" font-style="italic" fill="#1F5560">Socle mémoire commun : PagedAttention (vLLM).</text>
  </g>

  <!-- C — PRODUCTION -->
  <g class="interactive" data-card="production" tabindex="0" role="button" aria-label="Frameworks de production">
    <rect class="hot" x="620" y="170" width="520" height="270" rx="8" fill="#1A1A1A" fill-opacity="0.04" stroke="#1A1A1A" stroke-width="1.3"/>
    <text x="644" y="204" class="mono" font-size="11" letter-spacing="0.12em" font-weight="600" fill="#1A1A1A">PRODUCTION · À GRANDE ÉCHELLE</text>
    <rect class="chip" x="644" y="226" width="472" height="58" rx="5" stroke="#B7332C"/>
    <text x="660" y="252" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Mooncake <tspan class="mono" font-size="10" font-weight="400" fill="#5A5A5A">· Moonshot / Kimi</tspan></text>
    <text x="660" y="272" class="mono" font-size="10" fill="#5A5A5A">KV-centric · pool tiéré · Transfer Engine · FAST'25 best paper</text>
    <rect class="chip" x="644" y="292" width="472" height="58" rx="5" stroke="#B7332C"/>
    <text x="660" y="318" class="body" font-size="15" font-weight="600" fill="#1A1A1A">NVIDIA Dynamo</text>
    <text x="660" y="338" class="mono" font-size="10" fill="#5A5A5A">disagg natif · KV-aware routing · NIXL · OSS (GTC 2025)</text>
    <rect class="chip" x="644" y="358" width="472" height="58" rx="5" stroke="#B7332C"/>
    <text x="660" y="384" class="body" font-size="15" font-weight="600" fill="#1A1A1A">llm-d <tspan class="mono" font-size="10" font-weight="400" fill="#5A5A5A">· Red Hat · Google · IBM · CoreWeave</tspan></text>
    <text x="660" y="404" class="mono" font-size="10" fill="#5A5A5A">Kubernetes-native · vLLM · routage sensible au cache</text>
  </g>

  <!-- D — OSS ADOPTION -->
  <g class="interactive" data-card="oss" tabindex="0" role="button" aria-label="Adoption open-source">
    <rect class="hot" x="620" y="460" width="520" height="250" rx="8" fill="#1F5560" fill-opacity="0.05" stroke="#1F5560" stroke-width="1.3"/>
    <text x="644" y="494" class="mono" font-size="11" letter-spacing="0.12em" font-weight="600" fill="#1F5560">ADOPTION OPEN-SOURCE</text>
    <text x="644" y="518" class="body" font-size="13" fill="#5A5A5A">le pattern devient une option de déploiement standard</text>
    <rect class="chip" x="644" y="538" width="230" height="64" rx="5" stroke="#1F5560"/>
    <text x="660" y="566" class="body" font-size="15" font-weight="600" fill="#1A1A1A">vLLM</text>
    <text x="660" y="588" class="mono" font-size="10" fill="#5A5A5A">disagg prefilling 1P1D</text>
    <rect class="chip" x="890" y="538" width="226" height="64" rx="5" stroke="#1F5560"/>
    <text x="906" y="566" class="body" font-size="15" font-weight="600" fill="#1A1A1A">SGLang</text>
    <text x="906" y="588" class="mono" font-size="10" fill="#5A5A5A">PD disagg · Mooncake engine</text>
    <text x="644" y="648" class="body" font-size="13" fill="#5A5A5A">Connecteurs KV génériques, intégration des moteurs</text>
    <text x="644" y="670" class="body" font-size="13" fill="#5A5A5A">de transfert de production.</text>
  </g>

  <text x="60" y="752" class="body" font-size="13" font-style="italic" fill="#5A5A5A">De la curiosité de recherche à l'option de déploiement par défaut en deux ans. Cliquer un cercle pour le détail.</text>
</svg>
