<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
    .interactive:hover rect, .interactive:focus rect { stroke-width: 2.5; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="80" y="62" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 05</text>
  <text x="80" y="104" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Le KV cache, nouveau goulot d'étranglement</text>
  <text x="80" y="136" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Désagréger crée une dépendance : faire voyager des giga-octets de cache du prefill au decode.</text>
  <line x1="80" y1="158" x2="1120" y2="158" stroke="#E5E1D8" stroke-width="1"/>

  <!-- LEFT: transport hierarchy. Bars width proportional to bandwidth. -->
  <text x="80" y="200" class="mono" font-size="11" font-weight="600" letter-spacing="0.04em" fill="#5A5A5A">HIÉRARCHIE DE TRANSPORT (NIXL) — du plus rapide au plus lent</text>

  <g class="interactive" data-card="nvlink" tabindex="0" role="button" aria-label="Intra-nœud NVLink">
    <rect x="80" y="218" width="520" height="62" rx="3" fill="#2F5D3F" fill-opacity="0.14" stroke="#2F5D3F" stroke-width="1.25"/>
    <text x="100" y="244" class="body" font-size="14" font-weight="600" fill="#2F5D3F">Intra-nœud — NVLink / NVSwitch</text>
    <text x="100" y="266" class="body" font-size="11" fill="#5A5A5A">bande passante maximale · le cas idéal de DistServe</text>
  </g>
  <g class="interactive" data-card="rdma" tabindex="0" role="button" aria-label="Inter-nœud RDMA">
    <rect x="80" y="292" width="400" height="62" rx="3" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-width="1.25"/>
    <text x="100" y="318" class="body" font-size="14" font-weight="600" fill="#1F5560">Inter-nœud — RDMA / InfiniBand · RoCE (UCX)</text>
    <text x="100" y="340" class="body" font-size="11" fill="#5A5A5A">traverse le réseau du datacenter à vitesse de fil</text>
  </g>
  <g class="interactive" data-card="nvme-object" tabindex="0" role="button" aria-label="Débordement NVMe et stockage objet">
    <rect x="80" y="366" width="280" height="62" rx="3" fill="#B58A2C" fill-opacity="0.12" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="100" y="392" class="body" font-size="14" font-weight="600" fill="#B58A2C">Débordement — TCP · NVMe-oF · S3</text>
    <text x="100" y="414" class="body" font-size="11" fill="#5A5A5A">caches tièdes / froids spillés sur SSD ou objet</text>
  </g>
  <!-- bandwidth axis hint -->
  <text x="80" y="452" class="body" font-size="10" font-style="italic" fill="#5A5A5A">← largeur ∝ bande passante</text>

  <!-- RIGHT: layer-by-layer overlap -->
  <g class="interactive" data-card="layerwise" tabindex="0" role="button" aria-label="Transfert layer-by-layer non bloquant">
    <rect x="660" y="200" width="460" height="250" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="684" y="230" class="display" font-size="16" font-weight="600" fill="#B7332C">Transfert layer-by-layer, non bloquant</text>
    <text x="684" y="252" class="body" font-size="11" fill="#5A5A5A">dès qu'une couche a fini son prefill, son cache part</text>
    <!-- mini timeline: prefill layers (top) and transfer (bottom) overlapped -->
    <text x="684" y="290" class="mono" font-size="10" fill="#B7332C">PREFILL</text>
    <rect x="760" y="280" width="60" height="16" rx="2" fill="#B7332C" fill-opacity="0.5"/>
    <rect x="824" y="280" width="60" height="16" rx="2" fill="#B7332C" fill-opacity="0.5"/>
    <rect x="888" y="280" width="60" height="16" rx="2" fill="#B7332C" fill-opacity="0.5"/>
    <rect x="952" y="280" width="60" height="16" rx="2" fill="#B7332C" fill-opacity="0.5"/>
    <text x="684" y="324" class="mono" font-size="10" fill="#B58A2C">TRANSFERT</text>
    <rect x="824" y="314" width="60" height="16" rx="2" fill="#B58A2C" fill-opacity="0.6"/>
    <rect x="888" y="314" width="60" height="16" rx="2" fill="#B58A2C" fill-opacity="0.6"/>
    <rect x="952" y="314" width="60" height="16" rx="2" fill="#B58A2C" fill-opacity="0.6"/>
    <rect x="1016" y="314" width="60" height="16" rx="2" fill="#B58A2C" fill-opacity="0.6"/>
    <text x="760" y="306" class="body" font-size="9" fill="#5A5A5A">c.1</text>
    <text x="824" y="306" class="body" font-size="9" fill="#5A5A5A">c.2</text>
    <text x="888" y="306" class="body" font-size="9" fill="#5A5A5A">c.3</text>
    <text x="952" y="306" class="body" font-size="9" fill="#5A5A5A">c.4</text>
    <text x="684" y="372" class="body" font-size="12" fill="#1A1A1A">Calcul et transfert se recouvrent au lieu</text>
    <text x="684" y="390" class="body" font-size="12" fill="#1A1A1A">d'être séquencés. Le forward continue à servir</text>
    <text x="684" y="408" class="body" font-size="12" fill="#1A1A1A">d'autres requêtes pendant le transfert.</text>
    <text x="684" y="434" class="body" font-size="11" font-style="italic" fill="#B7332C">Mooncake en fait un KV store adressable multi-étages.</text>
  </g>

  <!-- Viability rule -->
  <rect x="80" y="520" width="1040" height="86" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
  <circle cx="112" cy="552" r="9" fill="#B7332C"/>
  <text x="112" y="556" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">=</text>
  <text x="134" y="556" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Règle de viabilité (DistServe) : le transfert du KV cache doit rester négligeable devant la durée d'un pas de decode.</text>
  <text x="134" y="584" class="body" font-size="12" fill="#1A1A1A">Tant qu'elle tient, la désagrégation est gratuite. Dès qu'elle se brise (contexte trop long, réseau saturé), elle devient nette perte.</text>

  <line x1="80" y1="724" x2="1120" y2="724" stroke="#E5E1D8" stroke-width="1"/>
  <text x="80" y="752" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : NVIDIA NIXL (GTC 2025) ; DistServe, OSDI 2024 ; Mooncake (arXiv:2407.00079). Largeurs de barres schématiques.</text>
</svg>
