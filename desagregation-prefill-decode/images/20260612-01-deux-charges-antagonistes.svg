<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral','Playfair Display',Georgia,serif; }
    .body    { font-family: 'Inter','Helvetica Neue',system-ui,sans-serif; }
    .mono    { font-family: 'JetBrains Mono','IBM Plex Mono',monospace; }
    .interactive { cursor: pointer; }
  </style>
  <defs>
    <marker id="arr01" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#5A5A5A" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="64" y="58" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 01</text>
  <text x="64" y="98" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Deux charges antagonistes sur une même puce</text>
  <text x="64" y="128" class="display" font-size="17" font-style="italic" fill="#5A5A5A">Le prefill sature le calcul ; le decode sature la mémoire — un seul GPU ne peut être optimal pour les deux.</text>
  <line x1="64" y1="150" x2="1136" y2="150" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Axes -->
  <line x1="220" y1="650" x2="1090" y2="650" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr01)"/>
  <line x1="220" y1="650" x2="220" y2="200" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr01)"/>
  <text x="1080" y="688" class="body" font-size="12" fill="#5A5A5A" text-anchor="end">intensité arithmétique  (opérations / octet lu)  →</text>
  <text x="232" y="196" class="body" font-size="12" fill="#5A5A5A">↑ performance atteignable (FLOP/s)</text>

  <!-- Roofline -->
  <path d="M 240 620 L 660 290 L 1060 290" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
  <text x="430" y="430" class="body" font-size="12" font-style="italic" fill="#5A5A5A" transform="rotate(-38 430 430)">plafond mémoire (bande passante HBM)</text>
  <text x="860" y="276" class="body" font-size="12" font-style="italic" fill="#5A5A5A">plafond de calcul (pic FLOPS)</text>

  <!-- Ridge point -->
  <g class="interactive" data-card="ridge-point" tabindex="0" role="button" aria-label="Point de bascule (ridge point)">
    <circle cx="660" cy="290" r="7" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="2"/>
    <line x1="660" y1="290" x2="660" y2="650" stroke="#B8B5AE" stroke-width="0.75" stroke-dasharray="2 3"/>
    <text x="672" y="338" class="mono" font-size="11" fill="#1A1A1A">ridge point</text>
  </g>

  <!-- Decode region (left, memory-bound) -->
  <g class="interactive" data-card="decode-memory-bound" tabindex="0" role="button" aria-label="Decode — memory-bound">
    <rect x="222" y="200" width="436" height="450" rx="3" fill="#1F5560" opacity="0.05"/>
    <circle cx="370" cy="510" r="11" fill="#1F5560"/>
    <text x="370" y="514" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">D</text>
    <text x="392" y="500" class="body" font-size="14" font-weight="600" fill="#1F5560">Decode</text>
    <text x="392" y="520" class="body" font-size="12" fill="#5A5A5A">1 token / pas · relit poids + KV</text>
    <text x="392" y="538" class="body" font-size="12" fill="#5A5A5A">memory-bound · FLOPS oisifs</text>
  </g>

  <!-- Prefill region (right, compute-bound) -->
  <g class="interactive" data-card="prefill-compute-bound" tabindex="0" role="button" aria-label="Prefill — compute-bound">
    <rect x="660" y="200" width="430" height="450" rx="3" fill="#B7332C" opacity="0.05"/>
    <circle cx="880" cy="320" r="11" fill="#B7332C"/>
    <text x="880" y="324" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">P</text>
    <text x="752" y="372" class="body" font-size="14" font-weight="600" fill="#B7332C">Prefill</text>
    <text x="752" y="392" class="body" font-size="12" fill="#5A5A5A">tout le prompt en parallèle · GEMM denses</text>
    <text x="752" y="410" class="body" font-size="12" fill="#5A5A5A">compute-bound · proche du pic FLOPS</text>
  </g>

  <!-- Interference annotation -->
  <g class="interactive" data-card="interference-zone" tabindex="0" role="button" aria-label="Zone d'interférence">
    <rect x="900" y="470" width="180" height="150" rx="3" fill="#B58A2C" opacity="0.08" stroke="#B58A2C" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="990" y="502" class="body" font-size="12" font-weight="600" fill="#B58A2C" text-anchor="middle">Interférence</text>
    <text x="990" y="524" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">colocalisés sur le</text>
    <text x="990" y="540" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">même batch, un long</text>
    <text x="990" y="556" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">prefill fige les</text>
    <text x="990" y="572" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">decodes → pic de TPOT</text>
  </g>

  <!-- Footer -->
  <line x1="64" y1="724" x2="1136" y2="724" stroke="#E5E1D8" stroke-width="1"/>
  <text x="64" y="756" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Source : DistServe (OSDI 2024) ; Splitwise (ISCA 2024). Modèle roofline schématique — positions illustratives.</text>
</svg>
