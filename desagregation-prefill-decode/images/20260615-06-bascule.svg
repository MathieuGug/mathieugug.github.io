<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; }
    .interactive:hover rect, .interactive:focus rect { stroke-width: 2.5; }
  </style>
  <rect x="0" y="0" width="1200" height="800" fill="#FAF8F3"/>

  <text x="80" y="62" class="mono" font-size="13" letter-spacing="0.08em" fill="#B7332C">SCHÉMA 06</text>
  <text x="80" y="104" class="display" font-size="30" font-weight="600" fill="#1A1A1A">Des papiers à l'infrastructure standard, 2024 → 2028</text>
  <text x="80" y="136" class="display" font-size="17" font-style="italic" fill="#5A5A5A">En deux ans, la désagrégation passe du laboratoire à la pile open-source de référence.</text>
  <line x1="80" y1="158" x2="1120" y2="158" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Timeline axis -->
  <line x1="120" y1="560" x2="1120" y2="560" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="200" y="592" class="mono" font-size="13" font-weight="600" fill="#5A5A5A" text-anchor="middle">2024</text>
  <text x="460" y="592" class="mono" font-size="13" font-weight="600" fill="#5A5A5A" text-anchor="middle">2025</text>
  <text x="720" y="592" class="mono" font-size="13" font-weight="600" fill="#5A5A5A" text-anchor="middle">2026</text>
  <text x="980" y="592" class="mono" font-size="13" font-weight="600" fill="#5A5A5A" text-anchor="middle">2027–28</text>
  <circle cx="200" cy="560" r="5" fill="#B7332C"/>
  <circle cx="460" cy="560" r="5" fill="#B58A2C"/>
  <circle cx="720" cy="560" r="5" fill="#2F5D3F"/>
  <circle cx="980" cy="560" r="5" fill="#1F5560"/>

  <!-- 2024 papers -->
  <g class="interactive" data-card="papers-2024" tabindex="0" role="button" aria-label="2024 — les papiers fondateurs">
    <rect x="120" y="210" width="220" height="160" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="136" y="238" class="display" font-size="15" font-weight="600" fill="#B7332C">Papiers fondateurs</text>
    <text x="136" y="264" class="body" font-size="12" fill="#1A1A1A">DistServe (goodput)</text>
    <text x="136" y="284" class="body" font-size="12" fill="#1A1A1A">Splitwise (efficacité)</text>
    <text x="136" y="304" class="body" font-size="12" fill="#1A1A1A">Sarathi-Serve (chunked)</text>
    <text x="136" y="324" class="body" font-size="12" fill="#1A1A1A">Mooncake (prod Kimi)</text>
    <text x="136" y="352" class="body" font-size="11" font-style="italic" fill="#5A5A5A">la métrique et l'alternative</text>
  </g>
  <line x1="200" y1="370" x2="200" y2="555" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- 2025 NIXL -->
  <g class="interactive" data-card="nixl-2025" tabindex="0" role="button" aria-label="2025 — le transport se standardise">
    <rect x="380" y="240" width="220" height="160" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="396" y="268" class="display" font-size="15" font-weight="600" fill="#B58A2C">Transport standardisé</text>
    <text x="396" y="294" class="body" font-size="12" fill="#1A1A1A">NIXL open-source (GTC)</text>
    <text x="396" y="314" class="body" font-size="12" fill="#1A1A1A">Dynamo sur vLLM / TRT-LLM</text>
    <text x="396" y="334" class="body" font-size="12" fill="#1A1A1A">VRAM→VRAM RDMA</text>
    <text x="396" y="362" class="body" font-size="11" font-style="italic" fill="#5A5A5A">« comment orchestrer »</text>
    <text x="396" y="380" class="body" font-size="11" font-style="italic" fill="#5A5A5A">remplace « comment transférer »</text>
  </g>
  <line x1="460" y1="400" x2="460" y2="555" stroke="#B58A2C" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- 2026 CNCF -->
  <g class="interactive" data-card="cncf-2026" tabindex="0" role="button" aria-label="2026 — la consécration open-source">
    <rect x="640" y="210" width="220" height="190" rx="3" fill="#2F5D3F" fill-opacity="0.08" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="656" y="238" class="display" font-size="15" font-weight="600" fill="#2F5D3F">Consécration OSS</text>
    <text x="656" y="264" class="body" font-size="12" fill="#1A1A1A">llm-d → CNCF Sandbox</text>
    <text x="656" y="282" class="body" font-size="11" fill="#5A5A5A">24 mars 2026 · K8s-native</text>
    <text x="656" y="304" class="body" font-size="12" fill="#1A1A1A">IBM · Red Hat · Google</text>
    <text x="656" y="322" class="body" font-size="12" fill="#1A1A1A">CoreWeave · NVIDIA</text>
    <text x="656" y="346" class="body" font-size="11" font-weight="600" fill="#2F5D3F">vLLM + llm-d + NIXL + K8s</text>
    <text x="656" y="364" class="body" font-size="11" fill="#5A5A5A">= référence open-source</text>
    <text x="656" y="388" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Meta, LinkedIn, Mistral, HF</text>
  </g>
  <line x1="720" y1="400" x2="720" y2="555" stroke="#2F5D3F" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- 2027-28 horizon -->
  <g class="interactive" data-card="horizon" tabindex="0" role="button" aria-label="Horizon 2027-2028">
    <rect x="900" y="240" width="220" height="160" rx="3" fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25"/>
    <text x="916" y="268" class="display" font-size="15" font-weight="600" fill="#1F5560">Horizon</text>
    <text x="916" y="294" class="body" font-size="12" fill="#1A1A1A">+ de 2 pools (attention)</text>
    <text x="916" y="314" class="body" font-size="12" fill="#1A1A1A">KV cache comme marché</text>
    <text x="916" y="334" class="body" font-size="12" fill="#1A1A1A">désagrégation pilotée SLO</text>
    <text x="916" y="362" class="body" font-size="11" font-style="italic" fill="#5A5A5A">contrôleur ajustant ratio &amp;</text>
    <text x="916" y="380" class="body" font-size="11" font-style="italic" fill="#5A5A5A">seuil en temps réel</text>
  </g>
  <line x1="980" y1="400" x2="980" y2="555" stroke="#1F5560" stroke-width="0.75" stroke-dasharray="2 3"/>

  <!-- Conditional disaggregation callout (below axis) -->
  <g class="interactive" data-card="conditional" tabindex="0" role="button" aria-label="Désagrégation conditionnelle">
    <rect x="120" y="620" width="1000" height="74" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25" stroke-dasharray="2 3"/>
    <text x="144" y="650" class="body" font-size="14" font-weight="600" fill="#B58A2C">Désagrégation conditionnelle — la troisième voie</text>
    <text x="144" y="676" class="body" font-size="12" fill="#1A1A1A">Sous le seuil : chunked prefill colocalisé. Au-delà : bascule vers le pool dédié. Le bon design n'est pas « désagréger ou non » mais « savoir à partir de quand ».</text>
  </g>

  <line x1="80" y1="724" x2="1120" y2="724" stroke="#E5E1D8" stroke-width="1"/>
  <text x="80" y="752" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : llm-d (CNCF Sandbox, 24 mars 2026) ; NVIDIA Dynamo / NIXL ; vLLM production-stack ; Sarathi-Serve, OSDI 2024.</text>
</svg>
