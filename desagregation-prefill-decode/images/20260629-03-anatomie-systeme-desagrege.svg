<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow03" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Anatomie d'un système désagrégé</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">L'inférence cesse d'être une boucle locale : elle devient un pipeline distribué à cinq maillons</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- requête in -->
  <rect x="48" y="252" width="78" height="56" rx="3" fill="#1A1A1A"/>
  <text x="87" y="276" class="body" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">requête</text>
  <text x="87" y="294" class="body" font-size="9" fill="#FAF8F3" text-anchor="middle">+ prompt</text>
  <line x1="126" y1="280" x2="150" y2="280" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow03)"/>

  <!-- ROUTEUR (interactive) -->
  <g class="interactive" data-region="routeur" tabindex="0" role="button" aria-label="Routeur cache-aware">
    <rect x="156" y="232" width="120" height="96" rx="3" fill="#1A1A1A" fill-opacity="0.06" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="216" y="258" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#1A1A1A" text-anchor="middle">ROUTEUR</text>
    <text x="216" y="280" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">place la requête</text>
    <text x="216" y="296" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">selon l'état</text>
    <text x="216" y="312" class="body" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">des caches chauds</text>
  </g>
  <line x1="276" y1="280" x2="300" y2="280" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow03)"/>

  <!-- POOL PREFILL (interactive) -->
  <g class="interactive" data-region="pool-prefill" tabindex="0" role="button" aria-label="Pool prefill compute-optimisé">
    <rect x="306" y="216" width="226" height="128" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="324" y="242" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#B7332C">POOL PREFILL</text>
    <text x="324" y="260" class="body" font-size="10.5" fill="#5A5A5A">compute-optimisé</text>
    <g fill="#B7332C" fill-opacity="0.85">
      <rect x="324" y="272" width="50" height="44" rx="3"/>
      <rect x="382" y="272" width="50" height="44" rx="3"/>
      <rect x="440" y="272" width="50" height="44" rx="3"/>
    </g>
    <text x="349" y="299" class="mono" font-size="8" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="407" y="299" class="mono" font-size="8" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="465" y="299" class="mono" font-size="8" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="324" y="334" class="body" font-size="10" font-style="italic" fill="#B7332C">produit le KV-cache</text>
  </g>
  <line x1="532" y1="280" x2="556" y2="280" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow03)"/>

  <!-- TRANSFERT KV (interactive) -->
  <g class="interactive" data-region="transfert-kv" tabindex="0" role="button" aria-label="Transfert du KV-cache sur le réseau">
    <rect x="562" y="240" width="148" height="80" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="636" y="264" class="mono" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#B58A2C" text-anchor="middle">TRANSFERT KV</text>
    <g fill="#B58A2C">
      <rect x="584" y="276" width="18" height="18" rx="2"/>
      <rect x="608" y="276" width="18" height="18" rx="2" fill-opacity="0.7"/>
      <rect x="632" y="276" width="18" height="18" rx="2" fill-opacity="0.5"/>
    </g>
    <text x="636" y="312" class="body" font-size="9.5" font-weight="600" fill="#B58A2C" text-anchor="middle">RDMA / NVLink</text>
  </g>
  <line x1="710" y1="280" x2="734" y2="280" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow03)"/>

  <!-- POOL DECODE (interactive) -->
  <g class="interactive" data-region="pool-decode" tabindex="0" role="button" aria-label="Pool decode mémoire-optimisé">
    <rect x="740" y="216" width="286" height="128" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="758" y="242" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#1F5560">POOL DECODE</text>
    <text x="758" y="260" class="body" font-size="10.5" fill="#5A5A5A">mémoire-optimisé</text>
    <g fill="#1F5560" fill-opacity="0.85">
      <rect x="758" y="272" width="50" height="44" rx="3"/>
      <rect x="816" y="272" width="50" height="44" rx="3"/>
      <rect x="874" y="272" width="50" height="44" rx="3"/>
      <rect x="932" y="272" width="50" height="44" rx="3"/>
    </g>
    <text x="783" y="299" class="mono" font-size="8" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="841" y="299" class="mono" font-size="8" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="899" y="299" class="mono" font-size="8" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="957" y="299" class="mono" font-size="8" fill="#FAF8F3" text-anchor="middle">GPU</text>
    <text x="758" y="334" class="body" font-size="10" font-style="italic" fill="#1F5560">consomme le KV-cache</text>
  </g>
  <line x1="1026" y1="280" x2="1050" y2="280" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrow03)"/>
  <rect x="1052" y="252" width="80" height="56" rx="3" fill="#1A1A1A"/>
  <text x="1092" y="276" class="body" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">tokens</text>
  <text x="1092" y="294" class="body" font-size="9" fill="#FAF8F3" text-anchor="middle">en flux</text>

  <!-- POOL KV GLOBAL (interactive) -->
  <g class="interactive" data-region="pool-kv" tabindex="0" role="button" aria-label="Pool KVCache global Mooncake">
    <rect x="156" y="412" width="876" height="138" rx="3" fill="#1A1A1A" fill-opacity="0.05" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="180" y="440" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#1A1A1A">POOL KVCACHE GLOBAL · architecture KVCache-centric (Mooncake)</text>
    <text x="180" y="460" class="body" font-size="11" fill="#5A5A5A">Le cache n'est plus attaché à un GPU : il vit dans une hiérarchie partagée par le cluster — le placement devient un ordonnancement</text>
    <g>
      <rect x="180" y="476" width="180" height="44" rx="3" fill="#1F5560" fill-opacity="0.8"/><text x="270" y="503" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">HBM (chaud)</text>
      <rect x="374" y="476" width="180" height="44" rx="3" fill="#1F5560" fill-opacity="0.55"/><text x="464" y="503" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">DRAM</text>
      <rect x="568" y="476" width="180" height="44" rx="3" fill="#1F5560" fill-opacity="0.32"/><text x="658" y="503" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">SSD (froid)</text>
      <rect x="762" y="476" width="150" height="44" rx="3" fill="#E5E1D8"/><text x="837" y="503" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">CPU host</text>
      <text x="930" y="496" class="body" font-size="10.5" fill="#1A1A1A">DRAM + SSD du</text>
      <text x="930" y="512" class="body" font-size="10.5" fill="#1A1A1A">cluster, réemployés</text>
    </g>
  </g>
  <line x1="419" y1="344" x2="419" y2="410" stroke="#B8B5AE" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow03)"/>
  <line x1="883" y1="410" x2="883" y2="346" stroke="#B8B5AE" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow03)"/>
  <text x="430" y="392" class="body" font-size="9.5" font-style="italic" fill="#5A5A5A">décharge</text>
  <text x="820" y="392" class="body" font-size="9.5" font-style="italic" fill="#5A5A5A" text-anchor="end">recharge</text>

  <!-- CONTRACT NOTE -->
  <rect x="156" y="582" width="876" height="92" rx="3" fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1.25"/>
  <text x="180" y="610" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#B7332C">LE CONTRAT DU PIPELINE</text>
  <text x="180" y="634" class="body" font-size="11.5" fill="#5A5A5A">Chaque maillon ajoute une latence et un point de défaillance. Le gain n'existe que si le <tspan font-weight="600" fill="#1A1A1A">temps de transfert KV reste largement sous</tspan></text>
  <text x="180" y="654" class="body" font-size="11.5" fill="#5A5A5A">le temps de calcul qu'il libère. Toute l'ingénierie de la désagrégation tient dans cet équilibre (Schémas 5 et 6).</text>

  <!-- FOOTER -->
  <text x="60" y="760" class="body" font-size="10" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Qin et al. (Mooncake, FAST 2025) ; Zhong et al. (DistServe) ; Zheng et al. (SGLang/RadixAttention, routage cache-aware).</text>
</svg>
