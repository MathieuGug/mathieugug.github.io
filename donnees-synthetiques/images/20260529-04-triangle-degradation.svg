<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr04u" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F5560"/>
    </marker>
    <marker id="arr04d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B7332C"/>
    </marker>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 04 · TROIS AXES, TROIS TRAJECTOIRES</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">Le scaling monte. La <tspan font-style="italic">diversité</tspan> descend. Les <tspan font-style="italic">queues</tspan> disparaissent.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Aucun benchmark public ne mesure les axes 2 et 3 — d'où l'angle mort.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Common time axis -->
  <text x="60" y="200" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A">AXE TEMPOREL · GÉNÉRATIONS DE MODÈLES 2022 → 2026 →</text>

  <!-- Axis 1 — Quality moyenne -->
  <g class="interactive" data-card="axe-qualite" tabindex="0" role="button" aria-label="Qualité moyenne — continue de progresser">
    <rect x="60" y="220" width="1080" height="140" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="80" y="246" class="mono" font-size="11" letter-spacing="2" fill="#1F5560">AXE 1 · QUALITÉ MOYENNE (BENCHMARKS)</text>
    <text x="80" y="272" class="display" font-size="16" font-weight="600" fill="#1A1A1A">MMLU, GPQA, HumanEval — ce que le marché regarde.</text>

    <!-- Mini graph -->
    <g transform="translate(700,235)">
      <line x1="0" y1="100" x2="380" y2="100" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="0" y1="100" x2="0" y2="10" stroke="#1A1A1A" stroke-width="1"/>
      <!-- ↗ ascending curve -->
      <path d="M 10,90 Q 100,80 180,55 Q 260,30 370,18"
            fill="none" stroke="#1F5560" stroke-width="2.5"/>
      <circle cx="370" cy="18" r="5" fill="#1F5560"/>
      <text x="200" y="50" class="body" font-size="11" font-style="italic" fill="#1F5560">↗ progression continue</text>
    </g>

    <text x="80" y="302" class="body" font-size="11.5" fill="#5A5A5A">Phi-4 14B = 84,8 % MMLU · GPT-4o = 88,7 % · Claude 3.5 = 88,7 %. La courbe monte indépendamment</text>
    <text x="80" y="318" class="body" font-size="11.5" fill="#5A5A5A">de la part synthétique du mix. C'est l'axe que tout le monde voit — et le seul que les benchmarks publics mesurent.</text>
    <text x="80" y="344" class="mono" font-size="10" font-style="italic" fill="#5A5A5A">— signal pris pour la santé du système.</text>
  </g>

  <!-- Axis 2 — Diversité lexicale -->
  <g class="interactive" data-card="axe-diversite" tabindex="0" role="button" aria-label="Diversité lexicale — chute documentée">
    <rect x="60" y="375" width="1080" height="140" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="80" y="401" class="mono" font-size="11" letter-spacing="2" fill="#B58A2C">AXE 2 · DIVERSITÉ LEXICALE</text>
    <text x="80" y="427" class="display" font-size="16" font-weight="600" fill="#1A1A1A">TTR, n-grammes uniques — ce que mesurent Padmakumar &amp; He.</text>

    <g transform="translate(700,390)">
      <line x1="0" y1="100" x2="380" y2="100" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="0" y1="100" x2="0" y2="10" stroke="#1A1A1A" stroke-width="1"/>
      <!-- ↘ descending curve -->
      <path d="M 10,20 Q 100,30 180,50 Q 260,70 370,82"
            fill="none" stroke="#B58A2C" stroke-width="2.5"/>
      <circle cx="370" cy="82" r="5" fill="#B58A2C"/>
      <text x="200" y="50" class="body" font-size="11" font-style="italic" fill="#B58A2C">↘ chute mesurée</text>
    </g>

    <text x="80" y="457" class="body" font-size="11.5" fill="#5A5A5A">−11 % à −39 % après un seul tour d'assistance LLM. Cumulée sur cinq tours d'itération web : −60 %.</text>
    <text x="80" y="473" class="body" font-size="11.5" fill="#5A5A5A">Cet axe ne figure dans aucun rapport technique de modèle de frontière. Il faudrait l'audit propriétaire pour le voir.</text>
    <text x="80" y="499" class="mono" font-size="10" font-style="italic" fill="#5A5A5A">— invisible sans audit explicite.</text>
  </g>

  <!-- Axis 3 — Couverture des queues -->
  <g class="interactive" data-card="axe-queues" tabindex="0" role="button" aria-label="Queues rares — disparition silencieuse">
    <rect x="60" y="530" width="1080" height="140" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="80" y="556" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">AXE 3 · COUVERTURE DES QUEUES RARES</text>
    <text x="80" y="582" class="display" font-size="16" font-weight="600" fill="#1A1A1A">Néologismes, termes minoritaires, structures rares — la biodiversité statistique.</text>

    <g transform="translate(700,545)">
      <line x1="0" y1="100" x2="380" y2="100" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="0" y1="100" x2="0" y2="10" stroke="#1A1A1A" stroke-width="1"/>
      <!-- ↘↘ sharply descending -->
      <path d="M 10,15 Q 80,25 140,55 Q 200,80 280,92 Q 340,98 370,98"
            fill="none" stroke="#B7332C" stroke-width="2.5"/>
      <circle cx="370" cy="98" r="5" fill="#B7332C"/>
      <text x="200" y="50" class="body" font-size="11" font-style="italic" fill="#B7332C">↘↘ effondrement caché</text>
    </g>

    <text x="80" y="612" class="body" font-size="11.5" fill="#5A5A5A">Les événements rares disparaissent en premier, comme le démontre Shumailov. Pas de chute brutale visible —</text>
    <text x="80" y="628" class="body" font-size="11.5" fill="#5A5A5A">mais la perte de capacité créative et de couverture de cas spéciaux n'apparaît qu'à l'usage sur tâches non-conventionnelles.</text>
    <text x="80" y="654" class="mono" font-size="10" font-style="italic" fill="#5A5A5A">— mesuré seulement par audit adversarial.</text>
  </g>

  <!-- Synthesis -->
  <rect x="60" y="690" width="1080" height="56" rx="3" fill="#F2EFE7" stroke="none"/>
  <text x="80" y="715" class="body" font-size="12" font-weight="500" fill="#1A1A1A">Conséquence opérationnelle :</text>
  <text x="240" y="715" class="body" font-size="12" font-style="italic" fill="#5A5A5A">une organisation qui pilote ses choix de fournisseur sur les benchmarks publics ne voit que l'axe 1.</text>
  <text x="80" y="734" class="body" font-size="12" fill="#1A1A1A">Les axes 2 et 3 dégradent ses produits sans signal d'alarme — l'érosion devient visible seulement en aval (utilisateurs).</text>

  <!-- Footer -->
  <text x="60" y="775" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Padmakumar &amp; He ICLR 2024 (axe 2) · Shumailov et al. Nature 2024 (axe 3) · synthèse de l'évolution MMLU/GPQA 2023-2025 (axe 1).</text>
</svg>
