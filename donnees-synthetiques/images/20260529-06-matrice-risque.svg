<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 06 · CARTOGRAPHIE DU RISQUE</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">Quatre <tspan font-style="italic">modalités</tspan>, trois <tspan font-style="italic">phases</tspan>, des profils distincts.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Le risque ne se loge pas au même endroit selon que la donnée synthétique entre au pré-training, au fine-tuning, ou à l'inférence.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Phases header -->
  <text x="60" y="215" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A">MODALITÉ ↓ / PHASE →</text>
  <text x="395" y="215" class="mono" font-size="11" letter-spacing="2" fill="#1A1A1A" text-anchor="middle">PRE-TRAINING</text>
  <text x="395" y="232" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">corpus web/livres/code, indistinct</text>
  <text x="675" y="215" class="mono" font-size="11" letter-spacing="2" fill="#1A1A1A" text-anchor="middle">FINE-TUNING / POST-TRAIN</text>
  <text x="675" y="232" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">datasets curatés, juges</text>
  <text x="955" y="215" class="mono" font-size="11" letter-spacing="2" fill="#1A1A1A" text-anchor="middle">INFÉRENCE / RAG</text>
  <text x="955" y="232" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">augmentation continue, retrieval</text>

  <line x1="260" y1="245" x2="1140" y2="245" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Texte row -->
  <g class="interactive" data-card="mod-texte" tabindex="0" role="button" aria-label="Modalité texte — profil de risque détaillé">
    <rect x="60" y="260" width="200" height="100" rx="3" fill="#F2EFE7" stroke="none"/>
    <text x="80" y="290" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Texte</text>
    <text x="80" y="312" class="body" font-size="11" fill="#5A5A5A">articles, dialogues,</text>
    <text x="80" y="328" class="body" font-size="11" fill="#5A5A5A">mails, code commentaire</text>
    <text x="80" y="352" class="mono" font-size="10" font-style="italic" fill="#B7332C">le plus exposé</text>
  </g>
  <rect x="280" y="260" width="230" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
  <circle cx="320" cy="310" r="20" fill="#B7332C" opacity="0.85"/>
  <text x="320" y="315" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">HAUT</text>
  <text x="350" y="295" class="body" font-size="11" fill="#1A1A1A">Common Crawl</text>
  <text x="350" y="311" class="body" font-size="11" fill="#5A5A5A">15-35 % post-2023</text>
  <text x="350" y="327" class="body" font-size="11" fill="#5A5A5A">marqueurs IA détectés</text>
  <text x="350" y="346" class="mono" font-size="10" font-style="italic" fill="#5A5A5A">scraping indistinct</text>

  <rect x="560" y="260" width="230" height="100" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
  <circle cx="600" cy="310" r="20" fill="#B58A2C" opacity="0.70"/>
  <text x="600" y="315" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">MOY</text>
  <text x="630" y="295" class="body" font-size="11" fill="#1A1A1A">Phi-4 : ~40 % synth</text>
  <text x="630" y="311" class="body" font-size="11" fill="#5A5A5A">curation, juges LLM</text>
  <text x="630" y="327" class="body" font-size="11" fill="#5A5A5A">Llama 3 post : ~100 %</text>
  <text x="630" y="346" class="mono" font-size="10" font-style="italic" fill="#5A5A5A">contrôlé mais convergent</text>

  <rect x="840" y="260" width="230" height="100" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1.25"/>
  <circle cx="880" cy="310" r="20" fill="#1F5560" opacity="0.45"/>
  <text x="880" y="315" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">BAS</text>
  <text x="910" y="295" class="body" font-size="11" fill="#1A1A1A">RAG sur sources</text>
  <text x="910" y="311" class="body" font-size="11" fill="#5A5A5A">humaines vérifiées</text>
  <text x="910" y="327" class="body" font-size="11" fill="#5A5A5A">— sous contrôle</text>

  <!-- Image row -->
  <g class="interactive" data-card="mod-image" tabindex="0" role="button" aria-label="Modalité image — profil de risque détaillé">
    <rect x="60" y="370" width="200" height="100" rx="3" fill="#F2EFE7" stroke="none"/>
    <text x="80" y="400" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Image</text>
    <text x="80" y="422" class="body" font-size="11" fill="#5A5A5A">photos, illustrations,</text>
    <text x="80" y="438" class="body" font-size="11" fill="#5A5A5A">deepfakes, art génératif</text>
    <text x="80" y="462" class="mono" font-size="10" font-style="italic" fill="#B58A2C">C2PA natif iPhone</text>
  </g>
  <rect x="280" y="370" width="230" height="100" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
  <circle cx="320" cy="420" r="20" fill="#B58A2C" opacity="0.70"/>
  <text x="320" y="425" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">MOY</text>
  <text x="350" y="405" class="body" font-size="11" fill="#1A1A1A">LAION-5B contamine</text>
  <text x="350" y="421" class="body" font-size="11" fill="#5A5A5A">SDXL, Flux, DALL·E</text>
  <text x="350" y="456" class="mono" font-size="10" font-style="italic" fill="#5A5A5A">biais récursifs (Wenger 2024)</text>

  <rect x="560" y="370" width="230" height="100" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
  <circle cx="600" cy="420" r="20" fill="#B58A2C" opacity="0.55"/>
  <text x="600" y="425" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">MOY</text>
  <text x="630" y="405" class="body" font-size="11" fill="#1A1A1A">RLHF avec preferences</text>
  <text x="630" y="421" class="body" font-size="11" fill="#5A5A5A">générées par modèle</text>
  <text x="630" y="437" class="body" font-size="11" fill="#5A5A5A">amplification stylistique</text>

  <rect x="840" y="370" width="230" height="100" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1.25"/>
  <circle cx="880" cy="420" r="20" fill="#1F5560" opacity="0.45"/>
  <text x="880" y="425" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">BAS</text>
  <text x="910" y="405" class="body" font-size="11" fill="#1A1A1A">img-to-img de ref</text>
  <text x="910" y="421" class="body" font-size="11" fill="#5A5A5A">humaine — contrôlé</text>

  <!-- Code row -->
  <g class="interactive" data-card="mod-code" tabindex="0" role="button" aria-label="Modalité code — profil de risque détaillé">
    <rect x="60" y="480" width="200" height="100" rx="3" fill="#F2EFE7" stroke="none"/>
    <text x="80" y="510" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Code</text>
    <text x="80" y="532" class="body" font-size="11" fill="#5A5A5A">commits, fonctions,</text>
    <text x="80" y="548" class="body" font-size="11" fill="#5A5A5A">snippets, tests</text>
    <text x="80" y="572" class="mono" font-size="10" font-style="italic" fill="#1F5560">filtré par compilation</text>
  </g>
  <rect x="280" y="480" width="230" height="100" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
  <circle cx="320" cy="530" r="20" fill="#B58A2C" opacity="0.65"/>
  <text x="320" y="535" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">MOY</text>
  <text x="350" y="515" class="body" font-size="11" fill="#1A1A1A">GitHub : ~46 % suggestions</text>
  <text x="350" y="531" class="body" font-size="11" fill="#5A5A5A">Copilot acceptées 2024</text>
  <text x="350" y="566" class="mono" font-size="10" font-style="italic" fill="#5A5A5A">mais code qui compile filtré</text>

  <rect x="560" y="480" width="230" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
  <circle cx="600" cy="530" r="20" fill="#1F5560" opacity="0.55"/>
  <text x="600" y="535" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">BAS</text>
  <text x="630" y="515" class="body" font-size="11" fill="#1A1A1A">RLVR : signal exécutable</text>
  <text x="630" y="531" class="body" font-size="11" fill="#5A5A5A">forme discipline naturelle</text>
  <text x="630" y="547" class="body" font-size="11" fill="#5A5A5A">— bonne hygiène</text>

  <rect x="840" y="480" width="230" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
  <circle cx="880" cy="530" r="20" fill="#1F5560" opacity="0.65"/>
  <text x="880" y="535" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">BAS</text>
  <text x="910" y="515" class="body" font-size="11" fill="#1A1A1A">REPL, tests, agents</text>
  <text x="910" y="531" class="body" font-size="11" fill="#5A5A5A">retour vrai/faux</text>
  <text x="910" y="547" class="body" font-size="11" fill="#5A5A5A">filtre par vérité dure</text>

  <!-- Audio row -->
  <g class="interactive" data-card="mod-audio" tabindex="0" role="button" aria-label="Modalité audio — profil de risque détaillé">
    <rect x="60" y="590" width="200" height="100" rx="3" fill="#F2EFE7" stroke="none"/>
    <text x="80" y="620" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Audio</text>
    <text x="80" y="642" class="body" font-size="11" fill="#5A5A5A">voix, musique,</text>
    <text x="80" y="658" class="body" font-size="11" fill="#5A5A5A">podcasts, livres audio</text>
    <text x="80" y="682" class="mono" font-size="10" font-style="italic" fill="#5A5A5A">émergent 2024-2026</text>
  </g>
  <rect x="280" y="590" width="230" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
  <circle cx="320" cy="640" r="20" fill="#1F5560" opacity="0.50"/>
  <text x="320" y="645" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">BAS</text>
  <text x="350" y="625" class="body" font-size="11" fill="#1A1A1A">corpus encore humain</text>
  <text x="350" y="641" class="body" font-size="11" fill="#5A5A5A">— mais ça monte 2025+</text>
  <text x="350" y="676" class="mono" font-size="10" font-style="italic" fill="#5A5A5A">profil texte 2022, +18-24 mois</text>

  <rect x="560" y="590" width="230" height="100" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
  <circle cx="600" cy="640" r="20" fill="#B58A2C" opacity="0.55"/>
  <text x="600" y="645" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">MOY</text>
  <text x="630" y="625" class="body" font-size="11" fill="#1A1A1A">ElevenLabs, Suno</text>
  <text x="630" y="641" class="body" font-size="11" fill="#5A5A5A">données synthétiques</text>
  <text x="630" y="657" class="body" font-size="11" fill="#5A5A5A">pour cloning de voix</text>

  <rect x="840" y="590" width="230" height="100" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1.25"/>
  <circle cx="880" cy="640" r="20" fill="#1F5560" opacity="0.40"/>
  <text x="880" y="645" class="mono" font-size="13" font-weight="600" fill="#FAF8F3" text-anchor="middle">BAS</text>
  <text x="910" y="625" class="body" font-size="11" fill="#1A1A1A">streaming, ASR live</text>
  <text x="910" y="641" class="body" font-size="11" fill="#5A5A5A">peu de boucle fermée</text>

  <!-- Legend -->
  <text x="60" y="720" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A">INTENSITÉ DU RISQUE :</text>
  <circle cx="220" cy="715" r="8" fill="#1F5560" opacity="0.45"/>
  <text x="232" y="719" class="body" font-size="10.5" fill="#5A5A5A">bas</text>
  <circle cx="285" cy="715" r="8" fill="#B58A2C" opacity="0.70"/>
  <text x="297" y="719" class="body" font-size="10.5" fill="#5A5A5A">moyen</text>
  <circle cx="355" cy="715" r="8" fill="#B7332C" opacity="0.85"/>
  <text x="367" y="719" class="body" font-size="10.5" fill="#5A5A5A">haut</text>

  <text x="500" y="719" class="body" font-size="11" fill="#1A1A1A">Levier opérationnel :</text>
  <text x="630" y="719" class="body" font-size="11" fill="#5A5A5A" font-style="italic">le risque se gère phase par phase, modalité par modalité — pas globalement.</text>

  <!-- Footer -->
  <text x="60" y="775" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Phi-4 Technical Report (Microsoft 2024) · Llama 3 Herd paper (Meta 2024) · Wenger et al. FAccT 2024 · estimations GitHub Copilot 2024.</text>
</svg>
