  <!-- Bottom synthesis -->
  <rect x="60" y="650" width="1080" height="70" rx="3" fill="#F2EFE7" stroke="none"/>
  <text x="80" y="678" class="display" font-size="14" font-weight="600" fill="#1A1A1A">La question stratégique 2026-2028 :</text>
  <text x="290" y="678" class="display" font-size="14" font-style="italic" fill="#5A5A5A">comment audite-t-on la diversité d'un modèle en production ?</text>
  <text x="80" y="702" class="body" font-size="11.5" fill="#5A5A5A">Aucun benchmark standard ne le mesure aujourd'hui. Les acteurs qui investiront dès 2026 dans des métriques de biodiversité statistique auront un avantage de pilotage substantiel quand le marché finira par exiger ces garanties.</text>

  <!-- Footer -->
  <text x="60" y="770" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : AI Act articles 10 et 50 (entrée en vigueur août 2026) · C2PA roadmap 2024-2027 · Dathathri et al. Nature 634 (SynthID, 2024) · projections sectorielles 2026-2028.</text>
