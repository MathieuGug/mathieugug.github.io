    <circle cx="490" cy="570" r="7" fill="#B58A2C"/>
    <text x="505" y="568" class="body" font-size="11.5" font-weight="500" fill="#1A1A1A">Marché du corpus pur</text>
    <text x="505" y="584" class="body" font-size="11" fill="#5A5A5A">licences premium humain</text>

    <circle cx="490" cy="608" r="7" fill="#B58A2C" opacity="0.7"/>
    <text x="505" y="606" class="body" font-size="11" fill="#5A5A5A">Open-source rattrape</text>
    <text x="505" y="618" class="body" font-size="11" font-style="italic" fill="#5A5A5A">via curation collective</text>
