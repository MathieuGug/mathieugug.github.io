  <text x="180" y="200" class="mono" font-size="11" letter-spacing="2" fill="#5A5A5A" text-anchor="middle">MAI 2026</text>
  <text x="450" y="200" class="mono" font-size="11" letter-spacing="2" fill="#5A5A5A" text-anchor="middle">AOÛT 2026</text>
  <text x="720" y="200" class="mono" font-size="11" letter-spacing="2" fill="#5A5A5A" text-anchor="middle">FIN 2027</text>
  <text x="1010" y="200" class="mono" font-size="11" letter-spacing="2" fill="#5A5A5A" text-anchor="middle">2028</text>

  <!-- Horizontal axis -->
  <line x1="120" y1="220" x2="1080" y2="220" stroke="#1A1A1A" stroke-width="1.25"/>
