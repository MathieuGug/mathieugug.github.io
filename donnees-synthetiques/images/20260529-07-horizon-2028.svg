    <text x="505" y="473" class="body" font-size="11.5" font-weight="500" fill="#1A1A1A">Procès « data sourcing »</text>
    <text x="505" y="489" class="body" font-size="11" fill="#5A5A5A">jurisprudence se fixe</text>

