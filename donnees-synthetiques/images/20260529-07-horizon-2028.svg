    <circle cx="780" cy="570" r="7" fill="#B58A2C"/>
    <text x="795" y="568" class="body" font-size="11.5" font-weight="500" fill="#1A1A1A">Différenciation produit</text>
    <text x="795" y="584" class="body" font-size="11" fill="#5A5A5A">par diversité, pas qualité moy.</text>

    <circle cx="780" cy="608" r="7" fill="#B58A2C" opacity="0.7"/>
    <text x="795" y="606" class="body" font-size="11" fill="#5A5A5A">Convergence vers std</text>
    <text x="795" y="618" class="body" font-size="11" font-style="italic" fill="#5A5A5A">OTel + provenance</text>
