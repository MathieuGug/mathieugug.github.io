    <text x="795" y="428" class="body" font-size="11.5" font-weight="500" fill="#1A1A1A">Provenance par défaut</text>
    <text x="795" y="444" class="body" font-size="11" fill="#5A5A5A">contenu numérique signé</text>

    <circle cx="780" cy="475" r="7" fill="#1F5560" opacity="0.7"/>
    <text x="795" y="473" class="body" font-size="11.5" font-weight="500" fill="#1A1A1A">Obligation watermark</text>
    <text x="795" y="489" class="body" font-size="11" fill="#5A5A5A">débat : oui/non/sectoriel</text>

