  <line x1="450" y1="215" x2="450" y2="225" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="720" y1="215" x2="720" y2="225" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="1010" y1="215" x2="1010" y2="225" stroke="#1A1A1A" stroke-width="1.25"/>

