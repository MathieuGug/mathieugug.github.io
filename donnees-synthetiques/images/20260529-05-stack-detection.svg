<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 05 · DÉTECTER LES SORTIES IA</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">Trois familles, quatre modalités, une <tspan font-style="italic">borne</tspan> théorique.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">L'attaquant gagne toujours à terme — l'asymétrie est structurelle, pas un échec d'ingénierie.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Matrix grid 3 columns × 4 rows -->

  <!-- Column headers -->
  <g class="interactive" data-card="famille-watermarking" tabindex="0" role="button" aria-label="Watermarking actif — SynthID et signatures au sampling">
    <rect x="260" y="196" width="240" height="48" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="380" y="216" class="mono" font-size="11" letter-spacing="2" fill="#B7332C" text-anchor="middle">A · WATERMARKING ACTIF</text>
    <text x="380" y="232" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">SynthID, signature au sampling</text>
  </g>

  <g class="interactive" data-card="famille-classifieurs" tabindex="0" role="button" aria-label="Classifieurs post-hoc — GPTZero, Turnitin">
    <rect x="520" y="196" width="240" height="48" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="640" y="216" class="mono" font-size="11" letter-spacing="2" fill="#B58A2C" text-anchor="middle">B · CLASSIFIEURS POST-HOC</text>
    <text x="640" y="232" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">GPTZero, Turnitin, Originality</text>
  </g>

  <g class="interactive" data-card="famille-statistique" tabindex="0" role="button" aria-label="Détection statistique — DetectGPT, Binoculars">
    <rect x="780" y="196" width="240" height="48" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="900" y="216" class="mono" font-size="11" letter-spacing="2" fill="#1F5560" text-anchor="middle">C · DÉTECTION STATISTIQUE</text>
    <text x="900" y="232" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">DetectGPT, Binoculars, perplexité</text>
  </g>

  <!-- Row labels + grid -->
  <!-- Y = 260, 360, 460, 560 -->

  <!-- Texte row -->
  <text x="220" y="290" class="mono" font-size="11" letter-spacing="2" fill="#1A1A1A" text-anchor="end">TEXTE</text>
  <text x="220" y="306" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="end">articles, dialogues, mails</text>
  <!-- A: high but volontary -->
  <rect x="260" y="260" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <circle cx="320" cy="300" r="14" fill="#B7332C" opacity="0.65"/>
  <text x="345" y="295" class="body" font-size="11" fill="#1A1A1A">déployé Gemini</text>
  <text x="345" y="310" class="body" font-size="10" font-style="italic" fill="#5A5A5A">&gt;90 % textes &gt; 200 tk</text>
  <!-- B: medium -->
  <rect x="520" y="260" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <circle cx="580" cy="300" r="14" fill="#B58A2C" opacity="0.45"/>
  <text x="605" y="295" class="body" font-size="11" fill="#1A1A1A">60-75 % en prod</text>
  <text x="605" y="310" class="body" font-size="10" font-style="italic" fill="#5A5A5A">faux-positifs ENL</text>
  <!-- C: low -->
  <rect x="780" y="260" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <circle cx="840" cy="300" r="14" fill="#1F5560" opacity="0.30"/>
  <text x="865" y="295" class="body" font-size="11" fill="#1A1A1A">dégradation rapide</text>
  <text x="865" y="310" class="body" font-size="10" font-style="italic" fill="#5A5A5A">contournée par paraphrase</text>

  <!-- Image row -->
  <text x="220" y="390" class="mono" font-size="11" letter-spacing="2" fill="#1A1A1A" text-anchor="end">IMAGE</text>
  <text x="220" y="406" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="end">photos, illustrations, deepfakes</text>
  <rect x="260" y="360" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <circle cx="320" cy="400" r="14" fill="#B7332C" opacity="0.75"/>
  <text x="345" y="395" class="body" font-size="11" fill="#1A1A1A">C2PA + SynthID</text>
  <text x="345" y="410" class="body" font-size="10" font-style="italic" fill="#5A5A5A">natif iPhone/Sony 2024+</text>
  <rect x="520" y="360" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <circle cx="580" cy="400" r="14" fill="#B58A2C" opacity="0.55"/>
  <text x="605" y="395" class="body" font-size="11" fill="#1A1A1A">FakeApp, AI or Not</text>
  <text x="605" y="410" class="body" font-size="10" font-style="italic" fill="#5A5A5A">décroît avec V2/Flux</text>
  <rect x="780" y="360" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <circle cx="840" cy="400" r="14" fill="#1F5560" opacity="0.40"/>
  <text x="865" y="395" class="body" font-size="11" fill="#1A1A1A">analyses fréquentielles</text>
  <text x="865" y="410" class="body" font-size="10" font-style="italic" fill="#5A5A5A">surveille artefacts JPEG</text>

  <!-- Code row -->
  <text x="220" y="490" class="mono" font-size="11" letter-spacing="2" fill="#1A1A1A" text-anchor="end">CODE</text>
  <text x="220" y="506" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="end">commits, fonctions, snippets</text>
  <rect x="260" y="460" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <circle cx="320" cy="500" r="14" fill="#B7332C" opacity="0.20"/>
  <text x="345" y="495" class="body" font-size="11" fill="#1A1A1A">marginal</text>
  <text x="345" y="510" class="body" font-size="10" font-style="italic" fill="#5A5A5A">altère la sémantique</text>
  <rect x="520" y="460" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <circle cx="580" cy="500" r="14" fill="#B58A2C" opacity="0.35"/>
  <text x="605" y="495" class="body" font-size="11" fill="#1A1A1A">heuristiques GitHub</text>
  <text x="605" y="510" class="body" font-size="10" font-style="italic" fill="#5A5A5A">peu fiable hors training</text>
  <rect x="780" y="460" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <circle cx="840" cy="500" r="14" fill="#1F5560" opacity="0.25"/>
  <text x="865" y="495" class="body" font-size="11" fill="#1A1A1A">perplexité code</text>
  <text x="865" y="510" class="body" font-size="10" font-style="italic" fill="#5A5A5A">bruitée par les styles</text>

  <!-- Audio row -->
  <text x="220" y="590" class="mono" font-size="11" letter-spacing="2" fill="#1A1A1A" text-anchor="end">AUDIO</text>
  <text x="220" y="606" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="end">voix, musique, podcast</text>
  <rect x="260" y="560" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <circle cx="320" cy="600" r="14" fill="#B7332C" opacity="0.55"/>
  <text x="345" y="595" class="body" font-size="11" fill="#1A1A1A">SynthID-Audio</text>
  <text x="345" y="610" class="body" font-size="10" font-style="italic" fill="#5A5A5A">émergent, robuste compression</text>
  <rect x="520" y="560" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <circle cx="580" cy="600" r="14" fill="#B58A2C" opacity="0.40"/>
  <text x="605" y="595" class="body" font-size="11" fill="#1A1A1A">Pindrop, AntiFake</text>
  <text x="605" y="610" class="body" font-size="10" font-style="italic" fill="#5A5A5A">défense anti-deepfake</text>
  <rect x="780" y="560" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#E5E1D8" stroke-width="1"/>
  <circle cx="840" cy="600" r="14" fill="#1F5560" opacity="0.30"/>
  <text x="865" y="595" class="body" font-size="11" fill="#1A1A1A">spectral analysis</text>
  <text x="865" y="610" class="body" font-size="10" font-style="italic" fill="#5A5A5A">arms race continue</text>

  <!-- Legend / scale -->
  <text x="60" y="680" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A">EFFICACITÉ EN PROD :</text>
  <circle cx="220" cy="675" r="6" fill="#1A1A1A" opacity="0.2"/>
  <text x="232" y="679" class="body" font-size="10.5" fill="#5A5A5A">faible</text>
  <circle cx="290" cy="675" r="6" fill="#1A1A1A" opacity="0.45"/>
  <text x="302" y="679" class="body" font-size="10.5" fill="#5A5A5A">moyenne</text>
  <circle cx="370" cy="675" r="6" fill="#1A1A1A" opacity="0.75"/>
  <text x="382" y="679" class="body" font-size="10.5" fill="#5A5A5A">forte</text>

  <!-- Sadasivan callout (zone 4) -->
  <g class="interactive" data-card="limite-sadasivan" tabindex="0" role="button" aria-label="Borne théorique de Sadasivan 2023">
    <rect x="600" y="660" width="540" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="620" y="684" class="mono" font-size="10" letter-spacing="2" fill="#B7332C">⚠ BORNE THÉORIQUE — SADASIVAN ET AL. 2023</text>
    <text x="620" y="706" class="body" font-size="11.5" fill="#1A1A1A">La détection devient impossible quand l'écart distributionnel humain/IA tend vers 0.</text>
    <text x="620" y="722" class="body" font-size="11.5" fill="#5A5A5A">Taux de détection borné par 1/2 + ε, où ε ↘ avec le progrès des modèles. À mesure que les LLM</text>
    <text x="620" y="738" class="body" font-size="11.5" fill="#5A5A5A">deviennent fluides, la détection statistique pure tend vers le hasard. Pas un bug, une limite formelle.</text>
  </g>

  <!-- Footer -->
  <text x="60" y="780" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Dathathri et al. Nature 634 (2024 — SynthID) · Sadasivan et al. arXiv 2303.11156 (2023) · Liang et al. 2023 (faux-positifs ENL) · obs. GPTZero/Turnitin 2024-2025.</text>
</svg>
