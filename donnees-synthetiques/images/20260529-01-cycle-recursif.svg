<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
    <marker id="arr01c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B7332C"/>
    </marker>
    <marker id="arr01t" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F5560"/>
    </marker>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 01 · TROIS RÉGIMES D'ENTRAÎNEMENT</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">Le cycle <tspan font-style="italic">récursif</tspan>, selon qu'il oublie ou retient l'humain.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">La différence entre crash et stabilité tient à un seul paramètre : qui reste dans le mix à la génération n+1.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Régime 1 : Boucle fermée (Shumailov) -->
  <g class="interactive" data-card="boucle-fermee" tabindex="0" role="button" aria-label="Boucle fermée pure — scénario Shumailov">
    <rect x="60" y="190" width="1080" height="160" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="80" y="216" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">RÉGIME 1 · BOUCLE FERMÉE PURE</text>
    <text x="80" y="242" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Remplacement strict — le scénario <tspan font-style="italic">Shumailov 2024</tspan>.</text>
    <text x="80" y="262" class="body" font-size="11.5" fill="#5A5A5A">À chaque génération, la donnée humaine d'origine disparaît du mix. Le modèle n'apprend plus que de lui-même.</text>

    <!-- Chain -->
    <g transform="translate(80,295)">
      <circle cx="20" cy="20" r="18" fill="#1A1A1A"/>
      <text x="20" y="24" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">H₀</text>
      <text x="20" y="58" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">humain</text>

      <line x1="42" y1="20" x2="76" y2="20" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arr01c)"/>

      <rect x="80" y="2" width="80" height="36" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
      <text x="120" y="24" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">M₁</text>
      <text x="120" y="58" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">modèle</text>

      <line x1="162" y1="20" x2="196" y2="20" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arr01c)"/>

      <rect x="200" y="2" width="80" height="36" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
      <text x="240" y="24" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">G₁</text>
      <text x="240" y="58" class="body" font-size="10" fill="#5A5A5A" text-anchor="middle">synthétique</text>

      <line x1="282" y1="20" x2="316" y2="20" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arr01c)"/>

      <rect x="320" y="2" width="80" height="36" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
      <text x="360" y="24" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">M₂</text>

      <line x1="402" y1="20" x2="436" y2="20" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arr01c)"/>

      <rect x="440" y="2" width="80" height="36" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
      <text x="480" y="24" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">G₂</text>

      <line x1="522" y1="20" x2="556" y2="20" stroke="#B7332C" stroke-width="1.25" stroke-dasharray="2 3"/>

      <text x="572" y="24" class="mono" font-size="13" fill="#B7332C">…</text>

      <line x1="592" y1="20" x2="626" y2="20" stroke="#B7332C" stroke-width="1.25" marker-end="url(#arr01c)"/>

      <rect x="630" y="2" width="100" height="36" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
      <text x="680" y="24" class="mono" font-size="11" font-weight="600" fill="#B7332C" text-anchor="middle">Mₙ COLLAPSE</text>
      <text x="680" y="58" class="body" font-size="10" font-style="italic" fill="#B7332C" text-anchor="middle">distribution dégénérée</text>

      <text x="820" y="22" class="body" font-size="11" fill="#5A5A5A">— scénario de laboratoire,</text>
      <text x="820" y="38" class="body" font-size="11" fill="#5A5A5A">  pas d'usage industriel.</text>
    </g>
  </g>

  <!-- Régime 2 : Accumulation (Gerstgrasser) -->
  <g class="interactive" data-card="accumulation" tabindex="0" role="button" aria-label="Accumulation — la pratique industrielle réelle">
    <rect x="60" y="370" width="1080" height="160" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="80" y="396" class="mono" font-size="11" letter-spacing="2" fill="#1F5560">RÉGIME 2 · ACCUMULATION</text>
    <text x="80" y="422" class="display" font-size="17" font-weight="600" fill="#1A1A1A">La donnée humaine persiste — le mode <tspan font-style="italic">Phi, Llama, Gemma</tspan>.</text>
    <text x="80" y="442" class="body" font-size="11.5" fill="#5A5A5A">À chaque génération, le corpus humain reste, et la donnée synthétique s'y ajoute. Perte de fidélité bornée par O(1).</text>

    <g transform="translate(80,475)">
      <rect x="0" y="2" width="180" height="36" rx="3" fill="#1A1A1A"/>
      <text x="90" y="24" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">H₀ humain (persistant)</text>

      <line x1="180" y1="12" x2="220" y2="12" stroke="#1F5560" stroke-width="1.25"/>
      <line x1="180" y1="28" x2="220" y2="28" stroke="#1F5560" stroke-width="1.25"/>

      <rect x="224" y="2" width="80" height="36" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
      <text x="264" y="24" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">M₁</text>

      <line x1="306" y1="20" x2="338" y2="20" stroke="#1F5560" stroke-width="1.25" marker-end="url(#arr01t)"/>

      <rect x="342" y="2" width="120" height="36" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
      <text x="402" y="24" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">G₁ + H₀</text>

      <line x1="464" y1="20" x2="496" y2="20" stroke="#1F5560" stroke-width="1.25" marker-end="url(#arr01t)"/>

      <rect x="500" y="2" width="80" height="36" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
      <text x="540" y="24" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">M₂</text>

      <line x1="582" y1="20" x2="614" y2="20" stroke="#1F5560" stroke-width="1.25" marker-end="url(#arr01t)"/>

      <rect x="618" y="2" width="120" height="36" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
      <text x="678" y="24" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">G₂ + H₀</text>

      <line x1="740" y1="20" x2="772" y2="20" stroke="#1F5560" stroke-width="1.25" stroke-dasharray="2 3"/>
      <text x="788" y="24" class="mono" font-size="13" fill="#1F5560">…</text>
      <line x1="808" y1="20" x2="840" y2="20" stroke="#1F5560" stroke-width="1.25" marker-end="url(#arr01t)"/>

      <rect x="844" y="2" width="100" height="36" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="2"/>
      <text x="894" y="24" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">Mₙ STABLE</text>

      <text x="960" y="22" class="body" font-size="11" fill="#5A5A5A">— Gerstgrasser et al.</text>
      <text x="960" y="38" class="body" font-size="11" fill="#5A5A5A">  Stanford, 2024.</text>
    </g>
  </g>

  <!-- Régime 3 : Mix industriel curaté -->
  <g class="interactive" data-card="mix-curate" tabindex="0" role="button" aria-label="Mix curaté — Phi-4 et synthetic-first contrôlé">
    <rect x="60" y="550" width="1080" height="160" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="80" y="576" class="mono" font-size="11" letter-spacing="2" fill="#B58A2C">RÉGIME 3 · SYNTHETIC-FIRST CURATÉ</text>
    <text x="80" y="602" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Le teacher distille, les juges filtrent — <tspan font-style="italic">Phi-4, post-training Llama</tspan>.</text>
    <text x="80" y="622" class="body" font-size="11.5" fill="#5A5A5A">Le synthétique est généré par un modèle plus fort puis filtré par juges automatiques + humains. Chaîne courte, contrôlée.</text>

    <g transform="translate(80,655)">
      <rect x="0" y="2" width="140" height="36" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
      <text x="70" y="24" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">Teacher (GPT-4o)</text>

      <line x1="142" y1="20" x2="174" y2="20" stroke="#B58A2C" stroke-width="1.25" marker-end="url(#arr01)"/>

      <rect x="178" y="2" width="140" height="36" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
      <text x="248" y="24" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">Génération G</text>

      <line x1="320" y1="20" x2="352" y2="20" stroke="#B58A2C" stroke-width="1.25" marker-end="url(#arr01)"/>

      <rect x="356" y="2" width="160" height="36" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
      <text x="436" y="24" class="mono" font-size="11" fill="#B58A2C" text-anchor="middle">Juge LLM + filtres</text>

      <line x1="518" y1="20" x2="550" y2="20" stroke="#B58A2C" stroke-width="1.25" marker-end="url(#arr01)"/>

      <rect x="554" y="2" width="160" height="36" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
      <text x="634" y="24" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">G' filtré (~40%)</text>

      <line x1="716" y1="20" x2="748" y2="20" stroke="#B58A2C" stroke-width="1.25" marker-end="url(#arr01)"/>

      <rect x="752" y="2" width="180" height="36" rx="3" fill="#1A1A1A"/>
      <text x="842" y="24" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">Modèle élève (Phi-4 14B)</text>

      <text x="950" y="22" class="body" font-size="11" fill="#5A5A5A">— chaîne courte,</text>
      <text x="950" y="38" class="body" font-size="11" fill="#5A5A5A">  pas d'itération.</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="60" y="760" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Shumailov et al. Nature 631 (2024) · Gerstgrasser et al. arXiv 2404.01413 · Phi-4 Technical Report (Microsoft, déc. 2024)</text>
  <text x="60" y="778" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Schéma 1 — Trois régimes d'entraînement face aux données synthétiques.</text>
</svg>
