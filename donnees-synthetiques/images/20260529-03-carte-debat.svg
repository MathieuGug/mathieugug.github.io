<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr03" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A5A5A"/>
    </marker>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 03 · CARTE DU DÉBAT 2023-2025</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">Cinq papiers, deux <tspan font-style="italic">axes</tspan>, un consensus émergent.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Le verdict dépend du régime expérimental — pas du phénomène lui-même.</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- 2×2 plot -->
  <!-- Axis box -->
  <rect x="220" y="220" width="700" height="440" fill="#FAF8F3" stroke="none"/>
  <!-- Quadrant separators -->
  <line x1="570" y1="220" x2="570" y2="660" stroke="#B8B5AE" stroke-width="0.75" stroke-dasharray="3 4"/>
  <line x1="220" y1="440" x2="920" y2="440" stroke="#B8B5AE" stroke-width="0.75" stroke-dasharray="3 4"/>

  <!-- Axes -->
  <line x1="220" y1="660" x2="920" y2="660" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr03)"/>
  <line x1="220" y1="660" x2="220" y2="220" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arr03)"/>

  <!-- X axis labels -->
  <text x="220" y="685" class="mono" font-size="11" font-weight="500" fill="#1A1A1A">REMPLACEMENT STRICT</text>
  <text x="920" y="685" class="mono" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="end">ACCUMULATION</text>
  <text x="570" y="708" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle">régime d'entraînement →</text>

  <!-- Y axis labels (vertical) -->
  <text x="208" y="220" class="mono" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="end">PAS DE COLLAPSE</text>
  <text x="208" y="660" class="mono" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="end">COLLAPSE FATAL</text>
  <text x="190" y="440" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="middle" transform="rotate(-90 190 440)">↑ verdict</text>

  <!-- Quadrant labels (faint) -->
  <text x="395" y="240" class="display" font-size="14" font-style="italic" fill="#B8B5AE" text-anchor="middle">«&#160;cas de labo, pas collapse&#160;»</text>
  <text x="745" y="240" class="display" font-size="14" font-style="italic" fill="#B8B5AE" text-anchor="middle">«&#160;pratique industrielle, stable&#160;»</text>
  <text x="395" y="645" class="display" font-size="14" font-style="italic" fill="#B8B5AE" text-anchor="middle">«&#160;collapse classique Shumailov&#160;»</text>
  <text x="745" y="645" class="display" font-size="14" font-style="italic" fill="#B8B5AE" text-anchor="middle">«&#160;collapse robuste — minoritaire&#160;»</text>

  <!-- Papers as plotted points -->

  <!-- Shumailov : remplacement, collapse fatal — bottom left -->
  <g class="interactive" data-card="paper-shumailov" tabindex="0" role="button" aria-label="Shumailov et al. — Nature 2024">
    <circle cx="320" cy="570" r="11" fill="#B7332C"/>
    <text x="320" y="574" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>
    <rect x="262" y="500" width="148" height="48" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="336" y="520" class="display" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Shumailov et al.</text>
    <text x="336" y="540" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">Nature, juil. 2024</text>
    <line x1="320" y1="548" x2="320" y2="558" stroke="#5A5A5A" stroke-width="0.75"/>
  </g>

  <!-- Dohmatob : remplacement, collapse fatal — slightly less extreme -->
  <g class="interactive" data-card="paper-dohmatob" tabindex="0" role="button" aria-label="Dohmatob, Feng, Kempe — Strong Model Collapse">
    <circle cx="430" cy="490" r="11" fill="#B7332C" opacity="0.85"/>
    <text x="430" y="494" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">2</text>
    <rect x="376" y="406" width="160" height="62" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="456" y="426" class="display" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Dohmatob, Feng, Kempe</text>
    <text x="456" y="446" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">NYU/Meta, fév. 2024</text>
    <text x="456" y="461" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">scaling laws changées</text>
    <line x1="430" y1="468" x2="430" y2="478" stroke="#5A5A5A" stroke-width="0.75"/>
  </g>

  <!-- Alemohammad : remplacement → accumulation, image, collapse modéré -->
  <g class="interactive" data-card="paper-alemohammad" tabindex="0" role="button" aria-label="Alemohammad et al. — Self-Consuming Models Go MAD">
    <circle cx="560" cy="380" r="11" fill="#B58A2C"/>
    <text x="560" y="384" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">3</text>
    <rect x="500" y="300" width="160" height="62" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="580" y="320" class="display" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Alemohammad et al.</text>
    <text x="580" y="340" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">Rice, 2023 (rev. 2024)</text>
    <text x="580" y="355" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">image, MAD éteint à 5-10%</text>
    <line x1="560" y1="362" x2="560" y2="370" stroke="#5A5A5A" stroke-width="0.75"/>
  </g>

  <!-- Gerstgrasser : accumulation, pas de collapse — top right -->
  <g class="interactive" data-card="paper-gerstgrasser" tabindex="0" role="button" aria-label="Gerstgrasser et al. — Breaking the Curse">
    <circle cx="810" cy="310" r="11" fill="#1F5560"/>
    <text x="810" y="314" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">4</text>
    <rect x="744" y="232" width="180" height="62" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="834" y="252" class="display" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Gerstgrasser et al.</text>
    <text x="834" y="272" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">Stanford, avr. 2024</text>
    <text x="834" y="287" class="body" font-size="10" font-style="italic" fill="#1F5560" text-anchor="middle">accumulation → fidélité bornée</text>
    <line x1="810" y1="294" x2="810" y2="300" stroke="#5A5A5A" stroke-width="0.75"/>
  </g>

  <!-- Bertrand : intermédiaire, formalisation théorique -->
  <g class="interactive" data-card="paper-bertrand" tabindex="0" role="button" aria-label="Bertrand et al. — Stability of Iterative Retraining">
    <circle cx="690" cy="450" r="11" fill="#1F5560" opacity="0.85"/>
    <text x="690" y="454" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">5</text>
    <rect x="610" y="558" width="180" height="62" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="700" y="578" class="display" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">Bertrand et al.</text>
    <text x="700" y="598" class="mono" font-size="10" fill="#5A5A5A" text-anchor="middle">ICLR 2024</text>
    <text x="700" y="613" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">point de bascule stable/collapse</text>
    <line x1="690" y1="461" x2="690" y2="558" stroke="#5A5A5A" stroke-width="0.75"/>
  </g>

  <!-- Caption block -->
  <rect x="960" y="220" width="180" height="220" rx="3" fill="#F2EFE7" stroke="none"/>
  <text x="980" y="248" class="mono" font-size="10" letter-spacing="2" fill="#5A5A5A">CONSENSUS ÉMERGENT</text>
  <text x="980" y="272" class="body" font-size="11.5" fill="#1A1A1A">1.</text>
  <text x="996" y="272" class="body" font-size="11.5" fill="#1A1A1A">Le mécanisme</text>
  <text x="980" y="288" class="body" font-size="11.5" fill="#1A1A1A">Shumailov est réel.</text>

  <text x="980" y="320" class="body" font-size="11.5" fill="#1A1A1A">2.</text>
  <text x="996" y="320" class="body" font-size="11.5" fill="#1A1A1A">Il ne s'applique pas</text>
  <text x="980" y="336" class="body" font-size="11.5" fill="#1A1A1A">à la pratique réelle.</text>

  <text x="980" y="368" class="body" font-size="11.5" fill="#1A1A1A">3.</text>
  <text x="996" y="368" class="body" font-size="11.5" fill="#1A1A1A">Mais l'absence de</text>
  <text x="980" y="384" class="body" font-size="11.5" fill="#1A1A1A">crash ≠ absence de</text>
  <text x="980" y="400" class="body" font-size="11.5" fill="#1A1A1A">dégradation.</text>

  <!-- Footer -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="760" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : synthèse de la littérature 2023-2025 sur le model collapse — papiers numérotés correspondent aux notes [1] à [4] et [11] du rapport.</text>
  <text x="60" y="778" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Schéma 3 — Positionnement de cinq travaux structurants sur deux axes : régime d'entraînement × verdict empirique.</text>
</svg>
