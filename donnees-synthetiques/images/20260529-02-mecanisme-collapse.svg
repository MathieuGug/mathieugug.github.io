<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="58" class="mono" font-size="13" letter-spacing="3" fill="#B7332C">SCHÉMA 02 · MÉCANISME DU COLLAPSE</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1A1A1A">D'abord les <tspan font-style="italic">queues</tspan>, puis la <tspan font-style="italic">variance</tspan>.</text>
  <text x="60" y="132" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Trois régimes successifs, chacun observable dans les protocoles de Shumailov et al. (2024).</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Panneau A : Early collapse -->
  <g class="interactive" data-card="early-collapse" tabindex="0" role="button" aria-label="Early collapse — perte des queues">
    <rect x="60" y="200" width="340" height="440" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="228" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">A · EARLY COLLAPSE</text>
    <text x="80" y="258" class="display" font-size="17" font-weight="600" fill="#1A1A1A">Les queues disparaissent.</text>
    <text x="80" y="282" class="body" font-size="11.5" fill="#5A5A5A">Quelques générations suffisent</text>
    <text x="80" y="298" class="body" font-size="11.5" fill="#5A5A5A">à éroder les événements rares.</text>

    <!-- Mini graph : 3 distribution curves -->
    <g transform="translate(80,330)">
      <!-- Axes -->
      <line x1="0" y1="220" x2="300" y2="220" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="0" y1="220" x2="0" y2="40" stroke="#1A1A1A" stroke-width="1"/>
      <text x="-8" y="48" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">P(x)</text>
      <text x="300" y="238" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">x</text>

      <!-- Gen 0 (humain, large bell) -->
      <path d="M 5,218 Q 50,175 90,110 Q 130,55 150,55 Q 170,55 210,110 Q 250,175 295,218"
            fill="none" stroke="#1A1A1A" stroke-width="2"/>
      <text x="150" y="48" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">G₀</text>

      <!-- Gen 3 (queues plus courtes) -->
      <path d="M 30,218 Q 70,180 100,115 Q 130,65 150,65 Q 170,65 200,115 Q 230,180 270,218"
            fill="none" stroke="#B7332C" stroke-width="1.5" stroke-dasharray="5 2"/>

      <!-- Gen 6 (queues très courtes, plus piqué) -->
      <path d="M 60,218 Q 90,190 115,120 Q 135,75 150,75 Q 165,75 185,120 Q 210,190 240,218"
            fill="none" stroke="#B7332C" stroke-width="1.5"/>

      <text x="150" y="265" class="body" font-size="10.5" font-style="italic" fill="#5A5A5A" text-anchor="middle">les bords se rapprochent</text>
    </g>

    <text x="80" y="612" class="mono" font-size="10" font-style="italic" fill="#B58A2C">Padmakumar &amp; He : −11 % à −39 %</text>
    <text x="80" y="628" class="mono" font-size="10" font-style="italic" fill="#B58A2C">de diversité après un seul tour.</text>
  </g>

  <!-- Panneau B : Late collapse -->
  <g class="interactive" data-card="late-collapse" tabindex="0" role="button" aria-label="Late collapse — variance s'effondre">
    <rect x="430" y="200" width="340" height="440" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="450" y="228" class="mono" font-size="11" letter-spacing="2" fill="#B7332C">B · LATE COLLAPSE</text>
    <text x="450" y="258" class="display" font-size="17" font-weight="600" fill="#1A1A1A">La variance s'effondre.</text>
    <text x="450" y="282" class="body" font-size="11.5" fill="#5A5A5A">Toute la masse converge vers</text>
    <text x="450" y="298" class="body" font-size="11.5" fill="#5A5A5A">quelques modes — pic unique.</text>

    <g transform="translate(450,330)">
      <line x1="0" y1="220" x2="300" y2="220" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="0" y1="220" x2="0" y2="40" stroke="#1A1A1A" stroke-width="1"/>
      <text x="-8" y="48" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">P(x)</text>
      <text x="300" y="238" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">x</text>

      <!-- Gen 0 -->
      <path d="M 5,218 Q 50,175 90,110 Q 130,55 150,55 Q 170,55 210,110 Q 250,175 295,218"
            fill="none" stroke="#1A1A1A" stroke-width="2"/>
      <text x="150" y="48" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">G₀</text>

      <!-- Gen 9 (Dirac pic) -->
      <path d="M 140,218 L 140,55 L 160,55 L 160,218 Z"
            fill="rgba(183,51,44,0.15)" stroke="#B7332C" stroke-width="2"/>

      <text x="150" y="265" class="body" font-size="10.5" font-style="italic" fill="#5A5A5A" text-anchor="middle">le modèle ne sait plus produire que peu</text>
    </g>

    <text x="450" y="612" class="mono" font-size="10" font-style="italic" fill="#B58A2C">Shumailov 2024 : OPT-125M sur</text>
    <text x="450" y="628" class="mono" font-size="10" font-style="italic" fill="#B58A2C">WikiText-2, 9 itérations — collapsed.</text>
  </g>

  <!-- Panneau C : Accumulation borne -->
  <g class="interactive" data-card="accumulation-borne" tabindex="0" role="button" aria-label="Accumulation — collapse borné">
    <rect x="800" y="200" width="340" height="440" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="820" y="228" class="mono" font-size="11" letter-spacing="2" fill="#1F5560">C · ACCUMULATION</text>
    <text x="820" y="258" class="display" font-size="17" font-weight="600" fill="#1A1A1A">La distribution reste stable.</text>
    <text x="820" y="282" class="body" font-size="11.5" fill="#5A5A5A">L'humain persistant dans le mix</text>
    <text x="820" y="298" class="body" font-size="11.5" fill="#5A5A5A">borne la perte de fidélité.</text>

    <g transform="translate(820,330)">
      <line x1="0" y1="220" x2="300" y2="220" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="0" y1="220" x2="0" y2="40" stroke="#1A1A1A" stroke-width="1"/>
      <text x="-8" y="48" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">P(x)</text>
      <text x="300" y="238" class="mono" font-size="9" fill="#5A5A5A" text-anchor="end">x</text>

      <!-- Gen 0 -->
      <path d="M 5,218 Q 50,175 90,110 Q 130,55 150,55 Q 170,55 210,110 Q 250,175 295,218"
            fill="none" stroke="#1A1A1A" stroke-width="2"/>
      <text x="150" y="48" class="mono" font-size="10" fill="#1A1A1A" text-anchor="middle">G₀</text>

      <!-- Gen 9 (légère contraction mais reste) -->
      <path d="M 15,218 Q 60,178 95,115 Q 130,60 150,60 Q 170,60 205,115 Q 240,178 285,218"
            fill="none" stroke="#1F5560" stroke-width="1.5" stroke-dasharray="5 2"/>
      <text x="220" y="80" class="mono" font-size="10" fill="#1F5560">G₉</text>

      <text x="150" y="265" class="body" font-size="10.5" font-style="italic" fill="#5A5A5A" text-anchor="middle">distribution préservée, contraction bornée</text>
    </g>

    <text x="820" y="612" class="mono" font-size="10" font-style="italic" fill="#1F5560">Gerstgrasser et al. 2024 : perte</text>
    <text x="820" y="628" class="mono" font-size="10" font-style="italic" fill="#1F5560">de fidélité en O(1), pas en O(n).</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="680" x2="1140" y2="680" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="708" class="body" font-size="12" fill="#1A1A1A">Lecture : <tspan class="body" fill="#5A5A5A" font-style="italic">le titre « model collapse » couvre trois régimes que la littérature 2024 distingue désormais explicitement.</tspan></text>
  <text x="60" y="730" class="body" font-size="11.5" fill="#5A5A5A">Le crash spectaculaire (B) n'est pas le scénario industriel ; les pertes silencieuses (A) le sont — et n'apparaissent sur aucun benchmark standard.</text>

  <text x="60" y="772" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Shumailov et al. Nature 631 (2024) · Gerstgrasser et al. arXiv 2404.01413 (2024) · Padmakumar &amp; He ICLR 2024.</text>
</svg>
