body { display: flex; flex-direction: column; padding-top: 56px; }

/* Cursor sur les targets zoomables */
svg[data-canvas-zoom] [data-card] { cursor: pointer; }

/* Au niveau 0 : tous les détails (.detail-content) sont presque invisibles */
svg[data-canvas-zoom] .detail-content { opacity: 0; transition: opacity 500ms ease; pointer-events: none; }
/* Au niveau 1+ : le détail focalisé devient visible */
svg[data-canvas-zoom] .zoom-target[data-state="focused"] .detail-content { opacity: 1; pointer-events: auto; }

/* Le contenu de niveau 0 (chrome de fond) s'atténue quand on zoome */
svg[data-canvas-zoom][data-level="1"] #lod-base { opacity: 0.35; transition: opacity 500ms ease; }
svg[data-canvas-zoom][data-level="2"] #lod-base { opacity: 0.15; transition: opacity 500ms ease; }
svg[data-canvas-zoom] #lod-base { transition: opacity 500ms ease; }

/* Outline visible des regions zoomables */
svg[data-canvas-zoom] .zoom-target { opacity: 1; }
svg[data-canvas-zoom] .zoom-target[data-state="focused"] { opacity: 1; }
svg[data-canvas-zoom] .zoom-target[data-state="dimmed"] { opacity: 0.15; }

/* Petit pulsation discrète sur les regions cliquables au niveau 0 */
@keyframes pulse-hint {
  0%, 100% { stroke-opacity: 0.4; }
  50% { stroke-opacity: 0.9; }
}
svg[data-canvas-zoom][data-level="0"] [data-card]:hover .pulse-ring {
  animation: pulse-hint 1.5s ease-in-out infinite;
}

/* Detail content : style général */
.detail-frame { fill: var(--paper); stroke-width: 3; }
.detail-title { font-family: Cambria, Georgia, serif; font-weight: 500; }
.detail-body { font-family: Cambria, Georgia, serif; }
.detail-mono { font-family: 'Source Code Pro', 'JetBrains Mono', monospace; }
</style>
