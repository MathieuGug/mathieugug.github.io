<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 2330" preserveAspectRatio="xMidYMid meet">
  <rect width="2000" height="2330" fill="#faf8f3"/>

  <!-- Header -->
  <text x="100" y="80" font-family="Source Code Pro, monospace" font-size="28" letter-spacing="0.2em" font-weight="500" fill="#1f5560">PRÉVENTIF · PRODUCTION MONITORING</text>
  <text x="100" y="180" font-family="Cambria, Georgia, serif" font-size="84" font-weight="500" fill="#1a1a1a">Production monitoring</text>
  <text x="100" y="240" font-family="Cambria, Georgia, serif" font-size="36" font-style="italic" fill="#5a5a5a">Post-launch · vérité terrain · 5 µ-méthodes · réactif mais signal bruyant</text>
  <line x1="100" y1="290" x2="800" y2="290" stroke="#1f5560" stroke-width="3"/>

  <!-- Items -->
  <g transform="translate(100, 380)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#1f5560" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#1f5560" font-weight="500">µ-1</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">µ-1 Error rate / 5xx / timeout</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">alertes sur taux d'erreurs HTTP/runtime</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">attrape : tool misuse — échecs API répétés</text>
  </g>
  <g transform="translate(100, 720)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#1f5560" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#1f5560" font-weight="500">µ-2</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">µ-2 Latency p95 / p99</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">seuils trop lâches · drift lent invisible</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#b8582e">⚠ TROU LARGE : latency drift passe ici → incident</text>
  </g>
  <g transform="translate(100, 1060)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#1f5560" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#1f5560" font-weight="500">µ-3</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">µ-3 Cost per task / token usage</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">alertes sur dépassement budget</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">attrape : reward hacking — long thinking</text>
  </g>
  <g transform="translate(100, 1400)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#1f5560" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#1f5560" font-weight="500">µ-4</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">µ-4 Output anomaly detection</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">distribution-shift sur les outputs</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">attrape : hallucination — sortie hors distribution</text>
  </g>
  <g transform="translate(100, 1740)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#1f5560" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#1f5560" font-weight="500">µ-5</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">µ-5 User reports / 👍/👎</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">signal direct mais sparse, biaisé</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">attrape : context saturation — fil perdu signalé</text>
  </g>


  <!-- Anti-pattern (si présent) -->


  <!-- Frameworks -->
  <g transform="translate(100, 2100)">
    <text x="0" y="-20" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.2em" font-weight="500" fill="#1f5560">FRAMEWORKS / OUTILS</text>
  </g>
  <g transform="translate(100, 2110)">
    <rect x="0" y="0" width="210" height="48" rx="6" fill="#e8f0f1"/>
    <text x="105" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#1f5560">Datadog</text>
    <rect x="230" y="0" width="210" height="48" rx="6" fill="#e8f0f1"/>
    <text x="335" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#1f5560">Honeycomb</text>
    <rect x="460" y="0" width="210" height="48" rx="6" fill="#e8f0f1"/>
    <text x="565" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#1f5560">Sentry</text>
    <rect x="690" y="0" width="210" height="48" rx="6" fill="#e8f0f1"/>
    <text x="795" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#1f5560">Anomalo</text>
    <rect x="920" y="0" width="210" height="48" rx="6" fill="#e8f0f1"/>
    <text x="1025" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#1f5560">PostHog</text>
  </g>


  <!-- Footer -->
  <text x="100" y="2230" font-family="Cambria, Georgia, serif" font-size="26" font-style="italic" fill="#5a5a5a">« Réactif et utile, mais le signal bruyant requiert du tri. »</text>

</svg>
