<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 2210" preserveAspectRatio="xMidYMid meet">
  <rect width="2000" height="2210" fill="#faf8f3"/>

  <!-- Header -->
  <text x="100" y="80" font-family="Source Code Pro, monospace" font-size="28" letter-spacing="0.2em" font-weight="500" fill="#a07320">HARNESS &amp; GRADERS · GRADERS SOBRES</text>
  <text x="100" y="180" font-family="Cambria, Georgia, serif" font-size="84" font-weight="500" fill="#1a1a1a">Graders sobres</text>
  <text x="100" y="240" font-family="Cambria, Georgia, serif" font-size="36" font-style="italic" fill="#5a5a5a">Déterministe &gt; LLM-as-judge &gt; humain · grader le résultat pas le chemin</text>
  <line x1="100" y1="290" x2="800" y2="290" stroke="#a07320" stroke-width="3"/>

  <!-- Items -->
  <g transform="translate(100, 380)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#a07320" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#a07320" font-weight="500">µ-1</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">Hiérarchie 1</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">déterministe quand possible</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">regex, schema check, exact match</text>
  </g>
  <g transform="translate(100, 720)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#a07320" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#a07320" font-weight="500">µ-2</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">Hiérarchie 2</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">LLM-as-judge pour le nuancé</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">avec calibration humaine</text>
  </g>
  <g transform="translate(100, 1060)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#a07320" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#a07320" font-weight="500">µ-3</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">Hiérarchie 3</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">humain pour les cas durs</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">gold standard, mais lent et cher</text>
  </g>
  <g transform="translate(100, 1400)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#a07320" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#a07320" font-weight="500">µ-4</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">Partial credit</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">éviter le tout-ou-rien</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">gradient de qualité = signal plus riche</text>
  </g>


  <!-- Anti-pattern (si présent) -->
  <g transform="translate(100, 1760)">
    <rect x="0" y="0" width="1800" height="180" rx="10" fill="#fbf2ea" stroke="#b8582e" stroke-width="2"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="20" letter-spacing="0.2em" font-weight="500" fill="#b8582e">⚠ ANTI-PATTERN</text>
    <text x="40" y="100" font-family="Cambria, Georgia, serif" font-size="32" font-weight="500" fill="#1a1a1a">LAJ flaky → fausses régressions</text>
    <text x="40" y="148" font-family="Cambria, Georgia, serif" font-size="24" font-style="italic" fill="#5a5a5a">Si le LAJ n'est pas calibré, le bruit masque le signal. Perte de confiance.</text>
  </g>


  <!-- Frameworks -->
  <g transform="translate(100, 1980)">
    <text x="0" y="-20" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.2em" font-weight="500" fill="#a07320">FRAMEWORKS / OUTILS</text>
  </g>
  <g transform="translate(100, 1990)">
    <rect x="0" y="0" width="210" height="48" rx="6" fill="#f5e9c8"/>
    <text x="105" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#a07320">DeepEval</text>
    <rect x="230" y="0" width="210" height="48" rx="6" fill="#f5e9c8"/>
    <text x="335" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#a07320">Ragas</text>
    <rect x="460" y="0" width="210" height="48" rx="6" fill="#f5e9c8"/>
    <text x="565" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#a07320">Promptfoo</text>
    <rect x="690" y="0" width="210" height="48" rx="6" fill="#f5e9c8"/>
    <text x="795" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#a07320">OpenAI Evals</text>
  </g>


  <!-- Footer -->
  <text x="100" y="2110" font-family="Cambria, Georgia, serif" font-size="26" font-style="italic" fill="#5a5a5a">« Grader le RÉSULTAT pas le CHEMIN — sinon on bride l'exploration. »</text>

</svg>
