<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 2330" preserveAspectRatio="xMidYMid meet">
  <rect width="2000" height="2330" fill="#faf8f3"/>

  <!-- Header -->
  <text x="100" y="80" font-family="Source Code Pro, monospace" font-size="28" letter-spacing="0.2em" font-weight="500" fill="#1f5560">PRÉVENTIF · AUTOMATED EVALS</text>
  <text x="100" y="180" font-family="Cambria, Georgia, serif" font-size="84" font-weight="500" fill="#1a1a1a">Automated evals</text>
  <text x="100" y="240" font-family="Cambria, Georgia, serif" font-size="36" font-style="italic" fill="#5a5a5a">CI/CD pre-launch · 5 µ-méthodes empilées · cycle rapide, scalable</text>
  <line x1="100" y1="290" x2="800" y2="290" stroke="#1f5560" stroke-width="3"/>

  <!-- Items -->
  <g transform="translate(100, 380)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#1f5560" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#1f5560" font-weight="500">µ-1</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">µ-1 Prompt unit tests</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">templates testés en isolation</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">attrape : prompt injection sur templates</text>
  </g>
  <g transform="translate(100, 720)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#1f5560" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#1f5560" font-weight="500">µ-2</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">µ-2 Tool call schema validation</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">arguments typés et bornés</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">attrape : tool misuse — mauvais args</text>
  </g>
  <g transform="translate(100, 1060)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#1f5560" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#1f5560" font-weight="500">µ-3</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">µ-3 Golden regression suite</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">N tasks figées re-jouées à chaque ship</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">attrape : hallucination — drift sur cas connus</text>
  </g>
  <g transform="translate(100, 1400)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#1f5560" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#1f5560" font-weight="500">µ-4</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">µ-4 Output structure / JSON schema</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">format validé · pas de free-form en sortie</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">attrape : spec mismatch — format incorrect</text>
  </g>
  <g transform="translate(100, 1740)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#1f5560" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#1f5560" font-weight="500">µ-5</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">µ-5 Perf &amp; cost benchmark</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">latence p95 + $ par task suivis dans la CI</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#b8582e">⚠ trous larges : latency drift y passe souvent</text>
  </g>


  <!-- Anti-pattern (si présent) -->


  <!-- Frameworks -->
  <g transform="translate(100, 2100)">
    <text x="0" y="-20" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.2em" font-weight="500" fill="#1f5560">FRAMEWORKS / OUTILS</text>
  </g>
  <g transform="translate(100, 2110)">
    <rect x="0" y="0" width="210" height="48" rx="6" fill="#e8f0f1"/>
    <text x="105" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#1f5560">Promptfoo</text>
    <rect x="230" y="0" width="210" height="48" rx="6" fill="#e8f0f1"/>
    <text x="335" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#1f5560">DeepEval</text>
    <rect x="460" y="0" width="210" height="48" rx="6" fill="#e8f0f1"/>
    <text x="565" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#1f5560">JSON Schema</text>
    <rect x="690" y="0" width="210" height="48" rx="6" fill="#e8f0f1"/>
    <text x="795" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#1f5560">Anthropic Evals</text>
    <rect x="920" y="0" width="210" height="48" rx="6" fill="#e8f0f1"/>
    <text x="1025" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#1f5560">k6 perf</text>
  </g>


  <!-- Footer -->
  <text x="100" y="2230" font-family="Cambria, Georgia, serif" font-size="26" font-style="italic" fill="#5a5a5a">« CI/CD pre-launch · drift à monitorer, investissement up-front nécessaire. »</text>

</svg>
