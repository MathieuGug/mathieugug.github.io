<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4000 3000" preserveAspectRatio="xMidYMid meet">
  <!--
    Mockup niveau 1A — Zoom sur une PHASE (Phase 1 · Collecte tasks)
    ════════════════════════════════════════════════════════════════
    Vue après animation de zoom depuis le niveau 0 vers le rectangle
    "Phase 1" du pipeline playbook. À cette échelle :
      ▸ Le cadre Phase 1 remplit la viewport
      ▸ Le contenu détaillé apparaît : S0 et S1 comme sous-stations
      ▸ Chaque sous-station a ses propres bullets, icons, affordances
      ▸ Breadcrumb haut + hint Caveat bas

    Le visiteur peut :
      ▸ Échap → retour niveau 0
      ▸ Clic sur S0 ou S1 → zoom niveau 2 (détail technique)
  -->

  <defs>
    <marker id="arr-seq2" viewBox="0 0 10 8" refX="9" refY="4"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#1f5560"/>
    </marker>
    <marker id="arr-thin" viewBox="0 0 10 8" refX="9" refY="4"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#8a7448"/>
    </marker>
  </defs>

  <rect width="4000" height="3000" fill="#faf8f3"/>

  <!-- ═══════════════════════════════════════════════════════
       BREADCRUMB (haut)
       ═══════════════════════════════════════════════════════ -->
  <g id="breadcrumb">
    <text x="200" y="90" font-family="Consolas, monospace" font-size="27"
          letter-spacing="0.2em" fill="#8a7448">
      <tspan fill="#b8582e" text-decoration="underline">↑ ÉVALUER UN AGENT</tspan>
      <tspan dx="20" fill="#5a5a5a">·</tspan>
      <tspan dx="20" fill="#1f5560">PHASE 1</tspan>
    </text>
    <text x="200" y="160" font-family="Cambria, Georgia, serif" font-size="87"
          font-weight="500" fill="#1a1a1a" letter-spacing="-0.01em">
      <tspan fill="#1f5560">①</tspan>
      <tspan dx="20">Collecte tasks</tspan>
      <tspan font-style="italic" font-size="54" fill="#5a5a5a" dx="40">— démarrer tôt</tspan>
    </text>
    <text x="200" y="210" font-family="Cambria, Georgia, serif" font-size="36"
          font-style="italic" fill="#5a5a5a">
      Comment on amorce un système d'eval avant d'avoir un harness complet
    </text>
    <line x1="200" y1="245" x2="800" y2="245" stroke="#1f5560" stroke-width="3"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       CADRE PHASE 1 (huge teal, remplit la viewport)
       ═══════════════════════════════════════════════════════ -->
  <rect x="180" y="290" width="3640" height="2350" rx="20"
        fill="none" stroke="#1f5560" stroke-width="6" opacity="0.5"/>

  <!-- Petit hint dans le coin supérieur droit du cadre -->
  <text x="3760" y="340" text-anchor="end" font-family="Consolas, monospace"
        font-size="21" letter-spacing="0.15em" fill="#1f5560" opacity="0.7">
    PHASE 1 / 4 · COLLECTE TASKS
  </text>

  <!-- ═══════════════════════════════════════════════════════
       SOUS-STATION S0 — Démarrer tôt
       ═══════════════════════════════════════════════════════ -->
  <g class="sub-station" data-node="S0">
    <rect x="280" y="430" width="1620" height="2120" rx="14"
          fill="#faf8f3" stroke="#1f5560" stroke-width="4"/>

    <!-- Badge S0 -->
    <circle cx="360" cy="510" r="46" fill="#1f5560"/>
    <text x="360" y="528" text-anchor="middle" font-family="Cambria, Georgia, serif"
          font-size="54" font-weight="600" fill="#faf8f3">S0</text>

    <!-- Titre + punchline -->
    <text x="440" y="500" font-family="Consolas, monospace" font-size="24"
          letter-spacing="0.2em" font-weight="500" fill="#1f5560">SOUS-ÉTAPE</text>
    <text x="440" y="538" font-family="Cambria, Georgia, serif" font-size="66"
          font-weight="500" fill="#1a1a1a">Démarrer tôt</text>

    <text x="320" y="640" font-family="Cambria, Georgia, serif" font-size="39"
          font-style="italic" fill="#1f5560">
      « Pas la peine d'attendre un harness propre.
    </text>
    <text x="320" y="680" font-family="Cambria, Georgia, serif" font-size="39"
          font-style="italic" fill="#1f5560">
      20 à 50 tasks de vrais échecs suffisent. »
    </text>

    <!-- Bullets clés -->
    <g font-family="Cambria, Georgia, serif" font-size="33" fill="#1a1a1a">
      <g transform="translate(320, 780)">
        <circle cx="0" cy="-6" r="6" fill="#1f5560"/>
        <text x="20" y="0" font-weight="500">20–50 tasks</text>
        <text x="20" y="32" font-size="27" font-style="italic" fill="#5a5a5a">
          assez pour révéler les 80 % des modes d'échec
        </text>
      </g>
      <g transform="translate(320, 870)">
        <circle cx="0" cy="-6" r="6" fill="#1f5560"/>
        <text x="20" y="0" font-weight="500">Issues de vrais échecs</text>
        <text x="20" y="32" font-size="27" font-style="italic" fill="#5a5a5a">
          bugs reportés, edge cases déjà observés en prod
        </text>
      </g>
      <g transform="translate(320, 960)">
        <circle cx="0" cy="-6" r="6" fill="#1f5560"/>
        <text x="20" y="0" font-weight="500">Règle 80/20</text>
        <text x="20" y="32" font-size="27" font-style="italic" fill="#5a5a5a">
          on capture l'essentiel avec un effort modeste
        </text>
      </g>
      <g transform="translate(320, 1050)">
        <circle cx="0" cy="-6" r="6" fill="#1f5560"/>
        <text x="20" y="0" font-weight="500">Value compose</text>
        <text x="20" y="32" font-size="27" font-style="italic" fill="#5a5a5a">
          chaque task ajoutée renforce le harness existant
        </text>
      </g>
    </g>

    <!-- Encart "anti-pattern" -->
    <g transform="translate(320, 1230)">
      <rect x="0" y="0" width="1500" height="240" rx="10"
            fill="#fbf2ea" stroke="#b8582e" stroke-width="2"/>
      <text x="20" y="35" font-family="Consolas, monospace" font-size="21"
            letter-spacing="0.18em" font-weight="500" fill="#b8582e">⚠ ANTI-PATTERN</text>
      <text x="20" y="80" font-family="Cambria, Georgia, serif" font-size="33"
            font-weight="500" fill="#1a1a1a">
        Attendre 1 000 tasks gold-labellisées avant de démarrer
      </text>
      <text x="20" y="115" font-family="Cambria, Georgia, serif" font-size="30"
            font-style="italic" fill="#5a5a5a">
        Conséquence : la dette d'eval gonfle pendant qu'on optimise dans le noir.
      </text>
      <text x="20" y="180" font-family="Cambria, Georgia, serif" font-size="30"
            fill="#1a1a1a">
        <tspan font-weight="500" fill="#1f5560">→ Faire l'inverse :</tspan>
        <tspan dx="10">commencer avec 20 tasks aujourd'hui, itérer chaque semaine.</tspan>
      </text>
    </g>

    <!-- Mini-graphique : courbe value vs tasks -->
    <g transform="translate(320, 1530)" font-family="Consolas, monospace" font-size="20" fill="#5a5a5a">
      <text x="0" y="0" letter-spacing="0.18em" font-weight="500" fill="#1f5560">↗ COURBE EMPIRIQUE</text>
      <!-- Mini chart -->
      <g transform="translate(0, 30)">
        <!-- Axes -->
        <line x1="0" y1="280" x2="900" y2="280" stroke="#8a7448" stroke-width="1.5"/>
        <line x1="0" y1="280" x2="0" y2="20" stroke="#8a7448" stroke-width="1.5"/>
        <!-- Axis labels -->
        <text x="450" y="320" text-anchor="middle" font-size="21">nombre de tasks</text>
        <text x="-15" y="150" transform="rotate(-90 -15 150)" text-anchor="middle" font-size="21">couverture des échecs</text>
        <!-- Tick marks -->
        <line x1="180" y1="280" x2="180" y2="286" stroke="#8a7448"/>
        <text x="180" y="304" text-anchor="middle" font-size="18">20</text>
        <line x1="450" y1="280" x2="450" y2="286" stroke="#8a7448"/>
        <text x="450" y="304" text-anchor="middle" font-size="18">100</text>
        <line x1="720" y1="280" x2="720" y2="286" stroke="#8a7448"/>
        <text x="720" y="304" text-anchor="middle" font-size="18">500</text>
        <!-- Curve (log-saturation) -->
        <path d="M 0 280 Q 100 60 250 50 Q 450 45 720 42 L 900 41"
              stroke="#1f5560" stroke-width="4" fill="none"/>
        <!-- Sweet spot zone shading -->
        <rect x="100" y="40" width="180" height="240" fill="#1f5560" opacity="0.08"/>
        <text x="190" y="20" text-anchor="middle" font-family="Cambria, Georgia, serif"
              font-style="italic" font-size="27" fill="#1f5560">sweet spot — 20 à 50</text>
        <!-- Pointer -->
        <line x1="190" y1="0" x2="190" y2="40" stroke="#1f5560" stroke-width="1" stroke-dasharray="3 3"/>
      </g>
    </g>

    <!-- Affordance de zoom -->
    <text x="1100" y="2480" text-anchor="middle" font-family="Caveat, cursive"
          font-size="48" fill="#b8582e" opacity="0.8">
      ↓ zoome encore pour voir des exemples concrets
    </text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       SOUS-STATION S1 — Manuel d'abord
       ═══════════════════════════════════════════════════════ -->
  <g class="sub-station" data-node="S1">
    <rect x="2100" y="430" width="1620" height="2120" rx="14"
          fill="#faf8f3" stroke="#1f5560" stroke-width="4"/>

    <circle cx="2180" cy="510" r="46" fill="#1f5560"/>
    <text x="2180" y="528" text-anchor="middle" font-family="Cambria, Georgia, serif"
          font-size="54" font-weight="600" fill="#faf8f3">S1</text>

    <text x="2260" y="500" font-family="Consolas, monospace" font-size="24"
          letter-spacing="0.2em" font-weight="500" fill="#1f5560">SOUS-ÉTAPE</text>
    <text x="2260" y="538" font-family="Cambria, Georgia, serif" font-size="66"
          font-weight="500" fill="#1a1a1a">Manuel d'abord</text>

    <text x="2140" y="640" font-family="Cambria, Georgia, serif" font-size="39"
          font-style="italic" fill="#1f5560">
      « Tu as déjà tes tasks — elles vivent dans
    </text>
    <text x="2140" y="680" font-family="Cambria, Georgia, serif" font-size="39"
          font-style="italic" fill="#1f5560">
      les bugs, le support et tes checks pre-release. »
    </text>

    <!-- 4 sources de tasks visuelles -->
    <g font-family="Cambria, Georgia, serif" font-size="33" fill="#1a1a1a">
      <g transform="translate(2140, 800)">
        <!-- Icon : checklist -->
        <g stroke="#1f5560" stroke-width="2.5" fill="none" stroke-linecap="round">
          <rect x="0" y="-20" width="40" height="50" rx="4"/>
          <line x1="8" y1="-8" x2="32" y2="-8"/>
          <line x1="8" y1="2" x2="32" y2="2"/>
          <line x1="8" y1="12" x2="22" y2="12"/>
        </g>
        <text x="60" y="0" font-weight="500">Checks pre-release</text>
        <text x="60" y="32" font-size="27" font-style="italic" fill="#5a5a5a">
          ce que tu valides à la main avant chaque ship
        </text>
      </g>
      <g transform="translate(2140, 920)">
        <!-- Icon : bug -->
        <g stroke="#1f5560" stroke-width="2.5" fill="none" stroke-linecap="round">
          <ellipse cx="20" cy="6" rx="14" ry="18"/>
          <line x1="20" y1="-12" x2="20" y2="-22"/>
          <line x1="20" y1="-22" x2="14" y2="-28"/>
          <line x1="20" y1="-22" x2="26" y2="-28"/>
          <line x1="4" y1="0" x2="-2" y2="-4"/>
          <line x1="36" y1="0" x2="42" y2="-4"/>
          <line x1="4" y1="12" x2="-2" y2="14"/>
          <line x1="36" y1="12" x2="42" y2="14"/>
        </g>
        <text x="60" y="0" font-weight="500">Bugs reportés</text>
        <text x="60" y="32" font-size="27" font-style="italic" fill="#5a5a5a">
          tickets, Linear, GitHub issues — chacun est une task
        </text>
      </g>
      <g transform="translate(2140, 1040)">
        <!-- Icon : mail/support -->
        <g stroke="#1f5560" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <rect x="-2" y="-14" width="44" height="32" rx="3"/>
          <polyline points="-2,-14 20,4 42,-14"/>
        </g>
        <text x="60" y="0" font-weight="500">Support queue</text>
        <text x="60" y="32" font-size="27" font-style="italic" fill="#5a5a5a">
          les questions client qui reviennent = patterns à grader
        </text>
      </g>
      <g transform="translate(2140, 1160)">
        <!-- Icon : chat -->
        <g stroke="#1f5560" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 0 -10 Q 0 -22 12 -22 L 32 -22 Q 44 -22 44 -10 L 44 4 Q 44 16 32 16 L 18 16 L 8 26 L 10 16 L 12 16 Q 0 16 0 4 Z"/>
        </g>
        <text x="60" y="0" font-weight="500">Conversations agent</text>
        <text x="60" y="32" font-size="27" font-style="italic" fill="#5a5a5a">
          transcripts où l'agent a foiré — déjà des cas par défaut
        </text>
      </g>
    </g>

    <!-- Pipeline de transformation -->
    <g transform="translate(2140, 1330)">
      <text x="0" y="0" font-family="Consolas, monospace" font-size="21"
            letter-spacing="0.18em" font-weight="500" fill="#1f5560">
        ↻ DE LA SOURCE BRUTE AU TEST CASE
      </text>

      <g transform="translate(0, 50)" font-family="Cambria, Georgia, serif" font-size="30">
        <!-- 4 étapes en ligne -->
        <g>
          <rect x="0" y="0" width="320" height="100" rx="8" fill="#e8f0f1" stroke="#1f5560" stroke-width="2"/>
          <text x="160" y="40" text-anchor="middle" font-weight="500" fill="#1a1a1a">source brute</text>
          <text x="160" y="68" text-anchor="middle" font-size="24" font-style="italic" fill="#5a5a5a">
            bug ticket #1234
          </text>
        </g>
        <line x1="330" y1="50" x2="370" y2="50" stroke="#1f5560" stroke-width="2.5"
              marker-end="url(#arr-seq2)"/>
        <g transform="translate(380, 0)">
          <rect x="0" y="0" width="320" height="100" rx="8" fill="#e8f0f1" stroke="#1f5560" stroke-width="2"/>
          <text x="160" y="40" text-anchor="middle" font-weight="500" fill="#1a1a1a">input + état attendu</text>
          <text x="160" y="68" text-anchor="middle" font-size="24" font-style="italic" fill="#5a5a5a">
            structuré
          </text>
        </g>
        <line x1="710" y1="50" x2="750" y2="50" stroke="#1f5560" stroke-width="2.5"
              marker-end="url(#arr-seq2)"/>
        <g transform="translate(760, 0)">
          <rect x="0" y="0" width="320" height="100" rx="8" fill="#1f5560" stroke="#1f5560" stroke-width="2"/>
          <text x="160" y="40" text-anchor="middle" font-weight="500" fill="#faf8f3">test case</text>
          <text x="160" y="68" text-anchor="middle" font-size="24" font-style="italic" fill="#faf8f3" opacity="0.8">
            prêt pour le grader
          </text>
        </g>
      </g>
    </g>

    <!-- Quote -->
    <text x="2900" y="1700" text-anchor="middle" font-family="Cambria, Georgia, serif"
          font-style="italic" font-size="30" fill="#5a5a5a">
      « Toutes ces sources existent déjà chez toi —
    </text>
    <text x="2900" y="1730" text-anchor="middle" font-family="Cambria, Georgia, serif"
          font-style="italic" font-size="30" fill="#5a5a5a">
      le manuel d'abord t'évite de les ignorer. »
    </text>

    <!-- Affordance de zoom -->
    <text x="2900" y="2480" text-anchor="middle" font-family="Caveat, cursive"
          font-size="48" fill="#b8582e" opacity="0.8">
      ↓ zoome encore pour voir un exemple de transformation
    </text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       Flèche "puis →" entre S0 et S1
       ═══════════════════════════════════════════════════════ -->
  <g id="s0-s1-connector" transform="translate(1900, 1450)">
    <circle cx="100" cy="0" r="80" fill="#faf8f3" stroke="#1f5560" stroke-width="3"/>
    <text x="100" y="-10" text-anchor="middle" font-family="Cambria, Georgia, serif"
          font-style="italic" font-size="36" fill="#1f5560">puis</text>
    <line x1="100" y1="10" x2="100" y2="35" stroke="#1f5560" stroke-width="2"/>
    <text x="100" y="58" text-anchor="middle" font-family="Cambria, Georgia, serif"
          font-size="21" fill="#5a5a5a">au fil des semaines</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       PARENT-CONTEXT mini-map (coin haut-droit) — montre où on est
       ═══════════════════════════════════════════════════════ -->
  <g id="minimap" transform="translate(3460, 90)" opacity="0.85">
    <rect x="0" y="0" width="320" height="120" rx="8" fill="#faf8f3" stroke="#a88b4d" stroke-width="2"/>
    <text x="10" y="20" font-family="Consolas, monospace" font-size="16"
          letter-spacing="0.15em" fill="#8a7448">VUE D'ENSEMBLE</text>
    <!-- mini playbook stations -->
    <g transform="translate(10, 32)">
      <rect x="0" y="0" width="60" height="40" rx="4" fill="#1f5560" stroke="#1f5560" stroke-width="2"/>
      <text x="30" y="26" text-anchor="middle" font-family="Cambria" font-size="21"
            font-weight="600" fill="#faf8f3">1</text>
      <rect x="74" y="0" width="60" height="40" rx="4" fill="#faf8f3" stroke="#b58a2c" stroke-width="1.5" opacity="0.5"/>
      <text x="104" y="26" text-anchor="middle" font-family="Cambria" font-size="20"
            font-weight="600" fill="#b58a2c">2A</text>
      <rect x="148" y="0" width="60" height="40" rx="4" fill="#faf8f3" stroke="#a07320" stroke-width="1.5" opacity="0.5"/>
      <text x="178" y="26" text-anchor="middle" font-family="Cambria" font-size="20"
            font-weight="600" fill="#a07320">2B</text>
      <rect x="222" y="0" width="60" height="40" rx="4" fill="#faf8f3" stroke="#b7332c" stroke-width="1.5" opacity="0.5"/>
      <text x="252" y="26" text-anchor="middle" font-family="Cambria" font-size="21"
            font-weight="600" fill="#b7332c">3</text>
      <!-- mini cheese underneath -->
      <rect x="0" y="50" width="282" height="20" rx="3" fill="#e8f0f1" stroke="#1f5560" stroke-width="1"/>
      <rect x="0" y="74" width="282" height="14" rx="3" fill="#f4eccc" stroke="#b58a2c" stroke-width="1" opacity="0.6"/>
    </g>
    <text x="160" y="-2" text-anchor="middle" font-family="Cambria, Georgia, serif"
          font-size="18" font-style="italic" fill="#1f5560">Échap pour revenir</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       FOOTER — hint
       ═══════════════════════════════════════════════════════ -->
  <g id="footer">
    <line x1="200" y1="2750" x2="3800" y2="2750" stroke="#e5d3a8" stroke-width="2"/>

    <text x="2000" y="2820" text-anchor="middle" font-family="Caveat, cursive"
          font-size="54" fill="#b8582e">
      ↓ Clique sur S0 ou S1 pour zoomer encore · Échap pour la vue d'ensemble ↑
    </text>
    <text x="2000" y="2865" text-anchor="middle" font-family="Cambria, Georgia, serif"
          font-size="24" font-style="italic" fill="#5a5a5a">
      niveau 1 / 3 · gruyère fractal — Phase 1 contient 2 sous-étapes, chacune zoomable
    </text>

    <text x="100" y="2960" font-family="Consolas, monospace" font-size="20"
          fill="#8a7448" opacity="0.7" letter-spacing="0.1em">
      mathieugug.github.io/evaluation-agentique · étude 08 · v.20260520
    </text>
  </g>
</svg>
