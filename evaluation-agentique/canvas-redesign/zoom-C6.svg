<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 2210" preserveAspectRatio="xMidYMid meet">
  <rect width="2000" height="2210" fill="#faf8f3"/>

  <!-- Header -->
  <text x="100" y="80" font-family="Source Code Pro, monospace" font-size="28" letter-spacing="0.2em" font-weight="500" fill="#b7332c">QUALITATIF · SYSTEMATIC HUMAN STUDIES</text>
  <text x="100" y="180" font-family="Cambria, Georgia, serif" font-size="84" font-weight="500" fill="#1a1a1a">Systematic human studies</text>
  <text x="100" y="240" font-family="Cambria, Georgia, serif" font-size="36" font-style="italic" fill="#5a5a5a">Gold standard · cher (~10-30 K€) · lent (~6 semaines) · à faire 2-3×/an</text>
  <line x1="100" y1="290" x2="800" y2="290" stroke="#b7332c" stroke-width="3"/>

  <!-- Items -->
  <g transform="translate(100, 380)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#b7332c" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#b7332c" font-weight="500">µ-1</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">Étude formelle</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">N=30+ raters</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">pas un sample bricolé</text>
  </g>
  <g transform="translate(100, 720)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#b7332c" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#b7332c" font-weight="500">µ-2</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">Calibration LAJ vs humain</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">inter-rater agreement</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">mesure du gap LAJ/gold</text>
  </g>
  <g transform="translate(100, 1060)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#b7332c" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#b7332c" font-weight="500">µ-3</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">Rubrics structurées</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">critères explicites</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">+ double review pour la fiabilité</text>
  </g>
  <g transform="translate(100, 1400)">
    <rect x="0" y="0" width="1800" height="300" rx="12" fill="#faf8f3" stroke="#b7332c" stroke-width="2.5"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.15em" fill="#b7332c" font-weight="500">µ-4</text>
    <text x="40" y="120" font-family="Cambria, Georgia, serif" font-size="48" font-weight="500" fill="#1a1a1a">Détection biais systématiques</text>
    <text x="40" y="170" font-family="Cambria, Georgia, serif" font-size="28" font-style="italic" fill="#5a5a5a">biais de positionnement</text>
    <text x="40" y="240" font-family="Source Code Pro, monospace" font-size="22" fill="#5a5a5a">biais culturels, etc.</text>
  </g>


  <!-- Anti-pattern (si présent) -->
  <g transform="translate(100, 1760)">
    <rect x="0" y="0" width="1800" height="180" rx="10" fill="#fbf2ea" stroke="#b8582e" stroke-width="2"/>
    <text x="40" y="50" font-family="Source Code Pro, monospace" font-size="20" letter-spacing="0.2em" font-weight="500" fill="#b8582e">⚠ ANTI-PATTERN</text>
    <text x="40" y="100" font-family="Cambria, Georgia, serif" font-size="32" font-weight="500" fill="#1a1a1a">Faire des human studies en continu</text>
    <text x="40" y="148" font-family="Cambria, Georgia, serif" font-size="24" font-style="italic" fill="#5a5a5a">Trop cher pour le quotidien. Réserver aux moments de recalibration majeure.</text>
  </g>


  <!-- Frameworks -->
  <g transform="translate(100, 1980)">
    <text x="0" y="-20" font-family="Source Code Pro, monospace" font-size="22" letter-spacing="0.2em" font-weight="500" fill="#b7332c">FRAMEWORKS / OUTILS</text>
  </g>
  <g transform="translate(100, 1990)">
    <rect x="0" y="0" width="210" height="48" rx="6" fill="#f5dedb"/>
    <text x="105" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#b7332c">Surge AI</text>
    <rect x="230" y="0" width="210" height="48" rx="6" fill="#f5dedb"/>
    <text x="335" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#b7332c">Scale AI</text>
    <rect x="460" y="0" width="210" height="48" rx="6" fill="#f5dedb"/>
    <text x="565" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#b7332c">Prolific</text>
    <rect x="690" y="0" width="210" height="48" rx="6" fill="#f5dedb"/>
    <text x="795" y="32" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="20" fill="#b7332c">Toloka</text>
  </g>


  <!-- Footer -->
  <text x="100" y="2110" font-family="Cambria, Georgia, serif" font-size="26" font-style="italic" fill="#5a5a5a">« Référence pour recalibrer toute la pyramide : LAJ → graders deterministic → metrics in CI. »</text>

</svg>
