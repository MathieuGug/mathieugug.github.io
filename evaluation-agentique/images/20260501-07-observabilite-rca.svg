<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; transition: filter 120ms; }
  </style>
  <defs>
    <marker id="arrow7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrowfb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="50" class="mono" font-size="11" fill="#5A5A5A" letter-spacing="0.05em">SCHÉMA 07</text>
  <text x="60" y="84" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Observabilité, traces et root-cause analysis</text>
  <text x="60" y="110" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Quatre couches : instrumentation OTel, collecte, évaluation continue, diagnostic automatisé</text>
  <line x1="60" y1="128" x2="1140" y2="128" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Layer headings on left -->
  <text x="60" y="170" class="mono" font-size="10" fill="#5A5A5A">PIPELINE EN 4 COUCHES</text>

  <!-- Layer 1: Instrumentation -->
  <g class="interactive" data-card="layer-instrumentation" tabindex="0" role="button" aria-label="Instrumentation">
    <rect x="60" y="190" width="1080" height="100" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <rect x="60" y="190" width="200" height="100" rx="3" fill="#1F5560"/>
    <text x="78" y="216" class="mono" font-size="11" fill="#FAF8F3" letter-spacing="0.05em">1 · INSTRUMENTATION</text>
    <text x="78" y="240" class="display" font-size="14" font-weight="600" fill="#FAF8F3">OpenTelemetry GenAI</text>
    <text x="78" y="262" class="body" font-size="10" fill="#FAF8F3">semantic conventions</text>
    <text x="78" y="278" class="body" font-size="10" fill="#FAF8F3">spans agent + tool calls</text>

    <text x="280" y="215" class="mono" font-size="10" fill="#5A5A5A">SPANS &amp; ATTRIBUTS</text>
    <rect x="280" y="225" width="170" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="290" y="244" class="mono" font-size="10" fill="#1F5560">invoke_agent</text>
    <text x="290" y="260" class="mono" font-size="9" fill="#5A5A5A">gen_ai.agent.id</text>

    <rect x="460" y="225" width="170" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="470" y="244" class="mono" font-size="10" fill="#1F5560">tool.call</text>
    <text x="470" y="260" class="mono" font-size="9" fill="#5A5A5A">name, args, latency</text>

    <rect x="640" y="225" width="170" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="650" y="244" class="mono" font-size="10" fill="#1F5560">retrieval.step</text>
    <text x="650" y="260" class="mono" font-size="9" fill="#5A5A5A">k docs, score</text>

    <text x="830" y="240" class="body" font-size="11" fill="#1A1A1A">Auto-instrumentation</text>
    <text x="830" y="256" class="body" font-size="11" fill="#1A1A1A">SDK Anthropic, OpenAI,</text>
    <text x="830" y="272" class="body" font-size="11" fill="#1A1A1A">LangChain, LlamaIndex</text>
  </g>

  <line x1="600" y1="295" x2="600" y2="320" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow7)"/>

  <!-- Layer 2: Collection -->
  <g class="interactive" data-card="layer-collection" tabindex="0" role="button" aria-label="Collecte et stockage">
    <rect x="60" y="325" width="1080" height="100" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <rect x="60" y="325" width="200" height="100" rx="3" fill="#1F5560" fill-opacity="0.85"/>
    <text x="78" y="351" class="mono" font-size="11" fill="#FAF8F3" letter-spacing="0.05em">2 · COLLECTE</text>
    <text x="78" y="375" class="display" font-size="14" font-weight="600" fill="#FAF8F3">OTel Collector</text>
    <text x="78" y="397" class="body" font-size="10" fill="#FAF8F3">batching, sampling</text>
    <text x="78" y="413" class="body" font-size="10" fill="#FAF8F3">enrichment, routage</text>

    <text x="280" y="350" class="mono" font-size="10" fill="#5A5A5A">BACKENDS / OBSERVABILITY</text>
    <rect x="280" y="360" width="120" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="290" y="380" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Phoenix</text>
    <text x="290" y="395" class="body" font-size="9" fill="#5A5A5A">OS · embeddings</text>

    <rect x="410" y="360" width="120" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="420" y="380" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Langfuse</text>
    <text x="420" y="395" class="body" font-size="9" fill="#5A5A5A">OS · self-host</text>

    <rect x="540" y="360" width="120" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="550" y="380" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Datadog LLM</text>
    <text x="550" y="395" class="body" font-size="9" fill="#5A5A5A">SaaS</text>

    <rect x="670" y="360" width="120" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="680" y="380" class="body" font-size="11" font-weight="500" fill="#1A1A1A">App Insights</text>
    <text x="680" y="395" class="body" font-size="9" fill="#5A5A5A">Azure native</text>

    <rect x="800" y="360" width="120" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="810" y="380" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Galileo</text>
    <text x="810" y="395" class="body" font-size="9" fill="#5A5A5A">SaaS · Luna-2</text>

    <rect x="930" y="360" width="200" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="940" y="380" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Arize · LangSmith · Maxim</text>
    <text x="940" y="395" class="body" font-size="9" fill="#5A5A5A">SaaS specialised</text>
  </g>

  <line x1="600" y1="430" x2="600" y2="455" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow7)"/>

  <!-- Layer 3: Continuous evaluation -->
  <g class="interactive" data-card="layer-evals" tabindex="0" role="button" aria-label="Évaluation continue">
    <rect x="60" y="460" width="1080" height="100" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <rect x="60" y="460" width="200" height="100" rx="3" fill="#1F5560" fill-opacity="0.7"/>
    <text x="78" y="486" class="mono" font-size="11" fill="#FAF8F3" letter-spacing="0.05em">3 · ÉVALUATION CONTINUE</text>
    <text x="78" y="510" class="display" font-size="14" font-weight="600" fill="#FAF8F3">Score sur trafic réel</text>
    <text x="78" y="532" class="body" font-size="10" fill="#FAF8F3">scorers automatiques</text>
    <text x="78" y="548" class="body" font-size="10" fill="#FAF8F3">LLM-judges échantillonnés</text>

    <text x="280" y="485" class="mono" font-size="10" fill="#5A5A5A">SCORERS APPLIQUÉS AUX TRACES</text>
    <rect x="280" y="495" width="170" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="290" y="514" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Code-based</text>
    <text x="290" y="530" class="body" font-size="9" fill="#5A5A5A">tool match · regex · state</text>

    <rect x="460" y="495" width="170" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="470" y="514" class="body" font-size="11" font-weight="500" fill="#1A1A1A">LAJ scorer</text>
    <text x="470" y="530" class="body" font-size="9" fill="#5A5A5A">faithfulness, helpfulness</text>

    <rect x="640" y="495" width="170" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="650" y="514" class="body" font-size="11" font-weight="500" fill="#1A1A1A">SLM judge</text>
    <text x="650" y="530" class="body" font-size="9" fill="#5A5A5A">Luna-2 · -97% coût</text>

    <rect x="820" y="495" width="170" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="0.5"/>
    <text x="830" y="514" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Human queue</text>
    <text x="830" y="530" class="body" font-size="9" fill="#5A5A5A">échantillon &lt;1%</text>

    <text x="1000" y="514" class="body" font-size="10" font-style="italic" fill="#B58A2C">AgentEvals : score</text>
    <text x="1000" y="528" class="body" font-size="10" font-style="italic" fill="#B58A2C">sans réexécuter</text>
    <text x="1000" y="542" class="body" font-size="10" font-style="italic" fill="#B58A2C">l'agent</text>
  </g>

  <line x1="600" y1="565" x2="600" y2="590" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow7)"/>

  <!-- Layer 4: RCA -->
  <g class="interactive" data-card="layer-rca" tabindex="0" role="button" aria-label="Root cause analysis">
    <rect x="60" y="595" width="1080" height="120" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <rect x="60" y="595" width="200" height="120" rx="3" fill="#B7332C"/>
    <text x="78" y="621" class="mono" font-size="11" fill="#FAF8F3" letter-spacing="0.05em">4 · ROOT-CAUSE ANALYSIS</text>
    <text x="78" y="645" class="display" font-size="14" font-weight="600" fill="#FAF8F3">AgentRx · AgentTrace</text>
    <text x="78" y="667" class="body" font-size="10" fill="#FAF8F3">critical failure step</text>
    <text x="78" y="683" class="body" font-size="10" fill="#FAF8F3">9 catégories d'erreur</text>
    <text x="78" y="699" class="body" font-size="10" fill="#FAF8F3">causal graph tracing</text>

    <text x="280" y="620" class="mono" font-size="10" fill="#5A5A5A">TAXONOMIE D'ERREURS (AGENTRX, AGENTDEBUG)</text>
    <text x="280" y="640" class="body" font-size="11" fill="#1A1A1A">• Plan adherence failure</text>
    <text x="280" y="658" class="body" font-size="11" fill="#1A1A1A">• Invention of new info (hallu)</text>
    <text x="280" y="676" class="body" font-size="11" fill="#1A1A1A">• Tool misuse / wrong args</text>
    <text x="280" y="694" class="body" font-size="11" fill="#1A1A1A">• Memory / reflection failure</text>

    <text x="540" y="640" class="body" font-size="11" fill="#1A1A1A">• Action selection error</text>
    <text x="540" y="658" class="body" font-size="11" fill="#1A1A1A">• Communication breakdown</text>
    <text x="540" y="676" class="body" font-size="11" fill="#1A1A1A">• Policy violation</text>
    <text x="540" y="694" class="body" font-size="11" fill="#1A1A1A">• Environment / system-level</text>

    <text x="800" y="620" class="mono" font-size="10" fill="#5A5A5A">ASSISTANTS DIAGNOSTICS</text>
    <text x="800" y="640" class="body" font-size="11" fill="#1A1A1A">Galileo Polly</text>
    <text x="800" y="658" class="body" font-size="11" fill="#1A1A1A">Maxim Alyx</text>
    <text x="800" y="676" class="body" font-size="11" fill="#1A1A1A">LangSmith query</text>
    <text x="800" y="694" class="body" font-size="11" font-style="italic" fill="#5A5A5A">"pourquoi tour 5 ?"</text>
  </g>

  <!-- Feedback loop : RCA → Layer 1 (alimentation eval suite offline) -->
  <circle cx="1140" cy="655" r="2.5" fill="#B7332C"/>
  <path d="M 1140 655 C 1168 655, 1168 240, 1140 240" fill="none" stroke="#B7332C" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowfb)"/>
  <text x="1190" y="448" class="mono" font-size="9" fill="#B7332C" transform="rotate(-90, 1190, 448)" text-anchor="middle">FEEDBACK → eval suite offline</text>

  <!-- Footer -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="767" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : OpenTelemetry GenAI conventions · Microsoft Foundry tracing · AgentRx (MS Research, mars 2026) · AgentTrace (arXiv:2603.14688) · AgentDebug (ICLR 2026)</text>
  <text x="60" y="785" class="body" font-size="10" font-style="italic" fill="#5A5A5A">AgentEvals · Galileo · Datadog LLM Observability ; analyse propriétaire.</text>
</svg>
