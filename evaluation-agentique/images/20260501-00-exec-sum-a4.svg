<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 1188" data-schema-id="schema-00" role="img" aria-labelledby="schema-00-title schema-00-desc">
  <title id="schema-00-title">Exec sum visuelle — Évaluer un agent, ce n'est pas tester un modèle</title>
  <desc id="schema-00-desc">Infographie A4 portrait. Évaluer un agent, ce n'est pas tester un modèle : trois ruptures successives (F1 → BLEU/ROUGE → trajectoire) ; fiabilité comme choix produit (pass@k vs pass^k, 75 % → 25 % en huit essais consistants) ; trois familles de graders et cinq biais du LLM-as-judge ; le modèle gruyère à 8 étapes et 6 couches imparfaites ; l'observabilité OTel GenAI et τ²-bench dual-control comme matériau d'éval continue.</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&amp;display=swap');
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .hand    { font-family: 'Caveat', 'Bradley Hand', 'Comic Sans MS', cursive; }
    </style>
    <marker id="arr-eval" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6f7c"/>
    </marker>
    <marker id="arr-hand" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 L 3 6 z" fill="#a83e55"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="840" height="1188" fill="#faf6ec"/>

  <!-- ============ HEADER ============ -->
  <text x="60" y="56" class="mono" font-size="12" font-weight="600" fill="#a83e55" letter-spacing="0.20em">ÉVALUER UN AGENT · 1ER MAI 2026</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1e1e2a">Évaluer un agent, ce n'est pas tester un modèle.</text>
  <text x="60" y="128" class="display" font-size="15" font-style="italic" fill="#6b6f7c">Instrumenter une trajectoire, calibrer des juges, simuler des utilisateurs.</text>
  <line x1="60" y1="148" x2="780" y2="148" stroke="rgba(30,30,42,0.16)" stroke-width="1"/>

  <!-- ============ MSG 01 — TROIS RUPTURES (timeline 3 cards) ============ -->
  <g>
    <circle cx="84" cy="184" r="20" fill="none" stroke="#a83e55" stroke-width="1.5"/>
    <text x="84" y="191" class="mono" font-size="15" font-weight="600" fill="#a83e55" text-anchor="middle">01</text>
    <text x="120" y="179" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">TROIS RUPTURES</text>
    <text x="120" y="200" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Trois objets d'éval, trois arsenaux.</text>

    <!-- 3 timeline cards -->
    <g transform="translate(60, 230)">
      <!-- Card 1 — F1 -->
      <rect x="0" y="0" width="230" height="138" rx="2" fill="#a83e55" fill-opacity="0.07" stroke="#a83e55" stroke-opacity="0.45" stroke-width="0.75"/>
      <text x="12" y="20" class="mono" font-size="9" font-weight="600" fill="#a83e55" letter-spacing="0.14em">RUPTURE 1 · CLASSIF + RÉGRESSION</text>
      <text x="12" y="44" class="display" font-size="14" font-weight="600" fill="#1e1e2a">F1 · AUC · RMSE · MAE.</text>
      <text x="12" y="64" class="body" font-size="10.5" fill="#1e1e2a">Sortie discrète ou scalaire.</text>
      <text x="12" y="80" class="body" font-size="10.5" fill="#1e1e2a">Ground truth, méthode stable.</text>
      <line x1="12" y1="94" x2="218" y2="94" stroke="#a83e55" stroke-opacity="0.20" stroke-width="0.5"/>
      <text x="12" y="112" class="body" font-size="10" fill="#6b6f7c" font-style="italic">Logique QA &amp; ML classique.</text>
      <text x="12" y="128" class="mono" font-size="9" fill="#9a9ca5">— jusqu'aux années 2020</text>

      <!-- Card 2 — BLEU/ROUGE/LAJ -->
      <rect x="245" y="0" width="230" height="138" rx="2" fill="#a83e55" fill-opacity="0.14" stroke="#a83e55" stroke-opacity="0.55" stroke-width="0.75"/>
      <text x="257" y="20" class="mono" font-size="9" font-weight="600" fill="#a83e55" letter-spacing="0.12em">RUPTURE 2 · GÉNÉRATION + RAG</text>
      <text x="257" y="44" class="display" font-size="14" font-weight="600" fill="#1e1e2a">BLEU · ROUGE · LAJ.</text>
      <text x="257" y="64" class="body" font-size="10.5" fill="#1e1e2a">Sortie texte libre ou documents.</text>
      <text x="257" y="80" class="body" font-size="10.5" fill="#1e1e2a">N-gram, sémantique, Recall@k.</text>
      <line x1="257" y1="94" x2="463" y2="94" stroke="#a83e55" stroke-opacity="0.30" stroke-width="0.5"/>
      <text x="257" y="112" class="body" font-size="10" fill="#6b6f7c" font-style="italic">L'évaluation devient probabiliste.</text>
      <text x="257" y="128" class="mono" font-size="9" fill="#9a9ca5">— ère LLM 2020-2024</text>

      <!-- Card 3 — Trajectoire -->
      <rect x="490" y="0" width="230" height="138" rx="2" fill="#a83e55" fill-opacity="0.22" stroke="#a83e55" stroke-opacity="0.75" stroke-width="0.85"/>
      <text x="502" y="20" class="mono" font-size="9" font-weight="600" fill="#a83e55" letter-spacing="0.14em">RUPTURE 3 · AGENTIQUE</text>
      <text x="502" y="44" class="display" font-size="14" font-weight="600" fill="#1e1e2a">Trajectoire complète.</text>
      <text x="502" y="64" class="body" font-size="10.5" fill="#1e1e2a">Agent + utilisateur, multi-tours.</text>
      <text x="502" y="80" class="body" font-size="10.5" fill="#1e1e2a">« Quête » à objectif adversarial.</text>
      <line x1="502" y1="94" x2="708" y2="94" stroke="#a83e55" stroke-opacity="0.40" stroke-width="0.5"/>
      <text x="502" y="112" class="body" font-size="10" fill="#6b6f7c" font-style="italic">Score ≠ correction isolée.</text>
      <text x="502" y="128" class="mono" font-size="9" fill="#9a9ca5">— 2024 → maintenant</text>
    </g>
  </g>

  <!-- ============ MSG 02 — pass@k vs pass^k ============ -->
  <g>
    <circle cx="84" cy="408" r="20" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="84" y="415" class="mono" font-size="15" font-weight="600" fill="#1F5560" text-anchor="middle">02</text>
    <text x="120" y="403" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.14em">FIABILITÉ ≠ CORRECTION</text>
    <text x="120" y="424" class="display" font-size="19" font-weight="600" fill="#1e1e2a">pass@k vs pass<tspan font-style="italic">^</tspan>k — la fiabilité comme choix produit.</text>

    <!-- Bar chart : 75 % → 42 % → 25 % -->
    <g transform="translate(120, 452)">
      <text x="0" y="0" class="mono" font-size="9.5" font-weight="600" fill="#1F5560" letter-spacing="0.12em">PASS^K — k ESSAIS CONSISTANTS</text>
      <text x="0" y="14" class="body" font-size="10" fill="#6b6f7c">Un agent à 75 % au coup unique ne tient plus la barre à k croissants.</text>

      <g transform="translate(0, 32)">
        <!-- Y-axis labels -->
        <text x="-4" y="6" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">100</text>
        <text x="-4" y="44" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">50</text>
        <text x="-4" y="82" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">0</text>
        <line x1="0" y1="6" x2="430" y2="6" stroke="rgba(30,30,42,0.10)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="0" y1="44" x2="430" y2="44" stroke="rgba(30,30,42,0.10)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="0" y1="82" x2="430" y2="82" stroke="#1e1e2a" stroke-width="0.5"/>
        <line x1="0" y1="6" x2="0" y2="82" stroke="#1e1e2a" stroke-width="0.5"/>

        <!-- pass@1 = 75 → top 25.0, h=57 -->
        <rect x="40"  y="25" width="80" height="57" fill="#1F5560" fill-opacity="0.25" stroke="#1F5560" stroke-width="0.75"/>
        <text x="80"  y="20" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">75 %</text>
        <text x="80"  y="98" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">pass@1</text>
        <text x="80"  y="112" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle" font-style="italic">un essai</text>

        <!-- pass^3 = 42 → top 50, h=32 -->
        <rect x="175" y="50" width="80" height="32" fill="#1F5560" fill-opacity="0.40" stroke="#1F5560" stroke-width="0.75"/>
        <text x="215" y="45" class="mono" font-size="11" font-weight="600" fill="#1F5560" text-anchor="middle">42 %</text>
        <text x="215" y="98" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">pass^3</text>
        <text x="215" y="112" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle" font-style="italic">trois essais</text>

        <!-- pass^8 = 25 → top 63.5, h=18.5 -->
        <rect x="310" y="63.5" width="80" height="18.5" fill="#a83e55" fill-opacity="0.55" stroke="#a83e55" stroke-width="0.85"/>
        <text x="350" y="58" class="mono" font-size="11" font-weight="600" fill="#a83e55" text-anchor="middle">25 %</text>
        <text x="350" y="98" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">pass^8</text>
        <text x="350" y="112" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle" font-style="italic">huit essais consistants</text>
      </g>
    </g>

    <!-- Side note -->
    <g transform="translate(580, 460)">
      <rect x="0" y="0" width="200" height="120" rx="2" fill="none" stroke="#1F5560" stroke-opacity="0.40" stroke-width="0.75" stroke-dasharray="3,3"/>
      <text x="12" y="18" class="mono" font-size="9" font-weight="600" fill="#1F5560" letter-spacing="0.14em">CE QUI COMPTE EN PROD</text>
      <text x="12" y="40" class="body" font-size="10.5" fill="#1e1e2a">Démo client : pass@1.</text>
      <text x="12" y="56" class="body" font-size="10.5" fill="#1e1e2a">Agent client-facing : pass^k.</text>
      <line x1="12" y1="70" x2="188" y2="70" stroke="#1F5560" stroke-opacity="0.25" stroke-width="0.5"/>
      <text x="12" y="88" class="body" font-size="10" fill="#6b6f7c" font-style="italic">Choisir k, c'est choisir le seuil</text>
      <text x="12" y="102" class="body" font-size="10" fill="#6b6f7c" font-style="italic">de fiabilité opposable au client.</text>
    </g>
  </g>

  <!-- ============ MSG 03 — FAMILLES DE GRADERS + 5 BIAIS ============ -->
  <g>
    <circle cx="84" cy="630" r="20" fill="none" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="84" y="637" class="mono" font-size="15" font-weight="600" fill="#2F5D3F" text-anchor="middle">03</text>
    <text x="120" y="625" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em">TROIS FAMILLES DE GRADERS</text>
    <text x="120" y="646" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Code, modèle, humain. Et cinq biais à connaître.</text>

    <!-- 3 grader boxes -->
    <g transform="translate(60, 672)">
      <rect x="0" y="0" width="155" height="92" rx="2" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-opacity="0.50" stroke-width="0.75"/>
      <text x="12" y="20" class="mono" font-size="9" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em">CODE — DÉTERMINISTE</text>
      <text x="12" y="40" class="display" font-size="13" font-weight="600" fill="#1e1e2a">Heuristique.</text>
      <text x="12" y="58" class="body" font-size="9.5" fill="#1e1e2a">Regex, parseur, vérif schéma.</text>
      <text x="12" y="74" class="body" font-size="9.5" fill="#6b6f7c" font-style="italic">Cheap, rapide, étroit.</text>

      <rect x="170" y="0" width="155" height="92" rx="2" fill="#2F5D3F" fill-opacity="0.18" stroke="#2F5D3F" stroke-opacity="0.65" stroke-width="0.75"/>
      <text x="182" y="20" class="mono" font-size="9" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em">MODÈLE — FLEXIBLE</text>
      <text x="182" y="40" class="display" font-size="13" font-weight="600" fill="#1e1e2a">LLM-as-judge.</text>
      <text x="182" y="58" class="body" font-size="9.5" fill="#1e1e2a">Note, rubrique, pairwise.</text>
      <text x="182" y="74" class="body" font-size="9.5" fill="#6b6f7c" font-style="italic">Flexible, biaisé, à calibrer.</text>

      <rect x="340" y="0" width="155" height="92" rx="2" fill="#2F5D3F" fill-opacity="0.28" stroke="#2F5D3F" stroke-opacity="0.85" stroke-width="0.85"/>
      <text x="352" y="20" class="mono" font-size="9" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em">HUMAIN — GOLD</text>
      <text x="352" y="40" class="display" font-size="13" font-weight="600" fill="#1e1e2a">Expert.</text>
      <text x="352" y="58" class="body" font-size="9.5" fill="#1e1e2a">Calibre, arbitre, audite.</text>
      <text x="352" y="74" class="body" font-size="9.5" fill="#6b6f7c" font-style="italic">Cher, lent, irremplaçable.</text>
    </g>

    <!-- 5 biais panel right -->
    <g transform="translate(575, 672)">
      <rect x="0" y="0" width="205" height="92" rx="2" fill="none" stroke="#a83e55" stroke-opacity="0.55" stroke-width="0.85" stroke-dasharray="3,3"/>
      <text x="12" y="18" class="mono" font-size="9" font-weight="600" fill="#a83e55" letter-spacing="0.14em">5 BIAIS DU LAJ</text>
      <text x="12" y="34" class="body" font-size="9.5" fill="#1e1e2a">• Position <tspan font-style="italic" fill="#6b6f7c">— jusqu'à 20 %</tspan></text>
      <text x="12" y="48" class="body" font-size="9.5" fill="#1e1e2a">• Verbosity — longueur</text>
      <text x="12" y="62" class="body" font-size="9.5" fill="#1e1e2a">• Self-enhancement</text>
      <text x="12" y="76" class="body" font-size="9.5" fill="#1e1e2a">• Authority — format</text>
      <text x="12" y="86" class="body" font-size="8.5" fill="#6b6f7c" font-style="italic">→ debias par swap pairwise + calibration 100-200 ex.</text>
    </g>
  </g>

  <!-- ============ MSG 04 — LE GRUYÈRE ============ -->
  <g>
    <circle cx="84" cy="804" r="20" fill="none" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="84" y="811" class="mono" font-size="15" font-weight="600" fill="#B58A2C" text-anchor="middle">04</text>
    <text x="120" y="799" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.14em">LE MODÈLE GRUYÈRE</text>
    <text x="120" y="820" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Six couches imparfaites. C'est l'empilement qui couvre.</text>

    <!-- 6 gruyère bars (bars 200 wide, labels collés à droite) — métaphore préservée -->
    <g transform="translate(60, 846)">
      <text x="0" y="0" class="mono" font-size="9" font-weight="600" fill="#B58A2C" letter-spacing="0.12em">EMPILEMENT MULTI-COUCHES</text>
      <g transform="translate(0, 12)">
        <rect x="0" y="0" width="200" height="10" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-opacity="0.55" stroke-width="0.5"/>
        <circle cx="34" cy="5" r="2.4" fill="#faf6ec"/>
        <circle cx="87" cy="5" r="2.4" fill="#faf6ec"/>
        <circle cx="159" cy="5" r="2.4" fill="#faf6ec"/>
        <text x="212" y="9" class="body" font-size="10" fill="#1e1e2a">Evals automatisées (CI)</text>
      </g>
      <g transform="translate(0, 25)">
        <rect x="0" y="0" width="200" height="10" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-opacity="0.55" stroke-width="0.5"/>
        <circle cx="53" cy="5" r="2.4" fill="#faf6ec"/>
        <circle cx="122" cy="5" r="2.4" fill="#faf6ec"/>
        <text x="212" y="9" class="body" font-size="10" fill="#1e1e2a">Monitoring production</text>
      </g>
      <g transform="translate(0, 38)">
        <rect x="0" y="0" width="200" height="10" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-opacity="0.55" stroke-width="0.5"/>
        <circle cx="25" cy="5" r="2.4" fill="#faf6ec"/>
        <circle cx="106" cy="5" r="2.4" fill="#faf6ec"/>
        <circle cx="175" cy="5" r="2.4" fill="#faf6ec"/>
        <text x="212" y="9" class="body" font-size="10" fill="#1e1e2a">A/B test en ligne</text>
      </g>
      <g transform="translate(0, 51)">
        <rect x="0" y="0" width="200" height="10" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-opacity="0.55" stroke-width="0.5"/>
        <circle cx="69" cy="5" r="2.4" fill="#faf6ec"/>
        <circle cx="141" cy="5" r="2.4" fill="#faf6ec"/>
        <text x="212" y="9" class="body" font-size="10" fill="#1e1e2a">Revue transcript manuelle</text>
      </g>
      <g transform="translate(0, 64)">
        <rect x="0" y="0" width="200" height="10" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-opacity="0.55" stroke-width="0.5"/>
        <circle cx="41" cy="5" r="2.4" fill="#faf6ec"/>
        <circle cx="116" cy="5" r="2.4" fill="#faf6ec"/>
        <circle cx="175" cy="5" r="2.4" fill="#faf6ec"/>
        <text x="212" y="9" class="body" font-size="10" fill="#1e1e2a">Études humaines structurées</text>
      </g>
      <g transform="translate(0, 77)">
        <rect x="0" y="0" width="200" height="10" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-opacity="0.55" stroke-width="0.5"/>
        <circle cx="59" cy="5" r="2.4" fill="#faf6ec"/>
        <circle cx="134" cy="5" r="2.4" fill="#faf6ec"/>
        <text x="212" y="9" class="body" font-size="10" fill="#1e1e2a">Feedback utilisateur in-app</text>
      </g>
      <!-- Side punchline -->
      <text x="450" y="20" class="body" font-size="10.5" fill="#6b6f7c" font-style="italic">Aucune couche n'est étanche.</text>
      <text x="450" y="48" class="display" font-size="14" font-weight="600" fill="#1e1e2a">C'est leur empilement qui</text>
      <text x="450" y="64" class="display" font-size="14" font-weight="600" fill="#B58A2C">couvre les angles morts.</text>
    </g>
  </g>

  <!-- ============ MSG 05 — TRACES + OTel + τ²-bench (punchline) ============ -->
  <g>
    <circle cx="84" cy="1020" r="20" fill="none" stroke="#a83e55" stroke-width="1.5"/>
    <text x="84" y="1027" class="mono" font-size="15" font-weight="600" fill="#a83e55" text-anchor="middle">05</text>
    <text x="120" y="1015" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">LE NOUVEAU MATÉRIAU</text>
    <text x="120" y="1036" class="display" font-size="19" font-weight="600" fill="#1e1e2a">La trace devient l'éval continue.</text>
    <text x="120" y="1058" class="body" font-size="11" fill="#1e1e2a"><tspan font-weight="600">OTel GenAI</tspan> instrumente · <tspan font-weight="600">τ²-bench dual-control</tspan> simule l'utilisateur · le scorer travaille sur la trace, pas en réexécutant l'agent.</text>
    <text x="120" y="1078" class="body" font-size="10.5" fill="#6b6f7c" font-style="italic">Single-control surestime la perf. Sans simulation d'utilisateur, on ne voit que les bonnes trajectoires.</text>
  </g>

  <!-- ============ ANNOTATION MANUSCRITE — pointe vers la punchline du gruyère ============ -->
  <g id="annot-tldr">
    <text x="90" y="960" class="hand" font-size="22" font-weight="700" fill="#a83e55" transform="rotate(-3 90 960)">si tu ne retiens qu'UNE chose…</text>
    <path d="M 418 940 C 448 930, 472 922, 495 918" stroke="#a83e55" stroke-width="1.4" fill="none" marker-end="url(#arr-hand)"/>
  </g>

  <!-- ============ FOOTER ============ -->
  <line x1="60" y1="1112" x2="780" y2="1112" stroke="rgba(30,30,42,0.16)" stroke-width="0.5"/>
  <text x="60" y="1138" class="mono" font-size="9" fill="#9a9ca5" letter-spacing="0.18em">MATHIEU GUGLIELMINO · MATHIEUGUG.GITHUB.IO/EVALUATION-AGENTIQUE</text>
  <text x="780" y="1138" class="mono" font-size="9" fill="#9a9ca5" letter-spacing="0.14em" text-anchor="end">A4 · SYNTHÈSE EXÉCUTIVE</text>
</svg>
