<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; transition: filter 120ms; }
  </style>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="50" class="mono" font-size="11" fill="#5A5A5A" letter-spacing="0.05em">SCHÉMA 09</text>
  <text x="60" y="84" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Coûts d'évaluation et goulots d'étranglement</text>
  <text x="60" y="110" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Six postes de coût qui scalent linéairement, sept goulots organisationnels qui plafonnent la qualité</text>
  <line x1="60" y1="128" x2="1140" y2="128" stroke="#E5E1D8" stroke-width="1"/>

  <!-- LEFT: Cost breakdown (6 posts) -->
  <text x="60" y="170" class="mono" font-size="10" fill="#5A5A5A" letter-spacing="0.05em">A · STRUCTURE DE COÛT (6 POSTES)</text>

  <!-- Stacked horizontal bar -->
  <g class="interactive" data-card="cost-bar" tabindex="0" role="button" aria-label="Décomposition des coûts">
    <rect x="60" y="190" width="540" height="50" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.25"/>

    <!-- 6 segments -->
    <rect x="60" y="190" width="120" height="50" fill="#1F5560"/>
    <rect x="180" y="190" width="135" height="50" fill="#1F5560" fill-opacity="0.7"/>
    <rect x="315" y="190" width="100" height="50" fill="#B58A2C" fill-opacity="0.85"/>
    <rect x="415" y="190" width="80" height="50" fill="#B7332C"/>
    <rect x="495" y="190" width="50" height="50" fill="#5A5A5A"/>
    <rect x="545" y="190" width="55" height="50" fill="#5A5A5A" fill-opacity="0.5"/>

    <text x="120" y="218" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">~22%</text>
    <text x="247" y="218" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">~25%</text>
    <text x="365" y="218" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">~18%</text>
    <text x="455" y="218" class="mono" font-size="10" fill="#FAF8F3" text-anchor="middle">~15%</text>
    <text x="520" y="218" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">~10%</text>
    <text x="572" y="218" class="mono" font-size="9" fill="#FAF8F3" text-anchor="middle">~10%</text>
  </g>

  <!-- Cost items detailed below -->
  <g class="interactive" data-card="cost-1" tabindex="0" role="button" aria-label="Coût 1 — modèle évalué">
    <rect x="60" y="265" width="170" height="120" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="78" y="287" class="mono" font-size="10" fill="#1F5560">1 · MODÈLE ÉVALUÉ</text>
    <text x="78" y="307" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Inférence sur</text>
    <text x="78" y="324" class="display" font-size="13" font-weight="600" fill="#1A1A1A">l'eval suite</text>
    <text x="78" y="350" class="body" font-size="10" fill="#5A5A5A">Le poste évident</text>
    <text x="78" y="366" class="body" font-size="10" fill="#5A5A5A">scale linéairement</text>
    <text x="78" y="380" class="body" font-size="10" fill="#5A5A5A">avec N tasks × N trials</text>
  </g>

  <g class="interactive" data-card="cost-2" tabindex="0" role="button" aria-label="Coût 2 — modèles juges">
    <rect x="240" y="265" width="170" height="120" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="258" y="287" class="mono" font-size="10" fill="#1F5560">2 · JUGES LLM</text>
    <text x="258" y="307" class="display" font-size="13" font-weight="600" fill="#1A1A1A">LAJ inférence</text>
    <text x="258" y="324" class="display" font-size="13" font-weight="600" fill="#1A1A1A">×2 si swap, ×3 ensemble</text>
    <text x="258" y="350" class="body" font-size="10" fill="#5A5A5A">0,01-0,03$/eval frontier</text>
    <text x="258" y="366" class="body" font-size="10" fill="#5A5A5A">10k évals = 100-300$</text>
    <text x="258" y="380" class="body" font-size="10" fill="#B7332C">SLM Luna-2 : -97%</text>
  </g>

  <g class="interactive" data-card="cost-3" tabindex="0" role="button" aria-label="Coût 3 — génération synthétique">
    <rect x="420" y="265" width="170" height="120" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="438" y="287" class="mono" font-size="10" fill="#B58A2C">3 · GÉNÉRATION SYNTH.</text>
    <text x="438" y="307" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Tasks, personas,</text>
    <text x="438" y="324" class="display" font-size="13" font-weight="600" fill="#1A1A1A">conversations</text>
    <text x="438" y="350" class="body" font-size="10" fill="#5A5A5A">Le plus mal anticipé</text>
    <text x="438" y="366" class="body" font-size="10" fill="#5A5A5A">peut exploser silencieusement</text>
    <text x="438" y="380" class="body" font-size="10" fill="#B58A2C">⚠ multi-tour scenarios</text>
  </g>

  <g class="interactive" data-card="cost-4" tabindex="0" role="button" aria-label="Coût 4 — calibration humaine">
    <rect x="60" y="400" width="170" height="120" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="78" y="422" class="mono" font-size="10" fill="#B7332C">4 · CALIBRATION HUMAINE</text>
    <text x="78" y="442" class="display" font-size="13" font-weight="600" fill="#1A1A1A">100-200 annotations</text>
    <text x="78" y="459" class="display" font-size="13" font-weight="600" fill="#1A1A1A">périodiques</text>
    <text x="78" y="485" class="body" font-size="10" fill="#5A5A5A">1-5 USD / annotation</text>
    <text x="78" y="501" class="body" font-size="10" fill="#5A5A5A">+ coordination expert</text>
    <text x="78" y="515" class="body" font-size="10" fill="#5A5A5A">+ inter-annotator</text>
  </g>

  <g class="interactive" data-card="cost-5" tabindex="0" role="button" aria-label="Coût 5 — infrastructure">
    <rect x="240" y="400" width="170" height="120" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="258" y="422" class="mono" font-size="10" fill="#5A5A5A">5 · INFRASTRUCTURE</text>
    <text x="258" y="442" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Harness · sandbox</text>
    <text x="258" y="459" class="display" font-size="13" font-weight="600" fill="#1A1A1A">stockage traces</text>
    <text x="258" y="485" class="body" font-size="10" fill="#5A5A5A">Parallélisation</text>
    <text x="258" y="501" class="body" font-size="10" fill="#5A5A5A">isolation env / trial</text>
    <text x="258" y="515" class="body" font-size="10" fill="#5A5A5A">backend observability</text>
  </g>

  <g class="interactive" data-card="cost-6" tabindex="0" role="button" aria-label="Coût 6 — maintenance">
    <rect x="420" y="400" width="170" height="120" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1.25" stroke-dasharray="4 3"/>
    <text x="438" y="422" class="mono" font-size="10" fill="#5A5A5A">6 · MAINTENANCE ★</text>
    <text x="438" y="442" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Le coût caché</text>
    <text x="438" y="459" class="display" font-size="13" font-weight="600" fill="#1A1A1A">qui pourrit la suite</text>
    <text x="438" y="485" class="body" font-size="10" fill="#5A5A5A">drift juges / saturation</text>
    <text x="438" y="501" class="body" font-size="10" fill="#5A5A5A">refresh rubriques</text>
    <text x="438" y="515" class="body" font-size="10" fill="#5A5A5A">ownership distribué</text>
  </g>

  <!-- Token cost trap callout -->
  <g class="interactive" data-card="token-trap" tabindex="0" role="button" aria-label="Token cost trap">
    <rect x="60" y="540" width="540" height="100" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1.5"/>
    <text x="80" y="562" class="mono" font-size="10" fill="#B7332C" letter-spacing="0.05em">⚠ TOKEN COST TRAP — RUPTURE POC → PRODUCTION</text>
    <text x="80" y="586" class="body" font-size="11" fill="#1A1A1A">POC : 0,14$/conversation = "négligeable"</text>
    <text x="80" y="603" class="body" font-size="11" fill="#1A1A1A">Production : × 30 000 conv/jour × 30 j = ~130 000$ / mois</text>
    <text x="80" y="620" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Code Mode (Anthropic) : -98,7% tokens / tâche en chargeant les tools à la demande.</text>
    <text x="80" y="634" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Holistic Agent Leaderboard : 21 730 rollouts = 40 000$ + 2,5 Md tokens.</text>
  </g>

  <!-- RIGHT: 7 organizational bottlenecks -->
  <text x="640" y="170" class="mono" font-size="10" fill="#5A5A5A" letter-spacing="0.05em">B · GOULOTS ORGANISATIONNELS (7)</text>

  <g class="interactive" data-card="bottleneck-task-quality" tabindex="0" role="button" aria-label="Goulot — qualité des tasks">
    <rect x="640" y="190" width="500" height="50" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <circle cx="668" cy="215" r="11" fill="#B7332C"/>
    <text x="668" y="219" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>
    <text x="690" y="212" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Qualité des tasks ← LE goulot dominant</text>
    <text x="690" y="230" class="body" font-size="10" fill="#5A5A5A">2 experts doivent atteindre le même verdict pass/fail. Discipline rare.</text>
  </g>

  <g class="interactive" data-card="bottleneck-judge-cal" tabindex="0" role="button" aria-label="Goulot — calibration des juges">
    <rect x="640" y="250" width="500" height="50" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <circle cx="668" cy="275" r="11" fill="#B7332C" fill-opacity="0.85"/>
    <text x="668" y="279" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">2</text>
    <text x="690" y="272" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Calibration des juges</text>
    <text x="690" y="290" class="body" font-size="10" fill="#5A5A5A">Disagreement humain-LAJ &gt; 30% reste fréquent. Lent, peu glamour, sous-investi.</text>
  </g>

  <g class="interactive" data-card="bottleneck-transcripts" tabindex="0" role="button" aria-label="Goulot — lecture des transcripts">
    <rect x="640" y="310" width="500" height="50" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <circle cx="668" cy="335" r="11" fill="#B7332C" fill-opacity="0.85"/>
    <text x="668" y="339" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">3</text>
    <text x="690" y="332" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Lecture des transcripts</text>
    <text x="690" y="350" class="body" font-size="10" fill="#5A5A5A">"Read the transcripts" — l'injonction la plus répétée d'Anthropic, la moins suivie.</text>
  </g>

  <g class="interactive" data-card="bottleneck-ownership" tabindex="0" role="button" aria-label="Goulot — ownership organisationnel">
    <rect x="640" y="370" width="500" height="50" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <circle cx="668" cy="395" r="11" fill="#B58A2C"/>
    <text x="668" y="399" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">4</text>
    <text x="690" y="392" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Ownership organisationnel</text>
    <text x="690" y="410" class="body" font-size="10" fill="#5A5A5A">Sans propriétaire dédié + contributions distribuées, l'eval suite pourrit en mois.</text>
  </g>

  <g class="interactive" data-card="bottleneck-imbalance" tabindex="0" role="button" aria-label="Goulot — class imbalance">
    <rect x="640" y="430" width="500" height="50" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <circle cx="668" cy="455" r="11" fill="#B58A2C"/>
    <text x="668" y="459" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">5</text>
    <text x="690" y="452" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Class imbalance des tasks</text>
    <text x="690" y="470" class="body" font-size="10" fill="#5A5A5A">Tester quand l'agent doit ET ne doit PAS agir : sinon optimisations one-sided.</text>
  </g>

  <g class="interactive" data-card="bottleneck-saturation" tabindex="0" role="button" aria-label="Goulot — eval saturation">
    <rect x="640" y="490" width="500" height="50" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1.25"/>
    <circle cx="668" cy="515" r="11" fill="#5A5A5A"/>
    <text x="668" y="519" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">6</text>
    <text x="690" y="512" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Eval saturation invisible</text>
    <text x="690" y="530" class="body" font-size="10" fill="#5A5A5A">Qodo / Opus 4.5 : capability eval saturée masque les vrais gains du modèle.</text>
  </g>

  <g class="interactive" data-card="bottleneck-contamination" tabindex="0" role="button" aria-label="Goulot — contamination">
    <rect x="640" y="550" width="500" height="50" rx="3" fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1.25"/>
    <circle cx="668" cy="575" r="11" fill="#5A5A5A"/>
    <text x="668" y="579" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">7</text>
    <text x="690" y="572" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Benchmark hacking &amp; data contamination</text>
    <text x="690" y="590" class="body" font-size="10" fill="#5A5A5A">&gt;50% erreurs annotation text-to-SQL · modèles distinguant éval vs déploiement.</text>
  </g>

  <!-- Bottom callout: optimization levers -->
  <g class="interactive" data-card="optim-levers" tabindex="0" role="button" aria-label="Leviers d'optimisation">
    <rect x="640" y="615" width="500" height="100" rx="3" fill="#1F5560" stroke="#1F5560" stroke-width="1"/>
    <text x="660" y="637" class="mono" font-size="10" fill="#FAF8F3" letter-spacing="0.05em">5 LEVIERS À FORT RETOUR</text>
    <text x="660" y="657" class="body" font-size="11" fill="#FAF8F3">• SLM-judges spécialisés (Luna-2, fine-tuned classifiers)</text>
    <text x="660" y="673" class="body" font-size="11" fill="#FAF8F3">• Routage adaptatif frontier ↔ SLM ↔ programmatic</text>
    <text x="660" y="689" class="body" font-size="11" fill="#FAF8F3">• Evals sur traces production (AgentEvals, sans rerun)</text>
    <text x="660" y="705" class="body" font-size="11" fill="#FAF8F3">• Code Mode pour le harness · Discipline de saturation</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="752" class="body" font-size="10" font-style="italic" fill="#5A5A5A">★ Le goulot dominant n'est pas l'outillage : c'est la qualité des spécifications et la discipline de calibration.</text>
  <text x="60" y="772" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : Anthropic 2026 · Mehta CLEAR (arXiv:2511.14136) · Holistic Agent Leaderboard (arXiv:2510.11977) · Hofenbitzer Token Cost Trap · Galileo.</text>
  <text x="60" y="788" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Note : pourcentages indicatifs (analyse propriétaire) ; varient selon maturité de l'agent.</text>
</svg>
