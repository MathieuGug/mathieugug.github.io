<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; transition: filter 120ms; }
  </style>
  <defs>
    <marker id="arrow10" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="50" class="mono" font-size="11" fill="#5A5A5A" letter-spacing="0.05em">SCHÉMA 10</text>
  <text x="60" y="84" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Playbook en 8 étapes &amp; modèle gruyère suisse</text>
  <text x="60" y="110" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Une roadmap, six couches de défense, un agent qu'on peut déployer en confiance</text>
  <line x1="60" y1="128" x2="1140" y2="128" stroke="#E5E1D8" stroke-width="1"/>

  <!-- TOP: 8 steps roadmap as horizontal flow -->
  <text x="60" y="160" class="mono" font-size="10" fill="#5A5A5A" letter-spacing="0.05em">A · ROADMAP ANTHROPIC EN 8 ÉTAPES</text>

  <!-- Phase boundaries -->
  <text x="195" y="186" class="mono" font-size="9" fill="#1F5560" text-anchor="middle">COLLECTE TASKS</text>
  <text x="600" y="186" class="mono" font-size="9" fill="#B58A2C" text-anchor="middle">DESIGN HARNESS &amp; GRADERS</text>
  <text x="985" y="186" class="mono" font-size="9" fill="#B7332C" text-anchor="middle">MAINTENANCE LONG TERME</text>

  <!-- 8 step boxes -->
  <g class="interactive" data-card="step-0" tabindex="0" role="button" aria-label="Étape 0 — démarrer tôt">
    <rect x="80" y="200" width="120" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <circle cx="100" cy="220" r="12" fill="#1F5560"/>
    <text x="100" y="225" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">0</text>
    <text x="125" y="225" class="display" font-size="11" font-weight="600" fill="#1A1A1A">Démarrer tôt</text>
    <text x="92" y="252" class="body" font-size="10" fill="#5A5A5A">20-50 tasks issues</text>
    <text x="92" y="266" class="body" font-size="10" fill="#5A5A5A">de vrais échecs</text>
    <text x="92" y="280" class="body" font-size="10" fill="#5A5A5A">règle 80/20</text>
    <text x="92" y="294" class="body" font-size="9" font-style="italic" fill="#1F5560">value compose</text>
  </g>

  <g class="interactive" data-card="step-1" tabindex="0" role="button" aria-label="Étape 1 — partir du manuel">
    <rect x="220" y="200" width="120" height="100" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <circle cx="240" cy="220" r="12" fill="#1F5560"/>
    <text x="240" y="225" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>
    <text x="265" y="225" class="display" font-size="11" font-weight="600" fill="#1A1A1A">Manuel d'abord</text>
    <text x="232" y="252" class="body" font-size="10" fill="#5A5A5A">checks pre-release</text>
    <text x="232" y="266" class="body" font-size="10" fill="#5A5A5A">bugs reportés</text>
    <text x="232" y="280" class="body" font-size="10" fill="#5A5A5A">support queue</text>
    <text x="232" y="294" class="body" font-size="9" font-style="italic" fill="#1F5560">→ tests cases</text>
  </g>

  <g class="interactive" data-card="step-2" tabindex="0" role="button" aria-label="Étape 2 — tasks unambiguës">
    <rect x="360" y="200" width="120" height="100" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <circle cx="380" cy="220" r="12" fill="#B58A2C"/>
    <text x="380" y="225" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">2</text>
    <text x="405" y="225" class="display" font-size="11" font-weight="600" fill="#1A1A1A">Non ambiguïté</text>
    <text x="372" y="252" class="body" font-size="10" fill="#5A5A5A">2 experts → même</text>
    <text x="372" y="266" class="body" font-size="10" fill="#5A5A5A">verdict pass/fail</text>
    <text x="372" y="280" class="body" font-size="10" fill="#5A5A5A">+ reference solution</text>
    <text x="372" y="294" class="body" font-size="9" font-style="italic" fill="#B58A2C">0% pass = task cassée</text>
  </g>

  <g class="interactive" data-card="step-3" tabindex="0" role="button" aria-label="Étape 3 — problem sets équilibrés">
    <rect x="500" y="200" width="120" height="100" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <circle cx="520" cy="220" r="12" fill="#B58A2C"/>
    <text x="520" y="225" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">3</text>
    <text x="545" y="225" class="display" font-size="11" font-weight="600" fill="#1A1A1A">Équilibre</text>
    <text x="512" y="252" class="body" font-size="10" fill="#5A5A5A">should trigger</text>
    <text x="512" y="266" class="body" font-size="10" fill="#5A5A5A">should NOT trigger</text>
    <text x="512" y="280" class="body" font-size="10" fill="#5A5A5A">éviter overtriggering</text>
    <text x="512" y="294" class="body" font-size="9" font-style="italic" fill="#B58A2C">cf. web search</text>
  </g>

  <g class="interactive" data-card="step-4" tabindex="0" role="button" aria-label="Étape 4 — eval harness robuste">
    <rect x="640" y="200" width="120" height="100" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <circle cx="660" cy="220" r="12" fill="#B58A2C"/>
    <text x="660" y="225" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">4</text>
    <text x="685" y="225" class="display" font-size="11" font-weight="600" fill="#1A1A1A">Harness stable</text>
    <text x="652" y="252" class="body" font-size="10" fill="#5A5A5A">isolation par trial</text>
    <text x="652" y="266" class="body" font-size="10" fill="#5A5A5A">clean env</text>
    <text x="652" y="280" class="body" font-size="10" fill="#5A5A5A">pas de shared state</text>
    <text x="652" y="294" class="body" font-size="9" font-style="italic" fill="#B58A2C">⚠ git history leak</text>
  </g>

  <g class="interactive" data-card="step-5" tabindex="0" role="button" aria-label="Étape 5 — graders thoughtfully">
    <rect x="780" y="200" width="120" height="100" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <circle cx="800" cy="220" r="12" fill="#B58A2C"/>
    <text x="800" y="225" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">5</text>
    <text x="825" y="225" class="display" font-size="11" font-weight="600" fill="#1A1A1A">Graders</text>
    <text x="792" y="252" class="body" font-size="10" fill="#5A5A5A">det &gt; LAJ &gt; humain</text>
    <text x="792" y="266" class="body" font-size="10" fill="#5A5A5A">grader résultat,</text>
    <text x="792" y="280" class="body" font-size="10" fill="#5A5A5A">pas chemin</text>
    <text x="792" y="294" class="body" font-size="9" font-style="italic" fill="#B58A2C">+ partial credit</text>
  </g>

  <g class="interactive" data-card="step-6" tabindex="0" role="button" aria-label="Étape 6 — lire transcripts">
    <rect x="920" y="200" width="120" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <circle cx="940" cy="220" r="12" fill="#B7332C"/>
    <text x="940" y="225" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">6</text>
    <text x="965" y="225" class="display" font-size="11" font-weight="600" fill="#1A1A1A">Lire transcripts</text>
    <text x="932" y="252" class="body" font-size="10" fill="#5A5A5A">vraie skill</text>
    <text x="932" y="266" class="body" font-size="10" fill="#5A5A5A">d'agent dev</text>
    <text x="932" y="280" class="body" font-size="10" fill="#5A5A5A">tooling de viz =</text>
    <text x="932" y="294" class="body" font-size="9" font-style="italic" fill="#B7332C">aussi rentable que graders</text>
  </g>

  <g class="interactive" data-card="step-7" tabindex="0" role="button" aria-label="Étape 7 — saturation et ownership">
    <rect x="1060" y="200" width="120" height="100" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <circle cx="1080" cy="220" r="12" fill="#B7332C"/>
    <text x="1080" y="225" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">7</text>
    <text x="1105" y="225" class="display" font-size="11" font-weight="600" fill="#1A1A1A">Saturation</text>
    <text x="1072" y="252" class="body" font-size="10" fill="#5A5A5A">capability eval</text>
    <text x="1072" y="266" class="body" font-size="10" fill="#5A5A5A">→ régression eval</text>
    <text x="1072" y="280" class="body" font-size="10" fill="#5A5A5A">+ ownership team</text>
    <text x="1072" y="294" class="body" font-size="9" font-style="italic" fill="#B7332C">living artifact</text>
  </g>

  <!-- Connecting arrows between steps -->
  <line x1="200" y1="250" x2="220" y2="250" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arrow10)"/>
  <line x1="340" y1="250" x2="360" y2="250" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arrow10)"/>
  <line x1="480" y1="250" x2="500" y2="250" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arrow10)"/>
  <line x1="620" y1="250" x2="640" y2="250" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arrow10)"/>
  <line x1="760" y1="250" x2="780" y2="250" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arrow10)"/>
  <line x1="900" y1="250" x2="920" y2="250" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arrow10)"/>
  <line x1="1040" y1="250" x2="1060" y2="250" stroke="#5A5A5A" stroke-width="0.75" marker-end="url(#arrow10)"/>

  <!-- BOTTOM: Swiss cheese -->
  <text x="60" y="350" class="mono" font-size="10" fill="#5A5A5A" letter-spacing="0.05em">B · MODÈLE GRUYÈRE SUISSE — 6 COUCHES DE DÉFENSE</text>
  <text x="60" y="370" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Aucune méthode unique ne suffit. Chaque couche a ses trous ; l'empilement seul produit une couverture acceptable.</text>

  <!-- 6 cheese slices stacked -->
  <!-- Slice 1: Automated evals -->
  <g class="interactive" data-card="cheese-1" tabindex="0" role="button" aria-label="Couche 1 — automated evals">
    <rect x="100" y="395" width="900" height="38" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.25"/>
    <!-- Holes (yellow circles) -->
    <circle cx="240" cy="414" r="14" fill="#FAF8F3"/>
    <circle cx="450" cy="414" r="11" fill="#FAF8F3"/>
    <circle cx="700" cy="414" r="13" fill="#FAF8F3"/>
    <text x="120" y="419" class="mono" font-size="10" fill="#1F5560">1 · AUTOMATED EVALS</text>
    <text x="320" y="419" class="body" font-size="11" fill="#1A1A1A">Pre-launch, CI/CD · rapide, scalable · drift, investissement up-front</text>
  </g>
  <text x="1015" y="419" class="body" font-size="10" fill="#5A5A5A">→ rapide</text>

  <!-- Slice 2: Production monitoring -->
  <g class="interactive" data-card="cheese-2" tabindex="0" role="button" aria-label="Couche 2 — production monitoring">
    <rect x="100" y="445" width="900" height="38" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.25"/>
    <circle cx="170" cy="464" r="13" fill="#FAF8F3"/>
    <circle cx="510" cy="464" r="14" fill="#FAF8F3"/>
    <circle cx="780" cy="464" r="10" fill="#FAF8F3"/>
    <text x="200" y="469" class="mono" font-size="10" fill="#1F5560">2 · PRODUCTION MONITORING</text>
    <text x="380" y="469" class="body" font-size="11" fill="#1A1A1A">Post-launch · vérité terrain · réactif, signaux bruyants</text>
  </g>
  <text x="1015" y="469" class="body" font-size="10" fill="#5A5A5A">→ continu</text>

  <!-- Slice 3: A/B testing -->
  <g class="interactive" data-card="cheese-3" tabindex="0" role="button" aria-label="Couche 3 — A/B testing">
    <rect x="100" y="495" width="900" height="38" rx="3" fill="#F2EFE7" stroke="#B58A2C" stroke-width="1.25"/>
    <circle cx="320" cy="514" r="11" fill="#FAF8F3"/>
    <circle cx="600" cy="514" r="13" fill="#FAF8F3"/>
    <circle cx="850" cy="514" r="14" fill="#FAF8F3"/>
    <text x="120" y="519" class="mono" font-size="10" fill="#B58A2C">3 · A/B TESTING</text>
    <text x="270" y="519" class="body" font-size="11" fill="#1A1A1A">Changements significatifs · outcome utilisateur · lent, traffic requis</text>
  </g>
  <text x="1015" y="519" class="body" font-size="10" fill="#5A5A5A">→ ponctuel</text>

  <!-- Slice 4: User feedback -->
  <g class="interactive" data-card="cheese-4" tabindex="0" role="button" aria-label="Couche 4 — user feedback">
    <rect x="100" y="545" width="900" height="38" rx="3" fill="#F2EFE7" stroke="#B58A2C" stroke-width="1.25"/>
    <circle cx="220" cy="564" r="14" fill="#FAF8F3"/>
    <circle cx="430" cy="564" r="11" fill="#FAF8F3"/>
    <circle cx="730" cy="564" r="13" fill="#FAF8F3"/>
    <text x="120" y="569" class="mono" font-size="10" fill="#B58A2C">4 · USER FEEDBACK</text>
    <text x="290" y="569" class="body" font-size="11" fill="#1A1A1A">Continu · cas non-anticipés · sparse, biaisé sévère</text>
  </g>
  <text x="1015" y="569" class="body" font-size="10" fill="#5A5A5A">→ asymétrique</text>

  <!-- Slice 5: Manual transcript review -->
  <g class="interactive" data-card="cheese-5" tabindex="0" role="button" aria-label="Couche 5 — manual transcript review">
    <rect x="100" y="595" width="900" height="38" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1.25"/>
    <circle cx="290" cy="614" r="13" fill="#FAF8F3"/>
    <circle cx="540" cy="614" r="14" fill="#FAF8F3"/>
    <circle cx="800" cy="614" r="10" fill="#FAF8F3"/>
    <text x="120" y="619" class="mono" font-size="10" fill="#B7332C">5 · MANUAL TRANSCRIPT REVIEW</text>
    <text x="350" y="619" class="body" font-size="11" fill="#1A1A1A">Continu · calibre l'intuition · ne scale pas</text>
  </g>
  <text x="1015" y="619" class="body" font-size="10" fill="#5A5A5A">→ qualité</text>

  <!-- Slice 6: Systematic human studies -->
  <g class="interactive" data-card="cheese-6" tabindex="0" role="button" aria-label="Couche 6 — human studies">
    <rect x="100" y="645" width="900" height="38" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1.25"/>
    <circle cx="160" cy="664" r="11" fill="#FAF8F3"/>
    <circle cx="380" cy="664" r="13" fill="#FAF8F3"/>
    <circle cx="650" cy="664" r="14" fill="#FAF8F3"/>
    <text x="200" y="669" class="mono" font-size="10" fill="#B7332C">6 · SYSTEMATIC HUMAN STUDIES</text>
    <text x="430" y="669" class="body" font-size="11" fill="#1A1A1A">Calibration LAJ · gold standard · cher, lent</text>
  </g>
  <text x="1015" y="669" class="body" font-size="10" fill="#5A5A5A">→ rare</text>

  <!-- Vertical "incident path" arrow showing alignment of holes -->
  <text x="1130" y="495" class="mono" font-size="9" fill="#B7332C" transform="rotate(90, 1130, 495)" text-anchor="middle">↓ alignement = incident</text>

  <!-- Footer -->
  <line x1="60" y1="710" x2="1140" y2="710" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="732" class="body" font-size="11" font-style="italic" fill="#5A5A5A">★ Recommandation prioritaire pour les équipes Data &amp; AI : (1) eval suite golden 50 tasks, (2) instrumentation OTel native, (3) pattern persona-based 6-10 personas.</text>
  <text x="60" y="752" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Le différentiateur conseil : démontrer la robustesse multi-segments avant déploiement, plutôt que la promettre.</text>
  <text x="60" y="780" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : Anthropic 2026 (8-step roadmap) · Reason / Cresta 2026 · CSIRO Swiss-Cheese (arXiv:2408.02205) ; analyse propriétaire.</text>
</svg>
