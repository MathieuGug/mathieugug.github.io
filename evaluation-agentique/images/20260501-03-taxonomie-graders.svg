<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; transition: filter 120ms; }
  </style>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="50" y="46" class="mono" font-size="11" fill="#5A5A5A" letter-spacing="0.05em">SCHÉMA 03</text>
  <text x="50" y="80" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Taxonomie des graders d'évaluation</text>
  <text x="50" y="106" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Trois familles, quatre types d'agents : la combinaison qui marche</text>
  <line x1="50" y1="124" x2="850" y2="124" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Three families header -->
  <text x="50" y="170" class="mono" font-size="10" fill="#5A5A5A">FAMILLES DE GRADERS</text>

  <!-- Code-based -->
  <g class="interactive" data-card="code-based" tabindex="0" role="button" aria-label="Graders code-based">
    <rect x="50" y="190" width="250" height="180" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <rect x="50" y="190" width="250" height="36" rx="3" fill="#1F5560"/>
    <text x="68" y="213" class="display" font-size="14" font-weight="600" fill="#FAF8F3">Code-based</text>
    <text x="68" y="248" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Méthodes</text>
    <text x="68" y="266" class="body" font-size="11" fill="#5A5A5A">• Exact / regex / fuzzy match</text>
    <text x="68" y="282" class="body" font-size="11" fill="#5A5A5A">• Tests binaires fail-to-pass</text>
    <text x="68" y="298" class="body" font-size="11" fill="#5A5A5A">• Static analysis (lint, type)</text>
    <text x="68" y="314" class="body" font-size="11" fill="#5A5A5A">• State check (DB, fichier)</text>
    <text x="68" y="330" class="body" font-size="11" fill="#5A5A5A">• Tool call verification</text>
    <text x="68" y="350" class="body" font-size="10" font-style="italic" fill="#1F5560">Rapide · cheap · objectif · rigide</text>
  </g>

  <!-- Model-based -->
  <g class="interactive" data-card="model-based" tabindex="0" role="button" aria-label="Graders model-based">
    <rect x="325" y="190" width="250" height="180" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <rect x="325" y="190" width="250" height="36" rx="3" fill="#B58A2C"/>
    <text x="343" y="213" class="display" font-size="14" font-weight="600" fill="#FAF8F3">Model-based</text>
    <text x="343" y="248" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Méthodes</text>
    <text x="343" y="266" class="body" font-size="11" fill="#5A5A5A">• Rubric scoring</text>
    <text x="343" y="282" class="body" font-size="11" fill="#5A5A5A">• Natural language assertion</text>
    <text x="343" y="298" class="body" font-size="11" fill="#5A5A5A">• Pairwise comparison</text>
    <text x="343" y="314" class="body" font-size="11" fill="#5A5A5A">• Reference-based</text>
    <text x="343" y="330" class="body" font-size="11" fill="#5A5A5A">• Multi-judge consensus</text>
    <text x="343" y="350" class="body" font-size="10" font-style="italic" fill="#B58A2C">Flexible · scalable · biaisé</text>
  </g>

  <!-- Human -->
  <g class="interactive" data-card="human" tabindex="0" role="button" aria-label="Graders humains">
    <rect x="600" y="190" width="250" height="180" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <rect x="600" y="190" width="250" height="36" rx="3" fill="#B7332C"/>
    <text x="618" y="213" class="display" font-size="14" font-weight="600" fill="#FAF8F3">Humain</text>
    <text x="618" y="248" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Méthodes</text>
    <text x="618" y="266" class="body" font-size="11" fill="#5A5A5A">• SME review</text>
    <text x="618" y="282" class="body" font-size="11" fill="#5A5A5A">• Crowdsourced judgment</text>
    <text x="618" y="298" class="body" font-size="11" fill="#5A5A5A">• Spot-check sampling</text>
    <text x="618" y="314" class="body" font-size="11" fill="#5A5A5A">• A/B testing</text>
    <text x="618" y="330" class="body" font-size="11" fill="#5A5A5A">• Inter-annotator agreement</text>
    <text x="618" y="350" class="body" font-size="10" font-style="italic" fill="#B7332C">Gold standard · cher · lent</text>
  </g>

  <!-- Combinations matrix -->
  <text x="50" y="430" class="mono" font-size="10" fill="#5A5A5A">COMBINAISONS RECOMMANDÉES PAR TYPE D'AGENT</text>

  <!-- Matrix grid -->
  <line x1="50" y1="460" x2="850" y2="460" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="50" y1="780" x2="850" y2="780" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="200" y1="450" x2="200" y2="780" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="416" y1="450" x2="416" y2="780" stroke="#E5E1D8" stroke-width="0.5"/>
  <line x1="633" y1="450" x2="633" y2="780" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Column headers -->
  <text x="270" y="478" class="mono" font-size="10" fill="#1F5560" text-anchor="middle">CODE</text>
  <text x="500" y="478" class="mono" font-size="10" fill="#B58A2C" text-anchor="middle">MODEL (LAJ)</text>
  <text x="725" y="478" class="mono" font-size="10" fill="#B7332C" text-anchor="middle">HUMAIN</text>

  <!-- Row 1: Coding agents -->
  <line x1="50" y1="540" x2="850" y2="540" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="510" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Coding agents</text>
  <text x="60" y="528" class="body" font-size="10" font-style="italic" fill="#5A5A5A">SWE-Bench, Terminal-Bench</text>
  <!-- Code (full) -->
  <circle cx="270" cy="514" r="11" fill="#1F5560"/>
  <text x="270" y="518" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">●●●</text>
  <!-- LAJ (medium) -->
  <circle cx="500" cy="514" r="11" fill="#B58A2C" fill-opacity="0.6"/>
  <text x="500" y="518" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">●●</text>
  <!-- Human (light) -->
  <circle cx="725" cy="514" r="11" fill="#B7332C" fill-opacity="0.3"/>
  <text x="725" y="518" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">●</text>

  <!-- Row 2: Conversational agents -->
  <line x1="50" y1="620" x2="850" y2="620" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="568" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Conversational</text>
  <text x="60" y="586" class="body" font-size="10" font-style="italic" fill="#5A5A5A">τ-Bench, τ²-Bench</text>
  <text x="60" y="606" class="body" font-size="10" font-style="italic" fill="#5A5A5A">support, sales, coaching</text>
  <circle cx="270" cy="586" r="11" fill="#1F5560" fill-opacity="0.6"/>
  <text x="270" y="590" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">●●</text>
  <circle cx="500" cy="586" r="11" fill="#B58A2C"/>
  <text x="500" y="590" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">●●●</text>
  <circle cx="725" cy="586" r="11" fill="#B7332C" fill-opacity="0.6"/>
  <text x="725" y="590" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">●●</text>

  <!-- Row 3: Research agents -->
  <line x1="50" y1="700" x2="850" y2="700" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="648" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Research</text>
  <text x="60" y="666" class="body" font-size="10" font-style="italic" fill="#5A5A5A">BrowseComp, GAIA</text>
  <text x="60" y="686" class="body" font-size="10" font-style="italic" fill="#5A5A5A">synthèse, market scan, DD</text>
  <circle cx="270" cy="666" r="11" fill="#1F5560" fill-opacity="0.3"/>
  <text x="270" y="670" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">●</text>
  <circle cx="500" cy="666" r="11" fill="#B58A2C"/>
  <text x="500" y="670" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">●●●</text>
  <circle cx="725" cy="666" r="11" fill="#B7332C"/>
  <text x="725" y="670" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">●●●</text>

  <!-- Row 4: Computer use agents -->
  <text x="60" y="728" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Computer use</text>
  <text x="60" y="746" class="body" font-size="10" font-style="italic" fill="#5A5A5A">WebArena, OSWorld</text>
  <text x="60" y="766" class="body" font-size="10" font-style="italic" fill="#5A5A5A">browser, GUI, OS</text>
  <circle cx="270" cy="746" r="11" fill="#1F5560"/>
  <text x="270" y="750" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">●●●</text>
  <circle cx="500" cy="746" r="11" fill="#B58A2C" fill-opacity="0.6"/>
  <text x="500" y="750" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">●●</text>
  <circle cx="725" cy="746" r="11" fill="#B7332C" fill-opacity="0.3"/>
  <text x="725" y="750" class="mono" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">●</text>

  <!-- Legend -->
  <text x="50" y="820" class="body" font-size="10" fill="#5A5A5A">
    <tspan font-weight="600">●●●</tspan> rôle dominant
    <tspan dx="20" font-weight="600">●●</tspan> rôle complémentaire
    <tspan dx="20" font-weight="600">●</tspan> validation périodique
  </text>
  <text x="50" y="840" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Capability eval (low pass rate, hill to climb) ↔ Régression eval (~100% pass, alarme à toute baisse)</text>
  <text x="50" y="868" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Anthropic 2026 ; analyse propriétaire.</text>
</svg>
