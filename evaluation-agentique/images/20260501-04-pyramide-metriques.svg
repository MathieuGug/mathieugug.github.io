<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; transition: filter 120ms; }
  </style>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="50" class="mono" font-size="11" fill="#5A5A5A" letter-spacing="0.05em">SCHÉMA 04</text>
  <text x="60" y="84" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Pyramide des métriques d'évaluation</text>
  <text x="60" y="110" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Du F1 au CNA enterprise : empilement par niveau de sophistication</text>
  <line x1="60" y1="128" x2="1140" y2="128" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Pyramid (5 levels) - inverted style: base wide, top narrow -->
  <!-- Level 1 (base): Classical ML metrics -->
  <g class="interactive" data-card="level-classical" tabindex="0" role="button" aria-label="Niveau 1 — métriques classiques">
    <polygon points="180,650 1020,650 950,580 250,580" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="600" y="610" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">1. Classification &amp; ranking — IA classique</text>
    <text x="600" y="632" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">precision · recall · F1 · AUC · accuracy · NDCG · MRR · BLEU · ROUGE</text>
  </g>

  <!-- Level 2: RAG retrieval -->
  <g class="interactive" data-card="level-retrieval" tabindex="0" role="button" aria-label="Niveau 2 — métriques retrieval RAG">
    <polygon points="250,580 950,580 880,510 320,510" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="600" y="540" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">2. Retrieval RAG</text>
    <text x="600" y="562" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">context precision · context recall · context relevancy · noise sensitivity</text>
  </g>

  <!-- Level 3: RAG generation -->
  <g class="interactive" data-card="level-generation" tabindex="0" role="button" aria-label="Niveau 3 — métriques génération RAG">
    <polygon points="320,510 880,510 810,440 390,440" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="600" y="470" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">3. Generation RAG</text>
    <text x="600" y="492" class="mono" font-size="11" fill="#B58A2C" text-anchor="middle">faithfulness · groundedness · answer relevancy · answer correctness · semantic similarity</text>
  </g>

  <!-- Level 4: Agent capabilities -->
  <g class="interactive" data-card="level-agent" tabindex="0" role="button" aria-label="Niveau 4 — métriques agentiques">
    <polygon points="390,440 810,440 740,370 460,370" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="600" y="400" class="display" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">4. Agent capabilities</text>
    <text x="600" y="422" class="mono" font-size="11" fill="#B7332C" text-anchor="middle">tool call accuracy · goal completion · trajectory · pass@k · pass^k · topic adherence</text>
  </g>

  <!-- Level 5 (top): CLEAR enterprise -->
  <g class="interactive" data-card="level-clear" tabindex="0" role="button" aria-label="Niveau 5 — CLEAR enterprise">
    <polygon points="460,370 740,370 670,300 530,300" fill="#B7332C" stroke="#B7332C" stroke-width="1.25"/>
    <text x="600" y="332" class="display" font-size="14" font-weight="600" fill="#FAF8F3" text-anchor="middle">5. CLEAR enterprise</text>
    <text x="600" y="354" class="mono" font-size="11" fill="#FAF8F3" text-anchor="middle">CNA · CPS · SLA compliance · pass^k</text>
  </g>

  <!-- Top label -->
  <text x="600" y="278" class="display" font-size="13" font-style="italic" fill="#5A5A5A" text-anchor="middle">Sophistication produit ↑</text>

  <!-- Side annotations: cost & complexity arrows -->
  <line x1="120" y1="300" x2="120" y2="650" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3"/>
  <polygon points="120,295 116,310 124,310" fill="#5A5A5A"/>
  <text x="100" y="380" class="mono" font-size="10" fill="#5A5A5A" transform="rotate(-90, 100, 380)" text-anchor="middle">COÛT D'ÉVALUATION ↑</text>

  <line x1="1080" y1="300" x2="1080" y2="650" stroke="#5A5A5A" stroke-width="0.75" stroke-dasharray="2 3"/>
  <polygon points="1080,295 1076,310 1084,310" fill="#5A5A5A"/>
  <text x="1098" y="380" class="mono" font-size="10" fill="#5A5A5A" transform="rotate(90, 1098, 380)" text-anchor="middle">SUBJECTIVITÉ ↑</text>

  <!-- Right side: CLEAR breakdown -->
  <g class="interactive" data-card="clear-detail" tabindex="0" role="button" aria-label="Détail CLEAR">
    <rect x="900" y="155" width="220" height="120" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1"/>
    <text x="918" y="178" class="mono" font-size="10" fill="#B7332C" letter-spacing="0.05em">FRAMEWORK CLEAR · MEHTA 2025</text>
    <text x="918" y="198" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">C</tspan>ost-normalized accuracy</text>
    <text x="918" y="214" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">L</tspan>atency · SLA compliance</text>
    <text x="918" y="230" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">E</tspan>fficacy (task success)</text>
    <text x="918" y="246" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">A</tspan>ssurance (safety, policy)</text>
    <text x="918" y="262" class="body" font-size="11" fill="#1A1A1A"><tspan font-weight="600">R</tspan>eliability (pass^k)</text>
  </g>

  <!-- Left: example outcomes -->
  <g class="interactive" data-card="cost-variation" tabindex="0" role="button" aria-label="Variation des coûts">
    <rect x="80" y="155" width="220" height="120" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1"/>
    <text x="98" y="178" class="mono" font-size="10" fill="#B7332C" letter-spacing="0.05em">PARADOXE BENCHMARK</text>
    <text x="98" y="198" class="body" font-size="11" fill="#1A1A1A">50× variation de coût</text>
    <text x="98" y="214" class="body" font-size="11" fill="#1A1A1A">pour accuracy comparable</text>
    <text x="98" y="234" class="body" font-size="11" fill="#1A1A1A">Reflexion : +5,4 pp efficacy</text>
    <text x="98" y="250" class="body" font-size="11" fill="#1A1A1A">vs ReAct, mais +1551% coût</text>
    <text x="98" y="270" class="body" font-size="10" font-style="italic" fill="#5A5A5A">CLEAR / 300 enterprise tasks</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="752" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Chaque niveau s'empile sur les précédents : un agent moderne mesure F1 sur son intent classifier, faithfulness sur son RAG, tool call accuracy sur sa boucle, CNA en production.</text>
  <text x="60" y="780" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : Ragas docs · DeepEval · Mehta CLEAR (arXiv:2511.14136) · Anthropic Engineering 2026.</text>
</svg>
