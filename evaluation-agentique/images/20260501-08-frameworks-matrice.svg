<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; transition: filter 120ms; }
    .toolname { font-weight: 500; }
  </style>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="50" class="mono" font-size="11" fill="#5A5A5A" letter-spacing="0.05em">SCHÉMA 08</text>
  <text x="60" y="84" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Cartographie des frameworks d'évaluation</text>
  <text x="60" y="110" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Quatre quadrants : phase × modèle d'opération. Aucun outil ne couvre tout.</text>
  <line x1="60" y1="128" x2="1140" y2="128" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Axis labels -->
  <text x="600" y="170" class="mono" font-size="11" fill="#5A5A5A" text-anchor="middle">PHASE D'ÉVALUATION</text>
  <text x="370" y="200" class="display" font-size="14" font-style="italic" fill="#5A5A5A" text-anchor="middle">offline (avant déploiement)</text>
  <text x="830" y="200" class="display" font-size="14" font-style="italic" fill="#5A5A5A" text-anchor="middle">online (production · trafic réel)</text>

  <text x="22" y="450" class="mono" font-size="11" fill="#5A5A5A" transform="rotate(-90, 22, 450)" text-anchor="middle">MODÈLE D'OPÉRATION</text>
  <text x="48" y="335" class="display" font-size="14" font-style="italic" fill="#5A5A5A" transform="rotate(-90, 48, 335)" text-anchor="middle">open-source · self-hosted</text>
  <text x="48" y="585" class="display" font-size="14" font-style="italic" fill="#5A5A5A" transform="rotate(-90, 48, 585)" text-anchor="middle">SaaS · managed</text>

  <!-- Cross axes -->
  <line x1="100" y1="450" x2="1140" y2="450" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="600" y1="220" x2="600" y2="700" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- Quadrant Q1: Offline / Open-source -->
  <g class="interactive" data-card="q1-offline-os" tabindex="0" role="button" aria-label="Quadrant 1 — Offline open-source">
    <rect x="100" y="220" width="500" height="230" fill="#F2EFE7" fill-opacity="0.5"/>
    <text x="120" y="246" class="mono" font-size="10" fill="#1F5560" letter-spacing="0.05em">Q1 · OFFLINE / OPEN-SOURCE</text>

    <!-- Tools as labeled bubbles -->
    <circle cx="180" cy="290" r="6" fill="#1F5560"/>
    <text x="195" y="294" class="body toolname" font-size="13" fill="#1A1A1A">Promptfoo</text>
    <text x="195" y="308" class="body" font-size="9" fill="#5A5A5A">YAML DSL · CI/CD · Anthropic interne</text>

    <circle cx="180" cy="335" r="6" fill="#1F5560"/>
    <text x="195" y="339" class="body toolname" font-size="13" fill="#1A1A1A">DeepEval</text>
    <text x="195" y="353" class="body" font-size="9" fill="#5A5A5A">Confident AI · RAG + agent</text>

    <circle cx="180" cy="380" r="6" fill="#1F5560"/>
    <text x="195" y="384" class="body toolname" font-size="13" fill="#1A1A1A">Ragas</text>
    <text x="195" y="398" class="body" font-size="9" fill="#5A5A5A">Gold standard RAG · agent-extended</text>

    <circle cx="380" cy="290" r="6" fill="#1F5560"/>
    <text x="395" y="294" class="body toolname" font-size="13" fill="#1A1A1A">OpenAI Evals</text>
    <text x="395" y="308" class="body" font-size="9" fill="#5A5A5A">Registry communautaire</text>

    <circle cx="380" cy="335" r="6" fill="#1F5560"/>
    <text x="395" y="339" class="body toolname" font-size="13" fill="#1A1A1A">MLflow GenAI</text>
    <text x="395" y="353" class="body" font-size="9" fill="#5A5A5A">Si stack MLflow existant</text>

    <circle cx="380" cy="380" r="6" fill="#1F5560"/>
    <text x="395" y="384" class="body toolname" font-size="13" fill="#1A1A1A">Harbor</text>
    <text x="395" y="398" class="body" font-size="9" fill="#5A5A5A">Conteneurisé · Terminal-Bench 2.0</text>

    <text x="120" y="430" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Bonne entrée : Promptfoo + DeepEval pour itération rapide en CI/CD.</text>
  </g>

  <!-- Quadrant Q2: Online / Open-source -->
  <g class="interactive" data-card="q2-online-os" tabindex="0" role="button" aria-label="Quadrant 2 — Online open-source">
    <rect x="600" y="220" width="540" height="230" fill="#F2EFE7" fill-opacity="0.3"/>
    <text x="620" y="246" class="mono" font-size="10" fill="#1F5560" letter-spacing="0.05em">Q2 · ONLINE / OPEN-SOURCE</text>

    <circle cx="680" cy="290" r="6" fill="#1F5560"/>
    <text x="695" y="294" class="body toolname" font-size="13" fill="#1A1A1A">Langfuse</text>
    <text x="695" y="308" class="body" font-size="9" fill="#5A5A5A">Self-host · OTel · alt. LangSmith</text>

    <circle cx="680" cy="335" r="6" fill="#1F5560"/>
    <text x="695" y="339" class="body toolname" font-size="13" fill="#1A1A1A">Arize Phoenix</text>
    <text x="695" y="353" class="body" font-size="9" fill="#5A5A5A">OpenInference · embeddings cluster</text>

    <circle cx="680" cy="380" r="6" fill="#1F5560"/>
    <text x="695" y="384" class="body toolname" font-size="13" fill="#1A1A1A">Agenta</text>
    <text x="695" y="398" class="body" font-size="9" fill="#5A5A5A">Multi-conventions sémantiques</text>

    <circle cx="900" cy="290" r="6" fill="#B7332C"/>
    <text x="915" y="294" class="body toolname" font-size="13" fill="#1A1A1A">AgentEvals</text>
    <text x="915" y="308" class="body" font-size="9" fill="#5A5A5A">Score traces sans rerun ★</text>

    <circle cx="900" cy="335" r="6" fill="#1F5560"/>
    <text x="915" y="339" class="body toolname" font-size="13" fill="#1A1A1A">VictoriaMetrics</text>
    <text x="915" y="353" class="body" font-size="9" fill="#5A5A5A">Stack OS observability</text>

    <circle cx="900" cy="380" r="6" fill="#1F5560"/>
    <text x="915" y="384" class="body toolname" font-size="13" fill="#1A1A1A">OpenSearch / OTel</text>
    <text x="915" y="398" class="body" font-size="9" fill="#5A5A5A">AWS unified observability</text>

    <text x="620" y="430" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Pour data residency stricte ou environnements air-gapped : Langfuse + Phoenix.</text>
  </g>

  <!-- Quadrant Q3: Offline / SaaS -->
  <g class="interactive" data-card="q3-offline-saas" tabindex="0" role="button" aria-label="Quadrant 3 — Offline SaaS">
    <rect x="100" y="450" width="500" height="250" fill="#F2EFE7" fill-opacity="0.3"/>
    <text x="120" y="476" class="mono" font-size="10" fill="#B58A2C" letter-spacing="0.05em">Q3 · OFFLINE / SaaS</text>

    <circle cx="180" cy="510" r="6" fill="#B58A2C"/>
    <text x="195" y="514" class="body toolname" font-size="13" fill="#1A1A1A">Braintrust</text>
    <text x="195" y="528" class="body" font-size="9" fill="#5A5A5A">autoevals · scorers prêts</text>

    <circle cx="180" cy="555" r="6" fill="#B58A2C"/>
    <text x="195" y="559" class="body toolname" font-size="13" fill="#1A1A1A">LangSmith</text>
    <text x="195" y="573" class="body" font-size="9" fill="#5A5A5A">Datasets · LangChain native</text>

    <circle cx="180" cy="600" r="6" fill="#B58A2C"/>
    <text x="195" y="604" class="body toolname" font-size="13" fill="#1A1A1A">Vals.ai</text>
    <text x="195" y="618" class="body" font-size="9" fill="#5A5A5A">Partenaire eval (cité par Anthropic)</text>

    <circle cx="380" cy="510" r="6" fill="#B58A2C"/>
    <text x="395" y="514" class="body toolname" font-size="13" fill="#1A1A1A">Maxim AI</text>
    <text x="395" y="528" class="body" font-size="9" fill="#5A5A5A">Persona simulation · HITL</text>

    <circle cx="380" cy="555" r="6" fill="#B58A2C"/>
    <text x="395" y="559" class="body toolname" font-size="13" fill="#1A1A1A">Galileo offline</text>
    <text x="395" y="573" class="body" font-size="9" fill="#5A5A5A">Suite eval pré-prod</text>

    <circle cx="380" cy="600" r="6" fill="#B58A2C"/>
    <text x="395" y="604" class="body toolname" font-size="13" fill="#1A1A1A">Confident AI</text>
    <text x="395" y="618" class="body" font-size="9" fill="#5A5A5A">DeepEval cloud · workflow eval</text>

    <text x="120" y="660" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Confort, prêt-à-l'emploi, scorers pré-calibrés ; mais lock-in et coût.</text>
  </g>

  <!-- Quadrant Q4: Online / SaaS -->
  <g class="interactive" data-card="q4-online-saas" tabindex="0" role="button" aria-label="Quadrant 4 — Online SaaS">
    <rect x="600" y="450" width="540" height="250" fill="#F2EFE7" fill-opacity="0.5"/>
    <text x="620" y="476" class="mono" font-size="10" fill="#B58A2C" letter-spacing="0.05em">Q4 · ONLINE / SaaS</text>

    <circle cx="680" cy="510" r="6" fill="#B58A2C"/>
    <text x="695" y="514" class="body toolname" font-size="13" fill="#1A1A1A">MS Foundry tracing</text>
    <text x="695" y="528" class="body" font-size="9" fill="#5A5A5A">OTel · Azure native · auto-eval threads</text>

    <circle cx="680" cy="555" r="6" fill="#B58A2C"/>
    <text x="695" y="559" class="body toolname" font-size="13" fill="#1A1A1A">AWS Strands Evals</text>
    <text x="695" y="573" class="body" font-size="9" fill="#5A5A5A">Bedrock natif · ActorSimulator</text>

    <circle cx="680" cy="600" r="6" fill="#B58A2C"/>
    <text x="695" y="604" class="body toolname" font-size="13" fill="#1A1A1A">Google ADK Eval</text>
    <text x="695" y="618" class="body" font-size="9" fill="#5A5A5A">ConversationScenario · v1.18</text>

    <circle cx="900" cy="510" r="6" fill="#B58A2C"/>
    <text x="915" y="514" class="body toolname" font-size="13" fill="#1A1A1A">Datadog LLM Obs</text>
    <text x="915" y="528" class="body" font-size="9" fill="#5A5A5A">Trace + metric + logs unified</text>

    <circle cx="900" cy="555" r="6" fill="#B58A2C"/>
    <text x="915" y="559" class="body toolname" font-size="13" fill="#1A1A1A">Galileo prod</text>
    <text x="915" y="573" class="body" font-size="9" fill="#5A5A5A">Luna-2 SLM-judge ★</text>

    <circle cx="900" cy="600" r="6" fill="#B58A2C"/>
    <text x="915" y="604" class="body toolname" font-size="13" fill="#1A1A1A">Arize AX</text>
    <text x="915" y="618" class="body" font-size="9" fill="#5A5A5A">Drift detection · cohort analysis</text>

    <text x="620" y="660" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Stack provider : si mono-cloud, partir des outils natifs ; multi-cloud → couche OTel + Promptfoo.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="752" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Étoile ★ : capacités saillantes (Luna-2 SLM-judge, AgentEvals scoring sur trace sans rerun).</text>
  <text x="60" y="772" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Note Arena (CAIS 2026) : à modèle fixé, les frameworks performent de façon comparable sur tâches simples ; le différentiel est le code d'orchestration nécessaire.</text>
  <text x="60" y="790" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : Anthropic 2026 · documentations officielles ; analyse propriétaire.</text>
</svg>
