<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; transition: filter 120ms; }
  </style>
  <defs>
    <marker id="arrow6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrowred6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="50" class="mono" font-size="11" fill="#5A5A5A" letter-spacing="0.05em">SCHÉMA 06</text>
  <text x="60" y="84" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">User simulation : trois générations d'architecture</text>
  <text x="60" y="110" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Du single-control τ-bench au multi-agent persona, et le Sim2Real gap qui les hante</text>
  <line x1="60" y1="128" x2="1140" y2="128" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Three columns: Gen 1, 2, 3 -->

  <!-- GEN 1: Single-control (τ-bench) -->
  <g class="interactive" data-card="gen1-single" tabindex="0" role="button" aria-label="Génération 1 — single-control τ-bench">
    <rect x="60" y="160" width="350" height="490" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <rect x="60" y="160" width="350" height="48" rx="3" fill="#5A5A5A"/>
    <text x="80" y="180" class="mono" font-size="10" fill="#FAF8F3" letter-spacing="0.05em">GEN 1 · SINGLE-CONTROL · τ-BENCH 2024</text>
    <text x="80" y="198" class="display" font-size="13" font-weight="600" fill="#FAF8F3">Seul l'agent agit dans le monde</text>

    <!-- User simulator (small, simple) -->
    <rect x="80" y="240" width="140" height="60" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1"/>
    <text x="98" y="262" class="mono" font-size="10" fill="#5A5A5A">USER SIM</text>
    <text x="98" y="282" class="body" font-size="11" font-weight="500" fill="#1A1A1A">LLM free-form</text>

    <!-- Agent -->
    <rect x="250" y="240" width="140" height="60" rx="3" fill="#1F5560" stroke="#1F5560" stroke-width="1"/>
    <text x="268" y="262" class="mono" font-size="10" fill="#FAF8F3">AGENT</text>
    <text x="268" y="282" class="body" font-size="11" font-weight="500" fill="#FAF8F3">+ tools</text>

    <!-- Conversation arrows -->
    <line x1="220" y1="265" x2="250" y2="265" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow6)"/>
    <line x1="250" y1="285" x2="220" y2="285" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow6)"/>

    <!-- Environment -->
    <rect x="80" y="335" width="310" height="60" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1"/>
    <text x="98" y="357" class="mono" font-size="10" fill="#5A5A5A">ENVIRONMENT (DB · API · état)</text>
    <text x="98" y="377" class="body" font-size="11" fill="#1A1A1A">Retail, airline · seul l'agent y accède</text>

    <line x1="320" y1="305" x2="320" y2="335" stroke="#1F5560" stroke-width="1.5" marker-end="url(#arrow6)"/>
    <text x="335" y="322" class="mono" font-size="9" fill="#1F5560">tool calls</text>

    <!-- Reward -->
    <rect x="80" y="430" width="310" height="50" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1"/>
    <text x="98" y="452" class="mono" font-size="10" fill="#B58A2C">REWARD = state(env) == expected_state</text>
    <text x="98" y="468" class="body" font-size="10" fill="#5A5A5A">Vérification automatique de l'outcome</text>

    <!-- Limitations -->
    <text x="80" y="510" class="mono" font-size="10" fill="#5A5A5A">CARACTÉRISTIQUES</text>
    <text x="80" y="528" class="body" font-size="11" fill="#5A5A5A">• Sim utilisateur free-form non contraint</text>
    <text x="80" y="544" class="body" font-size="11" fill="#5A5A5A">• Reward via state check de la base</text>
    <text x="80" y="560" class="body" font-size="11" fill="#5A5A5A">• pass^k pour mesurer consistance</text>

    <text x="80" y="592" class="mono" font-size="10" fill="#B7332C">⚠ LIMITES</text>
    <text x="80" y="610" class="body" font-size="11" fill="#5A5A5A">• Surestime la performance terrain</text>
    <text x="80" y="626" class="body" font-size="11" fill="#5A5A5A">• Sim peut produire actions impossibles</text>
    <text x="80" y="642" class="body" font-size="11" fill="#5A5A5A">• Erreurs sim ↔ erreurs agent confondues</text>
  </g>

  <!-- GEN 2: Dual-control (τ²-bench) -->
  <g class="interactive" data-card="gen2-dual" tabindex="0" role="button" aria-label="Génération 2 — dual-control τ²-bench">
    <rect x="425" y="160" width="350" height="490" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <rect x="425" y="160" width="350" height="48" rx="3" fill="#1F5560"/>
    <text x="445" y="180" class="mono" font-size="10" fill="#FAF8F3" letter-spacing="0.05em">GEN 2 · DUAL-CONTROL · τ²-BENCH 2025</text>
    <text x="445" y="198" class="display" font-size="13" font-weight="600" fill="#FAF8F3">Les deux agissent — Dec-POMDP</text>

    <!-- User simulator (with tools) -->
    <rect x="445" y="240" width="140" height="60" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1.5"/>
    <text x="463" y="262" class="mono" font-size="10" fill="#1F5560">USER SIM + tools</text>
    <text x="463" y="282" class="body" font-size="11" font-weight="500" fill="#1A1A1A">contraint · observable</text>

    <!-- Agent -->
    <rect x="615" y="240" width="140" height="60" rx="3" fill="#1F5560" stroke="#1F5560" stroke-width="1"/>
    <text x="633" y="262" class="mono" font-size="10" fill="#FAF8F3">AGENT</text>
    <text x="633" y="282" class="body" font-size="11" font-weight="500" fill="#FAF8F3">+ tools</text>

    <!-- Bidirectional arrows -->
    <line x1="585" y1="265" x2="615" y2="265" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow6)"/>
    <line x1="615" y1="285" x2="585" y2="285" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow6)"/>

    <!-- Two parts of environment -->
    <rect x="445" y="335" width="140" height="60" rx="3" fill="#F2EFE7" stroke="#1F5560" stroke-width="1"/>
    <text x="463" y="357" class="mono" font-size="10" fill="#1F5560">USER ENV</text>
    <text x="463" y="377" class="body" font-size="10" fill="#1A1A1A">routeur · device</text>

    <rect x="615" y="335" width="140" height="60" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1"/>
    <text x="633" y="357" class="mono" font-size="10" fill="#5A5A5A">AGENT ENV</text>
    <text x="633" y="377" class="body" font-size="10" fill="#1A1A1A">CRM · billing</text>

    <line x1="515" y1="305" x2="515" y2="335" stroke="#1F5560" stroke-width="1.5" marker-end="url(#arrow6)"/>
    <line x1="685" y1="305" x2="685" y2="335" stroke="#1F5560" stroke-width="1.5" marker-end="url(#arrow6)"/>

    <!-- Highlight: telecom example -->
    <rect x="445" y="430" width="310" height="50" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1"/>
    <text x="463" y="452" class="mono" font-size="10" fill="#B58A2C">TELECOM TEST CASE</text>
    <text x="463" y="468" class="body" font-size="10" fill="#5A5A5A">"Reboot ton routeur, dis-moi la couleur du voyant"</text>

    <text x="445" y="510" class="mono" font-size="10" fill="#5A5A5A">CARACTÉRISTIQUES</text>
    <text x="445" y="528" class="body" font-size="11" fill="#5A5A5A">• Task generator compositionnel</text>
    <text x="445" y="544" class="body" font-size="11" fill="#5A5A5A">• Sim contraint par observable state</text>
    <text x="445" y="560" class="body" font-size="11" fill="#5A5A5A">• Sépare reasoning vs communication</text>

    <text x="445" y="592" class="mono" font-size="10" fill="#B7332C">FINDING-CLÉ</text>
    <text x="445" y="610" class="body" font-size="11" fill="#5A5A5A">Performance ↓ significative</text>
    <text x="445" y="626" class="body" font-size="11" fill="#5A5A5A">au passage no-user → dual</text>
    <text x="445" y="642" class="body" font-size="11" font-style="italic" fill="#1F5560">→ benchmarks mono surestimaient</text>
  </g>

  <!-- GEN 3: Multi-agent persona (Maxim, ADK, Strands) -->
  <g class="interactive" data-card="gen3-multiagent" tabindex="0" role="button" aria-label="Génération 3 — multi-agent persona">
    <rect x="790" y="160" width="350" height="490" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="2"/>
    <rect x="790" y="160" width="350" height="48" rx="3" fill="#B7332C"/>
    <text x="810" y="180" class="mono" font-size="10" fill="#FAF8F3" letter-spacing="0.05em">GEN 3 · MULTI-AGENT PERSONA · 2026</text>
    <text x="810" y="198" class="display" font-size="13" font-weight="600" fill="#FAF8F3">Le simulateur lui-même est un agent</text>

    <!-- 3 sub-agents inside the simulator -->
    <rect x="810" y="240" width="100" height="55" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1"/>
    <text x="822" y="260" class="mono" font-size="9" fill="#B7332C">USER AGENT</text>
    <text x="822" y="278" class="body" font-size="10" fill="#1A1A1A">persona</text>
    <text x="822" y="290" class="body" font-size="10" fill="#1A1A1A">control</text>

    <rect x="920" y="240" width="100" height="55" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1"/>
    <text x="932" y="260" class="mono" font-size="9" fill="#B7332C">STATE TRACK</text>
    <text x="932" y="278" class="body" font-size="10" fill="#1A1A1A">task progress</text>
    <text x="932" y="290" class="body" font-size="10" fill="#1A1A1A">consistency</text>

    <rect x="1030" y="240" width="100" height="55" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1"/>
    <text x="1042" y="260" class="mono" font-size="9" fill="#B7332C">MSG ATTRS</text>
    <text x="1042" y="278" class="body" font-size="10" fill="#1A1A1A">tone, brevity</text>
    <text x="1042" y="290" class="body" font-size="10" fill="#1A1A1A">style mod.</text>

    <text x="810" y="320" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Coordination entre les 3 agents = un sim utilisateur cohérent et réaliste</text>

    <!-- Arrow down to Agent -->
    <rect x="810" y="345" width="320" height="60" rx="3" fill="#1F5560" stroke="#1F5560" stroke-width="1"/>
    <text x="828" y="367" class="mono" font-size="10" fill="#FAF8F3">AGENT TO TEST</text>
    <text x="828" y="387" class="body" font-size="11" font-weight="500" fill="#FAF8F3">+ tools, mémoire, environnement</text>

    <line x1="970" y1="305" x2="970" y2="345" stroke="#B7332C" stroke-width="1.5" marker-end="url(#arrowred6)"/>

    <!-- Persona library -->
    <rect x="810" y="430" width="320" height="80" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1"/>
    <text x="828" y="452" class="mono" font-size="10" fill="#B58A2C">PERSONA LIBRARY</text>
    <text x="828" y="472" class="body" font-size="11" fill="#1A1A1A">Novice · Expert · Hostile · Pressé · Multilingue</text>
    <text x="828" y="490" class="body" font-size="11" fill="#1A1A1A">Run même goal sur N personas</text>
    <text x="828" y="504" class="body" font-size="10" font-style="italic" fill="#5A5A5A">→ révèle écarts par segment utilisateur</text>

    <!-- Plateformes -->
    <text x="810" y="540" class="mono" font-size="10" fill="#5A5A5A">PLATEFORMES</text>
    <text x="810" y="558" class="body" font-size="11" fill="#5A5A5A">• Google ADK ConversationScenario</text>
    <text x="810" y="574" class="body" font-size="11" fill="#5A5A5A">• AWS Strands ActorSimulator</text>
    <text x="810" y="590" class="body" font-size="11" fill="#5A5A5A">• Maxim AI · arXiv:2601.15290</text>

    <text x="810" y="620" class="mono" font-size="10" fill="#1F5560">CLAIM</text>
    <text x="810" y="638" class="body" font-size="11" font-style="italic" fill="#1F5560">2× plus réaliste vs LLM unique</text>
  </g>

  <!-- Bottom callout: Sim2Real gap -->
  <g class="interactive" data-card="sim2real" tabindex="0" role="button" aria-label="Sim2Real gap">
    <rect x="60" y="680" width="1080" height="60" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="80" y="703" class="mono" font-size="10" fill="#B7332C" letter-spacing="0.05em">⚠ SIM2REAL GAP — LE TROU AU CENTRE</text>
    <text x="80" y="722" class="body" font-size="12" fill="#1A1A1A">Le simulateur est lui-même une source d'erreur. Tout protocole d'éval doit valider le sim contre des transcripts réels.</text>
    <text x="80" y="736" class="body" font-size="10" font-style="italic" fill="#5A5A5A">arXiv:2603.11245 · « Mind the Sim2Real Gap in User Simulation for Agentic Tasks »</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="765" x2="1140" y2="765" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="788" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : Sierra τ-bench (arXiv:2406.12045) · τ²-bench (arXiv:2506.07982) · Google ADK · AWS Strands · Maxim AI · Sim2Real (arXiv:2603.11245).</text>
</svg>
