<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; transition: filter 120ms; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="50" class="mono" font-size="11" fill="#5A5A5A" letter-spacing="0.05em">SCHÉMA 01</text>
  <text x="60" y="84" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Trois ruptures dans l'évaluation des systèmes d'IA</text>
  <text x="60" y="110" class="display" font-size="16" font-style="italic" fill="#5A5A5A">De la classification supervisée à la trajectoire agentique : trois objets, trois arsenaux métriques</text>
  <line x1="60" y1="128" x2="1140" y2="128" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Timeline arrow horizontal at y=180 -->
  <line x1="100" y1="180" x2="1140" y2="180" stroke="#5A5A5A" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="105" y="170" class="mono" font-size="10" fill="#5A5A5A">→ TEMPS / SOPHISTICATION</text>

  <!-- Three columns -->
  <!-- Column 1: IA classique -->
  <g class="interactive" data-card="ere-classique" tabindex="0" role="button" aria-label="Ère classique — cliquez pour les détails">
    <rect x="80" y="210" width="320" height="500" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <rect x="80" y="210" width="320" height="48" rx="3" fill="#1F5560"/>
    <text x="100" y="230" class="mono" font-size="10" fill="#FAF8F3" letter-spacing="0.05em">ÈRE 1 · IA CLASSIQUE</text>
    <text x="100" y="248" class="display" font-size="14" font-weight="600" fill="#FAF8F3">Sortie discrète vérifiable</text>

    <text x="100" y="290" class="body" font-size="11" font-weight="500" fill="#1A1A1A">OBJET ÉVALUÉ</text>
    <text x="100" y="310" class="body" font-size="13" fill="#1A1A1A">Prédiction unique :</text>
    <text x="100" y="328" class="body" font-size="13" fill="#1A1A1A">classe, score, ranking</text>

    <text x="100" y="370" class="body" font-size="11" font-weight="500" fill="#1A1A1A">MÉTRIQUES</text>
    <text x="100" y="390" class="mono" font-size="11" fill="#1F5560">precision · recall · F1</text>
    <text x="100" y="408" class="mono" font-size="11" fill="#1F5560">AUC · log-loss</text>
    <text x="100" y="426" class="mono" font-size="11" fill="#1F5560">confusion matrix</text>

    <text x="100" y="470" class="body" font-size="11" font-weight="500" fill="#1A1A1A">PROPRIÉTÉS</text>
    <text x="100" y="490" class="body" font-size="11" fill="#5A5A5A">• Déterministe</text>
    <text x="100" y="508" class="body" font-size="11" fill="#5A5A5A">• Bornée [0,1]</text>
    <text x="100" y="526" class="body" font-size="11" fill="#5A5A5A">• Décomposable</text>
    <text x="100" y="544" class="body" font-size="11" fill="#5A5A5A">• Interprétable</text>

    <text x="100" y="586" class="body" font-size="11" font-weight="500" fill="#1A1A1A">CULTURE OUTILLAGE</text>
    <text x="100" y="606" class="body" font-size="11" fill="#5A5A5A">MLOps · datasets étanches</text>
    <text x="100" y="624" class="body" font-size="11" fill="#5A5A5A">monitoring de drift</text>
    <text x="100" y="642" class="body" font-size="11" fill="#5A5A5A">retraining périodique</text>

    <text x="100" y="680" class="body" font-size="10" font-style="italic" fill="#B7332C">Toujours pertinent pour</text>
    <text x="100" y="694" class="body" font-size="10" font-style="italic" fill="#B7332C">briques internes d'agents</text>
  </g>

  <!-- Column 2: IA générative -->
  <g class="interactive" data-card="ere-generative" tabindex="0" role="button" aria-label="Ère générative — cliquez pour les détails">
    <rect x="440" y="210" width="320" height="500" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <rect x="440" y="210" width="320" height="48" rx="3" fill="#B58A2C"/>
    <text x="460" y="230" class="mono" font-size="10" fill="#FAF8F3" letter-spacing="0.05em">ÈRE 2 · IA GÉNÉRATIVE</text>
    <text x="460" y="248" class="display" font-size="14" font-weight="600" fill="#FAF8F3">Texte génératif libre</text>

    <text x="460" y="290" class="body" font-size="11" font-weight="500" fill="#1A1A1A">OBJET ÉVALUÉ</text>
    <text x="460" y="310" class="body" font-size="13" fill="#1A1A1A">Texte ouvert : 1000 façons</text>
    <text x="460" y="328" class="body" font-size="13" fill="#1A1A1A">d'être correct</text>

    <text x="460" y="370" class="body" font-size="11" font-weight="500" fill="#1A1A1A">MÉTRIQUES</text>
    <text x="460" y="390" class="mono" font-size="11" fill="#B58A2C">BLEU · ROUGE  ⚠ surface</text>
    <text x="460" y="408" class="mono" font-size="11" fill="#B58A2C">BERTScore · BLEURT</text>
    <text x="460" y="426" class="mono" font-size="11" fill="#B58A2C">faithfulness · groundedness</text>
    <text x="460" y="444" class="mono" font-size="11" fill="#B58A2C">LLM-as-a-judge</text>

    <text x="460" y="488" class="body" font-size="11" font-weight="500" fill="#1A1A1A">PROPRIÉTÉS</text>
    <text x="460" y="508" class="body" font-size="11" fill="#5A5A5A">• Sémantique &gt; lexicale</text>
    <text x="460" y="526" class="body" font-size="11" fill="#5A5A5A">• Souvent stochastique</text>
    <text x="460" y="544" class="body" font-size="11" fill="#5A5A5A">• Référence pas toujours</text>
    <text x="460" y="562" class="body" font-size="11" fill="#5A5A5A">  unique ni disponible</text>

    <text x="460" y="600" class="body" font-size="11" font-weight="500" fill="#1A1A1A">CULTURE OUTILLAGE</text>
    <text x="460" y="620" class="body" font-size="11" fill="#5A5A5A">RAG eval · Ragas · DeepEval</text>
    <text x="460" y="638" class="body" font-size="11" fill="#5A5A5A">prompt engineering</text>
    <text x="460" y="656" class="body" font-size="11" fill="#5A5A5A">human preference (Arena)</text>

    <text x="460" y="690" class="body" font-size="10" font-style="italic" fill="#B7332C">Pivot : le juge devient lui-</text>
    <text x="460" y="704" class="body" font-size="10" font-style="italic" fill="#B7332C">même un système à évaluer</text>
  </g>

  <!-- Column 3: IA agentique -->
  <g class="interactive" data-card="ere-agentique" tabindex="0" role="button" aria-label="Ère agentique — cliquez pour les détails">
    <rect x="800" y="210" width="320" height="500" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="2"/>
    <rect x="800" y="210" width="320" height="48" rx="3" fill="#B7332C"/>
    <text x="820" y="230" class="mono" font-size="10" fill="#FAF8F3" letter-spacing="0.05em">ÈRE 3 · IA AGENTIQUE</text>
    <text x="820" y="248" class="display" font-size="14" font-weight="600" fill="#FAF8F3">Trajectoire multi-tours</text>

    <text x="820" y="290" class="body" font-size="11" font-weight="500" fill="#1A1A1A">OBJET ÉVALUÉ</text>
    <text x="820" y="310" class="body" font-size="13" fill="#1A1A1A">Transcript + outcome :</text>
    <text x="820" y="328" class="body" font-size="13" fill="#1A1A1A">tools, mémoire, état monde</text>

    <text x="820" y="370" class="body" font-size="11" font-weight="500" fill="#1A1A1A">MÉTRIQUES</text>
    <text x="820" y="390" class="mono" font-size="11" fill="#B7332C">tool call accuracy</text>
    <text x="820" y="408" class="mono" font-size="11" fill="#B7332C">goal completion · state check</text>
    <text x="820" y="426" class="mono" font-size="11" fill="#B7332C">pass@k · pass^k</text>
    <text x="820" y="444" class="mono" font-size="11" fill="#B7332C">CLEAR · CNA · CPS</text>

    <text x="820" y="488" class="body" font-size="11" font-weight="500" fill="#1A1A1A">PROPRIÉTÉS</text>
    <text x="820" y="508" class="body" font-size="11" fill="#5A5A5A">• Erreurs composées</text>
    <text x="820" y="526" class="body" font-size="11" fill="#5A5A5A">• Chemins multiples valides</text>
    <text x="820" y="544" class="body" font-size="11" fill="#5A5A5A">• Coût-temps non bornés</text>
    <text x="820" y="562" class="body" font-size="11" fill="#5A5A5A">• Mémoire = nouvelle surface</text>

    <text x="820" y="600" class="body" font-size="11" font-weight="500" fill="#1A1A1A">CULTURE OUTILLAGE</text>
    <text x="820" y="620" class="body" font-size="11" fill="#5A5A5A">eval-driven dev · OTel GenAI</text>
    <text x="820" y="638" class="body" font-size="11" fill="#5A5A5A">user simulation · personas</text>
    <text x="820" y="656" class="body" font-size="11" fill="#5A5A5A">trace-based RCA · gruyère</text>

    <text x="820" y="690" class="body" font-size="10" font-style="italic" fill="#B7332C">Le test fait partie</text>
    <text x="820" y="704" class="body" font-size="10" font-style="italic" fill="#B7332C">du système, pas autour</text>
  </g>

  <!-- Connecting arrows -->
  <line x1="400" y1="460" x2="440" y2="460" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="760" y1="460" x2="800" y2="460" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Cohabitation note at bottom -->
  <line x1="60" y1="740" x2="1140" y2="740" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="762" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Les trois époques cohabitent : un agent moderne réutilise quotidiennement F1 (intent), faithfulness (RAG), tool call accuracy (boucle).</text>
  <text x="60" y="788" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Anthropic 2026, Sierra Research τ²-Bench, Ragas, CLEAR (Mehta 2025) ; analyse propriétaire.</text>
</svg>
