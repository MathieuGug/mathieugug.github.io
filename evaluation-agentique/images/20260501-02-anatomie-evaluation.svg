<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; transition: filter 120ms; }
  </style>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrowred" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="50" class="mono" font-size="11" fill="#5A5A5A" letter-spacing="0.05em">SCHÉMA 02</text>
  <text x="60" y="84" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Anatomie d'une évaluation agentique</text>
  <text x="60" y="110" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Eval harness, agent harness, transcript, outcome : le vocabulaire convergent</text>
  <line x1="60" y1="128" x2="1140" y2="128" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Eval Harness outer container -->
  <rect x="80" y="160" width="1040" height="540" rx="3" fill="none" stroke="#1F5560" stroke-width="1.25" stroke-dasharray="4 4"/>
  <text x="100" y="186" class="mono" font-size="11" fill="#1F5560" letter-spacing="0.05em">EVAL HARNESS</text>
  <text x="100" y="202" class="body" font-size="10" font-style="italic" fill="#5A5A5A">parallélisation · isolation · grading · agrégation</text>

  <!-- Task box (top-left) -->
  <g class="interactive" data-card="task" tabindex="0" role="button" aria-label="Task — cliquez pour les détails">
    <rect x="120" y="230" width="220" height="100" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="140" y="252" class="mono" font-size="10" fill="#5A5A5A">TASK</text>
    <text x="140" y="276" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Inputs + critères</text>
    <text x="140" y="294" class="body" font-size="11" fill="#5A5A5A">Spécification non-ambiguë</text>
    <text x="140" y="312" class="body" font-size="11" fill="#5A5A5A">avec reference solution</text>
  </g>

  <!-- N Trials -->
  <g class="interactive" data-card="trial" tabindex="0" role="button" aria-label="Trials — cliquez pour les détails">
    <rect x="380" y="230" width="220" height="100" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="400" y="252" class="mono" font-size="10" fill="#5A5A5A">N TRIALS</text>
    <text x="400" y="276" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Exécutions répétées</text>
    <text x="400" y="294" class="body" font-size="11" fill="#5A5A5A">Capture la non-déterminisme</text>
    <text x="400" y="312" class="body" font-size="11" fill="#5A5A5A">→ pass@k vs pass^k</text>
  </g>

  <!-- Agent Harness inner container -->
  <rect x="640" y="225" width="460" height="305" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1.5"/>
  <text x="660" y="248" class="mono" font-size="11" fill="#B7332C" letter-spacing="0.05em">AGENT HARNESS (SCAFFOLD)</text>
  <text x="660" y="264" class="body" font-size="10" font-style="italic" fill="#5A5A5A">orchestration · gestion d'état · boucle de raisonnement</text>

  <!-- Inside Agent Harness: Model + Tools + Memory + Env -->
  <g class="interactive" data-card="model" tabindex="0" role="button" aria-label="Modèle — cliquez pour les détails">
    <rect x="660" y="285" width="200" height="60" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="678" y="305" class="mono" font-size="10" fill="#5A5A5A">MODEL</text>
    <text x="678" y="325" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Frontier LLM</text>
  </g>

  <g class="interactive" data-card="tools" tabindex="0" role="button" aria-label="Tools — cliquez pour les détails">
    <rect x="880" y="285" width="200" height="60" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="898" y="305" class="mono" font-size="10" fill="#5A5A5A">TOOLS</text>
    <text x="898" y="325" class="body" font-size="13" font-weight="500" fill="#1A1A1A">API · MCP · code exec</text>
  </g>

  <g class="interactive" data-card="memory" tabindex="0" role="button" aria-label="Mémoire — cliquez pour les détails">
    <rect x="660" y="365" width="200" height="60" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="678" y="385" class="mono" font-size="10" fill="#5A5A5A">MEMORY</text>
    <text x="678" y="405" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Working / long-term</text>
  </g>

  <g class="interactive" data-card="env" tabindex="0" role="button" aria-label="Environnement — cliquez pour les détails">
    <rect x="880" y="365" width="200" height="60" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="898" y="385" class="mono" font-size="10" fill="#5A5A5A">ENVIRONMENT</text>
    <text x="898" y="405" class="body" font-size="13" font-weight="500" fill="#1A1A1A">Files · DB · réseau · sandbox</text>
  </g>

  <!-- Agent loop: 4 directional arrows forming the real cycle between MODEL → TOOLS → ENV → MEMORY → MODEL -->
  <g>
    <!-- MODEL → TOOLS (top, curving up through the gap) -->
    <path d="M 860 315 Q 870 298 880 315" fill="none" stroke="#B7332C" stroke-width="1.8" marker-end="url(#arrowred)"/>
    <!-- TOOLS → ENV (right, curving right through the gap) -->
    <path d="M 980 345 Q 998 355 980 365" fill="none" stroke="#B7332C" stroke-width="1.8" marker-end="url(#arrowred)"/>
    <!-- ENV → MEMORY (bottom, curving down through the gap) -->
    <path d="M 880 395 Q 870 412 860 395" fill="none" stroke="#B7332C" stroke-width="1.8" marker-end="url(#arrowred)"/>
    <!-- MEMORY → MODEL (left, curving left through the gap) -->
    <path d="M 760 365 Q 742 355 760 345" fill="none" stroke="#B7332C" stroke-width="1.8" marker-end="url(#arrowred)"/>
    <!-- agent loop label in the central diamond gap -->
    <text x="870" y="359" class="body" font-size="10" font-style="italic" font-weight="500" fill="#B7332C" text-anchor="middle">agent loop</text>
  </g>

  <!-- Outputs from agent harness: Transcript + Outcome -->
  <g class="interactive" data-card="transcript" tabindex="0" role="button" aria-label="Transcript — cliquez pour les détails">
    <rect x="120" y="555" width="320" height="80" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="140" y="577" class="mono" font-size="10" fill="#5A5A5A">TRANSCRIPT (TRACE / TRAJECTORY)</text>
    <text x="140" y="600" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Le chemin parcouru</text>
    <text x="140" y="620" class="body" font-size="11" fill="#5A5A5A">prompts · réponses · tool calls · raisonnements · observations</text>
  </g>

  <g class="interactive" data-card="outcome" tabindex="0" role="button" aria-label="Outcome — cliquez pour les détails">
    <rect x="480" y="555" width="320" height="80" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="500" y="577" class="mono" font-size="10" fill="#5A5A5A">OUTCOME</text>
    <text x="500" y="600" class="display" font-size="14" font-weight="600" fill="#1A1A1A">L'état final du monde</text>
    <text x="500" y="620" class="body" font-size="11" fill="#5A5A5A">ligne en base · email envoyé · réservation créée</text>
  </g>

  <!-- Graders -->
  <g class="interactive" data-card="graders" tabindex="0" role="button" aria-label="Graders — cliquez pour les détails">
    <rect x="840" y="555" width="240" height="80" rx="3" fill="#1F5560" stroke="#1F5560" stroke-width="1.25"/>
    <text x="860" y="577" class="mono" font-size="10" fill="#FAF8F3">GRADERS</text>
    <text x="860" y="600" class="display" font-size="14" font-weight="600" fill="#FAF8F3">Code · LLM · Humain</text>
    <text x="860" y="620" class="body" font-size="11" fill="#FAF8F3">→ score weighted / binaire</text>
  </g>

  <!-- Arrows -->
  <line x1="340" y1="280" x2="380" y2="280" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="600" y1="280" x2="640" y2="280" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow2)"/>
  <path d="M 640 530 L 640 543 L 280 543 L 280 555" fill="none" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="640" y1="530" x2="640" y2="555" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="440" y1="595" x2="480" y2="595" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="800" y1="595" x2="840" y2="595" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Numbered annotations -->
  <circle cx="100" cy="280" r="9" fill="#B7332C"/>
  <text x="100" y="284" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">1</text>

  <circle cx="360" cy="280" r="9" fill="#B7332C"/>
  <text x="360" y="284" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">2</text>

  <circle cx="620" cy="280" r="9" fill="#B7332C"/>
  <text x="620" y="284" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">3</text>

  <circle cx="100" cy="595" r="9" fill="#B7332C"/>
  <text x="100" y="599" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">4</text>

  <circle cx="460" cy="595" r="9" fill="#B7332C"/>
  <text x="460" y="599" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">5</text>

  <circle cx="820" cy="595" r="9" fill="#B7332C"/>
  <text x="820" y="599" class="mono" font-size="11" font-weight="600" fill="#FAF8F3" text-anchor="middle">6</text>

  <!-- Legend at bottom -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="752" class="body" font-size="10" fill="#5A5A5A"><tspan font-weight="600" fill="#1A1A1A">1</tspan> Task ambiguë → noise dans la métrique  ·  <tspan font-weight="600" fill="#1A1A1A">2</tspan> N trials capturent la stochasticité  ·  <tspan font-weight="600" fill="#1A1A1A">3</tspan> L'agent harness est évalué avec le modèle</text>
  <text x="60" y="770" class="body" font-size="10" fill="#5A5A5A"><tspan font-weight="600" fill="#1A1A1A">4</tspan> Le transcript trace le chemin (process)  ·  <tspan font-weight="600" fill="#1A1A1A">5</tspan> L'outcome trace le résultat (state)  ·  <tspan font-weight="600" fill="#1A1A1A">6</tspan> Graders multiples · scoring composite</text>
  <text x="60" y="788" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Anthropic 2026 — adapté ; convergence vocabulaire OpenAI / Google ADK / AWS Strands / MS Foundry.</text>
</svg>
