<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-6bis">
  <title id="title-6bis">Cadre de design d'un test case agentique : TestCase = (Persona × Quest × Environment) → Expected Outcome</title>

  <style>
    .paper { fill: #FAF8F3; }
    .ink { fill: #1A1A1A; }
    .graphite { fill: #5A5A5A; }
    .mist { fill: #B8B5AE; }
    .rule { stroke: #E5E1D8; }
    .carmine { fill: #B7332C; }
    .teal { fill: #1F5560; }
    .mustard { fill: #B58A2C; }
    .stroke-ink { stroke: #1A1A1A; fill: none; }
    .stroke-carmine { stroke: #B7332C; fill: none; }
    .stroke-teal { stroke: #1F5560; fill: none; }
    .stroke-mustard { stroke: #B58A2C; fill: none; }
    .stroke-rule { stroke: #E5E1D8; fill: none; }
    .stroke-graphite { stroke: #5A5A5A; fill: none; }

    .display { font-family: 'Spectral', Georgia, serif; font-weight: 600; }
    .display-italic { font-family: 'Spectral', Georgia, serif; font-style: italic; font-weight: 400; }
    .sans { font-family: 'Inter', system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    .marker { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em; fill: #B7332C; }
    .title { font-family: 'Spectral', Georgia, serif; font-weight: 600; font-size: 26px; fill: #1A1A1A; letter-spacing: -0.01em; }
    .subtitle { font-family: 'Spectral', Georgia, serif; font-style: italic; font-size: 16px; fill: #5A5A5A; }
    .source { font-family: 'Spectral', Georgia, serif; font-style: italic; font-size: 10px; fill: #B8B5AE; }
    .col-head { font-family: 'Spectral', Georgia, serif; font-weight: 600; font-size: 18px; }
    .col-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.05em; }
    .attr-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; }
    .attr-text { font-family: 'Inter', sans-serif; font-size: 12px; fill: #1A1A1A; }
    .attr-hint { font-family: 'Spectral', Georgia, serif; font-style: italic; font-size: 11px; fill: #5A5A5A; }
    .formula { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 500; fill: #FAF8F3; }
    .formula-paren { fill: #B58A2C; }
    .formula-times { fill: #B7332C; }
    .formula-arrow { fill: #1F5560; }
    .formula-out { fill: #FAF8F3; }
    .out-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #5A5A5A; letter-spacing: 0.04em; }
    .out-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #1A1A1A; }
    .out-expected { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #5A5A5A; }
    .interactive { cursor: pointer; }
  </style>

  <!-- Background -->
  <rect width="1200" height="900" class="paper"/>

  <!-- Header -->
  <text x="60" y="56" class="marker">SCHÉMA 6BIS</text>
  <text x="60" y="92" class="title">TestCase = (Persona × Quest × Environment) → Expected Outcome</text>
  <text x="60" y="118" class="subtitle">Cadre de design d'un test case agentique — du persona à la suite de graders</text>
  <line x1="60" y1="138" x2="1140" y2="138" class="stroke-rule" stroke-width="1"/>

  <!-- ─────────── FORMULA BAR (top) ─────────── -->
  <g class="interactive" data-card="formula-top" tabindex="0" role="button" aria-label="Formule principale">
    <rect x="60" y="160" width="1080" height="68" rx="4" class="ink"/>
    <text x="600" y="202" text-anchor="middle" class="formula">
      <tspan>TestCase = </tspan><tspan class="formula-paren">(</tspan><tspan class="mustard" style="fill:#D4A84A">Persona</tspan><tspan class="formula-times"> × </tspan><tspan class="teal" style="fill:#5BA3B0">Quest</tspan><tspan class="formula-times"> × </tspan><tspan class="carmine" style="fill:#E26A5C">Environment</tspan><tspan class="formula-paren">)</tspan><tspan class="formula-arrow">  →  </tspan><tspan style="fill:#FAF8F3">Expected Outcome</tspan>
    </text>
  </g>

  <!-- Annotation marker pointing into formula -->
  <text x="80" y="252" class="mono" font-size="10" fill="#B8B5AE">3 dimensions × 1 sortie attendue</text>

  <!-- ─────────── 3 COLUMNS — INPUTS ─────────── -->

  <!-- COLUMN 1 — PERSONA (mustard) -->
  <g class="interactive" data-card="persona" tabindex="0" role="button" aria-label="Persona — qui pose la question">
    <rect x="60" y="280" width="340" height="280" rx="4" fill="#FAF8F3" class="stroke-mustard" stroke-width="1.5"/>
    <rect x="60" y="280" width="340" height="36" rx="4" fill="#FAF8F3" class="stroke-mustard" stroke-width="1.5"/>
    <rect x="60" y="304" width="340" height="14" fill="#FAF8F3"/>
    <text x="78" y="304" class="col-head mustard">Persona</text>
    <text x="378" y="304" text-anchor="end" class="col-tag mustard" style="fill:#B58A2C">QUI INTERROGE ?</text>
    <line x1="60" y1="316" x2="400" y2="316" class="stroke-mustard" stroke-width="1.5"/>

    <!-- Role -->
    <text x="78" y="346" class="attr-label mustard">Role</text>
    <text x="78" y="364" class="attr-text">Clinical Study Manager</text>
    <text x="78" y="382" class="attr-hint">profil métier, séniorité</text>

    <!-- Knowledge -->
    <text x="78" y="416" class="attr-label mustard">Knowledge</text>
    <text x="78" y="434" class="attr-text">Expert / Novice / Mixte</text>
    <text x="78" y="452" class="attr-hint">vocabulaire, attentes implicites</text>

    <!-- Mood -->
    <text x="78" y="486" class="attr-label mustard">Mood</text>
    <text x="78" y="504" class="attr-text">Frustré · Confus · Calme</text>
    <text x="78" y="522" class="attr-hint">signal émotionnel, urgence perçue</text>

    <!-- Numbered marker -->
    <circle cx="380" cy="300" r="11" class="mustard"/>
    <text x="380" y="304" text-anchor="middle" font-size="11" font-weight="600" fill="#FAF8F3" class="mono">1</text>
  </g>

  <!-- COLUMN 2 — QUEST (teal) -->
  <g class="interactive" data-card="quest" tabindex="0" role="button" aria-label="Quest — quel est l'objectif">
    <rect x="430" y="280" width="340" height="280" rx="4" fill="#FAF8F3" class="stroke-teal" stroke-width="1.5"/>
    <rect x="430" y="280" width="340" height="36" rx="4" fill="#FAF8F3" class="stroke-teal" stroke-width="1.5"/>
    <rect x="430" y="304" width="340" height="14" fill="#FAF8F3"/>
    <text x="448" y="304" class="col-head teal">Quest</text>
    <text x="748" y="304" text-anchor="end" class="col-tag" style="fill:#1F5560">QUEL EST LE BUT ?</text>
    <line x1="430" y1="316" x2="770" y2="316" class="stroke-teal" stroke-width="1.5"/>

    <!-- Goal -->
    <text x="448" y="346" class="attr-label teal">Goal</text>
    <text x="448" y="364" class="attr-text">Dernières données sur Drug X</text>
    <text x="448" y="382" class="attr-hint">objectif explicite, mesurable</text>

    <!-- Hidden -->
    <text x="448" y="416" class="attr-label teal">Hidden</text>
    <text x="448" y="434" class="attr-text">Sources peer-reviewed only</text>
    <text x="448" y="452" class="attr-hint">contrainte tacite, non énoncée</text>

    <!-- Success -->
    <text x="448" y="486" class="attr-label teal">Success</text>
    <text x="448" y="504" class="attr-text">L'utilisateur valide « Done »</text>
    <text x="448" y="522" class="attr-hint">critère de fin de quête</text>

    <!-- Numbered marker -->
    <circle cx="750" cy="300" r="11" class="teal"/>
    <text x="750" y="304" text-anchor="middle" font-size="11" font-weight="600" fill="#FAF8F3" class="mono">2</text>
  </g>

  <!-- COLUMN 3 — ENVIRONMENT (carmine) -->
  <g class="interactive" data-card="environment" tabindex="0" role="button" aria-label="Environment — chemins happy / chaos / adversarial">
    <rect x="800" y="280" width="340" height="280" rx="4" fill="#FAF8F3" class="stroke-carmine" stroke-width="1.5"/>
    <rect x="800" y="280" width="340" height="36" rx="4" fill="#FAF8F3" class="stroke-carmine" stroke-width="1.5"/>
    <rect x="800" y="304" width="340" height="14" fill="#FAF8F3"/>
    <text x="818" y="304" class="col-head carmine">Environment</text>
    <text x="1118" y="304" text-anchor="end" class="col-tag" style="fill:#B7332C">QUI PEUT MAL TOURNER ?</text>
    <line x1="800" y1="316" x2="1140" y2="316" class="stroke-carmine" stroke-width="1.5"/>

    <!-- Happy -->
    <text x="818" y="346" class="attr-label carmine">Happy</text>
    <text x="818" y="364" class="attr-text">API search renvoie résultats</text>
    <text x="818" y="382" class="attr-hint">cas nominal, tools fonctionnels</text>

    <!-- Chaos -->
    <text x="818" y="416" class="attr-label carmine">Chaos</text>
    <text x="818" y="434" class="attr-text">Timeout / 500 / quota dépassé</text>
    <text x="818" y="452" class="attr-hint">défaillance infra, recovery requis</text>

    <!-- Adversarial -->
    <text x="818" y="486" class="attr-label carmine">Adversarial</text>
    <text x="818" y="504" class="attr-text">Résultats contradictoires</text>
    <text x="818" y="522" class="attr-hint">jugement, doute épistémique</text>

    <!-- Numbered marker -->
    <circle cx="1120" cy="300" r="11" class="carmine"/>
    <text x="1120" y="304" text-anchor="middle" font-size="11" font-weight="600" fill="#FAF8F3" class="mono">3</text>
  </g>

  <!-- ─────────── ARROW DOWN ─────────── -->
  <line x1="600" y1="580" x2="600" y2="615" class="stroke-graphite" stroke-width="1.25" stroke-dasharray="2 3"/>
  <polygon points="595,612 600,624 605,612" class="graphite" fill="#5A5A5A"/>

  <!-- ─────────── EXPECTED OUTCOME FORMULA ─────────── -->
  <g class="interactive" data-card="expected-outcome" tabindex="0" role="button" aria-label="Décomposition de l'Expected Outcome">
    <rect x="60" y="638" width="1080" height="56" rx="4" class="ink"/>
    <text x="600" y="674" text-anchor="middle" class="formula">
      <tspan>Expected Outcome = </tspan><tspan style="fill:#C77FB8">Deterministic Metrics</tspan><tspan class="formula-times"> × </tspan><tspan style="fill:#E26A5C">LLM-as-a-Judge Suite</tspan>
    </text>
  </g>

  <!-- ─────────── 2 OUTPUT BOXES ─────────── -->

  <!-- DETERMINISTIC METRICS -->
  <g class="interactive" data-card="deterministic" tabindex="0" role="button" aria-label="Métriques déterministes : seuils en dur">
    <rect x="60" y="720" width="525" height="148" rx="4" fill="#FAF8F3" class="stroke-graphite" stroke-width="1"/>
    <rect x="60" y="720" width="525" height="28" rx="4" fill="#FAF8F3" class="stroke-graphite" stroke-width="1"/>
    <rect x="60" y="740" width="525" height="10" fill="#FAF8F3"/>
    <text x="78" y="740" class="attr-label" fill="#5A5A5A">DETERMINISTIC METRICS</text>
    <text x="567" y="740" text-anchor="end" class="attr-hint">seuils en dur, valeurs attendues</text>
    <line x1="60" y1="748" x2="585" y2="748" class="stroke-graphite" stroke-width="1"/>

    <!-- Metric rows -->
    <text x="78" y="772" class="out-val">turn_count</text>
    <text x="567" y="772" text-anchor="end" class="out-expected">expected: ≤ 10</text>
    <line x1="78" y1="782" x2="567" y2="782" class="stroke-rule" stroke-width="0.5"/>

    <text x="78" y="800" class="out-val">tool_schema_errors</text>
    <text x="567" y="800" text-anchor="end" class="out-expected">expected: 0</text>
    <line x1="78" y1="810" x2="567" y2="810" class="stroke-rule" stroke-width="0.5"/>

    <text x="78" y="828" class="out-val">quest_completed</text>
    <text x="567" y="828" text-anchor="end" class="out-expected">expected: true</text>
    <line x1="78" y1="838" x2="567" y2="838" class="stroke-rule" stroke-width="0.5"/>

    <text x="78" y="856" class="out-val">search_calls_count</text>
    <text x="567" y="856" text-anchor="end" class="out-expected">expected: ≤ 5</text>
  </g>

  <!-- LLM JUDGES -->
  <g class="interactive" data-card="judges" tabindex="0" role="button" aria-label="Suite de juges LLM : un juge par règle métier">
    <rect x="615" y="720" width="525" height="148" rx="4" fill="#FAF8F3" class="stroke-carmine" stroke-width="1"/>
    <rect x="615" y="720" width="525" height="28" rx="4" fill="#FAF8F3" class="stroke-carmine" stroke-width="1"/>
    <rect x="615" y="740" width="525" height="10" fill="#FAF8F3"/>
    <text x="633" y="740" class="attr-label carmine">LLM-AS-A-JUDGE SUITE</text>
    <text x="1122" y="740" text-anchor="end" class="attr-hint">un juge par règle métier, verdict pass / fail</text>
    <line x1="615" y1="748" x2="1140" y2="748" class="stroke-carmine" stroke-width="1"/>

    <!-- Judge rows -->
    <text x="633" y="772" class="out-val">judge_error_disclosure</text>
    <text x="1122" y="772" text-anchor="end" class="out-expected">expected: Pass</text>
    <line x1="633" y1="782" x2="1122" y2="782" class="stroke-rule" stroke-width="0.5"/>

    <text x="633" y="800" class="out-val">judge_no_hallucination</text>
    <text x="1122" y="800" text-anchor="end" class="out-expected">expected: Pass</text>
    <line x1="633" y1="810" x2="1122" y2="810" class="stroke-rule" stroke-width="0.5"/>

    <text x="633" y="828" class="out-val">judge_pii_protection</text>
    <text x="1122" y="828" text-anchor="end" class="out-expected">expected: Pass</text>
    <line x1="633" y1="838" x2="1122" y2="838" class="stroke-rule" stroke-width="0.5"/>

    <text x="633" y="856" class="out-val">judge_source_citation</text>
    <text x="1122" y="856" text-anchor="end" class="out-expected">expected: Pass</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="884" x2="1140" y2="884" class="stroke-rule" stroke-width="0.5"/>
  <text x="60" y="898" class="source">Synthèse opérationnelle : la combinaison Persona × Quest × Environment génère mécaniquement la spec d'un test case agentique reproductible.</text>
</svg>
