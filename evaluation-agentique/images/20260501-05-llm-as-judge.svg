<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
    .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
    .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    .interactive { cursor: pointer; transition: filter 120ms; }
  </style>
  <defs>
    <marker id="arrow5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- Header -->
  <text x="60" y="50" class="mono" font-size="11" fill="#5A5A5A" letter-spacing="0.05em">SCHÉMA 05</text>
  <text x="60" y="84" class="display" font-size="26" font-weight="600" fill="#1A1A1A" letter-spacing="-0.01em">Pipeline LLM-as-a-judge robuste</text>
  <text x="60" y="110" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Quatre modes, cinq biais, cinq correctifs : l'anatomie d'un juge auquel on peut faire confiance</text>
  <line x1="60" y1="128" x2="1140" y2="128" stroke="#E5E1D8" stroke-width="1"/>

  <!-- Section A: Modes -->
  <text x="60" y="160" class="mono" font-size="10" fill="#5A5A5A" letter-spacing="0.05em">A · MODES OPÉRATOIRES</text>

  <g class="interactive" data-card="mode-pointwise" tabindex="0" role="button" aria-label="Mode pointwise">
    <rect x="60" y="175" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="78" y="196" class="mono" font-size="10" fill="#5A5A5A">POINTWISE</text>
    <text x="78" y="216" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Score isolé</text>
    <text x="78" y="234" class="body" font-size="11" fill="#5A5A5A">Pas d'ancrage</text>
    <text x="78" y="248" class="body" font-size="10" font-style="italic" fill="#B7332C">Le moins fiable</text>
  </g>

  <g class="interactive" data-card="mode-reference" tabindex="0" role="button" aria-label="Mode reference-based">
    <rect x="320" y="175" width="240" height="80" rx="3" fill="#1F5560" stroke="#1F5560" stroke-width="1.25"/>
    <text x="338" y="196" class="mono" font-size="10" fill="#FAF8F3">REFERENCE-BASED</text>
    <text x="338" y="216" class="display" font-size="13" font-weight="600" fill="#FAF8F3">vs réponse-or</text>
    <text x="338" y="234" class="body" font-size="11" fill="#FAF8F3">Ancrage concret</text>
    <text x="338" y="248" class="body" font-size="10" font-style="italic" fill="#FAF8F3">Le plus fiable ★</text>
  </g>

  <g class="interactive" data-card="mode-pairwise" tabindex="0" role="button" aria-label="Mode pairwise">
    <rect x="580" y="175" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="598" y="196" class="mono" font-size="10" fill="#5A5A5A">PAIRWISE</text>
    <text x="598" y="216" class="display" font-size="13" font-weight="600" fill="#1A1A1A">A vs B</text>
    <text x="598" y="234" class="body" font-size="11" fill="#5A5A5A">A/B test, RLHF, Arena</text>
    <text x="598" y="248" class="body" font-size="10" font-style="italic" fill="#B7332C">Position bias 10-20%</text>
  </g>

  <g class="interactive" data-card="mode-listwise" tabindex="0" role="button" aria-label="Mode listwise">
    <rect x="840" y="175" width="240" height="80" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="858" y="196" class="mono" font-size="10" fill="#5A5A5A">LISTWISE</text>
    <text x="858" y="216" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Ranking N réponses</text>
    <text x="858" y="234" class="body" font-size="11" fill="#5A5A5A">Best-of-N · leaderboard</text>
    <text x="858" y="248" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Coûteux</text>
  </g>

  <!-- Section B: Pipeline Flow -->
  <text x="60" y="300" class="mono" font-size="10" fill="#5A5A5A" letter-spacing="0.05em">B · PIPELINE D'ÉVALUATION</text>

  <!-- Input -->
  <g class="interactive" data-card="judge-input" tabindex="0" role="button" aria-label="Inputs">
    <rect x="60" y="320" width="180" height="240" rx="3" fill="#F2EFE7" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="78" y="343" class="mono" font-size="10" fill="#5A5A5A">INPUT</text>
    <text x="78" y="365" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Question</text>
    <text x="78" y="383" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Réponse à évaluer</text>
    <text x="78" y="401" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Reference (si dispo)</text>
    <text x="78" y="419" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Rubrique discrète</text>
    <text x="78" y="437" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Few-shots calibrés</text>
    <text x="78" y="475" class="mono" font-size="9" fill="#B58A2C">Échelle 0-5 ★ NeurIPS'25</text>
    <text x="78" y="493" class="mono" font-size="9" fill="#B58A2C">Discrète &gt; continue</text>
    <text x="78" y="511" class="mono" font-size="9" fill="#B58A2C">Reasoning-first</text>
    <text x="78" y="529" class="mono" font-size="9" fill="#B58A2C">"Unknown" autorisé</text>
    <text x="78" y="547" class="mono" font-size="9" fill="#B58A2C">temp=0</text>
  </g>

  <!-- Judge model -->
  <g class="interactive" data-card="judge-model" tabindex="0" role="button" aria-label="Modèle juge">
    <rect x="280" y="320" width="180" height="240" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="298" y="343" class="mono" font-size="10" fill="#B58A2C">JUDGE LLM</text>
    <text x="298" y="365" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Frontier ou SLM</text>
    <text x="298" y="395" class="body" font-size="11" fill="#5A5A5A">1 dimension</text>
    <text x="298" y="411" class="body" font-size="11" fill="#5A5A5A">par juge isolé</text>
    <text x="298" y="441" class="body" font-size="11" fill="#5A5A5A">Reasoning</text>
    <text x="298" y="457" class="body" font-size="11" fill="#5A5A5A">obligatoire</text>
    <text x="298" y="475" class="body" font-size="11" fill="#5A5A5A">avant score</text>
    <text x="298" y="510" class="mono" font-size="9" fill="#1F5560">Frontier : 0,02$/eval</text>
    <text x="298" y="525" class="mono" font-size="9" fill="#1F5560">SLM Luna-2 : -97%</text>
  </g>

  <!-- Bias detection layer -->
  <g class="interactive" data-card="biases" tabindex="0" role="button" aria-label="Biais à corriger">
    <rect x="500" y="320" width="180" height="240" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.5"/>
    <text x="518" y="343" class="mono" font-size="10" fill="#B7332C">⚠ BIAIS</text>
    <text x="518" y="365" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Cinq systématiques</text>
    <text x="518" y="395" class="body" font-size="11" fill="#1A1A1A">• Position (10-20%)</text>
    <text x="518" y="413" class="body" font-size="11" fill="#1A1A1A">• Verbosity</text>
    <text x="518" y="431" class="body" font-size="11" fill="#1A1A1A">• Self-enhancement</text>
    <text x="518" y="449" class="body" font-size="11" fill="#1A1A1A">• Authority</text>
    <text x="518" y="467" class="body" font-size="11" fill="#1A1A1A">• Format (markdown ↑)</text>
    <text x="518" y="500" class="mono" font-size="9" fill="#B7332C">+ inconsistance même à T=0</text>
    <text x="518" y="515" class="mono" font-size="9" fill="#B7332C">(floating-point, drift API)</text>
  </g>

  <!-- Corrections -->
  <g class="interactive" data-card="corrections" tabindex="0" role="button" aria-label="Cinq correctifs">
    <rect x="720" y="320" width="180" height="240" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.5"/>
    <text x="738" y="343" class="mono" font-size="10" fill="#1F5560">CORRECTIFS</text>
    <text x="738" y="365" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Stack à 5 couches</text>
    <text x="738" y="395" class="body" font-size="11" fill="#1A1A1A">1. Reasoning-first</text>
    <text x="738" y="413" class="body" font-size="11" fill="#1A1A1A">2. Rubrique discrète</text>
    <text x="738" y="431" class="body" font-size="11" fill="#1A1A1A">3. Pairwise debiased</text>
    <text x="738" y="449" class="body" font-size="11" fill="#1A1A1A">   (swap A↔B)</text>
    <text x="738" y="467" class="body" font-size="11" fill="#1A1A1A">4. Ensemble multi-LLM</text>
    <text x="738" y="485" class="body" font-size="11" fill="#1A1A1A">   (down-weight generator)</text>
    <text x="738" y="503" class="body" font-size="11" fill="#1A1A1A">5. Calibration humaine</text>
    <text x="738" y="525" class="mono" font-size="9" fill="#1F5560">100-200 annotations · κ Cohen</text>
  </g>

  <!-- Output -->
  <g class="interactive" data-card="judge-output" tabindex="0" role="button" aria-label="Output">
    <rect x="940" y="320" width="180" height="240" rx="3" fill="#1F5560" stroke="#1F5560" stroke-width="1.25"/>
    <text x="958" y="343" class="mono" font-size="10" fill="#FAF8F3">OUTPUT</text>
    <text x="958" y="365" class="display" font-size="13" font-weight="600" fill="#FAF8F3">Score + reasoning</text>
    <text x="958" y="395" class="body" font-size="11" fill="#FAF8F3">Score discret 0-5</text>
    <text x="958" y="413" class="body" font-size="11" fill="#FAF8F3">Justification écrite</text>
    <text x="958" y="431" class="body" font-size="11" fill="#FAF8F3">Confiance (low/high)</text>
    <text x="958" y="449" class="body" font-size="11" fill="#FAF8F3">"Unknown" si flou</text>
    <text x="958" y="488" class="mono" font-size="9" fill="#FAF8F3">→ Spearman ρ &gt; 0.85</text>
    <text x="958" y="504" class="mono" font-size="9" fill="#FAF8F3">→ Cohen κ &gt; 0.6</text>
    <text x="958" y="520" class="mono" font-size="9" fill="#FAF8F3">→ disagreement &lt; 20%</text>
  </g>

  <!-- Arrows between blocks -->
  <line x1="240" y1="440" x2="280" y2="440" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow5)"/>
  <line x1="460" y1="440" x2="500" y2="440" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow5)"/>
  <line x1="680" y1="440" x2="720" y2="440" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow5)"/>
  <line x1="900" y1="440" x2="940" y2="440" stroke="#5A5A5A" stroke-width="1" marker-end="url(#arrow5)"/>

  <!-- Section C: When NOT to use -->
  <g class="interactive" data-card="when-not" tabindex="0" role="button" aria-label="Quand ne pas utiliser un juge LLM">
    <rect x="60" y="600" width="1060" height="100" rx="3" fill="#F2EFE7" stroke="#B7332C" stroke-width="1"/>
    <text x="80" y="625" class="mono" font-size="10" fill="#B7332C" letter-spacing="0.05em">⚠ QUAND NE PAS UTILISER UN JUGE LLM</text>
    <text x="80" y="650" class="body" font-size="11" fill="#1A1A1A">• <tspan font-weight="600">Ground truth déterministe disponible</tspan> → vérification programmatique</text>
    <text x="80" y="668" class="body" font-size="11" fill="#1A1A1A">• <tspan font-weight="600">Safety-critique</tspan> → toxicité, content moderation : signal parmi d'autres + revue humaine</text>
    <text x="80" y="686" class="body" font-size="11" fill="#1A1A1A">• <tspan font-weight="600">Domain expertise lourde</tspan> (médical, juridique) → human expert review ou juge fine-tuné</text>
    <text x="600" y="650" class="body" font-size="11" fill="#1A1A1A">• <tspan font-weight="600">Explicabilité réglementaire</tspan> requise → règles déterministes auditables</text>
    <text x="600" y="668" class="body" font-size="11" fill="#1A1A1A">• <tspan font-weight="600">Volume très élevé / faible enjeu</tspan> → classifier dédié ou similarité d'embedding</text>
    <text x="600" y="686" class="body" font-size="11" font-style="italic" fill="#5A5A5A">→ La règle : pipeline hybride layered (deterministic + LAJ + human spot-check)</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#E5E1D8" stroke-width="1"/>
  <text x="60" y="752" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Sources : Manthan Gupta « LLM as a Judge » (2025) · Wang et al. « Large Language Models are not Fair Evaluators » (arXiv:2305.17926)</text>
  <text x="60" y="770" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Zheng et al. « Judging LLM-as-a-judge with MT-Bench and Chatbot Arena » (NeurIPS 2023) · « Grading Scale Impact on LLM-as-a-Judge » (NeurIPS 2025)</text>
  <text x="60" y="788" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Anthropic Engineering 2026 ; analyse propriétaire.</text>
</svg>
