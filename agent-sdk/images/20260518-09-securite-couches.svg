<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="sec-title sec-desc">
  <title id="sec-title">Le gruyère suisse de la sécurité</title>
  <desc id="sec-desc">Schéma 09 — Modèle d'empilement à 3 couches imparfaites de sécurité d'un agent bash-driven (alignement modèle, harness controls, sandbox env). Une attaque ou un acte destructeur traverse les trous des couches 1 et 2 mais est arrêté par la couche 3.</desc>
  <defs>
    <style>
      <![CDATA[
        .display { font-family: 'Fraunces', 'Cambria', serif; font-weight: 600; font-size: 28px; letter-spacing: -0.01em; fill: #1e1e2a; }
        .subtitle { font-family: 'Fraunces', 'Cambria', serif; font-style: italic; font-weight: 400; font-size: 18px; fill: #6b6f7c; }
        .body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #1e1e2a; }
        .body-label { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 15px; fill: #1e1e2a; }
        .caption { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 12px; fill: #6b6f7c; }
        .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; }
        .schema-marker { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; fill: #b8582e; }
        .cheese-slice { fill: #faf2cf; stroke: rgba(30,30,44,0.18); stroke-width: 1; }
        .hole { fill: #faf6ec; stroke: rgba(30,30,44,0.22); stroke-width: 1; }
        .ball { fill: #b8582e; }
        .trajectory { stroke: #b8582e; stroke-width: 1.5; stroke-dasharray: 5,4; fill: none; opacity: 0.75; }
        .slice-label { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 15px; fill: #1e1e2a; letter-spacing: 0.04em; }
        .slice-sublabel { font-family: 'Inter', system-ui, sans-serif; font-size: 11.5px; fill: #6b6f7c; }
        .layer-num { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 11px; font-weight: 600; fill: #b8582e; }
        .stop-line { stroke: #b8582e; stroke-width: 2; stroke-dasharray: 3,3; opacity: 0.55; }
        .verdict { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 11px; font-weight: 600; fill: #b8582e; letter-spacing: 0.12em; }
        .checkmark-fail { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; fill: #6b6f7c; }
        .checkmark-pass { font-family: 'Inter', system-ui, sans-serif; font-size: 18px; font-weight: 600; fill: #1f5560; }
        .pull-quote-box { fill: none; stroke: #b8582e; stroke-width: 1; stroke-dasharray: 6,4; opacity: 0.6; }
      ]]>
    </style>
    <pattern id="cheese-grain-sec" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <circle cx="8" cy="12" r="1.2" fill="rgba(180,140,20,0.08)"/>
      <circle cx="28" cy="6" r="0.9" fill="rgba(180,140,20,0.08)"/>
      <circle cx="20" cy="28" r="1.1" fill="rgba(180,140,20,0.08)"/>
      <circle cx="34" cy="22" r="0.8" fill="rgba(180,140,20,0.08)"/>
    </pattern>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1300" height="720" fill="#faf6ec"/>

  <!-- ===== TOP BANDEAU ===== -->
  <text x="60" y="40" class="schema-marker">SCHÉMA 09</text>
  <text x="60" y="68" class="display">Le gruyère suisse de la sécurité</text>
  <text x="60" y="92" class="subtitle">trois couches imparfaites composent ensemble une défense robuste — Anthropic</text>
  <line x1="60" y1="108" x2="1240" y2="108" stroke="rgba(30,30,44,0.08)" stroke-width="1"/>

  <!-- ===== COLUMN HEADERS ===== -->
  <text x="155" y="130" class="mono" text-anchor="middle" font-size="11" fill="#6b6f7c" letter-spacing="0.12em">COUCHE</text>
  <text x="640" y="130" class="mono" text-anchor="middle" font-size="11" fill="#6b6f7c" letter-spacing="0.12em">MÉCANISME DE DÉFENSE</text>
  <text x="1175" y="130" class="mono" text-anchor="middle" font-size="11" fill="#6b6f7c" letter-spacing="0.12em">STATUT</text>

  <!-- ===== INCIDENT MARKER (top of trajectory) ===== -->
  <text x="920" y="156" class="body-label" text-anchor="end" font-size="13" fill="#1e1e2a">Tentative</text>
  <text x="920" y="170" class="caption" text-anchor="end" font-size="11">d'exécution destructrice</text>
  <circle cx="952" cy="160" r="9" class="ball"/>

  <!-- ===== TRAJECTORY (from bille to stopping point on layer 3) ===== -->
  <line x1="952" y1="160" x2="952" y2="442" class="trajectory"/>
  <!-- The bille is stopped at layer 3 surface (y=442) -->

  <!-- ===== SLICE 1 — ALIGNEMENT MODÈLE (y=180 to y=274) ===== -->
  <rect x="200" y="180" width="940" height="94" rx="4" class="cheese-slice"/>
  <rect x="200" y="180" width="940" height="94" rx="4" fill="url(#cheese-grain-sec)"/>
  <!-- Holes : irregular, one aligned with bille trajectory at x=952 -->
  <circle cx="380" cy="227" r="20" class="hole"/>
  <circle cx="530" cy="227" r="14" class="hole"/>
  <circle cx="700" cy="227" r="18" class="hole"/>
  <circle cx="820" cy="227" r="15" class="hole"/>
  <circle cx="952" cy="227" r="22" class="hole"/>
  <circle cx="1080" cy="227" r="13" class="hole"/>
  <!-- Layer left numbering -->
  <text x="155" y="225" class="layer-num" text-anchor="middle">01</text>
  <text x="155" y="240" class="layer-num" text-anchor="middle" font-size="9">▼</text>
  <!-- Layer label inside slice -->
  <text x="220" y="208" class="slice-label">ALIGNEMENT MODÈLE</text>
  <text x="220" y="225" class="slice-sublabel">refus actions destructrices · prompt injection mitigation · training Anthropic</text>
  <!-- Status icon (right) -->
  <text x="1190" y="232" class="checkmark-fail" text-anchor="middle">✗</text>

  <!-- ===== SLICE 2 — HARNESS CONTROLS (y=308 to y=402) ===== -->
  <rect x="200" y="308" width="940" height="94" rx="4" class="cheese-slice"/>
  <rect x="200" y="308" width="940" height="94" rx="4" fill="url(#cheese-grain-sec)"/>
  <!-- Holes : irregular, one aligned with bille at x=952 -->
  <circle cx="320" cy="355" r="14" class="hole"/>
  <circle cx="460" cy="355" r="19" class="hole"/>
  <circle cx="600" cy="355" r="13" class="hole"/>
  <circle cx="760" cy="355" r="16" class="hole"/>
  <circle cx="952" cy="355" r="20" class="hole"/>
  <circle cx="1090" cy="355" r="14" class="hole"/>
  <!-- Layer left numbering -->
  <text x="155" y="353" class="layer-num" text-anchor="middle">02</text>
  <text x="155" y="368" class="layer-num" text-anchor="middle" font-size="9">▼</text>
  <!-- Layer label -->
  <text x="220" y="336" class="slice-label">HARNESS CONTROLS</text>
  <text x="220" y="353" class="slice-sublabel">parser bash · permission system · hooks PreToolUse · prompting controls</text>
  <!-- Status -->
  <text x="1190" y="360" class="checkmark-fail" text-anchor="middle">✗</text>

  <!-- ===== SLICE 3 — SANDBOX ENV (y=436 to y=530) — bille blocked here ===== -->
  <rect x="200" y="436" width="940" height="94" rx="4" class="cheese-slice"/>
  <rect x="200" y="436" width="940" height="94" rx="4" fill="url(#cheese-grain-sec)"/>
  <!-- Holes : intentionally NONE near x=952 to block the bille -->
  <circle cx="320" cy="483" r="14" class="hole"/>
  <circle cx="490" cy="483" r="18" class="hole"/>
  <circle cx="690" cy="483" r="15" class="hole"/>
  <circle cx="1060" cy="483" r="16" class="hole"/>
  <!-- BLOCKED line + stopped ball on top of layer 3 -->
  <line x1="200" y1="436" x2="1140" y2="436" class="stop-line"/>
  <circle cx="952" cy="436" r="9" class="ball"/>
  <text x="952" y="425" class="verdict" text-anchor="middle">BLOQUÉE PAR LA COUCHE 3</text>
  <!-- Layer left numbering -->
  <text x="155" y="481" class="layer-num" text-anchor="middle">03</text>
  <!-- Layer label -->
  <text x="220" y="464" class="slice-label">SANDBOX ENV</text>
  <text x="220" y="481" class="slice-sublabel">isolation réseau · filesystem scope (/workspace) · pas d'accès root · CPU/RAM limits</text>
  <!-- Provider sub-line -->
  <text x="220" y="500" class="caption" font-size="11">Cloudflare Sandbox · Modal · E2B · Daytona</text>
  <!-- Status -->
  <text x="1190" y="488" class="checkmark-pass" text-anchor="middle">✓</text>

  <!-- ===== LEGEND BOX (y=560 to y=608) ===== -->
  <rect x="200" y="560" width="940" height="44" rx="3" fill="#fdfaf0" stroke="rgba(30,30,44,0.16)" stroke-width="1"/>
  <!-- Ball -->
  <circle cx="232" cy="582" r="9" class="ball"/>
  <text x="250" y="586" class="body" font-size="12">Bille = acte destructeur ou attaque externe</text>
  <!-- Hole -->
  <circle cx="495" cy="582" r="9" class="hole"/>
  <text x="513" y="586" class="body" font-size="12">Trou = faille de la couche (training imparfait, hook absent, sandbox laxiste)</text>
  <!-- Stop -->
  <line x1="952" y1="580" x2="970" y2="580" class="stop-line"/>
  <text x="980" y="586" class="body" font-size="12">Couche 3 = arrêt définitif (sandbox isolation)</text>

  <!-- ===== EXPLANATION TEXT (y=620+) ===== -->
  <text x="200" y="640" class="body" font-size="13">La 3ᵉ couche (sandbox env) arrête la bille : ses trous ne s'alignent pas avec ceux des couches 1 et 2.</text>
  <text x="200" y="660" class="body" font-size="13">Chaque couche est imparfaite seule — leur superposition produit la défense effective. La sécurité passe par les <em>clés API scopées</em>, les <em>proxies backend</em> et les <em>tokens temporaires</em>, jamais par le prompt.</text>

  <!-- ===== CAPTION (y=695) ===== -->
  <text x="650" y="695" class="caption" text-anchor="middle">Modèle d'empilement Anthropic — adapté aux 3 couches du § 9 (alignement modèle · harness controls · sandbox env).</text>
</svg>
