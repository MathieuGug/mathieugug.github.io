<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-02">
  <title id="title-02">Anatomie du harness Claude Code — un noyau et neuf satellites</title>

  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .core-title{font:600 22px/1.2 'Fraunces',serif;fill:#faf6ec}
      .core-sub{font:500 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#cdc8b8}
      .sat-title{font:500 14px/1.2 'Fraunces',serif;fill:#1e1e2a}
      .sat-annot{font:400 11px/1.3 'Inter',sans-serif;fill:#6b6f7c}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .core-bg{fill:#1e1e2a}
      .sat-bg{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1}
      .sat-bg-accent{fill:#fdfaf0;stroke:#b8582e;stroke-width:1.4}
      .link{stroke:#6b6f7c;stroke-width:1.2;fill:none;opacity:0.7}
      .rule{stroke:rgba(30,30,44,0.18);stroke-width:1;fill:none}
      .core-tools{font:400 italic 10px/1.3 'Inter',sans-serif;fill:#8a8880}
    </style>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#6b6f7c" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1120" height="800" fill="#faf6ec"/>

  <!-- Header -->
  <text x="560" y="52" text-anchor="middle" class="title">Anatomie du harness Claude Code</text>
  <text x="560" y="80" text-anchor="middle" class="subtitle">Un noyau, neuf satellites — le tout packagé comme un produit, exposé comme une librairie.</text>

  <!-- Marker top-right -->
  <text x="1088" y="40" text-anchor="end" class="marker">SCHÉMA 02</text>

  <!-- Horizontal rule under header -->
  <line x1="56" y1="100" x2="1064" y2="100" class="rule"/>

  <!-- Liaison lines (from core perimeter to near satellite edge) -->
  <!-- Tools (90deg): core (560,332) -> (560,232) -->
  <line x1="560.0" y1="332.0" x2="560.0" y2="232.0" class="link"/>
  <!-- Permissions (130deg): core (509.9,350.2) -> (445.6,273.6) -->
  <line x1="509.9" y1="350.2" x2="445.6" y2="273.6" class="link"/>
  <!-- Memory (170deg): core (483.2,396.5) -> (384.7,379.1) -->
  <line x1="483.2" y1="396.5" x2="384.7" y2="379.1" class="link"/>
  <!-- Subagents (-150deg): core (492.5,449.0) -> (405.8,499.0) -->
  <line x1="492.5" y1="449.0" x2="405.8" y2="499.0" class="link"/>
  <!-- Skills (-110deg): core (533.3,483.3) -> (499.1,577.3) -->
  <line x1="533.3" y1="483.3" x2="499.1" y2="577.3" class="link"/>
  <!-- Hooks (-70deg): core (586.7,483.3) -> (620.9,577.3) -->
  <line x1="586.7" y1="483.3" x2="620.9" y2="577.3" class="link"/>
  <!-- Filesystem (-30deg): core (627.5,449.0) -> (714.2,499.0) -->
  <line x1="627.5" y1="449.0" x2="714.2" y2="499.0" class="link"/>
  <!-- Bash (10deg): core (636.8,396.5) -> (735.3,379.1) -->
  <line x1="636.8" y1="396.5" x2="735.3" y2="379.1" class="link"/>
  <!-- Compaction (50deg): core (610.1,350.2) -> (674.4,273.6) -->
  <line x1="610.1" y1="350.2" x2="674.4" y2="273.6" class="link"/>

  <!-- Core circle -->
  <circle cx="560" cy="410" r="78" class="core-bg"/>
  <!-- Subtle outer ring -->
  <circle cx="560" cy="410" r="82" fill="none" stroke="#b8582e" stroke-width="0.8" opacity="0.35"/>

  <!-- Core labels -->
  <text x="560" y="400" text-anchor="middle" class="core-sub">LE NOYAU</text>
  <text x="560" y="422" text-anchor="middle" class="core-title">Modèle Claude</text>
  <text x="560" y="440" text-anchor="middle" class="core-tools">tools loop · context mgmt</text>

  <!-- SATELLITE 1: Tools (90deg) — top, cx=560 cy=162 -->
  <rect x="490" y="134" width="140" height="56" rx="8" class="sat-bg-accent"/>
  <text x="560" y="155" text-anchor="middle" class="sat-title">Tools</text>
  <text x="560" y="171" text-anchor="middle" class="sat-annot">Read · Write · Edit</text>
  <text x="560" y="183" text-anchor="middle" class="sat-annot">Bash · Grep · Glob</text>

  <!-- SATELLITE 2: Permissions (130deg) — top-left, cx=400.6 cy=220 -->
  <rect x="330.6" y="192" width="140" height="56" rx="8" class="sat-bg"/>
  <text x="400.6" y="213" text-anchor="middle" class="sat-title">Permissions</text>
  <text x="400.6" y="229" text-anchor="middle" class="sat-annot">sandbox · allowed_tools</text>
  <text x="400.6" y="241" text-anchor="middle" class="sat-annot">RBAC · deny patterns</text>

  <!-- SATELLITE 3: Memory (170deg) — left, cx=315.8 cy=366.9 -->
  <rect x="245.8" y="338.9" width="140" height="56" rx="8" class="sat-bg"/>
  <text x="315.8" y="360" text-anchor="middle" class="sat-title">Memory</text>
  <text x="315.8" y="376" text-anchor="middle" class="sat-annot">auto memory · MEMORY.md</text>
  <text x="315.8" y="388" text-anchor="middle" class="sat-annot">files-as-memory</text>

  <!-- SATELLITE 4: Subagents (-150deg) — bottom-left, cx=345.2 cy=534 -->
  <rect x="275.2" y="506" width="140" height="56" rx="8" class="sat-bg"/>
  <text x="345.2" y="527" text-anchor="middle" class="sat-title">Subagents</text>
  <text x="345.2" y="543" text-anchor="middle" class="sat-annot">Agent tool</text>
  <text x="345.2" y="555" text-anchor="middle" class="sat-annot">délégation parallèle</text>

  <!-- SATELLITE 5: Skills (-110deg) — bottom, cx=475.2 cy=643 -->
  <rect x="405.2" y="615" width="140" height="56" rx="8" class="sat-bg"/>
  <text x="475.2" y="636" text-anchor="middle" class="sat-title">Skills</text>
  <text x="475.2" y="652" text-anchor="middle" class="sat-annot">.claude/skills/</text>
  <text x="475.2" y="664" text-anchor="middle" class="sat-annot">expertise progressive</text>

  <!-- SATELLITE 6: Hooks (-70deg) — bottom-right, cx=644.8 cy=643 -->
  <rect x="574.8" y="615" width="140" height="56" rx="8" class="sat-bg"/>
  <text x="644.8" y="636" text-anchor="middle" class="sat-title">Hooks</text>
  <text x="644.8" y="652" text-anchor="middle" class="sat-annot">Pre/PostToolUse · Stop</text>
  <text x="644.8" y="664" text-anchor="middle" class="sat-annot">Session · Notification</text>

  <!-- SATELLITE 7: Filesystem (-30deg) — right, cx=774.8 cy=534 -->
  <rect x="704.8" y="506" width="140" height="56" rx="8" class="sat-bg"/>
  <text x="774.8" y="527" text-anchor="middle" class="sat-title">Filesystem</text>
  <text x="774.8" y="543" text-anchor="middle" class="sat-annot">substrat de raisonnement</text>
  <text x="774.8" y="555" text-anchor="middle" class="sat-annot">CLAUDE.md · état partagé</text>

  <!-- SATELLITE 8: Bash (10deg) — right, cx=804.2 cy=366.9 -->
  <rect x="734.2" y="338.9" width="140" height="56" rx="8" class="sat-bg"/>
  <text x="804.2" y="360" text-anchor="middle" class="sat-title">Bash</text>
  <text x="804.2" y="376" text-anchor="middle" class="sat-annot">shell + Unix primitives</text>
  <text x="804.2" y="388" text-anchor="middle" class="sat-annot">env · process · pipes</text>

  <!-- SATELLITE 9: Compaction (50deg) — top-right, cx=719.4 cy=220 -->
  <rect x="649.4" y="192" width="140" height="56" rx="8" class="sat-bg"/>
  <text x="719.4" y="213" text-anchor="middle" class="sat-title">Compaction</text>
  <text x="719.4" y="229" text-anchor="middle" class="sat-annot">résumé incrémental</text>
  <text x="719.4" y="241" text-anchor="middle" class="sat-annot">du contexte</text>

  <!-- Encart "ce qui rend le harness vendable" — bottom-left, above citation band -->
  <rect x="56" y="682" width="310" height="76" rx="6" fill="none" stroke="#b8582e" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="74" y="701" class="marker" font-size="10px" letter-spacing="0.12em">POURQUOI ÇA MARCHE</text>
  <text x="74" y="718" class="sat-annot" font-size="12px" fill="#3a3a48">· Tools accessibles et inspectables</text>
  <text x="74" y="733" class="sat-annot" font-size="12px" fill="#3a3a48">· État partagé via le filesystem</text>
  <text x="74" y="748" class="sat-annot" font-size="12px" fill="#3a3a48">· Hooks et permissions pour cadrer l'autonomie</text>

  <!-- Citation divider line (accent, dashed, full width) -->
  <line x1="56" y1="766" x2="1064" y2="766" stroke="#b8582e" stroke-width="0.8" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Citation text centered -->
  <text x="560" y="780" text-anchor="middle" font-size="13px" font-style="italic" fill="#6b6f7c" font-family="'Fraunces',serif">
    « context is not just the prompt » — Thariq Shihipar, Anthropic
  </text>

  <!-- Footer rule -->
  <line x1="56" y1="793" x2="1064" y2="793" class="rule" opacity="0.5"/>
  <text x="56" y="800" class="caption">Mathieu Guglielmino · Format co-écrit avec l'aide d'une IA</text>
  <text x="1064" y="800" text-anchor="end" class="caption">mathieugug.github.io</text>
</svg>
