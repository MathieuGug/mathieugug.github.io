<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 880" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-08">
  <title id="title-08">Agent loop Gather/Act/Verify avec hooks</title>
  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .step-title{font:500 20px/1.2 'Fraunces',serif;fill:#1e1e2a}
      .step-tag{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .tool-label{font:500 14px/1.3 'Inter',sans-serif;fill:#1e1e2a}
      .tool-mono{font:500 13px/1.3 'JetBrains Mono',monospace;fill:#6b6f7c}
      .annot{font:400 14px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .center-title{font:600 22px/1.2 'Fraunces',serif;fill:#faf6ec}
      .center-sub{font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#cdc8b8}
      .hook-tag{font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .hook-text{font:400 italic 13px/1.3 'Fraunces',serif;fill:#1e1e2a}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .step-bg{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.4}
      .tool-bg{fill:#faf6ec;stroke:rgba(30,30,44,0.10);stroke-width:1}
      .center-bg{fill:#1e1e2a}
      .loop-arc{stroke:#b8582e;stroke-width:2.5;fill:none}
      .hook-arc{stroke:#a83e55;stroke-width:1.2;fill:none;stroke-dasharray:4 4}
      .rule{stroke:rgba(30,30,44,0.18);stroke-width:1;fill:none}
      .meta-bg{fill:none;stroke:#b8582e;stroke-width:1;stroke-dasharray:5 4}
    </style>
    <!-- Arrow markers -->
    <marker id="arrow-accent" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b8582e"/>
    </marker>
    <marker id="arrow-carmine-sm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a83e55"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1120" height="880" fill="#faf6ec"/>

  <!-- Title block -->
  <text x="64" y="38" class="marker">SCH&#201;MA 08</text>
  <text x="64" y="64" class="title">L&apos;agent loop : Gather &#x2192; Act &#x2192; Verify</text>
  <text x="64" y="90" class="subtitle">La boucle qui sous-tend tous les agents fiables. Les hooks rattrapent quand le mod&#232;le saute une &#233;tape.</text>

  <!-- ============================================================ -->
  <!-- CENTER CIRCLE  cx=560 cy=420 r=88 -->
  <!-- ============================================================ -->
  <circle cx="560" cy="420" r="88" class="center-bg"/>
  <text x="560" y="407" class="center-sub" text-anchor="middle">LE LOOP</text>
  <text x="560" y="432" class="center-title" text-anchor="middle">gather &#x2192; act</text>
  <text x="560" y="454" class="center-title" text-anchor="middle">&#x2192; verify</text>
  <text x="560" y="474" font-family="Inter,sans-serif" font-size="11" font-style="italic" fill="rgba(250,246,236,0.55)" text-anchor="middle">invariant</text>

  <!-- ============================================================ -->
  <!-- LOOP ARCS (clockwise, radius ~220, center 560,420)          -->
  <!-- Step positions on r=240:                                    -->
  <!--   Step1 (Gather): top   560,180  (angle -90 deg)           -->
  <!--   Step2 (Act):    BR    768,540  (angle +30 deg)           -->
  <!--   Step3 (Verify): BL    352,540  (angle +150 deg)          -->
  <!--                                                             -->
  <!-- Arc midpoints on r=220:                                     -->
  <!--   Arc 1-2 mid: angle=-30  => 560+220*cos(-30), 420+220*sin(-30) = 560+190.5,420-110 = ~750,310 -->
  <!--   Arc 2-3 mid: angle=90   => 560+220*cos(90), 420+220*sin(90) = 560,640  -->
  <!--   Arc 3-1 mid: angle=210  => 560+220*cos(210),420+220*sin(210) = 560-190.5,420-110 = ~370,310 -->
  <!-- ============================================================ -->

  <!-- Arc1: Gather -> Act (clockwise, top-right quarter, r=220) -->
  <!-- Start point on circle r=220 near step1 (top): angle=-80 => 560+220*cos(-80),420+220*sin(-80)=560+38.2,420-216.6=598,203 -->
  <!-- End point near step2 (BR): angle=20 => 560+220*cos(20),420+220*sin(20)=560+206.7,420+75.2=767,495 -->
  <path d="M 598,204 A 220,220 0 0,1 767,495" class="loop-arc" marker-end="url(#arrow-accent)"/>

  <!-- Arc2: Act -> Verify (clockwise, bottom, r=220) -->
  <!-- Start: angle=57 => (680,605) — outside Act box (x=700..900) by 20px gap -->
  <!-- End: angle=123 => (440,605) — outside Verify box (x=220..420) by 20px gap -->
  <path d="M 680,605 A 220,220 0 0,1 440,605" class="loop-arc" marker-end="url(#arrow-accent)"/>

  <!-- Arc3: Verify -> Gather (clockwise, left, r=220) -->
  <!-- Start near step3: angle=160 => 560+220*cos(160),420+220*sin(160)=560-206.7,420+75.2=353,495 -->
  <!-- End near step1: angle=260 => 560+220*cos(260),420+220*sin(260)=560-38.2,420-216.6=522,203 -->
  <path d="M 353,495 A 220,220 0 0,1 522,204" class="loop-arc" marker-end="url(#arrow-accent)"/>

  <!-- ============================================================ -->
  <!-- STEP 1 — GATHER CONTEXT  (top, centered at 560,162)        -->
  <!-- Box: x=460 y=110 w=200 h=66 (center x=560, bottom y=176)  -->
  <!-- Arrow starts at 560,194 (box bottom+18px gap)              -->
  <!-- ============================================================ -->
  <rect x="460" y="110" width="200" height="66" rx="6" class="step-bg"/>
  <text x="560" y="131" class="step-tag" text-anchor="middle">&#201;TAPE 1</text>
  <text x="560" y="155" class="step-title" text-anchor="middle">Gather Context</text>

  <!-- Tools for Gather (3 mini-boxes horizontally under step box) -->
  <!-- Tool boxes: width=110, height=42, gap=12 -->
  <!-- Total width: 3*110 + 2*12 = 354 => start x = 560-177 = 383 -->
  <!-- y position: 110+66+10 = 186 -->
  <rect x="383" y="186" width="110" height="42" rx="4" class="tool-bg"/>
  <text x="438" y="203" class="tool-label" text-anchor="middle">Grep</text>
  <text x="438" y="219" class="tool-mono" text-anchor="middle">patterns</text>

  <rect x="505" y="186" width="110" height="42" rx="4" class="tool-bg"/>
  <text x="560" y="203" class="tool-label" text-anchor="middle">Read</text>
  <text x="560" y="219" class="tool-mono" text-anchor="middle">fichiers locaux</text>

  <rect x="627" y="186" width="110" height="42" rx="4" class="tool-bg"/>
  <text x="682" y="203" class="tool-label" text-anchor="middle">WebFetch</text>
  <text x="682" y="219" class="tool-mono" text-anchor="middle">docs externes</text>

  <!-- ============================================================ -->
  <!-- STEP 2 — TAKE ACTION  (bottom-right, centered at 800,544)  -->
  <!-- Box: x=700 y=518 w=200 h=66                                -->
  <!-- ============================================================ -->
  <rect x="700" y="518" width="200" height="66" rx="6" class="step-bg"/>
  <text x="800" y="539" class="step-tag" text-anchor="middle">&#201;TAPE 2</text>
  <text x="800" y="563" class="step-title" text-anchor="middle">Take Action</text>

  <!-- Tools for Act (3 mini-boxes horizontally under step box) -->
  <!-- y = 518+66+10+56 = 650 — shifted down to clear Arc2 (which passes at y~605, x<700) -->
  <rect x="700" y="650" width="110" height="42" rx="4" class="tool-bg"/>
  <text x="755" y="667" class="tool-label" text-anchor="middle">Bash</text>
  <text x="755" y="683" class="tool-mono" text-anchor="middle">shell, scripts</text>

  <rect x="822" y="650" width="110" height="42" rx="4" class="tool-bg"/>
  <text x="877" y="667" class="tool-label" text-anchor="middle">Edit</text>
  <text x="877" y="683" class="tool-mono" text-anchor="middle">modifier fichiers</text>

  <rect x="944" y="650" width="110" height="42" rx="4" class="tool-bg"/>
  <text x="999" y="667" class="tool-label" text-anchor="middle">Codegen</text>
  <text x="999" y="683" class="tool-mono" text-anchor="middle">g&#233;n&#233;rer code</text>

  <!-- ============================================================ -->
  <!-- STEP 3 — VERIFY WORK  (bottom-left, centered at 320,544)   -->
  <!-- Box: x=220 y=518 w=200 h=66                                -->
  <!-- ============================================================ -->
  <rect x="220" y="518" width="200" height="66" rx="6" class="step-bg"/>
  <text x="320" y="539" class="step-tag" text-anchor="middle">&#201;TAPE 3</text>
  <text x="320" y="563" class="step-title" text-anchor="middle">Verify Work</text>

  <!-- Tools for Verify (3 mini-boxes horizontally under step box) -->
  <!-- Total width=354, start x = 320-177 = 143 -->
  <!-- y = 518+66+10+56 = 650 — shifted to clear Arc2 (passes at y~605, x=440..680) -->
  <rect x="143" y="650" width="118" height="42" rx="4" class="tool-bg"/>
  <text x="202" y="664" class="tool-label" text-anchor="middle">Lint / Typecheck</text>
  <text x="202" y="682" class="tool-mono" text-anchor="middle">erreurs statiques</text>

  <rect x="273" y="650" width="94" height="42" rx="4" class="tool-bg"/>
  <text x="320" y="667" class="tool-label" text-anchor="middle">Tests</text>
  <text x="320" y="683" class="tool-mono" text-anchor="middle">ex&#233;cutables</text>

  <rect x="379" y="650" width="100" height="42" rx="4" class="tool-bg"/>
  <text x="429" y="667" class="tool-label" text-anchor="middle">Citations</text>
  <text x="429" y="683" class="tool-mono" text-anchor="middle">traceable</text>

  <!-- ============================================================ -->
  <!-- HOOK FILAMENTS (dashed, pointing to arc junction zones)    -->
  <!-- ============================================================ -->

  <!-- Hook 1: PreToolUse — arc junction between Step1 and Step2 -->
  <!-- Junction zone roughly at angle=-30 on r=220: (560+190,420-110)=(750,310) -->
  <!-- Filament from outside r=310 angle=-30: (560+268,420-155)=(828,265) to (750,322) -->
  <path d="M 828,262 Q 796,285 762,320" class="hook-arc" marker-end="url(#arrow-carmine-sm)"/>
  <!-- Hook label box -->
  <rect x="820" y="212" width="220" height="44" rx="4" fill="#fdfaf0" stroke="rgba(168,62,85,0.22)" stroke-width="1"/>
  <text x="930" y="228" class="hook-tag" text-anchor="middle">HOOK PRE&#160;TOOL&#160;USE</text>
  <text x="930" y="246" class="hook-text" text-anchor="middle">always read before write</text>

  <!-- Hook 2: PostToolUse — arc junction between Step2 and Step3 -->
  <!-- Arc2 midpoint at angle=90 on r=220: (560,640). -->
  <!-- Tool boxes now at y=650, so arc midpoint y=640 is above them. -->
  <!-- Filament from label top edge (560,698) up to arc point (560,642) — 8px gap above arc -->
  <path d="M 560,698 L 560,644" class="hook-arc" marker-end="url(#arrow-carmine-sm)"/>
  <!-- Hook label box — placed at y=700 to sit below tool boxes (tool box bottom y=692) -->
  <rect x="396" y="700" width="328" height="44" rx="4" fill="#fdfaf0" stroke="rgba(168,62,85,0.22)" stroke-width="1"/>
  <text x="560" y="716" class="hook-tag" text-anchor="middle">HOOK POST&#160;TOOL&#160;USE</text>
  <text x="560" y="734" class="hook-text" text-anchor="middle">audit log + check de format</text>

  <!-- Hook 3: Stop — arc junction between Step3 and Step1 -->
  <!-- Junction zone roughly at angle=210 on r=220: (560-190,420-110)=(370,310) -->
  <!-- Filament from outside r=310 at angle=210: (560-268,420-155)=(292,265) to (378,322) -->
  <path d="M 292,262 Q 324,285 358,320" class="hook-arc" marker-end="url(#arrow-carmine-sm)"/>
  <!-- Hook label box -->
  <rect x="64" y="212" width="222" height="44" rx="4" fill="#fdfaf0" stroke="rgba(168,62,85,0.22)" stroke-width="1"/>
  <text x="175" y="228" class="hook-tag" text-anchor="middle">HOOK STOP</text>
  <text x="175" y="246" class="hook-text" text-anchor="middle">stoppe si v&#233;rification &#233;choue 3&#215;</text>

  <!-- ============================================================ -->
  <!-- META-PRATIQUE ENCART (bottom, y=776-848)                   -->
  <!-- Hook2 label ends at y=744; tool boxes end y=692; gap ok    -->
  <!-- ============================================================ -->
  <line x1="64" y1="776" x2="1056" y2="776" class="rule" stroke-dasharray="5 4" stroke="#b8582e" stroke-width="1"/>
  <rect x="64" y="784" width="992" height="76" rx="6" class="meta-bg"/>

  <text x="84" y="806" class="step-tag">M&#201;TA-PRATIQUE</text>
  <text x="84" y="826" class="annot">Lis les transcripts. Demande &#224; chaque tour&#160;: pourquoi a-t-il choisi &#231;a&#160;? o&#249; a-t-il &#233;chou&#233;&#160;? quel contexte manquait&#160;?</text>
  <text x="84" y="846" class="annot">quel outil de v&#233;rification manquait&#160;?</text>

  <!-- ============================================================ -->
  <!-- SUBTLE JUNCTION DOTS on arc (at step connection zones)     -->
  <!-- ============================================================ -->
  <!-- Dot at arc end near step1 top -->
  <circle cx="560" cy="200" r="4" fill="#b8582e" opacity="0.5"/>
  <!-- Dot at arc end near step2 BR -->
  <circle cx="800" cy="538" r="4" fill="#b8582e" opacity="0.5"/>
  <!-- Dot at arc end near step3 BL -->
  <circle cx="320" cy="538" r="4" fill="#b8582e" opacity="0.5"/>

</svg>
