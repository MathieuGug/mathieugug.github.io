<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-01">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow-01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Anatomie d'un harness agentique</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic" fill="#5A5A5A">Sept couches d'orchestration entre le LLM et l'environnement métier</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Y axis labels (couches) -->
  <text x="60" y="178" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A">COUCHES VERTICALES</text>

  <!-- Layer 1 - Modèle (top) -->
  <g class="interactive" data-card="modele" tabindex="0" role="button" aria-label="Couche modèle">
    <rect x="60" y="195" width="930" height="58" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="225" class="display" font-size="15" font-weight="600" fill="#1A1A1A">1. Modèle (LLM)</text>
    <text x="80" y="244" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Routing multi-modèle · fallback · fenêtre de contexte étendue · prompt caching</text>
    <text x="970" y="225" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">Sonnet 4.6 · Opus 4.7 · GPT-5.4 · Gemini 3.1 Pro</text>
  </g>

  <!-- Layer 2 - Boucle de contrôle -->
  <g class="interactive" data-card="boucle" tabindex="0" role="button" aria-label="Boucle de contrôle">
    <rect x="60" y="263" width="930" height="58" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="80" y="293" class="display" font-size="15" font-weight="600" fill="#B7332C">2. Boucle de contrôle</text>
    <text x="80" y="312" class="body" font-size="11" font-style="italic" fill="#5A5A5A">TAOR (Think-Act-Observe-Repeat) · stop conditions · replanification · approbations</text>
    <text x="970" y="293" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">while stop_reason == 'tool_use'</text>
  </g>

  <!-- Layer 3 - Gestion contexte -->
  <g class="interactive" data-card="contexte" tabindex="0" role="button" aria-label="Gestion du contexte">
    <rect x="60" y="331" width="930" height="58" rx="3" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="80" y="361" class="display" font-size="15" font-weight="600" fill="#1A1A1A">3. Gestion du contexte</text>
    <text x="80" y="380" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Compaction automatique · context resets · file-based handoffs · wide tools</text>
    <text x="970" y="361" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">~92% threshold → wU2</text>
  </g>

  <!-- Layer 4 - Outils & sandbox -->
  <g class="interactive" data-card="outils" tabindex="0" role="button" aria-label="Outils et sandbox">
    <rect x="60" y="399" width="930" height="58" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="80" y="429" class="display" font-size="15" font-weight="600" fill="#1F5560">4. Outils &amp; sandbox</text>
    <text x="80" y="448" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Code execution · web search · file I/O · APIs métier · MCP servers · session interception</text>
    <text x="970" y="429" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">Read · Write · Edit · Bash · Glob · Grep</text>
  </g>

  <!-- Layer 5 - Mémoire -->
  <g class="interactive" data-card="memoire" tabindex="0" role="button" aria-label="Système de mémoire">
    <rect x="60" y="467" width="930" height="58" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="80" y="497" class="display" font-size="15" font-weight="600" fill="#B58A2C">5. Mémoire</text>
    <text x="80" y="516" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Épisodique (session) · sémantique (faits durables) · procédurale (patterns appris)</text>
    <text x="970" y="497" class="mono" font-size="10" fill="#5A5A5A" text-anchor="end">CLAUDE.md · SessionService · Durable Objects</text>
  </g>

  <!-- Plan horizontal: observabilité -->
  <text x="60" y="563" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A">PLANS HORIZONTAUX (TRANSVERSE)</text>

  <g class="interactive" data-card="observabilite" tabindex="0" role="button" aria-label="Bus d'observabilité">
    <rect x="60" y="580" width="930" height="50" rx="3" fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25" stroke-dasharray="4 3"/>
    <text x="80" y="608" class="display" font-size="15" font-weight="600" fill="#B58A2C">6. Bus d'observabilité</text>
    <text x="80" y="624" class="body" font-size="11" font-style="italic" fill="#5A5A5A">Traces OpenTelemetry GenAI · LLM-as-Judge · token economics · drift detection</text>
  </g>

  <!-- Plan: gouvernance -->
  <g class="interactive" data-card="gouvernance" tabindex="0" role="button" aria-label="Gouvernance">
    <rect x="60" y="640" width="930" height="50" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25" stroke-dasharray="4 3"/>
    <text x="80" y="668" class="display" font-size="15" font-weight="600" fill="#1F5560">7. Gouvernance</text>
    <text x="80" y="684" class="body" font-size="11" font-style="italic" fill="#5A5A5A">RBAC · politiques d'usage · audit trail · agent hooks (stop, PostToolUse, global)</text>
  </g>

  <!-- Vertical "spine" links -->
  <line x1="1010" y1="200" x2="1010" y2="685" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="1040" y1="200" x2="1040" y2="685" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="1 4"/>

  <!-- Legend on right side -->
  <text x="1060" y="208" class="body" font-size="9" fill="#B58A2C">obs.</text>
  <text x="1060" y="220" class="body" font-size="9" fill="#1F5560">gov.</text>

  <!-- Annotation marker -->
  <circle cx="40" cy="224" r="9" fill="#B7332C"/>
  <text x="40" y="228" class="mono" font-size="10" font-weight="600" fill="#FAF8F3" text-anchor="middle">A</text>
  <line x1="40" y1="233" x2="40" y2="535" stroke="#B7332C" stroke-width="0.75" stroke-dasharray="1 3"/>
  <circle cx="40" cy="535" r="4" fill="#B7332C" fill-opacity="0.3"/>
  <text x="20" y="385" class="body" font-size="9" fill="#B7332C" transform="rotate(-90, 20, 385)">empilement vertical</text>

  <!-- Footer -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="755" class="body" font-size="10" font-style="italic" fill="#5A5A5A">Source : Anthropic « Building Effective Agents » (2024) ; Microsoft Azure SRE Agent context engineering (2026)</text>
  <text x="60" y="772" class="body" font-size="10" font-style="italic" fill="#B8B5AE">Méthodologie : synthèse de 12 architectures de production observées entre Q4 2024 et Q1 2026</text>
</svg>
