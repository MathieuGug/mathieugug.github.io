<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 920" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-05">
  <title id="title-05">Trois variantes pour wrapper la m&#234;me API</title>

  <defs>
    <style>
      .serif{font-family:'Fraunces',serif}
      .sans{font-family:'Inter',sans-serif}
      .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .col-title{font:500 17px/1.2 'Fraunces',serif;fill:#1e1e2a}
      .col-tag{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .row-label{font:500 13px/1.3 'Inter',sans-serif;fill:#6b6f7c}
      .cell{font:400 13px/1.4 'Inter',sans-serif;fill:#1e1e2a}
      .cell-strong{font:500 14px/1.4 'Inter',sans-serif;fill:#1e1e2a}
      .cell-strong-accent{font:500 14px/1.4 'Inter',sans-serif;fill:#b8582e}
      .code{font:500 12px/1.4 'JetBrains Mono',monospace;fill:#1e1e2a}
      .code-soft{font:500 12px/1.4 'JetBrains Mono',monospace;fill:#6b6f7c}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-bg{fill:#fdfaf0;stroke:rgba(30,30,44,0.10);stroke-width:1}
      .col-bg-accent{fill:#fdfaf0;stroke:#b8582e;stroke-width:1.5}
      .cell-bg{fill:#faf6ec;stroke:rgba(30,30,44,0.10);stroke-width:1}
      .rule{stroke:rgba(30,30,44,0.18);stroke-width:1;fill:none}
      .rule-accent{stroke:#b8582e;stroke-width:1;fill:none;stroke-dasharray:4,3}
      .dot{fill:#b8582e}
      .dot-soft{fill:rgba(184,88,46,0.3)}
      .banner-bg{fill:#fdfaf0;stroke:rgba(30,30,44,0.10);stroke-width:1}
      .prompt-prefix{font:600 14px/1 'JetBrains Mono',monospace;fill:#b8582e}
    </style>
  </defs>

  <!-- Fond global -->
  <rect width="1120" height="920" fill="#faf6ec"/>

  <!-- MARKER SCHEMA 05 -->
  <text x="1088" y="36" text-anchor="end" class="marker">SCH&#201;MA 05</text>

  <!-- TITRE + SOUS-TITRE -->
  <text x="32" y="52" class="title">Trois variantes, m&#234;me question</text>
  <text x="32" y="78" class="subtitle">Pour le m&#234;me output, trois architectures. Qui code, qui ex&#233;cute, o&#249; vit l&#x27;&#233;tat.</text>

  <!-- BANNIERE QUESTION -->
  <!-- Band y=100 h=72 -->
  <rect x="32" y="100" width="1056" height="72" rx="4" class="banner-bg"/>
  <text x="56" y="130" class="prompt-prefix">&gt;</text>
  <text x="80" y="130" class="cell-strong" font-style="italic">Lister les Pok&#233;mon Gen 2 type eau</text>
  <text x="80" y="152" class="caption">Transposable &#224; n&#x27;importe quelle API m&#233;tier &#8212; REST, GraphQL, SDK existant</text>

  <!-- TABLEAU -->
  <!-- Layout: x_start=32, col widths: labels=200, A=268, B=268, C=288, total=1024 -->
  <!-- Col x positions: labels=32, A=232, B=500, C=768 -->
  <!-- Row height: header=88px, data rows=62px -->
  <!-- Rows y: header=186, row1=274, row2=336, row3=398, row4=460, row5=522, row6=584, row7=646 -->
  <!-- Table bottom = 708 -->

  <!-- Col A background -->
  <rect x="232" y="186" width="268" height="522" rx="3" class="col-bg"/>
  <!-- Col B background -->
  <rect x="500" y="186" width="268" height="522" rx="3" class="col-bg"/>
  <!-- Col C background (accent border) -->
  <rect x="768" y="186" width="288" height="522" rx="3" class="col-bg-accent"/>

  <!-- HEADER ROW y=186 h=88 -->

  <!-- Labels header: empty -->

  <!-- Col A header -->
  <text x="366" y="212" text-anchor="middle" class="col-tag">VARIANTE A</text>
  <text x="366" y="233" text-anchor="middle" class="col-title">Codegen dans Claude Code</text>
  <text x="270" y="262" class="code">claude &#x22;g&#233;n&#232;re un SDK TS</text>
  <text x="270" y="277" class="code">pour Pok&#233;API&#x22;</text>

  <!-- Separator line under header -->
  <line x1="232" y1="292" x2="500" y2="292" class="rule"/>

  <!-- Col B header -->
  <text x="634" y="212" text-anchor="middle" class="col-tag">VARIANTE B</text>
  <text x="634" y="233" text-anchor="middle" class="col-title">Tools en Client SDK</text>
  <text x="512" y="262" class="code">client.messages.create(</text>
  <text x="512" y="277" class="code">tools=[getPokemon, ...])</text>

  <!-- Separator line under header -->
  <line x1="500" y1="292" x2="768" y2="292" class="rule"/>

  <!-- Col C header -->
  <text x="912" y="212" text-anchor="middle" class="col-tag">VARIANTE C</text>
  <text x="912" y="233" text-anchor="middle" class="col-title">Codegen + bash dans Agent SDK</text>
  <text x="780" y="254" class="code">query(prompt=...,</text>
  <text x="780" y="268" class="code">options=ClaudeAgentOptions(</text>
  <text x="780" y="282" class="code">allowed_tools=[&#x22;Bash&#x22;,&#x22;Edit&#x22;],</text>

  <!-- Separator line under header -->
  <line x1="768" y1="292" x2="1056" y2="292" class="rule"/>

  <!-- GLOBAL top separator -->
  <line x1="32" y1="292" x2="232" y2="292" class="rule"/>

  <!-- ROW 1 — Qui code — y=292 h=62 -->
  <rect x="32" y="292" width="200" height="62" fill="none"/>
  <text x="44" y="328" class="row-label">Qui code</text>

  <text x="366" y="322" text-anchor="middle" class="cell">L&#x27;agent</text>

  <text x="634" y="322" text-anchor="middle" class="cell">Toi (tools + loop)</text>

  <text x="912" y="322" text-anchor="middle" class="cell">L&#x27;agent (avec hooks)</text>

  <line x1="32" y1="354" x2="1056" y2="354" class="rule"/>

  <!-- ROW 2 — Qui execute — y=354 h=62 -->
  <text x="44" y="390" class="row-label">Qui ex&#233;cute</text>

  <text x="366" y="384" text-anchor="middle" class="cell">Le harness</text>

  <text x="634" y="384" text-anchor="middle" class="cell">Toi (tool executor)</text>

  <text x="912" y="384" text-anchor="middle" class="cell">Sandbox / processus</text>

  <line x1="32" y1="416" x2="1056" y2="416" class="rule"/>

  <!-- ROW 3 — Ou vit l'etat — y=416 h=62 -->
  <text x="44" y="452" class="row-label">O&#249; vit l&#x27;&#233;tat</text>

  <text x="366" y="446" text-anchor="middle" class="cell">Fichiers + CLAUDE.md</text>

  <text x="634" y="446" text-anchor="middle" class="cell">M&#233;moire de chat</text>

  <text x="912" y="446" text-anchor="middle" class="cell">Filesystem + DB</text>

  <line x1="32" y1="478" x2="1056" y2="478" class="rule"/>

  <!-- ROW 4 — Latence relative — y=478 h=62 -->
  <text x="44" y="514" class="row-label">Latence relative</text>

  <!-- Dots col A: 1 filled, 2 empty -->
  <circle cx="334" cy="509" r="5" class="dot"/>
  <circle cx="352" cy="509" r="5" class="dot-soft"/>
  <circle cx="370" cy="509" r="5" class="dot-soft"/>

  <!-- Dots col B: 2 filled, 1 empty -->
  <circle cx="602" cy="509" r="5" class="dot"/>
  <circle cx="620" cy="509" r="5" class="dot"/>
  <circle cx="638" cy="509" r="5" class="dot-soft"/>

  <!-- Dots col C: 2 filled, 1 empty -->
  <circle cx="880" cy="509" r="5" class="dot"/>
  <circle cx="898" cy="509" r="5" class="dot"/>
  <circle cx="916" cy="509" r="5" class="dot-soft"/>

  <line x1="32" y1="540" x2="1056" y2="540" class="rule"/>

  <!-- ROW 5 — Discoverability — y=540 h=62 -->
  <text x="44" y="576" class="row-label">Discoverability</text>

  <!-- Dots col A: 3 filled -->
  <circle cx="334" cy="571" r="5" class="dot"/>
  <circle cx="352" cy="571" r="5" class="dot"/>
  <circle cx="370" cy="571" r="5" class="dot"/>

  <!-- Dots col B: 3 filled -->
  <circle cx="602" cy="571" r="5" class="dot"/>
  <circle cx="620" cy="571" r="5" class="dot"/>
  <circle cx="638" cy="571" r="5" class="dot"/>

  <!-- Dots col C: 2 filled, 1 soft -->
  <circle cx="880" cy="571" r="5" class="dot"/>
  <circle cx="898" cy="571" r="5" class="dot"/>
  <circle cx="916" cy="571" r="5" class="dot-soft"/>

  <line x1="32" y1="602" x2="1056" y2="602" class="rule"/>

  <!-- ROW 6 — Benefice principal — y=602 h=62 -->
  <text x="44" y="632" class="row-label">B&#233;n&#233;fice</text>
  <text x="44" y="648" class="row-label">principal</text>

  <text x="366" y="636" text-anchor="middle" class="cell" font-weight="500">V&#233;locit&#233; maximale</text>

  <text x="634" y="636" text-anchor="middle" class="cell" font-weight="500">Contr&#244;le strict,</text>
  <text x="634" y="652" text-anchor="middle" class="cell" font-weight="500">masking, RBAC</text>

  <text x="912" y="636" text-anchor="middle" class="cell" font-weight="500">Flexibilit&#233; +</text>
  <text x="912" y="652" text-anchor="middle" class="cell" font-weight="500">d&#233;terminisme</text>

  <line x1="32" y1="664" x2="1056" y2="664" class="rule"/>

  <!-- ROW 7 — Limite principale — y=664 h=62 -->
  <text x="44" y="694" class="row-label">Limite</text>
  <text x="44" y="710" class="row-label">principale</text>

  <text x="366" y="698" text-anchor="middle" class="cell">Tu restes dans</text>
  <text x="366" y="714" text-anchor="middle" class="cell">Claude Code</text>

  <text x="634" y="698" text-anchor="middle" class="cell">Plafond sur le</text>
  <text x="634" y="714" text-anchor="middle" class="cell">nb de tools</text>

  <text x="912" y="698" text-anchor="middle" class="cell">Plus d&#x27;infra,</text>
  <text x="912" y="714" text-anchor="middle" class="cell">sandbox &#224; g&#233;rer</text>

  <!-- Bottom border of table -->
  <line x1="32" y1="726" x2="1056" y2="726" class="rule"/>

  <!-- Left vertical rule (labels separator) -->
  <line x1="232" y1="186" x2="232" y2="726" class="rule"/>

  <!-- Col separators -->
  <line x1="500" y1="186" x2="500" y2="726" class="rule"/>
  <line x1="768" y1="186" x2="768" y2="726" class="rule"/>
  <line x1="1056" y1="186" x2="1056" y2="726" class="rule"/>

  <!-- Top border of table -->
  <line x1="32" y1="186" x2="1056" y2="186" class="rule"/>
  <!-- Left border -->
  <line x1="32" y1="186" x2="32" y2="726" class="rule"/>

  <!-- ENCART DISCIPLINE ANTI-HALLUCINATION -->
  <!-- y=742 h=80 -->
  <rect x="32" y="742" width="1056" height="80" rx="4" fill="#fdfaf0" stroke="rgba(30,30,44,0.10)" stroke-width="1"/>
  <text x="56" y="767" class="cell-strong-accent">Discipline anti-hallucination</text>
  <text x="56" y="787" class="cell">Si l&#x27;agent &#x201C;sait&#x201D; d&#233;j&#224; la r&#233;ponse (Pok&#233;API est in-distribution), il peut court-circuiter l&#x27;API.</text>
  <text x="56" y="805" class="cell">Un hook PreToolUse force &#x201C;read before write&#x201D; et corrige cette d&#233;rive sans retraining.</text>

  <!-- CITATION -->
  <!-- y=838 h=70 -->
  <line x1="32" y1="838" x2="1056" y2="838" class="rule-accent"/>
  <text x="56" y="865" class="cell" font-style="italic">&#x201C;you generally want the model thinking less and executing more&#x201D;</text>
  <text x="56" y="887" class="caption">&#8212; Thariq Shihipar, Anthropic</text>

</svg>
