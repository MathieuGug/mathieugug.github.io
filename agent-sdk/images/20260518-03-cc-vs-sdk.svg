<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-03">
  <title id="title-03">Claude Code vs Agent SDK — même harness, deux enveloppes</title>

  <style>
    .serif{font-family:'Fraunces',serif}
    .sans{font-family:'Inter',sans-serif}
    .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
    .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
    .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
    .panel-title{font:500 17px/1.2 'Fraunces',serif;fill:#1e1e2a}
    .panel-tag{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
    .label{font:500 15px/1.3 'Inter',sans-serif;fill:#1e1e2a}
    .annot{font:400 13px/1.4 'Inter',sans-serif;fill:#6b6f7c}
    .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
    .code{font:500 13px/1.4 'JetBrains Mono',monospace;fill:#1e1e2a}
    .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
    .accent-bg{fill:#b8582e}
    .panel-bg{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1}
    .harness-bg{fill:#1e1e2a}
    .harness-text{fill:#faf6ec}
    .harness-text-mid{fill:#cdc8b8}
    .rule{stroke:rgba(30,30,44,0.18);stroke-width:1;fill:none}
    .arrow{stroke:#6b6f7c;stroke-width:1.5;fill:none;marker-end:url(#arrow)}
    .arrow-accent{stroke:#b8582e;stroke-width:1.8;fill:none;marker-end:url(#arrow-accent)}
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b6f7c"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b8582e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1120" height="760" fill="#faf6ec"/>

  <!-- ── TITRE ── -->
  <text class="marker" x="48" y="40">SCHÉMA 03</text>
  <text class="title" x="48" y="66">Même harness, deux enveloppes</text>
  <!-- sous-titre sur deux lignes si besoin — ~95 chars Inter 18px italic -->
  <text class="subtitle" x="48" y="90">Claude Code est un produit utilisateur. L'Agent SDK est le même harness,</text>
  <text class="subtitle" x="48" y="110">exposé comme librairie.</text>

  <!-- ══════════════════════════════════════════════════════════════════
       Layout : 3 colonnes
         Panneau CC   : x=48,  w=280  → x2=328
         Gap gauche   : 36px
         HARNESS      : x=364, w=392  → x2=756
         Gap droit    : 36px
         Panneau SDK  : x=792, w=280  → x2=1072
       Hauteur blocs  : y=120 → y=600 (h=480)
  ═══════════════════════════════════════════════════════════════════ -->

  <!-- ── PANNEAU GAUCHE — Claude Code ── -->
  <rect class="panel-bg" x="48" y="120" width="280" height="480" rx="2"/>

  <!-- Tag -->
  <text class="panel-tag" x="188" y="144" text-anchor="middle">PRODUIT UTILISATEUR</text>

  <!-- Titre -->
  <text class="panel-title" x="188" y="168" text-anchor="middle">Claude Code</text>

  <!-- Pictogramme terminal agrandi : rect + barre titre + >_ -->
  <rect x="118" y="176" width="140" height="96" rx="2" fill="none" stroke="#1e1e2a" stroke-width="1.5"/>
  <rect x="118" y="176" width="140" height="18" fill="#1e1e2a"/>
  <!-- 3 dots macOS-style dans la titlebar -->
  <circle cx="132" cy="185" r="3" fill="#a83e55" opacity="0.7"/>
  <circle cx="144" cy="185" r="3" fill="#b8582e" opacity="0.7"/>
  <circle cx="156" cy="185" r="3" fill="#6b6f7c" opacity="0.4"/>
  <text class="code" x="130" y="230" font-size="16" fill="#1e1e2a">&gt;_</text>
  <text class="code" x="152" y="230" font-size="13" fill="#6b6f7c">claude</text>
  <text class="code" x="130" y="252" font-size="11" fill="#9a9ca5">fix the bug</text>

  <!-- Commande mono -->
  <text class="code" x="188" y="300" text-anchor="middle" font-size="12">claude "fix the bug"</text>

  <!-- Flèche vers droite → HARNESS (horizontale, milieu panneau) -->
  <line class="arrow" x1="329" y1="348" x2="419" y2="348"/>

  <!-- Séparateur annotations -->
  <line class="rule" x1="64" y1="368" x2="312" y2="368"/>

  <!-- Annotations -->
  <text class="annot" x="188" y="390" text-anchor="middle">Terminal, IDE, Desktop, Web</text>
  <text class="annot" x="188" y="410" text-anchor="middle">Mode interactif + slash commands</text>
  <text class="annot" x="188" y="430" text-anchor="middle">Skills + CLAUDE.md + hooks locaux</text>

  <!-- Séparateur footer -->
  <line class="rule" x1="64" y1="452" x2="312" y2="452"/>

  <!-- Footer -->
  <text class="caption" x="188" y="474" text-anchor="middle">Surfaces : CLI, VS Code,</text>
  <text class="caption" x="188" y="490" text-anchor="middle">JetBrains, Desktop, Web</text>

  <!-- ── BLOC CENTRAL — HARNESS ── -->
  <!-- x=420, y=120, w=280, h=480 -->
  <rect x="420" y="120" width="280" height="480" fill="#2a2a30"/>

  <!-- Tag + sous-titre -->
  <text class="mono harness-text" x="560" y="148" text-anchor="middle" font-size="11" letter-spacing="0.18em">LE HARNESS</text>
  <text x="560" y="168" text-anchor="middle" font-family="'Fraunces',serif" font-size="13" font-style="italic" fill="#cdc8b8">ce qui est identique des deux côtés</text>

  <!-- Ligne séparatrice haute -->
  <line x1="436" y1="178" x2="684" y2="178" stroke="rgba(250,246,236,0.18)" stroke-width="1"/>

  <!-- Liste items — 9 éléments, y step=26, départ y=204 -->
  <text class="harness-text" x="560" y="204" text-anchor="middle" font-family="'Inter',sans-serif" font-size="13">Modèle Claude</text>
  <text class="harness-text" x="560" y="230" text-anchor="middle" font-family="'Inter',sans-serif" font-size="12">Tools (Read, Write, Edit, Bash…)</text>
  <text class="harness-text" x="560" y="256" text-anchor="middle" font-family="'Inter',sans-serif" font-size="12">Hooks (Pre/PostToolUse, Stop)</text>
  <text class="harness-text" x="560" y="282" text-anchor="middle" font-family="'Inter',sans-serif" font-size="13">Skills (.claude/skills/)</text>
  <text class="harness-text" x="560" y="308" text-anchor="middle" font-family="'Inter',sans-serif" font-size="13">Subagents (Agent tool)</text>
  <text class="harness-text" x="560" y="334" text-anchor="middle" font-family="'Inter',sans-serif" font-size="12">Memory (filesystem + CLAUDE.md)</text>
  <text class="harness-text" x="560" y="360" text-anchor="middle" font-family="'Inter',sans-serif" font-size="13">Permissions (allowed_tools)</text>
  <text class="harness-text" x="560" y="386" text-anchor="middle" font-family="'Inter',sans-serif" font-size="13">Sessions (resume, fork)</text>
  <text class="harness-text" x="560" y="412" text-anchor="middle" font-family="'Inter',sans-serif" font-size="13">Context compaction</text>

  <!-- Ligne séparatrice basse -->
  <line x1="436" y1="432" x2="684" y2="432" stroke="rgba(250,246,236,0.18)" stroke-width="1"/>

  <!-- Phrase italique en bas du HARNESS -->
  <text x="560" y="460" text-anchor="middle" font-family="'Fraunces',serif" font-size="13" font-style="italic" fill="#cdc8b8">le moteur ne change pas —</text>
  <text x="560" y="479" text-anchor="middle" font-family="'Fraunces',serif" font-size="13" font-style="italic" fill="#cdc8b8">l'enveloppe change</text>

  <!-- ── PANNEAU DROIT — Agent SDK ── -->
  <rect class="panel-bg" x="792" y="120" width="280" height="480" rx="2"/>

  <!-- Tags sur deux lignes -->
  <text class="panel-tag" x="932" y="140" text-anchor="middle">LIBRAIRIE POUR</text>
  <text class="panel-tag" x="932" y="154" text-anchor="middle">PRODUIT CUSTOM</text>

  <!-- Titre -->
  <text class="panel-title" x="932" y="178" text-anchor="middle">Agent SDK</text>

  <!-- Pictogramme code source — cadre + 3 lignes -->
  <rect x="884" y="188" width="96" height="54" rx="2" fill="none" stroke="#1e1e2a" stroke-width="1.5"/>
  <text class="code" x="892" y="207" font-size="11">&#x7B;&#x7D; run()</text>
  <text class="code" x="892" y="222" font-size="11">  .stream(</text>
  <text class="code" x="892" y="237" font-size="11">  )</text>

  <!-- Bloc code Python -->
  <rect x="808" y="254" width="248" height="86" rx="2" fill="#f0ece0" stroke="rgba(30,30,44,0.12)" stroke-width="1"/>
  <text class="code" x="820" y="273" font-size="11">async for msg in query(</text>
  <text class="code" x="820" y="289" font-size="11">  prompt="...",</text>
  <text class="code" x="820" y="305" font-size="11">  options=ClaudeAgentOptions(</text>
  <text class="code" x="820" y="321" font-size="11">    allowed_tools=["Bash"]))</text>

  <!-- Flèche vers gauche → HARNESS (horizontale) -->
  <line class="arrow" x1="791" y1="348" x2="703" y2="348"/>

  <!-- Séparateur annotations -->
  <line class="rule" x1="808" y1="368" x2="1056" y2="368"/>

  <!-- Annotations -->
  <text class="annot" x="932" y="390" text-anchor="middle">Python + TypeScript</text>
  <text class="annot" x="932" y="410" text-anchor="middle">Programmable, scriptable</text>
  <text class="annot" x="932" y="430" text-anchor="middle">Hooks programmatiques,</text>
  <text class="annot" x="932" y="448" text-anchor="middle">MCP, Bedrock/Vertex/Azure</text>

  <!-- Séparateur footer -->
  <line class="rule" x1="808" y1="468" x2="1056" y2="468"/>

  <!-- Footer -->
  <text class="caption" x="932" y="490" text-anchor="middle">Cibles : CI/CD, custom apps,</text>
  <text class="caption" x="932" y="506" text-anchor="middle">automation</text>

  <!-- ══════════════════════════════════════════════════════════════════
       FLÈCHES DE SORTIE — HARNESS → bas
       Le bas du HARNESS est à y=600.
       Un T inversé sort du centre bas, se divise vers gauche et droite,
       puis deux flèches descendent avec leurs annotations.
  ═══════════════════════════════════════════════════════════════════ -->

  <!-- Trait vertical depuis HARNESS bottom center vers y=620 -->
  <line class="arrow" x1="560" y1="601" x2="560" y2="619"/>

  <!-- Branche horizontale de y=625 de x=460 à x=660 -->
  <line x1="460" y1="625" x2="660" y2="625" stroke="#6b6f7c" stroke-width="1.5" fill="none"/>

  <!-- Flèche gauche vers bas depuis x=460, y=625 -->
  <line class="arrow" x1="460" y1="625" x2="460" y2="645"/>

  <!-- Flèche droite vers bas depuis x=660, y=625 -->
  <line class="arrow" x1="660" y1="625" x2="660" y2="645"/>

  <!-- Annotations sorties -->
  <text class="annot" x="460" y="666" text-anchor="middle">sortie terminal</text>
  <text class="annot" x="660" y="666" text-anchor="middle">stream JSON / fichiers / side effects</text>

  <!-- ══════════════════════════════════════════════════════════════════
       CITATION EN BAS
       y=688 → y+52=740, texte à y=706 et y=726
  ═══════════════════════════════════════════════════════════════════ -->
  <rect x="48" y="688" width="1024" height="40" rx="2" fill="none" stroke="#b8582e" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="560" y="713" text-anchor="middle" font-family="'Fraunces',serif" font-size="13" font-style="italic" fill="#6b6f7c">&#171;&#160;we kept rebuilding the same infrastructure over and over again&#160;&#187;</text>

</svg>
