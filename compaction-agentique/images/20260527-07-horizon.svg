<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-07">
  <title id="title-07">Horizon 2026-2028 : trois trajectoires, un point de convergence</title>
  <defs>
    <style>
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .traj-title{font:600 18px/1.2 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .body-label{font:500 14px/1.3 'Inter',sans-serif;fill:#1e1e2a}
      .annotation{font:400 12px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .mono-tag{font:500 10px/1 'JetBrains Mono',monospace;letter-spacing:0.10em;fill:#9a9ca5}
      .axis-label{font:500 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .frame{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .traj1{stroke:#b8582e;stroke-width:2.4;fill:none}
      .traj2{stroke:#a83e55;stroke-width:2.4;fill:none}
      .traj3{stroke:#1a5c6b;stroke-width:2.4;fill:none}
      .converge-dot{fill:#a83e55;stroke:#fbf3e5;stroke-width:2}
      .timeline-tick{stroke:rgba(30,30,44,0.30);stroke-width:1}
    </style>
    <marker id="ar07" markerWidth="9" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#a83e55" opacity="0.8"/>
    </marker>
    <marker id="ar07b" markerWidth="9" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#b8582e" opacity="0.8"/>
    </marker>
    <marker id="ar07c" markerWidth="9" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#1a5c6b" opacity="0.8"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 07</text>
  <text x="80" y="62" class="title">Horizon 2026–2028</text>
  <text x="80" y="92" class="subtitle">Trois trajectoires convergent vers un même horizon : la « réversibilité minimale » imposée par l'AI Act art. 25.</text>

  <!-- Cadre -->
  <rect x="80" y="130" width="1040" height="490" rx="6" class="frame"/>

  <!-- Timeline horizontale -->
  <line x1="140" y1="560" x2="1080" y2="560" stroke="rgba(30,30,44,0.30)" stroke-width="1.2"/>
  <line x1="140" y1="555" x2="140" y2="565" class="timeline-tick"/>
  <line x1="358" y1="555" x2="358" y2="565" class="timeline-tick"/>
  <line x1="610" y1="555" x2="610" y2="565" class="timeline-tick"/>
  <line x1="860" y1="555" x2="860" y2="565" class="timeline-tick"/>
  <line x1="1080" y1="555" x2="1080" y2="565" class="timeline-tick"/>

  <text x="140" y="585" class="axis-label">2026</text>
  <text x="358" y="585" class="axis-label">2026 H2</text>
  <text x="610" y="585" class="axis-label">2027</text>
  <text x="860" y="585" class="axis-label">2027 H2</text>
  <text x="1080" y="585" class="axis-label" text-anchor="end">2028</text>

  <!-- Trajectoire 1 : Compactors appris (haut) -->
  <g class="interactive" data-region="traj-learned">
    <text x="120" y="175" class="col-eyebrow">TRAJECTOIRE 1 · MODÈLES</text>
    <text x="120" y="200" class="traj-title">Compactors appris</text>
    <text x="120" y="222" class="annotation">RL sur qualité de trajectoire,</text>
    <text x="120" y="238" class="annotation">contraste, recurrent compression.</text>

    <!-- Courbe traj1 (orange) — départ haut-gauche, convergence vers droite-centre -->
    <path class="traj1" d="M 200 250 Q 350 260 500 290 Q 650 320 800 360 Q 900 390 950 420" marker-end="url(#ar07b)"/>

    <!-- Jalons -->
    <circle cx="358" cy="265" r="6" fill="#b8582e"/>
    <text x="358" y="285" class="annotation" text-anchor="middle" style="fill:#b8582e">Cohere Q3 2026</text>

    <circle cx="610" cy="310" r="6" fill="#b8582e"/>
    <text x="610" y="330" class="annotation" text-anchor="middle" style="fill:#b8582e">Anthropic CAI v3</text>
  </g>

  <!-- Trajectoire 2 : Multi-résolution (milieu) -->
  <g class="interactive" data-region="traj-multires">
    <text x="120" y="345" class="col-eyebrow">TRAJECTOIRE 2 · ARCHITECTURE</text>
    <text x="120" y="370" class="traj-title">Multi-résolution</text>
    <text x="120" y="392" class="annotation">Abstract court · recall</text>
    <text x="120" y="408" class="annotation">interrogeable · archive froid.</text>

    <path class="traj2" d="M 200 425 Q 350 425 500 425 Q 650 420 800 420 Q 900 420 950 420" marker-end="url(#ar07)"/>

    <circle cx="358" cy="425" r="6" fill="#a83e55"/>
    <text x="358" y="445" class="annotation" text-anchor="middle" style="fill:#a83e55">Letta v0.7 (tiers)</text>

    <circle cx="610" cy="423" r="6" fill="#a83e55"/>
    <text x="610" y="443" class="annotation" text-anchor="middle" style="fill:#a83e55">Mem0 multi-tier API</text>
  </g>

  <!-- Trajectoire 3 : Ledger transparent (bas) -->
  <g class="interactive" data-region="traj-ledger">
    <text x="120" y="475" class="col-eyebrow">TRAJECTOIRE 3 · OBSERVABILITÉ</text>
    <text x="120" y="500" class="traj-title">Ledger transparent</text>
    <text x="120" y="522" class="annotation">OTel GenAI semconv :</text>
    <text x="120" y="538" class="annotation">gen_ai.compaction.* attributes.</text>

    <path class="traj3" d="M 200 528 Q 350 510 500 480 Q 650 450 800 435 Q 900 425 950 420" marker-end="url(#ar07c)"/>

    <circle cx="358" cy="512" r="6" fill="#1a5c6b"/>
    <text x="358" y="495" class="annotation" text-anchor="middle" style="fill:#1a5c6b">OTel WG draft</text>

    <circle cx="610" cy="468" r="6" fill="#1a5c6b"/>
    <text x="610" y="495" class="annotation" text-anchor="middle" style="fill:#1a5c6b">premières conformités AI Act</text>
  </g>

  <!-- Point de convergence -->
  <g class="interactive" data-region="convergence-point">
    <circle cx="970" cy="420" r="20" class="converge-dot"/>
    <text x="970" y="425" style="font:600 13px Fraunces,serif;fill:#fbf3e5" text-anchor="middle">⊕</text>

    <text x="1000" y="385" class="col-eyebrow">CONVERGENCE</text>
    <text x="1000" y="410" class="traj-title">Réversibilité</text>
    <text x="1000" y="430" class="traj-title">minimale</text>
    <text x="1000" y="455" class="annotation">AI Act art. 25 transforme</text>
    <text x="1000" y="471" class="annotation">l'observabilité en obligation.</text>
    <text x="1000" y="490" class="annotation">Un déployeur doit pouvoir</text>
    <text x="1000" y="506" class="annotation">démontrer ce qu'il a oublié.</text>
  </g>

  <!-- Encart conclusion -->
  <g transform="translate(140,655)">
    <text x="0" y="0" class="annotation" style="font-style:italic">L'observabilité de la compaction passe du statut « nice-to-have » au statut « obligatoire » sous l'effet combiné de la réglementation et de la standardisation OpenTelemetry.</text>
  </g>

  <text x="80" y="700" class="caption">Sources : OpenTelemetry GenAI semconv working group ; AI Act art. 10 + art. 25 ; lignes directrices Conseil de l'Europe sur le machine unlearning 2025 ; annonces fournisseurs publiques 2025-2026.</text>
</svg>
