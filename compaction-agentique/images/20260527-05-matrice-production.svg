<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-05">
  <title id="title-05">Matrice production : 5 produits × 4 dimensions</title>
  <defs>
    <style>
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .header-cell{font:600 12px/1.2 'JetBrains Mono',monospace;letter-spacing:0.14em;fill:#1e1e2a;text-transform:uppercase}
      .product-name{font:600 16px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .product-sub{font:400 italic 12px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .cell-strong{font:600 14px/1.3 'Inter',sans-serif;fill:#1e1e2a}
      .cell-detail{font:400 12px/1.3 'Inter',sans-serif;fill:#6b6f7c}
      .mono-tag{font:500 10px/1 'JetBrains Mono',monospace;letter-spacing:0.10em;fill:#9a9ca5}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .row-frame{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .row-alt{fill:#fbf3e5;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .badge-low{fill:#1a5c6b;fill-opacity:0.20;stroke:#1a5c6b;stroke-width:1}
      .badge-mid{fill:#b8582e;fill-opacity:0.18;stroke:#b8582e;stroke-width:1}
      .badge-high{fill:#a83e55;fill-opacity:0.18;stroke:#a83e55;stroke-width:1}
      .badge-text{font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:0.06em}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 05</text>
  <text x="80" y="62" class="title">La compaction en production</text>
  <text x="80" y="92" class="subtitle">Cinq produits, quatre dimensions de comparaison. Les acteurs grand public privilégient la summarization ; les acteurs B2B privilégient le retrieval.</text>

  <!-- En-tête de tableau -->
  <g transform="translate(80,140)">
    <text x="20" y="20" class="header-cell">PRODUIT</text>
    <text x="270" y="20" class="header-cell">STRATÉGIE DOMINANTE</text>
    <text x="560" y="20" class="header-cell">TRIGGER</text>
    <text x="770" y="20" class="header-cell">LATENCE AJOUTÉE</text>
    <text x="970" y="20" class="header-cell">OUBLIABILITÉ</text>
    <line x1="0" y1="34" x2="1040" y2="34" stroke="#1e1e2a" stroke-width="1"/>
  </g>

  <!-- Row 1 : Claude Code -->
  <g class="interactive" data-region="prod-claude-code" transform="translate(80,190)">
    <rect x="0" y="0" width="1040" height="86" class="row-frame"/>
    <!-- Produit -->
    <text x="20" y="28" class="product-name">Claude Code</text>
    <text x="20" y="46" class="product-sub">Anthropic, harness CLI</text>
    <text x="20" y="68" class="mono-tag">harness fermé · auto-compact</text>

    <!-- Stratégie -->
    <text x="270" y="28" class="cell-strong">Summarization</text>
    <text x="270" y="46" class="cell-detail">/compact + auto-compact</text>
    <text x="270" y="62" class="cell-detail">Sonnet 3.5 compacte Sonnet 3.5</text>

    <!-- Trigger -->
    <text x="560" y="28" class="cell-strong">95 % fenêtre</text>
    <text x="560" y="46" class="cell-detail">ou commande manuelle</text>

    <!-- Latence -->
    <g transform="translate(770,16)">
      <rect x="0" y="0" width="80" height="22" rx="3" class="badge-mid"/>
      <text x="40" y="15" class="badge-text" text-anchor="middle" fill="#b8582e">2–8 s</text>
    </g>
    <text x="770" y="58" class="cell-detail">1 appel Sonnet par compaction</text>

    <!-- Oubliabilité -->
    <g transform="translate(970,16)">
      <rect x="0" y="0" width="60" height="22" rx="3" class="badge-high"/>
      <text x="30" y="15" class="badge-text" text-anchor="middle" fill="#a83e55">faible</text>
    </g>
    <text x="970" y="58" class="cell-detail">paraphrase = perte du lien</text>
  </g>

  <!-- Row 2 : Cursor -->
  <g transform="translate(80,290)">
    <rect x="0" y="0" width="1040" height="86" class="row-alt"/>
    <text x="20" y="28" class="product-name">Cursor / Aider / Cline</text>
    <text x="20" y="46" class="product-sub">IDE coding agents</text>
    <text x="20" y="68" class="mono-tag">harness IDE · rétention courte</text>

    <text x="270" y="28" class="cell-strong">Summarization +</text>
    <text x="270" y="46" class="cell-strong">rétention derniers tours</text>
    <text x="270" y="62" class="cell-detail">modèle plus petit (Haiku, mini)</text>

    <text x="560" y="28" class="cell-strong">~80 % fenêtre</text>
    <text x="560" y="46" class="cell-detail">seuil hard-codé</text>

    <g transform="translate(770,16)">
      <rect x="0" y="0" width="80" height="22" rx="3" class="badge-mid"/>
      <text x="40" y="15" class="badge-text" text-anchor="middle" fill="#b8582e">1–3 s</text>
    </g>
    <text x="770" y="58" class="cell-detail">modèle compacteur léger</text>

    <g transform="translate(970,16)">
      <rect x="0" y="0" width="60" height="22" rx="3" class="badge-high"/>
      <text x="30" y="15" class="badge-text" text-anchor="middle" fill="#a83e55">faible</text>
    </g>
    <text x="970" y="58" class="cell-detail">pas d'API d'oubli ciblé</text>
  </g>

  <!-- Row 3 : ChatGPT -->
  <g class="interactive" data-region="prod-chatgpt" transform="translate(80,390)">
    <rect x="0" y="0" width="1040" height="86" class="row-frame"/>
    <text x="20" y="28" class="product-name">ChatGPT Memory</text>
    <text x="20" y="46" class="product-sub">OpenAI, grand public</text>
    <text x="20" y="68" class="mono-tag">bio + chat history reference</text>

    <text x="270" y="28" class="cell-strong">Retrieval + summarization</text>
    <text x="270" y="46" class="cell-detail">vector store interne</text>
    <text x="270" y="62" class="cell-detail">bio résumé en continu</text>

    <text x="560" y="28" class="cell-strong">continu</text>
    <text x="560" y="46" class="cell-detail">chaque réponse</text>

    <g transform="translate(770,16)">
      <rect x="0" y="0" width="80" height="22" rx="3" class="badge-low"/>
      <text x="40" y="15" class="badge-text" text-anchor="middle" fill="#1a5c6b">&lt; 200 ms</text>
    </g>
    <text x="770" y="58" class="cell-detail">retrieval natif intégré</text>

    <g transform="translate(970,16)">
      <rect x="0" y="0" width="80" height="22" rx="3" class="badge-mid"/>
      <text x="40" y="15" class="badge-text" text-anchor="middle" fill="#b8582e">moyenne</text>
    </g>
    <text x="970" y="58" class="cell-detail">DELETE par fact, pas session</text>
  </g>

  <!-- Row 4 : Mem0 -->
  <g class="interactive" data-region="prod-mem0" transform="translate(80,490)">
    <rect x="0" y="0" width="1040" height="86" class="row-alt"/>
    <text x="20" y="28" class="product-name">Mem0 + LangGraph</text>
    <text x="20" y="46" class="product-sub">framework production B2B</text>
    <text x="20" y="68" class="mono-tag">benchmark LOCOMO</text>

    <text x="270" y="28" class="cell-strong">Retrieval ciblée +</text>
    <text x="270" y="46" class="cell-strong">eviction temporelle</text>
    <text x="270" y="62" class="cell-detail">−90 % tokens, −26 % latence</text>

    <text x="560" y="28" class="cell-strong">continu</text>
    <text x="560" y="46" class="cell-detail">par message ingéré</text>

    <g transform="translate(770,16)">
      <rect x="0" y="0" width="90" height="22" rx="3" class="badge-low"/>
      <text x="45" y="15" class="badge-text" text-anchor="middle" fill="#1a5c6b">50–150 ms</text>
    </g>
    <text x="770" y="58" class="cell-detail">retrieval vector DB</text>

    <g transform="translate(970,16)">
      <rect x="0" y="0" width="60" height="22" rx="3" class="badge-low"/>
      <text x="30" y="15" class="badge-text" text-anchor="middle" fill="#1a5c6b">élevée</text>
    </g>
    <text x="970" y="58" class="cell-detail">DELETE atomique par fact</text>
  </g>

  <!-- Row 5 : Letta -->
  <g transform="translate(80,590)">
    <rect x="0" y="0" width="1040" height="86" class="row-frame"/>
    <text x="20" y="28" class="product-name">Letta / MemGPT</text>
    <text x="20" y="46" class="product-sub">hiérarchique avec paging</text>
    <text x="20" y="68" class="mono-tag">OS-like memory tiers</text>

    <text x="270" y="28" class="cell-strong">Hiérarchique</text>
    <text x="270" y="46" class="cell-detail">main / recall / archive</text>
    <text x="270" y="62" class="cell-detail">modèle décide via outils</text>

    <text x="560" y="28" class="cell-strong">déclenché par modèle</text>
    <text x="560" y="46" class="cell-detail">via outils paging</text>

    <g transform="translate(770,16)">
      <rect x="0" y="0" width="100" height="22" rx="3" class="badge-mid"/>
      <text x="50" y="15" class="badge-text" text-anchor="middle" fill="#b8582e">0.5–2 s / paging</text>
    </g>
    <text x="770" y="58" class="cell-detail">par opération de paging</text>

    <g transform="translate(970,16)">
      <rect x="0" y="0" width="80" height="22" rx="3" class="badge-mid"/>
      <text x="40" y="15" class="badge-text" text-anchor="middle" fill="#b8582e">moyenne</text>
    </g>
    <text x="970" y="58" class="cell-detail">archive doit être nettoyée</text>
  </g>

  <text x="80" y="705" class="caption">Sources : Anthropic Claude Code docs ; OpenAI Memory blog 2025 ; Chhikara et al. 2025 (Mem0/LOCOMO) ; Packer et al. 2024 (MemGPT, CoLM) ; benchmarks production indépendants 2025-2026.</text>
</svg>
