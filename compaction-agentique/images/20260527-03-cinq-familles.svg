<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-03">
  <title id="title-03">Cinq familles de stratégies de compaction</title>
  <defs>
    <style>
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .col-title{font:600 18px/1.2 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .body-label{font:500 14px/1.3 'Inter',sans-serif;fill:#1e1e2a}
      .annotation{font:400 12px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .mono-tag{font:500 10px/1 'JetBrains Mono',monospace;letter-spacing:0.10em;fill:#9a9ca5}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .col-frame{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .accent-bar{fill:#b8582e}
      .accent-bar-2{fill:#a83e55}
      .accent-bar-3{fill:#1a5c6b}
      .ref-pill{fill:#fbf3e5;stroke:rgba(168,62,85,0.30);stroke-width:0.8}
    </style>
  </defs>

  <rect width="1200" height="760" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 03</text>
  <text x="80" y="62" class="title">Cinq familles, cinq stratégies</title</text>
  <text x="80" y="62" class="title">Cinq familles, cinq stratégies</text>
  <text x="80" y="92" class="subtitle">Chaque famille optimise un sommet du triangle fidélité × coût × oubli. Aucune n'est dominante en 2026.</text>

  <!-- 5 colonnes -->
  <!-- Col 1 : Summarization -->
  <g class="interactive" data-region="fam-summarization">
    <rect x="80" y="130" width="208" height="560" rx="6" class="col-frame"/>
    <rect x="80" y="130" width="208" height="6" class="accent-bar"/>
    <text x="100" y="170" class="col-eyebrow">FAMILLE 1</text>
    <text x="100" y="198" class="col-title">Summarization</text>
    <text x="100" y="218" class="col-title">LLM</text>

    <!-- Icone : doc qui devient résumé -->
    <g transform="translate(100,250)">
      <rect x="0" y="0" width="40" height="50" fill="none" stroke="#b8582e" stroke-width="1.4"/>
      <line x1="6" y1="12" x2="34" y2="12" stroke="#b8582e" stroke-width="1"/>
      <line x1="6" y1="22" x2="34" y2="22" stroke="#b8582e" stroke-width="1"/>
      <line x1="6" y1="32" x2="28" y2="32" stroke="#b8582e" stroke-width="1"/>
      <line x1="6" y1="42" x2="34" y2="42" stroke="#b8582e" stroke-width="1"/>
      <text x="55" y="32" style="font:600 16px Fraunces,serif;fill:#b8582e">→</text>
      <rect x="80" y="14" width="32" height="22" fill="#b8582e"/>
    </g>

    <text x="100" y="345" class="body-label">Un LLM lit le contexte</text>
    <text x="100" y="362" class="body-label">saturé et produit un</text>
    <text x="100" y="379" class="body-label">résumé qui le remplace.</text>

    <text x="100" y="420" class="mono-tag">RÉFÉRENCE</text>
    <g><rect x="100" y="428" width="170" height="22" rx="3" class="ref-pill"/>
       <text x="108" y="443" class="annotation">Claude Code /compact</text></g>
    <g><rect x="100" y="456" width="170" height="22" rx="3" class="ref-pill"/>
       <text x="108" y="471" class="annotation">Cursor · Aider · Cline</text></g>

    <text x="100" y="510" class="mono-tag">FIDÉLITÉ</text>
    <text x="100" y="530" class="body-label" style="fill:#b8582e">élevée (sémantique)</text>
    <text x="100" y="555" class="mono-tag">COÛT</text>
    <text x="100" y="575" class="body-label">moyen (1 appel LLM)</text>
    <text x="100" y="600" class="mono-tag">OUBLIABILITÉ</text>
    <text x="100" y="620" class="body-label" style="fill:#a83e55">faible (paraphrase)</text>

    <text x="100" y="660" class="annotation" style="font-style:italic">Lossy par construction.</text>
    <text x="100" y="677" class="annotation" style="font-style:italic">Vulnérable au poisoning.</text>
  </g>

  <!-- Col 2 : Eviction -->
  <g class="interactive" data-region="fam-eviction">
    <rect x="304" y="130" width="208" height="560" rx="6" class="col-frame"/>
    <rect x="304" y="130" width="208" height="6" class="accent-bar"/>
    <text x="324" y="170" class="col-eyebrow">FAMILLE 2</text>
    <text x="324" y="198" class="col-title">Eviction</text>
    <text x="324" y="218" class="col-title">attention-based</text>

    <!-- Icone : grille avec cases jetées -->
    <g transform="translate(324,250)">
      <rect x="0" y="0" width="20" height="20" fill="#b8582e"/>
      <rect x="24" y="0" width="20" height="20" fill="#fbf3e5" stroke="#b8582e" stroke-width="0.8"/>
      <rect x="48" y="0" width="20" height="20" fill="#b8582e"/>
      <rect x="72" y="0" width="20" height="20" fill="#fbf3e5" stroke="#b8582e" stroke-width="0.8"/>
      <rect x="0" y="24" width="20" height="20" fill="#fbf3e5" stroke="#b8582e" stroke-width="0.8"/>
      <rect x="24" y="24" width="20" height="20" fill="#b8582e"/>
      <rect x="48" y="24" width="20" height="20" fill="#fbf3e5" stroke="#b8582e" stroke-width="0.8"/>
      <rect x="72" y="24" width="20" height="20" fill="#b8582e"/>
    </g>

    <text x="324" y="345" class="body-label">Garder les tokens à</text>
    <text x="324" y="362" class="body-label">forte attention cumulée.</text>
    <text x="324" y="379" class="body-label">Jeter les autres.</text>

    <text x="324" y="420" class="mono-tag">RÉFÉRENCE</text>
    <g><rect x="324" y="428" width="170" height="22" rx="3" class="ref-pill"/>
       <text x="332" y="443" class="annotation">StreamingLLM (ICLR 24)</text></g>
    <g><rect x="324" y="456" width="170" height="22" rx="3" class="ref-pill"/>
       <text x="332" y="471" class="annotation">H2O (NeurIPS 23)</text></g>
    <g><rect x="324" y="484" width="170" height="22" rx="3" class="ref-pill"/>
       <text x="332" y="499" class="annotation">Quest (ICML 24)</text></g>

    <text x="324" y="535" class="mono-tag">FIDÉLITÉ</text>
    <text x="324" y="555" class="body-label">moyenne (stratifiée)</text>
    <text x="324" y="580" class="mono-tag">COÛT</text>
    <text x="324" y="600" class="body-label" style="fill:#b8582e">très faible</text>
    <text x="324" y="625" class="mono-tag">OUBLIABILITÉ</text>
    <text x="324" y="645" class="body-label" style="fill:#1a5c6b">élevée</text>

    <text x="324" y="677" class="annotation" style="font-style:italic">Au niveau KV-cache GPU.</text>
  </g>

  <!-- Col 3 : Hierarchical -->
  <g class="interactive" data-region="fam-hierarchical">
    <rect x="528" y="130" width="208" height="560" rx="6" class="col-frame"/>
    <rect x="528" y="130" width="208" height="6" class="accent-bar"/>
    <text x="548" y="170" class="col-eyebrow">FAMILLE 3</text>
    <text x="548" y="198" class="col-title">Hierarchical</text>
    <text x="548" y="218" class="col-title">avec paging</text>

    <!-- Icone : 3 niveaux empilés -->
    <g transform="translate(548,245)">
      <rect x="0" y="0" width="120" height="14" fill="#b8582e"/>
      <text x="60" y="11" style="font:500 9px Inter,sans-serif;fill:#faf6ec" text-anchor="middle">MAIN</text>
      <rect x="0" y="18" width="120" height="14" fill="rgba(184,88,46,0.55)"/>
      <text x="60" y="29" style="font:500 9px Inter,sans-serif;fill:#1e1e2a" text-anchor="middle">RECALL</text>
      <rect x="0" y="36" width="120" height="14" fill="rgba(184,88,46,0.20)" stroke="#b8582e" stroke-width="0.8"/>
      <text x="60" y="47" style="font:500 9px Inter,sans-serif;fill:#1e1e2a" text-anchor="middle">ARCHIVE</text>
    </g>

    <text x="548" y="335" class="body-label">Mémoire à plusieurs</text>
    <text x="548" y="352" class="body-label">niveaux. Le modèle</text>
    <text x="548" y="369" class="body-label">décide quoi pager.</text>

    <text x="548" y="410" class="mono-tag">RÉFÉRENCE</text>
    <g><rect x="548" y="418" width="170" height="22" rx="3" class="ref-pill"/>
       <text x="556" y="433" class="annotation">MemGPT (CoLM 24)</text></g>
    <g><rect x="548" y="446" width="170" height="22" rx="3" class="ref-pill"/>
       <text x="556" y="461" class="annotation">Letta (industrialisé)</text></g>

    <text x="548" y="510" class="mono-tag">FIDÉLITÉ</text>
    <text x="548" y="530" class="body-label" style="fill:#b8582e">élevée (rappel)</text>
    <text x="548" y="555" class="mono-tag">COÛT</text>
    <text x="548" y="575" class="body-label" style="fill:#a83e55">élevé (paging)</text>
    <text x="548" y="600" class="mono-tag">OUBLIABILITÉ</text>
    <text x="548" y="620" class="body-label">moyenne</text>

    <text x="548" y="660" class="annotation" style="font-style:italic">Auditable par design.</text>
    <text x="548" y="677" class="annotation" style="font-style:italic">Latence sur boucle agentique.</text>
  </g>

  <!-- Col 4 : Retrieval -->
  <g class="interactive" data-region="fam-retrieval">
    <rect x="752" y="130" width="208" height="560" rx="6" class="col-frame"/>
    <rect x="752" y="130" width="208" height="6" class="accent-bar"/>
    <text x="772" y="170" class="col-eyebrow">FAMILLE 4</text>
    <text x="772" y="198" class="col-title">Retrieval-</text>
    <text x="772" y="218" class="col-title">augmentée</text>

    <!-- Icone : box + store externe -->
    <g transform="translate(772,245)">
      <rect x="0" y="0" width="40" height="50" fill="none" stroke="#b8582e" stroke-width="1.2"/>
      <text x="20" y="30" style="font:500 11px JetBrains Mono,monospace;fill:#b8582e" text-anchor="middle">ctx</text>
      <line x1="44" y1="25" x2="68" y2="25" stroke="#b8582e" stroke-width="1.2"/>
      <ellipse cx="92" cy="25" rx="24" ry="14" fill="#fbf3e5" stroke="#b8582e" stroke-width="1.2"/>
      <text x="92" y="29" style="font:500 9px JetBrains Mono,monospace;fill:#b8582e" text-anchor="middle">store</text>
    </g>

    <text x="772" y="335" class="body-label">Externaliser dans un</text>
    <text x="772" y="352" class="body-label">vector DB ou knowledge</text>
    <text x="772" y="369" class="body-label">graph. Rappel par requête.</text>

    <text x="772" y="410" class="mono-tag">RÉFÉRENCE</text>
    <g><rect x="772" y="418" width="170" height="22" rx="3" class="ref-pill"/>
       <text x="780" y="433" class="annotation">Mem0 (LOCOMO)</text></g>
    <g><rect x="772" y="446" width="170" height="22" rx="3" class="ref-pill"/>
       <text x="780" y="461" class="annotation">Zep / Graphiti (temporal)</text></g>
    <g><rect x="772" y="474" width="170" height="22" rx="3" class="ref-pill"/>
       <text x="780" y="489" class="annotation">A-MEM (Zettelkasten)</text></g>

    <text x="772" y="535" class="mono-tag">FIDÉLITÉ</text>
    <text x="772" y="555" class="body-label">moyenne-élevée</text>
    <text x="772" y="580" class="mono-tag">COÛT</text>
    <text x="772" y="600" class="body-label" style="fill:#a83e55">élevé (infra)</text>
    <text x="772" y="625" class="mono-tag">OUBLIABILITÉ</text>
    <text x="772" y="645" class="body-label" style="fill:#1a5c6b">élevée (DELETE)</text>

    <text x="772" y="677" class="annotation" style="font-style:italic">RGPD-friendly par défaut.</text>
  </g>

  <!-- Col 5 : Learned -->
  <g class="interactive" data-region="fam-learned">
    <rect x="976" y="130" width="144" height="560" rx="6" class="col-frame"/>
    <rect x="976" y="130" width="144" height="6" class="accent-bar"/>
    <text x="996" y="170" class="col-eyebrow">FAMILLE 5</text>
    <text x="996" y="198" class="col-title">Compactors</text>
    <text x="996" y="218" class="col-title">appris</text>

    <!-- Icone : NN -->
    <g transform="translate(1000,245)">
      <circle cx="0" cy="0" r="6" fill="#b8582e"/>
      <circle cx="0" cy="20" r="6" fill="#b8582e"/>
      <circle cx="0" cy="40" r="6" fill="#b8582e"/>
      <circle cx="40" cy="10" r="6" fill="rgba(184,88,46,0.55)"/>
      <circle cx="40" cy="30" r="6" fill="rgba(184,88,46,0.55)"/>
      <circle cx="80" cy="20" r="6" fill="#a83e55"/>
      <line x1="6" y1="0" x2="34" y2="10" stroke="rgba(30,30,44,0.30)" stroke-width="0.7"/>
      <line x1="6" y1="0" x2="34" y2="30" stroke="rgba(30,30,44,0.30)" stroke-width="0.7"/>
      <line x1="6" y1="20" x2="34" y2="10" stroke="rgba(30,30,44,0.30)" stroke-width="0.7"/>
      <line x1="6" y1="20" x2="34" y2="30" stroke="rgba(30,30,44,0.30)" stroke-width="0.7"/>
      <line x1="6" y1="40" x2="34" y2="10" stroke="rgba(30,30,44,0.30)" stroke-width="0.7"/>
      <line x1="6" y1="40" x2="34" y2="30" stroke="rgba(30,30,44,0.30)" stroke-width="0.7"/>
      <line x1="46" y1="10" x2="74" y2="20" stroke="rgba(30,30,44,0.30)" stroke-width="0.7"/>
      <line x1="46" y1="30" x2="74" y2="20" stroke="rgba(30,30,44,0.30)" stroke-width="0.7"/>
    </g>

    <text x="996" y="335" class="body-label">Modèle dédié,</text>
    <text x="996" y="352" class="body-label">entraîné par RL.</text>

    <text x="996" y="410" class="mono-tag">EXPÉRIMENTAL</text>
    <g><rect x="996" y="418" width="110" height="22" rx="3" class="ref-pill"/>
       <text x="1004" y="433" class="annotation">Goldfish-loss</text></g>
    <g><rect x="996" y="446" width="110" height="22" rx="3" class="ref-pill"/>
       <text x="1004" y="461" class="annotation">RecurrentMem</text></g>

    <text x="996" y="510" class="mono-tag">2026-2027</text>
    <text x="996" y="535" class="body-label">À surveiller :</text>
    <text x="996" y="555" class="annotation">Anthropic CAI v3,</text>
    <text x="996" y="571" class="annotation">Cohere Q3 2026,</text>
    <text x="996" y="587" class="annotation">OpenAI (probable)</text>

    <text x="996" y="660" class="annotation" style="font-style:italic">Pas encore en</text>
    <text x="996" y="677" class="annotation" style="font-style:italic">production majeure.</text>
  </g>

  <text x="80" y="730" class="caption">Sources : Xiao et al. 2024 (StreamingLLM, ICLR) ; Zhang et al. 2023 (H2O, NeurIPS) ; Tang et al. 2024 (Quest, ICML) ; Packer et al. 2024 (MemGPT/Letta, CoLM) ; Chhikara et al. 2025 (Mem0) ; Rasmussen et al. 2025 (Zep) ; Xu et al. 2025 (A-MEM).</text>
</svg>
