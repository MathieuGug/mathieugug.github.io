<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-02">
  <title id="title-02">Anatomie de la compaction : contrat I/O et quatre rôles</title>
  <defs>
    <style>
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .body-label{font:500 15px/1.3 'Inter',sans-serif;fill:#1e1e2a}
      .body-strong{font:600 16px/1.3 'Inter',sans-serif;fill:#1e1e2a}
      .annotation{font:400 13px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .mono-tag{font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:0.08em;fill:#6b6f7c}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .frame{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .input-box{fill:#f3eedf;stroke:rgba(30,30,44,0.30);stroke-width:1.2}
      .compactor{fill:#b8582e;stroke:#7d3a1a;stroke-width:1.4}
      .output-box{fill:#fbf3e5;stroke:#b8582e;stroke-width:1.4}
      .ledger{fill:#1a5c6b;fill-opacity:0.10;stroke:#1a5c6b;stroke-width:1.4}
      .arrow{stroke:#1e1e2a;stroke-width:1.6;fill:none;opacity:0.55}
    </style>
    <marker id="ar02" markerWidth="9" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#1e1e2a" opacity="0.6"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 02</text>
  <text x="80" y="62" class="title">Anatomie de la compaction</text>
  <text x="80" y="92" class="subtitle">Le contrat I/O : un contexte saturé entre, un contexte tenable sort — accompagné d'un résumé, d'un journal et de pointeurs vers ce qu'on a jeté.</text>

  <!-- Inputs (gauche) -->
  <g>
    <text x="100" y="155" class="col-eyebrow">ENTRÉES</text>

    <g>
      <rect x="100" y="170" width="240" height="60" rx="4" class="input-box"/>
      <text x="118" y="194" class="body-strong">context_in</text>
      <text x="118" y="214" class="annotation">k tokens, n messages — saturé</text>
    </g>

    <g>
      <rect x="100" y="250" width="240" height="60" rx="4" class="input-box"/>
      <text x="118" y="274" class="body-strong">budget</text>
      <text x="118" y="294" class="annotation">tokens cible (typ. 0.5 × window)</text>
    </g>

    <g>
      <rect x="100" y="330" width="240" height="60" rx="4" class="input-box"/>
      <text x="118" y="354" class="body-strong">policy</text>
      <text x="118" y="374" class="annotation">trigger · retention · summarizer</text>
    </g>
  </g>

  <!-- Compactor (centre) -->
  <g class="interactive" data-region="compactor">
    <rect x="450" y="200" width="300" height="200" rx="8" class="compactor"/>
    <text x="600" y="245" class="col-eyebrow" text-anchor="middle" style="fill:#fbf3e5">COMPACTOR</text>
    <text x="600" y="285" class="body-strong" text-anchor="middle" style="fill:#fbf3e5;font-size:22px">compact ( ... )</text>
    <text x="600" y="320" class="annotation" text-anchor="middle" style="fill:#fbf3e5;opacity:0.85">summarization · eviction</text>
    <text x="600" y="340" class="annotation" text-anchor="middle" style="fill:#fbf3e5;opacity:0.85">hierarchical · retrieval</text>
    <text x="600" y="360" class="annotation" text-anchor="middle" style="fill:#fbf3e5;opacity:0.85">learned</text>
    <text x="600" y="385" class="mono-tag" text-anchor="middle" style="fill:#fbf3e5;opacity:0.7">policy-driven</text>
  </g>

  <!-- Ledger (au-dessus du compactor) -->
  <g class="interactive" data-region="ledger">
    <rect x="450" y="115" width="300" height="65" rx="4" class="ledger"/>
    <text x="600" y="140" class="col-eyebrow" text-anchor="middle" style="fill:#1a5c6b">LEDGER (journal cumulatif)</text>
    <text x="600" y="162" class="body-label" text-anchor="middle" style="fill:#1a5c6b">historique de toutes les compactions</text>
    <text x="600" y="176" class="annotation" text-anchor="middle">audit · replay · conformité AI Act art. 25</text>
  </g>
  <!-- Connecteur ledger -->
  <line x1="600" y1="180" x2="600" y2="195" class="arrow" stroke-dasharray="3 3" marker-end="url(#ar02)"/>

  <!-- Flèches entrée → compactor -->
  <line x1="340" y1="200" x2="445" y2="245" class="arrow" marker-end="url(#ar02)"/>
  <line x1="340" y1="280" x2="445" y2="295" class="arrow" marker-end="url(#ar02)"/>
  <line x1="340" y1="360" x2="445" y2="345" class="arrow" marker-end="url(#ar02)"/>

  <!-- Outputs (droite) -->
  <g>
    <text x="800" y="155" class="col-eyebrow">SORTIES</text>

    <g>
      <rect x="800" y="170" width="300" height="60" rx="4" class="output-box"/>
      <text x="818" y="194" class="body-strong">context_out</text>
      <text x="818" y="214" class="annotation">≤ budget tokens — passé au modèle suivant</text>
    </g>

    <g class="interactive" data-region="summary-blob">
      <rect x="800" y="250" width="300" height="60" rx="4" class="output-box"/>
      <text x="818" y="274" class="body-strong">summary_blob</text>
      <text x="818" y="294" class="annotation">résumé textuel (summarization seul)</text>
    </g>

    <g class="interactive" data-region="dropped-pointers">
      <rect x="800" y="330" width="300" height="60" rx="4" class="output-box"/>
      <text x="818" y="354" class="body-strong">dropped_pointers</text>
      <text x="818" y="374" class="annotation">vers vector DB / knowledge graph</text>
    </g>
  </g>

  <!-- Flèches compactor → sorties -->
  <line x1="755" y1="240" x2="795" y2="200" class="arrow" marker-end="url(#ar02)"/>
  <line x1="755" y1="300" x2="795" y2="280" class="arrow" marker-end="url(#ar02)"/>
  <line x1="755" y1="360" x2="795" y2="360" class="arrow" marker-end="url(#ar02)"/>

  <!-- Bandeau 4 rôles -->
  <text x="80" y="450" class="col-eyebrow">QUATRE RÔLES — UN SEUL COMPACTOR DOIT LES TENIR ENSEMBLE</text>

  <g transform="translate(80,470)">
    <rect x="0" y="0" width="240" height="130" rx="4" fill="#fbf3e5" stroke="rgba(168,62,85,0.30)"/>
    <text x="14" y="22" class="col-eyebrow">1 · COMPACTEUR</text>
    <text x="14" y="46" class="body-strong">Réducteur</text>
    <text x="14" y="68" class="annotation">décide quoi garder et quoi</text>
    <text x="14" y="84" class="annotation">remplacer, selon la policy</text>
    <text x="14" y="108" class="mono-tag">cœur du système</text>
  </g>

  <g transform="translate(340,470)">
    <rect x="0" y="0" width="240" height="130" rx="4" fill="#fbf3e5" stroke="rgba(168,62,85,0.30)"/>
    <text x="14" y="22" class="col-eyebrow">2 · LEDGER</text>
    <text x="14" y="46" class="body-strong">Journal auditable</text>
    <text x="14" y="68" class="annotation">qui a été supprimé, quand,</text>
    <text x="14" y="84" class="annotation">par quelle policy, vers quoi</text>
    <text x="14" y="108" class="mono-tag">obligation AI Act</text>
  </g>

  <g transform="translate(600,470)">
    <rect x="0" y="0" width="240" height="130" rx="4" fill="#fbf3e5" stroke="rgba(168,62,85,0.30)"/>
    <text x="14" y="22" class="col-eyebrow">3 · RETRIEVAL HANDLE</text>
    <text x="14" y="46" class="body-strong">Pointeurs</text>
    <text x="14" y="68" class="annotation">vers ce qui a été jeté</text>
    <text x="14" y="84" class="annotation">(vector DB, KG, archive)</text>
    <text x="14" y="108" class="mono-tag">rappel à la demande</text>
  </g>

  <g transform="translate(860,470)">
    <rect x="0" y="0" width="240" height="130" rx="4" fill="#fbf3e5" stroke="rgba(168,62,85,0.30)"/>
    <text x="14" y="22" class="col-eyebrow">4 · SECURITY WRAP</text>
    <text x="14" y="46" class="body-strong">Garde-fou</text>
    <text x="14" y="68" class="annotation">aucune injection ne doit être</text>
    <text x="14" y="84" class="annotation">promue au statut « système »</text>
    <text x="14" y="108" class="mono-tag">tagging source</text>
  </g>

  <text x="80" y="680" class="caption">Source : MemGPT/Letta v0.6 docs ; OpenTelemetry GenAI semconv WG 2026 — attributs candidats gen_ai.compaction.*</text>
</svg>
