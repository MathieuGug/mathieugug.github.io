<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-04">
  <title id="title-04">Le triangle fidélité × coût × oubliabilité</title>
  <defs>
    <style>
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .vertex-label{font:600 18px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .vertex-sub{font:400 italic 13px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .body-label{font:500 14px/1.3 'Inter',sans-serif;fill:#1e1e2a}
      .annotation{font:400 12px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .fam-label{font:600 13px/1.2 'Inter',sans-serif;fill:#1e1e2a}
      .mono-tag{font:500 10px/1 'JetBrains Mono',monospace;letter-spacing:0.10em;fill:#9a9ca5}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .frame{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .tri-edge{fill:none;stroke:#1e1e2a;stroke-width:1.6;opacity:0.7}
      .tri-fill{fill:#fbf3e5;fill-opacity:0.5}
      .grid-line{stroke:rgba(30,30,44,0.10);stroke-width:0.7;fill:none}
      .vertex-dot{fill:#a83e55}
    </style>
  </defs>

  <rect width="1200" height="760" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 04</text>
  <text x="80" y="62" class="title">Le triangle fidélité × coût × oubliabilité</text>
  <text x="80" y="92" class="subtitle">Trois axes en tension irréductible. Aucune équipe en 2026 ne peut viser les trois sommets simultanément. On choisit lequel sacrifier.</text>

  <!-- Cadre principal -->
  <rect x="80" y="130" width="1040" height="580" rx="6" class="frame"/>

  <!-- Triangle équilatéral, centré -->
  <!-- Top vertex (Fidélité): (440, 200) ; Bottom-left (Coût bas): (220, 600) ; Bottom-right (Oubliabilité haute): (660, 600) -->
  <polygon class="tri-fill" points="440,200 220,600 660,600"/>
  <line class="tri-edge" x1="440" y1="200" x2="220" y2="600"/>
  <line class="tri-edge" x1="220" y1="600" x2="660" y2="600"/>
  <line class="tri-edge" x1="660" y1="600" x2="440" y2="200"/>

  <!-- Lignes de grille (iso-lignes) -->
  <line x1="330" y1="400" x2="550" y2="400" class="grid-line"/>
  <line x1="385" y1="300" x2="605" y2="300" class="grid-line"/>
  <line x1="275" y1="500" x2="495" y2="500" class="grid-line"/>

  <!-- Vertex 1 : Fidélité (top) -->
  <g class="interactive" data-region="vertex-fidelite">
    <circle cx="440" cy="200" r="9" class="vertex-dot"/>
    <text x="440" y="170" class="vertex-label" text-anchor="middle">FIDÉLITÉ</text>
    <text x="440" y="187" class="vertex-sub" text-anchor="middle">information préservée et récupérable</text>
  </g>

  <!-- Vertex 2 : Coût bas (bottom-left) -->
  <g class="interactive" data-region="vertex-cout">
    <circle cx="220" cy="600" r="9" class="vertex-dot"/>
    <text x="220" y="635" class="vertex-label" text-anchor="middle">COÛT BAS</text>
    <text x="220" y="652" class="vertex-sub" text-anchor="middle">tokens + latence + GPU minimaux</text>
  </g>

  <!-- Vertex 3 : Oubliabilité (bottom-right) -->
  <g class="interactive" data-region="vertex-oubli">
    <circle cx="660" cy="600" r="9" class="vertex-dot"/>
    <text x="660" y="635" class="vertex-label" text-anchor="middle">OUBLIABILITÉ</text>
    <text x="660" y="652" class="vertex-sub" text-anchor="middle">suppression prouvable (RGPD, AI Act)</text>
  </g>

  <!-- Positions des 5 familles -->
  <!-- Summarization : haute fidélité, coût moyen, oubli faible → près de top, légèrement gauche -->
  <g class="interactive" data-region="point-summarization">
    <circle cx="395" cy="290" r="14" fill="#b8582e" stroke="#fbf3e5" stroke-width="2"/>
    <text x="395" y="295" class="fam-label" text-anchor="middle" fill="#fbf3e5">1</text>
    <text x="370" y="265" class="fam-label" text-anchor="end">Summarization</text>
  </g>

  <!-- Eviction : milieu-fidélité moyen, coût TRÈS faible, oubli élevé → vers bottom (entre coût bas et oubli) -->
  <g>
    <circle cx="395" cy="530" r="14" fill="#a83e55" stroke="#fbf3e5" stroke-width="2"/>
    <text x="395" y="535" class="fam-label" text-anchor="middle" fill="#fbf3e5">2</text>
    <text x="395" y="565" class="fam-label" text-anchor="middle">Eviction</text>
  </g>

  <!-- Hierarchical : haute fidélité, coût élevé, oubli moyen → près de top mais vers gauche-haut (coût élevé = loin du sommet coût bas) -->
  <g>
    <circle cx="450" cy="310" r="14" fill="#1a5c6b" stroke="#fbf3e5" stroke-width="2"/>
    <text x="450" y="315" class="fam-label" text-anchor="middle" fill="#fbf3e5">3</text>
    <text x="475" y="305" class="fam-label">Hierarchical</text>
  </g>

  <!-- Retrieval : fidélité moyenne, coût élevé, oubliabilité élevée → vers bord droit (oubli haut), pas trop bas -->
  <g class="interactive" data-region="point-retrieval">
    <circle cx="520" cy="430" r="14" fill="#1a5c6b" stroke="#fbf3e5" stroke-width="2"/>
    <text x="520" y="435" class="fam-label" text-anchor="middle" fill="#fbf3e5">4</text>
    <text x="540" y="435" class="fam-label">Retrieval</text>
  </g>

  <!-- Learned : profil flou, près du centre, en pointillé -->
  <g>
    <circle cx="440" cy="420" r="14" fill="#9a9ca5" fill-opacity="0.6" stroke="#fbf3e5" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="440" y="425" class="fam-label" text-anchor="middle" fill="#fbf3e5">5</text>
    <text x="415" y="395" class="fam-label" text-anchor="end" style="fill:#6b6f7c">Learned ?</text>
  </g>

  <!-- Panneau de droite : explication détaillée -->
  <g transform="translate(740,160)">
    <text x="0" y="0" class="col-eyebrow">LECTURE DU TRIANGLE</text>

    <text x="0" y="36" class="body-label" style="font-weight:600">Plus on est près d'un sommet,</text>
    <text x="0" y="54" class="body-label" style="font-weight:600">plus on optimise cet axe.</text>
    <text x="0" y="76" class="annotation">Le centre = compromis flou.</text>
    <text x="0" y="92" class="annotation">Les bords = sacrifice du sommet opposé.</text>

    <!-- Légende familles -->
    <g transform="translate(0,130)">
      <circle cx="10" cy="10" r="9" fill="#b8582e"/>
      <text x="10" y="14" class="fam-label" text-anchor="middle" fill="#fbf3e5">1</text>
      <text x="32" y="14" class="body-label">Summarization (haute fidélité,</text>
      <text x="32" y="30" class="annotation">faible oubliabilité)</text>
    </g>

    <g transform="translate(0,180)">
      <circle cx="10" cy="10" r="9" fill="#a83e55"/>
      <text x="10" y="14" class="fam-label" text-anchor="middle" fill="#fbf3e5">2</text>
      <text x="32" y="14" class="body-label">Eviction (très faible coût,</text>
      <text x="32" y="30" class="annotation">forte oubliabilité)</text>
    </g>

    <g transform="translate(0,230)">
      <circle cx="10" cy="10" r="9" fill="#1a5c6b"/>
      <text x="10" y="14" class="fam-label" text-anchor="middle" fill="#fbf3e5">3</text>
      <text x="32" y="14" class="body-label">Hierarchical (haute fidélité,</text>
      <text x="32" y="30" class="annotation">coût élevé)</text>
    </g>

    <g transform="translate(0,280)">
      <circle cx="10" cy="10" r="9" fill="#1a5c6b"/>
      <text x="10" y="14" class="fam-label" text-anchor="middle" fill="#fbf3e5">4</text>
      <text x="32" y="14" class="body-label">Retrieval (oubliabilité élevée,</text>
      <text x="32" y="30" class="annotation">infra coûteuse)</text>
    </g>

    <g transform="translate(0,330)">
      <circle cx="10" cy="10" r="9" fill="#9a9ca5" stroke-dasharray="3 2"/>
      <text x="10" y="14" class="fam-label" text-anchor="middle" fill="#fbf3e5">5</text>
      <text x="32" y="14" class="body-label">Learned (profil non stable —</text>
      <text x="32" y="30" class="annotation">recherche 2026-2027)</text>
    </g>

    <g transform="translate(0,400)">
      <rect x="0" y="0" width="340" height="100" rx="4" fill="#fbf3e5" stroke="rgba(168,62,85,0.30)"/>
      <text x="14" y="22" class="col-eyebrow">CONSÉQUENCE OPÉRATIONNELLE</text>
      <text x="14" y="46" class="body-label">B2C grand volume → summarization</text>
      <text x="14" y="62" class="body-label">B2B avec SLA audit → retrieval</text>
      <text x="14" y="78" class="body-label">Streaming serveur → eviction</text>
      <text x="14" y="94" class="annotation">Le mix selon scope est la norme 2026.</text>
    </g>
  </g>

  <text x="80" y="745" class="caption">Position relative — pas de métrique unifiée existante. Triangle ternaire conceptuel, calibré qualitativement sur les retours d'expérience Mem0, Letta, Anthropic 2025-2026.</text>
</svg>
