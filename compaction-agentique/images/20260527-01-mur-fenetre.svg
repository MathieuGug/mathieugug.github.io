<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-01">
  <title id="title-01">Le mur de la fenêtre : pourquoi 1 M tokens ne suffit pas</title>
  <defs>
    <style>
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .body-label{font:500 15px/1.3 'Inter',sans-serif;fill:#1e1e2a}
      .annotation{font:400 13px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .tick{font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:0.08em;fill:#9a9ca5}
      .axis-label{font:500 11px/1.2 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#6b6f7c}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .frame{fill:#fdfaf0;stroke:rgba(30,30,44,0.18);stroke-width:1.2}
      .axis{stroke:rgba(30,30,44,0.45);stroke-width:1.2;fill:none}
      .grid{stroke:rgba(30,30,44,0.08);stroke-width:0.7;fill:none}
      .u-curve{fill:none;stroke:#a83e55;stroke-width:2.6}
      .cost-curve{fill:none;stroke:#b8582e;stroke-width:2.4;stroke-dasharray:6 4}
      .zone-perdue{fill:#a83e55;fill-opacity:0.08;stroke:#a83e55;stroke-width:1;stroke-dasharray:3 3}
    </style>
    <marker id="ar01" markerWidth="9" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="rgba(30,30,44,0.55)"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 01</text>
  <text x="80" y="62" class="title">Le mur de la fenêtre</text>
  <text x="80" y="92" class="subtitle">La fenêtre s'agrandit, mais la performance s'effondre au milieu — et le coût explose. Pourquoi 1 M tokens ne résout pas le problème.</text>

  <!-- Cadre principal -->
  <rect x="80" y="130" width="1040" height="520" rx="6" class="frame"/>

  <!-- Axes du graphe principal -->
  <!-- Axe Y gauche : performance (0-100%) -->
  <line x1="160" y1="180" x2="160" y2="580" class="axis"/>
  <text x="100" y="380" class="axis-label" transform="rotate(-90 100 380)">PERFORMANCE QA (%)</text>
  <text x="148" y="186" class="tick" text-anchor="end">100</text>
  <text x="148" y="286" class="tick" text-anchor="end">75</text>
  <text x="148" y="386" class="tick" text-anchor="end">50</text>
  <text x="148" y="486" class="tick" text-anchor="end">25</text>
  <text x="148" y="582" class="tick" text-anchor="end">0</text>

  <!-- Axe X : position dans le contexte -->
  <line x1="160" y1="580" x2="1080" y2="580" class="axis" marker-end="url(#ar01)"/>
  <text x="620" y="615" class="axis-label" text-anchor="middle">POSITION DE L'INFORMATION DANS LE CONTEXTE</text>
  <text x="180" y="600" class="tick">début</text>
  <text x="620" y="600" class="tick" text-anchor="middle">milieu</text>
  <text x="1060" y="600" class="tick" text-anchor="end">fin</text>

  <!-- Axe Y droite : coût $$ -->
  <line x1="1080" y1="180" x2="1080" y2="580" class="axis"/>
  <text x="1140" y="380" class="axis-label" transform="rotate(90 1140 380)">COÛT / LATENCE ($)</text>
  <text x="1095" y="186" class="tick">10×</text>
  <text x="1095" y="386" class="tick">5×</text>
  <text x="1095" y="582" class="tick">1×</text>

  <!-- Grille -->
  <line x1="160" y1="280" x2="1080" y2="280" class="grid"/>
  <line x1="160" y1="380" x2="1080" y2="380" class="grid"/>
  <line x1="160" y1="480" x2="1080" y2="480" class="grid"/>

  <!-- Zone perdue (milieu) -->
  <g class="interactive" data-region="zone-perdue">
    <rect x="430" y="180" width="380" height="400" class="zone-perdue"/>
    <text x="620" y="220" class="col-eyebrow" text-anchor="middle">ZONE PERDUE</text>
    <text x="620" y="246" class="body-label" text-anchor="middle">−20 pts de précision</text>
    <text x="620" y="266" class="annotation" text-anchor="middle">même à 50 % de la limite annoncée</text>
  </g>

  <!-- Courbe en U (Lost in the Middle) -->
  <g class="interactive" data-region="u-curve-left">
    <path class="u-curve" d="M 180 230 Q 250 240 320 280 Q 380 330 430 410"/>
  </g>
  <g class="interactive" data-region="u-curve-right">
    <path class="u-curve" d="M 810 410 Q 870 330 940 280 Q 1010 240 1060 220"/>
  </g>
  <!-- Connecteur milieu (zone basse) -->
  <path class="u-curve" d="M 430 410 Q 500 480 620 495 Q 750 480 810 410" opacity="0.85"/>

  <!-- Points de mesure -->
  <circle cx="200" cy="232" r="5" fill="#a83e55"/>
  <circle cx="620" cy="498" r="5" fill="#a83e55"/>
  <circle cx="1040" cy="225" r="5" fill="#a83e55"/>

  <!-- Annotations sur la courbe -->
  <text x="200" y="210" class="annotation" fill="#a83e55">~88 %</text>
  <text x="620" y="525" class="annotation" fill="#a83e55" text-anchor="middle">~62 %</text>
  <text x="1040" y="208" class="annotation" fill="#a83e55" text-anchor="end">~87 %</text>

  <!-- Courbe de coût (overlay) -->
  <g class="interactive" data-region="cost-overlay">
    <path class="cost-curve" d="M 180 565 Q 400 530 600 470 Q 800 380 1060 215"/>
  </g>

  <!-- Labels sur courbes -->
  <text x="300" y="218" class="body-label" fill="#a83e55">Performance QA</text>
  <text x="300" y="236" class="annotation" fill="#a83e55">Liu et al. 2024 [TACL]</text>

  <text x="930" y="305" class="body-label" fill="#b8582e">Coût $$ / trajectoire</text>
  <text x="930" y="323" class="annotation" fill="#b8582e">quadratique en pratique</text>

  <!-- Légende boîte gauche : 4 cadrans interactifs -->
  <g transform="translate(180,650)">
    <rect x="0" y="0" width="200" height="90" rx="4" fill="#fbf3e5" stroke="rgba(168,62,85,0.30)" stroke-width="1"/>
    <text x="14" y="22" class="col-eyebrow">DÉBUT DE FENÊTRE</text>
    <text x="14" y="44" class="body-label">Information bien lue</text>
    <text x="14" y="62" class="annotation">attention sink primé</text>
    <text x="14" y="78" class="annotation">(StreamingLLM, Xiao 2024)</text>
  </g>

  <g transform="translate(400,650)">
    <rect x="0" y="0" width="200" height="90" rx="4" fill="#fbf3e5" stroke="rgba(168,62,85,0.30)" stroke-width="1"/>
    <text x="14" y="22" class="col-eyebrow">MILIEU</text>
    <text x="14" y="44" class="body-label">Information perdue</text>
    <text x="14" y="62" class="annotation">−20 pts sur QA</text>
    <text x="14" y="78" class="annotation">même à 50 % de la fenêtre</text>
  </g>

  <g transform="translate(620,650)">
    <rect x="0" y="0" width="200" height="90" rx="4" fill="#fbf3e5" stroke="rgba(168,62,85,0.30)" stroke-width="1"/>
    <text x="14" y="22" class="col-eyebrow">FIN DE FENÊTRE</text>
    <text x="14" y="44" class="body-label">Information bien lue</text>
    <text x="14" y="62" class="annotation">récence et causal mask</text>
    <text x="14" y="78" class="annotation">favorisent les derniers tours</text>
  </g>

  <g transform="translate(840,650)">
    <rect x="0" y="0" width="240" height="90" rx="4" fill="#fbf3e5" stroke="rgba(184,88,46,0.40)" stroke-width="1"/>
    <text x="14" y="22" class="col-eyebrow" style="fill:#b8582e">COÛT EN PRODUCTION</text>
    <text x="14" y="44" class="body-label">2-3× au-delà de 200 k</text>
    <text x="14" y="62" class="annotation">+ TTFT 5-15 s à 500 k tokens</text>
    <text x="14" y="78" class="annotation">+ KV-cache 80 Gio / requête</text>
  </g>

  <text x="80" y="745" class="caption">Source : Liu et al. 2024, &#171;Lost in the Middle&#187;, TACL ; Anthropic / vLLM benchmarks production 2025-2026.</text>
</svg>
