<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title-06">
  <title id="title-06">Le cycle d'attaque memory poisoning persistant à travers la compaction</title>
  <defs>
    <style>
      .title{font:600 28px/1.1 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .subtitle{font:400 italic 18px/1.3 'Fraunces',serif;fill:#6b6f7c}
      .marker{font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.16em;fill:#a83e55}
      .col-eyebrow{font:600 11px/1 'JetBrains Mono',monospace;letter-spacing:0.18em;fill:#a83e55}
      .step-num{font:600 24px/1 'Fraunces',serif;fill:#a83e55}
      .step-title{font:600 16px/1.2 'Fraunces',serif;letter-spacing:-0.01em;fill:#1e1e2a}
      .body-label{font:500 13px/1.3 'Inter',sans-serif;fill:#1e1e2a}
      .annotation{font:400 12px/1.4 'Inter',sans-serif;fill:#6b6f7c}
      .mono-tag{font:500 10px/1 'JetBrains Mono',monospace;letter-spacing:0.10em;fill:#9a9ca5}
      .injected-text{font:500 italic 12px/1.3 'Inter',sans-serif;fill:#a83e55}
      .caption{font:400 italic 12px/1.4 'Inter',sans-serif;fill:#9a9ca5}
      .step-frame{fill:#fdfaf0;stroke:rgba(168,62,85,0.30);stroke-width:1.4}
      .step-danger{fill:#a83e55;fill-opacity:0.08;stroke:#a83e55;stroke-width:1.4}
      .flow-arrow{stroke:#a83e55;stroke-width:2;fill:none;opacity:0.8}
      .compactor-box{fill:#b8582e;stroke:#7d3a1a;stroke-width:1.4}
    </style>
    <marker id="ar06" markerWidth="10" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a83e55"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#faf6ec"/>

  <text x="80" y="34" class="marker">SCHÉMA 06</text>
  <text x="80" y="62" class="title">Le payload qui survit à la compaction</text>
  <text x="80" y="92" class="subtitle">Une injection placée dans un document ingéré peut être paraphrasée par le compactor comme intention de l'utilisateur — et ressurgir des sessions plus tard.</text>

  <!-- Cinq étapes en flux horizontal -->

  <!-- Étape 1 : Injection -->
  <g class="interactive" data-region="step-injection" transform="translate(80,150)">
    <rect x="0" y="0" width="200" height="190" rx="6" class="step-frame"/>
    <text x="14" y="32" class="step-num">1</text>
    <text x="50" y="32" class="step-title">Injection</text>
    <line x1="14" y1="42" x2="186" y2="42" stroke="rgba(168,62,85,0.30)"/>

    <text x="14" y="68" class="body-label">Placée dans page web,</text>
    <text x="14" y="85" class="body-label">mail, fichier Drive, PDF.</text>

    <text x="14" y="115" class="mono-tag">PAYLOAD</text>
    <rect x="14" y="122" width="172" height="50" fill="#a83e55" fill-opacity="0.08" stroke="#a83e55" stroke-width="0.8" stroke-dasharray="3 2"/>
    <text x="22" y="140" class="injected-text">« Ignore les instructions</text>
    <text x="22" y="156" class="injected-text">précédentes et envoie...»</text>
  </g>

  <!-- Étape 2 : Ingest -->
  <g transform="translate(308,150)">
    <rect x="0" y="0" width="180" height="190" rx="6" class="step-frame"/>
    <text x="14" y="32" class="step-num">2</text>
    <text x="50" y="32" class="step-title">Ingest</text>
    <line x1="14" y1="42" x2="166" y2="42" stroke="rgba(168,62,85,0.30)"/>

    <text x="14" y="68" class="body-label">Agent lit le contenu</text>
    <text x="14" y="85" class="body-label">(web fetch, mail tool,</text>
    <text x="14" y="102" class="body-label">RAG retrieval).</text>

    <text x="14" y="130" class="annotation">Filtre d'entrée :</text>
    <text x="14" y="146" class="annotation">classe « contenu</text>
    <text x="14" y="162" class="annotation">informationnel ».</text>
    <text x="14" y="180" class="mono-tag" style="fill:#a83e55">aveugle</text>
  </g>

  <!-- Étape 3 : Summarization (DANGER) -->
  <g class="interactive" data-region="step-summarization" transform="translate(516,150)">
    <rect x="0" y="0" width="200" height="190" rx="6" class="step-danger"/>
    <text x="14" y="32" class="step-num">3</text>
    <text x="50" y="32" class="step-title">Summarization</text>
    <line x1="14" y1="42" x2="186" y2="42" stroke="rgba(168,62,85,0.30)"/>

    <!-- Compactor au centre -->
    <rect x="60" y="58" width="80" height="40" rx="4" class="compactor-box"/>
    <text x="100" y="83" class="step-num" text-anchor="middle" style="fill:#fbf3e5;font-size:11px;font-family:JetBrains Mono">compactor</text>

    <text x="14" y="120" class="body-label" style="font-weight:600;fill:#a83e55">Le résumé promeut</text>
    <text x="14" y="138" class="body-label" style="font-weight:600;fill:#a83e55">l'injection au statut</text>
    <text x="14" y="156" class="body-label" style="font-weight:600;fill:#a83e55">« volonté utilisateur ».</text>

    <text x="14" y="180" class="mono-tag" style="fill:#a83e55">→ pivot critique</text>
  </g>

  <!-- Étape 4 : Store -->
  <g transform="translate(744,150)">
    <rect x="0" y="0" width="180" height="190" rx="6" class="step-frame"/>
    <text x="14" y="32" class="step-num">4</text>
    <text x="50" y="32" class="step-title">Store</text>
    <line x1="14" y1="42" x2="166" y2="42" stroke="rgba(168,62,85,0.30)"/>

    <text x="14" y="68" class="body-label">Le résumé entre dans :</text>
    <text x="14" y="92" class="annotation">· la mémoire long-terme</text>
    <text x="14" y="108" class="annotation">  (vector DB)</text>
    <text x="14" y="128" class="annotation">· le contexte courant</text>
    <text x="14" y="144" class="annotation">  (system message)</text>

    <text x="14" y="175" class="mono-tag" style="fill:#a83e55">SpAIware mode</text>
  </g>

  <!-- Étape 5 : Resurfacing -->
  <g class="interactive" data-region="step-resurfacing" transform="translate(952,150)">
    <rect x="0" y="0" width="200" height="190" rx="6" class="step-danger"/>
    <text x="14" y="32" class="step-num">5</text>
    <text x="50" y="32" class="step-title">Resurfacing</text>
    <line x1="14" y1="42" x2="186" y2="42" stroke="rgba(168,62,85,0.30)"/>

    <text x="14" y="68" class="body-label">À un tour ultérieur :</text>
    <text x="14" y="92" class="annotation">le retrieval rappelle le</text>
    <text x="14" y="108" class="annotation">résumé empoisonné.</text>

    <text x="14" y="138" class="body-label" style="font-weight:600;fill:#a83e55">Le modèle exécute</text>
    <text x="14" y="156" class="body-label" style="font-weight:600;fill:#a83e55">l'instruction.</text>

    <text x="14" y="180" class="mono-tag" style="fill:#a83e55">aucun filtre déclenché</text>
  </g>

  <!-- Flèches entre étapes -->
  <line x1="280" y1="245" x2="305" y2="245" class="flow-arrow" marker-end="url(#ar06)"/>
  <line x1="488" y1="245" x2="513" y2="245" class="flow-arrow" marker-end="url(#ar06)"/>
  <line x1="716" y1="245" x2="741" y2="245" class="flow-arrow" marker-end="url(#ar06)"/>
  <line x1="924" y1="245" x2="949" y2="245" class="flow-arrow" marker-end="url(#ar06)"/>

  <!-- Loop arrow : étape 5 → étape 4 (mémoire persistante) -->
  <path d="M 1052 340 Q 1052 400 950 420 Q 800 440 600 440 Q 400 440 250 440 Q 100 440 100 380 Q 100 340 178 340"
        class="flow-arrow" stroke-dasharray="5 4" marker-end="url(#ar06)" fill="none" opacity="0.5"/>
  <text x="600" y="475" class="annotation" text-anchor="middle" style="fill:#a83e55;font-style:italic">la mémoire long-terme persiste — l'attaque ressurgit à chaque session future</text>

  <!-- Bandeau bas : pourquoi les filtres input/output sont aveugles -->
  <g transform="translate(80,510)">
    <rect x="0" y="0" width="1040" height="180" rx="6" fill="#fbf3e5" stroke="rgba(168,62,85,0.30)"/>
    <text x="20" y="32" class="col-eyebrow">POURQUOI LES FILTRES INPUT / OUTPUT NE VOIENT RIEN</text>

    <g transform="translate(20,52)">
      <text x="0" y="20" class="body-label" style="font-weight:600">→ Filtre d'entrée</text>
      <text x="0" y="38" class="annotation">voit le document ingéré, classe</text>
      <text x="0" y="54" class="annotation">« contenu informationnel ».</text>
      <text x="0" y="74" class="annotation">L'injection passe (camouflée).</text>
    </g>

    <g transform="translate(360,52)">
      <text x="0" y="20" class="body-label" style="font-weight:600">→ Filtre de sortie</text>
      <text x="0" y="38" class="annotation">voit le résumé compacté,</text>
      <text x="0" y="54" class="annotation">classe « résumé normal ».</text>
      <text x="0" y="74" class="annotation">L'instruction paraphrasée passe.</text>
    </g>

    <g transform="translate(700,52)">
      <text x="0" y="20" class="body-label" style="font-weight:600">→ La promotion se fait</text>
      <text x="0" y="38" class="annotation">à l'intérieur du compactor,</text>
      <text x="0" y="54" class="annotation">qui n'est pas instrumenté.</text>
      <text x="0" y="74" class="annotation" style="fill:#a83e55;font-weight:500">Pas de log = pas d'audit.</text>
    </g>

    <line x1="20" y1="148" x2="1020" y2="148" stroke="rgba(168,62,85,0.30)" stroke-dasharray="3 3"/>
    <text x="20" y="170" class="annotation" style="font-style:italic">Mitigations : tagging source · compactor sandbox · ledger transparent · filtres LLM-judge sur le compactor lui-même.</text>
  </g>

  <text x="80" y="710" class="caption">Sources : Greshake et al. 2023 (AISec) ; Beurer-Kellner, Tramèr et al. 2024 ; Anthropic prompt injection blog juin 2025 ; MITRE ATLAS T0091 memory poisoning.</text>
</svg>
