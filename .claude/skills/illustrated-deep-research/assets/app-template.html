<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- og:start -->
  <meta name="author" content="Mathieu Guglielmino">
  <link rel="canonical" href="{{CANONICAL_URL}}">
  <meta name="keywords" content="{{KEYWORDS}}">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Mathieu Guglielmino">
  <meta property="og:locale" content="fr_FR">
  <meta property="og:url" content="{{CANONICAL_URL}}">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{META_DESCRIPTION}}">
  <meta property="og:image" content="{{OG_IMAGE_URL}}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="{{TITLE}} — couverture social">
  <meta property="article:published_time" content="{{PUBLISHED_DATE}}">
  <meta property="article:author" content="Mathieu Guglielmino">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{META_DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE_URL}}">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"Article","headline":"{{TITLE}}","description":"{{META_DESCRIPTION}}","image":"{{OG_IMAGE_URL}}","url":"{{CANONICAL_URL}}","datePublished":"{{PUBLISHED_DATE}}","inLanguage":"fr-FR","author":{"@type":"Person","name":"Mathieu Guglielmino","url":"https://mathieugug.github.io/"},"publisher":{"@type":"Person","name":"Mathieu Guglielmino","url":"https://mathieugug.github.io/"}}
  </script>
  <!-- og:end -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/dossier-app.css">
  <style>
    /* ───────── Tokens ───────── */
    :root {
      --paper:    #FAF8F3;
      --paper-2:  #F2EFE7;
      --ink:      #1A1A1A;
      --graphite: #5A5A5A;
      --mist:     #B8B5AE;
      --rule:     #E5E1D8;
      --carmine:  #B7332C;
      --teal:     #1F5560;
      --mustard:  #B58A2C;

      --serif: 'Spectral', 'Playfair Display', Georgia, serif;
      --sans:  'Inter', system-ui, sans-serif;
      --mono:  'JetBrains Mono', 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; max-width: 100vw; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

  </style>
</head>
<body>
  <div class="layout">

    <header class="site">
      <a class="back" href="../index.html#series">← Retour aux dossiers</a>
      <span class="marker">{{REPORT_KIND}}</span>
      <h1>{{TITLE}}</h1>
      <span class="meta">
        {{DATE}} · {{AUTHOR}} ·
        <a href="{{MD_FILENAME}}" download>Télécharger le rapport (.md) ↓</a>
      </span>
      <button class="menu-toggle" id="toggle-toc">Sommaire</button>
      <button class="menu-toggle" id="toggle-sources">Sources</button>
    </header>

    <nav id="toc" aria-label="Sommaire">
      <button class="panel-close" type="button" aria-label="Fermer le sommaire">Fermer ✕</button>
      <h2>Sommaire</h2>
      <ol>
        {{TOC_HTML}}
      </ol>
    </nav>

    <main id="report">
      <h1 class="report-title">{{TITLE}}</h1>
      <p class="lead">{{SUBTITLE}}</p>
      {{REPORT_HTML}}
    </main>

    <aside id="sources" aria-label="Sources">
      <button class="panel-close" type="button" aria-label="Fermer les sources">Fermer ✕</button>
      <button id="sources-collapse-btn" class="sidebar-edge-toggle" type="button"
              aria-label="Replier le panneau des sources" aria-controls="sources" aria-expanded="true"
              title="Replier les sources">›</button>
      <div class="sources-inner">
        <h2>Sources</h2>
        <ol>
          {{SOURCES_HTML}}
        </ol>
      </div>
    </aside>

  </div>

  <button id="sources-expand-btn" class="sidebar-edge-toggle" type="button"
          aria-label="Déplier le panneau des sources" aria-controls="sources" aria-expanded="false"
          title="Déplier les sources" hidden>‹</button>

  <div id="modal-root" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <button class="modal-close" data-close aria-label="Fermer">×</button>
      <p class="modal-eyebrow" id="modal-eyebrow"></p>
      <h3 class="modal-title" id="modal-title"></h3>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div id="zoom-overlay" hidden role="dialog" aria-modal="true" aria-label="Schéma agrandi">
    <header id="zoom-header">
      <span id="zoom-caption"></span>
      <div class="zoom-controls">
        <button type="button" class="zoom-out" aria-label="Dézoomer" title="Dézoomer (−)">−</button>
        <button type="button" class="zoom-reset" aria-label="Ajuster à l'écran" title="Ajuster à l'écran">Reset</button>
        <button type="button" class="zoom-in" aria-label="Zoomer" title="Zoomer (+)">+</button>
        <button type="button" class="zoom-close" aria-label="Fermer (Échap)" title="Fermer (Échap)">×</button>
      </div>
    </header>
    <div id="zoom-stage" tabindex="-1">
      <div id="zoom-content"></div>
      <div id="zoom-hint">Molette pour zoomer · glisser pour déplacer · Échap pour fermer</div>
      <a class="schema-sigil zoom-sigil" href="https://mathieugug.github.io/" target="_blank" rel="noopener" aria-label="Mathieu Guglielmino — visiter mathieugug.github.io" title="Mathieu Guglielmino · mathieugug.github.io">
        <svg class="sigil-mark" viewBox="0 0 44 44" aria-hidden="true" focusable="false">
          <circle class="sigil-bg" cx="22" cy="22" r="20.5"/>
          <circle class="sigil-ring" cx="22" cy="22" r="17.5"/>
          <g class="sigil-letters"><text x="7.5" y="29">M</text><text x="22" y="29">G</text></g>
        </svg>
      </a>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────
    // DATA — replace these placeholders with real content
    // ─────────────────────────────────────────────────

    const SCHEMAS = {{SCHEMAS_DATA}};
    window.SCHEMAS = SCHEMAS;
    /* shape:
      {
        'schema-01': {
          'region-id': { title: '...', body: '<p>...</p>', eyebrow: 'Schéma 1' },
          ...
        },
        ...
      }
    */

    const TOOLTIPS = {{TOOLTIPS_DATA}};
    /* shape: { 'CoT': 'Chain-of-Thought : ...', ... } */

    const SOURCES = {{SOURCES_DATA}};
    /* shape: [{ n: 1, citation: '...', url: '...', accessed: '2026-04-12' }, ...] */

    // ─────────────────────────────────────────────────
  </script>
<script src="/assets/dossier-app.js" defer></script>
</body>
</html>
