<?xml version="1.0" encoding="UTF-8"?>
<!--
  EXAMPLE EDITORIAL SCHEMA — reference for the illustrated-deep-research skill.
  Use this as a stylistic template only. Adapt content, regions, and annotations
  to the actual report. Do NOT copy this content verbatim into a deliverable.

  Demonstrates:
   - Header strip (schema number, title, subtitle)
   - Editorial palette (paper / ink / graphite + carmine + teal accents)
   - Three layered horizontal bands
   - Interactive regions with data-card, tabindex, role, aria-label
   - Numbered annotations with leader lines
   - Footer with source citation
   - Type stack (Spectral / Inter / JetBrains Mono)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-example">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrow-emph" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <!-- Background paper -->
  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- ═══════════════ HEADER STRIP ═══════════════ -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Architecture multi-agents de référence</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">Séparation planificateur / exécuteur / critique avec bus d'observabilité</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- ═══════════════ BODY ═══════════════ -->

  <!-- Layer label: Orchestration -->
  <text x="60" y="200" class="body" font-size="11" font-weight="500"
        letter-spacing="0.05em" fill="#5A5A5A" text-transform="uppercase">ORCHESTRATION</text>
  <line x1="60" y1="210" x2="180" y2="210" stroke="#B8B5AE" stroke-width="0.5"/>

  <!-- Planner -->
  <g class="interactive" data-card="planner" tabindex="0" role="button"
     aria-label="Planner agent — cliquez pour les détails">
    <rect x="200" y="180" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="300" y="215" class="display" font-size="15" font-weight="600"
          fill="#1A1A1A" text-anchor="middle">Planner</text>
    <text x="300" y="237" class="body" font-size="11" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">décompose en sous-objectifs</text>
  </g>

  <!-- Executor -->
  <g class="interactive" data-card="executor" tabindex="0" role="button"
     aria-label="Executor agent — cliquez pour les détails">
    <rect x="500" y="180" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="600" y="215" class="display" font-size="15" font-weight="600"
          fill="#1A1A1A" text-anchor="middle">Executor</text>
    <text x="600" y="237" class="body" font-size="11" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">appelle outils &amp; APIs</text>
  </g>

  <!-- Critic -->
  <g class="interactive" data-card="critic" tabindex="0" role="button"
     aria-label="Critic agent — cliquez pour les détails">
    <rect x="800" y="180" width="200" height="80" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="900" y="215" class="display" font-size="15" font-weight="600"
          fill="#1A1A1A" text-anchor="middle">Critic</text>
    <text x="900" y="237" class="body" font-size="11" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">évalue, corrige, replanifie</text>
  </g>

  <!-- Flows between orchestration agents -->
  <path d="M 400 220 L 500 220" stroke="#1A1A1A" stroke-width="2.5" fill="none" marker-end="url(#arrow-emph)"/>
  <path d="M 700 220 L 800 220" stroke="#1A1A1A" stroke-width="2.5" fill="none" marker-end="url(#arrow-emph)"/>
  <path d="M 900 260 Q 900 320 600 320 Q 300 320 300 260"
        stroke="#B7332C" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="600" y="340" class="body" font-size="10" font-style="italic"
        fill="#B7332C" text-anchor="middle">boucle de correction</text>

  <!-- Layer label: Tools -->
  <text x="60" y="420" class="body" font-size="11" font-weight="500"
        letter-spacing="0.05em" fill="#5A5A5A" text-transform="uppercase">OUTILS</text>
  <line x1="60" y1="430" x2="180" y2="430" stroke="#B8B5AE" stroke-width="0.5"/>

  <!-- Tool sandbox -->
  <g class="interactive" data-card="sandbox" tabindex="0" role="button"
     aria-label="Tool sandbox — cliquez pour les détails">
    <rect x="200" y="400" width="800" height="80" rx="3"
          fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="600" y="435" class="display" font-size="15" font-weight="600"
          fill="#1F5560" text-anchor="middle">Sandbox d'outils</text>
    <text x="600" y="457" class="body" font-size="11" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">code execution · web search · file I/O · APIs métier · MCP servers</text>
  </g>

  <!-- Connection from Executor down to sandbox -->
  <path d="M 600 260 L 600 400" stroke="#5A5A5A" stroke-width="1.25" fill="none"
        stroke-dasharray="2 3" marker-end="url(#arrow)"/>

  <!-- Layer label: Memory & Telemetry spine -->
  <text x="60" y="560" class="body" font-size="11" font-weight="500"
        letter-spacing="0.05em" fill="#5A5A5A" text-transform="uppercase">PLAN HORIZONTAL</text>
  <line x1="60" y1="570" x2="220" y2="570" stroke="#B8B5AE" stroke-width="0.5"/>

  <g class="interactive" data-card="memory" tabindex="0" role="button"
     aria-label="Memory layer — cliquez pour les détails">
    <rect x="200" y="540" width="380" height="80" rx="3"
          fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="390" y="575" class="display" font-size="15" font-weight="600"
          fill="#B58A2C" text-anchor="middle">Mémoire</text>
    <text x="390" y="597" class="body" font-size="11" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">épisodique · sémantique · procédurale</text>
  </g>

  <g class="interactive" data-card="telemetry" tabindex="0" role="button"
     aria-label="Telemetry bus — cliquez pour les détails">
    <rect x="620" y="540" width="380" height="80" rx="3"
          fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="810" y="575" class="display" font-size="15" font-weight="600"
          fill="#B58A2C" text-anchor="middle">Bus de télémétrie</text>
    <text x="810" y="597" class="body" font-size="11" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">traces OpenTelemetry · LLM-as-Judge · scoring qualité</text>
  </g>

  <!-- Vertical lines from agents to memory/telemetry -->
  <line x1="300" y1="260" x2="300" y2="540" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="600" y1="480" x2="600" y2="540" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="900" y1="260" x2="900" y2="540" stroke="#B58A2C" stroke-width="0.5" stroke-dasharray="1 4"/>

  <!-- ═══════════════ ANNOTATIONS ═══════════════ -->
  <!-- Marker 1 -->
  <circle cx="170" cy="220" r="11" fill="#B7332C"/>
  <text x="170" y="225" class="mono" font-size="11" font-weight="600"
        fill="#FAF8F3" text-anchor="middle">1</text>
  <line x1="158" y1="220" x2="105" y2="220" stroke="#5A5A5A" stroke-width="0.75"/>

  <!-- Marker 2 -->
  <circle cx="600" cy="345" r="11" fill="#B7332C"/>
  <text x="600" y="350" class="mono" font-size="11" font-weight="600"
        fill="#FAF8F3" text-anchor="middle">2</text>

  <!-- Marker 3 -->
  <circle cx="1030" cy="440" r="11" fill="#B7332C"/>
  <text x="1030" y="445" class="mono" font-size="11" font-weight="600"
        fill="#FAF8F3" text-anchor="middle">3</text>
  <line x1="1030" y1="429" x2="1030" y2="380" stroke="#5A5A5A" stroke-width="0.75"/>
  <line x1="1030" y1="380" x2="1080" y2="380" stroke="#5A5A5A" stroke-width="0.75"/>

  <!-- Annotation legend (right edge) -->
  <text x="1080" y="390" class="body" font-size="10" fill="#1A1A1A">
    <tspan x="1080" dy="0" font-weight="600">3</tspan>
    <tspan x="1080" dy="14">Sandbox isolée :</tspan>
    <tspan x="1080" dy="13">aucun appel</tspan>
    <tspan x="1080" dy="13">direct au système</tspan>
    <tspan x="1080" dy="13">de production.</tspan>
  </text>

  <!-- ═══════════════ FOOTER ═══════════════ -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="755" class="body" font-size="10" font-style="italic"
        fill="#5A5A5A">Source : Anthropic, « Building Effective Agents » (2024) ; analyse Lincoln Data &amp; AI</text>
  <text x="60" y="772" class="body" font-size="10" font-style="italic"
        fill="#B8B5AE">Méthodologie : synthèse de 14 implémentations en production observées sur 9 mois</text>
</svg>
