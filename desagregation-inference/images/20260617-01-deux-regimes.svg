<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Deux régimes, pas un</text>
  <text x="60" y="120" class="display" font-size="18" font-style="italic" fill="#5A5A5A">L'inférence d'un LLM enchaîne deux phases aux profils matériels opposés</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- PREFILL -->
  <g class="interactive" data-card="prefill-phase" tabindex="0" role="button" aria-label="Phase de prefill">
    <rect x="60" y="190" width="430" height="300" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="84" y="224" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">PREFILL</text>
    <text x="84" y="256" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Lecture du prompt</text>
    <line x1="84" y1="272" x2="466" y2="272" stroke="#B7332C" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="84" y="300" class="body" font-size="15" fill="#1A1A1A">Tous les tokens d'entrée traités <tspan font-weight="600">en parallèle</tspan></text>
    <text x="84" y="324" class="body" font-size="15" fill="#1A1A1A">Produit le KV cache de chaque token</text>
    <text x="84" y="362" class="body" font-size="13" letter-spacing="0.01em" fill="#5A5A5A">Sature les unités de calcul du GPU</text>
    <rect x="84" y="382" width="180" height="26" rx="3" fill="#B7332C"/>
    <text x="174" y="400" class="mono" font-size="12" font-weight="600" letter-spacing="0.08em" fill="#FAF8F3" text-anchor="middle">COMPUTE-BOUND</text>
    <text x="84" y="440" class="body" font-size="13" fill="#5A5A5A">Métrique de SLO :</text>
    <text x="84" y="462" class="mono" font-size="14" font-weight="500" fill="#B7332C">TTFT — time-to-first-token</text>
  </g>

  <!-- DECODE -->
  <g class="interactive" data-card="decode-phase" tabindex="0" role="button" aria-label="Phase de decode">
    <rect x="710" y="190" width="430" height="300" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="734" y="224" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#1F5560">DECODE</text>
    <text x="734" y="256" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Génération de la réponse</text>
    <line x1="734" y1="272" x2="1116" y2="272" stroke="#1F5560" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="734" y="300" class="body" font-size="15" fill="#1A1A1A">Un seul token <tspan font-weight="600">à la fois</tspan>, autorégressif</text>
    <text x="734" y="324" class="body" font-size="15" fill="#1A1A1A">Relit tout le KV cache à chaque pas</text>
    <text x="734" y="362" class="body" font-size="13" letter-spacing="0.01em" fill="#5A5A5A">Le GPU attend la mémoire, calcul oisif</text>
    <rect x="734" y="382" width="230" height="26" rx="3" fill="#1F5560"/>
    <text x="849" y="400" class="mono" font-size="12" font-weight="600" letter-spacing="0.08em" fill="#FAF8F3" text-anchor="middle">MEMORY-BANDWIDTH-BOUND</text>
    <text x="734" y="440" class="body" font-size="13" fill="#5A5A5A">Métrique de SLO :</text>
    <text x="734" y="462" class="mono" font-size="14" font-weight="500" fill="#1F5560">TPOT / ITL — inter-token latency</text>
  </g>

  <!-- KV CACHE HANDOFF -->
  <g class="interactive" data-card="kv-cache-handoff" tabindex="0" role="button" aria-label="Transfert du KV cache">
    <rect x="510" y="270" width="180" height="140" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="600" y="302" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B58A2C" text-anchor="middle">KV CACHE</text>
    <text x="600" y="332" class="body" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">produit ici,</text>
    <text x="600" y="352" class="body" font-size="13" font-weight="500" fill="#1A1A1A" text-anchor="middle">consommé là</text>
    <text x="600" y="384" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle">l'objet qui circule</text>
  </g>
  <line x1="490" y1="340" x2="506" y2="340" stroke="#5A5A5A" stroke-width="2.5" marker-end="url(#arrowA)"/>
  <line x1="690" y1="340" x2="706" y2="340" stroke="#5A5A5A" stroke-width="2.5" marker-end="url(#arrowA)"/>

  <!-- ROOFLINE ASYMMETRY -->
  <g class="interactive" data-card="roofline-asymmetry" tabindex="0" role="button" aria-label="Asymétrie sur la roofline">
    <rect x="60" y="520" width="1080" height="200" rx="3" fill="#1A1A1A" fill-opacity="0.03" stroke="#E5E1D8" stroke-width="1"/>
    <text x="84" y="552" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">L'ASYMÉTRIE SUR LA ROOFLINE</text>
    <!-- axes -->
    <line x1="120" y1="690" x2="560" y2="690" stroke="#5A5A5A" stroke-width="1.25"/>
    <line x1="120" y1="690" x2="120" y2="580" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="120" y="710" class="body" font-size="11" fill="#5A5A5A">intensité arithmétique (FLOP / octet) →</text>
    <text x="108" y="578" class="body" font-size="11" fill="#5A5A5A" text-anchor="end" transform="rotate(-90 108 578)">débit →</text>
    <!-- roofline -->
    <path d="M120 670 L300 580 L560 580" fill="none" stroke="#1A1A1A" stroke-width="1.25"/>
    <!-- decode point: low intensity, memory-bound slope -->
    <circle cx="180" cy="640" r="7" fill="#1F5560"/>
    <text x="194" y="636" class="body" font-size="12" font-weight="500" fill="#1F5560">decode — bridé mémoire</text>
    <!-- prefill point: high intensity, compute roof -->
    <circle cx="460" cy="580" r="7" fill="#B7332C"/>
    <text x="474" y="576" class="body" font-size="12" font-weight="500" fill="#B7332C">prefill — bridé calcul</text>

    <text x="640" y="588" class="body" font-size="15" fill="#1A1A1A" font-weight="500">Un même GPU ne peut optimiser les deux à la fois.</text>
    <text x="640" y="616" class="body" font-size="14" fill="#5A5A5A">Réglé pour le prefill (gros batch, parallélisme tensoriel),</text>
    <text x="640" y="638" class="body" font-size="14" fill="#5A5A5A">il est mal réglé pour le decode — et réciproquement.</text>
    <text x="640" y="676" class="body" font-size="14" fill="#1A1A1A" font-style="italic">D'où l'idée : séparer les deux phases sur des pools distincts.</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="772" class="body" font-size="12" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Source : DistServe (OSDI 2024) ; Splitwise (ISCA 2024). Analyse de l'auteur.</text>
</svg>
