<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
      .dot     { font-size: 18px; }
    </style>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 04</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">État de l'art 2026</text>
  <text x="60" y="120" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Huit systèmes de serving × six dimensions de désagrégation et de cache</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Column headers -->
  <g class="body" font-size="12" fill="#1A1A1A" text-anchor="middle">
    <text transform="rotate(-32 430 215)" x="430" y="215">Désagrégation P/D</text>
    <text transform="rotate(-32 545 215)" x="545" y="215">KV cache pagé</text>
    <text transform="rotate(-32 660 215)" x="660" y="215">Partage de préfixes</text>
    <text transform="rotate(-32 775 215)" x="775" y="215">Offload hiérarchique</text>
    <text transform="rotate(-32 890 215)" x="890" y="215">Chunked prefill</text>
    <text transform="rotate(-32 1005 215)" x="1005" y="215">Maturité production</text>
  </g>
  <text x="60" y="232" class="mono" font-size="10" font-weight="600" letter-spacing="0.10em" fill="#5A5A5A">SYSTÈME</text>
  <line x1="60" y1="244" x2="1075" y2="244" stroke="#1A1A1A" stroke-width="1"/>

  <!-- rows: cols centers 430 545 660 775 890 1005 ; row height 62, first baseline 286 -->
  <!-- helper: each row -->
  <!-- vLLM -->
  <g class="interactive" data-card="vllm" tabindex="0" role="button" aria-label="vLLM">
    <rect x="56" y="256" width="1020" height="58" fill="#1A1A1A" fill-opacity="0.02"/>
    <text x="72" y="285" class="body" font-size="15" font-weight="600" fill="#1A1A1A">vLLM</text>
    <text x="72" y="304" class="body" font-size="11" fill="#5A5A5A">moteur · PagedAttention</text>
    <text x="430" y="294" class="dot" fill="#B58A2C" text-anchor="middle">◐</text>
    <text x="545" y="294" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="660" y="294" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="775" y="294" class="dot" fill="#B58A2C" text-anchor="middle">◐</text>
    <text x="890" y="294" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="1005" y="294" class="dot" fill="#B7332C" text-anchor="middle">●</text>
  </g>
  <!-- SGLang -->
  <g class="interactive" data-card="sglang" tabindex="0" role="button" aria-label="SGLang">
    <text x="72" y="347" class="body" font-size="15" font-weight="600" fill="#1A1A1A">SGLang</text>
    <text x="72" y="366" class="body" font-size="11" fill="#5A5A5A">moteur · RadixAttention</text>
    <text x="430" y="356" class="dot" fill="#B58A2C" text-anchor="middle">◐</text>
    <text x="545" y="356" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="660" y="356" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="775" y="356" class="dot" fill="#B58A2C" text-anchor="middle">◐</text>
    <text x="890" y="356" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="1005" y="356" class="dot" fill="#B7332C" text-anchor="middle">●</text>
  </g>
  <!-- TensorRT-LLM -->
  <g>
    <rect x="56" y="380" width="1020" height="58" fill="#1A1A1A" fill-opacity="0.02"/>
    <text x="72" y="409" class="body" font-size="15" font-weight="600" fill="#1A1A1A">TensorRT-LLM</text>
    <text x="72" y="428" class="body" font-size="11" fill="#5A5A5A">moteur · NVIDIA</text>
    <text x="430" y="418" class="dot" fill="#B58A2C" text-anchor="middle">◐</text>
    <text x="545" y="418" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="660" y="418" class="dot" fill="#B58A2C" text-anchor="middle">◐</text>
    <text x="775" y="418" class="dot" fill="#B58A2C" text-anchor="middle">◐</text>
    <text x="890" y="418" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="1005" y="418" class="dot" fill="#B7332C" text-anchor="middle">●</text>
  </g>
  <!-- DistServe -->
  <g class="interactive" data-card="distserve" tabindex="0" role="button" aria-label="DistServe">
    <text x="72" y="471" class="body" font-size="15" font-weight="600" fill="#1A1A1A">DistServe</text>
    <text x="72" y="490" class="body" font-size="11" fill="#5A5A5A">recherche · OSDI 2024</text>
    <text x="430" y="480" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="545" y="480" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="660" y="480" class="dot" fill="#B8B5AE" text-anchor="middle">○</text>
    <text x="775" y="480" class="dot" fill="#B8B5AE" text-anchor="middle">○</text>
    <text x="890" y="480" class="dot" fill="#B8B5AE" text-anchor="middle">○</text>
    <text x="1005" y="480" class="dot" fill="#B58A2C" text-anchor="middle">◐</text>
  </g>
  <!-- Splitwise -->
  <g>
    <rect x="56" y="504" width="1020" height="58" fill="#1A1A1A" fill-opacity="0.02"/>
    <text x="72" y="533" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Splitwise</text>
    <text x="72" y="552" class="body" font-size="11" fill="#5A5A5A">Microsoft · ISCA 2024</text>
    <text x="430" y="542" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="545" y="542" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="660" y="542" class="dot" fill="#B8B5AE" text-anchor="middle">○</text>
    <text x="775" y="542" class="dot" fill="#B8B5AE" text-anchor="middle">○</text>
    <text x="890" y="542" class="dot" fill="#B8B5AE" text-anchor="middle">○</text>
    <text x="1005" y="542" class="dot" fill="#B58A2C" text-anchor="middle">◐</text>
  </g>
  <!-- Mooncake -->
  <g class="interactive" data-card="mooncake" tabindex="0" role="button" aria-label="Mooncake">
    <text x="72" y="595" class="body" font-size="15" font-weight="600" fill="#1A1A1A">Mooncake</text>
    <text x="72" y="614" class="body" font-size="11" fill="#5A5A5A">Moonshot · prod Kimi</text>
    <text x="430" y="604" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="545" y="604" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="660" y="604" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="775" y="604" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="890" y="604" class="dot" fill="#B58A2C" text-anchor="middle">◐</text>
    <text x="1005" y="604" class="dot" fill="#B7332C" text-anchor="middle">●</text>
  </g>
  <!-- NVIDIA Dynamo -->
  <g class="interactive" data-card="dynamo" tabindex="0" role="button" aria-label="NVIDIA Dynamo">
    <rect x="56" y="628" width="1020" height="58" fill="#1A1A1A" fill-opacity="0.02"/>
    <text x="72" y="657" class="body" font-size="15" font-weight="600" fill="#1A1A1A">NVIDIA Dynamo</text>
    <text x="72" y="676" class="body" font-size="11" fill="#5A5A5A">orchestrateur · 2025</text>
    <text x="430" y="666" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="545" y="666" class="dot" fill="#1F5560" text-anchor="middle">●</text>
    <text x="660" y="666" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="775" y="666" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="890" y="666" class="dot" fill="#1F5560" text-anchor="middle">●</text>
    <text x="1005" y="666" class="dot" fill="#B7332C" text-anchor="middle">●</text>
  </g>
  <!-- llm-d -->
  <g class="interactive" data-card="llm-d" tabindex="0" role="button" aria-label="llm-d">
    <text x="72" y="719" class="body" font-size="15" font-weight="600" fill="#1A1A1A">llm-d</text>
    <text x="72" y="738" class="body" font-size="11" fill="#5A5A5A">Red Hat/Google · K8s</text>
    <text x="430" y="728" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="545" y="728" class="dot" fill="#1F5560" text-anchor="middle">●</text>
    <text x="660" y="728" class="dot" fill="#B7332C" text-anchor="middle">●</text>
    <text x="775" y="728" class="dot" fill="#B58A2C" text-anchor="middle">◐</text>
    <text x="890" y="728" class="dot" fill="#1F5560" text-anchor="middle">●</text>
    <text x="1005" y="728" class="dot" fill="#B58A2C" text-anchor="middle">◐</text>
  </g>

  <line x1="60" y1="748" x2="1075" y2="748" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LEGEND -->
  <text x="60" y="772" class="body" font-size="12" fill="#5A5A5A">
    <tspan class="dot" fill="#B7332C">●</tspan><tspan dx="6"> natif / mûr  </tspan>
    <tspan class="dot" fill="#B58A2C" dx="14">◐</tspan><tspan dx="6"> partiel / émergent  </tspan>
    <tspan class="dot" fill="#B8B5AE" dx="14">○</tspan><tspan dx="6"> absent  </tspan>
    <tspan class="dot" fill="#1F5560" dx="14">●</tspan><tspan dx="6"> délégué aux moteurs sous-jacents (orchestrateurs)</tspan>
  </text>
  <text x="800" y="793" class="body" font-size="11" font-style="italic" fill="#5A5A5A" text-anchor="end">Sources : papiers &amp; docs respectifs, 2023-2025. Analyse de l'auteur.</text>
</svg>
