<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrowE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Deux réponses rivales</text>
  <text x="60" y="120" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Quand chunked prefill colocalisé suffit, quand la désagrégation devient nécessaire</text>
  <line x1="60" y1="142" x2="840" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- AXES -->
  <!-- Y axis: SLO strictness -->
  <g class="interactive" data-card="slo-regime" tabindex="0" role="button" aria-label="Sévérité du SLO">
    <line x1="200" y1="800" x2="200" y2="220" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrowE)"/>
    <text x="170" y="510" class="body" font-size="14" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90 170 510)" font-weight="500">Sévérité du SLO (TTFT &amp; TPOT) →</text>
    <text x="186" y="240" class="body" font-size="11" fill="#5A5A5A" text-anchor="end">strict</text>
    <text x="186" y="795" class="body" font-size="11" fill="#5A5A5A" text-anchor="end">lâche</text>
  </g>
  <!-- X axis: volume/scale -->
  <g class="interactive" data-card="interference-axis" tabindex="0" role="button" aria-label="Volume et coût d'interférence">
    <line x1="200" y1="800" x2="820" y2="800" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrowE)"/>
    <text x="510" y="845" class="body" font-size="14" fill="#1A1A1A" text-anchor="middle" font-weight="500">Volume de charge &amp; coût d'interférence prefill/decode →</text>
    <text x="220" y="822" class="body" font-size="11" fill="#5A5A5A">faible</text>
    <text x="800" y="822" class="body" font-size="11" fill="#5A5A5A" text-anchor="end">élevé</text>
  </g>

  <!-- diagonal boundary -->
  <line x1="200" y1="300" x2="780" y2="780" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- CHUNKED PREFILL region (lower-left) -->
  <g class="interactive" data-card="chunked-prefill" tabindex="0" role="button" aria-label="Chunked prefill">
    <path d="M200 800 L780 800 L200 300 Z" fill="#1F5560" fill-opacity="0.06"/>
    <text x="300" y="640" class="mono" font-size="10" font-weight="600" letter-spacing="0.10em" fill="#1F5560">VOIE COLOCALISÉE</text>
    <text x="300" y="672" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Chunked prefill</text>
    <text x="300" y="696" class="body" font-size="13" fill="#5A5A5A">Sarathi-Serve</text>
    <text x="300" y="726" class="body" font-size="13" fill="#1A1A1A">Découpe le prefill en chunks,</text>
    <text x="300" y="746" class="body" font-size="13" fill="#1A1A1A">batches « stall-free ».</text>
    <text x="300" y="772" class="body" font-size="12" fill="#5A5A5A">Un seul pool · simple à déployer · 2,6-5,6× capacité</text>
  </g>

  <!-- DISAGGREGATION region (upper-right) -->
  <g class="interactive" data-card="disaggregation" tabindex="0" role="button" aria-label="Désagrégation">
    <path d="M200 300 L780 800 L780 220 L200 220 Z" fill="#B7332C" fill-opacity="0.06"/>
    <text x="470" y="300" class="mono" font-size="10" font-weight="600" letter-spacing="0.10em" fill="#B7332C">VOIE DÉSAGRÉGÉE</text>
    <text x="470" y="332" class="display" font-size="20" font-weight="600" fill="#1A1A1A">Désagrégation P/D</text>
    <text x="470" y="356" class="body" font-size="13" fill="#5A5A5A">DistServe · Splitwise · Mooncake</text>
    <text x="470" y="386" class="body" font-size="13" fill="#1A1A1A">Pools physiquement séparés,</text>
    <text x="470" y="406" class="body" font-size="13" fill="#1A1A1A">chacun optimisé indépendamment.</text>
    <text x="470" y="432" class="body" font-size="12" fill="#5A5A5A">7,4× requêtes ou SLO 12,6× plus serré</text>
    <text x="470" y="452" class="body" font-size="12" fill="#5A5A5A">mais coût de transfert du KV cache</text>
  </g>

  <!-- boundary annotation -->
  <text x="540" y="600" class="body" font-size="13" font-style="italic" fill="#1A1A1A" text-anchor="middle">seuil de bascule :</text>
  <text x="540" y="620" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">prompts longs, fort déséquilibre</text>
  <text x="540" y="638" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">prefill/decode, SLO doubles à tenir</text>

  <!-- FOOTER -->
  <text x="60" y="880" class="body" font-size="12" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Sarathi-Serve (OSDI 2024) ; DistServe (OSDI 2024) ; « Beyond the Buzz » (2025). Analyse de l'auteur.</text>
</svg>
