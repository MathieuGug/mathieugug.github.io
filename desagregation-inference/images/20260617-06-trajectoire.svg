<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrowF" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Trajectoire 2022 — 2028</text>
  <text x="60" y="120" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Du batching continu au marché du cache : quatre ères de l'inférence</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- timeline axis -->
  <line x1="80" y1="430" x2="1140" y2="430" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrowF)"/>
  <g class="mono" font-size="12" fill="#5A5A5A" font-weight="600">
    <text x="160" y="462">2022</text>
    <text x="420" y="462">2023</text>
    <text x="640" y="462">2024</text>
    <text x="860" y="462">2025</text>
    <text x="1030" y="462">2026-28</text>
  </g>

  <!-- ERA 1 : batching -->
  <g class="interactive" data-card="era-batching" tabindex="0" role="button" aria-label="Ère du batching continu">
    <rect x="100" y="280" width="220" height="120" rx="3" fill="#5A5A5A" fill-opacity="0.05" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="116" y="308" class="mono" font-size="10" font-weight="600" letter-spacing="0.10em" fill="#5A5A5A">ÈRE 1 · BATCHING</text>
    <text x="116" y="334" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Continuous batching</text>
    <text x="116" y="356" class="body" font-size="12" fill="#5A5A5A">Orca (OSDI 2022)</text>
    <text x="116" y="378" class="body" font-size="12" fill="#5A5A5A">+débit, mais interférence</text>
    <circle cx="160" cy="430" r="7" fill="#5A5A5A"/>
    <line x1="160" y1="400" x2="160" y2="423" stroke="#5A5A5A" stroke-width="1"/>
  </g>

  <!-- ERA 2 : paging -->
  <g class="interactive" data-card="era-paging" tabindex="0" role="button" aria-label="Ère du paging">
    <rect x="340" y="260" width="240" height="140" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.25"/>
    <text x="356" y="288" class="mono" font-size="10" font-weight="600" letter-spacing="0.10em" fill="#B7332C">ÈRE 2 · PAGING</text>
    <text x="356" y="314" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Le KV cache devient gérable</text>
    <text x="356" y="336" class="body" font-size="12" fill="#5A5A5A">PagedAttention / vLLM (SOSP 2023)</text>
    <text x="356" y="358" class="body" font-size="12" fill="#5A5A5A">RadixAttention / SGLang (2023)</text>
    <text x="356" y="380" class="body" font-size="12" fill="#5A5A5A">gaspillage &lt; 4 %, partage de préfixes</text>
    <circle cx="430" cy="430" r="7" fill="#B7332C"/>
    <line x1="430" y1="400" x2="430" y2="423" stroke="#B7332C" stroke-width="1"/>
  </g>

  <!-- ERA 3 : disaggregation -->
  <g class="interactive" data-card="era-disaggregation" tabindex="0" role="button" aria-label="Ère de la désagrégation">
    <rect x="600" y="500" width="320" height="160" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="616" y="528" class="mono" font-size="10" font-weight="600" letter-spacing="0.10em" fill="#1F5560">ÈRE 3 · DÉSAGRÉGATION</text>
    <text x="616" y="554" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Les phases se séparent</text>
    <text x="616" y="576" class="body" font-size="12" fill="#5A5A5A">DistServe · Splitwise · Sarathi (2024)</text>
    <text x="616" y="598" class="body" font-size="12" fill="#5A5A5A">Mooncake · Dynamo · llm-d (2025)</text>
    <text x="616" y="620" class="body" font-size="12" fill="#5A5A5A">pools spécialisés, KV-aware routing</text>
    <text x="616" y="644" class="body" font-size="12" fill="#1F5560" font-style="italic">DeepSeek publie ses marges (fév. 2025)</text>
    <circle cx="700" cy="430" r="7" fill="#1F5560"/>
    <line x1="700" y1="430" x2="700" y2="500" stroke="#1F5560" stroke-width="1"/>
    <circle cx="860" cy="430" r="7" fill="#1F5560"/>
    <line x1="860" y1="430" x2="860" y2="500" stroke="#1F5560" stroke-width="1"/>
  </g>

  <!-- ERA 4 : cache market -->
  <g class="interactive" data-card="era-cache-market" tabindex="0" role="button" aria-label="Ère du marché du cache">
    <rect x="940" y="220" width="200" height="180" rx="3" fill="#B58A2C" fill-opacity="0.09" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="956" y="248" class="mono" font-size="10" font-weight="600" letter-spacing="0.10em" fill="#B58A2C">ÈRE 4 · MARCHÉ</text>
    <text x="956" y="274" class="body" font-size="14" font-weight="600" fill="#1A1A1A">Le cache, un actif</text>
    <text x="956" y="296" class="body" font-size="12" fill="#5A5A5A">KV-cache-as-a-service</text>
    <text x="956" y="318" class="body" font-size="12" fill="#5A5A5A">désagrégation intra-GPU (Nexus)</text>
    <text x="956" y="340" class="body" font-size="12" fill="#5A5A5A">hétérogène (HexGen-2)</text>
    <text x="956" y="362" class="body" font-size="12" fill="#5A5A5A">standards de transfert (NIXL)</text>
    <text x="956" y="384" class="body" font-size="12" fill="#B58A2C" font-style="italic">+ decode spéculatif</text>
    <circle cx="1060" cy="430" r="7" fill="#B58A2C"/>
    <line x1="1060" y1="400" x2="1060" y2="423" stroke="#B58A2C" stroke-width="1"/>
  </g>

  <!-- through-line annotation -->
  <text x="80" y="720" class="body" font-size="15" fill="#1A1A1A" font-weight="500">Le fil rouge : le KV cache passe de sous-produit transitoire à objet central, puis à ressource distribuée — et bientôt à actif facturable.</text>
  <text x="80" y="748" class="body" font-size="14" fill="#5A5A5A">Chaque ère ne remplace pas la précédente : elle l'absorbe. Le paging reste universel ; la désagrégation s'y ajoute à l'échelle.</text>

  <!-- FOOTER -->
  <text x="80" y="788" class="body" font-size="12" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Orca (2022) ; vLLM/SGLang (2023) ; DistServe/Splitwise/Sarathi (2024) ; Mooncake/Dynamo/llm-d/DeepSeek (2025) ; Nexus/HexGen-2 (2025). Analyse de l'auteur.</text>
</svg>
