<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Le KV cache, objet central</text>
  <text x="60" y="120" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Quatre familles de gestion, par sophistication croissante</text>
  <line x1="60" y1="142" x2="840" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- 1. PAGING -->
  <g class="interactive" data-card="paging" tabindex="0" role="button" aria-label="Paging — PagedAttention">
    <rect x="60" y="180" width="370" height="300" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="84" y="212" class="mono" font-size="11" font-weight="600" letter-spacing="0.10em" fill="#B7332C">1 · PAGING</text>
    <text x="84" y="244" class="display" font-size="18" font-weight="600" fill="#1A1A1A">PagedAttention — vLLM</text>
    <text x="84" y="270" class="body" font-size="13" fill="#5A5A5A">Cache découpé en blocs de taille fixe,</text>
    <text x="84" y="288" class="body" font-size="13" fill="#5A5A5A">alloués à la demande, non contigus.</text>
    <!-- blocks viz -->
    <g>
      <rect x="84" y="312" width="40" height="28" rx="2" fill="#B7332C" fill-opacity="0.30"/>
      <rect x="132" y="312" width="40" height="28" rx="2" fill="#B7332C" fill-opacity="0.30"/>
      <rect x="180" y="312" width="40" height="28" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
      <rect x="228" y="312" width="40" height="28" rx="2" fill="#B7332C" fill-opacity="0.30"/>
      <rect x="276" y="312" width="40" height="28" rx="2" fill="#FAF8F3" stroke="#B7332C" stroke-width="1"/>
      <rect x="324" y="312" width="40" height="28" rx="2" fill="#B7332C" fill-opacity="0.30"/>
    </g>
    <text x="84" y="380" class="body" font-size="14" fill="#1A1A1A" font-weight="500">Gaspillage mémoire : 60-80 % → &lt; 4 %</text>
    <text x="84" y="406" class="body" font-size="13" fill="#5A5A5A">Débloque des batches plus gros</text>
    <rect x="84" y="426" width="150" height="26" rx="3" fill="#B7332C"/>
    <text x="159" y="444" class="mono" font-size="12" font-weight="600" fill="#FAF8F3" text-anchor="middle">débit 2-4×</text>
  </g>

  <!-- 2. PREFIX SHARING -->
  <g class="interactive" data-card="prefix-sharing" tabindex="0" role="button" aria-label="Partage de préfixes — RadixAttention">
    <rect x="470" y="180" width="370" height="300" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="494" y="212" class="mono" font-size="11" font-weight="600" letter-spacing="0.10em" fill="#1F5560">2 · PARTAGE DE PRÉFIXES</text>
    <text x="494" y="244" class="display" font-size="18" font-weight="600" fill="#1A1A1A">RadixAttention — SGLang</text>
    <text x="494" y="270" class="body" font-size="13" fill="#5A5A5A">Préfixes communs (system prompt,</text>
    <text x="494" y="288" class="body" font-size="13" fill="#5A5A5A">few-shot, documents) stockés une fois.</text>
    <!-- radix tree viz -->
    <circle cx="560" cy="330" r="9" fill="#1F5560"/>
    <line x1="560" y1="339" x2="520" y2="372" stroke="#1F5560" stroke-width="1"/>
    <line x1="560" y1="339" x2="600" y2="372" stroke="#1F5560" stroke-width="1"/>
    <circle cx="520" cy="380" r="7" fill="#1F5560" fill-opacity="0.5"/>
    <circle cx="600" cy="380" r="7" fill="#1F5560" fill-opacity="0.5"/>
    <line x1="600" y1="387" x2="640" y2="412" stroke="#1F5560" stroke-width="1"/>
    <circle cx="640" cy="418" r="6" fill="#1F5560" fill-opacity="0.5"/>
    <text x="660" y="334" class="body" font-size="12" fill="#5A5A5A">racine = préfixe partagé</text>
    <text x="494" y="448" class="body" font-size="14" fill="#1A1A1A" font-weight="500">Réutilisation automatique du cache</text>
    <text x="494" y="468" class="body" font-size="13" fill="#5A5A5A">gain majeur sur agents &amp; chat à long system prompt</text>
  </g>

  <!-- 3. OFFLOADING -->
  <g class="interactive" data-card="offloading" tabindex="0" role="button" aria-label="Offloading hiérarchique">
    <rect x="60" y="510" width="370" height="300" rx="3" fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="84" y="542" class="mono" font-size="11" font-weight="600" letter-spacing="0.10em" fill="#B58A2C">3 · OFFLOADING HIÉRARCHIQUE</text>
    <text x="84" y="574" class="display" font-size="18" font-weight="600" fill="#1A1A1A">LMCache &amp; co.</text>
    <text x="84" y="600" class="body" font-size="13" fill="#5A5A5A">Rétrograder un cache inactif plutôt</text>
    <text x="84" y="618" class="body" font-size="13" fill="#5A5A5A">que l'évincer — le promouvoir au besoin.</text>
    <!-- tiers -->
    <rect x="84" y="640" width="120" height="34" rx="3" fill="#B58A2C" fill-opacity="0.35"/>
    <text x="144" y="662" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">HBM (VRAM)</text>
    <rect x="216" y="640" width="120" height="34" rx="3" fill="#B58A2C" fill-opacity="0.20"/>
    <text x="276" y="662" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">DRAM CPU</text>
    <rect x="348" y="640" width="60" height="34" rx="3" fill="#B58A2C" fill-opacity="0.10"/>
    <text x="378" y="662" class="mono" font-size="11" fill="#1A1A1A" text-anchor="middle">SSD</text>
    <text x="84" y="708" class="body" font-size="13" fill="#5A5A5A">rare &amp; cher  →  abondant &amp; lent</text>
    <text x="84" y="744" class="body" font-size="14" fill="#1A1A1A" font-weight="500">Tout le cluster devient une mémoire</text>
    <text x="84" y="764" class="body" font-size="14" fill="#1A1A1A" font-weight="500">à plusieurs étages.</text>
  </g>

  <!-- 4. DISAGGREGATED POOL -->
  <g class="interactive" data-card="disaggregated-pool" tabindex="0" role="button" aria-label="Pool désagrégé global">
    <rect x="470" y="510" width="370" height="300" rx="3" fill="#2F5D3F" fill-opacity="0.07" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="494" y="542" class="mono" font-size="11" font-weight="600" letter-spacing="0.10em" fill="#2F5D3F">4 · POOL DÉSAGRÉGÉ GLOBAL</text>
    <text x="494" y="574" class="display" font-size="18" font-weight="600" fill="#1A1A1A">Mooncake — Kimi</text>
    <text x="494" y="600" class="body" font-size="13" fill="#5A5A5A">Un cache mutualisé entre tous les nœuds,</text>
    <text x="494" y="618" class="body" font-size="13" fill="#5A5A5A">adressable par n'importe quel worker.</text>
    <!-- global pool viz -->
    <rect x="494" y="638" width="322" height="50" rx="3" fill="#2F5D3F" fill-opacity="0.12" stroke="#2F5D3F" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="655" y="668" class="mono" font-size="12" fill="#2F5D3F" text-anchor="middle">KV CACHE GLOBAL · DRAM + SSD du cluster</text>
    <circle cx="540" cy="720" r="6" fill="#2F5D3F"/><line x1="540" y1="714" x2="540" y2="690" stroke="#2F5D3F" stroke-width="1"/>
    <circle cx="655" cy="720" r="6" fill="#2F5D3F"/><line x1="655" y1="714" x2="655" y2="690" stroke="#2F5D3F" stroke-width="1"/>
    <circle cx="770" cy="720" r="6" fill="#2F5D3F"/><line x1="770" y1="714" x2="770" y2="690" stroke="#2F5D3F" stroke-width="1"/>
    <text x="494" y="760" class="body" font-size="14" fill="#1A1A1A" font-weight="500">« Trading more storage for less compute »</text>
    <text x="494" y="782" class="body" font-size="13" fill="#5A5A5A">le scheduler raisonne en localité de cache</text>
  </g>

  <!-- FOOTER -->
  <text x="60" y="868" class="body" font-size="12" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : PagedAttention (SOSP 2023) ; SGLang (NeurIPS 2024) ; LMCache ; Mooncake (FAST 2025). Analyse de l'auteur.</text>
</svg>
