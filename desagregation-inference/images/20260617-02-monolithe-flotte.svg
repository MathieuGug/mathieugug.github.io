<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="28" font-weight="600" letter-spacing="-0.01em" fill="#1A1A1A">Du monolithe à la flotte désagrégée</text>
  <text x="60" y="120" class="display" font-size="18" font-style="italic" fill="#5A5A5A">Le moteur colocalisé cède la place à des pools spécialisés reliés par le transfert de KV cache</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LEFT: monolith -->
  <g class="interactive" data-card="colocated-engine" tabindex="0" role="button" aria-label="Moteur colocalisé">
    <text x="60" y="186" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#5A5A5A">HIER · COLOCALISÉ</text>
    <rect x="60" y="200" width="330" height="300" rx="3" fill="#1A1A1A" fill-opacity="0.04" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="225" y="240" class="display" font-size="16" font-style="italic" fill="#1A1A1A" text-anchor="middle">Un seul pool fait tout</text>
    <!-- gpus mixing both -->
    <rect x="95" y="270" width="120" height="90" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <rect x="95" y="270" width="120" height="45" rx="3" fill="#B7332C" fill-opacity="0.10"/>
    <text x="155" y="298" class="mono" font-size="11" fill="#B7332C" text-anchor="middle">prefill</text>
    <text x="155" y="342" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">decode</text>
    <rect x="235" y="270" width="120" height="90" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <rect x="235" y="270" width="120" height="45" rx="3" fill="#B7332C" fill-opacity="0.10"/>
    <text x="295" y="298" class="mono" font-size="11" fill="#B7332C" text-anchor="middle">prefill</text>
    <text x="295" y="342" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">decode</text>
    <text x="225" y="400" class="body" font-size="13" fill="#1A1A1A" text-anchor="middle" font-weight="500">Interférence prefill/decode</text>
    <text x="225" y="424" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">un prefill long gèle les decodes en cours</text>
    <text x="225" y="460" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">parallélisme &amp; allocation</text>
    <text x="225" y="478" class="body" font-size="12" fill="#5A5A5A" text-anchor="middle">couplés de force</text>
  </g>

  <!-- arrow transition -->
  <line x1="400" y1="350" x2="446" y2="350" stroke="#5A5A5A" stroke-width="2.5" marker-end="url(#arrowB)"/>
  <text x="423" y="335" class="body" font-size="11" fill="#5A5A5A" text-anchor="middle" font-style="italic">désagréger</text>

  <!-- RIGHT: disaggregated -->
  <text x="470" y="186" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C">AUJOURD'HUI · DÉSAGRÉGÉ</text>

  <!-- smart router -->
  <g class="interactive" data-card="smart-router" tabindex="0" role="button" aria-label="Routeur conscient du cache">
    <rect x="470" y="200" width="630" height="64" rx="3" fill="#1A1A1A"/>
    <text x="490" y="228" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#FAF8F3">ROUTEUR · KV-AWARE</text>
    <text x="490" y="250" class="body" font-size="13" fill="#FAF8F3">route par score de recouvrement de cache + charge — Dynamo, llm-d</text>
  </g>

  <!-- prefill pool -->
  <g class="interactive" data-card="prefill-pool" tabindex="0" role="button" aria-label="Pool prefill">
    <rect x="470" y="300" width="270" height="200" rx="3" fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="1.5"/>
    <text x="494" y="332" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#B7332C">POOL PREFILL</text>
    <rect x="494" y="350" width="100" height="60" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="544" y="385" class="mono" font-size="11" fill="#B7332C" text-anchor="middle">GPU</text>
    <rect x="616" y="350" width="100" height="60" rx="3" fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="666" y="385" class="mono" font-size="11" fill="#B7332C" text-anchor="middle">GPU</text>
    <text x="494" y="442" class="body" font-size="13" fill="#1A1A1A" font-weight="500">Optimisé compute</text>
    <text x="494" y="464" class="body" font-size="12" fill="#5A5A5A">gros batch, parallélisme tensoriel</text>
    <text x="494" y="484" class="body" font-size="12" fill="#5A5A5A">cible le TTFT</text>
  </g>

  <!-- decode pool -->
  <g class="interactive" data-card="decode-pool" tabindex="0" role="button" aria-label="Pool decode">
    <rect x="830" y="300" width="270" height="200" rx="3" fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.5"/>
    <text x="854" y="332" class="mono" font-size="10" font-weight="600" letter-spacing="0.12em" fill="#1F5560">POOL DECODE</text>
    <rect x="854" y="350" width="100" height="60" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="904" y="385" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">GPU</text>
    <rect x="976" y="350" width="100" height="60" rx="3" fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="1026" y="385" class="mono" font-size="11" fill="#1F5560" text-anchor="middle">GPU</text>
    <text x="854" y="442" class="body" font-size="13" fill="#1A1A1A" font-weight="500">Optimisé mémoire</text>
    <text x="854" y="464" class="body" font-size="12" fill="#5A5A5A">grande capacité KV, batch decode</text>
    <text x="854" y="484" class="body" font-size="12" fill="#5A5A5A">cible le TPOT</text>
  </g>

  <!-- KV transfer between pools -->
  <g class="interactive" data-card="kv-transfer" tabindex="0" role="button" aria-label="Transfert KV cache">
    <line x1="740" y1="380" x2="826" y2="380" stroke="#B58A2C" stroke-width="2.5" marker-end="url(#arrowB)"/>
    <rect x="724" y="514" width="376" height="62" rx="3" fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="744" y="540" class="mono" font-size="10" font-weight="600" letter-spacing="0.10em" fill="#B58A2C">TRANSFERT KV — NIXL / RDMA / NVLink</text>
    <text x="744" y="562" class="body" font-size="12" fill="#5A5A5A">non bloquant : la passe GPU continue pendant le transfert</text>
  </g>
  <line x1="605" y1="500" x2="605" y2="512" stroke="#B58A2C" stroke-width="1.25"/>

  <!-- routing arrows -->
  <line x1="605" y1="264" x2="605" y2="296" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrowB)"/>
  <line x1="965" y1="264" x2="965" y2="296" stroke="#5A5A5A" stroke-width="1.25" marker-end="url(#arrowB)"/>

  <!-- bottom annotation -->
  <text x="60" y="630" class="body" font-size="15" fill="#1A1A1A" font-weight="500">Chaque pool est dimensionné, parallélisé et mis à l'échelle indépendamment.</text>
  <text x="60" y="656" class="body" font-size="14" fill="#5A5A5A">Splitwise ajoute un troisième pool « mixte » élastique qui absorbe les pics ; Mooncake mutualise en plus un cache global sur DRAM/SSD (cf. Schéma 3).</text>

  <!-- FOOTER -->
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="772" class="body" font-size="12" font-style="italic" letter-spacing="0.02em" fill="#5A5A5A">Sources : Splitwise (Microsoft, ISCA 2024) ; DistServe (OSDI 2024) ; Mooncake (FAST 2025) ; NVIDIA Dynamo (2025) ; llm-d (2025). Analyse de l'auteur.</text>
</svg>
