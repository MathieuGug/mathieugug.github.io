<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-06">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow-06" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 06</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Hiérarchie d'alertes et boucles de correction</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">Cinq niveaux de réaction, du blocage automatique au refactor stratégique</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- COLUMN HEADERS -->
  <text x="100" y="180" class="body" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A">NIVEAU</text>
  <text x="225" y="180" class="body" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A">DÉCLENCHEUR</text>
  <text x="540" y="180" class="body" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A">RÉACTION</text>
  <text x="870" y="180" class="body" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A">RESPONSABLE</text>
  <text x="1050" y="180" class="body" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A">SLA</text>

  <line x1="60" y1="190" x2="1140" y2="190" stroke="#1A1A1A" stroke-width="0.5"/>

  <!-- L0 — Automatic guardrail -->
  <g class="interactive" data-card="level-0" tabindex="0" role="button"
     aria-label="Niveau L0 — Guardrail automatique">
    <rect x="60" y="205" width="1080" height="80" rx="3"
          fill="#B7332C" fill-opacity="0.08" stroke="#B7332C" stroke-width="1.5"/>

    <text x="80" y="230" class="mono" font-size="14" font-weight="600" fill="#B7332C">L0</text>
    <text x="80" y="248" class="body" font-size="10" font-style="italic" fill="#5A5A5A">automatique</text>

    <text x="220" y="232" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Guardrail bloque output</text>
    <text x="220" y="250" class="body" font-size="11" fill="#5A5A5A">PII, toxicité, jailbreak, injection détectés temps réel</text>
    <text x="220" y="268" class="body" font-size="10" font-style="italic" fill="#B7332C">→ exemple : Sensitive Data Scanner Datadog, Guardrails AI</text>

    <text x="540" y="232" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Bloque · réécrit · masque</text>
    <text x="540" y="250" class="body" font-size="11" fill="#5A5A5A">L'output ne quitte pas l'agent</text>
    <text x="540" y="268" class="body" font-size="10" font-style="italic" fill="#B7332C">incident enregistré · audit trail OTel</text>

    <text x="870" y="232" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Système</text>
    <text x="870" y="250" class="body" font-size="10" fill="#5A5A5A">aucune action humaine</text>

    <text x="1050" y="240" class="mono" font-size="13" font-weight="600" fill="#B7332C">&lt; 100 ms</text>
  </g>

  <!-- L1 — Semi-auto rerouting -->
  <g class="interactive" data-card="level-1" tabindex="0" role="button"
     aria-label="Niveau L1 — Rerouting semi-auto">
    <rect x="60" y="298" width="1080" height="80" rx="3"
          fill="#B58A2C" fill-opacity="0.08" stroke="#B58A2C" stroke-width="1.25"/>

    <text x="80" y="323" class="mono" font-size="14" font-weight="600" fill="#B58A2C">L1</text>
    <text x="80" y="341" class="body" font-size="10" font-style="italic" fill="#5A5A5A">semi-auto</text>

    <text x="220" y="325" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Latence excessive · erreur modèle</text>
    <text x="220" y="343" class="body" font-size="11" fill="#5A5A5A">P99 dépasse seuil, 5xx sur le provider primaire</text>
    <text x="220" y="361" class="body" font-size="10" font-style="italic" fill="#B58A2C">→ exemple : timeout Anthropic → fallback Claude Haiku 4.5</text>

    <text x="540" y="325" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Rerouting modèle de fallback</text>
    <text x="540" y="343" class="body" font-size="11" fill="#5A5A5A">Le routeur sélectionne un modèle de secours</text>
    <text x="540" y="361" class="body" font-size="10" font-style="italic" fill="#B58A2C">notification on-call passive</text>

    <text x="870" y="325" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Routeur LLM</text>
    <text x="870" y="343" class="body" font-size="10" fill="#5A5A5A">supervisé en post-mortem</text>

    <text x="1050" y="333" class="mono" font-size="13" font-weight="600" fill="#B58A2C">&lt; 1 s</text>
  </g>

  <!-- L2 — Supervised alert -->
  <g class="interactive" data-card="level-2" tabindex="0" role="button"
     aria-label="Niveau L2 — Alerte supervisée">
    <rect x="60" y="391" width="1080" height="80" rx="3"
          fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25"/>

    <text x="80" y="416" class="mono" font-size="14" font-weight="600" fill="#1F5560">L2</text>
    <text x="80" y="434" class="body" font-size="10" font-style="italic" fill="#5A5A5A">supervisé</text>

    <text x="220" y="418" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Drift score qualité · pattern anormal</text>
    <text x="220" y="436" class="body" font-size="11" fill="#5A5A5A">Score LLM-as-judge en baisse sur 24 h, hallucination locale</text>
    <text x="220" y="454" class="body" font-size="10" font-style="italic" fill="#1F5560">→ exemple : faithfulness score &lt; 0.85 sur l'agent commercial</text>

    <text x="540" y="418" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Alerte + suggestion rollback prompt</text>
    <text x="540" y="436" class="body" font-size="11" fill="#5A5A5A">Slack/PagerDuty + lien vers la trace fautive</text>
    <text x="540" y="454" class="body" font-size="10" font-style="italic" fill="#1F5560">on-call investigue, A/B test possible</text>

    <text x="870" y="418" class="display" font-size="13" font-weight="600" fill="#1A1A1A">SRE / on-call</text>
    <text x="870" y="436" class="body" font-size="10" fill="#5A5A5A">décide rollback ou tolère</text>

    <text x="1050" y="426" class="mono" font-size="13" font-weight="600" fill="#1F5560">&lt; 5 min</text>
  </g>

  <!-- L3 — Human investigation -->
  <g class="interactive" data-card="level-3" tabindex="0" role="button"
     aria-label="Niveau L3 — Investigation humaine">
    <rect x="60" y="484" width="1080" height="80" rx="3"
          fill="#FAF8F3" stroke="#5A5A5A" stroke-width="1.25"/>

    <text x="80" y="509" class="mono" font-size="14" font-weight="600" fill="#5A5A5A">L3</text>
    <text x="80" y="527" class="body" font-size="10" font-style="italic" fill="#5A5A5A">humain</text>

    <text x="220" y="511" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Pattern d'erreur complexe</text>
    <text x="220" y="529" class="body" font-size="11" fill="#5A5A5A">Coût qui explose, sélection d'outils erratique, boucles infinies</text>
    <text x="220" y="547" class="body" font-size="10" font-style="italic" fill="#5A5A5A">→ exemple : agent qui appelle 14 fois la même API</text>

    <text x="540" y="511" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Replay de trace · A/B test prompt</text>
    <text x="540" y="529" class="body" font-size="11" fill="#5A5A5A">Investigation manuelle, conversion trace → test case</text>
    <text x="540" y="547" class="body" font-size="10" font-style="italic" fill="#5A5A5A">post-mortem, mise à jour datasets eval</text>

    <text x="870" y="511" class="display" font-size="13" font-weight="600" fill="#1A1A1A">AI engineer</text>
    <text x="870" y="529" class="body" font-size="10" fill="#5A5A5A">+ data scientist</text>

    <text x="1050" y="519" class="mono" font-size="13" font-weight="600" fill="#5A5A5A">&lt; 1 h</text>
  </g>

  <!-- L4 — Strategic refactor -->
  <g class="interactive" data-card="level-4" tabindex="0" role="button"
     aria-label="Niveau L4 — Refactor stratégique">
    <rect x="60" y="577" width="1080" height="80" rx="3"
          fill="#B8B5AE" fill-opacity="0.15" stroke="#1A1A1A" stroke-width="1.25"/>

    <text x="80" y="602" class="mono" font-size="14" font-weight="600" fill="#1A1A1A">L4</text>
    <text x="80" y="620" class="body" font-size="10" font-style="italic" fill="#5A5A5A">stratégique</text>

    <text x="220" y="604" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Dégradation systémique</text>
    <text x="220" y="622" class="body" font-size="11" fill="#5A5A5A">Drift permanent, modèle obsolète, architecture inadaptée</text>
    <text x="220" y="640" class="body" font-size="10" font-style="italic" fill="#5A5A5A">→ exemple : passage Claude Sonnet 4 → Sonnet 4.6 + refonte RAG</text>

    <text x="540" y="604" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Refonte architecture · changement modèle</text>
    <text x="540" y="622" class="body" font-size="11" fill="#5A5A5A">Décision produit, changement de fournisseur ou modèle</text>
    <text x="540" y="640" class="body" font-size="10" font-style="italic" fill="#5A5A5A">migration encadrée, tests de régression</text>

    <text x="870" y="604" class="display" font-size="13" font-weight="600" fill="#1A1A1A">Tech lead + sponsor</text>
    <text x="870" y="622" class="body" font-size="10" fill="#5A5A5A">décision validée par CoE</text>

    <text x="1050" y="612" class="mono" font-size="13" font-weight="600" fill="#1A1A1A">jours</text>
  </g>

  <!-- The escalation arrow on the left -->
  <path d="M 30 220 L 30 640" stroke="#5A5A5A" stroke-width="1.25" fill="none" marker-end="url(#arrow-06)"/>
  <text x="20" y="430" class="body" font-size="9" font-style="italic" fill="#5A5A5A" transform="rotate(-90, 20, 430)" text-anchor="middle">escalade temporelle &amp; cognitive</text>

  <!-- ANNOTATION below -->
  <text x="60" y="697" class="body" font-size="11" font-style="italic" fill="#B7332C">
    Conversion trace → test case (innovation Braintrust) : tout incident L2/L3 résolu doit se transformer en cas de test permanent dans le dataset d'évaluation continue.
  </text>

  <!-- FOOTER -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="770" class="body" font-size="10" font-style="italic"
        fill="#5A5A5A">Sources : Braintrust « AI Observability Buyer's Guide 2026 », Voiceflow, Splunk AI Agent Monitoring</text>
  <text x="60" y="785" class="body" font-size="10" font-style="italic"
        fill="#B8B5AE">Méthodologie : taxonomie consolidée à partir de 6 référentiels d'alerting agentique observés en mission</text>
</svg>
