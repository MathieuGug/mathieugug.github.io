<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 1188" data-schema-id="schema-00" role="img" aria-labelledby="schema-00-title schema-00-desc">
  <title id="schema-00-title">Exec sum visuelle — La trace devient le produit</title>
  <desc id="schema-00-desc">Infographie A4 portrait. La trace devient le produit : la rupture paradigmatique (monitoring SNMP → APM → MELT cloud → cognitive) et le volume télémétrique ×50 d'un agent en prod ; les six piliers de la télémétrie agentique ; le bus d'observabilité (UI, orchestrateur, agents, data → OTel GenAI → 3 backends) ; OpenTelemetry comme standard anti-lock-in ; l'échelle de maturité N1-N5 avec le saut N2→N3 comme verrou.</desc>

  <defs>
    <style>
      .display { font-family: 'Fraunces', 'Spectral', Georgia, serif; }
      .body    { font-family: 'Inter', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
    <marker id="arr-obs" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6f7c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="840" height="1188" fill="#faf6ec"/>

  <!-- ============ HEADER ============ -->
  <text x="60" y="56" class="mono" font-size="12" font-weight="600" fill="#a83e55" letter-spacing="0.20em">OBSERVABILITÉ DES AGENTS IA · 30 AVRIL 2026</text>
  <text x="60" y="100" class="display" font-size="32" font-weight="600" fill="#1e1e2a">La trace devient le produit.</text>
  <text x="60" y="128" class="display" font-size="15" font-style="italic" fill="#6b6f7c">Du monitoring infra au cognitive audit trail.</text>
  <line x1="60" y1="148" x2="780" y2="148" stroke="rgba(30,30,42,0.16)" stroke-width="1"/>

  <!-- ============ MSG 01 — RUPTURE PARADIGMATIQUE ============ -->
  <g>
    <circle cx="84" cy="184" r="20" fill="none" stroke="#a83e55" stroke-width="1.5"/>
    <text x="84" y="191" class="mono" font-size="15" font-weight="600" fill="#a83e55" text-anchor="middle">01</text>
    <text x="120" y="179" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">RUPTURE PARADIGMATIQUE</text>
    <text x="120" y="200" class="display" font-size="19" font-weight="600" fill="#1e1e2a">L'observabilité IA s'empile, ne remplace pas.</text>

    <!-- 4 ères empilées en escalier -->
    <g transform="translate(60, 226)">
      <text x="0" y="0" class="mono" font-size="9" font-weight="600" fill="#a83e55" letter-spacing="0.12em">QUATRE PARADIGMES SUCCESSIFS</text>
      <g transform="translate(0, 14)">
        <rect x="0" y="0" width="200" height="22" fill="#a83e55" fill-opacity="0.08" stroke="#a83e55" stroke-opacity="0.35" stroke-width="0.5"/>
        <text x="10" y="15" class="body" font-size="10" fill="#1e1e2a">Monitoring SNMP / disponibilité</text>
        <text x="350" y="15" class="mono" font-size="9" fill="#9a9ca5">— années 2000</text>
      </g>
      <g transform="translate(0, 40)">
        <rect x="0" y="0" width="250" height="22" fill="#a83e55" fill-opacity="0.14" stroke="#a83e55" stroke-opacity="0.50" stroke-width="0.5"/>
        <text x="10" y="15" class="body" font-size="10" fill="#1e1e2a">APM applicatif (traces, métriques)</text>
        <text x="350" y="15" class="mono" font-size="9" fill="#9a9ca5">— années 2010</text>
      </g>
      <g transform="translate(0, 66)">
        <rect x="0" y="0" width="300" height="22" fill="#a83e55" fill-opacity="0.20" stroke="#a83e55" stroke-opacity="0.65" stroke-width="0.5"/>
        <text x="10" y="15" class="body" font-size="10" fill="#1e1e2a">MELT cloud-native (OpenTelemetry)</text>
        <text x="350" y="15" class="mono" font-size="9" fill="#9a9ca5">— 2018-2023</text>
      </g>
      <g transform="translate(0, 92)">
        <rect x="0" y="0" width="350" height="22" fill="#a83e55" fill-opacity="0.30" stroke="#a83e55" stroke-opacity="0.85" stroke-width="0.85"/>
        <text x="10" y="15" class="body" font-size="10" font-weight="600" fill="#1e1e2a">Cognitive audit trail (agents IA)</text>
        <text x="350" y="15" class="mono" font-size="9" fill="#a83e55">— 2024 → maintenant</text>
      </g>
    </g>

    <!-- Bar chart : volume télémétrique -->
    <g transform="translate(530, 220)">
      <text x="0" y="0" class="mono" font-size="9" font-weight="600" fill="#a83e55" letter-spacing="0.12em">VOLUME TÉLÉMÉTRIQUE</text>
      <text x="0" y="14" class="body" font-size="10" fill="#6b6f7c">vs service classique</text>

      <g transform="translate(0, 32)">
        <!-- Y-axis -->
        <text x="-4" y="6" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">×50</text>
        <text x="-4" y="40" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">×25</text>
        <text x="-4" y="74" class="mono" font-size="8" fill="#9a9ca5" text-anchor="end">×1</text>
        <line x1="0" y1="6" x2="220" y2="6" stroke="rgba(30,30,42,0.10)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="0" y1="40" x2="220" y2="40" stroke="rgba(30,30,42,0.10)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="0" y1="74" x2="220" y2="74" stroke="#1e1e2a" stroke-width="0.5"/>
        <line x1="0" y1="6" x2="0" y2="74" stroke="#1e1e2a" stroke-width="0.5"/>

        <!-- 3 bars : Service classique, App LLM, Agent IA -->
        <rect x="20"  y="71" width="50" height="3" fill="#1F5560" fill-opacity="0.30" stroke="#1F5560" stroke-width="0.75"/>
        <text x="45"  y="86" class="body" font-size="8.5" fill="#6b6f7c" text-anchor="middle">Service</text>
        <text x="45"  y="96" class="mono" font-size="9" fill="#1F5560" text-anchor="middle">×1</text>

        <rect x="90"  y="40" width="50" height="34" fill="#1F5560" fill-opacity="0.45" stroke="#1F5560" stroke-width="0.75"/>
        <text x="115" y="86" class="body" font-size="8.5" fill="#6b6f7c" text-anchor="middle">App LLM</text>
        <text x="115" y="96" class="mono" font-size="9" fill="#1F5560" text-anchor="middle">×25</text>

        <rect x="160" y="6" width="50" height="68" fill="#a83e55" fill-opacity="0.55" stroke="#a83e55" stroke-width="0.85"/>
        <text x="185" y="86" class="body" font-size="8.5" fill="#6b6f7c" text-anchor="middle">Agent IA</text>
        <text x="185" y="96" class="mono" font-size="9" fill="#a83e55" font-weight="600" text-anchor="middle">×50</text>
      </g>
    </g>
  </g>

  <!-- ============ MSG 02 — SIX PILIERS ============ -->
  <g>
    <circle cx="84" cy="402" r="20" fill="none" stroke="#1F5560" stroke-width="1.5"/>
    <text x="84" y="409" class="mono" font-size="15" font-weight="600" fill="#1F5560" text-anchor="middle">02</text>
    <text x="120" y="397" class="mono" font-size="11" font-weight="600" fill="#1F5560" letter-spacing="0.14em">SIX PILIERS</text>
    <text x="120" y="418" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Ce qu'un agent en production rend visible.</text>

    <!-- 6 piliers grid 3×2 -->
    <g transform="translate(60, 444)">
      <rect x="0" y="0" width="225" height="48" rx="2" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-opacity="0.50" stroke-width="0.6"/>
      <text x="12" y="18" class="mono" font-size="9" font-weight="600" fill="#1F5560" letter-spacing="0.14em">USAGE + TOKENS</text>
      <text x="12" y="36" class="body" font-size="10" fill="#1e1e2a">Coût, débit, distribution par cas</text>

      <rect x="240" y="0" width="225" height="48" rx="2" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-opacity="0.50" stroke-width="0.6"/>
      <text x="252" y="18" class="mono" font-size="9" font-weight="600" fill="#1F5560" letter-spacing="0.14em">PERFORMANCE</text>
      <text x="252" y="36" class="body" font-size="10" fill="#1e1e2a">Latence, time-to-first-token, p95</text>

      <rect x="480" y="0" width="225" height="48" rx="2" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-opacity="0.50" stroke-width="0.6"/>
      <text x="492" y="18" class="mono" font-size="9" font-weight="600" fill="#1F5560" letter-spacing="0.14em">COMPORTEMENT</text>
      <text x="492" y="36" class="body" font-size="10" fill="#1e1e2a">Tool calls, plan, boucle, abandon</text>

      <rect x="0" y="58" width="225" height="48" rx="2" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-opacity="0.60" stroke-width="0.6"/>
      <text x="12" y="76" class="mono" font-size="9" font-weight="600" fill="#1F5560" letter-spacing="0.14em">QUALITÉ</text>
      <text x="12" y="94" class="body" font-size="10" fill="#1e1e2a">Scorers LAJ, rubriques, eval</text>

      <rect x="240" y="58" width="225" height="48" rx="2" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-opacity="0.60" stroke-width="0.6"/>
      <text x="252" y="76" class="mono" font-size="9" font-weight="600" fill="#1F5560" letter-spacing="0.14em">GOUVERNANCE</text>
      <text x="252" y="94" class="body" font-size="10" fill="#1e1e2a">Guardrails, PII, conformité audit</text>

      <rect x="480" y="58" width="225" height="48" rx="2" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-opacity="0.60" stroke-width="0.6"/>
      <text x="492" y="76" class="mono" font-size="9" font-weight="600" fill="#1F5560" letter-spacing="0.14em">DRIFT + FIABILITÉ</text>
      <text x="492" y="94" class="body" font-size="10" fill="#1e1e2a">Régressions, pass^k, instabilité</text>
    </g>
  </g>

  <!-- ============ MSG 03 — BUS D'OBSERVABILITÉ ============ -->
  <g>
    <circle cx="84" cy="614" r="20" fill="none" stroke="#2F5D3F" stroke-width="1.5"/>
    <text x="84" y="621" class="mono" font-size="15" font-weight="600" fill="#2F5D3F" text-anchor="middle">03</text>
    <text x="120" y="609" class="mono" font-size="11" font-weight="600" fill="#2F5D3F" letter-spacing="0.14em">UN INSTRUMENT, N BACKENDS</text>
    <text x="120" y="630" class="display" font-size="19" font-weight="600" fill="#1e1e2a">OTel GenAI, la colonne vertébrale.</text>

    <!-- Bus layout : sources à gauche → bus central → backends à droite -->
    <g transform="translate(60, 660)">
      <!-- Sources -->
      <rect x="0" y="0" width="160" height="28" rx="2" fill="#2F5D3F" fill-opacity="0.10" stroke="#2F5D3F" stroke-opacity="0.50" stroke-width="0.6"/>
      <text x="80" y="18" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">UI / Gateway</text>
      <rect x="0" y="34" width="160" height="28" rx="2" fill="#2F5D3F" fill-opacity="0.14" stroke="#2F5D3F" stroke-opacity="0.55" stroke-width="0.6"/>
      <text x="80" y="52" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">Orchestrateur</text>
      <rect x="0" y="68" width="160" height="28" rx="2" fill="#2F5D3F" fill-opacity="0.20" stroke="#2F5D3F" stroke-opacity="0.65" stroke-width="0.6"/>
      <text x="80" y="86" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">Agents / LLM</text>
      <rect x="0" y="102" width="160" height="28" rx="2" fill="#2F5D3F" fill-opacity="0.26" stroke="#2F5D3F" stroke-opacity="0.75" stroke-width="0.6"/>
      <text x="80" y="120" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">Data / Tools / MCP</text>

      <!-- Bus central -->
      <rect x="240" y="34" width="180" height="62" rx="3" fill="#a83e55" fill-opacity="0.10" stroke="#a83e55" stroke-opacity="0.65" stroke-width="0.85"/>
      <text x="330" y="58" class="mono" font-size="10" font-weight="600" fill="#a83e55" text-anchor="middle" letter-spacing="0.12em">OTel COLLECTOR</text>
      <text x="330" y="76" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">Conventions GenAI</text>
      <text x="330" y="90" class="body" font-size="9" fill="#6b6f7c" text-anchor="middle" font-style="italic">spans · attributs · events</text>

      <!-- Backends -->
      <rect x="500" y="0" width="190" height="28" rx="2" fill="#1F5560" fill-opacity="0.12" stroke="#1F5560" stroke-opacity="0.55" stroke-width="0.6"/>
      <text x="595" y="18" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">APM (Datadog · Dynatrace)</text>
      <rect x="500" y="34" width="190" height="28" rx="2" fill="#1F5560" fill-opacity="0.18" stroke="#1F5560" stroke-opacity="0.65" stroke-width="0.6"/>
      <text x="595" y="52" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">AI-native (Langfuse · Arize)</text>
      <rect x="500" y="68" width="190" height="28" rx="2" fill="#1F5560" fill-opacity="0.22" stroke="#1F5560" stroke-opacity="0.70" stroke-width="0.6"/>
      <text x="595" y="86" class="body" font-size="10" fill="#1e1e2a" text-anchor="middle">SIEM / Audit</text>
      <rect x="500" y="102" width="190" height="28" rx="2" fill="#1F5560" fill-opacity="0.10" stroke="#1F5560" stroke-opacity="0.50" stroke-width="0.55" stroke-dasharray="3,3"/>
      <text x="595" y="120" class="body" font-size="10" fill="#6b6f7c" text-anchor="middle" font-style="italic">Tout autre backend OTel</text>

      <!-- Arrows -->
      <line x1="165" y1="50" x2="234" y2="58" stroke="#6b6f7c" stroke-width="0.8" marker-end="url(#arr-obs)"/>
      <line x1="165" y1="82" x2="234" y2="72" stroke="#6b6f7c" stroke-width="0.8" marker-end="url(#arr-obs)"/>
      <line x1="425" y1="50" x2="494" y2="20" stroke="#6b6f7c" stroke-width="0.8" marker-end="url(#arr-obs)"/>
      <line x1="425" y1="65" x2="494" y2="50" stroke="#6b6f7c" stroke-width="0.8" marker-end="url(#arr-obs)"/>
      <line x1="425" y1="80" x2="494" y2="80" stroke="#6b6f7c" stroke-width="0.8" marker-end="url(#arr-obs)"/>
      <line x1="425" y1="95" x2="494" y2="118" stroke="#6b6f7c" stroke-width="0.8" stroke-dasharray="3,3" marker-end="url(#arr-obs)"/>
    </g>
  </g>

  <!-- ============ MSG 04 — STANDARD ANTI-LOCK-IN ============ -->
  <g>
    <circle cx="84" cy="832" r="20" fill="none" stroke="#B58A2C" stroke-width="1.5"/>
    <text x="84" y="839" class="mono" font-size="15" font-weight="600" fill="#B58A2C" text-anchor="middle">04</text>
    <text x="120" y="827" class="mono" font-size="11" font-weight="600" fill="#B58A2C" letter-spacing="0.14em">STANDARD ANTI-LOCK-IN</text>
    <text x="120" y="848" class="display" font-size="19" font-weight="600" fill="#1e1e2a">OTel GenAI v1.37+ — la facture évite la cage.</text>

    <g transform="translate(120, 872)">
      <text x="0" y="0" class="body" font-size="11" fill="#1e1e2a">Workload IA = <tspan font-weight="600">×10 à ×50</tspan> de télémétrie vs service classique. Coût et lock-in explosent vite.</text>
      <text x="0" y="18" class="body" font-size="11" fill="#1e1e2a">Instrumenter en <tspan font-weight="600">OTel GenAI</tspan> (stabilisation S2 2026) → un seul SDK, N backends interchangeables.</text>
      <line x1="0" y1="36" x2="600" y2="36" stroke="#B58A2C" stroke-opacity="0.30" stroke-width="0.5"/>
      <text x="0" y="56" class="body" font-size="10.5" fill="#6b6f7c" font-style="italic">Le facteur déterminant 2026 : pouvoir changer de backend sans réinstrumenter 200 services.</text>
    </g>
  </g>

  <!-- ============ MSG 05 — ÉCHELLE DE MATURITÉ ============ -->
  <g>
    <circle cx="84" cy="990" r="20" fill="none" stroke="#a83e55" stroke-width="1.5"/>
    <text x="84" y="997" class="mono" font-size="15" font-weight="600" fill="#a83e55" text-anchor="middle">05</text>
    <text x="120" y="985" class="mono" font-size="11" font-weight="600" fill="#a83e55" letter-spacing="0.14em">ÉCHELLE DE MATURITÉ</text>
    <text x="120" y="1006" class="display" font-size="19" font-weight="600" fill="#1e1e2a">Cinq niveaux, un seul verrou.</text>

    <g transform="translate(60, 1032)">
      <rect x="0" y="0" width="135" height="56" rx="2" fill="#6b6f7c" fill-opacity="0.10" stroke="#6b6f7c" stroke-opacity="0.40" stroke-width="0.6"/>
      <text x="67" y="18" class="mono" font-size="10" font-weight="600" fill="#6b6f7c" text-anchor="middle">N1</text>
      <text x="67" y="36" class="body" font-size="9.5" fill="#1e1e2a" text-anchor="middle">Réactif</text>
      <text x="67" y="48" class="body" font-size="8.5" fill="#9a9ca5" text-anchor="middle" font-style="italic">logs ad hoc</text>

      <rect x="145" y="0" width="135" height="56" rx="2" fill="#1F5560" fill-opacity="0.14" stroke="#1F5560" stroke-opacity="0.55" stroke-width="0.6"/>
      <text x="212" y="18" class="mono" font-size="10" font-weight="600" fill="#1F5560" text-anchor="middle">N2</text>
      <text x="212" y="36" class="body" font-size="9.5" fill="#1e1e2a" text-anchor="middle">Structuré</text>
      <text x="212" y="48" class="body" font-size="8.5" fill="#9a9ca5" text-anchor="middle" font-style="italic">métriques + traces</text>

      <rect x="290" y="0" width="135" height="56" rx="2" fill="#a83e55" fill-opacity="0.22" stroke="#a83e55" stroke-opacity="0.85" stroke-width="0.9"/>
      <text x="357" y="18" class="mono" font-size="10" font-weight="600" fill="#a83e55" text-anchor="middle">N3 — verrou</text>
      <text x="357" y="36" class="body" font-size="9.5" font-weight="600" fill="#1e1e2a" text-anchor="middle">Cognitif</text>
      <text x="357" y="48" class="body" font-size="8.5" fill="#a83e55" text-anchor="middle" font-style="italic">qualité opposable</text>

      <rect x="435" y="0" width="135" height="56" rx="2" fill="#2F5D3F" fill-opacity="0.18" stroke="#2F5D3F" stroke-opacity="0.60" stroke-width="0.6"/>
      <text x="502" y="18" class="mono" font-size="10" font-weight="600" fill="#2F5D3F" text-anchor="middle">N4</text>
      <text x="502" y="36" class="body" font-size="9.5" fill="#1e1e2a" text-anchor="middle">Auto-supervisé</text>
      <text x="502" y="48" class="body" font-size="8.5" fill="#9a9ca5" text-anchor="middle" font-style="italic">RCA + remédiation</text>

      <rect x="580" y="0" width="135" height="56" rx="2" fill="#B58A2C" fill-opacity="0.22" stroke="#B58A2C" stroke-opacity="0.70" stroke-width="0.6"/>
      <text x="647" y="18" class="mono" font-size="10" font-weight="600" fill="#B58A2C" text-anchor="middle">N5</text>
      <text x="647" y="36" class="body" font-size="9.5" fill="#1e1e2a" text-anchor="middle">Autonome</text>
      <text x="647" y="48" class="body" font-size="8.5" fill="#9a9ca5" text-anchor="middle" font-style="italic">SLO cognitif</text>
    </g>
  </g>

  <!-- ============ FOOTER ============ -->
  <line x1="60" y1="1112" x2="780" y2="1112" stroke="rgba(30,30,42,0.16)" stroke-width="0.5"/>
  <text x="60" y="1138" class="mono" font-size="9" fill="#9a9ca5" letter-spacing="0.18em">MATHIEU GUGLIELMINO · MATHIEUGUG.GITHUB.IO/OBSERVABILITE-AGENTS-IA</text>
  <text x="780" y="1138" class="mono" font-size="9" fill="#9a9ca5" letter-spacing="0.14em" text-anchor="end">A4 · SYNTHÈSE EXÉCUTIVE</text>
</svg>
