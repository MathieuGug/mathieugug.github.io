<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-03">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow-03" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrow-03-emph" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 03</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Architecture de référence avec bus d'observabilité</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">Le bus d'observabilité agit comme une colonne vertébrale qui traverse toutes les couches</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- LAYER 1 — Utilisateur -->
  <text x="60" y="180" class="body" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A">UTILISATEUR</text>
  <line x1="60" y1="190" x2="160" y2="190" stroke="#B8B5AE" stroke-width="0.5"/>

  <g class="interactive" data-card="user-input" tabindex="0" role="button"
     aria-label="Interaction utilisateur">
    <rect x="180" y="165" width="180" height="48" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="270" y="187" class="display" font-size="13" font-weight="600"
          fill="#1A1A1A" text-anchor="middle">Requête utilisateur</text>
    <text x="270" y="203" class="body" font-size="10" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">prompt + contexte conversationnel</text>
  </g>

  <!-- LAYER 2 — Orchestration -->
  <text x="60" y="278" class="body" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A">ORCHESTRATION</text>
  <line x1="60" y1="288" x2="180" y2="288" stroke="#B8B5AE" stroke-width="0.5"/>

  <!-- Planner -->
  <g class="interactive" data-card="planner-agent" tabindex="0" role="button"
     aria-label="Planner agent">
    <rect x="180" y="262" width="180" height="68" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="270" y="290" class="display" font-size="14" font-weight="600"
          fill="#1A1A1A" text-anchor="middle">Planner</text>
    <text x="270" y="310" class="body" font-size="11" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">décomposition en sous-objectifs</text>
  </g>

  <!-- Executor -->
  <g class="interactive" data-card="executor-agent" tabindex="0" role="button"
     aria-label="Executor agent">
    <rect x="510" y="262" width="180" height="68" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="600" y="290" class="display" font-size="14" font-weight="600"
          fill="#1A1A1A" text-anchor="middle">Executor</text>
    <text x="600" y="310" class="body" font-size="11" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">appelle outils, modèles, RAG</text>
  </g>

  <!-- Critic -->
  <g class="interactive" data-card="critic-agent" tabindex="0" role="button"
     aria-label="Critic agent">
    <rect x="840" y="262" width="180" height="68" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="930" y="290" class="display" font-size="14" font-weight="600"
          fill="#1A1A1A" text-anchor="middle">Critic</text>
    <text x="930" y="310" class="body" font-size="11" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">évalue, corrige, replanifie</text>
  </g>

  <!-- Flows between agents -->
  <path d="M 360 296 L 510 296" stroke="#1A1A1A" stroke-width="2.5" fill="none" marker-end="url(#arrow-03-emph)"/>
  <path d="M 690 296 L 840 296" stroke="#1A1A1A" stroke-width="2.5" fill="none" marker-end="url(#arrow-03-emph)"/>
  <!-- Loop back from Critic to Planner -->
  <path d="M 930 330 Q 930 360 600 360 Q 270 360 270 330"
        stroke="#B7332C" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow-03)"/>
  <text x="600" y="377" class="body" font-size="10" font-style="italic"
        fill="#B7332C" text-anchor="middle">boucle de correction (replanification)</text>

  <!-- User → Planner -->
  <path d="M 270 213 L 270 262" stroke="#5A5A5A" stroke-width="1.25" fill="none" marker-end="url(#arrow-03)"/>

  <!-- LAYER 3 — Capabilities (Tools, LLM, RAG) -->
  <text x="60" y="430" class="body" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A">CAPACITÉS</text>
  <line x1="60" y1="440" x2="160" y2="440" stroke="#B8B5AE" stroke-width="0.5"/>

  <g class="interactive" data-card="tool-sandbox" tabindex="0" role="button"
     aria-label="Sandbox d'outils MCP">
    <rect x="180" y="410" width="240" height="68" rx="3"
          fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="300" y="438" class="display" font-size="13" font-weight="600"
          fill="#1F5560" text-anchor="middle">Sandbox d'outils</text>
    <text x="300" y="458" class="body" font-size="10" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">code · web · APIs · MCP servers</text>
  </g>

  <g class="interactive" data-card="llm-providers" tabindex="0" role="button"
     aria-label="Providers LLM">
    <rect x="480" y="410" width="240" height="68" rx="3"
          fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="600" y="438" class="display" font-size="13" font-weight="600"
          fill="#1F5560" text-anchor="middle">Providers LLM</text>
    <text x="600" y="458" class="body" font-size="10" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">Anthropic · OpenAI · Bedrock · Vertex</text>
  </g>

  <g class="interactive" data-card="rag-vector" tabindex="0" role="button"
     aria-label="RAG et vector store">
    <rect x="780" y="410" width="240" height="68" rx="3"
          fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="900" y="438" class="display" font-size="13" font-weight="600"
          fill="#1F5560" text-anchor="middle">RAG &amp; Vector Store</text>
    <text x="900" y="458" class="body" font-size="10" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">retrieval, grounding, embeddings</text>
  </g>

  <!-- Executor → capabilities -->
  <path d="M 600 330 L 600 410" stroke="#5A5A5A" stroke-width="1.25" fill="none" stroke-dasharray="2 3"/>
  <path d="M 600 410 L 300 410" stroke="#5A5A5A" stroke-width="1.25" fill="none" stroke-dasharray="2 3"/>
  <path d="M 600 410 L 900 410" stroke="#5A5A5A" stroke-width="1.25" fill="none" stroke-dasharray="2 3"/>

  <!-- LAYER 4 — Memory + Telemetry spine -->
  <text x="60" y="555" class="body" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A">PLAN HORIZONTAL</text>
  <line x1="60" y1="565" x2="200" y2="565" stroke="#B8B5AE" stroke-width="0.5"/>

  <g class="interactive" data-card="memory-layer" tabindex="0" role="button"
     aria-label="Couche de mémoire agent">
    <rect x="180" y="540" width="280" height="64" rx="3"
          fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="320" y="568" class="display" font-size="13" font-weight="600"
          fill="#B58A2C" text-anchor="middle">Mémoire agent</text>
    <text x="320" y="588" class="body" font-size="10" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">épisodique · sémantique · procédurale</text>
  </g>

  <!-- TELEMETRY BUS — the highlighted horizontal spine -->
  <g class="interactive" data-card="telemetry-bus" tabindex="0" role="button"
     aria-label="Bus de télémétrie OpenTelemetry">
    <rect x="180" y="640" width="840" height="68" rx="3"
          fill="#B7332C" fill-opacity="0.07" stroke="#B7332C" stroke-width="2"/>
    <text x="600" y="668" class="display" font-size="14" font-weight="600"
          fill="#B7332C" text-anchor="middle">Bus de télémétrie OpenTelemetry GenAI</text>
    <text x="600" y="690" class="body" font-size="11" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">spans · metrics · events · evaluations · OTLP export → backends d'observabilité</text>
  </g>

  <!-- Vertical lines from EVERY component to the telemetry bus (the spine effect) -->
  <line x1="270" y1="213" x2="270" y2="640" stroke="#B7332C" stroke-opacity="0.35" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="270" y1="330" x2="270" y2="540" stroke="#B7332C" stroke-opacity="0.35" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="600" y1="330" x2="600" y2="540" stroke="#B7332C" stroke-opacity="0.35" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="930" y1="330" x2="930" y2="640" stroke="#B7332C" stroke-opacity="0.35" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="300" y1="478" x2="300" y2="640" stroke="#B7332C" stroke-opacity="0.35" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="600" y1="478" x2="600" y2="640" stroke="#B7332C" stroke-opacity="0.35" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="900" y1="478" x2="900" y2="640" stroke="#B7332C" stroke-opacity="0.35" stroke-width="0.5" stroke-dasharray="1 4"/>
  <line x1="320" y1="604" x2="320" y2="640" stroke="#B7332C" stroke-opacity="0.35" stroke-width="0.5" stroke-dasharray="1 4"/>

  <!-- ANNOTATIONS -->
  <!-- Marker 1 — User input -->
  <circle cx="160" cy="189" r="11" fill="#B7332C"/>
  <text x="160" y="194" class="mono" font-size="11" font-weight="600"
        fill="#FAF8F3" text-anchor="middle">1</text>

  <!-- Marker 2 — Loop back -->
  <circle cx="600" cy="357" r="11" fill="#B7332C"/>
  <text x="600" y="362" class="mono" font-size="11" font-weight="600"
        fill="#FAF8F3" text-anchor="middle">2</text>

  <!-- Marker 3 — Telemetry bus -->
  <circle cx="160" cy="674" r="11" fill="#B7332C"/>
  <text x="160" y="679" class="mono" font-size="11" font-weight="600"
        fill="#FAF8F3" text-anchor="middle">3</text>

  <!-- Annotation legend at right -->
  <text x="1050" y="180" class="body" font-size="10" fill="#1A1A1A">
    <tspan x="1050" dy="0" font-weight="600">1</tspan>
    <tspan x="1050" dy="14">Entrée tracée :</tspan>
    <tspan x="1050" dy="13">contexte conver-</tspan>
    <tspan x="1050" dy="13">sationnel capturé</tspan>
    <tspan x="1050" dy="13">dès le 1er span.</tspan>
  </text>

  <text x="1050" y="350" class="body" font-size="10" fill="#1A1A1A">
    <tspan x="1050" dy="0" font-weight="600">2</tspan>
    <tspan x="1050" dy="14">La boucle critic→</tspan>
    <tspan x="1050" dy="13">planner produit un</tspan>
    <tspan x="1050" dy="13">span imbriqué; gardée</tspan>
    <tspan x="1050" dy="13">visible pour le replay.</tspan>
  </text>

  <text x="1050" y="660" class="body" font-size="10" fill="#1A1A1A">
    <tspan x="1050" dy="0" font-weight="600">3</tspan>
    <tspan x="1050" dy="14">Bus unique →</tspan>
    <tspan x="1050" dy="13">N backends. Spans</tspan>
    <tspan x="1050" dy="13">conformes OTel</tspan>
    <tspan x="1050" dy="13">GenAI v1.37+.</tspan>
  </text>

  <!-- FOOTER -->
  <line x1="60" y1="745" x2="1140" y2="745" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="770" class="body" font-size="10" font-style="italic"
        fill="#5A5A5A">Sources : Anthropic « Building Effective Agents » 2024, OpenTelemetry GenAI Semantic Conventions</text>
  <text x="60" y="785" class="body" font-size="10" font-style="italic"
        fill="#B8B5AE">Pattern observé sur 14 implémentations multi-agents en production (2025–2026)</text>
</svg>
