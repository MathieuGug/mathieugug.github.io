<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-08">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow-08" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 08</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Échelle de maturité — du monitoring réactif à l'autonomie</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">Cinq niveaux pour situer l'organisation et planifier la trajectoire 2026–2028</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- The progression - escalier ascendant -->
  <!-- Step heights/widths: each step is 200 wide, ascending heights -->
  <!-- baseline at y=620 -->

  <!-- L1 -->
  <g class="interactive" data-card="maturity-l1" tabindex="0" role="button"
     aria-label="Niveau 1 — Monitoring réactif">
    <rect x="100" y="500" width="200" height="120" rx="3"
          fill="#B8B5AE" fill-opacity="0.15" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="120" y="528" class="mono" font-size="11" font-weight="600" fill="#5A5A5A">N1</text>
    <text x="120" y="552" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Monitoring</text>
    <text x="120" y="572" class="display" font-size="14" font-weight="600" fill="#1A1A1A">réactif</text>

    <line x1="120" y1="582" x2="280" y2="582" stroke="#5A5A5A" stroke-opacity="0.3" stroke-width="0.5"/>

    <text x="120" y="600" class="body" font-size="10" font-style="italic" fill="#5A5A5A">logs manuels · debug ad-hoc</text>
    <text x="120" y="613" class="body" font-size="10" font-style="italic" fill="#5A5A5A">pas de traces, alertes basiques</text>
  </g>

  <!-- L2 -->
  <g class="interactive" data-card="maturity-l2" tabindex="0" role="button"
     aria-label="Niveau 2 — Observabilité structurée">
    <rect x="300" y="430" width="200" height="190" rx="3"
          fill="#1F5560" fill-opacity="0.08" stroke="#1F5560" stroke-width="1.25"/>
    <text x="320" y="458" class="mono" font-size="11" font-weight="600" fill="#1F5560">N2</text>
    <text x="320" y="482" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Observabilité</text>
    <text x="320" y="502" class="display" font-size="14" font-weight="600" fill="#1A1A1A">structurée</text>

    <line x1="320" y1="512" x2="480" y2="512" stroke="#1F5560" stroke-opacity="0.3" stroke-width="0.5"/>

    <text x="320" y="530" class="body" font-size="10" font-style="italic" fill="#5A5A5A">tracing distribué OTel</text>
    <text x="320" y="543" class="body" font-size="10" font-style="italic" fill="#5A5A5A">dashboards latence/tokens</text>
    <text x="320" y="556" class="body" font-size="10" font-style="italic" fill="#5A5A5A">alertes seuil multi-signal</text>

    <line x1="320" y1="575" x2="480" y2="575" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="320" y="592" class="mono" font-size="9" font-weight="500" fill="#5A5A5A">PRÉREQUIS</text>
    <text x="320" y="608" class="body" font-size="10" fill="#1A1A1A">SDK + collector déployés</text>
  </g>

  <!-- L3 -->
  <g class="interactive" data-card="maturity-l3" tabindex="0" role="button"
     aria-label="Niveau 3 — Évaluation continue">
    <rect x="500" y="350" width="200" height="270" rx="3"
          fill="#B58A2C" fill-opacity="0.10" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="520" y="378" class="mono" font-size="11" font-weight="600" fill="#B58A2C">N3</text>
    <text x="520" y="402" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Évaluation</text>
    <text x="520" y="422" class="display" font-size="14" font-weight="600" fill="#1A1A1A">continue</text>

    <line x1="520" y1="432" x2="680" y2="432" stroke="#B58A2C" stroke-opacity="0.3" stroke-width="0.5"/>

    <text x="520" y="450" class="body" font-size="10" font-style="italic" fill="#5A5A5A">LLM-as-judge online</text>
    <text x="520" y="463" class="body" font-size="10" font-style="italic" fill="#5A5A5A">guardrails runtime</text>
    <text x="520" y="476" class="body" font-size="10" font-style="italic" fill="#5A5A5A">feedback loops humains</text>
    <text x="520" y="489" class="body" font-size="10" font-style="italic" fill="#5A5A5A">drift detection</text>

    <line x1="520" y1="508" x2="680" y2="508" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="520" y="525" class="mono" font-size="9" font-weight="500" fill="#5A5A5A">PRÉREQUIS</text>
    <text x="520" y="541" class="body" font-size="10" fill="#1A1A1A">datasets de référence</text>
    <text x="520" y="555" class="body" font-size="10" fill="#1A1A1A">scorers calibrés</text>

    <text x="520" y="585" class="mono" font-size="9" font-weight="500" fill="#B7332C">PALIER COGNITIF</text>
    <text x="520" y="601" class="body" font-size="10" font-style="italic" fill="#B7332C">la qualité devient une métrique opérationnelle</text>
  </g>

  <!-- L4 -->
  <g class="interactive" data-card="maturity-l4" tabindex="0" role="button"
     aria-label="Niveau 4 — Autonomie supervisée">
    <rect x="700" y="270" width="200" height="350" rx="3"
          fill="#B7332C" fill-opacity="0.07" stroke="#B7332C" stroke-width="1.25"/>
    <text x="720" y="298" class="mono" font-size="11" font-weight="600" fill="#B7332C">N4</text>
    <text x="720" y="322" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Autonomie</text>
    <text x="720" y="342" class="display" font-size="14" font-weight="600" fill="#1A1A1A">supervisée</text>

    <line x1="720" y1="352" x2="880" y2="352" stroke="#B7332C" stroke-opacity="0.3" stroke-width="0.5"/>

    <text x="720" y="370" class="body" font-size="10" font-style="italic" fill="#5A5A5A">auto-remédiation L0/L1</text>
    <text x="720" y="383" class="body" font-size="10" font-style="italic" fill="#5A5A5A">rollback automatique</text>
    <text x="720" y="396" class="body" font-size="10" font-style="italic" fill="#5A5A5A">scaling intelligent</text>
    <text x="720" y="409" class="body" font-size="10" font-style="italic" fill="#5A5A5A">workflows agentiques</text>

    <line x1="720" y1="428" x2="880" y2="428" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="720" y="445" class="mono" font-size="9" font-weight="500" fill="#5A5A5A">PRÉREQUIS</text>
    <text x="720" y="461" class="body" font-size="10" fill="#1A1A1A">runbook automatisé</text>
    <text x="720" y="475" class="body" font-size="10" fill="#1A1A1A">human-in-the-loop défini</text>
    <text x="720" y="489" class="body" font-size="10" fill="#1A1A1A">SLO mesurables</text>

    <text x="720" y="518" class="mono" font-size="9" font-weight="500" fill="#B7332C">RÔLE TYPIQUE</text>
    <text x="720" y="534" class="body" font-size="10" fill="#1A1A1A">SRE-IA + plateforme</text>
    <text x="720" y="548" class="body" font-size="10" fill="#1A1A1A">d'observabilité unifiée</text>

    <text x="720" y="585" class="body" font-size="10" font-style="italic" fill="#5A5A5A">cible 2026 pour la majorité</text>
    <text x="720" y="600" class="body" font-size="10" font-style="italic" fill="#5A5A5A">des programmes IA enterprise</text>
  </g>

  <!-- L5 -->
  <g class="interactive" data-card="maturity-l5" tabindex="0" role="button"
     aria-label="Niveau 5 — Autonomie complète">
    <rect x="900" y="200" width="200" height="420" rx="3"
          fill="#B7332C" fill-opacity="0.12" stroke="#B7332C" stroke-width="2"/>
    <text x="920" y="228" class="mono" font-size="11" font-weight="600" fill="#B7332C">N5</text>
    <text x="920" y="252" class="display" font-size="14" font-weight="600" fill="#1A1A1A">Autonomie</text>
    <text x="920" y="272" class="display" font-size="14" font-weight="600" fill="#1A1A1A">complète</text>

    <line x1="920" y1="282" x2="1080" y2="282" stroke="#B7332C" stroke-opacity="0.3" stroke-width="0.5"/>

    <text x="920" y="300" class="body" font-size="10" font-style="italic" fill="#5A5A5A">agents d'observabilité</text>
    <text x="920" y="313" class="body" font-size="10" font-style="italic" fill="#5A5A5A">auto-optimisation prompts</text>
    <text x="920" y="326" class="body" font-size="10" font-style="italic" fill="#5A5A5A">gouvernance AI-driven</text>
    <text x="920" y="339" class="body" font-size="10" font-style="italic" fill="#5A5A5A">remédiation autonome L2/L3</text>

    <line x1="920" y1="358" x2="1080" y2="358" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="920" y="375" class="mono" font-size="9" font-weight="500" fill="#5A5A5A">PRÉREQUIS</text>
    <text x="920" y="391" class="body" font-size="10" fill="#1A1A1A">cognitive audit trail</text>
    <text x="920" y="405" class="body" font-size="10" fill="#1A1A1A">policies versionnées</text>
    <text x="920" y="419" class="body" font-size="10" fill="#1A1A1A">multi-agent orchestrator</text>

    <text x="920" y="448" class="mono" font-size="9" font-weight="500" fill="#B7332C">RÔLE TYPIQUE</text>
    <text x="920" y="464" class="body" font-size="10" fill="#1A1A1A">AI Operations Engineer</text>
    <text x="920" y="478" class="body" font-size="10" fill="#1A1A1A">+ AI Governance Officer</text>

    <text x="920" y="510" class="mono" font-size="9" font-weight="500" fill="#1A1A1A">EXEMPLES VENDOR</text>
    <text x="920" y="526" class="body" font-size="10" fill="#1A1A1A">Dynatrace Intelligence</text>
    <text x="920" y="540" class="body" font-size="10" fill="#1A1A1A">Splunk Troubleshooting</text>
    <text x="920" y="554" class="body" font-size="10" fill="#1A1A1A">Agent · Datadog Bits AI</text>

    <text x="920" y="585" class="body" font-size="10" font-style="italic" fill="#B7332C">horizon 2027–2028</text>
    <text x="920" y="600" class="body" font-size="10" font-style="italic" fill="#B7332C">sur scope limité</text>
  </g>

  <!-- baseline -->
  <line x1="80" y1="620" x2="1120" y2="620" stroke="#1A1A1A" stroke-width="1"/>

  <!-- Trajectory arrow -->
  <path d="M 80 660 L 1100 660" stroke="#5A5A5A" stroke-width="1" fill="none"
        stroke-dasharray="4 3" marker-end="url(#arrow-08)"/>
  <text x="80" y="680" class="body" font-size="11" font-weight="500" fill="#1A1A1A">État typique 2024</text>
  <text x="500" y="680" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">→ état typique 2026 (cible enterprise)</text>
  <text x="1100" y="680" class="body" font-size="11" font-weight="500" fill="#B7332C" text-anchor="end">horizon 2027–28</text>

  <!-- ANNOTATION -->
  <text x="60" y="720" class="body" font-size="11" font-style="italic" fill="#5A5A5A">
    <tspan x="60" dy="0">Le passage de N2 à N3 est le saut le plus dur : il exige de définir « qu'est-ce qu'une réponse correcte ? » de façon mesurable.</tspan>
    <tspan x="60" dy="16">Sans datasets de référence et scorers calibrés, le pilier qualité reste une intuition humaine — et l'agent ne peut pas être gouverné à l'échelle.</tspan>
  </text>

  <!-- FOOTER -->
  <line x1="60" y1="755" x2="1140" y2="755" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="780" class="body" font-size="10" font-style="italic"
        fill="#5A5A5A">Sources : IBM Think 2026, Dynatrace Six Predictions 2026, n-iX ; modèle adapté de SRE maturity → observability AI</text>
</svg>
