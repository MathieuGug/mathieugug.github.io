<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" data-schema-id="schema-07">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow-07" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 07</text>
  <text x="60" y="92" class="display" font-size="24" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Quadrant : maturité plateforme &times; capacité IA-native</text>
  <text x="60" y="116" class="display" font-size="14" font-style="italic"
        fill="#5A5A5A">Le double marché 2026 — incumbents APM en convergence vs challengers eval-first</text>
  <line x1="60" y1="138" x2="840" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- AXES -->
  <!-- Y axis -->
  <line x1="180" y1="200" x2="180" y2="760" stroke="#1A1A1A" stroke-width="1.25" marker-start="url(#arrow-07)"/>
  <text x="170" y="200" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="end">+</text>
  <text x="170" y="775" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="end">–</text>

  <!-- X axis -->
  <line x1="180" y1="760" x2="820" y2="760" stroke="#1A1A1A" stroke-width="1.25" marker-end="url(#arrow-07)"/>
  <text x="180" y="785" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">–</text>
  <text x="820" y="785" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="middle">+</text>

  <!-- Axis labels -->
  <text x="500" y="810" class="display" font-size="14" font-style="italic" fill="#1A1A1A" text-anchor="middle">Capacité IA-native (eval, guardrails, traces cognitives)</text>
  <text x="155" y="480" class="display" font-size="14" font-style="italic" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90, 155, 480)">Maturité plateforme (full-stack, gouvernance, échelle)</text>

  <!-- Quadrant subtle background fills -->
  <rect x="180" y="200" width="320" height="280" fill="#1F5560" fill-opacity="0.025"/>
  <rect x="500" y="200" width="320" height="280" fill="#B7332C" fill-opacity="0.04"/>
  <rect x="180" y="480" width="320" height="280" fill="#FAF8F3"/>
  <rect x="500" y="480" width="320" height="280" fill="#B58A2C" fill-opacity="0.03"/>

  <!-- Mid-axis crosshair -->
  <line x1="500" y1="200" x2="500" y2="760" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="180" y1="480" x2="820" y2="480" stroke="#B8B5AE" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- Quadrant labels (corners) -->
  <text x="195" y="225" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#1F5560">INCUMBENTS ADAPTÉS</text>
  <text x="195" y="240" class="body" font-size="10" font-style="italic" fill="#5A5A5A">profondeur plateforme, IA en rattrapage</text>

  <text x="815" y="225" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#B7332C" text-anchor="end">LEADERS IA</text>
  <text x="815" y="240" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="end">convergence plateforme + IA</text>

  <text x="195" y="755" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#5A5A5A">NICHE PLAYERS</text>
  <text x="195" y="745" class="body" font-size="10" font-style="italic" fill="#5A5A5A">portée limitée, scope spécifique</text>

  <text x="815" y="755" class="mono" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#B58A2C" text-anchor="end">CHALLENGERS AI-NATIVE</text>
  <text x="815" y="745" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="end">eval-first, écosystème jeune</text>

  <!-- DOTS — vendor positioning -->
  <!-- Top-left: Incumbents adaptés -->
  <g class="interactive" data-card="dynatrace" tabindex="0" role="button" aria-label="Dynatrace">
    <circle cx="445" cy="265" r="10" fill="#1F5560"/>
    <text x="445" y="269" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">DT</text>
  </g>
  <text x="460" y="270" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Dynatrace</text>

  <g class="interactive" data-card="datadog" tabindex="0" role="button" aria-label="Datadog">
    <circle cx="475" cy="320" r="10" fill="#1F5560"/>
    <text x="475" y="324" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">DD</text>
  </g>
  <text x="490" y="325" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Datadog</text>

  <g class="interactive" data-card="splunk" tabindex="0" role="button" aria-label="Splunk">
    <circle cx="395" cy="290" r="10" fill="#1F5560"/>
    <text x="395" y="294" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">SP</text>
  </g>
  <text x="345" y="295" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="end">Splunk</text>

  <g class="interactive" data-card="elastic" tabindex="0" role="button" aria-label="Elastic">
    <circle cx="395" cy="380" r="10" fill="#1F5560"/>
    <text x="395" y="384" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">EL</text>
  </g>
  <text x="345" y="385" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="end">Elastic</text>

  <g class="interactive" data-card="grafana" tabindex="0" role="button" aria-label="Grafana Labs">
    <circle cx="455" cy="425" r="10" fill="#1F5560"/>
    <text x="455" y="429" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">GF</text>
  </g>
  <text x="470" y="430" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Grafana Labs</text>

  <g class="interactive" data-card="newrelic" tabindex="0" role="button" aria-label="New Relic">
    <circle cx="345" cy="345" r="10" fill="#1F5560"/>
    <text x="345" y="349" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">NR</text>
  </g>
  <text x="295" y="350" class="body" font-size="11" font-weight="500" fill="#1A1A1A" text-anchor="end">New Relic</text>

  <!-- Top-right: Leaders IA (where convergence happens) -->
  <g class="interactive" data-card="langfuse" tabindex="0" role="button" aria-label="Langfuse">
    <circle cx="610" cy="335" r="10" fill="#B7332C"/>
    <text x="610" y="339" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">LF</text>
  </g>
  <text x="625" y="340" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Langfuse</text>

  <g class="interactive" data-card="braintrust" tabindex="0" role="button" aria-label="Braintrust">
    <circle cx="700" cy="290" r="10" fill="#B7332C"/>
    <text x="700" y="294" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">BT</text>
  </g>
  <text x="715" y="295" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Braintrust</text>

  <g class="interactive" data-card="langsmith" tabindex="0" role="button" aria-label="LangSmith">
    <circle cx="640" cy="395" r="10" fill="#B7332C"/>
    <text x="640" y="399" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">LS</text>
  </g>
  <text x="655" y="400" class="body" font-size="11" font-weight="500" fill="#1A1A1A">LangSmith</text>

  <!-- Bottom-right: AI-native challengers -->
  <g class="interactive" data-card="arize" tabindex="0" role="button" aria-label="Arize AI">
    <circle cx="700" cy="540" r="10" fill="#B58A2C"/>
    <text x="700" y="544" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">AR</text>
  </g>
  <text x="715" y="545" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Arize AI</text>

  <g class="interactive" data-card="galileo" tabindex="0" role="button" aria-label="Galileo AI">
    <circle cx="640" cy="595" r="10" fill="#B58A2C"/>
    <text x="640" y="599" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">GA</text>
  </g>
  <text x="655" y="600" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Galileo AI</text>

  <g class="interactive" data-card="maxim" tabindex="0" role="button" aria-label="Maxim AI">
    <circle cx="730" cy="650" r="10" fill="#B58A2C"/>
    <text x="730" y="654" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">MX</text>
  </g>
  <text x="745" y="655" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Maxim AI</text>

  <!-- Bottom-left: Niche players -->
  <g class="interactive" data-card="helicone" tabindex="0" role="button" aria-label="Helicone">
    <circle cx="290" cy="610" r="9" fill="#5A5A5A"/>
    <text x="290" y="614" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">HE</text>
  </g>
  <text x="305" y="615" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Helicone</text>

  <g class="interactive" data-card="whylabs" tabindex="0" role="button" aria-label="WhyLabs">
    <circle cx="330" cy="555" r="9" fill="#5A5A5A"/>
    <text x="330" y="559" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">WL</text>
  </g>
  <text x="345" y="560" class="body" font-size="11" font-weight="500" fill="#1A1A1A">WhyLabs</text>

  <g class="interactive" data-card="phoenix" tabindex="0" role="button" aria-label="Phoenix open-source">
    <circle cx="395" cy="660" r="9" fill="#5A5A5A"/>
    <text x="395" y="664" class="mono" font-size="9" font-weight="600" fill="#FAF8F3" text-anchor="middle">PX</text>
  </g>
  <text x="410" y="665" class="body" font-size="11" font-weight="500" fill="#1A1A1A">Phoenix (Arize OSS)</text>

  <!-- Movement arrows showing convergence -->
  <path d="M 445 255 Q 530 240 600 280" stroke="#1F5560" stroke-width="1" fill="none"
        stroke-dasharray="3 3" marker-end="url(#arrow-07)" opacity="0.5"/>
  <text x="525" y="225" class="body" font-size="9" font-style="italic" fill="#1F5560" opacity="0.7" text-anchor="middle">incumbents → IA-native</text>

  <path d="M 700 305 Q 600 350 510 410" stroke="#B7332C" stroke-width="1" fill="none"
        stroke-dasharray="3 3" marker-end="url(#arrow-07)" opacity="0.5"/>
  <text x="610" y="430" class="body" font-size="9" font-style="italic" fill="#B7332C" opacity="0.7">eval-first → full plateforme</text>

  <!-- LEGEND -->
  <line x1="60" y1="850" x2="840" y2="850" stroke="#E5E1D8" stroke-width="0.5"/>

  <text x="60" y="875" class="body" font-size="9" font-style="italic" fill="#5A5A5A">
    Sources : Gartner Magic Quadrant Observability 2025, Confident AI 2026, Monte Carlo, Maxim AI  </text>
</svg>
