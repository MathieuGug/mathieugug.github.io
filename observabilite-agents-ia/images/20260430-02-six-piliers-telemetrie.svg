<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" data-schema-id="schema-02">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow-02" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="900" height="900" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 02</text>
  <text x="60" y="92" class="display" font-size="24" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Les six piliers de la télémétrie agentique</text>
  <text x="60" y="116" class="display" font-size="14" font-style="italic"
        fill="#5A5A5A">Ce qu'il faut instrumenter, mesurer et croiser pour piloter un agent en production</text>
  <line x1="60" y1="138" x2="840" y2="138" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- CENTER NODE: Agent IA -->
  <circle cx="450" cy="475" r="78" fill="#FAF8F3" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="450" cy="475" r="68" fill="none" stroke="#1A1A1A" stroke-width="0.5"/>
  <text x="450" y="465" class="display" font-size="16" font-weight="600"
        fill="#1A1A1A" text-anchor="middle">Agent IA</text>
  <text x="450" y="488" class="body" font-size="11" font-style="italic"
        fill="#5A5A5A" text-anchor="middle">en production</text>
  <text x="450" y="506" class="mono" font-size="10" font-weight="500"
        fill="#B7332C" text-anchor="middle">télémétrie</text>

  <!-- Pillar 1 — Usage & Tokens (top) -->
  <g class="interactive" data-card="pillar-usage" tabindex="0" role="button"
     aria-label="Pilier 1 — Usage et tokens">
    <rect x="345" y="195" width="210" height="125" rx="3"
          fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="365" y="222" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.06em" fill="#B7332C">PILIER 01</text>
    <text x="365" y="245" class="display" font-size="14" font-weight="600"
          fill="#1A1A1A">Usage &amp; Tokens</text>
    <line x1="365" y1="258" x2="535" y2="258" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="365" y="278" class="body" font-size="11" fill="#1A1A1A">Tokens entrée / sortie</text>
    <text x="365" y="294" class="body" font-size="11" fill="#1A1A1A">Modèle, provider</text>
    <text x="365" y="310" class="body" font-size="11" fill="#1A1A1A">Coût par trace</text>
  </g>
  <line x1="450" y1="320" x2="450" y2="397" stroke="#5A5A5A" stroke-width="0.75"/>
  <circle cx="450" cy="397" r="3" fill="#1A1A1A"/>

  <!-- Pillar 2 — Performance (top right) -->
  <g class="interactive" data-card="pillar-performance" tabindex="0" role="button"
     aria-label="Pilier 2 — Performance">
    <rect x="615" y="285" width="210" height="125" rx="3"
          fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="635" y="312" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.06em" fill="#1F5560">PILIER 02</text>
    <text x="635" y="335" class="display" font-size="14" font-weight="600"
          fill="#1A1A1A">Performance</text>
    <line x1="635" y1="348" x2="805" y2="348" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="635" y="368" class="body" font-size="11" fill="#1A1A1A">Latence end-to-end</text>
    <text x="635" y="384" class="body" font-size="11" fill="#1A1A1A">Time-to-first-token</text>
    <text x="635" y="400" class="body" font-size="11" fill="#1A1A1A">Throughput, GPU</text>
  </g>
  <line x1="615" y1="395" x2="525" y2="442" stroke="#5A5A5A" stroke-width="0.75"/>
  <circle cx="525" cy="442" r="3" fill="#1A1A1A"/>

  <!-- Pillar 3 — Comportement (bottom right) -->
  <g class="interactive" data-card="pillar-comportement" tabindex="0" role="button"
     aria-label="Pilier 3 — Comportement">
    <rect x="615" y="540" width="210" height="125" rx="3"
          fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="635" y="567" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.06em" fill="#B58A2C">PILIER 03</text>
    <text x="635" y="590" class="display" font-size="14" font-weight="600"
          fill="#1A1A1A">Comportement</text>
    <line x1="635" y1="603" x2="805" y2="603" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="635" y="623" class="body" font-size="11" fill="#1A1A1A">Sélection d'outils</text>
    <text x="635" y="639" class="body" font-size="11" fill="#1A1A1A">Séquences d'actions</text>
    <text x="635" y="655" class="body" font-size="11" fill="#1A1A1A">Patterns de routing</text>
  </g>
  <line x1="615" y1="555" x2="525" y2="510" stroke="#5A5A5A" stroke-width="0.75"/>
  <circle cx="525" cy="510" r="3" fill="#1A1A1A"/>

  <!-- Pillar 4 — Qualité (bottom) -->
  <g class="interactive" data-card="pillar-qualite" tabindex="0" role="button"
     aria-label="Pilier 4 — Qualité">
    <rect x="345" y="630" width="210" height="125" rx="3"
          fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="365" y="657" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.06em" fill="#B7332C">PILIER 04</text>
    <text x="365" y="680" class="display" font-size="14" font-weight="600"
          fill="#1A1A1A">Qualité</text>
    <line x1="365" y1="693" x2="535" y2="693" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="365" y="713" class="body" font-size="11" fill="#1A1A1A">Score LLM-as-judge</text>
    <text x="365" y="729" class="body" font-size="11" fill="#1A1A1A">Détection hallucinations</text>
    <text x="365" y="745" class="body" font-size="11" fill="#1A1A1A">Pertinence, complétion</text>
  </g>
  <line x1="450" y1="630" x2="450" y2="553" stroke="#5A5A5A" stroke-width="0.75"/>
  <circle cx="450" cy="553" r="3" fill="#1A1A1A"/>

  <!-- Pillar 5 — Gouvernance (bottom left) -->
  <g class="interactive" data-card="pillar-gouvernance" tabindex="0" role="button"
     aria-label="Pilier 5 — Gouvernance">
    <rect x="75" y="540" width="210" height="125" rx="3"
          fill="#FAF8F3" stroke="#1F5560" stroke-width="1.25"/>
    <text x="95" y="567" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.06em" fill="#1F5560">PILIER 05</text>
    <text x="95" y="590" class="display" font-size="14" font-weight="600"
          fill="#1A1A1A">Gouvernance</text>
    <line x1="95" y1="603" x2="265" y2="603" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="95" y="623" class="body" font-size="11" fill="#1A1A1A">Guardrails activés</text>
    <text x="95" y="639" class="body" font-size="11" fill="#1A1A1A">Politiques respectées</text>
    <text x="95" y="655" class="body" font-size="11" fill="#1A1A1A">Audit trail cognitif</text>
  </g>
  <line x1="285" y1="555" x2="375" y2="510" stroke="#5A5A5A" stroke-width="0.75"/>
  <circle cx="375" cy="510" r="3" fill="#1A1A1A"/>

  <!-- Pillar 6 — Drift & Fiabilité (top left) -->
  <g class="interactive" data-card="pillar-drift" tabindex="0" role="button"
     aria-label="Pilier 6 — Drift et fiabilité">
    <rect x="75" y="285" width="210" height="125" rx="3"
          fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="95" y="312" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.06em" fill="#B58A2C">PILIER 06</text>
    <text x="95" y="335" class="display" font-size="14" font-weight="600"
          fill="#1A1A1A">Drift &amp; Fiabilité</text>
    <line x1="95" y1="348" x2="265" y2="348" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="95" y="368" class="body" font-size="11" fill="#1A1A1A">Dérive sémantique</text>
    <text x="95" y="384" class="body" font-size="11" fill="#1A1A1A">Régression de scores</text>
    <text x="95" y="400" class="body" font-size="11" fill="#1A1A1A">Variance évaluations</text>
  </g>
  <line x1="285" y1="395" x2="375" y2="442" stroke="#5A5A5A" stroke-width="0.75"/>
  <circle cx="375" cy="442" r="3" fill="#1A1A1A"/>

  <!-- LEGEND grouping at bottom -->
  <line x1="60" y1="800" x2="840" y2="800" stroke="#E5E1D8" stroke-width="0.5"/>

  <text x="60" y="828" class="body" font-size="11" font-weight="500" fill="#5A5A5A">FAMILLE OPÉRATIONNELLE</text>
  <circle cx="252" cy="824" r="4" fill="#B7332C"/>
  <text x="262" y="828" class="body" font-size="11" fill="#1A1A1A">coûts &amp; valeur métier</text>

  <text x="60" y="848" class="body" font-size="11" font-weight="500" fill="#5A5A5A">FAMILLE TECHNIQUE</text>
  <circle cx="252" cy="844" r="4" fill="#1F5560"/>
  <text x="262" y="848" class="body" font-size="11" fill="#1A1A1A">runtime, infrastructure, gouvernance</text>

  <text x="450" y="828" class="body" font-size="11" font-weight="500" fill="#5A5A5A">FAMILLE COGNITIVE</text>
  <circle cx="630" cy="824" r="4" fill="#B58A2C"/>
  <text x="640" y="828" class="body" font-size="11" fill="#1A1A1A">décisions, dérive, raisonnement</text>

  <!-- FOOTER -->
  <text x="60" y="878" class="body" font-size="10" font-style="italic"
        fill="#5A5A5A">Sources : Voiceflow 2026, Kore.ai, Langfuse documentation</text>
</svg>
