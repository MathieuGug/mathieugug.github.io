<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-05">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow-05" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
    <marker id="arrow-05-emph" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7332C"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 05</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Un instrument, N backends — la promesse d'OpenTelemetry</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">Découpler l'instrumentation du backend : la stratégie anti-lock-in pour l'IA agentique</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- STAGE LABELS -->
  <text x="170" y="180" class="body" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A" text-anchor="middle">INSTRUMENTER</text>
  <text x="600" y="180" class="body" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A" text-anchor="middle">TRANSPORTER</text>
  <text x="990" y="180" class="body" font-size="10" font-weight="500"
        letter-spacing="0.08em" fill="#5A5A5A" text-anchor="middle">EXPLOITER</text>

  <!-- LEFT: Single application -->
  <g class="interactive" data-card="single-app" tabindex="0" role="button"
     aria-label="Application unique instrumentée">
    <rect x="80" y="240" width="200" height="290" rx="3"
          fill="#FAF8F3" stroke="#B7332C" stroke-width="2"/>
    <text x="180" y="270" class="display" font-size="15" font-weight="600"
          fill="#1A1A1A" text-anchor="middle">Application</text>
    <text x="180" y="290" class="display" font-size="15" font-weight="600"
          fill="#1A1A1A" text-anchor="middle">agent IA</text>
    <line x1="105" y1="310" x2="255" y2="310" stroke="#E5E1D8" stroke-width="0.5"/>

    <text x="180" y="335" class="mono" font-size="10" font-weight="600"
          fill="#5A5A5A" text-anchor="middle">CODE MÉTIER</text>
    <text x="180" y="355" class="body" font-size="11" fill="#1A1A1A" text-anchor="middle">Python · TypeScript · Go</text>

    <text x="180" y="385" class="mono" font-size="10" font-weight="600"
          fill="#5A5A5A" text-anchor="middle">+ OTel SDK</text>
    <text x="180" y="404" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">tracer, meter, logger</text>

    <text x="180" y="432" class="mono" font-size="10" font-weight="600"
          fill="#5A5A5A" text-anchor="middle">+ AUTO-INSTRUMENTOR</text>
    <text x="180" y="451" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">OpenLLMetry · OpenLIT</text>
    <text x="180" y="466" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">openai-agents-v2 · ADK</text>

    <text x="180" y="495" class="mono" font-size="10" font-weight="600"
          fill="#B7332C" text-anchor="middle">→ SPANS OTel GenAI</text>
    <text x="180" y="513" class="body" font-size="10" font-style="italic" fill="#5A5A5A" text-anchor="middle">conformes v1.37+</text>
  </g>

  <!-- ARROW from app to collector -->
  <path d="M 280 380 L 380 380" stroke="#B7332C" stroke-width="2" fill="none" marker-end="url(#arrow-05-emph)"/>
  <text x="330" y="370" class="mono" font-size="9" fill="#B7332C" text-anchor="middle">OTLP</text>

  <!-- MIDDLE: OTel Collector -->
  <g class="interactive" data-card="otel-collector" tabindex="0" role="button"
     aria-label="OTel Collector central">
    <rect x="395" y="240" width="270" height="290" rx="3"
          fill="#1F5560" fill-opacity="0.07" stroke="#1F5560" stroke-width="1.5"/>
    <text x="530" y="272" class="display" font-size="15" font-weight="600"
          fill="#1F5560" text-anchor="middle">OTel Collector</text>
    <text x="530" y="290" class="body" font-size="11" font-style="italic"
          fill="#5A5A5A" text-anchor="middle">gateway centralisée</text>
    <line x1="420" y1="308" x2="640" y2="308" stroke="#1F5560" stroke-opacity="0.3" stroke-width="0.5"/>

    <!-- Processors as rows -->
    <text x="420" y="335" class="mono" font-size="10" font-weight="600" fill="#5A5A5A">PROCESSORS</text>

    <rect x="420" y="350" width="220" height="26" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="530" y="367" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">Redaction PII</text>

    <rect x="420" y="384" width="220" height="26" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="530" y="401" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">Sampling intelligent (10%)</text>

    <rect x="420" y="418" width="220" height="26" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="530" y="435" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">Enrichissement (env, version)</text>

    <rect x="420" y="452" width="220" height="26" rx="2" fill="#FAF8F3" stroke="#1F5560" stroke-width="0.75"/>
    <text x="530" y="469" class="body" font-size="10" fill="#1A1A1A" text-anchor="middle">Routing multi-export</text>

    <text x="530" y="510" class="body" font-size="10" font-style="italic" fill="#1F5560" text-anchor="middle">Le seul point où les PII</text>
    <text x="530" y="524" class="body" font-size="10" font-style="italic" fill="#1F5560" text-anchor="middle">peuvent encore être filtrées</text>
  </g>

  <!-- ARROW from collector to backends -->
  <line x1="665" y1="285" x2="800" y2="240" stroke="#5A5A5A" stroke-width="1" fill="none" marker-end="url(#arrow-05)"/>
  <line x1="665" y1="335" x2="800" y2="290" stroke="#5A5A5A" stroke-width="1" fill="none" marker-end="url(#arrow-05)"/>
  <line x1="665" y1="385" x2="800" y2="340" stroke="#5A5A5A" stroke-width="1" fill="none" marker-end="url(#arrow-05)"/>
  <line x1="665" y1="385" x2="800" y2="390" stroke="#5A5A5A" stroke-width="1" fill="none" marker-end="url(#arrow-05)"/>
  <line x1="665" y1="385" x2="800" y2="440" stroke="#5A5A5A" stroke-width="1" fill="none" marker-end="url(#arrow-05)"/>
  <line x1="665" y1="435" x2="800" y2="490" stroke="#5A5A5A" stroke-width="1" fill="none" marker-end="url(#arrow-05)"/>
  <line x1="665" y1="485" x2="800" y2="540" stroke="#5A5A5A" stroke-width="1" fill="none" marker-end="url(#arrow-05)"/>

  <!-- RIGHT: Backends column -->
  <g class="interactive" data-card="backend-incumbents" tabindex="0" role="button"
     aria-label="Backends incumbents APM">
    <rect x="810" y="225" width="320" height="100" rx="3"
          fill="#FAF8F3" stroke="#1A1A1A" stroke-width="1.25"/>
    <text x="830" y="252" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.06em" fill="#5A5A5A">INCUMBENTS APM</text>
    <line x1="830" y1="262" x2="1110" y2="262" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="830" y="285" class="body" font-size="11" fill="#1A1A1A">Datadog · Dynatrace · Splunk</text>
    <text x="830" y="305" class="body" font-size="11" fill="#1A1A1A">Elastic · New Relic</text>
  </g>

  <g class="interactive" data-card="backend-ai-native" tabindex="0" role="button"
     aria-label="Backends AI-native">
    <rect x="810" y="345" width="320" height="100" rx="3"
          fill="#FAF8F3" stroke="#B7332C" stroke-width="1.25"/>
    <text x="830" y="372" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.06em" fill="#B7332C">AI-NATIVE</text>
    <line x1="830" y1="382" x2="1110" y2="382" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="830" y="405" class="body" font-size="11" fill="#1A1A1A">Langfuse · Braintrust · LangSmith</text>
    <text x="830" y="425" class="body" font-size="11" fill="#1A1A1A">Arize Phoenix · Galileo · Maxim AI</text>
  </g>

  <g class="interactive" data-card="backend-open" tabindex="0" role="button"
     aria-label="Backends open-source">
    <rect x="810" y="465" width="320" height="100" rx="3"
          fill="#FAF8F3" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="830" y="492" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.06em" fill="#B58A2C">OPEN-SOURCE / SELF-HOSTED</text>
    <line x1="830" y1="502" x2="1110" y2="502" stroke="#E5E1D8" stroke-width="0.5"/>
    <text x="830" y="525" class="body" font-size="11" fill="#1A1A1A">Grafana stack · Tempo · Loki · Mimir</text>
    <text x="830" y="545" class="body" font-size="11" fill="#1A1A1A">Jaeger · ClickHouse · Langfuse OSS</text>
  </g>

  <!-- Strategic insight box -->
  <g>
    <rect x="80" y="595" width="1050" height="100" rx="3"
          fill="#B7332C" fill-opacity="0.05" stroke="#B7332C" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="105" y="623" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.06em" fill="#B7332C">CONSÉQUENCE STRATÉGIQUE</text>
    <text x="105" y="650" class="body" font-size="13" fill="#1A1A1A">
      <tspan x="105" dy="0">Recommander OpenTelemetry comme standard d'instrumentation en mission consulting protège le client contre le lock-in vendor</tspan>
      <tspan x="105" dy="20">tout en gardant la flexibilité de changer de backend sans re-instrumenter — argument de négociation puissant face aux SaaS dominants.</tspan>
    </text>
  </g>

  <!-- FOOTER -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="755" class="body" font-size="10" font-style="italic"
        fill="#5A5A5A">Sources : OpenTelemetry GenAI Semantic Conventions, Datadog &amp; Langfuse OTel integration docs</text>
  <text x="60" y="772" class="body" font-size="10" font-style="italic"
        fill="#B8B5AE">Architecture observée chez 8 implémentations multi-backends actives en 2026</text>
</svg>
