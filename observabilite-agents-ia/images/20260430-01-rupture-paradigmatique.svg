<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" data-schema-id="schema-01">
  <defs>
    <style>
      .display { font-family: 'Spectral', 'Playfair Display', Georgia, serif; }
      .body    { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
    </style>
    <marker id="arrow-01" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAF8F3"/>

  <!-- HEADER -->
  <text x="60" y="55" class="mono" font-size="11" font-weight="600"
        letter-spacing="0.12em" fill="#B7332C">SCHÉMA 01</text>
  <text x="60" y="92" class="display" font-size="26" font-weight="600"
        letter-spacing="-0.01em" fill="#1A1A1A">Quatre paradigmes d'observabilité, vingt-cinq ans d'évolution</text>
  <text x="60" y="118" class="display" font-size="16" font-style="italic"
        fill="#5A5A5A">Du monitoring infrastructure au cognitive audit trail — une rupture qualitative</text>
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#E5E1D8" stroke-width="0.5"/>

  <!-- Time axis -->
  <line x1="80" y1="660" x2="1120" y2="660" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="100" y="685" class="mono" font-size="10" fill="#5A5A5A">2000</text>
  <text x="380" y="685" class="mono" font-size="10" fill="#5A5A5A">2010</text>
  <text x="660" y="685" class="mono" font-size="10" fill="#5A5A5A">2018</text>
  <text x="940" y="685" class="mono" font-size="10" fill="#5A5A5A">2023</text>
  <text x="1100" y="685" class="mono" font-size="10" fill="#5A5A5A">2026</text>

  <!-- Tick marks -->
  <line x1="100" y1="657" x2="100" y2="663" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="380" y1="657" x2="380" y2="663" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="660" y1="657" x2="660" y2="663" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="940" y1="657" x2="940" y2="663" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- ERA 1: MONITORING (2000-2010) -->
  <g class="interactive" data-card="era-monitoring" tabindex="0" role="button"
     aria-label="Ère du monitoring classique">
    <rect x="100" y="200" width="240" height="430" rx="3"
          fill="#B8B5AE" fill-opacity="0.08" stroke="#5A5A5A" stroke-width="1.25"/>
    <text x="120" y="232" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.08em" fill="#5A5A5A">ÈRE 01 · 2000–2010</text>
    <text x="120" y="262" class="display" font-size="17" font-weight="600"
          fill="#1A1A1A">Monitoring</text>
    <text x="120" y="284" class="display" font-size="13" font-style="italic"
          fill="#5A5A5A">classique</text>

    <line x1="120" y1="305" x2="320" y2="305" stroke="#B8B5AE" stroke-width="0.5"/>

    <text x="120" y="330" class="body" font-size="11" font-weight="500" fill="#5A5A5A">SYSTÈMES</text>
    <text x="120" y="350" class="body" font-size="12" fill="#1A1A1A">Nagios, Zabbix</text>

    <text x="120" y="380" class="body" font-size="11" font-weight="500" fill="#5A5A5A">SIGNAUX</text>
    <text x="120" y="400" class="body" font-size="12" fill="#1A1A1A">SNMP, ping, uptime</text>
    <text x="120" y="418" class="body" font-size="12" fill="#1A1A1A">CPU, RAM, disque</text>

    <text x="120" y="450" class="body" font-size="11" font-weight="500" fill="#5A5A5A">DÉFAILLANCE</text>
    <text x="120" y="470" class="body" font-size="12" fill="#1A1A1A">Binaire</text>
    <text x="120" y="488" class="body" font-size="11" font-style="italic" fill="#5A5A5A">marche / panne</text>

    <text x="120" y="520" class="body" font-size="11" font-weight="500" fill="#5A5A5A">DÉTECTION</text>
    <text x="120" y="540" class="body" font-size="12" fill="#1A1A1A">Seuils statiques</text>

    <text x="120" y="595" class="body" font-size="11" font-weight="500" fill="#5A5A5A">STANDARD</text>
    <text x="120" y="615" class="body" font-size="12" fill="#1A1A1A">SNMP / syslog</text>
  </g>

  <!-- Marker on timeline -->
  <circle cx="220" cy="660" r="5" fill="#B8B5AE"/>

  <!-- ERA 2: APM (2010-2018) -->
  <g class="interactive" data-card="era-apm" tabindex="0" role="button"
     aria-label="Ère de l'APM applicatif">
    <rect x="380" y="200" width="240" height="430" rx="3"
          fill="#1F5560" fill-opacity="0.06" stroke="#1F5560" stroke-width="1.25"/>
    <text x="400" y="232" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.08em" fill="#1F5560">ÈRE 02 · 2010–2018</text>
    <text x="400" y="262" class="display" font-size="17" font-weight="600"
          fill="#1A1A1A">APM</text>
    <text x="400" y="284" class="display" font-size="13" font-style="italic"
          fill="#5A5A5A">applicatif</text>

    <line x1="400" y1="305" x2="600" y2="305" stroke="#1F5560" stroke-opacity="0.3" stroke-width="0.5"/>

    <text x="400" y="330" class="body" font-size="11" font-weight="500" fill="#5A5A5A">SYSTÈMES</text>
    <text x="400" y="350" class="body" font-size="12" fill="#1A1A1A">New Relic, AppDynamics</text>

    <text x="400" y="380" class="body" font-size="11" font-weight="500" fill="#5A5A5A">SIGNAUX</text>
    <text x="400" y="400" class="body" font-size="12" fill="#1A1A1A">Latence, throughput</text>
    <text x="400" y="418" class="body" font-size="12" fill="#1A1A1A">Error rate, saturation</text>

    <text x="400" y="450" class="body" font-size="11" font-weight="500" fill="#5A5A5A">DÉFAILLANCE</text>
    <text x="400" y="470" class="body" font-size="12" fill="#1A1A1A">Code, transaction</text>
    <text x="400" y="488" class="body" font-size="11" font-style="italic" fill="#5A5A5A">stack trace</text>

    <text x="400" y="520" class="body" font-size="11" font-weight="500" fill="#5A5A5A">DÉTECTION</text>
    <text x="400" y="540" class="body" font-size="12" fill="#1A1A1A">4 Golden Signals</text>

    <text x="400" y="595" class="body" font-size="11" font-weight="500" fill="#5A5A5A">STANDARD</text>
    <text x="400" y="615" class="body" font-size="12" fill="#1A1A1A">Agent propriétaire</text>
  </g>

  <circle cx="500" cy="660" r="5" fill="#1F5560"/>

  <!-- ERA 3: CLOUD-NATIVE (2018-2023) -->
  <g class="interactive" data-card="era-cloud-native" tabindex="0" role="button"
     aria-label="Ère cloud-native MELT">
    <rect x="660" y="200" width="240" height="430" rx="3"
          fill="#B58A2C" fill-opacity="0.07" stroke="#B58A2C" stroke-width="1.25"/>
    <text x="680" y="232" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.08em" fill="#B58A2C">ÈRE 03 · 2018–2023</text>
    <text x="680" y="262" class="display" font-size="17" font-weight="600"
          fill="#1A1A1A">Cloud-native</text>
    <text x="680" y="284" class="display" font-size="13" font-style="italic"
          fill="#5A5A5A">distribué (MELT)</text>

    <line x1="680" y1="305" x2="880" y2="305" stroke="#B58A2C" stroke-opacity="0.3" stroke-width="0.5"/>

    <text x="680" y="330" class="body" font-size="11" font-weight="500" fill="#5A5A5A">SYSTÈMES</text>
    <text x="680" y="350" class="body" font-size="12" fill="#1A1A1A">Datadog, Dynatrace</text>
    <text x="680" y="368" class="body" font-size="12" fill="#1A1A1A">Grafana, Splunk</text>

    <text x="680" y="395" class="body" font-size="11" font-weight="500" fill="#5A5A5A">SIGNAUX</text>
    <text x="680" y="415" class="body" font-size="12" fill="#1A1A1A">Logs · Metrics · Traces</text>
    <text x="680" y="433" class="body" font-size="12" fill="#1A1A1A">+ Events (MELT)</text>

    <text x="680" y="460" class="body" font-size="11" font-weight="500" fill="#5A5A5A">DÉFAILLANCE</text>
    <text x="680" y="480" class="body" font-size="12" fill="#1A1A1A">Cascade microservices</text>
    <text x="680" y="498" class="body" font-size="11" font-style="italic" fill="#5A5A5A">distributed tracing</text>

    <text x="680" y="525" class="body" font-size="11" font-weight="500" fill="#5A5A5A">DÉTECTION</text>
    <text x="680" y="545" class="body" font-size="12" fill="#1A1A1A">AIOps, anomalies</text>

    <text x="680" y="595" class="body" font-size="11" font-weight="500" fill="#5A5A5A">STANDARD</text>
    <text x="680" y="615" class="body" font-size="12" fill="#1A1A1A">OpenTelemetry</text>
  </g>

  <circle cx="780" cy="660" r="5" fill="#B58A2C"/>

  <!-- ERA 4: AGENTIC (2023-2026) -->
  <g class="interactive" data-card="era-agentic" tabindex="0" role="button"
     aria-label="Ère cognitive et agentique">
    <rect x="940" y="180" width="180" height="450" rx="3"
          fill="#B7332C" fill-opacity="0.06" stroke="#B7332C" stroke-width="2"/>
    <text x="960" y="212" class="mono" font-size="10" font-weight="600"
          letter-spacing="0.08em" fill="#B7332C">ÈRE 04 · 2023–2026</text>
    <text x="960" y="244" class="display" font-size="17" font-weight="600"
          fill="#1A1A1A">Cognitive</text>
    <text x="960" y="266" class="display" font-size="13" font-style="italic"
          fill="#5A5A5A">agentique &amp; IA</text>

    <line x1="960" y1="287" x2="1100" y2="287" stroke="#B7332C" stroke-opacity="0.3" stroke-width="0.5"/>

    <text x="960" y="312" class="body" font-size="11" font-weight="500" fill="#5A5A5A">SYSTÈMES</text>
    <text x="960" y="332" class="body" font-size="11" fill="#1A1A1A">Langfuse, Braintrust,</text>
    <text x="960" y="350" class="body" font-size="11" fill="#1A1A1A">Arize, Galileo</text>

    <text x="960" y="378" class="body" font-size="11" font-weight="500" fill="#5A5A5A">SIGNAUX</text>
    <text x="960" y="398" class="body" font-size="11" fill="#1A1A1A">Traces cognitives</text>
    <text x="960" y="416" class="body" font-size="11" fill="#1A1A1A">Tokens, qualité</text>
    <text x="960" y="434" class="body" font-size="11" fill="#1A1A1A">Guardrails, drift</text>

    <text x="960" y="462" class="body" font-size="11" font-weight="500" fill="#5A5A5A">DÉFAILLANCE</text>
    <text x="960" y="482" class="body" font-size="11" fill="#1A1A1A">Hallucination,</text>
    <text x="960" y="500" class="body" font-size="11" fill="#1A1A1A">drift sémantique</text>

    <text x="960" y="528" class="body" font-size="11" font-weight="500" fill="#5A5A5A">DÉTECTION</text>
    <text x="960" y="548" class="body" font-size="11" fill="#1A1A1A">LLM-as-judge,</text>
    <text x="960" y="566" class="body" font-size="11" fill="#1A1A1A">eval continue</text>

    <text x="960" y="595" class="body" font-size="11" font-weight="500" fill="#5A5A5A">STANDARD</text>
    <text x="960" y="615" class="body" font-size="11" fill="#1A1A1A">OTel GenAI v1.37+</text>
  </g>

  <circle cx="1030" cy="660" r="6" fill="#B7332C"/>

  <!-- Continuity arrow above -->
  <path d="M 220 175 L 500 175 L 780 175 L 1030 165"
        stroke="#5A5A5A" stroke-width="0.75" fill="none"
        stroke-dasharray="3 3" marker-end="url(#arrow-01)"/>
  <text x="600" y="170" class="body" font-size="10" font-style="italic"
        fill="#5A5A5A" text-anchor="middle">empilement, jamais remplacement — chaque ère ajoute une couche cognitive supplémentaire</text>

  <!-- ANNOTATION ON BIG SHIFT -->
  <text x="540" y="730" class="body" font-size="11" font-style="italic" fill="#B7332C" text-anchor="middle">
    La rupture clé : le passage du déterministe au probabiliste — une réponse correcte de l'API ne garantit plus une réponse correcte de l'agent.
  </text>

  <!-- FOOTER -->
  <line x1="60" y1="755" x2="1140" y2="755" stroke="#E5E1D8" stroke-width="0.5"/>
  <text x="60" y="778" class="body" font-size="10" font-style="italic"
        fill="#5A5A5A">Sources : OpenTelemetry, IBM Think 2026, Gartner MQ Observability 2025</text>
</svg>
